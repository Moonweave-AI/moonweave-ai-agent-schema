schema: moonweave.ai/ontology-node/v1
id: TextCorpus
kind: concept
status: accepted
labels:
  zh: 文本语料
  en: Text corpus
  ja: テキストcorpus
semantics:
  short_definition:
    zh: 成员为 TextDocument 且用于整体文本处理的可摄入集合。
    en: An ingestible collection whose members are TextDocument values used for corpus-wide text processing.
    ja: memberが TextDocument でcorpus全体text処理に使う取込可能collectionです。
  definition:
    zh: TextCorpus 是成员均为 TextDocument、以 corpus_id 与成员清单摘要标识的 IngestibleCollection，可作为 TF-IDF 拟合或批量摄入范围；它不是一份文档或已拟合索引。
    en: TextCorpus is an IngestibleCollection whose members are TextDocument values and which is identified by corpus_id plus member-manifest digest, usable as a TF-IDF fitting or batch-ingestion scope; it is not one document or a fitted index.
    ja: TextCorpus はmemberが TextDocument で corpus_id とmember-manifest digestにより識別しTF-IDF fittingまたはbatch取込scopeに使える IngestibleCollection で、単一documentやfitted indexではありません。
  why_needed:
    zh: 表达语料集合到文本文档的成员层。
    en: Expresses the corpus-to-text-document membership layer.
    ja: corpusからtext-documentへのmembership階層を表します。
  includes:
    - zh: 纳入版本化文本文档集合。
      en: Includes versioned collections of text documents.
      ja: versioned text document collectionを含みます。
  excludes:
    - zh: 排除 TextDocument、TfIdfIndex 和任意文件集合。
      en: Excludes TextDocument, TfIdfIndex, and arbitrary file collections.
      ja: TextDocument・TfIdfIndex・任意file collectionを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - corpus_id
  fields:
    - id: corpus_id
      labels:
        zh: 语料标识
        en: corpus ID
        ja: corpus ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识语料集合。
        en: Stable identifier for the corpus collection.
        ja: corpus collectionの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: corpus-policy-7
      source_claims:
        - claim-text-corpus-002
    - id: member_manifest_digest
      labels:
        zh: 成员清单摘要
        en: member-manifest digest
        ja: member manifest digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定文档成员和版本。
        en: Fixes document members and versions.
        ja: document memberと版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:corpus-policy-7
      source_claims:
        - claim-text-corpus-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: TextCorpus-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文本语料正例
      en: "Positive case: Text corpus"
      ja: テキストcorpus正例
    scenario_id: null
    descriptions:
      zh: corpus-policy-7 以 corpus_id、语言范围 zh-CN、manifest digest tc7 和 120 个 TextDocument 版本的清单识别，并声明语料版本。
      en: corpus-policy-7 is identified by corpus ID, language scope zh-CN, manifest digest tc7, and a manifest of 120 TextDocument versions and declares a corpus version.
      ja: corpus-policy-7 は corpus ID、language scope、manifest digest、120 TextDocument versions の manifest で識別されます。
    field_values:
      corpus_id: corpus-policy-7
      member_manifest_digest: sha256:corpus-policy-7
      collection_id: corpus-policy-7
    related_node_ids:
      - TextCorpus
    related_relation_ids: []
    expected_result:
      zh: 将 corpus-policy-7 表示为 TextCorpus，并把成员资格固定到文档 ID 与摘要的组合。
      en: Represent corpus-policy-7 as TextCorpus and fix membership by each document ID and digest pair.
      ja: corpus-policy-7 を TextCorpus とし membership を document ID・digest pair で固定します。
    why_valid_or_invalid:
      zh: 独立语料身份、纯文本成员约束和版本化清单共同形成可作为批量接入输入的文本集合。
      en: Independent corpus identity, the text-document member constraint, and a versioned manifest jointly form a text collection suitable for batch ingestion.
      ja: independent corpus identity、text-document constraint、versioned manifest が batch ingestion 用 text collection を形成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-corpus-004
  - id: TextCorpus-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文本语料边界例
      en: "Boundary case: Text corpus"
      ja: テキストcorpus境界例
    scenario_id: null
    descriptions:
      zh: tfidf-index-17 由 vocabulary、idf 权重、训练语料版本和构建活动识别；它引用 corpus-policy-7，但不拥有其文档成员清单。
      en: tfidf-index-17 is identified by vocabulary, IDF weights, training-corpus version, and build activity; it references corpus-policy-7 but does not own its document manifest.
      ja: tfidf-index-17 は vocabulary、IDF weights、training corpus version、build activity で識別され corpus manifest を所有しません。
    field_values: {}
    related_node_ids:
      - TextCorpus
    related_relation_ids: []
    expected_result:
      zh: 把 tfidf-index-17 保持为索引产物，不把基于语料构建的结构归为 TextCorpus。
      en: Keep tfidf-index-17 as an index product and do not classify a structure built from the corpus as TextCorpus.
      ja: tfidf-index-17 は index product とし corpus から構築された構造を TextCorpus にしません。
    why_valid_or_invalid:
      zh: 语料保存来源文档集合，索引保存从该集合计算的检索结构；重新构建索引不会改变语料身份。
      en: A corpus preserves the source-document collection, whereas an index preserves a retrieval structure computed from it; rebuilding the index does not change corpus identity.
      ja: corpus は source documents、index は computed retrieval structure を保持し index rebuild は corpus identity を変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-corpus-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: TextCorpus-is_a-IngestibleCollection
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TextCorpus 是 IngestibleCollection 的严格子类；种差为：成员均为 TextDocument 且以语料成员清单版本标识。
    en: "TextCorpus is a strict subtype of IngestibleCollection; its reviewed differentia is: all members are TextDocument values and corpus identity is fixed by a versioned member manifest."
    ja: TextCorpus は IngestibleCollection の厳密なsubtypeで、審査済み種差は「全memberが TextDocument でversioned member manifestによりcorpus同一性を固定します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: TextCorpus-is_a-IngestibleCollection-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestibleCollection and also satisfies the differentia: all members are TextDocument values and corpus identity is fixed by a versioned member manifest."
      explanations:
        zh: 仅当对象首先满足 IngestibleCollection 定义且满足种差“成员均为 TextDocument 且以语料成员清单版本标识。”时成立。
        en: "Assert only when the object first satisfies IngestibleCollection and also satisfies the differentia: all members are TextDocument values and corpus identity is fixed by a versioned member manifest."
        ja: 対象がまず IngestibleCollection を満たし、さらに種差「全memberが TextDocument でversioned member manifestによりcorpus同一性を固定します。」を満たす時だけ成立します。
      source_claims:
        - claim-text-corpus-006
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TextCorpus-is_a-IngestibleCollection-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: corpus-policy-7 具有独立 corpus_id 和版本化成员清单，全部 120 个成员均满足 TextDocument，因而先满足 IngestibleCollection 再满足纯文本种差。
        en: corpus-policy-7 has an independent corpus ID and versioned member manifest, and all 120 members satisfy TextDocument, so it satisfies IngestibleCollection and then the all-text differentia.
        ja: corpus-policy-7 は independent corpus ID・versioned manifest を持ち全 members が TextDocument で collection parent と text differentia を満たします。
      field_values: {}
      related_node_ids:
        - TextCorpus
        - IngestibleCollection
      related_relation_ids:
        - TextCorpus-is_a-IngestibleCollection
      expected_result:
        zh: 确认 corpus-policy-7 同时属于 TextCorpus 与 IngestibleCollection。
        en: Confirm corpus-policy-7 as both TextCorpus and IngestibleCollection.
        ja: corpus-policy-7 を TextCorpus と IngestibleCollection の両方に所属させます。
      why_valid_or_invalid:
        zh: 对象满足独立集合身份与确定成员边界，并以成员主要载荷均为文本构成语料种差。
        en: The object satisfies independent collection identity and determinate membership and adds text-primary-payload membership as corpus differentia.
        ja: independent collection identity・determinate membership を満たし text-primary-payload membership を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-text-corpus-006
    - id: TextCorpus-is_a-IngestibleCollection-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: collection-mixed-7 的清单同时包含 PDF Document、Audio Document 与 TextDocument；它有集合身份但不满足所有成员为文本的条件。
        en: collection-mixed-7's manifest contains PDF Documents, Audio Documents, and TextDocuments; it has collection identity but fails the all-members-text condition.
        ja: collection-mixed-7 は PDF、Audio、TextDocument を含み collection identity はあるが all-text condition を満たしません。
      field_values: {}
      related_node_ids:
        - TextCorpus
        - IngestibleCollection
      related_relation_ids:
        - TextCorpus-is_a-IngestibleCollection
      expected_result:
        zh: 把 collection-mixed-7 保持为 IngestibleCollection，不归为 TextCorpus。
        en: Keep collection-mixed-7 as IngestibleCollection and do not classify it as TextCorpus.
        ja: collection-mixed-7 は IngestibleCollection とし TextCorpus に分類しません。
      why_valid_or_invalid:
        zh: 上位集合允许异构可摄取成员，TextCorpus 额外约束成员的文档类型；集合名称不能替代成员检查。
        en: The parent collection permits heterogeneous ingestible members, while TextCorpus additionally constrains member Document type; collection naming cannot replace member inspection.
        ja: parent collection は heterogeneous members を許すが TextCorpus は member Document type を制約し name だけでは不十分です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-text-corpus-006
  source_claims:
    - claim-text-corpus-006
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: TextCorpus-contains-TextDocument
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: 包含文本文档
      en: contains text document
      ja: text documentを含む
    definitions:
      zh: TextCorpus —contains→ TextDocument 表示文档的复合身份与版本出现在语料成员清单。
      en: TextCorpus —contains→ TextDocument means that the document's composite identity and version occur in the corpus member manifest.
      ja: TextCorpus —contains→ TextDocument はdocument複合同一性と版がcorpus member manifestに存在することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_contains
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: TextCorpus-contains-TextDocument-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the member manifest contains the target document ID and content digest.
        explanations:
          zh: 仅当 member_manifest 包含目标 document_id 与 content_digest 时成立。
          en: Assert only when the member manifest contains the target document ID and content digest.
          ja: member_manifestがtarget document IDとcontent digestを含む時だけ成立します。
        source_claims:
          - claim-text-corpus-007
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: TextCorpus-contains-TextDocument-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 包含文本文档正例
          en: "Positive case: contains text document"
          ja: text documentを含む正例
        scenario_id: null
        descriptions:
          zh: corpus-policy-7@tc7 的 member manifest 列出 text-document-17@c7，文档的 corpus membership ref、语言范围与摘要均匹配该语料版本。
          en: corpus-policy-7@tc7's member manifest lists text-document-17@c7, whose corpus-membership reference, language scope, and digest all match that corpus version.
          ja: corpus-policy-7@tc7 manifest が text-document-17@c7 を列挙し membership ref、language scope、digest が一致します。
        field_values: {}
        related_node_ids:
          - TextCorpus
          - TextDocument
        related_relation_ids:
          - TextCorpus-contains-TextDocument
        expected_result:
          zh: 建立 corpus-policy-7 contains text-document-17，并把成员资格限定到摘要 c7。
          en: Assert corpus-policy-7 contains text-document-17 and scope membership to digest c7.
          ja: corpus-policy-7 contains text-document-17 を digest c7 に限定して確立します。
        why_valid_or_invalid:
          zh: 语料清单和文档内部成员引用双向一致，确保确切文本版本属于该集合快照。
          en: The corpus manifest and Document's internal membership reference agree in both directions, ensuring that the exact text version belongs to this collection snapshot.
          ja: corpus manifest と Document membership reference が一致し exact text version membership を保証します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-text-corpus-007
      - id: TextCorpus-contains-TextDocument-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 包含文本文档边界例
          en: "Boundary case: contains text document"
          ja: text documentを含む境界例
        scenario_id: null
        descriptions:
          zh: text-document-17@c8 沿用相同 document_id，但正文摘要已改变，且 corpus-policy-7@tc7 的清单仍固定 c7。
          en: text-document-17@c8 reuses the same Document ID but has changed content digest, while corpus-policy-7@tc7's manifest still fixes c7.
          ja: text-document-17@c8 は同じ Document ID でも content digest が変わり corpus manifest は c7 を固定します。
        field_values: {}
        related_node_ids:
          - TextCorpus
          - TextDocument
        related_relation_ids:
          - TextCorpus-contains-TextDocument
        expected_result:
          zh: 不得自动把 c8 文档版本加入 corpus-policy-7@tc7。
          en: Do not automatically add the c8 Document version to corpus-policy-7@tc7.
          ja: c8 Document version を corpus-policy-7@tc7 に自動追加しません。
        why_valid_or_invalid:
          zh: 语料成员资格是版本化事实；稳定 document_id 不能替代清单中明确的内容摘要。
          en: Corpus membership is a versioned fact; stable Document ID cannot replace the content digest explicitly fixed by the manifest.
          ja: corpus membership は versioned fact で stable Document ID は manifest digest を代替できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-text-corpus-007
    source_claims:
      - claim-text-corpus-007
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:TextDocument
