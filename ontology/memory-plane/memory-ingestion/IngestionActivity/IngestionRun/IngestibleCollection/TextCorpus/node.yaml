schema: moonweave.ai/ontology-node/v1
id: TextCorpus
kind: concept
labels:
  zh: 文本语料库
  en: Text corpus
  ja: テキストコーパス
semantics:
  short_definition:
    zh: 成员均为文本文档的可摄入集合特化。
    en: Ingestible collection specialization whose members are all text documents.
    ja: member がすべて text document の ingestible collection 特化。
  definition:
    zh: TextCorpus 是 IngestibleCollection 子类，corpus_id 与 member_manifest_digest 标识一批 TextDocument/文本 FileResource 成员，常用于 RAG corpus ingest；对应 LlamaIndex 目录文本加载批次；不是单个 TextDocument 或 embedding index。
    en: TextCorpus is an IngestibleCollection subtype identified by corpus_id and member_manifest_digest for a batch of TextDocument/text FileResource members, commonly used for RAG corpus ingest, mapping to LlamaIndex directory text load batches; not one TextDocument or embedding index.
    ja: TextCorpus は IngestibleCollection subtype。corpus_id/member_manifest_digest で TextDocument/text FileResource member batch を識別。RAG corpus ingest 常用。LlamaIndex directory text load batch に対応。単 TextDocument/embedding index ではない。
  why_needed:
    zh: 为纯文本批次 ingest 提供类型化集合，便于 policy 限定 media_type 与 loader 选择。
    en: Provides typed collection for pure-text batch ingest, enabling policy media_type limits and loader selection.
    ja: 純 text batch ingest 用 typed collection を提供し policy media_type 制限/loader 選択を容易化。
  includes:
    - zh: 纳入 Markdown/PDF 提取文本、wiki 导出与 chat transcript 批次。
      en: Includes Markdown/PDF-extracted text, wiki exports, and chat transcript batches.
      ja: Markdown/PDF 抽出 text/wiki export/chat transcript batch。
  excludes:
    - zh: 排除 GraphStore 批次、二进制-only 集合与向量 index。
      en: Excludes GraphStore batches, binary-only collections, and vector indexes.
      ja: GraphStore batch/binary-only collection/vector index を除外。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: SimpleDirectoryReader(required_exts=[".md",".txt"]) 产生 TextCorpus 成员；IngestionPolicy allowed_source_types 可限定 FileResource+text media；corpus ingest 停止在 Document handoff，不含 chunk/embed。
    en: SimpleDirectoryReader(required_exts=[".md",".txt"]) yields TextCorpus members; IngestionPolicy allowed_source_types may limit FileResource+text media; corpus ingest stops at Document handoff without chunk/embed.
    ja: SimpleDirectoryReader(required_exts=[".md",".txt"])→TextCorpus member。IngestionPolicy allowed_source_types で FileResource+text media 限定可。corpus ingest は Document handoff で停止（chunk/embed 不含）。
  typical_input:
    - description: Text-only directory load
      format: |
        SimpleDirectoryReader(input_dir="/corpus", required_exts=[".md", ".txt"])
      source_claims: [claim-text-corpus-llamaindex]
  typical_output:
    - description: Moonweave text corpus identity
      format: |
        {
          "corpus_id": "corpus-legal-2026",
          "member_manifest_digest": "sha256:corpus-legal-v1",
          "member_count": 128
        }
      source_claims: [claim-text-corpus-design]
  reference_implementations:
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: Text file extension filtering for corpus loads.
structure:
  identity_keys: [corpus_id]
  fields:
    - id: corpus_id
      labels: {zh: 语料库标识, en: Corpus identifier, ja: corpus 識別子}
      definitions:
        zh: 稳定标识文本语料库集合；等同 collection_id 语义。
        en: Stable identifier for text corpus collection; equivalent to collection_id semantics.
        ja: text corpus collection の安定識別子。collection_id 语义同等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: corpus-legal-2026
      allowed_values: []
      source_claims: [claim-text-corpus-id]
    - id: member_manifest_digest
      labels: {zh: 成员清单摘要, en: Member manifest digest, ja: member manifest digest}
      definitions:
        zh: 固定文本成员 file/document ID 集合与顺序。
        en: Fixes text member file/document ID set and order.
        ja: text member file/document ID set/order を固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:corpus-legal-v1
      allowed_values: []
      source_claims: [claim-text-corpus-manifest]
  constraints: []
  required_relations: []
examples:
  - id: TextCorpus-example-markdown-dir
    labels:
      zh: Markdown 目录语料
      en: Markdown directory corpus
      ja: Markdown directory corpus
    descriptions:
      zh: corpus-legal-2026 含 128 个 .md FileResource；ingest-run-20 consumes corpus 并 batch normalize 为 TextDocument 成员。
      en: corpus-legal-2026 contains 128 .md FileResources; ingest-run-20 consumes corpus and batch-normalizes to TextDocument members.
      ja: corpus-legal-2026 が 128 .md FileResource 包含。ingest-run-20 が corpus consume→TextDocument member へ batch normalize。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      version: required_exts
    field_values:
      corpus_id: corpus-legal-2026
      member_manifest_digest: sha256:corpus-legal-v1
      member_count: 128
    related_node_ids: [TextCorpus, TextDocument, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-text-corpus-llamaindex]
  - id: TextCorpus-example-policy-text-only
    labels:
      zh: 政策限定文本语料
      en: Policy-scoped text corpus
      ja: policy scoped text corpus
    descriptions:
      zh: ingest-policy@4 允许 FileResource+text/*；corpus-legal-2026 ingest 拒绝 corpus 中混入 application/pdf 二进制未提取成员。
      en: ingest-policy@4 allows FileResource+text/*; corpus-legal-2026 ingest rejects raw application/pdf binary members not yet extracted.
      ja: ingest-policy@4 が FileResource+text/* 許可。corpus-legal-2026 ingest が未抽出 application/pdf binary member を拒否。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: policy scope
    field_values:
      corpus_id: corpus-legal-2026
      policy_version: ingest-policy@4
    related_node_ids: [TextCorpus, IngestionPolicy]
    related_relation_ids: []
    source_claims: [claim-text-corpus-design]
  - id: TextCorpus-example-not-single-doc
    labels:
      zh: 语料非单文档
      en: Corpus is not single document
      ja: corpus は単 document ではない
    descriptions:
      zh: document-policy-v7 是单条规范化 Document；corpus-legal-2026 是 128 成员 manifest——批次身份与单文档身份不可互换。
      en: document-policy-v7 is one normalized Document; corpus-legal-2026 is a 128-member manifest—batch identity is not interchangeable with single-document identity.
      ja: document-policy-v7 は単 normalized Document。corpus-legal-2026 は 128 member manifest。batch identity/単 document identity 互换不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [TextCorpus, Document]
    related_relation_ids: []
    source_claims: [claim-text-corpus-design]
parent_relation:
  id: TextCorpus-is_a-IngestibleCollection
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入集合, en: is an ingestible collection, ja: 取込可能コレクションの一種}
  definitions:
    zh: TextCorpus 种差为成员均为文本来源文档/文件的批次集合。
    en: TextCorpus differentia is batch collection whose members are all text-source documents/files.
    ja: TextCorpus 種差は member がすべて text source document/file の batch collection。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-text-corpus-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-sdr
    title: SimpleDirectoryReader
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
    source_type: official-doc
    relevance: Text extension filtering for corpus loads.
  - id: src-text-corpus-design
    title: Moonweave text corpus boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Text batch collection specialization.
source_claims:
  - id: claim-text-corpus-llamaindex
    source: src-llamaindex-sdr
    supports: SimpleDirectoryReader with required_exts loads text file batches as corpus input.
    locator: required_exts
    evidence_kind: official
    confidence: high
  - id: claim-text-corpus-design
    source: src-text-corpus-design
    supports: TextCorpus is typed batch collection distinct from single documents.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-corpus-id
    source: src-text-corpus-design
    supports: corpus_id identifies text corpus collection lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-corpus-manifest
    source: src-text-corpus-design
    supports: member_manifest_digest binds text member set version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
