schema: moonweave.ai/ontology-node/v1
id: IngestionActivity
kind: concept
status: review
labels:
  zh: 摄入活动
  en: Ingestion activity
  ja: 取込activity
semantics:
  short_definition:
    zh: 把外部来源转换为可交接摄入信息的活动上位类。
    en: The activity genus transforming external sources into handoff-ready ingestion information.
    ja: 外部sourceをhandoff可能な取込情報へ変換するactivity上位類です。
  definition:
    zh: IngestionActivity 是有开始/结束边界、输入、输出和策略上下文的活动上位类，覆盖完整 IngestionRun 与内部 IngestionPhase；它不是来源实体、输出文档或政策。
    en: IngestionActivity is the activity genus with start/end boundaries, inputs, outputs, and policy context covering complete IngestionRun values and internal IngestionPhase values; it is not a source entity, output document, or policy.
    ja: IngestionActivity は開始/終了境界・入力・出力・policy contextを持ち完全 IngestionRun と内部 IngestionPhase を包含するactivity上位類で、source entity・output document・policyではありません。
  why_needed:
    zh: 为完整运行与运行内阶段提供共同活动根。
    en: Provides a common activity root for complete runs and within-run phases.
    ja: 完全runとrun内phaseに共通activity rootを提供します。
  includes:
    - zh: 纳入 IngestionRun、NormalizationActivity 与 DeduplicationActivity。
      en: Includes IngestionRun, NormalizationActivity, and DeduplicationActivity.
      ja: IngestionRun・NormalizationActivity・DeduplicationActivityを含みます。
  excludes:
    - zh: 排除 IngestibleResource、Document 与 IngestionPolicy。
      en: Excludes IngestibleResource, Document, and IngestionPolicy.
      ja: IngestibleResource・Document・IngestionPolicyを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - activity_id
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识摄入活动。
        en: Stable identifier for the ingestion activity.
        ja: 取込activityの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: ingestion-activity-17
      source_claims:
        - claim-ingestion-activity-002
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动时间边界起点。
        en: Records the start of the activity's temporal boundary.
        ja: activity時間境界の開始を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:00:00Z
      source_claims:
        - claim-ingestion-activity-003
    - id: status
      labels:
        zh: 状态
        en: status
        ja: 状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录运行中、完成或失败。
        en: Records running, completed, or failed state.
        ja: running・completed・failed状態を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-ingestion-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestionActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 摄入活动正例
      en: "Positive case: Ingestion activity"
      ja: 取込activity正例
    scenario_id: null
    descriptions:
      zh: ingestion-activity-17 记录 start/end、输入资源版本、执行配置、处理步骤、输出引用和状态变化，执行期间把外部内容推进到可处理信息状态。
      en: ingestion-activity-17 records start and end times, input-resource versions, execution configuration, processing steps, output references, and state changes while advancing external content to processable information.
      ja: ingestion-activity-17 は start/end、input resource version、configuration、steps、outputs、state changes を記録し content を processable information へ進めます。
    field_values:
      activity_id: ingestion-activity-17
      started_at: 2026-07-16T10:00:00Z
      status: completed
    related_node_ids:
      - IngestionActivity
    related_relation_ids: []
    expected_result:
      zh: 将该有持续时间且改变信息状态的执行表示为 IngestionActivity。
      en: Represent the durative execution that changes information state as IngestionActivity.
      ja: 当該 duration と information-state change を持つ execution を IngestionActivity とします。
    why_valid_or_invalid:
      zh: 时间边界、输入输出、执行配置与状态转移共同证明这是发生过的活动，而不是能力或结果。
      en: Temporal boundaries, inputs and outputs, execution configuration, and state transition jointly show an activity that occurred rather than a capability or result.
      ja: temporal boundary、inputs/outputs、configuration、state transition が capability/result でなく occurred activity を示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-activity-005
  - id: IngestionActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 摄入活动边界例
      en: "Boundary case: Ingestion activity"
      ja: 取込activity境界例
    scenario_id: null
    descriptions:
      zh: document-17 在活动完成后仍作为规范信息存在，只有 content digest、metadata 和 provenance，没有 start/end 或执行状态迁移。
      en: document-17 persists as normalized information after completion and has content digest, metadata, and provenance but no start and end times or execution-state transition.
      ja: document-17 は完了後も normalized information として存続し digest、metadata、provenance を持つが execution state transition を持ちません。
    field_values: {}
    related_node_ids:
      - IngestionActivity
    related_relation_ids: []
    expected_result:
      zh: 把 document-17 保持为信息产物，不把它归入 IngestionActivity。
      en: Keep document-17 as an information product and exclude it from IngestionActivity.
      ja: document-17 は information product とし IngestionActivity から除外します。
    why_valid_or_invalid:
      zh: 活动与产物的持续时间、身份键和变更规则不同；产物由活动生成并不继承活动类型。
      en: Activity and product have different duration, identity keys, and change rules; a product generated by an activity does not inherit the activity type.
      ja: activity と product は duration、identity key、change rule が異なり生成関係は activity type 継承を意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-activity-006
external_mappings: []
