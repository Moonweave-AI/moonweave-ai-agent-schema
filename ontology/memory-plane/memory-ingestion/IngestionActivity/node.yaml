schema: moonweave.ai/ontology-node/v1
id: IngestionActivity
kind: concept
status: accepted
labels:
  zh: 摄入活动
  en: Ingestion Activity
  ja: 取り込みアクティビティ
semantics:
  short_definition:
    zh: 在时间范围内使用版本化来源并产生或记录摄入信息的可审计处理活动。
    en: An auditable processing activity that uses versioned sources and produces or records ingestion information over a time interval.
    ja: 時間区間にわたり版管理された source を使用し、ingestion information を生成または記録する監査可能な processing activity。
  definition:
    zh: >-
      IngestionActivity 是摄入流程中实际发生的处理活动上位类。它以 activity_id、started_at、status 和输入资源引用标识，
      可在结束时记录 ended_at、输出信息引用和策略引用。它包括完整 IngestionRun 及其内部 IngestionPhase，
      但不是 IngestibleResource、Document、Chunk、MemoryRecord、DocumentLoader、IngestionPolicy、检索候选、提示上下文或静态流程定义。
      活动在其生命周期内使用来源实体并生成或改变独立的信息实体；这些输入和输出不能反过来成为活动本身。
    en: >-
      An IngestionActivity is the genus for a processing activity that actually occurs in an ingestion flow. It is
      identified by activity_id, started_at, status, and input resource references and can record ended_at, output
      information references, and a policy reference when it finishes. It includes a complete IngestionRun and its internal
      IngestionPhase, but it is not an IngestibleResource, Document, Chunk, MemoryRecord, DocumentLoader, IngestionPolicy,
      retrieval candidate, prompt context, or static workflow definition. During its lifetime an activity uses source
      entities and generates or changes separate information entities; those inputs and outputs cannot become the activity.
    ja: >-
      IngestionActivity は ingestion flow で実際に発生する processing activity の上位類です。activity_id、started_at、status、
      input resource reference で識別され、終了時に ended_at、output information reference、policy reference を記録できます。
      完全な IngestionRun と内部の IngestionPhase を含みますが、IngestibleResource、Document、Chunk、MemoryRecord、DocumentLoader、
      IngestionPolicy、retrieval candidate、prompt context、静的 workflow definition ではありません。activity は存続期間中に source
      entity を使用し、独立した information entity を生成または変更します。これらの input と output は activity 自体にはなりません。
  why_needed:
    zh: 明确活动、来源、输出和策略的不同身份，可使摄入过程重放、审计和失败恢复，而不会将运行状态写入内容工件。
    en: Distinguishing activity, source, output, and policy identity makes ingestion replayable, auditable, and recoverable without writing run state into content artifacts.
    ja: activity、source、output、policy の identity を区別することで、run state を content artifact に書き込まずに ingestion を再生、監査、回復できます。
  includes:
    - zh: 使用一个版本化目录资源、执行加载和规范化并生成一个或多个 Document 的完整运行。
      en: A complete run that uses one versioned directory resource, performs loading and normalization, and generates one or more Documents.
      ja: 一つの版管理された directory resource を使用し、loading と normalization を実行して一つ以上の Document を生成する完全な run。
  excludes:
    - zh: 摄入前的来源文件、摄入后存续的 Document、加载器代码、用于选择行为的策略和最终提示上下文。
      en: A pre-ingestion source file, a Document persisting after ingestion, loader code, a policy that selects behavior, or final prompt context.
      ja: ingestion 前の source file、ingestion 後も存続する Document、loader code、behavior を選択する policy、最終 prompt context。
  semantic_kind: activity
  aliases:
    - ingestion process execution
    - source-to-information activity
engineering:
  explanation:
    zh: >-
      摄入编排器创建带有稳定 activity_id 和开始时间的运行记录，解析受版本固定的 IngestibleResource，
      调用兼容加载器，并在独立的输出引用上登记生成的 Document 或其他 IngestibleInformation。
      它在状态变为 completed、failed 或 cancelled 时写入结束时间和结果摘要，并将输入版本、策略版本和错误事件与该活动关联；
      来源本身、加载器配置和生成文档各自仍保持自己的身份和生命周期。
    en: >-
      An ingestion orchestrator creates a run record with stable activity_id and start time, resolves version-pinned
      IngestibleResources, invokes a compatible loader, and registers generated Documents or other IngestibleInformation on
      separate output references. When status becomes completed, failed, or cancelled it writes an end time and result
      summary and associates input versions, policy version, and error events with the activity. The source itself, loader
      configuration, and generated document each retain their own identity and lifecycle.
    ja: >-
      ingestion orchestrator は stable activity_id と start time を持つ run record を作成し、version-pinned の
      IngestibleResource を解決し、互換 loader を呼び出し、生成された Document または他の IngestibleInformation を別の output
      reference に登録します。status が completed、failed、cancelled になった時に end time と result summary を書き、input version、
      policy version、error event を activity に関連付けます。source 自体、loader configuration、generated document はそれぞれ独自の
      identity と lifecycle を維持します。
  typical_input:
    - description: Started ingestion activity descriptor
      format: |
        {
          "activity_id": "ingest-policy-directory-42",
          "started_at": "2026-07-18T09:00:00Z",
          "status": "running",
          "input_resource_refs": ["dir-policy-2026-07"],
          "ingestion_policy_ref": "policy-standard-v3"
        }
  typical_output:
    - description: Completed activity observation
      format: |
        {
          "activity_id": "ingest-policy-directory-42",
          "ended_at": "2026-07-18T09:01:14Z",
          "status": "completed",
          "output_information_refs": ["document-policy-17", "document-terms-3"],
          "ingestion_run_ref": "ingest-policy-directory-42"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that read many external sources into Document objects through a common interface.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines activities with start and end times that use entities and generate entities.
structure:
  identity_keys:
    - activity_id
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: アクティビティ ID
      definitions:
        zh: 稳定标识一个实际发生的摄入处理活动，而不是其来源、加载器、输出文档或策略。
        en: Stably identifies one ingestion processing activity that actually occurred rather than its source, loader, output document, or policy.
        ja: source、loader、output document、policy ではなく、実際に発生した一つの ingestion processing activity を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingest-policy-directory-42
      source_claims:
        - claim-ingestion-activity-identity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录活动开始执行的时间点，用于界定输入使用和运行期状态。
        en: Records the point when the activity began execution to bound input usage and run-time state.
        ja: input usage と run-time state を境界付けるため、activity が実行を開始した時点を記録します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:00:00Z"
      source_claims:
        - claim-ingestion-activity-temporal
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      definitions:
        zh: 可选记录活动完成、失败或取消的时间点；运行中的活动尚未拥有此边界。
        en: Optionally records when the activity completed, failed, or was cancelled; a running activity does not yet have this boundary.
        ja: activity が completed、failed、cancelled になった時点を任意で記録します。running activity はまだこの boundary を持ちません。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:01:14Z"
      source_claims:
        - claim-ingestion-activity-temporal
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: アクティビティ状態
      definitions:
        zh: 声明运行中的生命周期状态，不把状态值写入来源资源或生成信息的身份。
        en: Declares lifecycle state of the run without writing status values into identity of the source resource or generated information.
        ja: source resource や generated information の identity に status value を書き込まず、run の lifecycle state を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - running
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-ingestion-activity-temporal
    - id: input_resource_refs
      labels:
        zh: 输入资源引用
        en: input resource references
        ja: 入力リソース参照
      definitions:
        zh: 引用本活动实际使用的版本化 IngestibleResource；它不等同于加载器配置或最终输出。
        en: References versioned IngestibleResources actually used by this activity; it is not equivalent to loader configuration or final output.
        ja: この activity が実際に使用した versioned IngestibleResource を参照し、loader configuration や最終 output と同一ではありません。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - dir-policy-2026-07
      source_claims:
        - claim-ingestion-activity-usage
    - id: output_information_refs
      labels:
        zh: 输出信息引用
        en: output information references
        ja: 出力情報参照
      definitions:
        zh: 可选引用本活动生成或更新的 Document、Chunk 或其他 IngestibleInformation，而不将这些输出当作活动本身。
        en: Optionally references Documents, Chunks, or other IngestibleInformation generated or updated by this activity without treating those outputs as the activity itself.
        ja: output 自体を activity とみなさず、この activity が生成または更新した Document、Chunk、その他の IngestibleInformation を任意で参照します。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - document-policy-17
      source_claims:
        - claim-ingestion-activity-generation
    - id: ingestion_policy_ref
      labels:
        zh: 摄入策略引用
        en: ingestion policy reference
        ja: 取り込みポリシー参照
      definitions:
        zh: 可选引用指导该活动选择加载、规范化或去重行为的 IngestionPolicy，而不是把策略规则复制为活动状态。
        en: Optionally references the IngestionPolicy guiding loader, normalization, or deduplication choices without copying policy rules into activity state.
        ja: policy rule を activity state に複写せず、loader、normalization、deduplication の選択を導く IngestionPolicy を任意で参照します。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: policy-standard-v3
      source_claims:
        - claim-ingestion-activity-policy
  constraints:
    - id: ingestion-activity-lifecycle-contract
      severity: error
      expression_language: plain
      expression: >-
        activity_id, started_at, status, and at least one input_resource_refs value are required. status must be running,
        completed, failed, or cancelled. ended_at is absent while status is running and is required when status is completed,
        failed, or cancelled. A completed activity must reference at least one output_information_refs value. Sources,
        loader implementations, policies, output Documents, Chunks, retrieval candidates, and prompt context cannot replace
        activity identity.
      explanation:
        zh: 活动需要可观察的时间边界和实际输入使用；终态必须闭合生命周期，而来源、规则和产物仍是独立可审计对象。
        en: An activity needs observable time boundaries and actual input usage; a terminal state must close its lifecycle while sources, rules, and products remain separately auditable objects.
        ja: activity には観測可能な time boundary と実際の input usage が必要です。terminal state は lifecycle を閉じなければなりませんが、source、rule、product は別個に監査可能な object として残ります。
      source_claims:
        - claim-ingestion-activity-temporal
        - claim-ingestion-activity-usage
        - claim-ingestion-activity-generation
        - claim-ingestion-activity-boundary
  required_relations: []
examples:
  - id: ingestion-activity-positive

    labels:
      zh: 完成的目录摄入运行
      en: Completed directory ingestion run
      ja: 完了したディレクトリ取り込み run

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      activity_id: ingest-policy-directory-42
      started_at: "2026-07-18T09:00:00Z"
      ended_at: "2026-07-18T09:01:14Z"
      status: completed
      input_resource_refs:
        - dir-policy-2026-07
      output_information_refs:
        - document-policy-17
        - document-terms-3
      ingestion_policy_ref: policy-standard-v3
    related_node_ids:
      - IngestionActivity
      - IngestibleResource
      - Document
      - IngestionPolicy
    related_relation_ids:
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-ingestion-activity-usage
      - claim-ingestion-activity-generation
  - id: ingestion-activity-counterexample

    labels:
      zh: 生成的文档不是摄入活动
      en: Generated document is not an ingestion activity
      ja: 生成されたドキュメントは取り込みアクティビティではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      document_id: document-policy-17
      content_digest: sha256:document-policy-17
      generated_by_activity_ref: ingest-policy-directory-42
      activity_id: absent
      started_at: absent
      status: absent
    related_node_ids:
      - IngestionActivity
      - Document
    related_relation_ids: []

    source_claims:
      - claim-ingestion-activity-boundary
  - id: ingestion-activity-boundary

    labels:
      zh: 尚在运行的文件摄入
      en: File ingestion still running
      ja: 実行中のファイル取り込み

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      activity_id: ingest-policy-file-43
      started_at: "2026-07-18T09:05:00Z"
      status: running
      input_resource_refs:
        - file-policy-pdf-v7
      output_information_refs: []
    related_node_ids:
      - IngestionActivity
      - IngestibleResource
    related_relation_ids:
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-ingestion-activity-temporal
      - claim-ingestion-activity-usage
  - id: ingestion-activity-instance

    labels:
      zh: 实例：失败后的可恢复摄入
      en: "Instance: recoverable ingestion after failure"
      ja: "事例：失敗後に回復可能な取り込み"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      activity_id: ingest-database-policy-44
      started_at: "2026-07-18T09:10:00Z"
      ended_at: "2026-07-18T09:10:12Z"
      status: failed
      input_resource_refs:
        - table-policy-rules
      output_information_refs: []
      ingestion_policy_ref: policy-standard-v3
    related_node_ids:
      - IngestionActivity
      - DatabaseTable
      - IngestionRun
      - ObservabilityEvent
    related_relation_ids:
      - IngestionRun-reads-IngestibleResource

    source_claims:
      - claim-ingestion-activity-temporal
      - claim-ingestion-activity-boundary
parent_relation: null
relations: []
sources:
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines activities with start and end times that use entities and generate entities.
  - id: langchain-document-loaders
    title: LangChain document loaders
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents loaders for reading varied external sources into Document objects.
source_claims:
  - id: claim-ingestion-activity-identity
    source: w3c-prov-o
    supports: >-
      PROV-O defines an Activity as something that occurs over a period of time and acts upon or with entities. Moonweave
      assigns activity_id to one ingestion execution separately from the source entities and output entities it uses or generates.
    locator: PROV-O section 3.1 starting point terms for Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-activity-temporal
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities start and end at particular points in time using startedAtTime and endedAtTime. Moonweave
      records started_at and terminal ended_at separately from status so running work is not presented as completed.
    locator: PROV-O section 3.1 on activity start and end times
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-activity-usage
    source: w3c-prov-o
    supports: >-
      PROV-O states that an activity can use entities during its lifetime. Moonweave records the versioned
      IngestibleResource references actually used by an ingestion activity rather than treating source identity as activity state.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-activity-generation
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities can generate entities through wasGeneratedBy. Moonweave records Documents and other
      IngestibleInformation as output references separate from the activity that generated or updated them.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-activity-policy
    source: w3c-prov-o
    supports: >-
      PROV-O provides a qualified association pattern including prov hadPlan. Moonweave records a policy reference as a
      separate influence on an ingestion activity rather than embedding policy rules in the activity's identity.
    locator: PROV-O qualified association terms including prov hadPlan
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-activity-loader
    source: langchain-document-loaders
    supports: >-
      LangChain documents loaders for reading many external source types into Document objects. Moonweave models invocation
      of a compatible loader as part of an IngestionActivity while keeping loader implementation and produced Document distinct.
    locator: LangChain document loader integrations and common loading interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-activity-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes entities from activities that use or generate them. Moonweave keeps source resource, activity,
      policy, generated document, retrieval candidate, and prompt context at separate provenance boundaries.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
