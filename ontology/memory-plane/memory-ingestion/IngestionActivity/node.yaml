schema: moonweave.ai/ontology-node/v1
id: IngestionActivity
kind: concept
labels:
  zh: 摄入活动
  en: Ingestion activity
  ja: 取込アクティビティ
semantics:
  short_definition:
    zh: 把外部来源转换为可交接文档信息的可观察活动根类。
    en: Root observable activity class transforming external sources into handoff-ready document information.
    ja: 外部 source を handoff 可能 document information へ変換する observable activity root class。
  definition:
    zh: IngestionActivity 是具有 activity_id、时间边界、输入输出与 policy 上下文的活动根类；IngestionRun 表示完整运行，IngestionPhase 表示可组合阶段（NormalizationActivity、DeduplicationActivity）。对应 LlamaIndex IngestionPipeline.run() 与 LangChain document loading pipeline 的可审计运行；不是 IngestibleResource、Document 或 IngestionPolicy。
    en: IngestionActivity is the activity root with activity_id, temporal boundaries, inputs/outputs, and policy context; IngestionRun is a complete run and IngestionPhase covers composable stages (NormalizationActivity, DeduplicationActivity). Maps to auditable runs of LlamaIndex IngestionPipeline.run() and LangChain document loading pipelines; not IngestibleResource, Document, or IngestionPolicy.
    ja: IngestionActivity は activity_id/時間境界/input/output/policy context を持つ activity root。IngestionRun=complete run、IngestionPhase=composable stage（NormalizationActivity/DeduplicationActivity）。LlamaIndex IngestionPipeline.run()/LangChain document loading pipeline の監査可能 run に対応。IngestibleResource/Document/IngestionPolicy ではない。
  why_needed:
    zh: 活动层与产物层分离后，可追踪 pipeline 各阶段而不把 LangChain Document 或 LlamaIndex TextNode 误判为活动。
    en: Separating activity from artifact layers traces pipeline stages without misclassifying LangChain Document or LlamaIndex TextNode as activities.
    ja: activity/artifact 層分離で pipeline 各 stage を追跡。LangChain Document/LlamaIndex TextNode を activity と誤認しない。
  includes:
    - zh: 纳入 IngestionRun、NormalizationActivity 与 DeduplicationActivity。
      en: Includes IngestionRun, NormalizationActivity, and DeduplicationActivity.
      ja: IngestionRun・NormalizationActivity・DeduplicationActivity。
  excludes:
    - zh: 排除 IngestibleResource、Document、DeduplicationDecision 与 IngestionPolicy。
      en: Excludes IngestibleResource, Document, DeduplicationDecision, and IngestionPolicy.
      ja: IngestibleResource・Document・DeduplicationDecision・IngestionPolicy を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex IngestionPipeline.run(documents=...) 编排 transformations、dedup/upsert；LangChain 以 loader→transform 链构成 pipeline；Moonweave 把每次 run/phase 建模为 IngestionActivity 子类，产物 Document 与 DeduplicationDecision 另行记录。
    en: LlamaIndex IngestionPipeline.run(documents=...) orchestrates transformations and dedup/upsert; LangChain chains loader→transform pipelines; Moonweave models each run/phase as IngestionActivity subtypes with Document and DeduplicationDecision as separate artifacts.
    ja: LlamaIndex IngestionPipeline.run が transformations/dedup-upsert を orchestrate。LangChain は loader→transform chain。Moonweave は各 run/phase を IngestionActivity subtype、Document/DeduplicationDecision は別 artifact。
  typical_input:
    - description: LlamaIndex IngestionPipeline run invocation
      format: |
        nodes = pipeline.run(documents=loaded_documents, show_progress=True)
      source_claims: [claim-ingestion-activity-llamaindex]
    - description: LangChain document loading pipeline
      format: |
        docs = loader.load()
        normalized = transform_chain.invoke(docs)
      source_claims: [claim-ingestion-activity-langchain]
  typical_output:
    - description: Moonweave ingestion activity record
      format: |
        {
          "activity_id": "ingest-run-17",
          "started_at": "2026-07-16T10:00:00Z",
          "activity_kind": "IngestionRun"
        }
      source_claims: [claim-ingestion-activity-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: End-to-end ingestion with transformations and dedup.
    - name: LangChain Document Loaders
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: Loader-based document ingestion pipelines.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: Activity identifier, ja: activity 識別子}
      definitions:
        zh: 稳定标识一次摄入活动或阶段运行。
        en: Stable identifier for one ingestion activity or phase run.
        ja: 一 ingestion activity/phase run を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ingestion-activity-17
      allowed_values: []
      source_claims: [claim-ingestion-activity-id]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions:
        zh: 活动可观察时间边界起点（UTC）。
        en: Observable activity temporal boundary start (UTC).
        ja: activity observable 時間境界起点（UTC）。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T10:00:00Z
      allowed_values: []
      source_claims: [claim-ingestion-activity-started]
  constraints: []
  required_relations: []
examples:
  - id: IngestionActivity-example-llamaindex-pipeline
    labels:
      zh: LlamaIndex 接入流水线
      en: LlamaIndex ingestion pipeline
      ja: LlamaIndex 取込 pipeline
    descriptions:
      zh: IngestionPipeline.run 对 loaded_documents 应用 SentenceSplitter 与 embedding，内部含 dedup/upsert；Moonweave 建模 activity_id=ingest-run-17 完整 IngestionRun 与 normalize/dedup 两 IngestionPhase。
      en: IngestionPipeline.run applies SentenceSplitter and embedding to loaded_documents with internal dedup/upsert; Moonweave models activity_id=ingest-run-17 as complete IngestionRun with normalize/dedup IngestionPhases.
      ja: IngestionPipeline.run が loaded_documents に SentenceSplitter/embedding（内部 dedup/upsert）。Moonweave は activity_id=ingest-run-17 を IngestionRun、normalize/dedup を IngestionPhase として建模。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: IngestionPipeline.run
    field_values:
      activity_id: ingest-run-17
      started_at: 2026-07-16T10:00:00Z
    related_node_ids: [IngestionActivity, IngestionRun, IngestionPhase]
    related_relation_ids: []
    source_claims: [claim-ingestion-activity-llamaindex]
  - id: IngestionActivity-example-langchain-loader-chain
    labels:
      zh: LangChain 加载链
      en: LangChain loader chain
      ja: LangChain loader chain
    descriptions:
      zh: PyPDFLoader.load()→transform 构成 ingest 活动链；activity_id 标识运行，返回的 Document 列表是产物而非活动本身。
      en: PyPDFLoader.load()→transform forms an ingest activity chain; activity_id identifies the run while returned Document list is artifact, not the activity.
      ja: PyPDFLoader.load()→transform が ingest activity chain。activity_id が run 識別、返却 Document 列表は artifact で activity 自体ではない。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/how_to/document_loader/
      version: BaseLoader
    field_values:
      loader: PyPDFLoader
      activity_id: ingest-run-18
    related_node_ids: [IngestionActivity, DocumentLoader, Document]
    related_relation_ids: []
    source_claims: [claim-ingestion-activity-langchain]
  - id: IngestionActivity-example-not-document
    labels:
      zh: 活动非文档
      en: Activity is not document
      ja: activity は document ではない
    descriptions:
      zh: document-policy-v7 持久存在且无 started_at/ended_at；ingest-run-17 有完整时间边界与阶段轨迹——产物不得继承活动类型。
      en: document-policy-v7 persists without started_at/ended_at; ingest-run-17 has complete temporal boundaries and phase trace—artifacts must not inherit activity type.
      ja: document-policy-v7 は started_at/ended_at なしで存続。ingest-run-17 は完全時間境界/phase trace。artifact は activity type 継承不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestionActivity, Document]
    related_relation_ids: []
    source_claims: [claim-ingestion-activity-design]
parent_relation: null
relations: []
sources:
  - id: src-llamaindex-pipeline
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: IngestionPipeline.run orchestration.
  - id: src-langchain-loaders
    title: LangChain Document Loaders
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: Loader pipeline activity boundary.
  - id: src-ingestion-activity-design
    title: Moonweave ingestion activity boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Activity versus artifact separation.
source_claims:
  - id: claim-ingestion-activity-llamaindex
    source: src-llamaindex-pipeline
    supports: IngestionPipeline.run executes ordered ingestion transformations in one auditable run.
    locator: Ingestion pipeline guide
    evidence_kind: official
    confidence: high
  - id: claim-ingestion-activity-langchain
    source: src-langchain-loaders
    supports: LangChain loaders and transforms form executable ingestion activity chains.
    locator: Document loaders
    evidence_kind: official
    confidence: high
  - id: claim-ingestion-activity-design
    source: src-ingestion-activity-design
    supports: Ingestion activities are distinct from output documents and decisions.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-activity-id
    source: src-ingestion-activity-design
    supports: activity_id identifies ingestion runs and phases.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-activity-started
    source: src-ingestion-activity-design
    supports: started_at records observable activity temporal boundary.
    locator: structure
    evidence_kind: design-inference
    confidence: high
