sources:
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines activities with time boundaries that use and generate entities and can form provenance chains.
  - id: langchain-document-loaders
    title: LangChain document loaders
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents loading varied external sources into Document objects for downstream processing.
source_claims:
  - id: claim-ingestion-phase-activity
    source: w3c-prov-o
    supports: >-
      PROV-O defines an Activity as something that occurs over a period of time and acts upon or with entities. Moonweave
      models an ingestion phase as one local activity rather than as a static process definition or output entity.
    locator: PROV-O section 3.1 starting point terms for Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-phase-temporal
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities start and end at particular points in time. Moonweave records phase-local start and
      terminal end times separately so a running phase is not represented as a completed step.
    locator: PROV-O section 3.1 on activity start and end times
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-phase-usage
    source: w3c-prov-o
    supports: >-
      PROV-O states that an activity can use entities during its lifetime. Moonweave records the local information
      representations actually transformed by a phase rather than assigning every run input to every phase.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-phase-parent-usage
    source: w3c-prov-o
    supports: PROV-O describes activities using entities during their lifetime. Moonweave retains the owning IngestionActivity's versioned source-resource references on an IngestionPhase while separately recording the local information representations transformed by that phase.
    locator: PROV-O section 3.1 on prov:used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-phase-generation
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities can generate entities. Moonweave records a phase's output information separately from
      the phase and can hand that output to the next phase as a new input reference.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestion-phase-identity
    source: w3c-prov-o
    supports: >-
      PROV-O supports independently identifiable activities and entities. Moonweave uses phase ID and owning run reference
      to distinguish one local processing activity from the complete run and its outputs.
    locator: PROV-O Entity and Activity
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-phase-order
    source: w3c-prov-o
    supports: >-
      PROV-O supports provenance chains among activities and entities but does not prescribe an ingestion-step ordinal.
      Moonweave records a positive sequence number unique within one run as a local orchestration inference so phase handoff
      can be replayed without treating the ordinal as a global timestamp or retry count.
    locator: PROV-O Activity relations and provenance chains
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-phase-run-membership
    source: w3c-prov-o
    supports: >-
      PROV-O supports provenance chains among activities and entities. Moonweave models a run-local phase as a composition
      member of one IngestionRun using owning-run reference and sequence as a local orchestration inference.
    locator: PROV-O Activity relations and provenance chains
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-phase-responsibility
    source: langchain-document-loaders
    supports: >-
      LangChain documents loaders that read external source data into Document objects. Moonweave uses named local phase
      responsibilities such as load and normalize to make each transformation step inspectable without treating a loader as the phase itself.
    locator: LangChain document loader integrations and source-to-Document processing
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-phase-specialization
    source: w3c-prov-o
    supports: >-
      Modeling a run-local ordered activity as an IngestionPhase specialization of IngestionActivity is a Moonweave taxonomy
      inference grounded in PROV-O's distinction between activities and the entities they use or generate.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestion-phase-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes activities from entities and supports chains of provenance. Moonweave keeps complete run, local
      phase, workflow template, source resource, output document, loader, policy, and retrieval context as separate facts.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
