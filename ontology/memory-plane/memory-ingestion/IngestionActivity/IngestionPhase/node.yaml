schema: moonweave.ai/ontology-node/v1
id: IngestionPhase
kind: concept
status: review
labels:
  zh: 摄入阶段
  en: Ingestion phase
  ja: 取込phase
semantics:
  short_definition:
    zh: 一次 IngestionRun 内具有顺序和局部输入输出的活动。
    en: An activity within an IngestionRun with sequence and local input/output.
    ja: 一 IngestionRun 内で順序とlocal入出力を持つactivityです。
  definition:
    zh: IngestionPhase 是 IngestionRun 中可单独审计的局部 IngestionActivity，拥有 phase_id、所属 run 与顺序号并只负责一个转换职责；它不是完整运行或输出文档。
    en: IngestionPhase is a separately auditable local IngestionActivity within an IngestionRun, owning phase_id, run membership, and sequence while carrying one transformation responsibility; it is not the complete run or output document.
    ja: IngestionPhase は IngestionRun 内で個別監査でき phase_id・run所属・順序を持ち一変換責務だけを担うlocal IngestionActivityで、完全runやoutput documentではありません。
  why_needed:
    zh: 显式补上运行与规范化/去重活动之间的阶段层。
    en: Explicitly adds the phase layer between a run and normalization/deduplication activities.
    ja: runとnormalization/deduplication activityの間にphase階層を明示追加します。
  includes:
    - zh: 纳入规范化、去重等有局部输入输出的阶段。
      en: Includes normalization, deduplication, and other phases with local inputs/outputs.
      ja: normalization・deduplication等local入出力を持つphaseを含みます。
  excludes:
    - zh: 排除完整 IngestionRun、触发事件和产出信息。
      en: Excludes complete IngestionRun, trigger events, and produced information.
      ja: 完全IngestionRun・trigger event・生成informationを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: phase ID
        ja: phase ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识局部阶段。
        en: Stable identifier for the local phase.
        ja: local phaseの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: phase-17-01
      source_claims:
        - claim-ingestion-phase-002
    - id: ingestion_run_id
      labels:
        zh: 所属运行
        en: ingestion run ID
        ja: 所属run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录阶段所属完整运行。
        en: Records the complete run containing this phase.
        ja: phaseを含む完全runを記録します。
      allowed_values: []
      pattern: null
      example_value: ingest-run-17
      source_claims:
        - claim-ingestion-phase-003
    - id: sequence
      labels:
        zh: 顺序号
        en: sequence
        ja: 順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录运行内执行顺序。
        en: Records execution order within the run.
        ja: run内実行順序を記録します。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-ingestion-phase-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestionPhase-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 摄入阶段正例
      en: "Positive case: Ingestion phase"
      ja: 取込phase正例
    scenario_id: null
    descriptions:
      zh: phase-17-01 以 ingest-run-17、phase_id=normalize、sequence=1、局部 start/end、输入 info-17 与输出 document-17 识别。
      en: phase-17-01 is identified by ingest-run-17, phase ID normalize, sequence 1, local start and end times, input info-17, and output document-17.
      ja: phase-17-01 は ingest-run-17、phase ID、sequence 1、local start/end、input info-17、output document-17 で識別されます。
    field_values:
      phase_id: phase-17-01
      ingestion_run_id: ingest-run-17
      sequence: 1
      activity_id: phase-17-01
      started_at: 2026-07-16T10:01:00Z
      status: completed
    related_node_ids:
      - IngestionPhase
    related_relation_ids: []
    expected_result:
      zh: 将该运行内部的局部处理单元表示为 IngestionPhase，并保留完整 run 归属。
      en: Represent the run-local processing unit as IngestionPhase while retaining its complete-run membership.
      ja: 当該 run-local processing unit を IngestionPhase とし complete-run membership を保持します。
    why_valid_or_invalid:
      zh: 阶段拥有运行内唯一序号、局部时间和局部输入输出，但不覆盖读取到交接的全部执行范围。
      en: The phase has a run-unique sequence, local time, and local inputs and outputs but does not cover the full execution from reading through handoff.
      ja: phase は run-unique sequence、local time、local input/output を持つが reading-to-handoff 全範囲を覆いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-phase-005
  - id: IngestionPhase-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 摄入阶段边界例
      en: "Boundary case: Ingestion phase"
      ja: 取込phase境界例
    scenario_id: null
    descriptions:
      zh: ingest-run-17 包含加载、规范化、去重与最终交接的整体时间和状态；它不是其中 sequence=1 的单一阶段。
      en: ingest-run-17 spans loading, normalization, deduplication, and final handoff with overall time and state and is not the single phase at sequence 1.
      ja: ingest-run-17 は loading、normalization、deduplication、handoff 全体を覆い sequence=1 の単一 phase ではありません。
    field_values: {}
    related_node_ids:
      - IngestionPhase
    related_relation_ids: []
    expected_result:
      zh: 把 ingest-run-17 保持为 IngestionRun，而不是 IngestionPhase。
      en: Keep ingest-run-17 as IngestionRun rather than IngestionPhase.
      ja: ingest-run-17 は IngestionRun とし IngestionPhase にしません。
    why_valid_or_invalid:
      zh: 完整运行编排多个阶段并拥有端到端结果；阶段只在该运行内拥有局部责任和顺序。
      en: A complete run orchestrates several phases and owns end-to-end outcomes, while a phase has only local responsibility and order inside that run.
      ja: complete run は複数 phase を編成し end-to-end outcome を持ち phase は local responsibility・order だけを持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestion-phase-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: IngestionRun
    shared_parent_concept_id: IngestionActivity
    differentia:
      zh: 正向身份比较：父节点 IngestionActivity：IngestionPhase（semantic kind=activity，骨架 IngestionPhase-is_a-IngestionActivity）；IngestionRun（semantic kind=activity，骨架 IngestionRun-is_a-IngestionActivity）。双端条件：IngestionPhase 条件：“一次 IngestionRun 内具有顺序和局部输入输出的活动”；IngestionRun 条件：“按一份政策协调来源读取与有序阶段的完整摄入活动”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent IngestionActivity: IngestionPhase (semantic kind=activity, backbone IngestionPhase-is_a-IngestionActivity); IngestionRun (semantic kind=activity, backbone IngestionRun-is_a-IngestionActivity). Endpoint conditions: IngestionPhase condition: “An activity within an IngestionRun with sequence and local input/output”; IngestionRun condition: “A complete ingestion activity coordinating source reading and ordered phases under one policy”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 IngestionActivity：IngestionPhase（semantic kind=activity、バックボーン IngestionPhase-is_a-IngestionActivity）；IngestionRun（semantic kind=activity、バックボーン IngestionRun-is_a-IngestionActivity）。両端条件：IngestionPhase の条件：「一 IngestionRun 内で順序とlocal入出力を持つactivityです」；IngestionRun の条件：「一policy下でsource読込と順序phaseを調整する完全取込activityです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-ingestion-phase-007
parent_relation:
  id: IngestionPhase-is_a-IngestionActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: IngestionPhase 是 IngestionActivity 的严格子类；种差为：属于一个 IngestionRun、具有顺序号并只负责一个局部转换。
    en: "IngestionPhase is a strict subtype of IngestionActivity; its reviewed differentia is: it belongs to one IngestionRun, has a sequence number, and owns one local transformation responsibility."
    ja: IngestionPhase は IngestionActivity の厳密なsubtypeで、審査済み種差は「一 IngestionRun に属しsequence番号を持ち一local変換責務だけを担います。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IngestionPhase-is_a-IngestionActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestionActivity and also satisfies the differentia: it belongs to one IngestionRun, has a sequence number, and owns one local transformation responsibility."
      explanations:
        zh: 仅当对象首先满足 IngestionActivity 定义且满足种差“属于一个 IngestionRun、具有顺序号并只负责一个局部转换。”时成立。
        en: "Assert only when the object first satisfies IngestionActivity and also satisfies the differentia: it belongs to one IngestionRun, has a sequence number, and owns one local transformation responsibility."
        ja: 対象がまず IngestionActivity を満たし、さらに種差「一 IngestionRun に属しsequence番号を持ち一local変換責務だけを担います。」を満たす時だけ成立します。
      source_claims:
        - claim-ingestion-phase-008
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IngestionPhase-is_a-IngestionActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: phase-17-01 具有独立 start/end、输入 info-17、输出 document-17 与状态变化，并由 run_id 和 sequence=1 限定为 ingest-run-17 内的局部活动。
        en: phase-17-01 has independent start and end times, input info-17, output document-17, and a state change and is scoped as a local activity in ingest-run-17 by run ID and sequence 1.
        ja: phase-17-01 は start/end、input、output、state change を持ち run ID・sequence で local activity に限定されます。
      field_values: {}
      related_node_ids:
        - IngestionPhase
        - IngestionActivity
      related_relation_ids:
        - IngestionPhase-is_a-IngestionActivity
      expected_result:
        zh: 确认 phase-17-01 是 IngestionActivity 的 IngestionPhase 特化。
        en: Confirm phase-17-01 as an IngestionPhase specialization of IngestionActivity.
        ja: phase-17-01 を IngestionActivity の IngestionPhase specialization とします。
      why_valid_or_invalid:
        zh: 它满足有持续时间和输入输出的活动上位条件，并以运行成员资格和局部序号形成阶段种差。
        en: It satisfies the parent activity conditions of duration, input, and output and adds run membership and local sequence as phase differentia.
        ja: duration・input/output parent activity 条件を満たし run membership・local sequence を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestion-phase-008
    - id: IngestionPhase-is_a-IngestionActivity-example-boundary-manual-20260716
      kind: boundary
