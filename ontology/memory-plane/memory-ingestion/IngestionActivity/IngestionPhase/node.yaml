schema: moonweave.ai/ontology-node/v1
id: IngestionPhase
kind: concept
labels:
  zh: 摄入阶段
  en: Ingestion phase
  ja: 取込フェーズ
semantics:
  short_definition:
    zh: 属于一次摄入运行的局部可组合处理步骤。
    en: Local composable processing step belonging to one ingestion run.
    ja: 一 ingestion run に属する local composable 処理 step。
  definition:
    zh: IngestionPhase 是具有 phase_id、ingestion_run_id 与 sequence 的 IngestionActivity 子类，表示运行内单一阶段（如 normalize 或 dedup）；LlamaIndex pipeline 内 transformation 步骤与 LangChain transform 链各段均映射为阶段；不是完整 IngestionRun。
    en: IngestionPhase is an IngestionActivity subtype with phase_id, ingestion_run_id, and sequence representing one in-run stage (e.g., normalize or dedup); LlamaIndex pipeline transformation steps and LangChain transform chain segments map to phases; not a complete IngestionRun.
    ja: IngestionPhase は phase_id/ingestion_run_id/sequence を持つ IngestionActivity subtype。run 内単一 stage（normalize/dedup 等）。LlamaIndex pipeline transformation step/LangChain transform chain segment に対応。complete IngestionRun ではない。
  why_needed:
    zh: 把 normalize 与 dedup 等步骤从完整运行中分离，支持阶段级失败隔离与顺序审计。
    en: Separates steps like normalize and dedup from complete runs, supporting phase-level failure isolation and ordering audit.
    ja: normalize/dedup 等 step を complete run から分離し phase 級 failure isolation/順序 audit を支援。
  includes:
    - zh: 纳入 NormalizationActivity 与 DeduplicationActivity。
      en: Includes NormalizationActivity and DeduplicationActivity.
      ja: NormalizationActivity・DeduplicationActivity。
  excludes:
    - zh: 排除 IngestionRun、Document 与 DeduplicationDecision。
      en: Excludes IngestionRun, Document, and DeduplicationDecision.
      ja: IngestionRun・Document・DeduplicationDecision を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: IngestionPipeline 内 transformations 列表顺序即 phase sequence；Moonweave 要求 dedup phase sequence 位于 normalize 之后；阶段产物（Document、DeduplicationDecision）不提升为 run 本身。
    en: IngestionPipeline transformations list order defines phase sequence; Moonweave requires dedup phase sequence after normalize; phase artifacts (Document, DeduplicationDecision) are not promoted to the run itself.
    ja: IngestionPipeline transformations 列表順=phase sequence。Moonweave は dedup phase を normalize 後に要求。phase artifact（Document/DeduplicationDecision）は run 自体に昇格しない。
  typical_input:
    - description: Phase binding within ingestion run
      format: |
        {
          "phase_id": "normalize-17",
          "ingestion_run_id": "ingest-run-17",
          "sequence": 1
        }
      source_claims: [claim-ingestion-phase-design]
  typical_output:
    - description: Phase completion with output artifact refs
      format: |
        {
          "phase_id": "dedup-17",
          "sequence": 2,
          "output_refs": ["decision-17"]
        }
      source_claims: [claim-ingestion-phase-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      description: Ordered transformation steps within pipeline.run.
structure:
  identity_keys: [phase_id]
  fields:
    - id: phase_id
      labels: {zh: 阶段标识, en: Phase identifier, ja: phase 識別子}
      definitions:
        zh: 在 ingestion_run_id 范围内稳定标识阶段。
        en: Stable phase identifier scoped to ingestion_run_id.
        ja: ingestion_run_id スコープ内で phase を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: normalize-17
      allowed_values: []
      source_claims: [claim-ingestion-phase-id]
    - id: ingestion_run_id
      labels: {zh: 所属运行标识, en: Containing run identifier, ja: 所属 run 識別子}
      definitions:
        zh: 包含该阶段的 IngestionRun ingestion_run_id。
        en: IngestionRun ingestion_run_id containing this phase.
        ja: 当該 phase を含む IngestionRun ingestion_run_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ingest-run-17
      allowed_values: []
      source_claims: [claim-ingestion-phase-run]
    - id: sequence
      labels: {zh: 顺序号, en: Sequence number, ja: 順序番号}
      definitions:
        zh: 在运行计划内的唯一顺序整数；normalize 通常 precedes dedup。
        en: Unique ordering integer within run plan; normalize typically precedes dedup.
        ja: run plan 内一意順序整数。normalize は通常 dedup 先行。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [claim-ingestion-phase-sequence]
  constraints: []
  required_relations: []
examples:
  - id: IngestionPhase-example-normalize-then-dedup
    labels:
      zh: 规范化后去重
      en: Normalize then dedup
      ja: normalize 後 dedup
    descriptions:
      zh: ingest-run-17 含 sequence=1 的 normalize-17 与 sequence=2 的 dedup-17；dedup 消费 normalize 产出的 document-policy-v7。
      en: ingest-run-17 includes normalize-17 at sequence=1 and dedup-17 at sequence=2; dedup consumes document-policy-v7 from normalize.
      ja: ingest-run-17 に sequence=1 normalize-17、sequence=2 dedup-17。dedup が normalize 成果 document-policy-v7 を consume。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      version: ordered transformations
    field_values:
      ingestion_run_id: ingest-run-17
      phases:
        - {phase_id: normalize-17, sequence: 1}
        - {phase_id: dedup-17, sequence: 2}
    related_node_ids: [IngestionPhase, NormalizationActivity, DeduplicationActivity]
    related_relation_ids: []
    source_claims: [claim-ingestion-phase-llamaindex]
  - id: IngestionPhase-example-offline-dedup
    labels:
      zh: 离线去重非阶段
      en: Offline dedup is not phase
      ja: offline dedup は phase ではない
    descriptions:
      zh: offline-dedup-9 处理同一 document 但 ingestion_run_id=maintenance-9，不在 ingest-run-17 清单中——共享输入不构成 phase 成员关系。
      en: offline-dedup-9 processes the same document but ingestion_run_id=maintenance-9, absent from ingest-run-17 manifest—shared input does not establish phase membership.
      ja: offline-dedup-9 は同一 document 処理だが ingestion_run_id=maintenance-9 で ingest-run-17 manifest 外。shared input は phase membership 構成しない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestionPhase, DeduplicationActivity]
    related_relation_ids: []
    source_claims: [claim-ingestion-phase-design]
  - id: IngestionPhase-example-not-run
    labels:
      zh: 阶段非完整运行
      en: Phase is not complete run
      ja: phase は complete run ではない
    descriptions:
      zh: normalize-17 无 loader 选择、无跨阶段协调与端到端 policy 执行责任——不能因属于 ingest-run-17 而等同 IngestionRun。
      en: normalize-17 lacks loader selection, cross-phase coordination, and end-to-end policy execution—membership in ingest-run-17 does not make it IngestionRun.
      ja: normalize-17 は loader 選択/cross-phase coordination/end-to-end policy execution 欠如。ingest-run-17 所属でも IngestionRun 同等にならない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestionPhase, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-ingestion-phase-design]
parent_relation:
  id: IngestionPhase-is_a-IngestionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种摄入活动, en: is an ingestion activity, ja: 取込アクティビティの一種}
  definitions:
    zh: IngestionPhase 种差为 run 内 phase_id、ingestion_run_id 与 sequence 限定的局部步骤。
    en: IngestionPhase differentia is run-local step scoped by phase_id, ingestion_run_id, and sequence.
    ja: IngestionPhase 種差は run 内 phase_id/ingestion_run_id/sequence で限定された local step。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-ingestion-phase-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-pipeline
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
    source_type: official-doc
    relevance: Ordered transformation phases.
  - id: src-ingestion-phase-design
    title: Moonweave ingestion phase boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Phase versus complete run.
source_claims:
  - id: claim-ingestion-phase-llamaindex
    source: src-llamaindex-pipeline
    supports: IngestionPipeline applies transformations in ordered sequence within one run.
    locator: transformations
    evidence_kind: official
    confidence: high
  - id: claim-ingestion-phase-design
    source: src-ingestion-phase-design
    supports: Phases are run-local activities distinct from complete IngestionRun.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-phase-id
    source: src-ingestion-phase-design
    supports: phase_id identifies phase within run scope.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-phase-run
    source: src-ingestion-phase-design
    supports: ingestion_run_id binds phase to parent run.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestion-phase-sequence
    source: src-llamaindex-pipeline
    supports: transformation order defines phase sequence within pipeline.run.
    locator: IngestionPipeline
    evidence_kind: official
    confidence: high
