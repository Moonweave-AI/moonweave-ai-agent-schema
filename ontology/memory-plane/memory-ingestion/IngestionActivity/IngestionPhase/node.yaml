schema: moonweave.ai/ontology-node/v1
id: IngestionPhase
kind: concept
status: accepted
labels:
  zh: 摄入阶段
  en: Ingestion Phase
  ja: 取り込みフェーズ
semantics:
  short_definition:
    zh: 属于一个摄入运行、具有局部顺序和单一处理职责的可审计摄入活动。
    en: An auditable ingestion activity belonging to one ingestion run with local order and one processing responsibility.
    ja: 一つの ingestion run に属し、局所的な順序と一つの processing responsibility を持つ監査可能な ingestion activity。
  definition:
    zh: >-
      IngestionPhase 是 IngestionActivity 的特化，表示一个完整 IngestionRun 内可单独观察的局部处理步骤。
      它以 activity_id、phase_id、ingestion_run_ref、sequence_number、phase_kind、started_at、status 和输入信息引用标识，
      并可记录 ended_at 和输出信息引用。它可以是加载、规范化、去重、分块、嵌入或索引等一步，
      但不是完整 IngestionRun、来源资源、输出 Document、静态流程定义、策略、加载器实现、检索活动或提示上下文。
      阶段既继承活动的时间和输入输出边界，也额外承担一个运行内的局部顺序和职责。
    en: >-
      An IngestionPhase is an IngestionActivity specialization for one separately observable local processing step within a
      complete IngestionRun. It is identified by activity_id, phase_id, ingestion_run_ref, sequence_number, phase_kind,
      started_at, status, and input information references and can record ended_at and output information references. It
      can be one load, normalization, deduplication, chunking, embedding, or indexing step, but it is not a complete
      IngestionRun, source resource, output Document, static workflow definition, policy, loader implementation, retrieval
      activity, or prompt context. A phase inherits an activity's temporal and input-output boundaries and additionally
      carries one local order and responsibility within a run.
    ja: >-
      IngestionPhase は完全な IngestionRun 内の一つの個別に観測可能な局所 processing step を表す IngestionActivity の特化です。
      activity_id、phase_id、ingestion_run_ref、sequence_number、phase_kind、started_at、status、input information reference で
      識別され、ended_at と output information reference を記録できます。loading、normalization、deduplication、chunking、embedding、
      indexing の一 step にはなれますが、完全な IngestionRun、source resource、output Document、静的 workflow definition、policy、
      loader implementation、retrieval activity、prompt context ではありません。phase は activity の temporal と input-output boundary を
      継承し、さらに run 内の一つの局所 order と responsibility を担います。
  why_needed:
    zh: 将端到端运行拆分为可单独审计和恢复的局部转换，可定位哪一步使用了哪个输入、失败在哪里以及输出如何交接。
    en: Splitting an end-to-end run into separately auditable and recoverable local transformations shows which step used which input, where failure occurred, and how output was handed off.
    ja: end-to-end run を個別に監査および回復可能な局所 transformation に分けることで、どの step がどの input を使い、どこで failure が発生し、output がどう handoff されたかを示します。
  includes:
    - zh: 在一个运行内按序号二执行、把加载的原始信息规范化为 Document 的阶段。
      en: A sequence-two step inside one run that normalizes loaded raw information into a Document.
      ja: 一つの run 内で sequence two として実行され、loaded raw information を Document に正規化する step。
  excludes:
    - zh: 编排所有阶段的完整运行、阶段模板、阶段调用的加载器和阶段生成后持续存在的 Document。
      en: A complete run orchestrating all phases, a phase template, a loader invoked by a phase, or a Document persisting after phase generation.
      ja: すべての phase を編成する complete run、phase template、phase が呼び出す loader、phase generation 後に存続する Document。
  semantic_kind: activity
  aliases:
    - run-local ingestion step
    - ingestion processing phase
engineering:
  explanation:
    zh: >-
      编排器将一个运行拆成顺序明确的局部活动，并为每个阶段写入独立的活动标识、开始时间、输入引用、状态和输出引用。
      每一阶段只执行一种职责，例如把加载结果规范化为 Document；它在终态写入结束时间，并把错误或重试信息连到该局部活动。
      阶段之间通过输出和输入引用交接，但前一步的输出、完整运行和实现代码都不会成为阶段自身的身份。
    en: >-
      An orchestrator divides one run into locally ordered activities and writes an independent activity ID, start time,
      input references, status, and output references for each phase. Each phase performs one responsibility, such as
      normalizing a load result into a Document; it writes an end time in a terminal state and connects errors or retries to
      that local activity. Phases hand off through output and input references, but the previous output, complete run, and
      implementation code never become the phase's identity.
    ja: >-
      orchestrator は一つの run を局所的に順序付けた activity に分け、各 phase に独立した activity ID、start time、input reference、
      status、output reference を書きます。各 phase は load result を Document に normalize するなど一つの responsibility を実行し、
      terminal state で end time を書き、error や retry をその局所 activity に結びます。phase は output と input reference で handoff
      しますが、前 step の output、complete run、implementation code は phase 自体の identity にはなりません。
  typical_input:
    - description: Started normalization phase
      format: |
        {
          "activity_id": "normalize-policy-42-02",
          "phase_id": "normalize-policy-42-02",
          "ingestion_run_ref": "ingest-policy-directory-42",
          "sequence_number": 2,
          "phase_kind": "normalize",
          "started_at": "2026-07-18T09:00:20Z",
          "status": "running",
          "input_resource_refs": ["dir-policy-2026-07"],
          "input_information_refs": ["loaded-policy-17"]
        }
  typical_output:
    - description: Completed phase handoff
      format: |
        {
          "activity_id": "normalize-policy-42-02",
          "ended_at": "2026-07-18T09:00:29Z",
          "status": "completed",
          "output_information_refs": ["document-policy-17"],
          "next_phase_ref": "deduplicate-policy-42-03"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loading external data into Document objects that downstream processing can normalize and index.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines activities with time bounds that use entities and generate entities for provenance chains.
structure:
  identity_keys:
    - phase_id
    - ingestion_run_ref
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: アクティビティ ID
      definitions:
        zh: 稳定标识一个发生过的局部摄入活动，而不是完整运行、模板或该阶段的输出。
        en: Stably identifies one local ingestion activity that occurred rather than the complete run, a template, or the phase output.
        ja: complete run、template、phase output ではなく、実際に発生した一つの局所 ingestion activity を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: normalize-policy-42-02
      source_claims:
        - claim-ingestion-phase-activity
    - id: phase_id
      labels:
        zh: 阶段标识
        en: phase ID
        ja: フェーズ ID
      definitions:
        zh: 在所属运行中稳定标识局部处理步骤，可与 activity_id 相同但不表示完整运行身份。
        en: Stably identifies the local processing step within its owning run and can equal activity_id without representing complete-run identity.
        ja: 所属 run 内の局所 processing step を安定して識別し、activity_id と同じ値でも complete-run identity を表しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: normalize-policy-42-02
      source_claims:
        - claim-ingestion-phase-identity
    - id: ingestion_run_ref
      labels:
        zh: 所属摄入运行引用
        en: owning ingestion-run reference
        ja: 所属取り込み run 参照
      definitions:
        zh: 引用编排该阶段并拥有端到端结果的完整 IngestionRun，而不是前一阶段或触发事件。
        en: References the complete IngestionRun that orchestrates this phase and owns end-to-end outcome rather than a preceding phase or trigger event.
        ja: 前 phase や trigger event ではなく、この phase を編成して end-to-end outcome を所有する完全な IngestionRun を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingest-policy-directory-42
      source_claims:
        - claim-ingestion-phase-run-membership
    - id: sequence_number
      labels:
        zh: 阶段顺序号
        en: phase sequence number
        ja: フェーズ順序番号
      definitions:
        zh: 记录该阶段在所属运行内的正整数顺序；它不是全局排序键也不是重试次数。
        en: Records this phase's positive integer order within its owning run; it is neither a global ordering key nor retry count.
        ja: 所属 run 内におけるこの phase の正の整数 order を記録し、global ordering key や retry count ではありません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-ingestion-phase-order
    - id: phase_kind
      labels:
        zh: 阶段职责类型
        en: phase responsibility kind
        ja: フェーズ責務種別
      definitions:
        zh: 声明该局部阶段的唯一主要转换职责，而不是完整管道或实现库名称。
        en: Declares the one primary transformation responsibility of this local phase rather than the complete pipeline or implementation-library name.
        ja: complete pipeline や implementation-library name ではなく、この局所 phase の一つの primary transformation responsibility を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - load
        - normalize
        - deduplicate
        - chunk
        - embed
        - index
      pattern: null
      example_value: normalize
      source_claims:
        - claim-ingestion-phase-responsibility
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录该局部阶段开始处理其输入的时间点，独立于完整运行的开始时间。
        en: Records when this local phase began processing its inputs independently of complete-run start time.
        ja: complete-run start time とは独立に、この局所 phase が input の処理を開始した時点を記録します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:00:20Z"
      source_claims:
        - claim-ingestion-phase-temporal
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      definitions:
        zh: 可选记录阶段完成、失败或取消的时间点；运行中阶段尚未拥有结束边界。
        en: Optionally records when the phase completed, failed, or was cancelled; a running phase does not yet have an end boundary.
        ja: phase が completed、failed、cancelled になった時点を任意で記録し、running phase はまだ end boundary を持ちません。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:00:29Z"
      source_claims:
        - claim-ingestion-phase-temporal
    - id: status
      labels:
        zh: 阶段状态
        en: phase status
        ja: フェーズ状態
      definitions:
        zh: 声明局部阶段的生命周期状态，不将该状态写入完整运行、输入资源或输出信息的身份。
        en: Declares lifecycle state of the local phase without writing the state into identity of the complete run, input resource, or output information.
        ja: complete run、input resource、output information の identity に state を書き込まず、局所 phase の lifecycle state を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - running
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-ingestion-phase-temporal
    - id: input_resource_refs
      labels:
        zh: 父活动输入资源引用
        en: parent-activity input resource references
        ja: 親活動入力リソース参照
      definitions:
        zh: 保留所属 IngestionActivity 实际使用的版本化 IngestibleResource 引用；它与本阶段转换的 input_information_refs 分属来源层和局部表示层。
        en: Retains the versioned IngestibleResource references actually used by the owning IngestionActivity; they are source-layer facts distinct from this phase's input_information_refs.
        ja: 所属 IngestionActivity が実際に使った versioned IngestibleResource 参照を保持し、この phase の input_information_refs とは source 層と局所 representation 層で異なります。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - dir-policy-2026-07
      source_claims:
        - claim-ingestion-phase-parent-usage
    - id: input_information_refs
      labels:
        zh: 输入信息引用
        en: input information references
        ja: 入力情報参照
      definitions:
        zh: 引用本阶段实际转换的局部 IngestibleInformation 或已加载的来源表示，而不是整个运行的所有来源。
        en: References local IngestibleInformation or loaded source representations actually transformed by this phase rather than every source of the complete run.
        ja: complete run のすべての source ではなく、この phase が実際に変換する局所 IngestibleInformation または loaded source representation を参照します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - loaded-policy-17
      source_claims:
        - claim-ingestion-phase-usage
    - id: output_information_refs
      labels:
        zh: 输出信息引用
        en: output information references
        ja: 出力情報参照
      definitions:
        zh: 可选引用本阶段生成或更新并交接给后续阶段的信息实体，而不是将其作为活动自身。
        en: Optionally references information entities generated or updated by this phase and handed to a later phase without treating them as the activity itself.
        ja: activity 自体とみなさず、この phase が生成または更新して後続 phase に handoff する information entity を任意で参照します。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - document-policy-17
      source_claims:
        - claim-ingestion-phase-generation
  constraints:
    - id: ingestion-phase-local-lifecycle
      severity: error
      expression_language: plain
      expression: >-
        activity_id, phase_id, ingestion_run_ref, sequence_number, phase_kind, started_at, status, at least one
        input_resource_refs value, and at least one input_information_refs value are required. sequence_number must be a positive integer unique within ingestion_run_ref,
        and phase_kind must name exactly one listed local responsibility. status must be running, completed, failed, or
        cancelled. ended_at is absent while running and required in terminal states. A completed phase must provide at least
        one output_information_refs value. A complete run, phase template, source resource, loader, policy, output Document,
        retrieval candidate, or prompt context cannot substitute for phase identity.
      explanation:
        zh: 阶段既是有时间边界和输入输出的活动，又必须拥有运行内唯一顺序和单一职责；端到端运行与静态模板不能承担这种局部身份。
        en: A phase is both an activity with time and input-output bounds and a run-local unit with unique order and one responsibility; an end-to-end run and static template cannot carry that local identity.
        ja: phase は time と input-output boundary を持つ activity であると同時に、一意の order と一つの responsibility を持つ run-local unit です。end-to-end run や静的 template はその局所 identity を担えません。
      source_claims:
        - claim-ingestion-phase-temporal
        - claim-ingestion-phase-usage
        - claim-ingestion-phase-generation
        - claim-ingestion-phase-run-membership
        - claim-ingestion-phase-boundary
  required_relations: []
examples:
  - id: ingestion-phase-positive

    labels:
      zh: 完成的规范化阶段
      en: Completed normalization phase
      ja: 完了した正規化フェーズ

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      activity_id: normalize-policy-42-02
      phase_id: normalize-policy-42-02
      ingestion_run_ref: ingest-policy-directory-42
      sequence_number: 2
      phase_kind: normalize
      started_at: "2026-07-18T09:00:20Z"
      ended_at: "2026-07-18T09:00:29Z"
      status: completed
      input_resource_refs:
        - dir-policy-2026-07
      input_information_refs:
        - loaded-policy-17
      output_information_refs:
        - document-policy-17
    related_node_ids:
      - IngestionPhase
      - IngestionActivity
      - IngestionRun
      - Document
    related_relation_ids:
      - IngestionPhase-is_a-IngestionActivity
      - IngestionPhase-part-of-IngestionRun

    source_claims:
      - claim-ingestion-phase-activity
      - claim-ingestion-phase-run-membership
      - claim-ingestion-phase-generation
  - id: ingestion-phase-counterexample

    labels:
      zh: 完整运行不是单一阶段
      en: Complete run is not one phase
      ja: 完全な run は一つのフェーズではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      activity_id: ingest-policy-directory-42
      started_at: "2026-07-18T09:00:00Z"
      ended_at: "2026-07-18T09:01:14Z"
      status: completed
      phase_id: absent
      ingestion_run_ref: absent
      sequence_number: absent
      phase_kind: absent
    related_node_ids:
      - IngestionPhase
      - IngestionRun
      - IngestionActivity
    related_relation_ids:
      - IngestionPhase-part-of-IngestionRun

    source_claims:
      - claim-ingestion-phase-boundary
  - id: ingestion-phase-boundary

    labels:
      zh: 尚在运行的去重阶段
      en: Deduplication phase still running
      ja: 実行中の重複排除フェーズ

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      activity_id: deduplicate-policy-42-03
      phase_id: deduplicate-policy-42-03
      ingestion_run_ref: ingest-policy-directory-42
      sequence_number: 3
      phase_kind: deduplicate
      started_at: "2026-07-18T09:00:30Z"
      status: running
      input_information_refs:
        - document-policy-17
      output_information_refs: []
    related_node_ids:
      - IngestionPhase
      - DeduplicationActivity
      - IngestionRun
    related_relation_ids:
      - IngestionPhase-part-of-IngestionRun

    source_claims:
      - claim-ingestion-phase-temporal
      - claim-ingestion-phase-usage
  - id: ingestion-phase-instance

    labels:
      zh: 实例：失败的分块阶段
      en: "Instance: failed chunking phase"
      ja: "事例：失敗したチャンク化フェーズ"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      activity_id: chunk-contract-51-04
      phase_id: chunk-contract-51-04
      ingestion_run_ref: ingest-contract-51
      sequence_number: 4
      phase_kind: chunk
      started_at: "2026-07-18T10:00:40Z"
      ended_at: "2026-07-18T10:00:42Z"
      status: failed
      input_resource_refs:
        - file-contract-v51
      input_information_refs:
        - document-contract-51
      output_information_refs: []
    related_node_ids:
      - IngestionPhase
      - IngestionRun
      - Document
      - ObservabilityEvent
    related_relation_ids:
      - IngestionPhase-part-of-IngestionRun

    source_claims:
      - claim-ingestion-phase-temporal
      - claim-ingestion-phase-boundary
parent_relation:
  id: IngestionPhase-is_a-IngestionActivity
  predicate: is_a
  target: concept:IngestionActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是摄入活动的阶段特化
    en: is a phase specialization of ingestion activity
    ja: 取り込みアクティビティのフェーズ特化である
  definitions:
    zh: IngestionPhase 是拥有所属运行、局部顺序和单一转换职责的 IngestionActivity。
    en: IngestionPhase is an IngestionActivity with an owning run, local order, and one transformation responsibility.
    ja: IngestionPhase は所属 run、局所 order、一つの transformation responsibility を持つ IngestionActivity です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_specialization
    labels:
      zh: 有阶段特化
      en: has phase specialization
      ja: フェーズ特化を持つ
  conditions:
    - id: ingestion-phase-is-a-activity-condition
      severity: error
      expression_language: plain
      expression: >-
        Assert the specialization only when an object satisfies IngestionActivity identity and additionally has one owning
        ingestion_run_ref, a positive run-local sequence_number, one phase_kind, and local input-output responsibility.
        A complete run, phase template, source resource, output document, loader, or policy does not satisfy this differentia.
      explanation:
        zh: 阶段特化在上位活动身份之外还必须固定所属运行、局部顺序和单一职责；端到端运行或静态模板不具备这些种差。
        en: The phase specialization must add owning run, local order, and one responsibility to parent activity identity; an end-to-end run or static template lacks those differentiae.
        ja: phase specialization は親 activity identity に所属 run、局所 order、一つの responsibility を加えなければなりません。end-to-end run や静的 template にはこれらの differentia がありません。
      source_claims:
        - claim-ingestion-phase-specialization
