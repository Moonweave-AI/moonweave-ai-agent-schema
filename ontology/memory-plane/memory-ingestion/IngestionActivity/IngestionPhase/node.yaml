        en: Do not use this subtype edge to classify the complete IngestionRun as IngestionPhase.
        ja: この subtype edge で complete IngestionRun を IngestionPhase に分類しません。
      why_valid_or_invalid:
        zh: 上位活动成员资格不能抹去完整运行与局部阶段的范围差异；阶段还必须有运行内局部身份。
        en: Shared membership in Activity does not erase the scope difference between a complete run and local phase; a phase additionally requires run-local identity.
        ja: Activity membership 共通でも complete run と local phase の scope 差は消えず run-local identity が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestion-phase-008
