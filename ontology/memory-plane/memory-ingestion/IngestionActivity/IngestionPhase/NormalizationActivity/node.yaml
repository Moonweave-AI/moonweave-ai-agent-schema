relations:
  - id: NormalizationActivity-precedes-DeduplicationActivity
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 先于去重
      en: precedes deduplication
      ja: deduplicationに先行する
    definitions:
      zh: NormalizationActivity —precedes→ DeduplicationActivity 表示同一 IngestionRun 中规范化完成时间早于去重开始且其输出可作为去重输入。
      en: NormalizationActivity —precedes→ DeduplicationActivity means that within the same IngestionRun normalization completes before deduplication starts and its output is eligible as deduplication input.
      ja: NormalizationActivity —precedes→ DeduplicationActivity は同一 IngestionRun 内でnormalization完了がdeduplication開始より前で出力がdedup入力可能なことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_precedes
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: NormalizationActivity-precedes-DeduplicationActivity-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when both phases share run ID and normalization completion is no later than deduplication start.
        explanations:
          zh: 仅当两阶段 run_id 相同且 normalization.completed_at <= dedup.started_at 时成立。
          en: Assert only when both phases share run ID and normalization completion is no later than deduplication start.
          ja: 両phaseのrun IDが同じでnormalization完了がdeduplication開始以前の時だけ成立します。
        source_claims:
          - claim-normalization-activity-008
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
