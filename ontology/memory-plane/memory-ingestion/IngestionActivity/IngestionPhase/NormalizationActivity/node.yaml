parent_relation:
  id: NormalizationActivity-is_a-IngestionPhase
  predicate: is_a
  target: concept:IngestionPhase
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是摄入阶段的规范化特化
    en: is a normalization specialization of ingestion phase
    ja: 取込みフェーズの正規化特化である
  definitions:
    zh: NormalizationActivity 是在一个摄入运行中固定输入信息清单和规范化 profile，并形成独立 Document 的 IngestionPhase。
    en: NormalizationActivity is an IngestionPhase that fixes an input-information manifest and normalization profile in one ingestion run and forms separate Documents.
    ja: NormalizationActivity は、一つの取込み実行で入力情報マニフェストと正規化プロファイルを固定し、独立したDocumentを形成する IngestionPhase です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_normalization_specialization
    labels:
      zh: 具有规范化特化
      en: has normalization specialization
      ja: 正規化特化を持つ
  conditions:
    - id: normalization-activity-is-a-phase-condition
      severity: error
      expression_language: plain
      expression: Assert the specialization only when an object satisfies IngestionPhase identity and additionally has version-pinned input information, a declared normalization profile, and separate Document output when completed.
      explanation:
        zh: 在满足 IngestionPhase 身份之外，还必须具有版本固定的输入信息、声明的规范化配置，并在完成时形成独立文档；下载、去重判断或写入不满足这些过程种差。
        en: Beyond IngestionPhase identity, the object must have version-pinned input information, a declared normalization profile, and a separate Document when completed; downloading, duplicate judgment, or writing lacks these process differentiae.
        ja: IngestionPhase の同一性に加え、版固定の入力情報、宣言された正規化プロファイル、完了時の独立Documentが必要で、取得、重複判定、書込みはこれらの過程上の種差を満たしません。
      source_claims:
        - claim-normalization-activity-specialization
  temporal_scope: valid-time
  boundary_context: The specialization is scoped to one owning ingestion run; input information and generated Documents stay distinct from the activity itself.
  constraints: []
  examples: []
  source_claims:
    - claim-normalization-activity-specialization
  distinct_fact_rationale: This hierarchy records a content-transformation process while its inputs and outputs remain separate information facts.
  layout_role: primary-backbone
relations:
  - id: NormalizationActivity-uses-IngestibleInformation
    predicate: uses
    target: concept:IngestibleInformation
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 使用可摄入信息
      en: uses ingestible information
      ja: ingestible information を使用する
    definitions:
      zh: NormalizationActivity 使用已从来源读取并固定到输入清单中的 IngestibleInformation，不把该信息作为活动本身的组成部分。
      en: A NormalizationActivity uses IngestibleInformation that was read from a source and pinned in its input manifest; it does not make that information a structural part of the activity.
      ja: NormalizationActivity は source から read され input manifest に固定された IngestibleInformation を使用し、その information を activity の structural part にはしない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个规范化活动可使用零个或多个信息版本，具体数量由冻结输入清单决定。
      en: One normalization activity may use zero or more information versions; its frozen input manifest determines the count.
      ja: 一つの normalization activity は zero 又は複数の information version を使用でき、frozen input manifest が数を決める。
    inverse_reading:
      predicate: is_used_by_normalization
      labels:
        zh: 被规范化活动使用
        en: is used by normalization activity
        ja: normalization activity に使用される
    conditions:
      - id: normalization-activity-uses-information-condition
        severity: error
        expression_language: plain
        expression: Assert only when input_information_refs and input_manifest_digest include the information ID and digest and the activity actually reads the payload. Shared source, media type, or metadata alone is insufficient.
        explanation:
          zh: 输入引用、冻结清单和实际负载读取必须共同证明使用关系。
          en: Input reference, frozen manifest, and actual payload read must jointly establish use.
          ja: input reference、frozen manifest、実際の payload read が共同で use を確立しなければならない。
        source_claims: [claim-normalization-activity-usage]
    temporal_scope: valid-time
    boundary_context: Use is scoped to one activity execution and information version and does not turn a source or related metadata into input by association.
    constraints: []
    examples: []
    source_claims: [claim-normalization-activity-usage]
    distinct_fact_rationale: This records input provenance separately from the activity, source resource, and generated Document.
    layout_role: cross-link
  - id: NormalizationActivity-precedes-DeduplicationActivity
    predicate: precedes
    target: concept:DeduplicationActivity
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 先于去重活动
      en: precedes deduplication activity
      ja: 重複排除活動に先行する
    definitions:
      zh: 在同一摄入运行中，已完成的 NormalizationActivity 的输出文档可作为 DeduplicationActivity 的候选输入，且其结束时间不晚于后者开始时间。
      en: Within one ingestion run, a completed NormalizationActivity precedes DeduplicationActivity when its output Document is eligible candidate input and its end time is no later than the latter's start time.
      ja: 同一取込み実行内で、完了したNormalizationActivityの出力Documentが DeduplicationActivity の候補入力となり、終了時刻が後者の開始時刻以前なら先行します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: follows_normalization
      labels:
        zh: 在规范化之后
        en: follows normalization
        ja: 正規化に続く
    conditions:
      - id: normalization-activity-precedes-deduplication-condition
        severity: error
        expression_language: plain
        expression: Assert only when both activities reference the same ingestion_run_ref, the normalization status is completed, its ended_at is no later than deduplication started_at, and a normalization output Document is an actual deduplication input.
        explanation:
          zh: 同一运行、已完成规范化、可比较的时间顺序和真实的输出到输入交接共同证明流程先后；墙上时间早于而不共享运行或文档输入不足以建立关系。
          en: Shared run, completed normalization, comparable time order, and actual output-to-input handoff jointly prove workflow order; earlier wall-clock time without shared run or Document input is insufficient.
          ja: 同じ実行、完了した正規化、比較可能な時間順、実際の出力から入力への引渡しがワークフロー順序を共同で証明し、実行共有やDocument入力のない単なる時刻順だけでは不十分です。
        source_claims:
          - claim-normalization-activity-precedes
    temporal_scope: valid-time
    boundary_context: Ordering is local to the shared ingestion run and does not order unrelated runs by wall-clock time alone.
    constraints: []
    examples: []
    source_claims:
      - claim-normalization-activity-precedes
    distinct_fact_rationale: This records a local workflow handoff, not a claim that all normalization globally precedes all deduplication.
    layout_role: cross-link
  - id: NormalizationActivity-produces-Document
    predicate: produces
    target: concept:Document
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生规范文档
      en: produces canonical document
      ja: 正規Documentを生成する
    definitions:
      zh: NormalizationActivity 产生 Document，表示该活动在完成时按其固定输入清单和 profile 首次形成该独立文档版本。
      en: NormalizationActivity produces a Document when completion first forms that separate Document version from its fixed input manifest and profile.
      ja: NormalizationActivity が Document を生成するとは、固定された入力マニフェストとプロファイルから、その独立Document版を完了時に初めて形成することです。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_generated_by_normalization
      labels:
        zh: 由规范化生成
        en: is generated by normalization
        ja: 正規化により生成される
    conditions:
      - id: normalization-activity-produces-document-condition
        severity: error
        expression_language: plain
        expression: Assert only when status is completed, the Document is listed in output_document_refs, and its generating activity, input-manifest digest, and normalization profile bind back to this activity.
        explanation:
          zh: 完成状态、活动输出引用及文档内部对生成活动、输入摘要和 profile 的回指必须一致；读取、验证或失败的半成品不是生成。
          en: Completed status, the activity output reference, and the Document back-links for generating activity, input digest, and profile must agree; reading, validation, or a failed partial result is not generation.
          ja: 完了状態、活動の出力参照、生成活動・入力ダイジェスト・プロファイルに対するDocumentの逆参照が一致する必要があり、読取り、検証、失敗した部分結果は生成ではありません。
        source_claims:
          - claim-normalization-activity-generation
    temporal_scope: valid-time
    boundary_context: The relation creates no claim about later storage, indexing, deduplication, or user-facing retrieval of the Document.
    constraints: []
    examples: []
    source_claims:
      - claim-normalization-activity-generation
    distinct_fact_rationale: This records document formation separately from the activity execution, its input use, and later downstream effects.
    layout_role: cross-link
sources:
  - id: langchain-document-loaders
    title: LangChain document loader integrations
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents a common loader interface for reading diverse external sources into Document values.
  - id: unicode-uax15
    title: Unicode Standard Annex 15 Unicode Normalization Forms
    url: https://www.unicode.org/reports/tr15/
    type: standard
    source_type: standard
    relevance: Specifies normalization forms that give equivalent Unicode strings a unique binary representation after normalization.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies hash algorithms that produce message digests useful for detecting changed messages.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines activities with start and end times that use entities and generate separate entities.
source_claims:
  - id: claim-normalization-activity-loader
    source: langchain-document-loaders
    supports: LangChain documents a standard BaseLoader interface with load and lazy_load methods that read varied sources into Document values. Moonweave models source-specific parsing as a declared normalization profile and keeps resulting Documents separate from the loading activity.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-unicode
    source: unicode-uax15
    supports: Unicode Standard Annex 15 specifies normalization forms under which equivalent strings obtain a unique binary representation. Moonweave records a versioned Unicode normalization profile rather than treating transformed text as format-neutral.
    locator: UAX 15 introduction and normalization-form definitions
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies hash algorithms that produce message digests for detecting message changes. Moonweave stores an algorithm-tagged digest of the input manifest to pin the information versions read by one activity.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes activities from entities they use or generate. Moonweave identifies normalization execution separately from input information, output Documents, and later deduplication decisions.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-temporal
    source: w3c-prov-o
    supports: PROV-O states that activities start and end at particular points in time. Moonweave records start and terminal end independently from input content, Document identity, and activity status.
    locator: PROV-O section 3.1 on activity start and end times
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-usage
    source: w3c-prov-o
    supports: PROV-O states that activities can use entities during their lifetime. Moonweave records actual input-information references and a manifest digest rather than inferring use from a source mention in metadata.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-parent-usage
    source: w3c-prov-o
    supports: PROV-O permits an activity to use source entities and derived entities as distinct facts. Moonweave retains the owning ingestion activity's versioned source-resource references on a normalization phase while separately recording the information representations that phase transforms.
    locator: PROV-O section 3.1 on prov:used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-generation
    source: w3c-prov-o
    supports: PROV-O states that activities can generate entities. Moonweave treats a completed normalized Document as a separate generated information entity and does not call an unfinished failed buffer a Document.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-normalization-activity-phase
    source: w3c-prov-o
    supports: PROV-O supports provenance chains among activities and entities but does not prescribe ingestion-step ordinals. Moonweave models normalization as an ordered phase in one owning ingestion run as a local orchestration inference.
    locator: PROV-O Activity relations and provenance chains
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-normalization-activity-specialization
    source: w3c-prov-o
    supports: Modeling a version-pinned information transformation as a NormalizationActivity specialization of IngestionPhase is a Moonweave taxonomy inference grounded in PROV-O's activity and entity distinction.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-normalization-activity-precedes
    source: w3c-prov-o
    supports: PROV-O provides activity time bounds and entity usage and generation facts. Moonweave infers a local normalization-before-deduplication handoff only when shared-run, temporal, and output-to-input evidence agree.
    locator: PROV-O Activity timing plus Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-normalization-activity-boundary
    source: langchain-document-loaders
    supports: Loader integrations distinguish reading source content into Document values from later storage and retrieval integrations. Moonweave keeps source acquisition, normalization, deduplication, persistence, and query retrieval as separate node identities.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: medium
