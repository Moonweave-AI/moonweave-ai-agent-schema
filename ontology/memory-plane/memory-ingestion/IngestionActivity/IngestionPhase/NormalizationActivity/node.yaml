          en: Within ingest-run-17, normalize-17 ends at 10:02 before dedup-17 starts at 10:02:01, their sequences are 1 and 2, and deduplication consumes the normalization output Document.
          ja: ingest-run-17 内で normalize end が dedup start より前、sequence 1/2、dedup input が normalization output です。
        field_values: {}
        related_node_ids:
          - NormalizationActivity
          - DeduplicationActivity
        related_relation_ids:
          - NormalizationActivity-precedes-DeduplicationActivity
        expected_result:
          zh: 建立 normalize-17 precedes dedup-17，并限定到 ingest-run-17 的工作流范围。
          en: Assert normalize-17 precedes dedup-17 and scope the ordering to ingest-run-17's workflow.
          ja: normalize-17 precedes dedup-17 を ingest-run-17 workflow scope に限定して確立します。
        why_valid_or_invalid:
          zh: 同一运行、时间顺序、阶段序号和输出到输入依赖共同证明有意义的流程先后。
          en: Shared run, temporal order, phase sequence, and output-to-input dependency jointly prove meaningful workflow precedence.
          ja: same run、temporal order、phase sequence、output-input dependency が workflow precedence を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-normalization-activity-008
