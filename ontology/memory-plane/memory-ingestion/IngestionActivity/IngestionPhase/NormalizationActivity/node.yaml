schema: moonweave.ai/ontology-node/v1
id: NormalizationActivity
kind: concept
status: accepted
labels:
  zh: 规范化活动
  en: Normalization activity
  ja: 正規化activity
semantics:
  short_definition:
    zh: 把来源信息转换为规范 Document 的摄入阶段。
    en: An ingestion phase transforming source information into canonical Document values.
    ja: source informationをcanonical Documentへ変換する取込phaseです。
  definition:
    zh: NormalizationActivity 是消费 IngestibleInformation、应用确定解析/清洗配置并产生 Document 的 IngestionPhase；它不负责去重判定或持久写入。
    en: NormalizationActivity is an IngestionPhase consuming IngestibleInformation, applying a fixed parsing/cleaning profile, and producing Document values; it does not decide duplicates or perform persistence writes.
    ja: NormalizationActivity は IngestibleInformation を消費し固定parse/clean profileを適用して Document を生成する IngestionPhase で、duplicate判断や永続writeは担いません。
  why_needed:
    zh: 把内容规范化与去重及存储生命周期分开。
    en: Separates content normalization from deduplication and storage lifecycle.
    ja: content normalizationをdeduplication・storage lifecycleから分離します。
  includes:
    - zh: 纳入解析、格式统一、字符集处理与结构规范化。
      en: Includes parsing, format unification, charset handling, and structural normalization.
      ja: parse・format統一・charset処理・構造normalizationを含みます。
  excludes:
    - zh: 排除来源下载、DeduplicationActivity 与 MemoryWrite。
      en: Excludes source download, DeduplicationActivity, and MemoryWrite.
      ja: source download・DeduplicationActivity・MemoryWriteを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: phase ID
        ja: phase ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识规范化阶段。
        en: Stable identifier for the normalization phase.
        ja: normalization phaseの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: normalize-17
      source_claims:
        - claim-normalization-activity-002
    - id: normalization_profile
      labels:
        zh: 规范化配置
        en: normalization profile
        ja: normalization profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定解析、清洗与编码规则。
        en: Fixes parsing, cleaning, and encoding rules.
        ja: parse・clean・encoding規則を固定します。
      allowed_values: []
      pattern: null
      example_value: pdf-partition-v3
      source_claims:
        - claim-normalization-activity-003
    - id: input_digest
      labels:
        zh: 输入摘要
        en: input digest
        ja: 入力digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定阶段消费的信息版本。
        en: Fixes the information version consumed by the phase.
        ja: phaseが消費したinformation版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:file17
      source_claims:
        - claim-normalization-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: NormalizationActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 规范化活动正例
      en: "Positive case: Normalization activity"
      ja: 正規化activity正例
    scenario_id: null
    descriptions:
      zh: normalize-17 是 ingest-run-17 的 sequence=1 阶段；它按 pdf-partition-v3 解码、去除页眉、统一 Unicode，并从 info-17 生成 content digest=c7 的 document-policy-v7。
      en: normalize-17 is sequence 1 of ingest-run-17; under pdf-partition-v3 it decodes text, removes headers, normalizes Unicode, and generates document-policy-v7 with content digest c7 from info-17.
      ja: normalize-17 は run の sequence=1 で decode、header removal、Unicode normalization を行い info-17 から digest c7 の document を生成します。
    field_values:
      phase_id: normalize-17
      normalization_profile: pdf-partition-v3
      input_digest: sha256:file17
      ingestion_run_id: ingest-run-17
      sequence: 1
      activity_id: normalize-17
      started_at: 2026-07-16T10:01:00Z
      status: completed
    related_node_ids:
      - NormalizationActivity
    related_relation_ids: []
    expected_result:
      zh: 将 normalize-17 表示为 NormalizationActivity，并记录输入摘要、变换 profile 与新文档摘要。
      en: Represent normalize-17 as NormalizationActivity and record input digest, transformation profile, and new document digest.
      ja: normalize-17 を NormalizationActivity とし input digest、transformation profile、new document digest を記録します。
    why_valid_or_invalid:
      zh: 阶段实际改变内容表示并形成规范 Document，且所有变化可由 profile 和输入输出摘要重放验证。
      en: The phase actually changes content representation and forms a normalized Document, with changes reproducible from the profile and input and output digests.
      ja: phase は content representation を変更し normalized Document を形成し profile・digests で再現検証できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-normalization-activity-005
  - id: NormalizationActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 规范化活动边界例
      en: "Boundary case: Normalization activity"
      ja: 正規化activity境界例
    scenario_id: null
    descriptions:
      zh: dedup-17 不改变 document-policy-v7 的正文；它只比较 c7 与 docstore 哈希并记录 keep/skip/update 判断。
      en: dedup-17 does not change document-policy-v7's content; it only compares c7 with a docstore hash and records a keep, skip, or update judgment.
      ja: dedup-17 は document content を変更せず c7 と docstore hash を比較し judgment を記録するだけです。
    field_values: {}
    related_node_ids:
      - NormalizationActivity
    related_relation_ids: []
    expected_result:
      zh: 把 dedup-17 保持为 DeduplicationActivity，不归为 NormalizationActivity。
      en: Keep dedup-17 as DeduplicationActivity and exclude it from NormalizationActivity.
      ja: dedup-17 は DeduplicationActivity とし NormalizationActivity から除外します。
    why_valid_or_invalid:
      zh: 规范化改变内容形态，去重只判断身份与版本处置；两阶段的输入输出和成功条件不同。
      en: Normalization changes content form, whereas deduplication decides identity and version disposition; their inputs, outputs, and success criteria differ.
      ja: normalization は content form を変更し deduplication は identity・version disposition を判断するため inputs/outputs が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-normalization-activity-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: NormalizationActivity-is_a-IngestionPhase
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: NormalizationActivity 是 IngestionPhase 的严格子类；种差为：消费 IngestibleInformation 并按确定解析/清洗配置产生 Document。
    en: "NormalizationActivity is a strict subtype of IngestionPhase; its reviewed differentia is: it consumes IngestibleInformation and produces Document under a fixed parsing or cleaning profile."
    ja: NormalizationActivity は IngestionPhase の厳密なsubtypeで、審査済み種差は「IngestibleInformation を消費し固定parse/clean profileで Documentを生成します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: NormalizationActivity-is_a-IngestionPhase-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestionPhase and also satisfies the differentia: it consumes IngestibleInformation and produces Document under a fixed parsing or cleaning profile."
      explanations:
        zh: 仅当对象首先满足 IngestionPhase 定义且满足种差“消费 IngestibleInformation 并按确定解析/清洗配置产生 Document。”时成立。
        en: "Assert only when the object first satisfies IngestionPhase and also satisfies the differentia: it consumes IngestibleInformation and produces Document under a fixed parsing or cleaning profile."
        ja: 対象がまず IngestionPhase を満たし、さらに種差「IngestibleInformation を消費し固定parse/clean profileで Documentを生成します。」を満たす時だけ成立します。
      source_claims:
        - claim-normalization-activity-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: NormalizationActivity-is_a-IngestionPhase-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: normalize-17 具有 ingest-run-17 内唯一 phase_id 与 sequence=1，并执行解码、清理和 Unicode 规范化，从 info-17 形成新的 Document。
        en: normalize-17 has a run-unique phase ID and sequence 1 inside ingest-run-17 and performs decoding, cleaning, and Unicode normalization to form a new Document from info-17.
        ja: normalize-17 は run-unique phase ID、sequence 1 を持ち decode、clean、Unicode normalize で new Document を形成します。
      field_values: {}
      related_node_ids:
        - NormalizationActivity
        - IngestionPhase
      related_relation_ids:
        - NormalizationActivity-is_a-IngestionPhase
      expected_result:
        zh: 确认 normalize-17 同时属于 NormalizationActivity、IngestionPhase 与 IngestionActivity。
        en: Confirm normalize-17 as NormalizationActivity, IngestionPhase, and IngestionActivity.
        ja: normalize-17 を NormalizationActivity、IngestionPhase、IngestionActivity に所属させます。
      why_valid_or_invalid:
        zh: 它先满足局部阶段的运行归属、时间和输入输出条件，再以改变内容形式为规范 Document 构成种差。
        en: It first satisfies run membership, time, input, and output conditions of a local phase and adds transformation into normalized Document form as differentia.
        ja: local phase parent 条件を満たし normalized Document への content transformation を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-normalization-activity-007
    - id: NormalizationActivity-is_a-IngestionPhase-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: dedup-17 也是 IngestionPhase，但只比较 document_id 与哈希并生成处置决定，不改变正文表示。
        en: dedup-17 is also an IngestionPhase but only compares document identity and hash and generates a disposition decision without changing content representation.
        ja: dedup-17 も IngestionPhase だが document identity/hash 比較だけで content representation を変更しません。
      field_values: {}
      related_node_ids:
        - NormalizationActivity
        - IngestionPhase
      related_relation_ids:
        - NormalizationActivity-is_a-IngestionPhase
      expected_result:
        zh: 不要通过该子类边把 dedup-17 归为 NormalizationActivity。
        en: Do not use this subtype edge to classify dedup-17 as NormalizationActivity.
        ja: この subtype edge で dedup-17 を NormalizationActivity に分類しません。
      why_valid_or_invalid:
