        en: Sharing the phase parent does not make specialized behavior equal; normalization and deduplication have different transformations, outputs, and completion conditions.
        ja: phase parent 共通でも specialized behavior は異なり normalization と dedup は outputs・completion が違います。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-normalization-activity-007
  source_claims:
