schema: moonweave.ai/ontology-node/v1
id: NormalizationActivity
kind: concept
status: accepted
labels:
  zh: 规范化活动
  en: Normalization activity
  ja: 正規化アクティビティ
semantics:
  short_definition:
    zh: 在摄入运行中将已读取信息转换为规范文档的有界活动。
    en: A bounded ingestion activity that turns read information into canonical Documents.
    ja: 読み取った情報を正規のDocumentへ変換する、取込み実行内の有界な活動です。
  definition:
    zh: >-
      NormalizationActivity 是 IngestionPhase 的特化：它在一个确定的摄入运行中读取版本固定的
      IngestibleInformation，按声明的解析、清洗和字符规范化配置形成独立的 Document 引用。它以活动、
      输入信息和输出文档为不同事实记录，不是来源下载、去重判定、持久化写入、向量索引或查询检索。
    en: >-
      A NormalizationActivity is an IngestionPhase specialization that reads version-pinned IngestibleInformation in one
      identified ingestion run and, under a declared parsing, cleaning, and character-normalization profile, forms
      separate Document references. It records activity, input information, and output Documents as different facts; it
      is not source download, a deduplication decision, persistence write, vector indexing, or query retrieval.
    ja: >-
      NormalizationActivity は、識別された一つの取込み実行で版固定の IngestibleInformation を読み、宣言された
      解析、清掃、文字正規化プロファイルに従って独立した Document 参照を形成する IngestionPhase の特化です。
      活動、入力情報、出力Documentを別々の事実として記録し、ソース取得、重複判定、永続書込み、ベクトル索引、
      または問合せ検索ではありません。
  why_needed:
    zh: 将内容表示的可重放转换与来源读取、去重判断和写入副作用分离，使文档出处和失败原因可审计。
    en: Separates replayable content transformation from source reading, duplicate judgment, and write side effects so document provenance and failures remain auditable.
    ja: 再生可能な内容変換をソース読取り、重複判定、書込み副作用から分離し、Documentの来歴と失敗理由を監査可能にします。
  includes:
    - zh: 读取已取得的信息负载，应用固定解析和清洗规则，并生成具有输入出处的规范文档引用。
      en: Reading acquired information payloads, applying fixed parsing and cleaning rules, and generating canonical Document references with input provenance.
      ja: 取得済み情報のペイロード読取り、固定された解析・清掃規則の適用、入力来歴を持つ正規Document参照の生成を含みます。
  excludes:
    - zh: 只定位或下载来源资源、只比较文档身份并作去重决定、写入记忆存储、建立向量索引或为用户问题执行相似度搜索。
      en: Merely locating or downloading a source resource, only comparing document identity for a deduplication decision, writing memory storage, building a vector index, or searching similarity for a user question.
      ja: ソース資源の位置特定または取得だけ、重複判定のためのDocument同一性比較だけ、記憶ストアへの書込み、ベクトル索引作成、利用者質問への類似検索を除きます。
  semantic_kind: activity
  aliases:
    - document normalization phase
    - canonicalization activity
engineering:
  explanation:
    zh: >-
      实现会把输入清单及其摘要作为冻结的读取边界，选择一个版本化的解析和清洗 profile，再将每个成功产物作为
      独立 Document 引用交给后续去重阶段。运行中的活动可没有结束时间和产物；失败活动保留输入和时间边界，
      但不把半成品误称为文档。
    en: >-
      An implementation freezes a read boundary with an input manifest and its digest, selects a versioned parsing and
      cleaning profile, then hands each successful output onward as a separate Document reference. A running activity can
      have neither end time nor output, while a failed activity retains its input and time bounds without calling a partial
      result a Document.
    ja: >-
      実装は入力マニフェストとそのダイジェストで読取り境界を固定し、版付きの解析・清掃プロファイルを選び、成功した
      各出力を独立したDocument参照として後続の重複排除段階へ渡します。実行中の活動には終了時刻も出力もなくてよく、
      失敗した活動は入力と時間境界を保持しますが、部分結果をDocumentとは呼びません。
  typical_input:
    - description: Version-pinned normalization request
      format: |
        {
          "activity_id": "normalize-policy-42-02",
          "phase_id": "normalize-policy-42-02",
          "ingestion_run_ref": "ingest-policy-directory-42",
          "sequence_number": 2,
          "phase_kind": "normalize",
          "input_resource_refs": ["dir-policy-2026-07"],
          "normalization_profile": "unicode-nfc-clean-v1",
          "input_information_refs": ["info-policy-42"],
          "input_manifest_digest": "sha256:input-manifest-policy-42-v1",
          "started_at": "2026-07-18T08:59:10Z",
          "status": "running"
        }
      source_claims:
        - claim-normalization-activity-parent-usage
        - claim-normalization-activity-usage
  typical_output:
    - description: Completed canonical document handoff
      format: |
        {
          "activity_id": "normalize-policy-42-02",
          "phase_id": "normalize-policy-42-02",
          "ingestion_run_ref": "ingest-policy-directory-42",
          "phase_kind": "normalize",
          "input_resource_refs": ["dir-policy-2026-07"],
          "input_information_refs": ["info-policy-42"],
          "input_manifest_digest": "sha256:input-manifest-policy-42-v1",
          "output_document_refs": ["document-policy-42-v1"],
          "ended_at": "2026-07-18T08:59:24Z",
          "status": "completed"
        }
      source_claims:
        - claim-normalization-activity-parent-usage
        - claim-normalization-activity-generation
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents a standard loader interface for reading varied sources into Document values.
    - name: Unicode Standard Annex 15
      url: https://www.unicode.org/reports/tr15/
      description: Specifies Unicode normalization forms for stable binary representations of equivalent text.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines activities that use entities, generate entities, and have time bounds.
structure:
  identity_keys:
    - activity_id
    - ingestion_run_ref
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: 活動ID
      definitions:
        zh: 稳定标识实际发生的规范化过程，不是输入信息、输出文档或后续去重决定。
        en: Stably identifies the normalization process that occurred, rather than its input information, output Document, or later deduplication decision.
        ja: 入力情報、出力Document、後続の重複判定ではなく、実際に発生した正規化過程を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: normalize-policy-42-02
      source_claims:
        - claim-normalization-activity-identity
    - id: phase_id
      labels:
        zh: 阶段标识
        en: phase ID
        ja: フェーズID
      definitions:
        zh: 在所属摄入运行内标识该局部规范化步骤，可与活动标识相同但不等同于整个运行。
        en: Identifies this local normalization step inside its owning ingestion run and may equal the activity ID without equaling the complete run.
        ja: 所属する取込み実行内の局所的な正規化手順を識別し、活動IDと同じでも実行全体と同一にはなりません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: normalize-policy-42-02
      source_claims:
        - claim-normalization-activity-phase
    - id: ingestion_run_ref
      labels:
        zh: 所属摄入运行引用
        en: owning ingestion-run reference
        ja: 所属取込み実行参照
      definitions:
        zh: 引用编排此活动并拥有端到端结果的 IngestionRun，而不是输入来源或输出存储。
        en: References the IngestionRun that orchestrates this activity and owns the end-to-end outcome, rather than an input source or output store.
        ja: 入力ソースや出力ストアではなく、この活動を編成して端から端までの結果を所有する IngestionRun を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingest-policy-directory-42
      source_claims:
        - claim-normalization-activity-phase
    - id: sequence_number
      labels:
        zh: 阶段顺序号
        en: phase sequence number
        ja: フェーズ順序番号
      definitions:
        zh: 记录该规范化步骤在所属运行内的正整数顺序，不是重试次数、字符数量或全局序列。
        en: Records the positive integer order of this normalization step in its owning run, not a retry count, character count, or global sequence.
        ja: 所属する実行内でこの正規化手順の正整数順序を記録し、再試行回数、文字数、全域連番ではありません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-normalization-activity-phase
    - id: phase_kind
      labels:
        zh: 父阶段职责类型
        en: parent phase responsibility kind
        ja: 親フェーズ責務種別
      definitions:
        zh: 保留 IngestionPhase 的职责字段；此活动必须明确为 normalize，不能以 normalization_profile 的实现版本代替职责类型。
        en: Retains IngestionPhase's responsibility field; this activity must explicitly be normalize rather than using a normalization_profile implementation version as its phase kind.
        ja: IngestionPhase の責務 field を保持し、この activity は normalization_profile の実装版を phase kind とせず明示的に normalize でなければなりません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - normalize
      pattern: null
      example_value: normalize
      source_claims:
        - claim-normalization-activity-phase
    - id: input_resource_refs
      labels:
        zh: 父活动输入资源引用
        en: parent-activity input resource references
        ja: 親活動入力リソース参照
      definitions:
        zh: 保留拥有该规范化阶段的摄入活动实际读取的版本化来源资源，区别于本活动读取的 input_information_refs。
        en: Retains versioned source resources actually read by the ingestion activity owning this normalization phase, distinct from input_information_refs read by this activity.
        ja: この normalization phase を所有する ingestion activity が実際に読んだ versioned source resource を保持し、この activity が読む input_information_refs と区別します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - dir-policy-2026-07
      source_claims:
        - claim-normalization-activity-parent-usage
    - id: normalization_profile
      labels:
        zh: 规范化配置
        en: normalization profile
        ja: 正規化プロファイル
      definitions:
        zh: 固定该活动采用的解析、清洗和字符规范化规则版本，而不是来源格式名称或任意脚本。
        en: Fixes the versioned parsing, cleaning, and character-normalization rules used by the activity, rather than merely naming a source format or arbitrary script.
        ja: 単なるソース形式名や任意スクリプトではなく、活動が使う版付きの解析、清掃、文字正規化規則を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - unicode-nfc-clean-v1
        - pdf-text-extraction-v3
        - html-text-clean-v2
      pattern: null
      example_value: unicode-nfc-clean-v1
      source_claims:
        - claim-normalization-activity-unicode
        - claim-normalization-activity-loader
    - id: input_information_refs
      labels:
        zh: 输入信息引用
        en: input information references
        ja: 入力情報参照
      definitions:
        zh: 引用该活动实际读取的 IngestibleInformation 版本，而不是仅在元数据中出现的相关来源。
        en: References IngestibleInformation versions actually read by the activity, rather than sources merely mentioned in metadata.
        ja: メタデータに記載されただけのソースではなく、活動が実際に読んだ IngestibleInformation の版を参照します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - info-policy-42
      source_claims:
        - claim-normalization-activity-usage
    - id: input_manifest_digest
      labels:
        zh: 输入清单摘要
        en: input manifest digest
        ja: 入力マニフェストダイジェスト
      definitions:
        zh: 记录列出所有实际输入信息标识和内容摘要的清单摘要，以冻结此次活动的读取边界。
        en: Records a digest of the manifest listing every actual input information ID and content digest, freezing this activity's read boundary.
        ja: 実際の入力情報IDと内容ダイジェストを列挙するマニフェストのダイジェストを記録し、この活動の読取り境界を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:input-manifest-policy-42-v1
      source_claims:
        - claim-normalization-activity-digest
    - id: output_document_refs
      labels:
        zh: 输出文档引用
        en: output document references
        ja: 出力Document参照
      definitions:
        zh: 可选地引用本活动成功形成的独立 Document，不把未完成缓冲区或失败诊断当作输出文档。
        en: Optionally references separate Documents successfully formed by this activity, not incomplete buffers or failure diagnostics.
        ja: この活動が成功して形成した独立Documentを任意に参照し、未完了バッファや失敗診断を出力Documentとは扱いません。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - document-policy-42-v1
      source_claims:
        - claim-normalization-activity-generation
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录开始读取输入并应用规范化 profile 的时间点，独立于来源资源创建时间。
        en: Records when input reading and profile application began, independently of the source resource's creation time.
        ja: ソース資源の作成時刻とは独立に、入力読取りとプロファイル適用を開始した時点を記録します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:59:10Z"
      source_claims:
        - claim-normalization-activity-temporal
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      definitions:
        zh: 可选地记录活动完成、失败或取消的时刻；运行中的活动不得声称有结束时间。
        en: Optionally records when the activity completed, failed, or was cancelled; a running activity must not claim an end time.
        ja: 活動が完了、失敗、取消された時点を任意に記録し、実行中の活動は終了時刻を主張してはいけません。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:59:24Z"
      source_claims:
        - claim-normalization-activity-temporal
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: 活動状態
      definitions:
        zh: 声明规范化过程的运行状态，不使用去重的保留、更新或跳过结果作为活动状态。
        en: Declares the run state of normalization without using a deduplication keep, update, or skip result as activity status.
        ja: 重複排除のkeep、update、skip結果を活動状態に使わず、正規化の実行状態を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - running
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-normalization-activity-temporal
  constraints:
    - id: normalization-activity-required-inputs
      expression: activity_id, phase_id, ingestion_run_ref, sequence_number, phase_kind, input_resource_refs, normalization_profile, input_information_refs, input_manifest_digest, started_at, and status are required; sequence_number must be a positive integer.
      explanation:
        zh: 这些字段共同固定实际活动、所属运行、局部顺序、输入边界和可重放的转换配置；缺少任一项时不能审计该过程。
        en: These fields jointly pin the actual activity, owning run, local order, input boundary, and replayable transformation profile; omitting one makes the process unauditable.
        ja: これらの項目は実際の活動、所属実行、局所順序、入力境界、再生可能な変換プロファイルを共同で固定し、欠けると過程を監査できません。
    - id: normalization-activity-terminal-output
      expression: When status is completed, ended_at and at least one output_document_refs value are required; when status is running, ended_at and output_document_refs must be absent.
      explanation:
        zh: 完成活动必须同时记录完成边界和可交接文档；运行中活动不能把未完成缓冲区提前声明为产物。
        en: A completed activity must record both a terminal boundary and handoffable Documents, while a running activity cannot declare unfinished buffers as outputs.
        ja: 完了した活動は終了境界と引渡し可能なDocumentの両方を記録し、実行中の活動は未完了バッファを出力として宣言できません。
    - id: normalization-activity-failed-output
      expression: When status is failed or cancelled, ended_at is required and output_document_refs must be empty or absent unless each referenced Document has an independently recorded successful generating activity.
      explanation:
        zh: 失败或取消仍是有时间边界的活动事实，但不得将未完成内容归因于该失败活动的生成。
        en: A failed or cancelled run remains a time-bounded activity fact, but must not attribute unfinished content generation to that failed activity.
        ja: 失敗または取消も時間境界を持つ活動事実ですが、未完了内容の生成をその失敗活動に帰属させてはいけません。
examples:
  - id: normalization-activity-positive

    labels:
      zh: 已完成的策略文档规范化
      en: Completed policy-document normalization
      ja: 完了した方針Documentの正規化

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      activity_id: normalize-policy-42-02
      phase_id: normalize-policy-42-02
      ingestion_run_ref: ingest-policy-directory-42
      sequence_number: 2
      phase_kind: normalize
      input_resource_refs:
        - dir-policy-2026-07
      normalization_profile: unicode-nfc-clean-v1
      input_information_refs:
        - info-policy-42
      input_manifest_digest: sha256:input-manifest-policy-42-v1
      output_document_refs:
        - document-policy-42-v1
      started_at: "2026-07-18T08:59:10Z"
      ended_at: "2026-07-18T08:59:24Z"
      status: completed
    related_node_ids:
      - NormalizationActivity
      - IngestionPhase
      - IngestibleInformation
      - Document
      - DeduplicationActivity
    related_relation_ids:
      - NormalizationActivity-is_a-IngestionPhase
      - NormalizationActivity-uses-IngestibleInformation
      - NormalizationActivity-produces-Document
      - NormalizationActivity-precedes-DeduplicationActivity

    source_claims:
      - claim-normalization-activity-loader
      - claim-normalization-activity-unicode
      - claim-normalization-activity-generation
  - id: normalization-activity-counterexample

    labels:
      zh: 去重决定不是规范化活动
      en: A deduplication decision is not normalization activity
      ja: 重複排除決定は正規化活動ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      decision_id: decision-policy-42-v1
      outcome: update
      candidate_document_ref: document-policy-42-v1
      activity_id: absent
      normalization_profile: absent
      input_information_refs: []
    related_node_ids:
      - NormalizationActivity
      - DeduplicationDecision
      - DeduplicationActivity
    related_relation_ids:
      - DeduplicationDecision-was-generated-by-DeduplicationActivity

    source_claims:
      - claim-normalization-activity-identity
      - claim-normalization-activity-boundary
  - id: normalization-activity-boundary

    labels:
      zh: 正在运行且尚无产物的规范化
      en: Running normalization with no output yet
      ja: まだ出力のない実行中の正規化

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      activity_id: normalize-contract-51-02
      phase_id: normalize-contract-51-02
      ingestion_run_ref: ingest-contract-51
      sequence_number: 2
      normalization_profile: pdf-text-extraction-v3
      input_information_refs:
        - info-contract-51
      input_manifest_digest: sha256:input-manifest-contract-51-v1
      started_at: "2026-07-18T10:00:08Z"
      status: running
    related_node_ids:
      - NormalizationActivity
      - IngestibleInformation
      - IngestionPhase
    related_relation_ids:
      - NormalizationActivity-is_a-IngestionPhase
      - NormalizationActivity-uses-IngestibleInformation

    source_claims:
      - claim-normalization-activity-usage
      - claim-normalization-activity-temporal
  - id: normalization-activity-instance

    labels:
      zh: 因无效字符流失败的规范化
