schema: moonweave.ai/ontology-node/v1
id: NormalizationActivity
kind: concept
labels:
  zh: 规范化活动
  en: Normalization activity
  ja: 正規化アクティビティ
semantics:
  short_definition:
    zh: 把来源信息转换为规范 Document 的 ingest 阶段。
    en: Ingestion phase transforming source information into canonical Document.
    ja: source information を canonical Document へ変換する ingest phase。
  definition:
    zh: NormalizationActivity 是消费 IngestibleInformation、应用 normalization_profile（元数据提取、格式转换、编码统一）并产生 Document 的 IngestionPhase；对应 LlamaIndex transformation 前段与 LangChain document transform；不负责 dedup 或 MemoryWrite。
    en: NormalizationActivity is an IngestionPhase consuming IngestibleInformation, applying normalization_profile (metadata extraction, format conversion, charset unification) and producing Document, mapping to LlamaIndex pre-transformation steps and LangChain document transforms; not responsible for dedup or MemoryWrite.
    ja: NormalizationActivity は IngestibleInformation consume→normalization_profile（metadata 抽出/format 変換/encoding 統一）適用→Document 生成の IngestionPhase。LlamaIndex transformation 前段/LangChain document transform に対応。dedup/MemoryWrite 非担当。
  why_needed:
    zh: 把内容规范化与 dedup、chunking、持久写入分离，固定 normalize 阶段输入输出审计。
    en: Separates content normalization from dedup, chunking, and persistence, fixing normalize-phase input/output audit.
    ja: content normalization を dedup/chunking/永続 write から分離し normalize phase input/output audit 固定。
  includes:
    - zh: 纳入 PDF→Markdown、HTML 清洗、metadata 提取与 charset 规范化。
      en: Includes PDF→Markdown, HTML cleanup, metadata extraction, and charset normalization.
      ja: PDF→Markdown/HTML cleanup/metadata 抽出/charset normalization。
  excludes:
    - zh: 排除 DeduplicationActivity、chunking 与 MemoryWrite。
      en: Excludes DeduplicationActivity, chunking, and MemoryWrite.
      ja: DeduplicationActivity/chunking/MemoryWrite を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangChain Document(page_content, metadata) 在 loader 后常经 transform 链规范化；LlamaIndex 在 SentenceSplitter 前对 Document/TextNode 做 metadata 填充；Moonweave 把该步骤建模为 normalize-17 phase，input_digest 绑定消费的信息版本。
    en: LangChain Document(page_content, metadata) often passes transform chains after loader; LlamaIndex fills metadata on Document/TextNode before SentenceSplitter; Moonweave models this as normalize-17 phase with input_digest binding consumed information version.
    ja: LangChain Document(page_content, metadata) は loader 後 transform chain で正規化。LlamaIndex は SentenceSplitter 前に Document/TextNode metadata 填充。Moonweave は normalize-17 phase 建模、input_digest が consume information 版 binding。
  typical_input:
    - description: Raw loader output before normalization
      format: |
        Document(page_content="...", metadata={"source": "policy.pdf", "page": 3})
      source_claims: [claim-normalization-langchain]
  typical_output:
    - description: Canonical Document from normalization phase
      format: |
        {
          "document_id": "document-policy-v7",
          "content_digest": "sha256:...",
          "media_type": "text/markdown"
        }
      source_claims: [claim-normalization-design]
  reference_implementations:
    - name: LangChain Document Transforms
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: Post-loader document normalization.
    - name: LlamaIndex IngestionPipeline
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Pre-chunk transformations and metadata handling.
structure:
  identity_keys: [phase_id]
  fields:
    - id: phase_id
      labels: {zh: 阶段标识, en: Phase identifier, ja: phase 識別子}
      definitions:
        zh: 稳定标识规范化阶段。
        en: Stable identifier for normalization phase.
        ja: normalization phase の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: normalize-17
      allowed_values: []
      source_claims: [claim-normalization-id]
    - id: normalization_profile
      labels: {zh: 规范化配置, en: Normalization profile, ja: normalization profile}
      definitions:
        zh: 固定解析、清洗、编码与 metadata 提取规则引用。
        en: Reference fixing parsing, cleaning, encoding, and metadata extraction rules.
        ja: parse/clean/encoding/metadata 抽出 rule ref 固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pdf-partition-v3
      allowed_values: []
      source_claims: [claim-normalization-profile]
    - id: input_digest
      labels: {zh: 输入摘要, en: Input digest, ja: input digest}
      definitions:
        zh: 固定本阶段消费的 IngestibleInformation 版本 digest。
        en: Digest fixing IngestibleInformation version consumed by this phase.
        ja: 当 phase が consume する IngestibleInformation 版 digest 固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:file17
      allowed_values: []
      source_claims: [claim-normalization-input]
  constraints: []
  required_relations: []
examples:
  - id: NormalizationActivity-example-pdf-to-markdown
    labels:
      zh: PDF 转 Markdown 规范化
      en: PDF to Markdown normalization
      ja: PDF→Markdown normalization
    descriptions:
      zh: normalize-17 消费 info-17（PDF 提取文本），应用 pdf-partition-v3 profile，产出 document-policy-v7（media_type=text/markdown, content_digest=c7）与 DocumentMetadata。
      en: normalize-17 consumes info-17 (PDF extracted text), applies pdf-partition-v3 profile, producing document-policy-v7 (media_type=text/markdown, content_digest=c7) and DocumentMetadata.
      ja: normalize-17 が info-17（PDF 抽出 text）consume、pdf-partition-v3 適用→document-policy-v7（text/markdown, digest c7）/DocumentMetadata 产出。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      version: PDF extraction
    field_values:
      phase_id: normalize-17
      normalization_profile: pdf-partition-v3
      input_digest: sha256:file17
    related_node_ids: [NormalizationActivity, Document, DocumentMetadata]
    related_relation_ids: []
    source_claims: [claim-normalization-langchain]
  - id: NormalizationActivity-example-metadata-extract
    labels:
      zh: 元数据提取
      en: Metadata extraction
      ja: metadata 抽出
    descriptions:
      zh: normalization profile 从 loader metadata 提取 source、page、title 并写入 DocumentMetadata；LlamaIndex TextNode metadata 字段同步填充。
      en: Normalization profile extracts source, page, title from loader metadata into DocumentMetadata; LlamaIndex TextNode metadata fields filled likewise.
      ja: normalization profile が loader metadata から source/page/title 抽出→DocumentMetadata。LlamaIndex TextNode metadata も同様填充。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: metadata
    field_values:
      extracted_fields: [source, page, title]
    related_node_ids: [NormalizationActivity, DocumentMetadata]
    related_relation_ids: []
    source_claims: [claim-normalization-llamaindex]
  - id: NormalizationActivity-example-not-dedup
    labels:
      zh: 规范化非去重
      en: Normalization is not dedup
      ja: normalization は dedup ではない
    descriptions:
      zh: dedup-17 消费 document-policy-v7 并产出 decision-17；normalize-17 不查询 docstore 也不产生 outcome——阶段责任不可混用。
      en: dedup-17 consumes document-policy-v7 producing decision-17; normalize-17 queries no docstore and emits no outcome—phase responsibilities must not mix.
      ja: dedup-17 が document-policy-v7 consume→decision-17。normalize-17 は docstore 照会/outcome 生成なし。phase 責任混用不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [NormalizationActivity, DeduplicationActivity]
    related_relation_ids: []
    source_claims: [claim-normalization-design]
parent_relation:
  id: NormalizationActivity-is_a-IngestionPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种摄入阶段, en: is an ingestion phase, ja: 取込フェーズの一種}
  definitions:
    zh: NormalizationActivity 种差为消费 IngestibleInformation 并产出 canonical Document。
    en: NormalizationActivity differentia consumes IngestibleInformation and produces canonical Document.
    ja: NormalizationActivity 種差は IngestibleInformation consume→canonical Document 产出。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-normalization-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: NormalizationActivity-consumes-IngestibleInformation
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels: {zh: 消费可摄入信息, en: consumes ingestible information, ja: ingestible information を consume}
    definitions:
      zh: 规范化阶段 input manifest 明确包含目标 information_id 与 input_digest。
      en: Normalization phase input manifest explicitly includes target information_id and input_digest.
      ja: normalization phase input manifest が target information_id/input_digest を明示包含。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达。
      en: Relation constrained per fact.
      ja: fact 単位制約。
    inverse_reading:
      predicate: inverse_consumes
      labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-normalization-consumes]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:IngestibleInformation
sources:
  - id: src-langchain-docs
    title: LangChain Document Loaders
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: Document page_content and metadata normalization.
  - id: src-llamaindex-pipeline
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: Pre-chunk transformations.
  - id: src-normalization-design
    title: Moonweave normalization boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Normalization versus dedup separation.
source_claims:
  - id: claim-normalization-langchain
    source: src-langchain-docs
    supports: LangChain Documents carry page_content and metadata through normalization transforms.
    locator: Document
    evidence_kind: official
    confidence: high
  - id: claim-normalization-llamaindex
    source: src-llamaindex-pipeline
    supports: IngestionPipeline applies pre-chunk transformations including metadata handling.
    locator: transformations
    evidence_kind: official
    confidence: high
  - id: claim-normalization-design
    source: src-normalization-design
    supports: NormalizationActivity produces Document without dedup decisions.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-normalization-id
    source: src-normalization-design
    supports: phase_id identifies normalization phase within run.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-normalization-profile
    source: src-normalization-design
    supports: normalization_profile pins reusable parsing and cleanup configuration.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-normalization-input
    source: src-normalization-design
    supports: input_digest binds consumed information version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-normalization-consumes
    source: src-normalization-design
    supports: consumes relation requires manifest-backed information access.
    locator: consumes
    evidence_kind: design-inference
    confidence: high
