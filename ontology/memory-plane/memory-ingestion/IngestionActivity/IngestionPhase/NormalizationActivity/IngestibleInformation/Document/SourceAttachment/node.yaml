schema: moonweave.ai/ontology-node/v1
id: SourceAttachment
kind: concept
labels:
  zh: 来源附件
  en: Source attachment
  ja: ソース添付
semantics:
  short_definition:
    zh: 把 Document 绑定到具体 IngestibleResource 版本与 loader 调用的来源链接记录。
    en: Provenance link record binding Document to specific IngestibleResource version and loader invocation.
    ja: Document を特定 IngestibleResource 版/loader 呼出しに binding する来歴 link record。
  definition:
    zh: SourceAttachment 是由 attachment_id 标识、连接 Document 与 IngestibleResource 的信息记录，保存 resource_id、resource_version_ref、resource_content_digest、loader_version_ref 与 processing_status；类似 OpenAI vector-store file attachment 与 loader trace；不是 FileResource 或 IngestionRun。
    en: SourceAttachment is information identified by attachment_id linking Document to IngestibleResource, retaining resource_id, resource_version_ref, resource_content_digest, loader_version_ref, and processing_status; similar to loader traces; not FileResource or IngestionRun.
    ja: SourceAttachment は attachment_id 識別、Document-IngestibleResource を接続する information。resource_id/resource_version_ref/resource_content_digest/loader_version_ref/processing_status 保持。loader trace 類似。FileResource/IngestionRun ではない。
  why_needed:
    zh: 使 Document 可回答“从哪份资源、哪版、用哪个 loader 生成”，支持合规审计与 dedup 追溯。
    en: Lets Document answer which resource version and loader produced it, supporting compliance audit and dedup traceability.
    ja: Document が「どの resource 版/loader から生成か」に答え可能。compliance audit/dedup trace を支援。
  includes:
    - zh: 纳入 file/database/graph 来源 attachment 与 loader 处理状态。
      en: Includes file/database/graph source attachments and loader processing status.
      ja: file/database/graph source attachment/loader processing status。
  excludes:
    - zh: 排除 FileResource 实体、Document 正文与 DocumentLoader 能力定义。
      en: Excludes FileResource entity, Document body, and DocumentLoader capability definition.
      ja: FileResource entity/Document 本文/DocumentLoader capability 定義を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain metadata.source 提供弱链接；Moonweave SourceAttachment 强绑定 resource_version_ref 与 resource_content_digest；processing_status 跟踪 parsed/failed；loader_version_ref 记录实际 invoke 版本；Document has_source_attachment SourceAttachment 边表达绑定。
    en: LangChain metadata.source provides weak link; Moonweave SourceAttachment strongly binds resource_version_ref and resource_content_digest; processing_status tracks parsed/failed; loader_version_ref records actually invoked version; Document has_source_attachment SourceAttachment edge expresses binding.
    ja: LangChain metadata.source=弱 link。Moonweave SourceAttachment は resource_version_ref/resource_content_digest 強 binding。processing_status=parsed/failed 追跡。loader_version_ref=actual invoke 版。Document has_source_attachment edge。
  typical_input:
    - description: Loader trace binding resource to document
      format: |
        {
          "resource_id": "file-policy-v7",
          "loader_ref": "loader-pdf-v3@3.2.1",
          "bytes_read": 86412
        }
      source_claims: [claim-source-attachment-langchain]
  typical_output:
    - description: Moonweave source attachment record
      format: |
        {
          "attachment_id": "attachment-17",
          "document_id": "document-policy-v7",
          "resource_id": "file-policy-v7",
          "processing_status": "parsed"
        }
      source_claims: [claim-source-attachment-design]
  reference_implementations:
    - name: LangChain Document metadata source
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: metadata.source file path provenance.
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: File path metadata on loaded documents.
structure:
  identity_keys: [attachment_id]
  fields:
    - id: attachment_id
      labels: {zh: 附件标识, en: Attachment identifier, ja: attachment 識別子}
      definitions:
        zh: 稳定标识一次 Document 到 Resource 的来源链接记录。
        en: Stable identifier for one Document-to-Resource provenance link record.
        ja: 一 Document-Resource 来歴 link record の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attachment-17
      allowed_values: []
      source_claims: [claim-source-attachment-id]
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: document 識別子}
      definitions:
        zh: 所绑定的 Document document_id。
        en: Bound Document document_id.
        ja: binding 先 Document document_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: document-policy-v7
      allowed_values: []
      source_claims: [claim-source-attachment-doc]
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: resource 識別子}
      definitions:
        zh: 来源 IngestibleResource resource_id。
        en: Source IngestibleResource resource_id.
        ja: source IngestibleResource resource_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file-policy-v7
      allowed_values: []
      source_claims: [claim-source-attachment-resource]
    - id: resource_version_ref
      labels: {zh: 资源版本引用, en: Resource version reference, ja: resource 版 ref}
      definitions:
        zh: 读取时固定的来源资源 version_ref。
        en: Source resource version_ref fixed at read time.
        ja: read 時固定 source resource version_ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: object-version:7
      allowed_values: []
      source_claims: [claim-source-attachment-version]
    - id: resource_content_digest
      labels: {zh: 资源内容摘要, en: Resource content digest, ja: resource content digest}
      definitions:
        zh: 读取时资源的 content_digest，与 Document digest 区分。
        en: Resource content_digest at read time, distinct from Document digest.
        ja: read 時 resource content_digest。Document digest と区別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:file-policy-v7-bytes
      allowed_values: []
      source_claims: [claim-source-attachment-rdigest]
    - id: processing_status
      labels: {zh: 处理状态, en: Processing status, ja: processing status}
      definitions:
        zh: parsed、failed 或 quarantined 等 loader 处理结果状态。
        en: Loader processing outcome such as parsed, failed, or quarantined.
        ja: parsed/failed/quarantined 等 loader 処理結果 status。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: parsed
      allowed_values: []
      source_claims: [claim-source-attachment-status]
    - id: loader_version_ref
      labels: {zh: 加载器版本引用, en: Loader version reference, ja: loader 版 ref}
      definitions:
        zh: 实际 invoke 的 DocumentLoader 版本引用。
        en: Actually invoked DocumentLoader version reference.
        ja: 実際 invoke した DocumentLoader 版 ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: loader-pdf-v3@3.2.1
      allowed_values: []
      source_claims: [claim-source-attachment-loader]
    - id: created_at
      labels: {zh: 创建时间, en: Created at, ja: 作成時刻}
      definitions:
        zh: attachment 记录创建 UTC 时间。
        en: UTC time when attachment record was created.
        ja: attachment record 作成 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T10:01:00Z
      allowed_values: []
      source_claims: [claim-source-attachment-created]
  constraints:
    - id: source-attachment-belongs-to-document
      severity: error
      expression_language: plain
      expression: SourceAttachment.document_id must reference an existing Document; attachment cannot exist without document binding.
      explanation:
        zh: 来源链接必须依附 Document，不能独立存在。
        en: Provenance link must attach to Document and cannot exist independently.
        ja: 来歴 link は Document に付随必須。独立存在不可。
      source_claims: [claim-source-attachment-design]
    - id: source-attachment-describes-resource
      severity: error
      expression_language: plain
      expression: SourceAttachment must bind resource_id, resource_version_ref, and resource_content_digest together; partial resource identity is invalid.
      explanation:
        zh: 必须同时绑定资源 ID、版本与字节 digest，防止模糊来源。
        en: Must bind resource ID, version, and byte digest together to prevent ambiguous provenance.
        ja: resource ID/版/byte digest 同時 binding 必須。曖昧来歴防止。
      source_claims: [claim-source-attachment-design]
  required_relations: []
examples:
  - id: SourceAttachment-example-pdf-read
    labels:
      zh: PDF 读取来源附件
      en: PDF read source attachment
      ja: PDF read source attachment
    descriptions:
      zh: attachment-17 绑定 document-policy-v7←file-policy-v7@object-version:7，loader_version_ref=loader-pdf-v3@3.2.1，processing_status=parsed，created_at 与 ingest-run-17 loader trace 一致。
      en: attachment-17 binds document-policy-v7←file-policy-v7@object-version:7, loader_version_ref=loader-pdf-v3@3.2.1, processing_status=parsed, created_at matches ingest-run-17 loader trace.
      ja: attachment-17 が document-policy-v7←file-policy-v7@object-version:7 binding。loader_version_ref=loader-pdf-v3@3.2.1、parsed、created_at=ingest-run-17 loader trace 一致。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      version: load trace
    field_values:
      attachment_id: attachment-17
      document_id: document-policy-v7
      resource_id: file-policy-v7
      loader_version_ref: loader-pdf-v3@3.2.1
      processing_status: parsed
    related_node_ids: [SourceAttachment, Document, FileResource]
    related_relation_ids: []
    source_claims: [claim-source-attachment-langchain]
  - id: SourceAttachment-example-db-row
    labels:
      zh: 数据库行来源附件
      en: Database row source attachment
      ja: DB row source attachment
    descriptions:
      zh: attachment-42 绑定 document-clause-42←DatabaseRow public.clauses:42，resource_version_ref=schema-v4，loader_version_ref=loader-sql-v2@2.1。
      en: attachment-42 binds document-clause-42←DatabaseRow public.clauses:42, resource_version_ref=schema-v4, loader_version_ref=loader-sql-v2@2.1.
      ja: attachment-42 が document-clause-42←DatabaseRow public.clauses:42 binding。resource_version_ref=schema-v4、loader-sql-v2@2.1。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: DatabaseReader
    field_values:
      attachment_id: attachment-42
      resource_id: table-policy-clauses
    related_node_ids: [SourceAttachment, DatabaseRow, Document]
    related_relation_ids: []
    source_claims: [claim-source-attachment-llamaindex]
  - id: SourceAttachment-example-not-resource
    labels:
      zh: 附件非资源实体
      en: Attachment is not resource entity
      ja: attachment は resource entity ではない
    descriptions:
      zh: file-policy-v7 是 IngestibleResource；attachment-17 是 Document 与 file-policy-v7@digest 的链接记录——不能把 attachment 当作待读取资源。
      en: file-policy-v7 is IngestibleResource; attachment-17 is link record between Document and file-policy-v7@digest—attachment must not be treated as resource awaiting read.
      ja: file-policy-v7=IngestibleResource。attachment-17=Document と file-policy-v7@digest の link record。attachment を read 待ち resource と見なせない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [SourceAttachment, FileResource]
    related_relation_ids: []
    source_claims: [claim-source-attachment-design]
parent_relation:
  id: Document-has_source_attachment-SourceAttachment
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels: {zh: 文档具有来源附件, en: document has source attachment, ja: document が source attachment を持つ}
  definitions:
    zh: Document has_source_attachment SourceAttachment 表示该 Document 版本绑定特定来源 resource 与 loader 证据。
    en: Document has_source_attachment SourceAttachment means Document version binds specific source resource and loader evidence.
    ja: Document has_source_attachment SourceAttachment は Document 版が特定 source resource/loader evidence に binding。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达。
    en: Relation constrained per fact.
    ja: fact 単位制約。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-source-attachment-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-langchain-source
    title: LangChain Document metadata
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: metadata.source provenance fields.
  - id: src-llamaindex-provenance
    title: LlamaIndex Loading
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
    source_type: official-doc
    relevance: File path metadata on loaded documents.
  - id: src-source-attachment-design
    title: Moonweave source attachment boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Strong provenance link versus weak metadata.
source_claims:
  - id: claim-source-attachment-langchain
    source: src-langchain-source
    supports: LangChain metadata.source links documents to file paths; SourceAttachment strengthens with version and digest.
    locator: metadata.source
    evidence_kind: official
    confidence: high
  - id: claim-source-attachment-llamaindex
    source: src-llamaindex-provenance
    supports: LlamaIndex readers attach file path metadata to loaded documents.
    locator: metadata
    evidence_kind: official
    confidence: high
  - id: claim-source-attachment-design
    source: src-source-attachment-design
    supports: SourceAttachment binds document to resource version and loader invocation evidence.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-id
    source: src-source-attachment-design
    supports: attachment_id identifies provenance link record.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-doc
    source: src-source-attachment-design
    supports: document_id binds attachment to Document.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-resource
    source: src-source-attachment-design
    supports: resource_id points to source IngestibleResource.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-version
    source: src-source-attachment-design
    supports: resource_version_ref fixes source version at read time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-rdigest
    source: src-source-attachment-design
    supports: resource_content_digest binds source bytes at read time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-status
    source: src-source-attachment-design
    supports: processing_status records loader parse outcome.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-loader
    source: src-langchain-source
    supports: loader_version_ref records actually invoked loader version.
    locator: loader trace
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-attachment-created
    source: src-source-attachment-design
    supports: created_at timestamps attachment record creation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
