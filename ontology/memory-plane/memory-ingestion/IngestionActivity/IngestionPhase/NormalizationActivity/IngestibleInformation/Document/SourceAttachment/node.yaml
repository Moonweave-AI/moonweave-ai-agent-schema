schema: moonweave.ai/ontology-node/v1
id: SourceAttachment
kind: concept
status: accepted
labels:
  zh: 来源附件
  en: Source attachment
  ja: source attachment
semantics:
  short_definition:
    zh: 记录来源资源如何附着到文档的版本化信息。
    en: Versioned information recording how a source resource is attached to a document.
    ja: source resourceがdocumentへどうattachされるかを記録するversioned informationです。
  definition:
    zh: SourceAttachment 是连接一个 Document 与一个 IngestibleResource 的 IngestibleInformation，保存 attachment_id、资源引用、版本摘要与处理状态；它不是来源资源实体或文档元数据全集。
    en: SourceAttachment is IngestibleInformation linking one Document to one IngestibleResource and retaining attachment_id, resource reference, version digest, and processing status; it is not the source-resource entity or the whole DocumentMetadata record.
    ja: SourceAttachment は一 Document と一 IngestibleResource を結び attachment_id・resource参照・版digest・processing状態を保持する IngestibleInformation で、source-resource entityや DocumentMetadata 全体ではありません。
  why_needed:
    zh: 显式保存文档—来源资源的附着证据。
    en: Explicitly preserves document-to-source-resource attachment evidence.
    ja: document—source-resource attach evidenceを明示保持します。
  includes:
    - zh: 纳入文件附件、资源句柄与解析状态记录。
      en: Includes file attachments, resource handles, and parsing-status records.
      ja: file attachment・resource handle・parse状態recordを含みます。
  excludes:
    - zh: 排除 FileResource、Document 与通用元数据包。
      en: Excludes FileResource, Document, and generic metadata bundles.
      ja: FileResource・Document・一般metadata bundleを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - attachment_id
  fields:
    - id: attachment_id
      labels:
        zh: 附件标识
        en: attachment ID
        ja: attachment ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识附着记录。
        en: Stable identifier for the attachment record.
        ja: attachment recordの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: attachment-17
      source_claims:
        - claim-source-attachment-002
    - id: document_id
      labels:
        zh: 文档标识
        en: document ID
        ja: document ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识拥有这条来源附件记录的唯一 Document；附件随该文档版本存在，而不是资源端的固有属性。
        en: Identifies the one Document that owns this provenance attachment record; the attachment exists with that document version and is not an intrinsic property of the resource.
        ja: この provenance attachment record を所有する一 Document を識別し、attachment は document version と共に存在して resource 固有属性にはしません。
      allowed_values: []
      pattern: null
      example_value: document-policy-v7
      source_claims:
        - claim-source-attachment-003
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向附着来源资源。
        en: References the attached source resource.
        ja: attached source resourceを参照します。
      allowed_values: []
      pattern: null
      example_value: file-policy-v7
      source_claims:
        - claim-source-attachment-004
    - id: resource_version_ref
      labels:
        zh: 资源版本引用
        en: resource version reference
        ja: resource 版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用生成该文档时实际读取的资源逻辑版本或对象代次；它与内容摘要分别记录。
        en: References the resource's logical version or object generation actually read to form the document; it is recorded separately from the content digest.
        ja: document 生成時に実際に読み取った resource の logical version/object generation を参照し content digest と別に記録します。
      allowed_values: []
      pattern: null
      example_value: object-version:7
      source_claims:
        - claim-source-attachment-005
    - id: resource_content_digest
      labels:
        zh: 资源内容摘要
        en: resource content digest
        ja: resource content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录生成文档时所读取资源内容的算法标识与摘要值，用于发现同一版本引用下的字节漂移。
        en: Records the algorithm identifier and digest value over the resource content read to form the document, detecting byte drift behind the same version reference.
        ja: document 生成時に読んだ resource content の algorithm identifier/digest value を記録し、同一 version reference 背後の byte drift を検出します。
      allowed_values: []
      pattern: null
      example_value: "sha-256=:ZmlsZS1wb2xpY3ktdjc=:"
      source_claims:
        - claim-source-attachment-006
    - id: processing_status
      labels:
        zh: 处理状态
        en: processing status
        ja: processing status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该资源附件在形成当前文档版本时的处理结果状态，而不是资源自身的可用状态。
        en: Records the processing outcome of this resource attachment when forming the current document version, not the availability state of the resource itself.
        ja: current document version を形成した resource attachment の processing outcome を記録し resource 自身の availability state とは区別します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-source-attachment-007
    - id: loader_version_ref
      labels:
        zh: 加载器版本引用
        en: loader version reference
        ja: loader version reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行读取与解析的加载器实现版本，使同一资源版本的转换行为可重现。
        en: References the loader implementation version that performed reading and parsing so transformation behavior for the same resource version can be reproduced.
        ja: read/parse を実行した loader implementation version を参照し、同一 resource version の transformation behavior を再現可能にします。
      allowed_values: []
      pattern: null
      example_value: loader-pdf:3.2.1
      source_claims:
        - claim-source-attachment-008
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录来源附件事实被创建并绑定到该文档版本的时间点。
        en: Records when the source-attachment fact was created and bound to this document version.
        ja: source-attachment fact が作成され、この document version に結び付けられた時点を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:03:12Z
      source_claims:
        - claim-source-attachment-009
  constraints: []
  required_relation_constraints:
    - id: source-attachment-belongs-to-document
      direction: incoming
      predicate: has_source_attachment
      target_concept_id: Document
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条来源附件记录只属于一个明确的 Document 版本。
        en: Every source-attachment record belongs to exactly one identified Document version.
        ja: 各 source-attachment record は一つの identified Document version にだけ属します。
      source_claims:
        - claim-source-attachment-010
    - id: source-attachment-describes-resource
      direction: outgoing
      predicate: describes
      target_concept_id: IngestibleResource
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条来源附件必须描述一个由版本引用和内容摘要共同固定的 IngestibleResource。
        en: Every source attachment describes exactly one IngestibleResource pinned jointly by version reference and content digest.
        ja: 各 source attachment は version reference と content digest で共同固定された一 IngestibleResource を記述します。
      source_claims:
        - claim-source-attachment-011
examples:
  - id: SourceAttachment-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 来源附件正例
      en: "Positive case: Source attachment"
      ja: source attachment正例
    scenario_id: null
    descriptions:
      zh: attachment-17 以 attachment_id 识别，固定 document-policy-v7@c7、file-policy-v7@b7、处理状态 completed、loader 版本和创建时间。
      en: attachment-17 is identified by attachment ID and fixes document-policy-v7@c7, file-policy-v7@b7, processing status completed, loader version, and creation time.
      ja: attachment-17 は attachment ID で識別され document@c7、file@b7、processing status、loader version、時刻を固定します。
    field_values:
      attachment_id: attachment-17
      document_id: document-policy-v7
      resource_id: file-policy-v7
      resource_version_ref: object-version:7
      resource_content_digest: "sha-256=:ZmlsZS1wb2xpY3ktdjc=:"
      processing_status: completed
      loader_version_ref: loader-pdf:3.2.1
      created_at: 2026-07-16T10:03:12Z
    related_node_ids:
      - SourceAttachment
    related_relation_ids: []
    expected_result:
      zh: 将 attachment-17 表示为 SourceAttachment，并让 Document 与资源通过该独立来源记录连接。
      en: Represent attachment-17 as SourceAttachment and connect the Document and resource through this independent provenance record.
      ja: attachment-17 を SourceAttachment とし Document と resource を独立 provenance record で接続します。
    why_valid_or_invalid:
      zh: 连接记录拥有独立身份、精确两端版本、处理状态和加载证据，可在资源或文档更新后保留历史。
      en: The link record has independent identity, exact endpoint versions, processing status, and loading evidence and can retain history after resource or document updates.
      ja: link record は independent identity、exact endpoint versions、processing status、loading evidence を持ち更新後も履歴を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-source-attachment-012
  - id: SourceAttachment-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 来源附件边界例
      en: "Boundary case: Source attachment"
      ja: source attachment境界例
    scenario_id: null
    descriptions:
      zh: file-policy-v7 是被 attachment-17 描述的外部字节资源，只由路径和对象版本识别，不含 document_id 或处理状态。
      en: file-policy-v7 is the external byte resource described by attachment-17 and is identified only by path and object version; it contains no document ID or processing status.
      ja: file-policy-v7 は attachment-17 が記述する external byte resource で path・object version だけを持ち document ID・processing status はありません。
    field_values: {}
    related_node_ids:
      - SourceAttachment
    related_relation_ids: []
    expected_result:
      zh: 把 file-policy-v7 保持为 FileResource，并通过 describes 作为 attachment 的目标。
      en: Keep file-policy-v7 as FileResource and use it as the target of the attachment's describes relation.
      ja: file-policy-v7 は FileResource とし attachment describes relation の target にします。
    why_valid_or_invalid:
      zh: 资源实体与连接它到文档的来源记录具有不同身份；资源不能替代记录自身的处理与版本配对证据。
      en: The resource entity and the provenance record linking it to a Document have different identities; the resource cannot substitute for processing and version-pair evidence.
      ja: resource entity と provenance record は identity が異なり resource は processing・version-pair evidence を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-source-attachment-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Document-has_source_attachment-SourceAttachment
  predicate: has_source_attachment
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有来源附件
    en: has source attachment
    ja: source attachment を持つ
  definitions:
    zh: Document —has_source_attachment→ SourceAttachment 表示该文档版本组成一条独立、可审计的来源记录；记录固定唯一资源端点、来源逻辑版本、所读内容摘要、加载器版本、处理状态和创建时间。它不表示文档就是资源，也不表示仅因同处一次摄入运行就存在附件。
    en: Document —has_source_attachment→ SourceAttachment means that this document version composes an independent, auditable provenance record pinning one resource endpoint, source logical version, digest of content read, loader version, processing status, and creation time. It neither identifies the Document with the resource nor follows merely from participation in the same ingestion run.
    ja: Document —has_source_attachment→ SourceAttachment は、この document version が一つの resource endpoint・source logical version・読み取った content digest・loader version・processing status・creation time を固定する独立した監査可能 provenance record を構成することを表します。Document と resource の同一性や同一 ingestion run への参加だけを意味しません。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: source_attachment_of_document
    labels:
      zh: 是文档的来源附件
      en: is source attachment of document
      ja: document の source attachment である
  conditions:
    - id: Document-has_source_attachment-SourceAttachment-condition-001
      severity: error
      expression_language: plain
      expression: attachment.document_id equals source Document.document_id and attachment has exactly one resource_id, resource_version_ref, resource_content_digest, loader_version_ref, processing_status, and created_at
      explanations:
        zh: 附件必须回指当前文档，并完整固定资源版本、实际内容、处理实现与状态；仅有文件名或同批次共现不能建立该组成事实。
        en: The attachment must point back to the current Document and completely pin the resource version, actual content, processing implementation, and status; a filename or co-occurrence in one batch is insufficient.
        ja: attachment は current Document を指し、resource version・actual content・processing implementation・status を完全に固定する必要があり、filename や同一 batch の共起だけでは成立しません。
      source_claims:
        - claim-source-attachment-014
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: Document-has_source_attachment-SourceAttachment-example-positive-manual-001
      kind: positive
      labels:
        zh: 文档组成版本固定来源附件正例
        en: Document composes a version-pinned source attachment
        ja: Document が version-pinned source attachment を構成する正例
      scenario_id: null
      descriptions:
        zh: document-policy-v7 组成 attachment-17；附件回指 document-policy-v7，描述 file-policy-v7/object-version:7，保存字节摘要、loader-pdf:3.2.1、completed 与创建时间。
        en: document-policy-v7 composes attachment-17, which points back to document-policy-v7, describes file-policy-v7/object-version:7, and records the byte digest, loader-pdf:3.2.1, completed state, and creation time.
        ja: document-policy-v7 は attachment-17 を構成し、attachment は document-policy-v7 を指して file-policy-v7/object-version:7 と byte digest・loader-pdf:3.2.1・completed・creation time を記録します。
      field_values:
        document_id: document-policy-v7
        attachment_id: attachment-17
        resource_id: file-policy-v7
        resource_version_ref: object-version:7
        resource_content_digest: "sha-256=:ZmlsZS1wb2xpY3ktdjc=:"
        loader_version_ref: loader-pdf:3.2.1
        processing_status: completed
        created_at: 2026-07-16T10:03:12Z
      related_node_ids:
        - Document
        - SourceAttachment
      related_relation_ids:
        - Document-has_source_attachment-SourceAttachment
        - SourceAttachment-describes-IngestibleResource
      expected_result:
        zh: 建立 Document —has_source_attachment→ SourceAttachment，并在图谱主干中把附件显示为该文档的下一层信息节点。
        en: Assert Document —has_source_attachment→ SourceAttachment and display the attachment beneath that Document on the primary graph backbone.
        ja: Document —has_source_attachment→ SourceAttachment を assertion し、graph primary backbone で attachment を Document の下層に表示します。
      why_valid_or_invalid:
        zh: 附件的存在、身份和审计意义依赖特定文档版本，同时其资源端点由另一条 describes 事实保持独立；因此组成边与来源描述边没有重复表达。
        en: The attachment's existence, identity, and audit meaning depend on a particular Document version, while a separate describes fact preserves the independent resource endpoint; the composition and provenance-description edges do not duplicate one another.
        ja: attachment の存在・identity・audit meaning は特定 Document version に依存し、独立 resource endpoint は別の describes fact が保持するため composition と provenance-description は重複しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-attachment-015
        - claim-source-attachment-016
    - id: Document-has_source_attachment-SourceAttachment-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 同批次文件并非文档来源附件边界例
        en: A file in the same batch is not a Document source attachment
        ja: 同一 batch の file は Document source attachment ではない境界例
      scenario_id: null
      descriptions:
        zh: file-policy-v8 与 document-policy-v7 出现在同一 IngestionRun，但候选 attachment-18 的 document_id 指向 document-policy-v8，且 file digest 为 b8；它不能挂到 v7 文档下。
        en: file-policy-v8 appears in the same IngestionRun as document-policy-v7, but candidate attachment-18 points to document-policy-v8 and carries file digest b8; it cannot be composed beneath the v7 Document.
        ja: file-policy-v8 は document-policy-v7 と同一 IngestionRun に現れますが attachment-18 は document-policy-v8 と digest b8 を指すため v7 Document の下に構成できません。
      field_values:
        source_document_id: document-policy-v7
        attachment_document_id: document-policy-v8
        attachment_id: attachment-18
        resource_version_ref: object-version:8
        resource_content_digest: "sha-256=:Yjg=:"
      related_node_ids:
        - Document
        - SourceAttachment
      related_relation_ids:
        - Document-has_source_attachment-SourceAttachment
      expected_result:
        zh: 拒绝该 has_source_attachment 事实，并保留 attachment-18 对 document-policy-v8 的独立归属。
        en: Reject this has_source_attachment fact and preserve attachment-18's independent ownership by document-policy-v8.
        ja: has_source_attachment fact を拒否し attachment-18 の document-policy-v8 への独立 ownership を保持します。
      why_valid_or_invalid:
        zh: 批次共现和相同路径都不能替代 document_id、资源逻辑版本和内容摘要的一致性；否则来源记录会跨文档版本串线。
        en: Batch co-occurrence and a shared path cannot replace agreement on document ID, resource logical version, and content digest; otherwise provenance records would cross-wire Document versions.
        ja: batch co-occurrence/shared path は document ID・resource logical version・content digest の一致を代替できず、そうでなければ provenance record が Document version 間で cross-wire します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-attachment-017
  source_claims:
    - claim-source-attachment-018
    - claim-source-attachment-019
  distinct_fact_rationale:
    zh: 该边表达 SourceAttachment 对唯一 Document 版本的存在依赖；资源身份由 SourceAttachment-describes-IngestibleResource 单独表达，二者不能合并。
    en: This edge expresses SourceAttachment's existential dependence on one Document version; resource identity is expressed separately by SourceAttachment-describes-IngestibleResource and the two facts cannot be merged.
    ja: この edge は SourceAttachment の一 Document version への existential dependence を表し、resource identity は SourceAttachment-describes-IngestibleResource が別に表すため統合できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: SourceAttachment-describes-IngestibleResource
    predicate: describes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 描述来源资源
      en: describes source resource
      ja: source resourceを記述する
    definitions:
      zh: SourceAttachment —describes→ IngestibleResource 表示附件记录中的 resource_id、resource_version_ref 与 resource_content_digest 分别匹配目标资源的身份、版本引用与内容摘要。
      en: SourceAttachment —describes→ IngestibleResource states that resource_id, resource_version_ref, and resource_content_digest in the attachment record respectively match the target resource's identity, version reference, and content digest.
      ja: SourceAttachment —describes→ IngestibleResource は attachment record の resource_id・resource_version_ref・resource_content_digest が target resource の同一性・版参照・内容 digest とそれぞれ一致することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_describes
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: SourceAttachment-describes-IngestibleResource-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when attachment.resource_id, resource_version_ref, and resource_content_digest match the target resource's resource_id, version_ref, and content_digest.
        explanations:
          zh: 仅当附件的 resource_id、resource_version_ref 与 resource_content_digest 分别匹配目标资源的 resource_id、version_ref 与 content_digest 时成立。
          en: Assert only when the attachment's resource_id, resource_version_ref, and resource_content_digest respectively match the target resource's resource_id, version_ref, and content_digest.
          ja: attachment の resource_id・resource_version_ref・resource_content_digest が target resource の resource_id・version_ref・content_digest とそれぞれ一致する時だけ成立します。
        source_claims:
          - claim-source-attachment-020
          - claim-source-attachment-021
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SourceAttachment-describes-IngestibleResource-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 描述来源资源正例
          en: "Positive case: describes source resource"
          ja: source resourceを記述する正例
        scenario_id: null
        descriptions:
          zh: attachment-17 的 resource_ref 指向 file-policy-v7，记录 URI、object version 7 与 byte digest b7，三者均匹配该 FileResource。
          en: attachment-17's resource_ref points to file-policy-v7 and records URI, object version 7, and byte digest b7, all matching that FileResource.
          ja: attachment-17 resource_ref が file-policy-v7 を指し URI、object version、byte digest b7 が一致します。
        field_values: {}
        related_node_ids:
          - SourceAttachment
          - IngestibleResource
        related_relation_ids:
          - SourceAttachment-describes-IngestibleResource
        expected_result:
