schema: moonweave.ai/ontology-node/v1
id: Document
kind: concept
status: review
labels:
  zh: 文档
  en: Document
  ja: 文書
semantics:
  short_definition:
    zh: 具有稳定内容与元数据身份的规范化文档信息。
    en: Canonical document information with stable content and metadata identity.
    ja: 安定contentとmetadata同一性を持つcanonical document informationです。
  definition:
    zh: Document 是规范化后可由下游分块、检索或审计使用的 IngestibleInformation，由 document_id 与内容摘要标识并关联 DocumentMetadata；它不是原文件资源或一段 Chunk。
    en: Document is normalized IngestibleInformation usable by downstream chunking, retrieval, or audit, identified by document_id plus content digest and associated with DocumentMetadata; it is not the source file resource or one Chunk.
    ja: Document はdownstream chunking・retrieval・auditで使えるnormalized IngestibleInformationで document_id とcontent digestにより識別し DocumentMetadata を関連付け、source file resourceや一 Chunkではありません。
  why_needed:
    zh: 固定规范化输出身份并作为 TextDocument 上位类。
    en: Fixes normalized-output identity and serves as the parent of TextDocument.
    ja: normalized出力同一性を固定し TextDocument の親とします。
  includes:
    - zh: 纳入规范化文本、结构化文档与多模态文档信息。
      en: Includes normalized text, structured, and multimodal document information.
      ja: normalized text・structured・multimodal document informationを含みます。
  excludes:
    - zh: 排除 FileResource、Chunk 与 DocumentLoader。
      en: Excludes FileResource, Chunk, and DocumentLoader.
      ja: FileResource・Chunk・DocumentLoaderを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - document_id
  fields:
    - id: document_id
      labels:
        zh: 文档标识
        en: document ID
        ja: document ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识规范化文档。
        en: Stable identifier for the normalized document.
        ja: normalized documentの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: document-policy-v7
      source_claims:
        - claim-document-002
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定规范化内容版本。
        en: Fixes normalized-content version.
        ja: normalized-content版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-v7
      source_claims:
        - claim-document-003
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: media type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明规范化文档类型。
        en: Declares the normalized document media type.
        ja: normalized document media typeを宣言します。
      allowed_values: []
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-document-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: Document-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文档正例
      en: "Positive case: Document"
      ja: 文書正例
    scenario_id: null
    descriptions:
      zh: document-policy-v7 是 normalize-17 产出的规范信息对象，固定 UTF-8 正文摘要 c7、media_type=text/markdown、source attachment-17 与 metadata-document-17。
      en: document-policy-v7 is a normalized information object produced by normalize-17 that fixes UTF-8 content digest c7, media type text/markdown, source attachment-17, and metadata-document-17.
      ja: document-policy-v7 は normalize-17 が生成した normalized information object で UTF-8 content digest、media type、source attachment、metadata を固定します。
    field_values:
      document_id: document-policy-v7
      content_digest: sha256:document-policy-v7
      media_type: text/markdown
      information_id: info-document-policy-v7
      source_reference: attachment-17
    related_node_ids:
      - Document
    related_relation_ids: []
    expected_result:
      zh: 将 document-policy-v7 表示为 Document，并以规范内容版本而非源文件路径作为文档身份。
      en: Represent document-policy-v7 as Document and use the normalized content version rather than the source-file path as document identity.
      ja: document-policy-v7 を Document とし source-file path でなく normalized content version を identity とします。
    why_valid_or_invalid:
      zh: 对象可独立引用，具有规范内容、媒体类型、元数据与生成来源，并可作为后续去重和分块输入。
      en: The object is independently referable, has normalized content, media type, metadata, and generating provenance, and can feed downstream deduplication and chunking.
      ja: 独立参照可能で normalized content、media type、metadata、generating provenance を持ち downstream 処理へ渡せます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-document-005
  - id: Document-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文档边界例
      en: "Boundary case: Document"
      ja: 文書境界例
    scenario_id: null
    descriptions:
      zh: file-policy-v7 是位于 s3://policy-corpus/legal/policy.pdf 的 PDF 字节资源；它可被多次读取，但没有 normalize-17 形成的规范正文身份。
      en: file-policy-v7 is the PDF byte resource at s3://policy-corpus/legal/policy.pdf; it can be read repeatedly but has no normalized-content identity produced by normalize-17.
      ja: file-policy-v7 は S3 上の PDF byte resource で反復読取できますが normalize-17 が作る normalized-content identity を持ちません。
    field_values: {}
    related_node_ids:
      - Document
    related_relation_ids: []
    expected_result:
      zh: 把 file-policy-v7 保持为 FileResource，并通过来源关系连接到 Document。
      en: Keep file-policy-v7 as FileResource and connect it to the Document through provenance relations.
      ja: file-policy-v7 は FileResource とし provenance relation で Document へ接続します。
    why_valid_or_invalid:
      zh: 来源载体按定位符和字节版本识别，文档按规范内容与生成过程识别；二者可一对多演化。
      en: The source carrier is identified by locator and byte version, while the Document is identified by normalized content and generation process; they may evolve one-to-many.
      ja: source carrier は locator・byte version、Document は normalized content・generation process で識別され一対多に発展し得ます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-document-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Document-is_a-IngestibleInformation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Document 是 IngestibleInformation 的严格子类；种差为：已被加载并规范化为可供下游使用的内容与元数据记录。
    en: "Document is a strict subtype of IngestibleInformation; its reviewed differentia is: it has been loaded and normalized into content plus metadata usable downstream."
    ja: Document は IngestibleInformation の厳密なsubtypeで、審査済み種差は「loadされdownstream利用可能なcontent+metadata recordへnormalizedされています。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: Document-is_a-IngestibleInformation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestibleInformation and also satisfies the differentia: it has been loaded and normalized into content plus metadata usable downstream."
      explanations:
        zh: 仅当对象首先满足 IngestibleInformation 定义且满足种差“已被加载并规范化为可供下游使用的内容与元数据记录。”时成立。
        en: "Assert only when the object first satisfies IngestibleInformation and also satisfies the differentia: it has been loaded and normalized into content plus metadata usable downstream."
        ja: 対象がまず IngestibleInformation を満たし、さらに種差「loadされdownstream利用可能なcontent+metadata recordへnormalizedされています。」を満たす時だけ成立します。
      source_claims:
        - claim-document-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Document-is_a-IngestibleInformation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: document-policy-v7 先具有可独立引用的规范内容摘要、media type 与来源，再满足可交给去重和分块处理的 IngestibleInformation 条件。
        en: document-policy-v7 has independently referable normalized content, media type, and provenance and satisfies the IngestibleInformation conditions for downstream deduplication and chunking.
        ja: document-policy-v7 は normalized content、media type、provenance を持ち downstream 処理可能な IngestibleInformation 条件を満たします。
      field_values: {}
      related_node_ids:
        - Document
        - IngestibleInformation
      related_relation_ids:
        - Document-is_a-IngestibleInformation
      expected_result:
        zh: 确认 document-policy-v7 同时属于 Document 和 IngestibleInformation。
        en: Confirm document-policy-v7 as both Document and IngestibleInformation.
        ja: document-policy-v7 を Document と IngestibleInformation の両方に所属させます。
      why_valid_or_invalid:
        zh: 对象满足内容身份和可处理信息上位条件，并以规范化形式、元数据与生成来源形成 Document 种差。
        en: The object satisfies the parent content-identity and processability conditions and adds normalized form, metadata, and generation provenance as Document differentia.
        ja: content identity・processability parent 条件を満たし normalized form・metadata・provenance を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-document-007
    - id: Document-is_a-IngestibleInformation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: file-policy-v7 仍是未读取的外部 PDF 字节对象，只有定位符、对象版本和字节摘要，没有规范文档正文。
        en: file-policy-v7 remains an unread external PDF byte object with locator, object version, and byte digest but no normalized Document content.
        ja: file-policy-v7 は unread external PDF bytes で locator、object version、byte digest だけを持ち normalized content がありません。
      field_values: {}
      related_node_ids:
        - Document
        - IngestibleInformation
      related_relation_ids:
        - Document-is_a-IngestibleInformation
      expected_result:
        zh: 不要通过该子类边把 file-policy-v7 归为 Document。
        en: Do not use this subtype edge to classify file-policy-v7 as Document.
        ja: この subtype edge で file-policy-v7 を Document に分類しません。
      why_valid_or_invalid:
        zh: 资源可被读取不等于已经成为信息；Document 成员资格要求读取和规范化后形成的内容身份。
        en: Being readable does not mean a resource is already information; Document membership requires content identity formed after reading and normalization.
        ja: readable resource は information ではなく Document membership は reading・normalization 後の content identity を要します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-document-007
  source_claims:
    - claim-document-007
