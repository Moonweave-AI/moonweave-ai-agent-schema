schema: moonweave.ai/ontology-node/v1
id: Document
kind: concept
labels:
  zh: 文档
  en: Document
  ja: ドキュメント
semantics:
  short_definition:
    zh: 具有稳定正文与元数据身份的规范化文档信息。
    en: Normalized document information with stable body and metadata identity.
    ja: 安定本文/metadata identity を持つ normalized document information。
  definition:
    zh: Document 是 normalization 后可被 dedup、chunking 或检索使用的 IngestibleInformation，由 document_id 与 content_digest 标识，关联 DocumentMetadata 与 SourceAttachment；对应 LangChain Document(page_content, metadata) 与 LlamaIndex TextNode/Document；不是 FileResource 或 Chunk。
    en: Document is IngestibleInformation after normalization usable by dedup, chunking, or retrieval, identified by document_id and content_digest with DocumentMetadata and SourceAttachment, mapping to LangChain Document(page_content, metadata) and LlamaIndex TextNode/Document; not FileResource or Chunk.
    ja: Document は normalization 後 dedup/chunking/retrieval に使える IngestibleInformation。document_id/content_digest 識別、DocumentMetadata/SourceAttachment 関連。LangChain Document(page_content, metadata)/LlamaIndex TextNode/Document に対応。FileResource/Chunk ではない。
  why_needed:
    zh: 固定规范化输出身份，作为 TextDocument 上位类与 ingest handoff 的核心产物。
    en: Fixes normalized output identity as parent of TextDocument and core ingest handoff artifact.
    ja: normalized 出力 identity を固定し TextDocument 親/ingest handoff 核心 artifact とする。
  includes:
    - zh: 纳入规范化文本、结构化与多模态文档信息（TextDocument 为文本子类）。
      en: Includes normalized text, structured, and multimodal document information (TextDocument as text subtype).
      ja: normalized text/structured/multimodal document information（TextDocument は text subtype）。
  excludes:
    - zh: 排除 FileResource、Chunk 与 DocumentLoader。
      en: Excludes FileResource, Chunk, and DocumentLoader.
      ja: FileResource/Chunk/DocumentLoader を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain Document 以 page_content+metadata 承载正文与来源；LlamaIndex TextNode 增加 node_id 与 relationships；Moonweave document_id 稳定 lineage，content_digest 变更必须对应新版本；dedup 绑定 digest 而非仅 business id。
    en: LangChain Document carries body and provenance via page_content+metadata; LlamaIndex TextNode adds node_id and relationships; Moonweave document_id stabilizes lineage—content_digest change must map to new version; dedup binds digest not business id alone.
    ja: LangChain Document が page_content+metadata で本文/来歴。LlamaIndex TextNode は node_id/relationships 追加。Moonweave document_id で lineage 安定、content_digest 変更→新版必須。dedup は business id だけでなく digest binding。
  typical_input:
    - description: LangChain Document from loader
      format: |
        Document(page_content="Section 1...", metadata={"source": "policy.pdf", "page": 3})
      source_claims: [claim-document-langchain]
    - description: LlamaIndex TextNode
      format: |
        TextNode(text="Section 1...", metadata={"source": "policy.pdf"}, id_="node-001")
      source_claims: [claim-document-llamaindex]
  typical_output:
    - description: Moonweave canonical document handoff
      format: |
        {
          "document_id": "document-policy-v7",
          "content_digest": "7333d79d...",
          "media_type": "text/markdown"
        }
      source_claims: [claim-document-design]
  reference_implementations:
    - name: LangChain Document
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: page_content and metadata fields.
    - name: LlamaIndex TextNode
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Text nodes with metadata for indexing.
structure:
  identity_keys: [document_id]
  fields:
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: document 識別子}
      definitions:
        zh: 稳定标识规范化文档 lineage；同 id 不同 digest 必须为新版。
        en: Stable normalized document lineage identifier; same id with different digest must be new version.
        ja: normalized document lineage 安定識別子。同 id で digest 異なれば新版必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: document-policy-v7
      allowed_values: []
      source_claims: [claim-document-id]
    - id: content_digest
      labels: {zh: 内容摘要, en: Content digest, ja: content digest}
      definitions:
        zh: 规范化正文 SHA-256 等 digest；dedup 必须绑定此值。
        en: SHA-256 or similar digest of normalized body; dedup must bind this value.
        ja: normalized 本文 SHA-256 等 digest。dedup は当値 binding 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:document-policy-v7
      allowed_values: []
      source_claims: [claim-document-digest]
    - id: media_type
      labels: {zh: 媒体类型, en: Media type, ja: media type}
      definitions:
        zh: 规范化后的 MIME 类型（如 text/markdown、text/plain）。
        en: Normalized MIME type (e.g., text/markdown, text/plain).
        ja: normalized 後 MIME type（text/markdown/text/plain 等）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: text/markdown
      allowed_values: []
      source_claims: [claim-document-media]
  constraints: []
  required_relations: []
examples:
  - id: Document-example-langchain
    labels:
      zh: LangChain Document 映射
      en: LangChain Document mapping
      ja: LangChain Document mapping
    descriptions:
      zh: normalize-17 产出 document-policy-v7：page_content 映射为规范化 Markdown digest c7，metadata 写入 DocumentMetadata，source 回指 file-policy-v7 SourceAttachment。
      en: "normalize-17 produces document-policy-v7 — page_content maps to normalized Markdown digest c7, metadata to DocumentMetadata, source back to file-policy-v7 SourceAttachment."
      ja: normalize-17→document-policy-v7。page_content→Markdown digest c7、metadata→DocumentMetadata、source→file-policy-v7 SourceAttachment。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/how_to/document_loader/
      version: Document
    field_values:
      document_id: document-policy-v7
      content_digest: sha256:document-policy-v7
      media_type: text/markdown
    related_node_ids: [Document, DocumentMetadata, SourceAttachment]
    related_relation_ids: []
    source_claims: [claim-document-langchain]
  - id: Document-example-llamaindex-textnode
    labels:
      zh: LlamaIndex TextNode 映射
      en: LlamaIndex TextNode mapping
      ja: LlamaIndex TextNode mapping
    descriptions:
      zh: IngestionPipeline 在 chunk 前 TextNode 与 Document 同构；document-policy-v7 对应 node id 与 metadata，chunk 后进入下游模块不在 ingest 层持久化。
      en: Before chunking IngestionPipeline TextNode is isomorphic to Document; document-policy-v7 maps node id and metadata; post-chunk persistence belongs to downstream modules not ingest layer.
      ja: chunk 前 IngestionPipeline TextNode≒Document。document-policy-v7 が node id/metadata に対応。chunk 後永続化は downstream module（ingest 層外）。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: TextNode
    field_values:
      document_id: document-policy-v7
      node_id: node-policy-001
    related_node_ids: [Document, TextDocument]
    related_relation_ids: []
    source_claims: [claim-document-llamaindex]
  - id: Document-example-not-file
    labels:
      zh: 文档非源文件
      en: Document is not source file
      ja: document は source file ではない
    descriptions:
      zh: file-policy-v7 按 URI 与字节 digest 识别；document-policy-v7 按规范化内容与生成过程识别——一对多演化允许同一文件产生多版 Document。
      en: file-policy-v7 identified by URI and byte digest; document-policy-v7 by normalized content and generation process—one-to-many evolution allows multiple Document versions from one file.
      ja: file-policy-v7 は URI/byte digest 識別。document-policy-v7 は normalized content/生成 process 識別。一 file から多版 Document 可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [Document, FileResource]
    related_relation_ids: []
    source_claims: [claim-document-design]
parent_relation:
  id: Document-is_a-IngestibleInformation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入信息, en: is ingestible information, ja: 取込可能情報の一種}
  definitions:
    zh: Document 种差为已 load 并 normalized 成 downstream 可用 content+metadata 记录。
    en: Document differentia is loaded and normalized content+metadata record usable downstream.
    ja: Document 種差は load+normalized 済 downstream 利用可能 content+metadata record。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-document-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-langchain-document
    title: LangChain Document
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: page_content and metadata structure.
  - id: src-llamaindex-node
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: TextNode document representation.
  - id: src-document-design
    title: Moonweave document boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Document versus FileResource separation.
source_claims:
  - id: claim-document-langchain
    source: src-langchain-document
    supports: LangChain Document combines page_content and metadata as normalized information artifact.
    locator: Document
    evidence_kind: official
    confidence: high
  - id: claim-document-llamaindex
    source: src-llamaindex-node
    supports: LlamaIndex TextNode represents document text with metadata for ingestion pipeline.
    locator: TextNode
    evidence_kind: official
    confidence: high
  - id: claim-document-design
    source: src-document-design
    supports: Document identity forms after normalization distinct from source file resource.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-document-id
    source: src-document-design
    supports: document_id stabilizes document lineage across versions.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-document-digest
    source: src-document-design
    supports: content_digest binds normalized body for dedup and audit.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-document-media
    source: src-langchain-document
    supports: media_type declares normalized document interpretation for downstream processing.
    locator: metadata
    evidence_kind: official
    confidence: high
