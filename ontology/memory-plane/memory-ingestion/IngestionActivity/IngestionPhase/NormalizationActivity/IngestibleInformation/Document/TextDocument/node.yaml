schema: moonweave.ai/ontology-node/v1
id: TextDocument
kind: concept
labels:
  zh: 文本文档
  en: Text document
  ja: テキストドキュメント
semantics:
  short_definition:
    zh: 以字符集与语言标识的纯文本文档特化。
    en: Pure text document specialization identified by charset and language.
    ja: charset/language で識別する pure text document 特化。
  definition:
    zh: TextDocument 是 media_type 为 text/* 的 Document 子类，额外记录 charset 与 language，对应 LangChain Document page_content 文本与 LlamaIndex TextNode.text；不是二进制 Document 或 Chunk。
    en: TextDocument is a Document subtype with media_type text/* additionally recording charset and language, mapping to LangChain Document page_content text and LlamaIndex TextNode.text; not binary Document or Chunk.
    ja: TextDocument は media_type text/* の Document subtype。charset/language 追加記録。LangChain Document page_content/LlamaIndex TextNode.text に対応。binary Document/Chunk ではない。
  why_needed:
    zh: 为文本 corpus ingest 与语言感知 policy 提供类型化文档，区分 text/plain 与 text/markdown 等。
    en: Provides typed document for text corpus ingest and language-aware policy, distinguishing text/plain versus text/markdown etc.
    ja: text corpus ingest/language-aware policy 用 typed document。text/plain/text/markdown 等を区別。
  includes:
    - zh: 纳入 text/plain、text/markdown、text/html 提取文本等。
      en: Includes text/plain, text/markdown, extracted text/html, etc.
      ja: text/plain/text/markdown/text/html 抽出 text 等。
  excludes:
    - zh: 排除 application/pdf 二进制 Document、图像 OCR 前二进制与 Chunk。
      en: Excludes binary application/pdf Documents, pre-OCR image binaries, and Chunk.
      ja: binary application/pdf Document/OCR 前 image binary/Chunk を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: SimpleDirectoryReader 加载 .md/.txt 产生 TextDocument；charset 默认 UTF-8；language 可由 normalization profile 或 detector 填充；TextCorpus 成员通常为 TextDocument。
    en: SimpleDirectoryReader loads .md/.txt into TextDocument; charset defaults UTF-8; language filled by normalization profile or detector; TextCorpus members are typically TextDocument.
    ja: SimpleDirectoryReader が .md/.txt→TextDocument。charset 默认 UTF-8。language は normalization profile/detector 填充。TextCorpus member は通常 TextDocument。
  typical_input:
    - description: UTF-8 markdown file normalized to text document
      format: |
        {"media_type": "text/markdown", "charset": "UTF-8", "language": "en"}
      source_claims: [claim-text-document-llamaindex]
  typical_output:
    - description: Moonweave text document identity
      format: |
        {
          "document_id": "document-policy-v7",
          "charset": "UTF-8",
          "language": "en",
          "media_type": "text/markdown"
        }
      source_claims: [claim-text-document-design]
  reference_implementations:
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: Text file loading into documents.
    - name: LangChain Document
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: Text page_content in documents.
structure:
  identity_keys: [document_id]
  fields:
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: document 識別子}
      definitions:
        zh: 继承 Document document_id。
        en: Inherits Document document_id.
        ja: Document document_id を継承。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: document-policy-v7
      allowed_values: []
      source_claims: [claim-text-document-id]
    - id: charset
      labels: {zh: 字符集, en: Character set, ja: charset}
      definitions:
        zh: 规范化文本编码（通常 UTF-8）。
        en: Normalized text encoding (usually UTF-8).
        ja: normalized text encoding（通常 UTF-8）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: UTF-8
      allowed_values: []
      source_claims: [claim-text-document-charset]
    - id: language
      labels: {zh: 语言, en: Language, ja: language}
      definitions:
        zh: BCP 47 或 ISO 639 语言标签；未知时为 und。
        en: BCP 47 or ISO 639 language tag; und when unknown.
        ja: BCP 47/ISO 639 language tag。未知時 und。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: en
      allowed_values: []
      source_claims: [claim-text-document-language]
  constraints: []
  required_relations: []
examples:
  - id: TextDocument-example-markdown
    labels:
      zh: Markdown 文本文档
      en: Markdown text document
      ja: Markdown text document
    descriptions:
      zh: document-policy-v7 media_type=text/markdown、charset=UTF-8、language=en；来自 file-policy-v7 PDF 提取后 normalize。
      en: document-policy-v7 has media_type=text/markdown, charset=UTF-8, language=en; normalized from file-policy-v7 PDF extraction.
      ja: document-policy-v7：text/markdown、UTF-8、en。file-policy-v7 PDF 抽出後 normalize。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      version: text extraction
    field_values:
      document_id: document-policy-v7
      charset: UTF-8
      language: en
      media_type: text/markdown
    related_node_ids: [TextDocument, Document]
    related_relation_ids: []
    source_claims: [claim-text-document-langchain]
  - id: TextDocument-example-corpus-member
    labels:
      zh: 语料库文本成员
      en: Corpus text member
      ja: corpus text member
    descriptions:
      zh: corpus-legal-2026 的 128 成员均为 TextDocument（.md/.txt）；ingest-policy@4 限定 text/* media_type。
      en: All 128 members of corpus-legal-2026 are TextDocument (.md/.txt); ingest-policy@4 limits text/* media_type.
      ja: corpus-legal-2026 の 128 member すべて TextDocument（.md/.txt）。ingest-policy@4 が text/* 限定。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      version: text corpus
    field_values:
      corpus_id: corpus-legal-2026
      member_count: 128
    related_node_ids: [TextDocument, TextCorpus]
    related_relation_ids: []
    source_claims: [claim-text-document-llamaindex]
  - id: TextDocument-example-not-binary
    labels:
      zh: 文本非二进制文档
      en: Text is not binary document
      ja: text は binary document ではない
    descriptions:
      zh: 未提取的 application/pdf 字节是 FileResource；TextDocument 要求已规范化为 text/* 正文与 charset 声明。
      en: Unextracted application/pdf bytes are FileResource; TextDocument requires normalized text/* body with charset declaration.
      ja: 未抽出 application/pdf byte は FileResource。TextDocument は text/* 本文+charset 宣言必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [TextDocument, FileResource]
    related_relation_ids: []
    source_claims: [claim-text-document-design]
parent_relation:
  id: TextDocument-is_a-Document
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种文档, en: is a document, ja: ドキュメントの一種}
  definitions:
    zh: TextDocument 种差为 text/* media_type 与 charset/language 文本特化。
    en: TextDocument differentia is text/* media_type with charset/language text specialization.
    ja: TextDocument 種差は text/* media_type+charset/language text 特化。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-text-document-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-sdr
    title: SimpleDirectoryReader
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
    source_type: official-doc
    relevance: Text file document loading.
  - id: src-langchain-document
    title: LangChain Document
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: Text page_content representation.
  - id: src-text-document-design
    title: Moonweave text document boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Text versus binary document separation.
source_claims:
  - id: claim-text-document-llamaindex
    source: src-llamaindex-sdr
    supports: SimpleDirectoryReader produces text documents from .md and .txt files.
    locator: SimpleDirectoryReader
    evidence_kind: official
    confidence: high
  - id: claim-text-document-langchain
    source: src-langchain-document
    supports: LangChain Document page_content carries normalized text body.
    locator: page_content
    evidence_kind: official
    confidence: high
  - id: claim-text-document-design
    source: src-text-document-design
    supports: TextDocument requires normalized text/* body distinct from binary file resource.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-document-id
    source: src-text-document-design
    supports: document_id inherited from Document lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-document-charset
    source: src-text-document-design
    supports: charset records normalized text encoding.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-document-language
    source: src-text-document-design
    supports: language tag supports language-aware ingest policy.
    locator: structure
    evidence_kind: design-inference
    confidence: high
