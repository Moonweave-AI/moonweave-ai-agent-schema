schema: moonweave.ai/ontology-node/v1
id: TextDocument
kind: concept
status: accepted
labels:
  zh: 文本文档
  en: Text document
  ja: テキスト文書
semantics:
  short_definition:
    zh: 主要内容按字符编码解释的 Document。
    en: A Document whose primary content is interpreted under a character encoding.
    ja: 主要contentをcharacter encodingで解釈する Document です。
  definition:
    zh: TextDocument 是主要载荷为可解码文本并声明字符集/语言的 Document；它不是所有 Document 的平级根，也不是 FileResource 或 Chunk。
    en: TextDocument is a Document whose primary payload is decodable text with declared charset or language; it is not a flat root beside all Documents and is not FileResource or Chunk.
    ja: TextDocument は主要payloadがdecode可能textでcharset/languageを宣言する Document で、全Documentと並ぶflat rootでも FileResource/Chunkでもありません。
  why_needed:
    zh: 修复 TextDocument 漏根并建立 Document→TextDocument。
    en: Fixes the leaked TextDocument root by establishing Document-to-TextDocument.
    ja: 漏れたTextDocument rootを修正し Document→TextDocumentを確立します。
  includes:
    - zh: 纳入纯文本、Markdown、HTML 提取文本与代码文档。
      en: Includes plain text, Markdown, extracted HTML text, and code documents.
      ja: plain text・Markdown・HTML抽出text・code documentを含みます。
  excludes:
    - zh: 排除音频二进制、FileResource 和文本 Chunk。
      en: Excludes audio binaries, FileResource, and text Chunk.
      ja: audio binary・FileResource・text Chunkを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - document_id
  fields:
    - id: document_id
      labels:
        zh: 文档标识
        en: document ID
        ja: document ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识文本文档。
        en: Stable identifier for the text document.
        ja: text documentの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: text-document-17
      source_claims:
        - claim-text-document-002
    - id: charset
      labels:
        zh: 字符集
        en: charset
        ja: charset
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明文本解码字符集。
        en: Declares text-decoding charset.
        ja: text decode charsetを宣言します。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-text-document-003
    - id: language
      labels:
        zh: 语言
        en: language
        ja: 言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录主要自然语言。
        en: Records the primary natural language.
        ja: 主要自然言語を記録します。
      allowed_values: []
      pattern: null
      example_value: zh-CN
      source_claims:
        - claim-text-document-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: TextDocument-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文本文档正例
      en: "Positive case: Text document"
      ja: テキスト文書正例
    scenario_id: null
    descriptions:
      zh: text-document-17 是 document-policy-v7 的文本特化，primary payload 为可直接解码的 UTF-8 字符序列，声明 charset=UTF-8、language=zh-CN 与正文摘要 c7。
      en: text-document-17 is a textual specialization of document-policy-v7 whose primary payload is a directly decodable UTF-8 character sequence and declares charset UTF-8, language zh-CN, and content digest c7.
      ja: text-document-17 は Document の text specialization で primary payload が UTF-8 character sequence、charset、language、digest を宣言します。
    field_values:
      document_id: text-document-17
      charset: utf-8
      language: zh-CN
      content_digest: sha256:document-policy-v7
      media_type: text/markdown
      information_id: info-document-policy-v7
      source_reference: attachment-17
    related_node_ids:
      - TextDocument
    related_relation_ids: []
    expected_result:
      zh: 将 text-document-17 同时表示为 TextDocument 与 Document，并以主要载荷类型作为种差。
      en: Represent text-document-17 as both TextDocument and Document and use primary-payload type as the differentiating condition.
      ja: text-document-17 を TextDocument と Document の両方とし primary-payload type を differentia とします。
    why_valid_or_invalid:
      zh: 对象先满足规范文档身份，再以可直接解码的文本载荷、字符集和语言信息区别于其他媒体文档。
      en: The object first satisfies normalized Document identity and is then distinguished from other media Documents by directly decodable text payload, charset, and language.
      ja: normalized Document identity を満たし directly decodable text payload、charset、language で他 media document と区別されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-document-005
  - id: TextDocument-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文本文档边界例
      en: "Boundary case: Text document"
      ja: テキスト文書境界例
    scenario_id: null
    descriptions:
      zh: audio-document-17 的 primary payload 是 audio/wav 字节，附带 transcript-17 仅作为派生文本附件；音频正文不能按 charset 直接解码。
      en: audio-document-17 has audio/wav bytes as its primary payload and transcript-17 only as a derived text attachment; the audio body cannot be directly decoded by a charset.
      ja: audio-document-17 の primary payload は audio/wav bytes で transcript は derived attachment にすぎず charset で直接 decode できません。
    field_values: {}
    related_node_ids:
      - TextDocument
    related_relation_ids: []
    expected_result:
      zh: 把 audio-document-17 保持为非文本 Document，单独表示其 transcript。
      en: Keep audio-document-17 as a non-text Document and represent its transcript separately.
      ja: audio-document-17 は non-text Document とし transcript は別に表します。
    why_valid_or_invalid:
      zh: 拥有文本附件不等于主要内容是文本；TextDocument 的种差约束 primary payload，而不是任意关联字段。
      en: Having a text attachment does not make the primary content textual; TextDocument constrains the primary payload rather than any associated field.
      ja: text attachment 所有は primary content が text であることを意味せず TextDocument は primary payload を制約します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-document-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: TextDocument-is_a-Document
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TextDocument 是 Document 的严格子类；种差为：主要载荷是声明字符集或语言的可解码文本。
    en: "TextDocument is a strict subtype of Document; its reviewed differentia is: its primary payload is decodable text with declared charset or language."
    ja: TextDocument は Document の厳密なsubtypeで、審査済み種差は「主要payloadが宣言charset/languageを持つdecode可能textです。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: TextDocument-is_a-Document-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies Document and also satisfies the differentia: its primary payload is decodable text with declared charset or language."
      explanations:
        zh: 仅当对象首先满足 Document 定义且满足种差“主要载荷是声明字符集或语言的可解码文本。”时成立。
        en: "Assert only when the object first satisfies Document and also satisfies the differentia: its primary payload is decodable text with declared charset or language."
        ja: 対象がまず Document を満たし、さらに種差「主要payloadが宣言charset/languageを持つdecode可能textです。」を満たす時だけ成立します。
      source_claims:
        - claim-text-document-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TextDocument-is_a-Document-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: text-document-17 先具有 Document 的规范内容、metadata 与 provenance，再声明 primary_media_type=text/plain、charset=UTF-8、language=zh-CN，正文可直接解码。
        en: text-document-17 first has normalized content, metadata, and provenance required by Document and then declares primary media type text/plain, charset UTF-8, language zh-CN, and directly decodable content.
        ja: text-document-17 は Document 条件を満たし primary media type text/plain、charset、language、directly decodable content を宣言します。
      field_values: {}
      related_node_ids:
        - TextDocument
        - Document
      related_relation_ids:
        - TextDocument-is_a-Document
      expected_result:
        zh: 确认 text-document-17 同时属于 TextDocument 与 Document。
        en: Confirm text-document-17 as both TextDocument and Document.
        ja: text-document-17 を TextDocument と Document の両方に所属させます。
      why_valid_or_invalid:
        zh: 对象满足文档上位条件，并以主要载荷为字符序列及明确字符集和语言构成文本种差。
        en: The object satisfies the Document parent and adds a character-sequence primary payload with explicit charset and language as TextDocument differentia.
        ja: Document parent を満たし character-sequence primary payload、charset、language を TextDocument differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-text-document-007
    - id: TextDocument-is_a-Document-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: audio-document-17 满足 Document，但 primary_media_type=audio/wav；transcript-17 只是关联的派生 TextDocument，不改变音频主要载荷。
        en: audio-document-17 satisfies Document but has primary media type audio/wav; transcript-17 is only an associated derived TextDocument and does not change the audio primary payload.
        ja: audio-document-17 は Document だが primary media type は audio/wav で transcript は associated derived TextDocument です。
      field_values: {}
      related_node_ids:
        - TextDocument
        - Document
      related_relation_ids:
        - TextDocument-is_a-Document
      expected_result:
        zh: 不要因为存在 transcript 就把 audio-document-17 归为 TextDocument。
        en: Do not classify audio-document-17 as TextDocument merely because a transcript exists.
        ja: transcript existence だけで audio-document-17 を TextDocument に分類しません。
      why_valid_or_invalid:
        zh: 文本种差约束文档的主要载荷，而不是任意附件；关联文本不能改变源文档的媒体身份。
        en: The textual differentia constrains the Document's primary payload rather than arbitrary attachments; associated text cannot change source media identity.
        ja: text differentia は primary payload を制約し attachment text は source media identity を変えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-text-document-007
  source_claims:
    - claim-text-document-007
