schema: moonweave.ai/ontology-node/v1
id: DocumentMetadata
kind: concept
labels:
  zh: 文档元数据
  en: Document metadata
  ja: ドキュメントメタデータ
semantics:
  short_definition:
    zh: 描述 Document 来源与属性的结构化元信息记录。
    en: Structured metadata record describing Document provenance and attributes.
    ja: Document 来歴/属性を記述する structured metadata record。
  definition:
    zh: DocumentMetadata 是由 metadata_id 标识、绑定一个 Document 的键值元信息（source_uri、title、page、author 等），来自 normalization 阶段 metadata 提取；对应 LangChain Document.metadata 与 LlamaIndex node metadata；不是 Document 正文或 FileResource。
    en: DocumentMetadata is key-value metadata (source_uri, title, page, author, etc.) identified by metadata_id and bound to one Document from normalization metadata extraction, mapping to LangChain Document.metadata and LlamaIndex node metadata; not Document body or FileResource.
    ja: DocumentMetadata は metadata_id 識別、一 Document に binding する key-value metadata（source_uri/title/page/author 等）。normalization 段 metadata 抽出由来。LangChain Document.metadata/LlamaIndex node metadata に対応。Document 本文/FileResource ではない。
  why_needed:
    zh: 把来源 URI、页码、作者等从正文中分离，供检索过滤与审计而不污染 content_digest。
    en: Separates source URI, page, author from body for retrieval filters and audit without polluting content_digest.
    ja: source URI/page/author を本文から分離し retrieval filter/audit に供給。content_digest 汚染回避。
  includes:
    - zh: 纳入 source、page、title、author、created_at 等提取字段。
      en: Includes extracted fields source, page, title, author, created_at, etc.
      ja: source/page/title/author/created_at 等抽出 field。
  excludes:
    - zh: 排除 Document 正文 content_digest、FileResource 与 IngestionRun。
      en: Excludes Document body content_digest, FileResource, and IngestionRun.
      ja: Document 本文 content_digest/FileResource/IngestionRun を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain loader 把 file path 写入 metadata.source；normalization profile 可 enrich title/page；Moonweave DocumentMetadata.content_digest 绑定 metadata 快照版本；document_has_document_metadata 边连接 Document 与 metadata 记录。
    en: LangChain loaders write file path to metadata.source; normalization profile may enrich title/page; Moonweave DocumentMetadata.content_digest binds metadata snapshot version; document_has_document_metadata edge links Document to metadata record.
    ja: LangChain loader が file path→metadata.source。normalization profile が title/page enrich 可。Moonweave DocumentMetadata.content_digest が metadata snapshot 版 binding。document_has_document_metadata edge で Document/metadata 接続。
  typical_input:
    - description: LangChain Document metadata dict
      format: |
        metadata={"source": "policy.pdf", "page": 3, "title": "Retention Policy"}
      source_claims: [claim-doc-metadata-langchain]
  typical_output:
    - description: Moonweave document metadata record
      format: |
        {
          "metadata_id": "metadata-document-17",
          "source_uri": "file:///srv/legal/policy.pdf",
          "content_digest": "sha256:meta17"
        }
      source_claims: [claim-doc-metadata-design]
  reference_implementations:
    - name: LangChain Document metadata
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: metadata dict on Document objects.
    - name: LlamaIndex node metadata
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      description: Metadata on TextNode objects.
structure:
  identity_keys: [metadata_id]
  fields:
    - id: metadata_id
      labels: {zh: 元数据标识, en: Metadata identifier, ja: metadata 識別子}
      definitions:
        zh: 稳定标识一次 Document 的 metadata 记录版本。
        en: Stable identifier for one Document metadata record version.
        ja: 一 Document metadata record 版の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: metadata-document-17
      allowed_values: []
      source_claims: [claim-doc-metadata-id]
    - id: source_uri
      labels: {zh: 来源 URI, en: Source URI, ja: source URI}
      definitions:
        zh: 规范化 metadata 中的来源定位 URI（常来自 loader metadata.source）。
        en: Provenance locator URI in normalized metadata (often from loader metadata.source).
        ja: normalized metadata 内来歴 locator URI（多く loader metadata.source 由来）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///srv/legal/policy.pdf
      allowed_values: []
      source_claims: [claim-doc-metadata-source]
    - id: content_digest
      labels: {zh: 元数据摘要, en: Metadata digest, ja: metadata digest}
      definitions:
        zh: 对 metadata 键值集合 canonical 序列化后的 digest。
        en: Digest over canonical serialization of metadata key-value set.
        ja: metadata key-value set canonical serialize 後 digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:meta17
      allowed_values: []
      source_claims: [claim-doc-metadata-digest]
  constraints: []
  required_relations: []
examples:
  - id: DocumentMetadata-example-langchain-meta
    labels:
      zh: LangChain metadata 提取
      en: LangChain metadata extraction
      ja: LangChain metadata 抽出
    descriptions:
      zh: normalize-17 从 PyPDFLoader metadata 提取 source/page/title 写入 metadata-document-17，source_uri=file:///srv/legal/policy.pdf。
      en: normalize-17 extracts source/page/title from PyPDFLoader metadata into metadata-document-17 with source_uri=file:///srv/legal/policy.pdf.
      ja: normalize-17 が PyPDFLoader metadata から source/page/title 抽出→metadata-document-17、source_uri=file:///srv/legal/policy.pdf。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      version: metadata
    field_values:
      metadata_id: metadata-document-17
      source_uri: file:///srv/legal/policy.pdf
      page: 3
    related_node_ids: [DocumentMetadata, Document]
    related_relation_ids: []
    source_claims: [claim-doc-metadata-langchain]
  - id: DocumentMetadata-example-llamaindex-node
    labels:
      zh: LlamaIndex node metadata
      en: LlamaIndex node metadata
      ja: LlamaIndex node metadata
    descriptions:
      zh: TextNode metadata 含 file_name、page_label；normalization 统一映射到 DocumentMetadata 字段集与 content_digest。
      en: TextNode metadata includes file_name, page_label; normalization maps uniformly to DocumentMetadata field set and content_digest.
      ja: TextNode metadata に file_name/page_label。normalization が DocumentMetadata field set/content_digest へ統一写像。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      version: node metadata
    field_values:
      file_name: policy.pdf
      page_label: "3"
    related_node_ids: [DocumentMetadata, TextDocument]
    related_relation_ids: []
    source_claims: [claim-doc-metadata-llamaindex]
  - id: DocumentMetadata-example-not-body
    labels:
      zh: 元数据非正文
      en: Metadata is not body
      ja: metadata は body ではない
    descriptions:
      zh: document-policy-v7 content_digest 覆盖 Markdown 正文；metadata-document-17 digest 仅覆盖 metadata 键值——变更 title 不必然变更正文 digest。
      en: document-policy-v7 content_digest covers Markdown body; metadata-document-17 digest covers metadata keys only—title change does not necessarily change body digest.
      ja: document-policy-v7 content_digest=Markdown 本文。metadata-document-17 digest=metadata key のみ。title 変更は本文 digest 変更を意味しない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DocumentMetadata, Document]
    related_relation_ids: []
    source_claims: [claim-doc-metadata-design]
parent_relation:
  id: Document-has_document_metadata-DocumentMetadata
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels: {zh: 文档具有元数据, en: document has metadata, ja: document が metadata を持つ}
  definitions:
    zh: Document has_document_metadata DocumentMetadata 表示该 metadata 记录绑定特定 Document 版本。
    en: Document has_document_metadata DocumentMetadata means metadata record binds to specific Document version.
    ja: Document has_document_metadata DocumentMetadata は metadata record が特定 Document 版に binding。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达。
    en: Relation constrained per fact.
    ja: fact 単位制約。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-doc-metadata-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-langchain-metadata
    title: LangChain Document metadata
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: metadata dict on documents.
  - id: src-llamaindex-metadata
    title: LlamaIndex node metadata
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
    source_type: official-doc
    relevance: Metadata on nodes.
  - id: src-doc-metadata-design
    title: Moonweave document metadata boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Metadata versus document body separation.
source_claims:
  - id: claim-doc-metadata-langchain
    source: src-langchain-metadata
    supports: LangChain Document.metadata carries source and page provenance fields.
    locator: metadata
    evidence_kind: official
    confidence: high
  - id: claim-doc-metadata-llamaindex
    source: src-llamaindex-metadata
    supports: LlamaIndex nodes include metadata dict separate from text body.
    locator: TextNode metadata
    evidence_kind: official
    confidence: high
  - id: claim-doc-metadata-design
    source: src-doc-metadata-design
    supports: DocumentMetadata is distinct from document body content_digest.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-doc-metadata-id
    source: src-doc-metadata-design
    supports: metadata_id identifies metadata record version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-doc-metadata-source
    source: src-langchain-metadata
    supports: source_uri records provenance locator from loader metadata.
    locator: metadata.source
    evidence_kind: official
    confidence: high
  - id: claim-doc-metadata-digest
    source: src-doc-metadata-design
    supports: content_digest binds metadata snapshot for audit.
    locator: structure
    evidence_kind: design-inference
    confidence: high
