schema: moonweave.ai/ontology-node/v1
id: DocumentMetadata
kind: concept
status: accepted
labels:
  zh: 文档元数据
  en: Document metadata
  ja: 文書metadata
semantics:
  short_definition:
    zh: 描述一份 Document 的来源、格式、版本与解析状态的信息。
    en: Information describing one Document's source, format, version, and parsing state.
    ja: 一 Document のsource・format・版・parse状態を記述するinformationです。
  definition:
    zh: DocumentMetadata 是从属于一个 Document 的信息记录，保存 metadata_id、来源 URI、来源版本、格式和解析状态；它描述文档但不替代文档内容或 SourceAttachment。
    en: DocumentMetadata is an information record belonging to one Document and retaining metadata_id, source URI, source version, format, and parsing state; it describes the document but does not replace its content or SourceAttachment.
    ja: DocumentMetadata は一 Document に属し metadata_id・source URI・source版・format・parse状態を保持するinformation recordで、document contentや SourceAttachmentを置換しません。
  why_needed:
    zh: 把文档描述信息置于 Document 节点下而非平级。
    en: Places document-description information beneath its Document rather than flat beside it.
    ja: document-description informationをDocumentと平置きせずその下に置きます。
  includes:
    - zh: 纳入来源、版本、校验和、格式、作者、时间与解析状态。
      en: Includes source, version, checksum, format, author, time, and parsing state.
      ja: source・版・checksum・format・author・time・parse状態を含みます。
  excludes:
    - zh: 排除 Document 内容、SourceAttachment 关联身份和 FileResource。
      en: Excludes Document content, SourceAttachment linkage identity, and FileResource.
      ja: Document content・SourceAttachment linkage同一性・FileResourceを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - metadata_id
  fields:
    - id: metadata_id
      labels:
        zh: 元数据标识
        en: metadata ID
        ja: metadata ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识元数据记录。
        en: Stable identifier for the metadata record.
        ja: metadata recordの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: metadata-document-17
      source_claims:
        - claim-document-metadata-002
    - id: source_uri
      labels:
        zh: 来源 URI
        en: source URI
        ja: source URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录文档所述来源位置。
        en: Records the source location described for the document.
        ja: documentについて記述するsource locationを記録します。
      allowed_values: []
      pattern: null
      example_value: s3://policy/legal/policy.pdf
      source_claims:
        - claim-document-metadata-003
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录元数据对应文档内容版本。
        en: Records the document-content version described by the metadata.
        ja: metadataが記述するdocument-content版を記録します。
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-v7
      source_claims:
        - claim-document-metadata-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DocumentMetadata-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文档元数据正例
      en: "Positive case: Document metadata"
      ja: 文書metadata正例
    scenario_id: null
    descriptions:
      zh: metadata-document-17 以 metadata_id 与 document-policy-v7@c7 识别，记录标题、语言 zh-CN、源 URI、创建时间和解析器版本，并明确描述该文档版本。
      en: metadata-document-17 is identified by metadata ID and document-policy-v7@c7 and records title, language zh-CN, source URI, creation time, and parser version while explicitly describing that document version.
      ja: metadata-document-17 は metadata ID と document-policy-v7@c7 で識別され title、language、source URI、時刻、parser version を記録します。
    field_values:
      metadata_id: metadata-document-17
      source_uri: s3://policy/legal/policy.pdf
      content_digest: sha256:document-policy-v7
    related_node_ids:
      - DocumentMetadata
    related_relation_ids: []
    expected_result:
      zh: 将 metadata-document-17 表示为 DocumentMetadata，并把适用范围限定到文档摘要 c7。
      en: Represent metadata-document-17 as DocumentMetadata and restrict its applicability to document digest c7.
      ja: metadata-document-17 を DocumentMetadata とし適用範囲を document digest c7 に限定します。
    why_valid_or_invalid:
      zh: 独立元数据身份、被描述文档版本与描述字段集合均明确，可在不修改文档正文时单独引用。
      en: Independent metadata identity, the described document version, and the descriptive field set are explicit and can be referenced without changing document content.
      ja: independent metadata identity、described document version、field set が明示され document content を変えず参照できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-document-metadata-005
  - id: DocumentMetadata-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文档元数据边界例
      en: "Boundary case: Document metadata"
      ja: 文書metadata境界例
    scenario_id: null
    descriptions:
      zh: attachment-17 只固定 document-policy-v7 与 file-policy-v7 的来源连接、处理状态和资源摘要；它没有标题、语言等完整描述字段。
      en: attachment-17 fixes only the provenance link, processing status, and resource digest between document-policy-v7 and file-policy-v7 and lacks the complete descriptive fields such as title and language.
      ja: attachment-17 は provenance link、processing status、resource digest だけを固定し title・language 等の完全 descriptive fields を持ちません。
    field_values: {}
    related_node_ids:
      - DocumentMetadata
    related_relation_ids: []
    expected_result:
      zh: 把 attachment-17 保持为 SourceAttachment，可由 DocumentMetadata 引用但不与之合并。
      en: Keep attachment-17 as SourceAttachment; DocumentMetadata may reference it but must not merge with it.
      ja: attachment-17 は SourceAttachment とし DocumentMetadata が参照しても統合しません。
    why_valid_or_invalid:
      zh: 来源连接回答文档来自哪个资源，元数据回答如何描述特定文档版本；两个信息记录职责不同。
      en: A source attachment answers which resource a document came from, while metadata describes a document version; the information records have different responsibilities.
      ja: source attachment は由来 resource、metadata は document version の記述を答え責務が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-document-metadata-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: document_has_document_metadata
  predicate: document_has_document_metadata
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有文档元数据
    en: has document metadata
    ja: document metadataを持つ
  definitions:
    zh: Document —document_has_document_metadata→ DocumentMetadata 表示元数据记录专门描述该文档版本。
    en: Document —document_has_document_metadata→ DocumentMetadata means that the metadata record specifically describes that document version.
    ja: Document —document_has_document_metadata→ DocumentMetadata はmetadata recordがそのdocument版を専用記述することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_document_has_document_metadata
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: document_has_document_metadata-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when metadata.document_id matches the Document and content digests align.
      explanations:
        zh: 仅当 metadata.document_id 与 Document 相同且 content_digest 对齐时成立。
        en: Assert only when metadata.document_id matches the Document and content digests align.
        ja: metadata.document_idが Documentと同じでcontent digestが整合する時だけ成立します。
      source_claims:
        - claim-document-metadata-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: document_has_document_metadata-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 具有文档元数据正例
        en: "Positive case: has document metadata"
        ja: document metadataを持つ正例
      scenario_id: null
      descriptions:
        zh: document-policy-v7 的 metadata_id 指向 metadata-document-17，后者的 described_document_id 与 described_digest=c7 均匹配该文档。
        en: document-policy-v7's metadata ID points to metadata-document-17, whose described Document ID and described digest c7 both match the Document.
        ja: document-policy-v7 metadata ID が metadata-document-17 を指し described document ID・digest c7 が一致します。
      field_values: {}
      related_node_ids:
        - Document
        - DocumentMetadata
      related_relation_ids:
        - document_has_document_metadata
      expected_result:
        zh: 建立 document-policy-v7 has_metadata metadata-document-17，并把元数据范围限定到 c7。
        en: Assert document-policy-v7 has_metadata metadata-document-17 and scope the metadata to c7.
        ja: document-policy-v7 has_metadata metadata-document-17 を確立し scope を c7 に限定します。
      why_valid_or_invalid:
        zh: 文档引用和元数据反向描述同时匹配规范身份与内容版本，可避免把旧描述挂到新正文。
        en: The Document reference and metadata's reverse description agree on canonical identity and content version, preventing old descriptions from attaching to new content.
        ja: Document reference と metadata reverse description が identity・content version で一致します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-document-metadata-007
    - id: document_has_document_metadata-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 具有文档元数据边界例
        en: "Boundary case: has document metadata"
        ja: document metadataを持つ境界例
      scenario_id: null
      descriptions:
        zh: metadata-document-16 描述相同 document_id 但 digest=c6；它的标题与解析器字段属于旧文档版本。
        en: metadata-document-16 describes the same document ID but digest c6, and its title and parser fields belong to the prior Document version.
        ja: metadata-document-16 は同じ document ID でも digest c6 で旧 version の fields です。
      field_values: {}
      related_node_ids:
        - Document
        - DocumentMetadata
      related_relation_ids:
        - document_has_document_metadata
      expected_result:
        zh: 不得把 metadata-document-16 作为 document-policy-v7@c7 的元数据。
        en: Do not use metadata-document-16 as metadata for document-policy-v7@c7.
        ja: metadata-document-16 を document-policy-v7@c7 の metadata としません。
      why_valid_or_invalid:
        zh: 元数据适用于确切内容版本而不只是显示名称；忽略摘要会造成跨版本错误描述。
        en: Metadata applies to an exact content version rather than merely a display name; ignoring the digest would create a cross-version misdescription.
        ja: metadata は exact content version に適用され digest 無視は cross-version misdescription を生みます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-document-metadata-007
  source_claims:
    - claim-document-metadata-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-ingestion-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析模式与 ETL 去重策略逐项人工语义核验通过。
    en: Manually verified against Anthropic Contextual Retrieval, LangChain text splitters and document loaders, LlamaIndex node parsers and ingestion pipeline, Unstructured parsing patterns, and ETL deduplication strategies.
    ja: Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析パターン、ETL 重複排除戦略に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-document-metadata-001
    source: eng-fw-langchain-document-loaders
    supports: LangChain defines Document content plus metadata and source-specific loader metadata fields.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-document-metadata-002
    source: eng-fw-langchain-document-loaders
    supports: DocumentMetadata.metadata_id records the document-metadata identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-document-metadata-003
    source: eng-fw-langchain-document-loaders
    supports: DocumentMetadata.source_uri records human and machine traceability to source; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-document-metadata-004
    source: eng-fw-langchain-document-loaders
    supports: DocumentMetadata.content_digest records metadata/document version alignment; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-document-metadata-005
    source: eng-fw-langchain-document-loaders
    supports: LangChain Documents carry metadata alongside page content and loaders populate source-specific fields.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-document-metadata-006
    source: eng-fw-langchain-document-loaders
    supports: OpenAI vector-store file attachments and LangChain Document metadata have different operational identities.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-document-metadata-007
    source: eng-fw-langchain-document-loaders
    supports: LangChain Document objects carry metadata alongside page content and source-specific loaders populate it.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
