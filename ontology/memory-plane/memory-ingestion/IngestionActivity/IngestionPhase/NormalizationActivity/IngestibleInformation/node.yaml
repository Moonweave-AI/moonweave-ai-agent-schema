schema: moonweave.ai/ontology-node/v1
id: IngestibleInformation
kind: concept
status: review
labels:
  zh: 可摄入信息
  en: Ingestible information
  ja: 取込可能information
semantics:
  short_definition:
    zh: 已读取、可进入规范化阶段且具有内容身份的信息。
    en: Information already read and eligible for normalization with content identity.
    ja: read済みでcontent同一性を持ちnormalizationへ入れるinformationです。
  definition:
    zh: IngestibleInformation 是由来源读取获得、以 information_id 与内容摘要标识并可被 NormalizationActivity 消费的信息上位类；它不是外部资源实体、加载器或运行活动。
    en: IngestibleInformation is the information genus obtained by reading a source, identified by information_id plus content digest, and consumable by NormalizationActivity; it is not the external resource entity, loader, or run activity.
    ja: IngestibleInformation はsource readで得て information_id とcontent digestで識別し NormalizationActivity が消費できるinformation上位類で、外部resource entity・loader・run activityではありません。
  why_needed:
    zh: 把已读取信息与尚未读取的资源实体分开。
    en: Separates already-read information from not-yet-read resource entities.
    ja: read済みinformationを未read resource entityから分離します。
  includes:
    - zh: 纳入 Document、DatabaseRow、GraphNode、GraphEdge 与 SourceAttachment。
      en: Includes Document, DatabaseRow, GraphNode, GraphEdge, and SourceAttachment.
      ja: Document・DatabaseRow・GraphNode・GraphEdge・SourceAttachmentを含みます。
  excludes:
    - zh: 排除 FileResource、Database、DocumentLoader 与 IngestionRun。
      en: Excludes FileResource, Database, DocumentLoader, and IngestionRun.
      ja: FileResource・Database・DocumentLoader・IngestionRunを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - information_id
  fields:
    - id: information_id
      labels:
        zh: 信息标识
        en: information ID
        ja: information ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识已读取信息。
        en: Stable identifier for the read information.
        ja: read済みinformationの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: info-17
      source_claims:
        - claim-ingestible-information-002
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定信息内容版本。
        en: Fixes the information-content version.
        ja: information-content版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:info17
      source_claims:
        - claim-ingestible-information-003
    - id: source_reference
      labels:
        zh: 来源引用
        en: source reference
        ja: source参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向读取来源资源。
        en: References the source resource read.
        ja: readしたsource resourceを参照します。
      allowed_values: []
      pattern: null
      example_value: urn:resource:17
      source_claims:
        - claim-ingestible-information-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestibleInformation-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 可摄入信息正例
      en: "Positive case: Ingestible information"
      ja: 取込可能information正例
    scenario_id: null
    descriptions:
      zh: info-17 是 loader-pdf-v3 从 file-policy-v7@b7 读取的内容快照，具有 information_id、media type、内容摘要和 source attachment，可作为规范化输入。
      en: info-17 is a content snapshot read by loader-pdf-v3 from file-policy-v7@b7 with an information ID, media type, content digest, and source attachment and can be normalization input.
      ja: info-17 は loader-pdf-v3 が file-policy-v7@b7 から読んだ content snapshot で information ID、media type、digest、source attachment を持ちます。
    field_values:
      information_id: info-17
      content_digest: sha256:info17
      source_reference: urn:resource:17
    related_node_ids:
      - IngestibleInformation
    related_relation_ids: []
    expected_result:
      zh: 将 info-17 表示为 IngestibleInformation，并保留其内容版本与来源资源的分离身份。
      en: Represent info-17 as IngestibleInformation while preserving separate identities for its content version and source resource.
      ja: info-17 を IngestibleInformation とし content version と source resource の別 identity を保持します。
    why_valid_or_invalid:
      zh: 该对象承载可处理内容并可由摘要重新识别，同时通过来源记录连接到外部资源。
      en: The object carries processable content and can be re-identified by digest while provenance links it to the external resource.
      ja: processable content を持ち digest で再識別でき provenance が external resource へ接続します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestible-information-005
  - id: IngestibleInformation-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 可摄入信息边界例
      en: "Boundary case: Ingestible information"
      ja: 取込可能information境界例
    scenario_id: null
    descriptions:
      zh: file-policy-v7 只有 S3 定位符、对象版本和字节摘要；在 loader 打开前，它不代表已读取并可交给变换器的内容对象。
      en: file-policy-v7 has only an S3 locator, object version, and byte digest; before a loader opens it, it does not represent a read content object ready for transformations.
      ja: file-policy-v7 は S3 locator、object version、byte digest だけで loader 読取前は transformation-ready content object ではありません。
    field_values: {}
    related_node_ids:
      - IngestibleInformation
    related_relation_ids: []
    expected_result:
      zh: 把 file-policy-v7 保持为 IngestibleResource，读取后另建 IngestibleInformation。
      en: Keep file-policy-v7 as IngestibleResource and create separate IngestibleInformation after reading.
      ja: file-policy-v7 は IngestibleResource とし読取後に別 IngestibleInformation を作ります。
    why_valid_or_invalid:
      zh: 可定位载体与已读取信息分别回答“从哪里读取”和“读到了什么”，不能因摘要相关而合并。
      en: The addressable carrier and read information answer where to read and what was read respectively and cannot be merged merely because their digests are related.
      ja: addressable carrier と read information は「どこから」「何を」を別々に答え digest 関連だけで統合できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestible-information-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: NormalizationActivity-consumes-IngestibleInformation
  predicate: consumes
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 消费可摄入信息
    en: consumes ingestible information
    ja: 取込可能informationを消費する
  definitions:
    zh: NormalizationActivity —consumes→ IngestibleInformation 表示该信息版本进入解析、清洗或格式统一输入。
    en: NormalizationActivity —consumes→ IngestibleInformation means that this information version enters parsing, cleaning, or format-normalization input.
    ja: NormalizationActivity —consumes→ IngestibleInformation はこのinformation版がparse・clean・format normalization入力へ入ることを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_consumes
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: NormalizationActivity-consumes-IngestibleInformation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the activity input digest or manifest contains target information ID and digest.
      explanations:
        zh: 仅当 activity.input_digest/manifest 包含目标 information_id 与摘要时成立。
        en: Assert only when the activity input digest or manifest contains target information ID and digest.
        ja: activity input digest/manifestがtarget information IDとdigestを含む時だけ成立します。
      source_claims:
        - claim-ingestible-information-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: NormalizationActivity-consumes-IngestibleInformation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 消费可摄入信息正例
        en: "Positive case: consumes ingestible information"
        ja: 取込可能informationを消費する正例
      scenario_id: null
      descriptions:
        zh: normalize-17 的 input manifest 包含 info-17@i7，变换日志实际读取该内容摘要并按 pdf-partition-v3 生成 document-policy-v7。
        en: normalize-17's input manifest contains info-17@i7, and its transformation log actually reads that content digest and generates document-policy-v7 under pdf-partition-v3.
        ja: normalize-17 input manifest が info-17@i7 を含み transformation log が digest を読み document を生成します。
      field_values: {}
      related_node_ids:
        - NormalizationActivity
        - IngestibleInformation
      related_relation_ids:
        - NormalizationActivity-consumes-IngestibleInformation
      expected_result:
        zh: 建立 normalize-17 consumes info-17，并保留输入摘要 i7。
        en: Assert normalize-17 consumes info-17 and retain input digest i7.
        ja: normalize-17 consumes info-17 を input digest i7 付きで確立します。
      why_valid_or_invalid:
        zh: 输入清单和变换访问记录均固定同一信息版本，证明内容参与了规范化计算。
        en: The input manifest and transformation-access record fix the same information version, proving participation in normalization computation.
        ja: input manifest と transformation access が同一 information version を固定し computation participation を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestible-information-007
    - id: NormalizationActivity-consumes-IngestibleInformation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 消费可摄入信息边界例
        en: "Boundary case: consumes ingestible information"
        ja: 取込可能informationを消費する境界例
      scenario_id: null
      descriptions:
        zh: info-18 只作为 metadata 中的 related_source 链接出现，normalize-17 没有读取其 payload，也未把摘要列入 input manifest。
        en: info-18 appears only as a related_source link in metadata; normalize-17 never reads its payload and does not list its digest in the input manifest.
        ja: info-18 は metadata related_source link だけで payload read も input manifest digest もありません。
      field_values: {}
      related_node_ids:
        - NormalizationActivity
        - IngestibleInformation
      related_relation_ids:
        - NormalizationActivity-consumes-IngestibleInformation
      expected_result:
        zh: 不要把仅被引用的 info-18 连接为 normalize-17 的消耗输入。
        en: Do not connect merely referenced info-18 as input consumed by normalize-17.
        ja: merely referenced info-18 を normalize-17 consumed input として接続しません。
      why_valid_or_invalid:
        zh: 来源或元数据引用不会使信息参加变换；consumes 要求实际 payload 访问和输入版本证据。
        en: A provenance or metadata reference does not make information participate in transformation; consumes requires payload access and input-version evidence.
        ja: provenance/metadata reference は transformation participation でなく payload access・input version evidence が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-ingestible-information-007
  source_claims:
    - claim-ingestible-information-007
  distinct_fact_rationale: null
