schema: moonweave.ai/ontology-node/v1
id: IngestibleInformation
kind: concept
labels:
  zh: 可摄入信息
  en: Ingestible information
  ja: 取込可能情報
semantics:
  short_definition:
    zh: 具有内容身份、可被 ingest 阶段消费的信息根类。
    en: Root information class with content identity consumable by ingestion phases.
    ja: content identity を持ち ingestion phase が consume 可能な information root class。
  definition:
    zh: IngestibleInformation 是以 information_id 与 content_digest 标识、可被 NormalizationActivity 或 DeduplicationActivity 消费的信息上位类；子类含 Document、DatabaseRow、GraphNode；不是 IngestibleResource 或 IngestionActivity。
    en: IngestibleInformation is the information root identified by information_id and content_digest consumable by NormalizationActivity or DeduplicationActivity; subtypes include Document, DatabaseRow, GraphNode; not IngestibleResource or IngestionActivity.
    ja: IngestibleInformation は information_id/content_digest で識別し NormalizationActivity/DeduplicationActivity が consume 可能な information root。subtype：Document/DatabaseRow/GraphNode。IngestibleResource/IngestionActivity ではない。
  why_needed:
    zh: 统一 loader 输出、规范化输入与 dedup 输入的信息身份，区分资源实体与信息记录。
    en: Unifies information identity for loader output, normalization input, and dedup input, separating resource entities from information records.
    ja: loader 出力/normalize 入力/dedup 入力の information identity を統一し resource entity/information record を分離。
  includes:
    - zh: 纳入 Document、DatabaseRow、GraphNode 与 GraphEdge 等信息子类。
      en: Includes information subtypes Document, DatabaseRow, GraphNode, and GraphEdge.
      ja: Document/DatabaseRow/GraphNode/GraphEdge 等 information subtype。
  excludes:
    - zh: 排除 IngestibleResource、IngestionActivity 与 DeduplicationDecision。
      en: Excludes IngestibleResource, IngestionActivity, and DeduplicationDecision.
      ja: IngestibleResource/IngestionActivity/DeduplicationDecision を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain loader 返回的 Document 与 LlamaIndex 初始 Document 是 IngestibleInformation 进入 normalize 前的形态；DatabaseRow/GraphNode 是结构化来源信息；source_reference 指向产生该信息的 resource 或 loader 输出。
    en: LangChain loader Documents and initial LlamaIndex Documents are IngestibleInformation pre-normalize; DatabaseRow/GraphNode are structured source information; source_reference points to resource or loader output that produced this information.
    ja: LangChain loader Document/初期 LlamaIndex Document は normalize 前 IngestibleInformation。DatabaseRow/GraphNode は structured source information。source_reference が生成 resource/loader 出力を指す。
  typical_input:
    - description: Loader output information
      format: |
        {"information_id": "info-17", "content_digest": "sha256:raw17", "source_reference": "file-policy-v7"}
      source_claims: [claim-ingestible-info-langchain]
  typical_output:
    - description: Information consumed by normalization
      format: |
        NormalizationActivity.consumes(info-17) -> Document
      source_claims: [claim-ingestible-info-design]
  reference_implementations:
    - name: LangChain Document
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: page_content and metadata as information records.
    - name: LlamaIndex Document
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
      description: Initial loaded document information.
structure:
  identity_keys: [information_id]
  fields:
    - id: information_id
      labels: {zh: 信息标识, en: Information identifier, ja: information 識別子}
      definitions:
        zh: 稳定标识可摄入信息 lineage。
        en: Stable identifier for ingestible information lineage.
        ja: ingestible information lineage の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: info-17
      allowed_values: []
      source_claims: [claim-ingestible-info-id]
    - id: content_digest
      labels: {zh: 内容摘要, en: Content digest, ja: content digest}
      definitions:
        zh: 该信息记录正文或结构化内容的 digest。
        en: Digest of this information record body or structured content.
        ja: 当 information record 本文/structured content の digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:info17
      allowed_values: []
      source_claims: [claim-ingestible-info-digest]
    - id: source_reference
      labels: {zh: 来源引用, en: Source reference, ja: source ref}
      definitions:
        zh: 指向产生该信息的 IngestibleResource 或 loader 输出引用。
        en: Reference to IngestibleResource or loader output that produced this information.
        ja: 当 information を生成した IngestibleResource/loader 出力 ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file-policy-v7
      allowed_values: []
      source_claims: [claim-ingestible-info-source]
  constraints: []
  required_relations: []
examples:
  - id: IngestibleInformation-example-loader-output
    labels:
      zh: Loader 输出信息
      en: Loader output information
      ja: loader 出力 information
    descriptions:
      zh: PyPDFLoader 读取 file-policy-v7 产生 info-17（raw PDF text digest）；NormalizationActivity consumes info-17 产出 Document。
      en: PyPDFLoader reads file-policy-v7 producing info-17 (raw PDF text digest); NormalizationActivity consumes info-17 producing Document.
      ja: PyPDFLoader が file-policy-v7 read→info-17（raw PDF text digest）。NormalizationActivity が info-17 consume→Document。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      version: load output
    field_values:
      information_id: info-17
      source_reference: file-policy-v7
    related_node_ids: [IngestibleInformation, NormalizationActivity, FileResource]
    related_relation_ids: []
    source_claims: [claim-ingestible-info-langchain]
  - id: IngestibleInformation-example-db-row
    labels:
      zh: 数据库行信息
      en: Database row information
      ja: DB row information
    descriptions:
      zh: DatabaseRow public.clauses:42 作为结构化 IngestibleInformation 进入 normalize，source_reference=table-policy-clauses。
      en: DatabaseRow public.clauses:42 enters normalize as structured IngestibleInformation with source_reference=table-policy-clauses.
      ja: DatabaseRow public.clauses:42 が structured IngestibleInformation として normalize 入力、source_reference=table-policy-clauses。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: row load
    field_values:
      information_id: row-clauses-42
      source_reference: table-policy-clauses
    related_node_ids: [IngestibleInformation, DatabaseRow]
    related_relation_ids: []
    source_claims: [claim-ingestible-info-design]
  - id: IngestibleInformation-example-not-resource
    labels:
      zh: 信息非资源
      en: Information is not resource
      ja: information は resource ではない
    descriptions:
      zh: file-policy-v7 是字节资源；info-17 是读取后的信息记录——资源身份在 read 前存在，信息身份在 read 后形成。
      en: file-policy-v7 is byte resource; info-17 is post-read information record—resource identity exists before read, information identity forms after read.
      ja: file-policy-v7 は byte resource。info-17 は read 後 information record。resource identity は read 前、information identity は read 後形成。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestibleInformation, IngestibleResource]
    related_relation_ids: []
    source_claims: [claim-ingestible-info-design]
parent_relation:
  id: IngestibleInformation-part_of-NormalizationActivity
  predicate: part_of
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 组织于规范化活动模块下
    en: organized under normalization activity module
    ja: normalization activity module 下に組織化
  definitions:
    zh: 目录嵌套将 IngestibleInformation 置于 NormalizationActivity 模块下以便发现；consumes 跨链关系由 NormalizationActivity 的 relations 声明，不在此重复。
    en: Directory nesting places IngestibleInformation under the NormalizationActivity module for discovery; the consumes cross-link is declared on NormalizationActivity relations and is not duplicated here.
    ja: ディレクトリネストは発見のため IngestibleInformation を NormalizationActivity module 下に置く。consumes cross-link は NormalizationActivity relations で宣言しここでは重複しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达。
    en: Relation constrained per fact.
    ja: fact 単位制約。
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含信息概念
      en: has information concept part
      ja: information concept part を含む
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-ingestible-info-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-langchain-docs
    title: LangChain Document Loaders
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: Loader output as information records.
  - id: src-ingestible-info-design
    title: Moonweave ingestible information boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Information versus resource separation.
source_claims:
  - id: claim-ingestible-info-langchain
    source: src-langchain-docs
    supports: LangChain loaders return Document information distinct from source files.
    locator: Document
    evidence_kind: official
    confidence: high
  - id: claim-ingestible-info-design
    source: src-ingestible-info-design
    supports: IngestibleInformation forms after read, distinct from IngestibleResource.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-info-id
    source: src-ingestible-info-design
    supports: information_id identifies information lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-info-digest
    source: src-ingestible-info-design
    supports: content_digest binds information content version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-info-source
    source: src-ingestible-info-design
    supports: source_reference links information to producing resource or loader output.
    locator: structure
    evidence_kind: design-inference
    confidence: high
