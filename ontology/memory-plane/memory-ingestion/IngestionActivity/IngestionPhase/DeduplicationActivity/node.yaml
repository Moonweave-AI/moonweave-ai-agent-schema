schema: moonweave.ai/ontology-node/v1
id: DeduplicationActivity
kind: concept
status: review
labels:
  zh: 去重活动
  en: Deduplication activity
  ja: 重複排除activity
semantics:
  short_definition:
    zh: 比较文档身份与摘要并产出去重决定的摄入阶段。
    en: An ingestion phase comparing document identity and hashes to produce a deduplication decision.
    ja: document同一性とhashを比較してdeduplication decisionを生成する取込phaseです。
  definition:
    zh: DeduplicationActivity 是消费规范 Document、查询既有 docstore 身份/摘要并产生 DeduplicationDecision 的 IngestionPhase；它不直接阻止 MemoryWrite，也不把决定误建模为事件。
    en: DeduplicationActivity is an IngestionPhase that consumes canonical Document values, queries prior docstore identity/hash state, and produces DeduplicationDecision; it does not directly prevent MemoryWrite and does not mis-model the decision as an event.
    ja: DeduplicationActivity はcanonical Documentを消費し既存docstore同一性/hash状態を照会して DeduplicationDecision を生成する IngestionPhase で、MemoryWriteを直接preventせずdecisionをeventと誤建模しません。
  why_needed:
    zh: 把比较活动、决定信息与后续持久化动作分开。
    en: Separates comparison activity, decision information, and later persistence action.
    ja: 比較activity・decision information・後続永続化actionを分離します。
  includes:
    - zh: 纳入按 doc_id、内容 hash 或业务键作 duplicate/update/new 判定。
      en: Includes duplicate/update/new classification by doc_id, content hash, or business key.
      ja: doc_id・content hash・business keyによるduplicate/update/new判定を含みます。
  excludes:
    - zh: 排除 DeduplicationDecision、MemoryWrite 和普通相似检索。
      en: Excludes DeduplicationDecision, MemoryWrite, and ordinary similarity search.
      ja: DeduplicationDecision・MemoryWrite・通常similarity searchを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - phase_id
  fields:
    - id: phase_id
      labels:
        zh: 阶段标识
        en: phase ID
        ja: phase ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识去重阶段。
        en: Stable identifier for the deduplication phase.
        ja: deduplication phaseの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: dedup-17
      source_claims:
        - claim-deduplication-activity-002
    - id: dedup_strategy
      labels:
        zh: 去重策略
        en: deduplication strategy
        ja: deduplication strategy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定身份键与摘要比较规则。
        en: Fixes identity-key and digest comparison rules.
        ja: identity keyとdigest比較規則を固定します。
      allowed_values: []
      pattern: null
      example_value: doc-id+hash
      source_claims:
        - claim-deduplication-activity-003
    - id: reference_state_digest
      labels:
        zh: 参照状态摘要
        en: reference-state digest
        ja: 参照状態digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定比较时读取的既有状态。
        en: Fixes the prior state read for comparison.
        ja: 比較時に読んだ既存状態を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:docstore17
      source_claims:
        - claim-deduplication-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeduplicationActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 去重活动正例
      en: "Positive case: Deduplication activity"
      ja: 重複排除activity正例
    scenario_id: null
    descriptions:
      zh: dedup-17 是 ingest-run-17 的第二阶段；它按 policy@4 比较 document-policy-v7 的 document_id 与内容哈希、读取 docstore 既有哈希，并形成 outcome=update 的 decision-17。
      en: dedup-17 is the second phase of ingest-run-17; under policy@4 it compares document-policy-v7's document ID and content hash with the docstore hash and forms decision-17 with outcome update.
      ja: dedup-17 は ingest-run-17 の第二 phase で policy@4 に従い document ID・content hash を docstore hash と比較し outcome=update の decision-17 を形成します。
    field_values:
      phase_id: dedup-17
      dedup_strategy: doc-id+hash
      reference_state_digest: sha256:docstore17
      ingestion_run_id: ingest-run-17
      sequence: 2
      activity_id: dedup-17
      started_at: 2026-07-16T10:03:00Z
      status: completed
    related_node_ids:
      - DeduplicationActivity
    related_relation_ids: []
    expected_result:
      zh: 将 dedup-17 识别为 DeduplicationActivity，并把其输入、比较策略和决定输出保留在同一阶段证据中。
      en: Identify dedup-17 as DeduplicationActivity and retain its input, comparison strategy, and decision output in the same phase evidence.
      ja: dedup-17 を DeduplicationActivity とし input、comparison strategy、decision output を同一 phase evidence に保持します。
    why_valid_or_invalid:
      zh: 该活动具有持续时间、运行归属、去重比较行为和独立决定产物，符合阶段活动而非信息记录。
      en: The record has duration, run membership, duplicate-comparison behavior, and a separate decision product, making it a phase activity rather than information.
      ja: duration、run membership、duplicate comparison、separate decision product があり information でなく phase activity です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-deduplication-activity-005
  - id: DeduplicationActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 去重活动边界例
      en: "Boundary case: Deduplication activity"
      ja: 重複排除activity境界例
    scenario_id: null
    descriptions:
      zh: write-17 读取已完成的 decision-17 并把获准 Document 写入 MemoryStore；它不重新比较文档摘要，也不产生去重判断。
      en: write-17 consumes completed decision-17 and writes an admitted Document to MemoryStore; it neither compares document digests again nor produces a deduplication judgment.
      ja: write-17 は完了 decision-17 を読み admitted Document を MemoryStore へ書きますが digest 比較も dedup judgment 生成も行いません。
    field_values: {}
    related_node_ids:
      - DeduplicationActivity
    related_relation_ids: []
    expected_result:
      zh: 把 write-17 归入后续记忆写入活动，不归入 DeduplicationActivity。
      en: Keep write-17 in the downstream memory-write activity and exclude it from DeduplicationActivity.
      ja: write-17 は downstream memory-write activity とし DeduplicationActivity から除外します。
    why_valid_or_invalid:
      zh: 执行去重决定和生成去重决定是不同生命周期阶段；只有后者承担比较与判断责任。
      en: Executing a deduplication decision and generating it are different lifecycle stages; only the latter bears comparison and judgment responsibility.
      ja: dedup decision の実行と生成は別 lifecycle stage で、比較・判断責任を担うのは後者だけです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-deduplication-activity-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
