      scenario_id: null
      descriptions:
        zh: dedup-17 具有 ingest-run-17 内唯一 phase_id、sequence=2、局部时间和输入输出，并以比较 document_id/hash、形成处置决定作为专门行为。
        en: dedup-17 has a run-unique phase ID, sequence 2, local time, inputs, and outputs inside ingest-run-17 and specializes the phase by comparing document identity and hash and forming a disposition decision.
        ja: dedup-17 は run-unique phase ID、sequence 2、local time、inputs/outputs を持ち document identity/hash 比較と decision 形成を行います。
      field_values: {}
      related_node_ids:
        - DeduplicationActivity
