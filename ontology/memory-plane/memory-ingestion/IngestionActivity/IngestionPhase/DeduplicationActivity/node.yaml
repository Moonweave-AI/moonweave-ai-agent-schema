        en: write-17 occurs after ingest-run-17 and reads decision-17 but performs persistence, compares no document identity, and is not a declared phase of that run.
        ja: write-17 は run 後に persistence を行うが document identity を比較せず declared phase でもありません。
      field_values: {}
      related_node_ids:
        - DeduplicationActivity
        - IngestionPhase
      related_relation_ids:
