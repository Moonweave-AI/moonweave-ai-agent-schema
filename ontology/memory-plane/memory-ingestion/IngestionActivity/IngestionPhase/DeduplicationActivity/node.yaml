parent_relation:
  id: DeduplicationActivity-is_a-IngestionPhase
  predicate: is_a
  target: concept:IngestionPhase
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是摄入阶段的去重特化
    en: is a deduplication specialization of ingestion phase
    ja: 取り込みフェーズの重複排除特化である
  definitions:
    zh: DeduplicationActivity 是在一个摄入运行内固定参考状态并为候选文档生成去重决定的 IngestionPhase。
    en: DeduplicationActivity is an IngestionPhase that fixes reference state and generates deduplication decisions for candidate Documents inside one ingestion run.
    ja: DeduplicationActivity は一つの ingestion run 内で reference state を固定し、candidate Document に対する deduplication decision を生成する IngestionPhase です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_specialization
    labels:
      zh: 有去重特化
      en: has deduplication specialization
      ja: 重複排除特化を持つ
  conditions:
    - id: deduplication-activity-is-a-phase-condition
      severity: error
      expression_language: plain
      expression: >-
        Assert the specialization only when an object satisfies IngestionPhase identity and additionally fixes a
        reference_state_digest, uses candidate Document references, applies one exact comparison strategy, and produces
        separate DeduplicationDecisions in a completed state. A decision, write, retrieval query, vector index, source
        document, loader, or policy text does not satisfy this differentia.
      explanation:
        zh: 去重特化在上位阶段身份之外还需要固定参考状态、候选比较和独立决定生成；决定本身或后续写入不具备这些过程种差。
        en: The deduplication specialization additionally requires fixed reference state, candidate comparison, and separate decision generation beyond parent-phase identity; the decision itself or later write lacks these process differentiae.
        ja: deduplication specialization には親 phase identity に加えて固定 reference state、candidate comparison、別個の decision generation が必要です。decision 自体や後続 write にはこれらの process differentia がありません。
      source_claims:
        - claim-deduplication-activity-specialization
  temporal_scope: valid-time
  boundary_context: The comparison is scoped to an owning run and reference-state version; decision and write effects remain distinct facts.
  constraints: []
  examples: []
  source_claims:
    - claim-deduplication-activity-specialization
  distinct_fact_rationale: This hierarchy captures comparison-process specialization while decisions, documents, and write side effects remain separate.
  layout_role: primary-backbone
relations:
  - id: DeduplicationActivity-generates-DeduplicationDecision
    predicate: generates
    target: concept:DeduplicationDecision
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 生成去重决定
      en: generates deduplication decision
      ja: deduplication decision を生成する
    definitions:
      zh: 完成的 DeduplicationActivity 可为实际比较过的候选文档生成独立的 DeduplicationDecision。
      en: A completed DeduplicationActivity can generate an independent DeduplicationDecision for a candidate document it actually compared.
      ja: completed DeduplicationActivity は実際に比較した candidate document に対して独立した DeduplicationDecision を生成できる。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个比较活动可生成零个或多个决定，取决于候选数量和终态。
      en: One comparison activity may generate zero or more decisions depending on candidate count and terminal state.
      ja: 一つの comparison activity は candidate 数と terminal state に応じて zero 又は複数の decision を生成できる。
    inverse_reading:
      predicate: has_generated_deduplication_decision
      labels:
        zh: 有已生成的去重决定
        en: has generated deduplication decision
        ja: 生成済み deduplication decision を持つ
    conditions:
      - id: deduplication-activity-generates-decision-condition
        severity: error
        expression_language: plain
        expression: Assert only when the activity is completed, decision_refs contains the decision ID, and the decision's generating_activity_ref, candidate, comparison strategy, reference state, and evidence all resolve to this activity.
        explanation:
          zh: 只有完成的活动、输出引用和决定中的生成者及证据一致时才可断言生成。
          en: Assert generation only when completed activity, output reference, and the decision's generator and evidence agree.
          ja: completed activity、output reference、decision の generator と evidence が一致する時だけ generation を断言する。
        source_claims: [claim-deduplication-activity-generation]
    temporal_scope: valid-time
    boundary_context: Generating a decision does not perform the retention, deletion, or memory-write effect recommended by that decision.
    constraints: []
    examples: []
    source_claims: [claim-deduplication-activity-generation]
    distinct_fact_rationale: This captures an activity-to-decision provenance fact rather than a subtype or containment relation.
    layout_role: cross-link
  - id: DeduplicationActivity-consumes-Document
    predicate: consumes
    target: concept:Document
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 消费候选文档
      en: consumes candidate document
      ja: 候補ドキュメントを消費する
    definitions:
      zh: DeduplicationActivity 消费一个 Document 表示其版本化内容和身份被纳入本阶段的比较输入。
      en: DeduplicationActivity consumes a Document when its versioned content and identity are included in this phase's comparison input.
      ja: DeduplicationActivity が Document を consumes するのは、その versioned content と identity がこの phase の comparison input に含まれる時です。
    cardinality:
      source:
        min: 1
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_consumed_by
      labels:
        zh: 被候选比较消费
        en: is consumed by candidate comparison
        ja: 候補比較に消費される
    conditions:
      - id: deduplication-activity-consumes-document-condition
        severity: error
        expression_language: plain
        expression: >-
          Assert consumption only when the Document reference appears in activity.input_document_refs and its document
          identity and content digest are read under the declared comparison_strategy. Shared source provenance, an output
          reference, or a retrieval result alone does not establish consumption.
        explanation:
          zh: 消费关系需要该文档是实际比较输入并有身份摘要读取证据，不能从共同来源、输出引用或检索结果推断。
          en: Consumption requires the Document to be actual comparison input with identity-and-digest read evidence; it cannot be inferred from shared provenance, output reference, or retrieval result.
          ja: consumption には Document が実際の comparison input であり identity-and-digest read evidence を持つことが必要で、shared provenance、output reference、retrieval result から推論できません。
        source_claims:
          - claim-deduplication-activity-usage
    temporal_scope: valid-time
    boundary_context: Consumption is scoped to this activity and candidate version and does not make the Document part of the activity identity.
    constraints: []
    examples: []
    source_claims:
      - claim-deduplication-activity-usage
    distinct_fact_rationale: This relation records an actual comparison input separately from state lookup and decision output.
    layout_role: cross-link
sources:
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies hash algorithms that generate message digests used to detect changes in messages.
  - id: nodejs-crypto
    title: Node.js Crypto API
    url: https://nodejs.org/api/crypto.html
    type: official-doc
    source_type: official-doc
    relevance: Documents createHash for generating digest values with algorithms including SHA-256.
  - id: langchain-vectorstores
    title: LangChain vector store integrations
    url: https://docs.langchain.com/oss/python/integrations/vectorstores
    type: official-doc
    source_type: official-doc
    relevance: Documents distinct add-by-ID delete-by-ID and similarity-search operations for Documents.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines time-bounded activities that use entities and generate separate entities.
source_claims:
  - id: claim-deduplication-activity-digest
    source: nist-fips-180-4
    supports: >-
      FIPS 180-4 specifies hash algorithms that generate message digests used to detect message changes. Moonweave uses
      algorithm-tagged document and reference-state digests as comparison evidence and keeps them separate from document IDs.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-activity-comparison
    source: nodejs-crypto
    supports: >-
      Node.js documents createHash for generating a Hash object and digests with algorithms such as SHA-256. Moonweave
      applies exact ID and digest comparison as a local deduplication policy inference rather than as a retrieval query.
    locator: Node.js crypto createHash API and SHA-256 example
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-deduplication-activity-identity
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes independently identifiable activities from entities they use or generate. Moonweave identifies a
      deduplication comparison activity separately from candidate Documents and resulting decisions.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-activity-temporal
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities start and end at particular points in time. Moonweave records comparison start and
      terminal end times separately from the decision outcome and reference-state digest.
    locator: PROV-O section 3.1 on activity start and end times
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-activity-usage
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities can use entities during their lifetime. Moonweave records candidate Document references
      actually read by the comparison phase rather than inferring use from shared provenance or retrieval output.
    locator: PROV-O section 3.1 on prov used and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-activity-generation
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities can generate entities. Moonweave models a DeduplicationDecision as a separate entity
      generated by a completed comparison activity rather than as the activity's status or a downstream memory write.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-activity-phase
    source: w3c-prov-o
    supports: >-
      PROV-O supports provenance chains among activities and entities but does not prescribe ingestion-step ordinals.
      Moonweave models a deduplication comparison as an ordered member of one IngestionRun as a local orchestration inference.
    locator: PROV-O Activity relations and provenance chains
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-deduplication-activity-specialization
    source: w3c-prov-o
    supports: >-
      Modeling a candidate-and-reference-state comparison activity as a DeduplicationActivity specialization of
      IngestionPhase is a Moonweave taxonomy inference grounded in PROV-O's distinction between activities and entities.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-deduplication-activity-boundary
    source: langchain-vectorstores
    supports: >-
      LangChain documents separate add Documents delete by ID and similarity search operations. Moonweave keeps exact
      deduplication judgment separate from downstream memory write, vector-index mutation, and similarity retrieval.
    locator: LangChain vector store interface add_documents delete and similarity_search
    evidence_kind: ontology-design-inference
    confidence: medium
