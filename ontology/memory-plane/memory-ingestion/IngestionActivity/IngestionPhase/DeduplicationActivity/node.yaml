schema: moonweave.ai/ontology-node/v1
id: DeduplicationActivity
kind: concept
status: accepted
labels:
  zh: 去重活动
  en: Deduplication Activity
  ja: 重複排除アクティビティ
semantics:
  short_definition:
    zh: 在一个摄入运行内比较候选文档与已知状态并生成独立去重决定的局部活动。
    en: A local activity in one ingestion run that compares candidate documents with known state and generates separate deduplication decisions.
    ja: 一つの ingestion run 内で candidate document と既知 state を比較し、独立した deduplication decision を生成する局所 activity。
  definition:
    zh: >-
      DeduplicationActivity 是 IngestionPhase 的特化，负责在固定参考状态下检查候选 Document 的稳定标识和内容摘要，
      并为每个候选生成 DeduplicationDecision。它以 activity_id、phase_id、ingestion_run_ref、sequence_number、
      comparison_strategy、reference_state_digest、输入文档引用和状态标识，可在终态记录决定引用和结束时间。
      它不是 DeduplicationDecision、Document、MemoryWrite、MemoryStore、相似度检索、向量索引、加载器实现、策略文本或普通的查询活动。
      该活动形成判断证据；后续写入或删除动作使用判断，但不成为判断或活动本身。
    en: >-
      A DeduplicationActivity is an IngestionPhase specialization that checks stable identifiers and content digests of
      candidate Documents against fixed reference state and generates a DeduplicationDecision for each candidate. It is
      identified by activity_id, phase_id, ingestion_run_ref, sequence_number, comparison_strategy,
      reference_state_digest, input document references, and status and can record decision references and ended_at in a
      terminal state. It is not a DeduplicationDecision, Document, MemoryWrite, MemoryStore, similarity retrieval, vector
      index, loader implementation, policy text, or ordinary query activity. The activity forms decision evidence; later
      writing or deletion actions use a decision but do not become the decision or activity.
    ja: >-
      DeduplicationActivity は、candidate Document の stable identifier と content digest を固定された reference state と比較し、
      各 candidate に対する DeduplicationDecision を生成する IngestionPhase の特化です。activity_id、phase_id、
      ingestion_run_ref、sequence_number、comparison_strategy、reference_state_digest、input document reference、status で
      識別され、terminal state で decision reference と ended_at を記録できます。DeduplicationDecision、Document、MemoryWrite、
      MemoryStore、similarity retrieval、vector index、loader implementation、policy text、通常の query activity ではありません。
      activity は decision evidence を形成します。後続の write や delete action は decision を使用しますが、decision や activity 自体にはなりません。
  why_needed:
    zh: 把“执行比较”与“比较得出的准入、更新或跳过决定”分开，才能重放判断、解释状态快照并安全地将副作用交给后续步骤。
    en: Separating execution of comparison from the resulting admit, update, or skip decision enables replayable judgment, explainable state snapshots, and safe handoff of side effects to later steps.
    ja: comparison の実行を、そこから得られる admit、update、skip decision から分離することで、再生可能な judgment、説明可能な state snapshot、後続 step への安全な side-effect handoff が可能になります。
  includes:
    - zh: 在一个版本固定的文档状态清单中，按文档标识和 SHA-256 内容摘要比较候选文档并输出 update 决定的阶段。
      en: A phase that compares a candidate Document by document ID and SHA-256 content digest against a version-pinned document-state manifest and emits an update decision.
      ja: version-pinned の document-state manifest に対して candidate Document を document ID と SHA-256 content digest で比較し、update decision を出す phase。
  excludes:
    - zh: 已经形成的去重决定、使用决定的内存写入、仅为回答用户问题而进行的相似度检索和对向量索引的写入。
      en: A deduplication decision already formed, a memory write that uses the decision, similarity retrieval solely for answering a user, or a write to a vector index.
      ja: すでに形成された deduplication decision、decision を使用する memory write、ユーザー回答だけのための similarity retrieval、vector index への write。
  semantic_kind: activity
  aliases:
    - document-state comparison phase
    - duplicate-detection activity
engineering:
  explanation:
    zh: >-
      去重阶段接收规范化 Document 引用和一个只读、版本固定的参考状态清单。它对每个候选使用声明的比较策略计算或读取
      标识和内容摘要，记录匹配证据、参考状态摘要及活动时间，然后产生独立的 DeduplicationDecision。
      如果稍后的 MemoryWrite 根据决定执行新增、更新或跳过，该副作用会记录在写入活动上；去重阶段只记录比较过程和判断依据。
    en: >-
      The deduplication phase receives normalized Document references and a read-only, version-pinned reference-state
      manifest. For each candidate it computes or reads identifiers and content digests according to the declared comparison
      strategy, records match evidence, reference-state digest, and activity time, then produces a separate
      DeduplicationDecision. If a later MemoryWrite adds, updates, or skips because of that decision, that side effect is
      recorded on the write activity; this phase records only comparison process and judgment basis.
    ja: >-
      deduplication phase は正規化された Document reference と read-only かつ version-pinned の reference-state manifest を受け取ります。
      各 candidate について、宣言された comparison strategy に従って identifier と content digest を計算または読取り、match evidence、
      reference-state digest、activity time を記録し、別個の DeduplicationDecision を生成します。後続の MemoryWrite が decision により
      add、update、skip を行う場合、その side effect は write activity に記録されます。この phase は comparison process と judgment basis
      だけを記録します。
  typical_input:
    - description: Candidate document and pinned reference state
      format: |
        {
          "activity_id": "deduplicate-policy-42-03",
          "phase_id": "deduplicate-policy-42-03",
          "ingestion_run_ref": "ingest-policy-directory-42",
          "sequence_number": 3,
          "phase_kind": "deduplicate",
          "input_resource_refs": ["dir-policy-2026-07"],
          "input_information_refs": ["document-policy-17"],
          "comparison_strategy": "exact-id-and-digest",
          "reference_state_digest": "sha256:document-state-policy-v12",
          "input_document_refs": ["document-policy-17"],
          "status": "running"
        }
  typical_output:
    - description: Separate deduplication decision handoff
      format: |
        {
          "activity_id": "deduplicate-policy-42-03",
          "ended_at": "2026-07-18T09:00:42Z",
          "status": "completed",
          "decision_refs": ["decision-policy-17-v12"],
          "outcome": "update"
        }
  reference_implementations:
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for generating hash digests with algorithms such as SHA-256.
    - name: LangChain vector store interface
      url: https://docs.langchain.com/oss/python/integrations/vectorstores
      description: Documents adding Documents by ID, deleting by ID, and similarity search as separate vector-store operations.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines activities that use entities and generate separate entities with time bounds.
structure:
  identity_keys:
    - phase_id
    - ingestion_run_ref
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: アクティビティ ID
      definitions:
        zh: 稳定标识实际发生的去重比较活动，而不是决定、候选文档或后续写入。
        en: Stably identifies the deduplication comparison activity that actually occurred rather than a decision, candidate Document, or later write.
        ja: decision、candidate Document、後続 write ではなく、実際に発生した deduplication comparison activity を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: deduplicate-policy-42-03
      source_claims:
        - claim-deduplication-activity-identity
    - id: phase_id
      labels:
        zh: 阶段标识
        en: phase ID
        ja: フェーズ ID
      definitions:
        zh: 在所属运行内稳定标识去重局部步骤，可等于 activity_id 但不等同于完整运行标识。
        en: Stably identifies the local deduplication step within its owning run and can equal activity_id without equaling complete-run identity.
        ja: 所属 run 内の局所 deduplication step を安定して識別し、activity_id と同じ値でも complete-run identity と同じではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: deduplicate-policy-42-03
      source_claims:
        - claim-deduplication-activity-identity
    - id: ingestion_run_ref
      labels:
        zh: 所属摄入运行引用
        en: owning ingestion-run reference
        ja: 所属取り込み run 参照
      definitions:
        zh: 引用编排该比较阶段并拥有端到端结果的 IngestionRun，而不是参考状态存储或写入目标。
        en: References the IngestionRun that orchestrates this comparison phase and owns the end-to-end result rather than the reference-state store or write target.
        ja: reference-state store や write target ではなく、この comparison phase を編成して end-to-end result を所有する IngestionRun を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: ingest-policy-directory-42
      source_claims:
        - claim-deduplication-activity-phase
    - id: sequence_number
      labels:
        zh: 阶段顺序号
        en: phase sequence number
        ja: フェーズ順序番号
      definitions:
        zh: 记录去重比较在所属运行内的正整数顺序，不是比较分数、重试次数或全局序列。
        en: Records the positive integer order of the deduplication comparison inside its owning run rather than a comparison score, retry count, or global sequence.
        ja: comparison score、retry count、global sequence ではなく、所属 run 内の deduplication comparison の正の整数 order を記録します。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-deduplication-activity-phase
    - id: phase_kind
      labels:
        zh: 父阶段职责类型
        en: parent phase responsibility kind
        ja: 親フェーズ責務種別
      definitions:
        zh: 保留 IngestionPhase 的单一职责字段；去重活动必须明确标为 deduplicate，不以比较策略代替阶段职责。
        en: Retains IngestionPhase's single-responsibility field; a deduplication activity must explicitly be deduplicate rather than using comparison strategy as the phase kind.
        ja: IngestionPhase の単一責務 field を保持し、deduplication activity は comparison strategy を phase kind とせず明示的に deduplicate でなければなりません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - deduplicate
      pattern: null
      example_value: deduplicate
      source_claims:
        - claim-deduplication-activity-phase
    - id: input_resource_refs
      labels:
        zh: 父活动输入资源引用
        en: parent-activity input resource references
        ja: 親活動入力リソース参照
      definitions:
        zh: 保留拥有该去重阶段的摄入活动实际读取的版本化来源资源，不把候选 Document 误作原始资源。
        en: Retains versioned source resources actually read by the ingestion activity owning this deduplication phase without mistaking candidate Documents for original resources.
        ja: candidate Document を元の resource と誤認せず、この deduplication phase を所有する ingestion activity が実際に読んだ versioned source resource を保持します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - dir-policy-2026-07
      source_claims:
        - claim-deduplication-activity-phase
    - id: input_information_refs
      labels:
        zh: 父阶段输入信息引用
        en: parent-phase input information references
        ja: 親フェーズ入力情報参照
      definitions:
        zh: 保留阶段转换的局部信息表示；本节点的 input_document_refs 是其中用于固定状态比较的文档子集。
        en: Retains local information representations transformed by the phase; this node's input_document_refs are the Document subset used for fixed-state comparison.
        ja: phase が変換する局所 information representation を保持し、この node の input_document_refs は固定 state comparison に使う Document subset です。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - document-policy-17
      source_claims:
        - claim-deduplication-activity-usage
    - id: comparison_strategy
      labels:
        zh: 比较策略
        en: comparison strategy
        ja: 比較戦略
      definitions:
        zh: 固定本阶段用于候选与参考状态比较的精确身份和摘要规则，而不是供用户检索的相似度查询。
        en: Fixes exact identity and digest rules used to compare candidates with reference state in this phase rather than a similarity query for user retrieval.
        ja: user retrieval 用の similarity query ではなく、この phase で candidate と reference state を比較するための exact identity と digest rule を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - exact-id-and-digest
        - exact-digest
        - business-key-and-digest
      pattern: null
      example_value: exact-id-and-digest
      source_claims:
        - claim-deduplication-activity-comparison
    - id: reference_state_digest
      labels:
        zh: 参考状态摘要
        en: reference-state digest
        ja: 参照状態ダイジェスト
      definitions:
        zh: 记录用于比较的既有文档标识和摘要清单的算法标记摘要，从而固定判断看到的状态而非某一文档的内容。
        en: Records an algorithm-tagged digest of the prior document-identity and digest manifest used for comparison, pinning the state seen by the judgment rather than content of one document.
        ja: 一つの document の content ではなく、comparison に使用した既存 document identity と digest manifest の algorithm-tagged digest を記録し、judgment が見た state を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-state-policy-v12
      source_claims:
        - claim-deduplication-activity-digest
    - id: input_document_refs
      labels:
        zh: 候选文档引用
        en: candidate document references
        ja: 候補ドキュメント参照
      definitions:
        zh: 引用本阶段实际比较的规范化 Document 版本，而不是整个运行的所有来源或历史记录。
        en: References normalized Document versions actually compared by this phase rather than every source of the run or all historical records.
        ja: run のすべての source やすべての履歴 record ではなく、この phase が実際に比較する正規化 Document version を参照します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - document-policy-17
      source_claims:
        - claim-deduplication-activity-usage
    - id: decision_refs
      labels:
        zh: 去重决定引用
        en: deduplication decision references
        ja: 重複排除決定参照
      definitions:
        zh: 可选引用本活动为候选文档生成的独立 DeduplicationDecision，而不是将决定结果写入活动身份。
        en: Optionally references separate DeduplicationDecisions generated by this activity for candidate Documents rather than writing decision results into activity identity.
        ja: decision result を activity identity に書き込まず、この activity が candidate Document に対して生成した別個の DeduplicationDecision を任意で参照します。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - decision-policy-17-v12
      source_claims:
        - claim-deduplication-activity-generation
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 记录开始读取候选和参考状态的时间点，独立于候选文档创建时间。
        en: Records when candidate and reference state began being read independently of candidate Document creation time.
        ja: candidate Document の creation time とは独立に、candidate と reference state の読取りを開始した時点を記録します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:00:30Z"
      source_claims:
        - claim-deduplication-activity-temporal
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      definitions:
        zh: 可选记录比较阶段完成、失败或取消的时间点；状态为 running 时不应声称有结束时间。
        en: Optionally records when the comparison phase completed, failed, or was cancelled; a running phase must not claim an end time.
        ja: comparison phase が completed、failed、cancelled になった時点を任意で記録し、running phase は end time を主張してはなりません。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:00:42Z"
      source_claims:
        - claim-deduplication-activity-temporal
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: アクティビティ状態
      definitions:
        zh: 声明此比较活动的运行状态，不将新增、更新或跳过的业务决定值作为活动状态。
        en: Declares run state of this comparison activity without using admit, update, or skip business-decision values as activity status.
        ja: admit、update、skip の business-decision value を activity status とせず、この comparison activity の run state を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - running
        - completed
        - failed
        - cancelled
      pattern: null
      example_value: completed
      source_claims:
        - claim-deduplication-activity-temporal
  constraints:
    - id: deduplication-activity-comparison-contract
      severity: error
      expression_language: plain
      expression: >-
        activity_id, phase_id, ingestion_run_ref, sequence_number, phase_kind, input_resource_refs,
        input_information_refs, comparison_strategy, reference_state_digest, input_document_refs, started_at, and status
        are required. sequence_number must be positive and unique within the
        owning run. comparison_strategy must be one allowed exact comparison strategy. reference_state_digest must identify
        the version-pinned state manifest used for judgment. ended_at is absent while running and required in terminal
        states. A completed activity must reference at least one decision_refs value. A decision, source document, memory
        write, memory store, retrieval query, vector index, loader, policy text, or prompt context cannot substitute for the
        comparison activity.
      explanation:
        zh: 去重活动必须把输入候选、比较规则和判断所见的参考状态固定在同一局部阶段中；决定及其副作用保持为不同的可审计事实。
        en: A deduplication activity must pin input candidates, comparison rule, and reference state seen by judgment in one local phase; decisions and their side effects remain different auditable facts.
        ja: deduplication activity は input candidate、comparison rule、judgment が見た reference state を一つの局所 phase 内で固定しなければなりません。decision とその side effect は別個の監査可能な fact として残ります。
      source_claims:
        - claim-deduplication-activity-temporal
        - claim-deduplication-activity-usage
        - claim-deduplication-activity-digest
        - claim-deduplication-activity-generation
        - claim-deduplication-activity-boundary
  required_relations: []
examples:
  - id: deduplication-activity-positive

    labels:
      zh: 完成的文档更新比较
      en: Completed document update comparison
      ja: 完了したドキュメント更新比較

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      activity_id: deduplicate-policy-42-03
      phase_id: deduplicate-policy-42-03
      ingestion_run_ref: ingest-policy-directory-42
      sequence_number: 3
      phase_kind: deduplicate
      input_resource_refs:
        - dir-policy-2026-07
      input_information_refs:
        - document-policy-17
      comparison_strategy: exact-id-and-digest
      reference_state_digest: sha256:document-state-policy-v12
      input_document_refs:
        - document-policy-17
      decision_refs:
        - decision-policy-17-v12
      started_at: "2026-07-18T09:00:30Z"
      ended_at: "2026-07-18T09:00:42Z"
      status: completed
    related_node_ids:
      - DeduplicationActivity
      - IngestionPhase
      - IngestionRun
      - Document
      - DeduplicationDecision
    related_relation_ids:
      - DeduplicationActivity-is_a-IngestionPhase
      - DeduplicationActivity-consumes-Document
      - DeduplicationDecision-was-generated-by-DeduplicationActivity

    source_claims:
      - claim-deduplication-activity-comparison
      - claim-deduplication-activity-digest
      - claim-deduplication-activity-generation
  - id: deduplication-activity-counterexample

    labels:
      zh: 去重决定不是去重活动
      en: Deduplication decision is not the activity
      ja: 重複排除決定はアクティビティではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      decision_id: decision-policy-17-v12
      outcome: update
      candidate_document_ref: document-policy-17
      activity_id: absent
      started_at: absent
      reference_state_digest: absent
    related_node_ids:
      - DeduplicationActivity
      - DeduplicationDecision
    related_relation_ids:
      - DeduplicationDecision-was-generated-by-DeduplicationActivity

    source_claims:
      - claim-deduplication-activity-boundary
  - id: deduplication-activity-boundary

    labels:
      zh: 仅进行相似度检索的查询
      en: Query performing only similarity retrieval
      ja: 類似検索だけを行うクエリ

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      query_id: retrieve-policy-query
      query_text: policy retention
      candidate_document_refs:
        - document-policy-17
      comparison_strategy: absent
      reference_state_digest: absent
      decision_refs: []
    related_node_ids:
      - DeduplicationActivity
      - VectorIndex
      - Document
