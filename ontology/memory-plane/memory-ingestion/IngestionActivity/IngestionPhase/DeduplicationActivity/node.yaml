      expected_result:
        zh: 确认 dedup-17 同时属于 DeduplicationActivity、IngestionPhase 与 IngestionActivity。
        en: Confirm that dedup-17 belongs to DeduplicationActivity, IngestionPhase, and IngestionActivity.
        ja: dedup-17 を DeduplicationActivity、IngestionPhase、IngestionActivity に所属させます。
      why_valid_or_invalid:
        zh: 它先满足运行内局部活动的上位条件，再以去重比较和决定输出满足专门种差。
        en: It first satisfies the parent conditions for a run-local activity and then satisfies the specialized differentia through duplicate comparison and decision output.
        ja: run-local activity parent 条件を満たし duplicate comparison・decision output で differentia を満たします。
