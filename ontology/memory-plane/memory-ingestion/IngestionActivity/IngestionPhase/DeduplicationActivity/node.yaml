    en: "DeduplicationActivity is a strict subtype of IngestionPhase; its reviewed differentia is: it consumes canonical Document, compares prior identity or hash state, and produces DeduplicationDecision."
    ja: DeduplicationActivity は IngestionPhase の厳密なsubtypeで、審査済み種差は「canonical Documentを消費し既存identity/hash状態を比較して DeduplicationDecisionを生成します。」です。
  cardinality: null
