schema: moonweave.ai/ontology-node/v1
id: DeduplicationActivity
kind: concept
labels:
  zh: 去重活动
  en: Deduplication activity
  ja: 重複排除アクティビティ
semantics:
  short_definition:
    zh: 比较文档身份与摘要并产出去重决定的 ingest 阶段。
    en: Ingestion phase comparing document identity and digests to produce deduplication decisions.
    ja: document identity/digest を比較して deduplication decision を生成する ingest phase。
  definition:
    zh: DeduplicationActivity 是消费 canonical Document、按 dedup_strategy 查询既有 docstore/hash 状态并产生 DeduplicationDecision 的 IngestionPhase；对应 LlamaIndex IngestionPipeline _handle_duplicates/_handle_upserts 与 Mem0 deduplicate:true；不直接执行 MemoryWrite。
    en: DeduplicationActivity is an IngestionPhase consuming canonical Document, querying prior docstore/hash state per dedup_strategy, and producing DeduplicationDecision, mapping to LlamaIndex IngestionPipeline _handle_duplicates/_handle_upserts and Mem0 deduplicate:true; does not directly execute MemoryWrite.
    ja: DeduplicationActivity は canonical Document consume→dedup_strategy で既存 docstore/hash 照会→DeduplicationDecision 生成の IngestionPhase。LlamaIndex _handle_duplicates/_handle_upserts/Mem0 deduplicate:true に対応。MemoryWrite 直接実行なし。
  why_needed:
    zh: 把比较活动、决定信息与后续持久化动作分开，支持 content-hash dedup 审计。
    en: Separates comparison activity, decision information, and later persistence, supporting content-hash dedup audit.
    ja: 比較 activity/decision information/後続永続化 action を分離し content-hash dedup audit を支援。
  includes:
    - zh: 纳入 doc_id+hash、content-hash 与 Mem0 deduplicate 策略下的 duplicate/update/new/skip 判定。
      en: Includes duplicate/update/new/skip under doc_id+hash, content-hash, and Mem0 deduplicate strategies.
      ja: doc_id+hash/content-hash/Mem0 deduplicate 下の duplicate/update/new/skip 判定。
  excludes:
    - zh: 排除 DeduplicationDecision 产物混淆为活动、MemoryWrite 与普通相似检索。
      en: Excludes conflating DeduplicationDecision artifact with activity, MemoryWrite, and ordinary similarity search.
      ja: DeduplicationDecision artifact/activity 混同/MemoryWrite/通常 similarity search を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex pipeline 比较 document id 与 hash 决定 skip/update/delete；Mem0 add API deduplicate:true 在写入前合并相似记忆；Moonweave 把 outcome 记录为 DeduplicationDecision，reference_state_digest 固定比较基线。
    en: LlamaIndex pipeline compares document id and hash to skip/update/delete; Mem0 add API deduplicate:true merges similar memories before write; Moonweave records outcome as DeduplicationDecision with reference_state_digest fixing comparison baseline.
    ja: LlamaIndex pipeline が document id/hash 比較→skip/update/delete。Mem0 add deduplicate:true が write 前類似 memory 合并。Moonweave は outcome を DeduplicationDecision、reference_state_digest で比較 baseline 固定。
  typical_input:
    - description: Canonical document entering dedup phase
      format: |
        {"document_id": "document-policy-v7", "content_digest": "7333d79d..."}
      source_claims: [claim-dedup-llamaindex]
    - description: Mem0 add with deduplication enabled
      format: |
        POST /v1/memories/ {"messages": [...], "user_id": "alice", "deduplicate": true}
      source_claims: [claim-dedup-mem0]
  typical_output:
    - description: DeduplicationDecision reference from phase
      format: |
        {"decision_id": "decision-17", "outcome": "update", "prior_digest": "sha256:doc17-old"}
      source_claims: [claim-dedup-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline dedup
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: _handle_duplicates and _handle_upserts by doc id and hash.
    - name: Mem0 Deduplication
      url: https://docs.mem0.ai
      description: deduplicate flag on memory add API.
structure:
  identity_keys: [phase_id]
  fields:
    - id: phase_id
      labels: {zh: 阶段标识, en: Phase identifier, ja: phase 識別子}
      definitions:
        zh: 稳定标识去重阶段。
        en: Stable identifier for deduplication phase.
        ja: deduplication phase の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dedup-17
      allowed_values: []
      source_claims: [claim-dedup-id]
    - id: dedup_strategy
      labels: {zh: 去重策略, en: Deduplication strategy, ja: dedup strategy}
      definitions:
        zh: 固定身份键与 digest 比较规则（如 doc-id+hash、content-hash）。
        en: Fixes identity key and digest comparison rules (e.g., doc-id+hash, content-hash).
        ja: identity key/digest 比較 rule 固定（doc-id+hash/content-hash 等）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: doc-id+hash
      allowed_values: []
      source_claims: [claim-dedup-strategy]
    - id: reference_state_digest
      labels: {zh: 参照状态摘要, en: Reference state digest, ja: 参照状態 digest}
      definitions:
        zh: 固定比较时读取的 docstore/索引既有状态 digest。
        en: Digest of docstore/index prior state read at comparison time.
        ja: 比較時 read した docstore/index 既存状態 digest 固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:docstore17
      allowed_values: []
      source_claims: [claim-dedup-reference]
  constraints: []
  required_relations: []
examples:
  - id: DeduplicationActivity-example-llamaindex-hash
    labels:
      zh: LlamaIndex 内容哈希去重
      en: LlamaIndex content-hash dedup
      ja: LlamaIndex content-hash dedup
    descriptions:
      zh: dedup-17 比较 document-policy-v7 digest c7 与 docstore 既有 hash，strategy=doc-id+hash，reference_state_digest=docstore17，产出 decision-17 outcome=update。
      en: dedup-17 compares document-policy-v7 digest c7 with docstore prior hash, strategy=doc-id+hash, reference_state_digest=docstore17, producing decision-17 outcome=update.
      ja: dedup-17 が document-policy-v7 digest c7 と docstore 既存 hash 比較。strategy=doc-id+hash、reference_state_digest=docstore17→decision-17 outcome=update。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: duplicate handling
    field_values:
      phase_id: dedup-17
      dedup_strategy: doc-id+hash
      reference_state_digest: sha256:docstore17
    related_node_ids: [DeduplicationActivity, DeduplicationDecision, Document]
    related_relation_ids: []
    source_claims: [claim-dedup-llamaindex]
  - id: DeduplicationActivity-example-mem0-deduplicate
    labels:
      zh: Mem0 deduplicate 去重
      en: Mem0 deduplicate dedup
      ja: Mem0 deduplicate dedup
    descriptions:
      zh: Mem0 POST /v1/memories/ 设 deduplicate:true；dedup phase 比较新 fact digest 与 user scope 既有记忆，outcome=skip 当 content-hash 完全匹配。
      en: Mem0 POST /v1/memories/ with deduplicate:true; dedup phase compares new fact digest with user-scope prior memories, outcome=skip when content-hash fully matches.
      ja: Mem0 POST deduplicate:true。dedup phase が新 fact digest と user scope 既存 memory 比較。content-hash 完全一致で outcome=skip。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: deduplicate flag
    field_values:
      deduplicate: true
      user_id: alice
    related_node_ids: [DeduplicationActivity, DeduplicationDecision]
    related_relation_ids: []
    source_claims: [claim-dedup-mem0]
  - id: DeduplicationActivity-example-not-write
    labels:
      zh: 去重非写入
      en: Dedup is not write
      ja: dedup は write ではない
    descriptions:
      zh: write-17 读取 decision-17 执行 MemoryWrite；dedup-17 只产生 decision 不写入存储——执行决定与生成决定是不同生命周期阶段。
      en: write-17 reads decision-17 executing MemoryWrite; dedup-17 only produces decision without storage write—executing versus generating decisions are different lifecycle stages.
      ja: write-17 が decision-17 read→MemoryWrite 実行。dedup-17 は decision 生成のみで storage write なし。decision 実行/生成は別 lifecycle stage。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DeduplicationActivity, DeduplicationDecision]
    related_relation_ids: []
    source_claims: [claim-dedup-design]
parent_relation:
  id: DeduplicationActivity-is_a-IngestionPhase
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种摄入阶段, en: is an ingestion phase, ja: 取込フェーズの一種}
  definitions:
    zh: DeduplicationActivity 种差为消费 Document、比较 hash 状态并产出 DeduplicationDecision。
    en: DeduplicationActivity differentia consumes Document, compares hash state, and produces DeduplicationDecision.
    ja: DeduplicationActivity 種差は Document consume/hash 状態比較/DeduplicationDecision 产出。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-dedup-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: DeduplicationActivity-consumes-Document
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels: {zh: 消费文档, en: consumes document, ja: document を consume}
    definitions:
      zh: dedup phase input manifest 明确包含目标 document_id 与 content_digest。
      en: Dedup phase input manifest explicitly includes target document_id and content_digest.
      ja: dedup phase input manifest が target document_id/content_digest を明示包含。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达。
      en: Relation constrained per fact.
      ja: fact 単位制約。
    inverse_reading:
      predicate: inverse_consumes
      labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-dedup-consumes]
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:Document
sources:
  - id: src-llamaindex-dedup
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: Duplicate and upsert handling by id and hash.
  - id: src-mem0-dedup
    title: Mem0 Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: deduplicate flag on add memories.
  - id: src-dedup-design
    title: Moonweave deduplication boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Dedup activity versus decision versus write.
source_claims:
  - id: claim-dedup-llamaindex
    source: src-llamaindex-dedup
    supports: IngestionPipeline _handle_duplicates compares document IDs and hashes for skip/update/delete.
    locator: duplicate handling
    evidence_kind: official
    confidence: high
  - id: claim-dedup-mem0
    source: src-mem0-dedup
    supports: Mem0 add API supports deduplicate:true for content-based memory deduplication.
    locator: Add memories
    evidence_kind: official
    confidence: high
  - id: claim-dedup-design
    source: src-dedup-design
    supports: DeduplicationActivity produces DeduplicationDecision without performing MemoryWrite.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-id
    source: src-dedup-design
    supports: phase_id identifies deduplication phase within run.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-strategy
    source: src-dedup-design
    supports: dedup_strategy fixes comparison key and algorithm specification.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-reference
    source: src-dedup-design
    supports: reference_state_digest binds docstore baseline at comparison time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-consumes
    source: src-dedup-design
    supports: consumes Document requires manifest-backed document_id and content_digest.
    locator: consumes
    evidence_kind: design-inference
    confidence: high
