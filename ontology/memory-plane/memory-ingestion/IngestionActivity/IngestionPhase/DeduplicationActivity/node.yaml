      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: DeduplicationActivity-is_a-IngestionPhase-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestionPhase and also satisfies the differentia: it consumes canonical Document, compares prior identity or hash state, and produces DeduplicationDecision."
      explanations:
        zh: 仅当对象首先满足 IngestionPhase 定义且满足种差“消费规范 Document、比较既有身份/摘要并产生 DeduplicationDecision。”时成立。
        en: "Assert only when the object first satisfies IngestionPhase and also satisfies the differentia: it consumes canonical Document, compares prior identity or hash state, and produces DeduplicationDecision."
        ja: 対象がまず IngestionPhase を満たし、さらに種差「canonical Documentを消費し既存identity/hash状態を比較して DeduplicationDecisionを生成します。」を満たす時だけ成立します。
      source_claims:
        - claim-deduplication-activity-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DeduplicationActivity-is_a-IngestionPhase-example-positive-manual-20260716
      kind: positive
      labels:
