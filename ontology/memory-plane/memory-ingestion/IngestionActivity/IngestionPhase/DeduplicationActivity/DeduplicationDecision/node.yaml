        en: review-note-17 is created manually after the run and merely comments on whether decision-17 was reasonable; it has no generating phase ID and is absent from the comparison output manifest.
        ja: review-note-17 は run 後の manual comment で generating phase ID も output manifest membership もありません。
      field_values: {}
      related_node_ids:
        - DeduplicationActivity
        - DeduplicationDecision
      related_relation_ids:
        - DeduplicationActivity-produces-DeduplicationDecision
      expected_result:
        zh: 不要建立 dedup-17 produces review-note-17，也不要把评论记录当作 DeduplicationDecision。
        en: Do not assert dedup-17 produces review-note-17 or treat the commentary as DeduplicationDecision.
        ja: dedup-17 produces review-note-17 を確立せず comment を DeduplicationDecision としません。
      why_valid_or_invalid:
        zh: 主题相关和事后评价不构成因果生成；该关系要求活动输出清单与决定内部生成者一致。
        en: Topical relevance and later evaluation do not establish causal generation; the activity output manifest and the decision's internal generator must agree.
        ja: topic relevance・later evaluation は causal generation でなく output manifest と internal generator の一致が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-deduplication-decision-008
