  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DeduplicationActivity-produces-DeduplicationDecision-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 产生去重决定正例
        en: "Positive case: produces deduplication decision"
        ja: deduplication decisionを生成する正例
      scenario_id: null
      descriptions:
        zh: dedup-17 完成对 document-policy-v7@c7 与 docstore h6 的比较后，新建 decision-17，并在记录中写入 generating_phase_id=dedup-17、policy@4 与 outcome=update。
        en: After comparing document-policy-v7@c7 with docstore hash h6, dedup-17 creates decision-17 and records generating_phase_id dedup-17, policy@4, and outcome update.
        ja: dedup-17 は document@c7 と docstore h6 を比較後 decision-17 を生成し generating_phase_id、policy、outcome を記録します。
      field_values: {}
      related_node_ids:
