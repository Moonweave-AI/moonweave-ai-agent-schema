schema: moonweave.ai/ontology-node/v1
id: DeduplicationDecision
kind: concept
status: review
labels:
  zh: 去重决定
  en: Deduplication decision
  ja: 重複排除decision
semantics:
  short_definition:
    zh: 记录文档是重复、更新、全新或删除候选的可审计信息。
    en: Auditable information recording whether a document is duplicate, update, new, or deletion candidate.
    ja: documentがduplicate・update・new・deletion候補かを記録する監査可能informationです。
  definition:
    zh: DeduplicationDecision 是 DeduplicationActivity 产生并关于一个 Document 的信息记录，保存比较键、当前/既有摘要与 outcome；它不是活动、发生事件或持久写入。
    en: DeduplicationDecision is an information record produced by DeduplicationActivity and about one Document, retaining compared keys, current/prior digests, and outcome; it is not the activity, an occurrence event, or a persistence write.
    ja: DeduplicationDecision は DeduplicationActivity が生成し一 Document について比較key・current/prior digest・outcomeを保持するinformation recordで、activity・occurrence event・永続writeではありません。
  why_needed:
    zh: 替代把去重判断误建模为 DeduplicationEvent 的设计。
    en: Replaces the design that mis-modeled a deduplication judgment as DeduplicationEvent.
    ja: deduplication判断を DeduplicationEvent と誤建模した設計を置換します。
  includes:
    - zh: 纳入 duplicate、update、new 与 delete-candidate 的有证据决定。
      en: Includes evidence-backed duplicate, update, new, and delete-candidate decisions.
      ja: 根拠付きduplicate・update・new・delete-candidate decisionを含みます。
  excludes:
    - zh: 排除 DeduplicationActivity、ErrorEvent 与 MemoryWrite。
      en: Excludes DeduplicationActivity, ErrorEvent, and MemoryWrite.
      ja: DeduplicationActivity・ErrorEvent・MemoryWriteを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: decision ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次去重判断。
        en: Stable identifier for one deduplication judgment.
        ja: 一deduplication判断の安定識別子です。
      allowed_values: []
      pattern: null
      example_value: dedup-decision-17
      source_claims:
        - claim-deduplication-decision-002
    - id: document_digest
      labels:
        zh: 文档摘要
        en: document digest
        ja: document digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录当前文档内容摘要。
        en: Records the current document content digest.
        ja: current document content digestを記録します。
      allowed_values: []
      pattern: null
      example_value: sha256:doc17-new
      source_claims:
        - claim-deduplication-decision-003
    - id: prior_digest
      labels:
        zh: 既有摘要
        en: prior digest
        ja: 既存digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录匹配既有对象摘要。
        en: Records the matched prior object's digest.
        ja: matched prior objectのdigestを記録します。
      allowed_values: []
      pattern: null
      example_value: sha256:doc17-old
      source_claims:
        - claim-deduplication-decision-004
    - id: outcome
      labels:
        zh: 判断结果
        en: outcome
        ja: 判断結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 duplicate、update、new 或 delete-candidate。
        en: Records duplicate, update, new, or delete-candidate.
        ja: duplicate・update・new・delete-candidateを記録します。
      allowed_values: []
      pattern: null
      example_value: update
      source_claims:
        - claim-deduplication-decision-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeduplicationDecision-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 去重决定正例
      en: "Positive case: Deduplication decision"
      ja: 重複排除decision正例
    scenario_id: null
    descriptions:
      zh: decision-17 是 dedup-17 生成的不可变信息记录，固定 document-policy-v7、旧哈希 h6、新哈希 h7、policy@4、outcome=update 与生成时间。
      en: decision-17 is an immutable information record generated by dedup-17 that fixes document-policy-v7, prior hash h6, current hash h7, policy@4, outcome update, and generation time.
      ja: decision-17 は dedup-17 が生成した immutable information record で document、old/new hash、policy@4、outcome=update、生成時刻を固定します。
    field_values:
      decision_id: dedup-decision-17
      document_digest: sha256:doc17-new
      prior_digest: sha256:doc17-old
      outcome: update
    related_node_ids:
      - DeduplicationDecision
    related_relation_ids: []
    expected_result:
      zh: 将 decision-17 识别为 DeduplicationDecision，并允许后续流程引用其判断而不改写原记录。
      en: Identify decision-17 as DeduplicationDecision and allow downstream stages to reference its judgment without rewriting the original record.
      ja: decision-17 を DeduplicationDecision とし downstream stage は原記録を書換えず判断を参照します。
    why_valid_or_invalid:
      zh: 被判断文档、比较证据、策略版本、离散结果和生成活动都可审计，构成独立决定身份。
      en: The judged document, comparison evidence, policy version, discrete outcome, and generating activity are all auditable and establish independent decision identity.
      ja: judged document、comparison evidence、policy version、outcome、generating activity が監査可能で独立 decision identity を形成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-deduplication-decision-006
  - id: DeduplicationDecision-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 去重决定边界例
      en: "Boundary case: Deduplication decision"
      ja: 重複排除decision境界例
    scenario_id: null
    descriptions:
      zh: dedup-17 有 start/end、输入清单和执行日志，并在结束时产生 decision-17；它是持续活动而不是持久判断记录。
      en: dedup-17 has start and end times, an input manifest, and execution logs and produces decision-17 at completion; it is a durative activity rather than the persistent judgment record.
      ja: dedup-17 は start/end、input manifest、execution log を持ち完了時に decision-17 を生成する durative activity です。
    field_values: {}
    related_node_ids:
      - DeduplicationDecision
    related_relation_ids: []
    expected_result:
      zh: 把 dedup-17 保持为 DeduplicationActivity，仅把 decision-17 作为 DeduplicationDecision。
      en: Keep dedup-17 as DeduplicationActivity and use only decision-17 as DeduplicationDecision.
      ja: dedup-17 は DeduplicationActivity、decision-17 だけを DeduplicationDecision とします。
    why_valid_or_invalid:
      zh: 产生决定的活动与决定信息具有不同身份键、持续时间和更新规则，不能因一一对应而合并。
      en: The generating activity and decision information have different identity keys, duration, and update rules and cannot be merged because they correspond one-to-one.
      ja: generating activity と decision information は identity key、duration、update rule が異なり一対一でも統合できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-deduplication-decision-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
