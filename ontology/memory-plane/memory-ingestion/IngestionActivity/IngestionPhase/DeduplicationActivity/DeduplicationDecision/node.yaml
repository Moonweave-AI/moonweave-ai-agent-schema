schema: moonweave.ai/ontology-node/v1
id: DeduplicationDecision
kind: concept
labels:
  zh: 去重决定
  en: Deduplication decision
  ja: 重複排除決定
semantics:
  short_definition:
    zh: 记录文档相对既有状态是跳过、新增、更新或删除候选的可审计信息。
    en: Auditable information recording skip, create, update, or delete-candidate relative to prior state.
    ja: 既存状態に対し skip/create/update/delete-candidate を記録する監査可能 information。
  definition:
    zh: DeduplicationDecision 是 DeduplicationActivity 产生、关于一个 Document 的信息记录，保存 decision_id、document_digest、prior_digest 与 outcome（duplicate/update/new/skip/delete-candidate）；不是活动、事件或 MemoryWrite。
    en: DeduplicationDecision is information produced by DeduplicationActivity about one Document, retaining decision_id, document_digest, prior_digest, and outcome (duplicate/update/new/skip/delete-candidate); not an activity, event, or MemoryWrite.
    ja: DeduplicationDecision は DeduplicationActivity が一 Document について生成する information。decision_id/document_digest/prior_digest/outcome（duplicate/update/new/skip/delete-candidate）保持。activity/event/MemoryWrite ではない。
  why_needed:
    zh: 把去重判断固化为可引用信息产物，供下游 write 与审计查询，且必须绑定比较时的 digest。
    en: Fixes deduplication judgment as referencable information artifact for downstream write and audit, binding digest at comparison time.
    ja: dedup 判断を参照可能 information artifact として固定し downstream write/audit に供給。比較時 digest binding 必須。
  includes:
    - zh: 纳入有 evidence digest 的 duplicate、update、new、skip 与 delete-candidate 决定。
      en: Includes duplicate, update, new, skip, and delete-candidate decisions with evidence digests.
      ja: evidence digest 付き duplicate/update/new/skip/delete-candidate decision。
  excludes:
    - zh: 排除 DeduplicationActivity、ErrorEvent 与 MemoryWrite。
      en: Excludes DeduplicationActivity, ErrorEvent, and MemoryWrite.
      ja: DeduplicationActivity/ErrorEvent/MemoryWrite を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex pipeline dedup 返回 skip/update 分类；Moonweave 建模 decision-17 绑定 document-policy-v7@c7 与 prior digest；新 digest 不得复用旧 decision；Mem0 deduplicate 结果同理映射 outcome。
    en: LlamaIndex pipeline dedup returns skip/update classification; Moonweave models decision-17 binding document-policy-v7@c7 and prior digest; new digest must not reuse old decision; Mem0 deduplicate results map to outcome likewise.
    ja: LlamaIndex pipeline dedup→skip/update 分類。Moonweave は decision-17 が document-policy-v7@c7/prior digest binding。新 digest で旧 decision 再利用不可。Mem0 deduplicate 結果も outcome 写像。
  typical_input:
    - description: Dedup comparison result from phase
      format: |
        {"document_digest": "7333d79d...", "prior_digest": "abc123...", "matched": true}
      source_claims: [claim-dedup-decision-llamaindex]
  typical_output:
    - description: Moonweave deduplication decision record
      format: |
        {
          "decision_id": "decision-17",
          "document_digest": "7333d79d...",
          "prior_digest": "abc123...",
          "outcome": "update"
        }
      source_claims: [claim-dedup-decision-design]
  reference_implementations:
    - name: LlamaIndex IngestionPipeline
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      description: Duplicate classification outcomes.
    - name: Mem0 Deduplication
      url: https://docs.mem0.ai
      description: deduplicate merge/skip behavior.
structure:
  identity_keys: [decision_id]
  fields:
    - id: decision_id
      labels: {zh: 决定标识, en: Decision identifier, ja: decision 識別子}
      definitions:
        zh: 稳定标识一次去重判断。
        en: Stable identifier for one deduplication judgment.
        ja: 一 dedup 判断の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision-17
      allowed_values: []
      source_claims: [claim-dedup-decision-id]
    - id: document_digest
      labels: {zh: 文档摘要, en: Document digest, ja: document digest}
      definitions:
        zh: 判断时比较的当前 Document content_digest。
        en: Current Document content_digest compared at decision time.
        ja: 判断時比較した current Document content_digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:doc17-new
      allowed_values: []
      source_claims: [claim-dedup-decision-doc-digest]
    - id: prior_digest
      labels: {zh: 既有摘要, en: Prior digest, ja: prior digest}
      definitions:
        zh: 匹配到的既有对象 digest；new outcome 时可为空或 sentinel。
        en: Matched prior object digest; may be empty or sentinel for new outcome.
        ja: 一致 prior object digest。new outcome 時 empty/sentinel 可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:doc17-old
      allowed_values: []
      source_claims: [claim-dedup-decision-prior]
    - id: outcome
      labels: {zh: 判断结果, en: Outcome, ja: outcome}
      definitions:
        zh: duplicate、update、new、skip 或 delete-candidate 之一。
        en: One of duplicate, update, new, skip, or delete-candidate.
        ja: duplicate/update/new/skip/delete-candidate のいずれか。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: update
      allowed_values: []
      source_claims: [claim-dedup-decision-outcome]
  constraints:
    - id: dedup-decision-binds-digest
      severity: error
      expression_language: plain
      expression: A DeduplicationDecision must bind the exact document_digest compared at decision time; reusing a prior decision for a new digest is invalid.
      explanation:
        zh: 相同 document_id 不等于相同版本；决定必须对比较 digest 负责。
        en: Equal document_id is not equal version; decision must bind compared digest.
        ja: 同 document_id≠同版。decision は比較 digest に binding 必須。
      source_claims: [claim-dedup-decision-design]
  required_relations: []
examples:
  - id: DeduplicationDecision-example-update
    labels:
      zh: 更新决定去重
      en: Update outcome dedup
      ja: update outcome dedup
    descriptions:
      zh: decision-17：document-policy-v7 digest c7 匹配 docstore 中同 document_id 的 prior digest c6，outcome=update；下游 write 可据此 upsert。
      en: "decision-17 — document-policy-v7 digest c7 matches prior digest c6 for same document_id in docstore, outcome=update; downstream write may upsert accordingly."
      ja: decision-17：document-policy-v7 digest c7 が docstore 同 document_id の prior c6 と一致、outcome=update。downstream write が upsert 可。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
      version: upsert handling
    field_values:
      decision_id: decision-17
      document_digest: sha256:doc17-new
      prior_digest: sha256:doc17-old
      outcome: update
    related_node_ids: [DeduplicationDecision, Document, DeduplicationActivity]
    related_relation_ids: []
    source_claims: [claim-dedup-decision-llamaindex]
  - id: DeduplicationDecision-example-skip-duplicate
    labels:
      zh: 跳过重复内容
      en: Skip duplicate content
      ja: skip duplicate content
    descriptions:
      zh: decision-18：content-hash 与 prior 完全一致，outcome=skip；ingest-run-17 不产出新 Document 版本也不触发 write。
      en: "decision-18 — content-hash fully matches prior, outcome=skip; ingest-run-17 produces no new Document version and triggers no write."
      ja: decision-18：content-hash が prior と完全一致、outcome=skip。ingest-run-17 は新 Document 版/write トリガーなし。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: deduplicate
    field_values:
      outcome: skip
      document_digest: sha256:identical-hash
      prior_digest: sha256:identical-hash
    related_node_ids: [DeduplicationDecision, IngestionRun]
    related_relation_ids: []
    source_claims: [claim-dedup-decision-mem0]
  - id: DeduplicationDecision-example-not-activity
    labels:
      zh: 决定非活动
      en: Decision is not activity
      ja: decision は activity ではない
    descriptions:
      zh: dedup-17 有 started_at 与比较行为；decision-17 无时间边界只有 outcome 与 digest 字段——产物不得继承活动类型。
      en: dedup-17 has started_at and comparison behavior; decision-17 has no temporal boundary, only outcome and digest fields—artifact must not inherit activity type.
      ja: dedup-17 は started_at/比較行為あり。decision-17 は時間境界なし outcome/digest のみ。artifact は activity type 継承不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DeduplicationDecision, DeduplicationActivity]
    related_relation_ids: []
    source_claims: [claim-dedup-decision-design]
parent_relation:
  id: DeduplicationActivity-produces-DeduplicationDecision
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels: {zh: 由去重活动产生, en: produced by deduplication activity, ja: deduplication activity により生成}
  definitions:
    zh: DeduplicationActivity produces DeduplicationDecision 表示该决定由 dedup phase 在比较后生成并绑定 phase 证据。
    en: DeduplicationActivity produces DeduplicationDecision means the decision was generated by dedup phase after comparison with phase evidence binding.
    ja: DeduplicationActivity produces DeduplicationDecision は dedup phase が比較後生成し phase evidence binding することを表す。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达。
    en: Relation constrained per fact.
    ja: fact 単位制約。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse reading, ja: 逆方向読取}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-dedup-decision-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-llamaindex-dedup
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/ingestion_pipeline/
    source_type: official-doc
    relevance: Duplicate and upsert outcomes.
  - id: src-mem0-dedup
    title: Mem0 Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: deduplicate outcomes.
  - id: src-dedup-decision-design
    title: Moonweave deduplication decision boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Decision artifact versus activity.
source_claims:
  - id: claim-dedup-decision-llamaindex
    source: src-llamaindex-dedup
    supports: Pipeline duplicate handling classifies documents into skip/update/delete outcomes.
    locator: _handle_duplicates
    evidence_kind: official
    confidence: high
  - id: claim-dedup-decision-mem0
    source: src-mem0-dedup
    supports: Mem0 deduplicate produces skip or merge outcomes based on content similarity.
    locator: deduplicate
    evidence_kind: official
    confidence: high
  - id: claim-dedup-decision-design
    source: src-dedup-decision-design
    supports: DeduplicationDecision binds digests at comparison time distinct from activity.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-decision-id
    source: src-dedup-decision-design
    supports: decision_id identifies one deduplication judgment.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-decision-doc-digest
    source: src-dedup-decision-design
    supports: document_digest records compared current document digest.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-decision-prior
    source: src-dedup-decision-design
    supports: prior_digest records matched prior state digest.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-dedup-decision-outcome
    source: src-dedup-decision-design
    supports: outcome enumerates skip/create/update/duplicate/delete-candidate disposition.
    locator: structure
    evidence_kind: design-inference
    confidence: high
