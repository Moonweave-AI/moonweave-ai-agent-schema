source_claims:
  - id: claim-text-document-loader
    source: langchain-document-loaders
    supports: LangChain documents source loaders that create text-bearing Document values. Moonweave distinguishes a canonical text body from raw files, loader code, chunks, and retrieval results.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-text-document-charset
    source: rfc-3629
    supports: RFC 3629 defines UTF-8 as an encoding form for Unicode character sequences. Moonweave requires an actual charset decode and resulting character count before classifying canonical content as TextDocument.
    locator: RFC 3629 sections 1 and 3 on UTF-8 definition and encoding rules
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-text-document-language
    source: rfc-5646
    supports: RFC 5646 defines language tags for identifying languages. Moonweave records an optional language tag as descriptive metadata of decoded text rather than as a substitute for content identity or decoding evidence.
    locator: RFC 5646 sections 1 and 2 on language-tag structure
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-text-document-digest
    source: w3c-prov-o
    supports: PROV-O distinguishes independently identifiable entities and activities. Moonweave keeps canonical text content version separate from the normalization activity, raw source resource, and later chunks.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-text-document-specialization
    source: w3c-prov-o
    supports: Modeling a successfully decoded text body as a TextDocument specialization of Document is a Moonweave taxonomy inference grounded in PROV-O's distinction between entities and activities that generate or use them.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-text-document-parent-contract
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity's identity from the Activity that generated it and from descriptive metadata. Moonweave therefore retains the parent Document's information identity, generation, normalization, input-manifest, and metadata references when it classifies that same entity as TextDocument.
    locator: PROV-O section 3.1 Activity and Entity; generation and usage relations
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-text-document-boundary
    source: langchain-document-loaders
    supports: Loader integrations distinguish source formats and resulting Document values. Moonweave keeps a binary primary Document distinct from a separately produced transcript or other text-bearing derived value.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: medium
