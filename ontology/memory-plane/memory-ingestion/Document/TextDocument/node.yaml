schema: moonweave.ai/ontology-node/v1
id: TextDocument
kind: concept
status: accepted
labels:
  zh: 文本规范文档
  en: Text canonical document
  ja: テキスト正規Document
semantics:
  short_definition:
    zh: 主要规范内容可按声明字符集解码为字符序列的 Document。
    en: A Document whose primary canonical content decodes to a character sequence under a declared charset.
    ja: 宣言された文字集合で主要な正規内容を文字列へ復号できるDocumentです。
  definition:
    zh: >-
      TextDocument 是 Document 的特化：它保留文档身份与规范内容摘要，其主要媒体类型为文本类型，正文可用声明的字符集解码，
      并可选记录主要自然语言标签和字符长度。它不是原始文本文件、包含文本附件的音频或图像 Document、单个 Chunk、
      文本加载器或用于用户回答的检索结果。
    en: >-
      TextDocument is a Document specialization that retains document identity and canonical content digest, has a text
      primary media type, decodes its body under a declared charset, and may record primary natural-language tag and
      character count. It is not a raw text file, an audio or image Document with a text attachment, one Chunk, a text
      loader, or a retrieval result used to answer a user.
    ja: >-
      TextDocument はDocumentの特化であり、Document同一性と正規内容ダイジェストを保持し、テキストの主要メディア型を持ち、
      宣言された文字集合で本文を復号でき、主な自然言語タグと文字数を任意に記録できます。原始テキストファイル、
      テキスト添付を持つ音声または画像Document、一つのChunk、テキストローダー、利用者回答用の検索結果ではありません。
  why_needed:
    zh: 将文本可解码性及其字符集证据与一般文档身份分开，使分块、语言处理和编码失败能够在正确的内容层被验证。
    en: Separates text decodability and charset evidence from general Document identity so chunking, language processing, and encoding failures can be validated at the correct content layer.
    ja: テキストの復号可能性と文字集合証拠を一般Document同一性から分離し、分割、言語処理、符号化失敗を正しい内容層で検証可能にします。
  includes:
    - zh: 以 UTF-8 等声明字符集解码的纯文本、Markdown、HTML、CSV 或结构化文本规范文档。
      en: Canonical plain text, Markdown, HTML, CSV, or structured-text Documents decoded under a declared charset such as UTF-8.
      ja: UTF-8などの宣言された文字集合で復号されるプレーンテキスト、Markdown、HTML、CSV、構造化テキストの正規Documentを含みます。
  excludes:
    - zh: 原始文件资源、以二进制音频或图像为主要负载的文档、仅附带转录文本的媒体、文本片段、嵌入向量和文本加载器实现。
      en: Raw file resources, Documents whose primary payload is binary audio or image, media merely accompanied by a transcript, text chunks, embedding vectors, and text-loader implementations.
      ja: 原始ファイル資源、主要ペイロードがバイナリ音声または画像のDocument、転写テキストを伴うだけの媒体、テキストチャンク、埋込みベクトル、テキストローダー実装を除きます。
  semantic_kind: information
  aliases:
    - decodable text document
    - charset-declared document
engineering:
  explanation:
    zh: >-
      在文档生成后，文本专用处理会验证规范内容摘要对应的字节能按声明 charset 解码，保存文本媒体类型、字符数和可选语言标签。
      分块器可依赖这些字段选择字符边界策略；若解码失败，规范化活动应失败或产生不同媒体文档，而不能把损坏字节标为 TextDocument。
    en: >-
      After document generation, text-specific handling verifies that bytes for canonical content digest decode under the
      declared charset and stores text media type, character count, and optional language tag. A chunker can use these
      fields to choose character-boundary behavior; on decode failure normalization should fail or form a different media
      Document rather than label corrupted bytes as TextDocument.
    ja: >-
      Document生成後、テキスト固有処理は正規内容ダイジェストに対応するバイトが宣言charsetで復号できることを検証し、
      テキストメディア型、文字数、任意の言語タグを保存します。分割器はこれらを文字境界方針に使えます。復号失敗時は
      正規化を失敗させるか別媒体Documentを形成し、壊れたバイトをTextDocumentと標記してはいけません。
  typical_input:
    - description: Canonical document content awaiting text validation
      format: |
        {
          "document_id": "document-policy-42-v1",
          "content_digest": "sha256:document-policy-42-v1",
          "media_type": "text/markdown",
          "content_bytes": "UTF-8 encoded canonical body"
        }
  typical_output:
    - description: Decodable text-document classification
      format: |
        {
          "document_id": "document-policy-42-v1",
          "content_digest": "sha256:document-policy-42-v1",
          "primary_media_type": "text/markdown",
          "charset": "utf-8",
          "language_tag": "en",
          "character_count": 1428
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that create text-bearing Document values from varied source formats.
    - name: RFC 3629 UTF-8
      url: https://www.rfc-editor.org/rfc/rfc3629
      description: Defines the UTF-8 encoding form for Unicode character sequences.
    - name: RFC 5646 Tags for Identifying Languages
      url: https://www.rfc-editor.org/rfc/rfc5646
      description: Defines tags for identifying natural languages in content metadata.
structure:
  identity_keys:
    - document_id
    - content_digest
    - charset
  fields:
    - id: document_id
      labels:
        zh: 文档标识
        en: document ID
        ja: Document ID
      definitions:
        zh: 保留被分类为文本的规范 Document 身份；它不是指向另一份文件、片段或加载器的外键。
        en: Retains the canonical Document identity classified as text; it is not a foreign key to a second file, chunk, or loader.
        ja: テキストとして分類される正規Document同一性を保持し、別のファイル、チャンク、ローダーへの外部キーではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: document-policy-42-v1
      source_claims:
        - claim-text-document-specialization
    - id: content_digest
      labels:
        zh: 规范内容摘要
        en: canonical content digest
        ja: 正規内容ダイジェスト
      definitions:
        zh: 固定经字符集验证的规范文本内容版本，而不是原始资源字节、临时缓冲区或嵌入向量。
        en: Pins the charset-validated canonical text content version rather than raw resource bytes, a temporary buffer, or an embedding vector.
        ja: 原始資源バイト、一時バッファ、埋込みベクトルではなく、文字集合検証済みの正規テキスト内容版を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-42-v1
      source_claims:
        - claim-text-document-digest
    - id: information_id
      labels:
        zh: 信息标识
        en: information ID
        ja: 情報ID
      definitions:
        zh: 保留父 Document 的 IngestibleInformation 身份，使文本分类仍可追溯到上位信息对象。
        en: Retains the parent Document's IngestibleInformation identity so the text classification remains traceable to its parent information object.
        ja: テキスト分類を親情報オブジェクトまで追跡できるよう、親DocumentのIngestibleInformation同一性を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: info-document-policy-42-v1
      source_claims:
        - claim-text-document-parent-contract
    - id: media_type
      labels:
        zh: 父文档媒体类型
        en: parent Document media type
        ja: 親Documentメディア型
      definitions:
        zh: 保留父 Document 的规范内容媒体类型；对于 TextDocument，它必须与 primary_media_type 相同。
        en: Retains the parent Document's canonical-content media type; for TextDocument it must equal primary_media_type.
        ja: 親Documentの正規内容メディア型を保持し、TextDocumentでは primary_media_type と一致しなければなりません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - text/markdown
        - text/plain
        - text/html
        - application/json
        - text/csv
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-text-document-loader
    - id: generating_activity_ref
      labels:
        zh: 生成活动引用
        en: generating activity reference
        ja: 生成活動参照
      definitions:
        zh: 保留首次形成该规范文本版本的完成 NormalizationActivity，而不是仅读取文本的活动。
        en: Retains the completed NormalizationActivity that first formed this canonical text version rather than an activity that merely read it.
        ja: 単にテキストを読んだ活動ではなく、この正規テキスト版を最初に形成した完了済みNormalizationActivityを保持します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: normalize-policy-42-02
      source_claims:
        - claim-text-document-parent-contract
    - id: normalization_profile
      labels:
        zh: 规范化配置
        en: normalization profile
        ja: 正規化プロファイル
      definitions:
        zh: 保留生成活动使用的版本化解析、清洗和字符规范化配置，以便重放文本正文的形成过程。
        en: Retains the generating activity's versioned parsing, cleaning, and character-normalization configuration so formation of the text body can be replayed.
        ja: テキスト本文の形成を再生できるよう、生成活動の版付き解析、清掃、文字正規化構成を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - unicode-nfc-clean-v1
        - pdf-text-extraction-v3
        - html-text-clean-v2
      pattern: null
      example_value: unicode-nfc-clean-v1
      source_claims:
        - claim-text-document-parent-contract
    - id: input_manifest_digest
      labels:
        zh: 输入清单摘要
        en: input manifest digest
        ja: 入力マニフェストダイジェスト
      definitions:
        zh: 保留生成该文本版本时实际读取的信息版本清单摘要，不把文本分类当作无来源的重新生成。
        en: Retains the digest of information versions actually read to generate this text version rather than treating text classification as a provenance-free regeneration.
        ja: テキスト分類を来歴のない再生成として扱わず、このテキスト版の生成時に実際に読んだ情報版のマニフェストダイジェストを保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:input-manifest-policy-42-v1
      source_claims:
        - claim-text-document-parent-contract
    - id: metadata_ref
      labels:
        zh: 文档元数据引用
        en: document metadata reference
        ja: Documentメタデータ参照
      definitions:
        zh: 保留描述该文本 Document 的独立 DocumentMetadata 引用，不将可变标题、标签或权限并入内容身份。
        en: Retains the separate DocumentMetadata reference for this text Document without folding mutable title, tag, or permission data into content identity.
        ja: 可変の題名、タグ、権限データを内容同一性へ混ぜず、このテキストDocumentの独立DocumentMetadata参照を保持します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: metadata-document-policy-42-v1
      source_claims:
        - claim-text-document-parent-contract
    - id: primary_media_type
      labels:
        zh: 主要文本媒体类型
        en: primary text media type
        ja: 主要テキストメディア型
      definitions:
        zh: 声明规范正文的文本媒体类型，用于区分主要文本负载与仅含文本附件的二进制媒体。
        en: Declares the text media type of canonical body, distinguishing primary textual payload from binary media that merely carry a text attachment.
        ja: 正規本文のテキストメディア型を宣言し、主要テキストペイロードとテキスト添付を持つだけのバイナリ媒体を区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - text/plain
        - text/markdown
        - text/html
        - text/csv
        - application/json
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-text-document-loader
    - id: charset
      labels:
        zh: 字符集
        en: charset
        ja: 文字集合
      definitions:
        zh: 声明用于解码该规范正文的字符集；它必须与实际内容验证一致，不能由文件扩展名猜测。
        en: Declares the charset used to decode canonical body and must agree with actual content validation rather than being guessed from a filename extension.
        ja: 正規本文を復号するための文字集合を宣言し、ファイル拡張子から推測するのでなく実際の内容検証と一致しなければなりません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - utf-8
        - utf-16le
        - iso-8859-1
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-text-document-charset
    - id: language_tag
      labels:
        zh: 主要语言标签
        en: primary language tag
        ja: 主要言語タグ
      definitions:
        zh: 可选地记录文本主要自然语言的标准标签，用于筛选或展示，但不替代正文语言检测和人工修订。
        en: Optionally records a standard tag for primary natural language for filtering or display, without replacing body-language detection and human correction.
        ja: 絞込みまたは表示のため主要自然言語の標準タグを任意に記録し、本文言語検出や人手修正を置き換えません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: en
      source_claims:
        - claim-text-document-language
    - id: character_count
      labels:
        zh: 字符数量
        en: character count
        ja: 文字数
      definitions:
        zh: 记录按声明字符集成功解码后的字符序列长度，辅助分块容量验证而不是字节长度或 token 数。
        en: Records length of character sequence after successful decoding under the declared charset, aiding chunk-capacity validation rather than reporting byte length or token count.
        ja: 宣言charsetで成功復号した後の文字列長を記録し、バイト長やトークン数ではなく分割容量検証を助けます。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: 1428
      source_claims:
        - claim-text-document-charset
  constraints:
    - id: text-document-parent-consistency
      expression: document_id and content_digest must identify a Document whose media_type equals primary_media_type and whose canonical body is available for text validation.
      explanation:
        zh: TextDocument 不能脱离父 Document 单独存在；文档身份、内容版本和主要媒体类型必须一致，不能把关联附件的媒体类型拿来分类。
        en: TextDocument cannot exist apart from its parent Document; document identity, content version, and primary media type must agree, and media type of an associated attachment cannot drive classification.
        ja: TextDocument は親Documentから独立して存在できず、Document同一性、内容版、主要メディア型が一致する必要があり、関連添付のメディア型で分類してはいけません。
    - id: text-document-decodability
      expression: primary_media_type must be a declared text media type; canonical bytes for content_digest must decode without error under charset; character_count must equal the resulting character-sequence length.
      explanation:
        zh: 文本分类需要实际的、可复验的解码结果；损坏字节、未知编码或仅有转录附件都不满足此约束。
        en: Text classification requires an actual verifiable decode result; corrupt bytes, unknown encoding, or merely having a transcript attachment do not satisfy this constraint.
        ja: テキスト分類には実際に検証可能な復号結果が必要であり、壊れたバイト、未知の符号化、転写添付を持つだけではこの制約を満たしません。
    - id: text-document-language-scope
      expression: If language_tag is present, it must be a valid language tag for the decoded body; absence means unknown or not-recorded language, not a non-text payload.
      explanation:
        zh: 语言标签是可选描述信息；没有标签并不否定文本可解码性，但错误标签不得被当作正文语言事实。
        en: Language tag is optional descriptive information; absence does not negate text decodability, but an invalid tag must not be treated as a fact about the body language.
        ja: 言語タグは任意の記述情報であり、欠落はテキスト復号可能性を否定しませんが、不正なタグを本文言語の事実として扱ってはいけません。
examples:
  - id: text-document-positive

    labels:
      zh: UTF-8 策略 Markdown 文档
      en: UTF-8 policy Markdown document
      ja: UTF-8方針Markdown文書

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      document_id: document-policy-42-v1
      information_id: info-document-policy-42-v1
      content_digest: sha256:document-policy-42-v1
      media_type: text/markdown
      generating_activity_ref: normalize-policy-42-02
      normalization_profile: unicode-nfc-clean-v1
      input_manifest_digest: sha256:input-manifest-policy-42-v1
      metadata_ref: metadata-document-policy-42-v1
      primary_media_type: text/markdown
      charset: utf-8
      language_tag: en
      character_count: 1428
    related_node_ids:
      - TextDocument
      - Document
      - NormalizationActivity
    related_relation_ids:
      - TextDocument-is_a-Document
      - NormalizationActivity-produces-Document
      - NormalizationActivity-produces-Document

    source_claims:
      - claim-text-document-charset
      - claim-text-document-specialization
  - id: text-document-counterexample

    labels:
      zh: 带有转录文本的音频文档
      en: Audio document with transcript attachment
      ja: 転写テキスト添付を持つ音声Document

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      document_id: document-audio-42-v1
      content_digest: sha256:document-audio-42-v1
      primary_media_type: audio/wav
      charset: absent
      transcript_attachment_ref: attachment-transcript-42
      character_count: absent
    related_node_ids:
      - TextDocument
      - Document
      - SourceAttachment
    related_relation_ids:
      - TextDocument-is_a-Document
      - Document-has_source_attachment-SourceAttachment

    source_claims:
      - claim-text-document-boundary
  - id: text-document-boundary

    labels:
      zh: 提取了文本但主负载仍为 PDF 的文档
      en: Document with extracted text but PDF primary payload
      ja: テキストを抽出したが主要ペイロードがPDFのDocument

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      document_id: document-report-pdf-42
      content_digest: sha256:document-report-pdf-42
      primary_media_type: application/pdf
      extracted_text_digest: sha256:report-text-42
      extracted_text_charset: utf-8
      character_count: absent
    related_node_ids:
      - TextDocument
      - Document
      - DocumentMetadata
    related_relation_ids:
      - TextDocument-is_a-Document
      - document_has_document_metadata

    source_claims:
      - claim-text-document-boundary
  - id: text-document-instance

    labels:
      zh: 以中文语言标签保存的客户条款文本
      en: "Instance: customer-terms text with Chinese language tag"
      ja: "事例: 中国語言語タグを持つ顧客規約テキスト"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      document_id: document-customer-terms-51-v3
      information_id: info-document-customer-terms-51-v3
      content_digest: sha256:document-customer-terms-51-v3
      media_type: text/plain
      generating_activity_ref: normalize-customer-terms-51-03
      normalization_profile: unicode-nfc-clean-v1
      input_manifest_digest: sha256:input-manifest-customer-terms-51-v3
      metadata_ref: metadata-document-customer-terms-51-v3
      primary_media_type: text/plain
      charset: utf-8
      language_tag: zh-Hans
      character_count: 918
    related_node_ids:
      - TextDocument
      - Document
    related_relation_ids:
      - TextDocument-is_a-Document
      - NormalizationActivity-produces-Document

    source_claims:
      - claim-text-document-charset
      - claim-text-document-language
parent_relation:
  id: TextDocument-is_a-Document
  predicate: is_a
  target: concept:Document
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是文档的文本特化
    en: is a text specialization of document
    ja: Documentのテキスト特化である
  definitions:
    zh: TextDocument 是主要规范正文可按声明字符集解码、具有文本媒体类型的 Document。
    en: TextDocument is a Document whose primary canonical body has text media type and decodes under a declared charset.
    ja: TextDocument は主要な正規本文がテキストメディア型を持ち、宣言charsetで復号できるDocumentです。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
