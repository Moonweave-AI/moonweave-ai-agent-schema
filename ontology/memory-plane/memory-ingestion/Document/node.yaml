schema: moonweave.ai/ontology-node/v1
id: Document
kind: concept
status: accepted
labels:
  zh: 规范文档
  en: Canonical document
  ja: 正規Document
semantics:
  short_definition:
    zh: 由完成的规范化活动形成、可独立引用的规范内容与元数据实体。
    en: Independently referable canonical content and metadata formed by a completed normalization activity.
    ja: 完了した正規化活動により形成され、独立して参照できる正規内容とメタデータの実体です。
  definition:
    zh: >-
      Document 是 IngestibleInformation 的特化：它由一个已完成的 NormalizationActivity 依据确定输入清单和配置形成，
      以 document_id、信息标识、规范内容摘要和媒体类型标识，并关联独立的 DocumentMetadata 与 SourceAttachment。
      它可以作为下游去重、分块、索引或审计的输入，但不是原始 FileResource、未完成解析缓冲区、单个 Chunk、加载器或活动。
    en: >-
      A Document is an IngestibleInformation specialization formed by one completed NormalizationActivity under a fixed
      input manifest and profile. It is identified by document_id, information identity, canonical content digest, and
      media type and associates separate DocumentMetadata and SourceAttachment facts. It can feed downstream
      deduplication, chunking, indexing, or audit, but is not a raw FileResource, incomplete parse buffer, one Chunk,
      loader, or activity.
    ja: >-
      Document は、固定された入力マニフェストとプロファイルの下で一つの完了した NormalizationActivity により形成される
      IngestibleInformation の特化です。document_id、情報同一性、正規内容ダイジェスト、メディア型で識別され、
      独立したDocumentMetadataとSourceAttachmentの事実に関連付けられます。下流の重複排除、分割、索引、監査の入力に
      なれますが、原始FileResource、未完了解析バッファ、一つのChunk、ローダー、活動ではありません。
  why_needed:
    zh: 为下游处理提供稳定、可审计的内容身份，同时避免将存储位置、输入资源和转换过程混为同一个对象。
    en: Provides a stable, auditable content identity for downstream processing without merging storage location, input resource, and transformation process into one object.
    ja: ストレージ位置、入力資源、変換過程を一つの対象に混同せず、下流処理に安定した監査可能な内容同一性を提供します。
  includes:
    - zh: 已完成清洗和结构化的文本、表格或多模态内容版本，并具有规范内容摘要、生成活动出处和独立元数据。
      en: Completed cleaned and structured text, table, or multimodal content versions with canonical content digest, generating-activity provenance, and separate metadata.
      ja: 完了した清掃・構造化済みのテキスト、表、マルチモーダル内容版で、正規内容ダイジェスト、生成活動の来歴、独立メタデータを持つものを含みます。
  excludes:
    - zh: 仅可定位的文件或对象资源、尚未完成的解析输出、只用于回答问题的检索结果、去重决定以及从文档切出的单个片段。
      en: A merely addressable file or object resource, an unfinished parse output, a retrieval result used only to answer a question, a deduplication decision, or one chunk cut from a document.
      ja: 単に位置指定可能なファイルまたはオブジェクト資源、未完了の解析出力、質問回答だけに使う検索結果、重複排除決定、Documentから切り出した一つのチャンクを除きます。
  semantic_kind: information
  aliases:
    - normalized document
    - canonical content record
engineering:
  explanation:
    zh: >-
      规范化完成时，运行会将每个可交接产物赋予 document_id，保留产生它的活动、输入清单摘要和 profile，并把可变的
      描述属性放入独立元数据、把原始材料定位放入独立附件。后续阶段引用文档标识和内容版本，不应通过文件路径反推文档身份。
    en: >-
      At normalization completion, a run assigns each handoffable output a document_id, retains its generating activity,
      input-manifest digest, and profile, and keeps mutable descriptive attributes in separate metadata and raw-material
      locations in separate attachments. Later phases reference document identity and content version rather than infer a
      Document from a file path.
    ja: >-
      正規化の完了時に、実行は引渡し可能な各出力へdocument_idを割り当て、生成活動、入力マニフェストダイジェスト、プロファイルを
      保持します。可変の記述属性は独立メタデータに、原資料の位置は独立添付に置きます。後続段階はファイルパスからDocumentを
      推定せず、Document同一性と内容版を参照します。
  typical_input:
    - description: Completed normalization output
      format: |
        {
          "activity_id": "normalize-policy-42-02",
          "input_manifest_digest": "sha256:input-manifest-policy-42-v1",
          "normalization_profile": "unicode-nfc-clean-v1",
          "normalized_content_digest": "sha256:document-policy-42-v1",
          "media_type": "text/markdown"
        }
  typical_output:
    - description: Canonical document handoff
      format: |
        {
          "document_id": "document-policy-42-v1",
          "information_id": "info-document-policy-42-v1",
          "content_digest": "sha256:document-policy-42-v1",
          "media_type": "text/markdown",
          "generating_activity_ref": "normalize-policy-42-02",
          "normalization_profile": "unicode-nfc-clean-v1",
          "metadata_ref": "metadata-document-policy-42-v1",
          "source_attachment_refs": ["attachment-policy-42-pdf"]
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents source-specific loaders that produce Document values for later processing.
    - name: Unicode Standard Annex 15
      url: https://www.unicode.org/reports/tr15/
      description: Specifies Unicode normalization forms used to produce stable normalized text representations.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines activities that generate entities and entities used by later activities.
structure:
  identity_keys:
    - document_id
    - content_digest
  fields:
    - id: document_id
      labels:
        zh: 文档标识
        en: document ID
        ja: Document ID
      definitions:
        zh: 稳定标识这个规范文档版本，不是原始文件路径、输入信息标识、活动标识或单个片段标识。
        en: Stably identifies this canonical Document version, rather than a raw file path, input-information ID, activity ID, or chunk ID.
        ja: 原始ファイルパス、入力情報ID、活動ID、チャンクIDではなく、この正規Document版を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: document-policy-42-v1
      source_claims:
        - claim-document-identity
    - id: information_id
      labels:
        zh: 信息标识
        en: information ID
        ja: 情報ID
      definitions:
        zh: 作为 IngestibleInformation 实例的稳定标识，与文档标识配合保持上位信息身份和具体文档身份可追溯。
        en: Stable identity as an IngestibleInformation instance, retained with document ID so parent information identity and concrete document identity remain traceable.
        ja: IngestibleInformation 実例としての安定同一性であり、情報親同一性と具体Document同一性を追跡できるようDocument IDと共に保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: info-document-policy-42-v1
      source_claims:
        - claim-document-specialization
    - id: content_digest
      labels:
        zh: 规范内容摘要
        en: canonical content digest
        ja: 正規内容ダイジェスト
      definitions:
        zh: 记录带算法标记的规范内容摘要，以固定此文档版本的正文或结构化内容而不是元数据或文件字节。
        en: Records an algorithm-tagged digest of canonical text or structured content, pinning this document version rather than metadata or raw-file bytes.
        ja: メタデータや原始ファイルバイトではなく、このDocument版を固定する正規テキストまたは構造化内容のアルゴリズム付きダイジェストを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-42-v1
      source_claims:
        - claim-document-digest
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディア型
      definitions:
        zh: 声明规范内容的媒体类型，支持下游选择分块或转换方式，而不是说明原始资源的容器类型。
        en: Declares the media type of canonical content so downstream code can choose chunking or conversion, rather than describing the original resource container type.
        ja: 下流コードが分割または変換を選べるよう正規内容のメディア型を宣言し、原始資源コンテナ型を説明するものではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - text/markdown
        - text/plain
        - text/html
        - application/json
        - text/csv
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-document-loader
    - id: generating_activity_ref
      labels:
        zh: 生成活动引用
        en: generating activity reference
        ja: 生成活動参照
      definitions:
        zh: 引用首次形成该规范内容版本的已完成 NormalizationActivity，而不是仅读取或验证该文档的活动。
        en: References the completed NormalizationActivity that first formed this canonical content version, rather than an activity that merely read or validated it.
        ja: 単にDocumentを読んだり検証したりした活動ではなく、この正規内容版を初めて形成した完了済みNormalizationActivityを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: normalize-policy-42-02
      source_claims:
        - claim-document-generation
    - id: normalization_profile
      labels:
        zh: 规范化配置
        en: normalization profile
        ja: 正規化プロファイル
      definitions:
        zh: 引用生成活动使用的版本化解析、清洗和字符规范化配置，以便可重放地产生此内容版本。
        en: References the generating activity's versioned parsing, cleaning, and character-normalization profile so this content version can be replayed.
        ja: この内容版を再生可能にするため、生成活動が使用した版付きの解析、清掃、文字正規化プロファイルを参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - unicode-nfc-clean-v1
        - pdf-text-extraction-v3
        - html-text-clean-v2
      pattern: null
      example_value: unicode-nfc-clean-v1
      source_claims:
        - claim-document-unicode
    - id: input_manifest_digest
      labels:
        zh: 输入清单摘要
        en: input manifest digest
        ja: 入力マニフェストダイジェスト
      definitions:
        zh: 记录生成活动实际读取的信息版本清单摘要，支持将文档内容版本回溯到确定的输入边界。
        en: Records the digest of information versions actually read by the generating activity so this document's content can be traced to a fixed input boundary.
        ja: 生成活動が実際に読んだ情報版のマニフェストダイジェストを記録し、このDocument内容を固定入力境界まで追跡可能にします。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:input-manifest-policy-42-v1
      source_claims:
        - claim-document-digest
    - id: metadata_ref
      labels:
        zh: 文档元数据引用
        en: document metadata reference
        ja: Documentメタデータ参照
      definitions:
        zh: 引用描述此文档的独立 DocumentMetadata 实体，不将可变标题、标签或权限字段并入文档内容身份。
        en: References a separate DocumentMetadata entity that describes this Document without folding mutable title, tag, or permission fields into content identity.
        ja: 可変の題名、タグ、権限項目を内容同一性へ混ぜず、このDocumentを記述する独立DocumentMetadata実体を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: metadata-document-policy-42-v1
      source_claims:
        - claim-document-metadata
    - id: source_attachment_refs
      labels:
        zh: 来源附件引用
        en: source attachment references
        ja: ソース添付参照
      definitions:
        zh: 可选地引用独立 SourceAttachment 实体以定位原始材料、页码或数据行，而不是将附件路径作为文档身份。
        en: Optionally references separate SourceAttachment entities to locate raw material, pages, or data rows without using attachment paths as document identity.
        ja: 添付パスをDocument同一性に使わず、原資料、ページ、データ行を位置付ける独立SourceAttachment実体を任意に参照します。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - attachment-policy-42-pdf
      source_claims:
        - claim-document-provenance
  constraints:
    - id: document-canonical-identity
      expression: document_id, information_id, content_digest, media_type, generating_activity_ref, normalization_profile, input_manifest_digest, and metadata_ref are required; document_id must not equal generating_activity_ref or source attachment reference.
      explanation:
        zh: 内容实体、上位信息、生成过程和来源材料具有不同身份；这些必填字段共同固定可审计的规范文档，而不是把位置或过程冒充内容。
        en: Content entity, parent information, generating process, and source material have distinct identities; these required fields jointly pin an auditable canonical Document rather than treating a location or process as content.
        ja: 内容実体、親情報、生成過程、ソース材料は異なる同一性を持つため、これらの必須項目は位置や過程を内容と誤認せず監査可能な正規Documentを共同で固定します。
    - id: document-generation-consistency
      expression: generating_activity_ref must reference a completed NormalizationActivity whose output_document_refs includes document_id and whose input_manifest_digest and normalization_profile equal this Document values.
      explanation:
        zh: 文档生成需要活动输出、输入边界和配置三方面的回指一致；只读取、验证或后续写入既有文档不构成生成。
        en: Document generation requires agreement among activity output, input boundary, and profile back-links; merely reading, validating, or later writing an existing Document is not generation.
        ja: Document生成には活動出力、入力境界、プロファイルの逆参照一致が必要であり、既存Documentの読取り、検証、後続書込みだけは生成ではありません。
    - id: document-metadata-and-attachment-separation
      expression: metadata_ref identifies one separate DocumentMetadata; every source_attachment_refs value identifies a separate SourceAttachment and neither metadata nor attachment locator may change content_digest without a new Document version.
      explanation:
        zh: 描述属性和来源定位可独立演化，但一旦规范内容改变，必须建立新的文档内容版本而不是静默修改既有摘要。
        en: Descriptive attributes and source locations can evolve independently, but a canonical-content change must create a new document content version rather than silently mutate an existing digest.
        ja: 記述属性とソース位置は独立に変化できますが、正規内容の変更は既存ダイジェストを黙って変更せず、新しいDocument内容版を作らなければなりません。
examples:
  - id: document-positive

    labels:
      zh: 具有完整出处的策略规范文档
      en: Policy canonical document with complete provenance
      ja: 完全な来歴を持つ方針の正規Document

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      document_id: document-policy-42-v1
      information_id: info-document-policy-42-v1
      content_digest: sha256:document-policy-42-v1
      media_type: text/markdown
      generating_activity_ref: normalize-policy-42-02
      normalization_profile: unicode-nfc-clean-v1
      input_manifest_digest: sha256:input-manifest-policy-42-v1
      metadata_ref: metadata-document-policy-42-v1
      source_attachment_refs:
        - attachment-policy-42-pdf
    related_node_ids:
      - Document
      - IngestibleInformation
      - NormalizationActivity
      - DocumentMetadata
      - SourceAttachment
    related_relation_ids:
      - NormalizationActivity-produces-Document
      - NormalizationActivity-produces-Document
      - document_has_document_metadata
      - Document-has_source_attachment-SourceAttachment

    source_claims:
      - claim-document-generation
      - claim-document-metadata
      - claim-document-provenance
  - id: document-counterexample

    labels:
      zh: 原始 PDF 资源不是规范文档
      en: Raw PDF resource is not canonical document
      ja: 原始PDF資源は正規Documentではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      resource_id: file-policy-42.pdf
      object_version: etag:7fa4
      raw_byte_digest: sha256:file-policy-42-bytes
      document_id: absent
      generating_activity_ref: absent
      metadata_ref: absent
    related_node_ids:
      - Document
      - IngestibleInformation
      - IngestibleResource
    related_relation_ids:
      - NormalizationActivity-produces-Document
      - IngestibleInformation-is-read-from-IngestibleResource

    source_claims:
      - claim-document-boundary
      - claim-document-specialization
  - id: document-boundary

    labels:
      zh: 尚未完成的规范化文本缓冲区
      en: Unfinished normalized-text buffer
      ja: 未完了の正規化テキストバッファ

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      buffer_id: buffer-contract-51
      temporary_digest: sha256:buffer-contract-51
      generating_activity_ref: normalize-contract-51-02
      activity_status: running
      document_id: absent
      metadata_ref: absent
    related_node_ids:
      - Document
      - NormalizationActivity
      - IngestibleInformation
    related_relation_ids:
      - NormalizationActivity-produces-Document
      - NormalizationActivity-produces-Document

    source_claims:
      - claim-document-generation
      - claim-document-boundary
  - id: document-instance

    labels:
      zh: 已规范化的客户条款文本
      en: "Instance: normalized customer-terms text"
      ja: "事例: 正規化済みの顧客規約テキスト"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      document_id: document-customer-terms-51-v3
      information_id: info-document-customer-terms-51-v3
      content_digest: sha256:document-customer-terms-51-v3
      media_type: text/plain
      generating_activity_ref: normalize-customer-terms-51-02
      normalization_profile: unicode-nfc-clean-v1
      input_manifest_digest: sha256:input-manifest-customer-terms-51-v3
      metadata_ref: metadata-document-customer-terms-51-v3
      source_attachment_refs: []
    related_node_ids:
      - Document
      - TextDocument
      - IngestibleInformation
    related_relation_ids:
      - NormalizationActivity-produces-Document
      - TextDocument-is_a-Document

    source_claims:
      - claim-document-specialization
      - claim-document-generation
parent_relation: null
relations: []
sources:
  - id: langchain-document-loaders
    title: LangChain document loader integrations
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents source loaders that produce Document values from diverse content systems.
  - id: unicode-uax15
    title: Unicode Standard Annex 15 Unicode Normalization Forms
    url: https://www.unicode.org/reports/tr15/
    type: standard
    source_type: standard
    relevance: Specifies normalization forms for stable binary representations of equivalent Unicode text.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies secure-hash algorithms that produce message digests used to detect changed messages.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines activities that generate entities, entities used by activities, and provenance derivation.
source_claims:
  - id: claim-document-loader
    source: langchain-document-loaders
    supports: LangChain documents loaders that produce Document values from external sources. Moonweave uses a canonical Document as the completed, independently referable output of normalization rather than the loader code or raw resource.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-unicode
    source: unicode-uax15
    supports: Unicode Standard Annex 15 defines normalization forms under which equivalent strings have a unique binary representation. Moonweave records the normalization profile used to form a canonical Document content version.
    locator: UAX 15 introduction and normalization-form definitions
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce message digests used to detect changed messages. Moonweave uses algorithm-tagged digests to pin canonical content and the generating activity input manifest separately.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities and other provenance participants. Moonweave assigns a Document identity separate from the generating activity, raw source resource, metadata, and later chunks.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-generation
    source: w3c-prov-o
    supports: PROV-O states that activities can generate entities. Moonweave asserts a produces-Document relation only for completed normalization activities whose output, input manifest, and profile bind back to the Document.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-provenance
    source: w3c-prov-o
    supports: PROV-O provides provenance relations among entities and activities. Moonweave keeps original material location in SourceAttachment facts rather than using a source path as canonical Document identity.
    locator: PROV-O derivation relations and Entity Activity provenance
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-metadata
    source: langchain-document-loaders
    supports: Loader outputs pair document content with metadata for later handling. Moonweave represents mutable descriptive metadata in a separate DocumentMetadata entity so it does not silently alter canonical content identity.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-document-specialization
    source: w3c-prov-o
    supports: Modeling completed normalized content as a Document specialization of IngestibleInformation is a Moonweave taxonomy inference grounded in PROV-O's distinction between entities and the activities that generate them.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-document-boundary
    source: langchain-document-loaders
    supports: Source loaders distinguish loading operations and their resulting values. Moonweave keeps unread resources, read information, completed Documents, incomplete buffers, retrieval results, and chunks as separate identities.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: medium
