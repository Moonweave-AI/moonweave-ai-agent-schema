      en: SourceAttachment describes IngestibleResource when resource reference, resource version, and resource-content digest in the attachment jointly match the actual resource version read.
      ja: SourceAttachment がIngestibleResourceを記述するとは、添付内の資源参照、資源版、資源内容ダイジェストが共同で実際に読んだ資源版に一致することです。
