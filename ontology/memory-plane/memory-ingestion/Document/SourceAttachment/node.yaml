        ja: ソース添付により記述される
    conditions:
      - id: source-attachment-describes-resource-condition
        severity: error
        expression_language: plain
        expression: Assert only when attachment.resource_ref, resource_version_ref, and resource_content_digest match the target resource identity, version reference, and content digest recorded for the actual read.
