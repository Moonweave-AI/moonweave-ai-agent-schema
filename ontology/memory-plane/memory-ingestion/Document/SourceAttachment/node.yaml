source_claims:
  - id: claim-source-attachment-loader
    source: langchain-document-loaders
    supports: LangChain documents loaders that read external sources into document values. Moonweave records the loader version and read scope as evidence for a source attachment rather than equating source path with Document identity.
    locator: LangChain document loader integrations overview and BaseLoader interface
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-source-attachment-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that generate message digests for detecting changed messages. Moonweave pins source content separately from canonical Document content with algorithm-tagged digest values.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-source-attachment-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes entities and records provenance relations among them. Moonweave treats a source attachment as an independent evidence record rather than reusing Document, raw resource, or activity identity.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-source-attachment-document
    source: w3c-prov-o
    supports: PROV-O states that activities generate entities and use entities. Moonweave binds a source attachment to one generated Document content version only when document reference, content digest, and actual-read evidence agree.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-source-attachment-resource
    source: w3c-prov-o
    supports: PROV-O supports provenance links among derived and used entities. Moonweave describes a resource version only when resource reference, version token, content digest, and read evidence jointly identify it.
    locator: PROV-O derivation relations and Entity Activity provenance
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-source-attachment-processing
    source: langchain-document-loaders
    supports: Loader integrations distinguish source reading and parsing from later storage and retrieval. Moonweave records attachment processing result without confusing it with resource availability, document status, or deduplication outcome.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-source-attachment-temporal
    source: w3c-prov-o
    supports: PROV-O represents temporal facts for provenance participants. Moonweave records when source evidence was attached independently of resource modification or later Document read time.
    locator: PROV-O temporal properties and Entity Activity relations
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-source-attachment-boundary
    source: nodejs-crypto
    supports: Node.js documents digest generation through createHash. Moonweave uses an exact source-content digest with resource version to distinguish a real attachment from a same-path or same-batch candidate.
    locator: Node.js crypto createHash API and digest examples
    evidence_kind: ontology-design-inference
    confidence: medium
