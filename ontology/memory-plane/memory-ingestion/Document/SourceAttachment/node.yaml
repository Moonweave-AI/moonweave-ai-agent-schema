schema: moonweave.ai/ontology-node/v1
id: SourceAttachment
kind: concept
status: accepted
labels:
  zh: 来源附件记录
  en: Source attachment record
  ja: ソース添付記録
semantics:
  short_definition:
    zh: 将一个确定文档内容版本与其实际读取的一个来源资源版本相连的可审计记录。
    en: An auditable record linking one fixed Document content version to one source-resource version actually read.
    ja: 一つの確定Document内容版を、実際に読んだ一つのソース資源版へ結び付ける監査可能な記録です。
  definition:
    zh: >-
      SourceAttachment 是 Document 的组成信息记录，保存 attachment_id、文档引用和内容摘要、来源资源引用、资源版本、
      资源内容摘要、定位范围、加载器版本、处理状态和附着时间。它证明某一资源版本参与形成某一文档版本，但不等同于
      Document、原始 IngestibleResource、DocumentMetadata、加载器或规范化活动，也不从同一批次共现推断附件关系。
    en: >-
      SourceAttachment is a component information record of Document that retains attachment_id, Document reference and
      content digest, source-resource reference, resource version, resource-content digest, locator scope, loader version,
      processing status, and attachment time. It proves that one resource version participated in forming one Document
      version, but is not the Document, raw IngestibleResource, DocumentMetadata, loader, or normalization activity and
      cannot be inferred from co-occurrence in a batch.
    ja: >-
      SourceAttachment はDocumentの構成情報記録で、attachment_id、Document参照と内容ダイジェスト、ソース資源参照、
      資源版、資源内容ダイジェスト、位置範囲、ローダー版、処理状態、添付時刻を保持します。一つの資源版が一つの
      Document版の形成に参加したことを証明しますが、Document、原始IngestibleResource、DocumentMetadata、ローダー、
      正規化活動ではなく、同一バッチでの共起から添付関係を推論できません。
  why_needed:
    zh: 使原始材料版本、定位范围和处理证据可独立于规范内容与可变元数据保留，支持重放、审计和跨版本来源追踪。
    en: Retains raw-material version, locator scope, and processing evidence independently from canonical content and mutable metadata, supporting replay, audit, and cross-version provenance tracing.
    ja: 原資料版、位置範囲、処理証拠を正規内容と可変メタデータから独立して保持し、再生、監査、版をまたぐ来歴追跡を支えます。
  includes:
    - zh: 将一个文档内容版本与一个文件、数据库行或图资源版本相连的资源标识、内容摘要、读取范围和处理证据。
      en: Resource identity, content digest, read scope, and processing evidence connecting one Document content version to one file, database-row, or graph-resource version.
      ja: 一つのDocument内容版を一つのファイル、データベース行、グラフ資源版へ結ぶ資源同一性、内容ダイジェスト、読取り範囲、処理証拠を含みます。
  excludes:
    - zh: 原始资源实体本身、规范文档正文或元数据、未读取资源的 URL、任意相同批次文件、去重决定和向量索引条目。
      en: The raw resource entity itself, canonical Document body or metadata, URL of an unread resource, any file in the same batch, a deduplication decision, or vector-index entry.
      ja: 原始資源実体そのもの、正規Document本文またはメタデータ、未読資源のURL、同じバッチ内の任意のファイル、重複排除決定、ベクトル索引エントリを除きます。
  semantic_kind: information
  aliases:
    - provenance attachment
    - source-version evidence
engineering:
  explanation:
    zh: >-
      当规范化成功形成 Document 时，运行会为每个实际读取的资源版本建立附件记录，将文档内容摘要与资源版本、资源内容
      摘要、读取范围及加载器版本绑定。源路径相同但对象版本或摘要不同必须建立新的附件；更新标题或标签不修改附件，
      而改变规范内容则需要新的 Document 及相应附件。
    en: >-
      When normalization successfully forms a Document, the run creates an attachment for each source-resource version
      actually read, binding Document content digest to resource version, resource-content digest, read scope, and loader
      version. The same path with different object version or digest needs a new attachment; changing title or tags does
      not mutate an attachment, while changing canonical content requires a new Document and matching attachment.
    ja: >-
      正規化がDocumentを正常に形成すると、実行は実際に読んだ各ソース資源版に添付を作り、Document内容ダイジェストを資源版、
      資源内容ダイジェスト、読取り範囲、ローダー版へ結び付けます。同じパスでもオブジェクト版またはダイジェストが異なれば
      新しい添付が必要です。題名やタグ変更は添付を変更せず、正規内容変更には新しいDocumentと対応する添付が必要です。
  typical_input:
    - description: Actual source read evidence
      format: |
        {
          "resource_ref": "file-policy-42.pdf",
          "resource_version_ref": "etag:7fa4",
          "resource_content_digest": "sha256:file-policy-42-bytes",
          "locator_scope": "pdf-page:1-12",
          "loader_version_ref": "loader-pdf:3.2.1",
          "processing_status": "completed"
        }
  typical_output:
    - description: Version-pinned attachment record
      format: |
        {
          "attachment_id": "attachment-policy-42-pdf",
          "document_ref": "document-policy-42-v1",
          "document_content_digest": "sha256:document-policy-42-v1",
          "resource_ref": "file-policy-42.pdf",
          "resource_version_ref": "etag:7fa4",
          "attached_at": "2026-07-18T08:59:25Z"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that read source systems into document values and retain source context.
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for digesting source-content bytes with algorithms such as SHA-256.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines provenance relations among activities, entities they use, and generated entities.
structure:
  identity_keys:
    - attachment_id
    - document_ref
    - resource_ref
    - resource_version_ref
  fields:
    - id: attachment_id
      labels:
        zh: 附件标识
        en: attachment ID
        ja: 添付ID
      definitions:
        zh: 稳定标识此来源证据记录，而不是文档、资源或加载器的身份。
        en: Stably identifies this source-evidence record rather than the Document, resource, or loader identity.
        ja: Document、資源、ローダーの同一性ではなく、このソース証拠記録を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: attachment-policy-42-pdf
      source_claims:
        - claim-source-attachment-identity
    - id: document_ref
      labels:
        zh: 文档引用
        en: document reference
        ja: Document参照
      definitions:
        zh: 引用由此附件证据支持的 Document 标识，而不是来源文件路径或输入信息快照。
        en: References the Document identity supported by this attachment evidence, rather than the source file path or input-information snapshot.
        ja: ソースファイルパスや入力情報スナップショットではなく、この添付証拠が支えるDocument同一性を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: document-policy-42-v1
      source_claims:
        - claim-source-attachment-document
    - id: document_content_digest
      labels:
        zh: 文档内容摘要
        en: document content digest
        ja: Document内容ダイジェスト
      definitions:
        zh: 固定该附件支持的规范 Document 内容版本，避免同一显示名称或文档系列的来源证据跨版本串联。
        en: Pins the canonical Document content version supported by this attachment, preventing source evidence from crossing versions within a same-name or document family.
        ja: この添付が支える正規Document内容版を固定し、同名またはDocument系統内でソース証拠が版をまたいで混線することを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-42-v1
      source_claims:
        - claim-source-attachment-digest
    - id: resource_ref
      labels:
        zh: 来源资源引用
        en: source resource reference
        ja: ソース資源参照
      definitions:
        zh: 引用实际读取的 IngestibleResource，而不是仅在元数据中出现或同批次存在的资源。
        en: References the IngestibleResource actually read, rather than a resource merely mentioned in metadata or present in the same batch.
        ja: メタデータに記載されただけ、または同じバッチに存在するだけの資源ではなく、実際に読み取ったIngestibleResourceを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: file-policy-42.pdf
      source_claims:
        - claim-source-attachment-resource
    - id: resource_version_ref
      labels:
        zh: 资源版本引用
        en: resource version reference
        ja: 資源版参照
      definitions:
        zh: 记录实际读取的资源逻辑版本、对象代次或一致性令牌，不能仅由稳定路径代替。
        en: Records the logical version, object generation, or consistency token actually read from the resource and cannot be replaced by a stable path alone.
        ja: 実際に読み取った資源の論理版、オブジェクト世代、一貫性トークンを記録し、安定パスだけでは置き換えられません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: etag:7fa4
      source_claims:
        - claim-source-attachment-resource
    - id: resource_content_digest
      labels:
        zh: 资源内容摘要
        en: resource content digest
        ja: 資源内容ダイジェスト
      definitions:
        zh: 记录实际读取资源字节或记录内容的带算法标记摘要，以检测同一版本引用背后的内容漂移。
        en: Records an algorithm-tagged digest of source bytes or record content actually read, detecting content drift behind the same version reference.
        ja: 実際に読み取ったソースバイトまたは記録内容のアルゴリズム付きダイジェストを記録し、同じ版参照の背後にある内容ドリフトを検出します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:file-policy-42-bytes
      source_claims:
        - claim-source-attachment-digest
    - id: locator_scope
      labels:
        zh: 读取定位范围
        en: read locator scope
        ja: 読取り位置範囲
      definitions:
        zh: 可选地记录资源中实际读取的页码、行区间、对象键或图子集，不代表整个资源必然参与文档形成。
        en: Optionally records pages, row range, object key, or graph subset actually read from the resource and does not imply that all of the resource formed the Document.
        ja: 資源から実際に読んだページ、行範囲、オブジェクトキー、グラフ部分集合を任意に記録し、資源全体がDocument形成に参加したことを意味しません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: pdf-page:1-12
      source_claims:
        - claim-source-attachment-resource
    - id: loader_version_ref
      labels:
        zh: 加载器版本引用
        en: loader version reference
        ja: ローダー版参照
      definitions:
        zh: 引用执行来源读取和格式解析的加载器实现版本，以支持对相同资源版本的转换重放。
        en: References the loader implementation version that performed source reading and format parsing, supporting replay for the same resource version.
        ja: ソース読取りと形式解析を実行したローダー実装版を参照し、同じ資源版に対する再生を支えます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: loader-pdf:3.2.1
      source_claims:
        - claim-source-attachment-loader
    - id: processing_status
      labels:
        zh: 附件处理状态
        en: attachment processing status
        ja: 添付処理状態
      definitions:
        zh: 声明该资源版本在形成当前文档版本时的读取和解析结果，不是资源整体的可用性状态或文档的去重结果。
        en: Declares read-and-parse outcome for this resource version while forming the current Document version, not resource availability or the Document's deduplication result.
        ja: 現在のDocument版を形成する際のこの資源版の読取り・解析結果を宣言し、資源全体の可用性状態やDocumentの重複排除結果ではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - completed
        - partial
        - failed
      pattern: null
      example_value: completed
      source_claims:
        - claim-source-attachment-processing
    - id: attached_at
      labels:
        zh: 附着时间
        en: attached at
        ja: 添付時刻
      definitions:
        zh: 记录这条版本固定的来源附件证据被创建并绑定到该文档内容版本的时刻，不是文件修改或文档读取时间。
        en: Records when this version-pinned source-evidence record was created and bound to the Document content version, not file modification or later Document read time.
        ja: この版固定ソース証拠記録を作成してDocument内容版へ結び付けた時刻を記録し、ファイル更新時刻や後のDocument読取り時刻ではありません。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:59:25Z"
      source_claims:
        - claim-source-attachment-temporal
  constraints:
    - id: source-attachment-version-pair
      expression: attachment_id, document_ref, document_content_digest, resource_ref, resource_version_ref, resource_content_digest, loader_version_ref, processing_status, and attached_at are required; one attachment identifies one Document content version and one resource version.
      explanation:
        zh: 附件记录必须同时固定文档端和资源端的版本，避免仅以同名、同路径或同批次将不相关资源归因于文档。
        en: The attachment record must pin versions at both Document and resource endpoints, preventing unrelated material from being attributed by same name, path, or batch alone.
        ja: 添付記録はDocument端点と資源端点の両方の版を固定し、同名、パス、バッチだけで無関係な材料がDocumentへ帰属することを防ぎます。
    - id: source-attachment-document-consistency
      expression: document_ref must identify a Document whose content_digest equals document_content_digest, and the Document source_attachment_refs must include attachment_id.
      explanation:
        zh: 文档回指、文档内容版本和文档的附件列表必须一致；仅创建一个孤立附件不能证明它属于该文档。
        en: Document back-reference, Document content version, and the Document attachment list must agree; creating an isolated attachment does not prove it belongs to that Document.
        ja: Document逆参照、Document内容版、Documentの添付一覧が一致する必要があり、孤立した添付を作るだけではそのDocumentに属することを証明できません。
    - id: source-attachment-resource-consistency
      expression: resource_ref, resource_version_ref, and resource_content_digest must identify the exact resource version actually read; locator_scope narrows rather than expands the evidence scope.
      explanation:
        zh: 路径或 URI 可被复用，必须与版本和内容摘要一起核验；定位范围只能限制“实际读了什么”，不能暗示读取了整个资源。
        en: A path or URI may be reused and must be verified with version and content digest; locator scope only narrows what was read and cannot imply whole-resource use.
        ja: パスやURIは再利用されるため版と内容ダイジェストで検証する必要があり、位置範囲は読んだものを限定するだけで資源全体の使用を意味しません。
examples:
  - id: source-attachment-positive

    labels:
      zh: 文档与实际读取 PDF 版本的来源附件
      en: Attachment from document to actually read PDF version
      ja: Documentから実際に読んだPDF版へのソース添付

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      attachment_id: attachment-policy-42-pdf
      document_ref: document-policy-42-v1
      document_content_digest: sha256:document-policy-42-v1
      resource_ref: file-policy-42.pdf
      resource_version_ref: etag:7fa4
      resource_content_digest: sha256:file-policy-42-bytes
      locator_scope: pdf-page:1-12
      loader_version_ref: loader-pdf:3.2.1
      processing_status: completed
      attached_at: "2026-07-18T08:59:25Z"
    related_node_ids:
      - SourceAttachment
      - Document
      - IngestibleResource
      - NormalizationActivity
    related_relation_ids:
      - Document-has_source_attachment-SourceAttachment
      - SourceAttachment-describes-IngestibleResource
      - NormalizationActivity-produces-Document

    source_claims:
      - claim-source-attachment-document
      - claim-source-attachment-resource
      - claim-source-attachment-processing
  - id: source-attachment-counterexample

    labels:
      zh: 原始资源不是来源附件记录
      en: Raw resource is not source attachment record
      ja: 原始資源はソース添付記録ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      resource_ref: file-policy-42.pdf
      resource_version_ref: etag:7fa4
      resource_content_digest: sha256:file-policy-42-bytes
      attachment_id: absent
      document_ref: absent
      processing_status: absent
    related_node_ids:
      - SourceAttachment
      - IngestibleResource
      - Document
    related_relation_ids:
      - SourceAttachment-describes-IngestibleResource
      - Document-has_source_attachment-SourceAttachment

    source_claims:
      - claim-source-attachment-boundary
  - id: source-attachment-boundary

    labels:
      zh: 同一路径但另一资源版本的候选附件
      en: Candidate attachment for another resource version at same path
      ja: 同じパスにある別資源版の候補添付

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      attachment_id: attachment-policy-42-pdf-v2
      document_ref: document-policy-42-v1
      document_content_digest: sha256:document-policy-42-v1
      resource_ref: file-policy-42.pdf
      resource_version_ref: etag:9d10
      resource_content_digest: sha256:file-policy-42-bytes-v2
      processing_status: absent
    related_node_ids:
      - SourceAttachment
      - Document
      - IngestibleResource
    related_relation_ids:
      - Document-has_source_attachment-SourceAttachment
      - SourceAttachment-describes-IngestibleResource

    source_claims:
      - claim-source-attachment-digest
      - claim-source-attachment-boundary
  - id: source-attachment-instance

    labels:
      zh: 从数据库行读取的客户条款附件
      en: "Instance: customer-terms attachment read from database row"
      ja: "事例: データベース行から読んだ顧客規約添付"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      attachment_id: attachment-customer-terms-51-row-723
      document_ref: document-customer-terms-51-v3
      document_content_digest: sha256:document-customer-terms-51-v3
      resource_ref: database-customers-row-723
      resource_version_ref: rowver:51-3
      resource_content_digest: sha256:customer-row-723-v3
      locator_scope: customers/row:723
      loader_version_ref: loader-json:2.0.0
      processing_status: completed
      attached_at: "2026-07-18T12:13:12Z"
    related_node_ids:
      - SourceAttachment
      - Document
      - IngestibleResource
    related_relation_ids:
      - Document-has_source_attachment-SourceAttachment
      - SourceAttachment-describes-IngestibleResource

    source_claims:
      - claim-source-attachment-resource
      - claim-source-attachment-processing
parent_relation:
  id: Document-has_source_attachment-SourceAttachment
  predicate: part_of
  target: concept:Document
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是文档的来源附件组成
    en: is a source attachment component of document
    ja: Documentのソース添付構成要素である
  definitions:
    zh: SourceAttachment 是 Document 的来源附件组成，表示其同时绑定该文档内容版本与一个实际读取的来源资源版本。
    en: SourceAttachment is a source attachment component of Document when it binds that Document content version and one actually read source-resource version together.
    ja: SourceAttachment がDocumentのソース添付構成要素であるとは、そのDocument内容版と実際に読んだ一つのソース資源版を共に結び付けることです。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
