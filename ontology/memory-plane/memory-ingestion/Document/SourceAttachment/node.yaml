          en: All three resource evidence values must match the target's actual read version; matching only path or resource ID is insufficient to assert description.
          ja: 三つの資源証拠値すべてが対象の実際に読んだ版と一致する必要があり、パスまたは資源IDだけの一致では記述関係を主張できません。
        source_claims:
