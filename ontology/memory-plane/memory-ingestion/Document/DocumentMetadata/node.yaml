schema: moonweave.ai/ontology-node/v1
id: DocumentMetadata
kind: concept
status: accepted
labels:
  zh: 文档描述元数据
  en: Document descriptive metadata
  ja: Document記述メタデータ
semantics:
  short_definition:
    zh: 绑定到一个确定文档内容版本、描述其可变属性的独立信息实体。
    en: A separate information entity that describes mutable attributes of one fixed Document content version.
    ja: 一つの確定したDocument内容版に結び付き、その可変属性を記述する独立情報実体です。
  definition:
    zh: >-
      DocumentMetadata 是专门描述一个 Document 内容版本的信息实体，以 metadata_id、被描述文档引用和被描述内容摘要标识，
      并可保存标题、语言、来源 URI、解析配置和记录时间。它不持有规范正文、不替代 SourceAttachment 的原始材料定位、
      不生成 Document，也不以文件路径或标题为文档身份。
    en: >-
      DocumentMetadata is an information entity dedicated to describing one Document content version. It is identified by
      metadata_id, described-document reference, and described-content digest and may retain title, language, source URI,
      parsing profile, and recorded time. It does not hold canonical body content, replace SourceAttachment's raw-material
      location, generate a Document, or use a file path or title as document identity.
    ja: >-
      DocumentMetadata は一つのDocument内容版を専用に記述する情報実体です。metadata_id、記述対象Document参照、
      記述対象内容ダイジェストで識別され、題名、言語、ソースURI、解析プロファイル、記録時刻を保持できます。
      正規本文を保持せず、SourceAttachment の原資料位置を置き換えず、Documentを生成せず、ファイルパスや題名を
      Document同一性に使いません。
  why_needed:
    zh: 让标题、标签、语言和显示来源等描述属性能够独立演化，同时防止它们静默改变规范内容版本或来源附件的职责。
    en: Lets titles, tags, language, and display provenance evolve independently while preventing them from silently changing canonical content version or SourceAttachment responsibility.
    ja: 題名、タグ、言語、表示来歴などの記述属性を独立して変化させつつ、正規内容版やSourceAttachmentの責務を黙って変えないようにします。
  includes:
    - zh: 针对一个明确文档内容摘要的标题、语言标签、显示来源 URI、解析 profile 和记录时间。
      en: Title, language tag, display source URI, parsing profile, and recorded time scoped to one explicit Document content digest.
      ja: 一つの明示的なDocument内容ダイジェストに範囲を限定した題名、言語タグ、表示ソースURI、解析プロファイル、記録時刻を含みます。
  excludes:
    - zh: 规范正文、原始文件或对象定位、来源附件处理状态、文档生成活动、向量索引字段和任意未绑定内容版本的标签字典。
      en: Canonical body content, raw-file or object location, source-attachment processing state, document-generating activity, vector-index fields, and a tag dictionary unbound to a content version.
      ja: 正規本文、原始ファイルまたはオブジェクト位置、ソース添付の処理状態、Document生成活動、ベクトル索引項目、内容版に結び付かないタグ辞書を除きます。
  semantic_kind: information
  aliases:
    - document descriptor
    - version-scoped metadata
engineering:
  explanation:
    zh: >-
      实现会把文档正文摘要和被描述文档引用作为元数据记录的范围键，再保存可变描述字段。更新标题或语言会创建新的
      元数据记录或版本化修改，但正文摘要变化必须创建新的 Document；原始材料页码或对象位置仍应在 SourceAttachment 中维护。
    en: >-
      An implementation uses the Document reference and body digest as metadata scope keys, then stores mutable descriptive
      fields. Updating title or language creates a new metadata record or versioned change, whereas a body-digest change
      must create a new Document; raw-material pages and object locations remain in SourceAttachment.
    ja: >-
      実装はDocument参照と本文ダイジェストをメタデータの範囲キーとして使用し、可変の記述項目を保存します。題名や言語の更新は
      新しいメタデータ記録または版付き変更を作りますが、本文ダイジェストの変更は新しいDocumentを作る必要があります。
      原資料のページやオブジェクト位置はSourceAttachmentに残します。
  typical_input:
    - description: Version-scoped descriptive attributes
      format: |
        {
          "document_ref": "document-policy-42-v1",
          "described_content_digest": "sha256:document-policy-42-v1",
          "title": "Retention Policy",
          "language_tag": "en",
          "parser_profile": "unicode-nfc-clean-v1"
        }
  typical_output:
    - description: Separate document metadata record
      format: |
        {
          "metadata_id": "metadata-document-policy-42-v1",
          "document_ref": "document-policy-42-v1",
          "described_content_digest": "sha256:document-policy-42-v1",
          "source_uri": "s3://policy-corpus/legal/policy.pdf",
          "recorded_at": "2026-07-18T08:59:25Z"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that produce Document values with metadata for later handling.
    - name: RFC 3986 Uniform Resource Identifier
      url: https://www.rfc-editor.org/rfc/rfc3986
      description: Defines generic URI syntax for recording a source location reference.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities and provenance facts that remain distinct from the activities using or generating them.
structure:
  identity_keys:
    - metadata_id
    - document_ref
    - described_content_digest
  fields:
    - id: metadata_id
      labels:
        zh: 元数据标识
        en: metadata ID
        ja: メタデータID
      definitions:
        zh: 稳定标识这份独立描述记录，而不是被描述文档、其附件或显示标题。
        en: Stably identifies this separate descriptive record rather than the described Document, its attachment, or display title.
        ja: 記述対象Document、その添付、表示題名ではなく、この独立した記述記録を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: metadata-document-policy-42-v1
      source_claims:
        - claim-document-metadata-identity
    - id: document_ref
      labels:
        zh: 被描述文档引用
        en: described document reference
        ja: 記述対象Document参照
      definitions:
        zh: 引用该元数据专门描述的 Document，而不是来源文件、输入信息或生成活动。
        en: References the Document this metadata specifically describes, rather than a source file, input information, or generating activity.
        ja: ソースファイル、入力情報、生成活動ではなく、このメタデータが専用に記述するDocumentを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: document-policy-42-v1
      source_claims:
        - claim-document-metadata-scoping
    - id: described_content_digest
      labels:
        zh: 被描述内容摘要
        en: described content digest
        ja: 記述対象内容ダイジェスト
      definitions:
        zh: 固定此描述记录所适用的规范 Document 内容版本，而不是元数据自身序列化内容的摘要。
        en: Pins the canonical Document content version to which this record applies, rather than a digest of the metadata serialization itself.
        ja: メタデータのシリアル化自体のダイジェストではなく、この記録が適用される正規Document内容版を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-42-v1
      source_claims:
        - claim-document-metadata-digest
    - id: title
      labels:
        zh: 显示标题
        en: display title
        ja: 表示題名
      definitions:
        zh: 可选的人类可读标题，用于展示或筛选，不是稳定文档标识，也不能替代内容摘要。
        en: Optional human-readable title used for display or filtering, not a stable Document identity and not a replacement for content digest.
        ja: 表示または絞込みに使う任意の人間可読題名であり、安定したDocument同一性でも内容ダイジェストの代替でもありません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: Retention Policy
      source_claims:
        - claim-document-metadata-descriptive
    - id: language_tag
      labels:
        zh: 语言标签
        en: language tag
        ja: 言語タグ
      definitions:
        zh: 可选地记录此内容版本的主要自然语言标签，用于展示或检索筛选，而不是替代文本内容检测。
        en: Optionally records the primary natural-language tag for this content version for display or retrieval filtering, not as a substitute for examining text content.
        ja: 表示または検索絞込みのため、この内容版の主な自然言語タグを任意に記録し、本文内容の検査の代替にはしません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: en
      source_claims:
        - claim-document-metadata-descriptive
    - id: source_uri
      labels:
        zh: 显示来源 URI
        en: display source URI
        ja: 表示ソースURI
      definitions:
        zh: 可选地记录面向用户的来源 URI，用于显示出处；它不替代 SourceAttachment 对确切资源版本和处理状态的记录。
        en: Optionally records a user-facing source URI for displaying provenance; it does not replace SourceAttachment's record of exact resource version and processing state.
        ja: 来歴表示用の利用者向けソースURIを任意に記録し、SourceAttachmentによる正確な資源版と処理状態の記録を置き換えません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: s3://policy-corpus/legal/policy.pdf
      source_claims:
        - claim-document-metadata-uri
    - id: parser_profile
      labels:
        zh: 解析配置
        en: parsing profile
        ja: 解析プロファイル
      definitions:
        zh: 记录形成该内容版本时使用的版本化解析或规范化 profile，用于解释内容形态但不执行转换。
        en: Records the versioned parsing or normalization profile used to form this content version, explaining content shape without executing the transformation.
        ja: この内容版の形成に使った版付き解析または正規化プロファイルを記録し、変換を実行せず内容形状を説明します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - unicode-nfc-clean-v1
        - pdf-text-extraction-v3
        - html-text-clean-v2
      pattern: null
      example_value: unicode-nfc-clean-v1
      source_claims:
        - claim-document-metadata-descriptive
    - id: recorded_at
      labels:
        zh: 记录时间
        en: recorded at
        ja: 記録時刻
      definitions:
        zh: 记录该元数据记录被创建或确认的时间，不等同于文档生成时间、来源资源修改时间或用户查看时间。
        en: Records when this metadata record was created or confirmed, not document-generation time, source-resource modification time, or user-view time.
        ja: このメタデータ記録を作成または確認した時刻を記録し、Document生成時刻、ソース資源更新時刻、利用者閲覧時刻とは区別します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T08:59:25Z"
      source_claims:
        - claim-document-metadata-temporal
  constraints:
    - id: document-metadata-version-scope
      expression: metadata_id, document_ref, described_content_digest, parser_profile, and recorded_at are required; document_ref must identify one Document whose content_digest equals described_content_digest.
      explanation:
        zh: 元数据必须同时绑定确定文档身份和确定内容版本，避免将旧版本的标题、语言或解析信息错误附着到新正文。
        en: Metadata must bind both fixed Document identity and fixed content version, preventing title, language, or parsing details of an old version from attaching to new body content.
        ja: メタデータは確定Document同一性と確定内容版の両方に結び付く必要があり、旧版の題名、言語、解析詳細が新しい本文へ誤って付くことを防ぎます。
    - id: document-metadata-content-separation
      expression: A change to described_content_digest requires a new Document version and a metadata record scoped to it; title, language_tag, source_uri, and parser_profile must not be used as document identity keys.
      explanation:
        zh: 可变描述字段与规范内容版本分离；内容变化必须可见地创建新文档，而不能仅修改一份元数据来掩盖版本变化。
        en: Mutable descriptive fields are separate from canonical content version; a content change must visibly create a new Document rather than hide a version change inside metadata.
        ja: 可変記述項目は正規内容版から分離され、内容変更はメタデータ内に隠すのでなく、可視的に新しいDocumentを作る必要があります。
    - id: document-metadata-source-boundary
      expression: source_uri is optional display provenance only; exact raw-resource version, locator scope, and processing status belong to a separate SourceAttachment.
      explanation:
        zh: 显示来源 URI 有助于说明出处，但不能替代来源附件的精确资源证据，也不能仅凭 URI 推断某文档由某资源生成。
        en: A display source URI helps explain provenance but cannot replace exact resource evidence in SourceAttachment or prove document generation from a resource by URI alone.
        ja: 表示ソースURIは来歴説明に役立ちますが、SourceAttachmentの正確な資源証拠を置き換えず、URIだけで資源からのDocument生成を証明できません。
examples:
  - id: document-metadata-positive

    labels:
      zh: 与策略文档版本一致的元数据
      en: Metadata aligned to policy-document version
      ja: 方針Document版に整合するメタデータ

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      metadata_id: metadata-document-policy-42-v1
      document_ref: document-policy-42-v1
      described_content_digest: sha256:document-policy-42-v1
      title: Retention Policy
      language_tag: en
      source_uri: s3://policy-corpus/legal/policy.pdf
      parser_profile: unicode-nfc-clean-v1
      recorded_at: "2026-07-18T08:59:25Z"
    related_node_ids:
      - DocumentMetadata
      - Document
    related_relation_ids:
      - document_has_document_metadata
      - NormalizationActivity-produces-Document

    source_claims:
      - claim-document-metadata-scoping
      - claim-document-metadata-descriptive
  - id: document-metadata-counterexample

    labels:
      zh: 来源附件不是文档描述元数据
      en: Source attachment is not document descriptive metadata
      ja: ソース添付はDocument記述メタデータではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      attachment_id: attachment-policy-42-pdf
      resource_ref: file-policy-42.pdf
      resource_version: etag:7fa4
      page_range: 1-12
      metadata_id: absent
      described_content_digest: absent
    related_node_ids:
      - DocumentMetadata
      - SourceAttachment
      - Document
    related_relation_ids:
      - Document-has_source_attachment-SourceAttachment
      - document_has_document_metadata

    source_claims:
      - claim-document-metadata-boundary
  - id: document-metadata-boundary

    labels:
      zh: 同一显示名称但旧内容版本的元数据
      en: Metadata for prior content version with same display name
      ja: 同じ表示名だが旧内容版のメタデータ

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      metadata_id: metadata-document-policy-42-v0
      document_ref: document-policy-42
      described_content_digest: sha256:document-policy-42-v0
      title: Retention Policy Draft
      parser_profile: pdf-text-extraction-v3
      recorded_at: "2026-06-30T12:00:00Z"
    related_node_ids:
      - DocumentMetadata
      - Document
    related_relation_ids:
      - document_has_document_metadata

    source_claims:
      - claim-document-metadata-digest
      - claim-document-metadata-scoping
  - id: document-metadata-instance

    labels:
      zh: 新语言标签的客户条款元数据
      en: "Instance: customer-terms metadata with updated language tag"
      ja: "事例: 更新された言語タグを持つ顧客規約メタデータ"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      metadata_id: metadata-customer-terms-51-v3
      document_ref: document-customer-terms-51-v3
      described_content_digest: sha256:document-customer-terms-51-v3
      title: Customer Terms
      language_tag: ja
      parser_profile: unicode-nfc-clean-v1
      recorded_at: "2026-07-18T13:01:00Z"
    related_node_ids:
      - DocumentMetadata
      - Document
    related_relation_ids:
      - document_has_document_metadata

    source_claims:
      - claim-document-metadata-descriptive
      - claim-document-metadata-temporal
parent_relation:
  id: document_has_document_metadata
  predicate: part_of
  target: concept:Document
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是文档的描述元数据组成
    en: is a descriptive metadata component of document
    ja: Documentの記述メタデータ構成要素である
  definitions:
    zh: DocumentMetadata 是 Document 的描述元数据组成，表示该记录只描述该文档的一个确定内容版本。
    en: DocumentMetadata is a descriptive metadata component of Document when the record describes exactly one fixed content version of that Document.
    ja: DocumentMetadata がDocumentの記述メタデータ構成要素であるとは、その記録がそのDocumentの一つの確定内容版だけを記述することです。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_document_metadata
    labels:
      zh: 具有文档描述元数据
      en: has document descriptive metadata
      ja: Document記述メタデータを持つ
  conditions:
    - id: document-has-document-metadata-condition
      severity: error
      expression_language: plain
      expression: Assert only when metadata.document_ref identifies the target Document and metadata.described_content_digest equals that Document content_digest.
      explanation:
        zh: 文档回指和内容摘要必须同时匹配，防止相同显示名称、相同资源或旧版本元数据错误附着到当前文档。
        en: Document back-reference and content digest must both match, preventing metadata for a same-name, same-resource, or prior version from attaching to the current Document.
        ja: Document逆参照と内容ダイジェストの両方が一致する必要があり、同名、同資源、旧版のメタデータが現在のDocumentに誤って付くことを防ぎます。
      source_claims:
        - claim-document-metadata-scoping
  temporal_scope: valid-time
  boundary_context: The component describes one content version and remains separate from body content, source attachment, and document-generating activity.
  constraints: []
  examples: []
  source_claims:
    - claim-document-metadata-scoping
  distinct_fact_rationale: This composition records version-scoped description separately from canonical body content and raw-material provenance.
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-document-loaders
    title: LangChain document loader integrations
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents loaders that produce Document values together with metadata for later handling.
  - id: rfc-3986
    title: RFC 3986 Uniform Resource Identifier Generic Syntax
    url: https://www.rfc-editor.org/rfc/rfc3986
    type: standard
    source_type: standard
    relevance: Defines generic URI syntax applicable to a display source URI.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    type: standard
    source_type: standard
    relevance: Specifies message-digest algorithms useful for pinning a described content version.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities and provenance relations that remain distinct from activities and raw resources.
source_claims:
  - id: claim-document-metadata-descriptive
    source: langchain-document-loaders
    supports: LangChain loader outputs include document metadata for later handling. Moonweave keeps descriptive fields such as title, language, and parser profile in a separate record rather than changing canonical body identity.
    locator: LangChain document loader integrations overview
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-metadata-uri
    source: rfc-3986
    supports: RFC 3986 defines generic URI syntax. Moonweave may record a display source URI in metadata but treats exact source-resource version and processing state as separate attachment evidence.
    locator: RFC 3986 sections 1 and 3 on generic URI syntax
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-metadata-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies message-digest algorithms for detecting changes. Moonweave scopes metadata to the canonical Document content digest to avoid applying old descriptions to changed body content.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-document-metadata-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities and other entities in provenance. Moonweave identifies document metadata separately from the Document it describes, source attachments, and generating activities.
    locator: PROV-O section 3.1 Activity and Entity
    evidence_kind: ontology-design-inference
