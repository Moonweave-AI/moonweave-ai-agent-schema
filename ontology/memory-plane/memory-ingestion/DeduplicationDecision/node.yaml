source_claims:
  - id: claim-deduplication-decision-identity
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes independently identifiable entities from the activities that use or generate them. Moonweave
      assigns decision ID to one judgment record separately from the comparison activity, candidate Document, and write effect.
    locator: PROV-O section 3.1 Entity and Activity
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-decision-generation
    source: w3c-prov-o
    supports: >-
      PROV-O states that activities can generate entities through wasGeneratedBy. Moonweave models a completed
      DeduplicationActivity as generating a separate DeduplicationDecision with its own identity and decided time.
    locator: PROV-O section 3.1 on prov wasGeneratedBy and generated entities
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-decision-digest
    source: nist-fips-180-4
    supports: >-
      FIPS 180-4 specifies hash algorithms that generate message digests used to detect message changes. Moonweave records
      candidate, reference-state, and match-evidence digests to bind a decision to the exact comparison evidence.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-deduplication-decision-comparison
    source: nodejs-crypto
    supports: >-
      Node.js documents createHash for generating digest values with algorithms such as SHA-256. Moonweave records the
      declared exact comparison strategy alongside digest evidence rather than treating a similarity query as a judgment.
    locator: Node.js crypto createHash API and SHA-256 example
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-deduplication-decision-about
    source: nist-fips-180-4
    supports: >-
      FIPS 180-4 describes message digests used to detect change. Moonweave requires both candidate Document reference and
      candidate content digest so a decision remains about the exact version compared rather than every version with the same ID.
    locator: FIPS 180-4 abstract on message digests and change detection
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-deduplication-decision-outcome
    source: langchain-vectorstores
    supports: >-
      LangChain documents separate add Documents delete by ID and similarity search operations. Moonweave records a
      discrete recommendation outcome separately from later add update delete or retrieval execution as a local design inference.
    locator: LangChain vector store interface add_documents delete and similarity_search
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-deduplication-decision-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes entities from activities and supports provenance chains. Moonweave keeps decision, comparison
      activity, candidate Document, write effect, retrieval result, vector-index entry, and error event as separate facts.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
