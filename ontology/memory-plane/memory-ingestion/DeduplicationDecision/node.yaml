schema: moonweave.ai/ontology-node/v1
id: DeduplicationDecision
kind: concept
status: accepted
labels:
  zh: 去重决定
  en: Deduplication Decision
  ja: 重複排除決定
semantics:
  short_definition:
    zh: 由去重活动生成、说明一个候选文档在固定参考状态下应新增、更新、跳过或拒绝的可审计信息记录。
    en: An auditable information record generated by a deduplication activity stating whether one candidate Document should be admitted, updated, skipped, or rejected against fixed reference state.
    ja: deduplication activity により生成され、一つの candidate Document を固定 reference state に対して admit、update、skip、reject のいずれにするかを示す監査可能な information record。
  definition:
    zh: >-
      DeduplicationDecision 是 DeduplicationActivity 产生的信息实体，关于一个候选 Document 在一个明确的参考状态版本下的比较结论。
      它以 decision_id、generating_activity_ref、candidate_document_ref、candidate_content_digest、reference_state_digest、
      comparison_strategy、outcome 和 decided_at 标识，并可引用匹配的既有文档。它不是执行比较的活动、候选 Document、MemoryWrite、
      MemoryStore、检索结果、向量索引条目、错误事件或本体关系定义。决定记录判断及证据；后续动作可以使用它，但不能将动作结果倒写成决定本身。
    en: >-
      A DeduplicationDecision is an information entity produced by a DeduplicationActivity about the comparison conclusion
      for one candidate Document at one explicit reference-state version. It is identified by decision_id,
      generating_activity_ref, candidate_document_ref, candidate_content_digest, reference_state_digest,
      comparison_strategy, outcome, and decided_at and can refer to a matched prior Document. It is not the activity that
      executes comparison, the candidate Document, MemoryWrite, MemoryStore, retrieval result, vector-index entry, error
      event, or ontology relation definition. The decision records judgment and evidence; later actions can use it but cannot
      write their effects back into the decision itself.
    ja: >-
      DeduplicationDecision は、一つの明示的な reference-state version における一つの candidate Document の comparison conclusion
      について DeduplicationActivity が生成する information entity です。decision_id、generating_activity_ref、
      candidate_document_ref、candidate_content_digest、reference_state_digest、comparison_strategy、outcome、decided_at で
      識別され、matching prior Document を参照できます。comparison を実行する activity、candidate Document、MemoryWrite、MemoryStore、
      retrieval result、vector-index entry、error event、ontology relation definition ではありません。decision は judgment と evidence を
      記録します。後続 action はこれを使用できますが、その effect を decision 自体に書き戻すことはできません。
  why_needed:
    zh: 将判断结果从产生它的过程和使用它的写入副作用中分离，使去重依据可审计、可复查且可由后续步骤安全消费。
    en: Separating the judgment result from the process that produced it and the write side effect that uses it makes deduplication evidence auditable, reviewable, and safe for later steps to consume.
    ja: judgment result を、それを生成した process とそれを使用する write side effect から分離することで、deduplication evidence を監査、再検討し、後続 step が安全に消費できるようにします。
  includes:
    - zh: 基于文档标识和内容摘要与固定状态清单比较后，要求更新一个既有文档的带证据判断。
      en: An evidence-backed judgment requiring an update of an existing Document after comparing its ID and content digest with a fixed state manifest.
      ja: document ID と content digest を固定 state manifest と比較した後、既存 Document の update を要求する evidence-backed judgment。
  excludes:
    - zh: 进行比较的 DeduplicationActivity、实际执行更新的 MemoryWrite、临时相似度搜索结果和没有判断证据的错误事件。
      en: The DeduplicationActivity that performs comparison, a MemoryWrite that executes an update, a transient similarity-search result, or an error event with no judgment evidence.
      ja: comparison を実行する DeduplicationActivity、update を実行する MemoryWrite、一時的な similarity-search result、judgment evidence を持たない error event。
  semantic_kind: information
  aliases:
    - document deduplication judgment
    - versioned comparison outcome
engineering:
  explanation:
    zh: >-
      比较阶段结束后创建一个不可变决定记录，写入候选文档版本、它所见的参考状态摘要、比较策略、匹配证据和离散 outcome。
      下游写入器只读取该记录来决定新增、更新或跳过，并记录自己的写入活动；如果状态清单或候选版本变化，系统创建新的
      DeduplicationActivity 和新的 DeduplicationDecision，而不是修改旧判断。
    en: >-
      After comparison finishes, the system creates an immutable decision record containing candidate Document version,
      reference-state digest it saw, comparison strategy, match evidence, and discrete outcome. A downstream writer only
      reads this record to add, update, or skip and records its own write activity. If state manifest or candidate version
      changes, the system creates a new DeduplicationActivity and new DeduplicationDecision instead of modifying the old
      judgment.
    ja: >-
      comparison が終わると、system は candidate Document version、見た reference-state digest、comparison strategy、match evidence、
      離散 outcome を含む immutable decision record を作成します。downstream writer はこの record を読むだけで add、update、skip を決め、
      自身の write activity を記録します。state manifest または candidate version が変わった場合、system は古い judgment を変更する代わりに
      新しい DeduplicationActivity と新しい DeduplicationDecision を作成します。
  typical_input:
    - description: Completed comparison evidence
      format: |
        {
          "generating_activity_ref": "deduplicate-policy-42-03",
          "candidate_document_ref": "document-policy-17",
          "candidate_content_digest": "sha256:document-policy-17-v7",
          "reference_state_digest": "sha256:document-state-policy-v12",
          "comparison_strategy": "exact-id-and-digest",
          "match_evidence_digest": "sha256:match-policy-17-v12"
        }
  typical_output:
    - description: Immutable decision record for a downstream writer
      format: |
        {
          "decision_id": "decision-policy-17-v12",
          "outcome": "update",
          "matched_document_ref": "document-policy-17-v6",
          "decided_at": "2026-07-18T09:00:42Z"
        }
  reference_implementations:
    - name: Node.js crypto createHash
      url: https://nodejs.org/api/crypto.html
      description: Documents createHash for generating digest values used as comparison evidence.
    - name: LangChain vector store interface
      url: https://docs.langchain.com/oss/python/integrations/vectorstores
      description: Documents distinct add by ID, delete by ID, and similarity-search operations for Documents.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities generated by activities and provenance relationships between them.
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 決定 ID
      definitions:
        zh: 稳定标识一个已形成的去重判断记录，而不是活动、文档、写入操作或策略名称。
        en: Stably identifies one deduplication judgment record already formed rather than an activity, Document, write operation, or policy name.
        ja: activity、Document、write operation、policy name ではなく、すでに形成された一つの deduplication judgment record を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: decision-policy-17-v12
      source_claims:
        - claim-deduplication-decision-identity
    - id: generating_activity_ref
      labels:
        zh: 生成活动引用
        en: generating activity reference
        ja: 生成アクティビティ参照
      definitions:
        zh: 引用完成比较并产生该判断的 DeduplicationActivity，而不是后续执行写入的活动。
        en: References the DeduplicationActivity that completed comparison and produced this judgment rather than the later activity executing a write.
        ja: 後続 write を実行する activity ではなく、comparison を完了してこの judgment を生成した DeduplicationActivity を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: deduplicate-policy-42-03
      source_claims:
        - claim-deduplication-decision-generation
    - id: candidate_document_ref
      labels:
        zh: 候选文档引用
        en: candidate document reference
        ja: 候補ドキュメント参照
      definitions:
        zh: 引用该判断专门适用的候选 Document，而不是匹配状态清单中所有既有文档的集合。
        en: References the candidate Document to which this judgment specifically applies rather than the set of all prior Documents in the matched state manifest.
        ja: matching state manifest 内のすべての prior Document の集合ではなく、この judgment が具体的に適用される candidate Document を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: document-policy-17
      source_claims:
        - claim-deduplication-decision-about
    - id: candidate_content_digest
      labels:
        zh: 候选内容摘要
        en: candidate content digest
        ja: 候補コンテンツダイジェスト
      definitions:
        zh: 记录被判断候选文档确切版本的算法标记内容摘要，不用稳定文档标识替代该版本证据。
        en: Records the algorithm-tagged content digest of the exact candidate Document version judged and does not substitute stable document ID for that version evidence.
        ja: stable document ID を version evidence の代わりに使わず、judged candidate Document の正確な version の algorithm-tagged content digest を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-policy-17-v7
      source_claims:
        - claim-deduplication-decision-digest
    - id: reference_state_digest
      labels:
        zh: 参考状态摘要
        en: reference-state digest
        ja: 参照状態ダイジェスト
      definitions:
        zh: 记录形成判断时可见的既有身份与摘要清单版本，防止决定被误应用到后来改变的状态。
        en: Records the prior identity-and-digest manifest version visible when judgment formed, preventing the decision from being misapplied to state that later changed.
        ja: judgment 形成時に可視だった prior identity-and-digest manifest version を記録し、後で変わった state へ decision が誤適用されることを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:document-state-policy-v12
      source_claims:
        - claim-deduplication-decision-digest
    - id: comparison_strategy
      labels:
        zh: 比较策略
        en: comparison strategy
        ja: 比較戦略
      definitions:
        zh: 记录产生该决定的精确身份和摘要比较方法，不将用户检索相似度搜索误称为去重策略。
        en: Records the exact identity-and-digest comparison method that produced this decision and does not mislabel user-retrieval similarity search as deduplication strategy.
        ja: user-retrieval similarity search を deduplication strategy と誤称せず、この decision を生成した exact identity-and-digest comparison method を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - exact-id-and-digest
        - exact-digest
        - business-key-and-digest
      pattern: null
      example_value: exact-id-and-digest
      source_claims:
        - claim-deduplication-decision-comparison
    - id: outcome
      labels:
        zh: 判断结果
        en: outcome
        ja: 判断結果
      definitions:
        zh: 记录针对候选文档的离散建议动作，而不是执行该动作的写入状态。
        en: Records the discrete recommended action for the candidate Document rather than status of a write that executes the action.
        ja: action を実行する write の status ではなく、candidate Document に対する離散的な推奨 action を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - admit
        - update
        - skip_duplicate
        - reject
      pattern: null
      example_value: update
      source_claims:
        - claim-deduplication-decision-outcome
    - id: match_evidence_digest
      labels:
        zh: 匹配证据摘要
        en: match-evidence digest
        ja: 一致証拠ダイジェスト
      definitions:
        zh: 记录对候选键、既有匹配键和比较结果规范化后计算的摘要，使判断证据可被复查。
        en: Records a digest over normalized candidate keys, prior matched keys, and comparison result so decision evidence can be reviewed.
        ja: decision evidence を再検討できるよう、正規化された candidate key、prior matched key、comparison result に対する digest を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:match-policy-17-v12
      source_claims:
        - claim-deduplication-decision-digest
    - id: matched_document_ref
      labels:
        zh: 匹配既有文档引用
        en: matched prior document reference
        ja: 一致した既存ドキュメント参照
      definitions:
        zh: 可选引用状态清单中与候选匹配的既有 Document；新文档或拒绝决定可以没有该引用。
        en: Optionally references the prior Document in the state manifest that matched the candidate; an admitted new document or rejected candidate may have no such reference.
        ja: candidate と一致した state manifest 内の prior Document を任意で参照します。admitted new Document や rejected candidate はこの参照を持たない場合があります。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: document-policy-17-v6
      source_claims:
        - claim-deduplication-decision-about
    - id: decided_at
      labels:
        zh: 判断时间
        en: decided at
        ja: 判断時刻
      definitions:
        zh: 记录判断记录生成的时间点，不等于随后写入或删除执行的完成时间。
        en: Records when the judgment record was generated and is not the completion time of a later write or delete execution.
        ja: judgment record が生成された時点を記録し、後続 write や delete execution の完了時刻ではありません。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:00:42Z"
      source_claims:
        - claim-deduplication-decision-generation
  constraints:
    - id: deduplication-decision-evidence-contract
      severity: error
      expression_language: plain
      expression: >-
        decision_id, generating_activity_ref, candidate_document_ref, candidate_content_digest, reference_state_digest,
        comparison_strategy, outcome, match_evidence_digest, and decided_at are required. comparison_strategy and outcome
        must be allowed values. generating_activity_ref must identify a completed DeduplicationActivity that used the same
        candidate document and reference-state digest. candidate_content_digest and match_evidence_digest must be
        algorithm-tagged. A comparison activity, candidate Document, memory write, memory store, retrieval result, vector
        index entry, error event, or schema relation cannot substitute for a decision record.
      explanation:
        zh: 去重决定必须将候选版本、参考状态、比较方法、证据、结果和生成活动绑定为一个不可变判断；过程和副作用是不同的来源事实。
        en: A deduplication decision must bind candidate version, reference state, comparison method, evidence, outcome, and generating activity into one immutable judgment; process and side effects are different provenance facts.
        ja: deduplication decision は candidate version、reference state、comparison method、evidence、outcome、generating activity を一つの immutable judgment に束縛しなければなりません。process と side effect は異なる provenance fact です。
      source_claims:
        - claim-deduplication-decision-generation
        - claim-deduplication-decision-digest
        - claim-deduplication-decision-comparison
        - claim-deduplication-decision-boundary
  required_relations: []
examples:
  - id: deduplication-decision-positive

    labels:
      zh: 文档更新决定
      en: Document update decision
      ja: ドキュメント更新決定

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      decision_id: decision-policy-17-v12
      generating_activity_ref: deduplicate-policy-42-03
      candidate_document_ref: document-policy-17
      candidate_content_digest: sha256:document-policy-17-v7
      reference_state_digest: sha256:document-state-policy-v12
      comparison_strategy: exact-id-and-digest
      outcome: update
      match_evidence_digest: sha256:match-policy-17-v12
      matched_document_ref: document-policy-17-v6
      decided_at: "2026-07-18T09:00:42Z"
    related_node_ids:
      - DeduplicationDecision
      - DeduplicationActivity
      - Document
    related_relation_ids:
      - DeduplicationDecision-was-generated-by-DeduplicationActivity
      - DeduplicationDecision-about-Document

    source_claims:
      - claim-deduplication-decision-generation
      - claim-deduplication-decision-digest
  - id: deduplication-decision-counterexample

    labels:
      zh: 去重活动不是去重决定
      en: Deduplication activity is not the decision
      ja: 重複排除アクティビティは決定ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      activity_id: deduplicate-policy-42-03
      started_at: "2026-07-18T09:00:30Z"
      ended_at: "2026-07-18T09:00:42Z"
      status: completed
      decision_id: absent
      outcome: absent
      candidate_document_ref: absent
    related_node_ids:
      - DeduplicationDecision
      - DeduplicationActivity
    related_relation_ids:
      - DeduplicationDecision-was-generated-by-DeduplicationActivity

    source_claims:
      - claim-deduplication-decision-boundary
  - id: deduplication-decision-boundary

    labels:
      zh: 同一文档的不同内容版本
      en: Different content version of same document
      ja: 同じドキュメントの異なるコンテンツ版

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      decision_id: decision-policy-17-v12
      candidate_document_ref: document-policy-17
      candidate_content_digest: sha256:document-policy-17-v7
      new_candidate_content_digest: sha256:document-policy-17-v8
      reference_state_digest: sha256:document-state-policy-v12
      outcome: update
    related_node_ids:
      - DeduplicationDecision
      - Document
    related_relation_ids:
      - DeduplicationDecision-about-Document

    source_claims:
      - claim-deduplication-decision-digest
  - id: deduplication-decision-instance

    labels:
      zh: 实例：拒绝无法验证的候选
      en: "Instance: reject unverifiable candidate"
      ja: "事例：検証不能な候補を拒否する"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      decision_id: decision-contract-51-v8
      generating_activity_ref: deduplicate-contract-51-05
      candidate_document_ref: document-contract-51
      candidate_content_digest: sha256:document-contract-51-v8
      reference_state_digest: sha256:unverified-contract-state-v8
      comparison_strategy: exact-id-and-digest
      outcome: reject
      match_evidence_digest: sha256:verification-failed-contract-51-v8
      decided_at: "2026-07-18T10:00:45Z"
    related_node_ids:
      - DeduplicationDecision
      - DeduplicationActivity
      - Document
    related_relation_ids:
      - DeduplicationDecision-was-generated-by-DeduplicationActivity
      - DeduplicationDecision-about-Document

    source_claims:
      - claim-deduplication-decision-generation
      - claim-deduplication-decision-outcome
parent_relation: null
relations:
  - id: DeduplicationDecision-was-generated-by-DeduplicationActivity
    predicate: was_generated_by
    target: concept:DeduplicationActivity
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由去重活动生成
      en: was generated by deduplication activity
      ja: 重複排除アクティビティにより生成された
    definitions:
      zh: DeduplicationDecision 是由完成的 DeduplicationActivity 生成的独立决定实体，而不是该活动的状态字段或结构组成部分。
      en: A DeduplicationDecision is an independent decision entity generated by a completed DeduplicationActivity, not a status field or structural part of that activity.
      ja: DeduplicationDecision は completed DeduplicationActivity により生成された独立の decision entity であり、その activity の status field 又は structural part ではない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个活动可生成零个或多个决定；失败或取消的活动可能不生成任何可审计决定。
      en: One activity may generate zero or more decisions; a failed or cancelled activity may generate none.
      ja: 一つの activity は zero 又は複数の decision を生成でき、failed 又は cancelled activity は audit 可能な decision を生成しないことがある。
    inverse_reading:
      predicate: generates
      labels:
        zh: 生成去重决定
        en: generates deduplication decision
        ja: deduplication decision を生成する
    conditions:
      - id: deduplication-decision-generation-condition
        severity: error
        expression_language: plain
        expression: Assert only when generating_activity_ref resolves to a completed DeduplicationActivity, its decision_refs includes the decision_id, and candidate, strategy, reference-state, and evidence fields agree with that activity.
        explanation:
          zh: 生成者回链、活动输出引用及比较证据必须一致，不能由共同来源或后续写入推断生成。
          en: Generator back-link, activity output reference, and comparison evidence must agree; shared provenance or a later write cannot infer generation.
          ja: generator back-link、activity output reference、comparison evidence は一致しなければならず、shared provenance 又は後続 write から generation を推論できない。
        source_claims: [claim-deduplication-decision-generation]
    temporal_scope: valid-time
    boundary_context: Generation records an outcome of one comparison activity and does not execute the downstream write effect recommended by that outcome.
    constraints: []
    examples: []
    source_claims: [claim-deduplication-decision-generation]
    distinct_fact_rationale: This records an activity-to-entity provenance fact, distinct from the candidate document and any downstream memory write.
    layout_role: cross-link
  - id: DeduplicationDecision-about-Document
    predicate: about
    target: concept:Document
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 关于候选文档
      en: is about candidate document
      ja: 候補ドキュメントについてである
    definitions:
