schema: moonweave.ai/ontology-node/v1
id: DirectoryResource
kind: concept
status: accepted
labels:
  zh: 目录资源
  en: Directory Resource
  ja: ディレクトリリソース
semantics:
  short_definition:
    zh: 以可解析目录定位符和版本化成员清单标识的可摄入容器资源。
    en: An ingestible container resource identified by a resolvable directory locator and a versioned member manifest.
    ja: 解決可能なディレクトリロケータと版管理されたメンバーマニフェストで識別される取り込み可能なコンテナリソース。
  definition:
    zh: >-
      DirectoryResource 是 IngestibleResource 的特化，表示一个文件系统或对象命名空间中的目录或对象前缀。
      它以 resource_id、filesystem_ref、canonical_locator、version_ref 和 content_digest 识别，其中摘要针对已枚举的成员清单。
      它可以作为后续 IngestionRun 枚举 FileResource 的输入根，但不是 FileResource、整个 FileSystem、Document、DocumentLoader、一次目录遍历活动、访问凭据或已生成的提示上下文。
    en: >-
      A DirectoryResource is an IngestibleResource specialization for one directory or object prefix in a filesystem or
      object namespace. It is identified by resource_id, filesystem_ref, canonical_locator, version_ref, and
      content_digest over an enumerated member manifest. It can be an input root from which a later IngestionRun enumerates
      FileResources, but it is not a FileResource, an entire FileSystem, a Document, a DocumentLoader, one directory
      traversal activity, an access credential, or generated prompt context.
    ja: >-
      DirectoryResource は filesystem または object namespace 内の一つの directory または object prefix を表す
      IngestibleResource の特化です。resource_id、filesystem_ref、canonical_locator、version_ref、および列挙済み
      member manifest に対する content_digest で識別します。後続の IngestionRun が FileResource を列挙する入力 root
      にはなれますが、FileResource、全体の FileSystem、Document、DocumentLoader、一回の directory traversal activity、
      access credential、生成済み prompt context ではありません。
  why_needed:
    zh: 将目录快照与成员文件及其读取活动分开，可使批量摄入可重现、可审计且不会把路径前缀误当成文件内容。
    en: Separating a directory snapshot from member files and their read activity makes batch ingestion repeatable, auditable, and resistant to treating a path prefix as file content.
    ja: ディレクトリのスナップショットをメンバーファイルと読取活動から分離することで、バッチ取り込みを再現可能かつ監査可能にし、パス接頭辞をファイル内容と誤認しません。
  includes:
    - zh: 具有固定对象版本、规范 S3 前缀和成员清单摘要的政策文档目录。
      en: A policy-document directory with a pinned object version, canonical S3 prefix, and member-manifest digest.
      ja: 固定された object version、正規の S3 prefix、および member-manifest digest を持つ政策文書ディレクトリ。
  excludes:
    - zh: 目录中的单个 PDF、列举目录的一次运行、目录加载器实现、访问令牌和规范化后的 Document。
      en: One PDF inside the directory, a run that enumerates it, a directory-loader implementation, an access token, or a normalized Document.
      ja: ディレクトリ内の一つの PDF、列挙を行う run、directory-loader implementation、access token、または正規化済み Document。
  semantic_kind: entity
  aliases:
    - versioned directory source
    - ingestible object prefix
engineering:
  explanation:
    zh: >-
      摄入编排器先登记无凭据的目录定位符和清单版本，再由支持该定位符的加载器或枚举器读取成员。
      它对按稳定顺序规范化后的成员清单计算摘要，并把实际枚举和后续文件读取记录在独立的 IngestionRun 中；
      因此重新枚举、增量变更和单个文件失败都不会改写目录资源本身的身份。
    en: >-
      An ingestion orchestrator registers a credential-free directory locator and manifest version before a compatible
      loader or enumerator reads members. It hashes a deterministically normalized member manifest and records the actual
      enumeration and subsequent file reads on separate IngestionRuns. Re-enumeration, incremental change, and one file
      failure therefore do not rewrite the directory resource's identity.
    ja: >-
      ingestion orchestrator は credential-free の directory locator と manifest version を登録してから、互換性のある
      loader または enumerator に member を読ませます。決定的な順序で正規化した member manifest を hash 化し、実際の
      enumeration と後続の file read を別個の IngestionRun に記録します。そのため再列挙、増分変更、一つの file failure は
      directory resource 自体の identity を書き換えません。
  typical_input:
    - description: Version-pinned directory descriptor
      format: |
        {
          "resource_id": "dir-policy-2026-07",
          "filesystem_ref": "fs-policy-corpus",
          "canonical_locator": "s3://policy-corpus/legal/",
          "version_ref": "inventory:2026-07-18T00:00:00Z",
          "content_digest": "ni:///sha-256;XxJ5kP5MqVZfRyoD4G7YwOqMNAWHb6eZ3bH4U7_cDE8"
        }
  typical_output:
    - description: Directory enumeration observation
      format: |
        {
          "resource_ref": "dir-policy-2026-07",
          "ingestion_run_ref": "ingest-directory-42",
          "read_version_ref": "inventory:2026-07-18T00:00:00Z",
          "manifest_digest_verified": true,
          "discovered_file_resource_refs": ["file-policy-pdf-v7", "file-terms-md-v3"]
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents a common load and lazy_load interface for loading external sources into Document objects.
    - name: RFC 6920 Named Information
      url: https://datatracker.ietf.org/doc/rfc6920/
      description: Defines hash-based named-information identifiers for verifying a specific resource representation.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities and activities used to keep source artifacts distinct from operations and generated information.
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 目录资源标识
        en: directory resource ID
        ja: ディレクトリリソース ID
      definitions:
        zh: 稳定标识一个待摄入的目录或对象前缀，而不是一次遍历或其中的单个文件。
        en: Stably identifies one directory or object prefix awaiting ingestion rather than one traversal or member file.
        ja: 一回の traversal や member file ではなく、取り込み待ちの一つの directory または object prefix を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: dir-policy-2026-07
      source_claims:
        - claim-directory-resource-identity
    - id: filesystem_ref
      labels:
        zh: 文件系统引用
        en: filesystem reference
        ja: ファイルシステム参照
      definitions:
        zh: 引用提供路径解析和命名边界的 FileSystem；相同路径文本在不同文件系统中不表示同一目录。
        en: References the FileSystem that supplies path-resolution and naming boundaries; identical path text in different filesystems is not the same directory.
        ja: path resolution と naming boundary を提供する FileSystem を参照します。異なる filesystem の同じ path text は同じ directory ではありません。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: fs-policy-corpus
      source_claims:
        - claim-directory-resource-identity
    - id: canonical_locator
      labels:
        zh: 规范目录定位符
        en: canonical directory locator
        ja: 正規ディレクトリロケータ
      definitions:
        zh: 记录不含凭据、可由支持的加载器或枚举器解析的目录 URI 或对象前缀。
        en: Records a credential-free directory URI or object prefix resolvable by a supported loader or enumerator.
        ja: 対応する loader または enumerator が解決できる credential-free の directory URI または object prefix を記録します。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: s3://policy-corpus/legal/
      source_claims:
        - claim-directory-resource-loader
    - id: version_ref
      labels:
        zh: 成员清单版本引用
        en: member-manifest version reference
        ja: member manifest 版参照
      definitions:
        zh: 记录用于列举目录成员的库存快照、对象代次或其他来源系统版本，而不是文件字节摘要。
        en: Records the inventory snapshot, object generation, or other source-system version used to enumerate members rather than a file-byte digest.
        ja: file byte digest ではなく、member を列挙するために使った inventory snapshot、object generation、または source-system version を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "inventory:2026-07-18T00:00:00Z"
      source_claims:
        - claim-directory-resource-version
    - id: content_digest
      labels:
        zh: 成员清单摘要
        en: member-manifest digest
        ja: member manifest digest
      definitions:
        zh: 记录对该版本目录成员清单按确定顺序规范化后计算的算法标记摘要，而不是其中某一个文件的摘要。
        en: Records an algorithm-tagged digest over the deterministically normalized member manifest for this version rather than a digest of one member file.
        ja: 一つの member file の digest ではなく、この version の決定的に正規化された member manifest に対する algorithm-tagged digest を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "ni:///sha-256;XxJ5kP5MqVZfRyoD4G7YwOqMNAWHb6eZ3bH4U7_cDE8"
      source_claims:
        - claim-directory-resource-digest
  constraints:
    - id: directory-resource-versioned-manifest
      severity: error
      expression_language: plain
      expression: >-
        resource_id, filesystem_ref, canonical_locator, version_ref, and content_digest are required. The locator must
        contain no credential and must resolve within filesystem_ref. content_digest must verify a deterministically
        normalized member manifest for version_ref. A member file, a full FileSystem, a loader, a traversal run, a secret,
        a generated Document, or a retrieval candidate cannot substitute for directory identity.
      explanation:
        zh: 目录身份必须固定命名空间、位置、枚举版本和清单完整性；成员对象、运行行为和处理后信息另有自己的身份与来源边界。
        en: Directory identity must pin namespace, location, enumeration version, and manifest integrity; member objects, runtime behavior, and processed information have separate identity and provenance boundaries.
        ja: directory identity は namespace、location、enumeration version、manifest integrity を固定しなければなりません。member object、runtime behavior、processed information は別個の identity と provenance boundary を持ちます。
      source_claims:
        - claim-directory-resource-loader
        - claim-directory-resource-digest
        - claim-directory-resource-boundary
  required_relations: []
examples:
  - id: directory-resource-positive

    labels:
      zh: 版本固定的政策目录
      en: Version-pinned policy directory
      ja: 版固定の政策ディレクトリ

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      resource_id: dir-policy-2026-07
      filesystem_ref: fs-policy-corpus
      canonical_locator: s3://policy-corpus/legal/
      version_ref: "inventory:2026-07-18T00:00:00Z"
      content_digest: "ni:///sha-256;XxJ5kP5MqVZfRyoD4G7YwOqMNAWHb6eZ3bH4U7_cDE8"
    related_node_ids:
      - DirectoryResource
      - IngestibleResource
      - FileSystem
      - IngestionRun
    related_relation_ids:
      - DirectoryResource-is_a-IngestibleResource

    source_claims:
      - claim-directory-resource-identity
      - claim-directory-resource-digest
  - id: directory-resource-counterexample

    labels:
      zh: 无版本的路径字符串
      en: Unversioned path string
      ja: 版のないパス文字列

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      canonical_locator: /srv/policy/legal/
      filesystem_ref: absent
      version_ref: absent
      content_digest: absent
    related_node_ids:
      - DirectoryResource
      - FileSystem
    related_relation_ids: []

    source_claims:
      - claim-directory-resource-identity
  - id: directory-resource-boundary

    labels:
      zh: 目录中的单个文件
      en: One file inside the directory
      ja: ディレクトリ内の一つのファイル

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      resource_id: file-policy-pdf-v7
      canonical_locator: s3://policy-corpus/legal/policy.pdf
      version_ref: "s3-version:7"
      content_digest: "ni:///sha-256;w9vR0i9TAeCxM_DNEEqydIxGJmKDLA5wXxVDFXpmQmI"
    related_node_ids:
      - DirectoryResource
      - FileResource
      - IngestibleResource
    related_relation_ids:
      - DirectoryResource-contains-FileResource

    source_claims:
      - claim-directory-resource-digest
      - claim-directory-resource-boundary
  - id: directory-resource-instance

    labels:
      zh: 实例：合规资料快照
      en: "Instance: compliance-material snapshot"
      ja: 事例：コンプライアンス資料スナップショット

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      resource_id: dir-compliance-2026-07
      filesystem_ref: fs-compliance
      canonical_locator: s3://compliance-materials/current/
      version_ref: "inventory:2026-07-18T00:00:00Z"
      content_digest: "ni:///sha-256;6xB6Ck1Jp1h3pyaLrZxpvs3AnvUXFAlWRo8g3M2YtSQ"
    related_node_ids:
      - DirectoryResource
      - FileResource
      - IngestionRun
    related_relation_ids:
      - DirectoryResource-contains-FileResource

    source_claims:
      - claim-directory-resource-loader
      - claim-directory-resource-boundary
parent_relation:
  id: DirectoryResource-is_a-IngestibleResource
  predicate: is_a
  target: concept:IngestibleResource
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是可摄入资源的目录特化
    en: is a directory specialization of ingestible resource
    ja: ingestible resource のディレクトリ特化である
  definitions:
    zh: DirectoryResource 是 IngestibleResource 中以文件系统边界和成员清单快照为种差的目录来源资源。
    en: DirectoryResource is an IngestibleResource whose differentia is a directory source bounded by a filesystem and a member-manifest snapshot.
    ja: DirectoryResource は filesystem boundary と member-manifest snapshot を種差とする IngestibleResource の directory source です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_specialization
    labels:
      zh: 有目录特化
      en: has directory specialization
      ja: ディレクトリ特化を持つ
  conditions:
    - id: directory-resource-is-a-resource-condition
      severity: error
      expression_language: plain
      expression: >-
        Assert the specialization only when an object satisfies IngestibleResource identity and additionally identifies
        a directory or object prefix through filesystem_ref and a versioned member-manifest digest. A member file, loader,
        traversal activity, credential, generated Document, or full FileSystem does not satisfy this differentia.
      explanation:
        zh: 目录特化要求上位资源身份之外还要明确命名空间和版本化成员集合，而不是只具有一个路径或一次读取行为。
        en: The directory specialization requires a namespace and versioned member set in addition to parent resource identity rather than merely a path or one read behavior.
        ja: directory specialization には親 resource identity に加えて namespace と版管理された member set が必要であり、単なる path や一回の read behavior では足りません。
      source_claims:
        - claim-directory-resource-specialization
  temporal_scope: valid-time
  boundary_context: Directory membership is version-scoped and is not the identity of any individual member or the activity that enumerates members.
  constraints: []
  examples: []
  source_claims:
    - claim-directory-resource-specialization
  distinct_fact_rationale: This hierarchy states source-resource specialization while containment and enumeration remain separate facts.
  layout_role: primary-backbone
relations:
  - id: DirectoryResource-contains-FileResource
    predicate: part_of
    target: concept:FileResource
    endpoint_order: target-to-source
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: 包含文件资源
      en: contains file resource
      ja: ファイルリソースを含む
    definitions:
      zh: DirectoryResource 与 FileResource 的成员关系表示文件定位符在目录命名空间内解析，且该文件出现在对应版本的成员清单中。
      en: The membership relation between DirectoryResource and FileResource states that the file locator resolves in the directory namespace and appears in that version's member manifest.
      ja: DirectoryResource と FileResource の membership relation は、file locator が directory namespace 内で解決され、その version の member manifest に現れることを表します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: contains
      labels:
        zh: 反向为包含
        en: inverse is contains
        ja: 逆は含む
    conditions:
      - id: directory-resource-contains-file-resource-condition
        severity: error
        expression_language: plain
        expression: >-
          Assert membership only when the FileResource locator resolves beneath the DirectoryResource locator in the same
          filesystem_ref and the versioned directory manifest names that FileResource representation. A matching filename,
          a shared textual prefix, or a read result alone does not establish membership.
        explanation:
          zh: 成员事实需要同一命名空间中的定位符范围和版本化清单证据，不能从文件名、字符串前缀或读取输出推断。
          en: Membership needs locator scope in the same namespace and versioned-manifest evidence; it cannot be inferred from a filename, textual prefix, or read output.
          ja: membership には同じ namespace 内の locator scope と versioned-manifest evidence が必要であり、filename、textual prefix、read output から推論できません。
        source_claims:
          - claim-directory-resource-membership
    temporal_scope: valid-time
    boundary_context: Membership is asserted for one manifest version and does not make a member file identical to its directory container.
    constraints: []
    examples: []
    source_claims:
      - claim-directory-resource-membership
    distinct_fact_rationale: This composition records version-scoped membership separately from source specialization and read activity.
    layout_role: cross-link
sources:
  - id: langchain-document-loaders
    title: LangChain document loaders
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents a common interface for loading varied external sources into Document objects.
  - id: rfc-6920
    title: RFC 6920 Named Information
    url: https://datatracker.ietf.org/doc/rfc6920/
    type: standard
    source_type: standard
    relevance: Defines hash-based named-information identifiers for a specific resource representation.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities, activities, usage, and generation for provenance separation.
source_claims:
  - id: claim-directory-resource-loader
    source: langchain-document-loaders
    supports: >-
      LangChain documents loaders that load data from many external sources through load and lazy_load into Document objects.
      Moonweave records the directory descriptor before loading and records enumeration and generated information separately.
    locator: Document loaders interface and source integrations
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-directory-resource-digest
    source: rfc-6920
    supports: >-
      RFC 6920 defines named-information identifiers using a hash algorithm and digest value and separates naming from
      dereferencing. Moonweave uses an algorithm-tagged digest to verify a versioned directory member manifest behind a
      separately recorded locator.
    locator: RFC 6920 sections 1 and 3 on named information identifiers and ni URI syntax
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-directory-resource-identity
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes identifiable entities from activities that use or generate entities. Moonweave uses resource ID,
      filesystem reference, locator, version, and manifest digest to identify a directory source separately from member
      files and enumeration activities.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-directory-resource-version
    source: rfc-6920
    supports: >-
      RFC 6920 distinguishes a hash-based resource name from locating or dereferencing that resource. Moonweave stores a
      source-system manifest version separately from the digest that verifies the selected manifest.
    locator: RFC 6920 sections 1 and 3 on names locators and digest values
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-directory-resource-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes source entities from activities and generated entities. Moonweave keeps a directory resource,
      its enumerating IngestionRun, member FileResources, and generated Documents as separate provenance facts.
    locator: PROV-O Entity Activity prov used and prov wasGeneratedBy
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-directory-resource-specialization
    source: w3c-prov-o
    supports: >-
      Modeling a directory with filesystem and versioned-manifest differentia as an IngestibleResource specialization is a
      Moonweave taxonomy inference grounded in PROV-O's distinction between enduring entities and activities.
    locator: PROV-O Entity and Activity
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-directory-resource-membership
    source: rfc-6920
    supports: >-
      RFC 6920 supports use of a digest to identify one resource representation. Moonweave treats a verified versioned
      member manifest as evidence for directory membership instead of treating a filename or string prefix as sufficient.
    locator: RFC 6920 sections 1 and 3 on resource representation and digest value
    evidence_kind: ontology-design-inference
    confidence: medium
