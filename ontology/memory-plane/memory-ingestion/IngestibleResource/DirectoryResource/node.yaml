schema: moonweave.ai/ontology-node/v1
id: DirectoryResource
kind: concept
status: review
labels:
  zh: 目录资源
  en: Directory resource
  ja: directory resource
semantics:
  short_definition:
    zh: 文件系统内以路径标识并包含文件或子目录的资源。
    en: A path-identified resource within a filesystem containing files or subdirectories.
    ja: filesystem内でpath識別しfileまたはsubdirectoryを含むresourceです。
  definition:
    zh: DirectoryResource 是属于一个 FileSystem、以规范目录路径标识并包含 FileResource 的实体；它不是整个文件系统或文件内容信息。
    en: DirectoryResource is an entity belonging to one FileSystem, identified by a canonical directory path, and containing FileResource values; it is not the whole filesystem or file-content information.
    ja: DirectoryResource は一 FileSystem に属しcanonical directory pathで識別して FileResource を含むentityで、filesystem全体やfile-content informationではありません。
  why_needed:
    zh: 补上文件系统与文件之间的路径层。
    en: Adds the path layer between filesystem and file.
    ja: filesystemとfileの間にpath階層を追加します。
  includes:
    - zh: 纳入可遍历目录与对象前缀。
      en: Includes traversable directories and object prefixes.
      ja: traversable directoryとobject prefixを含みます。
  excludes:
    - zh: 排除 FileSystem、FileResource 和 Document。
      en: Excludes FileSystem, FileResource, and Document.
      ja: FileSystem・FileResource・Documentを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识目录资源。
        en: Stable identifier for the directory resource.
        ja: directory resourceの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: dir-legal
      source_claims:
        - claim-directory-resource-002
    - id: filesystem_id
      labels:
        zh: 文件系统标识
        en: filesystem ID
        ja: filesystem ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识目录 URI 所依赖的文件系统命名与解析环境；相同路径文本在不同文件系统中不因此成为同一目录。
        en: Identifies the filesystem naming and resolution environment on which the directory URI depends; identical path text in different filesystems does not identify one directory.
        ja: directory URI が依存する filesystem naming/resolution environment を識別し、異なる filesystem の同一 path text を同一 directory とみなしません。
      allowed_values: []
      pattern: null
      example_value: fs-policy
      source_claims:
        - claim-directory-resource-003
    - id: directory_uri
      labels:
        zh: 目录 URI
        en: directory URI
        ja: directory URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可解析的绝对 file URI 记录目录位置，并保留其 authority、大小写和编码语义。
        en: Records the directory location as a resolvable absolute file URI while preserving authority, case, and encoding semantics.
        ja: directory location を解決可能な absolute file URI として記録し authority・case・encoding semantics を保持します。
      allowed_values: []
      pattern: null
      example_value: file:///srv/policy/legal/
      source_claims:
        - claim-directory-resource-004
    - id: version_ref
      labels:
        zh: 目录版本引用
        en: directory version reference
        ja: directory 版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用用于枚举该目录成员的文件系统快照、对象存储代次或其他逻辑版本。
        en: References the filesystem snapshot, object-store generation, or other logical version under which directory membership was enumerated.
        ja: directory membership を列挙した filesystem snapshot・object-store generation・その他の論理版を参照します。
      allowed_values: []
      pattern: null
      example_value: snapshot:2026-07
      source_claims:
        - claim-directory-resource-005
    - id: manifest_digest
      labels:
        zh: 成员清单摘要
        en: manifest digest
        ja: manifest digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对规范化成员清单计算的摘要；它校验一次目录枚举结果，不等同于目录的逻辑版本引用。
        en: Records a digest over the canonicalized member manifest; it verifies one directory-enumeration result and is not the directory's logical version reference.
        ja: canonicalized member manifest の digest を記録し、一回の directory enumeration result を検証しますが directory の論理版参照とは異なります。
      allowed_values: []
      pattern: null
      example_value: "sha-256=:ZGlyMTc=:"
      source_claims:
        - claim-directory-resource-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: DirectoryResource-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 目录资源正例
      en: "Positive case: Directory resource"
      ja: directory resource正例
    scenario_id: null
    descriptions:
      zh: dir-legal 以 fs-policy、规范路径 /legal/、目录清单摘要 d17 和 snapshot-2026-07 识别，清单列出 policy.pdf 与 terms.md 等成员。
      en: dir-legal is identified by fs-policy, canonical path /legal/, directory-manifest digest d17, and snapshot-2026-07 and lists members such as policy.pdf and terms.md.
      ja: dir-legal は fs-policy、canonical path /legal/、manifest digest d17、snapshot-2026-07 で識別され policy.pdf 等を列挙します。
    field_values:
      resource_id: dir-legal
      filesystem_id: fs-policy
      directory_uri: file:///srv/policy/legal/
      version_ref: snapshot:2026-07
      manifest_digest: "sha-256=:ZGlyMTc=:"
      canonical_locator: file:///srv/policy/legal/
      content_digest: "sha-256=:ZGlyMTc=:"
    related_node_ids:
      - DirectoryResource
    related_relation_ids: []
    expected_result:
      zh: 将 /legal/ 表示为 DirectoryResource，并把成员资格限定到 fs-policy 的该快照。
      en: Represent /legal/ as DirectoryResource and scope its membership to that fs-policy snapshot.
      ja: /legal/ を DirectoryResource とし membership を当該 fs-policy snapshot に限定します。
    why_valid_or_invalid:
      zh: 目录拥有独立路径、父文件系统、版本化成员清单和容器生命周期，可被目录加载器整体读取。
      en: The directory has its own path, parent file system, versioned member manifest, and container lifecycle and can be read as a whole by a directory loader.
      ja: directory は path、parent filesystem、versioned manifest、container lifecycle を持ち directory loader で一括読取できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-directory-resource-007
  - id: DirectoryResource-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 目录资源边界例
      en: "Boundary case: Directory resource"
      ja: directory resource境界例
    scenario_id: null
    descriptions:
      zh: policy.pdf 具有文件路径 /legal/policy.pdf 和字节摘要，但没有子成员清单，也不能作为目录遍历根。
      en: policy.pdf has file path /legal/policy.pdf and a byte digest but has no child-member manifest and cannot serve as a directory traversal root.
      ja: policy.pdf は file path と byte digest を持ちますが child manifest がなく directory traversal root になれません。
    field_values: {}
    related_node_ids:
      - DirectoryResource
    related_relation_ids: []
    expected_result:
      zh: 把 policy.pdf 保持为 FileResource，不把包含它的路径前缀推断成文件自身的目录身份。
      en: Keep policy.pdf as FileResource and do not infer directory identity for the file from its containing path prefix.
      ja: policy.pdf は FileResource とし path prefix から directory identity を推論しません。
    why_valid_or_invalid:
      zh: 叶文件与目录容器的成员结构和生命周期不同；路径嵌套只建立包含关系，不建立身份相等。
      en: A leaf file and directory container have different membership structure and lifecycle; path nesting establishes containment, not identity equality.
      ja: leaf file と directory container は membership structure・lifecycle が異なり path nesting は containment だけを示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-directory-resource-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DirectoryResource-is_a-IngestibleResource
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: DirectoryResource 是一种 IngestibleResource；其种差不是“可以被遍历”这一运行行为，而是它把一个文件系统中的目录作为可版本化资源来标识：具有 filesystem_id、directory_uri、version_ref 和对成员清单求得的 manifest_digest，可作为后续文件枚举的根。
    en: "A DirectoryResource is an IngestibleResource whose differentia is not the runtime act of traversal but the identity of a versioned directory resource in one filesystem: it has filesystem_id, directory_uri, version_ref, and a manifest_digest over its member listing and can serve as the root for later file enumeration."
    ja: DirectoryResource は IngestibleResource の一種です。種差は traversal という実行行為ではなく、一 filesystem 内の versioned directory resource としての同一性です。filesystem_id・directory_uri・version_ref・member listing の manifest_digest を持ち、後続 file enumeration の root になります。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions:
    - id: DirectoryResource-is_a-IngestibleResource-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Classify as DirectoryResource only when the object has stable resource_id, filesystem_id, canonical directory_uri, version_ref, and manifest_digest for the directory member listing.
      explanations:
        zh: 仅当对象具有稳定 resource_id、filesystem_id、规范 directory_uri、version_ref，以及对该目录成员清单求得的 manifest_digest 时归为 DirectoryResource。
        en: Classify as DirectoryResource only when the object has a stable resource_id, filesystem_id, canonical directory_uri, version_ref, and manifest_digest for the directory member listing.
        ja: stable resource_id・filesystem_id・canonical directory_uri・version_ref・directory member listing の manifest_digest を持つ時だけ DirectoryResource に分類します。
      source_claims:
        - claim-directory-resource-009
        - claim-directory-resource-010
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DirectoryResource-is_a-IngestibleResource-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 资源 dir-legal-2026-07 标识文件系统 fs-policy 中的 file:///srv/legal/：版本引用为 snapshot-2026-07-15，manifest_digest 固定该版本列出的 184 个直接和递归文件成员。它是可被摄入运行读取的目录资源，而不是一次遍历活动。
        en: Resource dir-legal-2026-07 identifies file:///srv/legal/ in filesystem fs-policy. Its version_ref is snapshot-2026-07-15 and manifest_digest fixes the 184 direct and recursive file members listed by that version. It is a directory resource readable by ingestion runs, not a traversal activity.
        ja: resource dir-legal-2026-07 は filesystem fs-policy の file:///srv/legal/ を識別します。version_ref は snapshot-2026-07-15、manifest_digest はその版が列挙する184件の直接・再帰 file member を固定します。ingestion run が読める directory resource であり traversal activity ではありません。
      field_values:
        resource_id: dir-legal-2026-07
        filesystem_id: fs-policy
        directory_uri: file:///srv/legal/
        version_ref: snapshot-2026-07-15
        manifest_digest: "sha-256=:z9JvY3J8e2r5M2R4q1lQxg==:"
      related_node_ids:
        - DirectoryResource
        - IngestibleResource
      related_relation_ids:
        - DirectoryResource-is_a-IngestibleResource
      expected_result:
        zh: 验证器将 dir-legal-2026-07 归为 DirectoryResource，并可沿 is_a 上溯到 IngestibleResource；成员枚举仍由后续 IngestionRun 执行。
        en: Validation classifies dir-legal-2026-07 as DirectoryResource and follows is_a to IngestibleResource; member enumeration remains an action of a later IngestionRun.
        ja: 検証器は dir-legal-2026-07 を DirectoryResource とし is_a で IngestibleResource へ上位化します。member enumeration は後続 IngestionRun の行為として残ります。
      why_valid_or_invalid:
        zh: 该对象同时满足可摄入资源的稳定身份、定位符和版本要求，并以 filesystem_id、目录 URI 与成员清单摘要给出目录种差；没有把 loader、遍历策略或运行状态塞进资源类型。
        en: The object satisfies the stable identity, locator, and version requirements of an ingestible resource and adds the directory differentia through filesystem identity, directory URI, and member-manifest digest without importing loader, traversal-policy, or run state into the resource type.
        ja: ingestible resource の stable identity・locator・version を満たし、filesystem identity・directory URI・member-manifest digest で directory 種差を加えます。loader・traversal policy・run state を resource type へ混入しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-directory-resource-011
        - claim-directory-resource-012
    - id: DirectoryResource-is_a-IngestibleResource-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 资源 file-policy-v7 指向 file:///srv/legal/policy.md，具有 directory_id、单文件 version_ref 与对文件字节求得的 content_digest，却没有 directory_uri 或成员清单摘要。即使它位于 legal 目录下，也仍是 FileResource 而不是 DirectoryResource。
        en: Resource file-policy-v7 points to file:///srv/legal/policy.md and has directory_id, a single-file version_ref, and content_digest over the file bytes, but no directory_uri or member-manifest digest. Being located under the legal directory does not make it a DirectoryResource; it remains FileResource.
        ja: resource file-policy-v7 は file:///srv/legal/policy.md を指し、directory_id・single-file version_ref・file bytes の content_digest を持ちますが directory_uri や member-manifest digest はありません。legal directory 下にあっても DirectoryResource ではなく FileResource です。
      field_values:
        candidate_kind: FileResource
        resource_id: file-policy-v7
        directory_id: dir-legal-2026-07
        file_uri: file:///srv/legal/policy.md
        version_ref: git:9f42c1a
        content_digest: "sha-256=:y8qM6m4FhV2S8I4eTnQv4w==:"
      related_node_ids:
        - DirectoryResource
        - IngestibleResource
        - FileResource
      related_relation_ids:
        - DirectoryResource-is_a-IngestibleResource
        - FileResource-is_a-IngestibleResource
      expected_result:
        zh: 验证器拒绝把 file-policy-v7 归为 DirectoryResource，同时保留其经 FileResource-is_a-IngestibleResource 上溯到 IngestibleResource 的有效分类。
        en: Validation rejects DirectoryResource membership for file-policy-v7 while retaining its valid FileResource-to-IngestibleResource classification.
        ja: 検証器は file-policy-v7 の DirectoryResource 所属を拒否し、FileResource-is_a-IngestibleResource による有効な上位分類を維持します。
      why_valid_or_invalid:
        zh: 文件与目录共享 IngestibleResource 上位类并存在 contains 关系，但文件身份由一个文件 URI 和字节摘要确定；目录身份由目录 URI 和成员清单摘要确定，不能互借种差。
        en: File and directory share the IngestibleResource genus and may participate in contains, but file identity is fixed by one file URI and byte digest while directory identity is fixed by a directory URI and member-manifest digest; their differentiae cannot be borrowed.
        ja: file と directory は IngestibleResource 上位を共有し contains に参加しますが、file identity は一 file URI と byte digest、directory identity は directory URI と member-manifest digest で決まり、種差を相互流用できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-directory-resource-013
        - claim-directory-resource-014
  source_claims:
    - claim-directory-resource-015
    - claim-directory-resource-016
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: DirectoryResource-contains-FileResource
    predicate: contains
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含文件
      en: contains file
      ja: fileを含む
    definitions:
      zh: DirectoryResource —contains→ FileResource 表示目录清单把该 FileResource 标识为直接成员：文件的 directory_id 回指目录 resource_id，且 file_uri 在同一文件系统命名空间中由 directory_uri 解析。
      en: "DirectoryResource —contains→ FileResource states that the directory manifest identifies the FileResource as a direct member: the file's directory_id refers to the directory resource_id and file_uri resolves from directory_uri in the same filesystem namespace."
      ja: DirectoryResource —contains→ FileResource は directory manifest が FileResource を直接 member として識別し、file の directory_id が directory resource_id を参照し file_uri が同一 filesystem namespace の directory_uri から解決されることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_contains
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: DirectoryResource-contains-FileResource-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when file.directory_id equals directory.resource_id, file.file_uri resolves as a direct member beneath directory.directory_uri in the same filesystem, and the directory manifest identifies the file resource and version_ref.
        explanations:
          zh: 仅当 file.directory_id 等于 directory.resource_id、file_uri 在同一文件系统中由 directory_uri 解析为直接成员，并且目录清单点名该文件资源及其 version_ref 时成立。
          en: Assert only when file.directory_id equals directory.resource_id, file_uri resolves as a direct member beneath directory_uri in the same filesystem, and the directory manifest names that file resource and version_ref.
          ja: file.directory_id が directory.resource_id と一致し、同一 filesystem で file_uri が directory_uri 直下の member として解決され、directory manifest が file resource と version_ref を明示する時だけ成立します。
        source_claims:
          - claim-directory-resource-017
          - claim-directory-resource-018
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DirectoryResource-contains-FileResource-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 包含文件正例
          en: "Positive case: contains file"
          ja: fileを含む正例
        scenario_id: null
        descriptions:
          zh: dir-legal@d17 的 member manifest 列出 file-policy-v7，且文件的 canonical_parent=/legal/、filesystem_id=fs-policy 与 snapshot 均匹配目录。
          en: dir-legal@d17's member manifest lists file-policy-v7, whose canonical parent /legal/, filesystem ID fs-policy, and snapshot all match the directory.
          ja: dir-legal@d17 manifest が file-policy-v7 を列挙し canonical parent、filesystem ID、snapshot が一致します。
        field_values: {}
        related_node_ids:
          - DirectoryResource
          - FileResource
        related_relation_ids:
          - DirectoryResource-contains-FileResource
        expected_result:
          zh: 建立 dir-legal contains file-policy-v7，并把成员事实限定到目录清单 d17。
          en: Assert dir-legal contains file-policy-v7 and scope membership to directory manifest d17.
          ja: dir-legal contains file-policy-v7 を確立し membership を manifest d17 に限定します。
        why_valid_or_invalid:
          zh: 目录清单和文件内部父路径双向一致，证明该文件版本是这个目录快照的直接成员。
          en: The directory manifest and the file's internal parent path agree in both directions, proving direct membership in this directory snapshot.
          ja: directory manifest と file parent path が一致し direct membership を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-directory-resource-019
      - id: DirectoryResource-contains-FileResource-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 包含文件边界例
          en: "Boundary case: contains file"
          ja: fileを含む境界例
        scenario_id: null
        descriptions:
          zh: /finance/policy.pdf 与 /legal/policy.pdf 文件名相同，但 canonical_parent=/finance/，且未出现在 dir-legal@d17 清单中。
          en: /finance/policy.pdf shares the filename with /legal/policy.pdf but has canonical parent /finance/ and is absent from dir-legal@d17's manifest.
          ja: /finance/policy.pdf は同名でも canonical parent が /finance/ で dir-legal manifest にありません。
        field_values: {}
        related_node_ids:
          - DirectoryResource
          - FileResource
        related_relation_ids:
          - DirectoryResource-contains-FileResource
        expected_result:
          zh: 不得因文件名相同建立 dir-legal contains /finance/policy.pdf。
          en: Do not assert that dir-legal contains /finance/policy.pdf from filename equality.
          ja: filename equality だけで dir-legal contains /finance/policy.pdf を確立しません。
        why_valid_or_invalid:
          zh: 文件名不包含根与父路径范围；只有规范父路径和版本化成员清单能证明目录归属。
          en: A filename omits root and parent-path scope; only canonical parent path and versioned manifest can prove directory membership.
          ja: filename は root・parent scope を欠き canonical parent path・versioned manifest が必要です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-directory-resource-019
    source_claims:
      - claim-directory-resource-019
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:FileResource
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
