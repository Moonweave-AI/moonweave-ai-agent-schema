schema: moonweave.ai/ontology-node/v1
id: DirectoryResource
kind: concept
labels:
  zh: 目录资源
  en: Directory resource
  ja: ディレクトリリソース
semantics:
  short_definition:
    zh: 文件系统内以目录 URI 与成员清单标识的容器资源。
    en: Container resource in a filesystem identified by directory URI and member manifest.
    ja: filesystem 内で directory URI と member manifest により識別する container resource。
  definition:
    zh: DirectoryResource 是属于 FileSystem、以 directory_uri 与 manifest_digest 标识并包含 FileResource 成员的 IngestibleResource；对应 LlamaIndex SimpleDirectoryReader 的非递归目录枚举与 MCP file:// 目录前缀；它不是 FileSystem 根、单文件或 Document。
    en: DirectoryResource is an IngestibleResource belonging to FileSystem, identified by directory_uri and manifest_digest and containing FileResource members, mapping to LlamaIndex SimpleDirectoryReader directory enumeration and MCP file:// directory prefixes; it is not the FileSystem root, a single file, or Document.
    ja: DirectoryResource は FileSystem に属し directory_uri/manifest_digest で識別して FileResource member を含む IngestibleResource。LlamaIndex SimpleDirectoryReader directory 列挙/MCP file:// directory prefix に対応。FileSystem root/単 file/Document ではない。
  why_needed:
    zh: 在文件系统与文件之间补上路径层，支持目录级 ingest 策略与成员清单审计。
    en: Adds the path layer between filesystem and files, supporting directory-level ingest policy and member-manifest audit.
    ja: filesystem と file の間に path 層を補い directory 級 ingest policy/member manifest audit を支援。
  includes:
    - zh: 纳入可遍历本地目录、对象存储 prefix 与 Git 树快照。
      en: Includes traversable local directories, object-store prefixes, and Git tree snapshots.
      ja: traversable local directory/object-store prefix/Git tree snapshot。
  excludes:
    - zh: 排除 FileSystem、FileResource 与 Document。
      en: Excludes FileSystem, FileResource, and Document.
      ja: FileSystem・FileResource・Document を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: SimpleDirectoryReader 可 recursive 遍历 directory_uri 下文件；LangChain DirectoryLoader 同理；manifest_digest 固定某版本目录成员集合，与单文件 content_digest 区分。
    en: SimpleDirectoryReader may recursively traverse files under directory_uri; LangChain DirectoryLoader follows the same pattern; manifest_digest fixes a directory-version member set, distinct from single-file content_digest.
    ja: SimpleDirectoryReader が directory_uri 下 file を recursive traverse。LangChain DirectoryLoader も同型。manifest_digest は directory 版 member set を固定し単 file content_digest と区別。
  typical_input:
    - description: LlamaIndex directory enumeration
      format: |
        SimpleDirectoryReader(input_dir="/srv/legal/", recursive=False)
      source_claims: [claim-directory-resource-llamaindex]
  typical_output:
    - description: Moonweave directory resource with manifest
      format: |
        {
          "resource_id": "dir-legal",
          "directory_uri": "file:///srv/legal/",
          "manifest_digest": "sha256:..."
        }
      source_claims: [claim-directory-resource-design]
  reference_implementations:
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: Directory traversal and file enumeration.
    - name: LangChain DirectoryLoader
      url: https://python.langchain.com/docs/integrations/document_loaders/directory/
      description: Load documents from a directory path.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识目录资源。
        en: Stable identifier for the directory resource.
        ja: directory resource の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dir-legal
      allowed_values: []
      source_claims: [claim-directory-resource-id]
    - id: filesystem_id
      labels: {zh: 所属文件系统标识, en: Containing filesystem identifier, ja: 所属 filesystem 識別子}
      definitions:
        zh: 包含该目录的 FileSystem resource_id。
        en: FileSystem resource_id containing this directory.
        ja: 当該 directory を含む FileSystem resource_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: fs-policy
      allowed_values: []
      source_claims: [claim-directory-resource-fs]
    - id: directory_uri
      labels: {zh: 目录 URI, en: Directory URI, ja: directory URI}
      definitions:
        zh: 标识目录对象的绝对 URI，通常以 / 结尾。
        en: Absolute URI identifying the directory object, typically trailing with /.
        ja: directory object を識別する absolute URI。通常 / 終端。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///srv/legal/
      allowed_values: []
      source_claims: [claim-directory-resource-uri]
    - id: version_ref
      labels: {zh: 目录版本引用, en: Directory version reference, ja: directory 版参照}
      definitions:
        zh: 目录快照、Git tree 或 listing 代次版本句柄。
        en: Directory snapshot, Git tree, or listing-generation version handle.
        ja: directory snapshot/Git tree/listing generation の版 handle。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: snapshot-2026-07-15
      allowed_values: []
      source_claims: [claim-directory-resource-version]
    - id: manifest_digest
      labels: {zh: 成员清单摘要, en: Member manifest digest, ja: member manifest digest}
      definitions:
        zh: 对该版本目录成员集合（路径+版本）计算的摘要；不是单文件字节 digest。
        en: Digest over member set (paths plus versions) for this directory version; not single-file byte digest.
        ja: 当該 directory 版 member set（path+version）の digest。単 file byte digest ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:dir-legal-manifest-v3
      allowed_values: []
      source_claims: [claim-directory-resource-manifest]
  constraints: []
  required_relations: []
examples:
  - id: DirectoryResource-example-llamaindex-dir
    labels:
      zh: LlamaIndex 目录遍历
      en: LlamaIndex directory traversal
      ja: LlamaIndex directory traverse
    descriptions:
      zh: ingest-run-17 对 dir-legal（file:///srv/legal/）执行 SimpleDirectoryReader，manifest_digest 覆盖 policy.md 与 appendix.pdf 两成员；各 FileResource 单独记录 content_digest。
      en: ingest-run-17 runs SimpleDirectoryReader on dir-legal (file:///srv/legal/); manifest_digest covers members policy.md and appendix.pdf; each FileResource records its own content_digest.
      ja: ingest-run-17 が dir-legal に SimpleDirectoryReader 実行。manifest_digest が policy.md/appendix.pdf 二 member を覆盖。各 FileResource が独自 content_digest。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      version: recursive
    field_values:
      resource_id: dir-legal
      directory_uri: file:///srv/legal/
      manifest_digest: sha256:dir-legal-manifest-v3
    related_node_ids: [DirectoryResource, FileResource]
    related_relation_ids: []
    source_claims: [claim-directory-resource-llamaindex]
  - id: DirectoryResource-example-s3-prefix
    labels:
      zh: S3 prefix 目录
      en: S3 prefix directory
      ja: S3 prefix directory
    descriptions:
      zh: s3://policy-corpus/legal/ 作为 DirectoryResource；version_ref 固定 listing 代次，FileResource 成员指向各 object key。
      en: s3://policy-corpus/legal/ is a DirectoryResource; version_ref fixes listing generation; FileResource members point to object keys.
      ja: s3://policy-corpus/legal/ を DirectoryResource。version_ref が listing 代次固定。FileResource member が各 object key を指す。
    example_source:
      product: AWS S3
      url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/ListingKeysUsingAPIs.html
      version: ListObjectsV2
    field_values:
      directory_uri: s3://policy-corpus/legal/
    related_node_ids: [DirectoryResource, FileSystem]
    related_relation_ids: []
    source_claims: [claim-directory-resource-design]
  - id: DirectoryResource-example-not-file
    labels:
      zh: 目录非单文件
      en: Directory is not single file
      ja: directory は単 file ではない
    descriptions:
      zh: file-policy-v7 有 file_uri 与单文件 digest；dir-legal 有 manifest_digest 与多成员枚举——二者种差不同，不可互换类型。
      en: file-policy-v7 has file_uri and single-file digest; dir-legal has manifest_digest and multi-member enumeration—different differentiae, not interchangeable types.
      ja: file-policy-v7 は file_uri/単 file digest。dir-legal は manifest_digest/複数 member 列挙。種差異なり型互换不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DirectoryResource, FileResource]
    related_relation_ids: []
    source_claims: [claim-directory-resource-design]
parent_relation:
  id: DirectoryResource-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入资源, en: is an ingestible resource, ja: 取込可能リソースの一種}
  definitions:
    zh: DirectoryResource 种差为 directory_uri、manifest_digest 与 FileResource 成员容器，而非单文件定位符。
    en: DirectoryResource differentia is directory_uri, manifest_digest, and FileResource member container, not a single-file locator.
    ja: DirectoryResource 種差は directory_uri/manifest_digest/FileResource member container。単 file locator ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-directory-resource-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-sdr
    title: SimpleDirectoryReader
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
    source_type: official-doc
    relevance: Directory enumeration for ingestion.
  - id: src-langchain-directory
    title: LangChain DirectoryLoader
    publisher: LangChain
    url: https://python.langchain.com/docs/integrations/document_loaders/directory/
    source_type: official-doc
    relevance: Directory-based document loading.
  - id: src-directory-resource-design
    title: Moonweave directory resource boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Directory versus file identity.
source_claims:
  - id: claim-directory-resource-llamaindex
    source: src-llamaindex-sdr
    supports: SimpleDirectoryReader enumerates files under a directory path.
    locator: SimpleDirectoryReader
    evidence_kind: official
    confidence: high
  - id: claim-directory-resource-design
    source: src-directory-resource-design
    supports: manifest_digest verifies directory member set distinct from file content digest.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-directory-resource-id
    source: src-directory-resource-design
    supports: resource_id identifies directory resource lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-directory-resource-fs
    source: src-directory-resource-design
    supports: filesystem_id scopes directory within FileSystem.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-directory-resource-uri
    source: src-llamaindex-sdr
    supports: directory_uri locates the directory container.
    locator: input_dir
    evidence_kind: official
    confidence: high
  - id: claim-directory-resource-version
    source: src-directory-resource-design
    supports: version_ref fixes directory listing or snapshot generation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-directory-resource-manifest
    source: src-directory-resource-design
    supports: manifest_digest binds member set for directory version audit.
    locator: structure
    evidence_kind: design-inference
    confidence: high
