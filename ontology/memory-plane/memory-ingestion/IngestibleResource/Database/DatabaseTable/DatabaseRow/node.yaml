schema: moonweave.ai/ontology-node/v1
id: DatabaseRow
kind: concept
status: accepted
labels:
  zh: 数据库行
  en: Database row
  ja: データベースrow
semantics:
  short_definition:
    zh: 由表身份与行键标识的一条结构化来源信息。
    en: One structured source-information item identified by table identity and row key.
    ja: table同一性とrow keyで識別する一構造化source informationです。
  definition:
    zh: DatabaseRow 是属于一个 DatabaseTable、由 row_id 与行内容摘要标识的 IngestibleInformation；它是表中信息记录，不是 DatabaseTable 实体或完整查询结果集。
    en: DatabaseRow is IngestibleInformation belonging to one DatabaseTable and identified by row_id plus row-content digest; it is a table information record, not the DatabaseTable entity or a complete query-result set.
    ja: DatabaseRow は一 DatabaseTable に属し row_id とrow-content digestで識別する IngestibleInformation で、table information recordであり DatabaseTable entityや完全query-result setではありません。
  why_needed:
    zh: 把行信息置于表下而不是与所有信息平铺。
    en: Places row information beneath its table instead of flat beside all information.
    ja: row informationを全informationと平置きせずtable下に置きます。
  includes:
    - zh: 纳入可由主键/复合键稳定定位的行快照。
      en: Includes row snapshots stably addressable by primary or composite key.
      ja: primary/composite keyで安定address可能なrow snapshotを含みます。
  excludes:
    - zh: 排除 DatabaseTable、查询结果集合和无键聚合值。
      en: Excludes DatabaseTable, query-result collections, and unkeyed aggregate values.
      ja: DatabaseTable・query-result collection・unkeyed aggregate値を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - row_id
  fields:
    - id: row_id
      labels:
        zh: 行标识
        en: row ID
        ja: row ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录主键或复合行键。
        en: Records primary or composite row key.
        ja: primaryまたはcomposite row keyを記録します。
      allowed_values: []
      pattern: null
      example_value: clause:42
      source_claims:
        - claim-database-row-002
    - id: row_digest
      labels:
        zh: 行摘要
        en: row digest
        ja: row digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定行值版本。
        en: Fixes the row-value version.
        ja: row value版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:row42-v3
      source_claims:
        - claim-database-row-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: DatabaseRow-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 数据库行正例
      en: "Positive case: Database row"
      ja: データベースrow正例
    scenario_id: null
    descriptions:
      zh: row policy.public.clauses#42 在 snapshot-2026-07 中由表 ID、主键 42、行版本 7 和字段内容摘要共同识别，并可由 SQL loader 单独读取。
      en: Row policy.public.clauses#42 is identified within snapshot-2026-07 by table ID, primary key 42, row version 7, and a field-content digest and can be read individually by the SQL loader.
      ja: row policy.public.clauses#42 は snapshot-2026-07 内で table ID、primary key 42、row version 7、field digest により識別され SQL loader で個別読取できます。
    field_values:
      row_id: clause:42
      row_digest: sha256:row42-v3
    related_node_ids:
      - DatabaseRow
    related_relation_ids: []
    expected_result:
      zh: 将该快照中的主键 42 记录为 DatabaseRow，并保留表范围与行版本。
      en: Represent primary key 42 in that snapshot as DatabaseRow while retaining its table scope and row version.
      ja: 当該 snapshot の primary key 42 を DatabaseRow とし table scope と row version を保持します。
    why_valid_or_invalid:
      zh: 主键只有与表身份和快照版本组合后才稳定指向一个来源行，内容摘要进一步固定读取版本。
      en: The primary key identifies one source row only when combined with table identity and snapshot version, while the digest fixes the read version.
      ja: primary key は table identity と snapshot version の組合せで一 source row を示し digest が読取版を固定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-database-row-004
  - id: DatabaseRow-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 数据库行边界例
      en: "Boundary case: Database row"
      ja: データベースrow境界例
    scenario_id: null
    descriptions:
      zh: 查询 SELECT count(*) 返回标量 42 和查询时间，但没有 source table 的主键、行版本或原始字段集合，因此不能回指某一行。
      en: The query SELECT count(*) returns scalar 42 and a query time but has no source-table primary key, row version, or original field set and therefore cannot re-identify one row.
      ja: SELECT count(*) は scalar 42 と query time を返しますが source-table primary key、row version、original fields がなく一 row を再識別できません。
    field_values: {}
    related_node_ids:
      - DatabaseRow
    related_relation_ids: []
    expected_result:
      zh: 把该值保留为查询结果，不建立 DatabaseRow 实例。
      en: Keep the value as a query result and create no DatabaseRow instance from it.
      ja: 当該値は query result とし DatabaseRow instance を作りません。
    why_valid_or_invalid:
      zh: 聚合结果概括多行而没有单行身份；数值恰好等于某个主键不能恢复来源行。
      en: An aggregate summarizes multiple rows without single-row identity; numerical equality with a primary key cannot recover a source row.
      ja: aggregate は複数 row を要約し単一 row identity を持たず、primary key と同値でも source row は復元できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-database-row-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DatabaseTable-contains-DatabaseRow
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含行
    en: contains row
    ja: rowを含む
  definitions:
    zh: DatabaseTable —contains→ DatabaseRow 表示行键与 schema 都在该表身份下解释。
    en: DatabaseTable —contains→ DatabaseRow means that the row key and schema are both interpreted under that table identity.
    ja: DatabaseTable —contains→ DatabaseRow はrow keyとschemaをそのtable同一性下で解釈することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: DatabaseTable-contains-DatabaseRow-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when row.table_id targets the table and row values conform to that table's schema version.
      explanations:
        zh: 仅当 row.table_id 指向目标表且行值符合该表 schema 版本时成立。
        en: Assert only when row.table_id targets the table and row values conform to that table's schema version.
        ja: row.table_idがtarget tableを指しrow値がそのtable schema版へ適合する時だけ成立します。
      source_claims:
        - claim-database-row-006
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DatabaseTable-contains-DatabaseRow-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 包含行正例
        en: "Positive case: contains row"
        ja: rowを含む正例
      scenario_id: null
      descriptions:
        zh: table-policy-clauses@schema17 的 row manifest 包含主键 42，row-42 的 table_id、snapshot、schema version 与行摘要均匹配该表。
        en: table-policy-clauses@schema17's row manifest contains primary key 42, and row-42's table ID, snapshot, schema version, and row digest all match the table.
        ja: table-policy-clauses の row manifest が primary key 42 を含み row-42 の table ID、snapshot、schema version が一致します。
      field_values: {}
      related_node_ids:
        - DatabaseTable
        - DatabaseRow
      related_relation_ids:
        - DatabaseTable-contains-DatabaseRow
      expected_result:
        zh: 建立 table-policy-clauses contains row-42，并把该事实限定到 schema17 快照。
        en: Assert table-policy-clauses contains row-42 and scope the fact to the schema17 snapshot.
        ja: table-policy-clauses contains row-42 を確立し schema17 snapshot に限定します。
      why_valid_or_invalid:
        zh: 表清单、行内部表标识与模式版本同时一致，因此可验证该行属于这个确切表版本。
        en: Table manifest, the row's internal table identity, and schema version all agree, making membership in this exact table version verifiable.
        ja: table manifest、row table identity、schema version が一致し exact table membership を検証できます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-database-row-006
    - id: DatabaseTable-contains-DatabaseRow-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 包含行边界例
        en: "Boundary case: contains row"
        ja: rowを含む境界例
      scenario_id: null
      descriptions:
        zh: archive.clauses 中也存在主键 42，但 row-archive-42 的 table_id 和 schema digest 指向 archive-db，而不是 table-policy-clauses。
        en: archive.clauses also has primary key 42, but row-archive-42's table ID and schema digest point to archive-db rather than table-policy-clauses.
        ja: archive.clauses にも primary key 42 があるが row の table ID・schema digest は archive-db を示します。
      field_values: {}
      related_node_ids:
        - DatabaseTable
        - DatabaseRow
      related_relation_ids:
        - DatabaseTable-contains-DatabaseRow
      expected_result:
        zh: 不得仅凭相同主键值把 row-archive-42 连接到 table-policy-clauses。
        en: Do not link row-archive-42 to table-policy-clauses merely from the equal primary-key value.
        ja: 同じ primary key 値だけで row-archive-42 を table-policy-clauses に接続しません。
      why_valid_or_invalid:
        zh: 主键作用域是表和快照；脱离该范围比较数值会把不同来源记录错误合并。
        en: A primary key is scoped by table and snapshot; comparing the value outside that scope would merge distinct source records.
        ja: primary key は table・snapshot scoped で範囲外の値比較は異なる source record を誤統合します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-database-row-006
  source_claims:
    - claim-database-row-006
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
