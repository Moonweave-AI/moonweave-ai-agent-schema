schema: moonweave.ai/ontology-node/v1
id: DatabaseRow
kind: concept
labels:
  zh: 数据库行
  en: Database row
  ja: データベース行
semantics:
  short_definition:
    zh: 由表身份与行键标识的一条结构化来源信息。
    en: One structured source-information item identified by table identity and row key.
    ja: table identity/row key で識別する一 structured source information。
  definition:
    zh: DatabaseRow 是属于 DatabaseTable、由 row_id（主键/复合键）与 row_content_digest 标识的 IngestibleInformation；LlamaIndex DatabaseReader 与 LangChain SQLDatabaseLoader 常把每行映射为一个 Document；它不是 DatabaseTable 实体或完整 result set。
    en: DatabaseRow is IngestibleInformation belonging to DatabaseTable, identified by row_id (primary or composite key) and row_content_digest; LlamaIndex DatabaseReader and LangChain SQLDatabaseLoader often map each row to one Document; it is not the DatabaseTable entity or a complete result set.
    ja: DatabaseRow は DatabaseTable に属し row_id（PK/複合键）/row_content_digest で識別する IngestibleInformation。LlamaIndex DatabaseReader/LangChain SQLDatabaseLoader が各行を Document に写像し得る。DatabaseTable entity/完全 result set ではない。
  why_needed:
    zh: 把行级来源信息置于表下，支持行级 dedup 与增量 ingest（按主键 upsert）。
    en: Places row-level source information under its table, supporting row-level dedup and incremental ingest (primary-key upsert).
    ja: row 級 source information を table 下に置き row 級 dedup/増分 ingest（PK upsert）を支援。
  includes:
    - zh: 纳入可由主键或复合键稳定定位的行快照。
      en: Includes row snapshots stably addressable by primary or composite key.
      ja: PK/複合键で安定 address 可能な row snapshot。
  excludes:
    - zh: 排除 DatabaseTable、无键聚合值与规范化 Document。
      en: Excludes DatabaseTable, unkeyed aggregates, and normalized Document.
      ja: DatabaseTable/unkeyed aggregate/normalized Document を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: DatabaseReader 返回的 Document metadata 常含 primary key 列；Moonweave 把 row_id 与 row_content_digest 建模为 DatabaseRow，NormalizationActivity 再产出 canonical Document。
    en: DatabaseReader Document metadata often includes primary-key columns; Moonweave models row_id and row_content_digest as DatabaseRow; NormalizationActivity then produces canonical Document.
    ja: DatabaseReader Document metadata に PK 列を含み得る。Moonweave は row_id/row_content_digest を DatabaseRow、NormalizationActivity が canonical Document 产出。
  typical_input:
    - description: SQL row result from DatabaseReader
      format: |
        Document(text="Clause 42: ...", metadata={"id": 42, "table": "public.clauses"})
      source_claims: [claim-database-row-llamaindex]
  typical_output:
    - description: Moonweave row information identity
      format: |
        {
          "row_id": "public.clauses:42",
          "row_content_digest": "sha256:row-42-v3",
          "table_id": "table-policy-clauses"
        }
      source_claims: [claim-database-row-design]
  reference_implementations:
    - name: LlamaIndex DatabaseReader
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Row-to-Document mapping from SQL results.
    - name: LangChain SQLDatabaseLoader
      url: https://reference.langchain.com/python/langchain-community/document_loaders/sql_database/SQLDatabaseLoader
      description: Row documents with table metadata.
structure:
  identity_keys: [row_id]
  fields:
    - id: row_id
      labels: {zh: 行标识, en: Row identifier, ja: row 識別子}
      definitions:
        zh: 主键或复合行键的稳定字符串表示。
        en: Stable string representation of primary or composite row key.
        ja: PK/複合 row key の安定 string 表現。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: public.clauses:42
      allowed_values: []
      source_claims: [claim-database-row-id]
    - id: table_id
      labels: {zh: 所属表标识, en: Containing table identifier, ja: 所属 table 識別子}
      definitions:
        zh: 包含该行的 DatabaseTable resource_id。
        en: DatabaseTable resource_id containing this row.
        ja: 当該 row を含む DatabaseTable resource_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: table-policy-clauses
      allowed_values: []
      source_claims: [claim-database-row-table]
    - id: row_content_digest
      labels: {zh: 行内容摘要, en: Row content digest, ja: row content digest}
      definitions:
        zh: 对该行读取列值序列化后计算的摘要。
        en: Digest computed over serialized column values read for this row.
        ja: 当該 row read 列値 serialize 後の digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:row-42-v3
      allowed_values: []
      source_claims: [claim-database-row-digest]
  constraints: []
  required_relations: []
examples:
  - id: DatabaseRow-example-llamaindex-row
    labels:
      zh: LlamaIndex 行映射
      en: LlamaIndex row mapping
      ja: LlamaIndex row mapping
    descriptions:
      zh: DatabaseReader 读取 id=42 行返回 Document(text=..., metadata={id:42})；Moonweave 建模 row_id=public.clauses:42、row_content_digest=v3，供 dedup 与增量 upsert。
      en: DatabaseReader reads row id=42 returning Document(text=..., metadata={id:42}); Moonweave models row_id=public.clauses:42, row_content_digest=v3 for dedup and incremental upsert.
      ja: DatabaseReader が id=42 row を Document 化。Moonweave は row_id=public.clauses:42、row_content_digest=v3 を dedup/増分 upsert 用に建模。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: row metadata
    field_values:
      row_id: public.clauses:42
      table_id: table-policy-clauses
      row_content_digest: sha256:row-42-v3
    related_node_ids: [DatabaseRow, DatabaseTable, Document]
    related_relation_ids: []
    source_claims: [claim-database-row-llamaindex]
  - id: DatabaseRow-example-incremental-upsert
    labels:
      zh: 行级增量 upsert
      en: Row-level incremental upsert
      ja: row 級増分 upsert
    descriptions:
      zh: 第二次 ingest 仅当 row_content_digest 变化时更新 document-clause-42；相同 row_id 不同 digest 触发 DeduplicationDecision outcome=update。
      en: Second ingest updates document-clause-42 only when row_content_digest changes; same row_id with different digest triggers DeduplicationDecision outcome=update.
      ja: 二回目 ingest は row_content_digest 変化時のみ document-clause-42 更新。同一 row_id で digest 異なれば DeduplicationDecision outcome=update。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: upsert handling
    field_values:
      row_id: public.clauses:42
      prior_digest: sha256:row-42-v2
      new_digest: sha256:row-42-v3
    related_node_ids: [DatabaseRow, DeduplicationDecision]
    related_relation_ids: []
    source_claims: [claim-database-row-design]
  - id: DatabaseRow-example-not-table
    labels:
      zh: 行非表
      en: Row is not table
      ja: row は table ではない
    descriptions:
      zh: table-policy-clauses 拥有 schema_digest 与表级 identity；单行 row 不能代表整表资源或 catalog。
      en: table-policy-clauses owns schema_digest and table-level identity; a single row cannot represent the whole table resource or catalog.
      ja: table-policy-clauses は schema_digest/table 級 identity を持つ。単 row は table resource/catalog 全体を代表不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DatabaseRow, DatabaseTable]
    related_relation_ids: []
    source_claims: [claim-database-row-design]
parent_relation:
  id: DatabaseRow-is_a-IngestibleInformation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入信息, en: is ingestible information, ja: 取込可能情報の一種}
  definitions:
    zh: DatabaseRow 种差为表内行键与行内容 digest，表示结构化来源信息而非资源容器。
    en: DatabaseRow differentia is in-table row key and row content digest as structured source information, not a resource container.
    ja: DatabaseRow 種差は table 内 row key/row content digest による structured source information。resource container ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-database-row-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-db
    title: LlamaIndex DatabaseReader
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: Row-level Document metadata.
  - id: src-langchain-sql
    title: LangChain SQLDatabaseLoader
    publisher: LangChain
    url: https://reference.langchain.com/python/langchain-community/document_loaders/sql_database/SQLDatabaseLoader
    source_type: official-doc
    relevance: Per-row document loading.
  - id: src-database-row-design
    title: Moonweave row information boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Row information under table resource.
source_claims:
  - id: claim-database-row-llamaindex
    source: src-llamaindex-db
    supports: DatabaseReader maps SQL rows to Documents with row metadata.
    locator: DatabaseDemo
    evidence_kind: official
    confidence: high
  - id: claim-database-row-design
    source: src-database-row-design
    supports: Row information is scoped under DatabaseTable, distinct from table resource entity.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-id
    source: src-database-row-design
    supports: row_id stabilizes row key within table scope.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-table
    source: src-database-row-design
    supports: table_id scopes row within DatabaseTable.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-digest
    source: src-database-row-design
    supports: row_content_digest binds row values for dedup and incremental ingest.
    locator: structure
    evidence_kind: design-inference
    confidence: high
