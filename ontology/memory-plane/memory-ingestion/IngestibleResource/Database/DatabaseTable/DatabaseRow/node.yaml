schema: moonweave.ai/ontology-node/v1
id: DatabaseRow
kind: concept
status: accepted
labels:
  zh: 数据库行快照
  en: Database Row Snapshot
  ja: データベース行スナップショット
semantics:
  short_definition:
    zh: 在一个固定 DatabaseTable 和快照中，由行键和规范化内容摘要标识的一条可摄入结构化行。
    en: One ingestible structured row identified by row key and normalized-content digest in a fixed DatabaseTable and snapshot.
    ja: 固定 DatabaseTable と snapshot 内で row key と normalized-content digest により識別される一つの ingestible structured row。
  definition:
    zh: DatabaseRow 是一个受控数据库读取所观察到的单行快照，属于其 table_ref 所指的 DatabaseTable，并由 row_id、row_key、snapshot_ref 和 content_digest 固定。它可以成为规范化活动的输入，但不是整个表、SQL 文本、完整结果集、聚合值、运行时 PGresult、数据库凭据、Document、MemoryRecord 或模型 Context。相同行键在新快照或内容摘要变化时产生新的行快照，不得改写旧行事实。
    en: DatabaseRow is a single-row snapshot observed by a controlled database read. It belongs to the DatabaseTable named by table_ref and is fixed by row_id, row_key, snapshot_ref, and content_digest. It can be input to normalization activity but is not the whole table, SQL text, complete result set, aggregate value, runtime PGresult, database credential, Document, MemoryRecord, or model Context. The same row key at a new snapshot or with changed content digest creates a new row snapshot and must not rewrite the older row fact.
    ja: DatabaseRow は制御された database read が観測した単一行 snapshot です。table_ref が名付ける DatabaseTable に属し、row_id、row_key、snapshot_ref、content_digest により固定されます。normalization activity の入力にはなれますが、table 全体、SQL text、完全 result set、aggregate value、runtime PGresult、database credential、Document、MemoryRecord、model Context ではありません。同じ row key でも新 snapshot または content digest 変更時には新しい row snapshot を作り、古い row fact を書き換えてはなりません。
  why_needed:
    zh: 行级来源让摄入可以追溯到精确的主键、表和可见性边界，并支持增量变更检测。它避免将表、查询集合或后续文档混为一条原始信息，也避免以更新后的内容覆盖旧快照的来源证据。
    en: Row-level provenance lets ingestion trace back to an exact key, table, and visibility boundary and supports incremental change detection. It avoids conflating a table, query set, or later document with one original information item and avoids replacing source evidence for an old snapshot with updated content.
    ja: row-level provenance により ingestion は正確な key、table、visibility boundary へ遡れ、incremental change detection を支えます。table、query set、後続 document を一つの原情報 item と混同せず、古い snapshot の source evidence を更新 content で置換しません。
  includes:
    - zh: 所属表引用、表内唯一的行键、读取快照、规范化行内容的算法标识摘要，以及稳定行快照标识。
      en: Owning-table reference, row key unique within that table, read snapshot, algorithm-tagged digest of normalized row content, and stable row-snapshot ID.
      ja: owning-table 参照、当該 table 内で一意の row key、read snapshot、normalized row content の algorithm-tagged digest、安定 row-snapshot ID。
  excludes:
    - zh: 活动读取的所有行、`count(*)` 等聚合、SQL 或绑定参数、结果句柄、表定义、秘密、生成文档和记忆条目。
      en: All rows read by an activity, an aggregate such as `count(*)`, SQL or bound parameters, result handle, table definition, secret, generated document, or memory entry.
      ja: 活動が読んだ全 row、`count(*)` などの aggregate、SQL や bound parameter、result handle、table definition、secret、生成 document、memory entry。
  semantic_kind: information
  aliases:
    - row source snapshot
    - keyed relational record
    - 行级摄入来源
engineering:
  explanation:
    zh: libpq 的 PQexecParams 接受单独的参数值，并返回 PGresult；SQL SELECT 从指定表读取匹配行。摄入器将返回列规范化、以 table_ref 与 row_key 绑定并计算 content_digest，随后才可由独立 NormalizationActivity 生成 Document。PGresult、查询参数和文档引用不能取代行快照身份；重复读 snapshot 使同一运行的可见数据边界可说明。
    en: libpq PQexecParams accepts parameter values separately and returns PGresult, while SQL SELECT reads matching rows from a specified table. An ingestor normalizes returned columns, binds them to table_ref and row_key, and computes content_digest; only then may a separate NormalizationActivity generate a Document. PGresult, query parameters, and document references cannot replace row-snapshot identity, and a repeatable-read snapshot makes the visibility boundary of one run explainable.
    ja: libpq の PQexecParams は parameter value を別々に受け取り PGresult を返し、SQL SELECT は指定 table から一致する row を読みます。ingestor は返却 column を normalize し、table_ref と row_key に結び付け content_digest を計算します。その後にだけ別の NormalizationActivity が Document を生成できます。PGresult、query parameter、document 参照は row-snapshot identity を置き換えられず、repeatable-read snapshot は一実行の visibility boundary を説明可能にします。
  typical_input:
    - description: Parameterized PostgreSQL single-row query
      format: |
        const char *values[1] = {"42"};
        PGresult *res = PQexecParams(
          conn,
          "SELECT id, rule_text FROM public.policy_rules WHERE id = $1",
          1,
          NULL,
          values,
          NULL,
          NULL,
          0
        );
    - description: Row-snapshot descriptor after normalization
      format: |
        {
          "row_id": "db-row-policy-rule-42-v7",
          "table_ref": "table-policy-rules",
          "row_key": "id=42",
          "snapshot_ref": "tx-snapshot-2026-07-18T00-00-00Z",
          "content_digest": "sha256-policy-rule-42-v7"
        }
  typical_output:
    - description: Separate normalized-document derivation request
      format: |
        {
          "input_row_ref": "db-row-policy-rule-42-v7",
          "normalization_activity_ref": "normalize-policy-rule-42",
          "output_document_ref": "document-policy-rule-42-v7"
        }
  reference_implementations:
    - name: PostgreSQL libpq command execution
      url: https://www.postgresql.org/docs/current/libpq-exec.html
      description: Documents PQexecParams parameterized command execution and PGresult output.
    - name: PostgreSQL SELECT
      url: https://www.postgresql.org/docs/current/sql-select.html
      description: Documents SELECT retrieving rows from a source table or view.
structure:
  identity_keys: [row_id, table_ref, snapshot_ref]
  fields:
    - id: row_id
      labels: {zh: 行快照标识, en: row-snapshot ID, ja: row-snapshot ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一条特定版本的来源行快照，不复用为裸行键、表、查询、结果或文档标识。
        en: Stably identifies one particular versioned source-row snapshot and is not reused as a bare row key, table, query, result, or document ID.
        ja: 特定 versioned source-row snapshot を安定して識別し、bare row key、table、query、result、document ID として再利用しません。
      allowed_values: []
      pattern: "^db-row-[A-Za-z0-9._-]+$"
      example_value: db-row-policy-rule-42-v7
      source_claims: [claim-database-row-identity]
    - id: table_ref
      labels: {zh: 所属表引用, en: owning table reference, ja: owning table 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向定义行键命名空间、列结构和来源容器的一个 DatabaseTable。
        en: Points to one DatabaseTable that defines the row-key namespace, column structure, and source container.
        ja: row-key namespace、column structure、source container を定義する一つの DatabaseTable を指します。
      allowed_values: []
      pattern: "^table-[A-Za-z0-9._-]+$"
      example_value: table-policy-rules
      source_claims: [claim-database-row-composition]
    - id: row_key
      labels: {zh: 行键, en: row key, ja: row key}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在 table_ref 和 snapshot_ref 范围内唯一定位行的主键或复合键表示，不能脱离表作为全局身份。
        en: Primary-key or composite-key representation locating the row uniquely within table_ref and snapshot_ref and cannot serve as global identity without the table.
        ja: table_ref と snapshot_ref 内で行を一意に位置付ける primary-key または composite-key 表現であり、table なしに global identity にはなれません。
      allowed_values: []
      pattern: null
      example_value: id=42
      source_claims: [claim-database-row-query]
    - id: snapshot_ref
      labels: {zh: 快照引用, en: snapshot reference, ja: snapshot 参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 固定观察到该行值时的表数据可见性边界，而不是行更新时间或文档生成时间。
        en: Pins the table-data visibility boundary at which the row value was observed and is not the row update time or document-generation time.
        ja: row value が観測された table-data visibility boundary を固定し、row update time や document-generation time ではありません。
      allowed_values: []
      pattern: "^tx-snapshot-[A-Za-z0-9._-]+$"
      example_value: tx-snapshot-2026-07-18T00-00-00Z
      source_claims: [claim-database-row-snapshot]
    - id: content_digest
      labels: {zh: 行内容摘要, en: row-content digest, ja: row-content digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 对规范化列值计算的算法标识摘要，用于验证该行快照内容，不代表整个表或查询结果。
        en: Algorithm-tagged digest calculated from normalized column values to verify this row-snapshot content and not the whole table or query result.
        ja: normalized column value から計算する algorithm-tagged digest で、この row-snapshot content を検証し、table 全体や query result を表しません。
      allowed_values: []
      pattern: "^sha256-[A-Za-z0-9._-]+$"
      example_value: sha256-policy-rule-42-v7
      source_claims: [claim-database-row-identity]
    - id: projected_column_refs
      labels: {zh: 已投影列引用, en: projected column references, ja: projection 済み column 参照}
      datatype: array
      required: false
      cardinality: {min: 0, max: null}
      definitions:
        zh: 可选地列出构成规范化行内容的表列引用；它不能保存未经控制的秘密值或完整查询文本。
        en: Optionally lists table-column references contributing to normalized row content; it cannot store uncontrolled secret values or full query text.
        ja: normalized row content に寄与する table-column 参照を任意で列挙し、制御されない secret value や完全 query text を保存できません。
      allowed_values: []
      pattern: null
      example_value: [id, rule_text, active]
      source_claims: [claim-database-row-query]
  constraints:
    - id: database-row-keyed-snapshot-identity
      severity: error
      expression_language: plain
      expression: row_id, table_ref, row_key, snapshot_ref, and content_digest are required. row_key must resolve to one row in table_ref at snapshot_ref, and content_digest must be calculated from the declared projection under a stable normalization method. The same row_key with a new snapshot_ref or different content_digest requires a new row snapshot.
      explanation:
        zh: 行身份必须同时绑定表、键、可见性与内容；仅靠主键不能安全地合并跨快照信息。
        en: Row identity must bind table, key, visibility, and content together; a primary key alone cannot safely merge cross-snapshot information.
        ja: row identity は table、key、visibility、content を共に束縛し、primary key だけでは cross-snapshot information を安全に併合できません。
      source_claims: [claim-database-row-query, claim-database-row-snapshot]
    - id: database-row-activity-and-document-boundary
      severity: error
      expression_language: plain
      expression: DatabaseRow must not assert the full query, bound parameter values, runtime PGresult, run timestamps, or output_document_ref as its own identity fields. Query execution belongs to IngestionRun and document creation belongs to a separate normalization or generation activity.
      explanation:
        zh: 行快照是来源实体，不是查询执行记录或生成文档的替代品。
        en: A row snapshot is a source entity, not a query-execution record or substitute for its generated document.
        ja: row snapshot は source entity であり、query-execution record や生成 document の代用品ではありません。
      source_claims: [claim-database-row-libpq-output, claim-database-row-prov-separation]
  required_relations: []
examples:
  - id: database-row-example-positive-policy-rule-42

    labels: {zh: 政策规则第 42 行快照, en: Policy-rule row 42 snapshot, ja: policy-rule row 42 snapshot}

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      row_id: db-row-policy-rule-42-v7
      table_ref: table-policy-rules
      row_key: id=42
      snapshot_ref: tx-snapshot-2026-07-18T00-00-00Z
      content_digest: sha256-policy-rule-42-v7
      projected_column_refs: [id, rule_text, active]
    related_node_ids: [DatabaseRow, DatabaseTable, Database]
    related_relation_ids: [DatabaseRow-part_of-DatabaseTable]

    source_claims: [claim-database-row-identity, claim-database-row-composition]
  - id: database-row-example-counterexample-aggregate

    labels: {zh: 聚合计数不是单行, en: Aggregate count is not one row, ja: aggregate count は単一 row ではない}

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      query_id: count-active-rules
      aggregate_value: 128
      table_ref: table-policy-rules
      row_key: null
      content_digest: null
    related_node_ids: [DatabaseRow, DatabaseTable, IngestionRun]
    related_relation_ids: []

    source_claims: [claim-database-row-query]
  - id: database-row-example-boundary-same-key-new-snapshot

    labels: {zh: 同一键在新快照中变化, en: Same key changes in new snapshot, ja: 新 snapshot で同じ key が変化する}

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      row_id: db-row-policy-rule-42-v8
      table_ref: table-policy-rules
      row_key: id=42
      snapshot_ref: tx-snapshot-2026-07-19T00-00-00Z
      content_digest: sha256-policy-rule-42-v8
      projected_column_refs: [id, rule_text, active]
    related_node_ids: [DatabaseRow, DatabaseTable]
    related_relation_ids: [DatabaseRow-part_of-DatabaseTable]

    source_claims: [claim-database-row-snapshot, claim-database-row-identity]
  - id: database-row-example-instance-policy-rule-42-v7

    labels: {zh: "实例：政策规则 42 v7", en: "Instance: policy rule 42 v7", ja: "インスタンス：policy rule 42 v7"}

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      row_id: db-row-policy-rule-42-v7
      table_ref: table-policy-rules
      row_key: id=42
      snapshot_ref: tx-snapshot-2026-07-18T00-00-00Z
      content_digest: sha256-policy-rule-42-v7
      projected_column_refs: [id, rule_text, active]
    related_node_ids: [DatabaseRow, DatabaseTable, IngestionRun, Document]
    related_relation_ids: [DatabaseRow-part_of-DatabaseTable]

    source_claims: [claim-database-row-prov-separation, claim-database-row-composition]
parent_relation:
  id: DatabaseRow-part_of-DatabaseTable
  predicate: part_of
  target: concept:DatabaseTable
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是数据库表来源的行组成部分
    en: is a row component of database table source
    ja: database table source の row 構成要素である
  definitions:
    zh: DatabaseRow —part_of→ DatabaseTable 表示该行快照只在 table_ref 所指表的键命名空间、模式和 snapshot 范围内作为成员解析。
    en: DatabaseRow —part_of→ DatabaseTable means the row snapshot is resolved as a member only within the key namespace, schema, and snapshot scope of the table named by table_ref.
    ja: DatabaseRow —part_of→ DatabaseTable は、row snapshot が table_ref の名付ける table の key namespace、schema、snapshot scope 内でのみ member として解決されることを表します。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_row_component
    labels: {zh: 具有行组成部分, en: has row component, ja: row 構成要素を持つ}
  conditions:
    - id: database-row-part-of-table-condition
      severity: error
      expression_language: plain
      expression: Assert only when table_ref resolves to the target DatabaseTable and row_key resolves to one row under that table's schema at snapshot_ref. A query result, aggregate, SQL statement, result handle, secret, or generated Document does not establish row composition.
      explanation:
        zh: 行成员性需要表范围、键解析和同一快照的证据，而不是存在某个查询或文档。
        en: Row membership needs evidence of table scope, key resolution, and the same snapshot, not merely existence of a query or document.
        ja: row membership には table scope、key resolution、同一 snapshot の evidence が必要で、query や document の存在だけでは足りません。
      source_claims: [claim-database-row-composition]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-database-row-composition]
  distinct_fact_rationale:
    zh: 此关系表达固定行快照的表成员性，不表达查询执行、完整结果集、文档生成或记忆持久化。
    en: This relation expresses table membership of a pinned row snapshot, not query execution, a complete result set, document generation, or memory persistence.
    ja: この関係は固定 row snapshot の table membership を表し、query execution、完全 result set、document generation、memory persistence を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: postgres-libpq-exec
    title: PostgreSQL libpq command execution
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/libpq-exec.html
    relevance: Documents PQexecParams parameterized command execution and PGresult output.
  - id: postgres-select
    title: PostgreSQL SELECT
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/sql-select.html
    relevance: Documents SELECT retrieving rows from a source table or view.
  - id: postgres-transaction-isolation
    title: PostgreSQL transaction isolation
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/transaction-iso.html
    relevance: Documents stable Repeatable Read transaction snapshots.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines entity, activity, usage, generation, and derivation distinctions for provenance.
source_claims:
  - id: claim-database-row-libpq-output
    source: postgres-libpq-exec
    supports: PostgreSQL documents PQexecParams with separate parameter values and PGresult command output. Moonweave keeps the runtime result and bound parameters in execution evidence rather than treating either as row-snapshot identity.
    locator: "PQexecParams and PGresult"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-row-query
    source: postgres-select
    supports: PostgreSQL documents SELECT retrieving rows from source tables or views. Moonweave models one keyed, snapshot-pinned returned row separately from a complete result set or aggregate.
    locator: "SELECT command synopsis and FROM clause"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-row-snapshot
    source: postgres-transaction-isolation
    supports: PostgreSQL documents a stable transaction snapshot for Repeatable Read. Moonweave uses snapshot_ref to distinguish otherwise identical row keys observed at different visibility boundaries.
    locator: "Repeatable Read isolation level"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-row-prov-separation
    source: w3c-prov-o
    supports: PROV-O distinguishes source entities, activities that use them, and generated entities. Moonweave therefore keeps a DatabaseRow separate from an ingestion query and a later normalized Document.
    locator: "PROV-O Entity, Activity, usage, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-row-identity
    source: w3c-prov-o
    supports: Identifying a source-row snapshot by table, key, snapshot, and content digest is a Moonweave design inference that preserves independent identity across source revisions.
    locator: "PROV-O Entity and derivation"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-database-row-composition
    source: postgres-select
    supports: SELECT retrieves rows from a named source table or view. Moonweave models a keyed row snapshot resolving in one fixed DatabaseTable and snapshot as a composition component of that table source, rather than as a subtype of the table.
    locator: "SELECT FROM clause and row retrieval"
    evidence_kind: ontology-design-inference
    confidence: high
