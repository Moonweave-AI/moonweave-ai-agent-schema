    source: eng-fw-langchain-document-loaders
    supports: LangChain database loaders operationally expose row-level structured data; Moonweave binds each row to its containing table and content version.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-row-002
    source: eng-fw-langchain-document-loaders
    supports: DatabaseRow.row_id records stable row identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-row-003
    source: eng-fw-langchain-document-loaders
    supports: DatabaseRow.row_digest records exact structured-information version; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-row-004
    source: eng-fw-langchain-document-loaders
    supports: Database loaders convert selected query rows into normalized Document-like information.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-row-005
    source: eng-fw-langchain-document-loaders
    supports: Relational query semantics distinguish base rows from aggregate result values.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-row-006
    source: eng-fw-langchain-document-loaders
    supports: Database loader semantics distinguish the selected table/query scope from each returned row.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
