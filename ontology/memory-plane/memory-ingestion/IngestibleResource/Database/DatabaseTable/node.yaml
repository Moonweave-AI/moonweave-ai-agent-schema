schema: moonweave.ai/ontology-node/v1
id: DatabaseTable
kind: concept
status: accepted
labels:
  zh: 数据库表来源
  en: Database Table Source
  ja: データベーステーブル情報源
semantics:
  short_definition:
    zh: 在一个已标识 Database 和快照内、由 schema 与表名及模式指纹定位的可摄入关系来源。
    en: An ingestible relational source located in one identified Database and snapshot by schema and table name plus schema fingerprint.
    ja: 一つの識別済み Database と snapshot 内で schema と table 名および schema fingerprint により位置付ける ingestible relational source。
  definition:
    zh: DatabaseTable 是由一个 Database 承载的关系表来源。它以 table_id、database_ref、schema_name、table_name、schema_fingerprint 和 snapshot_ref 固定表结构及其来源范围，可作为 IngestionRun 中受控 SELECT 的输入，并可包含对应的 DatabaseRow 快照。它不是整个 Database、运行时 SQL 文本、一次 SELECT 的结果集、单个行、索引、连接对象、Document 或持久记忆。
    en: DatabaseTable is a relational table source hosted by one Database. table_id, database_ref, schema_name, table_name, schema_fingerprint, and snapshot_ref fix its structure and source scope. It can be input to a controlled SELECT in an IngestionRun and can contain corresponding DatabaseRow snapshots. It is not the whole Database, runtime SQL text, result set of one SELECT, one row, index, connection object, Document, or persistent memory.
    ja: DatabaseTable は一つの Database が host する relational table source です。table_id、database_ref、schema_name、table_name、schema_fingerprint、snapshot_ref が構造と source scope を固定します。IngestionRun で制御された SELECT の入力になり、対応する DatabaseRow snapshot を含めます。Database 全体、runtime SQL text、一回の SELECT の result set、一行、index、connection object、Document、永続記憶ではありません。
  why_needed:
    zh: 一个目录内的多个表可有不同的模式、权限、选择条件和变更节奏。表级来源身份让摄入过程精确说明读取了哪个关系结构和哪个快照，避免把查询输出或单行信息泛化成整个表。
    en: Multiple tables in one catalog can have different schemas, permissions, selection conditions, and change cadence. Table-level source identity lets ingestion state exactly which relational structure and snapshot it read without generalizing a query output or one row into the whole table.
    ja: 一つの catalog 内の複数 table は異なる schema、permission、selection condition、change cadence を持ち得ます。table-level source identity により、ingestion はどの relational structure と snapshot を読んだかを正確に述べ、query output や一行を table 全体へ一般化しません。
  includes:
    - zh: 所属数据库引用、PostgreSQL schema 和表名、模式指纹，以及与数据库来源相一致的 snapshot 引用。
      en: Owning-database reference, PostgreSQL schema and table name, schema fingerprint, and snapshot reference consistent with the database source.
      ja: owning-database 参照、PostgreSQL schema と table 名、schema fingerprint、database source と整合する snapshot 参照。
  excludes:
    - zh: "`SELECT ...` 字符串、返回行集、表中某行、表索引、实时连接、访问秘密和后续生成的文档。"
      en: "A `SELECT ...` string, returned row set, one row in the table, table index, live connection, access secret, or later generated document."
      ja: "`SELECT ...` string、返却 row set、table 内の一行、table index、live connection、access secret、後続生成 document。"
  semantic_kind: entity
  aliases:
    - ingestible table
    - relational source table
    - 表级摄入源
engineering:
  explanation:
    zh: PostgreSQL 的 SELECT 从 FROM 子句中的表或视图读取行，schema-qualified 名称可区分同名关系。摄入配置将 DatabaseTable 的无秘密定位和模式指纹解析为允许读取的表；实际查询、参数、返回行和行数由 IngestionRun 保存。模式变更时，应建立新的表快照或修订记录，而非无声改写旧表来源。
    en: PostgreSQL SELECT reads rows from tables or views named in FROM, and schema-qualified names distinguish same-named relations. Ingestion configuration resolves the DatabaseTable locator and schema fingerprint to an allowed table; the actual query, parameters, returned rows, and row count belong to IngestionRun. A schema change requires a new table snapshot or revision record rather than silent rewriting of an old source table.
    ja: PostgreSQL SELECT は FROM に名付けた table または view から row を読み、schema-qualified 名は同名 relation を区別します。ingestion configuration は DatabaseTable locator と schema fingerprint を許可された table に解決し、実際の query、parameter、返却 row、row count は IngestionRun に属します。schema change は旧 source table を黙って書き換えず、新しい table snapshot または revision record を必要とします。
  typical_input:
    - description: PostgreSQL table read statement
      format: |
        SELECT id, rule_text
        FROM public.policy_rules
        WHERE active = true
        ORDER BY id;
    - description: Snapshot-pinned table descriptor
      format: |
        {
          "table_id": "table-policy-rules",
          "database_ref": "db-policy",
          "schema_name": "public",
          "table_name": "policy_rules",
          "schema_fingerprint": "sha256-policy-rules-columns-v3",
          "snapshot_ref": "tx-snapshot-2026-07-18T00-00-00Z"
        }
  typical_output:
    - description: Separate table-read observation
      format: |
        {
          "table_ref": "table-policy-rules",
          "ingestion_run_ref": "ingest-read-policy-4",
          "query_ref": "query-policy-rules-active",
          "rows_read": 128,
          "row_refs": ["db-row-policy-rule-42-v7"]
        }
  reference_implementations:
    - name: PostgreSQL SELECT
      url: https://www.postgresql.org/docs/current/sql-select.html
      description: Documents SELECT and the FROM clause identifying source tables or views.
    - name: PostgreSQL schemas
      url: https://www.postgresql.org/docs/current/ddl-schemas.html
      description: Documents schemas and schema-qualified naming of database objects.
structure:
  identity_keys: [table_id, snapshot_ref]
  fields:
    - id: table_id
      labels: {zh: 表来源标识, en: table-source ID, ja: table-source ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个表来源系列，不复用为数据库、行、查询或读取运行标识。
        en: Stably identifies a table-source series and is not reused as a database, row, query, or read-run ID.
        ja: table-source 系列を安定して識別し、database、row、query、read-run ID として再利用しません。
      allowed_values: []
      pattern: "^table-[A-Za-z0-9._-]+$"
      example_value: table-policy-rules
      source_claims: [claim-database-table-identity]
    - id: database_ref
      labels: {zh: 所属数据库引用, en: owning database reference, ja: owning database 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 引用承载此表目录和连接边界的一个 Database，不可引用结果集或运行时连接。
        en: References one Database that hosts this table catalog and connection boundary and cannot reference a result set or live connection.
        ja: この table catalog と connection boundary を host する一つの Database を参照し、result set や live connection を参照できません。
      allowed_values: []
      pattern: "^db-[A-Za-z0-9._-]+$"
      example_value: db-policy
      source_claims: [claim-database-table-composition]
    - id: schema_name
      labels: {zh: 模式名, en: schema name, ja: schema 名}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指定表所在的数据库 schema，用于在同一目录中消歧同名表；它不是模式内容摘要。
        en: Names the database schema containing the table to disambiguate same-named tables in one catalog and is not a digest of schema content.
        ja: 一つの catalog 内の同名 table を区別するため table を含む database schema を名付け、schema content の digest ではありません。
      allowed_values: []
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      example_value: public
      source_claims: [claim-database-table-qualified-name]
    - id: table_name
      labels: {zh: 表名, en: table name, ja: table 名}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指定所属 schema 中的关系表名；它不是完整 SQL 语句或表的显示标题。
        en: Names the relation table within its schema and is not a complete SQL statement or display title of the table.
        ja: 所属 schema 内の relation table を名付け、完全な SQL statement や table の display title ではありません。
      allowed_values: []
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      example_value: policy_rules
      source_claims: [claim-database-table-qualified-name]
    - id: schema_fingerprint
      labels: {zh: 模式指纹, en: schema fingerprint, ja: schema fingerprint}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识列名、类型和约束的规范化指纹，用于检测结构变更，不是任意行内容或查询输出摘要。
        en: Identifies a normalized fingerprint of column names, types, and constraints for detecting structural change and is not one row's content or query-output digest.
        ja: structural change の検出用に column 名、type、constraint の正規化 fingerprint を識別し、一行 content や query-output digest ではありません。
      allowed_values: []
      pattern: "^sha256-[A-Za-z0-9._-]+$"
      example_value: sha256-policy-rules-columns-v3
      source_claims: [claim-database-table-identity]
    - id: snapshot_ref
      labels: {zh: 快照引用, en: snapshot reference, ja: snapshot 参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 固定表成员与模式被摄入时的数据可见性边界；它需与 database_ref 所用来源读边界一致。
        en: Pins the data-visibility boundary at which table members and schema are ingested and must match the source-read boundary used by database_ref.
        ja: table member と schema が ingest される data-visibility boundary を固定し、database_ref が使う source-read boundary と一致しなければなりません。
      allowed_values: []
      pattern: "^tx-snapshot-[A-Za-z0-9._-]+$"
      example_value: tx-snapshot-2026-07-18T00-00-00Z
      source_claims: [claim-database-table-snapshot]
  constraints:
    - id: database-table-resolves-within-database
      severity: error
      expression_language: plain
      expression: table_id, database_ref, schema_name, table_name, schema_fingerprint, and snapshot_ref are required. The qualified relation formed by schema_name and table_name must resolve in database_ref at snapshot_ref, and the schema fingerprint must describe that relation. A SQL string, row, query result, index, secret, connection, or Document cannot substitute for table identity.
      explanation:
        zh: 表来源必须把目录容器、关系名称、结构和可见性边界同时固定。
        en: A table source must pin catalog container, relation name, structure, and visibility boundary together.
        ja: table source は catalog container、relation 名、structure、visibility boundary を同時に固定しなければなりません。
      source_claims: [claim-database-table-qualified-name, claim-database-table-snapshot]
    - id: database-table-execution-boundary
      severity: error
      expression_language: plain
      expression: DatabaseTable must not assert SQL parameters, returned row count, row_refs actually read, or generated document_refs. Those are facts of a separate IngestionRun and its subsequent normalization activity.
      explanation:
        zh: 表定义可被读取，但不能以自身替代读取活动或其生成物。
        en: A table definition can be read but cannot replace the read activity or its outputs.
        ja: table definition は読まれ得ますが、read activity やその output を置き換えられません。
      source_claims: [claim-database-table-select-output, claim-database-table-prov-separation]
  required_relations: []
examples:
  - id: database-table-example-positive-policy-rules

    labels: {zh: 政策规则表来源, en: Policy-rules table source, ja: policy-rules table source}

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      table_id: table-policy-rules
      database_ref: db-policy
      schema_name: public
      table_name: policy_rules
      schema_fingerprint: sha256-policy-rules-columns-v3
      snapshot_ref: tx-snapshot-2026-07-18T00-00-00Z
    related_node_ids: [DatabaseTable, Database, DatabaseRow]
    related_relation_ids: [DatabaseTable-part_of-Database]

    source_claims: [claim-database-table-identity, claim-database-table-composition]
  - id: database-table-example-counterexample-result-set

    labels: {zh: 返回行集不是表来源, en: Returned row set is not a table source, ja: 返却 row set は table source ではない}

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      query_id: query-policy-rules-active
      row_count: 128
      table_id: null
      schema_fingerprint: null
    related_node_ids: [DatabaseTable, IngestionRun, DatabaseRow]
    related_relation_ids: []

    source_claims: [claim-database-table-select-output]
  - id: database-table-example-boundary-schema-change

    labels: {zh: 模式变化的新表快照, en: New table snapshot after schema change, ja: schema change 後の新 table snapshot}

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      table_id: table-policy-rules
      database_ref: db-policy
      schema_name: public
      table_name: policy_rules
      schema_fingerprint: sha256-policy-rules-columns-v4
      snapshot_ref: tx-snapshot-2026-07-19T00-00-00Z
    related_node_ids: [DatabaseTable, Database, IngestionRun]
    related_relation_ids: [DatabaseTable-part_of-Database]

    source_claims: [claim-database-table-snapshot]
  - id: database-table-example-instance-policy-rules-v3

    labels: {zh: "实例：policy_rules v3", en: "Instance: policy_rules v3", ja: "インスタンス：policy_rules v3"}

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      table_id: table-policy-rules
      database_ref: db-policy
      schema_name: public
      table_name: policy_rules
      schema_fingerprint: sha256-policy-rules-columns-v3
      snapshot_ref: tx-snapshot-2026-07-18T00-00-00Z
    related_node_ids: [DatabaseTable, Database, IngestionRun]
    related_relation_ids: [DatabaseTable-part_of-Database]

    source_claims: [claim-database-table-composition, claim-database-table-prov-separation]
parent_relation:
  id: DatabaseTable-part_of-Database
  predicate: part_of
  target: concept:Database
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是数据库来源的表组成部分
    en: is a table component of database source
    ja: database source の table 構成要素である
  definitions:
    zh: DatabaseTable —part_of→ Database 表示该表仅在 database_ref 所指来源目录和一致性边界内被解析为表来源。
    en: DatabaseTable —part_of→ Database means the table is resolved as a source table only within the catalog and consistency boundary named by database_ref.
    ja: DatabaseTable —part_of→ Database は、table が database_ref の名付ける catalog と consistency boundary 内でのみ source table として解決されることを表します。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_table_component
    labels: {zh: 具有表组成部分, en: has table component, ja: table 構成要素を持つ}
  conditions:
    - id: database-table-part-of-database-condition
      severity: error
      expression_language: plain
      expression: Assert only when database_ref resolves to the target Database and schema_name plus table_name resolve in its catalog at snapshot_ref. A query output, SQL string, row, index, secret, or connection profile alone does not establish composition.
      explanation:
        zh: 表成员性取决于目录解析和快照一致性，而非一次查询返回或共享连接配置。
        en: Table membership depends on catalog resolution and snapshot consistency, not one query return or a shared connection profile.
        ja: table membership は catalog resolution と snapshot consistency に依存し、一回の query return や共有 connection profile には依存しません。
      source_claims: [claim-database-table-composition]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-database-table-composition]
  distinct_fact_rationale:
    zh: 此关系表达表的来源容器，不表达表已读、行已产生、查询已执行或文档已生成。
    en: This relation expresses the source container of a table, not that it was read, rows were produced, a query executed, or documents generated.
    ja: この関係は table の source container を表し、read、row 生成、query 実行、document 生成を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: postgres-select
    title: PostgreSQL SELECT
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/sql-select.html
    relevance: Documents SELECT and source tables or views named in the FROM clause.
  - id: postgres-schemas
    title: PostgreSQL schemas
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/ddl-schemas.html
    relevance: Documents schemas, namespaces, and schema-qualified object names.
  - id: postgres-transaction-isolation
    title: PostgreSQL transaction isolation
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/transaction-iso.html
    relevance: Documents stable visibility snapshots for Repeatable Read transactions.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines separate entities, activities, and generated output for provenance modeling.
source_claims:
  - id: claim-database-table-qualified-name
    source: postgres-schemas
    supports: PostgreSQL documents schemas as namespaces and schema-qualified names for objects. Moonweave records schema_name and table_name separately so a table source is distinguishable without storing executable SQL as identity.
    locator: "Schemas and schema-qualified object names"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-table-select-output
    source: postgres-select
    supports: PostgreSQL documents SELECT reading rows from source tables or views named in FROM. Moonweave treats the returned row set as activity output instead of a table-source identity.
    locator: "SELECT command synopsis and FROM clause"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-table-snapshot
    source: postgres-transaction-isolation
    supports: PostgreSQL documents that Repeatable Read gives a stable transaction snapshot. Moonweave uses snapshot_ref and schema_fingerprint to delimit one reproducible table-source view, while treating revision linkage as a local design choice.
    locator: "Repeatable Read isolation level"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-table-prov-separation
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities that use them and output entities. Moonweave keeps a DatabaseTable separate from IngestionRun, returned rows, and later documents.
    locator: "PROV-O Entity, Activity, usage, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-table-identity
    source: w3c-prov-o
    supports: Identifying a table source by its database, schema, table name, schema fingerprint, and snapshot is a Moonweave design inference that preserves independently identifiable source structure.
    locator: "PROV-O Entity"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-database-table-composition
    source: postgres-schemas
    supports: A relation table resolves within a PostgreSQL database schema namespace. Moonweave models a snapshot-pinned DatabaseTable as a composition component of the Database whose catalog resolves it, not as a subtype of Database.
    locator: "Schemas as namespaces for database objects"
    evidence_kind: ontology-design-inference
    confidence: high
