    locator: DatabaseDemo
    evidence_kind: official
    confidence: high
  - id: claim-database-table-langchain
    source: src-langchain-sql
    supports: SQLDatabaseLoader loads documents from named database tables.
    locator: SQLDatabaseLoader
    evidence_kind: official
    confidence: high
  - id: claim-database-table-design
    source: src-database-table-design
    supports: Table resource scoped by catalog differs from Database catalog resource.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-table-id
    source: src-database-table-design
    supports: resource_id identifies table resource lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-table-db
    source: src-database-table-design
    supports: database_id scopes table within Database catalog.
    locator: structure
