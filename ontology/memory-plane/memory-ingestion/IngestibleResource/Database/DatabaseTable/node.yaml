schema: moonweave.ai/ontology-node/v1
id: DatabaseTable
kind: concept
labels:
  zh: 数据库表
  en: Database table
  ja: データベーステーブル
semantics:
  short_definition:
    zh: 数据库内由限定表名与 schema 标识并包含行的表资源。
    en: Table resource in a database identified by qualified name and schema, containing rows.
    ja: database 内で qualified name/schema により識別し row を含む table resource。
  definition:
    zh: DatabaseTable 是属于 Database、由 schema-qualified table name 与 schema digest 标识并包含 DatabaseRow 的 IngestibleResource 实体；LlamaIndex DatabaseReader 以 query 或 table 参数读取；它不是 Database catalog 或 ad-hoc 查询结果集。
    en: DatabaseTable is an IngestibleResource entity belonging to Database, identified by schema-qualified table name and schema digest and containing DatabaseRow values; LlamaIndex DatabaseReader reads via query or table parameters; it is not the Database catalog or an ad-hoc query result set.
    ja: DatabaseTable は Database に属し schema-qualified table name/schema digest で識別して DatabaseRow を含む IngestibleResource entity。LlamaIndex DatabaseReader が query/table 参数で read。Database catalog/ad-hoc query result set ではない。
  why_needed:
    zh: 把表级来源从 catalog 级 Database 分离，支持按表 ingest 策略与 schema 版本审计。
    en: Separates table-level sources from catalog-level Database, supporting per-table ingest policy and schema-version audit.
    ja: table 級 source を catalog 級 Database から分離し table 別 ingest policy/schema 版 audit を支援。
  includes:
    - zh: 纳入有稳定限定名与 schema 版本的物理表或物化视图。
      en: Includes physical tables or materialized views with stable qualified names and schema versions.
      ja: 安定 qualified name/schema 版を持つ physical table/materialized view。
  excludes:
    - zh: 排除 Database、DatabaseRow 与临时查询视图。
      en: Excludes Database, DatabaseRow, and transient query views.
      ja: Database・DatabaseRow・一時 query view を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: DatabaseReader.load_data(query="SELECT * FROM public.clauses") 或 LangChain SQLDatabaseLoader 按表加载；Moonweave 用 qualified_table_name 与 schema_digest 固定表版本，行级信息为 DatabaseRow。
    en: DatabaseReader.load_data(query="SELECT * FROM public.clauses") or LangChain SQLDatabaseLoader loads per table; Moonweave fixes table version with qualified_table_name and schema_digest; row-level information is DatabaseRow.
    ja: DatabaseReader.load_data または LangChain SQLDatabaseLoader が table 単位 load。Moonweave は qualified_table_name/schema_digest で table 版固定。row 級は DatabaseRow。
  typical_input:
    - description: LlamaIndex table query load
      format: |
        reader.load_data(query="SELECT id, body FROM public.clauses WHERE active=true")
      source_claims: [claim-database-table-llamaindex]
  typical_output:
    - description: Moonweave table resource identity
      format: |
        {
          "resource_id": "table-policy-clauses",
          "qualified_table_name": "public.clauses",
          "schema_digest": "sha256:schema-v4"
        }
      source_claims: [claim-database-table-design]
  reference_implementations:
    - name: LlamaIndex DatabaseReader
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: SQL query and table loading.
    - name: LangChain SQLDatabaseLoader
      url: https://reference.langchain.com/python/langchain-community/document_loaders/sql_database/SQLDatabaseLoader
      description: Table-scoped SQL document loading.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识数据库表资源。
        en: Stable identifier for database table resource.
        ja: database table resource の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: table-policy-clauses
      allowed_values: []
      source_claims: [claim-database-table-id]
    - id: database_id
      labels: {zh: 所属数据库标识, en: Containing database identifier, ja: 所属 database 識別子}
      definitions:
        zh: 包含该表的 Database resource_id。
        en: Database resource_id containing this table.
        ja: 当該 table を含む Database resource_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: db-policy
      allowed_values: []
      source_claims: [claim-database-table-db]
    - id: qualified_table_name
      labels: {zh: 限定表名, en: Qualified table name, ja: qualified table name}
      definitions:
        zh: schema.table 形式的稳定表名。
        en: Stable table name in schema.table form.
        ja: schema.table 形式の安定 table name。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: public.clauses
      allowed_values: []
      source_claims: [claim-database-table-name]
    - id: schema_digest
      labels: {zh: Schema 摘要, en: Schema digest, ja: schema digest}
      definitions:
        zh: 对该表 schema 版本（列定义）计算的摘要。
        en: Digest over this table schema version (column definitions).
        ja: 当該 table schema 版（列定義）の digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:schema-clauses-v4
      allowed_values: []
      source_claims: [claim-database-table-schema]
  constraints: []
  required_relations: []
examples:
  - id: DatabaseTable-example-llamaindex-query
    labels:
      zh: LlamaIndex 表查询加载
      en: LlamaIndex table query load
      ja: LlamaIndex table query load
    descriptions:
      zh: ingest-run-17 对 table-policy-clauses（public.clauses）执行 SELECT，schema_digest=v4；每行映射为 DatabaseRow 再规范化为 Document。
      en: ingest-run-17 runs SELECT on table-policy-clauses (public.clauses) with schema_digest=v4; each row maps to DatabaseRow then normalizes to Document.
      ja: ingest-run-17 が table-policy-clauses（public.clauses）に SELECT 実行、schema_digest=v4。各行 DatabaseRow→Document 正規化。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: load_data query
    field_values:
      resource_id: table-policy-clauses
      qualified_table_name: public.clauses
      schema_digest: sha256:schema-clauses-v4
    related_node_ids: [DatabaseTable, DatabaseRow]
    related_relation_ids: []
    source_claims: [claim-database-table-llamaindex]
  - id: DatabaseTable-example-langchain-sql
    labels:
      zh: LangChain SQL 表加载
      en: LangChain SQL table load
      ja: LangChain SQL table load
    descriptions:
      zh: SQLDatabaseLoader 绑定 db-policy 连接并加载 public.clauses；返回 LangChain Document(page_content, metadata) 列表，metadata 含 table 与 row 键。
      en: SQLDatabaseLoader binds db-policy connection and loads public.clauses; returns LangChain Document(page_content, metadata) list with table and row keys in metadata.
      ja: SQLDatabaseLoader が db-policy 接続で public.clauses を load。LangChain Document 列表返却、metadata に table/row key。
    example_source:
      product: LangChain
      url: https://reference.langchain.com/python/langchain-community/document_loaders/sql_database/SQLDatabaseLoader
      version: SQLDatabaseLoader
    field_values:
      loader: SQLDatabaseLoader
      qualified_table_name: public.clauses
    related_node_ids: [DatabaseTable, DocumentLoader, Document]
    related_relation_ids: []
    source_claims: [claim-database-table-langchain]
  - id: DatabaseTable-example-not-database
    labels:
      zh: 表非数据库
      en: Table is not database
      ja: table は database ではない
    descriptions:
      zh: db-policy 拥有 catalog 级 connection_identity 与多表容器；table-policy-clauses 只在 db-policy 范围内成立——不可把单表当作完整 Database。
      en: db-policy owns catalog-level connection_identity and multi-table container; table-policy-clauses is valid only within db-policy scope—a single table is not the full Database.
      ja: db-policy は catalog 級 connection_identity/複数 table container。table-policy-clauses は db-policy スコープ内のみ。単 table は Database 全体ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [DatabaseTable, Database]
    related_relation_ids: []
    source_claims: [claim-database-table-design]
parent_relation:
  id: DatabaseTable-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入资源, en: is an ingestible resource, ja: 取込可能リソースの一種}
  definitions:
    zh: DatabaseTable 种差为 schema-qualified 表名、schema_digest 与行成员容器。
    en: DatabaseTable differentia is schema-qualified name, schema_digest, and row member container.
    ja: DatabaseTable 種差は schema-qualified name/schema_digest/row member container。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-database-table-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
