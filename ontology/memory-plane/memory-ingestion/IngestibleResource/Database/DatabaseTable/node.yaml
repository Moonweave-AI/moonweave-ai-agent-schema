schema: moonweave.ai/ontology-node/v1
id: DatabaseTable
kind: concept
status: accepted
labels:
  zh: 数据库表
  en: Database table
  ja: データベースtable
semantics:
  short_definition:
    zh: 数据库内由限定表名与 schema 标识并包含行的资源。
    en: A database-contained resource identified by qualified table name and schema and containing rows.
    ja: database内でqualified table nameとschemaにより識別しrowを含むresourceです。
  definition:
    zh: DatabaseTable 是属于一个 Database、由 schema-qualified table name 与 schema 摘要标识并包含 DatabaseRow 的实体；它不是独立 Database 或查询结果集合。
    en: DatabaseTable is an entity belonging to one Database, identified by a schema-qualified table name plus schema digest, and containing DatabaseRow information; it is not an independent Database or a query-result collection.
    ja: DatabaseTable は一 Database に属しschema-qualified table nameとschema digestで識別して DatabaseRow informationを含むentityで、独立Databaseやquery-result collectionではありません。
  why_needed:
    zh: 消除 DatabaseTable 与 Database 平铺为同一资源层的问题。
    en: Removes the flat placement of DatabaseTable beside Database.
    ja: DatabaseTableをDatabaseと同一resource層に平置きする問題を除きます。
  includes:
    - zh: 纳入有稳定限定名与 schema 版本的表。
      en: Includes tables with stable qualified name and schema version.
      ja: 安定qualified nameとschema版を持つtableを含みます。
  excludes:
    - zh: 排除 Database、DatabaseRow 与临时查询视图。
      en: Excludes Database, DatabaseRow, and transient query views.
      ja: Database・DatabaseRow・一時query viewを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识数据库表。
        en: Stable identifier for the database table.
        ja: database tableの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: table-policy-clauses
      source_claims:
        - claim-database-table-002
    - id: qualified_table_name
      labels:
        zh: 限定表名
        en: qualified table name
        ja: qualified table name
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 catalog.schema.table。
        en: Records catalog.schema.table.
        ja: catalog.schema.tableを記録します。
      allowed_values: []
      pattern: null
      example_value: policy.public.clauses
      source_claims:
        - claim-database-table-003
    - id: schema_digest
      labels:
        zh: 模式摘要
        en: schema digest
        ja: schema digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定列结构与类型版本。
        en: Fixes column structure and type version.
        ja: column構造とtype版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:schema17
      source_claims:
        - claim-database-table-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DatabaseTable-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 数据库表正例
      en: "Positive case: Database table"
      ja: データベースtable正例
    scenario_id: null
    descriptions:
      zh: table-policy-clauses 由 db-policy 的 catalog_id、限定名 policy.public.clauses、schema digest 和 snapshot-2026-07 共同识别，并声明可枚举的行成员。
      en: table-policy-clauses is identified by db-policy's catalog ID, qualified name policy.public.clauses, schema digest, and snapshot-2026-07 and declares an enumerable set of row members.
      ja: table-policy-clauses は db-policy の catalog ID、qualified name、schema digest、snapshot-2026-07 で識別され列挙可能な row members を宣言します。
    field_values:
      resource_id: table-policy-clauses
      qualified_table_name: policy.public.clauses
      schema_digest: sha256:schema17
    related_node_ids:
      - DatabaseTable
    related_relation_ids: []
    expected_result:
      zh: 将该关系结构识别为 DatabaseTable，并把行成员限定在同一目录快照中。
      en: Identify the relation structure as DatabaseTable and scope its row members to the same catalog snapshot.
      ja: 当該 relation structure を DatabaseTable とし row members を同一 catalog snapshot に限定します。
    why_valid_or_invalid:
      zh: 限定表名、模式结构、所属目录和成员生命周期共同形成表级身份，而不是一次查询结果。
      en: Qualified name, schema structure, owning catalog, and membership lifecycle jointly establish table-level identity rather than a query result.
      ja: qualified name、schema、owning catalog、membership lifecycle が table-level identity を形成し query result とは異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-database-table-005
  - id: DatabaseTable-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 数据库表边界例
      en: "Boundary case: Database table"
      ja: データベースtable境界例
    scenario_id: null
    descriptions:
      zh: row-42 只保存一组字段值、主键和行摘要；它不声明列模式，也不能枚举同表的其他行。
      en: row-42 stores one field set, primary key, and row digest; it declares no column schema and cannot enumerate the table's other rows.
      ja: row-42 は一 field set、primary key、row digest を保存するだけで column schema を宣言せず他 row を列挙できません。
    field_values: {}
    related_node_ids:
      - DatabaseTable
    related_relation_ids: []
    expected_result:
      zh: 把 row-42 保持为 DatabaseRow，不以所属表名把它误判为 DatabaseTable。
      en: Keep row-42 as DatabaseRow and do not mistake it for DatabaseTable merely from its table name.
      ja: row-42 は DatabaseRow とし table name だけで DatabaseTable と誤認しません。
    why_valid_or_invalid:
      zh: 成员记录依赖表的模式和范围；依赖某表并不使该记录拥有表本身的结构与容器身份。
      en: A member record depends on table schema and scope; that dependency does not give it the structure or container identity of the table itself.
      ja: member record は table schema・scope に依存しますが table 自体の structure・container identity は持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-database-table-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Database-has_table-DatabaseTable
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含表
    en: has table
    ja: tableを含む
  definitions:
    zh: Database —has_table→ DatabaseTable 表示限定表名在该数据库/catalog 命名空间内解析并由其 schema 管理。
    en: Database —has_table→ DatabaseTable means that the qualified table name resolves within that database or catalog namespace and its schema is managed there.
    ja: Database —has_table→ DatabaseTable はqualified table nameがdatabase/catalog namespace内で解決しschemaがそこで管理されることを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: Database-has_table-DatabaseTable-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the catalog or database part of qualified_table_name exactly matches the target Database.
      explanations:
        zh: 仅当 qualified_table_name 的 catalog/database 部分与目标 Database 完全一致时成立。
        en: Assert only when the catalog or database part of qualified_table_name exactly matches the target Database.
        ja: qualified_table_nameのcatalog/database部分がtarget Databaseと完全一致する時だけ成立します。
      source_claims:
        - claim-database-table-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Database-has_table-DatabaseTable-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 包含表正例
        en: "Positive case: has table"
        ja: tableを含む正例
      scenario_id: null
      descriptions:
        zh: db-policy 的 snapshot-2026-07 表清单包含 table-policy-clauses，且该表的 catalog_id、限定名与 schema digest 均与目录记录一致。
        en: db-policy's snapshot-2026-07 table manifest contains table-policy-clauses, whose catalog ID, qualified name, and schema digest all match the catalog record.
        ja: db-policy の snapshot table manifest が table-policy-clauses を含み catalog ID、qualified name、schema digest が一致します。
      field_values: {}
      related_node_ids:
        - Database
        - DatabaseTable
      related_relation_ids:
        - Database-has_table-DatabaseTable
      expected_result:
        zh: 建立 db-policy has_table table-policy-clauses，并把成员资格限定到 snapshot-2026-07。
        en: Assert db-policy has_table table-policy-clauses and scope membership to snapshot-2026-07.
        ja: db-policy has_table table-policy-clauses を確立し membership を snapshot に限定します。
      why_valid_or_invalid:
        zh: 数据库清单和表内部目录标识双向一致，证明这是一条版本化容器成员事实。
        en: The database manifest and the table's internal catalog identity agree in both directions, proving versioned container membership.
        ja: database manifest と table catalog identity が双方向一致し versioned container membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-database-table-007
    - id: Database-has_table-DatabaseTable-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 包含表边界例
        en: "Boundary case: has table"
        ja: tableを含む境界例
      scenario_id: null
      descriptions:
        zh: archive.public.clauses 与 policy.public.clauses 具有相同本地表名，但其 catalog_id=archive-db，未出现在 db-policy 的表清单中。
        en: archive.public.clauses shares the local table name clauses but has catalog ID archive-db and is absent from db-policy's table manifest.
        ja: archive.public.clauses は同じ local name でも catalog ID が archive-db で db-policy manifest にありません。
      field_values: {}
      related_node_ids:
        - Database
        - DatabaseTable
      related_relation_ids:
        - Database-has_table-DatabaseTable
      expected_result:
        zh: 不得把 archive.public.clauses 连接为 db-policy 的成员表。
        en: Do not connect archive.public.clauses as a member table of db-policy.
        ja: archive.public.clauses を db-policy member table として接続しません。
      why_valid_or_invalid:
        zh: 表名只在目录范围内唯一；缺少目录标识和清单成员资格时，相同名称不构成包含关系。
        en: A table name is unique only within a catalog; without catalog identity and manifest membership, name equality does not establish containment.
        ja: table name は catalog 内だけで一意で catalog identity・manifest membership なしに containment は成立しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-database-table-007
