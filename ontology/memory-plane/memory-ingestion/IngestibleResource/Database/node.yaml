schema: moonweave.ai/ontology-node/v1
id: Database
kind: concept
status: accepted
labels:
  zh: 数据库
  en: Database
  ja: データベース
semantics:
  short_definition:
    zh: 以连接身份组织表并可由数据库加载器读取的资源。
    en: A connection-identified resource organizing tables readable by a database loader.
    ja: connection同一性でtableを編成しdatabase loaderがreadできるresourceです。
  definition:
    zh: Database 是以逻辑数据库/目录与连接身份标识、包含 DatabaseTable 的 IngestibleResource；它不是某张表、查询结果或连接密码。
    en: A Database is an IngestibleResource identified by logical catalog and connection identity and containing DatabaseTable values; it is not one table, a query result, or connection credentials.
    ja: Database はlogical database/catalogとconnection同一性で識別し DatabaseTable を含む IngestibleResource で、単一table・query result・connection credentialではありません。
  why_needed:
    zh: 形成 Database→Table→Row 的来源层级。
    en: Creates the Database-to-Table-to-Row source hierarchy.
    ja: Database→Table→Rowのsource階層を作ります。
  includes:
    - zh: 纳入可查询的关系数据库或 catalog。
      en: Includes queryable relational databases or catalogs.
      ja: query可能relational databaseまたはcatalogを含みます。
  excludes:
    - zh: 排除 DatabaseTable、DatabaseRow 与凭据。
      en: Excludes DatabaseTable, DatabaseRow, and credentials.
      ja: DatabaseTable・DatabaseRow・credentialを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识逻辑数据库。
        en: Stable identifier for the logical database.
        ja: logical databaseの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: db-policy
      source_claims:
        - claim-database-002
    - id: connection_identity
      labels:
        zh: 连接身份
        en: connection identity
        ja: connection同一性
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录无密钥的连接配置标识。
        en: Records a secret-free connection-profile identifier.
        ja: secretを含まないconnection profile IDを記録します。
      allowed_values: []
      pattern: null
      example_value: postgres://policy-prod/catalog
      source_claims:
        - claim-database-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: Database-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 数据库正例
      en: "Positive case: Database"
      ja: データベース正例
    scenario_id: null
    descriptions:
      zh: db-policy 是可通过 catalog://policy-prod 定位的 PostgreSQL 目录快照；它记录 catalog_id、模式清单摘要与连接配置版本，并包含 policy.public.clauses 等多张表。
      en: db-policy is a PostgreSQL catalog snapshot addressable at catalog://policy-prod; it records a catalog ID, schema-manifest digest, and connection-profile version and contains several tables including policy.public.clauses.
      ja: db-policy は catalog://policy-prod で参照できる PostgreSQL catalog snapshot で、catalog ID、schema manifest digest、接続 profile 版を記録し複数 table を含みます。
    field_values:
      resource_id: db-policy
      connection_identity: postgres://policy-prod/catalog
      canonical_locator: catalog://policy-prod
      version_ref: catalog-snapshot:2026-07-16
      content_digest: sha256:schema-manifest-policy-prod-2026-07-16
    related_node_ids:
      - Database
    related_relation_ids: []
    expected_result:
      zh: 将 db-policy 识别为 Database，并以其目录身份而非任一成员表作为规范标识。
      en: Identify db-policy as Database and preserve the catalog identity rather than using any member table as its canonical identifier.
      ja: db-policy を Database とし、member table ではなく catalog identity を正規識別子として保持します。
    why_valid_or_invalid:
      zh: 目录定位符、模式清单、连接配置版本和表成员关系共同界定了一个可重复读取的数据库资源。
      en: The catalog locator, schema manifest, connection-profile version, and table membership jointly delimit one repeatably readable database resource.
      ja: catalog locator、schema manifest、connection profile 版、table membership が再読取可能な database resource を共同で限定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-database-004
  - id: Database-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 数据库边界例
      en: "Boundary case: Database"
      ja: データベース境界例
    scenario_id: null
    descriptions:
      zh: policy.public.clauses 只有 table_id、限定表名和 schema digest；它依赖 db-policy 的目录与连接上下文，本身不拥有数据库级模式清单。
      en: policy.public.clauses has a table ID, qualified table name, and schema digest but depends on db-policy for catalog and connection context and owns no database-level schema manifest.
      ja: policy.public.clauses は table ID、qualified name、schema digest を持ちますが catalog・接続文脈を db-policy に依存し database-level manifest を持ちません。
    field_values: {}
    related_node_ids:
      - Database
    related_relation_ids: []
    expected_result:
      zh: 把 policy.public.clauses 保持为 DatabaseTable，不把成员表提升为 Database。
      en: Keep policy.public.clauses as DatabaseTable and do not promote the member table to Database.
      ja: policy.public.clauses は DatabaseTable のままとし Database へ昇格させません。
    why_valid_or_invalid:
      zh: 表的身份在目录范围内成立，而 Database 还要求独立的目录、连接与多表容器生命周期。
      en: Table identity is scoped by a catalog, whereas Database additionally requires an independent catalog, connection, and multi-table container lifecycle.
      ja: table identity は catalog 内で成立し、Database には独立 catalog・接続・複数 table container lifecycle が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-database-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Database-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Database 是 IngestibleResource 的严格子类；种差为：以数据库/catalog 与无密钥连接身份组织可查询表。
    en: "Database is a strict subtype of IngestibleResource; its reviewed differentia is: it organizes queryable tables under a database or catalog and secret-free connection identity."
    ja: Database は IngestibleResource の厳密なsubtypeで、審査済み種差は「database/catalogとsecret-free connection同一性でquery可能tableを編成します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: Database-is_a-IngestibleResource-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestibleResource and also satisfies the differentia: it organizes queryable tables under a database or catalog and secret-free connection identity."
      explanations:
        zh: 仅当对象首先满足 IngestibleResource 定义且满足种差“以数据库/catalog 与无密钥连接身份组织可查询表。”时成立。
        en: "Assert only when the object first satisfies IngestibleResource and also satisfies the differentia: it organizes queryable tables under a database or catalog and secret-free connection identity."
        ja: 対象がまず IngestibleResource を満たし、さらに種差「database/catalogとsecret-free connection同一性でquery可能tableを編成します。」を満たす時だけ成立します。
      source_claims:
        - claim-database-006
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Database-is_a-IngestibleResource-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: db-policy 具有稳定 catalog URI、连接 profile 版本、schema snapshot 摘要，并可由 SQL loader 枚举并读取其表，因此满足外部可寻址资源条件。
        en: db-policy has a stable catalog URI, connection-profile version, and schema-snapshot digest and can be enumerated and read by a SQL loader, satisfying external addressable-resource conditions.
        ja: db-policy は stable catalog URI、connection profile version、schema snapshot digest を持ち SQL loader で読取可能です。
      field_values: {}
      related_node_ids:
        - Database
        - IngestibleResource
      related_relation_ids:
        - Database-is_a-IngestibleResource
      expected_result:
        zh: 确认 db-policy 是 IngestibleResource 的 Database 特化，并继承可寻址、可版本化与可读取条件。
        en: Confirm db-policy as a Database specialization of IngestibleResource inheriting addressability, versioning, and readability conditions.
        ja: db-policy を IngestibleResource の Database specialization とし条件を継承します。
      why_valid_or_invalid:
        zh: 对象先满足资源上位类的定位、版本和加载器适用性，再以目录与多表容器能力构成 Database 种差。
        en: The object first satisfies the parent resource's locator, version, and loader-applicability requirements and adds catalog and multi-table container behavior as Database differentia.
        ja: resource parent の locator・version・loader 条件を満たし catalog・multi-table behavior を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-database-006
    - id: Database-is_a-IngestibleResource-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: table-policy-clauses 依赖 db-policy 的连接和目录范围，只拥有表级 schema 与行成员，不能代表整个数据库资源。
        en: table-policy-clauses depends on db-policy's connection and catalog scope and owns only table schema and row members, so it cannot represent the whole database resource.
        ja: table-policy-clauses は db-policy connection・catalog に依存し table schema・rows だけを所有します。
      field_values: {}
      related_node_ids:
        - Database
        - IngestibleResource
      related_relation_ids:
        - Database-is_a-IngestibleResource
      expected_result:
        zh: 不要通过该子类边把单张 DatabaseTable 当作 Database。
        en: Do not use this subtype edge to treat one DatabaseTable as Database.
        ja: この subtype edge で一 DatabaseTable を Database としません。
      why_valid_or_invalid:
        zh: 表可被单独读取并不赋予数据库级目录、连接和多表生命周期，因此不满足 Database 的完整种差。
        en: Independent table readability does not provide database-level catalog, connection, or multi-table lifecycle and therefore does not satisfy the Database differentia.
        ja: table readability だけでは database-level catalog・connection・multi-table lifecycle を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-database-006
  source_claims:
    - claim-database-006
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
