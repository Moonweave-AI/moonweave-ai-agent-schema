    source: eng-fw-langchain-document-loaders
    supports: LangChain's database loader integrations support addressable database sources that yield normalized Documents.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-002
    source: eng-fw-langchain-document-loaders
    supports: Database.resource_id records the source database identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-003
    source: eng-fw-langchain-document-loaders
    supports: Database.connection_identity records deterministic loader target without storing credentials; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-database-004
    source: eng-fw-langchain-document-loaders
    supports: LangChain provides database-oriented loaders and a shared source-to-Document loader interface.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
