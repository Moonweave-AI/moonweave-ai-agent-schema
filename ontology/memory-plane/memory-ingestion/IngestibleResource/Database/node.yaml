schema: moonweave.ai/ontology-node/v1
id: Database
kind: concept
labels:
  zh: 数据库
  en: Database
  ja: データベース
semantics:
  short_definition:
    zh: 以连接身份组织可查询表的数据库/catalog 资源。
    en: Database or catalog resource organizing queryable tables under connection identity.
    ja: connection identity 下で query 可能 table を編成する database/catalog resource。
  definition:
    zh: Database 是以 connection_identity（如 postgres://policy-prod/catalog）标识、包含 DatabaseTable 的 IngestibleResource，对应 MCP postgres:// resource 与 LlamaIndex DatabaseReader/SQLDatabase；它不是单表、查询结果或连接凭据。
    en: Database is an IngestibleResource identified by connection_identity (e.g., postgres://policy-prod/catalog) containing DatabaseTable values, mapping to MCP postgres:// resources and LlamaIndex DatabaseReader/SQLDatabase; it is not one table, query result, or credentials.
    ja: Database は connection_identity（postgres://policy-prod/catalog 等）で識別し DatabaseTable を含む IngestibleResource。MCP postgres:// resource/LlamaIndex DatabaseReader/SQLDatabase に対応。単 table/query result/credential ではない。
  why_needed:
    zh: 形成 Database→Table→Row 来源层级，避免把 catalog 与单表平铺为同一资源层。
    en: Creates Database→Table→Row source hierarchy, avoiding flat catalog and table at the same resource tier.
    ja: Database→Table→Row source 階層を形成し catalog と単 table の同層平置きを避ける。
  includes:
    - zh: 纳入 PostgreSQL catalog、MySQL schema 集合与 MCP postgres:// 暴露库。
      en: Includes PostgreSQL catalogs, MySQL schema sets, and MCP postgres:// exposed databases.
      ja: PostgreSQL catalog/MySQL schema 集合/MCP postgres:// 暴露 DB。
  excludes:
    - zh: 排除 DatabaseTable、DatabaseRow 与凭据 secret。
      en: Excludes DatabaseTable, DatabaseRow, and credential secrets.
      ja: DatabaseTable・DatabaseRow・credential secret を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex DatabaseReader 以 SQLAlchemy URI 连接 catalog 并读取表行；LangChain SQLDatabaseLoader 同理；MCP postgres:// 模板暴露可读数据库资源；Moonweave 把 connection_identity 记为无密钥 profile 引用。
    en: LlamaIndex DatabaseReader connects via SQLAlchemy URI to read table rows; LangChain SQLDatabaseLoader follows; MCP postgres:// templates expose readable database resources; Moonweave records connection_identity as a secret-free profile reference.
    ja: LlamaIndex DatabaseReader が SQLAlchemy URI で catalog 接続し table row を read。LangChain SQLDatabaseLoader も同型。MCP postgres:// template が readable DB resource を暴露。Moonweave は connection_identity を secret-free profile ref として記録。
  typical_input:
    - description: LlamaIndex DatabaseReader connection
      format: |
        from llama_index.readers.database import DatabaseReader
        reader = DatabaseReader(
          scheme="postgresql", host="localhost", port=5432,
          user="reader", password="***", dbname="policy"
        )
      source_claims: [claim-database-llamaindex]
    - description: MCP postgres resource URI
      format: |
        {"uri": "postgres://policy-prod/catalog/public"}
      source_claims: [claim-database-mcp]
  typical_output:
    - description: Moonweave database resource identity
      format: |
        {
          "resource_id": "db-policy",
          "connection_identity": "postgres://policy-prod/catalog",
          "version_ref": "catalog-snapshot:2026-07-16"
        }
      source_claims: [claim-database-design]
  reference_implementations:
    - name: LlamaIndex DatabaseReader
      url: https://docs.llamaindex.ai/en/stable/examples/data_connectors/DatabaseDemo/
      description: SQL database row loading into Documents.
    - name: LangChain SQLDatabaseLoader
      url: https://python.langchain.com/docs/integrations/document_loaders/sql_database/
      description: SQLDatabase-backed document loading.
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: postgres:// URI templates for database resources.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识逻辑数据库/catalog。
        en: Stable identifier for logical database or catalog.
        ja: logical database/catalog の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: db-policy
      allowed_values: []
      source_claims: [claim-database-id]
    - id: connection_identity
      labels: {zh: 连接身份, en: Connection identity, ja: connection identity}
      definitions:
        zh: 无密钥的连接 profile 或 MCP postgres:// URI；不含 password/token。
        en: Secret-free connection profile or MCP postgres:// URI; excludes password/token.
        ja: secret-free connection profile または MCP postgres:// URI。password/token 不含。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: postgres://policy-prod/catalog
      allowed_values: []
      source_claims: [claim-database-connection]
  constraints: []
  required_relations: []
examples:
  - id: Database-example-llamaindex-reader
    labels:
      zh: LlamaIndex 数据库读取
      en: LlamaIndex database read
      ja: LlamaIndex DB read
    descriptions:
      zh: DatabaseReader 连接 db-policy（postgres://policy-prod/catalog），读取 public.clauses 等表为 Document 流；resource_id=db-policy 标识 catalog 级来源，表为 DatabaseTable 子资源。
      en: DatabaseReader connects to db-policy (postgres://policy-prod/catalog), reading tables like public.clauses into Documents; resource_id=db-policy identifies catalog-level source with DatabaseTable child resources.
      ja: DatabaseReader が db-policy（postgres://policy-prod/catalog）に接続し public.clauses 等を Document 化。resource_id=db-policy が catalog 級 source、table は DatabaseTable 子 resource。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/examples/data_connectors/DatabaseDemo/
      version: DatabaseReader
    field_values:
      resource_id: db-policy
      connection_identity: postgres://policy-prod/catalog
    related_node_ids: [Database, DatabaseTable]
    related_relation_ids: []
    source_claims: [claim-database-llamaindex]
  - id: Database-example-mcp-postgres
    labels:
      zh: MCP postgres 资源
      en: MCP postgres resource
      ja: MCP postgres resource
    descriptions:
      zh: MCP server 暴露 postgres://{host}/{database}/{schema} 模板；client resources/read 获取 schema 快照，ingest-run 记录 catalog-snapshot digest。
      en: MCP server exposes postgres://{host}/{database}/{schema} template; client resources/read fetches schema snapshot; ingest-run records catalog-snapshot digest.
      ja: MCP server が postgres://{host}/{database}/{schema} template を暴露。client resources/read が schema snapshot 取得。ingest-run が catalog-snapshot digest 記録。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: postgres URI
    field_values:
      connection_identity: postgres://policy-prod/catalog
      version_ref: catalog-snapshot:2026-07-16
    related_node_ids: [Database, IngestibleResource]
    related_relation_ids: []
    source_claims: [claim-database-mcp]
  - id: Database-example-not-table
    labels:
      zh: 数据库非单表
      en: Database is not single table
      ja: database は単 table ではない
    descriptions:
      zh: table-policy-clauses 只有 qualified table name 与 schema digest，依赖 db-policy 的 catalog 上下文；不能把成员表提升为 Database。
      en: table-policy-clauses has qualified table name and schema digest, depending on db-policy catalog context; member table must not be promoted to Database.
      ja: table-policy-clauses は qualified table name/schema digest のみで db-policy catalog context に依存。member table を Database に昇格不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [Database, DatabaseTable]
    related_relation_ids: []
    source_claims: [claim-database-design]
parent_relation:
  id: Database-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入资源, en: is an ingestible resource, ja: 取込可能リソースの一種}
  definitions:
    zh: Database 种差为 catalog 级 connection_identity 与多表容器，而非单表定位。
    en: Database differentia is catalog-level connection_identity and multi-table container, not single-table locator.
    ja: Database 種差は catalog 級 connection_identity/複数 table container。単 table locator ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-database-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-db
    title: LlamaIndex DatabaseReader
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/examples/data_connectors/DatabaseDemo/
    source_type: official-doc
    relevance: SQL database ingestion.
  - id: src-langchain-sql
    title: LangChain SQLDatabaseLoader
    publisher: LangChain
    url: https://python.langchain.com/docs/integrations/document_loaders/sql_database/
    source_type: official-doc
    relevance: Database document loading.
  - id: src-mcp-postgres
    title: MCP Server Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-doc
    relevance: postgres:// resource URIs.
  - id: src-database-design
    title: Moonweave database hierarchy
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Database versus table layering.
source_claims:
  - id: claim-database-llamaindex
    source: src-llamaindex-db
    supports: DatabaseReader connects to SQL databases and loads table rows as Documents.
    locator: DatabaseDemo
    evidence_kind: official
    confidence: high
  - id: claim-database-mcp
    source: src-mcp-postgres
    supports: MCP resources may expose postgres:// URI templates for database access.
    locator: Resources
    evidence_kind: official
    confidence: medium
  - id: claim-database-design
    source: src-database-design
    supports: Database catalog identity differs from DatabaseTable member identity.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-id
    source: src-database-design
    supports: resource_id identifies database catalog lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-connection
    source: src-llamaindex-db
    supports: connection_identity records secret-free SQL connection target.
    locator: DatabaseReader
    evidence_kind: official
    confidence: high
