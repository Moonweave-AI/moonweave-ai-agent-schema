schema: moonweave.ai/ontology-node/v1
id: Database
kind: concept
status: accepted
labels:
  zh: 数据库来源
  en: Database Source
  ja: データベース情報源
semantics:
  short_definition:
    zh: 可由摄入活动通过受控只读查询访问、并以目录和一致性快照定位的 IngestibleResource 子类型。
    en: An IngestibleResource subtype that an ingestion activity can access through controlled read-only queries and locate by catalog and consistency snapshot.
    ja: 制御された読取り専用 query により ingestion 活動がアクセスでき、catalog と一貫性 snapshot で位置付ける IngestibleResource の下位型。
  definition:
    zh: Database 是一个可查询的 IngestibleResource 外部来源目录，在给定访问档案和 snapshot_ref 下可供 IngestionRun 读取表或视图。其身份保留 resource_id，并由 database_id、无密钥 canonical_locator、catalog_name、connection_profile_ref 和 snapshot_ref 共同细化。它不是运行时连接对象、用户名或密码、单个 DatabaseTable、DatabaseRow、SQL 文本、查询结果集、Document、MemoryStore 或 VectorDatabase。读操作、读到的行和后续文档均是独立事实。
    en: Database is a queryable IngestibleResource external-source catalog from which an IngestionRun can read tables or views under a given access profile and snapshot_ref. It retains resource_id and further specifies identity through database_id, credential-free canonical_locator, catalog_name, connection_profile_ref, and snapshot_ref. It is not a runtime connection object, username or password, a single DatabaseTable, DatabaseRow, SQL text, query result set, Document, MemoryStore, or VectorDatabase. The read operation, read rows, and later documents are separate facts.
    ja: Database は、指定した access profile と snapshot_ref の下で IngestionRun が table または view を読める queryable な IngestibleResource 外部情報源 catalog です。resource_id を保持し、database_id、credential-free canonical_locator、catalog_name、connection_profile_ref、snapshot_ref により ID をさらに具体化します。実行時 connection object、username や password、一つの DatabaseTable、DatabaseRow、SQL text、query result set、Document、MemoryStore、VectorDatabase ではありません。読取り操作、読まれた行、後続 Document は別個の事実です。
  why_needed:
    zh: 数据库摄入需要稳定区分“可读取的来源目录”和“某次读取的输出”。固定无密钥定位、目录、只读访问边界和快照，才能复现输入来源并审计访问，而不会把凭据、连接句柄或返回行误作来源实体。
    en: Database ingestion needs a stable distinction between a readable source catalog and the output of one read. Pinning a credential-free locator, catalog, read-only access boundary, and snapshot makes source input reproducible and access auditable without mistaking credentials, connection handles, or returned rows for the source entity.
    ja: database ingestion には読取り可能な source catalog と一回の read 出力を安定して区別する必要があります。credential-free locator、catalog、read-only access boundary、snapshot を固定すると、credential、connection handle、返却 row を source entity と誤認せず、入力情報源を再現し access を監査できます。
  includes:
    - zh: 一个可解析的无密钥定位符、逻辑目录名、只读连接配置引用，以及本次可重复读取的 snapshot 引用。
      en: A resolvable credential-free locator, logical catalog name, read-only connection-profile reference, and snapshot reference for reproducible reading.
      ja: 解決可能な credential-free locator、logical catalog 名、read-only connection-profile 参照、再現可能読取り用 snapshot 参照。
  excludes:
    - zh: 密码、实时 PGconn、某条 SQL、一次 SELECT 的 PGresult、单表或单行、已转换文档和向量检索索引。
      en: A password, live PGconn, one SQL statement, PGresult from one SELECT, one table or row, transformed document, or vector-retrieval index.
      ja: password、live PGconn、一つの SQL statement、一回の SELECT の PGresult、一つの table または row、変換済み document、vector-retrieval index。
  semantic_kind: entity
  aliases:
    - ingestible database
    - external catalog source
    - 数据库摄入源
engineering:
  explanation:
    zh: PostgreSQL libpq 通过 PQconnectdb 或 PQconnectdbParams 建立 PGconn，并且连接字符串可使用 URI 或参数形式；随后应用可以执行只读事务中的 SELECT。数据库来源记录只保存无密钥端点和档案引用，真实 PGconn、认证材料和某次 PGresult 留在运行或秘密系统中。使用可重复读快照的读取活动另行记录实际表和行。
    en: PostgreSQL libpq establishes a PGconn through PQconnectdb or PQconnectdbParams, and connection strings can use URI or parameter form; an application can then execute SELECT in a read-only transaction. A database-source record stores only credential-free endpoint and profile references, while the live PGconn, authentication material, and one PGresult remain in runtime or secret systems. A read using a repeatable-read snapshot records actual tables and rows separately.
    ja: PostgreSQL libpq は PQconnectdb または PQconnectdbParams で PGconn を確立し、connection string は URI または parameter 形式を使えます。その後 application は read-only transaction 内で SELECT を実行できます。database-source record は credential-free endpoint と profile 参照だけを保存し、live PGconn、authentication material、一回の PGresult は runtime または secret system に残します。repeatable-read snapshot を使う read は実際の table と row を別途記録します。
  typical_input:
    - description: PostgreSQL connection input without a credential
      format: |
        PGconn *conn = PQconnectdb(
          "host=db.example port=5432 dbname=policy_db sslmode=verify-full"
        );
        if (PQstatus(conn) != CONNECTION_OK) {
          /* handle failed connection */
        }
    - description: Read-only snapshot transaction for ingestion
      format: |
        BEGIN TRANSACTION ISOLATION LEVEL REPEATABLE READ READ ONLY;
        SELECT id, rule_text FROM public.policy_rules WHERE active = true;
  typical_output:
    - description: Source descriptor and separate read observation
      format: |
        {
          "database_id": "db-policy",
          "resource_id": "resource-db-policy",
          "canonical_locator": "postgresql://db.example/policy_db",
          "catalog_name": "policy_db",
          "snapshot_ref": "tx-snapshot-2026-07-18T00-00-00Z",
          "read_observation_ref": "ingest-read-policy-4"
        }
  reference_implementations:
    - name: PostgreSQL libpq connection control
      url: https://www.postgresql.org/docs/current/libpq-connect.html
      description: Documents PQconnectdb, PQconnectdbParams, PGconn, and URI or parameter-string connection inputs.
    - name: PostgreSQL transaction isolation
      url: https://www.postgresql.org/docs/current/transaction-iso.html
      description: Documents repeatable-read transaction snapshots for stable transaction visibility.
structure:
  identity_keys: [resource_id, database_id, snapshot_ref]
  fields:
    - id: resource_id
      labels: {zh: 父资源标识, en: parent resource ID, ja: 親リソースID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保留该数据库作为 IngestibleResource 的稳定来源身份，不用数据库目录名或连接句柄替代。
        en: Retains the database's stable source identity as an IngestibleResource rather than substituting catalog name or connection handle.
        ja: catalog 名や connection handle で置き換えず、IngestibleResource としての database の安定 source ID を保持します。
      allowed_values: []
      pattern: "^resource-db-[A-Za-z0-9._-]+$"
      example_value: resource-db-policy
      source_claims: [claim-database-is-a-ingestible-resource]
    - id: database_id
      labels: {zh: 数据库标识, en: database ID, ja: database ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个可摄入的数据库来源系列，不复用为连接、表、行或摄入运行标识。
        en: Stably identifies an ingestible database-source series and is not reused as a connection, table, row, or ingestion-run ID.
        ja: ingestible database-source 系列を安定して識別し、connection、table、row、ingestion-run ID として再利用しません。
      allowed_values: []
      pattern: "^db-[A-Za-z0-9._-]+$"
      example_value: db-policy
      source_claims: [claim-database-source-identity]
    - id: canonical_locator
      labels: {zh: 规范定位符, en: canonical locator, ja: 正規 locator}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录可解析的数据库端点和数据库名，不包含 username、password、令牌或其他秘密参数。
        en: Records a resolvable database endpoint and database name without username, password, token, or other secret parameter.
        ja: username、password、token、その他 secret parameter を含めず、解決可能な database endpoint と database 名を記録します。
      allowed_values: []
      pattern: "^postgres(?:ql)?://[^@/?#:]+(?::[0-9]+)?/[^/?#]+$"
      example_value: postgresql://db.example/policy_db
      source_claims: [claim-database-connection-boundary]
    - id: catalog_name
      labels: {zh: 逻辑目录名, en: logical catalog name, ja: logical catalog 名}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指定端点内将由摄入读取的逻辑数据库目录，不等同于一个 schema、表或结果集。
        en: Names the logical database catalog that ingestion will read at the endpoint and is not one schema, table, or result set.
        ja: ingestion が endpoint で読む logical database catalog を名付け、一つの schema、table、result set ではありません。
      allowed_values: []
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      example_value: policy_db
      source_claims: [claim-database-source-identity]
    - id: connection_profile_ref
      labels: {zh: 连接档案引用, en: connection-profile reference, ja: connection-profile 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 引用只读、TLS 和网络边界等无秘密连接配置；它不承载凭据或实时连接状态。
        en: References credential-free connection configuration such as read-only mode, TLS, and network boundary; it carries neither credentials nor live connection state.
        ja: read-only mode、TLS、network boundary など credential-free connection configuration を参照し、credential と live connection state を運びません。
      allowed_values: []
      pattern: "^conn-profile-[A-Za-z0-9._-]+$"
      example_value: conn-profile-policy-readonly
      source_claims: [claim-database-connection-boundary]
    - id: snapshot_ref
      labels: {zh: 快照引用, en: snapshot reference, ja: snapshot 参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次来源读可复现的数据可见性边界，不是 SQL 文本、行集摘要或文档生成时间。
        en: Points to the reproducible data-visibility boundary for this source read and is not SQL text, a row-set summary, or document-generation time.
        ja: この source read の再現可能な data-visibility boundary を指し、SQL text、row-set summary、document-generation time ではありません。
      allowed_values: []
      pattern: "^tx-snapshot-[A-Za-z0-9._-]+$"
      example_value: tx-snapshot-2026-07-18T00-00-00Z
      source_claims: [claim-database-repeatable-snapshot]
    - id: access_mode
      labels: {zh: 访问模式, en: access mode, ja: access mode}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明该来源用于摄入的许可模式，必须是只读；它不取代实际数据库授权或审计。
        en: Declares the permitted mode for ingesting this source and must be read_only; it does not replace actual database authorization or audit.
        ja: この source を ingest するための許可 mode を宣言し read_only でなければならず、実際の database authorization や audit を置き換えません。
      allowed_values: [read_only]
      pattern: null
      example_value: read_only
      source_claims: [claim-database-connection-boundary]
  constraints:
    - id: database-source-identity-and-secret-boundary
      severity: error
      expression_language: plain
      expression: resource_id, database_id, canonical_locator, catalog_name, connection_profile_ref, snapshot_ref, and access_mode are required. canonical_locator and connection_profile_ref must contain no password, token, userinfo, or runtime PGconn value. A table, row, SQL statement, result set, credential, MemoryStore, VectorDatabase, or retrieval candidate cannot substitute for Database identity.
      explanation:
        zh: 来源身份、访问材料和读取输出必须保持分离；源记录含秘密会同时破坏安全和可移植性。
        en: Source identity, access material, and read output must stay separate; a secret in the source record harms both security and portability.
        ja: source identity、access material、read output は分離を保たねばならず、source record 内の secret は security と portability の両方を損ないます。
      source_claims: [claim-database-connection-boundary, claim-database-source-identity]
    - id: database-source-snapshot-boundary
      severity: error
      expression_language: plain
      expression: snapshot_ref must resolve to the read transaction or equivalent consistency evidence used by an IngestionRun. A Database record must not infer which tables, rows, documents, or model-visible context were actually read without separately recorded activity facts.
      explanation:
        zh: 快照使来源可定位，不是读取证明；实际使用须由摄入活动和其结果证明。
        en: A snapshot locates a source but does not prove a read; actual use requires ingestion activity and result evidence.
        ja: snapshot は source を位置付けますが read を証明せず、実際の使用には ingestion activity と result evidence が必要です。
      source_claims: [claim-database-repeatable-snapshot, claim-database-prov-separation]
  required_relations: []
examples:
  - id: database-example-positive-policy-catalog

    labels: {zh: 固定快照的政策目录, en: Snapshot-pinned policy catalog, ja: snapshot 固定の policy catalog}

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      resource_id: resource-db-policy
      database_id: db-policy
      canonical_locator: postgresql://db.example/policy_db
      catalog_name: policy_db
      connection_profile_ref: conn-profile-policy-readonly
      snapshot_ref: tx-snapshot-2026-07-18T00-00-00Z
      access_mode: read_only
    related_node_ids: [Database, IngestibleResource, DatabaseTable]
    related_relation_ids: [Database-is_a-IngestibleResource]

    source_claims: [claim-database-source-identity, claim-database-repeatable-snapshot]
  - id: database-example-counterexample-password

    labels: {zh: 密码不是数据库来源, en: Password is not a database source, ja: password は database source ではない}

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      secret_kind: database_password
      database_id: null
      canonical_locator: null
      snapshot_ref: null
    related_node_ids: [Database, IngestibleResource]
    related_relation_ids: []

    source_claims: [claim-database-connection-boundary]
  - id: database-example-boundary-query-result

    labels: {zh: 一次查询结果, en: One query result, ja: 一回の query result}

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      query_id: select-policy-rules
      row_count: 128
      result_type: PGresult
      database_id: null
    related_node_ids: [Database, IngestionRun, DatabaseTable]
    related_relation_ids: []

    source_claims: [claim-database-select-output, claim-database-prov-separation]
  - id: database-example-instance-db-policy

    labels: {zh: "实例：db-policy 来源", en: "Instance: db-policy source", ja: "インスタンス：db-policy source"}

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      resource_id: resource-db-policy
      database_id: db-policy
      canonical_locator: postgresql://db.example/policy_db
      catalog_name: policy_db
      connection_profile_ref: conn-profile-policy-readonly
      snapshot_ref: tx-snapshot-2026-07-18T00-00-00Z
      access_mode: read_only
    related_node_ids: [Database, IngestibleResource, IngestionRun]
    related_relation_ids: [Database-is_a-IngestibleResource]

    source_claims: [claim-database-is-a-ingestible-resource]
parent_relation:
  id: Database-is_a-IngestibleResource
  predicate: is_a
  target: concept:IngestibleResource
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是可摄入资源的数据库子类型
    en: is a database subtype of ingestible resource
    ja: ingestible resource の database 下位型である
  definitions:
    zh: Database —is_a→ IngestibleResource 表示每个 Database 都满足可摄入外部来源的身份，并额外提供可查询目录、访问档案和快照边界。
    en: Database —is_a→ IngestibleResource means every Database satisfies the identity of an ingestible external source and additionally provides queryable catalog, access-profile, and snapshot boundaries.
    ja: Database —is_a→ IngestibleResource は、各 Database が ingestible external source の ID を満たし、さらに queryable catalog、access-profile、snapshot boundary を提供することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定来源实例数量；一个上位概念可有多个数据库子类型实例。
    en: Classification does not prescribe source-instance count; one parent concept can have many database-subtype instances.
    ja: 分類関係は source-instance 数を規定せず、一つの親概念は多くの database-subtype instance を持てます。
  inverse_reading:
    predicate: has_database_source_subtype
    labels: {zh: 具有数据库来源子类型, en: has database-source subtype, ja: database-source 下位型を持つ}
  conditions:
    - id: database-is-a-ingestible-resource-condition
      severity: error
      expression_language: plain
      expression: Assert only when the candidate satisfies IngestibleResource identity and supplies a queryable catalog, credential-free connection profile, repeatable snapshot reference, and read_only access mode. A table, row, secret, connection handle, result set, MemoryStore, or VectorDatabase does not satisfy the subtype.
      explanation:
        zh: 数据库的种差是可读取来源目录和一致性边界，而不是某一次查询、访问材料或下游存储角色。
        en: The database differentia is a readable source catalog with consistency boundary, not one query, access material, or downstream storage role.
        ja: database の種差は consistency boundary を持つ readable source catalog であり、一回の query、access material、下流 storage role ではありません。
      source_claims: [claim-database-is-a-ingestible-resource]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-database-is-a-ingestible-resource]
  distinct_fact_rationale:
    zh: 此边仅陈述来源类型归属，不陈述数据库已连接、表已读取、行已导入或文档已生成。
    en: This edge states source type membership only, not that a database connected, a table read, a row ingested, or a document generated.
    ja: この edge は source type membership だけを表し、database 接続、table read、row ingest、document 生成を表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: postgres-connection
    title: PostgreSQL libpq connection control
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/libpq-connect.html
    relevance: Documents PGconn connection functions and URI or parameter-string connection inputs, including that URI user information can contain a password.
  - id: postgres-select
    title: PostgreSQL SELECT
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/sql-select.html
    relevance: Documents SELECT querying rows from tables or views.
  - id: postgres-transaction-isolation
    title: PostgreSQL transaction isolation
    source_type: official-documentation
    url: https://www.postgresql.org/docs/current/transaction-iso.html
    relevance: Documents repeatable-read transaction behavior and stable transaction snapshots.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines Entity, Activity, usage, and generation concepts for provenance separation.
source_claims:
  - id: claim-database-connection-boundary
    source: postgres-connection
    supports: PostgreSQL documents PQconnectdb and PQconnectdbParams creating a PGconn from URI or connection parameters, and its URI syntax permits user information including a password. Moonweave therefore records a credential-free locator and profile reference rather than a live connection or secret.
    locator: "Database connection control functions and connection URI syntax"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-select-output
    source: postgres-select
    supports: PostgreSQL documents SELECT as a command that retrieves rows from source tables or views. Moonweave treats the resulting row set as read output rather than the identity of its database source.
    locator: "SELECT command synopsis and FROM clause"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-repeatable-snapshot
    source: postgres-transaction-isolation
    supports: PostgreSQL documents that Repeatable Read transactions see a snapshot as of their first non-transaction-control query. Moonweave uses a snapshot reference to identify the reproducibility boundary of one source read, without claiming a database record itself performed the read.
    locator: "Repeatable Read isolation level"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-prov-separation
    source: w3c-prov-o
    supports: PROV-O distinguishes entities, activities that use entities, and generated entities. Moonweave keeps Database source identity separate from an IngestionRun and its row or document outputs.
    locator: "PROV-O Entity, Activity, usage, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-database-source-identity
    source: w3c-prov-o
    supports: Modeling a catalog plus consistency boundary as a reusable database source is a Moonweave design inference based on PROV-O's separation of source entities from activities and outputs.
    locator: "PROV-O Entity and Activity"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-database-is-a-ingestible-resource
    source: w3c-prov-o
    supports: Classifying a queryable, snapshot-pinned external catalog as an IngestibleResource subtype is a Moonweave taxonomy inference. PROV-O supports keeping the catalog entity distinct from the ingestion activity that uses it.
    locator: "PROV-O Entity and Activity"
    evidence_kind: ontology-design-inference
    confidence: medium
