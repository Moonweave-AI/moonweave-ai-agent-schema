schema: moonweave.ai/ontology-node/v1
id: FileResource
kind: concept
labels:
  zh: 文件资源
  en: File resource
  ja: ファイルリソース
semantics:
  short_definition:
    zh: 目录内以 file URI 与内容摘要标识的叶文件资源。
    en: Leaf file resource in a directory identified by file URI and content digest.
    ja: directory 内で file URI と content digest により識別する leaf file resource。
  definition:
    zh: FileResource 是属于 DirectoryResource、以 RFC 8089 file URI 与 content_digest 标识的 IngestibleResource 叶节点，对应 MCP file:// resource 与 LlamaIndex SimpleDirectoryReader 枚举的单文件；它不是解析后的 Document 或 DirectoryResource。
    en: FileResource is an IngestibleResource leaf belonging to DirectoryResource, identified by RFC 8089 file URI and content_digest, mapping to MCP file:// resources and single files enumerated by LlamaIndex SimpleDirectoryReader; it is not parsed Document or DirectoryResource.
    ja: FileResource は DirectoryResource に属する IngestibleResource leaf。RFC 8089 file URI と content_digest で識別。MCP file:// resource と LlamaIndex SimpleDirectoryReader 列挙単 file に対応。parsed Document/DirectoryResource ではない。
  why_needed:
    zh: 固定实际摄入文件的版本身份，区分“目录可遍历”与“单文件可读”。
    en: Fixes version identity of the ingested file and separates directory traversal from single-file readability.
    ja: 実際取込 file の版 identity を固定し directory traverse と single-file read を分離。
  includes:
    - zh: 纳入 MCP file:// URI、本地路径、对象存储对象与 Git blob 句柄。
      en: Includes MCP file:// URIs, local paths, object-store objects, and Git blob handles.
      ja: MCP file:// URI、local path、object-store object、Git blob handle。
  excludes:
    - zh: 排除 DirectoryResource、Document 与 SourceAttachment。
      en: Excludes DirectoryResource, Document, and SourceAttachment.
      ja: DirectoryResource・Document・SourceAttachment を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: MCP Resources 以 file:///{path} 模板暴露单文件；LlamaIndex SimpleDirectoryReader 对 input_dir 下每个文件产生 Document 时，Moonweave 把源 FileResource 与输出 Document 分开建模；PyPDFLoader 等 LangChain loader 同理。
    en: MCP Resources expose single files via file:///{path}; when LlamaIndex SimpleDirectoryReader yields Documents per file, Moonweave models source FileResource separately from output Document; LangChain PyPDFLoader follows the same boundary.
    ja: MCP Resources は file:///{path} で単 file を暴露。LlamaIndex SimpleDirectoryReader が各 file から Document を yield する際、Moonweave は source FileResource と output Document を分離建模。LangChain PyPDFLoader も同 boundary。
  typical_input:
    - description: MCP file resource read request
      format: |
        resources/read
        {"uri": "file:///srv/legal/policy.pdf"}
      source_claims: [claim-file-resource-mcp]
    - description: LlamaIndex per-file load from directory
      format: |
        from llama_index.core import SimpleDirectoryReader
        docs = SimpleDirectoryReader(input_files=["/srv/legal/policy.pdf"]).load_data()
      source_claims: [claim-file-resource-llamaindex]
  typical_output:
    - description: Moonweave FileResource identity for an ingested file version
      format: |
        {
          "resource_id": "file-policy-v7",
          "file_uri": "file:///srv/legal/policy.pdf",
          "version_ref": "git:9f42c1a",
          "content_digest": "7333d79d..."
        }
      source_claims: [claim-file-resource-design]
  reference_implementations:
    - name: MCP Resources file URI
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: file:// URI template for readable files.
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: Directory and single-file loading into Documents.
    - name: LangChain PyPDFLoader
      url: https://python.langchain.com/docs/integrations/document_loaders/pypdf/
      description: File-specific PDF loader returning Documents.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识文件资源 lineage。
        en: Stable identifier for file resource lineage.
        ja: file resource lineage の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file-policy-v7
      allowed_values: []
      source_claims: [claim-file-resource-id]
    - id: directory_id
      labels: {zh: 所属目录标识, en: Containing directory identifier, ja: 所属 directory 識別子}
      definitions:
        zh: 直接包含该文件的 DirectoryResource；限定成员关系，不取代 file_uri 身份。
        en: DirectoryResource directly containing this file; scopes membership without replacing file_uri identity.
        ja: 当該 file を直接含む DirectoryResource。membership を限定し file_uri identity は置換しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dir-legal
      allowed_values: []
      source_claims: [claim-file-resource-directory]
    - id: file_uri
      labels: {zh: 文件 URI, en: File URI, ja: file URI}
      definitions:
        zh: RFC 8089 绝对 file URI；保留 authority、大小写与 percent-encoding。
        en: RFC 8089 absolute file URI preserving authority, case, and percent-encoding.
        ja: RFC 8089 absolute file URI。authority/case/percent-encoding を保持。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///srv/policy/legal/policy.pdf
      allowed_values: []
      source_claims: [claim-file-resource-uri]
    - id: version_ref
      labels: {zh: 文件版本引用, en: File version reference, ja: file 版参照}
      definitions:
        zh: 文件系统或对象存储分配的逻辑版本、Git object 或快照成员版本。
        en: Logical version, Git object, or snapshot-member version from filesystem or object store.
        ja: filesystem/object store/Git が付与した論理版/object/snapshot-member version。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: object-version:7
      allowed_values: []
      source_claims: [claim-file-resource-version]
    - id: content_digest
      labels: {zh: 内容摘要, en: Content digest, ja: 内容ダイジェスト}
      definitions:
        zh: 对该版本实际读取字节的 SHA-256 摘要。
        en: SHA-256 digest of bytes actually read for this version.
        ja: 当該版で実際 read した byte の SHA-256 digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 7333d79dd1c9a7608dc5c0c5f1e1e2292c1dd6165ac145121e48b19fbf507fb1
      allowed_values: []
      source_claims: [claim-file-resource-digest]
  constraints: []
  required_relations: []
examples:
  - id: FileResource-example-mcp-read
    labels:
      zh: MCP file 读取
      en: MCP file read
      ja: MCP file read
    descriptions:
      zh: MCP client 调用 resources/read 读取 file:///srv/legal/policy.md；ingest-run-17 记录 resource_id=file-policy-v7、version_ref=git:9f42c1a、digest 与 86,412 字节一致。
      en: MCP client calls resources/read on file:///srv/legal/policy.md; ingest-run-17 records resource_id=file-policy-v7, version_ref=git:9f42c1a, digest matching 86,412 bytes.
      ja: MCP client が resources/read で file:///srv/legal/policy.md を read。ingest-run-17 が resource_id=file-policy-v7、version_ref=git:9f42c1a、86,412 bytes 一致 digest を記録。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/read
    field_values:
      resource_id: file-policy-v7
      directory_id: dir-legal-2026-07
      file_uri: file:///srv/legal/policy.md
      version_ref: git:9f42c1a
    related_node_ids: [FileResource, IngestibleResource]
    related_relation_ids: []
    source_claims: [claim-file-resource-mcp]
  - id: FileResource-example-llamaindex-single
    labels:
      zh: LlamaIndex 单文件加载
      en: LlamaIndex single-file load
      ja: LlamaIndex 単 file load
    descriptions:
      zh: SimpleDirectoryReader(input_files=[...]) 读取 policy.pdf 返回 Document 列表；Moonweave 把 file URI 与 digest 建模为 FileResource，Document 由 NormalizationActivity 产出。
      en: SimpleDirectoryReader(input_files=[...]) reads policy.pdf into Documents; Moonweave models file URI and digest as FileResource while Document comes from NormalizationActivity.
      ja: SimpleDirectoryReader(input_files=[...]) が policy.pdf を Document 化。Moonweave は file URI/digest を FileResource、Document は NormalizationActivity 成果として建模。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      version: input_files
    field_values:
      file_uri: file:///data/corpus/policy.pdf
      loader: SimpleDirectoryReader
    related_node_ids: [FileResource, DocumentLoader, Document]
    related_relation_ids: []
    source_claims: [claim-file-resource-llamaindex]
  - id: FileResource-example-not-directory
    labels:
      zh: 文件非目录
      en: File is not directory
      ja: file は directory ではない
    descriptions:
      zh: dir-legal 指向 file:///srv/legal/ 含 manifest_digest 与多文件枚举能力，无单文件 file_uri；它是 DirectoryResource 而非 FileResource。
      en: dir-legal points to file:///srv/legal/ with manifest_digest and multi-file enumeration, lacking a single-file file_uri; it is DirectoryResource, not FileResource.
      ja: dir-legal は file:///srv/legal/ と manifest_digest/複数 file 列挙を持ち単 file file_uri なし。DirectoryResource で FileResource ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [FileResource, DirectoryResource]
    related_relation_ids: []
    source_claims: [claim-file-resource-design]
parent_relation:
  id: FileResource-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种可摄入资源
    en: is an ingestible resource
    ja: 取込可能リソースの一種
  definitions:
    zh: FileResource 种差为单文件 file_uri、directory_id 成员关系、version_ref 与 content_digest 共同标识一个可读文件版本。
    en: FileResource differentia is single-file file_uri plus directory_id membership, version_ref, and content_digest jointly identifying one readable file version.
    ja: FileResource 種差は単 file file_uri・directory_id membership・version_ref・content_digest が readable file version を共同識別。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-file-resource-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mcp-file
    title: MCP Server Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-doc
    relevance: file:// URI resources.
  - id: src-rfc8089
    title: RFC 8089 The file URI Scheme
    publisher: IETF
    url: https://www.rfc-editor.org/rfc/rfc8089
    source_type: normative
    relevance: file_uri syntax and semantics.
  - id: src-llamaindex-sdr
    title: SimpleDirectoryReader
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
    source_type: official-doc
    relevance: Per-file loading from directories.
  - id: src-file-resource-design
    title: Moonweave file resource boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Leaf file versus directory container.
source_claims:
  - id: claim-file-resource-mcp
    source: src-mcp-file
    supports: MCP resources/read retrieves file content by file:// URI.
    locator: Resources
    evidence_kind: official
    confidence: high
  - id: claim-file-resource-llamaindex
    source: src-llamaindex-sdr
    supports: SimpleDirectoryReader loads individual files into Documents while preserving file paths in metadata.
    locator: SimpleDirectoryReader
    evidence_kind: official
    confidence: high
  - id: claim-file-resource-design
    source: src-file-resource-design
    supports: FileResource identifies source bytes; Document identifies normalized content.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-id
    source: src-file-resource-design
    supports: resource_id stabilizes file resource lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-directory
    source: src-file-resource-design
    supports: directory_id scopes membership without replacing file_uri.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-uri
    source: src-rfc8089
    supports: file_uri follows RFC 8089 absolute file URI syntax.
    locator: RFC 8089
    evidence_kind: normative
    confidence: high
  - id: claim-file-resource-version
    source: src-file-resource-design
    supports: version_ref preserves source-system version handle.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-digest
    source: src-file-resource-design
    supports: content_digest binds bytes read for this file version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
