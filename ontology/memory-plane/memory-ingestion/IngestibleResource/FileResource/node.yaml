schema: moonweave.ai/ontology-node/v1
id: FileResource
kind: concept
status: accepted
labels:
  zh: 文件资源
  en: File resource
  ja: ファイルresource
semantics:
  short_definition:
    zh: 目录内以路径与内容版本标识的叶文件资源。
    en: A leaf file resource identified by path and content version within a directory.
    ja: directory内でpathとcontent版により識別するleaf file resourceです。
  definition:
    zh: FileResource 是属于一个 DirectoryResource、以文件路径和内容摘要标识的叶资源，可被加载器附加或解析；它不是解析后的 Document 或泛化 StorageArea。
    en: FileResource is a leaf resource belonging to one DirectoryResource and identified by file path plus content digest, eligible for loader attachment or parsing; it is not the parsed Document or a generic StorageArea.
    ja: FileResource は一 DirectoryResource に属しfile pathとcontent digestで識別してloader attach/parse可能なleaf resourceで、parsed Documentや一般StorageAreaではありません。
  why_needed:
    zh: 固定实际摄入文件的版本身份。
    en: Fixes the version identity of the actual file ingested.
    ja: 実際に取り込むfileの版同一性を固定します。
  includes:
    - zh: 纳入本地文件、对象存储对象和已上传文件句柄。
      en: Includes local files, object-store objects, and uploaded-file handles.
      ja: local file・object-store object・uploaded-file handleを含みます。
  excludes:
    - zh: 排除 DirectoryResource、Document 与 SourceAttachment。
      en: Excludes DirectoryResource, Document, and SourceAttachment.
      ja: DirectoryResource・Document・SourceAttachmentを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识文件资源。
        en: Stable identifier for the file resource.
        ja: file resourceの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: file-policy-v7
      source_claims:
        - claim-file-resource-002
    - id: directory_id
      labels:
        zh: 所属目录标识
        en: containing-directory ID
        ja: containing-directory ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次资源清单中直接包含该文件的目录；它限定成员关系，但不取代文件自身的 URI 与版本身份。
        en: Identifies the directory that directly contains the file in this resource manifest; it scopes membership but does not replace the file's own URI and version identity.
        ja: resource manifest で file を直接含む directory を識別し membership を限定しますが file 自身の URI/version identity を置換しません。
      allowed_values: []
      pattern: null
      example_value: dir-legal
      source_claims:
        - claim-file-resource-003
    - id: file_uri
      labels:
        zh: 文件 URI
        en: file URI
        ja: file URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按 RFC 8089 记录标识文件对象的绝对 file URI；该值保留 authority、大小写与编码，不退化为界面路径。
        en: Records the absolute file URI identifying the file object under RFC 8089, preserving authority, case, and encoding rather than reducing it to a display path.
        ja: RFC 8089 に従う absolute file URI で file object を識別し authority・case・encoding を保持して display path へ退化させません。
      allowed_values: []
      pattern: null
      example_value: file:///srv/policy/legal/policy.pdf
      source_claims:
        - claim-file-resource-004
    - id: version_ref
      labels:
        zh: 文件版本引用
        en: file version reference
        ja: file 版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用来源文件系统或对象存储分配的逻辑版本、对象代次或快照成员版本。
        en: References the logical version, object generation, or snapshot-member version assigned by the source filesystem or object store.
        ja: source filesystem/object store が付与した logical version・object generation・snapshot-member version を参照します。
      allowed_values: []
      pattern: null
      example_value: object-version:7
      source_claims:
        - claim-file-resource-005
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: content digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定文件字节版本。
        en: Fixes the file byte version.
        ja: file byte版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:file-policy-v7
      source_claims:
        - claim-file-resource-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: FileResource-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文件资源正例
      en: "Positive case: File resource"
      ja: ファイルresource正例
    scenario_id: null
    descriptions:
      zh: file-policy-v7 以 filesystem fs-policy、规范路径 /legal/policy.pdf、对象版本 7、字节长度和 SHA-256 b7 识别，可由 PDF loader 读取。
      en: file-policy-v7 is identified by filesystem fs-policy, canonical path /legal/policy.pdf, object version 7, byte length, and SHA-256 b7 and is readable by the PDF loader.
      ja: file-policy-v7 は filesystem、canonical path、object version、byte length、SHA-256 b7 で識別され PDF loader で読取可能です。
    field_values:
      resource_id: file-policy-v7
      directory_id: dir-legal
      file_uri: file:///srv/policy/legal/policy.pdf
      version_ref: object-version:7
      content_digest: "sha-256=:ZmlsZS1wb2xpY3ktdjc=:"
      canonical_locator: file:///srv/policy/legal/policy.pdf
    related_node_ids:
      - FileResource
    related_relation_ids: []
    expected_result:
      zh: 将该版本化字节对象表示为 FileResource，并保留其所属目录和内容摘要。
      en: Represent the versioned byte object as FileResource while retaining its directory membership and content digest.
      ja: 当該 versioned byte object を FileResource とし directory membership と content digest を保持します。
    why_valid_or_invalid:
      zh: 稳定路径、文件系统范围、对象版本和字节摘要共同固定可独立读取的叶资源身份。
      en: Stable path, file-system scope, object version, and byte digest jointly fix the identity of an independently readable leaf resource.
      ja: stable path、filesystem scope、object version、byte digest が独立読取可能な leaf resource identity を固定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-resource-007
  - id: FileResource-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文件资源边界例
      en: "Boundary case: File resource"
      ja: ファイルresource境界例
    scenario_id: null
    descriptions:
      zh: document-policy-v7 保存规范 Markdown 正文摘要 c7 和解析来源，但不保存源 PDF 的对象版本、原始字节长度或文件系统成员身份。
      en: document-policy-v7 stores normalized Markdown digest c7 and parsing provenance but not the source PDF's object version, original byte length, or file-system membership.
      ja: document-policy-v7 は normalized Markdown digest と parsing provenance を持ちますが source PDF の object version、byte length、filesystem membership を持ちません。
    field_values: {}
    related_node_ids:
      - FileResource
    related_relation_ids: []
    expected_result:
      zh: 把 document-policy-v7 表示为 Document，并用来源关系回指 FileResource。
      en: Represent document-policy-v7 as Document and point back to FileResource through provenance relations.
      ja: document-policy-v7 は Document とし provenance relation で FileResource を参照します。
    why_valid_or_invalid:
      zh: 规范信息产物可从同一文件生成多个版本，不能用解析后的内容对象替代源文件实体。
      en: Several normalized information versions may be generated from one file, so a parsed content object cannot replace the source-file entity.
      ja: 一 file から複数 normalized information version が生成され得るため parsed content object は source file entity を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-resource-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: FileResource-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: FileResource 是一种 IngestibleResource；其种差是标识目录中的一个可独立读取文件版本：directory_id 指出成员归属，file_uri 定位单个文件，version_ref 固定版本，content_digest 校验该版本实际字节。访问权限是运行约束，不属于该类型的种差。
    en: "A FileResource is an IngestibleResource distinguished by identifying one independently readable file version within a directory: directory_id records membership, file_uri locates the single file, version_ref fixes its version, and content_digest verifies the bytes of that version. Access permission is a runtime constraint, not part of the type differentia."
    ja: FileResource は IngestibleResource の一種で、directory 内の独立読取可能な一 file version を識別する種差を持ちます。directory_id は所属、file_uri は単一 file、version_ref は版、content_digest はその版の実 byte を固定します。access permission は runtime constraint であり型の種差ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions:
    - id: FileResource-is_a-IngestibleResource-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Classify as FileResource only when resource_id, directory_id, canonical file_uri, version_ref, and content_digest jointly identify one readable file version.
      explanations:
        zh: 仅当 resource_id、directory_id、规范 file_uri、version_ref 与 content_digest 共同标识一个可读取文件版本时归为 FileResource。
        en: Classify as FileResource only when resource_id, directory_id, canonical file_uri, version_ref, and content_digest jointly identify one readable file version.
        ja: resource_id・directory_id・canonical file_uri・version_ref・content_digest が一つの readable file version を共同識別する時だけ FileResource に分類します。
      source_claims:
        - claim-file-resource-009
        - claim-file-resource-010
        - claim-file-resource-011
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FileResource-is_a-IngestibleResource-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 资源 file-policy-v7 是目录 dir-legal-2026-07 的一个文件成员，定位符为 file:///srv/legal/policy.md，version_ref 固定 Git 对象 9f42c1a，content_digest 与加载器读取的 86,412 字节一致。它可作为摄入输入被独立读取。
        en: Resource file-policy-v7 is one file member of directory dir-legal-2026-07 at file:///srv/legal/policy.md. version_ref fixes Git object 9f42c1a and content_digest matches the 86,412 bytes read by the loader, so it can be read independently as ingestion input.
        ja: resource file-policy-v7 は directory dir-legal-2026-07 の一 file member で、file:///srv/legal/policy.md にあります。version_ref は Git object 9f42c1a を固定し、content_digest は loader が読んだ86,412 bytes と一致するため独立 ingestion input として読めます。
      field_values:
        resource_id: file-policy-v7
        directory_id: dir-legal-2026-07
        file_uri: file:///srv/legal/policy.md
        version_ref: git:9f42c1a
        content_digest: "sha-256=:y8qM6m4FhV2S8I4eTnQv4w==:"
      related_node_ids:
        - FileResource
        - IngestibleResource
      related_relation_ids:
        - FileResource-is_a-IngestibleResource
      expected_result:
        zh: 验证器将 file-policy-v7 归为 FileResource，并通过 FileResource-is_a-IngestibleResource 上溯；文件是否被某次运行实际读取由 reads 边另行表达。
        en: Validation classifies file-policy-v7 as FileResource and follows FileResource-is_a-IngestibleResource upward; whether a particular run actually reads the file is represented separately by a reads edge.
        ja: 検証器は file-policy-v7 を FileResource とし FileResource-is_a-IngestibleResource で上位化します。特定 run が実際に読むかは別の reads edge で表します。
      why_valid_or_invalid:
        zh: 单文件定位符、容器目录、固定版本和字节摘要共同给出 FileResource 种差；加载器名称、处理状态和访问授权仍分别属于运行、附件与安全关系。
        en: The single-file locator, containing directory, fixed version, and byte digest jointly provide the FileResource differentia. Loader name, processing status, and authorization remain properties of the run, attachment, and safety relations respectively.
        ja: single-file locator・containing directory・fixed version・byte digest が FileResource 種差を共同で与えます。loader 名・processing status・authorization はそれぞれ run・attachment・safety relation に残ります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-file-resource-012
        - claim-file-resource-013
        - claim-file-resource-014
    - id: FileResource-is_a-IngestibleResource-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 资源 dir-legal-2026-07 指向 file:///srv/legal/，其摘要覆盖成员清单并允许从该根枚举多个文件；它没有指向单个文件的 file_uri 或单文件字节摘要。因此它是 DirectoryResource，而不是 FileResource。
        en: Resource dir-legal-2026-07 points to file:///srv/legal/, its digest covers a member manifest, and it permits multiple files to be enumerated from that root. It has neither a file_uri for one file nor a digest over one file's bytes, so it is DirectoryResource rather than FileResource.
        ja: resource dir-legal-2026-07 は file:///srv/legal/ を指し、digest は member manifest を対象とし、その root から複数 file を列挙できます。一 file の file_uri や一 file byte digest を持たないため FileResource でなく DirectoryResource です。
      field_values:
        candidate_kind: DirectoryResource
        resource_id: dir-legal-2026-07
        filesystem_id: fs-policy
        directory_uri: file:///srv/legal/
        version_ref: snapshot-2026-07-15
        manifest_digest: "sha-256=:z9JvY3J8e2r5M2R4q1lQxg==:"
      related_node_ids:
        - FileResource
        - IngestibleResource
        - DirectoryResource
      related_relation_ids:
        - FileResource-is_a-IngestibleResource
        - DirectoryResource-is_a-IngestibleResource
      expected_result:
        zh: 验证器拒绝把 dir-legal-2026-07 归为 FileResource，同时保留其 DirectoryResource 到 IngestibleResource 的有效上溯。
        en: Validation rejects FileResource membership for dir-legal-2026-07 while retaining its valid DirectoryResource-to-IngestibleResource classification.
        ja: 検証器は dir-legal-2026-07 の FileResource 所属を拒否し、DirectoryResource から IngestibleResource への有効な上位分類を維持します。
      why_valid_or_invalid:
        zh: 目录能包含文件并不意味着目录本身是文件。manifest_digest 校验目录版本的成员集合，content_digest 校验单文件版本的字节，两种摘要服务于不同身份。
        en: A directory's ability to contain files does not make the directory a file. manifest_digest verifies a directory version's member set, whereas content_digest verifies the bytes of one file version; the digests serve different identities.
        ja: directory が file を含めても directory 自身は file になりません。manifest_digest は directory version の member set、content_digest は一 file version の bytes を検証し、異なる同一性に仕えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-file-resource-015
        - claim-file-resource-016
  source_claims:
    - claim-file-resource-017
    - claim-file-resource-018
    - claim-file-resource-019
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
