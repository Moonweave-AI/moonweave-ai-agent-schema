source_claims:
  - id: claim-file-resource-001
    source: eng-api-openai-vector-store-files
    supports: OpenAI's vector-store files API explicitly models file attachment identity, processing state, attributes, chunking, content, and deletion.
    locator: Vector store files API > create and retrieve file; status, last_error, attributes, chunking_strategy, content, and delete
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-002
    source: eng-api-openai-vector-store-files
    supports: FileResource.resource_id records the file's persistent identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Vector store files API > create and retrieve file; status, last_error, attributes, chunking_strategy, content, and delete
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-003
    source: eng-fw-langchain-document-loaders
    supports: Official loader documentation distinguishes directory loaders from file loaders; Moonweave records the containing-directory endpoint rather than inferring it from display path text.
    locator: Document loader integrations > Cloud providers > directory and file loaders
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-004
    source: eng-std-rfc8089-file-uri
    supports: RFC 8089 specifies file URIs as identifiers for objects in a filesystem and defines the authority and absolute-path syntax used by FileResource.file_uri.
    locator: RFC 8089 > Sections 1–2, Introduction and Syntax
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-file-resource-005
    source: eng-api-openai-vector-store-files
    supports: The official vector-store file object separates file identity and processing state; Moonweave preserves the source system's version handle separately from the bytes' integrity digest.
    locator: Vector store files API > The vector store file object; retrieve vector store file
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-006
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines Content-Digest as an algorithm-keyed digest calculated over actual message content; FileResource.content_digest uses that integrity semantics rather than serving as a logical version label.
    locator: RFC 9530 > Section 2, The Content-Digest Field
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-file-resource-007
    source: eng-api-openai-vector-store-files
    supports: OpenAI vector-store files identify attached files and expose status, attributes, chunking strategy, content, and deletion.
    locator: Vector store files API > create and retrieve file; status, last_error, attributes, chunking_strategy, content, and delete
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-008
    source: eng-api-openai-vector-store-files
    supports: OpenAI distinguishes a vector-store file attachment from parsed content and chunking results.
    locator: Vector store files API > create and retrieve file; status, last_error, attributes, chunking_strategy, content, and delete
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-009
    source: eng-fw-langchain-document-loaders
    supports: LangChain documents source-specific file loaders that read one configured file source into Documents. Moonweave represents the stable file source as FileResource and keeps the loader execution in IngestionRun.
    locator: Document loader integrations > File system loaders; Interface > BaseLoader load() and lazy_load()
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-file-resource-010
    source: eng-std-rfc8089-file-uri
    supports: RFC 8089 defines file URI syntax and filesystem path interpretation, grounding file_uri as the locator of one file resource without asserting existence or authorization.
    locator: RFC 8089 > Section 2 Syntax; Section 3 Operations Involving file URIs; Section 5 Security Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-011
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines content digests over representation data. Moonweave uses content_digest to bind FileResource identity to the bytes read for its fixed version_ref.
    locator: RFC 9530 > Section 2.1 Content-Digest; Section 4 Integrity Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-012
    source: eng-fw-langchain-document-loaders
    supports: LangChain's file-loader interface grounds the concrete operation of reading one file source into Documents. Moonweave's example assigns that source stable resource and version identity before any particular run reads it.
    locator: Document loader integrations > File system loaders; Interface > BaseLoader load() and lazy_load()
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-file-resource-013
    source: eng-std-rfc8089-file-uri
    supports: RFC 8089 supports file:///srv/legal/policy.md as a file URI locator. Moonweave separately records directory membership and version because URI syntax alone does not establish either fact.
    locator: RFC 8089 > Section 2 Syntax; Section 3 Operations Involving file URIs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-014
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 grounds verification of representation bytes with a content digest. The example uses the digest to distinguish this file version from another version reachable at the same file URI.
    locator: RFC 9530 > Section 2.1 Content-Digest; Section 4 Integrity Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-resource-015
    source: eng-fw-langchain-document-loaders
    supports: LangChain's directory loader enumerates member files and can delegate them to file loaders, preserving the operational distinction between the directory source and each file source. Moonweave reflects that distinction in separate resource subtypes.
    locator: Document loader integrations > File system > Directory loader and file-specific loaders
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-file-resource-016
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines digest verification over content but does not make every digest-bearing object a file. Moonweave distinguishes a directory manifest digest from the content digest of a single file version.
    locator: RFC 9530 > Section 2.1 Content-Digest; Section 4 Integrity Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
