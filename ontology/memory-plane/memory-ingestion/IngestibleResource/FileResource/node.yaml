schema: moonweave.ai/ontology-node/v1
id: FileResource
kind: concept
status: accepted
labels: {zh: 文件资源, en: File Resource, ja: ファイルリソース}
semantics:
  short_definition:
    zh: 由规范文件定位符、版本引用和字节摘要固定的可独立读取文件来源。
    en: An independently readable file source pinned by canonical file locator, version reference, and byte digest.
    ja: canonical file locator、version reference、byte digest により pin された independently readable file source。
  definition:
    zh: >-
      FileResource 是 IngestibleResource 的特化，表示目录或文件系统中的一个可版本化文件对象。它保留 resource_id，并以 file_resource_id、
      canonical_locator、version_ref、content_digest 和 media_type 标识，并可选引用所属 DirectoryResource。它不是 FileSystem、
      DirectoryResource、文件内容被加载后的 Document、Chunk、DocumentLoader、访问令牌、MemoryFile、索引条目或模型上下文。
      IngestionRun 可读取该固定文件版本并生成独立信息工件；同一路径的新字节或新版本必须成为另一个 FileResource 版本。
    en: >-
      A FileResource is an IngestibleResource specialization representing one versionable file object in a directory or
      file system. It retains resource_id and is further identified by file_resource_id, canonical_locator, version_ref, content_digest, and media_type,
      and may reference its DirectoryResource. It is not FileSystem, DirectoryResource, Document after file content is
      loaded, Chunk, DocumentLoader, access token, MemoryFile, index entry, or model context. An IngestionRun can read
      this pinned file version and generate separate information artifacts; new bytes or version at same path must form a
      different FileResource version.
    ja: >-
      FileResource は directory 又は file system 内の一つの versionable file object を表す IngestibleResource specialization
      です。resource_id を保持し、file_resource_id、canonical_locator、version_ref、content_digest、media_type によりさらに識別され、DirectoryResource を
      任意参照できます。FileSystem、DirectoryResource、file content を load した後の Document、Chunk、DocumentLoader、access token、
      MemoryFile、index entry、model context ではありません。IngestionRun はこの pin された file version を read して別の
      information artifact を生成できます。同じ path の新 bytes 又は version は別の FileResource version にならなければなりません。
  why_needed:
    zh: 文件级身份让摄入能精确重读、验证和追溯特定源版本，而不会把路径、文档或加载器混为文件对象。
    en: File-level identity makes ingestion precisely repeatable, verifiable, and traceable to one source version without conflating path, document, or loader with file object.
    ja: file-level identity により path、document、loader を file object と混同せず、一つの source version へ precise・repeatable・verifiable・traceable な ingestion ができる。
  includes:
    - zh: S3 中 policy.pdf 的对象版本 7、SHA-256 字节摘要和 application/pdf 媒体类型。
      en: Object version 7, SHA-256 byte digest, and application/pdf media type for policy.pdf in S3.
      ja: S3 の policy.pdf の object version 7、SHA-256 byte digest、application/pdf media type。
  excludes:
    - zh: 文件系统根、目录清单、加载后的 Document、路径字符串、访问密钥、内存文本片段和向量。
      en: File-system root, directory manifest, loaded Document, path string, access key, in-memory text fragment, or vector.
      ja: file-system root、directory manifest、loaded Document、path string、access key、in-memory text fragment、vector。
  semantic_kind: entity
  aliases: [versioned ingestion file, source file artifact]
engineering:
  explanation:
    zh: >-
      摄入器以无秘密定位符发现文件，记录来源版本并对实际读取字节计算或核验摘要，然后调用匹配格式的 loader。LangChain 文档
      加载器把不同外部来源转换为 Document；RFC 6920 说明算法标识摘要可为资源命名或完整性验证提供依据。Moonweave 因而将文件
      版本、加载器执行和生成 Document 保留为独立对象。
    en: >-
      An ingestor discovers a file from credential-free locator, records source version, computes or verifies digest over
      bytes actually read, and invokes a loader matching its format. LangChain document loaders convert different external
      sources to Documents, and RFC 6920 shows how algorithm-tagged digest supports resource naming or integrity
      verification. Moonweave therefore keeps file version, loader execution, and generated Document as separate objects.
    ja: >-
      ingestor は credential-free locator から file を発見し、source version を記録し、実際に read した bytes の digest を計算又は
      verify して format に合う loader を呼びます。LangChain document loader は異なる external source を Document に変換し、
      RFC 6920 は algorithm-tagged digest が resource naming 又は integrity verification を支えることを示します。従って
      Moonweave は file version、loader execution、generated Document を別 object として保持します。
  typical_input:
    - description: Version-pinned source file descriptor
      format: |
        {"resource_id":"resource-file-policy-v7","file_resource_id":"file-policy-v7","canonical_locator":"s3://policy-corpus/legal/policy.pdf","version_ref":"s3-version:7","content_digest":"ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q","media_type":"application/pdf"}
  typical_output:
    - description: Read result linked to file version
      format: |
        {"file_resource_ref":"file-policy-v7","ingestion_run_ref":"ingest-policy-17","read_version_ref":"s3-version:7","document_ref":"document-policy-v7"}
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents source-specific loaders with common load and lazy_load behavior.
    - name: RFC 6920 Named Information
      url: https://datatracker.ietf.org/doc/rfc6920/
      description: Defines algorithm-tagged hash identifiers for resource identity and integrity.
structure:
  identity_keys: [resource_id, file_resource_id]
  fields:
    - id: resource_id
      labels: {zh: 父资源标识, en: parent resource ID, ja: 親リソースID}
      definitions:
        zh: 保留此文件作为 IngestibleResource 的稳定来源身份，不用路径或文件显示名替代。
        en: Retains the file's stable source identity as an IngestibleResource rather than substituting its path or display name.
        ja: path や表示 file 名で置き換えず、この file の IngestibleResource としての安定 source ID を保持します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: "^resource-file-[A-Za-z0-9._-]+$"
      example_value: resource-file-policy-v7
      source_claims: [claim-file-resource-specialization]
    - id: file_resource_id
      labels: {zh: 文件资源标识, en: file-resource ID, ja: file-resource ID}
      definitions:
        zh: 稳定标识一个具体文件版本，不是显示文件名。
        en: Stably identifies one concrete file version, not display file name.
        ja: display file name ではなく一つの concrete file version を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: file-policy-v7
      source_claims: [claim-file-resource-identity]
    - id: canonical_locator
      labels: {zh: 规范文件定位符, en: canonical file locator, ja: 正規 file locator}
      definitions: {zh: 无秘密、可由受支持加载器解析到文件字节的定位符。, en: Credential-free locator resolving to file bytes through supported loader., ja: supported loader により file bytes へ resolve する credential-free locator。}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: s3://policy-corpus/legal/policy.pdf
      source_claims: [claim-file-resource-loader]
    - id: version_ref
      labels: {zh: 文件版本引用, en: file version reference, ja: file version 参照}
      definitions:
        zh: 来源系统给出的对象版本、提交或快照，不等同于摘要。
        en: Object version, commit, or snapshot supplied by source system, not digest itself.
        ja: source system が提供する object version、commit、snapshot であり digest 自体ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: s3-version:7
      source_claims: [claim-file-resource-identity]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: content digest}
      definitions: {zh: 对该版本实际文件字节计算的算法标识摘要。, en: Algorithm-tagged digest calculated over actual bytes of this version., ja: この version の実際 file bytes から計算した algorithm-tagged digest。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q
      source_claims: [claim-file-resource-digest]
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディアタイプ}
      definitions:
        zh: 声明文件表示格式以选择解析器，不是文档语义类别。
        en: Declares file presentation format for parser selection, not document semantic category.
        ja: parser selection 用の file presentation format を宣言し、document semantic category ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: application/pdf
      source_claims: [claim-file-resource-loader]
    - id: directory_ref
      labels: {zh: 所属目录引用, en: owning directory reference, ja: 所属 directory 参照}
      definitions: {zh: 可选引用枚举此文件的 DirectoryResource，不替代文件定位符。, en: Optionally references DirectoryResource that enumerates file without replacing locator., ja: locator を置き換えず file を enumerate する DirectoryResource を任意参照する。}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: dir-legal-2026-07
      source_claims: [claim-file-resource-directory-boundary]
  constraints:
    - id: file-resource-version-integrity
      severity: error
      expression_language: plain
      expression: resource_id, file_resource_id, canonical_locator, version_ref, content_digest, and media_type are required. content_digest must verify bytes read at version_ref. A changed version or digest at same locator creates a distinct FileResource version. Locator and metadata must contain no credential. A directory, loaded Document, Chunk, loader, vector, candidate, or prompt context cannot substitute for file identity.
      explanation:
        zh: 文件路径、版本、字节内容和读取产物是不同事实，必须防止同一路径静默覆盖来源版本。
        en: File path, version, bytes, and read product are different facts; same-path source versions must not be silently overwritten.
        ja: file path、version、bytes、read product は別 fact であり、同じ path の source version を黙って上書きしてはならない。
      source_claims: [claim-file-resource-digest, claim-file-resource-loader, claim-file-resource-boundary]
  required_relations: []
examples:
  - id: file-resource-positive

    labels: {zh: 版本固定政策 PDF, en: Version-pinned policy PDF, ja: version-pin された policy PDF}

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values: {resource_id: resource-file-policy-v7, file_resource_id: file-policy-v7, canonical_locator: s3://policy-corpus/legal/policy.pdf, version_ref: 's3-version:7', content_digest: 'ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q', media_type: application/pdf, directory_ref: dir-legal-2026-07}
    related_node_ids: [FileResource, IngestibleResource, DirectoryResource, IngestionRun]
    related_relation_ids: [FileResource-is_a-IngestibleResource]

    source_claims: [claim-file-resource-identity, claim-file-resource-digest]
  - id: file-resource-boundary

    labels: {zh: 同一路径的新文件版本, en: New file version at same path, ja: 同じ path の新 file version}

    descriptions: {zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。, en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary., ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。}
    field_values: {file_resource_id: file-policy-v8, canonical_locator: s3://policy-corpus/legal/policy.pdf, version_ref: 's3-version:8', content_digest: 'ni:///sha-256;dGVzdC12OC1kaWdlc3Q', media_type: application/pdf, directory_ref: dir-legal-2026-07}
    related_node_ids: [FileResource, IngestionRun]
    related_relation_ids: []

    source_claims: [claim-file-resource-digest]
  - id: file-resource-counterexample

    labels: {zh: PDF 加载器不是文件资源, en: PDF loader is not file resource, ja: PDF loader は file resource ではない}

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values: {loader_id: loader-pdf-v3, supported_media_type: application/pdf, canonical_locator: absent, content_digest: absent}
    related_node_ids: [FileResource, DocumentLoader]
    related_relation_ids: []

    source_claims: [claim-file-resource-loader]
  - id: file-resource-instance

    labels: {zh: 实例：项目记忆 Markdown 文件, en: "Instance: project-memory Markdown file", ja: "事例: project-memory Markdown file"}

    descriptions: {zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。, en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking., ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。}
    field_values: {resource_id: resource-file-project-memory-v3, file_resource_id: project-memory-v3, canonical_locator: 'file:///workspace/.agent/project-memory.md', version_ref: 'git:3a1c9ef', content_digest: 'sha256:project-memory-v3', media_type: text/markdown, directory_ref: dir-project-agent}
    related_node_ids: [FileResource, Document, Chunk, IngestionRun]
    related_relation_ids: [FileResource-is_a-IngestibleResource]

    source_claims: [claim-file-resource-boundary, claim-file-resource-identity]
parent_relation:
  id: FileResource-is_a-IngestibleResource
  predicate: is_a
  target: concept:IngestibleResource
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是可摄入资源的文件特化, en: is file specialization of ingestible resource, ja: ingestible resource の file specialization である}
  definitions: {zh: FileResource 以可定位文件版本和字节摘要满足 IngestibleResource 种差。, en: FileResource satisfies IngestibleResource differentia with locatable file version and byte digest., ja: FileResource は locate 可能な file version と byte digest で IngestibleResource differentia を満たす。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_specialization, labels: {zh: 有文件特化, en: has file specialization, ja: file specialization を持つ}}
  conditions:
    - id: file-resource-is-a-condition
      severity: error
      expression_language: plain
      expression: Assert only when an object satisfies IngestibleResource identity and additionally identifies one independently readable file with canonical locator, source version, content digest, and media type. A directory, loader, document, token, vector, or index entry does not satisfy this specialization.
      explanation: {zh: 文件种差是一个具体可校验文件版本，而不是路径或处理能力。, en: File differentia is one concrete verifiable file version, not path or processing capability., ja: file differentia は path や processing capability ではなく一つの concrete verify 可能な file version である。}
      source_claims: [claim-file-resource-specialization]
  temporal_scope: valid-time
  boundary_context: Reading a file may generate documents and chunks, but generation does not merge those outputs into source-file identity.
  constraints: []
  examples: []
  source_claims: [claim-file-resource-specialization]
  distinct_fact_rationale: This relation captures a versioned source-file kind, distinct from containment, loading execution, and generated content.
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-document-loaders
    title: LangChain document loaders
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    source_type: official-doc
    relevance: Documents loaders reading different source formats into Documents through common interfaces.
  - id: rfc-6920
    title: RFC 6920 Named Information
    url: https://datatracker.ietf.org/doc/rfc6920/
    source_type: standard
    relevance: Defines algorithm-tagged content hashes for resource identity and integrity.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines source entities and separately generated information artifacts.
source_claims:
  - id: claim-file-resource-loader
    source: langchain-document-loaders
    supports: LangChain documents loaders that read data from external source formats into Documents. Moonweave records a versioned source file before loader execution and preserves the loader and Document as separate facts.
    locator: "Document loaders: common load/lazy_load interface and source integrations"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-file-resource-digest
    source: rfc-6920
    supports: RFC 6920 defines a hash algorithm and digest value in a named-information identifier. Moonweave uses an algorithm-tagged digest to verify bytes of one separately located and versioned source file.
    locator: "RFC 6920 sections 1 and 3: ni URI algorithm and digest value"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-file-resource-identity
    source: w3c-prov-o
    supports: PROV-O distinguishes independently identifiable source entities and activities. Moonweave identifies one file version independently from the later read, parsing, normalization, and generated Document.
    locator: "PROV-O: Entity, Activity, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-file-resource-directory-boundary
    source: w3c-prov-o
    supports: PROV-O supports distinct entities and relationships among them. Moonweave keeps a directory enumeration relationship separate from one file's locator, version, and byte-integrity identity.
    locator: "PROV-O: Entity and relation between entities"
    evidence_kind: ontology-design-inference
    confidence: low
  - id: claim-file-resource-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes source entity from entities generated by an activity. Moonweave keeps FileResource separate from Document, Chunk, index structures, candidates, and model context after reading.
    locator: "PROV-O: Entity, Activity, prov:wasGeneratedBy, and derivation"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-file-resource-specialization
    source: rfc-6920
    supports: A separately locatable resource can be paired with an algorithm-tagged digest for integrity. Moonweave models a source object with locator, version, digest, and media type as the file specialization of IngestibleResource.
    locator: "RFC 6920 sections 1 and 3: named resource and locator/dereference distinction"
    evidence_kind: ontology-design-inference
    confidence: medium
