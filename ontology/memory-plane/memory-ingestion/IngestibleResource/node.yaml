schema: moonweave.ai/ontology-node/v1
id: IngestibleResource
kind: concept
status: accepted
labels: {zh: 可摄入资源, en: Ingestible Resource, ja: 取込可能リソース}
semantics:
  short_definition:
    zh: 在读取前可被加载器定位、版本固定并作为摄入输入访问的外部源工件。
    en: An external source artifact that a loader can locate, version-pin, and access as ingestion input before reading.
    ja: read 前に loader が locate、version-pin、ingestion input として access できる external source artifact。
  definition:
    zh: >-
      IngestibleResource 是可由 IngestionRun 读取的外部源实体，由 resource_id、canonical_locator 和至少一个 version_ref 或
      content_digest 识别。定位符说明从哪里访问，version_ref 说明来源系统选择的逻辑版本或快照，content_digest 校验实际读取的
      字节或清单。它可以是文件、目录、文件系统、数据库或图存储的来源对象，但不是 Document、Chunk、IngestibleInformation、
      DocumentLoader、连接凭据、IngestionRun 或读取后被放入模型的 Context Assembly。一次读取、解析或规范化会产生独立的
      活动与信息工件，不能把它们回写成源资源身份。
    en: >-
      An IngestibleResource is an external source entity that an IngestionRun can read, identified by resource_id,
      canonical_locator, and at least one version_ref or content_digest. The locator says where to access it; version_ref
      says which logical version or snapshot the source system selected; content_digest verifies bytes or a manifest that
      was actually read. It can be a source file, directory, file system, database, or graph store, but it is not a
      Document, Chunk, IngestibleInformation, DocumentLoader, connection credential, IngestionRun, or Context Assembly
      placed in a model after reading. Reading, parsing, or normalization creates separate activities and information
      artifacts and cannot be written back as source-resource identity.
    ja: >-
      IngestibleResource は IngestionRun が read できる external source entity で、resource_id、canonical_locator、少なくとも一つの
      version_ref 又は content_digest により識別されます。locator は access 場所を、version_ref は source system が選んだ
      logical version 又は snapshot を、content_digest は実際に read した bytes 又は manifest を検証します。source file、
      directory、file system、database、graph store になれますが、Document、Chunk、IngestibleInformation、DocumentLoader、
      connection credential、IngestionRun、read 後に model に置かれた Context Assembly ではありません。reading、parsing、
      normalization は別の activity と information artifact を作り、source-resource identity に書き戻せません。
  why_needed:
    zh: 将来源对象与加载器、读取活动和标准化文档分开，能够重读相同版本、验证来源完整性并解释下游内容来自何处。
    en: Separating source object from loader, read activity, and normalized document enables repeatable reads, source-integrity verification, and explainable downstream provenance.
    ja: source object を loader、read activity、normalized document から分離すると、repeatable read、source-integrity verification、explainable な downstream provenance が可能になる。
  includes:
    - zh: 具有可解析 S3 URI、对象版本和字节摘要的 PDF 文件，或具有版本化清单摘要的目录资源。
      en: A PDF file with resolvable S3 URI, object version, and byte digest, or a directory resource with a versioned manifest digest.
      ja: resolve 可能な S3 URI、object version、byte digest を持つ PDF file、又は versioned manifest digest を持つ directory resource。
  excludes:
    - zh: 加载器实现、未带来源版本的内存字符串、处理后的 Document、访问密钥、检索候选和最终提示词上下文。
      en: A loader implementation, an in-memory string without source version, a processed Document, access key, retrieval candidate, or final prompt context.
      ja: loader implementation、source version を持たない in-memory string、処理済み Document、access key、retrieval candidate、最終 prompt context。
  semantic_kind: entity
  aliases: [ingestion source artifact, versioned source resource]
engineering:
  explanation:
    zh: >-
      摄入编排器先登记不含秘密的资源描述符，固定 locator、来源版本和可用内容摘要，再将它交给支持该格式的加载器。LangChain
      文档加载器以统一 load/lazy_load 接口从不同外部来源生成 Document；Moonweave 在调用前保留资源身份，在调用后使用
      单独 IngestionRun 和 Document 记录读取与转换。RFC 6920 说明散列可用于命名或校验资源，但不能取代定位器或秘密管理。
    en: >-
      An ingestion orchestrator first registers a credential-free resource descriptor, fixes locator, source version, and
      available content digest, then passes it to a loader that supports the format. LangChain document loaders expose a
      common load/lazy_load interface for converting different external sources into Documents; Moonweave retains resource
      identity before the call and uses separate IngestionRun and Document facts after the read and conversion. RFC 6920
      shows how a hash can name or verify a resource, but it cannot replace a locator or secret management.
    ja: >-
      ingestion orchestrator は最初に credential-free な resource descriptor を登録し、locator、source version、利用可能な
      content digest を固定してから format を support する loader に渡します。LangChain document loader は異なる external source を
      Document に変換する共通 load/lazy_load interface を提供します。Moonweave は call 前に resource identity を保持し、read と
      conversion 後に別の IngestionRun と Document fact を使います。RFC 6920 は hash が resource を name 又は verify できることを
      示しますが、locator や secret management を置き換えられません。
  typical_input:
    - description: Credential-free version-pinned source descriptor
      format: |
        resource = {
          "resource_id": "file-policy-v7",
          "canonical_locator": "s3://policy-corpus/legal/policy.pdf",
          "version_ref": "s3-version:7",
          "content_digest": "ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q"
        }
  typical_output:
    - description: Read observation before normalization
      format: |
        {
          "resource_ref": "file-policy-v7",
          "read_version_ref": "s3-version:7",
          "verified_content_digest": "ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q",
          "ingestion_run_ref": "ingest-policy-17"
        }
  reference_implementations:
    - name: LangChain document loaders
      url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
      description: Documents loaders that read data from many sources through load and lazy_load into Document objects.
    - name: RFC 6920 Named Information
      url: https://datatracker.ietf.org/doc/rfc6920/
      description: Defines hash-based named-information identifiers for resource identity and integrity checking.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities, activities, generation, and derivation for distinguishing a source from produced information.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: resource ID, ja: リソース ID}
      definitions:
        zh: 稳定标识一个待摄入来源对象，而不是加载器、文档或某次读取执行。
        en: Stably identifies one source object awaiting ingestion, not a loader, document, or one read execution.
        ja: loader、document、一回の read execution ではなく ingestion を待つ一つの source object を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: file-policy-v7
      source_claims: [claim-ingestible-resource-source-identity]
    - id: canonical_locator
      labels: {zh: 规范定位符, en: canonical locator, ja: 正規 locator}
      definitions:
        zh: 记录支持的加载器可解析的来源位置；它不包含访问令牌或密码。
        en: Records source location resolvable by a supported loader; it contains no access token or password.
        ja: support された loader が resolve できる source location を記録し、access token や password を含まない。
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: s3://policy-corpus/legal/policy.pdf
      source_claims: [claim-ingestible-resource-loader]
    - id: version_ref
      labels: {zh: 版本引用, en: version reference, ja: バージョン参照}
      definitions:
        zh: 可选记录来源系统选择的逻辑版本、快照或对象代次，不等同于内容摘要。
        en: Optionally records logical version, snapshot, or object generation selected by source system; it is not a content digest.
        ja: source system が選んだ logical version、snapshot、object generation を任意記録し、content digest ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: s3-version:7
      source_claims: [claim-ingestible-resource-version-boundary]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: content digest}
      definitions:
        zh: 可选记录对实际读取字节或目录清单计算的算法标识摘要，用于验证具体版本。
        en: Optionally records an algorithm-tagged digest of bytes or directory manifest actually read, verifying a concrete version.
        ja: 実際に read した bytes 又は directory manifest の algorithm-tagged digest を任意記録し、concrete version を verify する。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q
      source_claims: [claim-ingestible-resource-digest]
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディアタイプ}
      definitions:
        zh: 可选声明资源呈现格式以选择加载器，不把格式本身当作已生成文档。
        en: Optionally declares source presentation format for loader selection without treating format itself as generated document.
        ja: loader selection 用に source presentation format を任意宣言し、format 自体を生成済み document と扱わない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: application/pdf
      source_claims: [claim-ingestible-resource-loader]
  constraints:
    - id: ingestible-resource-versioned-address
      severity: error
      expression_language: plain
      expression: resource_id and canonical_locator are required. At least one of version_ref or content_digest must be present; when both are present, the digest must verify the bytes or manifest read for that logical version. canonical_locator and all other fields must not contain credentials. A processed Document, Chunk, loader implementation, runtime connection, query candidate, or Context Assembly does not satisfy this source-resource identity.
      explanation:
        zh: 可重复摄入需要位置和版本证据；版本、字节完整性、读取活动和处理产物必须分别审计。
        en: Repeatable ingestion needs both location and version evidence; version, byte integrity, read activity, and processed artifact must be audited separately.
        ja: repeatable ingestion には location と version evidence の両方が必要であり、version、byte integrity、read activity、processed artifact は別々に audit しなければならない。
      source_claims: [claim-ingestible-resource-loader, claim-ingestible-resource-digest, claim-ingestible-resource-source-boundary]
  required_relations: []
examples:
  - id: ingestible-resource-positive

    labels: {zh: 版本固定的政策 PDF, en: Version-pinned policy PDF, ja: version-pin された policy PDF}

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values: {resource_id: file-policy-v7, canonical_locator: s3://policy-corpus/legal/policy.pdf, version_ref: 's3-version:7', content_digest: 'ni:///sha-256;UyaQV-Ev4rdLoHyJJWCi11OHfrYv9E1aGQAlMO2X_-Q', media_type: application/pdf}
    related_node_ids: [IngestibleResource, IngestionRun, DocumentLoader]
    related_relation_ids: [IngestionRun-reads-IngestibleResource]

    source_claims: [claim-ingestible-resource-loader, claim-ingestible-resource-digest]
  - id: ingestible-resource-boundary

    labels: {zh: 已读取后产生的文档, en: Document produced after read, ja: read 後に生成された Document}

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values: {document_id: document-policy-v7, generated_by_run_ref: normalize-17, source_resource_ref: file-policy-v7, content_digest: sha256:normalized-policy-v7}
    related_node_ids: [IngestibleResource, Document, IngestionRun]
    related_relation_ids: []

    source_claims: [claim-ingestible-resource-source-boundary]
  - id: ingestible-resource-counterexample

    labels: {zh: 访问凭据不是资源, en: Access credential is not resource, ja: access credential は resource ではない}

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values: {credential_kind: s3-access-key, canonical_locator: absent, version_ref: absent, content_digest: absent}
    related_node_ids: [IngestibleResource, DocumentLoader]
    related_relation_ids: []

    source_claims: [claim-ingestible-resource-loader]
  - id: ingestible-resource-instance

    labels: {zh: 实例：版本化目录清单, en: "Instance: versioned directory manifest", ja: "事例: versioned directory manifest"}

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values: {resource_id: dir-legal-2026-07, canonical_locator: s3://policy-corpus/legal/, version_ref: 'snapshot:2026-07-18', content_digest: 'sha256:legal-manifest-2026-07-18', media_type: application/x-directory-manifest}
    related_node_ids: [IngestibleResource, DirectoryResource, IngestionRun]
    related_relation_ids: [IngestionRun-reads-IngestibleResource]

    source_claims: [claim-ingestible-resource-loader, claim-ingestible-resource-digest]
parent_relation: null
relations: []
sources:
  - id: langchain-document-loaders
    title: LangChain document loaders
    url: https://docs.langchain.com/oss/python/integrations/document_loaders/index
    type: official-doc
    source_type: official-doc
    relevance: Documents a common load/lazy_load interface for reading different external source types into Document objects.
  - id: rfc-6920
    title: RFC 6920 Named Information
    url: https://datatracker.ietf.org/doc/rfc6920/
    type: standard
    source_type: standard
    relevance: Defines hash-based named-information identifiers and their relation to resource location and integrity.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities, activities, generation, and derivation used to distinguish source from generated information.
source_claims:
  - id: claim-ingestible-resource-loader
    source: langchain-document-loaders
    supports: LangChain documents loaders that read data from many external sources through load and lazy_load into Document objects. Moonweave models the pre-read source descriptor as an IngestibleResource, distinct from loader implementation and produced Document.
    locator: "Document loaders: interface, load(), lazy_load(), and source categories"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-resource-digest
    source: rfc-6920
    supports: RFC 6920 defines named-information identifiers using a hash algorithm and digest value and distinguishes naming from a mechanism that locates or dereferences the named resource. Moonweave uses an algorithm-tagged content digest to verify bytes or manifest behind a separately recorded locator and version.
    locator: "RFC 6920 sections 1 and 3: named information identifiers and ni URI format"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-resource-version-boundary
    source: rfc-6920
    supports: RFC 6920 explains that a hash-based name identifies a resource while dereferencing and locating it are separate concerns. Moonweave separately records source-system version_ref and content_digest so a logical version is not mistaken for byte-integrity evidence.
    locator: "RFC 6920 sections 1 and 3: names, locators, and digest values"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-ingestible-resource-source-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities that generate and derive other entities. Moonweave keeps a pre-read IngestibleResource, the IngestionRun that uses it, and the post-read Document or normalized information as separately auditable facts.
    locator: "PROV-O: Entity, Activity, prov:used, prov:wasGeneratedBy, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-ingestible-resource-source-identity
    source: w3c-prov-o
    supports: PROV-O provides independently identifiable entities and provenance relations. Moonweave assigns resource_id to one version-pinned external source artifact while keeping loader and read execution identity separate.
    locator: "PROV-O: Entity and Activity"
    evidence_kind: ontology-design-inference
    confidence: medium
