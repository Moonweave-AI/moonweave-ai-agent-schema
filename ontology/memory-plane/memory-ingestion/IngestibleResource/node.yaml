schema: moonweave.ai/ontology-node/v1
id: IngestibleResource
kind: concept
status: accepted
labels:
  zh: 可摄入资源
  en: Ingestible resource
  ja: 取込可能resource
semantics:
  short_definition:
    zh: 可由加载器定位并读取、且具有稳定版本身份的外部资源。
    en: An external resource with stable version identity that a loader can locate and read.
    ja: loaderがlocate・readでき安定版同一性を持つ外部resourceです。
  definition:
    zh: IngestibleResource 是可寻址的外部实体上位类，具有资源 ID、规范定位符与版本/内容摘要，可被 IngestionRun 读取；它不是读取后形成的信息或加载能力。
    en: IngestibleResource is the addressable external-entity genus with resource ID, canonical locator, and version or content digest that an IngestionRun can read; it is not the information produced after reading or the loader capability.
    ja: IngestibleResource はresource ID・canonical locator・版/content digestを持ち IngestionRun がreadできるaddressable外部entity上位類で、read後生成informationやloader能力ではありません。
  why_needed:
    zh: 统一文件系统、数据库与图存储的来源实体身份。
    en: Unifies source-entity identity for filesystems, databases, and graph stores.
    ja: filesystem・database・graph storeのsource-entity同一性を統一します。
  includes:
    - zh: 纳入 FileSystem、DirectoryResource、FileResource、Database 与 GraphStore。
      en: Includes FileSystem, DirectoryResource, FileResource, Database, and GraphStore.
      ja: FileSystem・DirectoryResource・FileResource・Database・GraphStoreを含みます。
  excludes:
    - zh: 排除 Document、DocumentLoader 与 SourceAttachment。
      en: Excludes Document, DocumentLoader, and SourceAttachment.
      ja: Document・DocumentLoader・SourceAttachmentを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识外部资源。
        en: Stable identifier for the external resource.
        ja: 外部resourceの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: resource-17
      source_claims:
        - claim-ingestible-resource-002
    - id: canonical_locator
      labels:
        zh: 规范定位符
        en: canonical locator
        ja: canonical locator
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录加载器可解析的访问位置。
        en: Records the access location resolvable by a loader.
        ja: loaderが解決できるaccess locationを記録します。
      allowed_values: []
      pattern: null
      example_value: s3://corpus/policy.pdf
      source_claims:
        - claim-ingestible-resource-003
    - id: version_ref
      labels:
        zh: 版本引用
        en: version reference
        ja: 版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用来源系统中本次摄入所读取的逻辑版本、快照或对象代次；它不冒充由字节计算出的摘要。
        en: References the logical version, snapshot, or object generation read for this ingestion; it is not a digest computed from bytes.
        ja: 今回読み取った論理版・snapshot・object generation を参照し、byte から計算した digest とは区別します。
      allowed_values: []
      pattern: null
      example_value: s3-version:7
      source_claims:
        - claim-ingestible-resource-004
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对实际读取内容计算的算法标识与摘要值，用于校验同一逻辑版本所对应的字节表示。
        en: Records the algorithm identifier and digest value computed over the content actually read, verifying the byte representation behind a logical version.
        ja: 実際に読み取った content の algorithm identifier と digest value を記録し、論理版に対応する byte representation を検証します。
      allowed_values: []
      pattern: null
      example_value: "sha-256=:ZmlsZTE3:"
      source_claims:
        - claim-ingestible-resource-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: IngestibleResource-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 可摄入资源正例
      en: "Positive case: Ingestible resource"
      ja: 取込可能resource正例
    scenario_id: null
    descriptions:
      zh: resource-17 以 s3://policy-corpus/legal/policy.pdf、对象版本 7、字节摘要 b7 和访问配置引用识别，并被 loader-pdf-v3 的支持边界覆盖。
      en: resource-17 is identified by s3://policy-corpus/legal/policy.pdf, object version 7, byte digest b7, and an access-profile reference and falls within loader-pdf-v3's support boundary.
      ja: resource-17 は S3 URI、object version 7、byte digest b7、access profile reference で識別され loader support boundary 内です。
    field_values:
      resource_id: resource-17
      canonical_locator: s3://corpus/policy.pdf
      version_ref: s3-version:7
      content_digest: "sha-256=:ZmlsZTE3:"
    related_node_ids:
      - IngestibleResource
    related_relation_ids: []
    expected_result:
      zh: 将该外部可读对象表示为 IngestibleResource，并在读取事实中固定实际访问的版本。
      en: Represent the external readable object as IngestibleResource and fix the version actually accessed in the read fact.
      ja: 当該 external readable object を IngestibleResource とし read fact で実際 accessed version を固定します。
    why_valid_or_invalid:
      zh: 稳定定位符、版本、内容摘要和可用加载器使该实体可寻址、可复读且可审计。
      en: A stable locator, version, content digest, and applicable loader make the entity addressable, repeatably readable, and auditable.
      ja: stable locator、version、content digest、applicable loader により addressable・repeatably readable・auditable です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestible-resource-006
  - id: IngestibleResource-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 可摄入资源边界例
      en: "Boundary case: Ingestible resource"
      ja: 取込可能resource境界例
    scenario_id: null
    descriptions:
      zh: document-policy-v7 是 normalize-17 已生成的规范信息，按 normalized digest c7 与生成活动识别；它不是等待外部读取的源实体。
      en: document-policy-v7 is normalized information already generated by normalize-17 and identified by normalized digest c7 and generating activity; it is not an external source entity awaiting reading.
      ja: document-policy-v7 は normalize-17 が生成した normalized information で digest・generating activity により識別され external source entity ではありません。
    field_values: {}
    related_node_ids:
      - IngestibleResource
    related_relation_ids: []
    expected_result:
      zh: 把 document-policy-v7 保持为 Document，不把处理后的信息产物降格为 IngestibleResource。
      en: Keep document-policy-v7 as Document and do not demote the processed information product to IngestibleResource.
      ja: document-policy-v7 は Document とし processed information product を IngestibleResource にしません。
    why_valid_or_invalid:
      zh: 资源身份在读取前独立存在，文档身份由读取后的规范内容和生成来源形成；二者处于接入链不同位置。
      en: Resource identity exists independently before reading, while Document identity arises from normalized content and generation provenance; they occupy different positions in ingestion.
      ja: resource identity は読取前に存在し Document identity は normalized content・generation provenance から形成され ingestion chain の位置が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-ingestible-resource-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-ingestion-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析模式与 ETL 去重策略逐项人工语义核验通过。
    en: Manually verified against Anthropic Contextual Retrieval, LangChain text splitters and document loaders, LlamaIndex node parsers and ingestion pipeline, Unstructured parsing patterns, and ETL deduplication strategies.
    ja: Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析パターン、ETL 重複排除戦略に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-ingestible-resource-001
    source: eng-fw-langchain-document-loaders
    supports: LangChain's loader catalog and BaseLoader interface support addressable heterogeneous sources yielding Documents.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-resource-002
    source: eng-fw-langchain-document-loaders
    supports: IngestibleResource.resource_id records the external resource identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-resource-003
    source: eng-fw-langchain-document-loaders
    supports: IngestibleResource.canonical_locator records deterministic resource location; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-resource-004
    source: eng-fw-langchain-document-loaders
    supports: IngestibleResource.version_ref preserves the source system's version handle independently of representation integrity; Moonweave uses the loader boundary to make that handle auditable.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-resource-005
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 distinguishes a content digest, calculated over actual message content, from a representation digest; Moonweave carries that separation into ingestible-resource identity evidence.
    locator: RFC 9530 > Section 2, The Content-Digest Field
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-ingestible-resource-006
    source: eng-fw-langchain-document-loaders
    supports: LangChain document loaders connect source-specific locations to a shared Document-loading interface.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-ingestible-resource-007
    source: eng-fw-langchain-document-loaders
    supports: LangChain distinguishes external sources from returned Document objects.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
