schema: moonweave.ai/ontology-node/v1
id: IngestibleResource
kind: concept
labels:
  zh: 可摄入资源
  en: Ingestible resource
  ja: 取込可能リソース
semantics:
  short_definition:
    zh: 可被加载器定位并读取的外部来源实体根类。
    en: Root class for external source entities locatable and readable by loaders.
    ja: loader が locate/read できる外部 source entity の root class。
  definition:
    zh: IngestibleResource 是可寻址外部实体上位类，具有 resource_id、canonical_locator、version_ref 与 content_digest，供 IngestionRun 通过 MCP resource URI（file://、postgres://、github://）或 LlamaIndex data connector 读取；它不是读取后形成的 Document、DocumentLoader 能力或 IngestionPolicy。
    en: IngestibleResource is the addressable external-entity root with resource_id, canonical_locator, version_ref, and content_digest that an IngestionRun reads via MCP resource URIs (file://, postgres://, github://) or LlamaIndex data connectors; it is not post-read Document, DocumentLoader capability, or IngestionPolicy.
    ja: IngestibleResource は resource_id・canonical_locator・version_ref・content_digest を持つ addressable 外部 entity root。IngestionRun が MCP resource URI（file://、postgres://、github://）や LlamaIndex data connector で read。read 後 Document・DocumentLoader capability・IngestionPolicy ではない。
  why_needed:
    zh: 统一文件系统、数据库、图存储与 MCP 暴露资源的来源身份，使接入运行能回答“读了哪个版本、从哪来”。
    en: Unifies source identity for filesystems, databases, graph stores, and MCP-exposed resources so ingestion runs can answer which version was read and from where.
    ja: filesystem/database/graph store/MCP 暴露 resource の source identity を統一し、取込 run が「どの版をどこから read したか」に答えられるようにする。
  includes:
    - zh: 纳入 FileSystem、DirectoryResource、FileResource、Database 与 GraphStore 等资源子类。
      en: Includes resource subtypes FileSystem, DirectoryResource, FileResource, Database, and GraphStore.
      ja: FileSystem・DirectoryResource・FileResource・Database・GraphStore 等 resource subtype。
  excludes:
    - zh: 排除 Document、DocumentLoader、SourceAttachment 与 IngestionRun。
      en: Excludes Document, DocumentLoader, SourceAttachment, and IngestionRun.
      ja: Document・DocumentLoader・SourceAttachment・IngestionRun を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: MCP Resources 以 URI 模板暴露可读资源（file://、postgres://）；LlamaIndex 以 SimpleDirectoryReader、DatabaseReader、Neo4jGraphStore 等 connector 绑定同类定位符；Moonweave 把“可发现”与“本次 run 实际 read”分开，content_digest 绑定实际字节。
    en: MCP Resources expose readable URIs (file://, postgres://); LlamaIndex binds similar locators via SimpleDirectoryReader, DatabaseReader, and Neo4jGraphStore; Moonweave separates discoverability from actual run reads, binding content_digest to bytes read.
    ja: MCP Resources は URI 模板（file://、postgres://）で readable resource を暴露。LlamaIndex は SimpleDirectoryReader/DatabaseReader/Neo4jGraphStore 等で同型 locator を binding。Moonweave は discoverability と actual run read を分離し content_digest を read byte に binding。
  typical_input:
    - description: MCP resource template listing ingestible URIs
      format: |
        {
          "uriTemplate": "file:///{path}",
          "name": "project-files",
          "mimeType": "application/octet-stream"
        }
      source_claims: [claim-ingestible-resource-mcp]
    - description: LlamaIndex data source configuration
      format: |
        from llama_index.core import SimpleDirectoryReader
        reader = SimpleDirectoryReader(input_dir="/data/corpus")
      source_claims: [claim-ingestible-resource-llamaindex]
  typical_output:
    - description: Moonweave resource identity bound to a run read
      format: |
        {
          "resource_id": "file-policy-v7",
          "canonical_locator": "file:///srv/policy/legal/policy.pdf",
          "version_ref": "object-version:7",
          "content_digest": "7333d79d..."
        }
      source_claims: [claim-ingestible-resource-design]
  reference_implementations:
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: URI-templated readable resources for clients and servers.
    - name: LlamaIndex Data Connectors
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
      description: Directory, database, and graph data source readers.
    - name: LangChain Document Loaders
      url: https://python.langchain.com/docs/how_to/document_loader/
      description: BaseLoader integrations for heterogeneous sources.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识外部资源 lineage，跨 run 可引用。
        en: Stable identifier for external resource lineage, referencable across runs.
        ja: 外部 resource lineage の安定識別子。run 横断で参照可能。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: resource-17
      allowed_values: []
      source_claims: [claim-ingestible-resource-id]
    - id: canonical_locator
      labels: {zh: 规范定位符, en: Canonical locator, ja: canonical locator}
      definitions:
        zh: loader 或 MCP client 可解析的绝对 URI/连接串；保留 scheme、authority 与编码。
        en: Absolute URI or connection string resolvable by loader or MCP client; preserves scheme, authority, and encoding.
        ja: loader/MCP client が resolve できる absolute URI/接続串。scheme/authority/encoding を保持。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///srv/corpus/policy.pdf
      allowed_values: []
      source_claims: [claim-ingestible-resource-locator]
    - id: version_ref
      labels: {zh: 版本引用, en: Version reference, ja: 版参照}
      definitions:
        zh: 来源系统分配的逻辑版本、快照或对象代次；不是由字节计算的 digest。
        en: Logical version, snapshot, or object generation from the source system; not a digest computed from bytes.
        ja: source system が付与した論理版/snapshot/object generation。byte から計算した digest ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: s3-version:7
      allowed_values: []
      source_claims: [claim-ingestible-resource-version]
    - id: content_digest
      labels: {zh: 内容摘要, en: Content digest, ja: 内容ダイジェスト}
      definitions:
        zh: 对实际读取内容计算的 SHA-256 等摘要；同路径不同 digest 视为不同资源状态。
        en: SHA-256 or similar digest over content actually read; same path with different digest is a different resource state.
        ja: 実際 read 内容の SHA-256 等 digest。同 path で digest 異なれば別 resource state。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 7333d79dd1c9a7608dc5c0c5f1e1e2292c1dd6165ac145121e48b19fbf507fb1
      allowed_values: []
      source_claims: [claim-ingestible-resource-digest]
  constraints: []
  required_relations: []
examples:
  - id: IngestibleResource-example-mcp-file
    labels:
      zh: MCP file 资源
      en: MCP file resource
      ja: MCP file リソース
    descriptions:
      zh: MCP server 暴露 uriTemplate=file:///{path}；ingest-run-17 读取 file:///srv/legal/policy.pdf@object-version:7，digest b7 写入 resource_id=file-policy-v7。
      en: MCP server exposes uriTemplate=file:///{path}; ingest-run-17 reads file:///srv/legal/policy.pdf@object-version:7 with digest b7 as resource_id=file-policy-v7.
      ja: MCP server が uriTemplate=file:///{path} を暴露。ingest-run-17 が file:///srv/legal/policy.pdf@object-version:7 を read し digest b7 を resource_id=file-policy-v7 に記録。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: Resources spec
    field_values:
      resource_id: file-policy-v7
      canonical_locator: file:///srv/legal/policy.pdf
      version_ref: object-version:7
      content_digest: 7333d79dd1c9a7608dc5c0c5f1e1e2292c1dd6165ac145121e48b19fbf507fb1
    related_node_ids: [IngestibleResource, FileResource]
    related_relation_ids: []
    source_claims: [claim-ingestible-resource-mcp]
  - id: IngestibleResource-example-postgres
    labels:
      zh: Postgres 目录资源
      en: Postgres catalog resource
      ja: Postgres catalog リソース
    descriptions:
      zh: MCP postgres://policy-prod/catalog 或 LlamaIndex DatabaseReader 连接同一 catalog；resource_id=db-policy 含 schema-manifest digest，子表为 DatabaseTable 而非平级 IngestibleResource。
      en: MCP postgres://policy-prod/catalog or LlamaIndex DatabaseReader connects to the same catalog; resource_id=db-policy carries schema-manifest digest with DatabaseTable children, not flat IngestibleResource peers.
      ja: MCP postgres://policy-prod/catalog または LlamaIndex DatabaseReader が同一 catalog に接続。resource_id=db-policy は schema-manifest digest を持ち子は DatabaseTable。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/examples/data_connectors/DatabaseDemo/
      version: DatabaseReader
    field_values:
      resource_id: db-policy
      canonical_locator: postgres://policy-prod/catalog
      version_ref: catalog-snapshot:2026-07-16
    related_node_ids: [IngestibleResource, Database]
    related_relation_ids: []
    source_claims: [claim-ingestible-resource-llamaindex]
  - id: IngestibleResource-example-not-document
    labels:
      zh: 资源非文档
      en: Resource is not document
      ja: resource は document ではない
    descriptions:
      zh: document-policy-v7 是 normalize-17 产出的规范信息，由 content_digest c7 标识；file-policy-v7 是待读取的 PDF 字节资源。二者 ID 与生命周期不同，不可互换。
      en: document-policy-v7 is normalized information from normalize-17 identified by digest c7; file-policy-v7 is PDF bytes awaiting read. IDs and lifecycles differ and must not be conflated.
      ja: document-policy-v7 は normalize-17 成果の normalized information（digest c7）。file-policy-v7 は read 待ち PDF byte resource。ID/lifecycle 異なり混同不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [IngestibleResource, Document, FileResource]
    related_relation_ids: []
    source_claims: [claim-ingestible-resource-design]
parent_relation: null
relations: []
sources:
  - id: src-mcp-resources
    title: MCP Server Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-doc
    relevance: URI-templated readable resources including file and database schemes.
  - id: src-llamaindex-loading
    title: LlamaIndex Loading Data
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
    source_type: official-doc
    relevance: Data connectors for directories, databases, and graphs.
  - id: src-langchain-loaders
    title: LangChain Document Loaders
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/document_loader/
    source_type: official-doc
    relevance: BaseLoader source-to-Document boundary.
  - id: src-ingestible-resource-design
    title: Moonweave memory-ingestion resource boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates external resources from normalized documents.
source_claims:
  - id: claim-ingestible-resource-mcp
    source: src-mcp-resources
    supports: MCP resources expose URI templates such as file:// for client-readable source entities.
    locator: Resources > URI templates
    evidence_kind: official
    confidence: high
  - id: claim-ingestible-resource-llamaindex
    source: src-llamaindex-loading
    supports: LlamaIndex data connectors bind directory, database, and graph sources to loader-readable locators.
    locator: Loading module guides
    evidence_kind: official
    confidence: high
  - id: claim-ingestible-resource-design
    source: src-ingestible-resource-design
    supports: Resource identity exists before reading; Document identity forms after normalization.
    locator: memory-ingestion boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-resource-id
    source: src-ingestible-resource-design
    supports: resource_id stabilizes external resource lineage across runs.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-resource-locator
    source: src-mcp-resources
    supports: canonical_locator follows MCP URI template resolution semantics.
    locator: Resources
    evidence_kind: official
    confidence: high
  - id: claim-ingestible-resource-version
    source: src-ingestible-resource-design
    supports: version_ref preserves source-system version handle separate from content digest.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-ingestible-resource-digest
    source: src-ingestible-resource-design
    supports: content_digest binds the bytes actually read for deduplication and audit.
    locator: structure
    evidence_kind: design-inference
    confidence: high
