schema: moonweave.ai/ontology-node/v1
id: GraphStore
kind: concept
status: review
labels:
  zh: 图存储
  en: Graph store
  ja: グラフstore
semantics:
  short_definition:
    zh: 以图快照身份组织节点与边并可被摄入读取的资源。
    en: A graph-snapshot-identified resource organizing nodes and edges for ingestion.
    ja: graph snapshot同一性でnodeとedgeを編成し取込read可能なresourceです。
  definition:
    zh: GraphStore 是具有图/数据库身份和版本摘要、包含 GraphNode 与 GraphEdge 信息的 IngestibleResource；它不是单个节点、边或图嵌入。
    en: GraphStore is an IngestibleResource with graph/database identity and version digest that contains GraphNode and GraphEdge information; it is not one node, edge, or graph embedding.
    ja: GraphStore はgraph/database同一性と版digestを持ち GraphNode と GraphEdge informationを含む IngestibleResource で、単一node・edge・graph embeddingではありません。
  why_needed:
    zh: 形成 GraphStore→GraphNode/GraphEdge 的来源层级。
    en: Creates the GraphStore-to-GraphNode/GraphEdge source hierarchy.
    ja: GraphStore→GraphNode/GraphEdgeのsource階層を作ります。
  includes:
    - zh: 纳入可查询的属性图、RDF 图或图快照。
      en: Includes queryable property graphs, RDF graphs, or graph snapshots.
      ja: query可能property graph・RDF graph・graph snapshotを含みます。
  excludes:
    - zh: 排除 GraphNode、GraphEdge 与 GraphEmbedding。
      en: Excludes GraphNode, GraphEdge, and GraphEmbedding.
      ja: GraphNode・GraphEdge・GraphEmbeddingを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识图存储。
        en: Stable identifier for the graph store.
        ja: graph storeの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: graph-policy
      source_claims:
        - claim-graph-store-002
    - id: graph_version_digest
      labels:
        zh: 图版本摘要
        en: graph-version digest
        ja: graph版digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次读取的图快照。
        en: Fixes the graph snapshot read for ingestion.
        ja: 取込read対象graph snapshotを固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:graph-policy-7
      source_claims:
        - claim-graph-store-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphStore-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 图存储正例
      en: "Positive case: Graph store"
      ja: グラフstore正例
    scenario_id: null
    descriptions:
      zh: graph-policy@7 以 query endpoint、tenant、snapshot digest 和节点/边清单识别，清单保证 edge:17-18 的两个端点都属于该版本。
      en: graph-policy@7 is identified by query endpoint, tenant, snapshot digest, and node and edge manifests, which ensure that both endpoints of edge:17-18 belong to that version.
      ja: graph-policy@7 は query endpoint、tenant、snapshot digest、node/edge manifest で識別され edge endpoints の所属を保証します。
    field_values:
      resource_id: graph-policy
      graph_version_digest: sha256:graph-policy-7
      canonical_locator: neo4j+s://policy-graph.example
      version_ref: graph-policy@7
      content_digest: sha256:graph-policy-7
    related_node_ids:
      - GraphStore
    related_relation_ids: []
    expected_result:
      zh: 将该版本化图容器表示为 GraphStore，并把节点与边成员限定到 snapshot @7。
      en: Represent the versioned graph container as GraphStore and scope node and edge membership to snapshot @7.
      ja: 当該 versioned graph container を GraphStore とし node/edge membership を snapshot @7 に限定します。
    why_valid_or_invalid:
      zh: 独立查询端点、租户边界、快照身份和闭合成员清单构成可被图加载器读取的资源容器。
      en: An independent query endpoint, tenant boundary, snapshot identity, and closed membership manifests establish a resource container readable by a graph loader.
      ja: query endpoint、tenant boundary、snapshot identity、closed manifests が graph loader で読取可能な resource container を形成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-store-004
  - id: GraphStore-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 图存储边界例
      en: "Boundary case: Graph store"
      ja: グラフstore境界例
    scenario_id: null
    descriptions:
      zh: node:policy:17 只有节点 ID、标签与属性，依赖 graph-policy@7 解释其范围，不能枚举其他节点或边。
      en: node:policy:17 has only a node ID, labels, and properties and depends on graph-policy@7 for scope; it cannot enumerate other nodes or edges.
      ja: node:policy:17 は node ID、labels、properties だけを持ち graph-policy@7 に scope を依存し他 member を列挙できません。
    field_values: {}
    related_node_ids:
      - GraphStore
    related_relation_ids: []
    expected_result:
      zh: 把 node:policy:17 保持为 GraphNode，不把单个成员当作 GraphStore。
      en: Keep node:policy:17 as GraphNode and do not treat one member as GraphStore.
      ja: node:policy:17 は GraphNode とし一 member を GraphStore としません。
    why_valid_or_invalid:
      zh: 成员节点没有图容器的查询、快照和成员管理责任，即使它在图中连接度很高也不成为容器。
      en: A member node lacks the graph container's query, snapshot, and membership-management responsibilities; high degree does not make it the container.
      ja: member node は container の query・snapshot・membership management 責任を持たず高 degree でも container になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-store-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: GraphStore-is_a-IngestibleResource
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: GraphStore 是 IngestibleResource 的严格子类；种差为：以图快照身份组织 GraphNode 与 GraphEdge 并支持查询读取。
    en: "GraphStore is a strict subtype of IngestibleResource; its reviewed differentia is: it organizes GraphNode and GraphEdge under graph-snapshot identity and supports query reads."
    ja: GraphStore は IngestibleResource の厳密なsubtypeで、審査済み種差は「graph snapshot同一性で GraphNode と GraphEdge を編成しquery readを支えます。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: GraphStore-is_a-IngestibleResource-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestibleResource and also satisfies the differentia: it organizes GraphNode and GraphEdge under graph-snapshot identity and supports query reads."
      explanations:
        zh: 仅当对象首先满足 IngestibleResource 定义且满足种差“以图快照身份组织 GraphNode 与 GraphEdge 并支持查询读取。”时成立。
        en: "Assert only when the object first satisfies IngestibleResource and also satisfies the differentia: it organizes GraphNode and GraphEdge under graph-snapshot identity and supports query reads."
        ja: 対象がまず IngestibleResource を満たし、さらに種差「graph snapshot同一性で GraphNode と GraphEdge を編成しquery readを支えます。」を満たす時だけ成立します。
      source_claims:
        - claim-graph-store-006
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GraphStore-is_a-IngestibleResource-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: graph-policy@7 具有稳定 query endpoint、tenant、snapshot digest 和闭合节点/边清单，并可由 Neo4j loader 按该版本读取。
        en: graph-policy@7 has a stable query endpoint, tenant, snapshot digest, and closed node and edge manifests and can be read by a Neo4j loader at that version.
        ja: graph-policy@7 は stable query endpoint、tenant、snapshot digest、closed manifests を持ち Neo4j loader で読取可能です。
      field_values: {}
      related_node_ids:
        - GraphStore
        - IngestibleResource
      related_relation_ids:
        - GraphStore-is_a-IngestibleResource
      expected_result:
        zh: 确认 graph-policy@7 是 IngestibleResource 的 GraphStore 特化。
        en: Confirm graph-policy@7 as a GraphStore specialization of IngestibleResource.
        ja: graph-policy@7 を IngestibleResource の GraphStore specialization とします。
      why_valid_or_invalid:
        zh: 对象满足资源的可寻址、可版本化和加载器适用条件，并以图查询与节点边容器形成种差。
        en: The object satisfies resource addressability, versioning, and loader applicability and adds graph query and node-and-edge containment as its differentia.
        ja: resource addressability・versioning・loader 条件を満たし graph query・node/edge containment を differentia とします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-store-006
    - id: GraphStore-is_a-IngestibleResource-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: node:policy:17 只有一个图成员身份，依赖 graph-policy@7 的查询和快照上下文，不能被图加载器当作完整图源遍历。
        en: node:policy:17 has only one graph-member identity and depends on graph-policy@7 for query and snapshot context; a graph loader cannot traverse it as the complete source.
        ja: node:policy:17 は一 member identity だけで graph query・snapshot context を依存し complete source として traverse できません。
      field_values: {}
      related_node_ids:
        - GraphStore
        - IngestibleResource
      related_relation_ids:
        - GraphStore-is_a-IngestibleResource
      expected_result:
        zh: 不要通过该子类边把单个 GraphNode 归为 GraphStore。
        en: Do not use this subtype edge to classify one GraphNode as GraphStore.
        ja: この subtype edge で一 GraphNode を GraphStore に分類しません。
      why_valid_or_invalid:
        zh: 成员节点没有独立图端点、快照与成员管理责任，因此不满足图存储资源的完整种差。
        en: A member node has no independent graph endpoint, snapshot, or membership-management responsibility and therefore fails the GraphStore differentia.
        ja: member node は independent graph endpoint、snapshot、membership management を持たず GraphStore differentia を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-store-006
  source_claims:
    - claim-graph-store-006
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
