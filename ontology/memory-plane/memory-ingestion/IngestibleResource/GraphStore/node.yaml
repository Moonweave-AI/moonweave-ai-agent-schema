schema: moonweave.ai/ontology-node/v1
id: GraphStore
kind: concept
labels:
  zh: 图存储
  en: Graph store
  ja: グラフストア
semantics:
  short_definition:
    zh: 以图快照身份组织节点与边的可查询图容器资源。
    en: Queryable graph container resource organizing nodes and edges under graph-snapshot identity.
    ja: graph snapshot identity 下で node/edge を編成する query 可能 graph container resource。
  definition:
    zh: GraphStore 是具有 graph/database 身份与 graph_version_digest、包含 GraphNode 与 GraphEdge 的 IngestibleResource，对应 Neo4j 数据库/LlamaIndex KnowledgeGraphIndex 与 Neo4jGraphStore；它不是单个节点、边或向量嵌入。
    en: GraphStore is an IngestibleResource with graph/database identity and graph_version_digest containing GraphNode and GraphEdge values, mapping to Neo4j databases, LlamaIndex KnowledgeGraphIndex, and Neo4jGraphStore; it is not one node, edge, or vector embedding.
    ja: GraphStore は graph/database identity/graph_version_digest を持ち GraphNode/GraphEdge を含む IngestibleResource。Neo4j DB/LlamaIndex KnowledgeGraphIndex/Neo4jGraphStore に対応。単 node/edge/vector embedding ではない。
  why_needed:
    zh: 形成 GraphStore→GraphNode/GraphEdge 来源层级，支持图快照级 ingest 与成员闭合校验。
    en: Creates GraphStore→GraphNode/GraphEdge source hierarchy with snapshot-level ingest and closed membership validation.
    ja: GraphStore→GraphNode/GraphEdge source 階層を形成し snapshot 級 ingest/member 閉包検証を支援。
  includes:
    - zh: 纳入 Neo4j 属性图、RDF 图快照与 LlamaIndex 知识图索引源。
      en: Includes Neo4j property graphs, RDF graph snapshots, and LlamaIndex knowledge-graph index sources.
      ja: Neo4j property graph/RDF graph snapshot/LlamaIndex knowledge graph index source。
  excludes:
    - zh: 排除 GraphNode、GraphEdge 与 GraphEmbedding。
      en: Excludes GraphNode, GraphEdge, and GraphEmbedding.
      ja: GraphNode・GraphEdge・GraphEmbedding を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex KnowledgeGraphIndex 从 Neo4jGraphStore 读取三元组构建索引；Neo4j Cypher MATCH 遍历节点/边；Moonweave 用 graph_version_digest 固定快照，成员 GraphNode/GraphEdge 必须同属该版本。
    en: LlamaIndex KnowledgeGraphIndex reads triples from Neo4jGraphStore; Neo4j Cypher MATCH traverses nodes/edges; Moonweave fixes snapshots with graph_version_digest; member GraphNode/GraphEdge must share that version.
    ja: LlamaIndex KnowledgeGraphIndex が Neo4jGraphStore から triple を read。Neo4j Cypher MATCH が node/edge traverse。Moonweave は graph_version_digest で snapshot 固定。member GraphNode/GraphEdge は同一版必須。
  typical_input:
    - description: Neo4j graph query endpoint
      format: |
        neo4j+s://policy-graph.example
        MATCH (n:Policy)-[r:REFERENCES]->(m) RETURN n,r,m
      source_claims: [claim-graph-store-neo4j]
    - description: LlamaIndex KnowledgeGraphIndex over Neo4j
      format: |
        from llama_index.core import KnowledgeGraphIndex
        index = KnowledgeGraphIndex.from_documents(docs, storage_context=storage_context)
      source_claims: [claim-graph-store-llamaindex]
  typical_output:
    - description: Moonweave graph store resource identity
      format: |
        {
          "resource_id": "graph-policy",
          "canonical_locator": "neo4j+s://policy-graph.example",
          "graph_version_digest": "sha256:graph-policy-7"
        }
      source_claims: [claim-graph-store-design]
  reference_implementations:
    - name: Neo4j Documentation
      url: https://neo4j.com/docs/
      description: Property graph database with Cypher queries.
    - name: LlamaIndex Knowledge Graph Index
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
      description: Knowledge graph indexing from documents and graph stores.
    - name: LlamaIndex Neo4jGraphStore
      url: https://docs.llamaindex.ai/en/stable/examples/index_structs/knowledge_graph/Neo4jKGIndexDemo/
      description: Neo4j-backed graph storage for LlamaIndex.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识图存储资源。
        en: Stable identifier for graph store resource.
        ja: graph store resource の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: graph-policy
      allowed_values: []
      source_claims: [claim-graph-store-id]
    - id: graph_version_digest
      labels: {zh: 图版本摘要, en: Graph version digest, ja: graph 版 digest}
      definitions:
        zh: 固定本次 ingest 读取的图快照/导出 digest。
        en: Digest fixing the graph snapshot or export read for this ingest.
        ja: 今回 ingest read 対象 graph snapshot/export の digest 固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:graph-policy-7
      allowed_values: []
      source_claims: [claim-graph-store-digest]
  constraints: []
  required_relations: []
examples:
  - id: GraphStore-example-neo4j-snapshot
    labels:
      zh: Neo4j 图快照
      en: Neo4j graph snapshot
      ja: Neo4j graph snapshot
    descriptions:
      zh: graph-policy@7 以 neo4j+s://policy-graph.example 为 locator，graph_version_digest 覆盖节点/边清单；ingest-run-17 通过 Cypher 导出 snapshot @7 供 KnowledgeGraphIndex 构建。
      en: graph-policy@7 uses neo4j+s://policy-graph.example as locator; graph_version_digest covers node/edge manifest; ingest-run-17 exports snapshot @7 via Cypher for KnowledgeGraphIndex construction.
      ja: graph-policy@7 は neo4j+s://policy-graph.example を locator、graph_version_digest が node/edge manifest 覆盖。ingest-run-17 が Cypher で snapshot @7 export→KnowledgeGraphIndex 構築。
    example_source:
      product: Neo4j
      url: https://neo4j.com/docs/
      version: Cypher export
    field_values:
      resource_id: graph-policy
      graph_version_digest: sha256:graph-policy-7
      canonical_locator: neo4j+s://policy-graph.example
    related_node_ids: [GraphStore, GraphNode, GraphEdge]
    related_relation_ids: []
    source_claims: [claim-graph-store-neo4j]
  - id: GraphStore-example-llamaindex-kg
    labels:
      zh: LlamaIndex 知识图索引
      en: LlamaIndex knowledge graph index
      ja: LlamaIndex knowledge graph index
    descriptions:
      zh: KnowledgeGraphIndex.from_documents 结合 Neo4jGraphStore 持久化三元组；Moonweave 把 Neo4j 源建模为 GraphStore，抽取的 GraphNode/GraphEdge 绑定同一 graph_version。
      en: KnowledgeGraphIndex.from_documents with Neo4jGraphStore persists triples; Moonweave models Neo4j source as GraphStore with extracted GraphNode/GraphEdge bound to the same graph_version.
      ja: KnowledgeGraphIndex.from_documents+Neo4jGraphStore が triple 永続化。Moonweave は Neo4j source を GraphStore、抽出 GraphNode/GraphEdge を同一 graph_version に binding。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
      version: KnowledgeGraphIndex
    field_values:
      index: KnowledgeGraphIndex
      storage: Neo4jGraphStore
    related_node_ids: [GraphStore, Document]
    related_relation_ids: []
    source_claims: [claim-graph-store-llamaindex]
  - id: GraphStore-example-not-node
    labels:
      zh: 图存储非单节点
      en: Graph store is not single node
      ja: graph store は単 node ではない
    descriptions:
      zh: node:policy:17 只有 node_id 与属性，依赖 graph-policy@7 解释范围；高连接度成员也不能替代 GraphStore 容器身份。
      en: node:policy:17 has only node_id and properties, depending on graph-policy@7 for scope; high-degree members cannot replace GraphStore container identity.
      ja: node:policy:17 は node_id/属性のみで graph-policy@7 scope 依存。高 degree member でも GraphStore container identity は代替不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [GraphStore, GraphNode]
    related_relation_ids: []
    source_claims: [claim-graph-store-design]
parent_relation:
  id: GraphStore-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入资源, en: is an ingestible resource, ja: 取込可能リソースの一種}
  definitions:
    zh: GraphStore 种差为图查询端点、graph_version_digest 与节点/边成员容器。
    en: GraphStore differentia is graph query endpoint, graph_version_digest, and node/edge member container.
    ja: GraphStore 種差は graph query endpoint/graph_version_digest/node-edge member container。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-graph-store-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-neo4j
    title: Neo4j Documentation
    publisher: Neo4j
    url: https://neo4j.com/docs/
    source_type: official-doc
    relevance: Property graph storage and Cypher queries.
  - id: src-llamaindex-kg
    title: LlamaIndex Knowledge Graph Index Guide
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
    source_type: official-doc
    relevance: KnowledgeGraphIndex from documents and graph stores.
  - id: src-llamaindex-neo4j
    title: Neo4j KG Index Demo
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/examples/index_structs/knowledge_graph/Neo4jKGIndexDemo/
    source_type: official-doc
    relevance: Neo4jGraphStore integration.
  - id: src-graph-store-design
    title: Moonweave graph store hierarchy
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Graph container versus member nodes/edges.
source_claims:
  - id: claim-graph-store-neo4j
    source: src-neo4j
    supports: Neo4j provides queryable property graph databases with node and relationship records.
    locator: Cypher manual
    evidence_kind: official
    confidence: high
  - id: claim-graph-store-llamaindex
    source: src-llamaindex-kg
    supports: KnowledgeGraphIndex builds indexes from documents and graph store backends including Neo4j.
    locator: LPG index guide
    evidence_kind: official
    confidence: high
  - id: claim-graph-store-design
    source: src-graph-store-design
    supports: GraphStore container identity differs from GraphNode/GraphEdge member information.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-store-id
    source: src-graph-store-design
    supports: resource_id identifies graph store lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-store-digest
    source: src-graph-store-design
    supports: graph_version_digest fixes snapshot read for ingest audit.
    locator: structure
    evidence_kind: design-inference
    confidence: high
