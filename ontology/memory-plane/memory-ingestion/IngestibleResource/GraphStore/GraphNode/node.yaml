schema: moonweave.ai/ontology-node/v1
id: GraphNode
kind: concept
labels:
  zh: 图节点记录
  en: Graph node record
  ja: グラフノードレコード
semantics:
  short_definition:
    zh: 图存储快照内由节点 ID 与图版本标识的节点信息。
    en: Node information in a graph store snapshot identified by node ID and graph version.
    ja: graph store snapshot 内で node ID/graph version により識別する node information。
  definition:
    zh: GraphNode 是属于 GraphStore、由 node_id 与 graph_version 标识并保留 labels/properties 的 IngestibleInformation；Neo4j 节点记录与 LlamaIndex 知识图三元组主体均映射此类；它不是 GraphStore 容器或 GraphEmbedding。
    en: GraphNode is IngestibleInformation belonging to GraphStore, identified by node_id and graph_version with labels/properties, mapping Neo4j node records and LlamaIndex KG triple subjects; it is not the GraphStore container or GraphEmbedding.
    ja: GraphNode は GraphStore に属し node_id/graph_version で識別して labels/properties を保持する IngestibleInformation。Neo4j node record/LlamaIndex KG triple subject に写像。GraphStore container/GraphEmbedding ではない。
  why_needed:
    zh: 把图成员信息置于图容器下，支持节点级 ingest 与来源追溯。
    en: Places graph-member information under its graph container, supporting node-level ingest and provenance.
    ja: graph member information を graph container 下に置き node 級 ingest/来歴 trace を支援。
  includes:
    - zh: 纳入 Neo4j 节点、RDF 资源节点与 KG 三元组主体。
      en: Includes Neo4j nodes, RDF resource nodes, and KG triple subjects.
      ja: Neo4j node/RDF resource node/KG triple subject。
  excludes:
    - zh: 排除 GraphStore、GraphEdge 与节点嵌入向量。
      en: Excludes GraphStore, GraphEdge, and node embedding vectors.
      ja: GraphStore・GraphEdge・node embedding vector を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Neo4j CREATE (n:Policy {id:'17'}) 产生可 ingest 的节点记录；KnowledgeGraphIndex 抽取 (subject, predicate, object) 时 subject 映射 GraphNode；Moonweave 要求 graph_version 与父 GraphStore snapshot 一致。
    en: Neo4j CREATE (n:Policy {id:'17'}) yields ingestible node records; KnowledgeGraphIndex triple extraction maps subjects to GraphNode; Moonweave requires graph_version to match parent GraphStore snapshot.
    ja: Neo4j CREATE が ingest 可能 node record を生成。KnowledgeGraphIndex triple 抽出の subject→GraphNode。Moonweave は graph_version を親 GraphStore snapshot と一致要求。
  typical_input:
    - description: Neo4j node record from Cypher
      format: |
        (:Policy {id: "17", title: "Data Retention"})
      source_claims: [claim-graph-node-neo4j]
  typical_output:
    - description: Moonweave graph node information identity
      format: |
        {
          "node_id": "policy:17",
          "graph_version": "graph-policy@7",
          "labels": ["Policy"]
        }
      source_claims: [claim-graph-node-design]
  reference_implementations:
    - name: Neo4j Cypher
      url: https://neo4j.com/docs/cypher-manual/current/
      description: Node creation and property labels.
    - name: LlamaIndex Knowledge Graph Index
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
      description: Triple extraction with subject nodes.
structure:
  identity_keys: [node_id]
  fields:
    - id: node_id
      labels: {zh: 节点标识, en: Node identifier, ja: node 識別子}
      definitions:
        zh: 在 graph_version 内稳定标识节点。
        en: Stably identifies node within graph_version scope.
        ja: graph_version スコープ内で node を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy:17
      allowed_values: []
      source_claims: [claim-graph-node-id]
    - id: graph_version
      labels: {zh: 图版本, en: Graph version, ja: graph 版}
      definitions:
        zh: 所属 GraphStore 快照版本引用。
        en: Parent GraphStore snapshot version reference.
        ja: 所属 GraphStore snapshot 版 ref。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: graph-policy@7
      allowed_values: []
      source_claims: [claim-graph-node-version]
  constraints: []
  required_relations: []
examples:
  - id: GraphNode-example-neo4j-node
    labels:
      zh: Neo4j 策略节点
      en: Neo4j policy node
      ja: Neo4j policy node
    descriptions:
      zh: graph-policy@7 含节点 policy:17（labels=[Policy], title="Data Retention"）；ingest-run-17 通过 MATCH 导出并建模为 GraphNode，graph_version 固定 @7。
      en: graph-policy@7 contains node policy:17 (labels=[Policy], title="Data Retention"); ingest-run-17 exports via MATCH and models as GraphNode with graph_version @7.
      ja: graph-policy@7 に node policy:17（labels=[Policy]）。ingest-run-17 が MATCH export→GraphNode、graph_version=@7 固定。
    example_source:
      product: Neo4j
      url: https://neo4j.com/docs/cypher-manual/current/clauses/match/
      version: MATCH
    field_values:
      node_id: policy:17
      graph_version: graph-policy@7
      labels: [Policy]
    related_node_ids: [GraphNode, GraphStore]
    related_relation_ids: []
    source_claims: [claim-graph-node-neo4j]
  - id: GraphNode-example-llamaindex-triple-subject
    labels:
      zh: KG 三元组主体
      en: KG triple subject
      ja: KG triple subject
    descriptions:
      zh: KnowledgeGraphIndex 从 Document 抽取 (Policy:17, REFERENCES, Clause:42)；主体 Policy:17 建模为 GraphNode，客体与关系分别为 GraphNode/GraphEdge。
      en: KnowledgeGraphIndex extracts (Policy:17, REFERENCES, Clause:42) from Document; subject Policy:17 models as GraphNode with object and relation as GraphNode/GraphEdge.
      ja: KnowledgeGraphIndex が Document から (Policy:17, REFERENCES, Clause:42) 抽出。subject Policy:17→GraphNode、object/relation→GraphNode/GraphEdge。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
      version: triple extraction
    field_values:
      node_id: policy:17
      extracted_from: document-policy-v7
    related_node_ids: [GraphNode, GraphEdge, Document]
    related_relation_ids: []
    source_claims: [claim-graph-node-llamaindex]
  - id: GraphNode-example-not-store
    labels:
      zh: 节点非图存储
      en: Node is not graph store
      ja: node は graph store ではない
    descriptions:
      zh: graph-policy@7 拥有 query endpoint 与 snapshot digest；单节点 policy:17 不能枚举全图或替代 GraphStore。
      en: graph-policy@7 owns query endpoint and snapshot digest; single node policy:17 cannot enumerate the full graph or replace GraphStore.
      ja: graph-policy@7 は query endpoint/snapshot digest を所有。単 node policy:17 は全 graph 列挙/GraphStore 代替不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [GraphNode, GraphStore]
    related_relation_ids: []
    source_claims: [claim-graph-node-design]
parent_relation:
  id: GraphNode-is_a-IngestibleInformation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入信息, en: is ingestible information, ja: 取込可能情報の一種}
  definitions:
    zh: GraphNode 种差为图快照内节点 ID 与 labels/properties 信息记录。
    en: GraphNode differentia is in-snapshot node ID with labels/properties information record.
    ja: GraphNode 種差は snapshot 内 node ID/labels/properties information record。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-graph-node-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-neo4j-cypher
    title: Neo4j Cypher Manual
    publisher: Neo4j
    url: https://neo4j.com/docs/cypher-manual/current/
    source_type: official-doc
    relevance: Node records with labels and properties.
  - id: src-llamaindex-kg
    title: LlamaIndex Knowledge Graph Index
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
    source_type: official-doc
    relevance: Triple subject extraction.
  - id: src-graph-node-design
    title: Moonweave graph node boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Node information under graph store.
source_claims:
  - id: claim-graph-node-neo4j
    source: src-neo4j-cypher
    supports: Neo4j nodes are identified by internal ID and labels within a graph database.
    locator: Nodes
    evidence_kind: official
    confidence: high
  - id: claim-graph-node-llamaindex
    source: src-llamaindex-kg
    supports: KnowledgeGraphIndex extracts triples with subject entities from documents.
    locator: LPG index guide
    evidence_kind: official
    confidence: high
  - id: claim-graph-node-design
    source: src-graph-node-design
    supports: GraphNode member information differs from GraphStore container resource.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-node-id
    source: src-graph-node-design
    supports: node_id identifies node within graph version scope.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-node-version
    source: src-graph-node-design
    supports: graph_version binds node to parent GraphStore snapshot.
    locator: structure
    evidence_kind: design-inference
    confidence: high
