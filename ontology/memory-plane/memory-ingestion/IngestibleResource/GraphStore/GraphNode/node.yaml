schema: moonweave.ai/ontology-node/v1
id: GraphNode
kind: concept
status: accepted
labels:
  zh: 图节点记录
  en: Graph Node Record
  ja: グラフノードレコード
semantics:
  short_definition:
    zh: 属于一个版本化图存储、由节点标识、标签和属性状态描述的来源图节点事实。
    en: A source graph-node fact belonging to one versioned graph store and described by node ID, labels, and property state.
    ja: 一つの版管理された graph store に属し、node ID、label、property state で記述される source graph-node fact。
  definition:
    zh: >-
      GraphNode 是 GraphStore 的组成成员，记录一个属性图快照中的节点。它以 node_id、graph_store_ref、version_ref 和 node_labels 识别，
      并可保存 properties_digest 来验证该版本的属性状态。它不是 GraphStore、GraphEdge、GraphEmbedding、查询文本、查询结果、
      Moonweave 本体概念、Document、运行时 Actor 或访问凭据。节点是来源图的实例成员，不能被提升为图容器或本体模式定义。
    en: >-
      A GraphNode is a composition member of GraphStore that records one node in a property-graph snapshot. It is
      identified by node_id, graph_store_ref, version_ref, and node_labels and can retain properties_digest to verify
      property state at that version. It is not a GraphStore, GraphEdge, GraphEmbedding, query text, query result,
      Moonweave ontology concept, Document, runtime Actor, or access credential. A node is an instance member of a source
      graph and cannot be promoted to the graph container or ontology schema definition.
    ja: >-
      GraphNode は property-graph snapshot 内の一つの node を記録する GraphStore の composition member です。node_id、
      graph_store_ref、version_ref、node_labels で識別され、その version の property state を検証する properties_digest を保持できます。
      GraphStore、GraphEdge、GraphEmbedding、query text、query result、Moonweave ontology concept、Document、runtime Actor、
      access credential ではありません。node は source graph の instance member であり、graph container や ontology schema definition に
      昇格できません。
  why_needed:
    zh: 节点的图快照范围和属性状态必须与图容器、关系记录、查询活动和派生表示分开，才能可靠重放图摄入来源。
    en: A node's graph-snapshot scope and property state must remain separate from graph container, relationship record, query activity, and derived representation to replay graph-ingestion provenance reliably.
    ja: graph-ingestion provenance を確実に再生するためには、node の graph-snapshot scope と property state を graph container、relationship record、query activity、derived representation から分離しなければなりません。
  includes:
    - zh: 在固定属性图快照中带有 Policy 标签和属性摘要的业务节点。
      en: A business node with a Policy label and property digest in a pinned property-graph snapshot.
      ja: 固定された property-graph snapshot 内で Policy label と property digest を持つ business node。
  excludes:
    - zh: 图容器、图关系、由节点邻域计算的向量、查询结果中的临时标量和 Moonweave 概念定义。
      en: A graph container, graph relationship, vector computed from a node neighborhood, transient scalar in query output, or Moonweave concept definition.
      ja: graph container、graph relationship、node neighborhood から計算された vector、query output 内の一時 scalar、Moonweave concept definition。
  semantic_kind: information
  aliases:
    - source graph node
    - versioned property-graph node
engineering:
  explanation:
    zh: >-
      图摄入器在一个指定 GraphStore 快照中执行受控只读节点查询，并为每个返回节点登记节点标识、标签、属性摘要和来源版本。
      它先验证节点出现在该图清单中，随后将关系端点和生成文档连接到这个节点引用；查询文本、参数和读取次数留在 IngestionRun 中。
      因此同名节点在不同快照中的属性变化不会被合并为一个来源事实，且嵌入模型可以独立重算。
    en: >-
      A graph ingestor executes controlled read-only node queries in one specified GraphStore snapshot and registers each
      returned node's ID, labels, property digest, and source version. It first verifies that the node appears in that graph
      manifest, then attaches relationship endpoints and generated documents to this node reference; query text, parameters,
      and read count remain on the IngestionRun. Same-named nodes with changed properties in different snapshots therefore
      do not merge into one source fact, and embedding models can be recomputed independently.
    ja: >-
      graph ingestor は指定された一つの GraphStore snapshot 内で制御された read-only node query を実行し、返却された各 node の ID、
      label、property digest、source version を登録します。まず node が graph manifest に現れることを検証し、その後 relationship endpoint と
      generated document をこの node reference に結びます。query text、parameter、read count は IngestionRun に残します。そのため、
      異なる snapshot で property が変わった同名 node は一つの source fact に統合されず、embedding model も独立して再計算できます。
  typical_input:
    - description: Node row from a pinned graph query
      format: |
        {
          "node_id": "node-policy-17",
          "graph_store_ref": "graph-policy-v7",
          "version_ref": "snapshot:policy-graph:7",
          "node_labels": ["Policy"],
          "properties_digest": "sha256:node-policy-17-v7"
        }
  typical_output:
    - description: Validated node record for relationship binding
      format: |
        {
          "graph_node_ref": "node-policy-17-v7",
          "graph_manifest_verified": true,
          "ingestion_run_ref": "ingest-graph-policy-7",
          "eligible_as_edge_endpoint": true
        }
  reference_implementations:
    - name: Neo4j node and relationship patterns
      url: https://neo4j.com/docs/cypher-manual/current/patterns/reference/node-and-relationship-patterns/
      description: Documents node patterns, label expressions, property predicates, and relationships connecting nodes.
    - name: Neo4j Cypher queries
      url: https://neo4j.com/docs/cypher-manual/current/queries/
      description: Documents graph-query concepts for nodes, relationships, and paths.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities and activities for recording source facts separately from read operations and outputs.
structure:
  identity_keys:
    - node_id
    - graph_store_ref
    - version_ref
  fields:
    - id: node_id
      labels:
        zh: 节点标识
        en: node ID
        ja: ノード ID
      definitions:
        zh: 在指定图存储和图快照内稳定标识一个来源节点，而不是标签名称、查询变量或本体概念名。
        en: Stably identifies one source node within the stated graph store and graph snapshot rather than a label name, query variable, or ontology concept name.
        ja: label name、query variable、ontology concept name ではなく、指定された graph store と graph snapshot 内の一つの source node を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: node-policy-17
      source_claims:
        - claim-graph-node-identity
    - id: graph_store_ref
      labels:
        zh: 所属图存储引用
        en: owning graph-store reference
        ja: 所属グラフストア参照
      definitions:
        zh: 引用提供节点命名空间和清单范围的 GraphStore，不是一个临时查询会话或连接凭据。
        en: References the GraphStore providing the node namespace and manifest scope rather than a temporary query session or connection credential.
        ja: 一時的な query session や connection credential ではなく、node namespace と manifest scope を提供する GraphStore を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: graph-policy-v7
      source_claims:
        - claim-graph-node-membership
    - id: version_ref
      labels:
        zh: 图快照版本引用
        en: graph-snapshot version reference
        ja: グラフスナップショット版参照
      definitions:
        zh: 记录节点标签和属性有效的图快照版本，防止将不同时刻的节点状态合并。
        en: Records the graph-snapshot version in which node labels and properties are valid, preventing node states from different times being merged.
        ja: node label と property が有効な graph-snapshot version を記録し、異なる時点の node state が統合されることを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "snapshot:policy-graph:7"
      source_claims:
        - claim-graph-node-membership
    - id: node_labels
      labels:
        zh: 节点标签
        en: node labels
        ja: ノードラベル
      definitions:
        zh: 记录来源图中用于分类该节点的一个或多个标签，而不是 Moonweave 本体类层级。
        en: Records one or more labels that classify the node in the source graph rather than a Moonweave ontology class hierarchy.
        ja: Moonweave ontology class hierarchy ではなく、source graph 内で node を分類する一つ以上の label を記録します。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      allowed_values: []
      pattern: null
      example_value:
        - Policy
      source_claims:
        - claim-graph-node-model
    - id: properties_digest
      labels:
        zh: 节点属性摘要
        en: node-properties digest
        ja: ノードプロパティダイジェスト
      definitions:
        zh: 可选记录该节点属性集合的算法标记摘要，以验证一个图快照中的属性状态而不把全部属性塞入身份键。
        en: Optionally records an algorithm-tagged digest of node properties to verify property state in one graph snapshot without placing every property into the identity key.
        ja: すべての property を identity key に置かずに一つの graph snapshot 内の property state を検証するため、node property の algorithm-tagged digest を任意で記録します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:node-policy-17-v7
      source_claims:
        - claim-graph-node-identity
  constraints:
    - id: graph-node-snapshot-membership
      severity: error
      expression_language: plain
      expression: >-
        node_id, graph_store_ref, version_ref, and node_labels are required. graph_store_ref and version_ref must identify
        a GraphStore snapshot whose manifest contains this node representation. properties_digest, when present, must verify
        the property state for that snapshot. A GraphStore, GraphEdge, GraphEmbedding, query variable, query result,
        ontology concept, credential, or generated Document cannot substitute for GraphNode identity.
      explanation:
        zh: 图节点身份必须由同一图快照内的节点标识、标签和成员证据固定；图容器、关系、查询和派生表示分别拥有不同的身份边界。
        en: Graph-node identity must be pinned by node ID, labels, and membership evidence in the same graph snapshot; graph container, relationship, query, and derived representation have different identity boundaries.
        ja: graph-node identity は同じ graph snapshot 内の node ID、label、membership evidence で固定しなければなりません。graph container、relationship、query、derived representation は異なる identity boundary を持ちます。
      source_claims:
        - claim-graph-node-model
        - claim-graph-node-membership
        - claim-graph-node-boundary
  required_relations: []
examples:
  - id: graph-node-positive

    labels:
      zh: 政策节点快照
      en: Policy node snapshot
      ja: 政策ノードスナップショット

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      node_id: node-policy-17
      graph_store_ref: graph-policy-v7
      version_ref: "snapshot:policy-graph:7"
      node_labels:
        - Policy
      properties_digest: sha256:node-policy-17-v7
    related_node_ids:
      - GraphNode
      - GraphStore
      - GraphEdge
    related_relation_ids:
      - GraphStore-contains-GraphNode

    source_claims:
      - claim-graph-node-model
      - claim-graph-node-membership
  - id: graph-node-counterexample

    labels:
      zh: 派生图嵌入不是图节点
      en: Derived graph embedding is not a graph node
      ja: 派生グラフ埋め込みはグラフノードではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      representation_id: embedding-policy-17
      source_node_ref: node-policy-17-v7
      model_version: graph-embed-model-3
      vector_dimension: 768
      graph_store_ref: absent
      version_ref: absent
    related_node_ids:
      - GraphNode
      - GraphEmbedding
    related_relation_ids: []

    source_claims:
      - claim-graph-node-boundary
  - id: graph-node-boundary

    labels:
      zh: 不同快照中的同名节点
      en: Same-named node in another snapshot
      ja: 別スナップショット内の同名ノード

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      node_id: node-policy-17
      graph_store_ref: graph-policy-v8
      version_ref: "snapshot:policy-graph:8"
      node_labels:
        - Policy
      properties_digest: sha256:node-policy-17-v8
    related_node_ids:
      - GraphNode
      - GraphStore
    related_relation_ids:
      - GraphStore-contains-GraphNode

    source_claims:
      - claim-graph-node-membership
  - id: graph-node-instance

    labels:
      zh: 实例：合规控制节点摄入
      en: "Instance: compliance-control node ingestion"
      ja: "事例：コンプライアンス制御ノード取り込み"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      node_id: node-control-3
      graph_store_ref: graph-compliance-v4
      version_ref: "snapshot:compliance-graph:4"
      node_labels:
        - Control
      properties_digest: sha256:node-control-3-v4
    related_node_ids:
      - GraphNode
      - GraphStore
      - GraphEdge
      - IngestionRun
      - Document
    related_relation_ids:
      - GraphStore-contains-GraphNode
      - GraphStore-contains-GraphEdge

    source_claims:
      - claim-graph-node-membership
      - claim-graph-node-provenance
parent_relation:
  id: GraphStore-contains-GraphNode
  predicate: part_of
  target: concept:GraphStore
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是图存储的节点成员
    en: is a node member of graph store
    ja: グラフストアのノードメンバーである
  definitions:
    zh: GraphNode 是 graph_store_ref 所指 GraphStore 在指定 version_ref 下的节点成员，并由该图快照的节点清单支持。
    en: GraphNode is a node member of the GraphStore named by graph_store_ref at the stated version_ref and is supported by that graph snapshot's node manifest.
    ja: GraphNode は graph_store_ref が指す GraphStore の指定 version_ref における node member であり、その graph snapshot の node manifest により支持されます。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_node_member
    labels:
      zh: 有节点成员
      en: has node member
      ja: ノードメンバーを持つ
  conditions:
    - id: graph-node-part-of-graph-store-condition
      severity: error
      expression_language: plain
      expression: >-
        Assert composition only when node.graph_store_ref equals graphStore.resource_id, node.version_ref equals the graph
        snapshot being represented, and the graph manifest contains the node representation. A graph label, query variable,
        generated embedding, query result, or node in another snapshot does not establish graph-store membership.
      explanation:
        zh: 节点成员关系需要图存储引用、版本和清单证据一致；标签、查询变量、嵌入或其他快照中的同名节点不能建立成员关系。
        en: Node membership requires matching graph-store reference, version, and manifest evidence; a label, query variable, embedding, or same-named node in another snapshot cannot establish membership.
        ja: node membership には一致する graph-store reference、version、manifest evidence が必要であり、label、query variable、embedding、別 snapshot の同名 node では membership を確立できません。
      source_claims:
        - claim-graph-node-membership
  temporal_scope: valid-time
  boundary_context: Node membership is scoped to one graph snapshot and does not make the node identical to the graph source or a derived embedding.
  constraints: []
  examples: []
  source_claims:
    - claim-graph-node-membership
  distinct_fact_rationale: This composition records a source-graph node membership fact separately from graph-container identity, edges, and query execution.
  layout_role: primary-backbone
relations: []
sources:
  - id: neo4j-node-relationship-patterns
    title: Neo4j node and relationship patterns
    url: https://neo4j.com/docs/cypher-manual/current/patterns/reference/node-and-relationship-patterns/
    type: official-doc
    source_type: official-doc
    relevance: Documents node patterns, node labels, property predicates, and relationships between nodes.
  - id: neo4j-cypher-queries
    title: Neo4j Cypher queries
    url: https://neo4j.com/docs/cypher-manual/current/queries/
    type: official-doc
    source_type: official-doc
    relevance: Documents core graph-query concepts for nodes relationships and paths.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities activities usage and generation for provenance separation.
source_claims:
  - id: claim-graph-node-model
    source: neo4j-node-relationship-patterns
    supports: >-
      Neo4j documents node patterns with label expressions and property key-value expressions. Moonweave records source
      graph labels and a properties digest on a versioned node instead of treating a graph label as an ontology class.
    locator: Neo4j node patterns label expressions and property key-value expressions
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-graph-node-membership
    source: neo4j-node-relationship-patterns
    supports: >-
      Neo4j documents nodes as graph pattern elements connected by relationships. Moonweave treats a node as a graph-store
      member only when its graph store and snapshot version match a manifest that records the node representation.
    locator: Neo4j node patterns and relationship patterns
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-graph-node-identity
    source: w3c-prov-o
    supports: >-
      PROV-O supports independently identifiable entities. Moonweave identifies a source graph node with its node ID, graph
      store, snapshot version, labels, and optional property digest separately from read activity and derived information.
    locator: PROV-O Entity and Activity
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-graph-node-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes entities from activities that use or generate other entities. Moonweave keeps a source graph node,
      graph query, relationship edge, generated Document, and derived embedding as separate facts.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-graph-node-provenance
    source: neo4j-cypher-queries
    supports: >-
      Neo4j documents graph-query concepts for nodes relationships and paths. Moonweave records query execution on an
      IngestionRun while preserving node source identity as a distinct graph-snapshot fact.
    locator: Neo4j Cypher queries core concepts
    evidence_kind: ontology-design-inference
    confidence: medium
