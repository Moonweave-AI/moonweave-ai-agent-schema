schema: moonweave.ai/ontology-node/v1
id: GraphNode
kind: concept
status: accepted
labels:
  zh: 图节点记录
  en: Graph node record
  ja: graph node record
semantics:
  short_definition:
    zh: 图存储中由节点 ID 与图版本标识的节点信息。
    en: Node information in a graph store identified by node ID and graph version.
    ja: graph store内でnode IDとgraph版により識別するnode informationです。
  definition:
    zh: GraphNode 是属于一个 GraphStore、由 node_id 与 graph_version 标识并保存标签/属性的 IngestibleInformation；它不是 GraphStore、GraphEmbedding 或运行时 Actor。
    en: GraphNode is IngestibleInformation belonging to one GraphStore, identified by node_id and graph_version, and retaining labels or properties; it is not the GraphStore, GraphEmbedding, or a runtime Actor.
    ja: GraphNode は一 GraphStore に属し node_id と graph_versionで識別してlabel/propertyを保持する IngestibleInformation で、GraphStore・GraphEmbedding・runtime Actorではありません。
  why_needed:
    zh: 把图成员信息置于图容器之下。
    en: Places graph-member information beneath its graph container.
    ja: graph member informationをgraph container下に置きます。
  includes:
    - zh: 纳入图快照中的稳定节点记录。
      en: Includes stable node records in a graph snapshot.
      ja: graph snapshot内の安定node recordを含みます。
  excludes:
    - zh: 排除 GraphStore、GraphEdge 与节点嵌入。
      en: Excludes GraphStore, GraphEdge, and node embeddings.
      ja: GraphStore・GraphEdge・node embeddingを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - node_id
  fields:
    - id: node_id
      labels:
        zh: 节点标识
        en: node ID
        ja: node ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在图版本内稳定标识节点。
        en: Stably identifies the node within a graph version.
        ja: graph版内でnodeを安定識別します。
      allowed_values: []
      pattern: null
      example_value: node:policy:17
      source_claims:
        - claim-graph-node-002
    - id: graph_version
      labels:
        zh: 图版本
        en: graph version
        ja: graph版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定节点所属图快照。
        en: Fixes the graph snapshot containing the node.
        ja: nodeを含むgraph snapshotを固定します。
      allowed_values: []
      pattern: null
      example_value: graph-policy@7
      source_claims:
        - claim-graph-node-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphNode-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 图节点记录正例
      en: "Positive case: Graph node record"
      ja: graph node record正例
    scenario_id: null
    descriptions:
      zh: node:policy:17 在 graph-policy@7 中以 node_id、labels=[Policy]、属性摘要和 snapshot digest 识别，并可作为同快照 GraphEdge 的端点。
      en: node:policy:17 is identified in graph-policy@7 by node ID, labels [Policy], property digest, and snapshot digest and can serve as an endpoint of GraphEdges in that snapshot.
      ja: node:policy:17 は graph-policy@7 で node ID、labels、property digest、snapshot digest により識別され同 snapshot edge の endpoint になります。
    field_values:
      node_id: node:policy:17
      graph_version: graph-policy@7
    related_node_ids:
      - GraphNode
    related_relation_ids: []
    expected_result:
      zh: 将该带属性的图成员表示为 GraphNode，并把 node_id 的唯一性限定到 graph-policy@7。
      en: Represent the property-bearing graph member as GraphNode and scope node-ID uniqueness to graph-policy@7.
      ja: 当該 property-bearing member を GraphNode とし node ID uniqueness を graph-policy@7 に限定します。
    why_valid_or_invalid:
      zh: 图范围内稳定节点标识、标签、属性和成员清单共同固定源图节点的可摄取身份。
      en: A graph-scoped stable node ID, labels, properties, and membership manifest jointly fix the ingestible identity of the source graph node.
      ja: graph-scoped node ID、labels、properties、membership manifest が source graph node identity を固定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-node-004
  - id: GraphNode-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 图节点记录边界例
      en: "Boundary case: Graph node record"
      ja: graph node record境界例
    scenario_id: null
    descriptions:
      zh: graph-emb-17 是从 node:policy:17 的邻域计算出的 768 维向量，按模型版本和运行识别，不能充当源节点端点。
      en: graph-emb-17 is a 768-dimensional vector computed from node:policy:17's neighborhood and is identified by model version and run, so it cannot serve as the source-node endpoint.
      ja: graph-emb-17 は node neighborhood から計算した vector で model version・run により識別され source-node endpoint になれません。
    field_values: {}
    related_node_ids:
      - GraphNode
    related_relation_ids: []
    expected_result:
      zh: 把 graph-emb-17 保持为派生表示，不把它归为 GraphNode。
      en: Keep graph-emb-17 as a derived representation and do not classify it as GraphNode.
      ja: graph-emb-17 は derived representation とし GraphNode に分類しません。
    why_valid_or_invalid:
      zh: 源节点拥有业务属性和图成员生命周期，向量只编码其特征并可随模型重新生成。
      en: The source node owns business properties and graph-membership lifecycle, while the vector only encodes features and can be regenerated under another model.
      ja: source node は business properties・membership lifecycle を持ち vector は特徴表現で再生成可能です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-node-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: GraphStore-contains-GraphNode
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含节点
    en: contains node
    ja: nodeを含む
  definitions:
    zh: GraphStore —contains→ GraphNode 表示节点 ID 在该图快照命名空间中存在。
    en: GraphStore —contains→ GraphNode means that the node ID exists in that graph snapshot namespace.
    ja: GraphStore —contains→ GraphNode はnode IDがそのgraph snapshot namespace内に存在することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_contains
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: GraphStore-contains-GraphNode-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when node.graph_version matches the GraphStore version and the node is in snapshot membership.
      explanations:
        zh: 仅当 node.graph_version 与 GraphStore 的版本摘要相同且节点在快照成员集中时成立。
        en: Assert only when node.graph_version matches the GraphStore version and the node is in snapshot membership.
        ja: node.graph_versionが GraphStore版と一致しnodeがsnapshot member集合にある時だけ成立します。
      source_claims:
        - claim-graph-node-006
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GraphStore-contains-GraphNode-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 包含节点正例
        en: "Positive case: contains node"
        ja: nodeを含む正例
      scenario_id: null
      descriptions:
        zh: graph-policy@7 的 node manifest 列出 node:policy:17@p17，节点内部 graph_id、snapshot digest、labels 与属性摘要均匹配该版本。
        en: graph-policy@7's node manifest lists node:policy:17@p17, whose internal graph ID, snapshot digest, labels, and property digest all match that version.
        ja: graph-policy@7 node manifest が node:policy:17@p17 を列挙し graph ID、snapshot、labels、property digest が一致します。
      field_values: {}
      related_node_ids:
        - GraphStore
        - GraphNode
      related_relation_ids:
        - GraphStore-contains-GraphNode
      expected_result:
        zh: 建立 graph-policy@7 contains node:policy:17，并把节点身份限定到 @7。
        en: Assert graph-policy@7 contains node:policy:17 and scope node identity to @7.
        ja: graph-policy@7 contains node:policy:17 を確立し node identity を @7 に限定します。
      why_valid_or_invalid:
        zh: 图清单与节点内部版本信息双向一致，因此同名节点不会跨快照被错误复用。
        en: Graph manifest and the node's internal version information agree in both directions, preventing same-named nodes from being reused across snapshots.
        ja: graph manifest と node internal version が一致し same-name node の cross-snapshot reuse を防ぎます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-node-006
    - id: GraphStore-contains-GraphNode-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 包含节点边界例
        en: "Boundary case: contains node"
        ja: nodeを含む境界例
      scenario_id: null
      descriptions:
        zh: node:policy:17@p18 属于 graph-policy@8，虽然 node_id 相同，但 snapshot 与属性摘要均不同，且未列入 @7 清单。
        en: node:policy:17@p18 belongs to graph-policy@8; although the node ID matches, its snapshot and property digest differ and it is absent from @7's manifest.
        ja: node:policy:17@p18 は graph-policy@8 所属で node ID は同じでも snapshot・property digest が異なります。
      field_values: {}
      related_node_ids:
        - GraphStore
        - GraphNode
      related_relation_ids:
        - GraphStore-contains-GraphNode
      expected_result:
        zh: 不得把 @8 的节点版本连接为 graph-policy@7 的成员。
        en: Do not connect the @8 node version as a member of graph-policy@7.
        ja: "@8 node version を graph-policy@7 member として接続しません。"
      why_valid_or_invalid:
        zh: 节点标识只在图快照范围内稳定；忽略 snapshot 会把不同属性状态合并成一个来源事实。
        en: Node ID is stable only within graph-snapshot scope; ignoring the snapshot would merge different property states into one source fact.
        ja: node ID は graph snapshot scope 内だけで安定し snapshot 無視は異なる property states を統合します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-node-006
  source_claims:
    - claim-graph-node-006
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-ingestion-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析模式与 ETL 去重策略逐项人工语义核验通过。
    en: Manually verified against Anthropic Contextual Retrieval, LangChain text splitters and document loaders, LlamaIndex node parsers and ingestion pipeline, Unstructured parsing patterns, and ETL deduplication strategies.
    ja: Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析パターン、ETL 重複排除戦略に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-graph-node-001
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j GDS documents named graphs, filtered node sets, labels, properties, and derived node embeddings.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-node-002
    source: eng-graph-neo4j-node-embeddings
    supports: GraphNode.node_id records the graph-member identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-node-003
    source: eng-graph-neo4j-node-embeddings
    supports: GraphNode.graph_version records snapshot-scoped node identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-node-004
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j GDS defines nodes within a named graph and distinguishes them from computed embedding properties.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-node-005
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j distinguishes graph nodes from embedding vectors generated for them.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-node-006
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j GDS named graphs have explicit node sets and graph versions/projections.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
