schema: moonweave.ai/ontology-node/v1
id: GraphEdge
kind: concept
status: accepted
labels:
  zh: 图边记录
  en: Graph edge record
  ja: graph edge record
semantics:
  short_definition:
    zh: 图存储中由端点、类型与版本标识的关系信息。
    en: Relationship information in a graph store identified by endpoints, type, and version.
    ja: graph store内でendpoint・type・版により識別するrelationship informationです。
  definition:
    zh: GraphEdge 是属于一个 GraphStore、由 edge_id 或端点+类型+版本标识的 IngestibleInformation，并明确方向与可选权重；它不是本体关系定义或 GraphNode。
    en: GraphEdge is IngestibleInformation belonging to one GraphStore and identified by edge_id or endpoints plus type plus version, with explicit direction and optional weight; it is not an ontology relation definition or GraphNode.
    ja: GraphEdge は一 GraphStore に属し edge_idまたはendpoint+type+版で識別し方向と任意weightを明示する IngestibleInformation で、ontology relation定義や GraphNodeではありません。
  why_needed:
    zh: 区分被摄入的图数据边与本体 schema 边。
    en: Separates ingested graph-data edges from ontology schema relations.
    ja: 取込graph-data edgeをontology schema relationから分離します。
  includes:
    - zh: 纳入有来源/目标、类型、方向与版本的图关系记录。
      en: Includes graph relationship records with source, target, type, direction, and version.
      ja: source・target・type・direction・版を持つgraph relationship recordを含みます。
  excludes:
    - zh: 排除 GraphNode、关系类型定义与本体 relation。
      en: Excludes GraphNode, relationship-type definitions, and ontology relations.
      ja: GraphNode・relationship-type定義・ontology relationを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - edge_id
  fields:
    - id: edge_id
      labels:
        zh: 边标识
        en: edge ID
        ja: edge ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识图边记录。
        en: Stable identifier for the graph-edge record.
        ja: graph-edge recordの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: edge:17-18
      source_claims:
        - claim-graph-edge-002
    - id: source_node_id
      labels:
        zh: 源节点
        en: source node ID
        ja: source node ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录有向边起点。
        en: Records the directed edge source.
        ja: directed edge sourceを記録します。
      allowed_values: []
      pattern: null
      example_value: node:17
      source_claims:
        - claim-graph-edge-003
    - id: target_node_id
      labels:
        zh: 目标节点
        en: target node ID
        ja: target node ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录有向边终点。
        en: Records the directed edge target.
        ja: directed edge targetを記録します。
      allowed_values: []
      pattern: null
      example_value: node:18
      source_claims:
        - claim-graph-edge-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphEdge-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 图边记录正例
      en: "Positive case: Graph edge record"
      ja: graph edge record正例
    scenario_id: null
    descriptions:
      zh: edge:17-18 在 graph-policy@7 中由 edge_id、source=node:17、target=node:18、predicate=requires 和属性摘要识别，两个端点均存在于同一快照。
      en: edge:17-18 is identified in graph-policy@7 by edge ID, source node:17, target node:18, predicate requires, and a property digest, with both endpoints present in the same snapshot.
      ja: edge:17-18 は graph-policy@7 で edge ID、source/target、predicate、property digest により識別され両 endpoint が同一 snapshot に存在します。
    field_values:
      edge_id: edge:17-18
      source_node_id: node:17
      target_node_id: node:18
    related_node_ids:
      - GraphEdge
    related_relation_ids: []
    expected_result:
      zh: 将该业务图关系记录表示为 GraphEdge，并保留端点方向与图快照范围。
      en: Represent the business-graph relation record as GraphEdge while preserving endpoint direction and graph-snapshot scope.
      ja: 当該 business graph relation record を GraphEdge とし endpoint direction と snapshot scope を保持します。
    why_valid_or_invalid:
      zh: 边身份、定向端点、谓词和图版本共同固定一个可摄取的图事实，而不是本体模式关系。
      en: Edge identity, directed endpoints, predicate, and graph version jointly fix one ingestible graph fact rather than an ontology-schema relation.
      ja: edge identity、directed endpoints、predicate、graph version が一 ingestible graph fact を固定し ontology relation とは異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-edge-005
  - id: GraphEdge-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 图边记录边界例
      en: "Boundary case: Graph edge record"
      ja: graph edge record境界例
    scenario_id: null
    descriptions:
      zh: GraphStore-contains-GraphEdge 是 Moonweave 模式中的关系定义，只声明 GraphStore 可包含 GraphEdge，没有 graph-policy@7 的 edge_id 或业务端点。
      en: GraphStore-contains-GraphEdge is a Moonweave schema relation stating that a GraphStore may contain GraphEdges; it has no edge ID or business endpoints from graph-policy@7.
      ja: GraphStore-contains-GraphEdge は Moonweave schema relation で graph-policy@7 の edge ID・business endpoints を持ちません。
    field_values: {}
    related_node_ids:
      - GraphEdge
    related_relation_ids: []
    expected_result:
      zh: 把该模式语句保留为 ontology relation，不创建 GraphEdge 实例。
      en: Keep the statement as an ontology relation and create no GraphEdge instance from it.
      ja: 当該 schema statement は ontology relation とし GraphEdge instance を作りません。
    why_valid_or_invalid:
      zh: 模式层描述允许的概念连接，实例边记录特定图快照中的业务事实；二者身份层级不同。
      en: The schema layer describes permitted concept connectivity, whereas an instance edge records a business fact in one graph snapshot; their identity levels differ.
      ja: schema layer は概念接続を記述し instance edge は一 snapshot の business fact を記録するため identity level が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-edge-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: GraphNode
    shared_parent_concept_id: GraphStore
    differentia:
      zh: 端点特定对照：父节点 GraphStore：GraphEdge（semantic kind=information，骨架 GraphStore-contains-GraphEdge）；GraphNode（semantic kind=information，骨架 GraphStore-contains-GraphNode）。双端条件：GraphEdge 条件：“图存储中由端点、类型与版本标识的关系信息”；GraphNode 条件：“图存储中由节点 ID 与图版本标识的节点信息”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent GraphStore: GraphEdge (semantic kind=information, backbone GraphStore-contains-GraphEdge); GraphNode (semantic kind=information, backbone GraphStore-contains-GraphNode). Endpoint conditions: GraphEdge condition: “Relationship information in a graph store identified by endpoints, type, and version”; GraphNode condition: “Node information in a graph store identified by node ID and graph version”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 GraphStore：GraphEdge（semantic kind=information、バックボーン GraphStore-contains-GraphEdge）；GraphNode（semantic kind=information、バックボーン GraphStore-contains-GraphNode）。両端条件：GraphEdge の条件：「graph store内でendpoint・type・版により識別するrelationship informationです」；GraphNode の条件：「graph store内でnode IDとgraph版により識別するnode informationです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-graph-edge-007
parent_relation:
  id: GraphStore-contains-GraphEdge
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含边
    en: contains edge
    ja: edgeを含む
  definitions:
    zh: GraphStore —contains→ GraphEdge 表示边及其两个端点属于该图快照。
    en: GraphStore —contains→ GraphEdge means that the edge and both endpoints belong to that graph snapshot.
    ja: GraphStore —contains→ GraphEdge はedgeと両endpointがそのgraph snapshotに属することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_contains
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: GraphStore-contains-GraphEdge-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when edge.graph_version matches and both source and target nodes are graph members.
      explanations:
        zh: 仅当 edge.graph_version 匹配且 source/target 节点均为该图成员时成立。
        en: Assert only when edge.graph_version matches and both source and target nodes are graph members.
        ja: edge.graph_versionが一致しsource/target nodeがともにgraph memberの時だけ成立します。
      source_claims:
        - claim-graph-edge-008
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GraphStore-contains-GraphEdge-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 包含边正例
        en: "Positive case: contains edge"
        ja: edgeを含む正例
      scenario_id: null
      descriptions:
        zh: graph-policy@7 的 edge manifest 包含 edge:17-18，边的 graph_id、snapshot、source 与 target 均匹配，两个端点也在 @7 的 node manifest 中。
        en: graph-policy@7's edge manifest contains edge:17-18; the edge's graph ID, snapshot, source, and target match, and both endpoints occur in @7's node manifest.
        ja: graph-policy@7 edge manifest が edge:17-18 を含み graph ID、snapshot、source/target と endpoint closure が一致します。
      field_values: {}
      related_node_ids:
        - GraphStore
        - GraphEdge
      related_relation_ids:
        - GraphStore-contains-GraphEdge
      expected_result:
        zh: 建立 graph-policy@7 contains edge:17-18，并保留方向和快照范围。
        en: Assert graph-policy@7 contains edge:17-18 while preserving direction and snapshot scope.
        ja: graph-policy@7 contains edge:17-18 を direction・snapshot scope 付きで確立します。
      why_valid_or_invalid:
        zh: 边清单、边内部图版本与端点闭合同时成立，证明该业务关系属于这个图快照。
        en: Edge manifest, the edge's internal graph version, and endpoint closure all hold, proving membership in this graph snapshot.
        ja: edge manifest、internal graph version、endpoint closure が成立し snapshot membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-edge-008
    - id: GraphStore-contains-GraphEdge-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 包含边边界例
        en: "Boundary case: contains edge"
        ja: edgeを含む境界例
      scenario_id: null
      descriptions:
        zh: edge:17-99 声称 target=node:99，但 node:99 不在 graph-policy@7 的 node manifest 中，且该边未通过快照完整性检查。
        en: edge:17-99 names target node:99, but node:99 is absent from graph-policy@7's node manifest and the edge fails snapshot-integrity validation.
        ja: edge:17-99 の target node:99 は node manifest に無く snapshot integrity validation に失敗します。
      field_values: {}
      related_node_ids:
        - GraphStore
        - GraphEdge
      related_relation_ids:
        - GraphStore-contains-GraphEdge
      expected_result:
        zh: 不要把悬空 edge:17-99 作为 graph-policy@7 的已接受成员。
        en: Do not accept dangling edge:17-99 as a member of graph-policy@7.
        ja: dangling edge:17-99 を graph-policy@7 accepted member としません。
      why_valid_or_invalid:
        zh: 图快照中的边成员要求端点闭合；仅有 edge_id 和 graph_id 不能证明可摄取的完整关系。
        en: Edge membership in a graph snapshot requires endpoint closure; edge ID and graph ID alone do not prove a complete ingestible relation.
        ja: graph snapshot edge membership は endpoint closure が必要で edge ID・graph ID だけでは不十分です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-edge-008
  source_claims:
    - claim-graph-edge-008
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
