schema: moonweave.ai/ontology-node/v1
id: GraphEdge
kind: concept
labels:
  zh: 图边记录
  en: Graph edge record
  ja: グラフエッジレコード
semantics:
  short_definition:
    zh: 图存储快照内由端点、类型与版本标识的关系信息。
    en: Relationship information in a graph snapshot identified by endpoints, type, and version.
    ja: graph snapshot 内で endpoint/type/version により識別する relationship information。
  definition:
    zh: GraphEdge 是属于 GraphStore、由 edge_id 或端点+关系类型+graph_version 标识并含方向的 IngestibleInformation；Neo4j 关系与 LlamaIndex KG 三元组谓词/边均映射此类；它不是本体 schema relation 或 GraphNode。
    en: GraphEdge is IngestibleInformation belonging to GraphStore, identified by edge_id or endpoints plus relation type plus graph_version with direction, mapping Neo4j relationships and LlamaIndex KG triple predicates/edges; it is not an ontology schema relation or GraphNode.
    ja: GraphEdge は GraphStore に属し edge_id または endpoint+relation type+graph_version（方向付き）で識別する IngestibleInformation。Neo4j relationship/LlamaIndex KG triple predicate/edge に写像。ontology schema relation/GraphNode ではない。
  why_needed:
    zh: 区分被 ingest 的图数据边与 Moonweave 本体 is_a/part_of 等 schema 边，避免混淆数据来源与类型系统。
    en: Separates ingested graph-data edges from Moonweave ontology schema relations like is_a/part_of, avoiding conflation of data provenance and type system.
    ja: ingest 済 graph-data edge を Moonweave ontology schema relation（is_a/part_of 等）と分離し data provenance/type system 混同を避ける。
  includes:
    - zh: 纳入 Neo4j 关系、RDF 三元组边与 KG 抽取关系。
      en: Includes Neo4j relationships, RDF triple edges, and KG-extracted relations.
      ja: Neo4j relationship/RDF triple edge/KG 抽出 relation。
  excludes:
    - zh: 排除 GraphNode、关系类型 schema 定义与本体 relation 边。
      en: Excludes GraphNode, relationship-type schema definitions, and ontology relation edges.
      ja: GraphNode/relation type schema 定義/ontology relation edge を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Neo4j (a)-[r:REFERENCES {weight:0.9}]->(b) 产生有向 GraphEdge；KnowledgeGraphIndex 三元组 predicate 映射关系类型；Moonweave 本体 relations 数组描述概念间 schema 边，与 GraphEdge 数据源边正交。
    en: Neo4j (a)-[r:REFERENCES {weight:0.9}]->(b) yields directed GraphEdge; KnowledgeGraphIndex triple predicates map relation types; Moonweave ontology relations array describes schema edges between concepts, orthogonal to GraphEdge data edges.
    ja: Neo4j (a)-[r:REFERENCES]->(b) が directed GraphEdge。KnowledgeGraphIndex triple predicate→relation type。Moonweave ontology relations は概念間 schema edge で GraphEdge data edge と直交。
  typical_input:
    - description: Neo4j relationship record
      format: |
        (policy:17)-[:REFERENCES {weight: 0.9}]->(clause:42)
      source_claims: [claim-graph-edge-neo4j]
  typical_output:
    - description: Moonweave graph edge information identity
      format: |
        {
          "edge_id": "edge:17-42-references",
          "source_node_id": "policy:17",
          "target_node_id": "clause:42",
          "relation_type": "REFERENCES"
        }
      source_claims: [claim-graph-edge-design]
  reference_implementations:
    - name: Neo4j Relationships
      url: https://neo4j.com/docs/cypher-manual/current/clauses/create/
      description: Directed typed relationships between nodes.
    - name: LlamaIndex Knowledge Graph Index
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
      description: Triple predicate as graph relations.
structure:
  identity_keys: [edge_id]
  fields:
    - id: edge_id
      labels: {zh: 边标识, en: Edge identifier, ja: edge 識別子}
      definitions:
        zh: 稳定标识图快照内的边记录。
        en: Stable identifier for edge record within graph snapshot.
        ja: graph snapshot 内 edge record の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: edge:17-42-references
      allowed_values: []
      source_claims: [claim-graph-edge-id]
    - id: source_node_id
      labels: {zh: 源节点标识, en: Source node identifier, ja: source node 識別子}
      definitions:
        zh: 有向边的起始 GraphNode node_id。
        en: Starting GraphNode node_id of directed edge.
        ja: 有向 edge の始点 GraphNode node_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy:17
      allowed_values: []
      source_claims: [claim-graph-edge-source]
    - id: target_node_id
      labels: {zh: 目标节点标识, en: Target node identifier, ja: target node 識別子}
      definitions:
        zh: 有向边的终止 GraphNode node_id。
        en: Ending GraphNode node_id of directed edge.
        ja: 有向 edge の終点 GraphNode node_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: clause:42
      allowed_values: []
      source_claims: [claim-graph-edge-target]
  constraints: []
  required_relations: []
examples:
  - id: GraphEdge-example-neo4j-rel
    labels:
      zh: Neo4j REFERENCES 关系
      en: Neo4j REFERENCES relationship
      ja: Neo4j REFERENCES relationship
    descriptions:
      zh: graph-policy@7 含边 edge:17-42-references，连接 policy:17→clause:42，类型 REFERENCES、weight=0.9；两端点必须同属 snapshot @7。
      en: graph-policy@7 contains edge edge:17-42-references linking policy:17→clause:42, type REFERENCES, weight=0.9; both endpoints must belong to snapshot @7.
      ja: graph-policy@7 に edge edge:17-42-references（policy:17→clause:42、REFERENCES、weight=0.9）。両 endpoint は snapshot @7 所属必須。
    example_source:
      product: Neo4j
      url: https://neo4j.com/docs/cypher-manual/current/clauses/create/
      version: CREATE relationship
    field_values:
      edge_id: edge:17-42-references
      source_node_id: policy:17
      target_node_id: clause:42
      relation_type: REFERENCES
    related_node_ids: [GraphEdge, GraphNode, GraphStore]
    related_relation_ids: []
    source_claims: [claim-graph-edge-neo4j]
  - id: GraphEdge-example-llamaindex-predicate
    labels:
      zh: KG 三元组谓词
      en: KG triple predicate
      ja: KG triple predicate
    descriptions:
      zh: KnowledgeGraphIndex 抽取 (Policy:17, REFERENCES, Clause:42) 时 predicate REFERENCES 建模为 GraphEdge，subject/object 为 GraphNode。
      en: KnowledgeGraphIndex extraction (Policy:17, REFERENCES, Clause:42) models predicate REFERENCES as GraphEdge with subject/object as GraphNode.
      ja: KnowledgeGraphIndex 抽出 (Policy:17, REFERENCES, Clause:42) で predicate REFERENCES→GraphEdge、subject/object→GraphNode。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
      version: triple extraction
    field_values:
      edge_id: edge:17-42-references
      extracted_from: document-policy-v7
    related_node_ids: [GraphEdge, GraphNode, Document]
    related_relation_ids: []
    source_claims: [claim-graph-edge-llamaindex]
  - id: GraphEdge-example-not-ontology-relation
    labels:
      zh: 数据边非本体边
      en: Data edge is not ontology relation
      ja: data edge は ontology relation ではない
    descriptions:
      zh: FileResource-is_a-IngestibleResource 是 Moonweave 概念 schema 边；edge:17-42-references 是 Neo4j 业务图数据——二者语义层与审计域不同。
      en: FileResource-is_a-IngestibleResource is a Moonweave concept schema edge; edge:17-42-references is Neo4j business graph data—their semantic layers and audit domains differ.
      ja: FileResource-is_a-IngestibleResource は Moonweave 概念 schema edge。edge:17-42-references は Neo4j 業務 graph data。semantic layer/audit domain 異なる。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [GraphEdge, FileResource]
    related_relation_ids: []
    source_claims: [claim-graph-edge-design]
parent_relation:
  id: GraphEdge-is_a-IngestibleInformation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入信息, en: is ingestible information, ja: 取込可能情報の一種}
  definitions:
    zh: GraphEdge 种差为有向端点、关系类型与 graph_version 内的边信息记录。
    en: GraphEdge differentia is directed endpoints, relation type, and in-version edge information record.
    ja: GraphEdge 種差は directed endpoint/relation type/graph_version 内 edge information record。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-graph-edge-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-neo4j-rel
    title: Neo4j Create Relationships
    publisher: Neo4j
    url: https://neo4j.com/docs/cypher-manual/current/clauses/create/
    source_type: official-doc
    relevance: Typed directed relationships.
  - id: src-llamaindex-kg
    title: LlamaIndex Knowledge Graph Index
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/indexing/lpg_index_guide/
    source_type: official-doc
    relevance: Triple predicates as relations.
  - id: src-graph-edge-design
    title: Moonweave graph edge boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Data edges versus ontology schema relations.
source_claims:
  - id: claim-graph-edge-neo4j
    source: src-neo4j-rel
    supports: Neo4j relationships connect two nodes with a typed directed edge.
    locator: CREATE
    evidence_kind: official
    confidence: high
  - id: claim-graph-edge-llamaindex
    source: src-llamaindex-kg
    supports: KnowledgeGraphIndex represents extracted predicates as graph relations.
    locator: LPG index guide
    evidence_kind: official
    confidence: high
  - id: claim-graph-edge-design
    source: src-graph-edge-design
    supports: Ingested graph-data edges are orthogonal to ontology concept schema relations.
    locator: boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-edge-id
    source: src-graph-edge-design
    supports: edge_id identifies edge record within graph snapshot.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-edge-source
    source: src-neo4j-rel
    supports: source_node_id is the directed edge start node.
    locator: Relationships
    evidence_kind: official
    confidence: high
  - id: claim-graph-edge-target
    source: src-neo4j-rel
    supports: target_node_id is the directed edge end node.
    locator: Relationships
    evidence_kind: official
    confidence: high
