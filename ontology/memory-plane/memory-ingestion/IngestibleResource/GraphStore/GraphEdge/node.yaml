source_claims:
  - id: claim-graph-edge-001
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j GDS 2026.06 documents node/relationship filtering, orientation, weights, and named graph scope.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-002
    source: eng-graph-neo4j-node-embeddings
    supports: GraphEdge.edge_id records the graph relationship identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-003
    source: eng-graph-neo4j-node-embeddings
    supports: GraphEdge.source_node_id records the edge's canonical source endpoint; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-004
    source: eng-graph-neo4j-node-embeddings
    supports: GraphEdge.target_node_id records the edge's canonical target endpoint; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-005
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j GDS documents graph relationships, relationship types, direction/orientation, and optional weights.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-006
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j graph data relationships are data instances; Moonweave relation records are ontology schema artifacts.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-007
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j Graph Data Science distinguishes graph nodes from relationships when defining the topology consumed by node-embedding algorithms. Moonweave therefore keeps GraphEdge as endpoint-and-relation information and GraphNode as node-identity information; their sibling placement under graph information is a Moonweave ontology inference, not a Neo4j taxonomy.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-graph-edge-008
    source: eng-graph-neo4j-node-embeddings
    supports: Neo4j GDS graph projection filters nodes and relationships and requires coherent graph membership.
    locator: Graph Data Science 2026.06 > Node embeddings > algorithms, downstream use, structural search, and generalization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
