schema: moonweave.ai/ontology-node/v1
id: GraphEdge
kind: concept
status: accepted
labels:
  zh: 图关系记录
  en: Graph Relationship Record
  ja: グラフ関係レコード
semantics:
  short_definition:
    zh: 属于一个版本化图存储、由关系标识、定向端点和关系类型描述的源图关系事实。
    en: A source graph relationship fact belonging to one versioned graph store and described by a relationship ID, directed endpoints, and relationship type.
    ja: 一つの版管理された graph store に属し、relationship ID、方向付き endpoint、relationship type で記述される source graph relationship fact。
  definition:
    zh: >-
      GraphEdge 是 GraphStore 的组成成员，记录一个属性图快照中的业务关系。它以 edge_id、graph_store_ref、version_ref、source_node_ref、target_node_ref 和 relationship_type 识别，
      并可保留关系属性摘要。它不是 GraphStore、GraphNode、关系类型定义、查询文本、查询结果、Moonweave 本体模式 relation、GraphEmbedding、运行时 Actor 或访问凭据。
      它所表示的是来源图中的实例级连接，而不是本体中允许概念互连的模式声明。
    en: >-
      A GraphEdge is a composition member of GraphStore that records one business relationship in a property-graph
      snapshot. It is identified by edge_id, graph_store_ref, version_ref, source_node_ref, target_node_ref, and
      relationship_type and can retain a relationship-properties digest. It is not a GraphStore, GraphNode, relationship
      type definition, query text, query result, Moonweave ontology schema relation, GraphEmbedding, runtime Actor, or
      access credential. It represents an instance-level connection in a source graph rather than a schema declaration
      permitting concepts to interconnect.
    ja: >-
      GraphEdge は property-graph snapshot 内の一つの business relationship を記録する GraphStore の composition member です。
      edge_id、graph_store_ref、version_ref、source_node_ref、target_node_ref、relationship_type で識別され、relationship property
      digest を保持できます。GraphStore、GraphNode、relationship type definition、query text、query result、Moonweave ontology schema
      relation、GraphEmbedding、runtime Actor、access credential ではありません。概念同士の接続を許可する schema declaration ではなく、
      source graph 内の instance-level connection を表します。
  why_needed:
    zh: 将来源图中的实际业务连接与本体的概念关系和派生图嵌入分开，才能审计端点、方向和图快照范围。
    en: Separating actual business connections in a source graph from ontology concept relations and derived graph embeddings makes endpoints, direction, and graph-snapshot scope auditable.
    ja: source graph 内の実際の business connection を ontology concept relation と派生 graph embedding から分離することで、endpoint、direction、graph-snapshot scope を監査できます。
  includes:
    - zh: 在固定图快照中从政策节点指向约束节点且类型为 REQUIRES 的有向关系。
      en: A directed REQUIRES relationship from a policy node to a constraint node in a pinned graph snapshot.
      ja: 固定された graph snapshot 内で policy node から constraint node へ向かう REQUIRES の有向 relationship。
  excludes:
    - zh: GraphStore-contains-GraphEdge 这样的本体模式 relation、单个节点、未闭合端点的查询行和图嵌入向量。
      en: An ontology schema relation such as GraphStore-contains-GraphEdge, one node, a query row with unresolved endpoints, or a graph-embedding vector.
      ja: GraphStore-contains-GraphEdge のような ontology schema relation、一つの node、未解決 endpoint を持つ query row、graph-embedding vector。
  semantic_kind: information
  aliases:
    - source graph relationship
    - versioned graph edge
engineering:
  explanation:
    zh: >-
      图摄入器在指定 GraphStore 快照中读取关系模式，并将每条关系的稳定标识、类型、源端点、目标端点和属性摘要写入临时记录。
      在接受该记录前，它校验两个端点均为同一 graph_store_ref 和 version_ref 下的 GraphNode；
      查询文本、参数和实际返回行由 IngestionRun 记录。该流程避免将关系方向或实例事实混入 Moonweave 的本体模式关系。
    en: >-
      A graph ingestor reads relationship patterns in a specified GraphStore snapshot and writes each relationship's stable
      ID, type, source endpoint, target endpoint, and property digest to a temporary record. Before accepting the record it
      verifies that both endpoints are GraphNodes under the same graph_store_ref and version_ref; query text, parameters,
      and actual returned rows are recorded by an IngestionRun. This keeps relationship direction and instance facts out of
      Moonweave ontology schema relations.
    ja: >-
      graph ingestor は指定された GraphStore snapshot 内の relationship pattern を読み、各 relationship の stable ID、type、source
      endpoint、target endpoint、property digest を一時 record に書きます。record を受理する前に、両 endpoint が同一の
      graph_store_ref と version_ref の GraphNode であることを検証します。query text、parameter、実際の返却 row は IngestionRun が
      記録します。この流れにより relationship direction と instance fact を Moonweave ontology schema relation に混入させません。
  typical_input:
    - description: Relationship row from a pinned graph query
      format: |
        {
          "edge_id": "edge-policy-17-18-v7",
          "graph_store_ref": "graph-policy-v7",
          "version_ref": "snapshot:policy-graph:7",
          "source_node_ref": "node-policy-17-v7",
          "target_node_ref": "node-constraint-18-v7",
          "relationship_type": "REQUIRES",
          "properties_digest": "sha256:edge-policy-17-18-v7"
        }
  typical_output:
    - description: Validated edge record for normalization
      format: |
        {
          "graph_edge_ref": "edge-policy-17-18-v7",
          "source_endpoint_verified": true,
          "target_endpoint_verified": true,
          "ingestion_run_ref": "ingest-graph-policy-7"
        }
  reference_implementations:
    - name: Neo4j node and relationship patterns
      url: https://neo4j.com/docs/cypher-manual/current/patterns/reference/node-and-relationship-patterns/
      description: Documents relationship patterns between node patterns, relationship types, and directed arrows.
    - name: Neo4j Cypher queries
      url: https://neo4j.com/docs/cypher-manual/current/queries/
      description: Documents core graph-query concepts for nodes, relationships, and paths.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities, activities, and generated information for recording source facts separately from operations.
structure:
  identity_keys:
    - edge_id
    - graph_store_ref
    - version_ref
  fields:
    - id: edge_id
      labels:
        zh: 关系标识
        en: relationship ID
        ja: 関係 ID
      definitions:
        zh: 在指定图存储和版本内稳定标识一条来源图关系记录，而不是关系类型或本体模式 relation。
        en: Stably identifies one source-graph relationship record within the stated graph store and version rather than a relationship type or ontology schema relation.
        ja: relationship type や ontology schema relation ではなく、指定された graph store と version 内の一つの source-graph relationship record を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: edge-policy-17-18-v7
      source_claims:
        - claim-graph-edge-identity
    - id: graph_store_ref
      labels:
        zh: 所属图存储引用
        en: owning graph-store reference
        ja: 所属グラフストア参照
      definitions:
        zh: 引用承载该关系并定义端点命名空间的 GraphStore，而不是一个查询会话或连接凭据。
        en: References the GraphStore that hosts the relationship and defines its endpoint namespace rather than a query session or connection credential.
        ja: query session や connection credential ではなく、relationship を収容し endpoint namespace を定義する GraphStore を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: graph-policy-v7
      source_claims:
        - claim-graph-edge-membership
    - id: version_ref
      labels:
        zh: 图快照版本引用
        en: graph-snapshot version reference
        ja: グラフスナップショット版参照
      definitions:
        zh: 记录关系及其两个端点可见的图快照版本，防止把不同快照的端点拼接成一条关系。
        en: Records the graph-snapshot version in which the relationship and both endpoints are visible, preventing endpoints from different snapshots being joined into one relationship.
        ja: relationship と両 endpoint が可視となる graph-snapshot version を記録し、異なる snapshot の endpoint を一つの relationship に結合することを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "snapshot:policy-graph:7"
      source_claims:
        - claim-graph-edge-membership
    - id: source_node_ref
      labels:
        zh: 源节点引用
        en: source-node reference
        ja: 始点ノード参照
      definitions:
        zh: 引用该版本图快照中有向关系的起点 GraphNode，而不是仅复制节点名称。
        en: References the GraphNode at the origin of the directed relationship in this graph snapshot rather than merely copying a node name.
        ja: 単に node name を複写するのではなく、この graph snapshot 内の有向 relationship の起点となる GraphNode を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: node-policy-17-v7
      source_claims:
        - claim-graph-edge-direction
    - id: target_node_ref
      labels:
        zh: 目标节点引用
        en: target-node reference
        ja: 終点ノード参照
      definitions:
        zh: 引用该版本图快照中有向关系的终点 GraphNode，而不是查询结果中的非结构化值。
        en: References the GraphNode at the destination of the directed relationship in this graph snapshot rather than an unstructured value in query output.
        ja: query output 内の非構造化 value ではなく、この graph snapshot 内の有向 relationship の終点となる GraphNode を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: node-constraint-18-v7
      source_claims:
        - claim-graph-edge-direction
    - id: relationship_type
      labels:
        zh: 关系类型
        en: relationship type
        ja: 関係タイプ
      definitions:
        zh: 记录来源图关系的类型或谓词，例如 REQUIRES；它不是 Moonweave 本体 predicate 定义。
        en: Records the source-graph relationship type or predicate such as REQUIRES; it is not a Moonweave ontology predicate definition.
        ja: REQUIRES など source-graph relationship type または predicate を記録し、Moonweave ontology predicate definition ではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: REQUIRES
      source_claims:
        - claim-graph-edge-model
    - id: properties_digest
      labels:
        zh: 关系属性摘要
        en: relationship-properties digest
        ja: 関係プロパティダイジェスト
      definitions:
        zh: 可选记录关系属性的算法标记摘要，用于在不将全部属性复制到身份键时验证该版本的属性状态。
        en: Optionally records an algorithm-tagged digest of relationship properties to verify property state at this version without copying every property into the identity key.
        ja: すべての property を identity key に複写せず、この version の property state を検証するために relationship property の algorithm-tagged digest を任意で記録します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      allowed_values: []
      pattern: null
      example_value: sha256:edge-policy-17-18-v7
      source_claims:
        - claim-graph-edge-identity
  constraints:
    - id: graph-edge-endpoint-closure
      severity: error
      expression_language: plain
      expression: >-
        edge_id, graph_store_ref, version_ref, source_node_ref, target_node_ref, and relationship_type are required.
        source_node_ref and target_node_ref must resolve to GraphNodes in the same graph_store_ref and version_ref, and
        the graph manifest must contain this relationship representation. A schema relation, relationship type definition,
        query row with unresolved endpoints, graph embedding, credential, or query activity cannot substitute for GraphEdge.
      explanation:
        zh: 图关系记录必须闭合到同一快照中的两个源节点并拥有实例级关系类型；模式层 relation 和未验证查询输出没有这种来源身份。
        en: A graph relationship record must close over two source nodes in the same snapshot and carry an instance-level relationship type; schema relations and unverified query output do not have that source identity.
        ja: graph relationship record は同じ snapshot 内の二つの source node に閉じ、instance-level relationship type を持たなければなりません。schema relation と未検証の query output にはその source identity がありません。
      source_claims:
        - claim-graph-edge-model
        - claim-graph-edge-direction
        - claim-graph-edge-membership
        - claim-graph-edge-boundary
  required_relations: []
examples:
  - id: graph-edge-positive

    labels:
      zh: 政策要求关系
      en: Policy requirement relationship
      ja: 政策要件関係

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      edge_id: edge-policy-17-18-v7
      graph_store_ref: graph-policy-v7
      version_ref: "snapshot:policy-graph:7"
      source_node_ref: node-policy-17-v7
      target_node_ref: node-constraint-18-v7
      relationship_type: REQUIRES
      properties_digest: sha256:edge-policy-17-18-v7
    related_node_ids:
      - GraphEdge
      - GraphStore
      - GraphNode
    related_relation_ids:
      - GraphStore-contains-GraphEdge

    source_claims:
      - claim-graph-edge-model
      - claim-graph-edge-direction
      - claim-graph-edge-membership
  - id: graph-edge-counterexample

    labels:
      zh: 本体模式关系不是图关系记录
      en: Ontology schema relation is not a graph record
      ja: オントロジースキーマ関係はグラフ記録ではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      schema_relation_id: GraphStore-contains-GraphEdge
      edge_id: absent
      graph_store_ref: absent
      source_node_ref: absent
      target_node_ref: absent
    related_node_ids:
      - GraphEdge
      - GraphStore
    related_relation_ids:
      - GraphStore-contains-GraphEdge

    source_claims:
      - claim-graph-edge-boundary
  - id: graph-edge-boundary

    labels:
      zh: 悬空端点关系
      en: Relationship with a dangling endpoint
      ja: 宙ぶらりんの端点を持つ関係

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      edge_id: edge-policy-17-99-v7
      graph_store_ref: graph-policy-v7
      version_ref: "snapshot:policy-graph:7"
      source_node_ref: node-policy-17-v7
      target_node_ref: node-unknown-99-v7
      relationship_type: REQUIRES
    related_node_ids:
      - GraphEdge
      - GraphNode
      - GraphStore
    related_relation_ids:
      - GraphStore-contains-GraphEdge

    source_claims:
      - claim-graph-edge-membership
  - id: graph-edge-instance

    labels:
      zh: 实例：合规控制依赖关系
      en: "Instance: compliance-control dependency"
      ja: "事例：コンプライアンス制御依存関係"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      edge_id: edge-control-3-9-v4
      graph_store_ref: graph-compliance-v4
      version_ref: "snapshot:compliance-graph:4"
      source_node_ref: node-control-3-v4
      target_node_ref: node-requirement-9-v4
      relationship_type: SATISFIES
      properties_digest: sha256:edge-control-3-9-v4
    related_node_ids:
      - GraphEdge
      - GraphNode
      - GraphStore
      - IngestionRun
      - Document
    related_relation_ids:
      - GraphStore-contains-GraphEdge

    source_claims:
      - claim-graph-edge-membership
      - claim-graph-edge-provenance
parent_relation:
  id: GraphStore-contains-GraphEdge
  predicate: part_of
  target: concept:GraphStore
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是图存储的关系成员
    en: is a relationship member of graph store
    ja: グラフストアの関係メンバーである
  definitions:
    zh: GraphEdge 是 graph_store_ref 所指 GraphStore 在指定 version_ref 下的关系成员，且其两个端点必须属于同一图快照。
    en: GraphEdge is a relationship member of the GraphStore named by graph_store_ref at the stated version_ref, and both endpoints must belong to that same graph snapshot.
    ja: GraphEdge は graph_store_ref が指す GraphStore の指定 version_ref における relationship member であり、両 endpoint は同じ graph snapshot に属さなければなりません。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_relationship_member
    labels:
      zh: 有关系成员
      en: has relationship member
      ja: 関係メンバーを持つ
  conditions:
    - id: graph-edge-part-of-graph-store-condition
      severity: error
      expression_language: plain
      expression: >-
        Assert composition only when edge.graph_store_ref equals graphStore.resource_id, edge.version_ref equals the
        graph-store version being represented, both endpoint references resolve to GraphNodes in that same version, and the
        graph manifest contains the edge. A schema relation, relationship type, query result, or dangling edge does not
        establish graph-store membership.
      explanation:
        zh: 图成员关系需要图存储引用、版本、端点闭合和清单证据；模式层结构或缺失端点的查询输出不能建立成员关系。
        en: Graph membership requires graph-store reference, version, endpoint closure, and manifest evidence; schema structure or query output with missing endpoints cannot establish membership.
        ja: graph membership には graph-store reference、version、endpoint closure、manifest evidence が必要であり、schema structure や endpoint が欠けた query output では membership を確立できません。
      source_claims:
        - claim-graph-edge-membership
  temporal_scope: valid-time
  boundary_context: Relationship membership is specific to one graph snapshot and does not make a graph relationship an ontology schema relation.
  constraints: []
  examples: []
  source_claims:
    - claim-graph-edge-membership
  distinct_fact_rationale: This composition records a source-graph membership fact separately from ontology schema structure and query execution.
  layout_role: primary-backbone
relations: []
sources:
  - id: neo4j-node-relationship-patterns
    title: Neo4j node and relationship patterns
    url: https://neo4j.com/docs/cypher-manual/current/patterns/reference/node-and-relationship-patterns/
    type: official-doc
    source_type: official-doc
    relevance: Documents node patterns relationship patterns relationship types and directed relationships.
  - id: neo4j-cypher-queries
    title: Neo4j Cypher queries
    url: https://neo4j.com/docs/cypher-manual/current/queries/
    type: official-doc
    source_type: official-doc
    relevance: Documents core graph-query concepts for nodes relationships and paths.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities activities usage and generation for provenance separation.
source_claims:
  - id: claim-graph-edge-model
    source: neo4j-node-relationship-patterns
    supports: >-
      Neo4j documents relationship patterns between node patterns and explains relationship types. Moonweave records a
      source graph relationship with a type and two endpoint references rather than as an ontology schema predicate.
    locator: Neo4j relationship patterns and relationship types
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-graph-edge-direction
    source: neo4j-node-relationship-patterns
    supports: >-
      Neo4j documents directed relationship patterns using arrows and relationships connecting node patterns. Moonweave
      records separate source_node_ref and target_node_ref so graph direction is not inferred from display order.
    locator: Neo4j relationship patterns and relationship directions
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-graph-edge-identity
    source: w3c-prov-o
    supports: >-
      PROV-O supports independently identifiable entities. Moonweave identifies a graph relationship record by edge ID,
      graph store, version, endpoints, type, and optional properties digest separately from queries and generated artifacts.
    locator: PROV-O Entity and Activity
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-graph-edge-membership
    source: neo4j-node-relationship-patterns
    supports: >-
      Neo4j documents relationship patterns as connections between node patterns. Moonweave treats an edge as a member of a
      graph snapshot only when its two endpoint references resolve under the same graph store and version and the manifest
      records the relationship.
    locator: Neo4j relationship patterns connecting node patterns
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-graph-edge-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes source entities from activities and generated entities. Moonweave keeps an instance graph edge,
      a query run, a derived embedding, and ontology schema relation identity separate.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-graph-edge-provenance
    source: neo4j-cypher-queries
    supports: >-
      Neo4j documents graph-query concepts for nodes relationships and paths. Moonweave records query execution and its
      returned content on an IngestionRun while retaining graph-edge source identity as a separate fact.
    locator: Neo4j Cypher queries core concepts
    evidence_kind: ontology-design-inference
    confidence: medium
