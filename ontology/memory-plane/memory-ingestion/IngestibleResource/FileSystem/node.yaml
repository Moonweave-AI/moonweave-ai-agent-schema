schema: moonweave.ai/ontology-node/v1
id: FileSystem
kind: concept
status: accepted
labels:
  zh: 文件系统
  en: File system
  ja: ファイルシステム
semantics:
  short_definition:
    zh: 拥有根定位符并容纳目录层级的可摄入资源。
    en: An ingestible resource owning a root locator and directory hierarchy.
    ja: root locatorとdirectory階層を所有する取込可能resourceです。
  definition:
    zh: FileSystem 是以根 URI、挂载或桶为身份并承载 DirectoryResource 层级的 IngestibleResource；它不是一个目录、一个文件或抽象 StorageArea。
    en: FileSystem is an IngestibleResource identified by a root URI, mount, or bucket and hosting a DirectoryResource hierarchy; it is not one directory, one file, or an abstract StorageArea.
    ja: FileSystem はroot URI・mount・bucketで識別し DirectoryResource 階層をhostする IngestibleResource で、単一directory・file・抽象StorageAreaではありません。
  why_needed:
    zh: 让文件来源形成 FileSystem→Directory→File 的真实层级。
    en: Creates the real FileSystem-to-Directory-to-File hierarchy.
    ja: FileSystem→Directory→Fileの実階層を作ります。
  includes:
    - zh: 纳入本地卷、对象存储桶和可遍历文件根。
      en: Includes local volumes, object-store buckets, and traversable file roots.
      ja: local volume・object-store bucket・traversable file rootを含みます。
  excludes:
    - zh: 排除 DirectoryResource、FileResource 与 StorageArea。
      en: Excludes DirectoryResource, FileResource, and StorageArea.
      ja: DirectoryResource・FileResource・StorageAreaを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 资源标识
        en: resource ID
        ja: resource ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识文件系统来源。
        en: Stable identifier for the filesystem source.
        ja: filesystem sourceの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: fs-policy
      source_claims:
        - claim-file-system-002
    - id: root_uri
      labels:
        zh: 根定位符
        en: root URI
        ja: root URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录目录遍历起点。
        en: Records the directory traversal root.
        ja: directory traversal rootを記録します。
      allowed_values: []
      pattern: null
      example_value: s3://policy-corpus/
      source_claims:
        - claim-file-system-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: FileSystem-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 文件系统正例
      en: "Positive case: File system"
      ja: ファイルシステム正例
    scenario_id: null
    descriptions:
      zh: fs-policy 以根 URI s3://policy-corpus/、bucket account、连接配置版本和 snapshot-2026-07 识别，并承载 /legal/ 与 /finance/ 等目录。
      en: fs-policy is identified by root URI s3://policy-corpus/, bucket account, connection-profile version, and snapshot-2026-07 and hosts directories such as /legal/ and /finance/.
      ja: fs-policy は root URI、bucket account、connection profile version、snapshot で識別され複数 directory を host します。
    field_values:
      resource_id: fs-policy
      root_uri: s3://policy-corpus/
      canonical_locator: s3://policy-corpus/
      version_ref: snapshot:2026-07
      content_digest: sha256:fs-policy-snapshot-2026-07
    related_node_ids:
      - FileSystem
    related_relation_ids: []
    expected_result:
      zh: 将该可遍历根命名空间表示为 FileSystem，并在其快照内解析目录成员。
      en: Represent the traversable root namespace as FileSystem and resolve directory members within its snapshot.
      ja: 当該 traversable root namespace を FileSystem とし snapshot 内で directory members を解決します。
    why_valid_or_invalid:
      zh: 根定位符、账户边界、连接配置与目录树生命周期共同形成文件系统级资源身份。
      en: Root locator, account boundary, connection profile, and directory-tree lifecycle jointly establish file-system-level resource identity.
      ja: root locator、account boundary、connection profile、directory-tree lifecycle が filesystem-level identity を形成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-system-004
  - id: FileSystem-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 文件系统边界例
      en: "Boundary case: File system"
      ja: ファイルシステム境界例
    scenario_id: null
    descriptions:
      zh: dir-legal 只在 fs-policy 下拥有路径 /legal/ 和自身清单摘要；它不能解析同根的 /finance/，也不拥有 bucket 连接配置。
      en: dir-legal owns only path /legal/ and its own manifest under fs-policy; it cannot resolve sibling /finance/ and does not own the bucket connection profile.
      ja: dir-legal は /legal/ path と自身 manifest だけを持ち sibling /finance/ を解決せず bucket connection profile を持ちません。
    field_values: {}
    related_node_ids:
      - FileSystem
    related_relation_ids: []
    expected_result:
      zh: 把 dir-legal 保持为 DirectoryResource，不把一个目录成员提升为 FileSystem。
      en: Keep dir-legal as DirectoryResource and do not promote one directory member to FileSystem.
      ja: dir-legal は DirectoryResource とし一 directory member を FileSystem へ昇格させません。
    why_valid_or_invalid:
      zh: 目录依赖根命名空间才能解释其路径，而文件系统拥有跨目录的连接、遍历和快照边界。
      en: A directory depends on the root namespace to interpret its path, while the FileSystem owns cross-directory connection, traversal, and snapshot boundaries.
      ja: directory は root namespace に依存し FileSystem は cross-directory connection・traversal・snapshot boundary を所有します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-system-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: FileSystem-is_a-IngestibleResource
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: FileSystem 是 IngestibleResource 的严格子类；种差为：以根 URI、挂载或桶为身份并容纳目录层级。
    en: "FileSystem is a strict subtype of IngestibleResource; its reviewed differentia is: it is identified by a root URI, mount, or bucket and hosts a directory hierarchy."
    ja: FileSystem は IngestibleResource の厳密なsubtypeで、審査済み種差は「root URI・mount・bucketで識別しdirectory階層をhostします。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: FileSystem-is_a-IngestibleResource-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IngestibleResource and also satisfies the differentia: it is identified by a root URI, mount, or bucket and hosts a directory hierarchy."
      explanations:
        zh: 仅当对象首先满足 IngestibleResource 定义且满足种差“以根 URI、挂载或桶为身份并容纳目录层级。”时成立。
        en: "Assert only when the object first satisfies IngestibleResource and also satisfies the differentia: it is identified by a root URI, mount, or bucket and hosts a directory hierarchy."
        ja: 対象がまず IngestibleResource を満たし、さらに種差「root URI・mount・bucketで識別しdirectory階層をhostします。」を満たす時だけ成立します。
      source_claims:
        - claim-file-system-006
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FileSystem-is_a-IngestibleResource-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: fs-policy 具有稳定根 URI、bucket snapshot、访问 profile 和可由 directory loader 遍历的成员清单，满足外部可读资源上位条件。
        en: fs-policy has a stable root URI, bucket snapshot, access profile, and a member manifest traversable by a directory loader, satisfying the external readable-resource parent.
        ja: fs-policy は stable root URI、bucket snapshot、access profile、directory-loader-traversable manifest を持ちます。
      field_values: {}
      related_node_ids:
        - FileSystem
        - IngestibleResource
      related_relation_ids:
        - FileSystem-is_a-IngestibleResource
      expected_result:
        zh: 确认 fs-policy 是 IngestibleResource 的 FileSystem 特化。
        en: Confirm fs-policy as a FileSystem specialization of IngestibleResource.
        ja: fs-policy を IngestibleResource の FileSystem specialization とします。
      why_valid_or_invalid:
        zh: 对象先满足定位、版本和可读取条件，再以根命名空间和目录树承载责任区别于普通资源。
        en: The object first satisfies locator, version, and readability conditions and adds root namespace and directory-tree hosting as FileSystem differentia.
        ja: locator・version・readability parent 条件に root namespace・directory-tree hosting differentia を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-file-system-006
    - id: FileSystem-is_a-IngestibleResource-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: dir-legal 是 fs-policy 下的一个目录成员，没有根连接配置或跨目录遍历边界，不能充当整个 FileSystem。
        en: dir-legal is one directory member under fs-policy and has no root connection profile or cross-directory traversal boundary, so it cannot stand for the whole FileSystem.
        ja: dir-legal は一 directory member で root connection profile・cross-directory boundary を持ちません。
      field_values: {}
      related_node_ids:
        - FileSystem
        - IngestibleResource
      related_relation_ids:
        - FileSystem-is_a-IngestibleResource
      expected_result:
        zh: 不要通过该子类边把 DirectoryResource 提升为 FileSystem。
        en: Do not use this subtype edge to promote a DirectoryResource to FileSystem.
        ja: この subtype edge で DirectoryResource を FileSystem へ昇格させません。
      why_valid_or_invalid:
        zh: 目录是根资源承载的成员而非根本身；成员的可读取性不足以满足文件系统容器种差。
        en: A directory is hosted by the root resource rather than being the root itself; member readability does not satisfy the FileSystem container differentia.
        ja: directory は root resource member で member readability だけでは FileSystem container differentia を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-file-system-006
  source_claims:
    - claim-file-system-006
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: FileSystem-hosts-DirectoryResource
    predicate: hosts
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 托管目录
      en: hosts directory
      ja: directoryをhostする
    definitions:
      zh: FileSystem —hosts→ DirectoryResource 表示 DirectoryResource 的 filesystem_id 回指该 FileSystem，且 directory_uri 能在其 root_uri 命名空间内规范解析而不越出根。
      en: FileSystem —hosts→ DirectoryResource states that the DirectoryResource filesystem_id refers to the FileSystem and directory_uri resolves canonically within its root_uri namespace without escaping the root.
      ja: FileSystem —hosts→ DirectoryResource は DirectoryResource の filesystem_id が FileSystem を参照し、directory_uri が root_uri namespace 内で root を越えず canonical に解決されることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_hosts
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: FileSystem-hosts-DirectoryResource-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when directory.filesystem_id equals fileSystem.resource_id and directory.directory_uri canonically resolves beneath fileSystem.root_uri without escaping it.
        explanations:
          zh: 仅当 directory.filesystem_id 等于 fileSystem.resource_id，且 directory_uri 可在 fileSystem.root_uri 下规范解析而未越界时成立。
          en: Assert only when directory.filesystem_id equals fileSystem.resource_id and directory_uri resolves canonically beneath fileSystem.root_uri without escaping it.
          ja: directory.filesystem_id が fileSystem.resource_id と一致し、directory_uri が fileSystem.root_uri 下へ越境せず canonical に解決される時だけ成立します。
        source_claims:
          - claim-file-system-007
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: FileSystem-hosts-DirectoryResource-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 托管目录正例
          en: "Positive case: hosts directory"
          ja: directoryをhostする正例
        scenario_id: null
        descriptions:
          zh: fs-policy snapshot-2026-07 的 directory manifest 包含 dir-legal，dir-legal 的 filesystem_id、root URI 与 canonical path /legal/ 均回指该根。
          en: fs-policy snapshot-2026-07's directory manifest contains dir-legal, whose filesystem ID, root URI, and canonical path /legal/ all resolve back to that root.
          ja: fs-policy directory manifest が dir-legal を含み filesystem ID、root URI、canonical path が root に一致します。
        field_values: {}
        related_node_ids:
          - FileSystem
          - DirectoryResource
        related_relation_ids:
          - FileSystem-hosts-DirectoryResource
        expected_result:
          zh: 建立 fs-policy hosts dir-legal，并把目录成员资格限定到该文件系统快照。
          en: Assert fs-policy hosts dir-legal and scope directory membership to that file-system snapshot.
          ja: fs-policy hosts dir-legal を確立し membership を filesystem snapshot に限定します。
        why_valid_or_invalid:
          zh: 根清单与目录内部文件系统标识双向一致，证明它由该根命名空间承载。
          en: The root manifest and the directory's internal file-system identity agree in both directions, proving hosting by that root namespace.
          ja: root manifest と directory filesystem identity が一致し root namespace hosting を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-file-system-008
      - id: FileSystem-hosts-DirectoryResource-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 托管目录边界例
          en: "Boundary case: hosts directory"
          ja: directoryをhostする境界例
        scenario_id: null
        descriptions:
          zh: archive-fs 也有路径 /legal/，但 tenant 与 root URI 不同；archive-dir-legal 不在 fs-policy 的目录清单中。
          en: archive-fs also has path /legal/ but a different tenant and root URI, and archive-dir-legal is absent from fs-policy's directory manifest.
          ja: archive-fs にも /legal/ path があるが tenant・root URI が異なり fs-policy manifest にありません。
        field_values: {}
        related_node_ids:
          - FileSystem
          - DirectoryResource
        related_relation_ids:
          - FileSystem-hosts-DirectoryResource
        expected_result:
          zh: 不得仅凭相同路径建立 fs-policy hosts archive-dir-legal。
          en: Do not assert fs-policy hosts archive-dir-legal merely from the equal path.
          ja: same path だけで fs-policy hosts archive-dir-legal を確立しません。
        why_valid_or_invalid:
          zh: 绝对路径仍在根与租户范围内解释；忽略文件系统身份会把不同命名空间错误合并。
          en: Even an absolute path is interpreted within root and tenant scope; ignoring file-system identity would merge distinct namespaces.
          ja: absolute path も root・tenant scope 内で解釈され filesystem identity 無視は namespace 誤統合になります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-file-system-008
    source_claims:
      - claim-file-system-008
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:DirectoryResource
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-ingestion-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析模式与 ETL 去重策略逐项人工语义核验通过。
    en: Manually verified against Anthropic Contextual Retrieval, LangChain text splitters and document loaders, LlamaIndex node parsers and ingestion pipeline, Unstructured parsing patterns, and ETL deduplication strategies.
    ja: Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析パターン、ETL 重複排除戦略に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-file-system-001
    source: eng-fw-langchain-document-loaders
    supports: LangChain documents file and directory loader sources; Moonweave uses root identity to express containment explicitly.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-002
    source: eng-fw-langchain-document-loaders
    supports: FileSystem.resource_id records the filesystem source identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-003
    source: eng-fw-langchain-document-loaders
    supports: FileSystem.root_uri records the containment root for directories; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-004
    source: eng-fw-langchain-document-loaders
    supports: LangChain file and directory loaders operate from filesystem or object-store locations.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-005
    source: eng-fw-langchain-document-loaders
    supports: Directory loaders distinguish a directory path from the broader storage location containing it.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-006
    source: eng-fw-langchain-document-loaders
    supports: LangChain file and directory loaders use filesystem or object-store locations.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-007
    source: eng-std-rfc8089-file-uri
    supports: RFC 8089 defines the file URI scheme and relative resolution. Moonweave combines URI containment with an explicit filesystem_id equality check so a lexically similar URI from another filesystem cannot satisfy hosts.
    locator: RFC 8089 > Section 2 Syntax; Section 3 Operations Involving file URIs; Appendix E.2 Relative Resolution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-system-008
    source: eng-fw-langchain-document-loaders
    supports: LangChain directory loaders traverse files under one configured directory/root location.
    locator: Document loader integrations > Interface > BaseLoader load() and lazy_load() source-to-Document behavior
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
