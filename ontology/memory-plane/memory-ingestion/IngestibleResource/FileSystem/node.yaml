schema: moonweave.ai/ontology-node/v1
id: FileSystem
kind: concept
status: accepted
labels:
  zh: 文件系统
  en: File System
  ja: ファイルシステム
semantics:
  short_definition:
    zh: 以根命名空间和版本化清单标识、承载目录和文件资源的可摄入来源容器。
    en: An ingestible source container identified by a root namespace and versioned manifest that hosts directory and file resources.
    ja: root namespace と版管理された manifest で識別され、directory と file resource を収容する取り込み可能な source container。
  definition:
    zh: >-
      FileSystem 是 IngestibleResource 的特化，表示一个可解析的根命名空间，例如受控本地挂载、对象存储桶或远程文件共享。
      它以 resource_id、canonical_locator、namespace_kind、version_ref 和 content_digest 识别；摘要针对该根在特定版本下的资源清单。
      它承载 DirectoryResource 和 FileResource，但不是某一个目录、某一个文件、StorageArea、Document、DocumentLoader、一次遍历或读取活动、访问凭据、MemoryStore 或向量检索后端。
    en: >-
      A FileSystem is an IngestibleResource specialization representing one resolvable root namespace such as a controlled
      local mount, object-store bucket, or remote file share. It is identified by resource_id, canonical_locator,
      namespace_kind, version_ref, and content_digest over a resource manifest for that root and version. It hosts
      DirectoryResources and FileResources, but it is not one directory, one file, a StorageArea, a Document, a
      DocumentLoader, one traversal or read activity, an access credential, a MemoryStore, or a vector-retrieval backend.
    ja: >-
      FileSystem は、管理された local mount、object-store bucket、remote file share など一つの解決可能な root namespace を表す
      IngestibleResource の特化です。resource_id、canonical_locator、namespace_kind、version_ref、およびその root と version の
      resource manifest に対する content_digest で識別されます。DirectoryResource と FileResource を収容しますが、一つの
      directory、一つの file、StorageArea、Document、DocumentLoader、一回の traversal または read activity、access credential、
      MemoryStore、vector-retrieval backend ではありません。
  why_needed:
    zh: 文件系统级身份为路径解析、目录成员资格和摄入快照提供共同命名空间，避免将相同路径文本在不同挂载或存储桶中混为一谈。
    en: File-system identity provides a common namespace for path resolution, directory membership, and ingestion snapshots so identical path text in different mounts or buckets is not conflated.
    ja: filesystem identity は path resolution、directory membership、ingestion snapshot の共通 namespace を提供し、異なる mount や bucket の同じ path text を混同しません。
  includes:
    - zh: 具有无凭据根 URI、对象版本清单和根清单摘要的受控 S3 桶。
      en: A controlled S3 bucket with a credential-free root URI, object-version inventory, and root-manifest digest.
      ja: credential-free の root URI、object-version inventory、root-manifest digest を持つ管理された S3 bucket。
  excludes:
    - zh: 桶内的单个目录或文件、一次目录扫描、用于访问桶的令牌和扫描后生成的 Document。
      en: One directory or file in the bucket, one directory scan, a token used to access the bucket, or a Document produced after scanning.
      ja: bucket 内の一つの directory または file、一回の directory scan、bucket access 用 token、または scan 後に生成された Document。
  semantic_kind: entity
  aliases:
    - versioned source namespace
    - ingestible filesystem root
engineering:
  explanation:
    zh: >-
      摄入系统把根命名空间作为无凭据来源描述符登记，并将实际连接信息保留在独立的秘密管理系统中。
      在固定版本或库存快照下，它解析目录和文件定位符、按稳定顺序生成根资源清单并校验摘要；
      随后的目录枚举与文件读取通过独立 IngestionRun 记录。因此一次扫描结果或某个成员的变化不会回写为文件系统根的身份。
    en: >-
      The ingestion system registers the root namespace as a credential-free source descriptor and keeps actual connection
      material in separate secret management. At a fixed version or inventory snapshot it resolves directory and file
      locators, creates a root resource manifest in stable order, and verifies its digest. Later directory enumeration and
      file reads are recorded by separate IngestionRuns, so one scan result or member change does not write back into root
      identity.
    ja: >-
      ingestion system は root namespace を credential-free の source descriptor として登録し、実際の connection material は
      別の secret management に保持します。固定された version または inventory snapshot で directory と file locator を解決し、
      stable order の root resource manifest を作成して digest を検証します。後続の directory enumeration と file read は別個の
      IngestionRun が記録するため、一回の scan result や member change は root identity に書き戻されません。
  typical_input:
    - description: Version-pinned filesystem root descriptor
      format: |
        {
          "resource_id": "fs-policy-corpus",
          "canonical_locator": "s3://policy-corpus/",
          "namespace_kind": "object-store-bucket",
          "version_ref": "inventory:2026-07-18T00:00:00Z",
          "content_digest": "ni:///sha-256;A9G7Tz6ZCwRFDvXqvQqSv13vzH4GmV4pOu8xC3uJxq8"
        }
  typical_output:
    - description: Filesystem root observation
      format: |
        {
          "filesystem_ref": "fs-policy-corpus",
          "ingestion_run_ref": "inventory-policy-corpus-18",
          "verified_manifest_digest": true,
          "directory_resource_refs": ["dir-policy-2026-07", "dir-finance-2026-07"]
        }
  reference_implementations:
    - name: Node.js File System API
      url: https://nodejs.org/api/fs.html
      description: Documents APIs for working with file system paths, files, directories, and directory entries.
    - name: RFC 3986 URI Generic Syntax
      url: https://www.rfc-editor.org/rfc/rfc3986
      description: Defines generic URI components and path syntax used for durable resource locators.
    - name: RFC 6920 Named Information
      url: https://datatracker.ietf.org/doc/rfc6920/
      description: Defines hash-based named-information identifiers for verifying a concrete resource representation.
structure:
  identity_keys:
    - resource_id
  fields:
    - id: resource_id
      labels:
        zh: 文件系统资源标识
        en: filesystem resource ID
        ja: ファイルシステムリソース ID
      definitions:
        zh: 稳定标识一个可摄入根命名空间，而不是其中的目录、文件、连接对象或扫描运行。
        en: Stably identifies one ingestible root namespace rather than a member directory, file, connection object, or scan run.
        ja: member directory、file、connection object、scan run ではなく、一つの取り込み可能な root namespace を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: fs-policy-corpus
      source_claims:
        - claim-file-system-identity
    - id: canonical_locator
      labels:
        zh: 规范根定位符
        en: canonical root locator
        ja: 正規ルートロケータ
      definitions:
        zh: 记录不含令牌或密码的根 URI 或挂载定位符，目录和文件定位符必须在此命名空间中解析。
        en: Records a root URI or mount locator without tokens or passwords; directory and file locators must resolve in this namespace.
        ja: token や password を含まない root URI または mount locator を記録し、directory と file locator はこの namespace 内で解決されなければなりません。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: s3://policy-corpus/
      source_claims:
        - claim-file-system-uri
    - id: namespace_kind
      labels:
        zh: 命名空间类型
        en: namespace kind
        ja: 名前空間種別
      definitions:
        zh: 声明根命名空间的解析模型，例如本地挂载、对象存储桶或远程文件共享，而不是具体访问客户端。
        en: Declares the root namespace resolution model such as local mount, object-store bucket, or remote file share rather than a concrete access client.
        ja: 具体的な access client ではなく、local mount、object-store bucket、remote file share など root namespace の resolution model を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values:
        - local-mount
        - object-store-bucket
        - remote-file-share
      pattern: null
      example_value: object-store-bucket
      source_claims:
        - claim-file-system-identity
    - id: version_ref
      labels:
        zh: 根清单版本引用
        en: root-manifest version reference
        ja: root manifest 版参照
      definitions:
        zh: 记录用于解释该根下可见目录和文件的库存快照、挂载快照或其他来源系统版本，而不是单个文件版本。
        en: Records an inventory snapshot, mount snapshot, or other source-system version that determines visible directories and files under the root rather than one member-file version.
        ja: 一つの member-file version ではなく、root 下で見える directory と file を決定する inventory snapshot、mount snapshot、または source-system version を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "inventory:2026-07-18T00:00:00Z"
      source_claims:
        - claim-file-system-version
    - id: content_digest
      labels:
        zh: 根资源清单摘要
        en: root resource-manifest digest
        ja: root resource manifest digest
      definitions:
        zh: 记录对指定版本下根资源清单按确定顺序规范化后计算的算法标记摘要，不是某一个目录或文件的内容摘要。
        en: Records an algorithm-tagged digest over a deterministically normalized root resource manifest at the stated version rather than the content digest of one directory or file.
        ja: 一つの directory や file の content digest ではなく、指定 version の決定的に正規化された root resource manifest に対する algorithm-tagged digest を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      allowed_values: []
      pattern: null
      example_value: "ni:///sha-256;A9G7Tz6ZCwRFDvXqvQqSv13vzH4GmV4pOu8xC3uJxq8"
      source_claims:
        - claim-file-system-digest
  constraints:
    - id: filesystem-root-manifest-contract
      severity: error
      expression_language: plain
      expression: >-
        resource_id, canonical_locator, namespace_kind, version_ref, and content_digest are required. The locator must
        contain no credential and must be a resolvable root for the stated namespace kind. content_digest must verify a
        deterministically normalized root resource manifest at version_ref. A member directory, member file, runtime
        connection, access secret, traversal run, generated Document, MemoryStore, or retrieval backend cannot substitute
        for filesystem identity.
      explanation:
        zh: 文件系统身份固定根命名空间及其可见资源版本；成员、访问材料、运行行为和生成信息必须在不同的来源边界中记录。
        en: File-system identity pins a root namespace and the version of resources visible within it; members, access material, runtime behavior, and generated information must be recorded at different provenance boundaries.
        ja: filesystem identity は root namespace とその中で可視の resource version を固定します。member、access material、runtime behavior、generated information は異なる provenance boundary に記録しなければなりません。
      source_claims:
        - claim-file-system-uri
        - claim-file-system-digest
        - claim-file-system-boundary
  required_relations: []
examples:
  - id: file-system-positive

    labels:
      zh: 版本固定的政策资料桶
      en: Version-pinned policy-material bucket
      ja: 版固定の政策資料バケット

    descriptions:
      zh: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents；KnowledgeGraphIndex；LangChain PyPDFLoader Document(page_content, metadata)。
      en: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents; KnowledgeGraphIndex; LangChain PyPDFLoader Document(page_content, metadata).
      ja: LlamaIndex SimpleDirectoryReader + VectorStoreIndex.from_documents。KnowledgeGraphIndex。LangChain PyPDFLoader Document。
    field_values:
      resource_id: fs-policy-corpus
      canonical_locator: s3://policy-corpus/
      namespace_kind: object-store-bucket
      version_ref: "inventory:2026-07-18T00:00:00Z"
      content_digest: "ni:///sha-256;A9G7Tz6ZCwRFDvXqvQqSv13vzH4GmV4pOu8xC3uJxq8"
    related_node_ids:
      - FileSystem
      - IngestibleResource
      - DirectoryResource
    related_relation_ids:
      - FileSystem-is_a-IngestibleResource
      - FileSystem-hosts-DirectoryResource

    source_claims:
      - claim-file-system-identity
      - claim-file-system-digest
  - id: file-system-counterexample

    labels:
      zh: 访问令牌不是文件系统
      en: Access token is not a file system
      ja: access token はファイルシステムではない

    descriptions:
      zh: 反例：DocumentLoader 输出无 DocumentMetadata source/page 就进入 EmbeddingRun，丢失 ChunkProvenance。
      en: Counterexample: DocumentLoader output enters EmbeddingRun without DocumentMetadata source/page, losing ChunkProvenance.
      ja: 反例：DocumentLoader 出力が DocumentMetadata source/page なしで EmbeddingRun へ。
    field_values:
      credential_kind: object-store-access-token
      canonical_locator: absent
      version_ref: absent
      content_digest: absent
    related_node_ids:
      - FileSystem
      - IngestibleResource
    related_relation_ids: []

    source_claims:
      - claim-file-system-boundary
  - id: file-system-boundary

    labels:
      zh: 根下的一个目录
      en: One directory below the root
      ja: root 配下の一つのディレクトリ

    descriptions:
      zh: IngestionRun 产出 Document vs ChunkingRun 分割；GraphStore node/edge vs TextCorpus 资源类型边界。
      en: IngestionRun produces Document vs ChunkingRun splits; GraphStore node/edge vs TextCorpus resource type boundary.
      ja: IngestionRun Document 生成 vs ChunkingRun 分割。GraphStore vs TextCorpus 境界。
    field_values:
      resource_id: dir-policy-2026-07
      canonical_locator: s3://policy-corpus/legal/
      version_ref: "inventory:2026-07-18T00:00:00Z"
      content_digest: "ni:///sha-256;XxJ5kP5MqVZfRyoD4G7YwOqMNAWHb6eZ3bH4U7_cDE8"
    related_node_ids:
      - FileSystem
      - DirectoryResource
    related_relation_ids:
      - FileSystem-hosts-DirectoryResource

    source_claims:
      - claim-file-system-identity
      - claim-file-system-boundary
  - id: file-system-instance

    labels:
      zh: 实例：合规资料根清单
      en: "Instance: compliance-material root manifest"
      ja: "事例：コンプライアンス資料の root manifest"

    descriptions:
      zh: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking。
      en: LlamaIndex PDFReader load_data → Document list metadata file_name/page_label → downstream RAPTOR chunking.
      ja: LlamaIndex PDFReader→Document list metadata→downstream RAPTOR chunking。
    field_values:
      resource_id: fs-compliance
      canonical_locator: s3://compliance-materials/
      namespace_kind: object-store-bucket
      version_ref: "inventory:2026-07-18T00:00:00Z"
      content_digest: "ni:///sha-256;T_G9ZmtYKnUVl6lH_v_0VYBvS1nTzKMlzLw_PG5qHoE"
    related_node_ids:
      - FileSystem
      - DirectoryResource
      - IngestionRun
    related_relation_ids:
      - FileSystem-hosts-DirectoryResource

    source_claims:
      - claim-file-system-boundary
      - claim-file-system-digest
parent_relation:
  id: FileSystem-is_a-IngestibleResource
  predicate: is_a
  target: concept:IngestibleResource
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是可摄入资源的文件系统特化
    en: is a file-system specialization of ingestible resource
    ja: ingestible resource のファイルシステム特化である
  definitions:
    zh: FileSystem 是以根命名空间和根资源清单版本为种差的 IngestibleResource。
    en: FileSystem is an IngestibleResource whose differentia is a root namespace with a root resource-manifest version.
    ja: FileSystem は root namespace と root resource-manifest version を種差とする IngestibleResource です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_specialization
    labels:
      zh: 有文件系统特化
      en: has file-system specialization
      ja: ファイルシステム特化を持つ
  conditions:
    - id: file-system-is-a-resource-condition
      severity: error
      expression_language: plain
      expression: >-
        Assert the specialization only when an object satisfies IngestibleResource identity and additionally identifies
        one root namespace through canonical_locator, namespace_kind, and a versioned root resource manifest. A member
        directory, member file, connection, credential, scan activity, generated Document, or storage backend does not
        satisfy this differentia.
      explanation:
        zh: 文件系统特化必须在上位来源资源身份之外固定根命名空间及其版本化资源集合，而不是仅指向一个路径或一次扫描。
        en: The file-system specialization must pin a root namespace and its versioned resource set in addition to parent source-resource identity rather than merely point to a path or scan.
        ja: file-system specialization は親 source-resource identity に加えて root namespace と版管理された resource set を固定しなければならず、単に path や scan を指すだけでは足りません。
      source_claims:
        - claim-file-system-specialization
  temporal_scope: valid-time
  boundary_context: The root resource is distinct from its directories, files, credentials, and any activity that reads or enumerates it.
  constraints: []
  examples: []
  source_claims:
    - claim-file-system-specialization
  distinct_fact_rationale: This hierarchy captures the source-root specialization while member containment and scan activity remain separate facts.
  layout_role: primary-backbone
relations:
  - id: FileSystem-hosts-DirectoryResource
    predicate: part_of
    target: concept:DirectoryResource
    endpoint_order: target-to-source
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: 承载目录资源
      en: hosts directory resource
      ja: ディレクトリリソースを収容する
    definitions:
      zh: FileSystem 与 DirectoryResource 的承载关系表示目录的 filesystem_ref 指向该根，且目录定位符在该根命名空间内解析并包含在对应根清单版本中。
      en: The hosting relation between FileSystem and DirectoryResource states that the directory filesystem_ref names this root and its locator resolves within the root namespace and appears in the corresponding root-manifest version.
      ja: FileSystem と DirectoryResource の hosting relation は、directory の filesystem_ref がこの root を指し、その locator が root namespace 内で解決され、対応する root-manifest version に現れることを表します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: hosts
      labels:
        zh: 反向为承载
        en: inverse is hosts
        ja: 逆は収容する
    conditions:
      - id: file-system-hosts-directory-resource-condition
        severity: error
        expression_language: plain
        expression: >-
          Assert hosting only when directory.filesystem_ref equals filesystem.resource_id, directory.canonical_locator
          resolves beneath filesystem.canonical_locator under the same namespace rules, and the root manifest version
          includes the directory representation. Equal path text in another root or a scan result alone is insufficient.
        explanation:
          zh: 承载关系需要根引用、命名空间内定位和版本化根清单三者一致，不能根据同名路径或一次扫描结果推断。
          en: Hosting requires matching root reference, in-namespace location, and versioned root manifest; it cannot be inferred from equal path text or one scan result.
          ja: hosting には一致する root reference、namespace 内の location、versioned root manifest が必要であり、同じ path text や一回の scan result から推論できません。
        source_claims:
          - claim-file-system-directory-membership
    temporal_scope: valid-time
    boundary_context: Hosting is scoped to one root-manifest version and does not make a directory identical to the filesystem root.
    constraints: []
    examples: []
    source_claims:
      - claim-file-system-directory-membership
    distinct_fact_rationale: This composition records a version-scoped namespace membership separately from source specialization and enumeration activity.
    layout_role: cross-link
sources:
  - id: nodejs-filesystem-api
    title: Node.js File System API
    url: https://nodejs.org/api/fs.html
    type: official-doc
    source_type: official-doc
    relevance: Documents operations over filesystem paths, files, directories, and directory entries.
  - id: rfc-3986
    title: RFC 3986 URI Generic Syntax
    url: https://www.rfc-editor.org/rfc/rfc3986
    type: standard
    source_type: standard
    relevance: Defines generic URI components and path syntax used by canonical resource locators.
  - id: rfc-6920
    title: RFC 6920 Named Information
    url: https://datatracker.ietf.org/doc/rfc6920/
    type: standard
    source_type: standard
    relevance: Defines hash-based named-information identifiers for a resource representation.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    type: standard
    source_type: standard
    relevance: Defines entities and activities for keeping source roots, operations, and outputs distinct.
source_claims:
  - id: claim-file-system-uri
    source: rfc-3986
    supports: >-
      RFC 3986 defines generic URI syntax including scheme, authority, path, query, and fragment components. Moonweave uses
      a credential-free canonical root locator to establish the namespace in which member locators are resolved.
    locator: RFC 3986 sections 3 and 3.3 on URI components and path
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-file-system-digest
    source: rfc-6920
    supports: >-
      RFC 6920 defines named-information identifiers using a hash algorithm and digest value and distinguishes resource
      naming from locating or dereferencing. Moonweave records a root-manifest digest separately from its root locator and
      source-system version to verify one enumerated resource set.
    locator: RFC 6920 sections 1 and 3 on named information identifiers and ni URI syntax
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-file-system-identity
    source: nodejs-filesystem-api
    supports: >-
      Node.js documents filesystem APIs that work with files, directories, paths, and directory entries. Moonweave models a
      root filesystem namespace separately from the directories and files that it contains.
    locator: Node.js File System API overview and directory operations
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-file-system-version
    source: rfc-6920
    supports: >-
      RFC 6920 distinguishes a hash-based name from a locator. Moonweave additionally records source-system version_ref so
      an inventory or mount snapshot is not conflated with the digest that verifies its root resource manifest.
    locator: RFC 6920 sections 1 and 3 on names locators and digest values
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-file-system-boundary
    source: w3c-prov-o
    supports: >-
      PROV-O distinguishes entities from activities that use or generate entities. Moonweave keeps filesystem root,
      directory scan, member resource, credential, and generated Document identities separate.
    locator: PROV-O Entity Activity usage and generation
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-file-system-specialization
    source: w3c-prov-o
    supports: >-
      Modeling a versioned root namespace as a FileSystem specialization of IngestibleResource is a Moonweave taxonomy
      inference grounded in PROV-O's distinction between enduring source entities and operational activities.
    locator: PROV-O Entity and Activity
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-file-system-directory-membership
    source: nodejs-filesystem-api
    supports: >-
