schema: moonweave.ai/ontology-node/v1
id: FileSystem
kind: concept
labels:
  zh: 文件系统
  en: File system
  ja: ファイルシステム
semantics:
  short_definition:
    zh: 以根 URI 组织目录层级的可摄入资源容器。
    en: Ingestible resource container organizing directories under a root URI.
    ja: root URI 下で directory 階層を編成する取込可能 resource container。
  definition:
    zh: FileSystem 是以 root_uri（本地卷、S3 桶、MCP file 根）标识并承载 DirectoryResource 层级的 IngestibleResource；对应 LlamaIndex SimpleDirectoryReader 的 input_dir 根与 MCP 多 file:// 资源前缀；它不是单个目录或文件。
    en: FileSystem is an IngestibleResource identified by root_uri (local volume, S3 bucket, MCP file root) hosting DirectoryResource hierarchy, mapping to LlamaIndex SimpleDirectoryReader input_dir roots and MCP file:// resource prefixes; it is not one directory or file.
    ja: FileSystem は root_uri（local volume/S3 bucket/MCP file root）で識別し DirectoryResource 階層を host する IngestibleResource。LlamaIndex SimpleDirectoryReader input_dir root と MCP file:// prefix に対応。単一 directory/file ではない。
  why_needed:
    zh: 形成 FileSystem→Directory→File 三层来源层级，避免把桶/卷与叶文件混为同一资源类型。
    en: Creates FileSystem→Directory→File source hierarchy, avoiding conflation of buckets/volumes with leaf files.
    ja: FileSystem→Directory→File 三層 source 階層を形成し bucket/volume と leaf file の混同を避ける。
  includes:
    - zh: 纳入本地挂载卷、S3/GCS 桶根与 MCP 暴露的文件树根。
      en: Includes local mounted volumes, S3/GCS bucket roots, and MCP-exposed file tree roots.
      ja: local mount volume/S3/GCS bucket root/MCP 暴露 file tree root。
  excludes:
    - zh: 排除 DirectoryResource、FileResource 与 Document。
      en: Excludes DirectoryResource, FileResource, and Document.
      ja: DirectoryResource・FileResource・Document を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex SimpleDirectoryReader(input_dir="/data/corpus") 把目录根当作读取边界；MCP 可暴露多个 file:// 模板共享同一 authority；Moonweave 用 FileSystem 固定该根的身份与版本，DirectoryResource 在其下展开。
    en: LlamaIndex SimpleDirectoryReader(input_dir="/data/corpus") treats the directory root as read boundary; MCP may expose multiple file:// templates sharing one authority; Moonweave uses FileSystem to fix root identity and version with DirectoryResource beneath.
    ja: LlamaIndex SimpleDirectoryReader(input_dir) が directory root を read 境界とする。MCP は同一 authority の複数 file:// template を暴露可能。Moonweave は FileSystem で root identity/version を固定し DirectoryResource を下に展開。
  typical_input:
    - description: LlamaIndex directory root configuration
      format: |
        SimpleDirectoryReader(input_dir="/data/corpus", recursive=True)
      source_claims: [claim-filesystem-llamaindex]
  typical_output:
    - description: Moonweave filesystem resource identity
      format: |
        {
          "resource_id": "fs-policy",
          "root_uri": "file:///data/corpus/",
          "version_ref": "mount-snapshot:2026-07-16"
        }
      source_claims: [claim-filesystem-design]
  reference_implementations:
    - name: LlamaIndex SimpleDirectoryReader
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      description: Recursive directory loading from a root path.
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: file:// URI templates under a shared authority.
structure:
  identity_keys: [resource_id]
  fields:
    - id: resource_id
      labels: {zh: 资源标识, en: Resource identifier, ja: リソース識別子}
      definitions:
        zh: 稳定标识文件系统来源。
        en: Stable identifier for the filesystem source.
        ja: filesystem source の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: fs-policy
      allowed_values: []
      source_claims: [claim-filesystem-id]
    - id: root_uri
      labels: {zh: 根 URI, en: Root URI, ja: root URI}
      definitions:
        zh: 文件系统或对象存储根的绝对 URI（file://、s3:// 等）。
        en: Absolute URI of filesystem or object-store root (file://, s3://, etc.).
        ja: filesystem/object-store root の absolute URI（file://、s3:// 等）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///data/corpus/
      allowed_values: []
      source_claims: [claim-filesystem-root]
  constraints: []
  required_relations: []
examples:
  - id: FileSystem-example-llamaindex-root
    labels:
      zh: LlamaIndex 目录根
      en: LlamaIndex directory root
      ja: LlamaIndex directory root
    descriptions:
      zh: SimpleDirectoryReader(input_dir="/data/corpus", recursive=True) 遍历 fs-policy 下所有文件；resource_id=fs-policy、root_uri=file:///data/corpus/ 标识读取边界。
      en: SimpleDirectoryReader(input_dir="/data/corpus", recursive=True) traverses all files under fs-policy; resource_id=fs-policy and root_uri=file:///data/corpus/ identify the read boundary.
      ja: SimpleDirectoryReader(input_dir="/data/corpus") が fs-policy 下全 file を traverse。resource_id=fs-policy、root_uri=file:///data/corpus/ が read 境界。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/simpledirectoryreader/
      version: recursive
    field_values:
      resource_id: fs-policy
      root_uri: file:///data/corpus/
    related_node_ids: [FileSystem, DirectoryResource]
    related_relation_ids: []
    source_claims: [claim-filesystem-llamaindex]
  - id: FileSystem-example-s3-bucket
    labels:
      zh: S3 桶根
      en: S3 bucket root
      ja: S3 bucket root
    descriptions:
      zh: s3://policy-corpus/ 作为对象存储根；DirectoryResource 以 prefix 组织成员，FileResource 指向具体 object key 与 version_id。
      en: s3://policy-corpus/ serves as object-store root; DirectoryResource organizes members by prefix; FileResource points to object key and version_id.
      ja: s3://policy-corpus/ を object-store root。DirectoryResource が prefix で member 編成、FileResource が object key/version_id を指す。
    example_source:
      product: AWS S3
      url: https://docs.aws.amazon.com/AmazonS3/latest/userguide/versioning-workflows.html
      version: object versioning
    field_values:
      resource_id: fs-s3-policy
      root_uri: s3://policy-corpus/
    related_node_ids: [FileSystem, FileResource]
    related_relation_ids: []
    source_claims: [claim-filesystem-design]
  - id: FileSystem-example-not-file
    labels:
      zh: 文件系统非单文件
      en: Filesystem is not single file
      ja: filesystem は単 file ではない
    descriptions:
      zh: file-policy-v7 有单文件 file_uri 与 content_digest；fs-policy 只有 root_uri 与目录层级，不能把叶文件提升为 FileSystem。
      en: file-policy-v7 has single-file file_uri and content_digest; fs-policy only has root_uri and directory hierarchy—a leaf file must not be promoted to FileSystem.
      ja: file-policy-v7 は単 file file_uri/content_digest。fs-policy は root_uri/directory 階層のみ。leaf file を FileSystem に昇格不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids: [FileSystem, FileResource]
    related_relation_ids: []
    source_claims: [claim-filesystem-design]
parent_relation:
  id: FileSystem-is_a-IngestibleResource
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种可摄入资源, en: is an ingestible resource, ja: 取込可能リソースの一種}
  definitions:
    zh: FileSystem 种差为 root_uri 与多目录容器层级，而非单文件定位符。
    en: FileSystem differentia is root_uri plus multi-directory container hierarchy, not a single-file locator.
    ja: FileSystem 種差は root_uri と複数 directory container 階層。単 file locator ではない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係基数を用いない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向：是一种, en: has subtype, ja: 逆方向：の一種である}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-filesystem-design]
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
