  - id: src-mcp-resources
    title: MCP Server Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-doc
    relevance: file:// authority as resource root.
  - id: src-filesystem-design
    title: Moonweave filesystem hierarchy
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: FileSystem→Directory→File layering.
source_claims:
  - id: claim-filesystem-llamaindex
    source: src-llamaindex-sdr
    supports: SimpleDirectoryReader uses input_dir as the filesystem read root.
    locator: SimpleDirectoryReader
    evidence_kind: official
    confidence: high
  - id: claim-filesystem-design
    source: src-filesystem-design
    supports: FileSystem container differs from leaf FileResource identity.
    locator: hierarchy
    evidence_kind: design-inference
    confidence: high
  - id: claim-filesystem-id
    source: src-filesystem-design
    supports: resource_id identifies filesystem source lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-filesystem-root
    source: src-mcp-resources
    supports: root_uri anchors file:// or object-store authority for nested resources.
    locator: Resources
    evidence_kind: official
    confidence: high
