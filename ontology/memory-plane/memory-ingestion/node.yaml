source_claims:
  - id: claim-memory-ingestion-001
    source: eng-fw-langchain-document-loaders
    supports: LangChain's current loader interface grounds reusable loader capability and source-to-Document behavior; Moonweave separately identifies run, phase, resource, and normalized information.
