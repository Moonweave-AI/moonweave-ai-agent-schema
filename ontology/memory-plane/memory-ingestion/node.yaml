schema: moonweave.ai/ontology-node/v1
id: memory-ingestion
kind: module
labels:
  zh: 外部资源接入
  en: External-resource ingestion
  ja: 外部資源の取り込み
semantics:
  short_definition:
    zh: 读取外部文件、数据库或对话，规范化并去重，产出可后续处理的文档。
    en: Read external files, databases, or conversations, normalize and deduplicate them into processable documents.
    ja: 外部ファイル、DB、対話を読み取り、正規化・重複排除して後続処理可能な文書を生成します。
  definition:
    zh: 记忆接入描述如何把声明过的接入政策下的外部资源——文件系统、数据库、图存储、API 导出或对话 transcript——通过加载器读取、规范化与去重，变成带元数据、可追踪来源的文档信息。它分开表达可复用政策、被读取的资源实体，以及一次完整运行与其阶段产物。接入只交付规范化文档与去重决定，不负责分块、嵌入、索引构建或跨会话持久记忆写入。来源定位与版本核验引用上游模块，接入只记录读取与规范化过程中实际使用的来源状态。
    en: Memory ingestion describes how external resources—filesystems, databases, graph stores, API exports, or conversation transcripts—declared under an ingestion policy are read by loaders, normalized, and deduplicated into document information with metadata and traceable provenance. It separates reusable policy, the resource entity being read, and one complete run with its phase outputs. Ingestion delivers only canonical documents and deduplication decisions; it does not own chunking, embedding, index construction, or cross-session persistent memory writes. Source location and version verification reference upstream modules; ingestion records only the source state actually used during read and normalization.
    ja: 記憶取り込みは、取り込み方針下の外部資源—ファイルシステム、DB、グラフストア、API エクスポート、対話 transcript—を loader で読み、正規化・重複排除して metadata と追跡可能来歴付き文書情報へ変換する仕組みです。再利用方針、読取対象資源、完全 run と phase 成果物を分離します。取り込みは正規化文書と重複排除判断だけを handoff し、chunking、embedding、索引構築、セッション横断永続記憶書き込みは所有しません。出典位置と版検証は上流 module を参照し、読取・正規化で実際に使った出典状態だけを記録します。
  why_needed:
    zh: 没有可追溯的接入，团队无法回答“这份文档从哪来、用了哪个加载器、与旧版是新增还是更新”。同一文件路径的不同版本会被误当成同一条记忆，对话抽取的事实也无法绑定到具体用户或智能体作用域。
    en: Without traceable ingestion, teams cannot answer where a document came from, which loader was used, or whether it is new versus an update of an older version. Different versions at the same file path get mistaken for one memory, and facts extracted from conversations cannot bind to a specific user or agent scope.
    ja: 追跡可能な取り込みがなければ、文書の出所、使用 loader、旧版に対する新規か更新かを答えられません。同一パスの別版が同一記憶と誤認され、対話から抽出した事実も特定 user/agent スコープに結び付きません。
  includes:
    - zh: 在明确政策下读取外部资源、选择匹配媒体的加载器，并把原始字节或记录流规范化为带元数据的文档。
      en: Reading external resources under an explicit policy, selecting a loader matched to the media, and normalizing raw bytes or record streams into documents with metadata.
      ja: 明示方針下で外部資源を読み、媒体に合う loader を選び、生バイトやレコード流を metadata 付き文書へ正規化します。
    - zh: 记录一次完整接入运行、规范化与去重阶段，以及关于“跳过、新增或更新”的可审计决定。
      en: Recording one complete ingestion run, normalization and deduplication phases, and an auditable decision about skip, create, or update.
      ja: 完全な取り込み run、正規化・重複排除 phase、skip/create/update に関する監査可能判断を記録します。
  excludes:
    - zh: 来源引用、物理定位与版本核验身份；接入只引用它们，不重新定义来源本体。
      en: Source references, physical locations, and version-verification identity; ingestion references them without redefining the source entity.
      ja: 出典参照、物理位置、版検証 identity。取り込みは参照するだけで出典本体を再定義しません。
    - zh: 分块、嵌入、向量索引构建与持久记忆写入；这些属于后续专门模块。
      en: Chunking, embedding, vector index construction, and persistent memory writes; these belong to downstream dedicated modules.
      ja: chunking、embedding、ベクトル索引構築、永続記憶書き込み。後続の専用 module に属します。
    - zh: 面向单次模型调用的上下文组装与检索排序；接入只产出可供它们 later 选择的文档与附件信息。
      en: Single-call context assembly and retrieval ranking; ingestion produces documents and attachment information for them to select later.
      ja: 単発 model call のコンテキスト組み立てと検索順位付け。取り込みは後から選べる文書と attachment 情報だけを生成します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 Mem0 的对话事实抽取 API、Chroma/Pinecone 的向量写入面、LlamaIndex 的 IngestionPipeline，以及 Letta 的归档插入工具。政策与加载器能力是规范；一次 POST /v3/memories/add/、collection.add、index.upsert 或 pipeline.run 是成功发生事实。接入停止在规范化 Document 与 dedup 决定，不把 embedding 或 MemoryRecord 持久化混入本层。
    en: Integrations should map Mem0 conversation fact extraction, Chroma/Pinecone vector write surfaces, LlamaIndex IngestionPipeline, and Letta archival insertion separately. Policy and loader capability are specifications; one POST /v3/memories/add/, collection.add, index.upsert, or pipeline.run is an occurrence. Ingestion stops at canonical Document and dedup decisions without folding embedding or MemoryRecord persistence into this layer.
    ja: 統合では Mem0 対話事実抽出 API、Chroma/Pinecone ベクトル書き込み面、LlamaIndex IngestionPipeline、Letta archival 挿入 tool を個別に写像します。方針と loader 能力は仕様、一回の POST /v3/memories/add/、collection.add、index.upsert、pipeline.run が発生事実です。取り込みは正規化 Document と dedup 判断で止まり、embedding や MemoryRecord 永続化を本層に混在させません。
  typical_input:
    - description: Mem0 add memories — scoped conversation turns queued for background extraction with metadata and entity IDs.
      format: |
        POST https://api.mem0.ai/v3/memories/add/
        {
          "user_id": "alice",
          "agent_id": "support-bot",
          "messages": [
            {"role": "user", "content": "Prefer TypeScript for all code examples."},
            {"role": "assistant", "content": "Got it — I'll default to TypeScript."}
          ],
          "metadata": {"topic": "preferences", "source": "chat-session-17"},
          "infer": true
        }
      source_claims: [claim-memory-ingestion-mem0]
    - description: Chroma collection.add — document texts with optional embeddings, metadatas, and stable ids.
      format: |
        collection.add(
          documents=[
            "Section 1: Authentication uses JWT bearer tokens.",
            "Section 2: Refresh tokens expire after 7 days."
          ],
          embeddings=[[0.12, -0.04, ...], [0.08, 0.03, ...]],  # optional if embedding_function set
          metadatas=[
            {"source": "policy.pdf", "page": 3},
            {"source": "policy.pdf", "page": 4}
          ],
          ids=["policy-p3-chunk-001", "policy-p4-chunk-002"]
        )
      source_claims: [claim-memory-ingestion-chroma]
    - description: Pinecone index.upsert — vectors with ids and metadata for durable index writes.
      format: |
        index.upsert(
          vectors=[
            {
              "id": "policy-p3-chunk-001",
              "values": [0.12, -0.04, 0.33, ...],
              "metadata": {"source": "policy.pdf", "page": 3, "tenant_id": "tenant-7"}
            },
            {
              "id": "policy-p4-chunk-002",
              "values": [0.08, 0.03, 0.29, ...],
              "metadata": {"source": "policy.pdf", "page": 4, "tenant_id": "tenant-7"}
            }
          ],
          namespace="docs-tenant-7"
        )
      source_claims: [claim-memory-ingestion-pinecone]
    - description: LlamaIndex IngestionPipeline — transformations, node parser, embedding, and docstore upsert in one run.
      format: |
        from llama_index.core.ingestion import IngestionPipeline
        from llama_index.core.node_parser import SentenceSplitter
        from llama_index.embeddings.openai import OpenAIEmbedding

        pipeline = IngestionPipeline(
          transformations=[
            SentenceSplitter(chunk_size=512, chunk_overlap=64),
            OpenAIEmbedding()
          ]
        )
        nodes = pipeline.run(documents=loaded_documents, show_progress=True)
        # => parsed nodes with embeddings ready for vector store / docstore upsert
      source_claims: [claim-memory-ingestion-llamaindex]
  typical_output:
    - description: Moonweave-local ingestion handoff — canonical document, metadata, and deduplication decision without persistent memory write.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "ingestion_run_id": "ingest-run-17",
          "ingestion_policy_ref": "policy-pdf-v3@3.2.1",
          "source_resource_ref": "file-policy-v7@digest",
          "loader_ref": "loader-pdf-v3@3.2.1",
          "document_id": "document-policy-v7",
          "content_digest_sha256": "7333d79dd1c9a7608dc5c0c5f1e1e2292c1dd6165ac145121e48b19fbf507fb1",
          "document_metadata": {"media_type": "application/pdf", "page_count": 42},
          "deduplication_decision": {
            "decision_id": "decision-17",
            "outcome": "update",
            "prior_digest_ref": "prior-v6"
          }
        }
      source_claims: [claim-memory-ingestion-design]
  reference_implementations:
    - name: Mem0 Platform API
      url: https://docs.mem0.ai
      description: POST /v3/memories/add/ with user_id, agent_id, messages, metadata, and async inference pipeline.
    - name: Chroma
      url: https://docs.trychroma.com
      description: collection.add(documents, embeddings, metadatas, ids) for local or server-backed vector collections.
    - name: Pinecone
      url: https://docs.pinecone.io
      description: index.upsert(vectors=[{"id", "values", "metadata"}]) for managed vector index writes.
    - name: LlamaIndex IngestionPipeline
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Document ingestion pipeline with transformations, node parser, embedding, and docstore upsert.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_insert for inserting passages into out-of-window archival storage.
structure:
  identity_keys: [ingestion_run_id, document_id, content_digest_sha256]
  fields:
    - id: ingestion_run_id
      labels: {zh: 接入运行标识, en: Ingestion run identifier, ja: 取り込み実行識別子}
      definitions:
        zh: 唯一标识一次从资源读取到文档产出的完整接入运行，不是文档 lineage 或存储集合标识。
        en: Uniquely identifies one complete ingestion run from resource read to document output, not a document lineage or store collection identifier.
        ja: 資源読取から文書生成までの完全取り込み run を一意に識別。文書 lineage や store collection ID ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: ingest-run-17
      allowed_values: []
      source_claims: [claim-memory-ingestion-design]
    - id: ingestion_policy_ref
      labels: {zh: 接入政策引用, en: Ingestion policy reference, ja: 取り込み方針参照}
      definitions:
        zh: 指向 govern 本次运行的可复用接入规范，包括允许媒体、加载器选择与去重策略。
        en: Reference to the reusable ingestion specification governing this run, including allowed media, loader selection, and deduplication strategy.
        ja: 今回 run を govern する再利用取り込み仕様への参照。許可媒体、loader 選択、重複排除戦略を含みます。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy-pdf-v3@3.2.1
      allowed_values: []
      source_claims: [claim-memory-ingestion-design]
    - id: source_resource_ref
      labels: {zh: 来源资源引用, en: Source resource reference, ja: ソース資源参照}
      definitions:
        zh: 指向本次 run 实际读取的外部资源及其内容摘要或版本状态；路径相同但摘要不同视为不同资源状态。
        en: Reference to the external resource actually read in this run with its content digest or version state; same path with different digest is a different resource state.
        ja: 今回 run で実際に読んだ外部資源と content digest/版状態への参照。同パスでも digest が異なれば別 resource state です。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file-policy-v7@digest
      allowed_values: []
      source_claims: [claim-memory-ingestion-design]
    - id: loader_ref
      labels: {zh: 加载器引用, en: Loader reference, ja: ローダー参照}
      definitions:
        zh: 指向本次 run 实际调用且与媒体能力匹配的 DocumentLoader 版本；安装或可发现不等于已使用。
        en: Reference to the DocumentLoader version actually invoked in this run and matched to media capability; installed or discoverable does not imply used.
        ja: 今回 run で実際に invoke され媒体能力と一致した DocumentLoader 版への参照。install/ discover 済みは used を意味しません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: loader-pdf-v3@3.2.1
      allowed_values: []
      source_claims: [claim-memory-ingestion-llamaindex]
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: 文書識別子}
      definitions:
        zh: 标识规范化后文档 lineage 的稳定 ID；业务 ID 相同但 content_digest 不同必须对应新版本。
        en: Stable ID for a normalized document lineage; equal business ID with different content_digest must map to a new version.
        ja: 正規化後文書 lineage の安定 ID。business ID が同じでも content_digest が異なれば新版必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: document-policy-v7
      allowed_values: []
      source_claims: [claim-memory-ingestion-design]
    - id: content_digest_sha256
      labels: {zh: 内容摘要, en: Content digest, ja: 内容ダイジェスト}
      definitions:
        zh: 规范化文档正文的 SHA-256 摘要；去重决定必须绑定比较时的这一摘要，而不是仅 business ID。
        en: SHA-256 digest of normalized document body; deduplication decisions must bind the compared digest, not business ID alone.
        ja: 正規化文書本文の SHA-256 ダイジェスト。重複排除判断は business ID だけでなく比較時 digest に binding 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: 7333d79dd1c9a7608dc5c0c5f1e1e2292c1dd6165ac145121e48b19fbf507fb1
      allowed_values: []
      source_claims: [claim-memory-ingestion-design]
    - id: user_id
      labels: {zh: 用户标识, en: User identifier, ja: ユーザー識別子}
      definitions:
        zh: 当接入来源为对话或用户偏好事实时，声明记忆所属用户的稳定作用域键；Mem0 等 API 要求至少一个实体 ID。
        en: Stable scope key for the owning user when ingestion source is conversation or preference facts; APIs such as Mem0 require at least one entity ID.
        ja: 取り込み源が対話や選好事実のとき、記憶所属 user の安定スコープ鍵。Mem0 等 API は少なくとも一 entity ID を要求。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: alice
      allowed_values: []
      source_claims: [claim-memory-ingestion-mem0]
    - id: agent_id
      labels: {zh: 智能体标识, en: Agent identifier, ja: エージェント識別子}
      definitions:
        zh: 当接入绑定到特定智能体运行时，声明作用域的智能体 ID，与 user_id 共同限定记忆归属。
        en: Agent ID scoping ingestion when bound to a specific agent runtime, jointly limiting memory ownership with user_id.
        ja: 特定 agent runtime に binding する取り込みの agent ID。user_id と共に記憶帰属を限定。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: support-bot
      allowed_values: []
      source_claims: [claim-memory-ingestion-mem0]
    - id: vector_id
      labels: {zh: 向量标识, en: Vector identifier, ja: ベクトル識別子}
      definitions:
        zh: 在 Chroma ids 或 Pinecone vector id 字段中使用的稳定条目标识；不得用嵌入向量本身代替。
        en: Stable entry identifier used in Chroma ids or Pinecone vector id fields; must not be replaced by the embedding vector itself.
        ja: Chroma ids や Pinecone vector id で使う安定 entry 識別子。embedding ベクトル自体で代用不可。
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: policy-p3-chunk-001
      allowed_values: []
      source_claims: [claim-memory-ingestion-chroma, claim-memory-ingestion-pinecone]
  constraints:
    - id: ingestion-requires-invoked-loader
      severity: error
      expression_language: plain
      expression: An IngestionRun must record both source_resource_ref and loader_ref actually used; discoverable loaders or adjacent files do not establish ingestion without reads/uses facts.
      explanation:
        zh: 把“已安装”误报成“已使用”会产生无法复核的伪文档。
        en: Reporting installation as usage creates non-auditable pseudo-documents.
        ja: 「install 済み」を「使用済み」と誤報すると監査不能な pseudo-document になります。
      source_claims: [claim-memory-ingestion-design]
    - id: dedup-binds-content-digest
      severity: error
      expression_language: plain
      expression: A DeduplicationDecision must bind the exact content_digest compared at decision time; reusing a prior decision for a new digest is invalid.
      explanation:
        zh: 相同业务 ID 不等于相同文档版本；去重必须对内容摘要负责。
        en: Equal business ID is not equal document version; deduplication must bind the content digest.
        ja: 同 business ID は同文書版ではありません。重複排除は content digest に binding 必須。
      source_claims: [claim-memory-ingestion-design]
    - id: ingestion-not-memory-write
      severity: error
      expression_language: plain
      expression: Successful collection.add or index.upsert at the vector layer must not be modeled as a completed MemoryRecord lifecycle write inside ingestion.
      explanation:
        zh: 向量写入与跨会话记忆持久化是不同责任边界。
        en: Vector writes and cross-session memory persistence are different responsibility boundaries.
        ja: ベクトル書き込みとセッション横断記憶永続化は別責任境界です。
      source_claims: [claim-memory-ingestion-chroma, claim-memory-ingestion-pinecone]
  required_relations: []
examples:
  - id: memory-ingestion-example-mem0-conversation
    labels:
      zh: Mem0 从对话创建记忆
      en: Mem0 memory creation from conversation
      ja: Mem0 対話からの記憶作成
    descriptions:
      zh: 用户 Alice 在会话中说“代码示例优先 TypeScript”。应用调用 POST /v3/memories/add/，传入 user_id=alice、agent_id=support-bot、messages 数组与 metadata.topic=preferences。Mem0 后台 infer 抽取事实 “Prefers TypeScript for code examples.” 并异步持久化；接入记录保留原始消息、实体 ID 与 metadata，而不是只存最终事实文本。
      en: User Alice says, "Prefer TypeScript for code examples," in a session. The app calls POST /v3/memories/add/ with user_id=alice, agent_id=support-bot, a messages array, and metadata.topic=preferences. Mem0 infer extracts "Prefers TypeScript for code examples." asynchronously; ingestion retains the original messages, entity IDs, and metadata rather than only the final fact text.
      ja: ユーザー Alice が「code example は TypeScript 優先」と発言。アプリは POST /v3/memories/add/ を user_id=alice、agent_id=support-bot、messages 配列、metadata.topic=preferences で呼び出し。Mem0 infer が “Prefers TypeScript for code examples.” を非同期抽出。取り込みは最終 fact 文本だけでなく元 messages、entity ID、metadata を保持します。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: v3 POST /v3/memories/add/
    field_values:
      api_endpoint: POST /v3/memories/add/
      user_id: alice
      agent_id: support-bot
      infer: true
      metadata:
        topic: preferences
        source: chat-session-17
      extracted_memory: Prefers TypeScript for code examples.
    related_node_ids:
      - memory-ingestion
      - memory-lifecycle
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-ingestion-mem0
      - claim-memory-ingestion-design
  - id: memory-ingestion-example-chroma-chunk-embed
    labels:
      zh: Chroma 文档分块与嵌入写入
      en: Chroma document chunking and embedding
      ja: Chroma 文書 chunk 化と embedding 書き込み
    descriptions:
      zh: 接入流水线读取 policy.pdf 后切成两段文本，调用 Chroma collection.add，传入 documents、与文本对齐的 embeddings、metadatas（source/page）以及 ids。Chroma 在集合中 upsert 这些条目；Moonweave 接入层记录 document lineage 与 content_digest，而把向量条目身份留给下游索引模块。
      en: After reading policy.pdf the ingestion pipeline splits two text segments and calls Chroma collection.add with documents, aligned embeddings, metadatas (source/page), and ids. Chroma upserts the entries in the collection; Moonweave ingestion records document lineage and content_digest while leaving vector entry identity to the downstream index module.
      ja: 取り込み pipeline が policy.pdf を読み二文本 segment に分割し、Chroma collection.add へ documents、整列 embeddings、metadatas（source/page）、ids を渡します。Chroma は collection 内 upsert。Moonweave 取り込み層は document lineage と content_digest を記録し、ベクトル entry identity は下流 index module に残します。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com
      version: collection.add(documents, embeddings, metadatas, ids)
    field_values:
      collection_name: tenant_7_docs
      documents_count: 2
      ids:
        - policy-p3-chunk-001
        - policy-p4-chunk-002
      metadatas:
