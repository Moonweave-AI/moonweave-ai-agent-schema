        zh: 两者都记录来源身份，但接入对象具有 Loader、接入结果和持久处理生命周期，来源引用只负责定位。 本条仅记录 TextDocument；其 canonical owner 是记忆接入（memory-ingestion），因此 memory-ingestion 在此拥有这些概念。
