schema: moonweave.ai/ontology-node/v1
id: memory-ingestion
kind: module
status: accepted
labels:
  zh: 记忆摄入
  en: Memory Ingestion
  ja: 記憶取り込み
semantics:
  short_definition:
    en: Defines how external content is loaded, parsed, and prepared for the memory pipeline.
    zh: 定义外部内容如何被加载、解析并准备进入记忆管线。
    ja: 外部コンテンツをメモリパイプラインに取り込み・解析・準備する方法を定義します。
  definition:
    en: >
      Memory Ingestion covers the acquisition of raw content from external sources and its
      transformation into a normalized document representation ready for downstream processing
      (chunking, embedding, indexing). This includes: document loaders (PDF, HTML, Markdown,
      code files, databases, APIs, web scraping), format detection and parsing (extracting
      text and structure from heterogeneous formats), content normalization (encoding handling,
      whitespace normalization, boilerplate removal), metadata extraction from source
      (title, author, URL, last_modified), and pipeline orchestration (scheduling, deduplication,
      incremental vs full re-ingestion). This maps to LangChain's DocumentLoader interface,
      LlamaIndex's data connectors (SimpleDirectoryReader, web loaders), and Unstructured.io's
      document parsing capabilities.
    zh: >
      记忆摄入覆盖从外部源获取原始内容并将其转换为规范化文档表示，准备供下游处理（分块、嵌入、
      索引）。包括：文档加载器（PDF、HTML、Markdown、代码文件、数据库、API、网页抓取）、格式
      检测与解析（从异构格式提取文本和结构）、内容规范化（编码处理、空白规范化、样板移除）、
      从源提取元数据（标题、作者、URL、最后修改时间）、以及管线编排（调度、去重、增量 vs 全量
      重新摄入）。映射到 LangChain 的 DocumentLoader 接口、LlamaIndex 的数据连接器和
      Unstructured.io 的文档解析能力。
    ja: >
      記憶取り込みは、外部ソースから生コンテンツを取得し、下流処理（チャンク化、埋め込み、
      インデックス化）に備えた正規化 Document 表現へ変換する工程を扱います。DocumentLoader
      （PDF、HTML、Markdown、コード、データベース、API、Web スクレイピング）、形式検出と解析
      （異種フォーマットからのテキストと構造抽出）、内容正規化（エンコーディング、空白、
      ボイラープレート除去）、ソースメタデータ抽出（title、author、URL、last_modified）、
      パイプライン编排（スケジューリング、重複排除、増分 vs 全量再取り込み）を含みます。
      LangChain の DocumentLoader、LlamaIndex の data connector、Unstructured.io の解析能力に
      対応する境界です。
  why_needed:
    en: >
      Agents need access to knowledge from diverse sources—PDFs, web pages, code repositories,
      databases, conversations. Each source has a different format, encoding, and structure.
      Without a proper ingestion layer, you'd have to write custom parsing for every source.
      LangChain has 100+ document loaders precisely because this variety is real and unavoidable.
      Ingestion is the entry point of the RAG pipeline: garbage in = garbage out.
    zh: >
      智能体需要访问来自多样来源的知识——PDF、网页、代码仓库、数据库、对话。每个来源有不同的
      格式、编码和结构。没有适当的摄入层，就必须为每个来源写自定义解析。LangChain 有 100 多个
      文档加载器正是因为这种多样性是真实且不可避免的。摄入是 RAG 管线的入口：垃圾进=垃圾出。
    ja: >
      エージェントは PDF、Web ページ、コードリポジトリ、データベース、会話など多様なソースの
      知識にアクセスする必要があり、各ソースは形式・エンコーディング・構造が異なります。
      適切な取り込み層がなければソースごとに独自パーサーを書く必要があります。LangChain が
      100 以上の document loader を持つのは、この多様性が現実的かつ避けられないためです。
      取り込みは RAG パイプラインの入口であり、garbage in = garbage out です。
  includes:
    - en: "Document loaders: PDF (PyPDF, pdfplumber), HTML (Beautiful Soup, Playwright), Markdown, code files, database connectors, API data sources, web scrapers (Firecrawl, Crawl4AI)"
      zh: "文档加载器：PDF（PyPDF、pdfplumber）、HTML（Beautiful Soup、Playwright）、Markdown、代码文件、数据库连接器、API 数据源、网页抓取器（Firecrawl、Crawl4AI）"
      ja: PDF、HTML、Markdown、code file、database connector、API data source、web scraper を扱う document loader。
    - en: "Format parsing: text extraction with structure preservation, table detection, image extraction, code block identification, metadata parsing from document headers"
      zh: "格式解析：保持结构的文本提取、表格检测、图片提取、代码块识别、从文档头部的元数据解析"
      ja: structure を保持した text extraction、table・image・code block の識別、document header からの metadata parsing。
    - en: "Content normalization: encoding detection/conversion, whitespace normalization, boilerplate removal (ads, navigation), deduplication"
      zh: "内容规范化：编码检测/转换、空白规范化、样板移除（广告、导航）、去重"
      ja: encoding detection と conversion、whitespace normalization、boilerplate removal、deduplication。
    - en: "Source metadata: title, author, URL/path, last_modified, content_type, word_count, language detection"
      zh: "源元数据：标题、作者、URL/路径、最后修改时间、内容类型、词计数、语言检测"
      ja: title、author、URL 又は path、last_modified、content_type、word_count、language detection を含む source metadata。
    - en: "Pipeline orchestration: scheduling (cron, event-driven), incremental ingestion (only new/changed), full re-ingestion, retry on failure"
      zh: "管线编排：调度（cron、事件驱动）、增量摄入（仅新增/变化）、全量重新摄入、失败重试"
      ja: scheduling、incremental ingestion、full re-ingestion、failure retry を含む pipeline orchestration。
  excludes:
    - en: "Chunking the loaded documents (belongs to Chunking & Situating—ingestion produces whole documents, chunking splits them)"
      zh: "对加载文档进行分块（属于分块与定位模块——摄入产生完整文档，分块分割它们）"
      ja: memory-chunking-situating に属する loaded Document の chunking。ingestion は whole Document を生成し、chunking はそれを分割する。
    - en: "Embedding and indexing (belongs to Embeddings & Indexes—ingestion provides normalized text, not vectors)"
      zh: "嵌入和索引（属于嵌入与索引模块——摄入提供规范化文本，不是向量）"
      ja: memory-embedding-indexes に属する embedding と indexing。ingestion は normalized text を提供し、vector を生成しない。
    - en: "Memory object creation in stores (belongs to Memory Stores & Scopes—ingestion feeds documents into the pipeline, stores persist the final results)"
      zh: "在存储中创建记忆对象（属于记忆存储与作用域——摄入将文档送入管线，存储持久化最终结果）"
      ja: memory-stores-scopes に属する memory object creation。ingestion は Document を pipeline に渡し、store が最終結果を persist する。
  semantic_kind: module
  aliases: [document ingestion pipeline, RAG ingestion layer]
engineering:
  explanation:
    en: >
      The ingestion layer follows the adapter pattern: each source type has a loader that
      implements a common interface (LangChain's BaseLoader.load() -> list[Document]).
      In LangChain, a Document has page_content (str) and metadata (dict). LlamaIndex uses
      a similar pattern with its Reader interface producing Document nodes. For production
      scale, Unstructured.io provides robust parsing that handles complex layouts (tables,
      multi-column, headers/footers) across 20+ file formats. The ingestion pipeline typically
      runs as a background job: detect new/changed files -> load -> parse -> normalize ->
      emit Document objects for the chunking stage.
    zh: >
      摄入层遵循适配器模式：每个源类型有一个加载器实现公共接口（LangChain 的
      BaseLoader.load() -> list[Document]）。在 LangChain 中，Document 有 page_content (str)
      和 metadata (dict)。LlamaIndex 使用类似模式。对于生产规模，Unstructured.io 提供
      跨 20+ 文件格式处理复杂布局的健壮解析。
    ja: >-
      ingestion layer は adapter pattern を用い、各 source type の loader が共通 interface を実装します。loader は
      versioned resource を read し、format parsing と normalization を経て source metadata 付きの Document を出力します。
      production parser は layout を扱えますが、loader execution、source resource、生成 Document は別々に記録します。
  typical_input:
    - description: "LangChain PyPDFLoader - Load PDF"
      format: |
        loader = PyPDFLoader("path/to/document.pdf")
        documents = loader.load()
    - description: "LangChain WebBaseLoader - Load web page"
      format: |
        loader = WebBaseLoader("https://example.com/article")
        documents = loader.load()
    - description: "Firecrawl API - Crawl and extract"
      format: |
        app.scrape_url(
          url="https://docs.example.com/guide",
          params={"formats": ["markdown"]}
        )
  typical_output:
    - description: "LangChain Document object"
      format: |
        Document(
          page_content="# Introduction\n\nThis guide covers...",
          metadata={
            "source": "https://docs.example.com/guide",
            "title": "Getting Started Guide",
            "content_type": "text/markdown",
            "last_modified": "2026-07-15T10:00:00Z",
            "word_count": 2847
          }
        )
  reference_implementations:
    - name: LangChain Document Loaders
      url: https://docs.langchain.com/oss/python/langchain/document_loaders
      description: 100+ loaders for PDF, HTML, CSV, JSON, databases, cloud storage, APIs
    - name: LlamaIndex Data Connectors
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/
      description: SimpleDirectoryReader, web readers, database readers, and custom connectors
    - name: Unstructured.io
      url: https://docs.unstructured.io/
      description: Production document parsing for complex layouts across 20+ file formats
    - name: Firecrawl
      url: https://docs.firecrawl.dev/
      description: Web crawling and scraping optimized for LLM consumption with markdown output
structure:
  identity_keys: [module_id]
  fields:
    - id: module_id
      labels: {zh: 模块标识, en: module ID, ja: モジュール ID}
      definitions:
        zh: 稳定标识本模块的外部来源读取和文档规范化边界，而不是其中的一个资源、运行或文档。
        en: Stably identifies this module's external-source read and document-normalization boundary, not an individual resource, run, or document inside it.
        ja: この module の external-source read と document-normalization boundary を安定して識別し、内部の個別 resource、run、Document ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [memory-ingestion]
      pattern: null
      example_value: memory-ingestion
      source_claims: [claim-ingestion-loader-boundary]
    - id: ingestion_boundary
      labels: {zh: 摄入边界, en: ingestion boundary, ja: ingestion 境界}
      definitions:
        zh: 声明版本化外部资源如何通过加载、解析和规范化成为 Document，同时将分块、嵌入、索引和存储写入排除在外。
        en: Declares how a versioned external resource becomes a Document through loading, parsing, and normalization while excluding chunking, embedding, indexing, and store writes.
        ja: versioned external resource が loading、parsing、normalization を通じて Document になる方法と、chunking、embedding、indexing、store write を除外することを宣言する。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"resource":"file-policy-v7","run":"ingest-policy-17","document":"document-policy-v7"}'
      source_claims: [claim-ingestion-loader-boundary, claim-ingestion-source-lineage]
  constraints:
    - id: memory-ingestion-module-boundary
      severity: error
      expression_language: plain
      expression: Ingestion must read a versioned IngestibleResource through an explicit loader or ingestion activity and produce a separately identified Document or IngestibleInformation artifact with source metadata. It must not silently treat a raw locator, loader configuration, Chunk, embedding vector, index entry, retrieval result, or persistent memory record as the ingested document.
      explanation:
        zh: 来源资源、加载或规范化活动、生成文档以及下游块或向量由不同证据产生；保留这些边界使重读、去重和来源审计成为可能。
        en: Source resources, loading or normalization activities, generated documents, and downstream chunks or vectors arise from different evidence. Keeping those boundaries makes replay, deduplication, and provenance audit possible.
        ja: source resource、loading 又は normalization activity、生成 Document、後続 Chunk 又は vector は異なる evidence から生じます。これらの boundary を保つことで replay、deduplication、provenance audit が可能になります。
      source_claims: [claim-ingestion-loader-boundary, claim-ingestion-normalization, claim-ingestion-source-lineage]
  required_relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 摄入输入由来源资源、加载能力和已读取信息组成，分别由 reads、uses 与 consumes 关系绑定。
          en: Ingestion input consists of source resources, loader capability, and already-read information, bound separately by reads, uses, and consumes relations.
          ja: 取込入力はsource resource・loader capability・read済みinformationからなりreads・uses・consumes関係で別々にbindingします。
        family_concept_ids:
          - IngestibleResource
          - DocumentLoader
          - IngestibleInformation
        relation_ids:
          - IngestionRun-reads-IngestibleResource
          - IngestionRun-uses-DocumentLoader
          - NormalizationActivity-consumes-IngestibleInformation
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 摄入只交付规范 Document、其 DocumentMetadata 与去重判断；MemoryRecord 持久写入留给 memory-lifecycle。
          en: Ingestion hands off only canonical Document, its DocumentMetadata, and a deduplication judgment; MemoryRecord persistence remains owned by memory-lifecycle.
          ja: ingestionはcanonical Document・その DocumentMetadata・deduplication judgmentだけをhandoffしMemoryRecord永続writeは memory-lifecycle 所有とします。
        family_concept_ids:
          - Document
          - DocumentMetadata
          - DeduplicationDecision
        relation_ids:
          - NormalizationActivity-produces-Document
          - document_has_document_metadata
          - DeduplicationActivity-produces-DeduplicationDecision
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 记忆接入的失败概念族为错误事件；责任交接由已接受事实 摄入运行 —may_emit→ 错误事件 (IngestionRun-may_emit-ErrorEvent) 明确给出。
          en: The failure families for Memory ingestion are error event; the accepted facts ingestion run —may_emit→ error event (IngestionRun-may_emit-ErrorEvent) make the responsibility handoff explicit.
          ja: 記憶取り込みの失敗概念族はエラーイベントです。責任の受け渡しは承認済み事実 取込実行 —may_emit→ エラーイベント (IngestionRun-may_emit-ErrorEvent) により明示されます。
        family_concept_ids:
          - ErrorEvent
        relation_ids:
          - IngestionRun-may_emit-ErrorEvent
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 接入本体不启动恢复流程；下游若需重试或回滚，应引用 IngestionRun、ErrorEvent、SourceAttachment、Document 和 DeduplicationDecision 的确切身份，而不把恢复活动并入接入层级。
          en: The ingestion ontology does not initiate recovery; downstream retry or rollback should reference exact IngestionRun, ErrorEvent, SourceAttachment, Document, and DeduplicationDecision identities without folding recovery activity into the ingestion hierarchy.
          ja: ingestion ontologyはrecoveryを開始しません。下流のretry／rollbackは IngestionRun・ErrorEvent・SourceAttachment・Document・DeduplicationDecision のexact identityを参照し、recovery activityをingestion階層へ混在させません。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 接入读取 Resource、使用 Loader、规范化 Information，并交付 Document、DocumentMetadata 与 DeduplicationDecision；MemoryRecord 持久写入明确留给 lifecycle。
            en: Ingestion reads Resource, uses Loader, normalizes Information, and hands off Document, DocumentMetadata, and DeduplicationDecision; MemoryRecord persistence is explicitly left to lifecycle.
            ja: ingestionはResourceをreadしLoaderをuseしInformationをnormalizeして Document・DocumentMetadata・DeduplicationDecisionをhandoffし、MemoryRecord永続writeはlifecycleへ明示的に残します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 接入读取 Resource、使用 Loader、规范化 Information，并交付 Document、DocumentMetadata 与 DeduplicationDecision；MemoryRecord 持久写入明确留给 lifecycle。
            en: Ingestion reads Resource, uses Loader, normalizes Information, and hands off Document, DocumentMetadata, and DeduplicationDecision; MemoryRecord persistence is explicitly left to lifecycle.
            ja: ingestionはResourceをreadしLoaderをuseしInformationをnormalizeして Document・DocumentMetadata・DeduplicationDecisionをhandoffし、MemoryRecord永続writeはlifecycleへ明示的に残します。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - IngestionActivity
      - IngestibleResource
      - IngestionPolicy
    allowed_backbone_predicates:
      - consumes
      - contains
      - document_has_document_metadata
      - has_table
      - has_source_attachment
      - is_a
      - produces
      - uses
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后保留六种互不混同的上位身份，但不把它们都伪装成图根：IngestionActivity 是模块关键根；IngestibleResource 与 IngestionPolicy 是不依附其他主干的结构根；IngestibleCollection、DocumentLoader 与 IngestibleInformation 分别由 IngestionRun 的 consumes/uses 和 NormalizationActivity 的 consumes 进入主干。DeduplicationDecision 由 DeduplicationActivity 首次产生，也不是新的平级根。
            en: Point-by-point review retains six non-interchangeable upper identities without pretending that all are graph roots. IngestionActivity is the module key root; IngestibleResource and IngestionPolicy are independent composition roots; IngestibleCollection, DocumentLoader, and IngestibleInformation enter the backbone through IngestionRun consumes or uses and NormalizationActivity consumes, respectively. DeduplicationDecision is first produced by DeduplicationActivity and is not another peer root.
            ja: 個別審査後も六つの相互非同一な upper identity を保ちますが、すべてを graph root には見せません。IngestionActivity は module key root、IngestibleResource と IngestionPolicy は独立 composition root です。IngestibleCollection・DocumentLoader・IngestibleInformation はそれぞれ IngestionRun の consumes/uses と NormalizationActivity の consumes で backbone に入ります。DeduplicationDecision は DeduplicationActivity が初めて生成し、新たな同列 root ではありません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体审查确认 root_status 与显示主干承担不同但一致的职责：IngestionActivity、IngestibleResource、IngestionPolicy 保持三个真实入口；consumes 与 uses 只把集合、内容和加载能力组织进摄入流程，不产生 is_a 含义或 owner 转移。reads 与 governed_by 保持横向治理事实；Document 通过 has_source_attachment 组成版本固定的 SourceAttachment，再以 describes 指向独立资源。
            en: Ontology review confirms distinct but consistent roles for root_status and the display backbone. IngestionActivity, IngestibleResource, and IngestionPolicy remain three true entry points; consumes and uses organize collections, information, and loader capability into the ingestion flow without implying is_a or transferring ownership. reads and governed_by remain lateral governance facts. Document composes a version-pinned SourceAttachment through has_source_attachment, which then points to the independent resource through describes.
            ja: 本体審査は root_status と display backbone が別々だが整合する役割を持つと確認しました。IngestionActivity・IngestibleResource・IngestionPolicy は三つの真正 entry point を保ち、consumes/uses は collection・information・loader capability を ingestion flow に組織するだけで is_a 意味も owner 移転も生じません。reads/governed_by は横断 governance fact のままです。Document は has_source_attachment で version-pinned SourceAttachment を構成し、describes で independent resource を指します。
  competency_questions:
    - id: memory-ingestion-cq-loader-selection-v3
      semantic_key: memory-ingestion.loader-selection
      primary_owner_module_id: memory-ingestion
      related_module_ids: []
      questions:
        zh: 一次摄入运行读取哪个来源、使用哪个加载器并由哪个规范化阶段产生文档？
        en: Which source did an ingestion run read, which loader did it use, and which normalization phase produced the document?
        ja: 取込runはどのsourceをreadしどのloaderを使いどのnormalization phaseがdocumentを生成しましたか。
      query: Trace IngestionRun to the source resource and loader, then through its NormalizationActivity to the generated Document.
      expected_assertion: The source version, compatible loader version, phase membership, and generated document all form one accepted chain.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - IngestionRun
          - IngestibleResource
          - DocumentLoader
          - NormalizationActivity
          - Document
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 来源资源、加载能力、摄入运行、规范化阶段和 Document 都由摄入模块拥有；本查询不依赖信息来源模块中的另一概念。
          en: The source resource, loader capability, ingestion run, normalization phase, and Document are all owned by ingestion; this query does not depend on another concept from the information-source module.
          ja: source resource・loader capability・ingestion run・normalization phase・Documentはすべてingestion moduleが所有し、information-source moduleの別概念に依存しません。
      positive_example_ids:
        - memory-ingestion-cq-loader-selection-v3-example-positive
      counterexample_ids:
        - memory-ingestion-cq-loader-selection-v3-example-counter
      source_claims:
        - claim-memory-ingestion-011
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-memory-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 该 CQ 已按可执行关系链重新绑定，不再依靠概念并列或边界对照。
              en: This CQ was rebound to an executable relation chain rather than concept juxtaposition or boundary comparison.
              ja: このCQは概念並置や境界比較でなく実行可能relation chainへ再bindingしました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 证据链由已接受关系 IngestionRun-reads-IngestibleResource、IngestionRun-uses-DocumentLoader、IngestionRun-has_phase-NormalizationActivity、NormalizationActivity-produces-Document 构成。
              en: The evidence chain consists of accepted relations IngestionRun-reads-IngestibleResource, IngestionRun-uses-DocumentLoader, IngestionRun-has_phase-NormalizationActivity, NormalizationActivity-produces-Document.
