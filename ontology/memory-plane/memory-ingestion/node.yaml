schema: moonweave.ai/ontology-node/v1
id: memory-ingestion
kind: module
status: review
labels:
  zh: 外部资源接入
  en: External-resource ingestion
  ja: 外部資源の取り込み
semantics:
  short_definition:
    zh: 外部资源接入描述如何在已声明的接入政策下，用加载器读取文件、数据库或图存储等外部资源，经规范化与去重后产生可交给分块阶段的 Document 与附件信息。它分开资源实体、接入活动和可复用政策，不把来源引用或持久记忆写入并入本树。
    en: External-resource ingestion describes how a declared ingestion policy and loader read a file, database, graph store, or other outside resource and turn it, through normalization and deduplication, into a Document and attachment information ready for chunking. It keeps the resource entity, ingestion activity, and reusable policy distinct from source-reference records and persistent-memory writes.
    ja: memory ingestion は reusable specification・resource type・一 execution fact を分離します。IngestionPolicy は reusable specification root、IngestibleResource は FileSystem・DirectoryResource・FileResource・Database・GraphStore へ特化し、IngestionRun は reads・governed_by・hosts/contains cross-link で具体 resource state を参照します。NormalizationActivity/DeduplicationActivity は Document・version-pinned SourceAttachment・DocumentMetadata・DeduplicationDecision を形成します。
  definition:
    zh: 记忆接入分开表达可复用规范、资源类型和一次执行事实：IngestionPolicy 是跨运行复用的规范根；IngestibleResource 以类型骨架展开 FileSystem、DirectoryResource、FileResource、Database 与 GraphStore；IngestionRun 通过 reads、governed_by、hosts/contains 等横向事实引用具体资源状态，并由 NormalizationActivity 与 DeduplicationActivity 形成 Document、版本固定的 SourceAttachment、DocumentMetadata 与 DeduplicationDecision。
    en: IngestionActivity owns the run and its loading, normalization, and deduplication phases; IngestibleResource owns the external entity being read; IngestionPolicy owns the reusable operational specification. A SourceReference only points to a resource and therefore remains in source references and evidence location. Chunking, embedding, index construction, and persistent-memory writes are later activities owned by their respective modules.
    ja: memory ingestion は reusable specification・resource type・一 execution fact を分離します。IngestionPolicy は reusable specification root、IngestibleResource は FileSystem・DirectoryResource・FileResource・Database・GraphStore へ特化し、IngestionRun は reads・governed_by・hosts/contains cross-link で具体 resource state を参照します。NormalizationActivity/DeduplicationActivity は Document・version-pinned SourceAttachment・DocumentMetadata・DeduplicationDecision を形成します。
  why_needed:
    zh: 把文件、数据库和图等外部资源，经可追踪的读取、规范化与去重决定，转为可供后续分块、表示和存储使用的文档信息。
    en: Turn external resources such as files, databases, and graphs into document information for later chunking, representation, and storage through traceable reading, normalization, and deduplication decisions.
    ja: ファイル、データベース、グラフなどの外部資源を、追跡可能な読取り、正規化、重複排除判断によって、後続の分割、表現、保存に利用できる文書情報へ変換します。
  includes:
    - zh: IngestibleResource 下并列的 FileSystem、DirectoryResource、FileResource、Database 与 GraphStore 等资源类型，以及另由 hosts、contains、has_table 表达的实例结构；Document 与语料集合保持在信息和集合分支。
      en: Sibling resource types under IngestibleResource—FileSystem, DirectoryResource, FileResource, Database, GraphStore, and peers—plus instance structure expressed separately through hosts, contains, and has_table; Document and corpora remain on information and collection branches.
      ja: IngestibleResource 配下の sibling resource type（FileSystem・DirectoryResource・FileResource・Database・GraphStore 等）と、hosts・contains・has_table で別に表す instance structure。Document/corpus は information/collection branch に保ちます。
    - zh: 独立可复用的 IngestionPolicy 与 DocumentLoader，完整 IngestionRun 及其 NormalizationActivity、DeduplicationActivity，以及 Document、DocumentMetadata、DeduplicationDecision 和由 Document 组成并固定资源版本与摘要的 SourceAttachment。
      en: Independent reusable IngestionPolicy and DocumentLoader, a complete IngestionRun and its NormalizationActivity and DeduplicationActivity phases, plus Document, DocumentMetadata, DeduplicationDecision, and SourceAttachment records composed by a Document and pinned to a resource version and digest.
      ja: independent reusable IngestionPolicy・DocumentLoader、complete IngestionRun と NormalizationActivity/DeduplicationActivity、Document・DocumentMetadata・DeduplicationDecision、および Document が構成し resource version/digest を固定する SourceAttachment。
  excludes:
    - zh: SourceReference、Location 和版本核验身份归来源与定位；接入只引用它们记录来源。
      en: SourceReference, Location, and version-verification identity belong to sources and locations; ingestion references them to record provenance.
      ja: SourceReference、Location、版検証同一性は出典と位置に属し、取込は来歴記録のため参照します。
    - zh: FileSystem 在此是可读取的 IngestibleResource；持久 MemoryStore、MemoryWrite、分块和嵌入分别属于存储、生命周期、分块与索引模块，不能混入接入活动。
      en: FileSystem is a readable IngestibleResource here; persistent MemoryStore, MemoryWrite, chunking, and embedding belong to the stores, lifecycle, chunking, and indexing modules respectively and must not be folded into ingestion activity.
      ja: FileSystem はここで読取り可能な IngestibleResource です。永続 MemoryStore、MemoryWrite、分割、埋込みはそれぞれ保存、ライフサイクル、分割、索引モジュールに属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把文件、数据库和图等外部资源，经可追踪的读取、规范化与去重决定，转为可供后续分块、表示和存储使用的文档信息。
  en: Turn external resources such as files, databases, and graphs into document information for later chunking, representation, and storage through traceable reading, normalization, and deduplication decisions.
  ja: ファイル、データベース、グラフなどの外部資源を、追跡可能な読取り、正規化、重複排除判断によって、後続の分割、表現、保存に利用できる文書情報へ変換します。
structure: null
examples:
  - id: memory-ingestion-cq-loader-selection-v3-example-positive
    kind: positive
    labels:
      zh: 来源—加载器—文档链正例
      en: Positive source-loader-document chain
      ja: source-loader-document chain正例
    scenario_id: ingestion-loader-17
    descriptions:
      zh: ingest-run-17 的清单读取 file-policy-v7@digest，调用支持 PDF 的 loader-pdf-v3@3.2.1，并把 normalize-17 作为 sequence=1 阶段产生 document-policy-v7。
      en: ingest-run-17's manifest reads file-policy-v7@digest, invokes PDF-capable loader-pdf-v3@3.2.1, and includes normalize-17 as sequence 1 producing document-policy-v7.
      ja: ingest-run-17 のmanifestは file-policy-v7@digest を読み、PDF対応 loader-pdf-v3@3.2.1 を呼び、sequence=1 の normalize-17 が document-policy-v7 を生成します。
    field_values:
      run_id: ingest-run-17
      resource: file-policy-v7@digest
      loader: loader-pdf-v3@3.2.1
      phase: normalize-17
      document: document-policy-v7
    related_node_ids:
      - IngestionRun
      - IngestibleResource
      - DocumentLoader
      - NormalizationActivity
      - Document
    related_relation_ids:
      - IngestionRun-reads-IngestibleResource
      - IngestionRun-uses-DocumentLoader
      - IngestionRun-has_phase-NormalizationActivity
      - NormalizationActivity-produces-Document
    expected_result:
      zh: 返回同一运行范围内的来源版本、实际加载器、阶段归属和新文档四段链。
      en: Return the source version, actually invoked loader, phase membership, and new document within one run scope.
      ja: 同一run scope内のsource版、実際にinvokeしたloader、phase所属、新documentの四段chainを返します。
    why_valid_or_invalid:
      zh: 资源摘要、媒体能力、run_id、阶段顺序与 generating_phase_id 能逐项对齐。
      en: Resource digest, media capability, run ID, phase order, and generating_phase_id align item by item.
      ja: resource digest、media capability、run ID、phase順序、generating_phase_idを個別照合できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-ingestion-005
  - id: memory-ingestion-cq-loader-selection-v3-example-counter
    kind: counterexample
    labels:
      zh: 来源—加载器—文档链反例
      en: "Counterexample: uninvoked loader"
      ja: source-loader-document chain反例
    scenario_id: ingestion-loader-uninvoked
    descriptions:
      zh: loader-html 已安装且 file-policy-v7 与目标文件同目录，但 ingest-run-17 没有读取该资源也没有调用该加载器；安装和可发现性不能形成 uses/reads。
      en: loader-html is installed and file-policy-v7 shares a directory with the target, but ingest-run-17 neither reads that resource nor invokes the loader; installation and discoverability do not establish uses or reads.
      ja: loader-html はinstall済みで file-policy-v7 もtargetと同directoryですが、ingest-run-17 はresourceをreadせずloaderもinvokeしません。installとdiscoverabilityから uses／reads は成立しません。
    field_values:
      run_id: ingest-run-17
      installed_loader: loader-html
      discovered_resource: file-policy-v7
      invoked: false
    related_node_ids:
      - IngestionRun
      - IngestibleResource
      - DocumentLoader
    related_relation_ids:
      - IngestionRun-reads-IngestibleResource
      - IngestionRun-uses-DocumentLoader
    expected_result:
      zh: 不得返回来源读取或加载器使用关系，也不能把无归属的文档归因于该运行。
      en: Do not return source-read or loader-use relations and do not attribute an unbound document to the run.
      ja: source-read・loader-use relationを返さず、未binding documentをrunへ帰属させません。
    why_valid_or_invalid:
      zh: 可用能力、目录邻接与实际运行事实是三类不同信息。
      en: Available capability, directory adjacency, and actual run facts are three distinct kinds of information.
      ja: available capability、directory隣接、actual run factは三種の異なるinformationです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-ingestion-006
  - id: memory-ingestion-cq-deduplication-decision-v3-example-positive
    kind: positive
    labels:
      zh: 去重决定链正例
      en: Positive deduplication-decision chain
      ja: deduplication decision chain正例
    scenario_id: deduplication-decision-17
    descriptions:
      zh: normalize-17 先产生 document-policy-v7；同一 ingest-run-17 中 dedup-17 随后消费该确切摘要，比较 prior-v6，并产生 outcome=update 的 decision-17，决定明确 about document-policy-v7。
      en: normalize-17 first produces document-policy-v7; in the same ingest-run-17, dedup-17 then consumes that exact digest, compares prior-v6, and produces decision-17 with outcome=update explicitly about document-policy-v7.
      ja: normalize-17 が document-policy-v7 を生成し、同じ ingest-run-17 の dedup-17 がそのexact digestを消費して prior-v6 と比較し、document-policy-v7 について outcome=update の decision-17 を生成します。
    field_values:
      normalization_phase: normalize-17
      document: document-policy-v7
      dedup_phase: dedup-17
      prior_digest: prior-v6
      decision: decision-17
      outcome: update
    related_node_ids:
      - NormalizationActivity
      - Document
      - DeduplicationActivity
      - DeduplicationDecision
    related_relation_ids:
      - NormalizationActivity-produces-Document
      - NormalizationActivity-precedes-DeduplicationActivity
      - DeduplicationActivity-consumes-Document
      - DeduplicationActivity-produces-DeduplicationDecision
      - DeduplicationDecision-about-Document
    expected_result:
      zh: 返回规范化输出、同运行阶段顺序、去重输入、决定生成和决定对象的完整链。
      en: Return the complete chain of normalization output, same-run phase order, deduplication input, decision generation, and decision subject.
      ja: normalization output、同run phase順序、dedup input、decision生成、decision対象の完全chainを返します。
    why_valid_or_invalid:
      zh: 文档 ID 与摘要在产生、消费和 about 三处一致，决定是信息记录而不是伪事件或 MemoryWrite。
      en: Document ID and digest agree across production, consumption, and about; the decision is an information record, not a pseudo-event or MemoryWrite.
      ja: document IDとdigestがproduce・consume・aboutで一致し、decisionはpseudo-eventや MemoryWrite でなくinformation recordです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-ingestion-007
  - id: memory-ingestion-cq-deduplication-decision-v3-example-counter
    kind: counterexample
    labels:
      zh: 去重决定链反例
      en: "Counterexample: stale deduplication decision"
      ja: deduplication decision chain反例
    scenario_id: deduplication-decision-stale
    descriptions:
      zh: decision-16 关于 document-policy-v6，只有 document_id 相同但 content_digest 与 v7 不同；把它复用于 v7 会丢失版本边界。
      en: decision-16 is about document-policy-v6; only the document_id matches while content_digest differs from v7, so reusing it for v7 loses the version boundary.
      ja: decision-16 は document-policy-v6 についての判断で、document_idだけ同じで content_digest は v7 と異なります。v7へ再利用すると版境界を失います。
    field_values:
      decision: decision-16
      actual_document: document-policy-v6
      proposed_document: document-policy-v7
      digest_match: false
    related_node_ids:
      - DeduplicationDecision
      - Document
      - DeduplicationActivity
    related_relation_ids:
      - DeduplicationActivity-produces-DeduplicationDecision
      - DeduplicationDecision-about-Document
    expected_result:
      zh: 拒绝 decision-16 → document-policy-v7 的 about 关系，并要求对 v7 重新比较。
      en: Reject decision-16 about document-policy-v7 and require a new comparison for v7.
      ja: decision-16 → document-policy-v7 の about relationを拒否し、v7への再比較を要求します。
    why_valid_or_invalid:
      zh: 相同业务 ID 不等于相同文档版本；去重判断必须绑定比较时的内容摘要。
      en: Equal business ID is not equal document version; a deduplication decision must bind the compared content digest.
      ja: 同business IDは同document版ではなく、deduplication decisionは比較時content digestへbindingする必要があります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-ingestion-008
  - id: memory-ingestion-cq-provenance-chain-v3-example-positive
    kind: positive
    labels:
      zh: 文档来源证据链正例
      en: Positive document-provenance chain
      ja: document来歴evidence chain正例
    scenario_id: document-provenance-17
    descriptions:
      zh: document-policy-v7 组成 attachment-17；附件固定 file-policy-v7 的 object-version:7 与内容摘要，ingest-run-17 的读取清单也含同一版本和摘要，并由 normalize-17 产生该文档。
      en: document-policy-v7 composes attachment-17, which pins file-policy-v7 object-version:7 and its content digest; ingest-run-17's read manifest contains that same version and digest, and normalize-17 produces the Document.
      ja: document-policy-v7 は attachment-17 を構成し、attachment は file-policy-v7 object-version:7/content digest を固定します。ingest-run-17 read manifest も同じ version/digest を持ち normalize-17 が Document を生成します。
    field_values:
      document: document-policy-v7
      attachment: attachment-17
      resource_id: file-policy-v7
      resource_version_ref: object-version:7
      resource_content_digest: "sha-256=:ZGlnZXN0LWE=:"
      run: ingest-run-17
      phase: normalize-17
    related_node_ids:
      - Document
      - SourceAttachment
      - IngestibleResource
      - IngestionRun
      - NormalizationActivity
    related_relation_ids:
      - Document-has_source_attachment-SourceAttachment
      - SourceAttachment-describes-IngestibleResource
      - IngestionRun-reads-IngestibleResource
      - NormalizationActivity-produces-Document
    expected_result:
      zh: 返回文档—附件—资源与运行—规范化输出两条相互校验的路径，资源 ID、逻辑版本引用和内容摘要必须分别相同。
      en: Return the Document–attachment–resource and run–normalization-output paths as mutual checks, requiring separate agreement on resource ID, logical version reference, and content digest.
      ja: Document-attachment-resource path と run-normalization-output path を相互検証し resource ID・logical version reference・content digest の個別一致を要求します。
    why_valid_or_invalid:
      zh: 附件证据、运行输入与生成阶段三处都指向同一不可歧义来源版本。
      en: Attachment evidence, run input, and generating phase all point to one unambiguous source version.
      ja: attachment evidence、run input、generating phaseの三箇所が同一の曖昧でないsource版を指します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-ingestion-009
  - id: memory-ingestion-cq-provenance-chain-v3-example-counter
    kind: counterexample
    labels:
      zh: 文档来源证据链反例
      en: "Counterexample: source-version mismatch"
      ja: document来歴evidence chain反例
    scenario_id: document-provenance-digest-mismatch
    descriptions:
      zh: attachment-17 仍描述 file-policy-v7@digest-a，但运行读取的是同路径 file-policy-v8@digest-b；URI 相同不能把 v7 附件当成 v8 文档的来源证据。
      en: attachment-17 still describes file-policy-v7@digest-a, while the run reads same-path file-policy-v8@digest-b; equal URI cannot make the v7 attachment provenance for a v8 document.
      ja: attachment-17 は file-policy-v7@digest-a を記述しますが、runは同pathの file-policy-v8@digest-b を読みます。同URIでもv7 attachmentをv8 documentの来歴根拠にはできません。
    field_values:
      attachment_resource_id: file-policy-v7
      attachment_version_ref: object-version:7
      attachment_content_digest: "sha-256=:ZGlnZXN0LWE=:"
      run_resource_id: file-policy-v8
      run_version_ref: object-version:8
      run_content_digest: "sha-256=:ZGlnZXN0LWI=:"
      same_uri: true
      same_digest: false
    related_node_ids:
      - Document
      - SourceAttachment
      - IngestibleResource
      - IngestionRun
    related_relation_ids:
      - Document-has_source_attachment-SourceAttachment
      - SourceAttachment-describes-IngestibleResource
      - IngestionRun-reads-IngestibleResource
    expected_result:
      zh: 报告来源版本冲突，拒绝闭合 provenance chain，直到附件与运行清单摘要一致。
      en: Report the source-version conflict and refuse to close the provenance chain until attachment and run-manifest digests agree.
      ja: source版conflictを報告し、attachmentとrun manifestのdigest一致までprovenance chainを閉じません。
    why_valid_or_invalid:
      zh: 定位符用于寻找资源，内容摘要才区分同路径的不同版本。
      en: A locator finds a resource, while the content digest distinguishes versions at the same path.
      ja: locatorはresourceを見つけますが、同pathの別版を区別するのはcontent digestです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-ingestion-010
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 摄入输入由来源资源、加载能力和已读取信息组成，分别由 reads、uses 与 consumes 关系绑定。
          en: Ingestion input consists of source resources, loader capability, and already-read information, bound separately by reads, uses, and consumes relations.
          ja: 取込入力はsource resource・loader capability・read済みinformationからなりreads・uses・consumes関係で別々にbindingします。
        family_concept_ids:
          - IngestibleResource
          - DocumentLoader
          - IngestibleInformation
        relation_ids:
          - IngestionRun-reads-IngestibleResource
          - IngestionRun-uses-DocumentLoader
          - NormalizationActivity-consumes-IngestibleInformation
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 摄入只交付规范 Document、其 DocumentMetadata 与去重判断；MemoryRecord 持久写入留给 memory-lifecycle。
          en: Ingestion hands off only canonical Document, its DocumentMetadata, and a deduplication judgment; MemoryRecord persistence remains owned by memory-lifecycle.
          ja: ingestionはcanonical Document・その DocumentMetadata・deduplication judgmentだけをhandoffしMemoryRecord永続writeは memory-lifecycle 所有とします。
        family_concept_ids:
          - Document
          - DocumentMetadata
          - DeduplicationDecision
        relation_ids:
          - NormalizationActivity-produces-Document
          - document_has_document_metadata
          - DeduplicationActivity-produces-DeduplicationDecision
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 记忆接入的失败概念族为错误事件；责任交接由已接受事实 摄入运行 —may_emit→ 错误事件 (IngestionRun-may_emit-ErrorEvent) 明确给出。
          en: The failure families for Memory ingestion are error event; the accepted facts ingestion run —may_emit→ error event (IngestionRun-may_emit-ErrorEvent) make the responsibility handoff explicit.
          ja: 記憶取り込みの失敗概念族はエラーイベントです。責任の受け渡しは承認済み事実 取込実行 —may_emit→ エラーイベント (IngestionRun-may_emit-ErrorEvent) により明示されます。
        family_concept_ids:
          - ErrorEvent
        relation_ids:
          - IngestionRun-may_emit-ErrorEvent
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 接入本体不启动恢复流程；下游若需重试或回滚，应引用 IngestionRun、ErrorEvent、SourceAttachment、Document 和 DeduplicationDecision 的确切身份，而不把恢复活动并入接入层级。
          en: The ingestion ontology does not initiate recovery; downstream retry or rollback should reference exact IngestionRun, ErrorEvent, SourceAttachment, Document, and DeduplicationDecision identities without folding recovery activity into the ingestion hierarchy.
          ja: ingestion ontologyはrecoveryを開始しません。下流のretry／rollbackは IngestionRun・ErrorEvent・SourceAttachment・Document・DeduplicationDecision のexact identityを参照し、recovery activityをingestion階層へ混在させません。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 接入读取 Resource、使用 Loader、规范化 Information，并交付 Document、DocumentMetadata 与 DeduplicationDecision；MemoryRecord 持久写入明确留给 lifecycle。
            en: Ingestion reads Resource, uses Loader, normalizes Information, and hands off Document, DocumentMetadata, and DeduplicationDecision; MemoryRecord persistence is explicitly left to lifecycle.
            ja: ingestionはResourceをreadしLoaderをuseしInformationをnormalizeして Document・DocumentMetadata・DeduplicationDecisionをhandoffし、MemoryRecord永続writeはlifecycleへ明示的に残します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
