        ja: どちらも出典同一性を記録しますが、取込対象は Loader、取込結果、処理ライフサイクルを持ち、出典参照は位置付けだけを担います。 この記録は TextDocument だけを対象とし、canonical owner は記憶取り込み（memory-ingestion）です。したがって memory-ingestion はここでこれらを所有します。
