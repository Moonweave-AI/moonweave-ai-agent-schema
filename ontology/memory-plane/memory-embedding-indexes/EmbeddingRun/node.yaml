schema: moonweave.ai/ontology-node/v1
id: EmbeddingRun
kind: concept
status: accepted
labels:
  zh: 嵌入生成运行
  en: Embedding Run
  ja: 埋め込み生成実行
semantics:
  short_definition:
    zh: 使用指定嵌入模型将明确内容工件批次编码为 EmbeddingVector 输出的一次可审计活动。
    en: An auditable activity that encodes an explicit batch of content artifacts into EmbeddingVector outputs with a named embedding model.
    ja: 指定された embedding model で明示的な content artifact batch を EmbeddingVector output に encode する一回の監査可能な activity。
  definition:
    zh: >
      EmbeddingRun 记录一次实际模型编码执行：它读取确定内容工件版本或规范化文本引用，使用命名模型生成一个或多个
      EmbeddingVector，并记录输入摘要、维度、状态与时序。它不是 IndexActivity，因为它不写入、构建、刷新或维护
      索引结构；也不是输入 Chunk、输出向量、IndexEntry、VectorDatabase、检索候选或排序结果。后续索引写入需要独立
      IndexBuildRun，检索命中不能反向证明该嵌入运行发生。
    en: >
      EmbeddingRun records one actual model-encoding execution: it reads determinate content-artifact revisions or
      normalized-text references, uses a named model to generate one or more EmbeddingVectors, and records input
      digest, dimension, status, and timing. It is not IndexActivity because it does not write, build, refresh, or
      maintain index structure; it is also not input Chunk, output vector, IndexEntry, VectorDatabase, retrieval
      candidate, or ranking result. Later index writing requires independent IndexBuildRun, and a retrieval hit cannot
      prove this embedding run occurred in reverse.
    ja: >
      EmbeddingRun は一回の実際の model-encoding execution を記録します。確定済み content-artifact revision または
      normalized-text reference を読み取り、名前付き model で一つ以上の EmbeddingVector を生成し、input digest、
      dimension、status、timing を記録します。index structure を write、build、refresh、maintain しないため
      IndexActivity ではなく、input Chunk、output vector、IndexEntry、VectorDatabase、retrieval candidate、ranking
      result でもありません。後続 index write には独立した IndexBuildRun が必要で、retrieval hit はこの embedding
      run の発生を逆向きに証明できません。
  why_needed:
    zh: 向量、模型版本和输入内容必须可回查到一次真实编码，否则索引兼容性、重嵌入和调试无法可靠进行。
    en: Vectors, model revision, and input content must be traceable to a real encoding execution; otherwise index compatibility, re-embedding, and debugging are unreliable.
    ja: vector、model revision、input content は実際の encoding execution まで追跡可能でなければならず、そうでなければ index compatibility、re-embedding、debugging は信頼できません。
  includes:
    - zh: 已执行的模型调用、输入工件引用及摘要、输出向量引用、维度、状态和时序。
      en: Executed model call, input-artifact references and digest, output-vector references, dimension, status, and timing.
      ja: 実行済み model call、input-artifact reference と digest、output-vector reference、dimension、status、timing。
  excludes:
    - zh: 索引写入或刷新、向量本身、索引条目、检索查询、候选、重排、上下文装配和答案。
      en: Index write or refresh, vector itself, index entry, retrieval query, candidate, rerank, context assembly, or answer.
      ja: index write または refresh、vector 自体、index entry、retrieval query、candidate、rerank、context assembly、answer。
  semantic_kind: activity
  aliases: [embedding execution, vectorization run, 向量编码运行]
engineering:
  explanation:
    zh: OpenAI embeddings 文档说明将输入内容变换为数值向量。Moonweave 将一次调用记为活动，将输入工件和输出向量以 PROV 交叉关系连接，而不把编码误作索引写入。
    en: OpenAI embeddings documentation describes transforming supplied input content into numerical vectors. Moonweave records one call as activity and links input artifacts and output vectors through PROV cross-links without confusing encoding with index write.
    ja: OpenAI embeddings documentation は supplied input content を numerical vector に変換すると説明します。Moonweave は一回の call を activity として記録し、encoding を index write と混同せず input artifact と output vector を PROV cross-link で結びます。
  typical_input:
    - description: Versioned chunk batch
      format: |
        {
          "input_artifact_refs": ["chunk-policy-42@v1", "chunk-policy-43@v1"],
          "model_ref": "text-embedding-3-small",
          "input_digest": "sha256:aa75d3"
        }
  typical_output:
    - description: Completed embedding-run record
      format: |
        {
          "embedding_run_id": "embed-run-51",
          "output_vector_refs": ["embedding-chunk-42-v1", "embedding-chunk-43-v1"],
          "dimensions": 1536,
          "status": "completed"
        }
  reference_implementations:
    - name: OpenAI embeddings guide
      url: https://developers.openai.com/api/docs/guides/embeddings
      description: Documents creating numerical embedding vectors from supplied input content.
structure:
  identity_keys: [embedding_run_id]
  fields:
    - id: embedding_run_id
      labels: {zh: 嵌入运行标识, en: embedding run ID, ja: 埋め込み run ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次模型编码执行，不能复用为输出向量、索引或检索运行标识。
        en: Identifies one model-encoding execution and is not reused as output-vector, index, or retrieval-run ID.
        ja: 一回の model-encoding execution を識別し、output-vector、index、retrieval-run ID として再利用しません。
      allowed_values: []
      pattern: "^embed-run-[A-Za-z0-9._-]+$"
      example_value: embed-run-51
      source_claims: [claim-embedding-run-openai]
    - id: model_ref
      labels: {zh: 嵌入模型引用, en: embedding model reference, ja: embedding model 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向实际执行编码的模型或部署版本，不能由索引或候选分数反推。
        en: Points to model or deployment revision that actually encoded input and cannot be inferred from index or candidate score.
        ja: input を実際に encode した model または deployment revision を指し、index や candidate score から推論できません。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: text-embedding-3-small
      source_claims: [claim-embedding-run-openai]
    - id: input_artifact_refs
      labels: {zh: 输入工件版本引用, en: input artifact revision references, ja: input artifact revision 参照}
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 按实际编码顺序列出输入内容工件版本，而非复制其文本或指向后续检索候选。
        en: Lists input content-artifact revisions in actual encoding order rather than copying text or pointing to later retrieval candidates.
        ja: text を複製したり後続 retrieval candidate を指したりせず、実際の encoding order で input content-artifact revision を列挙します。
      allowed_values: []
      pattern: null
      example_value: [chunk-policy-42@v1, chunk-policy-43@v1]
      source_claims: [claim-embedding-run-provenance, claim-embedding-run-design]
    - id: input_digest
      labels: {zh: 输入摘要, en: input digest, ja: input digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 对实际发送给模型的规范化输入批次计算的摘要，用于发现引用相同但内容被静默改变的情况。
        en: Digest of normalized batch actually sent to model, used to detect same references with silently changed content.
        ja: model に実際に送った正規化 batch の digest であり、同じ reference でも内容が黙って変わったことを検出します。
      allowed_values: []
      pattern: "^[A-Za-z0-9._-]+:[A-Fa-f0-9]+$"
      example_value: sha256:aa75d3
      source_claims: [claim-embedding-run-provenance]
    - id: output_vector_refs
      labels: {zh: 输出向量引用, en: output vector references, ja: output vector 参照}
      datatype: array
      required: false
      cardinality: {min: 0, max: 1}
      definitions:
        zh: 成功时按输入顺序引用模型生成的 EmbeddingVector；索引条目或检索候选不能替代这些输出。
        en: On success references model-generated EmbeddingVectors in input order; index entries or retrieval candidates cannot substitute for these outputs.
        ja: 成功時に input order で model-generated EmbeddingVector を参照し、index entry や retrieval candidate はこの output の代わりになりません。
      allowed_values: []
      pattern: null
      example_value: [embedding-chunk-42-v1, embedding-chunk-43-v1]
      source_claims: [claim-embedding-run-provenance]
    - id: dimensions
      labels: {zh: 向量维度, en: vector dimensions, ja: ベクトル dimension}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 每个成功输出向量的固定长度，用于后续索引兼容性验证，不代表候选数量或相关性。
        en: Fixed length of each successful output vector for later index-compatibility validation and not candidate count or relevance.
        ja: 後続 index compatibility validation のための各成功 output vector の固定長であり、candidate count や relevance ではありません。
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims: [claim-embedding-run-openai]
    - id: status
      labels: {zh: 运行状态, en: run status, ja: run status}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指示编码完成、失败、取消或部分完成，不代表索引是否可查询。
        en: Indicates encoding completed, failed, was cancelled, or partial and does not represent whether index is queryable.
        ja: encoding が completed、failed、cancelled、partial のどれかを示し、index が queryable かどうかは表しません。
      allowed_values: [completed, failed, cancelled, partial]
      pattern: null
      example_value: completed
      source_claims: [claim-embedding-run-provenance]
  constraints:
    - id: embedding-run-input-output-provenance
      severity: error
      expression_language: plain
      expression: model_ref, non-empty input_artifact_refs, input_digest, dimensions, and status are required. A completed run requires output_vector_refs aligned to input order; failed or cancelled run must not claim completed vector output.
      explanation:
        zh: 输入、模型和输出必须能对应到同一次执行；索引条目或候选命中不能替代模型调用证据。
        en: Inputs, model, and outputs must correspond to one execution; index entry or candidate hit cannot substitute for model-call evidence.
        ja: input、model、output は一回の execution に対応しなければならず、index entry や candidate hit は model-call evidence の代わりになりません。
      source_claims: [claim-embedding-run-provenance]
    - id: embedding-run-not-index-write
      severity: error
      expression_language: plain
      expression: EmbeddingRun must not assert index write, index build, index refresh, index membership, retrieval candidate production, reranking, ContextPackage inclusion, or answer correctness. These require independent IndexActivity, RetrievalActivity, or ContextAssembly facts.
      explanation:
        zh: 嵌入编码生成表示；索引维护和检索读取是独立活动，不能由目录、向量存在或查询命中合并。
        en: Embedding encoding generates representation; index maintenance and retrieval reads are independent activities and cannot be collapsed from directory, vector existence, or query hit.
        ja: embedding encoding は representation を生成し、index maintenance と retrieval read は独立 activity であり、directory、vector existence、query hit から統合できません。
      source_claims: [claim-embedding-run-index-boundary]
  required_relations: []
examples:
  - id: embedding-run-example-positive

    labels: {zh: 编码两个策略分块, en: Encode two policy chunks, ja: 二つの policy chunk を encode する}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values:
      embedding_run_id: embed-run-51
      model_ref: text-embedding-3-small
      input_artifact_refs: [chunk-policy-42@v1, chunk-policy-43@v1]
      input_digest: sha256:aa75d3
      output_vector_refs: [embedding-chunk-42-v1, embedding-chunk-43-v1]
      dimensions: 1536
      status: completed
    related_node_ids: [EmbeddingRun, ChunkArtifact, EmbeddingVector]
    related_relation_ids: [EmbeddingRun-uses-ChunkArtifact, EmbeddingRun-generates-EmbeddingVector]

    source_claims: [claim-embedding-run-openai, claim-embedding-run-provenance]
  - id: embedding-run-example-counterexample-query-hit

    labels: {zh: 检索命中反推嵌入运行, en: Infer embedding run from retrieval hit, ja: retrieval hit から embedding run を推論する}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values:
      retrieval_request_ref: retrieval-request-71
      candidate_ref: entry-p-88-42
      score: 0.91
      embedding_run_id: null
      output_vector_refs: []
    related_node_ids: [EmbeddingRun, RetrievedCandidate]
    related_relation_ids: []

    source_claims: [claim-embedding-run-index-boundary]
  - id: embedding-run-example-boundary-index-build

    labels: {zh: 将现有向量写入索引, en: Write existing vectors to an index, ja: 既存 vector を index に書き込む}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values:
      index_build_run_id: index-build-31
      input_vector_refs: [embedding-chunk-42-v1, embedding-chunk-43-v1]
      model_ref: null
      output_vector_refs: []
    related_node_ids: [EmbeddingRun, IndexBuildRun]
    related_relation_ids: []

    source_claims: [claim-embedding-run-index-boundary]
  - id: embedding-run-example-instance-openai

    labels: {zh: 实例：OpenAI 嵌入调用, en: "Instance: OpenAI embedding call", ja: "事例：OpenAI embedding call"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values:
      embedding_run_id: embed-run-policy-3
      model_ref: text-embedding-3-small
      input_artifact_refs: [chunk-policy-1@v1, chunk-policy-2@v1, chunk-policy-3@v1]
      input_digest: sha256:bb22f1
      output_vector_refs: [emb-policy-1-v1, emb-policy-2-v1, emb-policy-3-v1]
      dimensions: 1536
      status: completed
    related_node_ids: [EmbeddingRun, ChunkArtifact, EmbeddingVector]
    related_relation_ids: [EmbeddingRun-uses-ChunkArtifact, EmbeddingRun-generates-EmbeddingVector]
    source_claims: [claim-embedding-run-openai, claim-embedding-run-provenance]
parent_relation: null
relations:
  - id: EmbeddingRun-uses-ChunkArtifact
    predicate: uses
    target: concept:ChunkArtifact
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用内容工件, en: uses content artifact, ja: content artifact を使用する}
    definitions:
      zh: 仅当 input_artifact_refs 列出目标工件版本且该版本实际被编码模型读取时，EmbeddingRun 使用该工件。
      en: EmbeddingRun uses ChunkArtifact only when input_artifact_refs lists that artifact revision and model actually reads it for encoding.
      ja: input_artifact_refs が対象 artifact revision を列挙し、model が encoding のため実際に読み取った場合にだけ、EmbeddingRun は ChunkArtifact を使用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个嵌入运行可以使用一个或多个内容工件。
      en: One embedding run may use one or more content artifacts.
      ja: 一つの embedding run は一つ以上の content artifact を使用できます。
    inverse_reading:
      predicate: is_used_by_embedding_run
      labels: {zh: 被嵌入运行使用, en: is used by embedding run, ja: 埋め込み run に使用される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-embedding-run-provenance]
    distinct_fact_rationale: "This is actual input use, not part_of containment of an artifact in the encoding activity."
    layout_role: cross-link
  - id: EmbeddingRun-generates-EmbeddingVector
    predicate: generates
    target: concept:EmbeddingVector
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成嵌入向量, en: generates embedding vector, ja: 埋め込み vector を生成する}
    definitions:
      zh: 仅当 output_vector_refs 列出目标且运行完成时，EmbeddingRun 生成该 EmbeddingVector。
      en: EmbeddingRun generates EmbeddingVector only when output_vector_refs lists it and the run completed.
      ja: output_vector_refs が対象を列挙し run が完了した場合にだけ、EmbeddingRun は EmbeddingVector を生成します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 批处理运行可生成一个或多个向量，失败时可能没有输出。
      en: Batch run may generate one or more vectors and may have no output on failure.
      ja: batch run は一つ以上の vector を生成でき、failure 時には output がないことがあります。
    inverse_reading:
      predicate: is_generated_by_embedding_run
      labels: {zh: 由嵌入运行生成, en: is generated by embedding run, ja: 埋め込み run により生成される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-embedding-run-provenance]
    distinct_fact_rationale: "This is causal vector generation and does not make a vector a subtype or component of the activity."
    layout_role: cross-link
sources:
  - id: openai-embeddings
    title: OpenAI embeddings guide
    source_type: official-documentation
    url: https://developers.openai.com/api/docs/guides/embeddings
    relevance: Documents transforming supplied input content into numerical embedding vectors.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes activities from entities they use and generate.
source_claims:
  - id: claim-embedding-run-openai
    source: openai-embeddings
    supports: OpenAI documents embeddings as numerical vector representations generated from supplied input content.
    locator: "Embeddings guide: creating embeddings from input content"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-embedding-run-index-boundary
    source: openai-embeddings
    supports: The OpenAI embeddings guide describes transformation of supplied content into numerical vector representations.
    locator: "Embeddings guide: embedding vectors and input content"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-embedding-run-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from entities it uses and generates.
    locator: "PROV-O: Activity, Entity, prov:used, and prov:wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-embedding-run-design
    source: w3c-prov-o
    supports: Moonweave models EmbeddingRun as the auditable activity that binds model invocation, fixed input artifact, output representations, and terminal status, separately from later indexing and retrieval.
    locator: "Moonweave ontology design inference from claim-embedding-run-openai, claim-embedding-run-index-boundary, and claim-embedding-run-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
