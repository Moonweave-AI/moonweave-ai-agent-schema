schema: moonweave.ai/ontology-node/v1
id: IndexRefreshEvent
kind: concept
status: accepted
labels:
  zh: 索引刷新事件
  en: Index refresh event
  ja: インデックス更新イベント
semantics:
  short_definition:
    zh: 记录一次 Elasticsearch 索引可见性刷新调用生命周期观察结果的可追溯事件实体。
    en: A traceable event entity recording one observed lifecycle result of an Elasticsearch index-visibility refresh call.
    ja: 一回の Elasticsearch index-visibility refresh call の lifecycle observation を記録する追跡可能な event entity。
  definition:
    zh: >-
      IndexRefreshEvent 是由一次 IndexRefreshRun 产生的带时间戳事件记录，指明目标逻辑索引、Elasticsearch 目标表达式、事件类型和完整性摘要。
      它记录刷新开始、完成或失败的观察结果，而不是刷新活动本身、索引定义、索引条目、向量载荷、查询结果或检索候选项。
    en: >-
      An IndexRefreshEvent is a timestamped event record generated by one IndexRefreshRun. It identifies the target
      logical index, Elasticsearch target expression, lifecycle event type, and an integrity digest. It records an observed refresh start,
      completion, or failure, not the refresh activity itself, index definition, index entry, vector payload, query
      result, or retrieval candidate.
    ja: >-
      IndexRefreshEvent は一つの IndexRefreshRun により生成される時刻付きイベント記録であり、対象 logical index、Elasticsearch target expression、
      lifecycle event type、完全性 digest を識別する。更新の開始、完了、失敗という観測結果を記録し、更新 activity 自体、
      index 定義、index entry、vector payload、query result、retrieval candidate ではない。
  why_needed:
    zh: 将刷新观察结果与执行活动分离，才能审计何时发生搜索可见性变化并在失败后准确关联到负责的运行，而不虚构版本变更。
    en: Separating an observation from its execution makes search-visibility changes auditable and ties failures to the responsible run without inventing a version change.
    ja: 観測結果を実行から分離することで search-visibility change を監査し、version change を捏造せず失敗を担当 run に正確に結び付けられる。
  includes:
    - zh: 刷新开始、完成或失败的时间戳事件，及其刷新运行、逻辑索引、目标表达式和可选分片摘要。
      en: Timestamped refresh-start, refresh-complete, or refresh-failed events with run, logical-index, target-expression, and optional shard-summary references.
      ja: run、logical index、target expression、任意 shard summary を持つ、時刻付き refresh-start、refresh-complete、refresh-failed event。
  excludes:
    - zh: 刷新执行过程、索引条目写入载荷、向量数值、查询命中、相似度分数和最终答案。
      en: Refresh execution process, index-entry write payload, vector values, query hit, similarity score, and final answer.
      ja: 更新実行プロセス、index-entry の書込み payload、vector 値、query hit、類似度 score、最終回答。
  semantic_kind: event
  aliases: [refresh lifecycle event, index update event, 索引更新事件]
engineering:
  explanation:
    zh: 刷新运行在状态转换处发出不可变事件记录；消费者按运行引用、事件类型和时间排序读取事件，而不把事件反写为索引内容。
    en: A refresh run emits an immutable record at a state transition; consumers order it by run reference, event type, and time without writing the event back into index content.
    ja: refresh run は状態遷移時に不変の記録を発行し、consumer は run 参照、event type、時刻でそれを読み取る。イベントを index content に書き戻さない。
  typical_input:
    - description: Lifecycle observation emitted by a completed index refresh run.
      format: |
        {"refresh_run_ref":"index-refresh-support-42","target_index_ref":"support-index","index_expression":"support-index","event_type":"completed","occurred_at":"2026-07-19T08:00:00Z"}
  typical_output:
    - description: Immutable event record for monitoring and audit.
      format: |
        {"index_refresh_event_id":"index-refresh-event-support-42","refresh_run_ref":"index-refresh-support-42","event_type":"completed","event_digest":"sha256-refresh-event-support-42"}
  reference_implementations:
    - name: Elasticsearch refresh API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-indices-refresh
      description: Documents an index refresh operation that makes recent changes visible to search.
    - name: OpenTelemetry logs data model
      url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
      description: Documents timestamped event records with structured attributes for observability.
structure:
  identity_keys: [index_refresh_event_id]
  fields:
    - id: index_refresh_event_id
      labels:
        zh: 刷新事件标识
        en: refresh event ID
        ja: 更新イベント ID
      definitions:
        zh: 稳定标识一次刷新观察事件，而不是刷新运行或索引自身。
        en: Stably identifies one observed refresh event rather than the refresh run or index itself.
        ja: refresh run または index 自体ではなく、一つの観測された更新イベントを安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^index-refresh-event-[A-Za-z0-9._-]+$'
      example_value: index-refresh-event-support-42
      source_claims: [claim-index-refresh-event-provenance]
    - id: refresh_run_ref
      labels:
        zh: 刷新运行引用
        en: refresh run reference
        ja: 更新 run 参照
      definitions:
        zh: 指向产生该事件的 IndexRefreshRun，不替代该活动的独立身份。
        en: Points to the IndexRefreshRun that generated this event and does not replace that activity's identity.
        ja: このイベントを生成した IndexRefreshRun を指し、その activity の identity を置き換えない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: index-refresh-support-42
      source_claims: [claim-index-refresh-event-provenance]
    - id: target_index_ref
      labels:
        zh: 目标索引引用
        en: target index reference
        ja: 対象 index 参照
      definitions:
        zh: 指向被刷新运行作用的逻辑 Index，而不是一个条目、分片、Elasticsearch 路径字符串或查询结果。
        en: Points to the logical Index acted on by the refresh run, not one entry, shard, Elasticsearch path string, or query result.
        ja: refresh run が作用した logical Index を指し、一つの entry、shard、Elasticsearch path string、query result ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-index
      source_claims: [claim-index-refresh-event-lifecycle]
    - id: index_expression
      labels:
        zh: 索引目标表达式
        en: index target expression
        ja: index target expression
      definitions:
        zh: 记录传给 Elasticsearch refresh 路径的索引名称、别名、数据流或通配表达式，不表示或创建 IndexVersion。
        en: Records the index name, alias, data stream, or wildcard expression sent to the Elasticsearch refresh path; it does not represent or create an IndexVersion.
        ja: Elasticsearch refresh path に渡す index name、alias、data stream、wildcard expression を記録し、IndexVersion を表現又は作成しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-index
      source_claims: [claim-index-refresh-event-lifecycle]
    - id: event_type
      labels:
        zh: 事件类型
        en: event type
        ja: イベント種別
      definitions:
        zh: 表示观察到的刷新生命周期阶段，而不表示索引整体健康度或查询成功率。
        en: States the observed refresh lifecycle phase rather than overall index health or query success.
        ja: index 全体の health や query 成功ではなく、観測された更新 lifecycle phase を示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [started, completed, failed]
      pattern: null
      example_value: completed
      source_claims: [claim-index-refresh-event-lifecycle]
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      definitions:
        zh: 记录该生命周期观察产生的 UTC 时间，不是索引内容的业务时间。
        en: Records the UTC time at which the lifecycle observation occurred, not business time inside indexed content.
        ja: lifecycle 観測が発生した UTC 時刻を記録し、index content 内の業務時刻ではない。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '2026-07-19T08:00:00Z'
      source_claims: [claim-index-refresh-event-observability]
    - id: shard_summary
      labels:
        zh: 分片结果摘要
        en: shard result summary
        ja: shard result summary
      definitions:
        zh: 可选保存完成刷新时返回的 _shards 摘要；开始或调用失败事件可以没有它。
        en: Optionally stores the _shards summary returned by a completed refresh; a started or failed-call event may have none.
        ja: 完了した refresh が返す _shards summary を任意で保存し、started 又は failed-call event は持たなくてよい。
      datatype: json
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"total":2,"successful":2,"skipped":0,"failed":0}'
      source_claims: [claim-index-refresh-event-lifecycle]
    - id: event_digest
      labels:
        zh: 事件摘要
        en: event digest
        ja: イベント digest
      definitions:
        zh: 校验事件身份、运行引用和生命周期事实完整性的摘要，不是向量或检索分数。
        en: A digest checking event identity, run reference, and lifecycle facts, not a vector or retrieval score.
        ja: event identity、run 参照、lifecycle fact の完全性を検証する digest であり、vector や retrieval score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-refresh-event-support-42
      source_claims: [claim-index-refresh-event-provenance]
  constraints:
    - id: index-refresh-event-observation
      severity: error
      expression_language: plain
      expression: index_refresh_event_id, refresh_run_ref, target_index_ref, index_expression, event_type, occurred_at, and event_digest are required. event_type must be started, completed, or failed; refresh_run_ref must resolve to the run that observed the lifecycle transition; and shard_summary, when present, must mirror that run's Elasticsearch _shards response.
      explanation:
        zh: 事件必须同时保留可解析的运行来源、逻辑目标、API 目标表达式和时间化生命周期事实，防止无来源日志被误当作索引刷新事件。
        en: An event must retain resolvable run provenance, logical target, API target expression, and timestamped lifecycle fact so an unscoped log cannot be treated as an index-refresh event.
        ja: event は解決可能な run provenance、logical target、API target expression、時刻付き lifecycle fact を保持し、無範囲 log を index-refresh event として扱わない。
      source_claims: [claim-index-refresh-event-lifecycle, claim-index-refresh-event-provenance, claim-index-refresh-event-observability, claim-index-refresh-event-design]
    - id: index-refresh-event-not-run-or-payload
      severity: error
      expression_language: plain
      expression: IndexRefreshEvent must not contain refresh execution inputs, index-entry payload, vector values, query score, retrieval candidate, context selection, or answer text.
      explanation:
        zh: 事件记录观察事实；运行输入、持久化条目和检索输出应继续作为独立对象建模。
        en: An event records an observed fact; run inputs, persisted entries, and retrieval outputs remain separate objects.
        ja: event は観測 fact を記録し、run input、永続 entry、retrieval output は別の object として保持する。
      source_claims: [claim-index-refresh-event-provenance]
  required_relations: []
examples:
  - id: index-refresh-event-positive-completed

    labels:
      zh: 支持索引刷新完成事件
      en: Completed support-index refresh event
      ja: support index 更新完了イベント

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {index_refresh_event_id: index-refresh-event-support-42, refresh_run_ref: index-refresh-support-42, target_index_ref: support-index, index_expression: support-index, event_type: completed, occurred_at: '2026-07-19T08:00:00Z', shard_summary: '{"total":2,"successful":2,"skipped":0,"failed":0}', event_digest: sha256-refresh-event-support-42}
    related_node_ids: [IndexRefreshEvent, IndexRefreshRun, IndexActivity]
    related_relation_ids: [IndexRefreshEvent-was-generated-by-IndexRefreshRun]

    source_claims: [claim-index-refresh-event-lifecycle, claim-index-refresh-event-provenance]
  - id: index-refresh-event-counterexample-run

    labels:
      zh: 刷新运行被误作事件
      en: Refresh run presented as event
      ja: refresh run を event として提示

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {activity_id: index-refresh-support-42, activity_kind: visibility_refresh, target_index_ref: support-index, index_expression: support-index, shard_summary: '{"total":2,"successful":2,"skipped":0,"failed":0}', run_status: succeeded}
    related_node_ids: [IndexRefreshEvent, IndexRefreshRun, IndexActivity]
    related_relation_ids: [IndexRefreshEvent-was-generated-by-IndexRefreshRun]

    source_claims: [claim-index-refresh-event-provenance]
  - id: index-refresh-event-boundary-started

    labels:
      zh: 刷新开始但尚未完成
      en: Refresh started but not yet completed
      ja: 更新開始済みだが未完了

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {index_refresh_event_id: index-refresh-event-support-43, refresh_run_ref: index-refresh-support-43, target_index_ref: support-index, index_expression: support-index, event_type: started, occurred_at: '2026-07-19T08:05:00Z', event_digest: sha256-refresh-event-support-43}
    related_node_ids: [IndexRefreshEvent, IndexRefreshRun]
    related_relation_ids: [IndexRefreshEvent-was-generated-by-IndexRefreshRun]

    source_claims: [claim-index-refresh-event-lifecycle]
  - id: index-refresh-event-instance-elasticsearch

    labels:
      zh: Elasticsearch 刷新可见性事件实例
      en: Elasticsearch refresh-visibility event instance
      ja: Elasticsearch 更新可視化イベントの事例

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {index_refresh_event_id: index-refresh-event-elastic-17, refresh_run_ref: index-refresh-elastic-17, target_index_ref: elastic-support-index, index_expression: elastic-support-index, event_type: completed, occurred_at: '2026-07-19T09:00:00Z', shard_summary: '{"total":2,"successful":2,"skipped":0,"failed":0}', event_digest: sha256-refresh-event-elastic-17}
    related_node_ids: [IndexRefreshEvent, IndexRefreshRun, IndexActivity]
    related_relation_ids: [IndexRefreshEvent-was-generated-by-IndexRefreshRun]
    source_claims: [claim-index-refresh-event-lifecycle, claim-index-refresh-event-provenance]
parent_relation: null
relations:
  - id: IndexRefreshEvent-was-generated-by-IndexRefreshRun
    predicate: was_generated_by
    target: concept:IndexRefreshRun
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由索引刷新运行生成
      en: was generated by index refresh run
      ja: index refresh run により生成された
    definitions:
      zh: IndexRefreshEvent 记录一个 IndexRefreshRun 产生的开始、完成或失败观察结果。
      en: IndexRefreshEvent records a start, completion, or failure observation generated by one IndexRefreshRun.
      ja: IndexRefreshEvent は一つの IndexRefreshRun が生成した開始、完了、失敗の観測結果を記録する。
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates
      labels:
        zh: 生成刷新事件
        en: generates refresh event
        ja: 更新イベントを生成する
    conditions:
      - id: index-refresh-event-generation-condition
        severity: error
        expression_language: plain
        expression: Assert was_generated_by only when refresh_run_ref resolves to the IndexRefreshRun that observed the event lifecycle transition and occurred_at timestamps that observation.
        explanation:
          zh: 因果关系要求事件可解析到产生它的刷新运行和对应的时间化生命周期观察。
          en: The causal relation requires the event to resolve to its generating refresh run and its timestamped lifecycle observation.
          ja: 因果関係には、event が生成した refresh run と時刻付き lifecycle observation に解決されることが必要である。
        source_claims: [claim-index-refresh-event-provenance]
    temporal_scope: valid-time
    boundary_context: The event is an observed entity caused by a refresh run; it is neither the activity itself nor evidence of a membership or version change.
    constraints: []
    examples: []
    source_claims: [claim-index-refresh-event-provenance]
    distinct_fact_rationale: This causal provenance fact is distinct from subtype hierarchy, index membership, and a query read.
    layout_role: cross-link
sources:
  - id: elasticsearch-refresh-api
    title: Elasticsearch refresh API
    source_type: official-documentation
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-indices-refresh
    relevance: Documents an index refresh operation that makes recent changes visible to search.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines provenance relations that distinguish activities from entities they generate.
  - id: opentelemetry-logs
    title: OpenTelemetry logs data model
    source_type: standard
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    relevance: Defines structured timestamped log records for observability.
source_claims:
  - id: claim-index-refresh-event-lifecycle
    source: elasticsearch-refresh-api
    supports: Elasticsearch documents a refresh operation that makes recent index operations visible to search and returns a shard response when it completes.
    locator: "Refresh an index: target expression and synchronous shard response"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-refresh-event-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes Activity from Entity and defines generation relations between them.
    locator: "PROV-O: Activity, Entity, and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-index-refresh-event-observability
    source: opentelemetry-logs
    supports: The OpenTelemetry logs data model records timestamped structured events with attributes.
    locator: "Logs data model: timestamp and attributes"
    evidence_kind: standard
    confidence: high
  - id: claim-index-refresh-event-design
    source: opentelemetry-logs
    supports: Moonweave models IndexRefreshEvent as a timestamped observation of an IndexRefreshRun lifecycle, with target identity and optional shard summary, separate from the refresh activity, target index, or indexed payload.
    locator: "Moonweave ontology design inference from claim-index-refresh-event-lifecycle, claim-index-refresh-event-provenance, and claim-index-refresh-event-observability"
    evidence_kind: ontology-design-inference
    confidence: high
