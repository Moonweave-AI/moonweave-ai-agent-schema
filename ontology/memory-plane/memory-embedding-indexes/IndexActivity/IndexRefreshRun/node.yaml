schema: moonweave.ai/ontology-node/v1
id: IndexRefreshRun
kind: concept
status: accepted
labels:
  zh: 索引可见性刷新运行
  en: Index visibility-refresh run
  ja: インデックス可視性 refresh 実行
semantics:
  short_definition:
    zh: 调用 Elasticsearch refresh 使一个索引近期已写入操作对搜索可见的可审计活动。
    en: An auditable activity that calls Elasticsearch refresh to make an index's recent writes visible to search.
    ja: Elasticsearch refresh を呼び、index の最近の write を search に可視化する audit 可能な activity。
  definition:
    zh: >-
      IndexRefreshRun 是 IndexActivity 的子类型，记录一次 Elasticsearch refresh API 调用及其目标索引表达式和分片结果。
      该调用同步等待刷新完成并使近期索引操作可被搜索；它不写入成员、不处理表示、不重建索引，也不创建或替换 IndexVersion。
      它不是 Index、IndexEntry、IndexVersion、EmbeddingRun、IndexBuildRun、刷新事件、检索结果或候选项。
    en: >-
      An IndexRefreshRun is a subtype of IndexActivity that records one Elasticsearch refresh API call together with its
      target-index expression and shard result. The call waits synchronously for refresh completion and makes recent index
      operations searchable; it does not write membership, process representations, rebuild an index, or create or replace
      an IndexVersion. It is not an Index, IndexEntry, IndexVersion, EmbeddingRun, IndexBuildRun, refresh event, retrieval
      result, or candidate.
    ja: >-
      IndexRefreshRun は target-index expression と shard result を含む一回の Elasticsearch refresh API call を記録する
      IndexActivity の下位型である。この call は refresh completion を同期的に待ち、最近の index operation を search 可能にする。
      membership を write せず、representation を処理せず、index を rebuild せず、IndexVersion を作成又は置換しない。Index、IndexEntry、
      IndexVersion、EmbeddingRun、IndexBuildRun、refresh event、retrieval result、candidate ではない。
  why_needed:
    zh: >-
      写入完成并不总是等于立即可搜索。把可见性刷新单独记录，能解释“数据已写入但尚不可搜索”的短暂窗口，
      也避免把一次 API 可见性操作误当作重建、向量写入或版本发布。
    en: >-
      A completed write is not always immediately searchable. Recording visibility refresh separately explains the short
      window in which data is written but not yet searchable, and prevents an API visibility operation from being mistaken
      for a rebuild, vector write, or version publication.
    ja: >-
      完了した write が常に直ちに検索可能とは限らない。visibility refresh を別に記録すると、data が write 済みだが未検索可能な短い
      window を説明でき、API の可視性 operation を rebuild、vector write、version publication と誤認しない。
  includes:
    - zh: 逻辑索引引用、Elasticsearch 目标表达式、可选缺失索引策略、运行状态和原生 _shards 响应摘要。
      en: Logical-index reference, Elasticsearch target expression, optional missing-index policy, run status, and native _shards response summary.
      ja: logical-index reference、Elasticsearch target expression、任意 missing-index policy、run status、native _shards response summary。
  excludes:
    - zh: 待写入的表示、成员变更集、构建模式、先前或目标版本、索引条目载荷、相似度分数和检索候选。
      en: Representations awaiting write, membership change set, build mode, prior or target version, index-entry payload, similarity score, and retrieval candidate.
      ja: write 待ち representation、membership change set、build mode、prior 又は target version、index-entry payload、similarity score、retrieval candidate。
  semantic_kind: activity
  aliases: [Elasticsearch refresh, search visibility refresh, 索引可见性刷新]
engineering:
  explanation:
    zh: >-
      Elasticsearch 的 POST /{index}/_refresh 会等待刷新完成，然后返回 _shards.total、successful、skipped 与 failed。
      Moonweave 保存这次调用和其原生响应摘要；若要写入、更新或删除文档成员，应另建 IndexBuildRun 或其他成员写入活动。
    en: >-
      Elasticsearch POST /{index}/_refresh waits for the refresh to finish and returns _shards.total, successful, skipped,
      and failed. Moonweave persists that call and its native response summary; writing, updating, or deleting document
      membership belongs in a separate IndexBuildRun or other membership-writing activity.
    ja: >-
      Elasticsearch POST /{index}/_refresh は refresh の完了を待ち、_shards.total、successful、skipped、failed を返す。
      Moonweave はその call と native response summary を保存する。document membership の write、update、delete は別の
      IndexBuildRun 又は他の membership-writing activity に属する。
  typical_input:
    - description: Elasticsearch refresh request for one existing index.
      format: |
        POST /support-index/_refresh?allow_no_indices=false&ignore_unavailable=false
  typical_output:
    - description: Native successful Elasticsearch refresh response.
      format: |
        {"_shards":{"total":2,"successful":2,"skipped":0,"failed":0}}
  reference_implementations:
    - name: Elasticsearch refresh index API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-indices-refresh
      description: Documents POST and GET refresh requests, target expressions, and synchronous shard-summary responses.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: activity ID, ja: activity ID}
      definitions:
        zh: 稳定标识该可见性刷新活动；沿用 IndexActivity 的实体身份，而不再创建 refresh-run 专用 ID。
        en: Stably identifies this visibility-refresh activity using the IndexActivity identity rather than creating a refresh-run-specific ID.
        ja: refresh-run 専用 ID を作らず、IndexActivity identity でこの visibility-refresh activity を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^index-refresh-[A-Za-z0-9._-]+$'
      example_value: index-refresh-support-42
      source_claims: [claim-index-refresh-run]
    - id: activity_kind
      labels: {zh: 活动类别, en: activity kind, ja: activity kind}
      definitions:
        zh: 固定为 visibility_refresh，表示只改变 Elasticsearch 搜索可见性而不改变索引成员。
        en: Fixed to visibility_refresh, meaning that it changes Elasticsearch search visibility without changing index membership.
        ja: visibility_refresh に固定され、index membership を変更せず Elasticsearch search visibility を変えることを表す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [visibility_refresh]
      pattern: null
      example_value: visibility_refresh
      source_claims: [claim-index-refresh-run]
    - id: target_index_ref
      labels: {zh: 目标索引引用, en: target index reference, ja: target index reference}
      definitions:
        zh: 指向逻辑上的目标 Index；它不等同于 Elasticsearch 的路径表达式或集群服务身份。
        en: References the logical target Index; it is distinct from an Elasticsearch path expression or cluster-service identity.
        ja: logical target Index を参照し、Elasticsearch path expression や cluster-service identity とは区別される。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: elastic-support-index
      source_claims: [claim-index-refresh-run]
    - id: index_expression
      labels: {zh: 索引目标表达式, en: index target expression, ja: index target expression}
      definitions:
        zh: 记录传给 Elasticsearch refresh 路径的索引名称、别名、数据流或通配表达式，不取代逻辑索引引用。
        en: Records the index name, alias, data stream, or wildcard expression sent in the Elasticsearch refresh path without replacing the logical-index reference.
        ja: logical-index reference を置換せず、Elasticsearch refresh path に送る index name、alias、data stream、wildcard expression を記録する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-index
      source_claims: [claim-index-refresh-run]
    - id: allow_no_indices
      labels: {zh: 允许无匹配索引, en: allow no indices, ja: allow no indices}
      definitions:
        zh: 记录请求是否允许目标表达式不匹配任何索引；它是 API 行为选项而非刷新成功结果。
        en: Records whether the request allows the target expression to match no indices; it is an API behavior option, not the refresh result.
        ja: target expression が index に一致しないことを request が許可するかを記録し、refresh result ではなく API behavior option である。
      datatype: boolean
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: false
      source_claims: [claim-index-refresh-run]
    - id: ignore_unavailable
      labels: {zh: 忽略不可用索引, en: ignore unavailable indices, ja: ignore unavailable indices}
      definitions:
        zh: 记录请求是否忽略不可用的目标索引；它不表示某个分片已刷新。
        en: Records whether the request ignores unavailable target indices; it does not state that any shard refreshed.
        ja: request が unavailable target index を無視するかを記録し、shard が refresh 済みであることを表さない。
      datatype: boolean
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: false
      source_claims: [claim-index-refresh-run]
    - id: shard_summary
      labels: {zh: 分片结果摘要, en: shard result summary, ja: shard result summary}
      definitions:
        zh: 保存原生响应中的 _shards 摘要，例如 total、successful、skipped 与 failed，而不是索引成员清单。
        en: Stores the native response _shards summary, such as total, successful, skipped, and failed, rather than an index-membership manifest.
        ja: index-membership manifest ではなく、total、successful、skipped、failed など native response の _shards summary を保存する。
      datatype: json
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"total":2,"successful":2,"skipped":0,"failed":0}'
      source_claims: [claim-index-refresh-run]
    - id: run_status
      labels: {zh: 运行状态, en: run status, ja: run status}
      definitions:
        zh: 记录 Moonweave 对这次调用的终态；它不表示索引整体健康或版本发布状态。
        en: Records Moonweave's terminal status for this call; it does not state overall index health or version-publication state.
        ja: この call に対する Moonweave の terminal status を記録し、overall index health や version-publication state を表さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed]
      pattern: null
      example_value: succeeded
      source_claims: [claim-index-refresh-provenance]
    - id: refresh_event_ref
      labels: {zh: 刷新事件引用, en: refresh event reference, ja: refresh event reference}
      definitions:
        zh: 可选指向记录该调用完成或失败的 IndexRefreshEvent；事件不替代运行身份。
        en: Optionally points to an IndexRefreshEvent recording completion or failure of this call; the event does not replace the run identity.
        ja: この call の completion 又は failure を記録する IndexRefreshEvent を任意で指し、event は run identity を置換しない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: index-refresh-event-support-42
      source_claims: [claim-index-refresh-provenance]
  constraints:
    - id: index-refresh-run-visibility-contract
      severity: error
      expression_language: plain
      expression: activity_id, activity_kind, target_index_ref, index_expression, and run_status are required. activity_kind must be visibility_refresh. This activity must not carry representation inputs, membership change scope, build mode, prior-version reference, or target-version reference. When run_status is succeeded and a response is retained, shard_summary must mirror the Elasticsearch _shards response.
      explanation:
        zh: 刷新调用只改变搜索可见性；这些约束防止它被错误建模为一次成员写入、重建或版本转换。
        en: A refresh call changes search visibility only; these constraints prevent it from being modeled incorrectly as a membership write, rebuild, or version transition.
        ja: refresh call は search visibility だけを変える。この constraint は membership write、rebuild、version transition としての誤った modeling を防ぐ。
      source_claims: [claim-index-refresh-run, claim-index-refresh-provenance, claim-index-refresh-design]
    - id: index-refresh-run-not-index-or-event
      severity: error
      expression_language: plain
      expression: IndexRefreshRun must not contain index definition, entry payload, representation values, event occurrence details, retrieval score, candidate result, or answer text.
      explanation:
        zh: 运行是发生的活动；索引、条目、表示、事件和检索结果保持为独立实体或活动。
        en: A run is an occurring activity; index, entry, representation, event, and retrieval result remain distinct entities or activities.
        ja: run は発生する activity であり、index、entry、representation、event、retrieval result は別 entity 又は activity に保つ。
      source_claims: [claim-index-refresh-provenance]
  required_relations: []
examples:
  - id: index-refresh-run-positive

    labels: {zh: 支持索引可见性刷新, en: Support-index visibility refresh, ja: support-index visibility refresh}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {activity_id: index-refresh-support-42, activity_kind: visibility_refresh, target_index_ref: support-index, index_expression: support-index, allow_no_indices: false, ignore_unavailable: false, shard_summary: '{"total":2,"successful":2,"skipped":0,"failed":0}', run_status: succeeded, refresh_event_ref: index-refresh-event-support-42}
    related_node_ids: [IndexRefreshRun, IndexActivity, IndexRefreshEvent]
    related_relation_ids: [IndexRefreshRun-is_a-IndexActivity, IndexRefreshRun-generates-IndexRefreshEvent]

    source_claims: [claim-index-refresh-run]
  - id: index-refresh-run-counterexample-build

    labels: {zh: 重建被误称为可见性刷新, en: Rebuild presented as visibility refresh, ja: rebuild を visibility refresh として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {activity_id: rebuild-support-v8, activity_kind: build, target_index_ref: support-index, target_index_version_ref: support-index-v8, representation_refs: '["embedding-support-1","embedding-support-2"]', build_mode: rebuild}
    related_node_ids: [IndexRefreshRun, IndexBuildRun, IndexVersion]
    related_relation_ids: []

    source_claims: [claim-index-refresh-run]
  - id: index-refresh-run-boundary-missing-index

    labels: {zh: 允许无匹配索引的刷新, en: Refresh allowing no matching index, ja: 一致 index を許可しない refresh}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {activity_id: index-refresh-support-wildcard-43, activity_kind: visibility_refresh, target_index_ref: support-index-family, index_expression: 'support-*', allow_no_indices: true, ignore_unavailable: false, run_status: succeeded}
    related_node_ids: [IndexRefreshRun, IndexActivity]
    related_relation_ids: [IndexRefreshRun-is_a-IndexActivity]

    source_claims: [claim-index-refresh-run]
  - id: index-refresh-run-instance-elasticsearch

    labels: {zh: Elasticsearch 可见性刷新实例, en: Elasticsearch visibility-refresh instance, ja: Elasticsearch visibility-refresh の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {activity_id: index-refresh-elastic-17, activity_kind: visibility_refresh, target_index_ref: elastic-support-index, index_expression: elastic-support-index, allow_no_indices: false, ignore_unavailable: false, shard_summary: '{"total":2,"successful":2,"skipped":0,"failed":0}', run_status: succeeded, refresh_event_ref: index-refresh-event-elastic-17}
    related_node_ids: [IndexRefreshRun, IndexActivity, IndexRefreshEvent]
    related_relation_ids: [IndexRefreshRun-is_a-IndexActivity, IndexRefreshRun-generates-IndexRefreshEvent]
    source_claims: [claim-index-refresh-run, claim-index-refresh-provenance]
parent_relation:
  id: IndexRefreshRun-is_a-IndexActivity
  predicate: is_a
  target: concept:IndexActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是索引活动的可见性刷新子类, en: is a visibility-refresh subtype of index activity, ja: IndexActivity の visibility-refresh 下位型である}
  definitions:
    zh: IndexRefreshRun 是专门调用 Elasticsearch refresh 使既有写入可搜索的 IndexActivity。
    en: An IndexRefreshRun is an IndexActivity specifically calling Elasticsearch refresh to make existing writes searchable.
    ja: IndexRefreshRun は、既存 write を検索可能にする Elasticsearch refresh を特に呼ぶ IndexActivity である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_index_refresh_run_subtype, labels: {zh: 具有索引可见性刷新运行子类, en: has index visibility-refresh run subtype, ja: index visibility-refresh run 下位型を持つ}}
  conditions:
    - id: index-refresh-run-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when an activity invokes Elasticsearch refresh for a declared target expression and records visibility outcome without membership write or version publication.
      explanation:
        zh: 子类型差异是针对既有写入的 Elasticsearch 搜索可见性操作。
        en: The subtype differentia is an Elasticsearch search-visibility operation over existing writes.
        ja: subtype の differentia は既存 write に対する Elasticsearch search-visibility operation である。
      source_claims: [claim-index-refresh-run]
  temporal_scope: valid-time
  boundary_context: A generated refresh event is causally related to this run, but is neither a child activity nor proof of membership change.
  constraints: []
  examples: []
  source_claims: [claim-index-refresh-run]
  distinct_fact_rationale: This relation classifies an API visibility operation, not membership construction, version publication, or the event entity it may generate.
  layout_role: primary-backbone
relations:
  - id: IndexRefreshRun-generates-IndexRefreshEvent
    predicate: generates
    target: concept:IndexRefreshEvent
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成刷新事件, en: generates refresh event, ja: refresh event を生成する}
    definitions:
      zh: 一次已记录的刷新运行可生成独立事件以记录该 API 调用的完成或失败。
      en: A recorded refresh run may generate a separate event recording completion or failure of that API call.
      ja: 記録された refresh run は、その API call の completion 又は failure を記録する別 event を生成できる。
    cardinality: {source: {min: 0, max: 1}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: was_generated_by, labels: {zh: 由刷新运行生成, en: was generated by refresh run, ja: refresh run により生成された}}
    conditions:
      - id: index-refresh-run-generates-event-condition
        severity: error
        expression_language: plain
        expression: Assert only when refresh_event_ref resolves to an event whose refresh_run_ref equals this activity_id and whose event_type is started, or is completed when run_status is succeeded, or is failed when run_status is failed.
        explanation:
          zh: 事件必须可追溯到本次运行并与运行终态一致，不能以查询结果替代。
          en: The event must trace to this run and agree with its terminal status; a query result cannot substitute for it.
          ja: event はこの run に trace でき、その terminal status と一致しなければならない。query result は代替できない。
        source_claims: [claim-index-refresh-provenance]
    temporal_scope: valid-time
    boundary_context: The event records occurrence; it neither makes data searchable nor writes membership by itself.
    constraints: []
    examples: []
    source_claims: [claim-index-refresh-provenance]
    distinct_fact_rationale: This is an activity-to-event provenance fact, separate from API target selection and shard outcome.
    layout_role: cross-link
sources:
  - id: elasticsearch-refresh-api
    title: Elasticsearch refresh index API
    source_type: official-documentation
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-indices-refresh
    relevance: Documents POST and GET refresh requests, target expressions, request options, synchronous completion, and shard responses.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes refresh-run activities from generated events and target index entities.
source_claims:
  - id: claim-index-refresh-run
    source: elasticsearch-refresh-api
    supports: Elasticsearch refresh accepts an index target expression, waits synchronously for completion, returns a shard summary, and makes recent index operations visible to search.
    locator: "Refresh an index: target expression and synchronous shard response"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-refresh-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes Activity from Entity and defines generation relations between them.
    locator: "PROV-O: Entity, Activity, and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-index-refresh-design
    source: elasticsearch-refresh-api
    supports: Moonweave models one refresh invocation as IndexRefreshRun, with its target expression, options, response summary, terminal status, and optional lifecycle event, rather than as a membership build, version change, target index, or event payload.
    locator: "Moonweave ontology design inference from claim-index-refresh-run and claim-index-refresh-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
