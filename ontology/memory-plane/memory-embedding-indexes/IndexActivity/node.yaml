source_claims:
  - id: claim-index-activity-001
    source: eng-ont-prov-o
    supports: PROV-O provides the Activity/Entity and used/generated distinction applied here to indexing operations.
    locator: PROV-O Recommendation > Entity, Activity, used, wasGeneratedBy, and wasDerivedFrom
