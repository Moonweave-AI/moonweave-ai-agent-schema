schema: moonweave.ai/ontology-node/v1
id: IndexActivity
kind: concept
status: review
labels:
  zh: 索引活动
  en: Index activity
  ja: 索引activity
semantics:
  short_definition:
    zh: 消费内容或表示并改变索引相关状态的可审计活动。
    en: An auditable activity consuming content or representations and changing index-related state.
    ja: 内容または表現を消費しindex関連状態を変える監査可能activityです。
  definition:
    zh: IndexActivity 是有开始/结束边界、输入与输出的活动上位类，覆盖嵌入生成和索引构建；它不是索引实体、版本信息或触发事件。
    en: IndexActivity is the activity genus with start/end boundaries, inputs, and outputs covering embedding generation and index construction; it is not an index entity, version information, or trigger event.
    ja: IndexActivity は開始/終了境界・入力・出力を持ちembedding生成とindex buildを包含するactivity上位類で、index entity・版information・trigger eventではありません。
  why_needed:
    zh: 把运行活动与其产生的信息或实体彻底分开。
    en: Separates operational runs from the information or entities they produce.
    ja: operation runを生成information/entityから明確に分離します。
  includes:
    - zh: 纳入 EmbeddingRun、IndexBuildRun 与其专门刷新子类。
      en: Includes EmbeddingRun, IndexBuildRun, and its specialized refresh subtype.
      ja: EmbeddingRun・IndexBuildRun・専用refresh subtypeを含みます。
  excludes:
    - zh: 排除 Index、IndexVersion 与 IndexRefreshEvent。
      en: Excludes Index, IndexVersion, and IndexRefreshEvent.
      ja: Index・IndexVersion・IndexRefreshEventを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - activity_id
  fields:
    - id: activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识活动实例。
        en: Stable identifier for the activity instance.
        ja: activity instanceの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: index-activity-17
      source_claims:
        - claim-index-activity-002
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动开始边界。
        en: Records the activity start boundary.
        ja: activity開始境界を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      source_claims:
        - claim-index-activity-003
    - id: status
      labels:
        zh: 状态
        en: status
        ja: 状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录运行中、完成或失败。
        en: Records running, completed, or failed state.
        ja: running・completed・failed状態を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-index-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引活动正例
      en: "Positive case: Index activity"
      ja: 索引activity正例
    scenario_id: null
    descriptions:
      zh: index-activity-17 有开始时间、输入、输出和完成状态。
      en: index-activity-17 has a start time, inputs, outputs, and completed status.
      ja: index-activity-17 は開始時刻・入力・出力・完了状態を持ちます。
    field_values:
      activity_id: index-activity-17
      started_at: 2026-07-16T08:00:00Z
      status: completed
    related_node_ids:
      - IndexActivity
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 IndexActivity。
      en: Classify the object as IndexActivity.
      ja: この対象を IndexActivity に分類します。
    why_valid_or_invalid:
      zh: 可观测时间边界与因果输入输出证明它是活动。
      en: Observable temporal boundary and causal inputs/outputs establish an activity.
      ja: 観測可能時間境界と因果入力/出力がactivityを示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-activity-005
  - id: IndexActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引活动边界例
      en: "Boundary case: Index activity"
      ja: 索引activity境界例
    scenario_id: null
    descriptions:
      zh: index-17@42 是活动结束后保留的不可变结果。
      en: index-17@42 is an immutable result retained after the activity ends.
      ja: index-17@42 はactivity終了後に保持するimmutable結果です。
    field_values: {}
    related_node_ids:
      - IndexActivity
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 IndexActivity。
      en: Do not classify the object as IndexActivity.
      ja: この対象を IndexActivity に分類しません。
    why_valid_or_invalid:
      zh: 持久结果没有活动的执行时间身份。
      en: A persistent result does not have the execution identity of the activity.
      ja: 永続結果にはactivityの実行同一性がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-activity-006
