schema: moonweave.ai/ontology-node/v1
id: IndexActivity
kind: concept
status: accepted
labels: {zh: 索引活动, en: Index Activity, ja: インデックス活動}
semantics:
  short_definition:
    zh: 对一个逻辑索引执行成员写入、删除或搜索可见性刷新的可审计活动。
    en: An auditable activity that writes or deletes index membership, or refreshes search visibility for one logical index.
    ja: 一つの logical index に対して membership を write 又は delete し、又は search visibility を refresh する audit 可能な activity。
  definition:
    zh: >-
      IndexActivity 是对一个明确逻辑索引执行成员写入、删除或搜索可见性刷新的有边界活动。IndexBuildRun 使用既有表示来建立或
      修改成员；IndexRefreshRun 使最近的 Elasticsearch 写操作对搜索可见，而不重建成员或创建版本。它记录目标索引、可选目标版本、
      输入表示和执行结果。它不是 Index、IndexEntry、VectorDatabase 设施、Chunk 内容、检索请求、候选、重排或 Context Assembly；
      后者是活动的输入、输出、承载设施或读取路径中的独立事实。
    en: >-
      An IndexActivity is one bounded activity that writes or deletes membership, or refreshes search visibility, for a
      declared logical index. IndexBuildRun uses existing representations to establish or change membership; IndexRefreshRun
      makes recent Elasticsearch writes searchable without rebuilding membership or creating a version. It records target
      index, optional target version, input representations, and execution results. It is not an Index, IndexEntry, VectorDatabase facility, Chunk
      content, retrieval request, candidate, reranking result, or Context Assembly; those are separate inputs, outputs,
      hosting facilities, or read-path facts.
    ja: >-
      IndexActivity は明示 logical index に対して membership を write 又は delete し、又は search visibility を refresh する一つの
      bounded activity です。IndexBuildRun は既存 representation を使って membership を確立又は変更し、IndexRefreshRun は membership を
      rebuild せず version を作らずに最近の Elasticsearch write を search 可能にします。target index、任意 target version、input representation、result を
      記録します。Index、IndexEntry、VectorDatabase facility、Chunk content、retrieval request、candidate、reranking result、
      Context Assembly ではありません。それらは別の input、output、hosting facility、read-path fact です。
  why_needed:
    zh: 显式活动使系统能够区分“向量已经生成”“条目已经写入”和“用户刚刚查询过”，并能重放或审计一次索引变更。
    en: An explicit activity distinguishes a generated vector, a written entry, and a recent query while making one indexing change replayable and auditable.
    ja: 明示 activity は生成済み vector、write 済み entry、直近 query を区別し、一つの indexing change を replay・audit 可能にする。
  includes:
    - zh: 将兼容表示写入或删除于指定索引，或调用 Elasticsearch refresh 以使已写入操作对搜索可见的执行。
      en: An execution that writes or deletes compatible representations in a named index, or calls Elasticsearch refresh to make already-written operations visible to search.
      ja: compatible representation を名前付き index に write 又は delete し、又はすでに write された operation を search に可視化する Elasticsearch refresh を呼ぶ execution。
  excludes:
    - zh: 一个浮点数组、一个索引条目、一条检索候选、向量数据库连接，以及已被模型看到的最终提示词。
      en: One float array, one index entry, one retrieval candidate, a vector-database connection, or final prompt content already seen by a model.
      ja: 一つの float array、一つの index entry、一つの retrieval candidate、vector-database connection、既に model が見た最終 prompt content。
  semantic_kind: activity
  aliases: [indexing execution, index maintenance activity]
engineering:
  explanation:
    zh: >-
      执行器先校验表示模型、维度、索引模式和目标版本是否兼容，再调用明确的 upsert、build 或 refresh 接口并记录结果。
      Pinecone 的索引数据文档将记录写入和索引字段视为明确的数据操作；查询文档则将相似结果描述为针对已有记录的返回值。
      因此 Moonweave 不允许检索或重排路径伪装为 IndexActivity 写入。
    en: >-
      An executor first validates representation model, dimension, index mode, and target-version compatibility, then
      calls an explicit upsert, build, or refresh interface and records the result. Pinecone's indexing documentation
      treats record ingestion and indexed fields as explicit data operations, whereas its search documentation describes
      similar results returned from existing records. Moonweave therefore does not allow retrieval or reranking paths to
      masquerade as IndexActivity writes.
    ja: >-
      executor は最初に representation model、dimension、index mode、target-version compatibility を検証し、明示 upsert、build、
      refresh interface を呼んで result を記録します。Pinecone の indexing documentation は record ingestion と indexed field を
      明示 data operation として扱い、search documentation は既存 record から返る similar result を表します。従って
      Moonweave は retrieval 又は reranking path が IndexActivity write を装うことを許しません。
  typical_input:
    - description: Build an entry from an existing embedding
      format: |
        {"activity_id":"index-build-44","activity_kind":"build","target_index_ref":"project-index-p-88","target_index_version_ref":"project-index-p-88-v4","representation_refs":["embedding-chunk-42-v1"]}
  typical_output:
    - description: Indexed result with explicit write evidence
      format: |
        {"activity_id":"index-build-44","result":"success","created_entry_refs":["entry-p-88-42"],"write_performed":true}
  reference_implementations:
    - name: Pinecone indexing overview
      url: https://docs.pinecone.io/guides/index-data/indexing-overview
      description: Documents indexes and explicit indexed fields for ingested records.
    - name: Pinecone semantic search
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: Documents querying existing indexed records with a query vector.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: activity ID, ja: アクティビティ ID}
      definitions:
        zh: 稳定标识一次索引执行而不是其输入向量或输出条目。
        en: Stably identifies one indexing execution rather than its input vector or output entry.
        ja: input vector 又は output entry ではなく一つの indexing execution を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: index-build-44
      source_claims: [claim-index-activity-write]
    - id: activity_kind
      labels: {zh: 活动类别, en: activity kind, ja: アクティビティ種別}
      definitions:
        zh: 声明本次活动是成员构建、增量写入、删除还是搜索可见性刷新，而不是嵌入生成或检索读取。
        en: Declares whether the activity builds membership, incrementally writes, deletes, or refreshes search visibility rather than generating an embedding or performing a retrieval read.
        ja: activity が membership build、incremental write、delete、search visibility refresh のどれかを宣言し、embedding generation 又は retrieval read ではないことを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [build, upsert, delete, visibility_refresh]
      pattern: null
      example_value: build
      source_claims: [claim-index-activity-write, claim-index-activity-visibility]
    - id: target_index_ref
      labels: {zh: 目标索引引用, en: target index reference, ja: 対象 index 参照}
      definitions:
        zh: 指向成员写入、删除或可见性刷新所针对的逻辑 Index，不是承载它的数据库服务。
        en: References the logical Index whose membership is written or deleted, or whose search visibility is refreshed; it is not the database service hosting it.
        ja: membership の write 又は delete、又は search visibility refresh の対象となる logical Index を参照し、それを host する database service ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88
      source_claims: [claim-index-activity-write]
    - id: target_index_version_ref
      labels: {zh: 目标索引版本引用, en: target index-version reference, ja: 対象 index-version 参照}
      definitions:
        zh: 引用接受写入或维护的明确索引版本；它不是向量数据库设施身份。
        en: References the explicit index version that receives the write or maintenance; it is not a vector-database facility identity.
        ja: write 又は maintenance を受ける明示 index version を参照し、vector-database facility identity ではない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88-v4
      source_claims: [claim-index-activity-write]
    - id: representation_refs
      labels: {zh: 表示引用, en: representation references, ja: representation 参照}
      definitions:
        zh: 列出本次成员写入所使用的兼容表示；对于仅使既有写入可见的 visibility_refresh 可为空，且查询候选不能替代它。
        en: Lists compatible representations used by this membership write; it may be absent for a visibility_refresh that only exposes existing writes, and retrieval candidates cannot substitute for it.
        ja: この membership write が使う compatible representation を列挙する。既存 write だけを可視化する visibility_refresh では欠けてもよく、retrieval candidate で置き換えられない。
      datatype: json
      required: false
      cardinality: {min: 0, max: null}
      allowed_values: []
      pattern: null
      example_value: '["embedding-chunk-42-v1"]'
      source_claims: [claim-index-activity-write]
  constraints:
    - id: index-activity-explicit-write
      severity: error
      expression_language: plain
      expression: activity_id, activity_kind, and target_index_ref are required. A membership-writing subtype must identify compatible representation_refs and, when applicable, target_index_version_ref. A visibility_refresh may omit both because it only exposes existing Elasticsearch writes. A retrieval candidate, score, reranking result, checkpoint, or Context Assembly cannot be treated as a representation input or write evidence.
      explanation:
        zh: 可重建成员写入需要明确输入和目标版本；仅可见性刷新不写成员。读路径输出不应成为隐式持久化输入。
        en: Rebuildable membership writes need explicit inputs and a target version, while visibility refresh writes no membership; read-path outputs must not become implicit persistence inputs.
        ja: rebuild 可能な membership write には明示 input と target version が必要で、visibility refresh は membership を write しない。read-path output を暗黙 persistence input にしてはならない。
      source_claims: [claim-index-activity-write, claim-index-activity-visibility, claim-index-activity-read-boundary, claim-index-activity-design]
  required_relations: []
examples:
  - id: index-activity-positive

    labels: {zh: 构建向量条目, en: Build vector entry, ja: vector entry を build}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {activity_id: index-build-44, activity_kind: build, target_index_ref: project-index-p-88, target_index_version_ref: project-index-p-88-v4, representation_refs: '["embedding-chunk-42-v1"]'}
    related_node_ids: [IndexActivity, IndexBuildRun, EmbeddingVector, IndexEntry]
    related_relation_ids: []

    source_claims: [claim-index-activity-write]
  - id: index-activity-boundary

    labels: {zh: 刷新现有索引版本, en: Refresh existing index version, ja: 既存 index version を refresh}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {activity_id: index-refresh-9, activity_kind: visibility_refresh, target_index_ref: project-index-p-88}
    related_node_ids: [IndexActivity, IndexRefreshRun, IndexVersion]
    related_relation_ids: []

    source_claims: [claim-index-activity-write]
  - id: index-activity-counterexample

    labels: {zh: 查询候选不是索引活动, en: Query candidate is not index activity, ja: query candidate は index activity ではない}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {candidate_id: candidate-41, index_entry_ref: entry-p-88-42, score: 0.91, write_performed: false}
    related_node_ids: [IndexActivity, RetrievedCandidate, RetrievalRequest]
    related_relation_ids: []

    source_claims: [claim-index-activity-read-boundary]
  - id: index-activity-instance

    labels: {zh: 实例：项目索引增量写入, en: "Instance: project incremental index write", ja: "事例: project incremental index write"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {activity_id: upsert-p-88-45, activity_kind: upsert, target_index_ref: project-index-p-88, target_index_version_ref: project-index-p-88-v4, representation_refs: '["embedding-chunk-43-v1","embedding-chunk-44-v1"]'}
    related_node_ids: [IndexActivity, IndexBuildRun, IndexEntry, IndexVersion]
    related_relation_ids: []

    source_claims: [claim-index-activity-write]
parent_relation: null
relations: []
sources:
  - id: pinecone-indexing
    title: Pinecone indexing overview
    url: https://docs.pinecone.io/guides/index-data/indexing-overview
    source_type: official-doc
    relevance: Documents indexed dense, sparse, text, and metadata fields and data indexing operations.
  - id: pinecone-search
    title: Pinecone semantic search
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: Documents a query over existing dense-vector index records and returned similar results.
  - id: elasticsearch-refresh-api
    title: Elasticsearch refresh index API
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-indices-refresh
    source_type: official-documentation
    relevance: Documents a synchronous refresh that makes recent index operations visible to search.
source_claims:
  - id: claim-index-activity-write
    source: pinecone-indexing
    supports: Pinecone documents indexes with declared ranking fields and explicit indexing of ingested data.
    locator: "Indexing overview: indexes and indexed ranking fields"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-activity-read-boundary
    source: pinecone-search
    supports: Pinecone documents queries over an existing index that return similar records.
    locator: "Semantic search: search with a dense vector"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-activity-visibility
    source: elasticsearch-refresh-api
    supports: Elasticsearch documents refresh as an operation that makes recent index operations available to search.
    locator: "Refresh an index: target expression and synchronous shard response"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-activity-design
    source: pinecone-indexing
    supports: Moonweave models a build, upsert, delete, or visibility refresh as an IndexActivity with explicit target and representation references, while preserving the distinction between membership writes, read results, and visibility operations.
    locator: "Moonweave ontology design inference from claim-index-activity-write, claim-index-activity-read-boundary, and claim-index-activity-visibility"
    evidence_kind: ontology-design-inference
    confidence: high
