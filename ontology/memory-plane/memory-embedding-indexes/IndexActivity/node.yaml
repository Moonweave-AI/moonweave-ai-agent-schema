schema: moonweave.ai/ontology-node/v1
id: IndexActivity
kind: concept
labels:
  zh: 索引活动
  en: Index activity
  ja: 索引 activity
semantics:
  short_definition:
    zh: 嵌入与索引构建的可观察活动根类。
    en: Root activity class for observable embedding and index construction work.
    ja: embedding/index build の observable work の activity root class。
  definition:
    zh: IndexActivity 是活动根类；EmbeddingRun 消费 Chunk 并产出 EmbeddingVector，IndexBuildRun 消费 Representation 并产出 IndexVersion，IndexRefreshRun 在其上增量刷新。Index、IndexVersion、EmbeddingVector 与 IndexRefreshEvent 是产物或触发信号，不是活动子类。
    en: IndexActivity is the activity root. EmbeddingRun consumes Chunks and produces EmbeddingVectors; IndexBuildRun consumes Representations and produces IndexVersions; IndexRefreshRun incrementally refreshes on top. Index, IndexVersion, EmbeddingVector, and IndexRefreshEvent are artifacts or trigger signals—not activity subtypes.
    ja: IndexActivity は activity root。EmbeddingRun は Chunk→EmbeddingVector、IndexBuildRun は Representation→IndexVersion、IndexRefreshRun は incremental refresh。Index/IndexVersion/EmbeddingVector/IndexRefreshEvent は artifact/trigger で activity subtype ではない。
  why_needed:
    zh: 活动层与表示/索引产物分离后，可追踪 OpenAI POST /v1/embeddings 或 Pinecone upsert 各阶段而不把 vector id 误判为活动。
    en: Separating activity from representation/index artifacts traces OpenAI POST /v1/embeddings or Pinecone upsert stages without misclassifying vector ids as activities.
    ja: activity/artifact 分離で OpenAI POST /v1/embeddings や Pinecone upsert 各 stage を追跡。vector id を activity と誤認しない。
  includes:
    - zh: 纳入具有 activity_id、started_at、输入 digest 与输出引用的 EmbeddingRun、IndexBuildRun 与 IndexRefreshRun。
      en: Includes EmbeddingRun, IndexBuildRun, and IndexRefreshRun with activity_id, started_at, input digest, and output references.
      ja: activity_id/started_at/input digest/output ref を持つ EmbeddingRun/IndexBuildRun/IndexRefreshRun。
  excludes:
    - zh: 排除 Index、IndexVersion、EmbeddingVector、IndexEntry 与 IndexRefreshEvent。
      en: Excludes Index, IndexVersion, EmbeddingVector, IndexEntry, and IndexRefreshEvent.
      ja: Index/IndexVersion/EmbeddingVector/IndexEntry/IndexRefreshEvent を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: OpenAI POST /v1/embeddings 与 Voyage POST /v1/embeddings 映射 EmbeddingRun；Pinecone create_index/upsert 与 Chroma collection.add 映射 IndexBuildRun；活动记录 started_at、input digest、model snapshot 或 configuration_digest，产物另行建模。
    en: OpenAI POST /v1/embeddings and Voyage POST /v1/embeddings map to EmbeddingRun; Pinecone create_index/upsert and Chroma collection.add map to IndexBuildRun. Activities record started_at, input digest, model snapshot, or configuration_digest; artifacts are modeled separately.
    ja: OpenAI/Voyage embeddings→EmbeddingRun、Pinecone create_index/upsert・Chroma add→IndexBuildRun。activity は started_at/input digest/model snapshot/configuration_digest を記録し artifact は別建模。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: POST /v1/embeddings with model, input, dimensions.
    - name: Voyage AI Embeddings
      url: https://docs.voyageai.com/reference/embeddings-api
      description: POST /v1/embeddings with voyage models.
    - name: Pinecone Index Operations
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      description: create_index, upsert, and import boundaries.
    - name: Chroma Collections
      url: https://docs.trychroma.com/docs/collections/manage-collections
      description: Collection add and query with embedding functions.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: Activity identifier, ja: activity 識別子}
      definitions:
        zh: 稳定标识一次索引域活动或阶段运行。
        en: Stable identifier for one index-domain activity or phase run.
        ja: 一 index-domain activity/phase run を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-activity-17
      allowed_values: []
      source_claims: [claim-index-activity-id]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions:
        zh: 活动开始读取固定输入或配置的 UTC 时间。
        en: UTC instant when the activity began reading pinned input or configuration.
        ja: 固定 input/configuration 読取開始 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      allowed_values: []
      source_claims: [claim-index-activity-started]
    - id: outcome
      labels: {zh: 活动结果, en: Activity outcome, ja: activity 結果}
      definitions:
        zh: 记录 running、success、failure 或 cancelled，并与是否产生新产物一致。
        en: Records running, success, failure, or cancelled consistently with whether new artifacts were produced.
        ja: running/success/failure/cancelled を新 artifact 生成有無と整合記録。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: []
      source_claims: [claim-index-activity-outcome]
  constraints: []
  required_relations: []
examples:
  - id: IndexActivity-example-embedding-run
    labels:
      zh: OpenAI 嵌入活动
      en: OpenAI embedding activity
      ja: OpenAI embedding activity
    descriptions:
      zh: embedding-run-17 作为 IndexActivity 消费 chunk-17@3，调用 POST /v1/embeddings（text-embedding-3-small, dimensions=1536）并登记 emb-17；emb-17 是产物不是活动。
      en: embedding-run-17 acts as IndexActivity consuming chunk-17@3, calling POST /v1/embeddings (text-embedding-3-small, dimensions=1536) and registering emb-17; emb-17 is an artifact, not the activity.
      ja: embedding-run-17 が IndexActivity として chunk-17@3 を consume し POST /v1/embeddings 実行・emb-17 登録。emb-17 は artifact。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: POST /v1/embeddings
    field_values:
      activity_id: embedding-run-17
      started_at: 2026-07-16T11:00:00Z
      outcome: success
    related_node_ids:
      - IndexActivity
      - EmbeddingRun
    related_relation_ids: []
    source_claims:
      - claim-index-activity-openai
      - claim-index-activity-design
  - id: IndexActivity-example-build-run
    labels:
      zh: Pinecone 索引构建活动
      en: Pinecone index build activity
      ja: Pinecone index build activity
    descriptions:
      zh: build-run-42 消费 manifest42 的 EmbeddingVector，调用 Pinecone upsert 写入 hybrid-docs（metric=cosine, dims=1536）并发布 index-17@42；index-17@42 是 IndexVersion 产物。
      en: build-run-42 consumes EmbeddingVectors in manifest42, Pinecone upserts into hybrid-docs (metric=cosine, dims=1536), and publishes index-17@42; index-17@42 is an IndexVersion artifact.
      ja: build-run-42 が manifest42 の EmbeddingVector を consume し Pinecone upsert→index-17@42 公開。index-17@42 は IndexVersion artifact。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      version: upsert after create_index
    field_values:
      activity_id: build-run-42
      started_at: 2026-07-16T11:10:00Z
      outcome: success
    related_node_ids:
      - IndexActivity
      - IndexBuildRun
    related_relation_ids: []
    source_claims:
      - claim-index-activity-pinecone
      - claim-index-activity-design
  - id: IndexActivity-example-not-vector
    labels:
      zh: 活动非向量产物
      en: Activity is not vector artifact
      ja: activity は vector artifact ではない
    descriptions:
      zh: emb-17 是 float[] 数值信息与 generating run 引用；embedding-run-17 才是可观察活动。二者 ID 与生命周期不同。
      en: emb-17 is float[] numerical information with a generating-run reference; embedding-run-17 is the observable activity. IDs and lifecycles differ.
      ja: emb-17 は float[] 数値情報。embedding-run-17 が observable activity。ID/lifecycle 異なる。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexActivity
      - EmbeddingVector
    related_relation_ids: []
    source_claims:
      - claim-index-activity-design
parent_relation: null
relations: []
sources:
  - id: src-openai-embeddings
    title: OpenAI Embeddings API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/embeddings
    source_type: official-doc
    relevance: POST /v1/embeddings request and response boundaries.
  - id: src-pinecone-index
    title: Pinecone Create Index Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/create-an-index
    source_type: official-doc
    relevance: Index creation and upsert as build activities.
  - id: src-chroma-collections
    title: Chroma Manage Collections
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/manage-collections
    source_type: official-doc
    relevance: Collection add as index build boundary.
  - id: src-index-activity-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Activity versus representation and index artifact boundary.
source_claims:
  - id: claim-index-activity-openai
    source: src-openai-embeddings
    supports: OpenAI POST /v1/embeddings is an auditable invocation with model, input, and returned embedding vectors.
    locator: Create embeddings
    evidence_kind: primary-api
    confidence: high
  - id: claim-index-activity-pinecone
    source: src-pinecone-index
    supports: Pinecone create_index and upsert define bounded index-writing operations distinct from stored vectors.
    locator: Create an index; upsert vectors
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-activity-design
    source: src-index-activity-design
    supports: IndexActivity separates embedding and build runs from Index, IndexVersion, and EmbeddingVector artifacts.
    locator: memory-embedding-indexes boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-activity-id
    source: src-index-activity-design
    supports: activity_id identifies index-domain activity runs.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-activity-started
    source: src-index-activity-design
    supports: started_at records activity temporal boundary.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-activity-outcome
    source: src-index-activity-design
    supports: outcome records whether the activity produced new artifacts.
    locator: structure
    evidence_kind: design-inference
    confidence: high
