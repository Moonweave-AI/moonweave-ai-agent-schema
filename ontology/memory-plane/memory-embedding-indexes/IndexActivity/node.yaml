    source: eng-ont-prov-o
    supports: IndexActivity.activity_id records the auditable activity identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: PROV-O Recommendation > Entity, Activity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-index-activity-003
    source: eng-ont-prov-o
    supports: IndexActivity.started_at records the activity's temporal boundary; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: PROV-O Recommendation > Entity, Activity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-index-activity-004
    source: eng-ont-prov-o
    supports: IndexActivity.status records observable activity lifecycle; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: PROV-O Recommendation > Entity, Activity, used, wasGeneratedBy, and wasDerivedFrom
