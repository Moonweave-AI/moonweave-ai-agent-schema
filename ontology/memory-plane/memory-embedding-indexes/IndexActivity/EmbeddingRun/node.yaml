        labels:
          zh: 产生嵌入向量边界例
          en: "Boundary case: produces embedding vector"
          ja: embedding vectorを生成する境界例
        scenario_id: null
        descriptions:
          zh: 运行只是读取旧 emb-16 进行比较时不能声称产生它。
          en: A run that only reads old emb-16 for comparison must not claim to produce it.
