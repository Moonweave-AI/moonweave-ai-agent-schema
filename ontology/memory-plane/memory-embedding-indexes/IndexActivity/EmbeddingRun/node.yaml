schema: moonweave.ai/ontology-node/v1
id: EmbeddingRun
kind: concept
status: accepted
labels:
  zh: 嵌入运行
  en: Embedding run
  ja: 埋込run
semantics:
  short_definition:
    zh: 用指定模型快照把确定输入转换为 EmbeddingVector 的活动。
    en: An activity converting fixed input into EmbeddingVector with a specified model snapshot.
    ja: 指定model snapshotで確定入力を EmbeddingVector に変換するactivityです。
  definition:
    zh: EmbeddingRun 是消费一个或多个 Chunk、调用确定 EmbeddingModel 快照并产生 EmbeddingVector 的 IndexActivity；它不是嵌入向量或模型本身。
    en: EmbeddingRun is an IndexActivity that consumes one or more Chunk values, invokes a fixed EmbeddingModel snapshot, and produces EmbeddingVector values; it is not the embedding vector or model itself.
    ja: EmbeddingRun は一つ以上の Chunk を消費し固定 EmbeddingModel snapshotを呼び EmbeddingVector を生成する IndexActivity で、embedding vectorやmodel自体ではありません。
  why_needed:
    zh: 保留输入—模型—输出的可重现生成链。
    en: Preserves the reproducible input-model-output generation chain.
    ja: 入力—model—出力の再現可能生成chainを保持します。
  includes:
    - zh: 纳入有 run ID、输入摘要和模型快照的批次或单条嵌入调用。
      en: Includes batch or single embedding invocations with run ID, input digest, and model snapshot.
      ja: run ID・入力digest・model snapshotを持つbatch/単一embedding invocationを含みます。
  excludes:
    - zh: 排除 EmbeddingVector、EmbeddingModel 配置和索引构建。
      en: Excludes EmbeddingVector, EmbeddingModel configuration, and index construction.
      ja: EmbeddingVector・EmbeddingModel設定・index buildを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - run_id
  fields:
    - id: run_id
      labels:
        zh: 运行标识
        en: run ID
        ja: run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识嵌入调用。
        en: Stable identifier for the embedding invocation.
        ja: embedding invocationの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: embedding-run-17
      source_claims:
        - claim-embedding-run-002
    - id: input_digest
      labels:
        zh: 输入摘要
        en: input digest
        ja: 入力digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次运行消费的输入批次。
        en: Fixes the input batch consumed by this run.
        ja: runが消費した入力batchを固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:batch17
      source_claims:
        - claim-embedding-run-003
    - id: model_snapshot
      labels:
        zh: 模型快照
        en: model snapshot
        ja: model snapshot
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次调用的模型版本。
        en: Fixes the model version invoked.
        ja: 呼び出したmodel版を固定します。
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small@2026-07
      source_claims:
        - claim-embedding-run-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: EmbeddingRun-example-positive-manual-001
    kind: positive
    labels:
      zh: 嵌入运行正例
      en: "Positive case: Embedding run"
      ja: 埋込run正例
    scenario_id: null
    descriptions:
      zh: embedding-run-17 消费 chunk-17 并由固定模型产生 emb-17。
      en: embedding-run-17 consumes chunk-17 and produces emb-17 with a fixed model.
      ja: embedding-run-17 は chunk-17を消費し固定modelで emb-17を生成します。
    field_values:
      run_id: embedding-run-17
      input_digest: sha256:batch17
      model_snapshot: text-embedding-3-small@2026-07
      activity_id: embedding-run-17
      started_at: 2026-07-16T11:00:00Z
      status: completed
    related_node_ids:
      - EmbeddingRun
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 EmbeddingRun。
      en: Classify the object as EmbeddingRun.
      ja: この対象を EmbeddingRun に分類します。
    why_valid_or_invalid:
      zh: 活动身份、输入、模型和输出完整。
      en: Activity identity, input, model, and output are complete.
      ja: activity同一性・入力・model・出力が揃っています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-embedding-run-005
  - id: EmbeddingRun-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 嵌入运行边界例
      en: "Boundary case: Embedding run"
      ja: 埋込run境界例
    scenario_id: null
    descriptions:
      zh: emb-17 是运行已经产生并保留的向量。
      en: emb-17 is the vector already produced and retained by the run.
      ja: emb-17 はrunが生成し保持したvectorです。
    field_values: {}
    related_node_ids:
      - EmbeddingRun
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 EmbeddingRun。
      en: Do not classify the object as EmbeddingRun.
      ja: この対象を EmbeddingRun に分類しません。
    why_valid_or_invalid:
      zh: 输出信息不具有调用的时间与执行身份。
      en: Output information lacks the invocation's temporal and execution identity.
      ja: 出力informationにはinvocationの時間・実行同一性がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-embedding-run-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: EmbeddingRun-is_a-IndexActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: EmbeddingRun 是 IndexActivity 的严格子类；种差为：消费确定输入、调用确定 EmbeddingModel 快照并产生 EmbeddingVector。
    en: "EmbeddingRun is a strict subtype of IndexActivity; its reviewed differentia is: it consumes fixed input, invokes a fixed EmbeddingModel snapshot, and produces EmbeddingVector."
    ja: EmbeddingRun は IndexActivity の厳密なsubtypeで、審査済み種差は「固定入力を消費し固定 EmbeddingModel snapshotを呼び EmbeddingVectorを生成します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: EmbeddingRun-is_a-IndexActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IndexActivity and also satisfies the differentia: it consumes fixed input, invokes a fixed EmbeddingModel snapshot, and produces EmbeddingVector."
      explanations:
        zh: 仅当对象首先满足 IndexActivity 定义且满足种差“消费确定输入、调用确定 EmbeddingModel 快照并产生 EmbeddingVector。”时成立。
        en: "Assert only when the object first satisfies IndexActivity and also satisfies the differentia: it consumes fixed input, invokes a fixed EmbeddingModel snapshot, and produces EmbeddingVector."
        ja: 対象がまず IndexActivity を満たし、さらに種差「固定入力を消費し固定 EmbeddingModel snapshotを呼び EmbeddingVectorを生成します。」を満たす時だけ成立します。
      source_claims:
        - claim-embedding-run-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EmbeddingRun-is_a-IndexActivity-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: embedding-run-17 在确定时段内消费 chunk-17@3，调用固定模型快照并登记新生成的 emb-17。
        en: embedding-run-17 consumes chunk-17@3 during a bounded interval, invokes a fixed model snapshot, and registers newly generated emb-17.
        ja: embedding-run-17 は確定時間区間で chunk-17@3 を消費し、固定model snapshotを呼び、新規生成 emb-17 を登録します。
      field_values: {}
      related_node_ids:
        - EmbeddingRun
        - IndexActivity
      related_relation_ids:
        - EmbeddingRun-is_a-IndexActivity
      expected_result:
        zh: 将 embedding-run-17 归入 IndexActivity 下的 EmbeddingRun 分支。
        en: Classify embedding-run-17 in the EmbeddingRun branch beneath IndexActivity.
        ja: embedding-run-17 を IndexActivity 配下の EmbeddingRun 分岐に分類します。
      why_valid_or_invalid:
        zh: 开始/结束、输入和输出满足活动身份，嵌入调用链构成该活动子类种差。
        en: Start/end, input, and output establish activity identity; the embedding invocation chain establishes the subtype differentia.
        ja: 開始・終了・input・outputがactivity同一性を、embedding invocation連鎖がsubtype種差を成立させます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-embedding-run-007
    - id: EmbeddingRun-is_a-IndexActivity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 已经产生的 emb-17 没有运行的时间和执行身份。
        en: The already-produced emb-17 lacks the run's temporal and execution identity.
        ja: 生成済み emb-17 にはrunの時間・実行同一性がありません。
      field_values: {}
      related_node_ids:
        - EmbeddingRun
        - IndexActivity
      related_relation_ids:
        - EmbeddingRun-is_a-IndexActivity
      expected_result:
        zh: 将 emb-17 保持为 EmbeddingVector 输出，不把信息产物归入活动层级。
        en: Keep emb-17 as an EmbeddingVector output and do not place the information artifact in the activity hierarchy.
        ja: emb-17 を EmbeddingVector output として保持し、information artifact を activity 階層へ入れません。
      why_valid_or_invalid:
        zh: emb-17 是运行完成后留存的数值信息，没有开始时间、结束时间、执行状态或调用行为。
        en: emb-17 is numerical information retained after completion and has no start time, end time, execution status, or invocation behavior.
        ja: emb-17 は完了後に残る数値 information であり、開始時刻・終了時刻・実行 status・invocation behavior を持ちません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-embedding-run-007
  source_claims:
    - claim-embedding-run-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: EmbeddingRun-consumes-Chunk
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 消费分块
      en: consumes chunk
      ja: chunkを消費する
    definitions:
      zh: EmbeddingRun —consumes→ Chunk 表示该运行读取此确切 Chunk 版本作为模型输入，方向从活动指向被用信息。
      en: EmbeddingRun —consumes→ Chunk means that the run reads this exact Chunk version as model input; direction runs from activity to used information.
      ja: EmbeddingRun —consumes→ Chunk はrunがこのexact Chunk版をmodel入力として読み方向がactivityからused informationへ向くことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_consumes
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: EmbeddingRun-consumes-Chunk-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when run.input_digest covers the target Chunk's content digest and version.
        explanations:
          zh: 仅当 run.input_digest 覆盖目标 Chunk 的内容摘要与版本时成立。
          en: Assert only when run.input_digest covers the target Chunk's content digest and version.
          ja: run.input_digestがtarget Chunkのcontent digestと版を包含する時だけ成立します。
        source_claims:
          - claim-embedding-run-008
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: EmbeddingRun-consumes-Chunk-example-positive-manual-001
        kind: positive
        labels:
          zh: 消费分块正例
          en: "Positive case: consumes chunk"
          ja: chunkを消費する正例
        scenario_id: null
        descriptions:
          zh: embedding-run-17 的输入清单明确包含 chunk-17@3。
          en: embedding-run-17's input manifest explicitly contains chunk-17@3.
          ja: embedding-run-17 の入力manifestは chunk-17@3を明示包含します。
        field_values: {}
        related_node_ids:
          - EmbeddingRun
          - Chunk
        related_relation_ids:
          - EmbeddingRun-consumes-Chunk
        expected_result:
          zh: 建立 embedding-run-17 consumes chunk-17@3 的具名输入事实。
          en: Assert the named input fact that embedding-run-17 consumes chunk-17@3.
          ja: embedding-run-17 consumes chunk-17@3 という具名 input fact を確立します。
        why_valid_or_invalid:
          zh: 运行清单同时锁定 chunk-17@3 的版本与内容摘要，证明模型实际读取的正是该分块。
          en: The run manifest locks both the version and content digest of chunk-17@3, proving that this exact chunk entered the model input.
          ja: run manifest が chunk-17@3 の版と content digest を同時固定し、この exact chunk が model input に入ったことを示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-embedding-run-008
      - id: EmbeddingRun-consumes-Chunk-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 消费分块边界例
          en: "Boundary case: consumes chunk"
          ja: chunkを消費する境界例
        scenario_id: null
        descriptions:
          zh: 只在同批任务出现但未进入模型输入的 chunk-18 不能建立该边。
          en: chunk-18 that merely appears in the same task but never enters model input does not establish this edge.
          ja: 同taskに現れるだけでmodel入力に入らない chunk-18 にはこのedgeを立てません。
        field_values: {}
        related_node_ids:
          - EmbeddingRun
          - Chunk
        related_relation_ids:
          - EmbeddingRun-consumes-Chunk
        expected_result:
          zh: 不把 chunk-18 连接为 embedding-run-17 的 consumes 输入。
          en: Do not connect chunk-18 as a consumes input of embedding-run-17.
          ja: chunk-18 を embedding-run-17 の consumes input として接続しません。
        why_valid_or_invalid:
          zh: 批次共现只说明调度邻近；缺少 input manifest、版本和摘要匹配，不能推出实际消费。
          en: Batch co-presence shows scheduling proximity only; without input-manifest membership and matching version and digest, actual consumption cannot be inferred.
          ja: 同一 batch への存在は schedule の近接だけを示し、input manifest membership・版・digest 一致がなければ実消費を推論できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-embedding-run-008
    source_claims:
      - claim-embedding-run-008
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Chunk
