          - EmbeddingVector
        related_relation_ids:
          - EmbeddingRun-produces-EmbeddingVector
        expected_result:
          zh: 建立 embedding-run-17 produces emb-17 的生成来源事实。
          en: Assert the generation-provenance fact that embedding-run-17 produces emb-17.
          ja: embedding-run-17 produces emb-17 という generation provenance fact を確立します。
        why_valid_or_invalid:
          zh: 生成链中的活动、模型、输入与输出一致。
          en: Activity, model, input, and output agree across the generation chain.
