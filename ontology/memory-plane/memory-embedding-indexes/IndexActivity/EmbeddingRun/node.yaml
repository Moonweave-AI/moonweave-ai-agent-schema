schema: moonweave.ai/ontology-node/v1
id: EmbeddingRun
kind: concept
labels:
  zh: 嵌入运行
  en: Embedding run
  ja: 埋め込み run
semantics:
  short_definition:
    zh: 调用 embedding API 把固定 chunk 输入变成向量的活动。
    en: Activity invoking an embedding API to turn fixed chunk input into vectors.
    ja: 固定 chunk input を embedding API で vector 化する activity。
  definition:
    zh: EmbeddingRun 是 IndexActivity：消费一个或多个 Chunk（input digest 锁定版本），调用确定 model snapshot（如 text-embedding-3-small 或 voyage-3），产出 EmbeddingVector。OpenAI POST /v1/embeddings（model, input, dimensions）与 Voyage POST /v1/embeddings 是典型映射；向量本身不是运行。
    en: EmbeddingRun is an IndexActivity consuming one or more Chunks (input digest pins version), invoking a fixed model snapshot (e.g., text-embedding-3-small or voyage-3), and producing EmbeddingVectors. OpenAI POST /v1/embeddings (model, input, dimensions) and Voyage POST /v1/embeddings are typical mappings; the vector itself is not the run.
    ja: EmbeddingRun は Chunk（input digest で版固定）を consume し model snapshot（text-embedding-3-small/voyage-3 等）で EmbeddingVector 生成する IndexActivity。OpenAI/Voyage POST /v1/embeddings が典型写像。vector 自体は run ではない。
  why_needed:
    zh: 没有运行血缘就无法证明 emb-17 对应哪次 API 调用、哪个 chunk digest 与哪个 model snapshot。
    en: Without run lineage you cannot prove which API call, chunk digest, and model snapshot produced emb-17.
    ja: run 来歴がなければ emb-17 の API call/chunk digest/model snapshot を証明できない。
  includes:
    - zh: 纳入单条或批量 OpenAI/Voyage embedding 调用，记录 run_id、input_digest 与 model_snapshot。
      en: Includes single or batch OpenAI/Voyage embedding calls recording run_id, input_digest, and model_snapshot.
      ja: run_id/input_digest/model_snapshot を記録する OpenAI/Voyage embedding 呼出し。
  excludes:
    - zh: 排除 EmbeddingVector、EmbeddingModel 可复用身份与 IndexBuildRun。
      en: Excludes EmbeddingVector, reusable EmbeddingModel identity, and IndexBuildRun.
      ja: EmbeddingVector/EmbeddingModel 再利用 identity/IndexBuildRun を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 OpenAI POST /v1/embeddings（model, input, dimensions, encoding_format）与 Voyage POST /v1/embeddings（model, input, input_type）；响应 data[].embedding 登记为 EmbeddingVector/DenseVector，run 保留 embedding_run_id 与 input_digest_sha256。
    en: Map OpenAI POST /v1/embeddings (model, input, dimensions, encoding_format) and Voyage POST /v1/embeddings (model, input, input_type); response data[].embedding registers as EmbeddingVector/DenseVector while the run keeps embedding_run_id and input_digest_sha256.
    ja: OpenAI/Voyage POST /v1/embeddings を写像。data[].embedding→EmbeddingVector/DenseVector、run は embedding_run_id/input_digest_sha256 保持。
  typical_input:
    - description: OpenAI embeddings request
      format: |
        POST https://api.openai.com/v1/embeddings
        {
          "model": "text-embedding-3-small",
          "input": "Prefers TypeScript for code examples.",
          "dimensions": 1536,
          "encoding_format": "float"
        }
      source_claims: [claim-embedding-run-openai]
    - description: Voyage AI embeddings request
      format: |
        POST https://api.voyageai.com/v1/embeddings
        {
          "model": "voyage-3-large",
          "input": ["Prefers TypeScript for code examples."],
          "input_type": "document"
        }
      source_claims: [claim-embedding-run-voyage]
  typical_output:
    - description: Moonweave-local embedding run record
      format: |
        {
          "embedding_run_id": "embedding-run-17",
          "input_digest_sha256": "f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0",
          "model_snapshot": "text-embedding-3-small@2026-07",
          "embedding_id": "emb-17",
          "vector_dimensions": 1536
        }
      source_claims: [claim-embedding-run-design]
  reference_implementations:
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: POST /v1/embeddings with model, input, dimensions.
    - name: Voyage AI Embeddings
      url: https://docs.voyageai.com/reference/embeddings-api
      description: POST /v1/embeddings with voyage models and input_type.
    - name: Chroma Embedding Functions
      url: https://docs.trychroma.com/docs/embeddings/embedding-functions
      description: Collection-level embedding on add/query.
structure:
  identity_keys: [embedding_run_id]
  fields:
    - id: embedding_run_id
      labels: {zh: 嵌入运行标识, en: Embedding run identifier, ja: 埋め込み run 識別子}
      definitions:
        zh: 唯一标识一次 EmbeddingRun。
        en: Uniquely identifies one EmbeddingRun.
        ja: 一回 EmbeddingRun を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: embedding-run-17
      allowed_values: []
      source_claims: [claim-embedding-run-id]
    - id: input_digest_sha256
      labels: {zh: 输入摘要, en: Input digest, ja: 入力ダイジェスト}
      definitions:
        zh: 本次 run 消费的 chunk 正文 SHA-256；必须覆盖 chunk 版本。
        en: SHA-256 of chunk bodies consumed by this run; must cover chunk version.
        ja: 今回 run が消費した chunk 本文 SHA-256。chunk 版を包含必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0
      allowed_values: []
      source_claims: [claim-embedding-run-input]
    - id: model_snapshot
      labels: {zh: 模型快照, en: Model snapshot, ja: モデルスナップショット}
      definitions:
        zh: 本次调用实际使用的 embedding 模型与版本，如 text-embedding-3-small@2026-07 或 voyage-3-large@2026-03。
        en: Embedding model and version actually invoked, e.g., text-embedding-3-small@2026-07 or voyage-3-large@2026-03.
        ja: 今回呼出しの embedding model/version。text-embedding-3-small@2026-07 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: text-embedding-3-small@2026-07
      allowed_values: []
      source_claims: [claim-embedding-run-openai, claim-embedding-run-voyage]
  constraints:
    - id: embedding-run-requires-lineage
      severity: error
      expression_language: plain
      expression: EmbeddingRun must bind input_digest_sha256 and model_snapshot; co-storage or matching dimension alone is insufficient.
      explanation:
        zh: 没有运行血缘就无法审计向量来源。
        en: Without run lineage vector provenance is not auditable.
        ja: run 来歴なしでは vector 来歴が監査不能。
      source_claims: [claim-embedding-run-design]
  required_relations: []
examples:
  - id: EmbeddingRun-example-openai
    labels:
      zh: OpenAI 文本嵌入运行
      en: OpenAI text embedding run
      ja: OpenAI テキスト埋め込み run
    descriptions:
      zh: embedding-run-17 消费 chunk-17@3，POST /v1/embeddings（model=text-embedding-3-small, dimensions=1536）返回 emb-17 float[]；Moonweave 登记 input digest 与 model snapshot。
      en: embedding-run-17 consumes chunk-17@3; POST /v1/embeddings (model=text-embedding-3-small, dimensions=1536) returns emb-17 float[]; Moonweave records input digest and model snapshot.
      ja: embedding-run-17 が chunk-17@3 を consume。POST /v1/embeddings→emb-17 float[]。input digest/model snapshot 登録。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: text-embedding-3-small
    field_values:
      embedding_run_id: embedding-run-17
      model_snapshot: text-embedding-3-small@2026-07
      input_digest_sha256: f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0
    related_node_ids:
      - EmbeddingRun
      - TextEmbedding
      - DenseVector
    related_relation_ids: []
    source_claims:
      - claim-embedding-run-openai
      - claim-embedding-run-design
  - id: EmbeddingRun-example-voyage
    labels:
      zh: Voyage 批量嵌入运行
      en: Voyage batch embedding run
      ja: Voyage バッチ埋め込み run
    descriptions:
      zh: embedding-run-22 批量调用 Voyage POST /v1/embeddings（model=voyage-3-large, input_type=document）为 32 个 chunk 生成向量；model_snapshot=voyage-3-large@2026-03 与 OpenAI 向量区分。
      en: embedding-run-22 batch-calls Voyage POST /v1/embeddings (model=voyage-3-large, input_type=document) for 32 chunks; model_snapshot=voyage-3-large@2026-03 distinguishes from OpenAI vectors.
      ja: embedding-run-22 が Voyage POST /v1/embeddings（voyage-3-large, document）で 32 chunk を embed。voyage-3-large@2026-03 snapshot で OpenAI と区別。
    example_source:
      product: Voyage AI
      url: https://docs.voyageai.com/reference/embeddings-api
      version: voyage-3-large
    field_values:
      embedding_run_id: embedding-run-22
      model_snapshot: voyage-3-large@2026-03
      batch_size: 32
    related_node_ids:
      - EmbeddingRun
      - TextEmbedding
    related_relation_ids: []
    source_claims:
      - claim-embedding-run-voyage
      - claim-embedding-run-design
  - id: EmbeddingRun-example-not-vector
    labels:
      zh: 运行非向量
      en: Run is not vector
      ja: run は vector ではない
    descriptions:
      zh: emb-17 是 DenseVector 产物含 float[1536]；embedding-run-17 是可观察 API 调用活动。读取旧 emb-16 比较不构成 produces emb-16。
      en: emb-17 is a DenseVector artifact with float[1536]; embedding-run-17 is the observable API call activity. Reading old emb-16 for comparison does not produce emb-16.
      ja: emb-17 は DenseVector artifact（float[1536]）。embedding-run-17 が observable API activity。旧 emb-16 読取は produce ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - EmbeddingRun
      - EmbeddingVector
    related_relation_ids: []
    source_claims:
      - claim-embedding-run-design
parent_relation:
  id: EmbeddingRun-is_a-IndexActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种索引活动
    en: is an index activity
    ja: 索引 activity の一種
  definitions:
    zh: EmbeddingRun —is_a→ IndexActivity 因为它消费固定 chunk 输入、调用 embedding 模型并产出 EmbeddingVector。
    en: EmbeddingRun —is_a→ IndexActivity because it consumes fixed chunk input, invokes an embedding model, and produces EmbeddingVectors.
    ja: EmbeddingRun —is_a→ IndexActivity は固定 chunk input 消費・embedding model 呼出し・EmbeddingVector 生成のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层强加统一基数。
    en: The relation is decided per auditable fact; no uniform cardinality is imposed at ontology level.
    ja: audit 可能 fact 単位で判定。ontology 層で一律 cardinality を課さない。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: EmbeddingRun-is_a-IndexActivity-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the run consumes fixed input, invokes a model snapshot, and produces EmbeddingVector.
      explanations:
        zh: 仅当满足嵌入调用链时建立该边。
        en: Assert only when the embedding invocation chain holds.
        ja: embedding invocation chain 成立時のみ assert。
      source_claims: [claim-embedding-run-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-embedding-run-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-embeddings
    title: OpenAI Embeddings API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/embeddings
    source_type: official-doc
    relevance: POST /v1/embeddings with model, input, dimensions.
  - id: src-voyage-embeddings
    title: Voyage AI Embeddings API
    publisher: Voyage AI
    url: https://docs.voyageai.com/reference/embeddings-api
    source_type: official-doc
    relevance: POST /v1/embeddings with voyage models.
  - id: src-embedding-run-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: EmbeddingRun lineage and artifact separation.
source_claims:
  - id: claim-embedding-run-openai
    source: src-openai-embeddings
    supports: OpenAI POST /v1/embeddings accepts model, input, optional dimensions, and returns embedding vectors.
    locator: Create embeddings
    evidence_kind: primary-api
    confidence: high
  - id: claim-embedding-run-voyage
    source: src-voyage-embeddings
    supports: Voyage POST /v1/embeddings supports voyage-3-large with input_type for document batches.
    locator: Embeddings API request body
    evidence_kind: primary-api
    confidence: high
  - id: claim-embedding-run-design
    source: src-embedding-run-design
    supports: EmbeddingRun must bind input digest and model snapshot; vectors are separate artifacts.
    locator: EmbeddingRun boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-embedding-run-id
    source: src-embedding-run-design
    supports: embedding_run_id identifies one embedding invocation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-embedding-run-input
    source: src-embedding-run-design
    supports: input_digest_sha256 pins consumed chunk content.
    locator: structure
    evidence_kind: design-inference
    confidence: high
