        expression: Assert only when the vector's generating run, model snapshot, and input digest match the run.
        explanations:
          zh: 仅当向量的 generating_run_id 与运行相同且模型/输入摘要一致时成立。
          en: Assert only when the vector's generating run, model snapshot, and input digest match the run.
