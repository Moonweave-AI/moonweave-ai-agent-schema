        scenario_id: null
        descriptions:
          zh: embedding-run-17 返回并登记 emb-17。
          en: embedding-run-17 returns and registers emb-17.
          ja: embedding-run-17 は emb-17を返し登録します。
        field_values: {}
        related_node_ids:
