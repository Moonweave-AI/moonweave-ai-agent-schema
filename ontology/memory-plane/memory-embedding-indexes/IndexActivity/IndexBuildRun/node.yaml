source_claims:
  - id: claim-index-build-run-001
    source: eng-fw-unstructured-ingestion
    supports: Unstructured separates its ordered embed, stage, and upload operations from the content written to the destination; Moonweave reifies the bounded index-writing execution as IndexBuildRun and the committed state as IndexVersion.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-002
    source: eng-fw-unstructured-ingestion
    supports: IndexBuildRun.run_id records the auditable build identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-003
    source: eng-fw-unstructured-ingestion
    supports: IndexBuildRun.build_mode records the build's completeness semantics; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-004
    source: eng-fw-unstructured-ingestion
    supports: IndexBuildRun.source_manifest_digest records exact build inputs; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-005
    source: eng-fw-unstructured-ingestion
    supports: Unstructured orders embed, stage, and upload steps, supporting an explicit build activity over prepared representations.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-006
    source: eng-fw-unstructured-ingestion
    supports: Unstructured separates the ordered embed, stage, and upload operations from the content written at the destination; the retained output is therefore not itself the ingestion operation.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-007
    source: eng-fw-unstructured-ingestion
    supports: Unstructured documents an ordered ingestion flow whose embed, stage, and upload operations transform prepared content and write it to a destination; reifying that bounded index-writing execution as IndexBuildRun is Moonweave's ontology inference.
    locator: "Ingestion overview > ordered ingest flow: index, filter, download, uncompress, partition, chunk, embed, stage, upload"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-build-run-008
    source: eng-ont-prov-o
    supports: PROV-O defines generated entities and generating activities; Moonweave requires successful immutable publication.
    locator: PROV-O Recommendation > Entity, Activity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
