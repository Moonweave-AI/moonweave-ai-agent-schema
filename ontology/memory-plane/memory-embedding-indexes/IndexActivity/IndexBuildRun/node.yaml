schema: moonweave.ai/ontology-node/v1
id: IndexBuildRun
kind: concept
labels:
  zh: 索引构建运行
  en: Index build run
  ja: 索引 build run
semantics:
  short_definition:
    zh: 消费表示并发布完整 IndexVersion 的构建活动。
    en: Build activity consuming representations and publishing a complete IndexVersion.
    ja: Representation を consume し完全 IndexVersion を公開する build activity。
  definition:
    zh: IndexBuildRun 是 IndexActivity：消费一组 Representation（source_manifest_digest 锁定），应用固定索引配置（metric、dimension、HNSW 参数），成功时产生一个完整 IndexVersion。Pinecone create_index + upsert 与 Chroma collection.add 是典型映射；IndexRefreshRun 是其增量刷新子类。
    en: IndexBuildRun is an IndexActivity consuming Representations (source_manifest_digest pinned), applying fixed index configuration (metric, dimension, HNSW params), and on success producing one complete IndexVersion. Pinecone create_index + upsert and Chroma collection.add are typical mappings; IndexRefreshRun is its incremental refresh subtype.
    ja: IndexBuildRun は Representation 集合（source_manifest_digest 固定）を consume し index 設定（metric/dimension/HNSW）適用→成功時 IndexVersion 生成。Pinecone create_index+upsert/Chroma add が典型。IndexRefreshRun は incremental subtype。
  why_needed:
    zh: 构建过程与 index-17@42 不可变快照分离后，失败 run 不能冒充已发布版本。
    en: Separating build process from immutable index-17@42 snapshots prevents failed runs from posing as published versions.
    ja: build 過程と index-17@42 不変 snapshot 分離で failed run の偽装公開を防止。
  includes:
    - zh: 纳入 full 与 incremental 构建，记录 build_run_id、build_mode 与 source_manifest_digest。
      en: Includes full and incremental builds recording build_run_id, build_mode, and source_manifest_digest.
      ja: build_run_id/build_mode/source_manifest_digest を記録する full/incremental build。
  excludes:
    - zh: 排除 IndexVersion、IndexRefreshEvent 与普通 query 请求。
      en: Excludes IndexVersion, IndexRefreshEvent, and ordinary query requests.
      ja: IndexVersion/IndexRefreshEvent/通常 query を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Pinecone create_index(name, dimension=1536, metric=cosine) 后 upsert vectors 映射 IndexBuildRun；Qdrant hnsw_config.m/ef_construct 写入 configuration_digest；成功才发布 IndexVersion，失败不产生后继 version。
    en: Pinecone create_index(name, dimension=1536, metric=cosine) followed by upsert maps to IndexBuildRun; Qdrant hnsw_config.m/ef_construct writes configuration_digest; IndexVersion publishes only on success—failed runs produce no successor version.
    ja: Pinecone create_index+upsert→IndexBuildRun。Qdrant hnsw_config→configuration_digest。成功時のみ IndexVersion 公開。
  typical_input:
    - description: Pinecone create index and upsert
      format: |
        pc.create_index(name="hybrid-docs", dimension=1536, metric="cosine")
        index.upsert(vectors=[{"id": "emb-17", "values": [...], "metadata": {"chunk_id": "chunk-17"}}])
      source_claims: [claim-index-build-run-pinecone]
    - description: Chroma collection add with embedding function
      format: |
        collection.add(
          ids=["chunk-17"],
          documents=["Prefers TypeScript for code examples."],
          metadatas=[{"source": "policy.pdf", "page": 2}]
        )
      source_claims: [claim-index-build-run-chroma]
  typical_output:
    - description: Published index version
      format: |
        {
          "build_run_id": "build-run-42",
          "index_id": "index-17",
          "version": 42,
          "build_mode": "full",
          "outcome": "success"
        }
      source_claims: [claim-index-build-run-design]
  reference_implementations:
    - name: Pinecone Create Index
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      description: create_index with dimension and metric.
    - name: Chroma Add Documents
      url: https://docs.trychroma.com/docs/collections/add-data
      description: collection.add with optional embedding_function.
    - name: Qdrant HNSW Configuration
      url: https://qdrant.tech/documentation/concepts/indexing/#vector-index
      description: hnsw_config m and ef_construct.
structure:
  identity_keys: [build_run_id]
  fields:
    - id: build_run_id
      labels: {zh: 构建运行标识, en: Build run identifier, ja: build run 識別子}
      definitions:
        zh: 唯一标识一次 IndexBuildRun。
        en: Uniquely identifies one IndexBuildRun.
        ja: 一回 IndexBuildRun を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: build-run-42
      allowed_values: []
      source_claims: [claim-index-build-run-id]
    - id: build_mode
      labels: {zh: 构建模式, en: Build mode, ja: build mode}
      definitions:
        zh: full 表示全量重建；incremental 表示从前序 IndexVersion 增量刷新。
        en: full means full rebuild; incremental means refresh from a predecessor IndexVersion.
        ja: full=全量再構築、incremental=前序 IndexVersion から増分 refresh。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: full
      allowed_values: [full, incremental]
      source_claims: [claim-index-build-run-mode]
    - id: source_manifest_digest
      labels: {zh: 来源清单摘要, en: Source manifest digest, ja: source manifest digest}
      definitions:
        zh: 本次构建消费的 Representation 集合 SHA-256。
        en: SHA-256 of the Representation set consumed by this build.
        ja: 今回 build が消費した Representation 集合 SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:manifest42
      allowed_values: []
      source_claims: [claim-index-build-run-manifest]
  constraints:
    - id: failed-build-not-published
      severity: error
      expression_language: plain
      expression: IndexBuildRun failure must not produce a successor IndexVersion.
      explanation:
        zh: 失败尝试登记为新版本会误导检索。
        en: Recording failed attempts as new versions misleads retrieval.
        ja: failed attempt を新版登録すると retrieval を誤導。
      source_claims: [claim-index-build-run-design]
  required_relations: []
examples:
  - id: IndexBuildRun-example-pinecone-full
    labels:
      zh: Pinecone 全量构建
      en: Pinecone full build
      ja: Pinecone full build
    descriptions:
      zh: build-run-42 消费 manifest42 的 EmbeddingVector，Pinecone upsert 到 hybrid-docs（dimension=1536, metric=cosine）成功后发布 index-17@42。
      en: build-run-42 consumes EmbeddingVectors in manifest42; Pinecone upsert into hybrid-docs (dimension=1536, metric=cosine) succeeds and publishes index-17@42.
      ja: build-run-42 が manifest42 を consume→Pinecone upsert→index-17@42 公開。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      version: create_index + upsert
    field_values:
      build_run_id: build-run-42
      build_mode: full
      source_manifest_digest: sha256:manifest42
    related_node_ids:
      - IndexBuildRun
      - IndexVersion
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-index-build-run-pinecone
      - claim-index-build-run-design
  - id: IndexBuildRun-example-chroma-add
    labels:
      zh: Chroma 集合写入
      en: Chroma collection write
      ja: Chroma collection write
    descriptions:
      zh: build-run-7 调用 Chroma collection.add 绑定 OpenAIEmbeddingFunction(text-embedding-3-small)；documents 自动嵌入并写入 docs collection，登记 index-7@1。
      en: build-run-7 calls Chroma collection.add with OpenAIEmbeddingFunction(text-embedding-3-small); documents auto-embed into docs collection and register index-7@1.
      ja: build-run-7 が Chroma collection.add（OpenAIEmbeddingFunction）実行→index-7@1 登録。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/collections/add-data
      version: collection.add
    field_values:
      build_run_id: build-run-7
      build_mode: full
      collection_name: docs
    related_node_ids:
      - IndexBuildRun
      - Index
    related_relation_ids: []
    source_claims:
      - claim-index-build-run-chroma
      - claim-index-build-run-design
  - id: IndexBuildRun-example-not-version
    labels:
      zh: 构建非版本快照
      en: Build is not version snapshot
      ja: build は version snapshot ではない
    descriptions:
      zh: index-17@42 是 build-run-42 完成后不可变 IndexVersion；build-run-42 仍在 running 时不能创建 @42。
      en: index-17@42 is the immutable IndexVersion after build-run-42 completes; @42 cannot exist while build-run-42 is still running.
      ja: index-17@42 は完了後 IndexVersion。build-run-42 running 中は @42 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexBuildRun
      - IndexVersion
    related_relation_ids: []
    source_claims:
      - claim-index-build-run-design
parent_relation:
  id: IndexBuildRun-is_a-IndexActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种索引活动
    en: is an index activity
    ja: 索引 activity の一種
  definitions:
    zh: IndexBuildRun —is_a→ IndexActivity 因为它消费 Representation、应用索引配置并产出 IndexVersion。
    en: IndexBuildRun —is_a→ IndexActivity because it consumes Representations, applies index configuration, and produces IndexVersions.
    ja: IndexBuildRun —is_a→ IndexActivity は Representation 消費・index 設定適用・IndexVersion 生成のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: IndexBuildRun-is_a-IndexActivity-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the run consumes representations and publishes or attempts to publish an IndexVersion.
      explanations:
        zh: 仅当满足构建链时建立该边。
        en: Assert only when the build chain holds.
        ja: build chain 成立時のみ assert。
      source_claims: [claim-index-build-run-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-build-run-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-create
    title: Pinecone Create Index Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/create-an-index
    source_type: official-doc
    relevance: create_index and upsert boundaries.
  - id: src-chroma-add
    title: Chroma Add Data
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/add-data
    source_type: official-doc
    relevance: collection.add as index write.
  - id: src-index-build-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Build run versus IndexVersion separation.
source_claims:
  - id: claim-index-build-run-pinecone
    source: src-pinecone-create
    supports: Pinecone create_index requires dimension and metric; upsert writes vectors into the index.
    locator: Create an index; upsert
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-build-run-chroma
    source: src-chroma-add
    supports: Chroma collection.add inserts documents and embeddings into a collection.
    locator: Add data to a collection
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-build-run-design
    source: src-index-build-design
    supports: IndexBuildRun produces IndexVersion only on success; failed runs must not publish successor versions.
    locator: IndexBuildRun boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-build-run-id
    source: src-index-build-design
    supports: build_run_id identifies one index build activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-build-run-mode
    source: src-index-build-design
    supports: build_mode distinguishes full and incremental builds.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-build-run-manifest
    source: src-index-build-design
    supports: source_manifest_digest pins consumed representations.
    locator: structure
    evidence_kind: design-inference
    confidence: high
