schema: moonweave.ai/ontology-node/v1
id: IndexBuildRun
kind: concept
status: accepted
labels:
  zh: 索引构建运行
  en: Index build run
  ja: 索引build run
semantics:
  short_definition:
    zh: 消费已准备表示并产生完整 IndexVersion 的活动。
    en: An activity consuming prepared representations and producing a complete IndexVersion.
    ja: 準備済み表現を消費し完全な IndexVersion を生成するactivityです。
  definition:
    zh: IndexBuildRun 是消费一组 Representation、应用确定索引配置并在成功时产生一个完整 IndexVersion 的 IndexActivity；它不是版本快照或增量触发事件。
    en: IndexBuildRun is an IndexActivity that consumes a set of Representation values, applies a fixed index configuration, and on success produces one complete IndexVersion; it is not the version snapshot or an incremental trigger event.
    ja: IndexBuildRun は Representation 集合を消費し固定index設定を適用して成功時に一つの完全 IndexVersion を生成する IndexActivity で、版snapshotやincremental trigger eventではありません。
  why_needed:
    zh: 把构建过程与构建结果分开并提供刷新父类。
    en: Separates build process from build result and provides the parent for refresh runs.
    ja: build過程をbuild結果から分離しrefresh runの親を提供します。
  includes:
    - zh: 纳入全量构建和具有明确前序版本的增量刷新。
      en: Includes full builds and incremental refreshes with an explicit predecessor version.
      ja: full buildと明示predecessor版を持つincremental refreshを含みます。
  excludes:
    - zh: 排除 IndexVersion、IndexRefreshEvent 和普通检索请求。
      en: Excludes IndexVersion, IndexRefreshEvent, and ordinary retrieval requests.
      ja: IndexVersion・IndexRefreshEvent・通常retrieval requestを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - run_id
  fields:
    - id: run_id
      labels:
        zh: 运行标识
        en: run ID
        ja: run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识构建活动。
        en: Stable identifier for the build activity.
        ja: build activityの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: build-run-42
      source_claims:
        - claim-index-build-run-002
    - id: build_mode
      labels:
        zh: 构建模式
        en: build mode
        ja: build mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 full 与 incremental。
        en: Distinguishes full and incremental build.
        ja: fullとincremental buildを区別します。
      allowed_values: []
      pattern: null
      example_value: full
      source_claims:
        - claim-index-build-run-003
    - id: source_manifest_digest
      labels:
        zh: 来源清单摘要
        en: source-manifest digest
        ja: source manifest digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次构建消费的表示集合。
        en: Fixes the representation set consumed by this build.
        ja: buildが消費したRepresentation集合を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:manifest42
      source_claims:
        - claim-index-build-run-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexBuildRun-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引构建运行正例
      en: "Positive case: Index build run"
      ja: 索引build run正例
    scenario_id: null
    descriptions:
      zh: build-run-42 消费 manifest42 的表示并产出 index-17@42。
      en: build-run-42 consumes the representations in manifest42 and produces index-17@42.
      ja: build-run-42 は manifest42 の表現を消費し index-17@42を生成します。
    field_values:
      run_id: build-run-42
      build_mode: full
      source_manifest_digest: sha256:manifest42
      activity_id: build-run-42
      started_at: 2026-07-16T11:10:00Z
      status: completed
    related_node_ids:
      - IndexBuildRun
    related_relation_ids: []
    expected_result:
      zh: 将 build-run-42 归为消费 manifest42 并发布完整版本的 IndexBuildRun。
      en: Classify build-run-42 as the IndexBuildRun that consumes manifest42 and publishes a complete version.
      ja: build-run-42 を manifest42 を消費して完全版を公開する IndexBuildRun と分類します。
    why_valid_or_invalid:
      zh: 输入清单、配置、活动身份与完整输出明确。
      en: Input manifest, configuration, activity identity, and complete output are explicit.
      ja: 入力manifest・設定・activity同一性・完全出力が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-build-run-005
  - id: IndexBuildRun-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引构建运行边界例
      en: "Boundary case: Index build run"
      ja: 索引build run境界例
    scenario_id: null
    descriptions:
      zh: index-17@42 是 build-run-42 完成后留下的快照。
      en: index-17@42 is the snapshot retained after build-run-42 completes.
      ja: index-17@42 は build-run-42完了後に保持するsnapshotです。
    field_values: {}
    related_node_ids:
      - IndexBuildRun
    related_relation_ids: []
    expected_result:
      zh: 保留 index-17@42 的 IndexVersion 身份，不赋予其运行时间与执行者身份。
      en: Keep index-17@42 as an IndexVersion without assigning it a run interval or executor identity.
      ja: index-17@42 の IndexVersion 同一性を維持し、実行時間区間や executor 同一性を付与しません。
    why_valid_or_invalid:
      zh: 快照具有版本与配置成员边界，却没有运行的开始、结束、输入清单和执行状态。
      en: The snapshot has version and configuration membership boundaries but lacks a run's start, end, input manifest, and execution status.
      ja: snapshot は版・設定 membership 境界を持ちますが、run の開始・終了・入力 manifest・実行 status を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-build-run-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexBuildRun-is_a-IndexActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: IndexBuildRun 是 IndexActivity 的严格子类；种差为：消费一组 Representation、应用索引配置并产生完整 IndexVersion。
    en: "IndexBuildRun is a strict subtype of IndexActivity; its reviewed differentia is: it consumes a set of Representation values, applies index configuration, and produces a complete IndexVersion."
    ja: IndexBuildRun は IndexActivity の厳密なsubtypeで、審査済み種差は「Representation集合を消費しindex設定を適用して完全 IndexVersionを生成します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexBuildRun-is_a-IndexActivity-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IndexActivity and also satisfies the differentia: it consumes a set of Representation values, applies index configuration, and produces a complete IndexVersion."
      explanations:
        zh: 仅当对象首先满足 IndexActivity 定义且满足种差“消费一组 Representation、应用索引配置并产生完整 IndexVersion。”时成立。
        en: "Assert only when the object first satisfies IndexActivity and also satisfies the differentia: it consumes a set of Representation values, applies index configuration, and produces a complete IndexVersion."
        ja: 対象がまず IndexActivity を満たし、さらに種差「Representation集合を消費しindex設定を適用して完全 IndexVersionを生成します。」を満たす時だけ成立します。
      source_claims:
        - claim-index-build-run-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexBuildRun-is_a-IndexActivity-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: build-run-42 消费 manifest42 中的 Representation，应用 config-17 并在完成时发布 index-17@42。
        en: build-run-42 consumes the Representations in manifest42, applies config-17, and publishes index-17@42 on completion.
        ja: build-run-42 は manifest42 の Representation を消費し、config-17 を適用して完了時に index-17@42 を公開します。
      field_values: {}
      related_node_ids:
        - IndexBuildRun
        - IndexActivity
      related_relation_ids:
        - IndexBuildRun-is_a-IndexActivity
      expected_result:
        zh: 将 build-run-42 归入 IndexActivity 下的 IndexBuildRun 分支。
        en: Classify build-run-42 in the IndexBuildRun branch beneath IndexActivity.
        ja: build-run-42 を IndexActivity 配下の IndexBuildRun 分岐に分類します。
      why_valid_or_invalid:
        zh: 该记录具有活动时间边界，且其输入、配置与完整版本输出均可核对。
        en: The record has activity boundaries, and its input, configuration, and complete version output are all verifiable.
        ja: activity時間境界を持ち、input・設定・完全版outputをすべて照合できます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-build-run-007
    - id: IndexBuildRun-is_a-IndexActivity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 不可变 index-17@42 是构建结果而不是构建活动。
        en: Immutable index-17@42 is the build result, not the build activity.
        ja: immutable index-17@42 はbuild結果でbuild activityではありません。
      field_values: {}
      related_node_ids:
        - IndexBuildRun
        - IndexActivity
      related_relation_ids:
        - IndexBuildRun-is_a-IndexActivity
      expected_result:
        zh: 将 index-17@42 保持为 IndexVersion，不把构建输出归入活动层级。
        en: Keep index-17@42 as IndexVersion and do not place the build output in the activity hierarchy.
        ja: index-17@42 を IndexVersion として保持し、build output を activity 階層へ入れません。
      why_valid_or_invalid:
        zh: index-17@42 具有冻结成员与配置摘要，却没有运行开始、结束、执行状态或输入消费行为。
        en: index-17@42 has frozen membership and a configuration digest but no run start, end, execution status, or input-consumption behavior.
        ja: index-17@42 は凍結 membership と設定 digest を持ちますが、run 開始・終了・実行 status・input consumption behavior を持ちません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-build-run-007
  source_claims:
    - claim-index-build-run-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: IndexBuildRun-produces-IndexVersion
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生索引版本
      en: produces index version
      ja: index版を生成する
    definitions:
      zh: IndexBuildRun —produces→ IndexVersion 表示构建成功完成后新形成一个完整不可变快照。
      en: IndexBuildRun —produces→ IndexVersion means that successful build completion newly forms one complete immutable snapshot.
      ja: IndexBuildRun —produces→ IndexVersion はbuild成功完了後に一つの完全immutable snapshotを新規形成することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_produces
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: IndexBuildRun-produces-IndexVersion-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when build run, completion time, manifest digest, and configuration digest on the version bind to that run.
        explanations:
          zh: 仅当 version.build_run_id、完成时间与清单/配置摘要均绑定该运行时成立。
          en: Assert only when build run, completion time, manifest digest, and configuration digest on the version bind to that run.
          ja: versionのbuild run・完了時刻・manifest digest・設定digestがそのrunに結び付く時だけ成立します。
        source_claims:
          - claim-index-build-run-008
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexBuildRun-produces-IndexVersion-example-positive-manual-001
        kind: positive
        labels:
          zh: 产生索引版本正例
          en: "Positive case: produces index version"
          ja: index版を生成する正例
        scenario_id: null
        descriptions:
          zh: build-run-42 完成并登记 index-17@42。
          en: build-run-42 completes and registers index-17@42.
          ja: build-run-42 は完了し index-17@42を登録します。
        field_values: {}
        related_node_ids:
          - IndexBuildRun
          - IndexVersion
        related_relation_ids:
          - IndexBuildRun-produces-IndexVersion
        expected_result:
          zh: 建立 build-run-42 produces index-17@42 的成功发布事实。
          en: Assert the successful-publication fact that build-run-42 produces index-17@42.
          ja: build-run-42 produces index-17@42 という successful-publication fact を確立します。
        why_valid_or_invalid:
          zh: 版本记录同时给出唯一 generating_run_id、完成状态、提交时间与冻结清单。
          en: The version record supplies one generating_run_id together with completed status, commit time, and a frozen manifest.
          ja: version record が一つの generating_run_id、completed status、commit time、凍結 manifest を同時に示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-build-run-008
      - id: IndexBuildRun-produces-IndexVersion-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 产生索引版本边界例
          en: "Boundary case: produces index version"
          ja: index版を生成する境界例
        scenario_id: null
        descriptions:
          zh: 构建失败且未发布快照时不能建立 produces 边。
          en: A failed build with no published snapshot does not establish a produces edge.
          ja: snapshot未公開のfailed buildには produces edgeを立てません。
        field_values: {}
        related_node_ids:
          - IndexBuildRun
          - IndexVersion
        related_relation_ids:
          - IndexBuildRun-produces-IndexVersion
        expected_result:
          zh: 保留失败的 IndexBuildRun 记录，但不创建任何 produces IndexVersion 边。
          en: Retain the failed IndexBuildRun record but create no produces IndexVersion edge.
          ja: failed IndexBuildRun 記録は保持しますが、produces IndexVersion 辺は作成しません。
        why_valid_or_invalid:
          zh: 失败运行没有提交时间、不可变成员清单或可寻址版本；尝试写入不能冒充成功生成。
          en: The failed run has no commit time, immutable membership manifest, or addressable version; attempted writes cannot masquerade as successful generation.
          ja: failed run には commit time・immutable membership manifest・addressable version がなく、attempted write を成功 generation と扱えません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-build-run-008
    source_claims:
      - claim-index-build-run-008
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:IndexVersion
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-retrieval-verification
  reviewed_on: 2026-07-17
