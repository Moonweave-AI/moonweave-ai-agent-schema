schema: moonweave.ai/ontology-node/v1
id: IndexBuildRun
kind: concept
status: accepted
labels: {zh: 索引构建运行, en: Index Build Run, ja: インデックス構築実行}
semantics:
  short_definition:
    zh: 将已有兼容表示显式写入、重建或更新某个索引版本的一次可审计执行。
    en: One auditable execution that explicitly writes, rebuilds, or updates compatible existing representations in one index version.
    ja: compatible な既存 representation を一つの index version に明示 write、rebuild、update する一回の audit 可能な execution。
  definition:
    zh: >-
      IndexBuildRun 是一种 IndexActivity，负责把已生成的 DenseVector、SparseVector 或其他 Representation 组织成 Index、
      IndexVersion、IndexShard 和 IndexEntry。它记录构建 ID、目标版本、输入表示、构建模式、产生的条目和状态。它不生成
      EmbeddingVector、不等同于目标 Index 或其条目，也不是检索查询、候选、重排、VectorDatabase 或 Context Assembly。只有
      成功的明确写入才能改变索引成员；读取候选不能充当构建输入或结果。
    en: >-
      An IndexBuildRun is an IndexActivity that organizes generated DenseVectors, SparseVectors, or other
      Representations into an Index, IndexVersion, IndexShard, and IndexEntry. It records build ID, target version,
      input representations, build mode, created entries, and status. It does not generate an EmbeddingVector, equal the
      target Index or entry, or constitute a retrieval query, candidate, reranking result, VectorDatabase, or Context
      Assembly. Only a successful explicit write changes index membership; read candidates cannot be build inputs or results.
    ja: >-
      IndexBuildRun は生成済み DenseVector、SparseVector、その他 Representation を Index、IndexVersion、IndexShard、
      IndexEntry に組織する IndexActivity です。build ID、target version、input representation、build mode、created entry、
      status を記録します。EmbeddingVector を生成せず、target Index 又は entry と同一でもなく、retrieval query、candidate、
      reranking result、VectorDatabase、Context Assembly でもありません。成功した明示 write だけが index membership を変え、
      read candidate を build input 又は result にできません。
  why_needed:
    zh: 将构建执行和其输入/输出分开，才能对重建、增量更新和失败回滚进行审计，而不会把一次搜索视为索引变更。
    en: Separating the build execution from its inputs and outputs makes rebuilds, incremental updates, and failed rollbacks auditable without treating a search as an index change.
    ja: build execution を input/output から分離すると rebuild、incremental update、失敗 rollback を audit でき、search を index change と扱わない。
  includes:
    - zh: 把一批维度兼容的嵌入显式 upsert 到 project-index-p-88 的 v4，并记录新 IndexEntry 引用。
      en: Explicitly upserting a batch of dimension-compatible embeddings into v4 of project-index-p-88 and recording new IndexEntry references.
      ja: dimension-compatible embedding batch を project-index-p-88 の v4 に明示 upsert し、新しい IndexEntry reference を記録すること。
  excludes:
    - zh: 调用嵌入模型、一个 IndexVersion、一个 IndexEntry、查询输入、返回候选和模型输入上下文。
      en: Calling an embedding model, one IndexVersion, one IndexEntry, query input, returned candidate, or model-input context.
      ja: embedding model の呼出、一つの IndexVersion、一つの IndexEntry、query input、返された candidate、model-input context。
  semantic_kind: activity
  aliases: [index build execution, index upsert run]
engineering:
  explanation:
    zh: >-
      构建器读取已产生表示和目标索引 schema，验证维度、表示类型和元数据，再执行 build 或 upsert 并写出条目清单。
      Pinecone 的索引概览说明在一个索引中声明 dense、sparse、文本和 metadata 字段并对数据进行索引；Moonweave 把每次
      构建编号化，以免后续查询返回的记录被误作写入证明。
    en: >-
      A builder reads generated representations and target-index schema, validates dimension, representation type, and
      metadata, then performs a build or upsert and writes an entry list. Pinecone's indexing overview documents declared
      dense, sparse, text, and metadata fields in an index and indexing of data. Moonweave identifies each build so records
      later returned by a query are not mistaken for write evidence.
    ja: >-
      builder は生成済 representation と target-index schema を読み、dimension、representation type、metadata を検証してから
      build 又は upsert を実行し entry list を書きます。Pinecone の indexing overview は index 内の declared dense、sparse、
      text、metadata field と data indexing を文書化します。Moonweave は各 build を識別し、後の query が返す record を write
      evidence と誤認しないようにします。
  typical_input:
    - description: Explicit incremental build request
      format: |
        {"activity_id":"build-p-88-4","activity_kind":"build","target_index_ref":"project-index-p-88","target_index_version_ref":"project-index-p-88-v4","build_mode":"upsert","representation_refs":["embedding-chunk-42-v1","embedding-chunk-43-v1"]}
  typical_output:
    - description: Successful build result
      format: |
        {"activity_id":"build-p-88-4","status":"succeeded","created_entry_refs":["entry-p-88-42","entry-p-88-43"],"write_performed":true}
  reference_implementations:
    - name: Pinecone indexing overview
      url: https://docs.pinecone.io/guides/index-data/indexing-overview
      description: Documents indexes, ranking-field types, and indexed data operations.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 活动标识, en: activity ID, ja: activity ID}
      definitions:
        zh: 稳定标识该构建活动；沿用 IndexActivity 身份，而不为构建子类型再建 ID。
        en: Stably identifies this build activity using the IndexActivity identity rather than creating a second ID for the build subtype.
        ja: build subtype の第二 ID を作らず、IndexActivity identity でこの build activity を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: build-p-88-4
      source_claims: [claim-index-build-write]
    - id: activity_kind
      labels: {zh: 活动类别, en: activity kind, ja: activity kind}
      definitions:
        zh: 固定为 build；build_mode 再区分创建、重建、增量写入或删除成员。
        en: Fixed to build; build_mode further distinguishes creation, rebuild, incremental write, or membership deletion.
        ja: build に固定され、build_mode が creation、rebuild、incremental write、membership deletion をさらに区別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [build]
      pattern: null
      example_value: build
      source_claims: [claim-index-build-write]
    - id: target_index_ref
      labels: {zh: 目标索引引用, en: target index reference, ja: target index reference}
      definitions:
        zh: 指向该构建将创建或改变其成员的逻辑索引，而非数据库服务。
        en: References the logical index whose membership this build creates or changes, rather than a database service.
        ja: database service ではなく、この build が membership を作成又は変更する logical index を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88
      source_claims: [claim-index-build-write]
    - id: target_index_version_ref
      labels: {zh: 目标索引版本引用, en: target index-version reference, ja: 対象 index-version 参照}
      definitions:
        zh: 引用接受本次写入的具体版本而非数据库设施。
        en: "References the concrete version receiving this write rather than a database facility."
        ja: database facility ではなくこの write を受ける具体 version を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88-v4
      source_claims: [claim-index-build-write]
    - id: build_mode
      labels: {zh: 构建模式, en: build mode, ja: build mode}
      definitions:
        zh: 声明是创建、全量重建、增量 upsert 还是删除维护。
        en: "Declares whether the run creates, fully rebuilds, incrementally upserts, or deletes for maintenance."
        ja: run が create、full rebuild、incremental upsert、delete maintenance のどれかを宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [create, rebuild, upsert, delete]
      pattern: null
      example_value: upsert
      source_claims: [claim-index-build-write]
    - id: representation_refs
      labels: {zh: 表示引用, en: representation references, ja: representation 参照}
      definitions:
        zh: 列出将被组织、写入或删除成员所依据的已生成兼容表示；这是父类的同一输入字段。
        en: Lists existing compatible representations used to organize, write, or delete membership; it is the same input field inherited from IndexActivity.
        ja: organization、membership write、delete に使う既存 compatible representation を列挙し、IndexActivity から継承する同じ input field である。
      datatype: json
      required: true
      cardinality: {min: 1, max: null}
      allowed_values: []
      pattern: null
      example_value: '["embedding-chunk-42-v1"]'
      source_claims: [claim-index-build-write]
    - id: created_entry_refs
      labels: {zh: 产生条目引用, en: created-entry references, ja: 作成 entry 参照}
      definitions:
        zh: 成功时引用此次构建创建或更新的索引成员，而不是检索候选。
        en: "On success references index members created or updated by this build, not retrieval candidates."
        ja: success 時にこの build が作成又は更新した index member を参照し、retrieval candidate ではない。
      datatype: json
      required: false
      cardinality: {min: 0, max: null}
      allowed_values: []
      pattern: null
      example_value: '["entry-p-88-42"]'
      source_claims: [claim-index-build-write]
    - id: status
      labels: {zh: 构建状态, en: build status, ja: build 状態}
      definitions:
        zh: 声明本次写入是否成功、失败或部分完成，不代表索引整体健康状态。
        en: "Declares whether this write succeeded, failed, or partially completed, not overall index health."
        ja: この write が succeeded、failed、partial のどれかを宣言し、index 全体 health ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [succeeded, failed, partial]
      pattern: null
      example_value: succeeded
      source_claims: [claim-index-build-write]
  constraints:
    - id: index-build-run-write-contract
      severity: error
      expression_language: plain
      expression: activity_id, activity_kind, target_index_ref, target_index_version_ref, build_mode, representation_refs, and status are required. activity_kind must be build. All input representations must be compatible with the target schema. A succeeded create, rebuild, or upsert run must record created_entry_refs; failed runs must not claim unverified entries. Retrieval candidates and scores cannot populate either representation_refs or created_entry_refs.
      explanation:
        zh: 构建记录必须区分输入、显式写入结果与读取结果，以便安全重试和审计。
        en: A build record must distinguish inputs, explicit write results, and read results for safe retry and audit.
        ja: build record は安全な retry と audit のために input、明示 write result、read result を区別しなければならない。
      source_claims: [claim-index-build-write, claim-index-build-read-boundary, claim-index-build-design]
  required_relations: []
examples:
  - id: index-build-run-positive

    labels: {zh: 两个嵌入的增量写入, en: Incremental write of two embeddings, ja: 二つの embedding の incremental write}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {activity_id: build-p-88-4, activity_kind: build, target_index_ref: project-index-p-88, target_index_version_ref: project-index-p-88-v4, build_mode: upsert, representation_refs: '["embedding-chunk-42-v1","embedding-chunk-43-v1"]', created_entry_refs: '["entry-p-88-42","entry-p-88-43"]', status: succeeded}
    related_node_ids: [IndexBuildRun, EmbeddingVector, IndexVersion, IndexEntry]
    related_relation_ids: [IndexBuildRun-is_a-IndexActivity]

    source_claims: [claim-index-build-write]
  - id: index-build-run-boundary

    labels: {zh: 失败的构建没有条目, en: Failed build has no entries, ja: 失敗 build に entry はない}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {activity_id: build-p-88-5, activity_kind: build, target_index_ref: project-index-p-88, target_index_version_ref: project-index-p-88-v4, build_mode: upsert, representation_refs: '["embedding-other-model-v1"]', created_entry_refs: '[]', status: failed}
    related_node_ids: [IndexBuildRun, IndexVersion, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-index-build-write]
  - id: index-build-run-counterexample

    labels: {zh: 查询候选不是构建输出, en: Query candidate is not build output, ja: query candidate は build output ではない}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {candidate_id: candidate-41, entry_ref: entry-p-88-42, score: 0.91, write_performed: false}
    related_node_ids: [IndexBuildRun, RetrievedCandidate, RetrievalRequest]
    related_relation_ids: []

    source_claims: [claim-index-build-read-boundary]
  - id: index-build-run-instance

    labels: {zh: 实例：项目 v5 全量重建, en: "Instance: project v5 full rebuild", ja: "事例: project v5 full rebuild"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {activity_id: rebuild-p-88-v5, activity_kind: build, target_index_ref: project-index-p-88, target_index_version_ref: project-index-p-88-v5, build_mode: rebuild, representation_refs: '["embedding-policy-1-v2","embedding-policy-2-v2"]', created_entry_refs: '["entry-p-88-v5-1","entry-p-88-v5-2"]', status: succeeded}
    related_node_ids: [IndexBuildRun, IndexVersion, IndexEntry, Representation]
    related_relation_ids: [IndexBuildRun-is_a-IndexActivity]

    source_claims: [claim-index-build-write]
parent_relation:
  id: IndexBuildRun-is_a-IndexActivity
  predicate: is_a
  target: concept:IndexActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是索引活动的构建运行子类, en: is an index-build-run subtype of index activity, ja: IndexActivity の index-build-run 下位型である}
  definitions:
    zh: IndexBuildRun 是一种向具名索引版本写入、重建或更新兼容表示的 IndexActivity。
    en: "An IndexBuildRun is an IndexActivity that writes compatible representations to a named index version or rebuilds or updates its membership."
    ja: IndexBuildRun は compatible representation を名前付き index version に write し、その membership を rebuild 又は update する IndexActivity である。
  cardinality: null
  cardinality_not_applicable_reason: {zh: 分类关系不规定一个索引活动可有多少个运行实例。, en: Classification does not prescribe how many build-run instances an index activity may have., ja: 分類関係は一つの index activity が持ち得る build-run instance 数を規定しない。}
  inverse_reading: {predicate: has_index_build_run_subtype, labels: {zh: 具有索引构建运行子类, en: has index-build-run subtype, ja: index-build-run 下位型を持つ}}
  conditions:
    - id: index-build-run-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert only when a run uses explicit compatible representations and a named target index version to create, rebuild, upsert, or delete index membership. A model embedding call, an existing index, a candidate list, or reranking result alone does not satisfy this subtype.
      explanation:
        zh: 该子类描述索引成员写入，不描述向量生成或查询读取。
        en: This subtype describes index-membership writes, not vector generation or query reads.
        ja: この subtype は index-membership write を表し、vector generation や query read を表さない。
      source_claims: [claim-index-build-subtype]
  temporal_scope: valid-time
  boundary_context: Indexing may consume a generated vector, but generation and later query results remain distinct activity and read facts.
  constraints: []
  examples: []
  source_claims: [claim-index-build-subtype]
  distinct_fact_rationale: This relation classifies an index-membership write execution, distinct from model embedding and retrieval.
  layout_role: primary-backbone
relations:
  - id: IndexBuildRun-uses-Representation
    predicate: uses
    target: concept:Representation
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用表示, en: uses representation, ja: representation を使用する}
    definitions:
      zh: IndexBuildRun 使用已存在且兼容的 Representation 作为写入索引成员的输入。
      en: "An IndexBuildRun uses existing compatible Representation values as inputs for writing index membership."
      ja: IndexBuildRun は index membership を write する input として、既存で compatible な Representation を使用する。
    cardinality: null
    cardinality_not_applicable_reason: {zh: 一个运行可使用零个或多个表示，具体数量由清单决定。, en: A run may use zero or more representations; the concrete manifest determines the count., ja: 一つの run は zero 又は複数の representation を使用でき、具体数は manifest が決める。}
    inverse_reading: {predicate: is_used_by, labels: {zh: 被构建运行使用, en: is used by build run, ja: build run に使用される}}
    conditions:
      - id: index-build-run-uses-representation-condition
        severity: error
        expression_language: plain
        expression: Assert only when the run's representation_refs resolve to representations compatible with the target index version. A vector generated after the run, a retrieval candidate, or a query string is not an input representation for this relation.
        explanation:
          zh: 输入必须可解析到与目标版本兼容的既有表示，不能把检索输出倒灌成构建输入。
          en: Inputs must resolve to existing representations compatible with the target version; retrieval output cannot be backfilled as build input.
          ja: input は target version と compatible な既存 representation に解決されなければならず、retrieval output を build input として後から埋めることはできない。
        source_claims: [claim-index-build-write]
    temporal_scope: valid-time
    boundary_context: Using a representation to write an index does not make the IndexBuildRun the embedding activity that generated it.
    constraints: []
    examples: []
    source_claims: [claim-index-build-write]
    distinct_fact_rationale: This records an activity-to-entity input fact, distinct from vector generation and index-version output.
    layout_role: cross-link
  - id: IndexBuildRun-generates-IndexVersion
    predicate: generates
    target: concept:IndexVersion
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成索引版本, en: generates index version, ja: index version を生成する}
    definitions:
      zh: 成功的 IndexBuildRun 可生成一个冻结成员清单和模式摘要的 IndexVersion。
      en: "A successful IndexBuildRun can generate an IndexVersion with a frozen membership manifest and schema digest."
      ja: 成功した IndexBuildRun は frozen membership manifest と schema digest を持つ IndexVersion を生成できる。
    cardinality: null
    cardinality_not_applicable_reason: {zh: 失败、取消或仅计划中的运行不生成版本；成功运行的输出数量由发布策略决定。, en: Failed, cancelled, or planned runs generate no version; publication policy determines the number of successful outputs., ja: failed、cancelled、planned run は version を生成せず、成功 output 数は publication policy が決める。}
    inverse_reading: {predicate: was_generated_by, labels: {zh: 由构建运行生成, en: was generated by build run, ja: build run により生成された}}
    conditions:
      - id: index-build-run-generates-version-condition
        severity: error
        expression_language: plain
        expression: Assert only when a completed run's activity_id matches the version's created_by_run_ref and the version records a fixed schema digest and membership snapshot. A mutable database endpoint or an uncommitted staging set is not an IndexVersion output.
        explanation:
          zh: 只有已完成运行与冻结版本快照可审计关联时，才能断言生成关系。
          en: Assert generation only when the completed run is auditable against a frozen version snapshot.
          ja: completed run と frozen version snapshot の監査可能な対応がある時だけ generation を断言する。
        source_claims: [claim-index-build-write]
    temporal_scope: valid-time
    boundary_context: A run that merely reads an index or fails before publication does not generate an IndexVersion.
    constraints: []
    examples: []
    source_claims: [claim-index-build-write]
    distinct_fact_rationale: This records a successful activity-to-entity output fact, not the enduring index identity or a query result.
    layout_role: cross-link
sources:
  - id: pinecone-indexing
    title: Pinecone indexing overview
    url: https://docs.pinecone.io/guides/index-data/indexing-overview
    source_type: official-doc
    relevance: Documents indexes, dense and sparse ranking fields, metadata, and explicit data indexing.
  - id: pinecone-search
    title: Pinecone semantic search
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: Documents a query that reads matching records from an existing vector index.
source_claims:
  - id: claim-index-build-write
    source: pinecone-indexing
    supports: Pinecone documents indexing data with declared dense, sparse, text, and metadata fields.
    locator: "Indexing overview: indexes and indexing data"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-build-read-boundary
    source: pinecone-search
    supports: Pinecone documents queries against an existing index that return similar records.
    locator: "Semantic search: search with a dense vector"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-build-subtype
    source: pinecone-indexing
    supports: Pinecone documents explicit indexing of compatible data into a named index.
    locator: "Indexing overview: indexes and ranking fields"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-build-design
    source: pinecone-indexing
    supports: Moonweave models IndexBuildRun as the IndexActivity subtype for a create, rebuild, upsert, or delete that changes index membership, retaining its target, input representations, output entries, and terminal status separately from query results.
    locator: "Moonweave ontology design inference from claim-index-build-write, claim-index-build-read-boundary, and claim-index-build-subtype"
    evidence_kind: ontology-design-inference
    confidence: high
