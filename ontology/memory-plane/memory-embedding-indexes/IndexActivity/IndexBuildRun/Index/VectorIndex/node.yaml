schema: moonweave.ai/ontology-node/v1
id: VectorIndex
kind: concept
status: review
labels:
  zh: 向量索引
  en: Vector index
  ja: ベクトル索引
semantics:
  short_definition:
    zh: 按向量距离检索记录的 Index。
    en: An Index retrieving records by vector distance.
    ja: vector距離でrecordを検索する Index です。
  definition:
    zh: VectorIndex 是以声明维数、向量类型和距离度量组织向量记录的 Index；它不是单个向量、向量数据库服务或检索请求。
    en: VectorIndex is an Index organizing vector-bearing records under declared dimensionality, vector type, and distance metric; it is not one vector, a vector-database service, or a retrieval request.
    ja: VectorIndex は宣言次元・vector種別・distance metricでvector recordを編成する Index で、単一vector・vector-database service・retrieval requestではありません。
  why_needed:
    zh: 表达向量检索配置而不把向量或数据库当索引。
    en: Represents vector-retrieval configuration without conflating a vector or database with the index.
    ja: vectorやdatabaseをindexと混同せずvector検索設定を表します。
  includes:
    - zh: 纳入 dense、sparse 或声明混合能力的向量索引。
      en: Includes dense, sparse, or declared multi-vector indexes.
      ja: dense・sparse・宣言multi-vector indexを含みます。
  excludes:
    - zh: 排除 EmbeddingVector、VectorDatabase 和 RetrievalRequest。
      en: Excludes EmbeddingVector, VectorDatabase, and RetrievalRequest.
      ja: EmbeddingVector・VectorDatabase・RetrievalRequestを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - index_id
  fields:
    - id: index_id
      labels:
        zh: 索引标识
        en: index ID
        ja: index ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识向量索引。
        en: Stable identifier for the vector index.
        ja: vector indexの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: vector-index-17
      source_claims:
        - claim-vector-index-002
    - id: dimensions
      labels:
        zh: 维数
        en: dimensions
        ja: 次元数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定可写入向量维数。
        en: Fixes the dimensions accepted for inserted vectors.
        ja: 挿入vectorの許容次元を固定します。
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims:
        - claim-vector-index-003
    - id: metric
      labels:
        zh: 距离度量
        en: distance metric
        ja: distance metric
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定相似度排序方式。
        en: Fixes the similarity-ranking metric.
        ja: 類似度順位metricを固定します。
      allowed_values: []
      pattern: null
      example_value: cosine
      source_claims:
        - claim-vector-index-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: VectorIndex-example-positive-manual-001
    kind: positive
    labels:
      zh: 向量索引正例
      en: "Positive case: Vector index"
      ja: ベクトル索引正例
    scenario_id: null
    descriptions:
      zh: vector-index-17 接受 1536 维向量并使用 cosine。
      en: vector-index-17 accepts 1536-dimensional vectors and uses cosine distance.
      ja: vector-index-17 は1536次元vectorを受け入れcosineを使います。
    field_values:
      index_id: vector-index-17
      dimensions: 1536
      metric: cosine
      index_kind: vector
      configuration_digest: sha256:vector-index-17-1536-cosine
    related_node_ids:
      - VectorIndex
    related_relation_ids: []
    expected_result:
      zh: 将 vector-index-17 归为采用 1536 维 cosine 配置的 VectorIndex。
      en: Classify vector-index-17 as a VectorIndex configured for 1,536-dimensional cosine retrieval.
      ja: vector-index-17 を 1,536 次元 cosine 検索設定の VectorIndex と分類します。
    why_valid_or_invalid:
      zh: 稳定 index_id、向量类型、固定维数与距离度量共同约束跨记录检索结构。
      en: A stable index_id, vector type, fixed dimensionality, and distance metric jointly constrain the cross-record retrieval structure.
      ja: 安定 index_id・vector 種別・固定次元・distance metric が record 横断検索構造を共同制約します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-vector-index-005
  - id: VectorIndex-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 向量索引边界例
      en: "Boundary case: Vector index"
      ja: ベクトル索引境界例
    scenario_id: null
    descriptions:
      zh: emb-17 是可写入索引的一条向量表示。
      en: emb-17 is one vector representation eligible for insertion.
      ja: emb-17 はindexへ挿入可能な一つのvector表現です。
    field_values: {}
    related_node_ids:
      - VectorIndex
    related_relation_ids: []
    expected_result:
      zh: 将 emb-17 识别为可被索引的 EmbeddingVector，不赋予其 VectorIndex 身份。
      en: Recognize emb-17 as an indexable EmbeddingVector without assigning it VectorIndex identity.
      ja: emb-17 を index 可能な EmbeddingVector と認定し、VectorIndex 同一性は付与しません。
    why_valid_or_invalid:
      zh: 被索引记录不拥有跨记录检索结构。
      en: An indexed record does not own the cross-record retrieval structure.
      ja: indexed recordは記録横断検索構造を所有しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-vector-index-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: VectorIndex-is_a-Index
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: VectorIndex 是 Index 的严格子类；种差为：索引配置声明向量类型、维数和距离度量并按向量距离检索记录。
    en: "VectorIndex is a strict subtype of Index; its reviewed differentia is: its configuration declares vector type, dimensionality, and distance metric and retrieves records by vector distance."
    ja: VectorIndex は Index の厳密なsubtypeで、審査済み種差は「設定がvector種別・次元・distance metricを宣言しvector距離でrecordを検索します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: VectorIndex-is_a-Index-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies Index and also satisfies the differentia: its configuration declares vector type, dimensionality, and distance metric and retrieves records by vector distance."
      explanations:
        zh: 仅当对象首先满足 Index 定义且满足种差“索引配置声明向量类型、维数和距离度量并按向量距离检索记录。”时成立。
        en: "Assert only when the object first satisfies Index and also satisfies the differentia: its configuration declares vector type, dimensionality, and distance metric and retrieves records by vector distance."
        ja: 対象がまず Index を満たし、さらに種差「設定がvector種別・次元・distance metricを宣言しvector距離でrecordを検索します。」を満たす時だけ成立します。
      source_claims:
        - claim-vector-index-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: VectorIndex-is_a-Index-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: vector-index-17 以稳定 index_id 声明 1536 维 dense 向量与 cosine 距离，并拥有多个不可变版本。
        en: vector-index-17 has a stable index_id, declares 1,536-dimensional dense vectors and cosine distance, and owns multiple immutable versions.
        ja: vector-index-17 は安定 index_id、1,536次元dense vector、cosine距離を宣言し、複数のimmutable版を所有します。
      field_values: {}
      related_node_ids:
        - VectorIndex
        - Index
      related_relation_ids:
        - VectorIndex-is_a-Index
      expected_result:
        zh: 将 vector-index-17 归入 VectorIndex，并继承长期 Index 身份。
        en: Classify vector-index-17 as VectorIndex and inherit long-lived Index identity.
        ja: vector-index-17 を VectorIndex と分類し、長期 Index 同一性を継承します。
      why_valid_or_invalid:
        zh: 长期索引身份满足 Index，向量形态、维数与距离度量构成其专门种差。
        en: Its persistent index identity satisfies Index, while vector form, dimension, and metric establish its specialization.
        ja: 長期index同一性が Index を満たし、vector形態・次元・metricが専用種差を成立させます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-vector-index-007
    - id: VectorIndex-is_a-Index-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 只管理词表和 IDF 的 tfidf-index-17 不是 VectorIndex。
        en: tfidf-index-17, which manages only vocabulary and IDF, is not a VectorIndex.
        ja: 語彙とIDFだけを管理する tfidf-index-17 は VectorIndexではありません。
      field_values: {}
      related_node_ids:
        - VectorIndex
        - Index
      related_relation_ids:
        - VectorIndex-is_a-Index
      expected_result:
        zh: 将 tfidf-index-17 保持为 TfIdfIndex，不归入 VectorIndex。
        en: Keep tfidf-index-17 as TfIdfIndex and do not classify it as VectorIndex.
        ja: tfidf-index-17 を TfIdfIndex に留め、VectorIndex に分類しません。
      why_valid_or_invalid:
        zh: tfidf-index-17 的配置是词表、IDF 与 analyzer，没有向量维数、向量类型或距离度量。
        en: tfidf-index-17 is configured by vocabulary, IDF, and analyzer and has no vector dimensionality, vector type, or distance metric.
        ja: tfidf-index-17 の設定は語彙・IDF・analyzer であり、vector 次元・vector 種別・distance metric を持ちません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-vector-index-007
  source_claims:
    - claim-vector-index-007
  distinct_fact_rationale:
    zh: is_a 说明 VectorDatabase 满足 MemoryStore 的持久化设施身份；hosts 说明它承载某个 VectorIndex；stores 说明 IndexEntry 持有某个 Representation。设施分类、索引承载与条目存储是三条不同事实。
    en: is_a states that VectorDatabase satisfies persistent MemoryStore facility identity; hosts states that it carries a VectorIndex; stores states that an IndexEntry holds a Representation. Facility classification, index hosting, and entry storage are distinct facts.
    ja: is_a は VectorDatabase が persistent MemoryStore facility identity を満たすこと、hosts は VectorIndex の収容、stores は IndexEntry の Representation 保持を示し、三 fact は異なります。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
