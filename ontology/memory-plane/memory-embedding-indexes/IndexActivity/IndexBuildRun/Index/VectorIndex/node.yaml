schema: moonweave.ai/ontology-node/v1
id: VectorIndex
kind: concept
labels:
  zh: 向量索引
  en: Vector index
  ja: ベクトル索引
semantics:
  short_definition:
    zh: 以 dense 向量相似度检索的 Index 子类。
    en: Index subtype for dense vector similarity retrieval.
    ja: dense vector 類似度検索の Index subtype。
  definition:
    zh: VectorIndex 是 Index 子类，固定 distance_metric（如 cosine）、vector_dimensions（如 1536）与 ANN 配置（HNSW M、ef_construction）。Pinecone create_index(metric=cosine, dimension=1536) 与 Qdrant hnsw_config 是典型映射；每条 IndexEntry 绑定 DenseVector/EmbeddingVector。
    en: VectorIndex is an Index subtype fixing distance_metric (e.g., cosine), vector_dimensions (e.g., 1536), and ANN config (HNSW M, ef_construction). Pinecone create_index(metric=cosine, dimension=1536) and Qdrant hnsw_config are typical mappings; each IndexEntry binds a DenseVector/EmbeddingVector.
    ja: VectorIndex は distance_metric（cosine 等）・vector_dimensions（1536 等）・ANN 設定（HNSW M/ef_construction）を固定する Index subtype。Pinecone create_index/Qdrant hnsw_config が典型。IndexEntry は DenseVector/EmbeddingVector に binding。
  why_needed:
    zh: 向量索引与 TF-IDF 或 hybrid 索引的 metric/dimension 约束不同，必须独立建模以免 upsert 维度不匹配被拒绝。
    en: Vector indexes differ from TF-IDF or hybrid in metric/dimension constraints; separate modeling prevents rejected upserts on dimension mismatch.
    ja: vector index は TF-IDF/hybrid と metric/dimension 制約が異なり、次元不一致 upsert 拒否を防ぐため独立建模。
  includes:
    - zh: 纳入 Pinecone cosine 1536 维索引与 Qdrant HNSW collection。
      en: Includes Pinecone cosine 1536-dim indexes and Qdrant HNSW collections.
      ja: Pinecone cosine 1536 次元 index と Qdrant HNSW collection。
  excludes:
    - zh: 排除 TfIdfIndex、HybridIndex 与 IndexEntry 单条记录。
      en: Excludes TfIdfIndex, HybridIndex, and individual IndexEntry records.
      ja: TfIdfIndex/HybridIndex/個別 IndexEntry を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Pinecone create_index(dimension=1536, metric=cosine) 映射 VectorIndex；Qdrant hnsw_config.m=16、ef_construct=100 写入 configuration_digest；upsert vector 维数必须匹配。
    en: Pinecone create_index(dimension=1536, metric=cosine) maps to VectorIndex; Qdrant hnsw_config.m=16, ef_construct=100 writes configuration_digest; upsert vector dimensions must match.
    ja: Pinecone create_index→VectorIndex。Qdrant hnsw_config→configuration_digest。upsert 次元一致必須。
  typical_input:
    - description: Pinecone vector index spec
      format: |
        pc.create_index(name="hybrid-docs", dimension=1536, metric="cosine")
      source_claims: [claim-vector-index-pinecone]
    - description: Qdrant HNSW config
      format: |
        {"hnsw_config": {"m": 16, "ef_construct": 100, "full_scan_threshold": 10000}}
      source_claims: [claim-vector-index-hnsw]
  typical_output:
    - description: Vector index identity projection
      format: |
        {
          "index_id": "index-17",
          "index_kind": "vector",
          "distance_metric": "cosine",
          "vector_dimensions": 1536,
          "hnsw_m": 16,
          "hnsw_ef_construct": 100
        }
      source_claims: [claim-vector-index-design]
  reference_implementations:
    - name: Pinecone Create Index
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      description: dimension and metric for vector indexes.
    - name: Qdrant Vector Index
      url: https://qdrant.tech/documentation/concepts/indexing/#vector-index
      description: HNSW m and ef_construct parameters.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 继承 Index.index_id。
        en: Inherits Index.index_id.
        ja: Index.index_id 継承。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-17
      allowed_values: []
      source_claims: [claim-vector-index-id]
    - id: distance_metric
      labels: {zh: 距离度量, en: Distance metric, ja: 距離計量}
      definitions:
        zh: Pinecone metric 或 ANN 相似度，如 cosine、dotproduct、euclidean。
        en: Pinecone metric or ANN similarity, e.g., cosine, dotproduct, euclidean.
        ja: Pinecone metric/ANN 類似度。cosine/dotproduct/euclidean。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: cosine
      allowed_values: [cosine, dotproduct, euclidean]
      source_claims: [claim-vector-index-pinecone]
    - id: vector_dimensions
      labels: {zh: 向量维度, en: Vector dimensions, ja: ベクトル次元}
      definitions:
        zh: 索引与 embedding 向量长度；必须与 OpenAI dimensions 一致。
        en: Length of index and embedding vectors; must match OpenAI dimensions parameter.
        ja: index/embedding vector 長。OpenAI dimensions と一致必須。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1536
      allowed_values: []
      source_claims: [claim-vector-index-pinecone]
    - id: hnsw_m
      labels: {zh: HNSW M 参数, en: HNSW M parameter, ja: HNSW M パラメータ}
      definitions:
        zh: HNSW 图每节点最大边数；可选，自托管 Qdrant 常见。
        en: Maximum edges per HNSW node; optional, common in self-hosted Qdrant.
        ja: HNSW 各 node 最大 edge 数。自ホスト Qdrant で optional。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 16
      allowed_values: []
      source_claims: [claim-vector-index-hnsw]
    - id: hnsw_ef_construct
      labels: {zh: HNSW ef_construct, en: HNSW ef_construct, ja: HNSW ef_construct}
      definitions:
        zh: HNSW 构建时候选列表大小。
        en: Candidate list size during HNSW construction.
        ja: HNSW 構築時 candidate list サイズ。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 100
      allowed_values: []
      source_claims: [claim-vector-index-hnsw]
  constraints:
    - id: vector-dimension-match
      severity: error
      expression_language: plain
      expression: Upserted DenseVector length must equal vector_dimensions.
      explanation:
        zh: 维度不匹配会被 Pinecone/Qdrant 拒绝。
        en: Dimension mismatch is rejected by Pinecone/Qdrant.
        ja: 次元不一致は Pinecone/Qdrant で拒否。
      source_claims: [claim-vector-index-pinecone]
  required_relations: []
examples:
  - id: VectorIndex-example-pinecone-cosine
    labels:
      zh: Pinecone cosine 1536 索引
      en: Pinecone cosine 1536 index
      ja: Pinecone cosine 1536 index
    descriptions:
      zh: index-17 映射 Pinecone hybrid-docs：dimension=1536, metric=cosine；text-embedding-3-small 产出 float[1536] 可 upsert。
      en: index-17 maps Pinecone hybrid-docs with dimension=1536, metric=cosine; text-embedding-3-small float[1536] vectors upsert successfully.
      ja: index-17→Pinecone hybrid-docs（1536, cosine）。text-embedding-3-small float[1536] upsert 可。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      version: ServerlessSpec cosine
    field_values:
      index_id: index-17
      distance_metric: cosine
      vector_dimensions: 1536
    related_node_ids:
      - VectorIndex
      - DenseVector
      - TextEmbedding
    related_relation_ids: []
    source_claims:
      - claim-vector-index-pinecone
      - claim-vector-index-design
  - id: VectorIndex-example-qdrant-hnsw
    labels:
      zh: Qdrant HNSW 配置
      en: Qdrant HNSW configuration
      ja: Qdrant HNSW 設定
    descriptions:
      zh: 自托管 Qdrant collection 创建 hnsw_config.m=16、ef_construct=100；IndexBuildRun 写入 index-17@42 configuration_digest。
      en: Self-hosted Qdrant collection sets hnsw_config.m=16, ef_construct=100; IndexBuildRun writes index-17@42 configuration_digest.
      ja: Qdrant hnsw_config m=16/ef_construct=100→index-17@42 configuration_digest。
    example_source:
      product: Qdrant
      url: https://qdrant.tech/documentation/concepts/indexing/#vector-index
      version: hnsw_config
    field_values:
      hnsw_m: 16
      hnsw_ef_construct: 100
      index_id: index-17
    related_node_ids:
      - VectorIndex
      - IndexBuildRun
    related_relation_ids: []
    source_claims:
      - claim-vector-index-hnsw
      - claim-vector-index-design
  - id: VectorIndex-example-not-hybrid
    labels:
      zh: 向量索引非混合
      en: Vector index is not hybrid
      ja: vector index は hybrid ではない
    descriptions:
      zh: hybrid-index-17 同时声明 dense+sparse 与 fusion_profile，是 HybridIndex；仅 cosine dense 1536 维是 VectorIndex。
      en: hybrid-index-17 declares dense+sparse and fusion_profile—it is HybridIndex; cosine dense 1536-dim only is VectorIndex.
      ja: hybrid-index-17（dense+sparse+fusion）は HybridIndex。cosine dense 1536 のみ VectorIndex。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - VectorIndex
      - HybridIndex
    related_relation_ids: []
    source_claims:
      - claim-vector-index-design
parent_relation:
  id: VectorIndex-is_a-Index
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种索引
    en: is an index
    ja: 索引の一種
  definitions:
    zh: VectorIndex —is_a→ Index 因为它固定 dense 向量 metric、dimension 与 ANN 配置。
    en: VectorIndex —is_a→ Index because it fixes dense vector metric, dimension, and ANN configuration.
    ja: VectorIndex —is_a→ Index は dense vector metric/dimension/ANN 設定固定のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: VectorIndex-is_a-Index-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when index_kind is vector and distance_metric with vector_dimensions are declared.
      explanations:
        zh: 仅当满足向量索引种差时建立该边。
        en: Assert only when vector index differentia holds.
        ja: vector index 種差成立時のみ assert。
      source_claims: [claim-vector-index-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-vector-index-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-vector
    title: Pinecone Create Index Guide
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/create-an-index
    source_type: official-doc
    relevance: dimension and metric for vector indexes.
  - id: src-qdrant-hnsw
    title: Qdrant Vector Index Documentation
    publisher: Qdrant
    url: https://qdrant.tech/documentation/concepts/indexing/#vector-index
    source_type: official-doc
    relevance: HNSW m and ef_construct.
  - id: src-vector-index-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: VectorIndex versus HybridIndex boundary.
source_claims:
  - id: claim-vector-index-pinecone
    source: src-pinecone-vector
    supports: Pinecone create_index requires dimension and metric; upsert rejects mismatched dimensions.
    locator: Create an index
    evidence_kind: primary-doc
    confidence: high
  - id: claim-vector-index-hnsw
    source: src-qdrant-hnsw
    supports: Qdrant documents HNSW m and ef_construct affecting build quality and query behavior.
    locator: hnsw_config
    evidence_kind: primary-doc
    confidence: high
  - id: claim-vector-index-design
    source: src-vector-index-design
    supports: VectorIndex fixes dense vector metric, dimensions, and optional HNSW parameters.
    locator: VectorIndex boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-vector-index-id
    source: src-vector-index-design
    supports: index_id inherits from Index identity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
