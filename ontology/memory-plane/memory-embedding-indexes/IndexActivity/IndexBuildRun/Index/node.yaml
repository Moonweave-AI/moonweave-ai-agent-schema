schema: moonweave.ai/ontology-node/v1
id: Index
kind: concept
status: accepted
labels:
  zh: 索引
  en: Index
  ja: 索引
semantics:
  short_definition:
    zh: 具有独立身份、配置与版本序列的检索结构。
    en: A retrieval structure with independent identity, configuration, and version sequence.
    ja: 独立同一性・設定・版系列を持つ検索構造です。
  definition:
    zh: Index 是可寻址的检索结构身份，规定索引类型与配置并拥有一个或多个不可变 IndexVersion；它不是某次构建运行、一个版本快照或向量数据库服务。
    en: Index is an addressable retrieval-structure identity that fixes index kind and configuration and owns one or more immutable IndexVersion values; it is not a build run, one version snapshot, or a vector-database service.
    ja: Index はindex種別と設定を固定し一つ以上のimmutable IndexVersionを持つaddressable検索構造同一性で、build run・一版snapshot・vector-database serviceではありません。
  why_needed:
    zh: 把长期索引身份与版本快照及宿主服务分开。
    en: Separates long-lived index identity from version snapshots and hosting service.
    ja: 長期index同一性を版snapshot・hosting serviceから分離します。
  includes:
    - zh: 纳入向量、TF-IDF 与混合检索索引身份。
      en: Includes vector, TF-IDF, and hybrid retrieval-index identities.
      ja: vector・TF-IDF・hybrid検索index同一性を含みます。
  excludes:
    - zh: 排除 IndexVersion、IndexBuildRun 和 VectorDatabase。
      en: Excludes IndexVersion, IndexBuildRun, and VectorDatabase.
      ja: IndexVersion・IndexBuildRun・VectorDatabaseを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - index_id
  fields:
    - id: index_id
      labels:
        zh: 索引标识
        en: index ID
        ja: index ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识逻辑索引。
        en: Stable identifier for the logical index.
        ja: logical indexの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: index-17
      source_claims:
        - claim-index-002
    - id: index_kind
      labels:
        zh: 索引种类
        en: index kind
        ja: index種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 vector、tfidf 或 hybrid。
        en: Distinguishes vector, tfidf, or hybrid form.
        ja: vector・tfidf・hybrid形態を区別します。
      allowed_values: []
      pattern: null
      example_value: vector
      source_claims:
        - claim-index-003
    - id: configuration_digest
      labels:
        zh: 配置摘要
        en: configuration digest
        ja: 設定digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定逻辑索引兼容性约束。
        en: Fixes logical-index compatibility constraints.
        ja: logical-index互換制約を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:index-config17
      source_claims:
        - claim-index-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: Index-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引正例
      en: "Positive case: Index"
      ja: 索引正例
    scenario_id: null
    descriptions:
      zh: index-17 是 vector 索引身份并拥有多个版本。
      en: index-17 is a vector-index identity owning multiple versions.
      ja: index-17 は複数版を持つvector-index同一性です。
    field_values:
      index_id: index-17
      index_kind: vector
      configuration_digest: sha256:index-config17
    related_node_ids:
      - Index
    related_relation_ids: []
    expected_result:
      zh: 将 index-17 识别为可持续拥有多个版本的 Index 身份。
      en: Recognize index-17 as the enduring Index identity that can own multiple versions.
      ja: index-17 を複数版を継続所有できる Index 同一性として認定します。
    why_valid_or_invalid:
      zh: 稳定 index_id、索引类型与配置摘要共同标识长期检索结构，而非某一次构建产物。
      en: The stable index_id, index kind, and configuration digest jointly identify a long-lived retrieval structure rather than one build artifact.
      ja: 安定した index_id・index 種別・設定 digest が長期検索構造を共同識別し、一回の build 産物とは区別されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-005
  - id: Index-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引边界例
      en: "Boundary case: Index"
      ja: 索引境界例
    scenario_id: null
    descriptions:
      zh: index-17@42 是一次构建完成后的不可变快照。
      en: index-17@42 is an immutable snapshot produced by one build.
      ja: index-17@42 は一回のbuildで生成したimmutable snapshotです。
    field_values: {}
    related_node_ids:
      - Index
    related_relation_ids: []
    expected_result:
      zh: 将 index-17@42 识别为 IndexVersion，不把该快照重分类为 Index。
      en: Recognize index-17@42 as an IndexVersion and do not reclassify the snapshot as Index.
      ja: index-17@42 を IndexVersion と認定し、この snapshot を Index に再分類しません。
    why_valid_or_invalid:
      zh: 版本快照隶属索引但不等于长期索引身份。
      en: A version snapshot belongs to an index but is not the long-lived index identity.
      ja: 版snapshotはindexに属しますが長期index同一性ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexBuildRun-builds-Index
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 构建索引
    en: builds
    ja: index を構築する
  definitions:
    zh: IndexBuildRun builds Index 表示一次具名构建运行依照固定配置把已准备表示写入具有独立身份的检索结构，并提交可识别的初始或后继版本；一般 IndexActivity 或只计算 Embedding 的运行不能据此推断构建了 Index。
    en: IndexBuildRun builds Index means that one identified build run writes prepared representations into an independently identified retrieval structure under fixed configuration and commits an identifiable initial or successor version; a generic IndexActivity or a run that only computes embeddings does not thereby build an Index.
    ja: IndexBuildRun builds Index は、一回の識別済み build run が固定 configuration で prepared representations を独立 identity の retrieval structure へ書き、識別可能な initial/successor version を commit することを示します。generic IndexActivity や embedding 計算だけの run から Index 構築を推論できません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 运行可失败或重建同一索引，类级展示不规定每个运行和索引实例的统一数量。
    en: A run may fail or rebuild the same index; the class-level display sets no uniform count for run or index instances.
    ja: run は failure または同一 index rebuild の場合があり、class-level 表示は instance 数を一律規定しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由构建运行构建
      en: built by index run
      ja: index build run により構築される
  conditions:
    - id: IndexBuildRun-builds-Index-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the same IndexBuildRun records the target Index identity, fixed schema and vector configuration, committed IndexVersion, and successful write or import boundary; planning, embedding computation, or a failed uncommitted write is insufficient.
      explanations:
        zh: 仅当同一次 IndexBuildRun 记录目标 Index 身份、固定 schema 与向量配置、已提交 IndexVersion 以及成功写入或导入边界时成立；计划、仅计算 embedding 或失败且未提交的写入均不足。
        en: Assert only when the same IndexBuildRun records the target Index identity, fixed schema and vector configuration, committed IndexVersion, and successful write or import boundary; planning, embedding computation, or a failed uncommitted write is insufficient.
        ja: 同一 IndexBuildRun が target Index ID、固定 schema/vector configuration、committed IndexVersion、successful write/import boundary を記録した場合だけ成立します。planning、embedding 計算のみ、failed uncommitted write は不十分です。
      source_claims:
        - claim-index-007
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: IndexBuildRun-builds-Index-example-positive-001
      kind: positive
      labels:
        zh: 提交向量索引版本
        en: Committed vector-index version
        ja: vector index version commit
      scenario_id: null
      descriptions:
        zh: 运行 `index-build/22` 以维度 1536、cosine 距离和 schema `docs-v4` 将表示导入 `index/knowledge`，成功提交 `version/2026-07-16T10:20Z`。
        en: Run `index-build/22` imports representations into `index/knowledge` with dimension 1536, cosine distance, and schema `docs-v4`, then commits `version/2026-07-16T10:20Z`.
        ja: run `index-build/22` は dimension 1536、cosine distance、schema `docs-v4` で representations を `index/knowledge` に import し、`version/2026-07-16T10:20Z` を commit します。
      field_values: {}
      related_node_ids:
        - IndexBuildRun
        - Index
      related_relation_ids:
        - IndexBuildRun-builds-Index
      expected_result:
        zh: 建立 builds 边并保留配置与提交版本。
        en: A builds edge is created with configuration and committed version retained.
        ja: builds 辺を作り configuration と committed version を保持します。
      why_valid_or_invalid:
        zh: 目标索引身份、配置、写入边界和提交版本完整。
        en: Target index identity, configuration, write boundary, and committed version are complete.
        ja: target index identity、configuration、write boundary、committed version が揃っています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-008
    - id: IndexBuildRun-builds-Index-example-boundary-001
      kind: boundary
      labels:
        zh: 仅计算嵌入边界
        en: Embedding-only run boundary
        ja: embedding-only run 境界
      scenario_id: null
      descriptions:
        zh: 运行 `embedding/91` 生成 1536 维向量并保存到临时文件，没有目标 Index、schema、写入或提交版本。
        en: Run `embedding/91` computes 1536-dimensional vectors and saves a temporary file but has no target Index, schema, write, or committed version.
        ja: run `embedding/91` は 1536-dimensional vector を計算し temporary file に保存しますが、target Index・schema・write・committed version がありません。
      field_values: {}
      related_node_ids:
        - IndexBuildRun
        - Index
      related_relation_ids:
        - IndexBuildRun-builds-Index
      expected_result:
        zh: 记录 Representation 产物，不创建 builds Index 边。
        en: The Representation output is recorded without a builds Index edge.
        ja: Representation output を記録しますが builds Index 辺は作りません。
      why_valid_or_invalid:
        zh: 表示计算与索引构建有不同身份和提交边界。
        en: Representation computation and index construction have different identities and commit boundaries.
        ja: representation computation と index construction は identity と commit boundary が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-009
  source_claims:
    - claim-index-010
    - claim-index-011
  distinct_fact_rationale:
    zh: builds 记录运行提交哪个 Index；consumes 记录运行读取哪些 Representation；produces IndexVersion 记录该次构建生成的版本产物，三者回答不同问题。
    en: builds records which Index the run commits; consumes records which Representations it reads; produces IndexVersion records the version artifact generated. The three facts answer different questions.
    ja: builds は run が commit する Index、consumes は入力 Representation、produces IndexVersion は生成 version artifact を記録し、質問が異なります。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-retrieval-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex 检索文档、Elasticsearch RRF、Cohere Rerank 与 ColBERT/cross-encoder 文献逐项核验概念定义、字段、关系与 RAG 检索管线结构。
    en: Verified concept definitions, fields, relations, and RAG retrieval pipeline structure against OpenAI Embeddings, Pinecone/Weaviate, LangChain/LlamaIndex retrieval docs, Elasticsearch RRF, Cohere Rerank, and ColBERT/cross-encoder literature.
    ja: OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex retrieval docs、Elasticsearch RRF、Cohere Rerank、ColBERT/cross-encoder 文献に照らし概念定義・フィールド・関係・RAG retrieval pipeline 構造を個別検証しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-index-001
    source: eng-vector-pinecone-indexing
    supports: Pinecone defines index identity, vector type, dimension/metric configuration, records, namespaces, and update operations.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-002
    source: eng-vector-pinecone-indexing
    supports: Index.index_id records the long-lived logical index identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-003
    source: eng-vector-pinecone-indexing
    supports: Index.index_kind records the retrieval structure family; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-004
    source: eng-vector-pinecone-indexing
    supports: Index.configuration_digest records stable index compatibility configuration; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-005
    source: eng-vector-pinecone-indexing
    supports: Pinecone defines an index as the highest-level organizational unit containing records and configuration.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-006
    source: eng-vector-pinecone-indexing
    supports: Pinecone separates index identity/configuration from the records and updates stored within it.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-007
    source: eng-vector-pinecone-indexing
    supports: Pinecone documents indexes, vector records, upsert/import boundaries, namespaces, and embedding-model compatibility. Reifying IndexBuildRun and its primary layout is Moonweave design inference.
    locator: Indexing overview > Indexes, vector records, upsert versus import, and embedding model compatibility
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-008
    source: eng-vector-pinecone-indexing
    supports: The example uses documented index configuration and data-ingestion boundaries; run identity and version commit are Moonweave provenance design.
    locator: Indexing overview > Indexes and data ingestion
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-009
    source: eng-vector-pinecone-indexing
    supports: Pinecone distinguishes vector embedding from ingestion into an index; the negative activity distinction is Moonweave ontology design.
    locator: Indexing overview > Vector embedding versus data ingestion
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-010
    source: eng-vector-pinecone-indexing
    supports: Pinecone directly documents index identity/configuration and vector ingestion by upsert or import. It does not define Moonweave IndexBuildRun or builds; activity reification, canonical direction, commit condition, and primary layout are reviewed design inferences.
    locator: Indexing overview > Indexes, vector embedding, and data ingestion
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-011
    source: eng-vector-qdrant-data-model
    supports: Qdrant grounds independently named collections of points with vector configuration and payload. Moonweave maps this operational structure to Index while keeping build-run semantics explicit.
    locator: Manage data > Collections, points, vectors, and collection configuration
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
