schema: moonweave.ai/ontology-node/v1
id: Index
kind: concept
labels:
  zh: 索引
  en: Index
  ja: 索引
semantics:
  short_definition:
    zh: 带配置与版本序列的长期检索结构身份。
    en: Long-lived retrieval structure identity with configuration and version series.
    ja: 設定と版系列を持つ長期 retrieval structure identity。
  definition:
    zh: Index 是可寻址的逻辑检索结构，固定 index_kind（vector、tfidf、hybrid）与 configuration_digest，拥有 IndexVersion 不可变快照序列。Pinecone index name 与 Chroma collection name 映射 index_id；VectorDatabase 部署端点归 storage 模块，此处只记录 hosts 关系。
    en: Index is an addressable logical retrieval structure fixing index_kind (vector, tfidf, hybrid) and configuration_digest, owning a series of immutable IndexVersions. Pinecone index name and Chroma collection name map to index_id; VectorDatabase deployment endpoints belong to storage—only the hosts relation is recorded here.
    ja: Index は index_kind（vector/tfidf/hybrid）と configuration_digest を固定し IndexVersion 不変版系列を持つ addressable logical retrieval structure。Pinecone index name/Chroma collection name→index_id。VectorDatabase 端点は storage 模块。
  why_needed:
    zh: 长期 index_id 与单次 index-17@42 快照分离，才能追踪 Pinecone metric/dimension 变更而不混淆版本。
    en: Separating long-lived index_id from one-off index-17@42 snapshots tracks Pinecone metric/dimension changes without conflating versions.
    ja: 長期 index_id と index-17@42 snapshot 分離で Pinecone metric/dimension 変更を版と混同しない。
  includes:
    - zh: 纳入 VectorIndex、TfIdfIndex、HybridIndex 等具 index_id 与 configuration_digest 的逻辑索引。
      en: Includes VectorIndex, TfIdfIndex, HybridIndex, and other logical indexes with index_id and configuration_digest.
      ja: index_id/configuration_digest を持つ VectorIndex/TfIdfIndex/HybridIndex 等。
  excludes:
    - zh: 排除 IndexVersion、IndexBuildRun 与 VectorDatabase 服务端点。
      en: Excludes IndexVersion, IndexBuildRun, and VectorDatabase service endpoints.
      ja: IndexVersion/IndexBuildRun/VectorDatabase 端点を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Pinecone create_index(name, dimension, metric) 与 Chroma get_or_create_collection(name) 映射 Index；configuration_digest 含 metric、dimension、embedding_function 或 HNSW 参数摘要。
    en: Pinecone create_index(name, dimension, metric) and Chroma get_or_create_collection(name) map to Index; configuration_digest includes metric, dimension, embedding_function, or HNSW parameter digest.
    ja: Pinecone create_index/Chroma get_or_create_collection→Index。configuration_digest に metric/dimension/embedding_function/HNSW 摘要。
  typical_input:
    - description: Pinecone create index
      format: |
        pc.create_index(
          name="hybrid-docs",
          dimension=1536,
          metric="cosine",
          spec=ServerlessSpec(cloud="aws", region="us-east-1")
        )
      source_claims: [claim-index-pinecone]
  typical_output:
    - description: Moonweave-local index identity
      format: |
        {
          "index_id": "index-17",
          "index_kind": "vector",
          "configuration_digest": "sha256:cosine-1536-hnsw-m16"
        }
      source_claims: [claim-index-design]
  reference_implementations:
    - name: Pinecone Indexes
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      description: Index identity, dimension, and metric.
    - name: Chroma Collections
      url: https://docs.trychroma.com/docs/collections/manage-collections
      description: Collection name and embedding function binding.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 稳定标识逻辑 Index；IndexVersion 在其下展开。
        en: Stable identifier for logical Index; IndexVersions unfold beneath it.
        ja: 論理 Index の安定 ID。その下に IndexVersion。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-17
      allowed_values: []
      source_claims: [claim-index-id]
    - id: index_kind
      labels: {zh: 索引种类, en: Index kind, ja: 索引種別}
      definitions:
        zh: vector、tfidf 或 hybrid。
        en: vector, tfidf, or hybrid.
        ja: vector/tfidf/hybrid。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: vector
      allowed_values: [vector, tfidf, hybrid]
      source_claims: [claim-index-kind]
    - id: configuration_digest
      labels: {zh: 配置摘要, en: Configuration digest, ja: 設定 digest}
      definitions:
        zh: 固定 metric、dimension、fusion 或 HNSW 等兼容性约束的 SHA-256。
        en: SHA-256 fixing metric, dimension, fusion, or HNSW compatibility constraints.
        ja: metric/dimension/fusion/HNSW 等互換制約 SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:cosine-1536-hnsw-m16
      allowed_values: []
      source_claims: [claim-index-config]
  constraints: []
  required_relations: []
examples:
  - id: Index-example-pinecone-vector
    labels:
      zh: Pinecone 向量索引
      en: Pinecone vector index
      ja: Pinecone vector index
    descriptions:
      zh: index-17 映射 Pinecone hybrid-docs（dimension=1536, metric=cosine）；拥有 index-17@1 到 @42 版本序列，configuration_digest 含 metric 与 dimension。
      en: index-17 maps Pinecone hybrid-docs (dimension=1536, metric=cosine); owns index-17@1 through @42; configuration_digest includes metric and dimension.
      ja: index-17→Pinecone hybrid-docs（1536, cosine）。@1–@42 版系列。configuration_digest に metric/dimension。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      version: ServerlessSpec
    field_values:
      index_id: index-17
      index_kind: vector
      configuration_digest: sha256:cosine-1536
    related_node_ids:
      - Index
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-index-pinecone
      - claim-index-design
  - id: Index-example-chroma-collection
    labels:
      zh: Chroma 集合索引
      en: Chroma collection index
      ja: Chroma collection index
    descriptions:
      zh: index-7 映射 Chroma docs collection，configuration_digest 含 OpenAIEmbeddingFunction(text-embedding-3-small) 绑定。
      en: index-7 maps Chroma docs collection; configuration_digest includes OpenAIEmbeddingFunction(text-embedding-3-small) binding.
      ja: index-7→Chroma docs collection。OpenAIEmbeddingFunction binding を configuration_digest に含む。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/collections/manage-collections
      version: get_or_create_collection
    field_values:
      index_id: index-7
      index_kind: vector
      collection_name: docs
    related_node_ids:
      - Index
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-index-chroma
      - claim-index-design
  - id: Index-example-not-version
    labels:
      zh: 索引非版本快照
      en: Index is not version snapshot
      ja: Index は version snapshot ではない
    descriptions:
      zh: index-17@42 是 IndexVersion 不可变快照；index-17 是长期身份可拥有多个 @N 版本。
      en: index-17@42 is an immutable IndexVersion snapshot; index-17 is the long-lived identity owning multiple @N versions.
      ja: index-17@42 は IndexVersion。index-17 は複数 @N を持つ長期 identity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - Index
      - IndexVersion
    related_relation_ids: []
    source_claims:
      - claim-index-design
parent_relation:
  id: IndexBuildRun-builds-Index
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 由构建运行构建
    en: built by index build run
    ja: index build run により構築
  definitions:
    zh: IndexBuildRun builds Index 表示成功构建运行把 Representation 写入具 index_id 的检索结构并提交 IndexVersion。
    en: IndexBuildRun builds Index means a successful build run writes Representations into a retrieval structure with index_id and commits an IndexVersion.
    ja: IndexBuildRun builds Index は成功 build が index_id 付き retrieval structure へ write し IndexVersion commit。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 运行可失败或重建同一索引。
    en: A run may fail or rebuild the same index.
    ja: run は failure または同一 index rebuild 可。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse builds, ja: 逆方向読取}
  conditions:
    - id: IndexBuildRun-builds-Index-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the build run records target index_id, configuration, and a committed IndexVersion.
      explanations:
        zh: 仅当构建成功提交版本时成立。
        en: Assert only when the build successfully commits a version.
        ja: 成功 commit 時のみ assert。
      source_claims: [claim-index-design]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-design]
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-pinecone-index
    title: Pinecone Indexing Overview
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/create-an-index
    source_type: official-doc
    relevance: Index identity, dimension, metric, records.
  - id: src-chroma-collections
    title: Chroma Manage Collections
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/manage-collections
    source_type: official-doc
    relevance: Collection as logical index identity.
  - id: src-index-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Index versus IndexVersion and store hosting.
source_claims:
  - id: claim-index-pinecone
    source: src-pinecone-index
    supports: Pinecone defines index as highest-level unit with dimension, metric, and configuration.
    locator: Create an index
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-chroma
    source: src-chroma-collections
    supports: Chroma collections provide named logical index containers with embedding functions.
    locator: Manage collections
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-design
    source: src-index-design
    supports: Index is long-lived identity distinct from IndexVersion snapshots and VectorDatabase endpoints.
    locator: Index boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-id
    source: src-index-design
    supports: index_id identifies logical index lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-kind
    source: src-index-design
    supports: index_kind distinguishes vector, tfidf, and hybrid retrieval structures.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-config
    source: src-index-design
    supports: configuration_digest pins index compatibility constraints.
    locator: structure
    evidence_kind: design-inference
    confidence: high
