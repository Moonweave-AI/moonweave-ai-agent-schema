schema: moonweave.ai/ontology-node/v1
id: HybridIndex
kind: concept
labels:
  zh: 混合索引
  en: Hybrid index
  ja: ハイブリッド索引
semantics:
  short_definition:
    zh: 在同一 index_id 下融合 dense 与 sparse 信号的 Index。
    en: Index fusing dense and sparse signals under one index_id.
    ja: 同一 index_id で dense/sparse 信号を fusion する Index。
  definition:
    zh: HybridIndex 是 Index 子类，同时声明 signal_plan（dense+sparse）与 fusion_profile（权重或 RRF 等算法）。Pinecone hybrid search（dense+sparse vectors）与 Qdrant hybrid query 是典型映射；不是应用层分别查两索引后临时拼接。
    en: HybridIndex is an Index subtype declaring signal_plan (dense+sparse) and fusion_profile (weights or RRF algorithm). Pinecone hybrid search (dense+sparse vectors) and Qdrant hybrid query are typical mappings—not ad-hoc concatenation of two separate index queries.
    ja: HybridIndex は signal_plan（dense+sparse）と fusion_profile（weight/RRF 等）を宣言する Index subtype。Pinecone hybrid/Qdrant hybrid query が典型。二 index 結果の事後連結ではない。
  why_needed:
    zh: 融合配置必须是 index 身份的一部分，否则无法复现 Pinecone alpha 参数或 Qdrant prefetch 权重。
    en: Fusion configuration must be part of index identity; otherwise Pinecone alpha or Qdrant prefetch weights cannot be reproduced.
    ja: fusion 設定は index identity の一部でなければ Pinecone alpha/Qdrant prefetch weight を再現不可。
  includes:
    - zh: 纳入 Pinecone dense+sparse hybrid index 与 Qdrant named sparse+dense vectors。
      en: Includes Pinecone dense+sparse hybrid indexes and Qdrant named sparse+dense vectors.
      ja: Pinecone dense+sparse hybrid と Qdrant named sparse+dense vectors。
  excludes:
    - zh: 排除单一 VectorIndex 与查询后临时 merge。
      en: Excludes single-signal VectorIndex and post-query ad-hoc merging.
      ja: 単一 VectorIndex/query 後 ad-hoc merge を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Pinecone upsert 同时传 values（dense float[]）与 sparse_values（indices/values）；query 时 alpha 控制融合。Qdrant collection 可声明 named vectors dense+sparse；fusion_profile 写入 configuration_digest。
    en: Pinecone upsert passes values (dense float[]) and sparse_values (indices/values); query alpha controls fusion. Qdrant collections declare named vectors dense+sparse; fusion_profile writes configuration_digest.
    ja: Pinecone upsert で values+sparse_values。query alpha で fusion。Qdrant named vectors dense+sparse。fusion_profile→configuration_digest。
  typical_input:
    - description: Pinecone hybrid upsert
      format: |
        index.upsert(vectors=[{
          "id": "chunk-17",
          "values": [0.01, -0.02, ...],
          "sparse_values": {"indices": [10, 45, 892], "values": [0.8, 0.5, 0.3]}
        }])
      source_claims: [claim-hybrid-index-pinecone]
    - description: Qdrant hybrid query
      format: |
        client.query_points(
          collection_name="hybrid-docs",
          prefetch=[{"query": dense_vector, "using": "dense"}, {"query": sparse_vector, "using": "sparse"}],
          query=FusionQuery(fusion="rrf")
        )
      source_claims: [claim-hybrid-index-qdrant]
  typical_output:
    - description: Hybrid index identity
      format: |
        {
          "index_id": "hybrid-index-17",
          "index_kind": "hybrid",
          "signal_plan": "dense+sparse",
          "fusion_profile": "weighted:0.7/0.3"
        }
      source_claims: [claim-hybrid-index-design]
  reference_implementations:
    - name: Pinecone Hybrid Search
      url: https://docs.pinecone.io/guides/search/hybrid-search
      description: Dense and sparse vectors with fusion.
    - name: Qdrant Hybrid Queries
      url: https://qdrant.tech/documentation/concepts/hybrid-queries/
      description: Named vectors and RRF fusion.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 继承 Index.index_id；单一 index_id 覆盖 dense 与 sparse 通道。
        en: Inherits Index.index_id; one index_id covers dense and sparse channels.
        ja: Index.index_id 継承。単一 index_id が dense/sparse 両 channel。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: hybrid-index-17
      allowed_values: []
      source_claims: [claim-hybrid-index-id]
    - id: signal_plan
      labels: {zh: 信号计划, en: Signal plan, ja: signal plan}
      definitions:
        zh: 参与融合的检索信号族，如 dense+sparse。
        en: Retrieval signal families in fusion, e.g., dense+sparse.
        ja: fusion 参加 signal 族。dense+sparse 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dense+sparse
      allowed_values: []
      source_claims: [claim-hybrid-index-signals]
    - id: fusion_profile
      labels: {zh: 融合配置, en: Fusion profile, ja: fusion profile}
      definitions:
        zh: 固定权重、alpha 或 RRF 等可复现融合算法。
        en: Fixed weights, alpha, or RRF and other reproducible fusion algorithms.
        ja: 固定 weight/alpha/RRF 等再現可能 fusion algorithm。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: weighted:0.7/0.3
      allowed_values: []
      source_claims: [claim-hybrid-index-fusion]
  constraints: []
  required_relations: []
examples:
  - id: HybridIndex-example-pinecone-hybrid
    labels:
      zh: Pinecone 混合索引
      en: Pinecone hybrid index
      ja: Pinecone hybrid index
    descriptions:
      zh: hybrid-index-17 upsert 同时含 dense float[1536] 与 sparse_values {indices, values}（BM25/SPLADE）；query alpha=0.7 融合 semantic 与 lexical 信号。
      en: hybrid-index-17 upsert includes dense float[1536] and sparse_values {indices, values} (BM25/SPLADE); query alpha=0.7 fuses semantic and lexical signals.
      ja: hybrid-index-17 upsert に dense float[1536]+sparse_values。query alpha=0.7 で semantic/lexical fusion。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/search/hybrid-search
      version: dense+sparse upsert
    field_values:
      index_id: hybrid-index-17
      signal_plan: dense+sparse
      fusion_profile: alpha:0.7
    related_node_ids:
      - HybridIndex
      - DenseVector
      - SparseVector
    related_relation_ids: []
    source_claims:
      - claim-hybrid-index-pinecone
      - claim-hybrid-index-design
  - id: HybridIndex-example-qdrant-rrf
    labels:
      zh: Qdrant RRF 混合
      en: Qdrant RRF hybrid
      ja: Qdrant RRF hybrid
    descriptions:
      zh: Qdrant hybrid-docs collection 声明 named vectors dense（1536）与 sparse；prefetch 双路后 FusionQuery(rrf) 融合，fusion_profile=rrf。
      en: Qdrant hybrid-docs collection declares named vectors dense (1536) and sparse; dual prefetch then FusionQuery(rrf) fusion with fusion_profile=rrf.
      ja: Qdrant named vectors dense/sparse→prefetch 双路→FusionQuery(rrf)。fusion_profile=rrf。
    example_source:
      product: Qdrant
      url: https://qdrant.tech/documentation/concepts/hybrid-queries/
      version: RRF fusion
    field_values:
      index_id: hybrid-index-17
      fusion_profile: rrf
      signal_plan: dense+sparse
    related_node_ids:
      - HybridIndex
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-hybrid-index-qdrant
      - claim-hybrid-index-design
  - id: HybridIndex-example-not-concat
    labels:
      zh: 混合非临时拼接
      en: Hybrid is not ad-hoc concat
      ja: hybrid は ad-hoc concat ではない
    descriptions:
      zh: 应用分别查 vector-index-17 与 bm25-index-8 后 merge 结果没有统一 index_id 与 fusion_profile，不是 HybridIndex。
      en: Querying vector-index-17 and bm25-index-8 separately then merging lacks unified index_id and fusion_profile—not HybridIndex.
      ja: 二 index 別 query+merge は統一 index_id/fusion_profile なし→HybridIndex ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - HybridIndex
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-hybrid-index-design
parent_relation:
  id: HybridIndex-is_a-Index
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种索引
    en: is an index
    ja: 索引の一種
  definitions:
    zh: HybridIndex —is_a→ Index 因为它声明至少两路检索信号与可复现 fusion_profile。
    en: HybridIndex —is_a→ Index because it declares at least two retrieval signals and a reproducible fusion_profile.
    ja: HybridIndex —is_a→ Index は二以上 signal+再現可能 fusion_profile 宣言のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: HybridIndex-is_a-Index-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when signal_plan declares at least two signal families and fusion_profile is pinned.
      explanations:
        zh: 仅当满足混合索引种差时建立该边。
        en: Assert only when hybrid index differentia holds.
        ja: hybrid index 種差成立時のみ assert。
      source_claims: [claim-hybrid-index-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-hybrid-index-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-hybrid
    title: Pinecone Hybrid Search
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/hybrid-search
    source_type: official-doc
    relevance: Dense and sparse vectors with alpha fusion.
  - id: src-qdrant-hybrid
    title: Qdrant Hybrid Queries
    publisher: Qdrant
    url: https://qdrant.tech/documentation/concepts/hybrid-queries/
    source_type: official-doc
    relevance: Named vectors and RRF prefetch fusion.
  - id: src-hybrid-index-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: HybridIndex versus ad-hoc merge boundary.
source_claims:
  - id: claim-hybrid-index-pinecone
    source: src-pinecone-hybrid
    supports: Pinecone hybrid search combines dense and sparse vectors with configurable fusion.
    locator: Hybrid search guide
    evidence_kind: primary-doc
    confidence: high
  - id: claim-hybrid-index-qdrant
    source: src-qdrant-hybrid
    supports: Qdrant supports named dense and sparse vectors with RRF fusion queries.
    locator: Hybrid queries
    evidence_kind: primary-doc
    confidence: high
  - id: claim-hybrid-index-design
    source: src-hybrid-index-design
    supports: HybridIndex requires predeclared signal_plan and fusion_profile under one index_id.
    locator: HybridIndex boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-hybrid-index-id
    source: src-hybrid-index-design
    supports: index_id covers both dense and sparse channels.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-hybrid-index-signals
    source: src-hybrid-index-design
    supports: signal_plan declares participating retrieval signals.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-hybrid-index-fusion
    source: src-hybrid-index-design
    supports: fusion_profile pins reproducible fusion algorithm or weights.
    locator: structure
    evidence_kind: design-inference
    confidence: high
