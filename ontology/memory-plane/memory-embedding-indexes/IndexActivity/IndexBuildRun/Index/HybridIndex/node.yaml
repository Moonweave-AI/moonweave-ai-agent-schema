schema: moonweave.ai/ontology-node/v1
id: HybridIndex
kind: concept
status: accepted
labels:
  zh: 混合索引
  en: Hybrid index
  ja: ハイブリッド索引
semantics:
  short_definition:
    zh: 在同一检索结构中组合 dense 与 sparse 信号的 Index。
    en: An Index combining dense and sparse signals in one retrieval structure.
    ja: 一つの検索構造でdenseとsparse信号を組み合わせる Index です。
  definition:
    zh: HybridIndex 是同时声明至少两类检索信号及融合策略的 Index，常组合 dense 语义向量与 sparse 词项向量；它不是两个结果列表在应用层临时拼接。
    en: HybridIndex is an Index declaring at least two retrieval-signal families and a fusion strategy, commonly dense semantic and sparse lexical vectors; it is not an ad-hoc application-level concatenation of two result lists.
    ja: HybridIndex は少なくとも二種の検索signalとfusion strategyを宣言し通常dense semanticとsparse lexical vectorを組み合わせる Index で、application層で二結果listを一時連結したものではありません。
  why_needed:
    zh: 让融合配置成为索引身份的一部分。
    en: Makes fusion configuration part of index identity.
    ja: fusion設定をindex同一性の一部にします。
  includes:
    - zh: 纳入声明 dense/sparse 信号与权重或融合算法的索引。
      en: Includes indexes declaring dense/sparse signals and weights or fusion algorithm.
      ja: dense/sparse信号とweightまたはfusion algorithmを宣言するindexを含みます。
  excludes:
    - zh: 排除单一 VectorIndex 和查询后临时合并。
      en: Excludes a single-signal VectorIndex and post-query ad-hoc merging.
      ja: 単一signal VectorIndexとquery後の一時mergeを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - index_id
  fields:
    - id: index_id
      labels:
        zh: 索引标识
        en: index ID
        ja: index ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识混合索引。
        en: Stable identifier for the hybrid index.
        ja: hybrid indexの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: hybrid-index-17
      source_claims:
        - claim-hybrid-index-002
    - id: signal_plan
      labels:
        zh: 信号计划
        en: signal plan
        ja: signal plan
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明参与融合的检索信号。
        en: Declares retrieval signals participating in fusion.
        ja: fusion参加検索signalを宣言します。
      allowed_values: []
      pattern: null
      example_value: dense+sparse
      source_claims:
        - claim-hybrid-index-003
    - id: fusion_profile
      labels:
        zh: 融合配置
        en: fusion profile
        ja: fusion profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定权重或排名融合算法。
        en: Fixes weights or ranking-fusion algorithm.
        ja: weightまたはranking-fusion algorithmを固定します。
      allowed_values: []
      pattern: null
      example_value: weighted:0.7/0.3
      source_claims:
        - claim-hybrid-index-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: HybridIndex-example-positive-manual-001
    kind: positive
    labels:
      zh: 混合索引正例
      en: "Positive case: Hybrid index"
      ja: ハイブリッド索引正例
    scenario_id: null
    descriptions:
      zh: hybrid-index-17 同时索引 dense 与 sparse 信号并记录融合权重。
      en: hybrid-index-17 indexes dense and sparse signals and records fusion weights.
      ja: hybrid-index-17 はdenseとsparse信号を索引しfusion weightを記録します。
    field_values:
      index_id: hybrid-index-17
      signal_plan: dense+sparse
      fusion_profile: weighted:0.7/0.3
      index_kind: hybrid
      configuration_digest: sha256:hybrid-index-17-dense-sparse-0.7-0.3
    related_node_ids:
      - HybridIndex
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 HybridIndex。
      en: Classify the object as HybridIndex.
      ja: この対象を HybridIndex に分類します。
    why_valid_or_invalid:
      zh: 多信号与融合策略都属于索引配置。
      en: Multiple signals and fusion strategy are both index configuration.
      ja: 複数signalとfusion strategyはいずれもindex設定です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-hybrid-index-005
  - id: HybridIndex-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 混合索引边界例
      en: "Boundary case: Hybrid index"
      ja: ハイブリッド索引境界例
    scenario_id: null
    descriptions:
      zh: 应用分别查询两个索引后简单拼接结果。
      en: An application queries two indexes separately and merely concatenates their results.
      ja: applicationが二indexを別々にqueryし結果を単純連結します。
    field_values: {}
    related_node_ids:
      - HybridIndex
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 HybridIndex。
      en: Do not classify the object as HybridIndex.
      ja: この対象を HybridIndex に分類しません。
    why_valid_or_invalid:
      zh: 没有共同索引身份或可复现融合策略。
      en: There is no shared index identity or reproducible fusion strategy.
      ja: 共通index同一性や再現可能fusion strategyがありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-hybrid-index-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: HybridIndex-is_a-Index
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: HybridIndex 是 Index 的严格子类；种差为：同时声明至少两类检索信号以及可复现融合策略。
    en: "HybridIndex is a strict subtype of Index; its reviewed differentia is: it declares at least two retrieval-signal families and a reproducible fusion strategy."
    ja: HybridIndex は Index の厳密なsubtypeで、審査済み種差は「少なくとも二種の検索signalと再現可能fusion strategyを宣言します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: HybridIndex-is_a-Index-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies Index and also satisfies the differentia: it declares at least two retrieval-signal families and a reproducible fusion strategy."
      explanations:
        zh: 仅当对象首先满足 Index 定义且满足种差“同时声明至少两类检索信号以及可复现融合策略。”时成立。
        en: "Assert only when the object first satisfies Index and also satisfies the differentia: it declares at least two retrieval-signal families and a reproducible fusion strategy."
        ja: 対象がまず Index を満たし、さらに種差「少なくとも二種の検索signalと再現可能fusion strategyを宣言します。」を満たす時だけ成立します。
      source_claims:
        - claim-hybrid-index-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: HybridIndex-is_a-Index-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: hybrid-index-17 在同一 index_id 下声明 dense 与 sparse 两路信号，并固定加权融合配置 v5。
        en: hybrid-index-17 declares dense and sparse signal paths under one index_id and fixes weighted-fusion configuration v5.
        ja: hybrid-index-17 は一つの index_id の下で dense と sparse の二signal経路を宣言し、weighted-fusion設定 v5 を固定します。
      field_values: {}
      related_node_ids:
        - HybridIndex
        - Index
      related_relation_ids:
        - HybridIndex-is_a-Index
      expected_result:
        zh: 将 hybrid-index-17 归入 HybridIndex，并继承其长期 Index 身份。
        en: Classify hybrid-index-17 as HybridIndex and inherit its long-lived Index identity.
        ja: hybrid-index-17 を HybridIndex と分類し、長期 Index 同一性を継承します。
      why_valid_or_invalid:
        zh: 它满足可版本化 Index 身份，且多信号与可复现融合同时成立。
        en: It satisfies versionable Index identity, with both multiple signals and reproducible fusion present.
        ja: 版管理可能な Index 同一性を満たし、複数signalと再現可能fusionがともに成立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-hybrid-index-007
    - id: HybridIndex-is_a-Index-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 分别查询两个索引后临时拼接结果不能证明 HybridIndex 身份。
        en: Ad-hoc concatenation after querying two indexes separately does not establish HybridIndex identity.
        ja: 二indexを別query後に一時連結しても HybridIndex同一性を証明しません。
      field_values: {}
      related_node_ids:
        - HybridIndex
        - Index
      related_relation_ids:
        - HybridIndex-is_a-Index
      expected_result:
        zh: 把临时结果拼接留在检索运行层，不创建 HybridIndex 子类事实。
        en: Keep the ad-hoc result concatenation in the retrieval-run layer and do not create HybridIndex subtype membership.
        ja: 一時的 result concatenation を retrieval-run 層に留め、HybridIndex subtype membership を作成しません。
      why_valid_or_invalid:
        zh: 两个独立索引的结果事后拼接没有统一 index_id、版本系列或预先声明的融合配置。
        en: Post-hoc concatenation of two independent index results has no unified index_id, version series, or predeclared fusion configuration.
        ja: 二つの独立 index 結果の事後連結には、統一 index_id・version series・事前宣言 fusion 設定がありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-hybrid-index-007
  source_claims:
    - claim-hybrid-index-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations: []
