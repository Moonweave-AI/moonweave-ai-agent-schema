schema: moonweave.ai/ontology-node/v1
id: IndexShard
kind: concept
status: accepted
labels:
  zh: 索引分片
  en: Index shard
  ja: 索引shard
semantics:
  short_definition:
    zh: 属于一个索引版本并按分区边界共同部署的记录容器。
    en: A record container belonging to one index version and deployed under one partition boundary.
    ja: 一索引版に属し一partition境界で共同deployするrecord containerです。
  definition:
    zh: IndexShard 是 IndexVersion 内按分区键或范围组织、共同部署与复制的一组 IndexEntry 容器；它不是版本本身、单条记录或数据库实例。
    en: IndexShard is a container within an IndexVersion that groups IndexEntry values by partition key or range for joint deployment and replication; it is not the version itself, one record, or a database instance.
    ja: IndexShard は IndexVersion 内でpartition key/rangeにより IndexEntry 群を共同deploy・replicateするcontainerで、版自体・単一record・database instanceではありません。
  why_needed:
    zh: 补上版本与条目之间的物理/逻辑分区层。
    en: Adds the physical/logical partition layer between version and entry.
    ja: 版とentryの間に物理/論理partition階層を追加します。
  includes:
    - zh: 纳入具有稳定 shard ID、分区范围与副本配置的分片。
      en: Includes shards with stable ID, partition range, and replica configuration.
      ja: 安定shard ID・partition範囲・replica設定を持つshardを含みます。
  excludes:
    - zh: 排除 IndexVersion、IndexEntry 和泛化 StorageArea。
      en: Excludes IndexVersion, IndexEntry, and generic StorageArea.
      ja: IndexVersion・IndexEntry・一般StorageAreaを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - shard_id
  fields:
    - id: shard_id
      labels:
        zh: 分片标识
        en: shard ID
        ja: shard ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在版本内稳定标识分片。
        en: Stably identifies the shard within a version.
        ja: 版内でshardを安定識別します。
      allowed_values: []
      pattern: null
      example_value: shard-03
      source_claims:
        - claim-index-shard-002
    - id: partition_boundary
      labels:
        zh: 分区边界
        en: partition boundary
        ja: partition境界
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该分片承载的键范围。
        en: Declares the key range hosted by the shard.
        ja: shardが保持するkey範囲を宣言します。
      allowed_values: []
      pattern: null
      example_value: hash:4000-5fff
      source_claims:
        - claim-index-shard-003
    - id: replica_count
      labels:
        zh: 副本数
        en: replica count
        ja: replica数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该分片部署副本数。
        en: Records deployed replica count.
        ja: shardのdeploy replica数を記録します。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-index-shard-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexShard-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引分片正例
      en: "Positive case: Index shard"
      ja: 索引shard正例
    scenario_id: null
    descriptions:
      zh: shard-03 属于 index-17@42 并承载确定哈希范围。
      en: shard-03 belongs to index-17@42 and hosts a fixed hash range.
      ja: shard-03 は index-17@42 に属し固定hash範囲を保持します。
    field_values:
      shard_id: shard-03
      partition_boundary: hash:4000-5fff
      replica_count: 3
    related_node_ids:
      - IndexShard
    related_relation_ids: []
    expected_result:
      zh: 将 shard-03 归入 index-17@42 的 IndexShard，并保留其哈希边界与副本配置。
      en: Classify shard-03 as an IndexShard of index-17@42 while retaining its hash boundary and replica configuration.
      ja: shard-03 を index-17@42 の IndexShard と分類し、hash 境界と replica 設定を保持します。
    why_valid_or_invalid:
      zh: 唯一 shard_id、所属版本、互斥哈希范围和副本数共同建立可部署分区容器身份。
      en: A unique shard_id, owning version, exclusive hash range, and replica count jointly establish a deployable partition-container identity.
      ja: 一意の shard_id・所属版・排他的 hash 範囲・replica 数が deploy 可能な partition container 同一性を共同で成立させます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-shard-005
  - id: IndexShard-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引分片边界例
      en: "Boundary case: Index shard"
      ja: 索引shard境界例
    scenario_id: null
    descriptions:
      zh: entry-17 是分片内的一条可检索记录。
      en: entry-17 is one searchable record inside a shard.
      ja: entry-17 はshard内の一検索可能recordです。
    field_values: {}
    related_node_ids:
      - IndexShard
    related_relation_ids: []
    expected_result:
      zh: 将 entry-17 保持为 IndexEntry，并仅通过 contains 关系归属其分片。
      en: Keep entry-17 as an IndexEntry and assign it to a shard only through the contains relation.
      ja: entry-17 を IndexEntry のまま保持し、contains 関係だけで shard に所属させます。
    why_valid_or_invalid:
      zh: 单条记录只有条目键、表示引用与元数据，不拥有分区范围、成员集合或副本配置。
      en: A single record has an entry key, representation reference, and metadata but owns no partition range, member set, or replica configuration.
      ja: 単一 record は entry key・representation 参照・metadata を持つだけで、partition 範囲・member 集合・replica 設定を所有しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-shard-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexVersion-contains-IndexShard
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含分片
    en: contains shard
    ja: shardを含む
  definitions:
    zh: IndexVersion —contains→ IndexShard 表示该分片属于且仅属于这一不可变索引快照的成员布局。
    en: IndexVersion —contains→ IndexShard means that the shard belongs to the membership layout of this immutable index snapshot and no other snapshot identity.
    ja: IndexVersion —contains→ IndexShard はshardがこのimmutable index snapshotのmembership layoutに属することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexVersion-contains-IndexShard-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the shard's version reference and partition configuration exactly match the target IndexVersion.
      explanations:
        zh: 仅当 shard 的 version reference、分区配置与目标 IndexVersion 完全一致时成立。
        en: Assert only when the shard's version reference and partition configuration exactly match the target IndexVersion.
        ja: shardのversion referenceとpartition設定がtarget IndexVersionと完全一致する時だけ成立します。
      source_claims:
        - claim-index-shard-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexVersion-contains-IndexShard-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含分片正例
        en: "Positive case: contains shard"
        ja: shardを含む正例
      scenario_id: null
      descriptions:
        zh: index-17@42 包含按该版配置构建的 shard-03。
        en: index-17@42 contains shard-03 built under that version's configuration.
        ja: index-17@42 はその版設定でbuildした shard-03を含みます。
      field_values: {}
      related_node_ids:
        - IndexVersion
        - IndexShard
      related_relation_ids:
        - IndexVersion-contains-IndexShard
      expected_result:
        zh: 建立 index-17@42 contains shard-03 的版本组成事实。
        en: Assert the version-composition fact that index-17@42 contains shard-03.
        ja: index-17@42 contains shard-03 という version-composition fact を確立します。
      why_valid_or_invalid:
        zh: shard-03 的 owner_version、构建配置摘要和成员清单均与 index-17@42 一致。
        en: shard-03's owner_version, build-configuration digest, and membership manifest all agree with index-17@42.
        ja: shard-03 の owner_version・build configuration digest・membership manifest がすべて index-17@42 と一致します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-shard-007
    - id: IndexVersion-contains-IndexShard-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含分片边界例
        en: "Boundary case: contains shard"
        ja: shardを含む境界例
      scenario_id: null
      descriptions:
        zh: 属于 index-17@43 的 shard-03-copy 不能挂到 index-17@42。
        en: shard-03-copy belonging to index-17@43 cannot be attached to index-17@42.
        ja: index-17@43 所属 shard-03-copy を index-17@42へ付けません。
      field_values: {}
      related_node_ids:
        - IndexVersion
        - IndexShard
      related_relation_ids:
        - IndexVersion-contains-IndexShard
      expected_result:
        zh: 仅把 shard-03-copy 连接到 index-17@43，不挂入旧版本 @42。
        en: Connect shard-03-copy only to index-17@43 and do not attach it to prior version @42.
        ja: shard-03-copy を index-17@43 だけへ接続し、旧版 @42 には所属させません。
      why_valid_or_invalid:
        zh: 相同分区范围不等于相同版本成员身份。
        en: The same partition range does not imply the same version membership.
        ja: 同じpartition範囲でも同版membershipではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-shard-007
  source_claims:
    - claim-index-shard-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations: []
