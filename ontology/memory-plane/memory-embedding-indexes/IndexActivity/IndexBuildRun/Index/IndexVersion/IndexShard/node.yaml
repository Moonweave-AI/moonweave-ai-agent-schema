schema: moonweave.ai/ontology-node/v1
id: IndexShard
kind: concept
labels:
  zh: 索引分片
  en: Index shard
  ja: 索引 shard
semantics:
  short_definition:
    zh: IndexVersion 内的物理或逻辑分区。
    en: Physical or logical partition within an IndexVersion.
    ja: IndexVersion 内 physical/logical partition。
  definition:
    zh: IndexShard 是 IndexVersion 下的分区单元，拥有 shard_id 与 member entry 边界；Pinecone namespace 或 Qdrant shard 映射 shard_id。IndexEntry 必须属于 exactly one IndexShard 与 one IndexVersion。
    en: IndexShard is a partition unit under IndexVersion with shard_id and member entry boundaries; Pinecone namespace or Qdrant shard maps to shard_id. IndexEntry must belong to exactly one IndexShard and one IndexVersion.
    ja: IndexShard は IndexVersion 下 partition 単位（shard_id+member boundary）。Pinecone namespace/Qdrant shard→shard_id。IndexEntry は exactly one IndexShard+IndexVersion。
  why_needed:
    zh: 大规模索引按 shard 分区后，检索与重建可并行且 entry _membership 可审计到具体分区。
    en: Large indexes partition by shard so retrieval and rebuild parallelize and entry membership audits to a specific partition.
    ja: 大規模 index の shard 分割で retrieval/rebuild 並列化と entry membership 監査。
  includes:
    - zh: 纳入 Pinecone namespace、Qdrant shard 与 Moonweave shard-03 等分区。
      en: Includes Pinecone namespace, Qdrant shard, and Moonweave shard-03 partitions.
      ja: Pinecone namespace/Qdrant shard/Moonweave shard-03 等 partition。
  excludes:
    - zh: 排除 IndexVersion 整体、Index 长期身份与单条 IndexEntry。
      en: Excludes whole IndexVersion, long-lived Index identity, and individual IndexEntry.
      ja: IndexVersion 全体/長期 Index/個別 IndexEntry を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: Pinecone index.upsert(namespace="tenant-7", vectors=...) 映射 shard_id=tenant-7；query 时 namespace 限定分区；shard 成员清单 digest 写入 IndexVersion manifest。
    en: Pinecone index.upsert(namespace="tenant-7", vectors=...) maps shard_id=tenant-7; query namespace scopes partition; shard membership digest writes IndexVersion manifest.
    ja: Pinecone upsert namespace→shard_id。query namespace で partition 限定。
  typical_input: []
  typical_output:
    - description: Shard partition record
      format: |
        {
          "index_id": "index-17",
          "version": 42,
          "shard_id": "shard-03",
          "entry_count": 1842
        }
      source_claims: [claim-index-shard-design]
  reference_implementations:
    - name: Pinecone Namespaces
      url: https://docs.pinecone.io/guides/indexes/use-namespaces
      description: Namespace partitioning within an index.
    - name: Qdrant Sharding
      url: https://qdrant.tech/documentation/scaling/distributed_deployment/
      description: Collection sharding for scale-out.
structure:
  identity_keys: [index_id, version, shard_id]
  fields:
    - id: shard_id
      labels: {zh: 分片标识, en: Shard identifier, ja: shard 識別子}
      definitions:
        zh: 在 IndexVersion 内唯一标识分区。
        en: Uniquely identifies partition within IndexVersion.
        ja: IndexVersion 内 partition を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: shard-03
      allowed_values: []
      source_claims: [claim-index-shard-id]
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 所属 Index 身份。
        en: Owning Index identity.
        ja: 所属 Index identity。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-17
      allowed_values: []
      source_claims: [claim-index-shard-index]
    - id: version
      labels: {zh: 索引版本, en: Index version, ja: 索引版}
      definitions:
        zh: 所属 IndexVersion 版本号。
        en: Owning IndexVersion number.
        ja: 所属 IndexVersion 版番号。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 42
      allowed_values: []
      source_claims: [claim-index-shard-version]
  constraints: []
  required_relations: []
examples:
  - id: IndexShard-example-pinecone-namespace
    labels:
      zh: Pinecone namespace 分片
      en: Pinecone namespace shard
      ja: Pinecone namespace shard
    descriptions:
      zh: index-17@42 的 shard_id=tenant-7 映射 Pinecone namespace tenant-7；upsert 与 query 限定该 namespace。
      en: index-17@42 shard_id=tenant-7 maps Pinecone namespace tenant-7; upsert and query scope to that namespace.
      ja: index-17@42 shard_id=tenant-7→Pinecone namespace tenant-7。upsert/query scope。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/use-namespaces
      version: namespace partition
    field_values:
      shard_id: tenant-7
      index_id: index-17
      version: 42
    related_node_ids:
      - IndexShard
      - IndexVersion
    related_relation_ids: []
    source_claims:
      - claim-index-shard-pinecone
      - claim-index-shard-design
  - id: IndexShard-example-qdrant-shard
    labels:
      zh: Qdrant 分布式分片
      en: Qdrant distributed shard
      ja: Qdrant distributed shard
    descriptions:
      zh: Qdrant 集群 collection hybrid-docs 按 shard key 分区；shard-03 持有 entry-17 等 IndexEntry。
      en: Qdrant cluster collection hybrid-docs partitions by shard key; shard-03 holds IndexEntry entry-17 and others.
      ja: Qdrant hybrid-docs shard key 分割。shard-03 が entry-17 等を保持。
    example_source:
      product: Qdrant
      url: https://qdrant.tech/documentation/scaling/distributed_deployment/
      version: sharding
    field_values:
      shard_id: shard-03
      index_id: index-17
      version: 42
    related_node_ids:
      - IndexShard
      - IndexEntry
    related_relation_ids: []
    source_claims:
      - claim-index-shard-qdrant
      - claim-index-shard-design
  - id: IndexShard-example-not-version
    labels:
      zh: 分片非整版快照
      en: Shard is not whole version
      ja: shard は整版 snapshot ではない
    descriptions:
      zh: index-17@42 是 IndexVersion 完整快照；shard-03 只是其一个分区子集。
      en: index-17@42 is the complete IndexVersion snapshot; shard-03 is only one partition subset.
      ja: index-17@42 は IndexVersion 全体。shard-03 は partition subset。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexShard
      - IndexVersion
    related_relation_ids: []
    source_claims:
      - claim-index-shard-design
parent_relation:
  id: IndexVersion-contains-IndexShard
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含于索引版本
    en: contained in index version
    ja: 索引版に含まれる
  definitions:
    zh: IndexVersion contains IndexShard 表示分区 membership 冻结在该版快照内。
    en: IndexVersion contains IndexShard means partition membership is frozen within that version snapshot.
    ja: IndexVersion contains IndexShard は partition membership が当版 snapshot 内凍結。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse contains, ja: 逆方向読取}
  conditions:
    - id: IndexVersion-contains-IndexShard-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when shard index_id and version match the owning IndexVersion.
      explanations:
        zh: 仅当 shard 版号与 IndexVersion 一致时成立。
        en: Assert only when shard version matches owning IndexVersion.
        ja: shard 版が IndexVersion と一致時のみ assert。
      source_claims: [claim-index-shard-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-shard-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-namespace
    title: Pinecone Use Namespaces
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/use-namespaces
    source_type: official-doc
    relevance: Namespace as logical partition.
  - id: src-qdrant-sharding
    title: Qdrant Distributed Deployments
    publisher: Qdrant
    url: https://qdrant.tech/documentation/scaling/distributed_deployment/
    source_type: official-doc
    relevance: Collection sharding.
  - id: src-index-shard-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: IndexShard partition under IndexVersion.
source_claims:
  - id: claim-index-shard-pinecone
    source: src-pinecone-namespace
    supports: Pinecone namespaces partition records within one index.
    locator: Use namespaces
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-shard-qdrant
    source: src-qdrant-sharding
    supports: Qdrant supports sharded collections for scale-out storage.
    locator: Distributed deployments
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-shard-design
    source: src-index-shard-design
    supports: IndexShard partitions IndexVersion membership; IndexEntry belongs to exactly one shard and version.
    locator: IndexShard boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-shard-id
    source: src-index-shard-design
    supports: shard_id identifies partition within IndexVersion.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-shard-index
    source: src-index-shard-design
    supports: index_id references owning Index.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-shard-version
    source: src-index-shard-design
    supports: version references owning IndexVersion.
    locator: structure
    evidence_kind: design-inference
    confidence: high
