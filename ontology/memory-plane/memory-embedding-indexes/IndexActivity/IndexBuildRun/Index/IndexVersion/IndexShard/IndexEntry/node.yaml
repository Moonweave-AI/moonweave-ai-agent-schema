schema: moonweave.ai/ontology-node/v1
id: IndexEntry
kind: concept
status: accepted
labels:
  zh: 索引条目
  en: Index entry
  ja: 索引entry
semantics:
  short_definition:
    zh: 分片中以稳定键关联表示与来源元数据的最小检索记录。
    en: The smallest searchable shard record linking a stable key, representation, and source metadata.
    ja: shard内で安定key・表現・出典metadataを結ぶ最小検索recordです。
  definition:
    zh: IndexEntry 是一个 IndexShard 中可独立写入、更新和检索的记录，由 entry_id/entry_key 标识并引用 Representation 与来源元数据；键是字段而非另一个本体节点。
    en: IndexEntry is a record independently insertable, updatable, and retrievable within one IndexShard, identified by entry_id/entry_key and referencing a Representation plus source metadata; its key is a field, not another ontology node.
    ja: IndexEntry は一 IndexShard 内で独立insert・update・retrieveでき、entry_id/entry_keyで識別し Representation と出典metadataを参照するrecordで、keyは別ontology nodeでなく項目です。
  why_needed:
    zh: 消除 IndexKey 漏级节点并明确最小记录身份。
    en: Removes the leaked IndexKey node and makes minimum record identity explicit.
    ja: 漏れたIndexKey nodeを除き最小record同一性を明示します。
  includes:
    - zh: 纳入有稳定记录键、向量/稀疏值和可选元数据的记录。
      en: Includes records with stable key, vector or sparse values, and optional metadata.
      ja: 安定record key・vector/sparse値・任意metadataを持つrecordを含みます。
  excludes:
    - zh: 排除 IndexKey 节点、整个 Shard 和无持久身份的查询命中。
      en: Excludes an IndexKey node, the whole Shard, and transient search hits without persistent identity.
      ja: IndexKey node・Shard全体・永続同一性のない一時search hitを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - entry_id
  fields:
    - id: entry_id
      labels:
        zh: 条目标识
        en: entry ID
        ja: entry ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识索引记录。
        en: Stable identifier for the index record.
        ja: index recordの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: entry-17
      source_claims:
        - claim-index-entry-002
    - id: entry_key
      labels:
        zh: 条目键
        en: entry key
        ja: entry key
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 upsert 与查询定位键。
        en: Records the upsert and lookup key.
        ja: upsertとlookupのkeyを記録します。
      allowed_values: []
      pattern: null
      example_value: chunk-17
      source_claims:
        - claim-index-entry-003
    - id: source_reference
      labels:
        zh: 来源引用
        en: source reference
        ja: 出典参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向产生该记录的来源对象。
        en: References the source object represented by the record.
        ja: recordが表す出典objectを参照します。
      allowed_values: []
      pattern: null
      example_value: urn:chunk:17
      source_claims:
        - claim-index-entry-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexEntry-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引条目正例
      en: "Positive case: Index entry"
      ja: 索引entry正例
    scenario_id: null
    descriptions:
      zh: entry-17 在 shard-03 中以 chunk-17 键保存 rep-17。
      en: entry-17 stores rep-17 under key chunk-17 in shard-03.
      ja: entry-17 は shard-03 内でkey chunk-17に rep-17を保存します。
    field_values:
      entry_id: entry-17
      entry_key: chunk-17
      source_reference: urn:chunk:17
    related_node_ids:
      - IndexEntry
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 IndexEntry。
      en: Classify the object as IndexEntry.
      ja: この対象を IndexEntry に分類します。
    why_valid_or_invalid:
      zh: 条目、键、表示与分片归属均可审计。
      en: Entry, key, representation, and shard membership are auditable.
      ja: entry・key・表現・shard所属を監査できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-entry-005
  - id: IndexEntry-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引条目边界例
      en: "Boundary case: Index entry"
      ja: 索引entry境界例
    scenario_id: null
    descriptions:
      zh: hit-17 是一次查询返回的分数与 entry-17 引用。
      en: hit-17 is a query result containing a score and reference to entry-17.
      ja: hit-17 はscoreと entry-17参照を含むquery結果です。
    field_values: {}
    related_node_ids:
      - IndexEntry
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 IndexEntry。
      en: Do not classify the object as IndexEntry.
      ja: この対象を IndexEntry に分類しません。
    why_valid_or_invalid:
      zh: 检索命中引用持久条目但不是新的索引记录。
      en: A search hit references a persistent entry but is not a new index record.
      ja: search hitは永続entryを参照しますが新index recordではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-entry-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexShard-contains-IndexEntry
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含条目
    en: contains entry
    ja: entryを含む
  definitions:
    zh: IndexShard —contains→ IndexEntry 表示条目的键落入该分片边界且条目作为该分片成员共同部署。
    en: IndexShard —contains→ IndexEntry means the entry key falls within the shard boundary and the entry is deployed as a member of that shard.
    ja: IndexShard —contains→ IndexEntry はentry keyがshard境界内に入りentryがshard memberとして共同deployされることを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_contains
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexShard-contains-IndexEntry-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when partitioning entry_key lands within shard.partition_boundary and version identity matches.
      explanations:
        zh: 仅当 entry_key 的分区结果落在 shard.partition_boundary 且版本一致时成立。
        en: Assert only when partitioning entry_key lands within shard.partition_boundary and version identity matches.
        ja: entry_keyのpartition結果が shard.partition_boundary 内で版同一性も一致する時だけ成立します。
      source_claims:
        - claim-index-entry-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexShard-contains-IndexEntry-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含条目正例
        en: "Positive case: contains entry"
        ja: entryを含む正例
      scenario_id: null
      descriptions:
        zh: entry-17 的键哈希落在 shard-03 范围并属于 index-17@42。
        en: entry-17's key hash falls in shard-03's range and belongs to index-17@42.
        ja: entry-17 のkey hashは shard-03 範囲内で index-17@42に属します。
      field_values: {}
      related_node_ids:
        - IndexShard
        - IndexEntry
      related_relation_ids:
        - IndexShard-contains-IndexEntry
      expected_result:
        zh: 建立 shard-03 contains entry-17 的版本内分区成员事实。
        en: Assert the within-version partition membership that shard-03 contains entry-17.
        ja: shard-03 contains entry-17 という version 内 partition membership fact を確立します。
      why_valid_or_invalid:
        zh: entry-17 的键哈希落入 shard-03 的互斥范围，且二者共享 index-17@42 版本身份。
        en: entry-17's key hash falls inside shard-03's exclusive range, and both share the index-17@42 version identity.
        ja: entry-17 の key hash が shard-03 の排他的範囲に入り、両者が index-17@42 の version identity を共有します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-entry-007
    - id: IndexShard-contains-IndexEntry-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含条目边界例
        en: "Boundary case: contains entry"
        ja: entryを含む境界例
      scenario_id: null
      descriptions:
        zh: 键哈希落在 shard-04 的 entry-18 不能挂入 shard-03。
        en: entry-18 whose key hashes to shard-04 cannot be attached to shard-03.
        ja: key hashが shard-04へ落ちる entry-18 を shard-03へ付けません。
      field_values: {}
      related_node_ids:
        - IndexShard
        - IndexEntry
      related_relation_ids:
        - IndexShard-contains-IndexEntry
      expected_result:
        zh: 把 entry-18 归属到其哈希范围对应的 shard-04，不连接到 shard-03。
        en: Assign entry-18 to hash-range owner shard-04 and do not connect it to shard-03.
        ja: entry-18 を hash 範囲 owner の shard-04 に所属させ、shard-03 へ接続しません。
      why_valid_or_invalid:
        zh: 仅共同存于一个数据库不足以建立分片成员关系。
        en: Co-residence in one database is insufficient to establish shard membership.
        ja: 同databaseにあるだけではshard membershipを立てられません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-entry-007
  source_claims:
    - claim-index-entry-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations:
  - id: IndexEntry-stores-Representation
    predicate: stores
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 存储表示
      en: stores representation
      ja: 表現を保存する
    definitions:
      zh: IndexEntry —stores→ Representation 表示该持久条目引用这一个可审计编码产物；方向从存储记录指向被存表示。
      en: IndexEntry —stores→ Representation means that the persistent entry references this auditable encoding artifact; direction runs from storage record to stored representation.
      ja: IndexEntry —stores→ Representation は永続entryがこの監査可能符号化成果物を参照し方向がstorage recordからstored representationへ向くことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_stores
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: IndexEntry-stores-Representation-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the entry's representation digest or ID exactly matches the target Representation.
        explanations:
          zh: 仅当 entry 的 representation digest/ID 与目标 Representation 完全匹配时成立。
          en: Assert only when the entry's representation digest or ID exactly matches the target Representation.
          ja: entryのrepresentation digest/IDがtarget Representationと完全一致する時だけ成立します。
        source_claims:
          - claim-index-entry-008
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexEntry-stores-Representation-example-positive-manual-001
        kind: positive
        labels:
          zh: 存储表示正例
          en: "Positive case: stores representation"
          ja: 表現を保存する正例
        scenario_id: null
        descriptions:
          zh: entry-17 的 representation_id 与 rep-17 相同。
          en: entry-17's representation_id equals rep-17.
          ja: entry-17 の representation_idは rep-17と一致します。
        field_values: {}
        related_node_ids:
          - IndexEntry
          - Representation
        related_relation_ids:
          - IndexEntry-stores-Representation
        expected_result:
          zh: 建立 entry-17 stores rep-17 的条目到表示绑定事实。
          en: Assert the entry-to-representation binding that entry-17 stores rep-17.
          ja: entry-17 stores rep-17 という entry-to-representation binding fact を確立します。
        why_valid_or_invalid:
          zh: 条目的 representation_id 与 digest 同时命中 rep-17，避免仅凭维数把另一表示错接入。
          en: The entry's representation_id and digest both match rep-17, avoiding a false attachment based only on equal dimensionality.
          ja: entry の representation_id と digest がともに rep-17 に一致し、同一次元だけによる別 representation の誤接続を防ぎます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-entry-008
      - id: IndexEntry-stores-Representation-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 存储表示边界例
          en: "Boundary case: stores representation"
          ja: 表現を保存する境界例
        scenario_id: null
        descriptions:
          zh: 仅维数相同但 ID/摘要不同的 rep-18 不能替代 rep-17。
          en: rep-18 with equal dimensions but different ID or digest cannot replace rep-17.
          ja: 次元が同じでもID/digestが異なる rep-18 は rep-17を代替できません。
        field_values: {}
        related_node_ids:
          - IndexEntry
          - Representation
        related_relation_ids:
          - IndexEntry-stores-Representation
        expected_result:
          zh: 拒绝 entry-17 stores rep-18，并继续指向原有 rep-17。
          en: Reject entry-17 stores rep-18 and keep the entry bound to its original rep-17.
          ja: entry-17 stores rep-18 を拒否し、元の rep-17 への binding を維持します。
        why_valid_or_invalid:
          zh: rep-18 虽维数相同，但 representation_id 与内容摘要均不同，属于另一份可替换但非同一的表示。
          en: rep-18 has equal dimensionality but a different representation_id and content digest, making it substitutable in shape but not identical.
          ja: rep-18 は同一次元でも representation_id と content digest が異なり、shape 互換でも同一 representation ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-entry-008
    source_claims:
      - claim-index-entry-008
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Representation
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-retrieval-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex 检索文档、Elasticsearch RRF、Cohere Rerank 与 ColBERT/cross-encoder 文献逐项核验概念定义、字段、关系与 RAG 检索管线结构。
    en: Verified concept definitions, fields, relations, and RAG retrieval pipeline structure against OpenAI Embeddings, Pinecone/Weaviate, LangChain/LlamaIndex retrieval docs, Elasticsearch RRF, Cohere Rerank, and ColBERT/cross-encoder literature.
    ja: OpenAI Embeddings、Pinecone/Weaviate、LangChain/LlamaIndex retrieval docs、Elasticsearch RRF、Cohere Rerank、ColBERT/cross-encoder 文献に照らし概念定義・フィールド・関係・RAG retrieval pipeline 構造を個別検証しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
