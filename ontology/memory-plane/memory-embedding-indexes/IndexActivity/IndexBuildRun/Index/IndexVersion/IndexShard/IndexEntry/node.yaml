    supports: Pinecone defines records by ID, vector values, and optional metadata and exposes upsert/import operations over those records.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-002
    source: eng-vector-pinecone-indexing
    supports: IndexEntry.entry_id records the independently addressable index record; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-003
    source: eng-vector-pinecone-indexing
    supports: IndexEntry.entry_key records record lookup and idempotent upsert identity; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-004
    source: eng-vector-pinecone-indexing
    supports: IndexEntry.source_reference records provenance from record to source; the cited operational model exposes this datum, while Moonweave fixes its identity and audit role.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-005
    source: eng-vector-pinecone-indexing
    supports: Pinecone records consist of an ID, vector values, and optional metadata within an index namespace.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-006
    source: eng-vector-pinecone-indexing
    supports: Pinecone distinguishes stored records from query results and similarity scores.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-007
    source: eng-vector-pinecone-indexing
    supports: Pinecone records are identified and stored within index partitioning/namespace structures; Moonweave records explicit shard placement.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-entry-008
    source: eng-vector-pinecone-indexing
    supports: Pinecone records pair stable IDs with vector values and optional metadata, supporting explicit record-to-representation binding.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
