schema: moonweave.ai/ontology-node/v1
id: IndexEntry
kind: concept
labels:
  zh: 索引条目
  en: Index entry
  ja: 索引 entry
semantics:
  short_definition:
    zh: IndexShard 内绑定 chunk 与表示的单条检索成员。
    en: Single retrievable member in IndexShard binding chunk and representation.
    ja: IndexShard 内 chunk+representation を binding する単一検索 member。
  definition:
    zh: IndexEntry 是 IndexShard 内的最小可检索单元，拥有 entry_id、referent（Chunk/IndexEntry 来源）与 representation_digest（DenseVector 或 SparseVector）。Pinecone vector id 与 Chroma document id 映射 entry_id；必须属于 exactly one IndexVersion 与 IndexShard。
    en: IndexEntry is the smallest retrievable unit in IndexShard with entry_id, referent (Chunk source), and representation_digest (DenseVector or SparseVector). Pinecone vector id and Chroma document id map to entry_id; must belong to exactly one IndexVersion and IndexShard.
    ja: IndexEntry は IndexShard 内最小検索単位（entry_id/referent/representation_digest）。Pinecone vector id/Chroma document id→entry_id。exactly one IndexVersion+IndexShard。
  why_needed:
    zh: 检索命中必须追溯到 chunk-17@3 与 emb-17 生成链，不能仅有 Pinecone id 而无 representation digest。
    en: Retrieval hits must trace to chunk-17@3 and emb-17 generation chain—not Pinecone id alone without representation digest.
    ja: retrieval hit は chunk-17@3+emb-17 生成 chain へ追跡必須。Pinecone id のみ不可。
  includes:
    - zh: 纳入 Pinecone upsert vector、Chroma collection entry 与 Qdrant point。
      en: Includes Pinecone upsert vector, Chroma collection entry, and Qdrant point.
      ja: Pinecone upsert vector/Chroma entry/Qdrant point。
  excludes:
    - zh: 排除 Chunk 规范实体、EmbeddingRun 与 RetrievalCandidate。
      en: Excludes canonical Chunk entity, EmbeddingRun, and RetrievalCandidate.
      ja: canonical Chunk/EmbeddingRun/RetrievalCandidate を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone upsert id=emb-17, values=float[1536], metadata={chunk_id} 映射 IndexEntry；representation_digest 绑定 DenseVector；query match id 回到 entry_id 再 refers_to Chunk。
    en: Pinecone upsert id=emb-17, values=float[1536], metadata={chunk_id} maps to IndexEntry; representation_digest binds DenseVector; query match id resolves to entry_id then refers_to Chunk.
    ja: Pinecone upsert→IndexEntry。representation_digest→DenseVector。query match→entry_id→Chunk。
  typical_input:
    - description: Pinecone upsert entry
      format: |
        index.upsert(vectors=[{
          "id": "emb-17",
          "values": [0.01, -0.02, ...],
          "metadata": {"chunk_id": "chunk-17", "source": "policy.pdf"}
        }])
      source_claims: [claim-index-entry-pinecone]
  typical_output:
    - description: Index entry record
      format: |
        {
          "entry_id": "entry-17",
          "shard_id": "shard-03",
          "index_id": "index-17",
          "version": 42,
          "referent_id": "chunk-17@3",
          "representation_digest": "sha256:emb-17-float1536"
        }
      source_claims: [claim-index-entry-design]
  reference_implementations:
    - name: Pinecone Upsert
      url: https://docs.pinecone.io/guides/data/upsert-data
      description: Vector id, values, and metadata.
    - name: Chroma Add Data
      url: https://docs.trychroma.com/docs/collections/add-data
      description: ids, embeddings, documents, metadatas.
structure:
  identity_keys: [entry_id]
  fields:
    - id: entry_id
      labels: {zh: 条目标识, en: Entry identifier, ja: entry 識別子}
      definitions:
        zh: 在 IndexShard 内唯一标识条目；可映射 Pinecone vector id。
        en: Uniquely identifies entry within IndexShard; mappable to Pinecone vector id.
        ja: IndexShard 内 entry 一意 ID。Pinecone vector id 写像可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: entry-17
      allowed_values: []
      source_claims: [claim-index-entry-id]
    - id: referent_id
      labels: {zh: 引用对象标识, en: Referent identifier, ja: referent 識別子}
      definitions:
        zh: 指向来源 Chunk 或 Document 版本，如 chunk-17@3。
        en: Points to source Chunk or Document version, e.g., chunk-17@3.
        ja: 源 Chunk/Document 版参照。chunk-17@3 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-17@3
      allowed_values: []
      source_claims: [claim-index-entry-referent]
    - id: representation_digest
      labels: {zh: 表示摘要, en: Representation digest, ja: representation digest}
      definitions:
        zh: 绑定 DenseVector float[] 或 SparseVector {indices,values} 的内容 SHA-256。
        en: SHA-256 binding DenseVector float[] or SparseVector {indices,values} content.
        ja: DenseVector float[]/SparseVector {indices,values} 内容 SHA-256 binding。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:emb-17-float1536
      allowed_values: []
      source_claims: [claim-index-entry-repr]
  constraints:
    - id: entry-single-version-shard
      severity: error
      expression_language: plain
      expression: IndexEntry must belong to exactly one IndexVersion and IndexShard.
      explanation:
        zh: 跨版本或跨 shard 附会导致不一致检索快照。
        en: Cross-version or cross-shard attachment causes inconsistent retrieval snapshots.
        ja: 版/shard 横断付与は不整合 retrieval snapshot。
      source_claims: [claim-index-entry-design]
  required_relations: []
examples:
  - id: IndexEntry-example-pinecone-upsert
    labels:
      zh: Pinecone upsert 条目
      en: Pinecone upsert entry
      ja: Pinecone upsert entry
    descriptions:
      zh: entry-17 在 index-17@42/shard-03 绑定 emb-17 float[1536] 与 metadata chunk_id=chunk-17；referent_id=chunk-17@3。
      en: entry-17 in index-17@42/shard-03 binds emb-17 float[1536] with metadata chunk_id=chunk-17; referent_id=chunk-17@3.
      ja: entry-17 が index-17@42/shard-03 で emb-17+chunk_id binding。referent_id=chunk-17@3。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/data/upsert-data
      version: upsert with metadata
    field_values:
      entry_id: entry-17
      referent_id: chunk-17@3
      representation_digest: sha256:emb-17-float1536
    related_node_ids:
      - IndexEntry
      - DenseVector
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-index-entry-pinecone
      - claim-index-entry-design
  - id: IndexEntry-example-chroma-add
    labels:
      zh: Chroma 集合条目
      en: Chroma collection entry
      ja: Chroma collection entry
    descriptions:
      zh: Chroma collection.add ids=["chunk-17"] 自动嵌入后映射 entry_id=chunk-17；metadatas source/page 写入 referent 元数据。
      en: Chroma collection.add ids=["chunk-17"] auto-embeds and maps entry_id=chunk-17; metadatas source/page write referent metadata.
      ja: Chroma add ids=chunk-17→entry_id。metadatas source/page。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/collections/add-data
      version: collection.add
    field_values:
      entry_id: chunk-17
      referent_id: chunk-17@3
    related_node_ids:
      - IndexEntry
      - Index
    related_relation_ids: []
    source_claims:
      - claim-index-entry-chroma
      - claim-index-entry-design
  - id: IndexEntry-example-not-chunk
    labels:
      zh: 条目非 Chunk 实体
      en: Entry is not Chunk entity
      ja: entry は Chunk entity ではない
    descriptions:
      zh: chunk-17@3 是 Chunk 规范实体含 SourceSpan；entry-17 是 index-17@42 内的检索成员视图。
      en: chunk-17@3 is canonical Chunk with SourceSpan; entry-17 is retrieval member view within index-17@42.
      ja: chunk-17@3 は SourceSpan 付き Chunk entity。entry-17 は index 内 retrieval member view。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexEntry
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-index-entry-design
parent_relation:
  id: IndexShard-contains-IndexEntry
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含于索引分片
    en: contained in index shard
    ja: 索引 shard に含まれる
  definitions:
    zh: IndexShard contains IndexEntry 表示条目 membership 冻结在该 shard 与 IndexVersion 内。
    en: IndexShard contains IndexEntry means entry membership is frozen within that shard and IndexVersion.
    ja: IndexShard contains IndexEntry は entry membership が当 shard+IndexVersion 内凍結。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse contains, ja: 逆方向読取}
  conditions:
    - id: IndexShard-contains-IndexEntry-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when entry shard_id, index_id, and version match the owning IndexShard.
      explanations:
        zh: 仅当 entry 分区与 shard 一致时成立。
        en: Assert only when entry partition matches shard.
        ja: entry partition が shard と一致時のみ assert。
      source_claims: [claim-index-entry-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-entry-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-upsert
    title: Pinecone Upsert Data
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/data/upsert-data
    source_type: official-doc
    relevance: Vector id, values, metadata as index entries.
  - id: src-chroma-add
    title: Chroma Add Data
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/add-data
    source_type: official-doc
    relevance: Collection ids and metadatas as entries.
  - id: src-index-entry-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: IndexEntry membership and representation binding.
source_claims:
  - id: claim-index-entry-pinecone
    source: src-pinecone-upsert
    supports: Pinecone upsert assigns vector id, values, and metadata per index record.
    locator: Upsert data
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-entry-chroma
    source: src-chroma-add
    supports: Chroma collection.add stores ids, embeddings, documents, and metadatas as collection entries.
    locator: Add data
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-entry-design
    source: src-index-entry-design
    supports: IndexEntry binds referent and representation_digest within exactly one IndexVersion and IndexShard.
    locator: IndexEntry boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-entry-id
    source: src-index-entry-design
    supports: entry_id identifies member within IndexShard.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-entry-referent
    source: src-index-entry-design
    supports: referent_id points to source Chunk version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-entry-repr
    source: src-index-entry-design
    supports: representation_digest binds DenseVector or SparseVector content.
    locator: structure
    evidence_kind: design-inference
    confidence: high
