schema: moonweave.ai/ontology-node/v1
id: IndexVersion
kind: concept
status: review
labels:
  zh: 索引版本
  en: Index version
  ja: 索引版
semantics:
  short_definition:
    zh: 一次构建后可审计、不可变的索引快照。
    en: An auditable immutable index snapshot produced by one build.
    ja: 一回のbuildで生成した監査可能immutable index snapshotです。
  definition:
    zh: IndexVersion 是某一 Index 在确定构建时间、配置摘要与源清单下形成的不可变快照，拥有复合身份 index_id+version；它不是长期 Index 身份或构建活动。
    en: IndexVersion is an immutable snapshot of one Index under a fixed build time, configuration digest, and source manifest, identified by index_id plus version; it is not the long-lived Index identity or the build activity.
    ja: IndexVersion は固定build時刻・設定digest・source manifest下の一 Index のimmutable snapshotで index_id+version により識別され、長期Index同一性やbuild activityではありません。
  why_needed:
    zh: 补上 Index 与 Shard 之间的版本层。
    en: Adds the version layer between Index and Shard.
    ja: IndexとShardの間に版階層を追加します。
  includes:
    - zh: 纳入已完成构建且可定位其配置与来源清单的快照。
      en: Includes completed snapshots with traceable configuration and source manifest.
      ja: 設定とsource manifestを追跡できる完了snapshotを含みます。
  excludes:
    - zh: 排除逻辑 Index、运行中的构建和单个 Shard。
      en: Excludes logical Index, an in-progress build, and an individual Shard.
      ja: logical Index・進行中build・個別Shardを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - index_id
    - version
  fields:
    - id: index_id
      labels:
        zh: 索引标识
        en: index ID
        ja: index ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向长期索引身份。
        en: References the long-lived index identity.
        ja: 長期index同一性を参照します。
      allowed_values: []
      pattern: null
      example_value: index-17
      source_claims:
        - claim-index-version-002
    - id: version
      labels:
        zh: 版本
        en: version
        ja: 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在索引内唯一标识快照。
        en: Uniquely identifies the snapshot within its index.
        ja: index内でsnapshotを一意識別します。
      allowed_values: []
      pattern: null
      example_value: "42"
      source_claims:
        - claim-index-version-003
    - id: built_at
      labels:
        zh: 构建时间
        en: built at
        ja: build時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录快照完成时间。
        en: Records snapshot completion time.
        ja: snapshot完了時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:00:00Z
      source_claims:
        - claim-index-version-004
    - id: configuration_digest
      labels:
        zh: 配置摘要
        en: configuration digest
        ja: 設定digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定该版构建配置。
        en: Fixes this version's build configuration.
        ja: この版のbuild設定を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:cfg42
      source_claims:
        - claim-index-version-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexVersion-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引版本正例
      en: "Positive case: Index version"
      ja: 索引版正例
    scenario_id: null
    descriptions:
      zh: index-17@42 有完成时间、配置摘要与不可变成员。
      en: index-17@42 has completion time, configuration digest, and immutable membership.
      ja: index-17@42 は完了時刻・設定digest・immutable membershipを持ちます。
    field_values:
      index_id: index-17
      version: "42"
      built_at: 2026-07-16T09:00:00Z
      configuration_digest: sha256:cfg42
    related_node_ids:
      - IndexVersion
    related_relation_ids: []
    expected_result:
      zh: 将 index-17@42 识别为 index-17 的已完成不可变 IndexVersion。
      en: Recognize index-17@42 as a completed immutable IndexVersion of index-17.
      ja: index-17@42 を index-17 の完了済み immutable IndexVersion と認定します。
    why_valid_or_invalid:
      zh: index_id+version、完成时间、配置摘要与冻结成员清单共同界定可审计快照。
      en: index_id plus version, completion time, configuration digest, and frozen membership manifest jointly delimit an auditable snapshot.
      ja: index_id+version・完了時刻・設定 digest・凍結 member manifest が監査可能 snapshot を共同で画定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-version-006
  - id: IndexVersion-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引版本边界例
      en: "Boundary case: Index version"
      ja: 索引版境界例
    scenario_id: null
    descriptions:
      zh: build-42 仍在执行并持续写入分片。
      en: build-42 is still executing and continuously writing shards.
      ja: build-42 は実行中でshardを書き続けています。
    field_values: {}
    related_node_ids:
      - IndexVersion
    related_relation_ids: []
    expected_result:
      zh: 将 build-42 保持为进行中的 IndexBuildRun，直到成功提交版本后再创建 IndexVersion。
      en: Keep build-42 as an in-progress IndexBuildRun and create an IndexVersion only after a successful commit.
      ja: build-42 を進行中 IndexBuildRun として保持し、成功 commit 後にだけ IndexVersion を作成します。
    why_valid_or_invalid:
      zh: 未完成活动不是已发布不可变快照。
      en: An unfinished activity is not a published immutable snapshot.
      ja: 未完了activityは公開済みimmutable snapshotではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-version-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexVersion-version_of-Index
  predicate: version_of
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是版本
    en: version of
    ja: の版である
  definitions:
    zh: IndexVersion —version_of→ Index 表示不可变快照由该长期逻辑索引拥有；方向从快照指向其版本系列。
    en: IndexVersion —version_of→ Index means that the immutable snapshot is owned by that long-lived logical index; direction runs from snapshot to its version series.
    ja: IndexVersion —version_of→ Index はimmutable snapshotが長期logical indexに所有され、方向がsnapshotから版系列へ向くことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_version_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexVersion-version_of-Index-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when index_id is identical and the target Index's configuration family is compatible with the snapshot configuration.
      explanations:
        zh: 仅当 index_id 相同且目标 Index 的配置族与快照配置兼容时成立。
        en: Assert only when index_id is identical and the target Index's configuration family is compatible with the snapshot configuration.
        ja: index_idが同一でtarget Indexの設定familyがsnapshot設定と互換な時だけ成立します。
      source_claims:
        - claim-index-version-008
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexVersion-version_of-Index-example-positive-manual-001
      kind: positive
      labels:
        zh: 是版本正例
        en: "Positive case: version of"
        ja: の版である正例
      scenario_id: null
      descriptions:
        zh: index-17@42 的 index_id 为 index-17，配置摘要属于 index-17 的版本系列。
        en: index-17@42 has index_id index-17 and a configuration digest belonging to index-17's version series.
        ja: index-17@42 は index_id=index-17で設定digestが index-17版系列に属します。
      field_values: {}
      related_node_ids:
        - IndexVersion
        - Index
      related_relation_ids:
        - IndexVersion-version_of-Index
      expected_result:
        zh: 建立 index-17@42 version_of index-17 的版本系列事实。
        en: Assert the version-series fact that index-17@42 is version_of index-17.
        ja: index-17@42 version_of index-17 という version-series fact を確立します。
      why_valid_or_invalid:
        zh: 复合键中的 index_id 精确等于 index-17，配置摘要又属于该索引允许的版本演进链。
        en: The composite key's index_id exactly equals index-17, and the configuration digest belongs to that index's permitted version evolution.
        ja: 複合 key の index_id が index-17 と完全一致し、設定 digest もその index の許可された version evolution に属します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-version-008
    - id: IndexVersion-version_of-Index-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是版本边界例
        en: "Boundary case: version of"
        ja: の版である境界例
      scenario_id: null
      descriptions:
        zh: index-17@42 不能指向名称相似但 index_id 为 index-18 的索引。
        en: index-17@42 must not point to a similarly named index whose index_id is index-18.
        ja: index-17@42 は名称が似ても index_id=index-18 のindexを指せません。
      field_values: {}
      related_node_ids:
        - IndexVersion
        - Index
      related_relation_ids:
        - IndexVersion-version_of-Index
      expected_result:
        zh: 拒绝 index-17@42 version_of index-18，并保持其指向 index-17。
        en: Reject index-17@42 version_of index-18 and keep the version linked to index-17.
        ja: index-17@42 version_of index-18 を拒否し、index-17 への link を維持します。
      why_valid_or_invalid:
        zh: 显示名相似不改变复合键；index_id 不一致意味着属于不同长期索引身份与版本系列。
        en: A similar display name does not alter the composite key; mismatched index_id means a different long-lived index identity and version series.
        ja: 似た display name は複合 key を変えず、index_id 不一致は別の長期 index identity と version series を意味します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-version-008
  source_claims:
    - claim-index-version-008
