schema: moonweave.ai/ontology-node/v1
id: IndexVersion
kind: concept
labels:
  zh: 索引版本
  en: Index version
  ja: 索引版
semantics:
  short_definition:
    zh: 一次成功构建后的不可变索引快照。
    en: Immutable index snapshot after one successful build.
    ja: 一回成功 build 後の不変 index snapshot。
  definition:
    zh: IndexVersion 是 Index 在确定 built_at、configuration_digest 与 source manifest 下形成的不可变快照，身份为 index_id+version。IndexBuildRun 成功才发布；失败 run 不产生后继 version。不是长期 Index 身份或进行中的构建活动。
    en: IndexVersion is an immutable snapshot of an Index under fixed built_at, configuration_digest, and source manifest, identified by index_id+version. Published only on successful IndexBuildRun; failed runs produce no successor version. Not the long-lived Index identity or an in-progress build.
    ja: IndexVersion は built_at/configuration_digest/source manifest 固定下の Index 不変 snapshot（index_id+version）。IndexBuildRun 成功時のみ公開。長期 Index identity/進行中 build ではない。
  why_needed:
    zh: 检索必须 pin 到 index-17@42 而非“当前 index”，否则 RefreshRun 增量后旧 query 仍命中 stale entry。
    en: Retrieval must pin to index-17@42 not “current index”; otherwise after RefreshRun increment old queries still hit stale entries.
    ja: retrieval は index-17@42 を pin 必須。RefreshRun 後 stale entry hit を防ぐ。
  includes:
    - zh: 纳入已完成构建、可定位 configuration_digest 与 member manifest 的快照。
      en: Includes completed snapshots with traceable configuration_digest and member manifest.
      ja: configuration_digest/member manifest 追跡可能な完了 snapshot。
  excludes:
    - zh: 排除逻辑 Index、进行中 IndexBuildRun 与单个 IndexShard。
      en: Excludes logical Index, in-progress IndexBuildRun, and individual IndexShard.
      ja: 論理 Index/進行中 IndexBuildRun/個別 IndexShard を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone upsert/import 成功提交后登记 index-17@N；built_at 为 commit 时间，configuration_digest 含 metric/dimension/HNSW；RetrievalRun 必须引用 version 而非仅 index_id。
    en: After successful Pinecone upsert/import, register index-17@N; built_at is commit time; configuration_digest includes metric/dimension/HNSW; RetrievalRun must reference version not index_id alone.
    ja: Pinecone upsert/import 成功→index-17@N 登録。built_at=commit 時刻。RetrievalRun は version 参照必須。
  typical_input: []
  typical_output:
    - description: Index version snapshot record
      format: |
        {
          "index_id": "index-17",
          "version": 42,
          "built_at": "2026-07-16T09:00:00Z",
          "configuration_digest": "sha256:cfg42",
          "build_run_id": "build-run-42"
        }
      source_claims: [claim-index-version-design]
  reference_implementations:
    - name: Pinecone Index Data
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      description: Committed vector records after upsert.
    - name: Qdrant Collections
      url: https://qdrant.tech/documentation/concepts/collections/
      description: Collection snapshots and point storage.
structure:
  identity_keys: [index_id, version]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 指向长期 Index 身份。
        en: References long-lived Index identity.
        ja: 長期 Index identity 参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-17
      allowed_values: []
      source_claims: [claim-index-version-id]
    - id: version
      labels: {zh: 版本号, en: Version number, ja: 版番号}
      definitions:
        zh: 同一 index_id 内单调不可变版本整数。
        en: Monotonic immutable version integer within one index_id.
        ja: 同一 index_id 内単調不変版整数。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 42
      allowed_values: []
      source_claims: [claim-index-version-num]
    - id: built_at
      labels: {zh: 构建时间, en: Built at, ja: build 時刻}
      definitions:
        zh: 快照成功提交 UTC 时间。
        en: UTC instant when snapshot was successfully committed.
        ja: snapshot 成功 commit UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T09:00:00Z
      allowed_values: []
      source_claims: [claim-index-version-built]
    - id: configuration_digest
      labels: {zh: 配置摘要, en: Configuration digest, ja: 設定 digest}
      definitions:
        zh: 该版构建时冻结的 metric、dimension、HNSW 或 fusion 配置 SHA-256。
        en: SHA-256 of metric, dimension, HNSW, or fusion config frozen at this version build.
        ja: 当版 build 時凍結 metric/dimension/HNSW/fusion 設定 SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:cfg42
      allowed_values: []
      source_claims: [claim-index-version-config]
  constraints:
    - id: index-version-immutable
      severity: error
      expression_language: plain
      expression: IndexEntry membership must belong to exactly one IndexVersion; cross-version attachment is invalid.
      explanation:
        zh: 跨版本拼接导致查询读到不一致快照。
        en: Cross-version attachment makes queries read inconsistent snapshots.
        ja: 版横断付与は不整合 snapshot read の原因。
      source_claims: [claim-index-version-design]
  required_relations: []
examples:
  - id: IndexVersion-example-pinecone-commit
    labels:
      zh: Pinecone 提交版本
      en: Pinecone committed version
      ja: Pinecone commit 版
    descriptions:
      zh: build-run-42 完成 Pinecone upsert 后发布 index-17@42（built_at=2026-07-16T09:00:00Z, configuration_digest 含 cosine/1536）。
      en: build-run-42 completes Pinecone upsert and publishes index-17@42 (built_at=2026-07-16T09:00:00Z, configuration_digest includes cosine/1536).
      ja: build-run-42 完了→index-17@42 公開（built_at/configuration_digest 含 cosine/1536）。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      version: upsert commit
    field_values:
      index_id: index-17
      version: 42
      built_at: 2026-07-16T09:00:00Z
      configuration_digest: sha256:cfg42
    related_node_ids:
      - IndexVersion
      - IndexBuildRun
    related_relation_ids: []
    source_claims:
      - claim-index-version-pinecone
      - claim-index-version-design
  - id: IndexVersion-example-refresh-increment
    labels:
      zh: 增量刷新后继版本
      en: Incremental refresh successor
      ja: incremental refresh 後続版
    descriptions:
      zh: refresh-run-43 从 index-17@42 增量 upsert 新 chunk 成功后发布 index-17@43；@42 成员冻结不可变。
      en: refresh-run-43 incrementally upserts new chunks from index-17@42 and publishes index-17@43 on success; @42 membership remains frozen.
      ja: refresh-run-43 が @42 から incremental→@43 公開。@42 membership 凍結。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: refresh lineage
    field_values:
      index_id: index-17
      version: 43
      predecessor_version: 42
    related_node_ids:
      - IndexVersion
      - IndexRefreshRun
    related_relation_ids: []
    source_claims:
      - claim-index-version-design
  - id: IndexVersion-example-not-build-run
    labels:
      zh: 版本非构建活动
      en: Version is not build run
      ja: version は build run ではない
    descriptions:
      zh: build-run-42 仍在 running 时不能存在 index-17@42；失败 run 也不产生 @44。
      en: index-17@42 cannot exist while build-run-42 is running; failed runs do not produce @44.
      ja: build-run-42 running 中 @42 不可。failed run は @44 生成しない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexVersion
      - IndexBuildRun
    related_relation_ids: []
    source_claims:
      - claim-index-version-design
parent_relation:
  id: IndexVersion-version_of-Index
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 是索引的版本
    en: is a version of index
    ja: 索引の版
  definitions:
    zh: IndexVersion —version_of→ Index 表示不可变快照由该长期逻辑索引拥有。
    en: IndexVersion —version_of→ Index means the immutable snapshot is owned by that long-lived logical index.
    ja: IndexVersion —version_of→ Index は不変 snapshot が長期 logical Index に属する。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse version_of, ja: 逆方向読取}
  conditions:
    - id: IndexVersion-version_of-Index-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when index_id matches and configuration family is compatible with the target Index.
      explanations:
        zh: 仅当 index_id 一致且配置兼容时成立。
        en: Assert only when index_id matches and configuration is compatible.
        ja: index_id 一致+設定互換時のみ assert。
      source_claims: [claim-index-version-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-version-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-index
    title: Pinecone Indexing Overview
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/indexes/create-an-index
    source_type: official-doc
    relevance: Committed index state after upsert.
  - id: src-index-version-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Immutable IndexVersion versus Index and build runs.
source_claims:
  - id: claim-index-version-pinecone
    source: src-pinecone-index
    supports: Pinecone separates index configuration from committed vector records after upsert.
    locator: Upsert vectors
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-version-design
    source: src-index-version-design
    supports: IndexVersion is immutable snapshot published only on successful build or refresh; failed runs must not publish successors.
    locator: IndexVersion boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-id
    source: src-index-version-design
    supports: index_id references owning Index identity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-num
    source: src-index-version-design
    supports: version is monotonic within index_id.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-built
    source: src-index-version-design
    supports: built_at records snapshot commit time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-config
    source: src-index-version-design
    supports: configuration_digest freezes build configuration for the version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
