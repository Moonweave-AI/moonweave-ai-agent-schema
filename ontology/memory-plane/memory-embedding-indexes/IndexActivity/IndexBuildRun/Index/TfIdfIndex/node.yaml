schema: moonweave.ai/ontology-node/v1
id: TfIdfIndex
kind: concept
labels:
  zh: TF-IDF 索引
  en: TF-IDF index
  ja: TF-IDF 索引
semantics:
  short_definition:
    zh: 以词项权重稀疏检索的 Index 子类。
    en: Index subtype for lexical sparse retrieval by term weights.
    ja: 語 weight 稀疏検索の Index subtype。
  definition:
    zh: TfIdfIndex 是 Index 子类，固定 lexical 检索配置（tokenizer、stemmer、idf 平滑）与 SparseVector/BM25 表示。Chroma 或 Elasticsearch 式 inverted index 映射 index_kind=tfidf；每条 IndexEntry 绑定 SparseVector {indices, values} 而非 float[] dense 向量。
    en: TfIdfIndex is an Index subtype fixing lexical retrieval configuration (tokenizer, stemmer, idf smoothing) and SparseVector/BM25 representation. Chroma or Elasticsearch-style inverted indexes map to index_kind=tfidf; each IndexEntry binds SparseVector {indices, values} not float[] dense vectors.
    ja: TfIdfIndex は tokenizer/stemmer/idf 設定と SparseVector/BM25 を固定する Index subtype。Chroma/Elasticsearch inverted index→index_kind=tfidf。IndexEntry は SparseVector {indices,values}。
  why_needed:
    zh: BM25/TF-IDF 索引的 metric 与维度语义不同于 cosine dense 向量，混建模会导致 hybrid 融合权重不可解释。
    en: BM25/TF-IDF indexes differ in metric and dimension semantics from cosine dense vectors; conflating them makes hybrid fusion weights inexplicable.
    ja: BM25/TF-IDF は dense cosine と metric/次元意味が異なり、混同すると hybrid fusion が説明不能。
  includes:
    - zh: 纳入 BM25 inverted index 与 SPLADE 稀疏 lexical 索引身份。
      en: Includes BM25 inverted index and SPLADE sparse lexical index identities.
      ja: BM25 inverted index/SPLADE sparse lexical index identity。
  excludes:
    - zh: 排除 VectorIndex、HybridIndex（除非显式声明 hybrid）与 DenseVector。
      en: Excludes VectorIndex, HybridIndex (unless explicitly hybrid), and DenseVector.
      ja: VectorIndex/HybridIndex（明示 hybrid 除く）/DenseVector を除外。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: "BM25 输出 SparseVector（indices + values 对）；Pinecone sparse_values 或 Qdrant sparse vector 通道写入 IndexEntry；configuration_digest 含 tokenizer 与 k1/b 参数。"
    en: "BM25 outputs SparseVector as indices-and-values pairs; Pinecone sparse_values or Qdrant sparse vector channel writes IndexEntry; configuration_digest includes tokenizer and k1/b params."
    ja: "BM25→SparseVector（indices+values）。Pinecone sparse_values/Qdrant sparse channel→IndexEntry。configuration_digest に tokenizer/k1/b。"
  typical_input:
    - description: BM25 sparse representation
      format: |
        {"indices": [10, 45, 892, 1204], "values": [0.82, 0.51, 0.33, 0.19]}
      source_claims: [claim-tfidf-index-bm25]
  typical_output:
    - description: TF-IDF index identity
      format: |
        {
          "index_id": "tfidf-index-8",
          "index_kind": "tfidf",
          "configuration_digest": "sha256:bm25-k1-1.2-b-0.75"
        }
      source_claims: [claim-tfidf-index-design]
  reference_implementations:
    - name: Pinecone Sparse Vectors
      url: https://docs.pinecone.io/guides/data/import-sparse-vectors
      description: Sparse vector upsert for lexical search.
    - name: Chroma Query
      url: https://docs.trychroma.com/docs/querying-collections/query-and-get
      description: Metadata-filtered retrieval complementing dense search.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 继承 Index.index_id。
        en: Inherits Index.index_id.
        ja: Index.index_id 継承。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tfidf-index-8
      allowed_values: []
      source_claims: [claim-tfidf-index-id]
    - id: tokenizer_profile
      labels: {zh: 分词配置, en: Tokenizer profile, ja: tokenizer profile}
      definitions:
        zh: 固定 tokenizer、stemmer 与 stopword 规则摘要。
        en: Digest of tokenizer, stemmer, and stopword rules.
        ja: tokenizer/stemmer/stopword 規則 digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:english-porter
      allowed_values: []
      source_claims: [claim-tfidf-index-tokenizer]
    - id: scoring_profile
      labels: {zh: 评分配置, en: Scoring profile, ja: scoring profile}
      definitions:
        zh: BM25 k1/b 或 TF-IDF idf 平滑参数摘要。
        en: BM25 k1/b or TF-IDF idf smoothing parameter digest.
        ja: BM25 k1/b または TF-IDF idf 平滑 parameter digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: bm25:k1=1.2,b=0.75
      allowed_values: []
      source_claims: [claim-tfidf-index-bm25]
  constraints: []
  required_relations: []
examples:
  - id: TfIdfIndex-example-bm25-sparse
    labels:
      zh: BM25 稀疏索引
      en: BM25 sparse index
      ja: BM25 sparse index
    descriptions:
      zh: tfidf-index-8 索引 chunk 经 BM25 生成的 SparseVector {indices, values}；与 dense index-17 分离，可在 HybridIndex 中 fusion。
      en: tfidf-index-8 indexes SparseVector {indices, values} from BM25 over chunks; separate from dense index-17; fusible in HybridIndex.
      ja: tfidf-index-8 が BM25 SparseVector を index。dense index-17 と分離、HybridIndex で fusion 可。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/data/import-sparse-vectors
      version: sparse_values
    field_values:
      index_id: tfidf-index-8
      scoring_profile: bm25:k1=1.2,b=0.75
    related_node_ids:
      - TfIdfIndex
      - SparseVector
    related_relation_ids: []
    source_claims:
      - claim-tfidf-index-bm25
      - claim-tfidf-index-design
  - id: TfIdfIndex-example-splade
    labels:
      zh: SPLADE 稀疏扩展
      en: SPLADE sparse expansion
      ja: SPLADE sparse expansion
    descriptions:
      zh: SPLADE 产出 learned sparse {indices, values} 写入 tfidf-index-9；tokenizer_profile 含 SPLADE vocab 映射。
      en: SPLADE produces learned sparse {indices, values} written to tfidf-index-9; tokenizer_profile includes SPLADE vocab mapping.
      ja: SPLADE learned sparse→tfidf-index-9。tokenizer_profile に SPLADE vocab mapping。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: SPLADE mapping
    field_values:
      index_id: tfidf-index-9
      scoring_profile: splade-v2
    related_node_ids:
      - TfIdfIndex
      - SparseVector
    related_relation_ids: []
    source_claims:
      - claim-tfidf-index-design
  - id: TfIdfIndex-example-not-vector
    labels:
      zh: TF-IDF 非 dense 向量索引
      en: TF-IDF is not dense vector index
      ja: TF-IDF は dense vector index ではない
    descriptions:
      zh: index-17（cosine, dims=1536）是 VectorIndex；float[] dense 与 {indices,values} sparse 不可互替。
      en: index-17 (cosine, dims=1536) is VectorIndex; float[] dense and {indices,values} sparse are not interchangeable.
      ja: index-17（cosine,1536）は VectorIndex。float[] dense と {indices,values} sparse は置換不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - TfIdfIndex
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-tfidf-index-design
parent_relation:
  id: TfIdfIndex-is_a-Index
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种索引
    en: is an index
    ja: 索引の一種
  definitions:
    zh: TfIdfIndex —is_a→ Index 因为它固定 lexical 稀疏检索配置与 SparseVector 表示。
    en: TfIdfIndex —is_a→ Index because it fixes lexical sparse retrieval configuration and SparseVector representation.
    ja: TfIdfIndex —is_a→ Index は lexical sparse 設定+SparseVector 固定のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: TfIdfIndex-is_a-Index-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when index_kind is tfidf and lexical scoring configuration is declared.
      explanations:
        zh: 仅当满足 TF-IDF 索引种差时建立该边。
        en: Assert only when TF-IDF index differentia holds.
        ja: TF-IDF index 種差成立時のみ assert。
      source_claims: [claim-tfidf-index-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-tfidf-index-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-sparse
    title: Pinecone Sparse Vectors
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/data/import-sparse-vectors
    source_type: official-doc
    relevance: Sparse vector upsert for lexical retrieval.
  - id: src-chroma-query
    title: Chroma Query and Get
    publisher: Chroma
    url: https://docs.trychroma.com/docs/querying-collections/query-and-get
    source_type: official-doc
    relevance: Metadata and retrieval complement to dense embeddings.
  - id: src-tfidf-index-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TfIdfIndex versus VectorIndex boundary.
source_claims:
  - id: claim-tfidf-index-bm25
    source: src-pinecone-sparse
    supports: Pinecone supports sparse vector upsert with indices and values for lexical-style retrieval.
    locator: Import sparse vectors
    evidence_kind: primary-doc
    confidence: high
  - id: claim-tfidf-index-design
    source: src-tfidf-index-design
    supports: TfIdfIndex fixes lexical configuration and SparseVector representation distinct from dense VectorIndex.
    locator: TfIdfIndex boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-tfidf-index-id
    source: src-tfidf-index-design
    supports: index_id inherits from Index identity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-tfidf-index-tokenizer
    source: src-tfidf-index-design
    supports: tokenizer_profile pins lexical preprocessing rules.
    locator: structure
    evidence_kind: design-inference
    confidence: high
