        zh: 将 tfidf-index-17 归入 TfIdfIndex，并继承长期 Index 身份。
        en: Classify tfidf-index-17 as TfIdfIndex and inherit long-lived Index identity.
        ja: tfidf-index-17 を TfIdfIndex と分類し、長期 Index 同一性を継承します。
      why_valid_or_invalid:
        zh: 它具有长期检索结构身份，并拥有语料级拟合状态而非单文档特征。
