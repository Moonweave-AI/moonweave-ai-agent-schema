  definitions:
    zh: TfIdfIndex 是 Index 的严格子类；种差为：拥有拟合语料词表、IDF 状态和 analyzer 配置。
    en: "TfIdfIndex is a strict subtype of Index; its reviewed differentia is: it owns a fitted corpus vocabulary, IDF state, and analyzer configuration."
    ja: TfIdfIndex は Index の厳密なsubtypeで、審査済み種差は「fitted corpus語彙・IDF状態・analyzer設定を所有します。」です。
  cardinality: null
