schema: moonweave.ai/ontology-node/v1
id: TfIdfIndex
kind: concept
status: review
labels:
  zh: TF-IDF 索引
  en: TF-IDF index
  ja: TF-IDF索引
semantics:
  short_definition:
    zh: 以词表、词频和逆文档频率组织文本的 Index。
    en: An Index organizing text through vocabulary, term frequency, and inverse document frequency.
    ja: 語彙・term frequency・inverse document frequencyでtextを編成する Index です。
  definition:
    zh: TfIdfIndex 是拥有拟合语料词表、IDF 权重与分析器配置的 Index，用于把文档转换为 TF-IDF 特征并支持词项相似检索；它不是一条 SparseVector 或原始词频表。
    en: TfIdfIndex is an Index owning a fitted corpus vocabulary, IDF weights, and analyzer configuration to transform documents into TF-IDF features and support lexical similarity retrieval; it is not one SparseVector or a raw term-frequency table.
    ja: TfIdfIndex はfitted corpus語彙・IDF weight・analyzer設定を所有しdocumentをTF-IDF featureへ変換してlexical類似検索を支える Index で、単一SparseVectorや原term-frequency表ではありません。
  why_needed:
    zh: 区分跨语料检索结构与单条稀疏坐标。
    en: Separates the corpus-wide retrieval structure from one sparse coordinate vector.
    ja: corpus全体検索構造を一つのsparse座標vectorから分離します。
  includes:
    - zh: 纳入已拟合词表、IDF 与 analyzer 的文本索引。
      en: Includes text indexes with fitted vocabulary, IDF, and analyzer.
      ja: fitted語彙・IDF・analyzerを持つtext indexを含みます。
  excludes:
    - zh: 排除单文档 SparseVector、未拟合 Vectorizer 配置和原文档。
      en: Excludes a per-document SparseVector, an unfitted vectorizer configuration, and source documents.
      ja: document単位SparseVector・unfitted vectorizer設定・原documentを除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - index_id
  fields:
    - id: index_id
      labels:
        zh: 索引标识
        en: index ID
        ja: index ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识 TF-IDF 索引。
        en: Stable identifier for the TF-IDF index.
        ja: TF-IDF indexの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: tfidf-index-17
      source_claims:
        - claim-tf-idf-index-002
    - id: vocabulary_digest
      labels:
        zh: 词表摘要
        en: vocabulary digest
        ja: 語彙digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定拟合后的词项到特征映射。
        en: Fixes the fitted term-to-feature mapping.
        ja: fitted term-to-feature mappingを固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:vocab17
      source_claims:
        - claim-tf-idf-index-003
    - id: analyzer_profile
      labels:
        zh: 分析器配置
        en: analyzer profile
        ja: analyzer profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定分词、n-gram 和归一化规则。
        en: Fixes tokenization, n-gram, and normalization rules.
        ja: tokenization・n-gram・normalization規則を固定します。
      allowed_values: []
      pattern: null
      example_value: word:1-2:lower
      source_claims:
        - claim-tf-idf-index-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: TfIdfIndex-example-positive-manual-001
    kind: positive
    labels:
      zh: TF-IDF 索引正例
      en: "Positive case: TF-IDF index"
      ja: TF-IDF索引正例
    scenario_id: null
    descriptions:
      zh: tfidf-index-17 保留拟合词表摘要和 analyzer 配置。
      en: tfidf-index-17 retains a fitted vocabulary digest and analyzer profile.
      ja: tfidf-index-17 はfitted語彙digestとanalyzer profileを保持します。
    field_values:
      index_id: tfidf-index-17
      vocabulary_digest: sha256:vocab17
      analyzer_profile: word:1-2:lower
      index_kind: tfidf
      configuration_digest: sha256:tfidf-index-17-vocab17-word-1-2-lower
    related_node_ids:
      - TfIdfIndex
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 TfIdfIndex。
      en: Classify the object as TfIdfIndex.
      ja: この対象を TfIdfIndex に分類します。
    why_valid_or_invalid:
      zh: 它拥有跨文档统计和稳定特征空间。
      en: It owns corpus-wide statistics and a stable feature space.
      ja: corpus横断統計と安定feature spaceを所有します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tf-idf-index-005
  - id: TfIdfIndex-example-boundary-manual-001
    kind: boundary
    labels:
      zh: TF-IDF 索引边界例
      en: "Boundary case: TF-IDF index"
      ja: TF-IDF索引境界例
    scenario_id: null
    descriptions:
      zh: doc17-vector 只是文档 17 转换后的一行稀疏坐标。
      en: doc17-vector is only one sparse coordinate row transformed from document 17.
      ja: doc17-vector はdocument 17から変換した一行sparse座標だけです。
    field_values: {}
    related_node_ids:
      - TfIdfIndex
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 TfIdfIndex。
      en: Do not classify the object as TfIdfIndex.
      ja: この対象を TfIdfIndex に分類しません。
    why_valid_or_invalid:
      zh: 单条输出不拥有语料词表与 IDF 生命周期。
      en: One output row does not own the corpus vocabulary and IDF lifecycle.
      ja: 一出力rowはcorpus語彙とIDF lifecycleを所有しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tf-idf-index-006
external_mappings: []
