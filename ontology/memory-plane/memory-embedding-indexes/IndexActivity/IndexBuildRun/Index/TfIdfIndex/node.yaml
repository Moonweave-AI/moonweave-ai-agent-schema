    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: TfIdfIndex-is_a-Index-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies Index and also satisfies the differentia: it owns a fitted corpus vocabulary, IDF state, and analyzer configuration."
      explanations:
        zh: 仅当对象首先满足 Index 定义且满足种差“拥有拟合语料词表、IDF 状态和 analyzer 配置。”时成立。
        en: "Assert only when the object first satisfies Index and also satisfies the differentia: it owns a fitted corpus vocabulary, IDF state, and analyzer configuration."
        ja: 対象がまず Index を満たし、さらに種差「fitted corpus語彙・IDF状態・analyzer設定を所有します。」を満たす時だけ成立します。
      source_claims:
