      scenario_id: null
      descriptions:
        zh: tfidf-index-17 以稳定 index_id 保留 corpus-policy-7 拟合词表、IDF 数组与 analyzer-profile-3。
        en: tfidf-index-17 has a stable index_id and retains the corpus-policy-7 fitted vocabulary, IDF array, and analyzer-profile-3.
        ja: tfidf-index-17 は安定 index_id を持ち、corpus-policy-7 でfitした語彙、IDF配列、analyzer-profile-3を保持します。
      field_values: {}
      related_node_ids:
