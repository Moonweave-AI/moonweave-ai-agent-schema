schema: moonweave.ai/ontology-node/v1
id: IndexRefreshEvent
kind: concept
labels:
  zh: 索引刷新事件
  en: Index refresh event
  ja: 索引 refresh event
semantics:
  short_definition:
    zh: 触发 IndexRefreshRun 的调度或变更信号。
    en: Scheduling or change signal that triggers an IndexRefreshRun.
    ja: IndexRefreshRun を trigger する schedule/変更 signal。
  definition:
    zh: IndexRefreshEvent 是记录为何启动 IndexRefreshRun 的信息事件，含 event_id、trigger_reason（新 chunk 到达、配置变更、定时刷新）与 affected index_id。它不是 RefreshRun 本身，也不是 IndexVersion 快照；Webhook、cron 或 ingestion pipeline 完成信号映射到此节点。
    en: IndexRefreshEvent records why an IndexRefreshRun started, with event_id, trigger_reason (new chunks arrived, config change, scheduled refresh), and affected index_id. It is not the RefreshRun itself or an IndexVersion snapshot; webhooks, cron, or ingestion pipeline completion signals map here.
    ja: IndexRefreshEvent は IndexRefreshRun 開始理由（event_id/trigger_reason/affected index_id）を記録する information event。RefreshRun/IndexVersion ではない。Webhook/cron/ingestion 完了 signal が写像先。
  why_needed:
    zh: 没有触发事件，团队无法回答 index-17@43 是因新文档入库还是 nightly cron 而刷新。
    en: Without trigger events, teams cannot tell whether index-17@43 refreshed due to new documents or nightly cron.
    ja: trigger event なしでは index-17@43 が新 document/cron どちら起因か答えられない。
  includes:
    - zh: 纳入 ingestion 完成、chunk delta 检测与定时 schedule 触发的刷新信号。
      en: Includes refresh signals from ingestion completion, chunk delta detection, and scheduled triggers.
      ja: ingestion 完了/chunk delta 検出/schedule trigger による refresh signal。
  excludes:
    - zh: 排除 IndexRefreshRun 活动、IndexVersion 与 EmbeddingRun。
      en: Excludes IndexRefreshRun activity, IndexVersion, and EmbeddingRun.
      ja: IndexRefreshRun activity/IndexVersion/EmbeddingRun を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LlamaIndex ingestion pipeline 完成 callback、Pinecone 无直接 event 时 Moonweave 在 chunk delta 检测后 emit refresh-event-43→trigger IndexRefreshRun；event 记录 trigger_reason 与 observed_at，不携带 vector 数据。
    en: LlamaIndex ingestion pipeline completion callback; when Pinecone has no direct event, Moonweave emits refresh-event-43 after chunk delta detection to trigger IndexRefreshRun; event records trigger_reason and observed_at without vector data.
    ja: LlamaIndex ingestion 完了 callback/chunk delta 後 refresh-event-43 emit→IndexRefreshRun trigger。trigger_reason/observed_at のみ。
  typical_input:
    - description: Ingestion pipeline completion signal
      format: |
        {
          "event": "ingestion_complete",
          "document_id": "doc-policy",
          "document_version": "v8",
          "new_chunks": 12
        }
      source_claims: [claim-index-refresh-event-llamaindex]
  typical_output:
    - description: Refresh event record
      format: |
        {
          "event_id": "refresh-event-43",
          "trigger_reason": "chunk_delta",
          "affected_index_id": "index-17",
          "observed_at": "2026-07-16T12:00:00Z"
        }
      source_claims: [claim-index-refresh-event-design]
  reference_implementations:
    - name: LlamaIndex Ingestion Pipeline
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Pipeline completion and document updates.
    - name: Pinecone Upsert
      url: https://docs.pinecone.io/guides/data/upsert-data
      description: Downstream refresh often follows upsert triggers.
structure:
  identity_keys: [event_id]
  fields:
    - id: event_id
      labels: {zh: 事件标识, en: Event identifier, ja: event 識別子}
      definitions:
        zh: 唯一标识一次 IndexRefreshEvent。
        en: Uniquely identifies one IndexRefreshEvent.
        ja: 一回 IndexRefreshEvent を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: refresh-event-43
      allowed_values: []
      source_claims: [claim-index-refresh-event-id]
    - id: trigger_reason
      labels: {zh: 触发原因, en: Trigger reason, ja: trigger reason}
      definitions:
        zh: chunk_delta、config_change、scheduled 或 manual 等枚举原因。
        en: Enumerated reason such as chunk_delta, config_change, scheduled, or manual.
        ja: chunk_delta/config_change/scheduled/manual 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk_delta
      allowed_values: [chunk_delta, config_change, scheduled, manual]
      source_claims: [claim-index-refresh-event-reason]
    - id: affected_index_id
      labels: {zh: 受影响索引, en: Affected index, ja: 影響 index}
      definitions:
        zh: 该事件意图刷新的 Index index_id。
        en: Index index_id this event intends to refresh.
        ja: この event が refresh 意図する Index index_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-17
      allowed_values: []
      source_claims: [claim-index-refresh-event-index]
    - id: observed_at
      labels: {zh: 观测时间, en: Observed at, ja: 観測時刻}
      definitions:
        zh: 系统观测到触发条件的 UTC 时间。
        en: UTC instant when the trigger condition was observed.
        ja: trigger 条件観測 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T12:00:00Z
      allowed_values: []
      source_claims: [claim-index-refresh-event-observed]
  constraints: []
  required_relations: []
examples:
  - id: IndexRefreshEvent-example-chunk-delta
    labels:
      zh: 新 chunk 触发刷新
      en: New chunk triggers refresh
      ja: 新 chunk が refresh trigger
    descriptions:
      zh: doc-policy v8 入库产生 12 个新 chunk 后 emit refresh-event-43（trigger_reason=chunk_delta），随后启动 refresh-run-43 增量 upsert index-17。
      en: After doc-policy v8 ingests 12 new chunks, emit refresh-event-43 (trigger_reason=chunk_delta), then start refresh-run-43 to incrementally upsert index-17.
      ja: doc-policy v8 で 12 新 chunk→refresh-event-43（chunk_delta）→refresh-run-43 起動。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: ingestion pipeline
    field_values:
      event_id: refresh-event-43
      trigger_reason: chunk_delta
      affected_index_id: index-17
      observed_at: 2026-07-16T12:00:00Z
    related_node_ids:
      - IndexRefreshEvent
      - IndexRefreshRun
      - memory-chunking-situating
    related_relation_ids: []
    source_claims:
      - claim-index-refresh-event-llamaindex
      - claim-index-refresh-event-design
  - id: IndexRefreshEvent-example-scheduled
    labels:
      zh: 定时刷新事件
      en: Scheduled refresh event
      ja: scheduled refresh event
    descriptions:
      zh: nightly cron 在 02:00 UTC emit refresh-event-44（trigger_reason=scheduled）对 index-17 执行增量一致性检查并可能启动 IndexRefreshRun。
      en: Nightly cron at 02:00 UTC emits refresh-event-44 (trigger_reason=scheduled) for index-17 consistency check and possible IndexRefreshRun.
      ja: nightly cron 02:00 UTC→refresh-event-44（scheduled）→index-17 整合チェック。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: scheduled trigger
    field_values:
      event_id: refresh-event-44
      trigger_reason: scheduled
      affected_index_id: index-17
    related_node_ids:
      - IndexRefreshEvent
      - IndexRefreshRun
    related_relation_ids: []
    source_claims:
      - claim-index-refresh-event-design
  - id: IndexRefreshEvent-example-not-run
    labels:
      zh: 事件非刷新运行
      en: Event is not refresh run
      ja: event は refresh run ではない
    descriptions:
      zh: refresh-run-43 是 IndexRefreshRun 含 started_at 与 outcome；refresh-event-43 只是触发信号，无 upsert 行为。
      en: refresh-run-43 is IndexRefreshRun with started_at and outcome; refresh-event-43 is only a trigger signal with no upsert behavior.
      ja: refresh-run-43 は IndexRefreshRun（started_at/outcome）。refresh-event-43 は trigger signal のみ。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexRefreshEvent
      - IndexRefreshRun
    related_relation_ids: []
    source_claims:
      - claim-index-refresh-event-design
parent_relation:
  id: IndexRefreshEvent-triggers-IndexRefreshRun
  predicate: triggers
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 触发索引刷新运行
    en: triggers index refresh run
    ja: 索引 refresh run を trigger
  definitions:
    zh: IndexRefreshEvent triggers IndexRefreshRun 表示观测到触发条件后启动具名增量刷新活动。
    en: IndexRefreshEvent triggers IndexRefreshRun means a named incremental refresh activity starts after the trigger condition is observed.
    ja: IndexRefreshEvent triggers IndexRefreshRun は trigger 条件観測後 named incremental refresh activity 開始。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个事件可触发零次或一次 RefreshRun（去重后）。
    en: One event may trigger zero or one RefreshRun after deduplication.
    ja: 一 event は dedupe 後 0/1 RefreshRun trigger 可。
  inverse_reading:
    predicate: triggered_by
    labels: {zh: 反向读取, en: inverse triggers, ja: 逆方向読取}
  conditions:
    - id: IndexRefreshEvent-triggers-IndexRefreshRun-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when a RefreshRun starts in response to this event with matching affected_index_id.
      explanations:
        zh: 仅当 RefreshRun 响应此事件且 index_id 一致时成立。
        en: Assert only when RefreshRun responds to this event with matching index_id.
        ja: RefreshRun が event 応答かつ index_id 一致時のみ assert。
      source_claims: [claim-index-refresh-event-design]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-refresh-event-design]
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-llamaindex-ingestion
    title: LlamaIndex Ingestion Pipeline
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: Pipeline completion as refresh trigger.
  - id: src-index-refresh-event-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Trigger event versus refresh run separation.
source_claims:
  - id: claim-index-refresh-event-llamaindex
    source: src-llamaindex-ingestion
    supports: LlamaIndex ingestion pipelines emit completion signals when documents are indexed.
    locator: Ingestion pipeline
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-refresh-event-design
    source: src-index-refresh-event-design
    supports: IndexRefreshEvent records trigger reason separately from IndexRefreshRun execution and IndexVersion publication.
    locator: IndexRefreshEvent boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-event-id
    source: src-index-refresh-event-design
    supports: event_id identifies one refresh trigger event.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-event-reason
    source: src-index-refresh-event-design
    supports: trigger_reason classifies why refresh was requested.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-event-index
    source: src-index-refresh-event-design
    supports: affected_index_id names the target Index.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-event-observed
    source: src-index-refresh-event-design
    supports: observed_at records when the trigger condition was detected.
    locator: structure
    evidence_kind: design-inference
    confidence: high
