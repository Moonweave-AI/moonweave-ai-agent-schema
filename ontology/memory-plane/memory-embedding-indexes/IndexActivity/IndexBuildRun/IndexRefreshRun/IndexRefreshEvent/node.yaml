schema: moonweave.ai/ontology-node/v1
id: IndexRefreshEvent
kind: concept
status: review
labels:
  zh: 索引刷新触发事件
  en: Index refresh event
  ja: 索引refresh event
semantics:
  short_definition:
    zh: 在确定时刻记录“应启动一次刷新”的触发事实。
    en: A time-point fact recording that an index refresh should start.
    ja: index refresh開始要求を確定時刻に記録するtrigger事実です。
  definition:
    zh: IndexRefreshEvent 是在一个观测时刻记录来源变更、计划到期或人工请求并触发 IndexRefreshRun 的事件；它不执行构建、也不直接产生或 supersede IndexVersion。
    en: IndexRefreshEvent is an event observed at one time point that records a source change, schedule expiry, or manual request and triggers an IndexRefreshRun; it does not execute the build or directly produce or supersede IndexVersion.
    ja: IndexRefreshEvent は一観測時点でsource change・schedule expiry・manual requestを記録し IndexRefreshRun をtriggerするeventで、build実行や IndexVersion の直接生成/supersedeはしません。
  why_needed:
    zh: 把触发事实与持续运行活动、版本结果分开。
    en: Separates trigger fact from durative run and version result.
    ja: trigger事実を継続run・版結果から分離します。
  includes:
    - zh: 纳入 CDC 通知、定时触发与人工刷新请求的发生记录。
      en: Includes occurrence records for CDC notifications, schedules, and manual refresh requests.
      ja: CDC通知・schedule・manual refresh requestの発生記録を含みます。
  excludes:
    - zh: 排除 IndexRefreshRun、IndexVersion 和一般错误事件。
      en: Excludes IndexRefreshRun, IndexVersion, and generic error events.
      ja: IndexRefreshRun・IndexVersion・一般error eventを除外します。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - event_id
  fields:
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识触发事件。
        en: Stable identifier for the trigger event.
        ja: trigger eventの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: refresh-event-43
      source_claims:
        - claim-index-refresh-event-002
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录触发事实发生时刻。
        en: Records when the trigger fact occurred.
        ja: trigger事実の発生時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:30:00Z
      source_claims:
        - claim-index-refresh-event-003
    - id: trigger_reason
      labels:
        zh: 触发原因
        en: trigger reason
        ja: trigger理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 source-change、schedule 或 manual。
        en: Distinguishes source-change, schedule, or manual trigger.
        ja: source-change・schedule・manual triggerを区別します。
      allowed_values: []
      pattern: null
      example_value: source-change
      source_claims:
        - claim-index-refresh-event-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexRefreshEvent-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引刷新触发事件正例
      en: "Positive case: Index refresh event"
      ja: 索引refresh event正例
    scenario_id: null
    descriptions:
      zh: refresh-event-43 在变更被观测时记录原因并触发 refresh-run-43。
      en: refresh-event-43 records a reason when a change is observed and triggers refresh-run-43.
      ja: refresh-event-43 はchange観測時に理由を記録し refresh-run-43をtriggerします。
    field_values:
      event_id: refresh-event-43
      observed_at: 2026-07-16T09:30:00Z
      trigger_reason: source-change
    related_node_ids:
      - IndexRefreshEvent
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 IndexRefreshEvent。
      en: Classify the object as IndexRefreshEvent.
      ja: この対象を IndexRefreshEvent に分類します。
    why_valid_or_invalid:
      zh: 事件时点与后续持续活动身份分开。
      en: The event time point is distinct from the subsequent durative activity identity.
      ja: event時点を後続継続activity同一性から分離しています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-refresh-event-005
  - id: IndexRefreshEvent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引刷新触发事件边界例
      en: "Boundary case: Index refresh event"
      ja: 索引refresh event境界例
    scenario_id: null
    descriptions:
      zh: refresh-run-43 从 09:30 到 09:42 执行增量构建。
      en: refresh-run-43 executes incremental construction from 09:30 to 09:42.
      ja: refresh-run-43 は09:30から09:42までincremental buildを実行します。
    field_values: {}
    related_node_ids:
      - IndexRefreshEvent
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 IndexRefreshEvent。
      en: Do not classify the object as IndexRefreshEvent.
      ja: この対象を IndexRefreshEvent に分類しません。
    why_valid_or_invalid:
      zh: 有持续时间、输入与输出的是活动而非触发事件。
      en: Something with duration, inputs, and outputs is an activity, not the trigger event.
      ja: 継続時間・入力・出力を持つものはactivityでtrigger eventではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-refresh-event-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexRefreshEvent-triggers-IndexRefreshRun
  predicate: triggers
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 触发刷新运行
    en: triggers refresh run
    ja: refresh runをtriggerする
  definitions:
    zh: IndexRefreshEvent —triggers→ IndexRefreshRun 表示观测到的变更/计划/人工请求导致创建并启动一个刷新运行。
    en: IndexRefreshEvent —triggers→ IndexRefreshRun means that the observed change, schedule, or manual request causes one refresh run to be created and started.
    ja: IndexRefreshEvent —triggers→ IndexRefreshRun は観測change・schedule・manual requestが一refresh runの作成/開始を引き起こすことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_triggers
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexRefreshEvent-triggers-IndexRefreshRun-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when run.trigger_event_id equals the event ID and run start is not earlier than the event.
      explanations:
        zh: 仅当 run.trigger_event_id 等于事件 ID 且开始时间不早于事件时成立。
        en: Assert only when run.trigger_event_id equals the event ID and run start is not earlier than the event.
        ja: run.trigger_event_idがevent IDと同じでrun開始がeventより前でない時だけ成立します。
      source_claims:
        - claim-index-refresh-event-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexRefreshEvent-triggers-IndexRefreshRun-example-positive-manual-001
      kind: positive
      labels:
        zh: 触发刷新运行正例
        en: "Positive case: triggers refresh run"
        ja: refresh runをtriggerする正例
      scenario_id: null
      descriptions:
        zh: refresh-event-43 记录 source-change 并启动 refresh-run-43。
        en: refresh-event-43 records a source change and starts refresh-run-43.
        ja: refresh-event-43 はsource-changeを記録し refresh-run-43を開始します。
      field_values: {}
      related_node_ids:
        - IndexRefreshEvent
        - IndexRefreshRun
      related_relation_ids:
        - IndexRefreshEvent-triggers-IndexRefreshRun
      expected_result:
        zh: 建立 refresh-event-43 triggers refresh-run-43 的显式因果事实。
        en: Assert the explicit causal fact that refresh-event-43 triggers refresh-run-43.
        ja: refresh-event-43 triggers refresh-run-43 という明示的 causal fact を確立します。
      why_valid_or_invalid:
        zh: 运行的 trigger_event_id 精确引用该事件，且运行开始晚于事件记录时间，身份与时序均一致。
        en: The run's trigger_event_id exactly references this event, and the run starts after the event timestamp, aligning identity and temporal order.
        ja: run の trigger_event_id がこの event を exact 参照し、run 開始が event 記録時刻より後なので identity と時系列が一致します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-refresh-event-007
    - id: IndexRefreshEvent-triggers-IndexRefreshRun-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 触发刷新运行边界例
        en: "Boundary case: triggers refresh run"
        ja: refresh runをtriggerする境界例
      scenario_id: null
      descriptions:
        zh: 同日发生但 trigger_event_id 不同的 refresh-run-44 不能连到该事件。
        en: refresh-run-44 occurring the same day but with another trigger ID cannot be linked to this event.
        ja: 同日発生でも別trigger IDの refresh-run-44 をこのeventへ結びません。
      field_values: {}
      related_node_ids:
        - IndexRefreshEvent
        - IndexRefreshRun
      related_relation_ids:
        - IndexRefreshEvent-triggers-IndexRefreshRun
      expected_result:
        zh: 不把 refresh-run-44 连接为 refresh-event-43 的触发结果。
        en: Do not connect refresh-run-44 as an effect triggered by refresh-event-43.
        ja: refresh-run-44 を refresh-event-43 が trigger した結果として接続しません。
      why_valid_or_invalid:
        zh: 同日发生只提供时间相关性；不同 trigger_event_id 明确指向另一原因，不能反向猜测因果。
        en: Same-day occurrence provides temporal correlation only; a different trigger_event_id names another cause and blocks causal guesswork.
        ja: 同日発生は時間相関だけで、異なる trigger_event_id が別原因を示すため causal 推測はできません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-refresh-event-007
  source_claims:
    - claim-index-refresh-event-007
