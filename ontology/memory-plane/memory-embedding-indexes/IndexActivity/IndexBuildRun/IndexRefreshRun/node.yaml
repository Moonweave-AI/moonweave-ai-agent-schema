schema: moonweave.ai/ontology-node/v1
id: IndexRefreshRun
kind: concept
status: accepted
labels:
  zh: 索引刷新运行
  en: Index refresh run
  ja: 索引refresh run
semantics:
  short_definition:
    zh: 消费前序 IndexVersion 与变更集并产生后继版本的增量构建。
    en: An incremental build consuming a predecessor IndexVersion and change set to produce a successor version.
    ja: predecessor IndexVersion とchange setを消費しsuccessor版を生成するincremental buildです。
  definition:
    zh: IndexRefreshRun 是一种 IndexBuildRun，其种差是必须消费一个明确前序 IndexVersion 与变更集，并产生同一 Index 的新 IndexVersion；版本之间的先后由输入/输出表达，而不是把运行本身说成 supersedes 版本。
    en: IndexRefreshRun is an IndexBuildRun distinguished by consuming an explicit predecessor IndexVersion plus a change set and producing a new IndexVersion of the same Index; version succession is expressed by input/output, not by saying that the run itself supersedes a version.
    ja: IndexRefreshRun は明示predecessor IndexVersionとchange setを消費し同一Indexの新 IndexVersionを生成する IndexBuildRun で、版継承は入出力で表しrun自体が版をsupersedeするとはしません。
  why_needed:
    zh: 修复刷新运行与普通构建平级、并错误 supersede 版本的问题。
    en: Fixes refresh being flat beside build and incorrectly superseding a version.
    ja: refreshがbuildと同列で版を誤ってsupersedeする問題を修正します。
  includes:
    - zh: 纳入有前序版本、变更集和后继版本的增量构建。
      en: Includes incremental builds with predecessor version, change set, and successor version.
      ja: predecessor版・change set・successor版を持つincremental buildを含みます。
  excludes:
    - zh: 排除首次全量构建、刷新触发事件和版本实体。
      en: Excludes an initial full build, refresh trigger event, and version entity.
      ja: 初回full build・refresh trigger event・版entityを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - run_id
  fields:
    - id: run_id
      labels:
        zh: 运行标识
        en: run ID
        ja: run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识刷新活动。
        en: Stable identifier for the refresh activity.
        ja: refresh activityの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: refresh-run-43
      source_claims:
        - claim-index-refresh-run-002
    - id: predecessor_version
      labels:
        zh: 前序版本
        en: predecessor version
        ja: predecessor版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录被刷新版本。
        en: Records the version being refreshed.
        ja: refresh対象版を記録します。
      allowed_values: []
      pattern: null
      example_value: index-17@42
      source_claims:
        - claim-index-refresh-run-003
    - id: change_set_digest
      labels:
        zh: 变更集摘要
        en: change-set digest
        ja: change set digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次新增、更新与删除集合。
        en: Fixes additions, updates, and deletions for this refresh.
        ja: refreshの追加・更新・削除集合を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:delta43
      source_claims:
        - claim-index-refresh-run-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexRefreshRun-example-positive-manual-001
    kind: positive
    labels:
      zh: 索引刷新运行正例
      en: "Positive case: Index refresh run"
      ja: 索引refresh run正例
    scenario_id: null
    descriptions:
      zh: refresh-run-43 消费 index-17@42 与 delta43 并产生 index-17@43。
      en: refresh-run-43 consumes index-17@42 and delta43 and produces index-17@43.
      ja: refresh-run-43 は index-17@42 と delta43を消費し index-17@43を生成します。
    field_values:
      run_id: refresh-run-43
      predecessor_version: index-17@42
      change_set_digest: sha256:delta43
      build_mode: incremental
      source_manifest_digest: sha256:manifest42-plus-delta43
      activity_id: refresh-run-43
      started_at: 2026-07-16T11:20:00Z
      status: completed
    related_node_ids:
      - IndexRefreshRun
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 IndexRefreshRun。
      en: Classify the object as IndexRefreshRun.
      ja: この対象を IndexRefreshRun に分類します。
    why_valid_or_invalid:
      zh: 前序、增量输入和后继输出构成完整刷新语义。
      en: Predecessor, incremental input, and successor output form complete refresh semantics.
      ja: predecessor・incremental入力・successor出力が完全refresh意味を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-refresh-run-005
  - id: IndexRefreshRun-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 索引刷新运行边界例
      en: "Boundary case: Index refresh run"
      ja: 索引refresh run境界例
    scenario_id: null
    descriptions:
      zh: build-run-1 从空索引全量导入所有表示。
      en: build-run-1 imports all representations into an empty index.
      ja: build-run-1 は空indexへ全表現をfull importします。
    field_values: {}
    related_node_ids:
      - IndexRefreshRun
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 IndexRefreshRun。
      en: Do not classify the object as IndexRefreshRun.
      ja: この対象を IndexRefreshRun に分類しません。
    why_valid_or_invalid:
      zh: 没有前序版本与增量变更集，只能归为普通 IndexBuildRun。
      en: Without predecessor version and incremental change set it is only an IndexBuildRun.
      ja: predecessor版とincremental change setがないため通常 IndexBuildRunです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-refresh-run-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexRefreshRun-is_a-IndexBuildRun
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: IndexRefreshRun 是 IndexBuildRun 的严格子类；种差为：必须消费明确前序 IndexVersion 与变更集并产生同一 Index 的后继版本。
    en: "IndexRefreshRun is a strict subtype of IndexBuildRun; its reviewed differentia is: it must consume an explicit predecessor IndexVersion and change set and produce a successor version of the same Index."
    ja: IndexRefreshRun は IndexBuildRun の厳密なsubtypeで、審査済み種差は「明示predecessor IndexVersionとchange setを消費し同一Indexのsuccessor版を生成します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexRefreshRun-is_a-IndexBuildRun-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies IndexBuildRun and also satisfies the differentia: it must consume an explicit predecessor IndexVersion and change set and produce a successor version of the same Index."
      explanations:
        zh: 仅当对象首先满足 IndexBuildRun 定义且满足种差“必须消费明确前序 IndexVersion 与变更集并产生同一 Index 的后继版本。”时成立。
        en: "Assert only when the object first satisfies IndexBuildRun and also satisfies the differentia: it must consume an explicit predecessor IndexVersion and change set and produce a successor version of the same Index."
        ja: 対象がまず IndexBuildRun を満たし、さらに種差「明示predecessor IndexVersionとchange setを消費し同一Indexのsuccessor版を生成します。」を満たす時だけ成立します。
      source_claims:
        - claim-index-refresh-run-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexRefreshRun-is_a-IndexBuildRun-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: refresh-run-43 消费 index-17@42 与 delta43，并为同一 index-17 发布后继版本 @43。
        en: refresh-run-43 consumes index-17@42 and delta43 and publishes successor version @43 for the same index-17.
        ja: refresh-run-43 は index-17@42 と delta43 を消費し、同じ index-17 の後続版 @43 を公開します。
      field_values: {}
      related_node_ids:
        - IndexRefreshRun
        - IndexBuildRun
      related_relation_ids:
        - IndexRefreshRun-is_a-IndexBuildRun
      expected_result:
        zh: 将 refresh-run-43 归入 IndexBuildRun 下的增量 IndexRefreshRun 分支。
        en: Classify refresh-run-43 in the incremental IndexRefreshRun branch beneath IndexBuildRun.
        ja: refresh-run-43 を IndexBuildRun 配下の incremental IndexRefreshRun 分岐に分類します。
      why_valid_or_invalid:
        zh: 它具备构建运行的输入输出闭环，并额外满足明确前序版本与变更集的刷新种差。
        en: It has the build-run input/output closure and additionally satisfies the refresh differentia of an explicit predecessor and change set.
        ja: build-runのinput/output閉包に加え、明示predecessor版とchange setというrefresh種差を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-refresh-run-007
    - id: IndexRefreshRun-is_a-IndexBuildRun-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 没有前序版本的首次全量构建只属于 IndexBuildRun。
        en: An initial full build with no predecessor version is only an IndexBuildRun.
        ja: predecessor版のない初回full buildは IndexBuildRunに留まります。
      field_values: {}
      related_node_ids:
        - IndexRefreshRun
        - IndexBuildRun
      related_relation_ids:
        - IndexRefreshRun-is_a-IndexBuildRun
      expected_result:
        zh: 将首次全量运行保持为 IndexBuildRun，不提升为 IndexRefreshRun。
