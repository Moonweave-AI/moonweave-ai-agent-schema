        en: An initial build has neither predecessor_version nor a delta manifest, so it lacks both necessary refresh differentia.
        ja: 初回 build には predecessor_version も delta manifest もなく、refresh を区別する二つの必須種差を欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-index-refresh-run-007
  source_claims:
    - claim-index-refresh-run-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
