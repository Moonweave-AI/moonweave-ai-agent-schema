          en: Same index, distinct version, and generating run are verifiable.
          ja: 同index・別version・generating runを検証できます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-refresh-run-009
      - id: IndexRefreshRun-produces-IndexVersion-example-boundary-manual-001
