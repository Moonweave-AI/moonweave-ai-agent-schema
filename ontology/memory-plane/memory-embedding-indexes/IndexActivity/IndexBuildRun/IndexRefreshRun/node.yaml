schema: moonweave.ai/ontology-node/v1
id: IndexRefreshRun
kind: concept
labels:
  zh: 索引刷新运行
  en: Index refresh run
  ja: 索引 refresh run
semantics:
  short_definition:
    zh: 从前序 IndexVersion 增量发布后继版本的构建活动。
    en: Build activity incrementally publishing a successor IndexVersion from a predecessor.
    ja: 前序 IndexVersion から後続版を incremental 公開する build activity。
  definition:
    zh: IndexRefreshRun 是 IndexBuildRun 子类，build_mode=incremental，消费 predecessor IndexVersion（如 index-17@42）与新 Representation delta，成功时发布 index-17@43。失败 run 不产生 @44；Pinecone incremental upsert 与 Chroma collection.update 是典型映射。
    en: IndexRefreshRun is an IndexBuildRun subtype with build_mode=incremental, consuming predecessor IndexVersion (e.g., index-17@42) and new Representation delta, publishing index-17@43 on success. Failed runs do not produce @44; Pinecone incremental upsert and Chroma collection.update are typical mappings.
    ja: IndexRefreshRun は build_mode=incremental の IndexBuildRun subtype。predecessor index-17@42+新 Representation delta→成功時 index-17@43。失敗 run は @44 生成しない。
  why_needed:
    zh: 增量刷新与全量 rebuild 的输入边界不同，必须区分以便审计“@43 相对 @42 增加了哪些 entry”。
    en: Incremental refresh differs from full rebuild input boundaries; separation audits which entries @43 adds over @42.
    ja: incremental refresh と full rebuild の input 境界が異なり、@43 が @42 比で何 entry 追加か監査に必要。
  includes:
    - zh: 纳入有 predecessor_version、delta manifest 与明确 commit 边界的增量 IndexBuildRun。
      en: Includes incremental IndexBuildRun with predecessor_version, delta manifest, and explicit commit boundary.
      ja: predecessor_version/delta manifest/commit boundary 付き incremental IndexBuildRun。
  excludes:
    - zh: 排除 full IndexBuildRun、IndexRefreshEvent 触发信号本身与 IndexVersion 快照。
      en: Excludes full IndexBuildRun, IndexRefreshEvent trigger signal itself, and IndexVersion snapshots.
      ja: full IndexBuildRun/IndexRefreshEvent 信号自体/IndexVersion snapshot を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: refresh-run-43 读取 index-17@42 member manifest，upsert 仅 delta chunk 的 EmbeddingVector，成功 commit 后登记 index-17@43；失败保留 refresh-run 记录但不创建 produces IndexVersion 边。
    en: refresh-run-43 reads index-17@42 member manifest, upserts only delta chunk EmbeddingVectors, registers index-17@43 on successful commit; failure retains refresh-run record without produces IndexVersion edge.
    ja: refresh-run-43 が @42 manifest 読取→delta upsert→成功時 @43 登録。失敗は produces 辺なし。
  typical_input:
    - description: Incremental Pinecone upsert
      format: |
        # Predecessor: index-17@42
        index.upsert(vectors=[{"id": "emb-18", "values": [...], "metadata": {"chunk_id": "chunk-18"}}])
        # Success publishes index-17@43
      source_claims: [claim-index-refresh-run-pinecone]
  typical_output:
    - description: Refresh run record
      format: |
        {
          "build_run_id": "refresh-run-43",
          "build_mode": "incremental",
          "predecessor_version": 42,
          "successor_version": 43,
          "outcome": "success"
        }
      source_claims: [claim-index-refresh-run-design]
  reference_implementations:
    - name: Pinecone Upsert
      url: https://docs.pinecone.io/guides/data/upsert-data
      description: Incremental vector upsert into existing index.
    - name: Chroma Update
      url: https://docs.trychroma.com/docs/collections/update-data
      description: collection.update for changed documents.
structure:
  identity_keys: [build_run_id]
  fields:
    - id: build_run_id
      labels: {zh: 刷新运行标识, en: Refresh run identifier, ja: refresh run 識別子}
      definitions:
        zh: 唯一标识一次 IndexRefreshRun。
        en: Uniquely identifies one IndexRefreshRun.
        ja: 一回 IndexRefreshRun を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: refresh-run-43
      allowed_values: []
      source_claims: [claim-index-refresh-run-id]
    - id: predecessor_version
      labels: {zh: 前序版本, en: Predecessor version, ja: 前序版}
      definitions:
        zh: 增量刷新所依据的 IndexVersion 版本号。
        en: IndexVersion number the incremental refresh builds from.
        ja: incremental refresh の basis IndexVersion 版番号。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 42
      allowed_values: []
      source_claims: [claim-index-refresh-run-predecessor]
    - id: delta_manifest_digest
      labels: {zh: 增量清单摘要, en: Delta manifest digest, ja: delta manifest digest}
      definitions:
        zh: 本次刷新新增或变更 Representation 集合 SHA-256。
        en: SHA-256 of Representations added or changed in this refresh.
        ja: 今回 refresh で追加/変更 Representation 集合 SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:delta43
      allowed_values: []
      source_claims: [claim-index-refresh-run-delta]
  constraints:
    - id: refresh-failure-no-successor
      severity: error
      expression_language: plain
      expression: IndexRefreshRun failure must not produce a successor IndexVersion.
      explanation:
        zh: 失败 refresh 登记为新版本会误导 RetrievalRun。
        en: Failed refresh posing as new version misleads RetrievalRun.
        ja: failed refresh を新版扱いすると RetrievalRun 誤導。
      source_claims: [claim-index-refresh-run-design]
  required_relations: []
examples:
  - id: IndexRefreshRun-example-incremental-success
    labels:
      zh: 增量刷新成功
      en: Incremental refresh success
      ja: incremental refresh 成功
    descriptions:
      zh: refresh-run-43 从 index-17@42 增量 upsert chunk-18 向量，成功发布 index-17@43；@42 冻结不变。
      en: refresh-run-43 incrementally upserts chunk-18 vectors from index-17@42 and publishes index-17@43 on success; @42 remains frozen.
      ja: refresh-run-43 が @42 から chunk-18 incremental upsert→@43 公開。@42 凍結維持。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/data/upsert-data
      version: incremental upsert
    field_values:
      build_run_id: refresh-run-43
      predecessor_version: 42
      successor_version: 43
    related_node_ids:
      - IndexRefreshRun
      - IndexVersion
    related_relation_ids: []
    source_claims:
      - claim-index-refresh-run-pinecone
      - claim-index-refresh-run-design
  - id: IndexRefreshRun-example-failed-no-version
    labels:
      zh: 刷新失败无后继版
      en: Failed refresh no successor
      ja: failed refresh 後続版なし
    descriptions:
      zh: refresh-run-44 在 upsert 中途失败，Moonweave 保留 refresh-run-44 记录 outcome=failure，不创建 index-17@44 或 produces 边。
      en: refresh-run-44 fails mid-upsert; Moonweave retains refresh-run-44 with outcome=failure, creating neither index-17@44 nor a produces edge.
      ja: refresh-run-44 upsert 途中 failure→outcome=failure 記録のみ。@44/produces 辺なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: failure boundary
    field_values:
      build_run_id: refresh-run-44
      predecessor_version: 42
      outcome: failure
    related_node_ids:
      - IndexRefreshRun
      - IndexBuildRun
    related_relation_ids: []
    source_claims:
      - claim-index-refresh-run-design
  - id: IndexRefreshRun-example-not-full-build
    labels:
      zh: 刷新非全量构建
      en: Refresh is not full build
      ja: refresh は full build ではない
    descriptions:
      zh: build-run-42（build_mode=full）从零构建 index-17@42；refresh-run-43 必须有 predecessor_version=42。
      en: build-run-42 (build_mode=full) builds index-17@42 from scratch; refresh-run-43 must have predecessor_version=42.
      ja: build-run-42（full）が @42 全量構築。refresh-run-43 は predecessor_version=42 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexRefreshRun
      - IndexBuildRun
    related_relation_ids: []
    source_claims:
      - claim-index-refresh-run-design
parent_relation:
  id: IndexRefreshRun-is_a-IndexBuildRun
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种索引构建运行
    en: is an index build run
    ja: 索引 build run の一種
  definitions:
    zh: IndexRefreshRun —is_a→ IndexBuildRun 因为 build_mode=incremental 且消费 predecessor IndexVersion。
    en: IndexRefreshRun —is_a→ IndexBuildRun because build_mode=incremental and it consumes a predecessor IndexVersion.
    ja: IndexRefreshRun —is_a→ IndexBuildRun は build_mode=incremental+predecessor IndexVersion 消費のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: IndexRefreshRun-is_a-IndexBuildRun-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when build_mode is incremental and predecessor_version is declared.
      explanations:
        zh: 仅当满足增量刷新种差时建立该边。
        en: Assert only when incremental refresh differentia holds.
        ja: incremental refresh 種差成立時のみ assert。
      source_claims: [claim-index-refresh-run-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-index-refresh-run-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-upsert
    title: Pinecone Upsert Data
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/data/upsert-data
    source_type: official-doc
    relevance: Incremental upsert into existing index.
  - id: src-index-refresh-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Incremental refresh versus full build and failed publish boundary.
source_claims:
  - id: claim-index-refresh-run-pinecone
    source: src-pinecone-upsert
    supports: Pinecone upsert adds or updates vectors in an existing index without full rebuild.
    locator: Upsert data
    evidence_kind: primary-doc
    confidence: high
  - id: claim-index-refresh-run-design
    source: src-index-refresh-design
    supports: IndexRefreshRun publishes successor IndexVersion only on success; failed refresh must not create successor versions.
    locator: IndexRefreshRun boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-run-id
    source: src-index-refresh-design
    supports: build_run_id identifies refresh activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-run-predecessor
    source: src-index-refresh-design
    supports: predecessor_version pins the IndexVersion refresh builds from.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-refresh-run-delta
    source: src-index-refresh-design
    supports: delta_manifest_digest pins changed representations.
    locator: structure
    evidence_kind: design-inference
    confidence: high
