schema: moonweave.ai/ontology-node/v1
id: Representation
kind: concept
status: review
labels:
  zh: 检索表示
  en: Representation
  ja: 検索表現
semantics:
  short_definition:
    zh: 把确定来源版本编码为可索引信息的持久产物。
    en: A persistent artifact encoding a fixed source version for indexing.
    ja: 確定した出典版を索引用情報に符号化した永続成果物です。
  definition:
    zh: Representation 是具有独立标识的编码产物：它把一个确定来源版本按版本化方法转换为可比较或可索引的信息，并保留来源摘要；它不是生成活动、模型配置或索引容器。
    en: Representation is an independently identified encoding artifact that transforms a fixed source version under a versioned method into comparable or indexable information and retains the source digest; it is not the generating activity, model configuration, or index container.
    ja: Representation は確定した出典版をversioned methodで比較・索引可能な情報へ変換し出典digestを保持する独立識別可能な符号化成果物で、生成activity・model設定・index containerではありません。
  why_needed:
    zh: 把可复用编码与产生它的运行、承载它的索引分开。
    en: Separates a reusable encoding from its producing run and containing index.
    ja: 再利用可能な符号化を生成runと格納indexから分離します。
  includes:
    - zh: 纳入具有稳定 ID、来源摘要和方法版本的向量或结构化表示。
      en: Includes vector or structured representations with stable ID, source digest, and method version.
      ja: 安定ID・出典digest・method版を持つvectorまたは構造化表現を含みます。
  excludes:
    - zh: 排除未编码 Chunk、EmbeddingModel、EmbeddingRun 与 Index。
      en: Excludes an unencoded Chunk, EmbeddingModel, EmbeddingRun, and Index.
      ja: 未符号化Chunk・EmbeddingModel・EmbeddingRun・Indexを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - representation_id
  fields:
    - id: representation_id
      labels:
        zh: 表示标识
        en: representation ID
        ja: 表現ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识编码产物。
        en: Stable identifier of the encoding artifact.
        ja: 符号化成果物の安定識別子です。
      allowed_values: []
      pattern: null
      example_value: rep-17
      source_claims:
        - claim-representation-002
    - id: source_digest
      labels:
        zh: 来源摘要
        en: source digest
        ja: 出典digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被编码来源版本。
        en: Fixes the encoded source version.
        ja: 符号化対象の出典版を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:source17
      source_claims:
        - claim-representation-003
    - id: method_profile
      labels:
        zh: 方法配置
        en: method profile
        ja: method profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识编码算法、参数和版本。
        en: Identifies encoding algorithm, parameters, and version.
        ja: 符号化algorithm・parameter・版を識別します。
      allowed_values: []
      pattern: null
      example_value: dense-v4
      source_claims:
        - claim-representation-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: Representation-example-positive-manual-001
    kind: positive
    labels:
      zh: 检索表示正例
      en: "Positive case: Representation"
      ja: 検索表現正例
    scenario_id: null
    descriptions:
      zh: rep-17 以 dense-v4 编码来源 sha256:source17。
      en: rep-17 encodes source sha256:source17 under dense-v4.
      ja: rep-17 は出典 sha256:source17 を dense-v4 で符号化します。
    field_values:
      representation_id: rep-17
      source_digest: sha256:source17
      method_profile: dense-v4
    related_node_ids:
      - Representation
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 Representation。
      en: Classify the object as Representation.
      ja: この対象を Representation に分類します。
    why_valid_or_invalid:
      zh: 它有独立身份、固定来源和固定方法。
      en: It has independent identity, fixed source, and fixed method.
      ja: 独立同一性・固定出典・固定methodを持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-representation-005
  - id: Representation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 检索表示边界例
      en: "Boundary case: Representation"
      ja: 検索表現境界例
    scenario_id: null
    descriptions:
      zh: dense-v4 只是一份算法配置，尚未编码任何来源。
      en: dense-v4 is only an algorithm profile and has encoded no source.
      ja: dense-v4 はalgorithm profileだけで出典を符号化していません。
    field_values: {}
    related_node_ids:
      - Representation
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 Representation。
      en: Do not classify the object as Representation.
      ja: この対象を Representation に分類しません。
    why_valid_or_invalid:
      zh: 方法能力不是方法已经生成的信息产物。
      en: A method capability is not an information artifact produced by that method.
      ja: method能力はそのmethodが生成した情報成果物ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-representation-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: IndexBuildRun-consumes-Representation
  predicate: consumes
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 消费表示
    en: consumes representation
    ja: 表現を消費する
  definitions:
    zh: IndexBuildRun —consumes→ Representation 表示构建输入清单明确包含该表示版本。
    en: IndexBuildRun —consumes→ Representation means that the build input manifest explicitly contains that representation version.
    ja: IndexBuildRun —consumes→ Representation はbuild入力manifestがそのrepresentation版を明示包含することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_consumes
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: IndexBuildRun-consumes-Representation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when source_manifest_digest resolves to the target representation ID and digest.
      explanations:
        zh: 仅当 source_manifest_digest 可展开到目标 representation_id 与摘要时成立。
        en: Assert only when source_manifest_digest resolves to the target representation ID and digest.
        ja: source_manifest_digestがtarget representation IDとdigestへ解決する時だけ成立します。
      source_claims:
        - claim-representation-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndexBuildRun-consumes-Representation-example-positive-manual-001
      kind: positive
      labels:
        zh: 消费表示正例
        en: "Positive case: consumes representation"
        ja: 表現を消費する正例
      scenario_id: null
      descriptions:
        zh: build-run-42 的清单包含 rep-17。
        en: build-run-42's manifest contains rep-17.
        ja: build-run-42 のmanifestは rep-17を含みます。
      field_values: {}
      related_node_ids:
        - IndexBuildRun
        - Representation
      related_relation_ids:
        - IndexBuildRun-consumes-Representation
      expected_result:
        zh: 建立 build-run-42 consumes rep-17 的已清单化构建输入事实。
        en: Assert the manifested build-input fact that build-run-42 consumes rep-17.
        ja: build-run-42 consumes rep-17 という manifest 済み build-input fact を確立します。
      why_valid_or_invalid:
        zh: manifest42 记录 rep-17 的表示 ID、版本与摘要，写入记录又引用同一身份。
        en: manifest42 records rep-17's representation ID, version, and digest, and the write record references that same identity.
        ja: manifest42 が rep-17 の representation ID・版・digest を記録し、write record も同一 identity を参照します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-representation-007
    - id: IndexBuildRun-consumes-Representation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 消费表示边界例
        en: "Boundary case: consumes representation"
        ja: 表現を消費する境界例
      scenario_id: null
      descriptions:
        zh: 仅在同一数据库但未列入清单的 rep-18 不是该构建输入。
        en: rep-18 co-located in the database but absent from the manifest is not build input.
        ja: 同databaseにあってもmanifest外の rep-18 はbuild入力ではありません。
      field_values: {}
      related_node_ids:
        - IndexBuildRun
        - Representation
      related_relation_ids:
        - IndexBuildRun-consumes-Representation
      expected_result:
        zh: 不把 manifest42 之外的 rep-18 标注为 build-run-42 的 consumes 输入。
        en: Do not mark rep-18 outside manifest42 as a consumes input of build-run-42.
        ja: manifest42 外の rep-18 を build-run-42 の consumes input として記録しません。
      why_valid_or_invalid:
        zh: 同库可访问只表示潜在可读；没有清单成员与实际写入证据，不能断言构建消费。
        en: Database accessibility shows potential readability only; without manifest membership and an actual write record, build consumption is unproven.
        ja: 同じ database での access は潜在的読取可能性だけを示し、manifest membership と実 write 記録がなければ build consumption は証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-representation-007
  source_claims:
    - claim-representation-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
