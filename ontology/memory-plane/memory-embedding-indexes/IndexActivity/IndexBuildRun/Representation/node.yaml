source_claims:
  - id: claim-representation-001
    source: eng-vector-pinecone-indexing
    supports: Pinecone distinguishes source data, its conversion into vector format, the vector-bearing record, and the index that stores data. This is operational evidence for Representation as an encoding artifact; independent identity, owner, semantic kind, and ontology hierarchy are Moonweave design inference.
    locator: Indexing overview > Vector embedding > source-data conversion; Indexes > records and index containers
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-representation-002
    source: eng-vector-pinecone-indexing
    supports: Representation.representation_id makes one encoded artifact independently addressable in Moonweave. Pinecone documents records and vector data but does not define a universal representation ID or this field's cardinality; the field and its audit role are design inference.
    locator: Indexing overview > Indexes > records hold indexed data; Vector embedding > vectors encode source data
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-representation-003
    source: eng-vector-pinecone-indexing
    supports: Representation.source_digest binds the encoding to a source version in Moonweave. Pinecone distinguishes source data from its vector form but does not require a digest or define this field; its datatype, cardinality, and audit semantics are design inference.
    locator: Indexing overview > Vector embedding > source data transformed into vector format
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-representation-004
    source: eng-vector-pinecone-indexing
    supports: Representation.method_profile records the encoding algorithm, parameters, and version for Moonweave reproducibility. Pinecone requires vector/index compatibility with an embedding model but does not define this profile field or its cardinality; those are design inference.
    locator: Indexing overview > Bring your own vectors > index characteristics must match the embedding model
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-representation-005
    source: eng-vector-pinecone-indexing
    supports: Representation-example-positive-manual-001 follows Pinecone's documented conversion of source data into vector form before storage or search. The stable Representation identity, source digest, method profile, semantic kind, and ontology placement are Moonweave design inference.
    locator: Indexing overview > Vector embedding > source data transformed into vector format
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-representation-006
    source: eng-vector-pinecone-indexing
    supports: Representation-example-boundary-manual-001 uses Pinecone's distinction between an embedding model that performs conversion, the resulting vector, and the record or index that stores data. Moonweave's exact activity, information, record, and container class boundary remains design inference.
    locator: Indexing overview > Vector embedding > embedding model conversion and resulting vectors; Indexes > records
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-representation-007
    source: eng-vector-pinecone-indexing
    supports: Pinecone separates source data transformed into vectors from explicit import/upsert operations over records.
    locator: Indexing overview > Indexes, dense and sparse vectors, namespaces, vector embedding, import, upsert, and metadata
    evidence_kind: design-inference
    confidence: high
    review_status: pending
