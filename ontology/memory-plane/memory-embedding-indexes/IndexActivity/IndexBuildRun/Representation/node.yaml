schema: moonweave.ai/ontology-node/v1
id: Representation
kind: concept
labels:
  zh: 表示
  en: Representation
  ja: 表現
semantics:
  short_definition:
    zh: 可被 IndexBuildRun 消费的可索引内容编码。
    en: Indexable content encoding consumable by IndexBuildRun.
    ja: IndexBuildRun が consume 可能な indexable content encoding。
  definition:
    zh: Representation 是 IndexBuildRun 输入侧的信息上位类，把源内容编码为可写入 Index 的形式；VectorRepresentation 子类含 DenseVector 与 SparseVector。EmbeddingRun 产出 EmbeddingVector 是 Representation 的一种；Representation 不是 IndexEntry 或 Index 本身。
    en: Representation is the input-side information genus for IndexBuildRun, encoding source content for index writing; VectorRepresentation subtypes include DenseVector and SparseVector. EmbeddingVector from EmbeddingRun is one Representation form; Representation is not IndexEntry or Index itself.
    ja: Representation は IndexBuildRun 入力側 information 上位類。VectorRepresentation に DenseVector/SparseVector。EmbeddingRun 产出 EmbeddingVector も Representation。IndexEntry/Index 自体ではない。
  why_needed:
    zh: 嵌入向量、BM25 稀疏权重与图嵌入必须共享统一“表示”层，IndexBuildRun 才能声明 source_manifest_digest 消费了哪些编码。
    en: Embedding vectors, BM25 sparse weights, and graph embeddings need a unified representation layer so IndexBuildRun can declare source_manifest_digest over consumed encodings.
    ja: embedding/BM25/graph embedding を統一 representation 層で IndexBuildRun source_manifest_digest 宣言に必要。
  includes:
    - zh: 纳入 VectorRepresentation、EmbeddingVector 及未来非向量表示族。
      en: Includes VectorRepresentation, EmbeddingVector, and future non-vector representation families.
      ja: VectorRepresentation/EmbeddingVector/将来 non-vector 族。
  excludes:
    - zh: 排除 IndexEntry、IndexVersion、EmbeddingRun 与 Chunk 正文。
      en: Excludes IndexEntry, IndexVersion, EmbeddingRun, and Chunk body text.
      ja: IndexEntry/IndexVersion/EmbeddingRun/Chunk 本文を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI data[].embedding→DenseVector；BM25/SPLADE→SparseVector；IndexBuildRun source_manifest_digest 哈希 Representation 集合；consumes 关系从 build run 指向表示，produces IndexVersion。
    en: OpenAI data[].embedding→DenseVector; BM25/SPLADE→SparseVector; IndexBuildRun source_manifest_digest hashes Representation set; consumes runs from build to representation, produces IndexVersion.
    ja: OpenAI embedding→DenseVector、BM25/SPLADE→SparseVector。source_manifest_digest は Representation 集合 hash。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: Embedding vectors as dense representations.
    - name: Pinecone Sparse Vectors
      url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
      description: Sparse lexical representations.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: Representation identifier, ja: representation 識別子}
      definitions:
        zh: 唯一标识一个 Representation 实例。
        en: Uniquely identifies one Representation instance.
        ja: 一 Representation instance を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: repr-17
      allowed_values: []
      source_claims: [claim-representation-id]
    - id: encoding_kind
      labels: {zh: 编码种类, en: Encoding kind, ja: encoding 種別}
      definitions:
        zh: vector、dense、sparse、graph 等编码族标签。
        en: Encoding family label such as vector, dense, sparse, graph.
        ja: vector/dense/sparse/graph 等 encoding 族。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: vector
      allowed_values: []
      source_claims: [claim-representation-kind]
  constraints: []
  required_relations: []
examples:
  - id: Representation-example-dense-from-openai
    labels:
      zh: OpenAI 产出 dense 表示
      en: OpenAI dense representation
      ja: OpenAI dense representation
    descriptions:
      zh: embedding-run-17 产出 emb-17 作为 Representation（encoding_kind=vector），供 build-run-42 source_manifest 消费。
      en: embedding-run-17 produces emb-17 as Representation (encoding_kind=vector) consumed by build-run-42 source_manifest.
      ja: embedding-run-17→emb-17 Representation（vector）→build-run-42 manifest consume。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: response embedding array
    field_values:
      representation_id: repr-17
      encoding_kind: vector
    related_node_ids:
      - Representation
      - DenseVector
      - EmbeddingRun
    related_relation_ids: []
    source_claims:
      - claim-representation-openai
      - claim-representation-design
  - id: Representation-example-sparse-bm25
    labels:
      zh: BM25 稀疏表示
      en: BM25 sparse representation
      ja: BM25 sparse representation
    descriptions:
      zh: chunk-17 经 BM25 编码为 SparseVector {indices, values}，representation_id=repr-sparse-17，写入 hybrid-index-17 dense+sparse 通道。
      en: chunk-17 encoded by BM25 as SparseVector {indices, values}, representation_id=repr-sparse-17, written to hybrid-index-17 dense+sparse channel.
      ja: chunk-17→BM25 SparseVector。repr-sparse-17→hybrid-index-17 sparse channel。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
      version: sparse_values
    field_values:
      representation_id: repr-sparse-17
      encoding_kind: sparse
    related_node_ids:
      - Representation
      - SparseVector
      - HybridIndex
    related_relation_ids: []
    source_claims:
      - claim-representation-sparse
      - claim-representation-design
  - id: Representation-example-not-index-entry
    labels:
      zh: 表示非索引条目
      en: Representation is not index entry
      ja: representation は index entry ではない
    descriptions:
      zh: entry-17 是 index-17@42 内 IndexEntry 绑定 representation_digest；emb-17 float[] 是 Representation，写入后才成为 entry 成员。
      en: entry-17 is IndexEntry in index-17@42 binding representation_digest; emb-17 float[] is Representation becoming entry membership only after write.
      ja: entry-17 は IndexEntry。emb-17 float[] は Representation。write 後 entry member。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - Representation
      - IndexEntry
    related_relation_ids: []
    source_claims:
      - claim-representation-design
parent_relation:
  id: IndexBuildRun-consumes-Representation
  predicate: consumes
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 被构建运行消费
    en: consumed by index build run
    ja: index build run により consume
  definitions:
    zh: IndexBuildRun consumes Representation 表示构建运行读取此 Representation 写入 Index。
    en: IndexBuildRun consumes Representation means the build run reads this Representation to write the Index.
    ja: IndexBuildRun consumes Representation は build が当 Representation を read し Index write。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次 build 可消费多个 Representation。
    en: One build may consume many Representations.
    ja: 一 build が複数 Representation consume 可。
  inverse_reading:
    predicate: consumed_by
    labels: {zh: 反向读取, en: inverse consumes, ja: 逆方向読取}
  conditions:
    - id: IndexBuildRun-consumes-Representation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when source_manifest_digest covers this representation_id.
      explanations:
        zh: 仅当 manifest 包含该表示时成立。
        en: Assert only when manifest includes this representation.
        ja: manifest に当 representation 含む時のみ assert。
      source_claims: [claim-representation-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-representation-design]
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-openai-embeddings
    title: OpenAI Embeddings API
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/embeddings
    source_type: official-doc
    relevance: Dense embedding as representation input.
  - id: src-pinecone-sparse
    title: Pinecone Sparse Vectors
    publisher: Pinecone
    url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
    source_type: official-doc
    relevance: Sparse representation for hybrid indexes.
  - id: src-representation-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Representation as IndexBuildRun input genus.
source_claims:
  - id: claim-representation-openai
    source: src-openai-embeddings
    supports: OpenAI returns embedding arrays consumable as dense representations for indexing.
    locator: Create embeddings response
    evidence_kind: primary-api
    confidence: high
  - id: claim-representation-sparse
    source: src-pinecone-sparse
    supports: Pinecone sparse_values provide sparse lexical representations for indexing.
    locator: Import sparse vectors
    evidence_kind: primary-doc
    confidence: high
  - id: claim-representation-design
    source: src-representation-design
    supports: Representation is input-side encoding distinct from IndexEntry membership and build activities.
    locator: Representation boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-representation-id
    source: src-representation-design
    supports: representation_id identifies one encoding instance.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-representation-kind
    source: src-representation-design
    supports: encoding_kind classifies representation family.
    locator: structure
    evidence_kind: design-inference
    confidence: high
