schema: moonweave.ai/ontology-node/v1
id: VectorRepresentation
kind: concept
status: accepted
labels:
  zh: 向量表示
  en: Vector representation
  ja: ベクトル表現
semantics:
  short_definition:
    zh: 以稠密、稀疏或多向量坐标实现的 Representation。
    en: A Representation realized as dense, sparse, or multivector coordinates.
    ja: dense・sparse・multivector座標で実現した Representation です。
  definition:
    zh: VectorRepresentation 是以有序数值坐标、稀疏索引/权重对或多向量实现的 Representation，并明确维度与编码形态；它不是相似度分数或向量数据库。
    en: VectorRepresentation is a Representation realized as ordered numeric coordinates, sparse index-weight pairs, or multivectors with explicit dimensions and encoding form; it is not a similarity score or vector database.
    ja: VectorRepresentation は順序付き数値座標・sparse index/weight対・multivectorで実現され次元とencoding形態を明示する Representation で、類似度scoreやvector databaseではありません。
  why_needed:
    zh: 区分数值坐标形态、语义来源与存储容器。
    en: Separates numeric coordinate form from semantic source and storage container.
    ja: 数値座標形態を意味出典・保存containerから分離します。
  includes:
    - zh: 纳入带维度与编码声明的 dense、sparse 和 multivector。
      en: Includes dimensioned dense, sparse, and multivector values.
      ja: 次元を宣言したdense・sparse・multivectorを含みます。
  excludes:
    - zh: 排除源文本、标量分数和索引容器。
      en: Excludes source text, scalar scores, and index containers.
      ja: 出典text・scalar score・index containerを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - vector_id
  fields:
    - id: vector_id
      labels:
        zh: 向量标识
        en: vector ID
        ja: vector ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识数值向量产物。
        en: Stable identifier for the numeric vector artifact.
        ja: 数値vector成果物の安定識別子です。
      allowed_values: []
      pattern: null
      example_value: vec-17
      source_claims:
        - claim-vector-representation-002
    - id: dimensions
      labels:
        zh: 维数
        en: dimensions
        ja: 次元数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明坐标空间维数。
        en: Declares coordinate-space dimensionality.
        ja: 座標空間の次元数を宣言します。
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims:
        - claim-vector-representation-003
    - id: encoding
      labels:
        zh: 数值编码
        en: numeric encoding
        ja: 数値encoding
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 dense、sparse 或 multivector。
        en: Distinguishes dense, sparse, or multivector form.
        ja: dense・sparse・multivector形態を区別します。
      allowed_values: []
      pattern: null
      example_value: dense-float32
      source_claims:
        - claim-vector-representation-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: VectorRepresentation-example-positive-manual-001
    kind: positive
    labels:
      zh: 向量表示正例
      en: "Positive case: Vector representation"
      ja: ベクトル表現正例
    scenario_id: null
    descriptions:
      zh: vec-17 是 1536 维 dense-float32 坐标。
      en: vec-17 is a 1536-dimensional dense-float32 coordinate value.
      ja: vec-17 は1536次元dense-float32座標です。
    field_values:
      vector_id: vec-17
      dimensions: 1536
      encoding: dense-float32
      representation_id: repr-vec-17
      source_digest: sha256:source-vec-17
      method_profile: dense-float32/1536:v1
    related_node_ids:
      - VectorRepresentation
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 VectorRepresentation。
      en: Classify the object as VectorRepresentation.
      ja: この対象を VectorRepresentation に分類します。
    why_valid_or_invalid:
      zh: 坐标身份、维数和编码形态均明确。
      en: Coordinate identity, dimensions, and encoding form are explicit.
      ja: 座標同一性・次元・encoding形態が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-vector-representation-005
  - id: VectorRepresentation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 向量表示边界例
      en: "Boundary case: Vector representation"
      ja: ベクトル表現境界例
    scenario_id: null
    descriptions:
      zh: score-17=0.82 只记录两个向量的比较结果。
      en: score-17=0.82 records only the comparison result between two vectors.
      ja: score-17=0.82 は二つのvectorの比較結果だけを記録します。
    field_values: {}
    related_node_ids:
      - VectorRepresentation
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 VectorRepresentation。
      en: Do not classify the object as VectorRepresentation.
      ja: この対象を VectorRepresentation に分類しません。
    why_valid_or_invalid:
      zh: 标量分数没有坐标、维数或向量身份。
      en: A scalar score has no coordinates, dimensionality, or vector identity.
      ja: scalar scoreには座標・次元・vector同一性がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-vector-representation-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: VectorRepresentation-is_a-Representation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: VectorRepresentation 是 Representation 的严格子类；种差为：以明确维数和 dense、sparse 或 multivector 数值编码实现。
    en: "VectorRepresentation is a strict subtype of Representation; its reviewed differentia is: it is realized as dimensioned dense, sparse, or multivector numeric coordinates."
    ja: VectorRepresentation は Representation の厳密なsubtypeで、審査済み種差は「明示次元のdense・sparse・multivector数値座標で実現されます。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: VectorRepresentation-is_a-Representation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies Representation and also satisfies the differentia: it is realized as dimensioned dense, sparse, or multivector numeric coordinates."
      explanations:
        zh: 仅当对象首先满足 Representation 定义且满足种差“以明确维数和 dense、sparse 或 multivector 数值编码实现。”时成立。
        en: "Assert only when the object first satisfies Representation and also satisfies the differentia: it is realized as dimensioned dense, sparse, or multivector numeric coordinates."
        ja: 対象がまず Representation を満たし、さらに種差「明示次元のdense・sparse・multivector数値座標で実現されます。」を満たす時だけ成立します。
      source_claims:
        - claim-vector-representation-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: VectorRepresentation-is_a-Representation-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: vec-17 保留 source17 摘要与 dense-float32-v4 方法版本，并以 1536 个有序数值坐标实现。
        en: vec-17 retains the source17 digest and dense-float32-v4 method version and is realized as 1,536 ordered numeric coordinates.
        ja: vec-17 は source17 のdigestと dense-float32-v4 method版を保持し、1,536個の順序付き数値座標で実現されています。
      field_values: {}
      related_node_ids:
        - VectorRepresentation
        - Representation
      related_relation_ids:
        - VectorRepresentation-is_a-Representation
      expected_result:
        zh: 确认 vec-17 是 VectorRepresentation，并继承可追踪 Representation 身份。
        en: Confirm vec-17 as VectorRepresentation and inherit traceable Representation identity.
        ja: vec-17 を VectorRepresentation と確認し、追跡可能な Representation 同一性を継承します。
      why_valid_or_invalid:
        zh: 它先满足可追踪编码产物的 Representation 身份，再满足有维数数值坐标这一向量种差。
        en: It first satisfies Representation as a traceable encoded artifact, then the vector differentia of dimensioned numeric coordinates.
        ja: 追跡可能な符号化成果物として Representation を満たし、さらに次元付き数値座標というvector種差を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-vector-representation-007
    - id: VectorRepresentation-is_a-Representation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 一个只有相似度分数而没有坐标的记录不能建立该子类关系。
        en: A record containing only a similarity score and no coordinates does not establish this subtype relation.
        ja: 類似度scoreだけで座標のないrecordにはこのsubtype関係を立てません。
      field_values: {}
      related_node_ids:
        - VectorRepresentation
        - Representation
      related_relation_ids:
        - VectorRepresentation-is_a-Representation
      expected_result:
        zh: 将相似度分数保持为检索评分信息，不归入 VectorRepresentation。
        en: Keep the similarity score as retrieval-scoring information and do not classify it as VectorRepresentation.
        ja: similarity score を retrieval-scoring information に留め、VectorRepresentation に分類しません。
      why_valid_or_invalid:
        zh: 单个相似度分数是两个对象比较后的标量结果，没有维数、坐标序列或坐标索引。
        en: A similarity score is a scalar result of comparing two objects and has no dimensionality, coordinate sequence, or coordinate indices.
        ja: similarity score は二対象比較後の scalar result であり、次元・coordinate sequence・coordinate indices を持ちません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-vector-representation-007
  source_claims:
    - claim-vector-representation-007
