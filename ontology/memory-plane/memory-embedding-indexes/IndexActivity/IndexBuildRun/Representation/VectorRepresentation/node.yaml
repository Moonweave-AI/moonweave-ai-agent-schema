schema: moonweave.ai/ontology-node/v1
id: VectorRepresentation
kind: concept
labels:
  zh: 向量表示
  en: Vector representation
  ja: ベクトル表現
semantics:
  short_definition:
    zh: 以数值向量编码内容的 Representation 子类。
    en: Representation subtype encoding content as numeric vectors.
    ja: 内容を数値 vector で encoding する Representation subtype。
  definition:
    zh: VectorRepresentation 是 Representation 子类，把内容编码为数值向量；DenseVector（float[]）与 SparseVector（{indices, values}）是严格子类。EmbeddingVector 进一步绑定 EmbeddingRun 血缘的 dense 语义向量。
    en: VectorRepresentation is a Representation subtype encoding content as numeric vectors; DenseVector (float[]) and SparseVector ({indices, values}) are strict subtypes. EmbeddingVector further binds dense semantic vectors with EmbeddingRun lineage.
    ja: VectorRepresentation は数値 vector encoding の Representation subtype。DenseVector（float[]）/SparseVector（{indices,values}）が subtype。EmbeddingVector は EmbeddingRun 来歴付き dense semantic vector。
  why_needed:
    zh: dense 与 sparse 向量存储格式与 metric 语义不同，必须在 VectorRepresentation 层分型以免 Pinecone upsert 字段混用。
    en: Dense and sparse vector storage formats and metric semantics differ; typing at VectorRepresentation prevents Pinecone upsert field confusion.
    ja: dense/sparse の storage/metric 意味が異なり VectorRepresentation 層で分型必須。
  includes:
    - zh: 纳入 DenseVector、SparseVector 与 EmbeddingVector 族。
      en: Includes DenseVector, SparseVector, and EmbeddingVector families.
      ja: DenseVector/SparseVector/EmbeddingVector 族。
  excludes:
    - zh: 排除非向量 Representation 与 IndexEntry。
      en: Excludes non-vector Representations and IndexEntry.
      ja: non-vector Representation/IndexEntry を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone upsert values→DenseVector；sparse_values→SparseVector；同一 hybrid upsert 可携带两路 VectorRepresentation。
    en: Pinecone upsert values→DenseVector; sparse_values→SparseVector; one hybrid upsert may carry both VectorRepresentation channels.
    ja: Pinecone values→DenseVector、sparse_values→SparseVector。hybrid upsert で両 channel 可。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: Pinecone Hybrid Search
      url: https://docs.pinecone.io/guides/search/hybrid-search
      description: Dense values and sparse_values fields.
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: float embedding arrays.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: Representation identifier, ja: representation 識別子}
      definitions:
        zh: 继承 Representation.representation_id。
        en: Inherits Representation.representation_id.
        ja: Representation.representation_id 継承。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: repr-17
      allowed_values: []
      source_claims: [claim-vector-representation-id]
    - id: vector_kind
      labels: {zh: 向量种类, en: Vector kind, ja: vector 種別}
      definitions:
        zh: dense 或 sparse。
        en: dense or sparse.
        ja: dense/sparse。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dense
      allowed_values: [dense, sparse]
      source_claims: [claim-vector-representation-kind]
  constraints: []
  required_relations: []
examples:
  - id: VectorRepresentation-example-dense-openai
    labels:
      zh: OpenAI dense 向量表示
      en: OpenAI dense vector representation
      ja: OpenAI dense vector representation
    descriptions:
      zh: emb-17 是 vector_kind=dense 的 VectorRepresentation，float[1536] 来自 text-embedding-3-small。
      en: emb-17 is VectorRepresentation with vector_kind=dense, float[1536] from text-embedding-3-small.
      ja: emb-17 は vector_kind=dense VectorRepresentation。text-embedding-3-small float[1536]。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: text-embedding-3-small
    field_values:
      representation_id: repr-17
      vector_kind: dense
    related_node_ids:
      - VectorRepresentation
      - DenseVector
      - TextEmbedding
    related_relation_ids: []
    source_claims:
      - claim-vector-representation-openai
      - claim-vector-representation-design
  - id: VectorRepresentation-example-sparse-bm25
    labels:
      zh: BM25 sparse 向量表示
      en: BM25 sparse vector representation
      ja: BM25 sparse vector representation
    descriptions:
      zh: repr-sparse-17 是 vector_kind=sparse，{indices:[10,45,892], values:[0.8,0.5,0.3]} 来自 BM25 权重。
      en: repr-sparse-17 has vector_kind=sparse with {indices:[10,45,892], values:[0.8,0.5,0.3]} from BM25 weights.
      ja: repr-sparse-17 vector_kind=sparse。BM25 {indices,values}。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
      version: sparse_values
    field_values:
      representation_id: repr-sparse-17
      vector_kind: sparse
    related_node_ids:
      - VectorRepresentation
      - SparseVector
    related_relation_ids: []
    source_claims:
      - claim-vector-representation-sparse
      - claim-vector-representation-design
  - id: VectorRepresentation-example-not-representation-root
    labels:
      zh: 向量表示是 Representation 子类
      en: Vector representation is Representation subtype
      ja: vector representation は Representation subtype
    descriptions:
      zh: encoding_kind=vector 的 Representation 必须进一步声明 vector_kind=dense|sparse 才是 VectorRepresentation。
      en: Representation with encoding_kind=vector must declare vector_kind=dense|sparse to be VectorRepresentation.
      ja: encoding_kind=vector は vector_kind 宣言で VectorRepresentation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: hierarchy
    field_values: {}
    related_node_ids:
      - VectorRepresentation
      - Representation
    related_relation_ids: []
    source_claims:
      - claim-vector-representation-design
parent_relation:
  id: VectorRepresentation-is_a-Representation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种表示
    en: is a representation
    ja: 表現の一種
  definitions:
    zh: VectorRepresentation —is_a→ Representation 因为它把内容编码为数值向量。
    en: VectorRepresentation —is_a→ Representation because it encodes content as numeric vectors.
    ja: VectorRepresentation —is_a→ Representation は数値 vector encoding のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: VectorRepresentation-is_a-Representation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when encoding is numeric vector with dense or sparse kind.
      explanations:
        zh: 仅当满足向量表示种差时建立该边。
        en: Assert only when vector representation differentia holds.
        ja: vector representation 種差成立時のみ assert。
      source_claims: [claim-vector-representation-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-vector-representation-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-embeddings
    title: OpenAI Embeddings API
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/embeddings
    source_type: official-doc
    relevance: Dense float embedding arrays.
  - id: src-pinecone-sparse
    title: Pinecone Sparse Vectors
    publisher: Pinecone
    url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
    source_type: official-doc
    relevance: Sparse indices and values.
  - id: src-vector-representation-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: VectorRepresentation dense versus sparse typing.
source_claims:
  - id: claim-vector-representation-openai
    source: src-openai-embeddings
    supports: OpenAI returns dense float embedding arrays as vector representations.
    locator: Response embedding field
    evidence_kind: primary-api
    confidence: high
  - id: claim-vector-representation-sparse
    source: src-pinecone-sparse
    supports: Pinecone sparse_values use indices and values arrays for sparse vector representation.
    locator: Sparse vector format
    evidence_kind: primary-doc
    confidence: high
  - id: claim-vector-representation-design
    source: src-vector-representation-design
    supports: VectorRepresentation types dense versus sparse numeric encodings under Representation.
    locator: VectorRepresentation boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-vector-representation-id
    source: src-vector-representation-design
    supports: representation_id inherits from Representation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-vector-representation-kind
    source: src-vector-representation-design
    supports: vector_kind distinguishes dense and sparse formats.
    locator: structure
    evidence_kind: design-inference
    confidence: high
