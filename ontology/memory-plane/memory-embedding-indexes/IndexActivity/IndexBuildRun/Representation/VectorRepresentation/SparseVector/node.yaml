schema: moonweave.ai/ontology-node/v1
id: SparseVector
kind: concept
status: accepted
labels:
  zh: 稀疏向量
  en: Sparse vector
  ja: 疎ベクトル
semantics:
  short_definition:
    zh: 只显式保存非零维度索引与权重的向量。
    en: A vector explicitly storing only non-zero indices and weights.
    ja: 非zero次元indexとweightだけを明示保存するvectorです。
  definition:
    zh: SparseVector 是用对齐 indices 与 values 表达少量非零特征、其余维度隐含为零的 VectorRepresentation；它不是倒排索引容器。
    en: SparseVector is a VectorRepresentation using aligned indices and values for a small set of non-zero features while remaining dimensions are implicit zero; it is not an inverted-index container.
    ja: SparseVector は少数非zero featureを整列indices/valuesで表し残り次元を暗黙zeroとする VectorRepresentation で、inverted-index containerではありません。
  why_needed:
    zh: 把单条稀疏表示与跨记录 TF-IDF 索引分开。
    en: Separates a per-item sparse representation from a cross-record TF-IDF index.
    ja: item単位sparse表現を記録横断TF-IDF indexから分離します。
  includes:
    - zh: 纳入非零 indices/values、最大维数和编码版本。
      en: Includes non-zero indices/values, maximum dimension, and encoder version.
      ja: 非zero indices/values・最大次元・encoder版を含みます。
  excludes:
    - zh: 排除完整 dense 数组和索引容器。
      en: Excludes full dense arrays and index containers.
      ja: 完全dense配列とindex containerを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - vector_id
  fields:
    - id: vector_id
      labels:
        zh: 向量标识
        en: vector ID
        ja: vector ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识稀疏向量。
        en: Stable identifier for the sparse vector.
        ja: sparse vectorの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: sparse-17
      source_claims:
        - claim-sparse-vector-002
    - id: nonzero_count
      labels:
        zh: 非零项数
        en: non-zero count
        ja: 非zero項数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对齐 indices/values 的数量。
        en: Number of aligned indices/values pairs.
        ja: 整列indices/values対の数です。
      allowed_values: []
      pattern: null
      example_value: 42
      source_claims:
        - claim-sparse-vector-003
    - id: maximum_dimension
      labels:
        zh: 最大维数
        en: maximum dimension
        ja: 最大次元
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明坐标空间上界。
        en: Declares the coordinate-space upper bound.
        ja: 座標空間の上限を宣言します。
      allowed_values: []
      pattern: null
      example_value: 30522
      source_claims:
        - claim-sparse-vector-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SparseVector-example-positive-manual-001
    kind: positive
    labels:
      zh: 稀疏向量正例
      en: "Positive case: Sparse vector"
      ja: 疎ベクトル正例
    scenario_id: null
    descriptions:
      zh: sparse-17 保存 42 个对齐坐标对，最大维数 30522。
      en: sparse-17 stores 42 aligned coordinate pairs with maximum dimension 30522.
      ja: sparse-17 は42個の整列座標対と最大次元30522を保存します。
    field_values:
      vector_id: sparse-17
      nonzero_count: 42
      maximum_dimension: 30522
      dimensions: 30522
      encoding: sparse-index-value
      representation_id: repr-sparse-17
      source_digest: sha256:source-sparse-17
      method_profile: vocabulary-30522:v1
    related_node_ids:
      - SparseVector
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 SparseVector。
      en: Classify the object as SparseVector.
      ja: この対象を SparseVector に分類します。
    why_valid_or_invalid:
      zh: 非零坐标显式、隐含零值和范围均明确。
      en: Explicit non-zero coordinates, implicit zeros, and bounds are all clear.
      ja: 明示非zero座標・暗黙zero・範囲が明確です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sparse-vector-005
  - id: SparseVector-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 稀疏向量边界例
      en: "Boundary case: Sparse vector"
      ja: 疎ベクトル境界例
    scenario_id: null
    descriptions:
      zh: tfidf-7 管理整套词表、IDF 与文档矩阵。
      en: tfidf-7 manages a vocabulary, IDF values, and a document matrix.
      ja: tfidf-7 は語彙・IDF値・document matrix全体を管理します。
    field_values: {}
    related_node_ids:
      - SparseVector
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 SparseVector。
      en: Do not classify the object as SparseVector.
      ja: この対象を SparseVector に分類しません。
    why_valid_or_invalid:
      zh: 跨文档检索结构不是单条输入的坐标产物。
      en: A cross-document retrieval structure is not one input's coordinate artifact.
      ja: 文書横断検索構造は一入力の座標成果物ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sparse-vector-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SparseVector-is_a-VectorRepresentation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: SparseVector 是 VectorRepresentation 的严格子类；种差为：仅显式存储对齐的非零 indices/values，其余维度隐含为零。
    en: "SparseVector is a strict subtype of VectorRepresentation; its reviewed differentia is: only aligned non-zero indices/values are explicit while remaining dimensions are implicit zero."
    ja: SparseVector は VectorRepresentation の厳密なsubtypeで、審査済み種差は「整列非zero indices/valuesだけを明示し残り次元は暗黙zeroです。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: SparseVector-is_a-VectorRepresentation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies VectorRepresentation and also satisfies the differentia: only aligned non-zero indices/values are explicit while remaining dimensions are implicit zero."
      explanations:
        zh: 仅当对象首先满足 VectorRepresentation 定义且满足种差“仅显式存储对齐的非零 indices/values，其余维度隐含为零。”时成立。
        en: "Assert only when the object first satisfies VectorRepresentation and also satisfies the differentia: only aligned non-zero indices/values are explicit while remaining dimensions are implicit zero."
        ja: 対象がまず VectorRepresentation を満たし、さらに種差「整列非zero indices/valuesだけを明示し残り次元は暗黙zeroです。」を満たす時だけ成立します。
      source_claims:
        - claim-sparse-vector-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SparseVector-is_a-VectorRepresentation-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: sparse-17 在最大维数 30522 中只显式保存 42 个对齐的 index/value 非零对。
        en: sparse-17 explicitly stores only 42 aligned non-zero index/value pairs within a maximum dimension of 30,522.
        ja: sparse-17 は最大次元 30,522 のうち、42 個の整列した非zero index/value対だけを明示保存します。
      field_values: {}
      related_node_ids:
        - SparseVector
        - VectorRepresentation
      related_relation_ids:
        - SparseVector-is_a-VectorRepresentation
      expected_result:
        zh: 确认 sparse-17 是 SparseVector，并继承 VectorRepresentation 身份。
        en: Confirm sparse-17 as a SparseVector and inherit VectorRepresentation identity.
        ja: sparse-17 を SparseVector と確認し、VectorRepresentation 同一性を継承します。
      why_valid_or_invalid:
        zh: 它具有数值坐标表示身份，同时满足未列维度隐含为零的稀疏种差。
        en: It is a numeric-coordinate representation and also satisfies the sparse differentia that omitted dimensions are implicitly zero.
        ja: 数値座標表現であり、未記載次元を暗黙zeroとするsparse種差も満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-sparse-vector-007
    - id: SparseVector-is_a-VectorRepresentation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 固定长度 dense-17 没有稀疏坐标种差。
        en: fixed-length dense-17 lacks the sparse-coordinate differentia.
        ja: 固定長 dense-17 はsparse座標種差を持ちません。
      field_values: {}
      related_node_ids:
        - SparseVector
        - VectorRepresentation
      related_relation_ids:
        - SparseVector-is_a-VectorRepresentation
      expected_result:
        zh: 将 dense-17 保持为 DenseVector，不赋予 SparseVector 子类成员身份。
        en: Keep dense-17 as a DenseVector and do not assign SparseVector subtype membership.
        ja: dense-17 を DenseVector に留め、SparseVector subtype membership を付与しません。
      why_valid_or_invalid:
        zh: dense-17 为每个维度保留固定位置，没有 indices/values 非零对或未列维度隐含为零的语义。
        en: dense-17 reserves a fixed slot for every dimension and has neither non-zero indices/values pairs nor implicit-zero semantics for omitted dimensions.
        ja: dense-17 は全次元に固定 slot を持ち、非 zero indices/values 対も省略次元の implicit-zero semantics もありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-sparse-vector-007
  source_claims:
    - claim-sparse-vector-007
  distinct_fact_rationale: null
