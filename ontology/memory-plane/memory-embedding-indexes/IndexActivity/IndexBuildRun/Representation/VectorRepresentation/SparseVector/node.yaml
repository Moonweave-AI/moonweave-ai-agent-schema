schema: moonweave.ai/ontology-node/v1
id: SparseVector
kind: concept
labels:
  zh: 稀疏向量
  en: Sparse vector
  ja: sparse vector
semantics:
  short_definition:
    zh: "indices+values 形式的 sparse VectorRepresentation。"
    en: Sparse VectorRepresentation as indices and values pairs.
    ja: "indices+values 形式の sparse VectorRepresentation。"
  definition:
    zh: "SparseVector 是 VectorRepresentation 子类，以 indices+values 对存储 BM25、SPLADE 或 Pinecone sparse_values 输出。TfIdfIndex 与 HybridIndex sparse 通道写入此格式；不是 float[] DenseVector。"
    en: "SparseVector is a VectorRepresentation subtype storing BM25, SPLADE, or Pinecone sparse_values output as indices-and-values pairs. TfIdfIndex and HybridIndex sparse channels write this format—not float[] DenseVector."
    ja: "SparseVector は BM25/SPLADE/Pinecone sparse_values を indices+values 対で存储する VectorRepresentation subtype。TfIdfIndex/HybridIndex sparse channel 用。float[] DenseVector ではない。"
  why_needed:
    zh: lexical 检索用词项 ID 与权重稀疏表示，维度语义是 vocabulary index 而非 fixed 1536 cosine space。
    en: Lexical retrieval uses term IDs and weights sparsely; dimension semantics are vocabulary indices not fixed 1536 cosine space.
    ja: lexical 检索は語 ID+weight 稀疏表現。次元意味は vocab index で fixed 1536 cosine space ではない。
  includes:
    - zh: 纳入 BM25、SPLADE 与 Pinecone sparse_values upsert 格式。
      en: Includes BM25, SPLADE, and Pinecone sparse_values upsert format.
      ja: BM25/SPLADE/Pinecone sparse_values upsert 形式。
  excludes:
    - zh: 排除 DenseVector float[] 与 EmbeddingRun 产出的 semantic dense 向量。
      en: Excludes DenseVector float[] and semantic dense vectors from EmbeddingRun.
      ja: DenseVector float[]/EmbeddingRun semantic dense vector を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Pinecone upsert sparse_values={"indices":[...],"values":[...]} 映射 SparseVector；HybridIndex query 同时传 dense values 与 sparse_values；indices 长度必须等于 values 长度。
    en: Pinecone upsert sparse_values={"indices":[...],"values":[...]} maps to SparseVector; HybridIndex query passes dense values and sparse_values together; indices length must equal values length.
    ja: Pinecone sparse_values→SparseVector。Hybrid query で dense+sparse 同時。indices/values 長一致。
  typical_input:
    - description: BM25/SPLADE sparse output
      format: |
        {"indices": [10, 45, 892, 1204], "values": [0.82, 0.51, 0.33, 0.19]}
      source_claims: [claim-sparse-vector-bm25]
    - description: Pinecone sparse_values upsert
      format: |
        {"id": "chunk-17", "sparse_values": {"indices": [10, 45], "values": [0.8, 0.5]}}
      source_claims: [claim-sparse-vector-pinecone]
  typical_output:
    - description: Sparse vector record
      format: |
        {
          "representation_id": "repr-sparse-17",
          "nonzero_count": 4,
          "values_digest_sha256": "b2c3d4..."
        }
      source_claims: [claim-sparse-vector-design]
  reference_implementations:
    - name: Pinecone Sparse Vectors
      url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
      description: sparse_values indices and values.
    - name: Pinecone Hybrid Search
      url: https://docs.pinecone.io/guides/search/hybrid-search
      description: Combined dense and sparse query.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: Representation identifier, ja: representation 識別子}
      definitions:
        zh: 继承 VectorRepresentation.representation_id。
        en: Inherits VectorRepresentation.representation_id.
        ja: VectorRepresentation.representation_id 継承。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: repr-sparse-17
      allowed_values: []
      source_claims: [claim-sparse-vector-id]
    - id: nonzero_count
      labels: {zh: 非零项数, en: Nonzero count, ja: 非零項数}
      definitions:
        zh: indices/values 对齐后的非零维度数量。
        en: Count of nonzero dimensions after indices/values alignment.
        ja: indices/values 整列後の非零次元数。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims: [claim-sparse-vector-design]
    - id: values_digest_sha256
      labels: {zh: 稀疏值摘要, en: Sparse values digest, ja: sparse values digest}
      definitions:
        zh: 序列化 {indices, values} 的 SHA-256。
        en: SHA-256 of serialized {indices, values}.
        ja: シリアライズ {indices,values} SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef12345678
      allowed_values: []
      source_claims: [claim-sparse-vector-design]
  constraints:
    - id: sparse-indices-values-aligned
      severity: error
      expression_language: plain
      expression: indices.length must equal values.length.
      explanation:
        zh: 不对齐的稀疏向量无法 upsert。
        en: Misaligned sparse vectors cannot upsert.
        ja: 未整列 sparse vector は upsert 不可。
      source_claims: [claim-sparse-vector-pinecone]
  required_relations: []
examples:
  - id: SparseVector-example-bm25
    labels:
      zh: BM25 稀疏向量
      en: BM25 sparse vector
      ja: BM25 sparse vector
    descriptions:
      zh: chunk-17 经 BM25 编码 repr-sparse-17 {indices:[10,45,892], values:[0.8,0.5,0.3]}，写入 hybrid-index-17 sparse 通道。
      en: chunk-17 BM25-encoded repr-sparse-17 {indices:[10,45,892], values:[0.8,0.5,0.3]} writes to hybrid-index-17 sparse channel.
      ja: chunk-17 BM25→repr-sparse-17→hybrid-index-17 sparse channel。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
      version: sparse_values
    field_values:
      representation_id: repr-sparse-17
      nonzero_count: 3
    related_node_ids:
      - SparseVector
      - TfIdfIndex
      - HybridIndex
    related_relation_ids: []
    source_claims:
      - claim-sparse-vector-bm25
      - claim-sparse-vector-design
  - id: SparseVector-example-splade
    labels:
      zh: SPLADE 学习稀疏向量
      en: SPLADE learned sparse vector
      ja: SPLADE learned sparse vector
    descriptions:
      zh: SPLADE 扩展词项产出 learned sparse {indices, values}，nonzero_count 通常大于 BM25 但仍是 SparseVector 非 dense。
      en: SPLADE term expansion produces learned sparse {indices, values}; nonzero_count often exceeds BM25 but remains SparseVector not dense.
      ja: SPLADE→learned sparse {indices,values}。nonzero_count>BM25 も SparseVector。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: SPLADE mapping
    field_values:
      representation_id: repr-splade-17
      nonzero_count: 48
    related_node_ids:
      - SparseVector
      - TfIdfIndex
    related_relation_ids: []
    source_claims:
      - claim-sparse-vector-design
  - id: SparseVector-example-not-dense
    labels:
      zh: sparse 非 dense float[]
      en: Sparse is not dense float array
      ja: sparse は dense float[] ではない
    descriptions:
      zh: emb-17 float[1536] 是 DenseVector；{indices,values} 才是 SparseVector，不可互替 upsert 字段。
      en: emb-17 float[1536] is DenseVector; {indices,values} is SparseVector—upsert fields are not interchangeable.
      ja: emb-17 float[1536]=DenseVector。{indices,values}=SparseVector。upsert field 置換不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SparseVector
      - DenseVector
    related_relation_ids: []
    source_claims:
      - claim-sparse-vector-design
parent_relation:
  id: SparseVector-is_a-VectorRepresentation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种向量表示
    en: is a vector representation
    ja: ベクトル表現の一種
  definitions:
    zh: SparseVector —is_a→ VectorRepresentation 因为 vector_kind=sparse 且存储 {indices, values}。
    en: SparseVector —is_a→ VectorRepresentation because vector_kind=sparse and stores {indices, values}.
    ja: SparseVector —is_a→ VectorRepresentation は vector_kind=sparse+{indices,values} のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: SparseVector-is_a-VectorRepresentation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when storage is aligned indices and values pairs.
      explanations:
        zh: 仅当稀疏对存储时成立。
        en: Assert only for sparse pair storage.
        ja: sparse pair 存储時のみ assert。
      source_claims: [claim-sparse-vector-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-sparse-vector-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-pinecone-sparse
    title: Pinecone Sparse Vectors
    publisher: Pinecone
    url: https://docs.pinecone.io/reference/api/2025-04/data-plane/query
    source_type: official-doc
    relevance: sparse_values indices and values format.
  - id: src-pinecone-hybrid
    title: Pinecone Hybrid Search
    publisher: Pinecone
    url: https://docs.pinecone.io/guides/search/hybrid-search
    source_type: official-doc
    relevance: Dense and sparse combined upsert and query.
  - id: src-sparse-vector-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SparseVector versus DenseVector boundary.
source_claims:
  - id: claim-sparse-vector-bm25
    source: src-pinecone-sparse
    supports: BM25-style lexical weights map to sparse indices and values arrays for Pinecone upsert.
    locator: Sparse vector format
    evidence_kind: design-inference
    confidence: high
  - id: claim-sparse-vector-pinecone
    source: src-pinecone-sparse
    supports: Pinecone sparse_values require aligned indices and values arrays.
    locator: Import sparse vectors
    evidence_kind: primary-doc
    confidence: high
  - id: claim-sparse-vector-design
    source: src-sparse-vector-design
    supports: SparseVector stores {indices, values} distinct from DenseVector float arrays.
    locator: SparseVector boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-sparse-vector-id
    source: src-sparse-vector-design
    supports: representation_id identifies sparse vector instance.
    locator: structure
    evidence_kind: design-inference
    confidence: high
