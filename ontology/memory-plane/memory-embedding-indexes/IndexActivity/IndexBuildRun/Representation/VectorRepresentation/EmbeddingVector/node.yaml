schema: moonweave.ai/ontology-node/v1
id: EmbeddingVector
kind: concept
status: accepted
labels:
  zh: 嵌入向量
  en: Embedding vector
  ja: 埋込ベクトル
semantics:
  short_definition:
    zh: 由嵌入模型为确定输入生成的向量表示。
    en: A vector representation generated by an embedding model for a fixed input.
    ja: 確定入力にembedding modelが生成したvector表現です。
  definition:
    zh: EmbeddingVector 是由指定嵌入模型快照把确定输入编码成浮点向量的 VectorRepresentation，并保留输入摘要与维数；它不是模型、运行或任意手工向量。
    en: EmbeddingVector is a VectorRepresentation produced when a specified embedding-model snapshot encodes a fixed input into a floating-point vector while retaining input digest and dimensions; it is not the model, run, or an arbitrary hand-authored vector.
    ja: EmbeddingVector は指定embedding-model snapshotが確定入力を浮動小数vectorへ符号化し入力digestと次元を保持する VectorRepresentation で、model・run・任意手作業vectorではありません。
  why_needed:
    zh: 把模型生成语义与一般数值向量形态分开。
    en: Separates model-generated semantics from generic numeric vector form.
    ja: model生成意味を一般数値vector形態から分離します。
  includes:
    - zh: 纳入有模型快照、输入摘要与维数的 embedding 响应向量。
      en: Includes embedding response vectors with model snapshot, input digest, and dimensions.
      ja: model snapshot・入力digest・次元を持つembedding応答vectorを含みます。
  excludes:
    - zh: 排除 EmbeddingModel、EmbeddingRun 与无生成来源的手工向量。
      en: Excludes EmbeddingModel, EmbeddingRun, and hand-authored vectors lacking generation provenance.
      ja: EmbeddingModel・EmbeddingRun・生成来歴のない手作業vectorを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - embedding_id
  fields:
    - id: embedding_id
      labels:
        zh: 嵌入标识
        en: embedding ID
        ja: embedding ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识生成向量。
        en: Stable identifier for the generated vector.
        ja: 生成vectorの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: emb-17
      source_claims:
        - claim-embedding-vector-002
    - id: model_snapshot
      labels:
        zh: 模型快照
        en: model snapshot
        ja: model snapshot
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定生成坐标的模型版本。
        en: Fixes the model version generating the coordinates.
        ja: 座標生成model版を固定します。
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small@2026-07
      source_claims:
        - claim-embedding-vector-003
    - id: input_digest
      labels:
        zh: 输入摘要
        en: input digest
        ja: 入力digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被编码输入。
        en: Fixes the encoded input.
        ja: 符号化入力を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:chunk17
      source_claims:
        - claim-embedding-vector-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: EmbeddingVector-example-positive-manual-001
    kind: positive
    labels:
      zh: 嵌入向量正例
      en: "Positive case: Embedding vector"
      ja: 埋込ベクトル正例
    scenario_id: null
    descriptions:
      zh: emb-17 由指定模型快照对 sha256:chunk17 生成。
      en: emb-17 was generated by the specified model snapshot for sha256:chunk17.
      ja: emb-17 は指定model snapshotが sha256:chunk17 から生成しました。
    field_values:
      embedding_id: emb-17
      model_snapshot: text-embedding-3-small@2026-07
      input_digest: sha256:chunk17
      vector_id: emb-17
      dimensions: 1536
      encoding: dense-float32
      representation_id: repr-emb-17
      source_digest: sha256:chunk17
      method_profile: text-embedding-3-small@2026-07
    related_node_ids:
      - EmbeddingVector
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 EmbeddingVector。
      en: Classify the object as EmbeddingVector.
      ja: この対象を EmbeddingVector に分類します。
    why_valid_or_invalid:
      zh: 模型、输入与向量产物三者身份齐全。
      en: Model, input, and vector-artifact identities are all present.
      ja: model・入力・vector成果物の同一性が揃っています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-embedding-vector-005
  - id: EmbeddingVector-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 嵌入向量边界例
      en: "Boundary case: Embedding vector"
      ja: 埋込ベクトル境界例
    scenario_id: null
    descriptions:
      zh: manual-17 是人工填写的 1536 个数值且没有模型运行来源。
      en: manual-17 is a hand-authored 1536-number array with no model-run provenance.
      ja: manual-17 はmodel-run来歴のない手入力1536数値配列です。
    field_values: {}
    related_node_ids:
      - EmbeddingVector
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 EmbeddingVector。
      en: Do not classify the object as EmbeddingVector.
      ja: この対象を EmbeddingVector に分類しません。
    why_valid_or_invalid:
      zh: 向量形态不自动证明由嵌入模型生成。
      en: Vector shape alone does not prove generation by an embedding model.
      ja: vector形態だけではembedding model生成を証明できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-embedding-vector-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: EmbeddingVector-is_a-VectorRepresentation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: EmbeddingVector 是 VectorRepresentation 的严格子类；种差为：坐标由确定嵌入模型快照对确定输入生成并保留生成来源。
    en: "EmbeddingVector is a strict subtype of VectorRepresentation; its reviewed differentia is: its coordinates were generated from fixed input by a fixed embedding-model snapshot with provenance retained."
    ja: EmbeddingVector は VectorRepresentation の厳密なsubtypeで、審査済み種差は「固定入力を固定embedding-model snapshotが生成し生成来歴を保持します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: EmbeddingVector-is_a-VectorRepresentation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies VectorRepresentation and also satisfies the differentia: its coordinates were generated from fixed input by a fixed embedding-model snapshot with provenance retained."
      explanations:
        zh: 仅当对象首先满足 VectorRepresentation 定义且满足种差“坐标由确定嵌入模型快照对确定输入生成并保留生成来源。”时成立。
        en: "Assert only when the object first satisfies VectorRepresentation and also satisfies the differentia: its coordinates were generated from fixed input by a fixed embedding-model snapshot with provenance retained."
        ja: 対象がまず VectorRepresentation を満たし、さらに種差「固定入力を固定embedding-model snapshotが生成し生成来歴を保持します。」を満たす時だけ成立します。
      source_claims:
        - claim-embedding-vector-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EmbeddingVector-is_a-VectorRepresentation-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: emb-17 是 text-embedding-3-small@2026-07 对 chunk-17@3 摘要生成的 1536 维向量，并保留生成运行。
        en: emb-17 is a 1,536-dimensional vector generated by text-embedding-3-small@2026-07 from the chunk-17@3 digest, with its generating run retained.
        ja: emb-17 は text-embedding-3-small@2026-07 が chunk-17@3 のdigestから生成した1,536次元vectorで、生成runも保持します。
      field_values: {}
      related_node_ids:
        - EmbeddingVector
        - VectorRepresentation
      related_relation_ids:
        - EmbeddingVector-is_a-VectorRepresentation
      expected_result:
        zh: 确认 emb-17 是具有模型生成来源的 EmbeddingVector，并继承 VectorRepresentation。
        en: Confirm emb-17 as an EmbeddingVector with model-generation provenance and inherit VectorRepresentation.
        ja: emb-17 を model-generation provenance を持つ EmbeddingVector と確認し、VectorRepresentation を継承します。
      why_valid_or_invalid:
        zh: 数值坐标满足 VectorRepresentation，确定模型、输入和运行来源构成嵌入种差。
        en: Numeric coordinates satisfy VectorRepresentation, while fixed model, input, and run provenance establish the embedding differentia.
        ja: 数値座標が VectorRepresentation を満たし、確定model・input・run来歴がembedding種差を成立させます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-embedding-vector-007
    - id: EmbeddingVector-is_a-VectorRepresentation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 没有模型调用来源的手工向量只可归为 VectorRepresentation。
        en: A hand-authored vector with no model-invocation provenance is only a VectorRepresentation.
        ja: model invocation来歴のない手作業vectorは VectorRepresentationに留まります。
      field_values: {}
      related_node_ids:
        - EmbeddingVector
        - VectorRepresentation
      related_relation_ids:
        - EmbeddingVector-is_a-VectorRepresentation
      expected_result:
        zh: 将手工向量保留在 VectorRepresentation，不提升为 EmbeddingVector。
        en: Keep the manually authored vector as VectorRepresentation and do not promote it to EmbeddingVector.
        ja: 手作業 vector を VectorRepresentation に留め、EmbeddingVector へ昇格させません。
      why_valid_or_invalid:
        zh: 数值坐标满足向量表示，但缺少 EmbeddingModel、输入摘要和生成运行，不能证明嵌入生成种差。
        en: Numerical coordinates satisfy vector representation, but absent EmbeddingModel, input digest, and generating run cannot establish the embedding-generation differentia.
        ja: 数値座標は vector representation を満たしますが、EmbeddingModel・input digest・generating run がなく embedding-generation 種差を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-embedding-vector-007
  source_claims:
    - claim-embedding-vector-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: EmbeddingVector-represents-Chunk
    predicate: represents
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 表示分块
      en: represents chunk
      ja: chunkを表現する
    definitions:
      zh: EmbeddingVector —represents→ Chunk 表示向量编码该确切 Chunk 内容版本，而不表示分块容器或相邻内容。
      en: EmbeddingVector —represents→ Chunk means that the vector encodes this exact Chunk content version, not its container or adjacent content.
      ja: EmbeddingVector —represents→ Chunk はvectorがこのexact Chunk content版を符号化しcontainerや隣接contentを表さないことを意味します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
      en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
      ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
    inverse_reading:
      predicate: inverse_represents
      labels:
        zh: 反向读取
        en: inverse reading
        ja: 逆方向読取
    conditions:
      - id: EmbeddingVector-represents-Chunk-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when vector.input_digest exactly matches Chunk.content_digest.
        explanations:
          zh: 仅当 vector.input_digest 与 Chunk.content_digest 完全一致时成立。
          en: Assert only when vector.input_digest exactly matches Chunk.content_digest.
          ja: vector.input_digestが Chunk.content_digestと完全一致する時だけ成立します。
        source_claims:
          - claim-embedding-vector-008
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: EmbeddingVector-represents-Chunk-example-positive-manual-001
        kind: positive
        labels:
          zh: 表示分块正例
          en: "Positive case: represents chunk"
          ja: chunkを表現する正例
        scenario_id: null
        descriptions:
          zh: emb-17 的 input_digest 等于 chunk-17@3 的内容摘要。
          en: emb-17's input_digest equals chunk-17@3's content digest.
          ja: emb-17 の input_digestは chunk-17@3のcontent digestと一致します。
        field_values: {}
        related_node_ids:
          - EmbeddingVector
          - Chunk
        related_relation_ids:
          - EmbeddingVector-represents-Chunk
        expected_result:
          zh: 建立 emb-17 represents chunk-17@3 的确切内容版本事实。
          en: Assert that emb-17 represents the exact content version chunk-17@3.
          ja: emb-17 represents exact content version chunk-17@3 という fact を確立します。
        why_valid_or_invalid:
          zh: 向量的 input_digest 与该分块版本的 content_digest 完全一致，排除了相邻分块与旧版本。
          en: The vector's input_digest exactly matches this chunk version's content_digest, excluding adjacent chunks and prior versions.
          ja: vector の input_digest がこの chunk 版の content_digest と完全一致し、隣接 chunk と旧版を除外します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-embedding-vector-008
      - id: EmbeddingVector-represents-Chunk-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 表示分块边界例
          en: "Boundary case: represents chunk"
          ja: chunkを表現する境界例
        scenario_id: null
        descriptions:
          zh: 同一文档中的 chunk-18 摘要不同，不能被 emb-17 表示。
          en: chunk-18 from the same document has a different digest and is not represented by emb-17.
          ja: 同documentの chunk-18 はdigestが異なり emb-17に表現されません。
        field_values: {}
        related_node_ids:
          - EmbeddingVector
          - Chunk
        related_relation_ids:
          - EmbeddingVector-represents-Chunk
        expected_result:
          zh: 不把摘要不同的 chunk-18 作为 emb-17 的 represents 目标。
          en: Do not use digest-mismatched chunk-18 as the represents target of emb-17.
          ja: digest が異なる chunk-18 を emb-17 の represents target にしません。
        why_valid_or_invalid:
          zh: 共享文档来源不等于共享向量输入。
          en: A shared document source does not imply shared vector input.
          ja: 共通document sourceは共通vector入力を意味しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-embedding-vector-008
    source_claims:
      - claim-embedding-vector-008
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Chunk
