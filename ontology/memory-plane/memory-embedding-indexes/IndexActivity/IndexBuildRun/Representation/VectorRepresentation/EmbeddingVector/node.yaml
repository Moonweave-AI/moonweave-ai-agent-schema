schema: moonweave.ai/ontology-node/v1
id: EmbeddingVector
kind: concept
labels:
  zh: 嵌入向量
  en: Embedding vector
  ja: 埋め込み vector
semantics:
  short_definition:
    zh: 绑定 EmbeddingRun 血缘的 dense 语义向量。
    en: Dense semantic vector bound to EmbeddingRun lineage.
    ja: EmbeddingRun 来歴 binding 付き dense semantic vector。
  definition:
    zh: EmbeddingVector 是 VectorRepresentation 子类，必须是 EmbeddingRun 产出的 dense 语义编码，绑定 generating_run_id、input_digest 与 model_snapshot。TextEmbedding 与 GraphEmbedding 是子类；不能仅凭 IndexEntry 邻接或同维度 float[] 推断此链。
    en: EmbeddingVector is a VectorRepresentation subtype that must be dense semantic encoding produced by EmbeddingRun, binding generating_run_id, input_digest, and model_snapshot. TextEmbedding and GraphEmbedding are subtypes; index entry adjacency or matching-dimension float[] alone cannot infer this chain.
    ja: EmbeddingVector は EmbeddingRun 产出 dense semantic encoding の VectorRepresentation subtype。generating_run_id/input_digest/model_snapshot binding 必須。TextEmbedding/GraphEmbedding が subtype。IndexEntry 隣接/次元一致だけでは chain 推論不可。
  why_needed:
    zh: 检索与合规需要证明 emb-17 来自 embedding-run-17 消费 chunk-17@3 而非缓存复用或维度巧合。
    en: Retrieval and compliance need proof emb-17 came from embedding-run-17 consuming chunk-17@3—not cache reuse or dimension coincidence.
    ja: emb-17 が embedding-run-17+chunk-17@3 由来である証明が retrieval/compliance に必要。
  includes:
    - zh: 纳入 TextEmbedding、GraphEmbedding 及带 generating_run_id 的 DenseVector。
      en: Includes TextEmbedding, GraphEmbedding, and DenseVector with generating_run_id.
      ja: TextEmbedding/GraphEmbedding/generating_run_id 付き DenseVector。
  excludes:
    - zh: 排除 SparseVector、匿名 float[] 与 EmbeddingRun 活动本身。
      en: Excludes SparseVector, anonymous float[], and EmbeddingRun activity itself.
      ja: SparseVector/匿名 float[]/EmbeddingRun activity 自体を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI data[].embedding 登记为 EmbeddingVector 时必附 embedding_run_id、model_snapshot、input_digest_sha256；Chroma 自动 embed 也应映射回等效 EmbeddingRun 或声明 embedding_function snapshot。
    en: When registering OpenAI data[].embedding as EmbeddingVector, attach embedding_run_id, model_snapshot, input_digest_sha256; Chroma auto-embed should map to equivalent EmbeddingRun or declare embedding_function snapshot.
    ja: OpenAI embedding 登録時 embedding_run_id/model_snapshot/input_digest 必須。Chroma auto-embed も EmbeddingRun 等效写像。
  typical_input: []
  typical_output:
    - description: Embedding vector with lineage
      format: |
        {
          "embedding_id": "emb-17",
          "generating_run_id": "embedding-run-17",
          "model_snapshot": "text-embedding-3-small@2026-07",
          "input_digest_sha256": "f3f0483c...",
          "vector_dimensions": 1536
        }
      source_claims: [claim-embedding-vector-design]
  reference_implementations:
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: Model-bound embedding output.
    - name: Voyage AI Embeddings
      url: https://docs.voyageai.com/reference/embeddings-api
      description: voyage model embedding output.
structure:
  identity_keys: [embedding_id]
  fields:
    - id: embedding_id
      labels: {zh: 嵌入标识, en: Embedding identifier, ja: 埋め込み識別子}
      definitions:
        zh: 唯一标识一条 EmbeddingVector；可映射 Pinecone vector id。
        en: Uniquely identifies one EmbeddingVector; mappable to Pinecone vector id.
        ja: 一 EmbeddingVector を一意識別。Pinecone vector id 写像可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: emb-17
      allowed_values: []
      source_claims: [claim-embedding-vector-id]
    - id: generating_run_id
      labels: {zh: 生成运行标识, en: Generating run identifier, ja: 生成 run 識別子}
      definitions:
        zh: 产出此向量的 EmbeddingRun embedding_run_id。
        en: EmbeddingRun embedding_run_id that produced this vector.
        ja: 当 vector を产出した EmbeddingRun embedding_run_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: embedding-run-17
      allowed_values: []
      source_claims: [claim-embedding-vector-run]
    - id: model_snapshot
      labels: {zh: 模型快照, en: Model snapshot, ja: モデルスナップショット}
      definitions:
        zh: 生成时使用的 embedding 模型版本。
        en: Embedding model version used at generation time.
        ja: 生成時使用 embedding model 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: text-embedding-3-small@2026-07
      allowed_values: []
      source_claims: [claim-embedding-vector-model]
  constraints:
    - id: embedding-vector-requires-run
      severity: error
      expression_language: plain
      expression: EmbeddingVector must bind generating_run_id with matching input_digest and model_snapshot.
      explanation:
        zh: 无运行血缘则向量不可审计。
        en: Without run lineage the vector is not auditable.
        ja: run 来歴なしでは vector 監査不可。
      source_claims: [claim-embedding-vector-design]
  required_relations: []
examples:
  - id: EmbeddingVector-example-openai-lineage
    labels:
      zh: OpenAI 嵌入向量血缘
      en: OpenAI embedding vector lineage
      ja: OpenAI 埋め込み vector 来歴
    descriptions:
      zh: emb-17 由 embedding-run-17 产生，model_snapshot=text-embedding-3-small@2026-07，input_digest 锁定 chunk-17@3。
      en: emb-17 produced by embedding-run-17, model_snapshot=text-embedding-3-small@2026-07, input_digest pins chunk-17@3.
      ja: emb-17←embedding-run-17。model_snapshot=text-embedding-3-small@2026-07。input_digest=chunk-17@3。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: POST /v1/embeddings
    field_values:
      embedding_id: emb-17
      generating_run_id: embedding-run-17
      model_snapshot: text-embedding-3-small@2026-07
    related_node_ids:
      - EmbeddingVector
      - TextEmbedding
      - EmbeddingRun
    related_relation_ids: []
    source_claims:
      - claim-embedding-vector-openai
      - claim-embedding-vector-design
  - id: EmbeddingVector-example-voyage-lineage
    labels:
      zh: Voyage 嵌入向量血缘
      en: Voyage embedding vector lineage
      ja: Voyage 埋め込み vector 来歴
    descriptions:
      zh: emb-22 由 embedding-run-22 使用 voyage-3-large 生成；与 OpenAI emb-17 同维度也不共享 generating_run_id。
      en: emb-22 produced by embedding-run-22 using voyage-3-large; same dimension as OpenAI emb-17 does not share generating_run_id.
      ja: emb-22←embedding-run-22（voyage-3-large）。OpenAI emb-17 と次元同じでも generating_run_id 共有不可。
    example_source:
      product: Voyage AI
      url: https://docs.voyageai.com/reference/embeddings-api
      version: voyage-3-large
    field_values:
      embedding_id: emb-22
      generating_run_id: embedding-run-22
      model_snapshot: voyage-3-large@2026-03
    related_node_ids:
      - EmbeddingVector
      - TextEmbedding
    related_relation_ids: []
    source_claims:
      - claim-embedding-vector-voyage
      - claim-embedding-vector-design
  - id: EmbeddingVector-example-not-run
    labels:
      zh: 向量非嵌入运行
      en: Vector is not embedding run
      ja: vector は embedding run ではない
    descriptions:
      zh: embedding-run-17 是 IndexActivity；emb-17 是 EmbeddingVector 产物。同维度 float[] 无 generating_run_id 不能归类为 EmbeddingVector。
      en: embedding-run-17 is IndexActivity; emb-17 is EmbeddingVector artifact. Same-dimension float[] without generating_run_id is not EmbeddingVector.
      ja: embedding-run-17=IndexActivity。emb-17=EmbeddingVector artifact。generating_run_id なし float[] は EmbeddingVector 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - EmbeddingVector
      - EmbeddingRun
    related_relation_ids: []
    source_claims:
      - claim-embedding-vector-design
parent_relation:
  id: EmbeddingVector-is_a-VectorRepresentation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种向量表示
    en: is a vector representation
    ja: ベクトル表現の一種
  definitions:
    zh: EmbeddingVector —is_a→ VectorRepresentation 因为它是 EmbeddingRun 产出的 dense 语义向量且绑定运行血缘。
    en: EmbeddingVector —is_a→ VectorRepresentation because it is dense semantic vector from EmbeddingRun with run lineage binding.
    ja: EmbeddingVector —is_a→ VectorRepresentation は EmbeddingRun 产出 dense semantic vector+run 来歴 binding のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: EmbeddingVector-is_a-VectorRepresentation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when dense vector binds EmbeddingRun lineage.
      explanations:
        zh: 仅当绑定运行血缘时成立。
        en: Assert only when run lineage is bound.
        ja: run 来歴 binding 時のみ assert。
      source_claims: [claim-embedding-vector-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-embedding-vector-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-embeddings
    title: OpenAI Embeddings API
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/embeddings
    source_type: official-doc
    relevance: Model-bound embedding vectors from API calls.
  - id: src-voyage-embeddings
    title: Voyage AI Embeddings API
    publisher: Voyage AI
    url: https://docs.voyageai.com/reference/embeddings-api
    source_type: official-doc
    relevance: voyage model embedding output.
  - id: src-embedding-vector-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: EmbeddingVector lineage requirements.
source_claims:
  - id: claim-embedding-vector-openai
    source: src-openai-embeddings
    supports: OpenAI embeddings response ties vectors to model and input for reproducible generation.
    locator: Create embeddings response
    evidence_kind: primary-api
    confidence: high
  - id: claim-embedding-vector-voyage
    source: src-voyage-embeddings
    supports: Voyage embeddings return model-specific dense vectors aligned with inputs.
    locator: Embeddings API response
    evidence_kind: primary-api
    confidence: high
  - id: claim-embedding-vector-design
    source: src-embedding-vector-design
    supports: EmbeddingVector requires generating_run_id, input digest, and model snapshot binding.
    locator: EmbeddingVector boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-embedding-vector-id
    source: src-embedding-vector-design
    supports: embedding_id identifies one embedding vector instance.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-embedding-vector-run
    source: src-embedding-vector-design
    supports: generating_run_id links vector to EmbeddingRun.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-embedding-vector-model
    source: src-embedding-vector-design
    supports: model_snapshot pins embedding model version at generation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
