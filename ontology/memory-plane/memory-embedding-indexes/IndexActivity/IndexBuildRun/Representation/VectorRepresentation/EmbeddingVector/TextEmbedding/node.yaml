schema: moonweave.ai/ontology-node/v1
id: TextEmbedding
kind: concept
labels:
  zh: 文本嵌入
  en: Text embedding
  ja: テキスト埋め込み
semantics:
  short_definition:
    zh: 从文本 chunk 生成的 EmbeddingVector 子类。
    en: EmbeddingVector subtype generated from text chunks.
    ja: テキスト chunk から生成する EmbeddingVector subtype。
  definition:
    zh: TextEmbedding 是 EmbeddingVector 子类，输入为 Chunk 或 SituatedChunk 正文（input_digest 锁定）。OpenAI text-embedding-3-small 输出 float[1536] 与 Voyage voyage-3-large 输出是典型映射；GraphEmbedding 输入为图结构而非纯文本。
    en: TextEmbedding is an EmbeddingVector subtype whose input is Chunk or SituatedChunk body (input_digest pinned). OpenAI text-embedding-3-small float[1536] and Voyage voyage-3-large output are typical mappings; GraphEmbedding input is graph structure not plain text.
    ja: TextEmbedding は Chunk/SituatedChunk 本文入力（input_digest 固定）の EmbeddingVector subtype。OpenAI text-embedding-3-small float[1536]/Voyage voyage-3-large が典型。GraphEmbedding は graph 入力。
  why_needed:
    zh: 文本嵌入与图嵌入的输入 digest 语义不同，检索审计需区分“哪段文字被嵌入”。
    en: Text versus graph embedding input digests differ; retrieval audit must distinguish which text was embedded.
    ja: text/graph embedding の input digest 意味が異なり、どの文字列が embed されたか監査必要。
  includes:
    - zh: 纳入 OpenAI/Voyage/Cohere 等 text embedding API 产出。
      en: Includes output from OpenAI/Voyage/Cohere text embedding APIs.
      ja: OpenAI/Voyage/Cohere text embedding API 产出。
  excludes:
    - zh: 排除 GraphEmbedding、SparseVector 与未绑定 chunk digest 的向量。
      en: Excludes GraphEmbedding, SparseVector, and vectors without bound chunk digest.
      ja: GraphEmbedding/SparseVector/chunk digest 未 binding vector を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: POST /v1/embeddings input=chunk_text 或 SituatedChunk contextualized 正文；Moonweave 登记 text-embedding-3-small@2026-07 或 voyage-3-large@2026-03 snapshot；SituatedChunk 嵌入可用 contextualized 文本但 input_digest 仍须区分 evidence 与 situating 字段。
    en: POST /v1/embeddings input=chunk_text or SituatedChunk contextualized body; Moonweave records text-embedding-3-small@2026-07 or voyage-3-large@2026-03 snapshot; SituatedChunk embed may use contextualized text but input_digest must separate evidence from situating fields.
    ja: POST /v1/embeddings input=chunk/contextualized body。model snapshot 登録。SituatedChunk は evidence/situating field 分離。
  typical_input:
    - description: OpenAI text-embedding-3-small
      format: |
        POST /v1/embeddings
        {"model": "text-embedding-3-small", "input": "JWT bearer tokens expire after 7 days.", "dimensions": 1536}
      source_claims: [claim-text-embedding-openai]
    - description: Voyage voyage-3-large document embed
      format: |
        POST /v1/embeddings
        {"model": "voyage-3-large", "input": ["JWT bearer tokens expire after 7 days."], "input_type": "document"}
      source_claims: [claim-text-embedding-voyage]
  typical_output:
    - description: Text embedding record
      format: |
        {
          "embedding_id": "emb-17",
          "embedding_kind": "text",
          "model_snapshot": "text-embedding-3-small@2026-07",
          "vector_dimensions": 1536
        }
      source_claims: [claim-text-embedding-design]
  reference_implementations:
    - name: OpenAI text-embedding-3-small
      url: https://platform.openai.com/docs/guides/embeddings
      description: Small efficient text embedding model.
    - name: Voyage voyage-3-large
      url: https://docs.voyageai.com/reference/embeddings-api
      description: Large voyage text embedding model.
structure:
  identity_keys: [embedding_id]
  fields:
    - id: embedding_id
      labels: {zh: 嵌入标识, en: Embedding identifier, ja: 埋め込み識別子}
      definitions:
        zh: 继承 EmbeddingVector.embedding_id。
        en: Inherits EmbeddingVector.embedding_id.
        ja: EmbeddingVector.embedding_id 継承。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: emb-17
      allowed_values: []
      source_claims: [claim-text-embedding-id]
    - id: input_text_digest_sha256
      labels: {zh: 文本输入摘要, en: Text input digest, ja: テキスト入力 digest}
      definitions:
        zh: 被嵌入文本正文的 SHA-256；SituatedChunk 须声明是否含 situating context。
        en: SHA-256 of embedded text body; SituatedChunk must declare whether situating context is included.
        ja: embed 対象テキスト SHA-256。SituatedChunk は situating context 含有宣言必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0
      allowed_values: []
      source_claims: [claim-text-embedding-input]
    - id: model_snapshot
      labels: {zh: 模型快照, en: Model snapshot, ja: モデルスナップショット}
      definitions:
        zh: text-embedding-3-small 或 voyage-3-large 等文本 embedding 模型版本。
        en: Text embedding model version such as text-embedding-3-small or voyage-3-large.
        ja: text-embedding-3-small/voyage-3-large 等 text embedding model 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: text-embedding-3-small@2026-07
      allowed_values: []
      source_claims: [claim-text-embedding-openai, claim-text-embedding-voyage]
  constraints: []
  required_relations: []
examples:
  - id: TextEmbedding-example-openai-small
    labels:
      zh: OpenAI text-embedding-3-small
      en: OpenAI text-embedding-3-small
      ja: OpenAI text-embedding-3-small
    descriptions:
      zh: chunk-17@3 正文经 text-embedding-3-small（dimensions=1536）生成 emb-17 TextEmbedding；input_text_digest 锁定 chunk 证据正文。
      en: chunk-17@3 body embedded via text-embedding-3-small (dimensions=1536) producing emb-17 TextEmbedding; input_text_digest pins chunk evidence body.
      ja: chunk-17@3→text-embedding-3-small（1536）→emb-17 TextEmbedding。input_text_digest=chunk 証拠本文。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/embeddings
      version: text-embedding-3-small
    field_values:
      embedding_id: emb-17
      model_snapshot: text-embedding-3-small@2026-07
      vector_dimensions: 1536
    related_node_ids:
      - TextEmbedding
      - DenseVector
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-text-embedding-openai
      - claim-text-embedding-design
  - id: TextEmbedding-example-voyage-large
    labels:
      zh: Voyage voyage-3-large 文档嵌入
      en: Voyage voyage-3-large document embed
      ja: Voyage voyage-3-large document embed
    descriptions:
      zh: 批量文档索引用 voyage-3-large（input_type=document）生成 emb-22；model_snapshot=voyage-3-large@2026-03 与 OpenAI 区分。
      en: Batch document indexing uses voyage-3-large (input_type=document) producing emb-22; model_snapshot=voyage-3-large@2026-03 distinct from OpenAI.
      ja: voyage-3-large（document）→emb-22。voyage-3-large@2026-03 snapshot。
    example_source:
      product: Voyage AI
      url: https://docs.voyageai.com/reference/embeddings-api
      version: voyage-3-large
    field_values:
      embedding_id: emb-22
      model_snapshot: voyage-3-large@2026-03
    related_node_ids:
      - TextEmbedding
      - EmbeddingRun
    related_relation_ids: []
    source_claims:
      - claim-text-embedding-voyage
      - claim-text-embedding-design
  - id: TextEmbedding-example-situated-contextualized
    labels:
      zh: SituatedChunk 语境化嵌入
      en: SituatedChunk contextualized embed
      ja: SituatedChunk contextualized embed
    descriptions:
      zh: Anthropic contextual retrieval 将 situating context prepend 后嵌入；Moonweave input_text_digest 记录 contextualized 文本，SourceSpan 仍绑定原始 chunk 证据。
      en: Anthropic contextual retrieval prepends situating context before embed; Moonweave input_text_digest records contextualized text while SourceSpan still binds original chunk evidence.
      ja: contextual retrieval prepend→embed。input_text_digest=contextualized 文本。SourceSpan=原文 evidence。
    example_source:
      product: Anthropic
      url: https://www.anthropic.com/news/contextual-retrieval
      version: contextualized chunk embed
    field_values:
      embedding_id: emb-situated-17
      contextualized_for_embedding: true
    related_node_ids:
      - TextEmbedding
      - SituatedChunk
      - memory-chunking-situating
    related_relation_ids: []
    source_claims:
      - claim-text-embedding-design
  - id: TextEmbedding-example-not-graph
    labels:
      zh: 文本嵌入非图嵌入
      en: Text embedding is not graph embedding
      ja: text embedding は graph embedding ではない
    descriptions:
      zh: 节点邻接矩阵输入产生的是 GraphEmbedding；纯 chunk 文本 API embed 是 TextEmbedding。
      en: Node adjacency matrix input produces GraphEmbedding; plain chunk text API embed is TextEmbedding.
      ja: 隣接行列入力=GraphEmbedding。chunk テキスト API=TextEmbedding。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - TextEmbedding
      - GraphEmbedding
    related_relation_ids: []
    source_claims:
      - claim-text-embedding-design
parent_relation:
  id: TextEmbedding-is_a-EmbeddingVector
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种嵌入向量
    en: is an embedding vector
    ja: 埋め込み vector の一種
  definitions:
    zh: TextEmbedding —is_a→ EmbeddingVector 因为输入为文本 chunk 且产出 dense semantic vector。
    en: TextEmbedding —is_a→ EmbeddingVector because input is text chunk and output is dense semantic vector.
    ja: TextEmbedding —is_a→ EmbeddingVector は text chunk 入力+dense semantic vector 产出のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: TextEmbedding-is_a-EmbeddingVector-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when input digest covers text chunk body from EmbeddingRun.
      explanations:
        zh: 仅当文本 chunk 输入时成立。
        en: Assert only for text chunk input.
        ja: text chunk 入力時のみ assert。
      source_claims: [claim-text-embedding-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-text-embedding-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-embeddings-guide
    title: OpenAI Embeddings Guide
    publisher: OpenAI
    url: https://platform.openai.com/docs/guides/embeddings
    source_type: official-doc
    relevance: text-embedding-3-small model and dimensions.
  - id: src-voyage-embeddings
    title: Voyage AI Embeddings API
    publisher: Voyage AI
    url: https://docs.voyageai.com/reference/embeddings-api
    source_type: official-doc
    relevance: voyage-3-large document embeddings.
  - id: src-anthropic-contextual
    title: Anthropic Contextual Retrieval
    publisher: Anthropic
    url: https://www.anthropic.com/news/contextual-retrieval
    source_type: official-doc
    relevance: Contextualized text before embedding.
  - id: src-text-embedding-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TextEmbedding versus GraphEmbedding boundary.
source_claims:
  - id: claim-text-embedding-openai
    source: src-openai-embeddings-guide
    supports: OpenAI text-embedding-3-small returns 1536-dimensional float embeddings from text input.
    locator: Embedding models
    evidence_kind: primary-doc
    confidence: high
  - id: claim-text-embedding-voyage
    source: src-voyage-embeddings
    supports: Voyage voyage-3-large embeds document text inputs with model-specific dense vectors.
    locator: voyage-3-large
    evidence_kind: primary-api
    confidence: high
  - id: claim-text-embedding-design
    source: src-text-embedding-design
    supports: TextEmbedding binds text chunk input digest and model snapshot under EmbeddingVector lineage.
    locator: TextEmbedding boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-embedding-id
    source: src-text-embedding-design
    supports: embedding_id identifies text embedding instance.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-embedding-input
    source: src-text-embedding-design
    supports: input_text_digest_sha256 pins embedded text content.
    locator: structure
    evidence_kind: design-inference
    confidence: high
