schema: moonweave.ai/ontology-node/v1
id: TextEmbedding
kind: concept
status: review
labels:
  zh: 文本嵌入
  en: Text embedding
  ja: テキスト埋込
semantics:
  short_definition:
    zh: 由文本输入生成并保留文本身份的 EmbeddingVector。
    en: An EmbeddingVector generated from text while retaining text identity.
    ja: text入力から生成しtext同一性を保持する EmbeddingVector です。
  definition:
    zh: TextEmbedding 是输入为确定文本或 token 序列的 EmbeddingVector，记录文本摘要与分词/预处理配置；它不是原文本或图结构嵌入。
    en: TextEmbedding is an EmbeddingVector whose input is fixed text or a token sequence and which records text digest and tokenization/preprocessing profile; it is not the source text or a graph-structure embedding.
    ja: TextEmbedding は確定textまたはtoken列を入力としtext digestとtokenization/preprocessing profileを記録する EmbeddingVector で、原textやgraph構造embeddingではありません。
  why_needed:
    zh: 让文本来源约束位于嵌入向量之下而不是与“嵌入”平级。
    en: Places text-source constraints below EmbeddingVector rather than beside a generic embedding node.
    ja: text出典制約を一般embedding nodeと同列でなく EmbeddingVector の下に置きます。
  includes:
    - zh: 纳入文本、token 数组或文本批次生成的向量。
      en: Includes vectors generated from text, token arrays, or text batches.
      ja: text・token配列・text batchから生成したvectorを含みます。
  excludes:
    - zh: 排除原始 Document、GraphEmbedding 和非文本特征向量。
      en: Excludes source Document, GraphEmbedding, and non-text feature vectors.
      ja: 原Document・GraphEmbedding・非text feature vectorを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - embedding_id
  fields:
    - id: embedding_id
      labels:
        zh: 嵌入标识
        en: embedding ID
        ja: embedding ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识文本嵌入。
        en: Stable identifier for the text embedding.
        ja: text embeddingの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: text-emb-17
      source_claims:
        - claim-text-embedding-002
    - id: text_digest
      labels:
        zh: 文本摘要
        en: text digest
        ja: text digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被编码的规范化文本。
        en: Fixes the normalized text encoded.
        ja: 符号化した正規化textを固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:text17
      source_claims:
        - claim-text-embedding-003
    - id: tokenizer_profile
      labels:
        zh: 分词配置
        en: tokenizer profile
        ja: tokenizer profile
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 token 化与截断配置。
        en: Records tokenization and truncation configuration.
        ja: token化と切詰め設定を記録します。
      allowed_values: []
      pattern: null
      example_value: o200k_base:v1
      source_claims:
        - claim-text-embedding-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: TextEmbedding-example-positive-manual-001
    kind: positive
    labels:
      zh: 文本嵌入正例
      en: "Positive case: Text embedding"
      ja: テキスト埋込正例
    scenario_id: null
    descriptions:
      zh: text-emb-17 对固定文本摘要和 tokenizer 配置生成向量。
      en: text-emb-17 encodes a fixed text digest under a recorded tokenizer profile.
      ja: text-emb-17 は固定text digestを記録tokenizer profileで符号化します。
    field_values:
      embedding_id: text-emb-17
      text_digest: sha256:text17
      tokenizer_profile: o200k_base:v1
      model_snapshot: text-embedding-3-small@2026-07
      input_digest: sha256:text17
      vector_id: text-emb-17
      dimensions: 1536
      encoding: dense-float32
      representation_id: repr-text-emb-17
      source_digest: sha256:text17
      method_profile: text-embedding-3-small@2026-07+o200k_base:v1
    related_node_ids:
      - TextEmbedding
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 TextEmbedding。
      en: Classify the object as TextEmbedding.
      ja: この対象を TextEmbedding に分類します。
    why_valid_or_invalid:
      zh: 输入模态、摘要和预处理配置可验证。
      en: Input modality, digest, and preprocessing profile are verifiable.
      ja: 入力modality・digest・preprocessing profileを検証できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-embedding-005
  - id: TextEmbedding-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 文本嵌入边界例
      en: "Boundary case: Text embedding"
      ja: テキスト埋込境界例
    scenario_id: null
    descriptions:
      zh: graph-emb-17 由图邻接关系生成，没有文本输入。
      en: graph-emb-17 was generated from graph adjacency and has no text input.
      ja: graph-emb-17 はgraph隣接関係から生成されtext入力がありません。
    field_values: {}
    related_node_ids:
