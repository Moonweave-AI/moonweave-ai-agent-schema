    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 TextEmbedding。
      en: Do not classify the object as TextEmbedding.
      ja: この対象を TextEmbedding に分類しません。
    why_valid_or_invalid:
      zh: 图拓扑来源不能满足文本输入种差。
      en: Graph-topology provenance does not satisfy the text-input differentia.
      ja: graph topology来歴はtext入力の種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-embedding-006
