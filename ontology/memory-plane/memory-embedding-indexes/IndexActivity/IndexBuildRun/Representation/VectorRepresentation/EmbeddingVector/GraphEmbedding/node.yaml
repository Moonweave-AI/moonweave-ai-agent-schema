    ja: の一種である
  definitions:
    zh: GraphEmbedding 是 EmbeddingVector 的严格子类；种差为：输入由声明图快照的节点、关系或拓扑构成，并记录图编码算法。
    en: "GraphEmbedding is a strict subtype of EmbeddingVector; its reviewed differentia is: its input consists of nodes, relationships, or topology from a declared graph snapshot and records the graph encoder."
