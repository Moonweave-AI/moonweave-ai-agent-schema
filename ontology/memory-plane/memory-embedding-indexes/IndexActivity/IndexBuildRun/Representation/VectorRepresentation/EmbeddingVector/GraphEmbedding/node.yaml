schema: moonweave.ai/ontology-node/v1
id: GraphEmbedding
kind: concept
labels:
  zh: 图嵌入
  en: Graph embedding
  ja: グラフ埋め込み
semantics:
  short_definition:
    zh: 从图结构生成的 EmbeddingVector 子类。
    en: EmbeddingVector subtype generated from graph structure.
    ja: グラフ構造から生成する EmbeddingVector subtype。
  definition:
    zh: GraphEmbedding 是 EmbeddingVector 子类，输入为节点/边结构或子图快照（非纯文本 chunk）。Node2Vec、TransE 或 GNN 输出 float[] 映射 GraphEmbedding；TextEmbedding 输入为文本正文。必须绑定 generating_run_id 与 graph_snapshot digest。
    en: GraphEmbedding is an EmbeddingVector subtype whose input is node/edge structure or subgraph snapshot (not plain text chunk). Node2Vec, TransE, or GNN float[] output maps to GraphEmbedding; TextEmbedding input is text body. Must bind generating_run_id and graph_snapshot digest.
    ja: GraphEmbedding は node/edge 構造/subgraph snapshot 入力（plain text chunk 非）の EmbeddingVector subtype。Node2Vec/TransE/GNN float[]→GraphEmbedding。generating_run_id+graph_snapshot digest binding 必須。
  why_needed:
    zh: 知识图谱检索与文本 RAG 的输入血缘不同，混用 TextEmbedding 会导致“向量来自哪张子图”不可回答。
    en: Knowledge-graph retrieval differs from text RAG input lineage; misusing TextEmbedding makes “which subgraph produced this vector” unanswerable.
    ja: KG 检索と text RAG の input 来歴が異なり、TextEmbedding 混用は subgraph 由来不可。
  includes:
    - zh: 纳入 Node2Vec、TransE、GraphSAGE 等图 embedding 产出。
      en: Includes Node2Vec, TransE, GraphSAGE, and other graph embedding outputs.
      ja: Node2Vec/TransE/GraphSAGE 等 graph embedding 产出。
  excludes:
    - zh: 排除 TextEmbedding、SparseVector 与纯 chunk 文本 API embed。
      en: Excludes TextEmbedding, SparseVector, and plain chunk text API embed.
      ja: TextEmbedding/SparseVector/plain chunk text API embed を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 图 embedding pipeline 消费 graph_snapshot_id（节点表+边表 digest），产出 node_emb-* float[]；写入 VectorIndex 时 metadata 含 node_id 而非 chunk_id；与 OpenAI text-embedding-3-small 不混用 model_snapshot。
    en: Graph embedding pipeline consumes graph_snapshot_id (node+edge table digest), outputs node_emb-* float[]; VectorIndex metadata uses node_id not chunk_id; do not mix model_snapshot with OpenAI text-embedding-3-small.
    ja: graph_snapshot_id 消費→node_emb-* float[]。metadata=node_id。OpenAI text snapshot 混用不可。
  typical_input:
    - description: Graph snapshot for embedding
      format: |
        {
          "graph_snapshot_id": "graph-policy-v3",
          "nodes": [{"id": "svc-auth", "label": "AuthService"}],
          "edges": [{"source": "svc-auth", "target": "db-users", "type": "calls"}]
        }
      source_claims: [claim-graph-embedding-design]
  typical_output:
    - description: Graph embedding record
      format: |
        {
          "embedding_id": "node-emb-auth",
          "embedding_kind": "graph",
          "graph_snapshot_id": "graph-policy-v3",
          "vector_dimensions": 128
        }
      source_claims: [claim-graph-embedding-design]
  reference_implementations:
    - name: Node2Vec
      url: https://arxiv.org/abs/1607.00653
      description: Random walk graph embeddings.
    - name: OpenAI Embeddings (contrast)
      url: https://platform.openai.com/docs/guides/embeddings
      description: Text embeddings—not graph structure input.
structure:
  identity_keys: [embedding_id]
  fields:
    - id: embedding_id
      labels: {zh: 嵌入标识, en: Embedding identifier, ja: 埋め込み識別子}
      definitions:
        zh: 继承 EmbeddingVector.embedding_id；常对应 node_id 或 subgraph_id。
        en: Inherits EmbeddingVector.embedding_id; often corresponds to node_id or subgraph_id.
        ja: EmbeddingVector.embedding_id 継承。node_id/subgraph_id 対応 often。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: node-emb-auth
      allowed_values: []
      source_claims: [claim-graph-embedding-design]
    - id: graph_snapshot_id
      labels: {zh: 图快照标识, en: Graph snapshot identifier, ja: graph snapshot ID}
      definitions:
        zh: 被嵌入图结构不可变快照 ID；input digest 锁定节点/边集合。
        en: Immutable snapshot ID of embedded graph structure; input digest pins node/edge set.
        ja: embed 対象 graph 構造不変 snapshot ID。node/edge 集合 digest 固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: graph-policy-v3
      allowed_values: []
      source_claims: [claim-graph-embedding-design]
    - id: embedding_model_snapshot
      labels: {zh: 图嵌入模型快照, en: Graph embedding model snapshot, ja: graph embedding model snapshot}
      definitions:
        zh: Node2Vec/TransE/GNN 等图 embedding 模型与版本，非 text-embedding-3-small。
        en: Graph embedding model and version such as Node2Vec/TransE/GNN—not text-embedding-3-small.
        ja: Node2Vec/TransE/GNN 等 graph embedding model 版。text-embedding-3-small 非。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: node2vec-d128-w10@2026-05
      allowed_values: []
      source_claims: [claim-graph-embedding-design]
  constraints: []
  required_relations: []
examples:
  - id: GraphEmbedding-example-node2vec
    labels:
      zh: Node2Vec 节点嵌入
      en: Node2Vec node embedding
      ja: Node2Vec node embedding
    descriptions:
      zh: embedding-run-graph-5 消费 graph-policy-v3，Node2Vec 产出 node-emb-auth float[128] GraphEmbedding；metadata node_id=svc-auth。
      en: embedding-run-graph-5 consumes graph-policy-v3; Node2Vec produces node-emb-auth float[128] GraphEmbedding; metadata node_id=svc-auth.
      ja: embedding-run-graph-5+graph-policy-v3→Node2Vec→node-emb-auth float[128]。node_id=svc-auth。
    example_source:
      product: Node2Vec
      url: https://arxiv.org/abs/1607.00653
      version: d128 walk length 10
    field_values:
      embedding_id: node-emb-auth
      graph_snapshot_id: graph-policy-v3
      embedding_model_snapshot: node2vec-d128-w10@2026-05
    related_node_ids:
      - GraphEmbedding
      - DenseVector
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-graph-embedding-design
  - id: GraphEmbedding-example-subgraph
    labels:
      zh: 子图嵌入
      en: Subgraph embedding
      ja: subgraph embedding
    descriptions:
      zh: GNN 对 auth 子图（5 节点 8 边）产出 subgraph-emb-auth GraphEmbedding；graph_snapshot_id 锁定子图 membership。
      en: GNN embeds auth subgraph (5 nodes 8 edges) producing subgraph-emb-auth GraphEmbedding; graph_snapshot_id pins subgraph membership.
      ja: GNN auth subgraph（5 nodes 8 edges）→subgraph-emb-auth。graph_snapshot_id=subgraph membership。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: subgraph embed
    field_values:
      embedding_id: subgraph-emb-auth
      graph_snapshot_id: graph-auth-sub-v1
    related_node_ids:
      - GraphEmbedding
      - EmbeddingRun
    related_relation_ids: []
    source_claims:
      - claim-graph-embedding-design
  - id: GraphEmbedding-example-not-text
    labels:
      zh: 图嵌入非文本嵌入
      en: Graph embedding is not text embedding
      ja: graph embedding は text embedding ではない
    descriptions:
      zh: chunk-17@3 经 OpenAI text-embedding-3-small 是 TextEmbedding；图结构经 Node2Vec 是 GraphEmbedding，input digest 语义不同。
      en: chunk-17@3 via OpenAI text-embedding-3-small is TextEmbedding; graph structure via Node2Vec is GraphEmbedding with different input digest semantics.
      ja: chunk-17@3+OpenAI=TextEmbedding。graph+Node2Vec=GraphEmbedding。input digest 意味異なる。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/embeddings
      version: contrast with graph
    field_values: {}
    related_node_ids:
      - GraphEmbedding
      - TextEmbedding
    related_relation_ids: []
    source_claims:
      - claim-graph-embedding-design
parent_relation:
  id: GraphEmbedding-is_a-EmbeddingVector
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种嵌入向量
    en: is an embedding vector
    ja: 埋め込み vector の一種
  definitions:
    zh: GraphEmbedding —is_a→ EmbeddingVector 因为输入为图结构且产出 dense vector 并绑定运行血缘。
    en: GraphEmbedding —is_a→ EmbeddingVector because input is graph structure, output is dense vector, and run lineage is bound.
    ja: GraphEmbedding —is_a→ EmbeddingVector は graph 入力+dense vector+run 来歴 binding のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: GraphEmbedding-is_a-EmbeddingVector-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when input digest covers graph structure not plain text chunk.
      explanations:
        zh: 仅当图结构输入时成立。
        en: Assert only for graph structure input.
        ja: graph 構造入力時のみ assert。
      source_claims: [claim-graph-embedding-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-graph-embedding-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-node2vec
    title: Node2Vec paper
    publisher: arXiv
    url: https://arxiv.org/abs/1607.00653
    source_type: academic-paper
    relevance: Graph structure to dense vector embeddings.
  - id: src-openai-embeddings-contrast
    title: OpenAI Embeddings Guide
    publisher: OpenAI
    url: https://platform.openai.com/docs/guides/embeddings
    source_type: official-doc
    relevance: Text embedding contrast boundary.
  - id: src-graph-embedding-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: GraphEmbedding versus TextEmbedding boundary.
source_claims:
  - id: claim-graph-embedding-design
    source: src-graph-embedding-design
    supports: GraphEmbedding binds graph_snapshot_id and graph embedding model snapshot distinct from text chunk embeddings.
    locator: GraphEmbedding boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-embedding-design
    source: src-graph-embedding-design
    supports: embedding_id identifies graph embedding instance often tied to node or subgraph.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-graph-embedding-design
    source: src-graph-embedding-design
    supports: graph_snapshot_id pins embedded node and edge set.
    locator: structure
    evidence_kind: design-inference
    confidence: high
