    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: GraphEmbedding-is_a-EmbeddingVector-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies EmbeddingVector and also satisfies the differentia: its input consists of nodes, relationships, or topology from a declared graph snapshot and records the graph encoder."
