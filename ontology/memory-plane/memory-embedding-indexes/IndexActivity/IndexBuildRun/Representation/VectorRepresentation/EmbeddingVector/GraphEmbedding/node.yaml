        zh: graph-emb-17 由 graph-policy@7 节点拓扑经 FastRP-v2 生成，并记录图快照摘要。
        en: graph-emb-17 is generated from graph-policy@7 node topology by FastRP-v2 and records the graph-snapshot digest.
