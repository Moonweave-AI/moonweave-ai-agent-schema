schema: moonweave.ai/ontology-node/v1
id: GraphEmbedding
kind: concept
status: review
labels:
  zh: 图嵌入
  en: Graph embedding
  ja: グラフ埋込
semantics:
  short_definition:
    zh: 由图节点、关系或拓扑生成的 EmbeddingVector。
    en: An EmbeddingVector generated from graph nodes, relationships, or topology.
    ja: graph node・relationship・topologyから生成した EmbeddingVector です。
  definition:
    zh: GraphEmbedding 是由声明的图快照与图嵌入算法生成、用于表达节点或图结构相似性的 EmbeddingVector；它记录图范围与算法配置，不是图节点本身或文本嵌入。
    en: GraphEmbedding is an EmbeddingVector generated from a declared graph snapshot by a graph-embedding algorithm to represent node or structural similarity; it records graph scope and algorithm configuration and is not the graph node itself or a text embedding.
    ja: GraphEmbedding は宣言graph snapshotにgraph-embedding algorithmを適用してnodeまたは構造類似性を表す EmbeddingVector で、graph範囲とalgorithm設定を記録し、graph node自体やtext embeddingではありません。
  why_needed:
    zh: 把图拓扑来源作为 EmbeddingVector 的进一步种差。
    en: Treats graph-topology provenance as a further differentia of EmbeddingVector.
    ja: graph topology来歴を EmbeddingVector の追加種差として扱います。
  includes:
    - zh: 纳入 FastRP、GraphSAGE、Node2Vec 等对图节点生成的向量。
      en: Includes node vectors produced by FastRP, GraphSAGE, Node2Vec, and similar algorithms.
      ja: FastRP・GraphSAGE・Node2Vec等がgraph nodeに生成するvectorを含みます。
  excludes:
    - zh: 排除 GraphNode 本身、原邻接表和 TextEmbedding。
      en: Excludes GraphNode itself, raw adjacency data, and TextEmbedding.
      ja: GraphNode自体・原adjacency data・TextEmbeddingを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - embedding_id
  fields:
    - id: embedding_id
      labels:
        zh: 嵌入标识
        en: embedding ID
        ja: embedding ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识图嵌入产物。
        en: Stable identifier for the graph embedding artifact.
        ja: graph embedding成果物の安定識別子です。
      allowed_values: []
      pattern: null
      example_value: graph-emb-17
      source_claims:
        - claim-graph-embedding-002
    - id: graph_scope_digest
      labels:
        zh: 图范围摘要
        en: graph-scope digest
        ja: graph範囲digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定生成嵌入时使用的图快照。
        en: Fixes the graph snapshot used for generation.
        ja: 生成に使用したgraph snapshotを固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:graph17
      source_claims:
        - claim-graph-embedding-003
    - id: graph_encoder
      labels:
        zh: 图编码器
        en: graph encoder
        ja: graph encoder
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识算法、参数和版本。
        en: Identifies algorithm, parameters, and version.
        ja: algorithm・parameter・版を識別します。
      allowed_values: []
      pattern: null
      example_value: fastrp@2026.06
      source_claims:
        - claim-graph-embedding-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphEmbedding-example-positive-manual-001
    kind: positive
    labels:
      zh: 图嵌入正例
      en: "Positive case: Graph embedding"
      ja: グラフ埋込正例
    scenario_id: null
    descriptions:
      zh: graph-emb-17 由 graph17 快照经 FastRP 配置生成。
      en: graph-emb-17 is generated from graph17 by a recorded FastRP configuration.
      ja: graph-emb-17 は graph17 snapshotから記録FastRP設定で生成されます。
    field_values:
      embedding_id: graph-emb-17
      graph_scope_digest: sha256:graph17
      graph_encoder: fastrp@2026.06
      model_snapshot: fastrp@2026.06
      input_digest: sha256:graph17
      vector_id: graph-emb-17
      dimensions: 256
      encoding: dense-float32
      representation_id: repr-graph-emb-17
      source_digest: sha256:graph17
      method_profile: fastrp@2026.06
    related_node_ids:
      - GraphEmbedding
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 GraphEmbedding。
      en: Classify the object as GraphEmbedding.
      ja: この対象を GraphEmbedding に分類します。
    why_valid_or_invalid:
      zh: 图快照、算法和向量身份均可追溯。
      en: Graph snapshot, algorithm, and vector identity are traceable.
      ja: graph snapshot・algorithm・vector同一性を追跡できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-embedding-005
  - id: GraphEmbedding-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 图嵌入边界例
      en: "Boundary case: Graph embedding"
      ja: グラフ埋込境界例
    scenario_id: null
    descriptions:
      zh: node-17 是图中的业务节点，仅保存名称和关系。
      en: node-17 is a business node in the graph and stores only properties and relationships.
      ja: node-17 はgraph内のbusiness nodeでpropertyとrelationshipだけを保存します。
    field_values: {}
    related_node_ids:
      - GraphEmbedding
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 GraphEmbedding。
      en: Do not classify the object as GraphEmbedding.
      ja: この対象を GraphEmbedding に分類しません。
    why_valid_or_invalid:
      zh: 被编码对象不是编码后生成的向量产物。
      en: The encoded object is not the vector artifact produced from it.
      ja: 符号化対象はそこから生成したvector成果物ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-embedding-006
external_mappings: []
