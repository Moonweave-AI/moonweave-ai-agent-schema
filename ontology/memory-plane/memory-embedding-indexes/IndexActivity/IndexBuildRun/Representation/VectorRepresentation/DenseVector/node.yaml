schema: moonweave.ai/ontology-node/v1
id: DenseVector
kind: concept
status: review
labels:
  zh: 稠密向量
  en: Dense vector
  ja: 密ベクトル
semantics:
  short_definition:
    zh: 每一维都按固定位置出现的数值向量。
    en: A numeric vector with every dimension represented by a fixed position.
    ja: 各次元を固定位置で表す数値vectorです。
  definition:
    zh: DenseVector 是固定长度有序数值列表形式的 VectorRepresentation，零值仍占位置且维数须与索引一致；它不是稀疏 indices/values 对。
    en: DenseVector is a VectorRepresentation represented by a fixed-length ordered numeric list where zero values still occupy positions and dimensionality must match the index; it is not a sparse indices/values pair.
    ja: DenseVector はzeroも位置を占め次元がindexと一致する固定長順序付き数値listの VectorRepresentation で、sparse indices/values対ではありません。
  why_needed:
    zh: 校验固定维数坐标与 dense 索引兼容性。
    en: Validates fixed-dimensional coordinates against dense-index configuration.
    ja: 固定次元座標とdense index設定の互換性を検証します。
  includes:
    - zh: 纳入固定长度 float 数组与归一化状态。
      en: Includes fixed-length float arrays and normalization state.
      ja: 固定長float配列と正規化状態を含みます。
  excludes:
    - zh: 排除稀疏坐标、标量分数和原文本。
      en: Excludes sparse coordinates, scalar scores, and source text.
      ja: sparse座標・scalar score・原文を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - vector_id
  fields:
    - id: vector_id
      labels:
        zh: 向量标识
        en: vector ID
        ja: vector ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识稠密向量。
        en: Stable identifier for the dense vector.
        ja: dense vectorの安定識別子です。
      allowed_values: []
      pattern: null
      example_value: dense-17
      source_claims:
        - claim-dense-vector-002
    - id: dimensions
      labels:
        zh: 固定维数
        en: fixed dimensions
        ja: 固定次元
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有序数组的必需长度。
        en: Required length of the ordered array.
        ja: 順序配列の必須長です。
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims:
        - claim-dense-vector-003
    - id: normalized
      labels:
        zh: 是否归一化
        en: normalized
        ja: 正規化済み
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明是否按配置归一化。
        en: States whether coordinates were normalized under the profile.
        ja: profileに従い座標を正規化済みか示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-dense-vector-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DenseVector-example-positive-manual-001
    kind: positive
    labels:
      zh: 稠密向量正例
      en: "Positive case: Dense vector"
      ja: 密ベクトル正例
    scenario_id: null
    descriptions:
      zh: dense-17 含 1536 个 float32 值并与目标索引维数一致。
      en: dense-17 contains 1536 float32 values and matches the target index dimension.
      ja: dense-17 は1536個float32値を持ち対象index次元と一致します。
    field_values:
      vector_id: dense-17
      dimensions: 1536
      normalized: true
      encoding: dense-float32
      representation_id: repr-dense-17
      source_digest: sha256:source-dense-17
      method_profile: dense-float32/1536:v1
    related_node_ids:
      - DenseVector
    related_relation_ids: []
    expected_result:
      zh: 把该对象归入 DenseVector。
      en: Classify the object as DenseVector.
      ja: この対象を DenseVector に分類します。
    why_valid_or_invalid:
      zh: 它具有完整固定位置和明确索引兼容性。
      en: It has complete fixed positions and explicit index compatibility.
      ja: 完全な固定位置と明示的index互換性があります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-dense-vector-005
  - id: DenseVector-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 稠密向量边界例
      en: "Boundary case: Dense vector"
      ja: 密ベクトル境界例
    scenario_id: null
    descriptions:
      zh: sparse-17 只保存 42 个非零 indices/values 对。
      en: sparse-17 stores only 42 non-zero indices/values pairs.
      ja: sparse-17 は42個の非zero indices/values対だけを保存します。
    field_values: {}
    related_node_ids:
      - DenseVector
    related_relation_ids: []
    expected_result:
      zh: 不得把该对象归入 DenseVector。
      en: Do not classify the object as DenseVector.
      ja: この対象を DenseVector に分類しません。
    why_valid_or_invalid:
      zh: 隐含零值不构成完整固定长度列表。
      en: Implicit zeros do not form a complete fixed-length list.
      ja: 暗黙zeroは完全な固定長listを構成しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-dense-vector-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DenseVector-is_a-VectorRepresentation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: DenseVector 是 VectorRepresentation 的严格子类；种差为：每个维度占据固定有序位置且总长度与索引维数一致。
    en: "DenseVector is a strict subtype of VectorRepresentation; its reviewed differentia is: every dimension occupies a fixed ordered position and total length matches index dimensionality."
    ja: DenseVector は VectorRepresentation の厳密なsubtypeで、審査済み種差は「各次元が固定順序位置を占め全長がindex次元と一致します。」です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系以逐事实约束表达，不在 schema 层强加统一实例基数。
    en: This relation is constrained per fact; no uniform instance cardinality is imposed at schema level.
    ja: このrelationはfact単位で制約しschema層で一律instance cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse reading
      ja: 逆方向読取
  conditions:
    - id: DenseVector-is_a-VectorRepresentation-condition-manual-001
      severity: error
      expression_language: plain
      expression: "Assert only when the object first satisfies VectorRepresentation and also satisfies the differentia: every dimension occupies a fixed ordered position and total length matches index dimensionality."
      explanations:
        zh: 仅当对象首先满足 VectorRepresentation 定义且满足种差“每个维度占据固定有序位置且总长度与索引维数一致。”时成立。
        en: "Assert only when the object first satisfies VectorRepresentation and also satisfies the differentia: every dimension occupies a fixed ordered position and total length matches index dimensionality."
        ja: 対象がまず VectorRepresentation を満たし、さらに種差「各次元が固定順序位置を占め全長がindex次元と一致します。」を満たす時だけ成立します。
      source_claims:
        - claim-dense-vector-007
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DenseVector-is_a-VectorRepresentation-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種である正例
      scenario_id: null
      descriptions:
        zh: dense-17 的 1536 个 float32 值逐位有序，长度与 vector-index-17 的维数完全一致。
        en: dense-17 has 1,536 positionally ordered float32 values, exactly matching vector-index-17's dimensionality.
        ja: dense-17 は位置順の 1,536 個の float32 値を持ち、vector-index-17 の次元数と完全に一致します。
      field_values: {}
      related_node_ids:
        - DenseVector
        - VectorRepresentation
      related_relation_ids:
        - DenseVector-is_a-VectorRepresentation
      expected_result:
        zh: 确认 dense-17 是 DenseVector，并沿该层级继承 VectorRepresentation 身份。
        en: Confirm dense-17 as a DenseVector and inherit VectorRepresentation identity along this hierarchy edge.
        ja: dense-17 を DenseVector と確認し、この階層辺に沿って VectorRepresentation 同一性を継承します。
      why_valid_or_invalid:
        zh: 固定长度与每维显式占位同时成立，因而不是稀疏坐标对。
        en: Both fixed length and an explicit position for every dimension hold, distinguishing it from sparse coordinate pairs.
        ja: 固定長と全次元の明示位置がともに成立するため、sparse座標対とは区別されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-dense-vector-007
    - id: DenseVector-is_a-VectorRepresentation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種である境界例
      scenario_id: null
      descriptions:
        zh: 只保存非零 indices/values 的 sparse-17 不能归为 DenseVector。
        en: sparse-17, which stores only non-zero indices/values, is not a DenseVector.
        ja: 非zero indices/valuesだけを保存する sparse-17 は DenseVectorではありません。
      field_values: {}
      related_node_ids:
        - DenseVector
        - VectorRepresentation
      related_relation_ids:
        - DenseVector-is_a-VectorRepresentation
      expected_result:
        zh: 将 sparse-17 保持为 SparseVector，不建立 DenseVector 子类成员事实。
        en: Keep sparse-17 as a SparseVector and do not assert DenseVector subtype membership.
        ja: sparse-17 を SparseVector のまま保持し、DenseVector subtype membership を主張しません。
      why_valid_or_invalid:
        zh: sparse-17 只枚举非零坐标，没有为每个维度保留固定有序位置，因此不满足稠密向量种差。
        en: sparse-17 enumerates only non-zero coordinates and reserves no fixed ordered slot for every dimension, so it fails the dense-vector differentia.
        ja: sparse-17 は非 zero 座標だけを列挙し全次元の固定順序 slot を持たないため、dense-vector 種差を満たしません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-dense-vector-007
  source_claims:
    - claim-dense-vector-007
  distinct_fact_rationale: null
