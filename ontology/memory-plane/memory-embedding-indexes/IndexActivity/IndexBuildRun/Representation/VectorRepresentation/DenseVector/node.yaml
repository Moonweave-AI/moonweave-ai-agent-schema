schema: moonweave.ai/ontology-node/v1
id: DenseVector
kind: concept
labels:
  zh: 稠密向量
  en: Dense vector
  ja: dense vector
semantics:
  short_definition:
    zh: float[] 形式的 dense VectorRepresentation。
    en: Dense VectorRepresentation as a float array.
    ja: float[] 形式の dense VectorRepresentation。
  definition:
    zh: DenseVector 是 VectorRepresentation 子类，以 float[] 存储 embedding 模型输出。OpenAI data[].embedding（text-embedding-3-small, 1536 维）与 Voyage voyage-3-large 输出映射 DenseVector；Pinecone upsert values 字段写入此格式。
    en: DenseVector is a VectorRepresentation subtype storing embedding model output as float[]. OpenAI data[].embedding (text-embedding-3-small, 1536 dims) and Voyage voyage-3-large output map to DenseVector; Pinecone upsert values field writes this format.
    ja: DenseVector は embedding model 出力 float[] の VectorRepresentation subtype。OpenAI data[].embedding/Voyage voyage-3-large→DenseVector。Pinecone upsert values。
  why_needed:
    zh: cosine metric 与 HNSW ANN 要求固定长度 float[]；与 SparseVector {indices,values} 混型会导致 upsert 拒绝或检索 metric 错误。
    en: Cosine metric and HNSW ANN require fixed-length float[]; mixing with SparseVector {indices,values} causes upsert rejection or wrong retrieval metric.
    ja: cosine/HNSW は固定長 float[] 必須。SparseVector 混在は upsert 拒否/metric 誤り。
  includes:
    - zh: 纳入 OpenAI/Voyage/Cohere 等 embedding API 返回的 float 数组。
      en: Includes float arrays returned by OpenAI/Voyage/Cohere embedding APIs.
      ja: OpenAI/Voyage/Cohere embedding API 返却 float 配列。
  excludes:
    - zh: 排除 SparseVector、未绑定 EmbeddingRun 的匿名 float 数组缓存。
      en: Excludes SparseVector and anonymous float array caches without EmbeddingRun binding.
      ja: SparseVector/EmbeddingRun 未 binding 匿名 float cache を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI encoding_format=float 返回 data[].embedding float[]；Moonweave 登记 vector_dimensions 与 content_digest；VectorIndex upsert 时 values 字段必须长度匹配。
    en: OpenAI encoding_format=float returns data[].embedding float[]; Moonweave records vector_dimensions and content_digest; VectorIndex upsert values length must match.
    ja: OpenAI encoding_format=float→data[].embedding。vector_dimensions/content_digest 登録。upsert values 長一致。
  typical_input:
    - description: OpenAI embedding response vector
      format: |
        {
          "data": [{"embedding": [0.012, -0.034, ...], "index": 0}],
          "model": "text-embedding-3-small",
          "usage": {"prompt_tokens": 8, "total_tokens": 8}
        }
      source_claims: [claim-dense-vector-openai]
  typical_output:
    - description: Dense vector record
      format: |
        {
          "representation_id": "emb-17",
          "vector_dimensions": 1536,
          "values_digest_sha256": "a1b2c3..."
        }
      source_claims: [claim-dense-vector-design]
  reference_implementations:
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: float embedding arrays with dimensions parameter.
    - name: Voyage AI Embeddings
      url: https://docs.voyageai.com/reference/embeddings-api
      description: voyage-3-large dense embeddings.
    - name: Pinecone Upsert
      url: https://docs.pinecone.io/guides/data/upsert-data
      description: values field for dense vectors.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: Representation identifier, ja: representation 識別子}
      definitions:
        zh: 继承 VectorRepresentation.representation_id；常等于 embedding_id。
        en: Inherits VectorRepresentation.representation_id; often equals embedding_id.
        ja: VectorRepresentation.representation_id 継承。embedding_id と同値 often。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: emb-17
      allowed_values: []
      source_claims: [claim-dense-vector-id]
    - id: vector_dimensions
      labels: {zh: 向量维度, en: Vector dimensions, ja: ベクトル次元}
      definitions:
        zh: float[] 长度；必须与 Pinecone create_index dimension 一致。
        en: Length of float[]; must match Pinecone create_index dimension.
        ja: float[] 長。Pinecone create_index dimension 一致必須。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1536
      allowed_values: []
      source_claims: [claim-dense-vector-openai]
    - id: values_digest_sha256
      labels: {zh: 数值摘要, en: Values digest, ja: values digest}
      definitions:
        zh: float[] 序列化后的 SHA-256；用于 IndexEntry representation_digest。
        en: SHA-256 of serialized float[]; used for IndexEntry representation_digest.
        ja: シリアライズ float[] SHA-256。IndexEntry representation_digest 用。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456
      allowed_values: []
      source_claims: [claim-dense-vector-design]
  constraints:
    - id: dense-dimension-fixed
      severity: error
      expression_language: plain
      expression: float array length must equal vector_dimensions.
      explanation:
        zh: 长度不一致无法写入 VectorIndex。
        en: Length mismatch prevents VectorIndex write.
        ja: 長不一致は VectorIndex write 不可。
      source_claims: [claim-dense-vector-design]
  required_relations: []
examples:
  - id: DenseVector-example-openai-1536
    labels:
      zh: OpenAI 1536 维 dense 向量
      en: OpenAI 1536-dim dense vector
      ja: OpenAI 1536 次元 dense vector
    descriptions:
      zh: embedding-run-17 返回 emb-17 float[1536]（text-embedding-3-small）；upsert 到 Pinecone hybrid-docs values 字段。
      en: embedding-run-17 returns emb-17 float[1536] (text-embedding-3-small); upserts to Pinecone hybrid-docs values field.
      ja: embedding-run-17→emb-17 float[1536]（text-embedding-3-small）→Pinecone values。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: text-embedding-3-small dimensions=1536
    field_values:
      representation_id: emb-17
      vector_dimensions: 1536
    related_node_ids:
      - DenseVector
      - TextEmbedding
      - VectorIndex
    related_relation_ids: []
    source_claims:
      - claim-dense-vector-openai
      - claim-dense-vector-design
  - id: DenseVector-example-voyage-large
    labels:
      zh: Voyage voyage-3-large 输出
      en: Voyage voyage-3-large output
      ja: Voyage voyage-3-large 出力
    descriptions:
      zh: embedding-run-22 使用 voyage-3-large 产出 emb-22 float[]；model_snapshot 与 OpenAI 向量区分存储。
      en: embedding-run-22 uses voyage-3-large producing emb-22 float[]; model_snapshot stored separately from OpenAI vectors.
      ja: embedding-run-22 voyage-3-large→emb-22 float[]。OpenAI と model_snapshot 区別。
    example_source:
      product: Voyage AI
      url: https://docs.voyageai.com/reference/embeddings-api
      version: voyage-3-large
    field_values:
      representation_id: emb-22
      model_snapshot: voyage-3-large@2026-03
    related_node_ids:
      - DenseVector
      - TextEmbedding
    related_relation_ids: []
    source_claims:
      - claim-dense-vector-voyage
      - claim-dense-vector-design
  - id: DenseVector-example-not-sparse
    labels:
      zh: dense 非 sparse
      en: Dense is not sparse
      ja: dense は sparse ではない
    descriptions:
      zh: repr-sparse-17 使用 {indices,values} 是 SparseVector；float[] 全长数组才是 DenseVector。
      en: repr-sparse-17 using {indices,values} is SparseVector; full-length float[] is DenseVector.
      ja: "indices+values は SparseVector。全長 float[] が DenseVector。"
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DenseVector
      - SparseVector
    related_relation_ids: []
    source_claims:
      - claim-dense-vector-design
parent_relation:
  id: DenseVector-is_a-VectorRepresentation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种向量表示
    en: is a vector representation
    ja: ベクトル表現の一種
  definitions:
    zh: DenseVector —is_a→ VectorRepresentation 因为 vector_kind=dense 且存储 float[]。
    en: DenseVector —is_a→ VectorRepresentation because vector_kind=dense and stores float[].
    ja: DenseVector —is_a→ VectorRepresentation は vector_kind=dense+float[] のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: DenseVector-is_a-VectorRepresentation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when storage is fixed-length float array.
      explanations:
        zh: 仅当 float[] 存储时成立。
        en: Assert only for float array storage.
        ja: float[] 存储時のみ assert。
      source_claims: [claim-dense-vector-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-dense-vector-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-embeddings
    title: OpenAI Embeddings API
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/embeddings
    source_type: official-doc
    relevance: float embedding arrays and dimensions.
  - id: src-voyage-embeddings
    title: Voyage AI Embeddings API
    publisher: Voyage AI
    url: https://docs.voyageai.com/reference/embeddings-api
    source_type: official-doc
    relevance: voyage-3-large dense output.
  - id: src-dense-vector-design
    title: Moonweave memory-embedding-indexes module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: DenseVector float array versus SparseVector boundary.
source_claims:
  - id: claim-dense-vector-openai
    source: src-openai-embeddings
    supports: OpenAI returns embedding as float array with configurable dimensions (e.g., 1536 for text-embedding-3-small).
    locator: Response data.embedding
    evidence_kind: primary-api
    confidence: high
  - id: claim-dense-vector-voyage
    source: src-voyage-embeddings
    supports: Voyage voyage-3-large returns dense float embedding arrays.
    locator: Embeddings API response
    evidence_kind: primary-api
    confidence: high
  - id: claim-dense-vector-design
    source: src-dense-vector-design
    supports: DenseVector stores fixed-length float[] distinct from sparse indices/values format.
    locator: DenseVector boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-dense-vector-id
    source: src-dense-vector-design
    supports: representation_id identifies dense vector instance.
    locator: structure
    evidence_kind: design-inference
    confidence: high
