schema: moonweave.ai/ontology-node/v1
id: Index
kind: concept
status: accepted
labels: {zh: 索引, en: Index, ja: インデックス}
semantics:
  short_definition:
    zh: 以声明的表示模式和兼容性规则组织可检索条目的持久索引逻辑结构。
    en: A persistent logical index structure that organizes retrievable entries under declared representation modes and compatibility rules.
    ja: 宣言された representation mode と compatibility rule の下で retrievable entry を組織する永続 logical index structure。
  definition:
    zh: >-
      Index 是一个可被 IndexBuildRun 创建或维护的逻辑检索结构，由 index_id、index_kind、schema_ref 和可选 active_version_ref
      标识。它定义可以被组织的表示类型和兼容性规则，并包含一个或多个 IndexVersion。它不是 VectorDatabase 部署设施、
      单个 IndexVersion、IndexShard、IndexEntry、EmbeddingVector、Chunk、检索候选或最终模型上下文。IndexBuildRun 改变其成员，
      RetrievalRequest 只读取已存在成员并产生独立候选。
    en: >-
      An Index is a logical retrieval structure created or maintained by an IndexBuildRun and identified by index_id,
      index_kind, schema_ref, and optional active_version_ref. It defines eligible representation types and compatibility
      rules and contains one or more IndexVersions. It is not a deployed VectorDatabase facility, one IndexVersion,
      IndexShard, IndexEntry, EmbeddingVector, Chunk, retrieval candidate, or final model context. IndexBuildRun changes
      its membership; RetrievalRequest only reads existing membership and produces separate candidates.
    ja: >-
      Index は IndexBuildRun が作成又は maintain する logical retrieval structure で、index_id、index_kind、schema_ref、任意の
      active_version_ref により識別されます。eligible representation type と compatibility rule を定義し、一つ以上の
      IndexVersion を含みます。配備された VectorDatabase facility、一つの IndexVersion、IndexShard、IndexEntry、EmbeddingVector、
      Chunk、retrieval candidate、最終 model context ではありません。IndexBuildRun が membership を変更し、RetrievalRequest は
      既存 membership を read して別の candidate を生成するだけです。
  why_needed:
    zh: 索引身份和版本边界让系统可以重建或迁移检索结构，而不会把向量、数据库服务或查询结果混为同一对象。
    en: Index identity and version boundaries allow a retrieval structure to be rebuilt or migrated without conflating vectors, database services, or query results.
    ja: Index identity と version boundary により vector、database service、query result を混同せず retrieval structure を rebuild 又は migrate できる。
  includes:
    - zh: 为项目政策声明 dense 余弦表示模式、schema 和 v4 活动版本的 project-index-p-88。
      en: project-index-p-88 declaring dense cosine representation mode, schema, and active version v4 for project policies.
      ja: project policy 用に dense cosine representation mode、schema、active version v4 を宣言する project-index-p-88。
  excludes:
    - zh: 一个向量数据库端点、一个输出向量、一个索引条目、一次检索得分或最终提示词上下文。
      en: One vector-database endpoint, one output vector, one index entry, one retrieval score, or final prompt context.
      ja: 一つの vector-database endpoint、一つの output vector、一つの index entry、一回の retrieval score、最終 prompt context。
  semantic_kind: entity
  aliases: [search index, retrieval index]
engineering:
  explanation:
    zh: >-
      索引配置在构建前声明允许的 ranking field 和表示兼容性；构建运行向具体版本写入兼容表示，查询端仅按此 schema 搜索。
      Pinecone 文档将 dense、sparse、文本和 metadata 字段作为索引配置的一部分，并将查询描述为对既有索引数据的读取。
      Moonweave 因而把 Index 作为结构契约，而不是将任一数据库服务、向量数组或候选列表称为索引。
    en: >-
      Index configuration declares eligible ranking fields and representation compatibility before a build. A build run writes compatible
      representations to a concrete version, while a query side only searches under that schema. Pinecone documents
      dense, sparse, text, and metadata fields as index configuration and describes querying as reading existing index
      data. Moonweave therefore treats Index as a structural contract rather than calling a database service, vector
      array, or candidate list an index.
    ja: >-
      Index configuration は build 前に eligible ranking field と representation compatibility を宣言します。build run は compatible representation を
      concrete version に write し、query side はその schema の下で search するだけです。Pinecone は dense、sparse、text、
      metadata field を index configuration として文書化し、query を既存 index data の read として表します。従って Moonweave は
      Index を structural contract として扱い、database service、vector array、candidate list を index と呼びません。
  typical_input:
    - description: Index definition before data is written
      format: |
        {"index_id":"project-index-p-88","index_kind":"vector","schema_ref":"schema-project-v1","active_version_ref":"project-index-p-88-v4"}
  typical_output:
    - description: Index structure referenced by builds and queries
      format: |
        {"index_id":"project-index-p-88","accepted_representation_mode":"dense","active_version_ref":"project-index-p-88-v4","queryable":true}
  reference_implementations:
    - name: Pinecone indexing overview
      url: https://docs.pinecone.io/guides/index-data/indexing-overview
      description: Documents index ranking fields, indexed data, and schema-controlled retrieval structures.
    - name: Pinecone semantic search
      url: https://docs.pinecone.io/guides/search/semantic-search
      description: Documents vector query over an existing dense-vector index.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: index ID, ja: index ID}
      definitions:
        zh: 稳定标识一个逻辑索引结构，而非其服务、版本或条目。
        en: "Stably identifies one logical index structure rather than its service, version, or entry."
        ja: service、version、entry ではなく一つの logical index structure を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88
      source_claims: [claim-index-structure]
    - id: index_kind
      labels: {zh: 索引类别, en: index kind, ja: index 種別}
      definitions:
        zh: 声明结构使用 vector、tfidf 或 hybrid 表示模式，而不是数据库部署类别。
        en: "Declares vector, tfidf, or hybrid representation mode rather than a database deployment category."
        ja: database deployment category ではなく vector、tfidf、hybrid representation mode を宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [vector, tfidf, hybrid]
      pattern: null
      example_value: vector
      source_claims: [claim-index-structure]
    - id: schema_ref
      labels: {zh: 索引模式引用, en: index schema reference, ja: index schema 参照}
      definitions:
        zh: 引用定义可写字段和兼容规则的模式，而不是存储 namespace 或权限范围。
        en: "References schema defining writable fields and compatibility rules, not a storage namespace or access scope."
        ja: writable field と compatibility rule を定義する schema を参照し、storage namespace 又は access scope ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: schema-project-v1
      source_claims: [claim-index-structure]
    - id: active_version_ref
      labels: {zh: 活动版本引用, en: active version reference, ja: active version 参照}
      definitions:
        zh: 可选引用当前用于写入或查询的 IndexVersion，不删除其他可审计版本。
        en: "Optionally references the IndexVersion currently used for writes or queries without deleting other auditable versions."
        ja: 他の audit 可能な version を削除せず、現在 write 又は query に使う IndexVersion を任意参照する。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88-v4
      source_claims: [claim-index-version-boundary]
  constraints:
    - id: index-schema-and-boundary
      severity: error
      expression_language: plain
      expression: index_id, index_kind, and schema_ref are required. Every written representation must satisfy the declared kind and schema before an IndexEntry is created. A subtype declares any vector metric, lexical weighting, or fusion policy that applies to its own representation mode. An Index is not a VectorDatabase facility, one vector, one entry, a query request, a candidate list, or Context Assembly.
      explanation:
        zh: 索引结构定义可写和可读的组织规则；设施、数据值和读取输出是不同层。
        en: "An index structure defines organization rules for writes and reads; facility, data values, and read outputs are different layers."
        ja: index structure は write/read の organization rule を定義し、facility、data value、read output は異なる layer である。
      source_claims: [claim-index-structure, claim-index-read-boundary, claim-index-build-product, claim-index-design]
  required_relations: []
examples:
  - id: index-positive

    labels: {zh: 项目稠密索引, en: Project dense index, ja: project dense index}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {index_id: project-index-p-88, index_kind: vector, schema_ref: schema-project-v1, active_version_ref: project-index-p-88-v4}
    related_node_ids: [Index, IndexVersion, VectorIndex]
    related_relation_ids: []

    source_claims: [claim-index-structure]
  - id: index-boundary

    labels: {zh: 新活动版本, en: New active version, ja: 新しい active version}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {index_id: project-index-p-88, index_kind: vector, schema_ref: schema-project-v1, active_version_ref: project-index-p-88-v5}
    related_node_ids: [Index, IndexVersion, IndexBuildRun]
    related_relation_ids: []

    source_claims: [claim-index-version-boundary]
  - id: index-counterexample

    labels: {zh: 向量数据库服务不是索引, en: Vector-database service is not index, ja: vector-database service は index ではない}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {vector_database_id: vector-db-prod, connection_profile_ref: vector-db-prod-profile, hosted_indexes: '["project-index-p-88"]'}
    related_node_ids: [Index, VectorDatabase, VectorIndex]
    related_relation_ids: []

    source_claims: [claim-index-read-boundary]
  - id: index-instance

    labels: {zh: 实例：项目混合索引, en: "Instance: project hybrid index", ja: "事例: project hybrid index"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {index_id: project-hybrid-p-88, index_kind: hybrid, schema_ref: schema-project-hybrid-v1, active_version_ref: project-hybrid-p-88-v2}
    related_node_ids: [Index, HybridIndex, IndexVersion]
    related_relation_ids: []

    source_claims: [claim-index-structure]
parent_relation: null
relations: []
sources:
  - id: pinecone-indexing
    title: Pinecone indexing overview
    url: https://docs.pinecone.io/guides/index-data/indexing-overview
    source_type: official-doc
    relevance: Documents indexes with declared ranking fields and indexed data.
  - id: pinecone-search
    title: Pinecone semantic search
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: Documents vector queries over existing index records and returned matches.
source_claims:
  - id: claim-index-structure
    source: pinecone-indexing
    supports: Pinecone documents indexes with declared dense, sparse, text, and metadata fields.
    locator: "Indexing overview: indexes and ranking fields"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-version-boundary
    source: pinecone-indexing
    supports: Pinecone documents explicit index configuration and indexing of records into an index.
    locator: "Indexing overview: index schema and indexed data"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-read-boundary
    source: pinecone-search
    supports: Pinecone documents queries against an existing vector index that return matching records.
    locator: "Semantic search: search with a dense vector"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-build-product
    source: pinecone-indexing
    supports: Pinecone documents indexed data as the result of explicit indexing operations.
    locator: "Indexing overview: indexing data"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-design
    source: pinecone-indexing
    supports: Moonweave models Index as the stable structural contract with a distinct identity, representation mode, schema, and version references; concrete subtypes own their scoring semantics and reads do not mutate it.
    locator: "Moonweave ontology design inference from claim-index-structure, claim-index-version-boundary, claim-index-read-boundary, and claim-index-build-product"
    evidence_kind: ontology-design-inference
    confidence: high
