schema: moonweave.ai/ontology-node/v1
id: IndexVersion
kind: concept
status: accepted
labels: {zh: 索引版本, en: Index Version, ja: インデックスバージョン}
semantics:
  short_definition:
    zh: 固定某一索引结构、兼容规则和成员快照的可审计版本工件。
    en: An auditable version artifact that fixes one index structure, compatibility contract, and membership snapshot.
    ja: 一つの index structure、compatibility contract、membership snapshot を固定する audit 可能な version artifact。
  definition:
    zh: >-
      IndexVersion 是一个 Index 的具名、可追溯版本，由 index_version_id、index_ref、schema_digest、状态和创建构建运行引用标识。
      它可包含一个或多个 IndexShard，并在活动版本切换后保持可审计。它不是整个 Index、VectorDatabase、IndexShard、
      IndexEntry、EmbeddingVector、构建运行或查询结果。版本创建必须由明确且成功的 IndexBuildRun 证明；候选分数
      或同名索引不能创建版本身份。
    en: >-
      An IndexVersion is a named, traceable version of one Index, identified by index_version_id, index_ref, schema_digest,
      status, and creating-build-run reference. It can contain one or more IndexShards and remains auditable after an active
      version switch. It is not the whole Index, VectorDatabase, IndexShard, IndexEntry, EmbeddingVector, build run, or
      query result. Creation needs an explicit successful IndexBuildRun; a candidate score or matching
      index name cannot create version identity.
    ja: >-
      IndexVersion は一つの Index の named で traceable な version で、index_version_id、index_ref、schema_digest、status、
      creating-build-run reference により識別されます。一つ以上の IndexShard を含め、active version switch 後も audit 可能です。
      Index 全体、VectorDatabase、IndexShard、IndexEntry、EmbeddingVector、build run、query result ではありません。作成には
      明示かつ成功した IndexBuildRun が必要で、candidate score や同じ index name から version identity を作れません。
  why_needed:
    zh: 版本边界使索引模式或模型兼容性变更可回滚和比较，而不把新条目悄悄混入旧查询结构。
    en: Version boundaries make index-schema or model-compatibility changes comparable and rollbackable without silently mixing new entries into an old query structure.
    ja: version boundary により index-schema 又は model-compatibility change を比較・rollback でき、新しい entry を古い query structure に黙って混在させない。
  includes:
    - zh: project-index-p-88 的 v4，具有 schema 摘要、已成功构建状态和两个分片引用。
      en: v4 of project-index-p-88 with a schema digest, succeeded-build status, and two shard references.
      ja: schema digest、succeeded-build status、二つの shard reference を持つ project-index-p-88 の v4。
  excludes:
    - zh: 通用 Index 标识、一个分片、一个条目、向量数据库端点、查询候选或一次构建执行。
      en: Generic Index identity, one shard, one entry, vector-database endpoint, query candidate, or one build execution.
      ja: generic Index identity、一つの shard、一つの entry、vector-database endpoint、query candidate、一回の build execution。
  semantic_kind: entity
  aliases: [index snapshot, versioned index contract]
engineering:
  explanation:
    zh: >-
      构建器在写入前固定 schema 摘要和兼容参数，并以版本 ID 将产生的分片和条目归组。新版本可成为活动版本，但旧版本保留
      用于回滚或重现。Pinecone 文档将索引字段及其类型作为结构配置；Moonweave 以版本工件记录该配置在一次构建时的具体快照，
      而不是把服务端点或返回候选称为版本。
    en: >-
      Before writes, a builder fixes schema digest and compatibility parameters and groups produced shards and entries
      under a version ID. A new version may become active while an old version remains for rollback or reproduction.
      Pinecone documents index fields and types as structural configuration; Moonweave records the concrete snapshot of
      that configuration at one build as a version artifact rather than calling a service endpoint or returned candidate a version.
    ja: >-
      builder は write 前に schema digest と compatibility parameter を固定し、生成 shard と entry を version ID の下に group 化します。
      新しい version は active になれ、古い version は rollback 又は reproduction 用に残ります。Pinecone は index field と type を
      structural configuration として文書化します。Moonweave はその configuration の一回の build 時の concrete snapshot を
      version artifact として記録し、service endpoint や返された candidate を version と呼びません。
  typical_input:
    - description: Version created by a completed build
      format: |
        {"index_version_id":"project-index-p-88-v4","index_ref":"project-index-p-88","schema_digest":"sha256:schema-v4","created_by_run_ref":"build-p-88-4"}
  typical_output:
    - description: Version snapshot and shards
      format: |
        {"index_version_id":"project-index-p-88-v4","status":"active","shard_refs":["p-88-v4-shard-a","p-88-v4-shard-b"]}
  reference_implementations:
    - name: Pinecone indexing overview
      url: https://docs.pinecone.io/guides/index-data/indexing-overview
      description: Documents index configuration, ranking fields, and indexed records.
structure:
  identity_keys: [index_version_id]
  fields:
    - id: index_version_id
      labels: {zh: 索引版本标识, en: index version ID, ja: index version ID}
      definitions:
        zh: 稳定标识一个具体索引快照，不是通用索引 ID。
        en: "Stably identifies one concrete index snapshot, not generic index ID."
        ja: generic index ID ではなく一つの concrete index snapshot を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88-v4
      source_claims: [claim-index-version-snapshot]
    - id: index_ref
      labels: {zh: 所属索引引用, en: owning index reference, ja: 所属 index 参照}
      definitions:
        zh: 引用该版本所固定的一个逻辑 Index。
        en: "References the one logical Index fixed by this version."
        ja: この version が固定する一つの logical Index を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88
      source_claims: [claim-index-version-snapshot]
    - id: schema_digest
      labels: {zh: 模式摘要, en: schema digest, ja: schema digest}
      definitions:
        zh: 对版本化字段和兼容配置的可校验摘要，而不是内容向量摘要。
        en: "A verifiable digest of versioned fields and compatibility configuration, not a content-vector digest."
        ja: versioned field と compatibility configuration の verify 可能な digest であり、content-vector digest ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: sha256:schema-v4
      source_claims: [claim-index-version-snapshot]
    - id: created_by_run_ref
      labels: {zh: 创建运行引用, en: creating-run reference, ja: 作成 run 参照}
      definitions:
        zh: 引用创建该具体版本的明确且成功 IndexBuildRun，而非查询请求或仅可见性刷新调用。
        en: References the explicit successful IndexBuildRun that created this concrete version, not a query request or a visibility-refresh call.
        ja: query request や visibility-refresh call ではなく、この concrete version を作成した明示かつ成功した IndexBuildRun を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: build-p-88-4
      source_claims: [claim-index-version-build-boundary]
    - id: status
      labels: {zh: 版本状态, en: version status, ja: version 状態}
      definitions:
        zh: 声明版本处于构建中、活动、已替代或已失败状态，而非某次查询成功与否。
        en: "Declares whether version is building, active, superseded, or failed, not whether one query succeeds."
        ja: version が building、active、superseded、failed のどれかを宣言し、一回の query 成功かどうかではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [building, active, superseded, failed]
      pattern: null
      example_value: active
      source_claims: [claim-index-version-build-boundary]
    - id: shard_refs
      labels: {zh: 分片引用, en: shard references, ja: shard 参照}
      definitions:
        zh: 可选列出属于该版本的分片，不把分片身份合并为版本身份。
        en: "Optionally lists shards belonging to this version without collapsing shard identity into version identity."
        ja: shard identity を version identity に統合せず、この version に属する shard を任意列挙する。
      datatype: json
      required: false
      cardinality: {min: 0, max: null}
      allowed_values: []
      pattern: null
      example_value: '["p-88-v4-shard-a"]'
      source_claims: [claim-index-version-snapshot]
  constraints:
    - id: index-version-immutable-contract
      severity: error
      expression_language: plain
      expression: index_version_id, index_ref, schema_digest, created_by_run_ref, and status are required. One version fixes one schema digest and must be created by an explicit successful IndexBuildRun. A schema or compatibility change creates a new IndexVersion; a visibility refresh, query candidate, score, or database-host identity cannot create, change, or identify a version.
      explanation:
        zh: 固定版本使重现和回滚可审计，防止读取路径静默修改结构。
        en: "A fixed version makes reproduction and rollback auditable and prevents read paths from silently modifying structure."
        ja: 固定 version は reproduction と rollback を audit 可能にし、read path が structure を黙って変更することを防ぐ。
      source_claims: [claim-index-version-snapshot, claim-index-version-build-boundary, claim-index-version-design]
  required_relations: []
examples:
  - id: index-version-positive

    labels: {zh: 活动项目索引 v4, en: Active project-index v4, ja: active project-index v4}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {index_version_id: project-index-p-88-v4, index_ref: project-index-p-88, schema_digest: sha256:schema-v4, created_by_run_ref: build-p-88-4, status: active, shard_refs: '["p-88-v4-shard-a","p-88-v4-shard-b"]'}
    related_node_ids: [IndexVersion, Index, IndexBuildRun, IndexShard]
    related_relation_ids: [IndexVersion-part-of-Index]

    source_claims: [claim-index-version-snapshot]
  - id: index-version-boundary

    labels: {zh: 已替代 v4 仍可审计, en: Superseded v4 remains auditable, ja: superseded v4 は audit 可能なまま}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {index_version_id: project-index-p-88-v4, index_ref: project-index-p-88, schema_digest: sha256:schema-v4, created_by_run_ref: build-p-88-4, status: superseded, shard_refs: '["p-88-v4-shard-a"]'}
    related_node_ids: [IndexVersion, Index, IndexBuildRun]
    related_relation_ids: []

    source_claims: [claim-index-version-build-boundary]
  - id: index-version-counterexample

    labels: {zh: 查询响应不是索引版本, en: Query response is not index version, ja: query response は index version ではない}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {query_id: query-91, candidate_refs: '["entry-p-88-42"]', score: 0.91, schema_digest: absent}
    related_node_ids: [IndexVersion, RetrievalRequest, RetrievedCandidate]
    related_relation_ids: []

    source_claims: [claim-index-version-query-boundary]
  - id: index-version-instance

    labels: {zh: 实例：项目混合索引 v2, en: "Instance: project hybrid-index v2", ja: "事例: project hybrid-index v2"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {index_version_id: project-hybrid-p-88-v2, index_ref: project-hybrid-p-88, schema_digest: sha256:hybrid-schema-v2, created_by_run_ref: build-hybrid-2, status: active, shard_refs: '["hybrid-v2-shard-a"]'}
    related_node_ids: [IndexVersion, HybridIndex, IndexBuildRun, IndexShard]
    related_relation_ids: [IndexVersion-part-of-Index]

    source_claims: [claim-index-version-snapshot]
parent_relation:
  id: IndexVersion-part-of-Index
  predicate: part_of
  target: concept:Index
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是索引版本目录的组成部分, en: is part of the index version catalogue, ja: index version catalogue の構成部分である}
  definitions:
    zh: 一个 IndexVersion 是所属 Index 保存的不可变结构和成员快照，而不是独立索引、构建活动或数据库服务。
    en: "An IndexVersion is an immutable structural and membership snapshot retained by its Index, not an independent index, build activity, or database service."
    ja: IndexVersion は所属 Index が保持する immutable structural and membership snapshot であり、独立した index、build activity、database service ではない。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_version, labels: {zh: 有版本, en: has version, ja: version を持つ}}
  conditions:
    - id: index-version-of-index-condition
      severity: error
      expression_language: plain
      expression: Assert only when index_version.index_ref equals index.index_id and the version has a fixed schema digest plus explicit creating-run provenance. A shard, entry, query response, or database host does not satisfy composition.
      explanation:
        zh: 组成关系要求版本化结构和所属索引的明确匹配。
        en: Composition requires an explicit match between versioned structure and its owning index.
        ja: composition には versioned structure と owning index の明示 match が必要である。
      source_claims: [claim-index-version-of-index]
  temporal_scope: valid-time
  boundary_context: Hosting, querying, or returning a record from an index does not make that object a component version of the Index.
  constraints: []
  examples: []
  source_claims: [claim-index-version-of-index]
  distinct_fact_rationale: This relation records an Index-held version snapshot, not physical hosting, one member entry, or query output.
  layout_role: primary-backbone
relations: []
sources:
  - id: pinecone-indexing
    title: Pinecone indexing overview
    url: https://docs.pinecone.io/guides/index-data/indexing-overview
    source_type: official-doc
    relevance: Documents index configuration and declared ranking fields for indexed data.
  - id: pinecone-search
    title: Pinecone semantic search
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: Documents querying existing index records and returned matches.
source_claims:
  - id: claim-index-version-snapshot
    source: pinecone-indexing
    supports: Pinecone documents index field configuration and indexed data.
    locator: "Indexing overview: indexes and ranking fields"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-version-build-boundary
    source: pinecone-indexing
    supports: Pinecone documents explicit indexing operations that add data to an index.
    locator: "Indexing overview: indexing data"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-version-query-boundary
    source: pinecone-search
    supports: Pinecone documents queries that return results from existing indexed records.
    locator: "Semantic search: search with a dense vector"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-version-of-index
    source: pinecone-indexing
    supports: Pinecone documents indexes with declared field configuration.
    locator: "Indexing overview: indexes"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-version-design
    source: pinecone-indexing
    supports: Moonweave models IndexVersion as an immutable structural snapshot of one Index that identifies its schema digest, member shards, successful build run, and status, rather than a visibility refresh, database service, entry, or query result.
    locator: "Moonweave ontology design inference from claim-index-version-snapshot, claim-index-version-build-boundary, claim-index-version-query-boundary, and claim-index-version-of-index"
    evidence_kind: ontology-design-inference
    confidence: high
