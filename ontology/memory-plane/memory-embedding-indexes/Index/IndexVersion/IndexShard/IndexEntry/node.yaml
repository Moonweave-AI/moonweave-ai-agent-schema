schema: moonweave.ai/ontology-node/v1
id: IndexEntry
kind: concept
status: accepted
labels:
  zh: 索引条目
  en: Index entry
  ja: 索引エントリ
semantics:
  short_definition:
    zh: 将一个固定表示版本登记在一个索引分片中的可追溯成员记录。
    en: A traceable membership record registering one fixed representation version in one index shard.
    ja: 一つの固定 representation version を一つの index shard に登録する追跡可能な membership record。
  definition:
    zh: >-
      IndexEntry 是 IndexShard 的组成部分，引用被写入的表示、索引键、所属版本、分片和写入运行，并保存条目完整性摘要。
      它不是表示载荷本身、索引定义、分片、查询结果、相似度分数、检索候选项、上下文选择或答案。
    en: >-
      An IndexEntry is a component of IndexShard that references written representation, index key, owning version, shard,
      and write run and retains entry-integrity digest. It is not representation payload itself, index definition, shard,
      query result, similarity score, retrieval candidate, context selection, or answer.
    ja: >-
      IndexEntry は IndexShard の構成部分であり、written representation、index key、owning version、shard、write run を参照し、
      entry-integrity digest を保持する。representation payload 自体、index definition、shard、query result、similarity score、
      retrieval candidate、context selection、answer ではない。
  why_needed:
    zh: 表示实体与其索引成员资格具有不同生命周期；独立条目可审计写入、迁移和删除而不修改表示本身。
    en: Representation entity and its index membership have different lifecycles; a separate entry audits writes migrations and removals without modifying the representation itself.
    ja: representation entity と index membership は異なる lifecycle を持つ。別 entry は representation 自体を変更せず write migration removal を監査する。
  includes:
    - zh: 表示引用、索引键、分片引用、版本引用、写入运行和条目摘要。
      en: Representation reference index key shard reference version reference write run and entry digest.
      ja: representation 参照 index key shard 参照 version 参照 write run entry digest。
  excludes:
    - zh: 向量或稀疏载荷副本、索引服务、查询分数、检索排名、候选项和答案。
      en: Vector or sparse-payload copy index service query score retrieval rank candidate and answer.
      ja: vector または sparse-payload copy index service query score retrieval rank candidate answer。
  semantic_kind: entity
  aliases: [indexed record, shard member, 索引成员]
engineering:
  explanation:
    zh: 索引构建运行把兼容表示写入目标分片并创建条目；检索运行随后读取条目或索引，但返回候选和分数仍单独记录。
    en: An index-build run writes compatible representation to target shard and creates entry; retrieval run later reads entry or index while returned candidates and scores remain separately recorded.
    ja: index-build run は互換 representation を target shard に write して entry を作る。retrieval run は後で entry または index を読み returned candidate と score は別に記録する。
  typical_input:
    - description: Compatible representation and target shard supplied to index build.
      format: |
        {"indexed_representation_ref":"embedding-auth-42","index_version_ref":"support-vector-v3-build-7","shard_ref":"support-vector-v3-shard-1","index_key":"auth-guide-42","write_run_ref":"index-build-run-support-42"}
  typical_output:
    - description: Index entry created by the write operation.
      format: |
        {"index_entry_id":"entry-auth-42","indexed_representation_ref":"embedding-auth-42","index_key":"auth-guide-42","index_version_ref":"support-vector-v3-build-7","shard_ref":"support-vector-v3-shard-1","write_run_ref":"index-build-run-support-42","entry_digest":"sha256-entry-auth-42"}
  reference_implementations:
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents storing vectors and searching indexed vector data.
    - name: FAISS Index API
      url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
      description: Documents adding vectors to and searching an index.
structure:
  identity_keys: [index_entry_id]
  fields:
    - id: index_entry_id
      labels: {zh: 索引条目标识, en: index entry ID, ja: index entry ID}
      definitions:
        zh: 稳定标识一个版本和分片范围内的成员记录。
        en: Stably identifies one membership record in version and shard scope.
        ja: version と shard の範囲内で一つの membership record を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^entry-[A-Za-z0-9._-]+$'
      example_value: entry-auth-42
      source_claims: [claim-index-entry-write]
    - id: indexed_representation_ref
      labels: {zh: 已索引表示引用, en: indexed representation reference, ja: indexed representation 参照}
      definitions:
        zh: 指向本条目登记的固定表示版本，不复制载荷。
        en: Points to fixed representation version registered by entry without copying payload.
        ja: payload を複製せず entry が登録する固定 representation version を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-auth-42
      source_claims: [claim-index-entry-write]
    - id: index_key
      labels: {zh: 索引键, en: index key, ja: index key}
      definitions:
        zh: 在所属索引版本内定位成员的键，不等同于输入工件或用户身份。
        en: Key locating membership in owning index version and not input artifact or user identity.
        ja: owning index version 内で membership を位置付ける key であり input artifact や user identity ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: auth-guide-42
      source_claims: [claim-index-entry-write]
    - id: index_version_ref
      labels: {zh: 索引版本引用, en: index version reference, ja: index version 参照}
      definitions:
        zh: 指向拥有该条目的 IndexVersion，而不是活动查询请求。
        en: Points to IndexVersion owning entry rather than active query request.
        ja: active query request ではなく entry を所有する IndexVersion を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vector-v3-build-7
      source_claims: [claim-index-entry-version]
    - id: shard_ref
      labels: {zh: 分片引用, en: shard reference, ja: shard 参照}
      definitions:
        zh: 指向物理或逻辑承载条目的 IndexShard，不是整个索引。
        en: Points to physical or logical IndexShard carrying entry rather than whole index.
        ja: index 全体ではなく entry を保持する physical または logical IndexShard を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vector-v3-shard-1
      source_claims: [claim-index-entry-shard]
    - id: write_run_ref
      labels: {zh: 写入运行引用, en: write run reference, ja: write run 参照}
      definitions:
        zh: 指向创建或更新成员记录的 IndexBuildRun，不表示查询已读取它。
        en: Points to IndexBuildRun that created or updated membership record and does not state a query read it.
        ja: membership record を作成または更新した IndexBuildRun を指し query が読んだことを表さない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: index-build-run-support-42
      source_claims: [claim-index-entry-provenance]
    - id: entry_digest
      labels: {zh: 条目摘要, en: entry digest, ja: entry digest}
      definitions:
        zh: 验证条目引用和键完整性的摘要，不是表示或搜索分数。
        en: Digest verifying entry references and key integrity rather than representation or search score.
        ja: representation や search score ではなく entry reference と key の完全性を検証する digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-entry-auth-42
      source_claims: [claim-index-entry-provenance]
  constraints:
    - id: index-entry-membership-provenance
      severity: error
      expression_language: plain
      expression: indexed_representation_ref, index_key, index_version_ref, shard_ref, write_run_ref, and entry_digest are required. Representation must be compatible with owning version schema before entry creation.
      explanation:
        zh: 条目必须绑定表示、版本、分片和写入来源，避免无版本或不可追溯的索引成员。
        en: An entry must bind representation version shard and write provenance to avoid versionless or untraceable index membership.
        ja: entry は representation version shard write provenance を結び versionless または追跡不能な index membership を避ける必要がある。
      source_claims: [claim-index-entry-write, claim-index-entry-version, claim-index-entry-design]
    - id: index-entry-not-payload-or-result
      severity: error
      expression_language: plain
      expression: IndexEntry must not contain copied vector payload, sparse coordinates, query score, rank, retrieval candidate, context selection, or answer text.
      explanation:
        zh: 条目记录成员资格；表示载荷和检索输出属于不同实体。
        en: An entry records membership while representation payload and retrieval outputs are different entities.
        ja: entry は membership を記録し representation payload と retrieval output は別 entity に属する。
      source_claims: [claim-index-entry-provenance]
  required_relations: []
examples:
  - id: index-entry-positive-vector

    labels: {zh: 认证嵌入索引条目, en: Index entry for authentication embedding, ja: authentication embedding の index entry}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {index_entry_id: entry-auth-42, indexed_representation_ref: embedding-auth-42, index_key: auth-guide-42, index_version_ref: support-vector-v3-build-7, shard_ref: support-vector-v3-shard-1, write_run_ref: index-build-run-support-42, entry_digest: sha256-entry-auth-42}
    related_node_ids: [IndexEntry, IndexShard, EmbeddingVector]
    related_relation_ids: [IndexEntry-part_of-IndexShard]

    source_claims: [claim-index-entry-write]
  - id: index-entry-counterexample-vector

    labels: {zh: 向量载荷被误称为条目, en: Vector payload presented as index entry, ja: vector payload を index entry として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {embedding_vector_id: embedding-auth-42, dimension: 1536, embedding_model: text-embedding-3-small}
    related_node_ids: [IndexEntry, EmbeddingVector, DenseVector]
    related_relation_ids: [IndexEntry-part_of-IndexShard]

    source_claims: [claim-index-entry-write]
  - id: index-entry-boundary-rewrite

    labels: {zh: 同一表示写入新版本, en: Same representation in new version, ja: 同じ representation の新 version への write}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {index_entry_id: entry-auth-42-v2, indexed_representation_ref: embedding-auth-42, index_key: auth-guide-42, index_version_ref: support-vector-v4-build-1, shard_ref: support-vector-v4-shard-1, write_run_ref: index-build-run-support-43, entry_digest: sha256-entry-auth-42-v2}
    related_node_ids: [IndexEntry, IndexVersion, IndexBuildRun]
    related_relation_ids: [IndexEntry-part_of-IndexShard]

    source_claims: [claim-index-entry-version]
  - id: index-entry-instance-faiss

    labels: {zh: FAISS 向量写入实例, en: FAISS vector-write instance, ja: FAISS vector-write の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {index_entry_id: entry-faiss-17, indexed_representation_ref: embedding-faiss-17, index_key: faiss-17, index_version_ref: faiss-index-v1, shard_ref: faiss-shard-0, write_run_ref: faiss-build-run-17, entry_digest: sha256-entry-faiss-17}
    related_node_ids: [IndexEntry, IndexShard, IndexBuildRun]
    related_relation_ids: [IndexEntry-part_of-IndexShard]
    source_claims: [claim-index-entry-write, claim-index-entry-provenance]
parent_relation:
  id: IndexEntry-part_of-IndexShard
  predicate: part_of
  target: concept:IndexShard
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是索引分片的条目组成部分, en: is an entry component of index shard, ja: IndexShard の entry 構成部分である}
  definitions:
    zh: IndexEntry 是一个 IndexShard 中登记表示成员资格的组成记录。
    en: IndexEntry is component record registering representation membership in one IndexShard.
    ja: IndexEntry は一つの IndexShard 内で representation membership を登録する component record である。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_index_entry, labels: {zh: 具有索引条目, en: has index entry, ja: index entry を持つ}}
  conditions:
    - id: index-entry-composition-condition
      severity: error
      expression_language: plain
      expression: Assert part_of only when membership record belongs to one shard and references compatible representation version and write run.
      explanation:
        zh: 组成关系要求条目归属一个分片并带有表示和写入来源。
        en: Composition requires entry ownership by one shard with representation and write provenance.
        ja: composition は representation と write provenance を持つ一つの shard への entry ownership を要求する。
      source_claims: [claim-index-entry-shard]
  temporal_scope: valid-time
  boundary_context: An entry can be superseded or removed by a later write while its prior membership provenance remains auditable.
  constraints: []
  examples: []
  source_claims: [claim-index-entry-write]
  distinct_fact_rationale: This relation records shard membership and does not express index definition query result or retrieval score.
  layout_role: primary-backbone
relations: []
sources:
  - id: pgvector
    title: pgvector
    source_type: official-documentation
    url: https://github.com/pgvector/pgvector
    relevance: Documents storing vector data and indexed vector search.
  - id: faiss-index-api
    title: FAISS Index API
    source_type: official-documentation
    url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
    relevance: Documents adding vectors to and searching an index.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates entry entities from index-build and query activities.
source_claims:
  - id: claim-index-entry-write
    source: faiss-index-api
    supports: FAISS Index supports adding vectors for later search.
    locator: "Index API: add vectors and search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-entry-version
    source: pgvector
    supports: pgvector documents vector data stored and searched using configured index structures.
    locator: "README: vector data and indexes"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-index-entry-shard
    source: faiss-index-api
    supports: FAISS Index stores vectors that are added for later search.
    locator: "Index API: index storage and search"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-entry-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes Entity from Activity and defines generation and use relations between them.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-index-entry-design
    source: faiss-index-api
    supports: Moonweave models IndexEntry as a shard-owned membership registration that records an indexed representation, index key, owning version, write run, and digest, without duplicating a vector payload or query result.
    locator: "Moonweave ontology design inference from claim-index-entry-write, claim-index-entry-version, claim-index-entry-shard, and claim-index-entry-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
