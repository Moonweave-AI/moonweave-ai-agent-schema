schema: moonweave.ai/ontology-node/v1
id: IndexShard
kind: concept
status: accepted
labels: {zh: 索引分片, en: Index Shard, ja: インデックスシャード}
semantics:
  short_definition:
    zh: 属于一个确定索引版本、承载该版本一部分索引条目的物理或逻辑分片单元。
    en: A physical or logical shard unit belonging to one fixed index version and carrying a subset of that version's index entries.
    ja: 一つの固定 index version に属し、その version の index entry の部分集合を保持する physical 又は logical shard unit。
  definition:
    zh: >-
      IndexShard 是一个具体 IndexVersion 的可定位成员分区，由 shard_id、index_version_ref 和 partition_key 标识，
      可记录条目计数和非秘密定位引用。它将同一版本的索引成员划分为可构建、验证或迁移的集合。它不是整个 IndexVersion、
      Index、VectorDatabase、IndexEntry、向量、检索候选或 namespace 授权规则。分片边界只组织索引成员，不决定记录适用性
      或模型可见性。
    en: >-
      An IndexShard is an addressable membership partition of one concrete IndexVersion, identified by shard_id,
      index_version_ref, and partition_key, with optional entry count and non-secret locator reference. It divides index
      membership of the same version into sets that can be built, verified, or migrated. It is not the whole IndexVersion,
      Index, VectorDatabase, IndexEntry, vector, retrieval candidate, or namespace authorization rule. A shard boundary
      organizes index membership only; it does not determine record applicability or model visibility.
    ja: >-
      IndexShard は一つの concrete IndexVersion の addressable membership partition で、shard_id、index_version_ref、
      partition_key により識別され、任意の entry count と non-secret locator reference を持ちます。同じ version の index
      membership を build、verify、migrate 可能な set に分けます。IndexVersion 全体、Index、VectorDatabase、IndexEntry、
      vector、retrieval candidate、namespace authorization rule ではありません。shard boundary は index membership だけを
      組織し、record applicability や model visibility を決定しません。
  why_needed:
    zh: 通过明确分片可审计大索引的构建覆盖、迁移和部分失败，而不把分区位置混同为存储范围或用户访问权限。
    en: Explicit shards make build coverage, migration, and partial failures in a large index auditable without confusing partition location with storage scope or user access.
    ja: 明示 shard は大きな index の build coverage、migration、partial failure を audit 可能にし、partition location を storage scope や user access と混同しない。
  includes:
    - zh: project-index-p-88-v4 中按哈希范围划分、包含 entry-p-88-42 和 entry-p-88-43 的 shard-a。
      en: shard-a of project-index-p-88-v4 partitioned by hash range and containing entry-p-88-42 and entry-p-88-43.
      ja: hash range で partition され entry-p-88-42 と entry-p-88-43 を含む project-index-p-88-v4 の shard-a。
  excludes:
    - zh: 完整索引版本、单个条目、数据库实例、存储 namespace、用户作用域、查询候选或提示词片段。
      en: Complete index version, one entry, database instance, storage namespace, user scope, query candidate, or prompt fragment.
      ja: complete index version、一つの entry、database instance、storage namespace、user scope、query candidate、prompt fragment。
  semantic_kind: entity
  aliases: [index partition, index segment]
engineering:
  explanation:
    zh: >-
      构建器依据固定版本的分片规则将兼容条目写入 shard，并可在恢复或迁移时按 shard 核验条目计数与来源。Pinecone 文档说明
      索引将记录按已声明字段组织；Moonweave 使用 shard 作为版本内的局部分组，这是可审计的实施选择，而不是把数据库服务
      或任意查询过滤器称为 shard。
    en: >-
      A builder writes compatible entries into shards under a fixed version's partition rule and can verify entry count
      and provenance by shard during recovery or migration. Pinecone documents records organized in an index by declared
      fields. Moonweave uses a shard as a local grouping within a version as an auditable implementation choice, rather
      than calling a database service or arbitrary query filter a shard.
    ja: >-
      builder は固定 version の partition rule の下で compatible entry を shard に write し、recovery 又は migration 時に shard
      ごとに entry count と provenance を verify できます。Pinecone は declared field により index 内で組織される record を文書化
      します。Moonweave は shard を version 内の local grouping として audit 可能な implementation choice で使い、database
      service や任意 query filter を shard と呼びません。
  typical_input:
    - description: Assign entries to a shard in a fixed version
      format: |
        {"shard_id":"p-88-v4-shard-a","index_version_ref":"project-index-p-88-v4","partition_key":"hash:00-3f","entry_refs":["entry-p-88-42","entry-p-88-43"]}
  typical_output:
    - description: Shard metadata
      format: |
        {"shard_id":"p-88-v4-shard-a","entry_count":2,"locator_ref":"index-storage://p-88/v4/a","version_ref":"project-index-p-88-v4"}
  reference_implementations:
    - name: Pinecone indexing overview
      url: https://docs.pinecone.io/guides/index-data/indexing-overview
      description: Documents organized indexed records and declared index fields.
structure:
  identity_keys: [shard_id]
  fields:
    - id: shard_id
      labels: {zh: 分片标识, en: shard ID, ja: shard ID}
      definitions:
        zh: 稳定标识一个版本内分片而非完整索引或条目。
        en: "Stably identifies one version-local shard rather than full index or entry."
        ja: full index 又は entry ではなく一つの version-local shard を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: p-88-v4-shard-a
      source_claims: [claim-index-shard-partition]
    - id: index_version_ref
      labels: {zh: 索引版本引用, en: index-version reference, ja: index-version 参照}
      definitions:
        zh: 引用拥有该分片的一个确定 IndexVersion。
        en: "References one fixed IndexVersion that owns this shard."
        ja: この shard を所有する一つの固定 IndexVersion を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: project-index-p-88-v4
      source_claims: [claim-index-shard-partition]
    - id: partition_key
      labels: {zh: 分片分区键, en: shard partition key, ja: shard partition key}
      definitions:
        zh: 声明该版本内分配成员的稳定规则或范围，不是查询过滤器或授权范围。
        en: "Declares stable rule or range assigning members within this version, not query filter or access scope."
        ja: この version 内で member を割り当てる stable rule 又は range を宣言し、query filter や access scope ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: hash:00-3f
      source_claims: [claim-index-shard-partition]
    - id: entry_count
      labels: {zh: 条目计数, en: entry count, ja: entry 数}
      definitions:
        zh: 记录该分片当前版本成员数，用于核验而非查询结果数量。
        en: "Records member count for this shard version for verification, not number of query results."
        ja: verification 用にこの shard version の member count を記録し、query result 数ではない。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims: [claim-index-shard-partition]
    - id: locator_ref
      labels: {zh: 定位引用, en: locator reference, ja: locator 参照}
      definitions:
        zh: 可选引用不含凭据的分片位置或恢复描述符，而非数据库秘密配置。
        en: "Optionally references a credential-free shard location or recovery descriptor, not database secrets."
        ja: database secret ではなく credential-free な shard location 又は recovery descriptor を任意参照する。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: index-storage://p-88/v4/a
      source_claims: [claim-index-shard-partition]
  constraints:
    - id: index-shard-version-locality
      severity: error
      expression_language: plain
      expression: shard_id, index_version_ref, partition_key, and entry_count are required. A shard may contain only IndexEntries owned by the referenced version and assigned by its partition key. Its locator must contain no credential. A namespace path, access scope, query filter, candidate list, or database host cannot substitute for a shard partition.
      explanation:
        zh: 分片是版本内成员组织事实，必须与寻址、授权和读取输出分离。
        en: "A shard is a version-local membership-organization fact and must remain separate from addressing, authorization, and read outputs."
        ja: shard は version-local membership organization fact であり、addressing、authorization、read output と分離しなければならない。
      source_claims: [claim-index-shard-partition, claim-index-shard-boundary, claim-index-shard-design]
  required_relations: []
examples:
  - id: index-shard-positive

    labels: {zh: 项目 v4 分片 A, en: Project v4 shard A, ja: project v4 shard A}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {shard_id: p-88-v4-shard-a, index_version_ref: project-index-p-88-v4, partition_key: 'hash:00-3f', entry_count: 2, locator_ref: index-storage://p-88/v4/a}
    related_node_ids: [IndexShard, IndexVersion, IndexEntry]
    related_relation_ids: [IndexShard-part-of-IndexVersion]

    source_claims: [claim-index-shard-partition]
  - id: index-shard-boundary

    labels: {zh: 新版本的同一范围, en: Same range in new version, ja: 新 version の同じ range}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {shard_id: p-88-v5-shard-a, index_version_ref: project-index-p-88-v5, partition_key: 'hash:00-3f', entry_count: 2, locator_ref: index-storage://p-88/v5/a}
    related_node_ids: [IndexShard, IndexVersion]
    related_relation_ids: []

    source_claims: [claim-index-shard-partition]
  - id: index-shard-counterexample

    labels: {zh: 用户命名空间不是索引分片, en: User namespace is not index shard, ja: user namespace は index shard ではない}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {namespace_path: '["users","u-123","profile"]', memory_store_ref: memory-store-primary, index_version_ref: absent}
    related_node_ids: [IndexShard, MemoryNamespace, MemoryStore]
    related_relation_ids: []

    source_claims: [claim-index-shard-boundary]
  - id: index-shard-instance

    labels: {zh: 实例：混合索引分片, en: "Instance: hybrid-index shard", ja: "事例: hybrid-index shard"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {shard_id: hybrid-v2-shard-b, index_version_ref: project-hybrid-p-88-v2, partition_key: 'hash:40-7f', entry_count: 37, locator_ref: index-storage://hybrid/p-88/v2/b}
    related_node_ids: [IndexShard, IndexVersion, HybridIndex, IndexEntry]
    related_relation_ids: [IndexShard-part-of-IndexVersion]

    source_claims: [claim-index-shard-partition]
parent_relation:
  id: IndexShard-part-of-IndexVersion
  predicate: part_of
  target: concept:IndexVersion
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是索引版本的分片, en: is shard of index version, ja: index version の shard である}
  definitions:
    zh: 一个 IndexShard 只组织其所引用 IndexVersion 的局部成员。
    en: "An IndexShard organizes only local members of its referenced IndexVersion."
    ja: IndexShard は参照する IndexVersion の local member だけを組織する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_shard, labels: {zh: 有分片, en: has shard, ja: shard を持つ}}
  conditions:
    - id: index-shard-part-of-version-condition
      severity: error
      expression_language: plain
      expression: Assert only when shard.index_version_ref equals index_version.index_version_id and the shard uses a stable partition key for entries belonging to that version. A namespace, query filter, or database host does not establish composition.
      explanation:
        zh: 组合由版本引用和成员划分规则证明，而不是共同存储位置。
        en: "Composition is evidenced by version reference and membership partition rule, not co-location."
        ja: composition は co-location ではなく version reference と membership partition rule により証明される。
      source_claims: [claim-index-shard-part-of-version]
  temporal_scope: valid-time
  boundary_context: A shard may be physically hosted by a database but hosting does not replace its version-local composition fact.
  constraints: []
  examples: []
  source_claims: [claim-index-shard-part-of-version]
  distinct_fact_rationale: This relation records version-local membership grouping, distinct from physical hosting, record scope, and query filtering.
  layout_role: primary-backbone
relations: []
