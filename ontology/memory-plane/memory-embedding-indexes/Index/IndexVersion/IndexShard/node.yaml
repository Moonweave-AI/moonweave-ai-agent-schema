  - id: pinecone-indexing
    title: Pinecone indexing overview
    url: https://docs.pinecone.io/guides/index-data/indexing-overview
    source_type: official-doc
    relevance: Documents indexed records organized under declared index fields.
  - id: pinecone-search
    title: Pinecone semantic search
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: Documents reading similar records through a query over an existing index.
source_claims:
  - id: claim-index-shard-partition
    source: pinecone-indexing
    supports: Pinecone documents indexed records under declared index fields.
    locator: "Indexing overview: indexes and indexed data"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-shard-boundary
    source: pinecone-search
    supports: Pinecone documents query inputs and returned matching records.
    locator: "Semantic search: query parameters and returned matches"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-shard-part-of-version
    source: pinecone-indexing
    supports: Pinecone documents an index and the indexed data stored within it.
    locator: "Indexing overview: indexes"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-index-shard-design
    source: pinecone-indexing
    supports: Moonweave models IndexShard as a stable, version-local partition of IndexEntry members for build, migration, and verification, separate from a storage namespace, query filter, candidate list, or database service.
    locator: "Moonweave ontology design inference from claim-index-shard-partition, claim-index-shard-boundary, and claim-index-shard-part-of-version"
    evidence_kind: ontology-design-inference
    confidence: high
