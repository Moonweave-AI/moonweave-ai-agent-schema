schema: moonweave.ai/ontology-node/v1
id: TfIdfIndex
kind: concept
status: accepted
labels:
  zh: TF-IDF 索引
  en: TF-IDF index
  ja: TF-IDF 索引
semantics:
  short_definition:
    zh: 按声明词汇表和 TF-IDF 权重方案组织文本特征条目的索引结构。
    en: An index structure organizing text-feature entries under declared vocabulary and TF-IDF weighting scheme.
    ja: 宣言された vocabulary と TF-IDF weighting scheme の下で text-feature entry を組織する index structure。
  definition:
    zh: >-
      TfIdfIndex 是 Index 的子类型，定义词汇表、词项权重方案、归一化规则、架构和版本，使兼容的稀疏文本特征可被索引。
      它不是原始文档、单个词项权重、BM25 或 TF-IDF 查询分数、倒排服务、检索候选项或最终排名。
    en: >-
      A TfIdfIndex is a subtype of Index that defines vocabulary, term-weighting scheme, normalization rule, schema, and
      version so compatible sparse text features may be indexed. It is not raw document, one term weight, BM25 or TF-IDF
      query score, inverted service, retrieval candidate, or final rank.
    ja: >-
      TfIdfIndex は Index の下位型であり、vocabulary、term-weighting scheme、normalization rule、schema、version を定義して互換 sparse
      text feature を index 化する。raw document、一つの term weight、BM25 または TF-IDF query score、inverted service、retrieval candidate、
      final rank ではない。
  why_needed:
    zh: 词汇表和权重规则决定稀疏坐标的语义；索引级声明可防止不同文本特征空间被混合。
    en: Vocabulary and weighting rules determine sparse-coordinate semantics; index-level declaration prevents different text-feature spaces from being mixed.
    ja: vocabulary と weighting rule は sparse-coordinate semantics を決める。index-level 宣言により異なる text-feature space の混在を防ぐ。
  includes:
    - zh: 词汇表引用、权重方案、归一化规则、架构、活动版本和索引身份。
      en: Vocabulary reference weighting scheme normalization rule schema active version and index identity.
      ja: vocabulary 参照 weighting scheme normalization rule schema active version index identity。
  excludes:
    - zh: 原始正文、单个词项、词法分数、向量数据库服务、候选集和答案。
      en: Raw body individual term lexical score vector-database service candidate set and answer.
      ja: raw body individual term lexical score vector-database service candidate set answer。
  semantic_kind: entity
  aliases: [term-weight index, sparse text index, 词项权重索引]
engineering:
  explanation:
    zh: 构建运行根据固定词汇表将文档写为稀疏特征条目；查询根据同一权重规则计算分数，分数本身不属于索引定义。
    en: A build run writes documents as sparse feature entries under fixed vocabulary; query computes scores using same weighting rule while scores themselves are not index definition.
    ja: build run は固定 vocabulary の下で document を sparse feature entry として write する。query は同じ weighting rule で score を計算するが score 自体は index definition ではない。
  typical_input:
    - description: TF-IDF index definition.
      format: |
        {"index_id":"support-tfidf-v2","index_kind":"tfidf","vocabulary_ref":"support-vocabulary-v2","term_weighting_scheme":"tf-idf","normalization_rule":"l2","schema_ref":"support-tfidf-schema-v1"}
  typical_output:
    - description: Queryable TF-IDF index structure.
      format: |
        {"index_id":"support-tfidf-v2","index_kind":"tfidf","active_version_ref":"support-tfidf-v2-build-4","queryable":true}
  reference_implementations:
    - name: scikit-learn text feature extraction
      url: https://scikit-learn.org/stable/modules/feature_extraction.html#tfidf-term-weighting
      description: Documents TF-IDF feature weighting for text.
    - name: Elasticsearch similarity settings
      url: https://www.elastic.co/docs/reference/elasticsearch/index-settings/similarity
      description: Documents text-field similarity configuration.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: index ID, ja: index ID}
      definitions:
        zh: 继承 Index 的逻辑索引身份；它标识这个 TF-IDF 索引，而不是服务或单条特征。
        en: Inherits the logical Index identity for this TF-IDF index rather than identifying a service or one feature.
        ja: service や一つの feature ではなく、この TF-IDF index の論理 Index identity を継承する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: tfidf-index-support-v2
      source_claims: [claim-tfidf-index-structure]
    - id: index_kind
      labels: {zh: 索引类别, en: index kind, ja: index 種別}
      definitions:
        zh: 继承的索引类别，在该子类中固定为 tfidf。
        en: The inherited index kind, fixed to tfidf for this subtype.
        ja: 継承した index kind であり、この subtype では tfidf に固定される。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [tfidf]
      pattern: null
      example_value: tfidf
      source_claims: [claim-tfidf-index-structure]
    - id: vocabulary_ref
      labels: {zh: 词汇表引用, en: vocabulary reference, ja: vocabulary 参照}
      definitions:
        zh: 指向定义特征索引语义的固定词汇表或特征字典。
        en: Points to fixed vocabulary or feature dictionary defining feature-index semantics.
        ja: feature-index semantics を定義する固定 vocabulary または feature dictionary を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vocabulary-v2
      source_claims: [claim-tfidf-index-vocabulary, claim-tfidf-index-design]
    - id: term_weighting_scheme
      labels: {zh: 词项权重方案, en: term weighting scheme, ja: term weighting scheme}
      definitions:
        zh: 声明从文本特征生成权重的方法，而不是一次检索的分数。
        en: Declares method generating weights from text features and is not one retrieval score.
        ja: text feature から weight を生成する method を宣言し一つの retrieval score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [tf-idf, sublinear-tf-idf]
      pattern: null
      example_value: tf-idf
      source_claims: [claim-tfidf-index-structure]
    - id: normalization_rule
      labels: {zh: 归一化规则, en: normalization rule, ja: normalization rule}
      definitions:
        zh: 声明特征权重归一化约定，影响可比较范围。
        en: Declares feature-weight normalization convention affecting comparability boundary.
        ja: comparability boundary に影響する feature-weight normalization convention を宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [l1, l2, none]
      pattern: null
      example_value: l2
      source_claims: [claim-tfidf-index-vocabulary]
    - id: schema_ref
      labels: {zh: 索引架构引用, en: index schema reference, ja: index schema 参照}
      definitions:
        zh: 指向允许写入稀疏特征条目的架构规则。
        en: Points to schema rules permitting sparse-feature entry writes.
        ja: sparse-feature entry write を許可する schema rule を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-tfidf-schema-v1
      source_claims: [claim-tfidf-index-structure]
    - id: active_version_ref
      labels: {zh: 活动版本引用, en: active version reference, ja: active version 参照}
      definitions:
        zh: 可选指向当前用于写入或查询的索引版本。
        en: Optionally points to index version currently used for writes or queries.
        ja: 現在 write または query に使う index version を任意に指す。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-tfidf-v2-build-4
      source_claims: [claim-tfidf-index-version]
  constraints:
    - id: tfidf-index-vocabulary-compatibility
      severity: error
      expression_language: plain
      expression: vocabulary_ref, term_weighting_scheme, normalization_rule, and schema_ref are required. Every sparse feature entry must use declared vocabulary and weighting scheme.
      explanation:
        zh: TF-IDF 索引必须明确词汇表与权重语义，避免把不同特征空间的坐标混合。
        en: A TF-IDF index must declare vocabulary and weighting semantics to avoid mixing coordinates from different feature spaces.
        ja: TF-IDF index は異なる feature space の coordinate 混在を避けるため vocabulary と weighting semantics を宣言する必要がある。
      source_claims: [claim-tfidf-index-vocabulary]
    - id: tfidf-index-not-score-or-document
      severity: error
      expression_language: plain
      expression: TfIdfIndex must not contain raw document body, single term weight, query score, retrieval rank, candidate selection, or answer text.
      explanation:
        zh: 索引定义是特征组织契约；文档、权重和查询输出是独立数据。
        en: Index definition is feature-organization contract while documents weights and query outputs are separate data.
        ja: index definition は feature-organization contract であり document weight query output は別 data である。
      source_claims: [claim-tfidf-index-provenance]
  required_relations: []
examples:
  - id: tfidf-index-positive-support

    labels: {zh: 支持文档 TF-IDF 索引, en: Support-document TF-IDF index, ja: support-document TF-IDF index}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {index_id: tfidf-index-support-v2, index_kind: tfidf, vocabulary_ref: support-vocabulary-v2, term_weighting_scheme: tf-idf, normalization_rule: l2, schema_ref: support-tfidf-schema-v1, active_version_ref: support-tfidf-v2-build-4}
    related_node_ids: [TfIdfIndex, Index, SparseVector]
    related_relation_ids: [TfIdfIndex-is_a-Index]

    source_claims: [claim-tfidf-index-structure]
  - id: tfidf-index-counterexample-score

    labels: {zh: BM25 分数被误称为 TF-IDF 索引, en: BM25 score presented as TF-IDF index, ja: BM25 score を TF-IDF index として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {candidate_ref: candidate-support-42, score_value: 8.6, rank: 1}
    related_node_ids: [TfIdfIndex, LexicalScore, RetrievedCandidate]
    related_relation_ids: [TfIdfIndex-is_a-Index]

    source_claims: [claim-tfidf-index-structure]
  - id: tfidf-index-boundary-vocabulary-change

    labels: {zh: 词汇表版本变化, en: Vocabulary version change, ja: vocabulary version の変更}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {index_id: tfidf-index-support-v3, index_kind: tfidf, vocabulary_ref: support-vocabulary-v3, term_weighting_scheme: tf-idf, normalization_rule: l2, schema_ref: support-tfidf-schema-v2, active_version_ref: support-tfidf-v3-build-1}
    related_node_ids: [TfIdfIndex, IndexVersion, SparseVector]
    related_relation_ids: [TfIdfIndex-is_a-Index]

    source_claims: [claim-tfidf-index-vocabulary]
  - id: tfidf-index-instance-scikit

    labels: {zh: scikit-learn TF-IDF 实例, en: scikit-learn TF-IDF instance, ja: scikit-learn TF-IDF の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {index_id: tfidf-index-scikit-17, index_kind: tfidf, vocabulary_ref: scikit-vocabulary-17, term_weighting_scheme: tf-idf, normalization_rule: l2, schema_ref: scikit-tfidf-schema-v1, active_version_ref: scikit-tfidf-build-17}
    related_node_ids: [TfIdfIndex, IndexBuildRun, SparseVector]
    related_relation_ids: [TfIdfIndex-is_a-Index]
    source_claims: [claim-tfidf-index-structure]
parent_relation:
  id: TfIdfIndex-is_a-Index
  predicate: is_a
  target: concept:Index
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是索引的 TF-IDF 子类, en: is a TF-IDF subtype of index, ja: Index の TF-IDF 下位型である}
  definitions:
    zh: TfIdfIndex 是以词汇表和 TF-IDF 权重语义为差异的 Index。
    en: TfIdfIndex is Index with the differentia of vocabulary and TF-IDF weighting semantics.
    ja: TfIdfIndex は vocabulary と TF-IDF weighting semantics を差異とする Index である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_tfidf_index_subtype, labels: {zh: 具有 TF-IDF 索引子类, en: has TF-IDF-index subtype, ja: TF-IDF-index 下位型を持つ}}
  conditions:
    - id: tfidf-index-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when index defines vocabulary and TF-IDF weighting semantics for sparse text features.
      explanation:
        zh: 子类型差异是词汇表和 TF-IDF 特征权重契约。
        en: The subtype differentia is vocabulary and TF-IDF feature-weight contract.
        ja: subtype の differentia は vocabulary と TF-IDF feature-weight contract である。
      source_claims: [claim-tfidf-index-structure]
  temporal_scope: valid-time
  boundary_context: Adding entries or querying score does not change the vocabulary-bound index subtype.
  constraints: []
  examples: []
  source_claims: [claim-tfidf-index-structure]
  distinct_fact_rationale: This relation classifies sparse-text index structure and does not express query score or rank.
  layout_role: primary-backbone
relations: []
sources:
  - id: sklearn-tfidf
    title: scikit-learn TF-IDF term weighting
    source_type: official-documentation
    url: https://scikit-learn.org/stable/modules/feature_extraction.html#tfidf-term-weighting
    relevance: Documents TF-IDF text feature weighting and normalization.
  - id: elasticsearch-similarity
    title: Elasticsearch similarity settings
    source_type: official-documentation
    url: https://www.elastic.co/docs/reference/elasticsearch/index-settings/similarity
    relevance: Documents text-field similarity configuration.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates index entities from build and query activities.
source_claims:
  - id: claim-tfidf-index-structure
    source: sklearn-tfidf
    supports: scikit-learn documents TF-IDF term weighting for text features.
    locator: "Text feature extraction: TF-IDF term weighting"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-tfidf-index-vocabulary
    source: sklearn-tfidf
    supports: scikit-learn's TF-IDF vectorizer uses a learned vocabulary and configured normalization to produce text feature coordinates.
    locator: "Text feature extraction: vocabulary and normalization"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-tfidf-index-version
    source: elasticsearch-similarity
    supports: Elasticsearch supports configurable text similarity settings, including the default BM25 similarity.
    locator: "Similarity settings: configuration"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-tfidf-index-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes Entity from Activity and defines generation and use relations between them.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-tfidf-index-design
    source: sklearn-tfidf
    supports: Moonweave models TfIdfIndex as an Index subtype that declares the vocabulary, term-weighting scheme, normalization, schema, and active version for a compatible sparse feature space, separate from individual documents and query scores.
    locator: "Moonweave ontology design inference from claim-tfidf-index-structure, claim-tfidf-index-vocabulary, claim-tfidf-index-version, and claim-tfidf-index-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
