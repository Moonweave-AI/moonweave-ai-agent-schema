schema: moonweave.ai/ontology-node/v1
id: HybridIndex
kind: concept
status: accepted
labels:
  zh: 混合索引
  en: Hybrid index
  ja: ハイブリッド索引
semantics:
  short_definition:
    zh: 为兼容的稠密和稀疏表示定义联合检索结构及融合契约的索引。
    en: An index defining joint retrieval structure and fusion contract for compatible dense and sparse representations.
    ja: 互換 dense と sparse representation の joint retrieval structure と fusion contract を定義する index。
  definition:
    zh: >-
      HybridIndex 是 Index 的子类型，声明稠密空间、稀疏特征空间、融合策略、架构和版本，用于组织可共同检索的两类表示。
      它不是某条稠密或稀疏向量、融合后的查询分数、排名结果、索引服务、候选集合或模型答案。
    en: >-
      A HybridIndex is a subtype of Index that declares dense space, sparse feature space, fusion policy, schema, and version
      to organize two kinds of representations that may be jointly retrieved. It is not one dense or sparse vector, fused query
      score, ranking result, index service, candidate set, or model answer.
    ja: >-
      HybridIndex は Index の下位型であり、dense space、sparse feature space、fusion policy、schema、version を宣言して共同 retrieval 可能な
      二種の representation を組織する。一つの dense または sparse vector、fused query score、ranking result、index service、candidate set、
      model answer ではない。
  why_needed:
    zh: 混合检索需要同时保留两种表示与融合规则，避免把融合输出或其中一个分量误称为索引本身。
    en: Hybrid retrieval needs both representation spaces and fusion rule retained so neither fusion output nor one component is mistaken for the index itself.
    ja: hybrid retrieval は両 representation space と fusion rule を保持する必要があり fusion output や一つの component を index 自体と誤認しない。
  includes:
    - zh: 稠密空间引用、稀疏空间引用、融合策略、架构、活动版本和索引身份。
      en: Dense-space reference sparse-space reference fusion policy schema active version and index identity.
      ja: dense-space 参照 sparse-space 参照 fusion policy schema active version index identity。
  excludes:
    - zh: 单个向量、单次融合分数、最终排名、数据库服务、候选项和答案。
      en: Individual vector one fused score final rank database service candidate and answer.
      ja: individual vector one fused score final rank database service candidate answer。
  semantic_kind: entity
  aliases: [dense sparse index, hybrid retrieval index, 混合检索结构]
engineering:
  explanation:
    zh: 构建运行分别写入兼容的稠密与稀疏表示；查询可读取两个信号，融合活动另行生成分数或排序，不能修改索引定义。
    en: A build run writes compatible dense and sparse representations separately; query may read both signals and fusion activity separately generates score or ranking without modifying index definition.
    ja: build run は互換 dense と sparse representation を別々に write する。query は両 signal を読み fusion activity は index definition を変更せず別に score または ranking を生成する。
  typical_input:
    - description: Hybrid-index configuration.
      format: |
        {"index_id":"support-hybrid-v2","index_kind":"hybrid","dense_space_ref":"support-embedding-768","sparse_space_ref":"support-vocabulary-v3","fusion_policy_ref":"rrf-k60","schema_ref":"support-hybrid-schema-v1"}
  typical_output:
    - description: Hybrid-index structure referenced by separate writes and fusion.
      format: |
        {"index_id":"support-hybrid-v2","index_kind":"hybrid","active_version_ref":"support-hybrid-v2-build-3","queryable":true}
  reference_implementations:
    - name: Pinecone hybrid search
      url: https://docs.pinecone.io/guides/search/hybrid-search
      description: Documents dense and sparse components for hybrid search.
    - name: Elasticsearch reciprocal rank fusion
      url: https://www.elastic.co/docs/reference/elasticsearch/rest-apis/reciprocal-rank-fusion
      description: Documents combining ranked result sets with reciprocal rank fusion.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: index ID, ja: index ID}
      definitions:
        zh: 继承 Index 的逻辑索引身份；它标识这个混合索引，而不是一次融合运行。
        en: Inherits the logical Index identity for this hybrid index rather than identifying one fusion run.
        ja: 一つの fusion run ではなく、この hybrid index の論理 Index identity を継承する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: hybrid-index-support-v2
      source_claims: [claim-hybrid-index-structure]
    - id: index_kind
      labels: {zh: 索引类别, en: index kind, ja: index 種別}
      definitions:
        zh: 继承的索引类别，在该子类中固定为 hybrid。
        en: The inherited index kind, fixed to hybrid for this subtype.
        ja: 継承した index kind であり、この subtype では hybrid に固定される。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [hybrid]
      pattern: null
      example_value: hybrid
      source_claims: [claim-hybrid-index-structure]
    - id: dense_space_ref
      labels: {zh: 稠密空间引用, en: dense space reference, ja: dense space 参照}
      definitions:
        zh: 指向混合索引接受的稠密向量空间。
        en: Points to dense vector space accepted by hybrid index.
        ja: hybrid index が受理する dense vector space を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-embedding-768
      source_claims: [claim-hybrid-index-components]
    - id: sparse_space_ref
      labels: {zh: 稀疏空间引用, en: sparse space reference, ja: sparse space 参照}
      definitions:
        zh: 指向混合索引接受的稀疏特征或词汇表空间。
        en: Points to sparse feature or vocabulary space accepted by hybrid index.
        ja: hybrid index が受理する sparse feature または vocabulary space を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vocabulary-v3
      source_claims: [claim-hybrid-index-components]
    - id: fusion_policy_ref
      labels: {zh: 融合策略引用, en: fusion policy reference, ja: fusion policy 参照}
      definitions:
        zh: 指向声明如何组合两类检索信号的策略，而不是融合结果分数。
        en: Points to policy declaring how two retrieval signals are combined rather than fused result score.
        ja: fused result score ではなく二つの retrieval signal の組合せ方を宣言する policy を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: rrf-k60
      source_claims: [claim-hybrid-index-fusion]
    - id: schema_ref
      labels: {zh: 索引架构引用, en: index schema reference, ja: index schema 参照}
      definitions:
        zh: 指向允许两类表示写入及其兼容规则的架构。
        en: Points to schema permitting both representation writes and their compatibility rules.
        ja: 両 representation write と互換 rule を許可する schema を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-hybrid-schema-v1
      source_claims: [claim-hybrid-index-structure]
    - id: active_version_ref
      labels: {zh: 活动版本引用, en: active version reference, ja: active version 参照}
      definitions:
        zh: 可选指向当前活动混合索引版本。
        en: Optionally points to currently active hybrid-index version.
        ja: 現在 active な hybrid-index version を任意に指す。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-hybrid-v2-build-3
      source_claims: [claim-hybrid-index-version]
  constraints:
    - id: hybrid-index-two-spaces-and-fusion
      severity: error
      expression_language: plain
      expression: dense_space_ref, sparse_space_ref, fusion_policy_ref, and schema_ref are required. Every indexed representation must satisfy its declared component space and fusion policy must be explicit before joint retrieval.
      explanation:
        zh: 混合索引必须同时声明两类空间和融合契约，不能只保存一个分量或裸分数。
        en: A hybrid index must declare both spaces and fusion contract and cannot be reduced to one component or bare score.
        ja: hybrid index は両 space と fusion contract を宣言する必要があり一つの component や裸 score に還元できない。
      source_claims: [claim-hybrid-index-components, claim-hybrid-index-fusion, claim-hybrid-index-design]
    - id: hybrid-index-not-fusion-output
      severity: error
      expression_language: plain
      expression: HybridIndex must not contain a single dense or sparse vector, fused query score, final rank, candidate selection, answer text, or database-service endpoint.
      explanation:
        zh: 索引组织契约与表示载荷、融合输出和服务设施必须分离。
        en: Index organization contract must remain separate from representation payload fusion output and service facility.
        ja: index organization contract は representation payload fusion output service facility と分離して保持する。
      source_claims: [claim-hybrid-index-provenance]
  required_relations: []
examples:
  - id: hybrid-index-positive-support

    labels: {zh: 支持文档混合索引, en: Support-document hybrid index, ja: support-document hybrid index}

    descriptions:
      zh: Weaviate hybrid query near_text + BM25 fusionType=RelativeScoreFusion；Anthropic Contextual Embeddings + Contextual BM25 双路检索；Pinecone hybrid alpha=0.5。
      en: Weaviate hybrid near_text + BM25 fusionType=RelativeScoreFusion; Anthropic Contextual Embeddings + Contextual BM25 dual retrieval; Pinecone hybrid alpha=0.5.
      ja: Weaviate hybrid+BM25 RelativeScoreFusion。Anthropic Contextual Embeddings+BM25 双路检索。Pinecone alpha=0.5。
    field_values: {index_id: hybrid-index-support-v2, index_kind: hybrid, dense_space_ref: support-embedding-768, sparse_space_ref: support-vocabulary-v3, fusion_policy_ref: rrf-k60, schema_ref: support-hybrid-schema-v1, active_version_ref: support-hybrid-v2-build-3}
    related_node_ids: [HybridIndex, Index, DenseVector, SparseVector]
    related_relation_ids: [HybridIndex-is_a-Index]

    source_claims: [claim-hybrid-index-structure]
  - id: hybrid-index-counterexample-fused-score

    labels: {zh: 融合分数被误称为混合索引, en: Fused score presented as hybrid index, ja: fused score を hybrid index として提示}

    descriptions:
      zh: 反例：仅 dense VectorIndex 却声明 hybrid 但未配置 sparse/BM25 分量。
      en: Counterexample: dense-only VectorIndex declared hybrid without sparse/BM25 component.
      ja: 反例：dense VectorIndex のみ hybrid 宣言だが sparse/BM25 未設定。
    field_values: {candidate_ref: candidate-support-42, fusion_score: 0.67, rank: 1}
    related_node_ids: [HybridIndex, RankFusion, RetrievalScore]
    related_relation_ids: [HybridIndex-is_a-Index]

    source_claims: [claim-hybrid-index-fusion]
  - id: hybrid-index-boundary-component-change

    labels: {zh: 稀疏空间变更, en: Sparse-space change, ja: sparse-space の変更}

    descriptions:
      zh: HybridIndex 融合 dense+sparse vs TfIdfIndex 纯 lexical；RankFusion RRF 在 RetrievalActivity 层非 Index 层。
      en: HybridIndex fuses dense+sparse vs TfIdfIndex pure lexical; RankFusion RRF at RetrievalActivity layer not Index layer.
      ja: HybridIndex dense+sparse vs TfIdfIndex lexical。RRF は RetrievalActivity 層。
    field_values: {index_id: hybrid-index-support-v3, index_kind: hybrid, dense_space_ref: support-embedding-768, sparse_space_ref: support-vocabulary-v4, fusion_policy_ref: rrf-k60, schema_ref: support-hybrid-schema-v2, active_version_ref: support-hybrid-v3-build-1}
    related_node_ids: [HybridIndex, IndexVersion, SparseVector]
    related_relation_ids: [HybridIndex-is_a-Index]

    source_claims: [claim-hybrid-index-components]
  - id: hybrid-index-instance-pinecone

    labels: {zh: Pinecone 混合搜索实例, en: Pinecone hybrid-search instance, ja: Pinecone hybrid-search の事例}

    descriptions:
      zh: Weaviate collection.query.hybrid(query="AI agents", alpha=0.5, limit=10, filters=Filter.by_property("year").greater_than(2023))。
      en: Weaviate collection.query.hybrid(query="AI agents", alpha=0.5, limit=10, filters=Filter.by_property("year").greater_than(2023)).
      ja: Weaviate hybrid(query="AI agents", alpha=0.5, limit=10, filters year>2023)。
    field_values: {index_id: hybrid-index-pinecone-17, index_kind: hybrid, dense_space_ref: pinecone-dense-1024, sparse_space_ref: pinecone-sparse-v1, fusion_policy_ref: pinecone-hybrid-default, schema_ref: pinecone-hybrid-schema-v1, active_version_ref: pinecone-hybrid-build-17}
    related_node_ids: [HybridIndex, DenseVector, SparseVector]
    related_relation_ids: [HybridIndex-is_a-Index]
    source_claims: [claim-hybrid-index-structure]
parent_relation:
  id: HybridIndex-is_a-Index
  predicate: is_a
  target: concept:Index
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是索引的混合子类, en: is a hybrid subtype of index, ja: Index の hybrid 下位型である}
  definitions:
    zh: HybridIndex 是同时声明稠密和稀疏空间及融合策略的 Index。
    en: HybridIndex is Index that declares dense and sparse spaces with fusion policy.
    ja: HybridIndex は fusion policy と共に dense と sparse space を宣言する Index である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_hybrid_index_subtype, labels: {zh: 具有混合索引子类, en: has hybrid-index subtype, ja: hybrid-index 下位型を持つ}}
  conditions:
    - id: hybrid-index-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when an index defines compatible dense and sparse spaces with explicit fusion policy.
      explanation:
        zh: 子类型差异是双空间和显式融合契约。
        en: The subtype differentia is two spaces with explicit fusion contract.
        ja: subtype の differentia は明示 fusion contract を持つ二つの space である。
      source_claims: [claim-hybrid-index-structure]
  temporal_scope: valid-time
  boundary_context: A fusion activity can produce new scores later without altering the hybrid-index definition.
  constraints: []
  examples: []
  source_claims: [claim-hybrid-index-structure]
  distinct_fact_rationale: This relation classifies hybrid structure and does not express a query fusion result.
  layout_role: primary-backbone
relations: []
sources:
  - id: pinecone-hybrid-search
    title: Pinecone hybrid search
    source_type: official-documentation
    url: https://docs.pinecone.io/guides/search/hybrid-search
    relevance: Documents dense and sparse components for hybrid vector search.
  - id: elasticsearch-rrf
    title: Elasticsearch reciprocal rank fusion
    source_type: official-documentation
    url: https://www.elastic.co/docs/reference/elasticsearch/rest-apis/reciprocal-rank-fusion
    relevance: Documents reciprocal rank fusion over ranked result sets.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates index entities from build query and fusion activities.
source_claims:
  - id: claim-hybrid-index-structure
    source: pinecone-hybrid-search
    supports: Pinecone documents hybrid search using dense and sparse vector components.
    locator: "Hybrid search: dense and sparse vector components"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-hybrid-index-components
    source: pinecone-hybrid-search
    supports: Pinecone hybrid search accepts a dense vector and a sparse vector as separate query inputs.
    locator: "Hybrid search: dense vector and sparse vector input"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-hybrid-index-fusion
    source: elasticsearch-rrf
    supports: Elasticsearch documents reciprocal rank fusion for combining ranked result sets.
    locator: "Reciprocal rank fusion API"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-hybrid-index-version
    source: pinecone-hybrid-search
    supports: Pinecone documents hybrid search as a retrieval operation over dense and sparse vector representations.
    locator: "Hybrid search: index configuration"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-hybrid-index-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes Entity from Activity and defines generation and use relations between them.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-hybrid-index-design
    source: pinecone-hybrid-search
    supports: Moonweave models HybridIndex as an Index subtype that declares both compatible vector spaces, a fusion policy, schema, and active version, separate from a component vector or a fused query result.
    locator: "Moonweave ontology design inference from claim-hybrid-index-structure, claim-hybrid-index-components, claim-hybrid-index-fusion, claim-hybrid-index-version, and claim-hybrid-index-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
