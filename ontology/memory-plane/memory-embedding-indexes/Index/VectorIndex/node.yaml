schema: moonweave.ai/ontology-node/v1
id: VectorIndex
kind: concept
status: accepted
labels:
  zh: 向量索引
  en: Vector index
  ja: ベクトル索引
semantics:
  short_definition:
    zh: 为兼容向量表示按声明度量组织检索条目的索引结构。
    en: An index structure that organizes compatible vector representations for retrieval under a declared metric.
    ja: 宣言された metric の下で互換 vector representation を retrieval 用に組織する index structure。
  definition:
    zh: >-
      VectorIndex 是 Index 的子类型，定义向量空间、维度、相似度度量和活动版本，使兼容向量表示可被写入和搜索。
      它不是单个向量、向量数据库服务、单个索引条目、查询分数、检索候选项或模型上下文。
    en: >-
      A VectorIndex is a subtype of Index that defines vector space, dimension, similarity metric, and active version so
      compatible vector representations may be written and searched. It is not one vector, vector-database service, one index
      entry, query score, retrieval candidate, or model context.
    ja: >-
      VectorIndex は Index の下位型であり、vector space、dimension、similarity metric、active version を定義して互換 vector representation を
      write と search 可能にする。一つの vector、vector-database service、一つの index entry、query score、retrieval candidate、model context ではない。
  why_needed:
    zh: 向量空间和度量定义可比边界；将它们绑定到索引可防止不兼容嵌入被混写或混搜。
    en: Vector space and metric define comparability boundaries; binding them to an index prevents incompatible embeddings from being mixed in writes or searches.
    ja: vector space と metric は comparability boundary を定義する。index に結ぶことで互換でない embedding の write や search での混在を防ぐ。
  includes:
    - zh: 向量空间引用、维度、度量、架构、活动版本和索引身份。
      en: Vector-space reference dimension metric schema active version and index identity.
      ja: vector-space 参照 dimension metric schema active version index identity。
  excludes:
    - zh: 单个嵌入载荷、数据库端点、条目位置、相似度分数、查询结果和答案。
      en: Individual embedding payload database endpoint entry location similarity score query result and answer.
      ja: individual embedding payload database endpoint entry location similarity score query result answer。
  semantic_kind: entity
  aliases: [ANN index, semantic index, 向量检索结构]
engineering:
  explanation:
    zh: 构建运行向已声明向量空间的索引版本写入兼容向量条目；查询运行使用同一度量搜索，返回候选项或分数在单独实体中记录。
    en: A build run writes compatible vector entries to an index version with declared vector space; a query run searches with same metric while returned candidates or scores are recorded separately.
    ja: build run は宣言済み vector space を持つ index version に互換 vector entry を write する。query run は同じ metric で search し returned candidate や score は別 entity に記録する。
  typical_input:
    - description: Vector-index definition for an embedding space.
      format: |
        {"index_id":"support-vector-v3","index_kind":"vector","vector_space_ref":"text-embedding-3-small-1536","dimension":1536,"metric":"cosine","schema_ref":"support-vector-schema-v1"}
  typical_output:
    - description: Index definition referenced by vector writes and search.
      format: |
        {"index_id":"support-vector-v3","index_kind":"vector","active_version_ref":"support-vector-v3-build-7","queryable":true}
  reference_implementations:
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents vector data types and nearest-neighbor search operators.
    - name: FAISS Index API
      url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
      description: Documents vector-index search over numeric representations.
structure:
  identity_keys: [index_id]
  fields:
    - id: index_id
      labels: {zh: 索引标识, en: index ID, ja: index ID}
      definitions:
        zh: 继承 Index 的逻辑索引身份；它标识这个向量索引，而不是数据库服务或版本。
        en: Inherits the logical Index identity for this vector index rather than identifying a database service or version.
        ja: database service や version ではなく、この vector index の論理 Index identity を継承する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: vector-index-support-v3
      source_claims: [claim-vector-index-structure]
    - id: index_kind
      labels: {zh: 索引类别, en: index kind, ja: index 種別}
      definitions:
        zh: 继承的索引类别，在该子类中固定为 vector。
        en: The inherited index kind, fixed to vector for this subtype.
        ja: 継承した index kind であり、この subtype では vector に固定される。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [vector]
      pattern: null
      example_value: vector
      source_claims: [claim-vector-index-structure]
    - id: vector_space_ref
      labels: {zh: 向量空间引用, en: vector space reference, ja: vector space 参照}
      definitions:
        zh: 指向索引接纳的模型和维度空间，限定可写向量。
        en: Points to model-and-dimension space accepted by index and bounds writable vectors.
        ja: index が受理する model-and-dimension space を指し writable vector を制限する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-vector-index-compatibility, claim-vector-index-design]
    - id: dimension
      labels: {zh: 向量维度, en: vector dimension, ja: vector dimension}
      definitions:
        zh: 声明可写向量的坐标数，不是索引条目数量。
        en: Declares coordinate count of writable vectors and is not index-entry count.
        ja: writable vector の coordinate count を宣言し index-entry count ではない。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims: [claim-vector-index-compatibility]
    - id: metric
      labels: {zh: 相似度度量, en: similarity metric, ja: similarity metric}
      definitions:
        zh: 声明索引搜索使用的向量比较度量，不是某次搜索得分。
        en: Declares vector-comparison metric used by index search and is not a score from one search.
        ja: index search が使う vector-comparison metric を宣言し一回の search score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [cosine, inner_product, l2_distance]
      pattern: null
      example_value: cosine
      source_claims: [claim-vector-index-compatibility]
    - id: schema_ref
      labels: {zh: 索引架构引用, en: index schema reference, ja: index schema 参照}
      definitions:
        zh: 指向定义可写字段与向量兼容规则的架构。
        en: Points to schema defining writable fields and vector compatibility rules.
        ja: writable field と vector compatibility rule を定義する schema を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vector-schema-v1
      source_claims: [claim-vector-index-structure]
    - id: active_version_ref
      labels: {zh: 活动版本引用, en: active version reference, ja: active version 参照}
      definitions:
        zh: 可选指向当前用于写入或查询的索引版本。
        en: Optionally points to index version currently used for writes or queries.
        ja: 現在 write または query に使う index version を任意に指す。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: support-vector-v3-build-7
      source_claims: [claim-vector-index-version]
  constraints:
    - id: vector-index-space-and-metric
      severity: error
      expression_language: plain
      expression: vector_space_ref, dimension, metric, and schema_ref are required. Every indexed vector must match the declared dimension and compatible vector space before IndexEntry creation.
      explanation:
        zh: 向量索引必须明确空间、维度和度量，防止不兼容向量静默混入。
        en: A vector index must declare space dimension and metric to prevent incompatible vectors from silently mixing.
        ja: vector index は space dimension metric を宣言し互換でない vector の無言の混在を防ぐ必要がある。
      source_claims: [claim-vector-index-compatibility]
    - id: vector-index-not-vector-or-result
      severity: error
      expression_language: plain
      expression: VectorIndex must not contain a vector payload, index-entry location, query similarity value, retrieval rank, candidate list, or answer text.
      explanation:
        zh: 索引结构定义组织契约，载荷与检索结果是独立数据。
        en: Index structure defines organization contract while payload and retrieval results are independent data.
        ja: index structure は organization contract を定義し payload と retrieval result は独立 data である。
      source_claims: [claim-vector-index-provenance]
  required_relations: []
examples:
  - id: vector-index-positive-support

    labels: {zh: 支持文档向量索引, en: Support-document vector index, ja: support-document vector index}

    descriptions:
      zh: Pinecone index.upsert(vectors=[("id1", [0.1,...], {"text":...})]) serverless；Weaviate near_text hybrid；Qdrant HNSW collection；pgvector CREATE INDEX ON items USING hnsw (embedding vector_cosine_ops)。
      en: Pinecone index.upsert serverless; Weaviate near_text hybrid; Qdrant HNSW collection; pgvector CREATE INDEX USING hnsw (embedding vector_cosine_ops).
      ja: Pinecone upsert serverless。Weaviate hybrid。Qdrant HNSW。pgvector hnsw index。
    field_values: {index_id: vector-index-support-v3, index_kind: vector, vector_space_ref: text-embedding-3-small-1536, dimension: 1536, metric: cosine, schema_ref: support-vector-schema-v1, active_version_ref: support-vector-v3-build-7}
    related_node_ids: [VectorIndex, Index, EmbeddingVector]
    related_relation_ids: [VectorIndex-is_a-Index]

    source_claims: [claim-vector-index-structure]
  - id: vector-index-counterexample-service

    labels: {zh: 数据库服务被误称为向量索引, en: Database service presented as vector index, ja: database service を vector index として提示}

    descriptions:
      zh: 反例：Pinecone match score 标为 SimilarityScore 但未记录 embedding model/dimensions 与 IndexVersion。
      en: Counterexample: Pinecone match score as SimilarityScore without embedding model/dimensions and IndexVersion.
      ja: 反例：Pinecone match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {vector_database_id: vector-db-prod, endpoint_ref: vector-db-prod-endpoint, hosted_index_count: 12}
    related_node_ids: [VectorIndex, VectorDatabase, Index]
    related_relation_ids: [VectorIndex-is_a-Index]

    source_claims: [claim-vector-index-structure]
  - id: vector-index-boundary-metric-change

    labels: {zh: 度量变化, en: Metric change, ja: metric の変更}

    descriptions:
      zh: ColBERT MaxSim token-level index vs dense VectorIndex cosine；HybridIndex 融合不同分数空间。
      en: ColBERT MaxSim token-level index vs dense VectorIndex cosine; HybridIndex fuses distinct score spaces.
      ja: ColBERT MaxSim vs dense VectorIndex cosine。HybridIndex 異 score space 融合。
    field_values: {index_id: vector-index-support-l2, index_kind: vector, vector_space_ref: text-embedding-3-small-1536, dimension: 1536, metric: l2_distance, schema_ref: support-vector-schema-v2, active_version_ref: support-vector-l2-build-1}
    related_node_ids: [VectorIndex, IndexVersion, IndexBuildRun]
    related_relation_ids: [VectorIndex-is_a-Index]

    source_claims: [claim-vector-index-compatibility]
  - id: vector-index-instance-pgvector

    labels: {zh: pgvector 索引实例, en: pgvector index instance, ja: pgvector index の事例}

    descriptions:
      zh: pgvector SELECT * FROM items ORDER BY embedding <=> '[0.1,0.2,...]' LIMIT 5；Redis FT.CREATE idx VECTOR HNSW 6 TYPE FLOAT32 DIM 1536。
      en: pgvector SELECT ORDER BY embedding <=> query LIMIT 5; Redis FT.CREATE idx VECTOR HNSW 6 TYPE FLOAT32 DIM 1536.
      ja: pgvector <=> LIMIT 5。Redis FT.CREATE VECTOR HNSW DIM 1536。
    field_values: {index_id: vector-index-pgvector-17, index_kind: vector, vector_space_ref: support-embedding-768, dimension: 768, metric: l2_distance, schema_ref: pgvector-schema-v1, active_version_ref: pgvector-build-17}
    related_node_ids: [VectorIndex, IndexEntry, DenseVector]
    related_relation_ids: [VectorIndex-is_a-Index]
    source_claims: [claim-vector-index-structure]
parent_relation:
  id: VectorIndex-is_a-Index
  predicate: is_a
  target: concept:Index
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是索引的向量子类, en: is a vector subtype of index, ja: Index の vector 下位型である}
  definitions:
    zh: VectorIndex 是以向量空间和度量为差异的 Index。
    en: VectorIndex is Index with the differentia of vector space and vector metric.
    ja: VectorIndex は vector space と vector metric を差異とする Index である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_vector_index_subtype, labels: {zh: 具有向量索引子类, en: has vector-index subtype, ja: vector-index 下位型を持つ}}
  conditions:
    - id: vector-index-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when index declares vector space dimension and metric compatibility for vector representations.
      explanation:
        zh: 子类型差异是面向向量表示的空间和度量契约。
        en: The subtype differentia is space and metric contract for vector representations.
        ja: subtype の differentia は vector representation の space と metric contract である。
      source_claims: [claim-vector-index-structure]
  temporal_scope: valid-time
  boundary_context: An index can add entries or activate a new version without changing that it is a vector index.
  constraints: []
  examples: []
  source_claims: [claim-vector-index-structure]
  distinct_fact_rationale: This relation classifies vector-index structure and does not express vector writes or search results.
  layout_role: primary-backbone
relations: []
sources:
  - id: pgvector
    title: pgvector
    source_type: official-documentation
    url: https://github.com/pgvector/pgvector
    relevance: Documents vector types and nearest-neighbor vector search.
  - id: faiss-index-api
    title: FAISS Index API
    source_type: official-documentation
    url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
    relevance: Documents index search over numeric vectors.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates index entities from activities that build and query them.
source_claims:
  - id: claim-vector-index-structure
    source: pgvector
    supports: pgvector documents vector types and nearest-neighbor search.
    locator: "README: vector type indexes and nearest-neighbor search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-vector-index-compatibility
    source: faiss-index-api
    supports: FAISS Index operates over numeric vectors of a configured dimension.
    locator: "Index API: vector dimension and search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-vector-index-version
    source: pgvector
    supports: pgvector documents vector index configuration and vector data storage for nearest-neighbor search.
    locator: "README: index and storage configuration"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-vector-index-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes Entity from Activity and defines generation and use relations between them.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-vector-index-design
    source: w3c-prov-o
    supports: Moonweave models VectorIndex as the vector-specific Index subtype with metric, schema, active version, and declared vector-space compatibility, separate from vectors, build activities, and query results.
    locator: "Moonweave ontology design inference from claim-vector-index-structure, claim-vector-index-compatibility, claim-vector-index-version, and claim-vector-index-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
