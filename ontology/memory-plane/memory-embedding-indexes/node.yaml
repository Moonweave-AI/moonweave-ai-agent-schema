schema: moonweave.ai/ontology-node/v1
id: memory-embedding-indexes
kind: module
status: review
labels:
  zh: 检索表示与索引
  en: Retrieval representations and indexes
  ja: 検索表現と索引
semantics:
  short_definition:
    zh: 检索表示与索引区分三种身份：Representation 是从内容派生的可比较表示；Index 及其版本、分片和条目是可持续查询的结构；IndexActivity 是生成表示、构建或刷新索引的活动。VectorDatabase 只是托管这些索引的存储后端，不是 Index 子类。
    en: "Representations and indexes describes three connected but distinct lines: how source content becomes an indexable Representation, how a logical Index unfolds into immutable IndexVersion, IndexShard, and IndexEntry records, and how IndexActivity generates representations or builds versions. The stores domain owns VectorDatabase; this module references it only through the hosts fact that identifies its VectorIndex."
    ja: 表現と索引は、出典内容から Representation、論理 Index から不変 IndexVersion・IndexShard・IndexEntry、IndexActivity から表現・版生成という三系統を分離します。VectorDatabase は store domain が所有し、本 module はどの VectorIndex を hosts するかという fact だけで参照します。
  definition:
    zh: 表示与索引描述三条相互衔接但不混同的主线：源内容如何形成可索引的 Representation，逻辑 Index 如何展开为不可变 IndexVersion、IndexShard 与 IndexEntry，以及 IndexActivity 如何生成表示或构建版本。存储域拥有 VectorDatabase，本模块只通过 hosts 事实说明某个数据库托管哪个 VectorIndex。
    en: "Representations and indexes describes three connected but distinct lines: how source content becomes an indexable Representation, how a logical Index unfolds into immutable IndexVersion, IndexShard, and IndexEntry records, and how IndexActivity generates representations or builds versions. The stores domain owns VectorDatabase; this module references it only through the hosts fact that identifies its VectorIndex."
    ja: 表現と索引は、出典内容から Representation、論理 Index から不変 IndexVersion・IndexShard・IndexEntry、IndexActivity から表現・版生成という三系統を分離します。VectorDatabase は store domain が所有し、本 module はどの VectorIndex を hosts するかという fact だけで参照します。
  why_needed:
    zh: 把记忆内容转换为可版本化表示，并组织为可构建、刷新和定位条目的持久索引。
    en: Convert memory content into versioned representations and organize it in persistent indexes whose entries can be built, refreshed, and located.
    ja: 記憶内容を版管理可能な表現へ変換し、構築、更新、条目位置付けが可能な永続索引として組織します。
  includes:
    - zh: Representation → VectorRepresentation；其下区分 DenseVector、SparseVector 与由模型生成的 EmbeddingVector，后者再细分为 TextEmbedding 和 GraphEmbedding。
      en: Representation to VectorRepresentation, then DenseVector, SparseVector, and model-generated EmbeddingVector, with TextEmbedding and GraphEmbedding below the latter.
      ja: Representation から VectorRepresentation へ進み、その下で DenseVector、SparseVector、モデル生成の EmbeddingVector を区別し、さらに後者を TextEmbedding と GraphEmbedding に分けます。
    - zh: Index 的向量、混合与 TF-IDF 专化，IndexVersion → IndexShard → IndexEntry 的组成链，以及 EmbeddingRun、IndexBuildRun 与 IndexRefreshRun 的活动链。
      en: Vector, hybrid, and TF-IDF specializations of Index; the IndexVersion to IndexShard to IndexEntry composition chain; and the EmbeddingRun, IndexBuildRun, and IndexRefreshRun activity chain.
      ja: Index のベクトル、ハイブリッド、TF-IDF 特殊化、IndexVersion から IndexShard、IndexEntry へ続く構成連鎖、および EmbeddingRun、IndexBuildRun、IndexRefreshRun の活動連鎖。
  excludes:
    - zh: EmbeddingModel 的模型身份与版本由运行时本体拥有，本模块只通过 EmbeddingRun 引用；VectorDatabase 虽可托管 VectorIndex，但不进入 Index 分类主链。
      en: Runtime ontology owns EmbeddingModel identity and version, which this module only references through EmbeddingRun; VectorDatabase may host a VectorIndex but does not enter the Index taxonomy.
      ja: EmbeddingModel の同一性と版は実行時オントロジーが所有し、本モジュールは EmbeddingRun を通じて参照するだけです。VectorDatabase は VectorIndex をホストできますが、Index の分類主系統には入りません。
    - zh: Query、候选、评分、融合和重排活动归检索与排序；索引不拥有一次检索结果。
      en: Query, candidates, scores, fusion, and reranking activities belong to retrieval and ranking; an index does not own a retrieval result.
      ja: Query、候補、得点、融合、再順位付け活動は検索と順位付けに属し、索引は検索結果を所有しません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把记忆内容转换为可版本化表示，并组织为可构建、刷新和定位条目的持久索引。
  en: Convert memory content into versioned representations and organize it in persistent indexes whose entries can be built, refreshed, and located.
  ja: 記憶内容を版管理可能な表現へ変換し、構築、更新、条目位置付けが可能な永続索引として組織します。
structure: null
examples:
  - id: memory-embedding-indexes-cq-representation-lineage-v3-example-positive
    kind: positive
    labels:
      zh: 嵌入来源链正例
      en: Positive embedding-lineage case
      ja: embedding来歴chain正例
    scenario_id: embedding-lineage-17
    descriptions:
      zh: embedding-run-17 明确消费 chunk-17@3、调用 text-embedding-3-small@2026-07 并产生 emb-17；emb-17 的 input_digest 又与 chunk-17@3 完全一致。
      en: embedding-run-17 explicitly consumes chunk-17@3, invokes text-embedding-3-small@2026-07, and produces emb-17; emb-17's input_digest exactly matches chunk-17@3.
      ja: embedding-run-17 は chunk-17@3 を明示消費し text-embedding-3-small@2026-07 を呼び emb-17 を生成し、emb-17 の input_digest も chunk-17@3 と完全一致します。
    field_values:
      run_id: embedding-run-17
      chunk_version: chunk-17@3
      model_snapshot: text-embedding-3-small@2026-07
      embedding_id: emb-17
    related_node_ids:
      - EmbeddingRun
      - Chunk
      - EmbeddingModel
      - EmbeddingVector
    related_relation_ids:
      - EmbeddingRun-consumes-Chunk
      - EmbeddingRun-uses-EmbeddingModel
      - EmbeddingRun-produces-EmbeddingVector
      - EmbeddingVector-represents-Chunk
    expected_result:
      zh: 返回唯一且方向一致的 Chunk → 运行输入、模型使用、向量生成与表示对象链。
      en: Return one directionally consistent chain covering the Chunk input, model use, vector generation, and represented object.
      ja: Chunk入力、model使用、vector生成、表現対象を結ぶ方向整合した一意chainを返します。
    why_valid_or_invalid:
      zh: 运行清单、模型快照、生成 ID 与输入摘要四项能够相互核对，没有借助已退役的泛化 Embedding 节点。
      en: Run manifest, model snapshot, generating ID, and input digest cross-check without relying on the retired generic Embedding node.
      ja: run manifest、model snapshot、generating ID、input digestを相互照合でき、廃止済みgeneric Embedding nodeに依存しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-embedding-indexes-005
  - id: memory-embedding-indexes-cq-representation-lineage-v3-example-counter
    kind: counterexample
    labels:
      zh: 嵌入来源链反例
      en: "Counterexample: missing embedding lineage"
      ja: embedding来歴chain反例
    scenario_id: embedding-lineage-missing-run-18
    descriptions:
      zh: emb-18 与 chunk-18 同在一个索引条目中且维数相同，但没有 generating_run_id、模型快照或匹配的 input_digest；共同存储不能补出生成链。
      en: emb-18 and chunk-18 appear in the same index entry and share dimensionality, but no generating_run_id, model snapshot, or matching input_digest exists; co-storage cannot reconstruct generation lineage.
      ja: emb-18 と chunk-18 は同じindex entryにあり次元も同じですが、generating_run_id、model snapshot、一致input_digestがなく、共通保存から生成来歴を補えません。
    field_values:
      embedding_id: emb-18
      missing:
        - generating_run_id
        - model_snapshot
        - input_digest
    related_node_ids:
      - EmbeddingVector
      - Chunk
      - EmbeddingRun
      - EmbeddingModel
    related_relation_ids:
      - EmbeddingRun-consumes-Chunk
      - EmbeddingRun-uses-EmbeddingModel
      - EmbeddingRun-produces-EmbeddingVector
      - EmbeddingVector-represents-Chunk
    expected_result:
      zh: 查询必须报告来源链不完整，不得依据同条目或同维数推断四条关系。
      en: The query must report incomplete lineage and must not infer the four relations from shared entry or dimensionality.
      ja: queryは来歴不完全を報告し、同entry・同次元だけで四relationを推論してはいけません。
    why_valid_or_invalid:
      zh: 索引邻接是存储事实，不是活动消费、模型使用、生成和表示事实。
      en: Index adjacency is a storage fact, not activity consumption, model use, generation, or representation.
      ja: index隣接は保存factであり、activity consumption・model use・generation・representationではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-embedding-indexes-006
  - id: memory-embedding-indexes-cq-entry-version-membership-v3-example-positive
    kind: positive
    labels:
      zh: 索引成员链正例
      en: Positive index-membership chain
      ja: index membership chain正例
    scenario_id: index-membership-17-42-03
    descriptions:
      zh: index-17@42 是 index-17 的版本，包含 shard-03；shard-03 的分区边界包含 entry-17 的键，而 entry-17 明确保存 rep-17 的 ID 与摘要。
      en: index-17@42 is a version of index-17 and contains shard-03; shard-03's partition boundary contains entry-17's key, and entry-17 explicitly stores rep-17's ID and digest.
      ja: index-17@42 は index-17 の版で shard-03 を含み、shard-03 のpartition境界は entry-17 のkeyを含み、entry-17 は rep-17 のIDとdigestを明示保存します。
    field_values:
      index_id: index-17
      version: 42
      shard_id: shard-03
      entry_id: entry-17
      representation_id: rep-17
    related_node_ids:
      - Index
      - IndexVersion
      - IndexShard
      - IndexEntry
      - Representation
    related_relation_ids:
      - IndexVersion-version_of-Index
      - IndexVersion-contains-IndexShard
      - IndexShard-contains-IndexEntry
      - IndexEntry-stores-Representation
    expected_result:
      zh: 沿四条已接受关系返回唯一的 IndexVersion → IndexShard → IndexEntry 成员路径及其 Representation。
      en: Return the unique IndexVersion-to-IndexShard-to-IndexEntry membership path and its Representation through the four accepted relations.
      ja: 四つの承認済みrelationを通じ、一意の IndexVersion→IndexShard→IndexEntry membership pathとその Representation を返します。
    why_valid_or_invalid:
      zh: 版本复合身份、分区边界、条目键及表示摘要全部一致，未跳过版本或分片层。
      en: Composite version identity, partition boundary, entry key, and representation digest all agree, with no skipped version or shard level.
      ja: 複合version同一性、partition境界、entry key、representation digestがすべて一致し、版・shard階層を飛ばしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-embedding-indexes-007
  - id: memory-embedding-indexes-cq-entry-version-membership-v3-example-counter
    kind: counterexample
    labels:
      zh: 索引成员链反例
      en: "Counterexample: mismatched index membership"
      ja: index membership chain反例
    scenario_id: index-membership-version-mismatch
    descriptions:
      zh: entry-17-copy 的键属于 index-17@43 的 shard-04；即使 entry_id 与 rep-17 相同，也不能挂到 index-17@42 的 shard-03。
      en: entry-17-copy's key belongs to shard-04 of index-17@43; even with the same entry_id and rep-17, it cannot be attached to shard-03 of index-17@42.
      ja: entry-17-copy のkeyは index-17@43 の shard-04 に属し、同じ entry_id と rep-17 を持っても index-17@42 の shard-03 へ付けられません。
    field_values:
      entry_id: entry-17
      actual_version: 43
      actual_shard: shard-04
      proposed_version: 42
      proposed_shard: shard-03
    related_node_ids:
      - IndexVersion
      - IndexShard
      - IndexEntry
      - Representation
    related_relation_ids:
      - IndexVersion-contains-IndexShard
      - IndexShard-contains-IndexEntry
      - IndexEntry-stores-Representation
    expected_result:
      zh: 拒绝跨版本、跨分区拼接路径，并指出 version 与 partition boundary 不匹配。
      en: Reject the cross-version, cross-partition path and report the version and partition-boundary mismatch.
      ja: cross-version・cross-partition pathを拒否し、versionとpartition boundaryの不一致を報告します。
    why_valid_or_invalid:
      zh: 条目 ID 或表示相同不能覆盖不可变版本和分片成员约束。
      en: Equal entry ID or representation cannot override immutable-version and shard-membership constraints.
      ja: 同entry ID・representationでもimmutable versionとshard membership制約を上書きできません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-embedding-indexes-008
  - id: memory-embedding-indexes-cq-refresh-visibility-v3-example-positive
    kind: positive
    labels:
      zh: 索引刷新链正例
      en: Positive index-refresh chain
      ja: index refresh chain正例
    scenario_id: index-refresh-43
    descriptions:
      zh: refresh-event-43 记录 source-change 并触发 refresh-run-43；该运行以 index-17@42 为 predecessor，应用 delta43 后成功发布同一 index-17 的 @43。
      en: refresh-event-43 records a source change and triggers refresh-run-43; the run uses index-17@42 as predecessor, applies delta43, and successfully publishes @43 for the same index-17.
      ja: refresh-event-43 は source-change を記録して refresh-run-43 をtriggerし、runは index-17@42 をpredecessorとして delta43 を適用し、同じ index-17 の @43 を公開します。
    field_values:
      event_id: refresh-event-43
      run_id: refresh-run-43
      predecessor: index-17@42
      successor: index-17@43
    related_node_ids:
      - IndexRefreshEvent
      - IndexRefreshRun
      - IndexVersion
      - Index
    related_relation_ids:
      - IndexRefreshEvent-triggers-IndexRefreshRun
      - IndexRefreshRun-consumes-IndexVersion
      - IndexRefreshRun-produces-IndexVersion
    expected_result:
      zh: 返回一个触发事件、一个前序版本和一个已发布后继版本，并确认前后属于同一逻辑 Index。
      en: Return one trigger event, one predecessor, and one published successor and confirm that both versions belong to the same logical Index.
      ja: 一trigger event、一predecessor版、一published successor版を返し、前後が同じ論理 Index に属すると確認します。
    why_valid_or_invalid:
      zh: 事件绑定、运行输入与成功输出均有独立事实，运行本身不被误写为 supersedes 版本。
      en: Event binding, run input, and successful output are independent facts; the run itself is not mislabeled as superseding a version.
      ja: event binding、run input、成功outputが独立factで、run自体をversion supersedeと誤記しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-embedding-indexes-009
  - id: memory-embedding-indexes-cq-refresh-visibility-v3-example-counter
    kind: counterexample
    labels:
      zh: 索引刷新链反例
      en: "Counterexample: failed refresh"
      ja: index refresh chain反例
    scenario_id: index-refresh-failed-44
    descriptions:
      zh: refresh-event-44 启动 refresh-run-44，运行读取 index-17@43 后失败且没有发布 @44；不能把计划版本号或原版本重新使用解释为新后继版本。
      en: refresh-event-44 starts refresh-run-44, which reads index-17@43 but fails without publishing @44; a planned version number or reuse of the old version is not a new successor.
      ja: refresh-event-44 は refresh-run-44 を開始しますが、runは index-17@43 を読んだ後失敗し @44 を公開しません。計画版番号や旧版再利用を新successorとはみなしません。
    field_values:
      event_id: refresh-event-44
      run_id: refresh-run-44
      predecessor: index-17@43
      status: failed
      successor: null
    related_node_ids:
      - IndexRefreshEvent
      - IndexRefreshRun
      - IndexVersion
    related_relation_ids:
      - IndexRefreshEvent-triggers-IndexRefreshRun
      - IndexRefreshRun-consumes-IndexVersion
      - IndexRefreshRun-produces-IndexVersion
    expected_result:
      zh: 保留触发与消费事实，但不得返回 produces 后继版本。
      en: Retain the trigger and consumption facts but do not return a produced successor version.
      ja: triggerとconsumption factは保持しますが、produced successor版を返してはいけません。
    why_valid_or_invalid:
      zh: 构建尝试不等于成功发布；只有完成并登记的不可变快照才是输出版本。
      en: A build attempt is not a successful publication; only a completed and registered immutable snapshot is an output version.
      ja: build attemptは成功publicationではなく、完了・登録済みimmutable snapshotだけがoutput版です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-embedding-indexes-010
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 嵌入/索引输入由 Chunk、EmbeddingModel 与 Representation 三类精确事实组成；消费、使用和构建关系分别表达，不再用 embeds 混合。
          en: Embedding/index input is expressed by precise Chunk, EmbeddingModel, and Representation facts; consumption, model use, and index construction remain separate rather than being conflated by embeds.
          ja: embedding/index入力は Chunk・EmbeddingModel・Representation のexact factで表しconsumption・model use・index buildをembedsで混同しません。
        family_concept_ids:
          - Chunk
          - EmbeddingModel
          - Representation
        relation_ids:
          - EmbeddingRun-consumes-Chunk
          - EmbeddingRun-uses-EmbeddingModel
          - IndexBuildRun-consumes-Representation
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出只保留生成的 EmbeddingVector 与不可变 IndexVersion，两者均由具体活动产生。
          en: Outputs are limited to generated EmbeddingVector and immutable IndexVersion, each produced by a concrete activity.
          ja: outputは生成 EmbeddingVector とimmutable IndexVersionに限定し各々を具体activityが生成します。
        family_concept_ids:
          - EmbeddingVector
          - IndexVersion
        relation_ids:
          - EmbeddingRun-produces-EmbeddingVector
          - IndexBuildRun-produces-IndexVersion
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本模块记录 EmbeddingRun、IndexBuildRun 与 IndexRefreshRun 的状态和产物，但不定义错误分类或失败裁决；运行时或反馈模块可引用 activity_id 与 status 关联 ErrorEvent。
          en: This module records EmbeddingRun, IndexBuildRun, and IndexRefreshRun status and outputs but does not define error classification or failure adjudication; runtime or feedback modules may link an ErrorEvent by activity_id and status.
          ja: 本moduleは EmbeddingRun・IndexBuildRun・IndexRefreshRun のstatusとoutputを記録しますが、error分類やfailure裁定は定義しません。runtime／feedback moduleが activity_id とstatusで ErrorEvent を関連付けます。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: IndexRefreshRun 是正常版本维护而非故障恢复；重试、回滚或会话恢复由运行时控制，本模块只提供前序/后继 IndexVersion 与构建来源供其引用。
          en: IndexRefreshRun is normal version maintenance, not failure recovery; retry, rollback, or session recovery belongs to runtime control, which may reference predecessor/successor IndexVersion and build provenance here.
          ja: IndexRefreshRun は通常の版保守でfailure recoveryではありません。retry・rollback・session recoveryはruntime controlが所有し、本moduleのpredecessor／successor IndexVersionとbuild来歴を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 输入由 Chunk、EmbeddingModel、Representation 的 consumes/uses/consumes 事实组成；输出仅由具体活动产生 EmbeddingVector 与 IndexVersion，失败/恢复不在本模块裁决。
            en: Inputs are consumes or uses facts over Chunk, EmbeddingModel, and Representation; outputs are only EmbeddingVector and IndexVersion produced by concrete activities, while failure and recovery adjudication are out of scope.
            ja: inputは Chunk・EmbeddingModel・Representationのconsumes／uses fact、outputは具体activity生成 EmbeddingVector／IndexVersionだけで、failure／recovery裁定はscope外です。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 输入由 Chunk、EmbeddingModel、Representation 的 consumes/uses/consumes 事实组成；输出仅由具体活动产生 EmbeddingVector 与 IndexVersion，失败/恢复不在本模块裁决。
            en: Inputs are consumes or uses facts over Chunk, EmbeddingModel, and Representation; outputs are only EmbeddingVector and IndexVersion produced by concrete activities, while failure and recovery adjudication are out of scope.
            ja: inputは Chunk・EmbeddingModel・Representationのconsumes／uses fact、outputは具体activity生成 EmbeddingVector／IndexVersionだけで、failure／recovery裁定はscope外です。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - IndexActivity
    allowed_backbone_predicates:
      - builds
      - contains
      - consumes
      - is_a
      - triggers
      - version_of
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后保留 Representation、Index、IndexActivity 三条主根与 IndexRefreshEvent 一个事件根。VectorDatabase 的服务、端点与持久化身份归 memory-stores-scopes；本模块只保留 VectorDatabase-hosts-VectorIndex 作为跨域引用，不把存储服务加入索引分类。
            en: Point-by-point review retains Representation, Index, and IndexActivity as key roots and IndexRefreshEvent as one event root. VectorDatabase service, endpoint, and persistence identity belong to memory-stores-scopes; this module retains only VectorDatabase-hosts-VectorIndex as a cross-domain reference and does not classify the storage service as an index.
            ja: 個別審査後、Representation・Index・IndexActivity の key root と IndexRefreshEvent の event root を維持します。VectorDatabase の service・endpoint・persistence identity は memory-stores-scopes に属し、本 module は VectorDatabase-hosts-VectorIndex だけを cross-domain reference として保持します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: IndexActivity 是唯一域内根。IndexBuildRun 通过 consumes 接到输入 Representation，并通过 builds 接到具有独立身份与版本序列的 Index；IndexVersion 再由 version_of 展开。IndexRefreshRun 的 triggers 关系以运行→事件展示，consumes baseline version 保持跨链。严格限定具体 IndexBuildRun，避免把只计算 Embedding 的 IndexActivity 错说成构建索引。
            en: IndexActivity is the sole intra-domain root. IndexBuildRun reaches input Representation through consumes and an independently identified, versioned Index through builds; IndexVersion then unfolds through version_of. IndexRefreshRun displays its triggers relation as run→event, while consuming a baseline version remains cross-link. The build branch deliberately uses concrete IndexBuildRun so an embedding-only IndexActivity is not falsely said to construct an index.
            ja: IndexActivity を唯一 domain root とします。IndexBuildRun は consumes で input Representation、builds で独立 identity/version sequence を持つ Index に接続し、IndexVersion は version_of で展開します。IndexRefreshRun の triggers は run→event 表示、baseline version consumes は cross-link です。具体的 IndexBuildRun に限定し embedding-only IndexActivity を index build と誤記しません。
