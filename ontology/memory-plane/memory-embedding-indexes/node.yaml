schema: moonweave.ai/ontology-node/v1
id: memory-embedding-indexes
kind: module
labels:
  zh: 检索表示与索引
  en: Retrieval representations and indexes
  ja: 検索表現と索引
semantics:
  short_definition:
    zh: 把内容变成向量并建成可查询索引。
    en: Turns content into vectors and builds queryable indexes.
    ja: 内容をベクトル化し検索可能索引を構築します。
  definition:
    zh: 表示与索引描述三条衔接主线：源内容如何经 EmbeddingRun 形成 EmbeddingVector 等 Representation；逻辑 Index 如何展开为不可变 IndexVersion、IndexShard 与 IndexEntry；IndexBuildRun 与 IndexRefreshRun 如何构建或刷新版本。EmbeddingModel 身份由运行时本体拥有，本模块通过 run 引用模型快照。VectorDatabase 的部署身份归存储模块，此处只记录 hosts 关系；Query、候选与重排归检索与排序。
    en: "Representations and indexes covers three linked lines: how source content becomes EmbeddingVector and other Representations via EmbeddingRun; how logical Index unfolds into immutable IndexVersion, IndexShard, and IndexEntry; and how IndexBuildRun and IndexRefreshRun build or refresh versions. Runtime ontology owns EmbeddingModel identity referenced through run snapshots. VectorDatabase deployment identity belongs to stores; only the hosts relation is recorded here. Query, candidates, and reranking belong to retrieval and ranking."
    ja: 表現と索引は三主線：源内容が EmbeddingRun で EmbeddingVector 等 Representation になる流れ、論理 Index が IndexVersion・IndexShard・IndexEntry に展開される流れ、IndexBuildRun/IndexRefreshRun による構築・更新。EmbeddingModel identity は runtime 本体が所有し run snapshot で参照。VectorDatabase 部署 identity は store 模块、ここでは hosts のみ。Query・候補・rerank は検索と順位付け。
  why_needed:
    zh: 没有可追溯的嵌入与索引血缘，团队无法回答“这条向量用哪个模型、来自哪个 chunk 版本、存在哪个 index 版的哪个 shard”。重建索引后旧查询仍命中旧 entry，或仅凭同维度向量推断生成链，都会导致 RAG 结果不可审计。
    en: Without traceable embedding and index lineage, teams cannot answer which model produced a vector, which chunk version it came from, or which shard of which index version holds it. Queries hitting stale entries after rebuild, or inferring lineage from dimensionality alone, make RAG results non-auditable.
    ja: 追跡可能な embedding/index 来歴がなければ、どの model・chunk 版・index 版/shard か答えられません。再構築後に旧 entry を hit したり、次元一致だけで生成鎖を推論すると RAG 結果が監査不能になります。
  includes:
    - zh: EmbeddingRun、EmbeddingVector、DenseVector/SparseVector 表示链，以及 Index、IndexVersion、IndexShard、IndexEntry 组成链。
      en: EmbeddingRun, EmbeddingVector, dense/sparse representation chains, and Index, IndexVersion, IndexShard, IndexEntry composition chains.
      ja: EmbeddingRun、EmbeddingVector、dense/sparse 表現連鎖、Index・IndexVersion・IndexShard・IndexEntry 構成連鎖。
    - zh: IndexBuildRun、IndexRefreshRun、IndexRefreshEvent 等构建与刷新活动及其产物版本。
      en: IndexBuildRun, IndexRefreshRun, IndexRefreshEvent, and other build/refresh activities with output versions.
      ja: IndexBuildRun、IndexRefreshRun、IndexRefreshEvent 等の構築・更新 activity と output 版。
  excludes:
    - zh: EmbeddingModel 可复用模型身份（runtime-actors）；VectorDatabase 服务端点（memory-stores-scopes）；RetrievalRun 与候选分数。
      en: Reusable EmbeddingModel identity (runtime-actors); VectorDatabase service endpoints (memory-stores-scopes); RetrievalRun and candidate scores.
      ja: 再利用 EmbeddingModel identity（runtime-actors）、VectorDatabase 端点（memory-stores-scopes）、RetrievalRun と候補 score。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 OpenAI POST /v1/embeddings、Voyage AI embeddings、Pinecone create_index（metric/dimension/pod spec）、Chroma embedding_function、以及 HNSW/IVF 索引参数。EmbeddingRun 必须绑定 input digest 与 model snapshot；IndexBuildRun 成功才产生 IndexVersion，失败尝试不得冒充已发布版本。
    en: Integrations should map OpenAI POST /v1/embeddings, Voyage AI embeddings, Pinecone create_index (metric/dimension/pod spec), Chroma embedding_function, and HNSW/IVF index parameters separately. EmbeddingRun must bind input digest and model snapshot; IndexBuildRun produces IndexVersion only on success—failed attempts must not pose as published versions.
    ja: 統合では OpenAI POST /v1/embeddings、Voyage AI embeddings、Pinecone create_index、Chroma embedding_function、HNSW/IVF 参数を個別写像。EmbeddingRun は input digest と model snapshot 必須。IndexBuildRun は成功時のみ IndexVersion 生成、失敗を published 版と偽装不可。
  typical_input:
    - description: OpenAI embeddings — model, input text, optional dimensions.
      format: |
        POST https://api.openai.com/v1/embeddings
        {
          "model": "text-embedding-3-small",
          "input": "Prefers TypeScript for code examples.",
          "dimensions": 1536,
          "encoding_format": "float"
        }
      source_claims: [claim-memory-embedding-indexes-openai]
    - description: Voyage AI embeddings — voyage model and input documents.
      format: |
        POST https://api.voyageai.com/v1/embeddings
        {
          "model": "voyage-3",
          "input": ["Prefers TypeScript for code examples."],
          "input_type": "document"
        }
      source_claims: [claim-memory-embedding-indexes-voyage]
    - description: Pinecone create index — dimension, metric, and pod/serverless spec including HNSW when applicable.
      format: |
        from pinecone import Pinecone, ServerlessSpec
        pc.create_index(
          name="hybrid-docs",
          dimension=1536,
          metric="cosine",
          spec=ServerlessSpec(cloud="aws", region="us-east-1")
        )
      source_claims: [claim-memory-embedding-indexes-pinecone]
    - description: Chroma collection with embedding function — binds model to collection inserts/queries.
      format: |
        from chromadb.utils import embedding_functions
        openai_ef = embedding_functions.OpenAIEmbeddingFunction(
          api_key="...",
          model_name="text-embedding-3-small"
        )
        collection = client.get_or_create_collection(
          name="docs",
          embedding_function=openai_ef
        )
      source_claims: [claim-memory-embedding-indexes-chroma]
    - description: HNSW / IVF index configuration — approximate nearest neighbor build parameters.
      format: |
        # Pinecone serverless uses managed HNSW internally
        # Qdrant example HNSW config:
        {
          "hnsw_config": {
            "m": 16,
            "ef_construct": 100,
            "full_scan_threshold": 10000
          }
        }
        # IVF example (Faiss-like conceptual):
        {"index_type": "IVF", "nlist": 1024, "nprobe": 16}
      source_claims: [claim-memory-embedding-indexes-hnsw]
  typical_output:
    - description: Moonweave-local embedding and index version projection.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "embedding_run_id": "embedding-run-17",
          "chunk_version": "chunk-17@3",
          "model_snapshot": "text-embedding-3-small@2026-07",
          "embedding_id": "emb-17",
          "input_digest_sha256": "f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0",
          "index_version": {
            "index_id": "index-17",
            "version": 42,
            "shard_id": "shard-03",
            "entry_id": "entry-17",
            "vector_dimensions": 1536,
            "distance_metric": "cosine"
          }
        }
      source_claims: [claim-memory-embedding-indexes-design]
  reference_implementations:
    - name: OpenAI Embeddings API
      url: https://platform.openai.com/docs/api-reference/embeddings
      description: POST /v1/embeddings with model, input, dimensions, encoding_format.
    - name: Voyage AI Embeddings
      url: https://docs.voyageai.com/reference/embeddings-api
      description: POST /v1/embeddings with voyage models and input_type.
    - name: Pinecone Index Creation
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      description: create_index with dimension, metric, and serverful/serverless spec.
    - name: Chroma Embedding Functions
      url: https://docs.trychroma.com/docs/embeddings/embedding-functions
      description: Collection-level embedding_function binding for add and query.
    - name: Qdrant HNSW Configuration
      url: https://qdrant.tech/documentation/concepts/indexing/#vector-index
      description: HNSW m, ef_construct, and full_scan_threshold parameters.
structure:
  identity_keys: [embedding_id, index_id, version]
  fields:
    - id: embedding_run_id
      labels: {zh: 嵌入运行标识, en: Embedding run identifier, ja: 埋め込み実行識別子}
      definitions:
        zh: 唯一标识一次 EmbeddingRun，必须绑定 consumed chunk digest 与 model snapshot。
        en: Uniquely identifies one EmbeddingRun and must bind consumed chunk digest and model snapshot.
        ja: 一回 EmbeddingRun を一意識別。consumed chunk digest と model snapshot 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: embedding-run-17
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-design]
    - id: embedding_id
      labels: {zh: 嵌入向量标识, en: Embedding identifier, ja: 埋め込み識別子}
      definitions:
        zh: 一次 EmbeddingRun 产出的向量表示 ID；不同于 chunk id 或 Pinecone vector id，但可映射。
        en: Vector representation ID produced by one EmbeddingRun; distinct from chunk id or Pinecone vector id though mappable.
        ja: 一回 EmbeddingRun が生成する vector 表現 ID。chunk id/Pinecone vector id とは別だが写像可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: emb-17
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-design]
    - id: model_snapshot
      labels: {zh: 模型快照, en: Model snapshot, ja: モデルスナップショット}
      definitions:
        zh: 本次 run 实际使用的 embedding 模型与版本，如 text-embedding-3-small 或 voyage-3。
        en: Embedding model and version actually used in this run, e.g., text-embedding-3-small or voyage-3.
        ja: 今回 run で実際使用した embedding model/version。text-embedding-3-small や voyage-3 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: text-embedding-3-small@2026-07
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-openai, claim-memory-embedding-indexes-voyage]
    - id: input_digest_sha256
      labels: {zh: 输入摘要, en: Input digest, ja: 入力ダイジェスト}
      definitions:
        zh: 生成向量时所消费 chunk 正文的 SHA-256；同 index entry 邻接不能替代此 digest。
        en: SHA-256 of chunk body consumed when generating the vector; index entry adjacency cannot substitute this digest.
        ja: ベクトル生成時に消費した chunk 本文 SHA-256。index entry 隣接では代替不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: f3f0483c122018f4efbf214265368b69edee2bbe7c8e5faf6589e64e67161cf0
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-design]
    - id: vector_dimensions
      labels: {zh: 向量维度, en: Vector dimensions, ja: ベクトル次元}
      definitions:
        zh: 索引与嵌入向量的长度；OpenAI dimensions 参数或 Pinecone create_index dimension 必须一致。
        en: Length of index and embedding vectors; OpenAI dimensions parameter must match Pinecone create_index dimension.
        ja: 索引/embedding vector の長さ。OpenAI dimensions と Pinecone create_index dimension は一致必須。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1536
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-openai, claim-memory-embedding-indexes-pinecone]
    - id: distance_metric
      labels: {zh: 距离度量, en: Distance metric, ja: 距離計量}
      definitions:
        zh: Pinecone index metric 或 ANN 配置使用的相似度/距离，如 cosine、dotproduct、euclidean。
        en: Similarity/distance used by Pinecone index metric or ANN config, e.g., cosine, dotproduct, euclidean.
        ja: Pinecone index metric や ANN 設定の類似度/距離。cosine、dotproduct、euclidean 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: cosine
      allowed_values: [cosine, dotproduct, euclidean]
      source_claims: [claim-memory-embedding-indexes-pinecone]
    - id: index_id
      labels: {zh: 索引标识, en: Index identifier, ja: 索引識別子}
      definitions:
        zh: 逻辑 Index 的稳定 ID；IndexVersion 在其下展开不可变版本序列。
        en: Stable ID for logical Index; IndexVersion unfolds immutable version series beneath it.
        ja: 論理 Index の安定 ID。その下に IndexVersion 不変版系列。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: index-17
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-design]
    - id: version
      labels: {zh: 索引版本号, en: Index version number, ja: 索引版番号}
      definitions:
        zh: 同一 index_id 内的单调不可变版本；RefreshRun 成功才发布新 version。
        en: Monotonic immutable version within one index_id; new version published only on successful RefreshRun.
        ja: 同一 index_id 内の単調不変版。RefreshRun 成功時のみ新版公開。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 42
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-design]
    - id: hnsw_m
      labels: {zh: HNSW M 参数, en: HNSW M parameter, ja: HNSW M パラメータ}
      definitions:
        zh: HNSW 图每个节点的最大边数；影响构建质量与内存。
        en: Maximum edges per node in HNSW graph; affects build quality and memory.
        ja: HNSW グラフ各 node の最大 edge 数。構築品質とメモリに影響。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 16
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-hnsw]
    - id: hnsw_ef_construct
      labels: {zh: HNSW ef_construct, en: HNSW ef_construct, ja: HNSW ef_construct}
      definitions:
        zh: HNSW 构建时候选列表大小；越大构建越慢、召回通常越好。
        en: Candidate list size during HNSW construction; larger slows build and usually improves recall.
        ja: HNSW 構築時 candidate list サイズ。大きいほど構築遅延・recall 向上傾向。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 100
      allowed_values: []
      source_claims: [claim-memory-embedding-indexes-hnsw]
  constraints:
    - id: embedding-requires-run-lineage
      severity: error
      expression_language: plain
      expression: EmbeddingVector must bind generating EmbeddingRun with chunk input_digest and model_snapshot; co-storage or matching dimension alone is insufficient.
      explanation:
        zh: 没有运行血缘就无法证明向量对应哪次模型调用与输入。
        en: Without run lineage you cannot prove which model call and input produced a vector.
        ja: run 来歴がなければどの model call/input で vector が生成されたか証明できません。
      source_claims: [claim-memory-embedding-indexes-design]
    - id: index-version-immutable-membership
      severity: error
      expression_language: plain
      expression: IndexEntry membership must belong to exactly one IndexVersion and IndexShard partition; cross-version attachment is invalid.
      explanation:
        zh: 跨版本拼接会导致查询读到不一致索引快照。
        en: Cross-version attachment makes queries read inconsistent index snapshots.
        ja: 版横断付与は query が不整合 index snapshot を読む原因になります。
      source_claims: [claim-memory-embedding-indexes-design]
    - id: failed-build-not-published-version
      severity: error
      expression_language: plain
      expression: IndexRefreshRun or IndexBuildRun failure must not produce a successor IndexVersion; only completed immutable snapshots count.
      explanation:
        zh: 把失败尝试登记为新版本会误导检索读取“不存在”的索引。
        en: Recording failed attempts as new versions misleads retrieval into reading nonexistent indexes.
        ja: 失敗 attempt を新版として登録すると、存在しない index を read する检索を誤導します。
      source_claims: [claim-memory-embedding-indexes-design]
  required_relations: []
examples:
  - id: memory-embedding-indexes-example-openai-embed
    labels:
      zh: OpenAI 文本嵌入
      en: OpenAI text embedding
      ja: OpenAI テキスト埋め込み
    descriptions:
      zh: chunk-17@3 正文经 POST /v1/embeddings 调用 text-embedding-3-small（dimensions=1536）生成向量 emb-17。Moonweave 登记 embedding-run-17 消费 chunk digest、使用模型快照，并产出 emb-17；不能仅凭 index entry 邻接推断此链。
      en: chunk-17@3 body is embedded via POST /v1/embeddings with text-embedding-3-small (dimensions=1536) producing emb-17. Moonweave records embedding-run-17 consuming chunk digest and model snapshot, outputting emb-17—index entry adjacency alone cannot infer this chain.
      ja: chunk-17@3 本文を POST /v1/embeddings（text-embedding-3-small, dimensions=1536）で emb-17 生成。Moonweave は embedding-run-17 が chunk digest 消費・model snapshot 使用・emb-17 产出を登録。index entry 隣接だけでは chain 推論不可。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: POST /v1/embeddings text-embedding-3-small
    field_values:
      model: text-embedding-3-small
      dimensions: 1536
      chunk_version: chunk-17@3
      embedding_run_id: embedding-run-17
      embedding_id: emb-17
    related_node_ids:
      - memory-embedding-indexes
      - memory-chunking-situating
    related_relation_ids: []
    source_claims:
      - claim-memory-embedding-indexes-openai
      - claim-memory-embedding-indexes-design
  - id: memory-embedding-indexes-example-voyage-embed
    labels:
      zh: Voyage AI 嵌入
      en: Voyage AI embedding
      ja: Voyage AI 埋め込み
    descriptions:
      zh: 为检索索引批量嵌入文档时，pipeline 调用 Voyage POST /v1/embeddings，model=voyage-3、input_type=document。返回向量与 input 对齐；Moonweave 在 EmbeddingRun 中记录 voyage-3 快照，以便与 OpenAI 向量区分并在 IndexEntry 存储 representation digest。
      en: When batch-embedding documents for retrieval, the pipeline calls Voyage POST /v1/embeddings with model=voyage-3, input_type=document. Returned vectors align with inputs; Moonweave records voyage-3 snapshot in EmbeddingRun to distinguish from OpenAI vectors and store representation digest on IndexEntry.
      ja: 检索 index 向け文档 batch embed で Voyage POST /v1/embeddings（model=voyage-3, input_type=document）。返却 vector は input と整列。Moonweave は EmbeddingRun に voyage-3 snapshot を記録し OpenAI vector と区別、IndexEntry に representation digest。
    example_source:
      product: Voyage AI
      url: https://docs.voyageai.com/reference/embeddings-api
      version: POST /v1/embeddings voyage-3
    field_values:
      model: voyage-3
      input_type: document
      batch_size: 32
      model_snapshot: voyage-3@2026-03
    related_node_ids:
      - memory-embedding-indexes
    related_relation_ids: []
    source_claims:
      - claim-memory-embedding-indexes-voyage
      - claim-memory-embedding-indexes-design
  - id: memory-embedding-indexes-example-pinecone-create-index
    labels:
      zh: Pinecone 创建索引
      en: Pinecone create index
      ja: Pinecone 索引作成
    descriptions:
      zh: 部署 RAG 索引时调用 Pinecone create_index(name=hybrid-docs, dimension=1536, metric=cosine, ServerlessSpec)。IndexBuildRun 成功后发布 index-17@1，记录 metric 与 dimension；后续 upsert 的 vector 维数不匹配会被拒绝。
      en: Deploying a RAG index calls Pinecone create_index(name=hybrid-docs, dimension=1536, metric=cosine, ServerlessSpec). After IndexBuildRun succeeds, index-17@1 is published with metric and dimension recorded; later upsert vectors with mismatched dimensions are rejected.
      ja: RAG index デプロイで Pinecone create_index(name=hybrid-docs, dimension=1536, metric=cosine, ServerlessSpec)。IndexBuildRun 成功後 index-17@1 公開、metric/dimension 記録。後続 upsert で次元不一致は拒否。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/indexes/create-an-index
      version: create_index ServerlessSpec
    field_values:
      index_name: hybrid-docs
      dimension: 1536
      metric: cosine
      index_id: index-17
      version: 1
      spec: ServerlessSpec
    related_node_ids:
      - memory-embedding-indexes
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-embedding-indexes-pinecone
      - claim-memory-embedding-indexes-design
  - id: memory-embedding-indexes-example-chroma-embedding-function
    labels:
      zh: Chroma 嵌入函数绑定
      en: Chroma embedding function binding
      ja: Chroma 埋め込み関数 binding
    descriptions:
      zh: Chroma collection 创建时绑定 OpenAIEmbeddingFunction(model_name=text-embedding-3-small)。collection.add 可只传 documents 由函数自动嵌入；query 时使用同一函数保证度量一致。Moonweave 将 embedding_function 配置映射为 Index 的 configuration_digest 一部分。
      en: On Chroma collection creation, OpenAIEmbeddingFunction(model_name=text-embedding-3-small) is bound. collection.add may pass documents only for automatic embedding; queries use the same function for consistent metric. Moonweave maps embedding_function config as part of Index configuration_digest.
      ja: Chroma collection 作成時 OpenAIEmbeddingFunction(model_name=text-embedding-3-small) を binding。collection.add は documents のみで自動 embed 可。query も同一関数で metric 一致。Moonweave は embedding_function 設定を Index configuration_digest の一部に写像。
    example_source:
      product: Chroma
      url: https://docs.trychroma.com/docs/embeddings/embedding-functions
      version: OpenAIEmbeddingFunction on collection
    field_values:
      collection_name: docs
      embedding_function: OpenAIEmbeddingFunction
      model_name: text-embedding-3-small
      auto_embed_on_add: true
    related_node_ids:
      - memory-embedding-indexes
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-embedding-indexes-chroma
      - claim-memory-embedding-indexes-design
  - id: memory-embedding-indexes-example-hnsw-config
    labels:
      zh: HNSW 索引配置
      en: HNSW index configuration
      ja: HNSW 索引設定
    descriptions:
