schema: moonweave.ai/ontology-node/v1
id: memory-embedding-indexes
kind: module
status: accepted
labels:
  zh: 嵌入与索引
  en: Embeddings and Indexes
  ja: 埋め込みとインデックス
semantics:
  short_definition:
    zh: 规定内容表示、嵌入生成、索引构建和索引条目之间边界的记忆平面模块。
    en: The memory-plane module that separates content representations, embedding generation, index construction, and index entries.
    ja: content representation、embedding generation、index construction、index entry の境界を定める memory-plane module。
  definition:
    zh: >-
      memory-embedding-indexes 模块描述如何把已有内容工件转换为可检索的数值或词项表示，并如何将这些表示写入、版本化和维护在
      Index 中。EmbeddingRun 生成 EmbeddingVector；IndexBuildRun 以明确输入建立或更新 Index、IndexVersion、IndexShard 和
      IndexEntry；VectorIndex、TfIdfIndex 和 HybridIndex 是不同的索引结构。它不把 Chunk 当作向量，不把 VectorDatabase
      设施当作 VectorIndex，也不把候选、重排结果或最终 Context Assembly 视为索引写入结果。查询和排序属于 retrieval 平面，
      且不能因为命中索引而隐式写入任何持久工件。
    en: >-
      The memory-embedding-indexes module describes how an existing content artifact becomes a retrievable numeric or
      term representation and how that representation is written, versioned, and maintained in an Index. EmbeddingRun
      produces an EmbeddingVector; IndexBuildRun creates or updates an Index, IndexVersion, IndexShard, and IndexEntry
      from explicit inputs; VectorIndex, TfIdfIndex, and HybridIndex are different index structures. It does not treat a
      Chunk as a vector, a VectorDatabase facility as a VectorIndex, or a candidate, reranking result, or final Context
      Assembly as an index-write result. Querying and ranking belong to the retrieval plane and cannot implicitly write a
      persistent artifact merely because an index hit occurred.
    ja: >-
      memory-embedding-indexes module は、既存 content artifact が retrievable な numeric 又は term representation になる方法と、
      その representation を Index に write、version、maintain する方法を表します。EmbeddingRun は EmbeddingVector を生成し、
      IndexBuildRun は明示 input から Index、IndexVersion、IndexShard、IndexEntry を作成又は更新します。VectorIndex、
      TfIdfIndex、HybridIndex は異なる index structure です。Chunk を vector、VectorDatabase facility を VectorIndex、
      candidate、reranking result、最終 Context Assembly を index-write result として扱いません。query と ranking は retrieval
      plane の関心であり、index hit があっても persistent artifact を暗黙に write できません。
  why_needed:
    zh: 只有把表示生成、索引写入和检索读取分开，系统才能追溯向量来自何种内容和模型，并防止查询路径篡改记忆。
    en: Separating representation generation, index writes, and retrieval reads makes vector provenance traceable and prevents a query path from mutating memory.
    ja: representation generation、index write、retrieval read を分けることで vector provenance を追跡でき、query path による memory mutation を防ぐ。
  includes:
    - zh: 内容到 EmbeddingVector 的明确生成、索引版本和分片的构建、以及包含标识、表示引用和受控元数据的索引条目。
      en: Explicit content-to-EmbeddingVector generation, construction of index versions and shards, and index entries with an ID, representation reference, and controlled metadata.
      ja: 明示的な content-to-EmbeddingVector generation、index version と shard の construction、ID、representation reference、controlled metadata を持つ index entry。
  excludes:
    - zh: Chunk 切分、向量数据库部署、检索请求、候选排序、重排决策和已经传给模型的上下文。
      en: Chunk splitting, vector-database deployment, retrieval requests, candidate ranking, reranking decisions, and context already sent to a model.
      ja: Chunk splitting、vector-database deployment、retrieval request、candidate ranking、reranking decision、既に model に送られた context。
  semantic_kind: module
  aliases: [embedding pipeline model, index construction model]
engineering:
  explanation:
    zh: >-
      摄取或分块活动提供带来源的内容引用；EmbeddingRun 调用模型并记录模型、输入摘要、维度与输出向量引用；随后
      IndexBuildRun 将兼容表示通过显式 upsert 写入目标 IndexVersion。Pinecone 文档中的索引记录由 ID、dense 或 sparse
      向量及元数据组成；其搜索 API 读取既有记录并返回匹配结果。Moonweave 因此把搜索候选保留在检索平面，而不把它们写回索引。
    en: >-
      Ingestion or chunking provides content references with provenance. An EmbeddingRun calls a model and records the
      model, input digest, dimension, and output-vector reference; an IndexBuildRun then writes compatible representations
      to a target IndexVersion through an explicit upsert. Pinecone documents index records with an ID, dense or sparse
      vector, and metadata, and its search API reads existing records and returns matches. Moonweave therefore retains
      search candidates in the retrieval plane rather than writing them back into an index.
    ja: >-
      ingestion 又は chunking は provenance 付き content reference を提供します。EmbeddingRun は model を呼び、model、input
      digest、dimension、output-vector reference を記録します。IndexBuildRun はその後 compatible representation を明示 upsert
      で target IndexVersion に write します。Pinecone は ID、dense 又は sparse vector、metadata を持つ index record を文書化し、
      search API は既存 record を read して match を返します。したがって Moonweave は search candidate を index に write back
      せず retrieval plane に保持します。
  typical_input:
    - description: Explicit embedding and index-build inputs
      format: |
        embedding_run = {"content_ref":"chunk-42","model":"text-embedding-3-small","input_digest":"sha256:aa21"}
        build = {"index_ref":"project-index-p-88","index_version":"v4","vector_ref":"embedding-chunk-42-v1","mode":"upsert"}
  typical_output:
    - description: Persisted index entry, distinct from a query result
      format: |
        {"index_entry_id":"entry-p-88-42","index_version_ref":"project-index-p-88-v4","representation_ref":"embedding-chunk-42-v1","write_performed":true}
  reference_implementations:
    - name: OpenAI embeddings guide
      url: https://developers.openai.com/api/docs/guides/embeddings
      description: Documents creating numerical vector representations from supplied input content.
    - name: Pinecone indexing overview
      url: https://docs.pinecone.io/guides/index-data/indexing-overview
      description: Documents indexes with dense, sparse, text, and metadata fields and explicit data indexing.
structure:
  identity_keys: [module_id]
  fields:
    - id: module_id
      labels: {zh: 模块标识, en: module ID, ja: モジュール ID}
      definitions:
        zh: 稳定标识这组嵌入和索引边界，而不是其中的一个模型、向量、索引或查询。
        en: Stably identifies this set of embedding and indexing boundaries, not one model, vector, index, or query inside it.
        ja: この embedding と indexing boundary 群を安定して識別し、内部の一つの model、vector、index、query ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [memory-embedding-indexes]
      pattern: null
      example_value: memory-embedding-indexes
      source_claims: [claim-module-indexed-representations]
    - id: write_read_boundary
      labels: {zh: 写读边界, en: write/read boundary, ja: write/read 境界}
      definitions:
        zh: 声明嵌入和索引构建是显式写路径，检索候选和重排是不会写回持久工件的读路径。
        en: Declares that embedding and index construction are explicit write paths while retrieval candidates and reranking are read paths that do not write persistent artifacts.
        ja: embedding と index construction は明示 write path、retrieval candidate と reranking は persistent artifact を write しない read path であることを宣言する。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"writes":["EmbeddingRun","IndexBuildRun"],"reads":["RetrievalRequest","Reranking"]}'
      source_claims: [claim-module-embedding-generation, claim-module-indexed-representations, claim-module-query-read-only]
  constraints:
    - id: embedding-index-module-boundary
      severity: error
      expression_language: plain
      expression: Content representation, embedding generation, index construction, vector-database facility, index entry, retrieval candidate, reranking output, checkpoint history, and final Context Assembly must remain separately asserted. A retrieval query must not create or update an embedding, IndexVersion, IndexEntry, or MemoryRecord without a distinct write activity.
      explanation:
        zh: 这些对象由不同输入、不同活动和不同时间边界产生；分离它们可让索引可重建、检索可审计且模型可见性不会被索引命中暗示。
        en: These objects arise from different inputs, activities, and time boundaries. Keeping them separate makes indexes rebuildable, retrieval auditable, and model visibility independent of an index hit.
        ja: これらの object は異なる input、activity、time boundary から生じる。分離により index は rebuild 可能になり、retrieval は audit 可能になり、model visibility は index hit から独立する。
      source_claims: [claim-module-indexed-representations, claim-module-query-read-only, claim-module-design]
  required_relations: []
examples:
  - id: embedding-index-module-positive

    labels: {zh: 显式向量索引写入, en: Explicit vector-index write, ja: 明示 vector-index write}

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values: {module_id: memory-embedding-indexes, write_read_boundary: '{"activity":"IndexBuildRun","write":"entry-p-88-42"}'}
    related_node_ids: [EmbeddingRun, EmbeddingVector, IndexBuildRun, IndexEntry]
    related_relation_ids: [EmbeddingRun-generates-EmbeddingVector, IndexEntry-part_of-IndexShard]

    source_claims: [claim-module-embedding-generation, claim-module-indexed-representations]
  - id: embedding-index-module-boundary

    labels: {zh: 查询嵌入与候选读取, en: Query embedding and candidate read, ja: query embedding と candidate read}

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values: {module_id: memory-embedding-indexes, write_read_boundary: '{"activity":"RetrievalRequest","write_performed":false,"candidate":"entry-p-88-42"}'}
    related_node_ids: [EmbeddingVector, VectorIndex, RetrievalRequest, RetrievedCandidate]
    related_relation_ids: []

    source_claims: [claim-module-query-read-only]
  - id: embedding-index-module-counterexample

    labels: {zh: Chunk 不是嵌入向量, en: Chunk is not an embedding vector, ja: Chunk は embedding vector ではない}

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values: {module_id: memory-embedding-indexes, write_read_boundary: '{"artifact":"chunk-43","embedding_state":"not-generated"}'}
    related_node_ids: [Chunk, EmbeddingVector, EmbeddingRun]
    related_relation_ids: []

    source_claims: [claim-module-indexed-representations]
  - id: embedding-index-module-instance

    labels: {zh: 实例：项目混合索引版本, en: "Instance: project hybrid-index version", ja: "事例: project hybrid-index version"}

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values: {module_id: memory-embedding-indexes, write_read_boundary: '{"index_version":"project-index-p-88-v4","modes":["dense","sparse"],"write_performed":true}'}
    related_node_ids: [HybridIndex, IndexVersion, DenseVector, SparseVector]
    related_relation_ids: [IndexVersion-part-of-Index]

    source_claims: [claim-module-indexed-representations, claim-module-query-read-only]
parent_relation: null
relations: []
sources:
  - id: openai-embeddings
    title: OpenAI embeddings guide
    url: https://developers.openai.com/api/docs/guides/embeddings
    source_type: official-doc
    relevance: Documents generated numerical embedding representations for supplied content.
  - id: pinecone-indexing
    title: Pinecone indexing overview
    url: https://docs.pinecone.io/guides/index-data/indexing-overview
    source_type: official-doc
    relevance: Documents indexed dense, sparse, text, and metadata fields and explicit indexing operations.
  - id: pinecone-search
    title: Pinecone semantic search
    url: https://docs.pinecone.io/guides/search/semantic-search
    source_type: official-doc
    relevance: Documents vector queries over existing indexed records and returned similar records.
source_claims:
  - id: claim-module-embedding-generation
    source: openai-embeddings
    supports: OpenAI documents embeddings as numerical representations created from supplied input.
    locator: "Embeddings guide: numerical representations from input and search use case"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-module-indexed-representations
    source: pinecone-indexing
    supports: Pinecone documents indexes containing declared dense, sparse, and text ranking fields plus metadata.
    locator: "Indexing overview: indexes, ranking fields, and metadata"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-module-query-read-only
    source: pinecone-search
    supports: Pinecone documents queries over an index with a supplied vector that return similar records.
    locator: "Semantic search: search with a dense vector"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-module-design
    source: pinecone-indexing
    supports: Moonweave separates representation generation, index membership writes, immutable structural snapshots, and read-only retrieval outcomes so that every embedding and index mutation has independent audit evidence.
    locator: "Moonweave ontology design inference from claim-module-embedding-generation, claim-module-indexed-representations, and claim-module-query-read-only"
    evidence_kind: ontology-design-inference
    confidence: high
