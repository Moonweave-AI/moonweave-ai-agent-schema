  - id: neo4j-node-embeddings
    title: Neo4j Graph Data Science node embeddings
    source_type: official-documentation
    url: https://neo4j.com/docs/graph-data-science/current/machine-learning/node-embeddings/
    relevance: Documents graph machine-learning node-embedding algorithms and workflows.
  - id: pytorch-geometric-node2vec
    title: PyTorch Geometric Node2Vec
    source_type: official-documentation
    url: https://pytorch-geometric.readthedocs.io/en/latest/generated/torch_geometric.nn.models.Node2Vec.html
    relevance: Documents Node2Vec embedding model for graph nodes.
  - id: w3c-prov-o
