schema: moonweave.ai/ontology-node/v1
id: GraphEmbedding
kind: concept
status: accepted
labels:
  zh: 图嵌入
  en: Graph embedding
  ja: グラフ埋め込み
semantics:
  short_definition:
    zh: 由图嵌入算法为一个图快照中的节点或关系生成的嵌入向量。
    en: An embedding vector generated by a graph-embedding algorithm for a node or relation in one graph snapshot.
    ja: 一つの graph snapshot 内の node または relation に graph-embedding algorithm が生成する embedding vector。
  definition:
    zh: >-
      GraphEmbedding 是 EmbeddingVector 的子类型，除通用嵌入来源外还绑定图快照、目标图元素和图嵌入算法配置。
      它不是图数据库部署、图本体、边列表、邻居查询结果、路径评分、检索候选项或最终答案。
    en: >-
      A GraphEmbedding is a subtype of EmbeddingVector that additionally binds graph snapshot, target graph element, and
      graph-embedding algorithm configuration. It is not graph-database deployment, graph ontology, edge list, neighbor-query
      result, path score, retrieval candidate, or final answer.
    ja: >-
      GraphEmbedding は EmbeddingVector の下位型であり、graph snapshot、target graph element、graph-embedding algorithm configuration を
      追加で結ぶ。graph-database deployment、graph ontology、edge list、neighbor-query result、path score、retrieval candidate、final answer ではない。
  why_needed:
    zh: 图结构和快照影响嵌入语义；显式记录可避免把不同图版本或算法输出当作可直接比较的向量。
    en: Graph structure and snapshot affect embedding semantics; explicit records avoid treating outputs from different graph versions or algorithms as directly comparable.
    ja: graph structure と snapshot は embedding semantics に影響する。明示 record により異なる graph version や algorithm の output を直接比較可能と扱わない。
  includes:
    - zh: 表示标识、图快照与目标元素引用、嵌入模型、编码架构与运行、维度、坐标编码、空间和表示摘要。
      en: Representation ID, graph-snapshot and target-element references, embedding model, encoding schema and run, dimension, coordinate encoding, space, and representation digest.
      ja: graph-snapshot 参照 target-element 参照 algorithm dimension space run provenance digest。
  excludes:
    - zh: 图数据库服务、原始节点属性、边列表、邻居查询、路径分数、检索排序和回答。
      en: Graph database service raw node properties edge list neighbor query path score retrieval rank and answer.
      ja: graph database service raw node property edge list neighbor query path score retrieval rank answer。
  semantic_kind: entity
  aliases: [node embedding, graph vector, 图节点向量]
engineering:
  explanation:
    zh: 图嵌入运行读取固定图快照和算法配置，为节点或关系生成向量；索引写入或图查询可引用该向量，但都是后续独立活动。
    en: A graph-embedding run reads fixed graph snapshot and algorithm configuration then emits vector for node or relation; index writes or graph queries may reference it as later independent activities.
    ja: graph-embedding run は固定 graph snapshot と algorithm configuration を読み node または relation の vector を出力する。index write や graph query は後続の独立 activity として参照できる。
  typical_input:
    - description: Node in an immutable graph snapshot passed to a declared graph-embedding model.
      format: |
        {"graph_snapshot_ref":"knowledge-graph-v7","graph_element_ref":"node:policy-42","embedding_model":"node2vec","encoding_schema_ref":"node2vec-v1-128"}
  typical_output:
    - description: Graph-embedding metadata distinct from graph query result.
      format: |
        {"representation_id":"graph-embedding-policy-42","source_artifact_ref":"knowledge-graph-v7","representation_kind":"graph_embedding","encoding_schema_ref":"node2vec-v1-128","encoding_run_ref":"graph-embedding-run-42","representation_digest":"sha256-graph-embedding-policy-42","graph_snapshot_ref":"knowledge-graph-v7","graph_element_ref":"node:policy-42","embedding_model":"node2vec","dimension":128,"coordinate_encoding":"float32","vector_space_ref":"node2vec-knowledge-graph-v7"}
  reference_implementations:
    - name: Neo4j Graph Data Science node embeddings
      url: https://neo4j.com/docs/graph-data-science/current/machine-learning/node-embeddings/
      description: Documents graph machine-learning node embedding algorithms and workflows.
    - name: PyTorch Geometric Node2Vec
      url: https://pytorch-geometric.readthedocs.io/en/latest/generated/torch_geometric.nn.models.Node2Vec.html
      description: Documents Node2Vec embeddings for graph nodes.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: representation ID, ja: representation ID}
      definitions:
        zh: 稳定标识该图嵌入表示；沿用 EmbeddingVector 的实体身份，而不为图来源另建标识。
        en: Stably identifies this graph-embedding representation using the EmbeddingVector entity identity rather than creating a second identity for graph provenance.
        ja: graph provenance 用の第二 identity を作らず、EmbeddingVector の entity identity でこの graph-embedding representation を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:representation|graph-embedding)-[A-Za-z0-9._-]+$'
      example_value: graph-embedding-policy-42
      source_claims: [claim-graph-embedding-output]
    - id: source_artifact_ref
      labels: {zh: 输入工件引用, en: source artifact reference, ja: source artifact 参照}
      definitions:
        zh: 指向被编码的固定图快照，是父类的通用输入工件引用；graph_snapshot_ref 进一步说明它是图快照。
        en: Points to the fixed graph snapshot that was encoded, fulfilling the parent generic input-artifact reference; graph_snapshot_ref further identifies it as a graph snapshot.
        ja: 符号化された固定 graph snapshot を指し、親の汎用 input-artifact reference を満たす。graph_snapshot_ref が graph snapshot であることをさらに示す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: knowledge-graph-v7
      source_claims: [claim-graph-embedding-snapshot]
    - id: representation_kind
      labels: {zh: 表示类型, en: representation kind, ja: representation kind}
      definitions:
        zh: 固定为 graph_embedding，表明嵌入输入来自固定图快照中的元素。
        en: Fixed to graph_embedding, indicating that embedding input comes from an element in a fixed graph snapshot.
        ja: graph_embedding に固定され、embedding input が固定 graph snapshot 内の element に由来することを表す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [graph_embedding]
      pattern: null
      example_value: graph_embedding
      source_claims: [claim-graph-embedding-output]
    - id: encoding_schema_ref
      labels: {zh: 编码架构引用, en: encoding schema reference, ja: encoding schema 参照}
      definitions:
        zh: 指向规定图嵌入模型版本、维度、投影和输出兼容性规则的架构。
        en: References the schema specifying graph-embedding model version, dimension, projection, and output-compatibility rules.
        ja: graph-embedding model version、dimension、projection、output-compatibility rule を規定する schema を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: node2vec-v1-128
      source_claims: [claim-graph-embedding-algorithm]
    - id: graph_snapshot_ref
      labels: {zh: 图快照引用, en: graph snapshot reference, ja: graph snapshot 参照}
      definitions:
        zh: 指向生成嵌入时使用的固定图快照，不等同于实时图服务。
        en: Points to fixed graph snapshot used for embedding and is not live graph service.
        ja: embedding に使った固定 graph snapshot を指し live graph service ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: knowledge-graph-v7
      source_claims: [claim-graph-embedding-snapshot]
    - id: graph_element_ref
      labels: {zh: 图元素引用, en: graph element reference, ja: graph element 参照}
      definitions:
        zh: 指向快照中被嵌入的节点或关系，不复制其属性或邻接表。
        en: Points to node or relation embedded in snapshot without copying properties or adjacency list.
        ja: property や adjacency list を複製せず snapshot 内で embedding された node または relation を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: node:policy-42
      source_claims: [claim-graph-embedding-output]
    - id: embedding_model
      labels: {zh: 图嵌入模型, en: graph embedding model, ja: graph embedding model}
      definitions:
        zh: 标识将图结构映射为坐标的模型或算法版本；这是父类 embedding_model 在图输入上的具体取值。
        en: Identifies the model or algorithm version mapping graph structure into coordinates; it is the concrete graph-input value of the parent embedding_model.
        ja: graph structure を coordinate に写像する model または algorithm version を識別し、親 embedding_model の graph-input における具体値である。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [node2vec, fastRP, graphsage]
      pattern: null
      example_value: node2vec
      source_claims: [claim-graph-embedding-algorithm]
    - id: dimension
      labels: {zh: 嵌入维度, en: embedding dimension, ja: embedding dimension}
      definitions:
        zh: 声明图嵌入输出坐标数量。
        en: Declares coordinate count of graph-embedding output.
        ja: graph-embedding output の coordinate count を宣言する。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 128
      source_claims: [claim-graph-embedding-algorithm]
    - id: coordinate_encoding
      labels: {zh: 坐标编码, en: coordinate encoding, ja: coordinate encoding}
      definitions:
        zh: 声明图嵌入坐标的数值存储编码，而不是图遍历、距离或路径评分算法。
        en: Declares the numeric storage encoding of graph-embedding coordinates rather than graph traversal, distance, or path-scoring algorithm.
        ja: graph traversal、distance、path-scoring algorithm ではなく、graph-embedding coordinate の数値 storage encoding を宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [float32, float16, int8]
      pattern: null
      example_value: float32
      source_claims: [claim-graph-embedding-algorithm]
    - id: vector_space_ref
      labels: {zh: 向量空间引用, en: vector space reference, ja: vector space 参照}
      definitions:
        zh: 指向绑定算法、维度和图快照的可比较空间配置。
        en: Points to comparable-space configuration bound to algorithm dimension and graph snapshot.
        ja: algorithm dimension graph snapshot に束縛された comparable-space configuration を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: node2vec-knowledge-graph-v7
      source_claims: [claim-graph-embedding-snapshot]
    - id: encoding_run_ref
      labels: {zh: 编码运行引用, en: encoding run reference, ja: encoding run 参照}
      definitions:
        zh: 指向产生该图嵌入的训练、推理或等价编码活动。
        en: Points to the training, inference, or equivalent encoding activity that produced this graph embedding.
        ja: この graph embedding を生成した training、inference、または同等 encoding activity を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: graph-embedding-run-42
      source_claims: [claim-graph-embedding-provenance]
    - id: representation_digest
      labels: {zh: 表示摘要, en: representation digest, ja: representation digest}
      definitions:
        zh: 验证图嵌入载荷、模型和关键图快照元数据的表示摘要。
        en: Representation digest verifying graph-embedding payload, model, and key graph-snapshot metadata.
        ja: graph-embedding payload、model、主要 graph-snapshot metadata を検証する representation digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-graph-embedding-policy-42
      source_claims: [claim-graph-embedding-provenance]
  constraints:
    - id: graph-embedding-snapshot-algorithm-boundary
      severity: error
      expression_language: plain
      expression: representation_id, source_artifact_ref, representation_kind, encoding_schema_ref, graph_snapshot_ref, graph_element_ref, embedding_model, dimension, coordinate_encoding, vector_space_ref, encoding_run_ref, and representation_digest are required. source_artifact_ref must identify graph_snapshot_ref; the graph element must occur in that snapshot and vector space must match the model and dimension.
      explanation:
        zh: 图嵌入必须把目标元素、固定图版本、算法和空间共同绑定，避免漂移图上的匿名向量。
        en: A graph embedding must bind target element fixed graph version algorithm and space together to avoid anonymous vectors over drifting graphs.
        ja: graph embedding は target element 固定 graph version algorithm space を共に結び変動 graph 上の匿名 vector を避ける必要がある。
      source_claims: [claim-graph-embedding-snapshot, claim-graph-embedding-algorithm, claim-graph-embedding-design]
    - id: graph-embedding-not-query-or-score
      severity: error
      expression_language: plain
      expression: GraphEmbedding must not contain graph neighbor-query result, path score, index-entry location, retrieval rank, candidate selection, or answer text.
      explanation:
        zh: 图嵌入是图结构编码输出，查询和排序是使用该输出的独立活动结果。
        en: A graph embedding is graph-structure encoding output while queries and ranking are separate activity results using it.
        ja: graph embedding は graph-structure encoding output であり query と ranking はそれを使う別 activity result である。
      source_claims: [claim-graph-embedding-provenance]
  required_relations: []
examples:
  - id: graph-embedding-positive-node2vec

    labels: {zh: 政策节点 Node2Vec 嵌入, en: Node2Vec embedding for policy node, ja: policy node の Node2Vec embedding}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: graph-embedding-policy-42, source_artifact_ref: knowledge-graph-v7, representation_kind: graph_embedding, encoding_schema_ref: node2vec-v1-128, graph_snapshot_ref: knowledge-graph-v7, graph_element_ref: node:policy-42, embedding_model: node2vec, dimension: 128, coordinate_encoding: float32, vector_space_ref: node2vec-knowledge-graph-v7, encoding_run_ref: graph-embedding-run-42, representation_digest: sha256-graph-embedding-policy-42}
    related_node_ids: [GraphEmbedding, EmbeddingVector, Representation]
    related_relation_ids: [GraphEmbedding-is_a-EmbeddingVector]

    source_claims: [claim-graph-embedding-output]
  - id: graph-embedding-counterexample-neighbor-query

    labels: {zh: 邻居查询结果被误称为图嵌入, en: Neighbor-query result presented as graph embedding, ja: neighbor-query result を graph embedding として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {node_ref: node:policy-42, neighbor_refs: '[node:policy-7, node:policy-8]', query_time: 2026-07-19T08:00:00Z}
    related_node_ids: [GraphEmbedding, RetrievalResult]
    related_relation_ids: [GraphEmbedding-is_a-EmbeddingVector]

    source_claims: [claim-graph-embedding-algorithm]
  - id: graph-embedding-boundary-snapshot-change

    labels: {zh: 图快照版本变更, en: Graph-snapshot version change, ja: graph-snapshot version の変更}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {representation_id: graph-embedding-policy-42-v8, source_artifact_ref: knowledge-graph-v8, representation_kind: graph_embedding, encoding_schema_ref: node2vec-v1-128, graph_snapshot_ref: knowledge-graph-v8, graph_element_ref: node:policy-42, embedding_model: node2vec, dimension: 128, coordinate_encoding: float32, vector_space_ref: node2vec-knowledge-graph-v8, encoding_run_ref: graph-embedding-run-43, representation_digest: sha256-graph-embedding-policy-42-v8}
    related_node_ids: [GraphEmbedding, IndexVersion, EmbeddingRun]
    related_relation_ids: [GraphEmbedding-is_a-EmbeddingVector]

    source_claims: [claim-graph-embedding-snapshot]
  - id: graph-embedding-instance-neo4j

    labels: {zh: Neo4j 图嵌入实例, en: Neo4j graph-embedding instance, ja: Neo4j graph-embedding の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: graph-embedding-neo4j-17, source_artifact_ref: neo4j-projection-v3, representation_kind: graph_embedding, encoding_schema_ref: fastRP-v1-256, graph_snapshot_ref: neo4j-projection-v3, graph_element_ref: node:customer-17, embedding_model: fastRP, dimension: 256, coordinate_encoding: float32, vector_space_ref: fastRP-neo4j-projection-v3, encoding_run_ref: graph-embedding-run-neo4j-17, representation_digest: sha256-graph-embedding-neo4j-17}
    related_node_ids: [GraphEmbedding, EmbeddingVector, IndexBuildRun]
    related_relation_ids: [GraphEmbedding-is_a-EmbeddingVector]
    source_claims: [claim-graph-embedding-output]
parent_relation:
  id: GraphEmbedding-is_a-EmbeddingVector
  predicate: is_a
  target: concept:EmbeddingVector
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是嵌入向量的图子类, en: is a graph subtype of embedding vector, ja: EmbeddingVector の graph 下位型である}
  definitions:
    zh: GraphEmbedding 是绑定图快照与图元素来源的 EmbeddingVector。
    en: GraphEmbedding is EmbeddingVector bound to graph-snapshot and graph-element provenance.
    ja: GraphEmbedding は graph-snapshot と graph-element provenance に束縛された EmbeddingVector である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_graph_embedding_subtype, labels: {zh: 具有图嵌入子类, en: has graph-embedding subtype, ja: graph-embedding 下位型を持つ}}
  conditions:
    - id: graph-embedding-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when embedding vector is generated for graph element in fixed graph snapshot under declared graph-embedding algorithm.
      explanation:
        zh: 子类型差异是图元素、固定快照和图算法来源。
        en: The subtype differentia is graph element fixed snapshot and graph-algorithm provenance.
        ja: subtype の differentia は graph element 固定 snapshot graph-algorithm provenance である。
      source_claims: [claim-graph-embedding-output]
  temporal_scope: valid-time
  boundary_context: A graph query may use a graph embedding later without changing the snapshot bound to its payload.
  constraints: []
  examples: []
  source_claims: [claim-graph-embedding-output]
  distinct_fact_rationale: This relation classifies graph-origin embedding and does not express graph query training run or retrieval result.
  layout_role: primary-backbone
relations: []
