    relevance: Separates graph-embedding entities from activities that generate and use them.
source_claims:
  - id: claim-graph-embedding-output
    source: neo4j-node-embeddings
    supports: Neo4j Graph Data Science documents node-embedding algorithms that compute vector representations for graph nodes.
    locator: "Node embeddings: graph projection and embedding algorithms"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-graph-embedding-algorithm
    source: pytorch-geometric-node2vec
    supports: PyTorch Geometric documents Node2Vec as a model for graph-node embeddings.
    locator: "Node2Vec: model parameters and node embeddings"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-graph-embedding-snapshot
    source: neo4j-node-embeddings
    supports: Neo4j Graph Data Science documents node-embedding workflows over a named graph projection.
    locator: "Node embeddings: projected graph input"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-graph-embedding-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity from activities.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-graph-embedding-design
    source: w3c-prov-o
    supports: Moonweave models GraphEmbedding as an EmbeddingVector bound to a fixed graph snapshot and graph element, with model, schema, and run provenance separate from graph queries, indexing, and retrieval.
    locator: "Moonweave ontology design inference from claim-graph-embedding-output, claim-graph-embedding-algorithm, claim-graph-embedding-snapshot, and claim-graph-embedding-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
