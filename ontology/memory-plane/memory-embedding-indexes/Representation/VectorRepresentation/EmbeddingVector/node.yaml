schema: moonweave.ai/ontology-node/v1
id: EmbeddingVector
kind: concept
status: accepted
labels:
  zh: 嵌入向量
  en: Embedding vector
  ja: 埋め込みベクトル
semantics:
  short_definition:
    zh: 由嵌入模型从一个固定输入工件生成的向量表示。
    en: A vector representation generated by an embedding model from one fixed input artifact.
    ja: embedding model が一つの固定 input artifact から生成する vector representation。
  definition:
    zh: >-
      EmbeddingVector 是 VectorRepresentation 的子类型，记录输入工件、嵌入模型或版本、维度、向量空间、生成运行和载荷摘要。
      它不是原始文本、通用索引、索引条目、候选相似度分数、查询结果、模型提示上下文或生成答案。
    en: >-
      An EmbeddingVector is a subtype of VectorRepresentation that records input artifact, embedding model or version,
      dimension, vector space, generating run, and payload digest. It is not raw text, a general index, index entry,
      candidate similarity score, query result, model prompt context, or generated answer.
    ja: >-
      EmbeddingVector は VectorRepresentation の下位型であり、input artifact、embedding model または version、dimension、
      vector space、generating run、payload digest を記録する。raw text、general index、index entry、candidate similarity score、
      query result、model prompt context、generated answer ではない。
  why_needed:
    zh: 嵌入模型和空间决定坐标可比性；独立实体可保留模型来源而不把索引或检索结果误作嵌入本身。
    en: Embedding model and space determine coordinate comparability; an independent entity retains model provenance without mistaking index or retrieval result for the embedding itself.
    ja: embedding model と space は coordinate comparability を決める。独立 entity は index や retrieval result を embedding 自体と誤認せず model provenance を保持する。
  includes:
    - zh: 表示标识、输入工件引用、模型标识、编码架构与运行、维度、坐标编码、空间和表示摘要。
      en: Representation ID, input-artifact reference, model identifier, encoding schema and run, dimension, coordinate encoding, space, and representation digest.
      ja: input-artifact 参照 model identifier dimension space embedding run payload digest。
  excludes:
    - zh: 输入正文副本、索引成员资格、距离分数、排序位置、候选集合和答案。
      en: Input-body copy index membership distance score rank position candidate set and answer.
      ja: input-body copy index membership distance score rank position candidate set answer。
  semantic_kind: entity
  aliases: [semantic embedding, model embedding, 语义嵌入]
engineering:
  explanation:
    zh: 嵌入 API 接收输入文本并返回数值向量；系统将输出载荷绑定模型、输入版本和运行来源，索引写入在单独活动中进行。
    en: An embeddings API accepts input text and returns numerical vector; system binds output payload to model input version and run provenance while index write occurs in separate activity.
    ja: embeddings API は input text を受け取り数値 vector を返す。system は output payload を model input version run provenance に結び index write は別 activity で行う。
  typical_input:
    - description: Fixed chunk and embedding model passed to an embedding run.
      format: |
        {"source_artifact_ref":"chunk-auth-guide-v3","embedding_model":"text-embedding-3-small","dimensions":1536,"encoding_format":"float"}
  typical_output:
    - description: Embedding-vector metadata with model-specific space.
      format: |
        {"representation_id":"embedding-auth-42","source_artifact_ref":"chunk-auth-guide-v3","representation_kind":"embedding_vector","encoding_schema_ref":"text-embedding-3-small-1536","encoding_run_ref":"embedding-run-auth-42","representation_digest":"sha256-embedding-auth-42","embedding_model":"text-embedding-3-small","dimension":1536,"coordinate_encoding":"float","vector_space_ref":"text-embedding-3-small-1536"}
  reference_implementations:
    - name: OpenAI embeddings
      url: https://platform.openai.com/docs/guides/embeddings
      description: Documents creating embedding vectors from input text.
    - name: SentenceTransformers embeddings
      url: https://www.sbert.net/docs/sentence_transformer/usage/usage.html
      description: Documents encoding sentences into embedding vectors.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: representation ID, ja: representation ID}
      definitions:
        zh: 稳定标识该嵌入输出；沿用 VectorRepresentation 的实体身份，而不为模型来源另建标识。
        en: Stably identifies this embedding output using the VectorRepresentation entity identity rather than creating a second identity for model provenance.
        ja: model provenance 用の第二 identity を作らず、VectorRepresentation の entity identity でこの embedding output を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:representation|embedding)-[A-Za-z0-9._-]+$'
      example_value: embedding-auth-42
      source_claims: [claim-embedding-vector-output]
    - id: source_artifact_ref
      labels: {zh: 输入工件引用, en: source artifact reference, ja: source artifact 参照}
      definitions:
        zh: 指向被嵌入模型编码的固定工件版本；与 Representation 的输入引用是同一事实。
        en: Points to the fixed artifact version encoded by the embedding model; it is the same input fact inherited from Representation.
        ja: embedding model が符号化した固定 artifact version を指し、Representation から継承する同じ input fact である。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-auth-guide-v3
      source_claims: [claim-embedding-vector-output]
    - id: representation_kind
      labels: {zh: 表示类型, en: representation kind, ja: representation kind}
      definitions:
        zh: 固定为 embedding_vector，表明该向量由声明的嵌入模型产生。
        en: Fixed to embedding_vector, indicating that the vector was produced by the declared embedding model.
        ja: embedding_vector に固定され、宣言された embedding model が vector を生成したことを表す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [embedding_vector]
      pattern: null
      example_value: embedding_vector
      source_claims: [claim-embedding-vector-output]
    - id: encoding_schema_ref
      labels: {zh: 编码架构引用, en: encoding schema reference, ja: encoding schema 参照}
      definitions:
        zh: 指向规定嵌入模型版本、维度和输出兼容性规则的编码架构。
        en: References the encoding schema that specifies embedding-model version, dimension, and output-compatibility rules.
        ja: embedding-model version、dimension、output-compatibility rule を規定する encoding schema を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-embedding-vector-model]
    - id: embedding_model
      labels: {zh: 嵌入模型, en: embedding model, ja: embedding model}
      definitions:
        zh: 标识产生载荷的模型或版本，不等同于索引类型。
        en: Identifies model or version producing payload and is not index type.
        ja: payload を生成する model または version を識別し index type ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small
      source_claims: [claim-embedding-vector-model]
    - id: dimension
      labels: {zh: 嵌入维度, en: embedding dimension, ja: embedding dimension}
      definitions:
        zh: 声明模型输出坐标数量，必须与空间和载荷一致。
        en: Declares model output coordinate count and must agree with space and payload.
        ja: model output coordinate count を宣言し space と payload に一致しなければならない。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims: [claim-embedding-vector-model]
    - id: coordinate_encoding
      labels: {zh: 坐标编码, en: coordinate encoding, ja: coordinate encoding}
      definitions:
        zh: 声明返回坐标的数值或传输编码；它不是向量相似度度量。
        en: Declares the numeric or transport encoding of returned coordinates; it is not a vector similarity metric.
        ja: 返却 coordinate の数値または transport encoding を宣言し、vector similarity metric ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [float, base64, float32, float16, int8]
      pattern: null
      example_value: float
      source_claims: [claim-embedding-vector-output]
    - id: vector_space_ref
      labels: {zh: 向量空间引用, en: vector space reference, ja: vector space 参照}
      definitions:
        zh: 指向模型和维度定义的可比较空间，不隐含跨模型可比性。
        en: References comparable space defined by model and dimension without implying cross-model comparability.
        ja: model と dimension が定義する comparable space を参照し cross-model comparability を暗示しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-embedding-vector-model]
    - id: encoding_run_ref
      labels: {zh: 编码运行引用, en: encoding run reference, ja: encoding run 参照}
      definitions:
        zh: 指向产生嵌入的 EmbeddingRun 或等价编码活动；它是父类 EncodingRun 引用的具体应用。
        en: Points to the EmbeddingRun or equivalent encoding activity that produced the embedding; it is the parent encoding-run reference in this concrete case.
        ja: embedding を生成した EmbeddingRun または同等 encoding activity を指し、この具体例における親の encoding-run reference である。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-run-auth-42
      source_claims: [claim-embedding-vector-provenance]
    - id: representation_digest
      labels: {zh: 表示摘要, en: representation digest, ja: representation digest}
      definitions:
        zh: 验证嵌入载荷和模型关键元数据的表示摘要，而不是输入文本或搜索分数。
        en: Representation digest verifying embedding payload and key model metadata rather than input text or search score.
        ja: input text や search score ではなく embedding payload と主要 model metadata を検証する representation digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-embedding-auth-42
      source_claims: [claim-embedding-vector-provenance]
  constraints:
    - id: embedding-vector-model-space-boundary
      severity: error
      expression_language: plain
      expression: representation_id, source_artifact_ref, representation_kind, encoding_schema_ref, encoding_run_ref, representation_digest, embedding_model, dimension, coordinate_encoding, and vector_space_ref are required. Dimension must match declared model space and embeddings from different spaces must not be compared without declared transformation.
      explanation:
        zh: 嵌入向量的可比性由输入版本、模型、维度和空间共同约束。
        en: Comparability of embedding vectors is jointly bounded by input version model dimension and space.
        ja: embedding vector の comparability は input version model dimension space により共同で制約される。
      source_claims: [claim-embedding-vector-model, claim-embedding-vector-provenance, claim-embedding-vector-design]
    - id: embedding-vector-not-index-or-score
      severity: error
      expression_language: plain
      expression: EmbeddingVector must not contain index entry location, similarity value, retrieval rank, candidate selection, answer text, or storage-write result.
      explanation:
        zh: 嵌入是编码输出；索引写入、相似度计算和下游使用必须保持为独立记录。
        en: An embedding is encoding output; index write similarity calculation and downstream use remain independent records.
        ja: embedding は encoding output であり index write similarity calculation downstream use は独立 record に保つ。
      source_claims: [claim-embedding-vector-provenance]
  required_relations: []
examples:
  - id: embedding-vector-positive-openai

    labels: {zh: OpenAI 文本嵌入, en: OpenAI text embedding, ja: OpenAI text embedding}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: embedding-auth-42, source_artifact_ref: chunk-auth-guide-v3, representation_kind: embedding_vector, encoding_schema_ref: text-embedding-3-small-1536, encoding_run_ref: embedding-run-auth-42, representation_digest: sha256-embedding-auth-42, embedding_model: text-embedding-3-small, dimension: 1536, coordinate_encoding: float, vector_space_ref: text-embedding-3-small-1536}
    related_node_ids: [EmbeddingVector, VectorRepresentation, EmbeddingRun]
    related_relation_ids: [EmbeddingVector-is_a-VectorRepresentation]

    source_claims: [claim-embedding-vector-output]
  - id: embedding-vector-counterexample-index-entry

    labels: {zh: 索引位置被误称为嵌入, en: Index location presented as embedding, ja: index location を embedding として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {index_entry_id: entry-auth-42, shard_ref: shard-auth-1, write_time: 2026-07-19T08:00:00Z}
    related_node_ids: [EmbeddingVector, IndexEntry, IndexShard]
    related_relation_ids: [EmbeddingVector-is_a-VectorRepresentation]

    source_claims: [claim-embedding-vector-provenance]
  - id: embedding-vector-boundary-model-change

    labels: {zh: 模型版本切换, en: Model-version change, ja: model version の変更}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {representation_id: embedding-auth-42-v2, source_artifact_ref: chunk-auth-guide-v3, representation_kind: embedding_vector, encoding_schema_ref: text-embedding-4-small-1536, encoding_run_ref: embedding-run-auth-43, representation_digest: sha256-embedding-auth-42-v2, embedding_model: text-embedding-4-small, dimension: 1536, coordinate_encoding: float, vector_space_ref: text-embedding-4-small-1536}
    related_node_ids: [EmbeddingVector, IndexVersion, EmbeddingRun]
    related_relation_ids: [EmbeddingVector-is_a-VectorRepresentation]

    source_claims: [claim-embedding-vector-model]
  - id: embedding-vector-instance-sentence-transformers

    labels: {zh: SentenceTransformers 嵌入实例, en: SentenceTransformers embedding instance, ja: SentenceTransformers embedding の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: embedding-st-17, source_artifact_ref: chunk-support-question-17, representation_kind: embedding_vector, encoding_schema_ref: all-MiniLM-L6-v2-384, encoding_run_ref: embedding-run-st-17, representation_digest: sha256-embedding-st-17, embedding_model: all-MiniLM-L6-v2, dimension: 384, coordinate_encoding: float32, vector_space_ref: all-MiniLM-L6-v2-384}
    related_node_ids: [EmbeddingVector, TextEmbedding, IndexBuildRun]
    related_relation_ids: [EmbeddingVector-is_a-VectorRepresentation]
    source_claims: [claim-embedding-vector-output]
parent_relation:
  id: EmbeddingVector-is_a-VectorRepresentation
  predicate: is_a
  target: concept:VectorRepresentation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是向量表示的嵌入子类, en: is an embedding subtype of vector representation, ja: VectorRepresentation の embedding 下位型である}
  definitions:
    zh: EmbeddingVector 是由嵌入模型从输入工件生成的 VectorRepresentation。
    en: EmbeddingVector is VectorRepresentation generated by embedding model from input artifact.
    ja: EmbeddingVector は embedding model が input artifact から生成する VectorRepresentation である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_embedding_vector_subtype, labels: {zh: 具有嵌入向量子类, en: has embedding-vector subtype, ja: embedding-vector 下位型を持つ}}
  conditions:
    - id: embedding-vector-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when an embedding model generates vector coordinates for a fixed input artifact with model-space and run provenance.
      explanation:
        zh: 子类型差异是模型生成的输入工件向量及其空间来源。
        en: The subtype differentia is model-generated vector for fixed input artifact with space provenance.
        ja: subtype の differentia は space provenance を持つ固定 input artifact の model-generated vector である。
      source_claims: [claim-embedding-vector-output]
  temporal_scope: valid-time
  boundary_context: Indexing or similarity scoring may use an embedding later without changing its embedding-model provenance.
  constraints: []
  examples: []
  source_claims: [claim-embedding-vector-output]
  distinct_fact_rationale: This relation classifies embedding origin and does not express index writing query scoring or model answer use.
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-embeddings
    title: OpenAI embeddings guide
    source_type: official-documentation
    url: https://platform.openai.com/docs/guides/embeddings
    relevance: Documents creating embedding vectors from input text.
  - id: sentence-transformers-usage
    title: SentenceTransformers usage
    source_type: official-documentation
    url: https://www.sbert.net/docs/sentence_transformer/usage/usage.html
    relevance: Documents encoding sentences into embedding vectors.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates embedding entities from generating and using activities.
source_claims:
  - id: claim-embedding-vector-output
    source: openai-embeddings
    supports: OpenAI documents embeddings as vectors created from supplied input.
    locator: "Embeddings guide: create input and vector response"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-embedding-vector-model
    source: sentence-transformers-usage
    supports: SentenceTransformers documents encoding text with a selected SentenceTransformer model.
    locator: "SentenceTransformer usage: encode inputs"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-embedding-vector-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-embedding-vector-design
    source: w3c-prov-o
    supports: Moonweave models an EmbeddingVector as the model-produced VectorRepresentation with input, model, schema, run, coordinate encoding, and vector-space provenance, separate from later indexing and scoring.
    locator: "Moonweave ontology design inference from claim-embedding-vector-output, claim-embedding-vector-model, and claim-embedding-vector-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
