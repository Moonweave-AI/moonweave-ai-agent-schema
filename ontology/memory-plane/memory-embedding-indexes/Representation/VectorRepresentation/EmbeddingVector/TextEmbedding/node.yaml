schema: moonweave.ai/ontology-node/v1
id: TextEmbedding
kind: concept
status: accepted
labels:
  zh: 文本嵌入
  en: Text Embedding
  ja: テキストエンベディング
semantics:
  short_definition:
    zh: 由已声明模型把固定文本或 token 输入编码成的嵌入向量。
    en: An embedding vector that a declared model encodes from fixed text or token input.
    ja: 宣言された model が固定 text または token input を符号化して得る embedding vector。
  definition:
    zh: >
      TextEmbedding 是 EmbeddingVector 的子类型：指定模型把固定文本或 token 序列编码为数值坐标，并保留输入工件、模型、编码架构、运行和向量空间。
      它不是 Chunk 正文、模型调用、Index 或 IndexEntry；它们分别是内容、产生该表示的活动、搜索结构和引用该表示的索引成员记录。
    en: >
      A TextEmbedding is a subtype of EmbeddingVector in which a named model encodes fixed text or
      token input as numeric coordinates and records the input artifact, model, encoding schema,
      run, and vector space. It is not a Chunk body, model call, Index, or IndexEntry; those are
      respectively content, the activity producing the representation, a search structure, and an
      index-membership record that references the representation.
    ja: >
      TextEmbedding は指定モデルが固定 text または token 入力から生成し、入力 ID、モデル、次元を記録する
      EmbeddingVector です。Chunk 本文、Index、IndexEntry ではなく、それらは内容、照会構造、
      またはベクトルを利用する索引構成員記録です。
  why_needed:
    zh: "搜索系统不能仅保存一串浮点数：在内容变更、模型升级或索引重建时，必须能确定哪一版文本和哪一个模型产生了它，才能安全重嵌入和避免混用不可比向量。"
    en: "A search system cannot safely retain only a float array: when content changes, a model is upgraded, or an index is rebuilt, it must identify the text version and model that produced it so it can re-embed safely and avoid mixing incomparable vectors."
    ja: "検索 system は float array だけを安全に保存できない。content の変更、model upgrade、index rebuild 時に、安全な re-embedding と比較不能 vector の混在防止のため、生成元の text version と model を識別する必要がある。"
  includes:
    - zh: "文本或 token 输入的来源引用与摘要、模型、编码架构和运行、维度、坐标编码、向量空间及表示摘要。"
      en: "Source reference and digest for text or token input, model, encoding schema and run, dimension, coordinate encoding, vector space, and representation digest."
      ja: "text または token input の source reference と digest、model、encoding schema と run、dimension、coordinate encoding、vector space、representation digest。"
  excludes:
    - zh: "原始 Chunk 正文、EmbeddingRun、GraphEmbedding、VectorIndex、IndexEntry、相似度分数和候选排名。"
      en: "Raw Chunk body, EmbeddingRun, GraphEmbedding, VectorIndex, IndexEntry, similarity score, and candidate rank."
      ja: "raw Chunk body、EmbeddingRun、GraphEmbedding、VectorIndex、IndexEntry、similarity score、candidate rank。"
  semantic_kind: entity
  aliases: [text vector, sentence embedding, 文本向量]
engineering:
  explanation:
    zh: >
      OpenAI 的 POST /v1/embeddings 请求接受 model 和 input，响应 data[n].embedding 浮点数组；
      应将数组、模型名、维度和输入摘要保存为表示。创建或更新 IndexEntry 是后续索引操作，
      不属于 API 返回的 TextEmbedding 本体。
    en: >
      An OpenAI POST /v1/embeddings request accepts model and input and returns a float array in
      data[n].embedding. Persist the array with model name, dimensions, and input digest as the
      representation. Creating or updating an IndexEntry is a later indexing operation, not the
      TextEmbedding returned by the API.
    ja: >
      OpenAI の POST /v1/embeddings request は model と input を受け取り、data[n].embedding に float array を返します。
      representation として array を model name、dimension、input digest とともに保存します。IndexEntry の作成又は更新は
      後続 indexing operation であり、API が返す TextEmbedding そのものではありません。
  typical_input:
    - description: "OpenAI Create embeddings request for one text input; dimensions may shorten a text-embedding-3 output."
      format: |
        POST /v1/embeddings
        {"model":"text-embedding-3-small","input":"How to implement JWT authentication in Express.js","dimensions":2,"encoding_format":"float"}
  typical_output:
    - description: "Text embedding"
      format: |
        {"object":"list","data":[{"object":"embedding","index":0,"embedding":[0.015,-0.032]}],"model":"text-embedding-3-small","usage":{"prompt_tokens":9,"total_tokens":9}}
  reference_implementations:
    - name: OpenAI Embeddings
      url: https://platform.openai.com/docs/guides/embeddings
      description: Official API guide for model/input requests and returned embedding vectors.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: representation ID, ja: representation ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识该文本嵌入表示；与 EmbeddingVector 使用同一个实体身份，而非单独的文本嵌入标识。
        en: Stably identifies this text-embedding representation using the same entity identity as EmbeddingVector rather than a separate text-embedding ID.
        ja: 別の text-embedding ID ではなく EmbeddingVector と同じ entity identity でこの text-embedding representation を安定識別する。
      allowed_values: []
      pattern: '^(?:representation|text-emb)-[A-Za-z0-9._-]+$'
      example_value: text-emb-001
      source_claims: [claim-text-embedding-api]
    - id: source_artifact_ref
      labels: {zh: 输入工件引用, en: source artifact reference, ja: source artifact 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向被模型编码的固定文本或 token 输入工件版本，不把正文复制进向量记录。
        en: Points to the fixed text or token-input artifact version encoded by the model without copying its body into the vector record.
        ja: body を vector record に複製せず、model が符号化した固定 text または token-input artifact version を指す。
      allowed_values: []
      pattern: null
      example_value: chunk-jwt-guide-v1
      source_claims: [claim-text-embedding-api]
    - id: representation_kind
      labels: {zh: 表示类型, en: representation kind, ja: representation kind}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 固定为 text_embedding，表明输入模态是文本或 token 序列。
        en: Fixed to text_embedding, indicating that the input modality is text or a token sequence.
        ja: text_embedding に固定され、input modality が text または token sequence であることを表す。
      allowed_values: [text_embedding]
      pattern: null
      example_value: text_embedding
      source_claims: [claim-text-embedding-subtype]
    - id: encoding_schema_ref
      labels: {zh: 编码架构引用, en: encoding schema reference, ja: encoding schema 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向规定模型版本、可选输出维度和文本嵌入兼容性规则的架构。
        en: References the schema specifying model version, optional output dimension, and text-embedding compatibility rules.
        ja: model version、任意 output dimension、text-embedding compatibility rule を規定する schema を参照する。
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-text-embedding-api]
    - id: input_digest
      labels: {zh: 输入摘要, en: input digest, ja: 入力 digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 识别被编码的规范化文本或 token 输入，而无需把完整原文复制进向量对象。
        en: Identifies normalized text or token input encoded without copying the full source text into the vector object.
        ja: 完全文をベクトルへ複製せず、符号化した正規化 text または token 入力を識別します。
      allowed_values: []
      pattern: null
      example_value: sha256:4e2181
      source_claims: [claim-text-embedding-api]
    - id: embedding_model
      labels: {zh: 嵌入模型, en: embedding model, ja: 埋め込みモデル}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 生成该数组的模型名称；模型变化通常要求重新生成或兼容性检查。
        en: Name of the model that generated the array; a model change normally requires regeneration or compatibility checking.
        ja: 配列を生成したモデル名であり、変更時は通常再生成または互換性確認が必要です。
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small
      source_claims: [claim-text-embedding-api]
    - id: dimension
      labels: {zh: 向量维度, en: vector dimension, ja: ベクトル次元}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 返回坐标数组的长度，也是任何兼容向量索引必须匹配的维度。
        en: Length of the returned coordinate array and the dimension any compatible vector index must match.
        ja: 返却 coordinate array の長さであり、互換 vector index が一致させる dimension である。
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims: [claim-text-embedding-api]
    - id: coordinate_encoding
      labels: {zh: 坐标编码, en: coordinate encoding, ja: coordinate encoding}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明 API 返回或持久化坐标所用的编码；它不是相似度度量。
        en: Declares the encoding used for API-returned or persisted coordinates; it is not a similarity metric.
        ja: API が返すまたは永続化する coordinate に使う encoding を宣言し、similarity metric ではない。
      allowed_values: [float, base64, float32, float16, int8]
      pattern: null
      example_value: float
      source_claims: [claim-text-embedding-api]
    - id: vector_space_ref
      labels: {zh: 向量空间引用, en: vector space reference, ja: vector space 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向由模型、维度和编码共同定义的可比较空间，不暗示与其他模型输出可比。
        en: References the comparable space jointly defined by model, dimension, and encoding without implying comparability with another model's output.
        ja: model、dimension、encoding が共同で定義する comparable space を参照し、他 model output との comparability を暗示しない。
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-text-embedding-index-boundary]
    - id: encoding_run_ref
      labels: {zh: 编码运行引用, en: encoding run reference, ja: encoding run 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向发出请求并持久化该表示的 EmbeddingRun 或等价编码活动。
        en: Points to the EmbeddingRun or equivalent encoding activity that issued the request and persisted this representation.
        ja: request を発行してこの representation を永続化した EmbeddingRun または同等 encoding activity を指す。
      allowed_values: []
      pattern: null
      example_value: embedding-run-jwt-01
      source_claims: [claim-text-embedding-api]
    - id: representation_digest
      labels: {zh: 表示摘要, en: representation digest, ja: representation digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 验证返回坐标及其关键模型和空间元数据的摘要，而不是输入文本或检索分数。
        en: Digest verifying returned coordinates and key model and space metadata rather than source text or retrieval score.
        ja: source text や retrieval score ではなく、返却 coordinate と主要 model および space metadata を検証する digest。
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-text-emb-jwt-01
      source_claims: [claim-text-embedding-api]
  constraints:
    - id: text-embedding-dimension-integrity
      severity: error
      expression_language: plain
      expression: representation_id, source_artifact_ref, representation_kind, encoding_schema_ref, input_digest, embedding_model, dimension, coordinate_encoding, vector_space_ref, encoding_run_ref, and representation_digest are required. The returned coordinate-array length must equal dimension, and a VectorIndex may consume it only when its declared schema and vector space are compatible.
      explanation:
        zh: 坐标数组、声明维度、编码架构和目标向量空间必须一致；IndexEntry 可以引用表示，但不等同于表示。
        en: Coordinate array, declared dimension, encoding schema, and target vector space must agree; an IndexEntry may reference the representation but is not the representation.
        ja: coordinate array、宣言 dimension、encoding schema、target vector space は一致しなければならず、IndexEntry は representation を参照できるが representation 自体ではない。
      source_claims: [claim-text-embedding-api, claim-text-embedding-index-boundary]
  required_relations: []
examples:
  - id: text-embedding-example

    labels: {zh: JWT 认证问题的文本嵌入, en: JWT auth question text embedding, ja: JWT認証質問のテキストエンベディング}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: text-emb-001, source_artifact_ref: chunk-jwt-question-v1, representation_kind: text_embedding, encoding_schema_ref: text-embedding-3-small-1536, input_digest: 'sha256:4e2181', embedding_model: text-embedding-3-small, dimension: 1536, coordinate_encoding: float, vector_space_ref: text-embedding-3-small-1536, encoding_run_ref: embedding-run-jwt-question-01, representation_digest: sha256-text-emb-001}
    related_node_ids: [TextEmbedding, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-text-embedding-api]
  - id: text-embedding-boundary-example

    labels: {zh: "索引条目不是嵌入向量", en: "Index entry is not embedding vector", ja: "索引項目は埋め込みベクトルではない"}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {index_entry_id: index-entry-77, representation_ref: text-emb-001, index_ref: project-index-p-88, vector_values_present: false}
    related_node_ids: [TextEmbedding, IndexEntry, VectorIndex]
    related_relation_ids: []

    source_claims: [claim-text-embedding-index-boundary]
  - id: text-embedding-counterexample-example

    labels: {zh: "把原文本当作向量", en: "Treating source text as a vector", ja: "原文をベクトルとして扱う"}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {chunk_ref: chunk-77, text_value: 'How to implement JWT auth', embedding_model_called: false, vector_values_present: false}
    related_node_ids: [TextEmbedding, Chunk, EmbeddingRun]
    related_relation_ids: []

    source_claims: [claim-text-embedding-api]
  - id: text-embedding-instance-example

    labels: {zh: "实例：JWT 文档文本嵌入", en: "Instance: JWT documentation text embedding", ja: "インスタンス：JWT 文書テキスト埋め込み"}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: text-emb-jwt-01, source_artifact_ref: chunk-jwt-document-v1, representation_kind: text_embedding, encoding_schema_ref: text-embedding-3-small-1536, input_digest: 'sha256:jwtchunk01', embedding_model: text-embedding-3-small, dimension: 1536, coordinate_encoding: float, vector_space_ref: text-embedding-3-small-1536, encoding_run_ref: embedding-run-jwt-01, representation_digest: sha256-text-emb-jwt-01}
    related_node_ids: [TextEmbedding, Chunk, IndexEntry]
    related_relation_ids: []

    source_claims: [claim-text-embedding-api]
parent_relation:
  id: TextEmbedding-is_a-EmbeddingVector
  predicate: is_a
  target: concept:EmbeddingVector
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是嵌入向量的文本子类, en: is a text subtype of embedding vector, ja: EmbeddingVector の text 下位型である}
  definitions: {zh: TextEmbedding 是由自然语言或其他文本内容生成的 EmbeddingVector，不是文本本身、EmbeddingRun、索引或检索候选。, en: A TextEmbedding is an EmbeddingVector generated from natural-language or other textual content, not the text itself, an EmbeddingRun, an index, or retrieval candidate., ja: TextEmbedding は自然言語又は他の textual content から生成された EmbeddingVector であり、text 自体、EmbeddingRun、index、retrieval candidate ではない。}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_text_embedding_subtype, labels: {zh: 具有文本嵌入子类, en: has text-embedding subtype, ja: text-embedding 下位型を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-text-embedding-subtype]
  distinct_fact_rationale: {zh: 此关系表达文本输入的嵌入类型，不表达文本切块、模型调用、索引写入或候选评分。, en: This relation classifies an embedding type by textual input and does not express chunking, model call, index write, or candidate scoring., ja: この関係は textual input による embedding type を分類し、chunking、model call、index write、candidate scoring を表さない。}
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-embeddings
    title: "OpenAI Embeddings"
    url: https://developers.openai.com/api/docs/guides/embeddings
    source_type: official-doc
    relevance: Text embedding API.
source_claims:
  - id: claim-text-embedding-api
    source: openai-embeddings
    supports: The Embeddings API accepts text or token input and a model and returns numeric embedding vectors that encode relatedness for search and related use cases.
    locator: "Vector embeddings guide: What are embeddings; request and response examples"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-text-embedding-index-boundary
    source: openai-embeddings
    supports: Moonweave keeps a TextEmbedding separate from an Index and IndexEntry even when the latter stores or references the embedding for search.
    locator: "Moonweave ontology design inference from claim-text-embedding-api"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-text-embedding-subtype
    source: openai-embeddings
    supports: Moonweave models a model-produced embedding from text or token input as the TextEmbedding subtype of EmbeddingVector.
    locator: "Moonweave ontology design inference from claim-text-embedding-api"
    evidence_kind: ontology-design-inference
    confidence: high
