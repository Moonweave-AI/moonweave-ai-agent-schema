schema: moonweave.ai/ontology-node/v1
id: DenseVector
kind: concept
status: accepted
labels:
  zh: 稠密向量
  en: Dense vector
  ja: 密ベクトル
semantics:
  short_definition:
    zh: 在每个已声明维度上保存一个数值坐标的向量表示。
    en: A vector representation carrying one numeric coordinate for every declared dimension.
    ja: 宣言された各 dimension に一つの数値座標を持つ vector representation。
  definition:
    zh: >-
      DenseVector 是 VectorRepresentation 的子类型，其固定维度载荷为连续的数值坐标序列，并引用输入工件、向量空间、编码和生成来源。
      它不是稀疏索引坐标、原始文本、索引槽位、相似度分数、检索排名或答案上下文。
    en: >-
      A DenseVector is a subtype of VectorRepresentation whose fixed-dimensional payload is a contiguous numeric-coordinate
      sequence and which references input artifact, vector space, encoding, and generating provenance. It is not sparse index
      coordinates, raw text, index slot, similarity score, retrieval rank, or answer context.
    ja: >-
      DenseVector は VectorRepresentation の下位型であり、固定 dimension の payload を連続した numeric-coordinate sequence として持ち、
      input artifact、vector space、encoding、generating provenance を参照する。sparse index coordinate、raw text、index slot、
      similarity score、retrieval rank、answer context ではない。
  why_needed:
    zh: 稠密向量为语义嵌入和近邻搜索提供统一的载荷形态，同时必须保留维度与模型空间边界。
    en: Dense vectors provide common payload shape for semantic embeddings and nearest-neighbor search while retaining dimension and model-space boundaries.
    ja: dense vector は semantic embedding と nearest-neighbor search の共通 payload shape を提供し dimension と model-space boundary を保持する。
  includes:
    - zh: 表示标识、输入引用、编码架构与运行、维度、连续坐标编码、向量空间和表示摘要。
      en: Representation ID, input reference, encoding schema and run, dimension, contiguous-coordinate encoding, vector space, and representation digest.
      ja: input 参照 dimension contiguous-coordinate encoding vector space generating provenance payload digest。
  excludes:
    - zh: 稀疏坐标对、词项权重、索引条目、查询相似度分数和上下文选择。
      en: Sparse coordinate pairs term weights index entry query similarity score and context selection.
      ja: sparse coordinate pair term weight index entry query similarity score context selection。
  semantic_kind: entity
  aliases: [dense embedding, dense numeric vector, 稠密嵌入]
engineering:
  explanation:
    zh: 嵌入器将输入文本或片段映射为固定长度 float 序列；索引可存储该载荷，但索引写入和查询分数是后续独立事实。
    en: An embedder maps input text or chunk to fixed-length float sequence; an index may store the payload but index write and query score are later independent facts.
    ja: embedder は input text または chunk を固定長 float sequence に写像する。index は payload を保存できるが index write と query score は後続の独立 fact である。
  typical_input:
    - description: Fixed chunk supplied to dense embedding model.
      format: |
        {"source_artifact_ref":"chunk-auth-guide-v3","model":"text-embedding-3-small","dimension":1536}
  typical_output:
    - description: Dense-vector metadata with no copied query score.
      format: |
        {"representation_id":"dense-auth-42","source_artifact_ref":"chunk-auth-guide-v3","representation_kind":"dense_vector","encoding_schema_ref":"text-embedding-3-small-1536","encoding_run_ref":"embedding-run-auth-42","representation_digest":"sha256-dense-auth-42","dimension":1536,"coordinate_encoding":"float32","vector_space_ref":"text-embedding-3-small-1536"}
  reference_implementations:
    - name: OpenAI embeddings
      url: https://platform.openai.com/docs/guides/embeddings
      description: Documents creating floating-point embedding vectors from input text.
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents storage and distance search for vector values.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: representation ID, ja: representation ID}
      definitions:
        zh: 稳定标识该稠密向量表示；沿用 VectorRepresentation 的实体身份，不为坐标形状创建第二标识。
        en: Stably identifies this dense-vector representation using the VectorRepresentation entity identity rather than creating a second identity for its coordinate shape.
        ja: coordinate shape 用の第二 identity を作らず、VectorRepresentation の entity identity でこの dense-vector representation を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:representation|dense)-[A-Za-z0-9._-]+$'
      example_value: dense-auth-42
      source_claims: [claim-dense-vector]
    - id: source_artifact_ref
      labels: {zh: 输入工件引用, en: source artifact reference, ja: source artifact 参照}
      definitions:
        zh: 指向被编码为稠密向量的固定输入工件。
        en: Points to fixed input artifact encoded as dense vector.
        ja: dense vector に符号化された固定 input artifact を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-auth-guide-v3
      source_claims: [claim-dense-vector]
    - id: representation_kind
      labels: {zh: 表示类型, en: representation kind, ja: representation kind}
      definitions:
        zh: 固定为 dense_vector，表明每个声明维度都有一个坐标。
        en: Fixed to dense_vector, indicating that every declared dimension has a coordinate.
        ja: dense_vector に固定され、宣言された各 dimension に coordinate があることを表す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [dense_vector]
      pattern: null
      example_value: dense_vector
      source_claims: [claim-dense-vector]
    - id: encoding_schema_ref
      labels: {zh: 编码架构引用, en: encoding schema reference, ja: encoding schema 参照}
      definitions:
        zh: 指向规定稠密向量维度、坐标编码和比较边界的架构。
        en: References the schema that specifies the dense vector's dimension, coordinate encoding, and comparison boundary.
        ja: dense vector の dimension、coordinate encoding、comparison boundary を規定する schema を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-dense-vector-space]
    - id: dimension
      labels: {zh: 向量维度, en: vector dimension, ja: vector dimension}
      definitions:
        zh: 声明连续坐标序列的固定长度。
        en: Declares fixed length of contiguous coordinate sequence.
        ja: 連続 coordinate sequence の固定長を宣言する。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims: [claim-dense-vector-space]
    - id: coordinate_encoding
      labels: {zh: 坐标编码, en: coordinate encoding, ja: coordinate encoding}
      definitions:
        zh: 声明连续数值的存储格式，不表示归一化或相似度度量。
        en: Declares storage format of contiguous values and does not state normalization or similarity metric.
        ja: 連続値の storage format を宣言し normalization や similarity metric を表さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [float32, float16, int8]
      pattern: null
      example_value: float32
      source_claims: [claim-dense-vector-space]
    - id: vector_space_ref
      labels: {zh: 向量空间引用, en: vector space reference, ja: vector space 参照}
      definitions:
        zh: 指向定义维度和比较兼容性的模型或空间配置。
        en: Points to model or space configuration defining dimension and comparison compatibility.
        ja: dimension と comparison compatibility を定義する model または space configuration を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-dense-vector-space]
    - id: encoding_run_ref
      labels: {zh: 编码运行引用, en: encoding run reference, ja: encoding run 参照}
      definitions:
        zh: 指向生成该稠密表示的嵌入运行或等价编码活动。
        en: Points to the embedding run or equivalent encoding activity that generated this dense representation.
        ja: この dense representation を生成した embedding run または同等の encoding activity を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-run-auth-42
      source_claims: [claim-dense-vector-provenance]
    - id: representation_digest
      labels: {zh: 表示摘要, en: representation digest, ja: representation digest}
      definitions:
        zh: 验证稠密表示载荷和关键元数据的完整性，不是近邻搜索的分数。
        en: Verifies dense-representation payload and key metadata integrity and is not a nearest-neighbor score.
        ja: dense-representation payload と主要 metadata の完全性を検証し、nearest-neighbor score ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-dense-auth-42
      source_claims: [claim-dense-vector-provenance]
  constraints:
    - id: dense-vector-complete-coordinate-shape
      severity: error
      expression_language: plain
      expression: representation_id, source_artifact_ref, representation_kind, encoding_schema_ref, encoding_run_ref, representation_digest, dimension, coordinate_encoding, and vector_space_ref are required. Dense payload must carry one coordinate for every declared dimension.
      explanation:
        zh: 稠密向量必须完整覆盖其声明维度，并保持输入与空间来源。
        en: A dense vector must cover every declared dimension and retain input and space provenance.
        ja: dense vector は宣言された各 dimension を完全に覆い input と space provenance を保持しなければならない。
      source_claims: [claim-dense-vector, claim-dense-vector-space, claim-dense-vector-design]
    - id: dense-vector-not-sparse-or-score
      severity: error
      expression_language: plain
      expression: DenseVector must not store sparse index-value pairs, term weights, index entry location, retrieval score, rank, or context selection outcome.
      explanation:
        zh: 稠密坐标载荷与稀疏特征、索引写入和检索决策具有不同边界。
        en: Dense coordinate payload has different boundary from sparse features index writes and retrieval decisions.
        ja: dense coordinate payload は sparse feature index write retrieval decision と異なる boundary を持つ。
      source_claims: [claim-dense-vector-provenance]
  required_relations: []
examples:
  - id: dense-vector-positive-openai

    labels: {zh: 认证指南稠密嵌入, en: Dense embedding for authentication guidance, ja: authentication guidance の dense embedding}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: dense-auth-42, source_artifact_ref: chunk-auth-guide-v3, representation_kind: dense_vector, encoding_schema_ref: text-embedding-3-small-1536, encoding_run_ref: embedding-run-auth-42, representation_digest: sha256-dense-auth-42, dimension: 1536, coordinate_encoding: float32, vector_space_ref: text-embedding-3-small-1536}
    related_node_ids: [DenseVector, VectorRepresentation, EmbeddingVector]
    related_relation_ids: [DenseVector-is_a-VectorRepresentation]

    source_claims: [claim-dense-vector]
  - id: dense-vector-counterexample-sparse

    labels: {zh: 稀疏词项权重被误称为稠密向量, en: Sparse term weights presented as dense vector, ja: sparse term weight を dense vector として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {sparse_vector_id: sparse-auth-42, nonzero_coordinates: '[12:0.7, 104:0.3]', dimension: 1536}
    related_node_ids: [DenseVector, SparseVector, VectorRepresentation]
    related_relation_ids: [DenseVector-is_a-VectorRepresentation]

    source_claims: [claim-dense-vector-space]
  - id: dense-vector-boundary-quantization

    labels: {zh: 量化稠密向量, en: Quantized dense vector, ja: quantized dense vector}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {representation_id: dense-auth-42-int8, source_artifact_ref: chunk-auth-guide-v3, representation_kind: dense_vector, encoding_schema_ref: text-embedding-3-small-1536-int8, encoding_run_ref: quantization-run-auth-42, representation_digest: sha256-dense-auth-42-int8, dimension: 1536, coordinate_encoding: int8, vector_space_ref: text-embedding-3-small-1536-int8}
    related_node_ids: [DenseVector, VectorRepresentation, IndexBuildRun]
    related_relation_ids: [DenseVector-is_a-VectorRepresentation]

    source_claims: [claim-dense-vector-space]
  - id: dense-vector-instance-pgvector

    labels: {zh: pgvector 稠密载荷实例, en: pgvector dense-payload instance, ja: pgvector dense-payload の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: dense-pgvector-17, source_artifact_ref: chunk-pgvector-17, representation_kind: dense_vector, encoding_schema_ref: support-embedding-768, encoding_run_ref: embedding-run-pgvector-17, representation_digest: sha256-dense-pgvector-17, dimension: 768, coordinate_encoding: float32, vector_space_ref: support-embedding-768}
    related_node_ids: [DenseVector, IndexEntry, IndexBuildRun]
    related_relation_ids: [DenseVector-is_a-VectorRepresentation]
    source_claims: [claim-dense-vector]
parent_relation:
  id: DenseVector-is_a-VectorRepresentation
  predicate: is_a
  target: concept:VectorRepresentation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是向量表示的稠密子类, en: is a dense subtype of vector representation, ja: VectorRepresentation の dense 下位型である}
  definitions:
    zh: DenseVector 是以每个维度都有坐标为差异的 VectorRepresentation。
    en: DenseVector is VectorRepresentation with the differentia of one coordinate for every dimension.
    ja: DenseVector は各 dimension に一つの coordinate を持つことを差異とする VectorRepresentation である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_dense_vector_subtype, labels: {zh: 具有稠密向量子类, en: has dense-vector subtype, ja: dense-vector 下位型を持つ}}
  conditions:
    - id: dense-vector-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when vector payload has one coordinate for every declared dimension under a declared vector space.
      explanation:
        zh: 子类型差异是全维度连续坐标载荷。
        en: The subtype differentia is contiguous coordinate payload covering every dimension.
        ja: subtype の differentia は各 dimension を覆う連続 coordinate payload である。
      source_claims: [claim-dense-vector]
  temporal_scope: valid-time
  boundary_context: Indexing and scoring may use a dense vector later without altering its payload identity.
  constraints: []
  examples: []
  source_claims: [claim-dense-vector]
  distinct_fact_rationale: This relation classifies coordinate shape and does not express encoding run index write or search result.
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-embeddings
    title: OpenAI embeddings guide
    source_type: official-documentation
    url: https://platform.openai.com/docs/guides/embeddings
    relevance: Documents numerical embedding vectors generated from text input.
  - id: pgvector
    title: pgvector
    source_type: official-documentation
    url: https://github.com/pgvector/pgvector
    relevance: Documents storage and distance search for dense vector values.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates generated entities from generating and using activities.
source_claims:
  - id: claim-dense-vector
    source: openai-embeddings
    supports: OpenAI documents embeddings as numerical vector representations.
    locator: "Embeddings guide: numerical vector representation"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-dense-vector-space
    source: pgvector
    supports: pgvector documents vector dimensions and distance-search operators for vector values.
    locator: "README: vector type and distance operators"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-dense-vector-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity from activities.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-dense-vector-design
    source: w3c-prov-o
    supports: Moonweave uses DenseVector for a full coordinate sequence with inherited representation provenance, keeping index writes and query scores outside the vector entity.
    locator: "Moonweave ontology design inference from claim-dense-vector, claim-dense-vector-space, and claim-dense-vector-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
