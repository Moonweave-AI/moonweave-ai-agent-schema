schema: moonweave.ai/ontology-node/v1
id: SparseVector
kind: concept
status: accepted
labels:
  zh: 稀疏向量
  en: Sparse vector
  ja: 疎ベクトル
semantics:
  short_definition:
    zh: 仅显式存储非零坐标及其数值的向量表示。
    en: A vector representation that explicitly stores only nonzero coordinates and their values.
    ja: 非ゼロ coordinate とその値だけを明示的に保存する vector representation。
  definition:
    zh: >-
      SparseVector 是 VectorRepresentation 的子类型，以索引和值的有限集合表示高维向量，并声明总维度、坐标编码、特征空间和生成来源。
      它不是每维连续载荷、原始词项文本、倒排索引设施、BM25 分数、检索排名或最终候选集。
    en: >-
      A SparseVector is a subtype of VectorRepresentation that represents a high-dimensional vector as a finite set of
      index-value coordinates and declares total dimension, coordinate encoding, feature space, and provenance. It is not
      a contiguous value for every dimension, raw term text, inverted-index facility, BM25 score, retrieval rank, or final candidate set.
    ja: >-
      SparseVector は VectorRepresentation の下位型であり、高 dimension vector を index-value coordinate の有限集合として表し、
      total dimension、coordinate encoding、feature space、provenance を宣言する。各 dimension の連続値、raw term text、
      inverted-index facility、BM25 score、retrieval rank、最終 candidate set ではない。
  why_needed:
    zh: 稀疏表示可保留词项或特征信号而无需存储全量零值，且应与稠密嵌入和词法评分分开。
    en: Sparse representation preserves term or feature signal without storing all zero values and must remain distinct from dense embeddings and lexical scores.
    ja: sparse representation は全ゼロ値を保存せず term または feature signal を保持し dense embedding と lexical score から区別する必要がある。
  includes:
    - zh: 表示标识、输入引用、编码架构与运行、总维度、非零数、坐标编码、特征向量空间和摘要。
      en: Representation ID, input reference, encoding schema and run, total dimension, nonzero count, coordinate encoding, feature vector space, and digest.
      ja: input 参照 total dimension nonzero count coordinate encoding feature space provenance digest。
  excludes:
    - zh: 每维连续数组、原始词项正文、BM25 分数、索引服务、排名和答案。
      en: Contiguous per-dimension array raw term body BM25 score index service rank and answer.
      ja: contiguous per-dimension array raw term body BM25 score index service rank answer。
  semantic_kind: entity
  aliases: [sparse embedding, feature vector, 稀疏特征向量]
engineering:
  explanation:
    zh: 特征化活动把输入工件映射为少量非零索引和值；索引或融合步骤可引用该向量，但不能把后续词法分数写回载荷。
    en: A featurization activity maps input artifact to a small set of nonzero indices and values; index or fusion may reference it but cannot write later lexical score back into payload.
    ja: featurization activity は input artifact を少数の nonzero index と value に写像する。index または fusion は参照できるが後続 lexical score を payload に書き戻せない。
  typical_input:
    - description: Document chunk and vocabulary schema supplied to a sparse featurizer.
      format: |
        {"source_artifact_ref":"chunk-search-guide-v2","encoding_schema_ref":"bm25-vocabulary-v1","vector_space_ref":"bm25-vocabulary-v1","dimension":50000}
  typical_output:
    - description: Sparse-vector metadata separate from any retrieval score.
      format: |
        {"representation_id":"sparse-search-42","source_artifact_ref":"chunk-search-guide-v2","representation_kind":"sparse_vector","encoding_schema_ref":"bm25-vocabulary-v1","encoding_run_ref":"sparse-encode-run-42","representation_digest":"sha256-sparse-search-42","dimension":50000,"nonzero_count":37,"coordinate_encoding":"index-float32","vector_space_ref":"bm25-vocabulary-v1"}
  reference_implementations:
    - name: Elasticsearch similarity settings
      url: https://www.elastic.co/docs/reference/elasticsearch/index-settings/similarity
      description: Documents text-field similarity and BM25 configuration.
    - name: Pinecone hybrid search
      url: https://docs.pinecone.io/guides/search/hybrid-search
      description: Documents combining dense and sparse vector components in retrieval.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: representation ID, ja: representation ID}
      definitions:
        zh: 稳定标识该稀疏向量表示；沿用 VectorRepresentation 的实体身份，而不是为非零坐标另建标识。
        en: Stably identifies this sparse-vector representation using the VectorRepresentation entity identity rather than creating another identity for its nonzero coordinates.
        ja: nonzero coordinate 用に別 identity を作らず、VectorRepresentation の entity identity でこの sparse-vector representation を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:representation|sparse)-[A-Za-z0-9._-]+$'
      example_value: sparse-search-42
      source_claims: [claim-sparse-vector]
    - id: source_artifact_ref
      labels: {zh: 输入工件引用, en: source artifact reference, ja: source artifact 参照}
      definitions:
        zh: 指向被特征化的固定输入工件版本。
        en: Points to fixed input-artifact version that was featurized.
        ja: feature 化された固定 input-artifact version を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-search-guide-v2
      source_claims: [claim-sparse-vector]
    - id: representation_kind
      labels: {zh: 表示类型, en: representation kind, ja: representation kind}
      definitions:
        zh: 固定为 sparse_vector，表明载荷只显式存储非零索引值对。
        en: Fixed to sparse_vector, indicating that the payload explicitly stores only nonzero index-value pairs.
        ja: sparse_vector に固定され、payload が非ゼロ index-value pair だけを明示的に保存することを表す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [sparse_vector]
      pattern: null
      example_value: sparse_vector
      source_claims: [claim-sparse-vector]
    - id: encoding_schema_ref
      labels: {zh: 编码架构引用, en: encoding schema reference, ja: encoding schema 参照}
      definitions:
        zh: 指向规定特征提取、词汇表版本和坐标解释规则的架构。
        en: References the schema that specifies feature extraction, vocabulary version, and coordinate-interpretation rules.
        ja: feature extraction、vocabulary version、coordinate interpretation rule を規定する schema を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: bm25-vocabulary-v1
      source_claims: [claim-sparse-vector-space]
    - id: dimension
      labels: {zh: 总维度, en: total dimension, ja: total dimension}
      definitions:
        zh: 声明特征空间总坐标数，而非非零数。
        en: Declares total coordinate count of feature space rather than nonzero count.
        ja: nonzero count ではなく feature space の総 coordinate count を宣言する。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 50000
      source_claims: [claim-sparse-vector-space]
    - id: nonzero_count
      labels: {zh: 非零坐标数, en: nonzero coordinate count, ja: nonzero coordinate count}
      definitions:
        zh: 记录实际存储的索引值对数量，必须小于或等于总维度。
        en: Records number of stored index-value pairs and must be no greater than total dimension.
        ja: 保存された index-value pair 数を記録し total dimension 以下でなければならない。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 37
      source_claims: [claim-sparse-vector-space]
    - id: coordinate_encoding
      labels: {zh: 坐标编码, en: coordinate encoding, ja: coordinate encoding}
      definitions:
        zh: 声明索引和值对的编码方式，不声明检索排序算法。
        en: Declares encoding of index-value pairs and does not declare retrieval ranking algorithm.
        ja: index-value pair の encoding を宣言し retrieval ranking algorithm を宣言しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [index-float32, index-float16, term-weight]
      pattern: null
      example_value: index-float32
      source_claims: [claim-sparse-vector-space]
    - id: vector_space_ref
      labels: {zh: 特征向量空间引用, en: feature vector-space reference, ja: feature vector-space 参照}
      definitions:
        zh: 指向定义特征索引、词汇表和跨稀疏向量可比较性边界的向量空间配置。
        en: Points to vector-space configuration defining feature indices, vocabulary, and the comparison boundary across sparse vectors.
        ja: feature index、vocabulary、sparse vector 間の comparison boundary を定義する vector-space configuration を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: bm25-vocabulary-v1
      source_claims: [claim-sparse-vector-space]
    - id: encoding_run_ref
      labels: {zh: 编码运行引用, en: encoding run reference, ja: encoding run 参照}
      definitions:
        zh: 指向生成稀疏坐标的特征化运行或活动。
        en: Points to the featurization run or activity that generated the sparse coordinates.
        ja: sparse coordinate を生成した featurization run または activity を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: sparse-encode-run-42
      source_claims: [claim-sparse-vector-provenance]
    - id: representation_digest
      labels: {zh: 表示摘要, en: representation digest, ja: representation digest}
      definitions:
        zh: 验证非零坐标载荷和关键词汇表元数据的摘要，而不是词法相关性分数。
        en: Digest verifying the nonzero-coordinate payload and key vocabulary metadata rather than a lexical relevance score.
        ja: lexical relevance score ではなく nonzero-coordinate payload と主要 vocabulary metadata を検証する digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-sparse-search-42
      source_claims: [claim-sparse-vector-provenance]
  constraints:
    - id: sparse-vector-coordinate-validity
      severity: error
      expression_language: plain
      expression: representation_id, source_artifact_ref, representation_kind, encoding_schema_ref, encoding_run_ref, representation_digest, dimension, nonzero_count, coordinate_encoding, and vector_space_ref are required. Every coordinate index must be in range and nonzero_count must not exceed dimension.
      explanation:
        zh: 稀疏载荷只有在总维度、非零边界和特征空间明确时才可被解释。
        en: A sparse payload is interpretable only when total dimension nonzero boundary and feature space are explicit.
        ja: sparse payload は total dimension nonzero boundary feature space が明示されたときのみ解釈可能である。
      source_claims: [claim-sparse-vector-space, claim-sparse-vector-provenance, claim-sparse-vector-design]
    - id: sparse-vector-not-bm25-score
      severity: error
      expression_language: plain
      expression: SparseVector must not contain a BM25 result score, final rank, index service identity, candidate selection, answer text, or storage-write outcome.
      explanation:
        zh: 特征向量是评分输入；BM25 值和排名是后续检索或排序输出。
        en: A feature vector is scoring input while BM25 value and rank are later retrieval or ranking outputs.
        ja: feature vector は scoring input であり BM25 値と rank は後続 retrieval または ranking output である。
      source_claims: [claim-sparse-vector-provenance]
  required_relations: []
examples:
  - id: sparse-vector-positive-terms

    labels: {zh: 搜索指南稀疏特征, en: Sparse features for search guide, ja: search guide の sparse feature}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: sparse-search-42, source_artifact_ref: chunk-search-guide-v2, representation_kind: sparse_vector, encoding_schema_ref: bm25-vocabulary-v1, encoding_run_ref: sparse-encode-run-42, representation_digest: sha256-sparse-search-42, dimension: 50000, nonzero_count: 37, coordinate_encoding: index-float32, vector_space_ref: bm25-vocabulary-v1}
    related_node_ids: [SparseVector, VectorRepresentation, TfIdfIndex]
    related_relation_ids: [SparseVector-is_a-VectorRepresentation]

    source_claims: [claim-sparse-vector]
  - id: sparse-vector-counterexample-dense

    labels: {zh: 连续稠密数组被误称为稀疏向量, en: Dense array presented as sparse vector, ja: dense array を sparse vector として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {representation_id: dense-auth-42, representation_kind: dense_vector, dimension: 1536, coordinate_encoding: float32}
    related_node_ids: [SparseVector, DenseVector, VectorRepresentation]
    related_relation_ids: [SparseVector-is_a-VectorRepresentation]

    source_claims: [claim-sparse-vector-space]
  - id: sparse-vector-boundary-vocabulary-change

    labels: {zh: 词汇表版本变更, en: Vocabulary-version change, ja: vocabulary version の変更}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {representation_id: sparse-search-42-v2, source_artifact_ref: chunk-search-guide-v2, representation_kind: sparse_vector, encoding_schema_ref: bm25-vocabulary-v2, encoding_run_ref: sparse-encode-run-43, representation_digest: sha256-sparse-search-42-v2, dimension: 52000, nonzero_count: 36, coordinate_encoding: term-weight, vector_space_ref: bm25-vocabulary-v2}
    related_node_ids: [SparseVector, Representation, IndexVersion]
    related_relation_ids: [SparseVector-is_a-VectorRepresentation]

    source_claims: [claim-sparse-vector-space]
  - id: sparse-vector-instance-hybrid

    labels: {zh: 混合检索稀疏组件实例, en: Hybrid-search sparse-component instance, ja: hybrid-search sparse-component の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: sparse-hybrid-17, source_artifact_ref: chunk-hybrid-17, representation_kind: sparse_vector, encoding_schema_ref: hybrid-vocabulary-v1, encoding_run_ref: sparse-encode-run-hybrid-17, representation_digest: sha256-sparse-hybrid-17, dimension: 100000, nonzero_count: 44, coordinate_encoding: term-weight, vector_space_ref: hybrid-vocabulary-v1}
    related_node_ids: [SparseVector, HybridIndex, RankFusion]
    related_relation_ids: [SparseVector-is_a-VectorRepresentation]
    source_claims: [claim-sparse-vector]
parent_relation:
  id: SparseVector-is_a-VectorRepresentation
  predicate: is_a
  target: concept:VectorRepresentation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是向量表示的稀疏子类, en: is a sparse subtype of vector representation, ja: VectorRepresentation の sparse 下位型である}
  definitions:
    zh: SparseVector 是以有限非零索引值对表示的 VectorRepresentation。
    en: SparseVector is VectorRepresentation expressed as finite nonzero index-value pairs.
    ja: SparseVector は有限の nonzero index-value pair で表す VectorRepresentation である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_sparse_vector_subtype, labels: {zh: 具有稀疏向量子类, en: has sparse-vector subtype, ja: sparse-vector 下位型を持つ}}
  conditions:
    - id: sparse-vector-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when vector payload is a finite set of nonzero index-value coordinates with declared total dimension and feature space.
      explanation:
        zh: 子类型差异是有限非零坐标及其特征空间边界。
        en: The subtype differentia is finite nonzero coordinates with feature-space boundary.
        ja: subtype の differentia は feature-space boundary を持つ有限 nonzero coordinate である。
      source_claims: [claim-sparse-vector]
  temporal_scope: valid-time
  boundary_context: A later lexical score or hybrid fusion can use sparse vector without changing its coordinate identity.
  constraints: []
  examples: []
  source_claims: [claim-sparse-vector]
  distinct_fact_rationale: This relation classifies sparse coordinate shape and does not express scoring or index-write activity.
  layout_role: primary-backbone
relations: []
sources:
  - id: elasticsearch-similarity
    title: Elasticsearch similarity settings
    source_type: official-documentation
    url: https://www.elastic.co/docs/reference/elasticsearch/index-settings/similarity
    relevance: Documents text-field similarity and BM25 configuration.
  - id: pinecone-hybrid-search
    title: Pinecone hybrid search
    source_type: official-documentation
    url: https://docs.pinecone.io/guides/search/hybrid-search
    relevance: Documents dense and sparse components in hybrid vector search.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates sparse-vector entities from activities that generate and use them.
source_claims:
  - id: claim-sparse-vector
    source: pinecone-hybrid-search
    supports: Pinecone documents hybrid search with dense and sparse vector components.
    locator: "Hybrid search: dense and sparse vector inputs"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-sparse-vector-space
    source: elasticsearch-similarity
    supports: Elasticsearch documents text-field similarity settings including BM25 configuration.
    locator: "Similarity settings: field-level similarity and BM25"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-sparse-vector-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-sparse-vector-design
    source: w3c-prov-o
    supports: Moonweave models SparseVector as a representation of nonzero coordinates under a declared vocabulary-backed vector space, separate from lexical scores, fusion, and index writes.
    locator: "Moonweave ontology design inference from claim-sparse-vector, claim-sparse-vector-space, and claim-sparse-vector-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
