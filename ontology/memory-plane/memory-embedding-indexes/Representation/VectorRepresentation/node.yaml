schema: moonweave.ai/ontology-node/v1
id: VectorRepresentation
kind: concept
status: accepted
labels:
  zh: 向量表示
  en: Vector representation
  ja: ベクトル表現
semantics:
  short_definition:
    zh: 以有序数值坐标编码一个输入工件的表示实体。
    en: A representation entity that encodes one input artifact as ordered numeric coordinates.
    ja: 一つの input artifact を順序付き数値座標として符号化する representation entity。
  definition:
    zh: >-
      VectorRepresentation 是 Representation 的子类型，其载荷在已声明向量空间和坐标编码下由固定维度的数值坐标表示。
      它不等同于原始文本、索引结构、索引条目、单个相似度分数、排名或检索结果。
    en: >-
      A VectorRepresentation is a subtype of Representation whose payload is numeric coordinates of fixed dimension under
      a declared vector space and coordinate encoding. It is not raw text, an index structure, index entry, one similarity
      score, rank, or retrieval result.
    ja: >-
      VectorRepresentation は Representation の下位型であり、宣言された vector space と coordinate encoding の下で固定 dimension の
      数値座標として payload を表す。raw text、index structure、index entry、一つの similarity score、rank、retrieval result ではない。
  why_needed:
    zh: 统一向量表示身份可让密集、稀疏和嵌入向量共享可审计的输入、空间和来源边界。
    en: A shared vector-representation identity gives dense, sparse, and embedding vectors auditable input, space, and provenance boundaries.
    ja: 共通の vector-representation identity は dense sparse embedding vector に監査可能な input space provenance boundary を与える。
  includes:
    - zh: 表示标识、输入工件引用、编码架构与运行、维度、坐标编码、向量空间引用和摘要。
      en: Representation ID, input-artifact reference, encoding schema and run, dimension, coordinate encoding, vector-space reference, and digest.
      ja: input-artifact 参照 dimension coordinate encoding vector-space 参照 provenance digest。
  excludes:
    - zh: 原始内容、索引配置、索引写入位置、查询分数和最终候选列表。
      en: Raw content index configuration index-write location query score and final candidate list.
      ja: raw content index configuration index-write location query score final candidate list。
  semantic_kind: entity
  aliases: [numeric vector, vector encoding, 数值向量]
engineering:
  explanation:
    zh: 编码器生成有维度和空间约束的坐标载荷；向量索引可引用该表示执行搜索，但搜索或写入不会改变表示本身。
    en: An encoder emits coordinate payload constrained by dimension and vector space; a vector index may reference it for search while searching or writing does not alter the representation.
    ja: encoder は dimension と vector space に制約された coordinate payload を出力する。vector index は search のため参照できるが search や write は representation を変更しない。
  typical_input:
    - description: A fixed artifact and the declared schema and vector space used by the encoder.
      format: |
        {"source_artifact_ref":"chunk-auth-guide-v3","encoding_schema_ref":"text-embedding-3-small-1536","vector_space_ref":"text-embedding-3-small-1536","coordinate_encoding":"float32"}
  typical_output:
    - description: Vector representation metadata emitted by an encoder.
      format: |
        {"representation_id":"vector-auth-42","source_artifact_ref":"chunk-auth-guide-v3","representation_kind":"embedding_vector","encoding_schema_ref":"text-embedding-3-small-1536","encoding_run_ref":"embedding-run-auth-42","representation_digest":"sha256-vector-auth-42","dimension":1536,"coordinate_encoding":"float32","vector_space_ref":"text-embedding-3-small-1536"}
  reference_implementations:
    - name: pgvector
      url: https://github.com/pgvector/pgvector
      description: Documents vector data types and similarity search for PostgreSQL.
    - name: FAISS Index API
      url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
      description: Documents search over numeric vector representations.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels: {zh: 表示标识, en: representation ID, ja: representation ID}
      definitions:
        zh: 稳定标识该向量表示记录；与其父类 Representation 使用同一实体身份，而不是另建向量或索引槽位身份。
        en: Stably identifies this vector-representation record using the same entity identity as its parent Representation, not a second vector or index-slot identity.
        ja: 親 Representation と同じ entity identity でこの vector-representation record を安定して識別し、別の vector または index-slot identity を作らない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^(?:representation|vector)-[A-Za-z0-9._-]+$'
      example_value: vector-auth-42
      source_claims: [claim-vector-representation]
    - id: source_artifact_ref
      labels: {zh: 输入工件引用, en: source artifact reference, ja: source artifact 参照}
      definitions:
        zh: 指向被编码为向量的固定输入工件版本。
        en: Points to fixed input-artifact version encoded as this vector.
        ja: この vector に符号化された固定 input-artifact version を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-auth-guide-v3
      source_claims: [claim-vector-representation]
    - id: representation_kind
      labels: {zh: 表示类型, en: representation kind, ja: representation kind}
      definitions:
        zh: 声明该记录属于向量表示家族；具体子类型可把该值收窄为密集、稀疏或特定嵌入类型。
        en: Declares that this record belongs to the vector-representation family; a concrete subtype may narrow it to dense, sparse, or a specific embedding kind.
        ja: この record が vector-representation family に属することを宣言し、具体的 subtype は dense、sparse、または特定 embedding kind に絞り込める。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [vector, dense_vector, sparse_vector, embedding_vector, text_embedding, graph_embedding]
      pattern: null
      example_value: embedding_vector
      source_claims: [claim-vector-representation]
    - id: encoding_schema_ref
      labels: {zh: 编码架构引用, en: encoding schema reference, ja: encoding schema 参照}
      definitions:
        zh: 指向规定此向量的坐标语义、维度和兼容性规则的编码架构，而不是索引版本。
        en: References the encoding schema that specifies this vector's coordinate semantics, dimension, and compatibility rules rather than an index version.
        ja: index version ではなく、この vector の coordinate semantics、dimension、互換性規則を規定する encoding schema を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-vector-space]
    - id: dimension
      labels: {zh: 向量维度, en: vector dimension, ja: vector dimension}
      definitions:
        zh: 声明坐标数量，必须与向量空间和载荷兼容。
        en: Declares coordinate count and must be compatible with vector space and payload.
        ja: coordinate count を宣言し vector space と payload に互換でなければならない。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: 1536
      source_claims: [claim-vector-space]
    - id: coordinate_encoding
      labels: {zh: 坐标编码, en: coordinate encoding, ja: coordinate encoding}
      definitions:
        zh: 声明坐标存储格式，不等同于相似度度量。
        en: Declares coordinate storage format and is not a similarity metric.
        ja: coordinate storage format を宣言し similarity metric ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [float32, float16, int8, sparse_coordinate]
      pattern: null
      example_value: float32
      source_claims: [claim-vector-space]
    - id: vector_space_ref
      labels: {zh: 向量空间引用, en: vector space reference, ja: vector space 参照}
      definitions:
        zh: 指向定义维度、模型或度量兼容性边界的向量空间配置。
        en: References vector-space configuration defining dimension model or metric compatibility boundary.
        ja: dimension model metric compatibility boundary を定義する vector-space configuration を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: text-embedding-3-small-1536
      source_claims: [claim-vector-space]
    - id: encoding_run_ref
      labels: {zh: 编码运行引用, en: encoding run reference, ja: encoding run 参照}
      definitions:
        zh: 指向生成向量表示的编码运行或活动，不表示索引已接纳该表示。
        en: Points to the encoding run or activity that generated this vector representation and does not mean an index accepted it.
        ja: この vector representation を生成した encoding run または activity を指し、index が受理したことを意味しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-run-auth-42
      source_claims: [claim-vector-provenance]
    - id: representation_digest
      labels: {zh: 表示摘要, en: representation digest, ja: representation digest}
      definitions:
        zh: 验证向量载荷和关键空间元数据的表示摘要，而非检索评分。
        en: Representation digest that verifies vector payload and key space metadata rather than a retrieval score.
        ja: retrieval score ではなく vector payload と主要 space metadata を検証する representation digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-vector-auth-42
      source_claims: [claim-vector-provenance]
  constraints:
    - id: vector-representation-space-compatibility
      severity: error
      expression_language: plain
      expression: representation_id, source_artifact_ref, representation_kind, encoding_schema_ref, encoding_run_ref, representation_digest, dimension, coordinate_encoding, and vector_space_ref are required. Dimension and encoding must be compatible with vector_space_ref and encoding_schema_ref.
      explanation:
        zh: 向量数值只有在输入、维度、编码和空间一同声明时才可被安全比较或索引。
        en: Vector values can be safely compared or indexed only when input dimension encoding and space are declared together.
        ja: vector 値は input dimension encoding space が共に宣言された場合にのみ安全に比較または index 化できる。
      source_claims: [claim-vector-space, claim-vector-provenance, claim-vector-representation-design]
    - id: vector-representation-not-index-or-score
      severity: error
      expression_language: plain
      expression: VectorRepresentation must not contain an index entry location, retrieval rank, similarity score, answer text, or candidate-selection outcome.
      explanation:
        zh: 向量表示是计算输入或数据载荷；写入位置和检索决策属于其他实体或活动。
        en: A vector representation is computational input or data payload; write location and retrieval decisions belong to other entities or activities.
        ja: vector representation は計算 input または data payload であり write location と retrieval decision は他の entity または activity に属する。
      source_claims: [claim-vector-provenance]
  required_relations: []
examples:
  - id: vector-representation-positive-dense

    labels: {zh: 认证片段密集向量, en: Dense vector for authentication chunk, ja: authentication chunk の dense vector}

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: vector-auth-42, source_artifact_ref: chunk-auth-guide-v3, representation_kind: embedding_vector, encoding_schema_ref: text-embedding-3-small-1536, encoding_run_ref: embedding-run-auth-42, representation_digest: sha256-vector-auth-42, dimension: 1536, coordinate_encoding: float32, vector_space_ref: text-embedding-3-small-1536}
    related_node_ids: [VectorRepresentation, Representation, DenseVector]
    related_relation_ids: [VectorRepresentation-is_a-Representation]

    source_claims: [claim-vector-representation]
  - id: vector-representation-counterexample-score

    labels: {zh: 相似度评分被误称为向量, en: Similarity score presented as vector, ja: similarity score を vector として提示}

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {candidate_ref: candidate-auth-42, metric: cosine, similarity_value: 0.91}
    related_node_ids: [VectorRepresentation, SimilarityScore, RetrievedCandidate]
    related_relation_ids: [VectorRepresentation-is_a-Representation]

    source_claims: [claim-vector-space]
  - id: vector-representation-boundary-quantized

    labels: {zh: 同一空间的量化向量, en: Quantized vector in same space, ja: 同じ space の quantized vector}

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {representation_id: vector-auth-42-int8, source_artifact_ref: chunk-auth-guide-v3, representation_kind: dense_vector, encoding_schema_ref: text-embedding-3-small-1536-int8, encoding_run_ref: quantization-run-auth-42, representation_digest: sha256-vector-auth-42-int8, dimension: 1536, coordinate_encoding: int8, vector_space_ref: text-embedding-3-small-1536-int8}
    related_node_ids: [VectorRepresentation, DenseVector, IndexBuildRun]
    related_relation_ids: [VectorRepresentation-is_a-Representation]

    source_claims: [claim-vector-space]
  - id: vector-representation-instance-pgvector

    labels: {zh: pgvector 表示实例, en: pgvector representation instance, ja: pgvector representation の事例}

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: vector-pgvector-17, source_artifact_ref: chunk-pgvector-17, representation_kind: dense_vector, encoding_schema_ref: support-embedding-768, encoding_run_ref: embedding-run-pgvector-17, representation_digest: sha256-vector-pgvector-17, dimension: 768, coordinate_encoding: float32, vector_space_ref: support-embedding-768}
    related_node_ids: [VectorRepresentation, Index, IndexEntry]
    related_relation_ids: [VectorRepresentation-is_a-Representation]
    source_claims: [claim-vector-representation]
parent_relation:
  id: VectorRepresentation-is_a-Representation
  predicate: is_a
  target: concept:Representation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是表示的向量子类, en: is a vector subtype of representation, ja: Representation の vector 下位型である}
  definitions:
    zh: VectorRepresentation 是以有序数值坐标表示内容的 Representation。
    en: VectorRepresentation is Representation expressed through ordered numeric coordinates.
    ja: VectorRepresentation は順序付き数値座標で内容を表す Representation である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_vector_representation_subtype, labels: {zh: 具有向量表示子类, en: has vector-representation subtype, ja: vector-representation 下位型を持つ}}
  conditions:
    - id: vector-representation-subtype-condition
      severity: error
      expression_language: plain
      expression: Assert this subtype only when a representation has ordered numeric coordinates with declared dimension encoding and vector-space boundary.
      explanation:
        zh: 子类型差异是有空间边界的有序数值坐标载荷。
        en: The subtype differentia is ordered numeric-coordinate payload with vector-space boundary.
        ja: subtype の differentia は vector-space boundary を持つ順序付き numeric-coordinate payload である。
      source_claims: [claim-vector-space]
  temporal_scope: valid-time
  boundary_context: Indexing or scoring can use a vector representation later without changing its representation type.
  constraints: []
  examples: []
  source_claims: [claim-vector-representation]
  distinct_fact_rationale: This relation classifies vector encoding and does not express generation indexing or retrieval scoring.
  layout_role: primary-backbone
relations: []
sources:
  - id: pgvector
    title: pgvector
    source_type: official-documentation
    url: https://github.com/pgvector/pgvector
    relevance: Documents vector data and distance search in PostgreSQL.
  - id: faiss-index-api
    title: FAISS Index API
    source_type: official-documentation
    url: https://faiss.ai/cpp_api/struct/structfaiss_1_1Index.html
    relevance: Documents search over numeric vector representations.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Separates vector entities from generating and using activities.
source_claims:
  - id: claim-vector-representation
    source: pgvector
    supports: pgvector documents vector data types and nearest-neighbor search operators.
    locator: "README: vector type and nearest-neighbor search"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-vector-space
    source: faiss-index-api
    supports: FAISS Index search operates on numeric vectors with a configured dimension.
    locator: "Index API: vector dimension and search inputs"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-vector-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes entities from activities.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-vector-representation-design
    source: w3c-prov-o
    supports: Moonweave models a VectorRepresentation as a Representation with declared coordinate shape, encoding, and vector-space compatibility, separate from index placement and retrieval scoring.
    locator: "Moonweave ontology design inference from claim-vector-representation, claim-vector-space, and claim-vector-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
