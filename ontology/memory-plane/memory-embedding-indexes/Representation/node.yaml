schema: moonweave.ai/ontology-node/v1
id: Representation
kind: concept
status: accepted
labels:
  zh: 表示
  en: Representation
  ja: 表現
semantics:
  short_definition:
    zh: 将一个固定信息工件编码为可计算形式的可追溯实体。
    en: A traceable entity that encodes one fixed information artifact into a computable form.
    ja: 一つの固定情報 artifact を計算可能な形式へ符号化する追跡可能な entity。
  definition:
    zh: >-
      Representation 是引用一个输入工件版本、编码方案和产生来源的实体数据。它保存表示的身份、类型、架构和完整性摘要，
      但不等同于原始文本或片段、索引定义、索引条目、一次检索候选项、评分、查询请求或模型生成答案。
    en: >-
      A Representation is entity data that references an input-artifact version, encoding scheme, and generating provenance.
      It retains representation identity, kind, schema, and integrity digest, but is not the raw text or chunk, an index definition,
      index entry, one retrieval candidate, score, query request, or model-generated answer.
    ja: >-
      Representation は input-artifact version、encoding scheme、generating provenance を参照する entity data である。
      representation identity、kind、schema、integrity digest を保持するが、raw text や chunk、index definition、index entry、
      retrieval candidate、score、query request、model-generated answer ではない。
  why_needed:
    zh: 明确表示身份可将内容编码、索引写入和检索评分分离，并允许重建或比较编码而不丢失输入来源。
    en: Explicit representation identity separates content encoding from index writes and retrieval scoring while allowing encodings to be rebuilt or compared without losing input provenance.
    ja: 明確な representation identity は content encoding を index write と retrieval scoring から分け、input provenance を失わず encoding を再構築または比較できる。
  includes:
    - zh: 输入工件引用、表示类型、编码架构、生成来源和完整性摘要。
      en: Input-artifact reference representation kind encoding schema generating provenance and integrity digest.
      ja: input-artifact 参照 representation kind encoding schema generating provenance integrity digest。
  excludes:
    - zh: 原始正文副本、索引部署、索引条目、查询结果、候选评分、答案文本和存储写入结果。
      en: Raw-body copy index deployment index entry query result candidate score answer text and storage-write result.
      ja: raw-body copy index deployment index entry query result candidate score answer text storage-write result。
  semantic_kind: entity
  aliases: [encoding artifact, feature representation, 编码表示]
engineering:
  explanation:
    zh: 编码活动读取固定输入工件和编码方案，生成独立表示记录；索引构建运行随后引用该记录写入索引，而不修改表示身份。
    en: An encoding activity reads a fixed input artifact and encoding scheme then emits an independent representation record; an index-build run later references it for writes without changing representation identity.
    ja: encoding activity は固定 input artifact と encoding scheme を読み独立した representation record を生成する。index-build run は後で write のため参照し representation identity を変更しない。
  typical_input:
    - description: Fixed source artifact supplied to an encoding operation.
      format: |
        {
          "source_artifact_ref": "chunk-auth-guide-v3",
          "encoding_schema_ref": "embedding-schema-v1",
          "encoding_run_ref": "embedding-run-auth-42"
        }
  typical_output:
    - description: Immutable representation metadata emitted by the encoder.
      format: |
        {
          "representation_id": "representation-auth-42",
          "source_artifact_ref": "chunk-auth-guide-v3",
          "representation_kind": "vector",
          "encoding_schema_ref": "embedding-schema-v1",
          "encoding_run_ref": "embedding-run-auth-42",
          "representation_digest": "sha256-representation-auth-42"
        }
  reference_implementations:
    - name: OpenAI embeddings
      url: https://platform.openai.com/docs/guides/embeddings
      description: Documents creating numerical embedding representations from input text.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities separately from activities that generate and use them.
structure:
  identity_keys: [representation_id]
  fields:
    - id: representation_id
      labels:
        zh: 表示标识
        en: representation ID
        ja: representation ID
      definitions:
        zh: 稳定标识一个编码输出记录，而不是输入工件或索引条目。
        en: Stably identifies one encoding-output record rather than input artifact or index entry.
        ja: input artifact や index entry ではなく一つの encoding-output record を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^representation-[A-Za-z0-9._-]+$'
      example_value: representation-auth-42
      source_claims: [claim-representation-encoding]
    - id: source_artifact_ref
      labels:
        zh: 输入工件引用
        en: source artifact reference
        ja: source artifact 参照
      definitions:
        zh: 指向被编码的固定输入工件版本，不复制其正文。
        en: Points to fixed input-artifact version that was encoded without copying its body.
        ja: body を複製せず符号化された固定 input-artifact version を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: chunk-auth-guide-v3
      source_claims: [claim-representation-encoding]
    - id: representation_kind
      labels:
        zh: 表示类型
        en: representation kind
        ja: representation kind
      definitions:
        zh: 声明编码产物的形式族，而非索引部署或查询策略。
        en: Declares form family of encoded artifact rather than index deployment or query policy.
        ja: index deployment や query policy ではなく encoded artifact の form family を宣言する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [vector, sparse_vector, graph_embedding]
      pattern: null
      example_value: vector
      source_claims: [claim-representation-encoding]
    - id: encoding_schema_ref
      labels:
        zh: 编码架构引用
        en: encoding schema reference
        ja: encoding schema 参照
      definitions:
        zh: 指向定义表示类型、维度或兼容性规则的架构，而不是具体索引版本。
        en: References schema defining representation type dimension or compatibility rules rather than concrete index version.
        ja: concrete index version ではなく representation type dimension compatibility rule を定義する schema を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-schema-v1
      source_claims: [claim-representation-schema]
    - id: encoding_run_ref
      labels:
        zh: 编码运行引用
        en: encoding run reference
        ja: encoding run 参照
      definitions:
        zh: 指向生成表示的活动或运行记录，不表示索引已写入。
        en: Points to activity or run producing representation and does not state that an index was written.
        ja: representation を生成した activity または run を指し index が書き込まれたことを表さない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: embedding-run-auth-42
      source_claims: [claim-representation-provenance]
    - id: representation_digest
      labels:
        zh: 表示摘要
        en: representation digest
        ja: representation digest
      definitions:
        zh: 验证表示载荷和关键元数据完整性的摘要，而不是相关性评分。
        en: Digest that verifies representation payload and key metadata integrity rather than relevance score.
        ja: relevance score ではなく representation payload と主要 metadata の完全性を検証する digest。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^sha256-[A-Za-z0-9._-]+$'
      example_value: sha256-representation-auth-42
      source_claims: [claim-representation-provenance]
  constraints:
    - id: representation-input-schema-provenance
      severity: error
      expression_language: plain
      expression: source_artifact_ref, representation_kind, encoding_schema_ref, encoding_run_ref, and representation_digest are required. Representation metadata must remain compatible with its declared schema.
      explanation:
        zh: 可审计表示需要绑定固定输入、编码类型、架构和生成来源，不能只存放匿名数值。
        en: An auditable representation binds fixed input encoding kind schema and generation provenance rather than storing anonymous numbers alone.
        ja: 監査可能な representation は匿名数値だけを保存せず固定 input encoding kind schema generation provenance を結ぶ。
      source_claims: [claim-representation-encoding, claim-representation-schema, claim-representation-design]
    - id: representation-not-index-or-result
      severity: error
      expression_language: plain
      expression: Representation must not contain index membership, retrieval rank, query result, candidate score, answer text, or storage-write outcome.
      explanation:
        zh: 表示是编码产物；索引写入、检索结果和下游使用必须保留为独立事实。
        en: Representation is encoding output; index writes retrieval results and downstream use remain distinct facts.
        ja: Representation は encoding output であり index write retrieval result downstream use は別 fact に保つ。
      source_claims: [claim-representation-provenance]
  required_relations: []
examples:
  - id: representation-positive-vector

    labels:
      zh: 文档片段的向量表示
      en: Vector representation of a document chunk
      ja: document chunk の vector representation

    descriptions:
      zh: Pinecone index.upsert/query + metadata filter；Weaviate collections + hybrid search；Qdrant PointStruct upsert/search；pgvector <=> operator；ColBERT MaxSim。
      en: Pinecone index.upsert/query + metadata filter; Weaviate collections + hybrid search; Qdrant PointStruct upsert/search; pgvector <=> operator; ColBERT MaxSim.
      ja: Pinecone upsert/query + metadata filter。Weaviate hybrid。Qdrant upsert/search。pgvector <=>。ColBERT MaxSim。
    field_values: {representation_id: representation-auth-42, source_artifact_ref: chunk-auth-guide-v3, representation_kind: vector, encoding_schema_ref: embedding-schema-v1, encoding_run_ref: embedding-run-auth-42, representation_digest: sha256-representation-auth-42}
    related_node_ids: [Representation, VectorRepresentation, EmbeddingRun]
    related_relation_ids: []

    source_claims: [claim-representation-encoding]
  - id: representation-counterexample-index-entry

    labels:
      zh: 索引条目被误称为表示
      en: Index entry presented as representation
      ja: index entry を representation として提示

    descriptions:
      zh: 反例：match score 标为 SimilarityScore 但未记录 embedding model/dimensions/IndexVersion。
      en: Counterexample: match score as SimilarityScore without embedding model/dimensions/IndexVersion.
      ja: 反例：match score を SimilarityScore とし IndexVersion 記録なし。
    field_values: {index_entry_id: entry-auth-42, shard_ref: shard-auth-1, index_key: auth-guide-42}
    related_node_ids: [Representation, IndexEntry, IndexShard]
    related_relation_ids: []

    source_claims: [claim-representation-schema]
  - id: representation-boundary-reencoding

    labels:
      zh: 同一输入的重新编码
      en: Re-encoding the same input
      ja: 同じ input の再符号化

    descriptions:
      zh: ColBERT late-interaction token vectors vs dense cosine VectorIndex；Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless。
      en: ColBERT late-interaction token vectors vs dense cosine VectorIndex; Redis FT.CREATE VECTOR HNSW vs managed Pinecone serverless.
      ja: ColBERT late-interaction vs dense cosine VectorIndex。Redis VECTOR HNSW vs Pinecone serverless。
    field_values: {representation_id: representation-auth-42-v2, source_artifact_ref: chunk-auth-guide-v3, representation_kind: vector, encoding_schema_ref: embedding-schema-v2, encoding_run_ref: embedding-run-auth-43, representation_digest: sha256-representation-auth-42-v2}
    related_node_ids: [Representation, EmbeddingVector, EmbeddingRun]
    related_relation_ids: []

    source_claims: [claim-representation-schema]
  - id: representation-instance-openai

    labels:
      zh: OpenAI 嵌入表示实例
      en: OpenAI embedding representation instance
      ja: OpenAI embedding representation の事例

    descriptions:
      zh: ChromaDB collection.add + query；Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes。
      en: ChromaDB collection.add + query; Redis FT.SEARCH "*=>[KNN 10 @vec $q]" PARAMS 2 query_vec bytes.
      ja: ChromaDB add + query。Redis FT.SEARCH KNN 10 @vec。
    field_values: {representation_id: representation-openai-17, source_artifact_ref: chunk-openai-17, representation_kind: vector, encoding_schema_ref: openai-text-embedding-3-small, encoding_run_ref: embedding-run-openai-17, representation_digest: sha256-representation-openai-17}
    related_node_ids: [Representation, EmbeddingVector, EmbeddingRun]
    related_relation_ids: []
    source_claims: [claim-representation-encoding, claim-representation-provenance]
parent_relation: null
relations: []
sources:
  - id: openai-embeddings
    title: OpenAI embeddings guide
    source_type: official-documentation
    url: https://platform.openai.com/docs/guides/embeddings
    relevance: Documents numerical embedding representations created from input text.
  - id: w3c-prov-o
    title: W3C PROV-O
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines entities separately from the activities that generate or use them.
source_claims:
  - id: claim-representation-encoding
    source: openai-embeddings
    supports: OpenAI documents embeddings as numerical representations of supplied input content.
    locator: "Embeddings guide: what are embeddings and create input"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-representation-schema
    source: openai-embeddings
    supports: The OpenAI embeddings API accepts a model and input, and text-embedding-3 models accept an optional output-dimensions parameter.
    locator: "Embeddings guide: model and input parameters"
    evidence_kind: official-documentation
    confidence: medium
  - id: claim-representation-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity from the activities that generate and use it.
    locator: "PROV-O: Entity Activity and wasGeneratedBy"
    evidence_kind: standard
    confidence: high
  - id: claim-representation-design
    source: w3c-prov-o
    supports: Moonweave models each Representation as an immutable encoding output with source-artifact, schema, run, kind, and digest metadata, separate from its generating activity and later index or retrieval use.
    locator: "Moonweave ontology design inference from claim-representation-encoding, claim-representation-schema, and claim-representation-provenance"
    evidence_kind: ontology-design-inference
    confidence: high
