schema: moonweave.ai/ontology-node/v1
id: MemoryOperation
kind: concept
status: accepted
labels:
  zh: 记忆操作
  en: Memory operation
  ja: 記憶操作
semantics:
  short_definition:
    zh: 改变、评估或解决记忆生命周期状态的可观测活动。
    en: An observable activity that changes, assesses, or resolves memory lifecycle state.
    ja: 記憶lifecycle状態を変更・評価・解決する観測可能activityです。
  definition:
    zh: MemoryOperation 是有明确操作身份、开始时间、执行者/策略语境和可审计结果的活动；它作用于候选记忆或既有记录，但不是记录、结果文档或审计事件本身。
    en: MemoryOperation is an activity with a stable operation identity, start time, actor or policy context, and auditable result. It acts on candidate memory or existing records but is not the record, result document, or audit event itself.
    ja: MemoryOperation は安定operation identity・開始時刻・actor/policy文脈・監査可能resultを持つactivityで、candidate memoryまたは既存recordに作用しますが、record・result文書・audit event自体ではありません。
  why_needed:
    zh: 统一承载准入、修订、处置、评估和冲突解决，而不把这些动作压平成同义动词。
    en: Provides one root for admission, revision, disposition, assessment, and conflict resolution without flattening them into synonymous verbs.
    ja: admission・revision・disposition・assessment・conflict resolutionを一rootにまとめつつ同義動詞へ平坦化しません。
  includes:
    - zh: 纳入具有可观察输入、执行边界和结果的记忆生命周期活动。
      en: Includes memory lifecycle activities with observable inputs, execution boundaries, and results.
      ja: 観測可能input・実行境界・resultを持つmemory lifecycle activityを含みます。
  excludes:
    - zh: 排除 MemoryRecord、MemoryOperationResult、MemoryAuditEvent、策略定义和仅描述未来动作的计划。
      en: Excludes MemoryRecord, MemoryOperationResult, MemoryAuditEvent, policy definitions, and plans that merely describe a future action.
      ja: MemoryRecord・MemoryOperationResult・MemoryAuditEvent・policy定義・将来actionを記述するだけのplanを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨执行与审计记录稳定标识一次操作。
        en: Stable identifier for one operation across execution and audit records.
        ja: 実行とaudit recordを跨いで一operationを安定識別します。
      allowed_values: []
      pattern: null
      example_value: mem-op-2041
      source_claims:
        - claim-memory-operation-002
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录操作开始的事件时间。
        en: Records the event time at which the operation began.
        ja: operation開始のevent timeを記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:30:00Z
      source_claims:
        - claim-memory-operation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆操作正例
      en: "Positive case: Memory operation"
      ja: 記憶操作正例
    scenario_id: null
    descriptions:
      zh: mem-op-2041 在策略 pol-memory-7 下开始一次写入并形成可追踪结果。
      en: mem-op-2041 starts a write under policy pol-memory-7 and produces a traceable result.
      ja: mem-op-2041 はpolicy pol-memory-7の下でwriteを開始し追跡可能resultを生成します。
    field_values:
      operation_id: mem-op-2041
      started_at: 2026-07-16T09:30:00Z
    related_node_ids:
      - MemoryOperation
    related_relation_ids: []
    expected_result:
      zh: 归类为 MemoryOperation，并由具体子类进一步判定。
      en: Classify as MemoryOperation and refine it through a concrete subtype.
      ja: MemoryOperationに分類し具体subtypeでさらに判定します。
    why_valid_or_invalid:
      zh: 存在独立活动身份、时间边界和可审计结果。
      en: It has an independent activity identity, temporal boundary, and auditable result.
      ja: 独立activity identity・時間境界・監査可能resultがあります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-operation-001
  - id: MemoryOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆操作边界例
      en: "Boundary case: Memory operation"
      ja: 記憶操作境界例
    scenario_id: null
    descriptions:
      zh: record-2041 是写入完成后的持久记忆记录。
      en: record-2041 is the persistent memory record after the write completes.
      ja: record-2041 はwrite完了後のpersistent memory recordです。
    field_values: {}
    related_node_ids:
      - MemoryOperation
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryOperation。
      en: Do not classify it as MemoryOperation.
      ja: MemoryOperationに分類しません。
    why_valid_or_invalid:
      zh: 它是活动产生的信息实体，不具有操作执行身份。
      en: It is an information entity generated by an activity and has no operation execution identity.
      ja: activityが生成したinformation entityでoperation実行identityを持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-operation-001
  - id: MemoryOperation-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 可审计记忆操作实例
      en: Auditable memory-operation instance
      ja: 監査可能 memory-operation instance
    scenario_id: MemoryOperation:instance:mem-op-2041
    descriptions:
      zh: mem-op-2041 在 2026-07-16T09:30:00Z 开始并引用 pol-memory-7；活动状态保留同一 operation_id，供输入、结果和审计事件共同引用。
      en: mem-op-2041 starts at 2026-07-16T09:30:00Z under pol-memory-7 and retains one operation_id for its inputs, result, and audit event to reference.
      ja: mem-op-2041 は 2026-07-16T09:30:00Z に pol-memory-7 の下で開始し、input・result・audit event が参照する一つの operation_id を保持します。
    field_values:
      operation_id: mem-op-2041
      started_at: 2026-07-16T09:30:00Z
    related_node_ids:
      - MemoryOperation
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent
    expected_result:
      zh: 查询以 mem-op-2041 汇集活动输入、输出结果和审计事件，同时保持 MemoryOperation 与这些信息节点的身份分离。
      en: Queries join activity inputs, output result, and audit event through mem-op-2041 while keeping MemoryOperation distinct from those information nodes.
      ja: query は mem-op-2041 で activity input・output result・audit event を結合し MemoryOperation と information node の identity を分離します。
    why_valid_or_invalid:
      zh: 稳定操作标识和开始时间共同识别一次真实活动，结果与审计只是其关联信息，不会把记录误当成活动实例。
      en: A stable operation identifier and start time identify one activity, while result and audit remain linked information rather than being mistaken for the activity.
      ja: stable operation identifier と start time が一 activity を識別し result/audit は linked information のままで activity と誤認されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-operation-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: MemoryOperation-acts_on-MemoryRecord
    predicate: acts_on
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 作用于记忆记录
      en: acts on memory record
      ja: memory recordへ作用する
    definitions:
      zh: MemoryOperation —acts_on→ MemoryRecord 表示既有记录是该操作直接评估、修订、处置或解决所针对的对象。
      en: MemoryOperation —acts_on→ MemoryRecord means the existing record is the direct object assessed, revised, disposed, or resolved by the operation.
      ja: MemoryOperation —acts_on→ MemoryRecord は既存recordがoperationのassessment・revision・disposition・resolutionのdirect objectであることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_acts_on
      labels:
        zh: 反向读取
        en: inverse acts on memory record
        ja: 逆方向読取
    conditions:
      - id: MemoryOperation-acts_on-MemoryRecord-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the record ID is explicit in the operation input or target list; admission of a candidate MemoryItem does not gain this edge from a future output record.
        explanations:
          zh: 仅在操作输入或目标清单中显式列出该 record_id 时成立；候选 MemoryItem 的准入不凭未来输出记录建立此边。
          en: Assert only when the record ID is explicit in the operation input or target list; admission of a candidate MemoryItem does not gain this edge from a future output record.
          ja: operation input/target listにrecord IDが明示される時だけassertしcandidate MemoryItem admissionはfuture output recordからこのedgeを得ません。
        source_claims:
          - claim-memory-operation-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperation-acts_on-MemoryRecord-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 作用于记忆记录正例
          en: "Positive case: acts on memory record"
          ja: memory recordへ作用する正例
        scenario_id: MemoryOperation-acts_on-MemoryRecord:positive:20260716
        descriptions:
          zh: update-512 的 target_record_ids 与 predecessor_record_id 都明确包含 record-512-v1，活动实际读取其内容后生成后继。
          en: update-512 explicitly lists record-512-v1 in both target_record_ids and predecessor_record_id and reads its content before generating a successor.
          ja: update-512 は target_record_ids と predecessor_record_id に record-512-v1 を明示し、その content を読んで successor を生成します。
        field_values: {}
        related_node_ids:
          - MemoryOperation
          - MemoryRecord
        related_relation_ids:
          - MemoryOperation-acts_on-MemoryRecord
        expected_result:
          zh: 建立 update-512 acts_on record-512-v1，并把该记录视为活动直接处理的现有对象。
          en: Assert that update-512 acts_on record-512-v1 and treat the record as the existing object directly processed by the activity.
          ja: update-512 acts_on record-512-v1 を確立し、record を activity が直接処理する existing object とします。
        why_valid_or_invalid:
          zh: 目标记录身份在操作输入中出现且影响输出，符合 PROV-O 活动使用实体以及本关系的直接对象条件。
          en: The record identity appears in operation input and affects the output, satisfying PROV-O activity usage and this relation's direct-object condition.
          ja: record identity は operation input に現れ output に影響し、PROV-O activity usage と direct-object condition を満たします。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-001
      - id: MemoryOperation-acts_on-MemoryRecord-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 作用于记忆记录边界例
          en: "Boundary case: acts on memory record"
          ja: memory recordへ作用する境界例
        scenario_id: MemoryOperation-acts_on-MemoryRecord:boundary:20260716
        descriptions:
          zh: write-310 只消费候选 item-310；未来生成的 record-310-v1 在操作开始时尚不存在，也未列入 target_record_ids。
          en: write-310 consumes only candidate item-310; future record-310-v1 does not exist at operation start and is absent from target_record_ids.
          ja: write-310 は候補 item-310 のみ consume し、future record-310-v1 は operation start 時に存在せず target_record_ids にもありません。
        field_values: {}
        related_node_ids:
          - MemoryOperation
          - MemoryRecord
        related_relation_ids:
          - MemoryOperation-acts_on-MemoryRecord
        expected_result:
          zh: 拒绝建立 write-310 acts_on record-310-v1；使用 produces 关系表达输出，而不是倒置为现有对象。
          en: Reject write-310 acts_on record-310-v1; express the output with produces instead of treating a future entity as an existing target.
          ja: write-310 acts_on record-310-v1 を拒否し、future entity を existing target とせず produces で表します。
        why_valid_or_invalid:
          zh: 生成物不能因事后与操作关联就成为操作开始时的处理对象，否则输入与输出角色会失去方向性。
          en: A generated entity does not become an operation-start target merely through later association, or input and output roles lose direction.
          ja: generated entity は後の association だけで operation-start target にはならず、そうすると input/output role の方向が失われます。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-001
    source_claims:
      - claim-memory-operation-001
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:MemoryRecord
  - id: MemoryOperation-governed_by-PolicySpecification
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受策略规范治理
      en: is governed by policy specification
      ja: policy specificationにより統治される
    definitions:
      zh: MemoryOperation —governed_by→ PolicySpecification 表示该操作的允许条件、保留规则或处置约束由指定策略版本决定。
      en: MemoryOperation —governed_by→ PolicySpecification means the operation's permission conditions, retention rules, or disposition constraints are determined by the specified policy version.
      ja: MemoryOperation —governed_by→ PolicySpecification はoperationのpermission condition・retention rule・disposition constraintが指定policy版で決まることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_governed_by
      labels:
        zh: 反向读取
        en: inverse is governed by policy specification
        ja: 逆方向読取
    conditions:
      - id: MemoryOperation-governed_by-PolicySpecification-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when execution records policy_id and policy_version and that policy applies to the object, scope, and time.
        explanations:
          zh: 仅当执行记录保存 policy_id 和 policy_version，且策略确实适用于该对象、作用域与时间时成立。
          en: Assert only when execution records policy_id and policy_version and that policy applies to the object, scope, and time.
          ja: executionがpolicy_id/versionを保存しpolicyがobject・scope・timeへ適用される時だけassertします。
        source_claims:
          - claim-memory-operation-004
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperation-governed_by-PolicySpecification-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 受策略规范治理正例
          en: "Positive case: is governed by policy specification"
          ja: policy specificationにより統治される正例
        scenario_id: MemoryOperation-governed_by-PolicySpecification:positive:20260716
        descriptions:
          zh: delete-1304 的执行记录引用 forget-policy@v7；该版本适用于 tenant-a、目标记录类别与请求发生时间，并要求生成最小墓碑。
          en: delete-1304 cites forget-policy@v7, whose tenant, record class, and effective interval cover the operation and require a minimized tombstone.
          ja: delete-1304 は forget-policy@v7 を参照し、その tenant・record class・effective interval が operation を覆い minimized tombstone を要求します。
        field_values: {}
        related_node_ids:
          - MemoryOperation
          - PolicySpecification
        related_relation_ids:
          - MemoryOperation-governed_by-PolicySpecification
        expected_result:
          zh: 建立 delete-1304 governed_by forget-policy@v7，并把该精确版本的许可条件和处置约束绑定到执行。
          en: Assert delete-1304 governed_by forget-policy@v7 and bind that exact version's permission and disposition constraints to execution.
          ja: delete-1304 governed_by forget-policy@v7 を確立し exact version の permission/disposition constraint を execution に bind します。
        why_valid_or_invalid:
          zh: 策略 ID、版本、对象、租户和时间均匹配，能够解释活动为何获准以及必须如何处理输出。
          en: Policy ID, version, object class, tenant, and time all match, explaining both authorization and required output handling.
          ja: policy ID・version・object class・tenant・time が全て一致し authorization と required output handling を説明します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-004
      - id: MemoryOperation-governed_by-PolicySpecification-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 受策略规范治理边界例
          en: "Boundary case: is governed by policy specification"
          ja: policy specificationにより統治される境界例
        scenario_id: MemoryOperation-governed_by-PolicySpecification:boundary:20260716
        descriptions:
          zh: 另一个 tenant-b 也有名为 forget-policy 的 v7，但其作用域不包含 tenant-a 的 record-1304。
          en: Tenant-b has a policy also named forget-policy v7, but its scope does not include tenant-a record-1304.
          ja: tenant-b にも forget-policy v7 がありますが、その scope は tenant-a record-1304 を含みません。
        field_values: {}
        related_node_ids:
          - MemoryOperation
          - PolicySpecification
        related_relation_ids:
          - MemoryOperation-governed_by-PolicySpecification
        expected_result:
          zh: 拒绝用 tenant-b 策略治理 delete-1304；在找到适用的策略身份前，把治理证据标为缺失。
          en: Reject tenant-b's policy as governor of delete-1304 and mark governance evidence missing until an applicable policy identity is found.
          ja: tenant-b policy による delete-1304 governance を拒否し applicable policy identity が見つかるまで evidence missing とします。
        why_valid_or_invalid:
          zh: 同名同版本仍可能属于不同作用域；不验证租户、对象和生效时间会错误授予或限制记忆操作。
          en: The same name and version can exist in different scopes; omitting tenant, object, and effective-time checks can misauthorize a memory operation.
          ja: 同名 version でも scope は異なり、tenant・object・effective time の未検証は memory operation を誤認可します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-004
    source_claims:
      - claim-memory-operation-004
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:PolicySpecification
  - id: MemoryOperation-performed_by-Actor
    predicate: performed_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由行动者执行
      en: is performed by actor
      ja: actorにより実行される
    definitions:
      zh: MemoryOperation —performed_by→ Actor 表示该主体对操作执行负有直接责任，而不只是创建策略或拥有记录。
      en: MemoryOperation —performed_by→ Actor identifies the actor directly responsible for executing the operation, not merely the policy author or record owner.
      ja: MemoryOperation —performed_by→ Actor はoperation実行へ直接責任を持つactorを示しpolicy author/record ownerだけではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_performed_by
      labels:
        zh: 反向读取
        en: inverse is performed by actor
        ja: 逆方向読取
    conditions:
      - id: MemoryOperation-performed_by-Actor-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when execution or audit records bind actor_id as the executing actor for that operation ID.
        explanations:
          zh: 仅当执行或审计记录把 actor_id 绑定为该 operation_id 的执行主体时成立。
          en: Assert only when execution or audit records bind actor_id as the executing actor for that operation ID.
          ja: execution/audit recordがactor_idをそのoperation IDのexecuting actorとしてbindする時だけassertします。
        source_claims:
          - claim-memory-operation-005
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperation-performed_by-Actor-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 由行动者执行正例
          en: "Positive case: is performed by actor"
          ja: actorにより実行される正例
        scenario_id: MemoryOperation-performed_by-Actor:positive:20260716
        descriptions:
          zh: audit-310 把 actor_id=agent-memory-worker-4 记录为 write-310 的 executing_actor，并包含该 actor 发起提交的事件。
          en: audit-310 records actor_id=agent-memory-worker-4 as write-310's executing_actor and includes the commit event initiated by that actor.
          ja: audit-310 は actor_id=agent-memory-worker-4 を write-310 の executing_actor とし、その actor が開始した commit event を含みます。
        field_values: {}
        related_node_ids:
          - MemoryOperation
          - Actor
        related_relation_ids:
          - MemoryOperation-performed_by-Actor
        expected_result:
          zh: 建立 write-310 performed_by agent-memory-worker-4，使该执行活动的直接责任主体可查询。
          en: Assert write-310 performed_by agent-memory-worker-4 so the actor directly responsible for this execution is queryable.
          ja: write-310 performed_by agent-memory-worker-4 を確立し execution の direct responsible actor を照会可能にします。
        why_valid_or_invalid:
