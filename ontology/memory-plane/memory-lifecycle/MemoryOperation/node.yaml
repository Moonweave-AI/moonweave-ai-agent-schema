schema: moonweave.ai/ontology-node/v1
id: MemoryOperation
kind: concept
labels:
  zh: 记忆操作
  en: Memory operation
  ja: 記憶操作
semantics:
  short_definition:
    zh: 可审计的记忆生命周期活动。
    en: Auditable memory lifecycle activity.
    ja: 監査可能な記憶ライフサイクル activity。
  definition:
    zh: MemoryOperation 是具有 operation_id、started_at 与可追踪输入输出的活动根概念；统摄准入、评估、修订、处置与冲突解决等子类，但不是 MemoryRecord、MemoryOperationResult 或 MemoryAuditEvent 等信息产物。集成 Mem0 POST/PUT/DELETE /v1/memories、Letta archival 工具、LangGraph store.put/delete 与 Generative Agents 式衰减/反思时，每次后端调用应映射为具名操作节点。
    en: MemoryOperation is the activity root with operation_id, started_at, and traceable inputs and outputs. It subsumes admission, assessment, revision, disposition, and conflict-resolution subtypes but is not an information artifact such as MemoryRecord, MemoryOperationResult, or MemoryAuditEvent. When integrating Mem0 POST/PUT/DELETE /v1/memories, Letta archival tools, LangGraph store.put/delete, and Generative Agents-style decay/reflection, each backend call should map to a named operation node.
    ja: MemoryOperation は operation_id・started_at・追跡可能 input/output を持つ activity root で、admission/assessment/revision/disposition/conflict-resolution subtype を包含しますが MemoryRecord・MemoryOperationResult・MemoryAuditEvent 等 information artifact ではありません。Mem0 POST/PUT/DELETE /v1/memories、Letta archival、LangGraph store.put/delete、Generative Agents 型 decay/reflection 統合時は各 backend 呼出しを named operation node に写像します。
  why_needed:
    zh: 没有独立操作身份，团队无法区分 Mem0 PUT 更新、Letta 删除与 LangGraph TTL 到期各自改变了哪条记录。
    en: Without independent operation identity, teams cannot tell which Mem0 PUT update, Letta delete, or LangGraph TTL expiry changed which record.
    ja: 独立 operation identity がなければ Mem0 PUT 更新・Letta 削除・LangGraph TTL 期限がどの record を変えたか区別できません。
  includes:
    - zh: 纳入具有 operation_id、started_at 与阶段边界的写入、更新、删除、衰减与冲突解决活动。
      en: Includes write, update, delete, decay, and conflict-resolution activities with operation_id, started_at, and stage boundaries.
      ja: operation_id・started_at・stage boundary を持つ write/update/delete/decay/conflict-resolution activity。
  excludes:
    - zh: 排除 MemoryRecord、MemoryOperationResult、MemoryAuditEvent、MemoryStore 与保留策略定义。
      en: Excludes MemoryRecord, MemoryOperationResult, MemoryAuditEvent, MemoryStore, and retention policy definitions.
      ja: MemoryRecord・MemoryOperationResult・MemoryAuditEvent・MemoryStore・retention policy 定義を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 POST/PUT/DELETE /v1/memories、Letta archival_memory_insert/delete/update、LangGraph store.put/delete 以及 Generative Agents recency/reflection 均是一次可命名的 MemoryOperation 或其后代；操作记录 started_at、backend、method 与 consumed/produced record，产物另行建模。
    en: Mem0 POST/PUT/DELETE /v1/memories, Letta archival_memory_insert/delete/update, LangGraph store.put/delete, and Generative Agents recency/reflection each map to a named MemoryOperation or subtype; the operation records started_at, backend, method, and consumed/produced records while artifacts are modeled separately.
    ja: Mem0 POST/PUT/DELETE /v1/memories、Letta archival、LangGraph store.put/delete、Generative Agents recency/reflection はいずれも named MemoryOperation または subtype。operation は started_at・backend・method・consumed/produced record を記録し artifact は別建模。
  typical_input:
    - description: Mem0 add memory — POST creates a new memory from messages.
      format: |
        POST https://api.mem0.ai/v1/memories/
        {
          "messages": [{"role": "user", "content": "Prefers TypeScript."}],
          "user_id": "alice"
        }
      source_claims: [claim-memory-operation-mem0]
  typical_output:
    - description: Moonweave-local lifecycle operation record.
      format: |
        {
          "operation_id": "write-310",
          "started_at": "2026-07-16T09:30:00Z",
          "backend": "mem0",
          "operation_type": "MemoryWrite"
        }
      source_claims: [claim-memory-operation-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: POST/PUT/DELETE /v1/memories for add, update, and delete.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_insert, update, and delete tools.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.put and BaseStore.delete with optional TTL.
    - name: Generative Agents
      url: https://arxiv.org/abs/2304.03442
      description: Memory stream reflection and recency decay (Park et al. 2023).
structure:
  identity_keys: [operation_id]
  fields:
    - id: operation_id
      labels: {zh: 操作标识, en: Operation identifier, ja: 操作識別子}
      definitions:
        zh: 稳定标识一次记忆域操作；对应 Moonweave run/stage 主键。
        en: Stable identifier for one memory-domain operation; Moonweave run/stage primary key.
        ja: 一 memory-domain operation を安定識別。Moonweave run/stage 主キー。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: mem-op-2041
      allowed_values: []
      source_claims: [claim-memory-operation-id]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions:
        zh: 操作开始的 UTC 事件时间；API 调用发起时刻映射到此字段。
        en: UTC event time when the operation started; maps from API call initiation time.
        ja: 操作開始 UTC event time。API 呼出し開始時刻を写像。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T09:30:00Z
      allowed_values: []
      source_claims: [claim-memory-operation-started]
    - id: backend
      labels: {zh: 后端产品, en: Backend product, ja: バックエンド製品}
      definitions:
        zh: 声明执行该操作的后端，如 mem0、letta、langgraph、generative-agents。
        en: Declares the backend executing the operation, e.g., mem0, letta, langgraph, generative-agents.
        ja: mem0/letta/langgraph/generative-agents 等 backend を宣言。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mem0
      allowed_values: []
      source_claims: [claim-memory-operation-backend]
  constraints: []
  required_relations: []
examples:
  - id: MemoryOperation-example-mem0-post
    labels:
      zh: Mem0 写入操作
      en: Mem0 write operation
      ja: Mem0 書込操作
    descriptions:
      zh: 应用调用 Mem0 POST /v1/memories/ 并记录 operation_id=write-310、started_at 与 backend=mem0；返回的 memory_id 映射到 MemoryRecord，而非操作本身。
      en: The app calls Mem0 POST /v1/memories/ and records operation_id=write-310, started_at, and backend=mem0; returned memory_id maps to MemoryRecord, not the operation.
      ja: Mem0 POST /v1/memories/ を呼び operation_id=write-310・backend=mem0 を記録。memory_id は MemoryRecord へ写像。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/
    field_values:
      operation_id: write-310
      started_at: 2026-07-16T09:30:00Z
      backend: mem0
    related_node_ids:
      - MemoryOperation
      - MemoryWrite
    related_relation_ids: []
    source_claims:
      - claim-memory-operation-mem0
      - claim-memory-operation-design
  - id: MemoryOperation-example-letta-delete
    labels:
      zh: Letta 归档删除操作
      en: Letta archival delete operation
      ja: Letta アーカイブ削除操作
    descriptions:
      zh: 智能体调用 archival_memory_delete 并记录 operation_id=delete-801、backend=letta；Moonweave 将其建模为 MemoryDelete 而非检索空结果。
      en: The agent calls archival_memory_delete and records operation_id=delete-801, backend=letta; Moonweave models this as MemoryDelete rather than empty search.
      ja: archival_memory_delete を呼び operation_id=delete-801・backend=letta を記録。MemoryDelete として建模。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      version: archival_memory_delete
    field_values:
      operation_id: delete-801
      backend: letta
    related_node_ids:
      - MemoryOperation
      - MemoryDelete
    related_relation_ids: []
    source_claims:
      - claim-memory-operation-letta
      - claim-memory-operation-design
  - id: MemoryOperation-example-langgraph-put
    labels:
      zh: LangGraph store.put 操作
      en: LangGraph store.put operation
      ja: LangGraph store.put 操作
    descriptions:
      zh: LangGraph 应用对 namespace (tenant-7, user-42) 执行 store.put 并记录 operation_id=put-512、backend=langgraph。
      en: A LangGraph app runs store.put on namespace (tenant-7, user-42) and records operation_id=put-512, backend=langgraph.
      ja: store.put を実行し operation_id=put-512・backend=langgraph を記録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.put
    field_values:
      operation_id: put-512
      backend: langgraph
    related_node_ids:
      - MemoryOperation
      - MemoryWrite
    related_relation_ids: []
    source_claims:
      - claim-memory-operation-langgraph
      - claim-memory-operation-design
  - id: MemoryOperation-example-not-record
    labels:
      zh: 操作非记录边界
      en: Operation is not a record
      ja: 操作は record ではない
    descriptions:
      zh: record-310-v1 是写入完成后的持久记录，缺少 operation_id 与 started_at，不得归类为 MemoryOperation。
      en: record-310-v1 is the persistent record after write completion; without operation_id and started_at it must not be classified as MemoryOperation.
      ja: record-310-v1 は write 後の persistent record で operation_id/started_at なしでは MemoryOperation 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - MemoryOperation
      - MemoryRecord
    related_relation_ids: []
    source_claims:
      - claim-memory-operation-design
parent_relation: null
relations: []
sources:
  - id: src-mem0-lifecycle
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: POST/PUT/DELETE /v1/memories for lifecycle mutations.
  - id: src-letta-lifecycle
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: archival_memory_insert/delete/update tools.
  - id: src-langgraph-lifecycle
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: BaseStore.put and BaseStore.delete.
  - id: src-generative-agents
    title: Generative Agents — Interactive Simulacra of Human Behavior
    publisher: arXiv
    url: https://arxiv.org/abs/2304.03442
    source_type: arXiv
    relevance: Reflection and recency decay in memory stream.
  - id: src-memory-lifecycle-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates lifecycle operations from record and result artifacts.
source_claims:
  - id: claim-memory-operation-mem0
    source: src-mem0-lifecycle
    supports: Mem0 POST/PUT/DELETE /v1/memories expose auditable lifecycle mutations.
    locator: Memory API routes
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-operation-letta
    source: src-letta-lifecycle
    supports: Letta archival tools perform insert, update, and delete on out-of-window memory.
    locator: Archival memory guide
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-operation-langgraph
    source: src-langgraph-lifecycle
    supports: LangGraph BaseStore.put/delete mutate namespace-scoped Items.
    locator: BaseStore.put/delete
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-operation-design
    source: src-memory-lifecycle-design
    supports: Moonweave separates lifecycle operations from record and result artifacts.
    locator: memory-lifecycle module
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-operation-id
    source: src-memory-lifecycle-design
    supports: operation_id stably identifies one memory-domain operation.
    locator: MemoryOperation structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-operation-started
    source: src-memory-lifecycle-design
    supports: started_at records when the operation began.
    locator: MemoryOperation structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-operation-backend
    source: src-memory-lifecycle-design
    supports: backend names the product executing the operation.
    locator: MemoryOperation structure
    evidence_kind: design-inference
    confidence: high
