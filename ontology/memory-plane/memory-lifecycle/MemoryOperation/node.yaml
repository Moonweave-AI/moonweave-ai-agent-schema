schema: moonweave.ai/ontology-node/v1
id: MemoryOperation
kind: concept
status: accepted
labels:
  zh: 记忆操作
  en: Memory operation
  ja: 記憶操作
semantics:
  short_definition:
    zh: 对记忆生命周期对象实际执行、评估或裁决的可观察活动。
    en: An observable activity that actually executes, assesses, or resolves a memory lifecycle action.
    ja: 記憶ライフサイクル対象に対して実際に実行、評価、または解決を行う観測可能な活動です。
  definition:
    zh: MemoryOperation 是具有稳定操作标识、实际开始时间、执行主体和运行状态的活动。它可作用于已有记忆记录并受策略约束，但不等同于被处理的记录、操作结果、审计事件、策略定义或仅描述未来动作的计划。
    en: MemoryOperation is an activity with a stable operation identity, an actual start time, an executing actor, and a runtime status. It may act on an existing memory record and be governed by policy, but it is not the record, result, audit event, policy definition, or a plan that only describes a future action.
    ja: MemoryOperation は、安定した操作識別子、実際の開始時刻、実行主体、実行状態を持つ活動です。既存の記憶レコードに作用し、ポリシーに統治され得ますが、処理対象のレコード、操作結果、監査イベント、ポリシー定義、または将来の行為だけを記述する計画そのものではありません。
  why_needed:
    zh: 准入、修订、处置、评估与冲突解决共享可审计的执行边界，但需要保留各自的具体子类和结果信息。
    en: Admission, revision, disposition, assessment, and conflict resolution share auditable execution boundaries while retaining their distinct subtypes and result information.
    ja: 受入、改訂、処分、評価、競合解決は監査可能な実行境界を共有しますが、それぞれの固有サブタイプと結果情報を保持する必要があります。
  includes:
    - zh: 已开始并可归因的记忆准入、修订、处置、评估或解决活动。
      en: Started and attributable memory admission, revision, disposition, assessment, or resolution activities.
      ja: 開始済みで帰属可能な記憶の受入、改訂、処分、評価、または解決活動を含みます。
  excludes:
    - zh: MemoryRecord、MemoryOperationResult、MemoryAuditEvent、PolicySpecification，以及尚未启动的操作建议或排程。
      en: MemoryRecord, MemoryOperationResult, MemoryAuditEvent, PolicySpecification, and operation proposals or schedules that have not started.
      ja: MemoryRecord、MemoryOperationResult、MemoryAuditEvent、PolicySpecification、およびまだ開始していない操作提案またはスケジュールを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将一次可重放的记忆变更建模为运行时工作单元；输入、策略、执行者、结果和审计可通过稳定 ID 关联，而不是混在记录内容中。
    en: Model one replayable memory change as a runtime work unit; inputs, policy, executor, result, and audit evidence join through a stable ID instead of being mixed into record content.
    ja: 再現可能な一つの記憶変更を実行時の作業単位として表し、入力、ポリシー、実行者、結果、監査証跡をレコード内容へ混在させず安定 ID で結びます。
  typical_input:
    - description: Existing memory-record references or candidate-memory references, plus an immutable policy reference and an executor identity.
      format: "{operation_id, operation_kind, actor_ref, policy_ref?, target_record_refs?, input_manifest_digest?}"
  typical_output:
    - description: A terminal or in-progress operation state with separately addressable result and audit-event information.
      format: "{operation_id, status, started_at, ended_at?, result_ref?, audit_event_refs?}"
  reference_implementations:
    - name: LangGraph Store API
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: Documents durable store operations that applications can wrap with operation identity and audit context.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines activities, entities, usage, association, and generation as distinct provenance facts.
  source_claims:
    - claim-memory-operation-activity
    - claim-memory-operation-implementation
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在执行记录、结果和审计事件之间稳定标识同一次记忆操作。
        en: Stably identifies the same memory operation across execution records, results, and audit events.
        ja: 実行記録、結果、監査イベント間で同じ記憶操作を安定して識別します。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-revise-512
      source_claims:
        - claim-memory-operation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明该活动属于准入、修订、处置、评估或解决中的哪一种生命周期工作。
        en: "States which lifecycle work the activity performs: admission, revision, disposition, assessment, or resolution."
        ja: この活動が受入、改訂、処分、評価、解決のどのライフサイクル作業を行うかを示します。
      allowed_values:
        - admission
        - revision
        - disposition
        - assessment
        - resolution
      pattern: null
      example_value: revision
      source_claims:
        - claim-memory-operation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该操作当前或最终的执行状态，而不是结果对象自身的身份。
        en: Records the operation's current or terminal execution status, not the identity of the result object itself.
        ja: 結果オブジェクト自身の識別ではなく、操作の現在または終端の実行状態を記録します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-operation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录执行者实际开始该操作的事件时间，不能以计划创建时间替代。
        en: Records the event time at which the executor actually started the operation; a plan-creation time cannot substitute for it.
        ja: 実行者が実際に操作を開始したイベント時刻を記録し、計画作成時刻で代替してはなりません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:30:00Z"
      source_claims:
        - claim-memory-operation-activity
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录终态操作完成、拒绝、取消或失败的事件时间；运行中的操作可暂缺该值。
        en: Records when a terminal operation completed, was rejected, cancelled, or failed; a running operation may omit it.
        ja: 終端操作が完了、拒否、取消、失敗したイベント時刻を記録し、実行中の操作では省略できます。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T09:30:00.184Z"
      source_claims:
        - claim-memory-operation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对该次操作直接负责的 Actor，而不是记录所有者或策略作者。
        en: References the Actor directly responsible for this operation, rather than a record owner or policy author.
        ja: レコード所有者やポリシー作成者ではなく、この操作に直接責任を負う Actor を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: agent-memory-worker-4
      source_claims:
        - claim-memory-operation-association
    - id: policy_ref
      labels:
        zh: 策略引用
        en: policy reference
        ja: ポリシー参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用适用于此操作的不可变 PolicySpecification 版本；未受策略治理的操作可为空。
        en: References the immutable PolicySpecification version that applies to this operation; an operation outside policy governance may omit it.
        ja: この操作に適用される不変の PolicySpecification バージョンを参照し、ポリシー統治外の操作では省略できます。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*@v[0-9][A-Za-z0-9._-]*$"
      example_value: retention-policy@v7
      source_claims:
        - claim-memory-operation-policy
    - id: target_record_refs
      labels:
        zh: 目标记录引用
        en: target record references
        ja: 対象レコード参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出操作开始前已存在并被评估、修订、处置或解决的 MemoryRecord；准入活动可以没有此字段。
        en: Lists MemoryRecord instances that existed before the operation and are assessed, revised, disposed, or resolved; an admission operation may have none.
        ja: 操作開始前に存在し、評価、改訂、処分、または解決の対象となる MemoryRecord を列挙します。受入操作では空にできます。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value:
        - record-512-v1
      source_claims:
        - claim-memory-operation-target
    - id: input_manifest_digest
      labels:
        zh: 输入清单摘要
        en: input manifest digest
        ja: 入力マニフェストダイジェスト
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 固定本次操作消费的输入清单摘要，使重放或审计不会仅凭可变查询结果推断输入。
        en: Fixes a digest of the consumed input manifest so replay and audit do not infer inputs only from mutable query results.
        ja: 消費した入力マニフェストのダイジェストを固定し、再実行と監査が可変の照会結果だけから入力を推測しないようにします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:3c93446f96e6e8ce686c41162f883ec5314a823557716d629e2f2a7b7c36fc7a
      source_claims:
        - claim-memory-operation-digest
  constraints:
    - id: MemoryOperation-operation-id-immutable
      expression: "operation_id is assigned once and every result or audit-event reference for the execution uses that same value."
      explanation:
        zh: 改写操作标识会使结果、审计和重放证据无法可靠归并到同一次活动。
        en: Reassigning the operation ID makes results, audit evidence, and replay evidence impossible to join reliably to one activity.
        ja: 操作 ID を書き換えると、結果、監査証跡、再実行証跡を一つの活動へ信頼して結合できなくなります。
      source_claims:
        - claim-memory-operation-identity
    - id: MemoryOperation-terminal-time-consistency
      expression: "ended_at is required when status is succeeded, failed, partially_succeeded, rejected, or cancelled, and ended_at must not precede started_at."
      explanation:
        zh: 终态需要可审计的结束边界，且结束早于开始会破坏活动的时间顺序。
        en: A terminal state needs an auditable end boundary, and an end before start breaks the activity's temporal ordering.
        ja: 終端状態には監査可能な終了境界が必要であり、開始より前の終了は活動の時間順序を壊します。
      source_claims:
        - claim-memory-operation-activity
    - id: MemoryOperation-target-role-consistency
      expression: "Every target_record_refs value identifies a record that existed before started_at; records first generated by this operation are outputs and are not targets."
      explanation:
        zh: 将未来输出误标为既有目标会颠倒输入与输出角色，并使审计无法判断操作实际处理了什么。
        en: Marking a future output as an existing target reverses input and output roles and prevents audit from determining what was actually processed.
        ja: 将来の出力を既存の対象として記録すると入力と出力の役割が逆転し、監査で実際の処理対象を判断できなくなります。
      source_claims:
        - claim-memory-operation-target
    - id: MemoryOperation-policy-version-consistency
      expression: "When policy_ref is present, it identifies one immutable policy version applicable to the actor, target scope, and operation time."
      explanation:
        zh: 仅记录策略名称不能重放当时的约束；引用必须定位到适用的精确版本。
        en: A policy name alone cannot replay the applicable constraints; the reference must locate the exact applicable version.
        ja: ポリシー名だけでは当時の制約を再現できないため、参照は適用される正確なバージョンを指す必要があります。
      source_claims:
        - claim-memory-operation-policy
  required_relation_constraints: []
examples:
  - id: MemoryOperation-example-positive-revision

    labels:
      zh: 已完成的记忆修订操作
      en: Completed memory revision operation
      ja: 完了した記憶改訂操作

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-revise-512
      operation_kind: revision
      status: succeeded
      started_at: "2026-07-18T09:30:00Z"
      ended_at: "2026-07-18T09:30:00.184Z"
      actor_ref: agent-memory-worker-4
      policy_ref: retention-policy@v7
      target_record_refs:
        - record-512-v1
      input_manifest_digest: sha256:3c93446f96e6e8ce686c41162f883ec5314a823557716d629e2f2a7b7c36fc7a
    related_node_ids:
      - MemoryOperation
      - MemoryRecord
      - PolicySpecification
      - Actor
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryOperation-acts_on-MemoryRecord
      - MemoryOperation-governed_by-PolicySpecification
      - MemoryOperation-performed_by-Actor
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-operation-activity
      - claim-memory-operation-association
      - claim-memory-operation-policy
  - id: MemoryOperation-example-counterexample-record

    labels:
      zh: 持久记忆记录不是操作
      en: Persistent memory record is not an operation
      ja: 永続記憶レコードは操作ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      record_id: record-512-v2
      stored_payload: "preferred-language=ja"
      scope_ref: namespace:user-77
      retention_policy_ref: retention-policy@v7
    related_node_ids:
      - MemoryOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-operation-activity
      - claim-memory-operation-target
  - id: MemoryOperation-example-boundary-planned-action

    labels:
      zh: 未启动的删除计划
      en: Unstarted deletion plan
      ja: 未開始の削除計画

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      proposal_id: proposed-delete-22
      proposed_kind: disposition
      scheduled_for: "2026-07-19T00:00:00Z"
      policy_ref: forget-policy@v3
      proposed_target_record_ref: record-22
    related_node_ids:
      - MemoryOperation
      - PolicySpecification
      - MemoryRecord
    related_relation_ids:
      - MemoryOperation-governed_by-PolicySpecification
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-operation-activity
      - claim-memory-operation-policy
  - id: MemoryOperation-example-instance-failed-disposition

    labels:
      zh: 失败的记忆处置操作实例
      en: Failed memory disposition operation instance
      ja: 失敗した記憶処分操作のインスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      operation_id: mem-op-delete-1304
      operation_kind: disposition
      status: failed
      started_at: "2026-07-18T12:04:11Z"
      ended_at: "2026-07-18T12:04:11.052Z"
      actor_ref: retention-enforcer-2
      policy_ref: forget-policy@v7
      target_record_refs:
        - record-1304-v1
      input_manifest_digest: sha256:ee46e369bdba13fc6a84bf77e6bcff89f84c809a9a3892ce5c5e3fbe0ce5486e
    related_node_ids:
      - MemoryOperation
      - MemoryRecord
      - PolicySpecification
      - Actor
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryOperation-acts_on-MemoryRecord
      - MemoryOperation-governed_by-PolicySpecification
      - MemoryOperation-performed_by-Actor
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-operation-activity
      - claim-memory-operation-association
      - claim-memory-operation-policy
parent_relation: null
relations:
  - id: MemoryOperation-acts_on-MemoryRecord
    predicate: acts_on
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 作用于记忆记录
      en: acts on memory record
      ja: 記憶レコードに作用する
    definitions:
      zh: MemoryOperation —acts_on→ MemoryRecord 表示该操作直接评估、修订、处置或解决一个在操作开始前已存在的记忆记录。
      en: MemoryOperation —acts_on→ MemoryRecord means the operation directly assesses, revises, disposes of, or resolves a memory record that existed before the operation started.
      ja: MemoryOperation —acts_on→ MemoryRecord は、操作開始前に存在した記憶レコードを操作が直接評価、改訂、処分、または解決することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每次操作可能处理零个、一个或多个既有记录，基数由该次运行输入确定。
      en: An operation may process zero, one, or many existing records; the run input determines the cardinality.
      ja: 操作はゼロ、一つ、または複数の既存レコードを処理でき、基数はその実行入力で決まります。
    inverse_reading:
      predicate: is_acted_on_by
      labels:
        zh: 被记忆操作处理
        en: is acted on by memory operation
        ja: 記憶操作により処理される
    conditions:
      - id: MemoryOperation-acts_on-MemoryRecord-existing-target
        severity: error
        expression_language: plain
        expression: "Assert only when the record ID is explicit in target_record_refs or an equivalent frozen input manifest and the record existed before started_at."
        explanation:
          zh: 未来生成的输出记录不能倒置为操作的既有目标；准入候选项也不应凭未来输出获得此边。
          en: A future output record cannot be reversed into an existing target, and an admission candidate does not gain this edge from its future output.
          ja: 将来生成される出力レコードを既存対象へ逆転してはならず、受入候補も将来の出力からこの辺を得ません。
        source_claims:
          - claim-memory-operation-target
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperation-acts_on-MemoryRecord-example-positive-revision

        labels:
          zh: 现有记录的修订目标
          en: Existing record is a revision target
          ja: 既存レコードが改訂対象である

        descriptions:
          zh: mem-op-revise-512 的冻结输入清单和 target_record_refs 都包含 record-512-v1，并在生成后继版本前读取该记录。
          en: mem-op-revise-512 lists record-512-v1 in both its frozen input manifest and target_record_refs and reads it before producing a successor version.
          ja: mem-op-revise-512 は凍結入力マニフェストと target_record_refs の両方に record-512-v1 を列挙し、後継バージョンを生成する前に読みます。
        field_values:
          operation_id: mem-op-revise-512
          started_at: "2026-07-18T09:30:00Z"
          target_record_refs:
            - record-512-v1
          record_created_at: "2026-07-10T13:00:00Z"
        related_node_ids:
          - MemoryOperation
          - MemoryRecord
        related_relation_ids:
          - MemoryOperation-acts_on-MemoryRecord

        source_claims:
          - claim-memory-operation-target
      - id: MemoryOperation-acts_on-MemoryRecord-example-boundary-generated-output

        labels:
          zh: 未来输出不是既有目标
          en: Future output is not an existing target
          ja: 将来の出力は既存対象ではない

        descriptions:
          zh: mem-op-write-310 在开始时只消费候选项 item-310；record-310-v1 在操作结束后才创建，且不在输入清单中。
          en: mem-op-write-310 consumes only candidate item-310 at start; record-310-v1 is created after the operation ends and is absent from the input manifest.
          ja: mem-op-write-310 は開始時に候補 item-310 だけを消費し、record-310-v1 は操作終了後に作成され入力マニフェストにありません。
        field_values:
          operation_id: mem-op-write-310
          started_at: "2026-07-18T10:00:00Z"
          target_record_refs: []
          output_record_ref: record-310-v1
          record_created_at: "2026-07-18T10:00:00.120Z"
        related_node_ids:
          - MemoryOperation
          - MemoryRecord
        related_relation_ids:
          - MemoryOperation-acts_on-MemoryRecord

        source_claims:
          - claim-memory-operation-target
    source_claims:
      - claim-memory-operation-target
    distinct_fact_rationale:
      zh: 此边陈述活动针对的既有对象，不陈述记录归属、输出生成或结果引用。
      en: This edge states the pre-existing object targeted by the activity, not record ownership, output generation, or result reference.
      ja: この辺は活動が対象とする既存オブジェクトを表し、レコード所有、出力生成、結果参照を表すものではありません。
    layout_role: cross-link
    target: concept:MemoryRecord
  - id: MemoryOperation-governed_by-PolicySpecification
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受策略规范治理
      en: is governed by policy specification
      ja: ポリシー仕様に統治される
    definitions:
      zh: MemoryOperation —governed_by→ PolicySpecification 表示精确策略版本对该操作在其主体、对象、作用域和时间上的许可或处置约束生效。
      en: MemoryOperation —governed_by→ PolicySpecification means an exact policy version applies permission or disposition constraints to the operation's actor, target, scope, and time.
      ja: MemoryOperation —governed_by→ PolicySpecification は、正確なポリシーバージョンが操作の主体、対象、スコープ、時刻に対する許可または処分制約を適用することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个操作可没有适用策略，也可受多个相互补充的精确策略版本约束；具体基数必须由运行证据确认。
      en: An operation can have no applicable policy or be constrained by several complementary exact policy versions; runtime evidence determines the cardinality.
      ja: 操作は適用ポリシーを持たないことも、相補的な複数の正確なポリシーバージョンに制約されることもあり、実行証跡が基数を決定します。
    inverse_reading:
      predicate: governs
      labels:
        zh: 治理记忆操作
        en: governs memory operation
        ja: 記憶操作を統治する
    conditions:
      - id: MemoryOperation-governed_by-PolicySpecification-applicable-version
        severity: error
        expression_language: plain
        expression: "Assert only when policy_ref identifies an immutable policy version whose applicability covers the operation actor, target scope, and started_at."
        explanation:
          zh: 同名策略的不同版本可能给出不同保留或处置规则，不能根据名称或事后结果猜测适用版本。
          en: Different versions with the same policy name may impose different retention or disposition rules, so name or outcome cannot infer the applicable version.
          ja: 同名ポリシーの異なるバージョンは異なる保持または処分規則を課し得るため、名前や事後結果から適用バージョンを推測できません。
        source_claims:
          - claim-memory-operation-policy
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperation-governed_by-PolicySpecification-example-positive-forget

        labels:
          zh: 适用的遗忘策略版本
          en: Applicable forget-policy version
          ja: 適用可能な忘却ポリシーバージョン

        descriptions:
          zh: mem-op-delete-1304 引用 forget-policy@v7；该版本的租户、记录类别和生效区间都覆盖 retention-enforcer-2 对 record-1304-v1 的处置。
          en: mem-op-delete-1304 references forget-policy@v7, whose tenant, record class, and effective interval cover retention-enforcer-2's disposition of record-1304-v1.
          ja: mem-op-delete-1304 は forget-policy@v7 を参照し、そのテナント、レコード種別、有効期間が retention-enforcer-2 による record-1304-v1 の処分をカバーします。
        field_values:
          operation_id: mem-op-delete-1304
          policy_ref: forget-policy@v7
          actor_ref: retention-enforcer-2
          target_record_ref: record-1304-v1
          started_at: "2026-07-18T12:04:11Z"
        related_node_ids:
          - MemoryOperation
          - PolicySpecification
        related_relation_ids:
          - MemoryOperation-governed_by-PolicySpecification

        source_claims:
          - claim-memory-operation-policy
      - id: MemoryOperation-governed_by-PolicySpecification-example-boundary-name-only

        labels:
          zh: 仅有策略名称不能建立治理关系
          en: Policy name alone cannot establish governance
          ja: ポリシー名だけでは統治関係を確立できない

        descriptions:
          zh: mem-op-delete-1305 的日志只写“使用 forget-policy”，没有版本、作用域或生效时间，也没有证据说明该策略覆盖目标记录。
          en: mem-op-delete-1305 logs only "used forget-policy" with no version, scope, effective time, or evidence that the policy covers the target record.
          ja: mem-op-delete-1305 のログには「forget-policy を使用」とだけあり、バージョン、スコープ、有効時刻、対象レコードをカバーする証跡がありません。
        field_values:
          operation_id: mem-op-delete-1305
          policy_name: forget-policy
          policy_version: absent
          target_record_ref: record-1305-v1
          started_at: "2026-07-18T12:10:00Z"
        related_node_ids:
          - MemoryOperation
          - PolicySpecification
        related_relation_ids:
          - MemoryOperation-governed_by-PolicySpecification

        source_claims:
          - claim-memory-operation-policy
    source_claims:
      - claim-memory-operation-policy
    distinct_fact_rationale:
      zh: 此边表达实际操作所受的规范约束，不表达策略作者、记录保留字段或结果是否合规。
      en: This edge expresses the normative constraint applied to an actual operation, not policy authorship, a record-retention field, or whether the result was compliant.
      ja: この辺は実際の操作へ適用される規範制約を表し、ポリシー作成者、レコード保持フィールド、結果の適合性を表すものではありません。
    layout_role: cross-link
    target: concept:PolicySpecification
  - id: MemoryOperation-performed_by-Actor
    predicate: performed_by
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由行动者执行
      en: is performed by actor
      ja: 行動主体により実行される
    definitions:
      zh: MemoryOperation —performed_by→ Actor 表示该 Actor 对此操作的实际执行直接负责，而不是仅拥有记录、请求操作或编写策略。
      en: MemoryOperation —performed_by→ Actor identifies the Actor directly responsible for actually executing the operation, rather than one who only owns a record, requests it, or authors policy.
      ja: MemoryOperation —performed_by→ Actor は、レコードを所有、操作を要求、またはポリシーを作成しただけの者ではなく、操作を実際に実行した Actor を示します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 执行责任可以由一个或多个协作主体承担，具体人数取决于已记录的执行分工。
      en: One or more collaborating actors can bear execution responsibility; recorded execution assignment determines the cardinality.
      ja: 一つまたは複数の協働 Actor が実行責任を担うことがあり、記録された実行分担が基数を決めます。
    inverse_reading:
      predicate: performs
      labels:
        zh: 执行记忆操作
        en: performs memory operation
        ja: 記憶操作を実行する
    conditions:
      - id: MemoryOperation-performed_by-Actor-execution-evidence
        severity: error
        expression_language: plain
        expression: "Assert only when actor_ref and execution or audit evidence bind the Actor to this operation_id as an executor."
        explanation:
          zh: 受影响用户、记录所有者或策略作者可能与活动相关，但没有实际执行证据时不能承担执行责任。
          en: An affected user, record owner, or policy author may relate to the activity but cannot bear execution responsibility without actual execution evidence.
          ja: 影響を受けるユーザー、レコード所有者、ポリシー作成者は活動に関連し得ますが、実際の実行証跡なしに実行責任を負うことはできません。
        source_claims:
          - claim-memory-operation-association
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperation-performed_by-Actor-example-positive-enforcer

        labels:
          zh: 执行者绑定到处置操作
          en: Executor is bound to disposition operation
          ja: 実行者が処分操作に結合される

        descriptions:
          zh: 审计事件 audit-delete-1304-1 将 actor_ref=retention-enforcer-2 与 mem-op-delete-1304 的执行开始和锁检查绑定。
          en: Audit event audit-delete-1304-1 binds actor_ref=retention-enforcer-2 to mem-op-delete-1304's execution start and lock check.
          ja: 監査イベント audit-delete-1304-1 は actor_ref=retention-enforcer-2 を mem-op-delete-1304 の実行開始とロック検査に結びます。
        field_values:
          operation_id: mem-op-delete-1304
          actor_ref: retention-enforcer-2
          audit_event_id: audit-delete-1304-1
          event_name: memory.disposition.started
        related_node_ids:
          - MemoryOperation
          - Actor
          - MemoryAuditEvent
        related_relation_ids:
          - MemoryOperation-performed_by-Actor
          - MemoryOperation-has_audit_event-MemoryAuditEvent

        source_claims:
          - claim-memory-operation-association
      - id: MemoryOperation-performed_by-Actor-example-boundary-owner

        labels:
          zh: 记录所有者不是执行者
          en: Record owner is not the executor
          ja: レコード所有者は実行者ではない

        descriptions:
          zh: user-77 拥有 record-512-v1，policy-author-2 编写 retention-policy@v7，但执行和审计记录都将 mem-op-revise-512 的执行者列为 agent-memory-worker-4。
          en: user-77 owns record-512-v1 and policy-author-2 authored retention-policy@v7, but execution and audit records list agent-memory-worker-4 as executor of mem-op-revise-512.
          ja: user-77 は record-512-v1 を所有し、policy-author-2 は retention-policy@v7 を作成しましたが、実行と監査記録はいずれも mem-op-revise-512 の実行者を agent-memory-worker-4 とします。
        field_values:
          operation_id: mem-op-revise-512
          record_owner_ref: user-77
          policy_author_ref: policy-author-2
          actor_ref: agent-memory-worker-4
          audit_event_id: audit-revise-512-1
        related_node_ids:
          - MemoryOperation
          - Actor
          - MemoryRecord
          - PolicySpecification
        related_relation_ids:
          - MemoryOperation-performed_by-Actor

        source_claims:
          - claim-memory-operation-association
    source_claims:
      - claim-memory-operation-association
    distinct_fact_rationale:
      zh: 此边表达具体执行责任，不表达记录所有权、请求发起者或策略作者身份。
      en: This edge expresses concrete execution responsibility, not record ownership, request initiation, or policy authorship.
      ja: この辺は具体的な実行責任を表し、レコード所有、要求開始者、ポリシー作成者を表すものではありません。
    layout_role: cross-link
    target: concept:Actor
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, usage, association, and generation as distinct provenance concepts.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents versioned policy rules evaluated against structured input and their applicability conditions.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies secure-hash algorithms used to bind a stable digest to an input manifest.
  - id: langgraph-store
    title: LangGraph Store API reference
    source_type: official-doc
    url: https://langchain-ai.github.io/langgraph/reference/store/
    relevance: Documents durable memory-store operations that need application-level execution and audit identity.
source_claims:
  - id: claim-memory-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from an Entity and gives activities temporal and provenance roles. Moonweave uses MemoryOperation for the activity that occurs, not for records, results, policies, or unstarted plans.
    locator: "PROV-O sections 3.1 Activity and 3.2 Entity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-identity
    source: w3c-prov-o
    supports: PROV-O identifies activities independently from the entities they use or generate. Moonweave assigns one immutable operation_id so results and audit events can refer to the same execution without becoming that execution.
    locator: "PROV-O Activity, Entity, and identifier usage"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-target
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from an entity generated by it. Moonweave records acts_on only for an existing target record and keeps a future output out of target_record_refs.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-association
    source: w3c-prov-o
    supports: PROV-O describes association between an activity and an agent with responsibility for the activity. Moonweave asserts performed_by only when execution or audit evidence binds an Actor to the operation.
    locator: "PROV-O section on prov:wasAssociatedWith"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-policy
    source: open-policy-agent
    supports: Open Policy Agent evaluates policy rules over structured input. Moonweave treats an immutable, applicable policy version as a governance relation to an actual operation rather than inferring policy from a name or outcome.
    locator: "Open Policy Agent policy language overview, input model, and rule evaluation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce a fixed-size message digest. Moonweave stores a SHA-256 digest for a frozen input manifest so replay evidence can detect changed inputs.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-implementation
    source: langgraph-store
    supports: The LangGraph Store API documents durable put, get, search, and delete style storage operations. Moonweave wraps such implementation calls in a separately identifiable MemoryOperation for lifecycle audit.
    locator: "LangGraph Store API reference"
    evidence_kind: ontology-design-inference
    confidence: medium
