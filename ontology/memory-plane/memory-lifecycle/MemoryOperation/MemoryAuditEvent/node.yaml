sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, agents, time, and provenance associations as distinct facts.
  - id: opentelemetry-logs-data-model
    title: OpenTelemetry Logs Data Model
    source_type: official-doc
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    relevance: Documents structured log records with timestamps, attributes, and trace context; Moonweave uses its own audit-event concept rather than asserting an OTel signal type.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 digests used to bind structured audit-event evidence.
source_claims:
  - id: claim-memory-audit-event-activity-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes activities from entities used to describe their outcomes. Moonweave keeps an audit-event occurrence distinct from the MemoryOperation activity and from its MemoryOperationResult summary.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance relations"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-audit-event-identity
    source: w3c-prov-o
    supports: PROV-O supports separately identifiable provenance records. Moonweave assigns an independent audit_event_id so several events can describe one operation without becoming the operation itself.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-audit-event-attribution
    source: w3c-prov-o
    supports: PROV-O associates provenance facts with explicit activities and agents. Moonweave attributes an audit event only when operation reference and phase evidence identify the operation, not merely when trace or actor context overlaps.
    locator: "PROV-O activity association and temporal provenance"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-audit-event-structured
    source: opentelemetry-logs-data-model
    supports: OpenTelemetry documents structured records with timestamps, attributes, and trace context. Moonweave uses stable event name, phase, actor, structured evidence, and optional trace reference for its own audit-event model without claiming the event is an OTel signal.
    locator: "OpenTelemetry Logs Data Model event, timestamp, attributes, and trace context"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-audit-event-time
    source: opentelemetry-logs-data-model
    supports: OpenTelemetry distinguishes timestamped record fields and observed time. Moonweave records event_time as occurrence time and does not replace it with log ingestion, query, or replay time.
    locator: "OpenTelemetry Logs Data Model timestamp and observed timestamp"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-audit-event-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size message digests. Moonweave fixes an evidence digest for each audit event and appends a correction as a new event rather than rewriting the old evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
