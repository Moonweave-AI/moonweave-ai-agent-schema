schema: moonweave.ai/ontology-node/v1
id: MemoryAuditEvent
kind: concept
labels:
  zh: 记忆审计事件
  en: Memory audit event
  ja: 記憶監査イベント
semantics:
  short_definition:
    zh: 记录记忆操作何时由谁发生了什么的事件。
    en: Event recording what happened, when, and by whom in a memory operation.
    ja: memory operation で何がいつ誰により起きたかを記録する event。
  definition:
    zh: MemoryAuditEvent 是附属于 MemoryOperation 的可观察事件，具有 event_time、operation_id、actor_id 与 event_kind；可记录 started、completed、rejected、policy_hit、error。它不是 MemoryOperationResult 的汇总状态，也不是操作活动本身。
    en: MemoryAuditEvent is an observable event attached to MemoryOperation with event_time, operation_id, actor_id, and event_kind, recording started, completed, rejected, policy_hit, or error. It is neither the summary status in MemoryOperationResult nor the operation activity itself.
    ja: MemoryAuditEvent は event_time/operation_id/actor_id/event_kind を持つ MemoryOperation 付属 observable event。MemoryOperationResult の summary でも operation 自体でもない。
  why_needed:
    zh: 逐事件时间线是合规与调试所必需；仅有最终结果无法重建操作中间步骤。
    en: Per-event timelines are required for compliance and debugging; final results alone cannot reconstruct intermediate steps.
    ja: 逐 event timeline が compliance/debug に必要。final result だけでは中間 step を再構成できない。
  includes:
    - zh: 纳入操作开始、完成、拒绝、策略命中与错误事件。
      en: Includes operation start, completion, rejection, policy hit, and error events.
      ja: start/completion/reject/policy hit/error event。
  excludes:
    - zh: 排除活动本身、最终结果摘要与非结构化应用日志。
      en: Excludes the activity itself, final result summary, and unstructured application logs.
      ja: activity 自体/final summary/unstructured log を除外。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 映射 OpenTelemetry log 风格字段：event_time、operation_id、actor_id、event_kind、attributes。Mem0/Letta/LangGraph API 调用应在 Moonweave 侧 emit 对应 audit event，而非仅依赖 HTTP access log。
    en: Map OpenTelemetry-style fields event_time, operation_id, actor_id, event_kind, attributes. Mem0/Letta/LangGraph API calls should emit corresponding audit events on the Moonweave side rather than relying on HTTP access logs alone.
    ja: OpenTelemetry 風 event_time/operation_id/actor_id/event_kind/attributes を写像。API 呼出しごとに audit event を emit。
  typical_input:
    - description: Operation lifecycle hook
      format: |
        {"operation_id": "write-310", "event_kind": "started", "actor_id": "agent-memory-worker-4"}
      source_claims: [claim-audit-design]
  typical_output:
    - description: Audit event record
      format: |
        {"audit_event_id": "audit-310-start", "event_time": "2026-07-16T09:30:00Z"}
      source_claims: [claim-audit-design]
  reference_implementations:
    - name: OpenTelemetry Logs
      url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
      description: Structured log event model for audit trails.
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Lifecycle API calls emit auditable events when wrapped.
structure:
  identity_keys: [audit_event_id]
  fields:
    - id: audit_event_id
      labels: {zh: 审计事件标识, en: Audit event identifier, ja: 監査イベント識別子}
      definitions:
        zh: 稳定标识一条记忆域审计事件。
        en: Stable identifier for one memory-domain audit event.
        ja: 一 memory-domain audit event を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: audit-310-start
      allowed_values: []
      source_claims: [claim-audit-id]
    - id: event_time
      labels: {zh: 事件时间, en: Event time, ja: イベント時刻}
      definitions:
        zh: 事件发生的 UTC 时间。
        en: UTC time when the event occurred.
        ja: イベント発生 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T09:30:00Z
      allowed_values: []
      source_claims: [claim-audit-time]
    - id: event_kind
      labels: {zh: 事件种类, en: Event kind, ja: イベント種別}
      definitions:
        zh: started、completed、rejected、policy_hit、error 等。
        en: started, completed, rejected, policy_hit, error, etc.
        ja: started/completed/rejected/policy_hit/error 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: started
      allowed_values: []
      source_claims: [claim-audit-kind]
  constraints: []
  required_relations: []
examples:
  - id: MemoryAuditEvent-example-write-start
    labels: {zh: 写入开始事件, en: Write start event, ja: 書込開始 event}
    descriptions:
      zh: audit-310-start 记录 write-310 在 2026-07-16T09:30:00Z 由 agent-memory-worker-4 开始，event_kind=started。
      en: audit-310-start records write-310 started at 2026-07-16T09:30:00Z by agent-memory-worker-4 with event_kind=started.
      ja: audit-310-start が write-310 開始を記録。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: audit}
    field_values: {audit_event_id: audit-310-start, event_kind: started, operation_id: write-310}
    related_node_ids: [MemoryAuditEvent, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-audit-design]
  - id: MemoryAuditEvent-example-delete-complete
    labels: {zh: 删除完成事件, en: Delete complete event, ja: 削除完了 event}
    descriptions:
      zh: audit-310-complete 记录 delete-310 成功并引用 tombstone-310，event_kind=completed。
      en: audit-310-complete records delete-310 success referencing tombstone-310, event_kind=completed.
      ja: delete-310 成功と tombstone-310 を audit-310-complete が記録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: DELETE audit}
    field_values: {audit_event_id: audit-310-complete, event_kind: completed}
    related_node_ids: [MemoryAuditEvent, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-audit-mem0, claim-audit-design]
  - id: MemoryAuditEvent-example-policy-hit
    labels: {zh: 策略命中事件, en: Policy hit event, ja: 方針 hit event}
    descriptions:
      zh: audit-89-reject 记录 discard-89 因 forget-policy 拒绝，event_kind=policy_hit。
      en: audit-89-reject records discard-89 rejected by forget-policy, event_kind=policy_hit.
      ja: discard-89 の policy reject を audit-89-reject が記録。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: policy}
    field_values: {audit_event_id: audit-89-reject, event_kind: policy_hit}
    related_node_ids: [MemoryAuditEvent, MemoryDiscard]
    related_relation_ids: []
    source_claims: [claim-audit-design]
  - id: MemoryAuditEvent-example-not-result
    labels: {zh: 事件非结果摘要, en: Event is not result summary, ja: event は result summary ではない}
    descriptions:
      zh: result-310 汇总 status=success；audit-310-start 只是时间线上的一点，不能代替 MemoryOperationResult。
      en: result-310 summarizes status=success; audit-310-start is one timeline point and cannot replace MemoryOperationResult.
      ja: result-310 は summary、audit-310-start は timeline 上の一点。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryAuditEvent, MemoryOperationResult]
    related_relation_ids: []
    source_claims: [claim-audit-design]
parent_relation:
  id: MemoryOperation-has_audit_event-MemoryAuditEvent
  predicate: has_audit_event
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有审计事件
    en: has audit event
    ja: audit event を持つ
  definitions:
    zh: MemoryOperation —has_audit_event→ MemoryAuditEvent 把活动连接到可观察审计时间线事件。
    en: MemoryOperation —has_audit_event→ MemoryAuditEvent links an activity to an observable audit timeline event.
    ja: MemoryOperation —has_audit_event→ MemoryAuditEvent は activity を observable audit timeline event へ接続。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse has_audit_event, ja: 逆方向読取}}
  conditions:
    - id: MemoryOperation-has_audit_event-MemoryAuditEvent-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when audit_event.operation_id equals the operation identity.
      explanations:
        zh: 仅当 audit_event.operation_id 等于操作身份时成立。
        en: Assert only when audit_event.operation_id equals the operation identity.
        ja: audit_event.operation_id が operation identity と一致する時のみ。
      source_claims: [claim-audit-design]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-audit-design]
relations: []
sources:
  - id: src-otel-logs
    title: OpenTelemetry Logs Data Model
    publisher: OpenTelemetry
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    source_type: official-doc
    relevance: Structured audit event fields.
  - id: src-audit-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audit events distinct from operations and results.
source_claims:
  - id: claim-audit-mem0
    source: src-audit-design
    supports: Mem0 lifecycle calls should emit auditable events when integrated.
    locator: integration pattern
    evidence_kind: design-inference
    confidence: high
  - id: claim-audit-design
    source: src-audit-design
    supports: MemoryAuditEvent provides per-event audit timeline attached to MemoryOperation.
    locator: MemoryAuditEvent boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-audit-id
    source: src-audit-design
    supports: audit_event_id identifies one audit event.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-audit-time
    source: src-otel-logs
    supports: event_time records when the audit event occurred.
    locator: Log record semantics
    evidence_kind: primary-doc
    confidence: high
  - id: claim-audit-kind
    source: src-audit-design
    supports: event_kind classifies the audit event within operation lifecycle.
    locator: structure
    evidence_kind: design-inference
    confidence: high
