schema: moonweave.ai/ontology-node/v1
id: MemoryAuditEvent
kind: concept
status: accepted
labels:
  zh: 记忆审计事件
  en: Memory audit event
  ja: 記憶監査イベント
semantics:
  short_definition:
    zh: 记录某次记忆操作在特定时间发生了什么、由谁执行及关联何种上下文的事件。
    en: An event recording what occurred in a memory operation, when, by whom, and with which context.
    ja: memory operationで何がいつ誰によりどのcontextで起きたかを記録するeventです。
  definition:
    zh: MemoryAuditEvent 是附属于 MemoryOperation 的可观察事件，具有事件时间、操作引用、主体和结构化属性；它可以记录开始、完成、拒绝或错误，但不是 MemoryOperationResult 的汇总状态。
    en: MemoryAuditEvent is an observable event attached to MemoryOperation with event time, operation reference, actor, and structured attributes. It may record start, completion, rejection, or error, but is not the summary status held by MemoryOperationResult.
    ja: MemoryAuditEvent はevent time・operation reference・actor・structured attributeを持つ MemoryOperation付属observable eventです。start・completion・reject・errorを記録できますがMemoryOperationResultのsummary statusではありません。
  why_needed:
    zh: 为逐事件审计保留可观察时间线，同时避免把事件当作操作子类。
    en: Preserves an observable event timeline for audit without treating events as operation subtypes.
    ja: audit用observable event timelineを保持しeventをoperation subtypeにしません。
  includes:
    - zh: 纳入操作开始、完成、拒绝、策略命中和错误发生事件。
      en: Includes operation-start, completion, rejection, policy-hit, and error-occurrence events.
      ja: operation start・completion・reject・policy hit・error occurrence eventを含みます。
  excludes:
    - zh: 排除活动本身、最终结果摘要和普通应用日志文本。
      en: Excludes the activity itself, final result summary, and unstructured application log text.
      ja: activity自体・final result summary・unstructured application log textを除外します。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - audit_event_id
  fields:
    - id: audit_event_id
      labels:
        zh: 审计事件标识
        en: audit event ID
        ja: audit event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一条可观察审计事件。
        en: Identifies one observable audit event.
        ja: 一observable audit eventを識別します。
      allowed_values: []
      pattern: null
      example_value: audit-2201
      source_claims:
        - claim-memory-audit-event-002
    - id: event_time
      labels:
        zh: 事件时间
        en: event time
        ja: event time
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录审计事件发生的时间。
        en: Records when the audited event occurred.
        ja: audit event発生時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:30:00.120Z
      source_claims:
        - claim-memory-audit-event-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryAuditEvent-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆审计事件正例
      en: "Positive case: Memory audit event"
      ja: 記憶監査イベント正例
    scenario_id: null
    descriptions:
      zh: audit-2201 记录 write-310 在指定时间由 actor-9 完成并关联 trace-77。
      en: audit-2201 records that write-310 completed at the stated time by actor-9 and links trace-77.
      ja: audit-2201 はwrite-310が指定時刻にactor-9により完了しtrace-77へlinkしたことを記録します。
    field_values:
      audit_event_id: audit-2201
      event_time: 2026-07-16T09:30:00.120Z
    related_node_ids:
      - MemoryAuditEvent
    related_relation_ids: []
    expected_result:
      zh: 归类为 MemoryAuditEvent。
      en: Classify as MemoryAuditEvent.
      ja: MemoryAuditEventに分類します。
    why_valid_or_invalid:
      zh: 事件时间、操作引用和执行主体均明确。
      en: Event time, operation reference, and actor are explicit.
      ja: event time・operation reference・actorが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-audit-event-001
  - id: MemoryAuditEvent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆审计事件边界例
      en: "Boundary case: Memory audit event"
      ja: 記憶監査イベント境界例
    scenario_id: null
    descriptions:
      zh: 一行普通调试文本只写着“memory ok”，没有事件时间或操作引用。
      en: A plain debug line only says 'memory ok' and has no event time or operation reference.
      ja: plain debug lineは「memory ok」とだけありevent time/operation referenceがありません。
    field_values: {}
    related_node_ids:
      - MemoryAuditEvent
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryAuditEvent。
      en: Do not classify as MemoryAuditEvent.
      ja: MemoryAuditEventに分類しません。
    why_valid_or_invalid:
      zh: 缺少把日志绑定到具体生命周期事件的最小身份字段。
      en: It lacks minimum identity fields binding the log to a concrete lifecycle event.
      ja: logをconcrete lifecycle eventへbindするminimum identity fieldがありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-audit-event-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryOperation-has_audit_event-MemoryAuditEvent
  predicate: has_audit_event
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有审计事件
    en: has audit event
    ja: audit eventを持つ
  definitions:
    zh: MemoryOperation —has_audit_event→ MemoryAuditEvent 把一次活动连接到其可观察审计时间线中的事件。
    en: MemoryOperation —has_audit_event→ MemoryAuditEvent links one activity to an event in its observable audit timeline.
    ja: MemoryOperation —has_audit_event→ MemoryAuditEvent は一activityをobservable audit timeline内eventへ結びます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_has_audit_event
    labels:
      zh: 反向读取
      en: inverse has audit event
      ja: 逆方向読取
  conditions:
    - id: MemoryOperation-has_audit_event-MemoryAuditEvent-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when auditEvent.operation_id points to the operation and its event time and event name describe an observable phase of that operation.
      explanations:
        zh: 仅当 auditEvent.operation_id 指向该操作，且事件时间与事件名称描述该操作的一个可观察阶段时成立。
        en: Assert only when auditEvent.operation_id points to the operation and its event time and event name describe an observable phase of that operation.
        ja: auditEvent.operation_idがoperationを指しevent time/nameがそのobservable phaseを記述する時だけassertします。
      source_claims:
        - claim-memory-audit-event-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryOperation-has_audit_event-MemoryAuditEvent-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 具有审计事件正例
        en: "Positive case: has audit event"
        ja: audit eventを持つ正例
      scenario_id: MemoryOperation-has_audit_event-MemoryAuditEvent:positive:20260716
      descriptions:
        zh: audit-2201 的 event_name=memory.write.completed、operation_id=write-310，并以发生时间记录该写入的完成阶段。
        en: audit-2201 records event_name=memory.write.completed, operation_id=write-310, and the occurrence time of that write's completion phase.
        ja: audit-2201 は event_name=memory.write.completed、operation_id=write-310 と write completion phase の occurrence time を記録します。
      field_values: {}
      related_node_ids:
        - MemoryOperation
        - MemoryAuditEvent
      related_relation_ids:
        - MemoryOperation-has_audit_event-MemoryAuditEvent
      expected_result:
        zh: 把 audit-2201 纳入 write-310 的审计时间线，同时保留事件自身身份、时刻和关联追踪上下文。
        en: Place audit-2201 on write-310's audit timeline while retaining the event's own identity, timestamp, and correlated trace context.
        ja: audit-2201 を write-310 の audit timeline に置き、event 固有 identity・timestamp・correlated trace context を保持します。
      why_valid_or_invalid:
        zh: 事件名称描述该操作的真实阶段，operation_id 精确回指写入；追踪上下文只是补充关联而非唯一依据。
        en: The event name describes a real phase and operation_id points exactly to the write; trace context is supporting correlation rather than sole proof.
        ja: event name は実 phase を示し operation_id は write を正確に指し、trace context は補助 correlation で唯一証拠ではありません。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-audit-event-001
    - id: MemoryOperation-has_audit_event-MemoryAuditEvent-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 具有审计事件边界例
        en: "Boundary case: has audit event"
        ja: audit eventを持つ境界例
      scenario_id: MemoryOperation-has_audit_event-MemoryAuditEvent:boundary:20260716
      descriptions:
        zh: audit-2202 与 write-310 共享 trace_id，但 operation_id=compact-920，event_name 记录的是 compaction.started。
        en: audit-2202 shares write-310's trace_id but carries operation_id=compact-920 and event_name=compaction.started.
        ja: audit-2202 は write-310 と trace_id を共有しますが operation_id=compact-920、event_name=compaction.started です。
      field_values: {}
      related_node_ids:
        - MemoryOperation
        - MemoryAuditEvent
      related_relation_ids:
        - MemoryOperation-has_audit_event-MemoryAuditEvent
      expected_result:
        zh: 拒绝把 audit-2202 组合到 write-310；它应进入 compact-920 的审计时间线。
        en: Do not compose audit-2202 under write-310; attach it to compact-920's audit timeline instead.
        ja: audit-2202 を write-310 に compose せず compact-920 の audit timeline へ接続します。
      why_valid_or_invalid:
        zh: 同一追踪可包含多个记忆操作，只有 operation_id 与事件阶段一致才能证明直接审计归属。
        en: One trace may contain several memory operations, so direct audit ownership requires matching operation_id and event phase.
        ja: 一 trace は複数 memory operation を含み得るため、direct audit ownership には operation_id と event phase の一致が必要です。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-audit-event-001
  source_claims:
    - claim-memory-audit-event-001
