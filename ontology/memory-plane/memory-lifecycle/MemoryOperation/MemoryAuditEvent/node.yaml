schema: moonweave.ai/ontology-node/v1
id: MemoryAuditEvent
kind: concept
status: accepted
labels:
  zh: 记忆审计事件
  en: Memory audit event
  ja: 記憶監査イベント
semantics:
  short_definition:
    zh: 带有时间、操作归属和结构化证据的记忆操作可观察事件。
    en: An observable memory-operation event with time, operation attribution, and structured evidence.
    ja: 時刻、操作帰属、構造化証跡を持つ記憶操作の観測可能イベントです。
  definition:
    zh: MemoryAuditEvent 是附属于一次 MemoryOperation 的不可变事件事实，记录该操作某一可观察阶段发生了什么、何时发生、由哪个主体触发以及关联的结构化证据。它可记录开始、检查、接受、拒绝、提交、完成或失败事件，但不是活动本身、MemoryOperationResult 的汇总结论、普通无结构日志行或策略定义。
    en: MemoryAuditEvent is an immutable event fact attached to one MemoryOperation, recording what happened in one observable phase, when it happened, which actor initiated it, and its structured evidence. It may record start, check, acceptance, rejection, commit, completion, or failure, but is not the activity itself, the summary conclusion in MemoryOperationResult, an unstructured log line, or a policy definition.
    ja: MemoryAuditEvent は一つの MemoryOperation に付属する不変のイベント事実であり、一つの観測可能段階で何が起きたか、いつ起きたか、どの主体が開始したか、構造化証跡を記録します。開始、検査、受入、拒否、コミット、完了、失敗を記録できますが、活動そのもの、MemoryOperationResult の要約結論、非構造化ログ行、ポリシー定義ではありません。
  why_needed:
    zh: 逐事件时间线提供责任归属和证据链，同时避免用单一结果摘要掩盖复杂操作的多个阶段。
    en: Per-event timeline provides accountability and evidence chain without hiding multiple operation phases behind one result summary.
    ja: イベント単位の時系列は、単一結果要約の背後に複数の操作段階を隠さず、説明責任と証跡連鎖を提供します。
  includes:
    - zh: 具有事件标识、操作引用、事件名称、事件时间、执行主体或服务身份，以及结构化证据的操作阶段事件。
      en: Operation-phase events with event ID, operation reference, event name, event time, executor or service identity, and structured evidence.
      ja: イベント ID、操作参照、イベント名、イベント時刻、実行主体またはサービス識別、構造化証跡を持つ操作段階イベントを含みます。
  excludes:
    - zh: 操作对象本身、最终结果摘要、仅有“memory ok”的调试文本、没有操作归属的通用日志、以及只描述应当发生什么的策略规则。
      en: The operation object itself, final result summary, debug text containing only "memory ok", general logs without operation attribution, and policy rules that only describe what ought to occur.
      ja: 操作オブジェクトそのもの、最終結果要約、「memory ok」だけのデバッグテキスト、操作帰属のない一般ログ、起きるべきことだけを記述するポリシー規則を除外します。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 将审计实现为按操作 ID 归并的不可变事件流；每条事件有独立身份和证据摘要，结果对象只汇总状态而不取代时间线。
    en: Implement audit as an immutable event stream grouped by operation ID; each event has its own identity and evidence digest, while the result object summarizes status without replacing the timeline.
    ja: 監査を操作 ID ごとにまとめる不変イベントストリームとして実装します。各イベントは独自の識別と証跡ダイジェストを持ち、結果オブジェクトは時系列を置き換えず状態を要約します。
  typical_input:
    - description: One observable operation phase with operation identity, event name, actor/service identity, timestamp, and structured payload.
      format: "{audit_event_id, operation_ref, event_name, event_phase, event_time, actor_ref, evidence_digest}"
  typical_output:
    - description: Immutable event record attached to the operation timeline and optionally correlated to trace context.
      format: "{audit_event_id, operation_ref, event_phase, event_time, payload_digest, trace_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines distinct activities, entities, agents, and provenance associations.
    - name: OpenTelemetry Logs Data Model
      url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
      description: Documents structured log records, timestamps, attributes, and trace context that can inform an audit-event implementation.
  source_claims:
    - claim-memory-audit-event-activity-boundary
    - claim-memory-audit-event-structured
structure:
  identity_keys:
    - audit_event_id
  fields:
    - id: audit_event_id
      labels:
        zh: 审计事件标识
        en: audit event ID
        ja: 監査イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条独立审计事件，而不与其所属操作、结果或追踪标识混同。
        en: Stably identifies one independent audit event and is distinct from its operation, result, or trace identity.
        ja: 一つの独立監査イベントを安定して識別し、その操作、結果、トレース識別と区別されます。
      allowed_values: []
      pattern: "^audit-[a-z0-9][a-z0-9-]*$"
      example_value: audit-write-310-committed
      source_claims:
        - claim-memory-audit-event-identity
    - id: operation_ref
      labels:
        zh: 操作引用
        en: operation reference
        ja: 操作参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用此事件实际描述的 MemoryOperation；共享追踪上下文或相同主体不能替代操作身份匹配。
        en: References the MemoryOperation this event actually describes; shared trace context or the same actor cannot substitute for matching operation identity.
        ja: このイベントが実際に記述する MemoryOperation を参照します。共有トレース文脈や同じ主体では操作識別一致を代替できません。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-write-310
      source_claims:
        - claim-memory-audit-event-attribution
    - id: event_name
      labels:
        zh: 事件名称
        en: event name
        ja: イベント名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用稳定命名空间名称标识操作中发生的具体可观察事实，而不是笼统的日志文本。
        en: Identifies the concrete observable fact that occurred in the operation with a stable namespaced name rather than generic log text.
        ja: 一般的なログテキストではなく、安定した名前空間付き名称で操作内に発生した具体的な観測可能事実を識別します。
      allowed_values:
        - memory.operation.started
        - memory.operation.checked
        - memory.admission.accepted
        - memory.admission.discarded
        - memory.write.committed
        - memory.operation.completed
        - memory.operation.failed
      pattern: '^memory\.[a-z][a-z0-9_.-]*$'
      example_value: memory.write.committed
      source_claims:
        - claim-memory-audit-event-structured
    - id: event_phase
      labels:
        zh: 事件阶段
        en: event phase
        ja: イベント段階
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 将事件归入操作的开始、检查、决策、提交、完成或失败阶段，而不把阶段本身当作结果状态。
        en: Places the event in start, check, decision, commit, completion, or failure phase of the operation without treating the phase itself as result status.
        ja: イベントを操作の開始、検査、決定、コミット、完了、失敗段階に置き、段階自体を結果状態として扱いません。
      allowed_values:
        - started
        - checked
        - decided
        - committed
        - completed
        - failed
      pattern: null
      example_value: committed
      source_claims:
        - claim-memory-audit-event-structured
    - id: event_time
      labels:
        zh: 事件时间
        en: event time
        ja: イベント時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录事件实际发生的时间，而不是日志摄入、查询或重放时间。
        en: Records when the event actually occurred, not log-ingestion, query, or replay time.
        ja: ログ取込、照会、再実行時刻ではなく、イベントが実際に発生した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T17:00:00.143Z"
      source_claims:
        - claim-memory-audit-event-time
    - id: actor_ref
      labels:
        zh: 事件主体引用
        en: event actor reference
        ja: イベント主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用触发或负责该事件的 Actor 或服务主体；它可以不同于记录所有者或策略作者。
        en: References the Actor or service responsible for triggering the event and may differ from record owner or policy author.
        ja: イベントをトリガーまたは担当した Actor またはサービスを参照し、レコード所有者やポリシー作成者と異なり得ます。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-writer-3
      source_claims:
        - claim-memory-audit-event-attribution
    - id: evidence_digest
      labels:
        zh: 事件证据摘要
        en: event evidence digest
        ja: イベント証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定支撑事件的结构化属性、输入或结果引用摘要，使审计事件不会变成无法核验的叙述文本。
        en: Fixes a digest of structured attributes, inputs, or result references supporting the event so audit event does not become unverifiable narrative text.
        ja: 監査イベントが検証不能な叙述テキストにならないよう、イベントを支える構造化属性、入力、結果参照のダイジェストを固定します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:51a1a1fc0274f8f3e0bad1ffbbad20355e0f9a393bb91d64414ed6c089da9d0a
      source_claims:
        - claim-memory-audit-event-digest
    - id: trace_ref
      labels:
        zh: 追踪引用
        en: trace reference
        ja: トレース参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选关联跨系统追踪上下文；它用于辅助检索，不能单独证明事件属于某个操作。
        en: Optionally correlates cross-system trace context; it supports lookup but cannot by itself prove event ownership by an operation.
        ja: システム横断トレース文脈を任意に相関付けます。照会を支援しますが、単独でイベントの操作帰属を証明できません。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      example_value: trace-77
      source_claims:
        - claim-memory-audit-event-structured
  constraints:
    - id: MemoryAuditEvent-operation-attribution-consistency
      expression: "operation_ref identifies the MemoryOperation whose observable phase event_name and event_phase describe; trace_ref, nearby time, or matching actor alone cannot establish ownership."
      explanation:
        zh: 同一追踪可包含多个记忆操作，必须以操作身份和阶段证据归属事件，避免混入相邻活动。
        en: One trace can contain multiple memory operations, so operation identity and phase evidence must attribute an event and prevent contamination by nearby activity.
        ja: 一つのトレースは複数の記憶操作を含み得るため、操作識別と段階証跡でイベントを帰属させ、近傍活動による混入を防ぐ必要があります。
      source_claims:
        - claim-memory-audit-event-attribution
    - id: MemoryAuditEvent-event-structure-consistency
      expression: "event_name and event_phase are compatible, event_time records occurrence time, and evidence_digest covers the structured facts that support the event."
      explanation:
        zh: 事件名称、阶段、时间和证据不一致会使审计时间线无法重建实际执行顺序。
        en: Inconsistent event name, phase, time, and evidence make the audit timeline unable to reconstruct actual execution order.
        ja: イベント名、段階、時刻、証跡の不整合により、監査時系列で実際の実行順序を再構築できなくなります。
      source_claims:
        - claim-memory-audit-event-structured
        - claim-memory-audit-event-time
    - id: MemoryAuditEvent-immutability-boundary
      expression: "audit_event_id, operation_ref, event_name, event_time, and evidence_digest are immutable after recording; a correction creates a new event that references the prior event in audit evidence."
      explanation:
        zh: 原地改写审计事件会破坏证据链；更正需要保留旧事实并追加独立事件。
        en: In-place rewriting of an audit event breaks evidence chain; correction must preserve the old fact and append an independent event.
        ja: 監査イベントのインプレース書換えは証跡連鎖を壊し、訂正では古い事実を保持して独立イベントを追加する必要があります。
      source_claims:
        - claim-memory-audit-event-digest
    - id: MemoryAuditEvent-result-boundary
      expression: "An audit event records one occurrence and does not replace MemoryOperationResult outcome or use outcome summary as its own event identity."
      explanation:
        zh: 结果汇总和事件时间线应相互链接但保持不同身份，否则无法区分一次失败中的开始、检查和失败事件。
        en: Result summary and event timeline should link but keep separate identities, or start, check, and failure events in one failure cannot be distinguished.
        ja: 結果要約とイベント時系列はリンクしつつ別の識別を保持すべきであり、そうしないと一つの失敗内の開始、検査、失敗イベントを区別できません。
      source_claims:
        - claim-memory-audit-event-activity-boundary
  required_relation_constraints: []
examples:
  - id: MemoryAuditEvent-example-positive-write-committed

    labels:
      zh: 写入提交审计事件
      en: Write-commit audit event
      ja: 書込みコミット監査イベント

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      audit_event_id: audit-write-310-committed
      operation_ref: mem-op-write-310
      event_name: memory.write.committed
      event_phase: committed
      event_time: "2026-07-18T17:00:00.143Z"
      actor_ref: memory-writer-3
      evidence_digest: sha256:51a1a1fc0274f8f3e0bad1ffbbad20355e0f9a393bb91d64414ed6c089da9d0a
      trace_ref: trace-77
    related_node_ids:
      - MemoryAuditEvent
      - MemoryOperation
      - MemoryWrite
      - MemoryOperationResult
    related_relation_ids:
      - MemoryOperation-has_audit_event-MemoryAuditEvent
      - MemoryWrite-is_a-MemoryAdmissionOperation
      - MemoryOperation-has_result-MemoryOperationResult

    source_claims:
      - claim-memory-audit-event-structured
      - claim-memory-audit-event-attribution
      - claim-memory-audit-event-digest
  - id: MemoryAuditEvent-example-counterexample-result

    labels:
      zh: 操作结果摘要不是审计事件
      en: Operation result summary is not audit event
      ja: 操作結果要約は監査イベントではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      result_id: result-write-310
      operation_ref: mem-op-write-310
      outcome: succeeded
      output_record_ref: record-310-v1
      completed_at: "2026-07-18T17:00:00.184Z"
      audit_event_id: absent
    related_node_ids:
      - MemoryAuditEvent
      - MemoryOperationResult
      - MemoryOperation
    related_relation_ids:
      - MemoryOperation-has_audit_event-MemoryAuditEvent
      - MemoryOperation-has_result-MemoryOperationResult

    source_claims:
      - claim-memory-audit-event-activity-boundary
  - id: MemoryAuditEvent-example-boundary-debug-line

    labels:
      zh: 未归属调试文本
      en: Unattributed debug text
      ja: 帰属のないデバッグテキスト

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      log_line_id: debug-line-88
      message: memory ok
      audit_event_id: absent
      operation_ref: absent
      event_name: absent
      event_time: absent
      evidence_digest: absent
    related_node_ids:
      - MemoryAuditEvent
      - MemoryOperation
    related_relation_ids:
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-audit-event-structured
  - id: MemoryAuditEvent-example-instance-admission-discard

    labels:
      zh: 候选因重复被拒绝的审计事件实例
      en: Audit-event instance for duplicate-candidate rejection
      ja: 重複候補拒否の監査イベントインスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      audit_event_id: audit-discard-1101
      operation_ref: mem-op-discard-1101
      event_name: memory.admission.discarded
      event_phase: decided
      event_time: "2026-07-18T15:10:00.020Z"
      actor_ref: admission-worker-2
      evidence_digest: sha256:88daed768cdd5a12a0a9895e6fbdfdc9c503707a72840ef76157e202857845f8
      trace_ref: trace-admission-1101
    related_node_ids:
      - MemoryAuditEvent
      - MemoryOperation
      - MemoryDiscard
      - MemoryOperationResult
    related_relation_ids:
      - MemoryOperation-has_audit_event-MemoryAuditEvent
      - MemoryDiscard-is_a-MemoryAdmissionOperation
      - MemoryOperation-has_result-MemoryOperationResult

    source_claims:
      - claim-memory-audit-event-attribution
      - claim-memory-audit-event-structured
      - claim-memory-audit-event-digest
parent_relation:
  id: MemoryOperation-has_audit_event-MemoryAuditEvent
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有审计事件
    en: has audit event
    ja: 監査イベントを持つ
  definitions:
    zh: MemoryOperation —has_audit_event→ MemoryAuditEvent 表示一次操作拥有由操作身份和可观察阶段证据归属的审计事件时间线。
    en: MemoryOperation —has_audit_event→ MemoryAuditEvent means one operation has an audit-event timeline attributed by operation identity and observable phase evidence.
    ja: MemoryOperation —has_audit_event→ MemoryAuditEvent は、一つの操作が操作識別と観測可能段階証跡で帰属された監査イベント時系列を持つことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次操作可没有、拥有一个或多个审计事件，具体数目取决于实际可观察阶段与保留策略。
    en: An operation may have zero, one, or many audit events; observable phases and retention policy determine the count.
    ja: 一つの操作はゼロ、一つ、または複数の監査イベントを持ち得て、観測可能段階と保持ポリシーが数を決めます。
  inverse_reading:
    predicate: is_audit_event_of
    labels:
      zh: 是记忆操作的审计事件
      en: is audit event of memory operation
      ja: 記憶操作の監査イベントである
  conditions:
    - id: MemoryOperation-has_audit_event-MemoryAuditEvent-operation-match
      severity: error
      expression_language: plain
      expression: "Assert only when operation_ref identifies the parent operation and event_name, event_phase, event_time, actor_ref, and evidence_digest describe one observable phase of that operation."
      explanation:
        zh: 共享 trace_id、相近时间或同一主体都不足以归属事件；事件必须明确回指父操作并有阶段证据。
        en: Shared trace ID, nearby time, or the same actor is insufficient for attribution; the event must explicitly point to parent operation and have phase evidence.
        ja: 共有 trace ID、近接時刻、同じ主体では帰属に不十分であり、イベントは親操作を明示的に指し段階証跡を持つ必要があります。
      source_claims:
        - claim-memory-audit-event-attribution
        - claim-memory-audit-event-structured
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryOperation-has_audit_event-MemoryAuditEvent-example-positive

      labels:
        zh: 写入提交事件归属到写入操作
        en: Write-commit event belongs to write operation
        ja: 書込みコミットイベントは書込み操作に属する

      descriptions:
        zh: audit-write-310-committed 的 operation_ref=mem-op-write-310，事件名称和阶段描述该写入的提交，并有提交证据摘要。
        en: audit-write-310-committed has operation_ref=mem-op-write-310, and its name and phase describe that write's commit with a commit evidence digest.
        ja: audit-write-310-committed は operation_ref=mem-op-write-310 を持ち、名称と段階はその書込みのコミットを記述し、コミット証跡ダイジェストを持ちます。
