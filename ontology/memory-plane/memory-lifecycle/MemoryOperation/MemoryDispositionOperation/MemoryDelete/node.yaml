    zh: 此主干关系只表达授权失效处置属于 MemoryDispositionOperation；具体目标、授权、失效时刻、清除范围、墓碑、结果和审计使用字段或独立关系表达。
    en: This backbone relation only expresses that authorized invalidation disposition belongs to MemoryDispositionOperation; concrete target, authorization, invalidation time, clearance scope, tombstone, result, and audit use fields or separate relations.
    ja: この主幹関係は、許可済み失効処分が MemoryDispositionOperation に属することだけを表します。具体対象、許可、失効時刻、消去範囲、墓標、結果、監査はフィールドまたは別関係で表します。
