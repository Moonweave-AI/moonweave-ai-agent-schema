        en: mem-op-delete-2601 invalidates record-2601-v1 under validated erasure-request-2601 and generates content-minimized tombstone-2601.
        ja: mem-op-delete-2601 は検証済み erasure-request-2601 により record-2601-v1 を失効させ、内容を最小化した tombstone-2601 を生成します。
      field_values:
