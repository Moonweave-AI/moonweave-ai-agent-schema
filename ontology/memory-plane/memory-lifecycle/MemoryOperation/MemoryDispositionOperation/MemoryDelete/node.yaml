schema: moonweave.ai/ontology-node/v1
id: MemoryDelete
kind: concept
status: accepted
labels:
  zh: 记忆删除
  en: Memory delete
  ja: 記憶削除
semantics:
  short_definition:
    zh: 依据明确且可审计的删除理由，使既有记忆记录不再作为有效记忆使用，并产生最小删除证明的处置操作。
    en: A disposition operation that, under an explicit auditable deletion basis, makes an existing memory record no longer usable as valid memory and produces minimal deletion evidence.
    ja: 明示的で監査可能な削除根拠により、既存記憶レコードを有効な記憶として使用不能にし、最小限の削除証明を生成する処分操作です。
  definition:
    zh: MemoryDelete 是一种已执行的 MemoryDispositionOperation。它针对既有 MemoryRecord 验证用户删除请求、同意撤回、法律删除义务、已确认的无效记录或安全整改依据，实际终止该记录作为有效记忆的可用性，并记录失效时间、目标、依据、执行证据及不含已删除内容的最小 MemoryTombstone。它不等同于首次写入前拒绝候选项、容量导致的活动层驱逐、仅标记保留到期，或创建后继内容版本。
    en: MemoryDelete is an executed MemoryDispositionOperation. It validates a user-erasure request, consent withdrawal, legal erasure obligation, confirmed invalid record, or security-remediation basis for an existing MemoryRecord, actually ends the record's usability as valid memory, and records invalidation time, target, basis, execution evidence, and a minimal MemoryTombstone that contains no deleted content. It is not rejecting a candidate before first write, capacity-driven active-tier eviction, merely marking retention expiry, or creating a successor content version.
    ja: MemoryDelete は実行済みの MemoryDispositionOperation です。既存 MemoryRecord に対する利用者消去要求、同意撤回、法的消去義務、確認済み無効レコード、またはセキュリティ是正根拠を検証し、そのレコードを有効な記憶として実際に使用不能にします。そして失効時刻、対象、根拠、実行証跡、削除内容を含まない最小 MemoryTombstone を記録します。初回書込み前の候補拒否、容量起因のアクティブ層追い出し、保持期限切れの印付けだけ、後継内容バージョン作成ではありません。
  why_needed:
    zh: 删除的授权、失效效果、物理清除确认和审计最小化必须可区分；否则系统会把缓存回收或到期计划错误报告为合规删除，或把被删内容保留在所谓审计记录中。
    en: Deletion authorization, invalidation effect, physical-clearance confirmation, and audit minimization must remain distinguishable; otherwise a system can falsely report cache reclamation or an expiry plan as compliant deletion, or retain deleted content in a supposed audit record.
    ja: 削除の許可、失効効果、物理消去確認、監査最小化は区別可能でなければなりません。そうでなければ、システムはキャッシュ回収や期限切れ計画を準拠削除として誤報したり、削除内容を監査記録と称して保持したりします。
  includes:
    - zh: 已执行的用户遗忘请求、同意撤回、法律或合同删除、确认错误后的记录无效化，以及有最小墓碑和证据的安全删除。
      en: Executed user-forget requests, consent withdrawal, legal or contractual erasure, record invalidation after confirmed error, and security deletion with a minimal tombstone and evidence.
      ja: 実行済みの利用者忘却要求、同意撤回、法的または契約上の消去、確認済み誤り後のレコード無効化、最小墓標と証跡を持つセキュリティ削除を含みます。
  excludes:
    - zh: 只拒绝尚未持久化的候选项、为腾出容量移除活动层副本、只因保留规则标为到期不合格、仅计划未来删除，或保留原始内容并仅更改对象类型标签的“墓碑”。
      en: Rejecting an unpersisted candidate, removing an active-tier copy to free capacity, marking retention ineligibility only, planning a future deletion only, or a so-called tombstone that retains original content and merely changes an object-type label.
      ja: 未永続化候補の拒否、容量確保のためのアクティブ層コピー除去、保持不適格の印付けだけ、将来削除の計画だけ、または元内容を保持しオブジェクト型ラベルだけを変えるいわゆる墓標を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将删除实现为先验证授权和目标、再使记录对正常记忆检索失效的已执行工作单元。输出保留最小墓碑、失效时刻和证据摘要，而不复制原始正文、嵌入或敏感载荷；若还需证明介质清除，应把已验证的清除范围明确记录，不能从逻辑失效自动推断。
    en: "Implement deletion as an executed work unit that validates authorization and target, then makes the record ineligible for normal memory retrieval. Output retains only a minimal tombstone, invalidation time, and evidence digest rather than copied body, embedding, or sensitive payload; when media clearance must also be proven, record its verified scope explicitly and do not infer it from logical invalidation."
    ja: 削除は、許可と対象を検証した後にレコードを通常の記憶検索で不適格にする実行済み作業単位として実装します。出力は複製した本文、埋込み、機微ペイロードではなく、最小墓標、失効時刻、証跡ダイジェストだけを保持します。媒体消去も証明する必要がある場合は、検証済みの範囲を明示的に記録し、論理的失効から推論してはいけません。
  typical_input:
    - description: An existing record reference repeated in the disposition target collection, an authorized deletion basis, authorization reference, executor identity, and execution start time.
      format: "{operation_id, operation_kind:'disposition', target_record_ref, target_record_refs:[target_record_ref], disposition_kind:'delete', deletion_basis, disposition_basis, authorization_ref, actor_ref, started_at}"
  typical_output:
    - description: A completed invalidation with aligned disposition effect, evidence, effective time, minimal tombstone, completion scope, result, and audit event.
      format: "{operation_id, status:'succeeded', disposition_effect:'invalidated', invalidated_at, disposed_at:invalidated_at, disposition_evidence_digest:deletion_evidence_digest, tombstone_ref, completion_scope, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: PostgreSQL DELETE command
      url: https://www.postgresql.org/docs/current/sql-delete.html
      description: Documents an executed deletion statement over identified table rows.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entity invalidation and distinguishes activities, entities, agents, and provenance records.
    - name: NIST SP 800-88 Rev. 1
      url: https://csrc.nist.gov/pubs/sp/800/88/r1/final
      description: Describes controlled sanitization methods, verification, and the distinction between a decision and completed media sanitization.
  source_claims:
    - claim-memory-delete-activity
    - claim-memory-delete-invalidation
    - claim-memory-delete-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联删除目标、授权、失效、墓碑、结果和审计事实。
        en: Reuses the stable MemoryOperation identity to join deletion target, authorization, invalidation, tombstone, result, and audit facts.
        ja: 親 MemoryOperation の安定識別子を再利用し、削除対象、許可、失効、墓標、結果、監査事実を結びます。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-delete-2601
      source_claims:
        - claim-memory-delete-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承 MemoryDispositionOperation 的执行包络；在删除节点中固定为 disposition，表明这是已执行的既有记录处置，而不是请求、策略或内容修订。
        en: Retains the MemoryDispositionOperation execution envelope and is fixed to disposition here, identifying an executed disposition of an existing record rather than a request, policy, or content revision.
        ja: MemoryDispositionOperation の実行包絡を継承し、ここでは disposition に固定する。要求、方針、内容改訂ではなく、既存レコードに実行された処置であることを示す。
      allowed_values:
        - disposition
      pattern: null
      example_value: disposition
      source_claims:
        - claim-memory-delete-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承的活动执行状态；它说明删除工作单元是否完成，不等同于目标记录在删除后的可检索性。
        en: The inherited execution state of the activity; it says whether the deletion work unit completed and is not the target record's post-deletion retrievability.
        ja: 活動の実行状態を継承する。削除作業単位が完了したかを示し、対象レコードの削除後の検索可能性とは別である。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-delete-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承的实际执行开始时间；不得用删除请求提交时间、保留策略发布时间或计划任务时间替代。
        en: The inherited actual execution-start time; request submission, retention-policy publication, and scheduled-job time cannot substitute for it.
        ja: 実際の実行開始時刻を継承する。削除要求の提出時刻、保持方針の公開時刻、予定ジョブ時刻で代用してはならない。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:00:00Z"
      source_claims:
        - claim-memory-delete-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承的实际执行者引用；请求人、记录所有者或删除依据的制定者不能因相关而被误记为执行者。
        en: The inherited reference to the actual executor; a requester, record owner, or author of the deletion basis is not thereby the executor.
        ja: 実際の実行者への参照を継承する。要求者、レコード所有者、削除根拠の作成者は、関連するだけで実行者にはならない。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: privacy-deletion-worker-1
      source_claims:
        - claim-memory-delete-activity
    - id: target_record_refs
      labels:
        zh: 目标记录引用集合
        en: target record references
        ja: 対象レコード参照集合
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 继承的处置目标集合。MemoryDelete 目前将单个 target_record_ref 作为该集合中唯一实际失效的既有记录，不能用候选项、相似记录或未来输出替代。
        en: The inherited disposition-target collection. MemoryDelete currently represents its single target_record_ref as the only existing record actually invalidated in this collection; a candidate, similar record, or future output cannot substitute.
        ja: 処置対象集合を継承する。MemoryDelete では単一の target_record_ref を、この集合で実際に無効化する唯一の既存レコードとして表す。候補、類似レコード、将来の出力で代用してはならない。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value:
        - record-2601-v1
      source_claims:
        - claim-memory-delete-target
    - id: disposition_kind
      labels:
        zh: 处置种类
        en: disposition kind
        ja: 処置種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 将继承的处置分类收窄为 delete；它与 eviction、expiration 和 decay 区分，不能仅因记录暂时不可见而推断为删除。
        en: Narrows the inherited disposition classification to delete. It remains distinct from eviction, expiration, and decay and cannot be inferred merely because a record is temporarily unavailable.
        ja: 継承した処置分類を delete に限定する。eviction、expiration、decay とは区別され、レコードが一時的に見えないだけで削除と推定してはならない。
      allowed_values:
        - delete
      pattern: null
      example_value: delete
      source_claims:
        - claim-memory-delete-boundary
    - id: disposition_basis
      labels:
        zh: 处置依据类别
        en: disposition basis
        ja: 処置根拠種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 将删除的细粒度 deletion_basis 归入父类认可的依据类别：用户删除或同意撤回属于 explicit_deletion_request，法律、合同、已确认无效记录或安全整治属于 legal_or_security_requirement。
        en: "Places the granular deletion_basis in a parent-recognized category: user erasure or consent withdrawal is an explicit_deletion_request; legal, contractual, confirmed-invalid-record, and security-remediation bases are legal_or_security_requirement."
        ja: 細分化した deletion_basis を親の根拠種別に位置付ける。利用者消去または同意撤回は explicit_deletion_request、法的・契約上・確認済み無効レコード・安全是正の根拠は legal_or_security_requirement である。
      allowed_values:
        - explicit_deletion_request
        - legal_or_security_requirement
      pattern: null
      example_value: explicit_deletion_request
      source_claims:
        - claim-memory-delete-basis
    - id: disposition_effect
      labels:
        zh: 处置效果
        en: disposition effect
        ja: 処置効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 invalidated，表示目标记录自 invalidated_at 起不再作为有效记忆使用；它不声称所有物理副本均已清除。
        en: Fixed to invalidated, meaning the target is no longer usable as valid memory from invalidated_at; it does not claim that every physical replica was cleared.
        ja: invalidated に固定する。対象は invalidated_at 以降、有効な記憶として使用できないことを示す。すべての物理複製を消去したという主張ではない。
      allowed_values:
        - invalidated
      pattern: null
      example_value: invalidated
      source_claims:
        - claim-memory-delete-invalidation
    - id: disposition_evidence_digest
      labels:
        zh: 处置证据摘要
        en: disposition evidence digest
        ja: 処置証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承的处置证据摘要；在删除中必须与 deletion_evidence_digest 相同，绑定目标、依据、授权、失效效果和最小墓碑事实而不复制已删除载荷。
        en: The inherited disposition-evidence digest. For deletion it must equal deletion_evidence_digest and bind target, basis, authorization, invalidation effect, and minimal tombstone facts without copying deleted payload.
        ja: 処置証拠ダイジェストを継承する。削除では deletion_evidence_digest と同一でなければならず、削除済みペイロードを複製せずに対象、根拠、承認、無効化効果、最小墓標事実を結び付ける。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:011a6e7c19e27d5ce7cc7c87fcd87987378c2e3c7da10a3c8cfed2ecabf1bc2a
      source_claims:
        - claim-memory-delete-evidence
    - id: disposed_at
      labels:
        zh: 处置生效时间
        en: disposed at
        ja: 処置発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承的处置实际生效时间；删除中它必须等于 invalidated_at，而非请求、计划或日志摄取时间。
        en: The inherited time at which disposition actually took effect. For deletion it must equal invalidated_at, not request, schedule, or log-ingestion time.
        ja: 処置が実際に有効になった時刻を継承する。削除では invalidated_at と一致しなければならず、要求、予定、ログ取り込み時刻ではない。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:00:00.107Z"
      source_claims:
        - claim-memory-delete-invalidation
    - id: target_record_ref
      labels:
        zh: 目标记录引用
        en: target record reference
        ja: 対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次删除实际使其失效的既有 MemoryRecord；同一主体、命名空间、内容相似性或追踪上下文不能替代精确目标身份。
        en: References the existing MemoryRecord this deletion actually invalidates; the same actor, namespace, content similarity, or trace context cannot substitute for exact target identity.
        ja: この削除が実際に失効させる既存 MemoryRecord を参照します。同じ主体、名前空間、内容類似性、トレース文脈では正確な対象識別を代替できません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-2601-v1
      source_claims:
        - claim-memory-delete-target
    - id: deletion_basis
      labels:
        zh: 删除依据
        en: deletion basis
        ja: 削除根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明本次记录失效的具体受控理由，而不是泛化的“清理”或缓存事件名称。
        en: States the concrete controlled reason that invalidates this record rather than a generic "cleanup" or cache-event label.
        ja: 一般的な「清掃」またはキャッシュイベントラベルではなく、このレコードを失効させる具体的で管理された理由を示します。
      allowed_values:
        - user_erasure_request
        - consent_withdrawal
        - legal_or_contractual_erasure
        - confirmed_invalid_record
        - security_remediation
      pattern: null
      example_value: user_erasure_request
      source_claims:
        - claim-memory-delete-basis
    - id: authorization_ref
      labels:
        zh: 授权或依据引用
        en: authorization or basis reference
        ja: 許可または根拠参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向支持本次删除的请求、撤回、法律案件、质量确认或安全工单，使操作可被审计而不在墓碑中保留已删除内容。
        en: Points to the request, withdrawal, legal case, quality confirmation, or security ticket that supports this deletion so the operation is auditable without retaining deleted content in the tombstone.
        ja: この削除を支える要求、撤回、法的案件、品質確認、またはセキュリティチケットを指し、墓標に削除内容を保持せずに操作を監査可能にします。
      allowed_values: []
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:@/-]*$'
      example_value: erasure-request-2601
      source_claims:
        - claim-memory-delete-basis
    - id: invalidated_at
      labels:
        zh: 失效时间
        en: invalidated at
        ja: 失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录目标记录不再可作为有效记忆返回的实际事件时间，不是删除请求提出、策略创建或后台计划的时间。
        en: Records the actual event time at which the target record is no longer returnable as valid memory, not request-submission, policy-creation, or background-schedule time.
        ja: 対象レコードが有効な記憶として返せなくなった実際のイベント時刻を記録します。削除要求提出、ポリシー作成、バックグラウンド予定時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:00:00.107Z"
      source_claims:
        - claim-memory-delete-invalidation
    - id: tombstone_ref
      labels:
        zh: 墓碑引用
        en: tombstone reference
        ja: 墓標参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用由本次删除产生的最小 MemoryTombstone，它可保留删除所需身份、依据和时间，但不得保留原始正文、嵌入或机密载荷。
        en: References the minimal MemoryTombstone produced by this deletion, which may retain identity, basis, and time needed for deletion but must not retain original body, embeddings, or confidential payload.
        ja: この削除で生成された最小 MemoryTombstone を参照します。削除に必要な識別、根拠、時刻は保持できますが、元の本文、埋込み、機密ペイロードを保持してはなりません。
      allowed_values: []
      pattern: '^tombstone-[A-Za-z0-9._-]+$'
      example_value: tombstone-2601
      source_claims:
        - claim-memory-delete-tombstone
    - id: deletion_evidence_digest
      labels:
        zh: 删除证据摘要
        en: deletion evidence digest
        ja: 削除証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定目标版本、删除依据、授权引用、失效效果、墓碑最小字段和执行输出摘要，以便验证删除而不重新暴露内容。
        en: Fixes a digest of target version, deletion basis, authorization reference, invalidation effect, minimal tombstone fields, and execution output so deletion can be verified without re-exposing content.
        ja: 対象バージョン、削除根拠、許可参照、失効効果、最小墓標フィールド、実行出力のダイジェストを固定し、内容を再露出せずに削除を検証できるようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:011a6e7c19e27d5ce7cc7c87fcd87987378c2e3c7da10a3c8cfed2ecabf1bc2a
      source_claims:
        - claim-memory-delete-evidence
    - id: completion_scope
      labels:
        zh: 完成范围
        en: completion scope
        ja: 完了範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分已确认的逻辑失效与经过验证的介质清除，防止从正常检索不可用这一事实过度推断所有副本已被物理清除。
        en: Distinguishes confirmed logical invalidation from verified media sanitization, preventing the fact that normal retrieval is blocked from being overread as proof that every copy was physically cleared.
        ja: 確認済みの論理的失効と検証済みの媒体サニタイズを区別し、通常検索が遮断された事実を、すべてのコピーが物理消去された証明として過読することを防ぎます。
      allowed_values:
        - logical_invalidation_confirmed
        - media_sanitization_verified
      pattern: null
      example_value: logical_invalidation_confirmed
      source_claims:
        - claim-memory-delete-completion
  constraints:
    - id: MemoryDelete-parent-disposition-contract
      expression: "operation_kind = disposition, disposition_kind = delete, disposition_effect = invalidated, target_record_refs contains exactly target_record_ref, disposition_evidence_digest = deletion_evidence_digest, and disposed_at = invalidated_at."
      explanation:
        zh: 删除是父类处置契约的一个具体分支；单记录删除不能丢失集合语义，也不能把删除自己的失效时间或证据替换成不相干的处置事实。
        en: Deletion is a concrete branch of the parent disposition contract. A single-record deletion cannot discard the collection semantics or substitute an unrelated disposition time or evidence fact for its own invalidation.
        ja: 削除は親の処置契約の具体的な分岐である。単一レコード削除でも集合の意味を失ってはならず、自身の無効化時刻または証拠を無関係な処置事実で置き換えてはならない。
      source_claims:
        - claim-memory-delete-activity
        - claim-memory-delete-target
        - claim-memory-delete-invalidation
        - claim-memory-delete-evidence
    - id: MemoryDelete-authorized-existing-target
      expression: "target_record_ref identifies a MemoryRecord that existed before invalidated_at, deletion_basis is permitted, authorization_ref supports that basis, and deletion_evidence_digest covers the target, basis, authorization, and effect."
      explanation:
        zh: 删除不能只依据模糊的清理标签或相似记录；既有目标和授权依据必须在证据中可追溯。
        en: Deletion cannot rest on a vague cleanup label or a similar record; the existing target and authorized basis need traceability in evidence.
        ja: 削除は曖昧な清掃ラベルや類似レコードだけに基づけません。既存対象と許可根拠は証跡で追跡可能でなければなりません。
      source_claims:
        - claim-memory-delete-target
        - claim-memory-delete-basis
        - claim-memory-delete-evidence
    - id: MemoryDelete-invalidation-and-time-consistency
      expression: "invalidated_at is on or after started_at, a terminal parent operation has ended_at on or after invalidated_at, and normal memory retrieval treats target_record_ref as invalid after invalidated_at."
      explanation:
        zh: 失效必须是一次实际发生的效果，并且不能早于活动开始或在活动结束后被回填为同一删除事实。
        en: Invalidation must be an actual applied effect and cannot predate activity start or be backfilled after activity completion as the same deletion fact.
        ja: 失効は実際に適用された効果でなければならず、活動開始より前になったり、活動完了後に同じ削除事実として後書きされたりしてはいけません。
      source_claims:
        - claim-memory-delete-activity
        - claim-memory-delete-invalidation
    - id: MemoryDelete-tombstone-minimization
      expression: "tombstone_ref identifies a MemoryTombstone produced by this operation with matching original-record identity, deletion basis, and invalidated_at, and it contains no deleted body, embedding, or confidential payload."
      explanation:
        zh: 审计证明应阻止记录复活并支持追责，但不能成为恢复被删除内容的旁路副本。
        en: Audit evidence should prevent record resurrection and support accountability, but cannot become a side copy from which deleted content is reconstructed.
        ja: 監査証明はレコード復活を防ぎ説明責任を支えるべきですが、削除内容を再構成する横道コピーになってはいけません。
      source_claims:
        - claim-memory-delete-tombstone
        - claim-memory-delete-evidence
    - id: MemoryDelete-completion-scope-boundary
      expression: "completion_scope=media_sanitization_verified requires verification evidence for the stated media scope; logical_invalidation_confirmed proves only that the record is no longer usable as normal memory and does not imply every physical replica was cleared."
      explanation:
        zh: 逻辑删除与经验证的介质清除可以在同一次工作流中发生，但它们是不同的可审计断言，不能相互自动替代。
        en: Logical deletion and verified media sanitization can occur in one workflow, but they are different auditable assertions and cannot automatically substitute for one another.
        ja: 論理削除と検証済み媒体サニタイズは一つのワークフローで起こり得ますが、異なる監査可能な主張であり、自動的に相互代替できません。
      source_claims:
        - claim-memory-delete-completion
        - claim-memory-delete-boundary
  required_relation_constraints: []
