      en: MemoryDelete —produces→ MemoryTombstone means one deletion generates a minimal audit entity that proves target, basis, and invalidation time without retaining deleted content.
      ja: MemoryDelete —produces→ MemoryTombstone は、一つの削除が対象、根拠、失効時刻を証明する最小監査エンティティを生成し、削除内容を保持しないことを表します。
    cardinality: null
