schema: moonweave.ai/ontology-node/v1
id: MemoryDelete
kind: concept
status: accepted
labels:
  zh: 记忆删除
  en: Memory delete
  ja: 記憶削除
semantics:
  short_definition:
    zh: 基于显式用户、法律、策略或无效化依据撤销既有记录的处置操作。
    en: A disposition operation invalidating an existing record under an explicit user, legal, policy, or invalidation basis.
    ja: explicit user・legal・policy・invalidation basisにより既存recordを無効化するdisposition operationです。
  definition:
    zh: MemoryDelete 由明确删除依据触发，使 MemoryRecord 不再作为有效记忆使用，并按审计策略产生 MemoryTombstone；它不是写入前丢弃、容量驱逐或仅到期等待清理。
    en: MemoryDelete is triggered by an explicit deletion basis, makes a MemoryRecord no longer usable as valid memory, and produces a MemoryTombstone under the audit contract. It is not pre-write discard, capacity eviction, or merely becoming expired while awaiting cleanup.
    ja: MemoryDelete はexplicit deletion basisでtriggerされMemoryRecordをvalid memoryとして使えなくしaudit contract下でMemoryTombstoneを生成します。pre-write discard・capacity eviction・cleanup待ちexpiryではありません。
  why_needed:
    zh: 为合规删除保留原因与墓碑，同时避免与缓存行为混同。
    en: Preserves deletion basis and tombstone for compliance without conflating cache behavior.
    ja: compliance用deletion basis/tombstoneを保持しcache behaviorと混同しません。
  includes:
    - zh: 纳入用户遗忘请求、撤回同意、法律删除和确认错误后的无效化。
      en: Includes user forget requests, consent withdrawal, legal erasure, and invalidation after confirmed error.
      ja: user forget request・consent withdrawal・legal erasure・confirmed error後invalidationを含みます。
  excludes:
    - zh: 排除 TTL 到点但尚未删除、容量驱逐和候选丢弃。
      en: Excludes TTL reached but not yet deleted, capacity eviction, and candidate discard.
      ja: TTL到達後未delete・capacity eviction・candidate discardを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - delete_operation_id
  fields:
