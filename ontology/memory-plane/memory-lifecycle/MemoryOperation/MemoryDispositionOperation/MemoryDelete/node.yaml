        en: delete-1304 validates user-forget request-77, ends record-1304's validity, and generates tombstone-1304 without the deleted content.
        ja: delete-1304 は user-forget request-77 を検証し record-1304 の validity を終了し、削除 content を含まない tombstone-1304 を生成します。
      field_values: {}
