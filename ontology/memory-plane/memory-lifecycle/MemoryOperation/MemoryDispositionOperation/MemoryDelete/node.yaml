sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines entity invalidation and distinguishes activities, entities, agents, and provenance facts.
  - id: gdpr-article-17
    title: Regulation (EU) 2016/679 Article 17 Right to erasure
    source_type: regulation
    url: https://eur-lex.europa.eu/eli/reg/2016/679/oj
    relevance: Establishes enumerated circumstances for a data subject's right to erasure and related controller obligations.
  - id: nist-sp-800-88r1
    title: NIST SP 800-88 Rev. 1 Guidelines for Media Sanitization
    source_type: standard
    url: https://csrc.nist.gov/pubs/sp/800/88/r1/final
    relevance: Describes controlled sanitization methods, verification, and the difference between planned and completed media sanitization.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests used to bind deletion evidence without retaining deleted payload.
source_claims:
  - id: claim-memory-delete-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities and provenance facts around it. Moonweave records deletion as an executed operation with target, actor, time, result, and audit evidence rather than a plan or object label.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance records to have stable identities. Moonweave uses one operation ID to join deletion target, authorization, invalidation, tombstone, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-target
    source: w3c-prov-o
    supports: PROV-O distinguishes entities used by an activity from nearby or later-generated entities. Moonweave records the exact existing memory record actually invalidated by deletion.
    locator: "PROV-O sections on prov:used, prov:wasInvalidatedBy, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-basis
    source: gdpr-article-17
    supports: GDPR Article 17 enumerates circumstances for a right to erasure. Moonweave records an explicit user, consent, legal, quality, or security basis and its authorization reference rather than treating cache cleanup as erasure.
    locator: "GDPR Article 17 paragraphs 1 to 3"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-invalidation
    source: w3c-prov-o
    supports: PROV-O defines invalidation as the start of an entity becoming unavailable. Moonweave records invalidated_at when the target stops being returnable as valid memory and keeps expiry eligibility distinct until that event occurs.
    locator: "PROV-O definition of prov:Invalidation and prov:invalidatedAtTime"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-tombstone
    source: nist-sp-800-88r1
    supports: NIST SP 800-88 describes controlled sanitization and verification without requiring retention of sanitized data. Moonweave uses a minimal tombstone as an ontology design for audit evidence that excludes deleted body, embeddings, and confidential payload.
    locator: "NIST SP 800-88 Rev. 1 sanitization method and verification guidance"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave binds target version, basis, authorization, effect, tombstone fields, and execution output with a SHA-256 digest without storing deleted content.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-completion
    source: nist-sp-800-88r1
    supports: NIST SP 800-88 distinguishes a sanitization decision from verified completion. Moonweave distinguishes logical invalidation from media sanitization verified for a stated scope and does not infer one from the other.
    locator: "NIST SP 800-88 Rev. 1 sanitization process and verification guidance"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-delete-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, entities, invalidation facts, and descriptions. Moonweave keeps deletion distinct from candidate discard, active-tier eviction, retention expiry, policy scheduling, and content revision even when those facts are related.
    locator: "PROV-O Activity, Entity, and invalidation model"
    evidence_kind: ontology-design-inference
    confidence: high
