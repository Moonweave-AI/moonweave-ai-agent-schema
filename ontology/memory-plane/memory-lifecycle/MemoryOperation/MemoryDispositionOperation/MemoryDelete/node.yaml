      en: memory-op-delete-001 invalidates record-1304 under user-forget-request-55 and produces a MemoryTombstone carrying the deletion basis and time.
      ja: memory-op-delete-001 は user-forget-request-55 に基づき record-1304 を無効化し、削除根拠と時刻を持つ MemoryTombstone を生成します。
    field_values:
