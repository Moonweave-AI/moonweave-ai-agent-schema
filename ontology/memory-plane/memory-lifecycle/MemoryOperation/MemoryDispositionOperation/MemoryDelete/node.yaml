parent_relation:
  id: MemoryDelete-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆处置操作
    en: is a memory disposition operation
    ja: 記憶処分操作の一種である
  definitions:
    zh: MemoryDelete —is_a→ MemoryDispositionOperation 表示对既有记录执行了经过授权的失效处置，并以最小墓碑和证据保留删除事实。
    en: MemoryDelete —is_a→ MemoryDispositionOperation means an authorized invalidation disposition is executed over an existing record and retains the deletion fact with minimal tombstone and evidence.
    ja: MemoryDelete —is_a→ MemoryDispositionOperation は、既存レコードに対する許可済み失効処分を実行し、最小墓標と証跡で削除事実を保持することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次授权删除能处理的目标记录数。
    en: The classification relation expresses type membership and does not limit the number of targets one authorized deletion can handle.
    ja: 分類関係は型メンバーシップを表し、一つの許可済み削除が扱える対象数を制限しません。
  inverse_reading:
    predicate: has_delete_subtype
    labels:
      zh: 具有删除子类
      en: has delete subtype
      ja: 削除サブタイプを持つ
  conditions:
    - id: MemoryDelete-is_a-MemoryDispositionOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when an executed disposition over an existing record has an authorized deletion basis, actual invalidation at a recorded time, a matching minimal tombstone, and no retained deleted payload."
      explanation:
        zh: 处置父类身份不足以证明删除；必须同时具有授权、实际失效、目标一致墓碑和内容最小化。
        en: Disposition-parent identity alone does not prove deletion; authorization, actual invalidation, a target-matching tombstone, and content minimization are all required.
        ja: 処分親の識別だけでは削除を証明できません。許可、実際の失効、対象一致墓標、内容最小化のすべてが必要です。
      source_claims:
        - claim-memory-delete-basis
        - claim-memory-delete-invalidation
        - claim-memory-delete-tombstone
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryDelete-is_a-MemoryDispositionOperation-example-positive

      labels:
        zh: 授权失效与墓碑属于删除处置
        en: Authorized invalidation and tombstone are delete disposition
        ja: 許可済み失効と墓標は削除処分である

