sibling_differentiation:
  - sibling_concept_id: MemoryEviction
    shared_parent_concept_id: MemoryDispositionOperation
    differentia:
      zh: 正向身份比较：父节点 MemoryDispositionOperation：MemoryDelete（semantic kind=activity，骨架 MemoryDelete-is_a-MemoryDispositionOperation）；MemoryEviction（semantic kind=activity，骨架 MemoryEviction-is_a-MemoryDispositionOperation）。双端条件：MemoryDelete 条件：“基于显式用户、法律、策略或无效化依据撤销既有记录的处置操作”；MemoryEviction 条件：“因容量或性能策略把记录从活动缓存或检索层移除的处置操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryDispositionOperation: MemoryDelete (semantic kind=activity, backbone MemoryDelete-is_a-MemoryDispositionOperation); MemoryEviction (semantic kind=activity, backbone MemoryEviction-is_a-MemoryDispositionOperation). Endpoint conditions: MemoryDelete condition: “A disposition operation invalidating an existing record under an explicit user, legal, policy, or invalidation basis”; MemoryEviction condition: “A disposition operation removing a record from an active cache or retrieval tier because of capacity or performance policy”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryDispositionOperation：MemoryDelete（semantic kind=activity、バックボーン MemoryDelete-is_a-MemoryDispositionOperation）；MemoryEviction（semantic kind=activity、バックボーン MemoryEviction-is_a-MemoryDispositionOperation）。両端条件：MemoryDelete の条件：「explicit user・legal・policy・invalidation basisにより既存recordを無効化するdisposition operationです」；MemoryEviction の条件：「capacity/performance policyによりrecordをactive cache/retrieval tierから除去するdisposition operationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-delete-004
      - claim-memory-delete-005
  - sibling_concept_id: MemoryExpiration
    shared_parent_concept_id: MemoryDispositionOperation
    differentia:
      zh: 正向身份比较：父节点 MemoryDispositionOperation：MemoryDelete（semantic kind=activity，骨架 MemoryDelete-is_a-MemoryDispositionOperation）；MemoryExpiration（semantic kind=activity，骨架 MemoryExpiration-is_a-MemoryDispositionOperation）。双端条件：MemoryDelete 条件：“基于显式用户、法律、策略或无效化依据撤销既有记录的处置操作”；MemoryExpiration 条件：“记录达到时间、同意或作用域期限并改变保留资格的处置操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryDispositionOperation: MemoryDelete (semantic kind=activity, backbone MemoryDelete-is_a-MemoryDispositionOperation); MemoryExpiration (semantic kind=activity, backbone MemoryExpiration-is_a-MemoryDispositionOperation). Endpoint conditions: MemoryDelete condition: “A disposition operation invalidating an existing record under an explicit user, legal, policy, or invalidation basis”; MemoryExpiration condition: “A disposition operation marking that a record has reached a time, consent, or scope deadline and changing retention eligibility”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryDispositionOperation：MemoryDelete（semantic kind=activity、バックボーン MemoryDelete-is_a-MemoryDispositionOperation）；MemoryExpiration（semantic kind=activity、バックボーン MemoryExpiration-is_a-MemoryDispositionOperation）。両端条件：MemoryDelete の条件：「explicit user・legal・policy・invalidation basisにより既存recordを無効化するdisposition operationです」；MemoryExpiration の条件：「recordがtime・consent・scope deadlineへ達しretention eligibilityを変えるdisposition operationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-delete-006
      - claim-memory-delete-007
