source_claims:
  - id: claim-memory-delete-001
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Activity from the Entity it uses or generates and the Agent associated with it; Moonweave applies that separation to memory operations.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-delete-002
    source: eng-ont-prov-o
    supports: MemoryDelete.delete_operation_id records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-delete-003
    source: eng-ont-prov-o
    supports: MemoryDelete.deletion_basis records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-delete-004
    source: eng-ont-prov-o
    supports: PROV-O's invalidation relation captures that an Entity is no longer available after an Activity. Moonweave uses this stronger lifecycle consequence for MemoryDelete, whereas eviction may remove only an active cache copy; PROV-O does not define eviction or the sibling relation.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-delete-005
    source: eng-cache-redis-eviction
    supports: Redis eviction removes keys from the active dataset under maxmemory policy pressure and is not presented as an authoritative deletion of an external source record. Moonweave therefore distinguishes MemoryEviction from explicit MemoryDelete; the cross-store interpretation is a Moonweave design inference.
    locator: Key eviction > maxmemory configuration and eviction policies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-delete-006
    source: eng-ont-prov-o
    supports: PROV-O defines invalidation as the event after which an Entity is no longer available for use. Moonweave associates that completed outcome with MemoryDelete and keeps it separate from MemoryExpiration, which may mark eligibility for later deletion without immediate invalidation.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-delete-007
    source: eng-db-dynamodb-ttl
    supports: DynamoDB explicitly notes that expired TTL items can remain pending deletion after their expiry timestamp. This supports MemoryExpiration as a threshold state distinct from MemoryDelete as completed invalidation; Moonweave generalizes the distinction beyond DynamoDB.
    locator: Using time to live (TTL) > expired items pending deletion and TTL stream records
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
