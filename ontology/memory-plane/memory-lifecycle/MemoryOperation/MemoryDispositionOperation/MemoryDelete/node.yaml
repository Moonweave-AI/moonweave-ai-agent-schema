        en: mem-op-expire-2602 only marks record-2602-v1 retention_ineligible and has not yet invalidated it or produced a tombstone.
        ja: mem-op-expire-2602 は record-2602-v1 を retention_ineligible と印付けるだけで、まだ失効させず墓標も生成していません。
