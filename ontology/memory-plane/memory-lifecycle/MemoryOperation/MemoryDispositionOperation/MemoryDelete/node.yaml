    - id: MemoryDelete-is_a-MemoryDispositionOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆处置操作边界例
        en: "Boundary case: is a memory disposition operation"
        ja: 記憶処分操作の一種境界例
      scenario_id: MemoryDelete-is_a-MemoryDispositionOperation:boundary:20260716
      descriptions:
        zh: expire-1304 仅因 TTL 到期把 record-1304 标成不可常规检索，后台物理删除尚未发生，也没有 tombstone。
        en: expire-1304 only marks record-1304 ineligible after TTL; physical deletion is still pending and no tombstone exists.
        ja: expire-1304 は TTL 後 record-1304 を retrieval-ineligible にするだけで physical deletion は pending、tombstone もありません。
      field_values: {}
      related_node_ids:
        - MemoryDelete
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryDelete-is_a-MemoryDispositionOperation
      expected_result:
        zh: 拒绝把 expire-1304 归为 MemoryDelete；在删除完成证据出现前，只建立 MemoryExpiration。
        en: Reject MemoryDelete membership for expire-1304; assert only MemoryExpiration until evidence of completed deletion exists.
        ja: expire-1304 の MemoryDelete 所属を拒否し、deletion completion evidence までは MemoryExpiration のみを確立します。
      why_valid_or_invalid:
        zh: 到期资格和删除完成是两个时点；把前者当成后者会错误声称实体已不可用并破坏审计时序。
        en: Expiry eligibility and completed deletion are separate moments; conflating them falsely claims the entity is already invalidated and corrupts audit timing.
        ja: expiry eligibility と completed deletion は別時点で、混同すると entity invalidation を早く主張し audit timing を壊します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-delete-001
