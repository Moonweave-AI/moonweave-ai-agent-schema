schema: moonweave.ai/ontology-node/v1
id: MemoryDelete
kind: concept
labels:
  zh: 记忆删除
  en: Memory delete
  ja: 記憶削除
semantics:
  short_definition:
    zh: 基于显式依据撤销既有记录的处置删除。
    en: Disposition delete invalidating an existing record under explicit basis.
    ja: 明示 basis で既存 record を無効化する disposition delete。
  definition:
    zh: MemoryDelete 由用户遗忘、法律删除或策略无效化等明确依据触发，使 MemoryRecord 不再可用并产生可审计 tombstone。Mem0 DELETE /v1/memories/{id} 与 Letta archival_memory_delete 是典型映射；不是写入前丢弃、容量驱逐或仅到期等待。
    en: MemoryDelete is triggered by explicit bases such as user forget, legal erasure, or policy invalidation, making a MemoryRecord unusable and producing an auditable tombstone. Mem0 DELETE /v1/memories/{id} and Letta archival_memory_delete are typical mappings; it is not pre-write discard, capacity eviction, or expiry awaiting cleanup.
    ja: MemoryDelete は user forget/legal erasure/policy invalidation 等で trigger し MemoryRecord を unusable にし tombstone を生成。Mem0 DELETE /v1/memories/{id} と Letta archival_memory_delete が典型。pre-write discard/capacity eviction/expiry 待ちではない。
  why_needed:
    zh: 只让 search 返回空而不登记 DELETE，合规团队无法证明用户遗忘请求已执行。
    en: Empty search without a recorded DELETE leaves compliance unable to prove a forget request executed.
    ja: search 空だけで DELETE 未登録だと forget 要求の実行を compliance が証明できない。
  includes:
    - zh: 纳入用户遗忘、撤回同意、法律删除与确认错误后的无效化。
      en: Includes user forget, consent withdrawal, legal erasure, and invalidation after confirmed error.
      ja: user forget/consent withdrawal/legal erasure/confirmed error invalidation。
  excludes:
    - zh: 排除 TTL 到点未删、容量驱逐与候选丢弃。
      en: Excludes TTL reached but not deleted, capacity eviction, and candidate discard.
      ja: TTL 到達未 delete/capacity eviction/candidate discard を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 Mem0 DELETE /v1/memories/{memory_id}/ 与 Letta archival_memory_delete；LangGraph store.delete 立即移除 Item。成功必须产生 tombstone_id 与 consumed_record_id，不能只移除向量索引。
    en: Map Mem0 DELETE /v1/memories/{memory_id}/ and Letta archival_memory_delete; LangGraph store.delete removes Items immediately. Success must yield tombstone_id and consumed_record_id, not index-only removal.
    ja: Mem0 DELETE /v1/memories/{id}/ と Letta archival_memory_delete、LangGraph store.delete を写像。成功時 tombstone_id/consumed_record_id 必須で index のみ削除不可。
  typical_input:
    - description: Mem0 delete memory
      format: |
        DELETE https://api.mem0.ai/v1/memories/{memory_id}/
        # => {"message": "Memory deleted successfully!"}
      source_claims: [claim-memory-delete-mem0]
    - description: Letta archival delete
      format: |
        archival_memory_search(query="JWT refresh rotation")
        archival_memory_delete(id="archival-passage-42")
      source_claims: [claim-memory-delete-letta]
  typical_output:
    - description: Delete operation with tombstone
      format: |
        {
          "delete_operation_id": "delete-310",
          "consumed_record_id": "record-310-v2",
          "tombstone_id": "tombstone-310",
          "invalidation_reason": "user-forget-request"
        }
      source_claims: [claim-memory-delete-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: DELETE /v1/memories/{memory_id}/ removes a stored memory.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_delete removes archival passages.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.delete removes namespace-key Items.
structure:
  identity_keys: [delete_operation_id]
  fields:
    - id: delete_operation_id
      labels: {zh: 删除操作标识, en: Delete operation identifier, ja: 削除操作識別子}
      definitions:
        zh: 标识一次显式记录无效化活动。
        en: Identifies one explicit record-invalidation activity.
        ja: 一 explicit record invalidation activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: delete-310
      allowed_values: []
      source_claims: [claim-memory-delete-id]
    - id: consumed_record_id
      labels: {zh: 消费记录标识, en: Consumed record identifier, ja: 消費 record 識別子}
      definitions:
        zh: 本次删除读取或失效的 MemoryRecord 版本。
        en: MemoryRecord version read or invalidated by this delete.
        ja: 今回 delete が invalid 化した MemoryRecord 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-310-v2
      allowed_values: []
      source_claims: [claim-memory-delete-consumed]
    - id: tombstone_id
      labels: {zh: 墓碑标识, en: Tombstone identifier, ja: 墓碑識別子}
      definitions:
        zh: 删除成功产生的删除证据对象。
        en: Deletion-evidence object produced on successful delete.
        ja: delete 成功で生成する削除証拠。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tombstone-310
      allowed_values: []
      source_claims: [claim-memory-delete-tombstone]
  constraints: []
  required_relations: []
examples:
  - id: MemoryDelete-example-mem0
    labels:
      zh: Mem0 DELETE 删除
      en: Mem0 DELETE deletion
      ja: Mem0 DELETE 削除
    descriptions:
      zh: 用户请求遗忘后调用 DELETE /v1/memories/mem0-8f3c2a1b/；Moonweave 登记 delete-310、消费 record-310-v2 并产生 tombstone-310。
      en: After a forget request the app calls DELETE /v1/memories/mem0-8f3c2a1b/; Moonweave records delete-310, consumes record-310-v2, and produces tombstone-310.
      ja: forget 後 DELETE /v1/memories/mem0-8f3c2a1b/。delete-310・record-310-v2 消費・tombstone-310 生成。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: DELETE /v1/memories/{memory_id}/
    field_values:
      delete_operation_id: delete-310
      consumed_record_id: record-310-v2
      tombstone_id: tombstone-310
      external_memory_id: mem0-8f3c2a1b
    related_node_ids:
      - MemoryDelete
      - MemoryDispositionOperation
    related_relation_ids: []
    source_claims:
      - claim-memory-delete-mem0
      - claim-memory-delete-design
  - id: MemoryDelete-example-letta
    labels:
      zh: Letta 归档删除
      en: Letta archival deletion
      ja: Letta アーカイブ削除
    descriptions:
      zh: 智能体 archival_memory_search 定位过时 API 摘要后 archival_memory_delete 移除 passage-42。
      en: The agent locates a stale API summary via archival_memory_search then removes passage-42 with archival_memory_delete.
      ja: archival_memory_search で古い API 要約を特定し archival_memory_delete で passage-42 削除。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      version: archival_memory_delete
    field_values:
      delete_operation_id: delete-801
      consumed_record_id: record-archival-42
      tombstone_id: tombstone-archival-42
    related_node_ids:
      - MemoryDelete
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-delete-letta
      - claim-memory-delete-design
  - id: MemoryDelete-example-langgraph
    labels:
      zh: LangGraph store.delete
      en: LangGraph store.delete
      ja: LangGraph store.delete
    descriptions:
      zh: 应用对 ("tenant-7","user-42","preferences")/response-language 调用 store.delete 立即移除 Item 并登记 delete-lang-17。
      en: The app calls store.delete on ("tenant-7","user-42","preferences")/response-language, removes the Item, and records delete-lang-17.
      ja: store.delete で Item 即時削除し delete-lang-17 を登録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.delete
    field_values:
      delete_operation_id: delete-lang-17
      consumed_record_id: record-lang-17-v1
      tombstone_id: tombstone-lang-17
    related_node_ids:
      - MemoryDelete
      - MemoryStore
    related_relation_ids: []
    source_claims:
      - claim-memory-delete-langgraph
      - claim-memory-delete-design
  - id: MemoryDelete-example-not-eviction
    labels:
      zh: 删除非驱逐边界
      en: Delete is not eviction
      ja: delete は eviction ではない
    descriptions:
      zh: evict-900 因 Redis maxmemory 驱逐键但未记录用户或法律删除依据；属于 MemoryEviction 而非 MemoryDelete。
      en: evict-900 evicts a key due to Redis maxmemory without user or legal deletion basis; this is MemoryEviction, not MemoryDelete.
      ja: evict-900 は Redis maxmemory 驱逐で user/legal basis なし。MemoryEviction で MemoryDelete ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - MemoryDelete
      - MemoryEviction
    related_relation_ids: []
    source_claims:
      - claim-memory-delete-design
parent_relation:
  id: MemoryDelete-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆处置操作
    en: is a memory disposition operation
    ja: 記憶処置操作の一種
  definitions:
    zh: MemoryDelete —is_a→ MemoryDispositionOperation 表示活动基于显式删除依据使既有记录不可再用并产生 tombstone。
    en: MemoryDelete —is_a→ MemoryDispositionOperation holds because the activity invalidates an existing record under explicit deletion basis and produces a tombstone.
    ja: MemoryDelete —is_a→ MemoryDispositionOperation は explicit deletion basis で record invalid 化と tombstone 生成のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: MemoryDelete-is_a-MemoryDispositionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when explicit deletion basis, consumed record, and tombstone are recorded.
      explanations:
        zh: 仅当记录显式删除依据、消费记录与 tombstone 时建立该边。
        en: Assert only when explicit deletion basis, consumed record, and tombstone are recorded.
        ja: explicit deletion basis/consumed record/tombstone 記録時のみ assert。
      source_claims: [claim-memory-delete-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-delete-design]
  endpoint_order: child-to-parent
relations: []
