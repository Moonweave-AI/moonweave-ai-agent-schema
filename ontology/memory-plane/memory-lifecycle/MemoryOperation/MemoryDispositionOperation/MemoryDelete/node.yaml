      related_relation_ids:
        - MemoryDelete-is_a-MemoryDispositionOperation

      source_claims:
        - claim-memory-delete-basis
        - claim-memory-delete-invalidation
        - claim-memory-delete-tombstone
    - id: MemoryDelete-is_a-MemoryDispositionOperation-example-boundary-expiration

      labels:
