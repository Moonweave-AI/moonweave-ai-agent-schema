      zh: 该关系表达单次删除事实与其最小墓碑的产生关联，不对所有实现设定固定运行时基数。
      en: This relation expresses the production link between one deletion fact and its minimal tombstone and imposes no fixed runtime cardinality across implementations.
      ja: この関係は一つの削除事実とその最小墓標の生成リンクを表し、実装全体に固定ランタイム基数を課しません。
