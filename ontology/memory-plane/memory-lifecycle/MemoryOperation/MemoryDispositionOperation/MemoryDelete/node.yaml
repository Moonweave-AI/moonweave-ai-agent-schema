        zh: 将 delete-1304 归为 MemoryDelete，并记录删除依据、失效时间与最小化墓碑。
        en: Classify delete-1304 as MemoryDelete and record the deletion basis, invalidation time, and minimized tombstone.
        ja: delete-1304 を MemoryDelete に分類し、deletion basis・invalidation time・minimized tombstone を記録します。
      why_valid_or_invalid:
        zh: 明确授权的处置活动终止持久记录可用性并留下审计最小集，符合 PROV-O invalidation 与本模块删除约束。
        en: An explicitly authorized disposition ends availability of a persisted entity and leaves minimal audit data, matching PROV-O invalidation and this delete contract.
        ja: 明示 authorized disposition が persisted entity の availability を終え minimal audit data を残し、PROV-O invalidation と delete contract に合致します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
