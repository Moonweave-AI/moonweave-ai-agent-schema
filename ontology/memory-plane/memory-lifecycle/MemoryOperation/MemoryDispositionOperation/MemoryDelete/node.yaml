          en: The tombstone must accurately correspond to this deletion and minimize content; copying and renaming the original record leaves recoverable data and does not satisfy this production relation.
          ja: 墓標はこの削除に正確に対応し内容を最小化しなければなりません。元レコードをコピーして名前を変えるだけでは回復可能なデータが残り、この生成関係を満たしません。
