        en: evict-1405 removes record-1405's copy from cache-east under allkeys-lfu while the same record remains valid and reloadable in durable-store.
        ja: evict-1405 は allkeys-lfu により cache-east の record-1405 copy を除去しますが durable-store の同 record は valid で reload 可能です。
      field_values: {}
