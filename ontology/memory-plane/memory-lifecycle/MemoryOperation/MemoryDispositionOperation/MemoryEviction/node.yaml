      en: The query shows that active-tier residency ended, no tombstone exists, and the durable record remains recoverable from lower storage.
      ja: active tier 滞在は終了したが墓標はなく、永続記録を下位保存から回復できることを示します。
    why_valid_or_invalid:
      zh: 触发条件是容量与 LFU 策略，效果只是驻留变化，不是有效性终止。
      en: Capacity and LFU policy trigger the activity, whose effect is residency change rather than validity termination.
