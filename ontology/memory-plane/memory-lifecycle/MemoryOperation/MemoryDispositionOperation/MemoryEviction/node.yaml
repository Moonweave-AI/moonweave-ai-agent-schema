        en: Classify evict-1405 as MemoryEviction and record the removed active tier, capacity policy, and still-valid durable source.
        ja: evict-1405 を MemoryEviction に分類し、removed active tier・capacity policy・still-valid durable source を記録します。
      why_valid_or_invalid:
        zh: 处置改变的是特定活动层驻留而非全局有效性，符合 Redis 驱逐语义与 eviction 种差。
        en: The disposition changes residency in a named active tier rather than global validity, matching Redis eviction semantics and the eviction differentia.
        ja: named active tier の residency を変え global validity は変えないため、Redis eviction semantics と differentia に合致します。
