schema: moonweave.ai/ontology-node/v1
id: MemoryEviction
kind: concept
labels:
  zh: 记忆驱逐
  en: Memory eviction
  ja: 記憶退避
semantics:
  short_definition:
    zh: 因容量压力移除或降级存储中的记录。
    en: Removes or downgrades records under capacity pressure.
    ja: capacity 圧力で record を除去または降格。
  definition:
    zh: MemoryEviction 是 MemoryDispositionOperation：在向量库、Redis 或 archival 层达到容量上限时，按 LRU/LFU 或 volatile-ttl 策略移除或降级 MemoryRecord 可见性。与 MemoryDelete 不同，通常无用户或法律删除依据，且可能只移除热层副本。
    en: MemoryEviction is a MemoryDispositionOperation that removes or downgrades MemoryRecord visibility when vector stores, Redis, or archival tiers hit capacity limits under LRU/LFU or volatile-ttl policies. Unlike MemoryDelete, it usually lacks user or legal deletion basis and may remove only a hot-tier copy.
    ja: MemoryEviction は vector store/Redis/archival が capacity 上限に達した際 LRU/LFU/volatile-ttl で visibility を除去・降格する MemoryDispositionOperation。MemoryDelete と異なり user/legal basis が通常なく hot tier のみ除去もあり。
  why_needed:
    zh: 把容量驱逐与用户遗忘删除分开，否则 GDPR 删除证明会被 Redis maxmemory 事件混淆。
    en: Separating capacity eviction from user forget deletion prevents GDPR erasure proof from being conflated with Redis maxmemory events.
    ja: capacity eviction と user forget delete を分離しないと GDPR 削除証明が Redis maxmemory と混同。
  includes:
    - zh: 纳入 Redis maxmemory 驱逐、向量库配额回收与 archival 层降级。
      en: Includes Redis maxmemory eviction, vector quota reclamation, and archival tier downgrade.
      ja: Redis maxmemory/vector quota/archival downgrade。
  excludes:
    - zh: 排除显式用户删除、TTL 策略到期与写入前丢弃。
      en: Excludes explicit user delete, TTL policy expiry, and pre-write discard.
      ja: explicit user delete/TTL expiry/pre-write discard を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 Redis volatile-lru/volatile-ttl、Pinecone pod 配额与 Letta archival 滚动窗口；eviction_operation_id 记录 eviction_policy 与 evicted_tier，若完全不可恢复应升级为 MemoryDelete 并产生 tombstone。
    en: Map Redis volatile-lru/volatile-ttl, Pinecone pod quotas, and Letta archival rolling windows; eviction_operation_id records eviction_policy and evicted_tier; if fully unrecoverable, escalate to MemoryDelete with tombstone.
    ja: Redis volatile-lru/Pinecone quota/Letta rolling window を写像。完全不可回復なら MemoryDelete+tombstone へ。
  typical_input:
    - description: Capacity pressure event
      format: |
        {"eviction_operation_id": "evict-900", "eviction_policy": "volatile-lru", "store_backend": "redis"}
      source_claims: [claim-eviction-design]
  typical_output:
    - description: Eviction record
      format: |
        {"evicted_tier": "hot", "record_still_in_cold": true}
      source_claims: [claim-eviction-design]
  reference_implementations:
    - name: Redis Eviction Policies
      url: https://redis.io/docs/reference/eviction/
      description: maxmemory-policy volatile-lru and volatile-ttl.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: Store backends under capacity limits.
structure:
  identity_keys: [eviction_operation_id]
  fields:
    - id: eviction_operation_id
      labels: {zh: 驱逐操作标识, en: Eviction operation identifier, ja: 退避操作識別子}
      definitions:
        zh: 标识一次容量驱逐活动。
        en: Identifies one capacity eviction activity.
        ja: 一 capacity eviction activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evict-900
      allowed_values: []
      source_claims: [claim-eviction-id]
    - id: eviction_policy
      labels: {zh: 驱逐策略, en: Eviction policy, ja: 退避方針}
      definitions:
        zh: 触发驱逐的策略名，如 volatile-lru、volatile-ttl、quota-exceeded。
        en: Policy name triggering eviction, e.g., volatile-lru, volatile-ttl, quota-exceeded.
        ja: volatile-lru/volatile-ttl/quota-exceeded 等 policy 名。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: volatile-lru
      allowed_values: []
      source_claims: [claim-eviction-policy]
  constraints: []
  required_relations: []
examples:
  - id: MemoryEviction-example-redis
    labels: {zh: Redis LRU 驱逐, en: Redis LRU eviction, ja: Redis LRU 退避}
    descriptions:
      zh: evict-900 在 Redis maxmemory 触发 volatile-lru 移除热层键，cold archival 仍保留。
      en: evict-900 removes a hot-tier key via Redis maxmemory volatile-lru; cold archival remains.
      ja: Redis maxmemory volatile-lru で hot tier 除去、cold 保持。
    example_source: {product: Redis, url: https://redis.io/docs/reference/eviction/, version: volatile-lru}
    field_values: {eviction_operation_id: evict-900, eviction_policy: volatile-lru}
    related_node_ids: [MemoryEviction, MemoryDispositionOperation]
    related_relation_ids: []
    source_claims: [claim-eviction-redis, claim-eviction-design]
  - id: MemoryEviction-example-vector-quota
    labels: {zh: 向量库配额回收, en: Vector quota reclamation, ja: vector quota 回収}
    descriptions:
      zh: evict-901 因 Pinecone pod 配额超限回收最旧 namespace 向量，record 元数据仍引用 cold copy。
      en: evict-901 reclaims oldest namespace vectors when Pinecone pod quota is exceeded; record metadata still references cold copy.
      ja: Pinecone quota 超過で evict-901 が最古 vector 回収。
    example_source: {product: Pinecone, url: https://docs.pinecone.io, version: quota}
    field_values: {eviction_operation_id: evict-901, eviction_policy: quota-exceeded}
    related_node_ids: [MemoryEviction, memory-stores-scopes]
    related_relation_ids: []
    source_claims: [claim-eviction-design]
  - id: MemoryEviction-example-not-delete
    labels: {zh: 驱逐非删除, en: Eviction is not delete, ja: eviction は delete ではない}
    descriptions:
      zh: delete-310 有 user-forget-request 与 tombstone；evict-900 仅 capacity 压力无 tombstone。
      en: delete-310 has user-forget-request and tombstone; evict-900 is capacity-only without tombstone.
      ja: delete は tombstone、evict は capacity のみ。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryEviction, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-eviction-design]
  - id: MemoryEviction-example-failed
    labels: {zh: 驱逐失败审计, en: Failed eviction audit, ja: eviction 失敗監査}
    descriptions:
      zh: evict-902 status=failed 仍产生 MemoryOperationResult 记录 volatile-ttl 驱逐失败原因。
      en: evict-902 status=failed still produces MemoryOperationResult recording volatile-ttl eviction failure.
      ja: evict-902 failed でも MemoryOperationResult で失敗理由記録。
    example_source: {product: Redis, url: https://redis.io/docs/reference/eviction/, version: failure}
    field_values: {eviction_operation_id: evict-902, status: failed}
    related_node_ids: [MemoryEviction, MemoryOperationResult]
    related_relation_ids: []
    source_claims: [claim-eviction-design]
parent_relation:
  id: MemoryEviction-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆处置操作, en: is a memory disposition operation, ja: 記憶処置操作の一種}
  definitions:
    zh: MemoryEviction —is_a→ MemoryDispositionOperation 表示因容量压力移除或降级 record 可见性。
    en: MemoryEviction —is_a→ MemoryDispositionOperation holds because capacity pressure removes or downgrades record visibility.
    ja: capacity 圧力で visibility 除去・降格のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryEviction-is_a-MemoryDispositionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when eviction_policy indicates capacity pressure rather than explicit deletion basis.
      explanations:
        zh: 仅当 eviction_policy 表明容量压力而非显式删除依据时成立。
        en: Assert only when eviction_policy indicates capacity pressure rather than explicit deletion basis.
        ja: capacity 圧力 basis で explicit delete basis でない時のみ。
      source_claims: [claim-eviction-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-eviction-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-redis-eviction
    title: Redis Key Eviction
    publisher: Redis
    url: https://redis.io/docs/reference/eviction/
    source_type: official-doc
    relevance: maxmemory-policy volatile-lru and volatile-ttl.
  - id: src-eviction-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Eviction distinct from explicit delete.
source_claims:
  - id: claim-eviction-redis
    source: src-redis-eviction
    supports: Redis evicts keys under maxmemory using configured eviction policies.
    locator: Eviction policies
    evidence_kind: primary-doc
    confidence: high
  - id: claim-eviction-design
    source: src-eviction-design
    supports: MemoryEviction records capacity-driven removal without user deletion basis.
    locator: MemoryEviction boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-eviction-id
    source: src-eviction-design
    supports: eviction_operation_id identifies one eviction activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-eviction-policy
    source: src-eviction-design
    supports: eviction_policy names the capacity trigger.
    locator: structure
    evidence_kind: design-inference
    confidence: high
