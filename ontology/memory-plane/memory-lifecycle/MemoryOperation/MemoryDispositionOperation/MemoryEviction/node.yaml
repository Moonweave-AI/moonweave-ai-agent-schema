        en: "Boundary case: is a memory disposition operation"
        ja: 記憶処分操作の一種境界例
      scenario_id: MemoryEviction-is_a-MemoryDispositionOperation:boundary:20260716
      descriptions:
        zh: delete-1405 根据同意撤回使 durable-store 中唯一记录失效，所有缓存副本也不得再重载。
        en: delete-1405 invalidates the sole durable-store record after consent withdrawal, and no cache copy may reload it.
        ja: delete-1405 は consent withdrawal 後 durable-store の唯一 record を invalidation し、cache copy からの reload も禁止します。
      field_values: {}
      related_node_ids:
        - MemoryEviction
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryEviction-is_a-MemoryDispositionOperation
      expected_result:
        zh: 拒绝 MemoryEviction 分类；这是影响记录有效性的 MemoryDelete，而非活动层容量管理。
        en: Reject MemoryEviction classification; this is MemoryDelete affecting record validity, not active-tier capacity management.
        ja: MemoryEviction 分類を拒否します。これは active-tier capacity management ではなく record validity を変える MemoryDelete です。
      why_valid_or_invalid:
        zh: 当持久来源本身被撤销且不可重载时，效果已经超出驱逐；是否保留有效来源是两类活动的决定性边界。
        en: When the durable source itself is revoked and cannot be reloaded, the effect exceeds eviction; a surviving valid source is the decisive boundary.
        ja: durable source 自体が revoked され reload 不可なら eviction を超え、valid source の存続が決定的境界です。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-eviction-001
