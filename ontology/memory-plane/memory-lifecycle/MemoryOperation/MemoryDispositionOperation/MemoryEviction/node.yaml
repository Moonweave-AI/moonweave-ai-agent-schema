    en: MemoryEviction —is_a→ MemoryDispositionOperation holds because capacity or performance policy removes active-tier residency while a valid durable source may remain
    ja: MemoryEviction —is_a→ MemoryDispositionOperation は、capacity/performance policyがactive-tier residencyを除きvalid durable sourceが残り得るため成立します。
  cardinality: null
