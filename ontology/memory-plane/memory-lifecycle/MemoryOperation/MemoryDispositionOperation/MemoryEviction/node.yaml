        en: Assert only when the instance satisfies the child differentia—capacity or performance policy removes active-tier residency while a valid durable source may remain—and already meets the activity definition of MemoryDispositionOperation.
        ja: instanceがchild differentia「capacity/performance policyがactive-tier residencyを除きvalid durable sourceが残り得るため成立します。」を満たし、かつ MemoryDispositionOperation のactivity定義を満たす時だけassertします。
      source_claims:
