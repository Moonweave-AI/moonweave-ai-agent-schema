      ja: 容量方針による退去インスタンス
    scenario_id: MemoryEviction:instance:memory-op-eviction-001
    descriptions:
      zh: memory-op-eviction-001 在 active cache 达到 maxmemory 后按 allkeys-lfu 移出 record-1405，但其耐久副本和有效身份保持不变。
      en: memory-op-eviction-001 removes record-1405 from the active cache under allkeys-lfu after maxmemory is reached while its durable copy and valid identity remain intact.
      ja: memory-op-eviction-001 は maxmemory 到達後 allkeys-lfu で record-1405 を active cache から外しますが、永続コピーと有効同一性は保持します。
    field_values:
      eviction_operation_id: memory-op-eviction-001
      eviction_policy: allkeys-lfu
      operation_id: memory-op-eviction-001
      reason: the active store exceeds its capacity budget
