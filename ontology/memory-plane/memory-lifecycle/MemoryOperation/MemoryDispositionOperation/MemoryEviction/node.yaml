sources:
  - id: redis-key-eviction
    title: Redis key eviction
    source_type: official-doc
    url: https://redis.io/docs/latest/develop/reference/eviction/
    relevance: Documents maxmemory-triggered key eviction policies and distinguishes eviction policy behavior from noeviction errors.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, agents, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests used to bind auditable eviction evidence.
source_claims:
  - id: claim-memory-eviction-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities and provenance facts around it. Moonweave records eviction as an executed operation with target, tier, actor, time, result, and audit evidence rather than a threshold setting or cache miss.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-eviction-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join an eviction's target, tier, policy, trigger, evidence, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-eviction-target
    source: w3c-prov-o
    supports: PROV-O distinguishes specific entities acted upon by an activity from nearby or later-generated entities. Moonweave identifies the exact existing memory record whose active-tier copy is removed.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-eviction-policy
    source: redis-key-eviction
    supports: Redis documents maxmemory-triggered eviction and configurable LRU, LFU, LRM, random, and TTL-related policies. Moonweave records both a threshold measurement and a concrete selection policy for an actual eviction.
    locator: "Redis key eviction sections Using maxmemory and Eviction policies"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-eviction-effect
    source: redis-key-eviction
    supports: Redis describes evicting keys from a cache when memory limit is exceeded and notes that cache entries can be copies of persistently stored data. Moonweave models this case as removing named active-tier residency while a durable source remains reloadable.
    locator: "Redis key eviction overview and maxmemory behavior"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-eviction-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over target version, tier, threshold measurement, selection policy, durable source state, and execution output to bind eviction evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-eviction-boundary
    source: redis-key-eviction
    supports: Redis distinguishes automatic eviction policies from noeviction behavior and describes cache entries as potentially reloadable copies. Moonweave keeps eviction distinct from global invalidation, deletion tombstones, score decay, expiry eligibility, and unexecuted capacity plans.
    locator: "Redis key eviction overview and noeviction policy"
    evidence_kind: ontology-design-inference
    confidence: high
