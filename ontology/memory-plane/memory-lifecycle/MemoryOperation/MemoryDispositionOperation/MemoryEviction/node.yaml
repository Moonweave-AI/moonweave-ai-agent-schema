schema: moonweave.ai/ontology-node/v1
id: MemoryEviction
kind: concept
status: accepted
labels:
  zh: 记忆驱逐
  en: Memory eviction
  ja: 記憶追出し
semantics:
  short_definition:
    zh: 因容量或性能策略把记录从活动缓存或检索层移除的处置操作。
    en: A disposition operation removing a record from an active cache or retrieval tier because of capacity or performance policy.
    ja: capacity/performance policyによりrecordをactive cache/retrieval tierから除去するdisposition operationです。
  definition:
    zh: MemoryEviction 由 maxmemory、容量水位、LRU/LFU 等策略触发，改变活动层驻留状态；持久来源可能仍存在，因此驱逐不自动产生 MemoryTombstone，也不等同删除。
    en: MemoryEviction is triggered by maxmemory, capacity thresholds, LRU, LFU, or similar policies and changes active-tier residency. A durable source may remain, so eviction does not automatically produce MemoryTombstone and is not deletion.
    ja: MemoryEviction はmaxmemory・capacity threshold・LRU/LFU等でtriggerされactive-tier residencyを変えます。durable sourceが残り得るため自動でMemoryTombstoneを生成せずdeleteではありません。
  why_needed:
    zh: 严格落实缓存驱逐与持久删除的不同效果。
    en: Makes cache eviction and durable deletion strictly distinct by effect.
    ja: cache evictionとdurable deleteをeffectで厳密に区別します。
  includes:
    - zh: 纳入 LRU、LFU、随机和容量阈值触发的活动层移除。
      en: Includes active-tier removal under LRU, LFU, random, or capacity-threshold policies.
      ja: LRU・LFU・random・capacity-threshold policyによるactive-tier removalを含みます。
  excludes:
    - zh: 排除法律删除、TTL 资格变化和仅降低召回权重。
      en: Excludes legal deletion, TTL eligibility change, and merely lowering recall weight.
      ja: legal delete・TTL eligibility change・recall weight低下のみを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - eviction_operation_id
  fields:
    - id: eviction_operation_id
      labels:
        zh: 驱逐操作标识
        en: eviction operation ID
        ja: eviction operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次活动层驻留移除。
        en: Identifies one active-tier residency removal.
        ja: 一active-tier residency removalを識別します。
      allowed_values: []
      pattern: null
      example_value: evict-1405
      source_claims:
        - claim-memory-eviction-002
    - id: eviction_policy
      labels:
        zh: 驱逐策略
        en: eviction policy
        ja: 追出しpolicy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录触发驱逐的容量选择策略。
        en: Records the capacity-selection policy that triggered eviction.
        ja: evictionをtriggerしたcapacity-selection policyを記録します。
      allowed_values: []
      pattern: null
      example_value: allkeys-lfu
      source_claims:
        - claim-memory-eviction-003
  constraints: []
  required_relation_constraints: []
