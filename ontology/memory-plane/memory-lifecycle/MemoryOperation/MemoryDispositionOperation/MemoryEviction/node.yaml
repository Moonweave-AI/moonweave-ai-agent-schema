          zh: mem-op-delete-2701 使 record-2701-v2 全局失效并产生 tombstone-2701，所有层禁止重载。
          en: mem-op-delete-2701 globally invalidates record-2701-v2 and produces tombstone-2701; reload from all tiers is forbidden.
          ja: mem-op-delete-2701 は record-2701-v2 を全体失効させ tombstone-2701 を生成し、すべての層からの再読込みを禁止します。
        field_values:
          operation_id: mem-op-delete-2701
          target_record_ref: record-2701-v2
          deletion_basis: user_erasure_request
          durable_source_state: invalidated
          tombstone_ref: tombstone-2701
        related_node_ids:
