schema: moonweave.ai/ontology-node/v1
id: MemoryEviction
kind: concept
status: accepted
labels:
  zh: 记忆驱逐
  en: Memory eviction
  ja: 記憶追い出し
semantics:
  short_definition:
    zh: 因明确容量或性能策略，移除既有记忆记录在指定活动层中驻留副本的处置操作，同时不将该效果误称为记录删除。
    en: A disposition operation that removes an existing memory record's resident copy from a named active tier under an explicit capacity or performance policy without mislabeling that effect as record deletion.
    ja: 明示的な容量または性能ポリシーに従い、既存記憶レコードの指定アクティブ層常駐コピーを除去する処分操作であり、その効果をレコード削除と誤称しません。
  definition:
    zh: MemoryEviction 是一种已执行的 MemoryDispositionOperation：当命名的活动缓存、检索或热数据层达到受控容量或性能阈值时，它按已记录策略选择既有 MemoryRecord，移除该层副本并记录层、策略、触发测量、发生时间和证据。在本概念中，目标记录的耐久来源仍可用或可重新加载，记录本身未失效，也不生成删除墓碑；若全局有效性被终止，则是 MemoryDelete；若仅降低排序强度，则是 MemoryDecay；若只标记保留期限，则是 MemoryExpiration。
    en: "MemoryEviction is an executed MemoryDispositionOperation: when a named active cache, retrieval, or hot-data tier reaches a controlled capacity or performance threshold, it selects an existing MemoryRecord under a recorded policy, removes that tier's copy, and records tier, policy, triggering measurement, occurrence time, and evidence. In this concept, the target record's durable source remains usable or reloadable, the record itself is not invalidated, and no deletion tombstone is produced; global validity termination is MemoryDelete, a ranking-strength decrease only is MemoryDecay, and retention-deadline marking only is MemoryExpiration."
    ja: MemoryEviction は実行済みの MemoryDispositionOperation です。名前付きのアクティブキャッシュ、検索、またはホットデータ層が管理された容量または性能しきい値に達したとき、記録済みポリシーにより既存 MemoryRecord を選び、その層のコピーを除去し、層、ポリシー、トリガー測定、発生時刻、証跡を記録します。この概念では対象レコードの耐久ソースは使用可能または再読込み可能なままで、レコード自体は失効せず、削除墓標も生成しません。全体有効性の終了は MemoryDelete、順位強度のみの低下は MemoryDecay、保持期限の印付けだけは MemoryExpiration です。
  why_needed:
    zh: 容量管理通常只改变活动层驻留，而删除改变记录可用性；将两者混淆会导致错误的合规、恢复和事故结论。
    en: Capacity management usually changes active-tier residency while deletion changes record validity; conflating them produces incorrect compliance, recovery, and incident conclusions.
    ja: 容量管理は通常アクティブ層常駐だけを変更し、削除はレコード有効性を変更します。両者を混同すると、コンプライアンス、回復、障害に関する誤った結論を招きます。
  includes:
    - zh: 因 maxmemory、容量预算、LRU、LFU、LRM、随机选择或明确性能策略，实际移除可重新加载记录的活动缓存、检索索引或热层副本。
      en: Actual removal of a reloadable record's active-cache, retrieval-index, or hot-tier copy under maxmemory, capacity budget, LRU, LFU, LRM, random selection, or an explicit performance policy.
      ja: maxmemory、容量予算、LRU、LFU、LRM、ランダム選択、または明示的性能ポリシーにより、再読込み可能なレコードのアクティブキャッシュ、検索インデックス、ホット層コピーを実際に除去することを含みます。
  excludes:
    - zh: 用户或法律授权下使记录失效、仅改变检索强度、仅标记到期资格、拒绝写入而没有移除任何既有副本、达到阈值但 noeviction 策略仅返回错误，以及尚未执行的驱逐计划。
      en: Invalidating a record under user or legal authority, changing retrieval strength only, marking expiry eligibility only, rejecting a write without removing any existing copy, reaching a limit under noeviction and returning only an error, and an unexecuted eviction plan.
      ja: 利用者または法的許可によるレコード失効、検索強度だけの変更、期限切れ適格性の印付けだけ、既存コピーを除去せず書込みを拒否すること、noeviction で上限に達してエラーだけを返すこと、未実行の追い出し計画を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将驱逐实现为层级明确的状态转换：采集触发容量或性能测量，记录选择策略和候选，移除指定活动层副本，并验证耐久来源仍有效或可重载。不得只凭缓存未命中、低分数或“空间不足”日志推断已发生驱逐。
    en: "Implement eviction as a tier-scoped state transition: capture the triggering capacity or performance measurement, record selection policy and candidate, remove the named active-tier copy, and verify a durable source remains valid or reloadable. Do not infer eviction merely from a cache miss, a low score, or a \"space low\" log."
    ja: 追い出しは層を限定した状態遷移として実装します。トリガーとなる容量または性能測定を取得し、選択ポリシーと候補を記録し、名前付きアクティブ層コピーを除去し、耐久ソースが有効または再読込み可能であることを検証します。キャッシュミス、低スコア、「空き容量不足」ログだけから追い出しを推論してはいけません。
  typical_input:
    - description: An existing target repeated in the disposition collection, a named tier, capacity measurement, eviction policy, durable-source reference, executor identity, and actual execution start.
      format: "{operation_id, operation_kind:'disposition', target_record_ref, target_record_refs:[target_record_ref], disposition_kind:'eviction', disposition_basis:'capacity_pressure', active_tier_ref, trigger_measurement, eviction_policy, durable_source_ref, actor_ref, started_at}"
  typical_output:
    - description: A completed active-tier removal with retained durable availability, aligned disposition effect and evidence, actual eviction time, result, and audit event.
      format: "{operation_id, status:'succeeded', disposition_effect:'active_tier_removed', active_tier_ref, active_tier_residency_after:false, durable_source_state:'reloadable', eviction_evidence_digest, disposition_evidence_digest:eviction_evidence_digest, evicted_at, disposed_at:evicted_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: Redis key eviction
      url: https://redis.io/docs/latest/develop/reference/eviction/
      description: Documents maxmemory-based key eviction policies including LRU, LFU, LRM, random, and TTL-related policies.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes executed activities, entities, agents, time, and provenance facts.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 digests that can bind eviction evidence snapshots.
  source_claims:
    - claim-memory-eviction-activity
    - claim-memory-eviction-policy
    - claim-memory-eviction-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次驱逐的目标、层、策略、测量、证据、结果和审计事实。
        en: Reuses the stable MemoryOperation identity to join one eviction's target, tier, policy, measurement, evidence, result, and audit facts.
        ja: 親 MemoryOperation の安定識別子を再利用し、一つの追い出しの対象、層、ポリシー、測定、証跡、結果、監査事実を結びます。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-evict-2701
      source_claims:
        - claim-memory-eviction-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承父类执行包络并固定为 disposition，说明该事实是已执行的生命周期处置而非缓存策略配置或容量告警。
        en: Retains the parent execution envelope and is fixed to disposition, so this fact is an executed lifecycle disposition rather than cache-policy configuration or a capacity alert.
        ja: 親の実行包絡を継承して disposition に固定する。これはキャッシュ方針設定や容量アラートではなく、実行済みのライフサイクル処置である。
      allowed_values: [disposition]
      pattern: null
      example_value: disposition
      source_claims: [claim-memory-eviction-activity]
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的工作单元状态，区分已经移除活动层副本的执行与仅检测到容量压力的未执行计划。
        en: The inherited work-unit state, distinguishing an execution that removed an active-tier copy from a plan that merely observed capacity pressure.
        ja: 作業単位の状態を継承する。アクティブ層の複製を除去した実行と、容量圧力を観測しただけの未実行計画を区別する。
      allowed_values: [running, succeeded, failed, partially_succeeded, rejected, cancelled]
      pattern: null
      example_value: succeeded
      source_claims: [claim-memory-eviction-activity]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的驱逐执行开始时间，不得用 maxmemory 配置时间、阈值预测时间或缓存未命中时间替代。
        en: The inherited eviction-execution start time; maxmemory configuration, threshold prediction, and cache-miss time cannot substitute for it.
        ja: 追い出し実行の開始時刻を継承する。maxmemory の設定時刻、閾値予測時刻、キャッシュミス時刻で代用してはならない。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:30:00Z"
      source_claims: [claim-memory-eviction-activity]
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的实际执行者；缓存所有者、监控告警发出者或策略作者不是执行证据。
        en: The inherited actual executor; a cache owner, monitoring-alert sender, or policy author is not execution evidence.
        ja: 実際の実行者を継承する。キャッシュ所有者、監視アラート送信者、方針作成者は実行証拠ではない。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: retrieval-tier-manager-1
      source_claims: [claim-memory-eviction-activity]
    - id: target_record_refs
      labels:
        zh: 目标记录引用集合
        en: target record references
        ja: 対象レコード参照集合
      datatype: string
      required: true
      cardinality: { min: 1, max: null }
      definitions:
        zh: 继承的处置目标集合；本节点单条驱逐将 target_record_ref 作为其中唯一被移除活动层副本的既有记录，不能以未命中键或候选评分替代。
        en: The inherited disposition-target collection. This single eviction puts target_record_ref in it as the only existing record whose active-tier copy was removed; a missed key or candidate score cannot substitute.
        ja: 処置対象集合を継承する。この単一追い出しでは target_record_ref を、アクティブ層複製が除去された唯一の既存レコードとして含める。ミスしたキーや候補スコアで代用してはならない。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value: [record-2701-v2]
      source_claims: [claim-memory-eviction-target]
    - id: disposition_kind
      labels:
        zh: 处置种类
        en: disposition kind
        ja: 処置種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 将继承的处置种类收窄为 eviction，明确效果是层级驻留终止而不是记录失效。
        en: Narrows the inherited disposition kind to eviction, making the effect tier-residency termination rather than record invalidation.
        ja: 継承した処置種別を eviction に限定し、効果がレコード無効化ではなく層内常駐の終了であることを明示する。
      allowed_values: [eviction]
      pattern: null
      example_value: eviction
      source_claims: [claim-memory-eviction-boundary]
    - id: disposition_basis
      labels:
        zh: 处置依据类别
        en: disposition basis
        ja: 処置根拠種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 固定为 capacity_pressure；它由可审计 trigger_measurement 和 eviction_policy 支持，不能由事后“低价值”标签臆断。
        en: Fixed to capacity_pressure and supported by auditable trigger_measurement and eviction_policy; it cannot be inferred from a retrospective “low value” label.
        ja: capacity_pressure に固定する。監査可能な trigger_measurement と eviction_policy で裏付け、事後的な「低価値」ラベルから推定してはならない。
      allowed_values: [capacity_pressure]
      pattern: null
      example_value: capacity_pressure
      source_claims: [claim-memory-eviction-policy]
    - id: disposition_effect
      labels:
        zh: 处置效果
        en: disposition effect
        ja: 処置効果
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 固定为 active_tier_removed；它表示命名层副本被移除，同时 durable_source_ref 仍可使用或重载。
        en: Fixed to active_tier_removed, meaning the named-tier copy was removed while durable_source_ref remains usable or reloadable.
        ja: active_tier_removed に固定する。名前付き層の複製を除去し、durable_source_ref は引き続き利用または再読み込み可能である。
      allowed_values: [active_tier_removed]
      pattern: null
      example_value: active_tier_removed
      source_claims: [claim-memory-eviction-effect]
    - id: disposition_evidence_digest
      labels:
        zh: 处置证据摘要
        en: disposition evidence digest
        ja: 処置証拠ダイジェスト
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的处置证据摘要；此处必须与 eviction_evidence_digest 相同，绑定层、阈值测量、选择策略、耐久来源和实际移除结果。
        en: The inherited disposition-evidence digest. Here it must equal eviction_evidence_digest and bind tier, threshold measurement, selection policy, durable source, and actual removal outcome.
        ja: 処置証拠ダイジェストを継承する。ここでは eviction_evidence_digest と同一でなければならず、層、閾値測定、選択方針、永続ソース、実際の除去結果を結び付ける。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:35f8b2fbd6f7b3ce0b1f6f8e8d4ad7a3b1e74391ec3d75f97fbbf1c4e1d027ca
      source_claims: [claim-memory-eviction-evidence]
    - id: disposed_at
      labels:
        zh: 处置生效时间
        en: disposed at
        ja: 処置発生時刻
      datatype: date-time
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的处置生效时间；驱逐中必须等于 evicted_at，表示该副本实际离开命名层的时刻。
        en: The inherited disposition-effective time. For eviction it must equal evicted_at, the time the copy actually left the named tier.
        ja: 処置の有効時刻を継承する。追い出しでは evicted_at と一致し、複製が名前付き層から実際に離れた時刻を示す。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:30:00.064Z"
      source_claims: [claim-memory-eviction-activity]
    - id: target_record_ref
      labels:
        zh: 目标记录引用
        en: target record reference
        ja: 対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用活动层副本实际被移除的既有 MemoryRecord；相同命名空间、相似向量、相同主体或共享追踪不能替代精确目标身份。
        en: References the existing MemoryRecord whose active-tier copy is actually removed; the same namespace, similar vector, same actor, or shared trace cannot substitute for exact target identity.
        ja: アクティブ層コピーが実際に除去される既存 MemoryRecord を参照します。同じ名前空間、類似ベクトル、同じ主体、共有トレースでは正確な対象識別を代替できません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-2701-v2
      source_claims:
        - claim-memory-eviction-target
    - id: active_tier_ref
      labels:
        zh: 活动层引用
        en: active tier reference
        ja: アクティブ層参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识被移除副本所在的命名缓存、检索索引或热数据层，使活动层未命中不会被误读成所有存储层缺失。
        en: Identifies the named cache, retrieval index, or hot-data tier from which the copy is removed so an active-tier miss is not misread as absence from every storage tier.
        ja: コピーが除去される名前付きキャッシュ、検索インデックス、またはホットデータ層を識別し、アクティブ層ミスをすべての保存層からの不在と誤読しないようにします。
      allowed_values: []
      pattern: '^tier-[A-Za-z0-9._-]+$'
      example_value: tier-retrieval-cache-east
      source_claims:
        - claim-memory-eviction-effect
    - id: eviction_policy
      labels:
        zh: 驱逐策略
        en: eviction policy
        ja: 追い出しポリシー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录从该层选择移除目标的明确策略，而不是将某个记录事后称为“低价值”。
        en: Records the explicit policy that selected a target for removal from this tier rather than retroactively calling a record "low value".
        ja: レコードを後から「低価値」と呼ぶのではなく、この層からの除去対象を選択した明示的ポリシーを記録します。
      allowed_values:
        - lru
        - lfu
        - lrm
        - random
        - ttl_priority
        - explicit_capacity_priority
      pattern: null
      example_value: lfu
      source_claims:
        - claim-memory-eviction-policy
    - id: trigger_measurement
      labels:
        zh: 触发测量
        en: trigger measurement
        ja: トリガー測定
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际超过或达到受控阈值的可审计容量或性能测量，而不是含糊的“空间不足”描述。
        en: Records an auditable capacity or performance measurement that actually reached or exceeded a controlled threshold rather than a vague "space low" description.
        ja: 曖昧な「空き容量不足」の説明ではなく、管理されたしきい値に実際に達したまたは超えた監査可能な容量または性能測定を記録します。
      allowed_values: []
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:@/=-]*$'
      example_value: used_memory_bytes=104857600>maxmemory_bytes=104857599
      source_claims:
        - claim-memory-eviction-policy
    - id: durable_source_ref
      labels:
        zh: 耐久来源引用
        en: durable source reference
        ja: 耐久ソース参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向仍保存或可重新加载该记录的耐久来源，使这次活动被限定为活动层驻留变化而非全局删除。
        en: Points to a durable source that still stores or can reload the record, constraining this activity to active-tier residency change rather than global deletion.
        ja: レコードを依然として保存または再読込みできる耐久ソースを指し、この活動を全体削除ではなくアクティブ層常駐変更に限定します。
      allowed_values: []
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:@/-]*$'
      example_value: store-durable-east/records/record-2701-v2
      source_claims:
        - claim-memory-eviction-boundary
    - id: eviction_evidence_digest
      labels:
        zh: 驱逐证据摘要
        en: eviction evidence digest
        ja: 追い出し証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定目标版本、层、触发测量、策略选择、耐久来源状态和执行输出摘要，以便审计确实发生的活动层移除。
        en: Fixes a digest of target version, tier, triggering measurement, policy selection, durable-source state, and execution output to audit an actual active-tier removal.
        ja: 対象バージョン、層、トリガー測定、ポリシー選択、耐久ソース状態、実行出力のダイジェストを固定し、実際のアクティブ層除去を監査できるようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:35f8b2fbd6f7b3ce0b1f6f8e8d4ad7a3b1e74391ec3d75f97fbbf1c4e1d027ca
      source_claims:
        - claim-memory-eviction-evidence
    - id: evicted_at
      labels:
        zh: 驱逐发生时间
        en: evicted at
        ja: 追い出し発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该层副本实际不再驻留的事件时间，而不是阈值配置、预估或日志摄取时间。
        en: Records the event time at which the copy actually ceased to reside in the tier, not threshold configuration, prediction, or log-ingestion time.
        ja: コピーが実際に層に常駐しなくなったイベント時刻を記録します。しきい値設定、予測、ログ取込み時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:30:00.064Z"
      source_claims:
        - claim-memory-eviction-activity
  constraints:
    - id: MemoryEviction-parent-disposition-contract
      expression: "operation_kind = disposition, disposition_kind = eviction, disposition_basis = capacity_pressure, disposition_effect = active_tier_removed, target_record_refs contains exactly target_record_ref, disposition_evidence_digest = eviction_evidence_digest, and disposed_at = evicted_at."
      explanation:
        zh: 驱逐保留父类的活动、目标、依据、效果、证据和发生时间合同，但用活动层副本移除来具体化这些事实；它不能借父类名称掩盖删除或到期的不同效果。
        en: Eviction retains the parent contract for activity, target, basis, effect, evidence, and occurrence time, but specializes those facts to active-tier copy removal; the parent name cannot conceal deletion or expiry effects.
        ja: 追い出しは親の活動、対象、根拠、効果、証拠、発生時刻の契約を保持し、アクティブ層複製の除去として具体化する。親の名称で削除や期限切れの異なる効果を隠してはならない。
      source_claims:
        - claim-memory-eviction-activity
        - claim-memory-eviction-policy
        - claim-memory-eviction-effect
        - claim-memory-eviction-evidence
    - id: MemoryEviction-capacity-policy-and-measurement
      expression: "trigger_measurement demonstrates that active_tier_ref reached or exceeded its controlled capacity or performance threshold, and eviction_policy identifies the selection method applied to target_record_ref."
      explanation:
        zh: 容量或性能压力与选择策略必须都有可审计记录，否则不能区分实际驱逐、普通缓存未命中和随意删除。
        en: Both capacity or performance pressure and selection policy need auditable records; otherwise actual eviction cannot be distinguished from an ordinary cache miss or arbitrary deletion.
        ja: 容量または性能圧力と選択ポリシーの両方に監査可能な記録が必要です。なければ実際の追い出しを通常のキャッシュミスや恣意的削除から区別できません。
      source_claims:
        - claim-memory-eviction-policy
    - id: MemoryEviction-tier-residency-and-durable-boundary
      expression: "The target's copy was resident in active_tier_ref before evicted_at and is absent from that tier after evicted_at, while durable_source_ref remains usable or reloadable and the target record remains valid."
      explanation:
        zh: 驱逐的效果范围是指定活动层；耐久来源和记录有效性保留这一条件防止将驱逐误写为删除。
        en: Eviction's effect scope is the named active tier; retaining durable source and record validity prevents eviction from being mislabeled as deletion.
        ja: 追い出しの効果範囲は名前付きアクティブ層です。耐久ソースとレコード有効性を保持する条件により、追い出しを削除と誤称することを防ぎます。
      source_claims:
        - claim-memory-eviction-effect
        - claim-memory-eviction-boundary
    - id: MemoryEviction-evidence-and-time-consistency
      expression: "evicted_at is on or after started_at, a terminal parent operation has ended_at on or after evicted_at, and eviction_evidence_digest covers target, tier, measurement, policy, durable source, and output."
      explanation:
        zh: 驱逐必须是已经发生且可验证的层驻留变化，不能被计划、阈值设置或事后解释替代。
        en: Eviction must be an occurred and verifiable tier-residency change and cannot be substituted by a plan, threshold setting, or retrospective explanation.
        ja: 追い出しはすでに起きて検証可能な層常駐変更でなければならず、計画、しきい値設定、事後説明では代替できません。
      source_claims:
        - claim-memory-eviction-activity
        - claim-memory-eviction-evidence
    - id: MemoryEviction-nondelete-nondecay-boundary
      expression: "Eviction does not create a deletion tombstone, invalidate the record, or merely reduce retrieval strength; those effects belong to MemoryDelete or MemoryDecay and must be recorded as separate operations."
      explanation:
        zh: 同一工作流可包含驱逐、删除或衰减，但各自具有不同的目标效果和审计责任，不能由一个名称覆盖。
        en: One workflow can contain eviction, deletion, or decay, but each has a different target effect and audit responsibility and cannot be covered by one name.
        ja: 一つのワークフローには追い出し、削除、減衰を含められますが、それぞれ対象効果と監査責任が異なり、一つの名称で覆えません。
      source_claims:
        - claim-memory-eviction-boundary
  required_relation_constraints: []
