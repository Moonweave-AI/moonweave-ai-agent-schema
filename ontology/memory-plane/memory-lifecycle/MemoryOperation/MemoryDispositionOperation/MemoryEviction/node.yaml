parent_relation:
  id: MemoryEviction-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆处置操作
    en: is a memory disposition operation
    ja: 記憶処分操作の一種である
  definitions:
    zh: MemoryEviction —is_a→ MemoryDispositionOperation 表示一次有据可查的容量或性能活动改变了既有有效记录在指定活动层中的驻留，而未使记录失效。
    en: MemoryEviction —is_a→ MemoryDispositionOperation means a documented capacity or performance activity changes an existing valid record's residency in a named active tier without invalidating the record.
    ja: MemoryEviction —is_a→ MemoryDispositionOperation は、記録された容量または性能活動が既存有効レコードの名前付きアクティブ層常駐を変更し、レコードを失効させないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次驱逐活动可处理的记录批次数。
    en: The classification relation expresses type membership and does not limit how many record batches one eviction activity may process.
    ja: 分類関係は型メンバーシップを表し、一つの追い出し活動が処理できるレコードバッチ数を制限しません。
  inverse_reading:
    predicate: has_eviction_subtype
    labels:
      zh: 具有驱逐子类
      en: has eviction subtype
      ja: 追い出しサブタイプを持つ
  conditions:
    - id: MemoryEviction-is_a-MemoryDispositionOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when an executed disposition removes an existing record's copy from a named active tier under a documented capacity or performance policy while retaining a usable or reloadable durable source and record validity."
      explanation:
        zh: 处置父类身份不足以证明驱逐；必须有指定层、真实触发与选择规则、实际移除以及保持的耐久来源和有效性。
        en: Disposition-parent identity alone does not prove eviction; named tier, real trigger and selection rule, actual removal, and retained durable source and validity are all required.
        ja: 処分親の識別だけでは追い出しを証明できません。名前付き層、実際のトリガーと選択規則、実際の除去、保持された耐久ソースと有効性のすべてが必要です。
      source_claims:
        - claim-memory-eviction-policy
        - claim-memory-eviction-effect
        - claim-memory-eviction-boundary
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryEviction-is_a-MemoryDispositionOperation-example-positive

      labels:
        zh: 缓存层移除属于处置
        en: Cache-tier removal is disposition
        ja: キャッシュ層除去は処分である

      descriptions:
        zh: mem-op-evict-2701 以 LFU 规则从 tier-retrieval-cache-east 移除 record-2701-v2 的副本，同时保留耐久回退。
        en: mem-op-evict-2701 removes the copy of record-2701-v2 from tier-retrieval-cache-east under LFU and retains durable fallback.
        ja: mem-op-evict-2701 は LFU で tier-retrieval-cache-east から record-2701-v2 のコピーを除去し、耐久フォールバックを保持します。
      field_values:
        operation_id: mem-op-evict-2701
        target_record_ref: record-2701-v2
        active_tier_ref: tier-retrieval-cache-east
        eviction_policy: lfu
        durable_source_ref: store-durable-east/records/record-2701-v2
        active_tier_residency_after: false
      related_node_ids:
        - MemoryEviction
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryEviction-is_a-MemoryDispositionOperation

      source_claims:
        - claim-memory-eviction-policy
        - claim-memory-eviction-boundary
    - id: MemoryEviction-is_a-MemoryDispositionOperation-example-boundary-noeviction

      labels:
        zh: 阈值拒绝不是驱逐子类
        en: Threshold rejection is not the eviction subtype
        ja: しきい値拒否は追い出しサブタイプではない

      descriptions:
        zh: write-rejected-2702 因 noeviction 被拒绝，既有活动层副本没有被移除。
        en: write-rejected-2702 is rejected under noeviction and no existing active-tier copy is removed.
        ja: write-rejected-2702 は noeviction で拒否され、既存アクティブ層コピーは除去されません。
      field_values:
        request_id: write-rejected-2702
        configured_policy: noeviction
        existing_copy_removed: false
        operation_id: absent
        evicted_at: absent
      related_node_ids:
        - MemoryEviction
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryEviction-is_a-MemoryDispositionOperation

      source_claims:
        - claim-memory-eviction-activity
  source_claims:
    - claim-memory-eviction-activity
    - claim-memory-eviction-policy
    - claim-memory-eviction-effect
    - claim-memory-eviction-boundary
  distinct_fact_rationale:
    zh: 此主干关系只表达活动层驻留移除且保留耐久来源的处置属于 MemoryDispositionOperation；目标、层、策略、触发测量、证据、有效性、结果和审计由字段或独立关系表达。
    en: This backbone relation only expresses that tier-residency removal with retained durable source belongs to MemoryDispositionOperation; target, tier, policy, trigger measurement, evidence, validity, result, and audit use fields or separate relations.
    ja: この主幹関係は、耐久ソースを保持する層常駐除去が MemoryDispositionOperation に属することだけを表します。対象、層、ポリシー、トリガー測定、証跡、有効性、結果、監査はフィールドまたは別関係で表します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MemoryEviction-evicts-MemoryRecord
    predicate: evicts
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 从活动层驱逐记忆记录
      en: evicts memory record from active tier
      ja: アクティブ層から記憶レコードを追い出す
    definitions:
      zh: MemoryEviction —evicts→ MemoryRecord 表示一次已执行驱逐从指定活动层移除该记录副本，同时保留该记录的耐久可用性。
      en: MemoryEviction —evicts→ MemoryRecord means one executed eviction removes the record copy from a named active tier while retaining durable availability of the record.
      ja: MemoryEviction —evicts→ MemoryRecord は、一つの実行済み追い出しが名前付きアクティブ層からレコードコピーを除去しつつ、レコードの耐久的可用性を保持することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达每个驱逐事实对具体记录副本的层驻留效果，不对所有实现设定固定运行时基数。
      en: This relation expresses each eviction fact's tier-residency effect on a concrete record copy and imposes no fixed runtime cardinality across implementations.
      ja: この関係は各追い出し事実の具体レコードコピーに対する層常駐効果を表し、実装全体に固定ランタイム基数を課しません。
    inverse_reading:
      predicate: is_evicted_from_active_tier_by
      labels:
        zh: 被从活动层驱逐
        en: is evicted from active tier by
        ja: アクティブ層から追い出される
    conditions:
      - id: MemoryEviction-evicts-MemoryRecord-tier-target-and-fallback
        severity: error
        expression_language: plain
        expression: "Assert only when the relation target matches target_record_ref, the copy is absent from active_tier_ref after evicted_at, trigger_measurement and eviction_policy justify selection, durable_source_ref remains usable or reloadable, and eviction_evidence_digest covers the fact."
        explanation:
          zh: 驱逐关系必须指向实际目标并记录实际层移除、选择原因与耐久回退；不能把任何缓存未命中或全局失效写成该关系。
          en: The eviction relation must target the actual record and record actual tier removal, selection reason, and durable fallback; neither an arbitrary cache miss nor global invalidation can be written as this relation.
          ja: 追い出し関係は実際の対象を指し、実際の層除去、選択理由、耐久フォールバックを記録しなければなりません。恣意的なキャッシュミスや全体失効をこの関係として書けません。
        source_claims:
          - claim-memory-eviction-policy
          - claim-memory-eviction-effect
          - claim-memory-eviction-evidence
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryEviction-evicts-MemoryRecord-example-positive

        labels:
          zh: 从指定缓存层驱逐记录
          en: Evicting record from named cache tier
          ja: 名前付きキャッシュ層からのレコード追い出し

        descriptions:
          zh: mem-op-evict-2701 以 LFU 从 tier-retrieval-cache-east 移除 record-2701-v2 的副本，且 durable_source_ref 仍能重载该记录。
          en: mem-op-evict-2701 removes the copy of record-2701-v2 from tier-retrieval-cache-east under LFU, and durable_source_ref can still reload the record.
          ja: mem-op-evict-2701 は LFU により tier-retrieval-cache-east から record-2701-v2 のコピーを除去し、durable_source_ref は引き続きレコードを再読込みできます。
        field_values:
          operation_id: mem-op-evict-2701
          target_record_ref: record-2701-v2
          active_tier_ref: tier-retrieval-cache-east
          eviction_policy: lfu
          active_tier_residency_after: false
          durable_source_state: reloadable
        related_node_ids:
          - MemoryEviction
          - MemoryRecord
        related_relation_ids:
          - MemoryEviction-evicts-MemoryRecord

