schema: moonweave.ai/ontology-node/v1
id: MemoryDispositionOperation
kind: concept
labels:
  zh: 记忆处置操作
  en: Memory disposition operation
  ja: 記憶処置操作
semantics:
  short_definition:
    zh: 降低、移除或到期清理既有记忆的活动。
    en: Activity lowering, removing, or expiring existing memory.
    ja: 既存記憶を減重・削除・期限処理する activity。
  definition:
    zh: MemoryDispositionOperation 是 MemoryOperation 子类，作用于已有 MemoryRecord：包括 MemoryDelete、MemoryDecay、MemoryEviction 与 MemoryExpiration。Mem0 DELETE /v1/memories/{id}、LangGraph store.delete/TTL 与 Generative Agents recency 衰减均映射到其子类，而非准入或修订。
    en: MemoryDispositionOperation is a MemoryOperation subtype acting on existing MemoryRecords, including MemoryDelete, MemoryDecay, MemoryEviction, and MemoryExpiration. Mem0 DELETE /v1/memories/{id}, LangGraph store.delete/TTL, and Generative Agents recency decay map to its subtypes rather than admission or revision.
    ja: MemoryDispositionOperation は既存 MemoryRecord に作用する MemoryOperation subtype。MemoryDelete/Decay/Eviction/Expiration を含む。Mem0 DELETE、LangGraph delete/TTL、Generative Agents recency は subtype へ写像。
  why_needed:
    zh: 删除、衰减、驱逐与到期若共用“清理”动词，合规与容量治理无法分别审计。
    en: If delete, decay, eviction, and expiry share a vague cleanup verb, compliance and capacity governance cannot be audited separately.
    ja: delete/decay/eviction/expiry が曖昧「清理」共有すると compliance/capacity 監査不能。
  includes:
    - zh: 纳入显式删除、recency 衰减、容量驱逐与 TTL 到期处置。
      en: Includes explicit delete, recency decay, capacity eviction, and TTL expiry disposition.
      ja: explicit delete/recency decay/capacity eviction/TTL expiry disposition。
  excludes:
    - zh: 排除候选项准入、版本修订与冲突解决。
      en: Excludes candidate admission, version revision, and conflict resolution.
      ja: candidate admission/version revision/conflict resolution を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 DELETE、Letta archival_memory_delete、LangGraph store.delete 映射 MemoryDelete；Generative Agents recency 映射 MemoryDecay；Redis maxmemory 映射 MemoryEviction；LangGraph TTL 映射 MemoryExpiration。
    en: Mem0 DELETE, Letta archival_memory_delete, and LangGraph store.delete map to MemoryDelete; Generative Agents recency maps to MemoryDecay; Redis maxmemory maps to MemoryEviction; LangGraph TTL maps to MemoryExpiration.
    ja: Mem0 DELETE/Letta delete/LangGraph delete→MemoryDelete。recency→MemoryDecay。maxmemory→MemoryEviction。TTL→MemoryExpiration。
  typical_input:
    - description: Disposition target record
      format: |
        {"disposition_operation_id": "delete-310", "target_record_id": "record-310-v2"}
      source_claims: [claim-disposition-design]
  typical_output:
    - description: Disposition outcome
      format: |
        {"operation_type": "MemoryDelete", "tombstone_id": "tombstone-310"}
      source_claims: [claim-disposition-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: DELETE /v1/memories/{id}/ for explicit deletion.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.delete and TTL expiry.
    - name: Generative Agents
      url: https://arxiv.org/abs/2304.03442
      description: Recency decay reweighting at retrieval.
structure:
  identity_keys: [disposition_operation_id]
  fields:
    - id: disposition_operation_id
      labels: {zh: 处置操作标识, en: Disposition operation identifier, ja: 処置操作識別子}
      definitions:
        zh: 标识一次记忆处置活动。
        en: Identifies one memory disposition activity.
        ja: 一 memory disposition activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: delete-310
      allowed_values: []
      source_claims: [claim-disposition-id]
    - id: target_record_id
      labels: {zh: 目标记录标识, en: Target record identifier, ja: 対象 record 識別子}
      definitions:
        zh: 本次处置针对的 MemoryRecord 版本。
        en: MemoryRecord version targeted by this disposition.
        ja: 今回 disposition の対象 MemoryRecord 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-310-v2
      allowed_values: []
      source_claims: [claim-disposition-target]
  constraints: []
  required_relations: []
examples:
  - id: MemoryDispositionOperation-example-delete
    labels: {zh: 显式删除处置, en: Explicit delete disposition, ja: 明示 delete 処置}
    descriptions:
      zh: delete-310 作为 MemoryDelete 处置 record-310-v2 并产生 tombstone。
      en: delete-310 disposes record-310-v2 as MemoryDelete and produces a tombstone.
      ja: delete-310 が MemoryDelete で record-310-v2 を処置。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: "DELETE /v1/memories/{id}/"}
    field_values: {disposition_operation_id: delete-310, target_record_id: record-310-v2}
    related_node_ids: [MemoryDispositionOperation, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-disposition-mem0, claim-disposition-design]
  - id: MemoryDispositionOperation-example-decay
    labels: {zh: 新近度衰减, en: Recency decay, ja: recency 減衰}
    descriptions:
      zh: decay-48 作为 MemoryDecay 重加权 record-510 检索分数。
      en: decay-48 reweights retrieval score of record-510 as MemoryDecay.
      ja: decay-48 が MemoryDecay で record-510 を再重み。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: recency}
    field_values: {disposition_operation_id: decay-48}
    related_node_ids: [MemoryDispositionOperation, MemoryDecay]
    related_relation_ids: []
    source_claims: [claim-disposition-ga, claim-disposition-design]
  - id: MemoryDispositionOperation-example-expiration
    labels: {zh: TTL 到期, en: TTL expiration, ja: TTL 期限}
    descriptions:
      zh: expire-86400 在 LangGraph TTL 到期后登记 MemoryExpiration。
      en: expire-86400 records MemoryExpiration after LangGraph TTL expiry.
      ja: LangGraph TTL 後 expire-86400 が MemoryExpiration。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/reference/store/, version: TTLConfig}
    field_values: {disposition_operation_id: expire-86400, ttl_seconds: 86400}
    related_node_ids: [MemoryDispositionOperation, MemoryExpiration]
    related_relation_ids: []
    source_claims: [claim-disposition-langgraph, claim-disposition-design]
  - id: MemoryDispositionOperation-example-not-admission
    labels: {zh: 处置非准入, en: Disposition is not admission, ja: 処置は admission ではない}
    descriptions:
      zh: discard-89 拒绝未持久候选项；disposition 只处理已有 record。
      en: discard-89 rejects an unpersisted candidate; disposition handles existing records only.
      ja: discard は未 persist 候補。disposition は既存 record のみ。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryDispositionOperation, MemoryAdmissionOperation]
    related_relation_ids: []
    source_claims: [claim-disposition-design]
parent_relation:
  id: MemoryDispositionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆操作, en: is a memory operation, ja: 記憶操作の一種}
  definitions:
    zh: MemoryDispositionOperation —is_a→ MemoryOperation 表示活动对既有记录执行删除、衰减、驱逐或到期处置。
    en: MemoryDispositionOperation —is_a→ MemoryOperation holds because the activity deletes, decays, evicts, or expires existing records.
    ja: 既存 record の delete/decay/evict/expire を行う activity のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryDispositionOperation-is_a-MemoryOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the activity targets an existing MemoryRecord for disposition.
      explanations:
        zh: 仅当活动针对既有 MemoryRecord 执行处置时成立。
        en: Assert only when the activity targets an existing MemoryRecord for disposition.
        ja: 既存 MemoryRecord を disposition 対象とする時のみ。
      source_claims: [claim-disposition-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-disposition-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-disposition
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: DELETE /v1/memories/{id}/.
  - id: src-langgraph-disposition
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: delete and TTL expiry.
  - id: src-ga-disposition
    title: Generative Agents
    publisher: arXiv
    url: https://arxiv.org/abs/2304.03442
    source_type: arXiv
    relevance: Recency decay disposition.
  - id: src-disposition-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Disposition distinct from admission and revision.
source_claims:
  - id: claim-disposition-mem0
    source: src-mem0-disposition
    supports: Mem0 DELETE removes existing memories by id.
    locator: DELETE /v1/memories/{id}/
    evidence_kind: primary-api
    confidence: high
  - id: claim-disposition-langgraph
    source: src-langgraph-disposition
    supports: LangGraph store.delete and TTL trigger disposition of existing Items.
    locator: BaseStore.delete, TTLConfig
    evidence_kind: primary-api
    confidence: high
  - id: claim-disposition-ga
    source: src-ga-disposition
    supports: Generative Agents recency decay lowers weight of existing observations.
    locator: Section 3.1
    evidence_kind: academic
    confidence: high
  - id: claim-disposition-design
    source: src-disposition-design
    supports: Disposition operations act on existing records, not unpersisted candidates.
    locator: MemoryDispositionOperation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disposition-id
    source: src-disposition-design
    supports: disposition_operation_id identifies one disposition activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-disposition-target
    source: src-disposition-design
    supports: target_record_id references the disposed MemoryRecord version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
