sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines executed activities, entities, agents, time, and provenance associations as distinct facts.
  - id: redis-expire
    title: Redis EXPIRE command
    source_type: official-doc
    url: https://redis.io/docs/latest/commands/expire/
    relevance: Documents time-based expiry as an explicit lifecycle action with observable effects.
  - id: nist-sp-800-88r1
    title: NIST SP 800-88 Rev. 1 Guidelines for Media Sanitization
    source_type: standard
    url: https://csrc.nist.gov/pubs/sp/800/88/r1/final
    relevance: Separates controlled sanitization decisions and evidence from ordinary data availability changes.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests used to bind disposition evidence snapshots.
source_claims:
  - id: claim-memory-disposition-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from the entities it uses or changes in provenance records. Moonweave records disposition as an executed operation with target, actor, time, result, and audit evidence rather than a policy or future schedule.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-disposition-operation-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and provenance facts to have stable independent identities. Moonweave reuses one operation ID to join one disposition's targets, state effect, result, and audit evidence.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-disposition-operation-target
    source: w3c-prov-o
    supports: PROV-O distinguishes existing entities used by an activity from entities that are generated later. Moonweave disposes existing memory records and does not treat a candidate or future output as a disposed record.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-disposition-operation-kind
    source: redis-expire
    supports: Redis documents expiry as an explicit time-based lifecycle action. Moonweave uses separate explicit kinds for expiration, decay, eviction, and deletion so different state effects are not silently merged.
    locator: "Redis EXPIRE command behavior and key expiry semantics"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-disposition-operation-basis
    source: nist-sp-800-88r1
    supports: NIST SP 800-88 describes sanitization as a controlled decision with defined methods and verification. Moonweave records the concrete controlled basis for a completed disposition instead of an unauditable cleanup label.
    locator: "NIST SP 800-88 Rev. 1 media sanitization decision and verification guidance"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-disposition-operation-effect
    source: nist-sp-800-88r1
    supports: NIST SP 800-88 separates sanitization outcomes from merely changing access or storage conditions. Moonweave records an explicit applied effect and does not equate active-tier eviction or expiry marking with deletion.
    locator: "NIST SP 800-88 Rev. 1 sanitization outcome and verification guidance"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-disposition-operation-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over target version, basis, state transition, and execution output to preserve disposition evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-disposition-operation-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes activities from the entities and descriptions surrounding them. Moonweave keeps disposition separate from policy definition, assessment conclusion, and content revision even when those facts are causally related.
    locator: "PROV-O Activity, Entity, and provenance association model"
    evidence_kind: ontology-design-inference
    confidence: high
