    en: is a memory operation
    ja: 記憶操作の一種である
  definitions:
    zh: MemoryDispositionOperation —is_a→ MemoryOperation 表示一个已执行的记忆活动对既有记录施加了有依据、可证实的生命周期状态效果。
    en: MemoryDispositionOperation —is_a→ MemoryOperation means an executed memory activity applies a grounded and evidential lifecycle-state effect to an existing record.
    ja: MemoryDispositionOperation —is_a→ MemoryOperation は、実行済みの記憶活動が既存レコードに根拠と証跡を伴うライフサイクル状態効果を適用することを表します。
  cardinality: null
