    zh: 分类关系表达类型成员资格，不限制一次处置操作可处理的目标记录数。
    en: The classification relation expresses type membership and does not limit the number of target records one disposition operation can handle.
    ja: 分類関係は型メンバーシップを表し、一つの処分操作が扱える対象レコード数を制限しません。
  inverse_reading:
