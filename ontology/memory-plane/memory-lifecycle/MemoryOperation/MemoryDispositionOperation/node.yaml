schema: moonweave.ai/ontology-node/v1
id: MemoryDispositionOperation
kind: concept
status: accepted
labels:
  zh: 记忆处置操作
  en: Memory disposition operation
  ja: 記憶処分操作
semantics:
  short_definition:
    zh: 改变既有记录的可用性、强度或保留状态的操作。
    en: An operation changing an existing record's availability, strength, or retention state.
    ja: 既存recordのavailability・strength・retention stateを変えるoperationです。
  definition:
    zh: MemoryDispositionOperation 以既有 MemoryRecord 为对象，因时间、容量、显式删除依据或重要性变化而改变其生命周期状态；Decay、Delete、Eviction 与 Expiration 按触发原因和效果分开。
    en: MemoryDispositionOperation acts on an existing MemoryRecord and changes its lifecycle state because of time, capacity, an explicit deletion basis, or changing importance. Decay, Delete, Eviction, and Expiration remain distinct by trigger and effect.
    ja: MemoryDispositionOperation は既存 MemoryRecordを対象にtime・capacity・explicit deletion basis・importance変化でlifecycle stateを変えます。Decay・Delete・Eviction・Expirationはtrigger/effectで区別します。
  why_needed:
    zh: 防止把所有“不可用”都误写成删除。
    en: Prevents every form of unavailability from being mislabeled as deletion.
    ja: あらゆるunavailabilityをdeleteと誤記することを防ぎます。
  includes:
    - zh: 纳入衰减、删除、活动层驱逐和到期资格变化。
      en: Includes decay, deletion, active-tier eviction, and expiration eligibility change.
      ja: decay・delete・active-tier eviction・expiration eligibility changeを含みます。
  excludes:
    - zh: 排除候选丢弃、内容更新和仅检查状态的验证。
      en: Excludes candidate discard, content revision, and validation that only checks state.
      ja: candidate discard・content revision・state checkのみのvalidationを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - disposition_operation_id
  fields:
    - id: disposition_operation_id
      labels:
        zh: 处置操作标识
        en: disposition operation ID
        ja: disposition operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次记录生命周期处置活动。
        en: Identifies one record-lifecycle disposition activity.
        ja: 一record-lifecycle disposition activityを識別します。
      allowed_values: []
      pattern: null
      example_value: dispose-1101
      source_claims:
        - claim-memory-disposition-operation-002
    - id: target_record_id
      labels:
        zh: 目标记录标识
        en: target record ID
        ja: target record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识被改变可用性或保留状态的记录。
        en: Identifies the record whose availability or retention state changes.
        ja: availability/retention stateが変わるrecordを識別します。
      allowed_values: []
      pattern: null
      example_value: record-1101
      source_claims:
        - claim-memory-disposition-operation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryDispositionOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆处置操作正例
      en: "Positive case: Memory disposition operation"
      ja: 記憶処分操作正例
    scenario_id: null
    descriptions:
      zh: dispose-1101 因 TTL 到点把 record-1101 标为待过期清理。
      en: dispose-1101 marks record-1101 pending expiry cleanup when its TTL is reached.
      ja: dispose-1101 はTTL到達時record-1101をexpiry cleanup待ちにします。
    field_values:
      disposition_operation_id: dispose-1101
      target_record_id: record-1101
      operation_id: dispose-1101
      started_at: 2026-07-16T14:00:00Z
    related_node_ids:
      - MemoryDispositionOperation
      - MemoryOperation
    related_relation_ids:
      - MemoryDispositionOperation-is_a-MemoryOperation
    expected_result:
      zh: 归类为 MemoryDispositionOperation，并进一步归 MemoryExpiration。
      en: Classify as MemoryDispositionOperation and further as MemoryExpiration.
      ja: MemoryDispositionOperation、さらにMemoryExpirationへ分類します。
    why_valid_or_invalid:
      zh: 活动针对既有记录改变保留资格，触发依据明确。
      en: The activity changes retention eligibility of an existing record with an explicit trigger.
      ja: 既存recordのretention eligibilityを明示triggerで変えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-disposition-operation-001
  - id: MemoryDispositionOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆处置操作边界例
      en: "Boundary case: Memory disposition operation"
      ja: 記憶処分操作境界例
    scenario_id: null
    descriptions:
      zh: write-1101 把新候选项首次持久化。
      en: write-1101 persists a new candidate for the first time.
      ja: write-1101 はnew candidateを初めてpersistします。
    field_values: {}
    related_node_ids:
      - MemoryDispositionOperation
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryDispositionOperation。
      en: Do not classify as MemoryDispositionOperation.
      ja: MemoryDispositionOperationに分類しません。
    why_valid_or_invalid:
      zh: 这是准入，不是对既有记录的处置。
      en: This is admission, not disposition of an existing record.
      ja: これはadmissionで既存recordのdispositionではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-disposition-operation-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MemoryResolutionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 正向身份比较：父节点 MemoryOperation：MemoryDispositionOperation（semantic kind=activity，骨架 MemoryDispositionOperation-is_a-MemoryOperation）；MemoryResolutionOperation（semantic kind=activity，骨架 MemoryResolutionOperation-is_a-MemoryOperation）。双端条件：MemoryDispositionOperation 条件：“改变既有记录的可用性、强度或保留状态的操作”；MemoryResolutionOperation 条件：“消费已识别问题状态并作出可审计解决决定的操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryOperation: MemoryDispositionOperation (semantic kind=activity, backbone MemoryDispositionOperation-is_a-MemoryOperation); MemoryResolutionOperation (semantic kind=activity, backbone MemoryResolutionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryDispositionOperation condition: “An operation changing an existing record's availability, strength, or retention state”; MemoryResolutionOperation condition: “An operation consuming an identified problem state and making an auditable resolution decision”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryOperation：MemoryDispositionOperation（semantic kind=activity、バックボーン MemoryDispositionOperation-is_a-MemoryOperation）；MemoryResolutionOperation（semantic kind=activity、バックボーン MemoryResolutionOperation-is_a-MemoryOperation）。両端条件：MemoryDispositionOperation の条件：「既存recordのavailability・strength・retention stateを変えるoperationです」；MemoryResolutionOperation の条件：「識別済problem stateを消費しaudit可能resolution decisionを行うoperationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-disposition-operation-004
  - sibling_concept_id: MemoryRevisionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 已审查兄弟区分：父节点 MemoryOperation：MemoryDispositionOperation（semantic kind=activity，骨架 MemoryDispositionOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity，骨架 MemoryRevisionOperation-is_a-MemoryOperation）。双端条件：MemoryDispositionOperation 条件：“改变既有记录的可用性、强度或保留状态的操作”；MemoryRevisionOperation 条件：“以一个或多个既有记录为输入并产生新记录版本的操作”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent MemoryOperation: MemoryDispositionOperation (semantic kind=activity, backbone MemoryDispositionOperation-is_a-MemoryOperation); MemoryRevisionOperation (semantic kind=activity, backbone MemoryRevisionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryDispositionOperation condition: “An operation changing an existing record's availability, strength, or retention state”; MemoryRevisionOperation condition: “An operation taking one or more existing records as input and producing a new record version”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 MemoryOperation：MemoryDispositionOperation（semantic kind=activity、バックボーン MemoryDispositionOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity、バックボーン MemoryRevisionOperation-is_a-MemoryOperation）。両端条件：MemoryDispositionOperation の条件：「既存recordのavailability・strength・retention stateを変えるoperationです」；MemoryRevisionOperation の条件：「一つ以上の既存recordをinputに新版recordを生成するoperationです」。一方の成立は他方を証明しません。
    source_claims:
      - claim-memory-disposition-operation-005
parent_relation:
  id: MemoryDispositionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆操作
    en: is a memory operation
    ja: 記憶操作の一種
  definitions:
