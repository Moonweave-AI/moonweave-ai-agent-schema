  - id: claim-memory-disposition-operation-004
    source: eng-ont-prov-o
    supports: PROV-O can record both an Activity that invalidates an existing Entity and an Activity that uses one Entity to generate another. Moonweave maps these trace shapes to disposition and resolution respectively, while the memory-specific purposes and their sibling placement remain Moonweave design decisions.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-disposition-operation-005
    source: eng-ont-prov-o
    supports: PROV-O distinguishes invalidation of an existing Entity from generation of a new Entity by an Activity. Moonweave uses that distinction to separate MemoryDispositionOperation from successor-producing MemoryRevisionOperation; PROV-O supplies provenance relations, not the memory lifecycle taxonomy.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
