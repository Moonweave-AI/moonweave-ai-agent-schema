    en: MemoryDispositionOperation —is_a→ MemoryOperation holds because the object is an existing MemoryRecord whose strength, active-tier residency, expiry eligibility, or validity changes
    ja: MemoryDispositionOperation —is_a→ MemoryOperation は、対象が既存MemoryRecordでstrength・active-tier residency・expiry eligibility・validityを変えるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is a memory operation
      ja: 逆方向読取
  conditions:
    - id: MemoryDispositionOperation-is_a-MemoryOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the object is an existing MemoryRecord whose strength, active-tier residency, expiry eligibility, or validity changes—and already meets the activity definition of MemoryOperation.
      explanations:
        zh: 仅当实例满足子类种差“对象是既有 MemoryRecord，活动改变其强度、活动层驻留、到期资格或有效性。”且已满足 MemoryOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the object is an existing MemoryRecord whose strength, active-tier residency, expiry eligibility, or validity changes—and already meets the activity definition of MemoryOperation.
        ja: instanceがchild differentia「対象が既存MemoryRecordでstrength・active-tier residency・expiry eligibility・validityを変えるため成立します。」を満たし、かつ MemoryOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-disposition-operation-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryDispositionOperation-is_a-MemoryOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆操作正例
        en: "Positive case: is a memory operation"
        ja: 記憶操作の一種正例
      scenario_id: MemoryDispositionOperation-is_a-MemoryOperation:positive:20260716
      descriptions:
        zh: dispose-1101 对已存在的 record-1101 应用保留策略，把它从 active 状态改为 expired-pending-delete 并记录生效时间。
        en: dispose-1101 applies a retention policy to existing record-1101, changing it from active to expired-pending-delete and recording the effective time.
        ja: dispose-1101 は既存 record-1101 に retention policy を適用し active から expired-pending-delete へ変え effective time を記録します。
      field_values: {}
      related_node_ids:
        - MemoryDispositionOperation
        - MemoryOperation
      related_relation_ids:
        - MemoryDispositionOperation-is_a-MemoryOperation
      expected_result:
        zh: 将 dispose-1101 归入 MemoryDispositionOperation，因为它改变现有记录的可用性状态而非内容版本。
        en: Classify dispose-1101 as MemoryDispositionOperation because it changes an existing record's usability state rather than its content version.
        ja: dispose-1101 を MemoryDispositionOperation に分類します。既存 record の content version ではなく usability state を変えるためです。
      why_valid_or_invalid:
        zh: 活动对象是持久化记录，效果落在强度、驻留、资格或有效性之一，符合处置操作相对准入和修订的边界。
        en: The object is persisted and the effect concerns strength, residency, eligibility, or validity, which defines disposition against admission and revision.
        ja: object は永続済みで effect は strength・residency・eligibility・validity に関わり、admission/revision と区別されます。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-disposition-operation-001
    - id: MemoryDispositionOperation-is_a-MemoryOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆操作边界例
        en: "Boundary case: is a memory operation"
        ja: 記憶操作の一種境界例
      scenario_id: MemoryDispositionOperation-is_a-MemoryOperation:boundary:20260716
      descriptions:
        zh: discard-1101 在任何记录创建前拒绝候选 item-1101，既没有现有 record_id，也没有改变记录状态。
        en: discard-1101 rejects candidate item-1101 before any record is created; it has no existing record_id and changes no record state.
        ja: discard-1101 は record 作成前に候補 item-1101 を拒否し、existing record_id も record state change もありません。
      field_values: {}
      related_node_ids:
        - MemoryDispositionOperation
        - MemoryOperation
      related_relation_ids:
        - MemoryDispositionOperation-is_a-MemoryOperation
      expected_result:
        zh: 拒绝将 discard-1101 归为 MemoryDispositionOperation；它属于 MemoryAdmissionOperation 下的 MemoryDiscard。
        en: Reject MemoryDispositionOperation membership for discard-1101; it belongs to MemoryDiscard under admission.
        ja: discard-1101 の MemoryDispositionOperation 所属を拒否し、admission 配下の MemoryDiscard とします。
      why_valid_or_invalid:
        zh: 没有已存在记录就不存在可处置的强度、驻留、资格或有效性，候选拒绝必须留在准入阶段。
        en: Without an existing record there is no strength, residency, eligibility, or validity to dispose; candidate rejection stays in admission.
        ja: existing record がなければ disposition 対象の strength・residency・eligibility・validity はなく、candidate rejection は admission に残ります。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-disposition-operation-001
