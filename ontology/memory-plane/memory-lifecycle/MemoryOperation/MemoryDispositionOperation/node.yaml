schema: moonweave.ai/ontology-node/v1
id: MemoryDispositionOperation
kind: concept
status: accepted
labels:
  zh: 记忆处置操作
  en: Memory disposition operation
  ja: 記憶処分操作
semantics:
  short_definition:
    zh: 对既有记忆记录执行可审计状态处置，以改变其强度、活动层驻留、有效性或保留资格的操作。
    en: An auditable operation that disposes of existing memory records by changing their strength, active-tier residency, validity, or retention eligibility.
    ja: 既存の記憶レコードに対し、強度、アクティブ層への常駐、有効性、または保持適格性を変更する監査可能な処分操作です。
  definition:
    zh: MemoryDispositionOperation 是一种针对已存在 MemoryRecord 的已执行 MemoryOperation。它依据明确的衰减规则、容量压力、保留期限或删除依据，记录一次已发生的状态转变及其证据。它包括降低检索强度、移出活动层、使记录失效和标记为到期不合格；它不创建新内容版本，不仅仅评估风险或冲突，也不把尚未执行的未来清理计划当作处置。
    en: MemoryDispositionOperation is an executed MemoryOperation over an already existing MemoryRecord. It records one completed state transition and its evidence under an explicit decay rule, capacity pressure, retention deadline, or deletion basis. It includes reducing retrieval strength, removing active-tier residency, invalidating a record, and marking it retention-ineligible; it neither creates a new content version nor merely assesses a risk or conflict, and it does not treat an unexecuted future cleanup plan as disposition.
    ja: MemoryDispositionOperation は、すでに存在する MemoryRecord に対する実行済みの MemoryOperation です。明示的な減衰規則、容量圧力、保持期限、または削除根拠に従って、一つの完了した状態遷移とその証跡を記録します。検索強度の低下、アクティブ層常駐の除去、レコードの無効化、保持不適格への印付けを含みますが、新しい内容バージョンを作らず、リスクや競合を評価するだけでもなく、未実行の将来清掃計画を処分として扱いません。
  why_needed:
    zh: “不再可用”可能是强度降低、缓存驱逐、保留到期或删除，各自的触发器、可恢复性和责任后果不同；统一归为删除会破坏审计与合规判断。
    en: A record becoming unavailable can mean strength reduction, cache eviction, retention expiry, or deletion, each with different triggers, recoverability, and accountability consequences; calling all of them deletion corrupts audit and compliance reasoning.
    ja: レコードが利用不可になることは、強度低下、キャッシュ追い出し、保持期限切れ、削除のいずれかであり、トリガー、回復可能性、説明責任が異なります。すべてを削除と呼ぶと、監査とコンプライアンスの判断を壊します。
  includes:
    - zh: 已执行的记忆强度衰减、容量或性能导致的活动层驱逐、基于保留规则的到期不合格，以及由明确依据触发的记录无效化或删除。
      en: Executed memory-strength decay, capacity- or performance-driven active-tier eviction, retention-rule expiry ineligibility, and record invalidation or deletion under an explicit basis.
      ja: 実行済みの記憶強度減衰、容量または性能によるアクティブ層追い出し、保持規則に基づく期限切れ不適格化、明示的根拠によるレコード無効化または削除を含みます。
  excludes:
    - zh: 首次写入候选项、仅形成检查结论、创建后继内容版本、选择冲突赢家、策略或保留计划定义，以及尚未发生的定时清理任务。
      en: First admission of a candidate, an operation that only forms a check conclusion, creation of a successor content version, selection of a conflict winner, policy or retention-plan definition, and a scheduled cleanup task that has not occurred.
      ja: 候補の初回受入、検査結論だけを形成する操作、後継内容バージョンの作成、競合勝者の選択、ポリシーまたは保持計画の定義、まだ発生していないスケジュール済み清掃タスクを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将处置实现为对已存在记录的不可缺省状态转换工作单元：保存触发依据、前后效果、证据摘要与发生时间。按效果分别建模衰减、驱逐、到期和删除，不能仅以“记录不可见”推断某一种处置。
    en: "Implement disposition as a non-optional state-transition work unit over an existing record: retain its trigger basis, before-and-after effect, evidence digest, and occurrence time. Model decay, eviction, expiration, and deletion separately by effect; do not infer one kind merely because a record is no longer visible."
    ja: 処分は既存レコードに対する省略不可の状態遷移作業単位として実装し、トリガー根拠、前後の効果、証跡ダイジェスト、発生時刻を保持します。減衰、追い出し、期限切れ、削除は効果ごとに別々にモデル化し、レコードが見えなくなっただけで一種類の処分を推測してはいけません。
  typical_input:
    - description: An existing record reference, explicit disposition kind and basis, prior state evidence, executor identity, and operation start time.
      format: "{operation_id, target_record_refs, disposition_kind, disposition_basis, prior_state_digest, actor_ref, started_at}"
  typical_output:
    - description: A completed state-transition fact with effect, evidence digest, disposal time, result, and audit event.
      format: "{operation_id, disposition_effect, disposition_evidence_digest, disposed_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: Redis EXPIRE command
      url: https://redis.io/docs/latest/commands/expire/
      description: Documents time-based key expiry as a distinct lifecycle action.
    - name: NIST SP 800-88 Rev. 1
      url: https://csrc.nist.gov/pubs/sp/800/88/r1/final
      description: Describes media sanitization decisions and evidence as distinct from ordinary availability changes.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes executed activities, entities, agents, and provenance facts.
  source_claims:
    - claim-memory-disposition-operation-activity
    - claim-memory-disposition-operation-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次处置的目标、依据、效果、结果和审计证据。
        en: Reuses the stable MemoryOperation identity to join one disposition's targets, basis, effect, result, and audit evidence.
        ja: 親 MemoryOperation の安定識別子を再利用し、一つの処分の対象、根拠、効果、結果、監査証跡を結びます。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-expire-2401
      source_claims:
        - claim-memory-disposition-operation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 disposition，表明该活动改变既有记忆的可用性、驻留状态或有效性，而不是生成修订记录。
        en: Narrows the parent operation kind to disposition and records an executed change to an existing record's eligibility, residency, or validity.
        ja: 親の操作種別を disposition に限定し、既存レコードの利用可否、常駐状態、または有効性を実行済みで変更する活動であることを記録します。
      allowed_values:
        - disposition
      pattern: null
      example_value: disposition
      source_claims:
        - claim-memory-disposition-operation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录处置活动的执行状态；它不同于被处置记录后续是否可检索。
        en: Records the execution state of the disposition activity, which is distinct from whether the target remains retrievable afterward.
        ja: 処置活動の実行状態を記録し、対象が後で検索可能かどうかとは区別します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-disposition-operation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录执行者实际开始应用处置规则或请求的时间，不以策略发布时间或截止时间替代。
        en: Records when the executor actually began applying the disposition rule or request, not policy publication or a deadline.
        ja: 実行者が処置規則または要求を実際に適用し始めた時刻を記録し、ポリシー公開時刻や期限で代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:00:00Z"
      source_claims:
        - claim-memory-disposition-operation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行此次处置的主体，不将策略作者或记录所有者误记为执行者。
        en: References the actor that executes this disposition and does not confuse it with a policy author or record owner.
        ja: この処置を実行する主体を参照し、ポリシー作成者やレコード所有者と取り違えません。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: retention-enforcer-2
      source_claims:
        - claim-memory-disposition-operation-activity
    - id: target_record_refs
      labels:
        zh: 目标记录引用
        en: target record references
        ja: 対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次处置实际改变的既有 MemoryRecord；候选输入、规划中的输出或仅共享追踪上下文的记录不能替代。
        en: Lists existing MemoryRecord instances actually changed by this disposition; candidate input, planned output, or a record merely sharing trace context cannot substitute.
        ja: この処分が実際に変更する既存 MemoryRecord を列挙します。候補入力、計画中の出力、追跡文脈を共有するだけのレコードでは代替できません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-2401-v1
      source_claims:
        - claim-memory-disposition-operation-target
    - id: disposition_kind
      labels:
        zh: 处置种类
        en: disposition kind
        ja: 処分種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明本次活动的不同处置机制，以避免将驱逐、到期、衰减或删除仅因表面不可用而混为一谈。
        en: States the distinct disposition mechanism so eviction, expiration, decay, and deletion are not conflated merely because of apparent unavailability.
        ja: 見かけの利用不可だけを理由に追い出し、期限切れ、減衰、削除を混同しないよう、この活動の異なる処分機構を示します。
      allowed_values:
        - decay
        - eviction
        - expiration
        - delete
      pattern: null
      example_value: expiration
      source_claims:
        - claim-memory-disposition-operation-kind
    - id: disposition_basis
      labels:
        zh: 处置依据
        en: disposition basis
        ja: 処分根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录触发本次已执行处置的明确原因或受控规则，而不是只写“系统清理”之类无法审计的概述。
        en: Records the explicit reason or controlled rule that triggered this completed disposition rather than an unauditable summary such as "system cleanup".
        ja: 「システム清掃」のような監査不能な要約ではなく、この完了済み処分を起動した明示的理由または管理された規則を記録します。
      allowed_values:
        - decay_policy
        - capacity_pressure
        - retention_policy
        - explicit_deletion_request
        - legal_or_security_requirement
      pattern: null
      example_value: retention_policy
      source_claims:
        - claim-memory-disposition-operation-basis
    - id: disposition_effect
      labels:
        zh: 处置效果
        en: disposition effect
        ja: 処分効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录落在目标记录上的具体状态变化；它描述发生的效果，而不是拟议动作、策略名称或泛化的成功状态。
        en: Records the concrete state change applied to the target record; it describes the effect that occurred, not a proposed action, policy name, or generic success status.
        ja: 対象レコードに適用された具体的状態変更を記録します。提案された行為、ポリシー名、一般的な成功状態ではなく、実際に起きた効果を表します。
      allowed_values:
        - strength_reduced
        - active_tier_removed
        - retention_ineligible
        - invalidated
      pattern: null
      example_value: retention_ineligible
      source_claims:
        - claim-memory-disposition-operation-effect
    - id: disposition_evidence_digest
      labels:
        zh: 处置证据摘要
        en: disposition evidence digest
        ja: 処分証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定处置时使用的目标版本、触发依据、前后状态和执行输出摘要，使以后能够验证该状态变化而不重写历史事实。
        en: Fixes a digest of the target version, trigger basis, before-and-after state, and execution output used for disposition so the transition can later be verified without rewriting historical fact.
        ja: 処分で用いた対象バージョン、トリガー根拠、前後状態、実行出力のダイジェストを固定し、履歴事実を書き換えずに遷移を後から検証できるようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:ba0d7be3e62274472d62f8af287a0444c968a3c2fd1c64c433a0bb7ddae09b44
      source_claims:
        - claim-memory-disposition-operation-evidence
    - id: disposed_at
      labels:
        zh: 处置发生时间
        en: disposed at
        ja: 処分発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录状态转变实际生效的事件时间，不能以策略创建时间、计划时间或日志摄取时间替代。
        en: Records the event time at which the state transition actually took effect; policy creation, scheduled, or log-ingestion time cannot substitute.
        ja: 状態遷移が実際に有効になったイベント時刻を記録します。ポリシー作成時刻、予定時刻、ログ取込時刻では代替できません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:00:00.144Z"
      source_claims:
        - claim-memory-disposition-operation-activity
  constraints:
    - id: MemoryDispositionOperation-parent-operation-envelope
      expression: "operation_kind = disposition and status, started_at, and actor_ref identify one executed disposition activity."
      explanation:
        zh: 策略、截止时间或缓存压力本身不是处置；必须保留执行活动的类别、状态、开始时间和责任主体。
        en: A policy, deadline, or cache-pressure reading is not itself a disposition; the executed activity must retain its kind, status, time, and responsible actor.
        ja: ポリシー、期限、キャッシュ圧力の値そのものは処置ではなく、実行済み活動の種別、状態、開始時刻、責任主体を保持する必要があります。
      source_claims:
        - claim-memory-disposition-operation-activity
    - id: MemoryDispositionOperation-existing-target-boundary
      expression: "Every target_record_refs value identifies a MemoryRecord that existed before disposed_at and whose relevant prior state is covered by disposition_evidence_digest; a candidate item or future successor record cannot be disposed."
      explanation:
        zh: 处置作用于既有事实；若目标尚未写入或只是将来输出，就没有可被衰减、驱逐、到期或无效化的记录状态。
        en: Disposition acts on an existing fact; if the target has not been written or is only a future output, there is no record state to decay, evict, expire, or invalidate.
        ja: 処分は既存の事実に作用します。対象がまだ書き込まれていない、または将来出力にすぎない場合、減衰、追い出し、期限切れ、無効化できるレコード状態はありません。
      source_claims:
        - claim-memory-disposition-operation-target
        - claim-memory-disposition-operation-evidence
    - id: MemoryDispositionOperation-kind-basis-effect-consistency
      expression: "decay requires disposition_basis=decay_policy and disposition_effect=strength_reduced; eviction requires capacity_pressure and active_tier_removed; expiration requires retention_policy and retention_ineligible; delete requires explicit_deletion_request or legal_or_security_requirement and invalidated."
      explanation:
        zh: 处置的名称、触发依据和实际效果必须相互支持；例如缓存驱逐不应伪装为删除，到期标记也不应被记录为物理清除。
        en: Disposition name, triggering basis, and actual effect must support one another; for example, cache eviction must not masquerade as deletion, and an expiry mark must not be recorded as physical clearing.
        ja: 処分名、起動根拠、実際の効果は互いに裏付けなければなりません。たとえばキャッシュ追い出しを削除と偽装してはならず、期限切れ印付けを物理消去として記録してもなりません。
      source_claims:
        - claim-memory-disposition-operation-kind
        - claim-memory-disposition-operation-basis
        - claim-memory-disposition-operation-effect
    - id: MemoryDispositionOperation-executed-not-planned
      expression: "disposed_at is on or after started_at and a terminal parent operation has ended_at on or after disposed_at; a future schedule or policy definition without an applied effect does not satisfy this concept."
      explanation:
        zh: 处置描述已经发生的活动，不是未来可能发生的生命周期意图；时间和效果证据共同区分执行事实与计划。
        en: Disposition describes an activity that has happened, not a lifecycle intention that might happen later; time and effect evidence together distinguish execution fact from plan.
        ja: 処分はすでに起きた活動を表し、将来起きるかもしれないライフサイクル意図ではありません。時刻と効果の証拠が、実行事実と計画を区別します。
      source_claims:
        - claim-memory-disposition-operation-activity
    - id: MemoryDispositionOperation-nonrevision-nonassessment-boundary
      expression: "The operation changes availability, strength, validity, or retention eligibility without creating a successor content version or merely reporting a conclusion; revision and assessment must remain separate operations even when they supply evidence for disposition."
      explanation:
        zh: 修订改变内容版本，评估形成结论；二者都可能成为处置依据，但不应吞并已经实际改变记录状态的处置活动。
        en: Revision changes a content version and assessment forms a conclusion; either can supply disposition evidence, but neither should absorb the activity that actually changes record state.
        ja: 改訂は内容バージョンを変更し、評価は結論を形成します。どちらも処分証跡を提供し得ますが、実際にレコード状態を変更する活動を吸収してはいけません。
      source_claims:
        - claim-memory-disposition-operation-boundary
  required_relation_constraints: []
examples:
  - id: MemoryDispositionOperation-example-positive-expiration

    labels:
      zh: 保留到期处置
      en: Retention-expiry disposition
      ja: 保持期限切れ処分

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-expire-2401
      operation_kind: disposition
      status: succeeded
      started_at: "2026-07-18T21:00:00Z"
      ended_at: "2026-07-18T21:00:00.180Z"
      actor_ref: retention-worker-1
      target_record_refs:
        - record-2401-v1
      disposition_kind: expiration
      disposition_basis: retention_policy
      disposition_effect: retention_ineligible
      disposition_evidence_digest: sha256:ba0d7be3e62274472d62f8af287a0444c968a3c2fd1c64c433a0bb7ddae09b44
      disposed_at: "2026-07-18T21:00:00.144Z"
    related_node_ids:
      - MemoryDispositionOperation
      - MemoryOperation
      - MemoryExpiration
      - MemoryRecord
      - MemoryRetentionPolicy
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryDispositionOperation-is_a-MemoryOperation
      - MemoryExpiration-is_a-MemoryDispositionOperation
      - MemoryOperation-acts_on-MemoryRecord
      - MemoryExpiration-governed_by-MemoryRetentionPolicy
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-disposition-operation-activity
      - claim-memory-disposition-operation-kind
      - claim-memory-disposition-operation-evidence
  - id: MemoryDispositionOperation-example-counterexample-revision

    labels:
      zh: 修订内容不是处置
      en: Revising content is not disposition
      ja: 内容改訂は処分ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-revise-2401
      operation_kind: revision
      status: succeeded
      started_at: "2026-07-18T21:10:00Z"
      target_record_refs:
        - record-2401-v1
      output_record_ref: record-2401-v2
      changed_field: consent_scope
      disposition_effect: absent
