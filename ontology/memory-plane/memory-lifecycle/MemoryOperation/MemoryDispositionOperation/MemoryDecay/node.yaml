sibling_differentiation:
  - sibling_concept_id: MemoryDelete
    shared_parent_concept_id: MemoryDispositionOperation
    differentia:
      zh: 端点特定对照：父节点 MemoryDispositionOperation：MemoryDecay（semantic kind=activity，骨架 MemoryDecay-is_a-MemoryDispositionOperation）；MemoryDelete（semantic kind=activity，骨架 MemoryDelete-is_a-MemoryDispositionOperation）。双端条件：MemoryDecay 条件：“降低记录的强度、相关性权重或召回优先级而不立即移除它的处置操作”；MemoryDelete 条件：“基于显式用户、法律、策略或无效化依据撤销既有记录的处置操作”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent MemoryDispositionOperation: MemoryDecay (semantic kind=activity, backbone MemoryDecay-is_a-MemoryDispositionOperation); MemoryDelete (semantic kind=activity, backbone MemoryDelete-is_a-MemoryDispositionOperation). Endpoint conditions: MemoryDecay condition: “A disposition operation lowering a record's strength, relevance weight, or recall priority without immediately removing it”; MemoryDelete condition: “A disposition operation invalidating an existing record under an explicit user, legal, policy, or invalidation basis”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 MemoryDispositionOperation：MemoryDecay（semantic kind=activity、バックボーン MemoryDecay-is_a-MemoryDispositionOperation）；MemoryDelete（semantic kind=activity、バックボーン MemoryDelete-is_a-MemoryDispositionOperation）。両端条件：MemoryDecay の条件：「recordのstrength・relevance weight・recall priorityを下げ即時除去しないdisposition operationです」；MemoryDelete の条件：「explicit user・legal・policy・invalidation basisにより既存recordを無効化するdisposition operationです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-memory-decay-004
      - claim-memory-decay-005
  - sibling_concept_id: MemoryEviction
    shared_parent_concept_id: MemoryDispositionOperation
    differentia:
      zh: 端点特定对照：父节点 MemoryDispositionOperation：MemoryDecay（semantic kind=activity，骨架 MemoryDecay-is_a-MemoryDispositionOperation）；MemoryEviction（semantic kind=activity，骨架 MemoryEviction-is_a-MemoryDispositionOperation）。双端条件：MemoryDecay 条件：“降低记录的强度、相关性权重或召回优先级而不立即移除它的处置操作”；MemoryEviction 条件：“因容量或性能策略把记录从活动缓存或检索层移除的处置操作”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent MemoryDispositionOperation: MemoryDecay (semantic kind=activity, backbone MemoryDecay-is_a-MemoryDispositionOperation); MemoryEviction (semantic kind=activity, backbone MemoryEviction-is_a-MemoryDispositionOperation). Endpoint conditions: MemoryDecay condition: “A disposition operation lowering a record's strength, relevance weight, or recall priority without immediately removing it”; MemoryEviction condition: “A disposition operation removing a record from an active cache or retrieval tier because of capacity or performance policy”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 MemoryDispositionOperation：MemoryDecay（semantic kind=activity、バックボーン MemoryDecay-is_a-MemoryDispositionOperation）；MemoryEviction（semantic kind=activity、バックボーン MemoryEviction-is_a-MemoryDispositionOperation）。両端条件：MemoryDecay の条件：「recordのstrength・relevance weight・recall priorityを下げ即時除去しないdisposition operationです」；MemoryEviction の条件：「capacity/performance policyによりrecordをactive cache/retrieval tierから除去するdisposition operationです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-memory-decay-006
      - claim-memory-decay-007
  - sibling_concept_id: MemoryExpiration
    shared_parent_concept_id: MemoryDispositionOperation
    differentia:
      zh: 端点特定对照：父节点 MemoryDispositionOperation：MemoryDecay（semantic kind=activity，骨架 MemoryDecay-is_a-MemoryDispositionOperation）；MemoryExpiration（semantic kind=activity，骨架 MemoryExpiration-is_a-MemoryDispositionOperation）。双端条件：MemoryDecay 条件：“降低记录的强度、相关性权重或召回优先级而不立即移除它的处置操作”；MemoryExpiration 条件：“记录达到时间、同意或作用域期限并改变保留资格的处置操作”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent MemoryDispositionOperation: MemoryDecay (semantic kind=activity, backbone MemoryDecay-is_a-MemoryDispositionOperation); MemoryExpiration (semantic kind=activity, backbone MemoryExpiration-is_a-MemoryDispositionOperation). Endpoint conditions: MemoryDecay condition: “A disposition operation lowering a record's strength, relevance weight, or recall priority without immediately removing it”; MemoryExpiration condition: “A disposition operation marking that a record has reached a time, consent, or scope deadline and changing retention eligibility”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 MemoryDispositionOperation：MemoryDecay（semantic kind=activity、バックボーン MemoryDecay-is_a-MemoryDispositionOperation）；MemoryExpiration（semantic kind=activity、バックボーン MemoryExpiration-is_a-MemoryDispositionOperation）。両端条件：MemoryDecay の条件：「recordのstrength・relevance weight・recall priorityを下げ即時除去しないdisposition operationです」；MemoryExpiration の条件：「recordがtime・consent・scope deadlineへ達しretention eligibilityを変えるdisposition operationです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-memory-decay-008
      - claim-memory-decay-009
