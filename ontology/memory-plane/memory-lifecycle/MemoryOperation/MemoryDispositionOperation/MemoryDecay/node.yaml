      related_relation_ids:
        - MemoryDecay-is_a-MemoryDispositionOperation

      source_claims:
        - claim-memory-decay-strength
        - claim-memory-decay-boundary
    - id: MemoryDecay-is_a-MemoryDispositionOperation-example-boundary-eviction

      labels:
        zh: 活动层移除不是衰减子类
        en: Active-tier removal is not the decay subtype
        ja: アクティブ層除去は減衰サブタイプではない

      descriptions:
        zh: mem-op-evict-2501 移出 record-2501-v1 的活动层副本，导致该层不再能寻址它。
        en: mem-op-evict-2501 removes the active-tier copy of record-2501-v1 and makes it no longer addressable in that tier.
        ja: mem-op-evict-2501 は record-2501-v1 のアクティブ層コピーを除去し、その層でアドレス可能でなくします。
