schema: moonweave.ai/ontology-node/v1
id: MemoryDecay
kind: concept
labels:
  zh: 记忆衰减
  en: Memory decay
  ja: 記憶減衰
semantics:
  short_definition:
    zh: 按新近度公式重加权既有记录检索权重。
    en: Reweights retrieval weight of existing records by recency formula.
    ja: recency 式で既存 record の retrieval weight を再重み付け。
  definition:
    zh: MemoryDecay 是 MemoryDispositionOperation：不删除 MemoryRecord 内容，而按 Generative Agents（Park 2023）公式 recency(i)=0.99^hours_since_last_access 降低检索排名权重。与 MemoryDelete 不同，记录仍保留且可随再访问恢复权重。
    en: MemoryDecay is a MemoryDispositionOperation that does not delete MemoryRecord content but lowers retrieval rank weight using the Generative Agents (Park 2023) formula recency(i)=0.99^hours_since_last_access. Unlike MemoryDelete, the record remains and weight can recover on re-access.
    ja: MemoryDecay は MemoryRecord を削除せず Generative Agents 式 recency=0.99^hours で retrieval weight を下げる MemoryDispositionOperation。MemoryDelete と異なり record 保持。
  why_needed:
    zh: 把“变旧”与“被删”分开，否则无法解释未访问观察仍保留但排名下降。
    en: Separates becoming stale from being deleted when observations remain but rank drops.
    ja: rank 低下と削除を分離しないと未アクセス观察の扱いが不明。
  includes:
    - zh: 纳入基于 last_access_at 的 recency 重加权与 retrieval weight 更新。
      en: Includes recency reweighting from last_access_at and retrieval weight updates.
      ja: last_access_at 基準 recency 再重みと retrieval weight 更新。
  excludes:
    - zh: 排除物理删除、TTL 到期与容量驱逐。
      en: Excludes physical deletion, TTL expiry, and capacity eviction.
      ja: 物理削除/TTL/capacity eviction を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 recency_score = 0.99 ** hours_since(last_access_at, now)；常与 importance、relevance 线性组合。Moonweave 登记 decay_operation_id 与新 retrieval_weight，不覆盖 record 文本。
    en: Map recency_score = 0.99 ** hours_since(last_access_at, now); often combined linearly with importance and relevance. Moonweave records decay_operation_id and new retrieval_weight without overwriting record text.
    ja: recency_score=0.99**hours を写像。decay_operation_id/retrieval_weight を記録し record 文本は上書きしない。
  typical_input:
    - description: Generative Agents recency scoring
      format: |
        recency_score = 0.99 ** hours_since(last_access_at, now)
        retrieval_weight = alpha*recency + beta*importance + gamma*relevance
      source_claims: [claim-memory-decay-ga]
  typical_output:
    - description: Decay operation record
      format: |
        {"decay_operation_id": "decay-48", "recency_score": 0.624, "record_retained": true}
      source_claims: [claim-memory-decay-design]
  reference_implementations:
    - name: Generative Agents
      url: https://arxiv.org/abs/2304.03442
      description: Memory stream recency decay with 0.99 hourly factor (Park 2023).
structure:
  identity_keys: [decay_operation_id]
  fields:
    - id: decay_operation_id
      labels: {zh: 衰减操作标识, en: Decay operation identifier, ja: 減衰操作識別子}
      definitions:
        zh: 标识一次 recency 重加权活动。
        en: Identifies one recency reweighting activity.
        ja: 一 recency 再重み activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decay-48
      allowed_values: []
      source_claims: [claim-memory-decay-id]
    - id: recency_decay_factor
      labels: {zh: 新近度衰减因子, en: Recency decay factor, ja: 新近度減衰係数}
      definitions:
        zh: Generative Agents 每小时衰减底数，默认 0.99。
        en: Hourly decay base in Generative Agents style, default 0.99.
        ja: Generative Agents 型 hourly decay base、既定 0.99。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.99
      allowed_values: []
      source_claims: [claim-memory-decay-ga]
  constraints: []
  required_relations: []
examples:
  - id: MemoryDecay-example-ga-48h
    labels: {zh: 48 小时未访问衰减, en: 48-hour unused decay, ja: 48 時間未アクセス減衰}
    descriptions:
      zh: decay-48 对 48 小时未访问观察应用 recency=0.99^48≈0.624，排名下降但 record 保留。
      en: decay-48 applies recency=0.99^48≈0.624 to an observation unused for 48 hours; rank drops but record remains.
      ja: decay-48 が 48 時間未アクセスに recency=0.99^48 を適用。rank 低下、record 保持。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: Section 3.1}
    field_values: {decay_operation_id: decay-48, recency_decay_factor: 0.99, recency_score: 0.624}
    related_node_ids: [MemoryDecay, memory-retrieval-ranking]
    related_relation_ids: []
    source_claims: [claim-memory-decay-ga, claim-memory-decay-design]
  - id: MemoryDecay-example-recovery
    labels: {zh: 访问恢复权重, en: Access recovers weight, ja: アクセスで weight 回復}
    descriptions:
      zh: 再访问 record-510 后 last_access_at 更新，后续 recency_score 回升；是新 decay 评估而非 MemoryUpdate。
      en: Re-accessing record-510 updates last_access_at and raises recency_score on next evaluation; this is decay assessment, not MemoryUpdate.
      ja: 再アクセスで last_access_at 更新、recency_score 回復。MemoryUpdate ではない。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: retrieval loop}
    field_values: {decay_operation_id: decay-49, recency_score: 0.99}
    related_node_ids: [MemoryDecay, MemoryRecord]
    related_relation_ids: []
    source_claims: [claim-memory-decay-ga]
  - id: MemoryDecay-example-not-delete
    labels: {zh: 衰减非删除, en: Decay is not delete, ja: 減衰は削除ではない}
    descriptions:
      zh: delete-310 产生 tombstone；decay-48 仅降低 retrieval_weight 且无 tombstone。
      en: delete-310 produces tombstone; decay-48 only lowers retrieval_weight with no tombstone.
      ja: delete は tombstone、decay は weight のみ低下。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryDecay, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-memory-decay-design]
  - id: MemoryDecay-example-combined
    labels: {zh: 组合检索分数, en: Combined retrieval score, ja: 組合せ retrieval score}
    descriptions:
      zh: 模拟小镇智能体用 alpha*recency+beta*importance+gamma*relevance 排序 memory stream。
      en: A simulated town agent ranks the memory stream with alpha*recency+beta*importance+gamma*relevance.
      ja: 線形結合で memory stream を排序。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: retrieval scoring}
    field_values: {decay_operation_id: decay-50, alpha: 1.0, beta: 1.0, gamma: 1.0}
    related_node_ids: [MemoryDecay, RetrievalActivity]
    related_relation_ids: []
    source_claims: [claim-memory-decay-ga]
parent_relation:
  id: MemoryDecay-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆处置操作, en: is a memory disposition operation, ja: 記憶処置操作の一種}
  definitions:
    zh: MemoryDecay —is_a→ MemoryDispositionOperation 表示通过 recency 重加权而不删除 record 内容。
    en: MemoryDecay —is_a→ MemoryDispositionOperation holds because recency reweighting occurs without deleting record content.
    ja: recency 再重みで内容削除しないため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryDecay-is_a-MemoryDispositionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when recency reweighting occurs without tombstone.
      explanations:
        zh: 仅当 recency 重加权且无 tombstone 时成立。
        en: Assert only when recency reweighting occurs without tombstone.
        ja: recency 再重みで tombstone なしの時のみ。
      source_claims: [claim-memory-decay-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-decay-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-generative-agents-decay
    title: Generative Agents — Interactive Simulacra of Human Behavior
    publisher: arXiv
    url: https://arxiv.org/abs/2304.03442
    source_type: arXiv
    relevance: recency(i)=0.99^hours_since_last_access in memory stream retrieval.
  - id: src-memory-decay-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Decay reweights retrieval without deleting records.
source_claims:
  - id: claim-memory-decay-ga
    source: src-generative-agents-decay
    supports: Generative Agents uses recency(i)=0.99^hours_since_last_access when ranking memory stream entries.
    locator: Section 3.1 memory stream
    evidence_kind: academic
    confidence: high
  - id: claim-memory-decay-design
    source: src-memory-decay-design
    supports: MemoryDecay records reweighting without tombstone or content overwrite.
    locator: MemoryDecay boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-decay-id
    source: src-memory-decay-design
    supports: decay_operation_id identifies one recency reweighting activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
