schema: moonweave.ai/ontology-node/v1
id: MemoryDecay
kind: concept
status: review
labels:
  zh: 记忆衰减
  en: Memory decay
  ja: 記憶減衰
semantics:
  short_definition:
    zh: 降低记录的强度、相关性权重或召回优先级而不立即移除它的处置操作。
    en: A disposition operation lowering a record's strength, relevance weight, or recall priority without immediately removing it.
    ja: recordのstrength・relevance weight・recall priorityを下げ即時除去しないdisposition operationです。
  definition:
    zh: MemoryDecay 改变 MemoryRecord 的可检索权重或激活强度，同时保留记录身份和访问可能性；真正移出活动层是 Eviction，达到时间资格是 Expiration。
    en: MemoryDecay changes a MemoryRecord's retrieval weight or activation strength while preserving its identity and accessibility. Removal from an active tier is Eviction; reaching a time-based eligibility threshold is Expiration.
    ja: MemoryDecay はMemoryRecordのretrieval weight/activation strengthを変えrecord identityとaccessibilityを保持します。active tierからの除去はEviction、time-based threshold到達はExpirationです。
  why_needed:
    zh: 把连续权重变化与离散移除事件分开。
    en: Separates continuous weight change from discrete removal events.
    ja: continuous weight changeをdiscrete removal eventから分けます。
  includes:
    - zh: 纳入随时间、低复用率或低重要性降低检索权重。
      en: Includes lowering retrieval weight because of time, low reuse, or low importance.
      ja: time・low reuse・low importanceによるretrieval weight低下を含みます。
  excludes:
    - zh: 排除物理删除、缓存驱逐和 TTL 到期资格。
      en: Excludes physical deletion, cache eviction, and TTL expiration eligibility.
      ja: physical delete・cache eviction・TTL expiration eligibilityを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - decay_operation_id
  fields:
    - id: decay_operation_id
      labels:
        zh: 衰减操作标识
        en: decay operation ID
        ja: decay operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次权重衰减活动。
        en: Identifies one weight-decay activity.
        ja: 一weight-decay activityを識別します。
      allowed_values: []
      pattern: null
      example_value: decay-1202
      source_claims:
        - claim-memory-decay-002
    - id: strength_after
      labels:
        zh: 衰减后强度
        en: strength after
        ja: 減衰後strength
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录处置后仍可访问记录的强度值。
        en: Records the retained record's strength after disposition.
        ja: disposition後もaccess可能なrecordのstrength値を記録します。
      allowed_values: []
      pattern: null
      example_value: 0.35
      source_claims:
        - claim-memory-decay-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryDecay-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 记忆衰减正例
      en: "Positive case: Memory decay"
      ja: 記憶減衰正例
    scenario_id: null
    descriptions:
      zh: memory-op-decay-001 在九十天无命中后把 record-1202 的 retrieval_strength 从 0.80 调整为 0.35，同时保留记录身份、内容和按键读取能力。
      en: memory-op-decay-001 changes record-1202 retrieval_strength from 0.80 to 0.35 after ninety days without a hit while retaining identity, content, and key-based access.
      ja: memory-op-decay-001 は九十日間ヒットがない record-1202 の retrieval_strength を 0.80 から 0.35 へ変更し、同一性・内容・キー参照を保持します。
    field_values:
      decay_operation_id: memory-op-decay-001
      strength_after: 0.35
      operation_id: memory-op-decay-001
      reason: retrieval weight is reduced after the freshness threshold elapsed
      disposition_operation_id: memory-op-decay-001
      target_record_id: record-1202
      started_at: 2026-07-16T14:01:00Z
    related_node_ids:
      - MemoryDecay
      - MemoryDispositionOperation
    related_relation_ids:
      - MemoryDecay-is_a-MemoryDispositionOperation
    expected_result:
      zh: 把 decay-1202 认定为 MemoryDecay，记录衰减前后权重与依据，同时继续允许按身份读取该 MemoryRecord。
      en: Treat decay-1202 as MemoryDecay, record its before-and-after weights and rationale, and continue allowing direct retrieval of the same MemoryRecord.
      ja: decay-1202 を MemoryDecay と認定し before/after weight と rationale を記録して同じ MemoryRecord の direct retrieval を許可し続けます。
    why_valid_or_invalid:
      zh: 活动只连续调低召回排序强度，没有改变记录身份或检索资格，因而是衰减而非驱逐、到期或删除。
      en: The activity continuously lowers recall ranking strength without changing record identity or eligibility, which distinguishes decay from eviction, expiration, and deletion.
      ja: activity は record identity や eligibility を変えず recall ranking strength のみ連続低下させるため eviction・expiration・deletion と異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-decay-001
  - id: MemoryDecay-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 检索权重衰减实例
      en: Retrieval-weight decay instance
      ja: 検索重み減衰インスタンス
    scenario_id: MemoryDecay:instance:memory-op-decay-001
    descriptions:
      zh: memory-op-decay-001 在九十天无命中后把 record-1202 的 retrieval_strength 从 0.80 调整为 0.35，同时保留记录身份、内容和按键读取能力。
      en: memory-op-decay-001 changes record-1202 retrieval_strength from 0.80 to 0.35 after ninety days without a hit while retaining identity, content, and key-based access.
      ja: memory-op-decay-001 は九十日間ヒットがない record-1202 の retrieval_strength を 0.80 から 0.35 へ変更し、同一性・内容・キー参照を保持します。
    field_values:
      decay_operation_id: memory-op-decay-001
      strength_after: 0.35
      operation_id: memory-op-decay-001
      reason: retrieval weight is reduced after the freshness threshold elapsed
    related_node_ids:
      - MemoryDecay
      - MemoryDispositionOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryDecay-is_a-MemoryDispositionOperation
      - MemoryDecay-reweights-MemoryRecord
    expected_result:
      zh: 查询显示同一 MemoryRecord 仍然有效且可读取，只是检索权重被该 Decay 活动下调。
      en: The query shows that the same MemoryRecord remains valid and readable while this Decay activity lowers only its retrieval weight.
      ja: 同じ MemoryRecord が有効で読取り可能なまま、この Decay 活動だけが検索重みを下げたことを示します。
    why_valid_or_invalid:
      zh: 活动不删除、不驱逐也不标记到期，只改变激活强度，因此属于 Decay。
      en: The activity neither deletes, evicts, nor marks expiry; it changes only activation strength and is therefore Decay.
      ja: 削除・退去・期限切れ化を行わず活性強度だけを変えるため Decay です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-decay-001
  - id: MemoryDecay-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 记忆衰减边界例
      en: "Boundary case: Memory decay"
      ja: 記憶減衰境界例
    scenario_id: MemoryDecay:boundary:20260716
    descriptions:
      zh: evict-1203 在 Redis 达到 maxmemory 时把 record-1203 从活动缓存层移出，持久存储仍保留有效副本，且没有写入新的 retrieval_strength。
      en: evict-1203 removes record-1203 from the active Redis tier when maxmemory is reached; durable storage keeps a valid copy and no new retrieval_strength is written.
      ja: evict-1203 は Redis maxmemory 到達時に record-1203 を active cache tier から除き、durable storage は valid copy を保ち新 retrieval_strength は書きません。
    field_values: {}
    related_node_ids:
      - MemoryDecay
    related_relation_ids: []
    expected_result:
      zh: 不要把 evict-1203 计作 MemoryDecay；应记录为 MemoryEviction 的离散驻留变化，并保留从持久层重新装载的能力。
      en: Keep evict-1203 out of MemoryDecay; record the discrete residency change as MemoryEviction and preserve reload capability from durable storage.
      ja: evict-1203 を MemoryDecay から除外し discrete residency change を MemoryEviction として記録して durable storage からの reload capability を保ちます。
    why_valid_or_invalid:
      zh: 从活动层移除是缓存驻留状态的离散变化，而不是连续权重调整；把它误写为衰减会掩盖实际容量驱逐原因。
      en: Removal from an active tier is a discrete cache-residency transition rather than a continuous weight adjustment; calling it decay would hide the capacity-eviction cause.
      ja: active tier からの removal は continuous weight adjustment ではなく discrete cache-residency transition で、decay とすると capacity-eviction cause を隠します。
    synthetic: false
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-decay-001
