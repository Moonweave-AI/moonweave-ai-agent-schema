schema: moonweave.ai/ontology-node/v1
id: MemoryDecay
kind: concept
status: accepted
labels:
  zh: 记忆衰减
  en: Memory decay
  ja: 記憶減衰
semantics:
  short_definition:
    zh: 在保留记录身份和可寻址性的前提下，降低既有记忆记录检索强度的处置操作。
    en: A disposition operation that lowers an existing memory record's retrieval strength while retaining its identity and addressability.
    ja: レコードの識別とアドレス可能性を保持したまま、既存記憶レコードの検索強度を下げる処分操作です。
  definition:
    zh: MemoryDecay 是一种已执行的 MemoryDispositionOperation：它根据明确的时间、非使用或优先级规则，对既有 MemoryRecord 的检索强度施加可证实的下降，并记录下降前后值、依据、时间和证据。衰减并不使记录无效、不会将其移出活动层，也不会创建新内容版本；完全移出活动层是 MemoryEviction，保留资格变化是 MemoryExpiration，永久或逻辑无效化是 MemoryDelete。
    en: MemoryDecay is an executed MemoryDispositionOperation that applies a demonstrable decrease to an existing MemoryRecord's retrieval strength under an explicit time, non-use, or priority rule and records the before-and-after values, basis, time, and evidence. Decay neither invalidates the record nor removes it from the active tier or creates a new content version; complete active-tier removal is MemoryEviction, retention-eligibility change is MemoryExpiration, and permanent or logical invalidation is MemoryDelete.
    ja: MemoryDecay は、明示的な時間、未使用、または優先度規則に従って既存 MemoryRecord の検索強度を証明可能に低下させ、前後値、根拠、時刻、証跡を記録する実行済み MemoryDispositionOperation です。減衰はレコードを無効化せず、アクティブ層から除去せず、新しい内容バージョンも作成しません。アクティブ層からの完全除去は MemoryEviction、保持適格性の変更は MemoryExpiration、恒久的または論理的無効化は MemoryDelete です。
  why_needed:
    zh: 连续的检索优先级变化与离散的删除、到期或缓存驱逐有不同的恢复行为和审计含义；把它们压缩为“不可见”会丢失实际发生的生命周期效果。
    en: Continuous retrieval-priority change has different recovery behavior and audit meaning from discrete deletion, expiry, or cache eviction; collapsing them into "not visible" loses the lifecycle effect that actually happened.
    ja: 連続的な検索優先度変更は、離散的な削除、期限切れ、キャッシュ追い出しとは回復挙動と監査上の意味が異なります。それらを「見えない」に圧縮すると、実際に起きたライフサイクル効果が失われます。
  includes:
    - zh: 基于已过去时间、低使用频率或明确优先级规则的已执行权重下降，且目标记录仍可按其稳定标识读取。
      en: Executed weight decreases based on elapsed time, low use frequency, or an explicit priority rule where the target record remains readable by its stable identity.
      ja: 経過時間、低使用頻度、または明示的優先度規則に基づく実行済み重み低下で、対象レコードが安定識別子で引き続き読めるものを含みます。
  excludes:
    - zh: 将活动层副本移出、使记录失效或删除、仅标记保留到期、变更内容字段或版本、只显示分数但没有执行活动，以及尚未执行的衰减计划。
      en: Removing an active-tier copy, invalidating or deleting a record, merely marking retention expiry, changing content fields or version, displaying a score without an executed activity, and an unexecuted decay plan.
      ja: アクティブ層コピーの除去、レコードの無効化または削除、保持期限切れの印付けだけ、内容フィールドまたはバージョン変更、実行活動なしのスコア表示、未実行の減衰計画を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将衰减实现为保存同一记录标识的可审计重加权活动：输入包含旧强度和适用规则，输出包含较低的新强度、发生时间及证据摘要。若记录从层中消失、被无效化或得到后继内容版本，应分别调用驱逐、删除或修订模型。
    en: "Implement decay as an auditable reweighting activity that preserves the same record identity: input contains the prior strength and applicable rule, and output contains a lower new strength, occurrence time, and evidence digest. If a record disappears from a tier, is invalidated, or receives a successor content version, use eviction, deletion, or revision models respectively."
    ja: 減衰は同じレコード識別を保つ監査可能な再重み付け活動として実装します。入力には旧強度と適用規則を含め、出力にはより低い新強度、発生時刻、証跡ダイジェストを含めます。レコードが層から消える、無効化される、または後継内容バージョンを得る場合は、それぞれ追い出し、削除、改訂モデルを使います。
  typical_input:
    - description: An existing record reference with its prior normalized strength, an explicit decay rule and basis, executor identity, and operation start time.
      format: "{operation_id, target_record_ref, strength_before, decay_basis, decay_rule_ref, actor_ref, started_at}"
  typical_output:
    - description: A lower retained strength for the same record, with an evidence digest, application time, result, and audit event.
      format: "{operation_id, strength_after, strength_delta, decay_evidence_digest, decayed_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: Elasticsearch function score query
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-function-score-query.html
      description: Documents score functions and decay functions that adjust ranking without changing indexed document identity.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes executed activities, entities, agents, time, and provenance associations.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 digests that can bind an auditable evidence snapshot.
  source_claims:
    - claim-memory-decay-activity
    - claim-memory-decay-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次衰减的目标、旧新强度、证据、结果和审计事实。
        en: Reuses the stable MemoryOperation identity to join one decay's target, before-and-after strength, evidence, result, and audit facts.
        ja: 親 MemoryOperation の安定識別子を再利用し、一つの減衰の対象、前後強度、証跡、結果、監査事実を結びます。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-decay-2501
      source_claims:
        - claim-memory-decay-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 disposition，说明衰减是对既有记录可用强度的处置活动，不是内容修订。
        en: Narrows the inherited operation kind to disposition and identifies decay as an eligibility-strength action on an existing record, not content revision.
        ja: 継承した操作種別を disposition に限定し、減衰を既存レコードの利用強度への処置活動として識別し、内容修訂とは区別します。
      allowed_values:
        - disposition
      pattern: null
      example_value: disposition
      source_claims:
        - claim-memory-decay-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录衰减活动的运行状态，区别于衰减后强度的数值。
        en: Records the runtime state of the decay activity, distinct from the numeric strength after decay.
        ja: 減衰活動の実行状態を記録し、減衰後の数値的な強度とは区別します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-decay-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际开始应用衰减规则的时间，不能以被评估的最后访问时间替代。
        en: Records when application of the decay rule actually began, not the last-access time being evaluated.
        ja: 減衰規則の適用を実際に始めた時刻を記録し、評価対象の最終アクセス時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:30:00Z"
      source_claims:
        - claim-memory-decay-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际运行该衰减规则的主体，而不是规则的定义者。
        en: References the actor that runs this decay rule rather than the author of the rule.
        ja: 規則の作成者ではなく、この減衰規則を実行する主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-decay-worker-1
      source_claims:
        - claim-memory-decay-activity
    - id: target_record_refs
      labels:
        zh: 处置目标记录引用
        en: disposition target record references
        ja: 処置対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 保留父类可处理多个目标的记录集合；衰减子类每次将其与单一的 target_record_ref 对齐。
        en: Retains the parent collection of disposition targets; this decay subtype aligns it with its single target_record_ref for each execution.
        ja: 親の処置対象集合を保持し、この減衰サブタイプでは各実行で単一の target_record_ref と整合させます。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value:
        - record-2501-v1
      source_claims:
        - claim-memory-decay-target
    - id: disposition_kind
      labels:
        zh: 处置类别
        en: disposition kind
        ja: 処置種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 decay，以便跨实现区分降低强度与驱逐、到期或删除。
        en: Narrows the parent disposition kind to decay so cross-implementation consumers distinguish strength reduction from eviction, expiration, or deletion.
        ja: 親の処置種別を decay に限定し、実装間で強度低下を追い出し、期限切れ、削除から区別します。
      allowed_values:
        - decay
      pattern: null
      example_value: decay
      source_claims:
        - claim-memory-decay-activity
    - id: disposition_basis
      labels:
        zh: 处置依据
        en: disposition basis
        ja: 処置根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 decay_policy，表示具体 inactivity 或 elapsed_time 触发条件由本地 decay_basis 细化。
        en: Narrows the parent basis to decay_policy; the local decay_basis further states whether inactivity or elapsed time triggered it.
        ja: 親の根拠を decay_policy に限定し、ローカルの decay_basis が inactivity か elapsed time かをさらに示します。
      allowed_values:
        - decay_policy
      pattern: null
      example_value: decay_policy
      source_claims:
        - claim-memory-decay-basis
    - id: disposition_effect
      labels:
        zh: 处置效果
        en: disposition effect
        ja: 処置効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 strength_reduced，说明衰减降低强度而不使记录失效或移出活跃层。
        en: Narrows the parent effect to strength_reduced and states that decay lowers strength without invalidating or evicting the record.
        ja: 親の効果を strength_reduced に限定し、減衰がレコードを無効化または追い出すことなく強度を下げることを示します。
      allowed_values:
        - strength_reduced
      pattern: null
      example_value: strength_reduced
      source_claims:
        - claim-memory-decay-strength
    - id: disposition_evidence_digest
      labels:
        zh: 处置证据摘要
        en: disposition evidence digest
        ja: 処置証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定父类处置依据和效果的证据包；在衰减中它与 decay_evidence_digest 指向同一规则执行证据。
        en: Fixes the evidence package for the parent disposition basis and effect; in decay it names the same rule-execution evidence as decay_evidence_digest.
        ja: 親処置の根拠と効果の証跡パッケージを固定し、減衰では decay_evidence_digest と同じ規則実行証跡を指します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:55ae9b2e7bf2fc234a6b9f3963dbf283ccd62955e016a7bf433bb205c30dd91a
      source_claims:
        - claim-memory-decay-evidence
    - id: disposed_at
      labels:
        zh: 处置生效时间
        en: disposition effective time
        ja: 処置有効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录父类处置效果生效的时间；在衰减中它与 decayed_at 是同一个强度变更事件。
        en: Records when the parent disposition effect takes hold; for decay it is the same strength-change event as decayed_at.
        ja: 親処置の効果が有効になった時刻を記録し、減衰では decayed_at と同じ強度変更イベントです。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:30:00.071Z"
      source_claims:
        - claim-memory-decay-activity
    - id: target_record_ref
      labels:
        zh: 目标记录引用
        en: target record reference
        ja: 対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际被重加权的既有 MemoryRecord；共享相似内容、同一命名空间或同一追踪并不能证明它是目标。
        en: References the existing MemoryRecord actually reweighted; similar content, a shared namespace, or the same trace does not prove it is the target.
        ja: 実際に再重み付けされる既存 MemoryRecord を参照します。類似内容、共有名前空間、同じトレースだけでは対象を証明できません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-2501-v1
      source_claims:
        - claim-memory-decay-target
    - id: strength_before
      labels:
        zh: 衰减前强度
        en: strength before decay
        ja: 減衰前強度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录在此次衰减生效前针对同一目标记录使用的标准化检索强度。
        en: Records the normalized retrieval strength used for the same target record before this decay takes effect.
        ja: この減衰が有効になる前に同じ対象レコードに使われた正規化検索強度を記録します。
      allowed_values: []
      pattern: null
      example_value: 0.80
      source_claims:
        - claim-memory-decay-strength
    - id: strength_after
      labels:
        zh: 衰减后强度
        en: strength after decay
        ja: 減衰後強度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录此次衰减生效后同一目标记录保留的标准化检索强度，而非零值删除标记或另一个记录的分数。
        en: Records the normalized retrieval strength retained by the same target record after this decay takes effect, not a zero-value deletion marker or another record's score.
        ja: この減衰後に同じ対象レコードが保持する正規化検索強度を記録します。ゼロ値の削除印や別レコードのスコアではありません。
      allowed_values: []
      pattern: null
      example_value: 0.35
      source_claims:
        - claim-memory-decay-strength
    - id: decay_basis
      labels:
        zh: 衰减依据
        en: decay basis
        ja: 減衰根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录导致此次权重下降的实际可审计输入维度，不能使用没有规则或观察值支持的笼统“低价值”标签。
        en: Records the actual auditable input dimension that led to this weight decrease and cannot use a generic "low value" label without a rule or observation.
        ja: この重み低下を導いた実際に監査可能な入力次元を記録し、規則または観測値のない一般的な「低価値」ラベルは使えません。
      allowed_values:
        - elapsed_time
        - inactivity
        - explicit_priority_policy
      pattern: null
      example_value: inactivity
      source_claims:
        - claim-memory-decay-basis
    - id: decay_rule_ref
      labels:
        zh: 衰减规则引用
        en: decay rule reference
        ja: 減衰規則参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次衰减使用的版本化规则或配置，使相同的旧值、观察输入和规则能重现新值。
        en: Points to the versioned rule or configuration used for this decay so the same prior value, observed inputs, and rule can reproduce the new value.
        ja: この減衰で使われたバージョン付き規則または設定を指し、同じ旧値、観測入力、規則から新値を再現できるようにします。
      allowed_values: []
      pattern: '^decay-rule-[A-Za-z0-9._-]+$'
      example_value: decay-rule-inactivity-v3
      source_claims:
        - claim-memory-decay-basis
    - id: decay_evidence_digest
      labels:
        zh: 衰减证据摘要
        en: decay evidence digest
        ja: 減衰証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定目标版本、旧新强度、规则版本和观测输入摘要，使以后可以验证一次实际的重加权。
        en: Fixes a digest of target version, before-and-after strength, rule version, and observed inputs so one actual reweighting can later be verified.
        ja: 対象バージョン、前後強度、規則バージョン、観測入力のダイジェストを固定し、一つの実際の再重み付けを後から検証できるようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:55ae9b2e7bf2fc234a6b9f3963dbf283ccd62955e016a7bf433bb205c30dd91a
      source_claims:
        - claim-memory-decay-evidence
    - id: decayed_at
      labels:
        zh: 衰减发生时间
        en: decayed at
        ja: 減衰発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录新强度实际替代旧强度的事件时间，不能用规则创建、分数显示或计划批处理时间替代。
        en: Records the event time at which new strength actually replaces old strength and cannot be substituted by rule-creation, score-display, or scheduled-batch time.
        ja: 新強度が実際に旧強度を置き換えたイベント時刻を記録し、規則作成、スコア表示、予定バッチ時刻では代替できません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:30:00.071Z"
      source_claims:
        - claim-memory-decay-activity
  constraints:
    - id: MemoryDecay-inherited-disposition-envelope
      expression: "operation_kind = disposition, target_record_refs = [target_record_ref], disposition_kind = decay, disposition_basis = decay_policy, disposition_effect = strength_reduced, disposition_evidence_digest = decay_evidence_digest, and disposed_at = decayed_at."
      explanation:
        zh: 衰减的专用强度字段不会取代通用处置合同；两套字段必须描述同一个目标、证据和生效事件。
        en: Decay-specific strength fields do not replace the generic disposition contract; both field sets must describe one target, evidence package, and effective event.
        ja: 減衰固有の強度フィールドは汎用処置契約を置き換えず、両方のフィールド群が一つの対象、証跡パッケージ、有効化イベントを記述しなければなりません。
      source_claims:
        - claim-memory-decay-activity
        - claim-memory-decay-basis
        - claim-memory-decay-evidence
    - id: MemoryDecay-strength-decreases-within-scale
      expression: "strength_before and strength_after are normalized values in the closed interval [0, 1], and strength_after is strictly less than strength_before for the same target_record_ref."
      explanation:
        zh: 没有可比较的前后值或新值不低于旧值时，不能证明发生了衰减；把零值当成删除标记也应改用删除模型。
        en: Without comparable before-and-after values, or when the new value is not lower, decay is unproven; treating zero as a deletion marker must use the deletion model instead.
        ja: 比較可能な前後値がない、または新値が低くない場合、減衰は証明されません。ゼロを削除印として扱う場合も削除モデルを使う必要があります。
      source_claims:
        - claim-memory-decay-strength
    - id: MemoryDecay-record-remains-addressable
      expression: "target_record_ref retains the same stable record identity and remains addressable after decayed_at; loss of active-tier residency, invalidation, or a successor content version violates the decay boundary."
      explanation:
        zh: 衰减降低检索优先级而不是消除记录存在；如果寻址能力或身份已断裂，应该分别记录驱逐、删除或修订。
        en: Decay lowers retrieval priority rather than removing record existence; if addressability or identity is broken, record eviction, deletion, or revision separately.
        ja: 減衰は検索優先度を下げるのであり、レコード存在を除去するものではありません。アドレス可能性または識別が失われた場合は、追い出し、削除、改訂を別々に記録します。
      source_claims:
        - claim-memory-decay-target
        - claim-memory-decay-boundary
    - id: MemoryDecay-rule-and-evidence-consistency
      expression: "decay_basis, decay_rule_ref, prior and new strength, target version, and observed inputs are covered by decay_evidence_digest; an unexplained score overwrite is not a MemoryDecay operation."
      explanation:
        zh: 规则、观察输入和结果必须可追溯，才能把一次分数变化归因于衰减而不是手工编辑、故障或未知过程。
        en: Rule, observed inputs, and result need traceability before a score change can be attributed to decay rather than manual editing, failure, or an unknown process.
        ja: スコア変化を手作業編集、障害、未知過程ではなく減衰に帰属するには、規則、観測入力、結果の追跡可能性が必要です。
      source_claims:
        - claim-memory-decay-basis
        - claim-memory-decay-evidence
    - id: MemoryDecay-time-consistency
      expression: "decayed_at is on or after started_at, and a terminal parent operation has ended_at on or after decayed_at."
      explanation:
        zh: 衰减效果不能早于活动开始，也不能被事后写回成已结束活动的一部分。
        en: A decay effect cannot predate activity start or be written back later as part of an already terminated activity.
        ja: 減衰効果は活動開始より前にはならず、すでに終了した活動の一部として後から書き戻すこともできません。
      source_claims:
        - claim-memory-decay-activity
  required_relation_constraints: []
