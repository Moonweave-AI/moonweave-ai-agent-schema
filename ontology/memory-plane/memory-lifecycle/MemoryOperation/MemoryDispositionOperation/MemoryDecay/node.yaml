        en: mem-op-decay-2501 applies a replayable rule to record-2501-v1, lowers strength from 0.80 to 0.35, and retains the same record identity and read access.
        ja: mem-op-decay-2501 は record-2501-v1 に再実行可能な規則を適用し、強度を 0.80 から 0.35 に下げますが、同じレコード識別と読取りアクセスを保持します。
