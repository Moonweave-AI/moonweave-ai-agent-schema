parent_relation:
  id: MemoryDecay-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆处置操作
    en: is a memory disposition operation
    ja: 記憶処分操作の一種である
  definitions:
    zh: MemoryDecay —is_a→ MemoryDispositionOperation 表示对既有可寻址记录应用了有依据的强度下降效果，而没有改变其有效性、活动层驻留或内容版本。
    en: MemoryDecay —is_a→ MemoryDispositionOperation means a grounded strength-decrease effect is applied to an existing addressable record without changing its validity, active-tier residency, or content version.
    ja: MemoryDecay —is_a→ MemoryDispositionOperation は、既存でアドレス可能なレコードに、妥当な根拠を持つ強度低下効果を適用し、その有効性、アクティブ層常駐、内容バージョンを変更しないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次衰减活动能处理的记录批次数。
    en: The classification relation expresses type membership and does not limit how many record batches one decay activity may process.
    ja: 分類関係は型メンバーシップを表し、一つの減衰活動が処理できるレコードバッチ数を制限しません。
  inverse_reading:
    predicate: has_decay_subtype
    labels:
      zh: 具有衰减子类
      en: has decay subtype
      ja: 減衰サブタイプを持つ
  conditions:
    - id: MemoryDecay-is_a-MemoryDispositionOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when an executed disposition applies a documented strictly lower retrieval strength to the same existing and addressable record, without eviction, invalidation, expiry effect, or content revision."
      explanation:
        zh: 处置父类身份不足以证明衰减；需要同一既有目标、严格下降的强度和保留的可寻址性。
        en: Disposition-parent identity alone does not prove decay; the same existing target, strictly lower strength, and retained addressability are required.
        ja: 処分親の識別だけでは減衰を証明できません。同じ既存対象、厳密に低い強度、保持されたアドレス可能性が必要です。
      source_claims:
        - claim-memory-decay-strength
        - claim-memory-decay-boundary
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryDecay-is_a-MemoryDispositionOperation-example-positive

      labels:
        zh: 可寻址记录的强度下降属于处置
        en: Strength decrease of an addressable record is disposition
        ja: アドレス可能レコードの強度低下は処分である

      descriptions:
