  - id: claim-memory-decay-003
    source: eng-fw-langmem-memory-management
    supports: MemoryDecay.strength_after records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-decay-004
    source: eng-fw-langmem-memory-management
    supports: LangMem distinguishes updating a stored semantic-memory item from deleting it. Moonweave uses the non-destructive update side as operational precedent for MemoryDecay, which lowers strength or relevance without invalidating the record; LangMem does not define decay as a named lifecycle class.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-decay-005
    source: eng-ont-prov-o
    supports: PROV-O defines wasInvalidatedBy for an Entity that ceases to be available because of an Activity. Moonweave uses that provenance meaning for MemoryDelete and keeps it distinct from non-invalidating MemoryDecay; PROV-O does not prescribe the sibling classes.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-decay-006
    source: eng-fw-langmem-memory-management
    supports: LangMem permits updates to retained semantic-memory items, supporting the operational possibility that a record's retrieval weight or strength changes while the item remains stored. Moonweave names that gradual change MemoryDecay and distinguishes it from cache-oriented eviction.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-decay-007
    source: eng-cache-redis-eviction
    supports: Redis documents eviction as removal of keys when configured memory limits are reached, according to a selected eviction policy. Moonweave models that capacity- or policy-triggered removal as MemoryEviction and keeps it separate from gradual MemoryDecay; Redis does not define the Moonweave hierarchy.
    locator: Key eviction > maxmemory configuration and eviction policies
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-decay-008
    source: eng-fw-langmem-memory-management
    supports: LangMem's update operations allow retained semantic memory to change without immediate deletion. Moonweave treats MemoryDecay as such a gradual strength or relevance change and distinguishes it from MemoryExpiration, whose defining condition is reaching a time or lifecycle threshold.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-decay-009
    source: eng-db-dynamodb-ttl
    supports: DynamoDB TTL marks an item as expired when its per-item timestamp is in the past, while physical deletion may occur later and can be observed in Streams. Moonweave uses this threshold-crossing semantics for MemoryExpiration and keeps it distinct from gradual decay; the ontology placement is Moonweave-specific.
    locator: Using time to live (TTL) > expired items pending deletion and TTL stream records
    evidence_kind: design-inference
    confidence: high
    review_status: pending
