    - claim-memory-decay-boundary
  distinct_fact_rationale:
    zh: 此主干关系只表达有保留可寻址性的重加权处置属于 MemoryDispositionOperation；目标记录、具体权重、规则、证据和产生的结果由字段或独立关系表达。
    en: This backbone relation only expresses that a reweighting disposition which retains addressability belongs to MemoryDispositionOperation; target record, concrete strengths, rule, evidence, and result are expressed by fields or separate relations.
    ja: この主幹関係は、アドレス可能性を保持する再重み付け処分が MemoryDispositionOperation に属することだけを表します。対象レコード、具体的強度、規則、証跡、結果はフィールドまたは別関係で表します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
