    predicate: reweights
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 重加权记忆记录
      en: reweights memory record
      ja: 記憶レコードを再重み付けする
    definitions:
      zh: MemoryDecay —reweights→ MemoryRecord 表示一次已执行衰减将同一既有且可寻址记录的检索强度降低。
      en: MemoryDecay —reweights→ MemoryRecord means one executed decay lowers the retrieval strength of the same existing and addressable record.
      ja: MemoryDecay —reweights→ MemoryRecord は、一つの実行済み減衰が同じ既存でアドレス可能なレコードの検索強度を下げることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达每个衰减事实对具体目标的作用，不对所有实现设定固定运行时基数。
      en: This relation expresses each decay fact's effect on a concrete target and imposes no fixed runtime cardinality across implementations.
      ja: この関係は各減衰事実の具体対象への効果を表し、実装全体に固定ランタイム基数を課しません。
    inverse_reading:
      predicate: is_reweighted_by
      labels:
        zh: 被衰减重加权
        en: is reweighted by decay
        ja: 減衰により再重み付けされる
    conditions:
      - id: MemoryDecay-reweights-MemoryRecord-same-target-and-lower-strength
        severity: error
        expression_language: plain
        expression: "Assert only when the relation target matches target_record_ref, strength_after is strictly lower than strength_before, the record remains addressable, and decay_evidence_digest covers the values and rule."
        explanation:
          zh: 关系必须指向实际被重加权的同一记录，并以较低强度、持续可寻址性和证据支持；不能用邻近记录或零值删除替代。
          en: The relation must point to the same record actually reweighted and be supported by lower strength, retained addressability, and evidence; a nearby record or zero-value deletion cannot substitute.
          ja: 関係は実際に再重み付けされた同じレコードを指し、より低い強度、保持されたアドレス可能性、証跡で支えられなければなりません。近接レコードやゼロ値削除では代替できません。
        source_claims:
          - claim-memory-decay-strength
          - claim-memory-decay-evidence
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryDecay-reweights-MemoryRecord-example-positive

        labels:
          zh: 同一记录的重加权
          en: Reweighting the same record
          ja: 同じレコードの再重み付け

        descriptions:
          zh: mem-op-decay-2501 将 record-2501-v1 从 0.80 降为 0.35，记录保持可读且证据摘要覆盖规则和两项值。
          en: mem-op-decay-2501 lowers record-2501-v1 from 0.80 to 0.35, the record remains readable, and the evidence digest covers the rule and both values.
          ja: mem-op-decay-2501 は record-2501-v1 を 0.80 から 0.35 に下げ、レコードは読取り可能なままで、証跡ダイジェストは規則と両値をカバーします。
        field_values:
          operation_id: mem-op-decay-2501
          target_record_ref: record-2501-v1
          strength_before: 0.80
          strength_after: 0.35
          decay_rule_ref: decay-rule-inactivity-v3
          active_tier_addressable: true
        related_node_ids:
          - MemoryDecay
          - MemoryRecord
        related_relation_ids:
          - MemoryDecay-reweights-MemoryRecord

        source_claims:
          - claim-memory-decay-strength
          - claim-memory-decay-evidence
      - id: MemoryDecay-reweights-MemoryRecord-example-boundary-eviction

        labels:
          zh: 驱逐不能伪装为重加权
          en: Eviction cannot masquerade as reweighting
          ja: 追い出しは再重み付けに偽装できない

        descriptions:
          zh: mem-op-evict-2501 将 record-2501-v1 从活动层移出，活动层查询无法返回该记录，也没有较低的新强度。
          en: mem-op-evict-2501 removes record-2501-v1 from the active tier, active-tier queries cannot return it, and no lower retained strength exists.
          ja: mem-op-evict-2501 は record-2501-v1 をアクティブ層から除去し、アクティブ層クエリは返せず、より低く保持された強度もありません。
        field_values:
          operation_id: mem-op-evict-2501
          target_record_ref: record-2501-v1
          disposition_kind: eviction
          active_tier_addressable: false
          strength_after: absent
        related_node_ids:
          - MemoryDecay
          - MemoryEviction
          - MemoryRecord
        related_relation_ids:
          - MemoryDecay-reweights-MemoryRecord
          - MemoryEviction-evicts-MemoryRecord

        source_claims:
          - claim-memory-decay-boundary
    source_claims:
      - claim-memory-decay-strength
      - claim-memory-decay-evidence
    distinct_fact_rationale:
      zh: 此关系表达一次衰减对特定记录的数值效果，不表达处置类型成员资格、记录有效性、缓存驻留、保留资格、结果或审计。
      en: This relation expresses one decay's numeric effect on a particular record; it does not express disposition type membership, record validity, cache residency, retention eligibility, result, or audit.
      ja: この関係は一つの減衰の特定レコードへの数値効果を表し、処分型所属、レコード有効性、キャッシュ常駐、保持適格性、結果、監査を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:MemoryRecord
sources:
  - id: elasticsearch-function-score
    title: Elasticsearch function score query
    source_type: official-doc
    url: https://www.elastic.co/guide/en/elasticsearch/reference/current/query-dsl-function-score-query.html
    relevance: Documents decay-style score functions that adjust ranking while keeping the indexed document identity intact.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, agents, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests used to bind auditable decay evidence.
source_claims:
  - id: claim-memory-decay-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from the entities it uses and related provenance facts. Moonweave records decay as an executed activity with target, actor, time, result, and audit evidence rather than a displayed score or future policy.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-decay-identity
    source: w3c-prov-o
    supports: PROV-O allows activities and provenance facts to have stable independent identities. Moonweave uses one operation ID to join a decay's target, strengths, evidence, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-decay-target
    source: w3c-prov-o
    supports: PROV-O distinguishes the existing entities used by an activity from entities generated later. Moonweave reweights the same existing memory record and does not replace it with a candidate or successor output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-decay-strength
    source: elasticsearch-function-score
    supports: Elasticsearch documents score and decay functions that modify ranking values while the indexed document remains the same entity. Moonweave represents decay as a strictly lower before-and-after retrieval strength for the same addressable record.
    locator: "Elasticsearch function score query decay functions and score calculation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-decay-basis
    source: elasticsearch-function-score
    supports: Elasticsearch parameterizes score adjustment with explicit functions and inputs. Moonweave records elapsed-time, inactivity, or priority basis together with a versioned rule rather than an unexplained low score.
    locator: "Elasticsearch function score query function parameters"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-decay-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over target version, strengths, rule, and observed inputs to bind decay evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-decay-boundary
    source: elasticsearch-function-score
    supports: Score adjustment changes ranking rather than deleting or invalidating the indexed document. Moonweave keeps reweighting distinct from active-tier eviction, retention expiry, deletion, and content revision.
    locator: "Elasticsearch function score query scoring behavior"
    evidence_kind: ontology-design-inference
    confidence: high
