  - id: MemoryExpiration-governed_by-MemoryRetentionPolicy
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受记忆保留策略治理
      en: is governed by memory retention policy
      ja: 記憶保持ポリシーにより統治される
    definitions:
      zh: MemoryExpiration —governed_by→ MemoryRetentionPolicy 表示一次到期使用某一特定策略版本来确定目标范围、到期条件和资格效果。
      en: MemoryExpiration —governed_by→ MemoryRetentionPolicy means one expiration uses a specific policy version to determine target scope, expiry condition, and eligibility effect.
      ja: MemoryExpiration —governed_by→ MemoryRetentionPolicy は、一つの到期が特定ポリシーバージョンを用いて対象スコープ、期限条件、資格効果を決定することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达每次到期与适用策略版本的治理事实，不对所有实现设定固定运行时基数。
      en: This relation expresses the governance fact between each expiration and its applicable policy version and imposes no fixed runtime cardinality across implementations.
      ja: この関係は各到期と適用ポリシーバージョン間の統治事実を表し、実装全体に固定ランタイム基数を課しません。
    inverse_reading:
      predicate: governs_expiration
      labels:
        zh: 治理到期操作
        en: governs expiration operation
        ja: 到期操作を統治する
    conditions:
      - id: MemoryExpiration-governed_by-MemoryRetentionPolicy-version-and-scope-match
        severity: error
        expression_language: plain
        expression: "Assert only when the relation target matches retention_policy_ref, the policy version applies to target_record_ref at expiry_deadline, expiry_basis is defined by it, and expiration_evidence_digest covers the application."
        explanation:
          zh: 策略名称、旧版本或相邻租户不能替代精确策略版本与范围匹配；治理关系必须反映实际使用的规则。
          en: Policy name, an old version, or a neighboring tenant cannot substitute for exact policy version and scope match; the governance relation must reflect the rule actually used.
          ja: ポリシー名、旧バージョン、隣接テナントでは正確なポリシーバージョンとスコープ一致を代替できません。統治関係は実際に使われた規則を反映しなければなりません。
        source_claims:
          - claim-memory-expiration-policy
          - claim-memory-expiration-evidence
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryExpiration-governed_by-MemoryRetentionPolicy-example-positive

        labels:
          zh: 特定策略版本治理到期
          en: Specific policy version governs expiration
          ja: 特定ポリシーバージョンが到期を統治する

        descriptions:
          zh: mem-op-expire-2801 使用 retention-policy-tenant-a-30d@v3 对 tenant-a 的 record-2801-v1 计算截止并标记不合格。
          en: mem-op-expire-2801 uses retention-policy-tenant-a-30d@v3 to calculate the deadline for tenant-a record-2801-v1 and mark it ineligible.
          ja: mem-op-expire-2801 は retention-policy-tenant-a-30d@v3 を用いて tenant-a の record-2801-v1 の期限を計算し不適格と印付けます。
        field_values:
          operation_id: mem-op-expire-2801
          target_record_ref: record-2801-v1
          retention_policy_ref: retention-policy-tenant-a-30d@v3
          expiry_basis: retention_deadline
          expiry_deadline: "2026-07-18T22:59:59Z"
        related_node_ids:
          - MemoryExpiration
          - MemoryRetentionPolicy
        related_relation_ids:
          - MemoryExpiration-governed_by-MemoryRetentionPolicy

        source_claims:
          - claim-memory-expiration-policy
          - claim-memory-expiration-evidence
      - id: MemoryExpiration-governed_by-MemoryRetentionPolicy-example-boundary-wrong-version

        labels:
          zh: 不适用的策略版本不治理到期
          en: Inapplicable policy version does not govern expiration
          ja: 適用不能なポリシーバージョンは到期を統治しない

        descriptions:
          zh: retention-policy-tenant-a-90d@v2 名称相近但版本过期且期限为九十天，不是 record-2801-v1 实际使用的三十天规则。
          en: retention-policy-tenant-a-90d@v2 has a similar name but is an older 90-day rule, not the 30-day rule actually used for record-2801-v1.
          ja: retention-policy-tenant-a-90d@v2 は類似名ですが古い 90 日規則であり、record-2801-v1 に実際に使われた 30 日規則ではありません。
        field_values:
          operation_id: mem-op-expire-2801
          target_record_ref: record-2801-v1
          candidate_policy_ref: retention-policy-tenant-a-90d@v2
          actual_policy_ref: retention-policy-tenant-a-30d@v3
          candidate_expiry_deadline: "2026-09-16T23:00:00Z"
        related_node_ids:
          - MemoryExpiration
          - MemoryRetentionPolicy
        related_relation_ids:
          - MemoryExpiration-governed_by-MemoryRetentionPolicy

        source_claims:
          - claim-memory-expiration-policy
    source_claims:
      - claim-memory-expiration-policy
      - claim-memory-expiration-evidence
    distinct_fact_rationale:
      zh: 此关系表达实际到期所使用的具体保留策略版本，不表达策略定义本身、目标资格效果、删除、物理清除、结果或审计事件。
      en: This relation expresses the concrete retention-policy version used by an actual expiration; it does not express policy definition itself, target eligibility effect, deletion, physical clearance, result, or audit event.
      ja: この関係は実際の到期で使われた具体的保持ポリシーバージョンを表し、ポリシー定義自体、対象資格効果、削除、物理消去、結果、監査イベントを表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:MemoryRetentionPolicy
sources:
  - id: dynamodb-ttl
    title: Using time to live in DynamoDB
    source_type: official-doc
    url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/TTL.html
    relevance: Documents per-item expiration timestamps, items pending asynchronous TTL deletion, and the need to filter expired items from use before cleanup completes.
  - id: redis-expire
    title: Redis EXPIRE command
    source_type: official-doc
    url: https://redis.io/docs/latest/commands/expire/
    relevance: Documents time-to-live configuration, deadline behavior, and expiry-related key lifecycle semantics.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, agents, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests used to bind auditable expiration evidence.
source_claims:
  - id: claim-memory-expiration-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities and provenance facts around it. Moonweave records expiration as an executed operation with target, policy, actor, time, result, and audit evidence rather than a policy setting or future schedule.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-expiration-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable identities. Moonweave uses one operation ID to join an expiration's target, policy, eligibility effect, evidence, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-expiration-target
    source: w3c-prov-o
    supports: PROV-O distinguishes specific entities acted upon by an activity from nearby or later-generated entities. Moonweave identifies the exact existing memory record that reaches a retention condition.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-expiration-policy
    source: dynamodb-ttl
    supports: DynamoDB TTL uses a configured expiration attribute for each item and determines eligibility from that time. Moonweave applies a concrete versioned retention rule and records its deadline and basis for a specific target rather than inferring expiry from capacity or a policy name.
    locator: "DynamoDB TTL overview and expiration timestamp requirements"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-expiration-effect
    source: dynamodb-ttl
    supports: DynamoDB documents expired items pending deletion and recommends filtering them from read and write operations. Moonweave marks a record retention_ineligible for normal memory retrieval once the expiry condition is applied.
    locator: "DynamoDB TTL expired items and filtering expired items from operations"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-expiration-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over target version, policy version, scope, deadline, eligibility effect, and execution output to bind expiration evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-expiration-boundary
    source: dynamodb-ttl
    supports: DynamoDB states that expired items can remain pending asynchronous deletion and can be filtered from operations before deletion. Moonweave keeps applied expiry eligibility distinct from later deletion, tombstone production, media sanitization, cache eviction, decay, and future scheduling.
    locator: "DynamoDB TTL overview and Working with expired items and time to live"
    evidence_kind: ontology-design-inference
    confidence: high
