        en: inverse is governed by memory retention policy
        ja: 逆方向読取
    conditions:
      - id: MemoryExpiration-governed_by-MemoryRetentionPolicy-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when expiration policy ID and version match the target, the policy applies to the record scope, and its expiry condition was actually used.
        explanations:
          zh: 仅当 expiration.policy_id/version 与目标策略一致，策略适用于目标记录 scope，且 expiry 条件实际被使用时成立。
          en: Assert only when expiration policy ID and version match the target, the policy applies to the record scope, and its expiry condition was actually used.
          ja: expiration policy ID/versionがtargetと一致しpolicyがrecord scopeへ適用されexpiry conditionが実際に使われた時だけassertします。
        source_claims:
          - claim-memory-expiration-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
