        explanations:
          zh: 仅当 current_time 达到 policy expiry_at，目标 record_id 匹配且结果记录 eligibility=expired 时成立。
          en: Assert only when current_time reaches policy expiry_at, target_record_id matches, and the result records eligibility=expired.
          ja: current_timeがpolicy expiry_atへ達しtarget_record_id一致かつresultがeligibility=expiredを記録する時だけassertします。
        source_claims:
          - claim-memory-expiration-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryExpiration-marks_ineligible-MemoryRecord-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 标记记录到期不再合格正例
          en: "Positive case: marks record expired and ineligible"
          ja: recordをexpired/ineligibleにする正例
        scenario_id: MemoryExpiration-marks_ineligible-MemoryRecord:positive:20260716
        descriptions:
          zh: record-1506 在 expiry_at 到达后由 expire-1506 改为 retrieval_eligible=false；后台 TTL 删除可能稍后发生。
          en: At expiry_at, expire-1506 changes record-1506 to retrieval_eligible=false while TTL background deletion may occur later.
          ja: expiry_at 到達時 expire-1506 は record-1506 を retrieval_eligible=false にし TTL background deletion は後で起こり得ます。
        field_values: {}
        related_node_ids:
          - MemoryExpiration
          - MemoryRecord
        related_relation_ids:
          - MemoryExpiration-marks_ineligible-MemoryRecord
        expected_result:
          zh: 建立 expire-1506 marks_ineligible record-1506，并立即从正常召回候选中排除，但不伪造删除完成。
          en: Assert expire-1506 marks_ineligible record-1506 and exclude it from normal recall immediately without fabricating completed deletion.
          ja: expire-1506 marks_ineligible record-1506 を確立し normal recall から即時除外しますが completed deletion は作りません。
        why_valid_or_invalid:
          zh: 时间条件、目标和资格状态一致；DynamoDB TTL 明确允许到期项目在后台删除前短暂保留。
          en: Time condition, target, and eligibility state agree, and DynamoDB TTL explicitly allows expired items to remain pending background deletion.
          ja: time condition・target・eligibility state が一致し DynamoDB TTL は expired item の background deletion pending を許します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-expiration-001
      - id: MemoryExpiration-marks_ineligible-MemoryRecord-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 标记记录到期不再合格边界例
          en: "Boundary case: marks record expired and ineligible"
          ja: recordをexpired/ineligibleにする境界例
        scenario_id: MemoryExpiration-marks_ineligible-MemoryRecord:boundary:20260716
        descriptions:
          zh: record-1507 尚未到 expiry_at，只因低 LFU 频率被缓存驱逐；持久层检索仍应返回它。
          en: record-1507 has not reached expiry_at and is evicted only for low LFU frequency; durable retrieval must still return it.
          ja: record-1507 は expiry_at 前で low LFU により cache eviction されただけで durable retrieval は返す必要があります。
        field_values: {}
        related_node_ids:
          - MemoryExpiration
          - MemoryRecord
        related_relation_ids:
          - MemoryExpiration-marks_ineligible-MemoryRecord
        expected_result:
          zh: 拒绝 expire-1506 marks_ineligible record-1507；只记录其缓存驻留变化，不改变正常检索资格。
          en: Reject marking record-1507 ineligible; record only its cache-residency change and preserve normal retrieval eligibility.
          ja: record-1507 marks_ineligible を拒否し cache residency change のみ記録して normal retrieval eligibility を保持します。
        why_valid_or_invalid:
          zh: 容量驱逐不满足时间、同意或作用域到期条件，把它当 expiration 会在有效期内隐藏合法记忆。
          en: Capacity eviction satisfies no time, consent, or scope expiry condition; treating it as expiration would hide valid memory prematurely.
          ja: capacity eviction は time・consent・scope expiry condition を満たさず expiration 化は valid memory を早期非表示にします。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
