schema: moonweave.ai/ontology-node/v1
id: MemoryExpiration
kind: concept
labels:
  zh: 记忆到期
  en: Memory expiration
  ja: 記憶期限切れ
semantics:
  short_definition:
    zh: 保留策略或 TTL 到期触发的记录失效。
    en: Record invalidation triggered by retention policy or TTL expiry.
    ja: retention policy/TTL 期限で trigger される record 失効。
  definition:
    zh: MemoryExpiration 是 MemoryDispositionOperation：当 MemoryRetentionPolicy 或 LangGraph BaseStore TTL 到期时，使 MemoryRecord 按策略不可再作有效记忆使用。与 MemoryEviction 不同，到期由时间/策略驱动而非容量压力；成功应登记 expiration_operation_id 与 invalidation 事实。
    en: MemoryExpiration is a MemoryDispositionOperation that, when MemoryRetentionPolicy or LangGraph BaseStore TTL expires, makes a MemoryRecord unusable as valid memory per policy. Unlike MemoryEviction, expiry is time/policy driven rather than capacity pressure; success should record expiration_operation_id and invalidation facts.
    ja: MemoryExpiration は MemoryRetentionPolicy または LangGraph TTL 期限で MemoryRecord を policy 通り unusable にする MemoryDispositionOperation。MemoryEviction と異なり時間/方針驱动。expiration_operation_id/invalidate 事実を記録。
  why_needed:
    zh: 静默 TTL 丢失无法证明保留策略是否执行；必须建模为可审计到期操作。
    en: Silent TTL loss cannot prove retention policy executed; expiry must be modeled as an auditable operation.
    ja: 静默 TTL 消失では retention policy 実行を証明できない。監査可能 expiration が必要。
  includes:
    - zh: 纳入 LangGraph put ttl、DynamoDB TTL 与策略定义的固定保留期到期。
      en: Includes LangGraph put ttl, DynamoDB TTL, and policy-defined fixed retention expiry.
      ja: LangGraph put ttl/DynamoDB TTL/固定 retention 期限。
  excludes:
    - zh: 排除容量驱逐、显式用户删除与写入前丢弃。
      en: Excludes capacity eviction, explicit user delete, and pre-write discard.
      ja: capacity eviction/explicit delete/pre-write discard を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 LangGraph await store.put(ns, key, value, ttl=86400) 到期与 MemoryRetentionPolicy 固定保留期；expiration_operation_id 绑定 ttl_seconds、expired_at 与 consumed_record_id。
    en: Map LangGraph await store.put(ns, key, value, ttl=86400) expiry and MemoryRetentionPolicy fixed retention; expiration_operation_id binds ttl_seconds, expired_at, and consumed_record_id.
    ja: LangGraph put ttl=86400 と MemoryRetentionPolicy 固定 retention を写像。
  typical_input:
    - description: TTL put with expiry
      format: |
        await store.put(("tenant-7","user-42"), "prefs", value, ttl=86400)
      source_claims: [claim-expiration-langgraph]
  typical_output:
    - description: Expiration operation
      format: |
        {"expiration_operation_id": "expire-86400", "expired_at": "2026-07-17T09:30:00Z", "ttl_seconds": 86400}
      source_claims: [claim-expiration-design]
  reference_implementations:
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.put with ttl and TTLConfig expiry.
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Metadata expiration timestamps where supported.
structure:
  identity_keys: [expiration_operation_id]
  fields:
    - id: expiration_operation_id
      labels: {zh: 到期操作标识, en: Expiration operation identifier, ja: 期限操作識別子}
      definitions:
        zh: 标识一次保留/TTL 到期处置活动。
        en: Identifies one retention/TTL expiry disposition activity.
        ja: 一 retention/TTL expiry disposition activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: expire-86400
      allowed_values: []
      source_claims: [claim-expiration-id]
    - id: ttl_seconds
      labels: {zh: TTL 秒数, en: TTL seconds, ja: TTL 秒数}
      definitions:
        zh: put 时声明或策略换算的存活秒数。
        en: Survival seconds declared on put or derived from policy.
        ja: put 宣言または policy 換算の存続秒数。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 86400
      allowed_values: []
      source_claims: [claim-expiration-langgraph]
  constraints: []
  required_relations: []
examples:
  - id: MemoryExpiration-example-langgraph-ttl
    labels: {zh: LangGraph TTL 到期, en: LangGraph TTL expiry, ja: LangGraph TTL 期限}
    descriptions:
      zh: put 时 ttl=86400 的 Item 到期后 expire-86400 登记 MemoryExpiration，而非静默消失。
      en: An Item put with ttl=86400 triggers expire-86400 as MemoryExpiration rather than silent disappearance.
      ja: ttl=86400 put Item 期限後 expire-86400 を MemoryExpiration として登録。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/reference/store/, version: TTLConfig}
    field_values: {expiration_operation_id: expire-86400, ttl_seconds: 86400}
    related_node_ids: [MemoryExpiration, MemoryDispositionOperation]
    related_relation_ids: []
    source_claims: [claim-expiration-langgraph, claim-expiration-design]
  - id: MemoryExpiration-example-retention-policy
    labels: {zh: 保留策略到期, en: Retention policy expiry, ja: retention policy 期限}
    descriptions:
      zh: policy-session-memory@v3 规定 30 天保留，expire-30d 在 expired_at 触发失效。
      en: policy-session-memory@v3 sets 30-day retention; expire-30d invalidates at expired_at.
      ja: 30 日 retention で expire-30d が expired_at に失効。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: retention}
    field_values: {expiration_operation_id: expire-30d, retention_days: 30}
    related_node_ids: [MemoryExpiration, MemoryRetentionPolicy]
    related_relation_ids: []
    source_claims: [claim-expiration-design]
  - id: MemoryExpiration-example-not-eviction
    labels: {zh: 到期非驱逐, en: Expiry is not eviction, ja: 期限は eviction ではない}
    descriptions:
      zh: evict-900 由 Redis maxmemory 触发；expire-86400 由 TTL 时间触发。
      en: evict-900 is triggered by Redis maxmemory; expire-86400 by TTL time.
      ja: evict は maxmemory、expire は TTL 時間。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryExpiration, MemoryEviction]
    related_relation_ids: []
    source_claims: [claim-expiration-design]
  - id: MemoryExpiration-example-dynamodb
    labels: {zh: DynamoDB TTL, en: DynamoDB TTL, ja: DynamoDB TTL}
    descriptions:
      zh: DynamoDB TTL 属性到期后 expire-ddb-120 登记 MemoryExpiration 并绑定 record-120-v1。
      en: After DynamoDB TTL attribute fires, expire-ddb-120 records MemoryExpiration bound to record-120-v1.
      ja: DynamoDB TTL 後 expire-ddb-120 が record-120-v1 に bind。
    example_source: {product: AWS DynamoDB, url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/TTL.html, version: TTL}
    field_values: {expiration_operation_id: expire-ddb-120}
    related_node_ids: [MemoryExpiration]
    related_relation_ids: []
    source_claims: [claim-expiration-design]
parent_relation:
  id: MemoryExpiration-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆处置操作, en: is a memory disposition operation, ja: 記憶処置操作の一種}
  definitions:
    zh: MemoryExpiration —is_a→ MemoryDispositionOperation 表示保留策略或 TTL 到期使 record 失效。
    en: MemoryExpiration —is_a→ MemoryDispositionOperation holds because retention policy or TTL expiry invalidates the record.
    ja: retention/TTL 期限で record 失効のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when expiry is driven by retention policy or TTL rather than capacity eviction.
      explanations:
        zh: 仅当到期由保留策略或 TTL 驱动而非容量驱逐时成立。
        en: Assert only when expiry is driven by retention policy or TTL rather than capacity eviction.
        ja: retention/TTL 驱动で capacity eviction でない時のみ。
      source_claims: [claim-expiration-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-expiration-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-langgraph-expiration
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: BaseStore.put ttl and TTLConfig.
  - id: src-expiration-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Expiration must be auditable, not silent loss.
source_claims:
  - id: claim-expiration-langgraph
    source: src-langgraph-expiration
    supports: LangGraph BaseStore supports ttl on put for time-bounded Items.
    locator: BaseStore.put, TTLConfig
    evidence_kind: primary-api
    confidence: high
  - id: claim-expiration-design
    source: src-expiration-design
    supports: MemoryExpiration records policy or TTL driven invalidation.
    locator: MemoryExpiration boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-expiration-id
    source: src-expiration-design
    supports: expiration_operation_id identifies one expiry activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
