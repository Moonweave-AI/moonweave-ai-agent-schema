      en: MemoryExpiration —governed_by→ MemoryRetentionPolicy means expiry time, scope, grace period, and cleanup behavior are supplied by a specific retention-policy version.
      ja: MemoryExpiration —governed_by→ MemoryRetentionPolicy はexpiry time・scope・grace period・cleanup behaviorが特定retention-policy版で与えられることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
