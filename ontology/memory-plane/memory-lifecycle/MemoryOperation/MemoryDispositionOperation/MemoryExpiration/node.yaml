schema: moonweave.ai/ontology-node/v1
id: MemoryExpiration
kind: concept
status: accepted
labels:
  zh: 记忆到期
  en: Memory expiration
  ja: 記憶期限切れ
semantics:
  short_definition:
    zh: 根据适用保留规则达到明确到期条件时，使既有记忆记录失去正常检索或复用资格的处置操作。
    en: A disposition operation that makes an existing memory record ineligible for normal retrieval or reuse when an applicable retention rule reaches an explicit expiry condition.
    ja: 適用される保持規則が明示的な期限切れ条件に達したとき、既存記憶レコードを通常検索または再利用に不適格にする処分操作です。
  definition:
    zh: MemoryExpiration 是一种已执行的 MemoryDispositionOperation。它对既有 MemoryRecord 应用特定版本的 MemoryRetentionPolicy，验证 TTL、保留截止、同意期限或作用域结束已经达到，并记录策略、目标、到期时间、资格效果和证据。该操作使记录不再参与正常记忆检索或复用，但不声称记录已被物理清除、全局失效或产生墓碑；若需要实际无效化或删除，必须由独立的 MemoryDelete 记录。容量导致的活动层移除是 MemoryEviction，检索强度下降是 MemoryDecay，未执行的将来计划不是到期操作。
    en: MemoryExpiration is an executed MemoryDispositionOperation. It applies a specific version of MemoryRetentionPolicy to an existing MemoryRecord, verifies that a TTL, retention deadline, consent deadline, or scope end has been reached, and records policy, target, expiry time, eligibility effect, and evidence. The operation removes the record from normal memory retrieval or reuse but does not claim that the record was physically cleared, globally invalidated, or tombstoned; actual invalidation or deletion must be recorded by a separate MemoryDelete. Capacity-driven active-tier removal is MemoryEviction, retrieval-strength reduction is MemoryDecay, and an unexecuted future plan is not expiration.
    ja: MemoryExpiration は実行済みの MemoryDispositionOperation です。既存 MemoryRecord に特定バージョンの MemoryRetentionPolicy を適用し、TTL、保持期限、同意期限、またはスコープ終了に達したことを検証して、ポリシー、対象、期限時刻、資格効果、証跡を記録します。この操作はレコードを通常の記憶検索または再利用から除外しますが、物理消去、全体失効、墓標生成を主張しません。実際の失効または削除は別の MemoryDelete で記録しなければなりません。容量起因のアクティブ層除去は MemoryEviction、検索強度低下は MemoryDecay、未実行の将来計画は到期ではありません。
  why_needed:
    zh: 到期资格、异步清理和删除完成具有不同的时间与证据边界；将它们合并会让系统过早声称内容已删除，或在删除前继续把不应使用的记忆提供给正常检索。
    en: Expiry eligibility, asynchronous cleanup, and completed deletion have different time and evidence boundaries; collapsing them can make a system claim deletion too early or keep serving memory that should no longer be used before deletion occurs.
    ja: 期限切れ適格性、非同期清掃、完了削除は時刻と証跡の境界が異なります。それらを統合すると、削除を早期に主張したり、削除前に使用すべきでない記憶を通常検索で提供し続けたりします。
  includes:
    - zh: 已执行的 TTL 到达、保留截止到达、同意期限到达或会话与作用域结束后，对既有记录施加的正常检索不合格标记。
      en: Executed normal-retrieval-ineligibility marking of an existing record after TTL arrival, retention-deadline arrival, consent-deadline arrival, or session and scope end.
      ja: TTL 到達、保持期限到達、同意期限到達、またはセッションとスコープ終了後に、既存レコードへ実行済みで適用する通常検索不適格の印付けを含みます。
  excludes:
    - zh: 因容量移出缓存或索引层、基于用户或法律授权使记录失效、仅降低检索权重、仅创建或修改保留策略、在将来到期但尚未发生效果的计划，以及以“到期”掩盖完成删除。
      en: Removing a cache or index copy because of capacity, invalidating a record under user or legal authorization, lowering retrieval weight only, creating or changing a retention policy only, a plan whose future expiry has not produced an effect, and masking completed deletion as "expiry".
      ja: 容量によるキャッシュまたはインデックスコピー除去、利用者または法的許可によるレコード失効、検索重みだけの低下、保持ポリシーの作成または変更だけ、将来期限がまだ効果を生じていない計画、完了削除を「期限切れ」として隠すことを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将到期实现为策略版本和记录快照绑定的已执行资格转换：验证目标范围和截止条件，在实际发生时间把正常检索资格改为不合格，并保留证据摘要。清理或介质删除可以随后执行，但必须作为单独的删除事实记录；不能从策略配置、TTL 字段或后台任务排程本身推断本次到期已经发生。
    en: "Implement expiration as an executed eligibility transition bound to a policy version and record snapshot: verify target scope and deadline condition, set normal-retrieval eligibility to ineligible at the actual occurrence time, and retain an evidence digest. Cleanup or media deletion can occur later but must be recorded as a separate deletion fact; do not infer that expiration happened merely from policy configuration, a TTL field, or a scheduled background task."
    ja: 到期はポリシーバージョンとレコードスナップショットに結び付けた実行済み資格遷移として実装します。対象スコープと期限条件を検証し、実際の発生時刻に通常検索資格を不適格へ変更し、証跡ダイジェストを保持します。清掃または媒体削除は後で起き得ますが、別の削除事実として記録しなければなりません。ポリシー設定、TTL フィールド、予定されたバックグラウンドタスクだけから到期が起きたと推論してはいけません。
  typical_input:
    - description: An existing target repeated in the parent disposition collection, an applicable versioned retention policy, an expiry condition and deadline, executor identity, and actual execution start.
      format: "{operation_id, operation_kind:'disposition', target_record_ref, target_record_refs:[target_record_ref], disposition_kind:'expiration', disposition_basis:'retention_policy', retention_policy_ref, expiry_basis, expiry_deadline, actor_ref, started_at}"
  typical_output:
    - description: An applied normal-retrieval-ineligibility fact with aligned disposition effect, expiry time, cleanup state, evidence digest, result, and audit event.
      format: "{operation_id, status:'succeeded', eligibility_effect:'retention_ineligible', disposition_effect:'retention_ineligible', expired_at, disposed_at:expired_at, expiration_evidence_digest, disposition_evidence_digest:expiration_evidence_digest, cleanup_state, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: Amazon DynamoDB time to live
      url: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/TTL.html
      description: Documents per-item expiration timestamps and asynchronous deletion of expired items.
    - name: Redis EXPIRE command
      url: https://redis.io/docs/latest/commands/expire/
      description: Documents time-to-live configuration and expiry behavior for keys.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes executed activities, entities, agents, time, and provenance facts.
  source_claims:
    - claim-memory-expiration-activity
    - claim-memory-expiration-policy
    - claim-memory-expiration-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次到期的目标、策略、资格效果、证据、结果和审计事实。
        en: Reuses the stable MemoryOperation identity to join one expiration's target, policy, eligibility effect, evidence, result, and audit facts.
        ja: 親 MemoryOperation の安定識別子を再利用し、一つの到期の対象、ポリシー、資格効果、証跡、結果、監査事実を結びます。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-expire-2801
      source_claims:
        - claim-memory-expiration-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承并固定为 disposition，表示政策条件已实际造成既有记录的资格变化，而不是仅配置 TTL 或排期清理。
        en: Inherited and fixed to disposition, showing that a policy condition actually changed an existing record's eligibility rather than merely configuring a TTL or scheduling cleanup.
        ja: 継承して disposition に固定する。方針条件が既存レコードの資格を実際に変えたことを示し、TTL の設定または清掃の予定ではない。
      allowed_values: [disposition]
      pattern: null
      example_value: disposition
      source_claims: [claim-memory-expiration-activity]
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的到期工作单元状态；只有成功的执行加上实际资格效果，才能和未来到期计划区分。
        en: The inherited expiration-work-unit status; only a successful execution plus an applied eligibility effect distinguishes it from a future expiry plan.
        ja: 期限切れ作業単位の状態を継承する。成功した実行と適用済みの資格効果が揃って初めて、将来の期限切れ計画と区別できる。
      allowed_values: [running, succeeded, failed, partially_succeeded, rejected, cancelled]
      pattern: null
      example_value: succeeded
      source_claims: [claim-memory-expiration-activity]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的实际到期检查与资格变更开始时间，不得用策略发布时间、TTL 字段写入时间或任务排程时间代替。
        en: The inherited actual start of expiry checking and eligibility change; policy publication, TTL-field write, and task-scheduling time cannot substitute.
        ja: 期限切れ検査と資格変更の実行開始時刻を継承する。方針公開、TTL フィールド書込み、タスク予定時刻で代用してはならない。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T23:00:00Z"
      source_claims: [claim-memory-expiration-activity]
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的到期执行者；策略作者、数据主体或清理队列消费者不是该资格转移的执行者，除非审计证据如此绑定。
        en: The inherited expiration executor; a policy author, data subject, or cleanup-queue consumer is not this eligibility transition's executor unless audit evidence binds it so.
        ja: 期限切れの実行者を継承する。方針作成者、データ主体、清掃キュー消費者は、監査証拠で結び付けられない限り、この資格遷移の実行者ではない。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: retention-enforcer-1
      source_claims: [claim-memory-expiration-activity]
    - id: target_record_refs
      labels:
        zh: 目标记录引用集合
        en: target record references
        ja: 対象レコード参照集合
      datatype: string
      required: true
      cardinality: { min: 1, max: null }
      definitions:
        zh: 继承的处置目标集合；单记录到期将 target_record_ref 作为唯一已满足策略到期条件的既有记录，不能将同租户记录或未来清理输出列入其中。
        en: The inherited disposition-target collection. A single-record expiration places target_record_ref in it as the sole existing record that met the policy's expiry condition; same-tenant records or future cleanup outputs do not belong in it.
        ja: 処置対象集合を継承する。単一レコードの期限切れでは、方針の期限条件を満たした唯一の既存レコードとして target_record_ref を含める。同一テナントのレコードや将来の清掃出力を含めてはならない。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value: [record-2801-v1]
      source_claims: [claim-memory-expiration-target]
    - id: disposition_kind
      labels:
        zh: 处置种类
        en: disposition kind
        ja: 処置種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 将继承处置种类收窄为 expiration，明确该操作只改变正常检索资格，不是删除或活动层驱逐。
        en: Narrows the inherited disposition kind to expiration, making this an operation on normal-retrieval eligibility rather than deletion or active-tier eviction.
        ja: 継承した処置種別を expiration に限定する。これは通常検索の資格に対する操作であり、削除またはアクティブ層の追い出しではない。
      allowed_values: [expiration]
      pattern: null
      example_value: expiration
      source_claims: [claim-memory-expiration-boundary]
    - id: disposition_basis
      labels:
        zh: 处置依据类别
        en: disposition basis
        ja: 処置根拠種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 固定为 retention_policy；细分 expiry_basis 必须由 retention_policy_ref 的适用版本定义。
        en: Fixed to retention_policy; the granular expiry_basis must be defined by the applicable retention_policy_ref version.
        ja: retention_policy に固定する。細分化した expiry_basis は、適用される retention_policy_ref のバージョンで定義されなければならない。
      allowed_values: [retention_policy]
      pattern: null
      example_value: retention_policy
      source_claims: [claim-memory-expiration-policy]
    - id: disposition_effect
      labels:
        zh: 处置效果
        en: disposition effect
        ja: 処置効果
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 固定为 retention_ineligible，表示正常记忆检索或复用被阻止；它不表示物理清除、全局失效或墓碑产生。
        en: Fixed to retention_ineligible, meaning normal memory retrieval or reuse is blocked; it does not represent physical clearing, global invalidation, or tombstone creation.
        ja: retention_ineligible に固定する。通常の記憶検索または再利用が遮断されたことを示し、物理消去、全体無効化、墓標生成を表さない。
      allowed_values: [retention_ineligible]
      pattern: null
      example_value: retention_ineligible
      source_claims: [claim-memory-expiration-effect]
    - id: disposition_evidence_digest
      labels:
        zh: 处置证据摘要
        en: disposition evidence digest
        ja: 処置証拠ダイジェスト
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的处置证据摘要；到期中必须等于 expiration_evidence_digest，绑定目标快照、策略版本、期限条件、资格效果与实际发生时间。
        en: The inherited disposition-evidence digest. For expiration it must equal expiration_evidence_digest and bind target snapshot, policy version, expiry condition, eligibility effect, and actual occurrence time.
        ja: 処置証拠ダイジェストを継承する。期限切れでは expiration_evidence_digest と同一でなければならず、対象スナップショット、方針バージョン、期限条件、資格効果、実際の発生時刻を結び付ける。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:93d5a6c19abe60f9544187e655c3ed1a8d01f9a58a3d96812d550dc8b47dac8e
      source_claims: [claim-memory-expiration-evidence]
    - id: disposed_at
      labels:
        zh: 处置生效时间
        en: disposed at
        ja: 処置発生時刻
      datatype: date-time
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的处置生效时间；到期中必须等于 expired_at，记录资格效果实际生效的时刻，而不是日后清理完成的时刻。
        en: The inherited disposition-effective time. For expiration it must equal expired_at, the time eligibility actually changed rather than a later cleanup-completion time.
        ja: 処置の有効時刻を継承する。期限切れでは expired_at と一致し、後日の清掃完了時刻ではなく資格が実際に変わった時刻を記録する。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T23:00:00.042Z"
      source_claims: [claim-memory-expiration-effect]
    - id: target_record_ref
      labels:
        zh: 目标记录引用
        en: target record reference
        ja: 対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际达到到期条件并被标记不合格的既有 MemoryRecord；相同租户、相同策略名称或共享追踪不能替代精确目标身份。
        en: References the existing MemoryRecord that actually reached an expiry condition and is marked ineligible; the same tenant, policy name, or shared trace cannot substitute for exact target identity.
        ja: 実際に期限切れ条件に達して不適格と印付けられる既存 MemoryRecord を参照します。同じテナント、ポリシー名、共有トレースでは正確な対象識別を代替できません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-2801-v1
      source_claims:
        - claim-memory-expiration-target
    - id: retention_policy_ref
      labels:
        zh: 保留策略版本引用
        en: retention policy version reference
        ja: 保持ポリシーバージョン参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次到期实际使用的具体 MemoryRetentionPolicy 版本，必须包含足以区分版本、范围和期限规则的稳定身份。
        en: Points to the specific MemoryRetentionPolicy version actually used for this expiration and must carry stable identity sufficient to distinguish version, scope, and deadline rule.
        ja: この到期で実際に使われた特定の MemoryRetentionPolicy バージョンを指し、バージョン、スコープ、期限規則を区別するのに十分な安定識別を持たなければなりません。
      allowed_values: []
      pattern: '^retention-policy-[A-Za-z0-9._-]+@v[0-9]+$'
      example_value: retention-policy-tenant-a-30d@v3
      source_claims:
        - claim-memory-expiration-policy
    - id: expiry_basis
      labels:
        zh: 到期依据
        en: expiry basis
        ja: 期限切れ根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指出策略中实际达到的到期条件，而不是将容量压力、手工删除或权重变化混写为到期。
        en: States the expiry condition actually reached in the policy rather than writing capacity pressure, manual deletion, or weight change as expiration.
        ja: 容量圧力、手動削除、重み変更を到期として書くのではなく、ポリシー内で実際に達した期限切れ条件を示します。
      allowed_values:
        - ttl_elapsed
        - retention_deadline
        - consent_deadline
        - scope_end
      pattern: null
      example_value: retention_deadline
      source_claims:
        - claim-memory-expiration-policy
    - id: expiry_deadline
      labels:
        zh: 到期截止时间
        en: expiry deadline
        ja: 期限切れ締切時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录由适用策略和目标快照计算出的到期阈值时间，不能以任务排程或日志摄取时间代替。
        en: Records the expiry threshold time calculated from applicable policy and target snapshot and cannot be substituted by job scheduling or log-ingestion time.
        ja: 適用ポリシーと対象スナップショットから計算された期限切れしきい値時刻を記録し、ジョブ予定またはログ取込み時刻では代替できません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T22:59:59Z"
      source_claims:
        - claim-memory-expiration-policy
    - id: eligibility_effect
      labels:
        zh: 资格效果
        en: eligibility effect
        ja: 資格効果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次到期实际施加的效果，即目标记录不再可用于正常记忆检索或复用；它不是删除完成、墓碑生成或物理清除的替代名称。
        en: "Records the effect actually applied by this expiration: the target record is no longer eligible for normal memory retrieval or reuse; it is not a substitute name for completed deletion, tombstone production, or physical clearance."
        ja: この到期で実際に適用された効果、すなわち対象レコードが通常の記憶検索または再利用に不適格になったことを記録します。完了削除、墓標生成、物理消去の代替名称ではありません。
      allowed_values:
        - retention_ineligible
      pattern: null
      example_value: retention_ineligible
      source_claims:
        - claim-memory-expiration-effect
    - id: expired_at
      labels:
        zh: 到期发生时间
        en: expired at
        ja: 期限切れ発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录资格效果实际生效的事件时间，必须不早于 expiry_deadline；它不是未来计划时间，也不是后续删除完成时间。
        en: Records the event time at which eligibility effect actually takes hold and must not precede expiry_deadline; it is neither a future plan time nor later deletion-completion time.
        ja: 資格効果が実際に有効になったイベント時刻を記録し、expiry_deadline より前にはなりません。将来計画時刻でも後続削除完了時刻でもありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T23:00:00.042Z"
      source_claims:
        - claim-memory-expiration-effect
    - id: cleanup_state
      labels:
        zh: 清理状态
        en: cleanup state
        ja: 清掃状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录到期后清理在本操作结束时的状态，明确区分尚未开始或已排队的清理与后续独立删除完成事实。
        en: Records cleanup status at the end of this expiration operation, explicitly distinguishing not-started or queued cleanup from a later independent deletion-completion fact.
        ja: この到期操作終了時の清掃状態を記録し、未開始またはキュー済み清掃を、後続の独立した削除完了事実から明確に区別します。
      allowed_values:
        - not_started
        - queued
        - not_required
      pattern: null
      example_value: queued
      source_claims:
        - claim-memory-expiration-boundary
    - id: expiration_evidence_digest
      labels:
        zh: 到期证据摘要
        en: expiration evidence digest
        ja: 期限切れ証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定目标版本、策略版本、适用范围、到期条件、截止时间、资格效果和执行输出摘要，使以后可以重放这次资格转换。
        en: Fixes a digest of target version, policy version, applicable scope, expiry condition, deadline, eligibility effect, and execution output so this eligibility transition can later be replayed.
        ja: 対象バージョン、ポリシーバージョン、適用スコープ、期限条件、締切時刻、資格効果、実行出力のダイジェストを固定し、この資格遷移を後から再実行できるようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:93d5a6c19abe60f9544187e655c3ed1a8d01f9a58a3d96812d550dc8b47dac8e
      source_claims:
        - claim-memory-expiration-evidence
  constraints:
    - id: MemoryExpiration-parent-disposition-contract
      expression: "operation_kind = disposition, disposition_kind = expiration, disposition_basis = retention_policy, disposition_effect = retention_ineligible, target_record_refs contains exactly target_record_ref, disposition_evidence_digest = expiration_evidence_digest, and disposed_at = expired_at."
      explanation:
        zh: 到期是父类处置契约的资格变化分支：它保留活动、目标、依据、效果、证据和发生时间的全部事实，但不得将这些事实改写为删除或缓存驱逐。
        en: "Expiration is the eligibility-change branch of the parent disposition contract: it preserves activity, target, basis, effect, evidence, and occurrence facts but must not recast them as deletion or cache eviction."
        ja: 期限切れは親の処置契約における資格変更の分岐である。活動、対象、根拠、効果、証拠、発生の全事実を保持するが、それらを削除やキャッシュ追い出しに書き換えてはならない。
      source_claims:
        - claim-memory-expiration-activity
        - claim-memory-expiration-policy
        - claim-memory-expiration-effect
        - claim-memory-expiration-evidence
    - id: MemoryExpiration-policy-target-scope-match
      expression: "retention_policy_ref identifies a version whose scope applies to target_record_ref, expiry_basis is a condition defined by that version, and expiry_deadline is calculated from the target snapshot and that condition."
      explanation:
        zh: 仅有同名策略或同一租户不足以证明治理；错误版本、作用域或时间锚点会错误改变到期结论。
        en: Merely sharing a policy name or tenant does not prove governance; wrong version, scope, or time anchor changes the expiration conclusion incorrectly.
        ja: ポリシー名またはテナントを共有するだけでは統治を証明できません。誤ったバージョン、スコープ、時間アンカーは到期結論を誤って変えます。
      source_claims:
        - claim-memory-expiration-policy
        - claim-memory-expiration-target
    - id: MemoryExpiration-time-and-effect-consistency
      expression: "expired_at is on or after expiry_deadline and started_at, eligibility_effect=retention_ineligible, normal memory retrieval excludes target_record_ref after expired_at, and a terminal parent operation has ended_at on or after expired_at."
      explanation:
        zh: 到期需要一个已经生效的资格效果，而不是一个即将到来的截止时间；同时它不能早于规则条件或操作开始。
        en: Expiration needs an eligibility effect that has already taken hold rather than an approaching deadline, and it cannot predate the rule condition or operation start.
        ja: 到期には近づく締切ではなく、すでに有効になった資格効果が必要です。また規則条件または操作開始より前にはなれません。
      source_claims:
        - claim-memory-expiration-effect
        - claim-memory-expiration-activity
    - id: MemoryExpiration-cleanup-delete-boundary
      expression: "cleanup_state may be not_started, queued, or not_required, but this node does not assert a deletion tombstone, global invalidation, or verified media sanitization; any such fact requires a separate MemoryDelete operation and evidence."
      explanation:
        zh: 到期和删除可以处于同一工作流，但它们是不同的可审计断言。把等待清理误称为完成删除会破坏时序和合规证据。
        en: Expiration and deletion can occur in one workflow, but they are different auditable assertions. Calling queued cleanup completed deletion corrupts timing and compliance evidence.
        ja: 到期と削除は一つのワークフローに存在し得ますが、異なる監査可能な主張です。キュー済み清掃を完了削除と呼ぶと、時系列とコンプライアンス証跡を壊します。
      source_claims:
        - claim-memory-expiration-boundary
    - id: MemoryExpiration-non-eviction-non-decay-boundary
      expression: "Capacity pressure, active-tier residency removal, or a strength change alone cannot establish expiration; there must be an applicable policy deadline and applied retention_ineligible effect."
      explanation:
        zh: 缓存驱逐和检索衰减可能恰好接近某个 TTL，但没有策略期限与资格效果时仍不是到期。
        en: Cache eviction and retrieval decay can happen near a TTL, but without policy deadline and applied eligibility effect they are still not expiration.
        ja: キャッシュ追い出しと検索減衰は TTL 付近で起き得ますが、ポリシー期限と適用済み資格効果がなければ到期ではありません。
      source_claims:
        - claim-memory-expiration-boundary
  required_relation_constraints: []
