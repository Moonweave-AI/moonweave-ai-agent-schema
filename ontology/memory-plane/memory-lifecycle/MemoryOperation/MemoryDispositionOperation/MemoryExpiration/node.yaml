parent_relation:
  id: MemoryExpiration-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆处置操作
    en: is a memory disposition operation
    ja: 記憶処分操作の一種である
  definitions:
    zh: MemoryExpiration —is_a→ MemoryDispositionOperation 表示一次已执行活动依据适用保留规则使既有记录失去正常检索资格，而没有宣称删除完成。
    en: MemoryExpiration —is_a→ MemoryDispositionOperation means one executed activity makes an existing record ineligible for normal retrieval under an applicable retention rule without claiming completed deletion.
    ja: MemoryExpiration —is_a→ MemoryDispositionOperation は、一つの実行済み活動が適用保持規則により既存レコードを通常検索に不適格にし、完了削除を主張しないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次到期活动可处理的目标记录批次数。
    en: The classification relation expresses type membership and does not limit how many target-record batches one expiration activity may handle.
    ja: 分類関係は型メンバーシップを表し、一つの到期活動が処理できる対象レコードバッチ数を制限しません。
  inverse_reading:
    predicate: has_expiration_subtype
    labels:
      zh: 具有到期子类
      en: has expiration subtype
      ja: 到期サブタイプを持つ
  conditions:
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when an executed disposition applies a versioned retention policy to an existing record, reaches its defined expiry condition, and changes normal retrieval eligibility to retention_ineligible without asserting deletion completion."
      explanation:
        zh: 处置父类身份不足以证明到期；必须有适用策略、已达到条件、实际资格效果，以及不提前声称删除完成的边界。
        en: Disposition-parent identity alone does not prove expiration; applicable policy, reached condition, actual eligibility effect, and a boundary against premature deletion claims are all required.
        ja: 処分親の識別だけでは到期を証明できません。適用ポリシー、到達済み条件、実際の資格効果、早すぎる削除完了主張への境界のすべてが必要です。
      source_claims:
        - claim-memory-expiration-policy
        - claim-memory-expiration-effect
        - claim-memory-expiration-boundary
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-example-positive

      labels:
        zh: 已应用保留到期属于处置
        en: Applied retention expiry is disposition
        ja: 適用済み保持期限切れは処分である

      descriptions:
        zh: mem-op-expire-2801 按 retention-policy-tenant-a-30d@v3 使 record-2801-v1 失去正常检索资格，并仅排队清理。
        en: Under retention-policy-tenant-a-30d@v3, mem-op-expire-2801 makes record-2801-v1 ineligible for normal retrieval and only queues cleanup.
        ja: retention-policy-tenant-a-30d@v3 に従い、mem-op-expire-2801 は record-2801-v1 を通常検索に不適格にし、清掃をキューに入れるだけです。
      field_values:
        operation_id: mem-op-expire-2801
        target_record_ref: record-2801-v1
        retention_policy_ref: retention-policy-tenant-a-30d@v3
        expiry_basis: retention_deadline
        eligibility_effect: retention_ineligible
        expired_at: "2026-07-18T23:00:00.042Z"
        cleanup_state: queued
      related_node_ids:
        - MemoryExpiration
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryExpiration-is_a-MemoryDispositionOperation

      source_claims:
        - claim-memory-expiration-policy
        - claim-memory-expiration-effect
        - claim-memory-expiration-boundary
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-example-boundary-plan

      labels:
        zh: 未来到期计划不是处置子类
        en: Future expiry plan is not the disposition subtype
        ja: 将来到期計画は処分サブタイプではない

      descriptions:
        zh: retention-job-2802 只排程未来检查 record-2802-v1 的到期条件，尚未改变任何资格。
        en: retention-job-2802 only schedules a future check of record-2802-v1's expiry condition and has changed no eligibility.
        ja: retention-job-2802 は record-2802-v1 の期限切れ条件の将来確認を予定するだけで、資格を何も変更していません。
      field_values:
        schedule_id: retention-job-2802
        target_record_ref: record-2802-v1
        planned_expiry_deadline: "2026-07-25T23:00:00Z"
        eligibility_effect: absent
        expired_at: absent
        operation_id: absent
      related_node_ids:
        - MemoryExpiration
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryExpiration-is_a-MemoryDispositionOperation

      source_claims:
        - claim-memory-expiration-activity
  source_claims:
    - claim-memory-expiration-activity
    - claim-memory-expiration-policy
    - claim-memory-expiration-effect
    - claim-memory-expiration-boundary
  distinct_fact_rationale:
    zh: 此主干关系只表达已应用保留规则的资格处置属于 MemoryDispositionOperation；目标、策略版本、期限、资格效果、清理状态、删除、结果和审计由字段或独立关系表达。
    en: This backbone relation only expresses that applied retention-rule eligibility disposition belongs to MemoryDispositionOperation; target, policy version, deadline, eligibility effect, cleanup state, deletion, result, and audit use fields or separate relations.
    ja: この主幹関係は、適用済み保持規則の資格処分が MemoryDispositionOperation に属することだけを表します。対象、ポリシーバージョン、期限、資格効果、清掃状態、削除、結果、監査はフィールドまたは別関係で表します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MemoryExpiration-marks_ineligible-MemoryRecord
    predicate: marks_ineligible
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 标记记忆记录不再合格
      en: marks memory record ineligible
      ja: 記憶レコードを不適格に印付ける
    definitions:
      zh: MemoryExpiration —marks_ineligible→ MemoryRecord 表示一次已执行到期使目标记录不再有资格用于正常记忆检索或复用，而没有建立删除完成事实。
      en: MemoryExpiration —marks_ineligible→ MemoryRecord means one executed expiration makes the target record no longer eligible for normal memory retrieval or reuse without establishing completed deletion fact.
      ja: MemoryExpiration —marks_ineligible→ MemoryRecord は、一つの実行済み到期が対象レコードを通常の記憶検索または再利用に不適格にし、完了削除事実を確立しないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达每个到期事实对具体目标资格的效果，不对所有实现设定固定运行时基数。
      en: This relation expresses each expiration fact's effect on a concrete target's eligibility and imposes no fixed runtime cardinality across implementations.
      ja: この関係は各到期事実の具体対象資格への効果を表し、実装全体に固定ランタイム基数を課しません。
    inverse_reading:
      predicate: is_marked_ineligible_by_expiration
      labels:
        zh: 被到期标记为不合格
        en: is marked ineligible by expiration
        ja: 到期により不適格と印付けられる
    conditions:
      - id: MemoryExpiration-marks_ineligible-MemoryRecord-target-policy-and-effect
        severity: error
        expression_language: plain
        expression: "Assert only when the relation target matches target_record_ref, retention_policy_ref applies, expired_at is on or after expiry_deadline, eligibility_effect=retention_ineligible, normal retrieval excludes the target, and expiration_evidence_digest covers the fact."
        explanation:
          zh: 不合格关系必须有目标、适用规则、实际时间、资格效果和证据支持；不能由缓存未命中、低权重或未来 TTL 单独推断。
          en: The ineligibility relation needs target, applicable rule, actual time, eligibility effect, and evidence; it cannot be inferred from a cache miss, low weight, or future TTL alone.
          ja: 不適格関係には対象、適用規則、実際の時刻、資格効果、証跡が必要です。キャッシュミス、低重み、将来 TTL だけから推論できません。
        source_claims:
          - claim-memory-expiration-policy
          - claim-memory-expiration-effect
          - claim-memory-expiration-evidence
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryExpiration-marks_ineligible-MemoryRecord-example-positive

        labels:
          zh: 到期标记具体记录不合格
          en: Expiration marks concrete record ineligible
          ja: 到期が具体レコードを不適格に印付ける

        descriptions:
          zh: mem-op-expire-2801 在适用策略截止后标记 record-2801-v1 为 retention_ineligible，正常记忆检索不再返回该记录。
          en: After the applicable policy deadline, mem-op-expire-2801 marks record-2801-v1 retention_ineligible and normal memory retrieval no longer returns it.
