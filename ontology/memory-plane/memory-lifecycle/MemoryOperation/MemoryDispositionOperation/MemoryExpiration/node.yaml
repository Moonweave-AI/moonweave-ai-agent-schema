      en: marks record expired and ineligible
      ja: recordをexpired/ineligibleにする
    definitions:
      zh: MemoryExpiration —marks_ineligible→ MemoryRecord 表示记录满足到期条件后不再合格用于正常检索或复用，即使物理删除仍在等待。
      en: MemoryExpiration —marks_ineligible→ MemoryRecord means the record is no longer eligible for normal retrieval or reuse after meeting expiry conditions even while physical deletion is pending.
      ja: MemoryExpiration —marks_ineligible→ MemoryRecord はexpiry condition成立後physical delete待ちでもnormal retrieval/reuse不適格になることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
