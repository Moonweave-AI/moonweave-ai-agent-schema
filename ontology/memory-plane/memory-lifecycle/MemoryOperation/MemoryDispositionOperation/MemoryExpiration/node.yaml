schema: moonweave.ai/ontology-node/v1
id: MemoryExpiration
kind: concept
status: accepted
labels:
  zh: 记忆到期
  en: Memory expiration
  ja: 記憶期限切れ
semantics:
  short_definition:
    zh: 记录达到时间、同意或作用域期限并改变保留资格的处置操作。
    en: A disposition operation marking that a record has reached a time, consent, or scope deadline and changing retention eligibility.
    ja: recordがtime・consent・scope deadlineへ達しretention eligibilityを変えるdisposition operationです。
  definition:
    zh: MemoryExpiration 依据 MemoryRetentionPolicy 的 expiry 条件把 MemoryRecord 标为已到期或待清理；到期事实可以先于物理删除，只有后续删除活动才保证产生墓碑。
    en: MemoryExpiration applies an expiry condition from MemoryRetentionPolicy and marks a MemoryRecord expired or pending cleanup. Expiration may precede physical deletion; only a later delete activity guarantees a tombstone.
    ja: MemoryExpiration はMemoryRetentionPolicyのexpiry conditionでMemoryRecordをexpired/cleanup pendingにします。expirationはphysical deleteより前でありtombstone保証は後続delete activityだけです。
  why_needed:
    zh: 把时间资格变化与异步物理删除拆开。
    en: Separates time-based eligibility change from asynchronous physical deletion.
    ja: time-based eligibility changeをasynchronous physical deleteから分けます。
  includes:
    - zh: 纳入 TTL、保留截止时间、同意到期和会话作用域结束。
      en: Includes TTL, retention deadlines, consent expiry, and session-scope end.
      ja: TTL・retention deadline・consent expiry・session-scope endを含みます。
  excludes:
    - zh: 排除容量驱逐、显式遗忘请求和仅随时间降低权重。
      en: Excludes capacity eviction, explicit forget requests, and merely reducing weight over time.
      ja: capacity eviction・explicit forget request・timeによるweight低下のみを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - expiration_operation_id
  fields:
    - id: expiration_operation_id
      labels:
        zh: 到期操作标识
        en: expiration operation ID
        ja: expiration operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次到期资格判定活动。
        en: Identifies one expiry-eligibility determination activity.
        ja: 一expiry-eligibility determination activityを識別します。
      allowed_values: []
      pattern: null
      example_value: expire-1506
      source_claims:
        - claim-memory-expiration-002
    - id: expired_at
      labels:
        zh: 到期时间
        en: expired at
        ja: 期限到達時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录记录满足到期条件的事件时间。
        en: Records the event time at which the record met its expiry condition.
        ja: recordがexpiry conditionを満たしたevent timeを記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-memory-expiration-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryExpiration-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆到期正例
      en: "Positive case: Memory expiration"
      ja: 記憶期限切れ正例
    scenario_id: null
    descriptions:
      zh: memory-op-expiration-001 在 2026-07-16T00:00:00Z 依据 retention-30d 把 record-1506 标记为不再满足正常检索资格，等待异步清理。
      en: memory-op-expiration-001 applies retention-30d at 2026-07-16T00:00:00Z and marks record-1506 ineligible for normal retrieval while it awaits asynchronous cleanup.
      ja: memory-op-expiration-001 は 2026-07-16T00:00:00Z に retention-30d を適用し、record-1506 を通常検索の対象外として非同期清掃待ちにします。
    field_values:
      expiration_operation_id: memory-op-expiration-001
      expired_at: 2026-07-16T00:00:00Z
      operation_id: memory-op-expiration-001
      reason: the retention window for this record has elapsed
      disposition_operation_id: memory-op-expiration-001
      target_record_id: record-1506
      started_at: 2026-07-16T00:00:00Z
    related_node_ids:
      - MemoryExpiration
      - MemoryDispositionOperation
    related_relation_ids:
      - MemoryExpiration-is_a-MemoryDispositionOperation
    expected_result:
      zh: 归类为 MemoryExpiration，但不得同时推断已物理删除。
      en: Classify as MemoryExpiration but do not infer that physical deletion has already occurred.
      ja: MemoryExpirationに分類しますがphysical delete済みとは推論しません。
    why_valid_or_invalid:
      zh: 到期资格成立，删除完成事件尚未发生。
      en: Expiry eligibility holds while the deletion-completion event has not occurred.
      ja: expiry eligibilityは成立しdelete completion eventは未発生です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-expiration-001
  - id: MemoryExpiration-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 保留期限到期实例
      en: Retention-window expiration instance
      ja: 保持期限満了インスタンス
    scenario_id: MemoryExpiration:instance:memory-op-expiration-001
    descriptions:
      zh: memory-op-expiration-001 在 2026-07-16T00:00:00Z 依据 retention-30d 把 record-1506 标记为不再满足正常检索资格，等待异步清理。
      en: memory-op-expiration-001 applies retention-30d at 2026-07-16T00:00:00Z and marks record-1506 ineligible for normal retrieval while it awaits asynchronous cleanup.
      ja: memory-op-expiration-001 は 2026-07-16T00:00:00Z に retention-30d を適用し、record-1506 を通常検索の対象外として非同期清掃待ちにします。
    field_values:
      expiration_operation_id: memory-op-expiration-001
      expired_at: 2026-07-16T00:00:00Z
      operation_id: memory-op-expiration-001
      reason: the retention window for this record has elapsed
    related_node_ids:
      - MemoryExpiration
      - MemoryDispositionOperation
      - MemoryRecord
      - MemoryRetentionPolicy
    related_relation_ids:
      - MemoryExpiration-is_a-MemoryDispositionOperation
      - MemoryExpiration-marks_ineligible-MemoryRecord
      - MemoryExpiration-governed_by-MemoryRetentionPolicy
    expected_result:
      zh: 返回到期活动、记录和适用策略；不得据此声称已经发生物理删除或墓碑生成。
      en: Return the expiration activity, record, and policy without claiming that physical deletion or tombstone production already occurred.
      ja: 期限満了活動、記録、方針を返し、物理削除や墓標生成が済んだとは主張しません。
    why_valid_or_invalid:
      zh: 时间策略使记录失去检索资格，但清理尚未执行，因此是 Expiration 而不是 Delete。
      en: A time policy removes retrieval eligibility before cleanup executes, so this is Expiration rather than Delete.
      ja: 時間方針で検索資格を失うが清掃は未実行のため、Delete ではなく Expiration です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-expiration-001
  - id: MemoryExpiration-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆到期边界例
      en: "Boundary case: Memory expiration"
      ja: 記憶期限切れ境界例
    scenario_id: null
    descriptions:
      zh: expire-1507 因缓存容量不足提前移除未到期记录。
      en: expire-1507 removes an unexpired record early because cache capacity is exhausted.
      ja: expire-1507 はcache capacity不足で未expired recordを早期除去します。
    field_values: {}
    related_node_ids:
      - MemoryExpiration
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryExpiration；应归 MemoryEviction。
      en: Do not classify as MemoryExpiration; classify as MemoryEviction.
      ja: MemoryExpirationでなくMemoryEvictionに分類します。
    why_valid_or_invalid:
      zh: 没有满足时间或保留期限，触发器是容量。
      en: No time or retention deadline was met; capacity is the trigger.
      ja: time/retention deadline未成立でtriggerはcapacityです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-expiration-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryExpiration-is_a-MemoryDispositionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆处置操作
    en: is a memory disposition operation
    ja: 記憶処分操作の一種
  definitions:
    zh: MemoryExpiration —is_a→ MemoryDispositionOperation 表示：记录满足 MemoryRetentionPolicy 的时间、同意或作用域到期条件，物理删除可稍后发生。
    en: MemoryExpiration —is_a→ MemoryDispositionOperation holds because the record meets a time, consent, or scope expiry condition in MemoryRetentionPolicy while physical deletion may happen later
    ja: MemoryExpiration —is_a→ MemoryDispositionOperation は、recordがMemoryRetentionPolicyのtime・consent・scope expiry conditionを満たしphysical deleteが後で起こり得るため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse is a memory disposition operation
      ja: 逆方向読取
  conditions:
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the record meets a time, consent, or scope expiry condition in MemoryRetentionPolicy while physical deletion may happen later—and already meets the activity definition of MemoryDispositionOperation.
      explanations:
        zh: 仅当实例满足子类种差“记录满足 MemoryRetentionPolicy 的时间、同意或作用域到期条件，物理删除可稍后发生。”且已满足 MemoryDispositionOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the record meets a time, consent, or scope expiry condition in MemoryRetentionPolicy while physical deletion may happen later—and already meets the activity definition of MemoryDispositionOperation.
        ja: instanceがchild differentia「recordがMemoryRetentionPolicyのtime・consent・scope expiry conditionを満たしphysical deleteが後で起こり得るため成立します。」を満たし、かつ MemoryDispositionOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-expiration-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆处置操作正例
        en: "Positive case: is a memory disposition operation"
        ja: 記憶処分操作の一種正例
      scenario_id: MemoryExpiration-is_a-MemoryDispositionOperation:positive:20260716
      descriptions:
        zh: expire-1506 在 retention-policy-4@v3 的 30 天期限到达时，把 record-1506 标为 expired 并排入异步清理队列。
        en: expire-1506 marks record-1506 expired when retention-policy-4@v3 reaches its 30-day deadline and queues it for asynchronous cleanup.
        ja: expire-1506 は retention-policy-4@v3 の 30-day deadline 到達時に record-1506 を expired とし async cleanup queue に入れます。
      field_values: {}
      related_node_ids:
        - MemoryExpiration
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryExpiration-is_a-MemoryDispositionOperation
      expected_result:
        zh: 将 expire-1506 归为 MemoryExpiration，立即停止常规检索资格，同时明确物理删除仍可能延迟。
        en: Classify expire-1506 as MemoryExpiration, stop normal retrieval eligibility immediately, and state that physical deletion may still be delayed.
        ja: expire-1506 を MemoryExpiration に分類し normal retrieval eligibility を直ちに止め、physical deletion は遅延可能と明記します。
      why_valid_or_invalid:
        zh: 记录满足具体时间策略并进入到期状态，DynamoDB TTL 也明确到期与后台删除可分离，符合 expiration 种差。
        en: The record meets a versioned time policy and enters an expiry state; DynamoDB TTL likewise separates expiry from later background deletion.
        ja: record は versioned time policy を満たし expiry state に入り、DynamoDB TTL も expiry と後続 background deletion を分離します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-expiration-001
    - id: MemoryExpiration-is_a-MemoryDispositionOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆处置操作边界例
        en: "Boundary case: is a memory disposition operation"
        ja: 記憶処分操作の一種境界例
      scenario_id: MemoryExpiration-is_a-MemoryDispositionOperation:boundary:20260716
      descriptions:
        zh: evict-1506 在 record-1506 尚余十天 TTL 时因 cache-east 内存压力移除驻留副本，持久记录仍处于 active。
        en: evict-1506 removes the cache-east copy for memory pressure while record-1506 still has ten TTL days remaining and remains active durably.
        ja: evict-1506 は record-1506 の TTL が十日残る時に memory pressure で cache-east copy を除去し durable record は active のままです。
      field_values: {}
      related_node_ids:
        - MemoryExpiration
        - MemoryDispositionOperation
      related_relation_ids:
        - MemoryExpiration-is_a-MemoryDispositionOperation
      expected_result:
        zh: 拒绝 MemoryExpiration 分类；把该活动建模为 MemoryEviction，并保持原 TTL 不变。
        en: Reject MemoryExpiration membership; model the activity as MemoryEviction and leave the original TTL unchanged.
        ja: MemoryExpiration 所属を拒否し activity を MemoryEviction として original TTL を変更しません。
      why_valid_or_invalid:
        zh: 容量压力不是保留策略的到期条件；在期限未满足时声称 expiration 会错误终止正常检索资格。
        en: Capacity pressure is not a retention-policy expiry condition; asserting expiration before the deadline would wrongly terminate normal retrieval eligibility.
        ja: capacity pressure は retention-policy expiry condition ではなく deadline 前の expiration 主張は normal retrieval eligibility を誤って終了します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-expiration-001
  source_claims:
    - claim-memory-expiration-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
