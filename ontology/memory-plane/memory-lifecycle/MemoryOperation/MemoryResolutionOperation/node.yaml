sources:
  - id: nist-ai-rmf
    title: NIST AI Risk Management Framework 1.0
    source_type: standard
    url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
    relevance: Separates identifying and measuring risks from managing and responding to them.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents explicit policy evaluation over structured input to produce a decision.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, agents, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 digests used to bind frozen comparison evidence and decision rationale.
source_claims:
  - id: claim-memory-resolution-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from the entities and provenance facts around it. Moonweave records resolution as an executed activity with problem, actor, time, result, and audit evidence rather than a static policy or dashboard label.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-resolution-operation-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a resolution's problem, evidence, decision, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-resolution-operation-problem
    source: w3c-prov-o
    supports: PROV-O distinguishes entities used by an activity from unrelated nearby facts. Moonweave requires a precise identified problem state as resolution input and does not substitute same record, text similarity, or trace context.
    locator: "PROV-O sections on prov:used and provenance association"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-resolution-operation-decision
    source: open-policy-agent
    supports: Open Policy Agent evaluates explicit rules over structured input to produce decisions. Moonweave records an explicit selected handling strategy and referenceable decision rather than treating a generic handled label as resolution.
    locator: "Open Policy Agent policy language overview and decision model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-resolution-operation-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores SHA-256 digests for frozen comparison evidence and decision rationale so the decision remains auditable against the facts used.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-resolution-operation-boundary
    source: nist-ai-rmf
    supports: The NIST AI RMF separates identifying and measuring risk from managing and responding to it. Moonweave keeps assessment and validation distinct from choosing a resolution, and keeps later revision or deletion distinct from the decision activity.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
