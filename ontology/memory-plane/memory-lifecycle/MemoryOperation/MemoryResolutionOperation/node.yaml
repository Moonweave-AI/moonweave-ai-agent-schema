schema: moonweave.ai/ontology-node/v1
id: MemoryResolutionOperation
kind: concept
status: accepted
labels:
  zh: 记忆解决操作
  en: Memory resolution operation
  ja: 記憶解決操作
semantics:
  short_definition:
    zh: 基于已识别问题状态及其证据，作出并记录明确处理决定的记忆操作。
    en: A memory operation that makes and records an explicit handling decision from an identified problem state and its evidence.
    ja: 識別済み問題状態とその証跡に基づいて、明示的な処理決定を行い記録する記憶操作です。
  definition:
    zh: MemoryResolutionOperation 是一种已执行的 MemoryOperation。它消费在先前评估或验证中已经识别的问题状态，冻结用于比较的证据清单，选择可审计的处理策略，并形成带理由和时间的解决决定。解决可以选择保留一项、生成调和输出、标记歧义、使无效项失效或明确暂缓，但不能只报告冲突或风险、仅编辑无问题绑定的内容、创建策略定义，或把检测与选择行动伪装为同一无证据步骤。任何后续内容修订或删除仍是独立活动，结果应通过关系和证据关联而不是被吞并。
    en: MemoryResolutionOperation is an executed MemoryOperation. It consumes a problem state already identified by earlier assessment or validation, freezes the evidence manifest used for comparison, selects an auditable handling strategy, and forms a time-stamped resolution decision with rationale. Resolution can retain one item, produce a reconciled output, mark ambiguity, invalidate an unsound item, or explicitly defer, but it cannot merely report a conflict or risk, edit content without problem binding, create a policy definition, or disguise detection and selection action as one unsupported step. Any later content revision or deletion remains a separate activity and should be associated through relations and evidence rather than absorbed.
    ja: MemoryResolutionOperation は実行済みの MemoryOperation です。先行する評価または検証で既に識別された問題状態を消費し、比較に使う証跡マニフェストを固定し、監査可能な処理戦略を選び、理由と時刻を持つ解決決定を形成します。解決は一項目の保持、調和出力の生成、曖昧性の印付け、不健全項目の無効化、明示的な保留を選べますが、競合またはリスクを報告するだけ、問題結合なしの内容編集、ポリシー定義作成、検出と選択行動を証跡なしの一手順として偽装することはできません。後続の内容改訂または削除は依然として独立活動であり、吸収せず関係と証跡を通じて関連付けます。
  why_needed:
    zh: 识别问题、选择处理方式和执行后续变更是不同责任点；明确交接才能审计谁依据什么证据选择了什么结果。
    en: Identifying a problem, choosing how to handle it, and executing a later change are different responsibility points; explicit handoff makes it auditable who chose which result from which evidence.
    ja: 問題識別、処理方法の選択、後続変更の実行は異なる責任点です。明示的な引継ぎにより、誰がどの証跡からどの結果を選んだかを監査できます。
  includes:
    - zh: 对已经检测到的冲突、不一致、无效状态或治理问题形成的保留、调和、歧义标记、无效化或暂缓决定，以及其比较证据和理由。
      en: Retain, reconcile, ambiguity-mark, invalidate, or defer decisions formed for an already detected conflict, inconsistency, invalid state, or governance issue, together with comparison evidence and rationale.
      ja: すでに検出された競合、不整合、無効状態、統治問題に対して形成される保持、調和、曖昧性印付け、無効化、保留決定、および比較証跡と理由を含みます。
  excludes:
    - zh: 只读检查或冲突检测、未绑定问题状态的普通内容合并、首次写入、策略定义、没有处理决定的仪表盘提示，以及后续修订或删除活动本身。
      en: Read-only checks or conflict detection, ordinary content merge not bound to a problem state, first write, policy definition, dashboard alert with no handling decision, and the later revision or deletion activity itself.
      ja: 読み取り専用検査または競合検出、問題状態に結合しない通常内容マージ、初回書込み、ポリシー定義、処理決定のないダッシュボード警告、後続の改訂または削除活動そのものを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将解决实现为一个证据冻结、决策明确的工作单元：先回指问题状态，再固定比较证据和策略，最后记录选择的处理方式、理由和发生时间。评估只发现问题；修订或删除只执行变更；解决层负责可审计地选择处理路径，不能因使用同一输入而吞并上下游活动。
    en: "Implement resolution as an evidence-frozen, decision-explicit work unit: first point back to the problem state, then fix comparison evidence and policy, and finally record selected handling, rationale, and occurrence time. Assessment only finds the problem; revision or deletion only executes change; resolution selects the handling path audibly and cannot absorb upstream or downstream activity merely because they use the same input."
    ja: 解決は証跡固定かつ決定明示の作業単位として実装します。最初に問題状態を指し返し、次に比較証跡とポリシーを固定し、最後に選択した処理、理由、発生時刻を記録します。評価は問題を見つけるだけで、改訂または削除は変更を実行するだけです。解決層は監査可能に処理経路を選択し、同じ入力を使うだけで上流または下流活動を吸収できません。
  typical_input:
    - description: An identified problem-state reference, frozen comparison evidence, applicable resolution policy or strategy, executor identity, and operation start time.
      format: "{operation_id, problem_state_ref, evidence_manifest_digest, resolution_strategy, actor_ref, started_at}"
  typical_output:
    - description: A time-stamped resolution decision with rationale digest and optional references to later revision or deletion activities.
      format: "{operation_id, resolution_decision_ref, resolution_strategy, decision_rationale_digest, resolved_at, followup_operation_ref?}"
  reference_implementations:
    - name: NIST AI Risk Management Framework 1.0
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
      description: Separates risk identification and measurement from management and response actions.
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents evaluation of explicit rules over structured input to produce a decision.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes executed activities, entities, agents, and provenance associations.
  source_claims:
    - claim-memory-resolution-operation-activity
    - claim-memory-resolution-operation-decision
    - claim-memory-resolution-operation-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次解决的问题、证据、决定、结果和审计事实。
        en: Reuses the stable MemoryOperation identity to join one resolution's problem, evidence, decision, result, and audit facts.
        ja: 親 MemoryOperation の安定識別子を再利用し、一つの解決の問題、証跡、決定、結果、監査事実を結びます。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-resolve-2901
      source_claims:
        - claim-memory-resolution-operation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 resolution，表明该活动对已记录的问题状态和证据作出可审计的处理决定。
        en: Narrows the parent operation kind to resolution and records an auditable handling decision for an existing problem state and evidence.
        ja: 親の操作種別を resolution に限定し、既存の問題状態と証跡に対する監査可能な処理決定を記録します。
      allowed_values:
        - resolution
      pattern: null
      example_value: resolution
      source_claims:
        - claim-memory-resolution-operation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录处理活动是否实际执行并完成；它不等同于问题是否已消失。
        en: Records whether the handling activity ran and completed; it is not a claim that the underlying problem has disappeared.
        ja: 処理活動が実行され完了したかを記録し、基礎となる問題が消えたという主張とは区別します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-resolution-operation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录执行者开始审阅问题状态和证据的实际时间，不能以冲突检测时间替代。
        en: Records when the executor actually began considering the problem state and evidence, not when the conflict was detected.
        ja: 実行者が問題状態と証跡の検討を実際に始めた時刻を記録し、競合検出時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T00:00:00Z"
      source_claims:
        - claim-memory-resolution-operation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对该问题处理决定实际负责的主体，而不是问题报告者或受影响用户。
        en: References the actor responsible for making this handling decision, not a problem reporter or an affected user.
        ja: 問題報告者や影響を受ける利用者ではなく、この処理決定に実際に責任を持つ主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: conflict-resolver-1
      source_claims:
        - claim-memory-resolution-operation-activity
    - id: problem_state_ref
      labels:
        zh: 问题状态引用
        en: problem state reference
        ja: 問題状態参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在先前评估或验证中已经识别、并被这次解决实际消费的问题状态；相似文本、同一记录或同一追踪不能替代该问题身份。
        en: References the problem state already identified by earlier assessment or validation and actually consumed by this resolution; similar text, same record, or same trace cannot substitute for problem identity.
        ja: 先行評価または検証で既に識別され、この解決が実際に消費する問題状態を参照します。類似テキスト、同じレコード、同じトレースでは問題識別を代替できません。
      allowed_values: []
      pattern: '^[a-z][a-z0-9-]*-[A-Za-z0-9._-]+$'
      example_value: conflict-2901
      source_claims:
        - claim-memory-resolution-operation-problem
    - id: evidence_manifest_digest
      labels:
        zh: 比较证据摘要
        en: comparison evidence digest
        ja: 比較証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定支持解决的候选记录版本、问题证据、策略版本、同意范围和比较输出，使以后可验证决定没有从变化后的事实重新推导。
        en: Fixes candidate record versions, problem evidence, policy version, consent scope, and comparison output supporting resolution so the decision is not later re-derived from changed facts.
        ja: 解決を支える候補レコードバージョン、問題証跡、ポリシーバージョン、同意スコープ、比較出力を固定し、変化後の事実から決定を再導出しないようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:cbd337faef2d003df6454bcc4d67c5a3395573a6b25a4eb7f39f9bdcc87c775d
      source_claims:
        - claim-memory-resolution-operation-evidence
    - id: resolution_strategy
      labels:
        zh: 解决策略
        en: resolution strategy
        ja: 解決戦略
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明本次针对问题状态选择的处理路径，而不是泛化的“已处理”状态或未执行的策略愿望。
        en: States the handling path selected for this problem state rather than a generic "handled" status or an unexecuted policy wish.
        ja: 一般的な「処理済み」状態または未実行ポリシー願望ではなく、この問題状態に選択された処理経路を示します。
      allowed_values:
        - retain_one
        - reconcile
        - mark_ambiguous
        - invalidate_unsound
        - defer_with_reason
      pattern: null
      example_value: retain_one
      source_claims:
        - claim-memory-resolution-operation-decision
    - id: resolution_decision_ref
      labels:
        zh: 解决决定引用
        en: resolution decision reference
        ja: 解決決定参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次解决产生的独立决定事实，使后续修订、删除或人工处理能引用该选择而不重写证据。
        en: Identifies the independent decision fact produced by this resolution so later revision, deletion, or manual handling can reference the choice without rewriting evidence.
        ja: この解決で生成された独立決定事実を識別し、後続の改訂、削除、手動処理が証跡を書き換えずに選択を参照できるようにします。
      allowed_values: []
      pattern: '^resolution-decision-[A-Za-z0-9._-]+$'
      example_value: resolution-decision-2901
      source_claims:
        - claim-memory-resolution-operation-decision
    - id: decision_rationale_digest
      labels:
        zh: 决定理由摘要
        en: decision rationale digest
        ja: 決定理由ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定将问题状态、证据清单和选择策略连接到决定的理由摘要，避免仅凭决定标签无法审计为何如此处理。
        en: Fixes a rationale digest connecting problem state, evidence manifest, and selected strategy to the decision so a decision label alone does not hide why it was made.
        ja: 問題状態、証跡マニフェスト、選択戦略を決定に結ぶ理由ダイジェストを固定し、決定ラベルだけで理由が隠れないようにします。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:5b399d70e9ee7ee2bf099ac2e27c9a930b9bf33f30eac24cc32a692d584e5842
      source_claims:
        - claim-memory-resolution-operation-evidence
    - id: resolved_at
      labels:
        zh: 决定形成时间
        en: resolved at
        ja: 決定形成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录解决决定实际形成的事件时间，而不是问题首次检测、策略创建或随后变更实际执行的时间。
        en: Records the event time at which the resolution decision actually forms, not first problem detection, policy creation, or later execution of a change.
        ja: 解決決定が実際に形成されたイベント時刻を記録します。最初の問題検出、ポリシー作成、後続変更の実際の実行時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T00:00:00.099Z"
      source_claims:
        - claim-memory-resolution-operation-activity
  constraints:
    - id: MemoryResolutionOperation-parent-operation-envelope
      expression: "operation_kind = resolution and status, started_at, and actor_ref identify one executed resolution activity."
      explanation:
        zh: 问题、证据和一段建议文本不能独立成为解决操作；它们必须归属到一次实际执行的处理活动。
        en: A problem, evidence, and a proposed answer do not independently form a resolution operation; they must belong to an executed handling activity.
        ja: 問題、証跡、提案文だけでは解決操作にならず、実行済みの処理活動に帰属しなければなりません。
      source_claims:
        - claim-memory-resolution-operation-activity
    - id: MemoryResolutionOperation-problem-evidence-consistency
      expression: "problem_state_ref identifies a problem detected before resolved_at, and evidence_manifest_digest covers that problem's candidate records, governing evidence, and comparison output; an unrelated record edit cannot supply the required problem binding."
      explanation:
        zh: 解决必须消费可识别的既有问题和冻结证据，否则无法判断决定是在解决问题还是在做无依据内容编辑。
        en: Resolution must consume an identifiable existing problem and frozen evidence, or it cannot be distinguished from unsupported content editing.
        ja: 解決は識別可能な既存問題と凍結証跡を消費しなければならず、そうでなければ根拠のない内容編集と区別できません。
      source_claims:
        - claim-memory-resolution-operation-problem
        - claim-memory-resolution-operation-evidence
    - id: MemoryResolutionOperation-decision-and-rationale-consistency
      expression: "resolution_strategy is explicit, resolution_decision_ref uniquely identifies the produced decision, and decision_rationale_digest covers problem_state_ref, evidence_manifest_digest, and selected strategy."
      explanation:
        zh: 报告问题或列出候选并不构成解决；必须有一个可引用的选择及能回溯到证据的理由。
        en: Reporting a problem or listing candidates does not constitute resolution; there must be a referenceable choice with rationale traceable to evidence.
        ja: 問題報告または候補列挙は解決を構成しません。証跡まで追跡できる理由を持つ参照可能な選択が必要です。
      source_claims:
        - claim-memory-resolution-operation-decision
        - claim-memory-resolution-operation-evidence
    - id: MemoryResolutionOperation-time-and-separation
      expression: "resolved_at is on or after started_at, and a terminal parent operation has ended_at on or after resolved_at; later record revision, deletion, or reconciliation execution is represented as a separate operation linked to resolution_decision_ref."
      explanation:
        zh: 选择处理路径与执行具体状态变更不同；分开记录能保留决定责任与执行责任。
        en: Choosing a handling path differs from executing a concrete state change; separate records preserve decision responsibility and execution responsibility.
        ja: 処理経路の選択は具体的状態変更の実行と異なります。別々の記録により決定責任と実行責任を保ちます。
      source_claims:
        - claim-memory-resolution-operation-activity
        - claim-memory-resolution-operation-boundary
    - id: MemoryResolutionOperation-not-assessment-only
      expression: "An operation that only detects, scores, or reports a problem and creates no resolution_decision_ref or selected strategy is MemoryAssessmentOperation or MemoryValidation, not MemoryResolutionOperation."
      explanation:
        zh: 检测结论可成为输入，但没有处理选择时仍停留在评估边界，不能越级称为解决。
        en: A detection conclusion can be input, but without a handling choice it remains at the assessment boundary and cannot be called resolution.
        ja: 検出結論は入力になり得ますが、処理選択がなければ評価境界に留まり、解決とは呼べません。
      source_claims:
        - claim-memory-resolution-operation-boundary
  required_relation_constraints: []
examples:
  - id: MemoryResolutionOperation-example-positive-conflict-choice

    labels:
      zh: 基于冲突证据选择保留项
      en: Choosing retained item from conflict evidence
      ja: 競合証跡から保持項目を選ぶ

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-resolve-2901
      operation_kind: resolution
      status: succeeded
      started_at: "2026-07-19T00:00:00Z"
      ended_at: "2026-07-19T00:00:00.132Z"
      actor_ref: conflict-resolver-1
      problem_state_ref: conflict-2901
      evidence_manifest_digest: sha256:cbd337faef2d003df6454bcc4d67c5a3395573a6b25a4eb7f39f9bdcc87c775d
      resolution_strategy: retain_one
      resolution_decision_ref: resolution-decision-2901
      decision_rationale_digest: sha256:5b399d70e9ee7ee2bf099ac2e27c9a930b9bf33f30eac24cc32a692d584e5842
      resolved_at: "2026-07-19T00:00:00.099Z"
    related_node_ids:
      - MemoryResolutionOperation
      - MemoryOperation
      - MemoryConflict
      - MemoryConflictResolution
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryResolutionOperation-is_a-MemoryOperation
      - MemoryConflictResolution-is_a-MemoryResolutionOperation
      - MemoryValidation-detects-MemoryConflict
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-resolution-operation-activity
      - claim-memory-resolution-operation-decision
      - claim-memory-resolution-operation-evidence
  - id: MemoryResolutionOperation-example-counterexample-validation

    labels:
      zh: 冲突检测不是解决
      en: Conflict detection is not resolution
      ja: 競合検出は解決ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
