parent_relation:
  id: MemoryResolutionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆操作
    en: is a memory operation
    ja: 記憶操作の一種である
  definitions:
    zh: MemoryResolutionOperation —is_a→ MemoryOperation 表示一次已执行记忆活动消费既有问题与冻结证据，并形成可审计处理决定。
    en: MemoryResolutionOperation —is_a→ MemoryOperation means one executed memory activity consumes an existing problem and frozen evidence and forms an auditable handling decision.
    ja: MemoryResolutionOperation —is_a→ MemoryOperation は、一つの実行済み記憶活動が既存問題と凍結証跡を消費し、監査可能な処理決定を形成することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次解决活动可处理的问题状态数。
    en: The classification relation expresses type membership and does not limit how many problem states one resolution activity may handle.
    ja: 分類関係は型メンバーシップを表し、一つの解決活動が処理できる問題状態数を制限しません。
  inverse_reading:
    predicate: has_resolution_subtype
    labels:
      zh: 具有解决操作子类
      en: has resolution-operation subtype
      ja: 解決操作サブタイプを持つ
  conditions:
    - id: MemoryResolutionOperation-is_a-MemoryOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when an executed MemoryOperation consumes an identified problem state, freezes comparison evidence, selects a handling strategy, and forms a referenceable decision with rationale."
      explanation:
