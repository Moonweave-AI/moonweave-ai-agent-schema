    en: is a memory operation
    ja: 記憶操作の一種
  definitions:
    zh: MemoryResolutionOperation —is_a→ MemoryOperation 表示：活动消费已识别的问题状态、比较证据并形成可审计解决决定。
    en: MemoryResolutionOperation —is_a→ MemoryOperation holds because the activity consumes an identified problem state, compares evidence, and forms an auditable resolution decision
    ja: MemoryResolutionOperation —is_a→ MemoryOperation は、identified problem stateを消費しevidence比較後audit可能resolution decisionを形成するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is a memory operation
      ja: 逆方向読取
  conditions:
    - id: MemoryResolutionOperation-is_a-MemoryOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the activity consumes an identified problem state, compares evidence, and forms an auditable resolution decision—and already meets the activity definition of MemoryOperation.
      explanations:
        zh: 仅当实例满足子类种差“活动消费已识别的问题状态、比较证据并形成可审计解决决定。”且已满足 MemoryOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the activity consumes an identified problem state, compares evidence, and forms an auditable resolution decision—and already meets the activity definition of MemoryOperation.
        ja: instanceがchild differentia「identified problem stateを消費しevidence比較後audit可能resolution decisionを形成するため成立します。」を満たし、かつ MemoryOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-resolution-operation-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryResolutionOperation-is_a-MemoryOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆操作正例
        en: "Positive case: is a memory operation"
        ja: 記憶操作の一種正例
      scenario_id: MemoryResolutionOperation-is_a-MemoryOperation:positive:20260716
      descriptions:
        zh: resolve-1809 消费 problem-1809，比较两条相冲突记录的时间、来源和同意范围，并形成带理由的 retain-newer 决定。
        en: resolve-1809 consumes problem-1809, compares time, provenance, and consent scope of two conflicting records, and forms a reasoned retain-newer decision.
        ja: resolve-1809 は problem-1809 を consume し二 conflicting record の time・provenance・consent scope を比較して理由付き retain-newer decision を作ります。
      field_values: {}
      related_node_ids:
        - MemoryResolutionOperation
        - MemoryOperation
      related_relation_ids:
        - MemoryResolutionOperation-is_a-MemoryOperation
      expected_result:
        zh: 将 resolve-1809 归入 MemoryResolutionOperation，并把问题身份、比较证据和最终决定组成闭环。
        en: Classify resolve-1809 as MemoryResolutionOperation and close the chain among problem identity, compared evidence, and final decision.
        ja: resolve-1809 を MemoryResolutionOperation に分類し problem identity・compared evidence・final decision の chain を閉じます。
      why_valid_or_invalid:
        zh: 活动以已识别问题为输入并承担选择处理动作的责任，区别于只发现问题的 assessment。
        en: The activity takes an identified problem as input and is responsible for choosing a handling action, distinguishing resolution from detection-only assessment.
        ja: identified problem を input とし handling action 選択責任を持つため detection-only assessment と異なります。
