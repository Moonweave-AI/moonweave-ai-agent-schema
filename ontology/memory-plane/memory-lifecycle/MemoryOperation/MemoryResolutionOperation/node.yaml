schema: moonweave.ai/ontology-node/v1
id: MemoryResolutionOperation
kind: concept
status: accepted
labels:
  zh: 记忆解决操作
  en: Memory resolution operation
  ja: 記憶解決操作
semantics:
  short_definition:
    zh: 消费已识别问题状态并作出可审计解决决定的操作。
    en: An operation consuming an identified problem state and making an auditable resolution decision.
    ja: 識別済problem stateを消費しaudit可能resolution decisionを行うoperationです。
  definition:
    zh: MemoryResolutionOperation 是在评估之后运行的 MemoryOperation；它必须引用问题状态、比较依据和决定，不得把发现冲突与解决冲突折叠成同一无证据动作。
    en: MemoryResolutionOperation runs after assessment and must reference the problem state, comparison basis, and decision. It must not collapse conflict detection and resolution into one unsupported action.
    ja: MemoryResolutionOperation はassessment後に実行しproblem state・comparison basis・decisionを参照します。conflict detectionとresolutionを一unsupported actionへ折り畳みません。
  why_needed:
    zh: 建立评估到恢复的明确责任交接。
    en: Establishes an explicit handoff from assessment to recovery.
    ja: assessmentからrecoveryへの明示責務handoffを作ります。
  includes:
    - zh: 纳入针对已检测冲突或失效状态的决定性处理。
      en: Includes decisive handling of a detected conflict or invalid state.
      ja: detected conflict/invalid stateへのdecisive handlingを含みます。
  excludes:
    - zh: 排除仅检测问题、普通合并和未绑定问题状态的内容编辑。
      en: Excludes merely detecting a problem, ordinary merge, and content editing not bound to a problem state.
      ja: problem検出のみ・ordinary merge・problem stateにbindしないcontent editを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - resolution_operation_id
  fields:
    - id: resolution_operation_id
      labels:
        zh: 解决操作标识
        en: resolution operation ID
        ja: resolution operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次问题解决活动。
        en: Identifies one problem-resolution activity.
        ja: 一problem-resolution activityを識別します。
      allowed_values: []
      pattern: null
      example_value: resolve-1809
      source_claims:
        - claim-memory-resolution-operation-002
    - id: problem_state_id
      labels:
        zh: 问题状态标识
        en: problem state ID
        ja: problem state ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该解决活动消费的已检测状态。
        en: Identifies the detected state consumed by the resolution activity.
        ja: resolution activityが消費するdetected stateを識別します。
      allowed_values: []
      pattern: null
      example_value: conflict-1809
      source_claims:
        - claim-memory-resolution-operation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryResolutionOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆解决操作正例
      en: "Positive case: Memory resolution operation"
      ja: 記憶解決操作正例
    scenario_id: null
    descriptions:
      zh: resolve-1809 消费 conflict-1809，比较来源后形成保留 record-new 的决定。
      en: resolve-1809 consumes conflict-1809, compares provenance, and decides to retain record-new.
      ja: resolve-1809 はconflict-1809を消費しprovenance比較後record-new保持を決めます。
    field_values:
      resolution_operation_id: resolve-1809
      problem_state_id: conflict-1809
      operation_id: resolve-1809
      started_at: 2026-07-16T14:20:00Z
    related_node_ids:
      - MemoryResolutionOperation
      - MemoryOperation
    related_relation_ids:
      - MemoryResolutionOperation-is_a-MemoryOperation
    expected_result:
      zh: 归类为 MemoryResolutionOperation。
      en: Classify as MemoryResolutionOperation.
      ja: MemoryResolutionOperationに分類します。
    why_valid_or_invalid:
      zh: 输入是已识别问题状态，输出是可审计解决决定。
      en: The input is an identified problem state and the output is an auditable resolution decision.
      ja: inputはidentified problem stateでoutputはaudit可能resolution decisionです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-resolution-operation-001
  - id: MemoryResolutionOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆解决操作边界例
      en: "Boundary case: Memory resolution operation"
      ja: 記憶解決操作境界例
    scenario_id: null
    descriptions:
      zh: merge-1809 仅因字段互补把两条无冲突记录联合。
      en: merge-1809 combines two nonconflicting records solely because their fields complement each other.
      ja: merge-1809 はfield補完だけで二nonconflicting recordをunionします。
    field_values: {}
    related_node_ids:
      - MemoryResolutionOperation
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryResolutionOperation；应归 MemoryMerge。
      en: Do not classify as MemoryResolutionOperation; classify as MemoryMerge.
      ja: MemoryResolutionOperationでなくMemoryMergeに分類します。
    why_valid_or_invalid:
      zh: 没有被消费的问题状态或解决决定。
      en: No problem state is consumed and no resolution decision is made.
      ja: problem state消費もresolution decisionもありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-resolution-operation-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MemoryRevisionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 正向身份比较：父节点 MemoryOperation：MemoryResolutionOperation（semantic kind=activity，骨架 MemoryResolutionOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity，骨架 MemoryRevisionOperation-is_a-MemoryOperation）。双端条件：MemoryResolutionOperation 条件：“消费已识别问题状态并作出可审计解决决定的操作”；MemoryRevisionOperation 条件：“以一个或多个既有记录为输入并产生新记录版本的操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryOperation: MemoryResolutionOperation (semantic kind=activity, backbone MemoryResolutionOperation-is_a-MemoryOperation); MemoryRevisionOperation (semantic kind=activity, backbone MemoryRevisionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryResolutionOperation condition: “An operation consuming an identified problem state and making an auditable resolution decision”; MemoryRevisionOperation condition: “An operation taking one or more existing records as input and producing a new record version”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryOperation：MemoryResolutionOperation（semantic kind=activity、バックボーン MemoryResolutionOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity、バックボーン MemoryRevisionOperation-is_a-MemoryOperation）。両端条件：MemoryResolutionOperation の条件：「識別済problem stateを消費しaudit可能resolution decisionを行うoperationです」；MemoryRevisionOperation の条件：「一つ以上の既存recordをinputに新版recordを生成するoperationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-resolution-operation-004
parent_relation:
  id: MemoryResolutionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
