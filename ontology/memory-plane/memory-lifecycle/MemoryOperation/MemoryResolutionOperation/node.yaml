schema: moonweave.ai/ontology-node/v1
id: MemoryResolutionOperation
kind: concept
labels:
  zh: 记忆解决操作
  en: Memory resolution operation
  ja: 記憶解決操作
semantics:
  short_definition:
    zh: 处理已检测记忆冲突或歧义的活动。
    en: Activity resolving detected memory conflicts or ambiguities.
    ja: 検出済 memory conflict/ambiguity を処理する activity。
  definition:
    zh: MemoryResolutionOperation 是 MemoryOperation 子类：消费 MemoryConflict 等评估产物并执行 MemoryConflictResolution，产生 MemoryConflictResolutionDecision。它不执行初始验证（MemoryValidation）或直接删除/写入，除非决策明确要求。
    en: MemoryResolutionOperation is a MemoryOperation subtype consuming assessment artifacts such as MemoryConflict and executing MemoryConflictResolution to produce MemoryConflictResolutionDecision. It does not perform initial validation (MemoryValidation) or direct delete/write unless the decision requires it.
    ja: MemoryResolutionOperation は MemoryConflict 等を consume し MemoryConflictResolution を実行して MemoryConflictResolutionDecision を生成する MemoryOperation subtype。initial validation/direct delete/write は decision 要求時のみ。
  why_needed:
    zh: 冲突检测与解决必须分阶段，否则 contradictory facts 会在同一操作里被误标为已修复。
    en: Conflict detection and resolution must be staged or contradictory facts get mislabeled as fixed in one operation.
    ja: conflict 検出と解決を分離しないと contradictory facts が同一 operation で誤って fixed になる。
  includes:
    - zh: 纳入 MemoryConflictResolution 及绑定决策执行链。
      en: Includes MemoryConflictResolution and bound decision execution chains.
      ja: MemoryConflictResolution と decision 実行 chain。
  excludes:
    - zh: 排除初始验证、无冲突的常规写入与容量处置。
      en: Excludes initial validation, conflict-free routine writes, and capacity disposition.
      ja: initial validation/無 conflict 通常 write/capacity disposition を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0/Letta 检测到 MemoryConflict 后，Moonweave 启动 resolution_operation_id，引用 conflict_id，执行 merge/update/delete 子操作并登记 MemoryConflictResolutionDecision。
    en: After Mem0/Letta detects MemoryConflict, Moonweave starts resolution_operation_id referencing conflict_id, executes merge/update/delete sub-operations, and registers MemoryConflictResolutionDecision.
    ja: MemoryConflict 検出後 resolution_operation_id が conflict_id を参照し merge/update/delete 実行、MemoryConflictResolutionDecision 登録。
  typical_input:
    - description: Open conflict reference
      format: |
        {"resolution_operation_id": "resolve-220", "conflict_id": "conflict-220"}
      source_claims: [claim-resolution-design]
  typical_output:
    - description: Resolution decision reference
      format: |
        {"decision_id": "decision-220", "conflict_status": "resolved"}
      source_claims: [claim-resolution-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Update/delete to resolve contradictory memories.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Delete or update passages to resolve conflicts.
structure:
  identity_keys: [resolution_operation_id]
  fields:
    - id: resolution_operation_id
      labels: {zh: 解决操作标识, en: Resolution operation identifier, ja: 解決操作識別子}
      definitions:
        zh: 标识一次记忆冲突解决活动。
        en: Identifies one memory conflict resolution activity.
        ja: 一 memory conflict resolution activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: resolve-220
      allowed_values: []
      source_claims: [claim-resolution-id]
    - id: conflict_id
      labels: {zh: 冲突标识, en: Conflict identifier, ja: 競合識別子}
      definitions:
        zh: 本次解决针对的 MemoryConflict。
        en: MemoryConflict targeted by this resolution.
        ja: 今回 resolution の対象 MemoryConflict。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: conflict-220
      allowed_values: []
      source_claims: [claim-resolution-conflict]
  constraints: []
  required_relations: []
examples:
  - id: MemoryResolutionOperation-example-language
    labels: {zh: 语言偏好冲突解决, en: Language preference resolution, ja: 言語選好 conflict 解決}
    descriptions:
      zh: resolve-220 消费 conflict-220，选择保留 TypeScript 记录并删除 Python 记录，产生 decision-220。
      en: resolve-220 consumes conflict-220, keeps TypeScript record and deletes Python record, producing decision-220.
      ja: resolve-220 が conflict-220 を処理し TypeScript 保持・Python 削除、decision-220 生成。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: conflict resolution}
    field_values: {resolution_operation_id: resolve-220, conflict_id: conflict-220}
    related_node_ids: [MemoryResolutionOperation, MemoryConflictResolution]
    related_relation_ids: []
    source_claims: [claim-resolution-mem0, claim-resolution-design]
  - id: MemoryResolutionOperation-example-merge
    labels: {zh: 合并解决, en: Merge resolution, ja: merge 解決}
    descriptions:
      zh: resolve-221 通过 MemoryMerge deduplicate 合并重复 passage 并关闭 conflict-221。
      en: resolve-221 closes conflict-221 by MemoryMerge deduplicating duplicate passages.
      ja: MemoryMerge dedup で resolve-221 が conflict-221 を close。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {resolution_operation_id: resolve-221}
    related_node_ids: [MemoryResolutionOperation, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-resolution-mem0, claim-resolution-design]
  - id: MemoryResolutionOperation-example-letta
    labels: {zh: Letta 归档冲突解决, en: Letta archival resolution, ja: Letta archival 解決}
    descriptions:
      zh: resolve-222 删除 Letta 中过时 passage 并更新 core block，解决 conflict-222。
      en: resolve-222 deletes stale Letta passage and updates core block to resolve conflict-222.
      ja: 古い passage 削除と core block 更新で resolve-222。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: delete/update}
    field_values: {resolution_operation_id: resolve-222}
    related_node_ids: [MemoryResolutionOperation]
    related_relation_ids: []
    source_claims: [claim-resolution-letta, claim-resolution-design]
  - id: MemoryResolutionOperation-example-not-validation
    labels: {zh: 解决非验证, en: Resolution is not validation, ja: resolution は validation ではない}
    descriptions:
      zh: validate-220 仅检测 conflict-220；resolve-220 才执行解决并产生 decision。
      en: validate-220 only detects conflict-220; resolve-220 executes resolution and produces decision.
      ja: validate は検出のみ、resolve が decision 生成。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryResolutionOperation, MemoryValidation]
    related_relation_ids: []
    source_claims: [claim-resolution-design]
parent_relation:
  id: MemoryResolutionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆操作, en: is a memory operation, ja: 記憶操作の一種}
  definitions:
    zh: MemoryResolutionOperation —is_a→ MemoryOperation 表示活动解决已检测冲突并产生决策。
    en: MemoryResolutionOperation —is_a→ MemoryOperation holds because the activity resolves detected conflicts and produces decisions.
    ja: 検出済 conflict を解決し decision を生成する activity のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryResolutionOperation-is_a-MemoryOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the activity resolves a detected conflict and records a decision.
      explanations:
        zh: 仅当活动解决已检测冲突并记录决策时成立。
        en: Assert only when the activity resolves a detected conflict and records a decision.
        ja: 検出済 conflict 解決と decision 記録時のみ。
      source_claims: [claim-resolution-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-resolution-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-resolution
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Update/delete to resolve conflicts.
  - id: src-letta-resolution
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: Archival update/delete for conflict resolution.
  - id: src-resolution-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Resolution distinct from validation and disposition.
source_claims:
  - id: claim-resolution-mem0
    source: src-mem0-resolution
    supports: Mem0 supports update/delete to reconcile contradictory memories.
    locator: PUT/DELETE /v1/memories/
    evidence_kind: primary-api
    confidence: high
  - id: claim-resolution-letta
    source: src-letta-resolution
    supports: Letta archival update/delete can resolve conflicting passages.
    locator: archival tools
    evidence_kind: primary-doc
    confidence: high
  - id: claim-resolution-design
    source: src-resolution-design
    supports: MemoryResolutionOperation resolves detected conflicts and produces decisions.
    locator: MemoryResolutionOperation
    evidence_kind: design-inference
    confidence: high
  - id: claim-resolution-id
    source: src-resolution-design
    supports: resolution_operation_id identifies one resolution activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-resolution-conflict
    source: src-resolution-design
    supports: conflict_id references the MemoryConflict being resolved.
    locator: structure
    evidence_kind: design-inference
    confidence: high
