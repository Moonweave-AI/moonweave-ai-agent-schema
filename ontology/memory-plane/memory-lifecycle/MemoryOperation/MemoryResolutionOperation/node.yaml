        en: Parent activity identity alone does not prove resolution; existing problem, frozen evidence, selected strategy, referenceable decision, and rationale are all required.
        ja: 親活動の識別だけでは解決を証明できません。既存問題、凍結証跡、選択戦略、参照可能な決定、理由のすべてが必要です。
      source_claims:
