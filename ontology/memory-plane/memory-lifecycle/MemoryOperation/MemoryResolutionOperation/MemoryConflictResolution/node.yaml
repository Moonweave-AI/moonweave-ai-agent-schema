schema: moonweave.ai/ontology-node/v1
id: MemoryConflictResolution
kind: concept
status: accepted
labels:
  zh: 记忆冲突解决
  en: Memory conflict resolution
  ja: 記憶競合解決
semantics:
  short_definition:
    zh: 消费 MemoryConflict、形成决定并可产生调和记录的解决操作。
    en: A resolution operation consuming MemoryConflict, forming a decision, and optionally producing a reconciled record.
    ja: MemoryConflictを消費しdecisionを形成しreconciled recordを生成し得るresolution operationです。
  definition:
    zh: MemoryConflictResolution 是绑定一个具体 MemoryConflict 的 MemoryResolutionOperation；它比较记录来源、时间、信任与策略，形成 MemoryConflictResolutionDecision，并在需要时产生新的调和 MemoryRecord。
    en: MemoryConflictResolution is a MemoryResolutionOperation bound to a specific MemoryConflict. It compares provenance, time, trust, and policy, forms a MemoryConflictResolutionDecision, and when needed produces a new reconciled MemoryRecord.
    ja: MemoryConflictResolution は特定 MemoryConflictにbindする MemoryResolutionOperationです。provenance・time・trust・policyを比較してMemoryConflictResolutionDecisionを形成し必要時new reconciled MemoryRecordを生成します。
  why_needed:
    zh: 取代把 MemoryConsolidation 当作通用冲突解决器的错误关系。
    en: Replaces the incorrect use of MemoryConsolidation as a generic conflict resolver.
    ja: MemoryConsolidationをgeneric conflict resolverとする誤relationを置換します。
  includes:
    - zh: 纳入选择可信版本、保留并列观点、请求人工裁决或生成调和记录。
      en: Includes selecting a trusted version, retaining parallel viewpoints, requesting human adjudication, or generating a reconciled record.
      ja: trusted version選択・parallel viewpoint保持・human adjudication要求・reconciled record生成を含みます。
  excludes:
    - zh: 排除没有显式冲突输入的普通巩固、更新和合并。
      en: Excludes ordinary consolidation, update, and merge without an explicit conflict input.
      ja: explicit conflict inputのないordinary consolidation・update・mergeを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - conflict_resolution_id
  fields:
    - id: conflict_resolution_id
      labels:
        zh: 冲突解决标识
        en: conflict resolution ID
        ja: conflict resolution ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次具体冲突解决活动。
        en: Identifies one concrete conflict-resolution activity.
        ja: 一concrete conflict-resolution activityを識別します。
      allowed_values: []
      pattern: null
      example_value: conflict-resolve-1910
      source_claims:
        - claim-memory-conflict-resolution-002
    - id: conflict_id
      labels:
        zh: 冲突标识
        en: conflict ID
        ja: conflict ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向该活动消费的 MemoryConflict。
        en: References the MemoryConflict consumed by this activity.
        ja: このactivityが消費するMemoryConflictを参照します。
      allowed_values: []
      pattern: null
      example_value: conflict-1910
      source_claims:
        - claim-memory-conflict-resolution-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryConflictResolution-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆冲突解决正例
      en: "Positive case: Memory conflict resolution"
      ja: 記憶競合解決正例
    scenario_id: null
    descriptions:
      zh: conflict-resolve-1910 消费 conflict-1910，依据更新来源和人工确认选择记录 B，并生成调和版本 C。
      en: conflict-resolve-1910 consumes conflict-1910, selects record B using newer provenance and human confirmation, and creates reconciled version C.
      ja: conflict-resolve-1910 はconflict-1910を消費しnewer provenance/human confirmationでrecord Bを選びreconciled版Cを作ります。
    field_values:
      conflict_resolution_id: conflict-resolve-1910
      conflict_id: conflict-1910
      resolution_operation_id: conflict-resolve-1910
      problem_state_id: conflict-1910
      operation_id: conflict-resolve-1910
      started_at: 2026-07-16T14:21:00Z
    related_node_ids:
      - MemoryConflictResolution
      - MemoryResolutionOperation
    related_relation_ids:
      - MemoryConflictResolution-is_a-MemoryResolutionOperation
    expected_result:
      zh: 归类为 MemoryConflictResolution，并附属一个解决决定。
      en: Classify as MemoryConflictResolution and attach one resolution decision.
      ja: MemoryConflictResolutionに分類し一resolution decisionを付属します。
    why_valid_or_invalid:
      zh: 冲突输入、比较依据、决定和可选调和输出均明确。
      en: Conflict input, comparison basis, decision, and optional reconciled output are explicit.
      ja: conflict input・comparison basis・decision・optional reconciled outputが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-conflict-resolution-001
  - id: MemoryConflictResolution-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆冲突解决边界例
      en: "Boundary case: Memory conflict resolution"
      ja: 記憶競合解決境界例
    scenario_id: null
    descriptions:
      zh: consolidate-1910 从一致的偏好观测归纳稳定偏好，没有任何冲突。
      en: consolidate-1910 generalizes a stable preference from consistent observations with no conflict.
      ja: consolidate-1910 はconflictなしの一貫preference observationからstable preferenceを一般化します。
    field_values: {}
    related_node_ids:
      - MemoryConflictResolution
    related_relation_ids: []
