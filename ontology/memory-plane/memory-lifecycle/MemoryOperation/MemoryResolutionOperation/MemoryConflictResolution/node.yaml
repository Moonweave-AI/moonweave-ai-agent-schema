source_claims:
  - id: claim-memory-conflict-resolution-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities, agents, time, and provenance facts around it. Moonweave records conflict resolution as an executed activity with explicit conflict input, decision, result, and audit evidence rather than a static policy or validation label.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a conflict resolution's input, decision, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-conflict
    source: w3c-prov-o
    supports: PROV-O distinguishes entities used by an activity from nearby but unused entities. Moonweave requires an exact identified conflict and its participating record versions as inputs rather than using a same subject, similar text, or concurrent audit event as a substitute.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-decision
    source: open-policy-agent
    supports: Open Policy Agent evaluates explicit rules over structured input to produce decisions. Moonweave records an explicit selected strategy and referenceable conflict-resolution decision rather than treating a generic handled label or candidate list as resolution.
    locator: "Open Policy Agent policy language overview and decision model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores SHA-256 digests over conflict evidence, participant record versions, comparison output, policy context, and rationale to keep a decision auditable against the facts used.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-output
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave asserts a reconciled-record output only for a new record with lineage to the conflict, decision, participants, and evidence, not for a retained existing record.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-boundary
    source: nist-ai-rmf
    supports: The NIST AI RMF separates identifying and measuring risk from managing and responding to it. Moonweave keeps conflict detection distinct from deciding a response, and keeps actual record rewrite or deletion distinct from the decision activity.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
