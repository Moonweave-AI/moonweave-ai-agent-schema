schema: moonweave.ai/ontology-node/v1
id: MemoryConflictResolution
kind: concept
status: accepted
labels:
  zh: 记忆冲突解决
  en: Memory conflict resolution
  ja: 記憶競合解決
semantics:
  short_definition:
    zh: 针对一个已识别 MemoryConflict，基于冻结证据形成并记录明确处置决定的记忆解决操作。
    en: A memory resolution operation that forms and records an explicit handling decision for one identified MemoryConflict from frozen evidence.
    ja: 識別済みの一つの MemoryConflict に対し、固定された証拠から明示的な処理決定を形成して記録する記憶解決操作です。
  definition:
    zh: MemoryConflictResolution 是绑定到一个已识别 MemoryConflict 的已执行 MemoryResolutionOperation。它固定冲突参与记录、比较维度、适用策略和证据清单，选择保留一项、生成调和输出、标记歧义或延后人工裁决等策略，并形成可引用的 MemoryConflictResolutionDecision 与理由。它不把发现不相容状态本身当作解决，也不把后续记录改写、删除或策略定义吸收为同一活动；这些后续事实必须以独立操作或关系表示。
    en: MemoryConflictResolution is an executed MemoryResolutionOperation bound to one identified MemoryConflict. It fixes the conflicting records, comparison dimension, applicable policy, and evidence manifest; selects a strategy such as retaining one item, producing a reconciled output, marking ambiguity, or deferring to human review; and forms a referenceable MemoryConflictResolutionDecision with rationale. It does not treat detecting incompatibility as resolution or absorb later record rewrite, deletion, or policy definition into the same activity; those later facts require separate operations or relations.
    ja: MemoryConflictResolution は、一つの識別済み MemoryConflict に結び付く実行済みの MemoryResolutionOperation です。競合する記録、比較次元、適用方針、証拠マニフェストを固定し、一項目の保持、調和出力の生成、曖昧性の付与、人手判断への保留などの戦略を選び、理由を伴う参照可能な MemoryConflictResolutionDecision を形成します。不整合の検出自体を解決とはせず、その後の記録改訂、削除、方針定義も同一活動に吸収しません。後続の事実は独立した操作または関係で表します。
  why_needed:
    zh: 冲突检测、决定何种处置、以及执行内容变更具有不同责任与证据边界；专门的冲突解决概念使选择依据、未获胜记录和后续动作都可审计。
    en: Conflict detection, deciding a treatment, and executing a content change have different responsibility and evidence boundaries; a dedicated conflict-resolution concept makes the selection basis, non-winning records, and follow-up actions auditable.
    ja: 競合検出、処理方法の決定、内容変更の実行には異なる責任境界と証拠境界があります。専用の競合解決概念により、選択根拠、採用されなかった記録、後続操作を監査可能にします。
  includes:
    - zh: 对显式冲突对象作出的保留、调和、歧义标记或有理由暂缓决定，以及形成该决定所使用的参与记录、比较依据和证据。
      en: Retain, reconcile, ambiguity-mark, or reasoned deferral decisions over an explicit conflict object, together with the participant records, comparison basis, and evidence used to form the decision.
      ja: 明示的な競合オブジェクトに対する保持、調和、曖昧性付与、理由付き保留の決定と、その決定に使用した参加記録、比較根拠、証拠を含みます。
  excludes:
    - zh: 只报告冲突的验证活动、没有冲突绑定的普通合并、仅创建解决策略、无依据自动覆盖，以及实际执行的改写或删除活动。
      en: A validation activity that only reports a conflict, an ordinary merge without conflict binding, creating a resolution policy only, unsupported automatic overwrite, and the actual rewrite or deletion activity.
      ja: 競合を報告するだけの検証活動、競合結合のない通常のマージ、解決方針だけの作成、根拠のない自動上書き、実際の改訂または削除活動を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将冲突解决实现为有明确输入和决策产物的工作单元：载入具体冲突及其参与记录，冻结用于比较的证据，按照可审计策略形成决定，并把任何记录改写或删除交给独立的后续操作。不能仅凭同一时间窗、相似文本或相同动作名称关联冲突、决定和输出。
    en: "Implement conflict resolution as a work unit with explicit input and decision output: load the specific conflict and its participant records, freeze comparison evidence, form a decision under an auditable strategy, and hand any record rewrite or deletion to a separate follow-up operation. Do not connect conflicts, decisions, and outputs merely by the same time window, similar text, or an identical action label."
    ja: 競合解決は、明示的な入力と決定出力を持つ作業単位として実装します。特定の競合と参加記録を読み込み、比較証拠を固定し、監査可能な戦略で決定を形成し、記録改訂または削除は独立した後続操作へ渡します。同じ時間枠、類似テキスト、同一の行動名だけで競合、決定、出力を結び付けてはいけません。
  typical_input:
    - description: An identified conflict repeated as the parent problem state, its participant record versions, comparison dimension, frozen evidence, explicit strategy, executor identity, and actual start time.
      format: "{operation_id, operation_kind:'resolution', problem_state_ref:conflict_ref, conflict_ref, candidate_record_refs, comparison_dimension, evidence_manifest_digest, resolution_strategy, actor_ref, started_at}"
  typical_output:
    - description: A completed, time-stamped decision with rationale and optional references to a separately generated reconciled record or later disposition operation.
      format: "{operation_id, status:'succeeded', resolution_decision_ref, selected_action, decision_rationale_digest, resolved_at, output_record_ref?, followup_operation_ref?}"
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents explicit policy evaluation over structured input to produce a decision.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, entities, agents, use, generation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding evidence manifests and decision rationale.
  source_claims:
    - claim-memory-conflict-resolution-activity
    - claim-memory-conflict-resolution-decision
    - claim-memory-conflict-resolution-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次冲突解决的输入、决定、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one conflict resolution's inputs, decision, result, and audit facts.
        ja: 一つの競合解決の入力、決定、結果、監査事実を結ぶために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-conflict-resolve-3001
      source_claims:
        - claim-memory-conflict-resolution-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承父类执行包络并固定为 resolution，表明这是对已识别问题状态形成处置决定的活动，而不是冲突检测、策略编写或后续改写。
        en: Retains the parent execution envelope and is fixed to resolution, identifying an activity that forms a treatment decision for an identified problem state rather than conflict detection, policy authoring, or follow-up rewrite.
        ja: 親の実行包絡を継承して resolution に固定する。これは識別済みの問題状態に対する処置決定を形成する活動であり、競合検出、方針作成、後続の書換えではない。
      allowed_values: [resolution]
      pattern: null
      example_value: resolution
      source_claims: [claim-memory-conflict-resolution-activity]
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的决策活动状态，区分已形成可引用决策的执行与仅发现冲突或暂存候选项的过程。
        en: The inherited decision-activity state, distinguishing an execution that formed a referenceable decision from one that only found a conflict or staged candidates.
        ja: 決定活動の状態を継承する。参照可能な決定を形成した実行と、競合を見つけただけまたは候補を一時保管した過程を区別する。
      allowed_values: [running, succeeded, failed, partially_succeeded, rejected, cancelled]
      pattern: null
      example_value: succeeded
      source_claims: [claim-memory-conflict-resolution-activity]
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的证据冻结和决策形成开始时间；它不是冲突首次检测时间、策略发布时间或后续记录改写时间。
        en: The inherited start time for evidence freezing and decision formation; it is not first-conflict detection, policy-publication, or later record-rewrite time.
        ja: 証拠固定と決定形成の開始時刻を継承する。最初の競合検出、方針公開、後続レコード書換えの時刻ではない。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T01:00:00Z"
      source_claims: [claim-memory-conflict-resolution-activity]
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的冲突裁决执行者引用；参与记录的来源作者、数据主体或策略作者不因与冲突相关而自动成为裁决者。
        en: The inherited conflict-adjudication executor reference; an author of a participant record, data subject, or policy author does not become the adjudicator merely by being related to the conflict.
        ja: 競合裁定の実行者参照を継承する。参加レコードの作成者、データ主体、方針作成者は、競合に関係するだけで裁定者にはならない。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: conflict-resolver-1
      source_claims: [claim-memory-conflict-resolution-activity]
    - id: problem_state_ref
      labels:
        zh: 问题状态引用
        en: problem state reference
        ja: 問題状態参照
      datatype: string
      required: true
      cardinality: { min: 1, max: 1 }
      definitions:
        zh: 继承的被解决问题状态引用；在此子类中必须与 conflict_ref 指向同一已识别 MemoryConflict，避免把普通合并或模糊异常伪装成冲突解决。
        en: The inherited reference to the problem state being resolved. In this subtype it must identify the same MemoryConflict as conflict_ref, preventing an ordinary merge or vague anomaly from masquerading as conflict resolution.
        ja: 解決対象の問題状態参照を継承する。このサブタイプでは conflict_ref と同じ識別済み MemoryConflict を指さなければならず、通常のマージや曖昧な異常を競合解決に見せかけない。
      allowed_values: []
      pattern: "^[a-z][a-z0-9-]*-[A-Za-z0-9._-]+$"
      example_value: conflict-3001
      source_claims: [claim-memory-conflict-resolution-conflict]
    - id: conflict_ref
      labels:
        zh: 冲突引用
        en: conflict reference
        ja: 競合参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 精确引用这次活动实际消费的已识别 MemoryConflict；同一主体、相似记录或相邻审计事件不能替代该冲突身份。
        en: Precisely references the identified MemoryConflict actually consumed by this activity; the same subject, similar records, or adjacent audit events cannot substitute for conflict identity.
        ja: この活動が実際に消費する識別済み MemoryConflict を正確に参照します。同じ主体、類似記録、隣接する監査イベントは競合識別子の代わりになりません。
      allowed_values: []
      pattern: '^conflict-[A-Za-z0-9._-]+$'
      example_value: conflict-3001
      source_claims:
        - claim-memory-conflict-resolution-conflict
    - id: candidate_record_refs
      labels:
        zh: 候选记录引用
        en: candidate record references
        ja: 候補記録参照
      datatype: string
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出冲突对象中参加比较的精确 MemoryRecord 版本，而不是按相似性扩展出的记录集合。
        en: Lists the exact MemoryRecord versions participating in the conflict comparison rather than a record set expanded by similarity.
        ja: 類似性で拡張された記録集合ではなく、競合比較に参加する正確な MemoryRecord バージョンを列挙します。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3001-a-v2,record-3001-b-v4
      source_claims:
        - claim-memory-conflict-resolution-conflict
    - id: comparison_dimension
      labels:
        zh: 比较维度
        en: comparison dimension
        ja: 比較次元
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明此次冲突的决定性比较维度，以防把时间上接近或文本相似误作冲突裁决依据。
        en: States the decisive comparison dimension for this conflict so temporal proximity or text similarity is not mistaken for an adjudication basis.
        ja: 時間的近接またはテキスト類似を裁定根拠と誤認しないよう、この競合における決定的な比較次元を示します。
      allowed_values:
        - source_authority
        - temporal_recency
        - consent_scope
        - logical_consistency
        - human_adjudication
      pattern: null
      example_value: source_authority
      source_claims:
        - claim-memory-conflict-resolution-decision
    - id: evidence_manifest_digest
      labels:
        zh: 证据清单摘要
        en: evidence manifest digest
        ja: 証拠マニフェストダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定参与记录版本、冲突检测依据、比较输出、适用策略版本和同意范围的 SHA-256 摘要，确保决定可回溯到当时证据。
        en: Fixes a SHA-256 digest of participant record versions, conflict-detection basis, comparison output, applicable policy version, and consent scope so the decision remains traceable to contemporaneous evidence.
        ja: 決定を同時点の証拠へ追跡可能にするため、参加記録バージョン、競合検出根拠、比較出力、適用方針バージョン、同意範囲の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:4f9ecbcfa6d096d0cfb10ee88e211d4afd12df330ba10c714874a07a1f7e0719
      source_claims:
        - claim-memory-conflict-resolution-evidence
    - id: resolution_strategy
      labels:
        zh: 解决策略
        en: resolution strategy
        ja: 解決戦略
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明针对该冲突选定的处置路径；它必须是已形成的选择，而不是笼统状态、候选列表或未执行的策略愿望。
        en: States the handling path selected for this conflict; it must be a formed choice rather than a generic status, candidate list, or unexecuted policy wish.
        ja: この競合に選択された処理経路を示します。一般的な状態、候補一覧、未実行の方針希望ではなく、形成済みの選択でなければなりません。
      allowed_values:
        - retain_one
        - reconcile
        - mark_ambiguous
        - defer_with_reason
      pattern: null
      example_value: retain_one
      source_claims:
        - claim-memory-conflict-resolution-decision
    - id: resolution_decision_ref
      labels:
        zh: 解决决定引用
        en: resolution decision reference
        ja: 解決決定参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识由本次活动形成的 MemoryConflictResolutionDecision，使后续改写、删除或人工处理可以引用选择和理由而不重写证据。
        en: Identifies the MemoryConflictResolutionDecision formed by this activity so later rewrite, deletion, or human handling can reference the choice and rationale without rewriting evidence.
        ja: この活動が形成した MemoryConflictResolutionDecision を識別し、後続の改訂、削除、人手処理が証拠を書き換えずに選択と理由を参照できるようにします。
      allowed_values: []
      pattern: '^conflict-resolution-decision-[A-Za-z0-9._-]+$'
      example_value: conflict-resolution-decision-3001
      source_claims:
        - claim-memory-conflict-resolution-decision
    - id: decision_rationale_digest
      labels:
        zh: 决定理由摘要
        en: decision rationale digest
        ja: 決定理由ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定将冲突、参与记录、比较维度、证据清单和策略连接到所选决定的理由摘要，避免仅凭动作标签推断理由。
        en: Fixes a rationale digest connecting conflict, participant records, comparison dimension, evidence manifest, and strategy to the selected decision so a reason is not inferred from an action label alone.
        ja: 行動ラベルだけから理由を推定しないよう、競合、参加記録、比較次元、証拠マニフェスト、戦略を選択決定へ結ぶ理由ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:d79c335097a0851a12f7a123d683c04906555f4cd06d05c8bcb7e9dfaa12903c
      source_claims:
        - claim-memory-conflict-resolution-evidence
    - id: resolved_at
      labels:
        zh: 决定形成时间
        en: resolved at
        ja: 決定形成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录冲突解决决定实际形成的事件时间，而非冲突首次检测、策略创建或随后改写记录的时间。
        en: Records the event time at which the conflict-resolution decision actually forms, not first conflict detection, policy creation, or a later record rewrite.
        ja: 競合解決決定が実際に形成されたイベント時刻を記録します。最初の競合検出、方針作成、後続の記録改訂の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T01:00:00.095Z"
      source_claims:
        - claim-memory-conflict-resolution-activity
  constraints:
    - id: MemoryConflictResolution-parent-resolution-contract
      expression: "operation_kind = resolution, problem_state_ref = conflict_ref, and status, started_at, actor_ref, evidence_manifest_digest, resolution_strategy, resolution_decision_ref, decision_rationale_digest, and resolved_at describe the same executed decision activity."
      explanation:
        zh: 冲突解决保留父类的执行活动和问题状态合同；不能通过只列出候选记录或策略而省略实际裁决的主体、时间、状态与同一问题引用。
        en: Conflict resolution retains the parent contract for an executed activity and its problem state; listing candidates or a strategy cannot omit the actual adjudicator, time, state, and identity of the same problem.
        ja: 競合解決は、実行活動と問題状態に関する親契約を保持する。候補または戦略を列挙するだけで、実際の裁定者、時刻、状態、同一問題の識別を省略してはならない。
      source_claims:
        - claim-memory-conflict-resolution-activity
        - claim-memory-conflict-resolution-conflict
        - claim-memory-conflict-resolution-decision
    - id: MemoryConflictResolution-conflict-and-participant-consistency
      expression: "conflict_ref identifies a detected MemoryConflict, candidate_record_refs are the participating record versions for that conflict, and evidence_manifest_digest covers the conflict evidence and comparison output."
      explanation:
        zh: 若没有精确冲突、参与记录和被冻结的比较证据，活动不能与普通合并、相邻告警或基于相似性的猜测区分。
        en: Without an exact conflict, participant records, and frozen comparison evidence, the activity cannot be distinguished from an ordinary merge, adjacent alert, or similarity-based guess.
        ja: 正確な競合、参加記録、固定された比較証拠がなければ、この活動は通常のマージ、隣接する警告、類似性に基づく推測と区別できません。
      source_claims:
        - claim-memory-conflict-resolution-conflict
        - claim-memory-conflict-resolution-evidence
    - id: MemoryConflictResolution-decision-consistency
      expression: "resolution_strategy is explicit, resolution_decision_ref identifies one decision formed for conflict_ref, and decision_rationale_digest covers candidate_record_refs, comparison_dimension, evidence_manifest_digest, and the selected strategy."
      explanation:
        zh: 仅检测冲突或列举候选并不构成解决；必须形成可引用的具体选择及其可追溯理由。
        en: Detecting a conflict or listing candidates does not constitute resolution; a specific referenceable choice and traceable rationale must be formed.
        ja: 競合検出または候補列挙は解決を構成しません。具体的で参照可能な選択と追跡可能な理由を形成する必要があります。
      source_claims:
        - claim-memory-conflict-resolution-decision
        - claim-memory-conflict-resolution-evidence
    - id: MemoryConflictResolution-output-and-separation
      expression: "A retained existing record is not a produced record; only resolution_strategy=reconcile may assert MemoryConflictResolution-produces-MemoryRecord, and any revision or deletion execution is represented by a separate operation linked to resolution_decision_ref."
      explanation:
