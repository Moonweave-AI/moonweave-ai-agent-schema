schema: moonweave.ai/ontology-node/v1
id: MemoryConflictResolution
kind: concept
labels:
  zh: 记忆冲突解决
  en: Memory conflict resolution
  ja: 記憶競合解決
semantics:
  short_definition:
    zh: 针对已登记冲突执行解决策略的活动。
    en: Activity executing a resolution strategy for a registered conflict.
    ja: 登録済 conflict に resolution strategy を実行する activity。
  definition:
    zh: MemoryConflictResolution 是 MemoryResolutionOperation：读取 MemoryConflict，按策略选择保留、合并、更新或删除 involved records，并产生 MemoryConflictResolutionDecision。Mem0 PUT/DELETE 与 Letta update/delete 常作为决策的执行后端。
    en: MemoryConflictResolution is a MemoryResolutionOperation that reads MemoryConflict, applies policy to keep, merge, update, or delete involved records, and produces MemoryConflictResolutionDecision. Mem0 PUT/DELETE and Letta update/delete often serve as execution backends for the decision.
    ja: MemoryConflictResolution は MemoryConflict を read し keep/merge/update/delete を実行して MemoryConflictResolutionDecision を生成する MemoryResolutionOperation。Mem0 PUT/DELETE/Letta update/delete が execution backend。
  why_needed:
    zh: 解决策略必须与检测到的冲突对象绑定，否则无法审计“为何选择保留 A 而非 B”。
    en: Resolution strategy must bind to the detected conflict object or audit cannot explain why A was kept over B.
    ja: resolution strategy が conflict object に bind されないと「A を残し B を消した理由」を監査できない。
  includes:
    - zh: 纳入 keep-winner、merge、supersede、delete-loser 等策略执行。
      en: Includes keep-winner, merge, supersede, delete-loser strategy execution.
      ja: keep-winner/merge/supersede/delete-loser strategy 実行。
  excludes:
    - zh: 排除初始冲突检测与无 conflict_id 的常规更新。
      en: Excludes initial conflict detection and routine updates without conflict_id.
      ja: initial conflict 検出/conflict_id なし通常 update を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: resolve-220 引用 conflict-220，执行 Mem0 DELETE 删除 loser record 或 PUT 更新 winner；decision_id 记录 strategy、winning_record_id 与 executed_operation_ids。
    en: resolve-220 references conflict-220, executes Mem0 DELETE on loser or PUT on winner; decision_id records strategy, winning_record_id, and executed_operation_ids.
    ja: resolve-220 が conflict-220 を参照し Mem0 DELETE/PUT 実行。decision_id が strategy/winning_record_id/executed_operation_ids を記録。
  typical_input:
    - description: Conflict resolution input
      format: |
        {"conflict_resolution_id": "resolve-220", "conflict_id": "conflict-220", "strategy": "keep-winner"}
      source_claims: [claim-conflict-resolution-design]
  typical_output:
    - description: Resolution decision
      format: |
        {"decision_id": "decision-220", "conflict_status": "resolved"}
      source_claims: [claim-conflict-resolution-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: PUT/DELETE to apply conflict resolution.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Update/delete passages during resolution.
structure:
  identity_keys: [conflict_resolution_id]
  fields:
    - id: conflict_resolution_id
      labels: {zh: 冲突解决标识, en: Conflict resolution identifier, ja: 競合解決識別子}
      definitions:
        zh: 标识一次 MemoryConflictResolution 执行。
        en: Identifies one MemoryConflictResolution execution.
        ja: 一 MemoryConflictResolution execution を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: resolve-220
      allowed_values: []
      source_claims: [claim-conflict-resolution-id]
    - id: strategy
      labels: {zh: 解决策略, en: Resolution strategy, ja: 解決 strategy}
      definitions:
        zh: keep-winner、merge、supersede、delete-loser 等。
        en: keep-winner, merge, supersede, delete-loser, etc.
        ja: keep-winner/merge/supersede/delete-loser 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: keep-winner
      allowed_values: []
      source_claims: [claim-conflict-resolution-strategy]
  constraints: []
  required_relations: []
examples:
  - id: MemoryConflictResolution-example-keep-winner
    labels: {zh: 保留胜者, en: Keep winner, ja: winner 保持}
    descriptions:
      zh: resolve-220 strategy=keep-winner 保留 record-310(TypeScript) 并 DELETE record-311(Python)。
      en: resolve-220 with strategy=keep-winner keeps record-310 (TypeScript) and DELETEs record-311 (Python).
      ja: keep-winner で record-310 保持、record-311 DELETE。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: "DELETE /v1/memories/{id}/"}
    field_values: {conflict_resolution_id: resolve-220, strategy: keep-winner}
    related_node_ids: [MemoryConflictResolution, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-conflict-resolution-mem0, claim-conflict-resolution-design]
  - id: MemoryConflictResolution-example-merge
    labels: {zh: 合并解决, en: Merge resolution, ja: merge 解決}
    descriptions:
      zh: resolve-221 strategy=merge 调用 Mem0 deduplicate:true 合并重复记忆并关闭 conflict-221。
      en: resolve-221 strategy=merge calls Mem0 deduplicate:true to merge duplicates and close conflict-221.
      ja: merge strategy で Mem0 deduplicate 実行。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {conflict_resolution_id: resolve-221, strategy: merge}
    related_node_ids: [MemoryConflictResolution, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-conflict-resolution-mem0, claim-conflict-resolution-design]
  - id: MemoryConflictResolution-example-supersede
    labels: {zh: 新版替代, en: Supersede, ja: supersede}
    descriptions:
      zh: resolve-223 strategy=supersede 对 winner 执行 Mem0 PUT 更新并标记 loser 为 invalid。
      en: resolve-223 strategy=supersede runs Mem0 PUT on winner and marks loser invalid.
      ja: supersede で winner に PUT、loser invalid 化。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: "PUT /v1/memories/{id}/"}
    field_values: {conflict_resolution_id: resolve-223, strategy: supersede}
    related_node_ids: [MemoryConflictResolution, MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-conflict-resolution-mem0]
  - id: MemoryConflictResolution-example-not-conflict
    labels: {zh: 解决非冲突对象, en: Resolution is not conflict object, ja: resolution は conflict object ではない}
    descriptions:
      zh: conflict-220 是信息状态；resolve-220 才是执行解决的活动。
      en: conflict-220 is information state; resolve-220 is the activity executing resolution.
      ja: conflict-220 は情報、resolve-220 は activity。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryConflictResolution, MemoryConflict]
    related_relation_ids: []
    source_claims: [claim-conflict-resolution-design]
parent_relation:
  id: MemoryConflictResolution-is_a-MemoryResolutionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆解决操作, en: is a memory resolution operation, ja: 記憶解決操作の一種}
  definitions:
    zh: MemoryConflictResolution —is_a→ MemoryResolutionOperation 表示针对 MemoryConflict 执行解决策略。
    en: MemoryConflictResolution —is_a→ MemoryResolutionOperation holds because it executes resolution strategy against MemoryConflict.
    ja: MemoryConflict に対し resolution strategy を実行するため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryConflictResolution-is_a-MemoryResolutionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when conflict_id is bound and a resolution strategy is executed.
      explanations:
        zh: 仅当绑定 conflict_id 并执行解决策略时成立。
        en: Assert only when conflict_id is bound and a resolution strategy is executed.
        ja: conflict_id bind と strategy 実行時のみ。
      source_claims: [claim-conflict-resolution-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-conflict-resolution-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-conflict-resolution
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: PUT/DELETE and deduplicate for resolution.
  - id: src-conflict-resolution-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Conflict resolution executes strategy and produces decision.
source_claims:
  - id: claim-conflict-resolution-mem0
    source: src-mem0-conflict-resolution
    supports: Mem0 PUT/DELETE and deduplicate support conflict resolution execution.
    locator: Memory API
    evidence_kind: primary-api
    confidence: high
  - id: claim-conflict-resolution-design
    source: src-conflict-resolution-design
    supports: MemoryConflictResolution binds conflict, strategy, and decision.
    locator: MemoryConflictResolution boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-conflict-resolution-id
    source: src-conflict-resolution-design
    supports: conflict_resolution_id identifies one resolution execution.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-conflict-resolution-strategy
    source: src-conflict-resolution-design
    supports: strategy names the resolution approach applied.
    locator: structure
    evidence_kind: design-inference
    confidence: high
