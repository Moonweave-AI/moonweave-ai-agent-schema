      zh: 不得归类为 MemoryConflictResolution；应归 MemoryConsolidation。
      en: Do not classify as MemoryConflictResolution; classify as MemoryConsolidation.
      ja: MemoryConflictResolutionでなくMemoryConsolidationに分類します。
    why_valid_or_invalid:
      zh: 没有 MemoryConflict 输入，也不需要裁决。
      en: There is no MemoryConflict input and no adjudication is required.
      ja: MemoryConflict inputがなくadjudication不要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-conflict-resolution-001
