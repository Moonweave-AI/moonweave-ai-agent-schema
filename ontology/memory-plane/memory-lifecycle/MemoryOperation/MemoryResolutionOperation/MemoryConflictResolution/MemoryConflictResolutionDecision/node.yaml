schema: moonweave.ai/ontology-node/v1
id: MemoryConflictResolutionDecision
kind: concept
labels:
  zh: 记忆冲突解决决策
  en: Memory conflict resolution decision
  ja: 記憶競合解決決定
semantics:
  short_definition:
    zh: 记录冲突如何解决的可审计决策信息。
    en: Auditable decision information recording how a conflict was resolved.
    ja: conflict がどう解決されたかを記録する監査可能 decision 情報。
  definition:
    zh: MemoryConflictResolutionDecision 是 MemoryConflictResolution 产生的信息对象：记录 strategy、winning_record_id、invalidated_record_ids、executed_operation_ids 与 resolved_at。它不是解决活动本身，也不是 MemoryConflict 检测状态。
    en: MemoryConflictResolutionDecision is an information object produced by MemoryConflictResolution recording strategy, winning_record_id, invalidated_record_ids, executed_operation_ids, and resolved_at. It is neither the resolution activity nor the MemoryConflict detection state.
    ja: MemoryConflictResolutionDecision は strategy/winning_record_id/invalidated_record_ids/executed_operation_ids/resolved_at を記録する information object。resolution activity でも MemoryConflict 検出状態でもない。
  why_needed:
    zh: 决策文档必须可查询，以回答合规与产品问题“为何保留这条、删除那条”。
    en: Decision documents must be queryable to answer compliance and product questions about why one record was kept and another removed.
    ja: decision document が query 不能だと「なぜ A 保持 B 削除」を答えられない。
  includes:
    - zh: 纳入 strategy、胜者/败者 record 引用与 executed_operation_ids。
      en: Includes strategy, winner/loser record references, and executed_operation_ids.
      ja: strategy/winner/loser record 参照/executed_operation_ids。
  excludes:
    - zh: 排除解决活动、开放冲突状态与未执行的计划。
      en: Excludes the resolution activity, open conflict state, and unexecuted plans.
      ja: resolution activity/open conflict/unexecuted plan を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: resolve-220 完成后产生 decision-220：strategy=keep-winner、winning_record_id=record-310-v1、invalidated_record_ids 含 record-311-v1、executed_operation_ids 含 delete-311。Mem0 DELETE 成功响应应映射到 executed_operation_ids。
    en: After resolve-220 completes, decision-220 records strategy=keep-winner, winning_record_id=record-310-v1, invalidated_record_ids including record-311-v1, executed_operation_ids including delete-311. Mem0 DELETE success should map to executed_operation_ids.
    ja: resolve-220 完了後 decision-220 生成。Mem0 DELETE 成功は executed_operation_ids へ。
  typical_input:
    - description: Resolution completion
      format: |
        {"conflict_resolution_id": "resolve-220", "executed_operation_ids": ["delete-311"]}
      source_claims: [claim-decision-design]
  typical_output:
    - description: Decision record
      format: |
        {
          "decision_id": "decision-220",
          "conflict_id": "conflict-220",
          "strategy": "keep-winner",
          "resolved_at": "2026-07-16T10:00:00Z"
        }
      source_claims: [claim-decision-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Lifecycle mutations referenced in decision execution list.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Tool calls recorded as executed operations.
structure:
  identity_keys: [decision_id]
  fields:
    - id: decision_id
      labels: {zh: 决策标识, en: Decision identifier, ja: 決定識別子}
      definitions:
        zh: 稳定标识一次冲突解决决策。
        en: Stable identifier for one conflict resolution decision.
        ja: 一 conflict resolution decision を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision-220
      allowed_values: []
      source_claims: [claim-decision-id]
    - id: strategy
      labels: {zh: 解决策略, en: Resolution strategy, ja: 解決 strategy}
      definitions:
        zh: 应用的策略名，如 keep-winner、merge。
        en: Applied strategy name such as keep-winner or merge.
        ja: keep-winner/merge 等 applied strategy。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: keep-winner
      allowed_values: []
      source_claims: [claim-decision-strategy]
    - id: resolved_at
      labels: {zh: 解决时间, en: Resolved at, ja: 解決時刻}
      definitions:
        zh: 决策登记为完成的 UTC 时间。
        en: UTC time when the decision was recorded complete.
        ja: decision 完了登録 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T10:00:00Z
      allowed_values: []
      source_claims: [claim-decision-time]
  constraints: []
  required_relations: []
examples:
  - id: MemoryConflictResolutionDecision-example-keep-winner
    labels: {zh: 保留胜者决策, en: Keep-winner decision, ja: keep-winner 決定}
    descriptions:
      zh: decision-220 记录 strategy=keep-winner，winning_record_id=record-310-v1，invalidated record-311-v1，executed delete-311。
      en: decision-220 records strategy=keep-winner, winning_record_id=record-310-v1, invalidated record-311-v1, executed delete-311.
      ja: decision-220 が keep-winner と delete-311 を記録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: conflict resolution}
    field_values: {decision_id: decision-220, strategy: keep-winner, resolved_at: 2026-07-16T10:00:00Z}
    related_node_ids: [MemoryConflictResolutionDecision, MemoryConflictResolution]
    related_relation_ids: []
    source_claims: [claim-decision-mem0, claim-decision-design]
  - id: MemoryConflictResolutionDecision-example-merge
    labels: {zh: 合并决策, en: Merge decision, ja: merge 決定}
    descriptions:
      zh: decision-221 strategy=merge，executed merge-221 与 Mem0 deduplicate:true，conflict-221 status=resolved。
      en: decision-221 strategy=merge, executed merge-221 with Mem0 deduplicate:true, conflict-221 status=resolved.
      ja: merge-221 実行で decision-221、conflict-221 resolved。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {decision_id: decision-221, strategy: merge}
    related_node_ids: [MemoryConflictResolutionDecision, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-decision-mem0, claim-decision-design]
  - id: MemoryConflictResolutionDecision-example-open-conflict
    labels: {zh: 非开放冲突, en: Not open conflict, ja: open conflict ではない}
    descriptions:
      zh: conflict-220 status=open 时尚无 decision-220；决策只在 resolve-220 完成后产生。
      en: While conflict-220 status=open there is no decision-220; decision appears only after resolve-220 completes.
      ja: conflict open 中は decision なし。resolve 完了後に生成。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryConflictResolutionDecision, MemoryConflict]
    related_relation_ids: []
    source_claims: [claim-decision-design]
  - id: MemoryConflictResolutionDecision-example-letta
    labels: {zh: Letta 解决决策, en: Letta resolution decision, ja: Letta 解決決定}
    descriptions:
      zh: decision-222 记录 archival_memory_delete 与 core block 更新作为 executed_operation_ids。
      en: decision-222 records archival_memory_delete and core block update in executed_operation_ids.
      ja: decision-222 が Letta delete/update を executed_operation_ids に記録。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: resolution}
    field_values: {decision_id: decision-222}
    related_node_ids: [MemoryConflictResolutionDecision]
    related_relation_ids: []
    source_claims: [claim-decision-letta, claim-decision-design]
parent_relation:
  id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
  predicate: has_decision
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有冲突解决决策
    en: has conflict resolution decision
    ja: conflict resolution decision を持つ
  definitions:
    zh: MemoryConflictResolution —has_decision→ MemoryConflictResolutionDecision 把解决活动连接到可审计决策信息。
    en: MemoryConflictResolution —has_decision→ MemoryConflictResolutionDecision links the resolution activity to auditable decision information.
    ja: MemoryConflictResolution —has_decision→ MemoryConflictResolutionDecision は resolution activity を auditable decision 情報へ接続。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse has_decision, ja: 逆方向読取}}
  conditions:
    - id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when decision references the completing conflict_resolution_id and conflict_id.
      explanations:
        zh: 仅当 decision 引用完成的 conflict_resolution_id 与 conflict_id 时成立。
        en: Assert only when decision references the completing conflict_resolution_id and conflict_id.
        ja: decision が conflict_resolution_id/conflict_id を参照する時のみ。
      source_claims: [claim-decision-design]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-decision-design]
relations: []
sources:
  - id: src-mem0-decision
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Executed lifecycle ops in resolution decisions.
  - id: src-letta-decision
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: Tool execution recorded in decisions.
  - id: src-decision-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Decision information distinct from resolution activity.
source_claims:
  - id: claim-decision-mem0
    source: src-mem0-decision
    supports: Mem0 lifecycle API calls can be listed as executed operations in decisions.
    locator: Memory API
    evidence_kind: primary-api
    confidence: high
  - id: claim-decision-letta
    source: src-letta-decision
    supports: Letta tool invocations can be recorded in resolution decisions.
    locator: archival tools
    evidence_kind: primary-doc
    confidence: high
  - id: claim-decision-design
    source: src-decision-design
    supports: MemoryConflictResolutionDecision records auditable resolution outcome.
    locator: MemoryConflictResolutionDecision boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-decision-id
    source: src-decision-design
    supports: decision_id identifies one resolution decision.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-decision-strategy
    source: src-decision-design
    supports: strategy records which resolution approach was applied.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-decision-time
