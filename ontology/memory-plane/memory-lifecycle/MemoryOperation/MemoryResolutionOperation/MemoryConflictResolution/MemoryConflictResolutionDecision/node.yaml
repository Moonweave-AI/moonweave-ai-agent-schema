    labels:
      zh: 基于权威来源的保留决定
      en: Retention decision based on source authority
      ja: 情報源権威に基づく保持決定

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      decision_id: conflict-resolution-decision-3101
      resolution_operation_ref: mem-op-conflict-resolve-3101
      conflict_ref: conflict-3101
      candidate_record_refs:
        - record-3101-a-v1
        - record-3101-b-v3
      comparison_dimension: source_authority
      selected_action: retain_one
      decision_state: final
      decided_at: "2026-07-19T02:00:00.072Z"
    related_node_ids:
      - MemoryConflictResolutionDecision
      - MemoryConflictResolution
      - MemoryConflict
    related_relation_ids:
      - MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
      - MemoryConflictResolution-consumes-MemoryConflict

    source_claims:
      - claim-memory-conflict-resolution-decision-ownership
      - claim-memory-conflict-resolution-decision-selection
      - claim-memory-conflict-resolution-decision-evidence
  - id: MemoryConflictResolutionDecision-example-counterexample-execution

    labels:
      zh: 执行活动不是决定信息
      en: Execution activity is not decision information
      ja: 実行活動は決定情報ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-conflict-resolve-3102
      conflict_ref: conflict-3102
      output_record_ref: record-3102-reconciled-v1
      decision_id: absent
      selected_action: absent
      rationale_digest: absent
    related_node_ids:
      - MemoryConflictResolutionDecision
      - MemoryConflictResolution
      - MemoryRecord
    related_relation_ids:
      - MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
      - MemoryConflictResolution-produces-MemoryRecord

    source_claims:
      - claim-memory-conflict-resolution-decision-boundary
  - id: MemoryConflictResolutionDecision-example-boundary-same-action-other-conflict

    labels:
      zh: 相同行动不等于同一决定
      en: Same action does not mean same decision
      ja: 同じ行動は同じ決定を意味しない

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      decision_id: conflict-resolution-decision-3103
      resolution_operation_ref: mem-op-conflict-resolve-3103
      conflict_ref: conflict-3103
      selected_action: retain_one
      decision_state: final
    related_node_ids:
