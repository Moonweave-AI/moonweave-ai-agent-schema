relations: []
sources:
  - id: nist-ai-rmf
    title: NIST AI Risk Management Framework 1.0
    source_type: standard
    url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
    relevance: Separates identifying and measuring risks from managing and responding to them.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents explicit policy evaluation over structured input to produce a decision.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, agents, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 digests that can bind decision rationale to evidence.
source_claims:
  - id: claim-memory-conflict-resolution-decision-information
    source: w3c-prov-o
    supports: PROV-O distinguishes an information entity from an executed activity and records associated time and provenance facts. Moonweave treats a conflict-resolution decision as independently identifiable information rather than an execution log.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-decision-identity
    source: w3c-prov-o
    supports: PROV-O permits entities and provenance facts to have stable independent identities. Moonweave assigns a stable decision ID so later execution and audit can refer to the same choice without duplicating it.
    locator: "PROV-O Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-decision-ownership
    source: w3c-prov-o
    supports: PROV-O distinguishes an activity's used entities and generated entities from unrelated nearby facts. Moonweave links a decision only to the resolution activity and conflict that formed it and agrees on the same participants.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-decision-selection
    source: open-policy-agent
    supports: Open Policy Agent evaluates explicit rules over structured input to produce decisions. Moonweave records selected action and comparison basis explicitly rather than treating a generic handled label or candidate list as a decision.
    locator: "Open Policy Agent policy language overview and decision model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-decision-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 rationale digest that binds selected action to the conflict, participant records, comparison basis, and evidence used.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-resolution-decision-boundary
    source: nist-ai-rmf
    supports: The NIST AI RMF separates identifying and measuring risk from managing and responding to it. Moonweave keeps the decision information distinct from conflict detection and from later execution of record rewrite or deletion.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
