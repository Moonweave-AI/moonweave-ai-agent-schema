    zh: 该组合关系表达决定信息属于特定冲突解决活动；冲突输入、候选记录、策略、理由、实际改写、删除和输出分别由字段或独立关系表达。
    en: This composition relation expresses that decision information belongs to one specific conflict-resolution activity; conflict input, candidate records, strategy, rationale, actual rewrite, deletion, and output use fields or separate relations.
    ja: この構成関係は決定情報が一つの特定競合解決活動に属することを表します。競合入力、候補記録、戦略、理由、実際の改訂、削除、出力はフィールドまたは独立関係で表します。
