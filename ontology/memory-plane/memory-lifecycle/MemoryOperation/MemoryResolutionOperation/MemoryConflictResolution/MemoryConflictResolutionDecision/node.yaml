schema: moonweave.ai/ontology-node/v1
id: MemoryConflictResolutionDecision
kind: concept
status: accepted
labels:
  zh: 记忆冲突解决决定
  en: Memory conflict resolution decision
  ja: 記憶競合解決決定
semantics:
  short_definition:
    zh: 记录一次冲突解决所选动作、比较依据与责任主体的信息。
    en: Information recording the selected action, comparison basis, and accountable actor for one conflict resolution.
    ja: 一conflict resolutionのselected action・comparison basis・accountable actorを記録するinformationです。
  definition:
    zh: MemoryConflictResolutionDecision 是 MemoryConflictResolution 的组成信息，明确保留、替代、并存、升级人工或生成调和版本等选择及理由；它不是执行这些选择的活动。
    en: MemoryConflictResolutionDecision is compositional information of MemoryConflictResolution that records choices such as retain, supersede, coexist, escalate to a human, or create a reconciled version and their rationale. It is not the activity executing those choices.
    ja: MemoryConflictResolutionDecision はMemoryConflictResolutionのcomposition informationでretain・supersede・coexist・human escalate・reconciled version作成等のchoice/rationaleを記録します。実行activityではありません。
  why_needed:
    zh: 把可审计规范决定与执行活动、输出记录分离。
    en: Separates the auditable normative decision from the execution activity and output record.
    ja: audit可能normative decisionをexecution activity/output recordから分けます。
  includes:
    - zh: 纳入所选动作、证据排序、策略依据和人工升级说明。
      en: Includes selected action, evidence ordering, policy basis, and human-escalation rationale.
      ja: selected action・evidence ordering・policy basis・human escalation rationaleを含みます。
  excludes:
    - zh: 排除冲突状态本身、调和记录内容和无理由的自动覆盖。
      en: Excludes the conflict state itself, reconciled record content, and unexplained automatic overwrite.
      ja: conflict state自体・reconciled record content・理由なしautomatic overwriteを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: decision ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次冲突解决决定。
        en: Identifies one conflict-resolution decision.
        ja: 一conflict-resolution decisionを識別します。
      allowed_values: []
      pattern: null
      example_value: decision-2403
      source_claims:
        - claim-memory-conflict-resolution-decision-002
    - id: selected_action
      labels:
        zh: 所选动作
        en: selected action
        ja: 選択action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录保留、替代、并存、升级或调和等决定。
        en: Records retain, supersede, coexist, escalate, or reconcile.
        ja: retain・supersede・coexist・escalate・reconcileを記録します。
      allowed_values: []
      pattern: null
      example_value: retain-newer-verified-record
      source_claims:
        - claim-memory-conflict-resolution-decision-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryConflictResolutionDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆冲突解决决定正例
      en: "Positive case: Memory conflict resolution decision"
      ja: 記憶競合解決決定正例
    scenario_id: null
    descriptions:
      zh: decision-2403 记录因 record-b 来源更新且经人工确认，选择保留 B 并让其替代 A。
      en: decision-2403 records the choice to retain B and supersede A because B has newer provenance and human confirmation.
      ja: decision-2403 はBがnewer provenance/human confirmationを持つためB保持・A supersedeを選んだと記録します。
    field_values:
      decision_id: decision-2403
      selected_action: retain-newer-verified-record
    related_node_ids:
      - MemoryConflictResolutionDecision
    related_relation_ids: []
    expected_result:
      zh: 归类为 MemoryConflictResolutionDecision。
      en: Classify as MemoryConflictResolutionDecision.
      ja: MemoryConflictResolutionDecisionに分類します。
    why_valid_or_invalid:
      zh: 选择、依据和责任链都明确，且对象仅记录决定。
      en: The choice, basis, and accountability chain are explicit, and the object only records the decision.
      ja: choice・basis・accountability chainが明示されobjectはdecisionのみ記録します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-conflict-resolution-decision-001
  - id: MemoryConflictResolutionDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆冲突解决决定边界例
      en: "Boundary case: Memory conflict resolution decision"
      ja: 記憶競合解決決定境界例
    scenario_id: null
    descriptions:
      zh: conflict-resolve-2403 实际读取记录、请求人工确认并写入调和版本。
      en: conflict-resolve-2403 actually reads records, requests human confirmation, and writes a reconciled version.
      ja: conflict-resolve-2403 は実際にrecordをreadしhuman confirmationを求めreconciled版を書きます。
    field_values: {}
    related_node_ids:
      - MemoryConflictResolutionDecision
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 Decision；应归 MemoryConflictResolution。
      en: Do not classify as the Decision; classify as MemoryConflictResolution.
      ja: DecisionでなくMemoryConflictResolutionに分類します。
    why_valid_or_invalid:
      zh: 这是具有执行过程的活动，不是活动附属的信息。
      en: This is an activity with an execution process, not information attached to it.
      ja: execution processを持つactivityで付属informationではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-conflict-resolution-decision-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有解决决定
    en: has resolution decision
    ja: resolution decisionを持つ
  definitions:
    zh: MemoryConflictResolution —has_decision→ MemoryConflictResolutionDecision 把解决活动连接到其唯一可审计选择及理由。
    en: MemoryConflictResolution —has_decision→ MemoryConflictResolutionDecision links the resolution activity to its auditable selected action and rationale.
    ja: MemoryConflictResolution —has_decision→ MemoryConflictResolutionDecision はresolution activityをaudit可能selected action/rationaleへ結びます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse has resolution decision
      ja: 逆方向読取
  conditions:
    - id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when decision.conflict_id matches the conflict consumed by the activity and the selected action was formed by that activity.
      explanations:
        zh: 仅当 decision.conflict_id 与活动消费的 conflict_id 一致，且所选动作由该活动形成时成立。
        en: Assert only when decision.conflict_id matches the conflict consumed by the activity and the selected action was formed by that activity.
        ja: decision.conflict_idがactivity消費conflict_idと一致しselected actionがそのactivityで形成された時だけassertします。
      source_claims:
        - claim-memory-conflict-resolution-decision-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 具有解决决定正例
        en: "Positive case: has resolution decision"
        ja: resolution decisionを持つ正例
      scenario_id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision:positive:20260716
      descriptions:
        zh: conflict-resolve-1910 形成 decision-2403；两者都绑定 conflict-1910，决定选择 authoritative-newer 并记录比较理由。
        en: conflict-resolve-1910 forms decision-2403; both bind conflict-1910, and the decision selects authoritative-newer with its comparison rationale.
        ja: conflict-resolve-1910 は decision-2403 を形成し、両者は conflict-1910 を bind し authoritative-newer 選択と比較理由を記録します。
      field_values: {}
      related_node_ids:
        - MemoryConflictResolution
        - MemoryConflictResolutionDecision
      related_relation_ids:
        - MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
      expected_result:
        zh: 将 decision-2403 作为 conflict-resolve-1910 的决定信息连接，使解决活动、冲突和所选动作形成可审计闭环。
        en: Attach decision-2403 as the decision of conflict-resolve-1910, closing an auditable chain among the activity, conflict, and selected action.
        ja: decision-2403 を conflict-resolve-1910 の decision として接続し activity・conflict・selected action の auditable chain を閉じます。
      why_valid_or_invalid:
        zh: 决定由该活动生成且 conflict_id 完全一致，动作与理由正是解决过程的输出信息而非另一个活动。
        en: The decision was formed by this activity and has the identical conflict_id; its action and rationale are the resolution's information output.
        ja: decision はこの activity が形成し conflict_id も一致し、action/rationale は resolution の information output です。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-conflict-resolution-decision-001
    - id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 具有解决决定边界例
        en: "Boundary case: has resolution decision"
        ja: resolution decisionを持つ境界例
      scenario_id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision:boundary:20260716
      descriptions:
        zh: decision-2404 的 selected_action 也叫 retain-newer，但它绑定 conflict-2000，生成活动是 conflict-resolve-2000。
        en: decision-2404 also selects retain-newer, but it binds conflict-2000 and was formed by conflict-resolve-2000.
        ja: decision-2404 も retain-newer を選びますが conflict-2000 を bind し conflict-resolve-2000 が形成しました。
      field_values: {}
      related_node_ids:
        - MemoryConflictResolution
        - MemoryConflictResolutionDecision
      related_relation_ids:
        - MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
      expected_result:
        zh: 拒绝将 decision-2404 连接到 conflict-resolve-1910；保留其与 conflict-resolve-2000 的原始归属。
        en: Reject attaching decision-2404 to conflict-resolve-1910 and preserve its ownership by conflict-resolve-2000.
        ja: decision-2404 の conflict-resolve-1910 への接続を拒否し conflict-resolve-2000 への元 ownership を保持します。
      why_valid_or_invalid:
        zh: 相同动作名称并不证明同一决定；冲突身份和生成活动不一致会把两个解决过程错误合并。
        en: An identical action label does not prove decision identity; mismatched conflict and generating activity would merge separate resolutions.
        ja: 同じ action label は decision identity を証明せず、conflict と generating activity の不一致は別 resolution を誤統合します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-conflict-resolution-decision-001
  source_claims:
    - claim-memory-conflict-resolution-decision-001
