      resolution_operation_ref: mem-op-conflict-resolve-3104
      conflict_ref: conflict-3104
      candidate_record_refs:
        - record-3104-a-v1
        - record-3104-b-v1
      comparison_dimension: human_adjudication
      selected_action: mark_ambiguous
      rationale_digest: sha256:cf0b8e3842ece2b6e04b04466b6b15a444a9b4f4fd1d6ef5712e37e6bd9e15a2
      decision_state: final
      decided_at: "2026-07-19T02:20:00.091Z"
      execution_operation_ref: absent
    related_node_ids:
