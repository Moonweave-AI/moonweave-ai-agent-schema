    source_claims:
      - claim-memory-conflict-resolution-decision-information
      - claim-memory-conflict-resolution-decision-selection
      - claim-memory-conflict-resolution-decision-evidence
parent_relation:
  id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
  predicate: part_of
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有冲突解决决定
    en: has conflict resolution decision
    ja: 競合解決決定を持つ
  definitions:
    zh: MemoryConflictResolution 由一个与相同冲突和所属活动一致的 MemoryConflictResolutionDecision 组成，该决定记录选择与理由而不替代执行活动。
    en: MemoryConflictResolution is composed with a MemoryConflictResolutionDecision that agrees on the same conflict and owning activity and records choice and rationale without replacing execution activity.
    ja: MemoryConflictResolution は、同じ競合と所属活動について一致し、実行活動を置き換えずに選択と理由を記録する MemoryConflictResolutionDecision とともに構成されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该组合关系记录一个可审计决定与其所属解决活动之间的事实，不对所有实现强制固定的决策修订数。
    en: This composition relation records the fact between an auditable decision and its owning resolution activity and imposes no fixed number of decision revisions across implementations.
    ja: この構成関係は監査可能な決定と所属する解決活動の間の事実を記録し、実装全体に固定の決定改訂数を課しません。
  inverse_reading:
