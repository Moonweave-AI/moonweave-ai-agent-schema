schema: moonweave.ai/ontology-node/v1
id: MemoryConflictResolutionDecision
kind: concept
status: accepted
labels:
  zh: 记忆冲突解决决定
  en: Memory conflict resolution decision
  ja: 記憶競合解決決定
semantics:
  short_definition:
    zh: 记录一次 MemoryConflictResolution 所选处置、比较依据和理由的可引用信息对象。
    en: A referenceable information object that records the selected treatment, comparison basis, and rationale of one MemoryConflictResolution.
    ja: 一つの MemoryConflictResolution の選択された処理、比較根拠、理由を記録する参照可能な情報オブジェクトです。
  definition:
    zh: MemoryConflictResolutionDecision 是组成一个 MemoryConflictResolution 的决策信息。它绑定该活动及其消费的 MemoryConflict，记录参与记录、比较维度、已选策略、理由摘要、作出时间和决定状态，使后续的记录改写、删除、人工处理或审计能够引用同一选择。它不是读取冲突、评估证据、写入调和记录或使记录失效的执行活动；这些过程由相应操作与关系独立表达。
    en: MemoryConflictResolutionDecision is decision information composing one MemoryConflictResolution. It binds that activity and its consumed MemoryConflict, records participant records, comparison dimension, selected strategy, rationale digest, decision time, and decision state so later record rewrite, deletion, human handling, or audit can reference the same choice. It is not an activity that reads a conflict, evaluates evidence, writes a reconciled record, or invalidates a record; those processes are expressed independently by the appropriate operations and relations.
    ja: MemoryConflictResolutionDecision は一つの MemoryConflictResolution を構成する決定情報です。その活動と消費した MemoryConflict に結び付き、参加記録、比較次元、選択戦略、理由ダイジェスト、決定時刻、決定状態を記録することで、後続の記録改訂、削除、人手処理、監査が同じ選択を参照できます。競合を読む、証拠を評価する、調和記録を書く、記録を無効化する活動ではありません。それらの過程は適切な操作と関係で独立して表します。
  why_needed:
    zh: 将“为何选择此处置”从实际执行中分离，避免同一冲突被不同后续操作重新解释或将动作日志误作可审计决定。
    en: Separates why a treatment was selected from its execution so later operations cannot reinterpret the same conflict or mistake an action log for an auditable decision.
    ja: 処理を選んだ理由を実行から分離し、後続操作が同じ競合を再解釈したり、行動ログを監査可能な決定と誤認したりしないようにします。
  includes:
    - zh: 决定标识、所属解决活动、冲突引用、参与记录、比较维度、所选策略、理由摘要、决定时间和最终或被取代状态。
      en: Decision identity, owning resolution activity, conflict reference, participant records, comparison dimension, selected strategy, rationale digest, decision time, and final or superseded state.
      ja: 決定識別子、所属する解決活動、競合参照、参加記録、比較次元、選択戦略、理由ダイジェスト、決定時刻、最終または置換済み状態を含みます。
  excludes:
    - zh: 冲突状态本身、只读验证发现、实际记录更新或删除、无冲突绑定的普通策略、以及没有理由或归属的“已处理”标签。
      en: The conflict state itself, a read-only validation finding, actual record update or deletion, an ordinary policy without conflict binding, and a handled label with no rationale or ownership.
      ja: 競合状態自体、読み取り専用の検証結果、実際の記録更新または削除、競合結合のない通常方針、理由または所属のない処理済みラベルを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 将决定实现为不可与执行日志混淆的独立信息：用稳定决定标识绑定具体解决活动和冲突，固定输入记录、比较维度、策略和理由，并在后续操作中只引用该决定。不得由动作名称、相同策略文字或同批审计事件推断决定归属。
    en: "Implement a decision as independent information that cannot be confused with an execution log: bind a stable decision identifier to the specific resolution activity and conflict, fix input records, comparison dimension, strategy, and rationale, and make later operations reference the decision only. Do not infer decision ownership from an action name, the same strategy text, or a shared audit batch."
    ja: 決定は実行ログと混同できない独立情報として実装します。安定した決定識別子を特定の解決活動と競合に結び付け、入力記録、比較次元、戦略、理由を固定し、後続操作はその決定だけを参照します。行動名、同じ戦略テキスト、共有監査バッチから決定の所属を推論してはいけません。
  typical_input:
    - description: A completed conflict-resolution context with its conflict, participant record versions, comparison evidence, selected treatment, accountable actor, and decision time.
      format: "{resolution_operation_ref, conflict_ref, candidate_record_refs, comparison_dimension, selected_action, rationale_digest, decided_at}"
  typical_output:
    - description: A durable referenceable decision record used by later execution, audit, supersession, or human review.
      format: "{decision_id, resolution_operation_ref, conflict_ref, selected_action, decision_state, rationale_digest, decided_at}"
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents explicit policy evaluation over structured input to produce a decision.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, entities, agents, use, generation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding decision rationale to evidence.
  source_claims:
    - claim-memory-conflict-resolution-decision-information
    - claim-memory-conflict-resolution-decision-selection
    - claim-memory-conflict-resolution-decision-boundary
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 決定 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次冲突处置选择，使不同后续操作可以引用同一决定而不复制或重解释理由。
        en: Stably identifies one conflict-treatment choice so different follow-up operations can reference the same decision without copying or reinterpreting its rationale.
        ja: 一つの競合処理選択を安定して識別し、異なる後続操作が理由を複製または再解釈せずに同じ決定を参照できるようにします。
      allowed_values: []
      pattern: '^conflict-resolution-decision-[A-Za-z0-9._-]+$'
      example_value: conflict-resolution-decision-3101
      source_claims:
        - claim-memory-conflict-resolution-decision-identity
    - id: resolution_operation_ref
      labels:
        zh: 所属解决操作引用
        en: owning resolution operation reference
        ja: 所属解決操作参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 精确引用形成此决定的 MemoryConflictResolution，而不是仅执行或后来引用该决定的其他操作。
        en: Precisely references the MemoryConflictResolution that formed this decision rather than another operation that merely executes or later cites it.
        ja: この決定を形成した MemoryConflictResolution を正確に参照します。単に決定を実行または後で引用する別の操作ではありません。
      allowed_values: []
      pattern: '^mem-op-conflict-resolve-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-conflict-resolve-3101
      source_claims:
        - claim-memory-conflict-resolution-decision-ownership
    - id: conflict_ref
      labels:
        zh: 冲突引用
        en: conflict reference
        ja: 競合参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向所属解决操作实际消费的 MemoryConflict；相同行动名称或相同策略不能替代冲突身份一致性。
        en: Points to the MemoryConflict actually consumed by the owning resolution operation; identical action names or strategies cannot substitute for conflict identity agreement.
        ja: 所属する解決操作が実際に消費した MemoryConflict を指します。同じ行動名または戦略は競合識別子の一致の代わりになりません。
      allowed_values: []
      pattern: '^conflict-[A-Za-z0-9._-]+$'
      example_value: conflict-3101
      source_claims:
        - claim-memory-conflict-resolution-decision-ownership
    - id: candidate_record_refs
      labels:
        zh: 候选记录引用
        en: candidate record references
        ja: 候補記録参照
      datatype: string
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出决定实际比较的冲突参与记录版本，避免使用仅在相同主体或相似性范围内的无关记录。
        en: Lists the conflict participant record versions actually compared by the decision and excludes records related only by shared subject or similarity.
        ja: 決定が実際に比較した競合参加記録バージョンを列挙し、共有主体または類似性だけで関連する記録を除外します。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3101-a-v1,record-3101-b-v3
      source_claims:
        - claim-memory-conflict-resolution-decision-ownership
    - id: comparison_dimension
      labels:
        zh: 比较维度
        en: comparison dimension
        ja: 比較次元
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录决定使用的主导比较维度，使审计者能够区分来源权威、时效、同意范围、逻辑一致性和人工裁决。
        en: Records the dominant comparison dimension used by the decision so an auditor can distinguish source authority, recency, consent scope, logical consistency, and human adjudication.
        ja: 監査者が情報源権威、最新性、同意範囲、論理的一貫性、人手裁定を区別できるよう、決定で用いた支配的比較次元を記録します。
      allowed_values:
        - source_authority
        - temporal_recency
        - consent_scope
        - logical_consistency
        - human_adjudication
      pattern: null
      example_value: source_authority
      source_claims:
        - claim-memory-conflict-resolution-decision-selection
    - id: selected_action
      labels:
        zh: 所选动作
        en: selected action
        ja: 選択行動
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录决定已选择的冲突处置策略，而不是候选清单、未执行意图或笼统的“已处理”状态。
        en: Records the conflict-treatment strategy selected by the decision rather than a candidate list, unexecuted intent, or generic handled state.
        ja: 候補一覧、未実行の意図、一般的な処理済み状態ではなく、決定が選択した競合処理戦略を記録します。
      allowed_values:
        - retain_one
        - reconcile
        - mark_ambiguous
        - defer_with_reason
      pattern: null
      example_value: retain_one
      source_claims:
        - claim-memory-conflict-resolution-decision-selection
    - id: rationale_digest
      labels:
        zh: 理由摘要
        en: rationale digest
        ja: 理由ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定从冲突、候选记录、比较维度和证据清单导出所选动作的理由摘要，便于复核而不暴露或改写原始证据。
        en: Fixes a digest of the rationale deriving the selected action from conflict, candidate records, comparison dimension, and evidence manifest for review without exposing or rewriting raw evidence.
        ja: 生の証拠を公開または書き換えずに確認できるよう、競合、候補記録、比較次元、証拠マニフェストから選択行動を導く理由のダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:28ef22741f911af469182a1919eea54006970f7ee541486debbddcec85d8dac9
      source_claims:
        - claim-memory-conflict-resolution-decision-evidence
    - id: decision_state
      labels:
        zh: 决定状态
        en: decision state
        ja: 決定状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 表示该决定当前仍是最终可执行选择，或已被带有新理由的新决定取代；它不表示执行活动成功与否。
        en: Indicates whether this decision remains the final actionable choice or has been superseded by a new decision with new rationale; it does not report execution success or failure.
        ja: この決定が最終的に実行可能な選択として残るか、新しい理由を伴う新決定により置換されたかを示します。実行活動の成功または失敗を報告するものではありません。
      allowed_values:
        - final
        - superseded
      pattern: null
      example_value: final
      source_claims:
        - claim-memory-conflict-resolution-decision-information
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 決定時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该决策信息实际形成的事件时间，而非冲突检测、策略定义、审计导入或后续执行时间。
        en: Records the event time at which this decision information actually forms, not conflict detection, policy definition, audit ingestion, or later execution time.
        ja: この決定情報が実際に形成されたイベント時刻を記録します。競合検出、方針定義、監査取込み、後続実行の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T02:00:00.072Z"
      source_claims:
        - claim-memory-conflict-resolution-decision-information
  constraints:
    - id: MemoryConflictResolutionDecision-ownership-and-conflict-consistency
      expression: "resolution_operation_ref identifies the owning MemoryConflictResolution, conflict_ref equals the conflict consumed by that operation, and candidate_record_refs are the participants recorded for that conflict."
      explanation:
        zh: 决定的活动、冲突和参与记录必须归属同一解决过程；相同行动文本或同一批审计事件不能把两个解决过程合并。
        en: The decision's activity, conflict, and participant records must belong to one resolution process; identical action text or an audit batch cannot merge two processes.
        ja: 決定の活動、競合、参加記録は一つの解決過程に属する必要があります。同じ行動テキストまたは監査バッチは二つの過程を統合できません。
      source_claims:
        - claim-memory-conflict-resolution-decision-ownership
    - id: MemoryConflictResolutionDecision-selection-and-rationale-consistency
      expression: "selected_action is explicit, comparison_dimension identifies the basis used, and rationale_digest binds that basis and the evidence used to the decision."
      explanation:
        zh: 仅有动作标签不是可审计决定；策略、比较依据和可验证理由必须同时存在。
        en: An action label alone is not an auditable decision; strategy, comparison basis, and verifiable rationale must coexist.
        ja: 行動ラベルだけは監査可能な決定ではありません。戦略、比較根拠、検証可能な理由が共存する必要があります。
      source_claims:
        - claim-memory-conflict-resolution-decision-selection
        - claim-memory-conflict-resolution-decision-evidence
    - id: MemoryConflictResolutionDecision-information-not-execution
      expression: "The decision records a selected action and rationale but does not itself assert record mutation, record invalidation, or reconciled-output creation; any such effect is represented by a separate operation and relation."
      explanation:
        zh: 决定信息说明应做什么及为何做，不等同于已经做了什么；把两者混同会伪造执行与谱系事实。
        en: Decision information states what should be done and why, not what has already been executed; conflating them fabricates execution and lineage facts.
        ja: 決定情報は何をなぜ行うべきかを示し、すでに何が実行されたかを示すものではありません。両者を混同すると実行と来歴の事実を捏造します。
      source_claims:
        - claim-memory-conflict-resolution-decision-boundary
  required_relation_constraints:
    - relation_id: MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
      requirement: The owning resolution operation must be associated with this decision and agree on conflict_ref.
examples:
