      labels:
        zh: 初始提交属于准入写入
        en: Initial commit is an admission write
        ja: 初期コミットは受入書込みに属する

      descriptions:
        zh: mem-op-write-310 对 candidate-item-310 作出 accept，并在没有前驱版本的地址成功提交 record-310-v1。
        en: mem-op-write-310 accepts candidate-item-310 and successfully commits record-310-v1 at an address with no predecessor version.
        ja: mem-op-write-310 は candidate-item-310 を accept し、前駆バージョンのないアドレスで record-310-v1 を正常にコミットします。
      field_values:
