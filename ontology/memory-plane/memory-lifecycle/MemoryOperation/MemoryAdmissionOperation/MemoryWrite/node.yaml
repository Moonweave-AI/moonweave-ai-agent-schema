parent_relation:
  id: MemoryWrite-is_a-MemoryAdmissionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆准入操作
    en: is a memory admission operation
    ja: 記憶受入操作の一種
  definitions:
    zh: MemoryWrite —is_a→ MemoryAdmissionOperation 表示：候选项被接受，并产生该持久键的初始 MemoryRecord。
    en: MemoryWrite —is_a→ MemoryAdmissionOperation holds because the candidate is accepted and the initial MemoryRecord for its persistent key is produced
    ja: MemoryWrite —is_a→ MemoryAdmissionOperation は、candidateを受入れpersistent keyのinitial MemoryRecordを生成するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is a memory admission operation
      ja: 逆方向読取
  conditions:
    - id: MemoryWrite-is_a-MemoryAdmissionOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the candidate is accepted and the initial MemoryRecord for its persistent key is produced—and already meets the activity definition of MemoryAdmissionOperation.
      explanations:
        zh: 仅当实例满足子类种差“候选项被接受，并产生该持久键的初始 MemoryRecord。”且已满足 MemoryAdmissionOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the candidate is accepted and the initial MemoryRecord for its persistent key is produced—and already meets the activity definition of MemoryAdmissionOperation.
        ja: instanceがchild differentia「candidateを受入れpersistent keyのinitial MemoryRecordを生成するため成立します。」を満たし、かつ MemoryAdmissionOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-write-004
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryWrite-is_a-MemoryAdmissionOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆准入操作正例
        en: "Positive case: is a memory admission operation"
        ja: 記憶受入操作の一種正例
      scenario_id: MemoryWrite-is_a-MemoryAdmissionOperation:positive:20260716
      descriptions:
        zh: write-310 接受候选 item-310，并为键 prefs/theme 创建没有有效前驱的首个持久记录 record-310-v1。
        en: write-310 accepts candidate item-310 and creates record-310-v1, the first persistent record for key prefs/theme with no valid predecessor.
        ja: write-310 は候補 item-310 を受け入れ、valid predecessor のない key prefs/theme の最初の永続 record-310-v1 を作ります。
      field_values: {}
      related_node_ids:
        - MemoryWrite
        - MemoryAdmissionOperation
      related_relation_ids:
        - MemoryWrite-is_a-MemoryAdmissionOperation
      expected_result:
        zh: 确认 write-310 是 MemoryWrite，并建立其对首个记录的生产事实，而不是把它解释为已有记录更新。
        en: Recognize write-310 as MemoryWrite and establish production of the initial record rather than interpreting it as an update of existing state.
        ja: write-310 を MemoryWrite と認定し、既存 state の update ではなく initial record の生成を確立します。
      why_valid_or_invalid:
        zh: 候选已通过准入，输出键此前没有有效版本，活动同时满足准入父类与“创建初始持久身份”的写入种差。
        en: The candidate passed admission and the key had no valid version, so the activity meets the admission parent and the initial-persistent-identity differentia.
        ja: 候補は admission を通過し key に valid version がないため、admission 親と initial persistent identity 作成という differentia を満たします。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-write-004
    - id: MemoryWrite-is_a-MemoryAdmissionOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆准入操作边界例
        en: "Boundary case: is a memory admission operation"
        ja: 記憶受入操作の一種境界例
      scenario_id: MemoryWrite-is_a-MemoryAdmissionOperation:boundary:20260716
      descriptions:
        zh: upsert-310 读取 record-310-v1 后把主题从 dark 改为 light，并生成带 predecessor_id 的 record-310-v2。
        en: upsert-310 reads record-310-v1, changes the theme from dark to light, and emits record-310-v2 with predecessor_id populated.
        ja: upsert-310 は record-310-v1 を読み theme を dark から light に変え、predecessor_id 付き record-310-v2 を生成します。
      field_values: {}
      related_node_ids:
        - MemoryWrite
        - MemoryAdmissionOperation
      related_relation_ids:
        - MemoryWrite-is_a-MemoryAdmissionOperation
      expected_result:
        zh: 拒绝将 upsert-310 标为 MemoryWrite；把它建模为 MemoryUpdate，并保留 v1 到 v2 的版本谱系。
        en: Do not type upsert-310 as MemoryWrite; model it as MemoryUpdate and preserve the v1-to-v2 version lineage.
        ja: upsert-310 を MemoryWrite とせず MemoryUpdate として扱い、v1 から v2 の version lineage を保持します。
      why_valid_or_invalid:
        zh: 键已有有效前驱且活动依赖其内容，因而这是修订而非首次持久化；使用 upsert API 不会改变本体语义。
        en: A valid predecessor exists and supplies the input content, making this revision rather than first persistence; an upsert API name does not change that semantics.
        ja: valid predecessor が存在し入力内容を供給するため revision であり、upsert API 名は ontology semantics を変えません。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-write-004
  source_claims:
    - claim-memory-write-004
