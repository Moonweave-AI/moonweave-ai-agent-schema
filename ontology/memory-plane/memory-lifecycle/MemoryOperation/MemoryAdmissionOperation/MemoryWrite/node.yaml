schema: moonweave.ai/ontology-node/v1
id: MemoryWrite
kind: concept
status: accepted
labels:
  zh: 记忆写入
  en: Memory write
  ja: 記憶書込み
semantics:
  short_definition:
    zh: 接受候选输入并成功创建首个持久 MemoryRecord 的准入操作。
    en: An admission operation that accepts candidate input and successfully creates its first persistent MemoryRecord.
    ja: 候補入力を受け入れ、最初の永続 MemoryRecord を正常に作成する受入操作です。
  definition:
    zh: MemoryWrite 是 admission_decision=accept 且已成功提交的 MemoryAdmissionOperation。它消费一个具有冻结输入快照、但尚无语义 MemoryRecord 身份的候选表示，在此前不存在有效前驱版本的持久地址创建 version 1 MemoryRecord。它不是候选内容、界面预览、缓存临时值、未提交的写入尝试，也不是从已有记录生成后继版本的 MemoryUpdate。
    en: MemoryWrite is a MemoryAdmissionOperation with admission_decision=accept that has committed successfully. It consumes a candidate representation with a frozen input snapshot but no semantic MemoryRecord identity and creates a version-1 MemoryRecord at a persistent address with no valid predecessor. It is not the candidate content, a UI preview, a transient cache value, an uncommitted write attempt, or MemoryUpdate that derives a successor from an existing record.
    ja: MemoryWrite は admission_decision=accept を持ち、正常にコミット済みの MemoryAdmissionOperation です。凍結入力スナップショットを持つが意味的な MemoryRecord 識別をまだ持たない候補表現を消費し、有効な前駆バージョンがない永続アドレスに version 1 の MemoryRecord を作成します。候補内容、UI プレビュー、一時キャッシュ値、未コミット書込み試行、既存レコードから後継を導く MemoryUpdate ではありません。
  why_needed:
    zh: 首次持久化、后续修订和仅暂存内容具有不同的版本谱系与恢复语义，需要可查询地分开。
    en: Initial persistence, later revision, and merely staged content have different version lineage and recovery semantics and must remain queryably distinct.
    ja: 初回永続化、後続改訂、単なる一時保管内容は異なるバージョン系譜と復旧意味を持つため、照会可能に分離する必要があります。
  includes:
    - zh: 已通过准入、实际提交，并为一个此前没有有效记录版本的持久地址创建初始记录的活动。
      en: Activities that pass admission, actually commit, and create an initial record for a persistent address that previously had no valid record version.
      ja: 受入を通過して実際にコミットし、以前に有効なレコードバージョンがない永続アドレスへ初期レコードを作成する活動を含みます。
  excludes:
    - zh: 已存在记录的更新或合并、失败或取消的提交、缓存写入、预览对象，以及只提出未来写入的建议。
      en: Updates or merges of an existing record, failed or cancelled commits, cache writes, preview objects, and recommendations that only propose future writing.
      ja: 既存レコードの更新または統合、失敗または取消されたコミット、キャッシュ書込み、プレビューオブジェクト、将来の書込みだけを提案する勧告を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将实际的首次持久化建模为带有候选快照、地址、提交证据和初始版本的工作单元；把 API 名称或 UI 显示与真实提交分开。
    en: Model actual first persistence as a work unit with candidate snapshot, address, commit evidence, and initial version; separate an API name or UI display from a real commit.
    ja: 実際の初回永続化を、候補スナップショット、アドレス、コミット証跡、初期バージョンを持つ作業単位として表し、API 名や UI 表示を実際のコミットから分離します。
  typical_input:
    - description: Accepted candidate input with frozen manifest, executor, policy context, and an unused persistent address.
      format: "{operation_id, candidate_item_ref, candidate_manifest_digest, admission_decision: accept, memory_store_ref, namespace_path, record_key}"
  typical_output:
    - description: Committed version-1 record with output identity, content digest, result, and audit references.
      format: "{operation_id, output_record_ref, output_record_version: 1, output_content_digest, committed_at, result_ref?, audit_event_refs?}"
  reference_implementations:
    - name: LangGraph Store API reference
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: Documents store put, get, and search operations that applications can wrap with admission and audit evidence.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines an activity's use of input entities and generation of distinct output entities.
  source_claims:
    - claim-memory-write-activity
    - claim-memory-write-commit
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类操作标识，以将本次写入、结果和审计事件归并为同一实际提交。
        en: Reuses the parent operation identity to join this write, its result, and audit events as the same actual commit.
        ja: 親操作識別子を再利用し、この書込み、結果、監査イベントを同じ実際のコミットとして結びます。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-write-310
      source_claims:
        - claim-memory-write-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 admission，保留初次写入之前的接受裁决是一次父类准入活动。
        en: Narrows the inherited operation kind to admission and preserves the acceptance decision that precedes this initial write.
        ja: 継承した操作種別を admission に限定し、この初回書込みに先行する受入判断を保持します。
      allowed_values:
        - admission
      pattern: null
      example_value: admission
      source_claims:
        - claim-memory-write-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录接受并提交候选项的活动状态，区别于输出记录日后是否仍有效。
        en: Records the state of the activity that accepts and commits the candidate, distinct from whether the output record remains valid later.
        ja: 候補を受入れてコミットする活動の状態を記録し、出力レコードが後で有効かとは区別します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-write-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际开始评估并提交该候选项的时间，不以目标存储写入完成时间替代。
        en: Records when assessment and commit of this candidate actually began, not when the target store later made the record visible.
        ja: この候補の評価とコミットを実際に始めた時刻を記録し、対象ストアで後に可視化された時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T17:00:00Z"
      source_claims:
        - claim-memory-write-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际完成候选检查和初次持久化提交的执行主体。
        en: References the actor that actually performs candidate checking and the initial persistence commit.
        ja: 候補検査と初回の永続化コミットを実際に行う主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-writer-3
      source_claims:
        - claim-memory-write-activity
    - id: candidate_item_ref
      labels:
        zh: 候选项引用
        en: candidate item reference
        ja: 候補項目参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次写入实际消费的候选表示；该候选在提交前不应被视为已经存在的目标 MemoryRecord。
        en: Identifies the candidate representation actually consumed by this write; before commit the candidate must not be treated as an already existing target MemoryRecord.
        ja: この書込みが実際に消費する候補表現を識別します。コミット前に候補を既存対象 MemoryRecord として扱ってはなりません。
      allowed_values: []
      pattern: "^candidate-[A-Za-z0-9._-]+$"
      example_value: candidate-item-310
      source_claims:
        - claim-memory-write-candidate
    - id: candidate_manifest_digest
      labels:
        zh: 候选输入摘要
        en: candidate input digest
        ja: 候補入力ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被接受并提交的候选输入摘要，使写入可重放且不依赖后来变化的候选内容。
        en: Fixes a digest of the candidate input accepted and committed so the write is replayable without relying on later-changed candidate content.
        ja: 受入・コミットされた候補入力のダイジェストを固定し、後で変更された候補内容に依存せず書込みを再実行可能にします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:681f8cc4a15c7a936c385cfb55837ac3271af2fef10c2b2f2a7df42d2e5c221f
      source_claims:
        - claim-memory-write-digest
    - id: admission_decision
      labels:
        zh: 准入决定
        en: admission decision
        ja: 受入決定
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 明确表明父级准入裁决为 accept；discard 或待裁决候选不能进入此子类。
        en: Explicitly states that the parent admission verdict is accept; discard or undecided candidates cannot enter this subtype.
        ja: 親受入判定が accept であることを明示します。discard または未決定候補はこのサブタイプに入れません。
      allowed_values:
        - accept
      pattern: null
      example_value: accept
      source_claims:
        - claim-memory-write-decision
    - id: decision_at
      labels:
        zh: 准入裁决时间
        en: admission decision time
        ja: 受入判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录形成 accept 裁决的时间，必须早于或等于初次记录提交可见的 committed_at。
        en: Records when the accept verdict was formed and must not follow the committed_at at which the initial record becomes visible.
        ja: accept 判定を形成した時刻を記録し、初回レコードが可視化された committed_at より後にはできません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T17:00:00.041Z"
      source_claims:
        - claim-memory-write-decision
    - id: decision_reason_code
      labels:
        zh: 准入裁决原因代码
        en: admission decision reason code
        ja: 受入判断理由コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用父类可比较原因代码说明为何接受候选项，而不把存储地址或输出内容当作接受理由。
        en: Records why the candidate was accepted in the parent comparable reason vocabulary rather than treating a storage address or output as the reason.
        ja: ストアのアドレスや出力を理由とみなさず、親の比較可能な理由語彙で候補を受入れた根拠を記録します。
      allowed_values:
        - novel_and_in_scope
        - user_authorized
      pattern: null
      example_value: novel_and_in_scope
      source_claims:
        - claim-memory-write-decision
    - id: memory_store_ref
      labels:
        zh: 目标存储引用
        en: target store reference
        ja: 対象ストア参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识承载初始记录版本的具体 MemoryStore，不能以候选来源或临时缓存替代。
        en: Identifies the concrete MemoryStore that hosts the initial record version; candidate source or transient cache cannot substitute for it.
        ja: 初期レコードバージョンを保持する具体的な MemoryStore を識別し、候補の出所や一時キャッシュで代替できません。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      example_value: memory-store-primary
      source_claims:
        - claim-memory-write-commit
    - id: namespace_path
      labels:
        zh: 目标命名空间路径
        en: target namespace path
        ja: 対象名前空間パス
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录初始记录在目标存储中的完整有序命名空间地址，而不是搜索前缀或候选来源路径。
        en: Records the complete ordered namespace address of the initial record in the target store, not a search prefix or candidate-source path.
        ja: 対象ストアにおける初期レコードの完全で順序付きの名前空間アドレスを記録し、検索プレフィックスや候補出所パスではありません。
      allowed_values: []
      pattern: null
      example_value: "[\"users\",\"u-123\",\"preferences\"]"
      source_claims:
        - claim-memory-write-commit
    - id: record_key
      labels:
        zh: 目标记录键
        en: target record key
        ja: 対象レコードキー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在目标存储和完整命名空间内定位初始记录的键；此键此前不能已有有效前驱版本。
        en: Locates the initial record within the target store and complete namespace; the key must have no prior valid predecessor version.
        ja: 対象ストアと完全な名前空間内で初期レコードを位置付けるキーであり、先行する有効バージョンを持ってはなりません。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      example_value: preferred_language
      source_claims:
        - claim-memory-write-initial-version
    - id: output_record_ref
      labels:
        zh: 输出记录引用
        en: output record reference
        ja: 出力レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识此次成功写入生成的初始 MemoryRecord，而不是候选项、预览对象或已有记录。
        en: Identifies the initial MemoryRecord generated by this successful write, not the candidate item, preview object, or an existing record.
        ja: この成功書込みが生成する初期 MemoryRecord を識別し、候補項目、プレビューオブジェクト、既存レコードではありません。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value: record-310-v1
      source_claims:
        - claim-memory-write-generation
    - id: output_record_version
      labels:
        zh: 输出记录版本
        en: output record version
        ja: 出力レコードバージョン
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 表明输出记录是该持久地址的初始版本，值固定为 1；后继版本应由 MemoryUpdate 产生。
        en: States that the output record is the initial version at the persistent address and is fixed at 1; a successor version must be produced by MemoryUpdate.
        ja: 出力レコードが永続アドレスの初期バージョンであり値は 1 に固定されることを示します。後継バージョンは MemoryUpdate が生成します。
      allowed_values:
        - 1
      pattern: null
      example_value: 1
      source_claims:
        - claim-memory-write-initial-version
    - id: output_content_digest
      labels:
        zh: 输出内容摘要
        en: output content digest
        ja: 出力内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定写入后初始记录规范化内容的摘要，用于证明输出没有被静默替换。
        en: Fixes a digest of the normalized initial-record content after write so the output cannot be silently substituted.
        ja: 書込み後の正規化された初期レコード内容のダイジェストを固定し、出力が黙って置換されないようにします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:0bf7fa8b48de8b9b1a498fe22c1200fc40c6e81dde5dcbd87d2591afc6057919
      source_claims:
        - claim-memory-write-digest
    - id: committed_at
      labels:
        zh: 提交时间
        en: committed at
        ja: コミット時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录输出记录实际对目标存储可见的提交时间，不能以预览、排队或重试时间替代。
        en: Records when the output record is actually committed and visible in the target store; preview, queue, or retry time cannot substitute for it.
        ja: 出力レコードが対象ストアで実際にコミットされ可視になった時刻を記録し、プレビュー、キュー、再試行時刻で代替できません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T17:00:00.143Z"
      source_claims:
        - claim-memory-write-commit
    - id: trigger_feedback_refs
      labels:
        zh: 触发反馈引用
        en: triggering feedback references
        ja: トリガーとなるフィードバック参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出实质触发或改变写入决定的 Feedback 身份；同一会话中的普通评价不应自动列入。
        en: Lists Feedback identities that materially triggered or changed the write decision; ordinary evaluation in the same session must not be included automatically.
        ja: 書込み決定を実質的にトリガーまたは変更した Feedback 識別を列挙し、同じセッションの通常評価を自動的に含めてはなりません。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
      example_value:
        - feedback-91
      source_claims:
        - claim-memory-write-feedback
  constraints:
    - id: MemoryWrite-parent-admission-envelope
      expression: "operation_kind = admission, admission_decision = accept, decision_at is on or after started_at and on or before committed_at, and decision_reason_code records the acceptance basis."
      explanation:
        zh: 初次写入既是一次准入裁决又是一次提交；接受理由和裁决时间必须仍可审计，不能只保留已生成的记录。
        en: Initial write is both an admission decision and a commit, so its acceptance reason and decision time must remain auditable rather than retaining only the generated record.
        ja: 初回書込みは受入判断でもありコミットでもあるため、生成レコードだけでなく受入理由と判断時刻を監査可能なまま保持します。
      source_claims:
        - claim-memory-write-decision
        - claim-memory-write-commit
    - id: MemoryWrite-parent-acceptance-consistency
      expression: "The inherited admission_decision equals accept and the instance satisfies MemoryAdmissionOperation with a started executor-bound activity and one decision_at for candidate_manifest_digest."
      explanation:
        zh: 写入不能从待裁决或已拒绝候选直接产生；它必须继承一次真实、可审计的接受裁决。
        en: A write cannot arise directly from an undecided or rejected candidate; it must inherit one real, auditable acceptance verdict.
        ja: 書込みは未決定または拒否候補から直接生じることはできず、実在し監査可能な一つの受入判定を継承しなければなりません。
      source_claims:
        - claim-memory-write-decision
    - id: MemoryWrite-initial-version-boundary
      expression: "output_record_version equals 1 and no valid MemoryRecord predecessor exists for memory_store_ref, namespace_path, and record_key before committed_at; otherwise classify the activity as MemoryUpdate or another revision operation."
      explanation:
        zh: 初始写入的种差是没有有效前驱版本；同一地址已有记录时，生成后继必须保留修订谱系而不能伪装为写入。
        en: The differentia of initial write is absence of a valid predecessor version; when the address already has a record, a successor must preserve revision lineage rather than masquerade as write.
        ja: 初期書込みの種差は有効な前駆バージョンがないことです。アドレスに既存レコードがある場合、後継は書込みを装わず改訂系譜を保持しなければなりません。
      source_claims:
        - claim-memory-write-initial-version
    - id: MemoryWrite-commit-and-output-consistency
      expression: "status is succeeded, committed_at is on or after decision_at and started_at, output_record_ref is listed in the operation result, and output_content_digest matches the committed record content."
      explanation:
        zh: UI 预览、队列确认或无输出失败不能证明初始记录已生成；需要成功提交、输出身份与内容摘要一致。
        en: A UI preview, queue acknowledgement, or failure with no output does not prove initial-record generation; successful commit, output identity, and matching content digest are required.
        ja: UI プレビュー、キュー確認、出力のない失敗は初期レコード生成を証明しません。成功コミット、出力識別、一致する内容ダイジェストが必要です。
      source_claims:
        - claim-memory-write-commit
        - claim-memory-write-generation
    - id: MemoryWrite-feedback-causality-boundary
      expression: "Each trigger_feedback_refs value has audit evidence showing how that Feedback materially affected candidate selection or the acceptance decision; temporal co-occurrence is insufficient."
      explanation:
        zh: 反馈在同一运行中出现或主题相近不能证明它触发写入；需要身份引用和可审计的实质影响说明。
        en: Feedback appearing in the same run or on a similar topic does not prove it triggered the write; identity reference and auditable material-impact explanation are required.
