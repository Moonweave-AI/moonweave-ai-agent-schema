schema: moonweave.ai/ontology-node/v1
id: MemoryWrite
kind: concept
status: accepted
labels:
  zh: 记忆写入
  en: Memory write
  ja: 記憶書込
semantics:
  short_definition:
    zh: 接受一个候选项并创建其首个持久 MemoryRecord 的准入操作。
    en: An admission operation accepting a candidate and creating its first persistent MemoryRecord.
    ja: candidateを受入れ最初のpersistent MemoryRecordを作るadmission operationです。
  definition:
    zh: MemoryWrite 是 MemoryAdmissionOperation：它消费一个尚无持久记录身份的 MemoryItem，并在策略允许时产生初始 MemoryRecord；对既有记录生成新版本属于 MemoryUpdate。
    en: MemoryWrite is a MemoryAdmissionOperation that consumes a MemoryItem without a persistent-record identity and, when policy permits, produces an initial MemoryRecord. Producing a new version of an existing record is MemoryUpdate instead.
    ja: MemoryWrite はpersistent-record identityをまだ持たない MemoryItemを消費しpolicy許可時にinitial MemoryRecordを生成する MemoryAdmissionOperationです。既存recordの新版生成はMemoryUpdateです。
  why_needed:
    zh: 明确初始写入与后续修订的版本边界。
    en: Makes the version boundary between initial persistence and later revision explicit.
    ja: initial persistと後続revisionの版境界を明示します。
  includes:
    - zh: 纳入从消息、工具结果、偏好或经验候选项创建首条记录。
      en: Includes creating the first record from a message, tool result, preference, or experience candidate.
      ja: message・tool result・preference・experience候補からfirst recordを作ることを含みます。
  excludes:
    - zh: 排除覆盖既有记录、仅缓存临时值或只提出候选项而未提交。
      en: Excludes overwriting an existing record, merely caching a transient value, or proposing without committing a candidate.
      ja: 既存record上書き・一時valueのcacheのみ・commitなしの候補提案を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - write_operation_id
  fields:
    - id: write_operation_id
      labels:
        zh: 写入操作标识
        en: write operation ID
        ja: write operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次初始持久化活动。
        en: Identifies one initial persistence activity.
        ja: 一initial persistence activityを識別します。
      allowed_values: []
      pattern: null
      example_value: write-310
      source_claims:
        - claim-memory-write-002
    - id: output_record_id
      labels:
        zh: 输出记录标识
        en: output record ID
        ja: output record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该写入产生的首个 MemoryRecord。
        en: Identifies the initial MemoryRecord generated by this write.
        ja: このwriteが生成したinitial MemoryRecordを識別します。
      allowed_values: []
      pattern: null
      example_value: record-310-v1
      source_claims:
        - claim-memory-write-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryWrite-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆写入正例
      en: "Positive case: Memory write"
      ja: 記憶書込正例
    scenario_id: null
    descriptions:
      zh: memory-op-write-001 消费尚无持久记录身份的 item-310，在策略允许后创建初始记录 record-310-v1，并把它登记到 prefs/theme 键。
      en: memory-op-write-001 consumes item-310, which has no persistent-record identity, and after policy approval creates initial record-310-v1 under prefs/theme.
      ja: memory-op-write-001 は永続記録同一性をまだ持たない item-310 を消費し、方針承認後に prefs/theme の初回 record-310-v1 を生成します。
    field_values:
      write_operation_id: memory-op-write-001
      output_record_id: record-310-v1
      operation_id: memory-op-write-001
      reason: an approved tool result is eligible for durable memory
      admission_operation_id: memory-op-write-001
      candidate_item_id: item-310
      started_at: 2026-07-16T13:01:00Z
    related_node_ids:
      - MemoryWrite
      - MemoryAdmissionOperation
    related_relation_ids:
      - MemoryWrite-is_a-MemoryAdmissionOperation
    expected_result:
      zh: 归类为 MemoryWrite。
      en: Classify as MemoryWrite.
      ja: MemoryWriteに分類します。
    why_valid_or_invalid:
      zh: 输入尚无持久身份，输出是该键的初始记录。
      en: The input has no persistent identity and the output is the initial record for that key.
      ja: inputにpersistent identityがなくoutputはそのkeyのinitial recordです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-write-004
  - id: MemoryWrite-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 初始记忆写入实例
      en: Initial memory-write instance
      ja: 初回記憶書込みインスタンス
    scenario_id: MemoryWrite:instance:memory-op-write-001
    descriptions:
      zh: memory-op-write-001 消费尚无持久记录身份的 item-310，在策略允许后创建初始记录 record-310-v1，并把它登记到 prefs/theme 键。
      en: memory-op-write-001 consumes item-310, which has no persistent-record identity, and after policy approval creates initial record-310-v1 under prefs/theme.
      ja: memory-op-write-001 は永続記録同一性をまだ持たない item-310 を消費し、方針承認後に prefs/theme の初回 record-310-v1 を生成します。
    field_values:
      write_operation_id: memory-op-write-001
      output_record_id: record-310-v1
      operation_id: memory-op-write-001
      reason: an approved tool result is eligible for durable memory
    related_node_ids:
      - MemoryWrite
      - MemoryAdmissionOperation
      - MemoryItem
      - MemoryRecord
    related_relation_ids:
      - MemoryWrite-is_a-MemoryAdmissionOperation
      - MemoryWrite-consumes-MemoryItem
      - MemoryWrite-produces-MemoryRecord
    expected_result:
      zh: 返回候选、Write 活动和版本 1 的初始 MemoryRecord；不得声称它替代了既有版本。
      en: Return the candidate, Write activity, and initial version-1 MemoryRecord without claiming that it supersedes an existing version.
      ja: 候補、Write 活動、初回 version-1 MemoryRecord を返し、既存版の置換とは主張しません。
    why_valid_or_invalid:
      zh: 输入没有持久记录身份且输出是首个版本，因此是 Write；若从既有记录产生后继版本才是 Update。
      en: The input lacks persistent-record identity and the output is the first version, so this is Write; a successor derived from an existing record would be Update.
      ja: 入力に永続記録同一性がなく出力が初版なので Write であり、既存記録からの後継版なら Update です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-write-004
  - id: MemoryWrite-case-software-defect-repair-09
    kind: case-fragment
    labels:
      zh: 软件缺陷修复结果写入记忆
      en: Writing a software-defect repair outcome to memory
      ja: ソフトウェア欠陥修復結果の記憶書込み
    scenario_id: case-software-defect-repair-09
    descriptions:
      zh: 回归评估 eval-defect-MWA-217-regression 验证补丁修复了缺陷且没有引入回归后，memory-op-defect-MWA-217-write 消费该获批候选并创建项目私有的初始记录 memory-defect-MWA-217。
      en: After regression evaluation eval-defect-MWA-217-regression verifies that the patch repairs the defect without regression, memory-op-defect-MWA-217-write consumes the approved candidate and creates project-private initial record memory-defect-MWA-217.
      ja: 回帰評価 eval-defect-MWA-217-regression がパッチによる欠陥修復と非回帰を確認した後、memory-op-defect-MWA-217-write は承認済み候補を消費し、プロジェクト非公開の初回記録 memory-defect-MWA-217 を生成します。
    field_values:
      operation_id: memory-op-defect-MWA-217-write
      reason: verified software-defect repair outcome is eligible for durable project memory
      input_version: 0
      output_version: 1
      write_operation_id: memory-op-defect-MWA-217-write
      output_record_id: memory-defect-MWA-217
    related_node_ids:
      - MemoryWrite
      - MemoryAdmissionOperation
      - MemoryItem
      - MemoryRecord
    related_relation_ids:
      - MemoryWrite-is_a-MemoryAdmissionOperation
      - MemoryWrite-consumes-MemoryItem
      - MemoryWrite-produces-MemoryRecord
    expected_result:
      zh: 查询返回一次初始 MemoryWrite 和版本 1 的 MemoryRecord，并沿 provenance_ref 回查到通过的回归评估；不存在被覆盖的版本 0 记录。
      en: The query returns one initial MemoryWrite and a version-1 MemoryRecord traceable through provenance_ref to the passing regression evaluation; no version-0 record was overwritten.
      ja: 一つの初回 MemoryWrite と version-1 MemoryRecord を返し、provenance_ref から合格回帰評価へ追跡でき、上書きされた version-0 記録はありません。
    why_valid_or_invalid:
      zh: 输入是尚无持久身份的已验证候选，输出是首个持久版本，因此属于 Write；后续对该记录的修订才属于 Update。
      en: The input is a verified candidate without persistent identity and the output is its first durable version, so this is Write; a later revision of that record would be Update.
      ja: 入力は永続同一性を持たない検証済み候補で、出力は最初の永続版なので Write であり、後続修訂が Update です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-write-004
  - id: MemoryWrite-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆写入边界例
      en: "Boundary case: Memory write"
      ja: 記憶書込境界例
    scenario_id: null
    descriptions:
      zh: write-311 以相同 record_id 原地改写 record-310-v1 的内容。
      en: write-311 changes record-310-v1 in place under the same record ID.
      ja: write-311 は同じrecord IDでrecord-310-v1をin-place変更します。
    field_values: {}
    related_node_ids:
      - MemoryWrite
    related_relation_ids: []
    expected_result:
      zh: 不得归类为合规 MemoryWrite；应拒绝原地覆盖并改建 MemoryUpdate 后继。
      en: Do not classify as a conforming MemoryWrite; reject the in-place overwrite and model a MemoryUpdate successor.
      ja: 適合MemoryWriteに分類せずin-place上書きを拒否しMemoryUpdate successorを作ります。
    why_valid_or_invalid:
      zh: 既有持久身份已存在，且原地覆盖破坏版本来历。
      en: A persistent identity already exists and in-place overwrite destroys version provenance.
      ja: persistent identityが既にありin-place上書きはversion provenanceを壊します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-write-004
external_mappings: []
