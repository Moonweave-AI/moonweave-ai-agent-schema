          en: mem-op-write-310's candidate reference and frozen manifest both identify candidate-item-310, admission is accept, and record-310-v1 then commits successfully.
          ja: mem-op-write-310 の候補参照と凍結マニフェストはいずれも candidate-item-310 を識別し、admission は accept、その後 record-310-v1 が正常にコミットされます。
