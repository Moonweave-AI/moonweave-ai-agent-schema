    - claim-memory-write-activity
    - claim-memory-write-initial-version
  distinct_fact_rationale:
    zh: 此主干关系只表达写入的类型成员资格；候选消费、初始记录生成和反馈因果由独立关系表达。
    en: This backbone relation expresses only write type membership; candidate consumption, initial-record generation, and feedback causality use independent relations.
    ja: この主幹関係は書込み型メンバーシップだけを表し、候補消費、初期レコード生成、フィードバック因果は独立した関係で表します。
