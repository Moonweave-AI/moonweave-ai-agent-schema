        zh: mem-op-update-310 输出 version 2，且 record-310-v1 是同一地址的有效前驱。
        en: mem-op-update-310 emits version 2 and record-310-v1 is a valid predecessor at the same address.
        ja: mem-op-update-310 は version 2 を出力し、record-310-v1 は同じアドレスの有効な前駆です。
