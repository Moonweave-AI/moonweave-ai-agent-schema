schema: moonweave.ai/ontology-node/v1
id: MemoryWrite
kind: concept
labels:
  zh: 记忆写入
  en: Memory write
  ja: 記憶書込
semantics:
  short_definition:
    zh: 接受候选项并创建首个持久记录的准入写入。
    en: Admission write creating the first persistent record from a candidate.
    ja: 候補から初回 persistent record を作る admission write。
  definition:
    zh: MemoryWrite 是 MemoryAdmissionOperation：消费尚无持久身份的 MemoryItem，在策略允许时产生初始 MemoryRecord。Mem0 POST /v1/memories/ 与 Letta archival_memory_insert 是典型映射；对既有记录生成新版本属于 MemoryUpdate。
    en: MemoryWrite is a MemoryAdmissionOperation consuming a MemoryItem without persistent identity and, when policy permits, producing an initial MemoryRecord. Mem0 POST /v1/memories/ and Letta archival_memory_insert are typical mappings; producing a new version of an existing record is MemoryUpdate instead.
    ja: MemoryWrite は persistent identity を持たない MemoryItem を consume し initial MemoryRecord を生成する MemoryAdmissionOperation。Mem0 POST /v1/memories/ と Letta archival_memory_insert が典型写像。既存 record の新版は MemoryUpdate。
  why_needed:
    zh: 初始写入与后续修订若混用 upsert 语义，版本谱系与合规删除将无法审计。
    en: If initial writes share upsert semantics with revisions, version lineage and compliant deletion become unauditable.
    ja: initial write と revision が upsert 共有すると version lineage と compliant delete が監査不能。
  includes:
    - zh: 纳入从消息、工具结果或偏好候选项创建首条 MemoryRecord。
      en: Includes creating the first MemoryRecord from message, tool-result, or preference candidates.
      ja: message/tool result/preference 候補から初回 MemoryRecord 作成。
  excludes:
    - zh: 排除覆盖既有记录、原地 upsert 与仅缓存未提交预览。
      en: Excludes overwriting existing records, in-place upsert, and uncommitted preview cache.
      ja: 既存 record 上書き・in-place upsert・未 commit preview cache を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 Mem0 POST /v1/memories/（messages、user_id/agent_id、metadata）与 Letta archival_memory_insert；成功响应 memory_id/passage_id 写入 output_record_id，operation 本身保留 write_operation_id。
    en: Map Mem0 POST /v1/memories/ (messages, user_id/agent_id, metadata) and Letta archival_memory_insert; successful memory_id/passage_id becomes output_record_id while write_operation_id identifies the activity.
    ja: Mem0 POST /v1/memories/ と Letta archival_memory_insert を写像。memory_id/passage_id は output_record_id、activity は write_operation_id。
  typical_input:
    - description: Mem0 add memory
      format: |
        POST https://api.mem0.ai/v1/memories/
        {
          "messages": [{"role": "user", "content": "Prefers TypeScript."}],
          "user_id": "alice",
          "metadata": {"category": "preferences"}
        }
      source_claims: [claim-memory-write-mem0]
    - description: Letta archival insert
      format: |
        archival_memory_insert(
          content="JWT refresh tokens rotate every 15 minutes.",
          tags=["security", "api"]
        )
      source_claims: [claim-memory-write-letta]
  typical_output:
    - description: Initial record identity
      format: |
        {
          "write_operation_id": "write-310",
          "output_record_id": "record-310-v1",
          "external_memory_id": "mem0-8f3c2a1b"
        }
      source_claims: [claim-memory-write-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: POST /v1/memories/ adds memories from conversation messages.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_insert for out-of-window passages.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.put creates a new namespace-key Item.
structure:
  identity_keys: [write_operation_id]
  fields:
    - id: write_operation_id
      labels: {zh: 写入操作标识, en: Write operation identifier, ja: 書込操作識別子}
      definitions:
        zh: 标识一次初始持久化活动。
        en: Identifies one initial persistence activity.
        ja: 一 initial persistence activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: write-310
      allowed_values: []
      source_claims: [claim-memory-write-id]
    - id: output_record_id
      labels: {zh: 输出记录标识, en: Output record identifier, ja: 出力 record 識別子}
      definitions:
        zh: 该写入产生的首个 MemoryRecord 身份。
        en: Identity of the initial MemoryRecord produced by this write.
        ja: この write が生成した initial MemoryRecord identity。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-310-v1
      allowed_values: []
      source_claims: [claim-memory-write-output]
    - id: external_memory_id
      labels: {zh: 外部记忆标识, en: External memory identifier, ja: 外部記憶識別子}
      definitions:
        zh: Mem0 等 API 返回的 memory_id；必须映射到内部 record。
        en: memory_id returned by Mem0 or similar APIs; must map to internal record.
        ja: Mem0 等 API が返す memory_id。内部 record へ写像必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mem0-8f3c2a1b
      allowed_values: []
      source_claims: [claim-memory-write-mem0]
  constraints: []
  required_relations: []
examples:
  - id: MemoryWrite-example-mem0-post
    labels:
      zh: Mem0 POST 初始写入
      en: Mem0 POST initial write
      ja: Mem0 POST 初回書込
    descriptions:
      zh: write-310 消费 item-310 并调用 Mem0 POST /v1/memories/；返回 mem0-8f3c2a1b，Moonweave 登记 output_record_id=record-310-v1 且无 predecessor。
      en: write-310 consumes item-310 and calls Mem0 POST /v1/memories/; mem0-8f3c2a1b returns and Moonweave records output_record_id=record-310-v1 with no predecessor.
      ja: write-310 が item-310 を consume し Mem0 POST。mem0-8f3c2a1b を record-310-v1 へ、predecessor なし。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: POST /v1/memories/
    field_values:
      write_operation_id: write-310
      output_record_id: record-310-v1
      external_memory_id: mem0-8f3c2a1b
    related_node_ids:
      - MemoryWrite
      - MemoryAdmissionOperation
    related_relation_ids: []
    source_claims:
      - claim-memory-write-mem0
      - claim-memory-write-design
  - id: MemoryWrite-example-letta-insert
    labels:
      zh: Letta 归档插入
      en: Letta archival insert
      ja: Letta アーカイブ insert
    descriptions:
      zh: write-311 调用 archival_memory_insert 将 API 摘要写入区外归档并登记 record-311-v1。
      en: write-311 calls archival_memory_insert to store an API summary in archival memory and registers record-311-v1.
      ja: write-311 が archival_memory_insert で API 要約を archival に保存し record-311-v1 を登録。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      version: archival_memory_insert
    field_values:
      write_operation_id: write-311
      output_record_id: record-311-v1
    related_node_ids:
      - MemoryWrite
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-write-letta
      - claim-memory-write-design
  - id: MemoryWrite-example-langgraph-put
    labels:
      zh: LangGraph 新 Item 写入
      en: LangGraph new Item write
      ja: LangGraph 新 Item 書込
    descriptions:
      zh: write-312 对 ("tenant-7","user-42")/response-language 首次 store.put，产生新 record-312-v1。
      en: write-312 first store.put on ("tenant-7","user-42")/response-language produces record-312-v1.
      ja: write-312 が namespace key へ初回 store.put し record-312-v1 を生成。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.put
    field_values:
      write_operation_id: write-312
      output_record_id: record-312-v1
    related_node_ids:
      - MemoryWrite
      - MemoryStore
    related_relation_ids: []
    source_claims:
      - claim-memory-write-langgraph
      - claim-memory-write-design
  - id: MemoryWrite-example-not-update
    labels:
      zh: 写入非更新边界
      en: Write is not update
      ja: write は update ではない
    descriptions:
      zh: upsert-310 读取 record-310-v1 并生成 record-310-v2 带 predecessor_id；这是 MemoryUpdate 而非 MemoryWrite。
      en: upsert-310 reads record-310-v1 and emits record-310-v2 with predecessor_id; this is MemoryUpdate, not MemoryWrite.
      ja: upsert-310 は record-310-v1 から v2 を predecessor 付きで生成。MemoryUpdate で MemoryWrite ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - MemoryWrite
      - MemoryUpdate
    related_relation_ids: []
    source_claims:
      - claim-memory-write-design
parent_relation:
  id: MemoryWrite-is_a-MemoryAdmissionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆准入操作
    en: is a memory admission operation
    ja: 記憶受入操作の一種
  definitions:
    zh: MemoryWrite —is_a→ MemoryAdmissionOperation 表示候选项被接受并产生该持久键的初始 MemoryRecord。
    en: MemoryWrite —is_a→ MemoryAdmissionOperation holds because the candidate is accepted and the initial MemoryRecord for its persistent key is produced.
    ja: MemoryWrite —is_a→ MemoryAdmissionOperation は候補 accept と initial MemoryRecord 生成のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is_a
      ja: 逆方向読取
  conditions:
    - id: MemoryWrite-is_a-MemoryAdmissionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the candidate is accepted and the initial MemoryRecord for its persistent key is produced.
      explanations:
        zh: 仅当候选项被接受并产生初始 MemoryRecord 时建立该边。
        en: Assert only when the candidate is accepted and the initial MemoryRecord is produced.
        ja: 候補 accept と initial MemoryRecord 生成時のみ assert。
      source_claims: [claim-memory-write-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-write-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-write
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: POST /v1/memories/ adds memories from messages.
  - id: src-letta-write
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: archival_memory_insert tool.
  - id: src-langgraph-write
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: BaseStore.put creates namespace-key Items.
  - id: src-memory-write-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates initial write from update and discard.
source_claims:
  - id: claim-memory-write-mem0
    source: src-mem0-write
    supports: Mem0 POST /v1/memories/ creates a new memory from conversation messages.
    locator: POST /v1/memories/
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-write-letta
    source: src-letta-write
    supports: Letta archival_memory_insert adds out-of-window passages to archival storage.
    locator: archival_memory_insert
    evidence_kind: primary-doc
    confidence: high
  - id: claim-memory-write-langgraph
    source: src-langgraph-write
    supports: LangGraph BaseStore.put creates a new Item at namespace and key.
    locator: BaseStore.put
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-write-design
    source: src-memory-write-design
    supports: MemoryWrite produces the first persistent record without a predecessor version.
    locator: MemoryWrite boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-write-id
    source: src-memory-write-design
    supports: write_operation_id identifies one initial persistence activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-write-output
    source: src-memory-write-design
    supports: output_record_id references the initial MemoryRecord produced.
    locator: structure
    evidence_kind: design-inference
    confidence: high
