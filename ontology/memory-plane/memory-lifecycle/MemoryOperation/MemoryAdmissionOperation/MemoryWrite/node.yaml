        descriptions:
          zh: feedback-91 明确要求“记住以后使用公制单位”；write-391 的 trigger_feedback_ids 包含它，并由此创建对应偏好候选。
          en: feedback-91 explicitly asks to remember metric units; write-391 lists it in trigger_feedback_ids and creates the corresponding preference candidate because of it.
