          operation_id: mem-op-write-310
          candidate_item_ref: candidate-item-310
          candidate_manifest_digest: sha256:681f8cc4a15c7a936c385cfb55837ac3271af2fef10c2b2f2a7df42d2e5c221f
          admission_decision: accept
