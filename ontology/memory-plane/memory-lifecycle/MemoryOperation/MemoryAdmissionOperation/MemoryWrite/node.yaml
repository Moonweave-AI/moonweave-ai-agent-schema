        source_claims:
          - claim-memory-write-generation
    source_claims:
      - claim-memory-write-generation
      - claim-memory-write-initial-version
    distinct_fact_rationale:
      zh: 此边表达写入产生的初始记录，不表达候选消费、记录后续修订或结果信息的组成关系。
      en: This edge expresses the initial record generated by write, not candidate consumption, later record revision, or composition of result information.
      ja: この辺は書込みが生成する初期レコードを表し、候補消費、後続レコード改訂、結果情報の構成を表すものではありません。
    layout_role: cross-link
    target: concept:MemoryRecord
  - id: MemoryWrite-responds_to-Feedback
    predicate: responds_to
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 响应反馈
      en: responds to feedback
      ja: フィードバックに応答する
    definitions:
      zh: MemoryWrite —responds_to→ Feedback 表示被引用的反馈实质触发或改变了该候选的准入或写入决定，并有审计证据说明其影响。
      en: MemoryWrite —responds_to→ Feedback means the cited feedback materially triggered or changed admission or write for the candidate, with audit evidence explaining its impact.
      ja: MemoryWrite —responds_to→ Feedback は、引用されたフィードバックが候補の受入または書込みを実質的にトリガーまたは変更し、その影響を説明する監査証跡があることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个写入可能受零条、一条或多条实质反馈影响，具体数目由可审计的因果证据决定。
      en: A write may be materially affected by zero, one, or many feedback items; auditable causal evidence determines the count.
      ja: 一つの書込みはゼロ、一つ、または複数のフィードバックから実質的影響を受け得て、監査可能な因果証跡が数を決めます。
    inverse_reading:
      predicate: informs_memory_write
      labels:
        zh: 促成记忆写入
        en: informs memory write
        ja: 記憶書込みに情報を与える
    conditions:
      - id: MemoryWrite-responds_to-Feedback-material-influence
        severity: error
        expression_language: plain
        expression: "Assert only when trigger_feedback_refs includes the target Feedback and audit evidence states how that feedback changed candidate selection, admission, or committed record content."
        explanation:
          zh: 时间邻近、同一会话或主题相似都不等于因果影响；必须有触发引用和具体影响说明。
          en: Temporal proximity, same session, or topic similarity is not causal influence; trigger reference and a concrete impact explanation are required.
          ja: 時間近接、同じセッション、トピック類似は因果影響ではなく、トリガー参照と具体的な影響説明が必要です。
        source_claims:
          - claim-memory-write-feedback
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryWrite-responds_to-Feedback-example-positive

        labels:
          zh: 明确偏好反馈触发写入
          en: Explicit preference feedback triggers write
          ja: 明示的な設定フィードバックが書込みをトリガーする

        descriptions:
          zh: feedback-91 要求今后使用公制单位，mem-op-write-391 的触发列表含该反馈，审计说明它改变了候选选择和写入内容。
          en: feedback-91 requests metric units going forward, mem-op-write-391 lists it as a trigger, and audit states that it changed candidate selection and written content.
          ja: feedback-91 は今後メートル法を使うよう要求し、mem-op-write-391 はそれをトリガーとして列挙し、監査は候補選択と書込み内容を変更したと示します。
        field_values:
          operation_id: mem-op-write-391
          trigger_feedback_refs:
            - feedback-91
          feedback_ref: feedback-91
          audit_event_ref: audit-write-391-feedback
          impact: selected-measurement-system-preference
        related_node_ids:
          - MemoryWrite
          - Feedback
          - MemoryAuditEvent
        related_relation_ids:
          - MemoryWrite-responds_to-Feedback
          - MemoryOperation-has_audit_event-MemoryAuditEvent

        source_claims:
          - claim-memory-write-feedback
      - id: MemoryWrite-responds_to-Feedback-example-boundary-unrelated-feedback

        labels:
          zh: 无关评价不触发写入
          en: Unrelated evaluation does not trigger write
          ja: 無関係な評価は書込みをトリガーしない

        descriptions:
          zh: feedback-92 只赞扬回答语气，与 measurement_system 偏好无关，且不在 mem-op-write-391 的触发列表或审计影响说明中。
          en: feedback-92 only praises response tone, is unrelated to the measurement_system preference, and appears in neither mem-op-write-391's trigger list nor audit impact explanation.
          ja: feedback-92 は応答の語調を賞賛するだけで measurement_system 設定と無関係であり、mem-op-write-391 のトリガー一覧にも監査影響説明にも現れません。
        field_values:
          operation_id: mem-op-write-391
          feedback_ref: feedback-92
          trigger_feedback_refs:
            - feedback-91
          audit_impact_for_feedback_92: absent
          topic_match: false
        related_node_ids:
          - MemoryWrite
          - Feedback
        related_relation_ids:
          - MemoryWrite-responds_to-Feedback

        source_claims:
          - claim-memory-write-feedback
    source_claims:
      - claim-memory-write-feedback
    distinct_fact_rationale:
      zh: 此边表达反馈对特定写入的实质因果影响，不表达一般的反馈归属、同会话共现或结果质量评价。
      en: This edge expresses material causal influence of feedback on a specific write, not general feedback ownership, same-session co-occurrence, or result-quality evaluation.
      ja: この辺はフィードバックが特定書込みへ与える実質的因果影響を表し、一般的なフィードバック所有、同一セッション共起、結果品質評価を表すものではありません。
    layout_role: cross-link
    target: concept:Feedback
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, used inputs, generated outputs, agents, and provenance relations as distinct facts.
  - id: langgraph-store
    title: LangGraph Store API reference
    source_type: official-doc
    url: https://langchain-ai.github.io/langgraph/reference/store/
    relevance: Documents durable store operations that applications can wrap with admission, commit, and audit evidence.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents structured policy evaluation and explicit decisions over input data.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 digests used to bind candidate and committed-output snapshots.
source_claims:
  - id: claim-memory-write-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity that occurs from the entities it uses or generates. Moonweave models MemoryWrite as an executed activity rather than candidate content, a preview, an API label, or an uncommitted proposal.
    locator: "PROV-O sections 3.1 Activity and 3.2 Entity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-identity
    source: w3c-prov-o
    supports: PROV-O keeps activity identity distinct from input and output entities. Moonweave reuses one operation_id to join write execution, output result, and audit events.
    locator: "PROV-O Activity, Entity, and identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-candidate
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from an entity generated by it. Moonweave records a frozen candidate as write input and does not treat it as the output MemoryRecord before commit.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-decision
    source: open-policy-agent
    supports: Open Policy Agent evaluates structured input against policy rules and yields decisions. Moonweave requires an auditable accept verdict before a candidate enters the write subtype.
    locator: "Open Policy Agent policy language overview and rule evaluation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-commit
    source: langgraph-store
    supports: The LangGraph Store API documents durable store operations over an address and value. Moonweave treats successful visibility at the target store as commit evidence and does not equate preview or queued work with persistence.
    locator: "LangGraph Store API reference for put, get, and search"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-generation
    source: w3c-prov-o
    supports: PROV-O distinguishes generated entities from an activity's inputs. Moonweave asserts produces only when a successful write result identifies the committed output MemoryRecord.
    locator: "PROV-O section on prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-initial-version
    source: langgraph-store
    supports: Store addressing uses a concrete namespace and key. Moonweave treats creation at an address without a valid predecessor as initial version 1 and routes successor versions to revision rather than silently overwriting them.
    locator: "LangGraph Store API reference for exact address reads and writes"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-write-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size message digests. Moonweave stores SHA-256 digests for candidate and committed output snapshots to detect silent substitution.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-write-feedback
    source: w3c-prov-o
    supports: PROV-O supports recording provenance associations and influences as separate facts. Moonweave asserts feedback-to-write causality only with an explicit trigger reference and audit evidence of material impact.
    locator: "PROV-O relations for activity association and influence"
    evidence_kind: ontology-design-inference
    confidence: medium