        admission_decision: accept
        output_record_ref: record-310-v1
        output_record_version: 1
        committed_at: "2026-07-18T17:00:00.143Z"
      related_node_ids:
        - MemoryWrite
        - MemoryAdmissionOperation
      related_relation_ids:
        - MemoryWrite-is_a-MemoryAdmissionOperation

      source_claims:
        - claim-memory-write-activity
        - claim-memory-write-initial-version
