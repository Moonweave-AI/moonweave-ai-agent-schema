        severity: error
        expression_language: plain
        expression: "Assert only when candidate_item_ref resolves to the target item, candidate_manifest_digest covers it, admission_decision is accept, and the write commits successfully."
        explanation:
          zh: 同会话共现、相似内容或候选推荐不足以证明消费；身份、冻结输入、接受裁决和成功提交必须一致。
          en: Session co-occurrence, similar content, or a candidate recommendation does not prove consumption; identity, frozen input, acceptance, and successful commit must agree.
          ja: セッション共起、類似内容、候補推薦では消費を証明できず、識別、凍結入力、受入判定、成功コミットが一致する必要があります。
        source_claims:
          - claim-memory-write-candidate
          - claim-memory-write-commit
