  endpoint_order: child-to-parent
relations:
  - id: MemoryWrite-consumes-MemoryItem
    predicate: consumes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 消费候选记忆项
      en: consumes candidate memory item
      ja: 候補記憶項目を消費する
    definitions:
      zh: MemoryWrite —consumes→ MemoryItem 表示该项是接受裁决实际读取并提交为初始持久记录的候选表示，而不是被修订的已有 MemoryRecord。
      en: MemoryWrite —consumes→ MemoryItem means the item is the candidate representation actually read and committed as an initial persistent record after acceptance, not an existing MemoryRecord being revised.
      ja: MemoryWrite —consumes→ MemoryItem は、その項目が accept 後に初期永続レコードとして実際に読み取り・コミットされた候補表現であり、改訂対象の既存 MemoryRecord ではないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每次写入可消费一个或多个冻结候选表示，具体基数由候选清单和提交证据决定。
      en: Each write may consume one or more frozen candidate representations; the candidate manifest and commit evidence determine the cardinality.
      ja: 各書込みは一つまたは複数の凍結候補表現を消費でき、候補マニフェストとコミット証跡が基数を決めます。
    inverse_reading:
      predicate: is_consumed_by_write
      labels:
        zh: 被写入操作消费
        en: is consumed by memory write
        ja: 記憶書込みに消費される
    conditions:
