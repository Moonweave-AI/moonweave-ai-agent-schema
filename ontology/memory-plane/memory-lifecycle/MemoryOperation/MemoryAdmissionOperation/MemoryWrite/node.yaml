      en: consumes memory item
      ja: memory itemを消費する
    definitions:
      zh: MemoryWrite —consumes→ MemoryItem 表示候选项是该初始写入实际评估并提交的输入，而不是已持久化记录。
      en: MemoryWrite —consumes→ MemoryItem means the candidate item is the actual input evaluated and committed by the initial write, not an already persisted record.
      ja: MemoryWrite —consumes→ MemoryItem はcandidate itemがinitial writeで実際に評価/commitされるinputで既persist recordでないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_consumes
      labels:
        zh: 反向读取
        en: inverse consumes memory item
        ja: 逆方向読取
    conditions:
      - id: MemoryWrite-consumes-MemoryItem-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when write.candidate_item_id equals the target MemoryItem and the admission decision is accept.
        explanations:
          zh: 仅当 write.candidate_item_id 等于目标 MemoryItem 且写入决策为接受时成立。
          en: Assert only when write.candidate_item_id equals the target MemoryItem and the admission decision is accept.
          ja: write.candidate_item_idがtarget MemoryItemと一致しadmission decisionがacceptの時だけassertします。
        source_claims:
          - claim-memory-write-004
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryWrite-consumes-MemoryItem-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 消费候选记忆项正例
          en: "Positive case: consumes memory item"
          ja: memory itemを消費する正例
        scenario_id: MemoryWrite-consumes-MemoryItem:positive:20260716
        descriptions:
          zh: write-310 的 candidate_item_id=item-310，准入记录显示 accept，写入活动读取该候选的内容、来源和 consent_scope。
          en: write-310 names candidate_item_id=item-310, has an accept admission outcome, and reads that candidate's content, provenance, and consent_scope.
          ja: write-310 は candidate_item_id=item-310、admission outcome=accept で候補の content・provenance・consent_scope を読みます。
        field_values: {}
        related_node_ids:
          - MemoryWrite
          - MemoryItem
        related_relation_ids:
          - MemoryWrite-consumes-MemoryItem
        expected_result:
          zh: 建立 write-310 consumes item-310，把候选项固定为首次持久化活动的直接输入。
          en: Assert write-310 consumes item-310, fixing the candidate item as the direct input to initial persistence.
          ja: write-310 consumes item-310 を確立し candidate item を initial persistence の direct input として固定します。
        why_valid_or_invalid:
          zh: 候选身份与接受结果均在同一写入尝试中明确，且目标是未持久化 MemoryItem 而不是现有 MemoryRecord。
          en: Candidate identity and acceptance are explicit in the same write attempt, and the target is an unpersisted MemoryItem rather than an existing MemoryRecord.
          ja: candidate identity と acceptance は同 write attempt に明示され target は existing MemoryRecord でなく unpersisted MemoryItem です。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-write-004
      - id: MemoryWrite-consumes-MemoryItem-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 消费候选记忆项边界例
          en: "Boundary case: consumes memory item"
          ja: memory itemを消費する境界例
        scenario_id: MemoryWrite-consumes-MemoryItem:boundary:20260716
        descriptions:
          zh: item-311 也来自同一会话，但 write-310 的 candidate_item_id 未引用它，且 item-311 的准入结果仍为 pending。
          en: item-311 comes from the same session, but write-310 does not name it as candidate_item_id and its admission outcome remains pending.
          ja: item-311 は同 session 由来ですが write-310 の candidate_item_id ではなく admission outcome も pending です。
        field_values: {}
        related_node_ids:
          - MemoryWrite
          - MemoryItem
        related_relation_ids:
          - MemoryWrite-consumes-MemoryItem
        expected_result:
          zh: 拒绝 write-310 consumes item-311；等 item-311 被明确接受并绑定到自己的写入后再建立消费边。
          en: Reject write-310 consumes item-311; wait for explicit acceptance and binding to its own write before asserting consumption.
          ja: write-310 consumes item-311 を拒否し explicit acceptance と own write binding 後に consumption を確立します。
        why_valid_or_invalid:
          zh: 会话共现不等于活动输入，缺少 candidate_item_id 与 accept 会把未决定候选错误算作已消费。
          en: Session co-occurrence is not activity input; without candidate_item_id and accept, an undecided candidate would be falsely treated as consumed.
          ja: session co-occurrence は activity input ではなく candidate_item_id/accept なしでは undecided candidate を誤って consumed とします。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-write-004
    source_claims:
      - claim-memory-write-004
