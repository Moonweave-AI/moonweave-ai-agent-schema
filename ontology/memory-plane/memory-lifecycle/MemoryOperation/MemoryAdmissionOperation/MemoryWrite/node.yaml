parent_relation:
  id: MemoryWrite-is_a-MemoryAdmissionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆准入操作
    en: is a memory admission operation
    ja: 記憶受入操作の一種である
  definitions:
    zh: MemoryWrite —is_a→ MemoryAdmissionOperation 表示该活动满足准入操作的一般边界，并以 accept 为裁决，成功创建先前不存在有效版本的初始 MemoryRecord。
    en: MemoryWrite —is_a→ MemoryAdmissionOperation means the activity meets the general admission boundary, has accept as its verdict, and successfully creates an initial MemoryRecord where no valid version previously existed.
    ja: MemoryWrite —is_a→ MemoryAdmissionOperation は、活動が一般受入境界を満たし、判定として accept を持ち、以前に有効バージョンがなかった場所に初期 MemoryRecord を正常に作成することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不对单个运行中可创建的初始记录数量施加全局基数。
    en: The classification relation expresses type membership and does not impose a global count of initial records created in one run.
    ja: 分類関係は型メンバーシップを表し、一実行で作成される初期レコード数に全体的な基数を課しません。
  inverse_reading:
    predicate: has_write_subtype
    labels:
      zh: 具有写入子类
      en: has write subtype
      ja: 書込みサブタイプを持つ
  conditions:
    - id: MemoryWrite-is_a-MemoryAdmissionOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when the instance is an executed MemoryAdmissionOperation with admission_decision=accept, successful commit evidence, and a version-1 output record at an address without a valid predecessor."
      explanation:
        zh: 仅有接受建议或输出预览不足以证明写入；需要已执行准入、真实提交、初始版本和无前驱地址共同成立。
        en: An acceptance recommendation or output preview alone does not prove write; executed admission, real commit, initial version, and predecessor-free address must all hold.
        ja: 受入提案や出力プレビューだけでは書込みを証明できず、実行済み受入、実際のコミット、初期バージョン、前駆なしアドレスのすべてが必要です。
      source_claims:
        - claim-memory-write-activity
        - claim-memory-write-decision
        - claim-memory-write-initial-version
        - claim-memory-write-commit
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
