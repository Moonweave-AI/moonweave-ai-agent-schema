        en: candidate item ID
        ja: candidate item ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向尚未持久化的候选 MemoryItem。
        en: Identifies the not-yet-persisted candidate MemoryItem.
        ja: 未persistのcandidate MemoryItemを識別します。
      allowed_values: []
      pattern: null
      example_value: item-88
      source_claims:
        - claim-memory-admission-operation-003
  constraints: []
  required_relation_constraints: []
