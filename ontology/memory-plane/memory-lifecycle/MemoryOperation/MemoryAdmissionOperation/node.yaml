sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, usage, generation, and attribution as distinct provenance facts.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents policy rules evaluated over structured input data.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 message digests used to bind a decision to a frozen candidate manifest.
  - id: langgraph-memory
    title: LangGraph long-term memory guide
    source_type: official-doc
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents durable memory storage that applications can place behind admission decisions.
source_claims:
  - id: claim-memory-admission-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity that occurs from the entities it uses or generates. Moonweave treats admission as an executed activity with temporal and actor evidence rather than candidate content or a future plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-admission-operation-identity
    source: w3c-prov-o
    supports: PROV-O keeps activity identity distinct from entities and related provenance records. Moonweave uses the inherited operation_id as the one stable identity for an admission activity, result, and audit trail.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-admission-operation-candidate
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from one generated by it. Moonweave evaluates a frozen candidate before treating any later persistent record as an output, not as the admission target.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-admission-operation-decision
    source: open-policy-agent
    supports: Open Policy Agent evaluates rules over structured input. Moonweave records one explicit accept or discard verdict and a comparable reason code for the evaluated candidate snapshot.
    locator: "Open Policy Agent policy language overview and rule evaluation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-admission-operation-policy
    source: open-policy-agent
    supports: Open Policy Agent separates policy rules from the input facts they evaluate. Moonweave links an admission operation to an applicable immutable policy version instead of embedding runtime verdicts in the policy.
    locator: "Open Policy Agent input data and policy evaluation model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-admission-operation-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size digests. Moonweave stores a SHA-256 digest for the candidate manifest to detect a decision being replayed against changed input.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
