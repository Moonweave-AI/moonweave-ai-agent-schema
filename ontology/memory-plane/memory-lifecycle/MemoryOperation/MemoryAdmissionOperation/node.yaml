schema: moonweave.ai/ontology-node/v1
id: MemoryAdmissionOperation
kind: concept
labels:
  zh: 记忆准入操作
  en: Memory admission operation
  ja: 記憶受入操作
semantics:
  short_definition:
    zh: 决定候选项写入或丢弃的准入活动。
    en: Admission activity deciding write or discard of a candidate.
    ja: 候補の write/discard を決める admission activity。
  definition:
    zh: MemoryAdmissionOperation 是以尚未持久化的 MemoryItem 为对象、输出 MemoryWrite 或 MemoryDiscard 决定的 MemoryOperation 子类；它不修改既有 MemoryRecord。Mem0 POST /v1/memories/ 成功映射为 MemoryWrite，策略拒绝映射为 MemoryDiscard。
    en: MemoryAdmissionOperation is a MemoryOperation subtype over an unpersisted MemoryItem that ends in MemoryWrite or MemoryDiscard; it does not revise existing MemoryRecords. Successful Mem0 POST /v1/memories/ maps to MemoryWrite; policy rejection maps to MemoryDiscard.
    ja: MemoryAdmissionOperation は未 persist MemoryItem を対象に MemoryWrite/MemoryDiscard で終わる MemoryOperation subtype。Mem0 POST 成功は MemoryWrite、policy reject は MemoryDiscard。
  why_needed:
    zh: 写入与丢弃若共用模糊动词，合规审计无法区分 Mem0 POST 成功与策略拒绝。
    en: If write and discard share vague verbs, compliance audit cannot distinguish Mem0 POST success from policy rejection.
    ja: write/discard が曖昧動詞を共有すると Mem0 POST 成功と policy reject を区別できない。
  includes:
    - zh: 纳入候选项资格评估及最终接受或拒绝活动。
      en: Includes eligibility evaluation and final acceptance or rejection of a candidate item.
      ja: candidate item eligibility 評価と accept/reject activity。
  excludes:
    - zh: 排除对已持久记录的更新、合并、过期和删除。
      en: Excludes update, merge, expiration, and deletion of persisted records.
      ja: persisted record の update/merge/expiration/delete を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 POST /v1/memories/ 与 Letta archival_memory_insert 映射为 MemoryWrite；consent 或质量策略拒绝映射为 MemoryDiscard。admission_operation_id 绑定 candidate_item_id 与 admission_decision。
    en: Mem0 POST /v1/memories/ and Letta archival_memory_insert map to MemoryWrite; consent or quality policy rejection maps to MemoryDiscard. admission_operation_id binds candidate_item_id and admission_decision.
    ja: Mem0 POST/Letta insert は MemoryWrite、policy reject は MemoryDiscard。admission_operation_id が candidate/decision を bind。
  typical_input:
    - description: Candidate admission
      format: |
        {"admission_operation_id": "admit-88", "candidate_item_id": "item-88"}
      source_claims: [claim-admission-design]
  typical_output:
    - description: Admission outcome
      format: |
        {"admission_decision": "accept", "child_operation": "MemoryWrite"}
      source_claims: [claim-admission-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: POST /v1/memories/ for candidate admission writes.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_insert after admission acceptance.
structure:
  identity_keys: [admission_operation_id]
  fields:
    - id: admission_operation_id
      labels: {zh: 准入操作标识, en: Admission operation identifier, ja: 受入操作識別子}
      definitions:
        zh: 标识一次候选记忆准入判断。
        en: Identifies one candidate-memory admission decision activity.
        ja: 一 candidate-memory admission 判断を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: admit-88
      allowed_values: []
      source_claims: [claim-admission-id]
    - id: candidate_item_id
      labels: {zh: 候选项标识, en: Candidate item identifier, ja: 候補 item 識別子}
      definitions:
        zh: 指向尚未持久化的 MemoryItem。
        en: Identifies the not-yet-persisted MemoryItem.
        ja: 未 persist MemoryItem を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: item-88
      allowed_values: []
      source_claims: [claim-admission-candidate]
  constraints: []
  required_relations: []
examples:
  - id: MemoryAdmissionOperation-example-mem0-accept
    labels: {zh: Mem0 准入接受, en: Mem0 admission accept, ja: Mem0 受入 accept}
    descriptions:
      zh: admit-88 评估 item-88 后调用 Mem0 POST /v1/memories/ 产生 MemoryWrite。
      en: admit-88 evaluates item-88 then calls Mem0 POST /v1/memories/ yielding MemoryWrite.
      ja: admit-88 が item-88 を評価し Mem0 POST で MemoryWrite。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: POST /v1/memories/}
    field_values: {admission_operation_id: admit-88, candidate_item_id: item-88, admission_decision: accept}
    related_node_ids: [MemoryAdmissionOperation, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-admission-mem0, claim-admission-design]
  - id: MemoryAdmissionOperation-example-discard
    labels: {zh: 策略拒绝丢弃, en: Policy rejection discard, ja: 方針 reject discard}
    descriptions:
      zh: admit-89 因 consent_scope 不足拒绝 item-89 并登记 MemoryDiscard。
      en: admit-89 rejects item-89 for insufficient consent_scope and records MemoryDiscard.
      ja: admit-89 が consent 不足で item-89 を reject し MemoryDiscard。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: policy}
    field_values: {admission_operation_id: admit-89, admission_decision: reject}
    related_node_ids: [MemoryAdmissionOperation, MemoryDiscard]
    related_relation_ids: []
    source_claims: [claim-admission-design]
  - id: MemoryAdmissionOperation-example-letta
    labels: {zh: Letta 插入准入, en: Letta insert admission, ja: Letta insert 受入}
    descriptions:
      zh: admit-90 接受候选项后调用 Letta archival_memory_insert。
      en: admit-90 accepts the candidate then calls Letta archival_memory_insert.
      ja: admit-90 が accept 後 archival_memory_insert。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: archival_memory_insert}
    field_values: {admission_operation_id: admit-90}
    related_node_ids: [MemoryAdmissionOperation, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-admission-letta, claim-admission-design]
  - id: MemoryAdmissionOperation-example-not-update
    labels: {zh: 准入非更新, en: Admission is not update, ja: 受入は update ではない}
    descriptions:
      zh: update-512 修改既有 record-512-v1；admission 只处理尚无持久身份的候选项。
      en: update-512 revises existing record-512-v1; admission handles only candidates without persistent identity.
      ja: update は既存 record 改訂。admission は未 persist 候補のみ。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryAdmissionOperation, MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-admission-design]
parent_relation:
  id: MemoryAdmissionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆操作, en: is a memory operation, ja: 記憶操作の一種}
  definitions:
    zh: MemoryAdmissionOperation —is_a→ MemoryOperation 表示活动对未持久候选项做出写入或丢弃决定。
    en: MemoryAdmissionOperation —is_a→ MemoryOperation holds because the activity decides write or discard for an unpersisted candidate.
    ja: 未 persist 候補に write/discard を決定する activity のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryAdmissionOperation-is_a-MemoryOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the activity evaluates an unpersisted candidate and ends in write or discard.
      explanations:
        zh: 仅当活动评估未持久候选项并以写入或丢弃结束时成立。
        en: Assert only when the activity evaluates an unpersisted candidate and ends in write or discard.
        ja: 未 persist 候補を評価し write/discard で終わる時のみ。
      source_claims: [claim-admission-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-admission-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-admission
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: POST /v1/memories/ admits new memories.
  - id: src-letta-admission
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: archival_memory_insert after acceptance.
  - id: src-admission-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Admission distinct from revision and disposition.
source_claims:
  - id: claim-admission-mem0
    source: src-mem0-admission
    supports: Mem0 POST /v1/memories/ admits new memories from messages.
    locator: POST /v1/memories/
    evidence_kind: primary-api
    confidence: high
  - id: claim-admission-letta
    source: src-letta-admission
    supports: Letta archival_memory_insert adds passages after admission.
    locator: archival_memory_insert
    evidence_kind: primary-doc
    confidence: high
  - id: claim-admission-design
    source: src-admission-design
    supports: Admission is distinct from revision and disposition operations.
    locator: MemoryAdmissionOperation
    evidence_kind: design-inference
    confidence: high
  - id: claim-admission-id
    source: src-admission-design
    supports: admission_operation_id identifies one admission activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-admission-candidate
    source: src-admission-design
    supports: candidate_item_id references unpersisted MemoryItem.
    locator: structure
    evidence_kind: design-inference
    confidence: high
