schema: moonweave.ai/ontology-node/v1
id: MemoryAdmissionOperation
kind: concept
status: review
labels:
  zh: 记忆准入操作
  en: Memory admission operation
  ja: 記憶受入操作
semantics:
  short_definition:
    zh: 决定候选记忆进入持久存储还是在写入前被拒绝的操作。
    en: An operation deciding whether candidate memory enters persistent storage or is rejected before writing.
    ja: candidate memoryをpersistent storageへ入れるかwrite前に拒否するか決めるoperationです。
  definition:
    zh: MemoryAdmissionOperation 是以尚未持久化的 MemoryItem 为对象、输出写入或丢弃决定的 MemoryOperation；它不修改既有 MemoryRecord。
    en: MemoryAdmissionOperation is a MemoryOperation over an unpersisted MemoryItem that ends in a write or discard decision; it does not revise an existing MemoryRecord.
    ja: MemoryAdmissionOperation は未persistの MemoryItemを対象にwriteまたはdiscard判断で終わる MemoryOperationで、既存 MemoryRecordをrevisionしません。
  why_needed:
    zh: 把写入与丢弃建模为同一准入问题的互斥分支。
    en: Models write and discard as mutually exclusive branches of the same admission question.
    ja: writeとdiscardを同一admission問題の排他的branchとして表します。
  includes:
    - zh: 纳入候选项的资格评估及最终接受或拒绝活动。
      en: Includes eligibility evaluation and final acceptance or rejection of a candidate item.
      ja: candidate itemのeligibility評価と最終accept/reject活動を含みます。
  excludes:
    - zh: 排除对已持久记录的更新、合并、过期和删除。
      en: Excludes update, merge, expiration, and deletion of already persisted records.
      ja: 既存persistent recordのupdate・merge・expiration・deleteを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - admission_operation_id
  fields:
    - id: admission_operation_id
      labels:
        zh: 准入操作标识
        en: admission operation ID
