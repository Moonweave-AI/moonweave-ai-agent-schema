  - id: claim-memory-admission-operation-004
    source: eng-fw-langmem-memory-management
    supports: LangMem exposes distinct insert, update, and delete controls and describes collection reconciliation and consolidation; Moonweave makes their lifecycle boundaries explicit.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-admission-operation-005
    source: eng-fw-langmem-memory-management
    supports: LangMem's semantic-memory collection operations distinguish inserting a new item from updating or deleting an existing item. That operational boundary supports MemoryAdmissionOperation as the decision that allows candidate memory to enter persistent storage; MemoryAssessmentOperation is Moonweave's separate evaluation class and is not defined by LangMem.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-admission-operation-006
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Activity from the Entity it uses or generates, allowing an assessment run to be recorded separately from the memory record it examines. Moonweave uses that trace pattern for MemoryAssessmentOperation; PROV-O does not define either assessment criteria or its sibling relation to admission.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-admission-operation-007
    source: eng-fw-langmem-memory-management
    supports: LangMem separates insertion of semantic memory from later update and delete operations over stored items. Moonweave maps the entry-side decision to MemoryAdmissionOperation and reserves MemoryDispositionOperation for changes to an already admitted record's availability or strength; the taxonomy is a Moonweave inference.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-admission-operation-008
    source: eng-ont-prov-o
    supports: PROV-O's wasInvalidatedBy relation records that an existing Entity ceased to be available for use because of an Activity. Moonweave uses this as provenance support for disposition outcomes while keeping MemoryDispositionOperation broader than invalidation; PROV-O does not assert the admission-versus-disposition hierarchy.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-admission-operation-009
    source: eng-fw-langmem-memory-management
    supports: LangMem exposes insertion as the operation that creates a stored semantic-memory item. Moonweave therefore treats MemoryAdmissionOperation as an entry decision, distinct from MemoryResolutionOperation, which consumes an already identified problem state; LangMem does not define the resolution endpoint.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-admission-operation-010
