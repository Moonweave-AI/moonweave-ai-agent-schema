sibling_differentiation:
  - sibling_concept_id: MemoryAssessmentOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 正向身份比较：父节点 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity，骨架 MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryAssessmentOperation（semantic kind=activity，骨架 MemoryAssessmentOperation-is_a-MemoryOperation）。双端条件：MemoryAdmissionOperation 条件：“决定候选记忆进入持久存储还是在写入前被拒绝的操作”；MemoryAssessmentOperation 条件：“检查记录是否适合继续保留、检索或复用而不直接改写它的操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemoryOperation: MemoryAdmissionOperation (semantic kind=activity, backbone MemoryAdmissionOperation-is_a-MemoryOperation); MemoryAssessmentOperation (semantic kind=activity, backbone MemoryAssessmentOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAdmissionOperation condition: “An operation deciding whether candidate memory enters persistent storage or is rejected before writing”; MemoryAssessmentOperation condition: “An operation checking whether a record remains fit for retention, retrieval, or reuse without directly rewriting it”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity、バックボーン MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryAssessmentOperation（semantic kind=activity、バックボーン MemoryAssessmentOperation-is_a-MemoryOperation）。両端条件：MemoryAdmissionOperation の条件：「candidate memoryをpersistent storageへ入れるかwrite前に拒否するか決めるoperationです」；MemoryAssessmentOperation の条件：「recordを直接rewriteせずretention・retrieval・reuse適合性を検査するoperationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-admission-operation-005
      - claim-memory-admission-operation-006
  - sibling_concept_id: MemoryDispositionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 已审查兄弟区分：父节点 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity，骨架 MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryDispositionOperation（semantic kind=activity，骨架 MemoryDispositionOperation-is_a-MemoryOperation）。双端条件：MemoryAdmissionOperation 条件：“决定候选记忆进入持久存储还是在写入前被拒绝的操作”；MemoryDispositionOperation 条件：“改变既有记录的可用性、强度或保留状态的操作”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent MemoryOperation: MemoryAdmissionOperation (semantic kind=activity, backbone MemoryAdmissionOperation-is_a-MemoryOperation); MemoryDispositionOperation (semantic kind=activity, backbone MemoryDispositionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAdmissionOperation condition: “An operation deciding whether candidate memory enters persistent storage or is rejected before writing”; MemoryDispositionOperation condition: “An operation changing an existing record's availability, strength, or retention state”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity、バックボーン MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryDispositionOperation（semantic kind=activity、バックボーン MemoryDispositionOperation-is_a-MemoryOperation）。両端条件：MemoryAdmissionOperation の条件：「candidate memoryをpersistent storageへ入れるかwrite前に拒否するか決めるoperationです」；MemoryDispositionOperation の条件：「既存recordのavailability・strength・retention stateを変えるoperationです」。一方の成立は他方を証明しません。
    source_claims:
      - claim-memory-admission-operation-007
      - claim-memory-admission-operation-008
  - sibling_concept_id: MemoryResolutionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 共享父节点对照：父节点 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity，骨架 MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryResolutionOperation（semantic kind=activity，骨架 MemoryResolutionOperation-is_a-MemoryOperation）。双端条件：MemoryAdmissionOperation 条件：“决定候选记忆进入持久存储还是在写入前被拒绝的操作”；MemoryResolutionOperation 条件：“消费已识别问题状态并作出可审计解决决定的操作”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent MemoryOperation: MemoryAdmissionOperation (semantic kind=activity, backbone MemoryAdmissionOperation-is_a-MemoryOperation); MemoryResolutionOperation (semantic kind=activity, backbone MemoryResolutionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAdmissionOperation condition: “An operation deciding whether candidate memory enters persistent storage or is rejected before writing”; MemoryResolutionOperation condition: “An operation consuming an identified problem state and making an auditable resolution decision”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity、バックボーン MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryResolutionOperation（semantic kind=activity、バックボーン MemoryResolutionOperation-is_a-MemoryOperation）。両端条件：MemoryAdmissionOperation の条件：「candidate memoryをpersistent storageへ入れるかwrite前に拒否するか決めるoperationです」；MemoryResolutionOperation の条件：「識別済problem stateを消費しaudit可能resolution decisionを行うoperationです」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-memory-admission-operation-009
      - claim-memory-admission-operation-010
  - sibling_concept_id: MemoryRevisionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 端点特定对照：父节点 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity，骨架 MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity，骨架 MemoryRevisionOperation-is_a-MemoryOperation）。双端条件：MemoryAdmissionOperation 条件：“决定候选记忆进入持久存储还是在写入前被拒绝的操作”；MemoryRevisionOperation 条件：“以一个或多个既有记录为输入并产生新记录版本的操作”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent MemoryOperation: MemoryAdmissionOperation (semantic kind=activity, backbone MemoryAdmissionOperation-is_a-MemoryOperation); MemoryRevisionOperation (semantic kind=activity, backbone MemoryRevisionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAdmissionOperation condition: “An operation deciding whether candidate memory enters persistent storage or is rejected before writing”; MemoryRevisionOperation condition: “An operation taking one or more existing records as input and producing a new record version”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 MemoryOperation：MemoryAdmissionOperation（semantic kind=activity、バックボーン MemoryAdmissionOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity、バックボーン MemoryRevisionOperation-is_a-MemoryOperation）。両端条件：MemoryAdmissionOperation の条件：「candidate memoryをpersistent storageへ入れるかwrite前に拒否するか決めるoperationです」；MemoryRevisionOperation の条件：「一つ以上の既存recordをinputに新版recordを生成するoperationです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-memory-admission-operation-011
      - claim-memory-admission-operation-012
