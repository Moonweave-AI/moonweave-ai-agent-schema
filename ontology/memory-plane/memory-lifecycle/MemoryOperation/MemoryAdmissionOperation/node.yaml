schema: moonweave.ai/ontology-node/v1
id: MemoryAdmissionOperation
kind: concept
status: accepted
labels:
  zh: 记忆准入操作
  en: Memory admission operation
  ja: 記憶受入操作
semantics:
  short_definition:
    zh: 对候选记忆作出接受写入或拒绝处置的已执行操作。
    en: An executed operation that accepts a candidate memory for writing or rejects it for disposal.
    ja: 候補記憶を保存のために受け入れるか、破棄のために拒否するかを決定済みの操作です。
  definition:
    zh: MemoryAdmissionOperation 是一种 MemoryOperation：它在候选记忆尚未成为目标 MemoryRecord 时，对冻结的候选输入进行资格评估并作出一个明确的接受或拒绝决定。它不是候选内容本身、最终写入的持久记录、仅建议将来写入的计划，也不修订已有记录。
    en: MemoryAdmissionOperation is a MemoryOperation that evaluates frozen candidate input while it is not yet the target MemoryRecord and makes one explicit accept or reject decision. It is not the candidate content itself, the persistent record ultimately written, a plan that only recommends a future write, or a revision of an existing record.
    ja: MemoryAdmissionOperation は、候補入力がまだ対象 MemoryRecord ではない間に凍結済みの候補入力を評価し、一つの明示的な受入または拒否決定を行う MemoryOperation です。候補内容そのもの、最終的に書き込まれる永続レコード、将来の書込みを勧めるだけの計画、既存レコードの改訂ではありません。
  why_needed:
    zh: 将“是否值得持久化”从后续的实际写入或丢弃实现中分离出来，使资格依据和决策可审计、可重放。
    en: Separates the question of whether content merits persistence from the later write or discard implementation, making the eligibility basis and decision auditable and replayable.
    ja: 内容が永続化に値するかという問いを後続の実際の書込みまたは破棄実装から分離し、適格性の根拠と決定を監査可能かつ再実行可能にします。
  includes:
    - zh: 已启动、具有执行主体且对冻结候选输入作出接受或拒绝决定的资格评估活动。
      en: Started eligibility-assessment activities with an executor that decide acceptance or rejection for frozen candidate input.
      ja: 実行主体を持って開始済みで、凍結候補入力に対する受入または拒否を決定する適格性評価活動を含みます。
  excludes:
    - zh: 候选内容、已持久化的 MemoryRecord、无决策的相关性评分、未启动的写入提议，以及对既有记录的更新、合并、过期或删除。
      en: Candidate content, an already persisted MemoryRecord, a relevance score without a decision, an unstarted write proposal, and update, merge, expiration, or deletion of an existing record.
      ja: 候補内容、既に永続化された MemoryRecord、決定を伴わない関連度スコア、未開始の書込み提案、既存レコードの更新、統合、期限切れ、削除を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将准入看作一次有输入快照和明确裁决的工作单元；写入或丢弃是后续具体分支，不能用持久记录或队列消息替代决策活动。
    en: Treat admission as a work unit with an input snapshot and explicit verdict; write or discard is a later concrete branch, and neither a persistent record nor a queue message substitutes for the decision activity.
    ja: 受入を入力スナップショットと明示的な判定を持つ作業単位として扱います。書込みまたは破棄は後続の具体的分岐であり、永続レコードやキュー消息は決定活動の代わりになりません。
  typical_input:
    - description: Frozen candidate payload, provenance or consent evidence, and the applicable admission-policy version.
      format: "{operation_id, candidate_item_ref, candidate_manifest_digest, policy_ref?, actor_ref, started_at}"
  typical_output:
    - description: One explicit admission verdict whose concrete implementation is a MemoryWrite or MemoryDiscard child operation.
      format: "{operation_id, admission_decision: accept|discard, decision_at, decision_reason_code, result_ref?}"
  reference_implementations:
    - name: LangGraph long-term memory guide
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents application-managed long-term memory storage and namespace-scoped writes.
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents structured policy evaluation over input data.
  source_claims:
    - claim-memory-admission-operation-activity
    - claim-memory-admission-operation-policy
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以连接本次准入活动、结果和审计事件。
        en: Reuses the stable MemoryOperation identity to join this admission activity with its result and audit events.
        ja: 親 MemoryOperation の安定識別子を再利用し、この受入活動を結果および監査イベントへ結びます。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-admit-88
      source_claims:
        - claim-memory-admission-operation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 admission，表明此活动是在父类 MemoryOperation 的执行边界内对候选记忆作出的准入裁决。
        en: "Narrows the parent MemoryOperation operation kind to admission: an executed decision about a candidate memory."
        ja: 親 MemoryOperation の操作種別を admission に限定し、候補記憶について実行済みの受入判断であることを示します。
      allowed_values:
        - admission
      pattern: null
      example_value: admission
      source_claims:
        - claim-memory-admission-operation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该准入裁决的运行或终态，而不是候选项本身的状态。
        en: Records the runtime or terminal state of this admission decision, not the state of the candidate item.
        ja: 候補項目自体の状態ではなく、この受入判断の実行中または終端の状態を記録します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-admission-operation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录执行者实际开始评估该候选项的时间，不能以候选项创建时间代替。
        en: Records when the executor actually began assessing this candidate; candidate creation time is not a substitute.
        ja: 実行者が候補を実際に評価し始めた時刻を記録し、候補の作成時刻で代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T13:00:00Z"
      source_claims:
        - claim-memory-admission-operation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对这一次候选准入裁决实际负责的执行主体。
        en: References the actor that actually carries out this candidate-admission decision.
        ja: この候補受入判断を実際に実行する主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-admission-worker-2
      source_claims:
        - claim-memory-admission-operation-activity
    - id: candidate_item_ref
      labels:
        zh: 候选项引用
        en: candidate item reference
        ja: 候補項目参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次决策评估的候选记忆输入；它在决策时尚不能被当作该操作产生或修订的目标 MemoryRecord。
        en: Identifies the candidate memory input evaluated by this decision; at decision time it cannot be treated as a target MemoryRecord produced or revised by the operation.
        ja: この決定が評価する候補記憶入力を識別します。決定時には、その操作が生成または改訂する対象 MemoryRecord として扱えません。
      allowed_values: []
      pattern: "^candidate-[A-Za-z0-9._-]+$"
      example_value: candidate-item-88
      source_claims:
        - claim-memory-admission-operation-candidate
    - id: candidate_manifest_digest
      labels:
        zh: 候选输入摘要
        en: candidate input digest
        ja: 候補入力ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被评估候选输入及其关键证据的摘要，避免决策日后被可变内容重新解释。
        en: Fixes a digest of the evaluated candidate input and its material evidence so the decision cannot later be reinterpreted from mutable content.
        ja: 評価した候補入力と重要証跡のダイジェストを固定し、可変内容から後で決定を再解釈できないようにします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:671ccf5b8019fb0a28b9fd875228e20589cc456a59c0e91e9e85e3f7e35bd51d
      source_claims:
        - claim-memory-admission-operation-digest
    - id: admission_decision
      labels:
        zh: 准入决定
        en: admission decision
        ja: 受入決定
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明候选输入被接受并进入写入分支，还是被拒绝并进入丢弃分支。
        en: States whether the candidate input is accepted into the write branch or rejected into the discard branch.
        ja: 候補入力が書込み分岐へ受け入れられるか、破棄分岐へ拒否されるかを示します。
      allowed_values:
        - accept
        - discard
      pattern: null
      example_value: accept
      source_claims:
        - claim-memory-admission-operation-decision
    - id: decision_at
      labels:
        zh: 决策时间
        en: decision time
        ja: 決定時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录准入裁决实际形成的时间，必须不早于父操作的 started_at。
        en: Records when the admission verdict is actually made and must not precede the parent operation's started_at.
        ja: 受入判定が実際に形成された時刻を記録し、親操作の started_at より前であってはなりません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T13:00:00.091Z"
      source_claims:
        - claim-memory-admission-operation-activity
    - id: decision_reason_code
      labels:
        zh: 决策原因代码
        en: decision reason code
        ja: 決定理由コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可比较的代码记录导致接受或丢弃的主要依据；详细证据留在结果或审计信息中。
        en: Records the principal basis for acceptance or discard as a comparable code; detailed evidence remains in result or audit information.
        ja: 受入または破棄の主要根拠を比較可能なコードで記録し、詳細証跡は結果または監査情報に残します。
      allowed_values:
        - novel_and_in_scope
        - user_authorized
        - duplicate
        - out_of_scope
        - policy_denied
        - insufficient_evidence
      pattern: null
      example_value: novel_and_in_scope
      source_claims:
        - claim-memory-admission-operation-decision
  constraints:
    - id: MemoryAdmissionOperation-parent-operation-envelope
      expression: "operation_kind = admission and status, started_at, and actor_ref identify one executed admission decision."
      explanation:
        zh: 候选项、裁决和理由不能脱离实际执行活动而单独构成准入操作；父类执行边界必须同时可见。
        en: A candidate, verdict, and reason alone do not form an admission operation; the parent execution envelope must remain visible.
        ja: 候補、判断、理由だけでは受入操作にならず、親の実行境界が同時に見えている必要があります。
      source_claims:
        - claim-memory-admission-operation-activity
    - id: MemoryAdmissionOperation-actual-operation-boundary
      expression: "The instance must satisfy MemoryOperation with operation_kind=admission, a real started_at, an executor, and a terminal or in-progress runtime status; a proposal or relevance score alone is not an admission operation."
      explanation:
        zh: 准入规则或评分可以存在于计划阶段，但只有已执行的活动才可被审计为准入操作。
        en: Admission rules or scores can exist at planning time, but only an executed activity can be audited as an admission operation.
        ja: 受入規則やスコアは計画段階に存在できますが、実行済み活動だけが受入操作として監査できます。
      source_claims:
        - claim-memory-admission-operation-activity
    - id: MemoryAdmissionOperation-single-verdict
      expression: "admission_decision is exactly one of accept or discard for one candidate_manifest_digest; conflicting verdicts require separate operation IDs and audit records."
      explanation:
        zh: 同一次已执行准入活动不能同时接受和丢弃相同的输入快照；重试或改判需要新的可追溯活动。
        en: One executed admission activity cannot both accept and discard the same input snapshot; a retry or reversal needs a new traceable activity.
        ja: 一つの実行済み受入活動が同じ入力スナップショットを同時に受入と破棄にすることはできず、再試行または覆しには新しい追跡可能な活動が必要です。
      source_claims:
        - claim-memory-admission-operation-decision
    - id: MemoryAdmissionOperation-candidate-before-record
      expression: "candidate_item_ref denotes evaluated input at decision time and must not be substituted with an output MemoryRecord ID or an existing record selected for revision."
      explanation:
        zh: 准入判断处理候选输入；若改为处理已有记录，应归入修订、处置或评估分支而不是准入。
        en: Admission evaluates candidate input; an activity that processes an existing record belongs to revision, disposition, or assessment rather than admission.
        ja: 受入は候補入力を評価します。既存レコードを処理する活動は受入ではなく改訂、処分、または評価に属します。
      source_claims:
        - claim-memory-admission-operation-candidate
    - id: MemoryAdmissionOperation-decision-time-consistency
      expression: "decision_at is on or after started_at, and a terminal parent operation has ended_at on or after decision_at."
      explanation:
        zh: 决策必须发生在活动开始之后，并在已终止操作的结束边界内，才能形成可信时间线。
        en: The verdict must occur after activity start and within a terminal operation's end boundary to form a credible timeline.
        ja: 信頼できる時系列を作るには、判定は活動開始後かつ終端操作の終了境界内に発生する必要があります。
      source_claims:
        - claim-memory-admission-operation-activity
  required_relation_constraints: []
examples:
  - id: MemoryAdmissionOperation-example-positive-accept

    labels:
      zh: 接受新颖且在作用域内的候选记忆
      en: Accept novel in-scope candidate memory
      ja: 新規かつスコープ内の候補記憶を受け入れる

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-admit-88
      operation_kind: admission
      status: succeeded
      started_at: "2026-07-18T13:00:00Z"
      ended_at: "2026-07-18T13:00:00.184Z"
      actor_ref: agent-memory-worker-4
      policy_ref: admission-policy@v4
      candidate_item_ref: candidate-item-88
      candidate_manifest_digest: sha256:671ccf5b8019fb0a28b9fd875228e20589cc456a59c0e91e9e85e3f7e35bd51d
      admission_decision: accept
      decision_at: "2026-07-18T13:00:00.091Z"
      decision_reason_code: novel_and_in_scope
    related_node_ids:
      - MemoryAdmissionOperation
      - MemoryOperation
      - MemoryWrite
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryAdmissionOperation-is_a-MemoryOperation
      - MemoryWrite-is_a-MemoryAdmissionOperation
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-admission-operation-activity
      - claim-memory-admission-operation-decision
      - claim-memory-admission-operation-policy
  - id: MemoryAdmissionOperation-example-counterexample-record-revision

    labels:
      zh: 已有记录的修订不是准入
      en: Revision of an existing record is not admission
      ja: 既存レコードの改訂は受入ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-revise-88
      operation_kind: revision
      status: succeeded
      started_at: "2026-07-18T14:00:00Z"
      actor_ref: agent-memory-worker-4
      target_record_refs:
        - record-88-v1
      output_record_ref: record-88-v2
    related_node_ids:
      - MemoryAdmissionOperation
      - MemoryOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryAdmissionOperation-is_a-MemoryOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-admission-operation-candidate
      - claim-memory-admission-operation-activity
  - id: MemoryAdmissionOperation-example-boundary-proposal

    labels:
      zh: 尚未执行的写入建议
      en: Write recommendation not yet executed
      ja: まだ実行されていない書込み提案

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      proposal_id: proposal-admit-91
      candidate_item_ref: candidate-item-91
      relevance_score: 0.87
      scheduled_for: "2026-07-19T08:00:00Z"
      admission_decision: absent
      actor_ref: absent
    related_node_ids:
      - MemoryAdmissionOperation
      - MemoryOperation
    related_relation_ids:
      - MemoryAdmissionOperation-is_a-MemoryOperation

    source_claims:
      - claim-memory-admission-operation-activity
  - id: MemoryAdmissionOperation-example-instance-discard

    labels:
      zh: 因重复而丢弃候选记忆的实例
      en: Instance that discards a duplicate candidate memory
      ja: 重複候補記憶を破棄するインスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      operation_id: mem-op-admit-1101
      operation_kind: admission
      status: succeeded
      started_at: "2026-07-18T15:10:00Z"
      ended_at: "2026-07-18T15:10:00.038Z"
      actor_ref: admission-worker-2
      policy_ref: admission-policy@v4
      candidate_item_ref: candidate-item-1101
      candidate_manifest_digest: sha256:f615cc3ae6209744b0a986a0258b3c059a77e68f8942de4cecfb748ffb240fff
      admission_decision: discard
      decision_at: "2026-07-18T15:10:00.020Z"
      decision_reason_code: duplicate
    related_node_ids:
      - MemoryAdmissionOperation
      - MemoryOperation
      - MemoryDiscard
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryAdmissionOperation-is_a-MemoryOperation
      - MemoryDiscard-is_a-MemoryAdmissionOperation
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-admission-operation-activity
      - claim-memory-admission-operation-decision
      - claim-memory-admission-operation-policy
parent_relation:
  id: MemoryAdmissionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆操作
    en: is a memory operation
    ja: 記憶操作の一種である
  definitions:
    zh: MemoryAdmissionOperation —is_a→ MemoryOperation 表示它满足记忆操作的一般活动边界，并额外以未持久化候选输入为对象作出一次接受或丢弃裁决。
    en: MemoryAdmissionOperation —is_a→ MemoryOperation means it meets the general activity boundary of a memory operation and additionally decides accept or discard for unpersisted candidate input.
    ja: MemoryAdmissionOperation —is_a→ MemoryOperation は、記憶操作の一般的な活動境界を満たし、さらに未永続化候補入力に対して受入または破棄を決定することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不对一次运行中可出现多少个准入活动施加基数。
    en: The classification relation expresses type membership and does not impose a count of admission activities in one run.
    ja: 分類関係は型メンバーシップを表し、一実行で出現する受入活動数に基数を課しません。
  inverse_reading:
    predicate: has_admission_subtype
    labels:
      zh: 具有准入操作子类
      en: has admission-operation subtype
      ja: 受入操作サブタイプを持つ
  conditions:
    - id: MemoryAdmissionOperation-is_a-MemoryOperation-child-differentia
      severity: error
      expression_language: plain
