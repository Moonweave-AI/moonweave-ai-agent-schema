        labels:
          zh: 丢弃实际评估的候选项
          en: Discard consumes candidate it actually evaluates
          ja: 破棄が実際に評価した候補を消費する

        descriptions:
          zh: mem-op-discard-1101 的 candidate_item_ref=candidate-item-1101，冻结清单包含该项，判定为 discard。
          en: mem-op-discard-1101 has candidate_item_ref=candidate-item-1101, its frozen manifest contains that item, and its verdict is discard.
          ja: mem-op-discard-1101 は candidate_item_ref=candidate-item-1101 を持ち、凍結マニフェストはその項目を含み、判定は discard です。
        field_values:
