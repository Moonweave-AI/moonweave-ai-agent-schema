schema: moonweave.ai/ontology-node/v1
id: MemoryDiscard
kind: concept
status: accepted
labels:
  zh: 记忆丢弃
  en: Memory discard
  ja: 記憶破棄
semantics:
  short_definition:
    zh: 在生成任何持久记忆记录前，以可审计理由拒绝候选输入的准入操作。
    en: An admission operation that rejects candidate input for an auditable reason before any persistent memory record is created.
    ja: 永続記憶レコードが生成される前に、監査可能な理由で候補入力を拒否する受入操作です。
  definition:
    zh: MemoryDiscard 是 admission_decision=discard 的 MemoryAdmissionOperation。它对一个冻结候选输入记录拒绝原因、证据摘要和裁决时间，并阻止该准入尝试进入写入分支。它不是候选内容本身、普通日志、未执行的拒绝建议，也不是对已有 MemoryRecord 的删除、过期、驱逐或衰减。
    en: MemoryDiscard is a MemoryAdmissionOperation whose admission_decision is discard. It records a rejection reason, evidence digest, and verdict time for one frozen candidate input and prevents that admission attempt from entering the write branch. It is not candidate content itself, a plain log, an unexecuted rejection recommendation, or deletion, expiration, eviction, or decay of an existing MemoryRecord.
    ja: MemoryDiscard は admission_decision が discard である MemoryAdmissionOperation です。一つの凍結候補入力について拒否理由、証跡ダイジェスト、判定時刻を記録し、その受入試行が書込み分岐へ進むことを防ぎます。候補内容そのもの、通常ログ、未実行の拒否提案、既存 MemoryRecord の削除、期限切れ、追い出し、減衰ではありません。
  why_needed:
    zh: “从未写入”与“写入后处置”具有不同的证据、恢复和合规含义，必须避免将其合并为同一种删除。
    en: Never-written and post-write disposition have different evidence, recovery, and compliance implications, so they must not be collapsed into one kind of deletion.
    ja: 未書込みと書込み後の処分は、証跡、復旧、コンプライアンス上の意味が異なるため、一種類の削除へ統合してはなりません。
  includes:
    - zh: 已执行的候选拒绝，例如重复、超出作用域、缺少同意、不安全、策略拒绝或证据不足。
      en: Executed candidate rejections such as duplicate, out of scope, missing consent, unsafe, policy denied, or insufficient evidence.
      ja: 重複、スコープ外、同意不足、安全でない、ポリシー拒否、証跡不足などの実行済み候補拒否を含みます。
  excludes:
    - zh: 仍待裁决的候选、针对已持久化记录的删除或墓碑、仅有低相关性分数的筛选结果，以及没有候选与证据绑定的通用保留规则。
      en: Candidates still awaiting verdict, deletion or tombstones for persisted records, filtering with only a low relevance score, and generic retention rules without candidate and evidence binding.
      ja: まだ判定待ちの候補、永続レコードに対する削除または墓碑、低い関連度スコアだけのフィルタリング、候補と証跡への結合を持たない一般的な保持規則を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将拒绝实现为有决策快照的终态工作单元；它保留最少的可解释依据，但不创建或改写持久记忆记录。
    en: Implement rejection as a terminal work unit with a decision snapshot; it retains the minimum explainable basis but does not create or rewrite a persistent memory record.
    ja: 拒否を決定スナップショットを持つ終端作業単位として実装します。説明可能な最小根拠は保持しますが、永続記憶レコードを作成または書き換えません。
  typical_input:
    - description: Frozen candidate input, eligibility evidence, applicable policy version, and executing actor from the admission operation.
      format: "{operation_id, candidate_item_ref, candidate_manifest_digest, admission_decision: discard, decision_reason_code}"
  typical_output:
    - description: A discard verdict with retained reason evidence and an audit/result reference but no output MemoryRecord.
      format: "{operation_id, rejection_reason_code, rejection_evidence_digest, discarded_at, result_ref?, audit_event_refs?}"
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents structured policy evaluation and a decision over supplied input.
    - name: LangGraph long-term memory guide
      url: https://docs.langchain.com/oss/python/langgraph/add-memory
      description: Documents application-managed long-term storage, which applications can guard with a prior admission decision.
  source_claims:
    - claim-memory-discard-activity
    - claim-memory-discard-decision
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用 MemoryOperation 的稳定标识，以将此次丢弃活动、其结果和审计事件连接为同一次执行。
        en: Reuses the stable MemoryOperation identity so this discard activity, its result, and its audit events join as one execution.
        ja: MemoryOperation の安定識別子を再利用し、この破棄活動、結果、監査イベントを一つの実行として結びます。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-discard-1101
      source_claims:
        - claim-memory-discard-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 admission，保留该丢弃决定作为父类准入活动而非单独的评分或日志事件。
        en: Narrows the inherited operation kind to admission and retains this discard decision as an admission activity rather than a score or log event.
        ja: 継承した操作種別を admission に限定し、この破棄判断をスコアやログではなく受入活動として保持します。
      allowed_values:
        - admission
      pattern: null
      example_value: admission
      source_claims:
        - claim-memory-discard-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录丢弃裁决活动的运行或终态，而不把候选项的价值判断误作运行状态。
        en: Records the runtime or terminal state of the discard-decision activity, not a value judgement about the candidate.
        ja: 候補に対する価値判断ではなく、破棄判断活動の実行中または終端の状態を記録します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-discard-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际开始检查该候选项的时间，不能用丢弃日志写入时间替代。
        en: Records when examination of this candidate actually began, not when a discard log was later written.
        ja: この候補の検査を実際に始めた時刻を記録し、後から書かれた破棄ログの時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T15:10:00Z"
      source_claims:
        - claim-memory-discard-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行候选检查和丢弃裁决的主体。
        en: References the actor that actually performs the candidate check and discard decision.
        ja: 候補検査と破棄判断を実際に実行する主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: admission-worker-2
      source_claims:
        - claim-memory-discard-activity
    - id: candidate_item_ref
      labels:
        zh: 被拒候选项引用
        en: rejected candidate reference
        ja: 拒否候補参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识被此准入活动实际评估并拒绝的候选输入；它不因此取得 MemoryRecord 身份。
        en: Identifies the candidate input actually evaluated and rejected by this admission activity; the candidate does not thereby acquire MemoryRecord identity.
        ja: この受入活動が実際に評価して拒否した候補入力を識別します。候補はそのために MemoryRecord 識別を取得しません。
      allowed_values: []
      pattern: "^candidate-[A-Za-z0-9._-]+$"
      example_value: candidate-item-1101
      source_claims:
        - claim-memory-discard-candidate
    - id: candidate_manifest_digest
      labels:
        zh: 候选输入摘要
        en: candidate input digest
        ja: 候補入力ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被拒候选输入及其评价证据的摘要，避免理由被后来改变的内容重解释。
        en: Fixes a digest of the rejected candidate input and its evaluation evidence, preventing the reason from being reinterpreted from later-changed content.
        ja: 拒否候補入力と評価証跡のダイジェストを固定し、後で変更された内容から理由が再解釈されることを防ぎます。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:f615cc3ae6209744b0a986a0258b3c059a77e68f8942de4cecfb748ffb240fff
      source_claims:
        - claim-memory-discard-digest
    - id: admission_decision
      labels:
        zh: 准入决定
        en: admission decision
        ja: 受入決定
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明该准入活动的唯一裁决为 discard，而不是尚未形成的建议或接受写入。
        en: States that this admission activity's single verdict is discard, not an unmade recommendation or an accepted write.
        ja: この受入活動の唯一の判定が、未確定の提案や受入済み書込みではなく discard であることを示します。
      allowed_values:
        - discard
      pattern: null
      example_value: discard
      source_claims:
        - claim-memory-discard-decision
    - id: decision_at
      labels:
        zh: 准入裁决时间
        en: admission decision time
        ja: 受入判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对这个候选项形成 discard 裁决的时间；它与后续清理或审计登记时间不同。
        en: Records when the discard verdict was formed for this candidate, distinct from later cleanup or audit-registration time.
        ja: この候補について discard 判定を形成した時刻を記録し、後続のクリーンアップまたは監査登録時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T15:10:00.020Z"
      source_claims:
        - claim-memory-discard-decision
    - id: decision_reason_code
      labels:
        zh: 准入裁决原因代码
        en: admission decision reason code
        ja: 受入判断理由コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用父类的可比较原因代码表达丢弃的裁决依据；细粒度的 rejection_reason_code 仍可说明具体拒绝情形。
        en: Records the discard basis in the parent comparable reason vocabulary; the more specific rejection_reason_code may add detail.
        ja: 親の比較可能な理由語彙で破棄の根拠を記録し、より具体的な rejection_reason_code は追加の詳細を示せます。
      allowed_values:
        - duplicate
        - out_of_scope
        - policy_denied
        - insufficient_evidence
      pattern: null
      example_value: duplicate
      source_claims:
        - claim-memory-discard-decision
    - id: rejection_reason_code
      labels:
        zh: 拒绝原因代码
        en: rejection reason code
        ja: 拒否理由コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录导致此候选被拒绝的主要可比较理由，而非将完整自由文本日志作为分类依据。
        en: Records the principal comparable reason that rejected the candidate rather than using a full free-text log as the classification basis.
        ja: 完全な自由形式ログを分類根拠にするのではなく、候補を拒否した主要な比較可能理由を記録します。
      allowed_values:
        - duplicate
        - out_of_scope
        - consent_missing
        - unsafe_content
        - policy_denied
        - insufficient_evidence
      pattern: null
      example_value: duplicate
      source_claims:
        - claim-memory-discard-decision
    - id: rejection_evidence_digest
      labels:
        zh: 拒绝证据摘要
        en: rejection evidence digest
        ja: 拒否証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识支持拒绝原因的最小证据快照，例如重复比较、同意检查或策略评估结果。
        en: Identifies the minimum evidence snapshot supporting the rejection reason, such as duplicate comparison, consent check, or policy evaluation result.
        ja: 重複比較、同意確認、ポリシー評価結果など、拒否理由を支える最小証跡スナップショットを識別します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:96dc9a4a24ca8b96e08c81624139dc9cd66b8e8ae5d96b7e0c3ed23c33120bb7
      source_claims:
        - claim-memory-discard-digest
    - id: discarded_at
      labels:
        zh: 丢弃时间
        en: discarded at
        ja: 破棄時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录拒绝裁决实际生效的时间，必须与 admission 的 decision_at 一致或紧随其后。
        en: Records when the rejection verdict takes effect and must equal or immediately follow the admission decision_at.
        ja: 拒否判定が実際に有効になった時刻を記録し、admission の decision_at と一致するか直後でなければなりません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T15:10:00.020Z"
      source_claims:
        - claim-memory-discard-activity
  constraints:
    - id: MemoryDiscard-parent-decision-consistency
      expression: "The inherited admission_decision equals discard and the instance satisfies MemoryAdmissionOperation with a started execution, candidate input snapshot, executor, and one decision_at."
      explanation:
        zh: 只有已执行的拒绝裁决可成为丢弃；低分、通用规则或尚未启动的计划不能替代父类活动边界。
        en: Only an executed rejection verdict can become discard; a low score, generic rule, or unstarted plan cannot substitute for the parent activity boundary.
        ja: 実行済みの拒否判定だけが破棄になれます。低スコア、一般規則、未開始の計画は親活動境界の代わりになりません。
      source_claims:
        - claim-memory-discard-activity
        - claim-memory-discard-decision
    - id: MemoryDiscard-no-persistent-output-record
      expression: "No MemoryRecord is generated for candidate_item_ref by this operation; if a persistent record already exists or is created by the same operation, use a different lifecycle classification."
      explanation:
        zh: 丢弃的核心边界是候选没有成为持久记录；对既有记录的删除和对输出记录的失败回滚都不是准入丢弃。
        en: The core discard boundary is that the candidate never becomes a persistent record; deletion of an existing record and a failed rollback of an output record are not admission discard.
        ja: 破棄の中心境界は候補が永続レコードにならないことです。既存レコードの削除や出力レコードの失敗ロールバックは受入破棄ではありません。
      source_claims:
        - claim-memory-discard-candidate
    - id: MemoryDiscard-evidence-consistency
      expression: "rejection_evidence_digest is present and supports rejection_reason_code for the same candidate_manifest_digest; a digest from a different candidate or retry cannot justify this discard."
      explanation:
        zh: 理由必须可追溯到同一候选快照；复用其他候选或其他尝试的证据会造成错误拒绝。
        en: The reason must trace to the same candidate snapshot; reusing evidence from another candidate or attempt creates a false rejection.
        ja: 理由は同じ候補スナップショットへ追跡できなければならず、別の候補または試行の証跡を再利用すると誤った拒否になります。
      source_claims:
        - claim-memory-discard-digest
    - id: MemoryDiscard-time-consistency
      expression: "discarded_at is on or after decision_at and started_at, and a terminal parent operation has ended_at on or after discarded_at."
      explanation:
        zh: 拒绝的生效时刻必须处于实际活动的执行区间内，不能以事后日志时间替代。
        en: The rejection-effective time must lie within the actual activity interval and cannot be substituted by a later log-ingestion time.
        ja: 拒否の有効時刻は実際の活動区間内になければならず、後のログ取込時刻で置き換えられません。
      source_claims:
        - claim-memory-discard-activity
  required_relation_constraints: []
examples:
  - id: MemoryDiscard-example-positive-duplicate

    labels:
      zh: 因完全重复而丢弃候选项
      en: Discard candidate because it is an exact duplicate
      ja: 完全な重複のため候補を破棄する

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-discard-1101
      operation_kind: admission
      status: succeeded
      started_at: "2026-07-18T15:10:00Z"
      ended_at: "2026-07-18T15:10:00.038Z"
      actor_ref: admission-worker-2
      candidate_item_ref: candidate-item-1101
      candidate_manifest_digest: sha256:f615cc3ae6209744b0a986a0258b3c059a77e68f8942de4cecfb748ffb240fff
      admission_decision: discard
      decision_at: "2026-07-18T15:10:00.020Z"
      decision_reason_code: duplicate
      rejection_reason_code: duplicate
      rejection_evidence_digest: sha256:96dc9a4a24ca8b96e08c81624139dc9cd66b8e8ae5d96b7e0c3ed23c33120bb7
      discarded_at: "2026-07-18T15:10:00.020Z"
    related_node_ids:
      - MemoryDiscard
      - MemoryAdmissionOperation
      - MemoryOperation
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryDiscard-is_a-MemoryAdmissionOperation
      - MemoryAdmissionOperation-is_a-MemoryOperation
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-discard-activity
      - claim-memory-discard-decision
      - claim-memory-discard-candidate
  - id: MemoryDiscard-example-counterexample-delete

    labels:
      zh: 删除已持久化记录不是丢弃
      en: Deleting a persisted record is not discard
      ja: 永続レコードの削除は破棄ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-delete-72
      operation_kind: disposition
      status: succeeded
      started_at: "2026-07-18T16:00:00Z"
      actor_ref: retention-enforcer-2
      target_record_refs:
        - record-72
      tombstone_ref: tombstone-72
    related_node_ids:
      - MemoryDiscard
      - MemoryDispositionOperation
      - MemoryDelete
      - MemoryRecord
      - MemoryTombstone
    related_relation_ids:
      - MemoryDiscard-is_a-MemoryAdmissionOperation
      - MemoryDelete-is_a-MemoryDispositionOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-discard-candidate
  - id: MemoryDiscard-example-boundary-unexecuted-recommendation

    labels:
      zh: 未执行的拒绝建议
      en: Unexecuted rejection recommendation
      ja: 未実行の拒否提案

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      recommendation_id: recommend-discard-44
      candidate_item_ref: candidate-item-44
      relevance_score: 0.11
      admission_decision: absent
      rejection_reason_code: absent
      actor_ref: absent
    related_node_ids:
      - MemoryDiscard
      - MemoryAdmissionOperation
    related_relation_ids:
      - MemoryDiscard-is_a-MemoryAdmissionOperation

    source_claims:
      - claim-memory-discard-activity
  - id: MemoryDiscard-example-instance-policy-denied

    labels:
      zh: 策略拒绝候选记忆的实例
      en: Instance that policy-denies candidate memory
      ja: ポリシーが候補記憶を拒否するインスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      operation_id: mem-op-discard-1208
