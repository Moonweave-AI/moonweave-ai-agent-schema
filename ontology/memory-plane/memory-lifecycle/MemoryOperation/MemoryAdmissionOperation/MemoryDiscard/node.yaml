      en: MemoryDiscard —consumes→ MemoryItem means the candidate is the direct object of the rejection decision and produces no persistent record.
      ja: MemoryDiscard —consumes→ MemoryItem はcandidateがrejection decisionのdirect objectでpersistent recordを生成しないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
