relations:
  - id: MemoryDiscard-consumes-MemoryItem
    predicate: consumes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 消费被拒候选项
      en: consumes rejected memory item
      ja: 拒否候補の記憶項目を消費する
    definitions:
      zh: MemoryDiscard —consumes→ MemoryItem 表示该项是本次拒绝裁决实际读取和评估的候选表示，而不是被删除的既有 MemoryRecord。
      en: MemoryDiscard —consumes→ MemoryItem means the item is the candidate representation actually read and evaluated for this rejection verdict, not an existing MemoryRecord being deleted.
      ja: MemoryDiscard —consumes→ MemoryItem は、その項目が今回の拒否判定で実際に読み取り評価された候補表現であり、削除対象の既存 MemoryRecord ではないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个丢弃活动可评估一个或多个候选表示，实际数目由冻结候选清单决定。
      en: A discard activity can evaluate one or more candidate representations; the frozen candidate manifest determines the count.
      ja: 一つの破棄活動は一つまたは複数の候補表現を評価でき、凍結候補マニフェストが数を決めます。
    inverse_reading:
      predicate: is_consumed_by_discard
      labels:
        zh: 被丢弃操作消费
        en: is consumed by discard operation
        ja: 破棄操作に消費される
    conditions:
      - id: MemoryDiscard-consumes-MemoryItem-candidate-match
        severity: error
        expression_language: plain
        expression: "Assert only when candidate_item_ref resolves to the target item, candidate_manifest_digest covers that item, and admission_decision is discard."
        explanation:
          zh: 同一批次、相似内容或后续写入都不能替代候选身份与冻结清单的精确匹配。
          en: Same batch, similar content, or a later write cannot replace exact matching of candidate identity and frozen manifest.
          ja: 同じバッチ、類似内容、後続の書込みは、候補識別と凍結マニフェストの正確な一致を代替できません。
        source_claims:
