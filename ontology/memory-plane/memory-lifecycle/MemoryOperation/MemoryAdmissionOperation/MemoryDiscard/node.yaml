schema: moonweave.ai/ontology-node/v1
id: MemoryDiscard
kind: concept
status: review
labels:
  zh: 记忆丢弃
  en: Memory discard
  ja: 記憶破棄
semantics:
  short_definition:
    zh: 在产生持久记录前拒绝候选 MemoryItem 的准入操作。
    en: An admission operation rejecting a candidate MemoryItem before any persistent record is created.
    ja: persistent record生成前にcandidate MemoryItemを拒否するadmission operationです。
  definition:
    zh: MemoryDiscard 是 MemoryAdmissionOperation：它对特定候选项形成可审计的拒绝决定并阻止该候选的 MemoryWrite；它不是删除已持久化记录。
    en: MemoryDiscard is a MemoryAdmissionOperation that records an auditable rejection for a specific candidate and prevents that candidate's MemoryWrite. It is not deletion of an already persisted record.
    ja: MemoryDiscard は特定candidateの監査可能reject判断を記録しそのcandidateのMemoryWriteを防ぐ MemoryAdmissionOperationで、既存persistent recordの削除ではありません。
  why_needed:
    zh: 区分“从未写入”与“写入后删除”。
    en: Separates never admitted from admitted and later deleted.
    ja: never admittedとadmitted後deleteを区別します。
  includes:
    - zh: 纳入因重复、低价值、不安全、越权或缺少同意而拒绝候选项。
      en: Includes rejecting a candidate as duplicate, low-value, unsafe, unauthorized, or lacking consent.
      ja: duplicate・low-value・unsafe・unauthorized・consent不足によるcandidate拒否を含みます。
  excludes:
    - zh: 排除删除、过期、驱逐和衰减等针对 MemoryRecord 的处置。
      en: Excludes delete, expiration, eviction, and decay dispositions over MemoryRecord.
      ja: MemoryRecordへのdelete・expiration・eviction・decay dispositionを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - discard_operation_id
  fields:
    - id: discard_operation_id
      labels:
        zh: 丢弃操作标识
        en: discard operation ID
        ja: discard operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次候选拒绝活动。
        en: Identifies one candidate-rejection activity.
        ja: 一candidate rejection activityを識別します。
      allowed_values: []
      pattern: null
      example_value: discard-72
      source_claims:
        - claim-memory-discard-002
    - id: rejection_reason
      labels:
        zh: 拒绝理由
        en: rejection reason
        ja: 拒否理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录阻止该候选写入的可复核理由。
        en: Records the reviewable reason that blocked writing the candidate.
        ja: candidate writeを阻止したreview可能理由を記録します。
      allowed_values: []
      pattern: null
      example_value: duplicate-without-new-evidence
      source_claims:
        - claim-memory-discard-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryDiscard-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆丢弃正例
      en: "Positive case: Memory discard"
      ja: 記憶破棄正例
    scenario_id: null
    descriptions:
      zh: memory-op-discard-001 审查 item-72 后发现其与现有记录重复且没有可验证的新来源，因此记录拒绝原因并阻止对应 MemoryWrite。
      en: memory-op-discard-001 reviews item-72, finds it duplicates an existing record without verifiable new provenance, records the rejection reason, and prevents the corresponding MemoryWrite.
      ja: memory-op-discard-001 は item-72 が既存記録と重複し検証可能な新出典を持たないと確認し、拒否理由を記録して対応する MemoryWrite を防ぎます。
    field_values:
      discard_operation_id: memory-op-discard-001
      rejection_reason: duplicate-without-new-evidence
      operation_id: memory-op-discard-001
      reason: the candidate is rejected before persistence because provenance is insufficient
      admission_operation_id: memory-op-discard-001
      candidate_item_id: item-72
      started_at: 2026-07-16T13:02:00Z
    related_node_ids:
      - MemoryDiscard
      - MemoryAdmissionOperation
    related_relation_ids:
      - MemoryDiscard-is_a-MemoryAdmissionOperation
    expected_result:
      zh: 归类为 MemoryDiscard，并不得为 item-72 建立 MemoryWrite。
      en: Classify as MemoryDiscard and do not create a MemoryWrite for item-72.
      ja: MemoryDiscardに分類しitem-72のMemoryWriteを作りません。
    why_valid_or_invalid:
      zh: 拒绝发生在持久记录生成之前且理由可审计。
      en: Rejection occurs before persistent-record creation and the reason is auditable.
      ja: rejectはpersistent-record生成前で理由がaudit可能です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-discard-004
  - id: MemoryDiscard-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 写入前候选丢弃实例
      en: Pre-write candidate-discard instance
      ja: 書込み前候補破棄インスタンス
    scenario_id: MemoryDiscard:instance:memory-op-discard-001
    descriptions:
      zh: memory-op-discard-001 审查 item-72 后发现其与现有记录重复且没有可验证的新来源，因此记录拒绝原因并阻止对应 MemoryWrite。
      en: memory-op-discard-001 reviews item-72, finds it duplicates an existing record without verifiable new provenance, records the rejection reason, and prevents the corresponding MemoryWrite.
      ja: memory-op-discard-001 は item-72 が既存記録と重複し検証可能な新出典を持たないと確認し、拒否理由を記録して対応する MemoryWrite を防ぎます。
    field_values:
      discard_operation_id: memory-op-discard-001
      rejection_reason: duplicate-without-new-evidence
      operation_id: memory-op-discard-001
      reason: the candidate is rejected before persistence because provenance is insufficient
    related_node_ids:
      - MemoryDiscard
      - MemoryAdmissionOperation
      - MemoryItem
      - MemoryWrite
    related_relation_ids:
      - MemoryDiscard-is_a-MemoryAdmissionOperation
      - MemoryDiscard-consumes-MemoryItem
      - MemoryDiscard-prevents-MemoryWrite
    expected_result:
      zh: 候选仍没有 MemoryRecord 身份，查询返回 Discard 及其原因，并确认未发生初始写入。
      en: The candidate receives no MemoryRecord identity; the query returns the Discard and reason and confirms that no initial write occurred.
      ja: 候補に MemoryRecord 同一性は付与されず、Discard と理由を返し、初回書込みがないことを確認します。
    why_valid_or_invalid:
      zh: 对象在持久化前被拒绝，因此不是对既有记录执行 Delete。
      en: The object is rejected before persistence and is therefore not a Delete of an existing record.
      ja: 永続化前の拒否であり、既存記録への Delete ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-discard-004
  - id: MemoryDiscard-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆丢弃边界例
      en: "Boundary case: Memory discard"
      ja: 記憶破棄境界例
    scenario_id: null
    descriptions:
      zh: record-72 已持久化两周，现在按用户请求被移除。
      en: record-72 has been persistent for two weeks and is now removed at the user's request.
      ja: record-72 は二週間persistentで現在user requestにより除去されます。
    field_values: {}
    related_node_ids:
      - MemoryDiscard
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryDiscard；应归入 MemoryDelete。
      en: Do not classify as MemoryDiscard; classify as MemoryDelete.
      ja: MemoryDiscardでなくMemoryDeleteに分類します。
    why_valid_or_invalid:
      zh: 对象已有 MemoryRecord 身份，处置发生在写入后。
      en: The object already has MemoryRecord identity and disposition occurs after admission.
      ja: 対象は既にMemoryRecord identityを持ちdispositionはadmission後です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-discard-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryDiscard-is_a-MemoryAdmissionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆准入操作
    en: is a memory admission operation
    ja: 記憶受入操作の一種
  definitions:
    zh: MemoryDiscard —is_a→ MemoryAdmissionOperation 表示：候选项在任何 MemoryRecord 产生前被明确拒绝，并记录拒绝依据。
    en: MemoryDiscard —is_a→ MemoryAdmissionOperation holds because the candidate is explicitly rejected before any MemoryRecord is produced and the rejection basis is recorded
    ja: MemoryDiscard —is_a→ MemoryAdmissionOperation は、MemoryRecord生成前にcandidateを明示rejectしrejection basisを記録するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse is a memory admission operation
      ja: 逆方向読取
  conditions:
    - id: MemoryDiscard-is_a-MemoryAdmissionOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the candidate is explicitly rejected before any MemoryRecord is produced and the rejection basis is recorded—and already meets the activity definition of MemoryAdmissionOperation.
      explanations:
        zh: 仅当实例满足子类种差“候选项在任何 MemoryRecord 产生前被明确拒绝，并记录拒绝依据。”且已满足 MemoryAdmissionOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the candidate is explicitly rejected before any MemoryRecord is produced and the rejection basis is recorded—and already meets the activity definition of MemoryAdmissionOperation.
        ja: instanceがchild differentia「MemoryRecord生成前にcandidateを明示rejectしrejection basisを記録するため成立します。」を満たし、かつ MemoryAdmissionOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-discard-004
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryDiscard-is_a-MemoryAdmissionOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆准入操作正例
        en: "Positive case: is a memory admission operation"
        ja: 記憶受入操作の一種正例
      scenario_id: MemoryDiscard-is_a-MemoryAdmissionOperation:positive:20260716
      descriptions:
        zh: discard-72 发现 item-72 与同一命名空间中的现有事实完全重复，记录 duplicate 原因并在持久化前拒绝候选。
        en: discard-72 finds item-72 duplicates an existing fact in the namespace, records the duplicate reason, and rejects the candidate before persistence.
        ja: discard-72 は item-72 が namespace 内の既存 fact と重複すると判定し、duplicate 理由を記録して永続化前に拒否します。
      field_values: {}
      related_node_ids:
        - MemoryDiscard
        - MemoryAdmissionOperation
      related_relation_ids:
        - MemoryDiscard-is_a-MemoryAdmissionOperation
      expected_result:
        zh: 将 discard-72 归为 MemoryDiscard，并确认该准入尝试不创建任何 MemoryRecord。
        en: Classify discard-72 as MemoryDiscard and confirm that this admission attempt creates no MemoryRecord.
        ja: discard-72 を MemoryDiscard に分類し、この admission attempt が MemoryRecord を作らないことを確認します。
      why_valid_or_invalid:
        zh: 对象仍是未持久化候选，结果是有理由的 reject 且没有输出记录，精确满足丢弃而非删除的边界。
        en: The object is still an unpersisted candidate, the outcome is a reasoned reject, and no record is emitted, exactly matching discard rather than deletion.
        ja: object は未永続化候補のままで、結果は理由付き reject、出力 record なしのため delete ではなく discard に一致します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-discard-004
    - id: MemoryDiscard-is_a-MemoryAdmissionOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆准入操作边界例
        en: "Boundary case: is a memory admission operation"
        ja: 記憶受入操作の一種境界例
      scenario_id: MemoryDiscard-is_a-MemoryAdmissionOperation:boundary:20260716
      descriptions:
        zh: delete-72 根据用户遗忘请求使已经持久化的 record-72 失效，并留下最小化 tombstone。
        en: delete-72 invalidates persisted record-72 under a user-forget request and leaves a minimized tombstone.
        ja: delete-72 は user-forget request により永続済み record-72 を invalidation し、最小化 tombstone を残します。
      field_values: {}
      related_node_ids:
        - MemoryDiscard
        - MemoryAdmissionOperation
      related_relation_ids:
        - MemoryDiscard-is_a-MemoryAdmissionOperation
      expected_result:
        zh: 拒绝把 delete-72 放入 MemoryDiscard；它属于现有记录的 MemoryDelete 处置活动。
        en: Reject MemoryDiscard classification for delete-72; it is a MemoryDelete disposition over an existing record.
        ja: delete-72 の MemoryDiscard 分類を拒否し、既存 record への MemoryDelete disposition とします。
      why_valid_or_invalid:
        zh: 删除发生在持久化之后并改变记录有效性，丢弃发生在持久化之前；两者不能因最终都减少可用记忆而混同。
        en: Deletion occurs after persistence and changes record validity, whereas discard occurs before persistence; reduced available memory does not make them equivalent.
        ja: delete は永続化後に record validity を変え、discard は永続化前に起きるため、利用可能 memory が減る点だけでは同一化できません。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-discard-004
  source_claims:
    - claim-memory-discard-004
  distinct_fact_rationale: null
