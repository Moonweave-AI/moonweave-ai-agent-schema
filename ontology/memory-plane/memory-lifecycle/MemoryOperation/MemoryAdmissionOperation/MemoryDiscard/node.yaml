        related_node_ids:
          - MemoryDiscard
          - MemoryWrite
        related_relation_ids:
          - MemoryDiscard-prevents-MemoryWrite
        expected_result:
          zh: 建立 discard-72 prevents planned-write-72，并确认 attempt-9 不产生任何持久记录或成功写入结果。
          en: Assert discard-72 prevents planned-write-72 and confirm that attempt-9 emits neither a persistent record nor a successful write result.
