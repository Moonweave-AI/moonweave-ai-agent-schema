          en: "Boundary case: consumes rejected memory item"
          ja: rejectされたmemory itemを消費する境界例
        scenario_id: MemoryDiscard-consumes-MemoryItem:boundary:20260716
        descriptions:
          zh: item-73 由同一批次采集，但 discard-72 未引用它；item-73 随后由 write-73 接受并持久化。
          en: item-73 was collected in the same batch but is not referenced by discard-72; write-73 later accepts and persists it.
          ja: item-73 は同 batch 由来ですが discard-72 は参照せず、後に write-73 が accept し persist します。
        field_values: {}
        related_node_ids:
          - MemoryDiscard
          - MemoryItem
        related_relation_ids:
          - MemoryDiscard-consumes-MemoryItem
        expected_result:
          zh: 拒绝 discard-72 consumes item-73；把 item-73 保留为 write-73 的候选输入。
          en: Reject discard-72 consumes item-73 and keep item-73 as the candidate input of write-73.
          ja: discard-72 consumes item-73 を拒否し item-73 を write-73 の candidate input として保持します。
        why_valid_or_invalid:
          zh: 同批处理不是同一活动输入；错误连接会让已接受候选同时表现为被拒绝。
          en: Batch co-membership is not activity input identity; the false edge would make an accepted candidate appear simultaneously rejected.
          ja: batch co-membership は activity input identity ではなく、false edge は accepted candidate を同時 rejected に見せます。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
