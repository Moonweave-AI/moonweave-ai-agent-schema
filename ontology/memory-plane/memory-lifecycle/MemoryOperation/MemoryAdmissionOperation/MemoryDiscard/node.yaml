schema: moonweave.ai/ontology-node/v1
id: MemoryDiscard
kind: concept
labels:
  zh: 记忆丢弃
  en: Memory discard
  ja: 記憶破棄
semantics:
  short_definition:
    zh: 准入阶段拒绝候选项且不产生持久记录。
    en: Admission rejection of a candidate without creating a persistent record.
    ja: admission 段階で候補を reject し persistent record を作らない。
  definition:
    zh: MemoryDiscard 是 MemoryAdmissionOperation：在策略、同意或质量检查失败时拒绝 MemoryItem，不产生 MemoryRecord。与 MemoryDelete 不同，丢弃针对尚无持久身份的候选项，而非撤销既有记录。
    en: MemoryDiscard is a MemoryAdmissionOperation that rejects a MemoryItem when policy, consent, or quality checks fail, producing no MemoryRecord. Unlike MemoryDelete, discard targets candidates without persistent identity rather than revoking existing records.
    ja: MemoryDiscard は policy/consent/quality 失敗で MemoryItem を reject し MemoryRecord を作らない MemoryAdmissionOperation。MemoryDelete と異なり未 persist 候補が対象。
  why_needed:
    zh: 若把拒绝与删除混同，审计无法区分“从未写入”与“已删除的有效记忆”。
    en: Conflating rejection with deletion makes audit unable to distinguish never persisted from deleted valid memory.
    ja: reject と delete を混同すると「未書込」と「削除済有効記憶」を監査で区別できない。
  includes:
    - zh: 纳入策略拒绝、同意不足、质量不达标与重复候选项的丢弃。
      en: Includes discard for policy rejection, insufficient consent, quality failure, and duplicate candidates.
      ja: policy reject/consent 不足/quality 不合格/重複候補の discard。
  excludes:
    - zh: 排除删除既有 record、TTL 到期与容量驱逐。
      en: Excludes deleting existing records, TTL expiry, and capacity eviction.
      ja: 既存 record 削除/TTL/capacity eviction を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 POST /v1/memories/ 在策略层被拦截或 deduplicate 判定为重复时不应产生 record；Moonweave 登记 discard_operation_id、reject_reason 与 candidate_item_id，不创建 tombstone。
    en: When Mem0 POST /v1/memories/ is blocked by policy or deduplication marks a duplicate, no record should be created; Moonweave records discard_operation_id, reject_reason, and candidate_item_id without a tombstone.
    ja: Mem0 POST が policy/dedup で阻止された場合 record なし。discard_operation_id/reject_reason/candidate_item_id を記録、tombstone なし。
  typical_input:
    - description: Rejected candidate
      format: |
        {"discard_operation_id": "discard-89", "candidate_item_id": "item-89", "reject_reason": "insufficient_consent"}
      source_claims: [claim-memory-discard-design]
  typical_output:
    - description: Discard outcome without record
      format: |
        {"admission_decision": "reject", "output_record_id": null}
      source_claims: [claim-memory-discard-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Admission may reject or skip duplicate candidates before persistence.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Agent may decline to insert low-value passages.
structure:
  identity_keys: [discard_operation_id]
  fields:
    - id: discard_operation_id
      labels: {zh: 丢弃操作标识, en: Discard operation identifier, ja: 破棄操作識別子}
      definitions:
        zh: 标识一次准入拒绝活动。
        en: Identifies one admission-rejection activity.
        ja: 一 admission reject activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: discard-89
      allowed_values: []
      source_claims: [claim-memory-discard-id]
    - id: reject_reason
      labels: {zh: 拒绝原因, en: Reject reason, ja: 拒否理由}
      definitions:
        zh: 结构化拒绝依据，如 insufficient_consent、policy_block、quality_fail。
        en: Structured rejection basis such as insufficient_consent, policy_block, quality_fail.
        ja: insufficient_consent/policy_block/quality_fail 等 structured reject basis。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: insufficient_consent
      allowed_values: []
      source_claims: [claim-memory-discard-reason]
  constraints: []
  required_relations: []
examples:
  - id: MemoryDiscard-example-consent
    labels: {zh: 同意不足丢弃, en: Insufficient consent discard, ja: consent 不足 discard}
    descriptions:
      zh: discard-89 因 consent_scope 不含 durable_memory 拒绝 item-89，无 output_record_id。
      en: discard-89 rejects item-89 because consent_scope excludes durable_memory; no output_record_id.
      ja: consent_scope 不足で item-89 reject。output_record_id なし。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: policy}
    field_values: {discard_operation_id: discard-89, reject_reason: insufficient_consent}
    related_node_ids: [MemoryDiscard, MemoryAdmissionOperation]
    related_relation_ids: []
    source_claims: [claim-memory-discard-design]
  - id: MemoryDiscard-example-policy
    labels: {zh: 策略拦截, en: Policy block, ja: 方針 block}
    descriptions:
      zh: discard-90 因 PII 检测命中 policy_block 拒绝写入，Mem0 POST 未调用。
      en: discard-90 rejects write due to PII policy_block; Mem0 POST is never called.
      ja: PII policy_block で discard-90。Mem0 POST 未呼出。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: admission gate}
    field_values: {discard_operation_id: discard-90, reject_reason: policy_block}
    related_node_ids: [MemoryDiscard]
    related_relation_ids: []
    source_claims: [claim-memory-discard-mem0, claim-memory-discard-design]
  - id: MemoryDiscard-example-not-delete
    labels: {zh: 丢弃非删除, en: Discard is not delete, ja: discard は delete ではない}
    descriptions:
      zh: delete-310 消费 record-310-v2 并产生 tombstone；discard-89 从未产生 record。
      en: delete-310 consumes record-310-v2 and produces tombstone; discard-89 never created a record.
      ja: delete は tombstone、discard は record 未生成。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryDiscard, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-memory-discard-design]
  - id: MemoryDiscard-example-quality
    labels: {zh: 质量不达标, en: Quality failure, ja: quality 不合格}
    descriptions:
      zh: discard-91 因 embedding 置信度低于阈值拒绝 item-91。
      en: discard-91 rejects item-91 because embedding confidence is below threshold.
      ja: embedding 信頼度不足で discard-91。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: quality gate}
    field_values: {discard_operation_id: discard-91, reject_reason: quality_fail}
    related_node_ids: [MemoryDiscard, MemoryValidation]
    related_relation_ids: []
    source_claims: [claim-memory-discard-design]
parent_relation:
  id: MemoryDiscard-is_a-MemoryAdmissionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆准入操作, en: is a memory admission operation, ja: 記憶受入操作の一種}
  definitions:
    zh: MemoryDiscard —is_a→ MemoryAdmissionOperation 表示候选项被拒绝且未产生初始 MemoryRecord。
    en: MemoryDiscard —is_a→ MemoryAdmissionOperation holds because the candidate is rejected and no initial MemoryRecord is produced.
    ja: 候補 reject で initial MemoryRecord 未生成のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryDiscard-is_a-MemoryAdmissionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when admission decision is reject and no MemoryRecord is produced.
      explanations:
        zh: 仅当准入决策为拒绝且未产生 MemoryRecord 时成立。
        en: Assert only when admission decision is reject and no MemoryRecord is produced.
        ja: admission reject で MemoryRecord 未生成の時のみ。
      source_claims: [claim-memory-discard-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-memory-discard-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-discard
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Admission may skip persistence for rejected candidates.
  - id: src-discard-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Discard distinct from delete and write.
source_claims:
  - id: claim-memory-discard-mem0
    source: src-mem0-discard
    supports: Mem0 admission may reject candidates before creating memories.
    locator: Add memory flow
    evidence_kind: primary-api
    confidence: high
  - id: claim-memory-discard-design
    source: src-discard-design
    supports: MemoryDiscard rejects candidates without producing records or tombstones.
    locator: MemoryDiscard boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-discard-id
    source: src-discard-design
    supports: discard_operation_id identifies one rejection activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-memory-discard-reason
    source: src-discard-design
    supports: reject_reason records structured admission rejection basis.
    locator: structure
    evidence_kind: design-inference
    confidence: high
