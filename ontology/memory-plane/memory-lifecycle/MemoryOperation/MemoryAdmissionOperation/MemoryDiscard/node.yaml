      en: This edge identifies the candidate representation actually consumed by discard, not record deletion, the candidate's final status, or policy governance.
      ja: この辺は破棄が実際に消費した候補表現を識別し、レコード削除、候補の最終状態、ポリシー統治を表すものではありません。
