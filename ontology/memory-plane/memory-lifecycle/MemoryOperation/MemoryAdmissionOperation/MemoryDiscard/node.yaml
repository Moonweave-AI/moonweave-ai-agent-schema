    definitions:
      zh: MemoryDiscard —prevents→ MemoryWrite 表示对同一候选和同一准入尝试的拒绝决定使对应写入不得执行。
      en: MemoryDiscard —prevents→ MemoryWrite means a rejection for the same candidate and admission attempt makes the corresponding write ineligible to execute.
