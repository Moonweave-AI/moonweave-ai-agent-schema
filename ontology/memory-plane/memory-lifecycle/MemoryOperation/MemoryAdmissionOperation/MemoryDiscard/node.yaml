          en: Assert discard-72 consumes item-72, identifying it as the candidate actually evaluated and terminated by this rejection decision.
          ja: discard-72 consumes item-72 を確立し rejection decision が実際に評価・終了した candidate とします。
        why_valid_or_invalid:
