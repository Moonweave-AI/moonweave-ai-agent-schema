  - id: MemoryDiscard-prevents-MemoryWrite
    predicate: prevents
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 阻止候选写入
      en: prevents candidate write
      ja: 候補書込みを防ぐ
    definitions:
      zh: MemoryDiscard —prevents→ MemoryWrite 表示针对同一候选快照的 discard 裁决使该准入尝试不得进入初始写入分支；它不永久禁止后续具有新证据的独立尝试。
      en: MemoryDiscard —prevents→ MemoryWrite means a discard verdict for the same candidate snapshot keeps that admission attempt out of the initial write branch; it does not permanently prohibit a later independent attempt with new evidence.
      ja: MemoryDiscard —prevents→ MemoryWrite は、同じ候補スナップショットへの discard 判定がその受入試行を初期書込み分岐へ進ませないことを表します。新しい証跡を持つ後続の独立試行を永久禁止するものではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 阻止关系按候选快照和具体准入尝试判定，不为所有未来写入施加统一基数或全局禁令。
      en: Prevention is decided per candidate snapshot and concrete admission attempt, not as a global ban or uniform cardinality for all future writes.
      ja: 防止は候補スナップショットと具体的な受入試行ごとに決まり、すべての将来書込みへの全体禁止や一律基数ではありません。
    inverse_reading:
      predicate: is_prevented_by_discard
      labels:
        zh: 被丢弃操作阻止
        en: is prevented by discard operation
        ja: 破棄操作により阻止される
    conditions:
      - id: MemoryDiscard-prevents-MemoryWrite-same-attempt
        severity: error
        expression_language: plain
        expression: "Assert only when the prospective write uses the same candidate_manifest_digest and admission operation identity, and the discard verdict occurs before any write commit."
        explanation:
          zh: 相同内容或历史拒绝不足以阻止新尝试；必须证明是同一候选快照、同一尝试且写入尚未提交。
          en: Similar content or a historic rejection is insufficient to prevent a new attempt; the same candidate snapshot, same attempt, and uncommitted write must be shown.
          ja: 類似内容や過去の拒否だけでは新しい試行を阻止できません。同じ候補スナップショット、同じ試行、未コミット書込みを示す必要があります。
        source_claims:
          - claim-memory-discard-decision
          - claim-memory-discard-candidate
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryDiscard-prevents-MemoryWrite-example-positive

        labels:
          zh: 丢弃阻止同一尝试的初始写入
          en: Discard prevents initial write for same attempt
          ja: 破棄が同一試行の初期書込みを防ぐ

        descriptions:
          zh: mem-op-discard-1101 在提交前对 candidate-item-1101 作出 discard；同一候选摘要的 planned-write-1101 因此被取消。
          en: mem-op-discard-1101 makes discard for candidate-item-1101 before commit, so planned-write-1101 with the same candidate digest is cancelled.
          ja: mem-op-discard-1101 はコミット前に candidate-item-1101 へ discard を行うため、同じ候補ダイジェストを持つ planned-write-1101 は取消されます。
        field_values:
          discard_operation_id: mem-op-discard-1101
          prospective_write_id: planned-write-1101
          candidate_manifest_digest: sha256:f615cc3ae6209744b0a986a0258b3c059a77e68f8942de4cecfb748ffb240fff
          admission_operation_id: mem-op-discard-1101
          discarded_at: "2026-07-18T15:10:00.020Z"
          write_committed: false
        related_node_ids:
          - MemoryDiscard
          - MemoryWrite
        related_relation_ids:
          - MemoryDiscard-prevents-MemoryWrite

        source_claims:
          - claim-memory-discard-decision
          - claim-memory-discard-candidate
      - id: MemoryDiscard-prevents-MemoryWrite-example-boundary-new-consent

        labels:
          zh: 新同意的独立尝试不被旧丢弃永久阻止
          en: New-consent attempt is not permanently blocked by old discard
          ja: 新同意の試行は古い破棄に永久阻止されない

        descriptions:
          zh: mem-op-discard-1208 因缺少同意拒绝旧快照；次日 candidate-item-1208-reconsented 具有新同意、不同摘要和新准入操作。
          en: mem-op-discard-1208 rejects an old snapshot for missing consent; the next day candidate-item-1208-reconsented has new consent, a different digest, and a new admission operation.
          ja: mem-op-discard-1208 は同意不足で旧スナップショットを拒否します。翌日、candidate-item-1208-reconsented は新しい同意、異なるダイジェスト、新しい受入操作を持ちます。
        field_values:
          discard_operation_id: mem-op-discard-1208
          old_candidate_manifest_digest: sha256:3bbb61da4367d42b4a68a53db083a145c645b0c8e8b998b3f25d5ecde3886aab
          new_candidate_manifest_digest: sha256:761d0d397e819cf475a706b7b1c33b1d9b0f93e69fe25db4f4e8ea0357bc88b5
          old_admission_operation_id: mem-op-discard-1208
          new_admission_operation_id: mem-op-admit-1209
          consent_status: renewed
        related_node_ids:
          - MemoryDiscard
          - MemoryWrite
          - MemoryAdmissionOperation
        related_relation_ids:
          - MemoryDiscard-prevents-MemoryWrite
          - MemoryWrite-is_a-MemoryAdmissionOperation

        source_claims:
          - claim-memory-discard-decision
          - claim-memory-discard-candidate
    source_claims:
      - claim-memory-discard-decision
      - claim-memory-discard-candidate
    distinct_fact_rationale:
      zh: 此边表达一个具体拒绝裁决对同一准入尝试写入分支的阻止，不表达全局内容禁令或已提交记录的删除。
      en: This edge expresses a concrete rejection verdict blocking the write branch of the same admission attempt, not a global content ban or deletion of a committed record.
      ja: この辺は具体的拒否判定が同じ受入試行の書込み分岐を阻止することを表し、全体的な内容禁止やコミット済みレコードの削除を表すものではありません。
    layout_role: cross-link
    target: concept:MemoryWrite
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities and entities as distinct and distinguishes used input from generated output.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents structured policy evaluation and explicit decisions over input.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 digests for binding candidate and evidence snapshots.
  - id: langgraph-memory
    title: LangGraph long-term memory guide
    source_type: official-doc
    url: https://docs.langchain.com/oss/python/langgraph/add-memory
    relevance: Documents durable memory storage that can be guarded by application-level admission decisions.
source_claims:
  - id: claim-memory-discard-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity that occurs from an Entity it uses or generates. Moonweave models discard as an executed admission activity rather than candidate content, a log message, or an unexecuted recommendation.
    locator: "PROV-O sections 3.1 Activity and 3.2 Entity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-discard-identity
    source: w3c-prov-o
    supports: PROV-O permits independently identifying an activity and related provenance records. Moonweave keeps one inherited operation_id for the discard activity, result, and audit timeline.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-discard-candidate
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from an entity generated by it. Moonweave consumes a frozen candidate representation for discard and does not create a persistent MemoryRecord for that candidate.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-discard-decision
    source: open-policy-agent
    supports: Open Policy Agent evaluates rules over structured input and yields decisions from those evaluations. Moonweave records one explicit discard verdict and a comparable rejection reason for the frozen candidate input.
    locator: "Open Policy Agent policy language overview and rule evaluation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-discard-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size message digests. Moonweave stores separate SHA-256 digests for the candidate snapshot and the evidence supporting the rejection reason.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-discard-evidence
    source: open-policy-agent
    supports: Policy evaluation separates the rule decision from the structured facts used to evaluate it. Moonweave retains a minimal evidence digest so a rejection reason can be reviewed without recasting candidate content as a persistent record.
    locator: "Open Policy Agent input data and policy evaluation model"
    evidence_kind: ontology-design-inference
    confidence: medium
