    en: is a memory admission operation
    ja: 記憶受入操作の一種である
  definitions:
    zh: MemoryDiscard —is_a→ MemoryAdmissionOperation 表示该活动满足准入操作的一般边界，并以 discard 作为唯一裁决，且候选在任何持久 MemoryRecord 创建前被拒绝。
    en: MemoryDiscard —is_a→ MemoryAdmissionOperation means the activity meets the general admission-operation boundary, has discard as its single verdict, and rejects the candidate before any persistent MemoryRecord is created.
    ja: MemoryDiscard —is_a→ MemoryAdmissionOperation は、活動が一般的な受入操作境界を満たし、唯一の判定として discard を持ち、永続 MemoryRecord が作成される前に候補を拒否することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次运行中可产生多少次候选拒绝。
    en: The classification relation expresses type membership and does not limit the number of candidate rejections in one run.
    ja: 分類関係は型メンバーシップを表し、一実行中の候補拒否数を制限しません。
