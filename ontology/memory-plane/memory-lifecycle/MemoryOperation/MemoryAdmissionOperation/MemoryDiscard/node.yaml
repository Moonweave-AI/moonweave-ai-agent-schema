        labels:
          zh: 同批次邻近候选项不是被丢弃输入
          en: Same-batch neighbor is not discarded input
          ja: 同一バッチの隣接候補は破棄入力ではない

        descriptions:
          zh: candidate-item-1102 与 candidate-item-1101 来自同一批次，但不在 mem-op-discard-1101 的冻结清单中，后续由另一操作接受。
          en: candidate-item-1102 arrives in the same batch as candidate-item-1101 but is absent from mem-op-discard-1101's frozen manifest and is later accepted by another operation.
          ja: candidate-item-1102 は candidate-item-1101 と同じバッチで到着しますが、mem-op-discard-1101 の凍結マニフェストに存在せず、後に別操作で受け入れられます。
