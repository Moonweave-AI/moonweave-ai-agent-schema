        scenario_id: MemoryDiscard-consumes-MemoryItem:positive:20260716
        descriptions:
          zh: discard-72 的 candidate_item_id=item-72，outcome=reject，reason=duplicate-of-record-18，且没有生成输出记录。
          en: discard-72 names candidate_item_id=item-72, outcome=reject, reason=duplicate-of-record-18, and generates no output record.
