          en: Candidate identity, reject outcome, and reason bind the same admission attempt, proving item-72 is the direct object of discard.
          ja: candidate identity・reject outcome・reason は同 admission attempt を bind し item-72 が discard の direct object と証明します。
        synthetic: false
