schema: moonweave.ai/ontology-node/v1
id: MemoryOperationResult
kind: concept
status: review
labels:
  zh: 记忆操作结果
  en: Memory operation result
  ja: 記憶操作結果
semantics:
  short_definition:
    zh: 记录一次 MemoryOperation 的完成状态、输出引用与错误信息。
    en: Information recording one MemoryOperation's completion status, output references, and errors.
    ja: 一MemoryOperationのcompletion status・output reference・errorを記録するinformationです。
  definition:
    zh: MemoryOperationResult 是附属于一个 MemoryOperation 的信息对象，记录成功、失败或部分完成以及相关记录引用；它不是产生该结果的活动。
    en: MemoryOperationResult is an information object attached to one MemoryOperation that records success, failure, or partial completion and related record references. It is not the activity that produced it.
    ja: MemoryOperationResult は一MemoryOperationに付属しsuccess・failure・partial completionとrelated record referenceを記録するinformation objectで、生成activity自体ではありません。
  why_needed:
    zh: 分离可重复查询的结果文档和具有时间延展的执行活动。
    en: Separates queryable result information from temporally extended execution activity.
    ja: query可能result informationと時間延展execution activityを分けます。
  includes:
    - zh: 纳入状态、完成时间、输出记录引用和错误事件引用。
      en: Includes status, completion time, output-record references, and error-event references.
      ja: status・completion time・output-record reference・error-event referenceを含みます。
  excludes:
    - zh: 排除操作本身、审计事件流和持久记忆内容。
      en: Excludes the operation itself, the audit-event stream, and persistent memory content.
      ja: operation自体・audit-event stream・persistent memory contentを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - result_id
  fields:
    - id: result_id
      labels:
        zh: 结果标识
        en: result ID
        ja: result ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一份操作完成结果。
        en: Identifies one operation-completion result.
        ja: 一operation-completion resultを識別します。
      allowed_values: []
      pattern: null
      example_value: result-2041
      source_claims:
        - claim-memory-operation-result-002
    - id: outcome
      labels:
        zh: 结果状态
        en: outcome
        ja: 結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录成功、失败或部分完成。
        en: Records success, failure, or partial completion.
        ja: success・failure・partial completionを記録します。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-memory-operation-result-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryOperationResult-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆操作结果正例
      en: "Positive case: Memory operation result"
      ja: 記憶操作結果正例
    scenario_id: null
    descriptions:
      zh: result-2041 记录 write-310 成功并引用 record-310-v1。
      en: result-2041 records that write-310 succeeded and references record-310-v1.
      ja: result-2041 はwrite-310成功を記録しrecord-310-v1を参照します。
    field_values:
      result_id: result-2041
      outcome: success
    related_node_ids:
      - MemoryOperationResult
    related_relation_ids: []
    expected_result:
      zh: 归类为 MemoryOperationResult，并作为 MemoryOperation 的组成信息。
      en: Classify as MemoryOperationResult and compositional information of MemoryOperation.
      ja: MemoryOperationResultに分類しMemoryOperationのcomposition informationとします。
    why_valid_or_invalid:
      zh: 对象只陈述活动结果，不执行写入。
      en: The object only states the activity outcome and does not perform the write.
      ja: objectはactivity outcomeを述べるだけでwriteを実行しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-operation-result-001
  - id: MemoryOperationResult-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆操作结果边界例
      en: "Boundary case: Memory operation result"
      ja: 記憶操作結果境界例
    scenario_id: null
    descriptions:
      zh: write-310 从候选项创建持久记录并持续 120 毫秒。
      en: write-310 creates a persistent record from a candidate over 120 milliseconds.
      ja: write-310 は120msかけcandidateからpersistent recordを作ります。
    field_values: {}
    related_node_ids:
      - MemoryOperationResult
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryOperationResult。
      en: Do not classify as MemoryOperationResult.
      ja: MemoryOperationResultに分類しません。
    why_valid_or_invalid:
      zh: 这是具有执行过程的活动，而不是其结果信息。
      en: This is an activity with an execution interval, not its result information.
      ja: execution intervalを持つactivityでresult informationではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-operation-result-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryOperation-has_result-MemoryOperationResult
  predicate: has_result
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有操作结果
    en: has operation result
    ja: operation resultを持つ
  definitions:
    zh: MemoryOperation —has_result→ MemoryOperationResult 把一次活动连接到陈述其完成状态的结果信息；结果不是活动子类。
    en: MemoryOperation —has_result→ MemoryOperationResult links one activity to information stating its completion outcome; the result is not an activity subtype.
    ja: MemoryOperation —has_result→ MemoryOperationResult は一activityをcompletion outcome情報へ結びresultをactivity subtypeにしません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_has_result
    labels:
      zh: 反向读取
      en: inverse has operation result
      ja: 逆方向読取
  conditions:
    - id: MemoryOperation-has_result-MemoryOperationResult-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when result.operation_id equals the operation identity and the result records that execution's final or partial state.
      explanations:
        zh: 仅当 result.operation_id 等于该操作身份且结果记录该次执行的最终或部分状态时成立。
        en: Assert only when result.operation_id equals the operation identity and the result records that execution's final or partial state.
        ja: result.operation_idがoperation identityと一致しそのexecutionのfinal/partial stateを記録する時だけassertします。
      source_claims:
        - claim-memory-operation-result-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryOperation-has_result-MemoryOperationResult-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 具有操作结果正例
        en: "Positive case: has operation result"
        ja: operation resultを持つ正例
      scenario_id: MemoryOperation-has_result-MemoryOperationResult:positive:20260716
      descriptions:
        zh: write-310 完成后生成 result-310；result.operation_id=write-310，outcome=success，并列出新记录 record-310-v1。
        en: After write-310 completes, result-310 records operation_id=write-310, outcome=success, and output record record-310-v1.
        ja: write-310 完了後 result-310 は operation_id=write-310、outcome=success、output record-310-v1 を記録します。
      field_values: {}
      related_node_ids:
        - MemoryOperation
        - MemoryOperationResult
      related_relation_ids:
        - MemoryOperation-has_result-MemoryOperationResult
      expected_result:
        zh: 把 result-310 作为 write-310 的 MemoryOperationResult 连接，并允许从操作直接查询该次执行的完成状态。
        en: Attach result-310 to write-310 as its MemoryOperationResult so the execution outcome is directly queryable from the operation.
        ja: result-310 を write-310 の MemoryOperationResult として接続し、operation から execution outcome を直接照会可能にします。
      why_valid_or_invalid:
        zh: 结果显式复述同一 operation_id 并记录该执行的最终状态与输出，活动和结果信息拥有不同但相互绑定的身份。
        en: The result explicitly repeats the same operation_id and records that execution's final state and output, binding distinct activity and information identities.
        ja: result は同じ operation_id と execution final state/output を記録し、別 identity の activity と information を正しく bind します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-operation-result-001
    - id: MemoryOperation-has_result-MemoryOperationResult-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 具有操作结果边界例
        en: "Boundary case: has operation result"
        ja: operation resultを持つ境界例
      scenario_id: MemoryOperation-has_result-MemoryOperationResult:boundary:20260716
      descriptions:
        zh: result-999 虽同样是 success 且时间接近，却记录 operation_id=write-999，不包含 write-310 的任何输出。
        en: result-999 is also successful and nearby in time, but its operation_id is write-999 and it contains none of write-310's outputs.
        ja: result-999 も success で時刻は近いですが operation_id=write-999 で write-310 の output を含みません。
      field_values: {}
      related_node_ids:
        - MemoryOperation
        - MemoryOperationResult
      related_relation_ids:
        - MemoryOperation-has_result-MemoryOperationResult
      expected_result:
        zh: 拒绝在 write-310 与 result-999 之间建立 has_result；继续按 operation_id 将结果归给 write-999。
        en: Reject has_result between write-310 and result-999 and keep the result attached to write-999 by operation identity.
        ja: write-310 と result-999 の has_result を拒否し operation identity により write-999 へ接続します。
      why_valid_or_invalid:
        zh: 结果类型和时间邻近不能替代执行身份相等，否则多个并发操作的结果会被错误组合到同一节点。
        en: Matching result type and temporal proximity cannot replace execution identity, or concurrent operations would acquire each other's results.
        ja: result type と時間近接は execution identity を代替できず、そうすると concurrent operation の result が誤って混ざります。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-operation-result-001
  source_claims:
    - claim-memory-operation-result-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations:
  - id: MemoryOperationResult-references-MemoryRecord
    predicate: references
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用记忆记录
      en: references memory record
      ja: memory recordを参照する
    definitions:
      zh: MemoryOperationResult —references→ MemoryRecord 表示结果信息明确列出作为输入、输出或受影响对象的记录身份。
      en: MemoryOperationResult —references→ MemoryRecord means the result information explicitly lists a record as an input, output, or affected object.
      ja: MemoryOperationResult —references→ MemoryRecord はresult informationがinput・output・affected objectとしてrecord identityを明示列挙することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_references
      labels:
        zh: 反向读取
        en: inverse references memory record
        ja: 逆方向読取
    conditions:
      - id: MemoryOperationResult-references-MemoryRecord-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when the result's input_record_ids, output_record_ids, or affected_record_ids contains the record ID.
        explanations:
          zh: 仅当 result 的 input_record_ids、output_record_ids 或 affected_record_ids 包含该 record_id 时成立。
          en: Assert only when the result's input_record_ids, output_record_ids, or affected_record_ids contains the record ID.
          ja: resultのinput/output/affected_record_idsにrecord IDが含まれる時だけassertします。
        source_claims:
          - claim-memory-operation-result-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperationResult-references-MemoryRecord-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 引用记忆记录正例
          en: "Positive case: references memory record"
          ja: memory recordを参照する正例
        scenario_id: MemoryOperationResult-references-MemoryRecord:positive:20260716
        descriptions:
          zh: result-512 的 input_record_ids 包含 record-512-v1，output_record_ids 包含 record-512-v2，并记录两者在更新中的角色。
          en: result-512 lists record-512-v1 in input_record_ids and record-512-v2 in output_record_ids, with each role identified for the update.
          ja: result-512 は input_record_ids に record-512-v1、output_record_ids に record-512-v2 を列挙し update 内 role を示します。
        field_values: {}
        related_node_ids:
          - MemoryOperationResult
          - MemoryRecord
        related_relation_ids:
          - MemoryOperationResult-references-MemoryRecord
        expected_result:
          zh: 分别建立 result-512 references 两个记录，使结果信息能直接定位所用前驱与生成后继。
          en: Attach references from result-512 to both records so the result directly identifies the predecessor used and successor generated.
          ja: result-512 から両 record への references を確立し predecessor used と successor generated を直接特定します。
        why_valid_or_invalid:
          zh: 记录 ID 明确出现在结果的角色化列表中，信息对象确实引用而非仅与记录共享命名空间。
          en: Each record ID appears in a role-bearing result list, proving an explicit information reference rather than namespace co-membership.
          ja: 各 record ID は role-bearing result list に現れ、namespace co-membership ではなく explicit information reference を証明します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-result-001
      - id: MemoryOperationResult-references-MemoryRecord-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 引用记忆记录边界例
          en: "Boundary case: references memory record"
          ja: memory recordを参照する境界例
        scenario_id: MemoryOperationResult-references-MemoryRecord:boundary:20260716
        descriptions:
          zh: record-512-v3 与结果属于同一用户命名空间，但未出现在 input、output 或 affected_record_ids 任一列表。
          en: record-512-v3 shares the user's namespace but appears in none of result-512's input, output, or affected record lists.
          ja: record-512-v3 は user namespace を共有しますが result-512 の input/output/affected list のどれにもありません。
        field_values: {}
        related_node_ids:
          - MemoryOperationResult
          - MemoryRecord
        related_relation_ids:
          - MemoryOperationResult-references-MemoryRecord
        expected_result:
          zh: 拒绝 result-512 references record-512-v3；只有结果载荷中的显式记录身份才能建立此边。
          en: Reject result-512 references record-512-v3; require explicit record identity in the result payload for this edge.
          ja: result-512 references record-512-v3 を拒否し、edge には result payload 内の explicit record identity を要求します。
        why_valid_or_invalid:
          zh: 命名空间相关性不能证明结果提及该记录，否则一次操作结果会无界引用同一用户的全部记忆。
          en: Namespace relatedness does not prove result reference, or one operation result would unboundedly reference every memory of the user.
          ja: namespace relatedness は result reference を証明せず、そうでなければ一 operation result が user の全 memory を無制限参照します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-result-001
    source_claims:
      - claim-memory-operation-result-001
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:MemoryRecord
  - id: MemoryOperationResult-records-ErrorEvent
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录错误事件
      en: records error event
      ja: error eventを記録する
    definitions:
      zh: MemoryOperationResult —records→ ErrorEvent 表示失败或部分完成结果保存了导致或描述该结果的错误事件引用。
      en: MemoryOperationResult —records→ ErrorEvent means a failed or partial result stores a reference to the error event causing or describing that outcome.
      ja: MemoryOperationResult —records→ ErrorEvent はfailure/partial resultがoutcomeを引き起こす/説明するerror event参照を保存することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_records
      labels:
        zh: 反向读取
        en: inverse records error event
        ja: 逆方向読取
    conditions:
      - id: MemoryOperationResult-records-ErrorEvent-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when outcome is failure or partial and result.error_event_ids explicitly contains the ErrorEvent.
        explanations:
          zh: 仅当 outcome 为 failure 或 partial，且 result.error_event_ids 明确包含该 ErrorEvent 时成立。
          en: Assert only when outcome is failure or partial and result.error_event_ids explicitly contains the ErrorEvent.
          ja: outcomeがfailure/partialでresult.error_event_idsがErrorEventを明示含む時だけassertします。
        source_claims:
          - claim-memory-operation-result-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperationResult-records-ErrorEvent-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 记录错误事件正例
          en: "Positive case: records error event"
          ja: error eventを記録する正例
        scenario_id: MemoryOperationResult-records-ErrorEvent:positive:20260716
        descriptions:
          zh: result-920 的 outcome=partial，error_event_ids 包含 error-920；该事件记录 compaction 保真检查在安全约束处失败。
          en: result-920 has outcome=partial and error_event_ids containing error-920, which records failure of the compaction fidelity check on a safety constraint.
          ja: result-920 は outcome=partial で error_event_ids に error-920 を含み、compaction fidelity check の safety constraint failure を記録します。
        field_values: {}
        related_node_ids:
          - MemoryOperationResult
          - ErrorEvent
        related_relation_ids:
          - MemoryOperationResult-records-ErrorEvent
        expected_result:
          zh: 建立 result-920 records error-920，使部分完成状态可以追溯到具体失败事件和检查项。
          en: Assert result-920 records error-920 so the partial outcome is traceable to the specific failure event and check.
          ja: result-920 records error-920 を確立し partial outcome を specific failure event/check へ追跡可能にします。
        why_valid_or_invalid:
          zh: 结果状态允许错误引用且载荷显式列出该事件，错误也确实解释了该操作结果。
          en: The result state permits an error reference, its payload explicitly lists the event, and that event explains the operation outcome.
          ja: result state は error reference を許し payload は event を明示列挙し、その event が operation outcome を説明します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-result-001
      - id: MemoryOperationResult-records-ErrorEvent-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 记录错误事件边界例
          en: "Boundary case: records error event"
          ja: error eventを記録する境界例
        scenario_id: MemoryOperationResult-records-ErrorEvent:boundary:20260716
        descriptions:
          zh: result-310 的 outcome=success 且 error_event_ids 为空；同一 trace 中的 error-999 属于另一个检索活动。
          en: result-310 has outcome=success and an empty error_event_ids list; error-999 in the same trace belongs to a different retrieval activity.
          ja: result-310 は outcome=success で error_event_ids は空、同 trace の error-999 は別 retrieval activity に属します。
        field_values: {}
        related_node_ids:
          - MemoryOperationResult
          - ErrorEvent
        related_relation_ids:
          - MemoryOperationResult-records-ErrorEvent
        expected_result:
          zh: 拒绝 result-310 records error-999；保持成功结果无错误引用，并把事件留给其真实操作。
          en: Reject result-310 records error-999, leave the successful result without an error reference, and keep the event with its actual operation.
          ja: result-310 records error-999 を拒否し success result は error reference なし、event は actual operation に保持します。
        why_valid_or_invalid:
          zh: 共享追踪上下文不能越过结果载荷与 outcome 条件，否则无关失败会污染成功操作的结果语义。
          en: Shared trace context cannot override result payload and outcome conditions, or unrelated failures would contaminate successful operation semantics.
          ja: shared trace context は result payload/outcome condition を越えられず、無関係 failure が success operation semantics を汚染します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-operation-result-001
    source_claims:
      - claim-memory-operation-result-001
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:ErrorEvent
