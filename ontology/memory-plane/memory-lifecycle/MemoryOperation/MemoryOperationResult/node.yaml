schema: moonweave.ai/ontology-node/v1
id: MemoryOperationResult
kind: concept
labels:
  zh: 记忆操作结果
  en: Memory operation result
  ja: 記憶操作結果
semantics:
  short_definition:
    zh: 一次 MemoryOperation 的完成状态与输出引用。
    en: Completion status and output references for one MemoryOperation.
    ja: 一 MemoryOperation の完了状態と output 参照。
  definition:
    zh: MemoryOperationResult 是附属于 MemoryOperation 的信息对象，记录 success、failure 或 partial 状态及 output_record_ids、tombstone_id、error_ref。它不是产生该结果的活动，也不是 MemoryAuditEvent 时间线中的单点事件。
    en: MemoryOperationResult is an information object attached to MemoryOperation recording success, failure, or partial status plus output_record_ids, tombstone_id, and error_ref. It is neither the activity that produced it nor a single point on the MemoryAuditEvent timeline.
    ja: MemoryOperationResult は success/failure/partial と output_record_ids/tombstone_id/error_ref を記録する information object。activity でも audit event 単点でもない。
  why_needed:
    zh: 可重复查询的结果文档必须与具有时间延展的执行活动分离。
    en: Queryable result documents must stay separate from temporally extended execution activity.
    ja: query 可能 result document は時間延展 activity と分離必須。
  includes:
    - zh: 纳入 status、completed_at、output_record_refs 与 error_event_refs。
      en: Includes status, completed_at, output_record_refs, and error_event_refs.
      ja: status/completed_at/output_record_refs/error_event_refs。
  excludes:
    - zh: 排除操作活动、审计事件流与持久记忆正文。
      en: Excludes the operation activity, audit event stream, and persistent memory content.
      ja: operation activity/audit stream/persistent content を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Mem0 POST/PUT/DELETE 响应中的 memory_id 与 message 映射到 result_status 与 external_memory_id；Letta 工具返回与 LangGraph put/delete 结果同样汇总为 result 对象，operation_id 必须一致。
    en: Mem0 POST/PUT/DELETE response memory_id and message map to result_status and external_memory_id; Letta tool returns and LangGraph put/delete outcomes aggregate into result objects with matching operation_id.
    ja: Mem0 応答 memory_id/message を result_status/external_memory_id へ。Letta/LangGraph 結果も result に集約。
  typical_input:
    - description: Operation completion signal
      format: |
        {"operation_id": "write-310", "api_response_status": 200}
      source_claims: [claim-result-design]
  typical_output:
    - description: Operation result record
      format: |
        {
          "result_id": "result-310",
          "operation_id": "write-310",
          "status": "success",
          "output_record_ids": ["record-310-v1"]
        }
      source_claims: [claim-result-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: API responses for add/update/delete operations.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: put/delete operation outcomes.
structure:
  identity_keys: [result_id]
  fields:
    - id: result_id
      labels: {zh: 结果标识, en: Result identifier, ja: 結果識別子}
      definitions:
        zh: 稳定标识一次操作结果文档。
        en: Stable identifier for one operation result document.
        ja: 一 operation result document を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: result-310
      allowed_values: []
      source_claims: [claim-result-id]
    - id: operation_id
      labels: {zh: 操作标识, en: Operation identifier, ja: 操作識別子}
      definitions:
        zh: 所属 MemoryOperation 的 operation_id。
        en: operation_id of the owning MemoryOperation.
        ja: 所属 MemoryOperation の operation_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: write-310
      allowed_values: []
      source_claims: [claim-result-operation]
    - id: status
      labels: {zh: 完成状态, en: Completion status, ja: 完了状態}
      definitions:
        zh: success、failure 或 partial。
        en: success, failure, or partial.
        ja: success/failure/partial。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: []
      source_claims: [claim-result-status]
  constraints: []
  required_relations: []
examples:
  - id: MemoryOperationResult-example-mem0-write
    labels: {zh: Mem0 写入成功结果, en: Mem0 write success result, ja: Mem0 書込成功 result}
    descriptions:
      zh: result-310 记录 write-310 status=success，output_record_ids 含 record-310-v1，external_memory_id=mem0-8f3c2a1b。
      en: result-310 records write-310 status=success with output_record_ids including record-310-v1 and external_memory_id=mem0-8f3c2a1b.
      ja: result-310 が write-310 success と record-310-v1 を記録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: POST /v1/memories/}
    field_values: {result_id: result-310, operation_id: write-310, status: success}
    related_node_ids: [MemoryOperationResult, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-result-mem0, claim-result-design]
  - id: MemoryOperationResult-example-delete
    labels: {zh: 删除成功结果, en: Delete success result, ja: 削除成功 result}
    descriptions:
      zh: result-310-del 记录 delete-310 status=success，tombstone_id=tombstone-310。
      en: result-310-del records delete-310 status=success with tombstone_id=tombstone-310.
      ja: delete-310 成功と tombstone-310 を result-310-del が記録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: "DELETE /v1/memories/{id}/"}
    field_values: {result_id: result-310-del, status: success, tombstone_id: tombstone-310}
    related_node_ids: [MemoryOperationResult, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-result-mem0, claim-result-design]
  - id: MemoryOperationResult-example-failed
    labels: {zh: 驱逐失败结果, en: Failed eviction result, ja: eviction 失敗 result}
    descriptions:
      zh: result-902 记录 evict-902 status=failed，error_ref 指向 Redis volatile-ttl 失败诊断。
      en: result-902 records evict-902 status=failed with error_ref pointing to Redis volatile-ttl failure diagnostics.
      ja: evict-902 failed を result-902 が記録。
    example_source: {product: Redis, url: https://redis.io/docs/reference/eviction/, version: failure}
    field_values: {result_id: result-902, status: failed}
    related_node_ids: [MemoryOperationResult, MemoryEviction]
    related_relation_ids: []
    source_claims: [claim-result-design]
  - id: MemoryOperationResult-example-not-running
    labels: {zh: 非进行中状态, en: Not in-progress state, ja: 進行中状態ではない}
    descriptions:
      zh: write-312 status=running、progress_pct=0.6 无 committed_at，不是 completed MemoryOperationResult。
      en: write-312 status=running, progress_pct=0.6 without committed_at is not a completed MemoryOperationResult.
      ja: running/progress のみでは completed MemoryOperationResult ではない。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryOperationResult, MemoryOperation]
    related_relation_ids: []
    source_claims: [claim-result-design]
parent_relation:
  id: MemoryOperation-has_result-MemoryOperationResult
  predicate: has_result
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有操作结果
    en: has operation result
    ja: operation result を持つ
  definitions:
    zh: MemoryOperation —has_result→ MemoryOperationResult 把活动连接到陈述完成状态的结果信息。
    en: MemoryOperation —has_result→ MemoryOperationResult links an activity to information stating completion outcome.
    ja: MemoryOperation —has_result→ MemoryOperationResult は activity を completion outcome 情報へ接続。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse has_result, ja: 逆方向読取}}
  conditions:
    - id: MemoryOperation-has_result-MemoryOperationResult-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when result.operation_id equals the operation identity and records final or partial state.
      explanations:
        zh: 仅当 result.operation_id 等于操作身份且记录最终或部分状态时成立。
        en: Assert only when result.operation_id equals the operation identity and records final or partial state.
        ja: result.operation_id 一致と final/partial state 記録時のみ。
      source_claims: [claim-result-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-result-design]
relations: []
sources:
  - id: src-mem0-result
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: API responses for lifecycle operations.
  - id: src-result-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Results distinct from operations and audit events.
source_claims:
  - id: claim-result-mem0
    source: src-mem0-result
    supports: Mem0 API responses indicate success or failure of lifecycle mutations.
    locator: Memory API responses
    evidence_kind: primary-api
    confidence: high
  - id: claim-result-design
    source: src-result-design
    supports: MemoryOperationResult summarizes completion outcome separate from the activity.
    locator: MemoryOperationResult boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-result-id
    source: src-result-design
    supports: result_id identifies one result document.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-result-operation
    source: src-result-design
    supports: operation_id links result to its MemoryOperation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-result-status
    source: src-result-design
    supports: status records success, failure, or partial completion.
    locator: structure
    evidence_kind: design-inference
    confidence: high
