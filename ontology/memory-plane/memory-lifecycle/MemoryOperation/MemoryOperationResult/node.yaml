schema: moonweave.ai/ontology-node/v1
id: MemoryOperationResult
kind: concept
status: accepted
labels:
  zh: 记忆操作结果
  en: Memory operation result
  ja: 記憶操作結果
semantics:
  short_definition:
    zh: 对一次已结束或已部分结束的记忆操作执行情况、汇总输出和诊断引用进行固定记录的信息对象。
    en: An information object that fixes one finished or partially finished memory operation's execution outcome, summarized outputs, and diagnostic references.
    ja: 一つの終了または部分終了した記憶操作の実行結果、要約出力、診断参照を固定して記録する情報オブジェクトです。
  definition:
    zh: MemoryOperationResult 是附属于一个精确 MemoryOperation 的不可变结果信息。它记录该操作的终态或部分终态、完成时间、受影响记录的显式角色引用、结果证据摘要以及可选诊断引用。它不是执行活动本身，不替代每个阶段的 MemoryAuditEvent，也不是 MemoryRecord 内容、策略定义、未完成的进度快照或任意同一追踪中的日志事件。结果可以汇总失败或部分完成，但与之关联的 ObservabilityEvent 仍须以独立的结构化事件事实表达。
    en: MemoryOperationResult is immutable result information attached to one exact MemoryOperation. It records that operation's terminal or partial terminal outcome, completion time, explicit role-bearing references to affected records, result evidence digest, and optional diagnostic reference. It is not the executing activity, does not replace per-phase MemoryAuditEvent facts, and is not MemoryRecord content, a policy definition, an unfinished progress snapshot, or an arbitrary log event in the same trace. A result can summarize failure or partial completion, but a related ObservabilityEvent still has to be expressed as an independent structured event fact.
    ja: MemoryOperationResult は一つの正確な MemoryOperation に付属する不変の結果情報です。その操作の終端または部分終端の結果、完了時刻、影響を受けたレコードへの明示的な役割付き参照、結果証跡ダイジェスト、任意の診断参照を記録します。実行活動そのものではなく、段階ごとの MemoryAuditEvent 事実を置き換えず、MemoryRecord 内容、ポリシー定義、未完了の進捗スナップショット、同一トレース内の任意ログイベントでもありません。結果は失敗または部分完了を要約できますが、関連する ObservabilityEvent は依然として独立した構造化イベント事実として表現する必要があります。
  why_needed:
    zh: 执行活动、阶段事件和最终摘要具有不同的身份与查询用途；把它们合并会使重放、审计、并发关联和错误诊断不可靠。
    en: Execution activity, phase events, and terminal summary have different identities and query purposes; merging them makes replay, audit, concurrent attribution, and failure diagnosis unreliable.
    ja: 実行活動、段階イベント、終端要約は異なる識別と照会用途を持ちます。それらを統合すると、再実行、監査、並行帰属、失敗診断が信頼できなくなります。
  includes:
    - zh: 已结束或部分结束操作的结果标识、精确操作引用、终态、完成时间、显式记录角色引用、结果摘要和与失败或部分完成关联的诊断事件引用。
      en: Result identity, exact operation reference, terminal outcome, completion time, explicit record-role references, result digest, and diagnostic-event reference for a finished or partially finished operation.
      ja: 終了または部分終了した操作の結果識別、正確な操作参照、終端結果、完了時刻、明示的レコード役割参照、結果ダイジェスト、失敗または部分完了に関連する診断イベント参照を含みます。
  excludes:
    - zh: 仍在运行的操作、操作本身、单个开始或提交审计事件、任意记录正文、未来操作计划、仅有状态码且没有操作归属的响应，以及来自另一操作的相近时间事件。
      en: A still-running operation, the operation itself, one start or commit audit event, arbitrary record body, a future operation plan, a response containing only a status code without operation attribution, and a nearby-time event from another operation.
      ja: まだ実行中の操作、操作そのもの、一つの開始またはコミット監査イベント、任意のレコード本文、将来操作計画、操作帰属なしの状態コードだけを持つ応答、別操作からの近接時刻イベントを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 将结果实现为操作完成后写入的一份不可变、可查询摘要：必须回指确切操作，固定终态、完成时刻、角色化记录引用和结果摘要。详细过程留在审计事件，结构化故障说明留在独立可观测事件；不要以同一 trace 或相近时间把另一次操作的结果或诊断合并进来。
    en: "Implement a result as one immutable, queryable summary written after operation completion: it must point back to the exact operation and fix terminal outcome, completion time, role-bearing record references, and result digest. Keep detailed process in audit events and structured failure description in an independent observability event; do not merge another operation's result or diagnostic merely because trace or time is nearby."
    ja: 結果は操作完了後に書き込む一つの不変で照会可能な要約として実装します。正確な操作を指し、終端結果、完了時刻、役割付きレコード参照、結果ダイジェストを固定しなければなりません。詳細な過程は監査イベントに、構造化された失敗説明は独立可観測イベントに残します。同じトレースまたは近接時刻だけを理由に別操作の結果や診断を結合してはいけません。
  typical_input:
    - description: A finished or partially finished operation identity, terminal status, completion time, role-bearing record references, result payload, and optional diagnostic event reference.
      format: "{result_id, operation_ref, outcome, completed_at, record_reference_entries, result_digest, diagnostic_event_ref?}"
  typical_output:
    - description: An immutable result information object linked to the operation, referenced records, and optionally a structured observability event.
      format: "{result_id, operation_ref, outcome, completed_at, result_digest, record_reference_entries?, diagnostic_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, entities, generation, invalidation, and provenance associations.
    - name: RFC 9457 Problem Details for HTTP APIs
      url: https://www.rfc-editor.org/rfc/rfc9457.html
      description: Defines machine-readable problem detail with status, type, occurrence identity, and structured extensions.
    - name: OpenTelemetry Logs Data Model
      url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
      description: Documents independently structured log and event records with timestamps, event names, attributes, and optional trace context.
  source_claims:
    - claim-memory-operation-result-information-boundary
    - claim-memory-operation-result-outcome
    - claim-memory-operation-result-observability-event
structure:
  identity_keys:
    - result_id
  fields:
    - id: result_id
      labels:
        zh: 结果标识
        en: result ID
        ja: 結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份独立结果信息，不能与其操作标识、审计事件标识或诊断事件标识混用。
        en: Stably identifies one independent result information object and cannot be conflated with its operation, audit-event, or diagnostic-event identity.
        ja: 一つの独立した結果情報オブジェクトを安定して識別し、その操作、監査イベント、診断イベント識別と混同できません。
      allowed_values: []
      pattern: '^mem-result-[a-z0-9][a-z0-9-]*$'
      example_value: mem-result-write-310
      source_claims:
        - claim-memory-operation-result-identity
    - id: operation_ref
      labels:
        zh: 操作引用
        en: operation reference
        ja: 操作参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用这份结果实际汇总的精确 MemoryOperation；同一主体、命名空间、追踪或相近完成时间不能替代该引用。
        en: References the exact MemoryOperation that this result actually summarizes; same actor, namespace, trace, or nearby completion time cannot substitute for this reference.
        ja: この結果が実際に要約する正確な MemoryOperation を参照します。同じ主体、名前空間、トレース、近接完了時刻ではこの参照を代替できません。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-write-310
      source_claims:
        - claim-memory-operation-result-operation-attribution
    - id: outcome
      labels:
        zh: 结果状态
        en: outcome
        ja: 結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该操作的终态或部分终态，不描述仍在运行中的进度，也不以自由文本代替状态语义。
        en: Records the operation's terminal or partial terminal outcome and does not describe still-running progress or replace status semantics with free text.
        ja: 操作の終端または部分終端の結果を記録し、まだ実行中の進捗を表したり、自由テキストで状態意味を置き換えたりしません。
      allowed_values:
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-operation-result-outcome
    - id: completed_at
      labels:
        zh: 结果完成时间
        en: completed at
        ja: 結果完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该结果所总结的终态或部分终态实际形成的事件时间，不能以请求接收、日志摄取或未来重试计划时间代替。
        en: Records the event time at which the terminal or partial terminal outcome summarized by this result actually forms and cannot be replaced by request receipt, log-ingestion, or future retry-plan time.
        ja: この結果が要約する終端または部分終端結果が実際に形成されたイベント時刻を記録します。要求受信、ログ取込み、将来再試行計画時刻では代替できません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T23:30:00.128Z"
      source_claims:
        - claim-memory-operation-result-temporal
    - id: record_reference_entries
      labels:
        zh: 记录角色引用条目
        en: record role-reference entries
        ja: レコード役割参照エントリ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 显式列出结果中提及的记录及其 input、output 或 affected 角色；同一命名空间中的其他记录不会因邻近而自动被引用。
        en: Explicitly lists records mentioned in the result with input, output, or affected role; other records in the same namespace are not automatically referenced by proximity.
        ja: 結果で言及されるレコードを input、output、affected の役割付きで明示的に列挙します。同じ名前空間の他レコードは近接性だけで自動参照されません。
      allowed_values: []
      pattern: '^(input|output|affected):record-[A-Za-z0-9._-]+$'
      example_value:
        - output:record-310-v1
      source_claims:
        - claim-memory-operation-result-record-reference
    - id: result_digest
      labels:
        zh: 结果摘要
        en: result digest
        ja: 結果ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定 outcome、完成时间、角色化记录引用、输出计数和诊断引用的摘要，支持验证结果而不将每个审计事件折叠进结果对象。
        en: Fixes a digest of outcome, completion time, role-bearing record references, output count, and diagnostic reference to verify result without collapsing every audit event into the result object.
        ja: outcome、完了時刻、役割付きレコード参照、出力数、診断参照のダイジェストを固定し、すべての監査イベントを結果オブジェクトに折り畳まずに結果を検証します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:ec6653bbcff2a6f522835ac7ca8f0e11d009fbe0de0eaa5e0fad44a083d81677
      source_claims:
        - claim-memory-operation-result-digest
    - id: diagnostic_event_ref
      labels:
        zh: 诊断事件引用
        en: diagnostic event reference
        ja: 診断イベント参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 对失败或部分完成结果，可选引用解释该次执行的独立结构化 ObservabilityEvent；它不把结果对象变成日志记录或 OTel 信号。
        en: For a failed or partially succeeded result, optionally references an independent structured ObservabilityEvent that explains this execution; it does not turn the result object into a log record or OTel signal.
        ja: 失敗または部分成功の結果では、この実行を説明する独立した構造化 ObservabilityEvent を任意に参照できます。結果オブジェクトをログレコードまたは OTel シグナルにはしません。
      allowed_values: []
      pattern: '^obs-event-[A-Za-z0-9._-]+$'
      example_value: obs-event-compaction-920
      source_claims:
        - claim-memory-operation-result-observability-event
  constraints:
    - id: MemoryOperationResult-operation-attribution-consistency
      expression: "operation_ref identifies the one MemoryOperation summarized by result_id; matching actor, namespace, trace context, or nearby time alone cannot attach a result to an operation."
      explanation:
        zh: 并发操作可能共享主体或追踪；必须用精确操作身份防止结果被交叉归属。
        en: Concurrent operations can share actor or trace, so exact operation identity is required to prevent cross-attribution of results.
        ja: 並行操作は主体またはトレースを共有し得るため、結果の交差帰属を防ぐには正確な操作識別が必要です。
      source_claims:
        - claim-memory-operation-result-operation-attribution
    - id: MemoryOperationResult-terminal-outcome-and-time
      expression: "outcome is one of succeeded, failed, partially_succeeded, rejected, or cancelled; completed_at is on or after the parent operation started_at, and a terminal parent operation has ended_at on or after completed_at."
      explanation:
        zh: 结果只能总结已形成的终态或部分终态，不能用作运行中进度或未来重试承诺。
        en: A result can summarize only an outcome already formed and cannot be used as running progress or a promise of future retry.
        ja: 結果はすでに形成された結果だけを要約でき、実行中進捗または将来再試行の約束として使えません。
      source_claims:
        - claim-memory-operation-result-outcome
        - claim-memory-operation-result-temporal
    - id: MemoryOperationResult-explicit-record-reference
      expression: "Each record_reference_entries value uses role:record-id syntax and appears in result_digest; a record merely sharing namespace, user, or trace with operation_ref is not referenced by this result."
      explanation:
        zh: 结果的记录关系必须来自显式角色条目，避免一个操作结果无边界地引用同一上下文的全部记忆。
        en: Result-to-record linkage must come from explicit role entries, preventing one operation result from unboundedly referencing every memory in the same context.
        ja: 結果からレコードへのリンクは明示的役割エントリから来なければならず、一つの操作結果が同じ文脈のすべての記憶を無制限に参照することを防ぎます。
      source_claims:
        - claim-memory-operation-result-record-reference
        - claim-memory-operation-result-digest
    - id: MemoryOperationResult-diagnostic-boundary
      expression: "diagnostic_event_ref may be present only when outcome is failed or partially_succeeded and must identify an independent ObservabilityEvent that names the event, subjects this result or operation, and provides execution-specific diagnostic evidence."
      explanation:
        zh: 失败摘要和诊断事件可以相互引用，但一个任意日志、同一追踪事件或成功结果不能被错误并入该诊断关系。
        en: Failure summary and diagnostic event can reference one another, but an arbitrary log, same-trace event, or successful result cannot be incorrectly folded into this diagnostic relation.
        ja: 失敗要約と診断イベントは相互参照できますが、任意ログ、同じトレースのイベント、成功結果をこの診断関係に誤って折り畳めません。
      source_claims:
        - claim-memory-operation-result-observability-event
    - id: MemoryOperationResult-summary-not-audit-timeline
      expression: "result_digest summarizes terminal outcome and referenced outputs but does not replace individual MemoryAuditEvent identities, phases, timestamps, or evidence digests for the operation timeline."
      explanation:
        zh: 结果摘要便于查询，但不能吞并开始、检查、提交或失败的阶段事实；这些仍必须保留为独立审计事件。
        en: Result summary supports querying but cannot absorb start, check, commit, or failure phase facts, which must remain independent audit events.
        ja: 結果要約は照会を支援しますが、開始、検査、コミット、失敗の段階事実を吸収できず、それらは独立監査イベントとして残らなければなりません。
      source_claims:
        - claim-memory-operation-result-information-boundary
  required_relation_constraints: []
examples:
  - id: MemoryOperationResult-example-positive-write-succeeded

    labels:
      zh: 写入成功结果
      en: Successful write result
      ja: 成功した書込み結果

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      result_id: mem-result-write-310
      operation_ref: mem-op-write-310
      outcome: succeeded
      completed_at: "2026-07-18T23:30:00.128Z"
      record_reference_entries:
        - output:record-310-v1
      result_digest: sha256:ec6653bbcff2a6f522835ac7ca8f0e11d009fbe0de0eaa5e0fad44a083d81677
      diagnostic_event_ref: absent
    related_node_ids:
      - MemoryOperationResult
      - MemoryOperation
      - MemoryWrite
      - MemoryRecord
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperationResult-references-MemoryRecord
      - MemoryWrite-is_a-MemoryAdmissionOperation
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-operation-result-information-boundary
      - claim-memory-operation-result-operation-attribution
      - claim-memory-operation-result-record-reference
  - id: MemoryOperationResult-example-counterexample-activity

    labels:
      zh: 执行活动不是结果对象
      en: Executing activity is not result object
      ja: 実行活動は結果オブジェクトではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-write-310
      operation_kind: admission
      status: succeeded
      started_at: "2026-07-18T23:30:00Z"
      ended_at: "2026-07-18T23:30:00.128Z"
      result_id: absent
      outcome: absent
      result_digest: absent
    related_node_ids:
      - MemoryOperationResult
      - MemoryOperation
      - MemoryWrite
    related_relation_ids:
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryWrite-is_a-MemoryAdmissionOperation

    source_claims:
      - claim-memory-operation-result-information-boundary
  - id: MemoryOperationResult-example-boundary-running-progress

    labels:
      zh: 运行中进度不是操作结果
      en: Running progress is not operation result
      ja: 実行中進捗は操作結果ではない

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      progress_id: progress-311
      operation_ref: mem-op-index-311
      runtime_status: running
      completed_percent: 57
      result_id: absent
      outcome: absent
      completed_at: absent
      result_digest: absent
    related_node_ids:
      - MemoryOperationResult
      - MemoryOperation
    related_relation_ids:
      - MemoryOperation-has_result-MemoryOperationResult

    source_claims:
      - claim-memory-operation-result-outcome
      - claim-memory-operation-result-temporal
  - id: MemoryOperationResult-example-instance-partial-diagnostic

    labels:
      zh: 部分完成并有关联诊断的实例
      en: Partial-completion instance with linked diagnostic
      ja: 関連診断を持つ部分成功インスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      result_id: mem-result-compact-920
      operation_ref: mem-op-compact-920
      outcome: partially_succeeded
      completed_at: "2026-07-18T23:40:00.212Z"
      record_reference_entries:
        - output:record-920-summary-v1
        - affected:record-920-source-v3
      result_digest: sha256:d64d6e0a2f8aaeab7176633f4ac6647b6d98c416b6f406f620fda960e4f4d671
      diagnostic_event_ref: obs-event-compaction-920
    related_node_ids:
      - MemoryOperationResult
      - MemoryOperation
      - MemoryRecord
      - ObservabilityEvent
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperationResult-references-MemoryRecord
      - MemoryOperationResult-records-ObservabilityEvent
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-operation-result-outcome
      - claim-memory-operation-result-record-reference
      - claim-memory-operation-result-observability-event
parent_relation:
  id: MemoryOperation-has_result-MemoryOperationResult
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有操作结果
    en: has operation result
    ja: 操作結果を持つ
  definitions:
    zh: MemoryOperation —has_result→ MemoryOperationResult 表示一次操作拥有由精确操作引用、终态和摘要证据归属的结果信息。
    en: MemoryOperation —has_result→ MemoryOperationResult means one operation has result information attributed by exact operation reference, terminal outcome, and summary evidence.
    ja: MemoryOperation —has_result→ MemoryOperationResult は、一つの操作が正確な操作参照、終端結果、要約証跡で帰属された結果情報を持つことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次操作可没有、拥有一个或因部分结果与最终结果而拥有多个结果信息，具体数量取决于结果保留策略。
    en: An operation may have zero, one, or multiple result information objects because of partial and final results; result-retention policy determines the count.
    ja: 一つの操作はゼロ、一つ、または部分結果と最終結果により複数の結果情報を持ち得て、結果保持ポリシーが数を決めます。
  inverse_reading:
    predicate: is_result_of
    labels:
      zh: 是记忆操作的结果
      en: is result of memory operation
      ja: 記憶操作の結果である
  conditions:
    - id: MemoryOperation-has_result-MemoryOperationResult-operation-match
      severity: error
      expression_language: plain
      expression: "Assert only when operation_ref identifies the parent operation, outcome is terminal or partial terminal, completed_at falls within the parent operation execution boundary, and result_digest summarizes that execution."
      explanation:
        zh: 同一主体、追踪或相近时间不足以绑定结果；结果必须明确回指父操作并由终态、时间和摘要证据支持。
        en: Shared actor, trace, or nearby time is insufficient to attach a result; it must explicitly point to parent operation and be supported by outcome, time, and summary evidence.
        ja: 共有主体、トレース、近接時刻では結果の結び付けに不十分です。親操作を明示的に指し、結果、時刻、要約証跡で支えられなければなりません。
      source_claims:
        - claim-memory-operation-result-operation-attribution
        - claim-memory-operation-result-outcome
        - claim-memory-operation-result-digest
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryOperation-has_result-MemoryOperationResult-example-positive

      labels:
        zh: 写入结果归属到写入操作
        en: Write result belongs to write operation
        ja: 書込み結果は書込み操作に属する

      descriptions:
        zh: mem-result-write-310 的 operation_ref=mem-op-write-310，记录 succeeded、完成时间、输出记录和结果摘要。
        en: mem-result-write-310 has operation_ref=mem-op-write-310 and records succeeded, completion time, output record, and result digest.
        ja: mem-result-write-310 は operation_ref=mem-op-write-310 を持ち、succeeded、完了時刻、出力レコード、結果ダイジェストを記録します。
      field_values:
        result_id: mem-result-write-310
        operation_ref: mem-op-write-310
        outcome: succeeded
        completed_at: "2026-07-18T23:30:00.128Z"
        record_reference_entries:
          - output:record-310-v1
        result_digest: sha256:ec6653bbcff2a6f522835ac7ca8f0e11d009fbe0de0eaa5e0fad44a083d81677
      related_node_ids:
        - MemoryOperation
        - MemoryOperationResult
      related_relation_ids:
        - MemoryOperation-has_result-MemoryOperationResult

      source_claims:
        - claim-memory-operation-result-operation-attribution
        - claim-memory-operation-result-outcome
        - claim-memory-operation-result-digest
    - id: MemoryOperation-has_result-MemoryOperationResult-example-boundary-shared-trace

      labels:
        zh: 共享追踪不证明结果归属
        en: Shared trace does not prove result attribution
        ja: 共有トレースは結果帰属を証明しない

      descriptions:
        zh: mem-result-index-311 与 mem-op-write-310 共享 trace-77，但 operation_ref=mem-op-index-311，记录的是索引操作的部分完成。
        en: mem-result-index-311 shares trace-77 with mem-op-write-310 but has operation_ref=mem-op-index-311 and records partial completion of an indexing operation.
        ja: mem-result-index-311 は mem-op-write-310 と trace-77 を共有しますが、operation_ref=mem-op-index-311 で、索引操作の部分完了を記録します。
      field_values:
        result_id: mem-result-index-311
        operation_ref: mem-op-index-311
        compared_operation_ref: mem-op-write-310
        trace_ref: trace-77
        outcome: partially_succeeded
        completed_at: "2026-07-18T23:31:00.073Z"
      related_node_ids:
        - MemoryOperation
        - MemoryOperationResult
      related_relation_ids:
        - MemoryOperation-has_result-MemoryOperationResult

      source_claims:
        - claim-memory-operation-result-operation-attribution
  source_claims:
    - claim-memory-operation-result-operation-attribution
    - claim-memory-operation-result-outcome
    - claim-memory-operation-result-digest
  distinct_fact_rationale:
    zh: 此组合关系表达结果信息对一个操作的归属，不表达操作执行、阶段审计、记录引用、诊断事件、策略治理或结果彼此的因果关系。
    en: This composition relation expresses result-information membership in one operation, not operation execution, phase audit, record reference, diagnostic event, policy governance, or causality among results.
    ja: この構成関係は一つの操作への結果情報所属を表し、操作実行、段階監査、レコード参照、診断イベント、ポリシー統治、結果間因果を表しません。
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: MemoryOperationResult-references-MemoryRecord
    predicate: references
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用记忆记录
      en: references memory record
      ja: 記憶レコードを参照する
    definitions:
      zh: MemoryOperationResult —references→ MemoryRecord 表示结果用 input、output 或 affected 的显式角色条目提及某一记录。
      en: MemoryOperationResult —references→ MemoryRecord means the result mentions a record through an explicit input, output, or affected role entry.
      ja: MemoryOperationResult —references→ MemoryRecord は、結果が明示的な input、output、または affected 役割エントリを通じてレコードに言及することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达每个结果中明确声明的记录提及，不对所有实现设定固定运行时基数。
      en: This relation expresses each explicitly declared record mention in a result and imposes no fixed runtime cardinality across implementations.
      ja: この関係は結果内で明示的に宣言された各レコード言及を表し、実装全体に固定ランタイム基数を課しません。
    inverse_reading:
      predicate: is_referenced_by_result
      labels:
        zh: 被操作结果引用
        en: is referenced by operation result
        ja: 操作結果により参照される
    conditions:
      - id: MemoryOperationResult-references-MemoryRecord-explicit-role-entry
        severity: error
        expression_language: plain
        expression: "Assert only when the relation target appears as an exact record ID in record_reference_entries with input, output, or affected role and result_digest covers the entry; same namespace, user, or trace is insufficient."
        explanation:
          zh: 关系必须来自结果载荷中的精确角色条目，防止将同一上下文的无关记录自动添加为结果引用。
          en: The relation must derive from an exact role entry in result payload, preventing unrelated records in the same context from being automatically added as result references.
          ja: 関係は結果ペイロード内の正確な役割エントリから導かれなければならず、同じ文脈の無関係レコードを結果参照として自動追加することを防ぎます。
        source_claims:
          - claim-memory-operation-result-record-reference
          - claim-memory-operation-result-digest
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperationResult-references-MemoryRecord-example-positive

        labels:
          zh: 结果显式引用输出记录
          en: Result explicitly references output record
          ja: 結果が出力レコードを明示参照する

        descriptions:
          zh: mem-result-write-310 的 record_reference_entries 含 output:record-310-v1，结果摘要覆盖该条目。
          en: mem-result-write-310 includes output:record-310-v1 in record_reference_entries and its result digest covers the entry.
          ja: mem-result-write-310 は record_reference_entries に output:record-310-v1 を含み、結果ダイジェストはそのエントリをカバーします。
        field_values:
          result_id: mem-result-write-310
          operation_ref: mem-op-write-310
          record_reference_entries:
            - output:record-310-v1
          result_digest: sha256:ec6653bbcff2a6f522835ac7ca8f0e11d009fbe0de0eaa5e0fad44a083d81677
        related_node_ids:
          - MemoryOperationResult
          - MemoryRecord
        related_relation_ids:
          - MemoryOperationResult-references-MemoryRecord

        source_claims:
          - claim-memory-operation-result-record-reference
          - claim-memory-operation-result-digest
      - id: MemoryOperationResult-references-MemoryRecord-example-boundary-same-namespace

        labels:
          zh: 同一命名空间不等于结果引用
          en: Same namespace is not result reference
          ja: 同じ名前空間は結果参照ではない

        descriptions:
          zh: record-310-v9 与 record-310-v1 属于同一用户命名空间，但未出现于 mem-result-write-310 的任何角色条目。
          en: record-310-v9 shares a user namespace with record-310-v1 but appears in no role entry of mem-result-write-310.
          ja: record-310-v9 は record-310-v1 と利用者名前空間を共有しますが、mem-result-write-310 の役割エントリに現れません。
        field_values:
          result_id: mem-result-write-310
          target_record_ref: record-310-v9
          shared_namespace: user-310
          record_reference_entries:
            - output:record-310-v1
        related_node_ids:
          - MemoryOperationResult
          - MemoryRecord
        related_relation_ids:
          - MemoryOperationResult-references-MemoryRecord

        source_claims:
          - claim-memory-operation-result-record-reference
    source_claims:
      - claim-memory-operation-result-record-reference
      - claim-memory-operation-result-digest
    distinct_fact_rationale:
      zh: 此关系表达结果信息对具体记录的显式内容引用，不表达操作对记录的实际修改、记录有效性、删除、审计事件或策略治理。
      en: This relation expresses an explicit content reference from result information to a concrete record; it does not express operation's actual modification of record, record validity, deletion, audit event, or policy governance.
      ja: この関係は結果情報から具体レコードへの明示的内容参照を表し、操作によるレコード実際変更、レコード有効性、削除、監査イベント、ポリシー統治を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:MemoryRecord
  - id: MemoryOperationResult-records-ObservabilityEvent
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 关联运行时可观测性事件
      en: records runtime observability event
      ja: 実行時可観測性イベントを記録する
    definitions:
      zh: MemoryOperationResult —records→ ObservabilityEvent 表示失败或部分完成结果关联一个独立的自定义运行时事件，该事件以结果或操作身份、命名事件和诊断证据说明该次执行。
      en: MemoryOperationResult —records→ ObservabilityEvent means a failed or partially succeeded result links an independent custom runtime event that explains that execution through result or operation identity, named event, and diagnostic evidence.
      ja: MemoryOperationResult —records→ ObservabilityEvent は、失敗または部分成功の結果が、結果または操作識別、命名イベント、診断証跡によりその実行を説明する独立カスタム実行時イベントをリンクすることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系表达每个结果与独立诊断事件之间的显式关联，不对所有实现设定固定运行时基数。
      en: This relation expresses explicit association between a result and an independent diagnostic event and imposes no fixed runtime cardinality across implementations.
      ja: この関係は結果と独立診断イベント間の明示的関連を表し、実装全体に固定ランタイム基数を課しません。
    inverse_reading:
      predicate: is_recorded_by_result
      labels:
        zh: 被操作结果关联
        en: is recorded by operation result
        ja: 操作結果により関連付けられる
    conditions:
      - id: MemoryOperationResult-records-ObservabilityEvent-failure-binding
        severity: error
        expression_language: plain
        expression: "Assert only when outcome is failed or partially_succeeded, diagnostic_event_ref matches the relation target, the independent event names its event_name and subjects this result or operation, and diagnostic evidence binds it to this execution; do not infer an OTel signal type."
        explanation:
          zh: 诊断关系必须同时有失败或部分完成结果、精确事件引用、主体绑定、命名事件和执行证据；共享追踪或相同文本不能替代。
          en: Diagnostic relation requires failed or partial outcome, exact event reference, subject binding, named event, and execution evidence; shared trace or matching text cannot substitute.
          ja: 診断関係には失敗または部分結果、正確なイベント参照、主体結合、命名イベント、実行証跡が必要です。共有トレースや一致テキストでは代替できません。
        source_claims:
          - claim-memory-operation-result-observability-event
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryOperationResult-records-ObservabilityEvent-example-positive

        labels:
          zh: 部分结果关联结构化诊断
          en: Partial result records structured diagnostic
          ja: 部分結果が構造化診断を記録する

        descriptions:
          zh: mem-result-compact-920 的 outcome=partially_succeeded，引用 obs-event-compaction-920；该事件命名保真度检查失败、回指该结果并含执行诊断证据。
          en: mem-result-compact-920 has outcome=partially_succeeded and references obs-event-compaction-920; that event names fidelity-check failure, points back to the result, and holds execution diagnostic evidence.
          ja: mem-result-compact-920 は outcome=partially_succeeded で obs-event-compaction-920 を参照します。そのイベントは保真度検査失敗を命名し、結果を指し返し、実行診断証跡を持ちます。
        field_values:
          result_id: mem-result-compact-920
          operation_ref: mem-op-compact-920
          outcome: partially_succeeded
          diagnostic_event_ref: obs-event-compaction-920
          diagnostic_event_subject_ref: mem-result-compact-920
          diagnostic_event_name: memory.compaction.fidelity_failed
          diagnostic_evidence_ref: evidence-compact-920
        related_node_ids:
          - MemoryOperationResult
          - ObservabilityEvent
        related_relation_ids:
          - MemoryOperationResult-records-ObservabilityEvent

        source_claims:
          - claim-memory-operation-result-observability-event
      - id: MemoryOperationResult-records-ObservabilityEvent-example-boundary-success-other-trace

        labels:
          zh: 成功结果不能接收无关事件
          en: Successful result cannot receive unrelated event
          ja: 成功結果は無関係イベントを受け取れない

        descriptions:
          zh: mem-result-write-310 为 succeeded；同一 trace 中 obs-event-index-311 属于另一次索引执行，且没有引用该结果。
          en: mem-result-write-310 is succeeded; obs-event-index-311 in the same trace belongs to another indexing execution and does not reference this result.
          ja: mem-result-write-310 は succeeded です。同じトレースの obs-event-index-311 は別の索引実行に属し、この結果を参照しません。
        field_values:
          result_id: mem-result-write-310
          outcome: succeeded
          candidate_event_ref: obs-event-index-311
          shared_trace_ref: trace-77
          candidate_event_subject_ref: mem-result-index-311
        related_node_ids:
          - MemoryOperationResult
          - ObservabilityEvent
        related_relation_ids:
          - MemoryOperationResult-records-ObservabilityEvent

        source_claims:
          - claim-memory-operation-result-observability-event
    source_claims:
      - claim-memory-operation-result-observability-event
    distinct_fact_rationale:
      zh: 此关系表达结果与独立诊断事件的显式信息关联，不表达结果状态本身、操作执行、审计阶段、OTel 信号类型、记录引用或策略治理。
      en: This relation expresses explicit information association between a result and an independent diagnostic event; it does not express outcome itself, operation execution, audit phase, OTel signal type, record reference, or policy governance.
      ja: この関係は結果と独立診断イベント間の明示的情報関連を表し、結果そのもの、操作実行、監査段階、OTel シグナル型、レコード参照、ポリシー統治を表しません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:ObservabilityEvent
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, agents, generation, invalidation, and provenance associations as distinct facts.
  - id: rfc-9457
    title: RFC 9457 Problem Details for HTTP APIs
    source_type: standard
    url: https://www.rfc-editor.org/rfc/rfc9457.html
    relevance: Defines machine-readable problem detail with occurrence identity, status, and structured extension data for failure reporting.
  - id: opentelemetry-logs-data-model
    title: OpenTelemetry Logs Data Model
    source_type: official-doc
    url: https://opentelemetry.io/docs/specs/otel/logs/data-model/
    relevance: Documents independent structured log and event records with timestamp, event name, attributes, and optional trace context.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests used to bind immutable result summaries.
source_claims:
  - id: claim-memory-operation-result-information-boundary
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from the Entity or information it generates and describes. Moonweave keeps a result information object separate from the MemoryOperation activity and from individual audit-event facts.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-identity
    source: w3c-prov-o
    supports: PROV-O permits independently identifiable entities and activities. Moonweave assigns a result ID distinct from operation, audit-event, and diagnostic-event identities.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-operation-attribution
    source: w3c-prov-o
    supports: PROV-O uses explicit associations between activities and related entities. Moonweave attaches result information only through exact operation reference, not through shared actor, namespace, trace, or nearby time.
    locator: "PROV-O activity and entity association model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-outcome
    source: rfc-9457
    supports: RFC 9457 defines machine-readable problem detail with occurrence identity, status, and structured extensions. Moonweave records explicit terminal or partial terminal outcome rather than using free text or a running-progress snapshot as result.
    locator: "RFC 9457 sections 3 and 3.1 status and instance members"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-temporal
    source: w3c-prov-o
    supports: PROV-O models activities as occurring over time and associates provenance facts with temporal information. Moonweave records completed_at only when summarized terminal or partial terminal outcome has formed.
    locator: "PROV-O Activity temporal model and qualified provenance"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-record-reference
    source: w3c-prov-o
    supports: PROV-O distinguishes entities used or generated by an activity. Moonweave records explicit input, output, or affected role references in result information and does not infer record reference from contextual proximity.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave uses a SHA-256 digest over outcome, completion time, record-role entries, output count, diagnostic reference, and result payload summary to bind immutable result information.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-operation-result-observability-event
    source: opentelemetry-logs-data-model
    supports: OpenTelemetry documents independent structured event and log records with timestamp, event name, attributes, and optional trace context. Moonweave links a failed or partial result to its own custom ObservabilityEvent only through explicit subject and diagnostic evidence and does not assert that the event is an OTel signal.
    locator: "OpenTelemetry Logs Data Model Log and Event Record fields"
    evidence_kind: ontology-design-inference
    confidence: high
