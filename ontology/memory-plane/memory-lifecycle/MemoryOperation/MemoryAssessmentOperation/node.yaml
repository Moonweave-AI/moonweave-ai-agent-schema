schema: moonweave.ai/ontology-node/v1
id: MemoryAssessmentOperation
kind: concept
status: accepted
labels:
  zh: 记忆评估操作
  en: Memory assessment operation
  ja: 記憶評価操作
semantics:
  short_definition:
    zh: 对既有记忆记录形成可审计适用性结论而不直接变更其内容或生命周期状态的操作。
    en: An operation that forms an auditable fitness conclusion about existing memory records without directly changing their content or lifecycle state.
    ja: 既存記憶レコードについて監査可能な適合性結論を形成し、内容またはライフサイクル状態を直接変更しない操作です。
  definition:
    zh: MemoryAssessmentOperation 是一种 MemoryOperation：它在冻结的目标记录和证据快照上检查来源、新鲜度、同意、安全或一致性，并记录通过、警告、失败、冲突或不确定的评估结论。它不创建后继记录、不改变有效性、不选择冲突解决方案，也不执行删除或保留处置。
    en: MemoryAssessmentOperation is a MemoryOperation that checks provenance, freshness, consent, safety, or consistency over frozen target-record and evidence snapshots and records a pass, warning, fail, conflict, or inconclusive conclusion. It creates no successor record, changes no validity, chooses no conflict resolution, and performs no deletion or retention disposition.
    ja: MemoryAssessmentOperation は、凍結された対象レコードおよび証跡スナップショットに対して provenance、freshness、consent、安全性、一貫性を検査し、pass、warning、fail、conflict、inconclusive の結論を記録する MemoryOperation です。後継レコードを作成せず、有効性を変更せず、競合解決を選択せず、削除または保持処分を実行しません。
  why_needed:
    zh: “发现或衡量问题”与“改写、解决或处置问题”是不同的可审计阶段；合并它们会掩盖因果和责任边界。
    en: Discovering or measuring a problem differs from rewriting, resolving, or disposing of it; collapsing them hides causal and responsibility boundaries.
    ja: 問題の発見または測定は、書換え、解決、処分とは異なる監査可能な段階であり、統合すると因果と責任の境界が隠れます。
  includes:
    - zh: 已执行的来源、新鲜度、同意、安全和一致性检查，以及仅报告冲突或风险的活动。
      en: Executed provenance, freshness, consent, safety, and consistency checks, including activities that only report a conflict or risk.
      ja: 実行済みの provenance、freshness、consent、安全性、一貫性の検査、および競合またはリスクだけを報告する活動を含みます。
  excludes:
    - zh: 内容修订、冲突解决决策、写入新版本、删除、过期、驱逐、策略定义，以及没有实际运行边界的仪表盘评分。
      en: Content revision, conflict-resolution decisions, writing a new version, deletion, expiration, eviction, policy definitions, and dashboard scores without an actual execution boundary.
      ja: 内容改訂、競合解決決定、新バージョン書込み、削除、期限切れ、追い出し、ポリシー定義、実際の実行境界を持たないダッシュボードスコアを除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将只读检查实现为有目标清单、证据快照和结论摘要的工作单元；评估输出可驱动后续活动，但不在同一步改变记录。
    en: Implement a read-only check as a work unit with target list, evidence snapshot, and conclusion digest; its output can drive a later activity but does not change records in the same step.
    ja: 読み取り専用検査を対象一覧、証跡スナップショット、結論ダイジェストを持つ作業単位として実装します。出力は後続活動を駆動できますが、同じ手順でレコードを変更しません。
  typical_input:
    - description: Existing target-record references, a frozen evidence manifest, evaluation scope, policy context, and executor identity.
      format: "{operation_id, target_record_refs, assessment_scope, evidence_manifest_digest, actor_ref, started_at}"
  typical_output:
    - description: A non-mutating conclusion with result evidence and optional downstream conflict signal.
      format: "{operation_id, assessment_verdict, assessment_result_digest, assessed_at, result_ref?, conflict_ref?}"
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents evaluation of policy rules over structured input without changing the input itself.
    - name: NIST AI Risk Management Framework
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
      description: Describes measuring and managing risks as distinct from selecting and implementing treatments.
  source_claims:
    - claim-memory-assessment-operation-activity
    - claim-memory-assessment-operation-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次评估的输入快照、结论、结果与审计。
        en: Reuses the stable MemoryOperation identity to join one assessment's input snapshot, conclusion, result, and audit evidence.
        ja: 親 MemoryOperation の安定識別子を再利用し、一つの評価の入力スナップショット、結論、結果、監査証跡を結びます。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-assess-1607
      source_claims:
        - claim-memory-assessment-operation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 assessment，表明该活动只对既有记忆及证据形成评估结论，而不改变记录。
        en: "Narrows the parent operation kind to assessment: it forms an assessment conclusion from existing memory and evidence without changing the record."
        ja: 親の操作種別を assessment に限定し、既存記憶と証跡から結論を作るだけでレコードを変更しないことを示します。
      allowed_values:
        - assessment
      pattern: null
      example_value: assessment
      source_claims:
        - claim-memory-assessment-operation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 表示评估活动是否正在执行、已完成或未能得出结论，而不是评估结论本身。
        en: States whether the assessment activity is running, completed, or failed to conclude; it is not the assessment verdict itself.
        ja: 評価結論そのものではなく、評価活動が実行中・完了・結論不能のいずれかを記録します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-assessment-operation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际开始读取目标记录和冻结证据的时间，而不是证据或记录的生成时间。
        en: Records when this assessment began reading target records and frozen evidence, not when those inputs were created.
        ja: 対象レコードと凍結証跡の読取りを実際に始めた時刻を記録し、入力の作成時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T20:00:00Z"
      source_claims:
        - claim-memory-assessment-operation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行此只读评估的主体，而不是被评估记录的所有者。
        en: References the actor that performs this read-only assessment, rather than the owner of the assessed record.
        ja: 評価対象レコードの所有者ではなく、この読み取り専用評価を実行する主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-assessment-worker-1
      source_claims:
        - claim-memory-assessment-operation-activity
    - id: target_record_refs
      labels:
        zh: 目标记录引用
        en: target record references
        ja: 対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次评估实际读取的既有 MemoryRecord；候选输入、未来输出或仅同批次的记录不能替代。
        en: Lists existing MemoryRecord instances actually read by this assessment; candidate inputs, future outputs, or merely same-batch records cannot substitute.
        ja: この評価が実際に読み取る既存 MemoryRecord を列挙します。候補入力、将来の出力、同一バッチにあるだけのレコードでは代替できません。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value:
        - record-1607-v1
      source_claims:
        - claim-memory-assessment-operation-target
    - id: assessment_scope
      labels:
        zh: 评估范围
        en: assessment scope
        ja: 評価範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次活动实际检查的质量或治理维度，而不是泛化的系统能力声明。
        en: Lists quality or governance dimensions actually checked by this activity, not a general system-capability claim.
        ja: 一般的なシステム能力の主張ではなく、この活動が実際に検査した品質またはガバナンス次元を列挙します。
      allowed_values:
        - provenance
        - freshness
        - consent
        - safety
        - consistency
        - policy_compliance
      pattern: null
      example_value:
        - freshness
        - consistency
      source_claims:
        - claim-memory-assessment-operation-scope
    - id: evidence_manifest_digest
      labels:
        zh: 评估证据摘要
        en: assessment evidence digest
        ja: 評価証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定支撑评估的记录版本、策略版本、来源与检查输出清单，避免结论从后来变化的事实重新推导。
        en: Fixes a manifest of record versions, policy versions, provenance, and check outputs supporting the assessment so the conclusion is not re-derived from later-changed facts.
        ja: 評価を支えるレコードバージョン、ポリシーバージョン、provenance、検査出力のマニフェストを固定し、後で変化した事実から結論を再導出しないようにします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:bf7f3c2d0f407c2dcd649f2391f3d3f3a75c031437d772ff1e7896a561d79b01
      source_claims:
        - claim-memory-assessment-operation-digest
    - id: assessment_verdict
      labels:
        zh: 评估结论
        en: assessment verdict
        ja: 評価結論
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录评估的非变更结论；结论报告状态或问题，而不选择解决策略或执行记录变更。
        en: Records the assessment's non-mutating conclusion; it reports state or concern without selecting remediation or executing record change.
        ja: 評価の非変更結論を記録します。修復策を選択したりレコード変更を実行したりせず、状態または懸念を報告します。
      allowed_values:
        - pass
        - warning
        - fail
        - conflict_detected
        - inconclusive
      pattern: null
      example_value: warning
      source_claims:
        - claim-memory-assessment-operation-conclusion
    - id: assessment_result_digest
      labels:
        zh: 评估结果摘要
        en: assessment result digest
        ja: 評価結果ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定所产生的检查结论和发现的摘要，使后续解决活动能够引用评估而不改写它。
        en: Fixes a digest of the produced conclusions and findings so a later resolution activity can reference the assessment without rewriting it.
        ja: 生成された結論と発見のダイジェストを固定し、後続の解決活動が評価を改変せずに参照できるようにします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:25fca479d3d0728bd2d3c9ac29db9e51bb658d3bdbad6f9102d2d3eb5ddc49dd
      source_claims:
        - claim-memory-assessment-operation-digest
    - id: assessed_at
      labels:
        zh: 评估完成时间
        en: assessed at
        ja: 評価完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次评估结论实际形成的时间，必须位于操作的执行区间内。
        en: Records when this assessment conclusion is actually formed and must lie within the operation execution interval.
        ja: この評価結論が実際に形成された時刻を記録し、操作実行区間内でなければなりません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T20:00:00.091Z"
      source_claims:
        - claim-memory-assessment-operation-activity
  constraints:
    - id: MemoryAssessmentOperation-parent-operation-envelope
      expression: "operation_kind = assessment and status, started_at, and actor_ref identify one executed non-mutating assessment activity."
      explanation:
        zh: 目标、证据和结论并不自动构成一次评估；必须能够归属到实际开始并由明确主体执行的只读活动。
        en: Targets, evidence, and a conclusion do not by themselves form an assessment; they must be attributable to an executed read-only activity.
        ja: 対象・証跡・結論だけでは評価にならず、実際に開始され明確な主体が実行した読み取り専用活動に帰属できなければなりません。
      source_claims:
        - claim-memory-assessment-operation-activity
    - id: MemoryAssessmentOperation-read-only-boundary
      expression: "The assessment reads target_record_refs and produces conclusion information only; it does not generate a successor MemoryRecord, change record lifecycle_state, emit a tombstone, or choose a conflict-resolution action."
      explanation:
        zh: 评估可发现问题，但在同一活动中修订、处置或解决问题会把证据与干预混为一谈。
        en: Assessment can find a problem, but revising, disposing of, or resolving it in the same activity conflates evidence with intervention.
        ja: 評価は問題を発見できますが、同じ活動で改訂、処分、解決を行うと証跡と介入が混同されます。
      source_claims:
        - claim-memory-assessment-operation-boundary
    - id: MemoryAssessmentOperation-target-evidence-consistency
      expression: "Every target_record_refs value existed before started_at and is covered by evidence_manifest_digest; a future output or unrelated same-batch record cannot become an assessed target."
      explanation:
        zh: 目标记录和证据快照必须指向同一历史状态，否则结论无法被重放或审计。
        en: Target records and evidence snapshot must point to the same historical state, or the conclusion cannot be replayed or audited.
        ja: 対象レコードと証跡スナップショットは同じ履歴状態を指さなければならず、そうでなければ結論を再実行または監査できません。
      source_claims:
        - claim-memory-assessment-operation-target
        - claim-memory-assessment-operation-digest
    - id: MemoryAssessmentOperation-scope-and-verdict-consistency
      expression: "assessment_scope is non-empty and assessment_verdict is supported by assessment_result_digest; conflict_detected reports a conflict but does not select a winner or remediation."
      explanation:
        zh: 评估的范围和结论需要可追溯；发现冲突不等于有权在同一活动中解决冲突。
        en: Assessment scope and verdict need traceability; detecting a conflict does not authorize resolving it in the same activity.
        ja: 評価範囲と結論には追跡可能性が必要であり、競合検出は同じ活動で解決する権限を意味しません。
      source_claims:
        - claim-memory-assessment-operation-conclusion
    - id: MemoryAssessmentOperation-time-consistency
      expression: "assessed_at is on or after started_at, and a terminal parent operation has ended_at on or after assessed_at."
      explanation:
        zh: 结论不能早于评估开始，也不能在已终止活动结束后被当作同一次评估的结果。
        en: A conclusion cannot predate assessment start or be treated as part of the same completed assessment after the activity ends.
        ja: 結論は評価開始より前にはならず、活動終了後に同じ完了評価の一部として扱うこともできません。
      source_claims:
        - claim-memory-assessment-operation-activity
  required_relation_constraints: []
examples:
  - id: MemoryAssessmentOperation-example-positive-read-only-warning

    labels:
      zh: 只读新鲜度与一致性警告
      en: Read-only freshness and consistency warning
      ja: 読み取り専用の鮮度・一貫性警告

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-assess-1607
      operation_kind: assessment
      status: succeeded
      started_at: "2026-07-18T20:00:00Z"
      ended_at: "2026-07-18T20:00:00.130Z"
      actor_ref: memory-assessor-1
      target_record_refs:
        - record-1607-v1
      assessment_scope:
        - freshness
        - consistency
      evidence_manifest_digest: sha256:bf7f3c2d0f407c2dcd649f2391f3d3f3a75c031437d772ff1e7896a561d79b01
      assessment_verdict: warning
      assessment_result_digest: sha256:25fca479d3d0728bd2d3c9ac29db9e51bb658d3bdbad6f9102d2d3eb5ddc49dd
      assessed_at: "2026-07-18T20:00:00.091Z"
    related_node_ids:
      - MemoryAssessmentOperation
      - MemoryOperation
      - MemoryRecord
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryAssessmentOperation-is_a-MemoryOperation
      - MemoryOperation-acts_on-MemoryRecord
      - MemoryOperation-has_result-MemoryOperationResult
      - MemoryOperation-has_audit_event-MemoryAuditEvent

    source_claims:
      - claim-memory-assessment-operation-activity
      - claim-memory-assessment-operation-boundary
      - claim-memory-assessment-operation-conclusion
  - id: MemoryAssessmentOperation-example-counterexample-update

    labels:
      zh: 检查后修改记录不是只读评估
      en: Modifying record after check is not read-only assessment
      ja: 検査後にレコードを変更することは読み取り専用評価ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-update-1607
      operation_kind: revision
      status: succeeded
      started_at: "2026-07-18T20:10:00Z"
      actor_ref: memory-updater-1
      target_record_refs:
        - record-1607-v1
      output_record_ref: record-1607-v2
      output_record_version: 2
      changed_field: consent_scope
    related_node_ids:
      - MemoryAssessmentOperation
      - MemoryUpdate
      - MemoryRecord
    related_relation_ids:
      - MemoryAssessmentOperation-is_a-MemoryOperation
      - MemoryUpdate-is_a-MemoryRevisionOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-assessment-operation-boundary
  - id: MemoryAssessmentOperation-example-boundary-dashboard-score

    labels:
      zh: 无运行边界的仪表盘评分
      en: Dashboard score without execution boundary
      ja: 実行境界のないダッシュボードスコア

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      widget_id: score-widget-1607
      displayed_metric: freshness
      displayed_score: 0.42
      operation_id: absent
      evidence_manifest_digest: absent
      assessed_at: absent
    related_node_ids:
      - MemoryAssessmentOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryAssessmentOperation-is_a-MemoryOperation

    source_claims:
      - claim-memory-assessment-operation-activity
  - id: MemoryAssessmentOperation-example-instance-conflict-detected

    labels:
      zh: 检测到偏好冲突但不解决的实例
      en: Instance that detects preference conflict without resolving it
      ja: 解決せずに設定競合を検出するインスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      operation_id: mem-op-validate-1610
      operation_kind: assessment
      status: succeeded
      started_at: "2026-07-18T20:30:00Z"
      ended_at: "2026-07-18T20:30:00.110Z"
      actor_ref: memory-validator-1
      target_record_refs:
        - record-1610-en-v1
        - record-1610-ja-v1
      assessment_scope:
        - consistency
