source_claims:
  - id: claim-memory-assessment-operation-001
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Activity from the Entity it uses or generates and the Agent associated with it; Moonweave applies that separation to memory operations.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-assessment-operation-002
    source: eng-ont-prov-o
    supports: MemoryAssessmentOperation.assessment_operation_id records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-assessment-operation-003
    source: eng-ont-prov-o
    supports: MemoryAssessmentOperation.assessment_scope records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-assessment-operation-004
    source: eng-ont-prov-o
    supports: PROV-O separates an Activity that uses an Entity from an Activity that invalidates it. Moonweave uses this trace distinction to keep MemoryAssessmentOperation, which evaluates a record without necessarily changing it, separate from MemoryDispositionOperation, which changes availability or strength.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-assessment-operation-005
    source: eng-ont-prov-o
    supports: PROV-O permits an Activity merely to use an Entity and also permits an Activity to generate a new decision Entity. Moonweave maps the first trace shape to non-decisive MemoryAssessmentOperation and the second to outcome-producing MemoryResolutionOperation; the semantics are Moonweave-specific.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-assessment-operation-006
    source: eng-ont-prov-o
    supports: Under PROV-O, using an Entity does not by itself imply that a successor Entity was generated. Moonweave therefore distinguishes MemoryAssessmentOperation, which may only inspect a record, from MemoryRevisionOperation, which consumes existing records and produces a successor; PROV-O supplies only the provenance pattern.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
