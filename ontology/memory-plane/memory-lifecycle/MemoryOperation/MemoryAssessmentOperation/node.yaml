sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, usage, generation, and provenance as distinct facts.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents read-style policy evaluation over structured input data.
  - id: nist-ai-rmf
    title: NIST AI Risk Management Framework 1.0
    source_type: standard
    url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
    relevance: Describes identifying and measuring risk separately from managing or treating it.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 digests used to bind evidence and conclusion snapshots.
source_claims:
  - id: claim-memory-assessment-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from the entities it uses or generates. Moonweave records assessment as an executed activity with target, executor, time, result, and audit evidence rather than a dashboard value or policy definition.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-assessment-operation-identity
    source: w3c-prov-o
    supports: PROV-O supports independent identity for activities and related provenance records. Moonweave uses one inherited operation_id to join an assessment's frozen input, conclusion, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-assessment-operation-target
    source: w3c-prov-o
    supports: PROV-O distinguishes input entities used by an activity from entities later generated by it. Moonweave evaluates existing target records that are present in the frozen evidence manifest and does not assess a future output as an existing target.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-assessment-operation-scope
    source: open-policy-agent
    supports: Open Policy Agent evaluates explicit structured input against explicit rules. Moonweave records the concrete provenance, freshness, consent, safety, consistency, or policy dimensions actually evaluated instead of claiming broad generic fitness.
    locator: "Open Policy Agent policy language overview and input model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-assessment-operation-conclusion
    source: nist-ai-rmf
    supports: The NIST AI RMF distinguishes risk measurement and assessment from subsequent risk-management actions. Moonweave permits assessment to report pass, warning, fail, conflict, or inconclusive without selecting a remedy or changing a record.
    locator: "NIST AI RMF functions MAP and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-assessment-operation-boundary
    source: nist-ai-rmf
    supports: The NIST AI RMF separates identifying and measuring risks from prioritizing and managing them. Moonweave keeps detection and assessment distinct from record revision, conflict resolution, and disposition.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-assessment-operation-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size message digests. Moonweave stores SHA-256 digests for frozen evidence manifests and assessment results to detect changed input or conclusion.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
