sibling_differentiation:
  - sibling_concept_id: MemoryDispositionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 共享父节点对照：父节点 MemoryOperation：MemoryAssessmentOperation（semantic kind=activity，骨架 MemoryAssessmentOperation-is_a-MemoryOperation）；MemoryDispositionOperation（semantic kind=activity，骨架 MemoryDispositionOperation-is_a-MemoryOperation）。双端条件：MemoryAssessmentOperation 条件：“检查记录是否适合继续保留、检索或复用而不直接改写它的操作”；MemoryDispositionOperation 条件：“改变既有记录的可用性、强度或保留状态的操作”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent MemoryOperation: MemoryAssessmentOperation (semantic kind=activity, backbone MemoryAssessmentOperation-is_a-MemoryOperation); MemoryDispositionOperation (semantic kind=activity, backbone MemoryDispositionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAssessmentOperation condition: “An operation checking whether a record remains fit for retention, retrieval, or reuse without directly rewriting it”; MemoryDispositionOperation condition: “An operation changing an existing record's availability, strength, or retention state”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 MemoryOperation：MemoryAssessmentOperation（semantic kind=activity、バックボーン MemoryAssessmentOperation-is_a-MemoryOperation）；MemoryDispositionOperation（semantic kind=activity、バックボーン MemoryDispositionOperation-is_a-MemoryOperation）。両端条件：MemoryAssessmentOperation の条件：「recordを直接rewriteせずretention・retrieval・reuse適合性を検査するoperationです」；MemoryDispositionOperation の条件：「既存recordのavailability・strength・retention stateを変えるoperationです」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-memory-assessment-operation-004
  - sibling_concept_id: MemoryResolutionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 已审查兄弟区分：父节点 MemoryOperation：MemoryAssessmentOperation（semantic kind=activity，骨架 MemoryAssessmentOperation-is_a-MemoryOperation）；MemoryResolutionOperation（semantic kind=activity，骨架 MemoryResolutionOperation-is_a-MemoryOperation）。双端条件：MemoryAssessmentOperation 条件：“检查记录是否适合继续保留、检索或复用而不直接改写它的操作”；MemoryResolutionOperation 条件：“消费已识别问题状态并作出可审计解决决定的操作”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent MemoryOperation: MemoryAssessmentOperation (semantic kind=activity, backbone MemoryAssessmentOperation-is_a-MemoryOperation); MemoryResolutionOperation (semantic kind=activity, backbone MemoryResolutionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAssessmentOperation condition: “An operation checking whether a record remains fit for retention, retrieval, or reuse without directly rewriting it”; MemoryResolutionOperation condition: “An operation consuming an identified problem state and making an auditable resolution decision”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 MemoryOperation：MemoryAssessmentOperation（semantic kind=activity、バックボーン MemoryAssessmentOperation-is_a-MemoryOperation）；MemoryResolutionOperation（semantic kind=activity、バックボーン MemoryResolutionOperation-is_a-MemoryOperation）。両端条件：MemoryAssessmentOperation の条件：「recordを直接rewriteせずretention・retrieval・reuse適合性を検査するoperationです」；MemoryResolutionOperation の条件：「識別済problem stateを消費しaudit可能resolution decisionを行うoperationです」。一方の成立は他方を証明しません。
    source_claims:
      - claim-memory-assessment-operation-005
  - sibling_concept_id: MemoryRevisionOperation
    shared_parent_concept_id: MemoryOperation
    differentia:
      zh: 共享父节点对照：父节点 MemoryOperation：MemoryAssessmentOperation（semantic kind=activity，骨架 MemoryAssessmentOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity，骨架 MemoryRevisionOperation-is_a-MemoryOperation）。双端条件：MemoryAssessmentOperation 条件：“检查记录是否适合继续保留、检索或复用而不直接改写它的操作”；MemoryRevisionOperation 条件：“以一个或多个既有记录为输入并产生新记录版本的操作”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent MemoryOperation: MemoryAssessmentOperation (semantic kind=activity, backbone MemoryAssessmentOperation-is_a-MemoryOperation); MemoryRevisionOperation (semantic kind=activity, backbone MemoryRevisionOperation-is_a-MemoryOperation). Endpoint conditions: MemoryAssessmentOperation condition: “An operation checking whether a record remains fit for retention, retrieval, or reuse without directly rewriting it”; MemoryRevisionOperation condition: “An operation taking one or more existing records as input and producing a new record version”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 MemoryOperation：MemoryAssessmentOperation（semantic kind=activity、バックボーン MemoryAssessmentOperation-is_a-MemoryOperation）；MemoryRevisionOperation（semantic kind=activity、バックボーン MemoryRevisionOperation-is_a-MemoryOperation）。両端条件：MemoryAssessmentOperation の条件：「recordを直接rewriteせずretention・retrieval・reuse適合性を検査するoperationです」；MemoryRevisionOperation の条件：「一つ以上の既存recordをinputに新版recordを生成するoperationです」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-memory-assessment-operation-006
