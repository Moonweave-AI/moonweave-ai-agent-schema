schema: moonweave.ai/ontology-node/v1
id: MemoryAssessmentOperation
kind: concept
status: accepted
labels:
  zh: 记忆评估操作
  en: Memory assessment operation
  ja: 記憶評価操作
semantics:
  short_definition:
    zh: 检查记录是否适合继续保留、检索或复用而不直接改写它的操作。
    en: An operation checking whether a record remains fit for retention, retrieval, or reuse without directly rewriting it.
    ja: recordを直接rewriteせずretention・retrieval・reuse適合性を検査するoperationです。
  definition:
    zh: MemoryAssessmentOperation 是只读或旁路式 MemoryOperation：它依据来源、新鲜度、安全、冲突或策略条件形成评估结果；若评估发现冲突，后续由 MemoryResolutionOperation 处理。
    en: MemoryAssessmentOperation is a read-only or side-channel MemoryOperation producing an assessment from provenance, freshness, safety, conflict, or policy checks. If it detects a conflict, a later MemoryResolutionOperation handles it.
    ja: MemoryAssessmentOperation はprovenance・freshness・safety・conflict・policy checkからassessmentを作るread-only/side-channel MemoryOperationです。conflict検出後はMemoryResolutionOperationが処理します。
  why_needed:
    zh: 明确“发现问题”与“决定如何解决”是两个活动阶段。
    en: Makes detecting a problem and deciding its resolution two separate activity phases.
    ja: problem検出とresolution決定を別activity phaseにします。
  includes:
    - zh: 纳入来源、新鲜度、安全、同意和一致性检查。
      en: Includes provenance, freshness, safety, consent, and consistency checks.
      ja: provenance・freshness・safety・consent・consistency checkを含みます。
  excludes:
    - zh: 排除内容修订、冲突解决决定和处置效果。
      en: Excludes content revision, conflict-resolution decisions, and disposition effects.
      ja: content revision・conflict-resolution decision・disposition effectを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - assessment_operation_id
  fields:
    - id: assessment_operation_id
      labels:
        zh: 评估操作标识
        en: assessment operation ID
        ja: assessment operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次记忆适用性评估。
        en: Identifies one memory-fitness assessment activity.
        ja: 一memory-fitness assessment activityを識別します。
      allowed_values: []
      pattern: null
      example_value: assess-1607
      source_claims:
        - claim-memory-assessment-operation-002
    - id: assessment_scope
      labels:
        zh: 评估范围
        en: assessment scope
        ja: 評価範囲
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出本次检查的来源、新鲜度、安全或一致性维度。
        en: Lists provenance, freshness, safety, or consistency dimensions checked.
        ja: 検査するprovenance・freshness・safety・consistency dimensionを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - freshness
        - consistency
      source_claims:
        - claim-memory-assessment-operation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryAssessmentOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆评估操作正例
      en: "Positive case: Memory assessment operation"
      ja: 記憶評価操作正例
    scenario_id: null
    descriptions:
      zh: assess-1607 检查 record-1607 的新鲜度与一致性并报告一处冲突，不修改记录。
      en: assess-1607 checks record-1607 for freshness and consistency and reports one conflict without modifying the record.
      ja: assess-1607 はrecord-1607のfreshness/consistencyを検査しrecord変更なしで一conflictを報告します。
    field_values:
      assessment_operation_id: assess-1607
      assessment_scope:
        - freshness
        - consistency
      operation_id: assess-1607
      started_at: 2026-07-16T14:10:00Z
    related_node_ids:
      - MemoryAssessmentOperation
      - MemoryOperation
    related_relation_ids:
      - MemoryAssessmentOperation-is_a-MemoryOperation
    expected_result:
      zh: 归类为 MemoryAssessmentOperation。
      en: Classify as MemoryAssessmentOperation.
      ja: MemoryAssessmentOperationに分類します。
    why_valid_or_invalid:
      zh: 活动产生评估事实而未形成修订或解决决定。
      en: The activity produces assessment facts without a revision or resolution decision.
      ja: assessment factを生成しrevision/resolution decisionは作りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-assessment-operation-001
  - id: MemoryAssessmentOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆评估操作边界例
      en: "Boundary case: Memory assessment operation"
      ja: 記憶評価操作境界例
    scenario_id: null
    descriptions:
      zh: resolve-1607 比较冲突证据后选择保留较新记录并生成调和版本。
      en: resolve-1607 compares conflict evidence, chooses the newer record, and produces a reconciled version.
      ja: resolve-1607 はconflict evidenceを比較しnewer recordを選びreconciled版を生成します。
    field_values: {}
    related_node_ids:
      - MemoryAssessmentOperation
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryAssessmentOperation；应归 MemoryConflictResolution。
      en: Do not classify as MemoryAssessmentOperation; classify as MemoryConflictResolution.
      ja: MemoryAssessmentOperationでなくMemoryConflictResolutionに分類します。
    why_valid_or_invalid:
      zh: 它不只发现问题，还作出规范决定并改变记录状态。
      en: "It does more than detect a problem: it makes a normative decision and changes record state."
      ja: problem検出だけでなくnormative decisionを行いrecord stateを変えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-assessment-operation-001
external_mappings: []
