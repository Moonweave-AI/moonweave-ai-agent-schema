schema: moonweave.ai/ontology-node/v1
id: MemoryAssessmentOperation
kind: concept
labels:
  zh: 记忆评估操作
  en: Memory assessment operation
  ja: 記憶評価操作
semantics:
  short_definition:
    zh: 验证候选项或既有记录质量与一致性的活动。
    en: Activity validating quality and consistency of candidates or existing records.
    ja: 候補または既存 record の quality/consistency を検証する activity。
  definition:
    zh: MemoryAssessmentOperation 是 MemoryOperation 子类：读取 MemoryItem 或 MemoryRecord 并输出验证结论（通过、冲突、拒绝），但不直接产生新版本或 tombstone。Mem0/Letta 矛盾事实检测在验证阶段发现 MemoryConflict，由后续 MemoryConflictResolution 处理。
    en: MemoryAssessmentOperation is a MemoryOperation subtype that reads MemoryItem or MemoryRecord and emits validation outcomes (pass, conflict, reject) without directly producing new versions or tombstones. Contradictory fact detection in Mem0/Letta surfaces MemoryConflict during validation for later MemoryConflictResolution.
    ja: MemoryAssessmentOperation は MemoryItem/MemoryRecord を read し pass/conflict/reject 結論を出す MemoryOperation subtype。新版/tombstone は直接生成しない。Mem0/Letta 矛盾検出は MemoryConflict として validation 段階で surface。
  why_needed:
    zh: 把“检查质量”与“写入/删除”分开，否则冲突检测会被误记为已解决或已删除。
    en: Separating quality checks from write/delete prevents conflict detection from being mistaken for resolution or deletion.
    ja: quality check と write/delete を分離しないと conflict 検出が resolution/delete と誤認される。
  includes:
    - zh: 纳入 MemoryValidation 及冲突、格式、同意范围检查活动。
      en: Includes MemoryValidation and conflict, format, and consent-scope checks.
      ja: MemoryValidation と conflict/format/consent チェック。
  excludes:
    - zh: 排除产生后继 record、删除 record 与冲突解决决策执行。
      en: Excludes producing successor records, deleting records, and executing conflict-resolution decisions.
      ja: successor record 生成/delete/conflict resolution 実行を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 写入前 deduplicate 与 Letta 检索比对可触发 MemoryValidation；检测到 contradictory facts 时登记 MemoryConflict 信息对象，validation_operation_id 绑定 verdict。
    en: Mem0 pre-write deduplicate and Letta retrieval comparison trigger MemoryValidation; contradictory facts register a MemoryConflict information object with validation_operation_id binding verdict.
    ja: Mem0 deduplicate/Letta 检索比較が MemoryValidation を trigger。矛盾時 MemoryConflict 情報を登録。
  typical_input:
    - description: Validation target
      format: |
        {"assessment_operation_id": "validate-220", "target_record_ids": ["record-310-v1", "record-311-v1"]}
      source_claims: [claim-assessment-design]
  typical_output:
    - description: Validation verdict
      format: |
        {"verdict": "conflict", "conflict_id": "conflict-220"}
      source_claims: [claim-assessment-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Deduplication and contradiction checks on add/update.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Search-before-insert conflict detection.
structure:
  identity_keys: [assessment_operation_id]
  fields:
    - id: assessment_operation_id
      labels: {zh: 评估操作标识, en: Assessment operation identifier, ja: 評価操作識別子}
      definitions:
        zh: 标识一次记忆评估活动。
        en: Identifies one memory assessment activity.
        ja: 一 memory assessment activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: validate-220
      allowed_values: []
      source_claims: [claim-assessment-id]
    - id: verdict
      labels: {zh: 评估结论, en: Assessment verdict, ja: 評価 verdict}
      definitions:
        zh: 结构化结论：pass、conflict、reject。
        en: Structured verdict pass, conflict, or reject.
        ja: pass/conflict/reject の structured verdict。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: conflict
      allowed_values: []
      source_claims: [claim-assessment-verdict]
  constraints: []
  required_relations: []
examples:
  - id: MemoryAssessmentOperation-example-pass
    labels: {zh: 验证通过, en: Validation pass, ja: 検証 pass}
    descriptions:
      zh: validate-219 检查 item-310 格式与 consent 后 verdict=pass，随后触发 MemoryWrite。
      en: validate-219 checks item-310 format and consent with verdict=pass, then triggers MemoryWrite.
      ja: validate-219 が item-310 を検証し verdict=pass 後 MemoryWrite。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: validation}
    field_values: {assessment_operation_id: validate-219, verdict: pass}
    related_node_ids: [MemoryAssessmentOperation, MemoryValidation, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-assessment-design]
  - id: MemoryAssessmentOperation-example-conflict
    labels: {zh: 检测冲突, en: Conflict detected, ja: 競合検出}
    descriptions:
      zh: validate-220 发现 record-310 与 record-311 对 response-language 断言矛盾，登记 MemoryConflict。
      en: validate-220 finds record-310 and record-311 contradict on response-language and registers MemoryConflict.
      ja: validate-220 が response-language で矛盾し MemoryConflict 登録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: contradiction check}
    field_values: {assessment_operation_id: validate-220, verdict: conflict}
    related_node_ids: [MemoryAssessmentOperation, MemoryConflict]
    related_relation_ids: []
    source_claims: [claim-assessment-mem0, claim-assessment-design]
  - id: MemoryAssessmentOperation-example-letta
    labels: {zh: Letta 插入前验证, en: Letta pre-insert validation, ja: Letta insert 前検証}
    descriptions:
      zh: validate-221 在 archival_memory_insert 前 search 发现重复 passage，verdict=reject。
      en: validate-221 searches before archival_memory_insert, finds duplicate passage, verdict=reject.
      ja: insert 前 search で重複、verdict=reject。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: search}
    field_values: {assessment_operation_id: validate-221, verdict: reject}
    related_node_ids: [MemoryAssessmentOperation, MemoryValidation]
    related_relation_ids: []
    source_claims: [claim-assessment-letta, claim-assessment-design]
  - id: MemoryAssessmentOperation-example-not-update
    labels: {zh: 评估非更新, en: Assessment is not update, ja: 評価は update ではない}
    descriptions:
      zh: update-512 产生 record-512-v2；validate-220 仅输出 verdict 不产生后继 record。
      en: update-512 produces record-512-v2; validate-220 only emits verdict without successor record.
      ja: update は successor 生成。validate は verdict のみ。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryAssessmentOperation, MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-assessment-design]
parent_relation:
  id: MemoryAssessmentOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆操作, en: is a memory operation, ja: 記憶操作の一種}
  definitions:
    zh: MemoryAssessmentOperation —is_a→ MemoryOperation 表示活动评估记忆质量或一致性并输出结论。
    en: MemoryAssessmentOperation —is_a→ MemoryOperation holds because the activity assesses memory quality or consistency and emits a verdict.
    ja: memory quality/consistency を評価し verdict を出す activity のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryAssessmentOperation-is_a-MemoryOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the activity assesses memory and emits verdict without direct mutation.
      explanations:
        zh: 仅当活动评估记忆并输出结论且不直接变更 record 时成立。
        en: Assert only when the activity assesses memory and emits verdict without direct mutation.
        ja: 評価して verdict を出し直接 mutation しない時のみ。
      source_claims: [claim-assessment-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-assessment-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-assessment
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Deduplication and contradiction detection.
  - id: src-letta-assessment
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: Search-before-insert validation.
  - id: src-assessment-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Assessment distinct from revision and disposition.
source_claims:
  - id: claim-assessment-mem0
    source: src-mem0-assessment
    supports: Mem0 can detect duplicate or contradictory facts during memory operations.
    locator: Add/update flow
    evidence_kind: primary-api
    confidence: high
  - id: claim-assessment-letta
    source: src-letta-assessment
    supports: Letta archival search enables pre-insert validation.
    locator: archival_memory_search
    evidence_kind: primary-doc
    confidence: high
  - id: claim-assessment-design
    source: src-assessment-design
    supports: Assessment emits verdicts without directly mutating records.
    locator: MemoryAssessmentOperation
    evidence_kind: design-inference
    confidence: high
  - id: claim-assessment-id
    source: src-assessment-design
    supports: assessment_operation_id identifies one assessment activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-assessment-verdict
    source: src-assessment-design
    supports: verdict records structured assessment outcome.
    locator: structure
    evidence_kind: design-inference
    confidence: high
