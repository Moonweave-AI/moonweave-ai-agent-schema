sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, used inputs, generated outputs, and provenance as distinct facts.
  - id: open-policy-agent
    title: Open Policy Agent policy language
    source_type: official-doc
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    relevance: Documents versioned policy evaluation over explicit structured input.
  - id: nist-ai-rmf
    title: NIST AI Risk Management Framework 1.0
    source_type: standard
    url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
    relevance: Separates risk measurement from management and treatment actions.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 digests used to bind validation evidence and results.
source_claims:
  - id: claim-memory-validation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from the entities it uses or generates. Moonweave models validation as an executed activity with target, executor, time, result, and audit evidence rather than a score or a post-hoc inference.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-validation-identity
    source: w3c-prov-o
    supports: PROV-O supports independent identity for activities and their provenance records. Moonweave uses one operation_id to join validation profile, target records, verdict, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-validation-target
    source: w3c-prov-o
    supports: PROV-O distinguishes entities used by an activity from entities later generated by it. Moonweave validates only existing target records named in frozen evidence and does not infer evaluation from search adjacency or future output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-validation-profile
    source: open-policy-agent
    supports: Open Policy Agent evaluates explicit rule versions over explicit structured input. Moonweave identifies a versioned validation profile and explicit checks so the validation procedure can be replayed.
    locator: "Open Policy Agent policy language overview, rules, and input model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-validation-verdict
    source: nist-ai-rmf
    supports: The NIST AI RMF separates measurement from management action. Moonweave lets validation report valid, invalid, conflict_detected, or inconclusive without selecting remediation or changing a record.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-validation-conflict
    source: nist-ai-rmf
    supports: The NIST AI RMF treats assessment findings as inputs to later risk-management action. Moonweave requires a conflict finding to name incompatible assertions and records while keeping resolution as a separate activity.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: medium
  - id: claim-memory-validation-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size message digests. Moonweave stores SHA-256 digests for validation evidence and results to detect changed inputs or conclusions.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
