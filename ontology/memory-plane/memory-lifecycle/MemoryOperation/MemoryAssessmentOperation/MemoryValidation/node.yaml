schema: moonweave.ai/ontology-node/v1
id: MemoryValidation
kind: concept
status: accepted
labels:
  zh: 记忆验证
  en: Memory validation
  ja: 記憶検証
semantics:
  short_definition:
    zh: 依据明确检查项评估一个记录并可检测冲突的评估操作。
    en: An assessment operation evaluating a record against explicit checks and potentially detecting conflict.
    ja: 明示checkによりrecordを評価しconflictを検出し得るassessment operationです。
  definition:
    zh: MemoryValidation 是 MemoryAssessmentOperation：它对 MemoryRecord 执行来源、时效、信任边界、安全、同意或一致性检查，返回可审计判定；它不会自动合并冲突记录。
    en: MemoryValidation is a MemoryAssessmentOperation that checks a MemoryRecord for provenance, freshness, trust boundary, safety, consent, or consistency and returns an auditable verdict. It does not automatically merge conflicting records.
    ja: MemoryValidation はMemoryRecordのprovenance・freshness・trust boundary・safety・consent・consistencyをcheckしaudit可能verdictを返す MemoryAssessmentOperationです。conflicting recordを自動mergeしません。
  why_needed:
    zh: 让复用前验证成为独立活动，并把冲突作为输出状态。
    en: Makes pre-reuse validation an independent activity and conflict an output state.
    ja: reuse前validationを独立activityにしconflictをoutput stateにします。
  includes:
    - zh: 纳入记录复用前的来源、新鲜度、授权、安全与冲突检查。
      en: Includes provenance, freshness, authorization, safety, and conflict checks before record reuse.
      ja: record reuse前のprovenance・freshness・authorization・safety・conflict checkを含みます。
  excludes:
    - zh: 排除无证据的主观置信度、冲突解决决定和内容更新。
      en: Excludes unsupported subjective confidence, conflict-resolution decisions, and content update.
      ja: unsupported subjective confidence・conflict-resolution decision・content updateを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - validation_operation_id
  fields:
    - id: validation_operation_id
      labels:
        zh: 验证操作标识
        en: validation operation ID
        ja: validation operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次具体记录验证。
        en: Identifies one concrete record-validation activity.
        ja: 一concrete record-validation activityを識別します。
      allowed_values: []
      pattern: null
      example_value: validate-1708
      source_claims:
        - claim-memory-validation-002
    - id: verdict
      labels:
        zh: 验证判定
        en: validation verdict
        ja: 検証判定
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录通过、失败或冲突等可审计结论。
        en: Records an auditable pass, fail, or conflict verdict.
        ja: pass・fail・conflict等audit可能結論を記録します。
      allowed_values: []
      pattern: null
      example_value: conflict
      source_claims:
        - claim-memory-validation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryValidation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆验证正例
      en: "Positive case: Memory validation"
      ja: 記憶検証正例
    scenario_id: null
    descriptions:
      zh: memory-op-validation-001 在复用 record-a 前核对来源、时效和授权范围，确认来源有效，但发现它与 record-b 在当前值上冲突，因而给出 conflict 判定。
      en: Before record-a is reused, memory-op-validation-001 checks provenance, freshness, and authorization scope, confirms provenance, detects a current-value conflict with record-b, and returns the verdict conflict.
      ja: record-a の再利用前に memory-op-validation-001 は出典・鮮度・権限範囲を確認し、出典は有効だが record-b と現値が衝突すると検出して conflict 判定を返します。
    field_values:
      validation_operation_id: memory-op-validation-001
      verdict: conflict
      operation_id: memory-op-validation-001
      reason: provenance and freshness must be checked before reuse
      assessment_operation_id: memory-op-validation-001
      assessment_scope:
        - provenance
        - freshness
        - authorization
        - consistency
      started_at: 2026-07-16T14:11:00Z
    related_node_ids:
      - MemoryValidation
      - MemoryAssessmentOperation
    related_relation_ids:
      - MemoryValidation-is_a-MemoryAssessmentOperation
    expected_result:
      zh: 归类为 MemoryValidation，并产生 MemoryConflict 状态。
      en: Classify as MemoryValidation and produce a MemoryConflict state.
      ja: MemoryValidationに分類しMemoryConflict stateを生成します。
    why_valid_or_invalid:
      zh: 检查项和判定均可审计，且未代替冲突解决。
      en: The checks and verdict are auditable and do not substitute for conflict resolution.
      ja: check/verdictはaudit可能でconflict resolutionを代替しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-validation-001
  - id: MemoryValidation-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 复用前记忆验证实例
      en: Pre-reuse memory-validation instance
      ja: 再利用前記憶検証インスタンス
    scenario_id: MemoryValidation:instance:memory-op-validation-001
    descriptions:
      zh: memory-op-validation-001 在复用 record-a 前核对来源、时效和授权范围，确认来源有效，但发现它与 record-b 在当前值上冲突，因而给出 conflict 判定。
      en: Before record-a is reused, memory-op-validation-001 checks provenance, freshness, and authorization scope, confirms provenance, detects a current-value conflict with record-b, and returns the verdict conflict.
      ja: record-a の再利用前に memory-op-validation-001 は出典・鮮度・権限範囲を確認し、出典は有効だが record-b と現値が衝突すると検出して conflict 判定を返します。
    field_values:
      validation_operation_id: memory-op-validation-001
      verdict: conflict
      operation_id: memory-op-validation-001
      reason: provenance and freshness must be checked before reuse
    related_node_ids:
      - MemoryValidation
      - MemoryAssessmentOperation
      - MemoryRecord
      - MemoryConflict
    related_relation_ids:
      - MemoryValidation-is_a-MemoryAssessmentOperation
      - MemoryValidation-evaluates-MemoryRecord
      - MemoryValidation-detects-MemoryConflict
    expected_result:
      zh: 返回 Validation、被评估记录和显式 MemoryConflict；不得自动选择赢家或把检测等同于解决。
      en: Return the Validation, evaluated records, and an explicit MemoryConflict without automatically choosing a winner or treating detection as resolution.
      ja: Validation、評価記録、明示的 MemoryConflict を返し、勝者選択や検出と解決の同一視を行いません。
    why_valid_or_invalid:
      zh: 活动只作可审计评估并产出冲突判定；后续如何调和属于 MemoryConflictResolution。
      en: The activity performs an auditable assessment and conflict verdict only; later reconciliation belongs to MemoryConflictResolution.
      ja: 監査可能な評価と衝突判定だけを行い、後続調整は MemoryConflictResolution に属します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-validation-001
  - id: MemoryValidation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆验证边界例
      en: "Boundary case: Memory validation"
      ja: 記憶検証境界例
    scenario_id: null
    descriptions:
      zh: validate-1709 直接删除未通过检查的记录且不保留删除依据。
      en: validate-1709 directly deletes a failing record without retaining a deletion basis.
      ja: validate-1709 は検査fail recordをdeletion basisなしで直接deleteします。
    field_values: {}
    related_node_ids:
      - MemoryValidation
    related_relation_ids: []
    expected_result:
      zh: 不得把删除效果归入 MemoryValidation。
      en: Do not classify the deletion effect as MemoryValidation.
      ja: delete effectをMemoryValidationに分類しません。
    why_valid_or_invalid:
      zh: 验证只形成判定；处置必须是另一个受策略约束的活动。
      en: Validation only forms a verdict; disposition must be a separate policy-governed activity.
      ja: validationはverdictのみでdispositionは別policy-governed activityである必要があります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-validation-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryValidation-is_a-MemoryAssessmentOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆评估操作
    en: is a memory assessment operation
    ja: 記憶評価操作の一種
  definitions:
    zh: MemoryValidation —is_a→ MemoryAssessmentOperation 表示：活动针对一个 MemoryRecord 执行明确检查项并返回可审计判定，必要时检测冲突。
    en: MemoryValidation —is_a→ MemoryAssessmentOperation holds because the activity applies explicit checks to one MemoryRecord and returns an auditable verdict, potentially detecting conflict
    ja: MemoryValidation —is_a→ MemoryAssessmentOperation は、一MemoryRecordへexplicit checkを適用しaudit可能verdictを返して必要時conflict検出するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取
      en: inverse is a memory assessment operation
      ja: 逆方向読取
  conditions:
    - id: MemoryValidation-is_a-MemoryAssessmentOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the activity applies explicit checks to one MemoryRecord and returns an auditable verdict, potentially detecting conflict—and already meets the activity definition of MemoryAssessmentOperation.
      explanations:
        zh: 仅当实例满足子类种差“活动针对一个 MemoryRecord 执行明确检查项并返回可审计判定，必要时检测冲突。”且已满足 MemoryAssessmentOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the activity applies explicit checks to one MemoryRecord and returns an auditable verdict, potentially detecting conflict—and already meets the activity definition of MemoryAssessmentOperation.
        ja: instanceがchild differentia「一MemoryRecordへexplicit checkを適用しaudit可能verdictを返して必要時conflict検出するため成立します。」を満たし、かつ MemoryAssessmentOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-validation-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryValidation-is_a-MemoryAssessmentOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆评估操作正例
        en: "Positive case: is a memory assessment operation"
        ja: 記憶評価操作の一種正例
      scenario_id: MemoryValidation-is_a-MemoryAssessmentOperation:positive:20260716
      descriptions:
        zh: validate-1708 对 record-a 运行 provenance-required、freshness<30d 和 timezone-consistency 三项检查，并记录 conflict verdict。
        en: validate-1708 runs provenance-required, freshness-under-30-days, and timezone-consistency checks on record-a and records a conflict verdict.
        ja: validate-1708 は record-a に provenance-required・freshness-under-30-days・timezone-consistency check を行い conflict verdict を記録します。
      field_values: {}
      related_node_ids:
        - MemoryValidation
        - MemoryAssessmentOperation
      related_relation_ids:
        - MemoryValidation-is_a-MemoryAssessmentOperation
      expected_result:
        zh: 将 validate-1708 归为 MemoryValidation，并保留目标记录、检查版本、逐项结果和可重现 verdict。
        en: Classify validate-1708 as MemoryValidation and retain the target, check versions, per-check outcomes, and reproducible verdict.
        ja: validate-1708 を MemoryValidation に分類し target・check version・per-check outcome・再現可能 verdict を保持します。
      why_valid_or_invalid:
        zh: 它对一个明确记录应用可审计检查并只返回判断，具备 validation 相对一般 assessment 的具体程序种差。
        en: It applies auditable checks to an explicit record and returns only a verdict, providing the procedural differentia of validation within assessment.
        ja: 明示 record に auditable check を適用して verdict のみ返すため、assessment 内 validation の procedural differentia を持ちます。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-validation-001
    - id: MemoryValidation-is_a-MemoryAssessmentOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆评估操作边界例
        en: "Boundary case: is a memory assessment operation"
        ja: 記憶評価操作の一種境界例
      scenario_id: MemoryValidation-is_a-MemoryAssessmentOperation:boundary:20260716
      descriptions:
        zh: resolve-1708 读取已检测的 conflict-1708，比较权威等级并选择保留 record-b，同时形成 resolution decision。
        en: resolve-1708 consumes detected conflict-1708, compares authority levels, selects record-b, and forms a resolution decision.
        ja: resolve-1708 は detected conflict-1708 を consume し authority level を比較して record-b を選択し resolution decision を形成します。
      field_values: {}
      related_node_ids:
        - MemoryValidation
        - MemoryAssessmentOperation
      related_relation_ids:
        - MemoryValidation-is_a-MemoryAssessmentOperation
      expected_result:
        zh: 拒绝 MemoryValidation 分类；该活动已经从检测进入处理，应归 MemoryConflictResolution。
        en: Reject MemoryValidation classification because the activity has moved from detection to handling and belongs to MemoryConflictResolution.
        ja: MemoryValidation 分類を拒否します。activity は detection から handling に進み MemoryConflictResolution に属します。
      why_valid_or_invalid:
        zh: 选择行动和调和证据不再是只应用检查的验证；detect 与 resolve 必须保持为可查询的两个阶段。
        en: Selecting an action and reconciling evidence is no longer check-only validation; detect and resolve must remain queryable as separate stages.
        ja: action 選択と evidence reconciliation は check-only validation ではなく、detect と resolve は別 stage として照会可能にします。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-validation-001
