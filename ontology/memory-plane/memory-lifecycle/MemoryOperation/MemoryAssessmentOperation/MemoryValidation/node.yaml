        kind: positive
        labels:
          zh: 评估记忆记录正例
          en: "Positive case: evaluates memory record"
          ja: memory recordを評価する正例
        scenario_id: MemoryValidation-evaluates-MemoryRecord:positive:20260716
        descriptions:
          zh: validate-1708 将 target_record_id 明确设为 record-a，并逐项核验其来源锚点、时区值、写入时间与当前有效版本。
          en: validate-1708 explicitly sets target_record_id to record-a and checks its provenance anchor, timezone value, write time, and current-version status.
          ja: validate-1708 は target_record_id を record-a に設定し、出典 anchor・timezone 値・write time・current-version status を個別に検査します。
        field_values: {}
        related_node_ids:
          - MemoryValidation
          - MemoryRecord
        related_relation_ids:
          - MemoryValidation-evaluates-MemoryRecord
        expected_result:
          zh: 建立 validate-1708 evaluates record-a，并把四项检查及最终 verdict=needs-review 保存在该验证活动的结果中。
          en: Record that validate-1708 evaluates record-a and retain all four checks plus verdict=needs-review in the validation result.
          ja: validate-1708 evaluates record-a を記録し、四つの検査と最終 verdict=needs-review を validation result に保持します。
        why_valid_or_invalid:
          zh: 验证请求直接命名 record-a，检查读取的字段也都来自该记录，最终判定因此能够追溯到唯一被评估对象。
          en: The validation request names record-a directly, every checked field is read from that record, and the verdict therefore traces to one evaluated object.
          ja: validation request が record-a を直接指定し、全 checked field も同 record 由来なので verdict を一つの evaluated object へ追跡できます。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-validation-001
      - id: MemoryValidation-evaluates-MemoryRecord-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 评估记忆记录边界例
          en: "Boundary case: evaluates memory record"
          ja: memory recordを評価する境界例
        scenario_id: MemoryValidation-evaluates-MemoryRecord:boundary:20260716
        descriptions:
          zh: record-c 与 record-a 出现在同一批检索结果中，但 validate-1708 的 target_record_id、检查日志和 verdict 都未提到 record-c。
          en: record-c appears in the same retrieval batch as record-a, but validate-1708 never names it in target_record_id, check logs, or the verdict.
          ja: record-c は record-a と同じ retrieval batch にありますが、validate-1708 の target_record_id・check log・verdict には現れません。
        field_values: {}
        related_node_ids:
          - MemoryValidation
          - MemoryRecord
        related_relation_ids:
          - MemoryValidation-evaluates-MemoryRecord
        expected_result:
          zh: 拒绝建立 validate-1708 evaluates record-c；保留其检索共现事实，只有另一次显式验证才能产生评估关系。
          en: Reject validate-1708 evaluates record-c; preserve only retrieval co-occurrence until a separate validation explicitly selects that record.
          ja: validate-1708 evaluates record-c を拒否し、別 validation が明示選択するまでは retrieval co-occurrence のみ保持します。
        why_valid_or_invalid:
          zh: 进入候选集合不等于成为验证目标；若把邻近记录也标为已评估，会伪造它未经执行的检查与判定。
          en: Membership in a candidate set is not selection as the validation target; adding this edge would fabricate checks and a verdict that never ran for record-c.
          ja: candidate set 所属は validation target 選択ではなく、この edge を加えると record-c で未実行の check と verdict を捏造します。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-validation-001
    source_claims:
