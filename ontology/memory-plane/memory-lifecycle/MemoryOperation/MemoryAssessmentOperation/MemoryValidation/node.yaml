        severity: error
        expression_language: plain
        expression: Assert only when validation.target_record_id equals the target and nonempty validation_checks produce a verdict.
        explanations:
          zh: 仅当 validation.target_record_id 等于目标且 validation_checks 非空并产生 verdict 时成立。
          en: Assert only when validation.target_record_id equals the target and nonempty validation_checks produce a verdict.
          ja: validation.target_record_idがtargetと一致しnonempty validation_checksがverdictを生成する時だけassertします。
        source_claims:
          - claim-memory-validation-001
    temporal_scope: valid-time
