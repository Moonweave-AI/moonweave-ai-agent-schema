schema: moonweave.ai/ontology-node/v1
id: MemoryValidation
kind: concept
labels:
  zh: 记忆验证
  en: Memory validation
  ja: 記憶検証
semantics:
  short_definition:
    zh: 对候选项或记录执行格式、同意与一致性检查。
    en: Runs format, consent, and consistency checks on candidates or records.
    ja: 候補/record に format/consent/consistency チェックを実行。
  definition:
    zh: MemoryValidation 是 MemoryAssessmentOperation：对 MemoryItem 或 MemoryRecord 执行 schema、consent_scope、重复与矛盾检测，输出 pass/conflict/reject。Mem0 deduplicate 与 Letta search-before-insert 是典型前置验证；发现 contradictory facts 时产生 MemoryConflict 信息对象。
    en: MemoryValidation is a MemoryAssessmentOperation performing schema, consent_scope, duplicate, and contradiction checks on MemoryItem or MemoryRecord, outputting pass/conflict/reject. Mem0 deduplicate and Letta search-before-insert are typical pre-checks; contradictory facts produce a MemoryConflict information object.
    ja: MemoryValidation は schema/consent/重複/矛盾チェックを行う MemoryAssessmentOperation。Mem0 deduplicate/Letta search-before-insert が典型。矛盾時 MemoryConflict 情報を生成。
  why_needed:
    zh: 验证结论必须独立留痕，否则冲突会被误当作已写入或已删除。
    en: Validation verdicts must be traced independently or conflicts get mistaken for writes or deletes.
    ja: validation verdict を独立記録しないと conflict が write/delete と誤認される。
  includes:
    - zh: 纳入 schema 校验、consent 检查、重复检测与矛盾事实发现。
      en: Includes schema validation, consent checks, duplicate detection, and contradictory fact discovery.
      ja: schema/consent/重複/矛盾 fact 発見。
  excludes:
    - zh: 排除直接写入、删除与冲突解决执行。
      en: Excludes direct write, delete, and conflict-resolution execution.
      ja: 直接 write/delete/conflict resolution 実行を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 POST /v1/memories/ 可选 deduplicate:true 触发重复验证；Letta archival_memory_search 在 insert 前比对；validation_operation_id 绑定 comparison_key 与 involved_record_ids。
    en: Mem0 POST /v1/memories/ optional deduplicate:true triggers duplicate validation; Letta archival_memory_search compares before insert; validation_operation_id binds comparison_key and involved_record_ids.
    ja: Mem0 deduplicate:true/Letta search-before-insert を写像。validation_operation_id が comparison_key/involved_record_ids を bind。
  typical_input:
    - description: Validation request
      format: |
        {"validation_operation_id": "validate-220", "candidate_item_id": "item-310"}
      source_claims: [claim-validation-design]
  typical_output:
    - description: Validation verdict
      format: |
        {"verdict": "conflict", "comparison_key": "response-language"}
      source_claims: [claim-validation-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: deduplicate option on POST /v1/memories/.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_search before insert.
structure:
  identity_keys: [validation_operation_id]
  fields:
    - id: validation_operation_id
      labels: {zh: 验证操作标识, en: Validation operation identifier, ja: 検証操作識別子}
      definitions:
        zh: 标识一次记忆验证活动。
        en: Identifies one memory validation activity.
        ja: 一 memory validation activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: validate-220
      allowed_values: []
      source_claims: [claim-validation-id]
    - id: verdict
      labels: {zh: 验证结论, en: Validation verdict, ja: 検証 verdict}
      definitions:
        zh: pass、conflict 或 reject。
        en: pass, conflict, or reject.
        ja: pass/conflict/reject。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: conflict
      allowed_values: []
      source_claims: [claim-validation-verdict]
  constraints: []
  required_relations: []
examples:
  - id: MemoryValidation-example-mem0-dedup
    labels: {zh: Mem0 去重验证, en: Mem0 dedup validation, ja: Mem0 dedup 検証}
    descriptions:
      zh: validate-218 在 POST /v1/memories/ 前启用 deduplicate:true，verdict=reject 阻止重复写入。
      en: validate-218 enables deduplicate:true before POST /v1/memories/; verdict=reject blocks duplicate write.
      ja: deduplicate:true で validate-218 が重複 write を阻止。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {validation_operation_id: validate-218, verdict: reject}
    related_node_ids: [MemoryValidation, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-validation-mem0, claim-validation-design]
  - id: MemoryValidation-example-conflict
    labels: {zh: 矛盾事实检测, en: Contradictory facts, ja: 矛盾 fact 検出}
    descriptions:
      zh: validate-220 发现 record-310 说 TypeScript、record-311 说 Python，verdict=conflict 并登记 MemoryConflict。
      en: validate-220 finds record-310 says TypeScript and record-311 says Python; verdict=conflict registers MemoryConflict.
      ja: TypeScript/Python 矛盾で validate-220 が MemoryConflict 登録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: contradiction}
    field_values: {validation_operation_id: validate-220, verdict: conflict, comparison_key: response-language}
    related_node_ids: [MemoryValidation, MemoryConflict]
    related_relation_ids: []
    source_claims: [claim-validation-mem0, claim-validation-design]
  - id: MemoryValidation-example-letta
    labels: {zh: Letta 插入前搜索, en: Letta pre-insert search, ja: Letta insert 前 search}
    descriptions:
      zh: validate-221 调用 archival_memory_search 发现同主题 passage 已存在，verdict=reject。
      en: validate-221 calls archival_memory_search, finds existing passage on same topic, verdict=reject.
      ja: archival_memory_search で重複 passage、verdict=reject。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: search}
    field_values: {validation_operation_id: validate-221, verdict: reject}
    related_node_ids: [MemoryValidation]
    related_relation_ids: []
    source_claims: [claim-validation-letta, claim-validation-design]
  - id: MemoryValidation-example-pass
    labels: {zh: 验证通过, en: Validation pass, ja: 検証 pass}
    descriptions:
      zh: validate-219 检查 schema 与 consent 后 verdict=pass，允许后续 MemoryWrite。
      en: validate-219 checks schema and consent with verdict=pass, allowing subsequent MemoryWrite.
      ja: schema/consent OK で validate-219 verdict=pass。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: pass}
    field_values: {validation_operation_id: validate-219, verdict: pass}
    related_node_ids: [MemoryValidation, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-validation-design]
parent_relation:
  id: MemoryValidation-is_a-MemoryAssessmentOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆评估操作, en: is a memory assessment operation, ja: 記憶評価操作の一種}
  definitions:
    zh: MemoryValidation —is_a→ MemoryAssessmentOperation 表示活动执行结构化验证并输出 verdict。
    en: MemoryValidation —is_a→ MemoryAssessmentOperation holds because the activity performs structured validation and emits a verdict.
    ja: structured validation を行い verdict を出すため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryValidation-is_a-MemoryAssessmentOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when structured validation checks produce an explicit verdict.
      explanations:
        zh: 仅当结构化验证检查产生明确 verdict 时成立。
        en: Assert only when structured validation checks produce an explicit verdict.
        ja: structured validation が explicit verdict を生成する時のみ。
      source_claims: [claim-validation-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-validation-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-validation
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: deduplicate and contradiction checks.
  - id: src-letta-validation
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: archival_memory_search validation.
  - id: src-validation-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Validation emits verdicts and may detect MemoryConflict.
source_claims:
  - id: claim-validation-mem0
    source: src-mem0-validation
    supports: Mem0 supports deduplicate:true and can surface contradictory facts.
    locator: POST /v1/memories/
    evidence_kind: primary-api
    confidence: high
  - id: claim-validation-letta
    source: src-letta-validation
    supports: Letta search-before-insert validates against existing archival passages.
    locator: archival_memory_search
    evidence_kind: primary-doc
    confidence: high
  - id: claim-validation-design
    source: src-validation-design
    supports: MemoryValidation performs checks and emits pass/conflict/reject verdicts.
    locator: MemoryValidation boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-validation-id
    source: src-validation-design
    supports: validation_operation_id identifies one validation activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-validation-verdict
    source: src-validation-design
    supports: verdict records validation outcome.
    locator: structure
    evidence_kind: design-inference
    confidence: high
