    ja: 記憶評価操作の一種である
  definitions:
    zh: MemoryValidation —is_a→ MemoryAssessmentOperation 表示它满足非变更评估的通用边界，并额外具有版本化检查配置、明确检查项和可重放记录级判定。
    en: MemoryValidation —is_a→ MemoryAssessmentOperation means it meets the general non-mutating assessment boundary and additionally has a versioned check profile, explicit checks, and replayable record-level verdict.
    ja: MemoryValidation —is_a→ MemoryAssessmentOperation は、一般的な非変更評価境界を満たし、さらにバージョン化検査プロファイル、明示的検査、再実行可能なレコード単位判定を持つことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不对一次评估中可执行的记录验证数量施加统一基数。
    en: The classification relation expresses type membership and does not impose a uniform count of record validations in one assessment.
    ja: 分類関係は型メンバーシップを表し、一評価で実行可能なレコード検証数に一律基数を課しません。
  inverse_reading:
    predicate: has_validation_subtype
    labels:
      zh: 具有验证子类
      en: has validation subtype
      ja: 検証サブタイプを持つ
