      zh: 评估记忆记录
      en: evaluates memory record
      ja: memory recordを評価する
    definitions:
      zh: MemoryValidation —evaluates→ MemoryRecord 表示验证活动对该记录执行明确的来源、新鲜度、安全、同意或一致性检查。
      en: MemoryValidation —evaluates→ MemoryRecord means the validation activity applies explicit provenance, freshness, safety, consent, or consistency checks to the record.
      ja: MemoryValidation —evaluates→ MemoryRecord はvalidation activityがrecordへexplicit provenance・freshness・safety・consent・consistency checkを適用することを表します。
    cardinality: null
