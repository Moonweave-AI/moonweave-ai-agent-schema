schema: moonweave.ai/ontology-node/v1
id: MemoryValidation
kind: concept
status: accepted
labels:
  zh: 记忆验证
  en: Memory validation
  ja: 記憶検証
semantics:
  short_definition:
    zh: 按版本化明确检查项验证既有记忆记录并形成可审计判定的评估操作。
    en: An assessment operation that validates existing memory records against versioned explicit checks and forms an auditable verdict.
    ja: バージョン化された明示的検査に対して既存記憶レコードを検証し、監査可能な判定を形成する評価操作です。
  definition:
    zh: MemoryValidation 是 MemoryAssessmentOperation：它依据一个可重放的验证配置，对冻结的既有 MemoryRecord 执行来源、新鲜度、同意、信任边界、安全或一致性检查，并记录 valid、invalid、conflict_detected 或 inconclusive 判定。它不修改记录、不自动合并冲突、不选择赢家，也不执行处置。
    en: MemoryValidation is a MemoryAssessmentOperation that uses a replayable validation profile to apply provenance, freshness, consent, trust-boundary, safety, or consistency checks to frozen existing MemoryRecord instances and records a valid, invalid, conflict_detected, or inconclusive verdict. It does not modify records, automatically merge conflict, select a winner, or perform disposition.
    ja: MemoryValidation は、再実行可能な検証プロファイルを用いて、凍結された既存 MemoryRecord に provenance、freshness、consent、trust-boundary、安全性、一貫性の検査を適用し、valid、invalid、conflict_detected、inconclusive の判定を記録する MemoryAssessmentOperation です。レコードを変更せず、競合を自動統合せず、勝者を選ばず、処分も実行しません。
  why_needed:
    zh: 将可重放的记录级检查与一般评估、冲突解决和内容变更分开，使复用前的证据与最终处置都可追溯。
    en: Separates replayable record-level checks from general assessment, conflict resolution, and content change so both pre-reuse evidence and final disposition remain traceable.
    ja: 再実行可能なレコード単位検査を一般評価、競合解決、内容変更から分離し、再利用前証跡と最終処分の両方を追跡可能にします。
  includes:
    - zh: 已执行的来源、新鲜度、同意、信任边界、安全和一致性检查，以及只检测并报告冲突的验证。
      en: Executed provenance, freshness, consent, trust-boundary, safety, and consistency checks, including validations that only detect and report conflict.
      ja: 実行済みの provenance、freshness、consent、trust-boundary、安全性、一貫性の検査、および競合を検出・報告するだけの検証を含みます。
  excludes:
    - zh: 无检查配置的主观置信度、仅展示的健康分数、冲突解决、记录更新、记录删除，以及用结果倒推检查已发生的假设。
      en: Subjective confidence without a check profile, display-only health scores, conflict resolution, record update, record deletion, and assumptions that infer a check occurred from an outcome.
      ja: 検査プロファイルのない主観的確信、表示専用の健全性スコア、競合解決、レコード更新、レコード削除、結果から検査発生を逆推論する仮定を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将验证实现为有目标记录、版本化检查配置、冻结证据和单一判定的只读工作单元；冲突只作为输出状态，后续处理另建活动。
    en: Implement validation as a read-only work unit with target records, versioned check profile, frozen evidence, and one verdict; conflict is output state only and later handling is a separate activity.
    ja: 検証を対象レコード、バージョン化された検査プロファイル、凍結証跡、一つの判定を持つ読み取り専用作業単位として実装します。競合は出力状態だけであり、後続処理は別活動です。
  typical_input:
    - description: Existing record references, versioned validation profile, explicit checks, and a frozen evidence manifest.
      format: "{operation_id, target_record_refs, validation_profile_ref, validation_checks, validation_evidence_digest, actor_ref}"
  typical_output:
    - description: One reproducible validation verdict with result evidence and optional detected conflict reference.
      format: "{operation_id, validation_verdict, validation_result_digest, validated_at, conflict_ref?}"
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Documents evaluating versioned structured rules against input without mutating that input.
    - name: NIST AI Risk Management Framework
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
      description: Distinguishes measurement and evaluation from later management actions.
  source_claims:
    - claim-memory-validation-activity
    - claim-memory-validation-profile
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用 MemoryOperation 标识，以将验证目标、检查配置、判定、结果与审计事件关联为同一次执行。
        en: Reuses the MemoryOperation identity to join validation target, check profile, verdict, result, and audit events as one execution.
        ja: MemoryOperation 識別子を再利用し、検証対象、検査プロファイル、判定、結果、監査イベントを一つの実行として結びます。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-validate-1708
      source_claims:
        - claim-memory-validation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 assessment，表明验证是对现有记录的只读检查活动而不是记录修订或处置。
        en: Narrows the inherited operation kind to assessment and identifies validation as a read-only check of existing records rather than revision or disposition.
        ja: 継承した操作種別を assessment に限定し、検証を修訂や処置ではなく既存レコードの読み取り専用検査として識別します。
      allowed_values:
        - assessment
      pattern: null
      example_value: assessment
      source_claims:
        - claim-memory-validation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录验证活动的执行状态，而不把 valid 或 invalid 的检查结论混作运行状态。
        en: Records the state of the validation activity and does not conflate it with the valid or invalid check conclusion.
        ja: 検証活動の実行状態を記録し、valid または invalid という検査結論と混同しません。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-validation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际开始读取验证目标和检查配置的时间，不以验证配置的发布时间替代。
        en: Records when reading the validation targets and check profile actually began, not when the profile was published.
        ja: 検証対象と検査プロファイルの読み取りを実際に始めた時刻を記録し、プロファイル公開時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:00:00Z"
      source_claims:
        - claim-memory-validation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际运行验证检查的主体，而不是被验证记录的提供者。
        en: References the actor that runs the validation checks, not a provider of the record being checked.
        ja: 検証対象レコードの提供者ではなく、検査を実行する主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-validator-1
      source_claims:
        - claim-memory-validation-activity
    - id: target_record_refs
      labels:
        zh: 被验证记录引用
        en: validated record references
        ja: 検証対象レコード参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出验证实际读取的既有 MemoryRecord；每个目标必须在验证开始前存在并出现在冻结证据中。
        en: Lists existing MemoryRecord instances actually read by validation; every target must exist before validation starts and appear in frozen evidence.
        ja: 検証が実際に読み取る既存 MemoryRecord を列挙します。各対象は検証開始前に存在し、凍結証跡に現れなければなりません。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value:
        - record-1708-v1
      source_claims:
        - claim-memory-validation-target
    - id: assessment_scope
      labels:
        zh: 评估范围
        en: assessment scope
        ja: 評価範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 用父类范围词汇说明本次验证评估哪些维度；它是对 validation_checks 所列具体检查的语义归类。
        en: Records which parent assessment dimensions this validation covers and gives a semantic grouping for the concrete validation_checks.
        ja: この検証が対象とする親評価の次元を記録し、具体的な validation_checks に意味上の分類を与えます。
      allowed_values:
        - provenance
        - freshness
        - consent
        - safety
        - consistency
        - policy_compliance
      pattern: null
      example_value:
        - provenance
        - freshness
      source_claims:
        - claim-memory-validation-profile
    - id: evidence_manifest_digest
      labels:
        zh: 评估证据清单摘要
        en: assessment evidence manifest digest
        ja: 評価証跡マニフェストダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定父类评估所依赖的目标版本、配置和检查证据快照；在此子类中它与 validation_evidence_digest 指向同一验证证据包。
        en: Fixes the parent assessment snapshot of target versions, profile, and check evidence; in this subtype it names the same evidence package as validation_evidence_digest.
        ja: 対象版、プロファイル、検査証跡から成る親評価のスナップショットを固定し、このサブタイプでは validation_evidence_digest と同じ証跡パッケージを指します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:4b5eb431aa76d8cb1ddad5d0e4af2c836fbe51d75109287b8961a5d8ec762e5f
      source_claims:
        - claim-memory-validation-digest
    - id: assessment_verdict
      labels:
        zh: 评估结论
        en: assessment verdict
        ja: 評価結論
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用父类结论词汇概括验证结果；valid 映射为 pass，invalid 映射为 fail，conflict_detected 和 inconclusive 保持同名结论。
        en: Summarizes the validation outcome in the parent verdict vocabulary, mapping valid to pass and invalid to fail while retaining conflict_detected and inconclusive.
        ja: 親の結論語彙で検証結果を要約し、valid を pass、invalid を fail に対応付け、conflict_detected と inconclusive はそのまま保持します。
      allowed_values:
        - pass
        - warning
        - fail
        - conflict_detected
        - inconclusive
      pattern: null
      example_value: pass
      source_claims:
        - claim-memory-validation-verdict
    - id: assessment_result_digest
      labels:
        zh: 评估结果摘要
        en: assessment result digest
        ja: 評価結果ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定父类评估结论和逐项结果；在此子类中它与 validation_result_digest 指向同一不可变结果包。
        en: Fixes the parent assessment conclusion and per-check outcomes; in this subtype it names the same immutable result package as validation_result_digest.
        ja: 親評価の結論と検査ごとの結果を固定し、このサブタイプでは validation_result_digest と同じ不変の結果パッケージを指します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:ca495cf1adc1ea166a4249243ca02ecc84f4df4b9a9cc2fa1536495d4b58f4e6
      source_claims:
        - claim-memory-validation-digest
    - id: assessed_at
      labels:
        zh: 评估完成时间
        en: assessed at
        ja: 評価完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录父类评估结论形成的时间；在验证子类中它与 validated_at 是同一个结论事件。
        en: Records when the parent assessment conclusion was formed; in validation it is the same conclusion event as validated_at.
        ja: 親評価の結論が形成された時刻を記録し、検証では validated_at と同じ結論イベントです。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:00:00.104Z"
      source_claims:
        - claim-memory-validation-activity
    - id: validation_profile_ref
      labels:
        zh: 验证配置引用
        en: validation profile reference
        ja: 検証プロファイル参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次验证使用的不可变检查配置版本，使同一记录可按相同规则重放。
        en: Identifies the immutable version of check configuration used by this validation so the same record can be replayed under the same rules.
        ja: この検証で使用する検査設定の不変バージョンを識別し、同じレコードを同じ規則で再実行できるようにします。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*@v[0-9][A-Za-z0-9._-]*$"
      example_value: memory-reuse-validation@v2
      source_claims:
        - claim-memory-validation-profile
    - id: validation_checks
      labels:
        zh: 验证检查项
        en: validation checks
        ja: 検証チェック項目
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次实际运行的明确检查，而不是以概括性“有效性”标签代替可审计程序。
        en: Lists explicit checks actually run in this validation rather than substituting a general "validity" label for an auditable procedure.
        ja: 監査可能な手順を一般的な「有効性」ラベルで置き換えず、この検証で実際に実行した明示的検査を列挙します。
      allowed_values:
        - provenance_required
        - freshness_max_age
        - consent_scope
        - trust_boundary
        - safety_policy
        - consistency
      pattern: null
      example_value:
        - provenance_required
        - freshness_max_age
        - consistency
      source_claims:
        - claim-memory-validation-profile
    - id: validation_evidence_digest
      labels:
        zh: 验证证据摘要
        en: validation evidence digest
        ja: 検証証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定支撑逐项检查的记录版本、外部来源、策略版本和运行输出清单。
        en: Fixes a manifest of record versions, external sources, policy versions, and run outputs supporting each check.
        ja: 各検査を支えるレコードバージョン、外部出所、ポリシーバージョン、実行出力のマニフェストを固定します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:4b5eb431aa76d8cb1ddad5d0e4af2c836fbe51d75109287b8961a5d8ec762e5f
      source_claims:
        - claim-memory-validation-digest
    - id: validation_verdict
      labels:
        zh: 验证判定
        en: validation verdict
        ja: 検証判定
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录由明确检查产生的可重放结论；它不直接表达如何修改或处置记录。
        en: Records the replayable conclusion produced by explicit checks; it does not directly state how to modify or dispose of records.
        ja: 明示的検査が生成する再実行可能な結論を記録し、レコードをどう変更または処分するかを直接表しません。
      allowed_values:
        - valid
        - invalid
        - conflict_detected
        - inconclusive
      pattern: null
      example_value: conflict_detected
      source_claims:
        - claim-memory-validation-verdict
    - id: validation_result_digest
      labels:
        zh: 验证结果摘要
        en: validation result digest
        ja: 検証結果ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定逐项结果与最终判定摘要，使后续解决或修订活动引用检查结果而不改写它。
        en: Fixes a digest of per-check results and final verdict so later resolution or revision can reference the check without rewriting it.
        ja: 各検査結果と最終判定のダイジェストを固定し、後続の解決または改訂が検査を改変せずに参照できるようにします。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:ca495cf1adc1ea166a4249243ca02ecc84f4df4b9a9cc2fa1536495d4b58f4e6
      source_claims:
        - claim-memory-validation-digest
    - id: validated_at
      labels:
        zh: 验证完成时间
        en: validated at
        ja: 検証完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录验证判定形成的时间，必须位于父评估活动的执行区间内。
        en: Records when the validation verdict is formed and must lie inside the parent assessment activity's execution interval.
        ja: 検証判定が形成された時刻を記録し、親評価活動の実行区間内でなければなりません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:00:00.104Z"
      source_claims:
        - claim-memory-validation-activity
  constraints:
    - id: MemoryValidation-inherited-assessment-envelope
      expression: "operation_kind = assessment, evidence_manifest_digest = validation_evidence_digest, assessment_result_digest = validation_result_digest, assessed_at = validated_at, and assessment_verdict maps valid to pass, invalid to fail, or preserves conflict_detected and inconclusive."
      explanation:
        zh: 验证不能另起一套与父类评估相矛盾的证据、结果或时间线；专用字段细化检查细节，通用字段保持同一次评估的可互操作合同。
        en: Validation cannot create a second contradictory evidence, result, or time line beside its parent assessment; specialized fields refine checks while generic fields preserve one interoperable assessment contract.
        ja: 検証は親評価とは別の矛盾した証跡、結果、時系列を作れず、専用フィールドは検査を詳細化し、汎用フィールドは一つの相互運用可能な評価契約を保持します。
      source_claims:
        - claim-memory-validation-activity
        - claim-memory-validation-digest
        - claim-memory-validation-verdict
    - id: MemoryValidation-parent-assessment-consistency
      expression: "The instance satisfies MemoryAssessmentOperation with non-empty assessment_scope, frozen evidence, target_record_refs, and no record mutation; validation adds an explicit profile and check list."
      explanation:
        zh: 验证是具体化的评估，不是独立的处置捷径；父类的只读和可审计边界仍然适用。
        en: Validation is a concrete assessment, not an independent disposition shortcut; the parent's read-only and auditable boundaries still apply.
        ja: 検証は具体化された評価であり、独立した処分の近道ではありません。親の読み取り専用かつ監査可能な境界が引き続き適用されます。
      source_claims:
        - claim-memory-validation-activity
    - id: MemoryValidation-profile-and-evidence-consistency
      expression: "validation_profile_ref identifies one immutable version, validation_checks is non-empty, and validation_evidence_digest covers each target record and check outcome."
      explanation:
        zh: 没有版本化配置或冻结证据，后续无法判定同一结论是按什么规则和事实形成的。
        en: Without a versioned profile or frozen evidence, later review cannot determine which rules and facts produced the same conclusion.
        ja: バージョン化プロファイルまたは凍結証跡なしでは、後続レビューがどの規則と事実で同じ結論が形成されたかを判断できません。
      source_claims:
        - claim-memory-validation-profile
        - claim-memory-validation-digest
    - id: MemoryValidation-verdict-boundary
      expression: "validation_verdict is valid, invalid, conflict_detected, or inconclusive and records assessment only; it must not choose a winner, generate a successor record, delete a record, or declare remediation complete."
      explanation:
        zh: 验证可给出问题结论，但选择解决方案或更改记录会越过检测与干预的边界。
        en: Validation can conclude that a problem exists, but selecting a remedy or changing a record crosses the boundary from detection to intervention.
        ja: 検証は問題の存在を結論できますが、救済策選択またはレコード変更は検出から介入への境界を越えます。
      source_claims:
        - claim-memory-validation-verdict
    - id: MemoryValidation-conflict-evidence-consistency
      expression: "When validation_verdict is conflict_detected, a linked MemoryConflict identifies at least two involved records, one comparison dimension, and incompatible values; a later resolution remains separate."
      explanation:
        zh: 冲突必须有相互不兼容的具体命题与参与记录；仅来源不同或信息不足不能创建冲突或触发解决。
        en: Conflict requires concrete incompatible propositions and participating records; different provenance or missing information alone cannot create conflict or trigger resolution.
        ja: 競合には具体的な両立しない命題と参加レコードが必要であり、出所の違いまたは情報不足だけでは競合を作成したり解決をトリガーしたりできません。
      source_claims:
        - claim-memory-validation-conflict
    - id: MemoryValidation-time-consistency
      expression: "validated_at is on or after started_at, and a terminal parent operation has ended_at on or after validated_at."
      explanation:
        zh: 验证结论必须落在实际执行区间内，不能以事后人工批注时间替代。
        en: Validation conclusion must fall inside actual execution interval and cannot be replaced by a later manual-annotation time.
        ja: 検証結論は実際の実行区間内に存在し、後の手動注釈時刻で置き換えることはできません。
      source_claims:
        - claim-memory-validation-activity
