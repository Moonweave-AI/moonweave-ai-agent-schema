schema: moonweave.ai/ontology-node/v1
id: MemoryConflict
kind: concept
status: accepted
labels:
  zh: 记忆冲突
  en: Memory conflict
  ja: 記憶競合
semantics:
  short_definition:
    zh: 两个以上记录在同一可比较命题、身份或作用域上无法同时成立的状态。
    en: A state in which two or more records cannot simultaneously hold over the same comparable proposition, identity, or scope.
    ja: 二つ以上のrecordが同一comparable proposition・identity・scopeで同時成立できないstateです。
  definition:
    zh: MemoryConflict 是由 MemoryValidation 检测的独立状态，必须列出涉及记录、冲突维度和证据；相似、重复或不同主题的记录不自动构成冲突。
    en: MemoryConflict is an independent state detected by MemoryValidation and must identify involved records, the conflict dimension, and evidence. Similar, duplicate, or topically different records do not automatically constitute conflict.
    ja: MemoryConflict はMemoryValidationが検出する独立stateでinvolved record・conflict dimension・evidenceを明示します。similar・duplicate・different-topic recordは自動でconflictになりません。
  why_needed:
    zh: 给冲突解决提供明确输入，而不把冲突误作活动或错误事件。
    en: Provides an explicit input to conflict resolution without mistaking conflict for an activity or error event.
    ja: conflict resolutionへ明示inputを与えconflictをactivity/error eventと誤認しません。
  includes:
    - zh: 纳入同一事实的矛盾值、不可兼容身份断言和互斥策略状态。
      en: Includes contradictory values for one fact, incompatible identity assertions, and mutually exclusive policy states.
      ja: 同一factのcontradictory value・incompatible identity assertion・mutually exclusive policy stateを含みます。
  excludes:
    - zh: 排除相同记录副本、可并存观点和仅缺少证据的未知状态。
      en: Excludes identical duplicates, coexisting viewpoints, and unknown states caused only by missing evidence.
      ja: identical duplicate・coexisting viewpoint・evidence不足だけのunknown stateを除外します。
  semantic_kind: state
  aliases: []
structure:
  identity_keys:
    - conflict_id
  fields:
    - id: conflict_id
      labels:
        zh: 冲突标识
        en: conflict ID
        ja: conflict ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一个可被解决活动消费的冲突状态。
        en: Identifies a conflict state consumable by a resolution activity.
        ja: resolution activityが消費できるconflict stateを識別します。
      allowed_values: []
      pattern: null
      example_value: conflict-2302
      source_claims:
        - claim-memory-conflict-002
    - id: involved_record_ids
      labels:
        zh: 涉及记录标识
        en: involved record IDs
        ja: involved record IDs
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出在同一比较维度上不兼容的记录。
        en: Lists records incompatible on the same comparison dimension.
        ja: 同一comparison dimensionでincompatibleなrecordを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - record-a
        - record-b
      source_claims:
        - claim-memory-conflict-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryConflict-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆冲突正例
      en: "Positive case: Memory conflict"
      ja: 記憶競合正例
    scenario_id: null
    descriptions:
      zh: conflict-2302 指出 record-a 与 record-b 对同一用户当前时区分别断言 UTC+8 与 UTC-5。
      en: conflict-2302 states that record-a and record-b assert UTC+8 and UTC-5 respectively for the same user's current timezone.
      ja: conflict-2302 は同一userのcurrent timezoneについてrecord-aがUTC+8、record-bがUTC-5とassertすると示します。
    field_values:
      conflict_id: conflict-2302
      involved_record_ids:
        - record-a
        - record-b
    related_node_ids:
      - MemoryConflict
    related_relation_ids: []
    expected_result:
      zh: 归类为 MemoryConflict。
      en: Classify as MemoryConflict.
      ja: MemoryConflictに分類します。
    why_valid_or_invalid:
      zh: 记录、比较命题和不兼容值均明确。
      en: The records, comparable proposition, and incompatible values are explicit.
      ja: record・comparable proposition・incompatible valueが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-conflict-001
  - id: MemoryConflict-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆冲突边界例
      en: "Boundary case: Memory conflict"
      ja: 記憶競合境界例
    scenario_id: null
    descriptions:
      zh: record-a 与 record-b 都断言用户当前时区为 UTC+8，只是来源不同。
      en: record-a and record-b both state that the user's current timezone is UTC+8 but cite different sources.
      ja: record-a/record-bはいずれもuser current timezoneをUTC+8としsourceだけ異なります。
    field_values: {}
    related_node_ids:
      - MemoryConflict
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryConflict；可作为重复或相互印证。
      en: Do not classify as MemoryConflict; treat as duplicate or corroborating evidence.
      ja: MemoryConflictでなくduplicate/corroborating evidenceとして扱います。
    why_valid_or_invalid:
      zh: 两个断言可以同时成立，没有逻辑不兼容。
      en: The two assertions can hold simultaneously and are not logically incompatible.
      ja: 二assertionは同時成立できlogical incompatibilityがありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-conflict-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryValidation-detects-MemoryConflict
  predicate: detects
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 检测记忆冲突
    en: detects memory conflict
    ja: memory conflictを検出する
  definitions:
    zh: MemoryValidation —detects→ MemoryConflict 表示验证活动发现并记录两个以上记忆断言在同一比较维度上的不兼容状态。
    en: MemoryValidation —detects→ MemoryConflict means validation finds and records an incompatibility among two or more memory assertions on the same comparison dimension.
    ja: MemoryValidation —detects→ MemoryConflict はvalidationが同一comparison dimension上の二以上memory assertion incompatibilityを発見・記録することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_detects
    labels:
      zh: 反向读取
      en: inverse detects memory conflict
      ja: 逆方向読取
  conditions:
    - id: MemoryValidation-detects-MemoryConflict-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when verdict is conflict and the conflict object lists involved-record IDs, a comparison key, and incompatible values.
      explanations:
        zh: 仅当 verdict=conflict，冲突对象列出 involved_record_ids、comparison_key 和不兼容值时成立。
        en: Assert only when verdict is conflict and the conflict object lists involved-record IDs, a comparison key, and incompatible values.
        ja: verdict=conflictでconflict objectがinvolved-record IDs・comparison key・incompatible valueを列挙する時だけassertします。
      source_claims:
        - claim-memory-conflict-001
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryValidation-detects-MemoryConflict-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 检测记忆冲突正例
        en: "Positive case: detects memory conflict"
        ja: memory conflictを検出する正例
      scenario_id: MemoryValidation-detects-MemoryConflict:positive:20260716
      descriptions:
        zh: validate-1708 比较同一用户同一偏好槽的 record-a=UTC+8 与 record-b=UTC-5，在 conflict-1708 中保存两条记录及 timezone 维度。
        en: validate-1708 compares record-a=UTC+8 with record-b=UTC-5 for the same user's timezone slot and stores both records and the timezone dimension in conflict-1708.
        ja: validate-1708 は同一 user の timezone slot について record-a=UTC+8 と record-b=UTC-5 を比較し、両 record と timezone dimension を conflict-1708 に保存します。
      field_values: {}
      related_node_ids:
        - MemoryValidation
        - MemoryConflict
      related_relation_ids:
        - MemoryValidation-detects-MemoryConflict
      expected_result:
        zh: 建立 validate-1708 detects conflict-1708，并将互斥值、比较维度及两条证据记录绑定到检测结果。
        en: Record that validate-1708 detects conflict-1708 and bind the incompatible values, comparison dimension, and both evidence records to the finding.
        ja: validate-1708 detects conflict-1708 を記録し、incompatible value・comparison dimension・両 evidence record を finding に結びます。
      why_valid_or_invalid:
        zh: 同一主体、同一槽位和重叠有效期使两个时区值无法同时成立，且冲突对象由该次验证比较直接产出。
        en: The same subject, slot, and overlapping validity interval make the timezone values mutually exclusive, and this validation comparison directly yields the conflict object.
        ja: 同一 subject・slot・重複 validity interval では二つの timezone 値が両立せず、この validation comparison が conflict object を直接導出します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-conflict-001
    - id: MemoryValidation-detects-MemoryConflict-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 检测记忆冲突边界例
        en: "Boundary case: detects memory conflict"
        ja: memory conflictを検出する境界例
      scenario_id: MemoryValidation-detects-MemoryConflict:boundary:20260716
      descriptions:
        zh: record-d 与 record-e 来自不同来源，但二者都声明同一用户时区为 UTC+8；validate-1710 的一致性检查结果为 pass。
        en: record-d and record-e have different provenance but both state UTC+8 for the same user, and validate-1710 returns pass for consistency.
        ja: record-d と record-e は provenance が異なっても同一 user に UTC+8 を述べ、validate-1710 の consistency result は pass です。
      field_values: {}
      related_node_ids:
        - MemoryValidation
        - MemoryConflict
      related_relation_ids:
        - MemoryValidation-detects-MemoryConflict
      expected_result:
        zh: 拒绝建立 validate-1710 detects conflict-1710；记录来源差异即可，不得把多来源一致证据误写成语义冲突。
        en: Reject validate-1710 detects conflict-1710; retain the provenance difference without misrepresenting corroborating sources as a semantic conflict.
        ja: validate-1710 detects conflict-1710 を拒否し、provenance difference のみ保持して corroborating source を semantic conflict と誤記しません。
      why_valid_or_invalid:
        zh: 来源不同只描述证据谱系，不构成命题不相容；缺少互斥断言时创建冲突会无端触发解决流程。
        en: Different provenance describes evidence lineage rather than incompatible propositions; creating a conflict without opposing claims would spuriously trigger resolution.
        ja: provenance difference は evidence lineage であって incompatible proposition ではなく、opposing claim なしの conflict は resolution を誤作動させます。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-conflict-001
  source_claims:
    - claim-memory-conflict-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: MemoryConflict-involves-MemoryRecord
    predicate: involves
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 涉及记忆记录
      en: involves memory record
      ja: memory recordを含む
    definitions:
      zh: MemoryConflict —involves→ MemoryRecord 表示该记录贡献了冲突中一个明确、可比较且不兼容的断言。
      en: MemoryConflict —involves→ MemoryRecord means the record contributes one explicit, comparable, and incompatible assertion in the conflict.
      ja: MemoryConflict —involves→ MemoryRecord はrecordがconflictへexplicit・comparable・incompatible assertionを一つ与えることを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
      en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
      ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
    inverse_reading:
      predicate: inverse_involves
      labels:
        zh: 反向读取
        en: inverse involves memory record
        ja: 逆方向読取
    conditions:
      - id: MemoryConflict-involves-MemoryRecord-condition-manual-001
        severity: error
        expression_language: plain
        expression: Assert only when conflict.involved_record_ids contains the target and its conflicting value can be located in that record.
        explanations:
          zh: 仅当 conflict.involved_record_ids 包含目标且能定位目标中的 conflicting_value 时成立。
          en: Assert only when conflict.involved_record_ids contains the target and its conflicting value can be located in that record.
          ja: conflict.involved_record_idsがtargetを含みrecord内conflicting_valueを定位できる時だけassertします。
        source_claims:
          - claim-memory-conflict-001
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryConflict-involves-MemoryRecord-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 涉及记忆记录正例
          en: "Positive case: involves memory record"
          ja: memory recordを含む正例
        scenario_id: MemoryConflict-involves-MemoryRecord:positive:20260716
        descriptions:
          zh: conflict-2302 的 participant_record_ids 列出 record-a 与 record-b，并分别定位到“常用时区 UTC+8”和“常用时区 UTC-5”的互斥断言。
          en: conflict-2302 lists record-a and record-b in participant_record_ids and locates their incompatible usual-timezone claims, UTC+8 and UTC-5 respectively.
          ja: conflict-2302 は participant_record_ids に record-a と record-b を列挙し、usual-timezone UTC+8 と UTC-5 という incompatible claim を各々定位します。
        field_values: {}
        related_node_ids:
          - MemoryConflict
          - MemoryRecord
        related_relation_ids:
          - MemoryConflict-involves-MemoryRecord
        expected_result:
          zh: 分别建立 conflict-2302 involves record-a 与 conflict-2302 involves record-b，使查询能够取回完整冲突参与集。
          en: Create involvement edges from conflict-2302 to both record-a and record-b so queries recover the complete set of conflict participants.
          ja: conflict-2302 から record-a と record-b への involvement edge を各々作り、query が完全な conflict participant set を取得できるようにします。
        why_valid_or_invalid:
          zh: 两条记录不仅被列为参与者，其可定位断言也正是冲突的两端，因此每条边都具有独立可审计的依据。
          en: Both records are named participants and their locatable assertions form the two sides of the conflict, giving each edge independently auditable support.
          ja: 両 record は named participant であり locatable assertion が conflict の両端を成すため、各 edge に独立監査可能な根拠があります。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-conflict-001
      - id: MemoryConflict-involves-MemoryRecord-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 涉及记忆记录边界例
          en: "Boundary case: involves memory record"
          ja: memory recordを含む境界例
        scenario_id: MemoryConflict-involves-MemoryRecord:boundary:20260716
        descriptions:
          zh: record-c 仅记录用户所在城市并出现在同一检索上下文，既未声明时区，也不在 conflict-2302 的 participant_record_ids 中。
          en: record-c only records the user's city and appears in the same retrieval context; it states no timezone and is absent from conflict-2302 participant_record_ids.
          ja: record-c は user の city のみ記録して同じ retrieval context にありますが、timezone を述べず conflict-2302 participant_record_ids にもありません。
        field_values: {}
        related_node_ids:
          - MemoryConflict
          - MemoryRecord
        related_relation_ids:
          - MemoryConflict-involves-MemoryRecord
        expected_result:
          zh: 拒绝建立 conflict-2302 involves record-c；它可以作为背景证据链接，但不能扩充该冲突的参与记录集合。
          en: Reject conflict-2302 involves record-c; it may remain linked as background evidence but must not enlarge the conflict participant set.
          ja: conflict-2302 involves record-c を拒否し、background evidence link は許しても conflict participant set を拡張しません。
        why_valid_or_invalid:
          zh: 相关背景并非冲突成员；若记录本身不承载互斥命题，把它纳入 involves 会模糊冲突边界和后续处置范围。
          en: Relevant background is not a conflict participant; a record carrying no opposing proposition would blur the conflict boundary and resolution scope.
          ja: relevant background は conflict participant ではなく、opposing proposition を持たない record の追加は conflict boundary と resolution scope を曖昧にします。
        synthetic: false
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-memory-conflict-001
    source_claims:
      - claim-memory-conflict-001
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:MemoryRecord
