schema: moonweave.ai/ontology-node/v1
id: MemoryConflict
kind: concept
labels:
  zh: 记忆冲突
  en: Memory conflict
  ja: 記憶競合
semantics:
  short_definition:
    zh: 两条以上记忆断言在同一维度上不可兼容的状态。
    en: Incompatible state among two or more memory assertions on one dimension.
    ja: 同一 dimension 上で二以上の memory assertion が両立不能な状態。
  definition:
    zh: MemoryConflict 是 MemoryValidation 发现的信息对象：列出 involved_record_ids、comparison_key 与 incompatible values，表示 contradictory facts。Mem0 与 Letta 在 add/update/search 时可检测此类冲突；它不是解决活动，解决由 MemoryConflictResolution 执行。
    en: MemoryConflict is an information object found by MemoryValidation listing involved_record_ids, comparison_key, and incompatible values for contradictory facts. Mem0 and Letta can detect such conflicts during add/update/search; it is not a resolution activity—MemoryConflictResolution performs resolution.
    ja: MemoryConflict は MemoryValidation が発見する information object。involved_record_ids/comparison_key/incompatible values で contradictory facts を表す。Mem0/Letta が検出。resolution は MemoryConflictResolution。
  why_needed:
    zh: 冲突状态必须可查询，否则 contradictory facts 只会出现在日志里而无法驱动解决流程。
    en: Conflict state must be queryable or contradictory facts remain in logs without driving resolution.
    ja: conflict state が query 不能だと contradictory facts が log に留まり resolution を驱动できない。
  includes:
    - zh: 纳入同一 comparison_key 下值互斥、时间重叠且语义矛盾的事实对。
      en: Includes mutually exclusive values under the same comparison_key with overlapping validity.
      ja: 同一 comparison_key で値互斥・時間重叠・意味矛盾の fact 対。
  excludes:
    - zh: 排除验证活动本身、解决决策与已合并后的单一记录。
      en: Excludes the validation activity itself, resolution decisions, and post-merge single records.
      ja: validation activity 自体/resolution decision/merge 後 single record を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Mem0 在 update/add 时比对已有 memories 可返回冲突提示；Letta archival_memory_search 可发现同 key 不同值 passage。conflict_id 绑定 involved_record_ids、comparison_key、values[] 与 detected_at。
    en: Mem0 may return conflict hints when add/update compares existing memories; Letta archival_memory_search can find passages with same key but different values. conflict_id binds involved_record_ids, comparison_key, values[], and detected_at.
    ja: Mem0 add/update 比較と Letta search で contradictory facts を検出。conflict_id が involved_record_ids/comparison_key/values/detected_at を bind。
  typical_input:
    - description: Contradictory facts detected
      format: |
        {
          "comparison_key": "response-language",
          "values": ["TypeScript", "Python"],
          "involved_record_ids": ["record-310-v1", "record-311-v1"]
        }
      source_claims: [claim-conflict-mem0]
  typical_output:
    - description: Conflict information object
      format: |
        {"conflict_id": "conflict-220", "status": "open", "detected_by": "validate-220"}
      source_claims: [claim-conflict-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Contradictory fact detection on add/update.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Search reveals conflicting archival passages.
structure:
  identity_keys: [conflict_id]
  fields:
    - id: conflict_id
      labels: {zh: 冲突标识, en: Conflict identifier, ja: 競合識別子}
      definitions:
        zh: 稳定标识一次检测到的记忆冲突状态。
        en: Stable identifier for one detected memory conflict state.
        ja: 一検出 memory conflict state を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: conflict-220
      allowed_values: []
      source_claims: [claim-conflict-id]
    - id: comparison_key
      labels: {zh: 比较键, en: Comparison key, ja: 比較キー}
      definitions:
        zh: 冲突发生的业务维度，如 response-language、timezone。
        en: Business dimension where conflict occurs, e.g., response-language, timezone.
        ja: response-language/timezone 等 business dimension。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: response-language
      allowed_values: []
      source_claims: [claim-conflict-key]
  constraints: []
  required_relations: []
examples:
  - id: MemoryConflict-example-mem0-language
    labels: {zh: Mem0 语言偏好冲突, en: Mem0 language preference conflict, ja: Mem0 言語選好競合}
    descriptions:
      zh: validate-220 发现 record-310 断言 TypeScript、record-311 断言 Python，登记 conflict-220 comparison_key=response-language。
      en: validate-220 finds record-310 asserts TypeScript and record-311 asserts Python; registers conflict-220 with comparison_key=response-language.
      ja: TypeScript/Python 矛盾で conflict-220 を response-language に登録。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: contradiction detection}
    field_values: {conflict_id: conflict-220, comparison_key: response-language}
    related_node_ids: [MemoryConflict, MemoryValidation]
    related_relation_ids: []
    source_claims: [claim-conflict-mem0, claim-conflict-design]
  - id: MemoryConflict-example-letta
    labels: {zh: Letta 归档冲突, en: Letta archival conflict, ja: Letta アーカイブ競合}
    descriptions:
      zh: archival_memory_search 发现两条 passage 对 API base URL 给出不同值，登记 conflict-221。
      en: archival_memory_search finds two passages giving different API base URLs; registers conflict-221.
      ja: 異なる API base URL の passage 二件で conflict-221。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: search}
    field_values: {conflict_id: conflict-221, comparison_key: api-base-url}
    related_node_ids: [MemoryConflict]
    related_relation_ids: []
    source_claims: [claim-conflict-letta, claim-conflict-design]
  - id: MemoryConflict-example-open
    labels: {zh: 未解决冲突, en: Open conflict, ja: 未解決競合}
    descriptions:
      zh: conflict-220 status=open 等待 MemoryConflictResolution；尚未产生 MemoryConflictResolutionDecision。
      en: conflict-220 status=open awaits MemoryConflictResolution; no MemoryConflictResolutionDecision yet.
      ja: conflict-220 open で MemoryConflictResolution 待ち。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: open state}
    field_values: {conflict_id: conflict-220, status: open}
    related_node_ids: [MemoryConflict, MemoryConflictResolution]
    related_relation_ids: []
    source_claims: [claim-conflict-design]
  - id: MemoryConflict-example-not-resolution
    labels: {zh: 冲突非解决, en: Conflict is not resolution, ja: 競合は resolution ではない}
    descriptions:
      zh: resolve-220 是 MemoryConflictResolution 活动；conflict-220 只是检测到的信息状态。
      en: resolve-220 is a MemoryConflictResolution activity; conflict-220 is only the detected information state.
      ja: resolve-220 は activity、conflict-220 は検出情報状態。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryConflict, MemoryConflictResolution]
    related_relation_ids: []
    source_claims: [claim-conflict-design]
parent_relation:
  id: MemoryValidation-detects-MemoryConflict
  predicate: detects
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 检测记忆冲突
    en: detects memory conflict
    ja: memory conflict を検出
  definitions:
    zh: MemoryValidation —detects→ MemoryConflict 表示验证活动发现并记录 incompatible assertions。
    en: MemoryValidation —detects→ MemoryConflict means validation finds and records incompatible assertions.
    ja: MemoryValidation —detects→ MemoryConflict は validation が incompatible assertion を発見・記録。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse detects, ja: 逆方向読取}}
  conditions:
    - id: MemoryValidation-detects-MemoryConflict-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when verdict=conflict and involved_record_ids, comparison_key, and incompatible values are listed.
      explanations:
        zh: 仅当 verdict=conflict 且列出 involved_record_ids、comparison_key 与 incompatible values 时成立。
        en: Assert only when verdict=conflict and involved_record_ids, comparison_key, and incompatible values are listed.
        ja: verdict=conflict で involved_record_ids/comparison_key/incompatible values 列挙時のみ。
      source_claims: [claim-conflict-design]
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-conflict-design]
relations: []
sources:
  - id: src-mem0-conflict
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: Contradictory fact detection in Mem0.
  - id: src-letta-conflict
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: Conflicting passages in archival search.
  - id: src-conflict-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: MemoryConflict as information distinct from resolution.
source_claims:
  - id: claim-conflict-mem0
    source: src-mem0-conflict
    supports: Mem0 can detect contradictory facts among stored memories during add/update.
    locator: Memory operations
    evidence_kind: primary-api
    confidence: high
  - id: claim-conflict-letta
    source: src-letta-conflict
    supports: Letta archival search can reveal conflicting passages on the same topic or key.
    locator: archival_memory_search
    evidence_kind: primary-doc
    confidence: high
  - id: claim-conflict-design
    source: src-conflict-design
    supports: MemoryConflict records incompatible assertions as queryable information.
    locator: MemoryConflict boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-conflict-id
    source: src-conflict-design
    supports: conflict_id identifies one conflict state.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-conflict-key
    source: src-conflict-design
    supports: comparison_key names the dimension of incompatibility.
    locator: structure
    evidence_kind: design-inference
    confidence: high
