    zh: 此主干组合关系表达验证产生的冲突发现，不表达参与记录本身、解决选择或任何记录处置。
    en: This backbone composition relation expresses a conflict finding produced by validation, not participant records themselves, resolution choice, or any record disposition.
    ja: この主幹構成関係は検証が生成する競合発見を表し、参加レコードそのもの、解決選択、レコード処分を表すものではありません。
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: MemoryConflict-involves-MemoryRecord
    predicate: involves
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 涉及记忆记录
      en: involves memory record
      ja: 記憶レコードを含む
    definitions:
      zh: MemoryConflict —involves→ MemoryRecord 表示该记录在冲突比较键上贡献了一个可定位且不兼容的断言。
      en: MemoryConflict —involves→ MemoryRecord means the record contributes one locatable and incompatible assertion at the conflict comparison key.
      ja: MemoryConflict —involves→ MemoryRecord は、そのレコードが競合比較キーで位置付け可能かつ両立しない主張を一つ提供することを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个冲突状态可涉及两个或多个记录，具体数目由不兼容断言集合决定。
      en: A conflict state can involve two or more records; the set of incompatible assertions determines the count.
      ja: 一つの競合状態は二つ以上のレコードを含み得て、両立しない主張の集合が数を決めます。
    inverse_reading:
      predicate: participates_in_conflict
      labels:
        zh: 参与记忆冲突
        en: participates in memory conflict
        ja: 記憶競合に参加する
    conditions:
      - id: MemoryConflict-involves-MemoryRecord-assertion-match
        severity: error
        expression_language: plain
        expression: "Assert only when involved_record_refs contains the target and incompatible_assertions contains a locatable value from that record for comparison_key."
        explanation:
          zh: 同一检索上下文或相关背景不足以成为冲突参与者；每条边都需要该记录的具体相斥断言支持。
          en: Same retrieval context or relevant background is insufficient for conflict participation; each edge needs the record's concrete incompatible assertion.
          ja: 同じ検索文脈または関連背景では競合参加に不十分であり、各辺にはレコードの具体的な両立しない主張が必要です。
        source_claims:
          - claim-memory-conflict-incompatibility
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryConflict-involves-MemoryRecord-example-positive

        labels:
          zh: 两条相斥时区记录参与冲突
          en: Two incompatible timezone records participate in conflict
          ja: 二つの両立しないタイムゾーンレコードが競合に参加する

        descriptions:
          zh: conflict-2302 列出 record-1710-utc8-v1 和 record-1710-utc5-v1，并定位二者在当前时区键上的 UTC+8/UTC-5 值。
          en: conflict-2302 lists record-1710-utc8-v1 and record-1710-utc5-v1 and locates their UTC+8 and UTC-5 values at the current-timezone key.
          ja: conflict-2302 は record-1710-utc8-v1 と record-1710-utc5-v1 を列挙し、現在タイムゾーンキーでの UTC+8 と UTC-5 を位置付けます。
        field_values:
          conflict_id: conflict-2302
          involved_record_refs:
            - record-1710-utc8-v1
            - record-1710-utc5-v1
          comparison_key: preference.current_timezone
          target_record_ref: record-1710-utc8-v1
          target_value: UTC+8
        related_node_ids:
          - MemoryConflict
          - MemoryRecord
        related_relation_ids:
          - MemoryConflict-involves-MemoryRecord

        source_claims:
          - claim-memory-conflict-incompatibility
      - id: MemoryConflict-involves-MemoryRecord-example-boundary-background

        labels:
          zh: 背景城市记录不参与时区冲突
          en: Background city record does not participate in timezone conflict
          ja: 背景都市レコードはタイムゾーン競合に参加しない

        descriptions:
          zh: record-1710-city-v1 只记录用户所在城市，出现在同一检索上下文，但没有当前时区断言且未被列为参与者。
          en: record-1710-city-v1 only records the user's city and appears in the same retrieval context, but has no current-timezone assertion and is not listed as participant.
          ja: record-1710-city-v1 はユーザーの都市だけを記録し同じ検索文脈に現れますが、現在タイムゾーン主張を持たず参加者として列挙されません。
        field_values:
          conflict_id: conflict-2302
          comparison_key: preference.current_timezone
          target_record_ref: record-1710-city-v1
          target_value: absent
          target_in_involved_record_refs: false
        related_node_ids:
          - MemoryConflict
          - MemoryRecord
        related_relation_ids:
          - MemoryConflict-involves-MemoryRecord

        source_claims:
          - claim-memory-conflict-incompatibility
    source_claims:
      - claim-memory-conflict-incompatibility
    distinct_fact_rationale:
      zh: 此边表达记录在具体冲突中的参与，不表达验证活动、记录来源、解决赢家或后续处置。
      en: This edge expresses a record's participation in a specific conflict, not the validation activity, record provenance, resolution winner, or later disposition.
      ja: この辺は具体的競合へのレコード参加を表し、検証活動、レコード provenance、解決勝者、後続処分を表すものではありません。
    layout_role: cross-link
    target: concept:MemoryRecord
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, usage, and generated findings as distinguishable provenance facts.
  - id: nist-ai-rmf
    title: NIST AI Risk Management Framework 1.0
    source_type: standard
    url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
    relevance: Separates identifying and measuring findings from deciding and implementing treatments.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180-4/upd1/final
    relevance: Specifies SHA-256 digests used to bind conflict comparison evidence.
source_claims:
  - id: claim-memory-conflict-state
    source: w3c-prov-o
    supports: PROV-O distinguishes entities and activity occurrences. Moonweave models a detected conflict as a separately identifiable state object rather than the validation activity that found it or a later resolution activity.
    locator: "PROV-O sections 3.1 Activity and 3.2 Entity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-identity
    source: w3c-prov-o
    supports: PROV-O allows independent identifiers for entities and activities. Moonweave assigns conflict_id independently from validation operation identity so multiple findings and later treatments remain traceable.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-detection
    source: w3c-prov-o
    supports: PROV-O distinguishes an activity's output from the activity itself. Moonweave links a conflict finding to the validation that detected it and preserves distinct identities for validation and conflict state.
    locator: "PROV-O sections on activity, entity, usage, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-incompatibility
    source: nist-ai-rmf
    supports: The NIST AI RMF distinguishes identifying a risk or finding from acting on it. Moonweave requires explicit comparable assertions and evidence before calling records conflict, rather than treating similarity, provenance difference, or uncertainty as incompatibility.
    locator: "NIST AI RMF functions MAP and MEASURE"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies secure-hash algorithms that produce fixed-size message digests. Moonweave stores an evidence digest over record versions, validity intervals, comparison rules, and validation output supporting a conflict.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-boundary
    source: nist-ai-rmf
    supports: The NIST AI RMF separates measuring a finding from managing a treatment. Moonweave keeps selected records, remediation strategy, output records, and disposition results out of the detected conflict state.
    locator: "NIST AI RMF functions MEASURE and MANAGE"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-conflict-evidence
    source: nist-ai-rmf
    supports: An assessment finding must have enough evidence to support a conclusion. Moonweave uses inconclusive validation instead of MemoryConflict when a comparable value, shared key, or overlapping validity evidence is missing.
    locator: "NIST AI RMF functions MEASURE and GOVERN"
    evidence_kind: ontology-design-inference
    confidence: medium
