schema: moonweave.ai/ontology-node/v1
id: MemoryConflict
kind: concept
status: accepted
labels:
  zh: 记忆冲突
  en: Memory conflict
  ja: 記憶競合
semantics:
  short_definition:
    zh: 由验证发现的、对同一可比较事实存在不兼容断言的可引用状态。
    en: A referencable state detected by validation in which incompatible assertions exist for the same comparable fact.
    ja: 検証により検出され、同じ比較可能な事実について両立しない主張が存在する参照可能な状態です。
  definition:
    zh: MemoryConflict 是一个由 MemoryValidation 检测并记录的状态，标识至少两个既有 MemoryRecord 在同一主体、比较键和重叠有效期内作出不兼容断言，并保留参与记录、冲突维度、相斥值与证据摘要。它不是验证活动、错误事件、重复记录、来源差异、信息不足或冲突解决决定。
    en: MemoryConflict is a state detected and recorded by MemoryValidation that identifies at least two existing MemoryRecord instances making incompatible assertions for the same subject, comparison key, and overlapping validity interval, retaining participating records, conflict dimension, incompatible values, and evidence digest. It is not the validation activity, an error event, duplicate records, provenance difference, missing information, or a conflict-resolution decision.
    ja: MemoryConflict は MemoryValidation により検出・記録される状態で、同じ主体、比較キー、重複する有効期間について両立しない主張を行う少なくとも二つの既存 MemoryRecord を識別し、参加レコード、競合次元、相斥値、証跡ダイジェストを保持します。検証活動、エラーイベント、重複レコード、provenance の違い、情報不足、競合解決決定ではありません。
  why_needed:
    zh: 冲突解决需要可审计的明确输入；将冲突误作活动或自动把相似记录称为冲突会导致错误处置。
    en: Conflict resolution needs an explicit auditable input; mistaking conflict for an activity or automatically calling similar records conflict causes erroneous disposition.
    ja: 競合解決には明示的で監査可能な入力が必要であり、競合を活動と誤認したり、類似レコードを自動的に競合と呼んだりすると誤った処分につながります。
  includes:
    - zh: 对同一事实的矛盾值、不可兼容身份断言或相互排斥的策略状态，且存在可验证的记录与证据。
      en: Contradictory values for the same fact, incompatible identity assertions, or mutually exclusive policy states with verifiable records and evidence.
      ja: 検証可能なレコードと証跡を持つ、同一事実の矛盾値、両立しない識別主張、または相互排他的なポリシー状態を含みます。
  excludes:
    - zh: 相同副本、可并存的不同观点、不重叠时段的历史值、仅有不同来源的相同断言、或因为证据不足而无法判断的情况。
      en: Identical duplicates, coexisting different views, historical values in non-overlapping intervals, same assertions from different provenance, or cases that are merely undecidable from insufficient evidence.
      ja: 同一の複製、共存可能な異なる見解、重ならない期間の履歴値、異なる provenance による同一主張、または証跡不足で判断できないだけのケースを除外します。
  semantic_kind: state
  aliases: []
engineering:
  explanation:
    zh: 将冲突实现为含参与者和可重放比较证据的状态记录；验证创建该发现，后续解决活动只引用它并另行记录决策。
    en: Implement conflict as a state record with participants and replayable comparison evidence; validation creates the finding, while a later resolution only references it and records a separate decision.
    ja: 競合を参加者と再実行可能な比較証跡を持つ状態記録として実装します。検証が発見を作成し、後続解決はそれを参照して別の決定を記録するだけです。
  typical_input:
    - description: Validation result over at least two existing records with one shared comparison key and incompatible assertions.
      format: "{validation_operation_id, involved_record_refs, comparison_key, incompatible_assertions, evidence_manifest_digest}"
  typical_output:
    - description: Open conflict state consumable by a later resolution activity without embedding a winning choice.
      format: "{conflict_id, conflict_kind, conflict_state: detected, detected_at, evidence_digest}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines distinct activities and entities so a validation finding remains separate from its later treatment.
    - name: NIST AI Risk Management Framework
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
      description: Separates identifying or measuring a finding from choosing and implementing a treatment.
  source_claims:
    - claim-memory-conflict-state
    - claim-memory-conflict-boundary
structure:
  identity_keys:
    - conflict_id
  fields:
    - id: conflict_id
      labels:
        zh: 冲突标识
        en: conflict ID
        ja: 競合 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可被后续解决活动引用的冲突状态，而不等同于检测它的验证操作标识。
        en: Stably identifies one conflict state referenceable by later resolution activity and is distinct from the validation operation identity that detected it.
        ja: 後続解決活動が参照できる一つの競合状態を安定して識別し、検出した検証操作識別とは区別されます。
      allowed_values: []
      pattern: "^conflict-[a-z0-9][a-z0-9-]*$"
      example_value: conflict-2302
      source_claims:
        - claim-memory-conflict-identity
    - id: validation_operation_ref
      labels:
        zh: 检测验证操作引用
        en: detecting validation operation reference
        ja: 検出検証操作参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际检测此冲突的 MemoryValidation，使状态可回溯到明确的检查配置与证据。
        en: References the MemoryValidation that actually detected this conflict so the state traces back to explicit checks and evidence.
        ja: この競合を実際に検出した MemoryValidation を参照し、状態を明示的な検査と証跡へ追跡できるようにします。
      allowed_values: []
      pattern: "^mem-op-[a-z0-9][a-z0-9-]*$"
      example_value: mem-op-validate-1710
      source_claims:
        - claim-memory-conflict-detection
    - id: involved_record_refs
      labels:
        zh: 涉及记录引用
        en: involved record references
        ja: 関与レコード参照
      datatype: string
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出对同一比较键作出相斥断言的既有记录；每个记录都必须贡献可定位的冲突值。
        en: Lists existing records making incompatible assertions for the same comparison key; each record must contribute a locatable conflicting value.
        ja: 同じ比較キーに対して両立しない主張を行う既存レコードを列挙し、各レコードは位置付け可能な競合値を提供しなければなりません。
      allowed_values: []
      pattern: "^record-[A-Za-z0-9._-]+$"
      example_value:
        - record-1710-utc8-v1
        - record-1710-utc5-v1
      source_claims:
        - claim-memory-conflict-incompatibility
    - id: comparison_key
      labels:
        zh: 比较键
        en: comparison key
        ja: 比較キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明参与记录中被比较的同一事实槽位或属性，避免仅凭主题相似断言冲突。
        en: Names the same fact slot or property compared across participating records, preventing conflict assertion from mere topical similarity.
        ja: 参加レコード間で比較される同じ事実スロットまたは属性を示し、単なるトピック類似から競合を主張することを防ぎます。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._:-]*$"
      example_value: preference.current_timezone
      source_claims:
        - claim-memory-conflict-incompatibility
    - id: incompatible_assertions
      labels:
        zh: 不兼容断言
        en: incompatible assertions
        ja: 両立しない主張
      datatype: json
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 记录每个参与记录在比较键上的具体相斥值或状态，而不是只保存“有冲突”的布尔标记。
        en: Records concrete incompatible values or states for each participating record at the comparison key rather than only storing a boolean that conflict exists.
        ja: 競合が存在するというブール値だけでなく、比較キーでの各参加レコードの具体的な両立しない値または状態を記録します。
      allowed_values: []
      pattern: null
      example_value:
        - record_ref: record-1710-utc8-v1
          value: UTC+8
        - record_ref: record-1710-utc5-v1
          value: UTC-5
      source_claims:
        - claim-memory-conflict-incompatibility
    - id: conflict_kind
      labels:
        zh: 冲突类别
        en: conflict kind
        ja: 競合種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分值矛盾、身份不兼容或策略状态互斥，帮助后续解决选择合适流程而不预先选择结果。
        en: Distinguishes value contradiction, identity incompatibility, or policy-state exclusion, helping later resolution select an appropriate process without preselecting an outcome.
        ja: 値の矛盾、識別の非互換、ポリシー状態の相互排他を区別し、結果を事前選択せず後続解決が適切なプロセスを選べるようにします。
      allowed_values:
        - value_contradiction
        - identity_incompatibility
        - policy_state_exclusion
      pattern: null
      example_value: value_contradiction
      source_claims:
        - claim-memory-conflict-incompatibility
    - id: evidence_digest
      labels:
        zh: 冲突证据摘要
        en: conflict evidence digest
        ja: 競合証跡ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定支撑冲突判断的记录版本、有效时间、比较规则和验证输出摘要。
        en: Fixes a digest of record versions, validity times, comparison rules, and validation outputs supporting the conflict finding.
        ja: 競合発見を支えるレコードバージョン、有効時間、比較規則、検証出力のダイジェストを固定します。
      allowed_values: []
      pattern: "^sha256:[a-f0-9]{64}$"
      example_value: sha256:bc55633989d2442efcc1265ddaefc4a7e0295c1845d7916f2baf67f4e0f98161
      source_claims:
        - claim-memory-conflict-digest
    - id: conflict_state
      labels:
        zh: 冲突状态
        en: conflict state
        ja: 競合状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 表明该对象是被验证检测到并可供后续解决消费的开放冲突状态，不记录解决赢家或处置结果。
        en: States that this object is an open conflict state detected by validation and consumable by later resolution, without recording a winning choice or disposition result.
        ja: このオブジェクトが検証で検出され後続解決により消費可能なオープン競合状態であり、勝者選択または処分結果を記録しないことを示します。
      allowed_values:
        - detected
      pattern: null
      example_value: detected
      source_claims:
        - claim-memory-conflict-state
    - id: detected_at
      labels:
        zh: 检测时间
        en: detected at
        ja: 検出時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录验证形成冲突发现的时间，必须与检测验证的 validated_at 对齐。
        en: Records when validation forms the conflict finding and must align with the detecting validation's validated_at.
        ja: 検証が競合発見を形成した時刻を記録し、検出検証の validated_at と整合しなければなりません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T21:30:00.099Z"
      source_claims:
        - claim-memory-conflict-detection
  constraints:
    - id: MemoryConflict-detection-provenance
      expression: "validation_operation_ref identifies a MemoryValidation with validation_verdict=conflict_detected, and detected_at equals or follows that validation's validated_at within the same execution evidence."
      explanation:
        zh: 冲突不是无来源的标签；它必须由具体验证活动、配置和证据产生，不能从事后解决结果倒推。
        en: Conflict is not a source-free label; it must arise from a concrete validation activity, profile, and evidence and cannot be inferred backward from a later resolution result.
        ja: 競合は出所のないラベルではなく、具体的な検証活動、プロファイル、証跡から生じなければならず、後続解決結果から逆推論できません。
      source_claims:
        - claim-memory-conflict-detection
    - id: MemoryConflict-incompatibility-boundary
      expression: "involved_record_refs contains at least two distinct records that assert incompatible values or states for comparison_key over overlapping validity; equal values, different provenance alone, or non-overlapping historical intervals do not satisfy this conflict."
      explanation:
        zh: 冲突需要同一可比较命题的真实不相容；相似、重复或仅来源不同会错误扩大解决范围。
        en: Conflict needs real incompatibility for one comparable proposition; similarity, duplication, or provenance difference alone would falsely expand resolution scope.
        ja: 競合には一つの比較可能命題についての実際の非互換性が必要で、類似、重複、provenance の違いだけでは解決範囲を誤って拡張します。
      source_claims:
        - claim-memory-conflict-incompatibility
    - id: MemoryConflict-evidence-consistency
      expression: "evidence_digest covers every involved record version, comparison_key, incompatible_assertion, and applicable validity interval; missing evidence produces inconclusive validation rather than MemoryConflict."
      explanation:
        zh: 证据不足只能说明尚不能判断，不应被升级为冲突并触发不必要的处理。
        en: Missing evidence means the finding is not yet decidable and must not be upgraded to conflict that triggers unnecessary handling.
        ja: 証跡不足は発見がまだ判断不能であることを意味し、不必要な処理をトリガーする競合へ昇格してはなりません。
      source_claims:
        - claim-memory-conflict-digest
    - id: MemoryConflict-no-resolution-in-state
      expression: "conflict_state remains detected and carries no selected_record_ref, resolution_strategy, output_record_ref, or disposition result; those facts belong to a separate MemoryConflictResolution activity."
      explanation:
        zh: 状态对象应保留问题而非隐藏解决决策；将赢家写进冲突会丢失检测与处理的可审计顺序。
        en: The state object must retain the problem rather than hide a resolution decision; writing the winner into conflict loses auditable ordering between detection and treatment.
        ja: 状態オブジェクトは解決決定を隠さず問題を保持しなければならず、競合に勝者を書き込むと検出と処置の監査可能な順序が失われます。
      source_claims:
        - claim-memory-conflict-boundary
  required_relation_constraints: []
examples:
  - id: MemoryConflict-example-positive-timezone

    labels:
      zh: 同一用户当前时区的互斥断言
      en: Mutually exclusive current-timezone assertions for one user
      ja: 同一ユーザーの現在タイムゾーンに関する相互排他的主張

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      conflict_id: conflict-2302
      validation_operation_ref: mem-op-validate-1710
      involved_record_refs:
        - record-1710-utc8-v1
        - record-1710-utc5-v1
      comparison_key: preference.current_timezone
      incompatible_assertions:
        - record_ref: record-1710-utc8-v1
          value: UTC+8
        - record_ref: record-1710-utc5-v1
          value: UTC-5
      conflict_kind: value_contradiction
      evidence_digest: sha256:bc55633989d2442efcc1265ddaefc4a7e0295c1845d7916f2baf67f4e0f98161
      conflict_state: detected
      detected_at: "2026-07-18T21:30:00.099Z"
    related_node_ids:
      - MemoryConflict
      - MemoryValidation
      - MemoryRecord
    related_relation_ids:
      - MemoryValidation-detects-MemoryConflict
      - MemoryConflict-involves-MemoryRecord
      - MemoryValidation-evaluates-MemoryRecord

    source_claims:
      - claim-memory-conflict-detection
      - claim-memory-conflict-incompatibility
      - claim-memory-conflict-state
  - id: MemoryConflict-example-counterexample-corroborating

    labels:
      zh: 不同来源的一致断言不是冲突
      en: Matching assertions from different provenance are not conflict
      ja: 異なる provenance の一致主張は競合ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      comparison_key: preference.current_timezone
      record_a_ref: record-2303-a
      record_a_value: UTC+8
      record_b_ref: record-2303-b
      record_b_value: UTC+8
      validation_verdict: valid
      provenance_equal: false
    related_node_ids:
      - MemoryConflict
      - MemoryValidation
      - MemoryRecord
    related_relation_ids:
      - MemoryValidation-detects-MemoryConflict
      - MemoryConflict-involves-MemoryRecord

    source_claims:
      - claim-memory-conflict-incompatibility
  - id: MemoryConflict-example-boundary-inconclusive

    labels:
      zh: 证据不足的未知状态
      en: Inconclusive state from insufficient evidence
      ja: 証跡不足による結論不能状態

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      comparison_key: preference.current_timezone
      record_a_ref: record-2304-a
      record_a_value: UTC+8
      record_b_ref: record-2304-b
      record_b_value: absent
      shared_validity_interval: absent
      validation_verdict: inconclusive
    related_node_ids:
      - MemoryConflict
      - MemoryValidation
      - MemoryRecord
    related_relation_ids:
      - MemoryValidation-detects-MemoryConflict
      - MemoryConflict-involves-MemoryRecord

    source_claims:
      - claim-memory-conflict-evidence
  - id: MemoryConflict-example-instance-policy-exclusion

    labels:
      zh: 互斥保留策略状态实例
      en: Instance of mutually exclusive retention-policy states
      ja: 相互排他的保持ポリシー状態のインスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      conflict_id: conflict-2310
      validation_operation_ref: mem-op-validate-2310
      involved_record_refs:
        - record-2310-retain-v1
        - record-2310-delete-v1
      comparison_key: retention.required_action
      incompatible_assertions:
        - record_ref: record-2310-retain-v1
          value: retain
        - record_ref: record-2310-delete-v1
          value: delete_immediately
      conflict_kind: policy_state_exclusion
      evidence_digest: sha256:01f65976373dde95468f0a9ea39c4422b40d79a675ecdba3ee251c1cf9ed3d2f
      conflict_state: detected
      detected_at: "2026-07-18T22:00:00.075Z"
    related_node_ids:
      - MemoryConflict
      - MemoryValidation
      - MemoryRecord
    related_relation_ids:
      - MemoryValidation-detects-MemoryConflict
      - MemoryConflict-involves-MemoryRecord

    source_claims:
      - claim-memory-conflict-detection
      - claim-memory-conflict-incompatibility
      - claim-memory-conflict-boundary
parent_relation:
  id: MemoryValidation-detects-MemoryConflict
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 检测记忆冲突
    en: detects memory conflict
    ja: 記憶競合を検出する
  definitions:
    zh: MemoryValidation —detects→ MemoryConflict 表示验证活动对明确检查证据形成冲突发现，并将该状态与后续解决活动分离。
    en: MemoryValidation —detects→ MemoryConflict means validation forms a conflict finding from explicit check evidence and keeps that state separate from later resolution activity.
    ja: MemoryValidation —detects→ MemoryConflict は、検証が明示的検査証跡から競合発見を形成し、その状態を後続解決活動から分離することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次验证可检测零个、一个或多个独立冲突，具体数目由可验证的相斥断言集合决定。
    en: One validation may detect zero, one, or many independent conflicts; verifiable sets of incompatible assertions determine the count.
    ja: 一つの検証はゼロ、一つ、または複数の独立競合を検出でき、検証可能な両立しない主張の集合が数を決めます。
  inverse_reading:
    predicate: is_detected_by_validation
    labels:
      zh: 被记忆验证检测
      en: is detected by memory validation
      ja: 記憶検証により検出される
  conditions:
    - id: MemoryValidation-detects-MemoryConflict-evidence-match
      severity: error
      expression_language: plain
      expression: "Assert only when validation_verdict is conflict_detected, validation_operation_ref identifies that validation, and the conflict lists involved records, comparison_key, incompatible_assertions, and evidence_digest."
      explanation:
        zh: 验证失败、来源差异或笼统异常不足以创建冲突；必须有可追溯的具体不相容比较。
