schema: moonweave.ai/ontology-node/v1
id: MemoryRevisionOperation
kind: concept
status: accepted
labels:
  zh: 记忆修订操作
  en: Memory revision operation
  ja: 記憶改訂操作
semantics:
  short_definition:
    zh: 使用一个或多个既有记录版本并产生具有独立身份和可追溯谱系的新记录版本的记忆操作。
    en: A memory operation that uses one or more existing record versions and produces a new record version with independent identity and traceable lineage.
    ja: 一つ以上の既存記録バージョンを使用し、独立した識別子と追跡可能な来歴を持つ新しい記録バージョンを生成する記憶操作です。
  definition:
    zh: MemoryRevisionOperation 是已执行的 MemoryOperation：它读取一个或多个稳定的前驱 MemoryRecord 版本，依据明确修订基础形成新的后继 MemoryRecord 身份，并记录前驱、后继、谱系证据和发生时间。前驱版本在本概念中不被原地覆盖；单一主要前驱的定向修改可归入 MemoryUpdate，多前驱综合、抽象、压缩或反思可归入 MemorySynthesisOperation。首写、只读验证、仅改变排序强度、仅标记过期、删除或驱逐均不是修订。
    en: "MemoryRevisionOperation is an executed MemoryOperation: it reads one or more stable predecessor MemoryRecord versions, forms a new successor MemoryRecord identity from an explicit revision basis, and records predecessors, successor, lineage evidence, and occurrence time. Predecessor versions are not overwritten in place in this concept; a targeted change with one principal predecessor may be MemoryUpdate, while multi-predecessor synthesis, abstraction, compaction, or reflection may be MemorySynthesisOperation. Initial write, read-only validation, changing ranking strength only, expiry marking only, deletion, and eviction are not revision."
    ja: MemoryRevisionOperation は実行済みの MemoryOperation です。一つ以上の安定した前駆 MemoryRecord バージョンを読み、明示的な改訂根拠から新しい後継 MemoryRecord 識別子を形成し、前駆、後継、来歴証拠、発生時刻を記録します。この概念では前駆バージョンをその場で上書きしません。一つの主要前駆に対する対象変更は MemoryUpdate、多前駆の統合、抽象化、圧縮、反省は MemorySynthesisOperation になり得ます。初回書込み、読み取り専用検証、順位強度のみの変更、期限印付けのみ、削除、追い出しは改訂ではありません。
  why_needed:
    zh: 保留版本谱系能让系统回答哪个活动基于哪些事实生成了哪个后继，并防止原地覆盖、评估或处置活动伪装成内容修订。
    en: Retained version lineage lets a system answer which activity generated which successor from which facts and prevents in-place overwrite, assessment, or disposition activity from masquerading as content revision.
    ja: 保持されたバージョン来歴により、どの活動がどの事実からどの後継を生成したかを回答でき、その場での上書き、評価、処置活動が内容改訂を装うことを防ぎます。
  includes:
    - zh: 具有稳定前驱、明确修订基础、新后继身份和谱系证据的定向更新、合并、巩固、压缩、摘要重建或反思生成。
      en: Targeted update, merge, consolidation, compaction, summary reconstruction, or reflection generation with stable predecessors, explicit revision basis, new successor identity, and lineage evidence.
      ja: 安定した前駆、明示的な改訂根拠、新しい後継識別子、来歴証拠を持つ対象更新、マージ、統合、圧縮、要約再構成、反省生成を含みます。
  excludes:
    - zh: 初次写入、原地覆盖、只读验证、没有后继的检索重排、到期标记、删除、驱逐和仅提出尚未执行的修订计划。
      en: Initial write, in-place overwrite, read-only validation, retrieval re-ranking with no successor, expiry marking, deletion, eviction, and a revision plan that has not executed.
      ja: 初回書込み、その場での上書き、読み取り専用検証、後継を生成しない検索再順位付け、期限印付け、削除、追い出し、未実行の改訂計画を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将修订实现为追加式版本转换：读取精确前驱版本，固定修订基础和证据，创建新的后继身份，并把前驱到后继的谱系与发生时间一起记录。内容变化不能通过修改原记录来伪造后继，也不能因文本相似、同一主体或相邻时间而猜测谱系。
    en: "Implement revision as an append-only version transition: read exact predecessor versions, fix revision basis and evidence, create a new successor identity, and record predecessor-to-successor lineage with occurrence time. A content change cannot fabricate a successor by mutating the original record, and lineage cannot be guessed from text similarity, shared subject, or nearby time."
    ja: 改訂は追記型のバージョン遷移として実装します。正確な前駆バージョンを読み、改訂根拠と証拠を固定し、新しい後継識別子を作成し、前駆から後継への来歴と発生時刻を記録します。内容変更は元記録を変更して後継を捏造できず、テキスト類似、共有主体、近接時刻から来歴を推測できません。
  typical_input:
    - description: Stable predecessor record versions, explicit revision basis, applicable policy or consent context, executor identity, and operation start time.
      format: "{operation_id, predecessor_record_refs, revision_basis, policy_ref?, actor_ref, started_at}"
  typical_output:
    - description: A new successor record identity with predecessor lineage, evidence digest, revision mode, occurrence time, result, and audit reference.
      format: "{operation_id, successor_record_ref, revision_mode, lineage_evidence_digest, revised_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding revision lineage evidence.
  source_claims:
    - claim-memory-revision-operation-activity
    - claim-memory-revision-operation-lineage
    - claim-memory-revision-operation-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次修订的前驱、后继、依据、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one revision's predecessors, successor, basis, result, and audit facts.
        ja: 一つの改訂の前駆、後継、根拠、結果、監査事実を結ぶために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-revise-3201
      source_claims:
        - claim-memory-revision-operation-identity
    - id: operation_kind
      labels:
        zh: 操作类别
        en: operation kind
        ja: 操作種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 revision，表明该活动把已有记录沿明确血缘改写为不同的后继记录。
        en: Narrows the parent operation kind to revision and records an executed transformation from existing records to a distinct successor.
        ja: 親の操作種別を revision に限定し、既存レコードを明示的な来歴に沿って別の後継レコードへ変換する実行済み活動を記録します。
      allowed_values:
        - revision
      pattern: null
      example_value: revision
      source_claims:
        - claim-memory-revision-operation-activity
    - id: status
      labels:
        zh: 运行状态
        en: runtime status
        ja: 実行状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录修订活动的运行或终态，不能以新记录是否被采用来替代。
        en: Records the runtime or terminal state of the revision activity, not whether a successor record was later adopted.
        ja: 修訂活動の実行中または終端の状態を記録し、後継レコードが後で採用されたかとは区別します。
      allowed_values:
        - running
        - succeeded
        - failed
        - partially_succeeded
        - rejected
        - cancelled
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-memory-revision-operation-activity
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录执行者实际开始处理前序记录和修订依据的时间，不以任一记录版本的创建时间代替。
        en: Records when the executor actually began processing predecessors and revision basis, not the creation time of either record version.
        ja: 実行者が前任レコードと修訂根拠の処理を実際に始めた時刻を記録し、いずれかのレコード版の作成時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T03:00:00Z"
      source_claims:
        - claim-memory-revision-operation-activity
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: executor reference
        ja: 実行主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行这次记录修订的主体，而不是提供更正证据的用户。
        en: References the actor that actually performs this record revision, not a user who merely supplied correction evidence.
        ja: 修正証跡を提供しただけの利用者ではなく、このレコード修訂を実際に行う主体を参照します。
      allowed_values: []
      pattern: "^[A-Za-z0-9][A-Za-z0-9._:@/-]*$"
      example_value: memory-revision-worker-1
      source_claims:
        - claim-memory-revision-operation-activity
    - id: predecessor_record_refs
      labels:
        zh: 前驱记录引用
        en: predecessor record references
        ja: 前駆記録参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次活动实际读取且仍保留身份与内容可复核性的前驱 MemoryRecord 版本；相似记录或同主体记录不能替代精确版本。
        en: Lists predecessor MemoryRecord versions actually read by this activity that retain their identity and reviewable content; similar records or records of the same subject cannot substitute for exact versions.
        ja: この活動が実際に読み、識別子と検証可能な内容を保持する前駆 MemoryRecord バージョンを列挙します。類似記録または同一主体の記録は正確なバージョンの代わりになりません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-3201-v1
      source_claims:
        - claim-memory-revision-operation-predecessor
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後継記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次修订实际产生的具有独立身份的新 MemoryRecord 版本；前驱记录本身不能作为后继。
        en: Identifies the independently identified new MemoryRecord version actually produced by this revision; a predecessor record itself cannot be the successor.
        ja: この改訂が実際に生成した独立識別可能な新しい MemoryRecord バージョンを識別します。前駆記録自体を後継にできません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3201-v2
      source_claims:
        - claim-memory-revision-operation-successor
    - id: revision_mode
      labels:
        zh: 修订模式
        en: revision mode
        ja: 改訂モード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明后继版本形成方式，用于区分单前驱定向更新和多前驱或派生综合，而不是泛化的“已修改”状态。
        en: States how the successor version formed, distinguishing targeted single-predecessor update from multi-predecessor or derived synthesis rather than a generic modified status.
        ja: 一般的な変更済み状態ではなく、対象の単一前駆更新と多前駆または派生統合を区別するため、後継バージョンの形成方法を示します。
      allowed_values:
        - update
        - synthesis
      pattern: null
      example_value: update
      source_claims:
        - claim-memory-revision-operation-lineage
    - id: revision_basis
      labels:
        zh: 修订依据
        en: revision basis
        ja: 改訂根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录触发后继生成的明确事实、授权或转换目标，而不是含糊的“更好内容”判断。
        en: Records the explicit fact, authorization, or transformation objective that caused successor generation rather than a vague better-content judgment.
        ja: 曖昧な「より良い内容」という判断ではなく、後継生成を引き起こした明示的事実、認可、変換目的を記録します。
      allowed_values:
        - factual_correction
        - authorized_user_update
        - policy_normalization
        - multi_record_synthesis
        - compaction
        - reflection
      pattern: null
      example_value: factual_correction
      source_claims:
        - claim-memory-revision-operation-activity
    - id: lineage_evidence_digest
      labels:
        zh: 谱系证据摘要
        en: lineage evidence digest
        ja: 来歴証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定前驱版本、修订依据、转换输入、后继身份、适用策略与执行输出的 SHA-256 摘要，以便审计实际版本转换。
        en: Fixes a SHA-256 digest of predecessor versions, revision basis, transformation inputs, successor identity, applicable policy, and execution output to audit the actual version transition.
        ja: 実際のバージョン遷移を監査するため、前駆バージョン、改訂根拠、変換入力、後継識別子、適用方針、実行出力の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:65c4ad8bc17d9b3b3188c0264270d16b50fcb8ee8869b0b7ad068f49aed8a019
      source_claims:
        - claim-memory-revision-operation-evidence
    - id: revised_at
      labels:
        zh: 修订发生时间
        en: revised at
        ja: 改訂発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录后继版本实际形成的事件时间，而非前驱创建、计划提出、日志导入或随后检索的时间。
        en: Records the event time at which the successor version actually forms, not predecessor creation, plan proposal, log ingestion, or later retrieval time.
        ja: 後継バージョンが実際に形成されたイベント時刻を記録します。前駆作成、計画提案、ログ取込み、後続検索の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T03:00:00.084Z"
      source_claims:
        - claim-memory-revision-operation-activity
  constraints:
    - id: MemoryRevisionOperation-parent-operation-envelope
      expression: "operation_kind = revision and status, started_at, and actor_ref identify one executed revision activity."
      explanation:
        zh: 前序和后继记录的关系本身不能说明发生过一次修订；必须保留这次实际执行活动的类别、状态、时间和执行主体。
        en: A predecessor-successor relation does not alone prove a revision occurred; kind, state, time, and executor of the actual activity must remain available.
        ja: 前任と後継の関係だけでは修訂の実行を証明できず、実際の活動の種別、状態、時刻、実行主体を保持する必要があります。
      source_claims:
        - claim-memory-revision-operation-activity
    - id: MemoryRevisionOperation-predecessor-successor-identity
      expression: "predecessor_record_refs is nonempty, successor_record_ref is a new identity distinct from every predecessor, and predecessor versions remain addressable after revised_at."
      explanation:
        zh: 只有新身份和保留的前驱才能表达版本转换；原地覆盖既无法形成后继，也会破坏对旧事实的复核。
        en: Only a new identity with retained predecessors expresses a version transition; in-place overwrite forms no successor and destroys review of prior facts.
        ja: 保持された前駆を伴う新しい識別子だけがバージョン遷移を表します。その場での上書きは後継を形成せず、以前の事実の検証を破壊します。
      source_claims:
        - claim-memory-revision-operation-predecessor
        - claim-memory-revision-operation-successor
    - id: MemoryRevisionOperation-lineage-and-time-consistency
      expression: "lineage_evidence_digest covers predecessor_record_refs, successor_record_ref, revision_mode, revision_basis, and transformation output; revised_at is on or after started_at and on or before the parent operation's ended_at when present."
      explanation:
        zh: 谱系和时序必须能证明一次实际生成，而不能只凭文本相似、相同主体或相邻日志推断。
        en: Lineage and timing must prove one actual generation rather than being inferred from text similarity, shared subject, or adjacent logs.
        ja: 来歴と時系列は、テキスト類似、共有主体、隣接ログから推測されるのではなく、一つの実際の生成を証明する必要があります。
      source_claims:
        - claim-memory-revision-operation-lineage
        - claim-memory-revision-operation-evidence
    - id: MemoryRevisionOperation-not-assessment-or-disposition
      expression: "An accepted revision produces successor_record_ref; validation with no successor, ranking-strength change only, expiry marking only, deletion, eviction, and an unexecuted proposal do not satisfy this operation."
      explanation:
        zh: 产生新版本是修订的必要效果，避免把评估、排序、保留处置或计划误分类为修订。
        en: Producing a new version is the required effect of revision, preventing assessment, ranking, retention disposition, or planning from being misclassified as revision.
        ja: 新しいバージョンの生成は改訂に必要な効果であり、評価、順位付け、保持処置、計画が改訂と誤分類されることを防ぎます。
      source_claims:
        - claim-memory-revision-operation-boundary
  required_relation_constraints:
    - relation_id: MemoryOperation-acts_on-MemoryRecord
      requirement: The operation must act on every predecessor_record_ref used to form the successor version.
examples:
  - id: MemoryRevisionOperation-example-positive-correction

    labels:
      zh: 生成可追溯纠正版本
      en: Generates a traceable corrected version
      ja: 追跡可能な訂正版を生成する

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-revise-3201
      operation_kind: revision
      status: succeeded
      started_at: "2026-07-19T03:00:00Z"
      actor_ref: memory-revision-worker-1
      predecessor_record_refs:
        - record-3201-v1
      successor_record_ref: record-3201-v2
      revision_mode: update
      revision_basis: factual_correction
      lineage_evidence_digest: sha256:65c4ad8bc17d9b3b3188c0264270d16b50fcb8ee8869b0b7ad068f49aed8a019
      revised_at: "2026-07-19T03:00:00.084Z"
    related_node_ids:
      - MemoryRevisionOperation
      - MemoryUpdate
      - MemoryRecord
    related_relation_ids:
      - MemoryRevisionOperation-is_a-MemoryOperation
      - MemoryUpdate-is_a-MemoryRevisionOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-revision-operation-predecessor
      - claim-memory-revision-operation-successor
      - claim-memory-revision-operation-evidence
  - id: MemoryRevisionOperation-example-counterexample-in-place-overwrite

    labels:
      zh: 原地覆盖不是版本修订
      en: In-place overwrite is not version revision
      ja: その場での上書きはバージョン改訂ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: overwrite-3201
      predecessor_record_refs:
        - record-3201-v1
      successor_record_ref: absent
      record_identity_after: record-3201-v1
      old_value_recoverable: false
    related_node_ids:
      - MemoryRevisionOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryRevisionOperation-is_a-MemoryOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-revision-operation-boundary
  - id: MemoryRevisionOperation-example-boundary-validation-only

    labels:
      zh: 只读验证不产生修订
      en: Read-only validation produces no revision
      ja: 読み取り専用検証は改訂を生成しない

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      operation_id: mem-op-validate-3202
      predecessor_record_refs:
        - record-3202-v1
      validation_verdict: valid
      successor_record_ref: absent
      revised_at: absent
    related_node_ids:
      - MemoryRevisionOperation
      - MemoryValidation
      - MemoryRecord
    related_relation_ids:
      - MemoryRevisionOperation-is_a-MemoryOperation
      - MemoryValidation-is_a-MemoryAssessmentOperation

    source_claims:
      - claim-memory-revision-operation-boundary
  - id: MemoryRevisionOperation-example-instance-synthesis

