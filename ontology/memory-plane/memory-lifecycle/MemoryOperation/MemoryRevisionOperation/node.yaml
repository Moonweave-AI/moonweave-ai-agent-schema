schema: moonweave.ai/ontology-node/v1
id: MemoryRevisionOperation
kind: concept
labels:
  zh: 记忆修订操作
  en: Memory revision operation
  ja: 記憶改訂操作
semantics:
  short_definition:
    zh: 读取既有记录并产生可追溯新版本的修订活动。
    en: Revision activity reading existing records and producing traceable new versions.
    ja: 既存 record を read し traceable 新版を生成する revision activity。
  definition:
    zh: MemoryRevisionOperation 是 MemoryOperation 子类：读取既有 MemoryRecord、保持前驱不可变并产生后继版本或合成结果。Mem0 PUT /v1/memories/{id}、Letta update 与 LangGraph store.put 覆盖映射为 MemoryUpdate；多记录合成映射为 MemorySynthesisOperation 子类。
    en: MemoryRevisionOperation is a MemoryOperation subtype reading existing MemoryRecords, keeping predecessors immutable, and producing successor versions or synthesis outcomes. Mem0 PUT /v1/memories/{id}, Letta update, and LangGraph store.put overwrite map to MemoryUpdate; multi-record synthesis maps to MemorySynthesisOperation subtypes.
    ja: MemoryRevisionOperation は既存 MemoryRecord を read し predecessor immutable のまま successor/synthesis を生成。Mem0 PUT/Letta update/LangGraph put→MemoryUpdate。複数 record 合成→MemorySynthesisOperation subtype。
  why_needed:
    zh: 版本谱系必须与初始写入和删除分开，否则 PUT 更新无法审计前驱关系。
    en: Version lineage must stay separate from initial write and delete or PUT updates lose auditable predecessor links.
    ja: version lineage を write/delete と分離しないと PUT 更新の predecessor 監査が失われる。
  includes:
    - zh: 纳入 MemoryUpdate 与 MemorySynthesisOperation 及其子类。
      en: Includes MemoryUpdate and MemorySynthesisOperation with their subtypes.
      ja: MemoryUpdate/MemorySynthesisOperation と subtype。
  excludes:
    - zh: 排除初始写入、删除、验证与冲突解决。
      en: Excludes initial write, delete, validation, and conflict resolution.
      ja: initial write/delete/validation/conflict resolution を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Mem0 PUT /v1/memories/{memory_id}/ 更新 text/metadata 映射 MemoryUpdate；Letta archival/core update 同理。合成类操作消费多条 consumed_record_ids 并产生 produced_record_id，必须声明 predecessor_id。
    en: Mem0 PUT /v1/memories/{memory_id}/ updating text/metadata maps to MemoryUpdate; Letta archival/core update likewise. Synthesis operations consume multiple consumed_record_ids and produce produced_record_id with required predecessor_id.
    ja: Mem0 PUT/Letta update→MemoryUpdate。synthesis は consumed_record_ids 複数と predecessor_id 必須。
  typical_input:
    - description: Revision with predecessor
      format: |
        PUT https://api.mem0.ai/v1/memories/{memory_id}/
        {"text": "Updated preference text.", "metadata": {"version": 2}}
      source_claims: [claim-revision-mem0]
  typical_output:
    - description: Successor record
      format: |
        {"revision_operation_id": "update-512", "produced_record_id": "record-512-v2", "predecessor_id": "record-512-v1"}
      source_claims: [claim-revision-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: PUT /v1/memories/{id}/ for updates.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Update archival passages and core blocks.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.put overwrites existing Items.
structure:
  identity_keys: [revision_operation_id]
  fields:
    - id: revision_operation_id
      labels: {zh: 修订操作标识, en: Revision operation identifier, ja: 改訂操作識別子}
      definitions:
        zh: 标识一次记忆修订活动。
        en: Identifies one memory revision activity.
        ja: 一 memory revision activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: update-512
      allowed_values: []
      source_claims: [claim-revision-id]
    - id: predecessor_id
      labels: {zh: 前驱记录标识, en: Predecessor record identifier, ja: 前駆 record 識別子}
      definitions:
        zh: 本次修订所继承的 MemoryRecord 版本。
        en: MemoryRecord version superseded by this revision.
        ja: 今回 revision が supersede する MemoryRecord 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-512-v1
      allowed_values: []
      source_claims: [claim-revision-predecessor]
  constraints: []
  required_relations: []
examples:
  - id: MemoryRevisionOperation-example-mem0-put
    labels: {zh: Mem0 PUT 修订, en: Mem0 PUT revision, ja: Mem0 PUT 改訂}
    descriptions:
      zh: update-512 调用 PUT /v1/memories/mem0-8f3c2a1b/ 产生 record-512-v2，predecessor_id=record-512-v1。
      en: update-512 calls PUT /v1/memories/mem0-8f3c2a1b/ producing record-512-v2 with predecessor_id=record-512-v1.
      ja: PUT で update-512 が record-512-v2 を predecessor 付きで生成。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: "PUT /v1/memories/{memory_id}/"}
    field_values: {revision_operation_id: update-512, predecessor_id: record-512-v1}
    related_node_ids: [MemoryRevisionOperation, MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-revision-mem0, claim-revision-design]
  - id: MemoryRevisionOperation-example-merge
    labels: {zh: 合成修订, en: Synthesis revision, ja: 合成改訂}
    descriptions:
      zh: merge-221 作为 MemorySynthesisOperation 消费两条 record 并产生合并后继。
      en: merge-221 as MemorySynthesisOperation consumes two records and produces a merged successor.
      ja: merge-221 が二 record を consume し merged successor 生成。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {revision_operation_id: merge-221}
    related_node_ids: [MemoryRevisionOperation, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-revision-mem0, claim-revision-design]
  - id: MemoryRevisionOperation-example-not-write
    labels: {zh: 修订非初始写入, en: Revision is not initial write, ja: 改訂は initial write ではない}
    descriptions:
      zh: write-310 无 predecessor；update-512 必须绑定 predecessor_id=record-512-v1。
      en: write-310 has no predecessor; update-512 must bind predecessor_id=record-512-v1.
      ja: write に predecessor なし。update は predecessor 必須。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryRevisionOperation, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-revision-design]
  - id: MemoryRevisionOperation-example-letta
    labels: {zh: Letta 更新修订, en: Letta update revision, ja: Letta update 改訂}
    descriptions:
      zh: update-letta-44 更新 archival passage 产生 record-archival-44-v2。
      en: update-letta-44 updates archival passage producing record-archival-44-v2.
      ja: archival passage 更新で record-archival-44-v2。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: update}
    field_values: {revision_operation_id: update-letta-44}
    related_node_ids: [MemoryRevisionOperation]
    related_relation_ids: []
    source_claims: [claim-revision-letta, claim-revision-design]
parent_relation:
  id: MemoryRevisionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆操作, en: is a memory operation, ja: 記憶操作の一種}
  definitions:
    zh: MemoryRevisionOperation —is_a→ MemoryOperation 表示活动读取既有 record 并产生可追溯新版本。
    en: MemoryRevisionOperation —is_a→ MemoryOperation holds because the activity reads existing records and produces traceable new versions.
    ja: 既存 record を read し traceable 新版を生成する activity のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryRevisionOperation-is_a-MemoryOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when predecessor record exists and a successor or synthesis output is produced.
      explanations:
        zh: 仅当前驱 record 存在且产生后继或合成输出时成立。
        en: Assert only when predecessor record exists and successor or synthesis output is produced.
        ja: predecessor 存在と successor/synthesis 出力時のみ。
      source_claims: [claim-revision-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-revision-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-revision
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: PUT /v1/memories/{id}/ updates existing memories.
  - id: src-letta-revision
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: Update archival and core memory.
  - id: src-revision-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Revision requires predecessor lineage.
source_claims:
  - id: claim-revision-mem0
    source: src-mem0-revision
    supports: Mem0 PUT /v1/memories/{memory_id}/ updates text and metadata of existing memories.
    locator: PUT /v1/memories/{memory_id}/
    evidence_kind: primary-api
    confidence: high
  - id: claim-revision-letta
    source: src-letta-revision
    supports: Letta supports updating archival passages and core blocks.
    locator: update tools
    evidence_kind: primary-doc
    confidence: high
  - id: claim-revision-design
    source: src-revision-design
    supports: MemoryRevisionOperation produces successors with explicit predecessor_id.
    locator: MemoryRevisionOperation
    evidence_kind: design-inference
    confidence: high
  - id: claim-revision-id
    source: src-revision-design
    supports: revision_operation_id identifies one revision activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-revision-predecessor
    source: src-revision-design
    supports: predecessor_id binds the superseded MemoryRecord version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
