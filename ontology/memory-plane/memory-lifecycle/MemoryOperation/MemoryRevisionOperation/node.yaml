sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind auditable revision-lineage evidence.
source_claims:
  - id: claim-memory-revision-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from the entities and provenance facts around it. Moonweave records revision as an executed operation with predecessors, successor, basis, time, result, and audit evidence rather than a static content state or plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-revision-operation-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a revision's predecessors, successor, basis, evidence, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-revision-operation-predecessor
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from nearby or merely similar entities. Moonweave records exact predecessor record versions that the revision actually reads and keeps them addressable for review.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-revision-operation-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave requires a separately identified successor record rather than treating a mutated predecessor as generated output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-revision-operation-lineage
    source: w3c-prov-o
    supports: PROV-O provides derivation and generation associations for recording how an entity follows from prior entities and activities. Moonweave records predecessor-to-successor lineage and distinguishes targeted update from multi-predecessor synthesis.
    locator: "PROV-O sections on prov:wasDerivedFrom and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-revision-operation-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over predecessor versions, revision basis, transformation inputs, successor identity, policy context, and execution output to bind lineage evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-revision-operation-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, and generated entities. Moonweave keeps initial write, read-only validation, ranking-only change, expiry marking, deletion, eviction, unexecuted plans, and in-place overwrite distinct from an executed revision with new generated successor.
    locator: "PROV-O sections on Activity, Entity, use, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
