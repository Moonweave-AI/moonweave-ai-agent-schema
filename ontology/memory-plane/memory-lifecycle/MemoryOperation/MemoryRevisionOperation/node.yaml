schema: moonweave.ai/ontology-node/v1
id: MemoryRevisionOperation
kind: concept
status: review
labels:
  zh: 记忆修订操作
  en: Memory revision operation
  ja: 記憶改訂操作
semantics:
  short_definition:
    zh: 以一个或多个既有记录为输入并产生新记录版本的操作。
    en: An operation taking one or more existing records as input and producing a new record version.
    ja: 一つ以上の既存recordをinputに新版recordを生成するoperationです。
  definition:
    zh: MemoryRevisionOperation 是保持前驱记录不可变、显式记录输入与输出版本的 MemoryOperation；单前驱的定向改动归 MemoryUpdate，多前驱或派生抽象归 MemorySynthesisOperation。
    en: MemoryRevisionOperation is a MemoryOperation that keeps predecessor records immutable and explicitly records input and output versions. A targeted change with one principal predecessor is MemoryUpdate; multi-input or derived abstraction is MemorySynthesisOperation.
    ja: MemoryRevisionOperation はpredecessor recordをimmutableに保ちinput/output版を明示する MemoryOperationです。一principal predecessorのtargeted changeはMemoryUpdate、multi-inputまたはderived abstractionはMemorySynthesisOperationです。
  why_needed:
    zh: 为版本谱系提供不漏级的共同上位概念。
    en: Provides a non-flat common parent for version-lineage operations.
    ja: version-lineage operationに平坦でない共通parentを与えます。
  includes:
    - zh: 纳入更新、合并、巩固、压缩和反思形成的新记录版本。
      en: Includes new record versions from update, merge, consolidation, compaction, and reflection.
      ja: update・merge・consolidation・compaction・reflectionによるnew record versionを含みます。
  excludes:
    - zh: 排除首写、删除、驱逐、仅验证而不生成新版本的活动。
      en: Excludes initial write, deletion, eviction, and validation that generates no new version.
      ja: initial write・delete・eviction・new versionを生成しないvalidationを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - revision_operation_id
  fields:
    - id: revision_operation_id
      labels:
        zh: 修订操作标识
        en: revision operation ID
        ja: revision operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次版本修订活动。
        en: Identifies one version-revision activity.
        ja: 一version revision activityを識別します。
      allowed_values: []
      pattern: null
      example_value: revision-401
      source_claims:
        - claim-memory-revision-operation-002
    - id: predecessor_record_ids
      labels:
        zh: 前驱记录标识
        en: predecessor record IDs
        ja: predecessor record IDs
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出本次修订读取且保持不可变的前驱记录。
        en: Lists immutable predecessor records read by this revision.
        ja: このrevisionがreadしimmutableに保つpredecessor recordを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - record-401-v1
      source_claims:
        - claim-memory-revision-operation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryRevisionOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆修订操作正例
      en: "Positive case: Memory revision operation"
      ja: 記憶改訂操作正例
    scenario_id: null
    descriptions:
      zh: revision-401 读取 record-401-v1 并产生可追溯的 record-401-v2。
      en: revision-401 reads record-401-v1 and produces traceable record-401-v2.
      ja: revision-401 はrecord-401-v1をreadし追跡可能なrecord-401-v2を生成します。
    field_values:
      revision_operation_id: revision-401
      predecessor_record_ids:
        - record-401-v1
      operation_id: revision-401
      started_at: 2026-07-16T13:10:00Z
    related_node_ids:
      - MemoryRevisionOperation
      - MemoryOperation
    related_relation_ids:
      - MemoryRevisionOperation-is_a-MemoryOperation
    expected_result:
      zh: 归类为 MemoryRevisionOperation。
      en: Classify as MemoryRevisionOperation.
      ja: MemoryRevisionOperationに分類します。
    why_valid_or_invalid:
      zh: 活动以既有记录为输入并产生新版本，没有原地覆盖。
      en: The activity takes an existing record as input and creates a new version without in-place overwrite.
      ja: 既存recordをinputに取りin-place上書きなしでnew versionを作ります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-revision-operation-001
  - id: MemoryRevisionOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆修订操作边界例
      en: "Boundary case: Memory revision operation"
      ja: 記憶改訂操作境界例
    scenario_id: null
    descriptions:
      zh: validation-401 只检查 record-401-v1 的新鲜度并返回通过。
      en: validation-401 only checks record-401-v1 freshness and returns pass.
      ja: validation-401 はrecord-401-v1のfreshnessだけを検査しpassを返します。
    field_values: {}
    related_node_ids:
      - MemoryRevisionOperation
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryRevisionOperation。
      en: Do not classify as MemoryRevisionOperation.
      ja: MemoryRevisionOperationに分類しません。
    why_valid_or_invalid:
      zh: 没有生成后继记录，属于评估而非修订。
      en: No successor record is generated; this is assessment rather than revision.
      ja: successor recordを生成せずrevisionでなくassessmentです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-revision-operation-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryRevisionOperation-is_a-MemoryOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆操作
    en: is a memory operation
    ja: 記憶操作の一種
  definitions:
    zh: MemoryRevisionOperation —is_a→ MemoryOperation 表示：活动读取既有记录、保持前驱不可变并产生可追溯的新记录版本。
    en: MemoryRevisionOperation —is_a→ MemoryOperation holds because the activity reads existing records, keeps predecessors immutable, and produces a traceable new record version
    ja: MemoryRevisionOperation —is_a→ MemoryOperation は、既存recordをreadしpredecessorをimmutableに保ってtraceable new versionを生成するため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse is a memory operation
      ja: 逆方向読取
  conditions:
    - id: MemoryRevisionOperation-is_a-MemoryOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the activity reads existing records, keeps predecessors immutable, and produces a traceable new record version—and already meets the activity definition of MemoryOperation.
      explanations:
        zh: 仅当实例满足子类种差“活动读取既有记录、保持前驱不可变并产生可追溯的新记录版本。”且已满足 MemoryOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the activity reads existing records, keeps predecessors immutable, and produces a traceable new record version—and already meets the activity definition of MemoryOperation.
        ja: instanceがchild differentia「既存recordをreadしpredecessorをimmutableに保ってtraceable new versionを生成するため成立します。」を満たし、かつ MemoryOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-revision-operation-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryRevisionOperation-is_a-MemoryOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆操作正例
        en: "Positive case: is a memory operation"
        ja: 記憶操作の一種正例
      scenario_id: MemoryRevisionOperation-is_a-MemoryOperation:positive:20260716
      descriptions:
        zh: revision-401 读取不可变的 record-401-v1，修正错误时区，并创建具有新身份和 predecessor_id 的 record-401-v2。
        en: revision-401 reads immutable record-401-v1, corrects its timezone, and creates record-401-v2 with a new identity and predecessor_id.
        ja: revision-401 は immutable record-401-v1 を読み timezone を修正し、新 identity と predecessor_id を持つ record-401-v2 を作ります。
      field_values: {}
      related_node_ids:
        - MemoryRevisionOperation
        - MemoryOperation
      related_relation_ids:
        - MemoryRevisionOperation-is_a-MemoryOperation
      expected_result:
        zh: 把 revision-401 纳入 MemoryRevisionOperation，并保留输入实体、生成活动与新实体之间的可查询谱系。
        en: Place revision-401 under MemoryRevisionOperation and preserve queryable provenance among the input entity, generating activity, and new entity.
        ja: revision-401 を MemoryRevisionOperation に置き、input entity・generation activity・new entity 間の照会可能 provenance を保持します。
      why_valid_or_invalid:
        zh: 活动使用现有记录并生成独立后继而不改写前驱，符合 PROV-O 的使用、生成和派生分离，也满足修订种差。
        en: The activity uses an existing record and generates a distinct successor without mutating its predecessor, matching PROV-O separation and the revision differentia.
        ja: 既存 record を使用し predecessor を変更せず別 successor を生成するため、PROV-O の分離と revision differentia に合致します。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-revision-operation-001
    - id: MemoryRevisionOperation-is_a-MemoryOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆操作边界例
        en: "Boundary case: is a memory operation"
        ja: 記憶操作の一種境界例
      scenario_id: MemoryRevisionOperation-is_a-MemoryOperation:boundary:20260716
      descriptions:
        zh: overwrite-401 直接覆盖 record-401-v1 的内容和更新时间，没有新记录身份、前驱引用或可恢复旧值。
        en: overwrite-401 changes record-401-v1 in place and supplies no new record identity, predecessor reference, or recoverable old value.
        ja: overwrite-401 は record-401-v1 を in-place 変更し、新 record identity・predecessor reference・回復可能な旧値を持ちません。
      field_values: {}
      related_node_ids:
        - MemoryRevisionOperation
        - MemoryOperation
      related_relation_ids:
        - MemoryRevisionOperation-is_a-MemoryOperation
      expected_result:
        zh: 拒绝声明符合本模块修订契约；在补出不可变后继和谱系之前，不建立 MemoryRevisionOperation 分类。
        en: Reject conformance to the module's revision contract; do not classify it as MemoryRevisionOperation until an immutable successor and lineage are recorded.
        ja: immutable successor と lineage が記録されるまで module revision contract への適合を拒否し、MemoryRevisionOperation と分類しません。
      why_valid_or_invalid:
        zh: 原地覆盖无法回答哪个活动使用了哪个实体并生成哪个后继，破坏版本闭环，因此不是本体中认可的修订实例。
        en: In-place overwrite cannot answer which activity used which entity and generated which successor, breaking version closure required by this revision model.
        ja: in-place overwrite は activity・used entity・generated successor を特定できず version closure を壊すため、認定 revision instance ではありません。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-revision-operation-001
  source_claims:
    - claim-memory-revision-operation-001
