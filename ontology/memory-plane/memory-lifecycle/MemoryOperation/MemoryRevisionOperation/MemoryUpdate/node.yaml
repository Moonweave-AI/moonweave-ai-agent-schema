          en: mem-op-update-3801 produces record-3801-profile-v2; the new record references v1 as predecessor, lists the /profile/timezone revision, preserves owner and disclosure commitments, and is bound by update digest.
          ja: mem-op-update-3801 は record-3801-profile-v2 を生成します。新しい記録は v1 を前駆として参照し、/profile/timezone の修訂を列挙し、所有者と開示の約束を保持し、更新ダイジェストで結合されます。
        field_values:
          operation_id: mem-op-update-3801
          target_record_ref: record-3801-profile-v2
          successor_record_ref: record-3801-profile-v2
          predecessor_record_ref: record-3801-profile-v1
          lineage_relation: supersedes
          changed_field_paths:
            - /profile/timezone
          preserved_commitment_refs:
            - anchor-3801-profile-owner
            - constraint-3801-no-external-disclosure
          update_evidence_digest: sha256:12ce877b48eeb9368014b6ee3ff431f057489b32701ac13a4a0d10640f5dcff4
        related_node_ids:
          - MemoryUpdate
          - MemoryRecord
        related_relation_ids:
          - MemoryUpdate-produces-MemoryRecord

        source_claims:
          - claim-memory-update-successor
          - claim-memory-update-revision
          - claim-memory-update-digest
