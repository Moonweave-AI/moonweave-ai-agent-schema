sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind predecessor version, revision evidence, preserved commitments, and successor identity.
source_claims:
  - id: claim-memory-update-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities, agents, time, and provenance facts around it. Moonweave records update as an executed operation with exact predecessor, revision scope, preservation obligations, successor, result, and audit facts rather than an overwrite command or plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-update-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join an update's predecessor, revision, preservation obligations, successor, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-update-predecessor
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from nearby or merely similar entities. Moonweave records one exact principal record actually read for a single-predecessor update and does not infer predecessor status from topic, retrieval, or shared identity.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-update-revision
    source: w3c-prov-o
    supports: PROV-O provides use, generation, and derivation associations for tracing generated entities to inputs and activities. Moonweave records changed field paths, revision basis, and commitments that remain represented so a targeted semantic revision is auditable.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, and prov:wasDerivedFrom"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-update-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave requires an independently identified successor with explicit supersedes lineage instead of treating a predecessor, view, or in-place storage overwrite as update output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-update-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over predecessor version, revision scope, basis, preserved commitments, successor identity, lineage, and revised content to bind update evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-update-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, generated entities, and derivations as explicit provenance facts. Moonweave keeps initial write, in-place overwrite, multi-input union, cross-observation generalization, compaction, reflection, views, drafts, and plans distinct from one-predecessor semantic update.
    locator: "PROV-O sections on Activity, Entity, use, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
