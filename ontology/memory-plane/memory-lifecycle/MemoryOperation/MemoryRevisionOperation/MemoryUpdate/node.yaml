schema: moonweave.ai/ontology-node/v1
id: MemoryUpdate
kind: concept
labels:
  zh: 记忆更新
  en: Memory update
  ja: 記憶更新
semantics:
  short_definition:
    zh: 基于前驱版本产生单条后继记录的修订。
    en: Revision producing one successor record from a predecessor version.
    ja: predecessor 版から単一 successor record を生成する revision。
  definition:
    zh: MemoryUpdate 是 MemoryRevisionOperation：消费一条既有 MemoryRecord，产生带 predecessor_id 的新版本。Mem0 PUT /v1/memories/{id}、Letta update 与 LangGraph store.put 覆盖是典型映射；初始写入属于 MemoryWrite。
    en: MemoryUpdate is a MemoryRevisionOperation consuming one existing MemoryRecord and producing a new version with predecessor_id. Mem0 PUT /v1/memories/{id}, Letta update, and LangGraph store.put overwrite are typical mappings; initial persistence is MemoryWrite.
    ja: MemoryUpdate は一 MemoryRecord を consume し predecessor_id 付き新版を生成する MemoryRevisionOperation。Mem0 PUT/Letta update/LangGraph put 上書きが典型。初回は MemoryWrite。
  why_needed:
    zh: 原地覆盖会破坏版本谱系；PUT 必须建模为后继版本而非 MemoryWrite。
    en: In-place overwrite destroys version lineage; PUT must model a successor version, not MemoryWrite.
    ja: in-place 上書きは lineage 破壊。PUT は successor として建模必須。
  includes:
    - zh: 纳入单 record 内容或 metadata 修订并产生 v(n+1)。
      en: Includes single-record content or metadata revision producing v(n+1).
      ja: 単 record content/metadata 改訂で v(n+1) 生成。
  excludes:
    - zh: 排除初始写入、多 record 合并与无 predecessor 的 upsert 误标。
      en: Excludes initial write, multi-record merge, and upsert mislabeled without predecessor.
      ja: initial write/複数 merge/predecessor なし upsert 誤ラベルを除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 Mem0 PUT /v1/memories/{memory_id}/ 的 text/metadata 变更；update_operation_id 绑定 consumed_record_id、produced_record_id、predecessor_id 与 external_memory_id。
    en: Map Mem0 PUT /v1/memories/{memory_id}/ text/metadata changes; update_operation_id binds consumed_record_id, produced_record_id, predecessor_id, and external_memory_id.
    ja: Mem0 PUT の text/metadata 変更を写像。consumed/produced/predecessor/external_memory_id を bind。
  typical_input:
    - description: Mem0 update memory
      format: |
        PUT https://api.mem0.ai/v1/memories/{memory_id}/
        {
          "text": "Prefers TypeScript and strict null checks.",
          "metadata": {"confidence": 0.92}
        }
      source_claims: [claim-update-mem0]
  typical_output:
    - description: Successor version
      format: |
        {
          "update_operation_id": "update-512",
          "consumed_record_id": "record-512-v1",
          "produced_record_id": "record-512-v2",
          "predecessor_id": "record-512-v1"
        }
      source_claims: [claim-update-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: PUT /v1/memories/{id}/ updates existing memory.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Update archival passages and core blocks.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.put overwrites existing namespace-key Item.
structure:
  identity_keys: [update_operation_id]
  fields:
    - id: update_operation_id
      labels: {zh: 更新操作标识, en: Update operation identifier, ja: 更新操作識別子}
      definitions:
        zh: 标识一次单 record 版本更新活动。
        en: Identifies one single-record version update activity.
        ja: 一単 record 版更新 activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: update-512
      allowed_values: []
      source_claims: [claim-update-id]
    - id: produced_record_id
      labels: {zh: 产出记录标识, en: Produced record identifier, ja: 生成 record 識別子}
      definitions:
        zh: 更新产生的后继 MemoryRecord 版本。
        en: Successor MemoryRecord version produced by the update.
        ja: 更新で生成した successor MemoryRecord 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: record-512-v2
      allowed_values: []
      source_claims: [claim-update-produced]
  constraints: []
  required_relations: []
examples:
  - id: MemoryUpdate-example-mem0-put
    labels: {zh: Mem0 PUT 更新, en: Mem0 PUT update, ja: Mem0 PUT 更新}
    descriptions:
      zh: update-512 调用 PUT /v1/memories/mem0-8f3c2a1b/ 将偏好更新为含 strict null checks，产生 record-512-v2。
      en: update-512 calls PUT /v1/memories/mem0-8f3c2a1b/ updating preference to include strict null checks, producing record-512-v2.
      ja: PUT で strict null checks 含み偏好に更新、record-512-v2 生成。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: "PUT /v1/memories/{memory_id}/"}
    field_values: {update_operation_id: update-512, produced_record_id: record-512-v2, predecessor_id: record-512-v1}
    related_node_ids: [MemoryUpdate, MemoryRevisionOperation]
    related_relation_ids: []
    source_claims: [claim-update-mem0, claim-update-design]
  - id: MemoryUpdate-example-langgraph
    labels: {zh: LangGraph put 覆盖, en: LangGraph put overwrite, ja: LangGraph put 上書き}
    descriptions:
      zh: update-lang-17 对已有 namespace-key Item store.put 新 value，产生 record-lang-17-v2。
      en: update-lang-17 store.put new value on existing namespace-key Item, producing record-lang-17-v2.
      ja: 既存 Item へ store.put で v2 生成。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/reference/store/, version: BaseStore.put}
    field_values: {update_operation_id: update-lang-17}
    related_node_ids: [MemoryUpdate, MemoryStore]
    related_relation_ids: []
    source_claims: [claim-update-langgraph, claim-update-design]
  - id: MemoryUpdate-example-letta
    labels: {zh: Letta core 更新, en: Letta core update, ja: Letta core 更新}
    descriptions:
      zh: update-letta-44 更新 human block 中偏好字段，产生 record-core-44-v2。
      en: update-letta-44 updates preference field in human block, producing record-core-44-v2.
      ja: human block 偏好更新で record-core-44-v2。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: core update}
    field_values: {update_operation_id: update-letta-44}
    related_node_ids: [MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-update-letta, claim-update-design]
  - id: MemoryUpdate-example-not-write
    labels: {zh: 更新非写入, en: Update is not write, ja: update は write ではない}
    descriptions:
      zh: write-310 创建 record-310-v1 无 predecessor；upsert 读取 v1 产生 v2 才是 MemoryUpdate。
      en: write-310 creates record-310-v1 without predecessor; upsert reading v1 to emit v2 is MemoryUpdate.
      ja: write は predecessor なし。v1→v2 は update。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryUpdate, MemoryWrite]
    related_relation_ids: []
    source_claims: [claim-update-design]
parent_relation:
  id: MemoryUpdate-is_a-MemoryRevisionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆修订操作, en: is a memory revision operation, ja: 記憶改訂操作の一種}
  definitions:
    zh: MemoryUpdate —is_a→ MemoryRevisionOperation 表示单 record 前驱被读取并产生一条后继版本。
    en: MemoryUpdate —is_a→ MemoryRevisionOperation holds because one predecessor record is read and one successor version is produced.
    ja: 単 record predecessor を read し successor 一版を生成するため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when exactly one predecessor is consumed and one successor is produced.
      explanations:
        zh: 仅当消费 exactly 一条前驱并产生一条后继时成立。
        en: Assert only when exactly one predecessor is consumed and one successor is produced.
        ja: predecessor 一版 consume と successor 一版生成時のみ。
      source_claims: [claim-update-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-update-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-update
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: PUT /v1/memories/{id}/ updates existing memory.
  - id: src-letta-update
    title: Letta Archival Memory Guide
    publisher: Letta
    url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
    source_type: official-doc
    relevance: Update tools for archival and core memory.
  - id: src-langgraph-update
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: BaseStore.put overwrite.
  - id: src-update-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Update produces successor with predecessor_id.
source_claims:
  - id: claim-update-mem0
    source: src-mem0-update
    supports: Mem0 PUT /v1/memories/{memory_id}/ replaces text and metadata for an existing memory.
    locator: PUT /v1/memories/{memory_id}/
    evidence_kind: primary-api
    confidence: high
  - id: claim-update-letta
    source: src-letta-update
    supports: Letta update tools revise existing memory blocks or passages.
    locator: update tools
    evidence_kind: primary-doc
    confidence: high
  - id: claim-update-langgraph
    source: src-langgraph-update
    supports: LangGraph BaseStore.put overwrites existing Items at namespace and key.
    locator: BaseStore.put
    evidence_kind: primary-api
    confidence: high
  - id: claim-update-design
    source: src-update-design
    supports: MemoryUpdate consumes one predecessor and produces one successor version.
    locator: MemoryUpdate boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-update-id
    source: src-update-design
    supports: update_operation_id identifies one update activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-update-produced
    source: src-update-design
    supports: produced_record_id references the successor MemoryRecord version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
