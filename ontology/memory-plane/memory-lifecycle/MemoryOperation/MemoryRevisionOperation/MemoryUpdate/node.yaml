schema: moonweave.ai/ontology-node/v1
id: MemoryUpdate
kind: concept
status: accepted
labels:
  zh: 记忆更新
  en: Memory update
  ja: 記憶更新
semantics:
  short_definition:
    zh: 以一条明确的主要前驱记录为基础，依据已声明的修订原因产生独立语义修订后继版本的操作。
    en: An operation that creates an independently identified semantically revised successor from one explicit principal predecessor under a declared revision reason.
    ja: 明示された修訂理由のもとで、一つの明確な主要前駆記録から独立して識別される意味的に改訂済みの後続バージョンを作成する操作です。
  definition:
    zh: MemoryUpdate 是已执行的 MemoryRevisionOperation。它读取一条精确的主要前驱 MemoryRecord，声明修改的字段、修订类型、依据和不变承诺，生成具有不同身份的后继 MemoryRecord，并记录前驱谱系、更新时刻和证据摘要。成功更新不是原地覆盖，也不是初始写入、多个同级记录的联合、跨观察的稳定规律概括、以缩小表示成本为主要目的的压缩，或从结果反馈导出的未来行动教训。
    en: MemoryUpdate is an executed MemoryRevisionOperation. It reads one exact principal predecessor MemoryRecord, declares changed fields, revision kind, basis, and preserved commitments; generates a successor MemoryRecord with a distinct identity; and records predecessor lineage, update time, and an evidence digest. A successful update is neither in-place overwrite nor initial write, union of multiple peer records, stable pattern generalization across observations, compaction primarily aimed at reducing representation cost, or a future-action lesson derived from outcome feedback.
    ja: MemoryUpdate は実行済みの MemoryRevisionOperation です。一つの正確な主要前駆 MemoryRecord を読み、変更フィールド、修訂種別、根拠、保持する約束を宣言し、異なる識別子を持つ後続 MemoryRecord を生成して、前駆系譜、更新時刻、証拠ダイジェストを記録します。成功した更新は、その場での上書き、初期書込み、複数の同格記録の結合、複数観測にわたる安定パターンの一般化、表現コスト削減を主目的とする圧縮、結果フィードバックから導く将来行動の教訓のいずれでもありません。
  why_needed:
    zh: 把一次定向修订活动与记录间的版本谱系分开，要求变更依据和保持承诺可审计，从而避免把原地改写、多输入综合或任意“更新”命名误当作可追溯版本演化。
    en: Separating a targeted revision activity from record-version lineage makes change basis and preserved commitments auditable, preventing in-place mutation, multi-input synthesis, or arbitrary update naming from being mistaken for traceable version evolution.
    ja: 対象を絞った修訂活動を記録バージョンの系譜から分けることで、変更根拠と保持する約束を監査可能にします。これにより、その場での変更、複数入力の統合、恣意的な更新という名前を追跡可能なバージョン進化と取り違えることを防ぎます。
  includes:
    - zh: 基于经验证纠正、已采纳用户偏好变更、权威来源修订或已声明的元数据修订，对一条主要前驱创建语义不同的后继版本。
      en: Creating a semantically different successor for one principal predecessor from a verified correction, adopted user-preference change, authoritative-source revision, or declared metadata revision.
      ja: 検証済み訂正、採用された利用者選好の変更、権威あるソースの改訂、または宣言済みメタデータ修訂に基づき、一つの主要前駆に対して意味的に異なる後続バージョンを作成することを含みます。
    - zh: 记录精确前驱、变更字段、依据、未变承诺、独立后继、证据摘要和发生时间。
      en: Recording exact predecessor, changed fields, basis, unchanged commitments, independent successor, evidence digest, and occurrence time.
      ja: 正確な前駆、変更フィールド、根拠、未変更の約束、独立した後続、証拠ダイジェスト、発生時刻を記録することを含みます。
  excludes:
    - zh: 直接修改既有记录、没有前驱的首次写入、读取多个同级记录后形成联合后继、从多个观察归纳稳定事实、仅减小记录大小、形成带适用范围的行动教训、临时查询视图、未提交草稿和未执行更新计划。
      en: Direct mutation of an existing record, first write with no predecessor, reading multiple peer records to form a union successor, inducing a stable fact from multiple observations, only shrinking record size, forming a scoped action lesson, transient query view, uncommitted draft, and unexecuted update plan.
      ja: 既存記録の直接変更、前駆のない初回書込み、複数の同格記録を読んで結合後続を形成すること、複数観測から安定事実を導くこと、記録サイズを縮めるだけのこと、範囲を持つ行動教訓を形成すること、一時的なクエリ表示、未コミット草稿、未実行の更新計画を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将更新实现为单前驱、不可变版本转换：读取精确前驱，声明修改字段和依据，固定未变承诺，创建不同身份的后继，并绑定前驱、后继、修订内容和时刻的证据摘要。不得由 PATCH、PUT、同一键名、同一主题或界面上显示的新文本推定已完成合规更新。
    en: "Implement update as a single-predecessor immutable version transition: read the exact predecessor, declare changed fields and basis, fix unchanged commitments, create a differently identified successor, and bind predecessor, successor, revision content, and time in an evidence digest. Do not infer conforming update from PATCH, PUT, the same key, the same topic, or newly displayed text."
    ja: 更新は単一前駆の不変バージョン遷移として実装します。正確な前駆を読み、変更フィールドと根拠を宣言し、未変更の約束を固定し、異なる識別子の後続を作成して、前駆、後続、修訂内容、時刻を証拠ダイジェストに結合します。PATCH、PUT、同じキー、同じ話題、新しく表示されたテキストから適合した更新を推定してはいけません。
  typical_input:
    - description: Exact principal predecessor, changed field paths, revision kind and basis, preserved commitments, actor identity, and operation start time.
      format: "{operation_id, predecessor_record_ref, changed_field_paths, revision_kind, revision_evidence_refs, preserved_commitment_refs, actor_ref, started_at}"
  typical_output:
    - description: A distinct successor record with predecessor lineage, semantic revision evidence digest, update time, result, and audit reference.
      format: "{operation_id, successor_record_ref, lineage_relation, update_evidence_digest, updated_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding predecessor, revision evidence, preserved commitments, and successor identity.
  source_claims:
    - claim-memory-update-activity
    - claim-memory-update-predecessor
    - claim-memory-update-revision
    - claim-memory-update-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次更新的前驱、修订、保持承诺、后继、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one update's predecessor, revision, preserved commitments, successor, result, and audit facts.
        ja: 一つの更新の前駆、修訂、保持する約束、後続、結果、監査事実を結び付けるために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-update-3801
      source_claims:
        - claim-memory-update-identity
    - id: predecessor_record_ref
      labels:
        zh: 主要前驱记录引用
        en: principal predecessor record reference
        ja: 主要前駆記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识更新实际读取的唯一主要 MemoryRecord 版本。相关搜索结果、同主题记录或同一实体的其他版本若未被选作前驱，均不是该字段的值。
        en: Identifies the one principal MemoryRecord version actually read by update. Related search results, same-topic records, or other versions of the same entity not selected as predecessor are not this field's value.
        ja: 更新が実際に読んだ唯一の主要 MemoryRecord バージョンを識別します。関連検索結果、同じ話題の記録、または前駆として選ばれていない同一エンティティの別バージョンはこのフィールドの値ではありません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3801-profile-v1
      source_claims:
        - claim-memory-update-predecessor
    - id: revision_kind
      labels:
        zh: 修订类型
        en: revision kind
        ja: 修訂種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明单前驱发生语义变化的直接类型，用于区分事实纠正、已采纳的偏好变化、权威来源修订和元数据修订，而不是使用笼统“编辑”标签。
        en: States the direct type of semantic change to one predecessor, distinguishing fact correction, adopted preference change, authoritative-source revision, and metadata revision rather than using a generic edit label.
        ja: 一つの前駆に対する意味的変更の直接種別を宣言します。事実訂正、採用された選好変更、権威あるソースの改訂、メタデータ修訂を区別し、一般的な編集ラベルを用いません。
      allowed_values:
        - fact_correction
        - preference_change
        - authoritative_source_revision
        - metadata_revision
      pattern: null
      example_value: fact_correction
      source_claims:
        - claim-memory-update-revision
    - id: changed_field_paths
      labels:
        zh: 变更字段路径
        en: changed field paths
        ja: 変更フィールドパス
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出后继相对前驱发生语义变化的精确字段路径。未列出的受保护字段、来源锚点或约束不得因“更新”而静默丢失或改变。
        en: Lists exact field paths whose semantics change in successor relative to predecessor. Protected fields, source anchors, or constraints not listed cannot silently disappear or change merely because of an update.
        ja: 後続が前駆に対して意味的に変更する正確なフィールドパスを列挙します。列挙されていない保護フィールド、ソースアンカー、制約は、更新であることだけを理由に黙って消滅または変更できません。
      allowed_values: []
      pattern: '^/[A-Za-z0-9._/-]+$'
      example_value:
        - /profile/timezone
      source_claims:
        - claim-memory-update-revision
    - id: revision_reason
      labels:
        zh: 修订原因
        en: revision reason
        ja: 修訂理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明为何在该时点修订该前驱，并与 revision_evidence_refs 对应；无依据的“更好”“更近”或相似度分数不是充分原因。
        en: Explains why this predecessor is revised at this time and corresponds to revision_evidence_refs; unsupported better, newer, or similarity-score assertions are not sufficient reasons.
        ja: この時点でこの前駆を修訂する理由を説明し、revision_evidence_refs に対応させます。根拠のない、より良い、より新しい、または類似度スコアの主張は十分な理由ではありません。
      allowed_values: []
      pattern: null
      example_value: Verified user correction established that the stored time zone was stale.
      source_claims:
        - claim-memory-update-revision
    - id: revision_evidence_refs
      labels:
        zh: 修订依据引用
        en: revision evidence references
        ja: 修訂根拠参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出实际采纳以支持该修订的可审计反馈、权威来源、验证结果或决策记录引用。仅在界面上可见但未采纳的内容、未验证的猜测或普通相似检索不能作为依据。
        en: Lists auditable feedback, authoritative source, verification result, or decision-record references actually adopted to support revision. Content merely visible in the interface but not adopted, unverified guesswork, or ordinary similarity retrieval cannot be basis.
        ja: 修訂を支えるために実際に採用した、監査可能なフィードバック、権威あるソース、検証結果、または決定記録の参照を列挙します。画面に見えるだけで採用されていない内容、未検証の推測、通常の類似検索は根拠になれません。
      allowed_values: []
      pattern: '^[a-z][a-z0-9-]*-[A-Za-z0-9._-]+$'
      example_value:
        - feedback-3801-user-correction
      source_claims:
        - claim-memory-update-revision
    - id: preserved_commitment_refs
      labels:
        zh: 保持承诺引用
        en: preserved commitment references
        ja: 保持する約束の参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出修订后仍必须保持的精确事实、来源锚点、授权边界或其他承诺引用，以便定向改变不会被误解释为允许丢失未修改语义。
        en: Lists exact facts, source anchors, authorization boundaries, or other commitments that must remain after revision so targeted change is not misread as permission to lose unmodified semantics.
        ja: 修訂後も残さなければならない正確な事実、ソースアンカー、認可境界、その他の約束の参照を列挙します。これにより、対象を絞った変更が未変更の意味を失う許可と誤解されることを防ぎます。
      allowed_values: []
      pattern: '^[a-z][a-z0-9-]*-[A-Za-z0-9._-]+$'
      example_value:
        - anchor-3801-profile-owner
        - constraint-3801-no-external-disclosure
      source_claims:
        - claim-memory-update-revision
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後続記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识更新实际创建的独立新 MemoryRecord。前驱本身、临时查询视图、未提交草稿或就地覆写的存储槽位均不能充当后继。
        en: Identifies the independent new MemoryRecord actually created by update. The predecessor itself, transient query view, uncommitted draft, or storage slot overwritten in place cannot be successor.
        ja: 更新が実際に作成した独立した新しい MemoryRecord を識別します。前駆自体、一時的なクエリ表示、未コミット草稿、その場で上書きされたストレージスロットは後続になれません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3801-profile-v2
      source_claims:
        - claim-memory-update-successor
    - id: lineage_relation
      labels:
        zh: 谱系关系
        en: lineage relation
        ja: 系譜関係
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明后继相对于主要前驱的版本关系；该更新使用 supersedes，表示后继携带修订后内容并可沿谱系回查前驱。
        en: States the version relation of successor to principal predecessor; this update uses supersedes, meaning successor carries revised content and can trace lineage back to predecessor.
        ja: 後続と主要前駆のバージョン関係を宣言します。この更新では supersedes を使用し、後続が改訂済み内容を持ち、系譜を前駆まで追跡できることを示します。
      allowed_values:
        - supersedes
      pattern: null
      example_value: supersedes
      source_claims:
        - claim-memory-update-successor
    - id: update_evidence_digest
      labels:
        zh: 更新证据摘要
        en: update evidence digest
        ja: 更新証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定前驱版本、变更字段、修订类型、依据、保持承诺、后继身份、谱系关系和修订内容的 SHA-256 摘要，用于审计更新的范围与可追溯性。
        en: Fixes a SHA-256 digest of predecessor version, changed fields, revision kind, basis, preserved commitments, successor identity, lineage relation, and revised content to audit update scope and traceability.
        ja: 更新の範囲と追跡可能性を監査するために、前駆バージョン、変更フィールド、修訂種別、根拠、保持する約束、後続識別子、系譜関係、改訂済み内容の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:12ce877b48eeb9368014b6ee3ff431f057489b32701ac13a4a0d10640f5dcff4
      source_claims:
        - claim-memory-update-digest
    - id: updated_at
      labels:
        zh: 更新发生时间
        en: updated at
        ja: 更新発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录独立后继实际形成的事件时间，而不是前驱创建、证据展示、草稿保存、缓存刷新或后续检索时间。
        en: Records the event time at which independent successor actually forms, not predecessor creation, evidence display, draft save, cache refresh, or later retrieval time.
        ja: 独立した後続が実際に形成されたイベント時刻を記録します。前駆作成、証拠表示、草稿保存、キャッシュ更新、後の検索時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T09:00:00.081Z"
      source_claims:
        - claim-memory-update-activity
  constraints:
    - id: MemoryUpdate-single-predecessor-successor-and-lineage-consistency
      expression: "predecessor_record_ref identifies one exact record actually read, successor_record_ref is a distinct new record identity, lineage_relation equals supersedes, and the successor records its lineage to that predecessor."
      explanation:
        zh: 同主题、同会话或同实体的其他版本不能替代唯一主前驱；没有不同后继身份和显式谱系，就不是可追溯的单前驱更新。
        en: Same-topic, same-session, or other versions of the same entity cannot replace the one principal predecessor; without distinct successor identity and explicit lineage, this is not traceable single-predecessor update.
        ja: 同じ話題、同じセッション、同じエンティティの別バージョンは唯一の主要前駆を代替できません。異なる後続識別子と明示的な系譜がなければ、追跡可能な単一前駆更新ではありません。
      source_claims:
        - claim-memory-update-predecessor
        - claim-memory-update-successor
    - id: MemoryUpdate-revision-scope-basis-and-preservation-consistency
      expression: "changed_field_paths is nonempty, revision_kind and revision_reason are supported by revision_evidence_refs, preserved_commitment_refs remain represented by successor, and update_evidence_digest covers predecessor, revision, commitments, successor, and lineage."
      explanation:
        zh: 更新必须明确改变什么、为何改变以及什么仍需保持；无依据的编辑、静默丢失约束或无法复核的范围摘要均不能成为成功修订。
        en: Update must state what changes, why it changes, and what remains; unsupported edit, silently lost commitment, or unreviewable scope digest cannot become successful revision.
        ja: 更新は何を変更し、なぜ変更し、何が残るかを明示しなければなりません。根拠のない編集、黙って失われる約束、再検討不能な範囲ダイジェストは成功した修訂になれません。
      source_claims:
        - claim-memory-update-revision
        - claim-memory-update-digest
    - id: MemoryUpdate-boundary-from-write-merge-consolidation-compaction-and-reflection
      expression: "A successful update is a one-predecessor semantic revision with a distinct successor; initial write, in-place overwrite, multiple-peer union, cross-observation generalization, representation-cost reduction, scoped action lesson, transient view, draft, or plan does not satisfy MemoryUpdate."
      explanation:
        zh: 更新的种差是基于一个明确前驱的可审计语义修订；相似的写入、合并、总结、优化或维护措辞不能吸收其他生命周期活动。
        en: Update's differentia is auditable semantic revision of one explicit predecessor; similar write, merge, summary, optimization, or maintenance wording cannot absorb other lifecycle activities.
        ja: 更新の種差は、一つの明示的な前駆に対する監査可能な意味的修訂です。似た書込み、結合、要約、最適化、保守の表現で他のライフサイクル活動を取り込むことはできません。
      source_claims:
        - claim-memory-update-boundary
  required_relation_constraints:
    - relation_id: MemoryUpdate-consumes-MemoryRecord
      requirement: A successful update must consume predecessor_record_ref as its one principal predecessor record.
    - relation_id: MemoryUpdate-produces-MemoryRecord
      requirement: A successful update must produce distinct successor_record_ref with supersedes lineage to predecessor_record_ref.
examples:
  - id: MemoryUpdate-example-positive-verified-timezone-correction

    labels:
      zh: 根据经验证用户纠正更新时区
      en: Update time zone from verified user correction
      ja: 検証済み利用者訂正によるタイムゾーン更新

    descriptions:
      zh: MemGPT core_memory_replace(key="persona", old="...", new="...") 原地替换工作记忆块；Generative Agents 更新 Memory Stream 条目 importance 分数。
      en: MemGPT core_memory_replace(key="persona", old="...", new="...") replaces working-memory block; Generative Agents updates Memory Stream entry importance score.
      ja: MemGPT core_memory_replace。Generative Agents が Memory Stream entry importance を更新。
    field_values:
      operation_id: mem-op-update-3801
