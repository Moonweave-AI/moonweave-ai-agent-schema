schema: moonweave.ai/ontology-node/v1
id: MemoryUpdate
kind: concept
status: review
labels:
  zh: 记忆更新
  en: Memory update
  ja: 記憶更新
semantics:
  short_definition:
    zh: 针对一个主要前驱记录产生语义修订后继版本的操作。
    en: An operation producing a semantically revised successor from one principal predecessor record.
    ja: 一principal predecessor recordからsemantic revision後のsuccessor版を生成するoperationです。
  definition:
    zh: MemoryUpdate 是 MemoryRevisionOperation：它以一个主要 MemoryRecord 为前驱，保留其身份谱系并产生不同 record_id 或 version_id 的后继；多个并列前驱的组合应归 MemoryMerge。
    en: MemoryUpdate is a MemoryRevisionOperation with one principal MemoryRecord predecessor that preserves lineage and produces a successor with a distinct record or version identity. Combining multiple peer predecessors is MemoryMerge.
    ja: MemoryUpdate は一principal MemoryRecord predecessorを持ちlineageを保って別record/version identityのsuccessorを生成する MemoryRevisionOperationです。複数peer predecessorの組合せはMemoryMergeです。
  why_needed:
    zh: 让“修改内容”与“版本替代关系”分别落在活动和记录之间。
    en: Separates the modifying activity from the supersession relation between records.
    ja: content変更activityとrecord間supersession relationを分離します。
  includes:
    - zh: 纳入纠正事实、变更偏好、刷新摘要或修改记录元数据后生成后继。
      en: Includes successor creation after correcting a fact, changing a preference, refreshing a summary, or revising record metadata.
      ja: fact訂正・preference変更・summary refresh・record metadata改訂後のsuccessor生成を含みます。
  excludes:
    - zh: 排除原地覆盖、初始写入以及多个独立记录的合并。
      en: Excludes in-place overwrite, initial write, and merging independent records.
      ja: in-place overwrite・initial write・独立record複数のmergeを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - update_operation_id
  fields:
    - id: update_operation_id
      labels:
        zh: 更新操作标识
        en: update operation ID
        ja: update operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次单前驱更新活动。
        en: Identifies one single-predecessor update activity.
        ja: 一single-predecessor update activityを識別します。
      allowed_values: []
      pattern: null
      example_value: update-512
      source_claims:
        - claim-memory-update-002
    - id: successor_record_id
      labels:
        zh: 后继记录标识
        en: successor record ID
        ja: successor record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该更新产生并替代前驱的记录版本。
        en: Identifies the record version generated by the update to supersede its predecessor.
        ja: updateが生成しpredecessorをsupersedeするrecord版を識別します。
      allowed_values: []
      pattern: null
      example_value: record-512-v2
      source_claims:
        - claim-memory-update-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryUpdate-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆更新正例
      en: "Positive case: Memory update"
      ja: 記憶更新正例
    scenario_id: null
    descriptions:
      zh: memory-op-update-001 根据经验证的用户更正，读取 record-512-v1 并生成身份独立的后继 record-512-v2；前驱保持不可变，后继通过 supersedes 事实指回前驱。
      en: memory-op-update-001 applies a verified user correction, reads record-512-v1, and produces separately identified successor record-512-v2; the predecessor stays immutable and the successor points back through the supersedes fact.
      ja: memory-op-update-001 は検証済み利用者訂正を適用し、record-512-v1 を読み、別同一性の後継 record-512-v2 を生成します。前駆は不変で、後継は supersedes 事実で前駆を指します。
    field_values:
      operation_id: memory-op-update-001
      reason: a newer higher-authority record replaces the prior version
      update_operation_id: memory-op-update-001
      successor_record_id: record-512-v2
      revision_operation_id: memory-op-update-001
      predecessor_record_ids:
        - record-512-v1
      started_at: 2026-07-16T13:11:00Z
    related_node_ids:
      - MemoryUpdate
      - MemoryRevisionOperation
    related_relation_ids:
      - MemoryUpdate-is_a-MemoryRevisionOperation
    expected_result:
      zh: 归类为 MemoryUpdate，并建立 v2 supersedes v1。
      en: Classify as MemoryUpdate and assert that v2 supersedes v1.
      ja: MemoryUpdateに分類しv2 supersedes v1をassertします。
    why_valid_or_invalid:
      zh: 有一个主要前驱、明确变更依据和不同的后继身份。
      en: There is one principal predecessor, an explicit change basis, and a distinct successor identity.
      ja: 一principal predecessor・明示change basis・別successor identityがあります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-update-004
  - id: MemoryUpdate-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 不可变前驱的记忆更新实例
      en: Memory-update instance with immutable predecessor
      ja: 不変前駆を持つ記憶更新インスタンス
    scenario_id: MemoryUpdate:instance:memory-op-update-001
    descriptions:
      zh: memory-op-update-001 根据经验证的用户更正，读取 record-512-v1 并生成身份独立的后继 record-512-v2；前驱保持不可变，后继通过 supersedes 事实指回前驱。
      en: memory-op-update-001 applies a verified user correction, reads record-512-v1, and produces separately identified successor record-512-v2; the predecessor stays immutable and the successor points back through the supersedes fact.
      ja: memory-op-update-001 は検証済み利用者訂正を適用し、record-512-v1 を読み、別同一性の後継 record-512-v2 を生成します。前駆は不変で、後継は supersedes 事実で前駆を指します。
    field_values:
      operation_id: memory-op-update-001
      reason: a newer higher-authority record replaces the prior version
      update_operation_id: memory-op-update-001
      successor_record_id: record-512-v2
    related_node_ids:
      - MemoryUpdate
      - MemoryRevisionOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryUpdate-is_a-MemoryRevisionOperation
      - MemoryUpdate-consumes-MemoryRecord
      - MemoryUpdate-produces-MemoryRecord
    expected_result:
      zh: 查询返回一次 Update、一个不可变前驱和一个身份不同的后继，并沿记录间 supersedes 方向从后继回查前驱。
      en: The query returns one Update, one immutable predecessor, and one separately identified successor and follows the record-level supersedes direction from successor back to predecessor.
      ja: 一つの Update、不変前駆、別同一性の後継を返し、記録間 supersedes の向きで後継から前駆を追跡します。
    why_valid_or_invalid:
      zh: 活动只有一个主要前驱并保留版本谱系；它不是多记录合并，也不把旧记录原地改写。
      en: The activity has one principal predecessor and preserves version lineage; it neither merges peer records nor mutates the old record in place.
      ja: 主要前駆が一つで版系譜を保持し、同格記録の結合でも旧記録のインプレース変更でもありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-update-004
  - id: MemoryUpdate-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆更新边界例
      en: "Boundary case: Memory update"
      ja: 記憶更新境界例
    scenario_id: null
    descriptions:
      zh: update-513 同时把三条独立会议记录综合成一条共识记录。
      en: update-513 combines three independent meeting records into one consensus record.
      ja: update-513 は三つの独立meeting recordを一consensus recordへまとめます。
    field_values: {}
    related_node_ids:
      - MemoryUpdate
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemoryUpdate；应归入 MemoryConsolidation 或 MemoryMerge。
      en: Do not classify as MemoryUpdate; classify as MemoryConsolidation or MemoryMerge according to abstraction intent.
      ja: MemoryUpdateでなく抽象意図によりMemoryConsolidationまたはMemoryMergeへ分類します。
    why_valid_or_invalid:
      zh: 不存在唯一主要前驱，核心动作是多输入综合。
      en: There is no unique principal predecessor; the defining action is multi-input synthesis.
      ja: unique principal predecessorがなく定義actionはmulti-input synthesisです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-update-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MemoryUpdate-is_a-MemoryRevisionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆修订操作
    en: is a memory revision operation
    ja: 記憶改訂操作の一種
  definitions:
    zh: MemoryUpdate —is_a→ MemoryRevisionOperation 表示：只有一个主要前驱记录，输出是针对该前驱语义改动的后继版本。
    en: MemoryUpdate —is_a→ MemoryRevisionOperation holds because there is one principal predecessor and the output is its semantically revised successor
    ja: MemoryUpdate —is_a→ MemoryRevisionOperation は、一principal predecessorがありoutputがそのsemantic revision successorであるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse is a memory revision operation
      ja: 逆方向読取
  conditions:
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—there is one principal predecessor and the output is its semantically revised successor—and already meets the activity definition of MemoryRevisionOperation.
      explanations:
        zh: 仅当实例满足子类种差“只有一个主要前驱记录，输出是针对该前驱语义改动的后继版本。”且已满足 MemoryRevisionOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—there is one principal predecessor and the output is its semantically revised successor—and already meets the activity definition of MemoryRevisionOperation.
        ja: instanceがchild differentia「一principal predecessorがありoutputがそのsemantic revision successorであるため成立します。」を満たし、かつ MemoryRevisionOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-update-004
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆修订操作正例
        en: "Positive case: is a memory revision operation"
        ja: 記憶改訂操作の一種正例
      scenario_id: MemoryUpdate-is_a-MemoryRevisionOperation:positive:20260716
      descriptions:
        zh: update-512 以 record-512-v1 为唯一主前驱，根据用户更正只修改 timezone 字段，并生成 record-512-v2。
        en: update-512 uses record-512-v1 as its sole principal predecessor, applies a user correction only to timezone, and generates record-512-v2.
        ja: update-512 は record-512-v1 を唯一 principal predecessor とし、user correction で timezone だけを変更して record-512-v2 を生成します。
      field_values: {}
      related_node_ids:
        - MemoryUpdate
        - MemoryRevisionOperation
      related_relation_ids:
        - MemoryUpdate-is_a-MemoryRevisionOperation
      expected_result:
        zh: 将 update-512 归入 MemoryUpdate，并明确它是单一主前驱上的定向语义修订。
        en: Classify update-512 as MemoryUpdate and record it as a targeted semantic revision over one principal predecessor.
        ja: update-512 を MemoryUpdate に分類し、一つの principal predecessor に対する targeted semantic revision と記録します。
      why_valid_or_invalid:
        zh: 输入只有一个主版本，输出保留其对象身份谱系并实施明确更正，区别于多输入合成活动。
        en: There is one principal input version and the output preserves its object lineage while applying a defined correction, unlike multi-input synthesis.
        ja: principal input version は一つで、output は object lineage を保ち明示 correction を適用するため multi-input synthesis と異なります。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-update-004
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆修订操作边界例
        en: "Boundary case: is a memory revision operation"
        ja: 記憶改訂操作の一種境界例
      scenario_id: MemoryUpdate-is_a-MemoryRevisionOperation:boundary:20260716
      descriptions:
        zh: merge-512 同时读取两个同级记录 record-a 与 record-b，输出联合事实且没有唯一的主前驱。
        en: merge-512 reads peer records record-a and record-b, emits their union, and has no unique principal predecessor.
        ja: merge-512 は peer record-a と record-b を読み union を出力し、unique principal predecessor を持ちません。
      field_values: {}
      related_node_ids:
        - MemoryUpdate
        - MemoryRevisionOperation
      related_relation_ids:
        - MemoryUpdate-is_a-MemoryRevisionOperation
      expected_result:
        zh: 拒绝把 merge-512 归为 MemoryUpdate；应建模为 MemoryMerge，并为两个输入保留来源映射。
        en: Reject MemoryUpdate membership for merge-512; model it as MemoryMerge and retain source mappings for both inputs.
        ja: merge-512 の MemoryUpdate 所属を拒否し、MemoryMerge として両 input の source mapping を保持します。
      why_valid_or_invalid:
        zh: 多同级输入联合不是对一个前驱的定向更新；强行归为 update 会丢失第二输入在生成中的角色。
        en: Union of multiple peer inputs is not a targeted update of one predecessor; typing it as update would erase the second input's generative role.
        ja: 複数 peer input の union は一 predecessor の targeted update ではなく、update とすると第二 input の generation role が消えます。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-update-004
  source_claims:
    - claim-memory-update-004
