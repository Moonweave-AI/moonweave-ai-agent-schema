parent_relation:
  id: MemoryUpdate-is_a-MemoryRevisionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆修订操作
    en: is a memory revision operation
    ja: 記憶改訂操作の一種である
  definitions:
    zh: MemoryUpdate 是以一条主要前驱为基础、创建具有显式谱系的定向语义后继的 MemoryRevisionOperation。
    en: MemoryUpdate is a MemoryRevisionOperation that creates a targeted semantic successor with explicit lineage from one principal predecessor.
    ja: MemoryUpdate は、一つの主要前駆から明示的な系譜を持つ対象を絞った意味的後続を作成する MemoryRevisionOperation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次更新的字段数、修订依据数、保持承诺数或后续检索数。
    en: The classification relation expresses type membership and does not limit changed-field count, revision-evidence count, preserved-commitment count, or later retrieval count of one update.
    ja: この分類関係は型の所属を表し、一つの更新における変更フィールド数、修訂根拠数、保持する約束の数、後の検索数を制限しません。
  inverse_reading:
    predicate: has_update_subtype
    labels:
      zh: 具有更新子类
      en: has update subtype
      ja: 更新サブタイプを持つ
  conditions:
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-single-predecessor-revision
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the child differentia: one exact principal predecessor is semantically revised into a distinctly identified successor with explicit lineage, and the instance already satisfies MemoryRevisionOperation."
      explanation:
        zh: 仅当实例满足子类种差——一条精确主要前驱被语义修订为具有显式谱系的不同后继——且已满足 MemoryRevisionOperation 定义时，才能建立该边。
        en: "Assert only when the instance satisfies the child differentia: one exact principal predecessor is semantically revised into a distinctly identified successor with explicit lineage, and it already meets the MemoryRevisionOperation definition."
        ja: 子類の種差、すなわち一つの正確な主要前駆が明示的な系譜を持つ異なる後続へ意味的に修訂されることを満たし、かつ MemoryRevisionOperation の定義を満たす場合にのみ、この辺を確立します。
      source_claims:
        - claim-memory-update-activity
        - claim-memory-update-predecessor
        - claim-memory-update-successor
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-example-positive

      labels:
        zh: 单前驱时区修订属于记忆修订操作
        en: Single-predecessor time-zone revision is memory revision operation
        ja: 単一前駆のタイムゾーン修訂は記憶改訂操作である

      descriptions:
        zh: mem-op-update-3801 只读取 record-3801-profile-v1，依据验证后的用户纠正修改时区，并生成具有 supersedes 谱系的 record-3801-profile-v2。
        en: mem-op-update-3801 reads only record-3801-profile-v1, changes time zone under verified user correction, and generates record-3801-profile-v2 with supersedes lineage.
        ja: mem-op-update-3801 は record-3801-profile-v1 だけを読み、検証済み利用者訂正のもとでタイムゾーンを変更し、supersedes 系譜を持つ record-3801-profile-v2 を生成します。
      field_values:
        operation_id: mem-op-update-3801
        predecessor_record_ref: record-3801-profile-v1
        revision_kind: fact_correction
        changed_field_paths:
          - /profile/timezone
        successor_record_ref: record-3801-profile-v2
        lineage_relation: supersedes
      related_node_ids:
        - MemoryUpdate
        - MemoryRevisionOperation
      related_relation_ids:
        - MemoryUpdate-is_a-MemoryRevisionOperation

      source_claims:
        - claim-memory-update-predecessor
        - claim-memory-update-revision
        - claim-memory-update-successor
    - id: MemoryUpdate-is_a-MemoryRevisionOperation-example-boundary-merge

      labels:
        zh: 多输入联合不属于更新子类
        en: Multi-input union is not update subtype
        ja: 複数入力の結合は更新サブタイプではない

      descriptions:
        zh: mem-op-merge-3803 读取两个同级会议记录并把兼容声明联合到新后继，没有唯一主要前驱或定向修订范围。
        en: mem-op-merge-3803 reads two peer meeting records and unions compatible claims into a new successor, with no unique principal predecessor or targeted revision scope.
        ja: mem-op-merge-3803 は二つの同格会議記録を読み、互換主張を新しい後続へ結合します。唯一の主要前駆も対象を絞った修訂範囲もありません。
      field_values:
        operation_id: mem-op-merge-3803
        peer_record_refs:
          - record-3803-actions-v1
          - record-3803-decisions-v1
        principal_predecessor_count: 0
        successor_record_ref: record-3803-meeting-v1
        union_method: combine_complementary_fields
      related_node_ids:
        - MemoryUpdate
        - MemoryRevisionOperation
        - MemoryMerge
      related_relation_ids:
        - MemoryUpdate-is_a-MemoryRevisionOperation
        - MemoryMerge-is_a-MemorySynthesisOperation

      source_claims:
        - claim-memory-update-boundary
  source_claims:
    - claim-memory-update-activity
    - claim-memory-update-predecessor
    - claim-memory-update-successor
  distinct_fact_rationale:
    zh: 该关系表达更新活动的类型成员资格，不表达其读取的前驱、产生的后继、记录间 supersedes 谱系、初始写入、多输入合并、巩固、压缩或反思。
    en: This relation expresses type membership of an update activity, not its read predecessor, produced successor, record-level supersedes lineage, initial write, multi-input merge, consolidation, compaction, or reflection.
    ja: この関係は更新活動の型所属を表し、読み取った前駆、生成した後続、記録レベルの supersedes 系譜、初期書込み、複数入力のマージ、統合、圧縮、反思を表すものではありません。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MemoryUpdate-consumes-MemoryRecord
    predicate: consumes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 消耗主要前驱记录
      en: consumes principal predecessor record
      ja: 主要前駆記録を消費する
    definitions:
      zh: 当且仅当目标是 MemoryUpdate 实际读取的唯一主要不可变前驱，并且其内容或元数据用于形成后继修订时，MemoryUpdate 消耗该 MemoryRecord。
      en: MemoryUpdate consumes a MemoryRecord only when target is the one principal immutable predecessor actually read and its content or metadata is used to form successor revision.
      ja: MemoryUpdate が MemoryRecord を消費するのは、対象が実際に読まれた唯一の主要かつ不変の前駆であり、その内容またはメタデータが後続修訂の形成に使われる場合に限られます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录一次更新对一条具体主要前驱的依赖；更新可以读取辅助证据，但本关系只表达版本修订所依赖的唯一记录前驱。
      en: This relation records one update's dependency on one concrete principal predecessor; update may read auxiliary evidence, but this relation expresses only the one record predecessor on which version revision depends.
      ja: この関係は一つの更新が一つの具体的な主要前駆に依存することを記録します。更新は補助証拠を読むことがありますが、この関係はバージョン修訂が依存する唯一の記録前駆だけを表します。
    inverse_reading:
      predicate: is_principal_predecessor_for
      labels:
        zh: 是更新的主要前驱
        en: is principal predecessor for update
        ja: 更新の主要前駆である
    conditions:
      - id: MemoryUpdate-consumes-MemoryRecord-exact-principal-predecessor
        severity: error
        expression_language: plain
        expression: "Assert only when target_record_ref equals predecessor_record_ref, target was actually read and existed when the operation began, and target content or metadata contributes to changed_field_paths or preserved_commitment_refs; same-topic, retrieved, or nearby records do not qualify."
        explanation:
          zh: 只有被实际读取、明确选为前驱且用于修订或保持证明的记录可被消耗；同主题、仅检索到或上下文相邻的记录不是主要前驱。
          en: Only a record actually read, explicitly selected as predecessor, and used for revision or preservation proof may be consumed; same-topic, merely retrieved, or nearby records are not principal predecessors.
          ja: 実際に読まれ、前駆として明示的に選ばれ、修訂または保持の証明に使われる記録だけが消費できます。同じ話題、検索されたのみ、近接した記録は主要前駆ではありません。
        source_claims:
          - claim-memory-update-predecessor
          - claim-memory-update-revision
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryUpdate-consumes-MemoryRecord-example-positive-profile-v1

        labels:
          zh: 读取精确主要前驱以更新时区
          en: Reads exact principal predecessor to update time zone
          ja: タイムゾーン更新のため正確な主要前駆を読む

        descriptions:
          zh: mem-op-update-3801 读取 record-3801-profile-v1 的时区、所有者锚点和披露约束，并用这些内容限定时区修订与后继保持项。
          en: mem-op-update-3801 reads time zone, owner anchor, and disclosure constraint from record-3801-profile-v1, using them to bound time-zone revision and successor preservation.
          ja: mem-op-update-3801 は record-3801-profile-v1 からタイムゾーン、所有者アンカー、開示制約を読み、それらをタイムゾーン修訂と後続の保持項目を限定するために使います。
        field_values:
          operation_id: mem-op-update-3801
          target_record_ref: record-3801-profile-v1
          predecessor_record_ref: record-3801-profile-v1
          changed_field_paths:
            - /profile/timezone
          preserved_commitment_refs:
            - anchor-3801-profile-owner
            - constraint-3801-no-external-disclosure
        related_node_ids:
          - MemoryUpdate
          - MemoryRecord
        related_relation_ids:
          - MemoryUpdate-consumes-MemoryRecord

        source_claims:
          - claim-memory-update-predecessor
          - claim-memory-update-revision
      - id: MemoryUpdate-consumes-MemoryRecord-example-boundary-nearby-record

        labels:
          zh: 相邻同主题记录不会自动成为主要前驱
          en: Nearby same-topic record is not automatically principal predecessor
          ja: 近接した同話題記録は自動的に主要前駆にならない

        descriptions:
          zh: record-3801-profile-history-v1 与前驱属于同一用户且显示在同一次检索中，但未被 mem-op-update-3801 读取、选择或映射到后继。
          en: record-3801-profile-history-v1 belongs to the same user and appears in the same retrieval, but mem-op-update-3801 neither reads nor selects it nor maps it to successor.
          ja: record-3801-profile-history-v1 は同じ利用者に属し同じ検索に表示されますが、mem-op-update-3801 はそれを読まず、選択せず、後続へマッピングもしません。
        field_values:
          operation_id: mem-op-update-3801
          target_record_ref: record-3801-profile-history-v1
          predecessor_record_ref: record-3801-profile-v1
          target_was_read: false
          target_mapped_to_successor: false
        related_node_ids:
          - MemoryUpdate
          - MemoryRecord
        related_relation_ids:
          - MemoryUpdate-consumes-MemoryRecord

        source_claims:
          - claim-memory-update-boundary
    source_claims:
      - claim-memory-update-predecessor
      - claim-memory-update-revision
      - claim-memory-update-boundary
    distinct_fact_rationale:
      zh: 该关系表达更新活动对一条具体主要前驱记录的因果依赖，不表达类型分类、后继生成、记录间 supersedes、同主题关联、多输入合并或初始写入。
      en: This relation expresses an update activity's causal dependency on one concrete principal predecessor record, not type classification, successor generation, record-level supersedes, same-topic association, multi-input merge, or initial write.
      ja: この関係は更新活動が一つの具体的な主要前駆記録へ因果的に依存することを表し、型分類、後続生成、記録レベルの supersedes、同話題の関連、複数入力のマージ、初期書込みを表すものではありません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:MemoryRecord
  - id: MemoryUpdate-produces-MemoryRecord
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生修订后继记录
      en: produces revised successor record
      ja: 改訂後続記録を生成する
    definitions:
      zh: 当且仅当 MemoryUpdate 创建具有不同身份、明确 supersedes 谱系、声明变更范围和保持承诺的后继 MemoryRecord 时，MemoryUpdate 产生该记录。
      en: MemoryUpdate produces a MemoryRecord only when it creates a successor with distinct identity, explicit supersedes lineage, declared change scope, and preserved commitments.
      ja: MemoryUpdate が MemoryRecord を生成するのは、異なる識別子、明示的な supersedes 系譜、宣言された変更範囲、保持する約束を持つ後続を作成する場合に限られます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系记录一次成功更新产生一条具体修订后继的因果事实；原地覆盖、临时视图、未提交草稿或更新计划没有这种输出。
      en: This relation records the causal fact that one successful update produces one concrete revised successor; in-place overwrite, transient view, uncommitted draft, or update plan has no such output.
      ja: この関係は、一つの成功した更新が一つの具体的な改訂後続を生成する因果事実を記録します。その場での上書き、一時表示、未コミット草稿、更新計画にはこの出力がありません。
    inverse_reading:
      predicate: is_revised_output_of
      labels:
        zh: 是更新的修订输出
        en: is revised output of update
        ja: 更新の改訂出力である
    conditions:
      - id: MemoryUpdate-produces-MemoryRecord-distinct-successor-and-lineage
        severity: error
        expression_language: plain
        expression: "Assert only when target_record_ref equals successor_record_ref, target identity differs from predecessor_record_ref, lineage_relation equals supersedes, changed_field_paths and preserved_commitment_refs are represented by target, and update_evidence_digest binds its lineage; overwrite, view, draft, or plan cannot qualify."
        explanation:
          zh: 不同后继身份、显式谱系、声明修改和保持证明缺一不可；原地覆盖、临时视图、草稿或计划无法建立 produces 关系。
          en: Distinct successor identity, explicit lineage, declared changes, and preservation proof are all required; overwrite, transient view, draft, or plan cannot establish produces.
          ja: 異なる後続識別子、明示的な系譜、宣言された変更、保持の証明のすべてが必要です。その場での上書き、一時表示、草稿、計画は produces を確立できません。
        source_claims:
          - claim-memory-update-successor
          - claim-memory-update-revision
          - claim-memory-update-digest
          - claim-memory-update-boundary
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MemoryUpdate-produces-MemoryRecord-example-positive-profile-v2

        labels:
          zh: 产生带可审计谱系的时区修订后继
