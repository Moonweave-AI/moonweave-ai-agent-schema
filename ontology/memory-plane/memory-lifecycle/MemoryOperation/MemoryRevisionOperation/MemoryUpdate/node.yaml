          en: In-place overwritten old record is not update successor
          ja: その場で上書きされた旧記録は更新後続ではない

        descriptions:
          zh: mem-op-update-3802 改写 record-3802-profile-v1 后仍把同一 record ID 作为输出，没有后继身份、supersedes 链接或保持承诺。
