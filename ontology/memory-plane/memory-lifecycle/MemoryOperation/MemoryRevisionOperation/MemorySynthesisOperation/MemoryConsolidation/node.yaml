sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind auditable support, scope, confidence, and generalization evidence.
source_claims:
  - id: claim-memory-consolidation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities, agents, time, and provenance facts around it. Moonweave records consolidation as an executed operation with observations, scope, confidence, successor, result, and audit evidence rather than a static preference label or plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-consolidation-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a consolidation's support, counterevidence, scope, confidence, successor, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-consolidation-support
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from nearby or merely similar entities. Moonweave records exact observations as support or counterevidence and does not infer support merely from shared topic, subject, session, or text similarity.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-consolidation-generalization
    source: w3c-prov-o
    supports: PROV-O records derivation and generation associations between entities and activities. Moonweave models a stable scoped generalization with confidence as a separately generated successor whose supporting and counterevidence lineage remains auditable.
    locator: "PROV-O sections on prov:wasDerivedFrom and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-consolidation-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave requires a separately identified generalized successor record rather than rewriting a support record or treating an absolute label as generated output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-consolidation-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over supporting and counterevidence versions, stability basis, generalization, scope, confidence, transformation output, and successor identity to bind consolidation evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-consolidation-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, generated entities, and derivations. Moonweave keeps same-event merge, representation-only compaction, action-lesson reflection, single-observation update, unscoped absolute assertion, and unexecuted recommendations distinct from scoped cross-observation consolidation.
    locator: "PROV-O sections on Activity, Entity, use, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
