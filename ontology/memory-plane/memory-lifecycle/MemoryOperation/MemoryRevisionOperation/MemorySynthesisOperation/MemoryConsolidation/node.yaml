schema: moonweave.ai/ontology-node/v1
id: MemoryConsolidation
kind: concept
labels:
  zh: 记忆巩固
  en: Memory consolidation
  ja: 記憶統合
semantics:
  short_definition:
    zh: 将多条相关观察整合为更稳定长期表示。
    en: Integrates related observations into a stabler long-term representation.
    ja: 関連 observation をより安定な長期表現へ統合。
  definition:
    zh: MemoryConsolidation 是 MemorySynthesisOperation：消费一组相关 MemoryRecord 或 episodic 片段，产生更抽象、稳定的 consolidated record，通常保留 source lineage。与 MemoryMerge 的 deduplicate 不同，巩固强调语义抽象而非删除重复；与 MemoryReflection 不同，输出仍为 factual consolidation 而非 introspective insight。
    en: MemoryConsolidation is a MemorySynthesisOperation consuming a set of related MemoryRecords or episodic fragments to produce a more abstract, stable consolidated record, usually preserving source lineage. Unlike MemoryMerge deduplication, consolidation emphasizes semantic abstraction rather than duplicate removal; unlike MemoryReflection, output remains factual consolidation rather than introspective insight.
    ja: MemoryConsolidation は関連 MemoryRecord/episodic fragment を consume し abstract/stable consolidated record を生成する MemorySynthesisOperation。MemoryMerge dedup とは異なり抽象化重視。MemoryReflection とは異なり factual consolidation。
  why_needed:
    zh:  episodic 片段累积若不巩固，检索会返回大量近重复片段而非可用长期事实。
    en: Without consolidation, episodic fragment accumulation yields many near-duplicate retrievals instead of usable long-term facts.
    ja: episodic fragment 蓄積を consolidation しないと near-duplicate 检索が増える。
  includes:
    - zh: 纳入 episodic-to-semantic 整合、会话摘要写入长期存储与 LangMem collection reconciliation。
      en: Includes episodic-to-semantic integration, session summary into long-term store, and LangMem collection reconciliation.
      ja: episodic-to-semantic/会话 summary 长期化/LangMem reconciliation。
  excludes:
    - zh: 排除 deduplicate 合并、Claude auto-compact 与 Generative Agents reflection insight。
      en: Excludes deduplicate merge, Claude auto-compact, and Generative Agents reflection insight.
      ja: deduplicate merge/Claude compact/GA reflection insight を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 映射 LangMem collection reconciliation/consolidation 与 Letta 将多轮对话摘要写入 archival；consolidation_operation_id 绑定 source_record_ids 与 abstraction_level。
    en: Map LangMem collection reconciliation/consolidation and Letta multi-turn summary into archival; consolidation_operation_id binds source_record_ids and abstraction_level.
    ja: LangMem reconciliation/Letta multi-turn summary を写像。source_record_ids/abstraction_level を bind。
  typical_input:
    - description: Related records for consolidation
      format: |
        {"consolidation_operation_id": "consolidate-330", "source_record_ids": ["record-320-v1", "record-321-v1", "record-322-v1"]}
      source_claims: [claim-consolidation-design]
  typical_output:
    - description: Consolidated record
      format: |
        {"produced_record_id": "record-consolidated-330-v1", "abstraction_level": "semantic"}
      source_claims: [claim-consolidation-design]
  reference_implementations:
    - name: LangMem
      url: https://langchain-ai.github.io/langmem/
      description: Collection reconciliation and consolidation.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: Summarize sessions into archival passages.
structure:
  identity_keys: [consolidation_operation_id]
  fields:
    - id: consolidation_operation_id
      labels: {zh: 巩固操作标识, en: Consolidation operation identifier, ja: 統合操作識別子}
      definitions:
        zh: 标识一次记忆巩固活动。
        en: Identifies one memory consolidation activity.
        ja: 一 memory consolidation activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: consolidate-330
      allowed_values: []
      source_claims: [claim-consolidation-id]
    - id: abstraction_level
      labels: {zh: 抽象层级, en: Abstraction level, ja: 抽象レベル}
      definitions:
        zh: 输出记录的抽象程度，如 episodic、semantic、profile。
        en: Abstraction level of output record such as episodic, semantic, profile.
        ja: episodic/semantic/profile 等 abstraction level。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: semantic
      allowed_values: []
      source_claims: [claim-consolidation-level]
  constraints: []
  required_relations: []
examples:
  - id: MemoryConsolidation-example-session
    labels: {zh: 会话巩固, en: Session consolidation, ja: セッション統合}
    descriptions:
      zh: consolidate-330 将三轮对话 episodic record 整合为一条 semantic 长期偏好 record。
      en: consolidate-330 integrates three turns of episodic records into one semantic long-term preference record.
      ja: 三 turn episodic を semantic 長期 preference に consolidate-330。
    example_source: {product: LangMem, url: https://langchain-ai.github.io/langmem/, version: consolidation}
    field_values: {consolidation_operation_id: consolidate-330, abstraction_level: semantic}
    related_node_ids: [MemoryConsolidation, MemorySynthesisOperation]
    related_relation_ids: []
    source_claims: [claim-consolidation-langmem, claim-consolidation-design]
  - id: MemoryConsolidation-example-letta
    labels: {zh: Letta 归档巩固, en: Letta archival consolidation, ja: Letta archival 統合}
    descriptions:
      zh: consolidate-letta-12 将多段 tool result 摘要写入一条 archival passage。
      en: consolidate-letta-12 writes summarized tool results into one archival passage.
      ja: 複数 tool result 要約を一 archival passage へ。
    example_source: {product: Letta, url: https://docs.letta.com/guides/core-concepts/memory/archival-memory, version: summarization}
    field_values: {consolidation_operation_id: consolidate-letta-12}
    related_node_ids: [MemoryConsolidation]
    related_relation_ids: []
    source_claims: [claim-consolidation-letta, claim-consolidation-design]
  - id: MemoryConsolidation-example-not-merge
    labels: {zh: 巩固非 dedup 合并, en: Consolidation is not dedup merge, ja: consolidation は dedup merge ではない}
    descriptions:
      zh: merge-221 用 deduplicate 删除重复；consolidate-330 产生更高抽象的新 fact 而非简单合并文本。
      en: merge-221 uses deduplicate to remove duplicates; consolidate-330 produces higher-abstraction new facts rather than simple text merge.
      ja: merge は dedup、consolidation は高抽象 fact 生成。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryConsolidation, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-consolidation-design]
  - id: MemoryConsolidation-example-lineage
    labels: {zh: 源 lineage 保留, en: Source lineage retained, ja: source lineage 保持}
    descriptions:
      zh: record-consolidated-330-v1 保留指向 record-320/321/322 的 provenance_ref。
      en: record-consolidated-330-v1 retains provenance_ref to record-320/321/322.
      ja: consolidated record が source への provenance_ref を保持。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: lineage}
    field_values: {produced_record_id: record-consolidated-330-v1}
    related_node_ids: [MemoryConsolidation, MemoryRecord]
    related_relation_ids: []
    source_claims: [claim-consolidation-design]
parent_relation:
  id: MemoryConsolidation-is_a-MemorySynthesisOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆合成操作, en: is a memory synthesis operation, ja: 記憶合成操作の一種}
  definitions:
    zh: MemoryConsolidation —is_a→ MemorySynthesisOperation 表示多条相关 record 被整合为更稳定抽象表示。
    en: MemoryConsolidation —is_a→ MemorySynthesisOperation holds because related records integrate into a stabler abstract representation.
    ja: 関連 record を安定抽象表現へ統合するため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryConsolidation-is_a-MemorySynthesisOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when multiple related records integrate into a stabler abstract successor.
      explanations:
        zh: 仅当多条相关 record 整合为更稳定抽象后继时成立。
        en: Assert only when multiple related records integrate into a stabler abstract successor.
        ja: 複数関連 record が安定抽象 successor に統合される時のみ。
      source_claims: [claim-consolidation-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-consolidation-design]
  endpoint_order: child-to-parent
relations: []
