    locator: collection management
    evidence_kind: primary-doc
    confidence: high
  - id: claim-consolidation-letta
    source: src-letta-consolidation
    supports: Letta can summarize multi-turn content into archival passages.
    locator: archival memory guide
    evidence_kind: primary-doc
    confidence: high
  - id: claim-consolidation-design
    source: src-consolidation-design
    supports: MemoryConsolidation produces abstract stable records from related sources.
    locator: MemoryConsolidation boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-consolidation-id
    source: src-consolidation-design
    supports: consolidation_operation_id identifies one consolidation activity.
    locator: structure
