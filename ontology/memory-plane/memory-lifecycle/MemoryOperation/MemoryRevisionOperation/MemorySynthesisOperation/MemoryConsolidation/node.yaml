schema: moonweave.ai/ontology-node/v1
id: MemoryConsolidation
kind: concept
status: accepted
labels:
  zh: 记忆巩固
  en: Memory consolidation
  ja: 記憶固定化
semantics:
  short_definition:
    zh: 从重复或相关观测形成更稳定、概括层次更高记录的综合操作。
    en: A synthesis operation forming a more stable, more generalized record from repeated or related observations.
    ja: 反復/関連observationからよりstableで高抽象recordを形成するsynthesis operationです。
  definition:
    zh: MemoryConsolidation 从多个有时间或情境差异的 MemoryRecord 推导稳定模式、偏好或知识，并保留支持证据；它允许舍弃部分实例细节，但不是为减少字节数而压缩。
    en: MemoryConsolidation derives a stable pattern, preference, or knowledge statement from MemoryRecords across times or contexts while retaining supporting evidence. It may omit instance detail, but it is not byte-size reduction for its own sake.
    ja: MemoryConsolidation は時間/文脈の異なる MemoryRecordからstable pattern・preference・knowledgeを導きsupporting evidenceを保持します。instance detailを省略できますがbyte-size削減自体が目的ではありません。
  why_needed:
    zh: 把长期语义概括与简单合并、压缩和反思区分开。
    en: Separates long-term semantic generalization from simple merge, compaction, and reflection.
    ja: long-term semantic generalizationをsimple merge・compaction・reflectionから分けます。
  includes:
    - zh: 纳入跨会话偏好归纳、重复事实稳定化和多次经验的概括。
      en: Includes cross-session preference induction, repeated-fact stabilization, and generalization across experiences.
      ja: cross-session preference induction・repeated-fact stabilization・experience横断generalizationを含みます。
  excludes:
    - zh: 排除同一事件片段拼接、仅缩短表示和从失败得出的行动教训。
      en: Excludes joining fragments of one event, merely shortening representation, and action lessons derived from failure.
      ja: 同一event fragment結合・表現短縮のみ・failure由来action lessonを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - consolidation_operation_id
  fields:
    - id: consolidation_operation_id
      labels:
        zh: 巩固操作标识
        en: consolidation operation ID
        ja: consolidation operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次跨观测巩固活动。
        en: Identifies one cross-observation consolidation activity.
        ja: 一cross-observation consolidation activityを識別します。
      allowed_values: []
      pattern: null
      example_value: consolidate-811
      source_claims:
        - claim-memory-consolidation-002
    - id: supporting_record_ids
      labels:
        zh: 支持记录标识
        en: supporting record IDs
        ja: supporting record IDs
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出支撑概括结论的观测记录。
        en: Lists observation records supporting the generalized conclusion.
        ja: generalized conclusionを支えるobservation recordを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - choice-1
        - choice-2
        - choice-3
      source_claims:
        - claim-memory-consolidation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryConsolidation-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 记忆巩固正例
      en: "Positive case: Memory consolidation"
      ja: 記憶固定化正例
    scenario_id: null
    descriptions:
      zh: memory-op-consolidation-001 比较 session-11、session-18 与 session-25 中用户选择中文回复的记录，形成置信度 0.84 的稳定偏好记录，并保留三个支持记录的链接。
      en: memory-op-consolidation-001 compares the user's Chinese-response choices in sessions 11, 18, and 25, forms a stable preference record at confidence 0.84, and retains links to all three supporting records.
      ja: memory-op-consolidation-001 は session-11・18・25 の中国語応答選択を比較し、信頼度 0.84 の安定した選好記録を作り、三つの根拠記録へのリンクを保持します。
    field_values:
      consolidation_operation_id: memory-op-consolidation-001
      supporting_record_ids:
        - session-11-choice
        - session-18-choice
        - session-25-choice
      operation_id: memory-op-consolidation-001
      reason: related episodic records are consolidated into a semantic summary
      synthesis_operation_id: memory-op-consolidation-001
      synthesis_goal: generalization
      revision_operation_id: memory-op-consolidation-001
      predecessor_record_ids:
        - session-11-choice
        - session-18-choice
        - session-25-choice
      started_at: 2026-07-16T13:14:00Z
    related_node_ids:
