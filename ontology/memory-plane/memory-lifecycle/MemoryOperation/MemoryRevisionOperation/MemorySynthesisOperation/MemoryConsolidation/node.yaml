schema: moonweave.ai/ontology-node/v1
id: MemoryConsolidation
kind: concept
status: accepted
labels:
  zh: 记忆巩固
  en: Memory consolidation
  ja: 記憶固定化
semantics:
  short_definition:
    zh: 从跨时间或情境的重复支持观测形成带适用范围和证据谱系的稳定概括后继记录的综合操作。
    en: A synthesis operation that forms a stable generalized successor record with applicability scope and evidence lineage from repeated supporting observations across time or context.
    ja: 時間または文脈をまたぐ反復した支持観測から、適用範囲と証拠来歴を持つ安定した一般化後継記録を形成する統合操作です。
  definition:
    zh: MemoryConsolidation 是已执行的 MemorySynthesisOperation。它读取至少两个来自不同时间或情境的支持性 MemoryRecord 观测，声明概括的稳定性基础和适用范围，形成具有独立身份的新概括记录，并固定支持记录、反证处理、范围、置信度和证据摘要。它可以省略无关实例细节，但不得把不确定或存在反证的模式写成无限制永久事实。它不同于 MemoryMerge 对同一事件内容的联合、MemoryCompaction 对等价内容的受约束缩减，以及 MemoryReflection 从结果或反馈导出的行动教训。
    en: MemoryConsolidation is an executed MemorySynthesisOperation. It reads at least two supporting MemoryRecord observations from different times or contexts, declares the stability basis and applicability scope of a generalization, forms a newly identified generalized record, and fixes supporting records, counterevidence treatment, scope, confidence, and evidence digest. It may omit irrelevant instance detail but cannot write an uncertain or contradicted pattern as an unrestricted permanent fact. It differs from MemoryMerge unioning content of one event, MemoryCompaction reducing equivalent content under constraints, and MemoryReflection deriving an actionable lesson from outcome or feedback.
    ja: MemoryConsolidation は実行済みの MemorySynthesisOperation です。異なる時刻または文脈からの少なくとも二つの支持する MemoryRecord 観測を読み、一般化の安定性根拠と適用範囲を宣言し、新しく識別された一般化記録を形成し、支持記録、反証の扱い、範囲、信頼度、証拠ダイジェストを固定します。無関係な事例詳細を省略できますが、不確実または反証のあるパターンを無制限の恒久的事実として書くことはできません。同一イベント内容を結合する MemoryMerge、制約下で等価内容を縮減する MemoryCompaction、結果またはフィードバックから実行可能な教訓を導く MemoryReflection とは異なります。
  why_needed:
    zh: 稳定偏好、规律和知识需要能够回查的跨观察支持与范围限制；单独概念可防止同事件拼接、压缩或反思被误写为长期概括。
    en: Stable preferences, patterns, and knowledge need retrievable cross-observation support and scope limits; a distinct concept prevents same-event joining, compaction, or reflection from being mislabeled as long-term generalization.
    ja: 安定した選好、規則、知識には、再確認可能な観測横断の支持と範囲制限が必要です。独立した概念により、同一イベント結合、圧縮、反省が長期一般化と誤表示されることを防ぎます。
  includes:
    - zh: 跨会话、跨时间或跨情境的重复一致观测所支持的有限范围偏好、稳定事实和模式概括，以及这些概括的证据与置信度。
      en: Scoped preferences, stable facts, and pattern generalizations supported by repeated consistent observations across sessions, time, or contexts, together with their evidence and confidence.
      ja: セッション、時間、文脈をまたぐ反復した一貫観測に支持される、範囲付き選好、安定した事実、パターン一般化と、それらの証拠と信頼度を含みます。
  excludes:
    - zh: 同一事件片段的拼接、只减少表示成本的压缩、从一次失败或反馈导出的行动教训、一次观测的单点更新、无范围绝对断言和未执行概括建议。
      en: Joining fragments of one event, compaction reducing representation cost only, action lesson from one failure or feedback, single-observation update, unscoped absolute assertion, and an unexecuted generalization recommendation.
      ja: 一つのイベント断片の結合、表現コストだけを下げる圧縮、一回の失敗またはフィードバックからの行動教訓、単一観測更新、範囲のない絶対主張、未実行の一般化提案を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将巩固实现为受范围约束的多观察推断：选择跨时间或情境的精确支持记录，记录稳定性基础与可能反证，固定概括、适用范围和置信度，并创建新后继记录。不得仅凭同主题、同一会话、相似文本或一个实例推断长期偏好或永久规则。
    en: "Implement consolidation as a scope-bounded multi-observation inference: select exact supporting records across time or context, record stability basis and possible counterevidence, fix the generalization, applicability scope, and confidence, and create a new successor record. Do not infer a long-term preference or permanent rule from same-topic material, one session, similar text, or one instance."
    ja: 巩固は範囲で制約された多観測推論として実装します。時間または文脈をまたぐ正確な支持記録を選び、安定性根拠と可能な反証を記録し、一般化、適用範囲、信頼度を固定し、新しい後継記録を作成します。同じ話題、一つのセッション、類似テキスト、一つの事例から長期選好または恒久的規則を推論してはいけません。
  typical_input:
    - description: Supporting observations from multiple times or contexts, counterevidence references when known, stability basis, scope policy, actor identity, and start time.
      format: "{operation_id, supporting_record_refs, counterevidence_refs?, stability_basis, applicability_scope, actor_ref, started_at}"
  typical_output:
    - description: A scoped generalized successor record with confidence, support lineage, evidence digest, consolidation time, result, and audit reference.
      format: "{operation_id, successor_record_ref, generalized_claim, applicability_scope, confidence, consolidation_evidence_digest, consolidated_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding support, scope, and generalization evidence.
  source_claims:
    - claim-memory-consolidation-activity
    - claim-memory-consolidation-generalization
    - claim-memory-consolidation-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次巩固的支持、范围、概括、后继、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one consolidation's support, scope, generalization, successor, result, and audit facts.
        ja: 一つの巩固の支持、範囲、一般化、後継、結果、監査事実を結ぶために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-consolidate-3501
      source_claims:
        - claim-memory-consolidation-identity
    - id: supporting_record_refs
      labels:
        zh: 支持记录引用
        en: supporting record references
        ja: 支持記録参照
      datatype: array[string]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出实际支持概括的精确 MemoryRecord 版本，并要求它们覆盖不同时间或情境，而非只是同主题背景材料。
        en: Lists exact MemoryRecord versions actually supporting the generalization and requires coverage of different times or contexts rather than mere same-topic background material.
        ja: 一般化を実際に支持する正確な MemoryRecord バージョンを列挙し、単なる同話題の背景資料ではなく、異なる時刻または文脈を覆うことを求めます。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-3501-session-a-v1
        - record-3501-session-b-v1
      source_claims:
        - claim-memory-consolidation-support
    - id: counterevidence_refs
      labels:
        zh: 反证引用
        en: counterevidence references
        ja: 反証参照
      datatype: array[string]
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出已知与候选概括相反或限制其范围的记录，以便明确处理反证而不伪装为支持记录。
        en: Lists known records that contradict a candidate generalization or limit its scope so counterevidence is handled explicitly rather than masquerading as support.
        ja: 候補一般化と矛盾する、またはその範囲を制限する既知の記録を列挙し、反証が支持を装わずに明示的に扱われるようにします。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-3501-session-c-v1
      source_claims:
        - claim-memory-consolidation-support
    - id: stability_basis
      labels:
        zh: 稳定性基础
        en: stability basis
        ja: 安定性根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录为何支持记录足以形成稳定概括，区分时间重复、跨情境一致和经过人工确认的模式。
        en: Records why supporting records suffice for stable generalization, distinguishing temporal repetition, cross-context consistency, and human-confirmed pattern.
        ja: 支持記録が安定した一般化に十分である理由を記録し、時間的反復、文脈横断の一貫性、人手確認済みパターンを区別します。
      allowed_values:
        - repeated_over_time
        - consistent_across_contexts
        - human_confirmed_pattern
      pattern: null
      example_value: repeated_over_time
      source_claims:
        - claim-memory-consolidation-generalization
    - id: generalized_claim
      labels:
        zh: 概括主张
        en: generalized claim
        ja: 一般化主張
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 表达从支持记录形成的限定模式或偏好；它不得通过绝对词掩盖范围、反证或不确定性。
        en: Expresses the scoped pattern or preference formed from supporting records; it must not hide scope, counterevidence, or uncertainty through absolute wording.
        ja: 支持記録から形成した範囲付きパターンまたは選好を表します。絶対的な表現で範囲、反証、不確実性を隠してはいけません。
      allowed_values: []
      pattern: null
      example_value: prefers Chinese responses in ordinary chat contexts
      source_claims:
        - claim-memory-consolidation-generalization
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: 適用範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明概括可适用的主体、任务、时间或情境边界，避免将局部模式升级成无条件全局事实。
        en: Declares subject, task, temporal, or contextual boundaries within which the generalization applies, preventing a local pattern from becoming an unconditional global fact.
        ja: 局所的なパターンが無条件の全域事実になることを防ぐため、一般化が適用される主体、タスク、時間、文脈の境界を宣言します。
      allowed_values: []
      pattern: null
      example_value: ordinary chat conversations for actor-3501
      source_claims:
        - claim-memory-consolidation-generalization
    - id: confidence
      labels:
        zh: 概括置信度
        en: generalization confidence
        ja: 一般化信頼度
      datatype: decimal
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录基于支持数量、一致性、时间或情境覆盖以及反证处理得到的审计置信度，而不是宣称确定性。
        en: Records auditable confidence derived from support count, consistency, temporal or contextual coverage, and counterevidence treatment rather than claiming certainty.
        ja: 確実性を主張するのではなく、支持数、一貫性、時間または文脈の網羅性、反証の扱いから導く監査可能な信頼度を記録します。
      allowed_values: []
      pattern: '^(0(?:\.\d+)?|1(?:\.0+)?)$'
      example_value: 0.84
      source_claims:
        - claim-memory-consolidation-generalization
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後継記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识巩固实际产生的独立新概括 MemoryRecord；支持记录本身不能作为该后继。
        en: Identifies the independently identified new generalized MemoryRecord actually produced by consolidation; a supporting record itself cannot be the successor.
        ja: 巩固が実際に生成した独立識別可能な新しい一般化 MemoryRecord を識別します。支持記録自体を後継にできません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3501-preference-v1
      source_claims:
        - claim-memory-consolidation-successor
    - id: consolidation_evidence_digest
      labels:
        zh: 巩固证据摘要
        en: consolidation evidence digest
        ja: 巩固証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定支持与反证记录版本、稳定性基础、概括、范围、置信度、转换输出和后继身份的 SHA-256 摘要。
        en: Fixes a SHA-256 digest of supporting and counterevidence record versions, stability basis, generalization, scope, confidence, transformation output, and successor identity.
        ja: 支持および反証記録バージョン、安定性根拠、一般化、範囲、信頼度、変換出力、後継識別子の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:95afecdaa96e66172de05d4cbe6e67e5cf1dca5b2d99d7bfe8c509a70ab7f390
      source_claims:
        - claim-memory-consolidation-evidence
    - id: consolidated_at
      labels:
        zh: 巩固发生时间
        en: consolidated at
        ja: 巩固発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录新概括记录实际形成的事件时间，而非单个支持观察发生、计划创建或后续检索时间。
        en: Records the event time at which the new generalized record actually forms, not occurrence of one supporting observation, plan creation, or later retrieval time.
        ja: 新しい一般化記録が実際に形成されたイベント時刻を記録します。一つの支持観測の発生、計画作成、後続検索の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T06:00:00.085Z"
      source_claims:
        - claim-memory-consolidation-activity
  constraints:
    - id: MemoryConsolidation-support-and-diversity-consistency
      expression: "supporting_record_refs contains at least two exact observations spanning the time or context diversity required by stability_basis, and no counterevidence reference is represented as a supporting record."
      explanation:
        zh: 多条同会话或同一事件片段不能自动证明稳定模式；支持和反证角色必须与时间或情境多样性一起显式记录。
        en: Multiple records from one session or one event do not automatically prove a stable pattern; support and counterevidence roles must be recorded explicitly together with temporal or contextual diversity.
        ja: 一つのセッションまたは一つのイベントからの複数記録は、安定したパターンを自動的に証明しません。支持と反証の役割は、時間または文脈の多様性とともに明示的に記録する必要があります。
      source_claims:
        - claim-memory-consolidation-support
    - id: MemoryConsolidation-generalization-scope-and-confidence
      expression: "generalized_claim is bounded by applicability_scope, confidence reflects support and counterevidence treatment, and consolidation_evidence_digest covers support, scope, confidence, and successor_record_ref."
      explanation:
        zh: 巩固生成的是有根据且有限定范围的模式，不是无证据的绝对真理；范围与置信度是防止过度概括的必要信息。
        en: Consolidation creates an evidenced and scoped pattern, not an unsupported absolute truth; scope and confidence are required information against overgeneralization.
        ja: 巩固は証拠に基づき範囲を持つパターンを作り、根拠のない絶対真理を作るものではありません。範囲と信頼度は過度の一般化を防ぐために必要な情報です。
      source_claims:
        - claim-memory-consolidation-generalization
        - claim-memory-consolidation-evidence
    - id: MemoryConsolidation-boundary-from-merge-compaction-reflection
      expression: "A same-event content union, representation-cost reduction with no new generalized claim, or action lesson derived from a failure does not satisfy MemoryConsolidation; a successful instance produces successor_record_ref with a cross-observation scoped generalization."
      explanation:
        zh: 巩固的种差是跨观察的稳定概括，不能让合并、压缩或反思因也有多输入和新记录而吞并这一概念。
        en: Consolidation's differentia is stable cross-observation generalization; merge, compaction, or reflection cannot absorb this concept merely because they also have multiple inputs and new records.
        ja: 巩固の種差は安定した観測横断一般化です。マージ、圧縮、反省は、複数入力と新記録を持つだけでこの概念を吸収できません。
      source_claims:
        - claim-memory-consolidation-boundary
  required_relation_constraints:
    - relation_id: MemoryConsolidation-consumes-MemoryRecord
      requirement: Every supporting_record_ref must be the target of a consumes relation with its evidence role recorded as supporting.
    - relation_id: MemoryConsolidation-produces-MemoryRecord
      requirement: A successful consolidation must produce successor_record_ref with support, scope, confidence, and lineage.
examples:
  - id: MemoryConsolidation-example-positive-cross-session-preference

    labels:
      zh: 从跨会话重复选择形成范围化偏好
      en: Forms a scoped preference from repeated cross-session choices
      ja: セッション横断の反復選択から範囲付き選好を形成する

    descriptions:
      zh: RAPTOR：文本→分块→聚类→摘要→递归构建摘要树；叶节点与摘要节点均可检索；LlamaIndex TreeIndex 从 Document 构建层级摘要索引。
      en: RAPTOR: text→chunk→cluster→summarize→recursive summary tree; match at leaf or summary nodes; LlamaIndex TreeIndex builds hierarchical summary index.
      ja: RAPTOR text→chunk→cluster→summarize→再帰 tree。LlamaIndex TreeIndex。
    field_values:
      operation_id: mem-op-consolidate-3501
      supporting_record_refs:
        - record-3501-session-a-v1
        - record-3501-session-b-v1
        - record-3501-session-c-v1
      stability_basis: repeated_over_time
      generalized_claim: prefers Chinese responses in ordinary chat contexts
      applicability_scope: ordinary chat conversations for actor-3501
      confidence: 0.84
      successor_record_ref: record-3501-preference-v1
      consolidated_at: "2026-07-19T06:00:00.085Z"
    related_node_ids:
      - MemoryConsolidation
      - MemorySynthesisOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryConsolidation-is_a-MemorySynthesisOperation
      - MemoryConsolidation-consumes-MemoryRecord
      - MemoryConsolidation-produces-MemoryRecord

    source_claims:
      - claim-memory-consolidation-support
      - claim-memory-consolidation-generalization
      - claim-memory-consolidation-evidence
  - id: MemoryConsolidation-example-counterexample-same-event-merge

    labels:
      zh: 同一事件片段合并不是巩固
      en: Merging fragments of one event is not consolidation
      ja: 一つのイベント断片のマージは巩固ではない

    descriptions:
      zh: 反例：简单 merge 多条 MemoryRecord 但未构建 RAPTOR 式层级摘要或保留 cluster provenance。
      en: Counterexample: simple merge of MemoryRecords without RAPTOR-style hierarchical summary or cluster provenance.
      ja: 反例：RAPTOR 式階層要約/cluster provenance なし merge。
    field_values:
      operation_id: mem-op-merge-3501
      input_record_refs:
        - record-3501-meeting-part-a-v1
        - record-3501-meeting-part-b-v1
      successor_record_ref: record-3501-meeting-v1
      input_context_count: 1
      generalized_claim: absent
      stability_basis: absent
    related_node_ids:
      - MemoryConsolidation
      - MemoryMerge
      - MemoryRecord
    related_relation_ids:
      - MemoryConsolidation-is_a-MemorySynthesisOperation
      - MemoryMerge-is_a-MemorySynthesisOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-consolidation-boundary
  - id: MemoryConsolidation-example-boundary-compaction

    labels:
      zh: 等价内容压缩不是稳定概括
      en: Equivalent-content compaction is not stable generalization
      ja: 等価内容の圧縮は安定した一般化ではない

    descriptions:
      zh: MemoryConsolidation 合成新层级 vs MemoryCompaction 缩减体积；RAPTOR 摘要节点不等于原始 Chunk 替换。
      en: MemoryConsolidation synthesizes new hierarchy vs MemoryCompaction reduces volume; RAPTOR summary nodes do not replace original Chunks.
      ja: MemoryConsolidation 新階層 vs MemoryCompaction 体積縮小。
    field_values:
      operation_id: mem-op-compact-3502
      input_record_refs:
        - record-3502-log-a-v1
        - record-3502-log-b-v1
      successor_record_ref: record-3502-compact-v1
      synthesis_goal: reduce_representation_cost
      generalized_claim: absent
      preservation_scope: facts_constraints_and_anchors
    related_node_ids:
      - MemoryConsolidation
      - MemoryCompaction
      - MemoryRecord
    related_relation_ids:
      - MemoryConsolidation-is_a-MemorySynthesisOperation
      - MemoryCompaction-is_a-MemorySynthesisOperation
      - MemoryCompaction-produces-MemoryRecord

    source_claims:
      - claim-memory-consolidation-boundary
