      en: Cross-session preference-consolidation instance
      ja: セッション横断の選好統合インスタンス
    scenario_id: MemoryConsolidation:instance:memory-op-consolidation-001
    descriptions:
      zh: memory-op-consolidation-001 比较 session-11、session-18 与 session-25 中用户选择中文回复的记录，形成置信度 0.84 的稳定偏好记录，并保留三个支持记录的链接。
      en: memory-op-consolidation-001 compares the user's Chinese-response choices in sessions 11, 18, and 25, forms a stable preference record at confidence 0.84, and retains links to all three supporting records.
      ja: memory-op-consolidation-001 は session-11・18・25 の中国語応答選択を比較し、信頼度 0.84 の安定した選好記録を作り、三つの根拠記録へのリンクを保持します。
    field_values:
      consolidation_operation_id: memory-op-consolidation-001
      supporting_record_ids:
        - session-11-choice
        - session-18-choice
        - session-25-choice
      operation_id: memory-op-consolidation-001
      reason: related episodic records are consolidated into a semantic summary
    related_node_ids:
      - MemoryConsolidation
      - MemorySynthesisOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryConsolidation-is_a-MemorySynthesisOperation
      - MemoryConsolidation-consumes-MemoryRecord
      - MemoryConsolidation-produces-MemoryRecord
    expected_result:
      zh: 返回一次 Consolidation、三个支持记录和一个概括层次更高的后继记录；每个概括断言均可回查到支持记录。
      en: Return one Consolidation, three supporting records, and one more-general successor record, with every generalized claim traceable to its support.
      ja: 一つの Consolidation、三つの根拠記録、より一般化された後継記録を返し、各一般化主張を根拠へ追跡できます。
    why_valid_or_invalid:
      zh: 输出新增了跨会话稳定偏好，而不是仅联合原声明或缩小体积，因此是 Consolidation，不是 Merge 或 Compaction。
      en: The output adds a stable cross-session preference rather than merely unioning claims or reducing size, so it is Consolidation, not Merge or Compaction.
      ja: 出力は単なる主張結合や縮小ではなくセッション横断の安定選好を追加するため、Merge や Compaction ではなく Consolidation です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
