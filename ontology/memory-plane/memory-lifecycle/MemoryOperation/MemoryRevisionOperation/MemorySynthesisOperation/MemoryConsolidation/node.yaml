    expected_result:
      zh: 把 consolidate-811 认定为 MemoryConsolidation，并让稳定偏好、适用范围、置信度和三条证据共同可查询。
      en: Treat consolidate-811 as MemoryConsolidation and expose the stable preference, scope, confidence, and three evidence records together for audit and retrieval.
      ja: consolidate-811 を MemoryConsolidation と認定し、stable preference・scope・confidence・三 evidence record を audit と retrieval で共同参照可能にします。
    why_valid_or_invalid:
      zh: 活动从不同时间的重复观测提炼有限定范围的稳定知识，同时保留支持谱系，恰好区别于逐项合并或单纯缩减字节。
      en: The activity derives scoped stable knowledge from repeated observations across time while retaining evidence lineage, distinguishing it from item-wise merge and byte reduction.
      ja: 異なる時点の repeated observation から scoped stable knowledge を導出し evidence lineage を保つため item-wise merge や byte reduction と区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-consolidation-001
  - id: MemoryConsolidation-example-instance-manual-20260716
