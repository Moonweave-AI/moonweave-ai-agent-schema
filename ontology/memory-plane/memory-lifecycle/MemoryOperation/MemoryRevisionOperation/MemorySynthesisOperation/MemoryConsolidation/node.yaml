      en: "Boundary case: Memory consolidation"
      ja: 記憶固定化境界例
    scenario_id: MemoryConsolidation:boundary:20260716
    descriptions:
      zh: compact-812 只删除十二条失败日志中的重复空白和相同堆栈帧，错误码、安全约束与事件命题均保持不变，也没有生成跨会话规律。
      en: compact-812 only removes repeated whitespace and duplicate stack frames from twelve failure logs; error codes, safety constraints, and event propositions remain unchanged, with no cross-session pattern.
      ja: compact-812 は十二 failure log の反復 whitespace と duplicate stack frame のみ除き、error code・safety constraint・event proposition を変えず cross-session pattern も生成しません。
    field_values: {}
    related_node_ids:
      - MemoryConsolidation
    related_relation_ids: []
    expected_result:
      zh: 不要把 compact-812 计作 MemoryConsolidation；若保真报告通过，应将其记录为 MemoryCompaction 的体积缩减活动。
      en: Keep compact-812 out of MemoryConsolidation; if its fidelity report passes, record it as a footprint-reducing MemoryCompaction activity.
      ja: compact-812 を MemoryConsolidation から除外し、fidelity report が pass なら footprint-reducing MemoryCompaction activity として記録します。
    why_valid_or_invalid:
      zh: 该活动没有形成新的稳定偏好或知识陈述，只改变等价内容的存储表达；节省空间不是知识巩固的种差。
      en: The activity creates no new stable preference or knowledge claim and changes only the storage expression of equivalent content; saving space is not consolidation.
      ja: 新 stable preference や knowledge claim を作らず equivalent content の storage expression だけを変えるため space saving は consolidation ではありません。
    synthetic: false
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-consolidation-001
