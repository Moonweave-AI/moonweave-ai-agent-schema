      labels:
        zh: 没有未来动作的摘要不属于反思子类
        en: Summary without future action is not reflection subtype
        ja: 将来行動のない要約は反思サブタイプではない

      descriptions:
        zh: summary-3702 记录本周三次超时，却未形成适用范围、行动程序或由采纳反馈支持的经验后继。
        en: summary-3702 records three timeouts this week but forms no applicability scope, action procedure, or lesson successor supported by adopted feedback.
        ja: summary-3702 は今週の三回のタイムアウトを記録しますが、適用範囲、行動手順、採用したフィードバックに支えられた教訓の後続を形成しません。
      field_values:
        operation_id: summary-3702
        lesson_statement: Three timeouts occurred this week.
        applicability_scope: absent
        action_procedure: absent
        successor_record_ref: record-3702-timeout-summary-v1
      related_node_ids:
        - MemoryReflection
