      zh: 该关系表达一次成功反思创建具体经验后继的因果事实，不表达证据消耗、类型分类、稳定事实概括、声明合并、表示压缩、普通摘要或私有推理复制。
      en: This relation expresses the causal fact that one successful reflection creates a concrete lesson successor, not evidence consumption, type classification, stable factual generalization, claim merge, representation compaction, ordinary summary, or private-reasoning copying.
      ja: この関係は、一つの成功した反思が具体的な教訓後続を作成する因果事実を表し、証拠消費、型分類、安定事実の一般化、主張結合、表現圧縮、通常の要約、私的推論の複製を表すものではありません。
    layout_role: cross-link
    endpoint_order: source-to-target
    target: concept:MemoryRecord
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind reflection evidence, lesson content, and successor identity.
  - id: park-generative-agents-2023
    title: Generative Agents Interactive Simulacra of Human Behavior
    source_type: paper
    url: https://arxiv.org/abs/2304.03442
    relevance: Describes a reflection phase that derives higher-level reflections from a recorded memory stream.
source_claims:
  - id: claim-memory-reflection-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities, agents, time, and provenance facts around it. Moonweave records reflection as an executed operation with exact evidence, declared basis, scoped lesson, successor, result, and audit facts rather than a static note or plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-reflection-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a reflection's evidence, basis, lesson, successor, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-reflection-evidence
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from entities merely nearby or similar and represents use and derivation as explicit facts. Moonweave records only exact externally observable evidence records actually read for reflection and keeps their relation to the generated lesson auditable.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-reflection-lesson
    source: park-generative-agents-2023
    supports: Park et al. describe a reflection phase that derives higher-level reflections from a memory stream. Moonweave models a reflection as a scoped future-action lesson only when it records an explicit basis, applicability scope, and procedure linked to evidence.
    locator: "Generative Agents paper sections describing reflection and higher-level reflections"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-reflection-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave requires reflection to create an independently identified lesson successor rather than relabeling an input, a view, or an uncommitted draft.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-reflection-digest
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over evidence versions, adopted feedback, basis, lesson, scope, procedure, and successor identity to bind reflection evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-reflection-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, generated entities, and derivations as explicit provenance facts. Moonweave therefore keeps event summaries, stable generalization, merge, compaction, private unexposed reasoning, in-place rewrites, and plans distinct from evidence-backed lesson formation.
    locator: "PROV-O sections on Activity, Entity, use, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
