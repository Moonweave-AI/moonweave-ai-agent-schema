schema: moonweave.ai/ontology-node/v1
id: MemoryReflection
kind: concept
labels:
  zh: 记忆反思
  en: Memory reflection
  ja: 記憶内省
semantics:
  short_definition:
    zh: 从观察流生成高层 introspective 洞察。
    en: Generates high-level introspective insights from an observation stream.
    ja: observation stream から高次 introspective insight を生成。
  definition:
    zh: MemoryReflection 是 MemorySynthesisOperation：消费 Generative Agents 式 memory stream 或多条 episodic MemoryRecord，通过 LLM 反思提示生成更高层次 insight record（如“Alice 重视代码可读性”）。Park et al. 2023 在固定间隔触发 reflection generation；不同于 MemoryCompaction 的 token 摘要，反思输出是 semantic insight 而非 window 管理。
    en: MemoryReflection is a MemorySynthesisOperation consuming a Generative Agents-style memory stream or multiple episodic MemoryRecords to generate higher-level insight records (e.g., “Alice values code readability”) via LLM reflection prompts. Park et al. 2023 trigger reflection generation at fixed intervals; unlike MemoryCompaction token summarization, reflection output is semantic insight rather than window management.
    ja: MemoryReflection は Generative Agents 型 memory stream/複数 episodic MemoryRecord を consume し LLM reflection prompt で高次 insight record を生成する MemorySynthesisOperation。Park 2023 は固定間隔で reflection generation。MemoryCompaction の token 要約とは異なり semantic insight。
  why_needed:
    zh: 反思 insight 若与 factual record 混同，检索会把推断当作原始观察，破坏 provenance。
    en: If reflection insights mix with factual records, retrieval treats inferences as raw observations, breaking provenance.
    ja: reflection insight を factual record と混同すると provenance が破壊される。
  includes:
    - zh: 纳入 Generative Agents reflection generation、periodic insight synthesis 与 self-model 更新。
      en: Includes Generative Agents reflection generation, periodic insight synthesis, and self-model updates.
      ja: Generative Agents reflection/periodic insight/self-model update。
  excludes:
    - zh: 排除 deduplicate 合并、Claude auto-compact 与单 fact 直接 UPDATE。
      en: Excludes deduplicate merge, Claude auto-compact, and direct single-fact UPDATE.
      ja: deduplicate merge/Claude compact/単 fact UPDATE を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "映射 Generative Agents；每 N 步从 memory stream 采样 observation，LLM 生成 reflection question 与 insight text 写入 memory stream；reflect_operation_id 绑定 source_observation_ids、insight_text 与 reflection_prompt_version。"
    en: "Map Generative Agents; every N steps sample observations from memory stream, LLM generates reflection question and insight text into memory stream; reflect_operation_id binds source_observation_ids, insight_text, and reflection_prompt_version."
    ja: Generative Agents 式：N step 毎 observation 采样→LLM reflection→insight を stream へ。source_observation_ids/insight_text/prompt_version を bind。
  typical_input:
    - description: Generative Agents reflection trigger
      format: |
        # Every N steps, sample recent observations from memory stream
        reflections = generate_reflections(observations, agent_profile)
        memory_stream.extend(reflections)
      source_claims: [claim-reflection-ga]
  typical_output:
    - description: Insight record
      format: |
        {
          "reflect_operation_id": "reflect-600",
          "insight_text": "Alice consistently prioritizes readable TypeScript examples.",
          "produced_record_id": "record-insight-600-v1"
        }
      source_claims: [claim-reflection-design]
  reference_implementations:
    - name: Generative Agents
      url: https://arxiv.org/abs/2304.03442
      description: Reflection generation from memory stream (Park 2023).
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: Inferred preferences stored as derived memories when labeled.
structure:
  identity_keys: [reflect_operation_id]
  fields:
    - id: reflect_operation_id
      labels: {zh: 反思操作标识, en: Reflection operation identifier, ja: 内省操作識別子}
      definitions:
        zh: 标识一次记忆反思生成活动。
        en: Identifies one memory reflection generation activity.
        ja: 一 memory reflection generation activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: reflect-600
      allowed_values: []
      source_claims: [claim-reflection-id]
    - id: insight_text
      labels: {zh: 洞察文本, en: Insight text, ja: 洞察テキスト}
      definitions:
        zh: LLM 生成的高层 introspective 结论文本。
        en: High-level introspective conclusion text generated by LLM.
        ja: LLM 生成の高次 introspective 結論文本。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Alice consistently prioritizes readable TypeScript examples.
      allowed_values: []
      source_claims: [claim-reflection-ga]
  constraints: []
  required_relations: []
examples:
  - id: MemoryReflection-example-ga
    labels: {zh: Generative Agents 反思, en: Generative Agents reflection, ja: Generative Agents 内省}
    descriptions:
      zh: reflect-600 从最近 100 条 observation 生成 insight“Alice 重视可读 TypeScript 示例”，写入 memory stream。
      en: reflect-600 generates insight “Alice values readable TypeScript examples” from recent 100 observations into memory stream.
      ja: 最近 100 observation から reflect-600 が insight 生成。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: reflection generation}
    field_values: {reflect_operation_id: reflect-600, insight_text: Alice consistently prioritizes readable TypeScript examples.}
    related_node_ids: [MemoryReflection, MemorySynthesisOperation]
    related_relation_ids: []
    source_claims: [claim-reflection-ga, claim-reflection-design]
  - id: MemoryReflection-example-periodic
    labels: {zh: 周期性反思, en: Periodic reflection, ja: 周期的内省}
    descriptions:
      zh: 模拟小镇智能体每 100 步触发 reflection generation，产生 record-insight-600-v1。
      en: Simulated town agent triggers reflection generation every 100 steps, producing record-insight-600-v1.
      ja: 100 step 毎 reflection で record-insight-600-v1。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: periodic trigger}
    field_values: {reflect_operation_id: reflect-601, trigger_interval_steps: 100}
    related_node_ids: [MemoryReflection]
    related_relation_ids: []
    source_claims: [claim-reflection-ga]
  - id: MemoryReflection-example-provenance
    labels: {zh: 洞察 provenance, en: Insight provenance, ja: insight provenance}
    descriptions:
      zh: record-insight-600-v1 标记 record_kind=reflection 并引用 source_observation_ids，区别于原始 observation record。
      en: record-insight-600-v1 marks record_kind=reflection and references source_observation_ids, distinct from raw observation records.
      ja: record_kind=reflection と source_observation_ids で raw observation と区別。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: provenance}
    field_values: {produced_record_id: record-insight-600-v1, record_kind: reflection}
    related_node_ids: [MemoryReflection, MemoryRecord]
    related_relation_ids: []
    source_claims: [claim-reflection-design]
  - id: MemoryReflection-example-not-compact
    labels: {zh: 反思非压缩, en: Reflection is not compaction, ja: reflection は compaction ではない}
    descriptions:
      zh: compact-700 摘要 context 节省 token；reflect-600 生成 semantic insight 供长期 persona 建模。
      en: compact-700 summarizes context to save tokens; reflect-600 generates semantic insight for long-term persona modeling.
      ja: compact は token 節約、reflection は persona insight。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryReflection, MemoryCompaction]
    related_relation_ids: []
    source_claims: [claim-reflection-design]
parent_relation:
  id: MemoryReflection-is_a-MemorySynthesisOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆合成操作, en: is a memory synthesis operation, ja: 記憶合成操作の一種}
  definitions:
    zh: MemoryReflection —is_a→ MemorySynthesisOperation 表示从观察流生成 introspective insight record。
    en: MemoryReflection —is_a→ MemorySynthesisOperation holds because introspective insight records are generated from observation streams.
    ja: observation stream から introspective insight record を生成するため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryReflection-is_a-MemorySynthesisOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when LLM reflection generates insight from multiple observations.
      explanations:
        zh: 仅当 LLM 反思从多条观察生成 insight 时成立。
        en: Assert only when LLM reflection generates insight from multiple observations.
        ja: 複数 observation から LLM reflection insight 生成時のみ。
      source_claims: [claim-reflection-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-reflection-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-ga-reflection
    title: Generative Agents — Interactive Simulacra of Human Behavior
    publisher: arXiv
    url: https://arxiv.org/abs/2304.03442
    source_type: arXiv
    relevance: Reflection generation from memory stream (Park 2023).
  - id: src-reflection-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Reflection insights distinct from facts and compaction summaries.
source_claims:
  - id: claim-reflection-ga
    source: src-ga-reflection
    supports: Generative Agents periodically generates reflection insights from accumulated memory stream observations.
    locator: Section 3.1 reflection generation
    evidence_kind: academic
    confidence: high
  - id: claim-reflection-design
    source: src-reflection-design
    supports: MemoryReflection produces introspective insight records with source observation lineage.
    locator: MemoryReflection boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-reflection-id
    source: src-reflection-design
    supports: reflect_operation_id identifies one reflection activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
