parent_relation:
  id: MemoryReflection-is_a-MemorySynthesisOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆综合操作
    en: is a memory synthesis operation
    ja: 記憶統合操作の一種である
  definitions:
    zh: MemoryReflection 是由可观察证据支持、产生有范围未来行动经验的 MemorySynthesisOperation。
    en: MemoryReflection is a MemorySynthesisOperation that produces a scoped future-action lesson supported by observable evidence.
    ja: MemoryReflection は、観測可能な証拠に支えられ、範囲を持つ将来行動の教訓を生成する MemorySynthesisOperation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次反思读取的证据数、采纳的反馈数或后续检索数。
    en: The classification relation expresses type membership and does not limit evidence count, adopted feedback count, or later retrieval count of one reflection.
    ja: この分類関係は型の所属を表し、一つの反思における証拠数、採用したフィードバック数、後の検索数を制限しません。
  inverse_reading:
    predicate: has_reflection_subtype
    labels:
      zh: 具有反思子类
      en: has reflection subtype
      ja: 反思サブタイプを持つ
  conditions:
    - id: MemoryReflection-is_a-MemorySynthesisOperation-scoped-lesson
      severity: error
      expression_language: plain
      expression: "Assert only when the instance satisfies the child differentia: observable evidence supports a scoped future-action lesson with an executable procedure, and the instance already satisfies MemorySynthesisOperation."
      explanation:
        zh: 仅当实例满足子类种差——外显证据支持具有适用范围和可执行程序的未来行动经验——且已满足 MemorySynthesisOperation 定义时，才能建立该边。
        en: "Assert only when the instance satisfies the child differentia: external evidence supports a future-action lesson with applicability scope and executable procedure, and it already meets the MemorySynthesisOperation definition."
        ja: 子類の種差、すなわち外部証拠が適用範囲と実行可能な手順を持つ将来行動の教訓を支えることを満たし、かつ MemorySynthesisOperation の定義を満たす場合にのみ、この辺を確立します。
      source_claims:
        - claim-memory-reflection-activity
        - claim-memory-reflection-lesson
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryReflection-is_a-MemorySynthesisOperation-example-positive

      labels:
        zh: 有范围行动经验属于记忆综合操作
        en: Scoped action lesson is a memory synthesis operation
        ja: 範囲を持つ行動教訓は記憶統合操作である

      descriptions:
        zh: mem-op-reflect-3701 从超时、成功重试和操作员反馈形成限定条件下的分块重试程序，并创建独立经验后继。
        en: mem-op-reflect-3701 forms a conditional chunk-and-retry procedure from timeouts, successful retry, and operator feedback, then creates an independent lesson successor.
        ja: mem-op-reflect-3701 はタイムアウト、成功した再試行、操作員フィードバックから条件付きの分割・再試行手順を形成し、独立した教訓の後続を作成します。
      field_values:
        operation_id: mem-op-reflect-3701
        reflection_basis: failure_recovery
        lesson_statement: Batch requests that time out should be chunked before bounded retry is attempted.
        applicability_scope: Retryable batch-call timeouts within quota.
        action_procedure: Chunk, back off, and retry no more than twice.
        successor_record_ref: record-3701-batch-retry-lesson-v1
      related_node_ids:
        - MemoryReflection
        - MemorySynthesisOperation
      related_relation_ids:
        - MemoryReflection-is_a-MemorySynthesisOperation

      source_claims:
        - claim-memory-reflection-activity
        - claim-memory-reflection-lesson
