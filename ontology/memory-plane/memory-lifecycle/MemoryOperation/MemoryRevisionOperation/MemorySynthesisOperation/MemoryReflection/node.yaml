schema: moonweave.ai/ontology-node/v1
id: MemoryReflection
kind: concept
status: accepted
labels:
  zh: 记忆反思
  en: Memory reflection
  ja: 記憶リフレクション
semantics:
  short_definition:
    zh: 基于可观察结果、反馈或显式决策证据，提炼有适用范围的未来行动经验并生成独立后继记忆记录的综合操作。
    en: A synthesis operation that derives a scoped future-action lesson from observable outcomes, feedback, or explicit decision evidence and generates an independent successor memory record.
    ja: 観測可能な結果、フィードバック、または明示的な意思決定根拠から、適用範囲を伴う将来行動の教訓を導き、独立した後続記憶記録を生成する統合操作です。
  definition:
    zh: MemoryReflection 是已执行的 MemorySynthesisOperation。它读取至少两条实际参与的、可观察的结果、反馈或显式决策证据记录，说明经验的形成依据、适用范围和可执行程序，生成具有独立身份的后继 MemoryRecord，并记录发生时间与证据摘要。反思的产物必须是面向未来行动的经验，而不是对过去事件的计数或摘要、跨观察的稳定事实或偏好概括、输入声明的联合、以减小表示成本为主要目标的压缩，或任何模型隐藏思维链的副本。
    en: MemoryReflection is an executed MemorySynthesisOperation. It reads at least two exact participating records of observable outcomes, feedback, or explicit decisions; states the basis, applicability scope, and executable procedure of the lesson; generates an independently identified successor MemoryRecord; and records reflection time and an evidence digest. Its output must be a future-action lesson, not a count or summary of past events, a stable factual or preference generalization across observations, a union of input claims, compaction primarily aimed at reducing representation cost, or a copy of any model's hidden chain-of-thought.
    ja: MemoryReflection は実行済みの MemorySynthesisOperation です。観測可能な結果、フィードバック、または明示的な意思決定について、実際に参加した正確な記録を少なくとも二つ読み、教訓の形成根拠、適用範囲、実行可能な手順を明示し、独立した識別子を持つ後続 MemoryRecord を生成し、反思時刻と証拠ダイジェストを記録します。出力は将来行動の教訓でなければならず、過去イベントの件数や要約、複数観測にわたる安定事実・選好の一般化、入力主張の結合、表現コスト削減を主目的とする圧縮、またはモデルの非公開思考連鎖の複製ではありません。
  why_needed:
    zh: 经验教训需要可追溯的外显依据、适用条件和行动指向，才能与事实巩固、合并、压缩及任意自我叙述明确区分，并支持后续审计和复用。
    en: A lesson needs traceable external basis, applicability conditions, and action direction to remain distinct from factual consolidation, merge, compaction, and arbitrary self-narrative, while supporting later audit and reuse.
    ja: 教訓には追跡可能な外部根拠、適用条件、行動の方向付けが必要です。これにより事実の統合、結合、圧縮、恣意的な自己叙述と区別され、後の監査と再利用を支援できます。
  includes:
    - zh: 从可观察失败、成功结果、人工纠正、用户反馈或显式决策结果中提炼具有适用范围和后续动作的经验。
      en: Deriving a scoped lesson with a subsequent action from observable failure, successful outcome, human correction, user feedback, or explicit decision result.
      ja: 観測可能な失敗、成功結果、人による訂正、利用者フィードバック、明示的な意思決定結果から、適用範囲と次の行動を伴う教訓を導くことを含みます。
    - zh: 将经验记录链接到实际读取的证据记录、独立后继记录、形成依据和发生时间。
      en: Linking a lesson record to the evidence records actually read, an independent successor record, its stated basis, and occurrence time.
      ja: 教訓記録を、実際に読まれた証拠記録、独立した後続記録、明示された形成根拠、発生時刻へ接続することを含みます。
  excludes:
    - zh: 仅统计或概述已经发生的事件、仅归纳稳定事实或用户偏好、联合兼容声明、仅缩小记录表示、原地更新、未执行的反思计划、私有或隐藏推理文本，以及无可观察证据支持的自我叙述。
      en: Merely counting or summarizing past events, only generalizing a stable fact or user preference, unioning compatible claims, only shrinking a record representation, in-place update, an unexecuted reflection plan, private or hidden reasoning text, and unsupported self-narrative.
      ja: 過去イベントを数えるまたは要約するだけのもの、安定事実や利用者選好の一般化だけのもの、互換主張の結合、記録表現の縮小だけのもの、その場での更新、未実行の反思計画、私的または非公開の推論テキスト、観測可能な根拠のない自己叙述を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将反思实现为证据约束的多输入版本转换：选择实际读取的可观察证据，声明形成依据、适用范围和后续行动，创建新的经验后继，并固定证据摘要与时刻。不得仅因同一会话、相似主题、较短文本、结果摘要或模型内部推理就推定已形成反思。
    en: "Implement reflection as an evidence-bounded multi-input version transition: select observable evidence actually read, declare its basis, applicability scope, and subsequent action, create a new lesson successor, and fix evidence digest and time. Do not infer reflection from the same session, similar topic, shorter text, an outcome summary, or internal model reasoning alone."
    ja: 反思は、証拠に制約された複数入力のバージョン遷移として実装します。実際に読んだ観測可能な証拠を選び、形成根拠、適用範囲、次の行動を宣言し、新しい教訓の後続を作成して、証拠ダイジェストと時刻を固定します。同じセッション、類似した話題、短いテキスト、結果要約、またはモデル内部推論だけから反思の成立を推定してはいけません。
  typical_input:
    - description: Exact outcome, feedback, or decision records; optional explicit feedback references; reflection basis; actor identity; and operation start time.
      format: "{operation_id, evidence_record_refs, feedback_refs?, reflection_basis, actor_ref, started_at}"
  typical_output:
    - description: A new scoped future-action lesson record with procedure, evidence digest, reflection time, result, and audit reference.
      format: "{operation_id, lesson_statement, applicability_scope, action_procedure, successor_record_ref, reflection_evidence_digest, reflected_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding reflection evidence and generated lesson lineage.
    - name: Generative Agents reflection design
      url: https://arxiv.org/abs/2304.03442
      description: Describes deriving higher-level reflections from a recorded memory stream.
  source_claims:
    - claim-memory-reflection-activity
    - claim-memory-reflection-evidence
    - claim-memory-reflection-lesson
    - claim-memory-reflection-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次反思的证据、形成依据、教训、后继、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one reflection's evidence, basis, lesson, successor, result, and audit facts.
        ja: 一つの反思の証拠、形成根拠、教訓、後続、結果、監査事実を結び付けるために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-reflect-3701
      source_claims:
        - claim-memory-reflection-identity
    - id: evidence_record_refs
      labels:
        zh: 证据记录引用
        en: evidence record references
        ja: 証拠記録参照
      datatype: array[string]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出实际被读取并支持经验结论的精确 MemoryRecord 版本。仅同一主题、同一会话、相邻记录或相似文本但未被读取的记录不是反思证据。
        en: Lists exact MemoryRecord versions actually read and supporting the lesson. Same-topic, same-session, nearby, or similar-text records that were not read are not reflection evidence.
        ja: 実際に読まれ、教訓を支える正確な MemoryRecord バージョンを列挙します。同じ話題、同じセッション、近接記録、または類似テキストであっても読まれていない記録は反思の証拠ではありません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-3701-timeout-a-v1
        - record-3701-retry-success-v1
      source_claims:
        - claim-memory-reflection-evidence
    - id: feedback_refs
      labels:
        zh: 反馈引用
        en: feedback references
        ja: フィードバック参照
      datatype: array[string]
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出在形成经验时实际采纳的外显反馈标识。若反馈已表示为 MemoryRecord，该记录还必须出现在 evidence_record_refs 中；只在界面可见但未采用的评论不能作为依据。
        en: Lists externally observable feedback identifiers actually adopted when forming the lesson. If feedback is represented as a MemoryRecord, that record must also appear in evidence_record_refs; a comment merely visible in the interface but not adopted is not basis.
        ja: 教訓を形成する際に実際に採用した外部から観測可能なフィードバック識別子を列挙します。フィードバックが MemoryRecord として表現される場合、その記録は evidence_record_refs にも含まれなければなりません。画面に見えるだけで採用されていないコメントは根拠ではありません。
      allowed_values: []
      pattern: '^feedback-[A-Za-z0-9._-]+$'
      example_value:
        - feedback-3701-operator
      source_claims:
        - claim-memory-reflection-evidence
    - id: reflection_basis
      labels:
        zh: 反思形成依据
        en: reflection basis
        ja: 反思の形成根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明从证据形成经验的直接方式，用于区分结果比较、人工反馈、失败恢复和成功强化，而不是用模糊的“总结”标签替代证据判断。
        en: States the direct way evidence formed the lesson, distinguishing outcome comparison, human feedback, failure recovery, and success reinforcement instead of using a vague summary label in place of evidence judgment.
        ja: 証拠が教訓を形成した直接の方法を宣言します。結果比較、人によるフィードバック、失敗回復、成功強化を区別し、証拠判断の代わりに曖昧な要約ラベルを使用しません。
      allowed_values:
        - outcome_comparison
        - human_feedback
        - failure_recovery
        - success_reinforcement
      pattern: null
      example_value: failure_recovery
      source_claims:
        - claim-memory-reflection-lesson
    - id: lesson_statement
      labels:
        zh: 经验结论
        en: lesson statement
        ja: 教訓の記述
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录由外显证据支持的、面向未来的可复用结论；它说明何种经验被学到，但不记录逐步私有推理或无依据的归因。
        en: Records the reusable future-oriented conclusion supported by external evidence; it states what was learned without storing step-by-step private reasoning or unsupported attribution.
        ja: 外部証拠に支えられた、再利用可能で将来指向の結論を記録します。何を学んだかを示しますが、段階的な私的推論や根拠のない帰属は保存しません。
      allowed_values: []
      pattern: null
      example_value: Batch requests that time out should be chunked before bounded retry is attempted.
      source_claims:
        - claim-memory-reflection-lesson
        - claim-memory-reflection-boundary
    - id: applicability_scope
      labels:
        zh: 适用范围
        en: applicability scope
        ja: 適用範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明经验适用的任务、条件、环境或风险边界，防止将局部结果误表示为对所有任务、用户或系统均成立的事实。
        en: States the task, condition, environment, or risk boundary in which the lesson applies, preventing a local result from being represented as a fact for every task, user, or system.
        ja: 教訓が適用されるタスク、条件、環境、またはリスク境界を明示し、局所的な結果をすべてのタスク、利用者、システムに成り立つ事実として表現することを防ぎます。
      allowed_values: []
      pattern: null
      example_value: Batch tool calls whose observed timeout response is retryable and whose service quota allows bounded retry.
      source_claims:
        - claim-memory-reflection-lesson
    - id: action_procedure
      labels:
        zh: 后续行动程序
        en: subsequent action procedure
        ja: 次の行動手順
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录在适用范围内应执行的明确后续动作或程序。只有事实陈述、事件摘要或偏好描述而没有动作指向时，不满足此字段。
        en: Records the explicit subsequent action or procedure to perform within the applicability scope. A factual statement, event summary, or preference description with no action direction does not satisfy this field.
        ja: 適用範囲内で実行すべき明示的な次の行動または手順を記録します。行動の方向付けがない事実記述、イベント要約、選好の説明はこのフィールドを満たしません。
      allowed_values: []
      pattern: null
      example_value: Split the request into bounded chunks, wait the declared backoff interval after timeout, and retry no more than twice.
      source_claims:
        - claim-memory-reflection-lesson
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後続記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识反思实际创建的独立新 MemoryRecord；输入证据、临时查询视图、未提交草稿或原地改写的记录不能充当后继。
        en: Identifies the independent new MemoryRecord actually created by reflection; an input evidence record, transient query view, uncommitted draft, or in-place rewrite cannot be the successor.
        ja: 反思が実際に作成した独立した新しい MemoryRecord を識別します。入力証拠記録、一時的なクエリ表示、未コミットの草稿、またはその場で書き換えられた記録は後続になれません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3701-batch-retry-lesson-v1
      source_claims:
        - claim-memory-reflection-successor
    - id: reflection_evidence_digest
      labels:
        zh: 反思证据摘要
        en: reflection evidence digest
        ja: 反思証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定输入证据版本、采纳的反馈、形成依据、经验结论、适用范围、行动程序和后继身份的 SHA-256 摘要，以支持对经验来源和内容边界的审计。
        en: Fixes a SHA-256 digest of input evidence versions, adopted feedback, basis, lesson statement, scope, procedure, and successor identity to audit lesson provenance and content boundary.
        ja: 教訓の出所と内容境界を監査できるように、入力証拠バージョン、採用したフィードバック、形成根拠、教訓記述、範囲、手順、後続識別子の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:1edbf6d179d093202ad30df43baaf5f25ab40a59dc0ebbf77e2d4bb9f48162a9
      source_claims:
        - claim-memory-reflection-digest
    - id: reflected_at
      labels:
        zh: 反思发生时间
        en: reflected at
        ja: 反思発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录经验后继实际形成的事件时间，而不是输入创建、反馈展示、相似性发现、草稿保存或后续检索时间。
        en: Records the event time at which the lesson successor actually forms, not input creation, feedback display, similarity discovery, draft save, or later retrieval time.
        ja: 教訓の後続が実際に形成されたイベント時刻を記録します。入力作成、フィードバック表示、類似性発見、草稿保存、後の検索時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T08:00:00.071Z"
      source_claims:
        - claim-memory-reflection-activity
  constraints:
    - id: MemoryReflection-evidence-successor-and-digest-consistency
      expression: "evidence_record_refs contains at least two exact records actually read, successor_record_ref is a distinct new record identity, and reflection_evidence_digest covers evidence versions, adopted feedback, basis, lesson, scope, procedure, and successor."
      explanation:
        zh: 相似、相邻或仅在同一会话中的记录不能替代真实证据；没有独立后继和可复核摘要，经验既无法追溯也无法与输入区分。
        en: Similar, nearby, or same-session records cannot replace actual evidence; without an independent successor and reviewable digest, the lesson is neither traceable nor distinct from inputs.
        ja: 類似、近接、または同じセッションの記録は実際の証拠を代替できません。独立した後続と再検討可能なダイジェストがなければ、教訓は追跡可能でも入力と区別可能でもありません。
      source_claims:
        - claim-memory-reflection-evidence
        - claim-memory-reflection-successor
        - claim-memory-reflection-digest
    - id: MemoryReflection-actionability-scope-and-feedback-consistency
      expression: "lesson_statement, applicability_scope, and action_procedure together state a future action; when reflection_basis is human_feedback, feedback_refs is nonempty or an adopted feedback record is explicit in evidence_record_refs."
      explanation:
        zh: 反思必须提供在何种条件下做什么的经验，而不是只重述过去；若声称以人工反馈为依据，采纳的反馈也必须可审计。
        en: Reflection must provide an experience of what to do under which conditions rather than merely restating the past; if it claims human feedback as basis, adopted feedback must also be auditable.
        ja: 反思は過去を言い換えるだけでなく、どの条件で何をするかという経験を提供しなければなりません。人によるフィードバックを根拠とする場合、採用したフィードバックも監査可能でなければなりません。
      source_claims:
        - claim-memory-reflection-evidence
        - claim-memory-reflection-lesson
    - id: MemoryReflection-boundary-from-consolidation-merge-compaction-and-private-reasoning
      expression: "A successful reflection is a scoped future-action lesson supported by observable evidence; an event summary, stable factual or preference generalization, claim union, representation-cost reduction, private hidden reasoning transcript, in-place rewrite, or unexecuted plan does not satisfy MemoryReflection."
      explanation:
        zh: 反思的种差是有范围、可执行且由外显证据支持的未来行动经验；相似的“总结”或“优化”措辞不能吸收巩固、合并、压缩、私有推理保存或普通维护。
        en: Reflection's differentia is a scoped, actionable future lesson supported by external evidence; similar summary or optimization wording cannot absorb consolidation, merge, compaction, private-reasoning storage, or ordinary maintenance.
        ja: 反思の種差は、外部証拠に支えられた、範囲を持ち実行可能な将来の教訓です。似た要約や最適化の表現で、統合、結合、圧縮、私的推論の保存、通常の保守を取り込むことはできません。
      source_claims:
        - claim-memory-reflection-boundary
  required_relation_constraints:
    - relation_id: MemoryReflection-consumes-MemoryRecord
      requirement: Every evidence_record_ref actually used to support a successful reflection must be the target of a consumes relation.
    - relation_id: MemoryReflection-produces-MemoryRecord
      requirement: A successful reflection must produce successor_record_ref, whose lesson, applicability scope, procedure, and evidence lineage are represented by the operation.
examples:
  - id: MemoryReflection-example-positive-scoped-retry-lesson

    labels:
      zh: 由超时结果和反馈形成的批处理重试经验
      en: Batch-retry lesson formed from timeout outcomes and feedback
      ja: タイムアウト結果とフィードバックから形成したバッチ再試行の教訓

    descriptions:
      zh: Generative Agents：importance 累计超过阈值触发 Reflection，LLM 生成高层洞察写回 Memory Stream；RAPTOR 递归摘要树顶层节点类似 consolidation 反思。
      en: Generative Agents: Reflection triggers when cumulative importance exceeds threshold; LLM generates high-level insights back to Memory Stream; RAPTOR recursive summary tree top nodes resemble consolidation reflection.
      ja: Generative Agents importance 累計閾値超 Reflection。RAPTOR 再帰要約 tree 顶层 node。
    field_values:
      operation_id: mem-op-reflect-3701
      evidence_record_refs:
        - record-3701-timeout-a-v1
        - record-3701-timeout-b-v1
        - record-3701-retry-success-v1
      feedback_refs:
        - feedback-3701-operator
      reflection_basis: failure_recovery
      lesson_statement: Batch requests that time out should be chunked before bounded retry is attempted.
      applicability_scope: Batch tool calls whose observed timeout response is retryable and whose service quota allows bounded retry.
      action_procedure: Split the request into bounded chunks, wait the declared backoff interval after timeout, and retry no more than twice.
      successor_record_ref: record-3701-batch-retry-lesson-v1
      reflection_evidence_digest: sha256:1edbf6d179d093202ad30df43baaf5f25ab40a59dc0ebbf77e2d4bb9f48162a9
      reflected_at: "2026-07-19T08:00:00.071Z"
    related_node_ids:
      - MemoryReflection
      - MemorySynthesisOperation
