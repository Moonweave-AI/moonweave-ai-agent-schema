schema: moonweave.ai/ontology-node/v1
id: MemoryReflection
kind: concept
status: accepted
labels:
  zh: 记忆反思
  en: Memory reflection
  ja: 記憶リフレクション
semantics:
  short_definition:
    zh: 基于可观察结果与反馈形成可复用经验或行动教训的综合操作。
    en: A synthesis operation deriving a reusable lesson or procedure from observable outcomes and feedback.
    ja: 観測可能outcomeとfeedbackから再利用lesson/procedureを導くsynthesis operationです。
  definition:
    zh: MemoryReflection 从执行记录、结果和 Feedback 推导面向未来行为的经验 MemoryRecord；它保存外显证据与结论，不要求也不存储模型隐藏思维链。
    en: MemoryReflection derives a future-oriented experiential MemoryRecord from execution records, outcomes, and Feedback. It stores observable evidence and conclusions, not hidden model chain-of-thought.
    ja: MemoryReflection はexecution record・outcome・Feedbackからfuture-oriented experiential MemoryRecordを導きます。観測可能evidenceとconclusionを保存しhidden model chain-of-thoughtを要求/保存しません。
  why_needed:
    zh: 把经验提炼与长期事实巩固分开，并设置可审计证据边界。
    en: Separates lesson derivation from factual consolidation and imposes an auditable evidence boundary.
    ja: lesson derivationをfactual consolidationから分けaudit可能evidence境界を設けます。
  includes:
    - zh: 纳入从失败、成功反馈、人工纠正和结果比较中提炼策略性经验。
      en: Includes strategic lessons from failures, success feedback, human correction, and outcome comparison.
      ja: failure・success feedback・human correction・outcome comparisonからのstrategic lessonを含みます。
  excludes:
    - zh: 排除隐藏思维链、无证据自我叙述和仅概括稳定用户偏好的记录。
      en: Excludes hidden chain-of-thought, unsupported self-narrative, and records that merely generalize a stable user preference.
      ja: hidden chain-of-thought・unsupported self-narrative・stable user preferenceを概括するだけのrecordを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - reflection_operation_id
  fields:
    - id: reflection_operation_id
      labels:
        zh: 反思操作标识
        en: reflection operation ID
        ja: reflection operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次证据约束的经验提炼活动。
        en: Identifies one evidence-bounded lesson-derivation activity.
        ja: 一evidence-bounded lesson-derivation activityを識別します。
      allowed_values: []
      pattern: null
      example_value: reflect-1002
      source_claims:
        - claim-memory-reflection-002
    - id: feedback_ids
      labels:
        zh: 反馈标识
        en: feedback IDs
        ja: feedback IDs
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出支撑反思结论的外显反馈。
        en: Lists observable feedback supporting the reflection conclusion.
        ja: reflection conclusionを支えるobservable feedbackを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - feedback-91
      source_claims:
        - claim-memory-reflection-003
  constraints: []
  required_relation_constraints: []
examples:
