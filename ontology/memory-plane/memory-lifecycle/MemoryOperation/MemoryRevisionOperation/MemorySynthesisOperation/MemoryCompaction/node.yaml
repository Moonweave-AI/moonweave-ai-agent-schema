sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind auditable compaction evidence and fidelity checks.
source_claims:
  - id: claim-memory-compaction-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from its inputs, outputs, agents, time, and provenance facts. Moonweave records compaction as an executed activity with exact records, successor, measurements, fidelity outcome, result, and audit evidence rather than a summary label or maintenance plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a compaction's inputs, successor, measurements, fidelity evidence, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-inputs
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from nearby or merely similar entities. Moonweave records only exact memory record versions actually read for compaction and does not infer inputs from session co-occurrence or text similarity.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave requires an independently identified compacted successor record rather than treating an input record, index segment, or cache key as generated output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-footprint
    source: w3c-prov-o
    supports: PROV-O records distinct entities and the activity that generated them. Moonweave compares explicitly measured input and successor representations under one scope to establish a compaction effect rather than relying on a verbal shorter claim.
    locator: "PROV-O Activity and Entity distinction"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-fidelity
    source: w3c-prov-o
    supports: PROV-O supports provenance links from a generated entity to the used entities and activity that produced it. Moonweave uses declared preservation scope and retrievable anchors to make protected facts and constraints reviewable after re-expression.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over inputs, preservation scope, anchors, sizes, check output, transformation result, and successor identity to bind compaction evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-compaction-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, and generated entities. Moonweave keeps index-only maintenance, cache cleanup, deletion, failed candidates, cross-instance generalization, and action-lesson derivation distinct from successful record compaction with new generated successor and preserved obligations.
    locator: "PROV-O sections on Activity, Entity, use, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
