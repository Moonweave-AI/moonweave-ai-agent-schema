    expected_result:
      zh: 查询返回一次 MemoryCompaction 活动、其输入与后继 MemoryRecord，并证明每个受保护事实仍可沿 preserved_anchor_ids 回查到原始日志。
      en: The query returns one MemoryCompaction activity, its input and successor MemoryRecord, and proves that every protected fact remains traceable to an original log through preserved_anchor_ids.
      ja: 照会は一つの MemoryCompaction 活動、その入力と後継 MemoryRecord を返し、各保護事実が preserved_anchor_ids から原ログへ追跡できることを示します。
    why_valid_or_invalid:
      zh: 该实例的首要效果是降低上下文占用；输入、输出和保留锚点均被明确记录，且没有从多次观测推导新规律或行动教训，因此属于 Compaction 而不是 Consolidation 或 Reflection。
      en: Its primary effect is reducing context footprint; input, output, and retained anchors are explicit, and it derives neither a new cross-observation pattern nor an action lesson, so it is Compaction rather than Consolidation or Reflection.
      ja: 主効果は文脈量の削減で、入力・出力・保持アンカーが明示され、観測横断の新規則や行動教訓を導かないため、Consolidation や Reflection ではなく Compaction です。
    synthetic: true
