    cardinality_not_applicable_reason:
      zh: 该关系记录每次压缩对具体内容记录的实际输入依赖，不对所有实现设定固定运行时基数。
      en: This relation records each compaction's actual input dependency on concrete content records and imposes no fixed runtime cardinality across implementations.
      ja: この関係は各圧縮が具体的な内容記録に持つ実際の入力依存を記録し、実装全体に固定の実行時基数を課しません。
