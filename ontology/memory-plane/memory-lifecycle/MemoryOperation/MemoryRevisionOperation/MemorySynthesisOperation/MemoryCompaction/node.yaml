        - MemoryCompaction
        - MemorySynthesisOperation
      related_relation_ids:
        - MemoryCompaction-is_a-MemorySynthesisOperation

      source_claims:
        - claim-memory-compaction-activity
        - claim-memory-compaction-fidelity
    - id: MemoryCompaction-is_a-MemorySynthesisOperation-example-boundary-failure

      labels:
        zh: 丢失安全约束的候选不是压缩子类
        en: Candidate losing a safety constraint is not the compaction subtype
        ja: 安全制約を失う候補は圧縮サブタイプではない

      descriptions:
        zh: mem-op-compact-3402 产生较短候选，但保真检查失败且缺少不得外发约束。
        en: mem-op-compact-3402 produces a shorter candidate but fails fidelity check and lacks the do-not-send constraint.
        ja: mem-op-compact-3402 はより短い候補を生成しますが、保真検査に失敗し、外部送信禁止制約を欠きます。
      field_values:
