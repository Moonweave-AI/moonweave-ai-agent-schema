schema: moonweave.ai/ontology-node/v1
id: MemoryCompaction
kind: concept
status: review
labels:
  zh: 记忆压缩
  en: Memory compaction
  ja: 記憶圧縮
semantics:
  short_definition:
    zh: 在保持预定语义与证据锚点的前提下降低记录体积的综合操作。
    en: A synthesis operation reducing record size while preserving intended semantics and evidence anchors.
    ja: 意図semanticsとevidence anchorを保持しrecord sizeを減らすsynthesis operationです。
  definition:
    zh: MemoryCompaction 以减少存储、历史或上下文占用为首要目标，输出较小但语义等价范围明确的 MemoryRecord；若输出新增跨实例规律，则是 Consolidation，若输出行动教训，则是 Reflection。
    en: MemoryCompaction primarily reduces storage, history, or context footprint and produces a smaller MemoryRecord with an explicit semantic-equivalence scope. New cross-instance patterns are Consolidation; derived action lessons are Reflection.
    ja: MemoryCompaction はstorage/history/context footprint削減を主目的にsemantic-equivalence範囲を明示した小さい MemoryRecordを生成します。new cross-instance patternはConsolidation、action lessonはReflectionです。
  why_needed:
    zh: 确保压缩不是无条件摘要，而有保真范围与可回查锚点。
    en: Ensures compaction is not unconstrained summarization but has a fidelity scope and retrievable anchors.
    ja: compactionを無制約summarizationでなくfidelity範囲とretrievable anchor付きにします。
  includes:
    - zh: 纳入历史折叠、冗余字段消除和可验证摘要化。
      en: Includes history folding, redundant-field removal, and verifiable summarization.
      ja: history folding・redundant-field removal・verifiable summarizationを含みます。
  excludes:
    - zh: 排除丢失关键约束的有损概括和把多次观测归纳成新规律。
      en: Excludes lossy abstraction that drops critical constraints and induction of a new pattern from repeated observations.
      ja: critical constraintを落とすlossy abstractionと反復observationからnew patternを導くことを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - compaction_operation_id
  fields:
    - id: compaction_operation_id
      labels:
        zh: 压缩操作标识
        en: compaction operation ID
        ja: compaction operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次保真压缩活动。
        en: Identifies one fidelity-bounded compaction activity.
        ja: 一fidelity-bounded compaction activityを識別します。
      allowed_values: []
      pattern: null
      example_value: compact-920
      source_claims:
        - claim-memory-compaction-002
    - id: preserved_anchor_ids
      labels:
        zh: 保留锚点标识
        en: preserved anchor IDs
        ja: preserved anchor IDs
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出压缩后仍可回查的证据或原始片段。
        en: Lists evidence or original fragments still retrievable after compaction.
        ja: compaction後もretrieveできるevidence/original fragmentを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - turn-44
        - tool-17
      source_claims:
        - claim-memory-compaction-003
  constraints: []
  required_relation_constraints: []
