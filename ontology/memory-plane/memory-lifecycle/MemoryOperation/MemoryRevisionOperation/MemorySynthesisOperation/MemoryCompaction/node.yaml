schema: moonweave.ai/ontology-node/v1
id: MemoryCompaction
kind: concept
labels:
  zh: 记忆压缩
  en: Memory compaction
  ja: 記憶圧縮
semantics:
  short_definition:
    zh: 摘要长上下文以释放窗口空间的合成活动。
    en: Synthesis activity summarizing long context to reclaim window space.
    ja: 長 context を要約して window 空間を回収する synthesis activity。
  definition:
    zh: MemoryCompaction 是 MemorySynthesisOperation：消费一段超长对话或 context 历史，产生更短的 summary record 以替代或代表原内容供后续检索。Claude auto-compact 与通用 context summarization 是典型映射；不同于 MemoryMerge 的 deduplicate，压缩目标是 token/window 预算而非语义重复删除。
    en: MemoryCompaction is a MemorySynthesisOperation consuming an overlong conversation or context history to produce a shorter summary record representing original content for later retrieval. Claude auto-compact and general context summarization are typical mappings; unlike MemoryMerge deduplication, compaction targets token/window budget rather than semantic duplicate removal.
    ja: MemoryCompaction は超长 conversation/context history を consume し短い summary record を生成する MemorySynthesisOperation。Claude auto-compact/context summarization が典型。MemoryMerge dedup とは異なり token/window budget が目的。
  why_needed:
    zh: 若不单独建模压缩，Claude auto-compact 会被误记为 DELETE 或 UPDATE，丢失被摘要内容的 lineage。
    en: Without modeling compaction separately, Claude auto-compact gets misrecorded as DELETE or UPDATE, losing lineage of summarized content.
    ja: compaction を分離しないと Claude auto-compact が DELETE/UPDATE と誤記録され lineage 喪失。
  includes:
    - zh: 纳入 Claude auto-compact、会话滚动摘要与 context window 管理型 summarization。
      en: Includes Claude auto-compact, rolling session summarization, and context-window management summarization.
      ja: Claude auto-compact/rolling session summary/context window summarization。
  excludes:
    - zh: 排除 deduplicate 合并、反思 insight 生成与物理删除。
      en: Excludes deduplicate merge, reflection insight generation, and physical deletion.
      ja: deduplicate merge/reflection insight/物理 delete を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "映射 Claude Code auto-compact；当 context 接近上限时生成 summary 块替换早期消息；compact_operation_id 记录 pre_compact_token_count、post_compact_token_count 与 summary_record_id。"
    en: "Map Claude Code auto-compact; when context nears limit, generate summary block replacing early messages; compact_operation_id records pre_compact_token_count, post_compact_token_count, and summary_record_id."
    ja: Claude auto-compact を写像。pre/post token count と summary_record_id を記録。
  typical_input:
    - description: Context nearing window limit
      format: |
        {"compact_operation_id": "compact-700", "pre_compact_token_count": 180000, "trigger": "auto-compact"}
      source_claims: [claim-compaction-claude]
  typical_output:
    - description: Compact summary record
      format: |
        {
          "summary_record_id": "record-summary-700-v1",
          "post_compact_token_count": 42000,
          "compacted_message_range": [0, 840]
        }
      source_claims: [claim-compaction-design]
  reference_implementations:
    - name: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code
      description: Auto-compact summarizes prior conversation context.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: Optional summary Items for long-running threads.
structure:
  identity_keys: [compact_operation_id]
  fields:
    - id: compact_operation_id
      labels: {zh: 压缩操作标识, en: Compaction operation identifier, ja: 圧縮操作識別子}
      definitions:
        zh: 标识一次上下文压缩活动。
        en: Identifies one context compaction activity.
        ja: 一 context compaction activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: compact-700
      allowed_values: []
      source_claims: [claim-compaction-id]
    - id: pre_compact_token_count
      labels: {zh: 压缩前 token 数, en: Pre-compact token count, ja: 圧縮前 token 数}
      definitions:
        zh: 压缩触发前的估计 token 数。
        en: Estimated token count before compaction triggered.
        ja: 圧縮 trigger 前の推定 token 数。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 180000
      allowed_values: []
      source_claims: [claim-compaction-claude]
  constraints: []
  required_relations: []
examples:
  - id: MemoryCompaction-example-claude-auto
    labels: {zh: Claude auto-compact, en: Claude auto-compact, ja: Claude auto-compact}
    descriptions:
      zh: compact-700 在 context 接近上限时触发 Claude auto-compact，180k token 摘要为 42k，产生 record-summary-700-v1。
      en: compact-700 triggers Claude auto-compact near context limit, summarizing 180k tokens to 42k, producing record-summary-700-v1.
      ja: context 上限近くで compact-700 が auto-compact、180k→42k token。
    example_source: {product: Claude Code, url: https://docs.anthropic.com/en/docs/claude-code, version: auto-compact}
    field_values: {compact_operation_id: compact-700, pre_compact_token_count: 180000, post_compact_token_count: 42000}
    related_node_ids: [MemoryCompaction, MemorySynthesisOperation]
    related_relation_ids: []
    source_claims: [claim-compaction-claude, claim-compaction-design]
  - id: MemoryCompaction-example-rolling
    labels: {zh: 滚动会话摘要, en: Rolling session summary, ja: ローリング session 要約}
    descriptions:
      zh: compact-701 每 N 轮对话生成 rolling summary 写入 LangGraph store 供跨 session 检索。
      en: compact-701 generates rolling summary every N turns into LangGraph store for cross-session retrieval.
      ja: N turn 毎 rolling summary を LangGraph store へ。
    example_source: {product: LangGraph, url: https://langchain-ai.github.io/langgraph/reference/store/, version: summary Item}
    field_values: {compact_operation_id: compact-701}
    related_node_ids: [MemoryCompaction, memory-context]
    related_relation_ids: []
    source_claims: [claim-compaction-langgraph, claim-compaction-design]
  - id: MemoryCompaction-example-not-delete
    labels: {zh: 压缩非删除, en: Compaction is not delete, ja: compaction は delete ではない}
    descriptions:
      zh: compact-700 产生 summary record 代表早期消息；delete-310 产生 tombstone 且无 summary 替代。
      en: compact-700 produces summary record representing early messages; delete-310 produces tombstone with no summary replacement.
      ja: compaction は summary 代替、delete は tombstone。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryCompaction, MemoryDelete]
    related_relation_ids: []
    source_claims: [claim-compaction-design]
  - id: MemoryCompaction-example-not-reflection
    labels: {zh: 压缩非反思, en: Compaction is not reflection, ja: compaction は reflection ではない}
    descriptions:
      zh: reflect-600 生成 introspective insight；compact-700 生成 context window 摘要以节省 token。
      en: reflect-600 generates introspective insight; compact-700 generates context window summary to save tokens.
      ja: reflection は insight、compaction は token 節約 summary。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryCompaction, MemoryReflection]
    related_relation_ids: []
    source_claims: [claim-compaction-design]
parent_relation:
  id: MemoryCompaction-is_a-MemorySynthesisOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆合成操作, en: is a memory synthesis operation, ja: 記憶合成操作の一種}
  definitions:
    zh: MemoryCompaction —is_a→ MemorySynthesisOperation 表示长 context 被摘要为更短 summary record。
    en: MemoryCompaction —is_a→ MemorySynthesisOperation holds because long context is summarized into a shorter summary record.
    ja: 長 context を短 summary record に要約するため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryCompaction-is_a-MemorySynthesisOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when compaction produces summary representing prior context for window management.
      explanations:
        zh: 仅当压缩产生代表先前 context 的 summary 以管理窗口时成立。
        en: Assert only when compaction produces summary representing prior context for window management.
        ja: window 管理用 summary 生成時のみ。
      source_claims: [claim-compaction-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-compaction-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-claude-compaction
    title: Claude Code Documentation
    publisher: Anthropic
    url: https://docs.anthropic.com/en/docs/claude-code
    source_type: official-doc
    relevance: Auto-compact context summarization.
  - id: src-langgraph-compaction
    title: LangGraph Store Reference
    publisher: LangChain
    url: https://langchain-ai.github.io/langgraph/reference/store/
    source_type: official-doc
    relevance: Summary Items for long threads.
  - id: src-compaction-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Compaction summarizes context for window budget.
source_claims:
  - id: claim-compaction-claude
    source: src-claude-compaction
    supports: Claude auto-compact summarizes prior conversation when context nears limits.
    locator: auto-compact
    evidence_kind: primary-doc
    confidence: high
  - id: claim-compaction-langgraph
    source: src-langgraph-compaction
    supports: LangGraph store can hold summary Items for compacted thread history.
    locator: BaseStore.put summary patterns
    evidence_kind: design-inference
    confidence: medium
  - id: claim-compaction-design
    source: src-compaction-design
    supports: MemoryCompaction produces summary records to manage context window budget.
    locator: MemoryCompaction boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-compaction-id
    source: src-compaction-design
    supports: compact_operation_id identifies one compaction activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
