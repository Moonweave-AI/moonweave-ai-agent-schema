    - claim-memory-compaction-fidelity
    - claim-memory-compaction-boundary
  distinct_fact_rationale:
    zh: 该主干关系仅表达受保真约束的表示成本降低属于 MemorySynthesisOperation；输入、后继、大小、锚点、检查、结果和审计由字段或独立关系表达。
    en: This backbone relation only expresses that fidelity-constrained representation-cost reduction belongs to MemorySynthesisOperation; inputs, successor, sizes, anchors, check, result, and audit use fields or separate relations.
    ja: この主幹関係は、保真性制約付きの表現コスト削減が MemorySynthesisOperation に属することだけを表します。入力、後継、サイズ、アンカー、検査、結果、監査はフィールドまたは独立関係で表します。
