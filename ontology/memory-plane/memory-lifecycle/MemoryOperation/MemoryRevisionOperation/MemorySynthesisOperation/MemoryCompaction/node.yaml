sibling_differentiation:
  - sibling_concept_id: MemoryConsolidation
    shared_parent_concept_id: MemorySynthesisOperation
    differentia:
      zh: 正向身份比较：父节点 MemorySynthesisOperation：MemoryCompaction（semantic kind=activity，骨架 MemoryCompaction-is_a-MemorySynthesisOperation）；MemoryConsolidation（semantic kind=activity，骨架 MemoryConsolidation-is_a-MemorySynthesisOperation）。双端条件：MemoryCompaction 条件：“在保持预定语义与证据锚点的前提下降低记录体积的综合操作”；MemoryConsolidation 条件：“从重复或相关观测形成更稳定、概括层次更高记录的综合操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemorySynthesisOperation: MemoryCompaction (semantic kind=activity, backbone MemoryCompaction-is_a-MemorySynthesisOperation); MemoryConsolidation (semantic kind=activity, backbone MemoryConsolidation-is_a-MemorySynthesisOperation). Endpoint conditions: MemoryCompaction condition: “A synthesis operation reducing record size while preserving intended semantics and evidence anchors”; MemoryConsolidation condition: “A synthesis operation forming a more stable, more generalized record from repeated or related observations”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemorySynthesisOperation：MemoryCompaction（semantic kind=activity、バックボーン MemoryCompaction-is_a-MemorySynthesisOperation）；MemoryConsolidation（semantic kind=activity、バックボーン MemoryConsolidation-is_a-MemorySynthesisOperation）。両端条件：MemoryCompaction の条件：「意図semanticsとevidence anchorを保持しrecord sizeを減らすsynthesis operationです」；MemoryConsolidation の条件：「反復/関連observationからよりstableで高抽象recordを形成するsynthesis operationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-compaction-004
  - sibling_concept_id: MemoryMerge
    shared_parent_concept_id: MemorySynthesisOperation
    differentia:
      zh: 正向身份比较：父节点 MemorySynthesisOperation：MemoryCompaction（semantic kind=activity，骨架 MemoryCompaction-is_a-MemorySynthesisOperation）；MemoryMerge（semantic kind=activity，骨架 MemoryMerge-is_a-MemorySynthesisOperation）。双端条件：MemoryCompaction 条件：“在保持预定语义与证据锚点的前提下降低记录体积的综合操作”；MemoryMerge 条件：“组合两个以上记录并尽量保留各自声明和证据的综合操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemorySynthesisOperation: MemoryCompaction (semantic kind=activity, backbone MemoryCompaction-is_a-MemorySynthesisOperation); MemoryMerge (semantic kind=activity, backbone MemoryMerge-is_a-MemorySynthesisOperation). Endpoint conditions: MemoryCompaction condition: “A synthesis operation reducing record size while preserving intended semantics and evidence anchors”; MemoryMerge condition: “A synthesis operation combining two or more records while preserving their claims and evidence as far as possible”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemorySynthesisOperation：MemoryCompaction（semantic kind=activity、バックボーン MemoryCompaction-is_a-MemorySynthesisOperation）；MemoryMerge（semantic kind=activity、バックボーン MemoryMerge-is_a-MemorySynthesisOperation）。両端条件：MemoryCompaction の条件：「意図semanticsとevidence anchorを保持しrecord sizeを減らすsynthesis operationです」；MemoryMerge の条件：「二つ以上のrecordを組合せ各claim/evidenceを可能な限り保持するsynthesis operationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-compaction-005
  - sibling_concept_id: MemoryReflection
    shared_parent_concept_id: MemorySynthesisOperation
    differentia:
      zh: 已审查兄弟区分：父节点 MemorySynthesisOperation：MemoryCompaction（semantic kind=activity，骨架 MemoryCompaction-is_a-MemorySynthesisOperation）；MemoryReflection（semantic kind=activity，骨架 MemoryReflection-is_a-MemorySynthesisOperation）。双端条件：MemoryCompaction 条件：“在保持预定语义与证据锚点的前提下降低记录体积的综合操作”；MemoryReflection 条件：“基于可观察结果与反馈形成可复用经验或行动教训的综合操作”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent MemorySynthesisOperation: MemoryCompaction (semantic kind=activity, backbone MemoryCompaction-is_a-MemorySynthesisOperation); MemoryReflection (semantic kind=activity, backbone MemoryReflection-is_a-MemorySynthesisOperation). Endpoint conditions: MemoryCompaction condition: “A synthesis operation reducing record size while preserving intended semantics and evidence anchors”; MemoryReflection condition: “A synthesis operation deriving a reusable lesson or procedure from observable outcomes and feedback”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 MemorySynthesisOperation：MemoryCompaction（semantic kind=activity、バックボーン MemoryCompaction-is_a-MemorySynthesisOperation）；MemoryReflection（semantic kind=activity、バックボーン MemoryReflection-is_a-MemorySynthesisOperation）。両端条件：MemoryCompaction の条件：「意図semanticsとevidence anchorを保持しrecord sizeを減らすsynthesis operationです」；MemoryReflection の条件：「観測可能outcomeとfeedbackから再利用lesson/procedureを導くsynthesis operationです」。一方の成立は他方を証明しません。
    source_claims:
      - claim-memory-compaction-006
