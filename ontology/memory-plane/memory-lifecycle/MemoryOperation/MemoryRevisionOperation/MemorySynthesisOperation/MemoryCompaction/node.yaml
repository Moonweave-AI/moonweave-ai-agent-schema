      en: memory-op-compaction-001 compresses twelve repetitive tool-failure logs into one smaller successor record; it retains the error code, the do-not-export constraint, and every source anchor and publishes only after the fidelity check passes.
      ja: memory-op-compaction-001 は十二件の反復ツール失敗ログを小さい後継記録へ圧縮し、error code・do-not-export 制約・全出典アンカーを保持して、忠実度検査の合格後にだけ公開します。
