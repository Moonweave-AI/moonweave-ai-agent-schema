parent_relation:
  id: MemoryCompaction-is_a-MemorySynthesisOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆综合操作
    en: is a memory synthesis operation
    ja: 記憶統合操作の一種である
  definitions:
    zh: MemoryCompaction 是以保真范围为约束、产生更小新后继记录的 MemorySynthesisOperation。
    en: MemoryCompaction is a MemorySynthesisOperation that produces a smaller new successor record under a fidelity-scope constraint.
    ja: MemoryCompaction は保真範囲の制約の下でより小さい新しい後継記録を生成する MemorySynthesisOperation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次压缩的输入数、锚点数或后续检索次数。
    en: The classification relation expresses type membership and does not limit input count, anchor count, or later retrieval count of one compaction.
    ja: この分類関係は型の所属を表し、一つの圧縮の入力数、アンカー数、後続検索数を制限しません。
  inverse_reading:
    predicate: has_compaction_subtype
    labels:
      zh: 具有压缩子类
      en: has compaction subtype
      ja: 圧縮サブタイプを持つ
  conditions:
    - id: MemoryCompaction-is_a-MemorySynthesisOperation-child-differentia
      severity: error
      expression_language: plain
      expression: "Assert only when an executed MemorySynthesisOperation reads exact records, creates a distinct smaller successor, declares preservation scope and anchors, and passes the fidelity check."
      explanation:
        zh: 一般综合身份不足以证明压缩；精确输入、独立较小后继、保真范围、锚点和通过检查必须同时存在。
        en: General synthesis identity alone does not prove compaction; exact inputs, distinct smaller successor, preservation scope, anchors, and passed check must all exist.
        ja: 一般的な統合識別だけでは圧縮を証明できません。正確な入力、独立したより小さい後継、保真範囲、アンカー、合格検査がすべて必要です。
      source_claims:
        - claim-memory-compaction-activity
        - claim-memory-compaction-fidelity
        - claim-memory-compaction-boundary
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemoryCompaction-is_a-MemorySynthesisOperation-example-positive

      labels:
        zh: 有保真证据的缩减属于综合
        en: Fidelity-backed reduction is a synthesis operation
        ja: 保真証拠に裏付けられた削減は統合操作である

      descriptions:
        zh: mem-op-compact-3401 生成更小后继并保留输入锚点、约束和通过的保真检查。
        en: mem-op-compact-3401 creates a smaller successor and retains input anchors, constraints, and a passed fidelity check.
        ja: mem-op-compact-3401 はより小さい後継を生成し、入力アンカー、制約、合格した保真検査を保持します。
      field_values:
        operation_id: mem-op-compact-3401
        input_record_refs:
          - record-3401-log-a-v1
          - record-3401-log-b-v1
        successor_record_ref: record-3401-compact-v1
        input_size_bytes: 18640
        output_size_bytes: 5840
        fidelity_check: passed
