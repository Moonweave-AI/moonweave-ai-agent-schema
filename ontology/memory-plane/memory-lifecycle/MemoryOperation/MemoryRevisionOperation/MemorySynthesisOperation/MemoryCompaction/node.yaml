schema: moonweave.ai/ontology-node/v1
id: MemoryCompaction
kind: concept
status: accepted
labels:
  zh: 记忆压缩
  en: Memory compaction
  ja: 記憶圧縮
semantics:
  short_definition:
    zh: 在明确保真范围内将多个记忆记录重表达为更小的新后继记录，并保留可回查证据锚点的综合操作。
    en: A synthesis operation that re-expresses multiple memory records as a smaller new successor record within an explicit fidelity scope and retains retrievable evidence anchors.
    ja: 明示的な保真範囲内で複数の記憶記録をより小さい新しい後継記録へ再表現し、再確認可能な証拠アンカーを保持する統合操作です。
  definition:
    zh: MemoryCompaction 是已执行的 MemorySynthesisOperation，其首要目标是降低存储、检索或上下文中的记录表示成本。它读取精确输入 MemoryRecord 版本，声明必须保留的语义、约束和证据锚点，产生具有独立身份且大小可测减少的后继 MemoryRecord，并记录输入与输出大小、保真检查、锚点和证据摘要。若主要结果是跨实例发现稳定规律，则是 MemoryConsolidation；若形成行动教训，则是 MemoryReflection；若只是重新组织索引或缓存段而不形成新 MemoryRecord，则不是本概念；若丢失声明为受保护的安全约束或事实，也不是成功压缩。
    en: MemoryCompaction is an executed MemorySynthesisOperation whose primary goal is to reduce record representation cost in storage, retrieval, or context. It reads exact input MemoryRecord versions, declares the semantics, constraints, and evidence anchors that must remain, produces an independently identified successor MemoryRecord with measurable size reduction, and records input and output sizes, fidelity check, anchors, and evidence digest. If the primary result discovers a stable cross-instance pattern it is MemoryConsolidation; if it forms an actionable lesson it is MemoryReflection; if it only reorganizes index or cache segments without forming a new MemoryRecord it is not this concept; and if it loses a declared protected safety constraint or fact it is not successful compaction.
    ja: MemoryCompaction は、保存、検索、文脈における記録表現コストの削減を主目標とする実行済み MemorySynthesisOperation です。正確な入力 MemoryRecord バージョンを読み、保持すべき意味、制約、証拠アンカーを宣言し、測定可能なサイズ削減を持つ独立識別可能な後継 MemoryRecord を生成し、入力と出力のサイズ、保真検査、アンカー、証拠ダイジェストを記録します。主な結果が複数事例にまたがる安定した規則の発見なら MemoryConsolidation、実行可能な教訓の形成なら MemoryReflection、新しい MemoryRecord を形成せずインデックスまたはキャッシュ断片を再編成するだけなら本概念ではありません。宣言された保護対象の安全制約または事実を失う場合も成功した圧縮ではありません。
  why_needed:
    zh: “更短”本身不能证明内存压缩正确；保真范围、锚点和尺寸证据让系统可区分有约束的记录压缩、任意摘要、索引维护及危险的信息丢失。
    en: Shorter alone does not prove memory compaction is correct; fidelity scope, anchors, and size evidence distinguish constrained record compaction from arbitrary summary, index maintenance, and dangerous information loss.
    ja: 「短い」だけでは記憶圧縮が正しいことを証明できません。保真範囲、アンカー、サイズ証拠により、制約付き記録圧縮を任意要約、インデックス保守、危険な情報損失から区別します。
  includes:
    - zh: 保留声明的事实、约束和可回查锚点，同时以更小后继记录替代多个冗余、冗长或分散输入的受控重表达。
      en: Controlled re-expression that preserves declared facts, constraints, and retrievable anchors while replacing multiple redundant, verbose, or fragmented inputs with a smaller successor record.
      ja: 宣言された事実、制約、再確認可能なアンカーを保持しながら、複数の冗長、長大、分散した入力をより小さい後継記録に置き換える制御された再表現を含みます。
  excludes:
    - zh: 删除受保护事实以缩短文本的摘要、跨实例概括、行动教训、原地覆盖、只压缩索引或缓存段、没有新后继的清理及未通过保真检查的候选。
      en: A summary that shortens text by deleting protected facts, cross-instance generalization, actionable lesson, in-place overwrite, index-only or cache-only segment compaction, cleanup with no new successor, and a candidate that fails fidelity checks.
      ja: 保護された事実を削除してテキストを短くする要約、複数事例一般化、実行可能な教訓、その場での上書き、インデックスまたはキャッシュ断片のみの圧縮、新しい後継を持たないクリーンアップ、保真検査に失敗した候補を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将压缩实现为先声明后验证的版本转换：固定输入记录、保留义务和锚点，生成新的紧凑后继，测量实际缩减，并在替换前验证所有受保护语义仍可回查。不能依据“摘要”名称、较少 token、同一会话或索引段合并推断记录压缩已成功。
    en: "Implement compaction as a declare-then-verify version transition: fix input records, preservation obligations, and anchors; generate a new compact successor; measure actual reduction; and verify that every protected semantic is still retrievable before replacement. Do not infer successful record compaction from a summary label, fewer tokens, the same session, or merged index segments."
    ja: 圧縮は宣言してから検証するバージョン遷移として実装します。入力記録、保持義務、アンカーを固定し、新しいコンパクトな後継を生成し、実際の削減を測定し、置換前にすべての保護意味が再確認可能であることを検証します。要約ラベル、トークン数の減少、同じセッション、統合されたインデックス断片から記録圧縮の成功を推論してはいけません。
  typical_input:
    - description: Exact input records, declared preservation obligations and anchors, selected compaction scope, actor identity, and operation start time.
      format: "{operation_id, input_record_refs, preserved_anchor_refs, preservation_scope, actor_ref, started_at}"
  typical_output:
    - description: A smaller new successor record with size measurements, passed fidelity report, evidence digest, compaction time, result, and audit reference.
      format: "{operation_id, successor_record_ref, input_size_bytes, output_size_bytes, fidelity_check, compaction_evidence_digest, compacted_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding compaction evidence and retention checks.
  source_claims:
    - claim-memory-compaction-activity
    - claim-memory-compaction-fidelity
    - claim-memory-compaction-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联压缩的输入、后继、保真、证据、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one compaction's inputs, successor, fidelity, evidence, result, and audit facts.
        ja: 一つの圧縮の入力、後継、保真性、証拠、結果、監査事実を結ぶために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-compact-3401
      source_claims:
        - claim-memory-compaction-identity
    - id: input_record_refs
      labels:
        zh: 输入记录引用
        en: input record references
        ja: 入力記録参照
      datatype: array[string]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出实际被压缩的精确 MemoryRecord 版本；同会话记录、相似文本或同一主体但未读取的记录不属于输入。
        en: Lists exact MemoryRecord versions actually compacted; same-session records, similar text, or records of the same subject that were not read are not inputs.
        ja: 実際に圧縮した正確な MemoryRecord バージョンを列挙します。同じセッションの記録、類似テキスト、同じ主体であっても読み取らなかった記録は入力ではありません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-3401-log-a-v1
        - record-3401-log-b-v1
      source_claims:
        - claim-memory-compaction-inputs
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後継記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识压缩实际生成的独立新 MemoryRecord；任何输入记录、索引段或缓存键都不能充当该后继。
        en: Identifies the independent new MemoryRecord actually generated by compaction; no input record, index segment, or cache key can serve as that successor.
        ja: 圧縮が実際に生成した独立した新しい MemoryRecord を識別します。入力記録、インデックス断片、キャッシュキーはその後継になれません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3401-compact-v1
      source_claims:
        - claim-memory-compaction-successor
    - id: preservation_scope
      labels:
        zh: 保真范围
        en: preservation scope
        ja: 保真範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明后继必须保留的语义义务范围，使体积降低不会被误当作允许丢失安全约束、来源或事实。
        en: Declares the semantic obligation scope that the successor must retain so footprint reduction is not mistaken as permission to lose safety constraints, source, or facts.
        ja: サイズ削減が安全制約、出所、事実を失う許可と誤認されないよう、後継が保持すべき意味義務の範囲を宣言します。
      allowed_values:
        - facts_constraints_and_anchors
        - facts_and_anchors
        - constraints_and_anchors
      pattern: null
      example_value: facts_constraints_and_anchors
      source_claims:
        - claim-memory-compaction-fidelity
    - id: preserved_anchor_refs
      labels:
        zh: 保留锚点引用
        en: preserved anchor references
        ja: 保持アンカー参照
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出压缩后仍可访问的精确来源、片段或证据锚点，用于从后继记录回查受保护事实与约束。
        en: Lists exact source, fragment, or evidence anchors still accessible after compaction for tracing protected facts and constraints from the successor record.
        ja: 後継記録から保護された事実と制約を追跡するために、圧縮後もアクセス可能な正確なソース、断片、証拠アンカーを列挙します。
      allowed_values: []
      pattern: '^[a-z][a-z0-9-]*-[A-Za-z0-9._-]+$'
      example_value:
        - anchor-3401-error-code
        - anchor-3401-safety-constraint
      source_claims:
        - claim-memory-compaction-fidelity
    - id: input_size_bytes
      labels:
        zh: 输入大小字节数
        en: input size bytes
        ja: 入力サイズバイト数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录参与压缩的输入表示在声明范围内的可测总字节数，用于判断实际资源缩减。
        en: Records the measurable total byte size of participating input representations within the declared scope to determine actual resource reduction.
        ja: 実際の資源削減を判断するため、宣言範囲内で圧縮に参加する入力表現の測定可能な総バイト数を記録します。
      allowed_values: []
      pattern: null
      example_value: 18640
      source_claims:
        - claim-memory-compaction-footprint
    - id: output_size_bytes
      labels:
        zh: 输出大小字节数
        en: output size bytes
        ja: 出力サイズバイト数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录新后继在相同计量范围内的可测字节数；它必须小于 input_size_bytes，不能仅报告 token 估计或口头“更短”。
        en: Records measurable byte size of the new successor within the same measurement scope; it must be less than input_size_bytes and cannot be only a token estimate or verbal shorter claim.
        ja: 同じ測定範囲内で新しい後継の測定可能なバイト数を記録します。input_size_bytes より小さくなければならず、トークン推定または口頭の短縮主張だけではいけません。
      allowed_values: []
      pattern: null
      example_value: 5840
      source_claims:
        - claim-memory-compaction-footprint
    - id: fidelity_check
      labels:
        zh: 保真检查结果
        en: fidelity check result
        ja: 保真検査結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对声明保真范围的已完成检查结果；候选失败或未检查时不得将后继当作成功压缩输出。
        en: Records completed check result for the declared fidelity scope; a failed or unchecked candidate cannot be treated as successful compaction output.
        ja: 宣言された保真範囲に対する完了済み検査結果を記録します。失敗または未検査の候補を成功した圧縮出力として扱えません。
      allowed_values:
        - passed
        - failed
      pattern: null
      example_value: passed
      source_claims:
        - claim-memory-compaction-fidelity
    - id: compaction_evidence_digest
      labels:
        zh: 压缩证据摘要
        en: compaction evidence digest
        ja: 圧縮証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定输入版本、保真范围、锚点、尺寸、检查结果、转换输出和后继身份的 SHA-256 摘要，以便审计成功或失败的压缩候选。
        en: Fixes a SHA-256 digest of input versions, preservation scope, anchors, sizes, check result, transformation output, and successor identity to audit successful or failed compaction candidates.
        ja: 成功または失敗した圧縮候補を監査するため、入力バージョン、保真範囲、アンカー、サイズ、検査結果、変換出力、後継識別子の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:1f5e39bc2f5f2c21e4bbbe4e7acdc04247af0e9ed68107b90f1af3900adc854e
      source_claims:
        - claim-memory-compaction-evidence
    - id: compacted_at
      labels:
        zh: 压缩发生时间
        en: compacted at
        ja: 圧縮発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录后继压缩记录实际形成并完成保真判断的事件时间，而非请求、预估或后续检索时间。
        en: Records the event time at which the compact successor actually forms and receives its fidelity determination, not request, prediction, or later retrieval time.
        ja: コンパクトな後継が実際に形成され保真判断を受けたイベント時刻を記録します。要求、予測、後続検索の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T05:00:00.081Z"
      source_claims:
        - claim-memory-compaction-activity
  constraints:
    - id: MemoryCompaction-input-successor-and-size-consistency
      expression: "input_record_refs contains the exact compacted records, successor_record_ref is a distinct new record identity, and output_size_bytes is less than input_size_bytes under the same measurement scope."
      explanation:
        zh: 同会话、相似文本或索引段合并不能代替真实输入；没有独立后继和可测尺寸减少就不是记录压缩。
        en: Same-session context, similar text, or index-segment merge cannot substitute for real inputs; without a distinct successor and measurable size reduction, this is not record compaction.
        ja: 同一セッション文脈、類似テキスト、インデックス断片の統合は実際の入力の代わりになりません。独立した後継と測定可能なサイズ削減がなければ、これは記録圧縮ではありません。
      source_claims:
        - claim-memory-compaction-inputs
        - claim-memory-compaction-successor
        - claim-memory-compaction-footprint
    - id: MemoryCompaction-fidelity-and-anchor-consistency
      expression: "fidelity_check equals passed only when every obligation in preservation_scope remains represented or retrievable through preserved_anchor_refs, and compaction_evidence_digest covers anchors, obligations, sizes, and check output."
      explanation:
        zh: 较小表示不能补偿受保护事实或安全约束的丢失；锚点和检查证据必须能支持逐项复核。
        en: Smaller representation cannot compensate for loss of protected facts or safety constraints; anchors and check evidence must support item-by-item review.
        ja: より小さい表現は保護された事実または安全制約の喪失を補償できません。アンカーと検査証拠は項目ごとの確認を支えなければなりません。
      source_claims:
        - claim-memory-compaction-fidelity
        - claim-memory-compaction-evidence
    - id: MemoryCompaction-boundary-from-consolidation-reflection-and-maintenance
      expression: "Primary goal is reduce representation cost with preservation_scope satisfied; producing cross-instance pattern, actionable lesson, index-only maintenance, cache-only cleanup, deletion, or a failed fidelity candidate does not satisfy successful MemoryCompaction."
      explanation:
        zh: 压缩的种差是受约束的表示成本降低；不能以同样“更短”或“整理”措辞吞并巩固、反思、维护或数据丢失。
        en: Compaction's differentia is constrained representation-cost reduction; similar shorter or cleanup wording cannot absorb consolidation, reflection, maintenance, or data loss.
        ja: 圧縮の種差は制約付きの表現コスト削減です。同じ短縮または整理という表現で、統合、反省、保守、データ損失を吸収できません。
      source_claims:
        - claim-memory-compaction-boundary
  required_relation_constraints:
    - relation_id: MemoryCompaction-consumes-MemoryRecord
      requirement: Every input_record_ref used by a successful compaction must be the target of a consumes relation.
    - relation_id: MemoryCompaction-produces-MemoryRecord
      requirement: A passed compaction must produce successor_record_ref and retain its lineage to input_record_refs.
examples:
  - id: MemoryCompaction-example-positive-provenance-preserving

    labels:
      zh: 保留事实约束与锚点的压缩
      en: Compaction preserving facts, constraints, and anchors
      ja: 事実、制約、アンカーを保持する圧縮

    descriptions:
      zh: RAPTOR 递归摘要将多叶节点压缩为上层 summary node；MemGPT 将 overflow main_context 内容 archival_memory_insert 后从工作区移除。
      en: RAPTOR recursive summarization compresses leaf nodes into upper summary nodes; MemGPT archival_memory_insert after main_context overflow then removes from working area.
      ja: RAPTOR 再帰要約圧縮。MemGPT main_context overflow→archival_memory_insert。
    field_values:
      operation_id: mem-op-compact-3401
      input_record_refs:
        - record-3401-log-a-v1
        - record-3401-log-b-v1
        - record-3401-log-c-v1
      successor_record_ref: record-3401-compact-v1
      preservation_scope: facts_constraints_and_anchors
      preserved_anchor_refs:
        - anchor-3401-error-code
        - anchor-3401-do-not-export
        - anchor-3401-log-a
        - anchor-3401-log-b
        - anchor-3401-log-c
      input_size_bytes: 18640
      output_size_bytes: 5840
      fidelity_check: passed
      compacted_at: "2026-07-19T05:00:00.081Z"
    related_node_ids:
      - MemoryCompaction
      - MemorySynthesisOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryCompaction-is_a-MemorySynthesisOperation
      - MemoryCompaction-consumes-MemoryRecord
      - MemoryCompaction-produces-MemoryRecord

    source_claims:
      - claim-memory-compaction-inputs
      - claim-memory-compaction-fidelity
      - claim-memory-compaction-footprint
      - claim-memory-compaction-evidence
  - id: MemoryCompaction-example-counterexample-lost-constraint

    labels:
      zh: 丢失受保护约束的短摘要不是成功压缩
      en: Short summary losing a protected constraint is not successful compaction
      ja: 保護制約を失う短い要約は成功した圧縮ではない

    descriptions:
      zh: 反例：Compaction 直接删除源 MemoryRecord 且无 tombstone 或 RAPTOR 上层摘要保留。
      en: Counterexample: Compaction deletes source MemoryRecords without tombstone or RAPTOR upper-summary retention.
      ja: 反例：Compaction が source MemoryRecord 直接 delete。tombstone/RAPTOR upper summary なし。
    field_values:
      operation_id: mem-op-compact-3402
      input_record_refs:
        - record-3402-a-v1
        - record-3402-b-v1
      successor_record_ref: record-3402-short-v1
      preservation_scope: facts_constraints_and_anchors
      preserved_anchor_refs:
        - anchor-3402-fact-a
      input_size_bytes: 10000
      output_size_bytes: 3000
      fidelity_check: failed
      missing_constraint: do-not-send-to-external-tools
    related_node_ids:
      - MemoryCompaction
      - MemoryRecord
    related_relation_ids:
      - MemoryCompaction-is_a-MemorySynthesisOperation
      - MemoryCompaction-produces-MemoryRecord

    source_claims:
      - claim-memory-compaction-fidelity
      - claim-memory-compaction-boundary
  - id: MemoryCompaction-example-boundary-index-only

    labels:
      zh: 仅索引段压缩不属于记忆压缩
      en: Index-segment compaction alone is not memory compaction
      ja: インデックス断片圧縮だけは記憶圧縮ではない

    descriptions:
