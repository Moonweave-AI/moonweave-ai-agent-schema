  - id: MemoryCompaction-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 记忆压缩边界例
      en: "Boundary case: Memory compaction"
      ja: 記憶圧縮境界例
    scenario_id: MemoryCompaction:boundary:20260716
    descriptions:
      zh: compact-921 虽把摘要继续缩短，却删除用户明确的 do-not-export 约束；fidelity_report 的 safety_constraint 检查失败，输出仍被标为候选。
      en: compact-921 shortens the summary further but removes the user's explicit do-not-export constraint; fidelity_report fails safety_constraint and leaves the output as a candidate.
      ja: compact-921 は summary をさらに短くしますが user の explicit do-not-export constraint を削除し、fidelity_report は safety_constraint で fail して output は candidate のままです。
    field_values: {}
    related_node_ids:
      - MemoryCompaction
    related_relation_ids: []
    expected_result:
      zh: 拒绝把 compact-921 记为成功的 MemoryCompaction；保存失败结果并继续使用原记录，直到新候选通过全部保真检查。
      en: Do not record compact-921 as a successful MemoryCompaction; retain the failure result and original record until a new candidate passes every fidelity check.
      ja: compact-921 を成功 MemoryCompaction とせず failure result と original record を保持し、new candidate が全 fidelity check を通るまで置換しません。
    why_valid_or_invalid:
      zh: 体积更小不能补偿安全语义丢失；缺少受保护约束会改变后续披露行为，所以该候选不满足声明的语义等价范围。
      en: A smaller footprint cannot compensate for lost safety semantics; omitting the protected constraint changes later disclosure behavior and violates the declared equivalence scope.
      ja: smaller footprint は lost safety semantics を補えず、protected constraint 欠落は後続 disclosure behavior を変えて declared equivalence scope に違反します。
    synthetic: false
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-compaction-001
