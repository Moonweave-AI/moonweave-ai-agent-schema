  - id: MemoryCompaction-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 保留证据锚点的记忆压缩实例
      en: Memory-compaction instance preserving evidence anchors
      ja: 証拠アンカーを保持する記憶圧縮インスタンス
    scenario_id: MemoryCompaction:instance:memory-op-compaction-001
    descriptions:
      zh: 在一次模型调用前，memory-op-compaction-001 消费 memory-record-tool-failures-v12，将十二段重复失败日志压缩为 memory-record-tool-failures-v13，并保留错误码、安全约束及十二个原始日志锚点。
      en: Before one model call, memory-op-compaction-001 consumes memory-record-tool-failures-v12, compacts twelve repetitive failure logs into memory-record-tool-failures-v13, and preserves the error code, safety constraint, and twelve original-log anchors.
      ja: 一回のモデル呼出し前に、memory-op-compaction-001 は memory-record-tool-failures-v12 を消費し、十二件の反復失敗ログを memory-record-tool-failures-v13 へ圧縮し、error code・安全制約・十二の原ログアンカーを保持します。
    field_values:
      operation_id: memory-op-compaction-001
      reason: context budget requires provenance-preserving compaction
      compaction_operation_id: memory-op-compaction-001
      preserved_anchor_ids:
