      zh: 主要效果是降低持久化和上下文占用，输出拥有新身份且在声明范围内保持语义等价，没有额外归纳稳定偏好或行动教训。
      en: Its primary effect is lower storage and context footprint; the new output preserves declared semantic equivalence without deriving a stable preference or action lesson.
      ja: 主効果は storage/context footprint 削減で、新 output は declared semantic equivalence を保ち stable preference や action lesson を導出しません。
