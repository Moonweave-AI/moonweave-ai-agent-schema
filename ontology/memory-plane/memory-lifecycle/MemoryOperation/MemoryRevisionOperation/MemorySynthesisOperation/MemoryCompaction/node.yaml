      ja: 圧縮対象の記憶記録を消費する
    definitions:
      zh: MemoryCompaction 消费处于其压缩和保真范围内的精确输入 MemoryRecord；只有这些记录的内容和锚点可用于形成后继。
      en: MemoryCompaction consumes an exact input MemoryRecord within its compaction and fidelity scope; only those records' content and anchors may form the successor.
      ja: MemoryCompaction は圧縮と保真範囲内にある正確な入力 MemoryRecord を消費します。それらの記録の内容とアンカーだけが後継を形成できます。
