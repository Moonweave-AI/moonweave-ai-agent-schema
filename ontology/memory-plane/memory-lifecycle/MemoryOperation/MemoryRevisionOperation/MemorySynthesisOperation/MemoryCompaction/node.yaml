    source: eng-fw-langmem-memory-management
    supports: MemoryCompaction.compaction_operation_id records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-compaction-003
    source: eng-fw-langmem-memory-management
    supports: MemoryCompaction.preserved_anchor_ids records the stated operational datum so the concept instance can be identified or audited without changing the source model's own vocabulary.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-compaction-004
    source: eng-fw-langmem-memory-management
    supports: LangMem's memory-management model permits stored semantic memory to be updated rather than merely appended. Moonweave distinguishes MemoryCompaction by reduced representation size with intended meaning preserved, and MemoryConsolidation by increased stability or generality; LangMem does not define this pair.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-compaction-005
    source: eng-fw-langmem-memory-management
    supports: LangMem supports semantic-memory updates and collection-level management. Moonweave classifies MemoryCompaction by its size-reduction objective and MemoryMerge by its multi-record combination objective; a merge may occur without compaction, so their sibling distinction is a Moonweave ontology inference.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-memory-compaction-006
    source: eng-fw-langmem-memory-management
    supports: LangMem's persistent-memory operations motivate treating memory transformation as an auditable operation. Moonweave separates MemoryCompaction, which preserves intended content while reducing size, from MemoryReflection, which creates a new lesson or procedure; LangMem does not assert these endpoint semantics.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
