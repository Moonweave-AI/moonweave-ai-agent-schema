        en: Classify merge-701 as MemoryMerge and record both peer inputs as direct sources of the union output.
        ja: merge-701 を MemoryMerge に分類し、二 peer input を union output の direct source として記録します。
      why_valid_or_invalid:
        zh: 活动目标是无额外抽象地联合互补断言，同时保存两端证据，正是 merge 相对其他合成子类的区别。
        en: Its goal is to union complementary claims without added abstraction while preserving both evidence sets, which distinguishes merge from other synthesis children.
        ja: 追加 abstraction なしで complementary claim を union し両 evidence を保持する goal が、他 synthesis child との違いです。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
