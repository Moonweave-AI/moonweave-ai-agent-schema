schema: moonweave.ai/ontology-node/v1
id: MemoryMerge
kind: concept
labels:
  zh: 记忆合并
  en: Memory merge
  ja: 記憶マージ
semantics:
  short_definition:
    zh: 将重复或相关记录 deduplicate 为一条合成后继。
    en: Deduplicates duplicate or related records into one synthesized successor.
    ja: 重複/関連 record を deduplicate して一合成 successor に。
  definition:
    zh: MemoryMerge 是 MemorySynthesisOperation：消费两条以上语义重复或冲突可调和的 MemoryRecord，产生单一合并后继并保留 lineage。Mem0 POST /v1/memories/ 的 deduplicate:true 是典型映射；与 MemoryUpdate 不同，输入为多条 consumed_record_ids。
    en: MemoryMerge is a MemorySynthesisOperation consuming two or more semantically duplicate or reconcilable MemoryRecords to produce one merged successor with preserved lineage. Mem0 POST /v1/memories/ with deduplicate:true is the typical mapping; unlike MemoryUpdate, input is multiple consumed_record_ids.
    ja: MemoryMerge は二以上の重複/調和可能 MemoryRecord を consume し merged successor を生成する MemorySynthesisOperation。Mem0 deduplicate:true が典型。MemoryUpdate と異なり consumed_record_ids 複数。
  why_needed:
    zh: 向量库重复条目若只保留最新一条，无法审计被合并来源与 deduplicate 策略。
    en: Keeping only the latest duplicate in a vector store without merge audit loses merged sources and deduplicate policy trace.
    ja: 最新 duplicate のみ保持では merge 元と deduplicate policy の監査が失われる。
  includes:
    - zh: 纳入 Mem0 deduplicate、近重复向量合并与冲突解决中的 merge 策略。
      en: Includes Mem0 deduplicate, near-duplicate vector merge, and merge strategy in conflict resolution.
      ja: Mem0 deduplicate/近重复 vector merge/conflict resolution merge strategy。
  excludes:
    - zh: 排除单 record 更新、反思生成与上下文摘要压缩。
      en: Excludes single-record update, reflection generation, and context summarization compaction.
      ja: 単 record update/reflection/compaction を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: "映射 Mem0 POST /v1/memories/ 的 deduplicate:true 参数；merge_operation_id 记录 consumed_record_ids、merge_policy、produced_record_id 与 invalidated_record_ids。"
    en: "Map Mem0 POST /v1/memories/ with deduplicate:true; merge_operation_id records consumed_record_ids, merge_policy, produced_record_id, and invalidated_record_ids."
    ja: Mem0 deduplicate:true を写像。consumed/merge_policy/produced/invalidated を記録。
  typical_input:
    - description: Mem0 deduplicate merge
      format: |
        POST https://api.mem0.ai/v1/memories/
        {
          "messages": [{"role": "user", "content": "Prefers TypeScript."}],
          "user_id": "alice",
          "deduplicate": true
        }
      source_claims: [claim-merge-mem0]
  typical_output:
    - description: Merged record
      format: |
        {
          "merge_operation_id": "merge-221",
          "produced_record_id": "record-merged-221-v1",
          "invalidated_record_ids": ["record-310-v1", "record-311-v1"]
        }
      source_claims: [claim-merge-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: deduplicate:true on POST /v1/memories/.
structure:
  identity_keys: [merge_operation_id]
  fields:
    - id: merge_operation_id
      labels: {zh: 合并操作标识, en: Merge operation identifier, ja: マージ操作識別子}
      definitions:
        zh: 标识一次记忆合并活动。
        en: Identifies one memory merge activity.
        ja: 一 memory merge activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: merge-221
      allowed_values: []
      source_claims: [claim-merge-id]
    - id: deduplicate
      labels: {zh: 去重标志, en: Deduplicate flag, ja: 重複排除フラグ}
      definitions:
        zh: 对应 Mem0 deduplicate 参数，true 表示启用合并去重。
        en: Maps to Mem0 deduplicate parameter; true enables merge deduplication.
        ja: Mem0 deduplicate パラメータに対応。true で merge dedup 有効。
      datatype: boolean
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [claim-merge-mem0]
  constraints: []
  required_relations: []
examples:
  - id: MemoryMerge-example-mem0-dedup
    labels: {zh: Mem0 deduplicate 合并, en: Mem0 deduplicate merge, ja: Mem0 deduplicate マージ}
    descriptions:
      zh: merge-221 调用 POST /v1/memories/ deduplicate:true，合并 Alice 语言偏好 duplicate，产生 record-merged-221-v1。
      en: merge-221 calls POST /v1/memories/ with deduplicate:true, merging Alice language preference duplicates into record-merged-221-v1.
      ja: deduplicate:true で merge-221 が duplicate を record-merged-221-v1 に統合。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {merge_operation_id: merge-221, deduplicate: true}
    related_node_ids: [MemoryMerge, MemorySynthesisOperation]
    related_relation_ids: []
    source_claims: [claim-merge-mem0, claim-merge-design]
  - id: MemoryMerge-example-conflict
    labels: {zh: 冲突解决合并, en: Conflict resolution merge, ja: 競合解決マージ}
    descriptions:
      zh: resolve-221 strategy=merge 执行 merge-221 关闭 conflict-221。
      en: resolve-221 with strategy=merge executes merge-221 closing conflict-221.
      ja: conflict resolution merge で merge-221 が conflict-221 を close。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: resolution}
    field_values: {merge_operation_id: merge-221}
    related_node_ids: [MemoryMerge, MemoryConflictResolution]
    related_relation_ids: []
    source_claims: [claim-merge-design]
  - id: MemoryMerge-example-lineage
    labels: {zh: 合并 lineage, en: Merge lineage, ja: マージ lineage}
    descriptions:
      zh: record-merged-221-v1 的 lineage 引用 record-310-v1 与 record-311-v1 为 consumed sources。
      en: record-merged-221-v1 lineage references record-310-v1 and record-311-v1 as consumed sources.
      ja: merged record の lineage が二 consumed source を参照。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: lineage}
    field_values: {produced_record_id: record-merged-221-v1}
    related_node_ids: [MemoryMerge, MemoryRecord]
    related_relation_ids: []
    source_claims: [claim-merge-design]
  - id: MemoryMerge-example-not-update
    labels: {zh: 合并非更新, en: Merge is not update, ja: merge は update ではない}
    descriptions:
      zh: update-512 只产生一条 successor；merge-221 消费多条 record 并 invalidates 源版本。
      en: update-512 produces one successor only; merge-221 consumes multiple records and invalidates sources.
      ja: update は単 successor。merge は複数 consume と source invalidate。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemoryMerge, MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-merge-design]
parent_relation:
  id: MemoryMerge-is_a-MemorySynthesisOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆合成操作, en: is a memory synthesis operation, ja: 記憶合成操作の一種}
  definitions:
    zh: MemoryMerge —is_a→ MemorySynthesisOperation 表示多条 record deduplicate 合并为一条后继。
    en: MemoryMerge —is_a→ MemorySynthesisOperation holds because multiple records are deduplicated into one successor.
    ja: 複数 record を deduplicate して一 successor にするため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemoryMerge-is_a-MemorySynthesisOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when two or more records are merged into one successor with deduplicate or merge policy.
      explanations:
        zh: 仅当两条以上 record 经 deduplicate/merge 策略合并为一条后继时成立。
        en: Assert only when two or more records merge into one successor with deduplicate or merge policy.
        ja: 二以上 record が merge policy で一 successor に統合される時のみ。
      source_claims: [claim-merge-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-merge-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-merge
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: deduplicate:true on POST /v1/memories/.
  - id: src-merge-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Merge deduplicates multiple records into one successor.
source_claims:
  - id: claim-merge-mem0
    source: src-mem0-merge
    supports: Mem0 POST /v1/memories/ accepts deduplicate:true to merge duplicate memories.
    locator: POST /v1/memories/ deduplicate parameter
    evidence_kind: primary-api
    confidence: high
  - id: claim-merge-design
    source: src-merge-design
    supports: MemoryMerge consumes multiple records and produces one merged successor with lineage.
    locator: MemoryMerge boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-merge-id
    source: src-merge-design
    supports: merge_operation_id identifies one merge activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
