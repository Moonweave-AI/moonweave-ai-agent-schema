      kind: positive
      labels:
        zh: 是一种记忆综合操作正例
        en: "Positive case: is a memory synthesis operation"
        ja: 記憶統合操作の一種正例
      scenario_id: MemoryMerge-is_a-MemorySynthesisOperation:positive:20260716
      descriptions:
        zh: merge-701 合并同一会议的 action-items 与 decisions 两个同级片段，在输出中逐条保留各自断言和来源锚点。
        en: merge-701 combines peer action-items and decisions fragments from one meeting and maps every retained claim to its original source anchor.
        ja: merge-701 は同一 meeting の peer action-items と decisions fragment を結合し、各 retained claim を元 source anchor に対応付けます。
      field_values: {}
