schema: moonweave.ai/ontology-node/v1
id: MemoryMerge
kind: concept
status: accepted
labels:
  zh: 记忆合并
  en: Memory merge
  ja: 記憶マージ
semantics:
  short_definition:
    zh: 将两个或更多兼容的并列记忆记录联合为带输入声明和证据映射的新后继记录的综合操作。
    en: A synthesis operation that unions two or more compatible peer memory records into a new successor record with mappings for input claims and evidence.
    ja: 二つ以上の互換性のある並列記憶記録を、入力主張と証拠のマッピングを持つ新しい後継記録に結合する統合操作です。
  definition:
    zh: MemoryMerge 是已执行的 MemorySynthesisOperation。它读取至少两个并列或互补的精确 MemoryRecord 版本，记录联合基础和兼容性依据，将每条保留声明与证据锚点映射到独立新后继记录，并记录发生时间与证据摘要。它可以去重等价声明、补齐互补字段或重组同一事件的分散片段，但不应创造输入未支持的跨观察规律、以缩减表示成本为主要目标，或从结果反馈导出行动教训。存在未处理不相容声明时，应先形成或引用 MemoryConflictResolution 决定，而不能把冲突悄然覆盖到合并输出中。
    en: MemoryMerge is an executed MemorySynthesisOperation. It reads at least two peer or complementary exact MemoryRecord versions, records union basis and compatibility evidence, maps every retained claim and evidence anchor into an independently identified successor record, and records occurrence time and evidence digest. It may deduplicate equivalent claims, complete complementary fields, or reassemble fragmented material from one event, but it must not create cross-observation patterns unsupported by inputs, make representation-cost reduction its primary goal, or derive an actionable lesson from outcome feedback. When incompatible claims remain unresolved, it must first form or reference a MemoryConflictResolution decision rather than silently overwrite conflict into merge output.
    ja: MemoryMerge は実行済みの MemorySynthesisOperation です。少なくとも二つの並列または補完的な正確な MemoryRecord バージョンを読み、結合根拠と互換性証拠を記録し、保持される各主張と証拠アンカーを独立して識別された後継記録へマッピングし、発生時刻と証拠ダイジェストを記録します。等価な主張の重複除去、補完的フィールドの補充、同一イベントの分散断片の再構成はできますが、入力が支持しない観測横断パターンを作ること、表現コスト削減を主目標にすること、結果フィードバックから実行可能な教訓を導くことはできません。不整合な主張が未解決で残る場合は、競合を合併出力へ黙って上書きするのではなく、先に MemoryConflictResolution 決定を形成または参照する必要があります。
  why_needed:
    zh: 两个记录都参与输出并不意味着可以丢失其来源或覆盖矛盾；专门的合并概念保留逐项来源，同时与巩固、压缩、反思和冲突解决保持责任边界。
    en: Two records contributing to an output does not permit losing their provenance or overwriting contradiction; a dedicated merge concept retains claim-level sources while keeping responsibility boundaries from consolidation, compaction, reflection, and conflict resolution.
    ja: 二つの記録が出力に寄与するからといって、その来歴を失ったり矛盾を上書きしたりしてよいわけではありません。専用のマージ概念は主張単位の出所を保持し、巩固、圧縮、反省、競合解決との責任境界を保ちます。
  includes:
    - zh: 兼容重复记录的去重、互补字段或声明的联合、同一事件分散片段的重组，以及每项保留内容到输入证据的映射。
      en: Deduplication of compatible duplicate records, union of complementary fields or claims, reassembly of fragmented material from one event, and mapping of every retained output item to input evidence.
      ja: 互換性のある重複記録の重複除去、補完的フィールドまたは主張の結合、同一イベントの分散断片の再構成、保持される各出力項目から入力証拠へのマッピングを含みます。
  excludes:
    - zh: 跨时间规律概括、仅压缩等价内容、从失败或反馈提炼教训、单前驱更新、未经解决的冲突覆盖、临时查询视图和未执行的合并计划。
      en: Cross-time pattern generalization, compaction of equivalent content only, lesson derivation from failure or feedback, single-predecessor update, overwrite of unresolved conflict, transient query view, and an unexecuted merge plan.
      ja: 時間横断パターン一般化、等価内容だけの圧縮、失敗またはフィードバックからの教訓導出、単一前駆更新、未解決競合の上書き、一時的なクエリビュー、未実行のマージ計画を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将合并实现为声明级来源保留的多输入版本转换：选择精确并列输入，验证兼容性或引用已解决冲突决定，声明联合方式，为每项输出内容保留至少一个来源映射，并创建新后继身份。不得仅凭同一主题、同一事件、相似文本或界面展示推断记录已被合并。
    en: "Implement merge as a multi-input version transition with claim-level provenance retention: select exact peer inputs, verify compatibility or reference a resolved conflict decision, declare union method, retain at least one source mapping for every output item, and create a new successor identity. Do not infer that records were merged from shared topic, event, similar text, or a presentation view."
    ja: マージは主張レベルの来歴を保持する多入力バージョン遷移として実装します。正確な並列入力を選び、互換性を検証するか解決済み競合決定を参照し、結合方法を宣言し、各出力項目について少なくとも一つの出所マッピングを保持し、新しい後継識別子を作成します。共有話題、イベント、類似テキスト、表示ビューから記録がマージされたと推論してはいけません。
  typical_input:
    - description: Compatible peer record versions, union basis, compatibility evidence or a resolved conflict decision, actor identity, and operation start time.
      format: "{operation_id, input_record_refs, merge_basis, compatibility_state, conflict_resolution_ref?, actor_ref, started_at}"
  typical_output:
    - description: A newly identified union record with retained claim and provenance mappings, evidence digest, merge time, result, and audit reference.
      format: "{operation_id, successor_record_ref, retained_claim_mapping_digest, merge_evidence_digest, merged_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding input and output provenance mappings.
  source_claims:
    - claim-memory-merge-activity
    - claim-memory-merge-provenance
    - claim-memory-merge-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联合并的输入、兼容性、后继、来源映射、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one merge's inputs, compatibility, successor, provenance mappings, result, and audit facts.
        ja: 一つのマージの入力、互換性、後継、来歴マッピング、結果、監査事実を結ぶために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-merge-3601
      source_claims:
        - claim-memory-merge-identity
    - id: input_record_refs
      labels:
        zh: 输入记录引用
        en: input record references
        ja: 入力記録参照
      datatype: array[string]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出实际参与联合的精确并列 MemoryRecord 版本；同主题、同事件背景或相似记录但未读取的记录不是输入。
        en: Lists exact peer MemoryRecord versions actually participating in union; same-topic, same-event background, or similar records not read are not inputs.
        ja: 結合に実際に参加する正確な並列 MemoryRecord バージョンを列挙します。同話題、同一イベント背景、または読み取らなかった類似記録は入力ではありません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value:
        - record-3601-actions-v1
        - record-3601-decisions-v1
      source_claims:
        - claim-memory-merge-inputs
    - id: merge_basis
      labels:
        zh: 合并基础
        en: merge basis
        ja: マージ根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明联合的直接原因，用于区分等价去重、互补字段、同事件片段重组及无根据的概括。
        en: States the direct reason for union, distinguishing equivalent deduplication, complementary fields, same-event fragment reassembly, and unsupported generalization.
        ja: 等価重複除去、補完的フィールド、同一イベント断片再構成、根拠のない一般化を区別するため、結合の直接理由を示します。
      allowed_values:
        - deduplicate_equivalent_claims
        - combine_complementary_fields
        - reassemble_same_event_fragments
      pattern: null
      example_value: combine_complementary_fields
      source_claims:
        - claim-memory-merge-provenance
    - id: compatibility_state
      labels:
        zh: 兼容性状态
        en: compatibility state
        ja: 互換性状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录输入声明是否无冲突兼容，或是否已由可引用的冲突解决决定处理；未解决矛盾不能进入成功合并。
        en: Records whether input claims are conflict-free compatible or have been handled by a referenceable conflict-resolution decision; unresolved contradiction cannot enter successful merge.
        ja: 入力主張が競合なく互換であるか、参照可能な競合解決決定により処理済みかを記録します。未解決の矛盾は成功したマージに入れません。
      allowed_values:
        - compatible
        - resolved_by_conflict_decision
      pattern: null
      example_value: compatible
      source_claims:
        - claim-memory-merge-compatibility
    - id: conflict_resolution_ref
      labels:
        zh: 冲突解决引用
        en: conflict resolution reference
        ja: 競合解決参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当 compatibility_state 为 resolved_by_conflict_decision 时，引用先前形成并处理输入不相容性的 MemoryConflictResolution 决定。
        en: When compatibility_state is resolved_by_conflict_decision, references the prior MemoryConflictResolution decision that handled input incompatibility.
        ja: compatibility_state が resolved_by_conflict_decision のとき、入力不整合を処理した先行 MemoryConflictResolution 決定を参照します。
      allowed_values: []
      pattern: '^conflict-resolution-decision-[A-Za-z0-9._-]+$'
      example_value: conflict-resolution-decision-3601
      source_claims:
        - claim-memory-merge-compatibility
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後継記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识合并实际创建的独立新 MemoryRecord；输入记录或运行时视图都不能充当后继。
        en: Identifies the independent new MemoryRecord actually created by merge; an input record or runtime view cannot be the successor.
        ja: マージが実際に作成した独立した新しい MemoryRecord を識別します。入力記録または実行時ビューは後継になれません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3601-meeting-v1
      source_claims:
        - claim-memory-merge-successor
    - id: retained_claim_mapping_digest
      labels:
        zh: 保留声明映射摘要
        en: retained claim mapping digest
        ja: 保持主張マッピングダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定输出中每条保留声明到至少一个输入记录和来源锚点的映射摘要，避免联合后失去逐项来源。
        en: Fixes a digest mapping every retained output claim to at least one input record and source anchor, preventing item-level provenance loss after union.
        ja: 結合後に項目レベルの来歴を失わないよう、保持される各出力主張を少なくとも一つの入力記録とソースアンカーへマッピングするダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:76e0896e04f97bbf5b18fb8ad455f0b8563e10cde98ba18ecbbfb2f4bd7f2b47
      source_claims:
        - claim-memory-merge-provenance
    - id: merge_evidence_digest
      labels:
        zh: 合并证据摘要
        en: merge evidence digest
        ja: マージ証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定输入版本、合并基础、兼容性、冲突决定（如有）、输出内容和后继身份的 SHA-256 摘要。
        en: Fixes a SHA-256 digest of input versions, merge basis, compatibility, conflict decision when present, output content, and successor identity.
        ja: 入力バージョン、マージ根拠、互換性、存在する場合の競合決定、出力内容、後継識別子の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:12ce877b48eeb9368014b6ee3ff431f057489b32701ac13a4a0d10640f5dcff4
      source_claims:
        - claim-memory-merge-evidence
    - id: merged_at
      labels:
        zh: 合并发生时间
        en: merged at
        ja: マージ発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录联合后继实际形成的事件时间，而非输入创建、相似性发现、界面展示或后续检索时间。
        en: Records the event time at which the union successor actually forms, not input creation, similarity detection, presentation display, or later retrieval time.
        ja: 結合後継が実際に形成されたイベント時刻を記録します。入力作成、類似性検出、表示画面、後続検索の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T07:00:00.082Z"
      source_claims:
        - claim-memory-merge-activity
  constraints:
    - id: MemoryMerge-input-successor-and-provenance-consistency
      expression: "input_record_refs contains at least two exact peer inputs, successor_record_ref is a new identity distinct from every input, and retained_claim_mapping_digest maps each retained output claim to at least one input record and source anchor."
      explanation:
        zh: 合并必须是实际多输入联合且不丢失逐项来源；同主题、同事件或相似度不能替代精确输入和声明映射。
        en: Merge must be actual multi-input union without losing item-level provenance; shared topic, event, or similarity cannot substitute for exact inputs and claim mappings.
        ja: マージは項目レベルの来歴を失わない実際の多入力結合でなければなりません。共有話題、イベント、類似性は正確な入力と主張マッピングの代わりになりません。
      source_claims:
        - claim-memory-merge-inputs
        - claim-memory-merge-successor
        - claim-memory-merge-provenance
    - id: MemoryMerge-compatibility-and-conflict-consistency
      expression: "compatibility_state equals compatible only when input claims are non-conflicting; if it equals resolved_by_conflict_decision, conflict_resolution_ref identifies the decision that handled the incompatibility before merge output forms."
      explanation:
        zh: 合并不能静默选择冲突一方或覆盖另一方；不相容声明必须先有可审计解决决定。
        en: Merge cannot silently choose one conflicting claim or overwrite another; incompatible claims need an auditable resolution decision first.
        ja: マージは競合する一方の主張を黙って選んだり他方を上書きしたりできません。不整合な主張には先に監査可能な解決決定が必要です。
      source_claims:
        - claim-memory-merge-compatibility
    - id: MemoryMerge-boundary-from-consolidation-compaction-reflection-and-view
      expression: "A cross-observation generalization, representation-cost reduction, outcome-derived lesson, single-predecessor update, unresolved conflict, or transient view without successor identity does not satisfy MemoryMerge."
      explanation:
        zh: 合并的种差是保留输入声明的兼容联合，不能让概括、压缩、反思、更新或视图因有多个数据片段而占据该分类。
        en: Merge's differentia is compatibility-preserving union of input claims; generalization, compaction, reflection, update, or view cannot occupy this classification merely because multiple data fragments exist.
        ja: マージの種差は入力主張の互換性を保つ結合です。一般化、圧縮、反省、更新、ビューは、複数のデータ断片があるだけでこの分類を占められません。
      source_claims:
        - claim-memory-merge-boundary
  required_relation_constraints:
    - relation_id: MemoryMerge-consumes-MemoryRecord
      requirement: Every input_record_ref must be the target of a consumes relation and have retained claim or provenance mapping.
    - relation_id: MemoryMerge-produces-MemoryRecord
      requirement: A successful merge must produce successor_record_ref with complete input-claim provenance mapping.
examples:
  - id: MemoryMerge-example-positive-complementary-meeting-records

    labels:
      zh: 合并同一会议的互补记录
      en: Merges complementary records from one meeting
      ja: 一つの会議の補完的記録をマージする

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-merge-3601
      input_record_refs:
        - record-3601-actions-v1
        - record-3601-decisions-v1
      merge_basis: combine_complementary_fields
      compatibility_state: compatible
      successor_record_ref: record-3601-meeting-v1
      retained_claim_mapping_digest: sha256:76e0896e04f97bbf5b18fb8ad455f0b8563e10cde98ba18ecbbfb2f4bd7f2b47
      merged_at: "2026-07-19T07:00:00.082Z"
    related_node_ids:
      - MemoryMerge
      - MemorySynthesisOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryMerge-is_a-MemorySynthesisOperation
      - MemoryMerge-consumes-MemoryRecord
      - MemoryMerge-produces-MemoryRecord

    source_claims:
      - claim-memory-merge-inputs
      - claim-memory-merge-provenance
      - claim-memory-merge-compatibility
      - claim-memory-merge-evidence
  - id: MemoryMerge-example-counterexample-generalization

    labels:
      zh: 跨观察模式概括不是合并
      en: Cross-observation pattern generalization is not merge
      ja: 観測横断パターン一般化はマージではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-consolidate-3601
      supporting_record_count: 20
      generalized_claim: usually prefers dark theme
      applicability_scope: chat
      confidence: 0.82
      merge_basis: absent
      retained_claim_mapping_digest: absent
    related_node_ids:
      - MemoryMerge
      - MemoryConsolidation
      - MemoryRecord
    related_relation_ids:
      - MemoryMerge-is_a-MemorySynthesisOperation
      - MemoryConsolidation-is_a-MemorySynthesisOperation
      - MemoryConsolidation-produces-MemoryRecord

    source_claims:
      - claim-memory-merge-boundary
  - id: MemoryMerge-example-boundary-unresolved-conflict

    labels:
      zh: 未解决冲突不能直接合并
      en: Unresolved conflict cannot merge directly
      ja: 未解決競合は直接マージできない

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      operation_id: mem-op-merge-3602
      input_record_refs:
        - record-3602-permission-a-v1
        - record-3602-permission-b-v1
      merge_basis: combine_complementary_fields
      compatibility_state: unresolved
      conflict_resolution_ref: absent
      successor_record_ref: absent
    related_node_ids:
      - MemoryMerge
      - MemoryConflictResolution
      - MemoryConflict
    related_relation_ids:
      - MemoryMerge-is_a-MemorySynthesisOperation
      - MemoryConflictResolution-is_a-MemoryResolutionOperation
      - MemoryValidation-detects-MemoryConflict

    source_claims:
      - claim-memory-merge-compatibility
      - claim-memory-merge-boundary
  - id: MemoryMerge-example-instance-deduplicated-facts

    labels:
      zh: 保留两端来源的重复事实去重实例
      en: Duplicate-fact deduplication instance retaining both sources
      ja: 両方のソースを保持する重複事実の重複除去実例

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      operation_id: mem-op-merge-3603
      input_record_refs:
        - record-3603-profile-a-v1
        - record-3603-profile-b-v2
      merge_basis: deduplicate_equivalent_claims
