  definitions:
    zh: MemoryMerge —is_a→ MemorySynthesisOperation 表示：至少两个并列记录被联合，目标是保留各声明与证据而非形成更高层规律。
    en: MemoryMerge —is_a→ MemorySynthesisOperation holds because at least two peer records are unioned to preserve their claims and evidence rather than form a higher-level pattern
    ja: MemoryMerge —is_a→ MemorySynthesisOperation は、少なくとも二peer recordをunionしhigher-level patternでなくclaim/evidence保持を目指すため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse is a memory synthesis operation
      ja: 逆方向読取
  conditions:
    - id: MemoryMerge-is_a-MemorySynthesisOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—at least two peer records are unioned to preserve their claims and evidence rather than form a higher-level pattern—and already meets the activity definition of MemorySynthesisOperation.
      explanations:
        zh: 仅当实例满足子类种差“至少两个并列记录被联合，目标是保留各声明与证据而非形成更高层规律。”且已满足 MemorySynthesisOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—at least two peer records are unioned to preserve their claims and evidence rather than form a higher-level pattern—and already meets the activity definition of MemorySynthesisOperation.
        ja: instanceがchild differentia「少なくとも二peer recordをunionしhigher-level patternでなくclaim/evidence保持を目指すため成立します。」を満たし、かつ MemorySynthesisOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-merge-001
