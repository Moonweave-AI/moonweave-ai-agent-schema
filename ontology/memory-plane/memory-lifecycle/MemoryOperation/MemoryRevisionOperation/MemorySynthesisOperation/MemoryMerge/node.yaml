        en: "Boundary case: is a memory synthesis operation"
        ja: 記憶統合操作の一種境界例
      scenario_id: MemoryMerge-is_a-MemorySynthesisOperation:boundary:20260716
      descriptions:
        zh: consolidate-701 从二十次跨月行为中概括“用户通常选择中文”，而不是简单联合二十条原始描述。
        en: consolidate-701 generalizes that the user usually chooses Chinese from twenty observations across months instead of merely unioning their text.
        ja: consolidate-701 は数か月の二十 observation から user usually chooses Chinese を generalize し、text を単純 union しません。
      field_values: {}
      related_node_ids:
        - MemoryMerge
        - MemorySynthesisOperation
      related_relation_ids:
        - MemoryMerge-is_a-MemorySynthesisOperation
      expected_result:
        zh: 拒绝把 consolidate-701 归为 MemoryMerge；它属于 MemoryConsolidation，并应声明概括范围与反例处理。
        en: Reject MemoryMerge classification for consolidate-701; use MemoryConsolidation and state the generalization scope and counterevidence handling.
        ja: consolidate-701 の MemoryMerge 分類を拒否し、MemoryConsolidation として generalization scope と counterevidence handling を示します。
      why_valid_or_invalid:
        zh: 概括产生了输入中不存在的高层稳定命题，已超出保留原断言的联合边界。
        en: The output is a higher-level stable proposition not present verbatim in any input, exceeding the claim-preserving union boundary of merge.
        ja: output は各 input にそのまま存在しない高位 stable proposition であり、claim-preserving merge 境界を超えます。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-merge-001
