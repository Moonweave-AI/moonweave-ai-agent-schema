sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind input claims, source anchors, compatibility evidence, and output mappings.
source_claims:
  - id: claim-memory-merge-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from entities, agents, time, and provenance facts around it. Moonweave records merge as an executed operation with exact inputs, compatibility, successor, result, and audit evidence rather than a static combined display or plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a merge's inputs, compatibility, successor, mappings, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-inputs
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from nearby or merely similar entities. Moonweave records only exact peer record versions actually read for merge and does not infer inputs from shared topic, event, or presentation.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-provenance
    source: w3c-prov-o
    supports: PROV-O provides use, generation, and derivation associations for tracing generated entities to inputs and activities. Moonweave retains claim and source-anchor mappings from every merged output item to at least one peer input.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, and prov:wasDerivedFrom"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-compatibility
    source: w3c-prov-o
    supports: PROV-O distinguishes entities and activities but does not collapse incompatible assertions into one provenance fact. Moonweave records compatibility explicitly and requires a separate resolution decision before a merge can use previously conflicting inputs.
    locator: "PROV-O Activity, Entity, and provenance-association model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it. Moonweave requires an independently identified union successor record rather than treating an input or transient view as merge output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over input versions, merge basis, compatibility, conflict decision when present, output content, and successor identity to bind merge evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-merge-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, generated entities, and derivations. Moonweave keeps cross-observation generalization, representation-cost compaction, outcome reflection, single-record update, unresolved conflict, and transient views distinct from compatible claim-preserving merge.
    locator: "PROV-O sections on Activity, Entity, use, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
