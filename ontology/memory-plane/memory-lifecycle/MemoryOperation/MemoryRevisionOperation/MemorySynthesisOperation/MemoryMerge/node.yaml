schema: moonweave.ai/ontology-node/v1
id: MemoryMerge
kind: concept
status: review
labels:
  zh: 记忆合并
  en: Memory merge
  ja: 記憶マージ
semantics:
  short_definition:
    zh: 组合两个以上记录并尽量保留各自声明和证据的综合操作。
    en: A synthesis operation combining two or more records while preserving their claims and evidence as far as possible.
    ja: 二つ以上のrecordを組合せ各claim/evidenceを可能な限り保持するsynthesis operationです。
  definition:
    zh: MemoryMerge 是以至少两个并列 MemoryRecord 为输入、解决重复或结构分散并产生联合记录的 MemorySynthesisOperation；若输出主要概括跨实例稳定规律，则是 MemoryConsolidation。
    en: MemoryMerge is a MemorySynthesisOperation taking at least two peer MemoryRecords, resolving duplication or structural fragmentation, and producing a union record. If the output mainly generalizes a stable cross-instance pattern, it is MemoryConsolidation.
    ja: MemoryMerge は少なくとも二peer MemoryRecordをinputに重複/構造分散を解決してunion recordを生成する MemorySynthesisOperationです。outputが主にcross-instance stable patternを一般化するならMemoryConsolidationです。
  why_needed:
    zh: 用证据保真目标区别合并与巩固。
    en: Distinguishes merge from consolidation by its evidence-preservation objective.
    ja: evidence preservation目標でmergeとconsolidationを区別します。
  includes:
    - zh: 纳入重复记录去重合并、字段互补和同一事件片段拼接。
      en: Includes deduplicating duplicate records, complementing fields, and joining fragments of the same event.
      ja: duplicate record dedup merge・field補完・同一event fragment結合を含みます。
  excludes:
    - zh: 排除对大量观测的规律概括、纯体积压缩和反馈教训提炼。
      en: Excludes pattern generalization over many observations, pure size compaction, and feedback-based lesson derivation.
      ja: 多数observationのpattern generalization・純size compaction・feedback lesson derivationを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - merge_operation_id
  fields:
    - id: merge_operation_id
      labels:
        zh: 合并操作标识
        en: merge operation ID
        ja: merge operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次记录联合活动。
        en: Identifies one record-union activity.
        ja: 一record union activityを識別します。
      allowed_values: []
      pattern: null
      example_value: merge-701
      source_claims:
        - claim-memory-merge-002
    - id: input_record_ids
      labels:
        zh: 输入记录标识
        en: input record IDs
        ja: input record IDs
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出至少两个并列输入记录。
        en: Lists at least two peer input records.
        ja: 少なくとも二peer input recordを列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - record-a
        - record-b
      source_claims:
        - claim-memory-merge-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemoryMerge-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 记忆合并正例
      en: "Positive case: Memory merge"
      ja: 記憶マージ正例
    scenario_id: null
    descriptions:
      zh: memory-op-merge-001 消费同一会议的 actions-7 与 decisions-7，生成 meeting-complete-7，并逐条保留两个输入的声明和来源锚点。
      en: memory-op-merge-001 consumes actions-7 and decisions-7 from the same meeting, produces meeting-complete-7, and preserves every claim and provenance anchor from both inputs.
      ja: memory-op-merge-001 は同一会議の actions-7 と decisions-7 を消費し meeting-complete-7 を生成して、両入力の全主張と出典アンカーを保持します。
    field_values:
      merge_operation_id: memory-op-merge-001
      input_record_ids:
        - actions-7
        - decisions-7
      operation_id: memory-op-merge-001
      reason: duplicate records share compatible provenance and content
      synthesis_operation_id: memory-op-merge-001
      synthesis_goal: provenance-preserving-union
      revision_operation_id: memory-op-merge-001
      predecessor_record_ids:
        - actions-7
        - decisions-7
      started_at: 2026-07-16T13:13:00Z
    related_node_ids:
      - MemoryMerge
      - MemorySynthesisOperation
    related_relation_ids:
      - MemoryMerge-is_a-MemorySynthesisOperation
    expected_result:
      zh: 把 merge-701 认定为 MemoryMerge，登记两条输入与联合输出，并验证输出没有引入跨会议的概括性断言。
      en: Treat merge-701 as MemoryMerge, record both inputs and the union output, and verify that the output introduces no cross-meeting generalization.
      ja: merge-701 を MemoryMerge と認定し、両 input と union output を記録して cross-meeting generalization が追加されないことを検証します。
    why_valid_or_invalid:
      zh: 至少两个同级记录被保真联合为一个新记录，内容作用是去重和结构拼合而非从重复观测提炼稳定规律。
      en: At least two peer records are combined into a fidelity-preserving new record; the operation removes duplication and fragmentation instead of deriving a stable pattern.
      ja: 二つ以上の peer record を fidelity-preserving な新 record に統合し、stable pattern 導出ではなく duplication と fragmentation を解消しています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-merge-001
  - id: MemoryMerge-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 同一会议记录合并实例
      en: Same-meeting record-merge instance
      ja: 同一会議記録の結合インスタンス
    scenario_id: MemoryMerge:instance:memory-op-merge-001
    descriptions:
      zh: memory-op-merge-001 消费同一会议的 actions-7 与 decisions-7，生成 meeting-complete-7，并逐条保留两个输入的声明和来源锚点。
      en: memory-op-merge-001 consumes actions-7 and decisions-7 from the same meeting, produces meeting-complete-7, and preserves every claim and provenance anchor from both inputs.
      ja: memory-op-merge-001 は同一会議の actions-7 と decisions-7 を消費し meeting-complete-7 を生成して、両入力の全主張と出典アンカーを保持します。
    field_values:
      merge_operation_id: memory-op-merge-001
      input_record_ids:
        - actions-7
        - decisions-7
      operation_id: memory-op-merge-001
      reason: duplicate records share compatible provenance and content
    related_node_ids:
      - MemoryMerge
      - MemorySynthesisOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryMerge-is_a-MemorySynthesisOperation
      - MemoryMerge-consumes-MemoryRecord
      - MemoryMerge-produces-MemoryRecord
    expected_result:
      zh: 返回两个同级输入和一个联合输出；输出中的每条事实均可映射回至少一个输入记录。
      en: Return two peer inputs and one union output, with every output fact mapped back to at least one input record.
      ja: 二つの同格入力と一つの結合出力を返し、各出力事実を少なくとも一入力へ写像できます。
    why_valid_or_invalid:
      zh: 操作联合互补记录而不推导跨实例规律，也不以减小体积为首要目标，因此是 Merge。
      en: The operation unions complementary records without deriving a cross-instance pattern or primarily reducing size, so it is Merge.
      ja: 補完記録を結合するが横断規則を導かず縮小を主目的としないため Merge です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-memory-merge-001
  - id: MemoryMerge-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 记忆合并边界例
      en: "Boundary case: Memory merge"
      ja: 記憶マージ境界例
    scenario_id: MemoryMerge:boundary:20260716
    descriptions:
      zh: consolidate-702 汇总二十次跨会话主题选择，生成“用户通常偏好深色主题”、置信度 0.82 与适用范围 chat，但不保留逐项联合内容。
      en: consolidate-702 summarizes twenty cross-session theme choices into usually-prefers-dark, confidence 0.82, and chat scope rather than preserving a claim-by-claim union.
      ja: consolidate-702 は二十の cross-session theme choice から usually-prefers-dark・confidence 0.82・chat scope を生成し claim-by-claim union は保持しません。
    field_values: {}
    related_node_ids:
      - MemoryMerge
    related_relation_ids: []
    expected_result:
      zh: 不要把 consolidate-702 计作 MemoryMerge；应将其放入 MemoryConsolidation，并把二十条记录登记为支持证据。
      en: Keep consolidate-702 out of MemoryMerge; place it under MemoryConsolidation and register the twenty records as supporting evidence.
      ja: consolidate-702 を MemoryMerge から除外し MemoryConsolidation に置いて二十 record を supporting evidence として記録します。
    why_valid_or_invalid:
      zh: 输出把多个实例抽象成带置信度的跨时模式，而不是保留全部同级断言的联合记录，因此不满足合并的保真边界。
      en: The output abstracts instances into a confidence-qualified cross-time pattern rather than retaining all peer assertions in a union record, so it falls outside merge semantics.
      ja: output は全 peer assertion の union record ではなく confidence 付き cross-time pattern へ抽象するため merge semantics の外側です。
    synthetic: false
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-merge-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MemoryReflection
    shared_parent_concept_id: MemorySynthesisOperation
    differentia:
      zh: 正向身份比较：父节点 MemorySynthesisOperation：MemoryMerge（semantic kind=activity，骨架 MemoryMerge-is_a-MemorySynthesisOperation）；MemoryReflection（semantic kind=activity，骨架 MemoryReflection-is_a-MemorySynthesisOperation）。双端条件：MemoryMerge 条件：“组合两个以上记录并尽量保留各自声明和证据的综合操作”；MemoryReflection 条件：“基于可观察结果与反馈形成可复用经验或行动教训的综合操作”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MemorySynthesisOperation: MemoryMerge (semantic kind=activity, backbone MemoryMerge-is_a-MemorySynthesisOperation); MemoryReflection (semantic kind=activity, backbone MemoryReflection-is_a-MemorySynthesisOperation). Endpoint conditions: MemoryMerge condition: “A synthesis operation combining two or more records while preserving their claims and evidence as far as possible”; MemoryReflection condition: “A synthesis operation deriving a reusable lesson or procedure from observable outcomes and feedback”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MemorySynthesisOperation：MemoryMerge（semantic kind=activity、バックボーン MemoryMerge-is_a-MemorySynthesisOperation）；MemoryReflection（semantic kind=activity、バックボーン MemoryReflection-is_a-MemorySynthesisOperation）。両端条件：MemoryMerge の条件：「二つ以上のrecordを組合せ各claim/evidenceを可能な限り保持するsynthesis operationです」；MemoryReflection の条件：「観測可能outcomeとfeedbackから再利用lesson/procedureを導くsynthesis operationです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-memory-merge-004
