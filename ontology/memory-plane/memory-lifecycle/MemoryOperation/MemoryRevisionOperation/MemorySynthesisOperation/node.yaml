schema: moonweave.ai/ontology-node/v1
id: MemorySynthesisOperation
kind: concept
labels:
  zh: 记忆合成操作
  en: Memory synthesis operation
  ja: 記憶合成操作
semantics:
  short_definition:
    zh: 消费多条记录并产生合成后继的修订活动。
    en: Revision activity consuming multiple records to produce a synthesized successor.
    ja: 複数 record を consume し合成 successor を生成する revision activity。
  definition:
    zh: MemorySynthesisOperation 是 MemoryRevisionOperation：消费两条以上 MemoryRecord 或观察流，产生 MemoryMerge、MemoryConsolidation、MemoryCompaction 或 MemoryReflection 等合成结果。Mem0 deduplicate:true 映射 MemoryMerge；Generative Agents reflection 映射 MemoryReflection；Claude auto-compact 映射 MemoryCompaction。
    en: MemorySynthesisOperation is a MemoryRevisionOperation consuming two or more MemoryRecords or observation streams to produce outcomes such as MemoryMerge, MemoryConsolidation, MemoryCompaction, or MemoryReflection. Mem0 deduplicate:true maps to MemoryMerge; Generative Agents reflection maps to MemoryReflection; Claude auto-compact maps to MemoryCompaction.
    ja: MemorySynthesisOperation は二以上 MemoryRecord/observation stream を consume し MemoryMerge/Consolidation/Compaction/Reflection を生成。Mem0 deduplicate→MemoryMerge。Generative Agents reflection→MemoryReflection。Claude auto-compact→MemoryCompaction。
  why_needed:
    zh: 多源合成与单 record 更新语义不同，必须单独建模 consumed_record_ids 集合与合成策略。
    en: Multi-source synthesis differs from single-record update and requires modeling consumed_record_ids sets and synthesis strategy separately.
    ja: 多源 synthesis と単 record update は別 semantic。consumed_record_ids 集合と strategy の建模が必要。
  includes:
    - zh: 纳入 MemoryMerge、MemoryConsolidation、MemoryCompaction、MemoryReflection。
      en: Includes MemoryMerge, MemoryConsolidation, MemoryCompaction, and MemoryReflection.
      ja: MemoryMerge/Consolidation/Compaction/Reflection。
  excludes:
    - zh: 排除单 record MemoryUpdate、初始写入与删除。
      en: Excludes single-record MemoryUpdate, initial write, and delete.
      ja: 単 record MemoryUpdate/initial write/delete を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: synthesis_operation_id 绑定 consumed_record_ids[]、synthesis_kind 与 produced_record_id；Mem0 POST deduplicate:true、Generative Agents reflection prompt 与 Claude context summarization 分别映射子类。
    en: synthesis_operation_id binds consumed_record_ids[], synthesis_kind, and produced_record_id; Mem0 POST deduplicate:true, Generative Agents reflection prompt, and Claude context summarization map to subtypes respectively.
    ja: consumed_record_ids[]/synthesis_kind/produced_record_id を bind。各 backend を subtype へ写像。
  typical_input:
    - description: Multi-record synthesis input
      format: |
        {"synthesis_operation_id": "merge-221", "consumed_record_ids": ["record-310-v1", "record-311-v1"]}
      source_claims: [claim-synthesis-design]
  typical_output:
    - description: Synthesized successor
      format: |
        {"produced_record_id": "record-merged-221-v1", "synthesis_kind": "MemoryMerge"}
      source_claims: [claim-synthesis-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: deduplicate:true on POST /v1/memories/.
    - name: Generative Agents
      url: https://arxiv.org/abs/2304.03442
      description: Reflection synthesis from memory stream.
    - name: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code
      description: Auto-compact context summarization.
structure:
  identity_keys: [synthesis_operation_id]
  fields:
    - id: synthesis_operation_id
      labels: {zh: 合成操作标识, en: Synthesis operation identifier, ja: 合成操作識別子}
      definitions:
        zh: 标识一次多 record 合成活动。
        en: Identifies one multi-record synthesis activity.
        ja: 一 multi-record synthesis activity を識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: merge-221
      allowed_values: []
      source_claims: [claim-synthesis-id]
    - id: synthesis_kind
      labels: {zh: 合成种类, en: Synthesis kind, ja: 合成種別}
      definitions:
        zh: MemoryMerge、MemoryConsolidation、MemoryCompaction 或 MemoryReflection。
        en: MemoryMerge, MemoryConsolidation, MemoryCompaction, or MemoryReflection.
        ja: MemoryMerge/Consolidation/Compaction/Reflection。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: MemoryMerge
      allowed_values: []
      source_claims: [claim-synthesis-kind]
  constraints: []
  required_relations: []
examples:
  - id: MemorySynthesisOperation-example-merge
    labels: {zh: Mem0 去重合并, en: Mem0 dedup merge, ja: Mem0 dedup merge}
    descriptions:
      zh: merge-221 synthesis_kind=MemoryMerge，Mem0 deduplicate:true 合并 record-310 与 record-311。
      en: merge-221 with synthesis_kind=MemoryMerge merges record-310 and record-311 via Mem0 deduplicate:true.
      ja: deduplicate:true で merge-221 が二 record を統合。
    example_source: {product: Mem0, url: https://docs.mem0.ai, version: deduplicate:true}
    field_values: {synthesis_operation_id: merge-221, synthesis_kind: MemoryMerge}
    related_node_ids: [MemorySynthesisOperation, MemoryMerge]
    related_relation_ids: []
    source_claims: [claim-synthesis-mem0, claim-synthesis-design]
  - id: MemorySynthesisOperation-example-reflection
    labels: {zh: Generative Agents 反思, en: Generative Agents reflection, ja: Generative Agents reflection}
    descriptions:
      zh: reflect-600 synthesis_kind=MemoryReflection，从 observation 流生成高层反思 record。
      en: reflect-600 with synthesis_kind=MemoryReflection generates high-level reflection record from observation stream.
      ja: observation stream から reflect-600 が reflection record 生成。
    example_source: {product: Generative Agents, url: https://arxiv.org/abs/2304.03442, version: reflection}
    field_values: {synthesis_operation_id: reflect-600, synthesis_kind: MemoryReflection}
    related_node_ids: [MemorySynthesisOperation, MemoryReflection]
    related_relation_ids: []
    source_claims: [claim-synthesis-ga, claim-synthesis-design]
  - id: MemorySynthesisOperation-example-compact
    labels: {zh: Claude 上下文压缩, en: Claude context compact, ja: Claude context compact}
    descriptions:
      zh: compact-700 synthesis_kind=MemoryCompaction，Claude auto-compact 摘要长对话上下文。
      en: compact-700 with synthesis_kind=MemoryCompaction summarizes long conversation context via Claude auto-compact.
      ja: Claude auto-compact で compact-700 が長 context を要約。
    example_source: {product: Claude Code, url: https://docs.anthropic.com/en/docs/claude-code, version: auto-compact}
    field_values: {synthesis_operation_id: compact-700, synthesis_kind: MemoryCompaction}
    related_node_ids: [MemorySynthesisOperation, MemoryCompaction]
    related_relation_ids: []
    source_claims: [claim-synthesis-claude, claim-synthesis-design]
  - id: MemorySynthesisOperation-example-not-update
    labels: {zh: 合成非单条更新, en: Synthesis is not single update, ja: 合成は単条 update ではない}
    descriptions:
      zh: update-512 只消费一条 predecessor；synthesis 必须消费两条以上 record 或观察。
      en: update-512 consumes only one predecessor; synthesis must consume two or more records or observations.
      ja: update は predecessor 一版のみ。synthesis は二以上必要。
    example_source: {product: Moonweave, url: https://moonweave.ai/ontology/agent-system/2.0.0/, version: boundary}
    field_values: {}
    related_node_ids: [MemorySynthesisOperation, MemoryUpdate]
    related_relation_ids: []
    source_claims: [claim-synthesis-design]
parent_relation:
  id: MemorySynthesisOperation-is_a-MemoryRevisionOperation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels: {zh: 是一种记忆修订操作, en: is a memory revision operation, ja: 記憶改訂操作の一種}
  definitions:
    zh: MemorySynthesisOperation —is_a→ MemoryRevisionOperation 表示消费多条 record 并产生合成后继。
    en: MemorySynthesisOperation —is_a→ MemoryRevisionOperation holds because multiple records are consumed to produce a synthesized successor.
    ja: 複数 record consume と合成 successor 生成のため成立。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定。
  inverse_reading: {predicate: part_of, labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}}
  conditions:
    - id: MemorySynthesisOperation-is_a-MemoryRevisionOperation-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when two or more records or observations are consumed for synthesis.
      explanations:
        zh: 仅当消费两条以上 record 或观察进行合成时成立。
        en: Assert only when two or more records or observations are consumed for synthesis.
        ja: 二以上 record/observation consume 時のみ。
      source_claims: [claim-synthesis-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-synthesis-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mem0-synthesis
    title: Mem0 Platform Documentation
    publisher: Mem0
    url: https://docs.mem0.ai
    source_type: official-doc
    relevance: deduplicate:true merge synthesis.
  - id: src-ga-synthesis
    title: Generative Agents
    publisher: arXiv
    url: https://arxiv.org/abs/2304.03442
    source_type: arXiv
    relevance: Reflection synthesis from memory stream.
  - id: src-claude-synthesis
    title: Claude Code Documentation
    publisher: Anthropic
    url: https://docs.anthropic.com/en/docs/claude-code
    source_type: official-doc
    relevance: Auto-compact context summarization.
  - id: src-synthesis-design
    title: Moonweave memory-lifecycle module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Synthesis consumes multiple sources.
source_claims:
  - id: claim-synthesis-mem0
    source: src-mem0-synthesis
    supports: Mem0 deduplicate:true merges duplicate memories on add.
    locator: POST /v1/memories/ deduplicate
    evidence_kind: primary-api
    confidence: high
  - id: claim-synthesis-ga
    source: src-ga-synthesis
    supports: Generative Agents generates reflection insights from accumulated observations.
    locator: Section 3.1 reflection
    evidence_kind: academic
    confidence: high
  - id: claim-synthesis-claude
    source: src-claude-synthesis
    supports: Claude auto-compact summarizes prior conversation context.
    locator: auto-compact
    evidence_kind: primary-doc
    confidence: high
  - id: claim-synthesis-design
    source: src-synthesis-design
    supports: MemorySynthesisOperation consumes multiple records for synthesized output.
    locator: MemorySynthesisOperation
    evidence_kind: design-inference
    confidence: high
  - id: claim-synthesis-id
    source: src-synthesis-design
    supports: synthesis_operation_id identifies one synthesis activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-synthesis-kind
    source: src-synthesis-design
    supports: synthesis_kind names the synthesis subtype executed.
    locator: structure
    evidence_kind: design-inference
    confidence: high
