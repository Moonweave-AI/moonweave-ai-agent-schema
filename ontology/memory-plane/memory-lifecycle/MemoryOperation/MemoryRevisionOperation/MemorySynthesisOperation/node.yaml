sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines activities, entities, use, generation, derivation, time, and provenance associations as distinct facts.
  - id: nist-fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    source_type: standard
    url: https://csrc.nist.gov/pubs/fips/180/4/final
    relevance: Specifies SHA-256 message digests that can bind auditable multi-input synthesis evidence.
source_claims:
  - id: claim-memory-synthesis-operation-activity
    source: w3c-prov-o
    supports: PROV-O distinguishes an executed Activity from the entities and provenance facts around it. Moonweave records synthesis as an executed operation with inputs, goal, successor, time, result, and audit evidence rather than a static summary label or plan.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and provenance properties"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-synthesis-operation-identity
    source: w3c-prov-o
    supports: PROV-O permits activities and related provenance facts to have stable independent identities. Moonweave uses one operation ID to join a synthesis's input evidence, goal, successor, evidence digest, result, and audit facts.
    locator: "PROV-O Activity and Entity identifier model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-synthesis-operation-inputs
    source: w3c-prov-o
    supports: PROV-O distinguishes concrete entities used by an activity from nearby or merely similar entities. Moonweave records each exact record version or independent feedback item actually used for synthesis and requires multiple inputs.
    locator: "PROV-O sections on prov:used and entity identity"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-synthesis-operation-successor
    source: w3c-prov-o
    supports: PROV-O distinguishes entities used by an activity from distinct entities generated by it. Moonweave requires a separately identified successor record rather than treating an input record or index artifact as synthesis output.
    locator: "PROV-O sections on prov:used and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-synthesis-operation-goal
    source: w3c-prov-o
    supports: PROV-O separates activities, entities, derivations, and their attributed provenance. Moonweave records explicit synthesis goal and abstraction method to distinguish constituent-preserving union, evidence generalization, loss-bounded re-expression, and feedback reflection over the same provenance vocabulary.
    locator: "PROV-O Activity, Entity, and derivation model"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-synthesis-operation-evidence
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave stores a SHA-256 digest over input evidence versions, synthesis goal, abstraction method, policy context, transformation output, and successor identity to bind synthesis evidence.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-synthesis-operation-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, and generated entities. Moonweave keeps targeted single-predecessor update, read-only assessment, index-only maintenance, ranking-only change, deletion, eviction, and unexecuted recommendations distinct from multi-input synthesis with new generated successor.
    locator: "PROV-O sections on Activity, Entity, use, and generation"
    evidence_kind: ontology-design-inference
    confidence: high
