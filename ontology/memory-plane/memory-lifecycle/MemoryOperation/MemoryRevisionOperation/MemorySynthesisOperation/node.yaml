    en: This backbone relation only expresses that an activity with multi-evidence synthesis responsibility belongs to MemoryRevisionOperation; inputs, successor, goal, abstraction method, evidence, result, and audit use fields or separate relations.
    ja: この主幹関係は、多証拠統合の責任を持つ活動が MemoryRevisionOperation に属することだけを表します。入力、後継、目標、抽象方法、証拠、結果、監査はフィールドまたは独立関係で表します。
