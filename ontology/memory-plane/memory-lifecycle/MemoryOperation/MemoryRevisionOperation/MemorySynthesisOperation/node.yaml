schema: moonweave.ai/ontology-node/v1
id: MemorySynthesisOperation
kind: concept
status: accepted
labels:
  zh: 记忆综合操作
  en: Memory synthesis operation
  ja: 記憶統合操作
semantics:
  short_definition:
    zh: 从多个明确输入证据或反馈形成新后继记忆记录，并记录综合目标、抽象方式和谱系的修订操作。
    en: A revision operation that forms a new successor memory record from multiple explicit input evidence or feedback and records synthesis goal, abstraction method, and lineage.
    ja: 複数の明示的な入力証拠またはフィードバックから新しい後継記憶記録を形成し、統合目標、抽象方法、来歴を記録する改訂操作です。
  definition:
    zh: MemorySynthesisOperation 是已执行的多证据或反馈驱动的 MemoryRevisionOperation。它读取至少两个精确输入证据，或一个记录与独立反馈证据，确定其综合目标和抽象方式，形成具有新身份的后继 MemoryRecord，并固定输入、目标、转换输出和谱系证据。保留组成内容的联合可归入 MemoryMerge；跨实例稳定概括可归入 MemoryConsolidation；为降低表示成本的受控重表达可归入 MemoryCompaction；从结果或反馈导出可执行教训可归入 MemoryReflection。单一主要前驱的定向修改、只读评估、仅索引压缩、仅改变排序、删除或未执行计划不是综合。
    en: MemorySynthesisOperation is an executed multi-evidence or feedback-driven MemoryRevisionOperation. It reads at least two exact input evidence items, or one record with independent feedback evidence, determines its synthesis goal and abstraction method, forms a newly identified successor MemoryRecord, and fixes inputs, goal, transformation output, and lineage evidence. A union retaining constituent content may be MemoryMerge; a stable cross-instance generalization may be MemoryConsolidation; controlled re-expression to reduce representation cost may be MemoryCompaction; and an actionable lesson derived from outcome or feedback may be MemoryReflection. A targeted change to one principal predecessor, read-only assessment, index-only compaction, ranking-only change, deletion, or unexecuted plan is not synthesis.
    ja: MemorySynthesisOperation は、実行済みの多証拠またはフィードバック駆動の MemoryRevisionOperation です。少なくとも二つの正確な入力証拠、または一つの記録と独立したフィードバック証拠を読み、統合目標と抽象方法を決め、新しく識別された後継 MemoryRecord を形成し、入力、目標、変換出力、来歴証拠を固定します。構成内容を保持する結合は MemoryMerge、複数事例にまたがる安定した一般化は MemoryConsolidation、表現コストを下げる制御された再表現は MemoryCompaction、結果またはフィードバックから導く実行可能な教訓は MemoryReflection になり得ます。一つの主要前駆への対象変更、読み取り専用評価、インデックスのみの圧縮、順位のみの変更、削除、未実行計画は統合ではありません。
  why_needed:
    zh: 合并、概括、压缩和反思都会生成新记录却具有不同保真目标；共同层与明确目标让系统既能共享谱系规则，又能避免将它们或单点更新混为一谈。
    en: Merge, generalization, compaction, and reflection all generate new records but have different fidelity goals; a shared layer with explicit goal lets systems share lineage rules without conflating them or a single-point update.
    ja: マージ、一般化、圧縮、反省はいずれも新しい記録を生成しますが、保真目標は異なります。明示的目標を持つ共通層により、システムは来歴規則を共有しつつ、それらや単一点更新を混同せずに済みます。
  includes:
    - zh: 有多个明确输入、独立后继身份、综合目标和证据谱系的记录联合、跨实例概括、受控压缩以及基于反馈的教训提炼。
      en: Record union, cross-instance generalization, controlled compaction, and feedback-grounded lesson derivation with multiple explicit inputs, independent successor identity, synthesis goal, and evidence lineage.
      ja: 複数の明示的入力、独立した後継識別子、統合目標、証拠来歴を持つ記録結合、複数事例一般化、制御された圧縮、フィードバックに基づく教訓導出を含みます。
  excludes:
    - zh: 单一主要前驱的字段更正、首写、只读验证、没有新记录的索引或缓存压缩、仅调整排序、删除、驱逐及未执行的综合建议。
      en: Field correction of one principal predecessor, initial write, read-only validation, index or cache compaction with no new record, ranking adjustment only, deletion, eviction, and an unexecuted synthesis recommendation.
      ja: 一つの主要前駆のフィールド訂正、初回書込み、読み取り専用検証、新記録を持たないインデックスまたはキャッシュ圧縮、順位調整のみ、削除、追い出し、未実行の統合提案を除外します。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 将综合实现为可复核的多输入版本转换：收集精确的来源记录或独立反馈，声明要保留、概括、压缩或提炼的目标，固定转换证据，创建新的后继身份，并保留输入到输出的谱系。不能依据相似文本、相同主体、同批次日志或“摘要”标签推断综合已发生。
    en: "Implement synthesis as a reviewable multi-input version transition: collect exact source records or independent feedback, declare whether the goal is preservation, generalization, compaction, or lesson derivation, fix transformation evidence, create a new successor identity, and retain input-to-output lineage. Do not infer synthesis merely from similar text, shared subject, a shared log batch, or a summary label."
    ja: 統合は検証可能な多入力バージョン遷移として実装します。正確なソース記録または独立したフィードバックを集め、保持、一般化、圧縮、教訓導出のどれを目標とするかを宣言し、変換証拠を固定し、新しい後継識別子を作成し、入力から出力への来歴を保持します。類似テキスト、共有主体、共有ログバッチ、要約ラベルだけから統合が起きたと推論してはいけません。
  typical_input:
    - description: Multiple exact record or feedback evidence references, synthesis goal and abstraction method, applicable policy context, actor identity, and operation start time.
      format: "{operation_id, input_evidence_refs, synthesis_goal, abstraction_method, policy_ref?, actor_ref, started_at}"
  typical_output:
    - description: A newly identified successor record with fixed lineage evidence, synthesis time, result, and audit reference.
      format: "{operation_id, successor_record_ref, synthesis_goal, synthesis_evidence_digest, synthesized_at, result_ref?, audit_event_ref?}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, and time in provenance records.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding multi-input synthesis evidence.
  source_claims:
    - claim-memory-synthesis-operation-activity
    - claim-memory-synthesis-operation-goal
    - claim-memory-synthesis-operation-boundary
structure:
  identity_keys:
    - operation_id
  fields:
    - id: operation_id
      labels:
        zh: 操作标识
        en: operation ID
        ja: 操作 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 复用父类 MemoryOperation 的稳定标识，以关联一次综合的输入、目标、后继、证据、结果和审计事实。
        en: Reuses the stable MemoryOperation identifier to join one synthesis's inputs, goal, successor, evidence, result, and audit facts.
        ja: 一つの統合の入力、目標、後継、証拠、結果、監査事実を結ぶために、親 MemoryOperation の安定識別子を再利用します。
      allowed_values: []
      pattern: '^mem-op-[a-z0-9][a-z0-9-]*$'
      example_value: mem-op-synthesize-3301
      source_claims:
        - claim-memory-synthesis-operation-identity
    - id: input_evidence_refs
      labels:
        zh: 输入证据引用
        en: input evidence references
        ja: 入力証拠参照
      datatype: array[string]
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 列出实际用于综合的精确 MemoryRecord 版本或独立反馈证据，至少两个输入证明该活动不是单前驱定向更新。
        en: Lists exact MemoryRecord versions or independent feedback evidence actually used for synthesis; at least two inputs show that the activity is not a targeted single-predecessor update.
        ja: 統合に実際に使用した正確な MemoryRecord バージョンまたは独立したフィードバック証拠を列挙します。少なくとも二つの入力により、この活動が対象の単一前駆更新ではないことを示します。
      allowed_values: []
      pattern: '^[a-z][a-z0-9-]*-[A-Za-z0-9._-]+$'
      example_value:
        - record-3301-a-v1
        - record-3301-b-v2
      source_claims:
        - claim-memory-synthesis-operation-inputs
    - id: successor_record_ref
      labels:
        zh: 后继记录引用
        en: successor record reference
        ja: 後継記録参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识综合实际产生的独立新 MemoryRecord 身份；任何输入记录都不能同时作为该后继。
        en: Identifies the independent new MemoryRecord identity actually produced by synthesis; no input record can also be that successor.
        ja: 統合が実際に生成した独立した新しい MemoryRecord 識別子を識別します。入力記録はその後継を兼ねることはできません。
      allowed_values: []
      pattern: '^record-[A-Za-z0-9._-]+$'
      example_value: record-3301-summary-v1
      source_claims:
        - claim-memory-synthesis-operation-successor
    - id: synthesis_goal
      labels:
        zh: 综合目标
        en: synthesis goal
        ja: 統合目標
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明后继为何形成，用于区分内容联合、稳定概括、表示压缩和从反馈中提炼行动教训。
        en: States why the successor forms, distinguishing content union, stable generalization, representation compaction, and actionable lesson derivation from feedback.
        ja: 後継がなぜ形成されるかを示し、内容結合、安定した一般化、表現圧縮、フィードバックからの実行可能な教訓導出を区別します。
      allowed_values:
        - preserve_constituents
        - generalize_across_instances
        - reduce_representation_cost
        - derive_actionable_lesson
      pattern: null
      example_value: generalize_across_instances
      source_claims:
        - claim-memory-synthesis-operation-goal
    - id: abstraction_method
      labels:
        zh: 抽象方式
        en: abstraction method
        ja: 抽象方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录综合所采取的保真方式，使目标相似的操作仍可根据保留构成、跨例概括、受控压缩或反馈归因区分。
        en: Records the fidelity method used by synthesis so operations with similar goals remain distinguishable by constituent retention, cross-instance generalization, controlled compaction, or feedback attribution.
        ja: 目標が似る操作でも、構成要素保持、複数事例一般化、制御された圧縮、フィードバック帰属により区別できるよう、統合で用いた保真方法を記録します。
      allowed_values:
        - constituent_union
        - evidence_generalization
        - loss_bounded_reexpression
        - outcome_feedback_reflection
      pattern: null
      example_value: evidence_generalization
      source_claims:
        - claim-memory-synthesis-operation-goal
    - id: synthesis_evidence_digest
      labels:
        zh: 综合证据摘要
        en: synthesis evidence digest
        ja: 統合証拠ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定输入证据版本、综合目标、抽象方式、适用策略、转换输出和后继身份的 SHA-256 摘要，用于审计真实多输入转换。
        en: Fixes a SHA-256 digest of input evidence versions, synthesis goal, abstraction method, applicable policy, transformation output, and successor identity to audit a real multi-input transition.
        ja: 実際の多入力遷移を監査するため、入力証拠バージョン、統合目標、抽象方法、適用方針、変換出力、後継識別子の SHA-256 ダイジェストを固定します。
      allowed_values: []
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:5ae43a0d2e34c09e81c406b13e7e9229c8b70c3cb23b8f10b9e5d7a28328fb05
      source_claims:
        - claim-memory-synthesis-operation-evidence
    - id: synthesized_at
      labels:
        zh: 综合发生时间
        en: synthesized at
        ja: 統合発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录后继综合记录实际形成的事件时间，而非输入采集、计划创建、摘要请求或后来检索的时间。
        en: Records the event time at which the synthesized successor actually forms, not input collection, plan creation, summary request, or later retrieval time.
        ja: 統合された後継が実際に形成されたイベント時刻を記録します。入力収集、計画作成、要約要求、後続検索の時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-19T04:00:00.076Z"
      source_claims:
        - claim-memory-synthesis-operation-activity
  constraints:
    - id: MemorySynthesisOperation-input-successor-consistency
      expression: "input_evidence_refs contains at least two exact evidence inputs, successor_record_ref is a new identity distinct from all inputs, and synthesis_evidence_digest covers inputs and successor."
      explanation:
        zh: 综合必须可以证明多来源输入和新后继；相似性、同主体或同批次日志不能替代实际使用的输入证据。
        en: Synthesis must prove multiple source inputs and a new successor; similarity, shared subject, or same-batch logs cannot substitute for actually used evidence inputs.
        ja: 統合は複数のソース入力と新しい後継を証明する必要があります。類似性、共有主体、同一バッチログは実際に使用した証拠入力の代わりになりません。
      source_claims:
        - claim-memory-synthesis-operation-inputs
        - claim-memory-synthesis-operation-successor
        - claim-memory-synthesis-operation-evidence
    - id: MemorySynthesisOperation-goal-method-consistency
      expression: "synthesis_goal and abstraction_method are explicit and compatible: preserve_constituents uses constituent_union, generalize_across_instances uses evidence_generalization, reduce_representation_cost uses loss_bounded_reexpression, and derive_actionable_lesson uses outcome_feedback_reflection."
      explanation:
        zh: 明确目标和方式使合并、巩固、压缩与反思可区分，避免用“摘要”或“综合”标签掩盖不同保真承诺。
        en: Explicit goal and method distinguish merge, consolidation, compaction, and reflection, preventing a summary or synthesis label from hiding different fidelity commitments.
        ja: 明示的な目標と方法により、マージ、統合、圧縮、反省を区別し、要約または統合ラベルが異なる保真性の約束を隠すことを防ぎます。
      source_claims:
        - claim-memory-synthesis-operation-goal
    - id: MemorySynthesisOperation-not-update-or-index-maintenance
      expression: "A single-principal-predecessor targeted correction, read-only evaluation, index-only or cache-only compaction with no successor_record_ref, ranking-only change, deletion, eviction, and an unexecuted recommendation do not satisfy this operation."
      explanation:
        zh: 只有真正形成新综合记录的多输入转换才属于本概念，避免将更新、维护或处置活动误标为综合。
        en: Only a multi-input transition that actually forms a new synthesized record belongs to this concept, preventing update, maintenance, or disposition activities from being mislabeled as synthesis.
        ja: 実際に新しい統合記録を形成する多入力遷移だけがこの概念に属し、更新、保守、処置活動が統合と誤表示されることを防ぎます。
      source_claims:
        - claim-memory-synthesis-operation-boundary
  required_relation_constraints:
    - relation_id: MemoryOperation-acts_on-MemoryRecord
      requirement: The operation must act on each MemoryRecord version referenced by input_evidence_refs.
examples:
  - id: MemorySynthesisOperation-example-positive-consolidation

    labels:
      zh: 从重复观测形成稳定概括
      en: Forms a stable generalization from repeated observations
      ja: 反復観測から安定した一般化を形成する

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      operation_id: mem-op-synthesize-3301
      input_evidence_refs:
        - record-3301-observation-a-v1
        - record-3301-observation-b-v1
        - record-3301-observation-c-v1
      successor_record_ref: record-3301-preference-v1
      synthesis_goal: generalize_across_instances
      abstraction_method: evidence_generalization
      synthesized_at: "2026-07-19T04:00:00.076Z"
    related_node_ids:
      - MemorySynthesisOperation
      - MemoryConsolidation
      - MemoryRevisionOperation
      - MemoryRecord
    related_relation_ids:
      - MemorySynthesisOperation-is_a-MemoryRevisionOperation
      - MemoryConsolidation-is_a-MemorySynthesisOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-synthesis-operation-inputs
      - claim-memory-synthesis-operation-goal
      - claim-memory-synthesis-operation-evidence
  - id: MemorySynthesisOperation-example-counterexample-single-update

    labels:
      zh: 单前驱更正不是综合
      en: Single-predecessor correction is not synthesis
      ja: 単一前駆の訂正は統合ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      operation_id: mem-op-update-3301
      predecessor_record_ref: record-3301-contact-v1
      successor_record_ref: record-3301-contact-v2
      revision_mode: update
      input_evidence_count: 1
      synthesis_goal: absent
    related_node_ids:
      - MemorySynthesisOperation
      - MemoryUpdate
      - MemoryRecord
    related_relation_ids:
      - MemorySynthesisOperation-is_a-MemoryRevisionOperation
      - MemoryUpdate-is_a-MemoryRevisionOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-synthesis-operation-boundary
  - id: MemorySynthesisOperation-example-boundary-index-compaction

    labels:
      zh: 仅索引压缩不是记录综合
      en: Index-only compaction is not record synthesis
      ja: インデックスのみの圧縮は記録統合ではない

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      operation_id: index-compact-3302
      index_segment_refs:
        - index-segment-3302-a
        - index-segment-3302-b
      successor_record_ref: absent
      content_evidence_read: false
      content_lineage_recorded: false
    related_node_ids:
      - MemorySynthesisOperation
      - MemoryRecord
    related_relation_ids:
      - MemorySynthesisOperation-is_a-MemoryRevisionOperation

    source_claims:
      - claim-memory-synthesis-operation-boundary
  - id: MemorySynthesisOperation-example-instance-reflection

    labels:
      zh: 从结果反馈提炼行动教训
      en: Derives an actionable lesson from outcome feedback
      ja: 結果フィードバックから実行可能な教訓を導く

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values:
      operation_id: mem-op-reflect-3303
      input_evidence_refs:
        - record-3303-execution-v1
        - feedback-3303-user-a
        - feedback-3303-user-b
      successor_record_ref: record-3303-lesson-v1
      synthesis_goal: derive_actionable_lesson
      abstraction_method: outcome_feedback_reflection
      synthesis_evidence_digest: sha256:8a67a2c1f66f5f51b787a156d89a08689866124e18f5653cf1c5a106e756ef48
      synthesized_at: "2026-07-19T04:20:00.089Z"
    related_node_ids:
      - MemorySynthesisOperation
      - MemoryReflection
      - MemoryRecord
    related_relation_ids:
      - MemorySynthesisOperation-is_a-MemoryRevisionOperation
      - MemoryReflection-is_a-MemorySynthesisOperation
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-synthesis-operation-inputs
      - claim-memory-synthesis-operation-goal
      - claim-memory-synthesis-operation-evidence
parent_relation:
  id: MemorySynthesisOperation-is_a-MemoryRevisionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆修订操作
    en: is a memory revision operation
    ja: 記憶改訂操作の一種である
  definitions:
    zh: MemorySynthesisOperation 是读取多项明确证据或反馈、形成新后继并保留综合目标和谱系的 MemoryRevisionOperation。
    en: MemorySynthesisOperation is a MemoryRevisionOperation that reads multiple explicit evidence items or feedback, forms a new successor, and retains synthesis goal and lineage.
    ja: MemorySynthesisOperation は、複数の明示的証拠またはフィードバックを読み、新しい後継を形成し、統合目標と来歴を保持する MemoryRevisionOperation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系表达类型成员资格，不限制一次综合使用的输入数或产生的后续执行关系数。
    en: The classification relation expresses type membership and does not limit the input count or follow-up execution relations of one synthesis.
    ja: この分類関係は型の所属を表し、一つの統合の入力数または後続実行関係数を制限しません。
  inverse_reading:
    predicate: has_synthesis_subtype
