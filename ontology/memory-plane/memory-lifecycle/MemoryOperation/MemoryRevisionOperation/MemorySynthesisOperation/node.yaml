schema: moonweave.ai/ontology-node/v1
id: MemorySynthesisOperation
kind: concept
status: review
labels:
  zh: 记忆综合操作
  en: Memory synthesis operation
  ja: 記憶統合操作
semantics:
  short_definition:
    zh: 从多个证据记录或其派生内容构造新记忆记录的修订操作。
    en: A revision operation constructing a new memory record from multiple evidence records or their derived content.
    ja: 複数evidence recordまたはそのderived contentからnew memory recordを構成するrevision operationです。
  definition:
    zh: MemorySynthesisOperation 是多输入或派生性 MemoryRevisionOperation 的上位概念；Merge、Consolidation、Compaction 与 Reflection 按保真目标、抽象程度和输入证据不同分化。
    en: MemorySynthesisOperation is the parent of multi-input or derivational MemoryRevisionOperation. Merge, Consolidation, Compaction, and Reflection differ by fidelity objective, abstraction level, and input evidence.
    ja: MemorySynthesisOperation はmulti-inputまたはderivational MemoryRevisionOperationのparentです。Merge・Consolidation・Compaction・Reflectionはfidelity目標・抽象度・input evidenceで区別します。
  why_needed:
    zh: 为四类容易重叠的综合动作建立共同层和可判定种差。
    en: Gives four often-confused synthesis actions a shared level and testable differentiae.
    ja: 混同しやすい四synthesis actionへ共通levelと検証可能differentiaを与えます。
  includes:
    - zh: 纳入合并、跨实例巩固、体积压缩和基于反馈的反思。
      en: Includes merging, cross-instance consolidation, size compaction, and feedback-grounded reflection.
      ja: merge・cross-instance consolidation・size compaction・feedback-grounded reflectionを含みます。
  excludes:
    - zh: 排除单前驱定向更新和不产生记录的只读评估。
      en: Excludes targeted single-predecessor update and read-only assessment producing no record.
      ja: single-predecessor targeted updateとrecordを生成しないread-only assessmentを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - synthesis_operation_id
  fields:
    - id: synthesis_operation_id
      labels:
        zh: 综合操作标识
        en: synthesis operation ID
        ja: synthesis operation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次多输入或派生综合活动。
        en: Identifies one multi-input or derivational synthesis activity.
        ja: 一multi-input/derivational synthesis activityを識別します。
      allowed_values: []
      pattern: null
      example_value: synth-620
      source_claims:
        - claim-memory-synthesis-operation-002
    - id: synthesis_goal
      labels:
        zh: 综合目标
        en: synthesis goal
        ja: 統合目標
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明此次综合追求保留、概括、压缩或经验提炼中的哪一目标。
        en: States whether the synthesis aims at preservation, generalization, compression, or lesson derivation.
        ja: synthesisがpreservation・generalization・compression・lesson derivationのどれを目標にするか示します。
      allowed_values: []
      pattern: null
      example_value: generalize-repeated-preference
      source_claims:
        - claim-memory-synthesis-operation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: MemorySynthesisOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: 记忆综合操作正例
      en: "Positive case: Memory synthesis operation"
      ja: 記憶統合操作正例
    scenario_id: null
    descriptions:
      zh: synth-620 读取多次偏好观测并以 generalize-repeated-preference 为目标生成新记录。
      en: synth-620 reads repeated preference observations and generates a new record with the goal generalize-repeated-preference.
      ja: synth-620 は反復preference observationをreadしgeneralize-repeated-preference目標でnew recordを生成します。
    field_values:
      synthesis_operation_id: synth-620
      synthesis_goal: generalize-repeated-preference
      revision_operation_id: synth-620
      predecessor_record_ids:
        - preference-observation-617
        - preference-observation-618
        - preference-observation-619
      operation_id: synth-620
      started_at: 2026-07-16T13:12:00Z
    related_node_ids:
      - MemorySynthesisOperation
      - MemoryRevisionOperation
    related_relation_ids:
      - MemorySynthesisOperation-is_a-MemoryRevisionOperation
    expected_result:
      zh: 归类为 MemorySynthesisOperation，并按目标进一步归类。
      en: Classify as MemorySynthesisOperation and refine by its goal.
      ja: MemorySynthesisOperationに分類しgoalでさらに判定します。
    why_valid_or_invalid:
      zh: 输出由多个证据派生，且综合目标明确。
      en: The output is derived from multiple evidence records and the synthesis goal is explicit.
      ja: outputは複数evidence recordからderivedでsynthesis goalが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-synthesis-operation-001
  - id: MemorySynthesisOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 记忆综合操作边界例
      en: "Boundary case: Memory synthesis operation"
      ja: 記憶統合操作境界例
    scenario_id: null
    descriptions:
      zh: update-620 仅纠正一条记录中的电话号码。
      en: update-620 only corrects the phone number in one record.
      ja: update-620 は一recordの電話番号だけを訂正します。
    field_values: {}
    related_node_ids:
      - MemorySynthesisOperation
    related_relation_ids: []
    expected_result:
      zh: 不得归类为 MemorySynthesisOperation；应归 MemoryUpdate。
      en: Do not classify as MemorySynthesisOperation; classify as MemoryUpdate.
      ja: MemorySynthesisOperationでなくMemoryUpdateへ分類します。
    why_valid_or_invalid:
      zh: 单一主要前驱的定向修订不构成综合。
      en: A targeted revision of one principal predecessor is not synthesis.
      ja: 一principal predecessorのtargeted revisionはsynthesisではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-synthesis-operation-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MemoryUpdate
    shared_parent_concept_id: MemoryRevisionOperation
    differentia:
      zh: 共享父节点对照：父节点 MemoryRevisionOperation：MemorySynthesisOperation（semantic kind=activity，骨架 MemorySynthesisOperation-is_a-MemoryRevisionOperation）；MemoryUpdate（semantic kind=activity，骨架 MemoryUpdate-is_a-MemoryRevisionOperation）。双端条件：MemorySynthesisOperation 条件：“从多个证据记录或其派生内容构造新记忆记录的修订操作”；MemoryUpdate 条件：“针对一个主要前驱记录产生语义修订后继版本的操作”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent MemoryRevisionOperation: MemorySynthesisOperation (semantic kind=activity, backbone MemorySynthesisOperation-is_a-MemoryRevisionOperation); MemoryUpdate (semantic kind=activity, backbone MemoryUpdate-is_a-MemoryRevisionOperation). Endpoint conditions: MemorySynthesisOperation condition: “A revision operation constructing a new memory record from multiple evidence records or their derived content”; MemoryUpdate condition: “An operation producing a semantically revised successor from one principal predecessor record”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 MemoryRevisionOperation：MemorySynthesisOperation（semantic kind=activity、バックボーン MemorySynthesisOperation-is_a-MemoryRevisionOperation）；MemoryUpdate（semantic kind=activity、バックボーン MemoryUpdate-is_a-MemoryRevisionOperation）。両端条件：MemorySynthesisOperation の条件：「複数evidence recordまたはそのderived contentからnew memory recordを構成するrevision operationです」；MemoryUpdate の条件：「一principal predecessor recordからsemantic revision後のsuccessor版を生成するoperationです」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-memory-synthesis-operation-004
parent_relation:
  id: MemorySynthesisOperation-is_a-MemoryRevisionOperation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种记忆修订操作
    en: is a memory revision operation
    ja: 記憶改訂操作の一種
  definitions:
    zh: MemorySynthesisOperation —is_a→ MemoryRevisionOperation 表示：输出从多个记录或可观察反馈派生，且综合目标明确为联合、概括、压缩或教训提炼。
    en: MemorySynthesisOperation —is_a→ MemoryRevisionOperation holds because the output is derived from multiple records or observable feedback with an explicit union, generalization, compaction, or lesson goal
    ja: MemorySynthesisOperation —is_a→ MemoryRevisionOperation は、outputが複数record/observable feedbackからderivedでunion・generalization・compaction・lesson goalが明示されるため成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定，不在本体层对所有运行实例强加统一基数。
    en: The relation is decided per auditable fact; no uniform runtime cardinality is imposed at ontology level.
    ja: このrelationはaudit可能fact単位で判定しontology層で全runtime instanceへ一律cardinalityを課しません。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向读取
      en: inverse is a memory revision operation
      ja: 逆方向読取
  conditions:
    - id: MemorySynthesisOperation-is_a-MemoryRevisionOperation-condition-manual-001
      severity: error
      expression_language: plain
      expression: Assert only when the instance satisfies the child differentia—the output is derived from multiple records or observable feedback with an explicit union, generalization, compaction, or lesson goal—and already meets the activity definition of MemoryRevisionOperation.
      explanations:
        zh: 仅当实例满足子类种差“输出从多个记录或可观察反馈派生，且综合目标明确为联合、概括、压缩或教训提炼。”且已满足 MemoryRevisionOperation 的活动定义时建立该边。
        en: Assert only when the instance satisfies the child differentia—the output is derived from multiple records or observable feedback with an explicit union, generalization, compaction, or lesson goal—and already meets the activity definition of MemoryRevisionOperation.
        ja: instanceがchild differentia「outputが複数record/observable feedbackからderivedでunion・generalization・compaction・lesson goalが明示されるため成立します。」を満たし、かつ MemoryRevisionOperation のactivity定義を満たす時だけassertします。
      source_claims:
        - claim-memory-synthesis-operation-001
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MemorySynthesisOperation-is_a-MemoryRevisionOperation-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 是一种记忆修订操作正例
        en: "Positive case: is a memory revision operation"
        ja: 記憶改訂操作の一種正例
      scenario_id: MemorySynthesisOperation-is_a-MemoryRevisionOperation:positive:20260716
      descriptions:
        zh: synth-620 比较六次会话记录与两条明确反馈，生成带适用范围和证据列表的稳定交互偏好。
        en: synth-620 compares six session records and two explicit feedback items, then generates a stable interaction preference with scope and evidence links.
        ja: synth-620 は六 session record と二つの explicit feedback を比較し、scope と evidence link 付きの stable interaction preference を生成します。
      field_values: {}
      related_node_ids:
        - MemorySynthesisOperation
        - MemoryRevisionOperation
      related_relation_ids:
        - MemorySynthesisOperation-is_a-MemoryRevisionOperation
      expected_result:
        zh: 把 synth-620 归入 MemorySynthesisOperation，并保留多来源输入、合成目标与新记录之间的谱系。
        en: Classify synth-620 as MemorySynthesisOperation and retain provenance from its multiple sources and synthesis goal to the new record.
        ja: synth-620 を MemorySynthesisOperation に分類し、複数 source・synthesis goal・new record 間の provenance を保持します。
      why_valid_or_invalid:
        zh: 输出从多记录和反馈形成更高层结论而不是只改一个字段，既是修订活动又具有合成的多源种差。
        en: The output forms a higher-level conclusion from multiple records and feedback rather than changing one field, satisfying revision and multi-source synthesis.
        ja: output は一 field 変更ではなく複数 record と feedback から高位 conclusion を作るため、revision と multi-source synthesis を満たします。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-synthesis-operation-001
    - id: MemorySynthesisOperation-is_a-MemoryRevisionOperation-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 是一种记忆修订操作边界例
        en: "Boundary case: is a memory revision operation"
        ja: 記憶改訂操作の一種境界例
      scenario_id: MemorySynthesisOperation-is_a-MemoryRevisionOperation:boundary:20260716
      descriptions:
        zh: update-620 仅依据一次明确更正，把单个记录的 preferred_name 从旧值改为新值。
        en: update-620 follows one explicit correction and changes preferred_name on a single predecessor record from the old value to the new value.
        ja: update-620 は一つの explicit correction に従い、単一 predecessor record の preferred_name を旧値から新値へ変更します。
      field_values: {}
      related_node_ids:
        - MemorySynthesisOperation
        - MemoryRevisionOperation
      related_relation_ids:
        - MemorySynthesisOperation-is_a-MemoryRevisionOperation
      expected_result:
        zh: 拒绝将 update-620 标为 MemorySynthesisOperation；它是单前驱 MemoryUpdate。
        en: Do not classify update-620 as MemorySynthesisOperation; it is a single-predecessor MemoryUpdate.
        ja: update-620 を MemorySynthesisOperation とせず、single-predecessor MemoryUpdate とします。
      why_valid_or_invalid:
        zh: 一次定向更正没有多源联合、概括、压缩或经验反思目标，不能只因产生新版本就称为合成。
        en: A targeted correction has no multi-source union, generalization, compaction, or reflection goal; producing a version alone does not make synthesis.
        ja: targeted correction は multi-source union・generalization・compaction・reflection goal を持たず、version 生成だけでは synthesis になりません。
      synthetic: false
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-memory-synthesis-operation-001
