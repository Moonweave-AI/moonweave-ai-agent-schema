source_claims:
  - id: claim-memory-lifecycle-001
    source: eng-fw-langgraph-memory-store
    supports: LangGraph BaseStore and Item operations support the boundary between persistent record identity and the lifecycle activities acting on it.
    locator: BaseStore and Item API > namespaces, keys, values, metadata, timestamps, and TTL operations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-002
    source: eng-fw-langmem-memory-management
    supports: LangMem distinguishes insert, update, delete, collection reconciliation, consolidation, relevance, importance, and strength; Moonweave refines these into nonoverlapping activity levels.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-003
    source: eng-cache-redis-eviction
    supports: Redis maxmemory and eviction policies support a capacity-residency operation distinct from durable deletion.
    locator: Key eviction > maxmemory configuration and eviction policies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-004
    source: eng-db-dynamodb-ttl
    supports: DynamoDB TTL supports separating the instant an item becomes expired from its later asynchronous service deletion.
    locator: Using time to live (TTL) > expired items pending deletion and TTL stream records
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-005
    source: eng-ont-prov-o
    supports: PROV-O supports separating activities, entities, agents, usage, generation, and invalidation in lifecycle provenance.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-006
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry's stable log data model supports observable audit-event identity and fields without turning the event into the operation itself.
    locator: Logs Data Model > Log and Event Record > field list and semantics
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-007
    source: eng-fw-langmem-memory-management
    supports: LangMem's collection flow can insert a newly extracted memory into the store; this case records that one selected write consumes item-310 and creates its first persistent record without a predecessor.
    locator: LangMem Core Concepts > Semantic Memory > Collection; Integration Patterns > Core API memory managers
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-008
    source: eng-fw-langmem-memory-management
    supports: LangMem exposes insert and delete-or-invalidate as distinct collection-management choices; the case therefore rejects one admission attempt that asserts both discard and unconditional write outcomes.
    locator: LangMem Core Concepts > Semantic Memory > Collection > insert versus delete/invalidate or update/consolidate
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-009
    source: eng-ont-prov-o
    supports: PROV-O separates the Entity used by an Activity from the Entity generated by it; this case applies that pattern to record-512-v1, update-512, and independently identified record-512-v2.
    locator: PROV-O Recommendation §2.1 Starting Point Terms > prov:Entity, prov:Activity, prov:used, and prov:wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-010
    source: eng-ont-prov-o
    supports: PROV-O generation requires an identified generated Entity; overwriting record-512-v1 under the same identity supplies no successor that can carry generation, supersession, or rollback lineage.
    locator: PROV-O Recommendation §2.1 Starting Point Terms > prov:Entity identity and prov:wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-011
    source: eng-db-dynamodb-ttl
    supports: DynamoDB TTL assigns a per-item expiry timestamp and distinguishes becoming expired from later service deletion.
    locator: DynamoDB Developer Guide > Using time to live (TTL) > per-item epoch timestamp, pending deletion, and Streams service deletion
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-012
    source: eng-cache-redis-eviction
    supports: Redis documents capacity-driven eviction through maxmemory and specific LRU, LFU, random, TTL-aware, or no-eviction policies.
    locator: Redis Key eviction > maxmemory configuration > Eviction policies > allkeys-lfu and noeviction semantics
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-013
    source: eng-fw-langmem-memory-management
    supports: LangMem describes reconciling new information with previous beliefs by update or consolidation; this case makes the detected incompatibility, chosen resolution, and reconciled output separately auditable.
    locator: LangMem Core Concepts > Semantic Memory > Collection > reconcile previous beliefs by update or consolidation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-014
    source: eng-fw-langmem-memory-management
    supports: LangMem invokes reconciliation when new information changes prior beliefs; two records that agree on value but differ only in provenance do not establish that conflict, and ordinary consolidation supplies no resolution decision.
    locator: LangMem Core Concepts > Semantic Memory > Collection > reconciliation, consolidation, and relevance evidence
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-015
    source: eng-fw-langmem-memory-management
    supports: LangMem exposes distinct insert, update, and delete controls and describes collection reconciliation and consolidation; Moonweave makes their lifecycle boundaries explicit.
    locator: Conceptual guide > semantic memory > collection management; API reference > inserts, updates, and deletes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-016
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Activity from the Entity it uses or generates and the Agent associated with it; Moonweave applies that separation to memory operations.
    locator: PROV-O Recommendation > Starting Point Terms > Entity, Activity, Agent, used, wasGeneratedBy, and wasInvalidatedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-lifecycle-017
