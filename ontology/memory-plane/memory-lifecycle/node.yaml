  key_notion:
    zh: 记忆操作
    en: Memory operation
    ja: 記憶操作
  owns_when:
    zh: 当对象的身份取决于一次可观测的记忆操作、其输入与触发依据、执行时间、产生的新版本或冲突解决结果时，由本模块拥有；仅由 store_id、namespace、record_id、content 或 retention policy 确定身份的对象归存储模块。
    en: Own an object when its identity is determined by an observable memory activity and its inputs, trigger basis, execution time, output versions, or resolution outcome; do not own it when identity is determined by store ID, namespace, record ID, content, or retention-policy identity.
    ja: object identityがobservable memory activityとinput・trigger basis・execution time・output version・resolution outcomeで決まる時所有し、store ID・namespace・record ID・content・retention-policy identityで決まる時は所有しません。
  references_when:
    zh: 操作事实需要指明候选项、现有记录、删除墓碑、保留策略、反馈、参与者或错误时，只引用对应节点；不把“被操作对象”误作“操作类型”的下位节点。
    en: Reference canonical owners when lifecycle facts identify candidate items, existing records, deletion tombstones, retention policies, feedback, actors, or error events; do not copy their schemas or create synonymous nodes.
    ja: ライフサイクル事実が候補項目・既存レコード・削除墓標・保持方針・フィードバック・参加者・エラーイベントを識別する場合は canonical owner を参照し、schema の複製や同義ノードを作りません。
