      - MemoryWrite-produces-MemoryRecord
    expected_result:
      zh: 查询返回接受分支、候选输入和初始记录输出，且不报告前驱版本。
      en: The query returns the accept branch, candidate input, and initial-record output with no predecessor version.
      ja: queryはaccept branch・candidate input・initial-record outputを返しpredecessor版を報告しません。
    why_valid_or_invalid:
      zh: 所有事实属于同一 candidate 与 admission attempt，完整闭合准入链。
      en: All facts belong to the same candidate and admission attempt, closing the admission chain.
      ja: 全factが同一candidate/admission attemptに属しadmission chainを閉じます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-007
  - id: memory-lifecycle-cq-admission-boundary
    kind: boundary
    labels:
      zh: 准入闭环边界例
      en: Admission closure boundary case
      ja: admission closure境界例
    scenario_id: null
    descriptions:
      zh: item-311 已由 discard-311 在 attempt-11 拒绝，但数据中又无条件生成同 attempt 的 write-311 与记录。
      en: discard-311 rejects item-311 in attempt-11, yet the data also creates write-311 and a record unconditionally for the same attempt.
      ja: discard-311がattempt-11でitem-311をrejectしたのに同attemptのwrite-311/recordも無条件生成されています。
    field_values:
      admission_attempt_id: attempt-311
      candidate_memory_item_id: item-311
      discard_operation_id: discard-311
      discard_reason_code: fails-retention-policy
      competing_write_operation_id: write-311
      competing_record_id: record-311-v1
      discard_asserted: true
      write_asserted: true
      same_attempt: true
      validation_decision: reject-mutually-exclusive-branches
    related_node_ids:
      - MemoryDiscard
      - MemoryWrite
      - MemoryItem
    related_relation_ids:
      - MemoryDiscard-consumes-MemoryItem
      - MemoryDiscard-prevents-MemoryWrite
      - MemoryWrite-consumes-MemoryItem
    expected_result:
      zh: 验证器拒绝该互相矛盾的准入链，并要求选择唯一分支或记录新 attempt。
      en: Validation rejects the contradictory admission chain and requires one branch or a new attempt.
      ja: validatorは矛盾admission chainを拒否し一branchまたはnew attemptを要求します。
    why_valid_or_invalid:
      zh: 同一候选与同一尝试中的 Discard 和 Write 是互斥结果。
      en: Discard and Write are mutually exclusive outcomes for the same candidate and attempt.
      ja: 同一candidate/attemptのDiscardとWriteは排他的outcomeです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-008
  - id: memory-lifecycle-cq-version-positive
    kind: positive
    labels:
      zh: 不可变更新谱系正例
      en: Immutable update lineage positive case
      ja: immutable update lineage正例
    scenario_id: null
    descriptions:
      zh: update-512 消费 record-512-v1，产生独立身份 record-512-v2；v2 保存 predecessor_id=v1 并从 v2 指向 v1 建立 supersedes。
      en: update-512 consumes record-512-v1 and produces independently identified record-512-v2; v2 stores predecessor_id=v1 and points to v1 through supersedes.
      ja: update-512はrecord-512-v1を消費し独立identityのrecord-512-v2を生成しv2はpredecessor_id=v1を保存してv2からv1へsupersedesします。
    field_values:
      memory_update_id: update-512
      change_basis: user-corrected-timezone-from-UTC-to-Europe/Paris
      predecessor_record:
        record_id: record-512-v1
        namespace: tenant-7/user-42/preferences
        key: timezone
        version: 1
        sha256: 89f732296a24e404e235b9a131c17b91b05d6438e3b650226b099458068f175d
      successor_record:
        record_id: record-512-v2
        namespace: tenant-7/user-42/preferences
        key: timezone
        version: 2
        predecessor_id: record-512-v1
        sha256: d38af781a76a9a88e4c44f150f28d540be0758c8c0dc05bc19823b4bdfcecb6a
      supersession_direction: record-512-v2-to-record-512-v1
    related_node_ids:
      - MemoryUpdate
      - MemoryRecord
    related_relation_ids:
      - MemoryUpdate-consumes-MemoryRecord
      - MemoryUpdate-produces-MemoryRecord
      - MemoryRecord-supersedes-MemoryRecord
    expected_result:
      zh: 可沿记录版本关系和产生活动回溯前驱、变更依据和结果。
      en: The predecessor, change basis, and result are traceable through the record-version relation and generating activity.
      ja: record-version relation/generating activityからpredecessor・change basis・resultをtraceできます。
    why_valid_or_invalid:
      zh: 更新活动的消费与生产边、记录自身的有向替代边各自回答不同问题，且都从新版本回到明确前序。
      en: Activity edges and record-supersession edge are separate and correctly directed.
      ja: update activity の消費・生成辺と record 自身の有向 supersession 辺は別の問いに答え、いずれも新 version から明示的 predecessor を追えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-009
  - id: memory-lifecycle-cq-version-boundary
