        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项确认 MemoryOperation 是准入、修订、综合、处置、评估和冲突解决等有界活动的上位根；MemoryConflict 是被验证发现、可在检测前已存在且可由多次验证引用的独立状态根。MemoryItem、MemoryRecord、MemoryStore、MemoryTombstone 与 RetentionPolicy 继续由记忆对象与存储模块拥有。
            en: Point-by-point review confirms MemoryOperation as the root genus for bounded admission, revision, synthesis, disposition, assessment, and conflict-resolution activities. MemoryConflict remains an independent state root because it may exist before detection and be referenced by multiple validations. MemoryItem, MemoryRecord, MemoryStore, MemoryTombstone, and RetentionPolicy remain owned by memory objects and stores.
            ja: 個別審査により MemoryOperation は admission・revision・synthesis・disposition・assessment・conflict resolution の有界活動上位 root、MemoryConflict は検出前から存在し複数 validation が参照できる独立 state root と確認しました。MemoryItem・MemoryRecord・MemoryStore・MemoryTombstone・RetentionPolicy は memory objects/stores に残します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: MemoryOperation 是唯一根，通过 is_a 展开写入、更新、删除、验证与评估活动，并以 has_result、has_audit_event、has_decision 组织专属记录。MemoryValidation detects MemoryConflict 作为 Conflict 的类级主要阅读入口：检测揭示而非创造冲突，同一冲突可被复验，因此实例上仍是条件事实而非存在依赖。
            en: "MemoryOperation is the sole root, specializing into write, update, delete, validation, and assessment activities and organizing their result, audit, and decision records through has_result, has_audit_event, and has_decision. MemoryValidation detects MemoryConflict is the class-level primary reading for Conflict: detection reveals rather than creates a conflict and the same conflict may be revalidated, so at instance level it remains conditional rather than existential dependence."
            ja: MemoryOperation を唯一 root とし、is_a で write・update・delete・validation・assessment activity を展開し、has_result・has_audit_event・has_decision で専用 record を整理します。MemoryValidation detects MemoryConflict は Conflict の class-level primary reading ですが、detection は conflict を生成せず再検証可能なため instance level では条件 fact で存在依存ではありません。
        - reviewer_id: moonweave-trilingual-terminology-reviewer
