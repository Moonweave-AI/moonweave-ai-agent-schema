          ja: inputはcandidate MemoryItem・既存MemoryRecord・explicit Feedback・PolicySpecificationに限り、writeはcandidateを消費し他operationはrecordへ作用しfeedbackはwriteをtriggerしpolicyは全operationをgovernします。
        family_concept_ids:
