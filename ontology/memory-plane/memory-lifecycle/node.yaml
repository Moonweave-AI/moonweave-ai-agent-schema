      semantic_area:
        zh: 记忆状态变更与内容质量修正
        en: Memory-state change versus content-quality correction
        ja: memory state change と content quality correction
      candidate_concept_ids:
        - Feedback
      overlap_reason:
        zh: ReviewFinding 可触发 MemoryUpdate 或 Delete，但审查责任与验证证据不能由存储操作状态替代，反之亦然。 本条仅记录 Feedback；其 canonical owner 是审查与纠正（feedback-review-optimization），因此 memory-lifecycle 在此引用这些概念。
        en: A ReviewFinding can trigger MemoryUpdate or Delete, but review responsibility and verification evidence cannot be replaced by storage-operation status, or vice versa. This record is limited to Feedback; their canonical owner is review and correction (feedback-review-optimization), so memory-lifecycle references these concepts here.
        ja: ReviewFinding は MemoryUpdate/Delete を trigger できますが、review responsibility/verification evidence と storage operation state は互いに代替できません。 この記録は Feedback だけを対象とし、canonical owner は審査と修正（feedback-review-optimization）です。したがって memory-lifecycle はここでこれらを参照します。
      disambiguation_test:
        zh: 由 memory entity、prior/new version、operation type 和 effective time 识别的对象归记忆生命周期；由 review scope、finding、owner 和 closure evidence 识别的对象归评审与修正。
        en: An object identified by memory entity, prior or new version, operation type, and effective time belongs to memory lifecycle; one identified by review scope, finding, owner, and closure evidence belongs to review and correction.
        ja: memory entity・prior/new version・operation type・effective time で識別されれば memory lifecycle、review scope・finding・owner・closure evidence で識別されれば review/correction に属します。
