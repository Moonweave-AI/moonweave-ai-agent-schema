source_claims:
  - id: claim-memory-lifecycle-module
    source: w3c-prov-o
    supports: PROV-O distinguishes executed activities from entities, agents, time, and surrounding provenance facts. Moonweave uses this module to keep lifecycle state transitions as explicit activities rather than treating a note, command, plan, or display as a completed memory change.
    locator: "PROV-O sections 3.1 Activity, 3.2 Entity, and 3.4 Agent"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-lifecycle-transition
    source: w3c-prov-o
    supports: PROV-O represents use, generation, derivation, and time as distinguishable facts around an activity. Moonweave requires lifecycle operations to record exact inputs or target, explicit successor or eligibility effect, basis or policy, occurrence time, result, and audit evidence.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, prov:wasDerivedFrom, and time"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-lifecycle-lineage
    source: w3c-prov-o
    supports: PROV-O distinguishes an entity used by an activity from a distinct entity generated by it and supports derivation links. Moonweave uses explicit version lineage for successor-producing lifecycle operations instead of in-place overwriting a predecessor.
    locator: "PROV-O sections on prov:used, prov:wasGeneratedBy, and prov:wasDerivedFrom"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-lifecycle-expiration
    source: redis-expire
    supports: Redis EXPIRE documents a time-to-live deadline and expiry behavior. Moonweave models policy- or deadline-driven expiration as an executed eligibility effect with separate audit facts, without inferring that physical cleanup is already complete.
    locator: "Redis EXPIRE command reference"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-lifecycle-audit
    source: nist-fips-180-4
    supports: FIPS 180-4 specifies fixed-size secure message digests. Moonweave uses SHA-256 evidence digests to bind lifecycle inputs, policy or basis, effects, time, result, and audit facts when concrete operations require integrity binding.
    locator: "FIPS 180-4 abstract and SHA-256 specification"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-memory-lifecycle-boundary
    source: w3c-prov-o
    supports: PROV-O separates activities, used entities, generated entities, and derivations as explicit provenance facts. Moonweave keeps initial write, single-predecessor update, multi-input synthesis, conflict resolution, disposition, retrieval, storage, context assembly, views, drafts, and plans as distinct lifecycle or non-lifecycle facts.
    locator: "PROV-O sections on Activity, Entity, use, generation, and derivation"
    evidence_kind: ontology-design-inference
    confidence: high
