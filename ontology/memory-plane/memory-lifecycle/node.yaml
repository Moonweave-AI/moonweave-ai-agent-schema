schema: moonweave.ai/ontology-node/v1
id: memory-lifecycle
kind: module
status: accepted
labels:
  zh: 记忆生命周期
  en: Memory lifecycle
  ja: 記憶ライフサイクル
semantics:
  short_definition:
    zh: 记忆生命周期描述某个候选记忆或已存记录如何被准入、写入、修订、合并、评估、处置或解决冲突。MemoryOperation 是唯一活动根；操作结果、审计事件和冲突解决决定是活动产生的信息，而 MemoryItem、MemoryRecord、MemoryStore 与保留策略仅被引用。
    en: Memory lifecycle is anchored by MemoryOperation and owns the activity tree for candidate admission, immutable version revision, multi-record synthesis, record disposition, pre-reuse assessment, and conflict resolution. Results, audit events, and resolution decisions attach as node information; MemoryItem, MemoryRecord, MemoryStore, MemoryTombstone, and retention policy are referenced rather than re-owned.
    ja: Memory lifecycleはMemoryOperationをkey notionとしcandidate admission・immutable version revision・multi-record synthesis・record disposition・reuse前assessment・conflict resolutionのactivity treeを所有します。result・audit event・resolution decisionはnode informationとして付属し、MemoryItem・MemoryRecord・MemoryStore・MemoryTombstone・retention policyは再所有せず参照します。
  definition:
    zh: 记忆生命周期以 MemoryOperation 为关键概念，拥有候选准入、不可变版本修订、多记录综合、记录处置、复用前评估和冲突解决的活动树，并把结果、审计事件和解决决定作为节点信息挂接；它引用而不重新拥有 MemoryItem、MemoryRecord、MemoryStore、MemoryTombstone 与保留策略。
    en: Memory lifecycle is anchored by MemoryOperation and owns the activity tree for candidate admission, immutable version revision, multi-record synthesis, record disposition, pre-reuse assessment, and conflict resolution. Results, audit events, and resolution decisions attach as node information; MemoryItem, MemoryRecord, MemoryStore, MemoryTombstone, and retention policy are referenced rather than re-owned.
    ja: Memory lifecycleはMemoryOperationをkey notionとしcandidate admission・immutable version revision・multi-record synthesis・record disposition・reuse前assessment・conflict resolutionのactivity treeを所有します。result・audit event・resolution decisionはnode informationとして付属し、MemoryItem・MemoryRecord・MemoryStore・MemoryTombstone・retention policyは再所有せず参照します。
  why_needed:
    zh: 回答记忆候选或现有记录经历了哪种准入、修订、合成、处置、评估或冲突解决活动，为何触发，读取和产生了哪些版本，为何当前可用或不可用，以及失败与冲突如何被审计和恢复。
    en: Answer which admission, revision, synthesis, disposition, assessment, or conflict-resolution activity a memory candidate or existing record underwent, why it was triggered, which versions it read and produced, why it is now available or unavailable, and how failures and conflicts were audited and recovered.
    ja: 記憶候補または既存レコードがどの受入・改訂・合成・処置・評価・競合解決活動を受け、なぜ起動され、どの版を読み書きし、なぜ現在利用可能または不可能で、失敗と競合がどう監査・回復されたかを答えます。
  includes:
    - zh: MemoryOperation 下的准入、修订、综合、处置、评估和解决活动层，以及各自可判定的具体操作。
      en: Admission, revision, synthesis, disposition, assessment, and resolution activity levels under MemoryOperation and their testable concrete operations.
      ja: MemoryOperation配下のadmission・revision・synthesis・disposition・assessment・resolution activity levelと検証可能concrete operation。
    - zh: MemoryOperationResult、MemoryAuditEvent 和 MemoryConflictResolutionDecision 作为活动的组成信息，以及独立 MemoryConflict 状态。
      en: MemoryOperationResult, MemoryAuditEvent, and MemoryConflictResolutionDecision as compositional information of activities, plus the independent MemoryConflict state.
      ja: activityのcomposition informationとしてMemoryOperationResult・MemoryAuditEvent・MemoryConflictResolutionDecision、および独立MemoryConflict state。
  excludes:
    - zh: MemoryItem、MemoryRecord、MemoryStore、MemoryTombstone、MemoryRetentionPolicy 的实体/信息身份与存储结构由 memory-stores-scopes 拥有；本模块只通过有向事实引用。
      en: Entity or information identity and storage structure for MemoryItem, MemoryRecord, MemoryStore, MemoryTombstone, and MemoryRetentionPolicy belong to memory-stores-scopes; this module references them only through directed facts.
      ja: MemoryItem・MemoryRecord・MemoryStore・MemoryTombstone・MemoryRetentionPolicyのentity/information identityとstorage structureはmemory-stores-scopesが所有し本moduleはdirected factでのみ参照します。
    - zh: 摄取、分块、嵌入、索引、检索和提示组装属于相邻阶段；它们可能触发生命周期活动，但不是本模块的子类。
      en: Ingestion, chunking, embedding, indexing, retrieval, and prompt assembly are adjacent stages; they may trigger lifecycle activities but are not this module's subclasses.
      ja: ingestion・chunking・embedding・indexing・retrieval・prompt assemblyは隣接phaseでlifecycle activityをtriggerし得ますが本module subtypeではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 回答记忆候选或现有记录经历了哪种准入、修订、合成、处置、评估或冲突解决活动，为何触发，读取和产生了哪些版本，为何当前可用或不可用，以及失败与冲突如何被审计和恢复。
  en: Answer which admission, revision, synthesis, disposition, assessment, or conflict-resolution activity a memory candidate or existing record underwent, why it was triggered, which versions it read and produced, why it is now available or unavailable, and how failures and conflicts were audited and recovered.
  ja: 記憶候補または既存レコードがどの受入・改訂・合成・処置・評価・競合解決活動を受け、なぜ起動され、どの版を読み書きし、なぜ現在利用可能または不可能で、失敗と競合がどう監査・回復されたかを答えます。
structure: null
examples:
  - id: memory-lifecycle-cq-admission-positive
    kind: positive
    labels:
      zh: 准入闭环正例
      en: Admission closure positive case
      ja: admission closure正例
    scenario_id: null
    descriptions:
      zh: item-310 尚未持久化；admit-310 在同一 attempt 中选择 write-310，write-310 消费 item-310 并产生首个 record-310-v1。
      en: item-310 is not yet persistent; admit-310 selects write-310 in the same attempt, and write-310 consumes item-310 and produces initial record-310-v1.
      ja: item-310は未persistでadmit-310が同attemptでwrite-310を選びwrite-310がitem-310を消費しinitial record-310-v1を生成します。
    field_values:
      admission_attempt_id: attempt-310
      candidate_memory_item_id: item-310
      candidate_semantic_key: tenant-7/user-42/preference.response-language
      selected_operation_id: write-310
      selected_branch: write
      discard_branch_selected: false
      admission_reason_code: novel-user-preference-with-explicit-consent
      initial_record:
        record_id: record-310-v1
        namespace: tenant-7/user-42/preferences
        key: response-language
        version: 1
        predecessor_present: false
    related_node_ids:
      - MemoryAdmissionOperation
      - MemoryWrite
      - MemoryItem
      - MemoryRecord
    related_relation_ids:
      - MemoryWrite-is_a-MemoryAdmissionOperation
