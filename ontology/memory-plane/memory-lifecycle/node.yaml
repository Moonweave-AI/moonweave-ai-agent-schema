      - MemoryConflictResolutionDecision
      - MemoryRecord
    related_relation_ids:
      - MemoryValidation-detects-MemoryConflict
      - MemoryConflictResolution-consumes-MemoryConflict
      - MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
      - MemoryConflictResolution-produces-MemoryRecord
    expected_result:
      zh: 查询依次返回检测、冲突状态、解决活动、决定和可选调和输出。
      en: The query returns detection, conflict state, resolution activity, decision, and optional reconciled output in order.
      ja: queryはdetection・conflict state・resolution activity・decision・optional reconciled outputを順に返します。
    why_valid_or_invalid:
      zh: 评估与解决没有折叠，所有交接由有向事实支持。
      en: Assessment and resolution are not collapsed and every handoff is supported by a directed fact.
      ja: assessment/resolutionを折り畳まず全handoffをdirected factで支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-013
  - id: memory-lifecycle-cq-conflict-boundary
    kind: boundary
    labels:
      zh: 冲突恢复闭环边界例
      en: Conflict recovery closure boundary case
      ja: conflict recovery closure境界例
    scenario_id: null
    descriptions:
      zh: 两个记录值一致，只因来源不同就创建 Conflict，并让普通 Consolidation 直接“解决”它且没有决定信息。
      en: Two records agree in value, yet source difference alone creates Conflict and an ordinary Consolidation directly 'resolves' it with no decision information.
      ja: 二recordのvalueは一致するのにsource differenceだけでConflictを作りordinary Consolidationがdecision informationなしで直接「resolve」します。
    field_values:
      validation_operation_id: validate-1709
      evaluated_records:
        - record_id: record-catalog-a
          value: dark
          source_id: message-71
        - record_id: record-catalog-b
          value: dark
          source_id: profile-import-9
      values_logically_incompatible: false
      incorrect_conflict_id: conflict-2303
      ordinary_operation_id: consolidate-1911
      ordinary_operation_type: MemoryConsolidation
      dedicated_resolution_present: false
      resolution_decision_present: false
      validation_decision: reject-false-conflict-and-implicit-resolution
    related_node_ids:
      - MemoryValidation
      - MemoryConflict
      - MemoryConsolidation
      - MemoryConflictResolutionDecision
    related_relation_ids:
      - MemoryValidation-detects-MemoryConflict
      - MemoryConflictResolution-consumes-MemoryConflict
      - MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision
    expected_result:
      zh: 验证器拒绝无逻辑不兼容的 Conflict 和由 Consolidation 冒充的解决链。
      en: Validation rejects the Conflict lacking logical incompatibility and the resolution chain impersonated by Consolidation.
      ja: validatorはlogical incompatibilityのないConflictとConsolidationが偽装したresolution chainを拒否します。
