          - MemoryOperation-acts_on-MemoryRecord
          - MemoryWrite-responds_to-Feedback
          - MemoryOperation-governed_by-PolicySpecification
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出端区分持久记录、合规删除墓碑、操作结果、审计事件和冲突解决决定；MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision 在本面以决定端点标识可执行的解决结果，而不是把解决活动或决定归成操作子类。
          en: Outputs distinguish persistent records, compliant deletion tombstones, operation results, audit events, and conflict-resolution decisions; on this facet MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision uses the decision endpoint to identify the actionable resolution result without classifying either the resolution activity or its decision as an operation subtype.
          ja: 出力は永続記録・適合削除 tombstone・操作結果・監査 event・競合解決決定を区別します。この面の MemoryConflictResolution-has_decision-MemoryConflictResolutionDecision は決定端点で実行可能な解決結果を示し、解決活動や決定を操作の下位型にはしません。
        family_concept_ids:
