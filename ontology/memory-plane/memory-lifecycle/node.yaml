    scenario_id: null
    descriptions:
      zh: 更新直接覆盖 record-512-v1 的内容，没有新 record_id、前驱引用或结果输出。
      en: An update overwrites record-512-v1 in place with no new record ID, predecessor reference, or result output.
      ja: updateがrecord-512-v1をin-place上書きしnew record ID・predecessor reference・result outputがありません。
    field_values:
      memory_update_id: update-512-bad
      record_id_before: record-512-v1
      record_id_after: record-512-v1
      sha256_before: 89f732296a24e404e235b9a131c17b91b05d6438e3b650226b099458068f175d
      sha256_after: d38af781a76a9a88e4c44f150f28d540be0758c8c0dc05bc19823b4bdfcecb6a
      same_record_overwritten: true
      successor_record_present: false
      predecessor_reference_present: false
      rollback_anchor_present: false
      validation_decision: reject-in-place-update-lineage
    related_node_ids:
      - MemoryUpdate
      - MemoryRecord
      - MemoryOperationResult
    related_relation_ids:
      - MemoryUpdate-consumes-MemoryRecord
      - MemoryUpdate-produces-MemoryRecord
      - MemoryOperation-has_result-MemoryOperationResult
    expected_result:
      zh: 拒绝把原地覆盖视为完整更新来历，并分别报告缺少后继记录、前序引用和可回滚锚点。
      en: Validation rejects the overwrite as a complete update lineage.
      ja: 上書きを完全な update lineage として拒否し、successor record・predecessor reference・rollback anchor の欠落を個別に報告します。
    why_valid_or_invalid:
