schema: moonweave.ai/ontology-node/v1
id: memory-lifecycle
kind: module
status: accepted
labels:
  zh: 记忆生命周期
  en: Memory lifecycle
  ja: 記憶ライフサイクル
semantics:
  short_definition:
    zh: 定义记忆记录从准入、评估、修订、冲突处理到处置所遵循的可审计状态转换边界的模块。
    en: A module defining auditable state-transition boundaries for memory records across admission, assessment, revision, conflict handling, and disposition.
    ja: 記憶記録について、受入れ、評価、修訂、競合処理、処置にわたる監査可能な状態遷移の境界を定義するモジュールです。
  definition:
    zh: memory-lifecycle 模块规定 MemoryOperation 及其子类如何对已识别的 MemoryRecord 形成、检查、修订、解决冲突或改变使用资格。它将准入与初始写入、评估与验证、单前驱更新、综合操作、冲突解决、衰减、过期、驱逐和删除分为独立活动，并要求每项已执行的转换都能声明精确输入或目标、产生的后继或资格效果、依据或策略、发生时间、结果和审计事实。该模块不把存储设施、命名空间、向量检索候选、模型上下文、未执行计划或原地数据改写当作生命周期状态转换本身。
    en: The memory-lifecycle module specifies how MemoryOperation and its subtypes form, inspect, revise, resolve conflict for, or change the eligibility of identified MemoryRecord instances. It separates admission and initial write, assessment and validation, single-predecessor update, synthesis operations, conflict resolution, decay, expiration, eviction, and deletion into independent activities, and requires each executed transition to declare exact inputs or target, resulting successor or eligibility effect, basis or policy, occurrence time, result, and audit fact. The module does not treat storage facility, namespace, vector-retrieval candidate, model context, unexecuted plan, or in-place data mutation as a lifecycle transition by itself.
    ja: memory-lifecycle モジュールは、MemoryOperation とそのサブタイプが、識別済みの MemoryRecord を形成、検査、修訂、競合解決、または利用資格変更する方法を規定します。受入れと初期書込み、評価と検証、単一前駆の更新、統合操作、競合解決、減衰、期限切れ、退去、削除を独立した活動として分け、実行済みの各遷移が正確な入力または対象、結果となる後続または資格効果、根拠または方針、発生時刻、結果、監査事実を宣言することを求めます。ストレージ施設、名前空間、ベクトル検索候補、モデル文脈、未実行計画、その場でのデータ変更を、それだけでライフサイクル遷移とは見なしません。
  why_needed:
    zh: 记忆会变旧、被纠正、发生冲突或不再符合保留与使用条件。将这些变化都叫作“更新”会丢失输入、依据、版本谱系和处置效果；明确的生命周期边界让系统能够复核何时、为何以及以何种影响改变记忆。
    en: Memories can become stale, be corrected, conflict, or cease to meet retention and use conditions. Calling every change an update loses inputs, basis, version lineage, and disposition effect; explicit lifecycle boundaries make it possible to review when, why, and with what effect memory changed.
    ja: 記憶は古くなり、訂正され、競合し、保持または利用条件を満たさなくなることがあります。すべての変更を更新と呼ぶと、入力、根拠、バージョン系譜、処置効果が失われます。明示的なライフサイクル境界により、いつ、なぜ、どのような効果で記憶が変化したかを再検討できます。
  includes:
    - zh: 记忆准入、初始写入、评估、验证、单前驱更新、压缩、巩固、合并、反思、冲突解决、衰减、过期、驱逐、删除、操作结果和审计事实。
      en: Memory admission, initial write, assessment, validation, single-predecessor update, compaction, consolidation, merge, reflection, conflict resolution, decay, expiration, eviction, deletion, operation result, and audit facts.
      ja: 記憶の受入れ、初期書込み、評価、検証、単一前駆の更新、圧縮、統合、マージ、反思、競合解決、減衰、期限切れ、退去、削除、操作結果、監査事実を含みます。
    - zh: 使输入、输出、策略、证据、时间和来源谱系可独立检验的已执行状态转换。
      en: Executed state transitions whose inputs, outputs, policy, evidence, time, and provenance lineage can be independently examined.
      ja: 入力、出力、方針、証拠、時刻、出所系譜を独立して検査できる、実行済みの状態遷移を含みます。
  excludes:
    - zh: 记忆对象和存储后端定义、命名空间寻址、嵌入生成、索引维护、检索与重排、最终上下文装配、只读展示、未执行计划、临时草稿，以及没有独立后继或处置事实的原地覆盖。
      en: Definitions of memory objects and storage backends, namespace addressing, embedding generation, index maintenance, retrieval and reranking, final context assembly, read-only display, unexecuted plan, transient draft, and in-place overwrite with no independent successor or disposition fact.
      ja: 記憶オブジェクトとストレージバックエンドの定義、名前空間アドレス指定、埋込み生成、インデックス保守、検索と再順位付け、最終コンテキスト組立て、読取り専用表示、未実行計画、一時草稿、独立した後続または処置事実のないその場での上書きを除外します。
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: 将生命周期实现为显式活动与记录事实的组合：选择精确记录或策略，执行一种明确的操作族，记录输入、后继或资格效果、证据、时刻、结果和审计，并在需要时保持版本或处置谱系。不得仅凭 API 名称、存储键变化、文本相似、缓存刷新或检索显示推定生命周期活动已发生。
    en: "Implement lifecycle as explicit activities and record facts: select exact records or policy, execute one defined operation family, record inputs, successor or eligibility effect, evidence, time, result, and audit, and preserve version or disposition lineage where needed. Do not infer a lifecycle activity from API name, storage-key change, text similarity, cache refresh, or retrieval display alone."
    ja: ライフサイクルは、明示的な活動と記録事実の組合せとして実装します。正確な記録または方針を選び、一つの定義済み操作族を実行し、入力、後続または資格効果、証拠、時刻、結果、監査を記録し、必要に応じてバージョンまたは処置の系譜を保持します。API 名、ストレージキー変更、テキスト類似、キャッシュ更新、検索表示だけからライフサイクル活動の発生を推定してはいけません。
  typical_input:
    - description: Exact memory record or records, requested lifecycle operation family, policy or evidence basis, actor identity, and operation start time.
      format: "{operation_id, operation_family, target_or_input_record_refs, policy_or_evidence_refs, actor_ref, started_at}"
  typical_output:
    - description: Successor record or eligibility effect with provenance, result, audit event, and occurrence time.
      format: "{operation_id, successor_record_ref?, eligibility_effect?, result_ref, audit_event_ref, occurred_at}"
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Distinguishes activities, used entities, generated entities, derivation, agents, and time in provenance records.
    - name: Redis EXPIRE command
      url: https://redis.io/docs/latest/commands/expire/
      description: Documents time-to-live configuration and deadline-related key lifecycle behavior.
    - name: FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180/4/final
      description: Specifies SHA-256 message digests suitable for binding auditable lifecycle evidence.
  source_claims:
    - claim-memory-lifecycle-module
    - claim-memory-lifecycle-transition
    - claim-memory-lifecycle-boundary
structure:
  identity_keys:
    - module_id
  fields:
    - id: module_id
      labels:
        zh: 模块标识
        en: module ID
        ja: モジュール ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识记忆生命周期的状态转换边界集合，而不是其中某个运行时操作、记录、策略或存储位置。
        en: Stably identifies this set of memory state-transition boundaries rather than one runtime operation, record, policy, or storage location inside it.
        ja: その内部の一つの実行時操作、記録、方針、ストレージ場所ではなく、この記憶状態遷移境界の集合を安定して識別します。
      allowed_values:
        - memory-lifecycle
      pattern: null
      example_value: memory-lifecycle
      source_claims:
        - claim-memory-lifecycle-module
    - id: operation_families
      labels:
        zh: 操作族
        en: operation families
        ja: 操作族
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出模块所覆盖的生命周期操作族。每个操作族仍由独立概念和关系表达，不能因为同属生命周期而互相替代或合并。
        en: Lists lifecycle operation families covered by the module. Each family remains expressed by independent concepts and relations and cannot substitute for or merge into another merely because both are lifecycle work.
        ja: モジュールが扱うライフサイクル操作族を列挙します。各操作族は独立した概念と関係で表され、どちらもライフサイクル作業であるという理由だけで他方を代替または統合できません。
      allowed_values:
        - admission
        - assessment
        - revision
        - resolution
        - disposition
        - result_and_audit
      pattern: null
      example_value:
        - admission
        - assessment
        - revision
        - resolution
        - disposition
        - result_and_audit
      source_claims:
        - claim-memory-lifecycle-transition
        - claim-memory-lifecycle-boundary
    - id: transition_contract
      labels:
        zh: 状态转换契约
        en: state-transition contract
        ja: 状態遷移契約
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明每个已执行生命周期活动必须能表达精确输入或目标、作用类型、后继或资格效果、依据或策略、发生时间、结果和审计事实。
        en: Declares that every executed lifecycle activity must express exact input or target, effect type, successor or eligibility effect, basis or policy, occurrence time, result, and audit fact.
        ja: 実行済みの各ライフサイクル活動が、正確な入力または対象、効果種別、後続または資格効果、根拠または方針、発生時刻、結果、監査事実を表現しなければならないことを宣言します。
      allowed_values: []
      pattern: null
      example_value: '{"input_or_target":"exact","effect":"explicit","basis_or_policy":"auditable","time":"recorded","result":"linked","audit":"linked"}'
      source_claims:
        - claim-memory-lifecycle-transition
        - claim-memory-lifecycle-audit
    - id: boundary_contract
      labels:
        zh: 边界契约
        en: boundary contract
        ja: 境界契約
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明模块必须区分初始写入、单前驱更新、多输入综合、冲突裁决、处置效果、存储与寻址、读取候选和模型上下文，防止同名“更新”或“总结”吞并不同事实。
        en: Declares that the module must distinguish initial write, single-predecessor update, multi-input synthesis, conflict adjudication, disposition effect, storage and addressing, read candidates, and model context, preventing same-named update or summary from collapsing different facts.
        ja: 初期書込み、単一前駆更新、複数入力統合、競合裁定、処置効果、ストレージとアドレス指定、読取り候補、モデル文脈を区別し、同じ名前の更新または要約が異なる事実をまとめてしまうことを防ぐ必要があることを宣言します。
      allowed_values: []
      pattern: null
      example_value: '{"update":"one-principal-predecessor","merge":"multiple-peer-inputs","expiration":"eligibility-effect","retrieval":"read-only","storage":"separate"}'
      source_claims:
        - claim-memory-lifecycle-boundary
    - id: audit_evidence_digest_algorithm
      labels:
        zh: 审计证据摘要算法
        en: audit evidence digest algorithm
        ja: 監査証拠ダイジェストアルゴリズム
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明用于绑定可审计生命周期输入、策略或依据、输出或资格效果及时间的摘要算法；具体操作可增加更细的证据摘要。
        en: States the digest algorithm for binding auditable lifecycle inputs, policy or basis, output or eligibility effect, and time; concrete operations may add more specific evidence digests.
        ja: 監査可能なライフサイクル入力、方針または根拠、出力または資格効果、時刻を結合するためのダイジェストアルゴリズムを宣言します。具体的な操作はより詳細な証拠ダイジェストを追加できます。
      allowed_values:
        - sha256
      pattern: null
      example_value: sha256
      source_claims:
        - claim-memory-lifecycle-audit
  constraints:
    - id: memory-lifecycle-executed-transition-contract
      expression: "Every successful lifecycle operation is an executed activity with exact target or inputs, explicit operation-family effect, declared evidence or policy, occurrence time, result, and audit fact; a label, plan, cache refresh, or display alone does not satisfy the contract."
      explanation:
        zh: 生命周期的最小单位是可复核的已执行转换，而非一个看起来像更新或清理的命令、文本或界面；缺失输入、效果、依据、时间、结果或审计时，不能把活动当作成功状态变更。
        en: The minimal lifecycle unit is an executed transition that can be reviewed, not a command, text, or interface that looks like update or cleanup; if input, effect, basis, time, result, or audit is missing, the activity cannot be treated as successful state change.
        ja: ライフサイクルの最小単位は、再検討できる実行済み遷移であり、更新またはクリーンアップに見えるコマンド、テキスト、画面ではありません。入力、効果、根拠、時刻、結果、監査が欠ける場合、活動を成功した状態変更として扱えません。
      source_claims:
        - claim-memory-lifecycle-module
        - claim-memory-lifecycle-transition
        - claim-memory-lifecycle-audit
    - id: memory-lifecycle-operation-family-boundaries
      expression: "Initial write, single-predecessor update, multi-input synthesis, conflict resolution, expiration or other disposition, retrieval, storage, and context assembly remain distinct facts; no operation family may be inferred from shared topic, same API verb, shorter text, or a displayed result."
      explanation:
        zh: 同一记录主题、API 动词或展示文本不能决定生命周期分类。输入数量、版本谱系、策略或证据、产生或处置效果才是区分操作族的可审计事实。
        en: Shared record topic, API verb, or displayed text cannot determine lifecycle classification. Input count, version lineage, policy or evidence, and generation or disposition effect are the auditable facts distinguishing operation families.
        ja: 共有された記録話題、API 動詞、表示テキストではライフサイクル分類を決められません。入力数、バージョン系譜、方針または証拠、生成または処置効果が、操作族を区別する監査可能な事実です。
      source_claims:
        - claim-memory-lifecycle-boundary
  required_relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description: Exact memory records, lifecycle operation request, policy or evidence basis, actor identity, and time.
        reference_api: "{operation_id, target_or_input_record_refs, operation_family, policy_or_evidence_refs, actor_ref, started_at}"
      output:
        applicable: true
        description: A successor or eligibility effect plus result and audit links that permit later reconstruction of the transition.
        reference_api: "{operation_id, successor_record_ref?, eligibility_effect?, result_ref, audit_event_ref, occurred_at}"
  competency_questions:
    - id: cq-memory-lifecycle-update-versus-merge
      question:
        zh: 何时应将一次变化建模为单前驱更新，而不是合并？
        en: When should a change be modeled as single-predecessor update rather than merge?
        ja: いつ変更をマージではなく単一前駆更新としてモデル化すべきですか。
      answer:
        zh: 只有一条精确主要前驱被定向语义修订并产生独立后继时使用更新；多个同级输入共同贡献声明或证据时使用合并，并保留每个输入的来源映射。
        en: Use update only when one exact principal predecessor is semantically revised into an independent successor; use merge when multiple peer inputs jointly contribute claims or evidence and retain mappings for every input.
        ja: 一つの正確な主要前駆だけが意味的に修訂され、独立した後続になる場合にのみ更新を使います。複数の同格入力が主張または証拠に共同で寄与する場合はマージを使い、各入力のマッピングを保持します。
    - id: cq-memory-lifecycle-expiration-versus-deletion
      question:
        zh: 过期与删除如何区分？
        en: How are expiration and deletion distinguished?
        ja: 期限切れと削除はどのように区別されますか。
      answer:
        zh: 过期以时间或保留策略到期为依据，首先产生不再符合使用资格的效果，后续物理清理可异步发生；删除是由明确删除意图或权威依据产生的处置活动，必须记录其目标、依据、效果、时间和审计。
        en: Expiration is based on time or retention-policy deadline and first produces an ineligible-for-use effect, with physical cleanup potentially asynchronous; deletion is a disposition activity based on explicit deletion intent or authoritative basis and must record target, basis, effect, time, and audit.
        ja: 期限切れは時刻または保持方針の期限に基づき、最初に利用不適格という効果を生み、物理的なクリーンアップは非同期になり得ます。削除は明示的な削除意図または権威ある根拠に基づく処置活動であり、対象、根拠、効果、時刻、監査を記録しなければなりません。
examples:
  - id: memory-lifecycle-example-positive-versioned-correction

    labels:
      zh: 带版本谱系的经验证记忆纠正
      en: Verified memory correction with version lineage
      ja: バージョン系譜を持つ検証済み記憶訂正

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values:
      module_id: memory-lifecycle
      operation_families:
        - revision
        - result_and_audit
      transition_contract: '{"input_or_target":"record-3901-profile-v1","effect":"successor","basis":"feedback-3901-verified","result":"result-3901","audit":"audit-3901"}'
      boundary_contract: '{"operation":"single-predecessor-update","predecessor_count":1,"successor":"record-3901-profile-v2","in_place_overwrite":false}'
      audit_evidence_digest_algorithm: sha256
    related_node_ids:
      - MemoryOperation
      - MemoryUpdate
      - MemoryRecord
      - MemoryOperationResult
      - MemoryAuditEvent
    related_relation_ids:
      - MemoryUpdate-is_a-MemoryRevisionOperation
      - MemoryUpdate-consumes-MemoryRecord
      - MemoryUpdate-produces-MemoryRecord

    source_claims:
      - claim-memory-lifecycle-transition
      - claim-memory-lifecycle-lineage
      - claim-memory-lifecycle-audit
  - id: memory-lifecycle-example-counterexample-untracked-overwrite

    labels:
      zh: 无谱系的原地改写不是生命周期状态转换
      en: Untracked in-place overwrite is not lifecycle state transition
      ja: 系譜のないその場での上書きはライフサイクル状態遷移ではない

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values:
      module_id: memory-lifecycle
      operation_families:
        - revision
      transition_contract: '{"input_or_target":"record-3902-v1","effect":"unknown","basis":null,"result":null,"audit":null}'
      boundary_contract: '{"mutation_mode":"in_place_overwrite","successor":null,"lineage":null}'
      audit_evidence_digest_algorithm: sha256
    related_node_ids:
      - MemoryOperation
      - MemoryRecord
    related_relation_ids: []

    source_claims:
      - claim-memory-lifecycle-boundary
  - id: memory-lifecycle-example-boundary-retrieval-display

    labels:
      zh: 检索显示不是生命周期变更
      en: Retrieval display is not lifecycle change
      ja: 検索表示はライフサイクル変更ではない

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values:
      module_id: memory-lifecycle
      operation_families:
        - assessment
      transition_contract: '{"input_or_target":"record-3903-v1","effect":"none","basis":"query","result":"retrieval-display","audit":null}'
      boundary_contract: '{"activity":"retrieval","record_mutated":false,"model_context_selected":false}'
      audit_evidence_digest_algorithm: sha256
    related_node_ids:
      - MemoryOperation
      - MemoryRecord
    related_relation_ids:
      - MemoryOperation-acts_on-MemoryRecord

    source_claims:
      - claim-memory-lifecycle-boundary
  - id: memory-lifecycle-example-instance-retention-expiration

    labels:
      zh: 保留期限到期的记忆处置实例
      en: Memory disposition instance at retention deadline
      ja: 保持期限での記憶処置インスタンス

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
