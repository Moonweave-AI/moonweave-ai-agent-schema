    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-010
  - id: memory-lifecycle-cq-disposition-positive
    kind: positive
    labels:
      zh: 处置区分正例
      en: Disposition distinction positive case
      ja: disposition distinction正例
    scenario_id: null
    descriptions:
      zh: record-1506 到 TTL 后由 expire-1506 标为 ineligible 等待删除；另一可重载缓存记录因 maxmemory 由 evict-1405 驱逐；二者均未伪装为 Delete。
      en: After TTL, expire-1506 marks record-1506 ineligible pending deletion; a different reloadable cache record is evicted by evict-1405 under maxmemory; neither is mislabeled Delete.
      ja: record-1506はTTL後expire-1506でineligible/delete待ちとなり、別reloadable cache recordはmaxmemoryでevict-1405によりevictされ、どちらもDeleteと誤記しません。
    field_values:
      expiration:
        operation_id: expire-1506
        record_id: record-1506
        retention_policy_id: ttl-policy-user-events@v3
        expires_at_epoch_seconds: 1784160000
        observed_at_epoch_seconds: 1784163600
        state: ineligible-pending-physical-deletion
        tombstone_present: false
      eviction:
        operation_id: evict-1405
        record_id: cache-record-1405
        maxmemory_bytes: 1073741824
        policy: allkeys-lfu
        durable_copy_id: record-1405
        durable_copy_available: true
      delete_operation_asserted: false
    related_node_ids:
      - MemoryExpiration
      - MemoryEviction
      - MemoryRecord
      - MemoryRetentionPolicy
    related_relation_ids:
      - MemoryExpiration-marks_ineligible-MemoryRecord
      - MemoryExpiration-governed_by-MemoryRetentionPolicy
      - MemoryEviction-evicts-MemoryRecord
    expected_result:
      zh: 查询分别返回时间到期与容量驻留两个原因，不推断墓碑。
      en: The query returns temporal expiry and capacity residency as separate reasons and infers no tombstone.
      ja: queryはtemporal expiry/capacity residencyを別reasonで返しtombstoneを推論しません。
    why_valid_or_invalid:
      zh: TTL 到时只改变检索资格并等待物理删除；容量驱逐只移除可重载缓存副本，两者都不自动证明显式删除或墓碑。
      en: Trigger, effect, and durable-copy state are distinct.
      ja: TTL 到達は検索適格性を変えて物理削除を待つだけで、容量 eviction は再読込可能 cache copy を除くため、どちらも明示 delete や tombstone を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-011
  - id: memory-lifecycle-cq-disposition-boundary
    kind: boundary
    labels:
      zh: 处置区分边界例
      en: Disposition distinction boundary case
      ja: disposition distinction境界例
    scenario_id: null
    descriptions:
      zh: 缓存驱逐仅因 allkeys-lfu 发生，却被标为 MemoryDelete 并自动生成删除墓碑。
      en: A cache eviction caused only by allkeys-lfu is labeled MemoryDelete and automatically creates a deletion tombstone.
      ja: allkeys-lfuだけによるcache evictionをMemoryDeleteとlabelしdelete tombstoneを自動生成しています。
    field_values:
      eviction_operation_id: evict-1406
      evicted_cache_key: tenant-7:user-42:recent-searches
      eviction_policy: allkeys-lfu
      maxmemory_exceeded: true
      durable_record_id: record-searches-44
      durable_invalidation_evidence_present: false
      incorrect_delete_operation_id: delete-1406
      incorrect_tombstone_id: tombstone-1406
      validation_decision: retain-eviction-reject-delete-and-tombstone
    related_node_ids:
      - MemoryEviction
      - MemoryDelete
      - MemoryTombstone
    related_relation_ids:
      - MemoryEviction-evicts-MemoryRecord
      - MemoryDelete-invalidates-MemoryRecord
      - MemoryDelete-produces-MemoryTombstone
    expected_result:
      zh: 验证器拒绝 Delete 与 Tombstone 断言，只保留 Eviction。
      en: Validation rejects the Delete and Tombstone assertions and retains only Eviction.
      ja: validatorはDelete/Tombstone assertionを拒否しEvictionだけ保持します。
    why_valid_or_invalid:
      zh: allkeys-lfu 只依据内存压力移除缓存键；没有持久记录失效证据时，不能构造 MemoryDelete 或 MemoryTombstone。
      en: Capacity removal does not prove durable-record invalidation.
      ja: allkeys-lfu は memory pressure により cache key を除くだけで、durable record の無効化証拠がなければ MemoryDelete や MemoryTombstone を生成できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-lifecycle-012
  - id: memory-lifecycle-cq-conflict-positive
