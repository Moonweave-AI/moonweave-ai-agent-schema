schema: moonweave.ai/ontology-node/v1
id: memory-lifecycle
kind: module
labels:
  zh: 记忆生命周期
  en: Memory lifecycle
  ja: 記憶ライフサイクル
semantics:
  short_definition:
    zh: 描述记忆如何写入、更新、衰减与删除。
    en: Describes how memories are written, updated, decayed, and deleted.
    ja: 記憶の書込・更新・減衰・削除を記述します。
  definition:
    zh: 记忆生命周期以 MemoryOperation 为活动根，拥有候选准入、不可变版本修订、多记录合并、到期驱逐、删除与冲突解决等活动链。每次操作由 operation_id、发生时间、输入、原因与结果识别；MemoryOperationResult、MemoryAuditEvent 与 MemoryConflictResolutionDecision 作为活动产生的可审计信息挂接其上。MemoryItem、MemoryRecord、MemoryStore 与保留策略仅被引用而不重新拥有。摄取、分块、嵌入与检索可能触发生命周期活动，但不属于本模块子类。
    en: Memory lifecycle anchors on MemoryOperation and owns activity chains for candidate admission, immutable version revision, multi-record merge, expiry eviction, deletion, and conflict resolution. Each operation is identified by operation_id, occurrence time, inputs, cause, and outcome; MemoryOperationResult, MemoryAuditEvent, and MemoryConflictResolutionDecision attach as auditable information. MemoryItem, MemoryRecord, MemoryStore, and retention policy are referenced, not re-owned. Ingestion, chunking, embedding, and retrieval may trigger lifecycle activities but are not subclasses here.
    ja: 記憶ライフサイクルは MemoryOperation を activity root とし、候補受入、不変版改訂、複数レコードマージ、期限退避、削除、競合解決の activity chain を所有します。各操作は operation_id、発生時刻、入力、原因、結果で識別し、MemoryOperationResult・MemoryAuditEvent・MemoryConflictResolutionDecision を監査可能情報として付与します。MemoryItem・MemoryRecord・MemoryStore・保持方針は参照のみ。取込・chunking・embedding・検索は trigger し得ますが subtype ではありません。
  why_needed:
    zh: 没有生命周期审计，团队无法解释“这条记忆何时写入、被哪次更新替代、为何删除或降权”。同一业务键的多条记录会靠时间戳猜测替代关系，过期策略也无法证明是否真正执行，用户要求遗忘时也可能只删索引不删持久记录。
    en: Without lifecycle audit, teams cannot explain when a memory was written, which update superseded it, or why it was deleted or downweighted. Multiple records for one business key get supersession guessed from timestamps, expiry policies cannot be proven executed, and user forget requests may delete indexes but not persistent records.
    ja: ライフサイクル監査がなければ、いつ書込まれたか、どの更新が置換したか、なぜ削除・減重されたか説明できません。同一 business key の複数 record は時刻推測になり、期限方針の実行も証明できず、忘却要求で索引だけ消えることもあります。
  includes:
    - zh: MemoryWrite、MemoryUpdate、MemoryMerge、MemoryDelete、MemoryEvict、MemoryExpiration、MemoryDecay 等可判定操作及其结果。
      en: Testable operations such as MemoryWrite, MemoryUpdate, MemoryMerge, MemoryDelete, MemoryEvict, MemoryExpiration, and MemoryDecay with their results.
      ja: MemoryWrite・MemoryUpdate・MemoryMerge・MemoryDelete・MemoryEvict・MemoryExpiration・MemoryDecay 等の判定可能操作と結果。
    - zh: MemoryOperationResult、MemoryAuditEvent、MemoryConflict 与 MemoryConflictResolutionDecision 等活动信息与冲突状态。
      en: Activity information such as MemoryOperationResult, MemoryAuditEvent, MemoryConflict, and MemoryConflictResolutionDecision.
      ja: MemoryOperationResult・MemoryAuditEvent・MemoryConflict・MemoryConflictResolutionDecision 等の activity 情報と競合状態。
  excludes:
    - zh: MemoryItem、MemoryRecord、MemoryStore、MemoryNamespace 的持久身份与存储结构；IndexBuildRun 与 RetrievalRun；ContextPackage 组装。
      en: Persistent identity and storage structure of MemoryItem, MemoryRecord, MemoryStore, and MemoryNamespace; IndexBuildRun and RetrievalRun; ContextPackage assembly.
      ja: MemoryItem・MemoryRecord・MemoryStore・MemoryNamespace の永続 identity と storage 構造、IndexBuildRun・RetrievalRun、ContextPackage 組み立て。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 Mem0 PUT/DELETE /v1/memories/{id}、Letta archival/core block 更新与删除、LangGraph store.delete 与 TTLConfig、以及 Generative Agents 式 recency 衰减评分。规范（保留策略、合并规则）与一次操作发生事实（operation_id、消费/产出 record）必须分开；DELETE 成功必须产生可审计的 tombstone 或 invalidation 事实，不能只移除检索可见性。
    en: Integrations should map Mem0 PUT/DELETE /v1/memories/{id}, Letta archival/core block updates and deletes, LangGraph store.delete with TTLConfig, and Generative Agents-style recency decay scoring separately. Specifications (retention policy, merge rules) must stay distinct from one operation occurrence (operation_id, consumed/produced records). Successful DELETE must yield an auditable tombstone or invalidation fact, not merely remove retrieval visibility.
    ja: 統合では Mem0 PUT/DELETE /v1/memories/{id}、Letta archival/core block 更新・削除、LangGraph store.delete と TTLConfig、Generative Agents 型 recency 減衰を個別写像します。仕様と一回の operation 発生事実を分離し、DELETE 成功は tombstone/invalidate 事実を残し、検索不可だけでは不十分です。
  typical_input:
    - description: Mem0 update memory — PUT replaces text/metadata for an existing memory id.
      format: |
        PUT https://api.mem0.ai/v1/memories/{memory_id}/
        {
          "text": "Prefers TypeScript and strict null checks.",
          "metadata": {"category": "preferences", "confidence": 0.92}
        }
      source_claims: [claim-memory-lifecycle-mem0]
    - description: Mem0 delete memory — DELETE removes a memory by id with auditable API response.
      format: |
        DELETE https://api.mem0.ai/v1/memories/{memory_id}/
        # => {"message": "Memory deleted successfully!"}
      source_claims: [claim-memory-lifecycle-mem0]
    - description: Letta archival delete — remove an out-of-window passage by search then delete tool.
      format: |
        # Search then delete by id/label returned from archival_memory_search
        archival_memory_search(query="JWT refresh rotation")
        archival_memory_delete(id="archival-passage-42")
      source_claims: [claim-memory-lifecycle-letta]
    - description: LangGraph store delete — remove a namespace-key Item from BaseStore.
      format: |
        await store.delete(
          ("tenant-7", "user-42", "preferences"),
          "response-language"
        )
        # Optional TTL on put:
        await store.put(ns, key, value, ttl=86400)
      source_claims: [claim-memory-lifecycle-langgraph]
    - description: Generative Agents recency scoring — exponential decay reweights stale observations at retrieval time.
      format: |
        # recency(i) = 0.99 ** hours_since_last_access(i)
        # combined with importance and relevance when ranking memory stream
        recency_score = 0.99 ** hours_since(last_access_at, now)
        retrieval_weight = alpha * recency_score + beta * importance + gamma * relevance
      source_claims: [claim-memory-lifecycle-generative-agents]
  typical_output:
    - description: Moonweave-local lifecycle operation record — consumed/produced records with explicit invalidation or tombstone.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "operation_id": "delete-310",
          "operation_type": "MemoryDelete",
          "occurred_at": "2026-07-16T09:15:00Z",
          "consumed_record_id": "record-310-v2",
          "produced_tombstone_id": "tombstone-310",
          "invalidation_reason": "user-forget-request",
          "retention_policy_ref": "policy-user-memory@v5"
        }
      source_claims: [claim-memory-lifecycle-design]
  reference_implementations:
    - name: Mem0 Memory API
      url: https://docs.mem0.ai
      description: PUT and DELETE /v1/memories/{id}/ for update and deletion.
    - name: Letta Archival Memory
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      description: archival_memory_delete and core block replacement lifecycle.
    - name: LangGraph Store
      url: https://langchain-ai.github.io/langgraph/reference/store/
      description: BaseStore.delete and TTLConfig expiry behavior.
    - name: Generative Agents Paper
      url: https://arxiv.org/abs/2304.03442
      description: Memory stream recency decay with 0.99 hourly factor at retrieval.
structure:
  identity_keys: [operation_id, operation_type, occurred_at]
  fields:
    - id: operation_id
      labels: {zh: 操作标识, en: Operation identifier, ja: 操作識別子}
      definitions:
        zh: 唯一标识一次 MemoryOperation 发生，不同于 MemoryRecord 或外部 API memory_id，但可引用后者。
        en: Uniquely identifies one MemoryOperation occurrence, distinct from MemoryRecord or external API memory_id though it may reference them.
        ja: 一回の MemoryOperation 発生を一意識別。MemoryRecord や外部 API memory_id とは別ですが参照可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: delete-310
      allowed_values: []
      source_claims: [claim-memory-lifecycle-design]
    - id: operation_type
      labels: {zh: 操作类型, en: Operation type, ja: 操作種別}
      definitions:
        zh: 可判定的生命周期活动种类，如 MemoryWrite、MemoryUpdate、MemoryDelete、MemoryEvict、MemoryDecay。
        en: Adjudicable lifecycle activity kind such as MemoryWrite, MemoryUpdate, MemoryDelete, MemoryEvict, or MemoryDecay.
        ja: MemoryWrite・MemoryUpdate・MemoryDelete・MemoryEvict・MemoryDecay 等の判定可能 lifecycle activity 種別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: MemoryDelete
      allowed_values: [MemoryWrite, MemoryUpdate, MemoryMerge, MemoryDelete, MemoryEvict, MemoryExpiration, MemoryDecay, MemoryDiscard, MemoryConsolidation]
      source_claims: [claim-memory-lifecycle-design]
    - id: occurred_at
      labels: {zh: 发生时间, en: Occurrence time, ja: 発生時刻}
      definitions:
        zh: 操作完成或登记为完成的时间戳；不能单独证明版本替代，需配合 predecessor 或 invalidation 事实。
        en: Timestamp when the operation completed or was recorded complete; alone does not prove supersession—requires predecessor or invalidation facts.
        ja: 操作完了または完了登録の timestamp。単独では版置換を証明せず、predecessor/invalidate 事実が必要。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T09:15:00Z
      allowed_values: []
      source_claims: [claim-memory-lifecycle-design]
    - id: external_memory_id
      labels: {zh: 外部记忆标识, en: External memory identifier, ja: 外部記憶識別子}
      definitions:
        zh: Mem0 等托管 API 返回的 memory_id；Moonweave 操作必须映射到内部 record/tombstone，不能只保留外部 ID。
        en: memory_id returned by hosted APIs such as Mem0; Moonweave operations must map to internal record/tombstone, not external ID alone.
        ja: Mem0 等 API が返す memory_id。Moonweave 操作は内部 record/tombstone へ写像必須で、外部 ID のみ不可。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mem0-8f3c2a1b
      allowed_values: []
      source_claims: [claim-memory-lifecycle-mem0]
    - id: consumed_record_id
      labels: {zh: 消费记录标识, en: Consumed record identifier, ja: 消費レコード識別子}
      definitions:
        zh: 本次操作读取或失效的 MemoryRecord 版本；Update/Merge/Delete 必须绑定至少一条 consumed record。
        en: MemoryRecord version read or invalidated by this operation; Update/Merge/Delete must bind at least one consumed record.
        ja: 今回操作が読取または無効化した MemoryRecord 版。Update/Merge/Delete は consumed record 必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: record-310-v2
      allowed_values: []
      source_claims: [claim-memory-lifecycle-design]
    - id: produced_record_id
      labels: {zh: 产出记录标识, en: Produced record identifier, ja: 生成レコード識別子}
      definitions:
        zh: Write/Update/Merge 成功产生的新 MemoryRecord 版本；必须显式 predecessor_id 指向 consumed 版本。
        en: New MemoryRecord version produced by successful Write/Update/Merge; must carry explicit predecessor_id to consumed version.
        ja: Write/Update/Merge 成功で生成した新 MemoryRecord 版。consumed 版への明示 predecessor_id 必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: record-310-v3
      allowed_values: []
      source_claims: [claim-memory-lifecycle-design]
    - id: tombstone_id
      labels: {zh: 墓碑标识, en: Tombstone identifier, ja: 墓碑識別子}
      definitions:
        zh: Delete 成功产生的删除证据对象，证明记录不可再被当作当前有效版本使用。
        en: Deletion-evidence object produced on successful Delete, proving the record must not be used as the current valid version.
        ja: Delete 成功で生成する削除証拠。record を現行有効版として使えないことを示します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: tombstone-310
      allowed_values: []
      source_claims: [claim-memory-lifecycle-design]
    - id: ttl_seconds
      labels: {zh: TTL 秒数, en: TTL seconds, ja: TTL 秒数}
      definitions:
        zh: LangGraph BaseStore 等后端在 put 时声明的存活秒数；到期触发 MemoryExpiration 而非静默丢失。
        en: Survival seconds declared on put in backends such as LangGraph BaseStore; expiry triggers MemoryExpiration rather than silent loss.
        ja: LangGraph BaseStore 等 put 時に宣言する存続秒数。期限切れは MemoryExpiration を trigger し、静默消失ではありません。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 86400
      allowed_values: []
      source_claims: [claim-memory-lifecycle-langgraph]
    - id: recency_decay_factor
      labels: {zh: 新近度衰减因子, en: Recency decay factor, ja: 新近度減衰係数}
      definitions:
        zh: Generative Agents 式每小时衰减底数，默认 0.99；用于 MemoryDecay 重加权而非物理删除。
        en: Hourly decay base in Generative Agents style, default 0.99; used for MemoryDecay reweighting rather than physical deletion.
        ja: Generative Agents 型の時間当たり減衰底、既定 0.99。物理削除ではなく MemoryDecay 再重み付け用。
      datatype: number
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 0.99
      allowed_values: []
      source_claims: [claim-memory-lifecycle-generative-agents]
  constraints:
    - id: delete-requires-tombstone
      severity: error
      expression_language: plain
      expression: A successful MemoryDelete must produce a tombstone or explicit invalidation fact referencing the consumed record; index-only removal is insufficient.
      explanation:
        zh: 只删向量索引会留下无法审计的“幽灵记忆”。
        en: Deleting only the vector index leaves unauditable ghost memories.
        ja: ベクトル索引だけ削除すると監査不能な ghost memory が残ります。
      source_claims: [claim-memory-lifecycle-design]
    - id: supersession-requires-predecessor
      severity: error
      expression_language: plain
      expression: MemoryUpdate or MemoryMerge producing a new record must declare predecessor_id; later occurred_at alone cannot establish supersession.
      explanation:
        zh: 写入先后只说明时间顺序，不能证明同一业务记忆的替代。
        en: Write order shows chronology only, not replacement within one business-memory lineage.
        ja: 書込順は時系列のみで、同一業務記憶系列の置換を証明しません。
      source_claims: [claim-memory-lifecycle-design]
    - id: ttl-triggers-expiration-operation
      severity: warning
      expression_language: plain
      expression: TTL expiry must be modeled as MemoryExpiration governed by retention policy, not as silent record disappearance.
      explanation:
        zh: 静默过期无法回答保留策略是否执行以及何时失效。
        en: Silent expiry cannot answer whether retention policy ran or when invalidation occurred.
        ja: 静默期限切れでは保持方針実行と失効時刻を答えられません。
      source_claims: [claim-memory-lifecycle-langgraph, claim-memory-lifecycle-design]
  required_relations: []
examples:
  - id: memory-lifecycle-example-mem0-update
    labels:
      zh: Mem0 更新记忆
      en: Mem0 memory update
      ja: Mem0 記憶更新
    descriptions:
      zh: Alice 的语言偏好从 “Prefers TypeScript” 更新为包含 strict null checks。应用调用 PUT /v1/memories/{memory_id}/ 提交新 text 与 metadata；Moonweave 将此外部更新映射为 MemoryUpdate，消费 record-310-v1 并产出 record-310-v2，且 predecessor_id 指向 v1。
      en: Alice's language preference updates from "Prefers TypeScript" to include strict null checks. The app calls PUT /v1/memories/{memory_id}/ with new text and metadata; Moonweave maps this to MemoryUpdate consuming record-310-v1 and producing record-310-v2 with predecessor_id pointing to v1.
      ja: Alice の言語選好が “Prefers TypeScript” から strict null checks 含みへ更新。PUT /v1/memories/{memory_id}/ を呼び、Moonweave は MemoryUpdate として record-310-v1 消費・record-310-v2 生成、predecessor_id=v1 を記録。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: PUT /v1/memories/{memory_id}/
    field_values:
      external_memory_id: mem0-8f3c2a1b
      operation_type: MemoryUpdate
      prior_text: Prefers TypeScript for code examples.
      new_text: Prefers TypeScript and strict null checks.
      consumed_record_id: record-310-v1
      produced_record_id: record-310-v2
    related_node_ids:
      - memory-lifecycle
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-lifecycle-mem0
      - claim-memory-lifecycle-design
  - id: memory-lifecycle-example-mem0-delete
    labels:
      zh: Mem0 删除记忆
      en: Mem0 memory deletion
      ja: Mem0 記憶削除
    descriptions:
      zh: 用户请求遗忘某条偏好后，应用调用 DELETE /v1/memories/{memory_id}/。Mem0 返回删除成功；Moonweave 必须登记 MemoryDelete、消费 record-310-v2 并产生 tombstone-310，而不是仅让后续 search 返回空结果。
      en: After a user forget request, the app calls DELETE /v1/memories/{memory_id}/. Mem0 returns success; Moonweave must record MemoryDelete, consume record-310-v2, and produce tombstone-310—not merely empty later search results.
      ja: ユーザー忘却要求後、DELETE /v1/memories/{memory_id}/ を呼び Mem0 が成功返却。Moonweave は MemoryDelete を登録し record-310-v2 消費・tombstone-310 生成必須。後続 search 空だけでは不十分。
    example_source:
      product: Mem0
      url: https://docs.mem0.ai
      version: DELETE /v1/memories/{memory_id}/
    field_values:
      external_memory_id: mem0-8f3c2a1b
      operation_type: MemoryDelete
      consumed_record_id: record-310-v2
      tombstone_id: tombstone-310
      invalidation_reason: user-forget-request
    related_node_ids:
      - memory-lifecycle
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-lifecycle-mem0
      - claim-memory-lifecycle-design
  - id: memory-lifecycle-example-letta-archival-delete
    labels:
      zh: Letta 归档删除
      en: Letta archival deletion
      ja: Letta アーカイブ削除
    descriptions:
      zh: 智能体发现 archival 中过时的 API 摘要，先 archival_memory_search 定位 passage，再 archival_memory_delete 移除。该操作针对区外归档层，不影响 core human/persona 块；Moonweave 将其建模为 MemoryDelete 并绑定 archival record 身份。
      en: The agent finds a stale API summary in archival, locates the passage via archival_memory_search, then removes it with archival_memory_delete. This targets out-of-window archival, not core human/persona blocks; Moonweave models it as MemoryDelete bound to the archival record identity.
      ja: エージェントが archival の古い API 要約を archival_memory_search で特定し archival_memory_delete で削除。window 外 archival が対象で core human/persona block には非影響。Moonweave は MemoryDelete として archival record identity に binding。
    example_source:
      product: Letta
      url: https://docs.letta.com/guides/core-concepts/memory/archival-memory
      version: archival_memory_delete
    field_values:
      search_query: JWT refresh rotation
      deleted_passage_id: archival-passage-42
      storage_tier: archival
      core_blocks_unchanged: true
    related_node_ids:
      - memory-lifecycle
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-lifecycle-letta
      - claim-memory-lifecycle-design
  - id: memory-lifecycle-example-langgraph-delete-ttl
    labels:
      zh: LangGraph 删除与 TTL
      en: LangGraph delete and TTL
      ja: LangGraph 削除と TTL
    descriptions:
      zh: 应用在 BaseStore 上对 ("tenant-7","user-42","preferences")/response-language 调用 delete 立即移除 Item；另一条记录 put 时设置 ttl=86400，到期后由存储后端标记不可读，Moonweave 将其登记为 MemoryExpiration 而非静默消失。
      en: The app calls delete on ("tenant-7","user-42","preferences")/response-language in BaseStore to remove the Item immediately; another record is put with ttl=86400 and becomes unreadable on expiry—Moonweave records MemoryExpiration rather than silent disappearance.
      ja: BaseStore で ("tenant-7","user-42","preferences")/response-language を delete 即時削除。別 record は ttl=86400 で put し期限後 unreadable—Moonweave は静默消失ではなく MemoryExpiration を記録。
    example_source:
      product: LangGraph
      url: https://langchain-ai.github.io/langgraph/reference/store/
      version: BaseStore.delete and TTLConfig
    field_values:
      namespace:
        - tenant-7
        - user-42
        - preferences
      key: response-language
      delete_operation_id: delete-lang-17
      ttl_seconds: 86400
      expiration_operation_type: MemoryExpiration
    related_node_ids:
      - memory-lifecycle
      - memory-stores-scopes
    related_relation_ids: []
    source_claims:
      - claim-memory-lifecycle-langgraph
      - claim-memory-lifecycle-design
  - id: memory-lifecycle-example-generative-agents-decay
    labels:
      zh: Generative Agents 新近度衰减
      en: Generative Agents recency decay
      ja: Generative Agents 新近度減衰
    descriptions:
      zh: 模拟小镇智能体在检索记忆流时，对 48 小时未访问的观察应用 recency = 0.99^48 重加权，使其排名下降但仍保留记录。Moonweave 登记 MemoryDecay 操作与新的 retrieval weight，而不是直接删除或覆盖 MemoryRecord 内容。
      en: In a simulated town agent retrieving the memory stream, an observation unused for 48 hours gets reweighted with recency = 0.99^48, lowering rank while retaining the record. Moonweave records a MemoryDecay operation and new retrieval weight without deleting or overwriting MemoryRecord content.
      ja: 模拟 town エージェントが memory stream 検索時、48 時間未アクセス观察に recency=0.99^48 を適用し rank 低下させつつ record 保持。Moonweave は MemoryDecay と新 retrieval weight を記録し、MemoryRecord 内容の削除・上書きはしません。
