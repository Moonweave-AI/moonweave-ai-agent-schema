schema: moonweave.ai/ontology-node/v1
id: ChunkMetadata
kind: concept
status: accepted
labels:
  zh: 分块元数据
  en: Chunk metadata
  ja: チャンクメタデータ
semantics:
  short_definition:
    zh: 描述一个 Chunk 的来源、边界、顺序和处理属性的结构化记录。
    en: Structured record that describes a Chunk's source, boundary, order, and processing attributes.
    ja: Chunk の source・boundary・order・processing attribute を記述する structured record。
  definition:
    zh: >
      ChunkMetadata 是附着到一个 Chunk 的描述性信息，记录其来源文档版本、字符或 token 范围、在分割结果中的顺序和内容摘要。
      它不承载 Chunk 正文，不等于 ChunkProvenance 的完整变换谱系，也不是 RetrievedCandidate、IndexEntry 或用于生成块的活动。
    en: >
      ChunkMetadata is descriptive information attached to one Chunk. It records the source document
      version, character or token range, split order, and content digest. It does not carry the Chunk
      body, is not the full transformation lineage of ChunkProvenance, and is neither a RetrievedCandidate,
      IndexEntry, nor the activity that created a chunk.
    ja: >
      ChunkMetadata は一つの Chunk に付く記述情報です。source document version、character・token range、split order、
      content digest を記録します。Chunk body を担わず、ChunkProvenance の完全 transformation lineage でもなく、
      RetrievedCandidate・IndexEntry・chunk を作る activity でもありません。
  why_needed:
    zh: 检索、引用和重新切分需要知道块来自哪个版本、覆盖哪里以及是否仍与正文匹配，而无需复制正文。
    en: Retrieval, citation, and re-chunking need to know which version a chunk came from, what it covers, and whether it still matches the body without copying that body.
    ja: retrieval・citation・re-chunking は、body を複写せずに chunk の source version・coverage・body との一致を知る必要があります。
  includes:
    - zh: source_document_ref、source_span、chunk_ordinal、content_digest 和用于解释它们的版本化元数据。
      en: source_document_ref, source_span, chunk_ordinal, content_digest, and versioned metadata that explains them.
      ja: source_document_ref、source_span、chunk_ordinal、content_digest と、それらを説明する versioned metadata。
  excludes:
    - zh: Chunk.text 正文、生成语境说明、跨摄入和分割活动的完整谱系、检索分数以及向量数组。
      en: Chunk.text body, generated context notes, full lineage across ingestion and chunking activities, retrieval scores, and vector arrays.
      ja: Chunk.text body、generated context note、ingestion・chunking activity をまたぐ full lineage、retrieval score、vector array。
  semantic_kind: information
  aliases: [chunk attributes, chunk descriptor, 分块属性]
engineering:
  explanation:
    zh: >
      文档解析器将文档分成节点时会把文档属性传给子节点。系统为每个块保存来源引用、起止位置和正文摘要，
      以便在不复制正文的情况下定位和验证它。
    en: >
      A document parser splits a document into nodes while inheriting document attributes to children.
      The system saves a source reference, start/end position, and body digest for each chunk so it can
      locate and verify it without duplicating the body.
    ja: >
      文書パーサーは文書をノードへ分割するとき、文書属性を子ノードへ引き継ぎます。各 Chunk について出所参照、範囲、本文 digest を記録し、本文を複製せず位置特定と検証に利用できるようにします。
  typical_input:
    - description: Parser output with a source span
      format: |
        {
          "chunk_id": "chunk-install-04",
          "source_document_ref": "docs/install.md@sha256:91af",
          "source_span": {"unit":"character","start":1024,"end_exclusive":1536},
          "chunk_ordinal": 4
        }
  typical_output:
    - description: Attached metadata record
      format: |
        {
          "metadata_id": "metadata-chunk-install-04",
          "chunk_id": "chunk-install-04",
          "content_digest": "sha256:6b37",
          "source_document_ref": "docs/install.md@sha256:91af",
          "source_span": {"unit":"character","start":1024,"end_exclusive":1536},
          "chunk_ordinal": 4
        }
  reference_implementations:
    - name: LlamaIndex node parsers
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
      description: Documents chunking a parent document into child nodes that inherit document attributes and metadata.
structure:
  identity_keys: [metadata_id]
  fields:
    - id: metadata_id
      labels: {zh: 元数据标识, en: metadata ID, ja: metadata ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一个特定 Chunk 版本的描述记录。
        en: Stably identifies one descriptive record for a particular Chunk version.
        ja: 特定 Chunk version の一つの descriptive record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: metadata-chunk-install-04
      source_claims: [claim-chunk-metadata-node-attributes]
    - id: chunk_id
      labels: {zh: 分块标识, en: chunk ID, ja: chunk ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向被描述的 Chunk，而不是检索候选或索引条目。
        en: Points to the described Chunk rather than a retrieved candidate or index entry.
        ja: retrieved candidate・index entry ではなく、記述対象の Chunk を指します。
      allowed_values: []
      pattern: null
      example_value: chunk-install-04
      source_claims: [claim-chunk-metadata-node-attributes]
    - id: source_document_ref
      labels: {zh: 来源文档引用, en: source document reference, ja: source document reference}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识块继承属性的文档版本或不可变来源快照。
        en: Identifies the document version or immutable source snapshot from which the chunk inherits attributes.
        ja: chunk が attribute を継承する document version または immutable source snapshot を識別します。
      allowed_values: []
      pattern: null
      example_value: docs/install.md@sha256:91af
      source_claims: [claim-chunk-metadata-node-attributes]
    - id: source_span
      labels: {zh: 来源范围, en: source span, ja: source span}
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在声明单位中界定块覆盖的起点和排他终点，支持精确引用和更新检测。
        en: Delimits the chunk's start and exclusive end in a declared unit, supporting precise citation and update detection.
        ja: 宣言 unit の start と exclusive end で chunk coverage を区切り、正確な citation・update detection を支えます。
      allowed_values: []
      pattern: null
      example_value: '{"unit":"character","start":1024,"end_exclusive":1536}'
      source_claims: [claim-chunk-metadata-boundary]
    - id: chunk_ordinal
      labels: {zh: 块序号, en: chunk ordinal, ja: chunk ordinal}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识块在同一来源版本和分割输出中的顺序，而非检索排名。
        en: Identifies chunk order within one source version and split output, not a retrieval rank.
        ja: 一つの source version と split output 内の chunk order を識別し、retrieval rank ではありません。
      allowed_values: []
      pattern: null
      example_value: 4
      source_claims: [claim-chunk-metadata-boundary]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: content digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 用于验证被引用 Chunk 正文未变化的摘要，不取代或展示正文。
        en: Digest used to verify that the referenced Chunk body has not changed without replacing or displaying the body.
        ja: referenced Chunk body が変化していないことを検証する digest であり、body を置換・表示しません。
      allowed_values: []
      pattern: null
      example_value: sha256:6b37
      source_claims: [claim-chunk-metadata-boundary]
  constraints:
    - id: chunk-metadata-describes-not-carries-body
      severity: error
      expression_language: plain
      expression: ChunkMetadata must reference one Chunk and may record source/version/boundary attributes, but must not be used as the canonical carrier of Chunk.text or a generated context_note.
      explanation:
        zh: 描述块的记录不能代替内容块，也不能掩盖生成语境与原文之间的边界。
        en: A record describing a chunk cannot replace the content artifact or hide the boundary between generated context and source text.
        ja: chunk を記述する record は content artifact を置換できず、generated context と source text の境界を隠せません。
      source_claims: [claim-chunk-metadata-boundary]
    - id: chunk-metadata-span-integrity
      severity: error
      expression_language: plain
      expression: source_span must have a declared unit, non-negative start, and end_exclusive greater than start, and content_digest must correspond to the referenced Chunk version.
      explanation:
        zh: 可引用范围和正文摘要必须共同指向同一来源版本，不能将旧范围与新正文拼接。
        en: Citable span and body digest must identify the same source version; an old span cannot be paired with a new body.
        ja: citable span と body digest は同じ source version を示し、古い span と新しい body を組合せられません。
      source_claims: [claim-chunk-metadata-boundary]
  required_relations: []
examples:
  - id: chunk-metadata-positive-example

    labels: {zh: 安装文档块元数据, en: Installation-document chunk metadata, ja: Installation-document chunk metadata}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values: {metadata_id: metadata-chunk-install-04, chunk_id: chunk-install-04, source_document_ref: docs/install.md@sha256:91af, source_span: '{"unit":"character","start":1024,"end_exclusive":1536}', chunk_ordinal: 4, content_digest: sha256:6b37}
    related_node_ids: [ChunkMetadata, Chunk]
    related_relation_ids: [ChunkMetadata-part-of-Chunk]

    source_claims: [claim-chunk-metadata-node-attributes]
  - id: chunk-metadata-boundary-example

    labels: {zh: 原始内容块, en: Raw content chunk, ja: Raw content chunk}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values: {chunk_id: chunk-install-04, source_document_ref: docs/install.md@sha256:91af, content_digest: sha256:6b37}
    related_node_ids: [ChunkMetadata, Chunk]
    related_relation_ids: [ChunkMetadata-part-of-Chunk]

    source_claims: [claim-chunk-metadata-boundary]
  - id: chunk-metadata-counterexample-example

    labels: {zh: 摘要和范围属于不同版本, en: Digest and span from different versions, ja: Digest and span from different versions}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values: {metadata_id: metadata-install-oldspan, chunk_id: chunk-install-04, source_document_ref: docs/install.md@sha256:91af, source_span: '{"unit":"character","start":1024,"end_exclusive":1536}', content_digest: sha256:updated-body}
    related_node_ids: [ChunkMetadata, ChunkProvenance, Chunk]
    related_relation_ids: []

    source_claims: [claim-chunk-metadata-boundary]
  - id: chunk-metadata-instance-example

    labels: {zh: 实例：认证块元数据, en: "Instance: authentication-chunk metadata", ja: "Instance: authentication-chunk metadata"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values: {metadata_id: metadata-auth-07, chunk_id: chunk-api-auth-07, source_document_ref: docs/auth.md@sha256:02bd, source_span: '{"unit":"character","start":4096,"end_exclusive":4608}', chunk_ordinal: 7, content_digest: sha256:08a4}
    related_node_ids: [ChunkMetadata, Chunk, ChunkProvenance]
    related_relation_ids: [ChunkMetadata-part-of-Chunk]

    source_claims: [claim-chunk-metadata-node-attributes]
parent_relation:
  id: ChunkMetadata-part-of-Chunk
  predicate: part_of
  target: concept:Chunk
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是分块的元数据组成部分, en: is metadata component of chunk, ja: Chunk の metadata component である}
  definitions:
    zh: ChunkMetadata 描述并随一个 Chunk 版本存在，但不替代其正文。
    en: ChunkMetadata describes and exists with one Chunk version without replacing its body.
    ja: ChunkMetadata は一つの Chunk version を記述し共に存在しますが、body を置換しません。
  cardinality: {source: {min: 1, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_metadata, labels: {zh: 有元数据, en: has metadata, ja: metadata を持つ}}
  conditions: []
  temporal_scope: valid-time
  boundary_context: Metadata attachment does not make the Chunk itself a metadata record.
  constraints: []
  examples: []
  source_claims: [claim-chunk-metadata-part-of-chunk]
  distinct_fact_rationale: It gives descriptive attributes of a particular chunk version while the Chunk remains the canonical content fragment.
  layout_role: primary-backbone
relations: []
sources:
  - id: llamaindex-node-parsers
    title: LlamaIndex Node Parser Usage Pattern
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
    source_type: official-documentation
    relevance: Documents splitting a document into child nodes and inheriting parent attributes including metadata.
source_claims:
  - id: claim-chunk-metadata-node-attributes
    source: llamaindex-node-parsers
    supports: LlamaIndex node parsers split documents into child nodes and inherit document attributes, including metadata, supporting explicit chunk-level descriptive attributes linked to a parent source.
    locator: "Node Parser Usage Pattern: overview and standalone usage"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-chunk-metadata-boundary
    source: llamaindex-node-parsers
    supports: A parser-produced node remains a specific chunk of a parent document while inheriting attributes; Moonweave separately models its body, metadata, and full provenance so descriptive records cannot replace content or mix versions.
    locator: "Node Parser Usage Pattern: nodes are chunks of parent documents and inherit attributes"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-metadata-part-of-chunk
    source: llamaindex-node-parsers
    supports: Modeling descriptive attributes as a component of a specific chunk is a Moonweave composition inference derived from documented parent-document nodes and inherited metadata.
    locator: "Node Parser Usage Pattern: metadata inheritance to child nodes"
    evidence_kind: ontology-design-inference
    confidence: medium
