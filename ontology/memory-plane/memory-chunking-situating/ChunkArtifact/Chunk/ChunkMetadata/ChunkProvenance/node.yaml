schema: moonweave.ai/ontology-node/v1
id: ChunkProvenance
kind: concept
status: accepted
labels:
  zh: 分块来源谱系
  en: Chunk Provenance
  ja: チャンク来歴
semantics:
  short_definition:
    zh: 包含在一个 ChunkMetadata 记录中的、描述该分块版本来源—活动—输出链的谱系载荷。
    en: A lineage payload contained in one ChunkMetadata record that describes a chunk revision's source–activity–output chain.
    ja: 一つの ChunkMetadata record に含まれ、chunk revision の source–activity–output chain を記述する lineage payload。
  definition:
    zh: >
      ChunkProvenance 是 ChunkMetadata 的组成部分，而不是独立内容工件或处理活动。它为其所属元数据记录中的
      一个确定 Chunk 版本保存来源版本、按顺序的生成活动引用和输出内容摘要，以支持从当前分块回查输入来源和
      处理步骤。它不承载 Chunk 正文，不是 ChunkReference，也不会将后续生成的情境化或压缩文本追溯地宣称为
      原始 SourceSpan 的内容。
    en: >
      ChunkProvenance is a component of ChunkMetadata, not an independent content artifact or processing activity.
      For one determinate Chunk revision in its containing metadata record, it stores source version, ordered
      generating-activity references, and output content digest so a system can inspect the route from current chunk
      back to input source and processing steps. It carries no Chunk body, is not a ChunkReference, and cannot
      retroactively claim that later situated or compressed text was present in the original SourceSpan.
    ja: >
      ChunkProvenance は独立した内容成果物や処理活動ではなく、ChunkMetadata の構成要素です。所属する metadata
      record 内の一つの確定済み Chunk revision について、source version、順序付き generating-activity reference、
      output content digest を保存し、現在の chunk から input source と処理手順まで検査できるようにします。
      Chunk body を持たず、ChunkReference ではなく、後の situated または compressed text が元の SourceSpan に
      存在したと遡って主張することもできません。
  why_needed:
    zh: 仅有文件名或页面范围只能说明“在哪里”；可核查的来源—活动—输出链才能支持来源验证、陈旧分块检测和处理回滚。
    en: Filename or page range alone says only “where”; an inspectable source–activity–output chain enables source verification, stale-chunk detection, and processing rollback.
    ja: filename や page range だけでは「どこか」しか示せません。検査可能な source–activity–output chain により、source verification、stale-chunk detection、processing rollback が可能になります。
  includes:
    - zh: 所属 ChunkMetadata 的 lineage_id、目标分块版本、固定来源版本、按顺序的生成活动和输出摘要。
      en: The containing ChunkMetadata's lineage_id, subject chunk revision, pinned source version, ordered generating activities, and output digest.
      ja: 所属する ChunkMetadata の lineage_id、subject chunk revision、固定 source version、順序付き generating activities、output digest。
  excludes:
    - zh: 独立 ChunkArtifact、Chunk 正文、仅位置元数据、处理活动日志、来源指针或未关联实体与摘要的散乱事件列表。
      en: An independent ChunkArtifact, Chunk body, location-only metadata, processing-activity log, source pointer, or disconnected event list with no linked entities and digest.
      ja: 独立した ChunkArtifact、Chunk body、位置だけの metadata、processing-activity log、source pointer、または linked entity と digest を持たない分断イベント一覧。
  semantic_kind: metadata
  aliases: [chunk lineage, chunk derivation metadata, 分块血缘]
engineering:
  explanation:
    zh: PROV-O 将实体、活动、生成、使用和派生区分开。Moonweave 把这些可核查事实压缩为一个附着在 ChunkMetadata 上的谱系载荷，而不把该载荷误作活动或内容输出。
    en: PROV-O distinguishes entities, activities, generation, use, and derivation. Moonweave records the inspectable facts as one lineage payload attached to ChunkMetadata rather than mistaking that payload for an activity or content output.
    ja: PROV-O は entity、activity、generation、use、derivation を区別します。Moonweave は検査可能な事実を ChunkMetadata に付く一つの lineage payload として記録し、その payload を activity や content output と取り違えません。
  typical_input:
    - description: Ordered provenance facts for one chunk revision
      format: |
        {
          "subject_chunk_revision_ref": "situated-policy-4-2-03@v2",
          "source_version_ref": "docs/policy.md@v7",
          "producing_activity_refs": ["ingest-77", "chunk-81", "situate-84"],
          "output_content_digest": "sha256:9a72b2"
        }
  typical_output:
    - description: ChunkMetadata provenance payload
      format: |
        {
          "lineage_id": "lineage-policy-4-2-03",
          "metadata_ref": "chunk-metadata-policy-4-2-03",
          "subject_chunk_revision_ref": "situated-policy-4-2-03@v2",
          "source_version_ref": "docs/policy.md@v7",
          "producing_activity_refs": ["ingest-77", "chunk-81", "situate-84"],
          "output_content_digest": "sha256:9a72b2"
        }
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entities, activities, generation, use, derivation, and provenance descriptions.
structure:
  identity_keys: [lineage_id]
  fields:
    - id: lineage_id
      labels: {zh: 谱系标识, en: lineage ID, ja: lineage ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识所属 ChunkMetadata 内的一个可审计谱系载荷，不可复用为 Chunk 或运行标识。
        en: Identifies one auditable lineage payload within its containing ChunkMetadata and is not reused as a Chunk or run ID.
        ja: 所属 ChunkMetadata 内の一つの audit 可能な lineage payload を識別し、Chunk または run ID として再利用しません。
      allowed_values: []
      pattern: "^lineage-[A-Za-z0-9._-]+$"
      example_value: lineage-policy-4-2-03
      source_claims: [claim-chunk-provenance-chain]
    - id: subject_chunk_revision_ref
      labels: {zh: 目标分块版本引用, en: subject chunk revision reference, ja: subject chunk revision 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向所属元数据记录所描述的确定分块版本，而非一个未固定的逻辑分块名称。
        en: Points to the determinate chunk revision described by the containing metadata record rather than an unpinned logical chunk name.
        ja: 固定されていない論理 chunk 名ではなく、所属 metadata record が記述する確定済み chunk revision を指します。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]*@v[0-9]+(?:[A-Za-z0-9._-]*)$"
      example_value: situated-policy-4-2-03@v2
      source_claims: [claim-chunk-provenance-chain]
    - id: source_version_ref
      labels: {zh: 来源版本引用, en: source version reference, ja: 情報源版参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录该谱系链锚定的原始确定来源版本，不可用生成后文本反向替换。
        en: Records the original determinate source version anchoring the lineage chain and cannot be retroactively replaced with generated text.
        ja: lineage chain を固定する元の確定済み source version を記録し、generated text に遡って置き換えることはできません。
      allowed_values: []
      pattern: "^[^\\s]+@[^\\s]+$"
      example_value: docs/policy.md@v7
      source_claims: [claim-chunk-provenance-chain]
    - id: producing_activity_refs
      labels: {zh: 生成活动有序引用, en: ordered generating activity references, ja: 順序付き生成活動参照}
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 从来源到目标分块版本按发生顺序列出实际生成活动；读取、缓存命中或仅索引的活动不得加入此序列。
        en: Lists actual generating activities in occurrence order from source to subject chunk revision; reads, cache hits, or indexing-only activities must not be inserted.
        ja: source から subject chunk revision まで実際の generating activities を発生順に列挙し、read、cache hit、indexing-only activity は含めません。
      allowed_values: []
      pattern: null
      example_value: [ingest-77, chunk-81, situate-84]
      source_claims: [claim-chunk-provenance-chain]
    - id: output_content_digest
      labels: {zh: 输出内容摘要, en: output content digest, ja: 出力内容 digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 表示目标分块版本规范化内容的摘要，用于将谱系链绑定到具体输出。
        en: Digest of normalized subject-chunk content used to bind the lineage chain to a concrete output.
        ja: lineage chain を具体的な output に結び付けるための、正規化された subject-chunk 内容の digest。
      allowed_values: []
      pattern: "^[A-Za-z0-9._-]+:[A-Fa-f0-9]+$"
      example_value: sha256:9a72b2
      source_claims: [claim-chunk-provenance-integrity]
  constraints:
    - id: chunk-provenance-ordered-derivation
      severity: error
      expression_language: plain
      expression: ChunkProvenance requires one source_version_ref, a non-empty ordered producing_activity_refs sequence, one subject_chunk_revision_ref, and output_content_digest attributable to the final activity. The payload must remain contained in exactly one ChunkMetadata record.
      explanation:
        zh: 不能按顺序从来源走到当前输出的记录不是可审计谱系；没有所属元数据记录的独立对象也不是本概念。
        en: A record that cannot walk in order from source to current output is not auditable lineage; an independent object with no containing metadata record is not this concept either.
        ja: source から current output まで順に辿れない record は audit 可能な lineage ではなく、所属 metadata record のない独立 object もこの概念ではありません。
      source_claims: [claim-chunk-provenance-chain, claim-chunk-provenance-composition]
    - id: chunk-provenance-source-boundary
      severity: error
      expression_language: plain
      expression: Derived activities may create a new ChunkArtifact revision, but source_version_ref and the original source evidence must remain intact. ChunkProvenance must not claim that generated situating or compression text was present in the original source span.
      explanation:
        zh: 谱系可以记录派生，但不能用派生文本回写来源证据或扩大原始跨度。
        en: Lineage can record derivation but cannot use derived text to rewrite source evidence or enlarge the original span.
        ja: lineage は derivation を記録できますが、derived text で source evidence を書き換えたり元の span を拡大したりできません。
      source_claims: [claim-chunk-provenance-integrity]
  required_relations: []
examples:
  - id: chunk-provenance-example-positive-policy

    labels: {zh: 完整策略分块谱系, en: Complete policy-chunk lineage, ja: 完全な policy-chunk lineage}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values:
      lineage_id: lineage-policy-4-2-03
      subject_chunk_revision_ref: situated-policy-4-2-03@v2
      source_version_ref: docs/policy.md@v7
      producing_activity_refs: [ingest-77, chunk-81, situate-84]
      output_content_digest: sha256:9a72b2
    related_node_ids: [ChunkProvenance, ChunkMetadata, SituatedChunk]
    related_relation_ids: [ChunkProvenance-part_of-ChunkMetadata]

    source_claims: [claim-chunk-provenance-chain, claim-chunk-provenance-composition]
  - id: chunk-provenance-example-counterexample-disconnected-log

    labels: {zh: 无锚点的零散日志, en: Disconnected log, ja: 分断された log}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values:
      log_id: log-44
      source_version_ref: null
      producing_activity_refs: [chunked, retried, compressed]
      subject_chunk_revision_ref: null
      output_content_digest: null
    related_node_ids: [ChunkProvenance]
    related_relation_ids: []

    source_claims: [claim-chunk-provenance-chain]
  - id: chunk-provenance-example-boundary-location-metadata

    labels: {zh: 只有位置的分块元数据, en: Location-only chunk metadata, ja: 位置だけの chunk metadata}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values:
      metadata_id: metadata-policy-4-2-03
      source_version_ref: docs/policy.md@v7
      source_span: {unit: character, start: 1600, end_exclusive: 2400}
      producing_activity_refs: []
    related_node_ids: [ChunkProvenance, ChunkMetadata]
    related_relation_ids: []

    source_claims: [claim-chunk-provenance-chain]
  - id: chunk-provenance-example-instance-auth

    labels: {zh: 实例：认证分块谱系, en: "Instance: authentication chunk lineage", ja: "事例：認証 chunk lineage"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values:
      lineage_id: lineage-auth-07
      subject_chunk_revision_ref: chunk-api-auth-07@v1
      source_version_ref: docs/auth.md@v3
      producing_activity_refs: [ingest-auth-03, chunk-auth-07]
      output_content_digest: sha256:08a4
    related_node_ids: [ChunkProvenance, ChunkMetadata, Chunk]
    related_relation_ids: [ChunkProvenance-part_of-ChunkMetadata]
    source_claims: [claim-chunk-provenance-chain, claim-chunk-provenance-composition]
parent_relation:
  id: ChunkProvenance-part_of-ChunkMetadata
  predicate: part_of
  target: concept:ChunkMetadata
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是分块元数据的来源谱系组成部分
    en: is a provenance component of chunk metadata
    ja: チャンク metadata の来歴構成要素である
  definitions:
    zh: ChunkProvenance part_of ChunkMetadata，表示该谱系载荷由一个元数据记录承载，用于描述该记录所关联的分块版本，不能独立充当内容或活动实体。
    en: ChunkProvenance part_of ChunkMetadata means one metadata record contains this lineage payload to describe its associated chunk revision; the payload cannot independently act as content or activity entity.
    ja: ChunkProvenance part_of ChunkMetadata は、一つの metadata record が関連 chunk revision を記述するためこの lineage payload を含み、payload 自体が独立して content または activity entity として振る舞えないことを表します。
  cardinality:
    source: {min: 1, max: 1}
    target: {min: 0, max: null}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: contains_chunk_provenance
    labels: {zh: 包含分块来源谱系, en: contains chunk provenance, ja: チャンク来歴を含む}
  conditions:
    - id: chunk-provenance-containing-metadata-match
      severity: error
      expression_language: plain
      expression: Assert only when the target ChunkMetadata describes subject_chunk_revision_ref and stores this lineage_id as its provenance payload. A detached standalone provenance record must be modeled elsewhere, not under this composition.
      explanation:
        zh: 本组成关系只用于元数据记录内的载荷；独立的跨对象来源图不能伪称为该元数据的组成部分。
        en: This composition applies only to a payload inside one metadata record; an independent cross-object provenance graph cannot pretend to be its component.
        ja: この composition は一つの metadata record 内の payload にだけ適用され、独立した cross-object provenance graph はその component を装えません。
      source_claims: [claim-chunk-provenance-composition]
  temporal_scope: valid-time
  boundary_context: "The composition is metadata containment, not derivation of the Chunk, activity execution, or source-document containment."
  constraints: []
  examples: []
  source_claims: [claim-chunk-provenance-composition]
  distinct_fact_rationale:
    zh: 此关系表达元数据载荷的组成归属；来源—活动—输出因果事实由字段及其关联实体表达，不是此主边本身。
    en: This relation expresses containment of a metadata payload; source–activity–output causal facts are represented by its fields and referenced entities, not by this primary edge itself.
    ja: この関係は metadata payload の containment を表します。source–activity–output の causal fact は field と参照 entity で表し、この primary edge 自体では表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines entities, activities, generation, use, derivation, and provenance descriptions.
source_claims:
  - id: claim-chunk-provenance-chain
    source: w3c-prov-o
    supports: PROV-O defines entities and activities connected by used, wasGeneratedBy, and wasDerivedFrom relations, supporting ordered provenance chains across source entities, processing activities, and generated artifacts.
    locator: "PROV-O: Starting Point Terms; Entity, Activity, Generation, Usage, and Derivation"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-chunk-provenance-integrity
    source: w3c-prov-o
    supports: PROV-O distinguishes source and generated entities through activities. Moonweave preserves immutable source versions and output digests so a derivation record cannot rewrite source evidence.
    locator: "PROV-O: prov:wasGeneratedBy and prov:wasDerivedFrom"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-provenance-composition
    source: w3c-prov-o
    supports: PROV-O supports recording provenance descriptions about entities and activities. Moonweave's decision to store a ChunkProvenance payload inside one ChunkMetadata record is a local composition design, distinct from the causal provenance relations it describes.
    locator: "PROV-O: provenance descriptions and qualified relations"
    evidence_kind: ontology-design-inference
    confidence: medium
