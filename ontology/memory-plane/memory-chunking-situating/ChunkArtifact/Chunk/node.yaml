schema: moonweave.ai/ontology-node/v1
id: Chunk
kind: concept
status: accepted
labels:
  zh: 文本分块
  en: Chunk
  ja: テキストチャンク
semantics:
  short_definition:
    zh: 从一个确定来源版本切分出的、承载实际文本内容的 ChunkArtifact 子类。
    en: A ChunkArtifact subtype carrying an actual text segment split from one determinate source version.
    ja: 一つの確定済み情報源版から分割され、実際のテキスト内容を持つ ChunkArtifact の下位型。
  definition:
    zh: >
      Chunk 是 ChunkArtifact 中直接承载可引用文本片段的子类。它保留内容本体、来源版本、本地范围和在同一
      分割输出中的顺序，使嵌入、索引、检索和引用可以指向相同的内容证据。Chunk 是信息工件而不是创建它的
      ChunkProcessingActivity；它也不是 EmbeddingVector、VectorIndex 或 IndexEntry。随后由模型生成的
      说明性上下文可形成 SituatedChunk，但不会把生成文本变成原始 Chunk 内容。
    en: >
      Chunk is the ChunkArtifact subtype that directly carries a citable text segment. It retains the content body,
      source version, local span, and ordinal within one split output so embedding, indexing, retrieval, and citation
      can point to the same content evidence. A Chunk is an information artifact, not the ChunkProcessingActivity that
      created it, and is neither an EmbeddingVector, VectorIndex, nor IndexEntry. A later model-generated explanatory
      layer may form a SituatedChunk, but that generated text does not become the original Chunk body.
    ja: >
      Chunk は、引用可能なテキスト片段を直接持つ ChunkArtifact の下位型です。内容本体、情報源版、局所範囲、
      一つの分割出力内の順序を保持するため、embedding、indexing、retrieval、citation が同じ内容証拠を
      指せます。Chunk は情報成果物であり、それを作成した ChunkProcessingActivity でも EmbeddingVector、
      VectorIndex、IndexEntry でもありません。後のモデル生成説明層は SituatedChunk を形成できますが、
      生成テキストは元の Chunk 本体にはなりません。
  why_needed:
    zh: 长文不能总以整体形式稳定嵌入或精确引用；有来源锚点的内容片段为下游提供了最小可检索证据单元。
    en: Long documents cannot always be embedded or cited reliably as one whole; source-anchored content segments provide the smallest retrievable evidence units for downstream work.
    ja: 長い文書を常に一つの全体として安定に embedding または正確に citation することはできないため、情報源に固定された内容片段が下流の最小 retrieval evidence unit になります。
  includes:
    - zh: 由明确 splitter 或 node parser 从一个来源版本输出，并带有内容、局部范围和顺序的文本片段。
      en: Text segments emitted from one source version by an explicit splitter or node parser with content, local span, and ordinal.
      ja: 明示的な splitter または node parser が一つの source version から出力し、内容、局所 span、ordinal を持つテキスト片段。
  excludes:
    - zh: 原始未分割文档、生成该分块的处理运行、数值嵌入、索引条目、仅字段型元数据以及混入生成说明而未分离的文本。
      en: An unsplit source document, the processing run that generated the chunk, numeric embedding, index entry, field-only metadata, or text that silently mixes generated explanation into the source body.
      ja: 未分割の source document、chunk を生成した processing run、数値 embedding、index entry、項目だけの metadata、生成説明を source body に黙って混在させた text。
  semantic_kind: information
  aliases: [text segment, source chunk, 文本切片]
engineering:
  explanation:
    zh: LangChain splitter 和 LlamaIndex node parser 都把文档变为更小的内容输出；Moonweave 将每个带可追溯来源的文本输出记录为 Chunk，而将后续向量与索引记录为不同对象。
    en: LangChain splitters and LlamaIndex node parsers turn documents into smaller content outputs; Moonweave records each source-traceable text output as a Chunk and keeps later vectors and index records separate.
    ja: LangChain splitter と LlamaIndex node parser は文書をより小さい内容出力に変換します。Moonweave は情報源追跡可能な各テキスト出力を Chunk として記録し、後続の vector と index record を分離します。
  typical_input:
    - description: Split a source document
      format: |
        from langchain_text_splitters import RecursiveCharacterTextSplitter

        splitter = RecursiveCharacterTextSplitter(chunk_size=800, chunk_overlap=80)
        chunks = splitter.create_documents([policy_text])
  typical_output:
    - description: Source-anchored chunk record
      format: |
        {
          "chunk_id": "chunk-policy-007",
          "text": "External network calls require recorded approval before execution.",
          "source_version_ref": "policy.pdf@2026-07-01",
          "source_span": {"unit": "character", "start": 18420, "end_exclusive": 19280},
          "chunk_index": 7
        }
  reference_implementations:
    - name: LangChain Text Splitters
      url: https://docs.langchain.com/oss/python/integrations/splitters/index
      description: Documents splitter integrations for producing smaller Document chunks.
    - name: LlamaIndex Node Parsers
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
      description: Documents Document-to-Node parsing with inherited attributes and metadata.
structure:
  identity_keys: [chunk_id]
  fields:
    - id: chunk_id
      labels: {zh: 分块标识, en: chunk ID, ja: チャンク ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一个具体的来源锚定文本片段，不能复用为嵌入、索引条目或处理运行标识。
        en: Identifies one concrete source-anchored text segment and is not reused as an embedding, index-entry, or processing-run ID.
        ja: 一つの具体的な source-anchored text segment を識別し、embedding、index-entry、processing-run ID として再利用しません。
      allowed_values: []
      pattern: "^chunk-[A-Za-z0-9._-]+$"
      example_value: chunk-policy-007
      source_claims: [claim-chunk-split-output]
    - id: text
      labels: {zh: 分块文本, en: chunk text, ja: チャンク本文}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 从确定来源版本取得的实际文本主体，不包含未标记为分离字段的生成说明。
        en: Actual text body taken from the determinate source version and excluding generated explanation that is not marked as a separate field.
        ja: 確定済み source version から取得した実テキスト本体であり、分離 field として示されない generated explanation を含みません。
      allowed_values: []
      pattern: null
      example_value: External network calls require recorded approval before execution.
      source_claims: [claim-chunk-split-output]
    - id: source_version_ref
      labels: {zh: 来源版本引用, en: source version reference, ja: 情報源版参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向产出该文本片段的确定来源版本，而非一个未固定的文档名称。
        en: Points to the determinate source version that produced this text segment rather than an unpinned document name.
        ja: 固定されていない文書名ではなく、この text segment を生んだ確定済み source version を指します。
      allowed_values: []
      pattern: "^[^\\s]+@[^\\s]+$"
      example_value: policy.pdf@2026-07-01
      source_claims: [claim-chunk-source-metadata]
    - id: source_span
      labels: {zh: 来源范围, en: source span, ja: 情報源範囲}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 在声明的位置单位中定位该片段的非空范围，供引用和来源复核使用。
        en: Locates this segment's non-empty extent in a declared locator unit for citation and source verification.
        ja: citation と source verification のため、宣言済み locator unit でこの segment の空でない範囲を特定します。
      allowed_values: []
      pattern: null
      example_value: {unit: character, start: 18420, end_exclusive: 19280}
      source_claims: [claim-chunk-source-metadata]
    - id: chunk_index
      labels: {zh: 分块序号, en: chunk ordinal, ja: チャンク順序}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识该片段在一次确定分割输出中的顺序，不表示语义相关性、检索排名或索引位置。
        en: Identifies the segment's order in one determinate split output and does not represent semantic relevance, retrieval rank, or index position.
        ja: 一つの確定済み split output における segment の順序を示し、semantic relevance、retrieval rank、index position は表しません。
      allowed_values: []
      pattern: null
      example_value: 7
      source_claims: [claim-chunk-split-output]
  constraints:
    - id: chunk-source-evidence-required
      severity: error
      expression_language: plain
      expression: text, source_version_ref, a non-empty source_span, and chunk_index are required for a Chunk. A change to text, source version, or span must create a new ChunkArtifact revision rather than overwrite the evidence record.
      explanation:
        zh: 内容片段必须可回到确定来源；静默覆盖会使引用和下游复核失去共同证据。
        en: A content segment must lead back to a determinate source; silent overwrite would remove the shared evidence needed for citation and downstream inspection.
        ja: 内容 segment は確定済み source に戻れなければならず、黙った上書きは citation と下流検査に必要な共有証拠を失わせます。
      source_claims: [claim-chunk-source-metadata]
    - id: chunk-not-embedding-vector
      severity: error
      expression_language: plain
      expression: A Chunk may be input to embedding, indexing, or retrieval, but its text content must not be replaced by a vector payload or an index membership record.
      explanation:
        zh: Chunk 是内容片段；向量和索引成员关系是引用该片段的后续表示，而非该片段本身。
        en: A Chunk is a content segment; vectors and index membership are later representations that refer to it, not the segment itself.
        ja: Chunk は内容 segment であり、vector と index membership はそれを参照する後続表現であって segment 自体ではありません。
      source_claims: [claim-chunk-not-vector]
  required_relations: []
examples:
  - id: chunk-example-positive-policy

    labels: {zh: 可引用策略分块, en: Citable policy chunk, ja: 引用可能な policy chunk}

    descriptions:
      zh: RAPTOR 叶节点分块；LlamaIndex SentenceSplitter；Anthropic Contextual Retrieval 分块后加语境前缀生成 SituatedChunk。
      en: RAPTOR leaf-node chunking; LlamaIndex SentenceSplitter; Anthropic Contextual Retrieval chunks then adds context prefix as SituatedChunk.
      ja: RAPTOR leaf chunking。LlamaIndex SentenceSplitter。Anthropic Contextual Retrieval chunk+prefix。
    field_values:
      chunk_id: chunk-policy-007
      text: External network calls require recorded approval before execution.
      source_version_ref: policy.pdf@2026-07-01
      source_span: {unit: character, start: 18420, end_exclusive: 19280}
      chunk_index: 7
    related_node_ids: [Chunk, ChunkArtifact]
    related_relation_ids: [Chunk-is_a-ChunkArtifact]

    source_claims: [claim-chunk-split-output, claim-chunk-source-metadata]
  - id: chunk-example-counterexample-unsplit-document

    labels: {zh: 未分割原始文档, en: Unsplit source document, ja: 未分割 source document}

    descriptions:
      zh: 反例：整篇 Document 未分块直接 upsert Pinecone，缺少 chunk_id 与 offset metadata。
      en: Counterexample: whole Document upserted to Pinecone without chunking, missing chunk_id and offset metadata.
      ja: 反例：Document 全文 chunk なし Pinecone upsert。
    field_values:
      resource_id: handbook.pdf@v1
      page_count: 180
      splitter_ref: null
      chunk_id: null
    related_node_ids: [Chunk]
    related_relation_ids: []

    source_claims: [claim-chunk-split-output]
  - id: chunk-example-boundary-embedding

    labels: {zh: 相邻的嵌入表示, en: Adjacent embedding representation, ja: 隣接する embedding 表現}

    descriptions:
      zh: Chunk 分割工件 vs Document 原始资源；RAPTOR 内部 chunk 可进一步聚类摘要。
      en: Chunk split artifact vs Document source resource; RAPTOR internal chunks can cluster into summaries.
      ja: Chunk 分割 artifact vs Document 原始 resource。RAPTOR chunk cluster 要約可能。
    field_values:
      embedding_id: embedding-007
      input_chunk_id: chunk-policy-007
      dimension: 1536
      vector_payload_present: true
    related_node_ids: [Chunk, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-chunk-not-vector]
  - id: chunk-example-instance-llamaindex-node

    labels: {zh: 实例：解析器输出节点, en: "Instance: parser output node", ja: "事例：parser output node"}

    descriptions:
      zh: RecursiveCharacterTextSplitter(chunk_size=512, overlap=64) → chunk_id=c-42 offset=1024 len=512 source=policy.pdf。
      en: RecursiveCharacterTextSplitter(chunk_size=512, overlap=64) → chunk_id=c-42 offset=1024 len=512 source=policy.pdf.
      ja: RecursiveCharacterTextSplitter(chunk_size=512, overlap=64)→chunk_id=c-42。
    field_values:
      chunk_id: chunk-handbook-17
      text: Requests must carry a tenant scope before retrieval begins.
      source_version_ref: handbook.md@v3
      source_span: {unit: character, start: 800, end_exclusive: 1520}
      chunk_index: 17
    related_node_ids: [Chunk, ChunkArtifact]
    related_relation_ids: [Chunk-is_a-ChunkArtifact]
    source_claims: [claim-chunk-source-metadata]
parent_relation:
  id: Chunk-is_a-ChunkArtifact
  predicate: is_a
  target: concept:ChunkArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是分块工件的文本片段子类
    en: is a text-segment subtype of chunk artifact
    ja: ChunkArtifact のテキスト片段下位型である
  definitions:
    zh: Chunk is_a ChunkArtifact，表示每个 Chunk 都是可版本化、可追溯的内容工件，而 ChunkArtifact 不必都是直接文本片段。
    en: Chunk is_a ChunkArtifact means every Chunk is a versionable, traceable content artifact, while not every ChunkArtifact need be a direct text segment.
    ja: Chunk is_a ChunkArtifact は、すべての Chunk が版管理・追跡可能な内容成果物であり、すべての ChunkArtifact が直接テキスト片段である必要はないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不对一次运行中的分块数量施加基数。
    en: A classification relation does not prescribe how many chunks one run may produce.
    ja: 分類関係は、一つの run が生成できる chunk 数を規定しません。
  inverse_reading:
    predicate: has_chunk_subtype
    labels: {zh: 具有文本分块子类, en: has text-chunk subtype, ja: テキストチャンク下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-artifact-subtype]
  distinct_fact_rationale:
    zh: 此关系表达内容工件类型归属，不表达某次处理生成、一个元数据附着、向量化或索引成员关系。
    en: This relation expresses information-artifact type membership, not one processing generation, metadata attachment, vectorization, or index membership.
    ja: この関係は情報成果物の型所属を表し、一回の処理生成、metadata attachment、vectorization、index membership は表しません。
  layout_role: primary-backbone
relations: []
sources:
  - id: langchain-text-splitters
    title: LangChain Text Splitters
    source_type: official-project-documentation
    url: https://docs.langchain.com/oss/python/integrations/splitters/index
    relevance: Documents splitter integrations that transform source documents into smaller Document chunks for downstream work.
  - id: llamaindex-node-parsers
    title: LlamaIndex Node Parsers
    source_type: official-project-documentation
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
    relevance: Documents Document-to-Node parsing and inherited document attributes and metadata on Node outputs.
  - id: anthropic-contextual-retrieval
    title: Anthropic Contextual Retrieval
    source_type: official-engineering-article
    url: https://www.anthropic.com/engineering/contextual-retrieval
    relevance: Describes adding separate contextual information to chunks before embedding and retrieval.
source_claims:
  - id: claim-chunk-split-output
    source: langchain-text-splitters
    supports: LangChain documents text splitters that transform documents into smaller content-bearing document chunks. Moonweave uses a stable Chunk record for one such source-anchored output.
    locator: "Text Splitters overview and splitter integration examples"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-source-metadata
    source: llamaindex-node-parsers
    supports: LlamaIndex documents Node parsers that produce Nodes while preserving source-document attributes and metadata. Moonweave applies this to source version and span fields on a Chunk.
    locator: "Node Parser Usage Pattern"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-not-vector
    source: anthropic-contextual-retrieval
    supports: Anthropic documents contextualizing chunks before creating contextual embeddings and BM25 representations. The distinction between a Chunk and its vector or index representation is a Moonweave ontology boundary.
    locator: "Contextual Retrieval: contextual embeddings and contextual BM25"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-artifact-subtype
    source: llamaindex-node-parsers
    supports: Parser outputs are source-derived Nodes. Modeling a direct content-segment output as the Chunk subtype of the more general ChunkArtifact is a Moonweave taxonomy inference.
    locator: "Node Parser Usage Pattern"
    evidence_kind: ontology-design-inference
    confidence: medium
