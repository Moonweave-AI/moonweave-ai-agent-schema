schema: moonweave.ai/ontology-node/v1
id: SituatedChunk
kind: concept
status: accepted
labels:
  zh: 情境化分块
  en: Situated Chunk
  ja: 文脈化チャンク
semantics:
  short_definition:
    zh: 为一个来源分块附加可分离的生成性检索上下文、且仍保留来源分块证据边界的 ChunkArtifact 子类。
    en: A ChunkArtifact subtype that adds separable generated retrieval context to one source Chunk while retaining its evidence boundary.
    ja: 一つの source Chunk に分離可能な生成 retrieval context を加えつつ、その evidence boundary を保持する ChunkArtifact の下位型。
  definition:
    zh: >
      SituatedChunk 是一个由 SituatingPromptRun 生成的内容工件：它引用一个确定的源 Chunk 及其版本，并在独立
      context_note 中保存帮助检索理解该片段的生成说明。该说明可在嵌入或词法检索前使用，但不是源文本，不能扩大
      SourceSpan，也不能静默改写 Chunk 本体。SituatedChunk 是 ChunkArtifact 的子类，而不是原始 Chunk、
      运行活动、普通 ChunkMetadata、EmbeddingVector 或检索结果。
    en: >
      SituatedChunk is a content artifact generated by a SituatingPromptRun. It references one determinate source
      Chunk and its revision and stores generated explanation that helps retrieval understand the fragment in a
      separate context_note. The note may be used before embedding or lexical retrieval, but is not source text,
      cannot enlarge SourceSpan, and cannot silently rewrite the Chunk body. SituatedChunk is a subtype of
      ChunkArtifact, not the original Chunk, the run activity, ordinary ChunkMetadata, an EmbeddingVector, or a
      retrieval result.
    ja: >
      SituatedChunk は SituatingPromptRun により生成される内容成果物です。一つの確定済み source Chunk とその
      revision を参照し、fragment を retrieval が理解するための生成説明を別の context_note に保存します。
      この note は embedding または lexical retrieval の前に使用できますが、source text ではなく、SourceSpan
      を拡大したり Chunk body を黙って書き換えたりできません。SituatedChunk は ChunkArtifact の下位型であり、
      元の Chunk、run activity、通常の ChunkMetadata、EmbeddingVector、retrieval result ではありません。
  why_needed:
    zh: 孤立片段经常丢失章节主题、实体或时间信息；可追溯且可分离的补充上下文可以改善检索歧义，而不会污染可引用原文。
    en: Isolated fragments often lose section topic, entity, or time information; traceable separable context can improve retrieval disambiguation without contaminating citable source text.
    ja: 孤立した fragment は section topic、entity、time 情報を失いがちです。追跡可能で分離可能な補足 context は、引用可能な source text を汚さず retrieval の曖昧性解消を改善できます。
  includes:
    - zh: 有源分块及其版本引用、分离 context_note、生成活动引用和独立工件标识的情境化内容工件。
      en: Contextualized content artifacts with source-chunk and revision reference, separable context_note, generating-activity reference, and independent artifact ID.
      ja: source chunk と revision 参照、分離された context_note、生成活動参照、独立した artifact ID を持つ文脈化内容成果物。
  excludes:
    - zh: 原始 Chunk 本体、文件名或段落标题等静态元数据、将生成说明直接写入来源文本的混合内容、生成运行和嵌入或索引条目。
      en: The original Chunk body, static metadata such as filename or section title, mixed content that writes explanation into source text, the generating run, and an embedding or index entry.
      ja: 元の Chunk body、filename や section title のような静的 metadata、説明を source text に書き込んだ混在内容、生成 run、embedding または index entry。
  semantic_kind: information
  aliases: [contextualized chunk, retrieval-context chunk, 情境增强分块]
engineering:
  explanation:
    zh: Anthropic 的 Contextual Retrieval 在嵌入和 BM25 前为每个分块生成上下文。Moonweave 将原始块、生成说明和运行记录分开保存，使检索增强不会伪造来源证据。
    en: Anthropic Contextual Retrieval generates context for each chunk before embedding and BM25. Moonweave stores the source chunk, generated explanation, and run record separately so retrieval enhancement does not fabricate source evidence.
    ja: Anthropic Contextual Retrieval は embedding と BM25 の前に各 chunk の context を生成します。Moonweave は source chunk、生成説明、run record を分離して保存し、retrieval enhancement が source evidence を捏造しないようにします。
  typical_input:
    - description: Source chunk plus generated context
      format: |
        {
          "source_chunk_id": "chunk-policy-4-2-03@v1",
          "context_note": "Section 4.2 describes deletion after user withdrawal.",
          "situating_run_id": "situate-84"
        }
  typical_output:
    - description: Situated chunk record
      format: |
        {
          "situated_chunk_id": "situated-policy-4-2-03@v1",
          "source_chunk_ref": "chunk-policy-4-2-03@v1",
          "context_note": "Section 4.2 describes deletion after user withdrawal.",
          "situating_run_id": "situate-84"
        }
  reference_implementations:
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/engineering/contextual-retrieval
      description: Describes prepending chunk-specific explanatory context before contextual embeddings and contextual BM25.
structure:
  identity_keys: [situated_chunk_id]
  fields:
    - id: situated_chunk_id
      labels: {zh: 情境化分块标识, en: situated chunk ID, ja: 文脈化チャンク ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一个独立的情境化工件，而非重用源 Chunk 或生成运行的标识。
        en: Identifies one independent situated artifact and is not reused as its source Chunk or generating-run ID.
        ja: 一つの独立した situated artifact を識別し、source Chunk または generating-run ID として再利用しません。
      allowed_values: []
      pattern: "^situated-[A-Za-z0-9._-]+$"
      example_value: situated-policy-4-2-03
      source_claims: [claim-situated-chunk-contextualization]
    - id: source_chunk_ref
      labels: {zh: 源分块版本引用, en: source chunk revision reference, ja: source chunk revision 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向作为证据基础的确定 Chunk 版本，不能只引用一个不固定的逻辑名称。
        en: Points to the determinate Chunk revision that remains the evidence basis and cannot be only an unpinned logical name.
        ja: evidence basis として残る確定済み Chunk revision を指し、固定されていない論理名だけにはできません。
      allowed_values: []
      pattern: "^chunk-[A-Za-z0-9._-]+@v[0-9]+(?:[A-Za-z0-9._-]*)$"
      example_value: chunk-policy-4-2-03@v1
      source_claims: [claim-situated-chunk-source-boundary]
    - id: context_note
      labels: {zh: 生成上下文说明, en: generated context note, ja: 生成コンテキスト注記}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 解释源分块在更广文档中的角色的生成文本，必须与原始 Chunk body 可分离并标记为生成内容。
        en: Generated text explaining the source chunk's role in the broader document, which must be separable from the original Chunk body and marked as generated.
        ja: source chunk のより広い文書内での役割を説明する生成テキストであり、元の Chunk body から分離可能で生成内容として明示されなければなりません。
      allowed_values: []
      pattern: null
      example_value: Section 4.2 describes deletion after user withdrawal.
      source_claims: [claim-situated-chunk-contextualization]
    - id: situating_run_id
      labels: {zh: 情境化运行标识, en: situating run ID, ja: situating run ID}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向实际生成该 context_note 和 SituatedChunk 版本的 SituatingPromptRun，而非读取或索引它的后续活动。
        en: Points to the SituatingPromptRun that actually generated this context_note and SituatedChunk revision, not a later activity that read or indexed it.
        ja: この context_note と SituatedChunk revision を実際に生成した SituatingPromptRun を指し、後で読み取りまたは indexing した活動は指しません。
      allowed_values: []
      pattern: "^situate-[A-Za-z0-9._-]+$"
      example_value: situate-84
      source_claims: [claim-situated-chunk-provenance]
    - id: generated_at
      labels: {zh: 生成时间, en: generated at, ja: 生成時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录此情境化工件版本开始存在的时间，而非源块的创建时间。
        en: Records when this SituatedChunk revision began to exist rather than when its source Chunk was created.
        ja: source Chunk の作成時刻ではなく、この SituatedChunk revision が存在し始めた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T10:15:00Z"
      source_claims: [claim-situated-chunk-provenance]
  constraints:
    - id: situated-chunk-source-text-separation
      severity: error
      expression_language: plain
      expression: context_note must be separable from the source Chunk body and marked as generated. It must not replace the source body, source revision, or source span, and must not be cited as if it were source text.
      explanation:
        zh: 生成语境能帮助检索，但不是新来源证据，也不能静默改写或扩展原文含义。
        en: Generated context can assist retrieval but is not new source evidence and cannot silently rewrite or extend source-text meaning.
        ja: generated context は retrieval を助けられますが、新しい source evidence ではなく、source text の意味を黙って書き換え・拡張できません。
      source_claims: [claim-situated-chunk-source-boundary]
    - id: situated-chunk-lineage-required
      severity: error
      expression_language: plain
      expression: A SituatedChunk requires exactly one source_chunk_ref and one situating_run_id. A context prefix without these references is not a SituatedChunk, and a run that only reads an existing artifact must not be recorded as its generator.
      explanation:
        zh: 没有源块和生成运行的可核查谱系，任何前缀都无法证明是按审计方法产生的情境说明。
        en: Without inspectable source-chunk and generating-run lineage, no prefix can establish that it was produced by an auditable situating method.
        ja: 検査可能な source-chunk と generating-run の lineage がなければ、どの prefix も audit 可能な situating method で生成されたとは立証できません。
      source_claims: [claim-situated-chunk-provenance]
  required_relations: []
examples:
  - id: situated-chunk-example-positive-policy

    labels: {zh: 带可分离说明的策略分块, en: Policy chunk with separable context, ja: 分離可能な context を持つ policy chunk}

    descriptions:
      zh: Anthropic Contextual Retrieval (2024)：Claude 为每 chunk 生成 50-100 token 语境前缀；Contextual Embeddings + Contextual BM25 配合 rerank 降失败率 67%。
      en: Anthropic Contextual Retrieval (2024): Claude generates 50-100 token context prefix per chunk; Contextual Embeddings + Contextual BM25 with rerank reduces failure rate 67%.
      ja: Anthropic Contextual Retrieval：50-100 token 文脈 prefix。Contextual Embeddings+BM25+rerank で失敗率 67% 低下。
    field_values:
      situated_chunk_id: situated-policy-4-2-03
      source_chunk_ref: chunk-policy-4-2-03@v1
      context_note: Section 4.2 describes deletion after user withdrawal.
      situating_run_id: situate-84
      generated_at: "2026-07-18T10:15:00Z"
    related_node_ids: [SituatedChunk, ChunkArtifact, Chunk, SituatingPromptRun]
    related_relation_ids: [SituatedChunk-is_a-ChunkArtifact, SituatedChunk-was-generated-by-SituatingPromptRun]

    source_claims: [claim-situated-chunk-contextualization, claim-situated-chunk-provenance]
  - id: situated-chunk-example-counterexample-mixed-source

    labels: {zh: 生成说明混入来源文本, en: Generated explanation mixed into source text, ja: source text に混在した生成説明}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 原始正文且未保留 ChunkProvenance 与独立 situated_chunk_id。
      en: Counterexample: context prefix overwrites Chunk original body without ChunkProvenance or distinct situated_chunk_id.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/situated_chunk_id なし。
    field_values:
      source_chunk_ref: chunk-policy-4-2-03@v1
      context_note: null
      source_body_mutated: true
      situating_run_id: situate-84
    related_node_ids: [SituatedChunk, Chunk]
    related_relation_ids: []

    source_claims: [claim-situated-chunk-source-boundary]
  - id: situated-chunk-example-boundary-ordinary-chunk

    labels: {zh: 只有静态元数据的普通分块, en: Ordinary chunk with static metadata, ja: 静的 metadata だけの通常 chunk}

    descriptions:
      zh: SituatedChunk 前缀+正文 vs 原始 Chunk；EmbeddingRun 应 embed situated text 而非 raw chunk。
      en: SituatedChunk prefix+body vs original Chunk; EmbeddingRun should embed situated text not raw chunk.
      ja: SituatedChunk prefix+body vs 原始 Chunk。EmbeddingRun は situated text を embed。
    field_values:
      chunk_id: chunk-policy-4-2-03
      source_version_ref: docs/policy.md@v7
      context_note: null
      situating_run_id: null
    related_node_ids: [SituatedChunk, Chunk, ChunkMetadata]
    related_relation_ids: []

    source_claims: [claim-situated-chunk-source-boundary]
  - id: situated-chunk-example-instance-auth

    labels: {zh: 实例：OAuth 配置分块, en: "Instance: OAuth configuration chunk", ja: "事例：OAuth 設定 chunk"}

    descriptions:
      zh: Anthropic cookbook：contextualize_prompt(chunk, doc) → prepend prefix → text-embedding-3-small embed → Pinecone upsert。
      en: Anthropic cookbook: contextualize_prompt(chunk, doc) → prepend prefix → text-embedding-3-small embed → Pinecone upsert.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert。
    field_values:
      situated_chunk_id: situated-api-auth-07
      source_chunk_ref: chunk-api-auth-07@v1
      context_note: OAuth callback URI configuration.
      situating_run_id: situate-api-07
      generated_at: "2026-07-18T11:30:00Z"
    related_node_ids: [SituatedChunk, ChunkArtifact, Chunk, SituatingPromptRun]
    related_relation_ids: [SituatedChunk-is_a-ChunkArtifact, SituatedChunk-was-generated-by-SituatingPromptRun]
    source_claims: [claim-situated-chunk-contextualization, claim-situated-chunk-provenance]
parent_relation:
  id: SituatedChunk-is_a-ChunkArtifact
  predicate: is_a
  target: concept:ChunkArtifact
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是分块工件的情境化子类
    en: is a situated subtype of chunk artifact
    ja: ChunkArtifact の文脈化下位型である
  definitions:
    zh: SituatedChunk is_a ChunkArtifact，表示每个情境化分块仍是可版本化、可追溯的内容工件；它额外具有生成语境，而非成为生成活动。
    en: SituatedChunk is_a ChunkArtifact means every situated chunk remains a versionable, traceable content artifact with additional generated context rather than becoming its generating activity.
    ja: SituatedChunk is_a ChunkArtifact は、すべての situated chunk が追加 generated context を持つ版管理・追跡可能な内容成果物であり、生成 activity になるわけではないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定一个源块可有多少个情境化修订版。
    en: Classification does not prescribe how many situated revisions one source chunk may have.
    ja: 分類関係は、一つの source chunk が持ち得る situated revision 数を規定しません。
  inverse_reading:
    predicate: has_situated_chunk_subtype
    labels: {zh: 具有情境化分块子类, en: has situated-chunk subtype, ja: 文脈化チャンク下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-situated-chunk-artifact-subtype]
  distinct_fact_rationale:
    zh: 此关系仅表达工件类型归属；具体生成由独立的因果关系表示，源块引用由字段记录。
    en: This relation expresses artifact type membership only; concrete generation is represented by a separate causal relation and the source chunk is recorded by field reference.
    ja: この関係は artifact type membership だけを表し、具体的な generation は別の causal relation、source chunk は field reference で記録します。
  layout_role: primary-backbone
relations:
  - id: SituatedChunk-was-generated-by-SituatingPromptRun
    predicate: was_generated_by
    target: concept:SituatingPromptRun
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由情境化提示运行生成
      en: is generated by situating prompt run
      ja: situating prompt run により生成される
    definitions:
      zh: 仅当目标 SituatingPromptRun 实际基于 source_chunk_ref 生成当前 SituatedChunk 版本的 context_note 时，此关系成立。
      en: This relation holds only when the target SituatingPromptRun actually generated the current SituatedChunk revision's context_note from source_chunk_ref.
      ja: この関係は、対象 SituatingPromptRun が source_chunk_ref から現在の SituatedChunk revision の context_note を実際に生成した場合にだけ成立します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates_situated_chunk
      labels: {zh: 生成情境化分块, en: generates situated chunk, ja: 文脈化チャンクを生成する}
    conditions:
      - id: situated-chunk-generation-source-match
        severity: error
        expression_language: plain
        expression: Assert only when situating_run_id identifies the target run, that run used source_chunk_ref, and it completed generation of this situated_chunk_id and generated_at.
        explanation:
          zh: 仅仅读取、重试或索引一个现有情境化工件的活动不会生成其版本。
          en: An activity that only reads, retries, or indexes an existing situated artifact does not generate its revision.
          ja: 既存 situated artifact を読み取り、retry、indexing しただけの activity はその revision を生成しません。
        source_claims: [claim-situated-chunk-provenance]
    temporal_scope: valid-time
    boundary_context: "This is a version-specific causal provenance relation, not hierarchy or composition."
    constraints: []
    examples: []
    source_claims: [claim-situated-chunk-provenance]
    distinct_fact_rationale: "The relation records the Activity that created a particular SituatedChunk revision. It does not make an information artifact a subtype or component of that Activity."
    layout_role: cross-link
sources:
  - id: anthropic-contextual-retrieval
    title: Anthropic Contextual Retrieval
    source_type: official-engineering-article
    url: https://www.anthropic.com/engineering/contextual-retrieval
    relevance: Documents generating and prepending chunk-specific explanatory context before contextual embeddings and contextual BM25.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines Entity and Activity concepts and entity generation by an activity.
source_claims:
  - id: claim-situated-chunk-contextualization
    source: anthropic-contextual-retrieval
    supports: Anthropic documents generating chunk-specific explanatory context and prepending it before contextual embeddings and contextual BM25. Moonweave represents the result as a distinct SituatedChunk rather than mutating source text.
    locator: "Contextual Retrieval: Introducing Contextual Retrieval; contextual embeddings and contextual BM25"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-situated-chunk-source-boundary
    source: anthropic-contextual-retrieval
    supports: The contextual-retrieval method distinguishes original chunk content from added context. Moonweave keeps the note separable so it cannot silently become source text or enlarge the source evidence span.
    locator: "Contextual Retrieval: original chunk and contextualized chunk example"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-situated-chunk-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity from the Activity that generated it. Moonweave applies this to a SituatedChunk revision and its SituatingPromptRun as a causal cross-link, not a parent edge.
    locator: "PROV-O: Entity, Activity, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-situated-chunk-artifact-subtype
    source: anthropic-contextual-retrieval
    supports: Modeling a chunk-derived, context-bearing content artifact as the SituatedChunk subtype of ChunkArtifact is a Moonweave taxonomy inference based on the documented contextualization pipeline.
    locator: "Contextual Retrieval: preprocessing pipeline for chunks"
    evidence_kind: ontology-design-inference
    confidence: medium
