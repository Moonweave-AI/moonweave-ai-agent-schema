schema: moonweave.ai/ontology-node/v1
id: ChunkArtifact
kind: concept
status: accepted
labels:
  zh: 分块工件
  en: Chunk Artifact
  ja: チャンク成果物
semantics:
  short_definition:
    zh: 可独立持久化和版本化、并可追溯到源版本与生成活动的内容工件。
    en: A persistable, versionable content artifact traceable to a source version and generating activity.
    ja: 情報源版と生成活動まで追跡でき、独立して永続化・版管理できる内容成果物。
  definition:
    zh: >
      ChunkArtifact 是由一次内容处理产生、在该活动结束后仍可独立标识和复用的信息工件上位概念。
      每个工件版本记录固定的来源版本、非空来源范围、规范化内容摘要、生成活动引用和生成时间，以便后续嵌入、
      索引、检索或情境化能够回查其处理证据。Chunk 和 SituatedChunk 是承载实际内容或可分离上下文的专门化
      ChunkArtifact。ChunkArtifact 不是生成它的 ChunkProcessingActivity，也不是仅描述它的 ChunkMetadata 或
      ChunkReference，更不是 EmbeddingVector、VectorIndex、索引条目或写入后的 MemoryRecord。
    en: >
      ChunkArtifact is the genus for an information artifact produced by content processing that remains independently
      identifiable and reusable after that activity ends. Each artifact revision records a pinned source version,
      non-empty source span, normalized-content digest, generating-activity reference, and generation time so later
      embedding, indexing, retrieval, or situating can inspect its processing evidence. Chunk and SituatedChunk are
      specialized ChunkArtifacts carrying actual content or separable generated context. A ChunkArtifact is not the
      ChunkProcessingActivity that generated it, descriptive ChunkMetadata or ChunkReference, an EmbeddingVector,
      a VectorIndex or index entry, or a MemoryRecord after storage.
    ja: >
      ChunkArtifact は、内容処理で生成され、その活動終了後も独立して識別・再利用できる情報成果物の上位概念です。
      各成果物版は、固定した情報源版、空でない情報源範囲、正規化内容の digest、生成活動参照、生成時刻を記録し、
      後続の embedding、indexing、retrieval、situating が処理証拠を検査できるようにします。Chunk と
      SituatedChunk は、実内容または分離可能な生成コンテキストを持つ特殊化された ChunkArtifact です。
      ChunkArtifact は、それを生成した ChunkProcessingActivity、説明専用の ChunkMetadata や ChunkReference、
      EmbeddingVector、VectorIndex または index entry、保存後の MemoryRecord ではありません。
  why_needed:
    zh: 将可复用的内容输出与短暂的处理运行分开，才能保存稳定身份和来源；否则向量、索引或存储记录会被误当作原始内容工件。
    en: Separating reusable content output from a transient processing run preserves stable identity and provenance and prevents vectors, indexes, or storage records from being mistaken for the content artifact.
    ja: 再利用可能な内容出力を一時的な処理実行から分離することで、安定した同一性と来歴を保持し、vector、index、storage record を内容成果物と取り違えないようにします。
  includes:
    - zh: 带有来源版本、范围、内容摘要、工件版本和生成活动引用的 Chunk、SituatedChunk 及其新修订版。
      en: Chunks, SituatedChunks, and their new revisions carrying source version, span, content digest, artifact version, and generating-activity reference.
      ja: 情報源版、範囲、内容 digest、成果物版、生成活動参照を持つ Chunk、SituatedChunk、およびそれらの新しい改訂版。
  excludes:
    - zh: ChunkProcessingActivity 的运行配置或日志、字段说明性的 ChunkMetadata、指针式 ChunkReference、内容向量、向量索引及存储记录。
      en: A ChunkProcessingActivity run configuration or log, field-only ChunkMetadata, pointer-like ChunkReference, content vector, vector index, or storage record.
      ja: ChunkProcessingActivity の実行設定またはログ、項目説明だけの ChunkMetadata、ポインタ型 ChunkReference、内容 vector、vector index、storage record。
  semantic_kind: information
  aliases: [versioned chunk artifact, chunk-processing output, 分块内容工件]
engineering:
  explanation:
    zh: 文档解析器将 Document 切分为可独立处理的 Node；此概念把每项输出的来源定位、版本、生成运行和内容身份保存为与运行本身分离的工件记录。
    en: A document parser splits a Document into independently processed Nodes; this concept records each output's source locator, revision, generating run, and content identity separately from the run itself.
    ja: 文書 parser は Document を独立処理可能な Node に分割します。この概念は各出力の情報源 locator、版、生成 run、内容同一性を、run 自体とは分離した成果物記録として保存します。
  typical_input:
    - description: LlamaIndex parser output creation
      format: |
        from llama_index.core.node_parser import SentenceSplitter

        parser = SentenceSplitter(chunk_size=800, chunk_overlap=80)
        nodes = parser.get_nodes_from_documents([policy_v7])
  typical_output:
    - description: Versioned chunk-artifact record
      format: |
        {
          "artifact_id": "chunk-policy-003",
          "artifact_version": "v1",
          "producing_activity_ref": "chunk-run-81",
          "source_version_ref": "docs/policy.md@v7",
          "source_span": {"unit": "character", "start": 1600, "end_exclusive": 2400},
          "content_digest": "sha256:8d61a1",
          "generated_at": "2026-07-17T01:10:00Z"
        }
  reference_implementations:
    - name: LlamaIndex Node Parsers
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
      description: Documents parsers that split Documents into Node outputs and preserve inherited document attributes and metadata.
structure:
  identity_keys: [artifact_id, artifact_version]
  fields:
    - id: artifact_id
      labels: {zh: 分块工件标识, en: chunk artifact ID, ja: チャンク成果物 ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 跨修订稳定标识同一逻辑内容工件，不能复用为一次处理运行或索引条目标识。
        en: Stably identifies one logical content artifact across revisions and is not reused as a processing-run or index-entry identifier.
        ja: 改訂をまたいで一つの論理内容成果物を安定して識別し、処理 run や index entry の識別子として再利用しません。
      allowed_values: []
      pattern: "^chunk-[A-Za-z0-9._-]+$"
      example_value: chunk-policy-003
      source_claims: [claim-chunk-artifact-parser-output]
    - id: artifact_version
      labels: {zh: 工件版本, en: artifact version, ja: 成果物版}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 区分同一 artifact_id 下因来源、范围、内容或生成事实变化而形成的不可变版本。
        en: Distinguishes immutable versions under one artifact_id when source, span, content, or generation fact changes.
        ja: source、範囲、内容、生成事実が変わったとき、同じ artifact_id の下の不変な版を区別します。
      allowed_values: []
      pattern: "^v[0-9]+(?:[A-Za-z0-9._-]*)$"
      example_value: v1
      source_claims: [claim-chunk-artifact-identity]
    - id: producing_activity_ref
      labels: {zh: 生成活动引用, en: generating activity reference, ja: 生成活動参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向实际创建当前工件版本的 ChunkProcessingActivity，而非后来读取、索引或检索该工件的活动。
        en: References the ChunkProcessingActivity that actually created this artifact revision, not a later activity that read, indexed, or retrieved it.
        ja: この成果物版を実際に作成した ChunkProcessingActivity を参照し、後から読み取り、indexing、retrieval した活動は参照しません。
      allowed_values: []
      pattern: "^chunk-run-[A-Za-z0-9._-]+$"
      example_value: chunk-run-81
      source_claims: [claim-chunk-artifact-provenance]
    - id: source_version_ref
      labels: {zh: 来源版本引用, en: source version reference, ja: 情報源版参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向生成该版本所使用的确定来源版本；后续文档版本不能隐式替换它。
        en: Points to the determinate source version used to create this revision; a later document version cannot replace it implicitly.
        ja: この版の作成に使った確定済み情報源版を指し、後続の文書版が暗黙に置き換えることはできません。
      allowed_values: []
      pattern: "^[^\\s]+@[^\\s]+$"
      example_value: docs/policy.md@v7
      source_claims: [claim-chunk-artifact-parser-output]
    - id: source_span
      labels: {zh: 来源范围, en: source span, ja: 情報源範囲}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 以声明的位置单位记录工件对应的非空来源区间，例如字符、字节、token 或结构路径范围。
        en: Records the artifact's non-empty source interval in a declared locator unit, such as characters, bytes, tokens, or a structural-path range.
        ja: 文字、byte、token、構造 path range など、宣言済み locator 単位で成果物に対応する空でない情報源区間を記録します。
      allowed_values: []
      pattern: null
      example_value: {unit: character, start: 1600, end_exclusive: 2400}
      source_claims: [claim-chunk-artifact-parser-output]
    - id: content_digest
      labels: {zh: 内容摘要, en: content digest, ja: 内容 digest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 保存规范化工件内容的算法标识和摘要值，用于发现同一版本的静默修改。
        en: Stores an algorithm identifier and digest for normalized artifact content to expose silent modification of the same revision.
        ja: 正規化された成果物内容の algorithm identifier と digest を保存し、同じ版への暗黙の変更を検出します。
      allowed_values: []
      pattern: "^[A-Za-z0-9._-]+:[A-Fa-f0-9]+$"
      example_value: sha256:8d61a1
      source_claims: [claim-chunk-artifact-identity]
    - id: generated_at
      labels: {zh: 生成时间, en: generated at, ja: 生成時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录该工件版本由生成活动开始存在的时刻，而不是最近一次读取、索引或存储的时间。
        en: Records when this artifact revision began to exist through its generating activity, not when it was last read, indexed, or stored.
        ja: この成果物版が生成活動を通じて存在し始めた時刻を記録し、最後に読み取り、indexing、保存した時刻は記録しません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-17T01:10:00Z"
      source_claims: [claim-chunk-artifact-provenance]
  constraints:
    - id: chunk-artifact-provenance-integrity
      severity: error
      expression_language: plain
      expression: source_version_ref, a non-empty source_span, producing_activity_ref, content_digest, artifact_id, artifact_version, and generated_at are required. Any change to source version, span, normalized content, or generating activity requires a new artifact_version.
      explanation:
        zh: 固定来源、范围、生成事实和内容身份使下游处理可回查；复用版本身份会破坏审计和重放。
        en: Pinned source, span, generation fact, and content identity keep downstream processing inspectable; reusing a version identity would break audit and replay.
        ja: 固定した source、span、generation fact、content identity により下流処理を検査可能にし、version identity の再利用は監査と replay を壊します。
      source_claims: [claim-chunk-artifact-identity, claim-chunk-artifact-provenance]
    - id: chunk-artifact-activity-boundary
      severity: error
      expression_language: plain
      expression: A ChunkArtifact must be represented as a persistent information entity and linked to its generating ChunkProcessingActivity through the ordinary ChunkArtifact-produced-by-ChunkProcessingActivity causal relation. It must not use that causal fact as is_a or part_of parentage, and must not be classified solely from a run log, metadata, reference, vector, index, or memory-store record.
      explanation:
        zh: 生成活动与生成实体是不同类别。因果来源可追踪，但既不构成子类关系，也不构成工件是活动组成部分的关系。
        en: A generating activity and generated entity are different kinds. Causal provenance is traceable but is neither subtype membership nor composition of the artifact into the activity.
        ja: 生成活動と生成 entity は別の種類です。因果的な来歴は追跡できますが、subtype membership でも、成果物を活動に含める composition でもありません。
      source_claims: [claim-chunk-artifact-provenance]
  required_relations: []
examples:
  - id: chunk-artifact-example-positive-policy

    labels: {zh: 可追溯策略分块, en: Traceable policy chunk, ja: 追跡可能な policy chunk}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values:
      artifact_id: chunk-policy-003
      artifact_version: v1
      producing_activity_ref: chunk-run-81
      source_version_ref: docs/policy.md@v7
      source_span: {unit: character, start: 1600, end_exclusive: 2400}
      content_digest: sha256:8d61a1
      generated_at: "2026-07-17T01:10:00Z"
    related_node_ids: [ChunkArtifact, Chunk, ChunkProcessingActivity]
    related_relation_ids: [ChunkArtifact-produced-by-ChunkProcessingActivity]

    source_claims: [claim-chunk-artifact-parser-output, claim-chunk-artifact-provenance]
  - id: chunk-artifact-example-counterexample-unverified-copy

    labels: {zh: 无来源身份的复制文本, en: Copied text without source identity, ja: source identity のないコピー text}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values:
      artifact_id: tmp-44
      artifact_version: null
      producing_activity_ref: null
      source_version_ref: null
      source_span: null
      content_digest: null
    related_node_ids: [ChunkArtifact]
    related_relation_ids: []

    source_claims: [claim-chunk-artifact-identity]
  - id: chunk-artifact-example-boundary-processing-run

    labels: {zh: 分块运行而非工件, en: Chunking run rather than artifact, ja: 成果物ではない chunking run}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values:
      activity_id: chunk-run-81
      output_chunk_count: 37
      artifact_id: null
      producing_activity_ref: null
    related_node_ids: [ChunkArtifact, ChunkProcessingActivity]
    related_relation_ids: [ChunkArtifact-produced-by-ChunkProcessingActivity]

    source_claims: [claim-chunk-artifact-provenance]
  - id: chunk-artifact-example-instance-llamaindex-node

    labels: {zh: 实例：LlamaIndex 解析节点, en: "Instance: LlamaIndex parser node", ja: "事例：LlamaIndex parser node"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values:
      artifact_id: chunk-handbook-17
      artifact_version: v2
      producing_activity_ref: chunk-run-handbook-07
      source_version_ref: handbook.md@v3
      source_span: {unit: character, start: 800, end_exclusive: 1520}
      content_digest: sha256:7a4b0d
      generated_at: "2026-07-18T09:30:00Z"
    related_node_ids: [ChunkArtifact, Chunk, ChunkProcessingActivity]
    related_relation_ids: [ChunkArtifact-produced-by-ChunkProcessingActivity]
    source_claims: [claim-chunk-artifact-parser-output, claim-chunk-artifact-provenance]
parent_relation: null
relations:
  - id: ChunkArtifact-produced-by-ChunkProcessingActivity
    predicate: was_generated_by
    target: concept:ChunkProcessingActivity
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由分块处理生成
      en: is generated by chunk processing
      ja: チャンク処理により生成される
    definitions:
      zh: 该关系仅在目标 ChunkProcessingActivity 实际创建此特定 ChunkArtifact 版本时成立；仅仅读取、引用、缓存复用或索引既有工件的活动不能成为生成者。
      en: This relation holds only when the target ChunkProcessingActivity actually created this specific ChunkArtifact revision; an activity that only read, referenced, reused from cache, or indexed an existing artifact is not its generator.
      ja: この関係は、対象の ChunkProcessingActivity がこの特定の ChunkArtifact revision を実際に作成した場合にだけ成立します。既存成果物を読み取り、参照、cache 再利用、indexing しただけの活動は生成者ではありません。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates_chunk_artifact
      labels: {zh: 生成分块工件, en: generates chunk artifact, ja: チャンク成果物を生成する}
    conditions:
      - id: chunk-artifact-produced-by-version-provenance
        severity: error
        expression_language: plain
        expression: Assert only when producing_activity_ref identifies the target activity, that activity completed creation of this artifact_version, source_version_ref and source_span were available to it, and generated_at falls within or immediately after its recorded execution interval.
        explanation:
          zh: 读取、重试、缓存命中和索引刷新可能使用现有工件，但不会生成其当前版本。
          en: Reading, retrying, cache hits, and index refreshes can use an existing artifact but do not generate its current revision.
          ja: 読み取り、retry、cache hit、index refresh は既存成果物を使用できますが、その current revision を生成しません。
        source_claims: [claim-chunk-artifact-provenance]
    temporal_scope: valid-time
    boundary_context: "The relation records version-specific generation only; it does not claim subtype membership, composition, later use, indexing, retrieval, or storage."
    constraints: []
    examples: []
    source_claims: [claim-chunk-artifact-provenance]
    distinct_fact_rationale: "This causal cross-link records generation of a versioned Entity by an Activity. It intentionally does not encode the invalid parent claim that a content artifact is a subtype or component of its generating activity."
    layout_role: cross-link
sources:
  - id: llamaindex-node-parsers
    title: LlamaIndex Node Parsers
    source_type: official-project-documentation
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
    relevance: Documents parsers that split Documents into Node outputs and preserve document attributes and metadata on those outputs.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Defines Entity and Activity provenance concepts, including an entity's generation by an activity and the distinction between generation and later use.
source_claims:
  - id: claim-chunk-artifact-parser-output
    source: llamaindex-node-parsers
    supports: LlamaIndex documents Node parsers that split Documents into Node outputs and preserve source-document attributes and metadata. Moonweave represents an independently addressable parser output as a ChunkArtifact.
    locator: "Node Parser Usage Pattern: parsers chunk Documents into Nodes; Nodes inherit document attributes and metadata"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-artifact-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Entity from the Activity that generated it and distinguishes generation from later use of an existing entity. Moonweave applies that pattern to a ChunkArtifact revision and its ChunkProcessingActivity without using generation as parentage.
    locator: "PROV-O: Entity, Activity, prov:wasGeneratedBy, and prov:used"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-artifact-identity
    source: llamaindex-node-parsers
    supports: Parser outputs preserve source-associated attributes and metadata. Fixed source spans, content digests, stable artifact IDs, immutable revisions, and boundaries from vectors, indexes, and memory records are Moonweave ontology design inferences for auditable processing.
    locator: "Node Parser Usage Pattern: Document-to-Node outputs"
    evidence_kind: ontology-design-inference
    confidence: medium
