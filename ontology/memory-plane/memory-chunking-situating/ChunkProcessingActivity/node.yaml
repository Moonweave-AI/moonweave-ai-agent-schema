schema: moonweave.ai/ontology-node/v1
id: ChunkProcessingActivity
kind: concept
status: accepted
labels:
  zh: 分块处理活动
  en: Chunk Processing Activity
  ja: チャンク処理活動
semantics:
  short_definition:
    zh: 使用版本化输入和处理规范产生或变换可追踪 ChunkArtifact 的可观测运行。
    en: An observable run that uses versioned inputs and a processing specification to produce or transform traceable ChunkArtifacts.
    ja: versioned input と processing specification を使い traceable ChunkArtifact を生成・変換する observable run。
  definition:
    zh: >
      ChunkProcessingActivity 是 ChunkingRun、SituatingPromptRun 和 ChunkCompression 的活动上位概念。一次活动记录运行身份、
      实际输入及版本、策略或模型规范、开始结束时间、结果状态和产物引用。它是执行变换的事件，不是 Chunk、SituatedChunk、
      ChunkMetadata、检索活动或只声明 chunk_size 的静态策略。
    en: >
      ChunkProcessingActivity is the activity genus for ChunkingRun, SituatingPromptRun, and
      ChunkCompression. One activity records a run identity, actual versioned inputs, strategy or model
      specification, start/end time, outcome, and artifact references. It is the event performing a
      transformation, not a Chunk, SituatedChunk, ChunkMetadata, retrieval activity, or a static policy
      that merely declares chunk_size.
    ja: >
      ChunkProcessingActivity は ChunkingRun・SituatingPromptRun・ChunkCompression の activity genus です。
      一つの activity は run identity、実際の versioned input、strategy・model specification、start/end time、outcome、
      artifact reference を記録します。変換を行う event であり、Chunk・SituatedChunk・ChunkMetadata・retrieval activity・
      chunk_size だけを宣言する static policy ではありません。
  why_needed:
    zh: 共同的运行身份和输入输出谱系支持重放、失效、回滚和对错误块的根因追踪。
    en: Shared run identity and input/output lineage support replay, invalidation, rollback, and root-cause tracing for faulty chunks.
    ja: 共通 run identity と input/output lineage は replay・invalidation・rollback・faulty chunk の root-cause tracing を支えます。
  includes:
    - zh: 已开始且具有实际版本化输入、处理规范、状态与 Chunk 或 SituatedChunk 输出的分割、情境化或压缩运行。
      en: Started chunking, situating, or compression runs with actual versioned inputs, a processing specification, outcome, and Chunk or SituatedChunk output.
      ja: actual versioned input・processing specification・outcome・Chunk・SituatedChunk output を持つ started chunking・situating・compression run。
  excludes:
    - zh: 未开始的计划、分割策略配置、块和其元数据、EmbeddingRun、RetrievalRun 和持久化记忆写操作。
      en: An unstarted plan, splitter configuration, chunks and their metadata, EmbeddingRun, RetrievalRun, and persistent memory-write operations.
      ja: unstarted plan、splitter configuration、chunk とその metadata、EmbeddingRun、RetrievalRun、persistent memory-write operation。
  semantic_kind: activity
  aliases: [chunk transform run, chunk processing run]
engineering:
  explanation:
    zh: >
      调度器以版本化输入和处理规范启动运行。运行输出新的 ChunkArtifact 引用、状态和可审计时间，而不是原地修改输入。
      例如 parser 产生 Chunk，contextualization 产生 SituatedChunk，compression 产生更短的新 Chunk。
    en: >
      A scheduler starts a run with versioned input and a processing specification. The run outputs new
      ChunkArtifact references, outcome, and auditable timing rather than mutating input in place. A parser
      produces Chunk, contextualization produces SituatedChunk, and compression produces a shorter new Chunk.
    ja: >
      スケジューラは版管理された input と処理仕様で run を開始します。run は input をその場で変更せず、新しい ChunkArtifact 参照、outcome、監査可能な時刻を出力します。parser は Chunk を、contextualization は SituatedChunk を、compression は短い新しい Chunk を生成します。
  typical_input:
    - description: Versioned chunk-processing job
      format: |
        {
          "processing_run_id": "chunk-81",
          "input_refs": ["docs/policy.md@v7"],
          "processor_spec_ref": "recursive-splitter-v3",
          "started_at": "2026-07-18T09:00:00Z"
        }
  typical_output:
    - description: Completed activity record
      format: |
        {
          "processing_run_id": "chunk-81",
          "outcome": "success",
          "output_artifact_refs": ["chunk-policy-4-2-03@v1"],
          "ended_at": "2026-07-18T09:00:02Z"
        }
  reference_implementations:
    - name: LlamaIndex node parsers
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
      description: Documents transforming documents into child nodes in an ingestion pipeline.
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/engineering/contextual-retrieval
      description: Documents a separate chunk-context preprocessing step before indexing.
structure:
  identity_keys: [processing_run_id]
  fields:
    - id: processing_run_id
      labels: {zh: 处理运行标识, en: processing run ID, ja: processing run ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 稳定标识一次已经开始的分块、情境化或压缩活动。
        en: Stably identifies one started chunking, situating, or compression activity.
        ja: 一回の started chunking・situating・compression activity を安定識別します。
      allowed_values: []
      pattern: null
      example_value: chunk-81
      source_claims: [claim-chunk-processing-activity]
    - id: input_refs
      labels: {zh: 输入引用, en: input references, ja: input references}
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 列出本运行实际读取的来源或已有 ChunkArtifact，不用计划输入替代实际输入。
        en: Lists sources or existing ChunkArtifacts actually read by the run, not merely planned input.
        ja: run が実際に読んだ source・existing ChunkArtifact を列挙し、planned input では代替しません。
      allowed_values: []
      pattern: null
      example_value: '["docs/policy.md@v7"]'
      source_claims: [claim-chunk-processing-activity]
    - id: processor_spec_ref
      labels: {zh: 处理规范引用, en: processor specification reference, ja: processor specification reference}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 固定本运行使用的分割器配置、提示版本或压缩模型版本。
        en: Pins the splitter configuration, prompt version, or compression-model version used by the run.
        ja: run が使った splitter configuration・prompt version・compression-model version を固定します。
      allowed_values: []
      pattern: null
      example_value: recursive-splitter-v3
      source_claims: [claim-chunk-processing-auditability]
    - id: started_at
      labels: {zh: 开始时间, en: started at, ja: started at}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录活动实际开始的时间点，区别于计划创建时间。
        en: Records when activity actually began, distinct from when a plan was created.
        ja: plan 作成時刻と区別して activity が実際に始まった時点を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-18T09:00:00Z
      source_claims: [claim-chunk-processing-auditability]
    - id: outcome
      labels: {zh: 运行结果, en: outcome, ja: outcome}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 声明成功、失败或取消状态，避免把部分输出误作完整变换。
        en: Declares success, failure, or cancellation so partial output is not mistaken for a complete transformation.
        ja: success・failure・cancellation を宣言し、partial output を complete transformation と誤認しません。
      allowed_values: [success, failed, cancelled]
      pattern: null
      example_value: success
      source_claims: [claim-chunk-processing-auditability]
    - id: output_artifact_refs
      labels: {zh: 输出产物引用, en: output artifact references, ja: output artifact references}
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 列出本运行产生的 Chunk 或 SituatedChunk 引用；输出本身不是运行对象。
        en: Lists Chunk or SituatedChunk references produced by the run; the output itself is not the run object.
        ja: run が生成した Chunk・SituatedChunk reference を列挙し、output 自体は run object ではありません。
      allowed_values: []
      pattern: null
      example_value: '["chunk-policy-4-2-03@v1"]'
      source_claims: [claim-chunk-processing-activity]
  constraints:
    - id: chunk-processing-activity-identity
      severity: error
      expression_language: plain
      expression: A ChunkProcessingActivity must have started_at, actual versioned input_refs, a processor_spec_ref, outcome, and output_artifact_refs; a static configuration or unstarted plan is not an activity.
      explanation:
        zh: 运行需要时间、实际输入和产物证据，不能仅凭配置名称被归类。
        en: A run needs timing, actual input, and output evidence; it cannot be classified from a configuration name alone.
        ja: run は timing・actual input・output evidence を必要とし、configuration name だけで分類できません。
      source_claims: [claim-chunk-processing-auditability]
    - id: chunk-processing-activity-artifact-boundary
      severity: error
      expression_language: plain
      expression: The activity must reference output artifacts rather than being identified as a Chunk, SituatedChunk, ChunkMetadata, embedding vector, or retrieval candidate itself.
      explanation:
        zh: 事件和它产生或描述的信息产物必须保持不同身份，才能可靠追溯。
        en: Event and the information artifacts it produces or describes must retain different identities for reliable tracing.
        ja: reliable tracing のため event と生成・記述する information artifact は別 identity を保持しなければなりません。
      source_claims: [claim-chunk-processing-activity]
  required_relations: []
examples:
  - id: chunk-processing-activity-positive-example

    labels: {zh: 文档分割运行, en: Document-splitting run, ja: Document-splitting run}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values: {processing_run_id: chunk-81, input_refs: '["docs/policy.md@v7"]', processor_spec_ref: recursive-splitter-v3, started_at: 2026-07-18T09:00:00Z, outcome: success, output_artifact_refs: '["chunk-policy-4-2-03@v1"]'}
    related_node_ids: [ChunkProcessingActivity, ChunkingRun, Chunk]
    related_relation_ids: []

    source_claims: [claim-chunk-processing-activity]
  - id: chunk-processing-activity-boundary-example

    labels: {zh: 未开始的分割配置, en: Unstarted splitter configuration, ja: Unstarted splitter configuration}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values: {processor_spec_ref: splitter-v3, planned_chunk_size: 800, planned_overlap: 80}
    related_node_ids: [ChunkProcessingActivity, ChunkingRun]
    related_relation_ids: []

    source_claims: [claim-chunk-processing-auditability]
  - id: chunk-processing-activity-counterexample-example

    labels: {zh: 把输出块当作运行, en: Treating an output chunk as a run, ja: Treating an output chunk as a run}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values: {chunk_id: chunk-policy-4, text: "policy body", classification_attempt: ChunkProcessingActivity}
    related_node_ids: [ChunkProcessingActivity, Chunk, ChunkArtifact]
    related_relation_ids: []

    source_claims: [claim-chunk-processing-activity]
  - id: chunk-processing-activity-instance-example

    labels: {zh: 实例：认证块上下文化, en: "Instance: authentication chunk contextualization", ja: "Instance: authentication chunk contextualization"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values: {processing_run_id: situate-auth-07, input_refs: '["chunk-api-auth-07@v1","docs/auth.md@v3"]', processor_spec_ref: contextualize-v2, started_at: 2026-07-18T09:02:00Z, outcome: success, output_artifact_refs: '["situated-api-auth-07@v1"]'}
    related_node_ids: [ChunkProcessingActivity, SituatingPromptRun, SituatedChunk]
    related_relation_ids: []

    source_claims: [claim-chunk-processing-auditability]
parent_relation: null
relations: []
sources:
  - id: llamaindex-node-parsers
    title: LlamaIndex Node Parser Usage Pattern
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
    source_type: official-documentation
    relevance: Documents an ingestion pipeline that turns documents into nodes through transformations.
  - id: anthropic-contextual-retrieval
    title: Anthropic Contextual Retrieval
    url: https://www.anthropic.com/engineering/contextual-retrieval
    source_type: official-article
    relevance: Documents a distinct model preprocessing stage that transforms chunks before indexing.
source_claims:
  - id: claim-chunk-processing-activity
    source: llamaindex-node-parsers
    supports: LlamaIndex documents parser and ingestion transformations that turn documents into child nodes, supporting explicit processing events with input and generated chunk artifacts.
    locator: "Node Parser Usage Pattern: standalone, transformation, and index usage"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-chunk-processing-auditability
    source: anthropic-contextual-retrieval
    supports: Anthropic's preprocessing pipeline distinguishes original chunks, generated contextual text, and later indexing; Moonweave records run input, versioned specification, timing, outcome, and outputs for auditable processing.
    locator: "Contextual Retrieval: preprocessing and indexing pipeline"
    evidence_kind: ontology-design-inference
    confidence: medium
