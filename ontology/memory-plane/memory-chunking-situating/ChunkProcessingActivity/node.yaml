schema: moonweave.ai/ontology-node/v1
id: ChunkProcessingActivity
kind: concept
status: accepted
labels:
  zh: 分块处理活动
  en: chunk processing activity
  ja: チャンク処理活動
semantics:
  short_definition:
    zh: 以版本化输入执行分块变换并产生可追踪分块产物的可观测活动。
    en: An observable activity that transforms versioned inputs and produces traceable chunk artifacts.
    ja: 版管理された入力を変換し、追跡可能なchunk成果物を生成する観測可能な活動です。
  definition:
    zh: ChunkProcessingActivity 是分块与情境化域的活动上位概念；每次活动以 run_id、输入对象及版本、处理策略或模型版本、开始结束时间和结果状态为身份，并显式记录消耗与产生关系。ChunkingRun 改变分段边界，SituatingPromptRun 增添局部语境，ChunkCompression 缩短内容；三者都执行变换，但活动本身不是 ChunkArtifact。
    en: ChunkProcessingActivity is the activity genus for chunking and situating. Each run is identified by run_id, input object and version, processing strategy or model version, start/end time, and result status, with explicit consumes and produces relations. ChunkingRun changes segmentation boundaries, SituatingPromptRun adds local context, and ChunkCompression shortens content; all perform transformations, but no activity is a ChunkArtifact.
    ja: ChunkProcessingActivity は分割・位置付け領域の活動上位概念です。run_id、入力対象と版、処理方策またはmodel版、開始終了時刻、結果状態で同定され、consumes／producesを明示します。ChunkingRun は分段境界を変え、SituatingPromptRun は局所文脈を加え、ChunkCompression は内容を短縮しますが、活動自体は ChunkArtifact ではありません。
  why_needed:
    zh: 统一活动身份与谱系后，系统才能回答哪个运行、用哪一版策略、从何输入生成当前 Chunk，并在策略改变时选择重放、回滚或失效旧产物。
    en: A common activity identity and lineage lets the system answer which run and strategy version produced a Chunk from which input and decide whether to replay, roll back, or invalidate artifacts after strategy changes.
    ja: 共通の活動同一性と系譜により、どの実行・方策版がどの入力から現Chunkを生成したかを追跡し、方策変更後の再実行・rollback・旧成果物失効を判断できます。
  includes:
    - zh: 纳入具有 run_id、版本化输入、策略或模型版本、执行时段、结果状态，并产生 Chunk 或 SituatedChunk 的 ChunkingRun、SituatingPromptRun 与 ChunkCompression。
      en: Includes ChunkingRun, SituatingPromptRun, and ChunkCompression executions with run ID, versioned input, strategy or model version, execution interval, result status, and Chunk or SituatedChunk outputs.
      ja: run_id、版管理入力、方策／model版、実行区間、結果状態、Chunk／SituatedChunk出力を持つ ChunkingRun、SituatingPromptRun、ChunkCompression を含みます。
  excludes:
    - zh: 排除 Chunk、SituatedChunk、ChunkMetadata、检索活动、仅声明 chunk_size 的策略规范，以及没有实际开始时间或输入版本的计划任务。
      en: Excludes Chunk, SituatedChunk, ChunkMetadata, retrieval activities, strategy specifications that only declare chunk_size, and planned jobs with no actual start time or input version.
      ja: Chunk、SituatedChunk、ChunkMetadata、検索活動、chunk_sizeだけを宣言する方策仕様、実開始時刻や入力版を欠く予定jobを除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - processing_run_id
  fields:
    - id: processing_run_id
      labels:
        zh: 处理运行标识
        en: processing-run ID
        ja: 処理 run ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经开始的分块、情境化或压缩活动。
        en: Stably identifies one started chunking, situating, or compression activity.
        ja: 開始済みの一回の chunking・situating・compression 活動を安定識別します。
      allowed_values: []
      pattern: null
      example_value: situate-run-84
      source_claims:
        - claim-chunk-processing-activity-003
    - id: input_ref
      labels:
        zh: 输入对象引用
        en: input-object reference
        ja: 入力 object 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次活动实际消费的一个或多个文档、消息、输出或已有分块。
        en: Lists the one or more documents, messages, outputs, or existing chunks actually consumed by this activity.
        ja: この活動が実際に消費した一つ以上の document・message・output・existing chunk を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - chunk-policy-7-003
      source_claims:
        - claim-chunk-processing-activity-004
    - id: input_version
      labels:
        zh: 输入版本
        en: input version
        ja: 入力 version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定活动读取的输入修订版，防止同一引用在内容变化后被误重放。
        en: Pins the input revision read by the activity so a changed referent cannot be silently replayed as the same input.
        ja: 活動が読んだ入力 revision を固定し、内容変更後の参照先を同一入力として誤 replay することを防ぎます。
      allowed_values: []
      pattern: null
      example_value: v1
      source_claims:
        - claim-chunk-processing-activity-005
    - id: processor_spec_ref
      labels:
        zh: 处理规范引用
        en: processor-specification reference
        ja: 処理仕様参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次运行采用的分块策略、定位提示或压缩模型及其版本。
        en: Pins the versioned chunking strategy, situating prompt, or compression model applied by this run.
        ja: この run が適用した chunking 方策・situating prompt・compression model とその版を固定します。
      allowed_values: []
      pattern: null
      example_value: prompt-situate-v2+model-ctx-4
      source_claims:
        - claim-chunk-processing-activity-006
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动开始读取固定输入版本的 UTC 时间。
        en: UTC instant at which the activity began reading the pinned input version.
        ja: 活動が固定入力版の読取りを開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T03:00:00.000Z
      source_claims:
        - claim-chunk-processing-activity-007
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 活动产生最终产物、失败或取消时的 UTC 时间；仍在运行时为空。
        en: UTC instant when the activity produced its final artifact, failed, or was cancelled; null while running.
        ja: 最終成果物生成・失敗・取消時の UTC 時刻で、実行中は空です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T03:00:01.240Z
      source_claims:
        - claim-chunk-processing-activity-008
    - id: outcome
      labels:
        zh: 处理结果
        en: processing outcome
        ja: 処理結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动仍在运行、成功、失败或被取消，并与是否产生新产物保持一致。
        en: Records running, success, failure, or cancellation consistently with whether a new artifact was produced.
        ja: running・success・failure・cancellation を、新成果物の生成有無と整合して記録します。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-chunk-processing-activity-009
  constraints:
    - id: chunk-processing-success-requires-new-artifact
      severity: error
      expression_language: plain
      expression: outcome = success implies exactly one or more newly identified ChunkArtifact products derived from input_ref at input_version
      explanations:
        zh: 成功运行必须产生可独立标识的新分块产物；读取缓存产物不构成生成。
        en: A successful run produces newly identified chunk artifacts; reading cached artifacts is not generation.
        ja: 成功 run は独立識別可能な新 chunk artifact を生成し、cache artifact の読取りは生成ではありません。
      source_claims:
        - claim-chunk-processing-activity-010
  required_relation_constraints:
    - id: chunk-processing-produces-artifact
      direction: outgoing
      predicate: produces
      target_concept_id: ChunkArtifact
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 成功的分块处理活动至少产生一个新 ChunkArtifact。
        en: A successful chunk-processing activity produces at least one new ChunkArtifact.
        ja: 成功した chunk-processing activity は少なくとも一つの新 ChunkArtifact を生成します。
      source_claims:
        - claim-chunk-processing-activity-011
examples:
  - id: ChunkProcessingActivity-example-positive-001
    kind: positive
    labels:
      zh: 分块处理活动正例
      en: Positive example of chunk processing activity
      ja: チャンク処理活動の正例
    scenario_id: null
    descriptions:
      zh: situate-run-84 具有 run_id、输入 chunk-policy-7-003/v1、prompt-situate-v2、model-ctx-4、开始结束时间和 success 状态，并产生 situated-policy-7-003/v2；它是可观测的 ChunkProcessingActivity。
      en: situate-run-84 has a run ID, input chunk-policy-7-003/v1, prompt-situate-v2, model-ctx-4, start/end time, and success status and produces situated-policy-7-003/v2; it is an observable ChunkProcessingActivity.
      ja: situate-run-84 はrun_id、入力chunk-policy-7-003/v1、prompt-situate-v2、model-ctx-4、開始終了時刻、success状態を持ち situated-policy-7-003/v2 を生成する観測可能な ChunkProcessingActivity です。
    field_values:
      processing_run_id: situate-run-84
      input_ref:
        - chunk-policy-7-003
      input_version: v1
      processor_spec_ref: prompt-situate-v2+model-ctx-4
      started_at: 2026-07-16T03:00:00.000Z
      ended_at: 2026-07-16T03:00:01.240Z
      outcome: success
    related_node_ids:
      - ChunkProcessingActivity
      - ChunkCompression
    related_relation_ids:
      - ChunkCompression-is_a-ChunkProcessingActivity
    expected_result:
      zh: 该运行可查询 ChunkProcessingActivity 以及方向保持不变的事实 ChunkCompression-is_a-ChunkProcessingActivity。
      en: The run can query ChunkProcessingActivity together with direction-preserving fact ChunkCompression-is_a-ChunkProcessingActivity.
      ja: この実行では ChunkProcessingActivity と方向を保持した事実 ChunkCompression-is_a-ChunkProcessingActivity を共に照会できます。
    why_valid_or_invalid:
      zh: 运行身份、版本化输入、处理配置、执行时段、结果状态与输出谱系共同证明它是一项已发生的变换活动，而不是配置或产物。
      en: Run identity, versioned input, processing configuration, execution interval, result status, and output lineage jointly establish an executed transformation rather than a configuration or artifact.
      ja: run同一性、版付き入力、処理設定、実行区間、結果状態、出力系譜が、設定や成果物でなく実行済み変換活動であることを示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-processing-activity-012
      - claim-chunk-processing-activity-013
  - id: ChunkProcessingActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 分块处理活动边界例
      en: Boundary case for chunk processing activity
      ja: チャンク処理活動の境界例
    scenario_id: null
    descriptions:
      zh: situated-policy-7-003/v2 有来源跨度、内容摘要和产物版本，并在 situate-run-84 结束后继续供索引使用；它没有开始结束时间或结果状态，因此是 ChunkArtifact，而不是 ChunkProcessingActivity。
      en: situated-policy-7-003/v2 has a source span, content digest, and artifact version and remains indexable after situate-run-84 ends. It has no execution interval or result status, so it is a ChunkArtifact rather than a ChunkProcessingActivity.
      ja: situated-policy-7-003/v2 は出典範囲、内容digest、成果物版を持ち、situate-run-84終了後も索引利用されます。開始終了時刻や結果状態を持たないため ChunkArtifact で ChunkProcessingActivity ではありません。
    field_values: {}
    related_node_ids:
      - ChunkProcessingActivity
      - ChunkArtifact
      - SituatingPromptRun
      - SituatedChunk
    related_relation_ids:
      - SituatingPromptRun-produces-SituatedChunk
    expected_result:
      zh: situated-policy-7-003/v2 保持信息产物类型；活动产生它并不让产物获得活动身份。
      en: situated-policy-7-003/v2 remains an information artifact; being produced by an activity does not give the product activity identity.
      ja: situated-policy-7-003/v2 は情報成果物型を保ち、活動に生成されても活動同一性を得ません。
    why_valid_or_invalid:
      zh: 活动由发生过程与状态识别，产物由持久内容与版本识别；produces 是因果关系，不是 is_a。
      en: An activity is identified by occurrence and status, while an artifact is identified by persistent content and version. produces is causal, not is_a.
      ja: 活動は発生過程・状態で、成果物は永続内容・版で同定され、producesは因果関係でis_aではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-processing-activity-014
      - claim-chunk-processing-activity-015
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-memory-ingestion-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析模式与 ETL 去重策略逐项人工语义核验通过。
    en: Manually verified against Anthropic Contextual Retrieval, LangChain text splitters and document loaders, LlamaIndex node parsers and ingestion pipeline, Unstructured parsing patterns, and ETL deduplication strategies.
    ja: Anthropic Contextual Retrieval、LangChain text splitters/document loaders、LlamaIndex node parsers/ingestion pipeline、Unstructured 解析パターン、ETL 重複排除戦略に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-chunk-processing-activity-001
    source: eng-fw-llamaindex-workflows
    supports: LlamaIndex Workflows provide event-driven, multi-step execution in which steps consume and emit typed events. Moonweave specializes this execution pattern for chunk transformations and requires run identity, versioned input, strategy or model version, timing, result, and explicit products.
    locator: Workflows documentation > Event-driven workflows > events, steps, and execution
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-002
    source: lit-agent-agemem
    supports: Agentic Memory exposes management actions over memory state, including update, summarize, and discard. This supports an activity genus distinct from information artifacts; the three ChunkProcessingActivity specializations and their exact invariants are Moonweave design choices.
    locator: Paper > Agentic Memory > abstract and memory-management action space
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-003
    source: eng-fw-llamaindex-workflows
    supports: LlamaIndex Workflows execute typed steps as distinguishable workflow runs. processing_run_id is Moonweave's stable identifier for one chunk-transformation execution.
    locator: Workflows documentation > Event-driven workflows > events, steps, and execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-processing-activity-004
    source: lit-agent-agemem
    supports: Agentic Memory models memory-management actions over an identified memory state. input_ref makes the object acted on explicit for chunk processing.
    locator: Paper > Agentic Memory > memory-management action space
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-processing-activity-005
    source: lit-agent-agemem
    supports: Memory-management actions update evolving memory state. input_version is Moonweave's provenance control for identifying the exact pre-action state.
    locator: Paper > Agentic Memory > memory state and management actions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-006
    source: eng-fw-llamaindex-workflows
    supports: Workflow steps execute configured handlers, while input and output events remain distinct. processor_spec_ref identifies the transformation configuration without treating it as the activity.
    locator: Workflows documentation > Event-driven workflows > steps and event handlers
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-processing-activity-007
    source: eng-fw-llamaindex-workflows
    supports: A workflow step has an execution boundary. started_at makes that boundary auditable for a chunk-processing activity.
    locator: Workflows documentation > Event-driven workflows > execution
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-008
    source: eng-fw-llamaindex-workflows
    supports: Workflow execution produces later events or terminates with an error. ended_at records that terminal boundary for replay and provenance.
    locator: Workflows documentation > Event-driven workflows > events, steps, and execution
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-009
    source: lit-agent-agemem
    supports: Memory-management actions may change memory state or fail to produce an update. outcome records whether the attempted transformation completed without identifying the activity as its artifact.
    locator: Paper > Agentic Memory > memory-management action space
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-010
    source: lit-agent-agemem
    supports: Agentic Memory distinguishes actions that update memory state from retrieval or observation. Moonweave therefore requires a successful transformation to establish a new artifact identity.
    locator: Paper > Agentic Memory > memory-management action space
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-processing-activity-011
    source: lit-agent-agemem
    supports: Agentic Memory actions such as update and summarize yield changed memory state. The explicit produces constraint is Moonweave's provenance representation of that state change.
    locator: Paper > Agentic Memory > memory-management action space
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-processing-activity-012
    source: eng-fw-llamaindex-workflows
    supports: LlamaIndex Workflows model event-driven, multi-step executions in which handlers consume events and emit later events. Moonweave applies run identity, versioned inputs, status, and produced artifacts to one chunk-processing execution.
    locator: Workflows documentation > Event-driven workflows > events and steps
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-013
    source: lit-agent-agemem
    supports: Agentic Memory treats update and summarize as actions over memory state. situate-run-84 is likewise modeled as an action with explicit inputs and output rather than as the information it produces.
    locator: Paper > Agentic Memory > memory-management action space
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-014
    source: eng-fw-llamaindex-workflows
    supports: LlamaIndex Workflows distinguish the workflow execution and its events from data objects passed between steps. Moonweave likewise separates a chunk-processing occurrence from the persistent ChunkArtifact it emits.
    locator: Workflows documentation > Events and steps > input and output events
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-processing-activity-015
    source: lit-agent-agemem
    supports: Agentic Memory distinguishes memory-management actions from memory state. A produced chunk remains information state rather than becoming the update or summarize action that created it.
    locator: Paper > Agentic Memory > memory state and management actions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
