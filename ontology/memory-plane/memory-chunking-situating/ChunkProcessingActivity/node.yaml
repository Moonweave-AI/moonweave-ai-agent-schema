schema: moonweave.ai/ontology-node/v1
id: ChunkProcessingActivity
kind: concept
labels:
  zh: 分块处理活动
  en: Chunk processing activity
  ja: チャンク処理 activity
semantics:
  short_definition:
    zh: 分块、语境化与压缩的可观察活动根类。
    en: Root activity class for observable chunking, situating, and compression work.
    ja: chunking/situating/compression の observable work activity root class。
  definition:
    zh: ChunkProcessingActivity 是活动根类；ChunkingRun 切分 Document 为 Chunk，SituatingPromptRun 生成 situating context 产出 SituatedChunk，ChunkCompression 缩短片段。Chunk、SituatedChunk 与 ChunkMetadata 是产物，不是活动子类。
    en: ChunkProcessingActivity is the activity root. ChunkingRun splits Documents into Chunks; SituatingPromptRun generates situating context producing SituatedChunks; ChunkCompression shortens fragments. Chunk, SituatedChunk, and ChunkMetadata are artifacts—not activity subtypes.
    ja: ChunkProcessingActivity は activity root。ChunkingRun→Chunk、SituatingPromptRun→SituatedChunk、ChunkCompression→短縮。Chunk/SituatedChunk/ChunkMetadata は artifact。
  why_needed:
    zh: 活动与 ChunkArtifact 分离后，可追踪 LlamaIndex SentenceSplitter 或 Anthropic situating prompt 各 run 而不把 LangChain Document 误判为活动。
    en: Separating activity from ChunkArtifact traces LlamaIndex SentenceSplitter or Anthropic situating prompt runs without misclassifying LangChain Documents as activities.
    ja: activity/artifact 分離で SentenceSplitter/situating prompt 各 run 追跡。LangChain Document を activity と誤認しない。
  includes:
    - zh: 纳入具有 processing_run_id、版本化输入、processor_spec_ref 与 outcome 的 ChunkingRun、SituatingPromptRun、ChunkCompression。
      en: Includes ChunkingRun, SituatingPromptRun, and ChunkCompression with processing_run_id, versioned input, processor_spec_ref, and outcome.
      ja: processing_run_id/版 input/processor_spec_ref/outcome 付き ChunkingRun/SituatingPromptRun/ChunkCompression。
  excludes:
    - zh: 排除 Chunk、SituatedChunk、ChunkMetadata、ChunkReference 与仅声明 chunk_size 的策略规范。
      en: Excludes Chunk, SituatedChunk, ChunkMetadata, ChunkReference, and strategy specs declaring only chunk_size.
      ja: Chunk/SituatedChunk/ChunkMetadata/ChunkReference/chunk_size のみ spec を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangChain RecursiveCharacterTextSplitter、LlamaIndex SentenceSplitter 映射 ChunkingRun；Anthropic contextual retrieval situating prompt 映射 SituatingPromptRun；LlamaIndex ContextualCompressionRetriever 映射 ChunkCompression。活动记录 started_at/outcome，产物另行建模。
    en: LangChain RecursiveCharacterTextSplitter and LlamaIndex SentenceSplitter map to ChunkingRun; Anthropic contextual retrieval situating prompt maps to SituatingPromptRun; LlamaIndex ContextualCompressionRetriever maps to ChunkCompression. Activities record started_at/outcome; artifacts modeled separately.
    ja: LangChain/LlamaIndex splitter→ChunkingRun。Anthropic situating→SituatingPromptRun。ContextualCompressionRetriever→ChunkCompression。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: LangChain RecursiveCharacterTextSplitter
      url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
      description: Recursive document chunking.
    - name: LlamaIndex SentenceSplitter
      url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
      description: Sentence-aware chunk_size and overlap.
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/news/contextual-retrieval
      description: Situating prompt per chunk.
structure:
  identity_keys: [processing_run_id]
  fields:
    - id: processing_run_id
      labels: {zh: 处理运行标识, en: Processing run identifier, ja: 処理 run 識別子}
      definitions:
        zh: 稳定标识一次分块、语境化或压缩活动。
        en: Stable identifier for one chunking, situating, or compression activity.
        ja: 一 chunking/situating/compression activity を安定識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-run-7
      allowed_values: []
      source_claims: [claim-chunk-processing-activity-id]
    - id: started_at
      labels: {zh: 开始时间, en: Started at, ja: 開始時刻}
      definitions:
        zh: 活动开始读取固定输入版本的 UTC 时间。
        en: UTC instant when activity began reading pinned input version.
        ja: 固定 input 版読取開始 UTC 時刻。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T03:00:00Z
      allowed_values: []
      source_claims: [claim-chunk-processing-activity-started]
    - id: outcome
      labels: {zh: 处理结果, en: Processing outcome, ja: 処理結果}
      definitions:
        zh: running、success、failure 或 cancelled。
        en: running, success, failure, or cancelled.
        ja: running/success/failure/cancelled。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: []
      source_claims: [claim-chunk-processing-activity-outcome]
  constraints: []
  required_relations: []
examples:
  - id: ChunkProcessingActivity-example-chunking-run
    labels:
      zh: LlamaIndex 分块活动
      en: LlamaIndex chunking activity
      ja: LlamaIndex chunking activity
    descriptions:
      zh: chunk-run-7 作为 ChunkProcessingActivity 使用 SentenceSplitter(chunk_size=512, overlap=64) 切分 doc-policy/v7，产出 18 个 Chunk；chunk-run-7 是活动不是 Chunk。
      en: chunk-run-7 as ChunkProcessingActivity uses SentenceSplitter(chunk_size=512, overlap=64) on doc-policy/v7 producing 18 Chunks; chunk-run-7 is activity not Chunk.
      ja: chunk-run-7 が SentenceSplitter で doc-policy/v7→18 Chunk。chunk-run-7=activity。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
      version: SentenceSplitter
    field_values:
      processing_run_id: chunk-run-7
      started_at: 2026-07-16T03:00:00Z
      outcome: success
    related_node_ids:
      - ChunkProcessingActivity
      - ChunkingRun
    related_relation_ids: []
    source_claims:
      - claim-chunk-processing-activity-llamaindex
      - claim-chunk-processing-activity-design
  - id: ChunkProcessingActivity-example-situating-run
    labels:
      zh: Anthropic 语境化活动
      en: Anthropic situating activity
      ja: Anthropic situating activity
    descriptions:
      zh: situate-run-84 作为 ChunkProcessingActivity 对 chunk-policy-7-003 执行 situating prompt，产出 situated-policy-7-003/v2 SituatedChunk。
      en: situate-run-84 as ChunkProcessingActivity runs situating prompt on chunk-policy-7-003 producing situated-policy-7-003/v2 SituatedChunk.
      ja: situate-run-84 が chunk-policy-7-003 に situating prompt→SituatedChunk。
    example_source:
      product: Anthropic
      url: https://www.anthropic.com/news/contextual-retrieval
      version: contextual retrieval
    field_values:
      processing_run_id: situate-run-84
      outcome: success
    related_node_ids:
      - ChunkProcessingActivity
      - SituatingPromptRun
    related_relation_ids: []
    source_claims:
      - claim-chunk-processing-activity-anthropic
      - claim-chunk-processing-activity-design
  - id: ChunkProcessingActivity-example-not-chunk
    labels:
      zh: 活动非分块产物
      en: Activity is not chunk artifact
      ja: activity は chunk artifact ではない
    descriptions:
      zh: chunk-policy-7-003 是 Chunk 产物含 SourceSpan；chunk-run-7 是可观察运行。二者 ID 与生命周期不同。
      en: chunk-policy-7-003 is Chunk artifact with SourceSpan; chunk-run-7 is observable run. IDs and lifecycles differ.
      ja: chunk-policy-7-003=Chunk artifact。chunk-run-7=observable run。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkProcessingActivity
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-processing-activity-design
parent_relation: null
relations: []
sources:
  - id: src-langchain-splitter
    title: LangChain RecursiveCharacterTextSplitter
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
    source_type: official-doc
    relevance: Document chunking activity boundary.
  - id: src-llamaindex-splitter
    title: LlamaIndex SentenceSplitter
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
