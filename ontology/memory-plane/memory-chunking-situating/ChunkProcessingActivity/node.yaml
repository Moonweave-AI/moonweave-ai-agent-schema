source_claims:
  - id: claim-chunk-processing-activity-llamaindex
    source: src-llamaindex-splitter
    supports: LlamaIndex SentenceSplitter executes bounded chunking runs over documents.
    locator: SentenceSplitter API
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-processing-activity-anthropic
    source: src-anthropic-contextual
    supports: Anthropic contextual retrieval runs situating prompts per chunk before indexing.
    locator: Contextual retrieval workflow
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-processing-activity-design
    source: src-chunk-processing-design
    supports: ChunkProcessingActivity separates runs from Chunk and SituatedChunk artifacts.
    locator: ChunkProcessingActivity boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-processing-activity-id
    source: src-chunk-processing-design
    supports: processing_run_id identifies chunk processing activities.
    locator: structure
