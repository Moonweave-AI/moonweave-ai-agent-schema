    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-processing-activity-outcome
    source: src-chunk-processing-design
    supports: outcome records whether new ChunkArtifact was produced.
    locator: structure
    evidence_kind: design-inference
    confidence: high
