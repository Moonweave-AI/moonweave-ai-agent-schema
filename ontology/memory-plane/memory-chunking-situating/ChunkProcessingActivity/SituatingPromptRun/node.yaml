source_claims:
  - id: claim-situating-prompt-run-001
    source: eng-fw-llamaindex-metadata-extraction
    supports: LlamaIndex documents contextual-information extraction for ambiguous chunks and a pipeline of feature extractors whose results are added to Nodes. This supports the operation behind SituatingPromptRun; event identity, inputs, prompt/model versions, validation, output, owner, semantic kind, and hierarchy are Moonweave design inference.
    locator: Metadata Extraction > Introduction > contextual extraction; Usage > sequential feature extractors
    evidence_kind: design-inference
