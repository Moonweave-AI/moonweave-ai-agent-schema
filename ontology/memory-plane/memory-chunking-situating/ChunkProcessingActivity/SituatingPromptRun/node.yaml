schema: moonweave.ai/ontology-node/v1
id: SituatingPromptRun
kind: concept
status: accepted
labels:
  zh: 情境化提示运行
  en: Situating Prompt Run
  ja: 文脈化プロンプト実行
semantics:
  short_definition:
    zh: 读取一个源分块及更广来源上下文、生成可分离检索说明和新 SituatedChunk 的 ChunkProcessingActivity 子类。
    en: A ChunkProcessingActivity subtype that reads a source chunk and broader source context to generate separable retrieval explanation and a new SituatedChunk.
    ja: source chunk とより広い source context を読み取り、分離可能な retrieval explanation と新しい SituatedChunk を生成する ChunkProcessingActivity の下位型。
  definition:
    zh: >
      SituatingPromptRun 是一次实际的模型提示处理活动。它向模型提供确定的目标 Chunk 版本及足以解释其文档角色的
      来源上下文，使用版本化提示和模型生成短 context_note，并生成独立的 SituatedChunk 版本。该运行不会切分
      来源文档、生成嵌入、返回检索候选，也不能把生成说明写回源块正文或长期记忆。它不是生成的说明或输出工件本身。
    en: >
      SituatingPromptRun is one actual model-prompt processing activity. It provides a determinate target Chunk
      revision and enough source context to explain its document role to a model, uses a versioned prompt and model
      to generate a short context_note, and generates an independent SituatedChunk revision. The run does not split
      source documents, generate embeddings, return retrieval candidates, or write generated explanation back into
      source-chunk body or long-term memory. It is not the generated note or output artifact itself.
    ja: >
      SituatingPromptRun は一回の実際の model-prompt processing activity です。確定済み target Chunk revision と
      文書内の役割を説明するのに十分な source context を model に与え、版管理された prompt と model を使って
      短い context_note を生成し、独立した SituatedChunk revision を生成します。この run は source document を
      split せず、embedding を生成せず、retrieval candidate を返さず、生成説明を source-chunk body や
      long-term memory に書き戻しません。生成 note や output artifact 自体ではありません。
  why_needed:
    zh: 孤立分块可能缺少章节主题、实体和时间信息。记录生成运行、输入证据和可分离输出使系统能改善检索歧义而不伪造原始来源。
    en: An isolated chunk can lack section topic, entity, and time information. Recording generating run, input evidence, and separable output lets a system improve retrieval disambiguation without fabricating original source.
    ja: 孤立した chunk には section topic、entity、time 情報が欠けることがあります。generating run、input evidence、分離可能な output を記録することで、元の source を捏造せず retrieval の曖昧性解消を改善できます。
  includes:
    - zh: 已执行运行、源分块版本、用于说明的来源上下文、提示与模型版本、生成说明和新的 SituatedChunk 版本。
      en: Completed run, source chunk revision, source context used for explanation, prompt and model revisions, generated note, and new SituatedChunk revision.
      ja: 完了した run、source chunk revision、説明に使った source context、prompt と model revision、生成 note、新しい SituatedChunk revision。
  excludes:
    - zh: 源块正文、未执行 prompt 配置、首次来源切分、已有块压缩、嵌入、索引、检索候选和将生成说明永久写入来源文本。
      en: Source-chunk body, unexecuted prompt configuration, initial source splitting, existing-chunk compression, embedding, indexing, retrieval candidate, or permanently writing generated explanation into source text.
      ja: source-chunk body、未実行 prompt configuration、初期 source splitting、既存 chunk compression、embedding、indexing、retrieval candidate、生成説明を source text に恒久的に書き込むこと。
  semantic_kind: activity
  aliases: [contextualization run, contextual retrieval preprocessing run, 情境增强运行]
engineering:
  explanation:
    zh: Contextual Retrieval 将整个文档和目标分块提供给模型，以生成在嵌入和 BM25 前使用的说明。Moonweave 将这一调用记录为活动，避免把模型生成说明与来源文本混为一体。
    en: Contextual Retrieval provides whole document and target chunk to a model to generate explanation used before embedding and BM25. Moonweave records that call as an activity to avoid conflating model-generated explanation with source text.
    ja: Contextual Retrieval は whole document と target chunk を model に与え、embedding と BM25 の前に使う説明を生成します。Moonweave はこの call を activity として記録し、model-generated explanation と source text の混同を避けます。
  typical_input:
    - description: Target chunk and source context
      format: |
        {
          "source_chunk_ref": "chunk-policy-4-2-03@v1",
          "source_context_ref": "docs/policy.md@v7#section-4-2",
          "prompt_version_ref": "contextualize-v2",
          "model_ref": "context-model-v1"
        }
  typical_output:
    - description: Situated-chunk generation record
      format: |
        {
          "situating_run_id": "situate-84",
          "context_note": "Section 4.2 describes deletion after user withdrawal.",
          "output_situated_chunk_ref": "situated-policy-4-2-03@v1"
        }
  reference_implementations:
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/engineering/contextual-retrieval
      description: Documents providing whole document and target chunk to a model to generate contextual text before contextual embeddings and contextual BM25.
structure:
  identity_keys: [situating_run_id]
  fields:
    - id: situating_run_id
      labels: {zh: 情境化运行标识, en: situating run ID, ja: situating run ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际执行的模型情境化活动，不能复用为输出工件、提示或模型标识。
        en: Identifies one actually executed model situating activity and is not reused as output artifact, prompt, or model ID.
        ja: 一回の実際に実行された model situating activity を識別し、output artifact、prompt、model ID として再利用しません。
      allowed_values: []
      pattern: "^situate-[A-Za-z0-9._-]+$"
      example_value: situate-84
      source_claims: [claim-situating-run-contextualization]
    - id: source_chunk_ref
      labels: {zh: 源分块版本引用, en: source chunk revision reference, ja: source chunk revision 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向该运行实际提供给模型的确定源 Chunk 版本，而非后续修订或输出 SituatedChunk。
        en: Points to the determinate source Chunk revision actually supplied to the model, not a later revision or output SituatedChunk.
        ja: model に実際に与えた確定済み source Chunk revision を指し、後の revision や output SituatedChunk は指しません。
      allowed_values: []
      pattern: "^chunk-[A-Za-z0-9._-]+@v[0-9]+(?:[A-Za-z0-9._-]*)$"
      example_value: chunk-policy-4-2-03@v1
      source_claims: [claim-situating-run-contextualization]
    - id: source_context_ref
      labels: {zh: 来源上下文引用, en: source context reference, ja: 情報源コンテキスト参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次说明生成时实际读取的更广来源范围，不能用模型自身生成的文字替代。
        en: Points to broader source extent actually read when generating the note and cannot be replaced with model-generated text.
        ja: note 生成時に実際に読み取ったより広い source extent を指し、model-generated text に置き換えることはできません。
      allowed_values: []
      pattern: "^[^\\s]+$"
      example_value: docs/policy.md@v7#section-4-2
      source_claims: [claim-situating-run-contextualization]
    - id: prompt_version_ref
      labels: {zh: 提示版本引用, en: prompt version reference, ja: プロンプト版参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向指导本次模型调用的可审计提示版本。
        en: Points to the auditable prompt revision governing this model call.
        ja: この model call を統制する audit 可能な prompt revision を指します。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: contextualize-v2
      source_claims: [claim-situating-run-auditability]
    - id: model_ref
      labels: {zh: 模型引用, en: model reference, ja: モデル参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向生成说明所用模型或部署版本，而非检索器或嵌入模型。
        en: Points to model or deployment revision used to generate the note rather than a retriever or embedding model.
        ja: note 生成に使った model または deployment revision を指し、retriever や embedding model ではありません。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: context-model-v1
      source_claims: [claim-situating-run-auditability]
    - id: context_note
      labels: {zh: 生成上下文说明, en: generated context note, ja: 生成コンテキスト注記}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 本次运行生成的、可与源块正文分离的说明文本，不具有原始来源文本地位。
        en: Explanation text generated by this run that remains separable from the source-chunk body and does not have original-source-text status.
        ja: この run が生成した説明 text であり、source-chunk body から分離可能で、original-source-text の地位を持ちません。
      allowed_values: []
      pattern: null
      example_value: Section 4.2 describes deletion after user withdrawal.
      source_claims: [claim-situating-run-source-boundary]
    - id: output_situated_chunk_ref
      labels: {zh: 输出情境化分块版本引用, en: output situated chunk revision reference, ja: output situated chunk revision 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次运行新生成的独立 SituatedChunk 版本，不能指向输入 Chunk 或仅存储的 note。
        en: Points to independent SituatedChunk revision newly generated by this run and cannot point to input Chunk or a note stored alone.
        ja: この run が新しく生成した独立 SituatedChunk revision を指し、input Chunk や単独保存 note を指すことはできません。
      allowed_values: []
      pattern: "^situated-[A-Za-z0-9._-]+@v[0-9]+(?:[A-Za-z0-9._-]*)$"
      example_value: situated-policy-4-2-03@v1
      source_claims: [claim-situating-run-provenance]
    - id: generated_at
      labels: {zh: 生成时间, en: generated at, ja: 生成時刻}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录输出情境化工件开始存在的时间，而非来源文本的最后修改时间。
        en: Records when the output situated artifact began to exist, not when source text was last modified.
        ja: output situated artifact が存在し始めた時刻を記録し、source text の最終変更時刻ではありません。
      allowed_values: []
      pattern: null
      example_value: "2026-07-18T10:15:00Z"
      source_claims: [claim-situating-run-provenance]
  constraints:
    - id: situating-run-source-separation
      severity: error
      expression_language: plain
      expression: context_note must remain separable and marked as generated; source_chunk_ref and source_context_ref must continue to identify original evidence, and the run must not replace source body, source version, or source span with generated text.
      explanation:
        zh: 生成说明可辅助检索，但不是新的来源证据，也不能静默改写或扩大源文本。
        en: Generated explanation may assist retrieval but is not new source evidence and cannot silently rewrite or enlarge source text.
        ja: generated explanation は retrieval を支援できますが、新しい source evidence ではなく、source text を黙って書き換えたり拡大したりできません。
      source_claims: [claim-situating-run-source-boundary]
    - id: situating-run-output-provenance
      severity: error
      expression_language: plain
      expression: source_chunk_ref, source_context_ref, prompt_version_ref, model_ref, context_note, output_situated_chunk_ref, and generated_at are required. output_situated_chunk_ref must be a new revision generated by this run rather than an existing source Chunk.
      explanation:
        zh: 可审计情境化需要明确输入、模型调用和独立输出；读取已有工件不等同于生成它。
        en: Auditable situating requires explicit inputs, model call, and independent output; reading an existing artifact is not generating it.
        ja: audit 可能な situating には明示的 input、model call、独立 output が必要で、既存 artifact の読み取りはその生成ではありません。
      source_claims: [claim-situating-run-provenance]
    - id: situating-run-role-boundary
      severity: error
      expression_language: plain
      expression: SituatingPromptRun must not assert source segmentation, compression, embedding-vector creation, index membership, retrieval rank, context-package inclusion, or long-term memory write. Those claims require separate activities or artifacts.
      explanation:
        zh: 本活动只生成可分离说明和情境化工件；其他处理阶段拥有独立责任。
        en: This activity generates separable explanation and situated artifact only; other processing stages have separate responsibilities.
        ja: この activity は分離可能な説明と situated artifact だけを生成し、他の処理段階は別の responsibility を持ちます。
      source_claims: [claim-situating-run-pipeline-boundary]
  required_relations: []
examples:
  - id: situating-run-example-positive-policy

    labels: {zh: 策略分块情境化运行, en: Policy-chunk situating run, ja: policy chunk 文脈化実行}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values:
      situating_run_id: situate-84
      source_chunk_ref: chunk-policy-4-2-03@v1
      source_context_ref: docs/policy.md@v7#section-4-2
      prompt_version_ref: contextualize-v2
      model_ref: context-model-v1
      context_note: Section 4.2 describes deletion after user withdrawal.
      output_situated_chunk_ref: situated-policy-4-2-03@v1
      generated_at: "2026-07-18T10:15:00Z"
    related_node_ids: [SituatingPromptRun, ChunkProcessingActivity, Chunk, SituatedChunk]
    related_relation_ids: [SituatingPromptRun-is_a-ChunkProcessingActivity, SituatingPromptRun-uses-Chunk, SituatingPromptRun-generates-SituatedChunk]

    source_claims: [claim-situating-run-contextualization, claim-situating-run-provenance]
  - id: situating-run-example-counterexample-mixed-body

    labels: {zh: 说明写回来源正文, en: Explanation written back into source body, ja: source body に書き戻された説明}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values:
      source_chunk_ref: chunk-policy-4-2-03@v1
      context_note: null
      source_body_mutated: true
      output_situated_chunk_ref: null
    related_node_ids: [SituatingPromptRun, Chunk]
    related_relation_ids: []

    source_claims: [claim-situating-run-source-boundary]
  - id: situating-run-example-boundary-chunking

    labels: {zh: 首次来源切分运行, en: Initial source-splitting run, ja: 初期 source-splitting run}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values:
      chunking_run_id: chunk-81
      source_resource_ref: docs/policy.md@v7
      source_chunk_ref: null
      output_chunk_refs: [chunk-policy-01@v1, chunk-policy-02@v1]
    related_node_ids: [SituatingPromptRun, ChunkingRun]
    related_relation_ids: []

    source_claims: [claim-situating-run-pipeline-boundary]
  - id: situating-run-example-instance-auth

    labels: {zh: 实例：OAuth 回调说明生成, en: "Instance: OAuth callback explanation", ja: "事例：OAuth callback 説明生成"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values:
      situating_run_id: situate-auth-07
      source_chunk_ref: chunk-api-auth-07@v1
      source_context_ref: docs/auth.md@v3#callbacks
      prompt_version_ref: contextualize-v2
      model_ref: context-model-v1
      context_note: OAuth callback URI configuration.
      output_situated_chunk_ref: situated-api-auth-07@v1
      generated_at: "2026-07-18T11:30:00Z"
    related_node_ids: [SituatingPromptRun, Chunk, SituatedChunk]
    related_relation_ids: [SituatingPromptRun-is_a-ChunkProcessingActivity, SituatingPromptRun-uses-Chunk, SituatingPromptRun-generates-SituatedChunk]
    source_claims: [claim-situating-run-contextualization, claim-situating-run-provenance]
parent_relation:
  id: SituatingPromptRun-is_a-ChunkProcessingActivity
  predicate: is_a
  target: concept:ChunkProcessingActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是分块处理活动的情境化子类
    en: is a contextualization subtype of chunk processing activity
    ja: ChunkProcessingActivity の文脈化下位型である
  definitions:
    zh: SituatingPromptRun is_a ChunkProcessingActivity，表示每次生成分离上下文说明的模型运行都是处理活动；其种差是使用已有源块和文档上下文生成 SituatedChunk。
    en: SituatingPromptRun is_a ChunkProcessingActivity means every model run generating separable context is a processing activity whose differentia is using an existing source chunk and document context to generate SituatedChunk.
    ja: SituatingPromptRun is_a ChunkProcessingActivity は、分離可能な context を生成する各 model run が processing activity であり、既存 source chunk と document context を使って SituatedChunk を生成することが種差であると表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定系统可执行多少次情境化调用。
    en: Classification does not prescribe how many situating calls a system may execute.
    ja: 分類関係は system が実行できる situating call 数を規定しません。
  inverse_reading:
    predicate: has_situating_prompt_run_subtype
    labels: {zh: 具有情境化提示运行子类, en: has situating-prompt-run subtype, ja: 文脈化プロンプト実行下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-situating-run-subtype]
  distinct_fact_rationale:
    zh: 此关系表达活动类型归属，不表达具体输入块使用、具体说明生成、输出工件或嵌入检索操作。
    en: This relation expresses activity type membership, not concrete input-chunk use, note generation, output artifact, or embedding/retrieval operation.
    ja: この関係は activity type membership を表し、具体的 input-chunk use、note generation、output artifact、embedding/retrieval operation は表しません。
  layout_role: primary-backbone
relations:
  - id: SituatingPromptRun-uses-Chunk
    predicate: uses
    target: concept:Chunk
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用源分块, en: uses source chunk, ja: source chunk を使用する}
    definitions:
      zh: 仅当 source_chunk_ref 指向目标 Chunk 版本且该版本实际被提供给模型时，SituatingPromptRun 使用该 Chunk。
      en: A SituatingPromptRun uses a Chunk only when source_chunk_ref identifies that Chunk revision and it was actually supplied to the model.
      ja: source_chunk_ref がその Chunk revision を識別し、それが実際に model に与えられた場合にだけ、SituatingPromptRun は Chunk を使用します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_used_by_situating_prompt_run
      labels: {zh: 被情境化提示运行使用, en: is used by situating prompt run, ja: 文脈化プロンプト実行に使用される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-situating-run-provenance]
    distinct_fact_rationale: "This is concrete input use, not a parent relation or claim that context note was source text."
    layout_role: cross-link
  - id: SituatingPromptRun-generates-SituatedChunk
    predicate: generates
    target: concept:SituatedChunk
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成情境化分块, en: generates situated chunk, ja: 文脈化チャンクを生成する}
    definitions:
      zh: 仅当 output_situated_chunk_ref 指向目标新版本且运行完成时，SituatingPromptRun 生成该 SituatedChunk。
      en: A SituatingPromptRun generates a SituatedChunk only when output_situated_chunk_ref names that new revision and the run completed.
      ja: output_situated_chunk_ref がその新しい revision を示し、run が完了した場合にだけ、SituatingPromptRun は SituatedChunk を生成します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_generated_by_situating_prompt_run
      labels: {zh: 由情境化提示运行生成, en: is generated by situating prompt run, ja: 文脈化プロンプト実行により生成される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-situating-run-provenance]
    distinct_fact_rationale: "This is version-specific output generation and does not make an information artifact a subtype or component of the activity."
    layout_role: cross-link
sources:
  - id: anthropic-contextual-retrieval
    title: Anthropic Contextual Retrieval
    source_type: official-engineering-article
    url: https://www.anthropic.com/engineering/contextual-retrieval
    relevance: Documents providing whole document and target chunk to a model to produce contextual text before contextual embeddings and contextual BM25.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes an Activity from entities it uses and generates.
source_claims:
  - id: claim-situating-run-contextualization
    source: anthropic-contextual-retrieval
    supports: Anthropic documents a preprocessing step that provides a whole document and target chunk to a model to generate chunk-specific explanatory context before contextual embeddings and contextual BM25.
    locator: "Contextual Retrieval: preprocessing prompt and contextual embeddings/contextual BM25"
    evidence_kind: official-documentation
    confidence: high
