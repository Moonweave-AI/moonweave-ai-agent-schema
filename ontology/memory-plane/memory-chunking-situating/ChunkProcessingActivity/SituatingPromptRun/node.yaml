sibling_differentiation:
  - sibling_concept_id: ChunkCompression
    shared_parent_concept_id: ChunkProcessingActivity
    differentia:
      zh: 共享父节点对照：父节点 ChunkProcessingActivity：SituatingPromptRun（semantic kind=activity，骨架 SituatingPromptRun-is_a-ChunkProcessingActivity）；ChunkCompression（semantic kind=activity，骨架 ChunkCompression-is_a-ChunkProcessingActivity）。双端条件：SituatingPromptRun 条件：“分块定位提示运行是以如下事实为区分特征的分块处理活动：定位提示运行是为分块补充文档局部或任务局部上下文的可观测事件，使检索保留章节含义、来源目的和周边证据”；ChunkCompression 条件：“分块压缩活动是一种分块处理活动（ChunkProcessingActivity），在保留来源锚点的前提下压缩一个或多个分块并产生新的 Chunk；压缩输出仍是分块，不是活动本身”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ChunkProcessingActivity: SituatingPromptRun (semantic kind=activity, backbone SituatingPromptRun-is_a-ChunkProcessingActivity); ChunkCompression (semantic kind=activity, backbone ChunkCompression-is_a-ChunkProcessingActivity). Endpoint conditions: SituatingPromptRun condition: “Situating prompt run is a chunk processing activity; its differentiating condition is that it is an observable event that adds document-local or task-local context to a chunk so retrieval can preserve section meaning, source purpose, and surrounding evidence”; ChunkCompression condition: “Chunk compression activity is a chunk processing activity; its differentiating condition is that it is a ChunkProcessingActivity that compresses one or more chunks while preserving source anchors and produces a new Chunk; the compressed output remains a chunk rather than the activity itself”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ChunkProcessingActivity：SituatingPromptRun（semantic kind=activity、バックボーン SituatingPromptRun-is_a-ChunkProcessingActivity）；ChunkCompression（semantic kind=activity、バックボーン ChunkCompression-is_a-ChunkProcessingActivity）。両端条件：SituatingPromptRun の条件：「位置付けプロンプト実行はチャンク処理活動の一種であり、次の条件で区別されます：それは、検索が節の意味、出典の目的、周辺証拠を保てるように、チャンクへ文書内またはタスク内の文脈を加える観測可能なイベントです」；ChunkCompression の条件：「チャンク圧縮活動はチャンク処理活動（ChunkProcessingActivity）の一種で、出典アンカーを保持しながら一つ以上のチャンクを圧縮して新しい Chunk を生成します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-situating-prompt-run-007
