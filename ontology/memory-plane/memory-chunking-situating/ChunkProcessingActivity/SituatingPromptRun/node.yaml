    source: lit-mech-compass
    supports: COMPASS's Context Manager maintains relevant briefs to preserve useful task context. That context-maintenance purpose differs from content-length reduction, supporting Moonweave's boundary between a situating run and ChunkCompression.
    locator: Paper > Abstract > Context Manager maintains concise, relevant progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
