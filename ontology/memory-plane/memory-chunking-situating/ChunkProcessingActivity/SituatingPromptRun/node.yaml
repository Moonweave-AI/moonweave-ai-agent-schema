    review_status: accepted
  - id: claim-situating-prompt-run-002
    source: lit-mech-compass
    supports: COMPASS describes maintaining concise, relevant context for long-horizon reasoning through a Context Manager. It supports the need for task-aware context construction; the exact per-chunk activity model and SituatingPromptRun taxonomy are Moonweave design inferences.
    locator: Paper > Abstract > Context Manager maintains concise, relevant progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-situating-prompt-run-003
    source: eng-fw-llamaindex-metadata-extraction
    supports: SituatingPromptRun-example-positive-001 corresponds to LlamaIndex's documented sequential feature-extractor pipeline that adds metadata to each Node. Reifying one execution with an input Chunk, broader context, prompt/model versions, validation, output identity, and SituatingPromptRun classification is Moonweave design inference.
    locator: Metadata Extraction > Usage > sequential feature extractors and metadata added to each Node
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-situating-prompt-run-004
    source: lit-mech-compass
    supports: COMPASS describes a Context Manager that maintains concise, relevant progress briefs for long-horizon reasoning. This supports task-relevant context construction; Moonweave's per-chunk prompt-run identity and provenance fields are a narrower design inference.
    locator: Paper > Abstract > Context Manager maintains concise, relevant progress briefs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-situating-prompt-run-005
    source: eng-fw-llamaindex-metadata-extraction
    supports: SituatingPromptRun-example-boundary-001 relies on the documented operation that adds metadata to existing Nodes rather than defining a replacement chunk body. Moonweave turns body preservation plus an added context note into the boundary from ChunkCompression; LlamaIndex does not assert those ontology classes.
    locator: Metadata Extraction > Usage > node parser adds additional metadata to each Node
    evidence_kind: design-inference
    confidence: medium
