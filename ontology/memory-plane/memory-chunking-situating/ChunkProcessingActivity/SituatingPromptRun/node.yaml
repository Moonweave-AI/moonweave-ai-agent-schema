schema: moonweave.ai/ontology-node/v1
id: SituatingPromptRun
kind: concept
status: accepted
labels:
  zh: 分块定位提示运行
  en: situating prompt run
  ja: 位置付けプロンプト実行
semantics:
  short_definition:
    zh: 读取原 Chunk 及其更大来源语境并生成可分离 context_note 的 ChunkProcessingActivity。
    en: A ChunkProcessingActivity that reads a Chunk with broader source context and generates a separable context_note.
    ja: 元Chunkとより広い出典文脈を読み、分離可能なcontext_noteを生成する ChunkProcessingActivity です。
  definition:
    zh: SituatingPromptRun 是一种 ChunkProcessingActivity；其种差是：一次运行同时消耗目标 Chunk 与完整 Document（Anthropic Contextual Retrieval 的 WHOLE_DOCUMENT+CHUNK_CONTENT 提示形），以已版本化提示与模型生成通常 50–100 token 的可分离 context_note，验证注记没有改写原文或引入无来源事实，并产生可 prepend 到 chunk 后再嵌入/索引的 SituatedChunk。它不切分 Document，也不以删除内容为目标。
    en: A SituatingPromptRun is a ChunkProcessingActivity that jointly consumes a target Chunk and whole Document (Anthropic Contextual Retrieval WHOLE_DOCUMENT+CHUNK_CONTENT prompt shape); uses a versioned prompt and model to generate a separable context_note, typically 50–100 tokens; verifies that the note neither rewrites source text nor introduces unsupported facts; and emits a SituatedChunk suitable for prepending before embedding or BM25 indexing. It does not split the Document and does not aim to remove content.
    ja: SituatingPromptRun は ChunkProcessingActivity の一種で、対象Chunk、そのDocument／節近傍、任意task文脈を同時に消費し、版管理promptとmodelで短いcontext_noteを生成し、原文改変や無出典事実追加がないことを検証して SituatedChunk を生成します。Documentを分割せず、内容削除を目的としません。
  why_needed:
    zh: 把定位说明的生成过程显式化，才能复核提示/模型版本、发现语境幻觉，并在不触碰原 Chunk 的情况下重新生成或撤销附加语境。
    en: Making context-note generation explicit permits prompt and model-version review, detection of contextual hallucination, and regeneration or removal of added context without altering the original Chunk.
    ja: context note生成を明示活動にすると、prompt／model版を審査し、文脈hallucinationを検知し、元Chunkを変えず追加文脈を再生成・撤回できます。
  includes:
    - zh: 纳入 situate-run-84 这类读取 chunk-policy-7-003、政策第 4 章和检索任务，使用 prompt-situate-v2/model-ctx-4 生成并验证 context_note 的运行。
      en: Includes executions such as situate-run-84 that read chunk-policy-7-003, policy chapter 4, and retrieval-task context and use prompt-situate-v2/model-ctx-4 to generate and validate a context_note.
      ja: chunk-policy-7-003、方針4章、検索task文脈を読み、prompt-situate-v2/model-ctx-4でcontext_noteを生成・検証する situate-run-84 のような実行を含みます。
  excludes:
    - zh: 排除 ChunkingRun、ChunkCompression、普通 PromptRun、人工写好的 ChunkMetadata、只有文件名拼接的确定性模板，以及没有读取更大来源语境的标题生成。
      en: Excludes ChunkingRun, ChunkCompression, ordinary PromptRun, manually authored ChunkMetadata, deterministic filename concatenation, and title generation that reads no broader source context.
      ja: ChunkingRun、ChunkCompression、通常PromptRun、手書きChunkMetadata、filename連結だけの決定的template、より広い出典文脈を読まないtitle生成を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SituatingPromptRun-example-positive-001
    kind: positive
    labels:
      zh: 分块定位提示运行正例
      en: Positive example of situating prompt run
      ja: 位置付けプロンプト実行の正例
    scenario_id: null
    descriptions:
      zh: situate-run-84 读取 chunk-policy-7-003/v1、doc-policy/v7 第 4 章以及任务“检索用户撤回后的处置”，以 prompt-situate-v2/model-ctx-4 生成一条可分离 context_note；运行校验注记没有无来源事实，并输出 situated-policy-7-003/v2。
      en: situate-run-84 reads chunk-policy-7-003/v1, chapter 4 of doc-policy/v7, and the task “retrieve disposition after user withdrawal.” It uses prompt-situate-v2/model-ctx-4 to generate one separable context_note, checks the note for unsupported facts, and emits situated-policy-7-003/v2.
      ja: situate-run-84 は chunk-policy-7-003/v1、doc-policy/v7 第4章、task「利用者撤回後の処置を検索」を読み、prompt-situate-v2/model-ctx-4で分離可能なcontext_noteを1件生成します。無出典事実がないことを検証し situated-policy-7-003/v2 を出力します。
    field_values:
      processing_run_id: situate-run-84
      input_ref:
        - chunk-policy-7-003
      input_version: v1
      processor_spec_ref: prompt-situate-v2+model-ctx-4
      started_at: 2026-07-15T09:02:00.000Z
      ended_at: 2026-07-15T09:02:01.240Z
      outcome: success
    related_node_ids:
      - SituatingPromptRun
      - Chunk
      - SituatedChunk
    related_relation_ids:
      - SituatingPromptRun-consumes-Chunk
      - SituatingPromptRun-produces-SituatedChunk
    expected_result:
      zh: 该运行可查询 SituatingPromptRun 以及方向保持不变的事实 SituatingPromptRun-consumes-Chunk。
      en: The run can query SituatingPromptRun together with direction-preserving fact SituatingPromptRun-consumes-Chunk.
      ja: この実行では SituatingPromptRun と方向を保持した事実 SituatingPromptRun-consumes-Chunk を共に照会できます。
    why_valid_or_invalid:
      zh: 该记录同时具有运行身份、目标 Chunk、较大来源语境、任务、提示/模型版本、验证结果和输出；其变换是增加可分离语境而非切分或删减正文，因而满足 SituatingPromptRun 的活动种差。
      en: The record has a run identity, target Chunk, broader source context, task, prompt and model versions, validation result, and output. Its transformation adds separable context rather than splitting or deleting body text, satisfying the SituatingPromptRun activity differentia.
      ja: run同一性・対象Chunk・広い出典文脈・task・prompt/model版・検証結果・出力を持ち、本文の分割／削減ではなく分離可能文脈を追加するためSituatingPromptRunの活動種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-situating-prompt-run-003
      - claim-situating-prompt-run-004
  - id: SituatingPromptRun-example-boundary-001
    kind: boundary
    labels:
      zh: 分块定位提示运行边界例
      en: Boundary case for situating prompt run
      ja: 位置付けプロンプト実行の境界例
    scenario_id: null
    descriptions:
      zh: compress-run-22 读取三个 Chunk 并把正文缩短 42%，同时保留来源锚点；它没有读取更大的 Document/任务语境，也没有生成与原文分离的 context_note，因此是 ChunkCompression，不是 SituatingPromptRun。
      en: compress-run-22 reads three Chunks and shortens their body text by 42% while preserving source anchors. It reads no broader Document or task context and generates no context_note separable from source text, so it is ChunkCompression rather than SituatingPromptRun.
      ja: compress-run-22 は3つのChunkを読み本文を42%短縮し出典anchorを保持します。広いDocument／task文脈を読まず、原文から分離したcontext_noteも生成しないため ChunkCompression で SituatingPromptRun ではありません。
    field_values: {}
    related_node_ids:
      - SituatingPromptRun
      - Chunk
      - ChunkCompression
    related_relation_ids:
      - SituatingPromptRun-consumes-Chunk
    expected_result:
      zh: ChunkCompression 保持其原有类型，验证器不得凭关系共现把它提升为 SituatingPromptRun。
      en: ChunkCompression retains its own type; validation must not promote it to SituatingPromptRun from relation co-occurrence.
      ja: ChunkCompression は元の型を維持し、関係の共起だけで SituatingPromptRun へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 两者虽同属 ChunkProcessingActivity，输入范围和变换目标不同：压缩运行删减或重述内容，定位运行保留原文并增加可分离说明。共享父类不能覆盖这一种差。
      en: "Both are ChunkProcessingActivity, but their input scope and transformation goals differ: compression removes or restates content, whereas situating preserves source text and adds a separable explanation. A shared parent does not erase that differentia."
      ja: 両者はChunkProcessingActivityですが入力範囲と変換目的が異なります。圧縮runは内容を削減／言換えし、位置付けrunは原文を保持して分離可能説明を加えます。共通親でこの種差は消えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-situating-prompt-run-005
      - claim-situating-prompt-run-006
