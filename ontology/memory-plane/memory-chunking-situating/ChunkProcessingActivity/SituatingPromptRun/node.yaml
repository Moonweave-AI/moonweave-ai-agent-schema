schema: moonweave.ai/ontology-node/v1
id: SituatingPromptRun
kind: concept
labels:
  zh: 语境化提示运行
  en: Situating prompt run
  ja: situating prompt run
semantics:
  short_definition:
    zh: 为 Chunk 生成 situating context 并产出 SituatedChunk 的活动。
    en: Activity generating situating context for a Chunk and producing SituatedChunk.
    ja: Chunk 向け situating context 生成→SituatedChunk 产出 activity。
  definition:
    zh: SituatingPromptRun 是 ChunkProcessingActivity：消费 pinned Chunk 版本，调用 situating prompt（Anthropic contextual retrieval 风格），产出 SituatedChunk。situating_context 存分离字段，不覆盖 SourceSpan 证据正文；prepend 后用于嵌入的是 contextualized 视图。
    en: SituatingPromptRun is ChunkProcessingActivity consuming a pinned Chunk version, invoking a situating prompt (Anthropic contextual retrieval style), and producing SituatedChunk. situating_context stays in a separate field without overwriting SourceSpan evidence; contextualized view prepended for embedding.
    ja: SituatingPromptRun は pinned Chunk consume+situating prompt（Anthropic contextual retrieval）→SituatedChunk。situating_context は別 field、SourceSpan 証拠上書き不可。
  why_needed:
    zh: Anthropic contextual retrieval 证明 prepend situating context 可提升召回，但必须与源文分离以免 LLM 生成语境被当作 evidence。
    en: Anthropic contextual retrieval shows prepending situating context improves recall, but separation from source text prevents LLM-generated context being treated as evidence.
    ja: contextual retrieval は recall 向上も LLM 生成文脈を evidence と誤認させない分離必須。
  includes:
    - zh: 纳入 Anthropic situating prompt 与等效 per-chunk context generation run。
      en: Includes Anthropic situating prompt and equivalent per-chunk context generation runs.
      ja: Anthropic situating prompt/等效 per-chunk context generation run。
  excludes:
    - zh: 排除 SituatedChunk 产物、ChunkingRun 与把 situating context 写入 SourceSpan 的操作。
      en: Excludes SituatedChunk artifact, ChunkingRun, and operations writing situating context into SourceSpan.
      ja: SituatedChunk 产物/ChunkingRun/situating context→SourceSpan 写入を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: Anthropic situating prompt 模板含 full document 与 chunk text，LLM 返回短语境；Moonweave 登记 situate-run-84、prompt spec 与 model snapshot；contextualized_chunk = situating_context + "\n\n" + chunk_text 仅用于 embed/index。
    en: Anthropic situating prompt template includes full document and chunk text; LLM returns short context; Moonweave records situate-run-84, prompt spec, model snapshot; contextualized_chunk = situating_context + "\n\n" + chunk_text for embed/index only.
    ja: Anthropic situating prompt→短文脈。situate-run-84/prompt spec/model snapshot 登録。contextualized=prepend+chunk（embed/index 用）。
  typical_input:
    - description: Anthropic contextual retrieval situating prompt
      format: |
        <document>{full_document}</document>
        Here is the chunk we want to situate:
        <chunk>{chunk_text}</chunk>
        Please give a short succinct context to situate this chunk...
      source_claims: [claim-situating-prompt-run-anthropic]
  typical_output:
    - description: Situating run record
      format: |
        {
          "processing_run_id": "situate-run-84",
          "input_ref": ["chunk-policy-7-003"],
          "situating_context": "Section 2 of tenant-7 security policy on authentication.",
          "output_artifact_id": "situated-policy-7-003/v2"
        }
      source_claims: [claim-situating-prompt-run-design]
  reference_implementations:
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/news/contextual-retrieval
      description: Per-chunk situating prompt before embedding.
structure:
  identity_keys: [processing_run_id]
  fields:
    - id: processing_run_id
      labels: {zh: 运行标识, en: Run identifier, ja: run ID}
      definitions:
        zh: 唯一标识一次 SituatingPromptRun。
        en: Uniquely identifies one SituatingPromptRun.
        ja: 一回 SituatingPromptRun を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: situate-run-84
      allowed_values: []
      source_claims: [claim-situating-prompt-run-id]
    - id: prompt_spec_ref
      labels: {zh: 提示规范引用, en: Prompt spec reference, ja: prompt spec 参照}
      definitions:
        zh: 固定 situating prompt 模板与模型版本，如 prompt-situate-v2。
        en: Pinned situating prompt template and model version, e.g., prompt-situate-v2.
        ja: situating prompt テンプレ+model 版固定。prompt-situate-v2 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: prompt-situate-v2+model-ctx-4
      allowed_values: []
      source_claims: [claim-situating-prompt-run-prompt]
    - id: input_chunk_id
      labels: {zh: 输入分块标识, en: Input chunk identifier, ja: 入力 chunk ID}
      definitions:
        zh: 被语境化的 Chunk ID 与版本。
        en: Chunk ID and version being situated.
        ja: 文脈化対象 Chunk ID+版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-7-003@v1
      allowed_values: []
      source_claims: [claim-situating-prompt-run-input]
  constraints:
    - id: situated-context-not-evidence
      severity: error
      expression_language: plain
      expression: situating_context must remain separate from SourceSpan evidence body.
      explanation:
        zh: LLM 生成语境不能当作源文。
        en: LLM-generated context must not become source body.
        ja: LLM 生成文脈を源文に不可。
      source_claims: [claim-situating-prompt-run-anthropic, claim-situating-prompt-run-design]
  required_relations: []
examples:
  - id: SituatingPromptRun-example-anthropic
    labels:
      zh: Anthropic 语境化运行
      en: Anthropic situating run
      ja: Anthropic situating run
    descriptions:
      zh: situate-run-84 对 chunk-policy-7-003/v1 执行 contextual retrieval situating prompt，产出 situated-policy-7-003/v2，situating_context 存分离字段。
      en: situate-run-84 runs contextual retrieval situating prompt on chunk-policy-7-003/v1 producing situated-policy-7-003/v2 with situating_context in separate field.
      ja: situate-run-84→chunk-policy-7-003/v1 situating→situated-policy-7-003/v2。situating_context 別 field。
    example_source:
      product: Anthropic
      url: https://www.anthropic.com/news/contextual-retrieval
      version: situating prompt
    field_values:
      processing_run_id: situate-run-84
      input_chunk_id: chunk-policy-7-003@v1
      situating_context: Section 2 of tenant-7 security policy on authentication.
    related_node_ids:
      - SituatingPromptRun
      - SituatedChunk
    related_relation_ids: []
    source_claims:
      - claim-situating-prompt-run-anthropic
      - claim-situating-prompt-run-design
  - id: SituatingPromptRun-example-embed-prepend
    labels:
      zh: 语境 prepend 后嵌入
      en: Context prepend before embed
      ja: context prepend 後 embed
    descriptions:
      zh: 索引 pipeline 将 situating_context prepend 到 chunk 正文后调用 POST /v1/embeddings；SourceSpan 1600–2400 仍绑定原文 digest。
      en: Index pipeline prepends situating_context to chunk body then calls POST /v1/embeddings; SourceSpan 1600–2400 still binds original digest.
      ja: situating_context prepend→POST /v1/embeddings。SourceSpan 1600–2400=原文 digest。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: contextualized embed
    field_values:
      contextualized_for_embedding: true
    related_node_ids:
      - SituatingPromptRun
      - TextEmbedding
      - memory-embedding-indexes
    related_relation_ids: []
    source_claims:
      - claim-situating-prompt-run-design
  - id: SituatingPromptRun-example-not-situated-chunk
    labels:
      zh: 运行非 SituatedChunk
      en: Run is not SituatedChunk
      ja: run は SituatedChunk ではない
    descriptions:
      zh: situated-policy-7-003/v2 是 SituatedChunk 产物；situate-run-84 是可观察活动有 started_at/outcome。
      en: situated-policy-7-003/v2 is SituatedChunk artifact; situate-run-84 is observable activity with started_at/outcome.
      ja: situated-policy-7-003/v2=SituatedChunk artifact。situate-run-84=activity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SituatingPromptRun
      - SituatedChunk
    related_relation_ids: []
    source_claims:
      - claim-situating-prompt-run-design
parent_relation:
  id: SituatingPromptRun-is_a-ChunkProcessingActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种分块处理活动
    en: is a chunk processing activity
    ja: チャンク処理 activity の一種
  definitions:
    zh: SituatingPromptRun —is_a→ ChunkProcessingActivity 因为它为 Chunk 增添局部语境并产出 SituatedChunk。
    en: SituatingPromptRun —is_a→ ChunkProcessingActivity because it adds local context to Chunk and produces SituatedChunk.
    ja: SituatingPromptRun —is_a→ ChunkProcessingActivity は Chunk へ局所文脈追加+SituatedChunk 产出のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: SituatingPromptRun-is_a-ChunkProcessingActivity-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the run consumes a Chunk and produces SituatedChunk with separate situating_context.
      explanations:
        zh: 仅当满足语境化链时建立该边。
        en: Assert only when situating chain holds.
        ja: situating chain 成立時のみ assert。
      source_claims: [claim-situating-prompt-run-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-situating-prompt-run-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-anthropic-contextual
    title: Anthropic Contextual Retrieval
    publisher: Anthropic
    url: https://www.anthropic.com/news/contextual-retrieval
    source_type: official-doc
    relevance: Situating prompt workflow and separate context field.
  - id: src-situating-prompt-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SituatingPromptRun versus SituatedChunk separation.
source_claims:
  - id: claim-situating-prompt-run-anthropic
    source: src-anthropic-contextual
    supports: Anthropic contextual retrieval generates short situating context per chunk with document-aware prompt before embedding.
    locator: Contextual retrieval blog
    evidence_kind: primary-doc
    confidence: high
  - id: claim-situating-prompt-run-design
    source: src-situating-prompt-design
    supports: SituatingPromptRun records run identity; situating_context must stay separate from SourceSpan evidence.
    locator: SituatingPromptRun boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-situating-prompt-run-id
    source: src-situating-prompt-design
    supports: processing_run_id identifies situating activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-situating-prompt-run-prompt
    source: src-situating-prompt-design
    supports: prompt_spec_ref pins situating template and model version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-situating-prompt-run-input
    source: src-situating-prompt-design
    supports: input_chunk_id pins consumed Chunk version.
    locator: structure
    evidence_kind: design-inference
    confidence: high
