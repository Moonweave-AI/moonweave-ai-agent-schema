schema: moonweave.ai/ontology-node/v1
id: ChunkCompression
kind: concept
labels:
  zh: 分块压缩
  en: Chunk compression
  ja: チャンク圧縮
semantics:
  short_definition:
    zh: 缩短片段长度但不改变 SourceSpan 绑定的活动。
    en: Activity shortening fragment length without changing SourceSpan binding.
    ja: fragment 長短縮するが SourceSpan binding 不変の activity。
  definition:
    zh: ChunkCompression 是 ChunkProcessingActivity：消费 RetrievedChunk 或 Chunk，应用 rerank/compress postprocessor（如 LlamaIndex SentenceTransformerRerank）缩短返回文本。不改变 Chunk 的 document 绑定与 SourceSpan；不是 MemoryMerge 或新 Document 版本。
    en: ChunkCompression is ChunkProcessingActivity consuming RetrievedChunk or Chunk, applying rerank/compress postprocessor (e.g., LlamaIndex SentenceTransformerRerank) to shorten returned text. Does not change Chunk document binding or SourceSpan; not MemoryMerge or new Document version.
    ja: ChunkCompression は RetrievedChunk/Chunk consume+compress postprocessor（SentenceTransformerRerank 等）で返却テキスト短縮。document binding/SourceSpan 不変。MemoryMerge/新 Document 版ではない。
  why_needed:
    zh: 检索阶段压缩与生命周期合并是不同操作；混淆会导致 compliance 审计误以为源文被改写。
    en: Retrieval-stage compression differs from lifecycle merge; conflating them makes compliance audit think source text was rewritten.
    ja: 检索段階圧縮と lifecycle merge は別操作。混同は源文改変誤認。
  includes:
    - zh: 纳入 LlamaIndex ContextualCompressionRetriever 与等效 post-retrieval 压缩 run。
      en: Includes LlamaIndex ContextualCompressionRetriever and equivalent post-retrieval compression runs.
      ja: ContextualCompressionRetriever/等效 post-retrieval 圧縮 run。
  excludes:
    - zh: 排除 MemoryMerge、MemoryCompaction 与修改 SourceSpan 的操作。
      en: Excludes MemoryMerge, MemoryCompaction, and operations modifying SourceSpan.
      ja: MemoryMerge/MemoryCompaction/SourceSpan 変更を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: ContextualCompressionRetriever(base_retriever, node_postprocessors=[SentenceTransformerRerank(top_n=3)]) 映射 ChunkCompression；压缩后文本仅影响 retrieval 返回视图，Moonweave 登记 compress-run-* 与 original chunk_id，SourceSpan 不变。
    en: ContextualCompressionRetriever(base_retriever, node_postprocessors=[SentenceTransformerRerank(top_n=3)]) maps to ChunkCompression; compressed text affects retrieval return view only; Moonweave records compress-run-* and original chunk_id with unchanged SourceSpan.
    ja: ContextualCompressionRetriever+SentenceTransformerRerank→ChunkCompression。圧縮文本=retrieval view のみ。SourceSpan 不変。
  typical_input:
    - description: LlamaIndex contextual compression
      format: |
        compression_retriever = ContextualCompressionRetriever(
          base_retriever=vector_retriever,
          node_postprocessors=[SentenceTransformerRerank(top_n=3)]
        )
      source_claims: [claim-chunk-compression-llamaindex]
  typical_output:
    - description: Compression run record
      format: |
        {
          "processing_run_id": "compress-run-12",
          "input_ref": ["chunk-policy-7-003"],
          "compressed_length": 420,
          "source_span_unchanged": true
        }
      source_claims: [claim-chunk-compression-design]
  reference_implementations:
    - name: LlamaIndex ContextualCompressionRetriever
      url: https://developers.llamaindex.ai/python/examples/ingestion/advanced_ingestion_pipeline/
      description: Post-retrieval compression with rerank postprocessors.
structure:
  identity_keys: [processing_run_id]
  fields:
    - id: processing_run_id
      labels: {zh: 压缩运行标识, en: Compression run identifier, ja: 圧縮 run ID}
      definitions:
        zh: 唯一标识一次 ChunkCompression。
        en: Uniquely identifies one ChunkCompression.
        ja: 一回 ChunkCompression を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: compress-run-12
      allowed_values: []
      source_claims: [claim-chunk-compression-id]
    - id: postprocessor_spec_ref
      labels: {zh: 后处理器规范, en: Postprocessor spec reference, ja: postprocessor spec 参照}
      definitions:
        zh: 固定 rerank/compress 模型与 top_n 等参数。
        en: Pinned rerank/compress model and top_n parameters.
        ja: rerank/compress model+top_n 等固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: SentenceTransformerRerank-top_n=3
      allowed_values: []
      source_claims: [claim-chunk-compression-postprocessor]
    - id: source_span_unchanged
      labels: {zh: 来源跨度未变, en: Source span unchanged, ja: source span 不変}
      definitions:
        zh: 必须为 true；压缩不得修改 SourceSpan 边界。
        en: Must be true; compression must not modify SourceSpan boundaries.
        ja: 必ず true。圧縮は SourceSpan 境界変更不可。
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [claim-chunk-compression-design]
  constraints:
    - id: compression-not-lifecycle-merge
      severity: warning
      expression_language: plain
      expression: ChunkCompression is not MemoryMerge or MemoryCompaction.
      explanation:
        zh: 片段压缩与跨记录生命周期合并不同。
        en: Fragment compression is not cross-record lifecycle merge.
        ja: fragment 圧縮≠record 横断 lifecycle merge。
      source_claims: [claim-chunk-compression-design]
  required_relations: []
examples:
  - id: ChunkCompression-example-llamaindex
    labels:
      zh: LlamaIndex 语境压缩
      en: LlamaIndex contextual compression
      ja: LlamaIndex contextual compression
    descriptions:
      zh: compress-run-12 在 vector recall 后用 SentenceTransformerRerank(top_n=3) 压缩候选，返回文本缩短但 chunk-policy-7-003 SourceSpan 不变。
      en: compress-run-12 compresses candidates after vector recall with SentenceTransformerRerank(top_n=3); returned text shortens but chunk-policy-7-003 SourceSpan unchanged.
      ja: compress-run-12 vector recall 後 SentenceTransformerRerank(top_n=3)。返却短縮、SourceSpan 不変。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/examples/ingestion/advanced_ingestion_pipeline/
      version: ContextualCompressionRetriever
    field_values:
      processing_run_id: compress-run-12
      postprocessor_spec_ref: SentenceTransformerRerank-top_n=3
      source_span_unchanged: true
    related_node_ids:
      - ChunkCompression
      - Chunk
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-chunk-compression-llamaindex
      - claim-chunk-compression-design
  - id: ChunkCompression-example-retrieval-view
    labels:
      zh: 压缩仅影响检索视图
      en: Compression affects retrieval view only
      ja: 圧縮は retrieval view のみ
    descriptions:
      zh: 压缩后返回 420 字符摘要供 LLM context；chunk-policy-7-003 规范 Chunk 仍保留完整 SourceSpan 与 source_body_sha256。
      en: Compression returns 420-char summary for LLM context; canonical chunk-policy-7-003 Chunk retains full SourceSpan and source_body_sha256.
      ja: 420 文字 summary→LLM context。canonical Chunk は full SourceSpan/source_body_sha256 維持。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: retrieval view
    field_values:
      compressed_length: 420
      source_span_unchanged: true
    related_node_ids:
      - ChunkCompression
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-compression-design
  - id: ChunkCompression-example-not-merge
    labels:
      zh: 压缩非记忆合并
      en: Compression is not memory merge
      ja: 圧縮は memory merge ではない
    descriptions:
      zh: MemoryMerge 跨 record 合成新版本；ChunkCompression 只缩短单次 retrieval 返回，不产生新 Chunk lineage。
      en: MemoryMerge synthesizes new version across records; ChunkCompression only shortens one retrieval return without new Chunk lineage.
      ja: MemoryMerge=record 横断新版。ChunkCompression=一回 retrieval 短縮、新 Chunk lineage なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkCompression
      - memory-lifecycle
    related_relation_ids: []
    source_claims:
      - claim-chunk-compression-design
parent_relation:
  id: ChunkCompression-is_a-ChunkProcessingActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种分块处理活动
    en: is a chunk processing activity
    ja: チャンク処理 activity の一種
  definitions:
    zh: ChunkCompression —is_a→ ChunkProcessingActivity 因为它缩短片段内容但不改变 SourceSpan 绑定。
    en: ChunkCompression —is_a→ ChunkProcessingActivity because it shortens fragment content without changing SourceSpan binding.
    ja: ChunkCompression —is_a→ ChunkProcessingActivity は内容短縮+SourceSpan binding 不変のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: ChunkCompression-is_a-ChunkProcessingActivity-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when compression shortens text with source_span_unchanged=true.
      explanations:
        zh: 仅当 SourceSpan 不变时成立。
        en: Assert only when SourceSpan unchanged.
        ja: SourceSpan 不変時のみ assert。
      source_claims: [claim-chunk-compression-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-compression-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-compression
    title: LlamaIndex Contextual Compression
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/examples/ingestion/advanced_ingestion_pipeline/
    source_type: official-doc
    relevance: Post-retrieval compression retriever pattern.
  - id: src-chunk-compression-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ChunkCompression versus lifecycle merge boundary.
source_claims:
  - id: claim-chunk-compression-llamaindex
    source: src-llamaindex-compression
    supports: LlamaIndex ContextualCompressionRetriever compresses retrieved nodes with postprocessors like SentenceTransformerRerank.
    locator: Contextual compression examples
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-compression-design
    source: src-chunk-compression-design
    supports: ChunkCompression shortens retrieval view without changing SourceSpan or creating new Chunk lineage; not MemoryMerge.
    locator: ChunkCompression boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-compression-id
    source: src-chunk-compression-design
    supports: processing_run_id identifies compression activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-compression-postprocessor
    source: src-chunk-compression-design
    supports: postprocessor_spec_ref pins compression configuration.
    locator: structure
    evidence_kind: design-inference
    confidence: high
