schema: moonweave.ai/ontology-node/v1
id: ChunkCompression
kind: concept
status: accepted
labels:
  zh: 分块压缩活动
  en: Chunk Compression
  ja: チャンク圧縮活動
semantics:
  short_definition:
    zh: 消费已有分块并生成一个具有独立身份、较短且可追溯输出分块的 ChunkProcessingActivity 子类。
    en: A ChunkProcessingActivity subtype that consumes existing chunks and generates a shorter, traceable output chunk with independent identity.
    ja: 既存 chunk を使用し、独立した identity を持つより短い追跡可能な output chunk を生成する ChunkProcessingActivity の下位型。
  definition:
    zh: >
      ChunkCompression 是对一个或多个已有、已定版本的 Chunk 执行的处理活动。它使用明确的压缩策略和长度目标，
      去除冗余、提取相关段落或生成受约束摘要，并生成一个较短的新 Chunk 版本；输入分块、输出分块和映射证据
      都必须可回查。它不是首次计算来源边界的 ChunkingRun，不是仅添加说明的 SituatingPromptRun，也不是产生的
      Chunk 本身、压缩策略配置或检索排序。
    en: >
      ChunkCompression is a processing activity performed over one or more existing, version-defined Chunks. It uses
      an identified compression strategy and length target to remove redundancy, extract relevant passages, or produce
      a constrained summary, then generates a shorter new Chunk revision; input chunks, output chunk, and mapping
      evidence must all be inspectable. It is not a ChunkingRun that first computes source boundaries, a
      SituatingPromptRun that only adds explanation, the produced Chunk itself, a compression configuration, or
      retrieval ranking.
    ja: >
      ChunkCompression は、一つ以上の既存で版が確定した Chunk に対して行う処理活動です。識別済みの圧縮戦略と
      長さ目標を使い、冗長性を除去し、関連 passage を抽出し、または制約付き summary を作り、より短い新しい
      Chunk revision を生成します。input chunk、output chunk、mapping evidence はすべて検査可能でなければ
      なりません。初めて source boundary を計算する ChunkingRun、説明だけを加える SituatingPromptRun、
      生成された Chunk 自体、圧縮 configuration、retrieval ranking ではありません。
  why_needed:
    zh: 上下文预算常不足以容纳所有相关原文；将缩短操作与其输入和输出分开记录，才能审计信息损失并避免用摘要冒充原文。
    en: Context budgets often cannot hold every relevant source passage; recording shortening separately from its inputs and output permits loss audit and prevents a summary from being presented as original text.
    ja: context budget にはすべての関連 source passage を収められないことが多く、短縮操作を input と output から分けて記録することで、loss audit ができ、summary を原文と偽って提示することを防げます。
  includes:
    - zh: 已执行的压缩运行、输入分块版本、压缩策略、目标长度、输入与输出 token 计数、新输出分块和来源映射。
      en: Completed compression runs, input chunk revisions, compression strategy, target length, input and output token counts, a new output chunk, and source mapping.
      ja: 完了した compression run、input chunk revision、compression strategy、target length、input と output の token count、新しい output chunk、source mapping。
  excludes:
    - zh: 未执行的压缩配置、首次文档切分、只添加文档说明、向量生成、索引维护、检索候选和将输出摘要当作输入原文。
      en: An unexecuted compression configuration, initial document splitting, document-note addition only, vector generation, index maintenance, retrieval candidates, or treating the output summary as input source text.
      ja: 未実行の compression configuration、初期 document splitting、document note の追加だけ、vector generation、index maintenance、retrieval candidate、output summary を input source text と扱うこと。
  semantic_kind: activity
  aliases: [context compression run, chunk summarization run, 分块摘要运行]
engineering:
  explanation:
    zh: 上下文压缩通过缩小工作记忆并保留任务相关细节来适配上下文窗口。Moonweave 将一次实际运行记录为活动，并将输入与新输出记录为独立 Chunk 工件。
    en: Context compression reduces working-memory size while preserving task-relevant details to fit a context window. Moonweave records one actual execution as an activity and its inputs and new output as distinct Chunk artifacts.
    ja: context compression は task-relevant detail を保ちながら working-memory size を減らして context window に収めます。Moonweave は一回の実行を activity とし、その input と新しい output を別々の Chunk artifact として記録します。
  typical_input:
    - description: Compression request over versioned chunks
      format: |
        {
          "input_chunk_refs": ["chunk-policy-18@v2", "chunk-policy-19@v2"],
          "compression_spec_ref": "extractive-summary-v1",
          "target_token_limit": 240
        }
  typical_output:
    - description: Completed compression-run record
      format: |
        {
          "compression_run_id": "compress-policy-07",
          "input_chunk_refs": ["chunk-policy-18@v2", "chunk-policy-19@v2"],
          "output_chunk_ref": "chunk-policy-summary-07@v1",
          "input_token_count": 756,
          "output_token_count": 224,
          "source_mapping_ref": "provenance/compress-policy-07.json"
        }
  reference_implementations:
    - name: LangChain Deep Agents Context Engineering
      url: https://docs.langchain.com/oss/python/deepagents/context-engineering
      description: Documents context compression for reducing working memory while retaining task-relevant details.
structure:
  identity_keys: [compression_run_id]
  fields:
    - id: compression_run_id
      labels: {zh: 压缩运行标识, en: compression run ID, ja: 圧縮 run ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际执行的压缩活动，不能复用为输出分块或策略标识。
        en: Identifies one actually executed compression activity and is not reused as an output-chunk or strategy ID.
        ja: 一回の実際に実行された compression activity を識別し、output-chunk または strategy ID として再利用しません。
      allowed_values: []
      pattern: "^compress-[A-Za-z0-9._-]+$"
      example_value: compress-policy-07
      source_claims: [claim-chunk-compression-context]
    - id: input_chunk_refs
      labels: {zh: 输入分块版本引用, en: input chunk revision references, ja: input chunk revision 参照}
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 按本运行读取的实际分块版本列出输入，不得用后来改写的同名分块替换。
        en: Lists the actual chunk revisions read by this run and cannot be replaced by a later rewritten chunk of the same logical name.
        ja: この run が読み取った実際の chunk revision を列挙し、同じ論理名の後から書き換えられた chunk に置き換えることはできません。
      allowed_values: []
      pattern: null
      example_value: [chunk-policy-18@v2, chunk-policy-19@v2]
      source_claims: [claim-chunk-compression-provenance]
    - id: compression_spec_ref
      labels: {zh: 压缩策略引用, en: compression strategy reference, ja: 圧縮戦略参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本次运行采用的可审计压缩策略版本，而非输出文本的内容身份。
        en: Points to the auditable compression-strategy revision used by this run rather than the identity of output text.
        ja: output text の identity ではなく、この run が使った audit 可能な compression-strategy revision を指します。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: extractive-summary-v1
      source_claims: [claim-chunk-compression-context]
    - id: target_token_limit
      labels: {zh: 目标 token 上限, en: target token limit, ja: 目標 token 上限}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 该运行请求或允许的输出 token 最大值，不保证输出等于此值或保留所有输入事实。
        en: Maximum output tokens this run requests or permits; it does not guarantee equality to the limit or retention of every input fact.
        ja: この run が要求または許可する最大 output token 数であり、limit と同じになることや全 input fact の保持を保証しません。
      allowed_values: []
      pattern: null
      example_value: 240
      source_claims: [claim-chunk-compression-context]
    - id: input_token_count
      labels: {zh: 输入 token 数, en: input token count, ja: input token 数}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录本次运行实际读取输入的 token 计数，计数规则由运行配置确定。
        en: Records token count for inputs actually read by this run under its stated counting configuration.
        ja: 指定された count configuration の下で、この run が実際に読み取った input の token count を記録します。
      allowed_values: []
      pattern: null
      example_value: 756
      source_claims: [claim-chunk-compression-context]
    - id: output_token_count
      labels: {zh: 输出 token 数, en: output token count, ja: output token 数}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 记录生成输出分块的 token 计数，不能高于 target_token_limit。
        en: Records token count of the generated output chunk and cannot exceed target_token_limit.
        ja: 生成された output chunk の token count を記録し、target_token_limit を超えることはできません。
      allowed_values: []
      pattern: null
      example_value: 224
      source_claims: [claim-chunk-compression-context]
    - id: output_chunk_ref
      labels: {zh: 输出分块版本引用, en: output chunk revision reference, ja: output chunk revision 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向由本运行新生成的独立 Chunk 版本，不能指向某个仅被读取的输入分块。
        en: Points to the independent Chunk revision newly generated by this run and cannot point to an input chunk merely read by it.
        ja: この run が新しく生成した独立 Chunk revision を指し、単に読み取った input chunk を指すことはできません。
      allowed_values: []
      pattern: "^chunk-[A-Za-z0-9._-]+@v[0-9]+(?:[A-Za-z0-9._-]*)$"
      example_value: chunk-policy-summary-07@v1
      source_claims: [claim-chunk-compression-provenance]
    - id: source_mapping_ref
      labels: {zh: 来源映射引用, en: source mapping reference, ja: source mapping 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向可审查的输入材料到输出材料映射，用于检查压缩造成的信息丢失。
        en: Points to inspectable mapping from input material to output material for reviewing information loss introduced by compression.
        ja: compression により生じた情報損失を確認するため、input material から output material への検査可能な mapping を指します。
      allowed_values: []
      pattern: "^[^\\s]+$"
      example_value: provenance/compress-policy-07.json
      source_claims: [claim-chunk-compression-boundary]
  constraints:
    - id: chunk-compression-auditability
      severity: error
      expression_language: plain
      expression: input_chunk_refs must be non-empty, output_chunk_ref must name a new revision, source_mapping_ref must link the output to input material, and output_token_count must be less than or equal to target_token_limit and input_token_count.
      explanation:
        zh: 压缩会有意丢失或重写细节，因此必须保留输入、输出和映射，而不能仅以较短文本声称等同原文。
        en: Compression deliberately loses or rewrites detail, so inputs, output, and mapping must remain available rather than asserting that shorter text equals the original.
        ja: compression は意図的に detail を失うか書き換えるため、短い text が原文と等しいと主張せず input、output、mapping を保持しなければなりません。
      source_claims: [claim-chunk-compression-boundary]
    - id: chunk-compression-role-boundary
      severity: error
      expression_language: plain
      expression: ChunkCompression must not assert initial source-boundary computation, source-text mutation, embedding generation, index membership, retrieval rank, or context-package inclusion. Those facts require distinct activities or artifacts.
      explanation:
        zh: 压缩处理已有分块并创建新输出；切分、向量化、检索和上下文选择均是不同责任边界。
        en: Compression transforms existing chunks into a new output; splitting, vectorization, retrieval, and context selection are distinct responsibility boundaries.
        ja: compression は既存 chunk を新しい output に変換し、splitting、vectorization、retrieval、context selection は別の responsibility boundary です。
      source_claims: [claim-chunk-compression-boundary]
  required_relations: []
examples:
  - id: chunk-compression-example-positive-policy

    labels: {zh: 可审计策略压缩, en: Auditable policy compression, ja: 監査可能な policy compression}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values:
      compression_run_id: compress-policy-07
      input_chunk_refs: [chunk-policy-18@v2, chunk-policy-19@v2]
      compression_spec_ref: extractive-summary-v1
      target_token_limit: 240
      input_token_count: 756
      output_token_count: 224
      output_chunk_ref: chunk-policy-summary-07@v1
      source_mapping_ref: provenance/compress-policy-07.json
    related_node_ids: [ChunkCompression, ChunkProcessingActivity, Chunk]
    related_relation_ids: [ChunkCompression-is_a-ChunkProcessingActivity, ChunkCompression-uses-Chunk, ChunkCompression-generates-Chunk]

    source_claims: [claim-chunk-compression-context, claim-chunk-compression-provenance]
  - id: chunk-compression-example-counterexample-config

    labels: {zh: 未执行压缩配置, en: Unexecuted compression configuration, ja: 未実行 compression configuration}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values:
      compression_spec_ref: summary-v1
      target_token_limit: 240
      compression_run_id: null
      input_chunk_refs: []
      output_chunk_ref: null
    related_node_ids: [ChunkCompression]
    related_relation_ids: []

    source_claims: [claim-chunk-compression-context]
  - id: chunk-compression-example-boundary-chunking

    labels: {zh: 首次文档切分, en: Initial document splitting, ja: 初期 document splitting}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values:
      chunking_run_id: chunk-81
      source_document_ref: docs/policy.md@v7
      input_chunk_refs: []
      output_chunk_refs: [chunk-policy-01@v1, chunk-policy-02@v1]
    related_node_ids: [ChunkCompression, ChunkingRun]
    related_relation_ids: []

    source_claims: [claim-chunk-compression-boundary]
  - id: chunk-compression-example-instance-access-guide

    labels: {zh: 实例：访问指南摘要, en: "Instance: access-guide digest", ja: "事例：access-guide digest"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values:
      compression_run_id: compress-access-guide-03
      input_chunk_refs: [chunk-access-01@v1, chunk-access-02@v1, chunk-access-03@v1, chunk-access-04@v1]
      compression_spec_ref: constrained-summary-v2
      target_token_limit: 300
      input_token_count: 1088
      output_token_count: 286
      output_chunk_ref: chunk-access-guide-digest-03@v1
      source_mapping_ref: provenance/compress-access-guide-03.json
    related_node_ids: [ChunkCompression, Chunk]
    related_relation_ids: [ChunkCompression-is_a-ChunkProcessingActivity, ChunkCompression-uses-Chunk, ChunkCompression-generates-Chunk]
    source_claims: [claim-chunk-compression-context, claim-chunk-compression-provenance]
parent_relation:
  id: ChunkCompression-is_a-ChunkProcessingActivity
  predicate: is_a
  target: concept:ChunkProcessingActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是分块处理活动的压缩子类
    en: is a compression subtype of chunk processing activity
    ja: ChunkProcessingActivity の圧縮下位型である
  definitions:
    zh: ChunkCompression is_a ChunkProcessingActivity，表示每次分块压缩都是处理活动；其种差是消费既有分块并生成较短的新分块。
    en: ChunkCompression is_a ChunkProcessingActivity means every chunk compression is a processing activity whose differentia is consuming existing chunks and generating a shorter new chunk.
    ja: ChunkCompression is_a ChunkProcessingActivity は、すべての chunk compression が processing activity であり、既存 chunk を消費してより短い新しい chunk を生成することが種差であると表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不限制一个处理系统可执行多少次压缩。
    en: Classification does not prescribe how many compressions a processing system may execute.
    ja: 分類関係は processing system が実行できる compression 数を規定しません。
  inverse_reading:
    predicate: has_chunk_compression_subtype
    labels: {zh: 具有分块压缩子类, en: has chunk-compression subtype, ja: チャンク圧縮下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-compression-subtype]
  distinct_fact_rationale:
    zh: 此关系表达活动类型归属，不表达本次输入分块使用、输出生成、策略配置或检索结果。
    en: This relation expresses activity type membership, not this run's input use, output generation, strategy configuration, or retrieval result.
    ja: この関係は activity type membership を表し、この run の input use、output generation、strategy configuration、retrieval result は表しません。
  layout_role: primary-backbone
relations:
  - id: ChunkCompression-uses-Chunk
    predicate: uses
    target: concept:Chunk
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用输入分块, en: uses input chunk, ja: input chunk を使用する}
    definitions:
      zh: 仅当 input_chunk_refs 列出目标 Chunk 版本且该版本被本次压缩实际读取时，压缩活动使用该分块。
      en: A compression activity uses a Chunk only when input_chunk_refs lists that Chunk revision and the run actually read it.
      ja: input_chunk_refs がその Chunk revision を列挙し、run が実際に読み取った場合にだけ、compression activity は Chunk を使用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次压缩可使用一个或多个输入分块。
      en: One compression may use one or more input chunks.
      ja: 一つの compression は一つ以上の input chunk を使用できます。
    inverse_reading:
      predicate: is_used_by_chunk_compression
      labels: {zh: 被分块压缩使用, en: is used by chunk compression, ja: チャンク圧縮に使用される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-chunk-compression-provenance]
    distinct_fact_rationale: "This is concrete input use, not subtype membership, source-document containment, or generation of the output."
    layout_role: cross-link
  - id: ChunkCompression-generates-Chunk
    predicate: generates
    target: concept:Chunk
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成输出分块, en: generates output chunk, ja: output chunk を生成する}
    definitions:
      zh: 仅当 output_chunk_ref 指向目标的新 Chunk 版本且压缩运行完成时，压缩活动生成该分块。
      en: A compression activity generates a Chunk only when output_chunk_ref names that new Chunk revision and the run completed.
      ja: output_chunk_ref がその新しい Chunk revision を示し、run が完了した場合にだけ、compression activity は Chunk を生成します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_generated_by_chunk_compression
      labels: {zh: 由分块压缩生成, en: is generated by chunk compression, ja: チャンク圧縮により生成される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-chunk-compression-provenance]
    distinct_fact_rationale: "This is version-specific output generation, not a parent relation between the output information artifact and the activity."
    layout_role: cross-link
sources:
  - id: langchain-deepagents-context-engineering
    title: LangChain Deep Agents Context Engineering
    source_type: official-project-documentation
    url: https://docs.langchain.com/oss/python/deepagents/context-engineering
    relevance: Documents context compression as reducing working-memory size while preserving task-relevant details for a context-window limit.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes an Activity from entities it uses and generates.
source_claims:
  - id: claim-chunk-compression-context
    source: langchain-deepagents-context-engineering
    supports: LangChain documents context compression as reducing working-memory size while preserving task-relevant details and fitting context passed to LLMs within a context-window limit.
    locator: "Context compression"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-chunk-compression-boundary
    source: langchain-deepagents-context-engineering
    supports: Moonweave treats a context-reduction operation over existing chunks as an auditable compression run with separate output identity and source mapping, distinct from source segmentation, history trimming, reranking, and embedding generation.
    locator: "Context compression"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-compression-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from entities it uses and generates. Moonweave applies that distinction to compression input Chunk revisions and a newly generated output Chunk revision.
    locator: "PROV-O: Activity, Entity, prov:used, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-compression-subtype
    source: langchain-deepagents-context-engineering
    supports: Modeling an executed compression operation as the ChunkCompression subtype of ChunkProcessingActivity is a Moonweave taxonomy inference based on the documented context-compression mechanism.
    locator: "Context compression"
    evidence_kind: ontology-design-inference
    confidence: medium
