source_claims:
  - id: claim-chunk-compression-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents reduces growing context through summarization and offloading. Moonweave models a source-preserving reduction over existing Chunks as ChunkCompression, with explicit run identity, input and output versions, compression strategy, and evidence mappings; this ontology placement is a design inference.
    locator: Deep Agents overview > Context management > Summarization and context offloading
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-002
    source: eng-fw-langchain-agents
    supports: LangChain distinguishes summarizing conversation state from text splitting and warns that context reduction must retain needed information. Moonweave requires an auditable mapping from compressed claims to input Chunks or SourceSpans and treats the reduction as an activity rather than its output.
    locator: Short-term memory > Summarize messages; Text splitters > RecursiveCharacterTextSplitter
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents manages growing context through summarization and context offloading while retaining relevant information. Moonweave makes one such reduction an auditable ChunkCompression run with explicit inputs, output, model version, and evidence mappings.
    locator: Deep Agents overview > Context management > Summarization and context offloading
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-004
    source: eng-fw-langchain-agents
    supports: LangChain's short-term-memory guidance treats summarization as a context-reduction operation and warns about preserving needed information. The example adds claim-level provenance and immutable input artifacts for auditability.
    locator: Short-term memory > Trim messages and summarize messages
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents describes summarization and offloading as context reduction, not initial source segmentation. This supports keeping compression separate from a splitter run that establishes original boundaries.
    locator: Deep Agents overview > Context management > Summarization and context offloading
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-006
    source: eng-fw-langchain-agents
    supports: LangChain documents splitting through chunkSize and chunkOverlap separately from message summarization. Moonweave maps those different operations to ChunkingRun and ChunkCompression rather than merging them by shared parent.
    locator: Text splitters > RecursiveCharacterTextSplitter; Short-term memory > Summarize messages
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-007
    source: eng-fw-deepagents-context-engineering
    supports: For ChunkCompression's sibling boundary from ChunkingRun, Deep Agents documents context compression and summarization as capacity-handling operations over existing context. That supports the ChunkCompression endpoint only; the shared ChunkProcessingActivity parent, contrast with document segmentation, endpoint conditions, and hierarchy are Moonweave design inference.
    locator: Context engineering > Context compression > summarization of existing context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-compression-008
    source: eng-fw-deepagents-context-engineering
    supports: The example adds activity identity and explicit inputs and output to the documented compression mechanism.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-009
    source: eng-fw-deepagents-context-engineering
    supports: The compressed summary is the retained result described by the documentation, not the summarization execution itself.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-010
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents describes summarization and offloading as context-compression mechanisms operating on existing material; Moonweave classifies each observed execution as a ChunkProcessingActivity subtype.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-011
    source: eng-fw-deepagents-context-engineering
    supports: The case makes the documented pre-compression content explicit as four versioned Chunk inputs.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-012
    source: eng-fw-deepagents-context-engineering
    supports: A generated compacted result is downstream of compression and cannot be reinterpreted as the content consumed by that same execution.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-013
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents context compression consumes existing conversation content before summarization or offloading; Moonweave records the exact Chunk versions used by one compression activity.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-014
    source: eng-fw-deepagents-context-engineering
    supports: The versioned summary Chunk instantiates a compressed result while retaining links to all original inputs.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-015
    source: eng-fw-deepagents-context-engineering
    supports: In-place overwrite without a new version contradicts the documented separation between compacted summary and preserved original content.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-compression-016
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents summarization replaces older content with a shorter summary while preserving original messages separately; Moonweave therefore requires a separately identified output rather than in-place identity collapse.
    locator: Context engineering in Deep Agents > Context compression > Offloading and Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
