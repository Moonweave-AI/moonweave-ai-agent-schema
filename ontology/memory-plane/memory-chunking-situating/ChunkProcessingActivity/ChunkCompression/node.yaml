sibling_differentiation:
  - sibling_concept_id: ChunkingRun
    shared_parent_concept_id: ChunkProcessingActivity
    differentia:
      zh: 已审查兄弟区分：父节点 ChunkProcessingActivity：ChunkCompression（semantic kind=activity，骨架 ChunkCompression-is_a-ChunkProcessingActivity）；ChunkingRun（semantic kind=activity，骨架 ChunkingRun-is_a-ChunkProcessingActivity）。双端条件：ChunkCompression 条件：“分块压缩活动是一种分块处理活动（ChunkProcessingActivity），在保留来源锚点的前提下压缩一个或多个分块并产生新的 Chunk；压缩输出仍是分块，不是活动本身”；ChunkingRun 条件：“分块运行是一种分块处理活动；其区分条件是：它是把文档、输出或记忆项切分为可检索分块的可观测事件，并记录边界、重叠、片段和来源元数据”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ChunkProcessingActivity: ChunkCompression (semantic kind=activity, backbone ChunkCompression-is_a-ChunkProcessingActivity); ChunkingRun (semantic kind=activity, backbone ChunkingRun-is_a-ChunkProcessingActivity). Endpoint conditions: ChunkCompression condition: “Chunk compression activity is a chunk processing activity; its differentiating condition is that it is a ChunkProcessingActivity that compresses one or more chunks while preserving source anchors and produces a new Chunk; the compressed output remains a chunk rather than the activity itself”; ChunkingRun condition: “As a chunk processing activity, Chunking run is distinguished by the fact that it is an observable event that divides a document, output, or memory item into retrievable chunks with boundary, overlap, span, and provenance metadata”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ChunkProcessingActivity：ChunkCompression（semantic kind=activity、バックボーン ChunkCompression-is_a-ChunkProcessingActivity）；ChunkingRun（semantic kind=activity、バックボーン ChunkingRun-is_a-ChunkProcessingActivity）。両端条件：ChunkCompression の条件：「チャンク圧縮活動はチャンク処理活動（ChunkProcessingActivity）の一種で、出典アンカーを保持しながら一つ以上のチャンクを圧縮して新しい Chunk を生成します」；ChunkingRun の条件：「チャンク処理活動に属する分割実行は、次の事実を種差とします：チャンク化実行は、文書、出力、記憶項目を検索可能なチャンクへ分割し、境界、重なり、範囲、来歴メタデータを記録する観測可能なイベントです」。一方の成立は他方を証明しません。
    source_claims:
      - claim-chunk-compression-007
