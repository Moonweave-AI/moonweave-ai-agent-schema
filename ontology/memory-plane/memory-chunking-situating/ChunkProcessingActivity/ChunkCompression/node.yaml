schema: moonweave.ai/ontology-node/v1
id: ChunkCompression
kind: concept
status: accepted
labels:
  zh: 分块压缩活动
  en: chunk compression activity
  ja: チャンク圧縮活動
semantics:
  short_definition:
    zh: 在保留可验证来源锚点的同时缩短一个或多个 Chunk 的 ChunkProcessingActivity。
    en: A ChunkProcessingActivity that shortens one or more Chunks while preserving verifiable source anchors.
    ja: 検証可能な出典anchorを保持しながら一つ以上のChunkを短縮する ChunkProcessingActivity です。
  definition:
    zh: ChunkCompression 是一种 ChunkProcessingActivity；其种差是：它消耗一个或多个已有 Chunk，使用已标识的压缩策略或模型删除冗余、合并重复或生成受约束摘要，产生内容更短的新 Chunk，同时保留每个可核实主张到输入 Chunk/SourceSpan 的映射。它不重新计算原文分段边界，也不等于压缩后的 Chunk。
    en: ChunkCompression is a ChunkProcessingActivity that consumes one or more existing Chunks, uses an identified compression strategy or model to remove redundancy, merge duplication, or create a constrained summary, and emits a shorter new Chunk while preserving a mapping from each verifiable claim to input Chunks or SourceSpans. It does not recompute source segmentation boundaries and is not the compressed Chunk itself.
    ja: ChunkCompression は ChunkProcessingActivity の一種で、既存Chunkを一つ以上消費し、識別済み圧縮方策／modelで冗長除去・重複統合・制約付き要約を行い、各検証可能主張から入力Chunk／SourceSpanへの対応を保つ短い新Chunkを生成します。原文分割境界を再計算せず、圧縮後Chunk自体でもありません。
  why_needed:
    zh: 把压缩建模为活动可同时审计压缩率、模型版本和信息损失，并让检索结果回溯到未压缩证据，而不是用新文本静默覆盖原 Chunk。
    en: Modeling compression as an activity makes compression ratio, model version, and information loss auditable and lets retrieval trace back to uncompressed evidence instead of silently overwriting original Chunks.
    ja: 圧縮を活動として扱うことで、圧縮率・model版・情報損失を監査し、原Chunkを黙って上書きせず未圧縮証拠へ検索結果を遡及できます。
  includes:
    - zh: 纳入 compress-run-22 这类消耗 chunks 18–21、以 model-summary-v3 压缩 42%、产生 chunk-summary-22，并逐条保留到输入 SourceSpan 映射的已执行活动。
      en: Includes executions such as compress-run-22 that consume Chunks 18–21, reduce content by 42% with model-summary-v3, emit chunk-summary-22, and retain claim-level mappings to input SourceSpans.
      ja: chunks 18–21を消費し、model-summary-v3で42%短縮し、chunk-summary-22を生成し、入力SourceSpanへの主張単位対応を保持する compress-run-22 のような実行を含みます。
  excludes:
    - zh: 排除首次从 Document 计算边界的 ChunkingRun、只添加章节说明的 SituatingPromptRun、普通 ContextSummary、无输入来源映射的自由摘要，以及压缩输出 Chunk 本身。
      en: Excludes ChunkingRun that first computes Document boundaries, SituatingPromptRun that only adds section context, ordinary ContextSummary, free-form summaries without input-source mappings, and the compressed output Chunk itself.
      ja: Documentから初めて境界を計算する ChunkingRun、節説明だけを加える SituatingPromptRun、通常の ContextSummary、入力出典対応のない自由要約、圧縮出力Chunk自体を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChunkCompression-example-positive-001
    kind: positive
    labels:
      zh: 分块压缩活动正例
      en: Positive example of chunk compression activity
      ja: チャンク圧縮活動の正例
    scenario_id: null
    descriptions:
      zh: compress-run-22 消耗 chunks 18–21，使用 model-summary-v3 将 2,140 tokens 压缩为 1,241 tokens，产生 chunk-summary-22；输出中的每条事实都保留到输入 chunk 与 SourceSpan 的映射，原四个 Chunk 不被覆盖。
      en: compress-run-22 consumes Chunks 18–21 and uses model-summary-v3 to reduce 2,140 tokens to 1,241, producing chunk-summary-22. Every output claim retains mappings to input Chunks and SourceSpans, and the four originals are not overwritten.
      ja: compress-run-22 はchunks 18–21を消費し、model-summary-v3で2,140 tokensを1,241へ短縮して chunk-summary-22 を生成します。各出力事実は入力Chunk／SourceSpan対応を保持し、元4Chunkを上書きしません。
    field_values:
      processing_run_id: compress-run-22
      input_ref:
        - chunk-18
        - chunk-19
        - chunk-20
        - chunk-21
      input_version: v1
      processor_spec_ref: model-summary-v3
      started_at: 2026-07-15T09:05:00.000Z
      ended_at: 2026-07-15T09:05:01.900Z
      outcome: success
    related_node_ids:
      - ChunkCompression
      - Chunk
    related_relation_ids:
      - ChunkCompression-consumes-Chunk
    expected_result:
      zh: 该运行可查询 ChunkCompression 以及方向保持不变的事实 ChunkCompression-consumes-Chunk。
      en: The run can query ChunkCompression together with direction-preserving fact ChunkCompression-consumes-Chunk.
      ja: この実行では ChunkCompression と方向を保持した事実 ChunkCompression-consumes-Chunk を共に照会できます。
    why_valid_or_invalid:
      zh: 该对象具有活动身份、明确输入、压缩策略、压缩率和新产物，并保持证据映射；这些条件把它与普通摘要文本及输出 Chunk 区分开。
      en: Activity identity, explicit inputs, compression strategy, compression ratio, a new artifact, and evidence mappings distinguish the run from an ordinary summary string and from its output Chunk.
      ja: 活動同一性、明示入力、圧縮方策、圧縮率、新成果物、証拠対応が通常要約文や出力Chunkとの違いを成立させます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-compression-003
      - claim-chunk-compression-004
  - id: ChunkCompression-example-boundary-001
    kind: boundary
    labels:
      zh: 分块压缩活动边界例
      en: Boundary case for chunk compression activity
      ja: チャンク圧縮活動の境界例
    scenario_id: null
    descriptions:
      zh: chunk-run-81 直接读取 doc-policy/v7，并按 chunk_size=800、overlap=80 计算 37 个原文边界；它不读取已有 Chunk、不缩短内容，也不产生压缩率，因此是 ChunkingRun 而不是 ChunkCompression。
      en: chunk-run-81 reads doc-policy/v7 directly and computes 37 source boundaries with chunk_size=800 and overlap=80. It consumes no existing Chunks, shortens no content, and has no compression ratio, so it is ChunkingRun rather than ChunkCompression.
      ja: chunk-run-81 は doc-policy/v7 を直接読み、chunk_size=800、overlap=80で37原文境界を計算します。既存Chunkを消費せず内容も短縮せず圧縮率もないため ChunkingRun で ChunkCompression ではありません。
    field_values: {}
    related_node_ids:
      - ChunkCompression
      - Chunk
      - ChunkingRun
    related_relation_ids:
      - ChunkCompression-consumes-Chunk
    expected_result:
      zh: ChunkingRun 保持其原有类型，验证器不得凭关系共现把它提升为 ChunkCompression。
      en: ChunkingRun retains its own type; validation must not promote it to ChunkCompression from relation co-occurrence.
      ja: ChunkingRun は元の型を維持し、関係の共起だけで ChunkCompression へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 两者虽同为处理活动，但输入类型和变换不变量不同：分块运行从来源计算边界，压缩活动从已有 Chunk 生成更短且保留映射的新 Chunk。
      en: "Both are processing activities, but their input types and transformation invariants differ: chunking computes boundaries from a source, while compression creates a shorter mapped Chunk from existing Chunks."
      ja: 同じ処理活動でも入力型と変換不変条件が異なり、chunkingは出典から境界を計算し、compressionは既存Chunkから対応保持した短い新Chunkを作ります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-compression-005
      - claim-chunk-compression-006
