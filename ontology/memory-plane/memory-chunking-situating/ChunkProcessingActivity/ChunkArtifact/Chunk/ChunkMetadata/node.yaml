      expected_result:
        zh: 元数据随分块版本查询且主体唯一。
        en: Metadata is queried with the chunk version and has one explicit subject.
        ja: メタデータはチャンク版と共に照会され主語が一意です。
      why_valid_or_invalid:
        zh: 该记录只描述对应分块的属性，不复制正文或取得新的内容身份。
        en: The record describes only that chunk and does not duplicate its body.
        ja: 記録は当該チャンクだけを記述し本文を複製しません。
