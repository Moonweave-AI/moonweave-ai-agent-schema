      scenario_id: null
      descriptions:
        zh: chunk-003 包含 metadata-003，记录 start=1600、end=2399、overlap=80。
        en: chunk-003 has metadata-003 recording start=1600, end=2399, and overlap=80.
        ja: chunk-003 は start=1600、end=2399、overlap=80 を記録する metadata-003 を持ちます。
      field_values: {}
      related_node_ids:
        - Chunk
        - ChunkMetadata
      related_relation_ids:
