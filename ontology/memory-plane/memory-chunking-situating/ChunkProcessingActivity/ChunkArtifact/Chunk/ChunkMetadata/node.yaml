source_claims:
  - id: claim-chunk-metadata-001
    source: eng-fw-llamaindex-node-parsers
    supports: LlamaIndex states that when Documents are chunked into Nodes, parent attributes such as metadata and templates are inherited, and its SentenceSplitter example exposes chunk_overlap. This supports ChunkMetadata's descriptive role; a separate versioned record for boundary, overlap, provenance, context, and quality is Moonweave design inference.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > inherited attributes; Standalone Usage > chunk_overlap
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-002
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench splits data into chunks to simulate incremental multi-turn interactions, publishes chunk-size ablations, and defines task-specific metrics. Those experimental controls motivate auditable chunk-description records; the exact metadata taxonomy is Moonweave's inference.
    locator: README > LongMemEval Overview; Ablation Study for Chunk Size; Evaluation Metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-003
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata.boundary_start refines the documented fact that each Node is a specific chunk of its parent Document. The official page does not define normalized offsets; boundary_start and its exact datatype/cardinality are Moonweave design inference for reconstructing that source-local extent.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-004
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata.boundary_end refines the documented fact that each Node is a specific chunk of its parent Document. The official page does not define normalized offsets; boundary_end and its exact datatype/cardinality are Moonweave design inference for reconstructing that source-local extent.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-005
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata.overlap_size operationalizes the documented SentenceSplitter chunk_overlap parameter. Moonweave records the realized overlap on a metadata object; the source example only configures the parser and does not define this field's persistence, datatype, or ontology placement.
    locator: Node Parser Usage Pattern > Standalone Usage > SentenceSplitter chunk_overlap parameter
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-006
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata.quality_score is a Moonweave design inference for assessing Node outputs of the documented Document-to-Node operation. The LlamaIndex page does not define a chunk-quality score, scoring specification, range, or required field, so it supplies operational context only.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > Node outputs of document chunking
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-007
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata.context_note is compatible with the documented inheritance of parent Document metadata by child Nodes. A short explanatory note without independent identity, its wording, cardinality, and placement on ChunkMetadata are Moonweave design inference; LlamaIndex does not require this field.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > child Nodes inherit parent Document metadata
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-008
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata-example-positive-001 is grounded in the documented inheritance of parent Document attributes and the SentenceSplitter overlap setting. Externalizing boundary, overlap, context, quality, version identity, and checksum as one ChunkMetadata record is Moonweave design inference beyond the page.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > inherited attributes; Standalone Usage > chunk_overlap
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-009
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench says its data is split into chunks to simulate incremental multi-turn interactions and evaluates retrieval, learning, long-range understanding, and conflict resolution. Reproducible evaluation motivates retaining explicit chunk boundaries and quality evidence.
    locator: README > LongMemEval Overview > chunked multi-turn interaction scenarios
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-010
    source: eng-fw-llamaindex-node-parsers
    supports: "ChunkMetadata-example-boundary-001 applies the documented distinction between a child Node and the parent attributes it inherits: metadata describes the chunk but is not the chunk body itself. The separate ChunkMetadata class and version identity are Moonweave design inference, not asserted by LlamaIndex."
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > child Nodes inherit parent Document attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-011
    source: lit-agent-memoryagentbench
    supports: MemoryAgentBench evaluates behavior over data split into chunks; the evaluated chunk content is distinct from experimental grouping and metric information. Moonweave makes that data-versus-description distinction explicit.
    locator: README > LongMemEval Overview; Clarification on Evaluation Metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-metadata-012
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkMetadata-example-instance-001 makes explicit the inherited attributes and configured overlap documented for parsed Nodes. Storing those values in a separately versioned metadata record with boundary and quality fields is Moonweave design inference; the source does not prescribe that record shape.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > inherited attributes; Standalone Usage > chunk_overlap
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
