schema: moonweave.ai/ontology-node/v1
id: ChunkMetadata
kind: concept
status: review
labels:
  zh: 分块元数据
  en: chunk metadata
  ja: チャンクメタデータ
semantics:
  short_definition:
    zh: 描述某个 Chunk 或 ChunkingRun 的边界、重叠、来源、语境或质量事实的信息记录。
    en: An information record describing boundary, overlap, provenance, context, or quality facts about a Chunk or ChunkingRun.
    ja: ChunkまたはChunkingRunの境界・重複・来歴・文脈・品質事実を記述する情報記録です。
  definition:
    zh: ChunkMetadata 是附着于一个明确 Chunk 或 ChunkingRun 的信息记录；其身份由 subject_id、metadata_kind、值或证据、生成来源和适用版本共同确定。它统一表达 boundary_start/end、overlap_size、ChunkProvenance、质量信号和定位说明，但不承载待检索正文，也不执行切分、定位或压缩。
    en: ChunkMetadata is an information record attached to a specific Chunk or ChunkingRun and identified by subject_id, metadata_kind, value or evidence, generation provenance, and applicable version. It covers boundary_start/end, overlap_size, ChunkProvenance, quality signals, and situating notes, but carries no retrievable body text and performs no splitting, situating, or compression.
    ja: ChunkMetadata は特定のChunk／ChunkingRunへ付随し、subject_id、metadata_kind、値または証拠、生成来歴、適用版で同定される情報記録です。boundary_start/end、overlap_size、ChunkProvenance、品質信号、位置付け注記を扱いますが、検索本文を担わず分割・位置付け・圧縮を実行しません。
  why_needed:
    zh: 把描述性事实与 Chunk 正文分开，可以单独版本化和校验边界、重叠与质量信号，并避免元数据变化无意义地改变 Chunk 的内容身份。
    en: Separating descriptive facts from Chunk body text allows independent versioning and validation of boundaries, overlap, and quality signals without needlessly changing Chunk content identity when metadata changes.
    ja: 記述事実をChunk本文から分離し、境界・重複・品質信号を独立に版管理・検証でき、metadata変更でChunk内容同一性を不必要に変えません。
  includes:
    - zh: 纳入 subject=chunk-policy-7-003、kind=boundary、start=1600、end=2399、overlap=80 这类明确附着对象、种类、值和适用版本的记录，以及 ChunkProvenance 和质量证据。
      en: Includes records such as subject=chunk-policy-7-003, kind=boundary, start=1600, end=2399, overlap=80 with explicit subject, kind, value, and applicable version, plus ChunkProvenance and quality evidence.
      ja: subject=chunk-policy-7-003、kind=boundary、start=1600、end=2399、overlap=80 のように対象・種類・値・適用版が明確な記録、および ChunkProvenance と品質証拠を含みます。
  excludes:
    - zh: 排除 Chunk 正文、ChunkingRun 活动、实际 SourceSpan、只指向来源的 ChunkReference、未绑定 subject_id 的任意键值，以及改变内容的压缩输出。
      en: Excludes Chunk body text, ChunkingRun activity, the actual SourceSpan, a ChunkReference that only points to a source, arbitrary key-values lacking subject_id, and compression outputs that change content.
      ja: Chunk本文、ChunkingRun活動、実SourceSpan、出典だけを指す ChunkReference、subject_idに結合されない任意key-value、内容を変える圧縮出力を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: boundary_start
      labels:
        zh: 起始边界
        en: boundary start
        ja: 開始境界
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 分块在规范化来源中的起始偏移。
        en: The chunk's starting offset in its normalized source.
        ja: 正規化済み出典におけるチャンク開始オフセットです。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-chunk-metadata-003
    - id: boundary_end
      labels:
        zh: 结束边界
        en: boundary end
        ja: 終了境界
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 分块在规范化来源中的结束偏移。
        en: The chunk's ending offset in its normalized source.
        ja: 正規化済み出典におけるチャンク終了オフセットです。
      allowed_values: []
      pattern: null
      example_value: 512
      source_claims:
        - claim-chunk-metadata-004
    - id: overlap_size
      labels:
        zh: 重叠大小
        en: overlap size
        ja: 重複量
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该分块与相邻分块共享的 token 或字符数量。
        en: The number of tokens or characters shared with an adjacent chunk.
        ja: 隣接チャンクと共有するトークンまたは文字数です。
      allowed_values: []
      pattern: null
      example_value: 64
      source_claims:
        - claim-chunk-metadata-005
    - id: quality_score
      labels:
        zh: 质量评分
        en: quality score
        ja: 品質スコア
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在明确评分规范下计算的分块质量值。
        en: A chunk-quality value computed under an explicit scoring specification.
        ja: 明示的な評価仕様で計算したチャンク品質値です。
      allowed_values: []
      pattern: null
      example_value: 0.94
      source_claims:
        - claim-chunk-metadata-006
    - id: context_note
      labels:
        zh: 上下文注记
        en: context note
        ja: コンテキスト注記
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 不具独立身份、用于解释该分块语境的短注记。
        en: A short note without independent identity that explains the chunk's context.
        ja: 独立同一性を持たずチャンク文脈を説明する短い注記です。
      allowed_values: []
      pattern: null
      example_value: "section: installation"
      source_claims:
        - claim-chunk-metadata-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChunkMetadata-example-positive-001
    kind: positive
    labels:
      zh: 分块元数据正例
      en: Positive example of chunk metadata
      ja: チャンクメタデータの正例
    scenario_id: null
    descriptions:
      zh: "metadata-chunk-04/v2 附着于 chunk-doc-001-04，记录 boundary_start=0、boundary_end=512、overlap_size=64、quality_score=0.94，并用 context_note=\"section: installation\" 说明章节；它不复制该 Chunk 的正文。"
      en: "metadata-chunk-04/v2 attaches to chunk-doc-001-04 and records boundary_start=0, boundary_end=512, overlap_size=64, quality_score=0.94, and context_note=\"section: installation\" without copying the Chunk body."
      ja: "metadata-chunk-04/v2 は chunk-doc-001-04 に付随し、boundary_start=0、boundary_end=512、overlap_size=64、quality_score=0.94、context_note=\"section: installation\" を記録し、Chunk本文はcopyしません。"
    field_values:
      boundary_start: 0
      boundary_end: 512
      overlap_size: 64
      quality_score: 0.94
      context_note: "section: installation"
    related_node_ids:
      - ChunkMetadata
      - Chunk
    related_relation_ids:
      - Chunk-has_metadata-ChunkMetadata
    expected_result:
      zh: 该运行可查询 ChunkMetadata 以及方向保持不变的事实 Chunk-has_metadata-ChunkMetadata。
      en: The run can query ChunkMetadata together with direction-preserving fact Chunk-has_metadata-ChunkMetadata.
      ja: この実行では ChunkMetadata と方向を保持した事実 Chunk-has_metadata-ChunkMetadata を共に照会できます。
    why_valid_or_invalid:
      zh: 记录有明确 subject、版本、元数据种类和值，且只描述分块而不承载正文或执行变换，因此属于 ChunkMetadata。
      en: The record has an explicit subject, version, metadata kinds, and values and only describes the Chunk without carrying body text or performing a transformation, so it is ChunkMetadata.
      ja: 明示subject・版・metadata種別・値を持ち、本文を担わず変換も行わずChunkを説明するため ChunkMetadata です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-metadata-008
      - claim-chunk-metadata-009
  - id: ChunkMetadata-example-boundary-001
    kind: boundary
    labels:
      zh: 分块元数据边界例
      en: Boundary case for chunk metadata
      ja: チャンクメタデータの境界例
    scenario_id: null
    descriptions:
      zh: chunk-doc-001-04 保存可检索安装说明正文，并以 chunk_id 与 ordinal 为身份；即使它关联 metadata-chunk-04/v2，正文产物仍是 Chunk，不能把“被元数据描述”误解成“自身是元数据”。
      en: chunk-doc-001-04 stores retrievable installation text and is identified by chunk ID and ordinal. Even though metadata-chunk-04/v2 describes it, the body artifact remains a Chunk; being described by metadata does not make it metadata.
      ja: chunk-doc-001-04 は検索可能なinstallation本文を保存しchunk_idとordinalで同定されます。metadata-chunk-04/v2に説明されても本文成果物はChunkであり、「metadataに記述される」は「metadataである」を意味しません。
    field_values: {}
    related_node_ids:
      - ChunkMetadata
      - Chunk
    related_relation_ids:
      - Chunk-has_metadata-ChunkMetadata
    expected_result:
      zh: Chunk 保持其原有类型，验证器不得凭关系共现把它提升为 ChunkMetadata。
      en: Chunk retains its own type; validation must not promote it to ChunkMetadata from relation co-occurrence.
      ja: Chunk は元の型を維持し、関係の共起だけで ChunkMetadata へ昇格してはなりません。
    why_valid_or_invalid:
      zh: Chunk 以正文与来源跨度为身份，ChunkMetadata 以 subject、种类和值为身份；has_metadata 是附着关系而非类型提升。
      en: Chunk identity comes from body and source span, whereas ChunkMetadata identity comes from subject, kind, and value. has_metadata is attachment, not type promotion.
      ja: Chunkは本文・出典範囲で、ChunkMetadataはsubject・種別・値で同定され、has_metadataは付着関係で型昇格ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-metadata-010
      - claim-chunk-metadata-011
  - id: ChunkMetadata-example-instance-001
    kind: instance
    labels:
      zh: 分块元数据结构化实例
      en: Structured instance of chunk metadata
      ja: チャンクメタデータの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: metadata-chunk-installation/v1 说明目标 Chunk 的字符边界 0–512、与前一分块重叠 64 字符、质量分 0.94，context_note 指明安装章节；这些值都属于描述层而非正文。
      en: metadata-chunk-installation/v1 describes target-Chunk characters 0–512, a 64-character overlap with the previous chunk, quality score 0.94, and an installation-section context_note; all values belong to the descriptive layer rather than body text.
      ja: metadata-chunk-installation/v1 は対象Chunkの文字境界0–512、前chunkとの64文字overlap、品質score 0.94、installation節context_noteを記述し、全値は本文でなく記述layerに属します。
    field_values:
      boundary_start: 0
      boundary_end: 512
      overlap_size: 64
      quality_score: 0.94
      context_note: "section: installation"
    related_node_ids:
      - ChunkMetadata
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: start/end 构成半开边界，overlap_size 说明与邻块复用范围，quality_score 和 context_note 分别承载评价与解释；四者语义互不替代。
      en: start/end form the boundary interval, overlap_size states reused range with a neighbor, and quality_score and context_note carry evaluation and explanation respectively; none is semantically interchangeable.
      ja: start/endは境界区間、overlap_sizeは隣接chunkとの再利用範囲、quality_scoreとcontext_noteは評価と説明を別々に担い、相互代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-metadata-012
      - claim-chunk-metadata-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
