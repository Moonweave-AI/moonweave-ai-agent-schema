    en: Chunk-has_metadata-ChunkMetadata composes a Chunk with ChunkMetadata whose subject is that chunk ID and version. The metadata describes boundaries, overlap, quality, or context notes but does not carry the retrievable body.
    ja: Chunk-has_metadata-ChunkMetadata は Chunk を、そのchunk IDと版を主語とする ChunkMetadata 構成項へ結びます。メタデータは境界・重複・品質・文脈注記を記述し検索本文は担いません。
