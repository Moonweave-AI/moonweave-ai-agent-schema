schema: moonweave.ai/ontology-node/v1
id: ChunkMetadata
kind: concept
labels:
  zh: 分块元数据
  en: Chunk metadata
  ja: チャンク metadata
semantics:
  short_definition:
    zh: 描述 Chunk 来源与边界属性的元信息。
    en: Meta-information describing Chunk source and boundary properties.
    ja: Chunk の出典・境界属性を記述する meta-information。
  definition:
    zh: ChunkMetadata 是 Chunk 的结构化元信息，含 source、page、char offsets（start/end）、token_count 等。LangChain Document.metadata 与 LlamaIndex TextNode.metadata 映射 ChunkMetadata；ChunkProvenance 是其子类专司 lineage 字段。不是 Chunk 正文或 ChunkingRun。
    en: ChunkMetadata is structured meta-information on Chunk including source, page, char offsets (start/end), token_count. LangChain Document.metadata and LlamaIndex TextNode.metadata map to ChunkMetadata; ChunkProvenance is subtype for lineage fields. Not Chunk body or ChunkingRun.
    ja: ChunkMetadata は Chunk 構造化 meta（source/page/char offsets/token_count）。LangChain Document.metadata/LlamaIndex TextNode.metadata→ChunkMetadata。ChunkProvenance=lineage 専用 subtype。Chunk 本文/ChunkingRun 非。
  why_needed:
    zh: Pinecone upsert metadata 与 Chroma metadatas 需要标准字段名以便 RetrievalRun 过滤与 ChunkReference 回到 Document 边界。
    en: Pinecone upsert metadata and Chroma metadatas need standard field names for RetrievalRun filtering and ChunkReference back to Document boundaries.
    ja: Pinecone/Chroma metadata 標準 field で RetrievalRun filter+ChunkReference→Document 境界。
  includes:
    - zh: 纳入 source、page、start_char_idx、end_char_idx、token_count 等字段集合。
      en: Includes field sets with source, page, start_char_idx, end_char_idx, token_count.
      ja: source/page/start_char_idx/end_char_idx/token_count 等 field 集合。
  excludes:
    - zh: 排除 chunk 正文、situating_context 与 splitter 策略规范。
      en: Excludes chunk body, situating_context, and splitter strategy specs.
      ja: chunk 本文/situating_context/splitter spec を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain metadata={source, page, start_index}；LlamaIndex metadata+start_char_idx/end_char_idx；Pinecone upsert metadata.chunk_id/source/page；Chroma collection.add metadatas 同构映射。
    en: LangChain metadata={source, page, start_index}; LlamaIndex metadata+start_char_idx/end_char_idx; Pinecone upsert metadata.chunk_id/source/page; Chroma collection.add metadatas map isomorphically.
    ja: LangChain/LlamaIndex metadata→ChunkMetadata。Pinecone/Chroma upsert metadata 同構写像。
  typical_input:
    - description: LangChain Document metadata
      format: |
        metadata={"source": "policy.pdf", "page": 2, "start_index": 1600}
      source_claims: [claim-chunk-metadata-langchain]
    - description: LlamaIndex node metadata
      format: |
        metadata={"source": "policy.pdf", "file_name": "policy.pdf"}
        start_char_idx=1600, end_char_idx=2400
      source_claims: [claim-chunk-metadata-llamaindex]
  typical_output:
    - description: Chunk metadata record
      format: |
        {
          "chunk_id": "chunk-policy-7-003",
          "source": "policy.pdf",
          "page": 2,
          "start_char_idx": 1600,
          "end_char_idx": 2400,
          "token_count": 128
        }
      source_claims: [claim-chunk-metadata-design]
  reference_implementations:
    - name: LangChain Document
      url: https://python.langchain.com/docs/concepts/document/
      description: metadata dict on documents.
    - name: LlamaIndex TextNode
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Node metadata and indices.
    - name: Chroma Add Data
      url: https://docs.trychroma.com/docs/collections/add-data
      description: metadatas on collection add.
structure:
  identity_keys: [chunk_id]
  fields:
    - id: chunk_id
      labels: {zh: 分块标识, en: Chunk identifier, ja: チャンク ID}
      definitions:
        zh: 所属 Chunk 的 chunk_id。
        en: chunk_id of owning Chunk.
        ja: 所属 Chunk の chunk_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-chunk-metadata-id]
    - id: source
      labels: {zh: 来源, en: Source, ja: 出典}
      definitions:
        zh: 源文件名或 URI，如 policy.pdf。
        en: Source filename or URI, e.g., policy.pdf.
        ja: 源ファイル名/URI。policy.pdf 等。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy.pdf
      allowed_values: []
      source_claims: [claim-chunk-metadata-langchain]
    - id: page
      labels: {zh: 页码, en: Page, ja: ページ}
      definitions:
        zh: PDF 等分页文档的页码；非分页源可为 null。
        en: Page number for paginated sources like PDF; null for non-paginated.
        ja: PDF 等ページ番号。非分页は null 可。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [claim-chunk-metadata-langchain]
    - id: start_char_idx
      labels: {zh: 起始字符偏移, en: Start char index, ja: 開始文字 index}
      definitions:
        zh: 在规范化 Document 正文中的起始偏移（含）。
        en: Start offset (inclusive) in normalized Document body.
        ja: 正規化 Document 本文開始 offset（含）。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1600
      allowed_values: []
      source_claims: [claim-chunk-metadata-llamaindex]
    - id: end_char_idx
      labels: {zh: 结束字符偏移, en: End char index, ja: 終了文字 index}
      definitions:
        zh: 在规范化 Document 正文中的结束偏移（不含）。
        en: End offset (exclusive) in normalized Document body.
        ja: 正規化 Document 本文終了 offset（不含）。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2400
      allowed_values: []
      source_claims: [claim-chunk-metadata-llamaindex]
    - id: token_count
      labels: {zh: 词元数, en: Token count, ja: token 数}
      definitions:
        zh: 片段 token 计数，用于 budget 与裁剪决策。
        en: Fragment token count for budget and trimming decisions.
        ja: fragment token 数。budget/trim 判断用。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 128
      allowed_values: []
      source_claims: [claim-chunk-metadata-design]
  constraints: []
  required_relations: []
examples:
  - id: ChunkMetadata-example-langchain
    labels:
      zh: LangChain metadata
      en: LangChain metadata
      ja: LangChain metadata
    descriptions:
      zh: chunk-policy-7-003 ChunkMetadata：source=policy.pdf, page=2, start_index=1600 映射 start_char_idx，供 ChunkReference 重建 SourceSpan。
      en: chunk-policy-7-003 ChunkMetadata with source=policy.pdf, page=2, start_index=1600 mapping start_char_idx for ChunkReference SourceSpan rebuild.
      ja: chunk-policy-7-003 metadata：source/page/start_index→SourceSpan 再構築。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/concepts/document/
      version: Document metadata
    field_values:
      chunk_id: chunk-policy-7-003
      source: policy.pdf
      page: 2
      start_char_idx: 1600
      end_char_idx: 2400
    related_node_ids:
      - ChunkMetadata
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-metadata-langchain
      - claim-chunk-metadata-design
  - id: ChunkMetadata-example-llamaindex
    labels:
      zh: LlamaIndex node metadata
      en: LlamaIndex node metadata
      ja: LlamaIndex node metadata
    descriptions:
      zh: TextNode metadata file_name=policy.pdf，start_char_idx/end_char_idx=1600/2400，token_count=128 写入 ChunkMetadata。
      en: TextNode metadata file_name=policy.pdf, start_char_idx/end_char_idx=1600/2400, token_count=128 writes ChunkMetadata.
      ja: TextNode metadata+1600/2400+token_count=128→ChunkMetadata。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: TextNode
    field_values:
      chunk_id: chunk-policy-7-003
      token_count: 128
    related_node_ids:
      - ChunkMetadata
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-metadata-llamaindex
      - claim-chunk-metadata-design
  - id: ChunkMetadata-example-pinecone-upsert
    labels:
      zh: Pinecone upsert metadata
      en: Pinecone upsert metadata
      ja: Pinecone upsert metadata
    descriptions:
      zh: IndexEntry upsert metadata {chunk_id, source, page} 来自 ChunkMetadata 标准字段，供 query filter 与 RetrievedChunk 回溯。
      en: IndexEntry upsert metadata {chunk_id, source, page} from ChunkMetadata standard fields for query filter and RetrievedChunk trace-back.
      ja: upsert metadata {chunk_id,source,page}←ChunkMetadata。query filter/RetrievedChunk 回溯。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/data/upsert-data
      version: vector metadata
    field_values:
      chunk_id: chunk-policy-7-003
      source: policy.pdf
      page: 2
    related_node_ids:
      - ChunkMetadata
      - IndexEntry
      - memory-retrieval-ranking
    related_relation_ids: []
    source_claims:
      - claim-chunk-metadata-design
  - id: ChunkMetadata-example-not-body
    labels:
      zh: 元数据非正文
      en: Metadata is not body
      ja: metadata は本文ではない
    descriptions:
      zh: chunk_text/JWT bearer… 是 Chunk 证据正文；source/page/token_count 是 ChunkMetadata 描述属性。
      en: chunk_text/JWT bearer… is Chunk evidence body; source/page/token_count are ChunkMetadata descriptive attributes.
      ja: chunk_text=証拠本文。source/page/token_count=ChunkMetadata 属性。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkMetadata
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-metadata-design
parent_relation:
  id: Chunk-has_metadata-ChunkMetadata
  predicate: has_metadata
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 拥有分块元数据
    en: has chunk metadata
    ja: チャンク metadata を持つ
  definitions:
    zh: Chunk has_metadata ChunkMetadata 表示结构化元信息描述该 Chunk 的来源与边界属性。
    en: Chunk has_metadata ChunkMetadata means structured meta-information describes this Chunk's source and boundary properties.
    ja: Chunk has_metadata ChunkMetadata は structured meta が Chunk 出典・境界属性を記述。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 每个 Chunk 通常有一个 ChunkMetadata 记录。
    en: Each Chunk typically has one ChunkMetadata record.
    ja: 各 Chunk に通常一 ChunkMetadata。
  inverse_reading:
    predicate: metadata_of
    labels: {zh: 反向读取, en: inverse has_metadata, ja: 逆方向読取}
  conditions:
    - id: Chunk-has_metadata-ChunkMetadata-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when chunk_id matches and metadata fields align with Chunk SourceSpan.
      explanations:
        zh: 仅当 metadata 与 SourceSpan 一致时成立。
        en: Assert only when metadata aligns with SourceSpan.
        ja: metadata が SourceSpan と一致時のみ assert。
      source_claims: [claim-chunk-metadata-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-metadata-design]
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-langchain-document
    title: LangChain Document Concept
    publisher: LangChain
    url: https://python.langchain.com/docs/concepts/document/
    source_type: official-doc
    relevance: metadata source page start_index fields.
  - id: src-llamaindex-textnode
    title: LlamaIndex Documents and Nodes
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: Node metadata and char indices.
  - id: src-chroma-add
    title: Chroma Add Data
    publisher: Chroma
    url: https://docs.trychroma.com/docs/collections/add-data
    source_type: official-doc
    relevance: metadatas on collection entries.
  - id: src-chunk-metadata-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ChunkMetadata standard fields and SourceSpan alignment.
source_claims:
  - id: claim-chunk-metadata-langchain
    source: src-langchain-document
    supports: LangChain Document metadata carries source and positional fields for chunks.
    locator: Document metadata
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-metadata-llamaindex
    source: src-llamaindex-textnode
    supports: LlamaIndex TextNode provides start_char_idx, end_char_idx, and metadata for span reconstruction.
    locator: TextNode fields
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-metadata-design
    source: src-chunk-metadata-design
    supports: ChunkMetadata standardizes source, page, char offsets, and token_count separate from chunk body.
    locator: ChunkMetadata boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-metadata-id
    source: src-chunk-metadata-design
    supports: chunk_id links metadata to owning Chunk.
    locator: structure
    evidence_kind: design-inference
    confidence: high
