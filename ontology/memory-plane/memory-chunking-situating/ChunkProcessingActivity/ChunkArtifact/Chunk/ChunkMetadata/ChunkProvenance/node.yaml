source_claims:
  - id: claim-chunk-provenance-001
    source: eng-fw-llamaindex-node-parsers
    supports: LlamaIndex directly establishes that emitted Nodes are chunks of a parent Document and inherit the parent's attributes. This anchors the origin fact used by ChunkProvenance; the versioned, ordered lineage across multiple activities, its owner, semantic kind, and ontology placement are Moonweave design inference.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > parent Document and inherited child attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-002
    source: eng-ont-prov-o
    supports: PROV-O defines derivation as a relationship between Entities and connects generation and usage through Activities, providing the formal provenance roles used by ChunkProvenance. Its ordered steps, checksums, exact activity taxonomy, owner, semantic kind, and metadata placement are Moonweave design inference.
    locator: PROV-O > Derivation, Usage, and Generation > entity and activity provenance roles
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-003
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkProvenance-example-positive-001 starts from the documented parent-Document binding and inherited attributes of emitted Nodes. The ordered, versioned chain across ingestion, splitting, situating, and compression is Moonweave design inference; LlamaIndex does not define that lineage record.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > parent Document and inherited child attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-004
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Entity derivation, Activity usage, and Activity generation, which supports the lineage roles shown in ChunkProvenance-example-positive-001. The required ordering, checksums, exact transformation classes, and completeness rule are Moonweave design inference rather than requirements asserted by PROV-O.
    locator: PROV-O > Derivation, Usage, and Generation > prov:wasDerivedFrom, prov:used, and prov:wasGeneratedBy
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-005
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkProvenance-example-boundary-001 uses the documented parent-Document and inherited-attribute facts only as a minimal origin trace. A loose metadata note is not the ordered transformation lineage Moonweave requires for ChunkProvenance; the source does not define that class or completeness condition.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > parent Document and inherited child attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-006
    source: eng-ont-prov-o
    supports: PROV-O models derivation through relationships among identified Entities and Activities; a freestanding note with no such relationships does not establish the lineage required by ChunkProvenance-example-boundary-001. Moonweave's ordered-chain completeness threshold remains design inference.
    locator: PROV-O > Derivation > prov:wasDerivedFrom and qualified derivation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-007
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkProvenance-example-instance-001 preserves the documented relationship between a parsed Node and its parent Document and the inherited child attributes. Its ordered step relations, checksums, and version lineage are Moonweave design inference, not fields specified by LlamaIndex.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > parent Document and inherited child attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-008
    source: eng-ont-prov-o
    supports: ChunkProvenance-example-instance-001 uses PROV-O's distinct derivation, generation, and usage roles to keep source Entity, processing Activity, and produced Entity separate. Step numbering, hashes, parser versions, and the concrete Moonweave record shape are design inference.
    locator: PROV-O > Derivation, Usage, and Generation > qualified provenance relations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-provenance-009
    source: eng-ont-prov-o
    supports: The four-step lineage instantiates PROV-O entity-activity relationships for one chunk version.
    locator: PROV-O Recommendation > Starting Point Terms > Activity, Entity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-provenance-010
    source: eng-ont-prov-o
    supports: Start and end values describe an extent but do not state the activity and entity relationships required for provenance.
    locator: PROV-O Recommendation > Starting Point Terms > Activity, Entity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-chunk-provenance-011
    source: eng-ont-prov-o
    supports: PROV-O models derivation through entities and activities; ChunkProvenance specializes descriptive ChunkMetadata by recording that ordered lineage.
    locator: PROV-O Recommendation > Starting Point Terms > Activity, Entity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
