schema: moonweave.ai/ontology-node/v1
id: ChunkProvenance
kind: concept
status: accepted
labels:
  zh: 分块来源记录
  en: chunk provenance
  ja: チャンク来歴
semantics:
  short_definition:
    zh: 记录 Chunk 从来源版本经摄入与处理活动演化到当前版本的 ChunkMetadata。
    en: ChunkMetadata recording how a Chunk evolved from a source version through ingestion and processing activities to its current version.
    ja: Chunkが出典版から取込・処理活動を経て現版へ至った経路を記録する ChunkMetadata です。
  definition:
    zh: ChunkProvenance 是一种 ChunkMetadata；其种差是：它以 lineage_id 为身份，按顺序连接当前 Chunk 到原始 Document/SourceSpan 版本、内容校验和、IngestionRun、ChunkingRun，以及后续 SituatingPromptRun 或 ChunkCompression，并说明每一步产生的版本。它表达生成谱系，不等于一个可点击来源指针。
    en: ChunkProvenance is ChunkMetadata identified by lineage_id that orders the path from the current Chunk to the original Document or SourceSpan version, content checksum, IngestionRun, ChunkingRun, and any later SituatingPromptRun or ChunkCompression, including the version emitted at each step. It expresses generation lineage rather than a clickable source pointer.
    ja: ChunkProvenance は lineage_id で識別される ChunkMetadata で、現Chunkから元Document／SourceSpan版、内容checksum、IngestionRun、ChunkingRun、後続 SituatingPromptRun／ChunkCompressionまでを各出力版付きで順序化します。生成系譜であり、click可能な出典pointerそのものではありません。
  why_needed:
    zh: 谱系使系统能判断两个文本相近的 Chunk 是否来自同一证据、定位陈旧产物，并在压缩或情境化引入错误时追到具体处理步骤。
    en: Lineage determines whether textually similar Chunks derive from the same evidence, identifies stale artifacts, and traces errors introduced by compression or situating to a specific processing step.
    ja: 系譜により、類似文字列Chunkが同一証拠由来かを判定し、旧成果物を特定し、圧縮・位置付けで入った誤りを具体的処理stepまで追跡できます。
  includes:
    - zh: 纳入 lineage-policy-7-003 这类按 doc-policy/v7 → ingest-77 → chunk-run-81 → situated-run-84 → chunk-policy-7-003/v2 顺序记录输入输出版本与校验和的谱系。
      en: Includes lineages such as lineage-policy-7-003 ordering doc-policy/v7 → ingest-77 → chunk-run-81 → situated-run-84 → chunk-policy-7-003/v2 with input/output versions and checksums.
      ja: doc-policy/v7 → ingest-77 → chunk-run-81 → situated-run-84 → chunk-policy-7-003/v2 を入力出力版とchecksum付きで順序記録する lineage-policy-7-003 のような系譜を含みます。
  excludes:
    - zh: 排除只有页码或 URL 的 ChunkReference、仅含 start/end 的边界元数据、质量评分、Document 本身、处理活动本身，以及无法排序输入输出版本的日志文本。
      en: Excludes a ChunkReference containing only page or URL, boundary metadata containing only start/end, quality scores, the Document itself, processing activities themselves, and log text that cannot order input and output versions.
      ja: page／URLだけの ChunkReference、start/endだけの境界metadata、品質score、Document自体、処理活動自体、入力出力版を順序化できないlog文を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChunkProvenance-example-positive-001
    kind: positive
    labels:
      zh: 分块来源记录正例
      en: Positive example of chunk provenance
      ja: チャンク来歴の正例
    scenario_id: null
    descriptions:
      zh: lineage-policy-7-003 依次记录 doc-policy/v7（sha256:a1…）→ ingest-77 → chunk-run-81 → chunk-policy-7-003/v1 → situate-run-84 → situated-policy-7-003/v2；每一步都给出输入、输出和校验和。
      en: lineage-policy-7-003 orders doc-policy/v7 (sha256:a1…) → ingest-77 → chunk-run-81 → chunk-policy-7-003/v1 → situate-run-84 → situated-policy-7-003/v2, recording input, output, and checksum at every step.
      ja: lineage-policy-7-003 は doc-policy/v7（sha256:a1…）→ ingest-77 → chunk-run-81 → chunk-policy-7-003/v1 → situate-run-84 → situated-policy-7-003/v2 を順序記録し、各stepの入力・出力・checksumを示します。
    field_values:
      boundary_start: 0
      boundary_end: 512
      overlap_size: 64
      quality_score: 0.94
      context_note: "section: installation"
    related_node_ids:
      - ChunkProvenance
      - Chunk
    related_relation_ids:
      - chunk_has_provenance
    expected_result:
      zh: 该运行可查询 ChunkProvenance 以及方向保持不变的事实 chunk_has_provenance。
      en: The run can query ChunkProvenance together with direction-preserving fact chunk_has_provenance.
      ja: この実行では ChunkProvenance と方向を保持した事実 chunk_has_provenance を共に照会できます。
    why_valid_or_invalid:
      zh: 记录以 lineage_id 组织一条可排序、可校验的生成链，并覆盖来源版本与全部变换活动；它回答“如何生成”，不只是“原文在哪里”。
      en: The record uses lineage_id to organize an ordered, checksum-verifiable generation chain spanning source version and all transformations. It answers how the Chunk was produced, not merely where source text lives.
      ja: lineage_idで出典版と全変換活動を含む順序・checksum検証可能な生成chainを組織し、「どこか」だけでなく「どう生成したか」を答えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-provenance-003
      - claim-chunk-provenance-004
  - id: ChunkProvenance-example-boundary-001
    kind: boundary
    labels:
      zh: 分块来源记录边界例
      en: Boundary case for chunk provenance
      ja: チャンク来歴の境界例
    scenario_id: null
    descriptions:
      zh: metadata-chunk-04/v2 只记录 boundary_start=0、boundary_end=512、overlap=64 和 quality_score=0.94；它没有 lineage_id，也没有按顺序连接来源版本与处理活动，因此是普通 ChunkMetadata，不是 ChunkProvenance。
      en: metadata-chunk-04/v2 records only boundary_start=0, boundary_end=512, overlap=64, and quality_score=0.94. It has no lineage ID and does not order source versions and processing activities, so it is ordinary ChunkMetadata, not ChunkProvenance.
      ja: metadata-chunk-04/v2 は boundary_start=0、boundary_end=512、overlap=64、quality_score=0.94だけを記録し、lineage_idも出典版・処理活動の順序chainもないため通常ChunkMetadataで ChunkProvenance ではありません。
    field_values: {}
    related_node_ids:
      - ChunkProvenance
      - Chunk
      - ChunkMetadata
    related_relation_ids:
      - chunk_has_provenance
    expected_result:
      zh: ChunkMetadata 保持其原有类型，验证器不得凭关系共现把它提升为 ChunkProvenance。
      en: ChunkMetadata retains its own type; validation must not promote it to ChunkProvenance from relation co-occurrence.
      ja: ChunkMetadata は元の型を維持し、関係の共起だけで ChunkProvenance へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 所有 ChunkProvenance 都是 ChunkMetadata，但只有能排序来源—摄入—切分—后续变换及其版本的元数据才满足谱系种差。
      en: Every ChunkProvenance is ChunkMetadata, but only metadata that orders source, ingestion, splitting, later transformations, and their versions satisfies the lineage differentia.
      ja: すべてのChunkProvenanceはChunkMetadataですが、出典・取込・分割・後続変換と各版を順序化するmetadataだけが系譜種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-provenance-005
      - claim-chunk-provenance-006
  - id: ChunkProvenance-example-instance-001
    kind: instance
    labels:
      zh: 分块来源记录结构化实例
      en: Structured instance of chunk provenance
      ja: チャンク来歴の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 该节点内实例把边界、重叠、质量与章节说明作为当前谱系步骤的附加审计值；完整 lineage 仍由来源版本和处理活动的有序关系表达，而不是把所有信息压成一段说明文字。
      en: This node-local instance keeps boundary, overlap, quality, and section note as audit values for the current lineage step. The complete lineage remains an ordered relation chain over source versions and activities rather than one flattened explanation string.
      ja: ノード内instanceは境界・overlap・品質・節注記を現系譜stepの監査値として保持し、完全lineageは一説明文へ潰さず出典版・処理活動の順序関係chainで表します。
    field_values:
      boundary_start: 0
      boundary_end: 512
      overlap_size: 64
      quality_score: 0.94
      context_note: "section: installation"
    related_node_ids:
      - ChunkProvenance
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 继承的 ChunkMetadata 字段只描述某一步；ChunkProvenance 的决定性身份仍来自 lineage_id 与有序输入输出关系，防止把普通元数据误称为谱系。
      en: Inherited ChunkMetadata fields describe only one step; decisive ChunkProvenance identity still comes from lineage_id and ordered input/output relations, preventing ordinary metadata from being mislabeled as lineage.
      ja: 継承ChunkMetadata項目は一stepだけを記述し、ChunkProvenanceの決定的同一性はlineage_idと順序付き入出力関係にあり、通常metadataの系譜誤分類を防ぎます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-provenance-007
      - claim-chunk-provenance-008
