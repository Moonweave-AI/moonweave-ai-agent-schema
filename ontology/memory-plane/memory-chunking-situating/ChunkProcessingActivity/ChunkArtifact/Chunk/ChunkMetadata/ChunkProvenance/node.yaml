schema: moonweave.ai/ontology-node/v1
id: ChunkProvenance
kind: concept
labels:
  zh: 分块溯源
  en: Chunk provenance
  ja: チャンク来歴
semantics:
  short_definition:
    zh: 记录 Chunk 如何产生的 ChunkMetadata 子类。
    en: ChunkMetadata subtype recording how a Chunk was produced.
    ja: Chunk 生成経路を記録する ChunkMetadata subtype。
  definition:
    zh: ChunkProvenance 是 ChunkMetadata 子类，专司 lineage 字段：chunking_run_id、splitter_config_digest、document_id、document_version、processor_spec_ref。回答“哪个 run、哪版 Document、哪种 splitter 产生此 Chunk”；不是 Chunk 正文或 ChunkMetadata 的 source/page 显示字段。
    en: "ChunkProvenance is ChunkMetadata subtype specializing lineage fields (chunking_run_id, splitter_config_digest, document_id, document_version, processor_spec_ref). Answers which run, which Document version, and which splitter produced this Chunk—not Chunk body or ChunkMetadata source/page display fields."
    ja: ChunkProvenance は lineage 専用 ChunkMetadata subtype（chunking_run_id/splitter_config_digest/document_id/document_version/processor_spec_ref）。どの run/Document 版/splitter か回答。chunk 本文/source/page 表示 field 非。
  why_needed:
    zh: 策略变更后必须知道 chunk-policy-7-003 来自 chunk-run-7 而非 chunk-run-6，才能决定 invalidate 或重放。
    en: After strategy changes you must know chunk-policy-7-003 came from chunk-run-7 not chunk-run-6 to decide invalidate or replay.
    ja: 方策変更後 chunk-policy-7-003 が chunk-run-7 由来か chunk-run-6 かで invalidate/replay 判断。
  includes:
    - zh: 纳入绑定 ChunkingRun、Document 版本与 splitter/processor 配置的 lineage 元数据。
      en: Includes lineage metadata binding ChunkingRun, Document version, and splitter/processor config.
      ja: ChunkingRun/Document 版/splitter/processor 設定 binding lineage metadata。
  excludes:
    - zh: 排除 source/page 显示元数据、SituatedChunk situating_context 与 EmbeddingRun。
      en: Excludes source/page display metadata, SituatedChunk situating_context, and EmbeddingRun.
      ja: source/page 表示 metadata/situating_context/EmbeddingRun を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: chunk-run-7 完成时写入 ChunkProvenance：chunking_run_id=chunk-run-7, document_id=doc-policy, document_version=v7, splitter_config_digest=sha256:sentence-512-64；SituatingPromptRun 产出 SituatedChunk 时 processor_spec_ref 追加到派生 provenance。
    en: On chunk-run-7 completion write ChunkProvenance chunking_run_id=chunk-run-7, document_id=doc-policy, document_version=v7, splitter_config_digest=sha256:sentence-512-64; SituatingPromptRun adds processor_spec_ref to derivation provenance for SituatedChunk.
    ja: chunk-run-7 完了→ChunkProvenance 書込。SituatingPromptRun→SituatedChunk に processor_spec_ref 追加。
  typical_input: []
  typical_output:
    - description: Chunk provenance record
      format: |
        {
          "chunk_id": "chunk-policy-7-003",
          "chunking_run_id": "chunk-run-7",
          "document_id": "doc-policy",
          "document_version": "v7",
          "splitter_config_digest": "sha256:sentence-512-64"
        }
      source_claims: [claim-chunk-provenance-design]
  reference_implementations:
    - name: LlamaIndex SentenceSplitter
      url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
      description: Splitter config in chunking lineage.
    - name: LangChain RecursiveCharacterTextSplitter
      url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
      description: Splitter parameters in chunking runs.
structure:
  identity_keys: [chunk_id]
  fields:
    - id: chunk_id
      labels: {zh: 分块标识, en: Chunk identifier, ja: チャンク ID}
      definitions:
        zh: 所属 Chunk 的 chunk_id。
        en: chunk_id of owning Chunk.
        ja: 所属 Chunk chunk_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-chunk-provenance-id]
    - id: chunking_run_id
      labels: {zh: 分块运行标识, en: Chunking run identifier, ja: チャンク化 run ID}
      definitions:
        zh: 产生此 Chunk 的 ChunkingRun ID。
        en: ChunkingRun ID that produced this Chunk.
        ja: 当 Chunk を生成した ChunkingRun ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-run-7
      allowed_values: []
      source_claims: [claim-chunk-provenance-run]
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: 文書 ID}
      definitions:
        zh: 来源 Document lineage ID。
        en: Source Document lineage ID.
        ja: 源 Document lineage ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: doc-policy
      allowed_values: []
      source_claims: [claim-chunk-provenance-doc]
    - id: document_version
      labels: {zh: 文档版本, en: Document version, ja: 文書版}
      definitions:
        zh: 分块时 pinned 的 Document 版本。
        en: Document version pinned at chunking time.
        ja: chunking 時 pinned Document 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: v7
      allowed_values: []
      source_claims: [claim-chunk-provenance-doc]
    - id: splitter_config_digest
      labels: {zh: 分块器配置摘要, en: Splitter config digest, ja: splitter 設定 digest}
      definitions:
        zh: 产生边界的 splitter 配置 SHA-256，支持重放。
        en: SHA-256 of splitter config producing boundaries for replay support.
        ja: 境界生成 splitter 設定 SHA-256。replay 用。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:sentence-512-64
      allowed_values: []
      source_claims: [claim-chunk-provenance-splitter]
  constraints: []
  required_relations: []
examples:
  - id: ChunkProvenance-example-chunking-run
    labels:
      zh: 分块运行溯源
      en: Chunking run provenance
      ja: チャンク化 run 来歴
    descriptions:
      zh: chunk-policy-7-003 ChunkProvenance 记录 chunking_run_id=chunk-run-7, document_id=doc-policy, document_version=v7, splitter SentenceSplitter(512,64) digest。
      en: chunk-policy-7-003 ChunkProvenance records chunking_run_id=chunk-run-7, document_id=doc-policy, document_version=v7, SentenceSplitter(512,64) digest.
      ja: chunk-policy-7-003 provenance：chunk-run-7/doc-policy/v7/SentenceSplitter digest。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
      version: SentenceSplitter lineage
    field_values:
      chunk_id: chunk-policy-7-003
      chunking_run_id: chunk-run-7
      document_id: doc-policy
      document_version: v7
    related_node_ids:
      - ChunkProvenance
      - ChunkingRun
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-provenance-llamaindex
      - claim-chunk-provenance-design
  - id: ChunkProvenance-example-strategy-change
    labels:
      zh: 策略变更溯源
      en: Strategy change provenance
      ja: 方策変更来歴
    descriptions:
      zh: doc-policy v8 重分块产生 chunk-run-8；chunk-policy-8-003 的 splitter_config_digest 不同于 chunk-run-7，可判定 invalidate v7 chunks。
      en: doc-policy v8 rechunk produces chunk-run-8; chunk-policy-8-003 splitter_config_digest differs from chunk-run-7 enabling v7 chunk invalidation decision.
      ja: v8 rechunk→chunk-run-8。splitter digest 差で v7 chunk invalidate 判断可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: invalidation lineage
    field_values:
      chunking_run_id: chunk-run-8
      document_version: v8
      splitter_config_digest: sha256:sentence-1024-128
    related_node_ids:
      - ChunkProvenance
      - ChunkMetadata
    related_relation_ids: []
    source_claims:
      - claim-chunk-provenance-design
  - id: ChunkProvenance-example-not-display-metadata
    labels:
      zh: 溯源非显示元数据
      en: Provenance is not display metadata
      ja: 来歴は表示 metadata ではない
    descriptions:
      zh: ChunkMetadata source=policy.pdf page=2 供显示与 filter；ChunkProvenance chunking_run_id 供 lineage 审计，二者并存不合并。
      en: ChunkMetadata source=policy.pdf page=2 serves display and filter; ChunkProvenance chunking_run_id serves lineage audit; both coexist without merge.
      ja: ChunkMetadata=表示/filter。ChunkProvenance=lineage 監査。併存・merge 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkProvenance
      - ChunkMetadata
    related_relation_ids: []
    source_claims:
      - claim-chunk-provenance-design
parent_relation:
  id: ChunkProvenance-is_a-ChunkMetadata
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种分块元数据
    en: is chunk metadata
    ja: チャンク metadata の一種
  definitions:
    zh: ChunkProvenance —is_a→ ChunkMetadata 因为它专司 lineage 字段而非 source/page 显示属性。
    en: ChunkProvenance —is_a→ ChunkMetadata because it specializes lineage fields not source/page display attributes.
    ja: ChunkProvenance —is_a→ ChunkMetadata は lineage 専用で source/page 表示属性非のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: ChunkProvenance-is_a-ChunkMetadata-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when record includes chunking_run_id and document version lineage fields.
      explanations:
        zh: 仅当满足溯源种差时建立该边。
        en: Assert only when provenance differentia holds.
        ja: provenance 種差成立時のみ assert。
      source_claims: [claim-chunk-provenance-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-provenance-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-llamaindex-splitter
    title: LlamaIndex SentenceSplitter
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
    source_type: official-doc
    relevance: Splitter configuration in chunking lineage.
  - id: src-langchain-splitter
    title: LangChain RecursiveCharacterTextSplitter
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
    source_type: official-doc
    relevance: Splitter parameters recorded in runs.
  - id: src-chunk-provenance-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ChunkProvenance lineage versus display metadata.
source_claims:
  - id: claim-chunk-provenance-llamaindex
    source: src-llamaindex-splitter
    supports: LlamaIndex chunking runs apply recorded splitter configuration producing traceable chunk boundaries.
    locator: SentenceSplitter
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-provenance-design
    source: src-chunk-provenance-design
    supports: ChunkProvenance records chunking_run_id, document version, and splitter digest for lineage audit distinct from display metadata.
    locator: ChunkProvenance boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-provenance-id
    source: src-chunk-provenance-design
    supports: chunk_id links provenance to Chunk.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-provenance-run
    source: src-chunk-provenance-design
    supports: chunking_run_id identifies producing ChunkingRun.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-provenance-doc
    source: src-chunk-provenance-design
    supports: document_id and document_version pin source document at chunking time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-provenance-splitter
    source: src-chunk-provenance-design
    supports: splitter_config_digest enables boundary replay and invalidation decisions.
    locator: structure
    evidence_kind: design-inference
    confidence: high
