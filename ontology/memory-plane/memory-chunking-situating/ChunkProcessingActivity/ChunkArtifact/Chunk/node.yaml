schema: moonweave.ai/ontology-node/v1
id: Chunk
kind: concept
status: accepted
labels:
  zh: 分块
  en: chunk
  ja: チャンク
semantics:
  short_definition:
    zh: 从一个已标识来源中切出的、可独立寻址并保留精确来源边界的 ChunkArtifact。
    en: A ChunkArtifact cut from an identified source, independently addressable, and anchored to an exact source boundary.
    ja: 識別済み出典から切り出され、独立にアドレス可能で正確な出典境界を保持する ChunkArtifact です。
  definition:
    zh: Chunk 是一种 ChunkArtifact；它继承 artifact_id 与 artifact_version 的稳定身份，并以来源内 ordinal 作为分块种差，把文档、消息、工具输出或 MemoryItem 的一段连续或语义闭合内容，与确定的来源版本、起止边界和内容摘要绑定。它可被索引、检索和装配，但不是切分活动、边界参数或任意复制的文本片段。
    en: A Chunk is a ChunkArtifact that inherits stable artifact_id and artifact_version identity and adds a source-local ordinal as its distinguishing position. It binds a contiguous or semantically closed segment of a document, message, tool output, or MemoryItem to a specific source version, start/end boundary, and content digest. It can be indexed, retrieved, and assembled, but is not the splitting activity, a boundary parameter, or an arbitrary copied excerpt.
    ja: Chunk は ChunkArtifact の一種で、安定した artifact_id・artifact_version 同一性を継承し、出典内 ordinal を chunk の種差として加えます。文書・メッセージ・ツール出力・MemoryItem の連続または意味的に閉じた区間を特定出典版・開始終了境界・内容digestへ結び付け、索引・検索・組立対象ですが分割活動・境界パラメータ・任意コピー文ではありません。
  why_needed:
    zh: 把可检索内容建模为有身份的分块，才能在重切分、重嵌入或压缩后比较版本，并沿精确边界回到原文，而不是把向量索引里的字符串误当作无来源事实。
    en: Giving retrievable content chunk identity enables version comparison after re-splitting, re-embedding, or compression and preserves exact return-to-source boundaries instead of treating index strings as source-free facts.
    ja: 検索内容にchunk同一性を与えることで、再分割・再embedding・圧縮後の版比較と正確な原文復帰が可能になり、索引文字列を出典なし事実と誤認しません。
  includes:
    - zh: 纳入 chunk-policy-7-003 这类具有 chunk_id、来源文档版本、ordinal、起止偏移和内容摘要，并可独立进入检索索引的有界片段。
      en: Includes bounded segments such as chunk-policy-7-003 with chunk ID, source-document version, ordinal, start/end offsets, content digest, and independent indexability.
      ja: chunk ID、出典文書版、ordinal、開始終了offset、内容digestを持ち、独立に索引化できる chunk-policy-7-003 のような境界付き区間を含みます。
  excludes:
    - zh: 排除 ChunkingRun、chunk_size/overlap 参数、ChunkMetadata、只给 URL 的 ChunkReference，以及没有稳定 ID 与来源边界的临时复制文本。
      en: Excludes ChunkingRun, chunk-size or overlap parameters, ChunkMetadata, a ChunkReference containing only a URL, and temporary copied text lacking stable identity and source boundaries.
      ja: ChunkingRun、chunk_size／overlap parameter、ChunkMetadata、URLだけの ChunkReference、安定IDと出典境界を欠く一時コピー文を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: ordinal
      labels:
        zh: 分块序号
        en: ordinal
        ja: チャンク順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 分块在来源文档中的零基顺序位置。
        en: Zero-based order of the chunk in its source document.
        ja: 出典文書内でのゼロ始まりのチャンク順序です。
      allowed_values: []
      pattern: null
      example_value: 4
      source_claims:
        - claim-chunk-003
  constraints:
    - id: chunk-source-span-required
      severity: error
      expression_language: plain
      expression: the chunk boundary resolves to a non-empty span in exactly one source document version
      explanations:
        zh: 分块边界必须解析到一个来源文档版本中的非空区间。
        en: The chunk boundary resolves to a non-empty span in exactly one source-document version.
        ja: チャンク境界は一つの出典文書バージョン内の空でない範囲へ解決されます。
      source_claims:
        - claim-chunk-004
  required_relation_constraints:
    - id: chunk-derived-from-document
      direction: outgoing
      predicate: chunk_derived_from_document
      target_concept_id: Document
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 分块必须能追溯到被切分的来源文档。
        en: A chunk is traceable to the source document from which it was segmented.
        ja: チャンクは分割元の出典文書まで追跡できます。
      source_claims:
        - claim-chunk-005
examples:
  - id: Chunk-example-positive-001
    kind: positive
    labels:
      zh: 分块正例
      en: Positive example of chunk
      ja: チャンクの正例
    scenario_id: null
    descriptions:
      zh: chunk-policy-7-003 是 doc-policy/v7 中 ordinal=2（零基第 3 段）的分块，覆盖字符 1600–2399；若 splitter 配置了 overlap，相邻块可在 overlap_size 区间共享字符，内容摘要为 sha256:8f…；它以独立 chunk_id 进入索引并保留到 source-span-policy-12 的引用。
      en: chunk-policy-7-003 is the third segment of doc-policy/v7 at zero-based ordinal 2, covering characters 1600–2399; when the splitter records chunk_overlap, adjacent chunks may share characters in the overlap_size band. Content digest is sha256:8f…. It enters the index under its own chunk ID and retains a reference to source-span-policy-12.
      ja: chunk-policy-7-003 は doc-policy/v7 の第3chunkで、隣接chunkとcore範囲が重ならない文字1600–2399を覆い、内容digestはsha256:8f…です。独自chunk_idで索引に入り source-span-policy-12 への参照を保持します。
    field_values:
      artifact_id: chunk-artifact:policy-7-003
      artifact_version: "1"
      producing_activity_ref: chunk-processing-activity:chunk-run-81
      source_version_ref: document:doc-policy@7
      source_span:
        unit: character
        start: 1600
        end_exclusive: 2400
      content_digest: sha256:8f61a1
      generated_at: 2026-07-17T01:10:00Z
      ordinal: 2
    related_node_ids:
      - Chunk
      - Document
    related_relation_ids:
      - chunk_derived_from_document
    expected_result:
      zh: 该运行可查询 Chunk 以及方向保持不变的事实 chunk_derived_from_document。
      en: The run can query Chunk together with direction-preserving fact chunk_derived_from_document.
      ja: この実行では Chunk と方向を保持した事実 chunk_derived_from_document を共に照会できます。
    why_valid_or_invalid:
      zh: 稳定 ID、来源内顺序、确定来源版本和精确跨度共同给出分块身份；该对象是可检索信息产物，而不是生成它的分块运行。
      en: Stable ID, source-local order, specific source version, and exact span jointly establish Chunk identity. The object is a retrievable information artifact, not the run that generated it.
      ja: 安定ID、出典内順序、特定出典版、正確な範囲がChunk同一性を成立させます。検索可能な情報成果物であり、生成runではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-006
      - claim-chunk-007
  - id: Chunk-example-boundary-001
    kind: boundary
    labels:
      zh: 分块边界例
      en: Boundary case for chunk
      ja: チャンクの境界例
    scenario_id: null
    descriptions:
      zh: 操作者把政策第 4.2 节复制到临时笔记中；该文本没有 chunk_id、来源版本、ordinal、起止边界或内容摘要。它虽是原文片段，却只是未受管复制文本，不能作为 Chunk 进入索引。
      en: An operator copies policy section 4.2 into a scratch note. The text has no chunk ID, source version, ordinal, start/end boundary, or digest. Although it is an excerpt, it is unmanaged copied text and cannot enter the index as a Chunk.
      ja: 操作者が方針4.2節を一時noteへcopyしますが、chunk_id、出典版、ordinal、開始終了境界、digestがありません。原文断片でも未管理copy文であり、Chunkとして索引へ入れません。
    field_values: {}
    related_node_ids:
      - Chunk
      - Document
      - ChunkArtifact
    related_relation_ids:
      - chunk_derived_from_document
    expected_result:
      zh: 验证器拒绝把无身份、无来源边界的复制文本分类为 Chunk；补齐这些条件前只能作为临时内容处理。
      en: Validation rejects copied text lacking identity and source boundaries as a Chunk; it remains transient content until those conditions are supplied.
      ja: 同一性と出典境界を欠くcopy文をChunkに分類せず、条件が揃うまで一時内容として扱います。
    why_valid_or_invalid:
      zh: “是一段文本”不足以形成 Chunk；可重复寻址、版本化来源和精确边界才是该概念区别于普通摘抄的身份条件。
      en: Being a text segment is insufficient. Repeatable addressing, versioned provenance, and exact boundaries distinguish a Chunk from an ordinary excerpt.
      ja: 単なる文断片では不十分で、反復可能なaddress、版付き来歴、正確な境界が通常抜粋との同一性差です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-008
      - claim-chunk-009
  - id: Chunk-example-instance-001
    kind: instance
    labels:
      zh: 分块结构化实例
      en: Structured instance of chunk
      ja: チャンクの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 chunk-doc-001-04 表示 doc-001 当前版本中的第 4 个可寻址片段；chunk_id 在索引与引用中保持稳定，ordinal 只表达该来源版本内的顺序。
      en: The node-local instance chunk-doc-001-04 denotes the fourth addressable segment of the current doc-001 version. chunk_id remains stable in indexes and references, while ordinal expresses order only within that source version.
      ja: ノード内instance chunk-doc-001-04 は現doc-001版の第4アドレス可能区間です。chunk_idは索引・参照で安定し、ordinalはその出典版内順序だけを表します。
    field_values:
      chunk_id: chunk-doc-001-04
      ordinal: 4
    related_node_ids:
      - Chunk
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 两个字段分别承担全局可寻址身份与来源内排序，互不替代；来源版本和精确跨度继续由关系与 ChunkMetadata 说明。
      en: The two fields separately carry globally addressable identity and source-local ordering and are not interchangeable; source version and exact span remain expressed by relations and ChunkMetadata.
      ja: 二項目はglobal address可能同一性と出典内順序を別々に担い代替不能です。出典版と正確な範囲は関係・ChunkMetadataで表します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-010
      - claim-chunk-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Chunk-is_a-ChunkArtifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 每个 Chunk 都是 ChunkArtifact；其种差是它以 chunk_id 和来源内序号标识，并保留一段来源内容的确切版本、边界与摘要，可被独立索引和检索。
    en: Every Chunk is a ChunkArtifact distinguished by chunk ID and source-local ordinal, preserving an exact source version, boundary, and digest for independently indexable and retrievable content.
    ja: すべての Chunk は ChunkArtifact で、chunk_id と出典内ordinalにより識別され、独立索引・検索可能な内容の正確な出典版・境界・digestを保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Chunk-is_a-ChunkArtifact-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: "Positive case: is a"
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: chunk-003 具有稳定 ID、ordinal=3、doc/v7 范围和摘要，因此继承 ChunkArtifact。
        en: chunk-003 has stable ID, ordinal 3, a doc/v7 extent, and a digest, so it inherits ChunkArtifact.
        ja: chunk-003 は安定ID、ordinal=3、doc/v7範囲、digestを持つため ChunkArtifact を継承します。
      field_values: {}
      related_node_ids:
        - Chunk
        - ChunkArtifact
      related_relation_ids:
        - Chunk-is_a-ChunkArtifact
      expected_result:
        zh: 分类查询从 Chunk 上溯到 ChunkArtifact。
        en: Taxonomy traversal ascends from Chunk to ChunkArtifact.
        ja: 分類照会は Chunk から ChunkArtifact へ上がります。
      why_valid_or_invalid:
        zh: 它满足产物身份并增加可独立寻址的来源跨度种差。
        en: It satisfies artifact identity and adds the independently addressable source-span differentia.
        ja: 成果物同一性を満たし独立アドレス可能な出典範囲の種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-chunk-012
    - id: Chunk-is_a-ChunkArtifact-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: "Boundary case: is a"
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: chunk-run-81 产生分块但具有开始结束时间和执行状态，是活动而非 ChunkArtifact。
        en: chunk-run-81 produces chunks but has an interval and execution status, making it an activity rather than a ChunkArtifact.
        ja: chunk-run-81 はチャンクを生成しますが時間区間と実行状態を持つ活動で ChunkArtifact ではありません。
      field_values: {}
      related_node_ids:
        - Chunk
        - ChunkArtifact
      related_relation_ids:
        - Chunk-is_a-ChunkArtifact
      expected_result:
        zh: 不得把 ChunkingRun 归入 ChunkArtifact。
        en: ChunkingRun is not classified as ChunkArtifact.
        ja: ChunkingRun を ChunkArtifact に分類しません。
      why_valid_or_invalid:
        zh: 产物与生成活动具有不同持续条件。
        en: An artifact and its generating activity have different persistence conditions.
        ja: 成果物と生成活動は異なる持続条件を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-chunk-013
  source_claims:
    - claim-chunk-014
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: chunk_derived_from_document
    predicate: chunk_derived_from_document
    direction: source-to-target
    relation_kind: information
    labels:
      zh: chunk derived from document
      en: chunk derived from document
      ja: chunk derived from document
    definitions:
      zh: chunk_derived_from_document 将一个 Chunk 指向其切分来源的确切 Document 版本；该边断言分块正文与边界来自该文档，而不是断言 Chunk 是 Document 的组成类或当前仍存于同一后端。
      en: chunk_derived_from_document links a Chunk to the exact Document version from which its body and boundaries were segmented. It does not make Chunk a Document subtype or assert that both remain in the same backend.
      ja: chunk_derived_from_document は Chunk を本文と境界の切分元である正確な Document 版へ結びます。Chunk を Document 下位型にしたり同一backend保存を主張したりしません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_target_of_chunk_derived_from_document
      labels:
        zh: 反向：chunk derived from document
        en: is target of chunk derived from document
        ja: 逆方向：chunk derived from document
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: chunk_derived_from_document-example-positive-001
        kind: positive
        labels:
          zh: chunk derived from document正例
          en: "Positive case: chunk derived from document"
          ja: chunk derived from documentの正例
        scenario_id: null
        descriptions:
          zh: chunk-policy-7-003 保存 doc-policy/v7 的字符 1600–2399 与摘要，因此沿该边回到 doc-policy/v7。
          en: chunk-policy-7-003 stores characters 1600–2399 and a digest from doc-policy/v7, so this edge resolves to doc-policy/v7.
          ja: chunk-policy-7-003 は doc-policy/v7 の文字1600–2399とdigestを保持するため、この辺は doc-policy/v7 へ解決します。
        field_values: {}
        related_node_ids:
          - Chunk
          - Document
        related_relation_ids:
          - chunk_derived_from_document
        expected_result:
          zh: 查询返回唯一来源文档版本及分块跨度。
          en: The query returns one source-document version and the chunk span.
          ja: 照会は一つの出典文書版とチャンク範囲を返します。
        why_valid_or_invalid:
          zh: 分块运行、版本、起止偏移与内容摘要共同验证派生。
          en: The chunking run, version, offsets, and digest jointly verify derivation.
          ja: 分割実行・版・offset・digestが派生を共同検証します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-chunk-015
      - id: chunk_derived_from_document-example-boundary-001
        kind: boundary
        labels:
          zh: chunk derived from document边界例
          en: "Boundary case: chunk derived from document"
          ja: chunk derived from documentの境界例
        scenario_id: null
        descriptions:
          zh: scratch-note 复制了政策句子却没有文档版本或边界，不能仅凭文字相似建立该边。
          en: scratch-note copies a policy sentence but has no document version or boundary, so textual similarity alone cannot create this edge.
          ja: scratch-note は方針文を複写しますが文書版と境界がなく、文字類似だけでこの辺を作れません。
        field_values: {}
        related_node_ids:
          - Chunk
          - Document
        related_relation_ids:
          - chunk_derived_from_document
        expected_result:
          zh: 缺少来源锚点时拒绝派生事实。
          en: The derivation fact is rejected without a source anchor.
          ja: 出典アンカーがなければ派生事実を拒否します。
        why_valid_or_invalid:
          zh: 复制相似不证明由哪一版文档切分。
          en: Copy similarity does not prove which document version was segmented.
          ja: 複写類似はどの文書版から切分したかを証明しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-chunk-016
    source_claims:
      - claim-chunk-017
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Document
  - id: chunk_has_provenance
    predicate: chunk_has_provenance
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: chunk has provenance
      en: chunk has provenance
      ja: chunk has provenance
    definitions:
      zh: chunk_has_provenance 把 Chunk 与记录其生成链的 ChunkProvenance 绑定；来历必须按顺序列出来源版本和处理活动，不能用单个 URL、创建者姓名或时间戳替代。
      en: chunk_has_provenance binds a Chunk to ChunkProvenance that orders its source versions and generating activities. A lone URL, creator name, or timestamp is not sufficient lineage.
      ja: chunk_has_provenance は Chunk を出典版と生成活動を順序付ける ChunkProvenance へ結びます。単一URL・作成者名・時刻だけでは来歴になりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_chunk_has_provenance
      labels:
        zh: 反向：chunk has provenance
        en: is target of chunk has provenance
        ja: 逆方向：chunk has provenance
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: chunk_has_provenance-example-positive-001
        kind: positive
        labels:
          zh: chunk has provenance正例
          en: "Positive case: chunk has provenance"
          ja: chunk has provenanceの正例
        scenario_id: null
        descriptions:
          zh: chunk-84 的 lineage-84 依次记录 doc/v7、ingest-77、chunk-run-81 与 situate-run-84。
          en: lineage-84 for chunk-84 orders doc/v7, ingest-77, chunk-run-81, and situate-run-84.
          ja: chunk-84 の lineage-84 は doc/v7、ingest-77、chunk-run-81、situate-run-84 を順に記録します。
        field_values: {}
