source_claims:
  - id: claim-chunk-001
    source: eng-fw-langchain-text-splitters
    supports: LangChain documents text splitters that break large documents into individually retrievable chunks and shows RecursiveCharacterTextSplitter configured by chunk_size and chunk_overlap. This supports Chunk's operational granularity; stable ID, source-local order, exact versioned span, digest, semantic kind, and hierarchy are Moonweave design inference.
    locator: Text splitter integrations > Overview > individually retrievable chunks; Text structure-based > chunk_size and chunk_overlap
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-002
    source: eng-fw-llamaindex-node-parsers
    supports: At Node Parser Usage Pattern > Document-to-Node abstraction, LlamaIndex states that parsers take Documents and chunk them into Node objects, each a specific chunk of its parent Document. This is direct operational evidence for Chunk; its stable ID, exact source-version span, digest, owner, semantic kind, and ontology placement remain Moonweave design inference.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-003
    source: eng-fw-llamaindex-node-parsers
    supports: "Direct source premise: LlamaIndex node parsers emit multiple Node objects, each a specific chunk of one parent Document. Moonweave design inference: ordinal records a zero-based source-local order as Chunk differentia; the page does not prescribe this field or its cardinality."
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-004
    source: eng-fw-llamaindex-node-parsers
    supports: Chunk constraint chunk-source-span-required strengthens LlamaIndex's parent-Document binding into one non-empty, versioned source span. The official page does not require exact offsets, one-version resolution, or this validation severity; those are Moonweave design inference.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > specific chunk of the parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-005
    source: eng-fw-llamaindex-node-parsers
    supports: Chunk required relation chunk_derived_from_document operationalizes LlamaIndex's explicit statement that each Node is a chunk of its parent Document. The predicate name, exact cardinality, version resolution, and ontology constraint are Moonweave design inference rather than assertions in the source.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-006
    source: eng-fw-langchain-text-splitters
    supports: Chunk-example-positive-001 uses LangChain's documented RecursiveCharacterTextSplitter, whose example configures chunk_size and chunk_overlap and splits a document into smaller chunks. Stable identity, ordinal, exact source bounds, digest, and Chunk classification are Moonweave design inference.
    locator: Text splitter integrations > Text structure-based > RecursiveCharacterTextSplitter chunk_size and chunk_overlap
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-007
    source: eng-fw-llamaindex-node-parsers
    supports: The documented Document-to-Node operation supports Chunk-example-positive-001 as a source-bound chunk output. The specific chunk-policy-7-003 identity, ordinal, exact span, digest, and classification as Chunk are Moonweave design inference rather than fields required by LlamaIndex.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-008
    source: eng-fw-langchain-text-splitters
    supports: Chunk-example-boundary-001 is outside the managed Chunk class because LangChain documents a configured splitting operation that produces individually retrievable chunks, not arbitrary copied text. Generated identity and source-version bounds are additional Moonweave design inference; the page does not define them.
    locator: Text splitter integrations > Overview > large documents broken into individually retrievable chunks
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-009
    source: eng-fw-llamaindex-node-parsers
    supports: Chunk-example-boundary-001 is excluded because LlamaIndex's documented Node is produced by parsing a parent Document and inherits that Document's attributes, whereas an arbitrary scratch-note excerpt has no such production or parent binding. Moonweave additionally requires stable identity and exact source-version span; LlamaIndex does not define those ontology constraints.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > parent Document and inherited child attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-010
    source: eng-fw-langchain-text-splitters
    supports: Chunk-example-instance-001 follows LangChain's configured RecursiveCharacterTextSplitter operation that yields smaller text chunks. chunk_id, source-local ordinal, exact bounds, and persistence are Moonweave design inference; the source does not define an ordered managed-object schema.
    locator: Text splitter integrations > Text structure-based > RecursiveCharacterTextSplitter example usage
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-chunk-011
    source: eng-fw-llamaindex-node-parsers
    supports: Chunk-example-instance-001 follows the documented SentenceSplitter.get_nodes_from_documents operation that emits Nodes from Documents. chunk_id and ordinal are Moonweave identity and ordering fields; the cited usage example does not prescribe those fields or the instance's ontology classification.
    locator: Node Parser Usage Pattern > Standalone Usage > SentenceSplitter and get_nodes_from_documents
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
