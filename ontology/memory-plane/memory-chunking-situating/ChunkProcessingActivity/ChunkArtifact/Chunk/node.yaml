schema: moonweave.ai/ontology-node/v1
id: Chunk
kind: concept
labels:
  zh: 分块
  en: Chunk
  ja: チャンク
semantics:
  short_definition:
    zh: 带来源跨度的基础片段 ChunkArtifact。
    en: Base fragment ChunkArtifact with source span provenance.
    ja: source span 来歴付き base fragment ChunkArtifact。
  definition:
    zh: Chunk 是 ChunkArtifact 子类，携带 SourceSpan（字符/token 边界）绑定 pinned Document 版本与 source_body_sha256。LangChain Document chunk（page_content + metadata source/page/start_index）与 LlamaIndex TextNode 映射 Chunk；不是 ChunkingRun 或 SituatedChunk。
    en: Chunk is ChunkArtifact subtype carrying SourceSpan (char/token boundaries) binding pinned Document version and source_body_sha256. LangChain Document chunk (page_content + metadata source/page/start_index) and LlamaIndex TextNode map to Chunk—not ChunkingRun or SituatedChunk.
    ja: Chunk は SourceSpan（文字/token 境界）+pinned Document 版+source_body_sha256 binding の ChunkArtifact subtype。LangChain Document chunk/LlamaIndex TextNode→Chunk。
  why_needed:
    zh: 没有 SourceSpan 绑定，检索返回的孤立句子无法定位 policy.pdf 第几页，EmbeddingRun 也无法 pin input digest。
    en: Without SourceSpan binding, isolated retrieval sentences cannot locate page N of policy.pdf and EmbeddingRun cannot pin input digest.
    ja: SourceSpan なしでは policy.pdf ページ特定不可、EmbeddingRun input digest pin 不可。
  includes:
    - zh: 纳入具 chunk_id、SourceSpan 与 ChunkMetadata 的基础片段。
      en: Includes base fragments with chunk_id, SourceSpan, and ChunkMetadata.
      ja: chunk_id/SourceSpan/ChunkMetadata 付き base fragment。
  excludes:
    - zh: 排除 SituatedChunk、ChunkingRun 与无 SourceSpan 的复制文本。
      en: Excludes SituatedChunk, ChunkingRun, and copied text without SourceSpan.
      ja: SituatedChunk/ChunkingRun/SourceSpan なしコピー文本を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain metadata={source, page, start_index} 与 LlamaIndex start_char_idx/end_char_idx 写 SourceSpan；Moonweave chunk_id=chunk-policy-7-003 复合 document_id+version+序号；EmbeddingRun consumes Chunk 时 input_digest 覆盖 source_body_sha256。
    en: LangChain metadata={source, page, start_index} and LlamaIndex start_char_idx/end_char_idx write SourceSpan; Moonweave chunk_id=chunk-policy-7-003 composes document_id+version+sequence; EmbeddingRun consumes Chunk with input_digest covering source_body_sha256.
    ja: LangChain/LlamaIndex metadata→SourceSpan。chunk_id 命名規則。EmbeddingRun consumes→input_digest=source_body_sha256。
  typical_input:
    - description: LangChain Document chunk
      format: |
        Document(
          page_content="JWT bearer tokens expire after 7 days.",
          metadata={"source": "policy.pdf", "page": 2, "start_index": 1600}
        )
      source_claims: [claim-chunk-langchain]
    - description: LlamaIndex TextNode
      format: |
        TextNode(text="...", start_char_idx=1600, end_char_idx=2400, metadata={"source": "policy.pdf"})
      source_claims: [claim-chunk-llamaindex]
  typical_output:
    - description: Moonweave chunk record
      format: |
        {
          "chunk_id": "chunk-policy-7-003",
          "document_id": "doc-policy",
          "document_version": "v7",
          "source_span": {"start_inclusive": 1600, "end_exclusive": 2400},
          "source_body_sha256": "14a4e908bbb4cc19810928c1308a1b2a521245b676a4a23fb83f461354bbda43"
        }
      source_claims: [claim-chunk-design]
  reference_implementations:
    - name: LangChain Document
      url: https://python.langchain.com/docs/concepts/document/
      description: page_content and metadata for chunks.
    - name: LlamaIndex TextNode
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/documents_and_nodes/root_nodes/
      description: Node text with char indices.
structure:
  identity_keys: [chunk_id]
  fields:
    - id: chunk_id
      labels: {zh: 分块标识, en: Chunk identifier, ja: チャンク ID}
      definitions:
        zh: 唯一标识 Chunk lineage 中的片段。
        en: Uniquely identifies fragment in Chunk lineage.
        ja: Chunk lineage 内 fragment を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-chunk-id]
    - id: source_body_sha256
      labels: {zh: 源文摘要, en: Source body digest, ja: 源文 digest}
      definitions:
        zh: SourceSpan 范围内证据正文的 SHA-256。
        en: SHA-256 of evidentiary body within SourceSpan range.
        ja: SourceSpan 範囲内証拠本文 SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: 14a4e908bbb4cc19810928c1308a1b2a521245b676a4a23fb83f461354bbda43
      allowed_values: []
      source_claims: [claim-chunk-source-digest]
    - id: chunk_text
      labels: {zh: 分块正文, en: Chunk text, ja: チャンク本文}
      definitions:
        zh: 片段证据正文；不含 LLM 生成的 situating context。
        en: Fragment evidence body; excludes LLM-generated situating context.
        ja: fragment 証拠本文。LLM situating context 不含。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: JWT bearer tokens expire after 7 days.
      allowed_values: []
      source_claims: [claim-chunk-design]
  constraints:
    - id: chunk-requires-source-span
      severity: error
      expression_language: plain
      expression: Every Chunk must have ChunkReference or SourceSpan binding to pinned Document version.
      explanation:
        zh: 无跨度绑定无法证明片段来源。
        en: Without span binding fragment provenance cannot be proven.
        ja: span binding なしでは fragment 来歴証明不可。
      source_claims: [claim-chunk-design]
  required_relations: []
examples:
  - id: Chunk-example-langchain
    labels:
      zh: LangChain Document 分块
      en: LangChain Document chunk
      ja: LangChain Document chunk
    descriptions:
      zh: chunk-run-7 产出 Document(page_content, metadata source=policy.pdf page=2 start_index=1600) 登记 chunk-policy-7-003，SourceSpan 1600–2400。
      en: chunk-run-7 produces Document(page_content, metadata source=policy.pdf page=2 start_index=1600) registering chunk-policy-7-003, SourceSpan 1600–2400.
      ja: chunk-run-7→Document→chunk-policy-7-003。SourceSpan 1600–2400。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/concepts/document/
      version: Document metadata
    field_values:
      chunk_id: chunk-policy-7-003
      source_span_start: 1600
      source_span_end_exclusive: 2400
    related_node_ids:
      - Chunk
      - ChunkMetadata
      - ChunkingRun
    related_relation_ids: []
    source_claims:
      - claim-chunk-langchain
      - claim-chunk-design
  - id: Chunk-example-llamaindex
    labels:
      zh: LlamaIndex TextNode 分块
      en: LlamaIndex TextNode chunk
      ja: LlamaIndex TextNode chunk
    descriptions:
      zh: SentenceSplitter 产出 TextNode start_char_idx=1600 end_char_idx=2400，映射 chunk-policy-7-003 含 token_count metadata。
      en: SentenceSplitter produces TextNode start_char_idx=1600 end_char_idx=2400 mapping chunk-policy-7-003 with token_count metadata.
      ja: TextNode 1600–2400→chunk-policy-7-003+token_count metadata。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/module_guides/loading/documents_and_nodes/root_nodes/
      version: TextNode
    field_values:
      chunk_id: chunk-policy-7-003
      start_char_idx: 1600
      end_char_idx: 2400
    related_node_ids:
      - Chunk
      - ChunkMetadata
    related_relation_ids: []
    source_claims:
      - claim-chunk-llamaindex
      - claim-chunk-design
  - id: Chunk-example-not-situated
    labels:
      zh: 分块非 SituatedChunk
      en: Chunk is not SituatedChunk
      ja: Chunk は SituatedChunk ではない
    descriptions:
      zh: situated-policy-7-003/v2 派生自 chunk-policy-7-003 并含 situating_context 分离字段；基础 Chunk 无 situating context。
      en: situated-policy-7-003/v2 derives from chunk-policy-7-003 with separate situating_context field; base Chunk has no situating context.
      ja: situated-policy-7-003/v2 は chunk-policy-7-003 派生+situating_context。base Chunk は situating なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - Chunk
      - SituatedChunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-design
parent_relation:
  id: Chunk-is_a-ChunkArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种分块产物
    en: is a chunk artifact
    ja: チャンク artifact の一種
  definitions:
    zh: Chunk —is_a→ ChunkArtifact 因为它是带 SourceSpan 的基础片段而非派生SituatedChunk。
    en: Chunk —is_a→ ChunkArtifact because it is base fragment with SourceSpan not derived SituatedChunk.
    ja: Chunk —is_a→ ChunkArtifact は SourceSpan 付き base fragment のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: Chunk-is_a-ChunkArtifact-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when fragment has SourceSpan and source_body_sha256 without situating_context as evidence.
      explanations:
        zh: 仅当满足基础分块种差时建立该边。
        en: Assert only when base chunk differentia holds.
        ja: base chunk 種差成立時のみ assert。
      source_claims: [claim-chunk-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-langchain-document
    title: LangChain Document Concept
    publisher: LangChain
    url: https://python.langchain.com/docs/concepts/document/
    source_type: official-doc
    relevance: Document chunks with source metadata.
  - id: src-llamaindex-textnode
    title: LlamaIndex Documents and Nodes
    publisher: LlamaIndex
    url: https://docs.llamaindex.ai/en/stable/module_guides/loading/documents_and_nodes/root_nodes/
    source_type: official-doc
    relevance: TextNode with character indices.
  - id: src-chunk-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Chunk SourceSpan and evidence body requirements.
source_claims:
  - id: claim-chunk-langchain
    source: src-langchain-document
    supports: LangChain Document stores chunk page_content with metadata including source and positional hints.
    locator: Document concept
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-llamaindex
    source: src-llamaindex-textnode
    supports: LlamaIndex TextNode includes text with start_char_idx and end_char_idx for span provenance.
    locator: Root nodes
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-design
    source: src-chunk-design
    supports: Chunk requires SourceSpan binding and source_body_sha256; situating context belongs on SituatedChunk only.
    locator: Chunk boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-id
    source: src-chunk-design
    supports: chunk_id identifies fragment in chunk lineage.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-source-digest
    source: src-chunk-design
    supports: source_body_sha256 pins evidentiary text within SourceSpan.
    locator: structure
    evidence_kind: design-inference
    confidence: high
