source_claims:
  - id: claim-chunk-artifact-001
    source: eng-fw-llamaindex-node-parsers
    supports: LlamaIndex documents Node objects as the outputs produced when a parser chunks Documents. This supplies the operational artifact side of ChunkArtifact; persistence, version identity, digest, exact span, semantic kind, and placement under Moonweave's chunk information hierarchy are design inference not defined by the source.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > parsers chunk Documents into Node objects
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-artifact-002
    source: lit-agent-agemem
    supports: Agentic Memory's store, retrieve, update, summarize, and discard actions operate over memory information. That separation supports a persistent artifact genus distinct from processing activities; the specific ChunkArtifact hierarchy is Moonweave's design inference.
    locator: Paper > Agentic Memory > abstract and memory-management action space
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-artifact-003
    source: eng-fw-llamaindex-node-parsers
    supports: "Direct source premise: LlamaIndex node parsers emit distinct Node objects, each representing a specific chunk of a parent Document, which supports treating each output as an independently addressable ChunkArtifact. Moonweave design inference: ChunkArtifact.artifact_id, together with artifact_version, supplies stable backend-neutral identity across versions; LlamaIndex prescribes neither this field nor its identifier policy."
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of the parent Document
    evidence_kind: design-inference
    confidence: high
    review_status: pending
