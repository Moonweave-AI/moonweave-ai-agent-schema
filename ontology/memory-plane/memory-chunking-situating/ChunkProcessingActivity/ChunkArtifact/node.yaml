schema: moonweave.ai/ontology-node/v1
id: ChunkArtifact
kind: concept
labels:
  zh: 分块产物
  en: Chunk artifact
  ja: チャンク artifact
semantics:
  short_definition:
    zh: 分块处理活动产出的可追溯片段信息类。
    en: Traceable fragment information produced by chunk processing activities.
    ja: chunk processing activity が生成する追跡可能 fragment information 類。
  definition:
    zh: ChunkArtifact 是 ChunkProcessingActivity 产出侧的信息上位类；Chunk 是带 SourceSpan 的基础片段，SituatedChunk 是增添 situating_context 的派生片段。LangChain Document chunk 与 LlamaIndex TextNode 映射 Chunk/SituatedChunk；活动 run 本身不是 ChunkArtifact。
    en: ChunkArtifact is the output-side information genus from ChunkProcessingActivity; Chunk is base fragment with SourceSpan; SituatedChunk is derived fragment adding situating_context. LangChain Document chunk and LlamaIndex TextNode map to Chunk/SituatedChunk; activity runs are not ChunkArtifact.
    ja: ChunkArtifact は ChunkProcessingActivity 出力側 information 上位類。Chunk=SourceSpan 付き base fragment、SituatedChunk=situating_context 付き派生。LangChain Document chunk/LlamaIndex TextNode→Chunk/SituatedChunk。
  why_needed:
    zh: 产物层统一后，EmbeddingRun consumes Chunk 与 RetrievalRun 命中 RetrievedChunk 都指向同一 artifact 谱系而非复制文本。
    en: Unified artifact layer lets EmbeddingRun consumes Chunk and RetrievalRun RetrievedChunk hits point to same artifact lineage not copied text.
    ja: 統一 artifact 層で EmbeddingRun consumes Chunk と RetrievedChunk が同一 lineage 参照。
  includes:
    - zh: 纳入 Chunk、SituatedChunk 及未来具 artifact_version 的片段派生类型。
      en: Includes Chunk, SituatedChunk, and future fragment derivations with artifact_version.
      ja: Chunk/SituatedChunk/artifact_version 付き将来派生型。
  excludes:
    - zh: 排除 ChunkProcessingActivity、ChunkReference 映射边与 ContextPackage。
      en: Excludes ChunkProcessingActivity, ChunkReference mapping edges, and ContextPackage.
      ja: ChunkProcessingActivity/ChunkReference/ContextPackage を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain Document(page_content, metadata) 与 LlamaIndex TextNode(text, metadata) 登记为 ChunkArtifact；metadata 含 source、page、start_char_idx；SituatedChunk 额外字段 situating_context 与 base chunk_id。
    en: LangChain Document(page_content, metadata) and LlamaIndex TextNode(text, metadata) register as ChunkArtifact; metadata includes source, page, start_char_idx; SituatedChunk adds situating_context and base chunk_id fields.
    ja: LangChain Document/LlamaIndex TextNode→ChunkArtifact。metadata=source/page/char offset。SituatedChunk+situating_context。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: LangChain Document
      url: https://python.langchain.com/docs/concepts/document/
      description: page_content and metadata chunk representation.
    - name: LlamaIndex TextNode
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: Text nodes with metadata and relationships.
structure:
  identity_keys: [artifact_id]
  fields:
    - id: artifact_id
      labels: {zh: 产物标识, en: Artifact identifier, ja: artifact ID}
      definitions:
        zh: 唯一标识一个 ChunkArtifact 实例或 lineage 成员。
        en: Uniquely identifies one ChunkArtifact instance or lineage member.
        ja: 一 ChunkArtifact instance/lineage member を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-chunk-artifact-id]
    - id: artifact_version
      labels: {zh: 产物版本, en: Artifact version, ja: artifact 版}
      definitions:
        zh: SituatedChunk 等派生型的版本号；基础 Chunk 可为 v1。
        en: Version for derivations like SituatedChunk; base Chunk may be v1.
        ja: SituatedChunk 等派生の版。base Chunk=v1 可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: v1
      allowed_values: []
      source_claims: [claim-chunk-artifact-version]
  constraints: []
  required_relations: []
examples:
  - id: ChunkArtifact-example-langchain-document
    labels:
      zh: LangChain Document 产物
      en: LangChain Document artifact
      ja: LangChain Document artifact
    descriptions:
      zh: chunk-run-7 产出 LangChain Document chunks，page_content 为片段正文，metadata 含 source 与 start_index；登记为 ChunkArtifact/Chunk。
      en: chunk-run-7 produces LangChain Document chunks with page_content body and metadata source/start_index; registered as ChunkArtifact/Chunk.
      ja: chunk-run-7→LangChain Document（page_content+metadata）→ChunkArtifact/Chunk。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/concepts/document/
      version: Document
    field_values:
      artifact_id: chunk-policy-7-003
      artifact_version: v1
    related_node_ids:
      - ChunkArtifact
      - Chunk
      - ChunkingRun
    related_relation_ids: []
    source_claims:
      - claim-chunk-artifact-langchain
      - claim-chunk-artifact-design
  - id: ChunkArtifact-example-llamaindex-textnode
    labels:
      zh: LlamaIndex TextNode 产物
      en: LlamaIndex TextNode artifact
      ja: LlamaIndex TextNode artifact
    descriptions:
      zh: SentenceSplitter 产出 TextNode 带 text、start_char_idx、source_node metadata；映射 Chunk 含 ChunkMetadata。
      en: SentenceSplitter produces TextNode with text, start_char_idx, source_node metadata; maps to Chunk with ChunkMetadata.
      ja: SentenceSplitter→TextNode（text/start_char_idx/source_node）→Chunk+ChunkMetadata。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: TextNode
    field_values:
      artifact_id: chunk-policy-7-003
    related_node_ids:
      - ChunkArtifact
      - Chunk
      - ChunkMetadata
    related_relation_ids: []
    source_claims:
      - claim-chunk-artifact-llamaindex
      - claim-chunk-artifact-design
  - id: ChunkArtifact-example-not-activity
    labels:
      zh: 产物非活动
      en: Artifact is not activity
      ja: artifact は activity ではない
    descriptions:
      zh: chunk-run-7 是 ChunkProcessingActivity；chunk-policy-7-003 是 ChunkArtifact 持久内容与 SourceSpan。
      en: chunk-run-7 is ChunkProcessingActivity; chunk-policy-7-003 is ChunkArtifact persistent content and SourceSpan.
      ja: chunk-run-7=activity。chunk-policy-7-003=ChunkArtifact 永続内容+SourceSpan。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkArtifact
      - ChunkProcessingActivity
    related_relation_ids: []
    source_claims:
      - claim-chunk-artifact-design
parent_relation:
  id: ChunkProcessingActivity-produces-ChunkArtifact
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 由分块处理活动产出
    en: produced by chunk processing activity
    ja: chunk processing activity により produce
  definitions:
    zh: ChunkProcessingActivity produces ChunkArtifact 表示成功活动新生成可独立标识的片段产物。
    en: ChunkProcessingActivity produces ChunkArtifact means successful activity newly generates independently identifiable fragment artifacts.
    ja: ChunkProcessingActivity produces ChunkArtifact は成功 activity が独立識別可能 fragment artifact を新規生成。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次成功 run 可产出多个 ChunkArtifact。
    en: One successful run may produce many ChunkArtifacts.
    ja: 一成功 run が複数 ChunkArtifact 生成可。
  inverse_reading:
    predicate: produced_by
    labels: {zh: 反向读取, en: inverse produces, ja: 逆方向読取}
  conditions:
    - id: ChunkProcessingActivity-produces-ChunkArtifact-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when outcome=success and artifact derives from run input at pinned version.
      explanations:
        zh: 仅当成功产出新 artifact 时成立。
        en: Assert only when new artifact successfully produced.
        ja: 新 artifact 成功生成時のみ assert。
      source_claims: [claim-chunk-artifact-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunk-artifact-design]
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-langchain-document
    title: LangChain Document Concept
    publisher: LangChain
    url: https://python.langchain.com/docs/concepts/document/
    source_type: official-doc
    relevance: Document as chunk artifact with metadata.
  - id: src-llamaindex-textnode
    title: LlamaIndex Documents and Nodes
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: TextNode chunk representation.
  - id: src-chunk-artifact-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ChunkArtifact as activity output genus.
source_claims:
  - id: claim-chunk-artifact-langchain
    source: src-langchain-document
    supports: LangChain Document combines page_content and metadata as chunk artifact representation.
    locator: Document concept
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-artifact-llamaindex
    source: src-llamaindex-textnode
    supports: LlamaIndex TextNode stores chunk text with metadata and source relationships.
    locator: Root nodes guide
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-artifact-design
    source: src-chunk-artifact-design
    supports: ChunkArtifact is information output from ChunkProcessingActivity distinct from runs.
    locator: ChunkArtifact boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-artifact-id
    source: src-chunk-artifact-design
    supports: artifact_id identifies chunk artifact lineage member.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-artifact-version
    source: src-chunk-artifact-design
    supports: artifact_version distinguishes derivations like SituatedChunk from base Chunk.
    locator: structure
    evidence_kind: design-inference
