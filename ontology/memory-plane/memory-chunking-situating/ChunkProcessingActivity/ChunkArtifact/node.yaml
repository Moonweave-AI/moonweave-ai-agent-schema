schema: moonweave.ai/ontology-node/v1
id: ChunkArtifact
kind: concept
status: review
labels:
  zh: 分块产物
  en: chunk artifact
  ja: チャンク情報成果物
semantics:
  short_definition:
    zh: 由分块处理产生、以来源版本和来源跨度保持可追溯身份的信息产物。
    en: An information artifact produced by chunk processing with traceable identity grounded in source version and source span.
    ja: chunk処理で生成され、出典版と出典範囲に基づく追跡可能な同一性を持つ情報成果物です。
  definition:
    zh: ChunkArtifact 是分块与情境化域的信息产物上位概念；其身份由生成它的 ChunkProcessingActivity、输入来源版本、对应来源跨度、产物版本和内容摘要共同确定。Chunk 是其可直接索引的特化，SituatedChunk 再在 Chunk 上增加可分离的局部语境。附着的 ChunkMetadata 与 ChunkReference 解释产物，但不是该产物本身。
    en: ChunkArtifact is the information-product genus for chunking and situating. Its identity is determined by the producing ChunkProcessingActivity, input source version, corresponding source span, artifact version, and content digest. Chunk is its directly indexable specialization, and SituatedChunk further adds separable local context. Attached ChunkMetadata and ChunkReference explain the artifact but are not the artifact itself.
    ja: ChunkArtifact は分割・位置付け領域の情報成果物上位概念です。生成 ChunkProcessingActivity、入力出典版、対応出典範囲、成果物版、内容digestで同定されます。Chunk は直接索引可能な特化、SituatedChunk はさらに分離可能な局所文脈を加えます。付随する ChunkMetadata と ChunkReference は成果物を説明しますが成果物自体ではありません。
  why_needed:
    zh: 该上位概念把可持久、可版本化的处理产物与产生它们的活动分开，使原始分块、定位分块和压缩后分块能够共享来源与版本不变量。
    en: This genus separates persistent, versionable processing products from the activities that create them and gives raw, situated, and compressed chunks common provenance and version invariants.
    ja: 永続・版管理可能な処理成果物を生成活動から分離し、原chunk、位置付けchunk、圧縮後chunkに共通の来歴・版不変条件を与えます。
  includes:
    - zh: 纳入带来源版本、来源跨度、产物版本和内容摘要的原始 Chunk、SituatedChunk，以及压缩活动产生但仍保持来源锚点的新 Chunk。
      en: Includes raw Chunks, SituatedChunks, and new Chunks produced by compression when they retain source version, source span, artifact version, and content digest.
      ja: 出典版、出典範囲、成果物版、内容digestを保持する原Chunk、SituatedChunk、圧縮活動が生成した新Chunkを含みます。
  excludes:
    - zh: 排除 ChunkProcessingActivity、ChunkingRun、SituatingPromptRun、ChunkCompression，以及仅说明边界、来源或质量的 ChunkMetadata 与 ChunkReference。
      en: Excludes ChunkProcessingActivity, ChunkingRun, SituatingPromptRun, ChunkCompression, and ChunkMetadata or ChunkReference records that only describe boundaries, provenance, or quality.
      ja: ChunkProcessingActivity、ChunkingRun、SituatingPromptRun、ChunkCompression、および境界・来歴・品質だけを記述する ChunkMetadata／ChunkReference を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
    - artifact_version
  fields:
    - id: artifact_id
      labels:
        zh: 分块产物标识
        en: chunk artifact ID
        ja: チャンク成果物 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在版本变化之间稳定标识同一逻辑分块产物。
        en: Stably identifies the same logical chunk artifact across version changes.
        ja: 版変更を跨いで同じ論理チャンク成果物を安定識別します。
      allowed_values: []
      pattern: null
      example_value: chunk-artifact:policy-7:003
      source_claims:
        - claim-chunk-artifact-003
    - id: artifact_version
      labels:
        zh: 分块产物版本
        en: chunk artifact version
        ja: チャンク成果物版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分同一 artifact_id 下由处理方法、来源版本、内容或情境变化形成的不可变版本。
        en: Distinguishes immutable versions under one artifact_id when processing method, source version, content, or situated context changes.
        ja: 処理方式・出典版・内容・位置付け文脈の変化で生じる同一 artifact_id 下の不変版を区別します。
      allowed_values: []
      pattern: null
      example_value: "1"
      source_claims:
        - claim-chunk-artifact-004
    - id: producing_activity_ref
      labels:
        zh: 生成活动引用
        en: producing activity reference
        ja: 生成活動参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际生成该版本的唯一 ChunkProcessingActivity，而不是读取或索引该产物的后续活动。
        en: References the one ChunkProcessingActivity that actually generated this version, not a later activity that read or indexed the artifact.
        ja: この版を実際に生成した唯一の ChunkProcessingActivity を参照し、後に読取・索引した活動とは区別します。
      allowed_values: []
      pattern: null
      example_value: chunk-processing-activity:chunk-run-81
      source_claims:
        - claim-chunk-artifact-005
    - id: source_version_ref
      labels:
        zh: 来源版本引用
        en: source version reference
        ja: 出典版参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被分块的确定来源对象版本；同一文档的新版本不是原产物的隐式替换。
        en: References the determinate version of the source object that was chunked; a later document version is not an implicit replacement for the original artifact.
        ja: 分割された確定出典対象版を参照し、後の文書版を元成果物の暗黙置換としません。
      allowed_values: []
      pattern: null
      example_value: document:doc-policy@7
      source_claims:
        - claim-chunk-artifact-006
    - id: source_span
      labels:
        zh: 来源跨度
        en: source span
        ja: 出典範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以一种已声明定位单位记录该产物对应的非空来源区间，例如字符、字节、token 或结构路径范围。
        en: Records the artifact's non-empty source interval in a declared locator unit such as characters, bytes, tokens, or a structural path range.
        ja: 文字・byte・token・構造 path range など宣言済み位置単位で成果物に対応する空でない出典区間を記録します。
      allowed_values: []
      pattern: null
      example_value:
        unit: character
        start: 1600
        end_exclusive: 2400
      source_claims:
        - claim-chunk-artifact-007
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存规范化产物内容的算法标识与摘要值，用于验证版本内容未被静默改变。
        en: Stores the algorithm identifier and digest of normalized artifact content so a version cannot be silently changed.
        ja: 正規化成果物内容のアルゴリズム識別子とダイジェストを保存し、版内容の無言変更を検出します。
      allowed_values: []
      pattern: ^[A-Za-z0-9_-]+:[A-Fa-f0-9]+$
      example_value: sha256:8d61a1
      source_claims:
        - claim-chunk-artifact-008
    - id: generated_at
      labels:
        zh: 生成时间
        en: generated at
        ja: 生成時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该产物版本通过生成活动开始存在的时间。
        en: Records when this artifact version began to exist through its generation activity.
        ja: 生成活動によりこの成果物版が存在し始めた時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T01:10:00Z
      source_claims:
        - claim-chunk-artifact-009
  constraints:
    - id: chunk-artifact-span-and-digest-integrity
      severity: error
      expression_language: plain
      expression: source_span resolves to one non-empty interval in source_version_ref, content_digest matches the normalized artifact content, and changing source version, span, content, or producing derivation requires a new artifact_version
      explanations:
        zh: 来源跨度必须解析到唯一来源版本中的非空区间，摘要必须匹配本版本内容；来源、跨度、内容或生成推导发生变化时必须创建新版本。
        en: The span resolves to one non-empty interval in the pinned source version and the digest matches this version's content. A changed source, span, content, or derivation requires a new artifact version.
        ja: 範囲は固定出典版内の一つの空でない区間へ解決し、digest は本版内容と一致します。出典・範囲・内容・導出変更には新成果物版が必要です。
      source_claims:
        - claim-chunk-artifact-010
  required_relation_constraints: []
examples:
  - id: ChunkArtifact-example-positive-001
    kind: positive
    labels:
      zh: 分块产物正例
      en: Positive example of chunk artifact
      ja: チャンク情報成果物の正例
    scenario_id: null
    descriptions:
      zh: chunk-policy-7-003/v1 是 chunk-run-81 从 doc-policy/v7 字符 1600–2399 产生的信息产物；它具有产物版本和内容摘要，并在运行结束后继续存在，可随后被定位、压缩、索引或引用。
      en: chunk-policy-7-003/v1 is an information artifact produced by chunk-run-81 from characters 1600–2399 of doc-policy/v7. It has an artifact version and content digest, persists after the run, and can later be situated, compressed, indexed, or referenced.
      ja: chunk-policy-7-003/v1 は chunk-run-81 が doc-policy/v7 の文字1600–2399から生成した情報成果物です。成果物版と内容digestを持ち、run終了後も存在し、後で位置付け・圧縮・索引・参照できます。
    field_values:
      artifact_id: chunk-artifact:policy-7:003
      artifact_version: "1"
      producing_activity_ref: chunk-processing-activity:chunk-run-81
      source_version_ref: document:doc-policy@7
      source_span:
        unit: character
        start: 1600
        end_exclusive: 2400
      content_digest: sha256:8d61a1
      generated_at: 2026-07-17T01:10:00Z
    related_node_ids:
      - ChunkArtifact
      - Chunk
    related_relation_ids:
      - Chunk-is_a-ChunkArtifact
    expected_result:
      zh: 该运行可查询 ChunkArtifact 以及方向保持不变的事实 Chunk-is_a-ChunkArtifact。
      en: The run can query ChunkArtifact together with direction-preserving fact Chunk-is_a-ChunkArtifact.
      ja: この実行では ChunkArtifact と方向を保持した事実 Chunk-is_a-ChunkArtifact を共に照会できます。
    why_valid_or_invalid:
      zh: 该对象是处理活动留下的版本化信息结果，并以输入版本和来源跨度保持可追溯身份；这正是 ChunkArtifact 与瞬时运行状态的界线。
      en: The object is a versioned information result left by a processing activity and retains traceable identity through input version and source span, which is the boundary between ChunkArtifact and transient run state.
      ja: 処理活動が残す版付き情報結果で、入力版と出典範囲により追跡可能な同一性を保ち、ChunkArtifactと一時run状態を区別します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-artifact-011
      - claim-chunk-artifact-012
  - id: ChunkArtifact-example-boundary-001
    kind: boundary
    labels:
      zh: 分块产物边界例
      en: Boundary case for chunk artifact
      ja: チャンク情報成果物の境界例
    scenario_id: null
    descriptions:
      zh: chunk-run-81 有 run_id、输入版本、splitter 参数、开始结束时间和结果状态，并产生 37 个 Chunk；它在执行结束后不作为可检索内容存在，因此是 ChunkProcessingActivity，而不是 ChunkArtifact。
      en: chunk-run-81 has a run ID, input version, splitter parameters, start/end time, and result status and produces 37 Chunks. It does not persist as retrievable content after execution and is a ChunkProcessingActivity, not a ChunkArtifact.
      ja: chunk-run-81 はrun_id、入力版、splitter parameter、開始終了時刻、結果状態を持ち37 Chunkを生成します。実行後に検索内容として残らないため ChunkProcessingActivity であり ChunkArtifact ではありません。
    field_values: {}
    related_node_ids:
      - ChunkArtifact
      - ChunkingRun
      - Chunk
    related_relation_ids:
      - ChunkingRun-produces-Chunk
    expected_result:
      zh: chunk-run-81 保持活动类型；它产生 ChunkArtifact，并不因此成为自己的产物。
      en: chunk-run-81 remains an activity; producing a ChunkArtifact does not make the run its own product.
      ja: chunk-run-81 は活動型を保ち、ChunkArtifactを生成しても自らが成果物にはなりません。
    why_valid_or_invalid:
      zh: 活动以执行时间和状态为身份，产物以来源跨度、版本和摘要为身份；因果相连不消除 activity/information 的本体差异。
      en: An activity is identified by execution interval and status, while an artifact is identified by source span, version, and digest. Causal connection does not erase the activity-information distinction.
      ja: 活動は実行区間・状態で、成果物は出典範囲・版・digestで同定され、因果接続はactivity/information差を消しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-artifact-013
      - claim-chunk-artifact-014
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ChunkProcessingActivity-produces-ChunkArtifact
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 产生分块产物
    en: produces
    ja: chunk artifact を生成する
  definitions:
    zh: ChunkProcessingActivity produces ChunkArtifact 表示一次具名分块处理活动生成一个具有稳定产物身份、来源范围和处理参数的分块结果；预先存在的 Chunk、只被读取的文档或尚未执行的分块计划不是该活动产生的产物。
    en: ChunkProcessingActivity produces ChunkArtifact means that one identified chunk-processing activity generates a result with stable artifact identity, source range, and processing parameters; a pre-existing Chunk, a document merely read, or an unexecuted chunking plan is not an artifact produced by that activity.
    ja: ChunkProcessingActivity produces ChunkArtifact は、一回の識別済み chunk-processing activity が安定 artifact identity・source range・processing parameters を持つ結果を生成することを示します。既存 Chunk、読取だけの document、未実行 chunking plan は当該 activity の生成 artifact ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次活动可失败、只生成一个产物或生成多个产物，类级展示不施加统一基数。
    en: An activity may fail, produce one artifact, or produce many; the class-level display imposes no uniform cardinality.
    ja: activity は failure・one artifact・many artifacts の場合があり、class-level 表示は一律 cardinality を課しません。
  inverse_reading:
    predicate: generated_by_chunk_processing
    labels:
      zh: 由分块处理生成
      en: generated by chunk processing
      ja: chunk processing により生成される
  conditions:
    - id: ChunkProcessingActivity-produces-ChunkArtifact-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the artifact records the same chunk-processing run identity, source identity and exact range, parser or splitter version, and generation time, and the artifact did not exist before that run.
      explanations:
        zh: 仅当产物记录同一次分块处理运行身份、来源身份与精确范围、parser 或 splitter 版本以及生成时间，且该产物在运行前不存在时成立。
        en: Assert only when the artifact records the same chunk-processing run identity, source identity and exact range, parser or splitter version, and generation time, and the artifact did not exist before that run.
        ja: artifact が同一 chunk-processing run identity、source identity と exact range、parser/splitter version、generation time を記録し、run 前に存在しなかった場合だけ成立します。
      source_claims:
        - claim-chunk-artifact-015
        - claim-chunk-artifact-016
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: ChunkProcessingActivity-produces-ChunkArtifact-example-positive-001
      kind: positive
      labels:
        zh: 解析运行生成分块
        en: Parser run generates chunk artifact
        ja: parser run の chunk artifact 生成
      scenario_id: null
      descriptions:
        zh: 运行 `chunk/run-14` 用 `SentenceSplitter@0.12` 从 `doc/9` 字符范围 `1200..2199` 生成 `chunk-artifact/44`，记录来源摘要和生成时间。
        en: Run `chunk/run-14` uses `SentenceSplitter@0.12` to generate `chunk-artifact/44` from character range `1200..2199` of `doc/9`, recording source digest and generation time.
        ja: run `chunk/run-14` は `SentenceSplitter@0.12` で `doc/9` の character range `1200..2199` から `chunk-artifact/44` を生成し、source digest と generation time を記録します。
      field_values: {}
      related_node_ids:
        - ChunkProcessingActivity
        - ChunkArtifact
      related_relation_ids:
        - ChunkProcessingActivity-produces-ChunkArtifact
      expected_result:
        zh: 建立 produces 边，产物可回溯到运行、来源范围和 splitter 版本。
        en: A produces edge is created and the artifact is traceable to run, source range, and splitter version.
        ja: produces 辺を作り、artifact を run・source range・splitter version へ追跡できます。
      why_valid_or_invalid:
        zh: 生成活动、来源范围、处理版本与新产物身份完整。
        en: Generation activity, source range, processing version, and new artifact identity are complete.
        ja: generation activity、source range、processing version、新 artifact identity が揃っています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-chunk-artifact-017
    - id: ChunkProcessingActivity-produces-ChunkArtifact-example-boundary-001
      kind: boundary
      labels:
        zh: 复用既有分块边界
        en: Pre-existing chunk reuse boundary
        ja: 既存 chunk reuse 境界
      scenario_id: null
      descriptions:
        zh: 运行 `chunk/run-15` 从缓存读取已存在的 `chunk-artifact/44` 并将其加入批次，没有生成新身份或新范围。
        en: Run `chunk/run-15` reads existing `chunk-artifact/44` from cache and adds it to a batch without creating a new identity or range.
        ja: run `chunk/run-15` は既存 `chunk-artifact/44` を cache から読み batch に加えますが、新 identity/range を生成しません。
      field_values: {}
      related_node_ids:
        - ChunkProcessingActivity
        - ChunkArtifact
      related_relation_ids:
        - ChunkProcessingActivity-produces-ChunkArtifact
      expected_result:
        zh: 记录 uses 或复用事实，不把既有产物声明为本次运行产生。
        en: A use or reuse fact is recorded; the existing artifact is not asserted as generated by this run.
        ja: use/reuse fact を記録し、既存 artifact を current run の生成物とは断言しません。
      why_valid_or_invalid:
        zh: 使用既有实体与生成新实体是不同的来源事实。
        en: Using an existing entity and generating a new entity are different provenance facts.
        ja: 既存 Entity の use と新 Entity の generation は異なる provenance fact です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-chunk-artifact-018
  source_claims:
    - claim-chunk-artifact-019
    - claim-chunk-artifact-020
  distinct_fact_rationale:
    zh: produces 记录产物由哪次活动新生成；Chunk is_a ChunkArtifact 记录类别继承，Document has_chunk Chunk 记录来源文档成员，三者不可互换。
    en: produces records the activity that newly generated an artifact; Chunk is_a ChunkArtifact records subtype inheritance, and Document has_chunk Chunk records document membership. The facts are not interchangeable.
    ja: produces は artifact を新規生成した activity、is_a は subtype、has_chunk は document membership を記録し、交換できません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations: []
