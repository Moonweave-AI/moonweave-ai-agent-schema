schema: moonweave.ai/ontology-node/v1
id: SituatedChunk
kind: concept
labels:
  zh: 语境化分块
  en: Situated chunk
  ja: 文脈化チャンク
semantics:
  short_definition:
    zh: 增添 situating context 的 Chunk 派生产物。
    en: Chunk derivative artifact adding situating context.
    ja: situating context を追加した Chunk 派生 artifact。
  definition:
    zh: SituatedChunk 是 ChunkArtifact 子类，派生自 base Chunk 并增添分离字段 situating_context（Anthropic contextual retrieval 产出）。索引/embed 可用 contextualized_chunk=situating_context+"\n\n"+chunk_text，但 SourceSpan 与 source_body_sha256 仍绑定原始证据正文。
    en: SituatedChunk is ChunkArtifact subtype derived from base Chunk adding separate field situating_context (Anthropic contextual retrieval output). Indexing/embed may use contextualized_chunk=situating_context+"\n\n"+chunk_text, but SourceSpan and source_body_sha256 still bind original evidence body.
    ja: SituatedChunk は base Chunk 派生+situating_context 別 field（Anthropic contextual retrieval）。contextualized=prepend+chunk_text（embed 用）。SourceSpan/source_body_sha256=原文 evidence。
  why_needed:
    zh: Anthropic 证明 prepend situating context 提升召回 49%；分离存储避免 LLM 生成语境被当作 compliance 源文。
    en: Anthropic shows prepending situating context improves recall 49%; separate storage prevents LLM context being treated as compliance source text.
    ja: contextual retrieval recall 向上も LLM 文脈を compliance 源文と誤認させない分離 storage 必須。
  includes:
    - zh: 纳入 SituatingPromptRun 产出的具 situating_context 与 base chunk_id 的派生片段。
      en: Includes derivations from SituatingPromptRun with situating_context and base chunk_id.
      ja: SituatingPromptRun 产出+situating_context+base chunk_id 派生 fragment。
  excludes:
    - zh: 排除 base Chunk、SituatingPromptRun 与 merged situating context into SourceSpan。
      en: Excludes base Chunk, SituatingPromptRun, and merging situating context into SourceSpan.
      ja: base Chunk/SituatingPromptRun/situating→SourceSpan merge を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Anthropic indexing step stores contextualized chunk for embed；Moonweave situated-policy-7-003/v2 保留 base_chunk_id=chunk-policy-7-003、situating_context 字段、artifact_version=v2；TextEmbedding input_text_digest 可记录 contextualized 文本并标注 contextualized_for_embedding=true。
    en: Anthropic indexing stores contextualized chunk for embed; Moonweave situated-policy-7-003/v2 keeps base_chunk_id=chunk-policy-7-003, situating_context field, artifact_version=v2; TextEmbedding input_text_digest may record contextualized text with contextualized_for_embedding=true.
    ja: Anthropic contextualized storage。base_chunk_id/situating_context/artifact_version=v2。TextEmbedding digest に contextualized 标注。
  typical_input:
    - description: Anthropic contextualized chunk for indexing
      format: |
        contextualized_chunk = situating_context + "\n\n" + chunk_text
        # embed contextualized_chunk; store situating_context separately
      source_claims: [claim-situated-chunk-anthropic]
  typical_output:
    - description: Situated chunk record
      format: |
        {
          "artifact_id": "situated-policy-7-003",
          "artifact_version": "v2",
          "base_chunk_id": "chunk-policy-7-003",
          "situating_context": "Section 2 of tenant-7 security policy on authentication.",
          "context_field_separate_from_evidence": true
        }
      source_claims: [claim-situated-chunk-design]
  reference_implementations:
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/news/contextual-retrieval
      description: Prepend situating context before embedding.
structure:
  identity_keys: [artifact_id, artifact_version]
  fields:
    - id: artifact_id
      labels: {zh: 产物标识, en: Artifact identifier, ja: artifact ID}
      definitions:
        zh: SituatedChunk 派生 lineage ID；常基于 base chunk_id。
        en: SituatedChunk derivation lineage ID; often based on base chunk_id.
        ja: SituatedChunk 派生 lineage ID。base chunk_id ベース often。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: situated-policy-7-003
      allowed_values: []
      source_claims: [claim-situated-chunk-id]
    - id: base_chunk_id
      labels: {zh: 基础分块标识, en: Base chunk identifier, ja: base chunk ID}
      definitions:
        zh: 派生来源的基础 Chunk chunk_id。
        en: Base Chunk chunk_id this derives from.
        ja: 派生元 base Chunk chunk_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-situated-chunk-base]
    - id: situating_context
      labels: {zh: 语境化上下文, en: Situating context, ja: situating context}
      definitions:
        zh: Anthropic situating prompt 或 SituatingPromptRun 生成的短语境；必须与证据正文分字段。
        en: Short context from Anthropic situating prompt or SituatingPromptRun; must be separate field from evidence body.
        ja: Anthropic situating prompt/SituatingPromptRun 生成短文脈。証拠本文と別 field 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Section 2 of tenant-7 security policy on authentication.
      allowed_values: []
      source_claims: [claim-situated-chunk-anthropic]
  constraints:
    - id: situated-context-not-evidence
      severity: error
      expression_language: plain
      expression: situating_context must not be merged into source_body_sha256 or SourceSpan evidence text.
      explanation:
        zh: LLM 生成语境不能当作源文。
        en: LLM-generated context must not become source body.
        ja: LLM 生成文脈を源文に不可。
      source_claims: [claim-situated-chunk-anthropic, claim-situated-chunk-design]
  required_relations: []
examples:
  - id: SituatedChunk-example-anthropic
    labels:
      zh: Anthropic 语境化分块
      en: Anthropic situated chunk
      ja: Anthropic situated chunk
    descriptions:
      zh: situate-run-84 产出 situated-policy-7-003/v2，situating_context="Section 2 … authentication"，base_chunk_id=chunk-policy-7-003，SourceSpan 不变。
      en: situate-run-84 produces situated-policy-7-003/v2 with situating_context="Section 2 … authentication", base_chunk_id=chunk-policy-7-003, unchanged SourceSpan.
      ja: situate-run-84→situated-policy-7-003/v2+situating_context。base=chunk-policy-7-003。SourceSpan 不変。
    example_source:
      product: Anthropic
      url: https://www.anthropic.com/news/contextual-retrieval
      version: contextual retrieval
    field_values:
      artifact_id: situated-policy-7-003
      artifact_version: v2
      base_chunk_id: chunk-policy-7-003
      situating_context: Section 2 of tenant-7 security policy on authentication.
    related_node_ids:
      - SituatedChunk
      - SituatingPromptRun
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-situated-chunk-anthropic
      - claim-situated-chunk-design
  - id: SituatedChunk-example-contextualized-embed
    labels:
      zh: 语境化后嵌入
      en: Contextualized embedding
      ja: contextualized embedding
    descriptions:
      zh: 索引 pipeline prepend situating_context 后 POST /v1/embeddings；检索命中 contextualized 视图，审计仍回到 chunk-policy-7-003 SourceSpan。
      en: Index pipeline prepends situating_context then POST /v1/embeddings; retrieval hits contextualized view, audit returns to chunk-policy-7-003 SourceSpan.
      ja: prepend→POST /v1/embeddings。retrieval= contextualized view、audit=chunk-policy-7-003 SourceSpan。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/embeddings
      version: contextualized embed
    field_values:
      contextualized_for_embedding: true
    related_node_ids:
      - SituatedChunk
      - TextEmbedding
      - memory-embedding-indexes
    related_relation_ids: []
    source_claims:
      - claim-situated-chunk-design
  - id: SituatedChunk-example-not-base-chunk
    labels:
      zh: 语境化分块非基础 Chunk
      en: Situated chunk is not base Chunk
      ja: situated chunk は base Chunk ではない
    descriptions:
      zh: chunk-policy-7-003 是 base Chunk v1 无 situating_context；situated-policy-7-003/v2 是派生 SituatedChunk。
      en: chunk-policy-7-003 is base Chunk v1 without situating_context; situated-policy-7-003/v2 is derived SituatedChunk.
      ja: chunk-policy-7-003=base Chunk v1。situated-policy-7-003/v2=SituatedChunk 派生。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SituatedChunk
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-situated-chunk-design
parent_relation:
  id: SituatedChunk-is_a-ChunkArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种分块产物
    en: is a chunk artifact
    ja: チャンク artifact の一種
  definitions:
    zh: SituatedChunk —is_a→ ChunkArtifact 因为它是派生片段产物并继承 base Chunk 来源链。
    en: SituatedChunk —is_a→ ChunkArtifact because it is derived fragment artifact inheriting base Chunk provenance chain.
    ja: SituatedChunk —is_a→ ChunkArtifact は派生 fragment+base Chunk 来歴継承のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: SituatedChunk-is_a-ChunkArtifact-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when artifact derives from base Chunk with separate situating_context field.
      explanations:
        zh: 仅当满足 SituatedChunk 种差时建立该边。
        en: Assert only when SituatedChunk differentia holds.
        ja: SituatedChunk 種差成立時のみ assert。
      source_claims: [claim-situated-chunk-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-situated-chunk-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-anthropic-contextual
    title: Anthropic Contextual Retrieval
    publisher: Anthropic
    url: https://www.anthropic.com/news/contextual-retrieval
    source_type: official-doc
    relevance: Situating context prepend and separate storage.
  - id: src-situated-chunk-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SituatedChunk derivation and evidence separation.
source_claims:
  - id: claim-situated-chunk-anthropic
    source: src-anthropic-contextual
    supports: Anthropic contextual retrieval prepends generated situating context to chunks before embedding while improving retrieval recall.
    locator: Contextual retrieval blog
    evidence_kind: primary-doc
    confidence: high
  - id: claim-situated-chunk-design
    source: src-situated-chunk-design
    supports: SituatedChunk derives from base Chunk with separate situating_context; SourceSpan evidence unchanged.
    locator: SituatedChunk boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-situated-chunk-id
    source: src-situated-chunk-design
    supports: artifact_id identifies situated chunk derivation.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-situated-chunk-base
    source: src-situated-chunk-design
    supports: base_chunk_id links derivation to source Chunk.
    locator: structure
    evidence_kind: design-inference
    confidence: high
