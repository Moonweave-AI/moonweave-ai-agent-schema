source_claims:
  - id: claim-situated-chunk-001
    source: eng-fw-llamaindex-metadata-extraction
    supports: LlamaIndex documents that long-document chunks can lack disambiguating context and that metadata extractors add contextual information to each Node. This directly supports SituatedChunk's enrichment purpose; body and SourceSpan preservation, separable context, producing-run identity, semantic kind, and hierarchy are Moonweave design inference.
    locator: Metadata Extraction > Introduction > chunk context and disambiguation; Usage > metadata added to each Node
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-situated-chunk-002
    source: eng-fw-langchain-text-splitters
    supports: LangChain documents structure-based splitting as preserving a document's logical organization and maintaining context within each chunk. This supports only the document-local context aspect of SituatedChunk; a separable generated layer, provenance-bearing run, semantic kind, and subtype placement are Moonweave design inference.
    locator: Text splitter integrations > Document structure-based > preserves logical organization and context within each chunk
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
