schema: moonweave.ai/ontology-node/v1
id: SituatedChunk
kind: concept
status: accepted
labels:
  zh: 已定位分块
  en: situated chunk
  ja: 位置付け済みチャンク
semantics:
  short_definition:
    zh: 保留原分块与来源锚点、并附加可分离分块语境说明的 ChunkArtifact。
    en: A ChunkArtifact that preserves its source Chunk and source anchor while adding a separable chunk-specific context explanation.
    ja: 元の Chunk と出典アンカーを保持し、分離可能なチャンク固有文脈説明を加えた ChunkArtifact です。
  definition:
    zh: SituatedChunk 是一种 ChunkArtifact；其种差是：它以独立 artifact_id 标识，由一个既有 Chunk 派生，原样保留该 Chunk 的正文、来源版本与 SourceSpan，同时把 SituatingPromptRun 生成的分块专属语境作为可分离前缀或字段保存。语境文本不是来源原文，不能替代或扩大原 Chunk 的证据跨度；因此 SituatedChunk 不再被建模为原始 Chunk 的子类。
    en: A SituatedChunk is a ChunkArtifact with its own artifact identity, derived from an existing Chunk while preserving that Chunk's body, source version, and SourceSpan verbatim and storing chunk-specific context from a SituatingPromptRun as a separable prefix or field. The added context is not source text and cannot replace or enlarge the source Chunk's evidentiary span; the SituatedChunk therefore does not replace the source-bound Chunk and is not modeled as its subtype.
    ja: SituatedChunk は独自 artifact_id を持つ ChunkArtifact で、既存 Chunk から派生し、その本文・出典版・SourceSpan をそのまま保持しつつ、SituatingPromptRun のチャンク固有文脈を分離可能な接頭辞または項目として保存します。追加文脈は出典本文ではなく証拠範囲を置換・拡大できないため、出典拘束 Chunk の下位型にはしません。
  why_needed:
    zh: 孤立片段常丢失章节主体、时间和目的；把语境作为可追踪附加层，既能改善检索消歧，也能避免模型生成的说明与原文混为一谈。
    en: Isolated segments often lose section subject, time, and purpose. A traceable context layer improves retrieval disambiguation while preventing model-generated explanation from being confused with source text.
    ja: 孤立断片は節の主体・時点・目的を失いやすいため、追跡可能な文脈layerで検索曖昧性を減らし、model生成説明と原文の混同を防ぎます。
  includes:
    - zh: 纳入 situated-policy-7-003：它引用 chunk-policy-7-003，逐字保存原文与字符 1600–2399 的 SourceSpan，并另存“2026 数据保留政策第 4.2 节”的检索语境。
      en: Includes situated-policy-7-003, which references chunk-policy-7-003, preserves its text and character SourceSpan 1600–2399 verbatim, and separately stores the retrieval context “section 4.2 of the 2026 retention policy.”
      ja: chunk-policy-7-003 を参照し、本文と文字範囲1600–2399を逐語保持し、「2026年保持方針4.2節」という検索文脈を別項目に保存する situated-policy-7-003 を含みます。
  excludes:
    - zh: 排除仅带标题标签的 Chunk、把生成说明混入原文且无法分离的文本、改变来源主张的摘要，以及生成语境的 SituatingPromptRun 活动。
      en: Excludes a Chunk carrying only title metadata, text in which generated explanation is inseparably mixed with source content, summaries that change source claims, and the SituatingPromptRun activity itself.
      ja: 題名メタデータだけの Chunk、生成説明と出典本文を分離できない文章、出典主張を変更する要約、生成活動 SituatingPromptRun を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SituatedChunk-example-positive-001
    kind: positive
    labels:
      zh: 已定位分块正例
      en: Positive example of situated chunk
      ja: 位置付け済みチャンクの正例
    scenario_id: null
    descriptions:
      zh: situated-policy-7-003/v2 保留 chunk-policy-7-003/v1 的原始正文与 source-span-policy-12，另附可分离说明“2026 数据保留政策第 4.2 节，说明用户撤回后的处置”；该说明由 situate-run-84 生成并单独标识为非原文。
      en: situated-policy-7-003/v2 preserves the original body and source-span-policy-12 of chunk-policy-7-003/v1 while adding the separable note “Section 4.2 of the 2026 data-retention policy, describing disposition after user withdrawal.” The note was generated by situate-run-84 and is explicitly marked as non-source text.
      ja: situated-policy-7-003/v2 は chunk-policy-7-003/v1 の原本文と source-span-policy-12 を保持し、「2026年データ保持方針4.2節、利用者撤回後の処置を説明」という分離可能な注記を追加します。注記は situate-run-84 が生成し、原文ではないことを明示します。
    field_values:
      artifact_id: chunk-artifact:situated-policy-7-003
      artifact_version: "2"
      producing_activity_ref: chunk-processing-activity:situate-run-84
      source_version_ref: document:doc-policy@7
      source_span:
        unit: character
        start: 1600
        end_exclusive: 2400
      content_digest: sha256:9a72b2
      generated_at: 2026-07-17T01:12:00Z
    related_node_ids:
      - SituatedChunk
      - SituatingPromptRun
    related_relation_ids:
      - SituatingPromptRun-produces-SituatedChunk
    expected_result:
      zh: 该运行可查询 SituatedChunk 以及方向保持不变的事实 SituatingPromptRun-produces-SituatedChunk。
      en: The run can query SituatedChunk together with direction-preserving fact SituatingPromptRun-produces-SituatedChunk.
      ja: この実行では SituatedChunk と方向を保持した事実 SituatingPromptRun-produces-SituatedChunk を共に照会できます。
    why_valid_or_invalid:
      zh: 正文、来源跨度和原分块谱系均未改变；新增语境与原文可分离，并能追溯到具体定位运行，因此该对象满足 SituatedChunk 的全部种差，是派生自 Chunk 的 ChunkArtifact 特化而非原始 Chunk 本身。
      en: The body, source span, and original chunk lineage remain unchanged. Added context is separable from source text and traceable to a specific situating run, so the object satisfies the full SituatedChunk differentia as a Chunk-derived ChunkArtifact specialization rather than the original Chunk itself.
      ja: 本文・出典範囲・元chunk系譜は不変で、追加文脈は原文から分離でき具体的な位置付けrunへ追跡できます。そのためSituatedChunkの全種差を満たす Chunk 派生 ChunkArtifact 特化であり、元 Chunk 自体ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-situated-chunk-003
      - claim-situated-chunk-004
  - id: SituatedChunk-example-boundary-001
    kind: boundary
    labels:
      zh: 已定位分块边界例
      en: Boundary case for situated chunk
      ja: 位置付け済みチャンクの境界例
    scenario_id: null
    descriptions:
      zh: chunk-policy-7-003/v1 具有来源跨度、标题和文件名元数据，但没有由更广文档或任务语境生成的独立说明，也没有生成说明的运行记录；它是普通 Chunk，不是 SituatedChunk。
      en: chunk-policy-7-003/v1 has a source span plus title and filename metadata, but no independent explanation generated from broader document or task context and no run record for such an explanation. It is an ordinary Chunk, not a SituatedChunk.
      ja: chunk-policy-7-003/v1 は出典範囲・title・filename metadataを持ちますが、広い文書／task文脈から生成された独立説明も、その生成run記録もありません。通常ChunkでありSituatedChunkではありません。
    field_values: {}
    related_node_ids:
      - SituatedChunk
      - SituatingPromptRun
      - Chunk
    related_relation_ids:
      - SituatingPromptRun-produces-SituatedChunk
    expected_result:
      zh: Chunk 保持其原有类型，验证器不得凭关系共现把它提升为 SituatedChunk。
      en: Chunk retains its own type; validation must not promote it to SituatedChunk from relation co-occurrence.
      ja: Chunk は元の型を維持し、関係の共起だけで SituatedChunk へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 标题和文件名只是已有来源属性；SituatedChunk 要求补充能消除孤立片段歧义的局部语境、与原文分离，并记录其生成活动。仅有检索元数据不满足这些条件。
      en: Title and filename are existing source attributes. SituatedChunk requires added local context that resolves isolated-segment ambiguity, remains separable from source text, and records its generation activity. Retrieval metadata alone does not satisfy those conditions.
      ja: titleとfilenameは既存出典属性です。SituatedChunkには孤立断片の曖昧性を解く追加局所文脈、原文との分離、生成活動記録が必要で、検索metadataだけでは条件を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-situated-chunk-005
      - claim-situated-chunk-006
  - id: SituatedChunk-example-instance-001
    kind: instance
    labels:
      zh: 已定位分块结构化实例
      en: Structured instance of situated chunk
      ja: 位置付け済みチャンクの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例使用 chunk_id=situated-policy-7-003、ordinal=3 标识原文中的第三个分块，并在节点说明中保留独立 context_note 与 situate-run-84；界面展开节点即可同时核验正文、来源和生成语境。
      en: The inline instance uses chunk_id=situated-policy-7-003 and ordinal=3 for the third source segment, while retaining a separate context_note and situate-run-84 in the node information. Expanding the node exposes body, source, and generated context together for verification.
      ja: ノード内instanceは chunk_id=situated-policy-7-003、ordinal=3 で原文第3断片を示し、独立context_noteと situate-run-84 をノード情報に保持します。ノード展開で本文・出典・生成文脈を併せて確認できます。
    field_values:
      chunk_id: situated-policy-7-003
      ordinal: 3
    related_node_ids:
      - SituatedChunk
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: chunk_id 与 ordinal 延续 Chunk 的身份和顺序；context_note 与生成运行作为同一节点的可核验信息附着，不另建实例图，也不把生成说明伪装成 SourceSpan 中的原文。
      en: chunk_id and ordinal preserve Chunk identity and order. The context note and producing run attach as verifiable information on the same node without creating a separate instance graph or presenting generated explanation as text from the SourceSpan.
      ja: chunk_idとordinalはChunk同一性・順序を継承します。context_noteと生成runは同一ノードの検証可能情報として付与し、別instance graphを作らず生成説明をSourceSpan原文に見せません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-situated-chunk-007
      - claim-situated-chunk-008
