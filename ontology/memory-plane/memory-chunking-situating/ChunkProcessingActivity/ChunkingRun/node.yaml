sibling_differentiation:
  - sibling_concept_id: SituatingPromptRun
    shared_parent_concept_id: ChunkProcessingActivity
    differentia:
      zh: 端点特定对照：父节点 ChunkProcessingActivity：ChunkingRun（semantic kind=activity，骨架 ChunkingRun-is_a-ChunkProcessingActivity）；SituatingPromptRun（semantic kind=activity，骨架 SituatingPromptRun-is_a-ChunkProcessingActivity）。双端条件：ChunkingRun 条件：“分块运行是一种分块处理活动；其区分条件是：它是把文档、输出或记忆项切分为可检索分块的可观测事件，并记录边界、重叠、片段和来源元数据”；SituatingPromptRun 条件：“分块定位提示运行是以如下事实为区分特征的分块处理活动：定位提示运行是为分块补充文档局部或任务局部上下文的可观测事件，使检索保留章节含义、来源目的和周边证据”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ChunkProcessingActivity: ChunkingRun (semantic kind=activity, backbone ChunkingRun-is_a-ChunkProcessingActivity); SituatingPromptRun (semantic kind=activity, backbone SituatingPromptRun-is_a-ChunkProcessingActivity). Endpoint conditions: ChunkingRun condition: “As a chunk processing activity, Chunking run is distinguished by the fact that it is an observable event that divides a document, output, or memory item into retrievable chunks with boundary, overlap, span, and provenance metadata”; SituatingPromptRun condition: “Situating prompt run is a chunk processing activity; its differentiating condition is that it is an observable event that adds document-local or task-local context to a chunk so retrieval can preserve section meaning, source purpose, and surrounding evidence”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ChunkProcessingActivity：ChunkingRun（semantic kind=activity、バックボーン ChunkingRun-is_a-ChunkProcessingActivity）；SituatingPromptRun（semantic kind=activity、バックボーン SituatingPromptRun-is_a-ChunkProcessingActivity）。両端条件：ChunkingRun の条件：「チャンク処理活動に属する分割実行は、次の事実を種差とします：チャンク化実行は、文書、出力、記憶項目を検索可能なチャンクへ分割し、境界、重なり、範囲、来歴メタデータを記録する観測可能なイベントです」；SituatingPromptRun の条件：「位置付けプロンプト実行はチャンク処理活動の一種であり、次の条件で区別されます：それは、検索が節の意味、出典の目的、周辺証拠を保てるように、チャンクへ文書内またはタスク内の文脈を加える観測可能なイベントです」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-chunking-run-007
