schema: moonweave.ai/ontology-node/v1
id: ChunkingRun
kind: concept
labels:
  zh: 分块运行
  en: Chunking run
  ja: チャンク化 run
semantics:
  short_definition:
    zh: 把 Document 切成带 SourceSpan 的 Chunk 的活动。
    en: Activity splitting a Document into Chunks with SourceSpans.
    ja: Document を SourceSpan 付き Chunk に分割する activity。
  definition:
    zh: ChunkingRun 是 ChunkProcessingActivity：消费 pinned Document 版本，应用 splitter 配置（chunk_size、overlap、separators），产出 Chunk 列表。LangChain RecursiveCharacterTextSplitter 与 LlamaIndex SentenceSplitter 是典型映射；规范配置与一次 run 发生事实（input digest、产出列表）必须分开。
    en: ChunkingRun is ChunkProcessingActivity consuming a pinned Document version, applying splitter config (chunk_size, overlap, separators), and producing Chunk list. LangChain RecursiveCharacterTextSplitter and LlamaIndex SentenceSplitter are typical mappings; spec config must stay distinct from one run occurrence (input digest, output list).
    ja: ChunkingRun は pinned Document 版 consume+splitter 設定→Chunk リスト生成。LangChain/LlamaIndex splitter が典型。spec と run 発生事実分離。
  why_needed:
    zh: 没有 chunking_run_id，无法重放相同边界或在策略变更后决定 invalidate 哪些 Chunk。
    en: Without chunking_run_id you cannot replay identical boundaries or decide which Chunks to invalidate after strategy changes.
    ja: chunking_run_id なしでは境界 replay/方策変更後 invalidate 判断不可。
  includes:
    - zh: 纳入 recursive、sentence、semantic 等 splitter 执行的 ChunkingRun。
      en: Includes ChunkingRun executions with recursive, sentence, semantic, and other splitters.
      ja: recursive/sentence/semantic splitter 実行 ChunkingRun。
  excludes:
    - zh: 排除 Chunk 产物、SituatingPromptRun 与仅声明 chunk_size 的策略文档。
      en: Excludes Chunk artifacts, SituatingPromptRun, and strategy docs declaring only chunk_size.
      ja: Chunk 产物/SituatingPromptRun/chunk_size のみ spec を除外。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: LangChain RecursiveCharacterTextSplitter(chunk_size=1000, overlap=200) 产出 Document chunks 带 start_index metadata；LlamaIndex SentenceSplitter 产出 TextNode；Moonweave 登记 chunking_run_id、document digest 与 splitter 配置 digest。
    en: LangChain RecursiveCharacterTextSplitter(chunk_size=1000, overlap=200) produces Document chunks with start_index metadata; LlamaIndex SentenceSplitter produces TextNodes; Moonweave records chunking_run_id, document digest, and splitter config digest.
    ja: LangChain splitter→Document chunk+start_index。LlamaIndex→TextNode。chunking_run_id/document digest/splitter digest 登録。
  typical_input:
    - description: LangChain recursive split
      format: |
        RecursiveCharacterTextSplitter(chunk_size=1000, chunk_overlap=200, separators=["\n\n", "\n", " ", ""])
        chunks = splitter.split_text(document_text)
      source_claims: [claim-chunking-run-langchain]
    - description: LlamaIndex SentenceSplitter
      format: |
        SentenceSplitter(chunk_size=512, chunk_overlap=64)
        nodes = splitter.get_nodes_from_documents(documents)
      source_claims: [claim-chunking-run-llamaindex]
  typical_output:
    - description: Chunking run record
      format: |
        {
          "chunking_run_id": "chunk-run-7",
          "document_id": "doc-policy",
          "document_version": "v7",
          "chunks_produced": 18,
          "splitter_config_digest": "sha256:sentence-512-64"
        }
      source_claims: [claim-chunking-run-design]
  reference_implementations:
    - name: LangChain RecursiveCharacterTextSplitter
      url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
      description: Recursive separator hierarchy chunking.
    - name: LlamaIndex SentenceSplitter
      url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
      description: Sentence-aware chunk_size and overlap.
structure:
  identity_keys: [chunking_run_id]
  fields:
    - id: chunking_run_id
      labels: {zh: 分块运行标识, en: Chunking run identifier, ja: チャンク化 run ID}
      definitions:
        zh: 唯一标识一次 ChunkingRun。
        en: Uniquely identifies one ChunkingRun.
        ja: 一回 ChunkingRun を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-run-7
      allowed_values: []
      source_claims: [claim-chunking-run-id]
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: 文書 ID}
      definitions:
        zh: 被分块的 Document lineage ID。
        en: Document lineage ID being chunked.
        ja: 分割対象 Document lineage ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: doc-policy
      allowed_values: []
      source_claims: [claim-chunking-run-doc]
    - id: document_version
      labels: {zh: 文档版本, en: Document version, ja: 文書版}
      definitions:
        zh: 分块时 pinned 的 Document 不可变版本。
        en: Immutable Document version pinned at chunking time.
        ja: chunking 時 pinned Document 不変版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: v7
      allowed_values: []
      source_claims: [claim-chunking-run-doc]
    - id: splitter_config_digest
      labels: {zh: 分块器配置摘要, en: Splitter config digest, ja: splitter 設定 digest}
      definitions:
        zh: chunk_size、overlap、separators 等配置的 SHA-256。
        en: SHA-256 of chunk_size, overlap, separators, and other config.
        ja: chunk_size/overlap/separators 等設定 SHA-256。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:sentence-512-64
      allowed_values: []
      source_claims: [claim-chunking-run-config]
  constraints: []
  required_relations: []
examples:
  - id: ChunkingRun-example-llamaindex
    labels:
      zh: LlamaIndex SentenceSplitter 运行
      en: LlamaIndex SentenceSplitter run
      ja: LlamaIndex SentenceSplitter run
    descriptions:
      zh: chunk-run-7 对 doc-policy/v7 执行 SentenceSplitter(512,64) 产出 18 个 TextNode/Chunk，各带字符 offset。
      en: chunk-run-7 runs SentenceSplitter(512,64) on doc-policy/v7 producing 18 TextNode/Chunks with char offsets.
      ja: chunk-run-7 SentenceSplitter(512,64)→doc-policy/v7→18 Chunk+offset。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
      version: SentenceSplitter
    field_values:
      chunking_run_id: chunk-run-7
      document_id: doc-policy
      document_version: v7
      chunks_produced: 18
    related_node_ids:
      - ChunkingRun
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunking-run-llamaindex
      - claim-chunking-run-design
  - id: ChunkingRun-example-langchain
    labels:
      zh: LangChain 递归分块运行
      en: LangChain recursive chunking run
      ja: LangChain recursive chunking run
    descriptions:
      zh: chunk-run-md-2 用 RecursiveCharacterTextSplitter(1000,200) 切 Markdown，metadata source=policy.pdf 与 start_index 供 SourceSpan 重建。
      en: chunk-run-md-2 uses RecursiveCharacterTextSplitter(1000,200) on Markdown; metadata source=policy.pdf and start_index rebuild SourceSpan.
      ja: chunk-run-md-2 RecursiveCharacterTextSplitter(1000,200)。source/start_index→SourceSpan。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
      version: RecursiveCharacterTextSplitter
    field_values:
      chunking_run_id: chunk-run-md-2
      chunk_size: 1000
      chunk_overlap: 200
    related_node_ids:
      - ChunkingRun
      - ChunkMetadata
    related_relation_ids: []
    source_claims:
      - claim-chunking-run-langchain
      - claim-chunking-run-design
  - id: ChunkingRun-example-not-chunk
    labels:
      zh: 运行非 Chunk
      en: Run is not chunk
      ja: run は chunk ではない
    descriptions:
      zh: chunk-policy-7-003 是 Chunk 产物；chunk-run-7 是可观察分块活动，有 started_at 无 SourceSpan 正文。
      en: chunk-policy-7-003 is Chunk artifact; chunk-run-7 is observable chunking activity with started_at but no SourceSpan body.
      ja: chunk-policy-7-003=Chunk artifact。chunk-run-7=observable activity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkingRun
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunking-run-design
parent_relation:
  id: ChunkingRun-is_a-ChunkProcessingActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种分块处理活动
    en: is a chunk processing activity
    ja: チャンク処理 activity の一種
  definitions:
    zh: ChunkingRun —is_a→ ChunkProcessingActivity 因为它改变分段边界并产出 Chunk 列表。
    en: ChunkingRun —is_a→ ChunkProcessingActivity because it changes segmentation boundaries and produces Chunk list.
    ja: ChunkingRun —is_a→ ChunkProcessingActivity は分段境界変更+Chunk リスト产出のため。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系按单个可审计事实判定。
    en: The relation is decided per auditable fact.
    ja: audit 可能 fact 単位で判定。
  inverse_reading:
    predicate: part_of
    labels: {zh: 反向读取, en: inverse is_a, ja: 逆方向読取}
  conditions:
    - id: ChunkingRun-is_a-ChunkProcessingActivity-condition-001
      severity: error
      expression_language: plain
      expression: Assert only when the run splits a pinned Document and produces new Chunks.
      explanations:
        zh: 仅当满足分块链时建立该边。
        en: Assert only when chunking chain holds.
        ja: chunking chain 成立時のみ assert。
      source_claims: [claim-chunking-run-design]
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunking-run-design]
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-langchain-splitter
    title: LangChain RecursiveCharacterTextSplitter
    publisher: LangChain
    url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
    source_type: official-doc
    relevance: Recursive chunking with metadata.
  - id: src-llamaindex-splitter
    title: LlamaIndex SentenceSplitter
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework-api-reference/ingestion/
    source_type: official-doc
    relevance: Sentence-aware node parsing.
  - id: src-chunking-run-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ChunkingRun versus Chunk artifact separation.
source_claims:
  - id: claim-chunking-run-langchain
    source: src-langchain-splitter
    supports: LangChain RecursiveCharacterTextSplitter splits documents with chunk_size, overlap, and separator hierarchy.
    locator: RecursiveCharacterTextSplitter
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunking-run-llamaindex
    source: src-llamaindex-splitter
    supports: LlamaIndex SentenceSplitter produces nodes with chunk_size and chunk_overlap boundaries.
    locator: SentenceSplitter API
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunking-run-design
    source: src-chunking-run-design
    supports: ChunkingRun records run identity, pinned document version, and splitter config distinct from Chunk artifacts.
    locator: ChunkingRun boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunking-run-id
    source: src-chunking-run-design
    supports: chunking_run_id identifies one chunking activity.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunking-run-doc
    source: src-chunking-run-design
    supports: document_id and document_version pin input document at chunking time.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunking-run-config
    source: src-chunking-run-design
    supports: splitter_config_digest pins splitter parameters for replay.
    locator: structure
    evidence_kind: design-inference
    confidence: high
