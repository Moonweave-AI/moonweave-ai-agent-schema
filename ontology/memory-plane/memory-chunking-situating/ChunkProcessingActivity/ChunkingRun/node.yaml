schema: moonweave.ai/ontology-node/v1
id: ChunkingRun
kind: concept
status: accepted
labels:
  zh: 分块运行
  en: Chunking Run
  ja: チャンキング実行
semantics:
  short_definition:
    zh: 对一个已定版本可摄取来源计算分段边界并生成有序 Chunk 输出的 ChunkProcessingActivity 子类。
    en: A ChunkProcessingActivity subtype that computes segmentation boundaries over one versioned ingestible source and generates an ordered Chunk output.
    ja: 一つの版が確定した ingestible source に対して segmentation boundary を計算し、順序付き Chunk output を生成する ChunkProcessingActivity の下位型。
  definition:
    zh: >
      ChunkingRun 是一次实际执行的源边界计算活动。它读取一个确定版本的文档、消息或其他 IngestibleResource，
      使用已声明的 splitter、chunk_size、chunk_overlap 与分隔规则来生成按来源顺序排列的新 Chunk 版本。它不是
      splitter 配置本身、输出 Chunk、仅对已有 Chunk 添加上下文的 SituatingPromptRun，或对已有 Chunk 进行
      缩短的 ChunkCompression。
    en: >
      ChunkingRun is one actually executed source-boundary-computation activity. It reads a determinate version of a
      document, message, or other IngestibleResource and uses declared splitter, chunk_size, chunk_overlap, and
      separator rules to generate new Chunk revisions in source order. It is not the splitter configuration itself,
      an output Chunk, a SituatingPromptRun that only adds context to an existing Chunk, or a ChunkCompression that
      shortens existing Chunks.
    ja: >
      ChunkingRun は、一回の実際に実行された source-boundary-computation activity です。確定済み版の document、
      message、または他の IngestibleResource を読み取り、宣言済み splitter、chunk_size、chunk_overlap、
      separator rule を使って source order の新しい Chunk revision を生成します。splitter configuration 自体、
      output Chunk、既存 Chunk に context だけを加える SituatingPromptRun、既存 Chunk を短縮する
      ChunkCompression ではありません。
  why_needed:
    zh: 分块边界、大小与重叠直接影响检索召回和引用精度；把执行与配置、来源和输出分开记录，才能重放并解释产生的片段。
    en: Chunk boundaries, size, and overlap directly affect retrieval recall and citation precision; recording execution separately from configuration, source, and outputs permits replay and explanation of produced segments.
    ja: chunk boundary、size、overlap は retrieval recall と citation precision に直接影響します。execution を configuration、source、output から分離して記録すると、生成 segment の replay と説明ができます。
  includes:
    - zh: 已执行运行、固定来源版本、splitter 策略、大小和重叠参数以及按来源顺序生成的新 Chunk 版本。
      en: Completed execution, pinned source version, splitter strategy, size and overlap parameters, and new Chunk revisions generated in source order.
      ja: 完了した execution、固定 source version、splitter strategy、size と overlap parameter、source order で生成された新しい Chunk revision。
  excludes:
    - zh: 未执行的 splitter 配置、整个原始来源、输出 Chunk 本身、已有 Chunk 的压缩、情境化生成、嵌入、索引和检索运行。
      en: An unexecuted splitter configuration, whole raw source, output Chunk itself, existing-chunk compression, situating generation, embedding, indexing, or retrieval run.
      ja: 未実行 splitter configuration、whole raw source、output Chunk 自体、既存 chunk compression、situating generation、embedding、indexing、retrieval run。
  semantic_kind: activity
  aliases: [document chunking execution, segmentation run, 文档切分运行]
engineering:
  explanation:
    zh: LangChain splitter 将长文档拆为更小的 Document chunk，并通过 chunk_size 与 chunk_overlap 配置边界。Moonweave 为每次实际调用保留一个活动记录，使新 Chunk 能回查来源与参数。
    en: LangChain splitters split long documents into smaller Document chunks and configure boundaries through chunk_size and chunk_overlap. Moonweave retains one activity record per actual call so new Chunks can be traced to source and parameters.
    ja: LangChain splitter は長い document をより小さい Document chunk に分割し、chunk_size と chunk_overlap で boundary を設定します。Moonweave は実際の call ごとに一つの activity record を保持し、新しい Chunk を source と parameter まで追跡可能にします。
  typical_input:
    - description: Versioned source and splitter settings
      format: |
        {
          "source_resource_ref": "docs/policy.md@v7",
          "splitter_spec_ref": "recursive-character-v3",
          "chunk_size": 800,
          "chunk_overlap": 80
        }
  typical_output:
    - description: Chunking-run record
      format: |
        {
          "chunking_run_id": "chunk-81",
          "source_resource_ref": "docs/policy.md@v7",
          "output_chunk_refs": ["chunk-policy-01@v1", "chunk-policy-02@v1", "chunk-policy-03@v1"]
        }
  reference_implementations:
    - name: LangChain Text Splitters
      url: https://docs.langchain.com/oss/python/integrations/splitters/index
      description: Documents splitting large documents into smaller chunks and recursive splitter configuration.
structure:
  identity_keys: [chunking_run_id]
  fields:
    - id: chunking_run_id
      labels: {zh: 分块运行标识, en: chunking run ID, ja: チャンキング run ID}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 标识一次实际的来源边界计算执行，不能复用为来源、策略或输出分块标识。
        en: Identifies one actual source-boundary-computation execution and is not reused as source, strategy, or output-chunk ID.
        ja: 一回の実際の source-boundary-computation execution を識別し、source、strategy、output-chunk ID として再利用しません。
      allowed_values: []
      pattern: "^chunk-[A-Za-z0-9._-]+$"
      example_value: chunk-81
      source_claims: [claim-chunking-run-splitting]
    - id: source_resource_ref
      labels: {zh: 来源资源版本引用, en: source resource version reference, ja: 情報源 resource version 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向本运行实际读取的确定 IngestibleResource 版本，不能用后来更新的资源隐式替换。
        en: Points to the determinate IngestibleResource version actually read by this run and cannot be implicitly replaced by a later resource revision.
        ja: この run が実際に読み取った確定済み IngestibleResource version を指し、後の resource revision に暗黙に置き換えることはできません。
      allowed_values: []
      pattern: "^[^\\s]+@[^\\s]+$"
      example_value: docs/policy.md@v7
      source_claims: [claim-chunking-run-provenance]
    - id: splitter_spec_ref
      labels: {zh: 分割策略引用, en: splitter strategy reference, ja: splitter strategy 参照}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 指向执行时使用的 splitter 版本和规则，而非由其产生的某个 Chunk。
        en: Points to splitter revision and rules used at execution time rather than one Chunk produced by it.
        ja: それが生成した一つの Chunk ではなく、execution 時に使った splitter revision と rule を指します。
      allowed_values: []
      pattern: "^[A-Za-z][A-Za-z0-9._-]+$"
      example_value: recursive-character-v3
      source_claims: [claim-chunking-run-splitting]
    - id: chunk_size
      labels: {zh: 分块大小, en: chunk size, ja: チャンク size}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: splitter 请求的每块目标大小，解释边界策略但不保证每个输出恰好等于该值。
        en: Target per-chunk size requested by the splitter, which explains boundary policy but does not guarantee every output equals this value.
        ja: splitter が要求する target per-chunk size で、boundary policy を説明しますが、すべての output がこの値と等しいことは保証しません。
      allowed_values: []
      pattern: null
      example_value: 800
      source_claims: [claim-chunking-run-splitting]
    - id: chunk_overlap
      labels: {zh: 分块重叠, en: chunk overlap, ja: チャンク overlap}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 相邻输出之间要求保留的重叠大小，不能为负且不得大于 chunk_size。
        en: Required overlap size between adjacent outputs, which cannot be negative or exceed chunk_size.
        ja: 隣接 output 間に保持する required overlap size であり、負にしたり chunk_size を超えたりできません。
      allowed_values: []
      pattern: null
      example_value: 80
      source_claims: [claim-chunking-run-splitting]
    - id: output_chunk_refs
      labels: {zh: 输出分块版本引用, en: output chunk revision references, ja: output chunk revision 参照}
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      definitions:
        zh: 按来源顺序列出本运行生成的新 Chunk 版本，不包含仅被读取或后续索引的分块。
        en: Lists new Chunk revisions generated by this run in source order and excludes chunks merely read or later indexed.
        ja: この run が source order で生成した新しい Chunk revision を列挙し、単に読み取ったまたは後で index した chunk は含めません。
      allowed_values: []
      pattern: null
      example_value: [chunk-policy-01@v1, chunk-policy-02@v1, chunk-policy-03@v1]
      source_claims: [claim-chunking-run-provenance]
  constraints:
    - id: chunking-run-boundary-parameters
      severity: error
      expression_language: plain
      expression: source_resource_ref, splitter_spec_ref, chunk_size, chunk_overlap, and non-empty output_chunk_refs are required. chunk_size must be positive, chunk_overlap must be non-negative and no greater than chunk_size, and output order must follow source order.
      explanation:
        zh: 可复现的分块需要确定来源、版本化策略和边界参数；没有这些信息的输出不能声称来自一次可审计运行。
        en: Reproducible chunking needs determinate source, versioned strategy, and boundary parameters; output lacking them cannot claim to come from an auditable run.
        ja: 再現可能な chunking には確定 source、版管理 strategy、boundary parameter が必要で、それらを欠く output は audit 可能な run から来たとは主張できません。
      source_claims: [claim-chunking-run-splitting]
    - id: chunking-run-role-boundary
      severity: error
      expression_language: plain
      expression: ChunkingRun must not claim compression of existing chunks, generated situating note, embedding-vector production, index membership, retrieval ranking, or context-package selection. Those facts require distinct activities or artifacts.
      explanation:
        zh: 来源边界计算只生成新的文本片段；压缩、情境化、向量化、检索和上下文选择有不同职责。
        en: Source-boundary computation generates new text segments only; compression, situating, vectorization, retrieval, and context selection have different responsibilities.
        ja: source-boundary computation は新しい text segment だけを生成し、compression、situating、vectorization、retrieval、context selection は異なる responsibility を持ちます。
      source_claims: [claim-chunking-run-boundary]
  required_relations: []
examples:
  - id: chunking-run-example-positive-policy

    labels: {zh: 策略文档分块运行, en: Policy-document chunking run, ja: policy document チャンキング実行}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values:
      chunking_run_id: chunk-81
      source_resource_ref: docs/policy.md@v7
      splitter_spec_ref: recursive-character-v3
      chunk_size: 800
      chunk_overlap: 80
      output_chunk_refs: [chunk-policy-01@v1, chunk-policy-02@v1, chunk-policy-03@v1]
    related_node_ids: [ChunkingRun, ChunkProcessingActivity, IngestibleResource, Chunk]
    related_relation_ids: [ChunkingRun-is_a-ChunkProcessingActivity, ChunkingRun-uses-IngestibleResource, ChunkingRun-generates-Chunk]

    source_claims: [claim-chunking-run-splitting, claim-chunking-run-provenance]
  - id: chunking-run-example-counterexample-config

    labels: {zh: 未执行分割配置, en: Unexecuted splitter configuration, ja: 未実行 splitter configuration}

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values:
      splitter_spec_ref: recursive-character-v3
      chunk_size: 800
      chunk_overlap: 80
      source_resource_ref: null
      output_chunk_refs: []
    related_node_ids: [ChunkingRun]
    related_relation_ids: []

    source_claims: [claim-chunking-run-splitting]
  - id: chunking-run-example-boundary-compression

    labels: {zh: 已有分块压缩, en: Compression of existing chunks, ja: 既存 chunk の compression}

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values:
      compression_run_id: compress-policy-07
      input_chunk_refs: [chunk-policy-18@v2, chunk-policy-19@v2]
      source_resource_ref: null
      output_chunk_ref: chunk-policy-summary-07@v1
    related_node_ids: [ChunkingRun, ChunkCompression]
    related_relation_ids: []

    source_claims: [claim-chunking-run-boundary]
  - id: chunking-run-example-instance-auth

    labels: {zh: 实例：认证文档切分, en: "Instance: authentication document split", ja: "事例：認証 document split"}

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values:
      chunking_run_id: chunk-auth-07
      source_resource_ref: docs/auth.md@v3
      splitter_spec_ref: token-splitter-v2
      chunk_size: 512
      chunk_overlap: 64
      output_chunk_refs: [chunk-api-auth-01@v1, chunk-api-auth-02@v1]
    related_node_ids: [ChunkingRun, IngestibleResource, Chunk]
    related_relation_ids: [ChunkingRun-is_a-ChunkProcessingActivity, ChunkingRun-uses-IngestibleResource, ChunkingRun-generates-Chunk]
    source_claims: [claim-chunking-run-splitting, claim-chunking-run-provenance]
parent_relation:
  id: ChunkingRun-is_a-ChunkProcessingActivity
  predicate: is_a
  target: concept:ChunkProcessingActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是分块处理活动的边界计算子类
    en: is a source-boundary-computation subtype of chunk processing activity
    ja: ChunkProcessingActivity の source-boundary-computation 下位型である
  definitions:
    zh: ChunkingRun is_a ChunkProcessingActivity，表示每次来源边界计算都是处理活动；其种差是读取一个版本化来源并生成有序 Chunk。
    en: ChunkingRun is_a ChunkProcessingActivity means every source-boundary computation is processing activity whose differentia is reading one versioned source and generating ordered Chunks.
    ja: ChunkingRun is_a ChunkProcessingActivity は、すべての source-boundary computation が processing activity であり、一つの版管理 source を読み取り順序付き Chunk を生成することが種差であると表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类关系不规定系统可执行多少次来源切分。
    en: Classification does not prescribe how many source-splitting runs a system may execute.
    ja: 分類関係は system が実行できる source-splitting run 数を規定しません。
  inverse_reading:
    predicate: has_chunking_run_subtype
    labels: {zh: 具有分块运行子类, en: has chunking-run subtype, ja: チャンキング run 下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-chunking-run-subtype]
  distinct_fact_rationale:
    zh: 此关系表达活动类型归属，不表达本次来源资源使用、输出分块生成、策略定义或压缩。
    en: This relation expresses activity type membership, not this run's source use, output generation, strategy definition, or compression.
    ja: この関係は activity type membership を表し、この run の source use、output generation、strategy definition、compression は表しません。
  layout_role: primary-backbone
relations:
  - id: ChunkingRun-uses-IngestibleResource
    predicate: uses
    target: concept:IngestibleResource
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 使用来源资源, en: uses source resource, ja: 情報源 resource を使用する}
    definitions:
      zh: 仅当 source_resource_ref 指向目标资源版本且本运行实际读取它以计算边界时，ChunkingRun 使用该资源。
      en: A ChunkingRun uses an IngestibleResource only when source_resource_ref identifies that resource revision and the run actually read it to compute boundaries.
      ja: source_resource_ref がその resource revision を識別し、run が boundary 計算のため実際に読み取った場合にだけ、ChunkingRun は IngestibleResource を使用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 此概念要求一次运行有一个确定主来源；额外辅助资源须另行记录。
      en: This concept requires one determinate primary source per run; additional auxiliary resources require separate recording.
      ja: この概念では run ごとに一つの確定済み primary source が必要で、追加 auxiliary resource は別記録が必要です。
    inverse_reading:
      predicate: is_used_by_chunking_run
      labels: {zh: 被分块运行使用, en: is used by chunking run, ja: チャンキング run に使用される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-chunking-run-provenance]
    distinct_fact_rationale: "This is concrete source use, not resource containment, source type membership, or output generation."
    layout_role: cross-link
  - id: ChunkingRun-generates-Chunk
    predicate: generates
    target: concept:Chunk
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: causal
    labels: {zh: 生成分块, en: generates chunk, ja: チャンクを生成する}
    definitions:
      zh: 仅当 output_chunk_refs 列出目标的新 Chunk 版本且运行完成时，ChunkingRun 生成该分块。
      en: A ChunkingRun generates a Chunk only when output_chunk_refs lists that new Chunk revision and the run completed.
      ja: output_chunk_refs がその新しい Chunk revision を列挙し、run が完了した場合にだけ、ChunkingRun は Chunk を生成します。
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_generated_by_chunking_run
      labels: {zh: 由分块运行生成, en: is generated by chunking run, ja: チャンキング run により生成される}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-chunking-run-provenance]
    distinct_fact_rationale: "This is concrete output generation and does not make the output information artifact a subtype or component of the activity."
    layout_role: cross-link
sources:
  - id: langchain-text-splitters
    title: LangChain Text Splitters
    source_type: official-project-documentation
    url: https://docs.langchain.com/oss/python/integrations/splitters/index
    relevance: Documents splitting large documents into individually retrievable chunks and recursive splitter configuration with chunk_size and chunk_overlap.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    source_type: standard
    url: https://www.w3.org/TR/prov-o/
    relevance: Distinguishes an Activity from entities it uses and generates.
source_claims:
  - id: claim-chunking-run-splitting
    source: langchain-text-splitters
    supports: LangChain documents text splitters that break large documents into individually retrievable chunks and a RecursiveCharacterTextSplitter configured by chunk_size and chunk_overlap.
    locator: "Text splitters: recursive text splitter, chunk_size, and chunk_overlap"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-chunking-run-boundary
    source: langchain-text-splitters
    supports: The documented splitter computes chunks from source text under a splitting strategy. Moonweave distinguishes this boundary-computation activity from compression or contextualization of existing chunks.
    locator: "Text splitters: splitting strategies and recursive splitting"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunking-run-provenance
    source: w3c-prov-o
    supports: PROV-O distinguishes an Activity from entities it uses and generates. Moonweave applies that distinction to a ChunkingRun, its versioned source resource, and its generated Chunk revisions.
    locator: "PROV-O: Activity, Entity, prov:used, and prov:wasGeneratedBy"
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunking-run-subtype
    source: langchain-text-splitters
    supports: Modeling a source-boundary-computation execution as the ChunkingRun subtype of ChunkProcessingActivity is a Moonweave taxonomy inference based on documented splitter operation.
    locator: "Text splitters: document splitting workflow"
    evidence_kind: ontology-design-inference
    confidence: medium
