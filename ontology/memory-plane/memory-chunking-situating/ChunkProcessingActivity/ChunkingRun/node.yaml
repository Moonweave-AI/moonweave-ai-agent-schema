schema: moonweave.ai/ontology-node/v1
id: ChunkingRun
kind: concept
status: review
labels:
  zh: 分块运行
  en: chunking run
  ja: 分割実行
semantics:
  short_definition:
    zh: 按确定的分割策略把一个版本化来源切成有序 Chunk 集合的 ChunkProcessingActivity。
    en: A ChunkProcessingActivity that applies a defined splitting strategy to a versioned source and emits an ordered Chunk set.
    ja: 定義済み分割方策を版管理された出典へ適用し、順序付きChunk集合を生成する ChunkProcessingActivity です。
  definition:
    zh: ChunkingRun 是一种 ChunkProcessingActivity；其种差是：一次运行消耗一个确定版本的 Document、消息、输出或 MemoryItem，依据记录的 splitter 类型、chunk_size、overlap 和分隔规则计算边界，并产生具有来源顺序与不重叠核心跨度的 Chunk 集合。它不是分割策略本身，也不是任何一个输出 Chunk。
    en: A ChunkingRun is a ChunkProcessingActivity that consumes a specific version of a Document, message, output, or MemoryItem, computes boundaries using a recorded splitter type, chunk_size, overlap, and separator policy, and emits a source-ordered Chunk set with non-overlapping core spans. It is neither the splitting strategy itself nor any output Chunk.
    ja: ChunkingRun は ChunkProcessingActivity の一種で、特定版の Document・message・output・MemoryItemを消費し、記録済みsplitter型、chunk_size、overlap、separator方策で境界を計算し、出典順かつcore範囲が重複しないChunk集合を生成します。分割方策自体でも出力Chunkでもありません。
  why_needed:
    zh: 显式运行记录让同一来源用不同策略重切分时仍能比较产物、复现实验并失效旧索引，避免把分割参数误写成 Chunk 的固有属性。
    en: An explicit run record makes re-splitting the same source reproducible and comparable, supports invalidating stale indexes, and prevents splitter parameters from being mistaken for intrinsic Chunk properties.
    ja: 同一出典を異なる方策で再分割しても成果物比較・再現・旧索引失効ができ、分割parameterをChunk固有属性と誤認しません。
  includes:
    - zh: 纳入 run-policy-v7 这类记录输入文档版本、RecursiveCharacterTextSplitter、chunk_size=800、overlap=80、运行时间和 37 个有序输出 Chunk 的已执行运行。
      en: Includes executed runs such as run-policy-v7 recording an input document version, RecursiveCharacterTextSplitter, chunk_size=800, overlap=80, execution time, and 37 ordered output Chunks.
      ja: 入力文書版、RecursiveCharacterTextSplitter、chunk_size=800、overlap=80、実行時刻、37個の順序付き出力Chunkを記録する run-policy-v7 のような実行済みrunを含みます。
  excludes:
    - zh: 排除 splitter 配置、尚未开始的计划、输出 Chunk 本身、只给已有 Chunk 添加语境的 SituatingPromptRun，以及以已有 Chunk 为输入的 ChunkCompression。
      en: Excludes splitter configuration, an unstarted plan, the output Chunk itself, SituatingPromptRun that only adds context to existing Chunks, and ChunkCompression that consumes existing Chunks.
      ja: splitter設定、未開始計画、出力Chunk自体、既存Chunkへ文脈だけを加える SituatingPromptRun、既存Chunkを入力とする ChunkCompression を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChunkingRun-example-positive-001
    kind: positive
    labels:
      zh: 分块运行正例
      en: Positive example of chunking run
      ja: 分割実行の正例
    scenario_id: null
    descriptions:
      zh: chunk-run-81 在 2026-07-15T09:00Z 读取 doc-policy/v7，使用 RecursiveCharacterTextSplitter、chunk_size=800、overlap=80 和中日文标点分隔规则，产生 37 个按来源排序的 Chunk，并记录成功状态与策略版本 splitter-v3。
      en: At 2026-07-15T09:00Z, chunk-run-81 reads doc-policy/v7, applies RecursiveCharacterTextSplitter with chunk_size=800, overlap=80, and CJK punctuation separators, and emits 37 source-ordered Chunks while recording success and strategy version splitter-v3.
      ja: 2026-07-15T09:00Zに chunk-run-81 は doc-policy/v7 を読み、RecursiveCharacterTextSplitter、chunk_size=800、overlap=80、CJK句読点separatorを適用し、37個の出典順Chunkと成功状態・方策版splitter-v3を記録します。
    field_values:
      processing_run_id: chunk-run-81
      input_ref:
        - doc-policy
      input_version: v7
      processor_spec_ref: splitter-v3
      started_at: 2026-07-15T09:00:00.000Z
      ended_at: 2026-07-15T09:00:02.400Z
      outcome: success
    related_node_ids:
      - ChunkingRun
      - Document
    related_relation_ids:
      - ChunkingRun-consumes-Document
    expected_result:
      zh: 该运行可查询 ChunkingRun 以及方向保持不变的事实 ChunkingRun-consumes-Document。
      en: The run can query ChunkingRun together with direction-preserving fact ChunkingRun-consumes-Document.
      ja: この実行では ChunkingRun と方向を保持した事実 ChunkingRun-consumes-Document を共に照会できます。
    why_valid_or_invalid:
      zh: 输入是版本化来源而非既有 Chunk，运行计算并记录新的分段边界与重叠，输出为有序 Chunk 集合；这些条件完整构成 ChunkingRun。
      en: The input is a versioned source rather than existing Chunks; the run computes and records new segmentation boundaries and overlap and emits an ordered Chunk set, satisfying the ChunkingRun identity conditions.
      ja: 入力は既存Chunkでなく版付き出典で、runが新しい分段境界・overlapを計算記録し、順序付きChunk集合を出力するため ChunkingRun 条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunking-run-003
      - claim-chunking-run-004
  - id: ChunkingRun-example-boundary-001
    kind: boundary
    labels:
      zh: 分块运行边界例
      en: Boundary case for chunking run
      ja: 分割実行の境界例
    scenario_id: null
    descriptions:
      zh: compress-run-22 读取已有 chunks 18–21，并把 2,140 tokens 缩成一个 1,241-token Chunk；它沿用输入 Chunk 的原始边界而不重新切分 Document，因此是 ChunkCompression，不是 ChunkingRun。
      en: compress-run-22 reads existing Chunks 18–21 and reduces 2,140 tokens to one 1,241-token Chunk. It reuses input source boundaries instead of segmenting a Document, so it is ChunkCompression, not ChunkingRun.
      ja: compress-run-22 は既存chunks 18–21を読み2,140 tokensを1,241-tokenの一Chunkへ短縮します。Documentを再分割せず入力出典境界を再利用するため ChunkCompression で ChunkingRun ではありません。
    field_values: {}
    related_node_ids:
      - ChunkingRun
      - Document
      - ChunkCompression
    related_relation_ids:
      - ChunkingRun-consumes-Document
    expected_result:
      zh: ChunkCompression 保持其原有类型，验证器不得凭关系共现把它提升为 ChunkingRun。
      en: ChunkCompression retains its own type; validation must not promote it to ChunkingRun from relation co-occurrence.
      ja: ChunkCompression は元の型を維持し、関係の共起だけで ChunkingRun へ昇格してはなりません。
    why_valid_or_invalid:
      zh: ChunkingRun 的核心是从来源计算分段边界；以已有 Chunk 为输入且只做内容压缩的活动缺少这一种差，即使二者都产生 Chunk。
      en: ChunkingRun is defined by computing segmentation boundaries from a source. An activity that consumes existing Chunks and only compresses content lacks that differentia even if both emit Chunks.
      ja: ChunkingRunの核は出典から分段境界を計算することです。既存Chunkを入力に内容圧縮だけを行う活動は、どちらもChunkを出力してもその種差を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunking-run-005
      - claim-chunking-run-006
