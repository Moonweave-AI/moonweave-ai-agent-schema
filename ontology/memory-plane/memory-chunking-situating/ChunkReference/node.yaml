source_claims:
  - id: claim-chunk-reference-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents read_file exposes line-numbered content and offset/limit addressing for large files. Moonweave generalizes an address plus source version and resolver into ChunkReference, which remains distinct from the target SourceSpan and from the fuller transformation history recorded by ChunkProvenance.
    locator: Deep Agents overview > Virtual filesystem access > read_file
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-reference-002
    source: eng-fw-llamaindex-node-parsers
    supports: LlamaIndex defines each emitted Node as a specific chunk of its parent Document, supporting a resolvable origin binding for ChunkReference. Reifying that binding with a reference ID, target-source version, anchor type/value, resolver, exact SourceSpan, owner, semantic kind, and hierarchy is Moonweave design inference.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-reference-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents read_file returns file content with line numbers and supports offset and limit for large files. Those addressable positions motivate a resolvable ChunkReference, while Moonweave additionally binds a source version and exact SourceSpan.
    locator: Deep Agents overview > Virtual filesystem access > read_file
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-reference-004
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkReference-example-positive-001 begins from LlamaIndex's explicit parent-Document relation for each emitted Node. Making that origin independently addressable as ref-policy-7-003 with source version, anchor, resolver, and exact span is Moonweave design inference; the Node Parser page does not define a ChunkReference record.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > each Node is a specific chunk of its parent Document
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-reference-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents read_file uses line-numbered content and offset/limit as addressing mechanisms; the addressed file range is distinct from the parameters used to point to it. Moonweave expresses that distinction as SourceSpan versus ChunkReference.
    locator: Deep Agents overview > Virtual filesystem access > read_file offset and line numbers
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-reference-006
    source: eng-fw-llamaindex-node-parsers
    supports: ChunkReference-example-boundary-001 uses the documented distinction between a child Node and its parent Document only to establish that a target object is not an address record. The separate SourceSpan-versus-ChunkReference boundary and resolver contract are Moonweave design inference, not defined by LlamaIndex.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction > child Node and parent Document are distinct objects
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-chunk-reference-007
    source: eng-fw-langchain-text-splitters
    supports: The splitter guidance supports retaining document structure and size boundaries; the case makes those anchors explicit as page and character extent.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-chunk-reference-008
    source: eng-fw-langchain-text-splitters
    supports: A bare document URL lacks the start position or structural anchor needed to recover the split extent documented by source-aware splitting guidance.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-chunk-reference-009
    source: eng-fw-langchain-text-splitters
    supports: LangChain documents preservation of source structure and start positions on split documents; Moonweave represents the resolvable versioned extent as SourceSpan.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-chunk-reference-010
    source: eng-fw-langchain-text-splitters
    supports: The versioned character-range reference instantiates the source-position information needed to locate an indexed split.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-chunk-reference-011
    source: eng-fw-langchain-text-splitters
    supports: A processing lineage can be valid provenance without carrying the location information required of a SourceReference specialization.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-chunk-reference-012
