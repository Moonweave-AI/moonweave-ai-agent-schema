schema: moonweave.ai/ontology-node/v1
id: ChunkReference
kind: concept
status: accepted
labels:
  zh: 分块引用
  en: Chunk Reference
  ja: チャンク参照
semantics:
  short_definition:
    zh: 将一次生成回答中的可解析引用标识绑定到具体 Chunk 的溯源链接记录。
    en: A provenance link record that binds a resolvable citation identifier in one generated answer to a concrete Chunk.
    ja: 一つの生成回答内の解決可能な引用識別子を具体的な Chunk に結び付ける来歴リンク記録です。
  definition:
    zh: >
      ChunkReference 是回答或摘要输出中的引用事实，而不是 Chunk 正文本身。它必须同时声明 ref_id（回答内可解析的引用标识）、
      chunk_id（指向保留中的 Chunk 身份）、以及可选的 retrieval_score 与 inline_position，以便审计“该回答依据哪段来源文本”。
      它不等同于 RetrievedCandidate、RetrievalScore、ContextPackage 片段或 ChunkMetadata；候选检索只说明块可被找到，
      而 ChunkReference 说明该块已被某次输出显式引用。若 chunk_id 无法解析到保留块，则该引用无效。
    en: >
      A ChunkReference is a citation fact in an answer or summary output, not the Chunk body itself. It must declare ref_id
      (a resolvable citation identifier within the answer), chunk_id (pointing to a retained Chunk identity), and optional
      retrieval_score and inline_position so auditors can trace which source text supported the output. It is not a
      RetrievedCandidate, RetrievalScore, ContextPackage fragment, or ChunkMetadata; retrieval only shows a chunk was
      findable, while ChunkReference shows the chunk was explicitly cited in an output. If chunk_id cannot resolve to a
      retained chunk, the citation is invalid.
    ja: >
      ChunkReference は回答または要約出力における引用事実であり、Chunk 本文そのものではありません。ref_id（回答内で解決可能な
      引用識別子）、chunk_id（保持中の Chunk 識別子への参照）、任意の retrieval_score と inline_position を宣言し、
      出力がどの source text に基づくか監査できるようにしなければなりません。RetrievedCandidate、RetrievalScore、
      ContextPackage 断片、ChunkMetadata ではありません。検索は Chunk が見つかったことだけを示し、ChunkReference は
      その Chunk が出力で明示的に引用されたことを示します。chunk_id が保持 Chunk に解決できない場合、引用は無効です。
  why_needed:
    zh: >
      RAG 与带引用的代理回答必须区分“检索到的候选”和“实际写入回答的引用”；否则无法向用户或审计者证明某句结论来自哪段来源，
      也无法检测引用指向已删除或错误块的情况。
    en: >
      RAG and citation-bearing agent answers must distinguish retrieved candidates from citations actually written into
      an answer; otherwise users and auditors cannot verify which source span supports a claim or detect citations
      pointing at deleted or wrong chunks.
    ja: >
      RAG と引用付きエージェント回答は、検索された候補と回答に実際に書き込まれた引用を区別しなければなりません。そうでなければ、
      どの source span が主張を支えるかを検証できず、削除済みまたは誤った Chunk を指す引用も検出できません。
  includes:
    - zh: 回答、摘要或工具输出中带有 ref_id、chunk_id，并可记录检索分数与内联位置的显式来源引用。
      en: Explicit source citations in an answer, summary, or tool output with ref_id, chunk_id, and optionally retrieval score and inline position.
      ja: ref_id、chunk_id、任意で retrieval score と inline position を持つ、回答・要約・ツール出力内の明示的 source citation。
  excludes:
    - zh: Chunk 正文、ChunkMetadata、仅检索未引用的 RetrievedCandidate、EmbeddingVector、IndexEntry 以及没有 ref_id 的裸 chunk_id 列表。
      en: Chunk body, ChunkMetadata, RetrievedCandidate retrieved but not cited, EmbeddingVector, IndexEntry, and bare chunk_id lists without ref_id.
      ja: Chunk 本文、ChunkMetadata、引用されていない RetrievedCandidate、EmbeddingVector、IndexEntry、ref_id のない裸の chunk_id 一覧。
  semantic_kind: information
  aliases: [citation link, source citation, inline citation]
engineering:
  explanation:
    zh: >
      在生成完成后，将每个内联引用（如 [1]、[2]）解析为 ChunkReference：ref_id 对应回答中的标记，chunk_id 必须指向
      本次检索或装配中使用的 Chunk 身份，retrieval_score 可记录生成时的相关度（若有），inline_position 记录字符或段落位置。
      LangChain/LlamaIndex 的 cited sources 模式与 RAG 论文中的 attributable generation 都依赖这种“输出引用 ↔ 来源块”的可审计链接，
      而不是把检索分数或向量当作引用本身。
    en: >
      After generation completes, resolve each inline citation (e.g. [1], [2]) into a ChunkReference: ref_id maps to the
      answer marker, chunk_id must point to the Chunk identity used in retrieval or assembly, retrieval_score may record
      relevance at generation time when present, and inline_position records character or segment location. LangChain/LlamaIndex
      cited-source patterns and RAG attributable generation rely on this auditable output-citation-to-source-chunk link,
      not on treating retrieval scores or vectors as citations themselves.
    ja: >
      生成完了後、各 inline citation（例：[1]、[2]）を ChunkReference に解決します。ref_id は回答内マーカーに対応し、
      chunk_id は retrieval または assembly で使った Chunk 識別子を指し、retrieval_score は生成時 relevance を、
      inline_position は文字または段落位置を記録できます。LangChain/LlamaIndex の cited sources と RAG の attributable
      generation は、検索 score や vector を引用そのものとせず、この監査可能な output-citation→source-chunk link に依存します。
  typical_input:
    - description: Retrieved chunks and generated answer with inline markers
      format: |
        {
          "answer_id": "answer-q4-revenue",
          "answer_text": "Q4 revenue was $4.5M [1], with 23% growth [2].",
          "retrieved_chunks": [
            {"chunk_id": "chunk-report-p5", "score": 0.92},
            {"chunk_id": "chunk-report-p8", "score": 0.87}
          ]
        }
  typical_output:
    - description: Resolved citation records bound to chunk identities
      format: |
        {
          "references": [
            {"ref_id": "citation-001", "chunk_id": "chunk-report-p5", "retrieval_score": 0.92, "inline_position": "[1]"},
            {"ref_id": "citation-002", "chunk_id": "chunk-report-p8", "retrieval_score": 0.87, "inline_position": "[2]"}
          ]
        }
  reference_implementations:
    - name: LangChain retriever with source documents
      url: https://docs.langchain.com/oss/python/langchain/retrieval
      description: Documents returning source documents alongside generated answers in RAG workflows.
    - name: LlamaIndex citation and source nodes
      url: https://docs.llamaindex.ai/en/stable/module_guides/querying/response_synthesizers/
      description: Documents response synthesis patterns that retain source node references for attribution.
    - name: RAG paper (Lewis et al. 2020)
      url: https://arxiv.org/abs/2005.11401
      description: Introduces retrieval-conditioned generation where outputs should remain traceable to retrieved passages.
structure:
  identity_keys: [ref_id, answer_id]
  fields:
    - id: ref_id
      labels: {zh: 引用标识, en: citation reference ID, ja: 引用参照 ID}
      definitions:
        zh: 在一次回答输出中稳定解析到一个具体 Chunk 的引用标识；不能复用为 chunk_id 或检索运行标识。
        en: Stable citation identifier within one answer output that resolves to one concrete Chunk; not reused as chunk_id or retrieval-run ID.
        ja: 一つの回答出力内で具体的な Chunk へ安定解決する引用識別子。chunk_id や retrieval-run ID として再利用しません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^citation-[A-Za-z0-9._-]+$'
      example_value: citation-001
      source_claims: [claim-chunk-reference-citations]
    - id: answer_id
      labels: {zh: 回答标识, en: answer ID, ja: 回答 ID}
      definitions:
        zh: 标识包含该引用的生成输出，使同一 ref_id 在不同回答中不会混淆。
        en: Identifies the generated output containing this citation so the same ref_id is not confused across answers.
        ja: この引用を含む生成出力を識別し、同じ ref_id が異なる回答で混同されないようにします。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^answer-[A-Za-z0-9._-]+$'
      example_value: answer-q4-revenue
      source_claims: [claim-chunk-reference-citations]
    - id: chunk_id
      labels: {zh: 引用的分块标识, en: referenced chunk ID, ja: 参照チャンク ID}
      definitions:
        zh: 被引用的 Chunk 身份；必须能解析到保留中的来源块，不能是自由文本或相似度分数。
        en: Identity of the cited Chunk; must resolve to a retained source chunk, not free text or a similarity score.
        ja: 引用された Chunk の識別子。自由テキストや類似度 score ではなく、保持中の source chunk に解決できなければなりません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: '^chunk-[A-Za-z0-9._-]+$'
      example_value: chunk-report-p5
      source_claims: [claim-chunk-reference-citations]
    - id: retrieval_score
      labels: {zh: 检索相关度, en: retrieval relevance score, ja: 検索関連度}
      definitions:
        zh: 可选记录生成引用时该块的相关度；它是引用时的证据快照，不是 RetrievalScore 对象本身。
        en: Optionally records chunk relevance at citation time; an evidence snapshot, not the RetrievalScore object itself.
        ja: 引用時点の chunk relevance を任意記録する証拠スナップショットであり、RetrievalScore オブジェクト自体ではありません。
      datatype: number
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: 0.92
      source_claims: [claim-chunk-reference-citations]
    - id: inline_position
      labels: {zh: 内联位置, en: inline position, ja: インライン位置}
      definitions:
        zh: 回答文本中该引用出现的位置标记（如 [1] 或脚注编号），便于 UI 与审计对齐。
        en: Marker position in answer text where the citation appears (e.g. [1] or footnote number) for UI and audit alignment.
        ja: 引用が現れる回答テキスト内の位置マーカー（例：[1] や脚注番号）。UI と監査の整合に使います。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      allowed_values: []
      pattern: null
      example_value: "[1]"
      source_claims: [claim-chunk-reference-citations]
  constraints:
    - id: chunk-reference-resolves-one-chunk
      severity: error
      expression_language: plain
      expression: ref_id and answer_id must be non-empty, chunk_id must resolve to a retained Chunk identity, and retrieval_score if present must not substitute for chunk_id or ref_id.
      explanation:
        zh: 引用记录必须把回答中的一个引用标识连接到可解析的具体块；正文、孤立分数或未解析 chunk_id 不能代替该链接。
        en: A citation record must link one answer reference identifier to a resolvable concrete chunk; body text, an isolated score, or an unresolved chunk_id cannot substitute for that link.
        ja: citation record は回答内の一つの参照識別子を解決可能な具体的 Chunk へ結び、body text、単独 score、未解決 chunk_id でその link を置き換えてはいけません。
      source_claims: [claim-chunk-reference-citations]
    - id: chunk-reference-not-retrieval-candidate
      severity: error
      expression_language: plain
      expression: A RetrievedCandidate or retrieval score alone does not establish ChunkReference; explicit ref_id and citation in the generating output are required.
      explanation:
        zh: 检索候选只说明块可被找到；只有输出中显式引用并绑定 ref_id 后才形成 ChunkReference。
        en: A retrieval candidate only shows a chunk was findable; ChunkReference forms only after explicit citation with ref_id in the output.
        ja: 検索候補は Chunk が見つかったことだけを示します。出力での明示引用と ref_id 绑定後に ChunkReference が成立します。
      source_claims: [claim-chunk-reference-boundary]
  required_relations: []
examples:
  - id: ChunkReference-example-positive-revenue-citation

    labels: {zh: RAG 回答引用来源, en: RAG answer source citation, ja: RAG 回答ソース引用}

    descriptions:
      zh: Anthropic Contextual Retrieval：50-100 token 语境前缀 + Contextual BM25；RAPTOR 叶节点分块；LlamaIndex SentenceSplitter node parser。
      en: Anthropic Contextual Retrieval: 50-100 token context prefix + Contextual BM25; RAPTOR leaf chunking; LlamaIndex SentenceSplitter node parser.
      ja: Anthropic Contextual Retrieval 50-100 token prefix + Contextual BM25。RAPTOR leaf chunking。LlamaIndex SentenceSplitter。
    field_values:
      ref_id: citation-001
      answer_id: answer-q4-revenue
      chunk_id: chunk-report-p5
      retrieval_score: 0.92
      inline_position: "[1]"
    related_node_ids: [ChunkReference, Chunk, ChunkMetadata]
    related_relation_ids: []

    source_claims: [claim-chunk-reference-citations]
  - id: ChunkReference-example-boundary-retrieved-not-cited

    labels:
      zh: 已检索但尚未引用的块
      en: Retrieved but not yet cited chunk
      ja: 取得済みだが未引用の Chunk

    descriptions:
      zh: ChunkingRun 产出 Chunk vs EmbeddingRun 读取 Chunk 生成向量（memory-embedding-indexes 模块）。
      en: ChunkingRun produces Chunk vs EmbeddingRun reads Chunk for vectors (memory-embedding-indexes module).
      ja: ChunkingRun Chunk 生成 vs EmbeddingRun vector 生成（memory-embedding-indexes）。
    field_values:
      chunk_id: chunk-report-p5
      retrieval_status: retrieved
      ref_id: absent
      answer_id: answer-q4-revenue
    related_node_ids: [ChunkReference, Chunk, RetrievedCandidate]
    related_relation_ids: []

    source_claims: [claim-chunk-reference-boundary]
  - id: ChunkReference-example-counterexample-missing-chunk

    labels:
      zh: 指向不存在块的引用
      en: Citation pointing to a missing chunk
      ja: 存在しない Chunk を指す引用

    descriptions:
      zh: 反例：语境前缀覆盖 Chunk 正文且无 ChunkProvenance 与独立 SituatedChunk ID。
      en: Counterexample: context prefix overwrites Chunk body without ChunkProvenance or distinct SituatedChunk ID.
      ja: 反例：文脈 prefix が Chunk body 上書き。ChunkProvenance/SituatedChunk ID なし。
    field_values:
      ref_id: citation-004
      answer_id: answer-q4-revenue
      chunk_id: chunk-deleted-19
    related_node_ids: [ChunkReference, Chunk]
    related_relation_ids: []

    source_claims: [claim-chunk-reference-citations]
  - id: ChunkReference-example-instance-annual-report

    labels:
      zh: 实例：年度报告收入引用
      en: "Instance: annual-report revenue citation"
      ja: インスタンス：年次報告の収益引用

    descriptions:
      zh: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector。
      en: Anthropic cookbook contextualize_prompt → prepend → text-embedding-3-small → Pinecone upsert situated vector.
      ja: Anthropic cookbook contextualize_prompt→prepend→embed→Pinecone upsert situated vector。
    field_values:
      ref_id: citation-001
      answer_id: answer-q4-revenue
      chunk_id: chunk-report-p5
      retrieval_score: 0.92
      inline_position: "[1]"
    related_node_ids: [ChunkReference, Chunk, ChunkMetadata]
    related_relation_ids: []

    source_claims: [claim-chunk-reference-citations]
parent_relation: null
relations: []
sources:
  - id: langchain-retrieval
    title: LangChain retrieval
    url: https://docs.langchain.com/oss/python/langchain/retrieval
    source_type: official-documentation
    relevance: Documents RAG retrieval returning source documents that answers may cite.
  - id: llamaindex-response-synthesizers
    title: LlamaIndex response synthesizers
    url: https://docs.llamaindex.ai/en/stable/module_guides/querying/response_synthesizers/
    source_type: official-documentation
    relevance: Documents synthesis patterns retaining source node references for attribution.
  - id: rag-paper
    title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    url: https://arxiv.org/abs/2005.11401
    source_type: academic-paper
    relevance: Introduces retrieval-conditioned generation where outputs should trace to retrieved passages.
source_claims:
  - id: claim-chunk-reference-citations
    source: rag-paper
    supports: RAG combines retrieved non-parametric passages with generation; Moonweave models ChunkReference as an auditable link from generated output markers to retained Chunk identity rather than conflating retrieval candidates with citations.
    locator: Abstract and retrieve-then-generate architecture
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-reference-boundary
    source: langchain-retrieval
    supports: LangChain distinguishes retriever output (source documents) from the generated answer; Moonweave requires explicit ref_id and output citation before a RetrievedCandidate becomes a ChunkReference.
    locator: Retrieval overview and retriever building block
    evidence_kind: ontology-design-inference
    confidence: high
