schema: moonweave.ai/ontology-node/v1
id: ChunkReference
kind: concept
labels:
  zh: 分块引用
  en: Chunk reference
  ja: チャンク参照
semantics:
  short_definition:
    zh: 把片段精确映射回 Document 版本与跨度的引用边。
    en: Reference edge mapping fragment precisely to Document version and span.
    ja: fragment を Document 版+span へ精确映射する参照 edge。
  definition:
    zh: ChunkReference 是独立概念节点，表示 Chunk 与 pinned Document 版本及 SourceSpan（字符/句级边界）之间的精确映射关系。ChunkReference 使检索命中与 compliance 引用能回到 doc-policy/v7 的 1600–2400 偏移；不是 Chunk 本身或 ChunkMetadata 字段副本。
    en: ChunkReference is a standalone concept representing precise mapping between Chunk and pinned Document version plus SourceSpan (character or sentence boundaries). ChunkReference lets retrieval hits and compliance citations return to doc-policy/v7 offsets 1600–2400; not the Chunk itself or a duplicate ChunkMetadata field set.
    ja: ChunkReference は Chunk と pinned Document 版+SourceSpan（文字/文境界）間の精确 mapping を表す独立 concept。retrieval hit/compliance 引用→doc-policy/v7 1600–2400。Chunk 自体/ChunkMetadata 複製非。
  why_needed:
    zh: metadata.source  alone 不能证明跨度边界；ChunkReference 把 chunk_id 与 document_id+version+start/end 绑成可验证事实。
    en: metadata.source alone cannot prove span boundaries; ChunkReference binds chunk_id to document_id+version+start/end as verifiable fact.
    ja: metadata.source のみでは span 境界証明不可。ChunkReference が chunk_id↔document+span を verifiable fact に binding。
  includes:
    - zh: 纳入具 reference_id、chunk_id、document_id、document_version 与 span 边界的映射记录。
      en: Includes mapping records with reference_id, chunk_id, document_id, document_version, and span boundaries.
      ja: reference_id/chunk_id/document_id/document_version/span boundary 付き mapping record。
  excludes:
    - zh: 排除 Chunk 正文、ChunkingRun 与无 document_version 的模糊 source 字符串。
      en: Excludes Chunk body, ChunkingRun, and vague source strings without document_version.
      ja: Chunk 本文/ChunkingRun/document_version なし模糊 source を除外。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: LangChain start_index + source + ChunkReference→doc-policy/v7 span；LlamaIndex source_node relationship 映射相同事实；Pinecone metadata.chunk_id 检索后通过 ChunkReference 解析完整 span。
    en: LangChain start_index + source + ChunkReference→doc-policy/v7 span; LlamaIndex source_node relationship maps same fact; Pinecone metadata.chunk_id resolves full span via ChunkReference after retrieval.
    ja: LangChain start_index+ChunkReference→span。LlamaIndex source_node 同 fact。Pinecone chunk_id→ChunkReference→span。
  typical_input: []
  typical_output:
    - description: Chunk reference record
      format: |
        {
          "reference_id": "ref-chunk-policy-7-003",
          "chunk_id": "chunk-policy-7-003",
          "document_id": "doc-policy",
          "document_version": "v7",
          "source_span_start": 1600,
          "source_span_end_exclusive": 2400
        }
      source_claims: [claim-chunk-reference-design]
  reference_implementations:
    - name: LangChain Document
      url: https://python.langchain.com/docs/concepts/document/
      description: start_index metadata for span reconstruction.
    - name: LlamaIndex TextNode
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      description: source_node relationships for provenance.
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/news/contextual-retrieval
      description: Citation back to original document spans.
structure:
  identity_keys: [reference_id]
  fields:
    - id: reference_id
      labels: {zh: 引用标识, en: Reference identifier, ja: 参照 ID}
      definitions:
        zh: 唯一标识一条 ChunkReference 映射事实。
        en: Uniquely identifies one ChunkReference mapping fact.
        ja: 一 ChunkReference mapping fact を一意識別。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ref-chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-chunk-reference-id]
    - id: chunk_id
      labels: {zh: 分块标识, en: Chunk identifier, ja: チャンク ID}
      definitions:
        zh: 被引用的 Chunk chunk_id。
        en: chunk_id of referenced Chunk.
        ja: 参照 Chunk chunk_id。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-chunk-reference-chunk]
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: 文書 ID}
      definitions:
        zh: 来源 Document lineage ID（memory-ingestion 产出）。
        en: Source Document lineage ID (from memory-ingestion).
        ja: 源 Document lineage ID（memory-ingestion 产出）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: doc-policy
      allowed_values: []
      source_claims: [claim-chunk-reference-doc]
    - id: document_version
      labels: {zh: 文档版本, en: Document version, ja: 文書版}
      definitions:
        zh: pinned 不可变 Document 版本。
        en: Pinned immutable Document version.
        ja: pinned 不変 Document 版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: v7
      allowed_values: []
      source_claims: [claim-chunk-reference-doc]
    - id: source_span_start
      labels: {zh: 来源起始偏移, en: Source span start, ja: source span 開始}
      definitions:
        zh: 规范化 Document 正文起始偏移（含）。
        en: Start offset (inclusive) in normalized Document body.
        ja: 正規化 Document 本文開始 offset（含）。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1600
      allowed_values: []
      source_claims: [claim-chunk-reference-span]
    - id: source_span_end_exclusive
      labels: {zh: 来源结束偏移, en: Source span end exclusive, ja: source span 終了排他}
      definitions:
        zh: 规范化 Document 正文结束偏移（不含）。
        en: End offset (exclusive) in normalized Document body.
        ja: 正規化 Document 本文終了 offset（不含）。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2400
      allowed_values: []
      source_claims: [claim-chunk-reference-span]
  constraints:
    - id: reference-requires-pinned-version
      severity: error
      expression_language: plain
      expression: ChunkReference must bind document_id and document_version together with span boundaries.
      explanation:
        zh: 无版本 pinning 无法证明引用哪版源文。
        en: Without version pinning you cannot prove which source version is cited.
        ja: version pin なしでは引用源版証明不可。
      source_claims: [claim-chunk-reference-design]
  required_relations: []
examples:
  - id: ChunkReference-example-langchain-span
    labels:
      zh: LangChain 跨度引用
      en: LangChain span reference
      ja: LangChain span 参照
    descriptions:
      zh: ref-chunk-policy-7-003 把 chunk-policy-7-003 映射到 doc-policy/v7 偏移 1600–2400，来自 Document metadata start_index=1600。
      en: ref-chunk-policy-7-003 maps chunk-policy-7-003 to doc-policy/v7 offsets 1600–2400 from Document metadata start_index=1600.
      ja: ref-chunk-policy-7-003→doc-policy/v7 1600–2400。start_index=1600 由来。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/concepts/document/
      version: start_index metadata
    field_values:
      reference_id: ref-chunk-policy-7-003
      chunk_id: chunk-policy-7-003
      document_id: doc-policy
      document_version: v7
      source_span_start: 1600
      source_span_end_exclusive: 2400
    related_node_ids:
      - ChunkReference
      - Chunk
      - ChunkMetadata
    related_relation_ids: []
    source_claims:
      - claim-chunk-reference-langchain
      - claim-chunk-reference-design
  - id: ChunkReference-example-llamaindex-node
    labels:
      zh: LlamaIndex 节点引用
      en: LlamaIndex node reference
      ja: LlamaIndex node 参照
    descriptions:
      zh: TextNode source_node 指向 doc-policy/v7；ChunkReference 记录 start_char_idx=1600 end_char_idx=2400 与 chunk-policy-7-003 绑定。
      en: TextNode source_node points to doc-policy/v7; ChunkReference records start_char_idx=1600 end_char_idx=2400 bound to chunk-policy-7-003.
      ja: TextNode source_node→doc-policy/v7。ChunkReference 1600–2400↔chunk-policy-7-003。
    example_source:
      product: LlamaIndex
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
      version: source_node relationship
    field_values:
      reference_id: ref-chunk-policy-7-003
      chunk_id: chunk-policy-7-003
    related_node_ids:
      - ChunkReference
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-reference-llamaindex
      - claim-chunk-reference-design
  - id: ChunkReference-example-retrieval-citation
    labels:
      zh: 检索引用回溯
      en: Retrieval citation trace-back
      ja: 检索引用 traceback
    descriptions:
      zh: RetrievedChunk 命中 entry-17 metadata.chunk_id=chunk-policy-7-003 后，ChunkReference 解析到 policy.pdf v7 第 2 页字符 1600–2400 供 compliance 引用。
      en: RetrievedChunk hit entry-17 metadata.chunk_id=chunk-policy-7-003 resolves via ChunkReference to policy.pdf v7 page 2 chars 1600–2400 for compliance citation.
      ja: RetrievedChunk chunk_id→ChunkReference→policy.pdf v7 p2 1600–2400 compliance 引用。
    example_source:
      product: Pinecone
      url: https://docs.pinecone.io/guides/data/upsert-data
      version: metadata chunk_id
    field_values:
      chunk_id: chunk-policy-7-003
      source: policy.pdf
      page: 2
    related_node_ids:
      - ChunkReference
      - memory-retrieval-ranking
      - IndexEntry
    related_relation_ids: []
    source_claims:
      - claim-chunk-reference-design
  - id: ChunkReference-example-not-chunk-body
    labels:
      zh: 引用非分块正文
      en: Reference is not chunk body
      ja: 参照は chunk 本文ではない
    descriptions:
      zh: chunk-policy-7-003 含 JWT bearer… 正文；ChunkReference 只记录映射关系不含文本内容。
      en: chunk-policy-7-003 contains JWT bearer… body text; ChunkReference records mapping only without text content.
      ja: chunk-policy-7-003=本文。ChunkReference=mapping のみ文本不含。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ChunkReference
      - Chunk
    related_relation_ids: []
    source_claims:
      - claim-chunk-reference-design
parent_relation: null
relations: []
sources:
  - id: src-langchain-document
    title: LangChain Document Concept
    publisher: LangChain
    url: https://python.langchain.com/docs/concepts/document/
    source_type: official-doc
    relevance: start_index for span reconstruction.
  - id: src-llamaindex-textnode
    title: LlamaIndex Documents and Nodes
    publisher: LlamaIndex
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/ingestion_pipeline/
    source_type: official-doc
    relevance: source_node provenance links.
  - id: src-anthropic-contextual
    title: Anthropic Contextual Retrieval
    publisher: Anthropic
    url: https://www.anthropic.com/news/contextual-retrieval
    source_type: official-doc
    relevance: Citation trace-back to original spans.
  - id: src-chunk-reference-design
    title: Moonweave memory-chunking-situating module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ChunkReference mapping versus Chunk content.
source_claims:
  - id: claim-chunk-reference-langchain
    source: src-langchain-document
    supports: LangChain Document metadata start_index supports reconstructing document span references for chunks.
    locator: Document metadata
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-reference-llamaindex
    source: src-llamaindex-textnode
    supports: LlamaIndex TextNode source_node and char indices support chunk-to-document span mapping.
    locator: Root nodes provenance
    evidence_kind: primary-doc
    confidence: high
  - id: claim-chunk-reference-design
    source: src-chunk-reference-design
    supports: ChunkReference binds chunk_id to pinned document version and span boundaries as verifiable mapping fact.
    locator: ChunkReference boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-reference-id
    source: src-chunk-reference-design
    supports: reference_id identifies one mapping fact.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-reference-chunk
    source: src-chunk-reference-design
    supports: chunk_id links reference to Chunk.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-reference-doc
    source: src-chunk-reference-design
    supports: document_id and document_version pin cited document revision.
    locator: structure
    evidence_kind: design-inference
    confidence: high
  - id: claim-chunk-reference-span
    source: src-chunk-reference-design
    supports: source_span_start and source_span_end_exclusive locate evidence in document body.
    locator: structure
    evidence_kind: design-inference
    confidence: high
