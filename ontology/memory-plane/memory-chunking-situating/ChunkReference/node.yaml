schema: moonweave.ai/ontology-node/v1
id: ChunkReference
kind: concept
status: review
labels:
  zh: 分块引用
  en: chunk reference
  ja: チャンク参照
semantics:
  short_definition:
    zh: 把一个 Chunk 定位到特定来源版本中精确 SourceSpan 的可解析引用记录。
    en: A resolvable reference record locating one Chunk at an exact SourceSpan in a specific source version.
    ja: 一つのChunkを特定出典版の正確なSourceSpanへ位置付ける解決可能な参照記録です。
  definition:
    zh: ChunkReference 是附着于 Chunk 的信息记录；其种差是：它以 reference_id 为身份，保存目标来源 ID 与版本、锚点类型及值（页码、行号、字符/字节偏移、DOM/JSON 指针等），并可解析到一个确切 SourceSpan。它只回答“去哪里核对”，不记录产生 Chunk 的完整转换谱系，也不是目标 SourceSpan 本身。
    en: ChunkReference is an information record attached to a Chunk and identified by reference_id. It stores target source ID and version plus an anchor type and value—page, line, character or byte offset, DOM path, JSON pointer, and so on—and resolves to one exact SourceSpan. It answers where to verify, not the full transformation lineage that produced the Chunk, and is not the target SourceSpan itself.
    ja: ChunkReference はChunkに付随し reference_id で識別される情報記録です。対象出典IDと版、anchor型・値（page、line、文字／byte offset、DOM path、JSON pointer等）を保存し、一つの正確なSourceSpanへ解決します。「どこで確認するか」を答えるだけで、Chunk生成の全変換系譜でも対象SourceSpan自体でもありません。
  why_needed:
    zh: 显式引用让检索结果可回到原文精确位置、检测来源版本漂移，并将“来源在哪里”与“来源经历了哪些处理”这两个问题分开。
    en: Explicit references let retrieval return to the exact original location, detect source-version drift, and separate where the source is from how it was transformed.
    ja: 明示参照により検索結果を原文の正確な位置へ戻し、出典版driftを検知し、「どこにあるか」と「どう変換されたか」を分離できます。
  includes:
    - zh: 纳入 ref-policy-7-003 这类指向 doc-policy/v7 第 12 页、字符 1600–2399，并能解析为 source-span-policy-12 的版本化引用。
      en: Includes versioned references such as ref-policy-7-003 pointing to page 12 and characters 1600–2399 of doc-policy/v7 and resolving to source-span-policy-12.
      ja: doc-policy/v7の12頁・文字1600–2399を指し source-span-policy-12へ解決する ref-policy-7-003 のような版付き参照を含みます。
  excludes:
    - zh: 排除 SourceSpan 本身、只有文档首页 URL 的不可定位链接、ChunkProvenance、来源内容副本、检索分数，以及未声明目标版本而可能漂移的行号。
      en: Excludes the SourceSpan itself, an unlocatable document-home URL, ChunkProvenance, copied source content, retrieval scores, and line numbers without a target version that may drift.
      ja: SourceSpan自体、位置解決不能な文書home URL、ChunkProvenance、出典内容copy、検索score、対象版を欠きdriftし得る行番号を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ChunkReference-example-positive-001
    kind: positive
    labels:
      zh: 分块引用正例
      en: Positive example of chunk reference
      ja: チャンク参照の正例
    scenario_id: null
    descriptions:
      zh: ref-policy-7-003 附着于 chunk-policy-7-003，目标为 doc-policy/v7，锚点是 page=12、char=1600–2399；解析器将它唯一解析为 source-span-policy-12，并校验目标版本摘要。
      en: ref-policy-7-003 attaches to chunk-policy-7-003 and targets doc-policy/v7 with anchors page=12 and char=1600–2399. The resolver uniquely resolves it to source-span-policy-12 and validates the target-version digest.
      ja: ref-policy-7-003 は chunk-policy-7-003 に付随し、doc-policy/v7 の page=12、char=1600–2399 を指します。resolverは source-span-policy-12へ一意に解決し対象版digestを検証します。
    field_values:
      reference_id: ref-policy-7-003
      reference_value: doc://doc-policy/v7#page=12&char=1600-2399
    related_node_ids:
      - ChunkReference
      - SourceSpan
    related_relation_ids:
      - chunk_reference_targets_source_span
    expected_result:
      zh: 该运行可查询 ChunkReference 以及方向保持不变的事实 chunk_reference_targets_source_span。
      en: The run can query ChunkReference together with direction-preserving fact chunk_reference_targets_source_span.
      ja: この実行では ChunkReference と方向を保持した事実 chunk_reference_targets_source_span を共に照会できます。
    why_valid_or_invalid:
      zh: 引用具有独立 reference_id、目标来源版本、锚点类型和值，并能解析到唯一 SourceSpan；它回答核验位置而不复制目标内容。
      en: The reference has its own ID, target source version, anchor type and value, and resolves to one SourceSpan. It answers where to verify without copying the target content.
      ja: 独自reference_id、対象出典版、anchor型・値を持ち一SourceSpanへ解決し、対象内容をcopyせず確認位置を答えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-reference-003
      - claim-chunk-reference-004
  - id: ChunkReference-example-boundary-001
    kind: boundary
    labels:
      zh: 分块引用边界例
      en: Boundary case for chunk reference
      ja: チャンク参照の境界例
    scenario_id: null
    descriptions:
      zh: source-span-policy-12 是 doc-policy/v7 中实际字符 1600–2399 的来源范围；它是被定位的位置，没有 reference_id、解析规则或“从哪个 Chunk 指来”的身份，因此是 SourceSpan 而不是 ChunkReference。
      en: source-span-policy-12 is the actual character range 1600–2399 in doc-policy/v7. It is the located target and has no reference ID, resolution rule, or identity stating which Chunk points to it, so it is SourceSpan rather than ChunkReference.
      ja: source-span-policy-12 は doc-policy/v7 の実文字範囲1600–2399です。位置付け対象で、reference_id、解決規則、どのChunkから指すかの同一性を持たないため SourceSpan で ChunkReference ではありません。
    field_values: {}
    related_node_ids:
      - ChunkReference
      - SourceSpan
    related_relation_ids:
      - chunk_reference_targets_source_span
    expected_result:
      zh: SourceSpan 保持其原有类型，验证器不得凭关系共现把它提升为 ChunkReference。
      en: SourceSpan retains its own type; validation must not promote it to ChunkReference from relation co-occurrence.
      ja: SourceSpan は元の型を維持し、関係の共起だけで ChunkReference へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 引用是可解析指针，SourceSpan 是其目标位置；二者关系类似地址与被地址对象，不能因端点相连而互换类型。
      en: A reference is a resolvable pointer and SourceSpan is its target location. They relate like an address and addressed object and cannot exchange types merely because they are endpoints.
      ja: 参照は解決可能pointer、SourceSpanは対象位置で、addressとaddress対象の関係にあり端点接続だけで型交換できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-chunk-reference-005
      - claim-chunk-reference-006
