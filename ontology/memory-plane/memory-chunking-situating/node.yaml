        en: Ingested documents versus derived fragments
        ja: 取込文書と派生断片
      candidate_concept_ids:
        - Chunk
        - ChunkingRun
      overlap_reason:
        zh: 两者都包含文档内容，但接入文档由来源和载入身份确定，Chunk 由特定来源跨度和分块运行确定。 本条仅记录 Chunk、ChunkingRun；其 canonical owner 是分块与语境化（memory-chunking-situating），因此 memory-chunking-situating 在此拥有这些概念。
        en: Both contain document content, but an ingested document is identified by source and loading while a Chunk is identified by a specific source span and chunking run. This record is limited to Chunk, ChunkingRun; their canonical owner is Chunking and contextualization (memory-chunking-situating), so memory-chunking-situating owns these concepts here.
        ja: どちらも文書内容を含みますが、取込文書は出典と読込、Chunk は特定出典範囲とチャンク化実行で識別されます。 この記録は Chunk、ChunkingRun だけを対象とし、canonical owner はチャンク化と文脈化（memory-chunking-situating）です。したがって memory-chunking-situating はここでこれらを所有します。
      disambiguation_test:
        zh: 若对象覆盖接入后的整体记录且没有分块位置，则归记忆接入；若身份需要 source span 或 chunk order，则归分块与语境化。
        en: If the object covers the whole ingested record without a chunk position, it belongs to memory ingestion; if identity requires a source span or chunk order, it belongs to chunking and contextualization.
