        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验确认 ChunkArtifact 是分块产物信息家族，ChunkProcessingActivity 是分块、语境化或压缩的有界活动家族；信息产物与活动身份不同，保留两根。ChunkReference 是 SourceReference 的专门类型，并通过普通 has_reference 关联具体 Chunk，不再作为 Chunk 的组成骨架子节点。
            en: Point-by-point review confirms ChunkArtifact as the chunk-output information family and ChunkProcessingActivity as the bounded activity family for chunking, situating, or compression; information product and activity identities differ, so two roots remain. ChunkReference is a specialized SourceReference and is linked to a concrete Chunk through ordinary has_reference rather than treated as a compositional backbone child of Chunk.
            ja: 個別審査により ChunkArtifact は chunk 成果物情報 family、ChunkProcessingActivity は chunking・situating・compression の有界活動 family と確認し、情報成果物と活動の同一性が異なるため二 root を維持します。ChunkReference は SourceReference の専用型で、具体 Chunk とは通常 has_reference で結び Chunk の組成骨格子にはしません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: ChunkProcessingActivity 是唯一根，并以 produces 接到 ChunkArtifact；Chunk 与 SituatedChunk 再用 is_a 在产物层展开，ChunkMetadata 通过 has_metadata 细化具体 Chunk。produces 只在同一运行、来源范围、parser 版本和新产物身份齐备时成立；读取或复用缓存产物不算生成。ChunkReference 继续沿 SourceReference 上位链展开，has_reference 保持可复用跨链。
            en: ChunkProcessingActivity is the sole root and reaches ChunkArtifact through produces. Chunk and SituatedChunk then specialize the artifact layer through is_a, while has_metadata details a concrete Chunk. produces requires the same run, source range, parser version, and new artifact identity; reading or reusing a cached artifact is not generation. ChunkReference remains under the SourceReference supertype chain and has_reference remains a reusable cross-link.
            ja: ChunkProcessingActivity を唯一 root とし produces で ChunkArtifact に接続します。Chunk と SituatedChunk は artifact layer の is_a subtype、ChunkMetadata は has_metadata で具体 Chunk を詳細化します。produces には同一 run・source range・parser version・new artifact identity が必要で、cache artifact の read/reuse は generation ではありません。ChunkReference は SourceReference chain、has_reference は reusable cross-link を維持します。
