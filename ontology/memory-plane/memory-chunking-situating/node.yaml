    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-chunking-situating-006
  - id: memory-chunking-situating-cq-contextualization-fidelity-v3-example-positive
    kind: positive
    labels:
      zh: 语境忠实正例
      en: Contextualization fidelity positive case
      ja: 文脈化忠実性の正例
    scenario_id: null
    descriptions:
      zh: situate-run-84 消费 chunk-84 并生成 situated-84；后者 contextualizes 同一 chunk-84，逐字保存正文和 SourceSpan，把说明放在 context 字段。
      en: situate-run-84 consumes chunk-84 and produces situated-84; the result contextualizes that same chunk, preserves body and SourceSpan verbatim, and stores explanation in a context field.
      ja: situate-run-84 は chunk-84 を消費し situated-84 を生成し、同じ chunk を文脈化して本文・SourceSpanを逐語保持し説明をcontext項目に保存します。
    field_values:
      situating_run_id: situate-run-84
      source_chunk_id: chunk-84
      situated_chunk_id: situated-84
      source_span: doc-sec-2025@v4#chars=8120-8699
      source_body_sha256_before: 6de7933f9d8752f55acd52893f3a0f13b7b7e8efde904fb16a8ca828f6cea03a
      source_body_sha256_after: 6de7933f9d8752f55acd52893f3a0f13b7b7e8efde904fb16a8ca828f6cea03a
      context_field: context_note
      context_text: This passage states ACME's Q2 2025 revenue policy exception.
      contextualizes_source_chunk: true
    related_node_ids:
      - SituatingPromptRun
      - Chunk
      - SituatedChunk
    related_relation_ids:
      - SituatingPromptRun-consumes-Chunk
      - SituatingPromptRun-produces-SituatedChunk
      - SituatedChunk-contextualizes-Chunk
    expected_result:
      zh: 返回同一来源分块与独立派生产物，并验证正文摘要不变。
      en: Return the same source Chunk and a separate derived artifact, verifying an unchanged body digest.
      ja: 同一元Chunkと別派生成果物を返し本文digest不変を検証します。
    why_valid_or_invalid:
      zh: 活动输入、输出与回指关系一致且附加文本可分离。
      en: Activity input, output, and back-reference agree, and added text is separable.
      ja: 活動入力・出力・逆参照が一致し追加文は分離可能です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-chunking-situating-007
  - id: memory-chunking-situating-cq-contextualization-fidelity-v3-example-counter
    kind: counterexample
    labels:
      zh: 语境混入反例
      en: Context mixing counterexample
      ja: 文脈混入の反例
    scenario_id: null
    descriptions:
      zh: situated-bad 把生成说明改写进原段落，既无原 Chunk 回指，也无法恢复原正文摘要和 SourceSpan。
      en: situated-bad rewrites generated explanation into the source paragraph, has no source-Chunk link, and cannot recover the original body digest or SourceSpan.
      ja: situated-bad は生成説明を原段落へ書込み、元Chunk参照がなく原本文digest・SourceSpanを復元できません。
    field_values:
      candidate_id: situated-bad
      mixed_body_sha256: 6f12785f4f4ba09e4f1e11e6753054be433d8d241e9fcceaddb5ca83f22778b7
      source_chunk_link_present: false
      original_body_digest_recoverable: false
      source_span_recoverable: false
      generated_context_separable: false
      classification_decision: reject-situated-chunk
    related_node_ids:
      - SituatingPromptRun
      - Chunk
      - SituatedChunk
    related_relation_ids:
      - SituatingPromptRun-consumes-Chunk
      - SituatingPromptRun-produces-SituatedChunk
      - SituatedChunk-contextualizes-Chunk
    expected_result:
      zh: 拒绝 SituatedChunk 分类并标记证据边界被破坏。
      en: Reject SituatedChunk classification and flag the broken evidence boundary.
      ja: SituatedChunk分類を拒否し証拠境界破壊を示します。
    why_valid_or_invalid:
      zh: 不可分离的生成文本会改变来源主张与证据跨度。
      en: Inseparable generated text changes source claims and the evidentiary span.
      ja: 分離不能生成文は出典主張・証拠範囲を変えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-chunking-situating-008
