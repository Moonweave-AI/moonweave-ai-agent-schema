      en: Report the chunk as non-reproducible and enumerate the missing run, document version, and splitter profile instead of guessing from length.
      ja: 長さから算法を推測せず、欠落する run・document version・splitter profile を列挙して chunk を再現不能と報告します。
    why_valid_or_invalid:
