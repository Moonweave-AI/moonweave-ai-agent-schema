schema: moonweave.ai/ontology-node/v1
id: memory-chunking-situating
kind: module
labels:
  zh: 分块与片段语境化
  en: Chunking and contextualization
  ja: チャンク化と文脈化
semantics:
  short_definition:
    zh: 把文档切成可追溯片段并补足语境。
    en: Splits documents into traceable fragments and adds context.
    ja: 文書を追跡可能断片に分割し文脈を補います。
  definition:
    zh: 分块与片段语境化描述已接入内容如何被 ChunkingRun 切分为带 SourceSpan 的 Chunk，如何经 SituatingPromptRun 或 Anthropic 式 contextual retrieval 为单片段生成 situating context，以及如何在必要时通过 ChunkCompression 缩短内容。ChunkProcessingActivity 是活动根；ChunkReference 把片段精确映射回 Document 版本与字符/句级边界。原始 Document 身份归记忆接入，Embedding 与 IndexEntry 归表示与索引；本模块只交付带来源链的 Chunk 或 SituatedChunk。
    en: Chunking and contextualization describes how ingested content is split by ChunkingRun into Chunks with SourceSpans, how SituatingPromptRun or Anthropic-style contextual retrieval generates situating context per fragment, and how ChunkCompression shortens content when needed. ChunkProcessingActivity is the activity root; ChunkReference maps fragments precisely to Document version and character or sentence boundaries. Original Document identity belongs to memory ingestion; Embedding and IndexEntry belong to representations and indexes—this module delivers Chunks or SituatedChunks with provenance chains only.
    ja: チャンク化と文脈化は、取込済み内容が ChunkingRun で SourceSpan 付き Chunk に分割され、SituatingPromptRun や Anthropic 型 contextual retrieval で fragment ごと situating context を生成し、必要時 ChunkCompression で短縮される流れを記述。ChunkProcessingActivity が activity root、ChunkReference が Document 版と文字/文境界へ精确映射。Document identity は記憶取込、Embedding/IndexEntry は表現と索引。本 module は来歴付き Chunk/SituatedChunk のみ handoff。
  why_needed:
    zh: 没有可追溯分块，检索会返回脱离原文的孤立句子，无法定位到 policy.pdf 第几页，也会把 LLM 生成的语境误当作源文。固定长度切分还会在句中断开，导致嵌入与 BM25 都匹配到错误上下文。
    en: Without traceable chunking, retrieval returns isolated sentences detached from source text, cannot locate page N of policy.pdf, and may treat LLM-generated context as source body. Fixed-size splits break mid-sentence, causing embeddings and BM25 to match wrong context.
    ja: 追跡可能 chunking がなければ、检索は源文本から切り離された孤立文を返し policy.pdf のページ特定不可、LLM 生成文脈を源文と誤認します。固定長分割は文途中で切れ、embedding/BM25 が誤 context に match します。
  includes:
    - zh: Chunk、SituatedChunk、ChunkReference、SourceSpan、分块/语境化/压缩运行及其算法配置与质量元数据。
      en: Chunk, SituatedChunk, ChunkReference, SourceSpan, chunking/contextualization/compression runs, algorithm profiles, and quality metadata.
      ja: Chunk、SituatedChunk、ChunkReference、SourceSpan、chunking/文脈化/圧縮 run、アルゴリズム設定、品質 metadata。
  excludes:
    - zh: Loader 与 Document 原始身份；EmbeddingVector 与 IndexEntry；RetrievalCandidate 与 ContextPackage。
      en: Loader and original Document identity; EmbeddingVector and IndexEntry; RetrievalCandidate and ContextPackage.
      ja: Loader と Document 原 identity、EmbeddingVector と IndexEntry、RetrievalCandidate と ContextPackage。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 Anthropic contextual retrieval（chunk + situating prompt）、LlamaIndex SentenceSplitter 与 ContextualCompressionRetriever、LangChain RecursiveCharacterTextSplitter，以及 embedding 距离驱动的 semantic chunking。规范（chunk_size、overlap、separator）与一次 ChunkingRun 发生事实（输入 digest、产出 chunk 列表）必须分开；situated context 只能存于分离字段，不能写入 SourceSpan 覆盖的证据正文。
    en: Integrations should map Anthropic contextual retrieval (chunk + situating prompt), LlamaIndex SentenceSplitter and ContextualCompressionRetriever, LangChain RecursiveCharacterTextSplitter, and embedding-distance semantic chunking separately. Specifications (chunk_size, overlap, separator) must stay distinct from one ChunkingRun occurrence (input digest, output chunk list); situated context lives in a separate field and must not overwrite evidentiary source text in SourceSpan.
    ja: 統合では Anthropic contextual retrieval（chunk + situating prompt）、LlamaIndex SentenceSplitter/ContextualCompressionRetriever、LangChain RecursiveCharacterTextSplitter、embedding 距離 semantic chunking を個別写像。仕様と ChunkingRun 発生事実を分離し、situating context は別 field のみで SourceSpan 証拠本文を上書き不可。
  typical_input:
    - description: Anthropic contextual retrieval — situating prompt prepended to each chunk before embedding/indexing.
      format: |
        # Offline indexing step (conceptual)
        situating_prompt = '''
        <document>{full_document}</document>
        Here is the chunk we want to situate within the whole document:
        <chunk>{chunk_text}</chunk>
        Please give a short succinct context to situate this chunk within the overall document for improving search retrieval of the chunk. Answer only with the succinct context and nothing else.
        '''
        # Store: contextualized_chunk = situating_context + "\n\n" + chunk_text
      source_claims: [claim-memory-chunking-situating-anthropic]
    - description: LlamaIndex SentenceSplitter — sentence-aware chunking with size and overlap.
      format: |
        from llama_index.core.node_parser import SentenceSplitter
        splitter = SentenceSplitter(chunk_size=512, chunk_overlap=64)
        nodes = splitter.get_nodes_from_documents(documents)
      source_claims: [claim-memory-chunking-situating-llamaindex]
    - description: LlamaIndex ContextualCompressionRetriever — post-retrieval compress/prune chunks.
      format: |
        from llama_index.core.retrievers import ContextualCompressionRetriever
        from llama_index.core.postprocessor import SentenceTransformerRerank
        compression_retriever = ContextualCompressionRetriever(
          base_retriever=vector_retriever,
          node_postprocessors=[SentenceTransformerRerank(top_n=3)]
        )
      source_claims: [claim-memory-chunking-situating-llamaindex]
    - description: LangChain RecursiveCharacterTextSplitter — hierarchical separators preserving paragraphs/sentences.
      format: |
        from langchain_text_splitters import RecursiveCharacterTextSplitter
        splitter = RecursiveCharacterTextSplitter(
          chunk_size=1000,
          chunk_overlap=200,
          separators=["\n\n", "\n", " ", ""]
        )
        chunks = splitter.split_text(document_text)
      source_claims: [claim-memory-chunking-situating-langchain]
    - description: Semantic chunking — split when embedding distance between sentences exceeds threshold.
      format: |
        # Conceptual semantic chunker (LangChain SemanticChunker pattern)
        from langchain_experimental.text_splitter import SemanticChunker
        splitter = SemanticChunker(
          embeddings=openai_embeddings,
          breakpoint_threshold_type="percentile",
          breakpoint_threshold_amount=90
        )
        docs = splitter.create_documents([long_document_text])
      source_claims: [claim-memory-chunking-situating-semantic]
  typical_output:
    - description: Moonweave-local chunk with source span and optional situated context field.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "chunk_id": "chunk-policy-7-003",
          "chunking_run_id": "chunk-run-7",
          "document_id": "doc-policy",
          "document_version": "v7",
          "source_span": {
            "unit": "unicode-code-point",
            "start_inclusive": 1600,
            "end_exclusive": 2400
          },
          "source_body_sha256": "14a4e908bbb4cc19810928c1308a1b2a521245b676a4a23fb83f461354bbda43",
          "chunk_text": "...JWT bearer tokens expire after 7 days...",
          "situating_context": "Section 2 of tenant-7 security policy on authentication.",
          "context_field_separate_from_evidence": true
        }
      source_claims: [claim-memory-chunking-situating-design]
  reference_implementations:
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/news/contextual-retrieval
      description: Chunk situating prompts prepended to chunks to improve retrieval recall.
    - name: LlamaIndex SentenceSplitter
      url: https://docs.llamaindex.ai/en/stable/api_reference/node_parser/sentence_splitter/
      description: Sentence-aware chunk_size and chunk_overlap splitting.
    - name: LlamaIndex ContextualCompressionRetriever
      url: https://docs.llamaindex.ai/en/stable/examples/retrievers/contextual_compression/
      description: Post-retrieval compression and rerank postprocessors on chunks.
    - name: LangChain RecursiveCharacterTextSplitter
      url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
      description: Recursive separator hierarchy for document chunking.
    - name: LangChain SemanticChunker
      url: https://python.langchain.com/docs/how_to/semantic-chunker/
      description: Embedding-distance breakpoints for semantic chunk boundaries.
structure:
  identity_keys: [chunk_id, document_id, document_version]
  fields:
    - id: chunk_id
      labels: {zh: 分块标识, en: Chunk identifier, ja: チャンク識別子}
      definitions:
        zh: 唯一标识一个 Chunk lineage 中的片段；SituatedChunk 派生时保留 base chunk_id 并增加 derivation 标识。
        en: Uniquely identifies a fragment in a Chunk lineage; SituatedChunk derivations retain base chunk_id plus derivation identity.
        ja: Chunk lineage 内 fragment を一意識別。SituatedChunk 派生は base chunk_id に derivation ID を追加。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: chunk-policy-7-003
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-design]
    - id: chunking_run_id
      labels: {zh: 分块运行标识, en: Chunking run identifier, ja: チャンク化実行識別子}
      definitions:
        zh: 唯一标识一次 ChunkingRun，记录所用 splitter 配置与输入 document digest。
        en: Uniquely identifies one ChunkingRun recording splitter configuration and input document digest.
        ja: 一回 ChunkingRun を一意識別。splitter 設定と入力 document digest を記録。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: chunk-run-7
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-design]
    - id: document_id
      labels: {zh: 文档标识, en: Document identifier, ja: 文書識別子}
      definitions:
        zh: 指向 memory-ingestion 产出的 Document lineage；Chunk 派生自该文档但不重新拥有它。
        en: References Document lineage produced by memory-ingestion; Chunk derives from it without re-owning it.
        ja: memory-ingestion 产出 Document lineage への参照。Chunk は派生するが再所有しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: doc-policy
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-design]
    - id: document_version
      labels: {zh: 文档版本, en: Document version, ja: 文書版}
      definitions:
        zh: 分块时所依据的 Document 不可变版本；相同 document_id 不同 digest 必须使用不同 version。
        en: Immutable Document version used when chunking; same document_id with different digest must use different version.
        ja: chunking 時に依据した Document 不変版。同一 document_id で digest 異なれば版も異なる必要。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: v7
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-design]
    - id: source_span_start
      labels: {zh: 来源起始偏移, en: Source span start offset, ja: 出典開始オフセット}
      definitions:
        zh: SourceSpan 在规范化文档正文中的起始偏移（含）；与 end_exclusive 共同定位证据正文。
        en: Start offset (inclusive) in normalized document body for SourceSpan; with end_exclusive locates evidentiary text.
        ja: 正規化 document 本文における SourceSpan 開始オフセット（含）。end_exclusive と共に証拠文本を定位。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1600
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-design]
    - id: source_span_end_exclusive
      labels: {zh: 来源结束偏移, en: Source span end offset exclusive, ja: 出典終了オフセット排他}
      definitions:
        zh: SourceSpan 在规范化文档正文中的结束偏移（不含）；situated context 不得延伸此边界作为源文。
        en: End offset (exclusive) in normalized document body; situated context must not extend this boundary as source text.
        ja: 正規化 document 本文の終了オフセット（不含）。situated context をこの境界越えの源文に不可。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2400
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-design]
    - id: chunk_size
      labels: {zh: 分块大小, en: Chunk size, ja: チャンクサイズ}
      definitions:
        zh: RecursiveCharacterTextSplitter 或 SentenceSplitter 的目标 chunk 字符/ token 上限。
        en: Target chunk character or token limit for RecursiveCharacterTextSplitter or SentenceSplitter.
        ja: RecursiveCharacterTextSplitter/SentenceSplitter の目標 chunk 文字/token 上限。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 512
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-llamaindex, claim-memory-chunking-situating-langchain]
    - id: chunk_overlap
      labels: {zh: 分块重叠, en: Chunk overlap, ja: チャンクオーバーラップ}
      definitions:
        zh: 相邻 chunk 之间的重叠字符/ token 数，用于保留句边界上下文。
        en: Overlapping characters or tokens between adjacent chunks to preserve sentence-boundary context.
        ja: 隣接 chunk 間の重叠文字/token 数。文境界 context 保持用。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 64
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-llamaindex, claim-memory-chunking-situating-langchain]
    - id: situating_context
      labels: {zh: 语境化上下文, en: Situating context, ja: 文脈化コンテキスト}
      definitions:
        zh: Anthropic contextual retrieval 或 SituatingPromptRun 生成的短语境；必须与 SourceSpan 证据正文分字段存储。
        en: Short context from Anthropic contextual retrieval or SituatingPromptRun; must be stored separately from SourceSpan evidentiary body.
        ja: Anthropic contextual retrieval/SituatingPromptRun 生成の短文脈。SourceSpan 証拠本文と別 field 必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Section 2 of tenant-7 security policy on authentication.
      allowed_values: []
      source_claims: [claim-memory-chunking-situating-anthropic]
  constraints:
    - id: chunk-requires-source-span
      severity: error
      expression_language: plain
      expression: Every Chunk must have ChunkReference or SourceSpan binding to a pinned Document version; copied text without span cannot claim derivation.
      explanation:
        zh: 没有跨度绑定就无法证明片段来自哪一版源文。
        en: Without span binding you cannot prove which source version a fragment came from.
        ja: span binding がなければ fragment の源版を証明できません。
      source_claims: [claim-memory-chunking-situating-design]
    - id: situated-context-not-evidence
      severity: error
      expression_language: plain
      expression: situating_context must remain in a separate field and must not be merged into source_body_sha256 or SourceSpan text used for provenance audit.
      explanation:
        zh: 把 LLM 生成语境当作源文会破坏合规与引用可验证性。
        en: Treating LLM-generated context as source body breaks compliance and citation verifiability.
        ja: LLM 生成文脈を源文扱いすると compliance と引用検証性が壊れます。
      source_claims: [claim-memory-chunking-situating-anthropic, claim-memory-chunking-situating-design]
    - id: compression-not-lifecycle-merge
      severity: warning
      expression_language: plain
      expression: ChunkCompression shortens fragment text for retrieval efficiency and is not MemoryMerge or lifecycle consolidation.
      explanation:
        zh: 片段压缩与跨记录生命周期合并是不同操作。
        en: Fragment compression is not cross-record lifecycle merge.
        ja: fragment 圧縮は record 横断 lifecycle merge ではありません。
      source_claims: [claim-memory-chunking-situating-design]
  required_relations: []
examples:
  - id: memory-chunking-situating-example-anthropic-contextual
    labels:
      zh: Anthropic 语境化检索分块
      en: Anthropic contextual retrieval chunking
      ja: Anthropic contextual retrieval チャンク化
    descriptions:
      zh: 索引 policy.pdf v7 时，每个 chunk 先经 situating prompt 生成 “Section 2 … authentication” 语境，再与 chunk 正文拼接后嵌入。检索命中的是 contextualized chunk，但 Moonweave 仍把 SourceSpan 1600–2400 与 source_body_sha256 绑定原文，situated context 存分离字段。
      en: When indexing policy.pdf v7, each chunk gets situating prompt output "Section 2 … authentication" prepended before embedding. Retrieval hits the contextualized chunk, but Moonweave still binds SourceSpan 1600–2400 and source_body_sha256 to original text, storing situated context separately.
      ja: policy.pdf v7 索引時、各 chunk に situating prompt で “Section 2 … authentication” を生成し chunk 本文と拼接して embed。检索は contextualized chunk を hit するが、Moonweave は SourceSpan 1600–2400 と source_body_sha256 を原文に binding し situated context は別 field。
    example_source:
      product: Anthropic
      url: https://www.anthropic.com/news/contextual-retrieval
      version: Contextual retrieval situating prompt
    field_values:
      document_id: doc-policy
      document_version: v7
      chunk_id: chunk-policy-7-003
      source_span_start: 1600
      source_span_end_exclusive: 2400
      situating_context: Section 2 of tenant-7 security policy on authentication.
      contextualized_for_embedding: true
    related_node_ids:
      - memory-chunking-situating
      - memory-embedding-indexes
    related_relation_ids: []
    source_claims:
      - claim-memory-chunking-situating-anthropic
      - claim-memory-chunking-situating-design
  - id: memory-chunking-situating-example-llamaindex-splitter
    labels:
      zh: LlamaIndex SentenceSplitter 分块
      en: LlamaIndex SentenceSplitter chunking
      ja: LlamaIndex SentenceSplitter チャンク化
    descriptions:
      zh: Ingestion 后的 Document 传入 SentenceSplitter(chunk_size=512, chunk_overlap=64)。chunk-run-7 产出 nodes/chunks 各带 start/end 字符偏移与 text；Moonweave 登记 ChunkReference 回到 doc-policy/v7，并记录 splitter 配置以便重放产生相同边界。
      en: Post-ingestion Documents feed SentenceSplitter(chunk_size=512, chunk_overlap=64). chunk-run-7 outputs nodes/chunks with start/end char offsets and text; Moonweave registers ChunkReference back to doc-policy/v7 and records splitter config for replayable boundaries.
      ja: 取込後 Document を SentenceSplitter(chunk_size=512, chunk_overlap=64) へ。chunk-run-7 が start/end 文字 offset 付き nodes/chunks を出力。Moonweave は ChunkReference で doc-policy/v7 に戻し、splitter 設定を replay 用に記録。
    example_source:
      product: LlamaIndex
      url: https://docs.llamaindex.ai/en/stable/api_reference/node_parser/sentence_splitter/
      version: SentenceSplitter chunk_size overlap
    field_values:
      chunking_run_id: chunk-run-7
      chunk_size: 512
      chunk_overlap: 64
      document_id: doc-policy
      document_version: v7
      chunks_produced: 18
    related_node_ids:
      - memory-chunking-situating
      - memory-ingestion
    related_relation_ids: []
    source_claims:
      - claim-memory-chunking-situating-llamaindex
      - claim-memory-chunking-situating-design
  - id: memory-chunking-situating-example-langchain-recursive
    labels:
      zh: LangChain 递归字符分块
      en: LangChain recursive character splitting
      ja: LangChain 再帰文字分割
    descriptions:
      zh: 长 Markdown 文档使用 RecursiveCharacterTextSplitter(chunk_size=1000, overlap=200, separators=["\n\n","\n"," ",""])。优先按段落与句子边界切分，减少句中断开；每个 chunk 保留 metadata source=policy.pdf 与 start_index 供 SourceSpan 重建。
      en: Long Markdown uses RecursiveCharacterTextSplitter(chunk_size=1000, overlap=200, separators=["\n\n","\n"," ",""]). It prefers paragraph and sentence boundaries to avoid mid-sentence cuts; each chunk keeps metadata source=policy.pdf and start_index for SourceSpan reconstruction.
      ja: 長 Markdown を RecursiveCharacterTextSplitter(chunk_size=1000, overlap=200, separators=["\n\n","\n"," ",""]) で分割。段落/文境界優先で文途中切断を回避。各 chunk は metadata source=policy.pdf と start_index で SourceSpan 再構築。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/how_to/recursive_text_splitter/
      version: RecursiveCharacterTextSplitter
    field_values:
      chunk_size: 1000
      chunk_overlap: 200
      separators:
        - "\n\n"
        - "\n"
        - " "
        - ""
      metadata_source: policy.pdf
    related_node_ids:
      - memory-chunking-situating
    related_relation_ids: []
    source_claims:
      - claim-memory-chunking-situating-langchain
      - claim-memory-chunking-situating-design
  - id: memory-chunking-situating-example-semantic-chunking
    labels:
      zh: 语义分块
      en: Semantic chunking
      ja: 意味チャンク化
    descriptions:
      zh: 对无显式章节的长对话 transcript，SemanticChunker 计算相邻句 embedding 距离，在 percentile=90 断点切分主题边界。chunk-run-transcript-3 记录 breakpoint_threshold 与 embedding 模型；各 chunk 仍必须映射回 Document 版本与 span，不能只有语义相似聚类 ID。
      en: For a long conversation transcript without explicit sections, SemanticChunker uses adjacent sentence embedding distances with percentile=90 breakpoints. chunk-run-transcript-3 records breakpoint_threshold and embedding model; each chunk must still map to Document version and span—not semantic cluster ID alone.
      ja: 明示章のない長対話 transcript で SemanticChunker が隣接文 embedding 距離を percentile=90 断点で分割。chunk-run-transcript-3 は breakpoint_threshold と embedding model を記録。各 chunk は Document 版/span へ写像必須で semantic cluster ID のみ不可。
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/how_to/semantic-chunker/
      version: SemanticChunker percentile breakpoints
    field_values:
      breakpoint_threshold_type: percentile
      breakpoint_threshold_amount: 90
      chunking_run_id: chunk-run-transcript-3
      embedding_model: text-embedding-3-small
      chunks_produced: 12
    related_node_ids:
      - memory-chunking-situating
      - memory-embedding-indexes
    related_relation_ids: []
    source_claims:
      - claim-memory-chunking-situating-semantic
      - claim-memory-chunking-situating-design
  - id: memory-chunking-situating-example-contextual-compression
    labels:
      zh: LlamaIndex 语境压缩
      en: LlamaIndex contextual compression
      ja: LlamaIndex 文脈圧縮
    descriptions:
