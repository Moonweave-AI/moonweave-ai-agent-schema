relations: []
sources:
  - id: langchain-text-splitters
    title: LangChain text splitters
    url: https://docs.langchain.com/oss/python/langchain/text_splitters
    source_type: official-documentation
    relevance: Documents configurable text splitting and chunk-overlap patterns for supplied documents.
  - id: anthropic-contextual-retrieval
    title: Anthropic Contextual Retrieval
    url: https://www.anthropic.com/engineering/contextual-retrieval
    source_type: official-article
    relevance: Documents contextual enrichment for chunks before retrieval and indexing.
  - id: llamaindex-node-parsers
    title: LlamaIndex node parsers
    url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
    source_type: official-documentation
    relevance: Documents parsing documents into nodes with retained metadata and source relationships.
source_claims:
  - id: claim-chunking-splitting
    source: langchain-text-splitters
    supports: >-
      LangChain documents configurable text splitting and overlap. Moonweave models an explicit ChunkingRun and
      separate Chunk artifacts so a splitter configuration, input version, and produced chunk can be audited independently.
    locator: Text splitters overview and chunk-overlap configuration
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-situating-context
    source: anthropic-contextual-retrieval
    supports: >-
      Anthropic documents creating contextual text for chunks before retrieval. Moonweave represents that generated
      context as a separate SituatedChunk produced by a distinct situating activity rather than overwriting source text.
    locator: Contextual Retrieval engineering article
    evidence_kind: ontology-design-inference
    confidence: high
  - id: claim-chunk-metadata-lineage
    source: llamaindex-node-parsers
    supports: >-
      LlamaIndex documents parsing source documents into nodes with metadata and source relationships. Moonweave uses
      ChunkMetadata and ChunkProvenance to preserve locatable spans and lineage without making the metadata carry the body.
    locator: Node parser guide and metadata discussion
    evidence_kind: ontology-design-inference
    confidence: high
