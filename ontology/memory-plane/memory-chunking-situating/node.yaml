module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 分块与语境化的输入概念族为文档、分块；责任交接由已接受事实 分块运行 —consumes→ 文档 (ChunkingRun-consumes-Document)；分块定位提示运行 —consumes→ 分块 (SituatingPromptRun-consumes-Chunk) 明确给出。
          en: The input families for Chunking and contextualization are document, chunk; the accepted facts chunking run —consumes→ document (ChunkingRun-consumes-Document); situating prompt run —consumes→ chunk (SituatingPromptRun-consumes-Chunk) make the responsibility handoff explicit.
          ja: チャンク化と文脈化の入力概念族は文書、チャンクです。責任の受け渡しは承認済み事実 分割実行 —consumes→ 文書 (ChunkingRun-consumes-Document)；位置付けプロンプト実行 —consumes→ チャンク (SituatingPromptRun-consumes-Chunk) により明示されます。
        family_concept_ids:
          - Document
          - Chunk
        relation_ids:
          - ChunkingRun-consumes-Document
          - SituatingPromptRun-consumes-Chunk
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 分块运行产生保持文档跨度的 Chunk；语境化运行产生具有独立身份的 SituatedChunk，并由 SituatedChunk-contextualizes-Chunk 显式保留它所解释的原 Chunk。
          en: A chunking run produces source-spanned Chunks; a situating run produces a separately identified SituatedChunk, and SituatedChunk-contextualizes-Chunk explicitly preserves which source Chunk it explains.
          ja: 分割実行は文書spanを保持する Chunk を生成し、文脈化実行は独立同一性を持つ SituatedChunk を生成し、SituatedChunk-contextualizes-Chunk が説明対象の元 Chunk を明示的に保持します。
        family_concept_ids:
          - Chunk
          - SituatedChunk
        relation_ids:
          - ChunkingRun-produces-Chunk
          - SituatingPromptRun-produces-SituatedChunk
          - SituatedChunk-contextualizes-Chunk
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。索引、检索或上下文组装使用片段内容但保持来源跨度和派生身份时，引用 Chunk 或 SituatedChunk。
          en: This ontology does not own runtime-failure adjudication. Indexing, retrieval, or context assembly references Chunk or SituatedChunk when using fragment content while preserving source span and derivation identity.
          ja: このオントロジーは実行失敗の判定を所有しません。indexing、retrieval、context assembly が source span と derivation identity を保って fragment content を使うとき、Chunk または SituatedChunk を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。索引、检索或上下文组装使用片段内容但保持来源跨度和派生身份时，引用 Chunk 或 SituatedChunk。
          en: This ontology does not initiate a recovery workflow. Indexing, retrieval, or context assembly references Chunk or SituatedChunk when using fragment content while preserving source span and derivation identity.
          ja: このオントロジーは回復ワークフローを開始しません。indexing、retrieval、context assembly が source span と derivation identity を保って fragment content を使うとき、Chunk または SituatedChunk を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-memory-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 分块与语境化与记忆接入按唯一 owner 和可判定问题分界。
            en: Chunking and contextualization and Memory ingestion are separated by unique ownership and answerable questions.
            ja: チャンク化と文脈化と記憶取り込みは一意の所有者と判定可能な問いで分離されます。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 分块与语境化与记忆接入按唯一 owner 和可判定问题分界。
            en: Chunking and contextualization and Memory ingestion are separated by unique ownership and answerable questions.
            ja: チャンク化と文脈化と記憶取り込みは一意の所有者と判定可能な問いで分離されます。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - ChunkProcessingActivity
      - ChunkReference
    allowed_backbone_predicates:
      - has_metadata
      - is_a
      - produces
