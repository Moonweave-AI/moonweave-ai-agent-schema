source_claims:
  - id: claim-memory-chunking-situating-001
    source: eng-fw-langchain-text-splitters
    supports: LangChain defines text splitters as operations that break a large document into smaller chunks that can be retrieved independently and fit a model context window; its structure-, length-, and document-aware strategies provide direct operational evidence for the chunking branch of ChunkProcessingActivity. LangChain does not define Moonweave's ChunkProcessingActivity class, contextualization or compression branches, module boundary, or ownership rule; those ontology choices remain Moonweave design inferences.
    locator: Text splitter integrations > Overview; Text structure-based; Length-based; Document structure-based
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-002
    source: eng-fw-anthropic-contextual-retrieval
    supports: Anthropic separates an original chunk from the chunk-specific explanatory context generated from its whole document, then prepends that context before embedding and BM25 indexing. This directly supports the operational distinction among source chunking, a situating activity, a contextualized chunk artifact, and downstream indexing. Anthropic does not prescribe Moonweave's activity hierarchy, class identities, or module ownership boundary; those remain Moonweave design inferences.
    locator: Contextual Retrieval > A primer on RAG; Introducing Contextual Retrieval; Implementing Contextual Retrieval; Implementation considerations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-003
    source: eng-fw-langchain-text-splitters
    supports: LangChain documents structure- and length-based operations that turn one document into individually retrievable chunks; Moonweave adds the document version, digest, reference, and explicit source span required to reconstruct this particular output.
    locator: Text splitter integrations > Text structure-based and Length-based > RecursiveCharacterTextSplitter chunk_size and chunk_overlap
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-004
    source: eng-ont-prov-o
    supports: PROV-O derivation requires an asserted relationship between identified entities, not mere similarity.
    locator: PROV-O Recommendation §2.1 Starting Point Terms > prov:Entity and prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-005
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Activity's used Entity from its generated Entity and their derivation; this case applies that pattern to chunk-run-81, while splitter configuration and digests remain explicit Moonweave reproducibility fields.
    locator: PROV-O Recommendation §2.1 Starting Point Terms > prov:used, prov:wasGeneratedBy, and prov:wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-006
    source: eng-fw-langchain-text-splitters
    supports: LangChain provides several splitting strategies that can yield similar lengths, so output length alone cannot recover the actual run configuration.
    locator: Text splitter integrations > Text structure-based and Length-based > distinct splitter strategies and parameters
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-007
    source: eng-fw-anthropic-contextual-retrieval
    supports: Anthropic generates a concise context from the whole document and the identified original_chunk before combining it with that chunk; Moonweave preserves those two components and the source-body digest separately for evidence fidelity.
    locator: Introducing Contextual Retrieval > Implementing Contextual Retrieval > original_chunk, contextualized_chunk, and context prepend
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-008
    source: eng-fw-anthropic-contextual-retrieval
    supports: Anthropic's method adds contextual text to the original chunk; losing the original chunk boundary defeats the method's source-preserving retrieval purpose.
    locator: Introducing Contextual Retrieval > Implementing Contextual Retrieval > distinguish contextual text from the original chunk
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-009
    source: eng-fw-langchain-text-splitters
    supports: LangChain splitters produce smaller chunks from documents and can preserve structural and positional metadata; the CQ requires that concrete source reconstruction chain.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-010
    source: eng-ont-prov-o
    supports: PROV-O distinguishes derivation from entity identity; the CQ uses explicit version and span evidence instead of inferring lineage from textual similarity.
    locator: PROV-O Recommendation > Starting Point Terms > Activity, Entity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-011
    source: eng-fw-langchain-text-splitters
    supports: LangChain documents multiple splitter strategies and document inputs; reproduction therefore requires the actual run configuration rather than only an output chunk.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-012
    source: eng-ont-prov-o
    supports: PROV-O's used and wasGeneratedBy pattern supports tracing a generated entity through the activity and source entity that produced it.
    locator: PROV-O Recommendation > Starting Point Terms > Activity, Entity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-013
    source: eng-fw-anthropic-contextual-retrieval
    supports: Anthropic's Contextual Retrieval prompt supplies the whole document and target chunk and prepends chunk-specific context; the CQ tests preservation and separation of those two contents.
    locator: Introducing Contextual Retrieval > Implementing Contextual Retrieval
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-014
    source: eng-ont-prov-o
    supports: PROV-O distinguishes the processing activity, source entity, and generated entity, preventing the source Chunk and SituatedChunk from being collapsed.
    locator: PROV-O Recommendation > Starting Point Terms > Activity, Entity, used, wasGeneratedBy, and wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-015
    source: eng-fw-langchain-text-splitters
    supports: LangChain's splitter input-output model and positional metadata support the exact Document-to-Chunk reconstruction shown here.
    locator: Text splitter integrations > Text structure-based, Length-based, and Document structure-based
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-memory-chunking-situating-016
    source: eng-ont-prov-o
    supports: PROV-O distinguishes entities, their generating activities, associated agents, and derivation; mapping-artifact-provenance-complete specializes those provenance links for audit records.
    locator: PROV-O > Starting Point and Expanded Terms for generation and attribution
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-017
    source: eng-fw-llamaindex-node-parsers
    supports: LlamaIndex describes a NodeParser as a transformation from source Documents to Nodes and exposes standalone, transformation, and index usage for that operation. This supports treating the source Document as an input and the positioned fragment plus parsing execution as a distinct chunking concern. The names Chunk and ChunkingRun and their ownership by memory-chunking-situating are Moonweave design inferences, not LlamaIndex ontology assertions.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction; Standalone Usage; Transformation Usage
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-018
    source: eng-fw-langchain-text-splitters
    supports: "LangChain explicitly distinguishes the large document supplied to a splitter from the smaller chunks produced under a structure- or length-based strategy. That input-output distinction supports the Moonweave boundary test: document loading and normalization precede splitting, while fragment position, order, overlap, and splitter execution identify Chunk and ChunkingRun. The canonical owner decision remains a Moonweave design inference."
    locator: Text splitter integrations > Overview; Text structure-based; Length-based
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-019
    source: eng-fw-llamaindex-node-parsers
    supports: LlamaIndex's Document-to-Node transformation keeps Document as the source object consumed by parsing rather than redefining the Document as a node-parser product. This directly supports referencing Document from chunking while leaving the document object's canonical ownership outside the chunking module. The specific owner memory-ingestion and Moonweave relation placement are design inferences.
    locator: Node Parser Usage Pattern > Document-to-Node abstraction; Transformation Usage
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-020
    source: eng-fw-langchain-text-splitters
    supports: LangChain states that a text splitter receives a large document and emits smaller chunks; the document therefore remains the pre-splitting input rather than acquiring chunk identity. This supports a reference from memory-chunking-situating to Document, but LangChain does not assign Document to Moonweave memory-ingestion or define either module boundary.
    locator: Text splitter integrations > Overview; Document structure-based
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-021
    source: eng-fw-anthropic-contextual-retrieval
    supports: Anthropic's RAG preprocessing sequence first creates text chunks, then converts those chunks into vector embeddings and stores the embeddings in a vector database. This is direct evidence that a Chunk is the textual source artifact upstream of representation and index objects. Assigning source-range and chunk-run identity to memory-chunking-situating remains Moonweave's ownership inference.
    locator: "Contextual Retrieval > A primer on RAG: scaling to larger knowledge bases"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-memory-chunking-situating-022
