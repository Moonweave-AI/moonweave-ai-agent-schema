schema: moonweave.ai/ontology-node/v1
id: memory-chunking-situating
kind: module
status: accepted
labels:
  zh: 分块与定位
  en: Chunking and Situating
  ja: チャンキングと文脈配置
semantics:
  short_definition:
    zh: 定义如何把已解析的来源内容切分为可定位的 Chunk，并在需要时生成独立的 SituatedChunk 以改善检索理解的记忆平面模块。
    en: The memory-plane module that splits parsed source content into locatable Chunks and, when needed, creates distinct SituatedChunks to improve retrieval understanding.
    ja: 解析済み source content を位置特定可能な Chunk に分割し、必要に応じて retrieval understanding を改善する独立した SituatedChunk を生成する memory-plane module。
  definition:
    zh: >-
      memory-chunking-situating 模块描述从已摄入、已解析且有版本的来源内容到 Chunk、ChunkMetadata、ChunkProvenance
      和 SituatedChunk 的处理边界。ChunkingRun 根据明确的输入与分割规范生成有顺序和范围信息的 Chunk；
      SituatingPromptRun 可为一个已有 Chunk 生成独立的 SituatedChunk，而不会把生成语境混入原始正文。模块还记录
      块的引用和可定位元数据，但不把文档加载、向量嵌入、检索排序或一次提示的上下文装配当作分块处理。
    en: >-
      The memory-chunking-situating module describes the processing boundary from ingested, parsed, and versioned source
      content to Chunk, ChunkMetadata, ChunkProvenance, and SituatedChunk artifacts. A ChunkingRun generates ordered,
      locatable Chunks from explicit inputs and a splitting specification. A SituatingPromptRun may generate a distinct
      SituatedChunk for an existing Chunk without mixing generated context into the original body. The module also records
      chunk references and locatable metadata, but does not treat document loading, vector embedding, retrieval ranking, or
      one prompt's context assembly as chunk-processing work.
    ja: >-
      memory-chunking-situating module は、ingested、parsed、versioned source content から Chunk、ChunkMetadata、
      ChunkProvenance、SituatedChunk artifact までの処理境界を表します。ChunkingRun は明示 input と splitting
      specification から順序と位置情報を持つ Chunk を生成します。SituatingPromptRun は元の body に generated context
      を混ぜず、既存 Chunk のために独立した SituatedChunk を生成できます。この module は chunk reference と
      位置特定可能な metadata も記録しますが、document loading、vector embedding、retrieval ranking、一回の prompt の
      context assembly を chunk-processing work として扱いません。
  why_needed:
    zh: 将来源内容、块边界、生成语境和后续向量表示区分开，才能在不丢失来源定位的情况下调整检索粒度并审计生成结果。
    en: Separating source content, chunk boundaries, generated context, and later vector representations lets a system tune retrieval granularity without losing source location or auditability.
    ja: source content、chunk boundary、generated context、後続 vector representation を分離することで、source location と auditability を失わずに retrieval granularity を調整できます。
  includes:
    - zh: 基于明确分割规范、版本化输入和输出工件引用的 ChunkingRun 与 ChunkProcessingActivity。
      en: ChunkingRun and ChunkProcessingActivity records with an explicit splitting specification, versioned inputs, and output-artifact references.
      ja: 明示 splitting specification、versioned input、output-artifact reference を持つ ChunkingRun と ChunkProcessingActivity record。
    - zh: 保留来源范围、顺序、摘要和谱系的 Chunk、ChunkMetadata 与 ChunkProvenance。
      en: Chunk, ChunkMetadata, and ChunkProvenance artifacts that retain source spans, order, digests, and lineage.
      ja: source span、order、digest、lineage を保持する Chunk、ChunkMetadata、ChunkProvenance artifact。
    - zh: 由独立情境化运行生成、并与原始 Chunk 保持身份边界的 SituatedChunk。
      en: SituatedChunks generated by distinct situating runs while retaining an identity boundary from the original Chunk.
      ja: 独立した situating run が生成し、元の Chunk との identity boundary を保つ SituatedChunk。
  excludes:
    - zh: 原始资源的获取、文件格式解析和摄入版本管理，它们属于 memory-ingestion。
      en: Raw-resource acquisition, file-format parsing, and ingestion version management, which belong to memory-ingestion.
      ja: memory-ingestion に属する raw resource acquisition、file-format parsing、ingestion version management。
    - zh: EmbeddingVector 的模型生成、索引写入和向量数据库设施，它们属于 memory-embedding-indexes。
      en: Model generation of EmbeddingVectors, index writes, and vector-database facilities, which belong to memory-embedding-indexes.
      ja: memory-embedding-indexes に属する EmbeddingVector の model generation、index write、vector-database facility。
    - zh: RetrievalRequest、候选排序、重排决策以及已经装配给模型的一次调用上下文。
      en: RetrievalRequests, candidate ranking, reranking decisions, and a call context already assembled for a model.
      ja: RetrievalRequest、candidate ranking、reranking decision、model 向けに組み立て済みの call context。
  semantic_kind: module
  aliases: [chunk processing model, contextual enrichment model]
engineering:
  explanation:
    zh: >-
      处理先接收已经解析和版本化的来源内容，使用明确的分割器配置产出顺序稳定的 Chunk 与元数据。需要额外语境时，
      单独的 SituatingPromptRun 根据原始块和来源文档生成一个 SituatedChunk。下游嵌入只读取这些已形成的工件，
      检索读取不应反向改写块、范围或来源谱系。
    en: >-
      Processing receives parsed, versioned source content and uses an explicit splitter configuration to produce
      consistently ordered Chunks and metadata. When extra context is needed, a separate SituatingPromptRun produces a
      SituatedChunk from the original chunk and its source document. Downstream embedding reads those completed artifacts,
      and retrieval reads must not rewrite chunks, spans, or source lineage.
    ja: >-
      処理は parsed、versioned source content を受け、明示 splitter configuration で順序が安定した Chunk と metadata を
      生成します。追加 context が必要な場合、別の SituatingPromptRun が元の Chunk と source document から SituatedChunk を
      生成します。後続 embedding は完成した artifact を read し、retrieval read は chunk、span、source lineage を書き換えてはいけません。
  typical_input:
    - description: Versioned parsed document and splitting configuration
      format: |
        {
          "input_ref": "docs/policy.md@v7",
          "processor_spec_ref": "recursive-splitter-v3",
          "chunk_size": 800,
          "chunk_overlap": 80
        }
  typical_output:
    - description: Locatable chunk and distinct situated derivative
      format: |
        {
          "chunk_id": "chunk-policy-04",
          "source_span": {"unit":"character","start":2400,"end_exclusive":3200},
          "situated_chunk_id": "situated-policy-04",
          "source_chunk_ref": "chunk-policy-04"
        }
  reference_implementations:
    - name: LangChain text splitters
      url: https://docs.langchain.com/oss/python/langchain/text_splitters
      description: Documents configurable text splitting and chunk-overlap patterns for supplied documents.
    - name: Anthropic Contextual Retrieval
      url: https://www.anthropic.com/engineering/contextual-retrieval
      description: Documents creating contextual text for chunks before retrieval and indexing.
    - name: LlamaIndex node parsers
      url: https://developers.llamaindex.ai/python/framework/module_guides/loading/node_parsers/
      description: Documents parsing documents into nodes with retained metadata and source relationships.
structure:
  identity_keys: [module_id]
  fields:
    - id: module_id
      labels: {zh: 模块标识, en: module ID, ja: モジュール ID}
      definitions:
        zh: 稳定标识本模块的分块与情境化边界，而不是其中的一个运行、块或嵌入。
        en: Stably identifies this module's chunking and situating boundary, not an individual run, chunk, or embedding inside it.
        ja: この module の chunking と situating boundary を安定して識別し、内部の個別 run、Chunk、embedding ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [memory-chunking-situating]
      pattern: null
      example_value: memory-chunking-situating
      source_claims: [claim-chunking-splitting]
    - id: transformation_boundary
      labels: {zh: 转换边界, en: transformation boundary, ja: 変換境界}
      definitions:
        zh: 声明已解析来源如何成为独立块或情境化块，并明确后续嵌入和检索不属于该转换。
        en: Declares how parsed source becomes distinct Chunk or SituatedChunk artifacts and that later embedding and retrieval are outside this transformation.
        ja: parsed source が独立した Chunk 又は SituatedChunk artifact になる方法と、後続 embedding と retrieval がこの変換の外であることを宣言する。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: []
      pattern: null
      example_value: '{"input":"docs/policy.md@v7","activity":"ChunkingRun","output":"chunk-policy-04"}'
      source_claims: [claim-chunking-splitting, claim-situating-context]
  constraints:
    - id: chunking-situating-module-boundary
      severity: error
      expression_language: plain
      expression: Chunking must create Chunk artifacts from explicit versioned source inputs and retain locatable metadata. Situating may create a distinct SituatedChunk, but must not overwrite the original Chunk body, replace ingestion, create an embedding, rank a retrieval candidate, or assemble a model call context.
      explanation:
        zh: 块处理、生成语境、摄入、嵌入、检索和上下文装配具有不同的输入、输出和可审计边界，不能因工件相邻而合并身份。
        en: Chunk processing, generated context, ingestion, embedding, retrieval, and context assembly have different inputs, outputs, and audit boundaries, so adjacent artifacts must not be merged into one identity.
        ja: chunk processing、generated context、ingestion、embedding、retrieval、context assembly は異なる input、output、audit boundary を持つため、隣接 artifact を一つの identity に統合してはいけません。
      source_claims: [claim-chunking-splitting, claim-situating-context, claim-chunk-metadata-lineage]
  required_relations: []
examples:
  - id: chunking-situating-module-positive

    labels:
      zh: 明确的分块与情境化处理
      en: Explicit chunking and situating processing
      ja: 明示的な chunking と situating 処理

    descriptions:
      zh: Generative Agents Memory Stream + Reflection；MemGPT core_memory_append/archival_memory_insert；Redis SET EX TTL + FT.SEARCH vector eviction。
      en: Generative Agents Memory Stream + Reflection; MemGPT core_memory_append/archival_memory_insert; Redis SET EX TTL + FT.SEARCH vector eviction.
      ja: Generative Agents Memory Stream + Reflection。MemGPT core_memory_append/archival_memory_insert。Redis SET EX TTL + vector eviction。
    field_values: {module_id: memory-chunking-situating, transformation_boundary: '{"input":"docs/policy.md@v7","chunk":"chunk-policy-04","situated":"situated-policy-04"}'}
    related_node_ids: [ChunkingRun, Chunk, SituatingPromptRun, SituatedChunk]
    related_relation_ids: [ChunkingRun-generates-Chunk, SituatedChunk-was-generated-by-SituatingPromptRun]

    source_claims: [claim-chunking-splitting, claim-situating-context]
  - id: chunking-situating-module-boundary

    labels:
      zh: 分块输出交给嵌入
      en: Chunk output handed to embedding
      ja: embedding へ渡される Chunk output

    descriptions:
      zh: MemGPT main_context vs archival vs recall 生命周期阶段；Generative Agents importance 累计 vs MemoryDecay recency 衰减。
      en: MemGPT main_context vs archival vs recall lifecycle stages; Generative Agents importance accumulation vs MemoryDecay recency decay.
      ja: MemGPT main/recall/archival lifecycle 段階。Generative Agents importance 累計 vs MemoryDecay recency 減衰。
    field_values: {module_id: memory-chunking-situating, transformation_boundary: '{"chunk":"chunk-policy-04","downstream_activity":"EmbeddingRun","chunk_write":false}'}
    related_node_ids: [Chunk, EmbeddingRun, EmbeddingVector]
    related_relation_ids: []

    source_claims: [claim-chunking-splitting]
  - id: chunking-situating-module-counterexample

    labels:
      zh: 将生成语境覆盖原始正文
      en: Generated context overwriting original body
      ja: generated context による元の body の上書き

    descriptions:
      zh: 反例：ephemeral tool output 无 MemoryRetentionPolicy/Redis EX TTL 就永久 MemoryWrite。
      en: Counterexample: ephemeral tool output MemoryWrite permanently without MemoryRetentionPolicy/Redis EX TTL.
      ja: 反例：ephemeral tool output が MemoryRetentionPolicy/Redis EX TTL なしで永久 MemoryWrite。
    field_values: {module_id: memory-chunking-situating, transformation_boundary: '{"chunk":"chunk-policy-04","original_body_preserved":false,"situated_artifact":null}'}
    related_node_ids: [Chunk, SituatedChunk, SituatingPromptRun]
    related_relation_ids: []

    source_claims: [claim-situating-context, claim-chunk-metadata-lineage]
  - id: chunking-situating-module-instance

    labels:
      zh: 实例：策略文档块谱系
      en: "Instance: policy-document chunk lineage"
      ja: "事例: policy-document Chunk lineage"

    descriptions:
      zh: MemGPT core_memory_replace(key="human", old="Bob", new="Alice")；Generative Agents reflection importance threshold=150 触发。
      en: MemGPT core_memory_replace(key="human", old="Bob", new="Alice"); Generative Agents reflection importance threshold=150 triggers.
      ja: MemGPT core_memory_replace。Generative Agents reflection importance threshold=150 トリガー。
    field_values: {module_id: memory-chunking-situating, transformation_boundary: '{"metadata":"metadata-policy-04","chunk":"chunk-policy-04","situated":"situated-policy-04"}'}
    related_node_ids: [Chunk, ChunkMetadata, ChunkProvenance, SituatingPromptRun, SituatedChunk]
    related_relation_ids: [ChunkMetadata-part-of-Chunk, SituatedChunk-was-generated-by-SituatingPromptRun]

    source_claims: [claim-chunk-metadata-lineage, claim-situating-context]
