schema: moonweave.ai/ontology-node/v1
id: memory-chunking-situating
kind: module
status: accepted
labels:
  zh: 分块与片段语境化
  en: Chunking and contextualization
  ja: チャンク化と文脈化
semantics:
  short_definition:
    zh: 分块与片段语境化描述已接入内容如何被切分为可追溯的 Chunk，如何为单个片段补充局部语境形成 SituatedChunk，以及这些变换的运行、元数据与精确来源定位。它不拥有原始文档、通用 SourceSpan、嵌入或检索候选。
    en: "Chunking and contextualization is the ontology boundary anchored by the key notion chunk processing activity; Chunk, SituatedChunk, ChunkReference, source spans, and chunk metadata. Membership follows: Own an object when its identity is determined by a source span, chunking run, contextualized derivation, or compression activity."
    ja: チャンク化と文脈化はチャンク処理活動を主要概念とするオントロジー境界です。Chunk、SituatedChunk、ChunkReference、source span、chunk metadata。 所属判定は次に従います：対象の同一性が出典範囲、チャンク化実行、文脈化派生、または圧縮活動で決まる場合に所有します。
  definition:
    zh: ChunkProcessingActivity 是活动根，其下区分建立分段边界的 ChunkingRun、增加片段特定背景的 SituatingPromptRun 与缩短内容的 ChunkCompression。ChunkArtifact 是这些活动产生的信息，ChunkReference 则把某个 Chunk 解析到特定来源版本的 SourceSpan。ChunkCompression 不是记忆记录合并或生命周期压缩。
    en: "Chunking and contextualization is the ontology boundary anchored by the key notion chunk processing activity; Chunk, SituatedChunk, ChunkReference, source spans, and chunk metadata. Membership follows: Own an object when its identity is determined by a source span, chunking run, contextualized derivation, or compression activity."
    ja: チャンク化と文脈化はチャンク処理活動を主要概念とするオントロジー境界です。Chunk、SituatedChunk、ChunkReference、source span、chunk metadata。 所属判定は次に従います：対象の同一性が出典範囲、チャンク化実行、文脈化派生、または圧縮活動で決まる場合に所有します。
  why_needed:
    zh: 把已接入内容切分为可追溯片段，并通过语境化与必要压缩补足片段独立使用所需的背景。
    en: Split ingested content into traceable fragments and add the context needed for independent use through contextualization and, when necessary, compression.
    ja: 取込済み内容を追跡可能な断片へ分割し、文脈化と必要な圧縮によって単独利用に必要な背景を補います。
  includes:
    - zh: Chunk、SituatedChunk、ChunkReference、来源跨度和分块元数据。
      en: Chunk, SituatedChunk, ChunkReference, source spans, and chunk metadata.
      ja: Chunk、SituatedChunk、ChunkReference、source span、chunk metadata。
    - zh: 分块运行、语境化运行、压缩活动及其算法配置、输入输出和质量结果。
      en: Chunking runs, contextualization runs, compression activities, and their algorithm profiles, inputs, outputs, and quality results.
      ja: チャンク化実行、文脈化実行、圧縮活動、およびアルゴリズム設定、入出力、品質結果。
  excludes:
    - zh: 原始文档的 Loader、去重与规范化归记忆接入；Chunk 从其结果派生而不重新拥有文档。
      en: Loader, deduplication, and normalization for original documents belong to memory ingestion; Chunk derives from that result without re-owning the document.
      ja: 元文書の Loader、重複排除、正規化は記憶取込に属し、Chunk は結果から派生して文書を再所有しません。
    - zh: 索引条目、Embedding 与检索候选归表示与索引或检索与排序；边界、重叠和质量分数默认是元数据而非平级实体。
      en: Index entries, Embedding values, and retrieval candidates belong to representations and indexes or retrieval and ranking; boundaries, overlap, and quality scores are metadata by default, not peer entities.
      ja: 索引条目、Embedding、検索候補は表現と索引または検索と順位付けに属し、境界、重複、品質得点は原則メタデータであり並列実体ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把已接入内容切分为可追溯片段，并通过语境化与必要压缩补足片段独立使用所需的背景。
  en: Split ingested content into traceable fragments and add the context needed for independent use through contextualization and, when necessary, compression.
  ja: 取込済み内容を追跡可能な断片へ分割し、文脈化と必要な圧縮によって単独利用に必要な背景を補います。
structure: null
examples:
  - id: memory-chunking-situating-cq-source-reconstruction-v3-example-positive
    kind: positive
    labels:
      zh: 来源重建正例
      en: Source reconstruction positive case
      ja: 出典復元の正例
    scenario_id: null
    descriptions:
      zh: chunk-policy-7-003 经 Document 派生边回到 doc-policy/v7，并通过 ref-policy-003 精确落到字符 1600–2399；附加语境保存在分离字段。
      en: chunk-policy-7-003 resolves through Document derivation to doc-policy/v7 and through ref-policy-003 to characters 1600–2399; added context remains in a separate field.
      ja: chunk-policy-7-003 は Document派生で doc-policy/v7、ref-policy-003 で文字1600–2399へ解決し、追加文脈は別項目に残ります。
    field_values:
      chunk_id: chunk-policy-7-003
      document_id: doc-policy
      document_version: v7
      document_sha256: 9d8ad0f8f2d1966ab0d843858342bdfaf0d5c47ed845a4a39c36e13b6f0c341e
      chunk_reference_id: ref-policy-003
      source_span:
        unit: unicode-code-point
        start_inclusive: 1600
        end_exclusive: 2400
      source_body_sha256: 14a4e908bbb4cc19810928c1308a1b2a521245b676a4a23fb83f461354bbda43
      generated_context_field: context_note
    related_node_ids:
      - Chunk
      - Document
      - ChunkReference
      - SourceSpan
    related_relation_ids:
      - chunk_derived_from_document
      - Chunk-has_reference-ChunkReference
      - chunk_reference_targets_source_span
    expected_result:
      zh: 返回唯一文档版本、跨度和引用，且语境不进入证据正文。
      en: Return one document version, span, and reference, with generated context outside evidentiary text.
      ja: 一文書版・範囲・参照を返し生成文脈を証拠本文に含めません。
    why_valid_or_invalid:
      zh: 三个稳定标识共同闭合来源链并保留原文边界。
      en: Three stable identifiers close the source chain while preserving the source-text boundary.
      ja: 三安定識別子が出典鎖を閉じ原文境界を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-chunking-situating-003
  - id: memory-chunking-situating-cq-source-reconstruction-v3-example-counter
    kind: counterexample
    labels:
      zh: 文字相似反例
      en: Text similarity counterexample
      ja: 文字類似の反例
    scenario_id: null
    descriptions:
      zh: scratch-note 复制同一句政策文本，却没有 Document 版本、ChunkReference 或 SourceSpan，不能据此声称来自 doc-policy/v7。
      en: scratch-note copies the same policy sentence but lacks a Document version, ChunkReference, and SourceSpan, so it cannot claim derivation from doc-policy/v7.
      ja: scratch-note は同じ方針文を複写しますが Document版・ChunkReference・SourceSpan がなく doc-policy/v7 派生を主張できません。
    field_values:
      candidate_id: scratch-note-17
      copied_text_sha256: 14a4e908bbb4cc19810928c1308a1b2a521245b676a4a23fb83f461354bbda43
      claimed_document_id: doc-policy
      document_version_present: false
      derivation_edge_present: false
      chunk_reference_present: false
      source_span_present: false
    related_node_ids:
      - Chunk
      - Document
      - ChunkReference
      - SourceSpan
    related_relation_ids:
      - chunk_derived_from_document
      - Chunk-has_reference-ChunkReference
      - chunk_reference_targets_source_span
    expected_result:
      zh: 拒绝来源重建，并分别报告文档版本、派生边、分块引用和来源跨度四项锚点缺失。
      en: Reject source reconstruction and report the absent document version, derivation edge, chunk reference, and source span separately.
      ja: 出典復元を拒否し、document version・derivation edge・chunk reference・source span の四欠落 anchor を個別に報告します。
    why_valid_or_invalid:
      zh: 共现和文本相似均不能替代版本化派生证据。
      en: Co-occurrence and text similarity cannot replace versioned derivation evidence.
      ja: 共起・文字類似は版付き派生証拠を代替しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-chunking-situating-004
  - id: memory-chunking-situating-cq-run-parameters-v3-example-positive
    kind: positive
    labels:
      zh: 生产链正例
      en: Production trace positive case
      ja: 生産鎖の正例
    scenario_id: null
    descriptions:
      zh: chunk-run-81 消费 doc-policy/v7 并生成 chunk-policy-7-003；metadata 记录 splitter=v2、800 字符边界，provenance 记录全部处理活动。
      en: chunk-run-81 consumes doc-policy/v7 and produces chunk-policy-7-003; metadata records splitter=v2 and the 800-character boundary, while provenance records every processing activity.
      ja: chunk-run-81 は doc-policy/v7 を消費し chunk-policy-7-003 を生成し、metadata は splitter=v2・800文字境界、provenance は全処理活動を記録します。
    field_values:
      chunking_run_id: chunk-run-81
      input_document:
        document_id: doc-policy
        version: v7
        sha256: 9d8ad0f8f2d1966ab0d843858342bdfaf0d5c47ed845a4a39c36e13b6f0c341e
      splitter_profile:
        implementation: RecursiveCharacterTextSplitter
        profile_version: splitter-v2
        length_unit: unicode-code-point
        chunk_size: 800
        chunk_overlap: 80
      output_chunk_id: chunk-policy-7-003
      metadata_id: chunk-metadata-81-003
      provenance_id: chunk-provenance-81-003
      ordered_activity_ids:
        - normalize-run-79
        - chunk-run-81
    related_node_ids:
      - ChunkingRun
      - Document
      - Chunk
      - ChunkMetadata
      - ChunkProvenance
    related_relation_ids:
      - ChunkingRun-consumes-Document
      - ChunkingRun-produces-Chunk
      - Chunk-has_metadata-ChunkMetadata
      - chunk_has_provenance
    expected_result:
      zh: 依据已记录的文档摘要和 splitter 配置重新执行，并在相同有序边界处复现 chunk-policy-7-003。
      en: Re-execution against the recorded document digest and splitter profile must reproduce chunk-policy-7-003 at the same ordered boundaries.
      ja: 記録済み document digest と splitter profile で再実行し、同じ順序付き境界に chunk-policy-7-003 を再現します。
    why_valid_or_invalid:
      zh: 输入、活动、输出、参数与来历均被版本化。
      en: Input, activity, output, parameters, and lineage are all versioned.
      ja: 入力・活動・出力・parameter・来歴がすべて版管理されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-chunking-situating-005
