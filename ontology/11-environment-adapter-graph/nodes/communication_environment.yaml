id: node.communication_environment
artifact: NodeClass
label: Communication Environment
label_zh: 通信环境
intra_level: 2
intra_group: human-environments
intra_group_zh: 人类环境
intra_role: environment
parent_node: node.environment
layer: environment
plane: Info
description: >
  Email, chat, and messaging context supporting send, receive, and thread management operations.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
