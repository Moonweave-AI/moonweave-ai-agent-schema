id: node.risk_profile
artifact: NodeClass
label: Risk Profile
label_zh: 风险画像
intra_level: 3
intra_group: governance-context
intra_group_zh: 治理上下文
intra_role: risk
parent_node: node.environment
layer: environment
plane: Orchestration
description: >
  Quantified risk assessment of an environment covering data sensitivity, blast radius, reversibility, and compliance exposure.
attributes:
  risk_level:
    type: enum
    required: true
    values: ['low', 'medium', 'high', 'critical']
    description: Overall risk classification
  data_sensitivity:
    type: enum
    required: false
    values: ['public', 'internal', 'confidential', 'restricted']
    description: Classification of data handled
  blast_radius:
    type: enum
    required: false
    values: ['local', 'team', 'organization', 'external']
    description: Scope of potential impact from misaction
  reversibility_score:
    type: number
    required: false
    description: Fraction of actions that are reversible from 0.0 to 1.0
status: active
