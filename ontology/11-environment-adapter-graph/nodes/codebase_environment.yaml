id: node.codebase_environment
artifact: NodeClass
label: Codebase Environment
label_zh: 代码库环境
layer: environment
plane: Info
description: >
  Source code repository context supporting file navigation, search, diff, and version control operations.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
