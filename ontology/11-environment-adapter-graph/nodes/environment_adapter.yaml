id: node.environment_adapter
artifact: NodeClass
label: Environment Adapter
label_zh: 环境适配器
intra_level: 1
intra_group: adapter-loop
intra_group_zh: 适配循环
intra_axis: adapter-observation
intra_axis_zh: 适配循环
intra_role: adapter
parent_node: node.environment
layer: environment
description: >
  Bridge component translating between agent-level observation/action abstractions and environment-specific APIs and semantics.
description_zh: >
  在智能体级观察/操作抽象与特定于环境的 API 和语义之间进行转换的桥接组件。
attributes:
  adapter_id:
    type: string
    required: true
    description: Unique adapter identifier
  normalization_version:
    type: string
    required: false
    description: Schema version for normalized observations and actions
  supported_operations:
    type: array
    required: false
    description: Environment operations supported by this adapter
status: active
