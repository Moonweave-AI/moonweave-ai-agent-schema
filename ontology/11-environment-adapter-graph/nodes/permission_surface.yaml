id: node.permission_surface
artifact: NodeClass
label: Permission Surface
label_zh: 权限面
intra_level: 2
intra_group: adapter-loop
intra_group_zh: 适配循环
intra_role: permission
parent_node: node.environment
layer: environment
plane: Orchestration
description: >
  Set of permissions an environment exposes defining what actions are allowed, denied, or require elevated approval.
attributes:
  surface_id:
    type: string
    required: true
    description: Unique permission surface identifier
  permission_count:
    type: integer
    required: false
    description: Number of distinct permissions defined
  default_policy:
    type: enum
    required: false
    values: ['allow', 'deny', 'ask']
    description: Default permission when not explicitly granted
  elevation_required:
    type: boolean
    required: false
    description: Whether some permissions require human elevation
status: active
