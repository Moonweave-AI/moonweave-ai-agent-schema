id: node.container_environment
artifact: NodeClass
label: Container Environment
label_zh: 容器环境
intra_level: 2
intra_group: compute-environments
intra_group_zh: 计算环境
intra_axis: execution-compute
intra_axis_zh: 计算环境
intra_role: environment
parent_node: node.local_machine_environment
layer: environment
plane: Tool
description: >
  Container runtime context supporting isolated process execution with defined resource limits and networking.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
