id: node.network_environment
artifact: NodeClass
label: Network Environment
label_zh: 网络环境
intra_level: 2
intra_group: networked-environments
intra_group_zh: 网络化环境
intra_role: environment
parent_node: node.environment
layer: environment
plane: Tool
description: >
  Network and internet context supporting HTTP requests, socket connections, and network diagnostics.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
