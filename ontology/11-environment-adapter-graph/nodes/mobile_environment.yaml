id: node.mobile_environment
artifact: NodeClass
label: Mobile Environment
label_zh: 移动设备环境
intra_level: 2
intra_group: interactive-environments
intra_group_zh: 交互环境
intra_role: environment
parent_node: node.environment
layer: environment
plane: Tool
description: >
  Mobile device context supporting app interaction, sensor access, and platform-specific APIs.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
