id: node.database_environment
artifact: NodeClass
label: Database Environment
label_zh: 数据库环境
layer: environment
plane: Tool
description: >
  Structured data store context supporting schema inspection, query execution, and transactional mutations.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
