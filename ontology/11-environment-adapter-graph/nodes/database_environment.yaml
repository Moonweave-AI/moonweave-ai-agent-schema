id: node.database_environment
artifact: NodeClass
label: Database Environment
label_zh: 数据库环境
intra_level: 2
intra_group: resource-environments
intra_group_zh: 资源环境
intra_axis: interaction-resource
intra_axis_zh: 交互环境 / 资源环境
intra_role: environment
parent_node: node.environment
layer: environment
plane: Tool
description: >
  Structured data store context supporting schema inspection, query execution, and transactional mutations.
description_zh: >
  支持模式检查、查询执行和事务变更的结构化数据存储上下文。
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
