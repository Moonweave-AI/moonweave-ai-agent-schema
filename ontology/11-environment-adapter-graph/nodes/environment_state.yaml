id: node.environment_state
artifact: NodeClass
label: Environment State
label_zh: 环境状态
intra_level: 2
intra_group: adapter-loop
intra_group_zh: 适配循环
intra_axis: adapter-observation
intra_axis_zh: 适配循环
intra_role: state
parent_node: node.environment
layer: environment
plane: Memory
description: >
  Snapshot or live representation of the current state of an environment including variables, layout, and resource availability.
attributes:
  state_id:
    type: string
    required: true
    description: Unique state snapshot identifier
  captured_at:
    type: datetime
    required: true
    description: Timestamp when state was captured
  state_hash:
    type: string
    required: false
    description: Content hash for change detection
  state_payload_ref:
    type: string
    required: true
    description: Reference to serialized state payload
status: active
