id: node.local_machine_environment
artifact: NodeClass
label: Local Machine Environment
label_zh: 本地机器环境
intra_level: 1
intra_group: compute-environments
intra_group_zh: 计算环境
intra_role: environment
parent_node: node.environment
layer: environment
plane: Tool
description: >
  Physical or virtual machine context supporting OS-level operations, process management, and hardware access.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
