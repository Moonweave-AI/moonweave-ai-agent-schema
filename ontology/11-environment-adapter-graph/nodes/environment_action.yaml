id: node.environment_action
artifact: NodeClass
label: Environment Action
label_zh: 环境动作
layer: environment
plane: Tool
description: >
  Action performed by an agent on an environment such as clicking, typing, API calls, file writes, or database queries.
attributes:
  action_id:
    type: string
    required: true
    description: Unique action identifier
  action_type:
    type: string
    required: true
    description: Category of action performed
  parameters_ref:
    type: string
    required: true
    description: Reference to action parameter payload
  side_effect_level:
    type: enum
    required: false
    values: ['none', 'read_only', 'reversible', 'destructive']
    description: Expected side effect severity
status: active
