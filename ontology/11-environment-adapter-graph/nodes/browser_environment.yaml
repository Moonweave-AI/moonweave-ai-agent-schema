id: node.browser_environment
artifact: NodeClass
label: Browser Environment
label_zh: 浏览器环境
intra_level: 2
intra_group: interactive-environments
intra_group_zh: 交互环境
intra_role: environment
parent_node: node.environment
layer: environment
plane: Tool
description: >
  Web browser execution context supporting DOM observation, navigation, form interaction, and JavaScript execution.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
