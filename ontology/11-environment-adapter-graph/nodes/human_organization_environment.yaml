id: node.human_organization_environment
artifact: NodeClass
label: Human Organization Environment
label_zh: 人类组织环境
layer: environment
plane: Orchestration
description: >
  Human team and organizational context supporting task assignment, approval workflows, and collaborative decision-making.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
