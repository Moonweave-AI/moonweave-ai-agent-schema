id: node.api_environment
artifact: NodeClass
label: API Environment
label_zh: API 环境
layer: environment
plane: Tool
description: >
  External API service context supporting REST, GraphQL, or RPC invocation against third-party services.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
