id: node.gui_environment
artifact: NodeClass
label: GUI Environment
label_zh: 图形界面环境
layer: environment
plane: Tool
description: >
  Desktop or mobile graphical user interface context supporting screen capture, element targeting, and input simulation.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
