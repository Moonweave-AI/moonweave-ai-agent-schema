id: node.regulated_environment
artifact: NodeClass
label: Regulated Environment
label_zh: 受监管环境
intra_level: 3
intra_group: governance-context
intra_group_zh: 治理上下文
intra_role: environment
parent_node: node.environment
layer: environment
plane: Orchestration
description: >
  Compliance-governed context with mandatory audit trails, data handling restrictions, and approval gates.
attributes:
  environment_type:
    type: string
    required: true
    description: Category identifier for this environment
  connection_uri:
    type: uri
    required: false
    description: Address or path to connect to the environment
  isolation_level:
    type: enum
    required: false
    values: ['none', 'process', 'container', 'vm']
    description: Sandbox isolation applied
interfaces:
  - ref: contract.observable
  - ref: contract.actionable
  - ref: contract.risk_assessable
state_machine:
  ref: state.environment_lifecycle
status: active
