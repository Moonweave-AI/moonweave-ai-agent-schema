id: contract.observable
artifact: InterfaceContract
label: Observable
label_zh: 可观测
description: >
  Behavioral contract requiring environments to support observation of state and events by connected adapters.
operations:
  - name: observe
    description: Capture current environment state or event
    input:
      filter:
        type: object
        description: Optional observation filter criteria
    output:
      observation:
        type: object
        description: Normalized observation payload
    errors: [ObservationFailedError, EnvironmentUnavailableError]
  - name: subscribe
    description: Subscribe to environment change notifications
    input:
      event_types:
        type: array
        description: Event types to subscribe to
    output:
      subscription_id:
        type: string
        description: Active subscription identifier
    errors: [SubscriptionNotSupportedError]
status: active
