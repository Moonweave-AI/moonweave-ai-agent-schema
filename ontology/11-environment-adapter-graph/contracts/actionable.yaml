id: contract.actionable
artifact: InterfaceContract
label: Actionable
label_zh: 可执行
description: >
  Behavioral contract requiring environments to accept validated actions from adapters with permission checks.
operations:
  - name: execute_action
    description: Perform an action on the environment
    input:
      action:
        type: object
        description: Normalized action payload
    output:
      result:
        type: object
        description: Action execution result
    errors: [PermissionDeniedError, ActionFailedError, EnvironmentUnavailableError]
  - name: list_actions
    description: Enumerate action types supported by this environment
    input: {}
    output:
      action_types:
        type: array
        description: Supported action type identifiers
status: active
