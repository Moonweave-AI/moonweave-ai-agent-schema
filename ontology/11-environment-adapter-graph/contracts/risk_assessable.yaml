id: contract.risk_assessable
artifact: InterfaceContract
label: Risk Assessable
label_zh: 可风险评估
description: >
  Behavioral contract requiring environments to expose quantifiable risk profiles for policy and safety evaluation.
operations:
  - name: assess_risk
    description: Compute or retrieve current risk profile
    input:
      context_ref:
        type: string
        description: Optional context for risk assessment
    output:
      risk_profile:
        type: object
        description: Quantified risk assessment
    errors: [RiskAssessmentUnavailableError]
status: active
