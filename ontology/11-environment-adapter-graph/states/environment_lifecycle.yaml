id: state.environment_lifecycle
artifact: StateMachine
label: Environment Lifecycle
label_zh: 环境生命周期
description: >
  Lifecycle states for an environment connection from discovery through active use, disconnection, and unavailability.
states:
  - name: unknown
    initial: true
    description: Environment not yet discovered or characterized
  - name: discovered
    description: Environment identified but not yet connected
  - name: connected
    description: Adapter established connection to environment
  - name: active
    description: Environment actively receiving observations and actions
  - name: disconnected
    description: Connection closed but environment may reconnect
  - name: unavailable
    terminal: true
    description: Environment permanently or persistently unreachable
transitions:
  - from: unknown
    to: discovered
    trigger: discover
    description: Environment discovered via scan or configuration
  - from: discovered
    to: connected
    trigger: connect
    description: Adapter connects to environment
  - from: connected
    to: active
    trigger: activate
    description: Environment ready for observation and action
  - from: active
    to: disconnected
    trigger: disconnect
    description: Connection closed gracefully
  - from: connected
    to: disconnected
    trigger: disconnect
    description: Disconnect before activation
  - from: disconnected
    to: connected
    trigger: reconnect
    description: Re-establish connection
  - from: discovered
    to: unavailable
    trigger: unreachable
    description: Environment cannot be reached
  - from: active
    to: unavailable
    trigger: unreachable
    description: Environment became persistently unavailable
status: active
