id: constraint.environment_must_define_observation_action_state
artifact: GraphConstraint
label: Environment Must Define Observation Action State
label_zh: 环境必须定义观测动作状态
severity: error
rule: >
  Every concrete environment node type MUST implement contract.observable and contract.actionable and support READS_STATE and WRITES_STATE via an environment adapter.
applies_to:
  nodes: [node.environment]
  edges: [edge.OBSERVES, edge.ACTS_ON, edge.READS_STATE, edge.WRITES_STATE]
description: >
  Completeness rule ensuring all environments support the full observe-act-state triangle.
status: active
