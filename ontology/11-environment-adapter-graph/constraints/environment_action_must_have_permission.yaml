id: constraint.environment_action_must_have_permission
artifact: GraphConstraint
label: Environment Action Must Have Permission
label_zh: 环境动作必须有权限
severity: error
rule: >
  Every node.environment_action instance MUST have at least one REQUIRES_PERMISSION edge to a node.permission_surface granting the action, or explicit policy exemption.
applies_to:
  nodes: [node.environment_action]
  edges: [edge.REQUIRES_PERMISSION]
description: >
  Safety rule ensuring all environment mutations pass permission checks before execution.
status: active
