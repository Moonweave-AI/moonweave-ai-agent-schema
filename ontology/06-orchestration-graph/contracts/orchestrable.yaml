id: contract.orchestrable
artifact: InterfaceContract
label: Orchestrable
label_zh: 可编排
description: 'Capability indicating an artifact can be placed as a step within a workflow graph and participate in orchestration
  edges.

  '
operations:
- name: bind_to_workflow
  description: Attach this artifact as a node in a parent workflow.
  input:
    workflow_ref: string
    step_id: string
  output:
    binding_id: string
- name: get_status
  description: Return current execution status of this orchestrated step.
  input: {}
  output:
    status: string
    metadata: object
  errors:
  - not_bound
  - not_started
status: active
