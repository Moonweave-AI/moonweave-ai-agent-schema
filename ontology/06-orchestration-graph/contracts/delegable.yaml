id: contract.delegable
artifact: InterfaceContract
label: Delegable
label_zh: 可委派
description: 'Capability indicating an entity can accept delegated subtasks under a delegation contract with bounded scope.

  '
operations:
- name: accept_delegation
  description: Accept a subtask with attached delegation contract terms.
  input:
    task: object
    contract_ref: string
  output:
    delegation_id: string
  errors:
  - scope_violation
  - capacity_exceeded
  - contract_missing
- name: report_completion
  description: Return structured results and status upon subtask completion.
  input:
    delegation_id: string
    result: object
  output:
    acknowledged: boolean
status: active
