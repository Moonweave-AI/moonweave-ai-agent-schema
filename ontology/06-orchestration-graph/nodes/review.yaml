id: node.review
artifact: NodeClass
label: Review
label_zh: 审查
intra_level: 3
intra_group: review-optimization
intra_group_zh: 审查优化
intra_axis: review-optimization
intra_axis_zh: 审查优化
intra_role: process
parent_node: node.evaluator
layer: orchestration
plane: OrchestrationPlane
description: 'An explicit human or language-model assessment step that critiques, verifies, or approves intermediate results
  before they propagate downstream.

  '
attributes:
  reviewer_type:
    type: enum
    required: true
    values:
    - human
    - model
    - hybrid
    description: Entity performing the review.
  review_scope:
    type: enum
    required: true
    values:
    - full
    - safety
    - quality
    - factual
    description: Aspect of output under examination.
  approval_required:
    type: boolean
    required: false
    description: Whether downstream steps are blocked until approval.
status: active
required_edges:
  outgoing:
  - predicate: REVIEWS
    target_any_of:
    - node.workflow_node
    - node.worker
