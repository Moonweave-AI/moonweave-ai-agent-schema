id: node.subagent
artifact: NodeClass
label: Subagent
label_zh: 子智能体
intra_level: 2
intra_group: delegation-control
intra_group_zh: 委派控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: worker
parent_node: node.task_distribution
layer: orchestration
plane: OrchestrationPlane
description: 'A spawned agent instance with delegated context, scoped goal, and bounded tool access, operating semi-autonomously
  under a delegation contract.

  '
description_zh: >
  生成的智能体实例具有委托上下文、范围目标和有限工具访问权限，在委托合同下半自主运行。
attributes:
  scope_goal:
    type: string
    required: true
    description: The delegated objective assigned to this subagent.
  context_boundary:
    type: object
    required: false
    description: Fields and memory regions accessible to the subagent.
  parent_ref:
    type: string
    required: true
    description: Reference to the delegating orchestrator or parent agent.
status: active
interfaces:
- ref: contract.delegable
required_edges:
  incoming:
  - predicate: DELEGATES_TO
    source_any_of:
    - node.orchestrator
    - node.task_distribution
