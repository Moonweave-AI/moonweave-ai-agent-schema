id: node.delegation_contract
artifact: NodeClass
label: Delegation Contract
label_zh: 委派契约
layer: orchestration
plane: OrchestrationPlane
description: 'Formal terms governing what a delegate may read, write, invoke, and return, including permission scope, time
  limits, and escalation conditions.

  '
attributes:
  allowed_actions:
    type: object
    required: false
    description: Explicit set of permitted operation types for the delegate.
  denied_actions:
    type: object
    required: false
    description: Explicit set of forbidden operation types.
  time_limit_seconds:
    type: integer
    required: false
    description: Maximum duration of the delegation before automatic revocation.
  escalation_on_violation:
    type: boolean
    required: false
    description: Whether policy violations trigger escalation to the delegator.
status: active
