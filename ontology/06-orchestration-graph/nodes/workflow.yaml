id: node.workflow
artifact: NodeClass
label: Workflow
label_zh: 工作流
intra_level: 1
intra_group: workflow-structure
intra_group_zh: 工作流结构
intra_axis: workflow-routing
intra_axis_zh: 工作流结构 / 路由控制
intra_role: container
parent_node: node.orchestrator
layer: orchestration
plane: OrchestrationPlane
description: 'A directed graph of processing steps that defines how a multi-step agent task is executed from initiation through
  completion, including dependencies, gates, and aggregation points.

  '
attributes:
  name:
    type: string
    required: true
    description: Human-readable identifier for the workflow definition.
  version:
    type: string
    required: true
    description: Semantic version or revision tag of the workflow schema.
  entry_node_id:
    type: string
    required: true
    description: Identifier of the first step executed when the workflow starts.
  max_parallelism:
    type: integer
    required: false
    description: Upper bound on concurrently active branches within this workflow.
status: active
interfaces:
- ref: contract.orchestrable
state_machine:
  ref: state.workflow_lifecycle
required_edges:
  outgoing:
  - predicate: CHAINS_TO
    target: node.workflow_node
