id: node.worker
artifact: NodeClass
label: Worker
label_zh: 工作者
intra_level: 2
intra_group: delegation-control
intra_group_zh: 委派控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: worker
parent_node: node.task_distribution
layer: orchestration
plane: OrchestrationPlane
description: 'A specialist agent or executor that performs a single delegated subtask within bounded scope and returns structured
  results to the orchestrator.

  '
attributes:
  specialization:
    type: string
    required: true
    description: Domain or capability focus of this worker.
  capability_refs:
    type: object
    required: false
    description: List of tool or skill references available to this worker.
  reporting_format:
    type: object
    required: false
    description: Schema for structured subtask completion reports.
status: active
interfaces:
- ref: contract.delegable
required_edges:
  incoming:
  - predicate: DELEGATES_TO
    source_any_of:
    - node.orchestrator
    - node.task_distribution
