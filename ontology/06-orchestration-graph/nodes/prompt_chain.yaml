id: node.prompt_chain
artifact: NodeClass
label: Prompt Chain
label_zh: 提示链
intra_level: 2
intra_group: workflow-structure
intra_group_zh: 工作流结构
intra_axis: workflow-routing
intra_axis_zh: 工作流结构 / 路由控制
intra_role: pattern
parent_node: node.workflow
layer: orchestration
plane: OrchestrationPlane
description: 'A fixed sequential pipeline of language-model calls where each stage consumes the prior stage output as context,
  enabling deterministic multi-step reasoning without dynamic routing.

  '
attributes:
  stage_count:
    type: integer
    required: false
    description: Number of sequential model invocation stages in the chain.
  stage_definitions:
    type: object
    required: false
    description: Ordered list of stage prompts, schemas, and output contracts.
  carry_forward_fields:
    type: object
    required: false
    description: Fields propagated unchanged across all stages.
status: active
interfaces:
- ref: contract.orchestrable
required_edges:
  outgoing:
  - predicate: CHAINS_TO
    target_any_of:
    - node.prompt_chain
    - node.workflow_node
