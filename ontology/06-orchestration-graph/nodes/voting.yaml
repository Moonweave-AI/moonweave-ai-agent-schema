id: node.voting
artifact: NodeClass
label: Voting
label_zh: 投票
intra_level: 2
intra_group: parallel-control
intra_group_zh: 并行控制
intra_role: pattern
parent_node: node.parallelization
layer: orchestration
plane: OrchestrationPlane
description: 'A parallelization pattern that runs the same task multiple times with varied parameters or sampling, then selects
  or synthesizes the best outcome via vote or consensus.

  '
attributes:
  candidate_count:
    type: integer
    required: false
    description: Number of parallel attempts executed.
  selection_method:
    type: enum
    required: true
    values:
    - majority
    - ranked_choice
    - quality_score
    - consensus
    description: Rule for choosing the winning output.
  diversity_factor:
    type: object
    required: false
    description: Parameters controlling variation across attempts.
status: active
required_edges:
  outgoing:
  - predicate: VOTES_ON
    target: node.evaluator
  - predicate: JOINS_FROM
    target: node.parallelization
  incoming:
  - predicate: FORKS_TO
    source: node.parallelization
