id: node.task_distribution
artifact: NodeClass
label: Task Distribution
label_zh: 任务分配
layer: orchestration
plane: OrchestrationPlane
description: 'The operation of assigning decomposed subtasks to available workers or subagents according to a load-balancing,
  affinity, or capability-matching policy.

  '
attributes:
  distribution_policy:
    type: enum
    required: true
    values:
    - round_robin
    - capability_match
    - load_balanced
    - priority
    description: Rule for mapping subtasks to executors.
  pending_queue:
    type: object
    required: false
    description: Ordered queue of subtasks awaiting assignment.
  assignment_records:
    type: object
    required: false
    description: Audit trail of subtask-to-worker mappings.
status: active
required_edges:
  outgoing:
  - predicate: DELEGATES_TO
    target_any_of:
    - node.worker
    - node.subagent
