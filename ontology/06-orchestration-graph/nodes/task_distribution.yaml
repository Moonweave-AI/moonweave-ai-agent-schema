id: node.task_distribution
artifact: NodeClass
label: Task Distribution
label_zh: 任务分配
intra_level: 1
intra_group: delegation-control
intra_group_zh: 委派控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: process
parent_node: node.orchestrator
layer: orchestration
plane: OrchestrationPlane
description: 'The operation of assigning decomposed subtasks to available workers or subagents according to a load-balancing,
  affinity, or capability-matching policy.

  '
description_zh: >
  根据负载平衡、关联性或能力匹配策略将分解的子任务分配给可用工作人员或子代理的操作。
attributes:
  distribution_policy:
    type: enum
    required: true
    values:
    - round_robin
    - capability_match
    - load_balanced
    - priority
    description: Rule for mapping subtasks to executors.
  pending_queue:
    type: object
    required: false
    description: Ordered queue of subtasks awaiting assignment.
  assignment_records:
    type: object
    required: false
    description: Audit trail of subtask-to-worker mappings.
status: active
required_edges:
  outgoing:
  - predicate: DELEGATES_TO
    target_any_of:
    - node.worker
    - node.subagent
