id: node.optimizer
artifact: NodeClass
label: Optimizer
label_zh: 优化器
intra_level: 3
intra_group: review-optimization
intra_group_zh: 审查优化
intra_role: process
parent_node: node.evaluator
layer: orchestration
plane: OrchestrationPlane
description: 'An iterative improver that revises generated outputs based on evaluator feedback until quality thresholds are
  met or iteration budget is exhausted.

  '
attributes:
  max_iterations:
    type: integer
    required: false
    description: Maximum revision cycles before forced termination.
  improvement_strategy:
    type: enum
    required: true
    values:
    - rewrite
    - patch
    - regenerate
    - guided_edit
    description: Approach for applying feedback to outputs.
  convergence_threshold:
    type: object
    required: false
    description: Score delta below which iteration stops.
status: active
required_edges:
  incoming:
  - predicate: OPTIMIZES
    source: node.evaluator
