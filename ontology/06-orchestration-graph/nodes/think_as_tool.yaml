id: node.think_as_tool
artifact: NodeClass
label: Think As Tool
label_zh: 思考即工具
layer: orchestration
plane: OrchestrationPlane
description: 'Extended internal reasoning exposed as an invocable tool, enabling staged deliberation separate from action
  tools and observable in the execution trace.

  '
attributes:
  reasoning_budget_tokens:
    type: integer
    required: false
    description: Maximum tokens allocated per think invocation.
  output_schema:
    type: object
    required: false
    description: Structured schema for reasoning conclusions returned to caller.
  visible_in_transcript:
    type: boolean
    required: false
    description: Whether reasoning output appears in the public transcript.
status: active
