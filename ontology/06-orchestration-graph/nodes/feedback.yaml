id: node.feedback
artifact: NodeClass
label: Feedback
label_zh: 反馈
intra_level: 3
intra_group: shared-state
intra_group_zh: 共享状态
intra_axis: collaboration-state
intra_axis_zh: 共享状态
intra_role: signal
parent_node: node.blackboard
layer: orchestration
plane: OrchestrationPlane
description: 'A signal from an evaluator, reviewer, or human operator back to a generator or orchestrator, carrying scores,
  critiques, or continuation directives.

  '
description_zh: >
  从评估者、审阅者或操作员返回到生成器或编排器的信号，携带分数、批评或继续指令。
attributes:
  feedback_type:
    type: enum
    required: true
    values:
    - score
    - critique
    - correction
    - continuation
    description: Semantic category of the feedback payload.
  target_ref:
    type: string
    required: true
    description: Reference to the component that should consume this feedback.
  actionable:
    type: boolean
    required: false
    description: Whether the feedback includes specific revision instructions.
status: active
