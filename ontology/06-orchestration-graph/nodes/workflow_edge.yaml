id: node.workflow_edge
artifact: NodeClass
label: Workflow Edge
label_zh: 工作流边
intra_level: 3
intra_group: workflow-structure
intra_group_zh: 工作流结构
intra_axis: workflow-routing
intra_axis_zh: 工作流结构 / 路由控制
intra_role: artifact
parent_node: node.workflow_node
layer: orchestration
plane: OrchestrationPlane
description: 'A directed transition or dependency between two workflow nodes specifying execution order, data flow, or conditional
  activation preconditions.

  '
attributes:
  from_step_id:
    type: string
    required: true
    description: Source step identifier in the parent workflow.
  to_step_id:
    type: string
    required: true
    description: Target step identifier in the parent workflow.
  condition:
    type: object
    required: false
    description: Optional predicate expression that must evaluate true for traversal.
  data_mapping:
    type: object
    required: false
    description: Field-level mapping from source outputs to target inputs.
status: active
