id: node.parallelization
artifact: NodeClass
label: Parallelization
label_zh: 并行化
intra_level: 1
intra_group: parallel-control
intra_group_zh: 并行控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: pattern
parent_node: node.orchestrator
layer: orchestration
plane: OrchestrationPlane
description: 'Concurrent execution of independent branches with a defined join strategy for aggregating partial results into
  a unified outcome.

  '
attributes:
  join_strategy:
    type: enum
    required: true
    values:
    - merge
    - vote
    - first_success
    - all_complete
    description: How branch outputs are combined at join time.
  max_concurrency:
    type: integer
    required: false
    description: Maximum number of branches executing simultaneously.
  branch_timeout_seconds:
    type: integer
    required: false
    description: Wall-clock limit applied per branch before join proceeds.
status: active
interfaces:
- ref: contract.orchestrable
required_edges:
  outgoing:
  - predicate: FORKS_TO
    target_any_of:
    - node.sectioning
    - node.voting
    - node.worker
  incoming:
  - predicate: JOINS_FROM
    source_any_of:
    - node.sectioning
    - node.voting
    - node.worker
