id: node.group_conversation
artifact: NodeClass
label: Group Conversation
label_zh: 群组对话
layer: orchestration
plane: OrchestrationPlane
description: 'Multi-agent dialogue coordination where multiple participants exchange messages under turn-taking, broadcast,
  or moderated discussion rules.

  '
attributes:
  participant_refs:
    type: object
    required: false
    description: List of agent or human participant identifiers.
  turn_policy:
    type: enum
    required: true
    values:
    - round_robin
    - moderated
    - free_form
    - role_based
    description: Rule governing speaking order.
  max_turns:
    type: integer
    required: false
    description: Maximum dialogue turns before forced termination or summarization.
status: active
required_edges:
  incoming:
  - predicate: COORDINATES
    source: node.orchestrator
