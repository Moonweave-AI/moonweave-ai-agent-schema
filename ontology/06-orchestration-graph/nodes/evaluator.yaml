id: node.evaluator
artifact: NodeClass
label: Evaluator
label_zh: 评估器
intra_level: 2
intra_group: review-optimization
intra_group_zh: 审查优化
intra_axis: review-optimization
intra_axis_zh: 审查优化
intra_role: process
parent_node: node.orchestrator
layer: orchestration
plane: OrchestrationPlane
description: 'A quality and correctness assessor that scores, validates, or rejects outputs against criteria, rubrics, or
  reference answers without modifying the original artifact.

  '
attributes:
  evaluation_criteria:
    type: object
    required: false
    description: Rubric, schema, or test cases used for assessment.
  scoring_method:
    type: enum
    required: true
    values:
    - binary
    - numeric
    - rubric
    - test_suite
    description: How evaluation results are quantified.
  pass_threshold:
    type: object
    required: false
    description: Minimum score or condition required for acceptance.
status: active
required_edges:
  outgoing:
  - predicate: REVIEWS
    target_any_of:
    - node.workflow_node
    - node.worker
  - predicate: OPTIMIZES
    target: node.optimizer
