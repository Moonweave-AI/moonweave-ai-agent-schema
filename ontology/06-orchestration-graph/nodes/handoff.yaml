id: node.handoff
artifact: NodeClass
label: Handoff
label_zh: 交接
intra_level: 2
intra_group: delegation-control
intra_group_zh: 委派控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: process
parent_node: node.task_distribution
layer: orchestration
plane: OrchestrationPlane
description: 'Transfer of control, context, and partial results from one agent or workflow step to another, preserving continuity
  while resetting execution scope as needed.

  '
attributes:
  handoff_type:
    type: enum
    required: true
    values:
    - sequential
    - escalation
    - specialist_referral
    description: Semantic category of the transfer.
  context_payload:
    type: object
    required: false
    description: Serialized context and state passed to the receiving party.
  acknowledgment_required:
    type: boolean
    required: false
    description: Whether the receiver must confirm acceptance before proceeding.
status: active
required_edges:
  outgoing:
  - predicate: HANDOFFS_TO
    target_any_of:
    - node.worker
    - node.subagent
    - node.orchestrator
