id: node.blackboard
artifact: NodeClass
label: Blackboard
label_zh: 黑板
intra_level: 1
intra_group: shared-state
intra_group_zh: 共享状态
intra_role: state
parent_node: node.orchestrator
layer: orchestration
plane: OrchestrationPlane
description: 'Shared mutable state accessible to multiple agents for posting hypotheses, partial results, and coordination
  signals without direct pairwise messaging.

  '
attributes:
  entry_schema:
    type: object
    required: false
    description: Schema for records posted to the blackboard.
  access_control:
    type: object
    required: false
    description: Read/write permissions per participant role.
  retention_policy:
    type: object
    required: false
    description: Rules for entry expiration and archival.
status: active
required_edges:
  incoming:
  - predicate: SHARES_STATE_VIA
    source_any_of:
    - node.orchestrator
    - node.group_conversation
