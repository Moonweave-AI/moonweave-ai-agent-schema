id: node.router
artifact: NodeClass
label: Router
label_zh: 路由器
intra_level: 2
intra_group: routing-control
intra_group_zh: 路由控制
intra_role: process
parent_node: node.orchestrator
layer: orchestration
plane: OrchestrationPlane
description: 'An input classifier that inspects task state or user intent and dispatches work to one or more specialist handlers,
  tools, or sub-workflows via discrete routes.

  '
attributes:
  classification_schema:
    type: object
    required: false
    description: Output schema defining route labels and confidence scores.
  default_route_id:
    type: string
    required: true
    description: Fallback route when classification confidence is below threshold.
  confidence_threshold:
    type: object
    required: false
    description: Minimum score required to select a non-default route.
status: active
interfaces:
- ref: contract.orchestrable
required_edges:
  outgoing:
  - predicate: ROUTES_TO
    target: node.route
