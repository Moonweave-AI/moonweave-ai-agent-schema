id: node.consensus_policy
artifact: NodeClass
label: Consensus Policy
label_zh: 共识策略
intra_level: 3
intra_group: parallel-control
intra_group_zh: 并行控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: policy
parent_node: node.voting
layer: orchestration
plane: OrchestrationPlane
description: 'Rules defining how multiple agents reach agreement on outputs, decisions, or shared state updates, including
  quorum, voting weights, and tie-breaking.

  '
description_zh: >
  定义多个智能体如何就输出、决策或共享状态更新达成一致的规则，包括法定人数、投票权重和打破平局。
attributes:
  quorum_fraction:
    type: object
    required: false
    description: Minimum participant fraction required for a valid decision.
  decision_rule:
    type: enum
    required: true
    values:
    - unanimous
    - majority
    - weighted
    - moderator_final
    description: Mechanism for resolving disagreements.
  timeout_action:
    type: enum
    required: true
    values:
    - fail
    - moderator_decides
    - partial_accept
    description: Behavior when consensus is not reached in time.
status: active
