id: node.route
artifact: NodeClass
label: Route
label_zh: 路由分支
intra_level: 3
intra_group: routing-control
intra_group_zh: 路由控制
intra_axis: workflow-routing
intra_axis_zh: 工作流结构 / 路由控制
intra_role: artifact
parent_node: node.router
layer: orchestration
plane: OrchestrationPlane
description: 'One branch option emitted by a router, binding a classification label to a downstream handler, workflow fragment,
  or specialist agent.

  '
attributes:
  route_id:
    type: string
    required: true
    description: Unique label for this branch within the parent router.
  match_criteria:
    type: object
    required: false
    description: Classification labels or patterns that activate this route.
  target_ref:
    type: string
    required: true
    description: Reference to the downstream handler, workflow, or agent.
status: active
required_edges:
  incoming:
  - predicate: ROUTES_TO
    source: node.router
