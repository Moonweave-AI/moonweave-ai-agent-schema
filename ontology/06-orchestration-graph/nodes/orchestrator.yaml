id: node.orchestrator
artifact: NodeClass
label: Orchestrator
label_zh: 编排器
layer: orchestration
plane: OrchestrationPlane
description: 'A dynamic task decomposer and coordinator that breaks high-level goals into subtasks, assigns them to workers
  or tools, monitors progress, and aggregates results.

  '
attributes:
  decomposition_strategy:
    type: enum
    required: true
    values:
    - sequential
    - hierarchical
    - opportunistic
    description: Approach for breaking goals into subtasks.
  aggregation_strategy:
    type: enum
    required: true
    values:
    - concatenate
    - summarize
    - synthesize
    - select_best
    description: How subtask results are combined.
  max_delegation_depth:
    type: integer
    required: false
    description: Maximum nesting depth for subagent delegation chains.
status: active
interfaces:
- ref: contract.orchestrable
- ref: contract.delegable
required_edges:
  outgoing:
  - predicate: DELEGATES_TO
    target_any_of:
    - node.worker
    - node.subagent
  - predicate: COORDINATES
    target: node.group_conversation
