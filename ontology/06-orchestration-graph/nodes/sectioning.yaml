id: node.sectioning
artifact: NodeClass
label: Sectioning
label_zh: 分片
intra_level: 2
intra_group: parallel-control
intra_group_zh: 并行控制
intra_axis: delegation-parallelism
intra_axis_zh: 并行控制 / 委派控制
intra_role: pattern
parent_node: node.parallelization
layer: orchestration
plane: OrchestrationPlane
description: 'A parallelization pattern that splits a task or input into independent non-overlapping subtasks processed concurrently
  and merged at completion.

  '
description_zh: >
  一种并行化模式，将任务或输入拆分为独立的非重叠子任务，并发处理并在完成时合并。
attributes:
  partition_strategy:
    type: enum
    required: true
    values:
    - by_field
    - by_chunk
    - by_topic
    - custom
    description: Method used to divide input into sections.
  section_count:
    type: integer
    required: false
    description: Target or actual number of sections produced.
  overlap_allowed:
    type: boolean
    required: false
    description: Whether sections may share overlapping content.
status: active
required_edges:
  outgoing:
  - predicate: JOINS_FROM
    target: node.parallelization
  incoming:
  - predicate: FORKS_TO
    source: node.parallelization
