id: node.workflow_node
artifact: NodeClass
label: Workflow Node
label_zh: 工作流节点
intra_level: 2
intra_group: workflow-structure
intra_group_zh: 工作流结构
intra_axis: workflow-routing
intra_axis_zh: 工作流结构 / 路由控制
intra_role: state
parent_node: node.workflow
layer: orchestration
plane: OrchestrationPlane
description: 'A single processing step within a workflow graph. Each node encapsulates one unit of work—such as generation,
  transformation, evaluation, or delegation—and declares its inputs, outputs, and successor edges.

  '
description_zh: >
  工作流程图中的单个处理步骤。每个节点都封装一个工作单元（例如生成、转换、评估或委托），并声明其输入、输出和后继边。
attributes:
  step_id:
    type: string
    required: true
    description: Unique identifier of this step within the parent workflow.
  step_type:
    type: enum
    required: true
    values:
    - generate
    - transform
    - evaluate
    - delegate
    - aggregate
    - gate
    description: Category of processing performed at this step.
  timeout_seconds:
    type: integer
    required: false
    description: Maximum wall-clock duration permitted for this step before failure.
  retryable:
    type: boolean
    required: false
    description: Whether this step may be retried on transient failure.
status: active
interfaces:
- ref: contract.orchestrable
