id: node.gate
artifact: NodeClass
label: Gate
label_zh: 门控
intra_level: 2
intra_group: workflow-structure
intra_group_zh: 工作流结构
intra_role: control
parent_node: node.workflow
layer: orchestration
plane: OrchestrationPlane
description: 'A conditional checkpoint between workflow steps that permits, blocks, or reroutes execution based on predicates,
  policy outcomes, or quality thresholds.

  '
attributes:
  gate_type:
    type: enum
    required: true
    values:
    - predicate
    - policy
    - quality
    - human
    description: Mechanism used to evaluate whether traversal is allowed.
  predicate:
    type: object
    required: false
    description: Expression or rule set evaluated at the gate.
  on_fail_action:
    type: enum
    required: true
    values:
    - block
    - reroute
    - escalate
    description: Behavior when the gate condition is not satisfied.
status: active
required_edges:
  outgoing:
  - predicate: GATES
    target: node.workflow_node
