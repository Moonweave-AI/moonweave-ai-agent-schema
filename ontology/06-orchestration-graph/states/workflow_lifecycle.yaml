id: state.workflow_lifecycle
artifact: StateMachine
label: Workflow Lifecycle
label_zh: 工作流生命周期
description: 'Lifecycle states for a workflow definition from initial authoring through terminal completion or failure.

  '
states:
- name: defined
  initial: true
  description: Workflow schema authored but not yet validated.
- name: validated
  description: Structural and semantic validation passed; ready to execute.
- name: running
  description: At least one step is actively executing.
- name: paused
  description: Execution suspended; may resume from last checkpoint.
- name: completed
  terminal: true
  description: All terminal steps finished successfully.
- name: failed
  terminal: true
  description: Execution halted due to unrecoverable error.
transitions:
- from: defined
  to: validated
  trigger: validate
  description: Schema validation succeeds.
- from: validated
  to: running
  trigger: start
  description: Workflow execution begins.
- from: running
  to: paused
  trigger: pause
  description: Operator or policy pauses execution.
- from: paused
  to: running
  trigger: resume
  description: Execution resumes from pause point.
- from: running
  to: completed
  trigger: finish
  guard: all_steps_succeeded
- from: running
  to: failed
  trigger: fail
  description: Unrecoverable step failure.
- from: paused
  to: failed
  trigger: fail
status: active
