id: state.delegation_lifecycle
artifact: StateMachine
label: Delegation Lifecycle
label_zh: 委派生命周期
description: 'Lifecycle states tracking a delegated subtask from proposal through completion or rejection.

  '
states:
- name: proposed
  initial: true
  description: Delegation terms and subtask offered to delegate.
- name: accepted
  description: Delegate acknowledged and bound to the delegation contract.
- name: executing
  description: Delegate actively performing the subtask.
- name: reporting
  description: Delegate submitting completion report to delegator.
- name: completed
  terminal: true
  description: Delegator accepted the reported result.
- name: rejected
  terminal: true
  description: Delegate declined or delegator revoked the task.
transitions:
- from: proposed
  to: accepted
  trigger: accept
- from: proposed
  to: rejected
  trigger: reject
- from: accepted
  to: executing
  trigger: begin_execution
- from: executing
  to: reporting
  trigger: submit_report
- from: reporting
  to: completed
  trigger: acknowledge
- from: reporting
  to: executing
  trigger: request_revision
- from: accepted
  to: rejected
  trigger: revoke
- from: executing
  to: rejected
  trigger: revoke
status: active
