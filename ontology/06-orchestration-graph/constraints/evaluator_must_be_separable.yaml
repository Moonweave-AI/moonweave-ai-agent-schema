id: constraint.evaluator_must_be_separable
artifact: GraphConstraint
label: Evaluator Must Be Separable
label_zh: 评估器必须可分离
severity: error
rule: 'Every node.evaluator MUST NOT modify the artifact it assesses; it may only emit feedback, scores, or pass/fail signals.
  Revision MUST occur only via a distinct node.optimizer or generator node.

  '
description: 'Separation of assessment from generation prevents evaluation bias and enables auditable quality loops.

  '
status: active
applies_to:
  nodes:
  - node.evaluator
