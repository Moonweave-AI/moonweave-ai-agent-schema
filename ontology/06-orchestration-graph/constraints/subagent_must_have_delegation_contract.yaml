id: constraint.subagent_must_have_delegation_contract
artifact: GraphConstraint
label: Subagent Must Have Delegation Contract
label_zh: 子智能体必须有委派契约
severity: error
rule: 'Every node.subagent instance MUST reference or be connected via DELEGATES_TO to a node.delegation_contract that defines
  permitted scope before execution begins.

  '
description: 'Subagents operate with bounded authority; execution without an explicit delegation contract violates least-privilege
  orchestration.

  '
status: active
applies_to:
  nodes:
  - node.subagent
