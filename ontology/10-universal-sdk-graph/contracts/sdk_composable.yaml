id: contract.sdk_composable
artifact: InterfaceContract
label: SDK Composable
label_zh: SDK 可组合
description: >
  Behavioral contract requiring SDK components to be independently composable via plugins, middleware, and extension points.
operations:
  - name: compose
    description: Assemble SDK from kernel plus selected components
    input:
      components:
        type: array
        description: Component identifiers to compose
    output:
      sdk_instance:
        type: object
        description: Composed SDK instance
    errors: [CompositionConflictError, MissingDependencyError]
  - name: register_middleware
    description: Add middleware to the request pipeline
    input:
      middleware_ref:
        type: string
        description: Middleware registration reference
    output:
      registered:
        type: boolean
        description: Whether registration succeeded
    errors: [InvalidMiddlewareError]
status: active
