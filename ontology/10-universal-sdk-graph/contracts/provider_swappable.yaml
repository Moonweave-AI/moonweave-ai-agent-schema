id: contract.provider_swappable
artifact: InterfaceContract
label: Provider Swappable
label_zh: 提供者可替换
description: >
  Behavioral contract requiring provider adapters to be swappable without changing agent semantics or API contracts.
operations:
  - name: swap_provider
    description: Replace active provider adapter with alternate implementation
    input:
      provider_ref:
        type: string
        description: New provider adapter reference
    output:
      previous_ref:
        type: string
        description: Previously active provider reference
    errors: [IncompatibleProviderError, ActiveRunError]
  - name: list_providers
    description: Enumerate registered provider adapters by type
    input:
      provider_type:
        type: string
        description: Optional filter by provider category
    output:
      providers:
        type: array
        description: Available provider adapters
status: active
