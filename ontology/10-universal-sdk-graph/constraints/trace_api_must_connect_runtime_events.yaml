id: constraint.trace_api_must_connect_runtime_events
artifact: GraphConstraint
label: Trace API Must Connect Runtime Events
label_zh: 追踪 API 必须连接运行时事件
severity: warning
rule: >
  node.trace_api MUST subscribe to events emitted via edge.SDK_EMITS_EVENT from node.sdk_kernel and produce correlated trace spans.
applies_to:
  nodes: [node.trace_api]
  edges: [edge.SDK_EMITS_EVENT]
description: >
  Observability constraint linking runtime events to trace export for debugging and audit.
status: active
