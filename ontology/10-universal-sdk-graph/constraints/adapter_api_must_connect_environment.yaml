id: constraint.adapter_api_must_connect_environment
artifact: GraphConstraint
label: Adapter API Must Connect Environment
label_zh: 适配器 API 必须连接环境
severity: error
rule: >
  node.adapter_api MUST provide registration paths for node.sdk_environment_adapter instances connecting to environment-adapter-graph environments.
applies_to:
  nodes: [node.adapter_api, node.sdk_environment_adapter]
description: >
  Integration constraint ensuring SDK can bridge to all environment types via adapters.
status: active
