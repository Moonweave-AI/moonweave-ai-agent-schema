id: constraint.tool_api_must_support_all_action_types
artifact: GraphConstraint
label: Tool API Must Support All Action Types
label_zh: 工具 API 必须支持所有动作类型
severity: error
rule: >
  node.tool_api MUST expose operations covering registration, discovery, invocation, and result handling for all action types defined in the tool-action subgraph.
applies_to:
  nodes: [node.tool_api]
description: >
  Completeness constraint ensuring the tool API is a full-fidelity gateway to agent actions.
status: active
