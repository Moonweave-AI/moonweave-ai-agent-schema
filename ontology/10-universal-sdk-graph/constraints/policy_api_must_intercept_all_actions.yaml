id: constraint.policy_api_must_intercept_all_actions
artifact: GraphConstraint
label: Policy API Must Intercept All Actions
label_zh: 策略 API 必须拦截所有动作
severity: error
rule: >
  Every action dispatched through node.tool_api MUST pass through node.policy_api evaluation before execution unless explicitly exempted by documented policy.
applies_to:
  nodes: [node.policy_api, node.tool_api]
description: >
  Safety constraint ensuring policy enforcement is mandatory on all agent actions.
status: active
