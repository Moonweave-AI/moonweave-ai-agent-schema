id: constraint.sdk_must_not_depend_on_vendor
artifact: GraphConstraint
label: SDK Must Not Depend On Vendor
label_zh: SDK 不得依赖厂商
severity: error
rule: >
  No node in the universal-sdk-graph subgraph MAY reference vendor-specific identifiers in id fields, attribute values, or required configuration keys.
applies_to:
  nodes: [node.agent_sdk, node.provider_adapter, node.model_adapter]
description: >
  Vendor neutrality rule ensuring the universal SDK abstraction remains implementation-agnostic.
status: active
