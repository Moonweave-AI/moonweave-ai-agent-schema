id: node.serialization_format
artifact: NodeClass
label: Serialization Format
label_zh: 序列化格式
layer: sdk
description: >
  Data format specification for persistence and transport of SDK state, messages, and configuration artifacts.
attributes:
  format_name:
    type: enum
    required: true
    values: ['json', 'yaml', 'protobuf', 'msgpack', 'cbor']
    description: Serialization format identifier
  schema_ref:
    type: string
    required: false
    description: Reference to format-specific schema definition
  human_readable:
    type: boolean
    required: false
    description: Whether format is human-readable
status: active
