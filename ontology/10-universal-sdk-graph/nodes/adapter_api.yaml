id: node.adapter_api
artifact: NodeClass
label: Adapter API
label_zh: 适配器 API
layer: sdk
plane: Tool
description: >
  API for registering and connecting environment, model, tool, and storage adapters to the SDK kernel.
attributes:
  api_version:
    type: string
    required: true
    description: Semantic version of the API surface
  namespace:
    type: string
    required: false
    description: Logical namespace grouping API operations
  operation_count:
    type: integer
    required: false
    description: Number of exposed operations
status: active
