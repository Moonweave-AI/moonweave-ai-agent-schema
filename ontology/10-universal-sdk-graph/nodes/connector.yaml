id: node.connector
artifact: NodeClass
label: Connector
label_zh: 连接器
layer: sdk
description: >
  Adapter component connecting the SDK to an external service, protocol endpoint, or data source with normalized interface semantics.
attributes:
  connector_name:
    type: string
    required: true
    description: Connector identifier
  target_service:
    type: string
    required: true
    description: External service or protocol being connected
  connection_config_ref:
    type: string
    required: false
    description: Reference to connection configuration
status: active
