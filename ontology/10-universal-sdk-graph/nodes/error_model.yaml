id: node.error_model
artifact: NodeClass
label: Error Model
label_zh: 错误模型
layer: sdk
description: >
  Structured error type hierarchy defining error codes, categories, retry semantics, and propagation rules across SDK layers.
attributes:
  model_version:
    type: string
    required: true
    description: Error model schema version
  root_error_type:
    type: string
    required: true
    description: Base error type identifier
  error_category_count:
    type: integer
    required: false
    description: Number of defined error categories
status: active
