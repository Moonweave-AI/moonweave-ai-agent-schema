id: node.plugin
artifact: NodeClass
label: Plugin
label_zh: 插件
layer: sdk
description: >
  Self-contained extension package bundling middleware, hooks, adapters, and configuration for plug-and-play SDK enhancement.
attributes:
  plugin_name:
    type: string
    required: true
