id: node.agent_sdk
artifact: NodeClass
label: Agent SDK
label_zh: 智能体 SDK
layer: sdk
description: >
  Top-level software development kit abstraction providing a unified surface for building, configuring, and running autonomous agents without vendor lock-in.
attributes:
  sdk_name:
    type: string
    required: true
    description: Human-readable SDK identifier
  version:
    type: string
    required: true
    description: SDK release version
  supported_runtimes:
    type: array
    required: false
    description: Target runtime environments supported
interfaces:
  - ref: contract.sdk_composable
  - ref: contract.provider_swappable
state_machine:
  ref: state.sdk_lifecycle
status: active
