id: node.callback
artifact: NodeClass
label: Callback
label_zh: 回调
intra_level: 3
intra_group: extension-plane
intra_group_zh: 扩展平面
intra_axis: extension-runtime
intra_axis_zh: 扩展平面 / 运行时模型
intra_role: callback
parent_node: node.extension_point
layer: sdk
description: >
  User-provided function registered at a hook point and invoked when the corresponding lifecycle event occurs.
description_zh: >
  用户提供的函数在钩子点注册并在相应的生命周期事件发生时调用。
attributes:
  callback_id:
    type: string
    required: true
    description: Unique callback registration identifier
  handler_ref:
    type: string
    required: true
    description: Reference to registered handler implementation
  priority:
    type: integer
    required: false
    description: Invocation priority relative to other callbacks on same hook
status: active
