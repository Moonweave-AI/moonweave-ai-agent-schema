id: node.callback
artifact: NodeClass
label: Callback
label_zh: 回调
layer: sdk
description: >
  User-provided function registered at a hook point and invoked when the corresponding lifecycle event occurs.
attributes:
  callback_id:
    type: string
    required: true
    description: Unique callback registration identifier
  handler_ref:
    type: string
    required: true
    description: Reference to registered handler implementation
  priority:
    type: integer
    required: false
    description: Invocation priority relative to other callbacks on same hook
status: active
