id: node.sdk_kernel
artifact: NodeClass
label: SDK Kernel
label_zh: SDK 内核
layer: sdk
plane: Orchestration
description: >
  Core runtime kernel orchestrating agent lifecycle, dependency injection, event dispatch, and coordination of API subsystems within the SDK.
attributes:
  kernel_version:
    type: string
    required: true
    description: Kernel implementation version
  thread_model:
    type: enum
    required: false
    values: ['single_threaded', 'multi_threaded', 'async']
    description: Concurrency model
  boot_sequence:
    type: array
    required: false
    description: Ordered initialization steps at startup
status: active
