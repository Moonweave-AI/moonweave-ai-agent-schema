id: node.hook
artifact: NodeClass
label: Hook
label_zh: 钩子
layer: sdk
description: >
  Named callback point in SDK lifecycle events where registered callbacks are invoked synchronously or asynchronously.
attributes:
  hook_name:
    type: string
    required: true
    description: Unique hook identifier
  event_type:
    type: string
    required: true
    description: Lifecycle event that triggers this hook
  async_allowed:
    type: boolean
    required: false
    description: Whether callbacks may execute asynchronously
status: active
