id: node.hook
artifact: NodeClass
label: Hook
label_zh: 钩子
intra_level: 3
intra_group: extension-plane
intra_group_zh: 扩展平面
intra_axis: extension-runtime
intra_axis_zh: 扩展平面 / 运行时模型
intra_role: extension
parent_node: node.extension_point
layer: sdk
description: >
  Named callback point in SDK lifecycle events where registered callbacks are invoked synchronously or asynchronously.
description_zh: >
  SDK 生命周期事件中的命名回调点，其中注册的回调被同步或异步调用。
attributes:
  hook_name:
    type: string
    required: true
    description: Unique hook identifier
  event_type:
    type: string
    required: true
    description: Lifecycle event that triggers this hook
  async_allowed:
    type: boolean
    required: false
    description: Whether callbacks may execute asynchronously
status: active
