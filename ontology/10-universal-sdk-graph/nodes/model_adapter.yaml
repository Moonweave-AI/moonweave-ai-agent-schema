id: node.model_adapter
artifact: NodeClass
label: Model Adapter
label_zh: 模型适配器
layer: sdk
plane: Info
description: >
  Adapter abstracting large language model provider differences in authentication, request format, streaming, and token accounting.
attributes:
  model_family:
    type: string
    required: true
    description: Logical model family identifier
  supports_streaming:
    type: boolean
    required: false
    description: Whether adapter supports streaming completions
  supports_tools:
    type: boolean
    required: false
    description: Whether adapter supports native tool calling
status: active
