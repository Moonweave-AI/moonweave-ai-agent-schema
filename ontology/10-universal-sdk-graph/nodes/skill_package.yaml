id: node.skill_package
artifact: NodeClass
label: Skill Package
label_zh: 技能包
intra_level: 2
intra_group: extension-plane
intra_group_zh: 扩展平面
intra_role: package
parent_node: node.extension_point
layer: sdk
plane: Tool
description: >
  Bundled capability package combining tools, prompts, workflows, and policies into a reusable agent skill module.
attributes:
  skill_name:
    type: string
    required: true
    description: Skill package identifier
  skill_version:
    type: string
    required: true
    description: Semantic version of the skill bundle
  tool_count:
    type: integer
    required: false
    description: Number of tools included in the package
status: active
