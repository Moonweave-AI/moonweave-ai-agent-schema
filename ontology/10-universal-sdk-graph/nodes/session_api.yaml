id: node.session_api
artifact: NodeClass
label: Session API
label_zh: 会话 API
layer: sdk
plane: Orchestration
description: >
  API for session lifecycle management including creation, persistence, resumption, and teardown of conversational contexts.
attributes:
  api_version:
    type: string
    required: true
    description: Semantic version of the API surface
  namespace:
    type: string
    required: false
    description: Logical namespace grouping API operations
  operation_count:
    type: integer
    required: false
    description: Number of exposed operations
status: active
