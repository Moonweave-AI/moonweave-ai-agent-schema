id: node.extension_point
artifact: NodeClass
label: Extension Point
label_zh: 扩展点
intra_level: 1
intra_group: extension-plane
intra_group_zh: 扩展平面
intra_axis: extension-runtime
intra_axis_zh: 扩展平面 / 运行时模型
intra_role: extension
parent_node: node.sdk_kernel
layer: sdk
description: >
  Named hook location in the SDK where third-party or user code may inject behavior without modifying kernel internals.
description_zh: >
  SDK 中的命名挂钩位置，第三方或用户代码可以在不修改内核内部的情况下注入行为。
attributes:
  point_name:
    type: string
    required: true
    description: Unique extension point identifier
  hook_phase:
    type: enum
    required: true
    values: ['boot', 'pre_run', 'post_run', 'shutdown']
    description: Lifecycle phase when extension is invoked
  signature_ref:
    type: string
    required: false
    description: Reference to expected callback signature schema
status: active
