id: node.middleware
artifact: NodeClass
label: Middleware
label_zh: 中间件
intra_level: 3
intra_group: extension-plane
intra_group_zh: 扩展平面
intra_axis: extension-runtime
intra_axis_zh: 扩展平面 / 运行时模型
intra_role: extension
parent_node: node.extension_point
layer: sdk
description: >
  Interceptor in the SDK request/response pipeline that can inspect, transform, short-circuit, or augment operations before and after execution.
description_zh: >
  SDK 请求/响应管道中的拦截器，可以在执行之前和之后检查、转换、短路或增强操作。
attributes:
  middleware_name:
    type: string
    required: true
    description: Registered middleware identifier
  pipeline_order:
    type: integer
    required: false
    description: Execution order in the middleware chain
  applies_to:
    type: array
    required: false
    description: API operations or action types this middleware intercepts
status: active
