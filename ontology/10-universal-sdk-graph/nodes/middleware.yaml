id: node.middleware
artifact: NodeClass
label: Middleware
label_zh: 中间件
layer: sdk
description: >
  Interceptor in the SDK request/response pipeline that can inspect, transform, short-circuit, or augment operations before and after execution.
attributes:
  middleware_name:
    type: string
    required: true
    description: Registered middleware identifier
  pipeline_order:
    type: integer
    required: false
    description: Execution order in the middleware chain
  applies_to:
    type: array
    required: false
    description: API operations or action types this middleware intercepts
status: active
