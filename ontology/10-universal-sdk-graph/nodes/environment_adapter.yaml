id: node.sdk_environment_adapter
artifact: NodeClass
label: SDK Environment Adapter
label_zh: SDK 环境适配器
layer: sdk
description: >
  SDK-side adapter registration object that binds the generic AdapterAPI to concrete environment adapters without owning the environment ontology concept.
attributes:
  environment_type:
    type: string
    required: true
    description: Target environment category being adapted
  observation_schema_ref:
    type: string
    required: false
    description: Schema for normalized observations
  action_schema_ref:
    type: string
    required: false
    description: Schema for normalized actions
status: active
