id: node.sdk_environment_adapter
artifact: NodeClass
label: SDK Environment Adapter
label_zh: SDK 环境适配器
intra_level: 2
intra_group: adapter-plane
intra_group_zh: 适配器平面
intra_axis: adapters-bindings
intra_axis_zh: 适配器平面
intra_role: adapter
parent_node: node.sdk_kernel
layer: sdk
description: >
  SDK-side adapter registration object that binds the generic AdapterAPI to concrete environment adapters without owning the environment ontology concept.
description_zh: >
  SDK端适配器注册对象，将通用AdapterAPI绑定到具体环境适配器，而不拥有环境本体概念。
attributes:
  environment_type:
    type: string
    required: true
    description: Target environment category being adapted
  observation_schema_ref:
    type: string
    required: false
    description: Schema for normalized observations
  action_schema_ref:
    type: string
    required: false
    description: Schema for normalized actions
status: active
