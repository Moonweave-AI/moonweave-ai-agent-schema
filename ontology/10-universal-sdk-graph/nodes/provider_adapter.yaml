id: node.provider_adapter
artifact: NodeClass
label: Provider Adapter
label_zh: 提供者适配器
layer: sdk
description: >
  Generic adapter abstracting differences between model, tool, or storage provider implementations behind a uniform SDK interface.
attributes:
  provider_type:
    type: enum
    required: true
    values: ['model', 'tool', 'storage', 'transport']
    description: Category of provider being adapted
  provider_id:
    type: string
    required: true
    description: Logical provider identifier without vendor naming
  capability_profile_ref:
    type: string
    required: false
    description: Reference to provider capability profile
status: active
