id: state.sdk_lifecycle
artifact: StateMachine
label: SDK Lifecycle
label_zh: SDK 生命周期
description: >
  Lifecycle states for an agent SDK instance from uninitialized boot through configuration, ready state, active runs, shutdown, and termination.
states:
  - name: uninitialized
    initial: true
    description: SDK created but not yet configured
  - name: configuring
    description: Loading configuration, plugins, and adapters
  - name: ready
    description: SDK configured and ready to accept run requests
  - name: running
    description: One or more agent runs actively executing
  - name: shutting_down
    description: Graceful shutdown in progress, draining active runs
  - name: terminated
    terminal: true
    description: SDK fully shut down and resources released
transitions:
  - from: uninitialized
    to: configuring
    trigger: configure
    description: Begin SDK configuration
  - from: configuring
    to: ready
    trigger: ready
    description: Configuration complete
  - from: configuring
    to: terminated
    trigger: configure_failed
    description: Configuration failed fatally
  - from: ready
    to: running
    trigger: start_run
    description: Agent run started
  - from: running
    to: ready
    trigger: run_complete
    description: All active runs finished
  - from: ready
    to: shutting_down
    trigger: shutdown
    description: Initiate graceful shutdown
  - from: running
    to: shutting_down
    trigger: shutdown
    description: Shutdown requested during active runs
  - from: shutting_down
    to: terminated
    trigger: shutdown_complete
    description: Shutdown finished
status: active
