id: node.planning_process
artifact: NodeClass
label: Planning Process
label_zh: 规划过程
description: Goal-directed process that decomposes objectives into structured plans with ordered steps, dependencies, and
  contingency handling.
attributes:
  planning_strategy:
    type: string
    required: false
    values:
    - forward
    - backward
    - hierarchical
    - opportunistic
    description: Planning algorithm approach
  goal_id:
    type: string
    required: false
    description: Identifier of the goal being planned for
  replan_count:
    type: integer
    required: false
    description: Number of replanning iterations so far
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
interfaces:
- ref: contract.plannable
