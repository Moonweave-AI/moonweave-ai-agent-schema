id: node.planning_process
artifact: NodeClass
label: Planning Process
label_zh: 规划过程
intra_level: 1
intra_group: planning-loop
intra_group_zh: 规划循环
intra_axis: plan-search
intra_axis_zh: 搜索空间 / 规划循环
intra_role: process
parent_node: node.reasoning_process
description: Goal-directed process that decomposes objectives into structured plans with ordered steps, dependencies, and
  contingency handling.
description_zh: >
  以目标为导向的流程，将目标分解为具有有序步骤、依赖性和应急处理的结构化计划。
attributes:
  planning_strategy:
    type: string
    required: false
    values:
    - forward
    - backward
    - hierarchical
    - opportunistic
    description: Planning algorithm approach
  goal_id:
    type: string
    required: false
    description: Identifier of the goal being planned for
  replan_count:
    type: integer
    required: false
    description: Number of replanning iterations so far
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
interfaces:
- ref: contract.plannable
