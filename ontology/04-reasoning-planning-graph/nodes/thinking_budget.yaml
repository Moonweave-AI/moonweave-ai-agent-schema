id: node.thinking_budget
artifact: NodeClass
label: Thinking Budget
label_zh: 思考预算
description: Token, time, or cost limit imposed on reasoning and planning activities to prevent unbounded computation and
  control resource consumption.
attributes:
  budget_type:
    type: string
    required: true
    values:
    - token
    - time_ms
    - cost
    - step_count
    description: Unit of budget measurement
  limit:
    type: number
    required: true
    description: Maximum allowed budget amount
  consumed:
    type: number
    required: false
    description: Amount consumed so far
  hard_limit:
    type: boolean
    required: false
    description: Whether exceeding budget is strictly forbidden
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
