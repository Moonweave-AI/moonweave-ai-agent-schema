id: node.plan_step
artifact: NodeClass
label: Plan Step
label_zh: 计划步骤
intra_level: 3
intra_group: planning-loop
intra_group_zh: 规划循环
intra_axis: plan-search
intra_axis_zh: 搜索空间 / 规划循环
intra_role: artifact
parent_node: node.plan
description: Individual action or decision within a plan, binding to a concrete action in the action space with preconditions
  and expected effects.
description_zh: >
  计划内的个人行动或决定，与行动空间中的具体行动绑定，具有先决条件和预期效果。
attributes:
  step_index:
    type: integer
    required: true
    description: Ordinal position within the plan
  action_ref:
    type: string
    required: true
    description: Reference to the bound action or tool
  status:
    type: string
    required: false
    values:
    - pending
    - running
    - completed
    - failed
    - skipped
    description: Execution status of this step
  preconditions:
    type: array
    required: false
    description: Conditions that must hold before step execution
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
