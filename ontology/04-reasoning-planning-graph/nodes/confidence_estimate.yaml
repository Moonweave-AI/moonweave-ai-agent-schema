id: node.confidence_estimate
artifact: NodeClass
label: Confidence Estimate
label_zh: 置信度估计
intra_level: 2
intra_group: epistemic-control
intra_group_zh: 认知置信控制
intra_axis: reflection-epistemic
intra_axis_zh: 认知置信控制 / 反思控制
intra_role: metric
parent_node: node.reasoning_process
description: Quantified confidence score attached to a conclusion, plan step, or prediction, typically on a calibrated probability
  or ordinal scale.
description_zh: >
  附加到结论、计划步骤或预测的量化置信度得分，通常采用校准概率或序数尺度。
attributes:
  score:
    type: number
    required: true
    description: Confidence value, typically 0.0 to 1.0
  calibration_method:
    type: string
    required: false
    values:
    - self_report
    - ensemble
    - verifier
    - historical
    description: How confidence was derived
  target_ref:
    type: string
    required: true
    description: Reference to the entity being scored
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
