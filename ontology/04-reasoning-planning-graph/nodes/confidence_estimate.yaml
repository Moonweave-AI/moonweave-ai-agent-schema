id: node.confidence_estimate
artifact: NodeClass
label: Confidence Estimate
label_zh: 置信度估计
description: Quantified confidence score attached to a conclusion, plan step, or prediction, typically on a calibrated probability
  or ordinal scale.
attributes:
  score:
    type: number
    required: true
    description: Confidence value, typically 0.0 to 1.0
  calibration_method:
    type: string
    required: false
    values:
    - self_report
    - ensemble
    - verifier
    - historical
    description: How confidence was derived
  target_ref:
    type: string
    required: true
    description: Reference to the entity being scored
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
