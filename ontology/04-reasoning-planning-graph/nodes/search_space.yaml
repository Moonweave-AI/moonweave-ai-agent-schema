id: node.search_space
artifact: NodeClass
label: Search Space
label_zh: 搜索空间
description: Tree or graph of possible reasoning branches representing alternative inference paths, hypotheses, or plan variants
  under exploration.
attributes:
  node_count:
    type: integer
    required: false
    description: Number of thought nodes in the space
  max_width:
    type: integer
    required: false
    description: Maximum branching factor
  exploration_policy:
    type: string
    required: false
    values:
    - bfs
    - dfs
    - beam
    - mcts
    - best_first
    description: Strategy for traversing the space
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
