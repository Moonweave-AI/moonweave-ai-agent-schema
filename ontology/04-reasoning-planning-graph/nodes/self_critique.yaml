id: node.self_critique
artifact: NodeClass
label: Self Critique
label_zh: 自我批评
description: Explicit identification of errors, weaknesses, gaps, or uncertainties in reasoning output or plan structure,
  often triggering replanning.
attributes:
  severity:
    type: string
    required: false
    values:
    - minor
    - moderate
    - critical
    description: Severity of identified issues
  issue_categories:
    type: array
    required: false
    description: Taxonomy labels for identified problems
  actionable:
    type: boolean
    required: false
    description: Whether critique includes concrete remediation suggestions
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
