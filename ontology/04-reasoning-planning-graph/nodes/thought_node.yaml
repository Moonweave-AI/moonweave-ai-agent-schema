id: node.thought_node
artifact: NodeClass
label: Thought Node
label_zh: 思维节点
intra_level: 2
intra_group: search-space
intra_group_zh: 搜索空间
intra_axis: plan-search
intra_axis_zh: 搜索空间 / 规划循环
intra_role: state
parent_node: node.search_space
description: Single reasoning state within a search space, representing an intermediate conclusion, hypothesis, or partial
  plan at a point in the exploration.
description_zh: >
  搜索空间内的单一推理状态，表示探索中某个点的中间结论、假设或部分计划。
attributes:
  content:
    type: string
    required: true
    description: Text or structured representation of the thought
  score:
    type: number
    required: false
    description: Heuristic or evaluator score for this node
  depth:
    type: integer
    required: false
    description: Depth from the root of the search space
  is_terminal:
    type: boolean
    required: false
    description: Whether this node represents a final conclusion
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
