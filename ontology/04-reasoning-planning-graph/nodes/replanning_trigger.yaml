id: node.replanning_trigger
artifact: NodeClass
label: Replanning Trigger
label_zh: 重规划触发器
intra_level: 3
intra_group: planning-loop
intra_group_zh: 规划循环
intra_axis: plan-search
intra_axis_zh: 搜索空间 / 规划循环
intra_role: signal
parent_node: node.planning_process
description: Condition or event that forces revision of an active plan, such as step failure, environment change, new information,
  or self-critique findings.
attributes:
  trigger_type:
    type: string
    required: true
    values:
    - step_failure
    - environment_change
    - goal_change
    - critique
    - timeout
    - budget_exhausted
    description: Category of replanning cause
  severity:
    type: string
    required: false
    values:
    - soft
    - hard
    description: Whether replanning is suggested or mandatory
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
