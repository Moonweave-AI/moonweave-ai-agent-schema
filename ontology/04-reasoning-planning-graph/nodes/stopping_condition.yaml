id: node.stopping_condition
artifact: NodeClass
label: Stopping Condition
label_zh: 停止条件
description: Criteria for terminating a reasoning or planning process, including success, failure, budget exhaustion, convergence,
  or timeout.
attributes:
  condition_type:
    type: string
    required: true
    values:
    - goal_reached
    - max_iterations
    - budget_exhausted
    - confidence_threshold
    - timeout
    - no_improvement
    description: Kind of stop criterion
  threshold:
    type: number
    required: false
    description: Numeric threshold for the condition when applicable
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
