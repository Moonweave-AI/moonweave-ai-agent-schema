id: node.reasoning_process
artifact: NodeClass
label: Reasoning Process
label_zh: 推理过程
intra_level: 0
intra_group: reasoning-root
intra_group_zh: 推理根
intra_axis: reasoning-foundation
intra_axis_zh: 推理根
intra_role: anchor
description: Abstract computation that transforms inputs into conclusions through logical, analogical, or generative inference.
  May operate within a bounded search space.
description_zh: >
  通过逻辑、类比或生成推理将输入转化为结论的抽象计算。可以在有限的搜索空间内操作。
attributes:
  reasoning_mode:
    type: string
    required: true
    values:
    - deductive
    - inductive
    - abductive
    - analogical
    - generative
    description: Primary inference mode
  max_depth:
    type: integer
    required: false
    description: Maximum reasoning chain depth
  started_at:
    type: string
    required: false
    description: ISO timestamp when reasoning began
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
state_machine:
  ref: state.reasoning_lifecycle
