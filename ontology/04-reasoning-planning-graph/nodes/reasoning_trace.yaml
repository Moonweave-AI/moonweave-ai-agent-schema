id: node.reasoning_trace
artifact: NodeClass
label: Reasoning Trace
label_zh: 推理轨迹
intra_level: 3
intra_group: reflection-control
intra_group_zh: 反思控制
intra_axis: reflection-epistemic
intra_axis_zh: 认知置信控制 / 反思控制
intra_role: trace
parent_node: node.reasoning_process
description: Recorded sequence of reasoning steps, intermediate conclusions, and branch decisions enabling audit, replay,
  and debugging of agent cognition.
attributes:
  step_count:
    type: integer
    required: false
    description: Number of recorded reasoning steps
  trace_format:
    type: string
    required: false
    values:
    - chain_of_thought
    - tree_of_thought
    - graph
    - structured_log
    description: Representation format of the trace
  completed:
    type: boolean
    required: false
    description: Whether the reasoning run finished normally
evidence:
- ref: evidence.paper.cognitive_architecture
layer: cognitive
plane: orchestration
required_edges:
  outgoing:
  - predicate: CONSUMES_BUDGET
    target: node.thinking_budget
