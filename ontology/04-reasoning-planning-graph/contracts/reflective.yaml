id: contract.reflective
artifact: InterfaceContract
label: Reflective
label_zh: 可反思
description: Interface for components that perform self-critique and quality assessment.
operations:
- name: reflect
  description: Assess quality of a reasoning artifact
  input:
    target_ref: string
    target_type: string
  output:
    critique: object
    severity: string
    suggestions: array
  errors:
  - target_not_found
- name: should_replan
  description: Determine if reflection warrants replanning
  input:
    critique_id: string
  output:
    replan_recommended: boolean
    reason: string
  errors: []
