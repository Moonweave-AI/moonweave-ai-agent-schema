id: contract.plannable
artifact: InterfaceContract
label: Plannable
label_zh: 可规划
description: Interface for components that can generate or revise structured plans from goals.
operations:
- name: create_plan
  description: Generate a plan from a goal description
  input:
    goal: string
    constraints: object
    context: object
  output:
    plan_id: string
    steps: array
  errors:
  - goal_ambiguous
  - infeasible_goal
- name: revise_plan
  description: Revise an existing plan given new information or failure
  input:
    plan_id: string
    trigger: object
    partial_results: object
  output:
    plan_id: string
    version: integer
  errors:
  - plan_not_found
  - revision_failed
