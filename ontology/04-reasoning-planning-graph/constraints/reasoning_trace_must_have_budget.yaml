id: constraint.reasoning_trace_must_have_budget
artifact: GraphConstraint
label: Reasoning Trace Must Have Budget
label_zh: 推理轨迹必须关联预算
severity: error
rule: Every ReasoningTrace MUST have at least one incoming CONSUMES_BUDGET edge from a ThinkingBudget, or be directly linked
  to a ReasoningProcess that consumes a budget.
description: Prevents unbounded reasoning without resource accountability.
applies_to:
  nodes:
  - node.reasoning_trace
  edges:
  - edge.CONSUMES_BUDGET
