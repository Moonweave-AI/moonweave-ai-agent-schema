id: constraint.plan_step_must_bind_action
artifact: GraphConstraint
label: Plan Step Must Bind Action
label_zh: 计划步骤必须绑定动作
severity: error
rule: Every PlanStep node MUST have a non-empty action_ref attribute referencing a valid action in the action space. Steps
  without bound actions are invalid.
description: Ensures plans are executable rather than abstract intent lists.
applies_to:
  nodes:
  - node.plan_step
