id: state.plan_lifecycle
artifact: StateMachine
label: Plan Lifecycle
label_zh: 计划生命周期
description: Lifecycle states for plans from initial drafting through execution, replanning, or abandonment.
states:
- name: drafting
  initial: true
  description: Plan is being constructed but not yet validated
- name: validated
  description: Plan passed feasibility and policy checks
- name: executing
  description: Plan steps are actively being executed
- name: replanning
  description: Plan is being revised due to trigger event
- name: completed
  terminal: true
  description: All plan steps finished successfully
- name: abandoned
  terminal: true
  description: Plan terminated without completion
transitions:
- from: drafting
  to: validated
  trigger: validation_passed
- from: validated
  to: executing
  trigger: execution_started
- from: executing
  to: replanning
  trigger: replan_triggered
- from: replanning
  to: validated
  trigger: revision_complete
- from: executing
  to: completed
  trigger: all_steps_done
- from: drafting
  to: abandoned
  trigger: goal_cancelled
- from: executing
  to: abandoned
  trigger: unrecoverable_failure
