id: state.reasoning_lifecycle
artifact: StateMachine
label: Reasoning Lifecycle
label_zh: 推理生命周期
description: Lifecycle states for an active reasoning process from initialization through convergence or timeout.
states:
- name: initialized
  initial: true
  description: Reasoning process created but not yet exploring
- name: exploring
  description: Actively expanding search space and generating thoughts
- name: evaluating
  description: Scoring and comparing candidate branches
- name: converged
  terminal: true
  description: Reasoning reached a satisfactory conclusion
- name: timed_out
  terminal: true
  description: Reasoning stopped due to budget or time limit
transitions:
- from: initialized
  to: exploring
  trigger: search_started
- from: exploring
  to: evaluating
  trigger: candidates_ready
- from: evaluating
  to: exploring
  trigger: branch_selected
- from: evaluating
  to: converged
  trigger: confidence_threshold_met
- from: exploring
  to: timed_out
  trigger: budget_exhausted
- from: evaluating
  to: timed_out
  trigger: timeout
