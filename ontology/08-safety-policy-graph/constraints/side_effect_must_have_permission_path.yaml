id: constraint.side_effect_must_have_permission_path
artifact: GraphConstraint
label: Side Effect Must Have Permission Path
label_zh: 副作用必须有权限路径
severity: error
rule: 'Every side-effecting environment action MUST trace an AUTHORIZES or explicit allow-list path through node.permission_policy
  before execution.

  '
description: 'Side effects without permission paths violate least-privilege and auditability requirements.

  '
status: active
applies_to:
  nodes:
  - node.permission_policy
