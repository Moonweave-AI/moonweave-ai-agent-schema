id: constraint.tool_call_must_be_guarded
artifact: GraphConstraint
label: Tool Call Must Be Guarded
label_zh: 工具调用必须被防护
severity: error
rule: 'Every node.tool_call instance MUST have at least one incoming GUARDS edge from a node.policy_contract or equivalent
  permission policy before execution proceeds. Cross-reference: ontology/05-tool-action-graph.

  '
description: 'Unguarded tool calls enable unrestricted side effects in untrusted agent contexts.

  '
status: active
applies_to:
  nodes:
  - node.tool_call
