id: constraint.memory_write_must_have_policy
artifact: GraphConstraint
label: Memory Write Must Have Policy
label_zh: 记忆写入必须有策略
severity: error
rule: 'Every memory write operation MUST connect to a write policy via GUARDS or LABELS_DATA ensuring data classification
  and retention rules are enforced.

  '
description: 'Uncontrolled memory writes may persist sensitive or tainted data beyond policy limits.

  '
status: active
