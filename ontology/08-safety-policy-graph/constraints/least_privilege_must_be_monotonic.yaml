id: constraint.least_privilege_must_be_monotonic
artifact: GraphConstraint
label: Least Privilege Must Be Monotonic
label_zh: 最小权限必须单调
severity: error
rule: 'Permission scope MUST NOT expand automatically during a session without explicit elevation through node.approval_flow
  or node.escalation. node.least_privilege.monotonic_reduction MUST be honored.

  '
description: 'Automatic permission expansion undermines defense-in-depth and audit boundaries.

  '
status: active
applies_to:
  nodes:
  - node.least_privilege
  - node.privilege_control
