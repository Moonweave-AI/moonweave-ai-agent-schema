id: node.deny_decision
artifact: NodeClass
label: Deny Decision
label_zh: 拒绝决策
layer: safety
plane: SafetyPlane
description: 'Policy outcome blocking a requested action, returning rationale and optional retry guidance.

  '
attributes:
  reason_code:
    type: string
    required: true
    description: Machine-readable denial reason.
  rationale:
    type: string
    required: true
    description: Human-readable explanation of the denial.
  retry_allowed:
    type: boolean
    required: false
    description: Whether the agent may retry with modified parameters.
status: active
state_machine:
  ref: state.policy_enforcement_lifecycle
required_edges:
  incoming:
  - predicate: DENIES
    source: node.policy_contract
