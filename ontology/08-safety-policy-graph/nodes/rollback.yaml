id: node.rollback
artifact: NodeClass
label: Rollback
label_zh: 回滚
intra_level: 3
intra_group: execution-separation
intra_group_zh: 认知执行分离
intra_axis: execution-information-safety
intra_axis_zh: 认知执行分离 / 信息流控制
intra_role: process
parent_node: node.sandbox_policy
layer: safety
plane: SafetyPlane
description: 'Reversal of a completed action to restore prior state when post-execution review determines the action was unauthorized
  or harmful.

  '
description_zh: >
  当执行后审查确定该操作未经授权或有害时，撤消已完成的操作以恢复之前的状态。
attributes:
  rollback_strategy:
    type: enum
    required: true
    values:
    - compensating_action
    - state_restore
    - manual
    description: Method for undoing the action.
  target_action_ref:
    type: string
    required: true
    description: Reference to the action being reversed.
  verification_required:
    type: boolean
    required: false
    description: Whether rollback success must be confirmed before closing.
status: active
required_edges:
  outgoing:
  - predicate: ROLLS_BACK
    target_any_of:
    - node.deny_decision
    - node.audit_log
