id: node.taint
artifact: NodeClass
label: Taint
label_zh: 污点
intra_level: 2
intra_group: information-flow
intra_group_zh: 信息流控制
intra_role: state
parent_node: node.information_flow_control
layer: safety
plane: SafetyPlane
description: 'Untrusted data marking that propagates through processing, preventing tainted values from influencing security-sensitive
  operations without sanitization.

  '
attributes:
  taint_source:
    type: string
    required: true
    description: Origin of the untrusted data.
  propagation_rules:
    type: object
    required: false
    description: Operations that preserve or remove taint.
  sanitization_required_for:
    type: object
    required: false
    description: Sensitive sinks requiring taint removal.
status: active
required_edges:
  incoming:
  - predicate: PROPAGATES_TAINT
    source: node.information_flow_control
