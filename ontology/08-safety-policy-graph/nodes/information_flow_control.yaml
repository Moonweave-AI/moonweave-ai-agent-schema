id: node.information_flow_control
artifact: NodeClass
label: Information Flow Control
label_zh: 信息流控制
layer: safety
plane: SafetyPlane
description: 'Framework for data label propagation and enforcement ensuring sensitive information does not flow to unauthorized
  sinks.

  '
attributes:
  label_hierarchy:
    type: object
    required: false
    description: Ordering of confidentiality and integrity labels.
  flow_rules:
    type: object
    required: false
    description: Rules defining permitted label transitions across boundaries.
status: active
required_edges:
  outgoing:
  - predicate: LABELS_DATA
    target: node.data_label
  - predicate: PROPAGATES_TAINT
    target: node.taint
