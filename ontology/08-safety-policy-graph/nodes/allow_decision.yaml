id: node.allow_decision
artifact: NodeClass
label: Allow Decision
label_zh: 允许决策
layer: safety
plane: SafetyPlane
description: 'Policy outcome permitting a requested action within the granted scope and attached conditions.

  '
attributes:
  granted_scope:
    type: object
    required: false
    description: Specific permissions or resources authorized.
  conditions:
    type: object
    required: false
    description: Optional constraints attached to the allowance.
  expires_at:
    type: string
    required: true
    description: Optional expiration for time-bound permissions.
status: active
state_machine:
  ref: state.policy_enforcement_lifecycle
required_edges:
  incoming:
  - predicate: AUTHORIZES
    source: node.policy_contract
