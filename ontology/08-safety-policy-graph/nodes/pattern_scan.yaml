id: node.pattern_scan
artifact: NodeClass
label: Pattern Scan
label_zh: 模式扫描
intra_level: 2
intra_group: threat-detection
intra_group_zh: 威胁检测
intra_axis: threat-human-governance
intra_axis_zh: 人工治理 / 威胁检测
intra_role: process
parent_node: node.policy_contract
layer: safety
plane: SafetyPlane
description: 'Signature-based scanning of inputs and outputs for known attack patterns, policy violations, or sensitive data
  leakage.

  '
attributes:
  pattern_library_ref:
    type: string
    required: true
    description: Reference to the signature rule set.
  scan_targets:
    type: object
    required: false
    description: Input, output, or tool-result channels subject to scanning.
  match_action:
    type: enum
    required: true
    values:
    - block
    - warn
    - redact
    - log
    description: Action on pattern match.
status: active
required_edges:
  incoming:
  - predicate: SCANS_FOR
    source: node.prompt_injection_defense
