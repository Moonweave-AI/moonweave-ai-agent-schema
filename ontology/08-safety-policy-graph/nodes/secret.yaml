id: node.secret
artifact: NodeClass
label: Secret
label_zh: 密钥
layer: safety
plane: SafetyPlane
description: 'Sensitive credential, API key, or cryptographic material that must never appear in agent context, logs, or sandbox
  filesystems.

  '
attributes:
  secret_type:
    type: enum
    required: true
    values:
    - api_key
    - password
    - certificate
    - token
    description: Category of credential.
  rotation_policy_ref:
    type: string
    required: true
    description: Reference to automatic rotation schedule.
  storage_backend:
    type: string
    required: true
    description: Secure vault or key management reference.
status: active
required_edges:
  incoming:
  - predicate: PROXIES_CREDENTIAL
    source: node.credential_proxy
