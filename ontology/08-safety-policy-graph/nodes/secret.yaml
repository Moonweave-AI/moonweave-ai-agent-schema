id: node.secret
artifact: NodeClass
label: Secret
label_zh: 密钥
intra_level: 2
intra_group: information-flow
intra_group_zh: 信息流控制
intra_role: resource
parent_node: node.information_flow_control
layer: safety
plane: SafetyPlane
description: 'Sensitive credential, API key, or cryptographic material that must never appear in agent context, logs, or sandbox
  filesystems.

  '
attributes:
  secret_type:
    type: enum
    required: true
    values:
    - api_key
    - password
    - certificate
    - token
    description: Category of credential.
  rotation_policy_ref:
    type: string
    required: true
    description: Reference to automatic rotation schedule.
  storage_backend:
    type: string
    required: true
    description: Secure vault or key management reference.
status: active
required_edges:
  incoming:
  - predicate: PROXIES_CREDENTIAL
    source: node.credential_proxy
