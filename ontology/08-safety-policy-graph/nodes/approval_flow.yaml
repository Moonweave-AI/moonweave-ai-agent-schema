id: node.approval_flow
artifact: NodeClass
label: Approval Flow
label_zh: 审批流程
intra_level: 2
intra_group: human-governance
intra_group_zh: 人工治理
intra_role: process
parent_node: node.policy_contract
layer: safety
plane: SafetyPlane
description: 'Human-in-the-loop approval process requiring explicit authorization before high-risk or sensitive actions proceed.

  '
attributes:
  approver_roles:
    type: object
    required: false
    description: Roles eligible to grant approval.
  timeout_seconds:
    type: integer
    required: false
    description: Duration before pending approval times out.
  auto_deny_on_timeout:
    type: boolean
    required: false
    description: Whether timeout results in denial rather than escalation.
status: active
state_machine:
  ref: state.approval_lifecycle
required_edges:
  outgoing:
  - predicate: REQUIRES_HUMAN_REVIEW
    target: node.human_review
