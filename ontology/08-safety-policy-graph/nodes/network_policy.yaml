id: node.network_policy
artifact: NodeClass
label: Network Policy
label_zh: 网络策略
intra_level: 2
intra_group: execution-separation
intra_group_zh: 认知执行分离
intra_role: policy
parent_node: node.cognitive_executive_separation
layer: safety
plane: SafetyPlane
description: 'Rules for network access enforcing deny-by-default egress with explicit allow lists for domains, ports, and
  protocols.

  '
attributes:
  default_egress:
    type: enum
    required: true
    values:
    - deny
    - allow
    description: Default effect for outbound connections.
  allowed_destinations:
    type: object
    required: false
    description: Explicit egress allow list entries.
  protocol_restrictions:
    type: object
    required: false
    description: Permitted protocols and TLS requirements.
status: active
