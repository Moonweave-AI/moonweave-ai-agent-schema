id: node.sandbox_policy
artifact: NodeClass
label: Sandbox Policy
label_zh: 沙箱策略
intra_level: 2
intra_group: execution-separation
intra_group_zh: 认知执行分离
intra_axis: execution-information-safety
intra_axis_zh: 认知执行分离 / 信息流控制
intra_role: policy
parent_node: node.cognitive_executive_separation
layer: safety
plane: SafetyPlane
description: 'Rules governing sandbox configuration including resource limits, allowed syscalls, mount points, and network
  isolation defaults.

  '
attributes:
  resource_caps:
    type: object
    required: false
    description: CPU, memory, disk, and process limits.
  allowed_syscalls:
    type: object
    required: false
    description: System call allow list when seccomp is enabled.
  network_default:
    type: enum
    required: true
    values:
    - deny_all
    - allow_list
    - full
    description: Default network posture.
status: active
required_edges:
  incoming:
  - predicate: GUARDS
    source: node.policy_contract
