id: node.data_label
artifact: NodeClass
label: Data Label
label_zh: 数据标签
intra_level: 2
intra_group: information-flow
intra_group_zh: 信息流控制
intra_role: metadata
parent_node: node.information_flow_control
layer: safety
plane: SafetyPlane
description: 'Integrity or confidentiality tag attached to data artifacts, governing where they may be stored, transmitted,
  or included in model context.

  '
attributes:
  confidentiality:
    type: enum
    required: true
    values:
    - public
    - internal
    - confidential
    - restricted
    description: Secrecy classification.
  integrity:
    type: enum
    required: true
    values:
    - unverified
    - verified
    - trusted
    description: Trustworthiness classification.
  source_ref:
    type: string
    required: true
    description: Origin entity that applied this label.
status: active
interfaces:
- ref: contract.labelable
required_edges:
  incoming:
  - predicate: LABELS_DATA
    source: node.information_flow_control
