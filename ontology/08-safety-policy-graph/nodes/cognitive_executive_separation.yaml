id: node.cognitive_executive_separation
artifact: NodeClass
label: Cognitive Executive Separation
label_zh: 认知执行分离
intra_level: 1
intra_group: execution-separation
intra_group_zh: 认知执行分离
intra_axis: execution-information-safety
intra_axis_zh: 认知执行分离 / 信息流控制
intra_role: principle
parent_node: node.policy_contract
layer: safety
plane: SafetyPlane
description: 'Architectural separation ensuring reasoning and planning components cannot directly execute side-effecting actions
  without passing through an executive gate.

  '
attributes:
  reasoning_component_ref:
    type: string
    required: true
    description: Reference to the deliberation module.
  executive_component_ref:
    type: string
    required: true
    description: Reference to the action dispatch module.
  bypass_prohibited:
    type: boolean
    required: false
    description: Whether direct reasoning-to-action paths are forbidden.
status: active
required_edges:
  outgoing:
  - predicate: SEPARATES_REASONING_FROM_EXECUTION
    target_any_of:
    - node.policy_contract
    - node.privilege_control
