id: node.permission_policy
artifact: NodeClass
label: Permission Policy
label_zh: 权限策略
intra_level: 1
intra_group: permission-boundary
intra_group_zh: 权限边界
intra_axis: permission-trust
intra_axis_zh: 权限决策 / 权限边界
intra_role: policy
parent_node: node.policy_contract
layer: safety
plane: SafetyPlane
description: 'Rules governing which actions an agent or tool may perform, evaluated at invocation time against allow and deny
  lists.

  '
description_zh: >
  管理智能体或工具可以执行哪些操作的规则，在调用时根据允许和拒绝列表进行评估。
attributes:
  default_effect:
    type: enum
    required: true
    values:
    - deny
    - allow
    description: Effect when no explicit rule matches.
  rule_precedence:
    type: enum
    required: true
    values:
    - deny_overrides
    - allow_overrides
    - most_specific
    description: Conflict resolution order.
status: active
required_edges:
  incoming:
  - predicate: GUARDS
    source: node.policy_contract
