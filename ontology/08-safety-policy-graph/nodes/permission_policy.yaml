id: node.permission_policy
artifact: NodeClass
label: Permission Policy
label_zh: 权限策略
layer: safety
plane: SafetyPlane
description: 'Rules governing which actions an agent or tool may perform, evaluated at invocation time against allow and deny
  lists.

  '
attributes:
  default_effect:
    type: enum
    required: true
    values:
    - deny
    - allow
    description: Effect when no explicit rule matches.
  rule_precedence:
    type: enum
    required: true
    values:
    - deny_overrides
    - allow_overrides
    - most_specific
    description: Conflict resolution order.
status: active
required_edges:
  incoming:
  - predicate: GUARDS
    source: node.policy_contract
