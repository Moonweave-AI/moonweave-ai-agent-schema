id: node.credential_proxy
artifact: NodeClass
label: Credential Proxy
label_zh: 凭证代理
intra_level: 2
intra_group: execution-separation
intra_group_zh: 认知执行分离
intra_axis: execution-information-safety
intra_axis_zh: 认知执行分离 / 信息流控制
intra_role: control
parent_node: node.cognitive_executive_separation
layer: safety
plane: SafetyPlane
description: 'Intermediary that rewrites authentication headers and tokens so secrets never enter the untrusted sandbox or
  agent context.

  '
description_zh: >
  重写身份验证标头和令牌的中介，以便秘密永远不会进入不受信任的沙箱或智能体上下文。
attributes:
  proxy_endpoint:
    type: string
    required: true
    description: Address of the credential injection proxy.
  token_lifetime_seconds:
    type: integer
    required: false
    description: Maximum lifetime of injected short-lived tokens.
  auditable:
    type: boolean
    required: false
    description: Whether all proxy invocations are logged.
status: active
interfaces:
- ref: contract.auditable
required_edges:
  outgoing:
  - predicate: PROXIES_CREDENTIAL
    target: node.secret
