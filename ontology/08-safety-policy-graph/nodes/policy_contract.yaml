id: node.policy_contract
artifact: NodeClass
label: Policy Contract
label_zh: 策略契约
intra_level: 0
intra_group: policy-root
intra_group_zh: 策略根
intra_role: anchor
layer: safety
plane: SafetyPlane
description: 'Abstract safety and governance policy defining rules, enforcement points, and escalation paths applicable to
  guarded operations.

  '
attributes:
  policy_id:
    type: string
    required: true
    description: Unique identifier for this policy definition.
  policy_version:
    type: string
    required: true
    description: Semantic version of the policy schema.
  enforcement_mode:
    type: enum
    required: true
    values:
    - advisory
    - blocking
    - audit_only
    description: Strictness of policy application.
status: active
required_edges:
  outgoing:
  - predicate: GUARDS
    target_any_of:
    - node.permission_policy
    - node.sandbox_policy
  - predicate: AUTHORIZES
    target: node.allow_decision
  - predicate: DENIES
    target: node.deny_decision
