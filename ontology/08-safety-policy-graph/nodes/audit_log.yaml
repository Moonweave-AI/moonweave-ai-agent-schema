id: node.audit_log
artifact: NodeClass
label: Audit Log
label_zh: 审计日志
layer: safety
plane: SafetyPlane
description: 'Immutable append-only record of security-relevant events including policy decisions, tool invocations, access
  attempts, and escalations.

  '
attributes:
  log_sink_ref:
    type: string
    required: true
    description: Storage destination for audit records.
  retention_days:
    type: integer
    required: false
    description: Minimum retention period for audit entries.
  tamper_evident:
    type: boolean
    required: false
    description: Whether log integrity is cryptographically protected.
status: active
interfaces:
- ref: contract.auditable
required_edges:
  incoming:
  - predicate: AUDITS
    source_any_of:
    - node.policy_contract
    - node.credential_proxy
