id: node.trust_boundary
artifact: NodeClass
label: Trust Boundary
label_zh: 信任边界
intra_level: 1
intra_group: permission-boundary
intra_group_zh: 权限边界
intra_axis: permission-trust
intra_axis_zh: 权限决策 / 权限边界
intra_role: boundary
parent_node: node.policy_contract
layer: safety
plane: SafetyPlane
description: 'Demarcation between trusted and untrusted domains, defining where policy enforcement must occur before data
  or control crosses the boundary.

  '
description_zh: >
  可信域和不可信域之间的划分，定义在数据或控制跨越边界之前必须执行策略的位置。
attributes:
  boundary_type:
    type: enum
    required: true
    values:
    - network
    - process
    - data
    - identity
    description: Category of trust separation.
  trust_level_inside:
    type: string
    required: true
    description: Label for the higher-trust side.
  trust_level_outside:
    type: string
    required: true
    description: Label for the lower-trust side.
status: active
