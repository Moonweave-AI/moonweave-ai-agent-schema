id: node.escalation
artifact: NodeClass
label: Escalation
label_zh: 升级
layer: safety
plane: SafetyPlane
description: 'Elevation of a policy decision or blocked action to a higher authority, human reviewer, or broader permission
  tier.

  '
attributes:
  escalation_target:
    type: enum
    required: true
    values:
    - human
    - higher_tier
    - admin
    description: Recipient of the escalation.
  original_decision_ref:
    type: string
    required: true
    description: Reference to the decision being escalated.
  urgency:
    type: enum
    required: true
    values:
    - normal
    - high
    - critical
    description: Priority of the escalation request.
status: active
required_edges:
  outgoing:
  - predicate: ESCALATES
    target: node.human_review
