id: state.approval_lifecycle
artifact: StateMachine
label: Approval Lifecycle
label_zh: 审批生命周期
description: 'Lifecycle states for a human-in-the-loop approval request.

  '
states:
- name: pending
  initial: true
  description: Approval requested; awaiting reviewer.
- name: reviewing
  description: Reviewer actively examining the request.
- name: approved
  terminal: true
  description: Reviewer granted approval.
- name: denied
  terminal: true
  description: Reviewer rejected the request.
- name: escalated
  description: Request forwarded to higher authority.
- name: timed_out
  terminal: true
  description: Review deadline elapsed without decision.
transitions:
- from: pending
  to: reviewing
  trigger: reviewer_claims
- from: reviewing
  to: approved
  trigger: approve
- from: reviewing
  to: denied
  trigger: deny
- from: pending
  to: escalated
  trigger: escalate
- from: reviewing
  to: escalated
  trigger: escalate
- from: escalated
  to: approved
  trigger: approve
- from: escalated
  to: denied
  trigger: deny
- from: pending
  to: timed_out
  trigger: timeout
- from: reviewing
  to: timed_out
  trigger: timeout
status: active
