id: state.policy_enforcement_lifecycle
artifact: StateMachine
label: Policy Enforcement Lifecycle
label_zh: 策略执行生命周期
description: 'Lifecycle states for a single policy evaluation and enforcement cycle.

  '
states:
- name: evaluating
  initial: true
  description: Policy rules being applied to the request.
- name: allowed
  terminal: true
  description: Action permitted within granted scope.
- name: denied
  terminal: true
  description: Action blocked by policy.
- name: escalated
  description: Decision deferred to higher authority.
- name: rolled_back
  terminal: true
  description: Previously allowed action reversed post-hoc.
transitions:
- from: evaluating
  to: allowed
  trigger: permit
- from: evaluating
  to: denied
  trigger: deny
- from: evaluating
  to: escalated
  trigger: escalate
- from: escalated
  to: allowed
  trigger: permit
- from: escalated
  to: denied
  trigger: deny
- from: allowed
  to: rolled_back
  trigger: rollback
status: active
