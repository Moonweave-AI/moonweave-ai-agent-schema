schema: moonweave.ai/ontology-node/v1
id: CodeBlock
kind: concept
labels:
  zh: 代码内容块
  en: code block
  ja: コード内容ブロック
semantics:
  short_definition:
    zh: 带语法标识的可执行或标记文本 TextBlock 特化。
    en: TextBlock specialization for executable or marked-up text with a grammar identifier.
    ja: grammar 識別子を持つ executable/markup text TextBlock 特化。
  definition:
    zh: CodeBlock 映射 unified diff、language-tagged fence、source code snippet；language_id=diff/typescript 等，mime_type 如 text/x-diff。
    en: CodeBlock maps unified diffs, language-tagged fences, and source snippets; language_id=diff/typescript etc., mime_type such as text/x-diff.
    ja: diff/code snippet→CodeBlock。
  why_needed:
    zh: 代码/ diff 文本需要 language_id 与语法验证，不同于普通 plain text。
    en: Code and diff text need language_id and grammar validation distinct from plain text.
    ja: code grammar identity。
  includes:
    - zh: language_id、mime_type、source text、encoding。
      en: language_id, mime_type, source text, encoding.
      ja: language_id/mime/text/encoding。
  excludes:
    - zh: 未标记语法的 plain paragraph、已解析 AST 对象。
      en: Unmarked plain paragraphs and parsed AST objects.
      ja: plain paragraph/parsed AST。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: patch-11 unified diff language_id=diff mime_type=text/x-diff→CodeBlock 祖先链 CodeBlock→TextBlock→ContentBlock。
    en: patch-11 unified diff language_id=diff mime_type=text/x-diff→CodeBlock ancestry CodeBlock→TextBlock→ContentBlock.
    ja: diff classification example。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 继承 text 载荷形式，因为代码的载体仍是字符串；程序、命令、诊断或补丁语法在分类层级中区分 CodeBlock，而不另造载荷形式。
        en: Inherits the text payload form because code is still carried by a string; program, command, diagnostic, or patch grammar distinguishes CodeBlock in the class hierarchy without inventing another carrier form.
        ja: コードの媒体は文字列のままなので text ペイロード形式を継承し、プログラム、コマンド、診断、パッチ文法が別 carrier form ではなく分類階層で CodeBlock を区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: text
      allowed_values:
        - id: modality_text
          value: text
          labels:
            zh: text
            en: text
            ja: text
          definitions:
            zh: CodeBlock 只允许继承的 text 载荷形式；字符串还必须满足具体程序、命令、诊断或补丁语法才能取得 CodeBlock 身份。
            en: CodeBlock permits only the inherited text payload form; the string must additionally satisfy a concrete program, command, diagnostic, or patch grammar to qualify as CodeBlock.
            ja: CodeBlock は継承した text ペイロード形式だけを許し、さらに具体的プログラム、コマンド、診断、パッチ文法を満たす文字列だけが CodeBlock になります。
          status: accepted
          source_claims:
            - claim-code-block-003
      source_claims:
        - claim-code-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-code-001
      allowed_values: []
      source_claims:
        - claim-code-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: text/x-code
      allowed_values: []
      source_claims:
        - claim-code-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: utf-8
      allowed_values: []
      source_claims:
        - claim-code-block-007
    - id: text
      labels:
        zh: 代码文本
        en: code text
        ja: コードテキスト
      definitions:
        zh: 必须依据已声明或可判定的程序、命令、诊断或补丁语法解释的字符串。
        en: String that must be interpreted under a declared or determinable program, command, diagnostic, or patch grammar.
        ja: 宣言済みまたは判定可能なプログラム、コマンド、診断、パッチ文法で解釈する必要がある文字列です。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: |-
        @@ -1 +1 @@
        -timeout=30
        +timeout=60
      allowed_values: []
      source_claims:
        - claim-code-block-008
    - id: language_id
      labels:
        zh: 语言或语法标识
        en: language or grammar identifier
        ja: 言語・文法識別子
      definitions:
        zh: 供解析器选择使用的可选语言或格式提示；必须与载荷语法一致，且不能单独证明 CodeBlock 身份。
        en: Optional language or format hint used to select a parser; it must agree with payload grammar and cannot alone establish CodeBlock identity.
        ja: 解析器選択用の任意言語・形式ヒントです。ペイロード文法と一致する必要があり、単独では CodeBlock の同一性を証明しません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: diff
      allowed_values: []
      source_claims:
        - claim-code-block-009
  constraints: []
  required_relations: []
examples:
  - id: CodeBlock-example-unified-diff
    labels:
      zh: unified diff
      en: Unified diff
      ja: unified diff
    descriptions:
      zh: patch-11 text/x-diff language_id=diff utf-8。
      en: patch-11 text/x-diff language_id=diff utf-8.
      ja: diff CodeBlock。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: diff
    field_values:
      content_block_id: patch-11
      language_id: diff
      mime_type: text/x-diff
    related_node_ids:
      - CodeBlock
      - TextBlock
    related_relation_ids: []
    source_claims:
      - claim-cblock-diff-design
  - id: CodeBlock-example-typescript
    labels:
      zh: TypeScript 片段
      en: TypeScript snippet
      ja: TypeScript snippet
    descriptions:
      zh: block-ts-7 language_id=typescript mime_type=text/x-typescript。
      en: block-ts-7 language_id=typescript mime_type=text/x-typescript.
      ja: TS CodeBlock。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: code fence
    field_values: {}
    related_node_ids:
      - CodeBlock
    related_relation_ids: []
    source_claims:
      - claim-cblock-diff-design
  - id: CodeBlock-example-not-table
    labels:
      zh: 非表格
      en: Not table
      ja: table ではない
    descriptions:
      zh: CSV 未解析字符串保持 TextBlock 或 StructuredDataBlock 而非 TableBlock。
      en: Unparsed CSV string remains TextBlock or StructuredDataBlock not TableBlock.
      ja: unparsed CSV≠TableBlock。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - CodeBlock
      - TableBlock
    related_relation_ids: []
    source_claims:
      - claim-cblock-diff-design
parent_relation:
  id: CodeBlock-is_a-TextBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: CodeBlock is_a TextBlock 表示每个代码块的规范载荷首先是有序字符串，并进一步要求程序语言、命令行、堆栈轨迹或补丁语法解释；普通说明文字即使提到函数名也不满足该子类条件。
    en: CodeBlock is_a TextBlock means every code block first has an ordered string as its canonical payload and is further constrained to require programming-language, command-line, stack-trace, or patch grammar. Explanatory prose does not satisfy the subtype merely by mentioning a function name.
    ja: CodeBlock is_a TextBlock は、すべてのコードブロックがまず順序付き文字列を正規ペイロードとし、さらにプログラム言語、コマンドライン、スタックトレース、パッチ文法を要することを意味します。関数名を述べる説明文だけでは下位型になりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CodeBlock-is_a-TextBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: |-
          块 patch-11 保存统一 diff“@@ -1 +1 @@
          -timeout=30
          +timeout=60”，language_id="diff"。删除行和新增行只有按补丁语法解释才成立，因此它是 CodeBlock，也必然是 TextBlock。
        en: Block patch-11 stores unified diff "@@ -1 +1 @@\n-timeout=30\n+timeout=60" with language_id="diff". Its deleted and added lines are meaningful only under patch grammar, so it is CodeBlock and necessarily TextBlock.
        ja: ブロック patch-11 は unified diff と language_id="diff" を保持します。削除行と追加行はパッチ文法でのみ意味を持つため CodeBlock であり、必ず TextBlock でもあります。
      field_values:
        block_id: patch-11
        modality: text
        mime_type: text/x-diff
        encoding: utf-8
        text: |-
          @@ -1 +1 @@
          -timeout=30
          +timeout=60
        language_id: diff
      related_node_ids:
        - CodeBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - CodeBlock-is_a-TextBlock
      source_claims:
        - claim-code-block-016
    - id: CodeBlock-is_a-TextBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 段落“请检查函数 retry() 是否超时”只是自然语言请求；括号与函数名没有使整个字符串遵循程序语法。该块保持 TextBlock，不能按关键词归为 CodeBlock。
        en: The paragraph "Please check whether retry() times out" is a natural-language request. Parentheses and a function name do not make the whole string conform to program grammar, so it remains TextBlock and cannot be classified by keywords.
        ja: 「retry() が timeout するか確認してください」は自然言語要求です。括弧と関数名だけで文字列全体がプログラム文法に従うわけではなく、TextBlock のままです。
      field_values: {}
      related_node_ids:
        - CodeBlock
        - TextBlock
      related_relation_ids:
        - CodeBlock-is_a-TextBlock
      source_claims:
        - claim-code-block-017
  source_claims:
    - claim-code-block-018
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-code-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent as a text-string representation but has no separate CodeContent variant. Moonweave therefore models CodeBlock as a reviewed TextBlock specialization whose differentia is required program, command, stack-trace, or patch grammar.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 transports source code through a text or file Part and exposes mediaType only as metadata. This is compatible with, but does not itself define, Moonweave's grammar-based CodeBlock subtype.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-003
    source: eng-proto-mcp-spec
    supports: MCP TextContent provides the string carrier used for source code and defines no separate CodeContent alternative. CodeBlock consequently narrows TextBlock by grammar while retaining payload form text.
    locator: Schema Reference > TextContent
    evidence_kind: normative
    confidence: high
  - id: claim-code-block-004
    source: eng-proto-mcp-spec
    supports: MCP transports source code through TextContent rather than a separate CodeContent variant. CodeBlock therefore retains the text payload form inherited from TextBlock; program, command, diagnostic, or patch grammar supplies the deeper class differentia.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-005
    source: eng-proto-a2a-spec
    supports: A2A Part supplies the bounded text carrier but no part identifier. Moonweave adds block_id to keep one code-bearing Part stable across parsing and validation without borrowing Message.messageId or conversational order.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-006
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 permits mediaType on a text Part. Moonweave uses it as an optional code-format hint; CodeBlock membership still depends on grammar and cannot be inferred from a MIME string alone.
    locator: A2A Protocol v1.0 > 4.1.6 Part > mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-007
    source: eng-proto-mcp-spec
    supports: MCP TextContent carries a Unicode string rather than an independently typed binary object. Moonweave retains encoding only when the original source encoding is known; it does not distinguish code from ordinary prose.
    locator: Schema Reference > TextContent > text
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent.text as the required string payload. A CodeBlock reuses that carrier and adds the Moonweave requirement that the string be interpreted under a concrete program, command, diagnostic, or patch grammar.
    locator: Schema Reference > TextContent > text
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-009
    source: eng-proto-a2a-spec
    supports: A2A allows metadata and mediaType on a Part but does not prescribe a programming-language identifier. Moonweave language_id is an optional parser hint; it is checked against the payload grammar and cannot establish CodeBlock membership by itself.
    locator: A2A Protocol v1.0 > 4.1.6 Part > metadata and mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-010
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent provides the underlying text-string carrier used by this code payload. MCP does not define CodeBlock; the programming-grammar specialization below TextBlock is an explicit Moonweave ontology inference.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-011
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits a text Part with mediaType metadata. That carrier supports transporting source code, while Moonweave—not mediaType alone—classifies it as CodeBlock when program grammar is required.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-012
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent only requires a text string and does not turn prose mentioning a command into a separate content type; Moonweave therefore keeps this carrier at TextBlock.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-013
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 treats text as a single Part carrier and mediaType as optional metadata; it supplies no keyword-based code classification, supporting Moonweave's explicit grammar-based boundary.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-014
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent supplies the required string carrier for the diff payload; the further CodeBlock classification is a Moonweave specialization based on required patch grammar.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-015
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits text content with mediaType metadata, which can carry the diff verbatim but does not itself assert a code ontology type.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-016
    source: eng-proto-mcp-spec
    supports: MCP TextContent directly supports the string carrier; Moonweave's CodeBlock classification adds the reviewed diff-grammar condition.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-017
    source: eng-proto-a2a-spec
    supports: A2A treats the payload as text and mediaType as optional metadata; it defines no keyword-based code classification.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-code-block-018
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 provides TextContent but no separate CodeContent variant. Moonweave therefore places code below TextBlock and adds a grammar-based differentia rather than flattening code beside text.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-cblock-diff-design
    source: src-info-content-design
    supports: CodeBlock classifies grammar-identified text including diffs and code snippets.
    locator: CodeBlock
    evidence_kind: design-inference
    confidence: high
