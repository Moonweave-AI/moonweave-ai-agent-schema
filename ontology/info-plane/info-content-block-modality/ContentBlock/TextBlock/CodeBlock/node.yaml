schema: moonweave.ai/ontology-node/v1
id: CodeBlock
kind: concept
status: review
labels:
  zh: 代码内容块
  en: code block
  ja: コード内容ブロック
semantics:
  short_definition:
    zh: 代码内容块是按程序语言、命令或补丁语法解释的文本内容块。
    en: A code block is a text block interpreted under a programming-language, command, or patch grammar.
    ja: コード内容ブロックは、プログラミング言語、コマンド、またはパッチの文法で解釈されるテキスト内容ブロックです。
  definition:
    zh: 代码内容块是一种文本内容块，其种差是文本需要按照已声明或可判定的程序语言或命令语法来解释，也包括补丁与机器诊断语法。源码、配置片段、Shell 命令、统一差异补丁和堆栈轨迹可属于此类；仅仅提到代码的自然语言说明仍是普通 TextBlock。
    en: A code block is a text block differentiated by text that must be interpreted under a declared or determinable programming-language, command-line, patch, or machine-diagnostic grammar. Source code, configuration fragments, shell commands, unified diffs, and stack traces qualify; prose that merely discusses code remains an ordinary TextBlock.
    ja: コード内容ブロックは、宣言済みまたは判定可能なプログラミング言語、コマンドライン、パッチ、機械診断の文法で解釈する必要があるテキスト内容ブロックです。ソースコード、設定断片、シェルコマンド、統一差分、スタックトレースを含み得ますが、コードについて述べるだけの自然言語は通常の TextBlock です。
  why_needed:
    zh: CodeBlock 继承 TextBlock 的文本载荷约束，并增加语法高亮、解析、执行风险和补丁应用所需的语言边界。把它直接放在 ContentBlock 下会丢失“代码首先是文本表示”的中间逻辑。
    en: CodeBlock inherits the textual-payload contract of TextBlock and adds the language boundary needed for highlighting, parsing, execution-risk review, and patch application. Placing it directly under ContentBlock would omit the fact that code is first a textual representation.
    ja: CodeBlock は TextBlock のテキストペイロード契約を継承し、強調表示、構文解析、実行リスク審査、パッチ適用に必要な言語境界を追加します。ContentBlock の直下に置くと、コードがまずテキスト表現であるという中間論理を失います。
  includes:
    - zh: 纳入带有明确语言或格式提示的源码、SQL、命令、配置、补丁和堆栈轨迹，以及可由确定语法解析器验证的同类文本。
      en: Includes source code, SQL, commands, configuration, patches, and stack traces with an explicit language or format hint, plus equivalent text accepted by a deterministic grammar parser.
      ja: 明示的な言語または形式の手掛かりを持つソースコード、SQL、コマンド、設定、パッチ、スタックトレース、および決定的な文法解析器で検証できる同種のテキストを含みます。
  excludes:
    - zh: 排除仅讨论代码的自然语言段落、由界面排版成等宽字体但没有程序语法的文本，以及已经解析成键值或表格结构的数据；它们分别保留为 TextBlock 或 StructuredDataBlock。
      en: Excludes prose about code, text displayed in a monospace font without a program grammar, and data already parsed into key-value or tabular structure; these remain TextBlock or StructuredDataBlock.
      ja: コードを論じる自然言語、プログラム文法を持たず等幅表示されただけのテキスト、鍵値または表構造へ解析済みのデータを除外し、それぞれ TextBlock または StructuredDataBlock とします。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承 text 载荷形式，因为代码的载体仍是字符串；程序、命令、诊断或补丁语法在分类层级中区分 CodeBlock，而不另造载荷形式。
        en: Inherits the text payload form because code is still carried by a string; program, command, diagnostic, or patch grammar distinguishes CodeBlock in the class hierarchy without inventing another carrier form.
        ja: コードの媒体は文字列のままなので text ペイロード形式を継承し、プログラム、コマンド、診断、パッチ文法が別 carrier form ではなく分類階層で CodeBlock を区別します。
      allowed_values:
        - id: modality_text
          value: text
          labels:
            zh: text
            en: text
            ja: text
          definitions:
            zh: CodeBlock 只允许继承的 text 载荷形式；字符串还必须满足具体程序、命令、诊断或补丁语法才能取得 CodeBlock 身份。
            en: CodeBlock permits only the inherited text payload form; the string must additionally satisfy a concrete program, command, diagnostic, or patch grammar to qualify as CodeBlock.
            ja: CodeBlock は継承した text ペイロード形式だけを許し、さらに具体的プログラム、コマンド、診断、パッチ文法を満たす文字列だけが CodeBlock になります。
          status: accepted
          source_claims:
            - claim-code-block-003
      pattern: null
      example_value: text
      source_claims:
        - claim-code-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-code-001
      source_claims:
        - claim-code-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: text/x-code
      source_claims:
        - claim-code-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-code-block-007
    - id: text
      labels:
        zh: 代码文本
        en: code text
        ja: コードテキスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 必须依据已声明或可判定的程序、命令、诊断或补丁语法解释的字符串。
        en: String that must be interpreted under a declared or determinable program, command, diagnostic, or patch grammar.
        ja: 宣言済みまたは判定可能なプログラム、コマンド、診断、パッチ文法で解釈する必要がある文字列です。
      allowed_values: []
      pattern: null
      example_value: |-
        @@ -1 +1 @@
        -timeout=30
        +timeout=60
      source_claims:
        - claim-code-block-008
    - id: language_id
      labels:
        zh: 语言或语法标识
        en: language or grammar identifier
        ja: 言語・文法識別子
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 供解析器选择使用的可选语言或格式提示；必须与载荷语法一致，且不能单独证明 CodeBlock 身份。
        en: Optional language or format hint used to select a parser; it must agree with payload grammar and cannot alone establish CodeBlock identity.
        ja: 解析器選択用の任意言語・形式ヒントです。ペイロード文法と一致する必要があり、単独では CodeBlock の同一性を証明しません。
      allowed_values: []
      pattern: null
      example_value: diff
      source_claims:
        - claim-code-block-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: CodeBlock-example-positive-001
    kind: positive
    labels:
      zh: 代码内容块正例
      en: Positive example of code block
      ja: コード内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: 内容块 code-js-004 的载荷为“const total = items.reduce((n, item) => n + item.price, 0);”，并声明 mime_type="text/javascript"。该字符串必须按 JavaScript 词法与语法解释，因此先是 TextBlock，再通过 CodeBlock-is_a-TextBlock 细化为 CodeBlock。
      en: Content block code-js-004 carries "const total = items.reduce((n, item) => n + item.price, 0);" with mime_type="text/javascript". The string must be interpreted using JavaScript lexical and grammatical rules, so it is a TextBlock further specialized as CodeBlock through CodeBlock-is_a-TextBlock.
      ja: 内容ブロック code-js-004 は「const total = items.reduce((n, item) => n + item.price, 0);」を mime_type="text/javascript" と共に持ちます。JavaScript の字句・文法規則で解釈する必要があるため TextBlock であり、CodeBlock-is_a-TextBlock により CodeBlock へ特化します。
    field_values:
      block_id: code-js-004
      modality: text
      mime_type: text/javascript
      encoding: utf-8
      text: const total = items.reduce((n, item) => n + item.price, 0);
      language_id: javascript
    related_node_ids:
      - CodeBlock
      - TextBlock
    related_relation_ids:
      - CodeBlock-is_a-TextBlock
    expected_result:
      zh: 分类结果为 CodeBlock，并可沿显式父关系查询 TextBlock 与更上位的 ContentBlock；不得让 CodeBlock 与 TextBlock 平级。
      en: The result is CodeBlock, with TextBlock and then ContentBlock queryable through explicit parent relations; CodeBlock must not be flattened beside TextBlock.
      ja: 分類結果は CodeBlock で、明示的な親関係から TextBlock、さらに ContentBlock を照会できます。CodeBlock を TextBlock と同列にしません。
    why_valid_or_invalid:
      zh: 载荷仍是字符序列，但变量声明、调用表达式和箭头函数使程序语言语法成为必要解释条件。
      en: The payload remains a character sequence, but the declaration, call expression, and arrow function make a programming-language grammar necessary for interpretation.
      ja: ペイロードは文字列ですが、変数宣言、呼出し式、アロー関数によりプログラム言語文法が解釈の必須条件になります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-code-block-010
      - claim-code-block-011
  - id: CodeBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 代码内容块边界例
      en: Boundary case for code block
      ja: コード内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: 文本块 text-guide-009 的载荷是“合并前请运行 npm test，并把失败日志附在工单中”。虽然句子提到命令且 mime_type="text/plain"，其整体意义由自然语言叙述承载；不需要把整段按 shell 语法执行，因此它保持 TextBlock 而不是 CodeBlock。
      en: Text block text-guide-009 says, "Run npm test before merging and attach the failure log to the ticket." Although it mentions a command and has mime_type="text/plain", its overall meaning is carried by natural-language prose and the whole block is not interpreted as shell syntax, so it remains TextBlock rather than CodeBlock.
      ja: テキストブロック text-guide-009 は「マージ前に npm test を実行し、失敗ログをチケットへ添付してください」と記述します。コマンドに言及していても全体の意味は自然言語の説明が担い、ブロック全体をシェル構文として解釈しないため、CodeBlock ではなく TextBlock のままです。
    field_values: {}
    related_node_ids:
      - CodeBlock
      - TextBlock
    related_relation_ids:
      - CodeBlock-is_a-TextBlock
    expected_result:
      zh: 分类器返回 TextBlock；只有被单独界定且要求程序、补丁或命令语法解释的载荷才下沉为 CodeBlock。
      en: The classifier returns TextBlock; only a separately bounded payload requiring program, patch, or command grammar specializes as CodeBlock.
      ja: 分類器は TextBlock を返します。独立した境界を持ち、プログラム、パッチ、コマンド文法を要するペイロードだけを CodeBlock へ特化します。
    why_valid_or_invalid:
      zh: 出现代码词汇不是充分条件；判定依据是整个块的规范解释方式，而不是关键词或 MIME 字符串匹配。
      en: Code vocabulary is insufficient. Classification follows the canonical interpretation of the whole block, not keyword or MIME-string matching.
      ja: コード語彙の出現だけでは不十分です。分類はキーワードや MIME 文字列照合ではなく、ブロック全体の正規解釈に従います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-code-block-012
      - claim-code-block-013
  - id: CodeBlock-example-instance-001
    kind: instance
    labels:
      zh: 代码内容块结构化实例
      en: Structured instance of code block
      ja: コード内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: |-
        节点内实例 patch-011 保存统一 diff 载荷“@@ -1 +1 @@
        -timeout=30
        +timeout=60”，继承载荷形式 text，并声明 mime_type="text/x-diff"、encoding="utf-8" 和 language_id="diff"。行首标记与 hunk 头必须按补丁语法解释，因此最具体类型为 CodeBlock。
      en: Inline instance patch-011 stores the unified-diff payload "@@ -1 +1 @@\n-timeout=30\n+timeout=60" with inherited payload form text, mime_type="text/x-diff", encoding="utf-8", and language_id="diff". Its hunk header and line prefixes require patch grammar, so its most-specific type is CodeBlock.
      ja: ノード内 instance patch-011 は unified diff を継承ペイロード形式 text、mime_type="text/x-diff"、encoding="utf-8"、language_id="diff" と共に保持します。hunk header と行頭記号に patch 文法が必要なため最具体型は CodeBlock です。
    field_values:
      block_id: patch-011
      modality: text
      mime_type: text/x-diff
      encoding: utf-8
      text: |-
        @@ -1 +1 @@
        -timeout=30
        +timeout=60
      language_id: diff
    related_node_ids:
      - CodeBlock
      - TextBlock
    related_relation_ids:
      - CodeBlock-is_a-TextBlock
    expected_result:
      zh: 实例归为 CodeBlock，父类型为 TextBlock；补丁语义保留在节点详情中，不创建“diff”“hunk”“配置变更”等平级本体节点。
      en: The instance is CodeBlock with TextBlock as its parent; patch semantics stay in node detail without inventing parallel Diff, Hunk, or ConfigurationChange ontology nodes.
      ja: インスタンスは CodeBlock で親は TextBlock です。パッチ意味論はノード詳細に保持し、Diff、Hunk、ConfigurationChange などの並列本体ノードを作りません。
    why_valid_or_invalid:
      zh: 该载荷以文本编码保存，却只有依据统一 diff 语法才能正确解释删除行与新增行，符合 CodeBlock 种差。
      en: The payload is text-encoded, yet deletion and addition lines are meaningful only under unified-diff grammar, satisfying the CodeBlock differentia.
      ja: ペイロードはテキスト符号化されていますが、削除行と追加行は unified diff 文法でのみ解釈でき、CodeBlock の種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-code-block-014
      - claim-code-block-015
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: CodeBlock-is_a-TextBlock
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: CodeBlock is_a TextBlock 表示每个代码块的规范载荷首先是有序字符串，并进一步要求程序语言、命令行、堆栈轨迹或补丁语法解释；普通说明文字即使提到函数名也不满足该子类条件。
    en: CodeBlock is_a TextBlock means every code block first has an ordered string as its canonical payload and is further constrained to require programming-language, command-line, stack-trace, or patch grammar. Explanatory prose does not satisfy the subtype merely by mentioning a function name.
    ja: CodeBlock is_a TextBlock は、すべてのコードブロックがまず順序付き文字列を正規ペイロードとし、さらにプログラム言語、コマンドライン、スタックトレース、パッチ文法を要することを意味します。関数名を述べる説明文だけでは下位型になりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CodeBlock-is_a-TextBlock-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: |-
          块 patch-11 保存统一 diff“@@ -1 +1 @@
          -timeout=30
          +timeout=60”，language_id="diff"。删除行和新增行只有按补丁语法解释才成立，因此它是 CodeBlock，也必然是 TextBlock。
        en: Block patch-11 stores unified diff "@@ -1 +1 @@\n-timeout=30\n+timeout=60" with language_id="diff". Its deleted and added lines are meaningful only under patch grammar, so it is CodeBlock and necessarily TextBlock.
        ja: ブロック patch-11 は unified diff と language_id="diff" を保持します。削除行と追加行はパッチ文法でのみ意味を持つため CodeBlock であり、必ず TextBlock でもあります。
      field_values:
        block_id: patch-11
        modality: text
        mime_type: text/x-diff
        encoding: utf-8
        text: |-
          @@ -1 +1 @@
          -timeout=30
          +timeout=60
        language_id: diff
      related_node_ids:
        - CodeBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - CodeBlock-is_a-TextBlock
      expected_result:
        zh: 最具体类型为 CodeBlock；查询祖先时依次得到 TextBlock 与 ContentBlock。
        en: The most-specific type is CodeBlock; ancestor traversal returns TextBlock and then ContentBlock.
        ja: 最も具体的な型は CodeBlock で、祖先照会は TextBlock、ContentBlock の順に返します。
      why_valid_or_invalid:
        zh: 载荷仍是字符序列，同时存在必须遵循的统一 diff 文法，两个层级条件均成立。
        en: The payload remains a character sequence and also has mandatory unified-diff grammar, satisfying both levels.
        ja: ペイロードは文字列であり、必須の unified-diff 文法もあるため両階層条件を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-code-block-016
    - id: CodeBlock-is_a-TextBlock-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 段落“请检查函数 retry() 是否超时”只是自然语言请求；括号与函数名没有使整个字符串遵循程序语法。该块保持 TextBlock，不能按关键词归为 CodeBlock。
        en: The paragraph "Please check whether retry() times out" is a natural-language request. Parentheses and a function name do not make the whole string conform to program grammar, so it remains TextBlock and cannot be classified by keywords.
        ja: 「retry() が timeout するか確認してください」は自然言語要求です。括弧と関数名だけで文字列全体がプログラム文法に従うわけではなく、TextBlock のままです。
      field_values: {}
      related_node_ids:
        - CodeBlock
        - TextBlock
      related_relation_ids:
        - CodeBlock-is_a-TextBlock
      expected_result:
        zh: 返回 TextBlock；不得根据 retry() 或 text/x-code 等单个提示猜测 CodeBlock。
        en: Return TextBlock; do not infer CodeBlock from retry() or a text/x-code hint alone.
        ja: TextBlock を返し、retry() や text/x-code ヒントだけで CodeBlock を推測しません。
      why_valid_or_invalid:
        zh: CodeBlock 的种差是规范解释语法，不是词缀、字体或可选媒体类型。
        en: CodeBlock's differentia is its canonical interpretation grammar, not a token, font, or optional media type.
        ja: CodeBlock の種差は正規解釈文法であり、語句、字体、任意 media type ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-code-block-017
  source_claims:
    - claim-code-block-018
  distinct_fact_rationale:
    zh: 该边表达代码对文本载体的真子类关系，不把 MIME 提示、语法树或执行活动提升为父节点。
    en: The edge expresses code as a proper specialization of the text carrier without promoting MIME hints, syntax trees, or execution activities to parents.
    ja: この辺はコードをテキスト媒体の真の特殊化として表し、MIME ヒント、構文木、実行活動を親へ昇格させません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
