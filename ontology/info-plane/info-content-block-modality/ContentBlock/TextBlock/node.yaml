schema: moonweave.ai/ontology-node/v1
id: TextBlock
kind: concept
labels:
  zh: 文本内容块
  en: text block
  ja: テキスト内容ブロック
semantics:
  short_definition:
    zh: 由字符顺序承载语义的字符串载荷 ContentBlock 特化。
    en: ContentBlock specialization whose canonical payload is a string with character-order semantics.
    ja: 文字順が意味を担う string payload ContentBlock 特化。
  definition:
    zh: TextBlock 映射 OpenAI type=text、Anthropic type=text、A2A kind=text 的 plain text content；mime_type 常为 text/plain，encoding 为 utf-8。
    en: TextBlock maps OpenAI type=text, Anthropic type=text, and A2A kind=text plain text; mime_type often text/plain with utf-8 encoding.
    ja: plain text wire part→TextBlock。
  why_needed:
    zh: 文本块是最常见载荷，需要与 CodeBlock、StructuredDataBlock 明确区分。
    en: Text blocks are the most common payload and must be distinguished from CodeBlock and StructuredDataBlock.
    ja: text vs code/structured distinction。
  includes:
    - zh: text 字符串、mime_type、encoding、content_block_id。
      en: Text string, mime_type, encoding, content_block_id.
      ja: text/mime/encoding/id。
  excludes:
    - zh: 已解析 JSON/表格、内嵌图片 bytes、tool_use payload。
      en: Parsed JSON/tables, embedded image bytes, tool_use payloads.
      ja: JSON/table/image/tool_use payloads。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: A2A Part text="Deployment window 22:00"→TextBlock msg-42-part-0 mime_type=text/plain。
    en: A2A Part text="Deployment window 22:00"→TextBlock msg-42-part-0 mime_type=text/plain.
    ja: A2A text part mapping。
  typical_input:
    - description: Text part
      format: '{"type":"text","text":"Summarize the incident."}'
      source_claims:
        - claim-tblock-openai
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 固定为 text，表示规范载荷是由字符顺序承载语义的字符串。
        en: Fixed to text when the canonical payload is a string whose character order carries meaning.
        ja: 正規ペイロードが文字順で意味を担う文字列である text 固定値です。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: text
      allowed_values:
        - id: modality_text
          value: text
          labels:
            zh: text
            en: text
            ja: text
          definitions:
            zh: TextBlock 只允许 text，且规范载荷必须是字符顺序有意义的字符串。
            en: TextBlock permits only text, and its canonical payload must be a string with meaningful character order.
            ja: TextBlock は text だけを許し、正規ペイロードは文字順に意味がある文字列でなければなりません。
          status: accepted
          source_claims:
            - claim-text-block-003
      source_claims:
        - claim-text-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-text-001
      allowed_values: []
      source_claims:
        - claim-text-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: text/plain
      allowed_values: []
      source_claims:
        - claim-text-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: utf-8
      allowed_values: []
      source_claims:
        - claim-text-block-007
    - id: text
      labels:
        zh: 文本载荷
        en: text payload
        ja: テキストペイロード
      definitions:
        zh: 以字符顺序承载语义的规范字符串；已解析为对象、数组或表格单元格的数据不再以此字段作为主表示。
        en: Canonical string whose character order carries meaning; data parsed into objects, arrays, or table cells no longer uses this as its primary representation.
        ja: 文字順が意味を担う正規文字列です。オブジェクト、配列、表セルへ解析済みのデータは主表現として用いません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 部署窗口 22:00
      allowed_values: []
      source_claims:
        - claim-text-block-008
  constraints: []
  required_relations: []
examples:
  - id: TextBlock-example-openai-text
    labels:
      zh: OpenAI text part
      en: OpenAI text part
      ja: OpenAI text part
    descriptions:
      zh: block-text-1 type=text "Summarize the incident."
      en: block-text-1 type=text "Summarize the incident."
      ja: OpenAI text block。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: text part
    field_values:
      content_block_id: block-text-1
      mime_type: text/plain
    related_node_ids:
      - TextBlock
    related_relation_ids: []
    source_claims:
      - claim-tblock-openai
  - id: TextBlock-example-a2a-text
    labels:
      zh: A2A text Part
      en: A2A text Part
      ja: A2A text Part
    descriptions:
      zh: msg-42-part-0 text="Deployment window 22:00"。
      en: msg-42-part-0 text="Deployment window 22:00".
      ja: A2A text block。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: text Part
    field_values: {}
    related_node_ids:
      - TextBlock
      - ContentBlock
    related_relation_ids: []
    source_claims:
      - claim-tblock-a2a
  - id: TextBlock-example-not-json
    labels:
      zh: 非 JSON 结构化
      en: Not JSON structured
      ja: JSON structured ではない
    descriptions:
      zh: application/json 解析对象不得保持 TextBlock。
      en: Parsed application/json object must not remain TextBlock.
      ja: JSON→StructuredDataBlock。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - TextBlock
      - StructuredDataBlock
    related_relation_ids: []
    source_claims:
      - claim-tblock-design
parent_relation:
  id: TextBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TextBlock is_a ContentBlock 表示每个文本块都是有边界的信息载荷单元，并进一步要求规范载荷为由字符顺序承载语义的字符串；代码可再专门化为 CodeBlock，而解析后的对象、数组和表格不再以字符串作为主表示。
    en: TextBlock is_a ContentBlock means every text block is a bounded information-payload unit further constrained to a canonical string whose character order carries meaning. Code may specialize further as CodeBlock, while parsed objects, arrays, and tables no longer use a string as their primary representation.
    ja: TextBlock is_a ContentBlock は、すべてのテキストブロックが境界付き情報ペイロード単位で、文字順が意味を担う正規文字列を要することを意味します。コードは CodeBlock へ特化でき、解析済みオブジェクト、配列、表は文字列を主表現にしません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TextBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: 块 note-3 保存字符串“部署窗口 22:00”，字符顺序直接承载语义，mime_type="text/plain"。
        en: Block note-3 stores the string "Deployment window 22:00" whose character order directly carries meaning, with mime_type="text/plain".
        ja: ブロック note-3 は文字順が直接意味を担う文字列と mime_type="text/plain" を保持します。
      field_values:
        block_id: note-3
        modality: text
        mime_type: text/plain
        encoding: utf-8
        text: 部署窗口 22:00
      related_node_ids:
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - TextBlock-is_a-ContentBlock
      source_claims:
        - claim-text-block-016
    - id: TextBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 块 data-3 的主载荷已解析为对象 {"window":"22:00"}，可按键 window 寻址。虽然键和值由文本字符组成，其规范表示是结构化对象，因此不是 TextBlock。
        en: Block data-3 has primary payload parsed as object {"window":"22:00"}, addressable by key window. Although keys and values contain characters, its canonical representation is a structured object, so it is not TextBlock.
        ja: ブロック data-3 の主ペイロードはキー window で指定可能な解析済みオブジェクトです。キー値が文字でも正規表現は構造化オブジェクトなので TextBlock ではありません。
      field_values: {}
      related_node_ids:
        - TextBlock
        - ContentBlock
        - StructuredDataBlock
      related_relation_ids:
        - TextBlock-is_a-ContentBlock
      source_claims:
        - claim-text-block-017
  source_claims:
    - claim-text-block-018
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-content-parts
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: Multimodal content parts.
  - id: src-a2a-parts
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Part kinds text/file/data.
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-text-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent by type="text" and text:string, providing direct evidence for a content representation whose canonical payload is an ordered character string. Moonweave places CodeBlock below TextBlock as a reviewed specialization.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines text as one of four mutually exclusive Part payload fields. This supports distinguishing a text carrier from raw bytes, a file URL, and parsed data independently of mediaType.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-003
    source: eng-proto-mcp-spec
    supports: MCP TextContent uses the literal discriminator type=text, directly supporting the only allowed payload-form value for TextBlock.
    locator: Schema Reference > TextContent > type
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 gives TextContent the discriminator type=text. Moonweave records text as the payload-form value and validates it against TextBlock-is_a-ContentBlock.
    locator: Schema Reference > TextContent > type
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-005
    source: eng-proto-mcp-spec
    supports: MCP TextContent is one bounded content item. Moonweave adds block_id to preserve that item's local identity without equating it with message identity, turn order, or source location.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-006
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 allows mediaType on a text Part. Moonweave stores the optional value as format metadata; the canonical string payload, not a MIME-name match, establishes TextBlock membership.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-007
    source: eng-proto-mcp-spec
    supports: MCP TextContent exposes the decoded text string and does not require a separate transfer encoding. Moonweave keeps encoding optional only when the original character encoding remains known and relevant.
    locator: Schema Reference > TextContent > text
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires TextContent.text and defines it as the text content of the message. This directly supports the canonical string payload on TextBlock.
    locator: Schema Reference > TextContent > text
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent with discriminator type="text" and required text:string, directly supporting the string-payload basis of this TextBlock case.
    locator: Schema Reference > TextContent
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines text as the string content of a text Part and makes it mutually exclusive with raw, url, and data; this supports the case boundary without making mediaType a class.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires TextContent.text to be a string and separately defines its discriminated type="text" form; Moonweave uses that concrete form to keep an already parsed value outside TextBlock.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 distinguishes the text string carrier from the data JSON-value carrier under an exactly-one rule; this directly supports the serialized-text versus parsed-data boundary.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent represents text provided to or from an LLM with a required text string; the log line is a concrete instance of that representation.
    locator: Schema Reference > TextContent
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines a text Part by its string content; the protocol does not create a distinct ontology type from the string's logging purpose.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines AudioContent by type="audio", base64 audio data, and required mimeType. Moonweave names this payload category AudioBlock and keeps transcripts as distinct TextBlock representations.
    locator: Schema Reference > AudioContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-block-016
    source: eng-proto-mcp-spec
    supports: MCP TextContent directly requires a text string and type=text; note-3 instantiates that carrier.
    locator: Schema Reference > TextContent
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-017
    source: eng-proto-a2a-spec
    supports: A2A distinguishes the text and data alternatives; a parsed object uses data even when its values are strings.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and data
    evidence_kind: normative
    confidence: high
  - id: claim-text-block-018
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 includes TextContent in ContentBlock and requires type=text plus a text string. Moonweave abstracts that explicit alternative into TextBlock-is_a-ContentBlock.
    locator: Schema Reference > ContentBlock and TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-tblock-openai
    source: src-openai-content-parts
    supports: OpenAI text parts map to TextBlock with text/plain semantics.
    locator: text part
    evidence_kind: primary-api
    confidence: high
  - id: claim-tblock-a2a
    source: src-a2a-parts
    supports: A2A text Parts map to TextBlock.
    locator: text Part
    evidence_kind: primary-spec
    confidence: high
  - id: claim-tblock-design
    source: src-info-content-design
    supports: TextBlock is plain string payload distinct from structured parses.
    locator: TextBlock
    evidence_kind: design-inference
    confidence: high
