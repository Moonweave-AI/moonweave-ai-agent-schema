schema: moonweave.ai/ontology-node/v1
id: TextBlock
kind: concept
status: review
labels:
  zh: 文本内容块
  en: text block
  ja: テキスト内容ブロック
semantics:
  short_definition:
    zh: 文本内容块是以字符序列为权威载荷的内容块。
    en: A text block is a content block whose authoritative payload is a character sequence.
    ja: テキスト内容ブロックは、文字列を権威あるペイロードとする内容ブロックです。
  definition:
    zh: 文本内容块是一种内容块，其种差是载荷的规范表示为按字符编码解释的字符串，并以字符顺序保留其语义。自然语言、日志、摘录、序列化数据和代码都可先属于文本表示；其中需要程序语言或命令语法解释的文本进一步归入 CodeBlock，已经解析为可寻址值的数据则归入 StructuredDataBlock。
    en: A text block is a content block differentiated by a canonical payload represented as a character-encoded string whose character order carries its meaning. Natural language, logs, excerpts, serialized data, and code may all begin as text; text requiring a programming-language or command grammar further specializes as CodeBlock, while data parsed into addressable values becomes StructuredDataBlock.
    ja: テキスト内容ブロックは、文字符号で解釈され、文字順が意味を担う文字列を正規ペイロードとする点で区別される内容ブロックです。自然言語、ログ、抜粋、直列化データ、コードはいずれもまずテキストになり得ます。プログラム言語やコマンド文法を要するものは CodeBlock へ特化し、指定可能な値へ解析済みのデータは StructuredDataBlock となります。
  why_needed:
    zh: TextBlock 为字符编码、分词、截断、引用范围和文本安全过滤提供共同边界，也是 CodeBlock 的必要上位类型。音频转写产生新的 TextBlock，而不会把原 AudioBlock 的类型改成文本。
    en: TextBlock provides one boundary for character encoding, tokenization, truncation, span citation, and text-safety filtering and is the necessary parent of CodeBlock. Transcribing audio produces a new TextBlock rather than changing the original AudioBlock into text.
    ja: TextBlock は文字符号、トークン化、切詰め、範囲引用、テキスト安全フィルタに共通境界を与え、CodeBlock の必要な上位型です。音声の文字起こしは新しい TextBlock を生成し、元の AudioBlock をテキストへ変更しません。
  includes:
    - zh: 纳入自然语言、日志行、摘录、摘要、提示片段、未解析的 JSON/CSV/YAML 字符串，以及作为其下位类型的源码、命令和补丁文本。
      en: Includes natural language, log lines, excerpts, summaries, prompt fragments, unparsed JSON, CSV, or YAML strings, and source code, commands, and patches through the CodeBlock subtype.
      ja: 自然言語、ログ行、抜粋、要約、プロンプト断片、未解析 JSON/CSV/YAML 文字列、および CodeBlock 下位型を通じたソースコード、コマンド、パッチを含みます。
  excludes:
    - zh: 排除以二进制图像或音频为主载荷的块、仅持有文件引用的附件，以及已经解析为对象、数组或行列单元格的数据；字幕或转写本身可以是 TextBlock，但其来源媒体仍保留原类型。
      en: Excludes blocks whose primary payload is binary image or audio, attachments that only hold a file reference, and data already parsed into objects, arrays, or table cells. A caption or transcript may itself be TextBlock while its source media retains its original type.
      ja: 主ペイロードがバイナリ画像・音声であるブロック、ファイル参照だけを持つ添付、オブジェクト・配列・表セルへ解析済みのデータを除外します。字幕や文字起こし自体は TextBlock になれますが、元媒体は元の型を保持します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 text，表示规范载荷是由字符顺序承载语义的字符串。
        en: Fixed to text when the canonical payload is a string whose character order carries meaning.
        ja: 正規ペイロードが文字順で意味を担う文字列である text 固定値です。
      allowed_values:
        - id: modality_text
          value: text
          labels:
            zh: text
            en: text
            ja: text
          definitions:
            zh: TextBlock 只允许 text，且规范载荷必须是字符顺序有意义的字符串。
            en: TextBlock permits only text, and its canonical payload must be a string with meaningful character order.
            ja: TextBlock は text だけを許し、正規ペイロードは文字順に意味がある文字列でなければなりません。
          status: accepted
          source_claims:
            - claim-text-block-003
      pattern: null
      example_value: text
      source_claims:
        - claim-text-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-text-001
      source_claims:
        - claim-text-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: text/plain
      source_claims:
        - claim-text-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-text-block-007
    - id: text
      labels:
        zh: 文本载荷
        en: text payload
        ja: テキストペイロード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以字符顺序承载语义的规范字符串；已解析为对象、数组或表格单元格的数据不再以此字段作为主表示。
        en: Canonical string whose character order carries meaning; data parsed into objects, arrays, or table cells no longer uses this as its primary representation.
        ja: 文字順が意味を担う正規文字列です。オブジェクト、配列、表セルへ解析済みのデータは主表現として用いません。
      allowed_values: []
      pattern: null
      example_value: 部署窗口 22:00
      source_claims:
        - claim-text-block-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: TextBlock-example-positive-001
    kind: positive
    labels:
      zh: 文本内容块正例
      en: Positive example of text block
      ja: テキスト内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: MCP TextContent {type="text", text="部署窗口为 22:00"} 的规范载荷是有序字符序列；它不需要程序语言、命令语法或数据字段寻址即可解释，因此归入 TextBlock，并通过 TextBlock-is_a-ContentBlock 取得上位成员资格。
      en: MCP TextContent {type="text", text="Deployment window is 22:00"} has a canonical payload that is an ordered character sequence. It needs neither a programming-language grammar nor addressable data fields, so it is a TextBlock and inherits ContentBlock membership through TextBlock-is_a-ContentBlock.
      ja: MCP TextContent {type="text", text="配備時間は 22:00"} の正規ペイロードは順序付き文字列です。プログラム言語文法や指定可能なデータ項目を要しないため TextBlock となり、TextBlock-is_a-ContentBlock で上位所属を得ます。
    field_values:
      block_id: text-deploy-001
      modality: text
      mime_type: text/plain
      encoding: utf-8
      text: Deployment window is 22:00
    related_node_ids:
      - TextBlock
      - ContentBlock
    related_relation_ids:
      - TextBlock-is_a-ContentBlock
    expected_result:
      zh: 分类器返回 TextBlock；text/plain 只帮助解释字符编码，不替代字符串载荷这一种差。
      en: The classifier returns TextBlock; text/plain helps interpret character encoding but does not replace the string-payload differentia.
      ja: 分類器は TextBlock を返します。text/plain は文字符号の解釈を助けますが、文字列ペイロードという種差の代わりにはなりません。
    why_valid_or_invalid:
      zh: 实例包含一个明确的 text 判别项和字符串载荷，字符顺序直接承载语义，且没有代码语法或已解析字段结构。
      en: The instance has one explicit text discriminator and a string payload whose character order carries meaning, with neither code grammar nor parsed field structure.
      ja: この例は明示的な text 判別項と、文字順が意味を担う文字列ペイロードを持ち、コード文法や解析済み項目構造を含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-block-009
      - claim-text-block-010
  - id: TextBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 文本内容块边界例
      en: Boundary case for text block
      ja: テキスト内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: A2A Part {data:{"temperature":21}, mediaType:"application/json"} 的规范载荷是可寻址的 JSON 值，因此归入 StructuredDataBlock，而不是 TextBlock。只有当同样的字符以 text="{"temperature":21}" 传递且尚未解析时，它才是 TextBlock。
      en: A2A Part {data:{"temperature":21}, mediaType:"application/json"} has an addressable JSON value as its canonical payload, so it is StructuredDataBlock rather than TextBlock. The same characters are TextBlock only when carried as text="{\"temperature\":21}" and not yet parsed.
      ja: A2A Part {data:{"temperature":21}, mediaType:"application/json"} の正規ペイロードは指定可能な JSON 値なので、TextBlock ではなく StructuredDataBlock です。同じ文字でも text="{"temperature":21}" として未解析で運ばれる場合だけ TextBlock です。
    field_values: {}
    related_node_ids:
      - TextBlock
      - StructuredDataBlock
      - ContentBlock
    related_relation_ids:
      - TextBlock-is_a-ContentBlock
    expected_result:
      zh: data 载荷分类为 StructuredDataBlock；验证器不得因为 mediaType 含有 json 或序列化后可显示为文字就把它归为 TextBlock。
      en: The data payload is classified as StructuredDataBlock; validation must not classify it as TextBlock merely because mediaType mentions JSON or serialization can display characters.
      ja: data ペイロードは StructuredDataBlock に分類します。mediaType に JSON が含まれることや、直列化すれば文字表示できることだけで TextBlock にしません。
    why_valid_or_invalid:
      zh: 本体类型由当前规范载荷的表示结构决定：字符串与已解析值是不同层级，媒体类型只是辅助解释字段。
      en: "Ontology type follows the current canonical payload structure: a string and a parsed value are different representation levels, while media type is only interpretive metadata."
      ja: 本体型は現在の正規ペイロード構造で決まります。文字列と解析済み値は異なる表現段階で、メディア型は解釈メタデータにすぎません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-block-011
      - claim-text-block-012
  - id: TextBlock-example-instance-001
    kind: instance
    labels:
      zh: 文本内容块结构化实例
      en: Structured instance of text block
      ja: テキスト内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 text-log-017 保存 UTF-8 字符串“worker-3 completed batch 41”，modality="text"、mime_type="text/plain"。它是可直接阅读的日志行，没有程序语言声明，也没有被解析成键值对象。
      en: Inline instance text-log-017 stores the UTF-8 string "worker-3 completed batch 41" with modality="text" and mime_type="text/plain". It is a directly readable log line with no programming-language declaration and no parsing into a key-value object.
      ja: ノード内インスタンス text-log-017 は UTF-8 文字列「worker-3 completed batch 41」を modality="text"、mime_type="text/plain" と共に保持します。直接読めるログ行であり、プログラム言語宣言もキー値オブジェクトへの解析もありません。
    field_values:
      block_id: text-log-017
      modality: text
      mime_type: text/plain
      encoding: utf-8
      text: worker-3 completed batch 41
    related_node_ids:
      - TextBlock
      - ContentBlock
    related_relation_ids:
      - TextBlock-is_a-ContentBlock
    expected_result:
      zh: 实例归为 TextBlock，并可沿 TextBlock-is_a-ContentBlock 查询其上位类型；不再额外创建“日志块”平级节点。
      en: The instance is a TextBlock and its broader type is queryable through TextBlock-is_a-ContentBlock; no parallel LogBlock node is invented.
      ja: インスタンスは TextBlock となり、TextBlock-is_a-ContentBlock で上位型を照会できます。並列の LogBlock ノードは作りません。
    why_valid_or_invalid:
      zh: 载荷的解释单位是字符序列，日志用途只是使用情境，不改变表示类型。
      en: The payload is interpreted as a character sequence; its logging purpose is usage context and does not change representation type.
      ja: ペイロードの解釈単位は文字列であり、ログ用途は利用文脈にすぎず表現型を変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-text-block-013
      - claim-text-block-014
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AudioBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: TextBlock 的规范载荷是字符序列；AudioBlock 的规范载荷解码为声音。转写可以连接二者，但不会使同一节点同时拥有两种主载荷。
      en: TextBlock's canonical payload is a character sequence; AudioBlock's decodes to sound. Transcription may connect them but does not give one node two primary payloads.
      ja: TextBlock の正規ペイロードは文字列、AudioBlock は音響です。転写で接続できますが、一ノードに二主ペイロードを持たせません。
    source_claims:
      - claim-text-block-001
      - claim-text-block-015
parent_relation:
  id: TextBlock-is_a-ContentBlock
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TextBlock is_a ContentBlock 表示每个文本块都是有边界的信息载荷单元，并进一步要求规范载荷为由字符顺序承载语义的字符串；代码可再专门化为 CodeBlock，而解析后的对象、数组和表格不再以字符串作为主表示。
    en: TextBlock is_a ContentBlock means every text block is a bounded information-payload unit further constrained to a canonical string whose character order carries meaning. Code may specialize further as CodeBlock, while parsed objects, arrays, and tables no longer use a string as their primary representation.
    ja: TextBlock is_a ContentBlock は、すべてのテキストブロックが境界付き情報ペイロード単位で、文字順が意味を担う正規文字列を要することを意味します。コードは CodeBlock へ特化でき、解析済みオブジェクト、配列、表は文字列を主表現にしません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TextBlock-is_a-ContentBlock-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 块 note-3 保存字符串“部署窗口 22:00”，字符顺序直接承载语义，mime_type="text/plain"。
        en: Block note-3 stores the string "Deployment window 22:00" whose character order directly carries meaning, with mime_type="text/plain".
        ja: ブロック note-3 は文字順が直接意味を担う文字列と mime_type="text/plain" を保持します。
      field_values:
        block_id: note-3
        modality: text
        mime_type: text/plain
        encoding: utf-8
        text: 部署窗口 22:00
      related_node_ids:
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - TextBlock-is_a-ContentBlock
      expected_result:
        zh: 分类为 TextBlock，并可沿父边查询 ContentBlock；text/plain 只保留为字段。
        en: Classify as TextBlock and expose ContentBlock through the parent edge; text/plain remains a field value only.
        ja: TextBlock に分類し親辺から ContentBlock を照会します。text/plain は項目値のままです。
      why_valid_or_invalid:
        zh: 对象有单一有界字符串载荷，不依赖消息发送者、用途或来源才能解释。
        en: The object has one bounded string payload whose interpretation does not depend on message sender, purpose, or source.
        ja: 対象は単一境界付き文字列を持ち、解釈は送信者、用途、出典に依存しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-text-block-016
    - id: TextBlock-is_a-ContentBlock-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 块 data-3 的主载荷已解析为对象 {"window":"22:00"}，可按键 window 寻址。虽然键和值由文本字符组成，其规范表示是结构化对象，因此不是 TextBlock。
        en: Block data-3 has primary payload parsed as object {"window":"22:00"}, addressable by key window. Although keys and values contain characters, its canonical representation is a structured object, so it is not TextBlock.
        ja: ブロック data-3 の主ペイロードはキー window で指定可能な解析済みオブジェクトです。キー値が文字でも正規表現は構造化オブジェクトなので TextBlock ではありません。
      field_values: {}
      related_node_ids:
        - TextBlock
        - ContentBlock
        - StructuredDataBlock
      related_relation_ids:
        - TextBlock-is_a-ContentBlock
      expected_result:
        zh: 返回 StructuredDataBlock；不得因为对象包含字符串值而同时归为 TextBlock。
        en: Return StructuredDataBlock; string-valued members do not also make the object TextBlock.
        ja: StructuredDataBlock を返し、文字列値を含むだけで TextBlock にも分類しません。
      why_valid_or_invalid:
        zh: 分类依据整个块的规范表示，而不是其叶值的数据类型。
        en: Classification follows the whole block's canonical representation, not the datatype of leaf values.
        ja: 分類はブロック全体の正規表現に従い、葉値の datatype には従いません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-text-block-017
  source_claims:
    - claim-text-block-018
  distinct_fact_rationale:
    zh: 该层级依据规范字符载荷，不把消息角色、指令效力或来源位置混入文本分类。
    en: The hierarchy follows the canonical character payload and does not mix message role, instruction force, or source location into text classification.
    ja: この階層は正規文字ペイロードに従い、メッセージ役割、指示効力、出典位置をテキスト分類へ混ぜません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations: []
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
source_claims:
  - id: claim-text-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent by type="text" and text:string, providing direct evidence for a content representation whose canonical payload is an ordered character string. Moonweave places CodeBlock below TextBlock as a reviewed specialization.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-text-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines text as one of four mutually exclusive Part payload fields. This supports distinguishing a text carrier from raw bytes, a file URL, and parsed data independently of mediaType.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-text-block-003
