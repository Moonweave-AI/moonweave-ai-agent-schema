schema: moonweave.ai/ontology-node/v1
id: ImageBlock
kind: concept
status: accepted
labels:
  zh: 图像内容块
  en: image block
  ja: 画像内容ブロック
semantics:
  short_definition:
    zh: 图像内容块是以可解码图像数据为主载荷的内容块。
    en: An image block is a content block whose primary payload is decodable image data.
    ja: 画像内容ブロックは、復号可能な画像データを主ペイロードとする内容ブロックです。
  definition:
    zh: 图像内容块是一种内容块，其种差是载荷由图像字节、编码和图像媒体类型共同解释，解码结果是像素或矢量图形。它表示图像本身；标题、OCR 文本、检测框和图像摘要是由图像派生的文本或结构化信息，不属于图像载荷。
    en: An image block is a content block differentiated by a payload interpreted jointly as image bytes, encoding, and an image media type, yielding pixels or vector graphics when decoded. It represents the image itself; captions, OCR text, detection boxes, and image summaries are derived text or structured information rather than image payload.
    ja: 画像内容ブロックは、画像バイト、符号化方式、画像メディア型を一体として解釈し、復号すると画素またはベクトル図形になる点で区別される内容ブロックです。画像自体を表し、説明文、OCR テキスト、検出枠、画像要約は派生したテキストまたは構造化情報であって画像ペイロードではありません。
  why_needed:
    zh: 单独建模图像载荷，才能选择安全解码与渲染路径、限制媒体类型并核算像素和字节预算，同时不把 OCR、标题或检测结果混进图像类型。
    en: Modeling image payload separately lets a consumer select a safe decode and render path, constrain media types, and account for pixel and byte budgets without mixing OCR, captions, or detections into the image type.
    ja: 画像ペイロードを独立してモデル化すると、安全な復号・描画経路の選択、メディア型の制限、画素・バイト予算の計上ができ、OCR、説明文、検出結果を画像型へ混在させません。
  includes:
    - zh: 纳入具有 image/* 媒体类型并以二进制或 Base64 形式承载的照片、截图、扫描图和受信任矢量图像数据。
      en: Includes photographs, screenshots, scans, and trusted vector-image data carried as binary or Base64 content with an image media type.
      ja: image/* メディア型を持ち、バイナリまたは Base64 で保持される写真、スクリーンショット、走査画像、信頼済みベクトル画像データを含みます。
  excludes:
    - zh: 排除图像标题、OCR 文本、视觉问答结果、检测框和向量嵌入；这些分别属于 TextBlock 或 StructuredDataBlock。仅指向图片文件而不内嵌图像数据的对象属于 FileAttachmentBlock。
      en: Excludes captions, OCR text, visual-question answers, detection boxes, and vector embeddings, which are TextBlock or StructuredDataBlock. A handle that points to an image file without embedding image data is FileAttachmentBlock.
      ja: 画像説明、OCR テキスト、視覚質問応答、検出枠、ベクトル埋込みを除外し、TextBlock または StructuredDataBlock とします。画像データを内嵌せず画像ファイルだけを指すハンドルは FileAttachmentBlock です。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 image，表示主载荷解码为像素或矢量图形；OCR 文本和说明文字另建 TextBlock。
        en: Fixed to image when the primary payload decodes to pixels or vector graphics; OCR and captions are separate TextBlock values.
        ja: 主ペイロードが画素・ベクトル図形へ復号される image 固定値で、OCR と説明文は別の TextBlock です。
      allowed_values:
        - id: modality_image
          value: image
          labels:
            zh: image
            en: image
            ja: image
          definitions:
            zh: ImageBlock 只允许 image，且数据与媒体类型必须共同解码为图像。
            en: ImageBlock permits only image, with data and media type jointly decoding to an image.
            ja: ImageBlock は image だけを許し、データと media type が共に画像へ復号されなければなりません。
          status: accepted
          source_claims:
            - claim-image-block-003
      pattern: null
      example_value: image
      source_claims:
        - claim-image-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-image-001
      source_claims:
        - claim-image-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: image/png
      source_claims:
        - claim-image-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: binary
      source_claims:
        - claim-image-block-007
    - id: data
      labels:
        zh: 图像数据
        en: image data
        ja: 画像データ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 内嵌图像的 Base64 字符串；仅指向图像文件的 URI 应建模为 FileAttachmentBlock。
        en: Base64 string for an embedded image; a URI that only points to an image file is modeled as FileAttachmentBlock.
        ja: 内包画像の Base64 文字列です。画像ファイルを指すだけの URI は FileAttachmentBlock とします。
      allowed_values: []
      pattern: null
      example_value: iVBORw0KGgoAAAANSUhEUg...
      source_claims:
        - claim-image-block-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: ImageBlock-example-positive-001
    kind: positive
    labels:
      zh: 图像内容块正例
      en: Positive example of image block
      ja: 画像内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: MCP ImageContent img-chart-006 设置 type="image"、mimeType="image/png"，data 为内嵌 PNG 的 base64 字节。解码后的主载荷是像素图像，因此归入 ImageBlock，并通过 ImageBlock-is_a-ContentBlock 取得 ContentBlock 身份；mimeType 用于选择解码器而非充当父类。
      en: MCP ImageContent img-chart-006 sets type="image", mimeType="image/png", and data to base64-encoded embedded PNG bytes. Its decoded primary payload is a pixel image, so it is ImageBlock and inherits ContentBlock through ImageBlock-is_a-ContentBlock; mimeType selects a decoder rather than serving as a parent class.
      ja: MCP ImageContent img-chart-006 は type="image"、mimeType="image/png"、data に内包 PNG の base64 バイトを設定します。復号後の主ペイロードは画素画像なので ImageBlock となり、ImageBlock-is_a-ContentBlock で ContentBlock に属します。mimeType はデコーダー選択用で親クラスではありません。
    field_values:
      block_id: img-chart-006
      modality: image
      mime_type: image/png
      encoding: base64
      data: iVBORw0KGgo...
    related_node_ids:
      - ImageBlock
      - ContentBlock
    related_relation_ids:
      - ImageBlock-is_a-ContentBlock
    expected_result:
      zh: 分类器返回 ImageBlock；图像字节、编码与媒体类型保留为节点信息，不另建 PNG/JPEG 平级本体节点。
      en: The classifier returns ImageBlock; image bytes, encoding, and media type remain node information without parallel PNG or JPEG ontology nodes.
      ja: 分類器は ImageBlock を返し、画像バイト、符号化、メディア型はノード情報に保持します。PNG/JPEG の並列本体ノードは作りません。
    why_valid_or_invalid:
      zh: 载荷通过 image 判别项和可解码图像字节被确定；其语义依赖空间像素结构，而不是字符顺序。
      en: The image discriminator and decodable image bytes establish the payload; meaning depends on spatial pixel structure rather than character order.
      ja: image 判別項と復号可能な画像バイトがペイロードを確定し、意味は文字順ではなく空間的画素構造に依存します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-image-block-009
      - claim-image-block-010
  - id: ImageBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 图像内容块边界例
      en: Boundary case for image block
      ja: 画像内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: OCR 结果 text-ocr-006 保存字符串“图 3：延迟分布”，它是从 img-chart-006 派生的 TextBlock，而不是 ImageBlock。来源图像仍保持 ImageBlock；字幕、alt text 或 OCR 文本不会因为描述图像就继承图像载荷类型。
      en: "OCR result text-ocr-006 stores the string \"Figure 3: latency distribution\" and is a TextBlock derived from img-chart-006, not an ImageBlock. The source remains ImageBlock; captions, alt text, and OCR strings do not inherit image-payload type merely because they describe an image."
      ja: OCR 結果 text-ocr-006 は文字列「図3：遅延分布」を保持し、img-chart-006 から派生した TextBlock であって ImageBlock ではありません。元画像は ImageBlock のままで、字幕、alt text、OCR 文字列は画像を記述するだけで画像ペイロード型を継承しません。
    field_values: {}
    related_node_ids:
      - ImageBlock
      - TextBlock
      - ContentBlock
    related_relation_ids:
      - ImageBlock-is_a-ContentBlock
    expected_result:
      zh: 图像源归 ImageBlock，OCR 结果归 TextBlock；验证器保留二者的派生关联但不合并类型。
      en: The image source is ImageBlock and the OCR result is TextBlock; validation preserves their derivation association without merging types.
      ja: 画像源は ImageBlock、OCR 結果は TextBlock です。検証器は派生関係を保持しますが型を統合しません。
    why_valid_or_invalid:
      zh: 两节点的规范载荷不同：一个需要图像解码和空间解释，另一个是有序字符序列；来源关系不构成 is_a。
      en: "The nodes have different canonical payloads: one requires image decoding and spatial interpretation, the other is an ordered character sequence. Provenance is not is_a."
      ja: 正規ペイロードが異なります。一方は画像復号と空間解釈を要し、他方は順序付き文字列です。出典関係は is_a ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-image-block-011
      - claim-image-block-012
  - id: ImageBlock-example-instance-001
    kind: instance
    labels:
      zh: 图像内容块结构化实例
      en: Structured instance of image block
      ja: 画像内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 img-dashboard-012 保存 1280×720 PNG 的内嵌字节，modality="image"、mime_type="image/png"、encoding="base64"、block_id="img-dashboard-012"。图像内容是仪表盘截图；OCR 文字若生成，将作为单独 TextBlock 记录。
      en: Inline instance img-dashboard-012 stores embedded bytes for a 1280×720 PNG with modality="image", mime_type="image/png", encoding="base64", and block_id="img-dashboard-012". The payload is a dashboard screenshot; any generated OCR text is recorded as a separate TextBlock.
      ja: ノード内インスタンス img-dashboard-012 は 1280×720 PNG の内包バイトを modality="image"、mime_type="image/png"、encoding="base64"、block_id="img-dashboard-012" と共に保持します。ペイロードはダッシュボード画像で、生成した OCR 文字は別の TextBlock に記録します。
    field_values:
      block_id: img-dashboard-012
      modality: image
      mime_type: image/png
      encoding: base64
      data: iVBORw0KGgo...
    related_node_ids:
      - ImageBlock
      - ContentBlock
    related_relation_ids:
      - ImageBlock-is_a-ContentBlock
    expected_result:
      zh: 实例归为 ImageBlock；解码成功后可显示图像，OCR 或说明文字不写回同一载荷类型。
      en: The instance is ImageBlock and renders after successful decoding; OCR or descriptive text is not written back as the same payload type.
      ja: インスタンスは ImageBlock で、復号成功後に表示できます。OCR や説明文を同じペイロード型へ書き戻しません。
    why_valid_or_invalid:
      zh: base64 解码结果是有效 PNG 字节且媒体类型一致，主表示是图像；尺寸只是节点解释字段。
      en: Base64 decoding yields valid PNG bytes consistent with the media type, establishing an image as the primary representation; dimensions are explanatory node fields.
      ja: base64 復号結果は media type と整合する有効な PNG バイトで、主表現は画像です。寸法はノードの説明項目です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-image-block-013
      - claim-image-block-014
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StructuredDataBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: ImageBlock 的规范载荷是解码后图形；StructuredDataBlock 的规范载荷是已解析键值。检测框对象属于 StructuredDataBlock，即使它描述某张 ImageBlock。
      en: ImageBlock's canonical payload is decoded graphics; StructuredDataBlock's is parsed addressable values. A detection-box object is StructuredDataBlock even when it describes an ImageBlock.
      ja: ImageBlock の正規ペイロードは復号図形、StructuredDataBlock は解析済み指定可能値です。検出枠オブジェクトは画像を記述しても StructuredDataBlock です。
    source_claims:
      - claim-image-block-001
      - claim-image-block-015
parent_relation:
  id: ImageBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: ImageBlock is_a ContentBlock 表示每个图像块都是有边界的信息载荷单元，并进一步要求内嵌数据与图像媒体类型共同解码为像素或矢量图形；OCR、检测框和说明文字是相关但独立的内容块。
    en: ImageBlock is_a ContentBlock means every image block is a bounded information-payload unit further constrained to embedded data that decodes with an image media type into pixels or vector graphics. OCR, detection boxes, and captions are related but separate blocks.
    ja: ImageBlock is_a ContentBlock は、すべての画像ブロックが境界付き情報ペイロード単位で、内包データが画像 media type と共に画素・ベクトル図形へ復号されることを意味します。OCR、検出枠、説明文は関連する別ブロックです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ImageBlock-is_a-ContentBlock-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 块 screenshot-8 保存 Base64 PNG、mime_type="image/png"、encoding="base64"，解码得到 1360×720 像素截图。
        en: Block screenshot-8 stores Base64 PNG data with mime_type="image/png" and encoding="base64"; decoding yields a 1360×720 screenshot.
        ja: ブロック screenshot-8 は Base64 PNG、mime_type="image/png"、encoding="base64" を保持し、復号すると 1360×720 screenshot になります。
      field_values:
        block_id: screenshot-8
        modality: image
        mime_type: image/png
        encoding: base64
        data: iVBORw0KGgo...
      related_node_ids:
        - ImageBlock
        - ContentBlock
      related_relation_ids:
        - ImageBlock-is_a-ContentBlock
      expected_result:
        zh: 最具体类型为 ImageBlock，并可沿父边查询 ContentBlock。
        en: The most-specific type is ImageBlock and ContentBlock is reachable through its parent edge.
        ja: 最も具体的な型は ImageBlock で、親辺から ContentBlock を照会できます。
      why_valid_or_invalid:
        zh: 图像 media type、内嵌数据与像素解码结果一致，满足图像种差。
        en: Image media type, embedded data, and pixel-decoding result agree and satisfy the image differentia.
        ja: 画像 media type、内包データ、画素復号結果が一致し、画像種差を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-image-block-016
    - id: ImageBlock-is_a-ContentBlock-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: OCR 结果 text-8 保存字符串“智能体系统本体”。它来自 screenshot-8，但规范载荷是字符序列，因此是 TextBlock；来源图像仍保持 ImageBlock。
        en: OCR result text-8 stores the string "Agent system ontology". It comes from screenshot-8 but its canonical payload is a character sequence, so it is TextBlock while the source remains ImageBlock.
        ja: OCR 結果 text-8 は文字列を保持します。screenshot-8 由来でも正規ペイロードは文字列なので TextBlock、元画像は ImageBlock のままです。
      field_values: {}
      related_node_ids:
        - ImageBlock
        - ContentBlock
        - TextBlock
      related_relation_ids:
        - ImageBlock-is_a-ContentBlock
      expected_result:
        zh: 分别保留 ImageBlock 与 TextBlock，不把 OCR 文本并入图像节点或传播图像类型。
        en: Preserve separate ImageBlock and TextBlock nodes; do not merge OCR text into the image node or propagate image type.
        ja: ImageBlock と TextBlock を別々に保持し、OCR テキストを画像ノードへ統合・画像型伝播しません。
      why_valid_or_invalid:
        zh: 派生关系不改变每个对象自身的主表示和分类。
        en: Derivation does not change each object's own primary representation and class.
        ja: 派生関係は各対象自身の主表現と分類を変えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-image-block-017
  source_claims:
    - claim-image-block-018
  distinct_fact_rationale:
    zh: 该层级依据图像载荷本身，而非文件扩展名、OCR 结果或展示用途。
    en: The hierarchy follows the image payload itself, not filename extension, OCR output, or display purpose.
    ja: この階層は画像ペイロード自体に従い、拡張子、OCR 結果、表示用途には従いません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI/Anthropic 多模态 content parts、MCP ContentBlock union 与 A2A Part oneof 逐项核验；TextBlock/CodeBlock、StructuredDataBlock/TableBlock、ImageBlock、AudioBlock 与 FileAttachmentBlock 语义成立。
    en: Verified against OpenAI/Anthropic multimodal content parts, MCP ContentBlock union, and A2A Part oneof; TextBlock/CodeBlock, StructuredDataBlock/TableBlock, ImageBlock, AudioBlock, and FileAttachmentBlock semantics hold.
    ja: OpenAI/Anthropic multimodal content part、MCP ContentBlock union、A2A Part oneof に照らし TextBlock/CodeBlock/StructuredDataBlock/TableBlock/ImageBlock/AudioBlock/FileAttachmentBlock semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-image-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines ImageContent by discriminator type="image", base64 image data, and required mimeType. Moonweave names the corresponding payload category ImageBlock and keeps captions or OCR as separate text representations.
    locator: Schema Reference > ImageContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits file bytes in raw or a file location in url and supplies mediaType for all Part kinds. Those fields support image transport but mediaType alone is not treated as an ontology hierarchy.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-003
    source: eng-proto-mcp-spec
    supports: MCP ImageContent uses the literal discriminator type=image, directly supporting the only allowed payload-form value for ImageBlock.
    locator: Schema Reference > ImageContent > type
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 gives ImageContent the discriminator type=image. Moonweave records image as the payload-form value and validates it against ImageBlock-is_a-ContentBlock.
    locator: Schema Reference > ImageContent > type
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-005
    source: eng-proto-mcp-spec
