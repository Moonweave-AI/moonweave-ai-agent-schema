      - claim-image-block-012
  - id: ImageBlock-example-instance-001

    labels:
      zh: 图像内容块结构化实例
      en: Structured instance of image block
      ja: 画像内容ブロックの構造化インスタンス

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->ImageBlock.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->ImageBlock.", ja: "DSPy instance maps to ImageBlock PromptTemplate."}

    field_values:
      block_id: img-dashboard-012
      modality: image
      mime_type: image/png
      encoding: base64
      data: iVBORw0KGgo...
    related_node_ids:
      - ImageBlock
      - ContentBlock
    related_relation_ids:
      - ImageBlock-is_a-ContentBlock

    source_claims:
      - claim-image-block-013
      - claim-image-block-014
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StructuredDataBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: ImageBlock 的规范载荷是解码后图形；StructuredDataBlock 的规范载荷是已解析键值。检测框对象属于 StructuredDataBlock，即使它描述某张 ImageBlock。
      en: ImageBlock's canonical payload is decoded graphics; StructuredDataBlock's is parsed addressable values. A detection-box object is StructuredDataBlock even when it describes an ImageBlock.
      ja: ImageBlock の正規ペイロードは復号図形、StructuredDataBlock は解析済み指定可能値です。検出枠オブジェクトは画像を記述しても StructuredDataBlock です。
    source_claims:
      - claim-image-block-001
      - claim-image-block-015
parent_relation:
  id: ImageBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: ImageBlock is_a ContentBlock 表示每个图像块都是有边界的信息载荷单元，并进一步要求内嵌数据与图像媒体类型共同解码为像素或矢量图形；OCR、检测框和说明文字是相关但独立的内容块。
    en: ImageBlock is_a ContentBlock means every image block is a bounded information-payload unit further constrained to embedded data that decodes with an image media type into pixels or vector graphics. OCR, detection boxes, and captions are related but separate blocks.
    ja: ImageBlock is_a ContentBlock は、すべての画像ブロックが境界付き情報ペイロード単位で、内包データが画像 media type と共に画素・ベクトル図形へ復号されることを意味します。OCR、検出枠、説明文は関連する別ブロックです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ImageBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 块 screenshot-8 保存 Base64 PNG、mime_type="image/png"、encoding="base64"，解码得到 1360×720 像素截图。
        en: Block screenshot-8 stores Base64 PNG data with mime_type="image/png" and encoding="base64"; decoding yields a 1360×720 screenshot.
        ja: ブロック screenshot-8 は Base64 PNG、mime_type="image/png"、encoding="base64" を保持し、復号すると 1360×720 screenshot になります。
      field_values:
        block_id: screenshot-8
        modality: image
        mime_type: image/png
        encoding: base64
        data: iVBORw0KGgo...
      related_node_ids:
        - ImageBlock
        - ContentBlock
      related_relation_ids:
        - ImageBlock-is_a-ContentBlock
      source_claims:
        - claim-image-block-016
    - id: ImageBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: OCR 结果 text-8 保存字符串“智能体系统本体”。它来自 screenshot-8，但规范载荷是字符序列，因此是 TextBlock；来源图像仍保持 ImageBlock。
        en: OCR result text-8 stores the string "Agent system ontology". It comes from screenshot-8 but its canonical payload is a character sequence, so it is TextBlock while the source remains ImageBlock.
        ja: OCR 結果 text-8 は文字列を保持します。screenshot-8 由来でも正規ペイロードは文字列なので TextBlock、元画像は ImageBlock のままです。
      field_values: {}
      related_node_ids:
        - ImageBlock
        - ContentBlock
        - TextBlock
      related_relation_ids:
        - ImageBlock-is_a-ContentBlock
      source_claims:
        - claim-image-block-017
  source_claims:
    - claim-image-block-018
  distinct_fact_rationale:
    zh: 该层级依据图像载荷本身，而非文件扩展名、OCR 结果或展示用途。
    en: The hierarchy follows the image payload itself, not filename extension, OCR output, or display purpose.
    ja: この階層は画像ペイロード自体に従い、拡張子、OCR 結果、表示用途には従いません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI/Anthropic 多模态 content parts、MCP ContentBlock union 与 A2A Part oneof 逐项核验；TextBlock/CodeBlock、StructuredDataBlock/TableBlock、ImageBlock、AudioBlock 与 FileAttachmentBlock 语义成立。
    en: Verified against OpenAI/Anthropic multimodal content parts, MCP ContentBlock union, and A2A Part oneof; TextBlock/CodeBlock, StructuredDataBlock/TableBlock, ImageBlock, AudioBlock, and FileAttachmentBlock semantics hold.
    ja: OpenAI/Anthropic multimodal content part、MCP ContentBlock union、A2A Part oneof に照らし TextBlock/CodeBlock/StructuredDataBlock/TableBlock/ImageBlock/AudioBlock/FileAttachmentBlock semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-image-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines ImageContent by discriminator type="image", base64 image data, and required mimeType. Moonweave names the corresponding payload category ImageBlock and keeps captions or OCR as separate text representations.
    locator: Schema Reference > ImageContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits file bytes in raw or a file location in url and supplies mediaType for all Part kinds. Those fields support image transport but mediaType alone is not treated as an ontology hierarchy.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-003
    source: eng-proto-mcp-spec
    supports: MCP ImageContent uses the literal discriminator type=image, directly supporting the only allowed payload-form value for ImageBlock.
    locator: Schema Reference > ImageContent > type
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 gives ImageContent the discriminator type=image. Moonweave records image as the payload-form value and validates it against ImageBlock-is_a-ContentBlock.
    locator: Schema Reference > ImageContent > type
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-005
    source: eng-proto-mcp-spec
    supports: MCP ImageContent is one bounded content item. Moonweave adds block_id to keep that image item stable across transport and rendering without copying a Message identifier or a source URI into its identity.
    locator: Schema Reference > ImageContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-006
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires ImageContent.mimeType and defines it as the MIME type of the image. It constrains decoding but does not replace the ImageBlock class.
    locator: Schema Reference > ImageContent > mimeType
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-007
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires ImageContent.data to be Base64-encoded image data. Moonweave records Base64 as the wire encoding separately from the image format in mime_type.
    locator: Schema Reference > ImageContent > data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ImageContent.data as the Base64-encoded image payload. This directly supports a required data field on an inline ImageBlock.
    locator: Schema Reference > ImageContent > data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines ImageContent with type="image", base64 data, and required mimeType, matching the embedded image payload in this case.
    locator: Schema Reference > ImageContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits raw file bytes or a URL plus mediaType such as image/png; this supports alternate image carriers while Moonweave classifies the interpreted payload as ImageBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ImageContent and TextContent as separate alternatives in ContentBlock, directly supporting separate image and OCR-text payload nodes.
    locator: Schema Reference > ContentBlock
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 separates text from raw or URL file carriers under an exactly-one rule; a caption string therefore remains text even when its provenance is an image.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ImageContent requires base64-encoded image data and a MIME type; img-dashboard-012 instantiates those exact carrier fields.
    locator: Schema Reference > ImageContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 specifies raw bytes as base64 in JSON serialization and allows mediaType, supporting an equivalent embedded-image carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes unstructured ContentBlock arrays from optional structuredContent objects in ToolResultContent and CallToolResult. This directly supports a parsed, addressable structured representation distinct from text.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-016
    source: eng-proto-mcp-spec
    supports: MCP ImageContent directly specifies Base64 data and image mimeType for an item in ContentBlock; screenshot-8 mirrors those fields.
    locator: Schema Reference > ImageContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-image-block-017
    source: eng-proto-mcp-spec
    supports: MCP separates ImageContent and TextContent alternatives, supporting distinct nodes for the image and its OCR text.
    locator: Schema Reference > ContentBlock, ImageContent, and TextContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-image-block-018
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 includes ImageContent in ContentBlock and requires type=image, Base64 data, and mimeType. Moonweave abstracts that explicit union alternative as the ImageBlock hierarchy edge.
    locator: Schema Reference > ContentBlock and ImageContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

