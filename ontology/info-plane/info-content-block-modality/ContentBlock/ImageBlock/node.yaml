schema: moonweave.ai/ontology-node/v1
id: ImageBlock
kind: concept
labels:
  zh: 图像内容块
  en: image block
  ja: 画像内容ブロック
semantics:
  short_definition:
    zh: 内嵌或通过 URL 引用的图像载荷 ContentBlock 特化。
    en: ContentBlock specialization for embedded or URL-referenced image payloads.
    ja: embedded/URL referenced image payload ContentBlock 特化。
  definition:
    zh: ImageBlock 映射 OpenAI image_url（url/detail）、Anthropic type=image（base64 或 url source）；mime_type 如 image/png。
    en: ImageBlock maps OpenAI image_url (url/detail) and Anthropic type=image (base64 or url source); mime_type such as image/png.
    ja: image_url/Anthropic image block。
  why_needed:
    zh: 图像块需要 MIME 与 source URL/base64 字段单独验证。
    en: Image blocks need separate validation of MIME and source URL/base64 fields.
    ja: image MIME and source fields。
  includes:
    - zh: image_url 或 base64 bytes、mime_type、detail/detail_level。
      en: image_url or base64 bytes, mime_type, detail/detail_level.
      ja: url/base64/mime/detail。
  excludes:
    - zh: FileAttachmentBlock 外部文件句柄、纯 text 描述。
      en: FileAttachmentBlock external handles and plain text descriptions.
      ja: file handle/text description。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI {"type":"image_url","image_url":{"url":"https://example.com/chart.png","detail":"auto"}}→block-chart-7 ImageBlock。
    en: OpenAI {"type":"image_url","image_url":{"url":"https://example.com/chart.png","detail":"auto"}}→block-chart-7 ImageBlock.
    ja: OpenAI image_url mapping。
  typical_input:
    - description: OpenAI image_url
      format: '{"type":"image_url","image_url":{"url":"https://example.com/chart.png","detail":"auto"}}'
      source_claims:
        - claim-iblock-openai
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 固定为 image，表示主载荷解码为像素或矢量图形；OCR 文本和说明文字另建 TextBlock。
        en: Fixed to image when the primary payload decodes to pixels or vector graphics; OCR and captions are separate TextBlock values.
        ja: 主ペイロードが画素・ベクトル図形へ復号される image 固定値で、OCR と説明文は別の TextBlock です。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: image
      allowed_values:
        - id: modality_image
          value: image
          labels:
            zh: image
            en: image
            ja: image
          definitions:
            zh: ImageBlock 只允许 image，且数据与媒体类型必须共同解码为图像。
            en: ImageBlock permits only image, with data and media type jointly decoding to an image.
            ja: ImageBlock は image だけを許し、データと media type が共に画像へ復号されなければなりません。
          status: accepted
          source_claims:
            - claim-image-block-003
      source_claims:
        - claim-image-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-image-001
      allowed_values: []
      source_claims:
        - claim-image-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: image/png
      allowed_values: []
      source_claims:
        - claim-image-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: binary
      allowed_values: []
      source_claims:
        - claim-image-block-007
    - id: data
      labels:
        zh: 图像数据
        en: image data
        ja: 画像データ
      definitions:
        zh: 内嵌图像的 Base64 字符串；仅指向图像文件的 URI 应建模为 FileAttachmentBlock。
        en: Base64 string for an embedded image; a URI that only points to an image file is modeled as FileAttachmentBlock.
        ja: 内包画像の Base64 文字列です。画像ファイルを指すだけの URI は FileAttachmentBlock とします。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: iVBORw0KGgoAAAANSUhEUg...
      allowed_values: []
      source_claims:
        - claim-image-block-008
  constraints: []
  required_relations: []
examples:
  - id: ImageBlock-example-openai-url
    labels:
      zh: OpenAI image_url
      en: OpenAI image_url
      ja: OpenAI image_url
    descriptions:
      zh: block-chart-7 image_url=https://example.com/chart.png detail=auto mime_type=image/png。
      en: block-chart-7 image_url=https://example.com/chart.png detail=auto mime_type=image/png.
      ja: OpenAI image block。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: image_url
    field_values:
      content_block_id: block-chart-7
      mime_type: image/png
    related_node_ids:
      - ImageBlock
    related_relation_ids: []
    source_claims:
      - claim-iblock-openai
  - id: ImageBlock-example-anthropic-base64
    labels:
      zh: Anthropic base64 图像
      en: Anthropic base64 image
      ja: Anthropic base64 image
    descriptions:
      zh: Anthropic image block base64 source mime_type=image/jpeg。
      en: Anthropic image block base64 source mime_type=image/jpeg.
      ja: Anthropic image block。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: image block
    field_values: {}
    related_node_ids:
      - ImageBlock
    related_relation_ids: []
    source_claims:
      - claim-iblock-anthropic
  - id: ImageBlock-example-not-text
    labels:
      zh: 非 text part
      en: Not text part
      ja: text part ではない
    descriptions:
      zh: 图表的 alt text 描述是 TextBlock 不是 ImageBlock。
      en: Chart alt text description is TextBlock not ImageBlock.
      ja: alt text≠ImageBlock。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ImageBlock
      - TextBlock
    related_relation_ids: []
    source_claims:
      - claim-iblock-design
parent_relation:
  id: ImageBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: ImageBlock is_a ContentBlock 表示每个图像块都是有边界的信息载荷单元，并进一步要求内嵌数据与图像媒体类型共同解码为像素或矢量图形；OCR、检测框和说明文字是相关但独立的内容块。
    en: ImageBlock is_a ContentBlock means every image block is a bounded information-payload unit further constrained to embedded data that decodes with an image media type into pixels or vector graphics. OCR, detection boxes, and captions are related but separate blocks.
    ja: ImageBlock is_a ContentBlock は、すべての画像ブロックが境界付き情報ペイロード単位で、内包データが画像 media type と共に画素・ベクトル図形へ復号されることを意味します。OCR、検出枠、説明文は関連する別ブロックです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ImageBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: 块 screenshot-8 保存 Base64 PNG、mime_type="image/png"、encoding="base64"，解码得到 1360×720 像素截图。
        en: Block screenshot-8 stores Base64 PNG data with mime_type="image/png" and encoding="base64"; decoding yields a 1360×720 screenshot.
        ja: ブロック screenshot-8 は Base64 PNG、mime_type="image/png"、encoding="base64" を保持し、復号すると 1360×720 screenshot になります。
      field_values:
        block_id: screenshot-8
        modality: image
        mime_type: image/png
        encoding: base64
        data: iVBORw0KGgo...
      related_node_ids:
        - ImageBlock
        - ContentBlock
      related_relation_ids:
        - ImageBlock-is_a-ContentBlock
      source_claims:
        - claim-image-block-016
    - id: ImageBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: OCR 结果 text-8 保存字符串“智能体系统本体”。它来自 screenshot-8，但规范载荷是字符序列，因此是 TextBlock；来源图像仍保持 ImageBlock。
        en: OCR result text-8 stores the string "Agent system ontology". It comes from screenshot-8 but its canonical payload is a character sequence, so it is TextBlock while the source remains ImageBlock.
        ja: OCR 結果 text-8 は文字列を保持します。screenshot-8 由来でも正規ペイロードは文字列なので TextBlock、元画像は ImageBlock のままです。
      field_values: {}
      related_node_ids:
        - ImageBlock
        - ContentBlock
        - TextBlock
      related_relation_ids:
        - ImageBlock-is_a-ContentBlock
      source_claims:
        - claim-image-block-017
  source_claims:
    - claim-image-block-018
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-content-parts
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: Multimodal content parts.
  - id: src-anthropic-content-blocks
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Content block types including tool_use/tool_result.
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-image-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines ImageContent by discriminator type="image", base64 image data, and required mimeType. Moonweave names the corresponding payload category ImageBlock and keeps captions or OCR as separate text representations.
    locator: Schema Reference > ImageContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-image-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits file bytes in raw or a file location in url and supplies mediaType for all Part kinds. Those fields support image transport but mediaType alone is not treated as an ontology hierarchy.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-image-block-003
    source: eng-proto-mcp-spec
    supports: MCP ImageContent uses the literal discriminator type=image, directly supporting the only allowed payload-form value for ImageBlock.
    locator: Schema Reference > ImageContent > type
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 gives ImageContent the discriminator type=image. Moonweave records image as the payload-form value and validates it against ImageBlock-is_a-ContentBlock.
    locator: Schema Reference > ImageContent > type
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-005
    source: eng-proto-mcp-spec
    supports: MCP ImageContent is one bounded content item. Moonweave adds block_id to keep that image item stable across transport and rendering without copying a Message identifier or a source URI into its identity.
    locator: Schema Reference > ImageContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-image-block-006
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires ImageContent.mimeType and defines it as the MIME type of the image. It constrains decoding but does not replace the ImageBlock class.
    locator: Schema Reference > ImageContent > mimeType
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-007
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires ImageContent.data to be Base64-encoded image data. Moonweave records Base64 as the wire encoding separately from the image format in mime_type.
    locator: Schema Reference > ImageContent > data
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ImageContent.data as the Base64-encoded image payload. This directly supports a required data field on an inline ImageBlock.
    locator: Schema Reference > ImageContent > data
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines ImageContent with type="image", base64 data, and required mimeType, matching the embedded image payload in this case.
    locator: Schema Reference > ImageContent
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits raw file bytes or a URL plus mediaType such as image/png; this supports alternate image carriers while Moonweave classifies the interpreted payload as ImageBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-image-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ImageContent and TextContent as separate alternatives in ContentBlock, directly supporting separate image and OCR-text payload nodes.
    locator: Schema Reference > ContentBlock
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 separates text from raw or URL file carriers under an exactly-one rule; a caption string therefore remains text even when its provenance is an image.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-image-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ImageContent requires base64-encoded image data and a MIME type; img-dashboard-012 instantiates those exact carrier fields.
    locator: Schema Reference > ImageContent
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 specifies raw bytes as base64 in JSON serialization and allows mediaType, supporting an equivalent embedded-image carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes unstructured ContentBlock arrays from optional structuredContent objects in ToolResultContent and CallToolResult. This directly supports a parsed, addressable structured representation distinct from text.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-016
    source: eng-proto-mcp-spec
    supports: MCP ImageContent directly specifies Base64 data and image mimeType for an item in ContentBlock; screenshot-8 mirrors those fields.
    locator: Schema Reference > ImageContent
    evidence_kind: normative
    confidence: high
  - id: claim-image-block-017
    source: eng-proto-mcp-spec
    supports: MCP separates ImageContent and TextContent alternatives, supporting distinct nodes for the image and its OCR text.
    locator: Schema Reference > ContentBlock, ImageContent, and TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-image-block-018
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 includes ImageContent in ContentBlock and requires type=image, Base64 data, and mimeType. Moonweave abstracts that explicit union alternative as the ImageBlock hierarchy edge.
    locator: Schema Reference > ContentBlock and ImageContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-iblock-openai
    source: src-openai-content-parts
    supports: OpenAI image_url parts map to ImageBlock with url and detail fields.
    locator: image_url
    evidence_kind: primary-api
    confidence: high
  - id: claim-iblock-anthropic
    source: src-anthropic-content-blocks
    supports: Anthropic image blocks support base64 and url sources.
    locator: image block
    evidence_kind: primary-api
    confidence: high
  - id: claim-iblock-design
    source: src-info-content-design
    supports: ImageBlock classifies embedded or referenced image payloads.
    locator: ImageBlock
    evidence_kind: design-inference
    confidence: high
