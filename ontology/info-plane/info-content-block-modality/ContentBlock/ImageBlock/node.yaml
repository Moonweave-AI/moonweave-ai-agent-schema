  - id: ImageBlock-example-boundary-001

    labels:
      zh: 图像内容块边界例
      en: Boundary case for image block
      ja: 画像内容ブロックの境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; ImageBlock must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; ImageBlock must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - ImageBlock
      - TextBlock
