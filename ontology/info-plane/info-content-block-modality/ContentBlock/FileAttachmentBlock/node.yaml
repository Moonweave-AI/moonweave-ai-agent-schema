    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content and separately permits filename and mediaType, directly supporting the handle-based attachment instance.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
