source_claims:
  - id: claim-file-attachment-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink explicitly carries a URI to a readable resource with name and optional mimeType and size, whereas ImageContent and AudioContent embed base64 data. Moonweave maps the reference side of this boundary to FileAttachmentBlock.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content, raw as embedded file bytes, and allows filename and mediaType for all Part types. This directly grounds the reference-versus-embedded boundary.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-003
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink is a URI-addressed content alternative distinct from embedded media, directly supporting the file reference payload form.
    locator: Schema Reference > ResourceLink
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes ResourceLink from embedded TextContent, ImageContent, AudioContent, and EmbeddedResource in the ContentBlock union. Moonweave maps that reference carrier to the file payload-form value.
    locator: Schema Reference > ContentBlock and ResourceLink
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-005
    source: eng-proto-mcp-spec
    supports: An MCP ResourceLink is a distinct item included in a prompt or tool-call result. Moonweave block_id identifies that attachment item locally while its durable resource identity remains in SourceReference.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-006
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink inherits an optional mimeType describing the referenced resource. Moonweave preserves it as a validation hint and does not interpret it as proof that the referenced bytes were read or decoded.
    locator: Schema Reference > ResourceLink > mimeType
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-007
    source: eng-proto-a2a-spec
    supports: "A2A distinguishes url from raw: a url references file content while raw embeds bytes and is Base64-encoded in JSON. Consequently encoding is normally absent for a pure FileAttachmentBlock and is never used to turn an external handle into embedded content."
    locator: A2A Protocol v1.0 > 4.1.6 Part > raw and url
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires ResourceLink.uri and defines it as the URI of the resource. This directly supports the attachment handle while the storage/source module owns durable source version and provenance.
    locator: Schema Reference > ResourceLink > uri
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-009
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines filename as optional metadata for a Part. Moonweave keeps it as attachment display information and never substitutes it for the resolvable URI or source identity.
    locator: A2A Protocol v1.0 > 4.1.6 Part > filename
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-010
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink.size is the raw resource size in bytes before Base64 encoding or tokenization. Moonweave maps it to byte_length as an optional integrity hint, not as the attachment's identifier.
    locator: Schema Reference > ResourceLink > size
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink directly defines a readable resource reference with uri, name, optional mimeType, and optional raw byte size; these fields ground the file-handle case.
    locator: Schema Reference > ResourceLink
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content and allows filename and mediaType, directly supporting a reference-based file attachment carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes ResourceLink, which carries a URI reference, from ImageContent, which carries base64 image data. That explicit carrier distinction grounds the attachment-versus-embedded-image boundary.
    locator: Schema Reference > ResourceLink
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 makes raw and url mutually exclusive Part payloads. This directly supports distinguishing embedded bytes from a file-content reference independently of filename and mediaType.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink provides uri, name, optional mimeType, and optional size for a server-readable resource; file-dataset-021 instantiates the reference semantics and adds a Moonweave digest.
