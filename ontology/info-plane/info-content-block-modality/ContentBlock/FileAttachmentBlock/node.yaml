      - SourceReference
    related_relation_ids:
      - FileAttachmentBlock-references_source-SourceReference

    source_claims:
      - claim-file-attachment-block-015
      - claim-file-attachment-block-016
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ImageBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: FileAttachmentBlock 保存待读取资源的 URI 句柄；ImageBlock 保存已经内嵌并可解码的图像数据。即使 URI 指向 PNG，句柄仍是附件，读取后的图像载荷才是 ImageBlock。
      en: FileAttachmentBlock stores a URI handle to a resource to be read; ImageBlock stores image data already embedded and decodable. A URI to a PNG remains an attachment, while the image payload after reading is ImageBlock.
      ja: FileAttachmentBlock は読取対象 URI ハンドル、ImageBlock は内包済み復号可能画像データを保持します。PNG を指す URI は添付のままで、読取後画像ペイロードが ImageBlock です。
    source_claims:
      - claim-file-attachment-block-001
      - claim-file-attachment-block-017
parent_relation:
  id: FileAttachmentBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: FileAttachmentBlock is_a ContentBlock 表示每个附件块都是有边界的内容载荷单元，其专门种差是通过 URI 引用待读取文件而不内嵌已解释内容；文件名、媒体类型和字节数只是句柄元数据。
    en: FileAttachmentBlock is_a ContentBlock means every attachment block is a bounded content-payload unit specialized by a URI reference to a file to be read rather than embedded interpreted content. Filename, media type, and byte length are handle metadata.
    ja: FileAttachmentBlock is_a ContentBlock は、すべての添付ブロックが境界付き内容ペイロード単位で、解釈済み内容を内包せず読取対象ファイルを URI 参照する点で特殊化されることを意味します。ファイル名、media type、バイト長はハンドル情報です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FileAttachmentBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 附件 file-14 保存 uri="file:///workspace/runbook.pdf"、filename="runbook.pdf"、mime_type="application/pdf"、byte_length=48211，但不保存 PDF 的已解析文本或页面图像。
        en: Attachment file-14 stores uri="file:///workspace/runbook.pdf", filename="runbook.pdf", mime_type="application/pdf", and byte_length=48211, but no parsed PDF text or page image.
        ja: 添付 file-14 は uri、filename、mime_type、byte_length を保持しますが、解析済み PDF テキストやページ画像は保持しません。
      field_values:
        block_id: file-14
        modality: file
        mime_type: application/pdf
        uri: file:///workspace/runbook.pdf
        filename: runbook.pdf
        byte_length: 48211
      related_node_ids:
        - FileAttachmentBlock
        - ContentBlock
      related_relation_ids:
        - FileAttachmentBlock-is_a-ContentBlock
      source_claims:
        - claim-file-attachment-block-018
    - id: FileAttachmentBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 块 image-14 直接保存 Base64 PNG 数据与 mime_type="image/png"。即使原始文件名是 runbook-cover.png，它已经是内嵌图像载荷，因此属于 ImageBlock，不是 FileAttachmentBlock。
        en: Block image-14 directly stores Base64 PNG data with mime_type="image/png". Even if its original filename was runbook-cover.png, it is embedded image payload and therefore ImageBlock, not FileAttachmentBlock.
        ja: ブロック image-14 は Base64 PNG と mime_type="image/png" を直接保持します。元ファイル名があっても内包画像ペイロードなので ImageBlock であり FileAttachmentBlock ではありません。
      field_values: {}
      related_node_ids:
        - FileAttachmentBlock
        - ImageBlock
        - ContentBlock
      related_relation_ids:
        - FileAttachmentBlock-is_a-ContentBlock
      source_claims:
        - claim-file-attachment-block-019
  source_claims:
    - claim-file-attachment-block-020
  distinct_fact_rationale:
    zh: 该层级区分外部文件句柄与内嵌媒体载荷，不断言文件已被读取、可信或成功解析。
    en: The hierarchy separates an external file handle from embedded media and does not assert that the file was read, trusted, or parsed successfully.
    ja: この階層は外部ファイルハンドルと内包媒体を分け、読取済み、信頼済み、解析成功を主張しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: FileAttachmentBlock-references_source-SourceReference
    predicate: references_source
    direction: source-to-target
    relation_kind: information
    labels:
      zh: references source
      en: references source
      ja: references source
    definitions:
      zh: FileAttachmentBlock references_source SourceReference 连接消息或产物中的附件句柄与由来源模块维护的持久资源记录；附件保留本次传递的 URI、文件名、媒体类型和大小，SourceReference 保留版本、访问路径与出处，二者不得合并。
      en: FileAttachmentBlock references_source SourceReference links an attachment handle in a message or artifact to the durable resource record maintained by the source module. The attachment keeps transfer-time URI, filename, media type, and size; SourceReference keeps version, access path, and provenance, and the two are not merged.
      ja: FileAttachmentBlock references_source SourceReference はメッセージ・artifact 内の添付ハンドルと source module 管理の永続資源記録を結びます。添付は転送時 URI、filename、media type、size、SourceReference は version、access path、provenance を保持し、統合しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_references_source
      labels:
        zh: 反向：references source
        en: is target of references source
        ja: 逆方向：references source
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: FileAttachmentBlock-references_source-SourceReference-example-positive-001
        labels:
          zh: references source正例
          en: Positive example of references source
          ja: references sourceの正例
        scenario_id: null
        descriptions:
          zh: 附件 file-14 的 uri="file:///workspace/runbook.pdf"；来源记录 source-runbook-v3 解析到同一资源并保存版本 v3 与内容摘要。两者通过 references_source 相连，但分别保留身份。
          en: Attachment file-14 has uri="file:///workspace/runbook.pdf"; source record source-runbook-v3 resolves the same resource and stores version v3 plus its digest. references_source links them while preserving separate identities.
          ja: 添付 file-14 の URI と source record source-runbook-v3 が同一資源へ解決し、後者は version v3 と digest を保持します。references_source で結びつつ別同一性を保ちます。
        field_values: {}
        related_node_ids:
          - FileAttachmentBlock
          - SourceReference
        related_relation_ids:
          - FileAttachmentBlock-references_source-SourceReference
        source_claims:
          - claim-file-attachment-block-021
      - id: FileAttachmentBlock-references_source-SourceReference-example-boundary-001
        labels:
          zh: references source边界例
          en: Boundary case for references source
          ja: references sourceの境界例
        scenario_id: null
        descriptions:
          zh: ImageBlock screenshot-8 只有内嵌 Base64 图像数据，没有外部 URI 或资源句柄。即使系统稍后把它写入文件，也不能回填一个未发生的附件来源关系。
          en: ImageBlock screenshot-8 contains only embedded Base64 image data and no external URI or resource handle. Even if the system later writes it to a file, it cannot backfill an attachment-source relation that did not exist.
          ja: ImageBlock screenshot-8 は内包 Base64 画像だけで外部 URI・資源ハンドルがありません。後でファイルへ書いても、存在しなかった添付出典関係を遡及作成できません。
        field_values: {}
        related_node_ids:
          - FileAttachmentBlock
          - ImageBlock
          - SourceReference
        related_relation_ids:
          - FileAttachmentBlock-references_source-SourceReference
        source_claims:
          - claim-file-attachment-block-022
    source_claims:
      - claim-file-attachment-block-023
    distinct_fact_rationale:
      zh: 该边只用于外部文件句柄，不作为所有 ContentBlock 的强制来源边，也不与精确 SourceSpan 锚定重复。
      en: The edge applies only to external file handles, is not a mandatory source edge for every ContentBlock, and does not duplicate precise SourceSpan anchoring.
      ja: この辺は外部ファイルハンドルだけに使い、全 ContentBlock の必須出典辺でも精確 SourceSpan anchor の重複でもありません。
    layout_role: cross-link
    review_status: accepted
    target: concept:SourceReference
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI/Anthropic 多模态 content parts、MCP ContentBlock union 与 A2A Part oneof 逐项核验；TextBlock/CodeBlock、StructuredDataBlock/TableBlock、ImageBlock、AudioBlock 与 FileAttachmentBlock 语义成立。
    en: Verified against OpenAI/Anthropic multimodal content parts, MCP ContentBlock union, and A2A Part oneof; TextBlock/CodeBlock, StructuredDataBlock/TableBlock, ImageBlock, AudioBlock, and FileAttachmentBlock semantics hold.
    ja: OpenAI/Anthropic multimodal content part、MCP ContentBlock union、A2A Part oneof に照らし TextBlock/CodeBlock/StructuredDataBlock/TableBlock/ImageBlock/AudioBlock/FileAttachmentBlock semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-file-attachment-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink explicitly carries a URI to a readable resource with name and optional mimeType and size, whereas ImageContent and AudioContent embed base64 data. Moonweave maps the reference side of this boundary to FileAttachmentBlock.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-file-attachment-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content, raw as embedded file bytes, and allows filename and mediaType for all Part types. This directly grounds the reference-versus-embedded boundary.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
