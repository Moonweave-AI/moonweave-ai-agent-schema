  - id: claim-file-attachment-block-021
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink directly supplies the URI-addressed attachment side; Moonweave keeps durable version and digest in the separately owned SourceReference.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-022
    source: eng-proto-mcp-spec
    supports: MCP separates ImageContent with embedded data from ResourceLink with uri, so screenshot-8 lacks the ResourceLink condition required by this edge.
