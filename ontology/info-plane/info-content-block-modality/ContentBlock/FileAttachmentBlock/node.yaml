    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-file-attachment-block-020
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 includes ResourceLink in ContentBlock and defines it as a URI-addressed resource included in a prompt or tool result. Moonweave maps that alternative to FileAttachmentBlock.
    locator: Schema Reference > ContentBlock and ResourceLink
    evidence_kind: normative
    confidence: high
