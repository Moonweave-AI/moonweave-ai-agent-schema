schema: moonweave.ai/ontology-node/v1
id: FileAttachmentBlock
kind: concept
labels:
  zh: 文件附件内容块
  en: file attachment block
  ja: ファイル添付内容ブロック
semantics:
  short_definition:
    zh: 外部文件 URI 或句柄载荷 ContentBlock 特化。
    en: ContentBlock specialization for external file URI or handle payloads.
    ja: external file URI/handle payload ContentBlock 特化。
  definition:
    zh: FileAttachmentBlock 映射 A2A kind=file（name/mimeType/bytes/uri）、MCP ResourceLink、OpenAI file part URL 句柄；载荷是引用不是已内嵌解释全文。
    en: FileAttachmentBlock maps A2A kind=file (name/mimeType/bytes/uri), MCP ResourceLink, and OpenAI file part URL handles—reference payloads not fully embedded interpreted bodies.
    ja: A2A file/MCP ResourceLink/file part handle。
  why_needed:
    zh: 文件句柄与内嵌 ImageBlock/AudioBlock bytes 需要类型分离以便披露与来源追踪。
    en: File handles must be typed separately from embedded ImageBlock/AudioBlock bytes for disclosure and provenance.
    ja: handle vs embedded media。
  includes:
    - zh: file name、mimeType、uri 或 bytes 句柄、content_part_type=file。
      en: File name, mimeType, uri or bytes handle, content_part_type=file.
      ja: name/mime/uri/bytes handle。
  excludes:
    - zh: 已 fully inlined 且按 media 解码的 ImageBlock/AudioBlock、SourceReference 节点。
      en: Fully inlined media-decoded ImageBlock/AudioBlock and SourceReference nodes.
      ja: inlined media/SourceReference。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: A2A {"kind":"file","file":{"name":"invoice.pdf","mimeType":"application/pdf","uri":"..."}}→FileAttachmentBlock cross-link SourceReference。
    en: A2A {"kind":"file","file":{"name":"invoice.pdf","mimeType":"application/pdf","uri":"..."}}→FileAttachmentBlock cross-link SourceReference.
    ja: A2A file attachment mapping。
  typical_input:
    - description: A2A FilePart
      format: '{"kind":"file","file":{"name":"invoice-104.pdf","mimeType":"application/pdf","uri":"https://storage.example.com/invoices/104.pdf"}}'
      source_claims:
        - claim-fattach-a2a
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 固定为 file，表示载荷是外部文件句柄而非已经解释的文件内容。
        en: Fixed to file when the payload is an external file handle rather than interpreted file content.
        ja: 解釈済みファイル内容ではなく外部ファイルハンドルを表す file 固定値です。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file
      allowed_values:
        - id: modality_file
          value: file
          labels:
            zh: file
            en: file
            ja: file
          definitions:
            zh: FileAttachmentBlock 只允许 file，且必须存在可解析的外部资源 URI。
            en: FileAttachmentBlock permits only file and requires a resolvable external-resource URI.
            ja: FileAttachmentBlock は file だけを許し、解決可能な外部資源 URI を要します。
          status: accepted
          source_claims:
            - claim-file-attachment-block-003
      source_claims:
        - claim-file-attachment-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-file-001
      allowed_values: []
      source_claims:
        - claim-file-attachment-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: application/octet-stream
      allowed_values: []
      source_claims:
        - claim-file-attachment-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: binary
      allowed_values: []
      source_claims:
        - claim-file-attachment-block-007
    - id: uri
      labels:
        zh: 资源 URI
        en: resource URI
        ja: リソース URI
      definitions:
        zh: 可解析到待读取文件资源的 URI；它是附件句柄，不表示文件内容已经摄入。
        en: URI resolving to the file resource to be read; it is an attachment handle and does not assert that file content has been ingested.
        ja: 読取対象ファイル資源へ解決する URI です。添付ハンドルであり、内容取込み済みとは主張しません。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:///workspace/runbook.pdf
      allowed_values: []
      source_claims:
        - claim-file-attachment-block-008
    - id: filename
      labels:
        zh: 文件名
        en: filename
        ja: ファイル名
      definitions:
        zh: 用于显示和格式提示的可选文件名；不得作为持久来源身份或访问路径的替代。
        en: Optional filename for display and format hints; it does not replace durable source identity or the access URI.
        ja: 表示と形式ヒント用の任意ファイル名で、永続出典同一性やアクセス URI の代替ではありません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: runbook.pdf
      allowed_values: []
      source_claims:
        - claim-file-attachment-block-009
    - id: byte_length
      labels:
        zh: 原始字节数
        en: raw byte length
        ja: 生バイト長
      definitions:
        zh: Base64 编码或分词之前的可选原始资源字节数，用于一致性检查和容量估算。
        en: Optional number of raw resource bytes before Base64 encoding or tokenization, used for consistency checks and capacity estimates.
        ja: Base64 符号化や tokenization 前の任意の生資源バイト数で、整合性検査と容量見積りに使います。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 48211
      allowed_values: []
      source_claims:
        - claim-file-attachment-block-010
  constraints: []
  required_relations: []
examples:
  - id: FileAttachmentBlock-example-a2a-pdf
    labels:
      zh: A2A PDF 附件
      en: A2A PDF attachment
      ja: A2A PDF 添付
    descriptions:
      zh: invoice-104.pdf application/pdf uri→FileAttachmentBlock。
      en: invoice-104.pdf application/pdf uri→FileAttachmentBlock.
      ja: A2A file block。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: file Part
    field_values:
      file_name: invoice-104.pdf
      mime_type: application/pdf
    related_node_ids:
      - FileAttachmentBlock
      - info-storage-sources
    related_relation_ids: []
    source_claims:
      - claim-fattach-a2a
  - id: FileAttachmentBlock-example-mcp-link
    labels:
      zh: MCP ResourceLink
      en: MCP ResourceLink
      ja: MCP ResourceLink
    descriptions:
      zh: MCP ResourceLink uri+mimeType→FileAttachmentBlock content_part_type=file。
      en: MCP ResourceLink uri+mimeType→FileAttachmentBlock content_part_type=file.
      ja: MCP resource link。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: ResourceLink
    field_values: {}
    related_node_ids:
      - FileAttachmentBlock
    related_relation_ids: []
    source_claims:
      - claim-fattach-design
  - id: FileAttachmentBlock-example-not-inlined-image
    labels:
      zh: 非内嵌图像
      en: Not inlined image
      ja: inlined image ではない
    descriptions:
      zh: base64 内嵌 PNG 解码像素是 ImageBlock 不是 FileAttachmentBlock。
      en: Base64 inlined PNG decoded as pixels is ImageBlock not FileAttachmentBlock.
      ja: inlined PNG→ImageBlock。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: boundary
    field_values: {}
    related_node_ids:
      - FileAttachmentBlock
      - ImageBlock
    related_relation_ids: []
    source_claims:
      - claim-fattach-design
parent_relation:
  id: FileAttachmentBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: FileAttachmentBlock is_a ContentBlock 表示每个附件块都是有边界的内容载荷单元，其专门种差是通过 URI 引用待读取文件而不内嵌已解释内容；文件名、媒体类型和字节数只是句柄元数据。
    en: FileAttachmentBlock is_a ContentBlock means every attachment block is a bounded content-payload unit specialized by a URI reference to a file to be read rather than embedded interpreted content. Filename, media type, and byte length are handle metadata.
    ja: FileAttachmentBlock is_a ContentBlock は、すべての添付ブロックが境界付き内容ペイロード単位で、解釈済み内容を内包せず読取対象ファイルを URI 参照する点で特殊化されることを意味します。ファイル名、media type、バイト長はハンドル情報です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FileAttachmentBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: 附件 file-14 保存 uri="file:///workspace/runbook.pdf"、filename="runbook.pdf"、mime_type="application/pdf"、byte_length=48211，但不保存 PDF 的已解析文本或页面图像。
        en: Attachment file-14 stores uri="file:///workspace/runbook.pdf", filename="runbook.pdf", mime_type="application/pdf", and byte_length=48211, but no parsed PDF text or page image.
        ja: 添付 file-14 は uri、filename、mime_type、byte_length を保持しますが、解析済み PDF テキストやページ画像は保持しません。
      field_values:
        block_id: file-14
        modality: file
        mime_type: application/pdf
        uri: file:///workspace/runbook.pdf
        filename: runbook.pdf
        byte_length: 48211
      related_node_ids:
        - FileAttachmentBlock
        - ContentBlock
      related_relation_ids:
        - FileAttachmentBlock-is_a-ContentBlock
      source_claims:
        - claim-file-attachment-block-018
    - id: FileAttachmentBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 块 image-14 直接保存 Base64 PNG 数据与 mime_type="image/png"。即使原始文件名是 runbook-cover.png，它已经是内嵌图像载荷，因此属于 ImageBlock，不是 FileAttachmentBlock。
        en: Block image-14 directly stores Base64 PNG data with mime_type="image/png". Even if its original filename was runbook-cover.png, it is embedded image payload and therefore ImageBlock, not FileAttachmentBlock.
        ja: ブロック image-14 は Base64 PNG と mime_type="image/png" を直接保持します。元ファイル名があっても内包画像ペイロードなので ImageBlock であり FileAttachmentBlock ではありません。
      field_values: {}
      related_node_ids:
        - FileAttachmentBlock
        - ImageBlock
        - ContentBlock
      related_relation_ids:
        - FileAttachmentBlock-is_a-ContentBlock
      source_claims:
        - claim-file-attachment-block-019
  source_claims:
    - claim-file-attachment-block-020
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: FileAttachmentBlock-references_source-SourceReference
    predicate: references_source
    direction: source-to-target
    relation_kind: information
    labels:
      zh: references source
      en: references source
      ja: references source
    definitions:
      zh: FileAttachmentBlock references_source SourceReference 连接消息或产物中的附件句柄与由来源模块维护的持久资源记录；附件保留本次传递的 URI、文件名、媒体类型和大小，SourceReference 保留版本、访问路径与出处，二者不得合并。
      en: FileAttachmentBlock references_source SourceReference links an attachment handle in a message or artifact to the durable resource record maintained by the source module. The attachment keeps transfer-time URI, filename, media type, and size; SourceReference keeps version, access path, and provenance, and the two are not merged.
      ja: FileAttachmentBlock references_source SourceReference はメッセージ・artifact 内の添付ハンドルと source module 管理の永続資源記録を結びます。添付は転送時 URI、filename、media type、size、SourceReference は version、access path、provenance を保持し、統合しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_references_source
      labels:
        zh: 反向：references source
        en: is target of references source
        ja: 逆方向：references source
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: FileAttachmentBlock-references_source-SourceReference-example-positive-001
        labels:
          zh: references source正例
          en: Positive example of references source
          ja: references sourceの正例
        descriptions:
          zh: 附件 file-14 的 uri="file:///workspace/runbook.pdf"；来源记录 source-runbook-v3 解析到同一资源并保存版本 v3 与内容摘要。两者通过 references_source 相连，但分别保留身份。
          en: Attachment file-14 has uri="file:///workspace/runbook.pdf"; source record source-runbook-v3 resolves the same resource and stores version v3 plus its digest. references_source links them while preserving separate identities.
          ja: 添付 file-14 の URI と source record source-runbook-v3 が同一資源へ解決し、後者は version v3 と digest を保持します。references_source で結びつつ別同一性を保ちます。
        field_values: {}
        related_node_ids:
          - FileAttachmentBlock
          - SourceReference
        related_relation_ids:
          - FileAttachmentBlock-references_source-SourceReference
        source_claims:
          - claim-file-attachment-block-021
      - id: FileAttachmentBlock-references_source-SourceReference-example-boundary-001
        labels:
          zh: references source边界例
          en: Boundary case for references source
          ja: references sourceの境界例
        descriptions:
          zh: ImageBlock screenshot-8 只有内嵌 Base64 图像数据，没有外部 URI 或资源句柄。即使系统稍后把它写入文件，也不能回填一个未发生的附件来源关系。
          en: ImageBlock screenshot-8 contains only embedded Base64 image data and no external URI or resource handle. Even if the system later writes it to a file, it cannot backfill an attachment-source relation that did not exist.
          ja: ImageBlock screenshot-8 は内包 Base64 画像だけで外部 URI・資源ハンドルがありません。後でファイルへ書いても、存在しなかった添付出典関係を遡及作成できません。
        field_values: {}
        related_node_ids:
          - FileAttachmentBlock
          - ImageBlock
          - SourceReference
        related_relation_ids:
          - FileAttachmentBlock-references_source-SourceReference
        source_claims:
          - claim-file-attachment-block-022
    source_claims:
      - claim-file-attachment-block-023
    layout_role: cross-link
    target: concept:SourceReference
sources:
  - id: src-a2a-parts
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Part kinds text/file/data.
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-file-attachment-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink explicitly carries a URI to a readable resource with name and optional mimeType and size, whereas ImageContent and AudioContent embed base64 data. Moonweave maps the reference side of this boundary to FileAttachmentBlock.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-attachment-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content, raw as embedded file bytes, and allows filename and mediaType for all Part types. This directly grounds the reference-versus-embedded boundary.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-003
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink is a URI-addressed content alternative distinct from embedded media, directly supporting the file reference payload form.
    locator: Schema Reference > ResourceLink
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes ResourceLink from embedded TextContent, ImageContent, AudioContent, and EmbeddedResource in the ContentBlock union. Moonweave maps that reference carrier to the file payload-form value.
    locator: Schema Reference > ContentBlock and ResourceLink
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-005
    source: eng-proto-mcp-spec
    supports: An MCP ResourceLink is a distinct item included in a prompt or tool-call result. Moonweave block_id identifies that attachment item locally while its durable resource identity remains in SourceReference.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-attachment-block-006
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink inherits an optional mimeType describing the referenced resource. Moonweave preserves it as a validation hint and does not interpret it as proof that the referenced bytes were read or decoded.
    locator: Schema Reference > ResourceLink > mimeType
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-007
    source: eng-proto-a2a-spec
    supports: "A2A distinguishes url from raw: a url references file content while raw embeds bytes and is Base64-encoded in JSON. Consequently encoding is normally absent for a pure FileAttachmentBlock and is never used to turn an external handle into embedded content."
    locator: A2A Protocol v1.0 > 4.1.6 Part > raw and url
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-attachment-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires ResourceLink.uri and defines it as the URI of the resource. This directly supports the attachment handle while the storage/source module owns durable source version and provenance.
    locator: Schema Reference > ResourceLink > uri
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-009
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines filename as optional metadata for a Part. Moonweave keeps it as attachment display information and never substitutes it for the resolvable URI or source identity.
    locator: A2A Protocol v1.0 > 4.1.6 Part > filename
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-010
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink.size is the raw resource size in bytes before Base64 encoding or tokenization. Moonweave maps it to byte_length as an optional integrity hint, not as the attachment's identifier.
    locator: Schema Reference > ResourceLink > size
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink directly defines a readable resource reference with uri, name, optional mimeType, and optional raw byte size; these fields ground the file-handle case.
    locator: Schema Reference > ResourceLink
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content and allows filename and mediaType, directly supporting a reference-based file attachment carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes ResourceLink, which carries a URI reference, from ImageContent, which carries base64 image data. That explicit carrier distinction grounds the attachment-versus-embedded-image boundary.
    locator: Schema Reference > ResourceLink
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 makes raw and url mutually exclusive Part payloads. This directly supports distinguishing embedded bytes from a file-content reference independently of filename and mediaType.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink provides uri, name, optional mimeType, and optional size for a server-readable resource; file-dataset-021 instantiates the reference semantics and adds a Moonweave digest.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-attachment-block-016
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines url as a pointer to file content and separately permits filename and mediaType, directly supporting the handle-based attachment instance.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-file-attachment-block-017
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines ImageContent by discriminator type="image", base64 image data, and required mimeType. Moonweave names the corresponding payload category ImageBlock and keeps captions or OCR as separate text representations.
    locator: Schema Reference > ImageContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-attachment-block-018
    source: eng-proto-mcp-spec
