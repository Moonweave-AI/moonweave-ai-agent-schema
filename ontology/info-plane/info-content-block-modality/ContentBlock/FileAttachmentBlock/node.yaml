schema: moonweave.ai/ontology-node/v1
id: FileAttachmentBlock
kind: concept
status: review
labels:
  zh: 文件附件内容块
  en: file attachment block
  ja: ファイル添付内容ブロック
semantics:
  short_definition:
    zh: 文件附件内容块是以文件引用或句柄为主载荷的内容块。
    en: A file-attachment block is a content block whose primary payload is a file reference or handle.
    ja: ファイル添付内容ブロックは、ファイル参照またはハンドルを主ペイロードとする内容ブロックです。
  definition:
    zh: 文件附件内容块是一种内容块，其种差是载荷以文件引用或句柄标识待读取的文件资源，必要时附带文件名、媒体类型、字节数和摘要，而不是把文件的已解释内容内嵌为该块。它可以指向任意文件类型；文件被读取和解码后产生的文本、图像、音频或结构化数据使用各自的内容块类型。
    en: A file-attachment block is a content block differentiated by a file reference or handle that identifies a file resource to be read, optionally with filename, media type, byte size, and digest, rather than by embedding the file's interpreted content in this block. It may point to any file type; text, image, audio, or structured data produced after reading and decoding the file uses the corresponding content-block type.
    ja: ファイル添付内容ブロックは、ファイルの解釈済み内容を内包するのではなく、読取対象のファイル資源を示すファイル参照またはハンドルを持ち、任意でファイル名、メディア型、バイト数、ダイジェストを伴う点で区別される内容ブロックです。任意のファイル型を指せますが、読取・復号後に得るテキスト、画像、音声、構造化データは対応する内容ブロック型を使用します。
  why_needed:
    zh: 该节点把“传递一个可读取的文件句柄”与“已经传递文件内的内容”分开，使访问控制、延迟读取、完整性校验和大小预算可以在解码前完成，并避免与 ImageBlock、AudioBlock 等载荷类型重叠。
    en: This node separates passing a readable file handle from passing the file's interpreted content, allowing access control, deferred reading, integrity checking, and size budgeting before decoding without overlapping ImageBlock or AudioBlock.
    ja: このノードは、読取可能なファイルハンドルの受渡しと、ファイル内の解釈済み内容の受渡しを分離し、復号前のアクセス制御、遅延読取、完全性確認、サイズ予算化を可能にし、ImageBlock や AudioBlock との重複を防ぎます。
  includes:
    - zh: 纳入 URI、资源句柄、上传文件 ID 或受控访问令牌所指向的完整文件或文件范围，并可携带文件名、媒体类型、大小和内容摘要。
      en: Includes complete files or file ranges addressed by a URI, resource handle, upload ID, or controlled access token, optionally carrying filename, media type, size, and content digest.
      ja: URI、資源ハンドル、アップロード ID、制御されたアクセストークンで指定するファイル全体または範囲を含み、任意でファイル名、メディア型、サイズ、内容ダイジェストを持ちます。
  excludes:
    - zh: 排除已内嵌并按具体载荷解释的文本、图像、音频或结构化数据，也排除仅描述文件持久身份和版本的 SourceReference。内嵌图像数据属于 ImageBlock；指向同一图像文件的句柄才属于 FileAttachmentBlock。
      en: Excludes embedded text, image, audio, or structured data already interpreted as a concrete payload and excludes SourceReference records that only describe durable source identity and version. Embedded image data is ImageBlock; a handle to that image file is FileAttachmentBlock.
      ja: 具体的ペイロードとして解釈済みで内嵌されたテキスト、画像、音声、構造化データ、および永続的な出典同一性と版だけを記述する SourceReference を除外します。内嵌画像データは ImageBlock、同じ画像ファイルへのハンドルは FileAttachmentBlock です。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 file，表示载荷是外部文件句柄而非已经解释的文件内容。
        en: Fixed to file when the payload is an external file handle rather than interpreted file content.
        ja: 解釈済みファイル内容ではなく外部ファイルハンドルを表す file 固定値です。
      allowed_values:
        - id: modality_file
          value: file
          labels:
            zh: file
            en: file
            ja: file
          definitions:
            zh: FileAttachmentBlock 只允许 file，且必须存在可解析的外部资源 URI。
            en: FileAttachmentBlock permits only file and requires a resolvable external-resource URI.
            ja: FileAttachmentBlock は file だけを許し、解決可能な外部資源 URI を要します。
          status: accepted
          source_claims:
            - claim-file-attachment-block-003
      pattern: null
      example_value: file
      source_claims:
        - claim-file-attachment-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-file-001
      source_claims:
        - claim-file-attachment-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: application/octet-stream
      source_claims:
        - claim-file-attachment-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: binary
      source_claims:
        - claim-file-attachment-block-007
    - id: uri
      labels:
        zh: 资源 URI
        en: resource URI
        ja: リソース URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 可解析到待读取文件资源的 URI；它是附件句柄，不表示文件内容已经摄入。
        en: URI resolving to the file resource to be read; it is an attachment handle and does not assert that file content has been ingested.
        ja: 読取対象ファイル資源へ解決する URI です。添付ハンドルであり、内容取込み済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value: file:///workspace/runbook.pdf
      source_claims:
        - claim-file-attachment-block-008
    - id: filename
      labels:
        zh: 文件名
        en: filename
        ja: ファイル名
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 用于显示和格式提示的可选文件名；不得作为持久来源身份或访问路径的替代。
        en: Optional filename for display and format hints; it does not replace durable source identity or the access URI.
        ja: 表示と形式ヒント用の任意ファイル名で、永続出典同一性やアクセス URI の代替ではありません。
      allowed_values: []
      pattern: null
      example_value: runbook.pdf
      source_claims:
        - claim-file-attachment-block-009
    - id: byte_length
      labels:
        zh: 原始字节数
        en: raw byte length
        ja: 生バイト長
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: Base64 编码或分词之前的可选原始资源字节数，用于一致性检查和容量估算。
        en: Optional number of raw resource bytes before Base64 encoding or tokenization, used for consistency checks and capacity estimates.
        ja: Base64 符号化や tokenization 前の任意の生資源バイト数で、整合性検査と容量見積りに使います。
      allowed_values: []
      pattern: null
      example_value: 48211
      source_claims:
        - claim-file-attachment-block-010
  constraints: []
  required_relation_constraints: []
examples:
  - id: FileAttachmentBlock-example-positive-001
    kind: positive
    labels:
      zh: 文件附件内容块正例
      en: Positive example of file attachment block
      ja: ファイル添付内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: MCP ResourceLink file-runbook-014 设置 uri="file:///workspace/runbook.pdf"、name="runbook.pdf"、mimeType="application/pdf"、size=48211。该块保存待读取文件的引用或句柄，而不内嵌 PDF 的已解释内容，因此归入 FileAttachmentBlock，并由 FileAttachmentBlock-references_source-SourceReference 指向持久来源记录。
      en: MCP ResourceLink file-runbook-014 sets uri="file:///workspace/runbook.pdf", name="runbook.pdf", mimeType="application/pdf", and size=48211. The block stores a reference or handle to a file to be read rather than embedding interpreted PDF content, so it is FileAttachmentBlock and points to its durable source record through FileAttachmentBlock-references_source-SourceReference.
      ja: MCP ResourceLink file-runbook-014 は uri="file:///workspace/runbook.pdf"、name="runbook.pdf"、mimeType="application/pdf"、size=48211 を設定します。解釈済み PDF 内容を内包せず読取対象ファイルの参照またはハンドルを保持するため FileAttachmentBlock となり、FileAttachmentBlock-references_source-SourceReference で永続出典記録を指します。
    field_values:
      block_id: file-runbook-014
      modality: file
      mime_type: application/pdf
      uri: file:///workspace/runbook.pdf
      filename: runbook.pdf
      byte_length: 48211
    related_node_ids:
      - FileAttachmentBlock
      - SourceReference
      - ContentBlock
    related_relation_ids:
      - FileAttachmentBlock-references_source-SourceReference
    expected_result:
      zh: 分类器返回 FileAttachmentBlock，并保留可解析 URI、文件名、字节数和来源引用；不得预先猜测 PDF 内部文本或图像类型。
      en: The classifier returns FileAttachmentBlock and preserves the resolvable URI, filename, byte size, and source reference; it must not pre-infer text or image types inside the PDF.
      ja: 分類器は FileAttachmentBlock を返し、解決可能 URI、ファイル名、バイト数、出典参照を保持します。PDF 内部のテキスト型や画像型を先に推測しません。
    why_valid_or_invalid:
      zh: 规范载荷是外部文件的可解析句柄，文件内容尚未读取或解码；mimeType 说明预期格式但不替代句柄种差。
      en: The canonical payload is a resolvable handle to an external file whose content has not yet been read or decoded; mimeType describes an expected format but does not replace the handle differentia.
      ja: 正規ペイロードは未読取・未復号の外部ファイルへの解決可能ハンドルです。mimeType は期待形式を示しますが、ハンドルという種差を置き換えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-attachment-block-011
      - claim-file-attachment-block-012
  - id: FileAttachmentBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 文件附件内容块边界例
      en: Boundary case for file attachment block
      ja: ファイル添付内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: MCP ImageContent img-inline-015 设置 type="image"、data=<base64 PNG>、mimeType="image/png"。即使调用方另给 filename="chart.png"，载荷仍是已内嵌并可直接解码的图像，故归入 ImageBlock；只有保存 URI、资源句柄或上传 ID 而未内嵌解释内容时才是 FileAttachmentBlock。
      en: MCP ImageContent img-inline-015 sets type="image", data=<base64 PNG>, and mimeType="image/png". Even if a caller also supplies filename="chart.png", the payload is embedded and directly decodable image data, so it is ImageBlock. FileAttachmentBlock applies only when a URI, resource handle, or upload ID is stored without embedded interpreted content.
      ja: MCP ImageContent img-inline-015 は type="image"、data=<base64 PNG>、mimeType="image/png" を設定します。呼出側が filename="chart.png" も付けても、ペイロードは内包され直接復号可能な画像なので ImageBlock です。URI、資源ハンドル、upload ID を保持し解釈済み内容を内包しない場合だけ FileAttachmentBlock です。
    field_values: {}
    related_node_ids:
      - FileAttachmentBlock
      - ImageBlock
      - SourceReference
    related_relation_ids:
      - FileAttachmentBlock-references_source-SourceReference
    expected_result:
      zh: img-inline-015 归为 ImageBlock；验证器不得因 filename 或 image/png 把内嵌载荷重分为 FileAttachmentBlock。
      en: img-inline-015 is ImageBlock; filename or image/png must not reclassify an embedded payload as FileAttachmentBlock.
      ja: img-inline-015 は ImageBlock です。filename や image/png により内包ペイロードを FileAttachmentBlock へ再分類しません。
    why_valid_or_invalid:
      zh: 两类的决定性差异是“引用待读取资源”与“内嵌已解释载荷”，而不是文件扩展名或 MIME 字符串。
      en: The decisive boundary is reference to a resource to be read versus an embedded interpreted payload, not a filename extension or MIME string.
      ja: 決定的境界は「読取対象資源への参照」と「内包された解釈済みペイロード」であり、拡張子や MIME 文字列ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-attachment-block-013
      - claim-file-attachment-block-014
  - id: FileAttachmentBlock-example-instance-001
    kind: instance
    labels:
      zh: 文件附件内容块结构化实例
      en: Structured instance of file attachment block
      ja: ファイル添付内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 file-dataset-021 保存受控句柄 upload://tenant-a/7f2c、文件名 metrics.parquet、媒体类型 application/vnd.apache.parquet 和原始字节数 183420，但不保存 Parquet 行列；版本、摘要与出处留在所引用的 SourceReference。
      en: Inline instance file-dataset-021 stores the controlled handle upload://tenant-a/7f2c, filename metrics.parquet, media type application/vnd.apache.parquet, and raw byte length 183420, but no Parquet rows or columns; version, digest, and provenance remain on the referenced SourceReference.
      ja: ノード内 instance file-dataset-021 は upload://tenant-a/7f2c、metrics.parquet、application/vnd.apache.parquet、生バイト長 183420 を保持しますが Parquet 行列は保持せず、version、digest、provenance は参照 SourceReference に留めます。
    field_values:
      block_id: file-dataset-021
      modality: file
      mime_type: application/vnd.apache.parquet
      uri: upload://tenant-a/7f2c
      filename: metrics.parquet
      byte_length: 183420
    related_node_ids:
      - FileAttachmentBlock
      - SourceReference
    related_relation_ids:
      - FileAttachmentBlock-references_source-SourceReference
    expected_result:
      zh: 实例归为 FileAttachmentBlock，句柄可解析且摘要可核验；读取前不得同时标注 TableBlock。
      en: The instance is FileAttachmentBlock with a resolvable handle and verifiable digest; it is not also labeled TableBlock before reading.
      ja: インスタンスは FileAttachmentBlock で、ハンドルを解決できダイジェストを検証できます。読取前に TableBlock も付与しません。
    why_valid_or_invalid:
      zh: 当前节点承载文件身份与访问句柄，不承载解码后的具体内容；文件格式只提示后续解释器。
      en: The current node carries file identity and an access handle, not decoded concrete content; file format only guides a later interpreter.
      ja: 現在のノードはファイル同一性とアクセスハンドルを担い、復号済み具体内容は担いません。ファイル形式は後続解釈器への手掛かりです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-file-attachment-block-015
      - claim-file-attachment-block-016
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ImageBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: FileAttachmentBlock 保存待读取资源的 URI 句柄；ImageBlock 保存已经内嵌并可解码的图像数据。即使 URI 指向 PNG，句柄仍是附件，读取后的图像载荷才是 ImageBlock。
      en: FileAttachmentBlock stores a URI handle to a resource to be read; ImageBlock stores image data already embedded and decodable. A URI to a PNG remains an attachment, while the image payload after reading is ImageBlock.
      ja: FileAttachmentBlock は読取対象 URI ハンドル、ImageBlock は内包済み復号可能画像データを保持します。PNG を指す URI は添付のままで、読取後画像ペイロードが ImageBlock です。
    source_claims:
      - claim-file-attachment-block-001
      - claim-file-attachment-block-017
parent_relation:
  id: FileAttachmentBlock-is_a-ContentBlock
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: FileAttachmentBlock is_a ContentBlock 表示每个附件块都是有边界的内容载荷单元，其专门种差是通过 URI 引用待读取文件而不内嵌已解释内容；文件名、媒体类型和字节数只是句柄元数据。
    en: FileAttachmentBlock is_a ContentBlock means every attachment block is a bounded content-payload unit specialized by a URI reference to a file to be read rather than embedded interpreted content. Filename, media type, and byte length are handle metadata.
    ja: FileAttachmentBlock is_a ContentBlock は、すべての添付ブロックが境界付き内容ペイロード単位で、解釈済み内容を内包せず読取対象ファイルを URI 参照する点で特殊化されることを意味します。ファイル名、media type、バイト長はハンドル情報です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FileAttachmentBlock-is_a-ContentBlock-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 附件 file-14 保存 uri="file:///workspace/runbook.pdf"、filename="runbook.pdf"、mime_type="application/pdf"、byte_length=48211，但不保存 PDF 的已解析文本或页面图像。
        en: Attachment file-14 stores uri="file:///workspace/runbook.pdf", filename="runbook.pdf", mime_type="application/pdf", and byte_length=48211, but no parsed PDF text or page image.
        ja: 添付 file-14 は uri、filename、mime_type、byte_length を保持しますが、解析済み PDF テキストやページ画像は保持しません。
      field_values:
        block_id: file-14
        modality: file
        mime_type: application/pdf
        uri: file:///workspace/runbook.pdf
        filename: runbook.pdf
        byte_length: 48211
      related_node_ids:
        - FileAttachmentBlock
        - ContentBlock
      related_relation_ids:
        - FileAttachmentBlock-is_a-ContentBlock
      expected_result:
        zh: 分类为 FileAttachmentBlock，并由父边得到 ContentBlock；读取文件后产生的文本或图像另建相应内容块。
        en: Classify as FileAttachmentBlock and obtain ContentBlock through the parent edge; text or images produced after reading become separate blocks.
        ja: FileAttachmentBlock に分類し親辺で ContentBlock を得ます。読取後のテキスト・画像は別ブロックにします。
      why_valid_or_invalid:
        zh: 对象身份由可解析 URI 和文件句柄元数据构成，未声称已持有解释后的媒体载荷。
        en: The object's identity is a resolvable URI plus file-handle metadata and does not claim to hold interpreted media payload.
        ja: 対象同一性は解決可能 URI とファイルハンドル情報から成り、解釈済み媒体ペイロード保持を主張しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-file-attachment-block-018
    - id: FileAttachmentBlock-is_a-ContentBlock-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 块 image-14 直接保存 Base64 PNG 数据与 mime_type="image/png"。即使原始文件名是 runbook-cover.png，它已经是内嵌图像载荷，因此属于 ImageBlock，不是 FileAttachmentBlock。
        en: Block image-14 directly stores Base64 PNG data with mime_type="image/png". Even if its original filename was runbook-cover.png, it is embedded image payload and therefore ImageBlock, not FileAttachmentBlock.
        ja: ブロック image-14 は Base64 PNG と mime_type="image/png" を直接保持します。元ファイル名があっても内包画像ペイロードなので ImageBlock であり FileAttachmentBlock ではありません。
      field_values: {}
      related_node_ids:
        - FileAttachmentBlock
        - ImageBlock
        - ContentBlock
      related_relation_ids:
        - FileAttachmentBlock-is_a-ContentBlock
      expected_result:
        zh: 返回 ImageBlock；不得因为存在文件名或媒体类型而把内嵌数据降级为附件句柄。
        en: Return ImageBlock; filename or media type must not demote embedded data to an attachment handle.
        ja: ImageBlock を返し、ファイル名・media type により内包データを添付ハンドルへ降格しません。
