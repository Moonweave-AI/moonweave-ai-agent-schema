schema: moonweave.ai/ontology-node/v1
id: FileAttachmentBlock
kind: concept
status: accepted
labels:
  zh: 文件附件内容块
  en: file attachment block
  ja: ファイル添付内容ブロック
semantics:
  short_definition:
    zh: 文件附件内容块是以文件引用或句柄为主载荷的内容块。
    en: A file-attachment block is a content block whose primary payload is a file reference or handle.
    ja: ファイル添付内容ブロックは、ファイル参照またはハンドルを主ペイロードとする内容ブロックです。
  definition:
    zh: 文件附件内容块是一种内容块，其种差是载荷以文件引用或句柄标识待读取的文件资源，必要时附带文件名、媒体类型、字节数和摘要，而不是把文件的已解释内容内嵌为该块。它可以指向任意文件类型；文件被读取和解码后产生的文本、图像、音频或结构化数据使用各自的内容块类型。
    en: A file-attachment block is a content block differentiated by a file reference or handle that identifies a file resource to be read, optionally with filename, media type, byte size, and digest, rather than by embedding the file's interpreted content in this block. It may point to any file type; text, image, audio, or structured data produced after reading and decoding the file uses the corresponding content-block type.
    ja: ファイル添付内容ブロックは、ファイルの解釈済み内容を内包するのではなく、読取対象のファイル資源を示すファイル参照またはハンドルを持ち、任意でファイル名、メディア型、バイト数、ダイジェストを伴う点で区別される内容ブロックです。任意のファイル型を指せますが、読取・復号後に得るテキスト、画像、音声、構造化データは対応する内容ブロック型を使用します。
  why_needed:
    zh: 该节点把“传递一个可读取的文件句柄”与“已经传递文件内的内容”分开，使访问控制、延迟读取、完整性校验和大小预算可以在解码前完成，并避免与 ImageBlock、AudioBlock 等载荷类型重叠。
    en: This node separates passing a readable file handle from passing the file's interpreted content, allowing access control, deferred reading, integrity checking, and size budgeting before decoding without overlapping ImageBlock or AudioBlock.
    ja: このノードは、読取可能なファイルハンドルの受渡しと、ファイル内の解釈済み内容の受渡しを分離し、復号前のアクセス制御、遅延読取、完全性確認、サイズ予算化を可能にし、ImageBlock や AudioBlock との重複を防ぎます。
  includes:
    - zh: 纳入 URI、资源句柄、上传文件 ID 或受控访问令牌所指向的完整文件或文件范围，并可携带文件名、媒体类型、大小和内容摘要。
      en: Includes complete files or file ranges addressed by a URI, resource handle, upload ID, or controlled access token, optionally carrying filename, media type, size, and content digest.
      ja: URI、資源ハンドル、アップロード ID、制御されたアクセストークンで指定するファイル全体または範囲を含み、任意でファイル名、メディア型、サイズ、内容ダイジェストを持ちます。
  excludes:
    - zh: 排除已内嵌并按具体载荷解释的文本、图像、音频或结构化数据，也排除仅描述文件持久身份和版本的 SourceReference。内嵌图像数据属于 ImageBlock；指向同一图像文件的句柄才属于 FileAttachmentBlock。
      en: Excludes embedded text, image, audio, or structured data already interpreted as a concrete payload and excludes SourceReference records that only describe durable source identity and version. Embedded image data is ImageBlock; a handle to that image file is FileAttachmentBlock.
      ja: 具体的ペイロードとして解釈済みで内嵌されたテキスト、画像、音声、構造化データ、および永続的な出典同一性と版だけを記述する SourceReference を除外します。内嵌画像データは ImageBlock、同じ画像ファイルへのハンドルは FileAttachmentBlock です。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 file，表示载荷是外部文件句柄而非已经解释的文件内容。
        en: Fixed to file when the payload is an external file handle rather than interpreted file content.
        ja: 解釈済みファイル内容ではなく外部ファイルハンドルを表す file 固定値です。
      allowed_values:
        - id: modality_file
          value: file
          labels:
            zh: file
            en: file
            ja: file
          definitions:
            zh: FileAttachmentBlock 只允许 file，且必须存在可解析的外部资源 URI。
            en: FileAttachmentBlock permits only file and requires a resolvable external-resource URI.
            ja: FileAttachmentBlock は file だけを許し、解決可能な外部資源 URI を要します。
          status: accepted
          source_claims:
            - claim-file-attachment-block-003
      pattern: null
      example_value: file
      source_claims:
        - claim-file-attachment-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-file-001
      source_claims:
        - claim-file-attachment-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: application/octet-stream
      source_claims:
        - claim-file-attachment-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: binary
      source_claims:
        - claim-file-attachment-block-007
    - id: uri
      labels:
        zh: 资源 URI
        en: resource URI
        ja: リソース URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 可解析到待读取文件资源的 URI；它是附件句柄，不表示文件内容已经摄入。
        en: URI resolving to the file resource to be read; it is an attachment handle and does not assert that file content has been ingested.
        ja: 読取対象ファイル資源へ解決する URI です。添付ハンドルであり、内容取込み済みとは主張しません。
      allowed_values: []
      pattern: null
      example_value: file:///workspace/runbook.pdf
      source_claims:
        - claim-file-attachment-block-008
    - id: filename
      labels:
        zh: 文件名
        en: filename
        ja: ファイル名
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 用于显示和格式提示的可选文件名；不得作为持久来源身份或访问路径的替代。
        en: Optional filename for display and format hints; it does not replace durable source identity or the access URI.
        ja: 表示と形式ヒント用の任意ファイル名で、永続出典同一性やアクセス URI の代替ではありません。
      allowed_values: []
      pattern: null
      example_value: runbook.pdf
      source_claims:
        - claim-file-attachment-block-009
    - id: byte_length
      labels:
        zh: 原始字节数
        en: raw byte length
        ja: 生バイト長
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: Base64 编码或分词之前的可选原始资源字节数，用于一致性检查和容量估算。
        en: Optional number of raw resource bytes before Base64 encoding or tokenization, used for consistency checks and capacity estimates.
        ja: Base64 符号化や tokenization 前の任意の生資源バイト数で、整合性検査と容量見積りに使います。
      allowed_values: []
      pattern: null
      example_value: 48211
      source_claims:
        - claim-file-attachment-block-010
  constraints: []
  required_relation_constraints: []
