parent_relation: null
relations:
  - id: ContentBlock-located_at_source_span-SourceSpan
    predicate: located_at_source_span
    direction: source-to-target
    relation_kind: information
    labels:
      zh: located at source span
      en: located at source span
      ja: located at source span
    definitions:
      zh: ContentBlock located_at_source_span SourceSpan 断言某个内容块的载荷可由一个精确来源范围定位与核验；SourceSpan 仍由存储与来源模块拥有，该边不复制来源 URI、版本或范围层级，也不表示所有生成内容都必须有来源。
      en: ContentBlock located_at_source_span SourceSpan asserts that a content block's payload can be located and checked against one precise source range. SourceSpan remains owned by storage and sources; the edge copies neither URI, version, nor range hierarchy and does not require every generated block to have a source.
      ja: ContentBlock located_at_source_span SourceSpan は内容ブロックのペイロードを一つの正確な出典範囲で位置付け検証できると主張します。SourceSpan は storage/source 所有のままで URI、version、range 階層を複製せず、全生成ブロックに出典を要求しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: locates_content_block
      labels:
        zh: 定位内容块
        en: locates content block
        ja: 内容ブロックを位置付ける
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ContentBlock-located_at_source_span-SourceSpan-example-positive-001
        labels:
          zh: located at source span正例
          en: Positive example of located at source span
          ja: located at source spanの正例
        descriptions:
          zh: TextBlock quote-22 保存句子“Stabilization runs for 200 iterations”；SourceSpan span-22 指向文档版本 v7 的第 118–121 行，逐字符比对确认该句位于此范围。
          en: TextBlock quote-22 stores "Stabilization runs for 200 iterations"; SourceSpan span-22 identifies lines 118–121 of document version v7, where character comparison confirms the sentence occurs.
          ja: TextBlock quote-22 は文を保持し、SourceSpan span-22 は文書 version v7 の 118–121 行を指し、文字比較で範囲内にあることを確認します。
        field_values: {}
        related_node_ids:
          - ContentBlock
          - TextBlock
          - SourceSpan
        related_relation_ids:
          - ContentBlock-located_at_source_span-SourceSpan
        source_claims:
          - claim-content-block-020
      - id: ContentBlock-located_at_source_span-SourceSpan-example-boundary-001
        labels:
          zh: located at source span边界例
          en: Boundary case for located at source span
          ja: located at source spanの境界例
        descriptions:
          zh: SourceReference doc-v7 只标识整份文档和版本，没有页、行、偏移或单元格范围。它可以说明来源身份，但不足以充当 SourceSpan 或证明 located_at_source_span。
          en: SourceReference doc-v7 identifies only the document and version, with no page, line, offset, or cell range. It can establish source identity but cannot serve as SourceSpan or prove located_at_source_span.
          ja: SourceReference doc-v7 は文書と version だけを識別し、頁、行、offset、cell range がありません。出典同一性は示せても SourceSpan や located_at_source_span は証明できません。
        field_values: {}
        related_node_ids:
          - ContentBlock
          - SourceSpan
          - SourceReference
        related_relation_ids:
          - ContentBlock-located_at_source_span-SourceSpan
        source_claims:
          - claim-content-block-021
    source_claims:
      - claim-content-block-022
    layout_role: cross-link
    target: concept:SourceSpan
sources:
  - id: src-openai-content-parts
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: Multimodal content parts.
  - id: src-anthropic-content-blocks
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Content block types including tool_use/tool_result.
  - id: src-a2a-parts
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Part kinds text/file/data.
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-content-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 explicitly defines ContentBlock as the union of TextContent, ImageContent, AudioContent, ResourceLink, and EmbeddedResource. This supports a common bounded-payload genus with representation-specific alternatives; Moonweave's additional structured-data and file-handle specializations are cross-protocol ontology inferences.
    locator: Schema Reference > ContentBlock
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines Part as a communication-content container with exactly one of text, raw, url, or data, plus optional filename and mediaType. This supports ContentBlock as a carrier-neutral payload genus while leaving Moonweave ownership and hierarchy decisions explicit.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-003
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 states that raw Part bytes are Base64-encoded in JSON serialization. Moonweave records that wire representation in encoding so a decoder can recover the payload; encoding is not treated as the block's semantic class or Internet media type.
    locator: A2A Protocol v1.0 > 4.1.6 Part > raw
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-004
    source: eng-proto-mcp-spec
    supports: MCP ContentBlock explicitly includes AudioContent with type=audio; Moonweave maps that alternative to the audio payload-form value.
    locator: Schema Reference > ContentBlock and AudioContent
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-005
    source: eng-proto-mcp-spec
    supports: MCP ContentBlock explicitly includes ResourceLink for content referenced by URI; Moonweave maps that carrier to the file payload-form value.
    locator: Schema Reference > ContentBlock and ResourceLink
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-006
    source: eng-proto-mcp-spec
    supports: MCP ContentBlock explicitly includes ImageContent with type=image; Moonweave maps that alternative to the image payload-form value.
    locator: Schema Reference > ContentBlock and ImageContent
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-007
    source: eng-proto-a2a-spec
    supports: A2A Part explicitly provides data for a structured JSON value; Moonweave maps parsed objects or arrays to the structured-data payload form.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-008
    source: eng-proto-mcp-spec
    supports: MCP ContentBlock explicitly includes TextContent with type=text; Moonweave maps that alternative to the text payload-form value.
    locator: Schema Reference > ContentBlock and TextContent
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-009
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 requires exactly one of text, raw, url, or data on each Part. Moonweave normalizes the selected carrier alternative into the modality discriminator and requires it to agree with the most-specific ContentBlock class.
    locator: A2A Protocol v1.0 > 4.1.6 Part > oneof content fields
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines mediaType as optional metadata available for every Part. Moonweave stores that value as mime_type for decoding and validation without promoting the media-type string to an ontology node.
    locator: A2A Protocol v1.0 > 4.1.6 Part > mediaType
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes a ResourceLink's raw byte size from Base64 and tokenization and notes that hosts may estimate context-window use. Moonweave therefore treats token_count as an optional tokenizer-specific estimate, never as payload identity.
    locator: Schema Reference > ResourceLink > size
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 identifies a Message separately from the Part objects it contains. Moonweave adds block_id as a stable local key for a Part-derived payload node; it records neither sender, turn, nor ordinal message position.
    locator: A2A Protocol v1.0 > Message > parts and messageId
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-013
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 requires exactly one Part content field and provides mediaType metadata. Moonweave combines those discriminators with its reviewed subtype hierarchy and rejects incompatible combinations rather than inventing a type.
    locator: A2A Protocol v1.0 > 4.1.6 Part > oneof content fields and mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-014
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ContentBlock as the union TextContent | ImageContent | AudioContent | ResourceLink | EmbeddedResource; Moonweave uses that explicit carrier union as evidence for a bounded payload category, while the parent class and message-containment edge remain ontology design decisions.
    locator: Schema Reference > ContentBlock
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-015
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 requires each Part to contain exactly one of text, raw, url, or data and permits mediaType on every Part; this directly supports separating the two payload units while treating mediaType as metadata rather than an ontology parent.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-016
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 publishes ContentBlock as a discriminated union of concrete content representations, not as a superclass of JSON-RPC or conversation envelopes; Moonweave uses that separation to reject the Message-as-ContentBlock reading.
    locator: Schema Reference > ContentBlock
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-017
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 states that a Part MUST contain exactly one of text, raw, url, or data; a Part with both text and data is therefore invalid rather than two inferred content blocks.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-content-block-018
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent has discriminator type="text" and a required text string; cb-text-001 mirrors that concrete representation, while Moonweave adds block_id, encoding, and the TextBlock-to-ContentBlock hierarchy.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-block-019
    source: eng-proto-a2a-spec
