schema: moonweave.ai/ontology-node/v1
id: ContentBlock
kind: concept
status: accepted
labels:
  zh: 内容块
  en: content block
  ja: 内容ブロック
semantics:
  short_definition:
    zh: 内容块是可独立传递和处理的有边界信息载荷单元。
    en: A content block is a bounded information payload unit that can be transferred and processed independently.
    ja: 内容ブロックは、独立して転送・処理できる境界付き情報ペイロード単位です。
  definition:
    zh: 内容块是一种信息载荷单元，其身份由一段有边界的载荷及解释该载荷所需的表示元数据构成。载荷可以是文本、已解析结构化数据、图像、音频或文件引用，并可作为消息、提示或产物的一部分被传递；消息包络、会话位置、来源记录和披露决策不是内容块的子类。
    en: A content block is an information payload unit identified by a bounded payload together with the representation metadata needed to interpret it. The payload may be text, parsed structured data, image, audio, or a file reference and may be carried by a message, prompt, or artifact; message envelopes, conversational positions, source records, and disclosure decisions are not content-block subtypes.
    ja: 内容ブロックは、境界付きペイロードと、その解釈に必要な表現メタデータによって識別される情報ペイロード単位です。ペイロードはテキスト、解析済み構造化データ、画像、音声、ファイル参照であり得て、メッセージ、プロンプト、成果物の一部として運ばれます。メッセージ包絡、会話上の位置、出典記録、開示判断は内容ブロックの下位型ではありません。
  why_needed:
    zh: 内容块提供跨消息、工具结果和智能体产物一致的载荷边界，使系统能在不复制消息包络的情况下执行解析、预算、过滤、引用和渲染。其下位层级回答“载荷如何被解释”，而不是“载荷来自哪里或用于什么”。
    en: ContentBlock provides one payload boundary across messages, tool results, and agent artifacts so parsing, budgeting, filtering, citation, and rendering can operate without duplicating message envelopes. Its subtype hierarchy answers how the payload is interpreted, not where it came from or what it is used for.
    ja: ContentBlock はメッセージ、ツール結果、エージェント成果物に共通のペイロード境界を与え、メッセージ包絡を複製せずに解析、予算化、フィルタ、引用、描画を可能にします。下位階層が答えるのはペイロードの解釈方法であり、出典や用途ではありません。
  includes:
    - zh: 纳入具有明确载荷边界并能判定主表示形态的文本、结构化数据、图像、音频和文件引用；块级编码、媒体类型、大小与来源锚点作为解释信息附着在节点上。
      en: Includes text, structured data, image, audio, and file-reference payloads with a clear boundary and a determinable primary representation; block-level encoding, media type, size, and source anchors remain explanatory node information.
      ja: 明確なペイロード境界と判定可能な主表現を持つテキスト、構造化データ、画像、音声、ファイル参照を含みます。ブロック単位の符号化、メディア型、サイズ、出典アンカーはノードの説明情報として保持します。
  excludes:
    - zh: 排除 Message、ConversationTurn 和 PromptEnvelope 等容器或位置对象，也排除 SourceReference、PolicyRule、ContextSelectionDecision 等描述来源、治理或选择过程的记录；这些对象可以关联内容块，但不是载荷表示。
      en: Excludes container or position objects such as Message, ConversationTurn, and PromptEnvelope, and records such as SourceReference, PolicyRule, and ContextSelectionDecision that describe provenance, governance, or selection. They may relate to a content block but are not payload representations.
      ja: Message、ConversationTurn、PromptEnvelope のような容器・位置オブジェクト、および出典、統制、選択を記述する SourceReference、PolicyRule、ContextSelectionDecision を除外します。これらは内容ブロックと関係し得ますが、ペイロード表現ではありません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - block_id
  fields:
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选的字符集或传输编码，用于恢复载荷字节；它不等同于 media type，也不决定内容块类别。
        en: Optional character-set or transfer encoding used to recover payload bytes; it is neither the media type nor the content-block class.
        ja: ペイロードバイト復元用の任意文字集合・転送符号化で、media type や内容ブロック型ではありません。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-content-block-003
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 载荷形式是内容块的受控判别字段；字段值必须与最具体的 ContentBlock 下位类一致，但不另建平行“模态”节点。
        en: Payload form is the controlled discriminator of a content block. Its value must agree with the most-specific ContentBlock class and does not create a parallel modality node.
        ja: ペイロード形式は内容ブロックの統制判別項目です。値は最も具体的な ContentBlock 下位型と一致し、並行する modality ノードを作りません。
      allowed_values:
        - id: modality_audio
          value: audio
          labels:
            zh: audio
            en: audio
            ja: audio
          definitions:
            zh: audio 表示主载荷是内嵌、可解码的声音数据，并对应 AudioBlock。
            en: audio denotes embedded decodable sound data as the primary payload and corresponds to AudioBlock.
            ja: audio は内包された復号可能音響データを主ペイロードとし AudioBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-004
        - id: modality_file
          value: file
          labels:
            zh: file
            en: file
            ja: file
          definitions:
            zh: file 表示主载荷是外部文件 URI 句柄，而不是已内嵌解释的文件内容，并对应 FileAttachmentBlock。
            en: file denotes an external file-URI handle rather than embedded interpreted file content and corresponds to FileAttachmentBlock.
            ja: file は内包済み解釈内容ではなく外部ファイル URI ハンドルで FileAttachmentBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-005
        - id: modality_image
          value: image
          labels:
            zh: image
            en: image
            ja: image
          definitions:
            zh: image 表示主载荷是内嵌、可解码为像素或矢量图形的数据，并对应 ImageBlock。
            en: image denotes embedded data decodable into pixels or vector graphics and corresponds to ImageBlock.
            ja: image は画素・ベクトル図形へ復号可能な内包データで ImageBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-006
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: structured-data 表示主载荷已解析为可按键或索引寻址的对象或数组，并对应 StructuredDataBlock。
            en: structured-data denotes an object or array already parsed into key- or index-addressable values and corresponds to StructuredDataBlock.
            ja: structured-data はキー・添字で指定可能なオブジェクト・配列へ解析済みで StructuredDataBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-007
        - id: modality_text
          value: text
          labels:
            zh: text
            en: text
            ja: text
          definitions:
            zh: text 表示规范载荷是由字符顺序承载语义的字符串，并对应 TextBlock。
            en: text denotes a canonical string whose character order carries meaning and corresponds to TextBlock.
            ja: text は文字順が意味を担う正規文字列で TextBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-008
      pattern: null
      example_value: audio
      source_claims:
        - claim-content-block-009
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释载荷格式的可选互联网媒体类型；该字符串是验证信息，不是分类节点或来源身份。
        en: Optional Internet media type for interpreting payload format; the string is validation information, not a taxonomy node or source identity.
        ja: ペイロード形式解釈用の任意 Internet media type で、分類ノードや出典同一性ではありません。
      allowed_values: []
      pattern: null
      example_value: text/plain
      source_claims:
        - claim-content-block-010
    - id: token_count
      labels:
        zh: 词元计数
        en: token count
        ja: トークン数
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 由指定模型分词器计算的可选估算值；更换分词器后可变化，因此不参与内容块身份或分类。
        en: Optional estimate produced by a named model tokenizer; it may change with the tokenizer and does not participate in block identity or classification.
        ja: 指定モデル tokenizer による任意见積りで、tokenizer により変化し、ブロック同一性・分類には使いません。
      allowed_values: []
      pattern: null
      example_value: 128
      source_claims:
        - claim-content-block-011
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 内容块在所属集合中的稳定局部标识；不编码消息角色、会话轮次、显示顺序或来源位置。
        en: Stable local identifier within the owning collection; it encodes no message role, conversation turn, display order, or source location.
        ja: 所属集合内の安定した局所識別子で、メッセージ役割、会話ターン、表示順、出典位置を符号化しません。
      allowed_values: []
      pattern: null
      example_value: block-text-001
      source_claims:
        - claim-content-block-012
  constraints:
    - id: content-block-modality-compatible
      severity: error
      expression_language: plain
      expression: modality, mime_type, encoding, and payload fields satisfy the complete inherited contract of the most-specific ContentBlock subtype
      explanations:
        zh: 载荷形式、媒体类型、编码和实际载荷字段必须满足最具体 ContentBlock 下位类型的完整继承约束；CodeBlock 仍使用 text 载荷形式，TableBlock 仍使用 structured-data，冲突时返回验证错误而不猜测类别。
        en: Payload form, media type, encoding, and actual payload fields must satisfy the complete inherited contract of the most-specific ContentBlock subtype; CodeBlock remains text and TableBlock remains structured-data, and conflicts produce a validation error rather than a guessed class.
        ja: ペイロード形式、media type、encoding、実ペイロード項目は最具体 ContentBlock 下位型の完全な継承制約を満たし、CodeBlock は text、TableBlock は structured-data のまま、競合時は推測せず検証エラーにします。
      source_claims:
        - claim-content-block-013
  required_relation_constraints: []
examples:
  - id: ContentBlock-example-positive-001
    kind: positive
    labels:
      zh: 内容块正例
      en: Positive example of content block
      ja: 内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: A2A 消息 msg-42 的第一个 Part 只设置 text="Deployment window 22:00"；Moonweave 将该有边界载荷记录为 msg-42-part-0，载荷形式为 text，并沿 TextBlock-is_a-ContentBlock 取得 ContentBlock 身份。Message 包络与 Part 的块身份保持分离。
      en: The first Part of A2A message msg-42 sets only text="Deployment window 22:00". Moonweave records that bounded payload as msg-42-part-0 with payload form text and obtains ContentBlock membership through TextBlock-is_a-ContentBlock. The Message envelope remains separate from the Part's block identity.
      ja: A2A message msg-42 の最初の Part は text="Deployment window 22:00" だけを設定します。Moonweave は境界付きペイロードを msg-42-part-0、ペイロード形式 text として記録し、TextBlock-is_a-ContentBlock で ContentBlock 所属を得ます。Message 包絡と Part の block 同一性は分離します。
    field_values:
      block_id: msg-42-part-0
      modality: text
      mime_type: text/plain
      encoding: utf-8
    related_node_ids:
      - Message
      - ContentBlock
      - TextBlock
      - FileAttachmentBlock
    related_relation_ids:
      - Message-contains_content_block-ContentBlock
    expected_result:
      zh: 验证器返回两个独立的 ContentBlock 下位对象并保留消息中的顺序；不得把 Message 或 MIME 字符串提升为内容块类型。
      en: Validation returns two distinct ContentBlock specializations and preserves their message order; neither Message nor a MIME string is promoted to a content-block type.
      ja: 検証器は二つの独立した ContentBlock 下位対象を返し、メッセージ内の順序を保持します。Message や MIME 文字列を内容ブロック型へ昇格させません。
    why_valid_or_invalid:
      zh: 两个 Part 都有清楚的载荷边界且满足 exactly-one 载荷约束；载体差异决定下位类型，消息位置和 mediaType 仅作为关系或解释信息。
      en: Each Part has a clear payload boundary and satisfies the exactly-one payload constraint. Carrier form selects the specialization, while message position and mediaType remain relational or explanatory information.
      ja: 各 Part は明確なペイロード境界と exactly-one 制約を満たします。媒体形式が下位型を決め、メッセージ位置と mediaType は関係・説明情報に留まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-content-block-014
      - claim-content-block-015
  - id: ContentBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 内容块边界例
      en: Boundary case for content block
      ja: 内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: 对象 msg-43 同时带有 role、messageId 与 parts，因此它是 Message；其中某个 Part 又同时设置 text="结果" 和 data={"ok":true}，违反 A2A 的 exactly-one 载荷约束。含有内容与作为内容块是两件不同的事，不能把消息包络或这个无效 Part 直接分类为 ContentBlock。
      en: Object msg-43 carries role, messageId, and parts, so it is a Message. One Part also sets both text="result" and data={"ok":true}, violating A2A's exactly-one payload constraint. Containing content is not the same as being a content block, so neither the message envelope nor the invalid Part is classified directly as ContentBlock.
      ja: オブジェクト msg-43 は role、messageId、parts を持つため Message です。さらに一つの Part が text="結果" と data={"ok":true} を同時に設定し、A2A の exactly-one ペイロード制約に違反します。内容を含むことと内容ブロックであることは異なり、メッセージ包絡も無効な Part も直接 ContentBlock には分類しません。
    field_values: {}
    related_node_ids:
      - Message
      - ContentBlock
    related_relation_ids:
      - Message-contains_content_block-ContentBlock
    expected_result:
      zh: 验证器保留 msg-43 的 Message 类型，并对双载荷 Part 返回校验错误；不得猜测首字段、拆成两个块或把 Message 当作 ContentBlock。
      en: Validation preserves msg-43 as Message and reports an error for the dual-payload Part; it must not pick the first field, split it implicitly, or treat Message as ContentBlock.
      ja: 検証器は msg-43 を Message のまま保持し、二重ペイロード Part をエラーにします。先頭項目の推測、暗黙の二分割、Message の ContentBlock 化を行いません。
    why_valid_or_invalid:
      zh: Message 的身份由会话包络字段决定；Part 的有效身份则要求唯一载荷判别项。关系 Message-contains_content_block-ContentBlock 不能倒读成 Message is_a ContentBlock。
      en: Message identity comes from envelope fields, while a valid Part requires one payload discriminator. Message-contains_content_block-ContentBlock cannot be reversed into Message is_a ContentBlock.
      ja: Message の同一性は包絡項目で決まり、有効な Part は一つのペイロード判別項目を要します。Message-contains_content_block-ContentBlock を Message is_a ContentBlock と逆読みにできません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-content-block-016
      - claim-content-block-017
  - id: ContentBlock-example-instance-001
    kind: instance
    labels:
      zh: 内容块结构化实例
      en: Structured instance of content block
      ja: 内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 cb-text-001 保存载荷“部署窗口 22:00”，modality="text"、mime_type="text/plain"、encoding="utf-8"。该记录首先满足 TextBlock 的字符序列种差，再经 TextBlock-is_a-ContentBlock 取得 ContentBlock 成员资格；实例只显示在节点详情中，不生成平行实例图。
      en: Inline instance cb-text-001 stores payload "Deployment window 22:00" with modality="text", mime_type="text/plain", and encoding="utf-8". It first satisfies the character-sequence differentia of TextBlock and then inherits ContentBlock membership through TextBlock-is_a-ContentBlock; the instance remains node detail rather than a parallel instance graph.
      ja: ノード内インスタンス cb-text-001 はペイロード「配備時間 22:00」を modality="text"、mime_type="text/plain"、encoding="utf-8" と共に保持します。まず TextBlock の文字列種差を満たし、TextBlock-is_a-ContentBlock を通じて ContentBlock に属します。インスタンスはノード詳細に留まり、並行インスタンス図を作りません。
    field_values:
      block_id: cb-text-001
      modality: text
      mime_type: text/plain
      encoding: utf-8
    related_node_ids:
      - ContentBlock
      - TextBlock
    related_relation_ids:
      - TextBlock-is_a-ContentBlock
    expected_result:
      zh: 分类结果为 TextBlock，且由显式父关系可查询其 ContentBlock 成员资格；mime_type 仅用于解释和验证载荷。
      en: The record is classified as TextBlock and its ContentBlock membership is queryable through the explicit parent relation; mime_type is used only to interpret and validate the payload.
      ja: 分類結果は TextBlock で、明示的な親関係から ContentBlock 所属を照会できます。mime_type はペイロードの解釈と検証だけに用います。
    why_valid_or_invalid:
      zh: 实例提供一个有边界的字符串载荷和一致的表示元数据，既不含消息包络字段，也没有第二种竞争载荷。
      en: The instance supplies one bounded string payload with consistent representation metadata, no message-envelope fields, and no competing second payload.
      ja: このインスタンスは一つの境界付き文字列ペイロードと整合する表現メタデータを持ち、メッセージ包絡項目や競合する第二ペイロードを含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-content-block-018
      - claim-content-block-019
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ContentBlock-located_at_source_span-SourceSpan
    predicate: located_at_source_span
    direction: source-to-target
    relation_kind: information
    labels:
      zh: located at source span
      en: located at source span
      ja: located at source span
    definitions:
      zh: ContentBlock located_at_source_span SourceSpan 断言某个内容块的载荷可由一个精确来源范围定位与核验；SourceSpan 仍由存储与来源模块拥有，该边不复制来源 URI、版本或范围层级，也不表示所有生成内容都必须有来源。
      en: ContentBlock located_at_source_span SourceSpan asserts that a content block's payload can be located and checked against one precise source range. SourceSpan remains owned by storage and sources; the edge copies neither URI, version, nor range hierarchy and does not require every generated block to have a source.
      ja: ContentBlock located_at_source_span SourceSpan は内容ブロックのペイロードを一つの正確な出典範囲で位置付け検証できると主張します。SourceSpan は storage/source 所有のままで URI、version、range 階層を複製せず、全生成ブロックに出典を要求しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: locates_content_block
      labels:
        zh: 定位内容块
        en: locates content block
        ja: 内容ブロックを位置付ける
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ContentBlock-located_at_source_span-SourceSpan-example-positive-001
        kind: positive
        labels:
          zh: located at source span正例
          en: Positive example of located at source span
          ja: located at source spanの正例
        scenario_id: null
        descriptions:
          zh: TextBlock quote-22 保存句子“Stabilization runs for 200 iterations”；SourceSpan span-22 指向文档版本 v7 的第 118–121 行，逐字符比对确认该句位于此范围。
          en: TextBlock quote-22 stores "Stabilization runs for 200 iterations"; SourceSpan span-22 identifies lines 118–121 of document version v7, where character comparison confirms the sentence occurs.
          ja: TextBlock quote-22 は文を保持し、SourceSpan span-22 は文書 version v7 の 118–121 行を指し、文字比較で範囲内にあることを確認します。
        field_values: {}
        related_node_ids:
          - ContentBlock
          - TextBlock
          - SourceSpan
        related_relation_ids:
          - ContentBlock-located_at_source_span-SourceSpan
        expected_result:
          zh: 查询返回 quote-22→span-22 的单一精确锚；来源版本与范围细节从 SourceSpan 所属模块读取。
          en: Query returns the single precise anchor quote-22→span-22; source version and range details are read from SourceSpan's owning module.
