schema: moonweave.ai/ontology-node/v1
id: ContentBlock
kind: concept
labels:
  zh: 内容块
  en: content block
  ja: 内容ブロック
semantics:
  short_definition:
    zh: 可独立传递的有界信息载荷单元根。
    en: Root bounded information payload unit transferable independently.
    ja: 独立転送可能な有界情報 payload unit root。
  definition:
    zh: ContentBlock 是模块根，按可观察载荷形态分类；映射 OpenAI content part、Anthropic content block（text/image/tool_use/tool_result）、A2A Part。Message 通过 contains_content_block 引用，不是 ContentBlock 上位类。
    en: ContentBlock is the module root classifying by observable payload shape; maps OpenAI content parts, Anthropic blocks (text/image/tool_use/tool_result), and A2A Parts. Message references via contains_content_block without being a ContentBlock superclass.
    ja: OpenAI/Anthropic/A2A part→ContentBlock taxonomy root。
  why_needed:
    zh: 统一跨协议块级类型系统，使 MIME、编码与结构字段可单独验证。
    en: Unifies cross-protocol block-level typing so MIME, encoding, and structural fields validate separately.
    ja: cross-protocol block typing。
  includes:
    - zh: TextBlock、StructuredDataBlock、ImageBlock、AudioBlock、FileAttachmentBlock 等任意深度分类。
      en: Arbitrary-depth TextBlock, StructuredDataBlock, ImageBlock, AudioBlock, FileAttachmentBlock classifications.
      ja: text/structured/image/audio/file branches。
  excludes:
    - zh: Message 包络、Instruction 效力、SourceReference 正文、披露处置。
      en: Message envelopes, Instruction force, SourceReference bodies, and disclosure disposition.
      ja: Message/Instruction/Source/disclosure。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI content[] type=text/image_url/input_audio；Anthropic content[] type=text/image/tool_use/tool_result；A2A parts kind=text/file/data。Moonweave 用 mime_type/encoding/language_id 归最具体子类。
    en: OpenAI content[] type=text/image_url/input_audio; Anthropic content[] type=text/image/tool_use/tool_result; A2A parts kind=text/file/data. Moonweave uses mime_type/encoding/language_id for most-specific subclass.
    ja: wire part→ContentBlock classification。
  typical_input:
    - description: OpenAI multimodal parts
      format: '{"content":[{"type":"text","text":"Hi"},{"type":"image_url","image_url":{"url":"https://example.com/chart.png"}}]}'
      source_claims:
        - claim-cblock-openai
  typical_output:
    - description: Classification projection
      format: '{"content_block_id":"block-patch-11","most_specific_class":"CodeBlock","mime_type":"text/x-diff"}'
      source_claims:
        - claim-cblock-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys:
    - block_id
  fields:
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 可选的字符集或传输编码，用于恢复载荷字节；它不等同于 media type，也不决定内容块类别。
        en: Optional character-set or transfer encoding used to recover payload bytes; it is neither the media type nor the content-block class.
        ja: ペイロードバイト復元用の任意文字集合・転送符号化で、media type や内容ブロック型ではありません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: utf-8
      allowed_values: []
      source_claims:
        - claim-content-block-003
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 载荷形式是内容块的受控判别字段；字段值必须与最具体的 ContentBlock 下位类一致，但不另建平行“模态”节点。
        en: Payload form is the controlled discriminator of a content block. Its value must agree with the most-specific ContentBlock class and does not create a parallel modality node.
        ja: ペイロード形式は内容ブロックの統制判別項目です。値は最も具体的な ContentBlock 下位型と一致し、並行する modality ノードを作りません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: audio
      allowed_values:
        - id: modality_audio
          value: audio
          labels:
            zh: audio
            en: audio
            ja: audio
          definitions:
            zh: audio 表示主载荷是内嵌、可解码的声音数据，并对应 AudioBlock。
            en: audio denotes embedded decodable sound data as the primary payload and corresponds to AudioBlock.
            ja: audio は内包された復号可能音響データを主ペイロードとし AudioBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-004
        - id: modality_file
          value: file
          labels:
            zh: file
            en: file
            ja: file
          definitions:
            zh: file 表示主载荷是外部文件 URI 句柄，而不是已内嵌解释的文件内容，并对应 FileAttachmentBlock。
            en: file denotes an external file-URI handle rather than embedded interpreted file content and corresponds to FileAttachmentBlock.
            ja: file は内包済み解釈内容ではなく外部ファイル URI ハンドルで FileAttachmentBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-005
        - id: modality_image
          value: image
          labels:
            zh: image
            en: image
            ja: image
          definitions:
            zh: image 表示主载荷是内嵌、可解码为像素或矢量图形的数据，并对应 ImageBlock。
            en: image denotes embedded data decodable into pixels or vector graphics and corresponds to ImageBlock.
            ja: image は画素・ベクトル図形へ復号可能な内包データで ImageBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-006
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: structured-data 表示主载荷已解析为可按键或索引寻址的对象或数组，并对应 StructuredDataBlock。
            en: structured-data denotes an object or array already parsed into key- or index-addressable values and corresponds to StructuredDataBlock.
            ja: structured-data はキー・添字で指定可能なオブジェクト・配列へ解析済みで StructuredDataBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-007
        - id: modality_text
          value: text
          labels:
            zh: text
            en: text
            ja: text
          definitions:
            zh: text 表示规范载荷是由字符顺序承载语义的字符串，并对应 TextBlock。
            en: text denotes a canonical string whose character order carries meaning and corresponds to TextBlock.
            ja: text は文字順が意味を担う正規文字列で TextBlock に対応します。
          status: accepted
          source_claims:
            - claim-content-block-008
      source_claims:
        - claim-content-block-009
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 解释载荷格式的可选互联网媒体类型；该字符串是验证信息，不是分类节点或来源身份。
        en: Optional Internet media type for interpreting payload format; the string is validation information, not a taxonomy node or source identity.
        ja: ペイロード形式解釈用の任意 Internet media type で、分類ノードや出典同一性ではありません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: text/plain
      allowed_values: []
      source_claims:
        - claim-content-block-010
    - id: token_count
      labels:
        zh: 词元计数
        en: token count
        ja: トークン数
      definitions:
        zh: 由指定模型分词器计算的可选估算值；更换分词器后可变化，因此不参与内容块身份或分类。
        en: Optional estimate produced by a named model tokenizer; it may change with the tokenizer and does not participate in block identity or classification.
        ja: 指定モデル tokenizer による任意见積りで、tokenizer により変化し、ブロック同一性・分類には使いません。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 128
      allowed_values: []
      source_claims:
        - claim-content-block-011
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 内容块在所属集合中的稳定局部标识；不编码消息角色、会话轮次、显示顺序或来源位置。
        en: Stable local identifier within the owning collection; it encodes no message role, conversation turn, display order, or source location.
        ja: 所属集合内の安定した局所識別子で、メッセージ役割、会話ターン、表示順、出典位置を符号化しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-text-001
      allowed_values: []
      source_claims:
        - claim-content-block-012
  constraints:
    - id: content-block-modality-compatible
      severity: error
      expression_language: plain
      expression: modality, mime_type, encoding, and payload fields satisfy the complete inherited contract of the most-specific ContentBlock subtype
      explanation:
        zh: 载荷形式、媒体类型、编码和实际载荷字段必须满足最具体 ContentBlock 下位类型的完整继承约束；CodeBlock 仍使用 text 载荷形式，TableBlock 仍使用 structured-data，冲突时返回验证错误而不猜测类别。
        en: Payload form, media type, encoding, and actual payload fields must satisfy the complete inherited contract of the most-specific ContentBlock subtype; CodeBlock remains text and TableBlock remains structured-data, and conflicts produce a validation error rather than a guessed class.
        ja: ペイロード形式、media type、encoding、実ペイロード項目は最具体 ContentBlock 下位型の完全な継承制約を満たし、CodeBlock は text、TableBlock は structured-data のまま、競合時は推測せず検証エラーにします。
      source_claims:
        - claim-content-block-013
  required_relations: []
