parent_relation:
  id: TableBlock-is_a-StructuredDataBlock
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TableBlock is_a StructuredDataBlock 表示每个表格块首先是已解析、可寻址的结构化值，并进一步要求稳定的有序列集合、行集合以及可由行列坐标定位的单元格；原始 CSV、Markdown 排版和表格截图不满足该层级。
    en: TableBlock is_a StructuredDataBlock means every table block is first a parsed addressable structured value and is further constrained to stable ordered column and row sets with cells addressable by row-column coordinates. Raw CSV, Markdown layout, and table screenshots do not satisfy the hierarchy.
    ja: TableBlock is_a StructuredDataBlock は、すべての表ブロックがまず解析済み指定可能な構造化値で、さらに安定した順序付き列・行集合と行列座標で指定可能なセルを要することを意味します。生 CSV、Markdown 配置、表画像は満たしません。
  cardinality: null
