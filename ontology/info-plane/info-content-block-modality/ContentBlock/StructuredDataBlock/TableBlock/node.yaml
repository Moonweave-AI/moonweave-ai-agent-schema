        en: Return TextBlock; a parsing activity may generate a separate TableBlock, but table structure must not be guessed in place.
        ja: TextBlock を返し、解析活動が別 TableBlock を生成できますが、表構造をその場で推測しません。
      why_valid_or_invalid:
        zh: TableBlock 要求已经成立的行列坐标，不以分隔符模式匹配替代解析。
        en: TableBlock requires established row-column coordinates and does not substitute delimiter matching for parsing.
        ja: TableBlock は成立済み行列座標を要し、区切り文字照合を解析の代わりにしません。
      synthetic: true
