        en: The most-specific type is TableBlock; its ancestors are StructuredDataBlock and then ContentBlock.
        ja: 最も具体的な型は TableBlock で、祖先は StructuredDataBlock、ContentBlock の順です。
      why_valid_or_invalid:
        zh: 对象已经解析且同时具备稳定列、行和单元格坐标，满足两级种差。
        en: The object is parsed and has stable columns, rows, and cell coordinates, satisfying both levels of differentia.
        ja: 解析済みで安定した列、行、セル座標を持ち、二段階の種差を満たします。
