schema: moonweave.ai/ontology-node/v1
id: TableBlock
kind: concept
status: review
labels:
  zh: 表格内容块
  en: table block
  ja: 表内容ブロック
semantics:
  short_definition:
    zh: 表格内容块是具有明确行、列与单元格寻址的结构化数据内容块。
    en: A table block is a structured-data block with explicit rows, columns, and addressable cells.
    ja: 表内容ブロックは、明示的な行、列、指定可能なセルを持つ構造化データ内容ブロックです。
  definition:
    zh: 表格内容块是一种结构化数据内容块，其种差是数据具有明确的行、列集合和可按行列坐标寻址的单元格，并可声明表头、列类型或跨行跨列关系。CSV 被解析为这些结构后可成为 TableBlock；原始 CSV 字符串、Markdown 排版或图片中的表格在解析前不是 TableBlock。
    en: A table block is a structured-data block differentiated by explicit row and column sets and cells addressable by row-column coordinates, optionally with headers, column types, or spanning relations. CSV becomes a TableBlock after it is parsed into that structure; raw CSV text, Markdown layout, or a table visible in an image does not qualify before extraction.
    ja: 表内容ブロックは、明示的な行集合・列集合と、行列座標で指定可能なセルを持ち、任意で見出し、列型、行列結合を宣言できる点で区別される構造化データ内容ブロックです。CSV はこの構造へ解析された後に TableBlock となり、生の CSV 文字列、Markdown 配置、画像内の表は抽出前には該当しません。
  why_needed:
    zh: TableBlock 将通用结构化数据进一步下沉到行列模型，使单元格引用、表头匹配、列类型校验和范围选择有共同语义。它必须位于 StructuredDataBlock 下，而不是与其平级。
    en: TableBlock specializes generic structured data with a row-column model so cell citation, header matching, column-type validation, and range selection share one semantics. It therefore belongs under StructuredDataBlock rather than beside it.
    ja: TableBlock は一般的な構造化データを行列モデルへ特化し、セル引用、見出し照合、列型検証、範囲選択に共通意味を与えます。そのため StructuredDataBlock と同列ではなく、その下位に置きます。
  includes:
    - zh: 纳入已解析的 CSV/TSV 表、数据库查询结果表、电子表格区域和其他具有稳定行列坐标的二维数据；缺失值也作为具有坐标的单元格值处理。
      en: Includes parsed CSV or TSV tables, database result sets, spreadsheet ranges, and other two-dimensional data with stable row-column coordinates; missing values remain cells with coordinates.
      ja: 解析済み CSV/TSV 表、データベース結果表、スプレッドシート範囲、その他の安定した行列座標を持つ二次元データを含みます。欠損値も座標を持つセルとして扱います。
  excludes:
    - zh: 排除仅使用空格对齐的文本、尚未解析的 CSV 字符串、表格截图，以及没有统一列集合的对象列表；它们分别属于 TextBlock、ImageBlock 或更一般的 StructuredDataBlock。
      en: Excludes space-aligned text, unparsed CSV strings, screenshots of tables, and object lists without a shared column set; these remain TextBlock, ImageBlock, or a more general StructuredDataBlock.
      ja: 空白で整列しただけのテキスト、未解析 CSV 文字列、表のスクリーンショット、共通列集合を持たないオブジェクト列を除外し、それぞれ TextBlock、ImageBlock、または一般的な StructuredDataBlock とします。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承 structured-data 载荷形式，因为表仍由已解析结构化值承载；稳定行、列和单元格坐标在分类层级中区分 TableBlock。
        en: Inherits the structured-data payload form because a table is still carried by parsed structured values; stable rows, columns, and cell coordinates distinguish TableBlock in the class hierarchy.
        ja: 表は解析済み構造化値で運ばれるため structured-data ペイロード形式を継承し、安定した行、列、セル座標が分類階層で TableBlock を区別します。
      allowed_values:
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: TableBlock 只允许继承的 structured-data 载荷形式；columns 与 rows 还必须共同形成可寻址单元格。
            en: TableBlock permits only the inherited structured-data payload form; columns and rows must additionally form addressable cells.
            ja: TableBlock は継承した structured-data ペイロード形式だけを許し、さらに columns と rows が指定可能セルを形成しなければなりません。
          status: accepted
          source_claims:
            - claim-table-block-003
      pattern: null
      example_value: structured-data
      source_claims:
        - claim-table-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-table-001
      source_claims:
        - claim-table-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: text/csv
      source_claims:
        - claim-table-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-table-block-007
    - id: columns
      labels:
        zh: 列定义
        en: column definitions
        ja: 列定義
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 表的稳定有序列集合，可包含列名与类型；只有显示对齐而没有列身份的文本不满足该字段。
        en: Stable ordered column set, optionally including names and types; visually aligned text without column identity does not satisfy this field.
        ja: 名前や型を含み得る安定した順序付き列集合です。列同一性のない見た目上の整列テキストは満たしません。
      allowed_values: []
      pattern: null
      example_value:
        - name: service
        - name: status
      source_claims:
        - claim-table-block-008
    - id: rows
      labels:
        zh: 行数据
        en: row data
        ja: 行データ
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按 columns 解释的有序行集合；每个单元格必须能由行和列坐标定位。
        en: Ordered row set interpreted against columns; every cell must be addressable by a row and column coordinate.
        ja: columns に照らして解釈する順序付き行集合で、各セルを行列座標で指定できなければなりません。
      allowed_values: []
      pattern: null
      example_value:
        - - api
          - healthy
        - - worker
          - degraded
      source_claims:
        - claim-table-block-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: TableBlock-example-positive-001
    kind: positive
    labels:
      zh: 表格内容块正例
      en: Positive example of table block
      ja: 表内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: 解析器把 CSV 文件转换为列 ["service","p95_ms"] 与行 [["api",180],["worker",245]]；每个单元格都可由行索引和列名共同寻址。该载荷首先是 StructuredDataBlock，再由 TableBlock-is_a-StructuredDataBlock 细化为 TableBlock；text/csv 仅记录来源交换格式。
      en: A parser converts a CSV file into columns ["service","p95_ms"] and rows [["api",180],["worker",245]], with every cell addressable by row index and column name. The payload is StructuredDataBlock further specialized as TableBlock through TableBlock-is_a-StructuredDataBlock; text/csv records only the source interchange format.
      ja: パーサーは CSV を列 ["service","p95_ms"] と行 [["api",180],["worker",245]] に変換し、各セルを行番号と列名で指定可能にします。ペイロードは StructuredDataBlock であり、TableBlock-is_a-StructuredDataBlock により TableBlock へ特化します。text/csv は元の交換形式だけを記録します。
    field_values:
      block_id: table-latency-002
      modality: structured-data
      mime_type: text/csv
      data:
        columns:
          - name: service
            type: string
          - name: p95_ms
            type: integer
        rows:
          - - api
            - 180
          - - worker
            - 245
      columns:
        - name: service
          type: string
        - name: p95_ms
          type: integer
      rows:
        - - api
          - 180
        - - worker
          - 245
    related_node_ids:
      - TableBlock
      - StructuredDataBlock
    related_relation_ids:
      - TableBlock-is_a-StructuredDataBlock
    expected_result:
      zh: 分类结果为 TableBlock，并沿父关系保留 StructuredDataBlock 成员资格；不得将 CSV MIME 本身当成表格本体类型。
      en: The result is TableBlock with StructuredDataBlock membership retained through the parent relation; the CSV MIME value itself is not an ontology type.
      ja: 分類結果は TableBlock で、親関係により StructuredDataBlock 所属を保持します。CSV MIME 値自体を表本体型にしません。
    why_valid_or_invalid:
      zh: 规范载荷明确给出列集合、行集合和可寻址单元格，满足 TableBlock 相对于一般结构化数据的种差。
      en: The canonical payload explicitly supplies columns, rows, and addressable cells, satisfying the TableBlock differentia over general structured data.
      ja: 正規ペイロードは列集合、行集合、指定可能なセルを明示し、一般構造化データに対する TableBlock の種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-table-block-010
      - claim-table-block-011
  - id: TableBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 表格内容块边界例
      en: Boundary case for table block
      ja: 表内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: 结构化数据 data-health-008 为 {"service":"api","health":{"ready":true,"checks":["db","cache"]}}。它具有可寻址键和值，但没有共同列集合、行成员或单元格坐标，因此保持 StructuredDataBlock，不能因包含数组或 application/json 就归入 TableBlock。
      en: Structured data data-health-008 is {"service":"api","health":{"ready":true,"checks":["db","cache"]}}. It has addressable keys and values but no common column set, row members, or cell coordinates, so it remains StructuredDataBlock and is not TableBlock merely because it contains an array or uses application/json.
      ja: 構造化データ data-health-008 は {"service":"api","health":{"ready":true,"checks":["db","cache"]}} です。指定可能なキーと値はありますが、共通列集合、行メンバー、セル座標がないため StructuredDataBlock のままで、配列や application/json を含むだけでは TableBlock になりません。
    field_values: {}
    related_node_ids:
      - TableBlock
      - StructuredDataBlock
    related_relation_ids:
      - TableBlock-is_a-StructuredDataBlock
    expected_result:
      zh: 分类器返回 StructuredDataBlock 而非 TableBlock；验证器必须找到完整行列单元格结构后才允许下沉。
      en: The classifier returns StructuredDataBlock, not TableBlock; validation permits specialization only after a complete row-column-cell structure is established.
      ja: 分類器は TableBlock ではなく StructuredDataBlock を返します。完全な行・列・セル構造が成立した場合だけ特化を許します。
    why_valid_or_invalid:
      zh: “有结构”是上位条件，“以行列单元格组织”才是表格种差；两者不能通过关键词或数组形状偷换。
      en: Being structured is the genus condition; organization into rows, columns, and cells is the table differentia. Keywords or an arbitrary array shape cannot substitute for it.
      ja: 「構造を持つ」は上位条件で、「行・列・セルで組織される」が表の種差です。キーワードや任意の配列形状で置き換えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-table-block-012
      - claim-table-block-013
  - id: TableBlock-example-instance-001
    kind: instance
    labels:
      zh: 表格内容块结构化实例
      en: Structured instance of table block
      ja: 表内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 table-latency-003 以继承载荷形式 structured-data 保存 columns=[{name:"service",type:"string"},{name:"p95_ms",type:"integer"}] 与 rows=[["api",180],["worker",245]]；坐标 (row=1,column="p95_ms") 返回整数 245。
      en: Inline instance table-latency-003 uses inherited payload form structured-data and stores columns=[{name:"service",type:"string"},{name:"p95_ms",type:"integer"}] with rows=[["api",180],["worker",245]]. Coordinate (row=1,column="p95_ms") returns integer 245.
      ja: ノード内 instance table-latency-003 は継承ペイロード形式 structured-data で columns と rows を保持し、座標 (row=1,column="p95_ms") は整数 245 を返します。
    field_values:
      block_id: table-latency-003
      modality: structured-data
      mime_type: text/csv
      data:
        columns:
          - name: service
            type: string
          - name: p95_ms
            type: integer
        rows:
          - - api
            - 180
          - - worker
            - 245
      columns:
        - name: service
          type: string
        - name: p95_ms
          type: integer
      rows:
        - - api
          - 180
        - - worker
          - 245
    related_node_ids:
      - TableBlock
      - StructuredDataBlock
    related_relation_ids:
      - TableBlock-is_a-StructuredDataBlock
    expected_result:
      zh: 实例归为 TableBlock，列类型和单元格坐标均可验证；其 StructuredDataBlock 上位身份由显式父关系给出。
      en: The instance is TableBlock with verifiable column types and cell coordinates; its broader StructuredDataBlock identity comes from the explicit parent relation.
      ja: インスタンスは TableBlock で、列型とセル座標を検証できます。上位の StructuredDataBlock 同一性は明示的親関係から得ます。
    why_valid_or_invalid:
      zh: 该记录不只保存二维外观，而是保存列语义、行成员与类型化单元格，能够稳定执行按列选择和按行定位。
      en: The record stores not merely a two-dimensional appearance but column semantics, row membership, and typed cells, enabling stable column selection and row addressing.
      ja: 二次元の見た目だけでなく、列意味、行所属、型付きセルを保持し、安定した列選択と行指定ができます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-table-block-014
      - claim-table-block-015
external_mappings: []
