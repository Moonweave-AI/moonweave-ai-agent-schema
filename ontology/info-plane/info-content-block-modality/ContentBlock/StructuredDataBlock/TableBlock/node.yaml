schema: moonweave.ai/ontology-node/v1
id: TableBlock
kind: concept
labels:
  zh: 表格内容块
  en: table block
  ja: 表内容ブロック
semantics:
  short_definition:
    zh: 具显式行列结构的 StructuredDataBlock 特化。
    en: StructuredDataBlock specialization with explicit row and column structure.
    ja: explicit row/column 構造を持つ StructuredDataBlock 特化。
  definition:
    zh: TableBlock 要求 columns 与 rows 已解析；raw CSV/TSV 未解析时必须保持 TextBlock 或 StructuredDataBlock。
    en: TableBlock requires parsed columns and rows; raw unparsed CSV/TSV must remain TextBlock or StructuredDataBlock.
    ja: parsed table only。
  why_needed:
    zh: 表格结构需要独立验证行列，不能从 raw 字符串猜测。
    en: Tabular structure needs independent row/column validation, not guessed from raw strings.
    ja: parsed table constraint。
  includes:
    - zh: columns[]、rows[][]、optional header row。
      en: columns[], rows[][], optional header row.
      ja: columns/rows/header。
  excludes:
    - zh: 未解析 CSV 字符串、单个 JSON 对象无行列。
      en: Unparsed CSV strings and single JSON objects without rows/columns.
      ja: unparsed CSV/plain JSON object。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: RAG Excel hit 解析 sheet+cells→TableBlock；raw CSV file 未 parse 前不得 TableBlock。
    en: RAG Excel hit parsed sheet+cells→TableBlock; raw CSV file must not be TableBlock before parse.
    ja: parsed table vs raw CSV。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 继承 structured-data 载荷形式，因为表仍由已解析结构化值承载；稳定行、列和单元格坐标在分类层级中区分 TableBlock。
        en: Inherits the structured-data payload form because a table is still carried by parsed structured values; stable rows, columns, and cell coordinates distinguish TableBlock in the class hierarchy.
        ja: 表は解析済み構造化値で運ばれるため structured-data ペイロード形式を継承し、安定した行、列、セル座標が分類階層で TableBlock を区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: structured-data
      allowed_values:
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: TableBlock 只允许继承的 structured-data 载荷形式；columns 与 rows 还必须共同形成可寻址单元格。
            en: TableBlock permits only the inherited structured-data payload form; columns and rows must additionally form addressable cells.
            ja: TableBlock は継承した structured-data ペイロード形式だけを許し、さらに columns と rows が指定可能セルを形成しなければなりません。
          status: accepted
          source_claims:
            - claim-table-block-003
      source_claims:
        - claim-table-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-table-001
      allowed_values: []
      source_claims:
        - claim-table-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: text/csv
      allowed_values: []
      source_claims:
        - claim-table-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: utf-8
      allowed_values: []
      source_claims:
        - claim-table-block-007
    - id: columns
      labels:
        zh: 列定义
        en: column definitions
        ja: 列定義
      definitions:
        zh: 表的稳定有序列集合，可包含列名与类型；只有显示对齐而没有列身份的文本不满足该字段。
        en: Stable ordered column set, optionally including names and types; visually aligned text without column identity does not satisfy this field.
        ja: 名前や型を含み得る安定した順序付き列集合です。列同一性のない見た目上の整列テキストは満たしません。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        - name: service
        - name: status
      allowed_values: []
      source_claims:
        - claim-table-block-008
    - id: rows
      labels:
        zh: 行数据
        en: row data
        ja: 行データ
      definitions:
        zh: 按 columns 解释的有序行集合；每个单元格必须能由行和列坐标定位。
        en: Ordered row set interpreted against columns; every cell must be addressable by a row and column coordinate.
        ja: columns に照らして解釈する順序付き行集合で、各セルを行列座標で指定できなければなりません。
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        - - api
          - healthy
        - - worker
          - degraded
      allowed_values: []
      source_claims:
        - claim-table-block-009
  constraints: []
  required_relations: []
examples:
  - id: TableBlock-example-parsed-sheet
    labels:
      zh: 解析表格
      en: Parsed table
      ja: parsed table
    descriptions:
      zh: block-table-9 columns=[Q1,Q2] rows=[[1,2],[3,4]]。
      en: block-table-9 columns=[Q1,Q2] rows=[[1,2],[3,4]].
      ja: parsed table。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: table
    field_values: {}
    related_node_ids:
      - TableBlock
      - StructuredDataBlock
    related_relation_ids: []
    source_claims:
      - claim-tblock-design
  - id: TableBlock-example-excel-rag
    labels:
      zh: Excel RAG 表
      en: Excel RAG table
      ja: Excel RAG table
    descriptions:
      zh: sales.xlsx Sheet1 cells B2:D10 解析为 TableBlock。
      en: sales.xlsx Sheet1 cells B2:D10 parsed as TableBlock.
      ja: Excel table block。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: excel
    field_values: {}
    related_node_ids:
      - TableBlock
    related_relation_ids: []
    source_claims:
      - claim-tblock-design
  - id: TableBlock-example-raw-csv
    labels:
      zh: raw CSV 边界
      en: Raw CSV boundary
      ja: raw CSV boundary
    descriptions:
      zh: 未解析 CSV 字符串不得分类 TableBlock。
      en: Unparsed CSV string must not classify as TableBlock.
      ja: raw CSV≠TableBlock。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - TableBlock
      - TextBlock
    related_relation_ids: []
    source_claims:
      - claim-tblock-design
parent_relation:
  id: TableBlock-is_a-StructuredDataBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: TableBlock is_a StructuredDataBlock 表示每个表格块首先是已解析、可寻址的结构化值，并进一步要求稳定的有序列集合、行集合以及可由行列坐标定位的单元格；原始 CSV、Markdown 排版和表格截图不满足该层级。
    en: TableBlock is_a StructuredDataBlock means every table block is first a parsed addressable structured value and is further constrained to stable ordered column and row sets with cells addressable by row-column coordinates. Raw CSV, Markdown layout, and table screenshots do not satisfy the hierarchy.
    ja: TableBlock is_a StructuredDataBlock は、すべての表ブロックがまず解析済み指定可能な構造化値で、さらに安定した順序付き列・行集合と行列座標で指定可能なセルを要することを意味します。生 CSV、Markdown 配置、表画像は満たしません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TableBlock-is_a-StructuredDataBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: 块 status-table 声明 columns=[service,status]，rows=[[api,healthy],[worker,degraded]]；任一值可由行号和列名唯一定位。
        en: Block status-table declares columns=[service,status] and rows=[[api,healthy],[worker,degraded]]; every value is uniquely addressable by row number and column name.
        ja: ブロック status-table は columns と rows を宣言し、各値を行番号と列名で一意に指定できます。
      field_values:
        block_id: status-table
        modality: structured-data
        mime_type: application/json
        encoding: utf-8
        data:
          columns:
            - name: service
            - name: status
          rows:
            - - api
              - healthy
            - - worker
              - degraded
        columns:
          - name: service
          - name: status
        rows:
          - - api
            - healthy
          - - worker
            - degraded
      related_node_ids:
        - TableBlock
        - StructuredDataBlock
        - ContentBlock
      related_relation_ids:
        - TableBlock-is_a-StructuredDataBlock
      source_claims:
        - claim-table-block-016
    - id: TableBlock-is_a-StructuredDataBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: |-
          块 status-csv 保存字符串“service,status
          api,healthy”，解析器尚未生成列与行对象。逗号和换行只属于字符序列，因此当前是 TextBlock。
        en: Block status-csv stores the string `service,status\napi,healthy`; no parser has produced column and row objects. Commas and line breaks are only characters, so it is currently TextBlock.
        ja: ブロック status-csv は CSV 文字列を保持し、列行オブジェクトは未生成です。コンマと改行は文字にすぎず、現在は TextBlock です。
      field_values: {}
      related_node_ids:
        - TableBlock
        - StructuredDataBlock
        - TextBlock
      related_relation_ids:
        - TableBlock-is_a-StructuredDataBlock
      source_claims:
        - claim-table-block-017
  source_claims:
    - claim-table-block-018
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-table-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines structuredContent as an optional structured result object but does not define a table content variant. Moonweave therefore places TableBlock below StructuredDataBlock only when rows, columns, and addressable cells are present.
    locator: Schema Reference > ToolResultContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits data to contain arbitrary JSON objects and arrays. This supplies the transport representation for tabular values but leaves the row-column-cell subtype criterion to Moonweave.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-003
    source: eng-proto-a2a-spec
    supports: A2A data carries parsed JSON values and defines no separate table Part. TableBlock consequently narrows StructuredDataBlock by row-column invariants while retaining payload form structured-data.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
  - id: claim-table-block-004
    source: eng-proto-a2a-spec
    supports: A2A transports machine-readable tables through the data Part alternative rather than defining a parallel table envelope. TableBlock therefore retains the structured-data payload form inherited from StructuredDataBlock; stable rows, columns, and cell coordinates supply the deeper class differentia.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-005
    source: eng-proto-a2a-spec
    supports: A2A Part provides one bounded data value but no table identifier. Moonweave block_id stabilizes the parsed table block locally and does not encode a spreadsheet location or message ordinal.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-006
    source: eng-proto-a2a-spec
    supports: A2A permits mediaType on all Part alternatives. For TableBlock it records the incoming serialization, while rows, columns, and cells must already be parsed before table membership is asserted.
    locator: A2A Protocol v1.0 > 4.1.6 Part > mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-007
    source: eng-proto-a2a-spec
    supports: A2A distinguishes a text or raw serialization from the parsed data value. Moonweave keeps encoding only for retained serialization metadata; it is not evidence that row-column structure exists.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text, raw, and data
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-008
    source: eng-proto-a2a-spec
    supports: A2A data can carry JSON arrays and objects but does not define a table subtype. Moonweave columns is a reviewed design field identifying the stable column set required by TableBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-009
    source: eng-proto-a2a-spec
    supports: A2A data provides the structured carrier. Moonweave rows is a reviewed design field whose values must align with the declared columns; this additional invariant distinguishes TableBlock from general StructuredDataBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-010
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ToolResultContent permits a structuredContent object. It can carry a reviewed rows-and-columns representation, while the TableBlock subtype itself is a Moonweave structural inference.
    locator: Schema Reference > ToolResultContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-011
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits data to be an object or array JSON value. That directly supports the structured carrier; Moonweave adds the row-column-cell differentia for TableBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-012
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 structuredContent accepts a general object and imposes no table semantics. This supports retaining a nested health object at StructuredDataBlock unless Moonweave's row-column-cell criteria are met.
    locator: Schema Reference > ToolResultContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-013
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 allows arbitrary JSON values in data and does not equate every object or array with a table, supporting the reviewed boundary.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-014
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ToolResultContent structuredContent can hold the columns-and-rows object; Moonweave's typed cell coordinates provide the additional TableBlock differentia.
    locator: Schema Reference > ToolResultContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-015
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 allows nested arrays and objects in the data JSON value, providing the concrete carrier for this reviewed tabular instance.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-016
    source: eng-proto-a2a-spec
    supports: A2A data directly carries the arrays and objects used by status-table; Moonweave adds the reviewed row-column invariant.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-table-block-017
    source: eng-proto-a2a-spec
    supports: A2A separates text from data; the CSV string uses the text carrier until an explicit parsed data value exists.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and data
    evidence_kind: normative
    confidence: high
  - id: claim-table-block-018
    source: eng-proto-a2a-spec
    supports: A2A Part.data supplies the structured JSON carrier but no table class. Moonweave reviews TableBlock as the row-column specialization below StructuredDataBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-tblock-design
    source: src-info-content-design
    supports: TableBlock requires explicitly parsed columns and rows.
    locator: TableBlock
    evidence_kind: design-inference
    confidence: high
