schema: moonweave.ai/ontology-node/v1
id: StructuredDataBlock
kind: concept
status: review
labels:
  zh: 结构化数据内容块
  en: structured data block
  ja: 構造化データ内容ブロック
semantics:
  short_definition:
    zh: 结构化数据内容块是以可寻址的数据值与结构为主载荷的内容块。
    en: A structured-data block is a content block whose primary payload is an addressable data value and structure.
    ja: 構造化データ内容ブロックは、アドレス指定可能なデータ値と構造を主ペイロードとする内容ブロックです。
  definition:
    zh: 结构化数据内容块是一种内容块，其种差是载荷已经解析为具有类型和值边界的数据结构，可按属性、索引、行列或图元素寻址。对象、数组、标量记录、模式实例、表格和图片段可属于此类；仅包含 JSON、CSV 或 YAML 字符串但尚未解析的载荷仍是 TextBlock。
    en: A structured-data block is a content block differentiated by a payload already parsed into a typed data structure whose values can be addressed by property, index, row and column, or graph element. Objects, arrays, scalar records, schema instances, tables, and graph fragments qualify; an unparsed JSON, CSV, or YAML string remains a TextBlock.
    ja: 構造化データ内容ブロックは、型と値境界を持つデータ構造へ解析済みで、属性、索引、行列、グラフ要素で値を指定できる点で区別される内容ブロックです。オブジェクト、配列、スカラー記録、スキーマ実体、表、グラフ断片を含み得ますが、未解析の JSON、CSV、YAML 文字列は TextBlock のままです。
  why_needed:
    zh: 该节点把“已经可按结构查询的数据”与“仅以文本序列化的数据”分开，使模式校验、字段选择、结构化工具输出和表格下位类型都有稳定上位概念。
    en: This node separates data that is already structurally queryable from data that is merely serialized as text, providing a stable parent for schema validation, field selection, structured tool output, and the TableBlock subtype.
    ja: このノードは、構造的に照会可能なデータと、テキストとして直列化されただけのデータを分離し、スキーマ検証、項目選択、構造化ツール出力、TableBlock 下位型の安定した上位概念を与えます。
  includes:
    - zh: 纳入已解析的 JSON 对象或数组、带字段类型的记录、模式实例、关系表和可寻址图结构；空值和标量也可在其所属结构具有明确语义时纳入。
      en: Includes parsed JSON objects or arrays, typed records, schema instances, relational tables, and addressable graph structures; null and scalar values qualify when their role in the containing structure is explicit.
      ja: 解析済み JSON オブジェクト・配列、型付き記録、スキーマ実体、関係表、指定可能なグラフ構造を含みます。null やスカラー値も、所属構造での役割が明示される場合は含みます。
  excludes:
    - zh: 排除未解析的 JSON、CSV、XML 或 YAML 文本、仅凭 MIME 类型推测为数据的二进制文件，以及只有布局外观却没有行列语义的文本；表示格式不能代替已验证的数据结构。
      en: Excludes unparsed JSON, CSV, XML, or YAML text, binary files inferred to be data only from a media type, and visually aligned text without row-column semantics. A representation format does not substitute for a validated data structure.
      ja: 未解析の JSON、CSV、XML、YAML テキスト、メディア型だけでデータと推測したバイナリファイル、行列意味を持たず見た目だけ整列したテキストを除外します。表現形式は検証済みデータ構造の代わりにはなりません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 structured-data，表示主载荷已经解析为可按键或索引寻址的值。
        en: Fixed to structured-data when the primary payload is already parsed into key- or index-addressable values.
        ja: 主ペイロードがキー・添字で指定可能な値へ解析済みである structured-data 固定値です。
      allowed_values:
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: StructuredDataBlock 只允许 structured-data，且主载荷必须是已解析的对象或数组。
            en: StructuredDataBlock permits only structured-data, and its primary payload must be a parsed object or array.
            ja: StructuredDataBlock は structured-data だけを許し、主ペイロードは解析済みオブジェクト・配列でなければなりません。
          status: accepted
          source_claims:
            - claim-structured-data-block-003
      pattern: null
      example_value: structured-data
      source_claims:
        - claim-structured-data-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-data-001
      source_claims:
        - claim-structured-data-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: application/json
      source_claims:
        - claim-structured-data-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-structured-data-block-007
    - id: data
      labels:
        zh: 结构化值
        en: structured value
        ja: 構造化値
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 已经解析为可按键或索引寻址的 JSON 对象或数组；未解析的 JSON 字符串仍属于 TextBlock。
        en: JSON object or array already parsed into key- or index-addressable values; an unparsed JSON string remains TextBlock.
        ja: キーまたは添字で指定可能な JSON オブジェクト・配列へ解析済みの値です。未解析 JSON 文字列は TextBlock のままです。
      allowed_values: []
      pattern: null
      example_value:
        region: apac
        healthy: true
      source_claims:
        - claim-structured-data-block-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: StructuredDataBlock-example-positive-001
    kind: positive
    labels:
      zh: 结构化数据内容块正例
      en: Positive example of structured data block
      ja: 構造化データ内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: A2A Part 的 data 载荷为 {"city":"杭州","temperature":21.4,"alerts":[]}。调用方可直接按 city、temperature 与 alerts 寻址这些值，无须先解析字符串，因此该有边界载荷归入 StructuredDataBlock，并通过 StructuredDataBlock-is_a-ContentBlock 连接上位类型。
      en: An A2A Part carries data={"city":"Hangzhou","temperature":21.4,"alerts":[]}. Consumers can address city, temperature, and alerts directly without first parsing a string, so the bounded payload is StructuredDataBlock and reaches its broader type through StructuredDataBlock-is_a-ContentBlock.
      ja: A2A Part の data は {"city":"杭州","temperature":21.4,"alerts":[]} です。利用側は文字列解析なしに city、temperature、alerts を直接指定できるため、この境界付きペイロードは StructuredDataBlock となり、StructuredDataBlock-is_a-ContentBlock で上位型へ接続します。
    field_values:
      block_id: data-city-001
      modality: structured-data
      mime_type: application/json
      data:
        city: Hangzhou
        temperature: 21.4
        alerts: []
    related_node_ids:
      - StructuredDataBlock
      - ContentBlock
    related_relation_ids:
      - StructuredDataBlock-is_a-ContentBlock
    expected_result:
      zh: 分类器返回 StructuredDataBlock；键、数组和数值保持其类型，application/json 只记录交换表示。
      en: The classifier returns StructuredDataBlock; keys, arrays, and numeric values retain their types, while application/json only records the interchange representation.
      ja: 分類器は StructuredDataBlock を返し、キー、配列、数値の型を保持します。application/json は交換表現を記録するだけです。
    why_valid_or_invalid:
      zh: 对象已经是可寻址的 JSON 值而不是 JSON 文本；结构可被直接验证和选择，满足结构化数据种差。
      en: The object is already an addressable JSON value rather than JSON text; its structure can be validated and selected directly, satisfying the structured-data differentia.
      ja: 対象は JSON テキストではなく指定可能な JSON 値で、構造を直接検証・選択できるため、構造化データの種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-structured-data-block-009
      - claim-structured-data-block-010
  - id: StructuredDataBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 结构化数据内容块边界例
      en: Boundary case for structured data block
      ja: 構造化データ内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: MCP TextContent 的 text 载荷为“{"city":"杭州","temperature":21.4}”。虽然字符符合 JSON 语法且 mime_type 可写 application/json，它在当前边界仍是未解析字符串，故归入 TextBlock；只有成功解析为可寻址值后，产生的新表示才可归入 StructuredDataBlock。
      en: MCP TextContent carries text="{\"city\":\"Hangzhou\",\"temperature\":21.4}". Although the characters form valid JSON and mime_type may be application/json, the current payload is still an unparsed string and therefore TextBlock; only a successfully parsed, addressable representation becomes StructuredDataBlock.
      ja: MCP TextContent の text は「{"city":"杭州","temperature":21.4}」です。文字が有効な JSON で mime_type が application/json でも、現在のペイロードは未解析文字列なので TextBlock です。解析に成功して指定可能になった新しい表現だけが StructuredDataBlock になります。
    field_values: {}
    related_node_ids:
      - StructuredDataBlock
      - TextBlock
      - ContentBlock
    related_relation_ids:
      - StructuredDataBlock-is_a-ContentBlock
    expected_result:
      zh: 原载荷保持 TextBlock；解析操作可另行产生 StructuredDataBlock，但不得仅凭 MIME 或花括号把原节点改型。
      en: The original payload remains TextBlock. Parsing may produce a separate StructuredDataBlock, but MIME or braces alone must not retype the original node.
      ja: 元ペイロードは TextBlock のままです。解析により別の StructuredDataBlock を生成できますが、MIME や波括弧だけで元ノードを型変更しません。
    why_valid_or_invalid:
      zh: 序列化语法描述字符如何编码数据，已解析结构则描述值如何被寻址；两者是不同表示阶段，不应平铺或混同。
      en: Serialization syntax describes how characters encode data, whereas parsed structure describes how values are addressed. They are distinct representation stages and must not be flattened or conflated.
      ja: 直列化構文は文字がデータをどう符号化するかを示し、解析済み構造は値をどう指定するかを示します。異なる表現段階であり、平坦化・混同しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-structured-data-block-011
      - claim-structured-data-block-012
  - id: StructuredDataBlock-example-instance-001
    kind: instance
    labels:
      zh: 结构化数据内容块结构化实例
      en: Structured instance of structured data block
      ja: 構造化データ内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 data-weather-002 保存已解析对象 {"station":"ZSHC","temperature_c":21.4,"quality":{"verified":true}}，modality="structured-data"、mime_type="application/json"。点路径 $.quality.verified 可直接返回布尔值 true。
      en: Inline instance data-weather-002 stores the parsed object {"station":"ZSHC","temperature_c":21.4,"quality":{"verified":true}} with modality="structured-data" and mime_type="application/json". Path $.quality.verified directly returns boolean true.
      ja: ノード内インスタンス data-weather-002 は解析済みオブジェクト {"station":"ZSHC","temperature_c":21.4,"quality":{"verified":true}} を modality="structured-data"、mime_type="application/json" と共に保持します。パス $.quality.verified は真偽値 true を直接返します。
    field_values:
      block_id: data-weather-002
      modality: structured-data
      mime_type: application/json
      data:
        station: ZSHC
        temperature_c: 21.4
        quality:
          verified: true
    related_node_ids:
      - StructuredDataBlock
      - ContentBlock
    related_relation_ids:
      - StructuredDataBlock-is_a-ContentBlock
    expected_result:
      zh: 实例归为 StructuredDataBlock，嵌套值类型保持可验证；不因其可序列化为 JSON 文本而重复归入 TextBlock。
      en: The instance is StructuredDataBlock with nested value types remaining verifiable; serializability as JSON text does not duplicate it under TextBlock.
      ja: インスタンスは StructuredDataBlock で、入れ子値の型を検証できます。JSON テキストへ直列化可能でも TextBlock に重複分類しません。
    why_valid_or_invalid:
      zh: 对象、数值和布尔值已经解析并可按路径寻址，满足结构化数据而非字符串表示的判据。
      en: Object, numeric, and boolean values are already parsed and path-addressable, satisfying structured data rather than string representation.
      ja: オブジェクト、数値、真偽値は解析済みでパス指定でき、文字列表現ではなく構造化データの基準を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-structured-data-block-013
      - claim-structured-data-block-014
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TextBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: StructuredDataBlock 的主载荷已解析为可寻址值；TextBlock 的主载荷仍是字符序列。字符串“{"ok":true}”在解析前属于 TextBlock，解析后的对象才属于 StructuredDataBlock。
      en: StructuredDataBlock has a primary payload already parsed into addressable values; TextBlock retains a character sequence. The string `{"ok":true}` is TextBlock before parsing and becomes StructuredDataBlock only as a parsed object.
      ja: StructuredDataBlock は指定可能値へ解析済み、TextBlock は文字列のままです。文字列 `{"ok":true}` は解析前 TextBlock、解析後オブジェクトのみ StructuredDataBlock です。
    source_claims:
      - claim-structured-data-block-001
      - claim-structured-data-block-015
parent_relation:
  id: StructuredDataBlock-is_a-ContentBlock
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: StructuredDataBlock is_a ContentBlock 表示每个结构化数据块都是有边界的信息载荷单元，并进一步要求主载荷已经解析为可按键或索引寻址的对象或数组；外观类似 JSON 的未解析字符串仍是 TextBlock。
    en: StructuredDataBlock is_a ContentBlock means every structured-data block is a bounded information-payload unit further constrained to a primary payload already parsed into a key- or index-addressable object or array. An unparsed string that looks like JSON remains TextBlock.
    ja: StructuredDataBlock is_a ContentBlock は、すべての構造化データブロックが境界付き情報ペイロード単位で、主ペイロードがキー・添字で指定可能なオブジェクト・配列へ解析済みであることを意味します。JSON 風の未解析文字列は TextBlock のままです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StructuredDataBlock-is_a-ContentBlock-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 块 health-5 的 data 为对象 {"service":"api","healthy":true}；service 与 healthy 可直接按键寻址。
        en: Block health-5 has data object {"service":"api","healthy":true}; service and healthy are directly addressable by key.
        ja: ブロック health-5 の data はオブジェクトで、service と healthy をキーで直接指定できます。
      field_values:
        block_id: health-5
        modality: structured-data
        mime_type: application/json
        encoding: utf-8
        data:
          service: api
          healthy: true
      related_node_ids:
        - StructuredDataBlock
        - ContentBlock
      related_relation_ids:
        - StructuredDataBlock-is_a-ContentBlock
      expected_result:
        zh: 分类为 StructuredDataBlock，并由父边取得 ContentBlock；键值保留在节点 schema/实例详情。
        en: Classify as StructuredDataBlock and obtain ContentBlock through the parent edge; keys and values remain node schema and instance detail.
        ja: StructuredDataBlock に分類し親辺で ContentBlock を得ます。キー値はノード schema・instance 詳細に保持します。
      why_valid_or_invalid:
        zh: 载荷已解析为可寻址对象，而不是仍需文本解析的序列化字符串。
        en: The payload is already an addressable object rather than a serialized string awaiting text parsing.
        ja: ペイロードは指定可能オブジェクトへ解析済みで、テキスト解析待ちの直列化文字列ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-structured-data-block-016
    - id: StructuredDataBlock-is_a-ContentBlock-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 块 health-raw 保存字符串“{"service":"api","healthy":true}”，但解析尚未发生。字符偏移可寻址，键值结构尚未成为规范表示，因此它是 TextBlock。
        en: Block health-raw stores the string `{"service":"api","healthy":true}` but parsing has not occurred. Character offsets are addressable, while key-value structure is not yet canonical, so it is TextBlock.
        ja: ブロック health-raw は JSON 風文字列を保持しますが未解析です。文字位置は指定できますがキー値構造は正規表現でないため TextBlock です。
      field_values: {}
      related_node_ids:
        - StructuredDataBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - StructuredDataBlock-is_a-ContentBlock
      expected_result:
        zh: 返回 TextBlock；只有显式解析产生的新值才可分类为 StructuredDataBlock。
        en: Return TextBlock; only a new explicitly parsed value can be classified as StructuredDataBlock.
        ja: TextBlock を返し、明示解析で生成した新しい値だけを StructuredDataBlock に分類します。
      why_valid_or_invalid:
        zh: 媒体类型或括号外观不能替代已解析、可寻址的结构。
        en: Media type or bracket appearance cannot replace parsed addressable structure.
        ja: media type や括弧外観は解析済み指定可能構造の代替になりません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-structured-data-block-017
  source_claims:
    - claim-structured-data-block-018
  distinct_fact_rationale:
    zh: 该边表达已解析值的类别继承，不以媒体类型字符串替代解析状态。
    en: The edge expresses class inheritance for parsed values and does not substitute a media-type string for parse state.
    ja: この辺は解析済み値の型継承を表し、media type 文字列を解析状態の代わりにしません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations: []
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
