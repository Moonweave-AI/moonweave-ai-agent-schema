schema: moonweave.ai/ontology-node/v1
id: StructuredDataBlock
kind: concept
labels:
  zh: 结构化数据内容块
  en: structured data block
  ja: 構造化データ内容ブロック
semantics:
  short_definition:
    zh: 已解析为键或索引可寻址值的结构化载荷 ContentBlock 特化。
    en: ContentBlock specialization for payloads parsed into key- or index-addressable values.
    ja: key/index addressable 値へ解析済み structured payload ContentBlock 特化。
  definition:
    zh: StructuredDataBlock 映射 Anthropic tool_use/tool_result JSON input、A2A kind=data、OpenAI 结构化 tool output；mime_type 常为 application/json。
    en: StructuredDataBlock maps Anthropic tool_use/tool_result JSON, A2A kind=data, and structured OpenAI tool outputs; mime_type often application/json.
    ja: tool_use/tool_result/data JSON→StructuredDataBlock。
  why_needed:
    zh: 结构化块使下游可验证 schema 而不把 JSON 混成 plain text。
    en: Structured blocks let downstream validate schemas instead of mixing JSON as plain text.
    ja: structured validation。
  includes:
    - zh: parsed object/array fields、mime_type、content_part_type。
      en: Parsed object/array fields, mime_type, content_part_type.
      ja: parsed fields/mime/part_type。
  excludes:
    - zh: 未解析 JSON 字符串、Message 包络、Tool 调用活动。
      en: Unparsed JSON strings, Message envelopes, and tool invocation activities.
      ja: unparsed JSON/Message/tool activity。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Anthropic tool_use id/name/input→StructuredDataBlock content_part_type=tool_use；A2A data={total_usd:128.40}→block-data-441。
    en: Anthropic tool_use id/name/input→StructuredDataBlock content_part_type=tool_use; A2A data={total_usd:128.40}→block-data-441.
    ja: tool_use/data mapping。
  typical_input:
    - description: Anthropic tool_use
      format: '{"type":"tool_use","id":"toolu_01","name":"get_weather","input":{"city":"NYC"}}'
      source_claims:
        - claim-sdblock-anthropic
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 固定为 structured-data，表示主载荷已经解析为可按键或索引寻址的值。
        en: Fixed to structured-data when the primary payload is already parsed into key- or index-addressable values.
        ja: 主ペイロードがキー・添字で指定可能な値へ解析済みである structured-data 固定値です。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: structured-data
      allowed_values:
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: StructuredDataBlock 只允许 structured-data，且主载荷必须是已解析的对象或数组。
            en: StructuredDataBlock permits only structured-data, and its primary payload must be a parsed object or array.
            ja: StructuredDataBlock は structured-data だけを許し、主ペイロードは解析済みオブジェクト・配列でなければなりません。
          status: accepted
          source_claims:
            - claim-structured-data-block-003
      source_claims:
        - claim-structured-data-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-data-001
      allowed_values: []
      source_claims:
        - claim-structured-data-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: application/json
      allowed_values: []
      source_claims:
        - claim-structured-data-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: utf-8
      allowed_values: []
      source_claims:
        - claim-structured-data-block-007
    - id: data
      labels:
        zh: 结构化值
        en: structured value
        ja: 構造化値
      definitions:
        zh: 已经解析为可按键或索引寻址的 JSON 对象或数组；未解析的 JSON 字符串仍属于 TextBlock。
        en: JSON object or array already parsed into key- or index-addressable values; an unparsed JSON string remains TextBlock.
        ja: キーまたは添字で指定可能な JSON オブジェクト・配列へ解析済みの値です。未解析 JSON 文字列は TextBlock のままです。
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        region: apac
        healthy: true
      allowed_values: []
      source_claims:
        - claim-structured-data-block-008
  constraints: []
  required_relations: []
examples:
  - id: StructuredDataBlock-example-tool-use
    labels:
      zh: tool_use 块
      en: tool_use block
      ja: tool_use block
    descriptions:
      zh: toolu_01 get_weather input JSON→StructuredDataBlock content_part_type=tool_use。
      en: toolu_01 get_weather input JSON→StructuredDataBlock content_part_type=tool_use.
      ja: tool_use block。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: tool_use
    field_values:
      content_part_type: tool_use
      tool_use_id: toolu_01
    related_node_ids:
      - StructuredDataBlock
    related_relation_ids: []
    source_claims:
      - claim-sdblock-anthropic
  - id: StructuredDataBlock-example-a2a-data
    labels:
      zh: A2A data Part
      en: A2A data Part
      ja: A2A data Part
    descriptions:
      zh: block-data-441 application/json data={total_usd:128.40}。
      en: block-data-441 application/json data={total_usd:128.40}.
      ja: A2A data block。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: data Part
    field_values:
      content_block_id: block-data-441
    related_node_ids:
      - StructuredDataBlock
    related_relation_ids: []
    source_claims:
      - claim-sdblock-a2a
  - id: StructuredDataBlock-example-not-message
    labels:
      zh: 非 Message 子类
      en: Not Message subtype
      ja: Message subtype ではない
    descriptions:
      zh: tool_use 映射 ContentBlock 不是 AssistantMessage 子类。
      en: tool_use maps to ContentBlock not AssistantMessage subtype.
      ja: tool_use≠Message subtype。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: boundary
    field_values: {}
    related_node_ids:
      - StructuredDataBlock
      - info-messages-instructions
    related_relation_ids: []
    source_claims:
      - claim-sdblock-anthropic
parent_relation:
  id: StructuredDataBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: StructuredDataBlock is_a ContentBlock 表示每个结构化数据块都是有边界的信息载荷单元，并进一步要求主载荷已经解析为可按键或索引寻址的对象或数组；外观类似 JSON 的未解析字符串仍是 TextBlock。
    en: StructuredDataBlock is_a ContentBlock means every structured-data block is a bounded information-payload unit further constrained to a primary payload already parsed into a key- or index-addressable object or array. An unparsed string that looks like JSON remains TextBlock.
    ja: StructuredDataBlock is_a ContentBlock は、すべての構造化データブロックが境界付き情報ペイロード単位で、主ペイロードがキー・添字で指定可能なオブジェクト・配列へ解析済みであることを意味します。JSON 風の未解析文字列は TextBlock のままです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StructuredDataBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: 块 health-5 的 data 为对象 {"service":"api","healthy":true}；service 与 healthy 可直接按键寻址。
        en: Block health-5 has data object {"service":"api","healthy":true}; service and healthy are directly addressable by key.
        ja: ブロック health-5 の data はオブジェクトで、service と healthy をキーで直接指定できます。
      field_values:
        block_id: health-5
        modality: structured-data
        mime_type: application/json
        encoding: utf-8
        data:
          service: api
          healthy: true
      related_node_ids:
        - StructuredDataBlock
        - ContentBlock
      related_relation_ids:
        - StructuredDataBlock-is_a-ContentBlock
      source_claims:
        - claim-structured-data-block-016
    - id: StructuredDataBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 块 health-raw 保存字符串“{"service":"api","healthy":true}”，但解析尚未发生。字符偏移可寻址，键值结构尚未成为规范表示，因此它是 TextBlock。
        en: Block health-raw stores the string `{"service":"api","healthy":true}` but parsing has not occurred. Character offsets are addressable, while key-value structure is not yet canonical, so it is TextBlock.
        ja: ブロック health-raw は JSON 風文字列を保持しますが未解析です。文字位置は指定できますがキー値構造は正規表現でないため TextBlock です。
      field_values: {}
      related_node_ids:
        - StructuredDataBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - StructuredDataBlock-is_a-ContentBlock
      source_claims:
        - claim-structured-data-block-017
  source_claims:
    - claim-structured-data-block-018
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-anthropic-content-blocks
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Content block types including tool_use/tool_result.
  - id: src-a2a-parts
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Part kinds text/file/data.
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-structured-data-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes unstructured ContentBlock arrays from optional structuredContent objects in ToolResultContent and CallToolResult. This directly supports a parsed, addressable structured representation distinct from text.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines the data carrier as arbitrary structured data represented by a JSON value and makes it exclusive with text, raw, and url. Moonweave names that representation StructuredDataBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-structured-data-block-003
    source: eng-proto-a2a-spec
    supports: A2A Part data carries a structured JSON value, directly supporting the structured-data payload form after parsing.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-004
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 provides a data alternative for arbitrary structured JSON values. Moonweave normalizes object or array payloads selected through that alternative to the structured-data payload form.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-005
    source: eng-proto-a2a-spec
    supports: A2A Part bounds one structured data value but has no part identifier. Moonweave block_id gives the parsed value a stable local identity without conflating it with Message.messageId or a source record.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-structured-data-block-006
    source: eng-proto-a2a-spec
    supports: A2A permits mediaType on a data Part, including application/json. Moonweave retains it as format metadata while classification depends on the parsed addressable value, not on a string comparison.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data and mediaType
    evidence_kind: design-inference
    confidence: high
  - id: claim-structured-data-block-007
    source: eng-proto-a2a-spec
    supports: A2A data is a JSON value rather than a Base64 raw-byte field. Moonweave records encoding only when a serialized source representation must be retained; parsed structured identity does not depend on it.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-structured-data-block-008
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines data as an arbitrary structured JSON value. Moonweave narrows StructuredDataBlock instances to parsed object or array values so their members are directly addressable.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ToolResultContent defines optional structuredContent as an object of unknown-valued properties and says it should conform to outputSchema when present; this directly supports an addressable structured-result representation.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines data as arbitrary structured data represented by a JSON value, directly supporting this object-valued StructuredDataBlock case.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent requires text:string, while ToolResultContent describes structuredContent separately. This separation supports keeping serialized JSON text distinct from an addressable structured result.
    locator: Schema Reference > ToolResultContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-structured-data-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 makes text and data mutually exclusive Part carriers; valid JSON characters in text do not turn that text carrier into the data carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ToolResultContent structuredContent is an optional structured result object; the parsed weather object is a concrete node-level instance of that representation.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits data to be any JSON value, including nested objects, numbers, and booleans; this directly supports the instance value types.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent by type="text" and text:string, providing direct evidence for a content representation whose canonical payload is an ordered character string. Moonweave places CodeBlock below TextBlock as a reviewed specialization.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-structured-data-block-016
    source: eng-proto-a2a-spec
    supports: A2A Part.data directly permits a structured JSON value; health-5 is such an object.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-017
    source: eng-proto-a2a-spec
    supports: A2A distinguishes text from data as separate oneof fields, so a serialized JSON string remains text until represented through data.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and data
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-block-018
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines Part.data as a structured JSON value. Moonweave places parsed object and array payloads under ContentBlock through StructuredDataBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
  - id: claim-sdblock-anthropic
    source: src-anthropic-content-blocks
    supports: Anthropic tool_use and tool_result blocks carry structured JSON payloads.
    locator: tool_use/tool_result
    evidence_kind: primary-api
    confidence: high
  - id: claim-sdblock-a2a
    source: src-a2a-parts
    supports: A2A data Parts map to StructuredDataBlock with JSON payloads.
    locator: data Part
    evidence_kind: primary-spec
    confidence: high
  - id: claim-sdblock-design
    source: src-info-content-design
    supports: StructuredDataBlock holds parsed objects separate from Message identity.
    locator: StructuredDataBlock
    evidence_kind: design-inference
    confidence: high
