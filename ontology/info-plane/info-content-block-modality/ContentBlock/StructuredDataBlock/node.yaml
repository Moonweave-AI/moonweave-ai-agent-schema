    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes unstructured ContentBlock arrays from optional structuredContent objects in ToolResultContent and CallToolResult. This directly supports a parsed, addressable structured representation distinct from text.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
    review_status: pending
