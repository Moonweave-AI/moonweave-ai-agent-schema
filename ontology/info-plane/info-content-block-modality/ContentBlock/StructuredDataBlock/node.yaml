schema: moonweave.ai/ontology-node/v1
id: StructuredDataBlock
kind: concept
status: accepted
labels:
  zh: 结构化数据内容块
  en: structured data block
  ja: 構造化データ内容ブロック
semantics:
  short_definition:
    zh: 结构化数据内容块是以可寻址的数据值与结构为主载荷的内容块。
    en: A structured-data block is a content block whose primary payload is an addressable data value and structure.
    ja: 構造化データ内容ブロックは、アドレス指定可能なデータ値と構造を主ペイロードとする内容ブロックです。
  definition:
    zh: 结构化数据内容块是一种内容块，其种差是载荷已经解析为具有类型和值边界的数据结构，可按属性、索引、行列或图元素寻址。对象、数组、标量记录、模式实例、表格和图片段可属于此类；仅包含 JSON、CSV 或 YAML 字符串但尚未解析的载荷仍是 TextBlock。
    en: A structured-data block is a content block differentiated by a payload already parsed into a typed data structure whose values can be addressed by property, index, row and column, or graph element. Objects, arrays, scalar records, schema instances, tables, and graph fragments qualify; an unparsed JSON, CSV, or YAML string remains a TextBlock.
    ja: 構造化データ内容ブロックは、型と値境界を持つデータ構造へ解析済みで、属性、索引、行列、グラフ要素で値を指定できる点で区別される内容ブロックです。オブジェクト、配列、スカラー記録、スキーマ実体、表、グラフ断片を含み得ますが、未解析の JSON、CSV、YAML 文字列は TextBlock のままです。
  why_needed:
    zh: 该节点把“已经可按结构查询的数据”与“仅以文本序列化的数据”分开，使模式校验、字段选择、结构化工具输出和表格下位类型都有稳定上位概念。
    en: This node separates data that is already structurally queryable from data that is merely serialized as text, providing a stable parent for schema validation, field selection, structured tool output, and the TableBlock subtype.
    ja: このノードは、構造的に照会可能なデータと、テキストとして直列化されただけのデータを分離し、スキーマ検証、項目選択、構造化ツール出力、TableBlock 下位型の安定した上位概念を与えます。
  includes:
    - zh: 纳入已解析的 JSON 对象或数组、带字段类型的记录、模式实例、关系表和可寻址图结构；空值和标量也可在其所属结构具有明确语义时纳入。
      en: Includes parsed JSON objects or arrays, typed records, schema instances, relational tables, and addressable graph structures; null and scalar values qualify when their role in the containing structure is explicit.
      ja: 解析済み JSON オブジェクト・配列、型付き記録、スキーマ実体、関係表、指定可能なグラフ構造を含みます。null やスカラー値も、所属構造での役割が明示される場合は含みます。
  excludes:
    - zh: 排除未解析的 JSON、CSV、XML 或 YAML 文本、仅凭 MIME 类型推测为数据的二进制文件，以及只有布局外观却没有行列语义的文本；表示格式不能代替已验证的数据结构。
      en: Excludes unparsed JSON, CSV, XML, or YAML text, binary files inferred to be data only from a media type, and visually aligned text without row-column semantics. A representation format does not substitute for a validated data structure.
      ja: 未解析の JSON、CSV、XML、YAML テキスト、メディア型だけでデータと推測したバイナリファイル、行列意味を持たず見た目だけ整列したテキストを除外します。表現形式は検証済みデータ構造の代わりにはなりません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 structured-data，表示主载荷已经解析为可按键或索引寻址的值。
        en: Fixed to structured-data when the primary payload is already parsed into key- or index-addressable values.
        ja: 主ペイロードがキー・添字で指定可能な値へ解析済みである structured-data 固定値です。
      allowed_values:
        - id: modality_structured_data
          value: structured-data
          labels:
            zh: structured-data
            en: structured-data
            ja: structured-data
          definitions:
            zh: StructuredDataBlock 只允许 structured-data，且主载荷必须是已解析的对象或数组。
            en: StructuredDataBlock permits only structured-data, and its primary payload must be a parsed object or array.
            ja: StructuredDataBlock は structured-data だけを許し、主ペイロードは解析済みオブジェクト・配列でなければなりません。
          status: accepted
          source_claims:
            - claim-structured-data-block-003
      pattern: null
      example_value: structured-data
      source_claims:
        - claim-structured-data-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-data-001
      source_claims:
        - claim-structured-data-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: application/json
      source_claims:
        - claim-structured-data-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: utf-8
      source_claims:
        - claim-structured-data-block-007
    - id: data
      labels:
        zh: 结构化值
        en: structured value
        ja: 構造化値
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 已经解析为可按键或索引寻址的 JSON 对象或数组；未解析的 JSON 字符串仍属于 TextBlock。
        en: JSON object or array already parsed into key- or index-addressable values; an unparsed JSON string remains TextBlock.
        ja: キーまたは添字で指定可能な JSON オブジェクト・配列へ解析済みの値です。未解析 JSON 文字列は TextBlock のままです。
      allowed_values: []
      pattern: null
      example_value:
        region: apac
        healthy: true
      source_claims:
        - claim-structured-data-block-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: StructuredDataBlock-example-positive-001

    labels:
      zh: 结构化数据内容块正例
      en: Positive example of structured data block
      ja: 構造化データ内容ブロックの正例

    descriptions: {zh: "Instructor client=instructor.from_openai(OpenAI()); create(response_model=User, messages=[...]) Pydantic validation; StructuredDataBlock maps StructuredContent/OutputFormat type-safe parsing.", en: "Instructor from_openai; create(response_model=User, messages) Pydantic validation; StructuredDataBlock maps StructuredContent/OutputFormat type-safe parsing.", ja: "Instructor response_model=User Pydantic; StructuredDataBlock StructuredContent."}

    field_values:
      block_id: data-city-001
      modality: structured-data
      mime_type: application/json
      data:
        city: Hangzhou
        temperature: 21.4
        alerts: []
    related_node_ids:
      - StructuredDataBlock
      - ContentBlock
    related_relation_ids:
      - StructuredDataBlock-is_a-ContentBlock

    source_claims:
      - claim-structured-data-block-009
      - claim-structured-data-block-010
  - id: StructuredDataBlock-example-boundary-001

    labels:
      zh: 结构化数据内容块边界例
      en: Boundary case for structured data block
      ja: 構造化データ内容ブロックの境界例

    descriptions: {zh: "Outlines constraint is OutputFormat spec; unvalidated JSON is not StructuredData; StructuredDataBlock preserves spec/wire boundary.", en: "Outlines constraint is OutputFormat spec; unvalidated JSON is not StructuredData; StructuredDataBlock preserves spec/wire boundary.", ja: "Unvalidated JSON not StructuredData."}

    field_values: {}
    related_node_ids:
      - StructuredDataBlock
      - TextBlock
      - ContentBlock
    related_relation_ids:
      - StructuredDataBlock-is_a-ContentBlock

    source_claims:
      - claim-structured-data-block-011
      - claim-structured-data-block-012
  - id: StructuredDataBlock-example-instance-001

    labels:
      zh: 结构化数据内容块结构化实例
      en: Structured instance of structured data block
      ja: 構造化データ内容ブロックの構造化インスタンス

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->StructuredDataBlock.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->StructuredDataBlock.", ja: "DSPy instance maps to StructuredDataBlock PromptTemplate."}

    field_values:
      block_id: data-weather-002
      modality: structured-data
      mime_type: application/json
      data:
        station: ZSHC
        temperature_c: 21.4
        quality:
          verified: true
    related_node_ids:
      - StructuredDataBlock
      - ContentBlock
    related_relation_ids:
      - StructuredDataBlock-is_a-ContentBlock

    source_claims:
      - claim-structured-data-block-013
      - claim-structured-data-block-014
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TextBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: StructuredDataBlock 的主载荷已解析为可寻址值；TextBlock 的主载荷仍是字符序列。字符串“{"ok":true}”在解析前属于 TextBlock，解析后的对象才属于 StructuredDataBlock。
      en: StructuredDataBlock has a primary payload already parsed into addressable values; TextBlock retains a character sequence. The string `{"ok":true}` is TextBlock before parsing and becomes StructuredDataBlock only as a parsed object.
      ja: StructuredDataBlock は指定可能値へ解析済み、TextBlock は文字列のままです。文字列 `{"ok":true}` は解析前 TextBlock、解析後オブジェクトのみ StructuredDataBlock です。
    source_claims:
      - claim-structured-data-block-001
      - claim-structured-data-block-015
parent_relation:
  id: StructuredDataBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: StructuredDataBlock is_a ContentBlock 表示每个结构化数据块都是有边界的信息载荷单元，并进一步要求主载荷已经解析为可按键或索引寻址的对象或数组；外观类似 JSON 的未解析字符串仍是 TextBlock。
    en: StructuredDataBlock is_a ContentBlock means every structured-data block is a bounded information-payload unit further constrained to a primary payload already parsed into a key- or index-addressable object or array. An unparsed string that looks like JSON remains TextBlock.
    ja: StructuredDataBlock is_a ContentBlock は、すべての構造化データブロックが境界付き情報ペイロード単位で、主ペイロードがキー・添字で指定可能なオブジェクト・配列へ解析済みであることを意味します。JSON 風の未解析文字列は TextBlock のままです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StructuredDataBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 块 health-5 的 data 为对象 {"service":"api","healthy":true}；service 与 healthy 可直接按键寻址。
        en: Block health-5 has data object {"service":"api","healthy":true}; service and healthy are directly addressable by key.
        ja: ブロック health-5 の data はオブジェクトで、service と healthy をキーで直接指定できます。
      field_values:
        block_id: health-5
        modality: structured-data
        mime_type: application/json
        encoding: utf-8
        data:
          service: api
          healthy: true
      related_node_ids:
        - StructuredDataBlock
        - ContentBlock
      related_relation_ids:
        - StructuredDataBlock-is_a-ContentBlock
      source_claims:
        - claim-structured-data-block-016
    - id: StructuredDataBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 块 health-raw 保存字符串“{"service":"api","healthy":true}”，但解析尚未发生。字符偏移可寻址，键值结构尚未成为规范表示，因此它是 TextBlock。
        en: Block health-raw stores the string `{"service":"api","healthy":true}` but parsing has not occurred. Character offsets are addressable, while key-value structure is not yet canonical, so it is TextBlock.
        ja: ブロック health-raw は JSON 風文字列を保持しますが未解析です。文字位置は指定できますがキー値構造は正規表現でないため TextBlock です。
      field_values: {}
      related_node_ids:
        - StructuredDataBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - StructuredDataBlock-is_a-ContentBlock
      source_claims:
        - claim-structured-data-block-017
  source_claims:
    - claim-structured-data-block-018
  distinct_fact_rationale:
    zh: 该边表达已解析值的类别继承，不以媒体类型字符串替代解析状态。
    en: The edge expresses class inheritance for parsed values and does not substitute a media-type string for parse state.
    ja: この辺は解析済み値の型継承を表し、media type 文字列を解析状態の代わりにしません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI/Anthropic 多模态 content parts、MCP ContentBlock union 与 A2A Part oneof 逐项核验；TextBlock/CodeBlock、StructuredDataBlock/TableBlock、ImageBlock、AudioBlock 与 FileAttachmentBlock 语义成立。
    en: Verified against OpenAI/Anthropic multimodal content parts, MCP ContentBlock union, and A2A Part oneof; TextBlock/CodeBlock, StructuredDataBlock/TableBlock, ImageBlock, AudioBlock, and FileAttachmentBlock semantics hold.
    ja: OpenAI/Anthropic multimodal content part、MCP ContentBlock union、A2A Part oneof に照らし TextBlock/CodeBlock/StructuredDataBlock/TableBlock/ImageBlock/AudioBlock/FileAttachmentBlock semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-structured-data-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 distinguishes unstructured ContentBlock arrays from optional structuredContent objects in ToolResultContent and CallToolResult. This directly supports a parsed, addressable structured representation distinct from text.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines the data carrier as arbitrary structured data represented by a JSON value and makes it exclusive with text, raw, and url. Moonweave names that representation StructuredDataBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-003
    source: eng-proto-a2a-spec
    supports: A2A Part data carries a structured JSON value, directly supporting the structured-data payload form after parsing.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-004
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 provides a data alternative for arbitrary structured JSON values. Moonweave normalizes object or array payloads selected through that alternative to the structured-data payload form.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-005
    source: eng-proto-a2a-spec
    supports: A2A Part bounds one structured data value but has no part identifier. Moonweave block_id gives the parsed value a stable local identity without conflating it with Message.messageId or a source record.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-006
    source: eng-proto-a2a-spec
    supports: A2A permits mediaType on a data Part, including application/json. Moonweave retains it as format metadata while classification depends on the parsed addressable value, not on a string comparison.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data and mediaType
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-007
    source: eng-proto-a2a-spec
    supports: A2A data is a JSON value rather than a Base64 raw-byte field. Moonweave records encoding only when a serialized source representation must be retained; parsed structured identity does not depend on it.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-008
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines data as an arbitrary structured JSON value. Moonweave narrows StructuredDataBlock instances to parsed object or array values so their members are directly addressable.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ToolResultContent defines optional structuredContent as an object of unknown-valued properties and says it should conform to outputSchema when present; this directly supports an addressable structured-result representation.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines data as arbitrary structured data represented by a JSON value, directly supporting this object-valued StructuredDataBlock case.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 TextContent requires text:string, while ToolResultContent describes structuredContent separately. This separation supports keeping serialized JSON text distinct from an addressable structured result.
    locator: Schema Reference > ToolResultContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 makes text and data mutually exclusive Part carriers; valid JSON characters in text do not turn that text carrier into the data carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ToolResultContent structuredContent is an optional structured result object; the parsed weather object is a concrete node-level instance of that representation.
    locator: Schema Reference > ToolResultContent
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits data to be any JSON value, including nested objects, numbers, and booleans; this directly supports the instance value types.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines TextContent by type="text" and text:string, providing direct evidence for a content representation whose canonical payload is an ordered character string. Moonweave places CodeBlock below TextBlock as a reviewed specialization.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-016
    source: eng-proto-a2a-spec
    supports: A2A Part.data directly permits a structured JSON value; health-5 is such an object.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-017
    source: eng-proto-a2a-spec
    supports: A2A distinguishes text from data as separate oneof fields, so a serialized JSON string remains text until represented through data.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-structured-data-block-018
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines Part.data as a structured JSON value. Moonweave places parsed object and array payloads under ContentBlock through StructuredDataBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part > data
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

