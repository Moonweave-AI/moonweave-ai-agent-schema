schema: moonweave.ai/ontology-node/v1
id: AudioBlock
kind: concept
status: accepted
labels:
  zh: 音频内容块
  en: audio block
  ja: 音声内容ブロック
semantics:
  short_definition:
    zh: 音频内容块是以可解码音频数据为主载荷的内容块。
    en: An audio block is a content block whose primary payload is decodable audio data.
    ja: 音声内容ブロックは、復号可能な音声データを主ペイロードとする内容ブロックです。
  definition:
    zh: 音频内容块是一种内容块，其种差是载荷由音频字节、编码和音频媒体类型共同解释，解码结果是声音信号。它表示原始或编码音频本身；音频的转写、摘要和说话人标签属于由该块派生的文本或结构化信息，不属于音频载荷。
    en: An audio block is a content block differentiated by a payload interpreted jointly as audio bytes, encoding, and an audio media type, yielding a sound signal when decoded. It represents the encoded or raw audio itself; transcripts, summaries, and speaker labels are derived text or structured information rather than audio payload.
    ja: 音声内容ブロックは、音声バイト、符号化方式、音声メディア型を一体として解釈し、復号すると音響信号になる点で区別される内容ブロックです。符号化済みまたは生の音声自体を表し、文字起こし、要約、話者ラベルは派生したテキストまたは構造化情報であって音声ペイロードではありません。
  why_needed:
    zh: 单独建模音频载荷，才能选择受支持的解码器、限制可接受的媒体类型并核算二进制大小，同时避免把转写文本误当成音频本身。AudioBlock-transcribed_as-TextBlock 只记录派生关系，不改变两种表示的类型。
    en: Modeling audio payload separately lets a consumer select a supported decoder, constrain media types, and account for binary size without mistaking a transcript for the audio itself. AudioBlock-transcribed_as-TextBlock records derivation while preserving both representation types.
    ja: 音声ペイロードを独立してモデル化すると、対応デコーダの選択、許可するメディア型の制限、バイナリサイズの計上ができ、文字起こしを音声自体と誤認しません。AudioBlock-transcribed_as-TextBlock は派生だけを記録し、両方の表現型を保持します。
  includes:
    - zh: 纳入具有 audio/* 媒体类型并以二进制或 Base64 形式承载的语音、音乐、环境声和其他可解码音频数据。
      en: Includes speech, music, ambient sound, and other decodable audio carried as binary or Base64 data with an audio media type.
      ja: audio/* メディア型を持ち、バイナリまたは Base64 で保持される音声、音楽、環境音その他の復号可能な音声データを含みます。
  excludes:
    - zh: 排除音频转写、字幕、摘要和说话人元数据；这些对象即使源自音频，也分别属于 TextBlock 或 StructuredDataBlock。仅指向音频文件但不携带已解码音频载荷的对象属于 FileAttachmentBlock。
      en: Excludes transcripts, captions, summaries, and speaker metadata, which remain TextBlock or StructuredDataBlock even when derived from audio. A handle that only points to an audio file without carrying its decoded audio payload is a FileAttachmentBlock.
      ja: 音声から派生していても、文字起こし、字幕、要約、話者メタデータは除外し、それぞれ TextBlock または StructuredDataBlock とします。復号済み音声を持たず音声ファイルだけを指すハンドルは FileAttachmentBlock です。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定为 audio，表示主载荷是可解码声音数据；转写文本不继承该值。
        en: Fixed to audio for a primary payload of decodable sound data; a transcript does not inherit this value.
        ja: 復号可能な音響データを主ペイロードとする audio 固定値で、文字起こしは継承しません。
      allowed_values:
        - id: modality_audio
          value: audio
          labels:
            zh: audio
            en: audio
            ja: audio
          definitions:
            zh: AudioBlock 只允许 audio，且数据与媒体类型必须共同解码为声音信号。
            en: AudioBlock permits only audio, with data and media type jointly decoding to a sound signal.
            ja: AudioBlock は audio だけを許し、データと media type が共に音響信号へ復号されなければなりません。
          status: accepted
          source_claims:
            - claim-audio-block-003
      pattern: null
      example_value: audio
      source_claims:
        - claim-audio-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: block-audio-001
      source_claims:
        - claim-audio-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      allowed_values: []
      pattern: null
      example_value: audio/wav
      source_claims:
        - claim-audio-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      allowed_values: []
      pattern: null
      example_value: binary
      source_claims:
        - claim-audio-block-007
    - id: data
      labels:
        zh: 音频数据
        en: audio data
        ja: 音声データ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 内嵌音频的 Base64 字符串；外部音频文件句柄应建模为 FileAttachmentBlock。
        en: Base64 string for embedded audio; a handle to an external audio file is modeled as FileAttachmentBlock.
        ja: 内包音声の Base64 文字列です。外部音声ファイルへのハンドルは FileAttachmentBlock とします。
      allowed_values: []
      pattern: null
      example_value: UklGRiQAAABXQVZF...
      source_claims:
        - claim-audio-block-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: AudioBlock-example-positive-001
    kind: positive
    labels:
      zh: 音频内容块正例
      en: Positive example of audio block
      ja: 音声内容ブロックの正例
    scenario_id: null
    descriptions:
      zh: MCP AudioContent audio-call-005 设置 type="audio"、mimeType="audio/wav"，data 为 8 秒语音的 base64 字节。解码后的主载荷是按时间采样的声音信号，因此归入 AudioBlock，并通过 AudioBlock-is_a-ContentBlock 取得上位身份。
      en: MCP AudioContent audio-call-005 sets type="audio", mimeType="audio/wav", and data to base64 bytes for eight seconds of speech. Its decoded primary payload is a time-sampled sound signal, so it is AudioBlock and inherits its broader identity through AudioBlock-is_a-ContentBlock.
      ja: MCP AudioContent audio-call-005 は type="audio"、mimeType="audio/wav"、data に8秒の発話を表す base64 バイトを設定します。復号後の主ペイロードは時間サンプリングされた音声信号なので AudioBlock となり、AudioBlock-is_a-ContentBlock で上位所属を得ます。
    field_values:
      block_id: audio-call-005
      modality: audio
      mime_type: audio/wav
      encoding: base64
      data: UklGR...
    related_node_ids:
      - AudioBlock
      - ContentBlock
    related_relation_ids:
      - AudioBlock-is_a-ContentBlock
    expected_result:
      zh: 分类器返回 AudioBlock；采样率、编码与 audio/wav 作为解释字段保留，不另建 WAV 平级本体节点。
      en: The classifier returns AudioBlock; sample rate, encoding, and audio/wav remain interpretive fields without a parallel WAV ontology node.
      ja: 分類器は AudioBlock を返し、サンプル率、符号化、audio/wav は解釈項目として保持します。並列の WAV 本体ノードは作りません。
    why_valid_or_invalid:
      zh: audio 判别项、可解码音频字节和时间采样结构共同确定音频表示；文字转写不是该载荷本身。
      en: The audio discriminator, decodable bytes, and time-sampled structure establish the audio representation; a transcript is not the payload itself.
      ja: audio 判別項、復号可能な音声バイト、時間サンプリング構造が音声表現を確定し、文字起こしはこのペイロード自体ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audio-block-009
      - claim-audio-block-010
  - id: AudioBlock-example-boundary-001
    kind: boundary
    labels:
      zh: 音频内容块边界例
      en: Boundary case for audio block
      ja: 音声内容ブロックの境界例
    scenario_id: null
    descriptions:
      zh: 转写节点 transcript-call-005 保存“请把超时改为六十秒”这一字符串，并由 AudioBlock-transcribed_as-TextBlock 从 audio-call-005 关联得到。它归入 TextBlock；原音频仍归 AudioBlock，二者不能因为表达相同话语就合并为同一类型。
      en: Transcript node transcript-call-005 stores the string "Set the timeout to sixty seconds" and is linked from audio-call-005 by AudioBlock-transcribed_as-TextBlock. It is TextBlock while the source remains AudioBlock; expressing the same utterance does not merge their types.
      ja: 文字起こしノード transcript-call-005 は「タイムアウトを60秒に変更してください」という文字列を保持し、audio-call-005 から AudioBlock-transcribed_as-TextBlock で関連付けられます。これは TextBlock、元音声は AudioBlock で、同じ発話内容でも型を統合しません。
    field_values: {}
    related_node_ids:
      - AudioBlock
      - TextBlock
    related_relation_ids:
      - AudioBlock-transcribed_as-TextBlock
    expected_result:
      zh: 验证器保留 AudioBlock → TextBlock 的转写方向，分别验证音频字节和文本字符串；不得把 transcript-call-005 标为 AudioBlock。
      en: Validation preserves the AudioBlock-to-TextBlock transcription direction and validates audio bytes and text string separately; transcript-call-005 is not labeled AudioBlock.
      ja: 検証器は AudioBlock → TextBlock の文字起こし方向を保持し、音声バイトと文字列を別々に検証します。transcript-call-005 を AudioBlock にしません。
    why_valid_or_invalid:
      zh: 转写是派生关系，不是种属关系；规范载荷从时间信号变为字符序列后，表示类型随之改变。
      en: Transcription is derivation, not subsumption. When the canonical payload changes from a time signal to a character sequence, the representation type changes.
      ja: 文字起こしは派生関係であり種属関係ではありません。正規ペイロードが時間信号から文字列へ変わると表現型も変わります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audio-block-011
      - claim-audio-block-012
  - id: AudioBlock-example-instance-001
    kind: instance
    labels:
      zh: 音频内容块结构化实例
      en: Structured instance of audio block
      ja: 音声内容ブロックの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例 audio-alert-013 保存单声道 16 kHz WAV 的内嵌字节，modality="audio"、mime_type="audio/wav"、encoding="base64"、block_id="audio-alert-013"。节点详情记录时长 2.4 秒；任何语音识别结果另存为 TextBlock。
      en: Inline instance audio-alert-013 stores embedded bytes for a mono 16 kHz WAV with modality="audio", mime_type="audio/wav", encoding="base64", and block_id="audio-alert-013". Node detail records a 2.4-second duration; any speech-recognition result is stored separately as TextBlock.
      ja: ノード内インスタンス audio-alert-013 はモノラル 16 kHz WAV の内包バイトを modality="audio"、mime_type="audio/wav"、encoding="base64"、block_id="audio-alert-013" と共に保持します。ノード詳細は 2.4 秒の長さを記録し、音声認識結果は別の TextBlock に保存します。
    field_values:
      block_id: audio-alert-013
      modality: audio
      mime_type: audio/wav
      encoding: base64
      data: UklGR...
    related_node_ids:
      - AudioBlock
      - ContentBlock
    related_relation_ids:
      - AudioBlock-is_a-ContentBlock
    expected_result:
      zh: 实例归为 AudioBlock，解码和时长验证通过；转写不存在时不得凭文件名生成 TextBlock。
      en: The instance is AudioBlock after decoding and duration validation; without a transcript, no TextBlock is inferred from the filename.
      ja: 復号と長さ検証後、インスタンスは AudioBlock です。文字起こしがなければファイル名から TextBlock を推論しません。
    why_valid_or_invalid:
      zh: 有效音频字节与 audio/wav 一致，且载荷按时间波形解释；encoding 和时长不改变其本体层级。
      en: Valid audio bytes agree with audio/wav and the payload is interpreted as a temporal waveform; encoding and duration do not alter its ontology level.
      ja: 有効な音声バイトは audio/wav と整合し、ペイロードは時間波形として解釈されます。符号化と長さは本体階層を変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audio-block-013
      - claim-audio-block-014
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: FileAttachmentBlock
    shared_parent_concept_id: ContentBlock
    differentia:
      zh: AudioBlock 保存已经内嵌并可解码的声音数据；FileAttachmentBlock 保存待读取外部文件的 URI 句柄。即使句柄指向 WAV，读取前仍是附件而不是 AudioBlock。
      en: AudioBlock stores embedded decodable sound data; FileAttachmentBlock stores a URI handle to an external file to be read. Even a handle to WAV remains an attachment until read.
      ja: AudioBlock は内包済み復号可能音響、FileAttachmentBlock は読取対象外部ファイル URI を保持します。WAV を指しても読取前は添付です。
    source_claims:
      - claim-audio-block-001
      - claim-audio-block-015
parent_relation:
  id: AudioBlock-is_a-ContentBlock
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: AudioBlock is_a ContentBlock 表示每个音频块首先都是有边界的信息载荷单元，并进一步要求内嵌数据与音频媒体类型共同解码为声音信号；转写文本、说话人标签和音频文件 URI 不因来源相关而成为 AudioBlock。
    en: AudioBlock is_a ContentBlock means every audio block is first a bounded information-payload unit and is further constrained to embedded data that decodes with an audio media type into a sound signal. A transcript, speaker label, or URI to an audio file does not become AudioBlock merely through provenance.
    ja: AudioBlock is_a ContentBlock は、すべての音声ブロックがまず境界付き情報ペイロード単位であり、さらに内包データが音声 media type と共に音響信号へ復号されることを意味します。文字起こし、話者ラベル、音声ファイル URI は出典関係だけで AudioBlock になりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: AudioBlock-is_a-ContentBlock-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 块 audio-17 具有 data="UklGR..."、mime_type="audio/wav"、encoding="base64"，解码结果是 WAV 声音信号。它满足 AudioBlock 的全部种差，并由本边取得 ContentBlock 成员资格。
        en: Block audio-17 has data="UklGR...", mime_type="audio/wav", and encoding="base64"; decoding yields a WAV sound signal. It satisfies the full AudioBlock differentia and obtains ContentBlock membership through this edge.
        ja: ブロック audio-17 は data="UklGR..."、mime_type="audio/wav"、encoding="base64" を持ち、復号すると WAV 音響信号になります。AudioBlock の種差を満たし、この辺で ContentBlock に属します。
      field_values:
        block_id: audio-17
        modality: audio
        mime_type: audio/wav
        encoding: base64
        data: UklGR...
      related_node_ids:
        - AudioBlock
        - ContentBlock
      related_relation_ids:
        - AudioBlock-is_a-ContentBlock
      expected_result:
        zh: 分类器返回 AudioBlock，并可沿父边查询 ContentBlock；不得额外创建“WAV”或“Base64”分类节点。
        en: Classification returns AudioBlock and exposes ContentBlock through the parent edge; no WAV or Base64 taxonomy node is created.
        ja: 分類は AudioBlock を返し、親辺から ContentBlock を照会できます。WAV や Base64 の分類ノードは作りません。
      why_valid_or_invalid:
        zh: 载荷边界、音频 media type、Base64 数据和声音解码结果相互一致，证据直接满足子类种差。
        en: Payload boundary, audio media type, Base64 data, and sound-decoding result agree and directly satisfy the subtype differentia.
        ja: ペイロード境界、音声 media type、Base64 データ、音響復号結果が一致し、下位型種差を直接満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-audio-block-016
    - id: AudioBlock-is_a-ContentBlock-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 转写块 transcript-17 保存字符串“服务已恢复”，并关联到 audio-17。虽然它来自音频，但其规范载荷是字符序列，因此是 TextBlock，不是 AudioBlock。
        en: Transcript block transcript-17 stores the string "Service restored" and is linked to audio-17. Although derived from audio, its canonical payload is a character sequence, so it is TextBlock rather than AudioBlock.
        ja: 転写ブロック transcript-17 は文字列「サービス復旧」を保持し audio-17 に関係します。音声由来でも正規ペイロードは文字列なので TextBlock であり AudioBlock ではありません。
      field_values: {}
      related_node_ids:
        - AudioBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - AudioBlock-is_a-ContentBlock
      expected_result:
        zh: 保留 audio-17 为 AudioBlock、transcript-17 为 TextBlock；来源关系不得传播 AudioBlock 类型。
        en: Keep audio-17 as AudioBlock and transcript-17 as TextBlock; provenance must not propagate the AudioBlock type.
        ja: audio-17 は AudioBlock、transcript-17 は TextBlock のままとし、出典関係で AudioBlock 型を伝播しません。
      why_valid_or_invalid:
        zh: is_a 依据对象自身的规范载荷判定，而不是依据它从哪种媒体派生。
        en: is_a follows the object's own canonical payload, not the media from which it was derived.
        ja: is_a は対象自身の正規ペイロードに従い、派生元媒体には従いません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-audio-block-017
  source_claims:
    - claim-audio-block-018
  distinct_fact_rationale:
    zh: 该层级只断言载荷类别继承，不断言转写、文件引用或播放活动。
    en: This hierarchy asserts payload-class inheritance only, not transcription, file reference, or playback activity.
    ja: この階層はペイロード型継承だけを主張し、文字起こし、ファイル参照、再生活動は主張しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: AudioBlock-transcribed_as-TextBlock
    predicate: transcribed_as
    direction: source-to-target
    relation_kind: information
    labels:
      zh: transcribed as
      en: transcribed as
      ja: transcribed as
    definitions:
      zh: AudioBlock transcribed_as TextBlock 连接一段音频载荷与由语音识别产生的文本载荷；两端保持独立 block_id、表示字段和类别，该关系只断言转写派生，不表示音频是文本或文本仍具有音频载荷。
      en: AudioBlock transcribed_as TextBlock links an audio payload to the text payload produced by speech recognition. The endpoints retain independent block IDs, representation fields, and classes; the edge asserts transcription derivation without saying audio is text or text still carries audio.
      ja: AudioBlock transcribed_as TextBlock は音声ペイロードと音声認識で生成したテキストペイロードを結びます。両端は独立 block_id、表現項目、型を保ち、転写派生だけを主張し、音声がテキスト、テキストが音声ペイロードとはしません。
    cardinality: null
    cardinality_not_applicable_reason:
