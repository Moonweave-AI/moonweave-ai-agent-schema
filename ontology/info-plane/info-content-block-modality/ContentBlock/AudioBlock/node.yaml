schema: moonweave.ai/ontology-node/v1
id: AudioBlock
kind: concept
labels:
  zh: 音频内容块
  en: audio block
  ja: 音声内容ブロック
semantics:
  short_definition:
    zh: 内嵌可解码声音数据的 ContentBlock 特化。
    en: ContentBlock specialization for embedded decodable sound data.
    ja: embedded decodable sound data ContentBlock 特化。
  definition:
    zh: AudioBlock 映射 OpenAI input_audio（data/format 如 wav）、Anthropic 音频扩展与 MCP AudioContent；encoding 常为 base64，mime_type 如 audio/wav。
    en: AudioBlock maps OpenAI input_audio (data/format such as wav), Anthropic audio extensions, and MCP AudioContent; encoding often base64 with mime_type audio/wav.
    ja: OpenAI input_audio/realtime audio。
  why_needed:
    zh: 音频块需要 format/MIME/encoding 三元组单独验证。
    en: Audio blocks need separate validation of format, MIME, and encoding triples.
    ja: audio format/MIME/encoding。
  includes:
    - zh: audio bytes/base64、format、mime_type、encoding。
      en: Audio bytes/base64, format, mime_type, encoding.
      ja: bytes/format/mime/encoding。
  excludes:
    - zh: 文本转录结果、外部音频 URL 无 bytes（可能 FileAttachmentBlock）。
      en: Text transcripts and external audio URLs without bytes (may be FileAttachmentBlock).
      ja: transcript/external URL without bytes。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI {"type":"input_audio","input_audio":{"data":"<base64>","format":"wav"}}→block-audio-3 mime_type=audio/wav encoding=base64。
    en: OpenAI {"type":"input_audio","input_audio":{"data":"<base64>","format":"wav"}}→block-audio-3 mime_type=audio/wav encoding=base64.
    ja: OpenAI input_audio mapping。
  typical_input:
    - description: OpenAI input_audio
      format: '{"type":"input_audio","input_audio":{"data":"<base64>","format":"wav"}}'
      source_claims:
        - claim-ablock-openai
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts text, image_url, input_audio.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks text, image, tool_use, tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Parts with text, file, and data kinds.
structure:
  identity_keys: []
  fields:
    - id: modality
      labels:
        zh: 载荷形式
        en: payload form
        ja: ペイロード形式
      definitions:
        zh: 固定为 audio，表示主载荷是可解码声音数据；转写文本不继承该值。
        en: Fixed to audio for a primary payload of decodable sound data; a transcript does not inherit this value.
        ja: 復号可能な音響データを主ペイロードとする audio 固定値で、文字起こしは継承しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: audio
      allowed_values:
        - id: modality_audio
          value: audio
          labels:
            zh: audio
            en: audio
            ja: audio
          definitions:
            zh: AudioBlock 只允许 audio，且数据与媒体类型必须共同解码为声音信号。
            en: AudioBlock permits only audio, with data and media type jointly decoding to a sound signal.
            ja: AudioBlock は audio だけを許し、データと media type が共に音響信号へ復号されなければなりません。
          status: accepted
          source_claims:
            - claim-audio-block-003
      source_claims:
        - claim-audio-block-004
    - id: block_id
      labels:
        zh: 内容块标识
        en: content-block ID
        ja: コンテンツブロック ID
      definitions:
        zh: 在其所属消息或内容包内稳定标识内容块。
        en: Stable identifier for the block within its containing message or content package.
        ja: 所属メッセージまたはコンテンツパッケージ内でブロックを安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: block-audio-001
      allowed_values: []
      source_claims:
        - claim-audio-block-005
    - id: mime_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 说明内容的互联网媒体类型；它是字段而非图节点。
        en: Internet media type of the content; it is a field rather than a graph node.
        ja: 内容のインターネットメディアタイプで、グラフノードではなくフィールドです。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: audio/wav
      allowed_values: []
      source_claims:
        - claim-audio-block-006
    - id: encoding
      labels:
        zh: 编码
        en: encoding
        ja: エンコーディング
      definitions:
        zh: 解释内容字节所用的字符或二进制编码。
        en: Character or binary encoding used to interpret the content bytes.
        ja: 内容バイトを解釈する文字またはバイナリエンコーディングです。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: binary
      allowed_values: []
      source_claims:
        - claim-audio-block-007
    - id: data
      labels:
        zh: 音频数据
        en: audio data
        ja: 音声データ
      definitions:
        zh: 内嵌音频的 Base64 字符串；外部音频文件句柄应建模为 FileAttachmentBlock。
        en: Base64 string for embedded audio; a handle to an external audio file is modeled as FileAttachmentBlock.
        ja: 内包音声の Base64 文字列です。外部音声ファイルへのハンドルは FileAttachmentBlock とします。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: UklGRiQAAABXQVZF...
      allowed_values: []
      source_claims:
        - claim-audio-block-008
  constraints: []
  required_relations: []
examples:
  - id: AudioBlock-example-openai-wav
    labels:
      zh: OpenAI WAV 输入
      en: OpenAI WAV input
      ja: OpenAI WAV input
    descriptions:
      zh: block-audio-3 input_audio base64 WAV mime_type=audio/wav。
      en: block-audio-3 input_audio base64 WAV mime_type=audio/wav.
      ja: OpenAI audio block。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/audio
      version: input_audio
    field_values:
      content_block_id: block-audio-3
      mime_type: audio/wav
      encoding: base64
    related_node_ids:
      - AudioBlock
    related_relation_ids: []
    source_claims:
      - claim-ablock-openai
  - id: AudioBlock-example-realtime
    labels:
      zh: Realtime 音频
      en: Realtime audio
      ja: Realtime audio
    descriptions:
      zh: OpenAI Realtime API 音频 chunk 亦映射 AudioBlock with format 声明。
      en: OpenAI Realtime API audio chunks also map to AudioBlock with declared format.
      ja: realtime audio chunk。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/realtime
      version: realtime audio
    field_values: {}
    related_node_ids:
      - AudioBlock
    related_relation_ids: []
    source_claims:
      - claim-ablock-openai
  - id: AudioBlock-example-not-transcript
    labels:
      zh: 非转录文本
      en: Not transcript text
      ja: transcript text ではない
    descriptions:
      zh: 音频转录文本结果是 TextBlock 不是 AudioBlock。
      en: Audio transcript text result is TextBlock not AudioBlock.
      ja: transcript→TextBlock。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - AudioBlock
      - TextBlock
    related_relation_ids: []
    source_claims:
      - claim-ablock-design
parent_relation:
  id: AudioBlock-is_a-ContentBlock
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: AudioBlock is_a ContentBlock 表示每个音频块首先都是有边界的信息载荷单元，并进一步要求内嵌数据与音频媒体类型共同解码为声音信号；转写文本、说话人标签和音频文件 URI 不因来源相关而成为 AudioBlock。
    en: AudioBlock is_a ContentBlock means every audio block is first a bounded information-payload unit and is further constrained to embedded data that decodes with an audio media type into a sound signal. A transcript, speaker label, or URI to an audio file does not become AudioBlock merely through provenance.
    ja: AudioBlock is_a ContentBlock は、すべての音声ブロックがまず境界付き情報ペイロード単位であり、さらに内包データが音声 media type と共に音響信号へ復号されることを意味します。文字起こし、話者ラベル、音声ファイル URI は出典関係だけで AudioBlock になりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: AudioBlock-is_a-ContentBlock-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: 块 audio-17 具有 data="UklGR..."、mime_type="audio/wav"、encoding="base64"，解码结果是 WAV 声音信号。它满足 AudioBlock 的全部种差，并由本边取得 ContentBlock 成员资格。
        en: Block audio-17 has data="UklGR...", mime_type="audio/wav", and encoding="base64"; decoding yields a WAV sound signal. It satisfies the full AudioBlock differentia and obtains ContentBlock membership through this edge.
        ja: ブロック audio-17 は data="UklGR..."、mime_type="audio/wav"、encoding="base64" を持ち、復号すると WAV 音響信号になります。AudioBlock の種差を満たし、この辺で ContentBlock に属します。
      field_values:
        block_id: audio-17
        modality: audio
        mime_type: audio/wav
        encoding: base64
        data: UklGR...
      related_node_ids:
        - AudioBlock
        - ContentBlock
      related_relation_ids:
        - AudioBlock-is_a-ContentBlock
      source_claims:
        - claim-audio-block-016
    - id: AudioBlock-is_a-ContentBlock-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 转写块 transcript-17 保存字符串“服务已恢复”，并关联到 audio-17。虽然它来自音频，但其规范载荷是字符序列，因此是 TextBlock，不是 AudioBlock。
        en: Transcript block transcript-17 stores the string "Service restored" and is linked to audio-17. Although derived from audio, its canonical payload is a character sequence, so it is TextBlock rather than AudioBlock.
        ja: 転写ブロック transcript-17 は文字列「サービス復旧」を保持し audio-17 に関係します。音声由来でも正規ペイロードは文字列なので TextBlock であり AudioBlock ではありません。
      field_values: {}
      related_node_ids:
        - AudioBlock
        - TextBlock
        - ContentBlock
      related_relation_ids:
        - AudioBlock-is_a-ContentBlock
      source_claims:
        - claim-audio-block-017
  source_claims:
    - claim-audio-block-018
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: AudioBlock-transcribed_as-TextBlock
    predicate: transcribed_as
    direction: source-to-target
    relation_kind: information
    labels:
      zh: transcribed as
      en: transcribed as
      ja: transcribed as
    definitions:
      zh: AudioBlock transcribed_as TextBlock 连接一段音频载荷与由语音识别产生的文本载荷；两端保持独立 block_id、表示字段和类别，该关系只断言转写派生，不表示音频是文本或文本仍具有音频载荷。
      en: AudioBlock transcribed_as TextBlock links an audio payload to the text payload produced by speech recognition. The endpoints retain independent block IDs, representation fields, and classes; the edge asserts transcription derivation without saying audio is text or text still carries audio.
      ja: AudioBlock transcribed_as TextBlock は音声ペイロードと音声認識で生成したテキストペイロードを結びます。両端は独立 block_id、表現項目、型を保ち、転写派生だけを主張し、音声がテキスト、テキストが音声ペイロードとはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_transcribed_as
      labels:
        zh: 反向：transcribed as
        en: is target of transcribed as
        ja: 逆方向：transcribed as
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: AudioBlock-transcribed_as-TextBlock-example-positive-001
        labels:
          zh: transcribed as正例
          en: Positive example of transcribed as
          ja: transcribed asの正例
        descriptions:
          zh: audio-call-9 保存 12 秒语音，transcript-call-9 保存“重启节点三”。语音识别记录明确以 audio-call-9 为输入并生成 transcript-call-9。
          en: audio-call-9 stores twelve seconds of speech and transcript-call-9 stores "Restart node three". The speech-recognition record explicitly names the audio as input and the text block as output.
          ja: audio-call-9 は 12 秒音声、transcript-call-9 は文字列を保持し、音声認識記録が前者を入力、後者を出力として明示します。
        field_values: {}
        related_node_ids:
          - AudioBlock
          - TextBlock
        related_relation_ids:
          - AudioBlock-transcribed_as-TextBlock
        source_claims:
          - claim-audio-block-019
      - id: AudioBlock-transcribed_as-TextBlock-example-boundary-001
        labels:
          zh: transcribed as边界例
          en: Boundary case for transcribed as
          ja: transcribed asの境界例
        descriptions:
          zh: metadata-call-9 是对象 {"speaker_count":2}，由音频分析产生但不包含转写字符串。它属于 StructuredDataBlock，不能作为 transcribed_as 的 TextBlock 目标。
          en: metadata-call-9 is object {"speaker_count":2}, produced by audio analysis but containing no transcript string. It is StructuredDataBlock and cannot be the TextBlock target of transcribed_as.
          ja: metadata-call-9 は音声分析由来のオブジェクトですが転写文字列を含みません。StructuredDataBlock であり transcribed_as の TextBlock 対象にはできません。
        field_values: {}
        related_node_ids:
          - AudioBlock
          - TextBlock
          - StructuredDataBlock
        related_relation_ids:
          - AudioBlock-transcribed_as-TextBlock
        source_claims:
          - claim-audio-block-020
    source_claims:
      - claim-audio-block-021
    layout_role: cross-link
    target: concept:TextBlock
sources:
  - id: src-openai-content-parts
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: Multimodal content parts.
  - id: src-info-content-design
    title: Moonweave info-content-block-modality module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Payload classification by observable form.
source_claims:
  - id: claim-audio-block-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines AudioContent by type="audio", base64 audio data, and required mimeType. Moonweave names this payload category AudioBlock and keeps transcripts as distinct TextBlock representations.
    locator: Schema Reference > AudioContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 can carry audio as raw bytes or a file URL with mediaType. Those transport fields support, but do not alone determine, the reviewed AudioBlock type.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-003
    source: eng-proto-mcp-spec
    supports: MCP AudioContent uses the literal discriminator type=audio, directly supporting the only allowed payload-form value for AudioBlock.
    locator: Schema Reference > AudioContent > type
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-004
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 gives AudioContent the discriminator type=audio. Moonweave records audio as the payload-form value and requires the node to satisfy AudioBlock-is_a-ContentBlock.
    locator: Schema Reference > AudioContent > type
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-005
    source: eng-proto-mcp-spec
    supports: MCP AudioContent is an individual content item inside a larger message or result. Moonweave adds block_id only to preserve the identity of that audio item across validation and rendering; it does not encode message position.
    locator: Schema Reference > AudioContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-006
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires AudioContent.mimeType and defines it as the MIME type of the audio. The value validates the audio payload but remains node detail rather than a taxonomy parent.
    locator: Schema Reference > AudioContent > mimeType
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-007
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 requires AudioContent.data to be Base64-encoded audio data. Moonweave uses encoding to declare that wire representation independently of the audio format named by mime_type.
    locator: Schema Reference > AudioContent > data
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-008
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines AudioContent.data as the Base64-encoded audio payload. This directly supports a required data field on an inline AudioBlock.
    locator: Schema Reference > AudioContent > data
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 directly defines AudioContent with type="audio", base64-encoded audio data, and required mimeType, matching the embedded audio payload in this case.
    locator: Schema Reference > AudioContent
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 permits file bytes in raw plus mediaType such as audio/wav, supporting an equivalent audio carrier while Moonweave supplies the AudioBlock classification.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-011
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 lists AudioContent and TextContent as distinct ContentBlock alternatives, directly supporting separate audio and transcript nodes.
    locator: Schema Reference > ContentBlock
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-012
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 makes raw and text mutually exclusive Part carriers; a derived transcript therefore has a different carrier from its source audio bytes.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-013
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 AudioContent requires base64 audio data and mimeType; audio-alert-013 instantiates those exact carrier fields.
    locator: Schema Reference > AudioContent
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-014
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 section 4.1.6 defines raw bytes and their base64 JSON serialization plus optional mediaType, supporting the equivalent embedded WAV carrier.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-015
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 ResourceLink explicitly carries a URI to a readable resource with name and optional mimeType and size, whereas ImageContent and AudioContent embed base64 data. Moonweave maps the reference side of this boundary to FileAttachmentBlock.
    locator: Schema Reference > ResourceLink
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-016
    source: eng-proto-mcp-spec
    supports: MCP AudioContent directly specifies type=audio, Base64 data, and an audio mimeType for an item included in ContentBlock; audio-17 instantiates those fields.
    locator: Schema Reference > AudioContent
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-017
    source: eng-proto-mcp-spec
    supports: MCP separates AudioContent from TextContent in the ContentBlock union. A transcript uses the text alternative even when produced from audio.
    locator: Schema Reference > ContentBlock, AudioContent, and TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-018
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 includes AudioContent in ContentBlock and requires type=audio, Base64 data, and mimeType. Moonweave's is_a edge abstracts that explicit union membership into a reusable ontology hierarchy.
    locator: Schema Reference > ContentBlock and AudioContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-019
    source: eng-proto-mcp-spec
    supports: MCP's separate AudioContent and TextContent alternatives support preserving different endpoint representations; the transcription edge is a Moonweave provenance specialization.
    locator: Schema Reference > AudioContent and TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-audio-block-020
    source: eng-proto-a2a-spec
    supports: A2A separates text from structured data in Part.oneof. An analysis object uses data and cannot fill a relation endpoint requiring TextBlock.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and data
    evidence_kind: normative
    confidence: high
  - id: claim-audio-block-021
    source: eng-proto-mcp-spec
    supports: MCP exposes AudioContent and TextContent as distinct ContentBlock alternatives. Moonweave transcribed_as records a reviewed derivation between instances while preserving those distinct types.
    locator: Schema Reference > ContentBlock, AudioContent, and TextContent
    evidence_kind: design-inference
    confidence: high
  - id: claim-ablock-openai
    source: src-openai-content-parts
    supports: OpenAI input_audio parts map to AudioBlock with base64 data and format.
    locator: input_audio
    evidence_kind: primary-api
    confidence: high
  - id: claim-ablock-design
    source: src-info-content-design
    supports: AudioBlock classifies embedded audio payloads separate from transcripts.
    locator: AudioBlock
    evidence_kind: design-inference
    confidence: high
