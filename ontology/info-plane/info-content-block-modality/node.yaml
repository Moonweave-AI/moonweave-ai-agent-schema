schema: moonweave.ai/ontology-node/v1
id: info-content-block-modality
kind: module
labels:
  zh: 内容表示
  en: Content representation
  ja: 内容表現
semantics:
  short_definition:
    zh: 内容表示描述可独立传递的有界载荷以及解释该载荷所需的形式、媒体类型、编码和结构字段。
    en: Content representation describes bounded payloads that can be transferred independently plus the form, media type, encoding, and structural fields needed to interpret them.
    ja: 内容表現は、独立して転送可能な有界ペイロードと、それを解釈するための形式・メディアタイプ・エンコーディング・構造フィールドを記述します。
  definition:
    zh: 本模块以 ContentBlock 为唯一根，按载荷可观察形态分为 TextBlock、CodeBlock、StructuredDataBlock、TableBlock、ImageBlock、AudioBlock 和 FileReferenceBlock 等层级。分类依据是字符串载体、代码语法、解析后的行列结构、内嵌媒体 bytes 或外部文件句柄，而不是消息角色、指令效力或披露处置。OpenAI content part 的 text、image_url、input_audio，Anthropic content block 的 text、image、tool_use、tool_result，以及 A2A Part 的 text、file、data，都映射到 ContentBlock 类型树；Message 通过 contains_content_block 关系引用它们，但不成为其上位类。SourceReference 与 SourceSpan 归 info-storage-sources；摘要、窗口截断与策略删改归 memory、disclosure 或 safety 流程。
    en: This module roots in ContentBlock and classifies by observable payload shape into TextBlock, CodeBlock, StructuredDataBlock, TableBlock, ImageBlock, AudioBlock, FileReferenceBlock, and related tiers. Classification depends on string carriers, code grammar, parsed row/column structure, embedded media bytes, or external file handles—not message role, instruction force, or disclosure disposition. OpenAI content parts text, image_url, and input_audio; Anthropic blocks text, image, tool_use, and tool_result; and A2A Parts text, file, and data all map to the ContentBlock taxonomy while Message references them through contains_content_block without being their superclass. SourceReference and SourceSpan belong to info-storage-sources; summarization, window truncation, and policy redaction belong to memory, disclosure, or safety processes.
    ja: 本モジュールは ContentBlock を唯一 root とし、文字列媒体、code grammar、解析済み row/column 構造、内包 media bytes、外部 file handle 等の可観測 payload 形状で TextBlock/CodeBlock/StructuredDataBlock/TableBlock/ImageBlock/AudioBlock/FileReferenceBlock 等へ分類します。分類依据は message role/instruction 効力/disclosure 処置ではありません。OpenAI content part text/image_url/input_audio、Anthropic block text/image/tool_use/tool_result、A2A Part text/file/data は ContentBlock taxonomy へ写像され、Message は contains_content_block で参照するだけで superclass にはなりません。SourceReference/SourceSpan は info-storage-sources、要約/window truncation/policy redaction は memory/disclosure/safety process に属します。
  why_needed:
    zh: 没有内容表示模块，同一段 base64 图片、JSON 工具结果和 Markdown 段落会被混成“消息文本”，无法单独验证 MIME、编码、语言 ID 或表格行列结构。跨协议映射与块级引用都会失去共同类型系统。
    en: Without content representation, the same base64 image, JSON tool result, and Markdown paragraph get mixed into message text with no way to validate MIME, encoding, language ID, or table row/column structure separately. Cross-protocol mapping and block-level citation lose a shared type system.
    ja: 内容表現 module がなければ、同一 base64 画像、JSON tool result、Markdown 段落が「message 文本」に混ざり、MIME/encoding/language ID/table row-column 構造を個別検証できません。プロトコル横断写像と block-level citation の共通 type system が失われます。
  includes:
    - zh: ContentBlock→TextBlock→CodeBlock 与 ContentBlock→StructuredDataBlock→TableBlock 等任意深度分类，以及图像、音频和外部文件句柄分支。
      en: Arbitrary-depth classifications including ContentBlock→TextBlock→CodeBlock and ContentBlock→StructuredDataBlock→TableBlock, plus image, audio, and external-file-handle branches.
      ja: ContentBlock→TextBlock→CodeBlock、ContentBlock→StructuredDataBlock→TableBlock 等の任意深度分類と image/audio/external file handle branch。
    - zh: 载荷形式、媒体类型、编码、局部块标识及各具体载荷字段。
      en: Payload form, media type, encoding, local block ID, and concrete payload fields.
      ja: ペイロード形式、media type、encoding、局所 block ID、具体ペイロード field。
  excludes:
    - zh: Message、ConversationTurn、消息角色与顺序归 info-messages-instructions。
      en: Message, ConversationTurn, message roles, and order belong to info-messages-instructions.
      ja: Message/ConversationTurn/message role/順序は info-messages-instructions に属します。
    - zh: SourceReference、SourceSpan 的内部层级、版本、摘要和出处归 info-storage-sources。
      en: SourceReference and SourceSpan hierarchies, versions, digests, and provenance belong to info-storage-sources.
      ja: SourceReference/SourceSpan 階層、version、digest、provenance は info-storage-sources に属します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 各 LLM API 都把“消息 envelope”和“内容 part/block”分开。OpenAI Chat Completions content[] 支持 type=text、image_url（url/detail）、input_audio（data/format）；Anthropic Messages content[] 支持 type=text、image（base64 或 url source）、tool_use（id/name/input）、tool_result（tool_use_id/content）；A2A parts[] 支持 kind=text、file（name/mimeType/bytes/uri）、data（任意 JSON）。Moonweave 用 mime_type、encoding、language_id 和结构字段把 wire part 归到最具体的 ContentBlock 类型，而不把 tool_use 直接当成 Message 子类。
    en: Each LLM API separates message envelopes from content parts or blocks. OpenAI Chat Completions content[] supports type=text, image_url (url/detail), and input_audio (data/format); Anthropic Messages content[] supports type=text, image (base64 or url source), tool_use (id/name/input), and tool_result (tool_use_id/content); A2A parts[] supports kind=text, file (name/mimeType/bytes/uri), and data (arbitrary JSON). Moonweave uses mime_type, encoding, language_id, and structural fields to classify wire parts into the most specific ContentBlock type without making tool_use a Message subtype.
    ja: 各 LLM API は message envelope と content part/block を分離します。OpenAI Chat Completions content[] は type=text/image_url/input_audio、Anthropic Messages content[] は type=text/image/tool_use/tool_result、A2A parts[] は kind=text/file/data を支持。Moonweave は mime_type/encoding/language_id/構造 field で wire part を最具体 ContentBlock 型へ分類し、tool_use を Message subtype にしません。
  typical_input:
    - description: OpenAI multimodal content parts — text, image_url, input_audio.
      format: |
        {
          "role": "user",
          "content": [
            {"type": "text", "text": "Transcribe this clip."},
            {"type": "input_audio", "input_audio": {"data": "<base64>", "format": "wav"}},
            {"type": "image_url", "image_url": {"url": "https://example.com/chart.png", "detail": "auto"}}
          ]
        }
      source_claims: [claim-info-content-openai-parts]
    - description: Anthropic content blocks — text, image, tool_use, tool_result.
      format: |
        {
          "role": "assistant",
          "content": [
            {"type": "text", "text": "I'll look that up."},
            {"type": "tool_use", "id": "toolu_01", "name": "get_weather", "input": {"city": "NYC"}},
            {"type": "tool_result", "tool_use_id": "toolu_01", "content": "72°F"}
          ]
        }
      source_claims: [claim-info-content-anthropic-blocks]
    - description: A2A Parts — text, file, and data payloads.
      format: |
        {
          "parts": [
            {"kind": "text", "text": "See attached invoice."},
            {"kind": "file", "file": {"name": "invoice.pdf", "mimeType": "application/pdf", "bytes": "<base64>"}},
            {"kind": "data", "data": {"total_usd": 128.40}}
          ]
        }
      source_claims: [claim-info-content-a2a-parts]
  typical_output:
    - description: Moonweave-local ContentBlock classification projection.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "content_block_id": "block-patch-11",
          "most_specific_class": "CodeBlock",
          "ancestor_chain": ["ContentBlock", "TextBlock", "CodeBlock"],
          "mime_type": "text/x-diff",
          "encoding": "utf-8",
          "language_id": "diff"
        }
      source_claims: [claim-info-content-design]
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: Content parts with text, image_url, and input_audio types.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks for text, image, tool_use, and tool_result.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message Parts with text, file, and data kinds.
structure:
  identity_keys: [content_block_id]
  fields:
    - id: content_block_id
      labels: {zh: 内容块标识, en: Content block identifier, ja: 内容ブロック識別子}
      definitions:
        zh: 唯一标识一个 ContentBlock 实例的稳定 ID；块身份与承载它的 message_id 分离。
        en: Stable ID uniquely identifying one ContentBlock instance, separate from the message_id that carries it.
        ja: 一 ContentBlock 实例を一意識別する安定 ID。運搬 message_id とは分離。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: block-patch-11
      allowed_values: []
      source_claims: [claim-info-content-design]
    - id: mime_type
      labels: {zh: 媒体类型, en: Media type, ja: メディアタイプ}
      definitions:
        zh: 解释载荷所需的 MIME 类型，例如 text/plain、text/x-diff、application/json、image/png；是分类的关键证据之一。
        en: MIME type required to interpret the payload, such as text/plain, text/x-diff, application/json, or image/png; a key classification evidence field.
        ja: text/plain、text/x-diff、application/json、image/png 等、payload 解釈に必要な MIME type。分類の主要 evidence の一つ。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: text/x-diff
      allowed_values: []
      source_claims: [claim-info-content-openai-parts]
    - id: encoding
      labels: {zh: 字符编码, en: Character encoding, ja: 文字エンコーディング}
      definitions:
        zh: 文本或结构化文本载荷的字符编码，例如 utf-8；二进制媒体块可为 null 并使用 bytes 字段。
        en: Character encoding for text or structured-text payloads, such as utf-8; binary media blocks may be null and use a bytes field instead.
        ja: utf-8 等、text/structured-text payload の文字 encoding。binary media block は null で bytes field を使用可。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: utf-8
      allowed_values: [utf-8, us-ascii, base64]
      source_claims: [claim-info-content-design]
    - id: language_id
      labels: {zh: 语言或语法标识, en: Language or grammar identifier, ja: 言語または文法識別子}
      definitions:
        zh: 代码或标记文本的语法标识，例如 diff、typescript、json；用于 CodeBlock 或 StructuredDataBlock 的进一步分类。
        en: Grammar identifier for code or marked-up text such as diff, typescript, or json; used for further CodeBlock or StructuredDataBlock classification.
        ja: diff/typescript/json 等、code/markup 文本の grammar 識別子。CodeBlock/StructuredDataBlock の further 分類に使用。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: diff
      allowed_values: []
      source_claims: [claim-info-content-design]
    - id: content_part_type
      labels: {zh: 协议内容部分类型, en: Protocol content part type, ja: プロトコル内容パート種別}
      definitions:
        zh: 来源协议中的 part/block/kind 类型字符串，例如 OpenAI text、Anthropic tool_use、A2A file；用于跨协议映射，不替代本体分类。
        en: Part, block, or kind type string from the source protocol, such as OpenAI text, Anthropic tool_use, or A2A file; used for cross-protocol mapping, not as the ontology classification itself.
        ja: OpenAI text、Anthropic tool_use、A2A file 等、来源 protocol の part/block/kind 型文字列。プロトコル横断写像用で ontology 分類自体の代替ではありません。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: tool_use
      allowed_values: [text, image_url, input_audio, image, tool_use, tool_result, file, data]
      source_claims: [claim-info-content-openai-parts, claim-info-content-anthropic-blocks, claim-info-content-a2a-parts]
  constraints:
    - id: info-content-table-requires-parsed-structure
      severity: error
      expression_language: plain
      expression: A payload may be classified as TableBlock only when columns and rows are explicitly parsed; a raw CSV or TSV string without parsed structure must remain TextBlock or StructuredDataBlock.
      explanation:
        zh: 跳过 StructuredDataBlock 层级直接猜 TableBlock，会把未解析字符串误当成表格证据。
        en: Skipping StructuredDataBlock to guess TableBlock misclassifies unparsed strings as tabular evidence.
        ja: StructuredDataBlock を skip して TableBlock と推測すると、未解析文字列を表形式 evidence と誤ります。
      source_claims: [claim-info-content-design]
    - id: info-content-tool-use-not-message
      severity: error
      expression_language: plain
      expression: A tool_use or tool_result wire block must map to a ContentBlock subtype and connect to Message only through contains_content_block, never as a Message subclass.
      explanation:
        zh: 把 tool_use 当成 Message 子类会混淆交互块与发言 envelope。
        en: Treating tool_use as a Message subtype conflates interaction blocks with utterance envelopes.
        ja: tool_use を Message subtype とみなすと interaction block と発話 envelope が混同されます。
      source_claims: [claim-info-content-anthropic-blocks]
  required_relations: []
examples:
  - id: info-content-example-openai-image-url-part
    labels:
      zh: OpenAI image_url 内容部分
      en: OpenAI image_url content part
      ja: OpenAI image_url 内容パート
    descriptions:
      zh: user 消息 content[] 含 type=image_url，image_url.url=https://example.com/chart.png，detail=auto。系统创建 ImageBlock block-chart-7，mime_type=image/png，content_part_type=image_url，并通过 contains_content_block 关联 message msg-842-1。
      en: A user message content[] contains type=image_url with image_url.url=https://example.com/chart.png and detail=auto. The system creates ImageBlock block-chart-7 with mime_type=image/png and content_part_type=image_url, linked to message msg-842-1 via contains_content_block.
      ja: user message content[] に type=image_url（url=https://example.com/chart.png, detail=auto）を含みます。ImageBlock block-chart-7（mime_type=image/png, content_part_type=image_url）を作成し contains_content_block で msg-842-1 にリンクします。
    example_source:
      product: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
    field_values:
      content_block_id: block-chart-7
      content_part_type: image_url
      mime_type: image/png
      image_url: https://example.com/chart.png
    related_node_ids: [info-content-block-modality, info-messages-instructions]
    related_relation_ids: []
    source_claims: [claim-info-content-openai-parts]
  - id: info-content-example-anthropic-tool-use-block
    labels:
      zh: Anthropic tool_use 内容块
      en: Anthropic tool_use content block
      ja: Anthropic tool_use 内容ブロック
    descriptions:
      zh: assistant message 含 type=tool_use block：id=toolu_01，name=get_weather，input={city:NYC}。系统映射为 StructuredDataBlock 子类 ToolUseBlock（概念上承载 tool invocation payload），content_part_type=tool_use，不将其分类为 AssistantMessage 子类。
      en: An assistant message contains type=tool_use with id=toolu_01, name=get_weather, input={city:NYC}. The system maps it to a StructuredDataBlock subtype ToolUseBlock carrying the tool invocation payload with content_part_type=tool_use, not as an AssistantMessage subtype.
      ja: assistant message に type=tool_use（id=toolu_01, name=get_weather, input={city:NYC}）を含みます。StructuredDataBlock subtype ToolUseBlock へ写像し content_part_type=tool_use とします。AssistantMessage subtype には分類しません。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
    field_values:
      content_part_type: tool_use
      tool_use_id: toolu_01
      tool_name: get_weather
    related_node_ids: [info-content-block-modality, info-messages-instructions]
    related_relation_ids: []
    source_claims: [claim-info-content-anthropic-blocks]
  - id: info-content-example-a2a-data-part
    labels:
      zh: A2A data Part 结构化块
      en: A2A data Part structured block
      ja: A2A data Part 構造化ブロック
    descriptions:
      zh: A2A Message parts[] 含 kind=data，data={total_usd:128.40,currency:USD}。系统创建 StructuredDataBlock block-data-441，mime_type=application/json，content_part_type=data，保留 JSON 结构字段供下游验证。
      en: An A2A Message parts[] entry has kind=data with data={total_usd:128.40,currency:USD}. The system creates StructuredDataBlock block-data-441 with mime_type=application/json and content_part_type=data, preserving JSON structural fields for downstream validation.
      ja: A2A Message parts[] に kind=data（data={total_usd:128.40,currency:USD}）を含みます。StructuredDataBlock block-data-441（mime_type=application/json, content_part_type=data）を作成し JSON 構造 field を downstream 検証用に保持します。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
    field_values:
      content_block_id: block-data-441
      content_part_type: data
      mime_type: application/json
    related_node_ids: [info-content-block-modality]
    related_relation_ids: []
    source_claims: [claim-info-content-a2a-parts]
  - id: info-content-example-codeblock-from-diff
    labels:
      zh: unified diff 归类为 CodeBlock
      en: Unified diff classified as CodeBlock
      ja: unified diff の CodeBlock 分類
    descriptions:
      zh: 载荷为 unified diff 字符串，language_id=diff，mime_type=text/x-diff，encoding=utf-8。分类为 CodeBlock，祖先链 CodeBlock→TextBlock→ContentBlock；不存在竞争的结构化表格或内嵌媒体证据。
      en: The payload is a unified diff string with language_id=diff, mime_type=text/x-diff, and encoding=utf-8. It classifies as CodeBlock with ancestry CodeBlock→TextBlock→ContentBlock and no competing structured-table or embedded-media evidence.
      ja: payload が unified diff 文字列（language_id=diff, mime_type=text/x-diff, encoding=utf-8）の場合 CodeBlock に分類し、祖先链 CodeBlock→TextBlock→ContentBlock。競合する structured table/embedded media evidence はありません。
    example_source:
      product: Moonweave content block design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      content_block_id: patch-11
      most_specific_class: CodeBlock
      mime_type: text/x-diff
      language_id: diff
    related_node_ids: [info-content-block-modality]
    related_relation_ids: []
    source_claims: [claim-info-content-design]
  - id: info-content-example-openai-input-audio
    labels:
      zh: OpenAI input_audio 内容部分
      en: OpenAI input_audio content part
      ja: OpenAI input_audio 内容パート
    descriptions:
      zh: user 消息含 type=input_audio，input_audio.data 为 base64 WAV，format=wav。系统创建 AudioBlock block-audio-3，mime_type=audio/wav，encoding=base64，content_part_type=input_audio。
      en: A user message contains type=input_audio with base64 WAV in input_audio.data and format=wav. The system creates AudioBlock block-audio-3 with mime_type=audio/wav, encoding=base64, and content_part_type=input_audio.
      ja: user message に type=input_audio（input_audio.data=base64 WAV, format=wav）を含みます。AudioBlock block-audio-3（mime_type=audio/wav, encoding=base64, content_part_type=input_audio）を作成します。
    example_source:
      product: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/guides/audio
    field_values:
      content_block_id: block-audio-3
      content_part_type: input_audio
      mime_type: audio/wav
      encoding: base64
    related_node_ids: [info-content-block-modality]
    related_relation_ids: []
    source_claims: [claim-info-content-openai-parts]
