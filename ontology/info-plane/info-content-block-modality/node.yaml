        en: Content representation owns ContentBlock and its representation hierarchy; messages and conversations own the Message envelope and the Message-contains_content_block-ContentBlock containment fact. Cross-domain integration connects Message directly to ContentBlock without an extra association node or message position in the payload type.
        ja: 内容表現域は ContentBlock と表現階層を所有し、メッセージ・会話域は Message 包絡と Message-contains_content_block-ContentBlock 包含事実を所有します。領域間連携は Message と ContentBlock を直接接続し、追加の関連ノードやメッセージ位置をペイロード型へ持ち込みません。
