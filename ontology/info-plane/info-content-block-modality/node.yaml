    en: content block
    ja: 内容ブロック
  owns_when:
    zh: 当对象即使脱离所在消息、业务用途和来源记录，仍能仅凭有界载荷及其必要表示字段确定类型时，由本模块拥有。
    en: Own an object when its identity is determined by a bounded payload plus the representation fields required to interpret it and remains valid without message role, purpose, or source record.
    ja: 境界付きペイロードと解釈用表現項目で同一性が決まり、メッセージ役割、用途、出典記録を除いても成立する場合に所有します。
  references_when:
    zh: 消息、提示、记忆、产物或披露对象需要声明自己承载什么形式的内容时，引用本树中最具体的 ContentBlock 节点；其包络、用途、来源和处置身份仍由各自模块拥有。
    en: When message, prompt, memory, artifact, disclosure, or source modules need a concrete payload form, they reference the most-specific ContentBlock node in this tree and use only relations defined by the unique owner.
    ja: message、prompt、memory、artifact、disclosure、source module が具体ペイロード形式を要するとき、この木の最も具体的な ContentBlock ノードと unique owner 定義関係を参照します。
