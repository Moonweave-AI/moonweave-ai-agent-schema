source_claims:
  - id: claim-info-content-block-modality-001
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ContentBlock as a closed union of concrete representation alternatives and gives each alternative its own payload fields. This is the primary protocol evidence for a content-representation root with node-local schema.
    locator: Schema Reference > ContentBlock, TextContent, ImageContent, AudioContent, ResourceLink, and EmbeddedResource
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines Part as a granular communication-content container with exactly one of text, raw, url, or data plus optional mediaType, filename, and metadata. This supports a carrier-neutral root while keeping Message separate.
    locator: A2A Protocol v1.0 > Message and 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-003
    source: eng-proto-mcp-spec
    supports: MCP TextContent provides the string carrier; Moonweave's reviewed CodeBlock child adds the required patch grammar.
    locator: Schema Reference > TextContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-004
    source: eng-proto-a2a-spec
    supports: A2A distinguishes text from data as exclusive Part alternatives, supporting TextBlock until parsing yields a data value.
    locator: A2A Protocol v1.0 > 4.1.6 Part > text and data
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-005
    source: eng-proto-a2a-spec
    supports: A2A Message.parts contains Part objects and each Part has exactly one content field, directly supporting ordered containment with independent representation.
    locator: A2A Protocol v1.0 > Message > parts and 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-006
    source: eng-proto-a2a-spec
    supports: A2A separately defines Message fields and Part content fields, so a Message containing Parts is not itself a Part.
    locator: A2A Protocol v1.0 > Message and 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-007
    source: eng-proto-mcp-spec
    supports: MCP ResourceLink directly supplies URI, mimeType, and raw byte size for the attachment side of this comparison.
    locator: Schema Reference > ResourceLink > uri, mimeType, and size
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-008
    source: eng-proto-mcp-spec
    supports: MCP defines ResourceLink.uri as the URI of the resource, so two different resolved URIs cannot be treated as one source merely from a matching name.
    locator: Schema Reference > ResourceLink > uri
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-009
    source: eng-proto-mcp-spec
    supports: MCP 2025-11-25 defines ContentBlock as an explicit union of TextContent, ImageContent, AudioContent, ResourceLink, and EmbeddedResource. Moonweave uses that carrier separation as the primary evidence for its content tree.
    locator: Schema Reference > ContentBlock
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-010
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 requires exactly one of text, raw, url, or data on each Part and supplies optional mediaType. Moonweave combines those discriminators with reviewed deeper specializations for code and tables.
    locator: A2A Protocol v1.0 > 4.1.6 Part
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-011
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines Message.parts as the container of message content and defines each Part separately with one payload field. This directly separates message identity from content representation.
    locator: A2A Protocol v1.0 > Message > parts and 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-info-content-block-modality-012
    source: eng-proto-mcp-spec
    supports: MCP SamplingMessage carries content alternatives while ContentBlock is defined independently as a representation union. Moonweave keeps the message-to-block edge as cross-module containment.
    locator: Schema Reference > SamplingMessage and ContentBlock
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
