schema: moonweave.ai/ontology-node/v1
id: info-content-block-modality
kind: module
status: accepted
labels:
  zh: 内容表示
  en: Content representation
  ja: 内容表現
semantics:
  short_definition:
    zh: 内容表示描述可独立传递的有界载荷以及解释该载荷所需的形式、媒体类型、编码和结构字段。ContentBlock 是唯一根，再按载体与数据形态分为文本、代码、结构化数据、表格、图像、音频和文件引用等层级。
    en: Content representation has ContentBlock as its sole key root, describes how a bounded payload is interpreted, and avoids flat missing levels through genuine logical chains such as Text→Code and StructuredData→Table. Message envelopes, instruction force, source identity, summarization, redaction, and window decisions remain with their unique owners and connect only through necessary cross-links.
    ja: 内容表現は ContentBlock を唯一の主要 root とし、境界付きペイロードの解釈方法を記述し、Text→Code、StructuredData→Table の真の論理階層で平坦な漏級を避けます。メッセージ包絡、指示効力、出典同一性、要約、redaction、window decision は unique owner に留め、必要な cross-link だけで接続します。
  definition:
    zh: 本模块只根据载荷本身的可观察形态分类：字符串载体属于 TextBlock，具有代码语法的文本进一步属于 CodeBlock；已解析的键值或序列属于 StructuredDataBlock，具有稳定行列结构的内容再属于 TableBlock。包含该载荷的消息、载荷的来源引用、其规范效力和披露处置均是关系对象，不是 ContentBlock 的上下位类。
    en: Content representation has ContentBlock as its sole key root, describes how a bounded payload is interpreted, and avoids flat missing levels through genuine logical chains such as Text→Code and StructuredData→Table. Message envelopes, instruction force, source identity, summarization, redaction, and window decisions remain with their unique owners and connect only through necessary cross-links.
    ja: 内容表現は ContentBlock を唯一の主要 root とし、境界付きペイロードの解釈方法を記述し、Text→Code、StructuredData→Table の真の論理階層で平坦な漏級を避けます。メッセージ包絡、指示効力、出典同一性、要約、redaction、window decision は unique owner に留め、必要な cross-link だけで接続します。
  why_needed:
    zh: 在一棵可扩展内容树中统一载荷类别、节点内 schema、验证条件和边界案例，使其他模块引用内容形式而不复制其定义。
    en: Unify payload classes, node-local schema, validation conditions, and boundary cases in one extensible content tree so other modules can reference content form without duplicating it.
    ja: 一つの拡張可能な内容木でペイロード型、ノード内 schema、検証条件、境界例を統一し、他 module が定義を複製せず内容形式を参照できるようにします。
  includes:
    - zh: ContentBlock→TextBlock→CodeBlock 与 ContentBlock→StructuredDataBlock→TableBlock 等任意深度分类，以及图像、音频和外部文件句柄分支。
      en: Arbitrary-depth classifications including ContentBlock→TextBlock→CodeBlock and ContentBlock→StructuredDataBlock→TableBlock, plus image, audio, and external-file-handle branches.
      ja: ContentBlock→TextBlock→CodeBlock、ContentBlock→StructuredDataBlock→TableBlock 等の任意深度分類と、画像、音声、外部ファイルハンドル分岐。
    - zh: 载荷形式、媒体类型、编码、局部块标识及各具体载荷字段；这些 schema、实例和引用证据只作为对应节点详情。
      en: Payload form, media type, encoding, local block ID, and concrete payload fields; schema, instances, and citations remain detail on the corresponding node.
      ja: ペイロード形式、media type、encoding、局所 block ID、具体ペイロード項目。schema、instance、citation は対応ノード詳細に留めます。
  excludes:
    - zh: Message、ConversationTurn、消息角色与顺序归消息与会话；Message 通过 contains 引用 ContentBlock，而不是其上位类或下位类。
      en: Message, ConversationTurn, message roles, and order belong to messages and conversations. Message references ContentBlock through contains and is neither its superclass nor subtype.
      ja: Message、ConversationTurn、メッセージ役割・順序は messages/conversations に属し、Message は contains で ContentBlock を参照し、上位・下位型ではありません。
    - zh: SourceReference、SourceSpan 的内部层级、版本、摘要和出处归存储与来源；本模块只保留附件引用与精确片段锚定两条不同用途的 cross-link。
      en: SourceReference and SourceSpan hierarchies, versions, digests, and provenance belong to storage and sources; this module keeps only the distinct attachment-reference and precise-span cross-links.
      ja: SourceReference/SourceSpan 階層、version、digest、provenance は storage/source に属し、本 module は添付参照と精確 span anchor の異なる二 cross-link だけを保持します。
    - zh: 摘要、窗口截断、策略删改和上下文选择属于记忆、披露或安全流程，不构成内容载荷类别。
      en: Summarization, window truncation, policy redaction, and context selection belong to memory, disclosure, or safety processes and are not payload classes.
      ja: 要約、window truncation、policy redaction、context selection は memory/disclosure/safety process に属し、ペイロード型ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 在一棵可扩展内容树中统一载荷类别、节点内 schema、验证条件和边界案例，使其他模块引用内容形式而不复制其定义。
  en: Unify payload classes, node-local schema, validation conditions, and boundary cases in one extensible content tree so other modules can reference content form without duplicating it.
  ja: 一つの拡張可能な内容木でペイロード型、ノード内 schema、検証条件、境界例を統一し、他 module が定義を複製せず内容形式を参照できるようにします。
