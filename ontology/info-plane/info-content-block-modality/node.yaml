  overlap_checks:
    - other_module_id: info-messages-instructions
      semantic_area:
        zh: 内容块与消息内容位置
        en: Content blocks versus positions within messages
        ja: 内容ブロックとメッセージ内の位置
      candidate_concept_ids:
        - TextBlock
      overlap_reason:
        zh: 同一文本既有内容形式也位于某条消息中，但形式不随发送者变化，消息身份则依赖会话和轮次。
        en: The same text has a content form and occupies a message position, but its form does not change with sender while message identity depends on conversation and turn.
        ja: 同じテキストには内容形式とメッセージ内位置がありますが、形式は送信者で変わらず、メッセージの同一性は会話とターンに依存します。
      disambiguation_test:
        zh: 若脱离 Conversation、Turn 和 sender 后对象仍以编码内容成立，则归内容表示；若身份依赖发言位置或包络，则归消息与会话。
        en: If the object remains encoded content after removing Conversation, Turn, and sender, it belongs to content representation; if identity depends on speaking position or envelope, it belongs to messages and conversations.
        ja: Conversation、Turn、sender を除いても符号化内容として成立するなら内容表現、同一性が発話位置または包絡に依存するならメッセージと会話に属します。
      result: distinct
      owner_module_id: info-content-block-modality
      source_claims:
        - claim-info-content-block-modality-023
        - claim-info-content-block-modality-024
      review:
