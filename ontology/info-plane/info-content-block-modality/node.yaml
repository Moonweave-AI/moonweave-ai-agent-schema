  - id: claim-info-content-block-modality-002
    source: eng-proto-a2a-spec
    supports: A2A Protocol v1.0 defines Part as a granular communication-content container with exactly one of text, raw, url, or data plus optional mediaType, filename, and metadata. This supports a carrier-neutral root while keeping Message separate.
    locator: A2A Protocol v1.0 > Message and 4.1.6 Part
    evidence_kind: normative
    confidence: high
    review_status: accepted
