schema: moonweave.ai/ontology-node/v1
id: IndexVersionReference
kind: concept
status: accepted
labels:
  zh: 索引版本引用
  en: index version reference
  ja: インデックス版参照
semantics:
  short_definition:
    zh: 索引版本引用是锁定某个具体索引版本或快照的来源引用。
    en: An index-version reference is a source reference that pins one specific version or snapshot of an index.
    ja: 索引版参照は、索引の特定版またはスナップショットを固定する出典参照です。
  definition:
    zh: IndexVersionReference 是 SourceReference 的一种：它通过版本 URI、快照 ID、构建摘要或等价标识指向一个 specific version 的 IndexVersion，用于重现候选来自哪一版索引。它是引用而非版本实体，不包含索引内容；只有索引 ID 而没有版本限定的记录属于 IndexPointer。
    en: IndexVersionReference is a kind of SourceReference that uses a version URI, snapshot ID, build digest, or equivalent identifier to address a specific version represented by IndexVersion, so the index state that produced a candidate can be reproduced. It is a reference rather than the version entity and contains no index content; a record with only an index ID and no version qualifier is an IndexPointer.
    ja: IndexVersionReference は SourceReference の一種で、版 URI、スナップショット ID、構築ダイジェストなどにより IndexVersion が表す specific version を指し、候補を生成した索引状態を再現できるようにします。版実体ではなく内容も含まず、版限定のない索引 ID だけなら IndexPointer です。
  why_needed:
    zh: 该概念支持追溯和重放：同一索引在刷新前后可能返回不同候选，只有明确版本引用才能证明某个发现结果使用了哪一状态，同时避免复制完整索引。
    en: The concept supports provenance and replay because the same index may return different candidates before and after refresh; only an explicit version reference identifies the state used for a result without copying the full index.
    ja: 同じ索引でも更新前後で候補が変わり得るため、この概念は出典追跡と再現を支えます。明示的版参照だけが結果に用いた状態を、索引全体を複製せず特定できます。
  includes:
    - zh: 纳入能唯一解析到索引特定状态的版本 URI、不可变快照 ID 或构建内容摘要，并保留所属索引语境。
      en: Includes version URIs, immutable snapshot IDs, or build-content digests that uniquely resolve a particular index state while preserving the owning-index context.
      ja: 特定索引状態を一意に解決し、所属索引文脈を保持する版 URI、不変スナップショット ID、構築内容ダイジェストを含みます。
  excludes:
    - zh: 排除实际 IndexVersion 实体、没有版本限定的 IndexPointer、索引构建活动和被版本引用定位的索引内容副本。
      en: Excludes the actual IndexVersion entity, an IndexPointer without version qualification, an index-build activity, and a copy of index content located by the reference.
      ja: 実際の IndexVersion 実体、版限定のない IndexPointer、索引構築活動、版参照で位置付けられる索引内容の複製を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexVersionReference-example-positive-001
    kind: positive
    labels:
      zh: 索引版本引用正例
      en: Positive example of index version reference
      ja: インデックス版参照の正例
    scenario_id: null
    descriptions:
      zh: 发现运行保存 version URI index-version://support/v4，并用它指向 support-index 的 v4 快照；即使 support-index 已刷新到 v5，该记录仍解析到 v4。
      en: A discovery run stores version URI index-version://support/v4 and uses it to address the v4 snapshot of support-index; even after support-index refreshes to v5, the record still resolves v4.
      ja: 発見実行が版 URI index-version://support/v4 を保存して support-index の v4 スナップショットを指し、索引が v5 へ更新されても記録は v4 を解決します。
    field_values:
      reference_id: source-ref-support-index-version-v4
      reference_value: index-version://support/v4
    related_node_ids:
      - IndexVersionReference
      - IndexVersion
    related_relation_ids:
      - IndexVersionReference-refers_to-IndexVersion
    expected_result:
      zh: 该 URI 被记录为 IndexVersionReference，并明确 refers_to support-index-v4 的 IndexVersion。
      en: The URI is recorded as an IndexVersionReference that refers_to the support-index-v4 IndexVersion.
      ja: URI は support-index-v4 の IndexVersion を refers_to する IndexVersionReference として記録されます。
    why_valid_or_invalid:
      zh: 固定版本标识使同一一般索引的特定状态可追溯；PROV-O 的 specialization 语义支持把特定实体状态与更一般实体区分。
      en: The pinned version identifier makes a particular state of a general index traceable; PROV-O specialization semantics support distinguishing a more specific entity state from the general entity.
      ja: 固定版識別により一般索引の特定状態を追跡でき、PROV-O の specialization 意味が特定実体状態と一般実体の区別を支えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-version-reference-003
      - claim-index-version-reference-004
  - id: IndexVersionReference-example-boundary-001
    kind: boundary
    labels:
      zh: 索引版本引用边界例
      en: Boundary case for index version reference
      ja: インデックス版参照の境界例
    scenario_id: null
    descriptions:
      zh: IndexPointer 只保存 index_id=support-index，没有版本 URI、快照 ID 或摘要；它能解析一般索引，却无法证明发现运行使用 v4 还是 v5。
      en: An IndexPointer stores only index_id=support-index, with no version URI, snapshot ID, or digest; it resolves the general index but cannot establish whether the run used v4 or v5.
      ja: IndexPointer は index_id=support-index だけを保存し、版 URI、スナップショット ID、ダイジェストを持ちません。一般索引は解決できても実行が v4 か v5 を用いたか証明できません。
    field_values: {}
    related_node_ids:
      - IndexVersionReference
      - IndexVersion
    related_relation_ids:
      - IndexVersionReference-refers_to-IndexVersion
    expected_result:
      zh: 该记录保持 IndexPointer 类型，不得分类为 IndexVersionReference。
      en: The record remains an IndexPointer and must not be classified as an IndexVersionReference.
      ja: この記録は IndexPointer のままで、IndexVersionReference に分類してはなりません。
    why_valid_or_invalid:
      zh: 一般索引标识与特定版本标识回答不同问题；缺少版本限定就无法满足可重放的版本指向条件。
      en: A general index identifier and a specific-version identifier answer different questions; without version qualification, the replay-oriented reference condition is not met.
      ja: 一般索引識別と特定版識別は別の問いに答え、版限定なしには再現向け参照条件を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-version-reference-005
      - claim-index-version-reference-006
  - id: IndexVersionReference-example-instance-001
    kind: instance
    labels:
      zh: support-index v4 引用实例
      en: support-index v4 reference instance
      ja: support-index v4 参照インスタンス
    scenario_id: null
    descriptions:
      zh: "版本引用 {version_uri: index-version://support/v4, digest: sha256:9a7c} 指向 support-index-v4，并随发现结果保存。"
      en: "Version reference {version_uri: index-version://support/v4, digest: sha256:9a7c} addresses support-index-v4 and is stored with the discovery result."
      ja: "版参照 {version_uri: index-version://support/v4, digest: sha256:9a7c} が support-index-v4 を指し、発見結果と共に保存されます。"
    field_values:
      version_uri: index-version://support/v4
      digest: sha256:9a7c
    related_node_ids:
      - IndexVersionReference
      - IndexVersion
    related_relation_ids:
      - IndexVersionReference-refers_to-IndexVersion
    expected_result:
      zh: 该记录解析到 support-index 的 v4 状态，而不是当前最新版本。
      en: The record resolves the v4 state of support-index rather than whichever version is currently latest.
      ja: 記録は現在の最新版ではなく support-index の v4 状態を解決します。
    why_valid_or_invalid:
      zh: 版本 URI 和内容摘要共同限定一个具体状态，同时记录仍只是指向该状态的引用而非索引内容。
      en: The version URI and content digest jointly qualify one specific state while the record remains a reference to that state rather than index content.
      ja: 版 URI と内容ダイジェストが特定状態を限定し、記録は索引内容ではなくその状態への参照に留まります。
    synthetic: true
    verified_version: https://www.w3.org/TR/prov-o/
    source_claims:
      - claim-index-version-reference-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: IndexVersionReference-is_a-SourceReference
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是来源引用
      en: is a source reference
      ja: 出典参照である
    definitions:
      zh: 索引版本引用是来源引用的一种，其限定差是把引用约束到某个索引的特定版本或不可变修订，从而避免“最新版本”随时间漂移。
      en: IndexVersionReference is a SourceReference whose differentia is binding the reference to a specific version or immutable revision of an index, preventing the target from drifting with an unqualified latest version.
      ja: 索引バージョン参照は出典参照の一種であり、索引の特定バージョンまたは不変リビジョンに参照を束縛し、修飾されない最新版への漂移を防ぎます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该类型关系不规定一个索引版本可拥有多少条引用。
      en: The type relation does not prescribe how many references may identify one index version.
      ja: この型関係は一つの索引版を識別できる参照数を規定しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexVersionReference-is_a-SourceReference-example-positive-001
        kind: positive
        labels:
          zh: 绑定提交修订的索引引用
          en: Index reference pinned to a revision
          ja: リビジョン固定の索引参照
        scenario_id: null
        descriptions:
          zh: 检索记录引用 index=docs-main、revision=9f42c1；重新执行时解析同一修订，因此该记录是 IndexVersionReference 和 SourceReference。
          en: A retrieval record cites index=docs-main and revision=9f42c1. Replay resolves the same revision, so the record is IndexVersionReference and SourceReference.
          ja: 検索記録が index=docs-main と revision=9f42c1 を参照し、再実行でも同じ修訂を解決するため、索引バージョン参照かつ出典参照です。
        field_values:
          index_id: docs-main
          revision: 9f42c1
        related_node_ids:
          - IndexVersionReference
          - SourceReference
          - IndexVersion
        related_relation_ids:
          - IndexVersionReference-is_a-SourceReference
        expected_result:
          zh: 接受版本固定引用的 SourceReference 归类。
          en: Accept the version-pinned record as SourceReference.
          ja: 版固定記録を出典参照として受理します。
        why_valid_or_invalid:
          zh: 索引身份与修订标识共同唯一确定被引用来源状态。
          en: The index identity and revision identifier together determine the referenced source state.
          ja: 索引識別子とリビジョン識別子が一緒に参照対象の状態を決定します。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-index-version-reference-008
      - id: IndexVersionReference-is_a-SourceReference-example-boundary-001
        kind: boundary
        labels:
          zh: 未限定版本的索引指针
          en: Unversioned index pointer
          ja: 版未指定の索引ポインタ
        scenario_id: null
        descriptions:
          zh: 记录只含 index_id=docs-main，解析时总是取得当前版本；它是 IndexPointer，但没有 specific version，不能归为 IndexVersionReference。
          en: A record contains only index_id=docs-main and resolves whichever version is current. It is an IndexPointer but lacks a specific version, so it is not IndexVersionReference.
          ja: 記録は index_id=docs-main だけを含み、その時点の最新版を解決します。索引ポインタですが特定版を欠くため索引バージョン参照ではありません。
        field_values:
          index_id: docs-main
        related_node_ids:
          - IndexVersionReference
          - SourceReference
          - IndexPointer
        related_relation_ids:
          - IndexVersionReference-is_a-SourceReference
        expected_result:
          zh: 拒绝版本引用分类，同时保留一般来源引用分类。
          en: Reject the version-reference subtype while retaining the general source-reference classification.
          ja: 版参照の下位型分類を拒否し、一般の出典参照分類は保持します。
        why_valid_or_invalid:
          zh: 父类来源引用成立不代表特定版本这一子类种差成立。
          en: Satisfying SourceReference does not prove the subtype differentia of a specific version.
          ja: 出典参照を満たしても特定版という下位型の種差は証明されません。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-index-version-reference-009
    source_claims:
      - claim-index-version-reference-010
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:SourceReference
  - id: IndexVersionReference-refers_to-IndexVersion
    predicate: refers_to
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: refers to
      en: refers to
      ja: refers to
    definitions:
      zh: 当 IndexVersionReference 携带索引身份和不可变修订标识，并由二者解析到 Memory 域拥有的特定 IndexVersion 时，该引用 refers_to 该版本。
      en: IndexVersionReference refers_to IndexVersion when an index identity plus immutable revision identifier resolves the specific persistent IndexVersion owned by Memory.
      ja: 索引識別子と不変リビジョン識別子が Memory 所有の特定 IndexVersion を解決する場合に、IndexVersionReference refers_to IndexVersion が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_refers_to
      labels:
        zh: 反向：refers to
        en: is target of refers to
        ja: 逆方向：refers to
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: IndexVersionReference 仍由 info-plane 拥有，IndexVersion 仍由 memory-plane 拥有；该 mapping 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: IndexVersionReference remains owned by info-plane and IndexVersion by memory-plane; this mapping fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: IndexVersionReference は info-plane、IndexVersion は memory-plane に引き続き所有されます。この mapping 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 IndexVersionReference → IndexVersion 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical IndexVersionReference → IndexVersion assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは IndexVersionReference → IndexVersion の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: IndexVersionReference-refers_to-IndexVersion-example-positive-001
        kind: positive
        labels:
          zh: refers to正例
          en: Positive example of refers to
          ja: refers toの正例
        scenario_id: null
        descriptions:
          zh: 检索记录保存 index_id=docs-main 与 revision=9f42c1，版本目录将这对键解析到 IndexVersion docs-main@9f42c1；该引用 refers_to 此持久版本。
          en: A retrieval record stores index_id=docs-main and revision=9f42c1, and the version catalog resolves that pair to IndexVersion docs-main@9f42c1; the reference refers_to that persistent version.
          ja: 検索記録が index_id=docs-main と revision=9f42c1 を保持し、版カタログが IndexVersion docs-main@9f42c1 へ解決するため、この参照はその永続版を指します。
        field_values: {}
        related_node_ids:
          - IndexVersionReference
          - IndexVersion
        related_relation_ids:
          - IndexVersionReference-refers_to-IndexVersion
        expected_result:
          zh: 建立版本引用到 docs-main@9f42c1 的 refers_to 边。
          en: Create the refers_to edge to docs-main@9f42c1.
          ja: docs-main@9f42c1 への refers_to 辺を作成します。
        why_valid_or_invalid:
          zh: 索引 ID 与修订 ID 联合唯一确定一个持久版本，不会随 latest 指针变化。
          en: The index ID and revision ID jointly identify one persistent version and do not drift with a latest pointer.
          ja: 索引 ID とリビジョン ID が一つの永続版を共同で識別し、latest ポインタの変化で漂移しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-version-reference-011
          - claim-index-version-reference-012
      - id: IndexVersionReference-refers_to-IndexVersion-example-boundary-001
        kind: boundary
        labels:
          zh: refers to边界例
          en: Boundary case for refers to
          ja: refers toの境界例
        scenario_id: null
        descriptions:
          zh: 记录只含 index_id=docs-main，没有 revision；目录中同时存在 9f42c1 与 b71aa0 两个 IndexVersion，不能任选一个建立 refers_to。
          en: A record contains index_id=docs-main but no revision, while the catalog contains IndexVersion 9f42c1 and b71aa0. Neither version may be chosen for refers_to.
          ja: 記録に index_id=docs-main だけがあり revision がなく、カタログに 9f42c1 と b71aa0 が存在するため、どちらかを選んで refers_to を作れません。
        field_values: {}
        related_node_ids:
          - IndexVersionReference
          - IndexVersion
        related_relation_ids:
          - IndexVersionReference-refers_to-IndexVersion
        expected_result:
          zh: 保留一般 IndexPointer，报告版本未限定。
          en: Retain only the general IndexPointer and report that the version is unqualified.
          ja: 一般の IndexPointer だけを保持し、版が限定されていないと報告します。
        why_valid_or_invalid:
          zh: refers_to 的目标必须由版本键唯一解析；索引身份只能解析一般索引，不能确定其历史状态。
          en: The refers_to target must be uniquely resolved by a version key; index identity alone resolves the general index, not one historical state.
          ja: refers_to の対象は版キーで一意に解決される必要があり、索引識別子だけでは一般索引しか解決できず歴史状態を特定できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-version-reference-013
          - claim-index-version-reference-014
    source_claims:
      - claim-index-version-reference-015
      - claim-index-version-reference-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:IndexVersion
