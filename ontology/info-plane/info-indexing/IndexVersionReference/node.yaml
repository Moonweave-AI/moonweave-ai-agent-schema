schema: moonweave.ai/ontology-node/v1
id: IndexVersionReference
kind: concept
labels:
  zh: 索引版本引用
  en: index version reference
  ja: インデックス版参照
semantics:
  short_definition:
    zh: 发现活动实际读取的索引版本引用。
    en: Reference to the index version actually read by a discovery activity.
    ja: discovery activity が実際に読んだ index version reference。
  definition:
    zh: IndexVersionReference 记录 discovery 读取的 index_version 或 cursor snapshot id；持久 Index/IndexVersion 归 memory-retrieval-ranking，本模块只记录 read 引用。
    en: IndexVersionReference records index_version or cursor snapshot id read during discovery; durable Index/IndexVersion belongs to memory-retrieval-ranking—this module records read reference only.
    ja: read-only index version reference。
  why_needed:
    zh: 版本引用使空结果或 rank 变化可解释为“读了哪版索引”，而不拥有索引对象。
    en: Version references explain empty results or rank changes as which index version was read without owning the index object.
    ja: which index version was read。
  includes:
    - zh: index_version_id、read_at、discovery_activity_id 引用。
      en: index_version_id, read_at, discovery_activity_id reference.
      ja: version/read_at/activity ref。
  excludes:
    - zh: IndexBuildRun、IndexRefreshRun、Index shard 数据。
      en: IndexBuildRun, IndexRefreshRun, and Index shard data.
      ja: build/refresh/shard data。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: disc-101 读取 index_version=codebase-2026-07-16；后续 sess-arch-99 disc-220 读取 index_version=codebase-2026-07-18 解释 rank 变化。
    en: disc-101 read index_version=codebase-2026-07-16; later sess-arch-99 disc-220 read index_version=codebase-2026-07-18 explaining rank change.
    ja: index version read reference。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: IndexVersionReference-example-read
    labels:
      zh: 读取版本
      en: Read version
      ja: read version
    descriptions:
      zh: disc-101 IndexVersionReference codebase-2026-07-16。
      en: disc-101 IndexVersionReference codebase-2026-07-16.
      ja: version read ref。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: index version
    field_values:
      index_version_id: codebase-2026-07-16
    related_node_ids:
      - IndexVersionReference
      - DiscoveryActivity
    related_relation_ids: []
    source_claims:
      - claim-iver-design
  - id: IndexVersionReference-example-rank-change
    labels:
      zh: 版本变化解释 rank
      en: Version change explains rank
      ja: version change explains rank
    descriptions:
      zh: architecture.md rank 变化因读取不同 index_version。
      en: architecture.md rank change due to different index_version read.
      ja: version explains rank drift。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: rank drift
    field_values: {}
    related_node_ids:
      - IndexVersionReference
    related_relation_ids: []
    source_claims:
      - claim-iver-design
  - id: IndexVersionReference-example-not-index
    labels:
      zh: 非 Index 对象
      en: Not Index object
      ja: Index object ではない
    descriptions:
      zh: IndexVersionReference 不是 memory-retrieval-ranking Index 节点。
      en: IndexVersionReference is not memory-retrieval-ranking Index node.
      ja: ref≠Index object。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexVersionReference
    related_relation_ids: []
    source_claims:
      - claim-iver-design
parent_relation: null
relations:
  - id: IndexVersionReference-is_a-SourceReference
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是来源引用
      en: is a source reference
      ja: 出典参照である
    definitions:
      zh: 索引版本引用是来源引用的一种，其限定差是把引用约束到某个索引的特定版本或不可变修订，从而避免“最新版本”随时间漂移。
      en: IndexVersionReference is a SourceReference whose differentia is binding the reference to a specific version or immutable revision of an index, preventing the target from drifting with an unqualified latest version.
      ja: 索引バージョン参照は出典参照の一種であり、索引の特定バージョンまたは不変リビジョンに参照を束縛し、修飾されない最新版への漂移を防ぎます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该类型关系不规定一个索引版本可拥有多少条引用。
      en: The type relation does not prescribe how many references may identify one index version.
      ja: この型関係は一つの索引版を識別できる参照数を規定しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexVersionReference-is_a-SourceReference-example-positive-001
        labels:
          zh: 绑定提交修订的索引引用
          en: Index reference pinned to a revision
          ja: リビジョン固定の索引参照
        descriptions:
          zh: 检索记录引用 index=docs-main、revision=9f42c1；重新执行时解析同一修订，因此该记录是 IndexVersionReference 和 SourceReference。
          en: A retrieval record cites index=docs-main and revision=9f42c1. Replay resolves the same revision, so the record is IndexVersionReference and SourceReference.
          ja: 検索記録が index=docs-main と revision=9f42c1 を参照し、再実行でも同じ修訂を解決するため、索引バージョン参照かつ出典参照です。
        field_values:
          index_id: docs-main
          revision: 9f42c1
        related_node_ids:
          - IndexVersionReference
          - SourceReference
          - IndexVersion
        related_relation_ids:
          - IndexVersionReference-is_a-SourceReference
        source_claims:
          - claim-index-version-reference-008
      - id: IndexVersionReference-is_a-SourceReference-example-boundary-001
        labels:
          zh: 未限定版本的索引指针
          en: Unversioned index pointer
          ja: 版未指定の索引ポインタ
        descriptions:
          zh: 记录只含 index_id=docs-main，解析时总是取得当前版本；它是 IndexPointer，但没有 specific version，不能归为 IndexVersionReference。
          en: A record contains only index_id=docs-main and resolves whichever version is current. It is an IndexPointer but lacks a specific version, so it is not IndexVersionReference.
          ja: 記録は index_id=docs-main だけを含み、その時点の最新版を解決します。索引ポインタですが特定版を欠くため索引バージョン参照ではありません。
        field_values:
          index_id: docs-main
        related_node_ids:
          - IndexVersionReference
          - SourceReference
          - IndexPointer
        related_relation_ids:
          - IndexVersionReference-is_a-SourceReference
        source_claims:
          - claim-index-version-reference-009
    source_claims:
      - claim-index-version-reference-010
    layout_role: secondary-backbone
    target: concept:SourceReference
  - id: IndexVersionReference-refers_to-IndexVersion
    predicate: refers_to
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: refers to
      en: refers to
      ja: refers to
    definitions:
      zh: 当 IndexVersionReference 携带索引身份和不可变修订标识，并由二者解析到 Memory 域拥有的特定 IndexVersion 时，该引用 refers_to 该版本。
      en: IndexVersionReference refers_to IndexVersion when an index identity plus immutable revision identifier resolves the specific persistent IndexVersion owned by Memory.
      ja: 索引識別子と不変リビジョン識別子が Memory 所有の特定 IndexVersion を解決する場合に、IndexVersionReference refers_to IndexVersion が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_refers_to
      labels:
        zh: 反向：refers to
        en: is target of refers to
        ja: 逆方向：refers to
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: IndexVersionReference 仍由 info-plane 拥有，IndexVersion 仍由 memory-plane 拥有；该 mapping 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: IndexVersionReference remains owned by info-plane and IndexVersion by memory-plane; this mapping fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: IndexVersionReference は info-plane、IndexVersion は memory-plane に引き続き所有されます。この mapping 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 IndexVersionReference → IndexVersion 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical IndexVersionReference → IndexVersion assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは IndexVersionReference → IndexVersion の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: IndexVersionReference-refers_to-IndexVersion-example-positive-001
        labels:
          zh: refers to正例
          en: Positive example of refers to
          ja: refers toの正例
        descriptions:
          zh: 检索记录保存 index_id=docs-main 与 revision=9f42c1，版本目录将这对键解析到 IndexVersion docs-main@9f42c1；该引用 refers_to 此持久版本。
          en: A retrieval record stores index_id=docs-main and revision=9f42c1, and the version catalog resolves that pair to IndexVersion docs-main@9f42c1; the reference refers_to that persistent version.
          ja: 検索記録が index_id=docs-main と revision=9f42c1 を保持し、版カタログが IndexVersion docs-main@9f42c1 へ解決するため、この参照はその永続版を指します。
        field_values: {}
        related_node_ids:
          - IndexVersionReference
          - IndexVersion
        related_relation_ids:
          - IndexVersionReference-refers_to-IndexVersion
        source_claims:
          - claim-index-version-reference-011
          - claim-index-version-reference-012
      - id: IndexVersionReference-refers_to-IndexVersion-example-boundary-001
        labels:
          zh: refers to边界例
          en: Boundary case for refers to
          ja: refers toの境界例
        descriptions:
          zh: 记录只含 index_id=docs-main，没有 revision；目录中同时存在 9f42c1 与 b71aa0 两个 IndexVersion，不能任选一个建立 refers_to。
          en: A record contains index_id=docs-main but no revision, while the catalog contains IndexVersion 9f42c1 and b71aa0. Neither version may be chosen for refers_to.
          ja: 記録に index_id=docs-main だけがあり revision がなく、カタログに 9f42c1 と b71aa0 が存在するため、どちらかを選んで refers_to を作れません。
        field_values: {}
        related_node_ids:
          - IndexVersionReference
          - IndexVersion
        related_relation_ids:
          - IndexVersionReference-refers_to-IndexVersion
        source_claims:
          - claim-index-version-reference-013
          - claim-index-version-reference-014
    source_claims:
      - claim-index-version-reference-015
      - claim-index-version-reference-016
    layout_role: cross-link
    target: concept:IndexVersion
sources:
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-index-version-reference-001
    source: eng-ont-prov-o
    supports: PROV-O specialization distinguishes a more specific entity state from a general entity, supporting a reference that pins one version of an index for provenance and replay.
    locator: W3C PROV-O > expanded terms > prov:specializationOf
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-version-reference-002
    source: eng-ont-prov-o
    supports: PROV-O defines entity identity with fixed aspects and provenance relations between entities, supporting stable identification of the exact index state used by a discovery result.
    locator: W3C PROV-O > classes > prov:Entity and qualified provenance patterns
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-version-reference-003
    source: eng-ont-prov-o
    supports: PROV-O prov:specializationOf relates a more specific entity to a more general entity sharing aspects, supporting identification of a particular versioned index state.
    locator: W3C PROV-O > expanded terms > prov:specializationOf
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-version-reference-004
    source: eng-ont-prov-o
    supports: PROV-O treats entities as things with fixed aspects during their lifetime, supporting a stable reference to the particular version state used by a run.
    locator: W3C PROV-O > classes > prov:Entity and specialization example
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-version-reference-005
    source: eng-ont-prov-o
    supports: PROV-O distinguishes a specialized entity from its more general entity, supporting the need for additional specificity beyond a general index pointer.
    locator: W3C PROV-O > expanded terms > prov:specializationOf domain and range
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-version-reference-006
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode.index_id identifies an index or retriever to delegate to but does not itself define version pinning, supporting the generic-pointer boundary.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-version-reference-007
    source: eng-ont-prov-o
    supports: PROV-O specialization supports treating a particular versioned state as a more specific entity relative to the general index, grounding this version-qualified reference instance.
    locator: W3C PROV-O > expanded terms > prov:specializationOf
    evidence_kind: normative
    confidence: high
  - id: claim-index-version-reference-008
    source: eng-ont-prov-o
    supports: PROV-O specializationOf models a more specific entity that shares a fixed aspect of a more general entity, supporting version-bound source identity.
    locator: PROV-O Section 5.5.2 > prov:specializationOf
    evidence_kind: normative
    confidence: high
  - id: claim-index-version-reference-009
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an entity's general identity from a specialization that denotes a more specific aspect, grounding the unversioned-versus-version-bound boundary.
    locator: PROV-O Section 5.5.2 > specializationOf usage note
    evidence_kind: normative
    confidence: high
  - id: claim-index-version-reference-010
    source: eng-ont-prov-o
    supports: PROV-O specialization supports distinguishing a fixed, specific state of an entity from its more general identity; Moonweave applies that pattern to a version-bound index source reference.
    locator: PROV-O Section 5.5.2 > prov:specializationOf
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-reference-011
    source: eng-ont-prov-o
    supports: PROV-O specializationOf distinguishes a specific entity state from its more general entity identity, supporting a revision-bound index version target.
    locator: PROV-O Section 5.5.2 > prov:specializationOf
    evidence_kind: normative
    confidence: high
  - id: claim-index-version-reference-012
    source: eng-ont-prov-o
    supports: PROV-O states that a specialized entity shares aspects of a general entity while fixing more specific attributes, grounding the immutable-revision interpretation.
    locator: PROV-O Section 5.5.2 > specializationOf characteristics and examples
    evidence_kind: normative
    confidence: high
  - id: claim-index-version-reference-013
    source: eng-ont-prov-o
    supports: PROV-O distinguishes a general entity from its specializations; omitting the specializing attributes leaves the specific entity underdetermined.
    locator: PROV-O Section 5.5.2 > specializationOf definition
    evidence_kind: normative
    confidence: high
  - id: claim-index-version-reference-014
    source: eng-ont-prov-o
    supports: The specialization pattern requires enough information to distinguish the specific entity state, supporting rejection of an unversioned reference as a version link.
    locator: PROV-O Section 5.5.2 > specializationOf inference and usage
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-reference-015
    source: eng-ont-prov-o
    supports: PROV-O specializationOf grounds the semantic distinction between a general indexed entity and a fixed specific state; Moonweave uses the revision key to identify the corresponding IndexVersion.
    locator: PROV-O Section 5.5.2 > prov:specializationOf
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-version-reference-016
    source: eng-ont-prov-o
    supports: "The general-to-specific entity pattern supports separate ownership: Info owns the reference while Memory owns the persistent IndexVersion target."
    locator: PROV-O Section 5.5.2 > general and specialized entity relationship
    evidence_kind: design-inference
    confidence: high
  - id: claim-iver-design
    source: src-info-indexing-design
    supports: IndexVersionReference records which index version was read without owning Index objects.
    locator: IndexVersionReference
    evidence_kind: design-inference
    confidence: high
