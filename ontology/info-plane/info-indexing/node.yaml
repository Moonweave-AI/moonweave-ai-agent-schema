schema: moonweave.ai/ontology-node/v1
id: info-indexing
kind: module
status: accepted
labels:
  zh: 会话内候选发现
  en: Session-scoped candidate discovery
  ja: セッション内候補発見
semantics:
  short_definition:
    zh: 会话内候选发现描述一次交互中如何从已知入口或索引中列举、过滤并返回尚未纳入上下文的候选项，以及当次发现的名次、分数和轨迹。它不拥有可持续查询的索引实体、索引版本引用或通用资源入口描述。
    en: Session-scoped candidate discovery records how one interaction enumerates and filters candidates from known entry points or indexes, together with the rank, score, and trace of that discovery. It does not own a durable index, an index-version reference, or a reusable resource-entry description.
    ja: セッション内候補発見は、一回の対話で既知の入口または索引から候補を列挙・絞込みし、その回の順位、得点、追跡情報を記録します。永続索引、索引版参照、再利用可能な資源入口記述は所有しません。
  definition:
    zh: 本模块的主体是 DiscoveryActivity 及其当次产生的 DiscoveryResult 和 DiscoveryMeasure；CandidateRank 表示有序位置，DiscoveryScore 表示带方法与尺度的数值，二者不得合并。LightweightRetrievalTrace 只记录当次发现。当前目录中的 DiscoveryIndex 已被定义为具有稳定结构和版本连续性的 Index，应转交“检索表示与索引”；DiscoverySurface、IndexPointer 和 IndexVersionReference 是资源描述或来源引用，应转交“来源引用与证据定位”。在这些节点完成移动前，本模块的层级不得审定。
    en: DiscoveryActivity and its session-local DiscoveryResult and DiscoveryMeasure records form the module core. CandidateRank records ordered position; DiscoveryScore records a method- and scale-qualified value; LightweightRetrievalTrace records only this discovery act. DiscoveryIndex and LightIndex require stable index identity and must move to retrieval representations and indexes. DiscoverySurface, IndexPointer, and IndexVersionReference are reusable resource or source-reference records and must move to source references and evidence location. Hierarchy review remains open until those moves are complete.
    ja: DiscoveryActivity と、そのセッション内 DiscoveryResult および DiscoveryMeasure が中核です。CandidateRank は順序位置、DiscoveryScore は方法と尺度を伴う値を表します。DiscoveryIndex と LightIndex は検索表現と索引へ、DiscoverySurface、IndexPointer、IndexVersionReference は出典参照と証拠位置へ移す必要があり、移動完了までは階層を承認しません。
  why_needed:
    zh: 以 DiscoveryActivity 为关键概念，在当前交互会话内执行轻量发现，并保留 DiscoveryResult、排名分值观测、索引视图与候选来源。
    en: Preserve the candidates, provenance, filters, rank observations, and score observations produced by lightweight discovery within one interaction session.
    ja: 一回の対話セッション内で行う軽量な候補発見について、候補、出所、絞込み条件、順位観測、得点観測を保持します。
  includes:
    - zh: DiscoveryActivity、LightweightRetrieval、DiscoveryResult、CandidateRank、DiscoveryScore、SearchResult 和 SearchScore。
      en: DiscoveryActivity, LightweightRetrieval, DiscoveryResult, CandidateRank, DiscoveryScore, SearchResult, and SearchScore.
      ja: DiscoveryActivity、LightweightRetrieval、DiscoveryResult、CandidateRank、DiscoveryScore、SearchResult、SearchScore。
    - zh: LightweightRetrievalTrace 以及发现活动实际使用的查询、过滤和候选来源关系事实。
      en: LightweightRetrievalTrace and the query, filter, and candidate-provenance relation facts actually used by the discovery activity.
      ja: LightweightRetrievalTrace と、発見活動が実際に使用した query・filter・candidate provenance の関係事実。
  excludes:
    - zh: DiscoveryIndex、LightIndex、Index、IndexVersion、Embedding、IndexShard、IndexEntry、IndexBuildRun 和 IndexRefreshRun 归“检索表示与索引”；发现活动只记录自己实际读取的索引版本。
      en: DiscoveryIndex, LightIndex, Index, IndexVersion, Embedding, IndexShard, IndexEntry, IndexBuildRun, and IndexRefreshRun belong to retrieval representations and indexes; a discovery activity only records the version it actually read.
      ja: DiscoveryIndex、LightIndex、Index、IndexVersion、Embedding、IndexShard、IndexEntry、IndexBuildRun、IndexRefreshRun は検索表現と索引に属し、発見活動は実際に読んだ索引版のみを記録します。
    - zh: DiscoverySurface、IndexPointer 与 IndexVersionReference 是可复用的资源描述或来源引用，归“来源引用与证据定位”，不因某次发现使用它们而改变 owner。
      en: DiscoverySurface, IndexPointer, and IndexVersionReference are reusable resource descriptions or source references owned by source referencing and evidence location; use by one discovery act does not change their owner.
      ja: DiscoverySurface、IndexPointer、IndexVersionReference は再利用可能な資源記述または出典参照であり、一回の発見活動が利用しても owner は変わりません。
    - zh: 跨库检索、融合、重排、TopK 和可重放 RetrievalTrace 归检索与排序；工具候选发现归能力发现与选择。
      en: Cross-store retrieval, fusion, reranking, TopK, and replayable RetrievalTrace belong to retrieval and ranking; tool-candidate discovery belongs to capability discovery and selection.
      ja: 複数ストア検索、融合、再順位付け、TopK、再生可能 RetrievalTrace は検索と順位付け、ツール候補発見は能力発見と選択に属します。
  semantic_kind: null
  aliases: []
