  owns_when:
    zh: 当对象的身份由一次会话范围内的发现运行、当次候选集、当次名次或分数观测决定，且不具有独立索引结构或版本生命周期时，由本模块拥有。
    en: Own an object when it is identified by a session-local DiscoveryActivity, DiscoveryResult, CandidateRank, or DiscoveryScore without creating persistent index identity.
    ja: 対象が session-local DiscoveryActivity、DiscoveryResult、CandidateRank、DiscoveryScore で識別され、persistent index identity を作らない場合に所有します。
  references_when:
    zh: 发现活动枚举资源入口或读取索引时，引用“来源引用与证据定位”的入口/版本引用和“检索表示与索引”的 IndexVersion；上下文组装只消费本模块产生的 DiscoveryResult。
    en: A discovery activity references reusable entry-point or version references from source references and evidence location, and an IndexVersion from retrieval representations and indexes. Context assembly consumes the DiscoveryResult produced here.
    ja: 発見活動は出典参照と証拠位置にある入口・版参照、および検索表現と索引にある IndexVersion を参照します。コンテキスト組立は本モジュールが生成した DiscoveryResult を消費します。
