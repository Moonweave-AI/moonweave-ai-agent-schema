module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 上下文发现的输入概念族为轻量发现索引；责任交接由已接受事实 发现活动 —uses→ 轻量发现索引 (DiscoveryActivity-uses-LightIndex) 明确给出。
          en: The input families for Context discovery are lightweight discovery index; the accepted facts Discovery activity —uses→ lightweight discovery index (DiscoveryActivity-uses-LightIndex) make the responsibility handoff explicit.
          ja: コンテキスト発見の入力概念族は軽量発見インデックスです。責任の受け渡しは承認済み事実 発見活動 —uses→ 軽量発見インデックス (DiscoveryActivity-uses-LightIndex) により明示されます。
        family_concept_ids:
          - LightIndex
        relation_ids:
          - DiscoveryActivity-uses-LightIndex
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 上下文发现的输出概念族为发现结果、轻量检索轨迹；责任交接由已接受事实 发现活动 —produces→ 发现结果 (DiscoveryActivity-produces-DiscoveryResult)；轻量检索轨迹 —records→ 发现结果 (LightweightRetrievalTrace-records-DiscoveryResult) 明确给出。
          en: The output families for Context discovery are discovery result, lightweight retrieval trace; the accepted facts Discovery activity —produces→ discovery result (DiscoveryActivity-produces-DiscoveryResult); lightweight retrieval trace —records→ discovery result (LightweightRetrievalTrace-records-DiscoveryResult) make the responsibility handoff explicit.
          ja: コンテキスト発見の出力概念族は発見結果、軽量検索トレースです。責任の受け渡しは承認済み事実 発見活動 —produces→ 発見結果 (DiscoveryActivity-produces-DiscoveryResult)；軽量検索トレース —records→ 発見結果 (LightweightRetrievalTrace-records-DiscoveryResult) により明示されます。
        family_concept_ids:
          - DiscoveryResult
          - LightweightRetrievalTrace
        relation_ids:
          - DiscoveryActivity-produces-DiscoveryResult
          - LightweightRetrievalTrace-records-DiscoveryResult
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。上下文组装消费 DiscoveryResult，或 DiscoveryActivity 通过 LightIndex 读取持久索引时，分别引用发现结果与 IndexVersion。
          en: This ontology does not own runtime-failure adjudication. Context assembly references DiscoveryResult when consuming discovered material, while DiscoveryActivity references IndexVersion through LightIndex when reading a persistent index.
          ja: このオントロジーは実行失敗の判定を所有しません。context assembly が discovered material を使うときは DiscoveryResult、DiscoveryActivity が LightIndex で persistent index を読むときは IndexVersion を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。上下文组装消费 DiscoveryResult，或 DiscoveryActivity 通过 LightIndex 读取持久索引时，分别引用发现结果与 IndexVersion。
          en: This ontology does not initiate a recovery workflow. Context assembly references DiscoveryResult when consuming discovered material, while DiscoveryActivity references IndexVersion through LightIndex when reading a persistent index.
          ja: このオントロジーは回復ワークフローを開始しません。context assembly が discovered material を使うときは DiscoveryResult、DiscoveryActivity が LightIndex で persistent index を読むときは IndexVersion を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: DiscoveryActivity 是唯一根，并通过 produces 接到 DiscoveryMeasure；CandidateRank 与 DiscoveryScore 再以 is_a 展开各自方法与尺度。该生成边要求同一发现运行、候选范围、计算方法与观测时间，不把缓存复制值误作本次生成；持久索引构建、融合与重排仍由 memory-retrieval-ranking 拥有。
            en: DiscoveryActivity is the sole root and reaches DiscoveryMeasure through produces; CandidateRank and DiscoveryScore then specialize it through is_a with their own methods and scales. The generation edge requires one discovery run, candidate scope, calculation method, and observation time and does not misclassify a copied cache value as newly generated. Persistent index construction, fusion, and reranking remain owned by memory-retrieval-ranking.
            ja: DiscoveryActivity を唯一 root とし produces で DiscoveryMeasure に接続し、CandidateRank と DiscoveryScore は独自 method/scale を持つ is_a subtype として展開します。generation edge には同一 discovery run・candidate scope・calculation method・observation time が必要で、cache copy を新規生成としません。persistent index build・fusion・rerank は memory-retrieval-ranking が所有します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查以 DiscoveryActivity 为唯一主根：活动产生本次发现的 DiscoveryResult 与可解释的 DiscoveryMeasure；DiscoveryMeasure 再按“有序位置”与“带尺度数值”区分 CandidateRank 和 DiscoveryScore，不能把 rank 当 score。DiscoveryActivity-produces-DiscoveryMeasure 只在运行、候选、方法和观测时间可核对时作为主父边；缓存读取和后续重排不构成本次产生。
            en: Structure review keeps DiscoveryActivity as the sole primary root. An activity produces the run's DiscoveryResult and interpretable DiscoveryMeasure; DiscoveryMeasure then separates CandidateRank as an ordinal position from DiscoveryScore as a scaled value, so rank cannot be treated as score. DiscoveryActivity-produces-DiscoveryMeasure is the primary-parent edge only when run, candidate, method, and observation time can be checked; cache reads and later reranking do not constitute production by this activity.
            ja: 構造審査は DiscoveryActivity を唯一 primary root とします。activity は当該 run の DiscoveryResult と解釈可能な DiscoveryMeasure を生成し、DiscoveryMeasure は ordinal position の CandidateRank と scaled value の DiscoveryScore を分けるため rank を score と扱えません。DiscoveryActivity-produces-DiscoveryMeasure は run・candidate・method・observation time を検証できる場合だけ primary-parent edge となり、cache read や後続 rerank は当該 activity の production ではありません。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - DiscoveryActivity
    allowed_backbone_predicates:
      - is_a
      - produces
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 领域核验确认本模块只拥有会话内或轻量发现的活动、结果、名次与分数解释；持久 IndexVersion 的构建、候选融合、重排与最终采用分别留给表示与索引、检索与排序以及上下文组装。相同候选可同时有 CandidateRank 与 DiscoveryScore，但两者回答不同问题、使用不同尺度，不能合并为一个通用数值节点。
            en: Domain review confirms that this module owns session-scoped or lightweight discovery activities, results, ranks, and score interpretations. Persistent IndexVersion construction, candidate fusion, reranking, and final admission remain with representations and indexes, retrieval and ranking, and context assembly respectively. The same candidate may have both CandidateRank and DiscoveryScore, but they answer different questions on different scales and cannot be merged into one generic numeric node.
            ja: domain 審査は本 module が session-scoped/lightweight discovery の activity・result・rank・score interpretation のみを所有すると確認します。persistent IndexVersion build、candidate fusion、rerank、final admission はそれぞれ representation/index、retrieval/ranking、context assembly に残します。同じ candidate が CandidateRank と DiscoveryScore の両方を持てますが、問いと尺度が異なるため一つの generic numeric node に統合できません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体主干从 DiscoveryActivity 分出活动特化、产生的 DiscoveryResult 与产生的 DiscoveryMeasure；其中 DiscoveryActivity —produces→ DiscoveryResult 是结果在本域中的直接显示父边。DiscoveryResult —is_a→ RetrievalArtifact 仍保留跨域类型真值，但降为次级骨架；结果继续特化为 SearchResult，度量继续特化为 CandidateRank、DiscoveryScore 与 SearchScore。produces 只提供类级阅读入口，不施加每次活动必产结果的全称基数。
            en: The ontology backbone branches from DiscoveryActivity to activity specializations, produced DiscoveryResult, and produced DiscoveryMeasure. DiscoveryActivity —produces→ DiscoveryResult is the result's direct domain display parent. DiscoveryResult —is_a→ RetrievalArtifact retains its cross-domain type truth as a secondary backbone. Results continue into SearchResult, while measures specialize into CandidateRank, DiscoveryScore, and SearchScore. The produces display reading does not impose a universal requirement that every activity return a result.
            ja: ontology backbone は DiscoveryActivity から activity specialization、生成 DiscoveryResult、生成 DiscoveryMeasure に分岐します。DiscoveryActivity —produces→ DiscoveryResult は result の本 domain 直接表示親です。DiscoveryResult —is_a→ RetrievalArtifact は cross-domain 型真値を secondary backbone として保持します。result は SearchResult、measure は CandidateRank・DiscoveryScore・SearchScore へ続き、produces 表示は全 activity が結果を返すという全称制約を課しません。
