      primary_owner_module_id: info-indexing
      related_module_ids:
        - memory-retrieval-ranking
      questions:
        zh: 一个候选结果属于会话内发现，还是属于带索引版本、融合和重排证据的持久检索？
        en: Is a candidate result session-local discovery or persistent retrieval with index-version, fusion, and reranking evidence?
        ja: 候補結果はセッション内発見ですか、それとも索引版、融合、再順位付け証拠を持つ永続検索ですか。
      query: "Classify the result by identity: interaction session and lightweight query versus RetrievalRequest, index version, scoring pipeline, and replay trace."
      expected_assertion: Session-only candidates belong to context discovery; results requiring a replayable retrieval pipeline belong to retrieval and ranking.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - DiscoveryResult
          - CandidateRank
        related_concept_ids:
          - RetrievedCandidate
          - RetrievalTrace
        relation_ids: []
        not_applicable_reason:
          zh: 发现结果与持久检索候选按身份条件比较，但二者之间不存在普适的已接受跨模块关系：一次发现可能不启动检索，而一次检索也可能不经过会话内发现。因此这里只比较双方证据，不创建虚假的直连边。
          en: "Discovery results and persistent retrieval candidates are compared by identity conditions, but no universal accepted cross-module relation connects them: a discovery need not start retrieval, and retrieval need not pass through session-local discovery. The CQ therefore compares evidence on both sides without inventing a direct edge."
          ja: discovery result と永続 retrieval candidate は同一性条件で比較しますが、両者を常に結ぶ承認済みモジュール間関係はありません。discovery が retrieval を開始しない場合も、retrieval が session-local discovery を経ない場合もあるため、虚偽の直結辺を作らず双方の証拠を比較します。
