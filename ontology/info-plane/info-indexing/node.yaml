      decision: owns
      owner_module_id: info-indexing
      rationale:
        zh: 本行拥有 DiscoveryIndex 与 IndexVersionReference。DiscoveryIndex 以可被发现活动查询的稳定索引结构和身份严格特化通用 Index；IndexVersionReference 则以来源引用身份固定指向某个 IndexVersion。一个是索引实体，一个是版本引用，不能因共同出现 index_id 而并为平级节点。
        en: This row owns DiscoveryIndex and IndexVersionReference. DiscoveryIndex strictly specializes generic Index through stable index structure and identity queryable by discovery activities, whereas IndexVersionReference is a source-reference identity fixed to one IndexVersion. One is an index entity and the other a version reference; a shared index_id does not make them peers of one kind.
        ja: この行は DiscoveryIndex と IndexVersionReference を所有します。DiscoveryIndex は discovery activity が query できる stable index structure／identity により共通 Index を厳密特殊化し、IndexVersionReference は一 IndexVersion に固定された source-reference identity です。一方は index entity、他方は version reference で、共通 index_id により同種平級にはなりません。
