schema: moonweave.ai/ontology-node/v1
id: info-indexing
kind: module
labels:
  zh: 会话内候选发现
  en: Session-scoped candidate discovery
  ja: セッション内候補発見
semantics:
  short_definition:
    zh: 会话内候选发现记录一次交互中如何从已知入口或索引列举、过滤并返回尚未纳入上下文的候选项，以及当次发现的名次、分数和轨迹。
    en: Session-scoped candidate discovery records how one interaction enumerates and filters candidates from known entry points or indexes, together with the rank, score, and trace of that discovery act.
    ja: セッション内候補発見は、一回の対話で既知入口または索引から候補を列挙・絞込みし、その回の順位・得点・追跡情報を記録します。
  definition:
    zh: 本模块以 DiscoveryActivity 为关键概念，拥有当次产生的 DiscoveryResult、CandidateRank、DiscoveryScore 和 LightweightRetrievalTrace。它回答“这次交互发现了哪些候选、各自来自哪里、匹配了什么条件、以什么名次和分数出现”，但不拥有可持续查询的 Index、IndexVersion 或通用资源入口描述。MCP resources/list 与 prompts/list 提供会话内枚举入口；客户端 semantic search 或 @ 引用解析返回的命中列表属于当次 DiscoveryResult，而不是持久检索管线产物。跨库检索、融合、重排与可重放 RetrievalTrace 归 memory-retrieval-ranking；工具候选发现归 tool-discovery-selection。
    en: This module keys on DiscoveryActivity and owns session-local DiscoveryResult, CandidateRank, DiscoveryScore, and LightweightRetrievalTrace records. It answers which candidates this interaction discovered, where each originated, which predicate it matched, and with what rank and score—but does not own durable Index, IndexVersion, or reusable resource-entry descriptions. MCP resources/list and prompts/list provide session-local enumeration entry points; client semantic search or @ reference resolution hit lists are DiscoveryResults for that act, not persistent retrieval pipeline artifacts. Cross-store retrieval, fusion, reranking, and replayable RetrievalTrace belong to memory-retrieval-ranking; tool-candidate discovery belongs to tool-discovery-selection.
    ja: 本モジュールは DiscoveryActivity をキー概念とし、当該 session-local DiscoveryResult/CandidateRank/DiscoveryScore/LightweightRetrievalTrace を所有します。「今回の対話でどの候補が見つかり、各出典、一致条件、rank/score は何か」を答えますが、永続 Index/IndexVersion/再利用 resource entry description は所有しません。MCP resources/list・prompts/list は session-local 列挙入口、client semantic search/@ 参照解決 hit list は当該 DiscoveryResult です。cross-store retrieval/fusion/rerank/replayable RetrievalTrace は memory-retrieval-ranking、tool 候補発見は tool-discovery-selection に属します。
  why_needed:
    zh: 没有会话内发现，系统无法解释“这次 @ 文件搜索为什么返回这三份 Markdown、MCP resources/list 过滤 mime_type 后剩下哪些 URI、这些候选后来有没有被上下文组装采纳”。把一次轻量列举误当成持久索引，会让 rank/score 失去当次会话语义。
    en: Without session-scoped discovery, a system cannot explain why an @ file search returned these three Markdown files, which URIs remained after an MCP resources/list mime_type filter, or whether those candidates were later admitted by context assembly. Treating a lightweight enumeration as a durable index loses the session-local meaning of rank and score.
    ja: セッション内発見がなければ、@ file search がなぜ三 Markdown を返したか、MCP resources/list mime_type filter 後にどの URI が残ったか、候補が context assembly に採用されたかを説明できません。軽量列挙を永続 index と誤ると rank/score の session-local 意味が失われます。
  includes:
    - zh: DiscoveryActivity、LightweightRetrieval、DiscoveryResult、CandidateRank、DiscoveryScore、SearchResult 和 SearchScore。
      en: DiscoveryActivity, LightweightRetrieval, DiscoveryResult, CandidateRank, DiscoveryScore, SearchResult, and SearchScore.
      ja: DiscoveryActivity/LightweightRetrieval/DiscoveryResult/CandidateRank/DiscoveryScore/SearchResult/SearchScore。
    - zh: LightweightRetrievalTrace 以及发现活动实际使用的查询、过滤和候选来源关系事实。
      en: LightweightRetrievalTrace and the query, filter, and candidate-provenance relation facts actually used by the discovery activity.
      ja: LightweightRetrievalTrace と discovery activity が実際使用した query/filter/candidate provenance relation fact。
  excludes:
    - zh: DiscoveryIndex、Index、IndexVersion、Embedding、IndexShard、IndexEntry、IndexBuildRun 和 IndexRefreshRun 归 memory-retrieval-ranking；发现活动只记录实际读取的索引版本。
      en: DiscoveryIndex, Index, IndexVersion, Embedding, IndexShard, IndexEntry, IndexBuildRun, and IndexRefreshRun belong to memory-retrieval-ranking; a discovery activity records only the index version it actually read.
      ja: DiscoveryIndex/Index/IndexVersion/Embedding/IndexShard/IndexEntry/IndexBuildRun/IndexRefreshRun は memory-retrieval-ranking に属し、discovery activity は実際に読んだ index version のみ記録します。
    - zh: DiscoverySurface、IndexPointer 与 IndexVersionReference 是可复用资源描述或来源引用，归 info-storage-sources。
      en: DiscoverySurface, IndexPointer, and IndexVersionReference are reusable resource descriptions or source references owned by info-storage-sources.
      ja: DiscoverySurface/IndexPointer/IndexVersionReference は再利用 resource description または source reference で info-storage-sources が所有します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 会话内发现对应“当前交互里临时找候选”的产品行为，而不是“后台维护索引”。MCP resources/list 与 prompts/list 返回可枚举 URI/name 列表；resources/list 还可带 cursor 分页。Cursor @ 文件/文件夹引用、semantic codebase search 和 recent-files 列表都属于客户端在单次 agent step 前执行的 LightweightRetrieval。Moonweave 把 DiscoveryActivity 与 DiscoveryResult 绑定到 session_id，把 rank/score 作为当次观测，而不是 IndexEntry 的永久属性。
    en: Session-scoped discovery corresponds to product behavior that temporarily finds candidates within the current interaction, not background index maintenance. MCP resources/list and prompts/list return enumerable URI or name lists, with cursor pagination on resources/list. Cursor @ file/folder references, semantic codebase search, and recent-files lists are client-side LightweightRetrieval executed before one agent step. Moonweave binds DiscoveryActivity and DiscoveryResult to session_id and treats rank/score as observations for that act, not permanent IndexEntry properties.
    ja: セッション内発見は「現在対話内で一時的に候補を探す」product 行為であり、background index 保守ではありません。MCP resources/list・prompts/list は列挙可能 URI/name list（resources/list は cursor 分页）を返します。Cursor @ file/folder、semantic codebase search、recent-files は agent step 前 client 側 LightweightRetrieval です。Moonweave は DiscoveryActivity/DiscoveryResult を session_id に bind し、rank/score を当該 act の観測として扱い、IndexEntry 永続属性とはしません。
  typical_input:
    - description: MCP resources/list — enumerate contextual resources with optional cursor.
      format: |
        {"jsonrpc":"2.0","id":2,"method":"resources/list","params":{"cursor":null}}
        =>
        {
          "resources": [
            {"uri":"file:///workspace/docs/architecture.md","name":"architecture.md","mimeType":"text/markdown"},
            {"uri":"file:///workspace/docs/security-boundary.md","name":"security-boundary.md","mimeType":"text/markdown"}
          ],
          "nextCursor": null
        }
      source_claims: [claim-info-indexing-mcp-resources]
    - description: MCP prompts/list — enumerate prompt templates available this session.
      format: |
        {"method":"prompts/list","params":{}}
        =>
        {
          "prompts": [
            {"name":"code-review","description":"Review code changes for security issues"},
            {"name":"summarize","description":"Summarize a document"}
          ]
        }
      source_claims: [claim-info-indexing-mcp-prompts]
    - description: Cursor agent search — @ references plus semantic hits before model call.
      format: |
        # User message
        @src/auth/middleware.ts @docs/onboarding.md
        Where is session validation handled?

        # Client-side discovery (conceptual)
        {
          "referenced_files": ["src/auth/middleware.ts", "docs/onboarding.md"],
          "semantic_hits": [{"path":"src/auth/middleware.ts","score":0.91}]
        }
      source_claims: [claim-info-indexing-cursor]
  typical_output:
    - description: Moonweave-local discovery result projection — session-bound candidates with rank and score.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "session_id": "sess-arch-27",
          "discovery_activity_id": "disc-101",
          "results": [
            {"result_id":"dres-101-1","source_uri":"repo://docs/architecture.md","rank":1,"score":0.94},
            {"result_id":"dres-101-2","source_uri":"repo://docs/agent-runtime.md","rank":2,"score":0.86}
          ]
        }
      source_claims: [claim-info-indexing-design]
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri, name, mimeType, and cursor pagination.
    - name: MCP Server Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list enumeration of available prompt templates in the current session.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references, semantic codebase search, and recent files as session-local candidate discovery."
structure:
  identity_keys: [discovery_activity_id, session_id]
  fields:
    - id: discovery_activity_id
      labels: {zh: 发现活动标识, en: Discovery activity identifier, ja: 発見活動識別子}
      definitions:
        zh: 唯一标识一次会话内候选发现运行，不是 DiscoveryResult 本身或持久 Index 标识。
        en: Uniquely identifies one session-local candidate discovery run, not a DiscoveryResult itself or a durable Index identifier.
        ja: 一回の session-local 候補発見実行を一意識別。DiscoveryResult 自体や永続 Index ID ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: disc-101
      allowed_values: []
      source_claims: [claim-info-indexing-design]
    - id: session_id
      labels: {zh: 会话标识, en: Session identifier, ja: セッション識別子}
      definitions:
        zh: 发现活动所属的交互会话 ID；DiscoveryResult 的 rank/score 只在该 session 语境下解释。
        en: Interaction session ID the discovery activity belongs to; DiscoveryResult rank/score are interpreted only in that session context.
        ja: discovery activity が属する interaction session ID。DiscoveryResult rank/score は当該 session 文脈でのみ解釈されます。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: sess-arch-27
      allowed_values: []
      source_claims: [claim-info-indexing-design]
    - id: query_text
      labels: {zh: 查询文本, en: Query text, ja: クエリ文本}
      definitions:
        zh: 触发发现的查询字符串，例如用户搜索词、@ 引用解析目标或 MCP list 过滤前的自然语言意图。
        en: Query string that triggered discovery, such as a user search term, @ reference resolution target, or natural-language intent before MCP list filtering.
        ja: 発見を起動した query 文字列（user search term、@ reference 解決対象、MCP list filter 前 natural-language intent 等）。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: project architecture
      allowed_values: []
      source_claims: [claim-info-indexing-cursor]
    - id: filter_predicate
      labels: {zh: 过滤条件, en: Filter predicate, ja: フィルタ条件}
      definitions:
        zh: 应用于候选集合的过滤表达式，例如 mime_type=text/markdown 或 path:docs/**；必须可逐项解释每个结果的 matched_predicate。
        en: Filter expression applied to the candidate set, such as mime_type=text/markdown or path:docs/**; each result's matched_predicate must be explainable item by item.
        ja: mime_type=text/markdown、path:docs/** 等、候補集合へ適用する filter 式。各 result matched_predicate を item ごと説明可能である必要があります。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mime_type=text/markdown
      allowed_values: []
      source_claims: [claim-info-indexing-mcp-resources]
    - id: candidate_rank
      labels: {zh: 候选名次, en: Candidate rank, ja: 候補順位}
      definitions:
        zh: 候选在当次 DiscoveryResult 集合中的有序位置，从 1 开始；rank 是会话内观测，不是 IndexEntry 的永久 ordinal。
        en: Ordered position of a candidate within the session-local DiscoveryResult set, starting at 1; rank is a session observation, not a permanent IndexEntry ordinal.
        ja: session-local DiscoveryResult 集合内の候補有序位置（1 開始）。rank は session 観測であり IndexEntry 永続 ordinal ではありません。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [claim-info-indexing-design]
    - id: discovery_score
      labels: {zh: 发现分数, en: Discovery score, ja: 発見スコア}
      definitions:
        zh: 带方法与尺度的当次相关性分数，例如 semantic similarity 0.94；不得与持久检索分数或 embedding 向量混同。
        en: Session-local relevance score with method and scale, such as semantic similarity 0.94; must not be conflated with durable retrieval scores or embedding vectors.
        ja: semantic similarity 0.94 等、方法と尺度を伴う session-local 関連 score。永続 retrieval score/embedding vector と混同してはなりません。
      datatype: number
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 0.94
      allowed_values: []
      source_claims: [claim-info-indexing-design]
  constraints:
    - id: info-indexing-session-bound-results
      severity: error
      expression_language: plain
      expression: DiscoveryResult rank and score must be bound to the same session_id and discovery_activity_id; results from another session must not satisfy a current-session discovery query.
      explanation:
        zh: 跨会话复用 rank/score 会把旧交互的候选顺序误当成当前发现结果。
        en: Reusing rank/score across sessions misreports old interaction ordering as current discovery results.
        ja: session 横断で rank/score を再利用すると、旧 interaction 順序を現 discovery result と誤ります。
      source_claims: [claim-info-indexing-design]
    - id: info-indexing-not-durable-index
      severity: error
      expression_language: plain
      expression: A DiscoveryActivity or DiscoveryResult must not be registered as an Index, IndexVersion, or IndexEntry; persistent index identity belongs to memory-retrieval-ranking.
      explanation:
        zh: 把一次列举当成持久索引，会让索引构建与刷新生命周期无法正确归属。
        en: Treating one enumeration as a durable index breaks correct ownership of index build and refresh lifecycles.
        ja: 一回の列挙を永続 index とみなすと index build/refresh lifecycle の owner が壊れます。
      source_claims: [claim-info-indexing-design]
  required_relations: []
examples:
  - id: info-indexing-example-mcp-resources-list
    labels:
      zh: MCP resources/list Markdown 过滤发现
      en: MCP resources/list Markdown filter discovery
      ja: MCP resources/list Markdown フィルタ発見
    descriptions:
      zh: 会话 sess-arch-27 中 discovery activity disc-101 调用 resources/list，随后以 mime_type=text/markdown 过滤，产出三个 DiscoveryResult，各自保留 source_uri、matched_predicate、rank 与 score，供 context assembly ctxasm-27 消费。
      en: In session sess-arch-27, discovery activity disc-101 calls resources/list, filters by mime_type=text/markdown, and produces three DiscoveryResults each retaining source_uri, matched_predicate, rank, and score for context assembly ctxasm-27.
      ja: session sess-arch-27 で discovery activity disc-101 が resources/list を呼び mime_type=text/markdown で filter し、三 DiscoveryResult（source_uri/matched_predicate/rank/score 保持）を生成、context assembly ctxasm-27 が消費します。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    field_values:
      session_id: sess-arch-27
      discovery_activity_id: disc-101
      filter_predicate: mime_type=text/markdown
      result_count: 3
      context_assembly_id: ctxasm-27
    related_node_ids: [info-indexing, info-storage-sources, memory-context]
    related_relation_ids: []
    source_claims: [claim-info-indexing-mcp-resources]
  - id: info-indexing-example-mcp-prompts-list
    labels:
      zh: MCP prompts/list 模板枚举
      en: MCP prompts/list template enumeration
      ja: MCP prompts/list テンプレート列挙
    descriptions:
      zh: 客户端在当前 MCP 会话调用 prompts/list，返回 code-review 与 summarize 两个 prompt 名称。系统创建 DiscoveryActivity disc-prompts-8，把每个 prompt name 记为 DiscoveryResult，rank 按返回顺序从 1 开始。
      en: The client calls prompts/list in the current MCP session and receives prompt names code-review and summarize. The system creates DiscoveryActivity disc-prompts-8 and records each prompt name as a DiscoveryResult with rank starting at 1 in return order.
      ja: クライアントが現 MCP session で prompts/list を呼び code-review/summarize を受信。DiscoveryActivity disc-prompts-8 を作成し、各 prompt name を DiscoveryResult として返却順 rank 1 から記録します。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    field_values:
      discovery_activity_id: disc-prompts-8
      prompts_found: [code-review, summarize]
    related_node_ids: [info-indexing, info-prompts-instructions]
    related_relation_ids: []
    source_claims: [claim-info-indexing-mcp-prompts]
  - id: info-indexing-example-cursor-at-references
    labels:
      zh: Cursor @ 引用与语义搜索发现
      en: Cursor @ references and semantic search discovery
      ja: Cursor @ 参照と semantic search 発見
    descriptions:
      zh: 用户消息含 @src/auth/middleware.ts 与 @docs/onboarding.md；客户端在 agent step 前解析 explicit references 并运行 semantic search，产生 DiscoveryResult dres-901-1（path=src/auth/middleware.ts, score=0.91, rank=1）。persistent_index_version 与 retrieval_trace_id 均不适用。
      en: The user message includes @src/auth/middleware.ts and @docs/onboarding.md; the client resolves explicit references and runs semantic search before the agent step, producing DiscoveryResult dres-901-1 (path=src/auth/middleware.ts, score=0.91, rank=1). persistent_index_version and retrieval_trace_id are not applicable.
      ja: user message に @src/auth/middleware.ts/@docs/onboarding.md。client が agent step 前に explicit reference 解決と semantic search を実行し DiscoveryResult dres-901-1（path=src/auth/middleware.ts, score=0.91, rank=1）を生成。persistent_index_version/retrieval_trace_id は非適用。
    example_source:
      product: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
    field_values:
      referenced_files: [src/auth/middleware.ts, docs/onboarding.md]
      top_hit_path: src/auth/middleware.ts
      discovery_score: 0.91
      persistent_index_version: null
    related_node_ids: [info-indexing, memory-context]
    related_relation_ids: []
    source_claims: [claim-info-indexing-cursor]
  - id: info-indexing-example-filtered-empty-result
    labels:
      zh: 过滤后无候选的发现活动
      en: Discovery activity with empty filtered results
      ja: フィルタ後候補なしの発見活動
    descriptions:
      zh: disc-102 对 resources/list 结果应用 mime_type=application/pdf，但当前仓库只有 Markdown 资源，DiscoveryResult 集合为空。系统仍保留 DiscoveryActivity 与 LightweightRetrievalTrace，以证明“已执行发现但未找到候选”，而不是静默省略。
      en: disc-102 applies mime_type=application/pdf to resources/list results, but the workspace contains only Markdown resources, yielding an empty DiscoveryResult set. The system still retains DiscoveryActivity and LightweightRetrievalTrace to prove discovery ran and found no candidates rather than silently omitting the act.
      ja: disc-102 が resources/list 結果に mime_type=application/pdf を適用しますが workspace は Markdown のみで DiscoveryResult 集合は空。DiscoveryActivity/LightweightRetrievalTrace を保持し「発見実行済みだが候補なし」を証明し、黙って省略しません。
    example_source:
      product: Moonweave discovery design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      discovery_activity_id: disc-102
      filter_predicate: mime_type=application/pdf
      result_count: 0
    related_node_ids: [info-indexing]
    related_relation_ids: []
    source_claims: [claim-info-indexing-design]
  - id: info-indexing-example-rank-score-observation
    labels:
      zh: 名次与分数作为当次观测
      en: Rank and score as session-local observations
      ja: 順位とスコアを session-local 観測として
    descriptions:
      zh: 同一 source_uri=repo://docs/architecture.md 在 disc-101 中 rank=1 score=0.94，在后续 session sess-arch-99 的 disc-220 中 rank=3 score=0.71。两个 DiscoveryResult 不得合并；rank/score 必须分别绑定各自 session_id 与 discovery_activity_id。
      en: The same source_uri=repo://docs/architecture.md has rank=1 score=0.94 in disc-101 and rank=3 score=0.71 in later session sess-arch-99 disc-220. The two DiscoveryResults must not merge; rank/score must bind separately to their session_id and discovery_activity_id.
      ja: 同一 source_uri=repo://docs/architecture.md が disc-101 で rank=1 score=0.94、後続 session sess-arch-99 disc-220 で rank=3 score=0.71。二 DiscoveryResult を merge せず、rank/score は各 session_id/discovery_activity_id に分别 bind 必須。
    example_source:
      product: Moonweave discovery design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      source_uri: repo://docs/architecture.md
      observations:
        - session_id: sess-arch-27
          rank: 1
          score: 0.94
        - session_id: sess-arch-99
          rank: 3
          score: 0.71
    related_node_ids: [info-indexing]
    related_relation_ids: []
    source_claims: [claim-info-indexing-design]
parent_relation: null
relations: []
