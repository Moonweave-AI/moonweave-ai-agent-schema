  en: Preserve the candidates, provenance, filters, rank observations, and score observations produced by lightweight discovery within one interaction session.
  ja: 一回の対話セッション内で行う軽量な候補発見について、候補、出所、絞込み条件、順位観測、得点観測を保持します。
