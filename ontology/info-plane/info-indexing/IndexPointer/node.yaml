    labels:
      zh: 代码库文件指针
      en: Codebase file pointer
      ja: codebase file pointer
    descriptions:
      zh: pointer middleware.ts index_id=codebase-v3。
      en: pointer middleware.ts index_id=codebase-v3.
      ja: codebase file pointer。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: codebase index
    field_values:
      entry_key: src/auth/middleware.ts
    related_node_ids:
      - IndexPointer
      - SearchResult
    related_relation_ids: []
    source_claims:
      - claim-iptr-cursor
  - id: IndexPointer-example-rag-chunk
    labels:
      zh: RAG 块指针
      en: RAG chunk pointer
      ja: RAG chunk pointer
    descriptions:
      zh: pointer chunk-881 index_id=docs-rag architecture.md span。
      en: pointer chunk-881 index_id=docs-rag architecture.md span.
      ja: RAG chunk pointer。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: RAG index
    field_values: {}
    related_node_ids:
      - IndexPointer
    related_relation_ids: []
