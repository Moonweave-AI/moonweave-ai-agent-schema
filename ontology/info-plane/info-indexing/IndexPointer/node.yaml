source_claims:
  - id: claim-index-pointer-001
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex separates IndexNode.index_id from BaseIndex.index_struct, supporting IndexPointer as a resolvable reference that does not copy the target index.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode; core/indices/base.py > BaseIndex
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-002
    source: eng-fw-llamaindex-repo
    supports: IndexNode documents index_id as a delegation-target identifier, supporting reference semantics while the SourceReference genus remains a Moonweave cross-module classification.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode class documentation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-003
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode defines index_id as the ID of the index or retriever to delegate to, directly supporting an index-reference pointer.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-004
    source: eng-fw-llamaindex-repo
    supports: BaseIndex separately owns index_struct and index_id, supporting the claim that an IndexNode's index_id reference does not copy index structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and index_id
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-005
    source: eng-fw-llamaindex-repo
    supports: BaseIndex owns index_struct and exposes as_retriever, supporting the entity side of the reference-versus-index boundary.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and as_retriever
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-006
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id is documented as a delegation target ID, independently supporting the pointer side of the boundary.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode definition and index_id
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-007
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id names the index or retriever to delegate to, directly supporting this concrete index-pointer instance.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode carries an index_id that points retrieval from one node to another index object. This directly supports the locator-bearing IndexPointer side of the distinction; it does not define Moonweave's version-pinned IndexVersionReference or their common SourceReference parent.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode class documentation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-009
    source: eng-ont-prov-o
    supports: PROV-O specializationOf distinguishes a more specific Entity that presents a particular aspect from a more general Entity. Moonweave applies that provenance pattern to IndexVersionReference, which pins one version or snapshot, while IndexPointer may resolve the index without fixing a version.
    locator: PROV-O Recommendation §5.5.1 > prov:specializationOf
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-index-pointer-010
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode.index_id is a string identifier for another index or retriever, directly supporting an index-resolving reference.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-011
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex separates IndexNode.index_id from BaseIndex.index_struct, grounding the boundary between a pointer and the index object it resolves.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id; llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-012
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id demonstrates a non-copying handle that resolves another index or retriever, grounding IndexPointer as a specialized SourceReference.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id and obj
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-013
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode stores index_id for another index or retriever and resolves the object separately, directly grounding the pointer-to-index reference.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id and obj
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-014
    source: eng-fw-llamaindex-repo
    supports: BaseIndex owns index_struct and index_id, supporting the target side as an index object rather than the pointer record itself.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and index_id
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-015
    source: eng-fw-llamaindex-repo
    supports: IndexNode resolves its index_id through an object mapping; a missing mapping leaves the pointer unresolved and does not authorize substitution of another index.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.from_dict and index_id object resolution
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-016
    source: eng-fw-llamaindex-repo
    supports: The explicit index_id field, rather than object co-location, identifies the referenced index or retriever in LlamaIndex's schema.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode class documentation and index_id field
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-017
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id provides first-party evidence for a handle that references another index or retriever without owning its structure.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-index-pointer-018
    source: eng-fw-llamaindex-repo
    supports: BaseIndex's separate ownership of index_struct grounds the target identity and supports keeping references as a cross-link rather than a subtype relation.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

