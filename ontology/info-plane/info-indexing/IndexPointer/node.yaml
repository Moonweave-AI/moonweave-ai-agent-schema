schema: moonweave.ai/ontology-node/v1
id: IndexPointer
kind: concept
labels:
  zh: 索引指针
  en: index pointer
  ja: インデックスポインタ
semantics:
  short_definition:
    zh: 指向持久索引或语料库条目的会话侧引用。
    en: Session-side reference pointing at a durable index or corpus entry.
    ja: durable index/corpus entry を指す session-side reference。
  definition:
    zh: IndexPointer 映射 RAG document index 中的 chunk 引用、Cursor codebase index 中的文件/chunk 指针；DiscoveryActivity 记录读取的 pointer，不复制 IndexEntry 正文。
    en: IndexPointer maps chunk references in RAG document indexes and file/chunk pointers in Cursor codebase indexes; DiscoveryActivity records the pointer read without copying IndexEntry body.
    ja: indexed file/chunk reference pointer。
  why_needed:
    zh: pointer 使 discovery 能声明“读了哪个 IndexEntry”而不把索引构建生命周期迁入本模块。
    en: Pointers let discovery declare which IndexEntry was read without moving index build lifecycle into this module.
    ja: IndexEntry pointer without build ownership。
  includes:
    - zh: pointer_id、index_id、entry_key/path、optional version。
      en: pointer_id, index_id, entry_key/path, optional version.
      ja: pointer/index/key/version。
  excludes:
    - zh: IndexEntry 正文、Embedding、IndexBuildRun。
      en: IndexEntry body, Embedding, IndexBuildRun.
      ja: body/embedding/build。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: SearchResult 可带 IndexPointer index_id=codebase-v3 entry_key=src/auth/middleware.ts；RAG chunk pointer index_id=docs-rag entry_key=chunk-881。
    en: SearchResult may carry IndexPointer index_id=codebase-v3 entry_key=src/auth/middleware.ts; RAG chunk pointer index_id=docs-rag entry_key=chunk-881.
    ja: codebase/RAG index pointer。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
