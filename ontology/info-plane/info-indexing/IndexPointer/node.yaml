schema: moonweave.ai/ontology-node/v1
id: IndexPointer
kind: concept
status: accepted
labels:
  zh: 索引指针
  en: index pointer
  ja: インデックスポインタ
semantics:
  short_definition:
    zh: 索引指针是通过索引 ID 或定位符指向发现索引的来源引用。
    en: An index pointer is a source reference that identifies a discovery index by index ID or locator.
    ja: 索引ポインタは、索引 ID または位置指定子で発見索引を指す出典参照です。
  definition:
    zh: IndexPointer 是 SourceReference 的一种：它保存足以解析到一个 DiscoveryIndex 的索引 ID、URI 或实现句柄，并可附带解析范围。引用 does not copy 索引的结构、条目或身份；它也不锁定特定索引版本，除非另有 IndexVersionReference。
    en: IndexPointer is a kind of SourceReference that carries an index ID, URI, or implementation handle sufficient to resolve one DiscoveryIndex, optionally with resolution scope. It does not copy the index's structure, entries, or identity, and it does not pin a specific index version unless an IndexVersionReference is also supplied.
    ja: IndexPointer は SourceReference の一種で、一つの DiscoveryIndex を解決するのに十分な索引 ID、URI、実装ハンドルと任意の解決範囲を保持します。索引の構造、項目、識別を複製せず、IndexVersionReference が別途ない限り特定版を固定しません。
  why_needed:
    zh: 该概念允许查询计划、上下文槽位或索引节点引用同一索引而不复制索引对象，并把“引用哪个索引”与“使用哪个版本”作为两个可独立核查的问题。
    en: The concept lets a query plan, context slot, or index node refer to the same index without duplicating the index object, while keeping 'which index is referenced' separate from 'which version is pinned.'
    ja: この概念により、照会計画、コンテキストスロット、索引ノードが索引対象を複製せず同じ索引を参照でき、「どの索引か」と「どの版を固定するか」を別々に検査できます。
  includes:
    - zh: 纳入能在声明范围内解析到 DiscoveryIndex 的 index_id、索引 URI 或实现句柄，包括 LlamaIndex IndexNode 的 index_id 引用。
      en: Includes index_id values, index URIs, or implementation handles that resolve a DiscoveryIndex within a declared scope, including the index_id reference of a LlamaIndex IndexNode.
      ja: 宣言された範囲で DiscoveryIndex を解決する index_id、索引 URI、実装ハンドルを含み、LlamaIndex IndexNode の index_id 参照も該当します。
  excludes:
    - zh: 排除实际 DiscoveryIndex、索引结构或条目副本、只指向普通文档的 SourceReference，以及锁定某个索引版本的 IndexVersionReference。
      en: Excludes the actual DiscoveryIndex, copied index structure or entries, a SourceReference to an ordinary document, and an IndexVersionReference that pins a particular index version.
      ja: 実際の DiscoveryIndex、複製した索引構造・項目、通常文書だけを指す SourceReference、特定索引版を固定する IndexVersionReference を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: IndexPointer-example-positive-001
    kind: positive
    labels:
      zh: 索引指针正例
      en: Positive example of index pointer
      ja: インデックスポインタの正例
    scenario_id: null
    descriptions:
      zh: 一个 LlamaIndex IndexNode 将 index_id 设为 support-index-v4，以便解析并委派到该索引；IndexNode 不复制 support-index-v4 的 index_struct。
      en: A LlamaIndex IndexNode sets index_id to support-index-v4 so that the referenced index can be resolved and delegated to; the IndexNode does not copy support-index-v4's index_struct.
      ja: LlamaIndex IndexNode が index_id を support-index-v4 に設定し、参照索引を解決して委譲します。IndexNode は support-index-v4 の index_struct を複製しません。
    field_values:
      reference_id: source-ref-support-index-v4
      reference_value: index://support/v4
    related_node_ids:
      - IndexPointer
      - DiscoveryIndex
    related_relation_ids:
      - IndexPointer-references-DiscoveryIndex
    expected_result:
      zh: index_id 值被记录为 IndexPointer，并通过 IndexPointer-references-DiscoveryIndex 指向 support-index-v4。
      en: The index_id value is recorded as an IndexPointer that references support-index-v4 through IndexPointer-references-DiscoveryIndex.
      ja: index_id 値は IndexPointer として記録され、IndexPointer-references-DiscoveryIndex により support-index-v4 を指します。
    why_valid_or_invalid:
      zh: IndexNode 的官方结构把 index_id 与实际 index 对象分开，正好体现引用可解析目标但不取得目标结构或身份。
      en: The official IndexNode structure separates index_id from the actual index object, matching a reference that resolves a target without acquiring its structure or identity.
      ja: 公式 IndexNode 構造は index_id と実際の index 対象を分け、対象構造・識別を取得せず解決する参照を表します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-pointer-003
      - claim-index-pointer-004
  - id: IndexPointer-example-boundary-001
    kind: boundary
    labels:
      zh: 索引指针边界例
      en: Boundary case for index pointer
      ja: インデックスポインタの境界例
    scenario_id: null
    descriptions:
      zh: BaseIndex 对象 support-index-v4 自身持有 index_struct 并能创建 retriever；它是 IndexPointer 所指向的 DiscoveryIndex，而不是那个引用记录。
      en: The BaseIndex object support-index-v4 owns index_struct and can create a retriever; it is the DiscoveryIndex addressed by an IndexPointer, not the reference record.
      ja: BaseIndex 対象 support-index-v4 は index_struct を所有し retriever を作成できます。IndexPointer が指す DiscoveryIndex であり、参照記録ではありません。
    field_values: {}
    related_node_ids:
      - IndexPointer
      - DiscoveryIndex
    related_relation_ids:
      - IndexPointer-references-DiscoveryIndex
    expected_result:
      zh: support-index-v4 保持 DiscoveryIndex 类型；只有 index_id 引用值被分类为 IndexPointer。
      en: support-index-v4 remains a DiscoveryIndex; only the index_id reference value is classified as an IndexPointer.
      ja: support-index-v4 は DiscoveryIndex のままで、index_id 参照値だけが IndexPointer に分類されます。
    why_valid_or_invalid:
      zh: 索引实体具有结构与行为，指针只持有解析信息；引用方向从指针到索引，不能反向把目标降格为引用。
      en: The index entity has structure and behavior while the pointer carries resolution information only; the reference direction runs from pointer to index and does not turn the target into a reference.
      ja: 索引実体は構造と振る舞いを持ち、ポインタは解決情報だけを持ちます。参照方向はポインタから索引で、対象を参照へ変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-index-pointer-005
      - claim-index-pointer-006
  - id: IndexPointer-example-instance-001
    kind: instance
    labels:
      zh: IndexNode 索引指针实例
      en: IndexNode index-pointer instance
      ja: IndexNode 索引ポインタインスタンス
    scenario_id: null
    descriptions:
      zh: IndexNode 的 index_id='support-index-v4' 被解析为指向同名 DiscoveryIndex 的 IndexPointer；记录不包含 index_struct。
      en: An IndexNode's index_id='support-index-v4' is resolved as an IndexPointer to the corresponding DiscoveryIndex; the record contains no index_struct.
      ja: IndexNode の index_id='support-index-v4' を同名 DiscoveryIndex への IndexPointer として解決し、記録は index_struct を含みません。
    field_values:
      index_id: support-index-v4
    related_node_ids:
      - IndexPointer
      - DiscoveryIndex
    related_relation_ids:
      - IndexPointer-references-DiscoveryIndex
    expected_result:
      zh: 实例仅作为索引来源引用解析到 support-index-v4。
      en: The instance resolves to support-index-v4 only as an index source reference.
      ja: インスタンスは索引出典参照としてのみ support-index-v4 を解決します。
    why_valid_or_invalid:
      zh: index_id 足以识别委派目标，但没有索引结构或版本固定信息，正好满足 IndexPointer 的窄边界。
      en: The index_id identifies the delegation target but carries neither index structure nor version pinning, exactly matching the narrow IndexPointer boundary.
      ja: index_id は委譲対象を識別しますが索引構造も版固定情報も持たず、IndexPointer の狭い境界を満たします。
    synthetic: true
    verified_version: https://github.com/run-llama/llama_index
    source_claims:
      - claim-index-pointer-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: IndexVersionReference
    shared_parent_concept_id: SourceReference
    differentia:
      zh: 端点特定对照：父节点 SourceReference：IndexPointer（semantic kind=information，骨架 IndexPointer-is_a-SourceReference）；IndexVersionReference（semantic kind=information，骨架 IndexVersionReference-is_a-SourceReference）。双端条件：IndexPointer 条件：“索引指针是通过索引 ID 或定位符指向发现索引的来源引用”；IndexVersionReference 条件：“索引版本引用是锁定某个具体索引版本或快照的来源引用”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent SourceReference: IndexPointer (semantic kind=information, backbone IndexPointer-is_a-SourceReference); IndexVersionReference (semantic kind=information, backbone IndexVersionReference-is_a-SourceReference). Endpoint conditions: IndexPointer condition: “An index pointer is a source reference that identifies a discovery index by index ID or locator”; IndexVersionReference condition: “An index-version reference is a source reference that pins one specific version or snapshot of an index”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 SourceReference：IndexPointer（semantic kind=information、バックボーン IndexPointer-is_a-SourceReference）；IndexVersionReference（semantic kind=information、バックボーン IndexVersionReference-is_a-SourceReference）。両端条件：IndexPointer の条件：「索引ポインタは、索引 ID または位置指定子で発見索引を指す出典参照です」；IndexVersionReference の条件：「索引版参照は、索引の特定版またはスナップショットを固定する出典参照です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-index-pointer-008
      - claim-index-pointer-009
parent_relation: null
relations:
  - id: IndexPointer-is_a-SourceReference
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是来源引用
      en: is a source reference
      ja: 出典参照である
    definitions:
      zh: 索引指针是来源引用的一种，其限定差是保存足以解析到一个发现索引身份的标识或句柄，而不复制该索引的结构、条目或内容。
      en: IndexPointer is a SourceReference whose differentia is carrying an identifier or handle sufficient to resolve a DiscoveryIndex; it does not copy the index structure, entries, or content.
      ja: 索引ポインタは出典参照の一種であり、発見索引を解決するのに十分な識別子またはハンドルを保持しますが、索引構造・項目・内容は複製しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类型归属不限制一个索引可被多少个指针引用。
      en: Type inclusion does not limit how many pointers may refer to one index.
      ja: 型包含は一つの索引を参照できるポインタ数を制限しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexPointer-is_a-SourceReference-example-positive-001
        kind: positive
        labels:
          zh: IndexNode 的索引指针
          en: IndexNode index pointer
          ja: IndexNode の索引ポインタ
        scenario_id: null
        descriptions:
          zh: 一个节点保存 index_id=policy-index，读取时通过注册表解析到外部索引；该字段构成 IndexPointer，因此也是 SourceReference。
          en: A node stores index_id=policy-index and resolves it through a registry at read time. The handle is an IndexPointer and therefore a SourceReference.
          ja: ノードが index_id=policy-index を保持し、読取時にレジストリから外部索引を解決します。このハンドルは索引ポインタであり出典参照でもあります。
        field_values:
          index_id: policy-index
        related_node_ids:
          - IndexPointer
          - SourceReference
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-is_a-SourceReference
        expected_result:
          zh: 接受 IndexPointer 的 SourceReference 归类。
          en: Accept IndexPointer as a SourceReference subtype.
          ja: 索引ポインタを出典参照の下位型として受理します。
        why_valid_or_invalid:
          zh: 标识符用于解析外部来源对象，而非内嵌该对象，符合来源引用职责。
          en: The identifier resolves an external source object instead of embedding it, matching the SourceReference role.
          ja: 識別子は外部の出典オブジェクトを埋め込まず解決するため、出典参照の役割と一致します。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-index-pointer-010
      - id: IndexPointer-is_a-SourceReference-example-boundary-001
        kind: boundary
        labels:
          zh: 内嵌索引结构不是指针
          en: Embedded index structure is not a pointer
          ja: 埋め込み索引構造はポインタではない
        scenario_id: null
        descriptions:
          zh: 对象直接拥有 index_struct 以及全部节点映射，不需要解析其他对象；它是 DiscoveryIndex，而不是 IndexPointer。
          en: An object directly owns index_struct and its node mapping and resolves no other object. It is a DiscoveryIndex, not an IndexPointer.
          ja: オブジェクトが index_struct とノード対応を直接所有し、他の対象を解決しないため、発見索引であって索引ポインタではありません。
        field_values:
          owns_index_struct: true
        related_node_ids:
          - IndexPointer
          - SourceReference
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-is_a-SourceReference
        expected_result:
          zh: 拒绝把索引本体归为 IndexPointer。
          en: Reject the index object as IndexPointer.
          ja: 索引本体を索引ポインタに分類しません。
        why_valid_or_invalid:
          zh: 指针的身份条件是解析目标且不复制目标；直接拥有结构的是被引用对象。
          en: A pointer must resolve a target without copying it; direct structural ownership identifies the referenced object instead.
          ja: ポインタは対象を複製せず解決する必要があり、構造を直接所有するものは参照対象です。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-index-pointer-011
    source_claims:
      - claim-index-pointer-012
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:SourceReference
  - id: IndexPointer-references-DiscoveryIndex
    predicate: references
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用
      en: references
      ja: 参照する
    definitions:
      zh: 当 IndexPointer 的 index_id 或句柄可解析到某个 DiscoveryIndex 的身份，且指针自身不拥有索引结构时，IndexPointer references 该 DiscoveryIndex。
      en: IndexPointer references DiscoveryIndex when its index_id or handle resolves that index's identity while the pointer itself owns none of the index structure.
      ja: IndexPointer の index_id またはハンドルが DiscoveryIndex の同一性を解決し、ポインタ自身が索引構造を所有しない場合に references が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: referenced_by
      labels:
        zh: 反向：引用
        en: referenced by
        ja: 逆方向：参照する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexPointer-references-DiscoveryIndex-example-positive-001
        kind: positive
        labels:
          zh: 引用正例
          en: Positive example of references
          ja: 参照するの正例
        scenario_id: null
        descriptions:
          zh: IndexNode p-7 保存 index_id=docs-main；对象注册表将该标识解析到拥有 index_struct 的 DiscoveryIndex docs-main，因此 p-7 references 此索引。
          en: IndexNode p-7 stores index_id=docs-main, and the object registry resolves it to the DiscoveryIndex that owns docs-main's index_struct; p-7 therefore references that index.
          ja: IndexNode p-7 が index_id=docs-main を保持し、オブジェクト登録表が index_struct を所有する DiscoveryIndex docs-main へ解決するため、p-7 はその索引を参照します。
        field_values: {}
        related_node_ids:
          - IndexPointer
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-references-DiscoveryIndex
        expected_result:
          zh: 建立 p-7 到 docs-main 的 references 边。
          en: Create the references edge from p-7 to docs-main.
          ja: p-7 から docs-main への references 辺を作成します。
        why_valid_or_invalid:
          zh: 指针的标识符经注册表解析到唯一索引对象，而索引结构仍由目标索引拥有。
          en: The pointer identifier resolves through the registry to one index object, while structural ownership remains with the target index.
          ja: ポインタ識別子が登録表を通じて一つの索引へ解決され、構造の所有権は対象索引に残ります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-pointer-013
          - claim-index-pointer-014
      - id: IndexPointer-references-DiscoveryIndex-example-boundary-001
        kind: boundary
        labels:
          zh: 引用边界例
          en: Boundary case for references
          ja: 参照するの境界例
        scenario_id: null
        descriptions:
          zh: 指针 p-8 保存 index_id=docs-archive，但当前注册表没有该 ID；工作区同时存在 docs-main 索引不能证明 p-8 references docs-main。
          en: Pointer p-8 stores index_id=docs-archive, which is absent from the registry. The presence of docs-main in the same workspace does not mean p-8 references docs-main.
          ja: ポインタ p-8 の index_id=docs-archive が登録表に存在せず、同じワークスペースに docs-main があっても p-8 が docs-main を参照するとはいえません。
        field_values: {}
        related_node_ids:
          - IndexPointer
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-references-DiscoveryIndex
        expected_result:
          zh: 报告未解析引用，不建立到 docs-main 的边。
          en: Report an unresolved pointer and create no edge to docs-main.
          ja: 未解決ポインタを報告し、docs-main への辺を作成しません。
        why_valid_or_invalid:
          zh: references 取决于句柄的实际解析结果，不能用工作区邻近性猜测目标。
          en: references depends on the handle's actual resolution result; workspace proximity cannot substitute for target identity.
          ja: references はハンドルの実際の解決結果に依存し、ワークスペース上の近接性から対象を推測できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-index-pointer-015
          - claim-index-pointer-016
    source_claims:
      - claim-index-pointer-017
      - claim-index-pointer-018
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:DiscoveryIndex
