  - id: IndexPointer-example-not-entry-body
    labels:
      zh: 非 Entry 正文
      en: Not entry body
      ja: entry body ではない
    descriptions:
      zh: IndexPointer 不复制 indexed chunk 文本。
      en: IndexPointer does not copy indexed chunk text.
      ja: pointer≠body。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - IndexPointer
    related_relation_ids: []
    source_claims:
      - claim-iptr-design
parent_relation: null
relations:
  - id: IndexPointer-is_a-SourceReference
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是来源引用
      en: is a source reference
      ja: 出典参照である
    definitions:
      zh: 索引指针是来源引用的一种，其限定差是保存足以解析到一个发现索引身份的标识或句柄，而不复制该索引的结构、条目或内容。
      en: IndexPointer is a SourceReference whose differentia is carrying an identifier or handle sufficient to resolve a DiscoveryIndex; it does not copy the index structure, entries, or content.
      ja: 索引ポインタは出典参照の一種であり、発見索引を解決するのに十分な識別子またはハンドルを保持しますが、索引構造・項目・内容は複製しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类型归属不限制一个索引可被多少个指针引用。
      en: Type inclusion does not limit how many pointers may refer to one index.
      ja: 型包含は一つの索引を参照できるポインタ数を制限しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexPointer-is_a-SourceReference-example-positive-001
        labels:
          zh: IndexNode 的索引指针
          en: IndexNode index pointer
          ja: IndexNode の索引ポインタ
        descriptions:
          zh: 一个节点保存 index_id=policy-index，读取时通过注册表解析到外部索引；该字段构成 IndexPointer，因此也是 SourceReference。
          en: A node stores index_id=policy-index and resolves it through a registry at read time. The handle is an IndexPointer and therefore a SourceReference.
          ja: ノードが index_id=policy-index を保持し、読取時にレジストリから外部索引を解決します。このハンドルは索引ポインタであり出典参照でもあります。
        field_values:
          index_id: policy-index
        related_node_ids:
          - IndexPointer
          - SourceReference
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-is_a-SourceReference
        source_claims:
          - claim-index-pointer-010
      - id: IndexPointer-is_a-SourceReference-example-boundary-001
        labels:
          zh: 内嵌索引结构不是指针
          en: Embedded index structure is not a pointer
          ja: 埋め込み索引構造はポインタではない
        descriptions:
          zh: 对象直接拥有 index_struct 以及全部节点映射，不需要解析其他对象；它是 DiscoveryIndex，而不是 IndexPointer。
          en: An object directly owns index_struct and its node mapping and resolves no other object. It is a DiscoveryIndex, not an IndexPointer.
          ja: オブジェクトが index_struct とノード対応を直接所有し、他の対象を解決しないため、発見索引であって索引ポインタではありません。
        field_values:
          owns_index_struct: true
        related_node_ids:
          - IndexPointer
          - SourceReference
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-is_a-SourceReference
        source_claims:
          - claim-index-pointer-011
    source_claims:
      - claim-index-pointer-012
    layout_role: secondary-backbone
    target: concept:SourceReference
  - id: IndexPointer-references-DiscoveryIndex
    predicate: references
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用
      en: references
      ja: 参照する
    definitions:
      zh: 当 IndexPointer 的 index_id 或句柄可解析到某个 DiscoveryIndex 的身份，且指针自身不拥有索引结构时，IndexPointer references 该 DiscoveryIndex。
      en: IndexPointer references DiscoveryIndex when its index_id or handle resolves that index's identity while the pointer itself owns none of the index structure.
      ja: IndexPointer の index_id またはハンドルが DiscoveryIndex の同一性を解決し、ポインタ自身が索引構造を所有しない場合に references が成立します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: referenced_by
      labels:
        zh: 反向：引用
        en: referenced by
        ja: 逆方向：参照する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: IndexPointer-references-DiscoveryIndex-example-positive-001
        labels:
          zh: 引用正例
          en: Positive example of references
          ja: 参照するの正例
        descriptions:
          zh: IndexNode p-7 保存 index_id=docs-main；对象注册表将该标识解析到拥有 index_struct 的 DiscoveryIndex docs-main，因此 p-7 references 此索引。
          en: IndexNode p-7 stores index_id=docs-main, and the object registry resolves it to the DiscoveryIndex that owns docs-main's index_struct; p-7 therefore references that index.
          ja: IndexNode p-7 が index_id=docs-main を保持し、オブジェクト登録表が index_struct を所有する DiscoveryIndex docs-main へ解決するため、p-7 はその索引を参照します。
        field_values: {}
        related_node_ids:
          - IndexPointer
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-references-DiscoveryIndex
        source_claims:
          - claim-index-pointer-013
          - claim-index-pointer-014
      - id: IndexPointer-references-DiscoveryIndex-example-boundary-001
        labels:
          zh: 引用边界例
          en: Boundary case for references
          ja: 参照するの境界例
        descriptions:
          zh: 指针 p-8 保存 index_id=docs-archive，但当前注册表没有该 ID；工作区同时存在 docs-main 索引不能证明 p-8 references docs-main。
          en: Pointer p-8 stores index_id=docs-archive, which is absent from the registry. The presence of docs-main in the same workspace does not mean p-8 references docs-main.
          ja: ポインタ p-8 の index_id=docs-archive が登録表に存在せず、同じワークスペースに docs-main があっても p-8 が docs-main を参照するとはいえません。
        field_values: {}
        related_node_ids:
          - IndexPointer
          - DiscoveryIndex
        related_relation_ids:
          - IndexPointer-references-DiscoveryIndex
        source_claims:
          - claim-index-pointer-015
          - claim-index-pointer-016
    source_claims:
      - claim-index-pointer-017
      - claim-index-pointer-018
    layout_role: cross-link
    target: concept:DiscoveryIndex
sources:
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-index-pointer-001
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex separates IndexNode.index_id from BaseIndex.index_struct, supporting IndexPointer as a resolvable reference that does not copy the target index.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode; core/indices/base.py > BaseIndex
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-002
    source: eng-fw-llamaindex-repo
    supports: IndexNode documents index_id as a delegation-target identifier, supporting reference semantics while the SourceReference genus remains a Moonweave cross-module classification.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode class documentation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-003
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode defines index_id as the ID of the index or retriever to delegate to, directly supporting an index-reference pointer.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-004
    source: eng-fw-llamaindex-repo
    supports: BaseIndex separately owns index_struct and index_id, supporting the claim that an IndexNode's index_id reference does not copy index structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and index_id
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-005
    source: eng-fw-llamaindex-repo
    supports: BaseIndex owns index_struct and exposes as_retriever, supporting the entity side of the reference-versus-index boundary.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-006
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id is documented as a delegation target ID, independently supporting the pointer side of the boundary.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode definition and index_id
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-007
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id names the index or retriever to delegate to, directly supporting this concrete index-pointer instance.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode carries an index_id that points retrieval from one node to another index object. This directly supports the locator-bearing IndexPointer side of the distinction; it does not define Moonweave's version-pinned IndexVersionReference or their common SourceReference parent.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode class documentation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-009
    source: eng-ont-prov-o
    supports: PROV-O specializationOf distinguishes a more specific Entity that presents a particular aspect from a more general Entity. Moonweave applies that provenance pattern to IndexVersionReference, which pins one version or snapshot, while IndexPointer may resolve the index without fixing a version.
    locator: PROV-O Recommendation §5.5.1 > prov:specializationOf
    evidence_kind: design-inference
    confidence: medium
  - id: claim-index-pointer-010
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode.index_id is a string identifier for another index or retriever, directly supporting an index-resolving reference.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-011
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex separates IndexNode.index_id from BaseIndex.index_struct, grounding the boundary between a pointer and the index object it resolves.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id; llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-012
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id demonstrates a non-copying handle that resolves another index or retriever, grounding IndexPointer as a specialized SourceReference.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id and obj
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-pointer-013
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex IndexNode stores index_id for another index or retriever and resolves the object separately, directly grounding the pointer-to-index reference.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id and obj
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-014
    source: eng-fw-llamaindex-repo
    supports: BaseIndex owns index_struct and index_id, supporting the target side as an index object rather than the pointer record itself.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and index_id
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-015
    source: eng-fw-llamaindex-repo
    supports: IndexNode resolves its index_id through an object mapping; a missing mapping leaves the pointer unresolved and does not authorize substitution of another index.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.from_dict and index_id object resolution
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-016
    source: eng-fw-llamaindex-repo
    supports: The explicit index_id field, rather than object co-location, identifies the referenced index or retriever in LlamaIndex's schema.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode class documentation and index_id field
    evidence_kind: official
    confidence: high
  - id: claim-index-pointer-017
    source: eng-fw-llamaindex-repo
    supports: IndexNode.index_id provides first-party evidence for a handle that references another index or retriever without owning its structure.
    locator: llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: design-inference
    confidence: high
  - id: claim-index-pointer-018
    source: eng-fw-llamaindex-repo
    supports: BaseIndex's separate ownership of index_struct grounds the target identity and supports keeping references as a cross-link rather than a subtype relation.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct
    evidence_kind: design-inference
    confidence: high
  - id: claim-iptr-cursor
    source: src-cursor-search
    supports: Cursor codebase index hits reference indexed files via pointers.
    locator: codebase index
    evidence_kind: official-doc
    confidence: medium
  - id: claim-iptr-design
    source: src-info-indexing-design
    supports: IndexPointer references IndexEntry without copying body or owning index build.
    locator: IndexPointer
    evidence_kind: design-inference
    confidence: high
