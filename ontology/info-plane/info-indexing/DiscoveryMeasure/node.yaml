schema: moonweave.ai/ontology-node/v1
id: DiscoveryMeasure
kind: concept
status: accepted
labels:
  zh: 发现度量
  en: Discovery Measure
  ja: 発見測定
semantics:
  short_definition:
    zh: 与一次发现活动及其候选或结果集合关联的单个可解释观测值。
    en: One interpretable observation associated with a discovery activity and one of its candidates or result sets.
    ja: 発見アクティビティと、その候補または結果集合の 1 つに関連付けられた単一の解釈可能な観測値。
  definition:
    zh: DiscoveryMeasure 是运行期记录，用于描述某次 DiscoveryActivity 中的候选、结果集合或阶段的观测。它声明 measure_id、活动、受测对象、度量类别、阶段和记录时间，并由 CandidateRank 与 DiscoveryScore 特化。它不是离线检索基准指标、全局模型质量结论、嵌入向量或物理索引统计；例如 NDCG 或 benchmark 平均分必须在评估域建模，而不是伪装成单次候选度量。
    en: DiscoveryMeasure is a run-time record describing an observation about a candidate, result set, or stage in one DiscoveryActivity. It declares a measure ID, activity, measured subject, measure kind, stage, and recording time, and is specialized by CandidateRank and DiscoveryScore. It is not an offline retrieval-benchmark metric, global model-quality conclusion, embedding vector, or physical-index statistic; for example, NDCG or a benchmark average belongs to an evaluation domain rather than being presented as a single-candidate measure.
    ja: DiscoveryMeasure は、1 回の DiscoveryActivity 内の候補、結果集合、または段階についての観測を表す実行時記録である。測定 ID、活動、測定対象、測定種別、段階、記録時刻を宣言し、CandidateRank と DiscoveryScore により特化される。これはオフライン検索ベンチマーク指標、全体的なモデル品質結論、埋め込みベクトル、物理インデックス統計ではない。たとえば NDCG やベンチマーク平均は、単一候補測定として扱わず評価ドメインに属する。
  why_needed:
    zh: 排名、分数和候选数需要追溯到具体运行和阶段，才能避免把不可比的运行观察误当作系统级评估。
    en: Ranks, scores, and candidate counts need to be traceable to a concrete run and stage so incomparable run observations are not mistaken for system-level evaluation.
    ja: ランク、スコア、候補数は、比較できない実行観測をシステムレベル評価と誤認しないよう、具体的な実行と段階に追跡可能である必要がある。
  includes:
    - zh: 一次发现运行中候选或结果集合的排名、分数或候选计数观察。
      en: Rank, score, or candidate-count observations for a candidate or result set in one discovery run.
      ja: 1 回の発見実行における候補または結果集合のランク、スコア、候補数の観測。
    - zh: 初始、重排序或最终阶段的受限测量上下文。
      en: Bounded measurement context for initial, reranked, or final stages.
      ja: 初期、再ランキング、最終段階に対する境界付き測定コンテキスト。
  excludes:
    - zh: 跨数据集聚合的 NDCG、Recall 或其他离线基准结果。
      en: NDCG, Recall, or other offline benchmark results aggregated across datasets.
      ja: データセット全体で集約された NDCG、Recall、その他のオフラインベンチマーク結果。
    - zh: 嵌入分量、索引大小、数据库扫描计划或源文档事实。
      en: Embedding components, index size, database scan plans, or source-document facts.
      ja: 埋め込み成分、インデックスサイズ、データベーススキャン計画、ソース文書の事実。
  semantic_kind: observation
  aliases: [retrieval observation, run measure, 检索观测]
engineering:
  explanation:
    zh: 运行器为每个需要解释的候选或结果集合生成独立 measure_id，并显式写入活动和阶段。排序器把序数写为 CandidateRank，检索器或重排序器把数值写为 DiscoveryScore；离线评估管线可引用这些运行产物，但不得把其聚合指标回写为本对象。
    en: The runner creates a distinct measure_id for every candidate or result set that needs explanation and explicitly records the activity and stage. A ranker writes ordinals as CandidateRank, while a retriever or reranker writes numeric values as DiscoveryScore; an offline evaluation pipeline may consume these run artifacts but must not write its aggregate metrics back as this object.
    ja: 実行器は説明が必要な候補または結果集合ごとに固有の measure_id を作成し、活動と段階を明示的に記録する。ランカーは順序数を CandidateRank として書き、取得器または再ランカーは数値を DiscoveryScore として書く。オフライン評価パイプラインはこれらの実行成果物を利用できるが、集約指標をこのオブジェクトとして書き戻してはならない。
  typical_input:
    - description:
        zh: 结果集合的初始候选计数观察
        en: Initial candidate-count observation for a result set
        ja: 結果集合の初期候補数観測
      format: |-
        {"measure_id":"measure-001","activity_id":"disc-2026-07-19-001","subject_ref":"result-set://results-disc-2026-07-19-001","measure_kind":"candidate_count","measurement_stage":"initial","recorded_at":"2026-07-19T09:30:01Z"}
  typical_output:
    - description:
        zh: 可由专门排名或分数记录补充的度量引用
        en: Measure reference that specialized rank or score records can supplement
        ja: 特化されたランクまたはスコア記録が補完できる測定参照
      format: |-
        {"measure_id":"measure-001","activity_id":"disc-2026-07-19-001","subject_ref":"result-set://results-disc-2026-07-19-001","measurement_stage":"initial"}
  reference_implementations:
    - name: Pinecone Rerank Results
      url: https://docs.pinecone.io/guides/search/rerank-results
      description: Documents an initial retrieval stage followed by scoring and a new ranked result order.
    - name: BEIR Paper
      url: https://arxiv.org/abs/2104.08663
      description: Documents retrieval evaluation across benchmark datasets and retrieval architectures.
structure:
  identity_keys: [measure_id]
  fields:
    - id: measure_id
      labels: {zh: 度量 ID, en: Measure ID, ja: 測定 ID}
      definitions:
        zh: 此运行期发现度量的稳定标识符。
        en: Stable identifier for this run-time discovery measure.
        ja: この実行時発見測定の安定した識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: measure-001
      source_claims: []
    - id: activity_id
      labels: {zh: 发现活动 ID, en: Discovery activity ID, ja: 発見アクティビティ ID}
      definitions:
        zh: 产生此观测的 DiscoveryActivity 标识符。
        en: Identifier of the DiscoveryActivity that produced this observation.
        ja: この観測を生成した DiscoveryActivity の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: disc-2026-07-19-001
      source_claims: [claim-pinecone-rerank-stages]
    - id: subject_ref
      labels: {zh: 受测对象引用, en: Measured subject reference, ja: 測定対象参照}
      definitions:
        zh: 指向此次运行中的 DiscoveryResult 或结果集合的引用。
        en: Reference to a DiscoveryResult or result set belonging to this run.
        ja: この実行に属する DiscoveryResult または結果集合への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: result-set://results-disc-2026-07-19-001
      source_claims: [claim-pinecone-rerank-stages]
    - id: measure_kind
      labels: {zh: 度量类别, en: Measure kind, ja: 測定種別}
      definitions:
        zh: 观测的受控类别，不等同于离线评估指标名称。
        en: Controlled category of the observation and not the name of an offline evaluation metric.
        ja: 観測の制御されたカテゴリであり、オフライン評価指標の名称ではない。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [rank, score, candidate_count]
      example_value: candidate_count
      source_claims: [claim-pinecone-rerank-stages]
    - id: measurement_stage
      labels: {zh: 度量阶段, en: Measurement stage, ja: 測定段階}
      definitions:
        zh: 产生观测的检索管线阶段。
        en: Retrieval-pipeline stage at which the observation was produced.
        ja: 観測が生成された取得パイプライン段階。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [initial, reranked, final]
      example_value: initial
      source_claims: [claim-pinecone-rerank-stages]
    - id: recorded_at
      labels: {zh: 记录时间, en: Recorded at, ja: 記録時刻}
      definitions:
        zh: 此度量被生成的 UTC 时间戳。
        en: UTC timestamp at which this measure was generated.
        ja: この測定が生成された UTC タイムスタンプ。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 2026-07-19T09:30:01Z
      source_claims: []
  constraints:
    - id: discovery-measure-subject-scope
      severity: error
      language: plain
      expression: activity_id must resolve to a DiscoveryActivity, subject_ref must resolve to a result or result set emitted by that activity, and measurement_stage must be one of the activity's executed stages.
      explanation:
        zh: 度量只在生成它的运行和结果范围内有意义。
        en: A measure is meaningful only within the run and result scope that produced it.
        ja: 測定は、それを生成した実行と結果の範囲内でのみ意味を持つ。
      source_claims: [claim-pinecone-rerank-stages]
    - id: discovery-measure-not-benchmark
      severity: error
      language: plain
      expression: measure_kind must not be ndcg, recall, precision, mrr, benchmark_average, or model_quality, and the record must not aggregate values across datasets or runs.
      explanation:
        zh: 离线基准指标评估的是系统在多个查询和数据集上的表现，不是一次发现运行中的单项观察。
        en: Offline benchmark metrics evaluate a system across multiple queries and datasets rather than one observation in a discovery run.
        ja: オフラインベンチマーク指標は、発見実行内の 1 観測ではなく、複数のクエリとデータセットにわたるシステムを評価する。
      source_claims: [claim-beir-evaluation]
    - id: discovery-measure-specialization-consistency
      severity: error
      language: plain
      expression: measure_kind rank must be represented by CandidateRank and measure_kind score must be represented by DiscoveryScore with the same activity_id and subject_ref.
      explanation:
        zh: 排名和分数各有独立语义，不能使用无类型数值替代。
        en: Rank and score have distinct semantics and cannot be replaced by an untyped number.
        ja: ランクとスコアは異なる意味論を持ち、型のない数値で置き換えることはできない。
      source_claims: [claim-pinecone-rerank-stages]
  required_relations: [DiscoveryMeasure-observed-during-DiscoveryActivity]
examples:
  - id: discovery-measure-initial-candidate-count
    labels:
      zh: 初始候选计数
      en: Initial candidate count
      ja: 初期候補数

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; DiscoveryMeasure maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; DiscoveryMeasure maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; DiscoveryMeasure context/token boundary."}
    field_values: {measure_id: measure-001, activity_id: disc-2026-07-19-001, subject_ref: result-set://results-disc-2026-07-19-001, measure_kind: candidate_count, measurement_stage: initial, recorded_at: 2026-07-19T09:30:01Z}
    related_node_ids: [DiscoveryMeasure, DiscoveryActivity, DiscoveryResult]
    source_claims: [claim-pinecone-rerank-stages]
parent_relation: null
relations:
  - id: DiscoveryMeasure-observed-during-DiscoveryActivity
    predicate: observed_during
    target: concept:DiscoveryActivity
    endpoint_order: measure-to-activity
    direction: source-to-target
    relation_kind: observation
    labels:
      zh: 在发现活动期间被观测
      en: is observed during discovery activity
      ja: 発見アクティビティ中に観測される
    definitions:
      zh: DiscoveryMeasure 记录在一次 DiscoveryActivity 中对候选、结果集合或阶段作出的可解释观测；它不把度量记录本身等同于活动。
      en: DiscoveryMeasure records an interpretable observation about a candidate, result set, or stage during one DiscoveryActivity and does not equate the measure record with that activity.
      ja: DiscoveryMeasure は一つの DiscoveryActivity 中の候補、結果集合、または段階に関する解釈可能な観測を記録し、測定記録自体をそのアクティビティと同一視しない。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_discovery_measure_observation
      labels:
        zh: 具有发现度量观测
        en: has discovery-measure observation
        ja: 発見測定の観測を持つ
    conditions: []
    temporal_scope: transaction-time
    boundary_context: Moonweave run-observation association; it does not assert that a retrieval protocol exposes a native DiscoveryMeasure type.
    constraints: []
    examples: []
    source_claims: [claim-discovery-measure-activity-link]
    distinct_fact_rationale:
      zh: 该交叉关系表达观测与运行的可追溯关联，而不是把观测记录置于活动的类型层级或组成层级。
      en: This cross-link expresses traceable association between an observation and a run rather than placing a measure record in an activity type or composition hierarchy.
      ja: このクロスリンクは観測と実行の追跡可能な関連付けを表し、測定記録をアクティビティの型または構成階層に置かない。
    layout_role: cross-link
sources:
  - id: pinecone-rerank
    title: Pinecone Rerank Results
    url: https://docs.pinecone.io/guides/search/rerank-results
    source_type: official-documentation
    relevance: Documents two-stage retrieval followed by reranking and a new ordering of results.
  - id: beir-paper
    title: "BEIR: A Heterogeneous Benchmark for Zero-shot Evaluation of Information Retrieval Models"
    url: https://arxiv.org/abs/2104.08663
    source_type: technical-paper
    relevance: Documents benchmark evaluation across retrieval systems and datasets.
source_claims:
  - id: claim-pinecone-rerank-stages
    source: pinecone-rerank
    supports: Pinecone documents a two-stage retrieval process that obtains initial results and then scores them to return a new ranking.
    locator: Rerank results § Integrated reranking
    evidence_kind: official-documentation
    confidence: high
  - id: claim-beir-evaluation
    source: beir-paper
    supports: BEIR evaluates retrieval systems across lexical, sparse, dense, late-interaction, and reranking architectures on retrieval benchmarks.
    locator: BEIR abstract
    evidence_kind: technical-paper
    confidence: high
  - id: claim-discovery-measure-activity-link
    source: pinecone-rerank
    supports: Modeling a run-scoped measure as an observation associated with a DiscoveryActivity is a Moonweave design inference based on staged retrieval and reranking, not a claim that the source defines a native DiscoveryMeasure object.
    locator: Rerank results § Integrated reranking
    evidence_kind: design-inference
    confidence: medium

