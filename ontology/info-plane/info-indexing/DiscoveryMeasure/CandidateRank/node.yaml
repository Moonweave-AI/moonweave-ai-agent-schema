schema: moonweave.ai/ontology-node/v1
id: CandidateRank
kind: concept
status: accepted
labels:
  zh: 候选名次
  en: Candidate Rank
  ja: 候補順位
semantics:
  short_definition:
    zh: 某一结果集合和排序阶段中候选的正整数序位。
    en: Positive-integer ordinal position of a candidate within one result set and ranking stage.
    ja: 1 つの結果集合とランキング段階における候補の正整数順序位置。
  definition:
    zh: CandidateRank 是 DiscoveryMeasure 的序数子类型，记录某个 DiscoveryResult 在明确 result_set_id 和 ranking_stage 中的 rank_position。它可表示初始检索、重排序或最终顺序，但不记录相关性分值、分值归一化、模型置信度或候选内容。名次只能在同一结果集合和阶段内比较，且 rank_position 为 1 表示该受限集合的第一位，不宣称跨运行或跨查询的绝对质量。
    en: CandidateRank is an ordinal subtype of DiscoveryMeasure that records rank_position for one DiscoveryResult within an explicit result_set_id and ranking_stage. It may represent initial retrieval, reranked, or final order, but it does not record relevance values, score normalization, model confidence, or candidate content. A rank is comparable only within the same result set and stage, and rank_position 1 means first in that bounded set rather than an absolute quality claim across runs or queries.
    ja: CandidateRank は DiscoveryMeasure の順序型サブタイプであり、明示的な result_set_id と ranking_stage 内の 1 つの DiscoveryResult の rank_position を記録する。初期検索、再ランキング、最終順序を表せるが、関連性値、スコア正規化、モデル信頼度、候補内容は記録しない。順位は同じ結果集合と段階内でのみ比較可能であり、rank_position 1 はその境界付き集合での先頭を意味し、実行またはクエリ横断の絶対品質主張ではない。
  why_needed:
    zh: 用户和后续系统通常依序处理候选，因此必须能说明候选在何个结果集合、哪个阶段处于第几位，而不将顺序混同为分数。
    en: Users and downstream systems often process candidates in order, so a record must state which result set and stage gave a candidate its position without confusing order with a score.
    ja: ユーザーと下流システムは候補を順に処理することが多いため、順序をスコアと混同せず、どの結果集合と段階で候補がどの位置になったかを記録する必要がある。
  includes:
    - zh: 初始、重排序或最终阶段中候选的从一开始的序位。
      en: One-based candidate position in an initial, reranked, or final stage.
      ja: 初期、再ランキング、最終段階における候補の 1 始まり位置。
    - zh: 为确定性排序保存的可选平局打破规则引用。
      en: Optional tie-breaker rule reference retained for deterministic ordering.
      ja: 決定的な順序付けのために保持される任意のタイブレーカー規則参照。
  excludes:
    - zh: BM25、余弦相似度、重排序器分数或其他数值相关性值。
      en: BM25, cosine similarity, reranker scores, or other numeric relevance values.
      ja: BM25、コサイン類似度、再ランカースコア、その他の数値的関連性値。
    - zh: 查询、结果正文、全局质量指标或排序算法内部状态。
      en: Query text, result body, global quality metrics, or ranking-algorithm internals.
      ja: クエリテキスト、結果本文、全体品質指標、ランキングアルゴリズム内部状態。
  semantic_kind: observation
  aliases: [result position, ordinal rank, 结果排位]
engineering:
  explanation:
    zh: 排序器对活动的 result_set_id 在每个阶段单独编号，从 1 开始写入 CandidateRank。重排序后，系统创建新的 ranking_stage 记录而不是覆盖初始名次；数值评分另以 DiscoveryScore 关联。若候选的分值相同，可记录 tie_breaker_ref 来说明稳定顺序来源。
    en: A ranker numbers an activity's result_set_id separately at each stage and writes CandidateRank starting at 1. After reranking, the system creates records for a new ranking_stage rather than overwriting initial positions; numeric values are associated separately as DiscoveryScore. If candidate values are tied, tie_breaker_ref can explain the stable-order source.
    ja: ランカーはアクティビティの result_set_id を各段階ごとに個別に番号付けし、1 から CandidateRank を書き込む。再ランキング後、システムは初期順位を上書きせず新しい ranking_stage の記録を作成する。数値は DiscoveryScore として別に関連付ける。候補値が同点の場合、tie_breaker_ref が安定順序の根拠を説明できる。
  typical_input:
    - description:
        zh: 重排序阶段的候选顺序
        en: Candidate order at a reranked stage
        ja: 再ランキング段階の候補順序
      format: |-
        {"activity_id":"disc-2026-07-19-001","result_set_id":"results-disc-2026-07-19-001","ranking_stage":"reranked","ordered_result_ids":["result-03","result-01","result-02"]}
  typical_output:
    - description:
        zh: 一个候选的独立名次记录
        en: Independent rank record for one candidate
        ja: 1 候補の独立した順位記録
      format: |-
        {"rank_id":"rank-003","activity_id":"disc-2026-07-19-001","result_id":"result-03","result_set_id":"results-disc-2026-07-19-001","rank_position":1,"ranking_stage":"reranked","tie_breaker_ref":"rule://stable-id-ascending"}
  reference_implementations:
    - name: Pinecone Rerank Results
      url: https://docs.pinecone.io/guides/search/rerank-results
      description: Documents reranking initial retrieval results and returning a new rank order.
    - name: Elasticsearch Run a Search API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
      description: Documents a search response that exposes ordered hit records.
structure:
  identity_keys: [rank_id]
  fields:
    - id: rank_id
      labels: {zh: 名次 ID, en: Rank ID, ja: 順位 ID}
      definitions:
        zh: 此候选名次观测的稳定标识符。
        en: Stable identifier for this candidate-rank observation.
        ja: この候補順位観測の安定した識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: rank-003
      source_claims: []
    - id: activity_id
      labels: {zh: 发现活动 ID, en: Discovery activity ID, ja: 発見アクティビティ ID}
      definitions:
        zh: 产生该排序的 DiscoveryActivity 标识符。
        en: Identifier of the DiscoveryActivity that produced this ordering.
        ja: この順序を生成した DiscoveryActivity の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: disc-2026-07-19-001
      source_claims: [claim-pinecone-rerank]
    - id: result_id
      labels: {zh: 结果 ID, en: Result ID, ja: 結果 ID}
      definitions:
        zh: 接收此名次的 DiscoveryResult 标识符。
        en: Identifier of the DiscoveryResult receiving this rank.
        ja: この順位を受け取る DiscoveryResult の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: result-03
      source_claims: [claim-elastic-hit]
    - id: result_set_id
      labels: {zh: 结果集合 ID, en: Result set ID, ja: 結果集合 ID}
      definitions:
        zh: 名次所属的有界结果集合标识符。
        en: Identifier of the bounded result set to which the rank belongs.
        ja: 順位が属する境界付き結果集合の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: results-disc-2026-07-19-001
      source_claims: [claim-pinecone-rerank]
    - id: rank_position
      labels: {zh: 名次位置, en: Rank position, ja: 順位位置}
      definitions:
        zh: 从 1 开始的正整数序位。
        en: One-based positive-integer ordinal position.
        ja: 1 始まりの正整数順序位置。
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 1
      source_claims: [claim-pinecone-rerank]
    - id: ranking_stage
      labels: {zh: 排序阶段, en: Ranking stage, ja: ランキング段階}
      definitions:
        zh: 产生该名次的有序阶段。
        en: Ordered stage that produced this rank.
        ja: この順位を生成した順序付け段階。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [initial, reranked, final]
      example_value: reranked
      source_claims: [claim-pinecone-rerank]
    - id: tie_breaker_ref
      labels: {zh: 平局规则引用, en: Tie-breaker reference, ja: タイブレーカー参照}
      definitions:
        zh: 可选地指向同分候选稳定排序所用规则。
        en: Optional reference to the rule used to order equal candidates stably.
        ja: 同順位候補を安定して並べるために使う規則への任意参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: rule://stable-id-ascending
      source_claims: []
  constraints:
    - id: candidate-rank-positive-and-unique
      severity: error
      language: plain
      expression: rank_position must be an integer greater than or equal to 1, and no two result_id values may occupy the same rank_position within one activity_id, result_set_id, and ranking_stage unless tie_breaker_ref resolves to a deterministic ordering rule.
      explanation:
        zh: 名次是受限集合内的序位，必须从一开始且可重复解释。
        en: A rank is an ordinal in a bounded set and must start at one with repeatable explanation.
        ja: 順位は境界付き集合内の順序であり、1 から始まり再現可能に説明されなければならない。
      source_claims: [claim-pinecone-rerank]
    - id: candidate-rank-scope-consistency
      severity: error
      language: plain
      expression: result_id and result_set_id must resolve to results emitted by activity_id, and ranking_stage must match a stage recorded for that activity.
      explanation:
        zh: 不同发现运行或阶段的名次不可直接混合比较。
        en: Ranks from different discovery runs or stages cannot be mixed for direct comparison.
        ja: 異なる発見実行または段階の順位を直接比較のために混在させることはできない。
      source_claims: [claim-pinecone-rerank]
    - id: candidate-rank-not-score
      severity: error
      language: plain
      expression: CandidateRank must not contain score_value, similarity, confidence, normalization, or embedding fields; numeric relevance belongs to DiscoveryScore.
      explanation:
        zh: 名次表示顺序，分数表示数值相关性，两者不能在同一字段中混用。
        en: Rank expresses order and score expresses numeric relevance, so the two cannot be merged into the same fields.
        ja: 順位は順序を、スコアは数値的関連性を表すため、同じフィールドに統合できない。
      source_claims: [claim-elastic-hit]
  required_relations: [CandidateRank-is_a-DiscoveryMeasure]
examples:
  - id: candidate-rank-first-after-reranking
    labels:
      zh: 重排序后第一名
      en: First after reranking
      ja: 再ランキング後の一位

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; CandidateRank maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; CandidateRank maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; CandidateRank context/token boundary."}
    field_values: {rank_id: rank-003, activity_id: disc-2026-07-19-001, result_id: result-03, result_set_id: results-disc-2026-07-19-001, rank_position: 1, ranking_stage: reranked, tie_breaker_ref: rule://stable-id-ascending}
    related_node_ids: [CandidateRank, DiscoveryMeasure, DiscoveryResult]
    source_claims: [claim-pinecone-rerank]
parent_relation:
  id: CandidateRank-is_a-DiscoveryMeasure
  predicate: is_a
  target: concept:DiscoveryMeasure
  endpoint_order: subtype-to-supertype
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 候选名次是发现度量的一种, en: candidate rank is a kind of discovery measure, ja: 候補順位は発見測定の一種である}
  definitions:
    zh: CandidateRank 在发现度量的运行范围上增加了序数、结果集合和排序阶段语义。
    en: CandidateRank adds ordinal, result-set, and ranking-stage semantics to a run-scoped discovery measure.
    ja: CandidateRank は実行範囲の発見測定に順序、結果集合、ランキング段階の意味論を追加する。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_candidate_rank_subtype
    labels: {zh: 具有候选名次子类型, en: has candidate-rank subtype, ja: 候補順位の下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-pinecone-rerank]
  distinct_fact_rationale:
    zh: 该关系保留度量的活动范围，同时明确名次不是分数或离线指标。
    en: This relation retains the measure's activity scope while making clear that rank is neither a score nor an offline metric.
    ja: この関係は測定の活動範囲を保持し、順位がスコアでもオフライン指標でもないことを明確にする。
  layout_role: primary-backbone
relations: []
sources:
  - id: pinecone-rerank
    title: Pinecone Rerank Results
    url: https://docs.pinecone.io/guides/search/rerank-results
    source_type: official-documentation
    relevance: Documents reranking initial results and returning a new, more accurate ordering.
  - id: elasticsearch-search
    title: Elasticsearch Run a Search API
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
    source_type: official-api-reference
    relevance: Documents returned search hit records with identifiers and scores.
source_claims:
  - id: claim-pinecone-rerank
    source: pinecone-rerank
    supports: Pinecone documents reranking as a two-stage process that queries initial results then scores and returns a new ranking.
    locator: Rerank results § Integrated reranking
    evidence_kind: official-documentation
    confidence: high
  - id: claim-elastic-hit
    source: elasticsearch-search
    supports: Elasticsearch documents a search response as returned documents and metadata including index, identifier, score, and fields.
    locator: Run a search response schema § hits.hits
    evidence_kind: official-api-reference
    confidence: high

