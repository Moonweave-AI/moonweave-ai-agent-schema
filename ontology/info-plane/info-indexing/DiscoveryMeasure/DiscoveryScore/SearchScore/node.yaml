schema: moonweave.ai/ontology-node/v1
id: SearchScore
kind: concept
status: accepted
labels:
  zh: 搜索命中分数
  en: Search Score
  ja: 検索ヒットスコア
semantics:
  short_definition:
    zh: 搜索接口返回的单个 SearchResult 的有配置范围分数。
    en: Configuration-scoped score for one SearchResult returned by a search interface.
    ja: 検索インターフェースが返した 1 つの SearchResult に対する構成範囲付きスコア。
  definition:
    zh: SearchScore 是 DiscoveryScore 的搜索命中特化，记录一个 SearchResult 在某个活动、结果集合和搜索方式下的引擎或重排序数值。它声明 search_result_id、search_method、score_value、方向、归一化和配置引用。它可以映射 API 响应中的 _score 或重排序分数，但不能声称所有搜索系统具有相同分值尺度；它不是 SearchResult、CandidateRank、查询文本、索引内部倒排项、嵌入或向量索引。
    en: SearchScore is the search-hit specialization of DiscoveryScore, recording an engine or reranker value for one SearchResult under an activity, result set, and search method. It declares search_result_id, search_method, score_value, direction, normalization, and configuration reference. It can map an API response _score or reranker score, but cannot claim that all search systems share a scale; it is not the SearchResult, CandidateRank, query text, an internal inverted posting, an embedding, or a vector index.
    ja: SearchScore は DiscoveryScore の検索ヒット特化であり、活動、結果集合、検索方式のもとで 1 つの SearchResult に対するエンジンまたは再ランカー値を記録する。search_result_id、search_method、score_value、方向、正規化、構成参照を宣言する。API 応答の _score または再ランカースコアをマップできるが、すべての検索システムが同一尺度を共有すると主張できない。これは SearchResult、CandidateRank、クエリテキスト、内部転置ポスティング、埋め込み、ベクトルインデックスではない。
  why_needed:
    zh: 搜索 API 的命中分数需要在其请求方式和引擎配置内被解释，不能与一般分数或最终排序混在一起。
    en: A search API hit score needs interpretation within its request method and engine configuration rather than being mixed with generic scores or final order.
    ja: 検索 API のヒットスコアは、一般的なスコアまたは最終順序と混在させず、リクエスト方式とエンジン構成の中で解釈する必要がある。
  includes:
    - zh: 全文、稠密向量、稀疏向量或混合搜索响应中一个命中的数值。
      en: Numeric value for one hit from a full-text, dense-vector, sparse-vector, or hybrid search response.
      ja: 全文、稠密ベクトル、疎ベクトル、またはハイブリッド検索応答の 1 ヒットの数値。
    - zh: 将命中分数绑定到搜索方式和引擎配置的边界。
      en: Boundary that binds a hit score to a search method and engine configuration.
      ja: ヒットスコアを検索方式とエンジン構成に結び付ける境界。
  excludes:
    - zh: 命中文档、突出显示片段、候选名次或查询负载。
      en: Hit document, highlight fragment, candidate rank, or query payload.
      ja: ヒット文書、ハイライト断片、候補順位、クエリペイロード。
    - zh: 嵌入坐标、向量维度、距离函数实现或 ANN 图参数。
      en: Embedding coordinates, vector dimensions, distance-function implementation, or ANN graph parameters.
      ja: 埋め込み座標、ベクトル次元、距離関数実装、ANN グラフパラメーター。
  semantic_kind: observation
  aliases: [hit score, engine score, 命中相关性分数]
engineering:
  explanation:
    zh: 搜索适配器从响应 hit 的 _id、_score 和请求方式创建 SearchScore，并记录调用所用的引擎配置引用。对于混合或向量搜索，适配器保留方法名和外部服务边界，但不把嵌入内容放入分数。若需要最终显示顺序，另行创建 CandidateRank。
    en: A search adapter creates SearchScore from a response hit's _id, _score, and request method and records the engine-configuration reference used by the call. For hybrid or vector search, the adapter retains the method name and external-service boundary without placing embeddings in the score. If final display order is needed, it creates CandidateRank separately.
    ja: 検索アダプターは、応答ヒットの _id、_score、リクエスト方式から SearchScore を作成し、呼び出しで使用したエンジン構成参照を記録する。ハイブリッドまたはベクトル検索では、埋め込みをスコアに置かず方式名と外部サービス境界を保持する。最終表示順序が必要なら、CandidateRank を別に作成する。
  typical_input:
    - description:
        zh: 搜索 API 命中响应
        en: Search API hit response
        ja: 検索 API ヒット応答
      format: |-
        {"activity_id":"disc-2026-07-19-001","result_set_id":"results-disc-2026-07-19-001","search_method":"full_text","hit":{"_id":"doc-042","_score":12.5},"score_configuration_ref":"config://elasticsearch/docs-title-v3"}
  typical_output:
    - description:
        zh: SearchResult 的独立搜索分数
        en: Independent search score for a SearchResult
        ja: SearchResult の独立した検索スコア
      format: |-
        {"score_id":"search-score-042","activity_id":"disc-2026-07-19-001","search_result_id":"search-result-042","result_set_id":"results-disc-2026-07-19-001","search_method":"full_text","score_value":12.5,"higher_is_better":true,"normalization":"none","score_configuration_ref":"config://elasticsearch/docs-title-v3"}
  reference_implementations:
    - name: Elasticsearch Run a Search API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
      description: Documents response hits with _id, _index, _score, and returned fields.
    - name: Pinecone Search Overview
      url: https://docs.pinecone.io/guides/search/search-overview
      description: Documents full-text, dense, sparse, and hybrid search approaches with differing signals.
structure:
  identity_keys: [score_id]
  fields:
    - id: score_id
      labels: {zh: 分数 ID, en: Score ID, ja: スコア ID}
      definitions:
        zh: 此搜索命中分数的稳定标识符。
        en: Stable identifier for this search-hit score.
        ja: この検索ヒットスコアの安定した識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: search-score-042
      source_claims: []
    - id: activity_id
      labels: {zh: 发现活动 ID, en: Discovery activity ID, ja: 発見アクティビティ ID}
      definitions:
        zh: 返回该搜索命中的 DiscoveryActivity 标识符。
        en: Identifier of the DiscoveryActivity that returned this search hit.
        ja: この検索ヒットを返した DiscoveryActivity の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: disc-2026-07-19-001
      source_claims: [claim-elastic-search-hit]
    - id: search_result_id
      labels: {zh: 搜索结果 ID, en: Search result ID, ja: 検索結果 ID}
      definitions:
        zh: 接收该分数的 SearchResult 标识符。
        en: Identifier of the SearchResult receiving this score.
        ja: このスコアを受け取る SearchResult の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: search-result-042
      source_claims: [claim-elastic-search-hit]
    - id: result_set_id
      labels: {zh: 结果集合 ID, en: Result set ID, ja: 結果集合 ID}
      definitions:
        zh: 该命中所在的有界搜索结果集合标识符。
        en: Identifier of the bounded search-result set containing this hit.
        ja: このヒットを含む境界付き検索結果集合の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: results-disc-2026-07-19-001
      source_claims: [claim-elastic-search-hit]
    - id: search_method
      labels: {zh: 搜索方法, en: Search method, ja: 検索方式}
      definitions:
        zh: 产生此命中的搜索信号方式，不导入其底层向量或索引结构。
        en: Search-signal method that produced this hit without importing its underlying vector or index structure.
        ja: 基盤のベクトルまたはインデックス構造を取り込まず、このヒットを生成した検索シグナル方式。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [full_text, dense_vector, sparse_vector, hybrid]
      example_value: full_text
      source_claims: [claim-pinecone-search-types]
    - id: score_value
      labels: {zh: 分数值, en: Score value, ja: スコア値}
      definitions:
        zh: 由搜索响应在该方法和配置范围内给出的有限数值。
        en: Finite numeric value supplied by the search response within this method and configuration scope.
        ja: この方式と構成範囲内で検索応答が提供する有限数値。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 12.5
      source_claims: [claim-elastic-search-hit]
    - id: higher_is_better
      labels: {zh: 高值更优, en: Higher is better, ja: 高い値がより良い}
      definitions:
        zh: 指示该搜索方法中较大数值是否表示较高相关性。
        en: Indicates whether a larger value means higher relevance for this search method.
        ja: この検索方式でより大きい値がより高い関連性を意味するかを示す。
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: true
      source_claims: []
    - id: normalization
      labels: {zh: 归一化方式, en: Normalization, ja: 正規化方式}
      definitions:
        zh: 分数在该接口适配器中采用的归一化状态。
        en: Normalization state applied by this interface adapter to the score.
        ja: このインターフェースアダプターがスコアに適用した正規化状態。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [none, minmax, model_defined]
      example_value: none
      source_claims: []
    - id: score_configuration_ref
      labels: {zh: 评分配置引用, en: Score configuration reference, ja: スコア構成参照}
      definitions:
        zh: 指向此搜索调用的索引、查询或重排序配置边界。
        en: Reference to the index, query, or reranking configuration boundary for this search call.
        ja: この検索呼び出しのインデックス、クエリ、または再ランキング構成境界への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: config://elasticsearch/docs-title-v3
      source_claims: [claim-elastic-search-hit]
  constraints:
    - id: search-score-hit-consistency
      severity: error
      language: plain
      expression: search_result_id and result_set_id must resolve to a SearchResult emitted by activity_id, and score_value must be finite under the declared search_method and score_configuration_ref.
      explanation:
        zh: 命中分数必须指向同一次搜索调用的具体返回结果。
        en: A hit score must point to a concrete returned result from the same search call.
        ja: ヒットスコアは同じ検索呼び出しから返された具体的な結果を指さなければならない。
      source_claims: [claim-elastic-search-hit]
    - id: search-score-comparison-boundary
      severity: error
      language: plain
      expression: score_value comparisons require identical search_method, score_configuration_ref, normalization, higher_is_better, and result_set_id unless an explicit conversion record exists.
      explanation:
        zh: 不同搜索方法与引擎配置的分数不具有默认共同尺度。
        en: Scores from different search methods and engine configurations have no default common scale.
        ja: 異なる検索方式とエンジン構成のスコアには、既定の共通尺度がない。
      source_claims: [claim-pinecone-search-types]
    - id: search-score-no-payload-or-vector
      severity: error
      language: plain
      expression: SearchScore must not contain rank_position, raw_query, document_body, embeddings, vector_dimension, distance_metric, or ANN parameters.
      explanation:
        zh: 搜索命中分数只表示带范围的数值，而不拥有结果、查询或向量设施的内部状态。
        en: A search-hit score represents only a scoped number and does not own result, query, or vector-facility internals.
        ja: 検索ヒットスコアは範囲付き数値だけを表し、結果、クエリ、ベクトル機構の内部状態を所有しない。
      source_claims: [claim-elastic-search-hit]
  required_relations: [SearchScore-is_a-DiscoveryScore]
examples:
  - id: search-score-full-text-hit-score
    labels:
      zh: 全文命中分数
      en: Full-text hit score
      ja: 全文ヒットスコア

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SearchScore maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SearchScore maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SearchScore context/token boundary."}
    field_values: {score_id: search-score-042, activity_id: disc-2026-07-19-001, search_result_id: search-result-042, result_set_id: results-disc-2026-07-19-001, search_method: full_text, score_value: 12.5, higher_is_better: true, normalization: none, score_configuration_ref: config://elasticsearch/docs-title-v3}
    related_node_ids: [SearchScore, DiscoveryScore, SearchResult]
    source_claims: [claim-elastic-search-hit]
parent_relation:
  id: SearchScore-is_a-DiscoveryScore
  predicate: is_a
  target: concept:DiscoveryScore
  endpoint_order: subtype-to-supertype
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 搜索命中分数是发现分数的一种, en: search score is a kind of discovery score, ja: 検索スコアは発見スコアの一種である}
  definitions:
    zh: SearchScore 为发现分数增加了搜索结果、搜索方式和接口配置范围。
    en: SearchScore adds search-result, search-method, and interface-configuration scope to a discovery score.
    ja: SearchScore は発見スコアに検索結果、検索方式、インターフェース構成範囲を追加する。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_search_score_subtype
    labels: {zh: 具有搜索分数子类型, en: has search-score subtype, ja: 検索スコアの下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-elastic-search-hit]
  distinct_fact_rationale:
    zh: 该关系明确搜索 API 响应分数的范围，不把它等同于通用数值、名次或向量实现。
    en: This relation scopes a search API response score without equating it to a universal number, rank, or vector implementation.
    ja: この関係は検索 API 応答スコアの範囲を定め、普遍的数値、順位、ベクトル実装と同一視しない。
  layout_role: primary-backbone
relations: []
sources:
  - id: elasticsearch-search
    title: Elasticsearch Run a Search API
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
    source_type: official-api-reference
    relevance: Documents returned search hits with index, identifier, score, and fields.
  - id: pinecone-search-overview
    title: Pinecone Search Overview
    url: https://docs.pinecone.io/guides/search/search-overview
    source_type: official-documentation
    relevance: Documents full-text, dense-vector, sparse-vector, and hybrid search approaches.
source_claims:
  - id: claim-elastic-search-hit
    source: elasticsearch-search
    supports: Elasticsearch documents a search response as returned documents and metadata including index, identifier, score, and fields.
    locator: Run a search response schema § hits.hits
    evidence_kind: official-api-reference
    confidence: high
  - id: claim-pinecone-search-types
    source: pinecone-search-overview
    supports: Pinecone distinguishes full-text, dense-vector semantic, sparse-vector lexical, and hybrid search approaches with different ranking signals and index shapes.
    locator: Search overview § Search types and Approach details
    evidence_kind: official-documentation
    confidence: high

