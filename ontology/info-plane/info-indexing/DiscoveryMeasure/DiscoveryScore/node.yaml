schema: moonweave.ai/ontology-node/v1
id: DiscoveryScore
kind: concept
status: accepted
labels:
  zh: 发现分数
  en: Discovery Score
  ja: 発見スコア
semantics:
  short_definition:
    zh: 在一次发现运行的特定阶段赋予单个候选的有类型数值观测。
    en: Typed numeric observation assigned to one candidate at a specific stage of one discovery run.
    ja: 1 回の発見実行の特定段階で 1 つの候補に与えられる型付き数値観測。
  definition:
    zh: DiscoveryScore 是 DiscoveryMeasure 的数值子类型，记录一个 DiscoveryResult 在明确活动、结果集合和阶段中的 score_value、score_kind、方向、归一化方案和评分配置引用。它可以表达词法、稠密相似度、稀疏相似度、重排序器或组合分数，但不表示候选名次、通用概率、跨配置可比性、嵌入向量或离线评估指标。除非 score_kind、score_configuration_ref、normalization 和方向一致，否则分数不能跨运行或阶段直接比较。
    en: DiscoveryScore is the numeric subtype of DiscoveryMeasure that records score_value, score_kind, direction, normalization scheme, and scoring-configuration reference for one DiscoveryResult in an explicit activity, result set, and stage. It can express lexical, dense-similarity, sparse-similarity, reranker, or composite scores, but it does not represent candidate rank, a universal probability, comparability across configurations, embedding vectors, or an offline evaluation metric. Scores cannot be compared directly across runs or stages unless score_kind, score_configuration_ref, normalization, and direction agree.
    ja: DiscoveryScore は DiscoveryMeasure の数値サブタイプであり、明示的な活動、結果集合、段階内の 1 つの DiscoveryResult の score_value、score_kind、方向、正規化方式、スコアリング構成参照を記録する。語彙、稠密類似度、疎類似度、再ランカー、複合スコアを表せるが、候補順位、普遍的確率、構成横断の比較可能性、埋め込みベクトル、オフライン評価指標は表さない。score_kind、score_configuration_ref、normalization、方向が一致しない限り、実行または段階をまたいで直接比較できない。
  why_needed:
    zh: 相关性数值必须带有产生它的信号和配置，才能防止不同模型或阶段的数值被误读为同一尺度。
    en: A relevance number must carry the signal and configuration that produced it so values from different models or stages are not misread as one scale.
    ja: 関連性数値には、それを生成したシグナルと構成が伴う必要があり、異なるモデルまたは段階の値を同一尺度と誤読しないようにする。
  includes:
    - zh: 某候选在初始、重排序或最终阶段的数值相关性观察。
      en: Numeric relevance observation for one candidate at an initial, reranked, or final stage.
      ja: 初期、再ランキング、最終段階における 1 候補の数値的関連性観測。
    - zh: 明确的信号种类、方向、归一化和配置边界。
      en: Explicit signal kind, direction, normalization, and configuration boundary.
      ja: 明示的なシグナル種別、方向、正規化、構成境界。
  excludes:
    - zh: 排名位置、前 K 评估指标、模型置信概率或向量坐标。
      en: Rank position, top-k evaluation metrics, model-confidence probability, or vector coordinates.
      ja: 順位位置、上位 K 評価指標、モデル信頼確率、ベクトル座標。
    - zh: 搜索引擎内部倒排结构、ANN 参数或源文档正文。
      en: Search-engine inverted structures, ANN parameters, or source-document body.
      ja: 検索エンジンの転置構造、ANN パラメーター、ソース文書本文。
  semantic_kind: observation
  aliases: [relevance score, retrieval score, 相关性分值]
engineering:
  explanation:
    zh: 检索器或重排序器为每个返回候选写入独立 score_id，并同时保存配置引用和方向。调用方只在同一配置边界内比较数值，再由独立 CandidateRank 决定顺序；若 API 返回 _score，适配器把它标为引擎定义的分数而不推断为百分比或概率。
    en: A retriever or reranker writes a separate score_id for every returned candidate and keeps the configuration reference and direction with it. A caller compares values only within the same configuration boundary and uses separate CandidateRank records for order; when an API returns _score, an adapter marks it as engine-defined rather than inferring a percentage or probability.
    ja: 取得器または再ランカーは返却候補ごとに別の score_id を書き、構成参照と方向を一緒に保持する。呼び出し側は同じ構成境界内だけで値を比較し、順序には別の CandidateRank 記録を使用する。API が _score を返す場合、アダプターはそれを割合または確率と推論せず、エンジン定義のスコアとして印を付ける。
  typical_input:
    - description:
        zh: 重排序器候选评分输入
        en: Reranker candidate-scoring input
        ja: 再ランカー候補スコアリング入力
      format: |-
        {"activity_id":"disc-2026-07-19-001","result_set_id":"results-disc-2026-07-19-001","result_id":"result-03","measurement_stage":"reranked","score_kind":"reranker","score_configuration_ref":"config://rerank/legal-v2"}
  typical_output:
    - description:
        zh: 有类型且有配置范围的候选分数
        en: Typed candidate score with configuration scope
        ja: 構成範囲を持つ型付き候補スコア
      format: |-
        {"score_id":"score-003","activity_id":"disc-2026-07-19-001","result_id":"result-03","result_set_id":"results-disc-2026-07-19-001","score_value":0.874,"score_kind":"reranker","higher_is_better":true,"normalization":"model_defined","score_configuration_ref":"config://rerank/legal-v2","measurement_stage":"reranked"}
  reference_implementations:
    - name: Pinecone Rerank Results
      url: https://docs.pinecone.io/guides/search/rerank-results
      description: Documents rerank scores as query relevance scores returned with reordered results.
    - name: Elasticsearch Run a Search API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
      description: Documents search hits exposing engine-produced _score values.
structure:
  identity_keys: [score_id]
  fields:
    - id: score_id
      labels: {zh: 分数 ID, en: Score ID, ja: スコア ID}
      definitions:
        zh: 此候选分数观测的稳定标识符。
        en: Stable identifier for this candidate-score observation.
        ja: この候補スコア観測の安定した識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: score-003
      source_claims: []
    - id: activity_id
      labels: {zh: 发现活动 ID, en: Discovery activity ID, ja: 発見アクティビティ ID}
      definitions:
        zh: 产生此分数的 DiscoveryActivity 标识符。
        en: Identifier of the DiscoveryActivity that produced this score.
        ja: このスコアを生成した DiscoveryActivity の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: disc-2026-07-19-001
      source_claims: [claim-pinecone-score]
    - id: result_id
      labels: {zh: 结果 ID, en: Result ID, ja: 結果 ID}
      definitions:
        zh: 接收该分数的 DiscoveryResult 标识符。
        en: Identifier of the DiscoveryResult receiving this score.
        ja: このスコアを受け取る DiscoveryResult の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: result-03
      source_claims: [claim-pinecone-score]
    - id: result_set_id
      labels: {zh: 结果集合 ID, en: Result set ID, ja: 結果集合 ID}
      definitions:
        zh: 分数所属的有界结果集合标识符。
        en: Identifier of the bounded result set to which the score belongs.
        ja: スコアが属する境界付き結果集合の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: results-disc-2026-07-19-001
      source_claims: [claim-pinecone-score]
    - id: score_value
      labels: {zh: 分数值, en: Score value, ja: スコア値}
      definitions:
        zh: 在 score_kind、配置、归一化和方向范围内解释的有限数值。
        en: Finite numeric value interpreted within the score kind, configuration, normalization, and direction.
        ja: スコア種別、構成、正規化、方向の範囲内で解釈される有限数値。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      example_value: 0.874
      source_claims: [claim-pinecone-score]
    - id: score_kind
      labels: {zh: 分数种类, en: Score kind, ja: スコア種別}
      definitions:
        zh: 产生该数值的相关性信号类别。
        en: Category of relevance signal that produced this value.
        ja: この値を生成した関連性シグナルのカテゴリ。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [lexical, dense_similarity, sparse_similarity, reranker, composite]
      example_value: reranker
      source_claims: [claim-pinecone-search-types]
    - id: higher_is_better
      labels: {zh: 高值更优, en: Higher is better, ja: 高い値がより良い}
      definitions:
        zh: 指示在该配置中较大数值是否表示较高相关性。
        en: Indicates whether a larger value means higher relevance in this configuration.
        ja: この構成でより大きい値がより高い関連性を意味するかを示す。
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: true
      source_claims: []
    - id: normalization
      labels: {zh: 归一化方式, en: Normalization, ja: 正規化方式}
      definitions:
        zh: 描述 score_value 是否及如何被归一化的受控方式。
        en: Controlled method describing whether and how score_value was normalized.
        ja: score_value が正規化されたか、その方法を記述する制御方式。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [none, minmax, model_defined]
      example_value: model_defined
      source_claims: []
    - id: score_configuration_ref
      labels: {zh: 评分配置引用, en: Score configuration reference, ja: スコア構成参照}
      definitions:
        zh: 指向定义模型、权重或引擎参数边界的配置记录。
        en: Reference to the configuration record defining the model, weights, or engine-parameter boundary.
        ja: モデル、重み、またはエンジンパラメーター境界を定義する構成記録への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: config://rerank/legal-v2
      source_claims: [claim-pinecone-score]
    - id: measurement_stage
      labels: {zh: 度量阶段, en: Measurement stage, ja: 測定段階}
      definitions:
        zh: 产生该分数的检索阶段。
        en: Retrieval stage that produced this score.
        ja: このスコアを生成した取得段階。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [initial, reranked, final]
      example_value: reranked
      source_claims: [claim-pinecone-rerank]
  constraints:
    - id: discovery-score-finite-and-scoped
      severity: error
      language: plain
      expression: score_value must be finite, result_id and result_set_id must be emitted by activity_id, and measurement_stage must match the stage in which the score was produced.
      explanation:
        zh: 分数只有在明确的候选、集合、活动和阶段范围内可解释。
        en: A score is interpretable only within an explicit candidate, set, activity, and stage scope.
        ja: スコアは明示的な候補、集合、活動、段階の範囲内でのみ解釈可能である。
      source_claims: [claim-pinecone-score]
    - id: discovery-score-comparability
      severity: error
      language: plain
      expression: direct comparison of two score_value values is allowed only when score_kind, score_configuration_ref, normalization, higher_is_better, result_set_id, and measurement_stage are identical or an explicit conversion record exists.
      explanation:
        zh: 不同信号、模型或归一化方式的数值没有天然共同尺度。
        en: Values from different signals, models, or normalization methods have no inherent common scale.
        ja: 異なるシグナル、モデル、正規化方式の値には、本質的な共通尺度がない。
      source_claims: [claim-pinecone-search-types, claim-pinecone-score]
    - id: discovery-score-not-rank-or-vector
      severity: error
      language: plain
      expression: DiscoveryScore must not contain rank_position, embeddings, vector_dimension, distance_metric, ndcg, recall, or precision fields.
      explanation:
        zh: 分数、名次、向量内部状态和离线评估属于不同概念边界。
        en: Score, rank, vector internals, and offline evaluation belong to different concept boundaries.
        ja: スコア、順位、ベクトル内部状態、オフライン評価は異なる概念境界に属する。
      source_claims: [claim-elastic-score]
  required_relations: [DiscoveryScore-is_a-DiscoveryMeasure]
examples:
  - id: discovery-score-reranker-relevance-score
    labels:
      zh: 重排序器相关性分数
      en: Reranker relevance score
      ja: 再ランカー関連性スコア

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; DiscoveryScore maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; DiscoveryScore maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; DiscoveryScore context/token boundary."}
    field_values: {score_id: score-003, activity_id: disc-2026-07-19-001, result_id: result-03, result_set_id: results-disc-2026-07-19-001, score_value: 0.874, score_kind: reranker, higher_is_better: true, normalization: model_defined, score_configuration_ref: config://rerank/legal-v2, measurement_stage: reranked}
    related_node_ids: [DiscoveryScore, DiscoveryMeasure, DiscoveryResult]
    source_claims: [claim-pinecone-score]
parent_relation:
  id: DiscoveryScore-is_a-DiscoveryMeasure
  predicate: is_a
  target: concept:DiscoveryMeasure
  endpoint_order: subtype-to-supertype
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 发现分数是发现度量的一种, en: discovery score is a kind of discovery measure, ja: 発見スコアは発見測定の一種である}
  definitions:
    zh: DiscoveryScore 为运行范围内的发现度量增加类型化数值和比较边界。
    en: DiscoveryScore adds a typed numeric value and comparability boundary to a run-scoped discovery measure.
    ja: DiscoveryScore は実行範囲の発見測定に型付き数値と比較可能性境界を追加する。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_discovery_score_subtype
    labels: {zh: 具有发现分数子类型, en: has discovery-score subtype, ja: 発見スコアの下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-pinecone-score]
  distinct_fact_rationale:
    zh: 该关系把数值信号与一般运行度量关联，同时不把它等同于名次、概率或评估指标。
    en: This relation connects numeric signal to the general run measure without equating it to rank, probability, or evaluation metric.
    ja: この関係は数値シグナルを一般の実行測定へ接続し、順位、確率、評価指標と同一視しない。
  layout_role: primary-backbone
relations: []
sources:
  - id: pinecone-rerank
    title: Pinecone Rerank Results
    url: https://docs.pinecone.io/guides/search/rerank-results
    source_type: official-documentation
    relevance: Documents rerank scores for result hits and the resulting order.
  - id: pinecone-search-overview
    title: Pinecone Search Overview
    url: https://docs.pinecone.io/guides/search/search-overview
    source_type: official-documentation
    relevance: Documents retrieval approaches with different ranking signals and index shapes.
  - id: elasticsearch-search
    title: Elasticsearch Run a Search API
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
    source_type: official-api-reference
    relevance: Documents hit _score and controls that exclude lower-score documents.
source_claims:
  - id: claim-pinecone-score
    source: pinecone-rerank
    supports: Pinecone documents result hits with identifiers, scores, and returned fields, with rerank scores representing query relevance.
    locator: Rerank results § response shape
    evidence_kind: official-documentation
    confidence: high
  - id: claim-pinecone-rerank
    source: pinecone-rerank
    supports: Pinecone documents reranking as a two-stage process that scores initial results and returns a new ranking.
    locator: Rerank results § Integrated reranking
    evidence_kind: official-documentation
    confidence: high
  - id: claim-pinecone-search-types
    source: pinecone-search-overview
    supports: Pinecone distinguishes retrieval approaches with different ranking signals and index shapes.
    locator: Search overview § Search types and Approach details
    evidence_kind: official-documentation
    confidence: high
  - id: claim-elastic-score
    source: elasticsearch-search
    supports: Elasticsearch search hit responses expose _score, and min_score excludes lower-score documents.
    locator: Run a search § min_score and response schema
    evidence_kind: official-api-reference
    confidence: high

