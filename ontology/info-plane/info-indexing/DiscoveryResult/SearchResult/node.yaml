schema: moonweave.ai/ontology-node/v1
id: SearchResult
kind: concept
status: accepted
labels:
  zh: 搜索结果记录
  en: Search Result
  ja: 検索結果記録
semantics:
  short_definition:
    zh: 由搜索接口响应返回并投影为单个候选的发现结果记录。
    en: Discovery-result record for one candidate returned and projected from a search-interface response.
    ja: 検索インターフェース応答から返却され投影された 1 候補の発見結果記録。
  definition:
    zh: SearchResult 是 DiscoveryResult 的搜索接口子类型，记录单个命中的结果身份、活动、集合、搜索响应引用、源索引引用、候选引用、索引指针和可选高亮或字段投影引用。它可表示全文、向量、稀疏或混合搜索的接口投影，但不等同于完整 API 响应、源文档、搜索分数或名次。接口中的 _score、排序和高亮是相邻工件，分别由 SearchScore、CandidateRank 或安全投影引用表达。
    en: SearchResult is the search-interface subtype of DiscoveryResult, recording one hit's result identity, activity, set, search-response reference, source-index reference, candidate reference, index pointer, and optional highlight or field-projection reference. It can represent an interface projection from full-text, vector, sparse, or hybrid search, but is not a complete API response, source document, search score, or rank. An interface _score, ordering, and highlights are adjacent artifacts expressed respectively through SearchScore, CandidateRank, or safe projection references.
    ja: SearchResult は DiscoveryResult の検索インターフェースサブタイプであり、1 ヒットの結果 ID、活動、集合、検索応答参照、ソースインデックス参照、候補参照、インデックスポインター、任意のハイライトまたはフィールド投影参照を記録する。全文、ベクトル、疎、ハイブリッド検索のインターフェース投影を表せるが、完全な API 応答、ソース文書、検索スコア、順位ではない。インターフェースの _score、順序、ハイライトは隣接する成果物であり、それぞれ SearchScore、CandidateRank、安全な投影参照で表現する。
  why_needed:
    zh: 外部搜索命中需要转换为可关联的候选记录，同时保留接口响应与源记录的边界。
    en: External search hits need conversion into linkable candidate records while preserving the boundary of both the interface response and source record.
    ja: 外部検索ヒットは、インターフェース応答とソース記録の両方の境界を保ちながら、関連付け可能な候補記録へ変換する必要がある。
  includes:
    - zh: 搜索响应中一个命中的身份、来源、索引与活动范围。
      en: Identity, provenance, index, and activity scope for one hit in a search response.
      ja: 検索応答内の 1 ヒットの ID、来歴、インデックス、活動範囲。
    - zh: 对授权字段投影或高亮投影的可选引用。
      en: Optional reference to an authorized field or highlight projection.
      ja: 認可されたフィールドまたはハイライト投影への任意参照。
  excludes:
    - zh: 整页响应 JSON、原始查询、源文档正文或分页游标。
      en: Whole response JSON, raw query, source-document body, or pagination cursor.
      ja: 応答 JSON 全体、生クエリ、ソース文書本文、ページネーションカーソル。
    - zh: _score 数值、rank_position、嵌入坐标或向量索引参数。
      en: _score value, rank_position, embedding coordinates, or vector-index parameters.
      ja: _score 値、rank_position、埋め込み座標、ベクトルインデックスパラメーター。
  semantic_kind: entity
  aliases: [search hit record, API hit projection, 搜索命中记录]
engineering:
  explanation:
    zh: 适配器从搜索响应的命中标识和索引元数据创建 SearchResult，并将外部响应工件保留在 search_response_ref 后。允许显示的字段和高亮通过 projection 引用提供，而不是内联复制。若服务也返回分数，适配器创建指向该 SearchResult 的 SearchScore；若需要最终展示次序，则创建 CandidateRank。
    en: An adapter creates SearchResult from a search response hit identifier and index metadata while retaining the external response artifact behind search_response_ref. Permitted fields and highlights are supplied through projection references rather than inline copies. If the service also returns a score, the adapter creates a SearchScore pointing to this SearchResult; if final display order is needed, it creates CandidateRank.
    ja: アダプターは検索応答ヒット ID とインデックスメタデータから SearchResult を作成し、外部応答成果物を search_response_ref の背後に保持する。許可されたフィールドとハイライトはインラインコピーではなく投影参照で提供される。サービスがスコアも返す場合、アダプターはこの SearchResult を指す SearchScore を作成する。最終表示順序が必要なら CandidateRank を作成する。
  typical_input:
    - description:
        zh: Elasticsearch 搜索响应命中
        en: Elasticsearch search-response hit
        ja: Elasticsearch 検索応答ヒット
      format: |-
        {"search_response_ref":"response://elasticsearch/req-019","_index":"docs-title-v3","_id":"doc-042","candidate_ref":"record://docs/doc-042","index_pointer_ref":"pointer://ptr-doc-042","highlight_ref":"projection://highlights/req-019/doc-042"}
  typical_output:
    - description:
        zh: 搜索命中的本地投影
        en: Local projection of a search hit
        ja: 検索ヒットのローカル投影
      format: |-
        {"result_id":"search-result-042","activity_id":"disc-2026-07-19-001","result_set_id":"results-disc-2026-07-19-001","search_response_ref":"response://elasticsearch/req-019","source_index_ref":"docs-title-v3","candidate_ref":"record://docs/doc-042","index_pointer_ref":"pointer://ptr-doc-042","highlight_ref":"projection://highlights/req-019/doc-042"}
  reference_implementations:
    - name: Elasticsearch Run a Search API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
      description: Documents response hits with index, identifier, score, and returned fields.
    - name: Pinecone Search Overview
      url: https://docs.pinecone.io/guides/search/search-overview
      description: Documents multiple search approaches and metadata filtering for returned candidates.
structure:
  identity_keys: [result_id]
  fields:
    - id: result_id
      labels: {zh: 结果 ID, en: Result ID, ja: 結果 ID}
      definitions:
        zh: 此搜索结果投影的稳定标识符。
        en: Stable identifier for this search-result projection.
        ja: この検索結果投影の安定した識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: search-result-042
      source_claims: []
    - id: activity_id
      labels: {zh: 发现活动 ID, en: Discovery activity ID, ja: 発見アクティビティ ID}
      definitions:
        zh: 产生该搜索结果的 DiscoveryActivity 标识符。
        en: Identifier of the DiscoveryActivity that produced this search result.
        ja: この検索結果を生成した DiscoveryActivity の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: disc-2026-07-19-001
      source_claims: [claim-elastic-search-hit]
    - id: result_set_id
      labels: {zh: 结果集合 ID, en: Result set ID, ja: 結果集合 ID}
      definitions:
        zh: 包含该命中的有界搜索结果集合标识符。
        en: Identifier of the bounded search-result set containing this hit.
        ja: このヒットを含む境界付き検索結果集合の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: results-disc-2026-07-19-001
      source_claims: [claim-elastic-search-hit]
    - id: search_response_ref
      labels: {zh: 搜索响应引用, en: Search response reference, ja: 検索応答参照}
      definitions:
        zh: 指向生成该本地投影的外部搜索响应工件。
        en: Reference to the external search-response artifact that produced this local projection.
        ja: このローカル投影を生成した外部検索応答成果物への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: response://elasticsearch/req-019
      source_claims: [claim-elastic-search-hit]
    - id: source_index_ref
      labels: {zh: 源索引引用, en: Source index reference, ja: ソースインデックス参照}
      definitions:
        zh: 指向产生命中的逻辑索引或其外部引擎边界。
        en: Reference to the logical index or its external-engine boundary that produced the hit.
        ja: ヒットを生成した論理インデックスまたはその外部エンジン境界への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: docs-title-v3
      source_claims: [claim-elastic-search-hit]
    - id: candidate_ref
      labels: {zh: 候选引用, en: Candidate reference, ja: 候補参照}
      definitions:
        zh: 指向系统记录源中命中候选的稳定引用。
        en: Stable reference to the hit candidate in its system of record.
        ja: 記録システム内のヒット候補への安定参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: record://docs/doc-042
      source_claims: [claim-elastic-search-hit]
    - id: index_pointer_ref
      labels: {zh: 索引指针引用, en: Index pointer reference, ja: インデックスポインター参照}
      definitions:
        zh: 指向连接 source_index_ref 与 candidate_ref 的 IndexPointer。
        en: Reference to the IndexPointer connecting source_index_ref and candidate_ref.
        ja: source_index_ref と candidate_ref を接続する IndexPointer への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: pointer://ptr-doc-042
      source_claims: []
    - id: highlight_ref
      labels: {zh: 高亮投影引用, en: Highlight projection reference, ja: ハイライト投影参照}
      definitions:
        zh: 可选地指向为当前调用生成的授权高亮或片段投影。
        en: Optional reference to an authorized highlight or snippet projection generated for the current call.
        ja: 現在の呼び出し用に生成された認可済みハイライトまたはスニペット投影への任意参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: projection://highlights/req-019/doc-042
      source_claims: [claim-elastic-search-hit]
  constraints:
    - id: search-result-response-consistency
      severity: error
      language: plain
      expression: activity_id must resolve to a DiscoveryActivity, search_response_ref must identify a response invoked by that activity, and source_index_ref must match the index associated with index_pointer_ref.
      explanation:
        zh: 搜索结果投影必须能回溯到同一调用、响应和索引来源。
        en: A search-result projection must trace back to the same invocation, response, and index source.
        ja: 検索結果投影は同じ呼び出し、応答、インデックスソースまで追跡できなければならない。
      source_claims: [claim-elastic-search-hit]
    - id: search-result-safe-projection
      severity: error
      language: plain
      expression: highlight_ref may resolve only to an authorized projection for search_response_ref and must not inline document_body, raw_query, credentials, or pagination state.
      explanation:
        zh: 高亮或片段是响应派生投影，不能扩大为源文档或请求状态的所有权。
        en: A highlight or snippet is a response-derived projection and cannot expand into ownership of source document or request state.
        ja: ハイライトまたはスニペットは応答由来の投影であり、ソース文書またはリクエスト状態の所有権へ拡大できない。
      source_claims: [claim-elastic-search-hit]
    - id: search-result-score-and-rank-separation
      severity: error
      language: plain
      expression: SearchResult must not contain score_value, rank_position, embeddings, vector_dimension, distance_metric, or ANN parameters; use SearchScore and CandidateRank as separate records.
      explanation:
        zh: 命中记录、相关性数值、顺序和向量设施保持为可独立审计的对象。
        en: Hit record, numeric relevance, order, and vector facility remain independently auditable objects.
        ja: ヒット記録、数値的関連性、順序、ベクトル機構は独立して監査可能なオブジェクトとして保持される。
      source_claims: [claim-elastic-search-hit, claim-pinecone-search-types]
  required_relations: [SearchResult-is_a-DiscoveryResult]
examples:
  - id: search-result-elasticsearch-hit-projection
    labels:
      zh: Elasticsearch 命中投影
      en: Elasticsearch hit projection
      ja: Elasticsearch ヒット投影

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SearchResult maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SearchResult maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SearchResult context/token boundary."}
    field_values: {result_id: search-result-042, activity_id: disc-2026-07-19-001, result_set_id: results-disc-2026-07-19-001, search_response_ref: response://elasticsearch/req-019, source_index_ref: docs-title-v3, candidate_ref: record://docs/doc-042, index_pointer_ref: pointer://ptr-doc-042, highlight_ref: projection://highlights/req-019/doc-042}
    related_node_ids: [SearchResult, DiscoveryResult, IndexPointer]
    source_claims: [claim-elastic-search-hit]
parent_relation:
  id: SearchResult-is_a-DiscoveryResult
  predicate: is_a
  target: concept:DiscoveryResult
  endpoint_order: subtype-to-supertype
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 搜索结果是发现结果的一种, en: search result is a kind of discovery result, ja: 検索結果は発見結果の一種である}
  definitions:
    zh: SearchResult 保留发现结果的候选来源语义，并增加搜索响应和接口投影边界。
    en: SearchResult retains discovery-result candidate provenance and adds search-response and interface-projection boundaries.
    ja: SearchResult は発見結果の候補来歴を保持し、検索応答とインターフェース投影境界を追加する。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_search_result_subtype
    labels: {zh: 具有搜索结果子类型, en: has search-result subtype, ja: 検索結果の下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-elastic-search-hit]
  distinct_fact_rationale:
    zh: 该关系表明搜索接口命中是发现结果投影，不把接口响应、分数或源文档混入结果记录。
    en: This relation states that a search-interface hit is a discovery-result projection and does not mix response, score, or source document into the record.
    ja: この関係は検索インターフェースヒットが発見結果投影であることを示し、応答、スコア、ソース文書を記録に混在させない。
  layout_role: primary-backbone
relations: []
sources:
  - id: elasticsearch-search
    title: Elasticsearch Run a Search API
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
    source_type: official-api-reference
    relevance: Documents response hits containing identifiers, index metadata, score, and fields.
  - id: pinecone-search-overview
    title: Pinecone Search Overview
    url: https://docs.pinecone.io/guides/search/search-overview
    source_type: official-documentation
    relevance: Documents distinct retrieval approaches and filtering contexts for returned candidates.
source_claims:
  - id: claim-elastic-search-hit
    source: elasticsearch-search
    supports: Elasticsearch documents a search response as returned documents and metadata including index, identifier, score, and fields.
    locator: Run a search response schema § hits.hits
    evidence_kind: official-api-reference
    confidence: high
  - id: claim-pinecone-search-types
    source: pinecone-search-overview
    supports: Pinecone distinguishes full-text, dense-vector semantic, sparse-vector lexical, and hybrid search approaches with different ranking signals and index shapes.
    locator: Search overview § Search types and Approach details
    evidence_kind: official-documentation
    confidence: high

