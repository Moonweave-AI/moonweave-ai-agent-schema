schema: moonweave.ai/ontology-node/v1
id: DiscoveryResult
kind: concept
status: accepted
labels:
  zh: 发现结果记录
  en: Discovery Result
  ja: 発見結果記録
semantics:
  short_definition:
    zh: 一次发现活动返回的一个候选记录及其来源定位引用。
    en: One candidate record returned by a discovery activity together with its source-location references.
    ja: 発見アクティビティが返した 1 つの候補記録と、そのソース位置参照。
  definition:
    zh: DiscoveryResult 表示一次 DiscoveryActivity 中已返回的单个候选，而非整个结果列表。它声明结果、活动、结果集合、候选引用、索引指针和可选返回字段投影引用。它不拥有源记录正文、搜索分数、候选名次、查询文本、数据库行或索引实现；相关性数值和顺序必须分别由 DiscoveryScore 与 CandidateRank 关联。
    en: DiscoveryResult represents one returned candidate in a DiscoveryActivity rather than the entire result list. It declares the result, activity, result set, candidate reference, index pointer, and optional returned-field projection reference. It does not own source-record bodies, search scores, candidate ranks, query text, database rows, or index implementation; numeric relevance and order must be associated separately through DiscoveryScore and CandidateRank.
    ja: DiscoveryResult は結果リスト全体ではなく、DiscoveryActivity 内で返された 1 つの候補を表す。結果、活動、結果集合、候補参照、インデックスポインター、任意の返却フィールド投影参照を宣言する。ソース記録本文、検索スコア、候補順位、クエリテキスト、データベース行、インデックス実装を所有しない。数値的関連性と順序は DiscoveryScore と CandidateRank で別に関連付けなければならない。
  why_needed:
    zh: 一个候选的来源、活动和结果集合必须可追溯，以便不把文档、分数和整页搜索响应误建模为同一个对象。
    en: A candidate's provenance, activity, and result set must be traceable so a document, score, and entire search page are not modeled as one object.
    ja: 文書、スコア、検索ページ全体を同一オブジェクトとしてモデル化しないため、候補の来歴、活動、結果集合は追跡可能でなければならない。
  includes:
    - zh: 已返回候选的身份、活动范围、集合范围和来源指针。
      en: Identity, activity scope, set scope, and source pointer for a returned candidate.
      ja: 返却候補の ID、活動範囲、集合範囲、ソースポインター。
    - zh: 可选的安全返回字段投影引用。
      en: Optional reference to a safe returned-field projection.
      ja: 任意の安全な返却フィールド投影への参照。
  excludes:
    - zh: 源文档正文、数据库记录所有权、查询负载或整个结果分页响应。
      en: Source-document body, database-record ownership, query payload, or an entire paginated response.
      ja: ソース文書本文、データベース記録の所有権、クエリペイロード、ページ化応答全体。
    - zh: 分数值、名次、向量、嵌入和检索算法参数。
      en: Score values, ranks, vectors, embeddings, and retrieval-algorithm parameters.
      ja: スコア値、順位、ベクトル、埋め込み、取得アルゴリズムパラメーター。
  semantic_kind: entity
  aliases: [returned candidate, retrieval hit record, 返回候选]
engineering:
  explanation:
    zh: 运行器为每个候选创建一个 result_id，并把其活动、结果集合和 IndexPointer 写入结果记录。适配器将安全的字段投影存放在 returned_fields_ref 指向的位置；它不会复制系统记录源中的文档正文。评分和排序管线随后只引用 result_id，从而维持结果、数值和顺序的独立责任。
    en: The runner creates one result_id per candidate and writes its activity, result set, and IndexPointer into the result record. An adapter places a safe field projection behind returned_fields_ref and does not copy a document body from the system of record. Scoring and ranking pipelines later reference result_id only, preserving separate responsibility for result, number, and order.
    ja: 実行器は候補ごとに 1 つの result_id を作成し、その活動、結果集合、IndexPointer を結果記録に書き込む。アダプターは安全なフィールド投影を returned_fields_ref の背後に置き、記録システムから文書本文を複製しない。スコアリングとランキングのパイプラインは後で result_id だけを参照し、結果、数値、順序の責任を分離する。
  typical_input:
    - description:
        zh: 发现活动返回的候选指针
        en: Candidate pointer returned by a discovery activity
        ja: 発見アクティビティが返した候補ポインター
      format: |-
        {"activity_id":"disc-2026-07-19-001","result_set_id":"results-disc-2026-07-19-001","candidate_ref":"record://docs/doc-042","index_pointer_ref":"pointer://ptr-doc-042","returned_fields_ref":"projection://disc-2026-07-19-001/result-042"}
  typical_output:
    - description:
        zh: 单个发现结果记录
        en: Single discovery-result record
        ja: 単一の発見結果記録
      format: |-
        {"result_id":"result-042","activity_id":"disc-2026-07-19-001","result_set_id":"results-disc-2026-07-19-001","candidate_ref":"record://docs/doc-042","index_pointer_ref":"pointer://ptr-doc-042","returned_fields_ref":"projection://disc-2026-07-19-001/result-042"}
  reference_implementations:
    - name: Elasticsearch Run a Search API
      url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
      description: Documents search hits returned with identifiers, index metadata, score, and fields.
    - name: PostgreSQL Indexes Introduction
      url: https://www.postgresql.org/docs/current/indexes-intro.html
      description: Documents indexes as auxiliary structures that locate matching entries while records remain in tables.
structure:
  identity_keys: [result_id]
  fields:
    - id: result_id
      labels: {zh: 结果 ID, en: Result ID, ja: 結果 ID}
      definitions:
        zh: 此单个发现结果的稳定标识符。
        en: Stable identifier for this single discovery result.
        ja: この単一発見結果の安定した識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: result-042
      source_claims: []
    - id: activity_id
      labels: {zh: 发现活动 ID, en: Discovery activity ID, ja: 発見アクティビティ ID}
      definitions:
        zh: 返回该候选的 DiscoveryActivity 标识符。
        en: Identifier of the DiscoveryActivity that returned this candidate.
        ja: この候補を返した DiscoveryActivity の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: disc-2026-07-19-001
      source_claims: [claim-elastic-hit-response]
    - id: result_set_id
      labels: {zh: 结果集合 ID, en: Result set ID, ja: 結果集合 ID}
      definitions:
        zh: 包含该候选的有界结果集合标识符。
        en: Identifier of the bounded result set containing this candidate.
        ja: この候補を含む境界付き結果集合の識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: results-disc-2026-07-19-001
      source_claims: [claim-elastic-hit-response]
    - id: candidate_ref
      labels: {zh: 候选引用, en: Candidate reference, ja: 候補参照}
      definitions:
        zh: 指向系统记录源中被发现候选的稳定引用。
        en: Stable reference to the discovered candidate in its system of record.
        ja: 記録システム内で発見された候補への安定参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: record://docs/doc-042
      source_claims: [claim-postgres-index]
    - id: index_pointer_ref
      labels: {zh: 索引指针引用, en: Index pointer reference, ja: インデックスポインター参照}
      definitions:
        zh: 指向解释该候选如何由发现索引定位的 IndexPointer。
        en: Reference to the IndexPointer explaining how a discovery index located this candidate.
        ja: 発見インデックスがこの候補をどのように特定したかを説明する IndexPointer への参照。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: pointer://ptr-doc-042
      source_claims: [claim-postgres-index]
    - id: returned_fields_ref
      labels: {zh: 返回字段投影引用, en: Returned fields projection reference, ja: 返却フィールド投影参照}
      definitions:
        zh: 可选地指向为当前调用授权的字段投影，而非源记录正文。
        en: Optional reference to a field projection authorized for the current call rather than the source-record body.
        ja: ソース記録本文ではなく、現在の呼び出しで認可されたフィールド投影への任意参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: projection://disc-2026-07-19-001/result-042
      source_claims: [claim-elastic-hit-response]
  constraints:
    - id: discovery-result-activity-and-pointer
      severity: error
      language: plain
      expression: activity_id must resolve to a DiscoveryActivity, result_set_id must be emitted by that activity, and index_pointer_ref must resolve to an IndexPointer whose source_record_ref equals candidate_ref.
      explanation:
        zh: 一个结果必须同时说明来自哪个运行以及如何定位回源候选。
        en: A result must state both which run returned it and how it locates the source candidate.
        ja: 結果は、どの実行が返したかと、ソース候補へどう位置付けるかの両方を示さなければならない。
      source_claims: [claim-postgres-index]
    - id: discovery-result-projection-boundary
      severity: error
      language: plain
      expression: returned_fields_ref may resolve only to an authorized projection for activity_id and must not embed source_document_body, database_row, credentials, or raw_query.
      explanation:
        zh: 结果记录引用安全视图，而不复制系统记录源或查询的受保护内容。
        en: A result record references a safe view rather than copying protected system-of-record or query content.
        ja: 結果記録は安全なビューを参照し、保護された記録システムまたはクエリ内容を複製しない。
      source_claims: [claim-elastic-hit-response]
    - id: discovery-result-no-score-or-rank
      severity: error
      language: plain
      expression: DiscoveryResult must not contain score_value, rank_position, embeddings, vector_dimension, distance_metric, or evaluation_metric; score and rank records reference result_id separately.
      explanation:
        zh: 返回候选、数值相关性和顺序是不同事实，必须分别建模。
        en: Returned candidate, numeric relevance, and order are different facts and must be modeled separately.
        ja: 返却候補、数値的関連性、順序は異なる事実であり、別にモデル化しなければならない。
      source_claims: [claim-elastic-hit-response]
  required_relations: [DiscoveryResult-returned-by-DiscoveryActivity]
examples:
  - id: discovery-result-returned-document-candidate
    labels:
      zh: 返回文档候选
      en: Returned document candidate
      ja: 返却文書候補

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; DiscoveryResult maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; DiscoveryResult maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; DiscoveryResult context/token boundary."}
    field_values: {result_id: result-042, activity_id: disc-2026-07-19-001, result_set_id: results-disc-2026-07-19-001, candidate_ref: record://docs/doc-042, index_pointer_ref: pointer://ptr-doc-042, returned_fields_ref: projection://disc-2026-07-19-001/result-042}
    related_node_ids: [DiscoveryResult, DiscoveryActivity, IndexPointer]
    source_claims: [claim-elastic-hit-response, claim-postgres-index]
parent_relation: null
relations:
  - id: DiscoveryResult-returned-by-DiscoveryActivity
    predicate: returned_by
    target: concept:DiscoveryActivity
    endpoint_order: result-to-activity
    direction: source-to-target
    relation_kind: production
    labels:
      zh: 由发现活动返回
      en: is returned by discovery activity
      ja: 発見アクティビティにより返される
    definitions:
      zh: DiscoveryResult 记录一次 DiscoveryActivity 返回的一个候选；该关系保留运行产出关联而不把结果记录作为活动的子类型或组成部分。
      en: DiscoveryResult records one candidate returned by a DiscoveryActivity; the relation preserves run-output association without making the result record an activity subtype or component.
      ja: DiscoveryResult は DiscoveryActivity が返した一つの候補を記録する。この関係は結果記録をアクティビティの下位型または構成要素にせず、実行出力の関連付けを保持する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: returns_discovery_result
      labels:
        zh: 返回发现结果
        en: returns discovery result
        ja: 発見結果を返す
    conditions: []
    temporal_scope: transaction-time
    boundary_context: Moonweave run-output association; it does not claim that a search API exposes a native DiscoveryResult type.
    constraints: []
    examples: []
    source_claims: [claim-discovery-result-activity-link]
    distinct_fact_rationale:
      zh: 该交叉关系表达候选从一次发现运行返回的事实，而不是把候选记录折叠进活动分类或接口响应容器。
      en: This cross-link expresses that a candidate record was returned from one discovery run rather than collapsing it into an activity classification or an interface response container.
      ja: このクロスリンクは候補記録が一つの発見実行から返された事実を表し、アクティビティ分類またはインターフェース応答コンテナーへ統合しない。
    layout_role: cross-link
sources:
  - id: elasticsearch-search
    title: Elasticsearch Run a Search API
    url: https://www.elastic.co/docs/api/doc/elasticsearch/operation/operation-search
    source_type: official-api-reference
    relevance: Documents search response hits with identifiers, scores, index metadata, and fields.
  - id: postgresql-indexes
    title: PostgreSQL 18 Indexes Introduction
    url: https://www.postgresql.org/docs/current/indexes-intro.html
    source_type: official-documentation
    relevance: Documents indexes as lookup structures separate from table records.
source_claims:
  - id: claim-elastic-hit-response
    source: elasticsearch-search
    supports: Elasticsearch documents a search response as returned documents and metadata including index, identifier, score, and fields.
    locator: Run a search response schema § hits.hits
    evidence_kind: official-api-reference
    confidence: high
  - id: claim-postgres-index
    source: postgresql-indexes
    supports: PostgreSQL documents indexes as structures that locate matching entries more efficiently than scans while table data remains separately maintained.
    locator: PostgreSQL 18 §11.1 Introduction
    evidence_kind: official-documentation
    confidence: high
  - id: claim-discovery-result-activity-link
    source: elasticsearch-search
    supports: Modeling one returned candidate as a DiscoveryResult associated with a discovery run is a Moonweave design inference based on documented search hits, not a claim that the API defines a native DiscoveryResult type.
    locator: Run a search response schema § hits.hits
    evidence_kind: design-inference
    confidence: medium

