    expected_result:
      zh: lw-ret-204 被记录为 LightweightRetrieval，两个返回文档分别形成 DiscoveryResult。
      en: lw-ret-204 is recorded as LightweightRetrieval and the two returned documents form separate DiscoveryResult records.
      ja: lw-ret-204 は LightweightRetrieval として記録され、返却二文書は別々の DiscoveryResult を形成します。
    why_valid_or_invalid:
      zh: 实例仅在既有存储上应用过滤条件并返回有界候选，没有摄入、构建、融合或最终选择副作用。
      en: The instance only applies a filter to existing storage and returns bounded candidates, with no ingestion, construction, fusion, or final-selection side effect.
      ja: 既存ストアへフィルタを適用して限定候補を返すだけで、取込み、構築、融合、最終選択の副作用がありません。
    synthetic: true
