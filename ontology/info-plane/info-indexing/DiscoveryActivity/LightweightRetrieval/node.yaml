    descriptions:
      zh: 运行 lw-ret-204 调用 FilterRetriever.run(filters=department:legal)，从既有 InMemoryDocumentStore 返回 policy-17 和 policy-23。
      en: Run lw-ret-204 calls FilterRetriever.run(filters=department:legal) and returns policy-17 and policy-23 from an existing InMemoryDocumentStore.
      ja: 実行 lw-ret-204 が FilterRetriever.run(filters=department:legal) を呼び、既存 InMemoryDocumentStore から policy-17 と policy-23 を返します。
    field_values:
