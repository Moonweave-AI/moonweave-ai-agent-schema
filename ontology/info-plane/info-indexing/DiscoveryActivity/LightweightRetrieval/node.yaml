schema: moonweave.ai/ontology-node/v1
id: LightweightRetrieval
kind: concept
labels:
  zh: 轻量检索
  en: Lightweight retrieval
  ja: 軽量検索
semantics:
  short_definition:
    zh: 客户端在单次 agent step 前执行的轻量检索特化。
    en: Client-side lightweight retrieval specialization executed before one agent step.
    ja: 一回の agent step 前 client 側 lightweight retrieval 特化。
  definition:
    zh: LightweightRetrieval 映射 Cursor semantic codebase search、recent files、@ 文件/文件夹 explicit reference 解析；不触发跨库 RAG pipeline 或 IndexBuildRun。
    en: LightweightRetrieval maps Cursor semantic codebase search, recent files, and @ file/folder explicit reference resolution; it does not trigger cross-store RAG pipelines or IndexBuildRun.
    ja: Cursor semantic/@/recent-files lightweight retrieval。
  why_needed:
    zh: 区分“会话前轻量找文件”与“后台维护 codebase index/RAG document index”的生命周期。
    en: Separates pre-step lightweight file finding from background codebase index or RAG document index maintenance lifecycles.
    ja: lightweight vs durable index lifecycle。
  includes:
    - zh: retrieval_kind（semantic/explicit/recent）、query_text、命中路径列表。
      en: retrieval_kind (semantic/explicit/recent), query_text, hit path list.
      ja: retrieval_kind/query/hits。
  excludes:
    - zh: IndexBuildRun、RetrievalTrace、memory-retrieval-ranking 融合重排。
      en: IndexBuildRun, RetrievalTrace, and memory-retrieval-ranking fusion reranking.
      ja: IndexBuildRun/RetrievalTrace/fusion。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 用户 @src/auth/middleware.ts + "Where is session validation?"→LightweightRetrieval semantic_hits=[{path,score:0.91}]。
    en: User @src/auth/middleware.ts + "Where is session validation?"→LightweightRetrieval semantic_hits=[{path,score:0.91}].
    ja: Cursor semantic hit list。
  typical_input:
    - description: Cursor semantic hit
      format: '{"referenced_files":["src/auth/middleware.ts"],"semantic_hits":[{"path":"src/auth/middleware.ts","score":0.91}]}'
      source_claims:
        - claim-lwret-cursor
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
