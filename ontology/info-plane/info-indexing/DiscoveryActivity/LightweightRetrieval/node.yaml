source_claims:
  - id: claim-lightweight-retrieval-001
    source: eng-fw-haystack-repo
    supports: Haystack FilterRetriever performs a filter-based read over a configured document store and returns documents, supporting LightweightRetrieval as a bounded discovery activity over existing state.
    locator: haystack/components/retrievers/in_memory/filter_retriever.py > FilterRetriever initialization and run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-002
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list provides another bounded discovery operation over existing server resources without defining ingestion or index construction, supporting the broader activity boundary.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-003
    source: eng-fw-haystack-repo
    supports: Haystack FilterRetriever runs filters against a configured document store and returns matching documents, directly supporting the bounded read-only retrieval activity.
    locator: haystack/components/retrievers/in_memory/filter_retriever.py > FilterRetriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-004
    source: eng-fw-haystack-repo
    supports: The retriever returns a documents mapping rather than performing document-store writes, supporting separation from ingestion and index building.
    locator: haystack/components/retrievers/in_memory/filter_retriever.py > output_types and run return value
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-005
    source: eng-fw-haystack-repo
    supports: Haystack retrievers expose document-returning run methods, while document-store writes and indexing are separate operations, supporting the read-versus-build boundary.
    locator: haystack/components/retrievers/in_memory/filter_retriever.py > run; document_stores/in_memory > write_documents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-006
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex separates build_index_from_nodes from as_retriever, independently corroborating construction-versus-retrieval activity separation.
    locator: llama-index-core/llama_index/core/indices/base.py > build_index_from_nodes and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-007
    source: eng-fw-haystack-repo
    supports: FilterRetriever.run applies filters to its document store and returns documents, directly supporting the concrete lightweight retrieval instance.
    locator: haystack/components/retrievers/in_memory/filter_retriever.py > FilterRetriever.run
    evidence_kind: official
    confidence: high
  - id: claim-lightweight-retrieval-008
    source: eng-fw-haystack-repo
    supports: Haystack FilterRetriever runs a filter query against an existing document store and returns matching documents without a write step, grounding bounded read-only discovery.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run
    evidence_kind: official
    confidence: high
  - id: claim-lightweight-retrieval-009
    source: eng-fw-haystack-repo
    supports: FilterRetriever separates retrieval from document writing and ranking, supporting the narrow activity boundary rather than a whole ingestion pipeline.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever inputs and outputs
    evidence_kind: official
    confidence: high
  - id: claim-lightweight-retrieval-010
    source: eng-fw-haystack-repo
    supports: Haystack implements DocumentWriter separately from FilterRetriever, supporting a semantic boundary between ingestion writes and read-only retrieval.
    locator: haystack/components/writers/document_writer.py > DocumentWriter.run; components/retrievers/filter_retriever.py > FilterRetriever.run
    evidence_kind: official
    confidence: high
  - id: claim-lightweight-retrieval-011
    source: eng-fw-haystack-repo
    supports: DocumentWriter writes documents through the store API, a mutation absent from FilterRetriever's retrieval contract and therefore outside the lightweight subtype.
    locator: haystack/components/writers/document_writer.py > write_documents call
    evidence_kind: official
    confidence: high
  - id: claim-lightweight-retrieval-012
    source: eng-fw-haystack-repo
    supports: FilterRetriever's read-only run over an existing document store grounds LightweightRetrieval as a candidate-discovery activity with a narrow execution boundary.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run
    evidence_kind: design-inference
    confidence: high
  - id: claim-lightweight-retrieval-013
    source: eng-fw-haystack-repo
    supports: Haystack's separate retriever and writer components ground the reviewed differentia between read-only discovery and mutation-heavy indexing activities.
    locator: haystack/components/retrievers/filter_retriever.py; haystack/components/writers/document_writer.py
    evidence_kind: design-inference
    confidence: high
  - id: claim-lwret-cursor
    source: src-cursor-search
    supports: Cursor semantic codebase search produces session-local lightweight retrieval hits.
    locator: semantic search
    evidence_kind: official-doc
    confidence: high
  - id: claim-lwret-design
    source: src-info-indexing-design
    supports: LightweightRetrieval is session-local and excludes durable index build ownership.
    locator: LightweightRetrieval
    evidence_kind: design-inference
    confidence: high
