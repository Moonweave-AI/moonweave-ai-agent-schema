schema: moonweave.ai/ontology-node/v1
id: LightweightRetrieval
kind: concept
status: review
labels:
  zh: 轻量检索
  en: Lightweight retrieval
  ja: 軽量検索
semantics:
  short_definition:
    zh: 轻量检索是在当前发现范围内直接读取现有入口或索引并返回少量候选的发现活动。
    en: Lightweight retrieval is a discovery activity that directly reads an existing surface or index and returns a bounded candidate set in the current scope.
    ja: 軽量検索は、現在の範囲で既存入口または索引を直接読み、限定候補集合を返す発見活動です。
  definition:
    zh: LightweightRetrieval 是 DiscoveryActivity 的一种：它以查询或过滤条件读取已存在的 DiscoverySurface、LightIndex 或其指针，在当前交互范围内返回有界 DiscoveryResult 集合。它不摄入新语料、不构建或刷新持久索引，也不以跨库融合、复杂重排或最终上下文选择为定义职责。
    en: LightweightRetrieval is a kind of DiscoveryActivity that applies a query or filter to an existing DiscoverySurface, LightIndex, or pointer and returns a bounded set of DiscoveryResult records in the current interaction scope. It does not ingest new corpora, build or refresh a persistent index, and is not defined by cross-store fusion, complex reranking, or final context selection.
    ja: LightweightRetrieval は DiscoveryActivity の一種で、クエリまたはフィルタを既存 DiscoverySurface、LightIndex、ポインタへ適用し、現在の対話範囲で限定された DiscoveryResult 集合を返します。新規コーパス取込み、永続索引構築・更新、複数ストア融合、複雑な再順位、最終コンテキスト選択を定義責務としません。
  why_needed:
    zh: 该概念覆盖资源列表、内存过滤和小型 BM25 查询等常见低成本操作，使它们能与索引构建、完整 RAG 检索流水线和最终选择明确分工。
    en: The concept covers common low-cost operations such as resource listing, in-memory filtering, and small BM25 queries, separating them from index construction, full RAG retrieval pipelines, and final selection.
    ja: 資源一覧、メモリ内フィルタ、小規模 BM25 照会などの低コスト操作を表し、索引構築、完全 RAG 検索パイプライン、最終選択から責務を分離します。
  includes:
    - zh: 纳入 resources/list、现有 DocumentStore 上的过滤检索、LightIndex 上的关键词查询，以及等价的会话内有界候选读取。
      en: Includes resources/list, filter retrieval over an existing DocumentStore, keyword queries over a LightIndex, and equivalent bounded candidate reads within a session.
      ja: resources/list、既存 DocumentStore のフィルタ検索、LightIndex のキーワード照会、同等のセッション内限定候補読取りを含みます。
  excludes:
    - zh: 排除索引摄入与构建、跨多个检索器的融合和重排、长期批处理搜索，以及从候选中作最终 ContextSelectionDecision 的活动。
      en: Excludes index ingestion and construction, fusion and reranking across multiple retrievers, long-running batch search, and the activity that makes the final ContextSelectionDecision from candidates.
      ja: 索引取込み・構築、複数 retriever 間の融合・再順位、長時間バッチ検索、候補から最終 ContextSelectionDecision を行う活動を除外します。
  semantic_kind: activity
  aliases: []
