parent_relation:
  id: LightweightRetrieval-is_a-DiscoveryActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: LightweightRetrieval 是 DiscoveryActivity 的专门类型：它在一次会话内对既有索引或文档存储执行有界只读查询并返回候选，不写入语料、不重建索引，也不负责最终上下文选择。
    en: LightweightRetrieval is a DiscoveryActivity specialized to a bounded, read-only query over an existing index or document store within one session; it returns candidates without ingesting corpus data, rebuilding the index, or making final context selection.
    ja: LightweightRetrieval は DiscoveryActivity の専門型で、一セッション内に既存索引または文書ストアへ有界な読み取り専用照会を行い、語料書込・索引再構築・最終文脈選択をせず候補を返します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: LightweightRetrieval-is_a-DiscoveryActivity-example-positive-001
      labels:
        zh: is_a 关系正例
        en: Positive is_a relation
        ja: is_a 関係の正例
      descriptions:
        zh: FilterRetriever 按 meta.department=legal 从既有文档存储读取最多 20 个候选，不更新存储；该运行是 LightweightRetrieval，因而也是 DiscoveryActivity。
        en: FilterRetriever reads at most 20 candidates matching meta.department=legal from an existing document store and performs no update; the run is LightweightRetrieval and therefore DiscoveryActivity.
        ja: FilterRetriever が既存文書ストアから meta.department=legal に一致する候補を最大 20 件読み、更新しないため、この実行は LightweightRetrieval であり DiscoveryActivity でもあります。
      field_values: {}
      related_node_ids:
        - LightweightRetrieval
        - DiscoveryActivity
      related_relation_ids:
        - LightweightRetrieval-is_a-DiscoveryActivity
      source_claims:
        - claim-lightweight-retrieval-008
        - claim-lightweight-retrieval-009
    - id: LightweightRetrieval-is_a-DiscoveryActivity-example-boundary-001
      labels:
        zh: is_a 关系边界例
        en: Boundary case for is_a
        ja: is_a 関係の境界例
      descriptions:
        zh: 同一流水线先把 10,000 个新文档写入存储并重建 BM25 统计，再执行查询；整个摄入与重建运行是发现基础设施活动，但不是 LightweightRetrieval。
        en: A pipeline writes 10,000 new documents, rebuilds BM25 statistics, and then queries them. The ingestion-and-rebuild execution may support discovery, but the whole run is not LightweightRetrieval.
        ja: パイプラインが新規文書 10,000 件を書き込み BM25 統計を再構築してから照会する場合、発見を支える活動でも全体実行は LightweightRetrieval ではありません。
      field_values: {}
      related_node_ids:
        - LightweightRetrieval
        - DiscoveryActivity
      related_relation_ids:
        - LightweightRetrieval-is_a-DiscoveryActivity
      source_claims:
        - claim-lightweight-retrieval-010
        - claim-lightweight-retrieval-011
  source_claims:
    - claim-lightweight-retrieval-012
    - claim-lightweight-retrieval-013
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
