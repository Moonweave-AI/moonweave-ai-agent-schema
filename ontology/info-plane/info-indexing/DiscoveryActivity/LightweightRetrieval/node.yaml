    scenario_id: null
    descriptions:
      zh: 系统在已有 InMemoryDocumentStore 上运行 FilterRetriever，按 meta.department='legal' 过滤并返回最多 5 个文档；期间没有写入文档或重建索引。
      en: The system runs FilterRetriever over an existing InMemoryDocumentStore with meta.department='legal' and returns at most five documents, without writing documents or rebuilding an index.
      ja: 既存 InMemoryDocumentStore 上で FilterRetriever を meta.department='legal' により実行し、最大 5 文書を返します。文書書込みや索引再構築は行いません。
    field_values:
      discovery_activity_id: lightweight-retrieval-legal-5
      query: meta.department = 'legal'
      surface_refs:
        - document-store://in-memory/legal
      started_at: 2026-07-16T02:15:00.000Z
      ended_at: 2026-07-16T02:15:00.012Z
      outcome: success
    related_node_ids:
      - LightweightRetrieval
      - DiscoveryActivity
    related_relation_ids:
      - LightweightRetrieval-is_a-DiscoveryActivity
    expected_result:
      zh: 该调用被识别为 LightweightRetrieval，并生成零到五项 DiscoveryResult。
      en: The call is classified as LightweightRetrieval and produces zero to five DiscoveryResult records.
      ja: この呼出しは LightweightRetrieval と分類され、0〜5 件の DiscoveryResult を生成します。
    why_valid_or_invalid:
      zh: Haystack FilterRetriever 直接对既有文档存储应用 filters 并返回 documents，符合读取现有表面且不承担摄入或索引构建的活动边界。
      en: Haystack FilterRetriever applies filters directly to an existing document store and returns documents, matching an activity that reads an existing surface without ingestion or index construction.
      ja: Haystack FilterRetriever は既存文書ストアへ直接 filters を適用して documents を返し、取込み・索引構築を伴わない既存入口読取りの境界を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-lightweight-retrieval-003
      - claim-lightweight-retrieval-004
  - id: LightweightRetrieval-example-boundary-001
    kind: boundary
    labels:
      zh: 轻量检索边界例
      en: Boundary case for Lightweight retrieval
      ja: 軽量検索の境界例
    scenario_id: null
    descriptions:
      zh: 一个摄入流水线读取新 PDF、切分文本、生成嵌入并写入 DocumentStore；即使其目的也是让内容可检索，它改变了持久索引状态而不是读取现有候选。
      en: An ingestion pipeline reads new PDFs, splits text, creates embeddings, and writes a DocumentStore; although it makes content retrievable, it changes persistent index state rather than reading existing candidates.
      ja: 取込みパイプラインが新規 PDF を読み、分割・埋め込み生成・DocumentStore 書込みを行います。検索可能化が目的でも既存候補読取りではなく永続索引状態を変更します。
    field_values: {}
    related_node_ids:
      - LightweightRetrieval
      - DiscoveryActivity
      - ToolSearch
    related_relation_ids:
      - LightweightRetrieval-is_a-DiscoveryActivity
    expected_result:
      zh: 该流水线被识别为摄入或索引构建活动，不得分类为 LightweightRetrieval。
      en: The pipeline is classified as ingestion or index construction and must not be classified as LightweightRetrieval.
      ja: このパイプラインは取込みまたは索引構築活動で、LightweightRetrieval には分類されません。
    why_valid_or_invalid:
      zh: 读取既有索引与创建或更新索引具有不同输入、输出和副作用；共享“支持检索”的目标不能消除该活动边界。
      en: Reading an existing index and creating or updating an index have different inputs, outputs, and side effects; a shared goal of enabling retrieval does not erase the activity boundary.
      ja: 既存索引読取りと索引作成・更新は入力、出力、副作用が異なり、「検索を可能にする」という共通目的だけでは活動境界を消せません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-lightweight-retrieval-005
      - claim-lightweight-retrieval-006
