schema: moonweave.ai/ontology-node/v1
id: DiscoveryMeasure
kind: concept
labels:
  zh: 发现度量
  en: discovery measure
  ja: 発見測定
semantics:
  short_definition:
    zh: 发现活动中对候选排序与打分的度量分支根。
    en: Measure branch root for ranking and scoring candidates in discovery activities.
    ja: discovery activity 内候補 rank/score の measure branch root。
  definition:
    zh: DiscoveryMeasure 拥有 CandidateRank 与 DiscoveryScore（含 SearchScore）；rank/score 是会话内观测，不是持久 Index 属性。
    en: DiscoveryMeasure owns CandidateRank and DiscoveryScore (including SearchScore); rank/score are session observations, not durable Index properties.
    ja: CandidateRank/DiscoveryScore branch。
  why_needed:
    zh: 度量分支使 rank 与 score 有独立类型，而不把数字字段混在 DiscoveryResult 身份里。
    en: A measure branch gives rank and score distinct types instead of mixing numeric fields into DiscoveryResult identity.
    ja: rank/score typing。
  includes:
    - zh: CandidateRank、DiscoveryScore、SearchScore 子类型。
      en: CandidateRank, DiscoveryScore, and SearchScore subtypes.
      ja: rank/score subtypes。
  excludes:
    - zh: 持久 retrieval fusion score、embedding 向量。
      en: Durable retrieval fusion scores and embedding vectors.
      ja: fusion score/embedding vector。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: DiscoveryResult 可链接 CandidateRank rank=1 与 SearchScore value=0.94 method=semantic_similarity。
    en: DiscoveryResult may link CandidateRank rank=1 and SearchScore value=0.94 method=semantic_similarity.
    ja: rank+score linkage。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys:
    - measure_id
  fields:
    - id: measure_id
      labels:
        zh: 度量标识
        en: measure ID
        ja: 測定 ID
      definitions:
        zh: 稳定标识一次发现运行中针对一个候选产生的一项独立度量观测；重复传输同一观测不得产生新身份。
        en: Stably identifies one independent measure observation produced for one candidate in one discovery run; retransmitting the same observation does not create a new identity.
        ja: 一回の発見実行で一候補について生成された独立測定観測を安定識別し、同じ観測の再送で新しい同一性を作りません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: measure-search-204-policy-17-bm25
      allowed_values: []
      source_claims:
        - claim-discovery-measure-003
    - id: discovery_run_ref
      labels:
        zh: 发现运行引用
        en: discovery run reference
        ja: 発見実行参照
      definitions:
        zh: 引用实际产生该观测的单次 DiscoveryActivity 运行，使值不会脱离候选集合和运行参数被复用。
        en: References the single DiscoveryActivity run that actually produced the observation so the value cannot be reused outside its candidate set and run parameters.
        ja: 観測を実際に生成した一回の DiscoveryActivity 実行を参照し、候補集合・実行パラメータから値を切り離して再利用しません。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: discovery-run:search-204
      allowed_values: []
      source_claims:
        - claim-discovery-measure-004
    - id: candidate_ref
      labels:
        zh: 被测候选引用
        en: measured candidate reference
        ja: 測定候補参照
      definitions:
        zh: 引用该值所评价的一个发现候选记录，而不复制候选内容。
        en: References the one discovery candidate evaluated by the value without copying candidate content.
        ja: 値が評価する一つの発見候補記録を参照し、候補内容を複製しません。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: discovery-result:policy-17
      allowed_values: []
      source_claims:
        - claim-discovery-measure-005
    - id: measure_kind
      labels:
        zh: 度量种类
        en: measure kind
        ja: 測定種別
      definitions:
        zh: 声明该观测按数值评分还是序位排名解释；种类不同的值不得仅因都是数字而合并。
        en: Declares whether the observation is interpreted as a numeric score or an ordinal rank; values of different kinds are not merged merely because both are numeric.
        ja: 観測を数値スコアまたは序数順位のどちらとして解釈するか宣言し、双方が数値という理由だけで統合しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: numeric-score
      allowed_values:
        - id: discovery-measure-kind-numeric-score
          value: numeric-score
          status: accepted
          labels:
            zh: 数值评分
            en: numeric score
            ja: 数値スコア
          definitions:
            zh: 由声明的方法和尺度解释的数值强度。
            en: A numeric magnitude interpreted under a declared method and scale.
            ja: 宣言された方式・尺度で解釈される数値強度です。
          source_claims:
            - claim-discovery-measure-006
        - id: discovery-measure-kind-ordinal-rank
          value: ordinal-rank
          status: accepted
          labels:
            zh: 序位排名
            en: ordinal rank
            ja: 序数順位
          definitions:
            zh: 候选在一个有序结果列表中的离散位置。
            en: A candidate's discrete position in one ordered result list.
            ja: 一つの順序付き結果一覧における候補の離散位置です。
          source_claims:
            - claim-discovery-measure-007
      source_claims:
        - claim-discovery-measure-008
    - id: measure_value
      labels:
        zh: 度量值
        en: measure value
        ja: 測定値
      definitions:
        zh: 保存本观测的有限数值；其含义只能结合 measure_kind 与 interpretation_ref 读取。
        en: Stores the finite numeric value of this observation; its meaning is read only together with measure_kind and interpretation_ref.
        ja: 観測の有限数値を保存し、意味は measure_kind と interpretation_ref と共にだけ解釈します。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0.812
      allowed_values: []
      source_claims:
        - claim-discovery-measure-009
    - id: interpretation_ref
      labels:
        zh: 解释约定引用
        en: interpretation reference
        ja: 解釈規約参照
      definitions:
        zh: 引用产生并解释该值的方法、版本、方向和尺度或序位起点约定。
        en: References the method, version, direction, and scale or rank-origin convention that produced and interprets the value.
        ja: 値を生成・解釈する方式、版、方向、尺度または順位起点規約を参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ranking-method:bm25-descending@2
      allowed_values: []
      source_claims:
        - claim-discovery-measure-010
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      definitions:
        zh: 记录本度量在产生它的发现运行中形成的时间，而不是后来复制或读取该值的时间。
        en: Records when the measure was formed in its producing discovery run, not when the value was later copied or read.
        ja: 後に値を複製・読取した時刻ではなく、生成発見実行で測定が形成された時刻を記録します。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-17T01:02:03Z
      allowed_values: []
      source_claims:
        - claim-discovery-measure-011
  constraints:
    - id: discovery-measure-comparability-boundary
      severity: error
      expression_language: plain
      expression: measure_value is finite, and two DiscoveryMeasures are directly comparable only when measure_kind and interpretation_ref are equal and their discovery runs use the same candidate-population semantics
      explanation:
        zh: 值必须有限；只有度量种类、解释约定以及运行候选集合语义一致时才能直接比较。评分与排名或不同方法的评分不得混为同一尺度。
        en: The value is finite, and direct comparison requires the same measure kind, interpretation convention, and run candidate-population semantics. Scores and ranks, or scores from different methods, do not share a scale by default.
        ja: 値は有限で、直接比較には同じ測定種別・解釈規約・実行候補集合意味論が必要です。スコアと順位、異方式スコアは既定で同尺度ではありません。
      source_claims:
        - claim-discovery-measure-012
  required_relations: []
examples:
  - id: DiscoveryMeasure-example-rank-score
    labels:
      zh: rank 与 score
      en: Rank and score
      ja: rank と score
    descriptions:
      zh: dres-101-1 rank=1 discovery_score=0.94 分别建模为 CandidateRank 与 SearchScore。
      en: dres-101-1 rank=1 discovery_score=0.94 modeled as CandidateRank and SearchScore separately.
      ja: separate rank/score nodes。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: measure
    field_values: {}
    related_node_ids:
      - DiscoveryMeasure
      - CandidateRank
      - SearchScore
    related_relation_ids: []
    source_claims:
      - claim-dmeas-design
  - id: DiscoveryMeasure-example-no-score
    labels:
      zh: 无 score 仅有 rank
      en: Rank without score
      ja: score なし rank のみ
    descriptions:
      zh: prompts/list 按返回顺序 rank 可无 SearchScore。
      en: prompts/list return-order rank may lack SearchScore.
      ja: rank-only OK。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: prompts/list
    field_values: {}
    related_node_ids:
      - DiscoveryMeasure
      - CandidateRank
    related_relation_ids: []
    source_claims:
      - claim-dmeas-mcp
  - id: DiscoveryMeasure-example-not-index-score
    labels:
      zh: 非 Index 分数
      en: Not Index score
      ja: Index score ではない
    descriptions:
      zh: DiscoveryScore 不得与 memory-retrieval-ranking 持久分数混同。
      en: DiscoveryScore must not be conflated with memory-retrieval-ranking durable scores.
      ja: session vs durable score。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DiscoveryMeasure
    related_relation_ids: []
    source_claims:
      - claim-dmeas-design
parent_relation:
  id: DiscoveryActivity-produces-DiscoveryMeasure
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生发现度量
    en: produces
    ja: 発見測定を生成する
  definitions:
    zh: DiscoveryActivity produces DiscoveryMeasure 表示一次具名发现活动在同一运行和候选范围内计算并记录一个带方法与解释约定的质量观测；预先存在的阈值或从另一运行复制的分数不是该活动产生的度量。
    en: DiscoveryActivity produces DiscoveryMeasure means that one identified discovery activity computes and records a quality observation, with method and interpretation convention, for the same run and candidate scope; a pre-existing threshold or score copied from another run is not produced by that activity.
    ja: DiscoveryActivity produces DiscoveryMeasure は、一回の識別済み discovery activity が同じ run・candidate scope について method と interpretation convention を持つ quality observation を計算・記録することを示します。既存 threshold や別 run からコピーした score は当該 activity の生成物ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个发现活动可产生零个、一个或多个度量，类级展示边不施加统一基数。
    en: A discovery activity may produce zero, one, or many measures; the class-level display edge imposes no uniform cardinality.
    ja: discovery activity は zero/one/many measure を生成でき、class-level 表示辺は一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由发现活动生成
      en: generated by discovery activity
      ja: 発見活動により生成される
  conditions:
    - id: DiscoveryActivity-produces-DiscoveryMeasure-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the measure records the same DiscoveryActivity run identity, candidate or candidate-set scope, calculation method, and observation time, and the value was generated during that run rather than imported.
      source_claims:
        - claim-discovery-measure-016
      explanation:
        zh: 仅当度量记录同一 DiscoveryActivity 的运行身份、候选或候选集合范围、计算方法与观测时间，且该值确在该运行内生成而非导入时成立。
        en: Assert only when the measure records the same DiscoveryActivity run identity, candidate or candidate-set scope, calculation method, and observation time, and the value was generated during that run rather than imported.
        ja: measure が同一 DiscoveryActivity の run identity、candidate/candidate-set scope、calculation method、observation time を記録し、値が import ではなく当該 run 内で生成された場合だけ成立します。
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DiscoveryActivity-produces-DiscoveryMeasure-example-positive-001
      labels:
        zh: 同运行候选得分
        en: Same-run candidate score
        ja: 同一 run candidate score
      descriptions:
        zh: 发现活动 `discover/31` 对候选 `doc/8` 计算归一化相关度 `0.82`，记录算法 `bm25-normalized-v2`、运行 ID 与观测时间。
        en: Discovery activity `discover/31` computes normalized relevance `0.82` for candidate `doc/8` and records algorithm `bm25-normalized-v2`, the run ID, and observation time.
        ja: discovery activity `discover/31` は candidate `doc/8` の normalized relevance `0.82` を計算し、algorithm `bm25-normalized-v2`、run ID、observation time を記録します。
      field_values: {}
      related_node_ids:
        - DiscoveryActivity
        - DiscoveryMeasure
      related_relation_ids:
        - DiscoveryActivity-produces-DiscoveryMeasure
      source_claims:
        - claim-discovery-measure-017
    - id: DiscoveryActivity-produces-DiscoveryMeasure-example-boundary-001
      labels:
        zh: 跨运行复制分数边界
        en: Cross-run copied-score boundary
        ja: 別 run copied score 境界
      descriptions:
        zh: 活动 `discover/31` 展示来自缓存运行 `discover/12` 的 `0.82`，没有重新计算或生成记录。
        en: Activity `discover/31` displays `0.82` copied from cached run `discover/12` and has no recomputation or generation record.
        ja: activity `discover/31` は cache run `discover/12` からコピーした `0.82` を表示し、再計算・generation record がありません。
      field_values: {}
      related_node_ids:
        - DiscoveryActivity
        - DiscoveryMeasure
      related_relation_ids:
        - DiscoveryActivity-produces-DiscoveryMeasure
      source_claims:
        - claim-discovery-measure-018
  source_claims:
    - claim-discovery-measure-019
    - claim-discovery-measure-020
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-mcp-prompts-list
    title: MCP Server Prompts Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    source_type: official-spec
    relevance: prompts/list enumeration.
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-discovery-measure-001
    source: eng-fw-haystack-repo
    supports: Haystack Document exposes an optional score while DocumentMRR derives rank from ordered result position, supporting DiscoveryMeasure as a shared genus with distinct score and rank subtypes.
    locator: haystack/dataclasses/document.py > Document.score; components/evaluators/document_mrr.py > reciprocal rank
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-002
    source: eng-fw-haystack-repo
    supports: Haystack rankers may sort and combine scores while evaluators compute position-based metrics, supporting explicit method and convention metadata rather than an assumed common scale.
    locator: haystack/components/rankers/meta_field.py > sorting and score modes; components/evaluators/document_mrr.py > rank position
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-003
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack returns score observations for retrieved Document objects and returns per-query individual MRR scores. Moonweave design inference: measure_id gives each candidate-bound observation a stable identity that Haystack itself does not prescribe."
    locator: haystack/dataclasses/document.py > Document.id and Document.score; haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > individual_scores
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-004
    source: eng-fw-haystack-repo
    supports: "Direct source premise: DocumentMRREvaluator.run computes results from the ground-truth and retrieved-document lists supplied to one invocation. Moonweave design inference: discovery_run_ref persists that invocation boundary as an ontology reference."
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > ground_truth_documents and retrieved_documents
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-005
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack stores a score on a concrete Document and DocumentMRREvaluator enumerates concrete retrieved Document objects. Moonweave design inference: candidate_ref normalizes both score and ordinal observations to one non-copying candidate reference."
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > enumerate(retrieved_documents)
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-006
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack defines Document.score as a floating-point score usually assigned by retrievers. Moonweave design inference: numeric-score is the controlled DiscoveryMeasure kind for that magnitude semantics."
    locator: haystack/dataclasses/document.py > Document > score
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-007
    source: eng-fw-haystack-repo
    supports: "Direct source premise: DocumentMRREvaluator obtains rank by enumerating retrieved documents and uses rank plus one in reciprocal-rank calculation. Moonweave design inference: ordinal-rank is the controlled DiscoveryMeasure kind for that position semantics."
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > enumerate and rank + 1
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-008
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack represents retriever score as Document.score but derives rank from ordered position in DocumentMRREvaluator. Moonweave design inference: measure_kind preserves that score-versus-rank semantic distinction in their shared genus."
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > enumerate and reciprocal_rank
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-009
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack exposes floating-point Document.score values and computes numeric reciprocal-rank values from ordered positions. Moonweave design inference: measure_value is their common numeric carrier and does not assert a common scale."
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > reciprocal_rank = 1 / (rank + 1)
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-010
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack rankers expose method-specific ordering behavior while DocumentMRREvaluator interprets list position through a one-based reciprocal-rank convention. Moonweave design inference: interpretation_ref binds a versioned method or convention so values are not compared without their semantics."
    locator: haystack/components/rankers/meta_field.py > MetaFieldRanker sort_order; haystack/components/evaluators/document_mrr.py > rank + 1
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-011
    source: eng-ont-prov-o
    supports: "Direct source premise: PROV-O represents the time at which an entity was generated through a Generation and prov:atTime. Moonweave design inference: observed_at applies that generation time to the DiscoveryMeasure observation rather than to later transport or access."
    locator: PROV-O > Qualified Generation > prov:Generation and prov:atTime
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-012
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack stores retriever scores on Documents but derives reciprocal rank from the first matching document's ordered position. Moonweave design inference: comparability is denied unless kind, interpretation, and candidate-population semantics agree."
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > enumerate and reciprocal_rank
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-013
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack stores a retriever-assigned score on a concrete Document. Moonweave design inference: this case binds that score to an identified discovery run, interpretation version, and observation identity."
    locator: haystack/dataclasses/document.py > Document.score; components/evaluators/document_mrr.py > reciprocal rank
    evidence_kind: official
    confidence: high
  - id: claim-discovery-measure-014
    source: eng-fw-haystack-repo
    supports: Haystack models score on a Document and rank through ordered retrieved documents, supporting rejection of an unbound numeric value as a discovery measure.
    locator: haystack/dataclasses/document.py > Document.score; components/evaluators/document_mrr.py > retrieved_documents order
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-015
    source: eng-fw-haystack-repo
    supports: Haystack's separate Document.score and MRR rank-position calculations directly support coexistence of score and rank observations for one candidate.
    locator: haystack/dataclasses/document.py > score; components/evaluators/document_mrr.py > rank calculation
    evidence_kind: official
    confidence: high
  - id: claim-discovery-measure-016
    source: eng-ont-prov-o
    supports: PROV-O grounds generation as an Entity beginning to exist through an Activity. Discovery-run identity, candidate scope, method fields, and display parent are Moonweave design inferences.
    locator: PROV-O > Generation; prov:wasGeneratedBy and prov:Activity
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-017
    source: eng-fw-haystack-repo
    supports: Haystack grounds candidate scores and rank-derived evaluation; run-bound provenance is Moonweave design inference.
    locator: haystack/dataclasses/document.py > Document.score; components/evaluators/document_mrr.py
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-018
    source: eng-ont-prov-o
    supports: PROV-O distinguishes generation from use and attribution; the cache example is a Moonweave application of that distinction.
    locator: PROV-O > Generation versus Usage
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-019
    source: eng-ont-prov-o
    supports: PROV-O directly supports the Activity-to-generated-Entity pattern. Moonweave specializes the generated Entity as DiscoveryMeasure and adds run, candidate, and method identity plus primary layout.
    locator: PROV-O > Generation; prov:wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-measure-020
    source: eng-fw-haystack-repo
    supports: Haystack supplies operational examples of candidate scores and rank-based measures. It does not define the Moonweave production relation or layout.
    locator: Document.score; DocumentMRR reciprocal-rank implementation
    evidence_kind: design-inference
    confidence: high
  - id: claim-dmeas-mcp
    source: src-mcp-prompts-list
    supports: prompts/list may yield rank without numeric search score.
    locator: prompts/list
    evidence_kind: primary-spec
