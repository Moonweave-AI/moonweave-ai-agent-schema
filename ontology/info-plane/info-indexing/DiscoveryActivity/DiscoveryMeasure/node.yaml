schema: moonweave.ai/ontology-node/v1
id: DiscoveryMeasure
kind: concept
status: accepted
labels:
  zh: 发现度量
  en: discovery measure
  ja: 発見測定
semantics:
  short_definition:
    zh: 发现度量是把一次发现运行中的测量值及其解释约定绑定到候选的质量观测。
    en: A discovery measure is a quality observation binding a measured value and its interpretation convention to a candidate in one discovery run.
    ja: 発見測定は、一回の発見実行で測定値と解釈規約を候補へ結び付ける品質観測です。
  definition:
    zh: DiscoveryMeasure 是发现过程中的质量观测上位类：每项观测必须绑定被测候选、产生它的发现运行、测量值以及解释该值的方法或约定。它统一容纳数值型 DiscoveryScore 与序位型 CandidateRank，但 does not imply a shared scale：评分强度与列表位置具有不同数据类型、比较规则和生成机制。
    en: "DiscoveryMeasure is the genus for quality observations made during discovery: each observation binds the measured candidate, producing discovery run, value, and the method or convention that interprets that value. It includes numeric DiscoveryScore and ordinal CandidateRank, but does not imply a shared scale; score magnitude and list position have different datatypes, comparison rules, and production mechanisms."
    ja: DiscoveryMeasure は発見中の品質観測の上位概念で、各観測は対象候補、生成した発見実行、値、値を解釈する方式・規約を結び付けます。数値型 DiscoveryScore と序数型 CandidateRank を含みますが共通尺度を意味せず、スコア強度と一覧位置はデータ型、比較規則、生成機構が異なります。
  why_needed:
    zh: 该上位概念让图谱表达“分数”和“排名”都是针对候选的运行内度量，而不把二者扁平并列为无关根节点，也不以一个通用数值字段抹除它们的解释差异。
    en: The genus expresses that score and rank are both run-bound candidate measures without leaving them as unrelated flat roots or erasing their interpretive difference in one generic numeric field.
    ja: スコアと順位が共に実行内候補測定であることを表し、無関係な平坦ルートにせず、汎用数値項目で解釈差を消すことも防ぎます。
  includes:
    - zh: 纳入绑定候选与发现运行、并声明解释方法或约定的数值评分观测和序位排名观测。
      en: Includes numeric score observations and ordinal rank observations bound to a candidate and discovery run with an explicit interpreting method or convention.
      ja: 候補と発見実行に結び付き、解釈方式・規約を明示する数値スコア観測と序数順位観測を含みます。
  excludes:
    - zh: 排除候选内容本身、发现活动、没有候选与运行绑定的孤立数字、测量方法规范，以及把不同评分方法或评分与排名强行放在同一尺度的记录。
      en: Excludes candidate content, discovery activities, isolated numbers without candidate and run bindings, measurement-method specifications, and records coercing different scoring methods—or score and rank—onto one scale.
      ja: 候補内容、発見活動、候補・実行に結び付かない孤立数値、測定方式仕様、異なる採点方式やスコアと順位を一尺度へ強制する記録を除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys:
    - measure_id
  fields:
    - id: measure_id
      labels:
        zh: 度量标识
        en: measure ID
        ja: 測定 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次发现运行中针对一个候选产生的一项独立度量观测；重复传输同一观测不得产生新身份。
        en: Stably identifies one independent measure observation produced for one candidate in one discovery run; retransmitting the same observation does not create a new identity.
        ja: 一回の発見実行で一候補について生成された独立測定観測を安定識別し、同じ観測の再送で新しい同一性を作りません。
      allowed_values: []
      pattern: null
      example_value: measure-search-204-policy-17-bm25
      source_claims:
        - claim-discovery-measure-003
    - id: discovery_run_ref
      labels:
        zh: 发现运行引用
        en: discovery run reference
        ja: 発見実行参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际产生该观测的单次 DiscoveryActivity 运行，使值不会脱离候选集合和运行参数被复用。
        en: References the single DiscoveryActivity run that actually produced the observation so the value cannot be reused outside its candidate set and run parameters.
        ja: 観測を実際に生成した一回の DiscoveryActivity 実行を参照し、候補集合・実行パラメータから値を切り離して再利用しません。
      allowed_values: []
      pattern: null
      example_value: discovery-run:search-204
      source_claims:
        - claim-discovery-measure-004
    - id: candidate_ref
      labels:
        zh: 被测候选引用
        en: measured candidate reference
        ja: 測定候補参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该值所评价的一个发现候选记录，而不复制候选内容。
        en: References the one discovery candidate evaluated by the value without copying candidate content.
        ja: 値が評価する一つの発見候補記録を参照し、候補内容を複製しません。
      allowed_values: []
      pattern: null
      example_value: discovery-result:policy-17
      source_claims:
        - claim-discovery-measure-005
    - id: measure_kind
      labels:
        zh: 度量种类
        en: measure kind
        ja: 測定種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该观测按数值评分还是序位排名解释；种类不同的值不得仅因都是数字而合并。
        en: Declares whether the observation is interpreted as a numeric score or an ordinal rank; values of different kinds are not merged merely because both are numeric.
        ja: 観測を数値スコアまたは序数順位のどちらとして解釈するか宣言し、双方が数値という理由だけで統合しません。
      allowed_values:
        - id: discovery-measure-kind-numeric-score
          value: numeric-score
          status: accepted
          labels:
            zh: 数值评分
            en: numeric score
            ja: 数値スコア
          definitions:
            zh: 由声明的方法和尺度解释的数值强度。
            en: A numeric magnitude interpreted under a declared method and scale.
            ja: 宣言された方式・尺度で解釈される数値強度です。
          source_claims:
            - claim-discovery-measure-006
        - id: discovery-measure-kind-ordinal-rank
          value: ordinal-rank
          status: accepted
          labels:
            zh: 序位排名
            en: ordinal rank
            ja: 序数順位
          definitions:
            zh: 候选在一个有序结果列表中的离散位置。
            en: A candidate's discrete position in one ordered result list.
            ja: 一つの順序付き結果一覧における候補の離散位置です。
          source_claims:
            - claim-discovery-measure-007
      pattern: null
      example_value: numeric-score
      source_claims:
        - claim-discovery-measure-008
    - id: measure_value
      labels:
        zh: 度量值
        en: measure value
        ja: 測定値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存本观测的有限数值；其含义只能结合 measure_kind 与 interpretation_ref 读取。
        en: Stores the finite numeric value of this observation; its meaning is read only together with measure_kind and interpretation_ref.
        ja: 観測の有限数値を保存し、意味は measure_kind と interpretation_ref と共にだけ解釈します。
      allowed_values: []
      pattern: null
      example_value: 0.812
      source_claims:
        - claim-discovery-measure-009
    - id: interpretation_ref
      labels:
        zh: 解释约定引用
        en: interpretation reference
        ja: 解釈規約参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生并解释该值的方法、版本、方向和尺度或序位起点约定。
        en: References the method, version, direction, and scale or rank-origin convention that produced and interprets the value.
        ja: 値を生成・解釈する方式、版、方向、尺度または順位起点規約を参照します。
      allowed_values: []
      pattern: null
      example_value: ranking-method:bm25-descending@2
      source_claims:
        - claim-discovery-measure-010
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本度量在产生它的发现运行中形成的时间，而不是后来复制或读取该值的时间。
        en: Records when the measure was formed in its producing discovery run, not when the value was later copied or read.
        ja: 後に値を複製・読取した時刻ではなく、生成発見実行で測定が形成された時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T01:02:03Z
      source_claims:
        - claim-discovery-measure-011
  constraints:
    - id: discovery-measure-comparability-boundary
      severity: error
      expression_language: plain
      expression: measure_value is finite, and two DiscoveryMeasures are directly comparable only when measure_kind and interpretation_ref are equal and their discovery runs use the same candidate-population semantics
      explanations:
        zh: 值必须有限；只有度量种类、解释约定以及运行候选集合语义一致时才能直接比较。评分与排名或不同方法的评分不得混为同一尺度。
        en: The value is finite, and direct comparison requires the same measure kind, interpretation convention, and run candidate-population semantics. Scores and ranks, or scores from different methods, do not share a scale by default.
        ja: 値は有限で、直接比較には同じ測定種別・解釈規約・実行候補集合意味論が必要です。スコアと順位、異方式スコアは既定で同尺度ではありません。
      source_claims:
        - claim-discovery-measure-012
  required_relation_constraints: []
examples:
  - id: DiscoveryMeasure-example-positive-001
    kind: positive
    labels:
      zh: 绑定候选与解释方法的评分观测
      en: Candidate- and method-bound score observation
      ja: 候補・方式に結び付くスコア観測
    scenario_id: null
    descriptions:
      zh: 搜索运行 search-204 在 2026-07-17T01:02:03Z 为候选 policy-17 产生 BM25 评分 0.812；该观测以独立 measure_id 标识，并引用版本化的 BM25 降序解释规范。
      en: Search run search-204 produces a BM25 score of 0.812 for candidate policy-17 at 2026-07-17T01:02:03Z. The observation has its own measure ID and references a versioned BM25-descending interpretation specification.
      ja: 検索実行 search-204 は 2026-07-17T01:02:03Z に候補 policy-17 の BM25 スコア 0.812 を生成します。観測は独自 measure ID を持ち、版管理された BM25 降順解釈仕様を参照します。
    field_values:
      measure_id: measure-search-204-policy-17-bm25
      discovery_run_ref: discovery-run:search-204
      candidate_ref: discovery-result:policy-17
      measure_kind: numeric-score
      measure_value: 0.812
      interpretation_ref: ranking-method:bm25-descending@2
      observed_at: 2026-07-17T01:02:03Z
    related_node_ids:
      - DiscoveryMeasure
      - DiscoveryScore
    related_relation_ids:
      - DiscoveryScore-is_a-DiscoveryMeasure
    expected_result:
      zh: 该记录被识别为一项 DiscoveryMeasure，并可进一步分类为 DiscoveryScore；只有采用相同解释规范和候选集合语义的度量才可直接比较。
      en: The record is one DiscoveryMeasure and can be further classified as DiscoveryScore; direct comparison is permitted only with measures using the same interpretation and candidate-population semantics.
      ja: 記録は DiscoveryMeasure で、さらに DiscoveryScore と分類できます。直接比較は同じ解釈・候補集合意味論の測定に限ります。
    why_valid_or_invalid:
      zh: 候选、运行、数值、类型、解释规范与生成时间齐全，因此该数字具有可审计的发现度量语义，而不是脱离语境的评分。
      en: Candidate, run, value, kind, interpretation, and generation time are all present, so the number has auditable discovery-measure semantics rather than being a detached score.
      ja: 候補・実行・値・種別・解釈・生成時刻が揃うため、数値は文脈から切り離されたスコアではなく監査可能な発見測定です。
    synthetic: true
    verified_version: https://github.com/deepset-ai/haystack
    source_claims:
      - claim-discovery-measure-013
  - id: DiscoveryMeasure-example-boundary-001
    kind: boundary
    labels:
      zh: 无运行语境的孤立数字
      en: Isolated number without run context
      ja: 実行文脈のない孤立数値
    scenario_id: null
    descriptions:
      zh: 记录只写 value=0.75，没有候选 ID、发现运行、评分方法或排名约定；无法判断它是相似度、置信度、阈值还是普通业务字段。
      en: A record contains only value=0.75 with no candidate ID, discovery run, scoring method, or ranking convention, so it could be similarity, confidence, a threshold, or an ordinary business field.
      ja: 記録は value=0.75 だけで、候補 ID、発見実行、採点方式、順位規約がなく、類似度、信頼度、閾値、通常業務項目のいずれか判断できません。
    field_values:
      measure_value: 0.75
    related_node_ids:
      - DiscoveryMeasure
    related_relation_ids: []
    expected_result:
      zh: 该数字不被分类为 DiscoveryMeasure，直到补齐被测候选、运行和解释约定。
      en: The number is not classified as DiscoveryMeasure until candidate, run, and interpretation convention are supplied.
      ja: 候補、実行、解釈規約が補われるまで、この数値は DiscoveryMeasure に分類されません。
    why_valid_or_invalid:
      zh: 官方框架把 score 绑定在 Document 上，并在排名评估中使用返回位置；脱离这些绑定的数字不具备发现度量语义。
      en: The framework binds score to Document and rank evaluation to returned position; a number detached from those bindings lacks discovery-measure semantics.
      ja: 公式フレームワークは score を Document、順位評価を返却位置へ結び付け、これらから離れた数値は発見測定意味を持ちません。
    synthetic: true
    verified_version: https://github.com/deepset-ai/haystack
    source_claims:
      - claim-discovery-measure-014
  - id: DiscoveryMeasure-example-instance-001
    kind: instance
    labels:
      zh: 候选双度量实例
      en: Candidate dual-measure instance
      ja: 候補二重測定インスタンス
    scenario_id: null
    descriptions:
      zh: candidate=policy-17、run=search-204 下存在 score observation search-score-policy-17 和 rank observation candidate-rank-policy-17。
      en: For candidate policy-17 in run search-204, score observation search-score-policy-17 and rank observation candidate-rank-policy-17 coexist.
      ja: candidate=policy-17、run=search-204 に score 観測 search-score-policy-17 と rank 観測 candidate-rank-policy-17 が存在します。
    field_values:
      candidate_id: policy-17
      run_id: search-204
      measure_count: 2
    related_node_ids:
      - DiscoveryMeasure
      - DiscoveryScore
      - CandidateRank
    related_relation_ids:
      - DiscoveryScore-is_a-DiscoveryMeasure
      - CandidateRank-is_a-DiscoveryMeasure
    expected_result:
      zh: 两个实例沿不同子分支显示，并共享 DiscoveryMeasure 上位节点。
      en: The two instances appear on separate child branches while sharing the DiscoveryMeasure genus.
      ja: 二つのインスタンスは別子枝に表示され、DiscoveryMeasure 上位ノードを共有します。
    why_valid_or_invalid:
      zh: 共同候选与运行说明它们都是发现度量，不同方法与值类型说明它们不能压缩成一个通用 measurement 值。
      en: The shared candidate and run establish both as discovery measures, while different methods and value types prevent collapse into one generic measurement value.
      ja: 共有候補・実行により両方が発見測定となり、異なる方式・値型により単一汎用 measurement 値への圧縮を防ぎます。
    synthetic: true
    verified_version: https://github.com/deepset-ai/haystack
    source_claims:
      - claim-discovery-measure-015
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DiscoveryActivity-produces-DiscoveryMeasure
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生发现度量
    en: produces
    ja: 発見測定を生成する
  definitions:
    zh: DiscoveryActivity produces DiscoveryMeasure 表示一次具名发现活动在同一运行和候选范围内计算并记录一个带方法与解释约定的质量观测；预先存在的阈值或从另一运行复制的分数不是该活动产生的度量。
    en: DiscoveryActivity produces DiscoveryMeasure means that one identified discovery activity computes and records a quality observation, with method and interpretation convention, for the same run and candidate scope; a pre-existing threshold or score copied from another run is not produced by that activity.
    ja: DiscoveryActivity produces DiscoveryMeasure は、一回の識別済み discovery activity が同じ run・candidate scope について method と interpretation convention を持つ quality observation を計算・記録することを示します。既存 threshold や別 run からコピーした score は当該 activity の生成物ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个发现活动可产生零个、一个或多个度量，类级展示边不施加统一基数。
    en: A discovery activity may produce zero, one, or many measures; the class-level display edge imposes no uniform cardinality.
    ja: discovery activity は zero/one/many measure を生成でき、class-level 表示辺は一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由发现活动生成
      en: generated by discovery activity
      ja: 発見活動により生成される
  conditions:
    - id: DiscoveryActivity-produces-DiscoveryMeasure-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the measure records the same DiscoveryActivity run identity, candidate or candidate-set scope, calculation method, and observation time, and the value was generated during that run rather than imported.
      explanations:
        zh: 仅当度量记录同一 DiscoveryActivity 的运行身份、候选或候选集合范围、计算方法与观测时间，且该值确在该运行内生成而非导入时成立。
        en: Assert only when the measure records the same DiscoveryActivity run identity, candidate or candidate-set scope, calculation method, and observation time, and the value was generated during that run rather than imported.
        ja: measure が同一 DiscoveryActivity の run identity、candidate/candidate-set scope、calculation method、observation time を記録し、値が import ではなく当該 run 内で生成された場合だけ成立します。
      source_claims:
        - claim-discovery-measure-016
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DiscoveryActivity-produces-DiscoveryMeasure-example-positive-001
      kind: positive
      labels:
        zh: 同运行候选得分
        en: Same-run candidate score
        ja: 同一 run candidate score
      scenario_id: null
      descriptions:
        zh: 发现活动 `discover/31` 对候选 `doc/8` 计算归一化相关度 `0.82`，记录算法 `bm25-normalized-v2`、运行 ID 与观测时间。
        en: Discovery activity `discover/31` computes normalized relevance `0.82` for candidate `doc/8` and records algorithm `bm25-normalized-v2`, the run ID, and observation time.
        ja: discovery activity `discover/31` は candidate `doc/8` の normalized relevance `0.82` を計算し、algorithm `bm25-normalized-v2`、run ID、observation time を記録します。
      field_values: {}
      related_node_ids:
        - DiscoveryActivity
        - DiscoveryMeasure
      related_relation_ids:
        - DiscoveryActivity-produces-DiscoveryMeasure
      expected_result:
        zh: 建立 produces 边，度量可追溯到同一次发现运行。
        en: A produces edge is created and the measure is traceable to the same discovery run.
        ja: produces 辺を作り、measure を同一 discovery run へ追跡できます。
      why_valid_or_invalid:
        zh: 活动、候选范围、算法和生成时间均完整。
        en: Activity, candidate scope, algorithm, and generation time are complete.
        ja: activity、candidate scope、algorithm、generation time が揃っています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-discovery-measure-017
    - id: DiscoveryActivity-produces-DiscoveryMeasure-example-boundary-001
      kind: boundary
      labels:
        zh: 跨运行复制分数边界
        en: Cross-run copied-score boundary
        ja: 別 run copied score 境界
      scenario_id: null
      descriptions:
        zh: 活动 `discover/31` 展示来自缓存运行 `discover/12` 的 `0.82`，没有重新计算或生成记录。
        en: Activity `discover/31` displays `0.82` copied from cached run `discover/12` and has no recomputation or generation record.
        ja: activity `discover/31` は cache run `discover/12` からコピーした `0.82` を表示し、再計算・generation record がありません。
      field_values: {}
      related_node_ids:
        - DiscoveryActivity
        - DiscoveryMeasure
      related_relation_ids:
        - DiscoveryActivity-produces-DiscoveryMeasure
      expected_result:
        zh: 保留引用来源，不把该度量归为当前活动产生。
        en: The source reference is retained, but the measure is not attributed as produced by the current activity.
        ja: source reference を保持しますが、current activity の生成 measure とはしません。
      why_valid_or_invalid:
        zh: 展示或使用既有值与生成新度量是不同事实。
        en: Displaying or using an existing value differs from generating a new measure.
        ja: 既存値の表示・利用と新 measure の生成は異なる事実です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-discovery-measure-018
  source_claims:
    - claim-discovery-measure-019
    - claim-discovery-measure-020
  distinct_fact_rationale:
    zh: produces 记录度量的生成来源；度量的 is_a 关系仅记录 CandidateRank、DiscoveryScore 等类别继承，二者不能互换。
    en: produces records measure provenance; measure is_a relations record only subtype inheritance for CandidateRank and DiscoveryScore. They are not interchangeable.
    ja: produces は measure provenance を、is_a は CandidateRank・DiscoveryScore の subtype 継承だけを記録し、交換できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
