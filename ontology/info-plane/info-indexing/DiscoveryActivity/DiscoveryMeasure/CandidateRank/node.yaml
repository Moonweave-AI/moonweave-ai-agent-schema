schema: moonweave.ai/ontology-node/v1
id: CandidateRank
kind: concept
labels:
  zh: 候选排名
  en: candidate rank
  ja: 候補順位
semantics:
  short_definition:
    zh: 候选在当次 DiscoveryResult 集合中的有序位置观测。
    en: Ordered position observation of a candidate within the session-local DiscoveryResult set.
    ja: session-local DiscoveryResult 集合内候補の有序位置観測。
  definition:
    zh: CandidateRank 从 1 开始计数，绑定 discovery_activity_id；同一 source_uri 在不同 session 可有不同 rank。
    en: CandidateRank counts from 1 bound to discovery_activity_id; the same source_uri may have different ranks across sessions.
    ja: 1-based session-local rank。
  why_needed:
    zh: 显式 rank 观测支持解释候选顺序而不假设 IndexEntry 永久 ordinal。
    en: Explicit rank observations explain candidate ordering without assuming permanent IndexEntry ordinals.
    ja: explicit rank observation。
  includes:
    - zh: rank 整数、discovery_activity_id、result_id 引用。
      en: Rank integer, discovery_activity_id, result_id reference.
      ja: rank/activity/result ref。
  excludes:
    - zh: IndexEntry ordinal、全局搜索结果页码。
      en: IndexEntry ordinal and global search result page numbers.
      ja: IndexEntry ordinal/global paging。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: disc-101 三个 Markdown 结果 rank=1,2,3；disc-prompts-8 code-review rank=1 summarize rank=2。
    en: disc-101 three Markdown results rank=1,2,3; disc-prompts-8 code-review rank=1 summarize rank=2.
    ja: ordered rank assignment。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields:
    - id: origin
      labels:
        zh: 排名起点
        en: rank origin
        ja: 順位起点
      definitions:
        zh: 声明 position 采用零基还是一基解释；允许值为 0 或 1，避免跨实现产生一位偏差。
        en: Declares whether position is zero- or one-based; permitted values are 0 and 1 so implementations do not introduce an off-by-one ambiguity.
        ja: position を zero-based または one-based のどちらで解釈するか示し、許容値を 0・1 に限定して off-by-one の曖昧さを防ぎます。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims:
        - claim-candidate-rank-003
  constraints:
    - id: candidate-rank-origin-domain
      severity: error
      expression_language: plain
      expression: measure_kind equals ordinal-rank, origin is 0 or 1, and measure_value is an integer greater than or equal to origin
      explanation:
        zh: 排名必须声明零基或一基约定，且位置不得早于约定起点。
        en: A rank must declare a zero- or one-based convention and its position cannot precede that origin.
        ja: 順位は zero-based・one-based 規約を宣言し、位置は起点より前になってはいけません。
      source_claims:
        - claim-candidate-rank-004
  required_relations: []
examples:
  - id: CandidateRank-example-markdown-first
    labels:
      zh: Markdown 第一名
      en: Markdown first rank
      ja: Markdown 1位
    descriptions:
      zh: dres-101-1 CandidateRank rank=1 architecture.md。
      en: dres-101-1 CandidateRank rank=1 architecture.md.
      ja: rank 1。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: rank
    field_values:
      rank: 1
    related_node_ids:
      - CandidateRank
      - DiscoveryResult
    related_relation_ids: []
    source_claims:
      - claim-crank-design
  - id: CandidateRank-example-cross-session
    labels:
      zh: 跨 session 不同 rank
      en: Different rank across sessions
      ja: session 横断 rank 差
    descriptions:
      zh: architecture.md disc-101 rank=1 vs disc-220 rank=3 分别记录。
      en: architecture.md disc-101 rank=1 vs disc-220 rank=3 recorded separately.
      ja: cross-session rank。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: cross-session
    field_values: {}
    related_node_ids:
      - CandidateRank
    related_relation_ids: []
    source_claims:
      - claim-crank-design
  - id: CandidateRank-example-not-index-ordinal
    labels:
      zh: 非 Index ordinal
      en: Not Index ordinal
      ja: Index ordinal ではない
    descriptions:
      zh: CandidateRank 不是 IndexEntry 永久 ordinal。
      en: CandidateRank is not permanent IndexEntry ordinal.
      ja: ≠IndexEntry ordinal。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - CandidateRank
    related_relation_ids: []
    source_claims:
      - claim-crank-design
parent_relation:
  id: CandidateRank-is_a-DiscoveryMeasure
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是发现度量
    en: is a discovery measure
    ja: 発見測定である
  definitions:
    zh: 候选位次是发现度量的一种：它用第一、第二等序数位置表达候选在一次有序发现输出中的相对位置，但不承诺任何数值距离或相关性尺度。
    en: CandidateRank is a DiscoveryMeasure whose differentia is an ordinal position inside one ordered discovery output; it measures order without asserting numeric distance or relevance magnitude.
    ja: 候補順位は発見測定の一種であり、一つの順序付き発見出力における序数位置を表しますが、数値的距離や関連度の大きさは主張しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 这是类型包含关系；每个候选位次都按定义属于发现度量，而不是运行时对象之间可计数的连接。
    en: "This is type inclusion: every CandidateRank is classified as a DiscoveryMeasure, not counted as a runtime association."
    ja: これは型包含であり、各候補順位を発見測定に分類するもので、実行時関連の個数ではありません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有子类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CandidateRank-is_a-DiscoveryMeasure-example-positive-001
      labels:
        zh: 排序输出中的序数度量
        en: Ordinal measure in ranked output
        ja: 順位付き出力の序数測定
      descriptions:
        zh: 检索器返回五个文档，文档 d-42 的 rank=2；该值只说明它排在第二位，因此是 CandidateRank，也是 DiscoveryMeasure。
        en: A retriever returns five documents and d-42 has rank 2. Because the value states second place rather than a score magnitude, it is both CandidateRank and DiscoveryMeasure.
        ja: 検索器が五つの文書を返し、d-42 の rank は 2 です。値はスコア量ではなく二位を示すため、候補順位であり発見測定でもあります。
      field_values:
        rank: 2
      related_node_ids:
        - CandidateRank
        - DiscoveryMeasure
      related_relation_ids:
        - CandidateRank-is_a-DiscoveryMeasure
      source_claims:
        - claim-candidate-rank-010
    - id: CandidateRank-is_a-DiscoveryMeasure-example-boundary-001
      labels:
        zh: 分数不是候选位次
        en: A score is not candidate rank
        ja: スコアは候補順位ではない
      descriptions:
        zh: 文档携带 score=0.82，但没有排序位置；它可以是 DiscoveryScore，却不能仅凭该数值归为 CandidateRank。
        en: A document carries score 0.82 but no ordered position. It may be a DiscoveryScore, yet that magnitude alone does not make it CandidateRank.
        ja: 文書には score 0.82 がありますが順位位置はありません。発見スコアにはなり得ますが、その大きさだけで候補順位にはなりません。
      field_values:
        score: 0.82
      related_node_ids:
        - CandidateRank
        - DiscoveryMeasure
        - DiscoveryScore
      related_relation_ids:
        - CandidateRank-is_a-DiscoveryMeasure
      source_claims:
        - claim-candidate-rank-011
  source_claims:
    - claim-candidate-rank-012
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-candidate-rank-001
    source: eng-fw-haystack-repo
    supports: Haystack's DocumentMRREvaluator derives reciprocal rank from the first matching document's enumerated position, supporting CandidateRank as a run-local ordinal observation. CandidateRank's ownership and parent DiscoveryMeasure are Moonweave ontology decisions.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > enumerate and rank + 1
    evidence_kind: design-inference
    confidence: medium
  - id: claim-candidate-rank-002
    source: eng-fw-haystack-repo
    supports: Haystack's MetaFieldRanker distinguishes document order from the underlying score and supports explicit ascending or descending ranking conventions.
    locator: haystack/components/rankers/meta_field.py > MetaFieldRanker.__init__ and run > sort_order
    evidence_kind: design-inference
    confidence: medium
  - id: claim-candidate-rank-003
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack enumerates retrieved documents from a zero-based index and adds one when deriving reciprocal rank. Moonweave design inference: origin states whether inherited measure_value is zero- or one-based and prevents off-by-one ambiguity."
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > rank + 1
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-rank-004
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack's rank + 1 calculation distinguishes zero-based enumeration from one-based rank. Moonweave design inference: CandidateRank requires inherited measure_kind=ordinal-rank and an integer measure_value no earlier than origin."
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > enumerate and rank + 1
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-rank-005
    source: eng-fw-haystack-repo
    supports: Haystack's MRR evaluator enumerates retrieved documents and derives reciprocal rank from rank + 1, directly supporting a run-local ordinal position distinct from a score.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > enumerate(retrieved)
    evidence_kind: design-inference
    confidence: medium
  - id: claim-candidate-rank-006
    source: eng-fw-haystack-repo
    supports: MetaFieldRanker sorts documents in an explicitly selected ascending or descending order before returning top-k documents, supporting the recorded ordering basis in this example.
    locator: haystack/components/rankers/meta_field.py > MetaFieldRanker.run > sort_order and sorted_documents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-candidate-rank-007
    source: eng-fw-haystack-repo
    supports: Haystack Document defines score as a float used for ranking and usually assigned by retrievers; the field is not itself an ordinal list position.
    locator: haystack/dataclasses/document.py > Document > score field documentation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-candidate-rank-008
    source: eng-fw-haystack-repo
    supports: DocumentMRREvaluator computes reciprocal rank from the enumerated result position, demonstrating that rank requires an ordered retrieved list rather than a standalone score.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > reciprocal_rank
    evidence_kind: design-inference
    confidence: medium
  - id: claim-candidate-rank-009
    source: eng-fw-haystack-repo
    supports: Haystack's MetaFieldRanker returns documents in a new sorted order and its MRR evaluator interprets positions using rank + 1; this supports the instance's declared one-based ordinal semantics.
    locator: haystack/components/rankers/meta_field.py > MetaFieldRanker.run; haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-rank-010
    source: eng-fw-haystack-repo
    supports: Haystack's DocumentMRREvaluator computes reciprocal rank from the position of the first relevant document, supporting CandidateRank as an ordinal discovery measurement.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > reciprocal_rank
    evidence_kind: official
    confidence: high
  - id: claim-candidate-rank-011
    source: eng-fw-haystack-repo
    supports: Haystack represents a document score separately from the position used by reciprocal-rank evaluation, supporting the score-versus-rank boundary.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > reciprocal_rank
    evidence_kind: official
    confidence: high
  - id: claim-candidate-rank-012
    source: eng-fw-haystack-repo
    supports: The evaluator's use of a relevant document's ordered position justifies classifying CandidateRank under the broader DiscoveryMeasure abstraction; the taxonomy edge itself is a Moonweave ontology decision.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > reciprocal_rank
    evidence_kind: design-inference
    confidence: high
  - id: claim-crank-design
    source: src-info-indexing-design
    supports: CandidateRank is a session-local ordered position observation.
    locator: CandidateRank
    evidence_kind: design-inference
    confidence: high
