schema: moonweave.ai/ontology-node/v1
id: CandidateRank
kind: concept
status: accepted
labels:
  zh: 候选排名
  en: candidate rank
  ja: 候補順位
semantics:
  short_definition:
    zh: 候选排名是一次发现运行中分配给某个候选的序位位置观测。
    en: Candidate rank is the ordinal position assigned to one candidate within one discovery run.
    ja: 候補順位は、一回の発見実行で一つの候補に割り当てられた順序位置の観測です。
  definition:
    zh: 候选排名是发现度量的一种：它把声明了起始约定和排序依据的序位位置绑定到同一次发现运行中的一个候选。它回答候选排在第几位，不表达相关性强度，也不能脱离运行与排序约定进行比较。
    en: CandidateRank is a DiscoveryMeasure that binds an ordinal position, with a declared origin and ordering basis, to one candidate in one discovery run. It answers where the candidate appears in an ordered list; it is not a relevance score and cannot be compared without the run and ranking convention.
    ja: CandidateRank は DiscoveryMeasure の一種で、起点規約と並べ替え根拠を明示した順序位置を、一回の発見実行における一つの候補へ結び付けます。候補が何番目かを表し、関連度の強さではなく、実行と順位規約なしには比較できません。
  why_needed:
    zh: 独立建模排名可以说明候选顺序来自哪次运行、哪种排序方法以及采用零基还是一基约定，并防止把相关性得分、候选对象或最终上下文槽位误当成排名。
    en: A separate rank concept records the run, ordering method, and zero- or one-based convention, preventing a relevance score, the candidate itself, or a final context-slot position from being mistaken for the candidate's discovery rank.
    ja: 順位を独立概念にすることで、どの実行・並べ替え方法・ゼロ始まりまたは一始まり規約による位置かを記録し、関連度スコア、候補自体、最終コンテキストスロット位置との混同を防ぎます。
  includes:
    - zh: 纳入绑定候选和发现运行、记录整数序位并声明排序依据及起始约定的排名观测。
      en: Includes integer ordinal observations bound to a candidate and discovery run with an explicit ordering basis and index origin.
      ja: 候補と発見実行に結び付き、整数の順序位置、並べ替え根拠、起点規約を明示する順位観測を含みます。
  excludes:
    - zh: 排除相关性得分、相似度、置信度、MRR 等跨查询聚合指标、候选对象本身以及最终上下文中的槽位顺序。
      en: Excludes relevance scores, similarities, confidence values, cross-query aggregates such as MRR, the candidate object itself, and final context-slot order.
      ja: 関連度スコア、類似度、信頼度、MRR のようなクエリ横断集計、候補自体、最終コンテキストのスロット順を除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: origin
      labels:
        zh: 排名起点
        en: rank origin
        ja: 順位起点
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 position 采用零基还是一基解释；允许值为 0 或 1，避免跨实现产生一位偏差。
        en: Declares whether position is zero- or one-based; permitted values are 0 and 1 so implementations do not introduce an off-by-one ambiguity.
        ja: position を zero-based または one-based のどちらで解釈するか示し、許容値を 0・1 に限定して off-by-one の曖昧さを防ぎます。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-candidate-rank-003
  constraints:
    - id: candidate-rank-origin-domain
      severity: error
      expression_language: plain
      expression: measure_kind equals ordinal-rank, origin is 0 or 1, and measure_value is an integer greater than or equal to origin
      explanations:
        zh: 排名必须声明零基或一基约定，且位置不得早于约定起点。
        en: A rank must declare a zero- or one-based convention and its position cannot precede that origin.
        ja: 順位は zero-based・one-based 規約を宣言し、位置は起点より前になってはいけません。
      source_claims:
        - claim-candidate-rank-004
  required_relation_constraints: []
examples:
  - id: CandidateRank-example-positive-001
    kind: positive
    labels:
      zh: 候选排名观测正例
      en: Positive example of candidate rank observation
      ja: 候補順位観測の正例
    scenario_id: null
    descriptions:
      zh: 发现运行 disc-42 按 BM25 得分降序返回发现结果 discovery-result-source-17，并用一基约定记录其排名为 2。
      en: Discovery run disc-42 orders results by descending BM25 score and records discovery-result-source-17 at one-based rank 2.
      ja: 発見実行 disc-42 は BM25 スコア降順で結果を並べ、discovery-result-source-17 を一始まり順位 2 と記録します。
    field_values:
      measure_id: measure-disc-42-source-17-rank
      discovery_run_ref: discovery-run:disc-42
      candidate_ref: discovery-result:source-17
      measure_kind: ordinal-rank
      measure_value: 2
      interpretation_ref: ranking-method:bm25-descending@2
      observed_at: 2026-07-17T01:03:00Z
      origin: 1
    related_node_ids:
      - CandidateRank
      - DiscoveryResult
    related_relation_ids:
      - DiscoveryResult-ranked_at-CandidateRank
    expected_result:
      zh: 该记录归类为 CandidateRank，并且只在 disc-42 的一基排序中解释为第二位。
      en: The record is a CandidateRank and means second place only within disc-42 under its one-based convention.
      ja: この記録は CandidateRank であり、disc-42 の一始まり規約内でのみ第 2 位を意味します。
    why_valid_or_invalid:
      zh: 它同时给出候选、运行、整数位置、起点和排序依据，具备判定排名所需的全部语境。
      en: It supplies the candidate, run, integer position, origin, and ordering basis required to interpret an ordinal rank.
      ja: 候補、実行、整数位置、起点、並べ替え根拠がそろい、順序順位を解釈できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-rank-005
      - claim-candidate-rank-006
  - id: CandidateRank-example-boundary-001
    kind: boundary
    labels:
      zh: 候选排名观测边界例
      en: Boundary case for candidate rank observation
      ja: 候補順位観測の境界例
    scenario_id: null
    descriptions:
      zh: 发现结果 discovery-result-source-17 带有 BM25 得分 7.41，但记录没有候选列表、序位位置或零基/一基约定。
      en: Discovery result discovery-result-source-17 has a BM25 score of 7.41, but the record has no candidate list, ordinal position, or zero-/one-based convention.
      ja: 発見結果 discovery-result-source-17 には BM25 スコア 7.41 がありますが、候補一覧、順序位置、ゼロ始まり／一始まり規約がありません。
    field_values: {}
    related_node_ids:
      - CandidateRank
      - DiscoveryResult
    related_relation_ids:
      - DiscoveryResult-ranked_at-CandidateRank
    expected_result:
      zh: 7.41 应归为 DiscoveryScore 或 SearchScore；不得推断 CandidateRank。
      en: The value 7.41 may be a DiscoveryScore or SearchScore, but it is not a CandidateRank.
      ja: 7.41 は DiscoveryScore または SearchScore になり得ますが、CandidateRank ではありません。
    why_valid_or_invalid:
      zh: 得分表示方法相关的标量强度；排名表示有序列表中的位置，两者不能仅凭一个数值互换。
      en: A score expresses method-dependent scalar strength, whereas rank expresses list position; one numeric value cannot establish both.
      ja: スコアは方法依存の尺度強度、順位は一覧内の位置を表すため、一つの数値だけで両者を同一視できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-rank-007
      - claim-candidate-rank-008
  - id: CandidateRank-example-instance-001
    kind: instance
    labels:
      zh: 候选排名实例
      en: Candidate-rank instance
      ja: 候補順位インスタンス
    scenario_id: null
    descriptions:
      zh: 度量 measure-disc-77-doc-9-rank 把 discovery-run:disc-77 中的 discovery-result:doc-9 绑定到序位值 3，并通过 ranking-method:reranker-descending@1 声明一基降序重排约定。
      en: Measure measure-disc-77-doc-9-rank binds discovery-result:doc-9 in discovery-run:disc-77 to ordinal value 3 and declares the one-based descending-reranker convention through ranking-method:reranker-descending@1.
      ja: 測定 measure-disc-77-doc-9-rank は discovery-run:disc-77 の discovery-result:doc-9 を序数値 3 に結び、ranking-method:reranker-descending@1 で一始まり降順再順位付け規約を宣言します。
    field_values:
      measure_id: measure-disc-77-doc-9-rank
      discovery_run_ref: discovery-run:disc-77
      candidate_ref: discovery-result:doc-9
      measure_kind: ordinal-rank
      measure_value: 3
      interpretation_ref: ranking-method:reranker-descending@1
      observed_at: 2026-07-17T01:03:00Z
      origin: 1
    related_node_ids:
      - CandidateRank
      - DiscoveryMeasure
    related_relation_ids:
      - CandidateRank-is_a-DiscoveryMeasure
    expected_result:
      zh: 该对象被识别为一项候选排名，而不是得分或候选实体。
      en: The object is identified as a CandidateRank, not as a score or candidate entity.
      ja: この対象はスコアや候補実体ではなく CandidateRank と識別されます。
    why_valid_or_invalid:
      zh: 实例复用 DiscoveryMeasure 的稳定标识、运行、候选、种类、数值、解释约定和观测时间字段，只在 CandidateRank 上增加起点；没有重复声明父类字段。
      en: The instance reuses DiscoveryMeasure's stable identity, run, candidate, kind, value, interpretation, and observation-time fields and adds only the rank origin on CandidateRank; it does not redeclare inherited fields.
      ja: この例は DiscoveryMeasure の安定識別、実行、候補、種別、値、解釈規約、観測時刻を再利用し、CandidateRank では順位起点だけを追加して、継承フィールドを再宣言しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-candidate-rank-009
