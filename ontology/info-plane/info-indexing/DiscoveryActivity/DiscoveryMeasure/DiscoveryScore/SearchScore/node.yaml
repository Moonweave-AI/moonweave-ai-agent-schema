labels:
  zh: 搜索评分
  en: search score
  ja: 検索評価値
semantics:
  short_definition:
    zh: 搜索评分是搜索匹配方法为一个搜索结果产生的发现评分。
    en: A search score is a DiscoveryScore produced for a SearchResult by a search-matching method.
    ja: 検索スコアは、検索照合方式が SearchResult に対して生成する DiscoveryScore です。
  definition:
    zh: SearchScore 是 DiscoveryScore 的一种：它将 BM25、向量相似度、混合搜索或搜索重排方法产生的数值绑定到 SearchResult 和同一次搜索运行。其解释依赖方法、缩放设置与“越大越好”等方向约定；它 is not an ordinal rank，列表第几位必须另记为 CandidateRank。
    en: SearchScore is a kind of DiscoveryScore binding a value produced by BM25, vector similarity, hybrid search, or search reranking to a SearchResult and one search run. Its interpretation depends on method, scaling configuration, and direction such as higher-is-better; it is not an ordinal rank, so list position must be represented separately as CandidateRank.
    ja: SearchScore は DiscoveryScore の一種で、BM25、ベクトル類似度、ハイブリッド検索、検索再順位が生成した値を SearchResult と一回の検索実行へ結び付けます。解釈は方式、スケーリング、値方向に依存し、序数順位ではないため一覧位置は CandidateRank で別記します。
  why_needed:
    zh: 该概念让搜索结果保留可解释的匹配信号，并防止把不同搜索器的原始值或列表位置直接比较；调试排序变化时可以分别检查分数生成与排名生成。
    en: The concept preserves an interpretable matching signal for a search result and prevents raw values from different searchers—or list positions—from being compared directly; score generation and rank generation can be debugged separately.
    ja: 検索結果の解釈可能な照合信号を保持し、異なる検索器の生値や一覧位置の直接比較を防ぎます。順位変化の診断でスコア生成と順位生成を別々に確認できます。
  includes:
    - zh: 纳入与搜索结果、搜索运行和搜索方法绑定的 BM25 分数、向量相似度、混合分数及搜索重排分数，并声明数值解释方向。
      en: Includes BM25 scores, vector similarities, hybrid scores, and search-reranker scores bound to a SearchResult, search run, and search method, with declared numeric direction.
      ja: SearchResult、検索実行、検索方式に結び付いた BM25、ベクトル類似度、混合、検索再順位スコアを含み、数値方向を宣言します。
  excludes:
    - zh: 排除 CandidateRank 的序位数字、没有搜索方法或结果绑定的浮点值、生成于非搜索发现活动的 DiscoveryScore，以及包含候选内容的 SearchResult。
      en: Excludes the ordinal number of CandidateRank, a float without search-method or result binding, a DiscoveryScore produced by a non-search discovery activity, and the SearchResult carrying candidate content.
      ja: CandidateRank の序数、検索方式・結果に結び付かない数値、非検索発見活動が生成した DiscoveryScore、候補内容を持つ SearchResult を除外します。
