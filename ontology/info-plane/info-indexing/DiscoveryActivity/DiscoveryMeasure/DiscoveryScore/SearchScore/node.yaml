schema: moonweave.ai/ontology-node/v1
id: SearchScore
kind: concept
labels:
  zh: 搜索评分
  en: search score
  ja: 検索評価値
semantics:
  short_definition:
    zh: 查询匹配方法产生的 DiscoveryScore 特化。
    en: DiscoveryScore specialization produced by a query-matching method.
    ja: query matching method が生成する DiscoveryScore 特化。
  definition:
    zh: SearchScore 记录 semantic_similarity、bm25、hybrid 等方法的数值与尺度；仅 attach 到 SearchResult。
    en: SearchScore records numeric value and scale for semantic_similarity, bm25, hybrid methods; attaches only to SearchResult.
    ja: query-match score specialization。
  why_needed:
    zh: 区分搜索分数与其他 discovery 度量（如 list 顺序无 score）。
    en: Separates search scores from other discovery measures such as list order without score.
    ja: search-specific score。
  includes:
    - zh: score_method、score_value、score_scale。
      en: score_method, score_value, score_scale.
      ja: method/value/scale。
  excludes:
    - zh: 非 SearchResult 的 DiscoveryResult、CandidateRank。
      en: DiscoveryResults that are not SearchResult and CandidateRank.
      ja: non-SearchResult/rank。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: middleware.ts hit SearchScore=0.91 method=semantic_similarity；BM25 chunk hit SearchScore=12.4 method=bm25。
    en: middleware.ts hit SearchScore=0.91 method=semantic_similarity; BM25 chunk hit SearchScore=12.4 method=bm25.
    ja: semantic vs bm25 SearchScore。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
