examples:
  - id: SearchScore-example-positive-001
    kind: positive
    labels:
      zh: 搜索评分正例
      en: Positive example of search score
      ja: 検索評価値の正例
    scenario_id: null
    descriptions:
      zh: InMemoryBM25Retriever 为查询“退款期限”返回的 search-result-policy-17 分配 score=0.812，并记录 scale_score=false 与 higher-is-better 解释。
      en: InMemoryBM25Retriever assigns score 0.812 to search-result-policy-17 for query 'refund deadline' and records scale_score=false with a higher-is-better interpretation.
      ja: InMemoryBM25Retriever が「返金期限」の search-result-policy-17 に score=0.812 を割り当て、scale_score=false と higher-is-better 解釈を記録します。
    field_values:
      measure_id: measure-search-204-result-policy-17
      discovery_run_ref: discovery-run:search-204
      candidate_ref: search-result:policy-17
      measure_kind: numeric-score
      measure_value: 0.812
      interpretation_ref: search-method:in-memory-bm25:unscaled-higher-is-better@1
      observed_at: 2026-07-17T01:02:03Z
    related_node_ids:
      - SearchScore
      - SearchResult
    related_relation_ids:
      - SearchResult-scored_by-SearchScore
    expected_result:
      zh: 0.812 被识别为该 SearchResult 的 SearchScore，并保留 BM25 方法与缩放配置。
      en: The value 0.812 is classified as the SearchScore of that SearchResult with its BM25 method and scaling configuration retained.
      ja: 0.812 はその SearchResult の SearchScore と分類され、BM25 方式とスケーリング設定を保持します。
    why_valid_or_invalid:
      zh: Haystack 的 BM25 retriever 生成并可缩放 Document.score，证明数值解释依赖搜索方法与配置，而不是无上下文浮点值。
      en: Haystack's BM25 retriever produces and can scale Document.score, showing that interpretation depends on the search method and configuration rather than on a context-free float.
      ja: Haystack BM25 retriever は Document.score を生成・スケールでき、数値解釈が文脈なし数値ではなく検索方式と設定に依存すると示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-search-score-003
      - claim-search-score-004
  - id: SearchScore-example-boundary-001
    kind: boundary
    labels:
      zh: 搜索评分边界例
      en: Boundary case for search score
      ja: 検索評価値の境界例
    scenario_id: null
    descriptions:
      zh: search-result-policy-17 在返回列表中的位置为 1；该 CandidateRank 来自列表次序，即使写成数字也不是 BM25 搜索评分。
      en: search-result-policy-17 appears at position 1 in the returned list; this CandidateRank comes from list order and is not a BM25 SearchScore even though it is numeric.
      ja: search-result-policy-17 は返却一覧の第 1 位です。この CandidateRank は一覧順序から生じ、数値でも BM25 SearchScore ではありません。
    field_values: {}
    related_node_ids:
      - SearchScore
      - SearchResult
      - RetrievalScore
    related_relation_ids:
      - SearchResult-scored_by-SearchScore
    expected_result:
      zh: 位置 1 被记录为 CandidateRank，不创建 SearchScore=1。
      en: Position 1 is recorded as CandidateRank and no SearchScore=1 is created.
      ja: 位置 1 は CandidateRank として記録され、SearchScore=1 は作成されません。
    why_valid_or_invalid:
      zh: Haystack 的 MRR 评估从枚举位置计算 reciprocal rank，而 Document.score 是独立字段；官方实现明确区分序位与搜索分数。
      en: Haystack's MRR evaluator derives reciprocal rank from enumerated position while Document.score is a separate field, explicitly separating ordinal position from search score.
      ja: Haystack MRR 評価は列挙位置から reciprocal rank を計算し、Document.score は別項目で、序位と検索スコアを明確に分離します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-search-score-005
      - claim-search-score-006
  - id: SearchScore-example-instance-001
    kind: instance
    labels:
      zh: BM25 搜索评分实例
      en: BM25 search-score instance
      ja: BM25 検索スコアインスタンス
    scenario_id: null
    descriptions:
      zh: 评分 search-score-policy-17 保存 value=0.812、method=BM25、scale_score=false、direction=higher-is-better，并关联 search-result-policy-17。
      en: Score search-score-policy-17 stores value=0.812, method=BM25, scale_score=false, direction=higher-is-better, and references search-result-policy-17.
      ja: スコア search-score-policy-17 が value=0.812、method=BM25、scale_score=false、direction=higher-is-better を保存し search-result-policy-17 を参照します。
    field_values:
      value: 0.812
      method: BM25
      scale_score: false
      direction: higher-is-better
    related_node_ids:
      - SearchScore
      - SearchResult
      - DiscoveryScore
    related_relation_ids:
      - SearchResult-scored_by-SearchScore
      - SearchScore-is_a-DiscoveryScore
    expected_result:
      zh: 该实例显示为 DiscoveryScore 下的 SearchScore，并能回到被评分 SearchResult。
      en: The instance appears as SearchScore under DiscoveryScore and resolves back to the scored SearchResult.
      ja: インスタンスは DiscoveryScore 配下の SearchScore として表示され、採点対象 SearchResult へ戻れます。
    why_valid_or_invalid:
      zh: 数值同时绑定搜索方法、缩放配置、解释方向和结果对象，满足搜索评分而非排名位置的完整边界。
      en: The value is bound to search method, scaling configuration, interpretation direction, and result object, satisfying the full search-score boundary rather than an ordinal position.
      ja: 数値が検索方式、スケーリング設定、解釈方向、結果対象に結び付き、順位位置ではない検索スコア境界を満たします。
    synthetic: true
    verified_version: https://github.com/deepset-ai/haystack
    source_claims:
      - claim-search-score-007
