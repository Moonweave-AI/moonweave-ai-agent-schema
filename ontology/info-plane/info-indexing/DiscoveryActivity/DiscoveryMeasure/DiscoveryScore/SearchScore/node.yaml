parent_relation:
  id: SearchScore-is_a-DiscoveryScore
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: SearchScore 是 DiscoveryScore 的专门类型：它由 BM25、向量相似度或重排器等搜索匹配方法附加到 SearchResult，并随方法记录尺度与高低方向；它不是 ordinal rank。
    en: SearchScore is a DiscoveryScore assigned to SearchResult by a search-matching method such as BM25, vector similarity, or reranking, with method-specific scale and direction; it is not an ordinal rank.
    ja: SearchScore は DiscoveryScore の専門型で、BM25・ベクトル類似度・再順位付けなどの検索照合手法が SearchResult に付与し、手法固有の尺度と方向を持ち、序数順位ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SearchScore-is_a-DiscoveryScore-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: BM25Retriever 为查询“retention policy”返回 d-31，并附加 score=8.7、method=bm25、direction=higher-is-better；该值是 SearchScore，也是 DiscoveryScore。
        en: BM25Retriever returns d-31 for “retention policy” with score 8.7, method=bm25, and direction=higher-is-better; the value is SearchScore and therefore DiscoveryScore.
        ja: BM25Retriever が「retention policy」に対して d-31 を score 8.7、method=bm25、direction=higher-is-better 付きで返すため、その値は SearchScore かつ DiscoveryScore です。
      field_values: {}
      related_node_ids:
        - SearchScore
        - DiscoveryScore
      related_relation_ids:
        - SearchScore-is_a-DiscoveryScore
      source_claims:
        - claim-search-score-008
        - claim-search-score-009
    - id: SearchScore-is_a-DiscoveryScore-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 搜索列表把 d-31 标为 rank=2，但没有 score、方法或尺度；该序数是 CandidateRank，不是 SearchScore，即使同一列表中的其他结果有评分。
        en: A search list marks d-31 as rank 2 but records no score, method, or scale. That ordinal is CandidateRank, not SearchScore, even if other results in the list have scores.
        ja: 検索一覧で d-31 が rank 2 とされても score・手法・尺度がなければ、その序数は CandidateRank であり SearchScore ではありません。
      field_values: {}
      related_node_ids:
        - SearchScore
        - DiscoveryScore
      related_relation_ids:
        - SearchScore-is_a-DiscoveryScore
      source_claims:
        - claim-search-score-010
        - claim-search-score-011
  source_claims:
    - claim-search-score-012
    - claim-search-score-013
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-search-score-001
    source: eng-fw-haystack-repo
    supports: Haystack retrievers assign optional Document.score values and BM25 retrieval exposes score scaling, supporting SearchScore as a search-method-specific DiscoveryScore.
    locator: haystack/dataclasses/document.py > Document.score; components/retrievers/in_memory/bm25_retriever.py > scale_score
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-score-002
    source: eng-fw-haystack-repo
    supports: Haystack DocumentMRR calculates reciprocal rank from enumerated positions separately from Document.score, supporting the explicit exclusion of ordinal rank.
    locator: haystack/components/evaluators/document_mrr.py > reciprocal rank; dataclasses/document.py > score
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-score-003
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever.run accepts scale_score and returns scored documents, directly supporting the method- and configuration-bound score in this case.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > run scale_score and returned documents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-score-004
    source: eng-fw-haystack-repo
    supports: Document.score is an optional ranking field usually assigned by a retriever, supporting separate linkage from the SearchResult payload.
    locator: haystack/dataclasses/document.py > Document.score documentation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-score-005
    source: eng-fw-haystack-repo
    supports: DocumentMRR enumerates retrieved documents and computes reciprocal rank from position, directly supporting the ordinal-rank side of the boundary.
    locator: haystack/components/evaluators/document_mrr.py > enumerate retrieved_documents and reciprocal rank
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-score-006
    source: eng-fw-haystack-repo
    supports: Document.score remains a separate optional field from list position, corroborating that CandidateRank must not be coerced into SearchScore.
    locator: haystack/dataclasses/document.py > Document.score; evaluators/document_mrr.py > rank position
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-score-007
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever exposes score scaling and returns scored Documents, directly supporting the BM25 score value and configuration in this instance.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > run scale_score and scoring
    evidence_kind: official
    confidence: high
  - id: claim-search-score-008
    source: eng-fw-haystack-repo
    supports: Haystack BM25Retriever assigns BM25-derived scores to returned Documents, directly grounding the search-method score subtype.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run > document.score
    evidence_kind: official
    confidence: high
  - id: claim-search-score-009
    source: eng-fw-haystack-repo
    supports: Haystack Document defines score as an optional numeric field, supporting a value attached to a returned search document without making it part of document identity.
    locator: haystack/dataclasses/document.py > Document.score
    evidence_kind: official
    confidence: high
  - id: claim-search-score-010
    source: eng-fw-haystack-repo
    supports: Haystack keeps Document.score as a numeric field while reciprocal-rank evaluation derives rank position separately, grounding the score-versus-rank boundary.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > reciprocal_rank
    evidence_kind: official
    confidence: high
  - id: claim-search-score-011
    source: eng-fw-haystack-repo
    supports: DocumentMRREvaluator consumes ranked order independently of the score field, supporting CandidateRank as a sibling measure rather than SearchScore.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run
    evidence_kind: official
    confidence: high
  - id: claim-search-score-012
    source: eng-fw-haystack-repo
    supports: BM25Retriever's score assignment to returned Documents grounds SearchScore as a search-method-specific DiscoveryScore.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > score assignment in run
    evidence_kind: design-inference
    confidence: high
  - id: claim-search-score-013
    source: eng-fw-haystack-repo
    supports: Document.score is a separate optional quality attached to a search result, supporting both the subtype placement and the boundary from ordinal rank.
    locator: haystack/dataclasses/document.py > Document.score
    evidence_kind: design-inference
    confidence: high
  - id: claim-sscore-cursor
    source: src-cursor-search
    supports: Cursor semantic search provides numeric SearchScore on hits.
    locator: semantic search
    evidence_kind: official-doc
    confidence: high
  - id: claim-sscore-design
    source: src-info-indexing-design
    supports: SearchScore attaches only to query-matched SearchResult records.
    locator: SearchScore
    evidence_kind: design-inference
    confidence: high
