source_claims:
  - id: claim-discovery-score-001
    source: eng-fw-haystack-repo
    supports: Haystack defines Document.score as an optional numeric ranking field usually assigned by a retriever, supporting a candidate-bound score observation while leaving scale semantics method-specific.
    locator: haystack/dataclasses/document.py > Document.score documentation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-score-002
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex NodeWithScore explicitly models an optional float score attached to a node, independently supporting DiscoveryScore as a measurement separate from the candidate artifact itself.
    locator: llama-index-core/llama_index/core/schema.py > NodeWithScore
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-score-003
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack defines Document.score as a floating-point score assigned by retrievers, whereas DocumentMRREvaluator derives rank from list position. Moonweave design inference: DiscoveryScore fixes inherited measure_kind to numeric-score and rejects ordinal-rank semantics."
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > enumerate and rank + 1
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-discovery-score-004
    source: eng-fw-haystack-repo
    supports: Haystack Document defines score as an optional numeric field used for ranking and notes that retrievers typically assign it, supporting a method-bound candidate score.
    locator: haystack/dataclasses/document.py > Document.score documentation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-score-005
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever computes retrieval results and can scale their scores, showing that numeric interpretation depends on the producing retrieval method and configuration.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > run and scale_score
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-score-006
    source: eng-fw-haystack-repo
    supports: DocumentMRR derives reciprocal rank from the enumerated result position rather than from Document.score, directly supporting the score-versus-rank boundary.
    locator: haystack/components/evaluators/document_mrr.py > enumerated retrieved_documents and reciprocal rank calculation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-score-007
    source: eng-fw-haystack-repo
    supports: Haystack keeps Document.score as a distinct field, corroborating that list position and score are separate observations.
    locator: haystack/dataclasses/document.py > Document.score; evaluators/document_mrr.py > rank enumeration
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-score-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex NodeWithScore contains a node and optional float score, directly supporting the concrete node-score binding used in this instance.
    locator: llama-index-core/llama_index/core/schema.py > NodeWithScore.node and score
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-discovery-score-009
    source: eng-fw-haystack-repo
    supports: Haystack BM25Retriever assigns retriever-produced scores to returned Documents, supporting method-scoped discovery magnitudes.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run > document.score
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-discovery-score-010
    source: eng-fw-haystack-repo
    supports: Haystack stores retriever score on Document while rank metrics derive position separately, supporting distinct score and rank subtypes of a broader measure.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > reciprocal_rank
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-discovery-score-011
    source: eng-fw-haystack-repo
    supports: Retriever-assigned Document.score grounds DiscoveryScore as a measurable output of discovery; Moonweave supplies the shared DiscoveryMeasure genus and explicit scale boundary.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/retrievers/in_memory/bm25_retriever.py > run
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
