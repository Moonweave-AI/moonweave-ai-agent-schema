schema: moonweave.ai/ontology-node/v1
id: DiscoveryScore
kind: concept
labels:
  zh: 发现评分
  en: discovery score
  ja: 発見スコア
semantics:
  short_definition:
    zh: 带方法与尺度的当次相关性分数观测上位概念。
    en: Supertype for session-local relevance score observations with method and scale.
    ja: 方法と尺度を伴う session-local 関連 score 観測の上位概念。
  definition:
    zh: DiscoveryScore 子类 SearchScore 记录 semantic similarity、BM25 等；不得与 embedding 向量或持久 fusion score 混同。
    en: DiscoveryScore subtype SearchScore records semantic similarity, BM25, etc.; must not be conflated with embedding vectors or durable fusion scores.
    ja: SearchScore subtype for query relevance。
  why_needed:
    zh: 分数类型化使审计能说明“0.94 semantic similarity 而非持久 index score”。
    en: Typing scores lets audit explain 0.94 semantic similarity versus durable index score.
    ja: score method+scale audit。
  includes:
    - zh: score_value、score_method、score_scale、discovery_activity_id。
      en: score_value, score_method, score_scale, discovery_activity_id.
      ja: value/method/scale/activity。
  excludes:
    - zh: embedding vector、Index shard statistics。
      en: Embedding vectors and Index shard statistics.
      ja: embedding/index stats。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: SearchScore method=semantic_similarity value=0.94 scale=0..1 绑定 dres-101-1。
    en: SearchScore method=semantic_similarity value=0.94 scale=0..1 bound to dres-101-1.
    ja: semantic similarity score。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: discovery-score-numeric-kind-boundary
      severity: error
      expression_language: plain
      expression: measure_kind equals numeric-score and measure_value is finite; interpretation_ref identifies the producing scoring method, scale, and direction
      explanation:
        zh: DiscoveryScore 必须是有限数值评分，并引用产生它的方法、尺度和方向；序位值属于 CandidateRank。
        en: DiscoveryScore is a finite numeric score with its producing method, scale, and direction identified; ordinal values belong to CandidateRank.
        ja: DiscoveryScore は生成方式・尺度・方向を識別した有限数値スコアで、序数値は CandidateRank に属します。
      source_claims:
        - claim-discovery-score-003
  required_relations: []
examples:
  - id: DiscoveryScore-example-semantic
    labels:
      zh: 语义相似度
      en: Semantic similarity
      ja: semantic similarity
    descriptions:
      zh: SearchScore 0.94 semantic_similarity 绑定 middleware.ts 命中。
      en: SearchScore 0.94 semantic_similarity bound to middleware.ts hit.
      ja: semantic score。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: semantic
    field_values:
      score_value: 0.94
      score_method: semantic_similarity
    related_node_ids:
      - DiscoveryScore
      - SearchScore
    related_relation_ids: []
    source_claims:
      - claim-dscore-cursor
  - id: DiscoveryScore-example-bm25
    labels:
      zh: BM25 分数
      en: BM25 score
      ja: BM25 score
    descriptions:
      zh: RAG lexical SearchScore method=bm25 value=12.4。
      en: RAG lexical SearchScore method=bm25 value=12.4.
      ja: BM25 score。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: bm25
    field_values: {}
    related_node_ids:
      - DiscoveryScore
      - SearchScore
    related_relation_ids: []
    source_claims:
      - claim-dscore-design
  - id: DiscoveryScore-example-optional
    labels:
      zh: 可选分数
      en: Optional score
      ja: optional score
    descriptions:
      zh: prompts/list 候选可无 DiscoveryScore。
      en: prompts/list candidates may lack DiscoveryScore.
      ja: score optional。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: prompts/list
    field_values: {}
    related_node_ids:
      - DiscoveryScore
    related_relation_ids: []
    source_claims:
      - claim-dscore-design
parent_relation:
  id: DiscoveryScore-is_a-DiscoveryMeasure
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是发现度量
    en: is a discovery measure
    ja: 発見測定である
  definitions:
    zh: 发现评分是发现度量的一种，其限定差是用检索器或排序器定义的方法、尺度和方向解释一个数值量；该数值不能脱离产生它的方法与候选集合比较。
    en: DiscoveryScore is a DiscoveryMeasure whose differentia is a numeric magnitude interpreted under a named retriever or ranker method, scale, and direction; the value is not comparable outside that method and candidate population by default.
    ja: 発見スコアは発見測定の一種であり、検索器または順位器が定めた手法・尺度・方向で数値量を解釈します。値は既定ではその手法と候補母集団の外で比較できません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 类型包含不限制一个候选可附带多少个不同方法的评分。
    en: Type inclusion does not limit how many method-specific scores a candidate may carry.
    ja: 型包含は候補が保持できる手法別スコア数を制限しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有子类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DiscoveryScore-is_a-DiscoveryMeasure-example-positive-001
      labels:
        zh: BM25 方法内评分
        en: BM25 method-scoped score
        ja: BM25 手法内スコア
      descriptions:
        zh: BM25Retriever 为文档 d-17 产生 score=12.4，并记录 score_method=bm25；该数值是 DiscoveryScore，因而也是 DiscoveryMeasure。
        en: BM25Retriever assigns d-17 score 12.4 with score_method=bm25. This method-scoped magnitude is a DiscoveryScore and therefore a DiscoveryMeasure.
        ja: BM25Retriever が d-17 に score 12.4 と score_method=bm25 を付けます。この手法内の量は発見スコアであり発見測定でもあります。
      field_values:
        score: 12.4
        score_method: bm25
      related_node_ids:
        - DiscoveryScore
        - DiscoveryMeasure
      related_relation_ids:
        - DiscoveryScore-is_a-DiscoveryMeasure
      source_claims:
        - claim-discovery-score-009
    - id: DiscoveryScore-is_a-DiscoveryMeasure-example-boundary-001
      labels:
        zh: 序数位置不等于评分
        en: Ordinal position is not a score
        ja: 序数位置はスコアではない
      descriptions:
        zh: 候选仅记录 rank=3，没有评分方法或数值尺度；它是 CandidateRank 和 DiscoveryMeasure，但不是 DiscoveryScore。
        en: A candidate records only rank 3 with no scoring method or numeric scale. It is CandidateRank and DiscoveryMeasure, but not DiscoveryScore.
        ja: 候補は rank 3 だけを記録し、採点手法や数値尺度がありません。候補順位かつ発見測定ですが発見スコアではありません。
      field_values:
        rank: 3
      related_node_ids:
        - DiscoveryScore
        - DiscoveryMeasure
        - CandidateRank
      related_relation_ids:
        - DiscoveryScore-is_a-DiscoveryMeasure
      source_claims:
        - claim-discovery-score-010
  source_claims:
    - claim-discovery-score-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-discovery-score-001
    source: eng-fw-haystack-repo
    supports: Haystack defines Document.score as an optional numeric ranking field usually assigned by a retriever, supporting a candidate-bound score observation while leaving scale semantics method-specific.
    locator: haystack/dataclasses/document.py > Document.score documentation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-score-002
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex NodeWithScore explicitly models an optional float score attached to a node, independently supporting DiscoveryScore as a measurement separate from the candidate artifact itself.
    locator: llama-index-core/llama_index/core/schema.py > NodeWithScore
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-score-003
    source: eng-fw-haystack-repo
    supports: "Direct source premise: Haystack defines Document.score as a floating-point score assigned by retrievers, whereas DocumentMRREvaluator derives rank from list position. Moonweave design inference: DiscoveryScore fixes inherited measure_kind to numeric-score and rejects ordinal-rank semantics."
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > enumerate and rank + 1
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-score-004
    source: eng-fw-haystack-repo
    supports: Haystack Document defines score as an optional numeric field used for ranking and notes that retrievers typically assign it, supporting a method-bound candidate score.
    locator: haystack/dataclasses/document.py > Document.score documentation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-score-005
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever computes retrieval results and can scale their scores, showing that numeric interpretation depends on the producing retrieval method and configuration.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > run and scale_score
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-score-006
    source: eng-fw-haystack-repo
    supports: DocumentMRR derives reciprocal rank from the enumerated result position rather than from Document.score, directly supporting the score-versus-rank boundary.
    locator: haystack/components/evaluators/document_mrr.py > enumerated retrieved_documents and reciprocal rank calculation
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-score-007
    source: eng-fw-haystack-repo
    supports: Haystack keeps Document.score as a distinct field, corroborating that list position and score are separate observations.
    locator: haystack/dataclasses/document.py > Document.score; evaluators/document_mrr.py > rank enumeration
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-score-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex NodeWithScore contains a node and optional float score, directly supporting the concrete node-score binding used in this instance.
    locator: llama-index-core/llama_index/core/schema.py > NodeWithScore.node and score
    evidence_kind: official
    confidence: high
  - id: claim-discovery-score-009
    source: eng-fw-haystack-repo
    supports: Haystack BM25Retriever assigns retriever-produced scores to returned Documents, supporting method-scoped discovery magnitudes.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run > document.score
    evidence_kind: official
    confidence: high
  - id: claim-discovery-score-010
    source: eng-fw-haystack-repo
    supports: Haystack stores retriever score on Document while rank metrics derive position separately, supporting distinct score and rank subtypes of a broader measure.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > reciprocal_rank
    evidence_kind: official
    confidence: high
  - id: claim-discovery-score-011
    source: eng-fw-haystack-repo
    supports: Retriever-assigned Document.score grounds DiscoveryScore as a measurable output of discovery; Moonweave supplies the shared DiscoveryMeasure genus and explicit scale boundary.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/retrievers/in_memory/bm25_retriever.py > run
    evidence_kind: design-inference
    confidence: high
  - id: claim-dscore-cursor
    source: src-cursor-search
    supports: Cursor semantic hits carry numeric similarity scores as SearchScore observations.
    locator: semantic search
    evidence_kind: official-doc
    confidence: high
  - id: claim-dscore-design
    source: src-info-indexing-design
    supports: DiscoveryScore records session-local relevance with explicit method and scale.
    locator: DiscoveryScore
    evidence_kind: design-inference
    confidence: high
