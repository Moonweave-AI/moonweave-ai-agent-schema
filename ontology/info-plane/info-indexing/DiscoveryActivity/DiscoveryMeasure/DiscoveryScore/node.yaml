parent_relation:
  id: DiscoveryScore-is_a-DiscoveryMeasure
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是发现度量
    en: is a discovery measure
    ja: 発見測定である
  definitions:
    zh: 发现评分是发现度量的一种，其限定差是用检索器或排序器定义的方法、尺度和方向解释一个数值量；该数值不能脱离产生它的方法与候选集合比较。
    en: DiscoveryScore is a DiscoveryMeasure whose differentia is a numeric magnitude interpreted under a named retriever or ranker method, scale, and direction; the value is not comparable outside that method and candidate population by default.
    ja: 発見スコアは発見測定の一種であり、検索器または順位器が定めた手法・尺度・方向で数値量を解釈します。値は既定ではその手法と候補母集団の外で比較できません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 类型包含不限制一个候选可附带多少个不同方法的评分。
    en: Type inclusion does not limit how many method-specific scores a candidate may carry.
    ja: 型包含は候補が保持できる手法別スコア数を制限しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有子类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DiscoveryScore-is_a-DiscoveryMeasure-example-positive-001
      kind: positive
      labels:
        zh: BM25 方法内评分
        en: BM25 method-scoped score
        ja: BM25 手法内スコア
      scenario_id: null
      descriptions:
        zh: BM25Retriever 为文档 d-17 产生 score=12.4，并记录 score_method=bm25；该数值是 DiscoveryScore，因而也是 DiscoveryMeasure。
        en: BM25Retriever assigns d-17 score 12.4 with score_method=bm25. This method-scoped magnitude is a DiscoveryScore and therefore a DiscoveryMeasure.
        ja: BM25Retriever が d-17 に score 12.4 と score_method=bm25 を付けます。この手法内の量は発見スコアであり発見測定でもあります。
      field_values:
        score: 12.4
        score_method: bm25
      related_node_ids:
        - DiscoveryScore
        - DiscoveryMeasure
      related_relation_ids:
        - DiscoveryScore-is_a-DiscoveryMeasure
      expected_result:
        zh: 接受该评分的发现度量归类。
        en: Accept the score as a discovery measure.
        ja: このスコアを発見測定として受理します。
      why_valid_or_invalid:
        zh: 数值连同产生方法形成可解释的检索度量，而不是孤立数字。
        en: The value and its generating method form an interpretable retrieval measure rather than an untyped number.
        ja: 値と生成手法が解釈可能な検索測定を形成し、型のない数値ではありません。
      synthetic: true
      verified_version: 2026-07-16-manual-review
      source_claims:
        - claim-discovery-score-009
    - id: DiscoveryScore-is_a-DiscoveryMeasure-example-boundary-001
      kind: boundary
      labels:
        zh: 序数位置不等于评分
        en: Ordinal position is not a score
        ja: 序数位置はスコアではない
      scenario_id: null
      descriptions:
        zh: 候选仅记录 rank=3，没有评分方法或数值尺度；它是 CandidateRank 和 DiscoveryMeasure，但不是 DiscoveryScore。
        en: A candidate records only rank 3 with no scoring method or numeric scale. It is CandidateRank and DiscoveryMeasure, but not DiscoveryScore.
        ja: 候補は rank 3 だけを記録し、採点手法や数値尺度がありません。候補順位かつ発見測定ですが発見スコアではありません。
      field_values:
        rank: 3
      related_node_ids:
        - DiscoveryScore
        - DiscoveryMeasure
        - CandidateRank
      related_relation_ids:
        - DiscoveryScore-is_a-DiscoveryMeasure
      expected_result:
        zh: 拒绝将序数位次归为 DiscoveryScore。
        en: Reject the ordinal rank as DiscoveryScore.
        ja: 序数順位を発見スコアに分類しません。
      why_valid_or_invalid:
        zh: 两者共享度量父类，但评分要求方法特定的数值量，位次只表达顺序。
        en: Both share the measure genus, but a score requires a method-specific numeric magnitude while rank expresses order only.
        ja: 両者は測定上位型を共有しますが、スコアには手法固有の数値量が必要で、順位は順序だけを表します。
      synthetic: true
      verified_version: 2026-07-16-manual-review
      source_claims:
        - claim-discovery-score-010
  source_claims:
