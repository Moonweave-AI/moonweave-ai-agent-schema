schema: moonweave.ai/ontology-node/v1
id: DiscoveryScore
kind: concept
status: accepted
labels:
  zh: 发现评分
  en: discovery score
  ja: 発見スコア
semantics:
  short_definition:
    zh: 发现评分是某种发现方法对一个候选产生的数值度量观测。
    en: A discovery score is a numeric measurement observation produced for a candidate by a discovery method.
    ja: 発見スコアは、発見方式が一つの候補について生成する数値測定観測です。
  definition:
    zh: DiscoveryScore 是 DiscoveryMeasure 的一种：它把数值、产生该数值的方法以及被测候选绑定到同一次发现运行。分数可以表达 BM25 匹配、向量相似度、融合或重排结果，但不同方法的数值不自动共享尺度、方向或可比性；它也不是候选的序位排名。
    en: DiscoveryScore is a kind of DiscoveryMeasure that binds a numeric value, the method that produced it, and the measured candidate to one discovery run. Scores may express BM25 match, vector similarity, fusion, or reranking, but values from different methods do not automatically share scale, direction, or comparability; a score is also not an ordinal rank.
    ja: DiscoveryScore は DiscoveryMeasure の一種で、数値、その生成方式、測定対象候補を一回の発見実行へ結び付けます。BM25 一致、ベクトル類似度、融合、再順位を表せますが、異なる方式の値は尺度、方向、比較可能性を自動的に共有せず、序数順位でもありません。
  why_needed:
    zh: 该概念阻止系统把所有浮点值当成同一种相关性，也让分数与排名保持独立：消费方只有在方法、尺度与方向兼容时才能比较或融合两个评分。
    en: "The concept prevents every floating-point value from being treated as the same relevance signal and keeps score separate from rank: consumers may compare or fuse two scores only when method, scale, and direction are compatible."
    ja: この概念は全ての浮動小数値を同じ関連度と扱うことを防ぎ、スコアと順位を分離します。利用側は方式、尺度、方向が互換な場合だけ二つのスコアを比較・融合できます。
  includes:
    - zh: 纳入与候选、发现运行和评分方法绑定的 BM25、向量相似度、融合或重排数值；记录必须能说明数值如何解释。
      en: Includes BM25, vector-similarity, fusion, or reranking values bound to a candidate, discovery run, and scoring method, with enough metadata to interpret the number.
      ja: 候補、発見実行、採点方式に結び付いた BM25、ベクトル類似度、融合、再順位の値を含み、数値の解釈に十分なメタデータを必要とします。
  excludes:
    - zh: 排除 CandidateRank 的第一、第二等序位，排除没有方法或候选绑定的孤立浮点值，也排除包含候选内容的 DiscoveryResult。
      en: Excludes first/second ordinal positions represented by CandidateRank, an isolated floating-point value without method or candidate binding, and a DiscoveryResult carrying candidate content.
      ja: CandidateRank が表す一位・二位などの序数、方式や候補に結び付かない孤立数値、候補内容を持つ DiscoveryResult を除外します。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: discovery-score-numeric-kind-boundary
      severity: error
      expression_language: plain
      expression: measure_kind equals numeric-score and measure_value is finite; interpretation_ref identifies the producing scoring method, scale, and direction
      explanations:
        zh: DiscoveryScore 必须是有限数值评分，并引用产生它的方法、尺度和方向；序位值属于 CandidateRank。
        en: DiscoveryScore is a finite numeric score with its producing method, scale, and direction identified; ordinal values belong to CandidateRank.
        ja: DiscoveryScore は生成方式・尺度・方向を識別した有限数値スコアで、序数値は CandidateRank に属します。
      source_claims:
        - claim-discovery-score-003
  required_relation_constraints: []
examples:
  - id: DiscoveryScore-example-positive-001
    kind: positive
    labels:
      zh: 发现评分正例
      en: Positive example of discovery score
      ja: 発見スコアの正例
    scenario_id: null
    descriptions:
      zh: BM25 retriever 针对查询“退款期限”为文档 policy-17 产生 score=0.812；记录同时绑定 BM25 方法、本次运行和被评分文档。
      en: For query 'refund deadline', a BM25 retriever assigns score 0.812 to document policy-17, with the observation bound to the BM25 method, this run, and the scored document.
      ja: BM25 retriever が「返金期限」クエリについて文書 policy-17 に score=0.812 を付け、観測を BM25 方式、今回の実行、対象文書へ結び付けます。
    field_values:
      measure_id: measure-search-204-policy-17-bm25
      discovery_run_ref: discovery-run:search-204
      candidate_ref: discovery-result:policy-17
      measure_kind: numeric-score
      measure_value: 0.812
      interpretation_ref: ranking-method:bm25-descending@2
      observed_at: 2026-07-17T01:02:03Z
    related_node_ids:
      - DiscoveryScore
      - RetrievalScore
    related_relation_ids:
      - RetrievalScore-is_a-DiscoveryScore
    expected_result:
      zh: 0.812 被识别为该候选在本次 BM25 运行中的 DiscoveryScore，不能脱离方法直接与其他尺度比较。
      en: The value 0.812 is a DiscoveryScore for that candidate in this BM25 run and is not directly comparable across unrelated methods.
      ja: 0.812 は今回の BM25 実行における候補の DiscoveryScore であり、方式を離れて異なる尺度と直接比較できません。
    why_valid_or_invalid:
      zh: Haystack 将 score 附在返回 Document 上，并说明该值通常由 retriever 分配；方法和候选绑定使数值成为可解释观测。
      en: Haystack attaches score to a returned Document and notes that retrievers usually assign it; method and candidate bindings make the number an interpretable observation.
      ja: Haystack は返却 Document に score を付け、通常 retriever が割り当てると説明します。方式と候補への結び付きにより数値が解釈可能な観測になります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-score-004
      - claim-discovery-score-005
  - id: DiscoveryScore-example-boundary-001
    kind: boundary
    labels:
      zh: 发现评分边界例
      en: Boundary case for discovery score
      ja: 発見スコアの境界例
    scenario_id: null
    descriptions:
      zh: 文档 policy-17 位于返回列表第 1 位；“1”只表达序位，若没有评分方法与数值尺度，就不能把该 CandidateRank 当作 DiscoveryScore。
      en: Document policy-17 appears at position 1 in the returned list; '1' expresses only ordinal position and is not a DiscoveryScore without a scoring method and numeric scale.
      ja: 文書 policy-17 が返却一覧の第 1 位に現れます。この「1」は序数位置だけを表し、採点方式と数値尺度なしには DiscoveryScore ではありません。
    field_values: {}
    related_node_ids:
      - DiscoveryScore
      - RetrievalScore
    related_relation_ids:
      - RetrievalScore-is_a-DiscoveryScore
    expected_result:
      zh: 该“1”被记录为 CandidateRank，不创建 DiscoveryScore。
      en: The value '1' is recorded as CandidateRank and no DiscoveryScore is created.
      ja: この「1」は CandidateRank として記録され、DiscoveryScore は作成されません。
    why_valid_or_invalid:
      zh: 排名位置由列表次序产生，评分由计算方法产生；即使两者都可写成数字，其测量对象与解释规则也不同。
      en: Rank position comes from list order, whereas a score comes from a calculation method; although both can be numeric, their measurement semantics differ.
      ja: 順位位置は一覧順序から、スコアは計算方式から生じます。どちらも数値表現できても測定意味が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-score-006
      - claim-discovery-score-007
  - id: DiscoveryScore-example-instance-001
    kind: instance
    labels:
      zh: NodeWithScore 实例
      en: NodeWithScore instance
      ja: NodeWithScore インスタンス
    scenario_id: null
    descriptions:
      zh: LlamaIndex 返回 NodeWithScore(node_id=policy-17, score=0.87)，Moonweave 将 0.87 连同检索方法与运行 ID 记录为该候选的 DiscoveryScore。
      en: LlamaIndex returns NodeWithScore(node_id=policy-17, score=0.87), and Moonweave records 0.87 with the retrieval method and run ID as that candidate's DiscoveryScore.
      ja: LlamaIndex が NodeWithScore(node_id=policy-17, score=0.87) を返し、Moonweave は 0.87 を検索方式と実行 ID と共に候補の DiscoveryScore として記録します。
    field_values:
      value: 0.87
      method: vector-similarity
    related_node_ids:
      - DiscoveryScore
      - DiscoveryResult
    related_relation_ids: []
    expected_result:
      zh: 0.87 被解释为 policy-17 在指定向量检索运行中的评分观测。
      en: The value 0.87 is interpreted as a score observation for policy-17 in the specified vector-retrieval run.
      ja: 0.87 は指定されたベクトル検索実行における policy-17 のスコア観測として解釈されます。
    why_valid_or_invalid:
      zh: 官方 NodeWithScore 将节点与可选 score 绑定；补充方法与运行上下文后，该数值满足发现评分的完整解释边界。
      en: The official NodeWithScore binds a node and optional score; adding method and run context gives the value the complete interpretation boundary required for a discovery score.
      ja: 公式 NodeWithScore はノードと任意 score を結び付け、方式と実行文脈を加えることで発見スコアに必要な完全な解釈境界を満たします。
    synthetic: true
    verified_version: https://github.com/run-llama/llama_index
    source_claims:
      - claim-discovery-score-008
