        en: DiscoveryScore is a finite numeric score with its producing method, scale, and direction identified; ordinal values belong to CandidateRank.
        ja: DiscoveryScore は生成方式・尺度・方向を識別した有限数値スコアで、序数値は CandidateRank に属します。
