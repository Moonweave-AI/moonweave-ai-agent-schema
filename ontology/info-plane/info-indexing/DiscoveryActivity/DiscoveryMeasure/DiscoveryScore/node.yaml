schema: moonweave.ai/ontology-node/v1
id: DiscoveryScore
kind: concept
status: accepted
labels:
  zh: 发现评分
  en: discovery score
  ja: 発見スコア
semantics:
  short_definition:
    zh: 发现评分是某种发现方法对一个候选产生的数值度量观测。
    en: A discovery score is a numeric measurement observation produced for a candidate by a discovery method.
    ja: 発見スコアは、発見方式が一つの候補について生成する数値測定観測です。
  definition:
    zh: DiscoveryScore 是 DiscoveryMeasure 的一种：它把数值、产生该数值的方法以及被测候选绑定到同一次发现运行。分数可以表达 BM25 匹配、向量相似度、融合或重排结果，但不同方法的数值不自动共享尺度、方向或可比性；它也不是候选的序位排名。
    en: DiscoveryScore is a kind of DiscoveryMeasure that binds a numeric value, the method that produced it, and the measured candidate to one discovery run. Scores may express BM25 match, vector similarity, fusion, or reranking, but values from different methods do not automatically share scale, direction, or comparability; a score is also not an ordinal rank.
    ja: DiscoveryScore は DiscoveryMeasure の一種で、数値、その生成方式、測定対象候補を一回の発見実行へ結び付けます。BM25 一致、ベクトル類似度、融合、再順位を表せますが、異なる方式の値は尺度、方向、比較可能性を自動的に共有せず、序数順位でもありません。
  why_needed:
    zh: 该概念阻止系统把所有浮点值当成同一种相关性，也让分数与排名保持独立：消费方只有在方法、尺度与方向兼容时才能比较或融合两个评分。
    en: "The concept prevents every floating-point value from being treated as the same relevance signal and keeps score separate from rank: consumers may compare or fuse two scores only when method, scale, and direction are compatible."
    ja: この概念は全ての浮動小数値を同じ関連度と扱うことを防ぎ、スコアと順位を分離します。利用側は方式、尺度、方向が互換な場合だけ二つのスコアを比較・融合できます。
  includes:
    - zh: 纳入与候选、发现运行和评分方法绑定的 BM25、向量相似度、融合或重排数值；记录必须能说明数值如何解释。
      en: Includes BM25, vector-similarity, fusion, or reranking values bound to a candidate, discovery run, and scoring method, with enough metadata to interpret the number.
      ja: 候補、発見実行、採点方式に結び付いた BM25、ベクトル類似度、融合、再順位の値を含み、数値の解釈に十分なメタデータを必要とします。
  excludes:
    - zh: 排除 CandidateRank 的第一、第二等序位，排除没有方法或候选绑定的孤立浮点值，也排除包含候选内容的 DiscoveryResult。
      en: Excludes first/second ordinal positions represented by CandidateRank, an isolated floating-point value without method or candidate binding, and a DiscoveryResult carrying candidate content.
      ja: CandidateRank が表す一位・二位などの序数、方式や候補に結び付かない孤立数値、候補内容を持つ DiscoveryResult を除外します。
  semantic_kind: quality
  aliases: []
