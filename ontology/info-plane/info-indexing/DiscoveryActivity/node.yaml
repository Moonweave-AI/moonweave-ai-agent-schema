schema: moonweave.ai/ontology-node/v1
id: DiscoveryActivity
kind: concept
labels:
  zh: 发现活动
  en: Discovery activity
  ja: 発見活動
semantics:
  short_definition:
    zh: 一次会话内列举并过滤候选的运行记录。
    en: Run record enumerating and filtering candidates within one session.
    ja: 一回の session 内で候補を列挙/filter する run record。
  definition:
    zh: DiscoveryActivity 绑定 session_id 与 discovery_activity_id，对应 MCP resources/list、prompts/list、Cursor @ 引用解析或 semantic search 前的一次 lightweight 列举；产出 DiscoveryResult 但不拥有持久 Index。
    en: DiscoveryActivity binds session_id and discovery_activity_id to one lightweight enumeration such as MCP resources/list, prompts/list, Cursor @ resolution, or pre-search semantic lookup; produces DiscoveryResults without owning durable Index.
    ja: MCP list/Cursor search 等 session-local discovery run。
  why_needed:
    zh: 发现活动身份使 rank/score 可解释为当次交互观测，而不是 IndexEntry 永久属性。
    en: Discovery activity identity lets rank/score be interpreted as session-local observations, not permanent IndexEntry properties.
    ja: discovery activity→session-local rank/score。
  includes:
    - zh: discovery_activity_id、session_id、query/filter 事实与产出 DiscoveryResult 引用。
      en: discovery_activity_id, session_id, query/filter facts, and produced DiscoveryResult references.
      ja: activity_id/session_id/query/filter/results。
  excludes:
    - zh: 持久 Index/IndexEntry、跨库 RetrievalTrace、tool 候选发现。
      en: Durable Index/IndexEntry, cross-store RetrievalTrace, and tool-candidate discovery.
      ja: durable Index/RetrievalTrace/tool discovery。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: disc-101 调用 resources/list 后 mime_type=text/markdown 过滤；disc-prompts-8 调用 prompts/list；Cursor agent step 前 @+semantic search 创建 disc-901。
    en: disc-101 calls resources/list then filters mime_type=text/markdown; disc-prompts-8 calls prompts/list; Cursor @+semantic search before agent step creates disc-901.
    ja: MCP list/Cursor search discovery。
  typical_input:
    - description: MCP resources/list
      format: '{"method":"resources/list","params":{}}'
      source_claims:
        - claim-disc-act-mcp
  typical_output:
    - description: Discovery projection
      format: '{"discovery_activity_id":"disc-101","session_id":"sess-arch-27","result_count":3}'
      source_claims:
        - claim-disc-act-design
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys:
    - discovery_activity_id
  fields:
    - id: discovery_activity_id
      labels:
        zh: 发现活动标识
        en: discovery-activity ID
        ja: 発見活動 ID
      definitions:
        zh: 稳定标识一次从需求到候选结果的发现活动。
        en: Stably identifies one discovery activity from requirement to candidate results.
        ja: 要件から候補結果までの一回の発見活動を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: disc-101
      allowed_values: []
      source_claims:
        - claim-discovery-activity-003
    - id: query
      labels:
        zh: 发现查询或需求
        en: discovery query or requirement
        ja: 発見 query または要件
      definitions:
        zh: 记录触发候选发现的查询、需求或检索意图，不等于最终选择判据。
        en: Records the query, requirement, or retrieval intent that initiated discovery, distinct from final selection criteria.
        ja: 候補発見を開始した query・要件・検索意図を記録し、最終選択基準とは区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: project architecture
      allowed_values: []
      source_claims:
        - claim-discovery-activity-004
    - id: surface_refs
      labels:
        zh: 发现入口引用
        en: discovery-surface references
        ja: 発見 surface 参照
      definitions:
        zh: 列出本次活动实际探查的 DiscoverySurface 或 DiscoveryIndex；它们不是返回结果。
        en: Lists the DiscoverySurface or DiscoveryIndex resources actually probed, which are not themselves returned results.
        ja: 実際に調べた DiscoverySurface または DiscoveryIndex を列挙し、返却結果自体とは区別します。
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value:
        - mcp://server-7/resources
      allowed_values: []
      source_claims:
        - claim-discovery-activity-005
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      definitions:
        zh: 发现活动实际发出首个探查请求的 UTC 时间。
        en: UTC instant at which the discovery activity issued its first probe.
        ja: 発見活動が最初の probe を発行した UTC 時刻です。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T02:10:00.000Z
      allowed_values: []
      source_claims:
        - claim-discovery-activity-006
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      definitions:
        zh: 候选结果集固定或活动失败时的 UTC 时间；活动仍进行时为空。
        en: UTC instant when the candidate set became fixed or the activity failed; null while still running.
        ja: 候補集合が確定または活動が失敗した UTC 時刻で、実行中は空です。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2026-07-16T02:10:00.080Z
      allowed_values: []
      source_claims:
        - claim-discovery-activity-007
    - id: outcome
      labels:
        zh: 发现结果状态
        en: discovery outcome
        ja: 発見結果状態
      definitions:
        zh: 记录本次探查成功、部分成功、失败或被取消；候选为空仍可是成功。
        en: Records success, partial success, failure, or cancellation; an empty candidate set may still be successful.
        ja: success・partial success・failure・cancellation を記録し、候補 0 件でも success になり得ます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: success
      allowed_values: []
      source_claims:
        - claim-discovery-activity-008
  constraints:
    - id: discovery-does-not-imply-selection
      severity: error
      expression_language: plain
      expression: a DiscoveryResult produced by this activity remains a candidate until a distinct selection decision admits it
      explanation:
        zh: 发现结果仍是候选；发现活动本身不能把它直接纳入上下文。
        en: A discovery result remains a candidate; this activity cannot itself admit it to context.
        ja: 発見結果は候補のままで、この活動自体は context へ採用できません。
      source_claims:
        - claim-discovery-activity-009
  required_relations: []
examples:
  - id: DiscoveryActivity-example-mcp-resources
    labels:
      zh: MCP resources 发现
      en: MCP resources discovery
      ja: MCP resources 発見
    descriptions:
      zh: disc-101 sess-arch-27 调用 resources/list 并过滤 Markdown。
      en: disc-101 sess-arch-27 calls resources/list and filters Markdown.
      ja: disc-101 MCP list。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/list
    field_values:
      discovery_activity_id: disc-101
      session_id: sess-arch-27
    related_node_ids:
      - DiscoveryActivity
      - DiscoveryResult
    related_relation_ids: []
    source_claims:
      - claim-disc-act-mcp
  - id: DiscoveryActivity-example-cursor-at
    labels:
      zh: Cursor @ 发现
      en: Cursor @ discovery
      ja: Cursor @ 発見
    descriptions:
      zh: disc-901 解析 @src/auth/middleware.ts 并运行 semantic search。
      en: disc-901 resolves @src/auth/middleware.ts and runs semantic search.
      ja: disc-901 @+semantic。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: "@ references"
    field_values: {}
    related_node_ids:
      - DiscoveryActivity
      - LightweightRetrieval
    related_relation_ids: []
    source_claims:
      - claim-disc-act-cursor
  - id: DiscoveryActivity-example-empty-filtered
    labels:
      zh: 过滤后为空
      en: Empty after filter
      ja: filter 後空
    descriptions:
      zh: disc-102 mime_type=application/pdf 过滤后零结果仍保留 Activity。
      en: disc-102 mime_type=application/pdf filter yields zero results but Activity retained.
      ja: empty results retained。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: empty filter
    field_values: {}
    related_node_ids:
      - DiscoveryActivity
    related_relation_ids: []
    source_claims:
      - claim-disc-act-design
parent_relation: null
relations:
  - id: DiscoveryActivity-exposed_by-DiscoverySurface
    predicate: exposed_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由发现入口公开
      en: exposed by discovery surface
      ja: 発見面により公開される
    definitions:
      zh: 当一个发现入口的资源描述或模板明确声明客户端可据此发起该发现活动时，DiscoveryActivity 由该 DiscoverySurface 公开；单纯共享服务器或端点不构成这条事实。
      en: DiscoveryActivity is exposed_by DiscoverySurface when that surface's resource descriptor or template explicitly makes the activity available for client discovery; sharing a server or endpoint alone does not establish the relation.
      ja: 発見面のリソース記述またはテンプレートがクライアントから発見活動を利用可能にすると明示する場合に限り、DiscoveryActivity は DiscoverySurface により公開されます。同じサーバーや端点だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个活动可由多个资源描述符公开，而某些内部发现活动不公开，因此不能设统一运行时基数。
      en: An activity may be published through several resource descriptors, while an internal activity may have none, so no universal runtime cardinality applies.
      ja: 一つの活動が複数のリソース記述子から公開される場合も、内部活動が公開面を持たない場合もあるため、一律の実行時基数は適用しません。
    inverse_reading:
      predicate: exposes_activity
      labels:
        zh: 公开发现活动
        en: exposes discovery activity
        ja: 発見活動を公開する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryActivity-exposed_by-DiscoverySurface-example-positive-001
        labels:
          zh: 资源模板公开发现活动
          en: Resource template exposes discovery activity
          ja: リソーステンプレートが発見活動を公開
        descriptions:
          zh: 知识库服务器发布 resource://kb/{topic} 模板，并把该模板绑定到按主题列出候选资源的发现处理器；该处理器的 DiscoveryActivity 由此 DiscoverySurface 公开。
          en: A knowledge server publishes resource://kb/{topic} and binds that template to the handler that lists candidate resources by topic; the handler's DiscoveryActivity is exposed by this DiscoverySurface.
          ja: 知識サーバーが resource://kb/{topic} を公開し、トピック別候補を列挙するハンドラーに結び付けるため、その DiscoveryActivity はこの DiscoverySurface により公開されます。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - DiscoverySurface
        related_relation_ids:
          - DiscoveryActivity-exposed_by-DiscoverySurface
        source_claims:
          - claim-discovery-activity-015
          - claim-discovery-activity-016
      - id: DiscoveryActivity-exposed_by-DiscoverySurface-example-boundary-001
        labels:
          zh: 同服务器但未绑定
          en: Same server without a binding
          ja: 同一サーバーだが結び付きなし
        descriptions:
          zh: 同一服务器既提供文件资源模板，也运行一个仅供内部健康检查使用的发现活动；文件模板没有绑定该内部活动，不能建立 exposed_by。
          en: One server offers a file resource template and also runs an internal health-check discovery activity. The template is not bound to that internal activity, so exposed_by does not hold.
          ja: 同じサーバーがファイル用リソーステンプレートと内部ヘルスチェック発見活動を持っていても、テンプレートが内部活動に結び付かないため exposed_by は成立しません。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - DiscoverySurface
        related_relation_ids:
          - DiscoveryActivity-exposed_by-DiscoverySurface
        source_claims:
          - claim-discovery-activity-017
          - claim-discovery-activity-018
    source_claims:
      - claim-discovery-activity-019
      - claim-discovery-activity-020
    layout_role: cross-link
    target: concept:DiscoverySurface
  - id: DiscoveryActivity-uses-LightIndex
    predicate: uses
    direction: source-to-target
    relation_kind: information
    labels:
      zh: uses
      en: uses
      ja: uses
    definitions:
      zh: 当一次发现活动实际读取某个 LightIndex 的条目、指针或顺序结构来形成候选集时，该活动 uses 此轻量索引；仅在配置中注册但本次未读取的索引不算被使用。
      en: DiscoveryActivity uses LightIndex when that execution actually reads the light index's entries, pointers, or ordering structure to form candidates; registration in configuration without a read in the execution is insufficient.
      ja: 発見活動の実行が候補形成のために LightIndex の項目・ポインタ・順序構造を実際に読む場合に uses が成立し、設定登録だけで今回読まれない索引には成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: used_by_discovery_activity
      labels:
        zh: 供发现活动使用
        en: used by discovery activity
        ja: 発見活動に使用される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryActivity-uses-LightIndex-example-positive-001
        labels:
          zh: uses 关系正例
          en: Positive uses relation
          ja: uses 関係の正例
        descriptions:
          zh: 查询 q-12 调用 SummaryIndex 的检索器，按索引节点顺序读取候选并返回结果；该 DiscoveryActivity uses 这个 LightIndex。
          en: Query q-12 invokes a SummaryIndex retriever, reads candidates from its ordered index nodes, and returns results; this DiscoveryActivity uses that LightIndex.
          ja: 問い合わせ q-12 が SummaryIndex 検索器を呼び、順序付き索引ノードから候補を読んで結果を返すため、この DiscoveryActivity は LightIndex を使用します。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - LightIndex
        related_relation_ids:
          - DiscoveryActivity-uses-LightIndex
        source_claims:
          - claim-discovery-activity-021
          - claim-discovery-activity-022
      - id: DiscoveryActivity-uses-LightIndex-example-boundary-001
        labels:
          zh: uses 关系边界例
          en: Boundary case for uses
          ja: uses 関係の境界例
        descriptions:
          zh: 运行时同时注册 light-a 与 light-b，但路由 q-12 只调用 light-a 的检索器；不能因为 light-b 在注册表中就断言该活动 uses light-b。
          en: The runtime registers light-a and light-b, but q-12 invokes only light-a's retriever. Registration of light-b does not mean the activity uses light-b.
          ja: 実行環境に light-a と light-b が登録されても、q-12 が light-a の検索器だけを呼ぶなら、light-b の登録から uses を断言できません。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - LightIndex
        related_relation_ids:
          - DiscoveryActivity-uses-LightIndex
        source_claims:
          - claim-discovery-activity-023
          - claim-discovery-activity-024
    source_claims:
      - claim-discovery-activity-025
      - claim-discovery-activity-026
    layout_role: cross-link
    target: concept:LightIndex
sources:
  - id: src-mcp-resources-list
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: Session-local resource enumeration.
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-discovery-activity-001
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list is explicitly a discovery operation over available resource descriptors. Moonweave generalizes this operation into DiscoveryActivity while retaining protocol-specific details outside the ontology core.
    locator: Server Features > Resources > Protocol Messages > Listing Resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-002
    source: eng-fw-haystack-repo
    supports: Haystack retriever execution maps a query and optional filters to top-k documents, supporting the activity's input-output boundary; its ownership and root status are Moonweave design decisions.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-003
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list is a distinct request-response operation. discovery_activity_id is Moonweave's stable identity for auditing one such discovery pass, not a field prescribed by MCP.
    locator: Server Features > Resources > Protocol Messages > Listing Resources
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-004
    source: eng-fw-haystack-repo
    supports: Haystack retriever execution accepts an explicit query and optional filters before returning candidate documents. The query field preserves that input boundary.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: official
    confidence: high
  - id: claim-discovery-activity-005
    source: eng-proto-mcp-2025-spec
    supports: MCP resource discovery is performed against a server resource surface using resources/list. surface_refs records the concrete discovery endpoints traversed by one activity.
    locator: Server Features > Resources > Capabilities and Listing Resources
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-006
    source: eng-fw-haystack-repo
    supports: A retriever run is an executable operation with measurable latency. started_at makes the operational boundary auditable without changing Haystack's API contract.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-007
    source: eng-fw-haystack-repo
    supports: Retriever execution returns a bounded candidate result. ended_at is Moonweave's completion boundary for measuring and replaying that operation.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-008
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list has a response or JSON-RPC error outcome. Moonweave generalizes that operation result while explicitly allowing a valid empty listing.
    locator: Server Features > Resources > Protocol Messages > Listing Resources; Base Protocol > Error responses
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-009
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list returns descriptors for host-controlled selection; the specification does not mandate automatic context inclusion. Moonweave therefore separates discovery from admission.
    locator: Server Features > Resources > User Interaction Model and Listing Resources
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-010
    source: eng-proto-mcp-2025-spec
    supports: MCP defines resources/list as the operation clients use to discover available resources and returns resource descriptors, directly supporting the listing action in disc-101.
    locator: Server Features > Resources > Protocol Messages > Listing Resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-011
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever.run accepts a query and optional filters and returns retrieved documents, supporting the query-to-candidate activity pattern.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-012
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex.build_index_from_nodes adds documents and builds an index structure, distinguishing index construction from querying through a retriever.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.build_index_from_nodes and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-013
    source: eng-fw-haystack-repo
    supports: Haystack's retriever run method is the query-time operation that returns documents; merely writing documents to a store does not satisfy that behavior.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-activity-014
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever.run accepts query and top_k and returns a document list, supporting the instance fields used for one discovery execution.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-015
    source: eng-proto-mcp-2025-spec
    supports: MCP resource templates advertise URI patterns and descriptive metadata through which clients discover resource families, supporting a surface bound to a discovery handler.
    locator: Server Features > Resources > Resource templates > uriTemplate and listChanged
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-activity-016
    source: eng-proto-mcp-2025-spec
    supports: MCP requires a server to implement resources/list for clients to enumerate concrete resources, grounding the activity made reachable through the advertised resource capability.
    locator: Server Features > Resources > Listing resources > resources/list request and result
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-activity-017
    source: eng-proto-mcp-2025-spec
    supports: MCP models resources and resource templates as explicit server features; a template's presence does not normatively bind it to unrelated server operations.
    locator: Server Features > Resources > Resources, templates, and protocol messages
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-activity-018
    source: eng-proto-mcp-2025-spec
    supports: The resources capability and resources/list method are separately declared protocol elements, supporting the requirement for an actual capability-to-handler association rather than server co-location.
    locator: Server Features > Resources > Capabilities; Listing resources > resources/list
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-019
    source: eng-proto-mcp-2025-spec
    supports: MCP resource and resource-template advertisement grounds the notion of a structured discovery surface; Moonweave records exposed_by only when that descriptor is bound to the discovery activity that serves it.
    locator: Server Features > Resources > Resources and resource templates; Listing resources
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-activity-020
