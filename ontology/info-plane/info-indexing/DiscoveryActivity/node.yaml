schema: moonweave.ai/ontology-node/v1
id: DiscoveryActivity
kind: concept
status: review
labels:
  zh: 发现活动
  en: Discovery activity
  ja: 発見活動
semantics:
  short_definition:
    zh: 发现活动是在给定查询或需求下探查发现表面并产出候选结果的活动。
    en: Discovery activity probes discovery surfaces for a query or requirement and produces candidate results.
    ja: 発見活動は、クエリまたは要件に対して発見面を調べ、候補結果を生成する活動です。
  definition:
    zh: 发现活动以查询、需求或过滤条件为输入，读取一个或多个 DiscoverySurface 或 DiscoveryIndex，并产出尚待选择的 DiscoveryResult。它不构建索引、不读取候选的完整内容，也不决定候选最终是否进入上下文。
    en: DiscoveryActivity takes a query, requirement, or filter as input, probes one or more DiscoverySurface or DiscoveryIndex resources, and produces DiscoveryResult candidates that still require selection. It does not build the index, read every candidate's full content, or decide final context admission.
    ja: DiscoveryActivity はクエリ、要件、またはフィルタを入力とし、一つ以上の DiscoverySurface または DiscoveryIndex を調べ、選択前の DiscoveryResult 候補を生成します。索引構築、全候補内容の読取り、最終コンテキスト採用は行いません。
  why_needed:
    zh: 该概念把查询执行与索引实体、入口描述、结果记录和最终上下文选择分开，使一次候选发现的输入、表面、输出与耗时可以被独立审计。
    en: This concept separates query execution from index entities, surface descriptors, result records, and final context selection so the inputs, surfaces, outputs, and duration of one discovery pass can be audited.
    ja: クエリ実行を索引実体、発見面記述、結果記録、最終コンテキスト選択から分離し、一回の発見処理の入力、面、出力、所要時間を監査可能にします。
  includes:
    - zh: 纳入资源列举、关键词搜索、向量近邻查询、元数据过滤以及对这些表面的组合探查，只要输出仍是待选择候选。
      en: Includes resource listing, keyword search, vector-neighbor queries, metadata filtering, and combined surface probing while the output remains candidate results.
      ja: 出力が選択前の候補結果である限り、資源一覧、キーワード検索、ベクトル近傍検索、メタデータ絞り込み、複数面の組合せ探索を含みます。
  excludes:
    - zh: 排除索引构建或刷新、资源正文读取、重排流水线、最终上下文选择以及仅描述入口但未执行查询的记录。
      en: Excludes index build or refresh, resource-content reading, reranking pipelines, final context selection, and records that only describe an entry surface without executing a query.
      ja: 索引の構築・更新、資源本文の読取り、再順位付けパイプライン、最終コンテキスト選択、問い合わせを実行せず入口だけを記述する記録を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - discovery_activity_id
  fields:
    - id: discovery_activity_id
      labels:
        zh: 发现活动标识
        en: discovery-activity ID
        ja: 発見活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次从需求到候选结果的发现活动。
        en: Stably identifies one discovery activity from requirement to candidate results.
        ja: 要件から候補結果までの一回の発見活動を安定識別します。
      allowed_values: []
      pattern: null
      example_value: disc-101
      source_claims:
        - claim-discovery-activity-003
    - id: query
      labels:
        zh: 发现查询或需求
        en: discovery query or requirement
        ja: 発見 query または要件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录触发候选发现的查询、需求或检索意图，不等于最终选择判据。
        en: Records the query, requirement, or retrieval intent that initiated discovery, distinct from final selection criteria.
        ja: 候補発見を開始した query・要件・検索意図を記録し、最終選択基準とは区別します。
      allowed_values: []
      pattern: null
      example_value: project architecture
      source_claims:
        - claim-discovery-activity-004
    - id: surface_refs
      labels:
        zh: 发现入口引用
        en: discovery-surface references
        ja: 発見 surface 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次活动实际探查的 DiscoverySurface 或 DiscoveryIndex；它们不是返回结果。
        en: Lists the DiscoverySurface or DiscoveryIndex resources actually probed, which are not themselves returned results.
        ja: 実際に調べた DiscoverySurface または DiscoveryIndex を列挙し、返却結果自体とは区別します。
      allowed_values: []
      pattern: null
      example_value:
        - mcp://server-7/resources
      source_claims:
        - claim-discovery-activity-005
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 发现活动实际发出首个探查请求的 UTC 时间。
        en: UTC instant at which the discovery activity issued its first probe.
        ja: 発見活動が最初の probe を発行した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:10:00.000Z
      source_claims:
        - claim-discovery-activity-006
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 候选结果集固定或活动失败时的 UTC 时间；活动仍进行时为空。
        en: UTC instant when the candidate set became fixed or the activity failed; null while still running.
        ja: 候補集合が確定または活動が失敗した UTC 時刻で、実行中は空です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:10:00.080Z
      source_claims:
        - claim-discovery-activity-007
    - id: outcome
      labels:
        zh: 发现结果状态
        en: discovery outcome
        ja: 発見結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次探查成功、部分成功、失败或被取消；候选为空仍可是成功。
        en: Records success, partial success, failure, or cancellation; an empty candidate set may still be successful.
        ja: success・partial success・failure・cancellation を記録し、候補 0 件でも success になり得ます。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-discovery-activity-008
  constraints:
    - id: discovery-does-not-imply-selection
      severity: error
      expression_language: plain
      expression: a DiscoveryResult produced by this activity remains a candidate until a distinct selection decision admits it
      explanations:
        zh: 发现结果仍是候选；发现活动本身不能把它直接纳入上下文。
        en: A discovery result remains a candidate; this activity cannot itself admit it to context.
        ja: 発見結果は候補のままで、この活動自体は context へ採用できません。
      source_claims:
        - claim-discovery-activity-009
  required_relation_constraints: []
examples:
  - id: DiscoveryActivity-example-positive-001
    kind: positive
    labels:
      zh: 发现活动正例
      en: Positive example of Discovery activity
      ja: 発見活動の正例
    scenario_id: null
    descriptions:
      zh: 运行 disc-101 以“项目架构”为查询调用 MCP resources/list，并对返回描述符做 MIME 过滤，产出三个待选资源结果。
      en: Run disc-101 issues an MCP resources/list request for the requirement “project architecture,” filters returned descriptors by MIME type, and produces three candidate resource results.
      ja: 実行 disc-101 は「プロジェクト構成」という要件で MCP resources/list を呼び出し、返された記述子を MIME 型で絞り、三つの候補資源結果を生成します。
    field_values:
      discovery_activity_id: disc-101
      query: project architecture
      surface_refs:
        - mcp://server-7/resources
      started_at: 2026-07-16T02:10:00.000Z
      ended_at: 2026-07-16T02:10:00.080Z
      outcome: success
    related_node_ids:
      - DiscoveryActivity
      - DiscoverySurface
    related_relation_ids:
      - DiscoveryActivity-exposed_by-DiscoverySurface
    expected_result:
      zh: disc-101 被识别为 DiscoveryActivity，三个输出保持为尚未进入上下文的 DiscoveryResult。
      en: disc-101 is a DiscoveryActivity; its three outputs remain DiscoveryResult candidates not yet admitted to context.
      ja: disc-101 は DiscoveryActivity であり、三つの出力はまだコンテキストへ採用されていない DiscoveryResult です。
    why_valid_or_invalid:
      zh: 该记录有明确查询、发现表面、过滤动作和候选输出，且没有执行索引构建或最终选择。
      en: The record has a query, discovery surface, filtering action, and candidate outputs without index construction or final selection.
      ja: クエリ、発見面、絞り込み処理、候補出力があり、索引構築や最終選択は行っていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-activity-010
      - claim-discovery-activity-011
  - id: DiscoveryActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 发现活动边界例
      en: Boundary case for Discovery activity
      ja: 発見活動の境界例
    scenario_id: null
    descriptions:
      zh: 系统把十二个文档写入向量索引并刷新索引结构，但这一过程没有面向需求发出查询，也没有产出候选结果。
      en: The system writes twelve documents into a vector index and refreshes its index structure, but it issues no requirement-driven query and produces no candidate results.
      ja: システムは十二文書をベクトル索引へ書き込み索引構造を更新しますが、要件に基づく問い合わせも候補結果の生成も行いません。
    field_values: {}
    related_node_ids:
      - DiscoveryActivity
      - DiscoverySurface
    related_relation_ids:
      - DiscoveryActivity-exposed_by-DiscoverySurface
    expected_result:
      zh: 该过程属于索引构建或刷新，而不是 DiscoveryActivity。
      en: The process is index construction or refresh, not a DiscoveryActivity.
      ja: この処理は索引構築または更新であり、DiscoveryActivity ではありません。
    why_valid_or_invalid:
      zh: 索引生命周期活动改变可查询结构；发现活动消费该结构以返回候选，二者的输入、输出和责任不同。
      en: Index lifecycle work changes the queryable structure; discovery consumes that structure to return candidates, so their inputs, outputs, and responsibilities differ.
      ja: 索引ライフサイクル処理は検索可能構造を変更し、発見活動はその構造を利用して候補を返すため、入出力と責務が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-activity-012
      - claim-discovery-activity-013
  - id: DiscoveryActivity-example-instance-001
    kind: instance
    labels:
      zh: 发现活动实例
      en: Discovery-activity instance
      ja: 発見活動インスタンス
    scenario_id: null
    descriptions:
      zh: disc-205 对 LightIndex light-docs-v4 执行 query='release policy'、top_k=5，并记录五个 DiscoveryResult 标识。
      en: disc-205 runs query='release policy' with top_k=5 against LightIndex light-docs-v4 and records five DiscoveryResult identifiers.
      ja: disc-205 は LightIndex light-docs-v4 に query='release policy'、top_k=5 を実行し、五つの DiscoveryResult 識別子を記録します。
    field_values:
      activity_id: disc-205
      query: release policy
      top_k: 5
      result_count: 5
    related_node_ids:
      - DiscoveryActivity
      - LightIndex
      - DiscoveryResult
    related_relation_ids:
      - DiscoveryActivity-uses-LightIndex
      - DiscoveryActivity-produces-DiscoveryResult
    expected_result:
      zh: 该记录实例化一次发现活动，而不是索引或结果本身。
      en: The record instantiates one DiscoveryActivity rather than the index or any result itself.
      ja: この記録は索引や結果自体ではなく、一回の DiscoveryActivity を実体化します。
    why_valid_or_invalid:
      zh: 它给出活动身份、查询、输入索引、数量限制和输出计数。
      en: It identifies the activity, query, input index, result limit, and output count.
      ja: 活動識別、クエリ、入力索引、結果上限、出力件数を示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-activity-014
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: DiscoveryActivity-exposed_by-DiscoverySurface
    predicate: exposed_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由发现入口公开
      en: exposed by discovery surface
      ja: 発見面により公開される
    definitions:
      zh: 当一个发现入口的资源描述或模板明确声明客户端可据此发起该发现活动时，DiscoveryActivity 由该 DiscoverySurface 公开；单纯共享服务器或端点不构成这条事实。
      en: DiscoveryActivity is exposed_by DiscoverySurface when that surface's resource descriptor or template explicitly makes the activity available for client discovery; sharing a server or endpoint alone does not establish the relation.
      ja: 発見面のリソース記述またはテンプレートがクライアントから発見活動を利用可能にすると明示する場合に限り、DiscoveryActivity は DiscoverySurface により公開されます。同じサーバーや端点だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个活动可由多个资源描述符公开，而某些内部发现活动不公开，因此不能设统一运行时基数。
      en: An activity may be published through several resource descriptors, while an internal activity may have none, so no universal runtime cardinality applies.
      ja: 一つの活動が複数のリソース記述子から公開される場合も、内部活動が公開面を持たない場合もあるため、一律の実行時基数は適用しません。
    inverse_reading:
      predicate: exposes_activity
      labels:
        zh: 公开发现活动
        en: exposes discovery activity
        ja: 発見活動を公開する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryActivity-exposed_by-DiscoverySurface-example-positive-001
        kind: positive
        labels:
          zh: 资源模板公开发现活动
          en: Resource template exposes discovery activity
          ja: リソーステンプレートが発見活動を公開
        scenario_id: null
        descriptions:
          zh: 知识库服务器发布 resource://kb/{topic} 模板，并把该模板绑定到按主题列出候选资源的发现处理器；该处理器的 DiscoveryActivity 由此 DiscoverySurface 公开。
          en: A knowledge server publishes resource://kb/{topic} and binds that template to the handler that lists candidate resources by topic; the handler's DiscoveryActivity is exposed by this DiscoverySurface.
          ja: 知識サーバーが resource://kb/{topic} を公開し、トピック別候補を列挙するハンドラーに結び付けるため、その DiscoveryActivity はこの DiscoverySurface により公開されます。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - DiscoverySurface
        related_relation_ids:
          - DiscoveryActivity-exposed_by-DiscoverySurface
        expected_result:
          zh: 记录从发现活动指向实际公开它的资源模板描述符。
          en: Record the activity-to-surface fact for the resource template that actually exposes the handler.
          ja: 活動から、そのハンドラーを実際に公開するリソーステンプレート記述子への事実を記録します。
        why_valid_or_invalid:
          zh: 模板不仅给出地址，还与执行资源发现的处理器有明确绑定，满足“公开该活动”的关系条件。
          en: The template is explicitly bound to the resource-discovery handler, so it does more than name an address and satisfies the exposure condition.
          ja: テンプレートはアドレスを示すだけでなく発見ハンドラーに明示的に結び付くため、公開関係の条件を満たします。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-discovery-activity-015
          - claim-discovery-activity-016
      - id: DiscoveryActivity-exposed_by-DiscoverySurface-example-boundary-001
        kind: boundary
        labels:
          zh: 同服务器但未绑定
          en: Same server without a binding
          ja: 同一サーバーだが結び付きなし
        scenario_id: null
        descriptions:
          zh: 同一服务器既提供文件资源模板，也运行一个仅供内部健康检查使用的发现活动；文件模板没有绑定该内部活动，不能建立 exposed_by。
          en: One server offers a file resource template and also runs an internal health-check discovery activity. The template is not bound to that internal activity, so exposed_by does not hold.
          ja: 同じサーバーがファイル用リソーステンプレートと内部ヘルスチェック発見活動を持っていても、テンプレートが内部活動に結び付かないため exposed_by は成立しません。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - DiscoverySurface
        related_relation_ids:
          - DiscoveryActivity-exposed_by-DiscoverySurface
        expected_result:
          zh: 不为内部健康检查活动记录该发现入口。
          en: Do not associate the file discovery surface with the internal health-check activity.
          ja: ファイル発見面を内部ヘルスチェック活動に関連付けません。
        why_valid_or_invalid:
          zh: 服务器共址不是公开关系；必须有资源描述符到实际发现处理器的明确绑定。
          en: Server co-location is not exposure; the descriptor must be explicitly bound to the discovery handler it publishes.
          ja: サーバー上の共存は公開関係ではなく、記述子が公開対象の発見ハンドラーに明示的に結び付く必要があります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-discovery-activity-017
          - claim-discovery-activity-018
    source_claims:
      - claim-discovery-activity-019
      - claim-discovery-activity-020
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:DiscoverySurface
  - id: DiscoveryActivity-uses-LightIndex
    predicate: uses
    direction: source-to-target
    relation_kind: information
    labels:
      zh: uses
      en: uses
      ja: uses
    definitions:
      zh: 当一次发现活动实际读取某个 LightIndex 的条目、指针或顺序结构来形成候选集时，该活动 uses 此轻量索引；仅在配置中注册但本次未读取的索引不算被使用。
      en: DiscoveryActivity uses LightIndex when that execution actually reads the light index's entries, pointers, or ordering structure to form candidates; registration in configuration without a read in the execution is insufficient.
      ja: 発見活動の実行が候補形成のために LightIndex の項目・ポインタ・順序構造を実際に読む場合に uses が成立し、設定登録だけで今回読まれない索引には成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: used_by_discovery_activity
      labels:
        zh: 供发现活动使用
        en: used by discovery activity
        ja: 発見活動に使用される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryActivity-uses-LightIndex-example-positive-001
        kind: positive
        labels:
          zh: uses 关系正例
          en: Positive uses relation
          ja: uses 関係の正例
        scenario_id: null
        descriptions:
          zh: 查询 q-12 调用 SummaryIndex 的检索器，按索引节点顺序读取候选并返回结果；该 DiscoveryActivity uses 这个 LightIndex。
          en: Query q-12 invokes a SummaryIndex retriever, reads candidates from its ordered index nodes, and returns results; this DiscoveryActivity uses that LightIndex.
          ja: 問い合わせ q-12 が SummaryIndex 検索器を呼び、順序付き索引ノードから候補を読んで結果を返すため、この DiscoveryActivity は LightIndex を使用します。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - LightIndex
        related_relation_ids:
          - DiscoveryActivity-uses-LightIndex
        expected_result:
          zh: 记录 q-12 的活动到被实际读取的轻量索引。
          en: Record the q-12 activity against the light index actually read during retrieval.
          ja: q-12 の活動を検索中に実際に読まれた軽量索引へ関連付けます。
        why_valid_or_invalid:
          zh: 执行路径进入该索引的检索器并读取其 index_struct，提供实际使用证据，同时活动不取得索引生命周期所有权。
          en: The execution enters the index's retriever and reads its index_struct, providing use evidence without transferring index lifecycle ownership.
          ja: 実行が索引検索器に入り index_struct を読むため使用根拠があり、索引ライフサイクルの所有権は移りません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-discovery-activity-021
          - claim-discovery-activity-022
      - id: DiscoveryActivity-uses-LightIndex-example-boundary-001
        kind: boundary
        labels:
          zh: uses 关系边界例
          en: Boundary case for uses
          ja: uses 関係の境界例
        scenario_id: null
        descriptions:
          zh: 运行时同时注册 light-a 与 light-b，但路由 q-12 只调用 light-a 的检索器；不能因为 light-b 在注册表中就断言该活动 uses light-b。
          en: The runtime registers light-a and light-b, but q-12 invokes only light-a's retriever. Registration of light-b does not mean the activity uses light-b.
          ja: 実行環境に light-a と light-b が登録されても、q-12 が light-a の検索器だけを呼ぶなら、light-b の登録から uses を断言できません。
        field_values: {}
        related_node_ids:
          - DiscoveryActivity
          - LightIndex
        related_relation_ids:
          - DiscoveryActivity-uses-LightIndex
        expected_result:
          zh: 只为 light-a 记录 uses，不为 light-b 建边。
