  id: SearchResult-is_a-DiscoveryResult
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: SearchResult 是 DiscoveryResult 的专门类型，其限定差是作为明确查询、过滤器或匹配表达式的命中项被返回；来源引用应保留，但 score 与 rank 都是可选注释。
    en: SearchResult is a DiscoveryResult whose differentia is being returned as a match for an explicit query, filter, or matching expression; source reference is retained, while score and rank are optional annotations.
    ja: SearchResult は DiscoveryResult の専門型で、明示的な問い合わせ・フィルター・照合式への一致項目として返されます。出典参照は保持しますが score と rank は任意注釈です。
