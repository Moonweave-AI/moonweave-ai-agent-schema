schema: moonweave.ai/ontology-node/v1
id: SearchResult
kind: concept
labels:
  zh: 搜索结果
  en: search result
  ja: クエリ検索結果
semantics:
  short_definition:
    zh: 由查询匹配方法返回的 DiscoveryResult 特化。
    en: DiscoveryResult specialization returned by a query-matching method.
    ja: query matching method が返す DiscoveryResult 特化。
  definition:
    zh: SearchResult 映射 Cursor semantic codebase search hits、RAG lexical/vector 查询返回的单项命中；必须有 query 驱动的匹配，纯 resources/list 枚举不是 SearchResult。
    en: SearchResult maps Cursor semantic codebase search hits and single RAG lexical/vector query hits; requires query-driven matching—plain resources/list enumeration is not SearchResult.
    ja: Cursor semantic/RAG query hit。
  why_needed:
    zh: 保留“由搜索产生”语境，避免把所有列举误标为 search result。
    en: Preserves search-produced context and avoids mislabeling every enumeration as search result.
    ja: search vs list distinction。
  includes:
    - zh: search_method、query_text、source_uri/path、可选 SearchScore。
      en: search_method, query_text, source_uri/path, optional SearchScore.
      ja: method/query/uri/score。
  excludes:
    - zh: 无 query 的 resources/list、DiscoveryActivity 本身、IndexEntry。
      en: Query-free resources/list, DiscoveryActivity itself, and IndexEntry.
      ja: query-free list/activity/IndexEntry。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor semantic search "session validation"→SearchResult path=src/auth/middleware.ts score=0.91；对应 RAG document chunk hit 亦映射 SearchResult+IndexPointer。
    en: Cursor semantic search "session validation"→SearchResult path=src/auth/middleware.ts score=0.91; RAG document chunk hits also map SearchResult+IndexPointer.
    ja: semantic/RAG search hit mapping。
  typical_input:
    - description: Semantic search hit
      format: '{"path":"src/auth/middleware.ts","score":0.91,"rank":1}'
      source_claims:
        - claim-sres-cursor
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: SearchResult-example-cursor-semantic
    labels:
      zh: Cursor 语义命中
      en: Cursor semantic hit
      ja: Cursor semantic hit
    descriptions:
      zh: dres-901-1 SearchResult path=middleware.ts score=0.91 query="session validation"。
      en: dres-901-1 SearchResult path=middleware.ts score=0.91 query="session validation".
      ja: Cursor semantic hit。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: semantic search
    field_values:
      path: src/auth/middleware.ts
      score: 0.91
    related_node_ids:
      - SearchResult
      - LightweightRetrieval
    related_relation_ids: []
    source_claims:
      - claim-sres-cursor
  - id: SearchResult-example-rag-chunk
    labels:
      zh: RAG 块命中
      en: RAG chunk hit
      ja: RAG chunk hit
    descriptions:
      zh: RAG query 返回 doc chunk SearchResult source_uri=repo://docs/architecture.md。
      en: RAG query returns doc chunk SearchResult source_uri=repo://docs/architecture.md.
      ja: RAG chunk hit。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: RAG search
    field_values: {}
    related_node_ids:
      - SearchResult
      - IndexPointer
    related_relation_ids: []
    source_claims:
      - claim-sres-design
  - id: SearchResult-example-not-list
    labels:
      zh: 非 list 枚举
      en: Not list enumeration
      ja: list 列挙ではない
    descriptions:
      zh: resources/list 无 query 过滤的 URI 枚举是 DiscoveryResult 不是 SearchResult。
      en: resources/list URI enumeration without query is DiscoveryResult not SearchResult.
      ja: list≠search。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/list
    field_values: {}
    related_node_ids:
      - SearchResult
      - DiscoveryResult
    related_relation_ids: []
    source_claims:
      - claim-sres-design
parent_relation:
  id: SearchResult-is_a-DiscoveryResult
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: SearchResult 是 DiscoveryResult 的专门类型，其限定差是作为明确查询、过滤器或匹配表达式的命中项被返回；来源引用应保留，但 score 与 rank 都是可选注释。
    en: SearchResult is a DiscoveryResult whose differentia is being returned as a match for an explicit query, filter, or matching expression; source reference is retained, while score and rank are optional annotations.
    ja: SearchResult は DiscoveryResult の専門型で、明示的な問い合わせ・フィルター・照合式への一致項目として返されます。出典参照は保持しますが score と rank は任意注釈です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SearchResult-is_a-DiscoveryResult-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: FilterRetriever 按 department=legal 返回文档 d-21 及来源元数据，但不计算 score；d-21 是 SearchResult，也属于 DiscoveryResult。
        en: FilterRetriever returns document d-21 with source metadata for department=legal and computes no score; d-21 is a SearchResult and therefore a DiscoveryResult.
        ja: FilterRetriever が department=legal に一致する文書 d-21 を出典メタデータ付きで返し score を計算しない場合でも、d-21 は SearchResult であり DiscoveryResult です。
      field_values: {}
      related_node_ids:
        - SearchResult
        - DiscoveryResult
      related_relation_ids:
        - SearchResult-is_a-DiscoveryResult
      source_claims:
        - claim-search-result-009
        - claim-search-result-010
    - id: SearchResult-is_a-DiscoveryResult-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: MCP resources/list 无查询条件地枚举服务器资源；返回项是 DiscoveryResult，但没有作为查询或过滤命中返回，因此不是 SearchResult。
        en: MCP resources/list enumerates server resources without a query predicate. Its returned items are DiscoveryResult instances, but not SearchResult instances because no query or filter matched them.
        ja: MCP resources/list が検索条件なしで資源を列挙する場合、返却項目は DiscoveryResult ですが問い合わせ・フィルター一致ではないため SearchResult ではありません。
      field_values: {}
      related_node_ids:
        - SearchResult
        - DiscoveryResult
      related_relation_ids:
        - SearchResult-is_a-DiscoveryResult
      source_claims:
        - claim-search-result-011
        - claim-search-result-012
  source_claims:
    - claim-search-result-013
    - claim-search-result-014
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: SearchResult-scored_by-SearchScore
    predicate: scored_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: scored by
      en: scored by
      ja: scored by
    definitions:
      zh: 当 SearchScore 由产生该 SearchResult 的匹配方法针对同一 result_id 计算并附加时，SearchResult scored_by 该分数；没有评分的结果仍是有效 SearchResult，其他结果的分数不得借用。
      en: SearchResult is scored_by SearchScore when the matching method that produced the result computes and attaches that score for the same result_id; an unscored result remains valid, and another result's score cannot be borrowed.
      ja: その SearchResult を生成した照合手法が同じ result_id に対して SearchScore を計算・付与した場合に scored_by が成立し、無得点結果も有効で、別結果のスコアは流用できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_scored_by
      labels:
        zh: 反向：scored by
        en: is target of scored by
        ja: 逆方向：scored by
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SearchResult-scored_by-SearchScore-example-positive-001
        labels:
          zh: scored by正例
          en: Positive example of scored by
          ja: scored byの正例
        descriptions:
          zh: BM25Retriever 返回 SearchResult d-31，并在同一 Document 上设置 score=8.7；结果身份与评分值分离，因此 d-31 scored_by 这条 SearchScore。
          en: BM25Retriever returns SearchResult d-31 and sets score=8.7 on that same Document. Result identity and score value remain separate, so d-31 is scored_by this SearchScore.
          ja: BM25Retriever が SearchResult d-31 を返し同じ Document に score=8.7 を設定するため、結果同一性と値を分けて d-31 scored_by この SearchScore を記録します。
        field_values: {}
        related_node_ids:
          - SearchResult
          - SearchScore
        related_relation_ids:
          - SearchResult-scored_by-SearchScore
        source_claims:
          - claim-search-result-015
          - claim-search-result-016
      - id: SearchResult-scored_by-SearchScore-example-boundary-001
        labels:
          zh: scored by边界例
          en: Boundary case for scored by
          ja: scored byの境界例
        descriptions:
          zh: FilterRetriever 返回无分数的 d-21；同一批次另有 d-31 的 bm25:8.7，但 d-21 没有评分字段，不能建立 d-21 scored_by bm25:8.7。
          en: FilterRetriever returns unscored d-21. The batch also contains bm25:8.7 for d-31, but d-21 has no score field, so d-21 is not scored_by bm25:8.7.
          ja: FilterRetriever が無得点の d-21 を返し、同じバッチに d-31 用 bm25:8.7 があっても、d-21 に score がないため d-21 scored_by bm25:8.7 は成立しません。
        field_values: {}
        related_node_ids:
          - SearchResult
          - SearchScore
        related_relation_ids:
          - SearchResult-scored_by-SearchScore
        source_claims:
          - claim-search-result-017
          - claim-search-result-018
    source_claims:
      - claim-search-result-019
      - claim-search-result-020
    layout_role: cross-link
    target: concept:SearchScore
sources:
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-search-result-001
    source: eng-fw-haystack-repo
    supports: Haystack BM25 retrieval accepts a query and returns Document candidates, supporting SearchResult as a query-matched subtype of the broader discovery-result artifact.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > run query and returned documents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-002
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list returns descriptors without query matching, providing first-party contrast evidence for discovery results that are not SearchResult records.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-003
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever.run takes a query and returns documents, directly supporting the query-matched candidate in this positive case.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-004
    source: eng-fw-haystack-repo
    supports: Haystack Document provides ID and optional score fields on returned records, supporting the candidate identity and separate score linkage.
    locator: haystack/dataclasses/document.py > Document.id and score
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-005
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list returns available Resource descriptors through listing, with no query-matching input in the operation, supporting the non-search discovery boundary.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-006
    source: eng-fw-haystack-repo
    supports: Haystack BM25 retrieval explicitly requires a query, providing the contrasting query-matching behavior that the resource-list result lacks.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > run query parameter
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-007
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever.run receives a query and returns Document records, directly supporting the search method and candidate payload in this instance.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-008
    source: eng-fw-haystack-repo
    supports: Haystack Document defines stable ID and optional score fields, supporting the concrete result identity and optional score observation.
    locator: haystack/dataclasses/document.py > Document.id and score
    evidence_kind: design-inference
    confidence: medium
  - id: claim-search-result-009
    source: eng-fw-haystack-repo
    supports: Haystack FilterRetriever returns documents selected by filters and does not require a relevance score, grounding a score-optional search result.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run
    evidence_kind: official
    confidence: high
  - id: claim-search-result-010
    source: eng-fw-haystack-repo
    supports: The returned Document preserves id, content, and meta independently of score, supporting source-bearing result identity.
    locator: haystack/dataclasses/document.py > Document.id, content, meta, and optional score
    evidence_kind: official
    confidence: high
  - id: claim-search-result-011
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list is a listing operation over available resources and defines no free-text query or filter match, grounding the non-search discovery boundary.
    locator: Server Features > Resources > Listing resources > resources/list request parameters
    evidence_kind: normative
    confidence: high
  - id: claim-search-result-012
    source: eng-fw-haystack-repo
    supports: Haystack FilterRetriever requires filters that determine returned matches, contrasting with unconditional resource enumeration.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run filters parameter
    evidence_kind: official
    confidence: high
  - id: claim-search-result-013
    source: eng-fw-haystack-repo
    supports: FilterRetriever's match-driven document output grounds SearchResult as a specialized DiscoveryResult and shows that a score is not required.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run output documents
    evidence_kind: design-inference
    confidence: high
  - id: claim-search-result-014
    source: eng-proto-mcp-2025-spec
    supports: "MCP resources/list provides the contrasting parent-only case: a discovery result can be returned without query matching, preserving a genuine subtype boundary."
    locator: Server Features > Resources > Listing resources > resources/list
    evidence_kind: design-inference
    confidence: high
  - id: claim-search-result-015
    source: eng-fw-haystack-repo
    supports: Haystack BM25Retriever assigns the computed score to each returned Document, grounding a result-specific scored_by link.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run > document.score
    evidence_kind: official
    confidence: high
  - id: claim-search-result-016
    source: eng-fw-haystack-repo
    supports: Document models score as a separate optional field on the result object, supporting a quality relation rather than a taxonomy parent.
    locator: haystack/dataclasses/document.py > Document.score
    evidence_kind: official
    confidence: high
  - id: claim-search-result-017
    source: eng-fw-haystack-repo
    supports: Haystack FilterRetriever can return Documents without assigning score, grounding a valid unscored SearchResult.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run output documents
    evidence_kind: official
    confidence: high
  - id: claim-search-result-018
    source: eng-fw-haystack-repo
    supports: Document.score belongs to the individual Document instance, so a score on d-31 cannot be attached to d-21 by batch association.
    locator: haystack/dataclasses/document.py > Document.score field on each Document
    evidence_kind: official
    confidence: high
  - id: claim-search-result-019
    source: eng-fw-haystack-repo
    supports: Haystack's per-Document score field grounds SearchResult scored_by SearchScore as an object-specific quality relation.
    locator: haystack/dataclasses/document.py > Document.score
    evidence_kind: design-inference
    confidence: high
  - id: claim-search-result-020
    source: eng-fw-haystack-repo
    supports: FilterRetriever's unscored output demonstrates that scored_by is optional and cannot be inferred for every SearchResult.
    locator: haystack/components/retrievers/filter_retriever.py > FilterRetriever.run
    evidence_kind: design-inference
    confidence: high
  - id: claim-sres-cursor
    source: src-cursor-search
    supports: Cursor semantic search hits classify as SearchResult with query and score.
    locator: semantic search
    evidence_kind: official-doc
    confidence: high
  - id: claim-sres-design
    source: src-info-indexing-design
    supports: SearchResult requires query-driven matching distinct from query-free enumeration.
    locator: SearchResult
    evidence_kind: design-inference
    confidence: high
