        expected_result:
          zh: 建立 d-31 到 bm25:8.7 的 scored_by 边。
          en: Create the scored_by edge from d-31 to bm25:8.7.
          ja: d-31 から bm25:8.7 への scored_by 辺を作成します。
        why_valid_or_invalid:
          zh: 评分由本次 BM25 匹配计算并附着于同一返回文档，可从结果直接解析到其评分。
          en: The current BM25 match computes the score and attaches it to the same returned document, so the score is directly resolvable from the result.
          ja: 今回の BM25 照合がスコアを計算し同じ返却文書に付与するため、結果から直接解決できます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-search-result-015
          - claim-search-result-016
      - id: SearchResult-scored_by-SearchScore-example-boundary-001
        kind: boundary
        labels:
          zh: scored by边界例
          en: Boundary case for scored by
          ja: scored byの境界例
        scenario_id: null
        descriptions:
          zh: FilterRetriever 返回无分数的 d-21；同一批次另有 d-31 的 bm25:8.7，但 d-21 没有评分字段，不能建立 d-21 scored_by bm25:8.7。
          en: FilterRetriever returns unscored d-21. The batch also contains bm25:8.7 for d-31, but d-21 has no score field, so d-21 is not scored_by bm25:8.7.
          ja: FilterRetriever が無得点の d-21 を返し、同じバッチに d-31 用 bm25:8.7 があっても、d-21 に score がないため d-21 scored_by bm25:8.7 は成立しません。
        field_values: {}
        related_node_ids:
          - SearchResult
          - SearchScore
        related_relation_ids:
          - SearchResult-scored_by-SearchScore
        expected_result:
          zh: 保留 d-21 的 SearchResult 身份，不附加任何 SearchScore。
          en: Retain d-21 as SearchResult and attach no SearchScore.
          ja: d-21 の SearchResult 同一性を保持し SearchScore を付けません。
        why_valid_or_invalid:
          zh: scored_by 要求分数与同一结果身份绑定；批次共存或相同查询不能转移其他结果的评分。
          en: scored_by requires the score to be bound to the same result identity; batch membership or a shared query cannot transfer another result's score.
          ja: scored_by は同じ結果同一性へのスコア束縛を要し、同じバッチや問い合わせから別結果のスコアを移せません。
