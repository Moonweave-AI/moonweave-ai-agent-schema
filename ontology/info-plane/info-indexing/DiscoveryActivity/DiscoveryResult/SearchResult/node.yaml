schema: moonweave.ai/ontology-node/v1
id: SearchResult
kind: concept
status: review
labels:
  zh: 搜索结果
  en: search result
  ja: クエリ検索結果
semantics:
  short_definition:
    zh: 搜索结果是搜索匹配方法针对查询返回的发现结果。
    en: A search result is a DiscoveryResult returned by matching a query with a search method.
    ja: 検索結果は、検索方式がクエリを照合して返す DiscoveryResult です。
  definition:
    zh: SearchResult 是 DiscoveryResult 的一种：它记录搜索方法把查询与索引或语料进行词法、语义或混合匹配后返回的一个候选。它可以附带 SearchScore 与 CandidateRank，但两者不是成员资格的必填条件；单纯 resources/list、无查询过滤或直接枚举产生的 DiscoveryResult 不自动成为 SearchResult。
    en: SearchResult is a kind of DiscoveryResult recording one candidate returned after a search method matches a query against an index or corpus lexically, semantically, or with a hybrid method. It may carry SearchScore and CandidateRank, but neither is required for membership; a DiscoveryResult produced by resources/list, query-free filtering, or direct enumeration is not automatically a SearchResult.
    ja: SearchResult は DiscoveryResult の一種で、検索方式がクエリを索引・コーパスへ語彙的、意味的、混合的に照合して返した候補を記録します。SearchScore と CandidateRank を伴えますが必須ではなく、resources/list、クエリなしフィルタ、直接列挙による DiscoveryResult は自動的に SearchResult になりません。
  why_needed:
    zh: 该概念保留“候选由搜索匹配产生”这一可审计语境，使评估者可以解释查询、匹配方法、分数和排序，同时不会把所有资源枚举结果误标为搜索结果。
    en: The concept preserves the auditable fact that a candidate came from search matching, enabling explanation of query, method, score, and rank without mislabeling every listed resource as a search result.
    ja: 候補が検索照合から生じたという監査可能な文脈を保ち、クエリ、方式、スコア、順位を説明しつつ、全資源列挙結果を検索結果と誤分類しません。
  includes:
    - zh: 纳入 BM25、向量相似度、混合搜索或等价查询匹配方法返回的单项候选记录，无论其是否额外带有分数或排名。
      en: Includes individual candidate records returned by BM25, vector similarity, hybrid search, or an equivalent query-matching method, whether or not a score or rank is attached.
      ja: BM25、ベクトル類似度、ハイブリッド検索、同等のクエリ照合方式が返す個別候補記録を、スコア・順位の有無にかかわらず含みます。
  excludes:
    - zh: 排除无查询资源列表、按固定元数据条件直接枚举的 DiscoveryResult、搜索活动本身、SearchScore 数值观测以及已被选入上下文的内容副本。
      en: Excludes query-free resource listings, DiscoveryResult records directly enumerated by fixed metadata conditions, the search activity itself, a SearchScore observation, and content copied into context.
      ja: クエリなし資源一覧、固定メタデータ条件で直接列挙された DiscoveryResult、検索活動自体、SearchScore 観測、コンテキストへ複製済み内容を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SearchResult-example-positive-001
    kind: positive
    labels:
      zh: 搜索结果正例
      en: Positive example of search result
      ja: 検索結果の正例
    scenario_id: null
    descriptions:
      zh: InMemoryBM25Retriever 使用查询“退款期限”搜索文档存储并返回 Document(id=policy-17, score=0.812)；该候选保留产生它的查询和 BM25 方法。
      en: InMemoryBM25Retriever searches a document store for query 'refund deadline' and returns Document(id=policy-17, score=0.812), preserving the query and BM25 method that produced the candidate.
      ja: InMemoryBM25Retriever が「返金期限」クエリで文書ストアを検索し Document(id=policy-17, score=0.812) を返し、候補を生成したクエリと BM25 方式を保持します。
    field_values:
      result_id: search-result-policy-17
      artifact_id: retrieval-artifact-search-policy-17
      created_at: 2026-07-16T09:43:18Z
    related_node_ids:
      - SearchResult
      - SearchScore
    related_relation_ids:
      - SearchResult-scored_by-SearchScore
    expected_result:
      zh: policy-17 被识别为 SearchResult，并可通过 SearchResult-scored_by-SearchScore 关联本次 BM25 分数。
      en: policy-17 is classified as a SearchResult and may link to its BM25 score through SearchResult-scored_by-SearchScore.
      ja: policy-17 は SearchResult と分類され、SearchResult-scored_by-SearchScore で今回の BM25 スコアへ関連付けられます。
    why_valid_or_invalid:
      zh: Haystack 的 BM25 retriever 明确消费 query 并返回 documents，因此该候选不仅是发现结果，还具有搜索匹配来源。
      en: Haystack's BM25 retriever explicitly consumes a query and returns documents, so the candidate has search-matching provenance in addition to being a discovery result.
      ja: Haystack BM25 retriever は query を消費して documents を返すため、候補は発見結果であるだけでなく検索照合由来を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-search-result-003
      - claim-search-result-004
  - id: SearchResult-example-boundary-001
    kind: boundary
    labels:
      zh: 搜索结果边界例
      en: Boundary case for search result
      ja: 検索結果の境界例
    scenario_id: null
    descriptions:
      zh: MCP resources/list 返回 URI=file:///handbook/refund.md 的资源描述符，但调用没有查询字符串或匹配方法；它是 DiscoveryResult，却没有搜索语义。
      en: MCP resources/list returns the resource descriptor URI=file:///handbook/refund.md without a query string or matching method; it is a DiscoveryResult but lacks search semantics.
      ja: MCP resources/list が URI=file:///handbook/refund.md の資源記述子を返しますが、クエリ文字列も照合方式もありません。DiscoveryResult ですが検索意味を持ちません。
    field_values: {}
    related_node_ids:
      - SearchResult
      - SearchScore
      - RetrievedCandidate
    related_relation_ids:
      - SearchResult-scored_by-SearchScore
    expected_result:
      zh: 该候选保持 DiscoveryResult 类型，不得分类为 SearchResult。
      en: The candidate remains a DiscoveryResult and must not be classified as a SearchResult.
      ja: 候補は DiscoveryResult のままで、SearchResult に分類してはなりません。
    why_valid_or_invalid:
      zh: 资源枚举与查询匹配都是发现方式，但前者没有“查询与语料匹配”这一子类种差，因此不能仅凭返回候选就提升为搜索结果。
      en: Resource enumeration and query matching are both discovery modes, but enumeration lacks the query-to-corpus matching differentia, so returning a candidate alone cannot establish SearchResult membership.
      ja: 資源列挙とクエリ照合はいずれも発見方式ですが、前者はクエリ対コーパス照合の種差を欠き、候補返却だけで SearchResult にはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-search-result-005
      - claim-search-result-006
  - id: SearchResult-example-instance-001
    kind: instance
    labels:
      zh: 搜索结果结构化实例
      en: Structured instance of search result
      ja: 検索結果の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: SearchResult search-result-policy-17 包装 Haystack Document policy-17，并记录 query='refund deadline'、method='BM25' 和可选 score=0.812。
      en: SearchResult search-result-policy-17 wraps Haystack Document policy-17 and records query='refund deadline', method='BM25', and optional score=0.812.
      ja: SearchResult search-result-policy-17 が Haystack Document policy-17 を包み、query='refund deadline'、method='BM25'、任意 score=0.812 を記録します。
    field_values:
      result_id: search-result-policy-17
      query: refund deadline
      method: BM25
    related_node_ids:
      - SearchResult
    related_relation_ids: []
    expected_result:
      zh: 该实例作为 SearchResult 显示，并保留其上位 DiscoveryResult 身份。
      en: The instance is displayed as a SearchResult while retaining its broader DiscoveryResult identity.
      ja: インスタンスは SearchResult として表示され、上位 DiscoveryResult の同一性も保持します。
    why_valid_or_invalid:
      zh: 实例明确保留查询与搜索方法，证明候选来自搜索匹配；score 仅作为可选关联，不承担类型判定。
      en: The instance preserves query and search method, proving search-matching provenance; score remains an optional association rather than the type criterion.
      ja: クエリと検索方式を明示して検索照合由来を証明し、score は型判定ではなく任意関連に留まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-search-result-007
      - claim-search-result-008
