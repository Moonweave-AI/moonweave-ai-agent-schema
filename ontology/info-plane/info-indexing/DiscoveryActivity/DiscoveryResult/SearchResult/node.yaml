relations:
  - id: SearchResult-scored_by-SearchScore
    predicate: scored_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: scored by
      en: scored by
      ja: scored by
    definitions:
      zh: 当 SearchScore 由产生该 SearchResult 的匹配方法针对同一 result_id 计算并附加时，SearchResult scored_by 该分数；没有评分的结果仍是有效 SearchResult，其他结果的分数不得借用。
      en: SearchResult is scored_by SearchScore when the matching method that produced the result computes and attaches that score for the same result_id; an unscored result remains valid, and another result's score cannot be borrowed.
      ja: その SearchResult を生成した照合手法が同じ result_id に対して SearchScore を計算・付与した場合に scored_by が成立し、無得点結果も有効で、別結果のスコアは流用できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_scored_by
      labels:
        zh: 反向：scored by
        en: is target of scored by
        ja: 逆方向：scored by
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SearchResult-scored_by-SearchScore-example-positive-001
        labels:
          zh: scored by正例
          en: Positive example of scored by
          ja: scored byの正例
        scenario_id: null
        descriptions:
          zh: BM25Retriever 返回 SearchResult d-31，并在同一 Document 上设置 score=8.7；结果身份与评分值分离，因此 d-31 scored_by 这条 SearchScore。
          en: BM25Retriever returns SearchResult d-31 and sets score=8.7 on that same Document. Result identity and score value remain separate, so d-31 is scored_by this SearchScore.
          ja: BM25Retriever が SearchResult d-31 を返し同じ Document に score=8.7 を設定するため、結果同一性と値を分けて d-31 scored_by この SearchScore を記録します。
        field_values: {}
        related_node_ids:
          - SearchResult
          - SearchScore
        related_relation_ids:
          - SearchResult-scored_by-SearchScore
        source_claims:
          - claim-search-result-015
          - claim-search-result-016
      - id: SearchResult-scored_by-SearchScore-example-boundary-001
        labels:
          zh: scored by边界例
          en: Boundary case for scored by
          ja: scored byの境界例
        scenario_id: null
        descriptions:
          zh: FilterRetriever 返回无分数的 d-21；同一批次另有 d-31 的 bm25:8.7，但 d-21 没有评分字段，不能建立 d-21 scored_by bm25:8.7。
          en: FilterRetriever returns unscored d-21. The batch also contains bm25:8.7 for d-31, but d-21 has no score field, so d-21 is not scored_by bm25:8.7.
          ja: FilterRetriever が無得点の d-21 を返し、同じバッチに d-31 用 bm25:8.7 があっても、d-21 に score がないため d-21 scored_by bm25:8.7 は成立しません。
        field_values: {}
        related_node_ids:
