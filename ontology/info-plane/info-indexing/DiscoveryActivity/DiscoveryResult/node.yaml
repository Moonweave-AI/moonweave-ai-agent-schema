schema: moonweave.ai/ontology-node/v1
id: DiscoveryResult
kind: concept
status: review
labels:
  zh: 发现结果
  en: discovery result
  ja: 発見結果
semantics:
  short_definition:
    zh: 发现结果是一次发现活动返回的、指向一个候选对象的检索产物。
    en: A discovery result is a retrieval artifact returned for one candidate by a discovery activity.
    ja: 発見結果は、発見活動が一つの候補について返す検索成果物です。
  definition:
    zh: DiscoveryResult 是 RetrievalArtifact 的一种：它记录某次 DiscoveryActivity 暴露的候选及其结果身份，并可附带来源、分数或选择状态。通用发现结果不强制具有排名、分数或可重放 trace，因为资源枚举和过滤检索也能产生未排序、未追踪的候选；成为结果也不表示已被选入上下文。
    en: DiscoveryResult is a kind of RetrievalArtifact that records a candidate exposed by one DiscoveryActivity and its result identity, optionally with provenance, score, or selection state. A generic discovery result does not require rank, score, or a replayable trace because resource listing and filtering can also yield unranked, untraced candidates; being a result does not imply context admission.
    ja: DiscoveryResult は RetrievalArtifact の一種で、一回の DiscoveryActivity が提示した候補と結果識別を記録し、出典、スコア、選択状態を任意で伴います。資源一覧やフィルタ検索も未順位・未追跡の候補を返せるため、一般的な発見結果は順位、スコア、再生可能 trace を必須とせず、結果であることはコンテキスト採用を意味しません。
  why_needed:
    zh: 该概念把“活动找到了什么”与“后来选择了什么”分开，并允许同一结果在没有排名或 trace 的发现方式中仍被稳定引用，避免把检索器实现细节误设为所有结果的必备条件。
    en: The concept separates what an activity found from what was later selected, and lets the same result be referenced even when the discovery method supplies neither rank nor trace, preventing retriever implementation details from becoming universal result requirements.
    ja: この概念は、活動が発見したものと後で選択したものを分離し、順位や trace を出さない発見方式でも同じ結果を安定して参照できるようにして、retriever 実装詳細の一般要件化を防ぎます。
  includes:
    - zh: 纳入资源枚举、过滤检索、关键词搜索或其他轻量发现活动返回的候选记录；每项至少具有可在本次结果集中引用的结果身份。
      en: Includes candidate records returned by resource listing, filter retrieval, keyword search, or another lightweight discovery activity; each has at least an identity usable within the result set.
      ja: 資源一覧、フィルタ検索、キーワード検索、その他の軽量発見活動が返す候補記録を含み、各項目は少なくとも結果集合内で参照可能な識別を持ちます。
  excludes:
    - zh: 排除保存候选集合的 DiscoveryIndex、执行查询的 DiscoveryActivity、独立的 CandidateRank 或 DiscoveryScore，以及已经复制进上下文的内容块。
      en: Excludes the DiscoveryIndex that stores candidate structure, the DiscoveryActivity that performs the query, a separate CandidateRank or DiscoveryScore observation, and content already copied into context.
      ja: 候補構造を保持する DiscoveryIndex、照会を実行する DiscoveryActivity、独立した CandidateRank または DiscoveryScore 観測、既にコンテキストへ複製された内容を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DiscoveryResult-example-positive-001
    kind: positive
    labels:
      zh: 发现结果正例
      en: Positive example of discovery result
      ja: 発見結果の正例
    scenario_id: null
    descriptions:
      zh: 客户端调用 resources/list 后得到 URI 为 file:///handbook/refund.md 的资源描述符，并以继承的 artifact_id=retrieval-artifact-discovery-result-001 记录这项返回候选；协议没有为它提供排名或 trace。
      en: After calling resources/list, a client receives the resource descriptor with URI file:///handbook/refund.md and records that returned candidate under inherited artifact_id retrieval-artifact-discovery-result-001; the protocol supplies neither rank nor trace for it.
      ja: クライアントが resources/list を呼び出し、URI file:///handbook/refund.md の資源記述子を受け取り、継承した artifact_id retrieval-artifact-discovery-result-001 で返却候補を記録します。プロトコルは順位も trace も与えません。
    field_values:
      artifact_id: retrieval-artifact-discovery-result-001
      created_at: 2026-07-16T09:42:00Z
    related_node_ids:
      - DiscoveryResult
      - ContextAssembly
    related_relation_ids:
      - ContextAssembly-consumes-DiscoveryResult
    expected_result:
      zh: 系统接受该记录为 DiscoveryResult，即使它没有 CandidateRank、DiscoveryScore 或 LightweightRetrievalTrace。
      en: The record is accepted as a DiscoveryResult even though it has no CandidateRank, DiscoveryScore, or LightweightRetrievalTrace.
      ja: CandidateRank、DiscoveryScore、LightweightRetrievalTrace がなくても、この記録は DiscoveryResult として受理されます。
    why_valid_or_invalid:
      zh: resources/list 明确产生资源描述符列表，但未规定排序观测或追踪，因此候选返回事实与可选度量、可选 trace 被正确分开。
      en: resources/list explicitly yields a list of resource descriptors without specifying a ranking observation or trace, so candidate return is correctly separated from optional measures and tracing.
      ja: resources/list は資源記述子一覧を返しますが順位観測や trace を規定しないため、候補返却を任意の測定・追跡から正しく分離しています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-result-003
      - claim-discovery-result-004
  - id: DiscoveryResult-example-boundary-001
    kind: boundary
    labels:
      zh: 发现结果边界例
      en: Boundary case for discovery result
      ja: 発見結果の境界例
    scenario_id: null
    descriptions:
      zh: InMemoryBM25Retriever 接收 query 并返回 documents；retriever 是执行发现的组件，而返回的 Document 才能形成 DiscoveryResult，不能把执行者与产物合并。
      en: InMemoryBM25Retriever accepts a query and returns documents; the retriever is the component performing discovery, while a returned Document can form a DiscoveryResult, so performer and artifact must not be merged.
      ja: InMemoryBM25Retriever は query を受け取り documents を返します。retriever は発見を実行する構成要素で、返却 Document が DiscoveryResult になり得るため、実行者と成果物を統合してはいけません。
    field_values: {}
    related_node_ids:
      - DiscoveryResult
      - ContextAssembly
    related_relation_ids:
      - ContextAssembly-consumes-DiscoveryResult
    expected_result:
      zh: InMemoryBM25Retriever 被识别为检索组件或 DiscoveryActivity 的实现，而不是 DiscoveryResult。
      en: InMemoryBM25Retriever is classified as a retrieval component or implementation of DiscoveryActivity, not as a DiscoveryResult.
      ja: InMemoryBM25Retriever は検索構成要素または DiscoveryActivity の実装として分類され、DiscoveryResult には分類されません。
    why_valid_or_invalid:
      zh: 官方接口把 query 输入、retriever 执行与 documents 输出明确分开；只有输出候选记录具备检索产物角色。
      en: The official interface separates query input, retriever execution, and documents output; only the returned candidate record has the retrieval-artifact role.
      ja: 公式インターフェースは query 入力、retriever 実行、documents 出力を分離し、返却候補記録だけが検索成果物の役割を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-result-005
      - claim-discovery-result-006
  - id: DiscoveryResult-example-instance-001
    kind: instance
    labels:
      zh: 发现结果结构化实例
      en: Structured instance of discovery result
      ja: 発見結果の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: Haystack 过滤检索返回 Document(id=policy-17, score=None)；该候选沿 RetrievalArtifact 身份记录为 artifact_id=retrieval-artifact-discovery-result-policy-17，而不虚构排名或 trace。
      en: A Haystack filter retrieval returns Document(id=policy-17, score=None); the candidate retains RetrievalArtifact identity as artifact_id retrieval-artifact-discovery-result-policy-17 without inventing rank or trace.
      ja: Haystack のフィルタ検索が Document(id=policy-17, score=None) を返し、候補は RetrievalArtifact の同一性を artifact_id retrieval-artifact-discovery-result-policy-17 として保持し、順位や trace を捏造しません。
    field_values:
      artifact_id: retrieval-artifact-discovery-result-policy-17
      created_at: 2026-07-16T09:45:00Z
    related_node_ids:
      - DiscoveryResult
    related_relation_ids: []
    expected_result:
      zh: 该对象作为一个未评分、未排名的 DiscoveryResult 实例通过验证。
      en: The object validates as an unscored and unranked DiscoveryResult instance.
      ja: この対象は未スコア・未順位の DiscoveryResult インスタンスとして検証されます。
    why_valid_or_invalid:
      zh: Document 身份支持结果引用，score 在官方数据类中为可选，因此缺少分数、排名与 trace 不否定结果资格。
      en: Document identity supports result reference, while score is optional in the official dataclass, so absent score, rank, and trace do not disqualify the result.
      ja: Document の識別は結果参照を支え、公式データクラスで score は任意なので、スコア、順位、trace の欠如は結果資格を否定しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-result-007
      - claim-discovery-result-008
