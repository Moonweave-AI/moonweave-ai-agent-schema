schema: moonweave.ai/ontology-node/v1
id: DiscoveryResult
kind: concept
labels:
  zh: 发现结果
  en: discovery result
  ja: 発見結果
semantics:
  short_definition:
    zh: 一次发现活动产出的单个候选项记录。
    en: Single candidate record produced by one discovery activity.
    ja: 一回の discovery activity が产出する単一候補 record。
  definition:
    zh: DiscoveryResult 记录 source_uri、matched_predicate、rank、score 与 discovery_activity_id；可以是 MCP URI、prompt name 或 repo 路径，但不是 IndexEntry 或已纳入上下文的 ContentBlock。
    en: DiscoveryResult records source_uri, matched_predicate, rank, score, and discovery_activity_id for MCP URIs, prompt names, or repo paths—not an IndexEntry or context-admitted ContentBlock.
    ja: session-local candidate record。
  why_needed:
    zh: 候选项记录使 context assembly 能审计“为何选中这三份 Markdown”。
    en: Candidate records let context assembly audit why these three Markdown files were selected.
    ja: candidate provenance for context assembly。
  includes:
    - zh: result_id、source_uri、rank、score、matched_predicate。
      en: result_id, source_uri, rank, score, matched_predicate.
      ja: result_id/uri/rank/score/predicate。
  excludes:
    - zh: IndexEntry 永久 ordinal、已读取正文副本。
      en: Permanent IndexEntry ordinal and already-read body copies.
      ja: IndexEntry ordinal/body copy。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: disc-101 产出 dres-101-1..3 source_uri=repo://docs/*.md rank 1..3 score 0.94..0.86。
    en: disc-101 produces dres-101-1..3 source_uri=repo://docs/*.md rank 1..3 score 0.94..0.86.
    ja: ranked discovery results。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: DiscoveryResult-example-markdown-triple
    labels:
      zh: 三 Markdown 候选
      en: Three Markdown candidates
      ja: 三 Markdown 候補
    descriptions:
      zh: dres-101-1 rank=1 source_uri=repo://docs/architecture.md score=0.94。
      en: dres-101-1 rank=1 source_uri=repo://docs/architecture.md score=0.94.
      ja: ranked markdown hit。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: filtered list
    field_values: {}
    related_node_ids:
      - DiscoveryResult
      - DiscoveryActivity
    related_relation_ids: []
    source_claims:
      - claim-dres-mcp
  - id: DiscoveryResult-example-prompt-name
    labels:
      zh: prompt 名称候选
      en: Prompt name candidate
      ja: prompt name 候補
    descriptions:
      zh: disc-prompts-8 每个 prompt name 是一个 DiscoveryResult rank 按返回顺序。
      en: disc-prompts-8 each prompt name is a DiscoveryResult ranked in return order.
      ja: prompt list result。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: prompts/list
    field_values: {}
    related_node_ids:
      - DiscoveryResult
    related_relation_ids: []
    source_claims:
      - claim-dres-mcp-prompts
  - id: DiscoveryResult-example-session-bound-rank
    labels:
      zh: 会话绑定 rank
      en: Session-bound rank
      ja: session-bound rank
    descriptions:
      zh: 同一 source_uri 在 disc-101 rank=1 与 disc-220 rank=3 不得合并。
      en: Same source_uri rank=1 in disc-101 and rank=3 in disc-220 must not merge.
      ja: rank binds to activity/session。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: rank binding
    field_values: {}
    related_node_ids:
      - DiscoveryResult
    related_relation_ids: []
    source_claims:
      - claim-dres-design
parent_relation:
  id: DiscoveryActivity-produces-DiscoveryResult
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: produces
    en: produces
    ja: produces
  definitions:
    zh: 当某个候选内容或引用是一次发现活动实际返回的输出时，该 DiscoveryActivity produces 该 DiscoveryResult；预存于索引但未被此次活动返回的对象不建立此边。
    en: DiscoveryActivity produces DiscoveryResult when the candidate content or reference is an actual output of that activity execution; an item stored in an index but not returned by the execution does not satisfy the relation.
    ja: 候補内容または参照がその発見活動の実際の出力として返された場合に、DiscoveryActivity は DiscoveryResult を生成します。索引に保存されていても今回返されない項目には成立しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 produces
      en: inverse produces
      ja: 逆 produces
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DiscoveryActivity-produces-DiscoveryResult-example-positive-001
      labels:
        zh: produces 关系正例
        en: Positive produces relation
        ja: produces 関係の正例
      descriptions:
        zh: 运行 retrieval-91 的 BM25 检索活动返回文档 d-17，并在结果上保留 result_id 与来源引用；因此该活动 produces 这一 DiscoveryResult。
        en: BM25 retrieval run retrieval-91 returns document d-17 with a result ID and source reference, so that activity produces this DiscoveryResult.
        ja: BM25 検索実行 retrieval-91 が文書 d-17 を result ID と出典参照付きで返すため、その活動はこの DiscoveryResult を生成します。
      field_values: {}
      related_node_ids:
        - DiscoveryActivity
        - DiscoveryResult
      related_relation_ids:
        - DiscoveryActivity-produces-DiscoveryResult
      source_claims:
        - claim-discovery-result-009
        - claim-discovery-result-010
    - id: DiscoveryActivity-produces-DiscoveryResult-example-boundary-001
      labels:
        zh: produces 关系边界例
        en: Boundary case for produces
        ja: produces 関係の境界例
      descriptions:
        zh: 文档 d-88 存在于同一索引，但 retrieval-91 的返回数组中没有它；索引成员身份不能证明该活动 produces d-88 的结果。
        en: Document d-88 exists in the same index but is absent from retrieval-91's returned array; index membership does not prove that this activity produced a result for d-88.
        ja: 文書 d-88 は同じ索引に存在しますが retrieval-91 の返却配列にはなく、索引メンバーであるだけではこの活動が d-88 の結果を生成したとはいえません。
      field_values: {}
      related_node_ids:
        - DiscoveryActivity
        - DiscoveryResult
      related_relation_ids:
        - DiscoveryActivity-produces-DiscoveryResult
      source_claims:
        - claim-discovery-result-011
        - claim-discovery-result-012
  source_claims:
    - claim-discovery-result-013
    - claim-discovery-result-014
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: DiscoveryResult-ranked_at-CandidateRank
    predicate: ranked_at
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录候选排名
      en: ranked at
      ja: 候補順位を記録する
    definitions:
      zh: 该关系把一次发现活动返回的 DiscoveryResult 连接到描述其在同一次运行、有序候选集和明确起点约定中所处位置的 CandidateRank；它不把得分、最终上下文槽位或跨运行聚合值冒充排名。
      en: Links a DiscoveryResult returned by a discovery activity to the CandidateRank that records its position within the same run, ordered candidate set, and declared origin convention. It does not treat a score, final context slot, or cross-run aggregate as a rank.
      ja: 発見活動が返した DiscoveryResult を、同一実行・順序付き候補集合・明示起点規約での位置を記録する CandidateRank へ結びます。score、最終 context slot、実行横断集計を順位として扱いません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 未排序结果可以没有排名，同一结果也可在不同排序阶段拥有不同 CandidateRank；具体基数由运行与 ordering_basis 限定。
      en: An unranked result may have no rank, and one result may have different CandidateRank observations at different ordering stages; the run and ordering_basis delimit concrete cardinality.
      ja: 未順位の結果は rank を持たず、一つの結果が異なる ordering stage で複数 CandidateRank を持ち得るため、具体基数は run と ordering_basis で限定します。
    inverse_reading:
      predicate: ranks_discovery_result
      labels:
        zh: 排名对应发现结果
        en: ranks discovery result
        ja: 発見結果を順位付けする
    conditions:
      - id: DiscoveryResult-ranked_at-CandidateRank-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when CandidateRank.run_id, candidate_id, position, origin, and ordering_basis are jointly auditable and candidate_id refers to this DiscoveryResult.
        source_claims:
          - claim-discovery-result-015
        explanation:
          zh: 仅当 CandidateRank.run_id、candidate_id、position、origin 和 ordering_basis 可共同核对，且 candidate_id 指向该 DiscoveryResult 时建立此边。
          en: Assert the edge only when CandidateRank.run_id, candidate_id, position, origin, and ordering_basis are jointly auditable and candidate_id refers to this DiscoveryResult.
          ja: CandidateRank.run_id・candidate_id・position・origin・ordering_basis を共同検証でき、candidate_id が当該 DiscoveryResult を指す場合だけこの edge を主張します。
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryResult-ranked_at-CandidateRank-example-positive-20260716
        labels:
          zh: 同次发现运行中的第二位结果
          en: Second result in one discovery run
          ja: 一回の発見実行における第2位結果
        descriptions:
          zh: disc-42 按 BM25 得分降序返回 discovery-result-source-17，并以一基约定记录 CandidateRank(run_id=disc-42, candidate_id=discovery-result-source-17, position=2, origin=1, ordering_basis=bm25-descending)。
          en: disc-42 returns discovery-result-source-17 in descending BM25 order and records CandidateRank(run_id=disc-42, candidate_id=discovery-result-source-17, position=2, origin=1, ordering_basis=bm25-descending).
          ja: disc-42 が BM25 降順で discovery-result-source-17 を返し、CandidateRank(run_id=disc-42, candidate_id=discovery-result-source-17, position=2, origin=1, ordering_basis=bm25-descending) を記録します。
        field_values:
          result_id: discovery-result-source-17
          run_id: disc-42
          candidate_id: discovery-result-source-17
          position: 2
          origin: 1
          ordering_basis: bm25-descending
        related_node_ids:
          - DiscoveryResult
          - CandidateRank
        related_relation_ids:
          - DiscoveryResult-ranked_at-CandidateRank
        source_claims:
          - claim-discovery-result-016
      - id: DiscoveryResult-ranked_at-CandidateRank-example-boundary-20260716
        labels:
          zh: 只有得分而没有序位
          en: Score without ordinal position
          ja: 順位を伴わないスコア
        descriptions:
          zh: discovery-result-source-17 只记录 BM25 score=7.41，没有有序候选列表、position、origin 或 ordering_basis；该数值可形成 DiscoveryScore，但不能建立 ranked_at CandidateRank。
          en: discovery-result-source-17 records only BM25 score 7.41 and has no ordered candidate list, position, origin, or ordering_basis. The value may form DiscoveryScore but cannot support ranked_at CandidateRank.
          ja: discovery-result-source-17 は BM25 score 7.41 だけを記録し、順序付き候補一覧・position・origin・ordering_basis がありません。DiscoveryScore にはなり得ますが ranked_at CandidateRank は主張できません。
        field_values:
          result_id: discovery-result-source-17
          score: 7.41
        related_node_ids:
          - DiscoveryResult
          - CandidateRank
          - DiscoveryScore
        related_relation_ids:
          - DiscoveryResult-ranked_at-CandidateRank
        source_claims:
          - claim-discovery-result-017
    source_claims:
      - claim-discovery-result-018
    layout_role: cross-link
    target: concept:CandidateRank
  - id: DiscoveryResult-is_a-RetrievalArtifact
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是检索产物
      en: is a retrieval artifact
      ja: 検索成果物である
    definitions:
      zh: 发现结果是检索产物的一种，其限定差是由发现活动返回并保留候选内容或候选引用；排序、分数和跟踪信息可以附加，但不是结果身份的必需条件。
      en: DiscoveryResult is a RetrievalArtifact whose differentia is being returned by a discovery activity as candidate content or a candidate reference; rank, score, and trace metadata are optional annotations rather than identity conditions.
      ja: 発見結果は検索成果物の一種であり、発見活動から候補内容または候補参照として返されます。順位・スコア・追跡情報は任意の注釈であり、同一性条件ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该分类约束结果的种类，不规定一次活动必须返回多少个结果。
      en: The classification constrains what kind of artifact a result is, not how many results an activity must return.
      ja: この分類は成果物の種類を定め、一回の活動が返す結果数は規定しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryResult-is_a-RetrievalArtifact-example-positive-001
        labels:
          zh: 资源发现返回的候选引用
          en: Candidate reference returned by discovery
          ja: 発見から返された候補参照
        descriptions:
          zh: 资源列表操作返回 resource://kb/policy 及其名称和媒体类型；该返回项是 DiscoveryResult，也属于 RetrievalArtifact，即使它没有分数。
          en: A resource-list operation returns resource://kb/policy with its name and media type. The returned item is a DiscoveryResult and RetrievalArtifact even though it has no score.
          ja: リソース一覧が resource://kb/policy と名称・メディア型を返します。スコアがなくても発見結果であり検索成果物です。
        field_values:
          uri: resource://kb/policy
        related_node_ids:
          - DiscoveryResult
          - RetrievalArtifact
        related_relation_ids:
          - DiscoveryResult-is_a-RetrievalArtifact
        source_claims:
          - claim-discovery-result-019
      - id: DiscoveryResult-is_a-RetrievalArtifact-example-boundary-001
        labels:
          zh: 资源描述尚未被返回
          en: Descriptor not yet returned
          ja: まだ返されていない記述子
        descriptions:
          zh: 服务器配置中预先声明了一个资源模板，但本次发现活动未返回任何匹配项；模板是 DiscoverySurface，不是本次 DiscoveryResult。
          en: A server configuration declares a resource template, but the current discovery activity returns no match. The template is a DiscoverySurface, not a DiscoveryResult of this activity.
          ja: サーバー設定にリソーステンプレートがありますが、今回の発見活動は一致項目を返していません。テンプレートは発見面であり今回の発見結果ではありません。
        field_values:
          returned: false
        related_node_ids:
          - DiscoveryResult
          - RetrievalArtifact
          - DiscoverySurface
        related_relation_ids:
          - DiscoveryResult-is_a-RetrievalArtifact
        source_claims:
          - claim-discovery-result-020
    source_claims:
      - claim-discovery-result-021
    layout_role: secondary-backbone
    target: concept:RetrievalArtifact
sources:
  - id: src-mcp-resources-list
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: Session-local resource enumeration.
  - id: src-mcp-prompts-list
    title: MCP Server Prompts Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    source_type: official-spec
    relevance: prompts/list enumeration.
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-discovery-result-001
    source: eng-fw-haystack-repo
    supports: Haystack retrieval components return Document records whose ID identifies the record and whose score is optional, supporting DiscoveryResult as a retrieval artifact without mandatory score or rank.
    locator: haystack/dataclasses/document.py > Document.id and score; components/retrievers > run return documents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-002
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list returns resource descriptors without rank or trace fields, independently supporting the broader unranked discovery-result case; the RetrievalArtifact genus is a Moonweave cross-module classification.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources and Resource descriptors
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-003
    source: eng-proto-mcp-2025-spec
    supports: The MCP resources/list operation returns listed resource descriptors and does not define rank or trace as required descriptor fields, supporting an unranked discovery result.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources and Resource contents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-004
    source: eng-fw-haystack-repo
    supports: Haystack retrievers return Document records and Document.score is optional, independently supporting discovery results that lack a score observation.
    locator: haystack/dataclasses/document.py > Document.score; components/retrievers/in_memory/bm25_retriever.py > run return value
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-005
    source: eng-fw-haystack-repo
    supports: InMemoryBM25Retriever.run takes a query and returns a documents mapping, directly separating the retrieval component from each returned Document artifact.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-006
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex likewise separates BaseRetriever retrieval behavior from NodeWithScore outputs, corroborating the activity-versus-result boundary.
    locator: llama-index-core/llama_index/core/base/base_retriever.py > BaseRetriever.retrieve; core/schema.py > NodeWithScore
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-007
    source: eng-fw-haystack-repo
    supports: Haystack Document has an ID and an optional score field, supporting the concrete unscored candidate instance.
    locator: haystack/dataclasses/document.py > Document.id and Document.score
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-008
    source: eng-fw-haystack-repo
    supports: Haystack retriever run methods return Document objects, supporting the use of a returned Document as the payload of a discovery-result artifact.
    locator: haystack/components/retrievers/in_memory/filter_retriever.py > FilterRetriever.run return documents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-result-009
    source: eng-fw-haystack-repo
    supports: Haystack retriever run methods return a documents collection, grounding the causal output link from one retrieval execution to its returned document results.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run > return documents
    evidence_kind: official
    confidence: high
  - id: claim-discovery-result-010
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list defines a request whose result contains the resources returned by that discovery operation, independently supporting activity-to-result provenance.
    locator: Server Features > Resources > Listing resources > resources/list result
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-result-011
    source: eng-fw-haystack-repo
    supports: Haystack's retriever output is the documents list returned from run; documents in the store but absent from that list are not outputs of that run.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run > top_k result slice
    evidence_kind: official
    confidence: high
  - id: claim-discovery-result-012
    source: eng-proto-mcp-2025-spec
    supports: MCP defines the resources in a resources/list response as the operation's returned set, supporting the boundary between available and actually returned resources.
    locator: Server Features > Resources > Listing resources > result.resources
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-result-013
    source: eng-fw-haystack-repo
    supports: Haystack retrievers return a documents collection from run, grounding produces as an execution-output relation rather than a generic association.
    locator: haystack/components/retrievers/in_memory/bm25_retriever.py > InMemoryBM25Retriever.run
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-result-014
    source: eng-proto-mcp-2025-spec
    supports: The resources/list response provides a second first-party example of a discovery request yielding an explicit result set; Moonweave records the causal direction from activity to returned result.
    locator: Server Features > Resources > Listing resources > resources/list request and result
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-result-015
    source: eng-fw-haystack-repo
    supports: Haystack's DocumentMRREvaluator derives an ordinal position from an enumerated retrieved-document list, while Document.score is a separate scalar. The exact run, candidate identity, origin, and ordering-basis guard is a reviewed Moonweave design inference.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > enumerate(retrieved_documents) and rank + 1; haystack/dataclasses/document.py > Document.score
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-result-016
    source: eng-fw-haystack-repo
    supports: Haystack DocumentMRREvaluator enumerates the retrieved Document list and derives one-based reciprocal rank from each enumerated position, supporting a candidate-bound ordinal observation for this concrete case.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run > enumerate(retrieved_documents) and rank + 1
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-result-017
    source: eng-fw-haystack-repo
    supports: Haystack separates the optional numeric Document.score from the ordinal position used by DocumentMRREvaluator, supporting this score-versus-rank boundary.
    locator: haystack/dataclasses/document.py > Document.score; haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-result-018
    source: eng-fw-haystack-repo
    supports: Haystack's DocumentMRREvaluator derives ordinal rank from the position of a concrete retrieved Document, while Document.score remains a separate optional scalar. Moonweave represents that candidate-to-rank binding as DiscoveryResult-ranked_at-CandidateRank for session-scoped discovery results.
    locator: haystack/components/evaluators/document_mrr.py > DocumentMRREvaluator.run; haystack/dataclasses/document.py > Document.score
    evidence_kind: design-inference
    confidence: high
  - id: claim-discovery-result-019
    source: eng-proto-mcp-2025-spec
    supports: MCP resources/list returns resource descriptors as the artifacts of resource discovery, supporting a discovery result that need not carry a score.
    locator: Server Features > Resources > Listing resources > resources/list result
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-result-020
    source: eng-proto-mcp-2025-spec
