source_claims:
  - id: claim-light-index-001
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex SummaryIndex uses an IndexList while retaining BaseIndex identity and retrieval behavior, supporting LightIndex as a structurally minimal DiscoveryIndex subtype.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex and IndexList
    evidence_kind: design-inference
    confidence: medium
  - id: claim-light-index-002
    source: eng-fw-llamaindex-repo
    supports: BaseIndex defines index_id, index_struct, and as_retriever for index subclasses, supporting the identity and queryability inherited by LightIndex.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_id, index_struct and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-light-index-003
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex SummaryIndex is backed by an IndexList of nodes, supporting a discovery index whose principal structure is a lightweight node list.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex and index_struct_cls IndexList
    evidence_kind: design-inference
    confidence: medium
  - id: claim-light-index-004
    source: eng-fw-llamaindex-repo
    supports: BaseIndex supplies index identity and as_retriever for index subclasses, supporting continued index semantics despite a minimal structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_id and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-light-index-005
    source: eng-fw-llamaindex-repo
    supports: BaseIndex is the broader index abstraction and permits different index_struct subclasses, supporting a narrower lightweight subtype rather than equating all indexes with it.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex and index_struct_cls
    evidence_kind: design-inference
    confidence: medium
  - id: claim-light-index-006
    source: eng-fw-llamaindex-repo
    supports: SummaryIndex's IndexList contrasts with richer index structures, grounding the subtype boundary in structure rather than in mere retrieval availability.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex; core/indices/base.py > BaseIndex
    evidence_kind: design-inference
    confidence: medium
  - id: claim-light-index-007
    source: eng-fw-llamaindex-repo
    supports: SummaryIndex uses IndexList as its index structure and inherits BaseIndex retrieval construction, directly supporting this lightweight index instance.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex; core/indices/base.py > as_retriever
    evidence_kind: official
    confidence: high
  - id: claim-light-index-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex SummaryIndex subclasses BaseIndex and uses a ListIndex index structure, directly supporting a lightweight index that remains an index.
    locator: llama-index-core/llama_index/core/indices/list/base.py > class SummaryIndex(BaseIndex)
    evidence_kind: official
    confidence: high
  - id: claim-light-index-009
    source: eng-fw-llamaindex-repo
    supports: SummaryIndexRetriever walks the list index structure to obtain nodes, grounding the minimal ordered-entry differentia.
    locator: llama-index-core/llama_index/core/indices/list/retrievers.py > SummaryIndexRetriever._retrieve
    evidence_kind: official
    confidence: high
  - id: claim-light-index-010
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex implements SummaryIndex and VectorStoreIndex as different BaseIndex subclasses with different structures, grounding the light-versus-fuller-index boundary.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex; indices/vector_store/base.py > VectorStoreIndex
    evidence_kind: official
    confidence: high
  - id: claim-light-index-011
    source: eng-fw-llamaindex-repo
    supports: VectorStoreIndex builds and inserts vector-backed nodes, a broader lifecycle than SummaryIndex's ordered list traversal.
    locator: llama-index-core/llama_index/core/indices/vector_store/base.py > VectorStoreIndex._build_index_from_nodes and insert_nodes
    evidence_kind: official
    confidence: high
  - id: claim-light-index-012
    source: eng-fw-llamaindex-repo
    supports: SummaryIndex's inheritance from BaseIndex and its ListIndexStruct provide direct first-party evidence for LightIndex as a specialized DiscoveryIndex.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex(BaseIndex) and index_struct_cls
    evidence_kind: design-inference
    confidence: high
  - id: claim-light-index-013
    source: eng-fw-llamaindex-repo
    supports: SummaryIndexRetriever's direct ordered-node traversal supports the reviewed minimal-structure differentia; the Moonweave names remain ontology decisions.
    locator: llama-index-core/llama_index/core/indices/list/retrievers.py > SummaryIndexRetriever._retrieve
    evidence_kind: design-inference
    confidence: high
  - id: claim-light-index-014
    source: eng-proto-mcp-2025-spec
    supports: MCP ResourceTemplate advertises a URI template and descriptive metadata for a server-backed resource family, grounding the discovery-surface side of this binding.
    locator: Server Features > Resources > Resource templates > ResourceTemplate fields
    evidence_kind: normative
    confidence: high
  - id: claim-light-index-015
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex SummaryIndex owns an ordered index structure that can supply the node set behind a resource surface.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex and index_struct
    evidence_kind: official
    confidence: high
  - id: claim-light-index-016
    source: eng-proto-mcp-2025-spec
    supports: MCP resolves a resource URI through the server implementation for that resource or template, supporting backend binding rather than topical similarity.
    locator: Server Features > Resources > Reading resources > resources/read URI resolution
    evidence_kind: normative
    confidence: high
  - id: claim-light-index-017
    source: eng-fw-llamaindex-repo
    supports: Each SummaryIndex retriever is constructed from its owning index structure, grounding why a surface served by one index is not exposed by a neighboring index.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex.as_retriever
    evidence_kind: official
    confidence: high
  - id: claim-light-index-018
    source: eng-proto-mcp-2025-spec
    supports: MCP resource templates and resources/read ground the descriptor-to-readable-resource mechanism; Moonweave records which LightIndex backs that discovery surface.
    locator: Server Features > Resources > Resource templates; Reading resources > resources/read
    evidence_kind: design-inference
    confidence: high
  - id: claim-light-index-019
    source: eng-fw-llamaindex-repo
    supports: SummaryIndex provides the lightweight ordered index structure that can serve the entries behind a discovery surface, while the exposes edge remains an explicit deployment binding.
    locator: llama-index-core/llama_index/core/indices/list/base.py > SummaryIndex index_struct
    evidence_kind: design-inference
    confidence: high
  - id: claim-lidx-cursor
    source: src-cursor-search
    supports: Cursor exposes a session-local searchable codebase index view.
    locator: codebase index
    evidence_kind: official-doc
    confidence: medium
  - id: claim-lidx-mcp
    source: src-mcp-resources-list
    supports: MCP session resource sets form lightweight index views.
    locator: resources/list
    evidence_kind: primary-spec
    confidence: high
  - id: claim-lidx-design
    source: src-info-indexing-design
    supports: LightIndex is session-local view without IndexEntry body ownership.
    locator: LightIndex
    evidence_kind: design-inference
    confidence: high
