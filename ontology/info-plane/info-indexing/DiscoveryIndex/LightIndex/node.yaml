schema: moonweave.ai/ontology-node/v1
id: LightIndex
kind: concept
status: review
labels:
  zh: 轻量发现索引
  en: lightweight discovery index
  ja: 軽量発見インデックス
semantics:
  short_definition:
    zh: 轻量发现索引是只保留候选发现所需最小结构的发现索引。
    en: A lightweight discovery index is a DiscoveryIndex retaining only the minimal structure needed to discover candidates.
    ja: 軽量発見索引は、候補発見に必要な最小構造だけを保持する DiscoveryIndex です。
  definition:
    zh: LightIndex 是 DiscoveryIndex 的一种：它具有索引身份和可查询结构，但结构通常仅保存节点 ID、资源描述符或索引指针，足以在当前发现范围内产生候选。轻量描述的是索引结构和运维负担，而不是临时引用；它仍是索引实体，不是 DiscoverySurface 或 IndexPointer。
    en: LightIndex is a kind of DiscoveryIndex with index identity and queryable structure, but its structure usually stores only node IDs, resource descriptors, or index pointers sufficient to produce candidates in the current discovery scope. Lightweight describes index structure and operational burden, not a temporary reference; it remains an index entity rather than a DiscoverySurface or IndexPointer.
    ja: LightIndex は DiscoveryIndex の一種で、索引識別と照会可能構造を持ちますが、通常は現在の発見範囲で候補を生成するのに十分なノード ID、資源記述子、索引ポインタだけを保存します。軽量とは構造と運用負担を指し、一時参照ではなく、DiscoverySurface や IndexPointer ではない索引実体です。
  why_needed:
    zh: 该概念覆盖文件清单、节点列表等无需完整向量基础设施的真实发现方式，使系统能表达低成本索引仍有身份与结构，同时不把所有索引都误认为重型持久检索系统。
    en: The concept covers real discovery methods such as file manifests and node lists that need no full vector infrastructure, expressing that a low-cost index still has identity and structure without treating every index as a heavy persistent retrieval system.
    ja: ファイル目録やノード一覧など完全なベクトル基盤を要しない発見方式を表し、低コスト索引にも識別と構造がある一方、全索引を重い永続検索システムと誤認することを防ぎます。
  includes:
    - zh: 纳入具有稳定索引身份、以节点 ID 列表、文件清单或资源描述符集合为主要结构并能被查询的索引。
      en: Includes queryable indexes with stable index identity whose primary structure is a node-ID list, file manifest, or collection of resource descriptors.
      ja: 安定した索引識別を持ち、主構造がノード ID 一覧、ファイル目録、資源記述子集合である照会可能索引を含みます。
  excludes:
    - zh: 排除承担分片、向量构建和复杂刷新流程的重型索引实现，以及只保存索引定位符的 IndexPointer、描述入口的 DiscoverySurface 和单次查询结果。
      en: Excludes heavy index implementations whose defining burden is sharding, vector construction, and complex refresh workflows, plus an IndexPointer carrying only a locator, a DiscoverySurface descriptor, and one-query results.
      ja: シャーディング、ベクトル構築、複雑な更新を主要負担とする重い索引実装、位置指定子だけの IndexPointer、入口記述の DiscoverySurface、一回の照会結果を除外します。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: LightIndex-example-positive-001
    kind: positive
    labels:
      zh: 轻量发现索引正例
      en: Positive example of lightweight discovery index
      ja: 軽量発見インデックスの正例
    scenario_id: null
    descriptions:
      zh: 员工手册 SummaryIndex 以 handbook-light-v2 为索引身份，仅保存 42 个政策节点 ID，并从该节点列表创建 retriever；它没有向量分片或嵌入构建流程。
      en: An employee-handbook SummaryIndex has index identity handbook-light-v2, stores only 42 policy node IDs, and creates a retriever from that list without vector shards or an embedding-build workflow.
      ja: 従業員ハンドブック SummaryIndex は handbook-light-v2 の索引識別を持ち、42 個の規程ノード ID だけを保存して一覧から retriever を作成し、ベクトルシャードや埋め込み構築を持ちません。
    field_values:
      index_id: handbook-light-v2
      index_kind: summary-list
      configuration_digest: sha256:handbook-light-v2-config
    related_node_ids:
      - LightIndex
      - DiscoverySurface
    related_relation_ids:
      - LightIndex-exposes-DiscoverySurface
    expected_result:
      zh: handbook-light-v2 被识别为 LightIndex，同时仍继承 DiscoveryIndex 的索引身份和可查询结构。
      en: handbook-light-v2 is classified as a LightIndex while retaining DiscoveryIndex identity and queryable structure.
      ja: handbook-light-v2 は LightIndex と分類され、DiscoveryIndex の索引識別と照会可能構造を保持します。
    why_valid_or_invalid:
      zh: LlamaIndex 的列表型索引以简洁 node list 构成 index_struct 并仍提供 retriever，支持“结构最小但仍是索引”的种差。
      en: LlamaIndex's list-style index uses a compact node list as index structure while still exposing retrieval, supporting the differentia 'minimal structure yet still an index.'
      ja: LlamaIndex のリスト型索引は簡潔なノード一覧を索引構造としつつ検索を提供し、「最小構造だが索引」という種差を支えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-light-index-003
      - claim-light-index-004
  - id: LightIndex-example-boundary-001
    kind: boundary
    labels:
      zh: 轻量发现索引边界例
      en: Boundary case for lightweight discovery index
      ja: 軽量発見インデックスの境界例
    scenario_id: null
    descriptions:
      zh: 一个向量索引拥有嵌入向量、多个分片以及周期性重建流程；它是 DiscoveryIndex，但其定义性结构和运维负担并不轻量。
      en: A vector index owns embeddings, multiple shards, and a periodic rebuild workflow; it is a DiscoveryIndex, but its defining structure and operational burden are not lightweight.
      ja: ベクトル索引は埋め込み、複数シャード、定期再構築を所有し DiscoveryIndex ですが、定義的構造と運用負担は軽量ではありません。
    field_values: {}
    related_node_ids:
      - LightIndex
      - DiscoverySurface
      - DiscoveryIndex
    related_relation_ids:
      - LightIndex-exposes-DiscoverySurface
    expected_result:
      zh: 该对象保持 DiscoveryIndex 类型，不因也能暴露查询入口而自动成为 LightIndex。
      en: The object remains a DiscoveryIndex and does not become a LightIndex merely because it also exposes a query entry.
      ja: この対象は DiscoveryIndex のままで、照会入口も公開するというだけで LightIndex にはなりません。
    why_valid_or_invalid:
      zh: 所有 LightIndex 都是 DiscoveryIndex，但只有以最小发现结构为定义特征的索引属于该子类；入口关系本身不能证明轻量性。
      en: Every LightIndex is a DiscoveryIndex, but only indexes defined by minimal discovery structure belong to the subtype; an exposed entry point alone does not prove lightweight structure.
      ja: 全 LightIndex は DiscoveryIndex ですが、最小発見構造を定義特徴とする索引だけが下位型で、入口公開だけでは軽量性を証明できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-light-index-005
      - claim-light-index-006
  - id: LightIndex-example-instance-001
    kind: instance
    labels:
      zh: 员工手册轻量索引实例
      en: Employee-handbook light-index instance
      ja: 従業員ハンドブック軽量索引インスタンス
    scenario_id: null
    descriptions:
      zh: handbook-light-v2 是一个 SummaryIndex，index_struct 为 42 个政策 node_id 的 IndexList，并通过 as_retriever 提供候选发现。
      en: handbook-light-v2 is a SummaryIndex whose index_struct is an IndexList of 42 policy node IDs and whose as_retriever interface provides candidate discovery.
      ja: handbook-light-v2 は 42 個の規程 node_id から成る IndexList を index_struct とし、as_retriever で候補発見を提供する SummaryIndex です。
    field_values:
      index_id: handbook-light-v2
      node_count: 42
    related_node_ids:
      - LightIndex
      - DiscoveryIndex
    related_relation_ids:
      - LightIndex-is_a-DiscoveryIndex
    expected_result:
      zh: 该实例显示在 DiscoveryIndex 下的 LightIndex 分支，并保留其索引身份。
      en: The instance appears in the LightIndex branch under DiscoveryIndex and retains its index identity.
      ja: インスタンスは DiscoveryIndex 配下の LightIndex 枝に表示され、索引識別を保持します。
    why_valid_or_invalid:
      zh: 它有真实索引结构和检索接口，但结构仅是节点 ID 列表，满足轻量而非指针或描述符的边界。
      en: It has real index structure and retrieval behavior, while that structure is only a node-ID list, satisfying the lightweight boundary without becoming a pointer or descriptor.
      ja: 実際の索引構造と検索動作を持ちつつ構造はノード ID 一覧だけで、ポインタや記述子ではない軽量境界を満たします。
    synthetic: true
    verified_version: https://github.com/run-llama/llama_index
    source_claims:
      - claim-light-index-007
