schema: moonweave.ai/ontology-node/v1
id: LightIndex
kind: concept
labels:
  zh: 轻量发现索引
  en: lightweight discovery index
  ja: 軽量発見インデックス
semantics:
  short_definition:
    zh: 会话内轻量可枚举的文件或资源索引视图。
    en: Session-local lightweight enumerable file or resource index view.
    ja: session-local lightweight enumerable file/resource index view。
  definition:
    zh: LightIndex 映射 Cursor agent 可用的 codebase index 文件集合视图、MCP session 可见 resources 集合；对应 indexed file/chunk 引用的会话侧入口，不是 IndexEntry 正文。
    en: LightIndex maps Cursor agent codebase index file-set views and MCP session-visible resource sets—the session-side entry for indexed file/chunk references, not IndexEntry bodies.
    ja: Cursor codebase index / MCP resource light view。
  why_needed:
    zh: LightIndex 使 discovery 能引用“从哪份会话可见索引读取”而不声称拥有索引构建。
    en: LightIndex lets discovery reference which session-visible index was read without claiming index build ownership.
    ja: session index view reference。
  includes:
    - zh: light_index_id、session_id、entry_count、可见 scope。
      en: light_index_id, session_id, entry_count, visible scope.
      ja: id/session/count/scope。
  excludes:
    - zh: IndexEntry payload、embedding 向量、IndexBuildRun。
      en: IndexEntry payloads, embedding vectors, IndexBuildRun.
      ja: IndexEntry payload/embedding/build。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: lightidx-sess-14 entry_count=842 表示 workspace 文件索引视图；disc-101 读取该视图过滤 Markdown。
    en: lightidx-sess-14 entry_count=842 represents workspace file index view; disc-101 reads it filtering Markdown.
    ja: light index read during discovery。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
