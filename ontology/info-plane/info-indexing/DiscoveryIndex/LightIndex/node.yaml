parent_relation:
  id: LightIndex-is_a-DiscoveryIndex
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: LightIndex 是 DiscoveryIndex 的专门类型：它仍拥有可引用的索引身份和最小条目结构，但限定为快速发现所需的顺序节点或指针集合，不承担向量训练、分片和持续重建等完整生命周期。
    en: LightIndex is a DiscoveryIndex with addressable index identity and a minimal entry structure, specialized to ordered nodes or pointers needed for fast discovery rather than vector training, sharding, and continuous rebuild lifecycle.
    ja: LightIndex は DiscoveryIndex の専門型で、参照可能な索引同一性と最小項目構造を持ち、高速発見用の順序ノードまたはポインタに限定され、ベクトル学習・分割・継続再構築の完全ライフサイクルを担いません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: LightIndex-is_a-DiscoveryIndex-example-positive-001
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      descriptions:
        zh: SummaryIndex docs-summary 具有 index_id 并保存节点 ID 的有序列表；检索器直接遍历此轻量结构，因此 docs-summary 是 LightIndex，也必然是 DiscoveryIndex。
        en: SummaryIndex docs-summary has an index_id and stores an ordered list of node IDs that its retriever traverses directly; docs-summary is a LightIndex and therefore a DiscoveryIndex.
        ja: SummaryIndex docs-summary は index_id と順序付きノード ID 一覧を持ち、検索器が直接走査するため LightIndex であり DiscoveryIndex でもあります。
      field_values: {}
      related_node_ids:
        - LightIndex
        - DiscoveryIndex
      related_relation_ids:
        - LightIndex-is_a-DiscoveryIndex
      source_claims:
        - claim-light-index-008
        - claim-light-index-009
    - id: LightIndex-is_a-DiscoveryIndex-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: VectorStoreIndex embeddings-main 拥有嵌入、向量存储适配和持续更新流程；它是 DiscoveryIndex，但不满足 LightIndex 的最小结构边界。
        en: VectorStoreIndex embeddings-main owns embeddings, vector-store adaptation, and an ongoing update lifecycle. It is a DiscoveryIndex, but it does not meet LightIndex's minimal-structure boundary.
        ja: VectorStoreIndex embeddings-main は埋め込み・ベクトルストア適合・継続更新を所有し DiscoveryIndex ですが、LightIndex の最小構造境界を満たしません。
      field_values: {}
      related_node_ids:
        - LightIndex
        - DiscoveryIndex
      related_relation_ids:
        - LightIndex-is_a-DiscoveryIndex
      source_claims:
        - claim-light-index-010
        - claim-light-index-011
  source_claims:
    - claim-light-index-012
    - claim-light-index-013
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: LightIndex-exposes-DiscoverySurface
    predicate: exposes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: exposes
      en: exposes
      ja: exposes
    definitions:
      zh: 当 DiscoverySurface 的资源描述符或 URI 模板明确绑定到某个 LightIndex 的可检索条目集合时，该 LightIndex exposes 该入口；描述相同主题但指向其他数据源不成立。
      en: LightIndex exposes DiscoverySurface when the surface's resource descriptor or URI template is explicitly bound to that light index's retrievable entry set; topical similarity to a surface backed by another source is insufficient.
      ja: DiscoverySurface のリソース記述子または URI テンプレートが LightIndex の検索可能項目集合に明示的に結び付く場合に exposes が成立し、同じ話題でも別のデータ源を指す面には成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: exposed_by
      labels:
        zh: 反向：exposes
        en: exposed by
        ja: 逆方向：exposes
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: LightIndex-exposes-DiscoverySurface-example-positive-001
        labels:
          zh: exposes正例
          en: Positive example of exposes
          ja: exposesの正例
        descriptions:
          zh: LightIndex docs-summary 保存文档节点顺序，服务器发布 index://docs-summary/{node_id} 模板并由同一索引读取器提供内容；docs-summary exposes 此 DiscoverySurface。
          en: LightIndex docs-summary stores an ordered document-node set, and the server publishes index://docs-summary/{node_id} backed by that index reader; docs-summary exposes this DiscoverySurface.
          ja: LightIndex docs-summary が順序付き文書ノードを保持し、同じ索引リーダーを背後に持つ index://docs-summary/{node_id} を公開するため、この DiscoverySurface を公開します。
        field_values: {}
        related_node_ids:
          - LightIndex
          - DiscoverySurface
        related_relation_ids:
          - LightIndex-exposes-DiscoverySurface
        source_claims:
          - claim-light-index-014
          - claim-light-index-015
      - id: LightIndex-exposes-DiscoverySurface-example-boundary-001
        labels:
          zh: exposes边界例
          en: Boundary case for exposes
          ja: exposesの境界例
        descriptions:
          zh: docs-summary 与 archive-summary 都处理“文档”主题，但模板 index://archive/{node_id} 的处理器读取 archive-summary；docs-summary 不 exposes 此入口。
          en: docs-summary and archive-summary both concern documents, but index://archive/{node_id} is served from archive-summary; docs-summary does not expose that surface.
          ja: docs-summary と archive-summary が同じ文書話題を扱っても、index://archive/{node_id} が archive-summary から提供されるなら docs-summary はその面を公開しません。
        field_values: {}
        related_node_ids:
          - LightIndex
          - DiscoverySurface
        related_relation_ids:
          - LightIndex-exposes-DiscoverySurface
        source_claims:
          - claim-light-index-016
          - claim-light-index-017
    source_claims:
      - claim-light-index-018
      - claim-light-index-019
    layout_role: cross-link
    target: concept:DiscoverySurface
