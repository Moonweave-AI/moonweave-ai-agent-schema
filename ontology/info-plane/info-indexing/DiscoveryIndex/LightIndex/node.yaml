schema: moonweave.ai/ontology-node/v1
id: LightIndex
kind: concept
status: accepted
labels:
  zh: 轻量发现索引
  en: lightweight discovery index
  ja: 軽量発見インデックス
semantics:
  short_definition:
    zh: 轻量发现索引是只保留候选发现所需最小结构的发现索引。
    en: A lightweight discovery index is a DiscoveryIndex retaining only the minimal structure needed to discover candidates.
    ja: 軽量発見索引は、候補発見に必要な最小構造だけを保持する DiscoveryIndex です。
  definition:
    zh: LightIndex 是 DiscoveryIndex 的一种：它具有索引身份和可查询结构，但结构通常仅保存节点 ID、资源描述符或索引指针，足以在当前发现范围内产生候选。轻量描述的是索引结构和运维负担，而不是临时引用；它仍是索引实体，不是 DiscoverySurface 或 IndexPointer。
    en: LightIndex is a kind of DiscoveryIndex with index identity and queryable structure, but its structure usually stores only node IDs, resource descriptors, or index pointers sufficient to produce candidates in the current discovery scope. Lightweight describes index structure and operational burden, not a temporary reference; it remains an index entity rather than a DiscoverySurface or IndexPointer.
    ja: LightIndex は DiscoveryIndex の一種で、索引識別と照会可能構造を持ちますが、通常は現在の発見範囲で候補を生成するのに十分なノード ID、資源記述子、索引ポインタだけを保存します。軽量とは構造と運用負担を指し、一時参照ではなく、DiscoverySurface や IndexPointer ではない索引実体です。
  why_needed:
    zh: 该概念覆盖文件清单、节点列表等无需完整向量基础设施的真实发现方式，使系统能表达低成本索引仍有身份与结构，同时不把所有索引都误认为重型持久检索系统。
    en: The concept covers real discovery methods such as file manifests and node lists that need no full vector infrastructure, expressing that a low-cost index still has identity and structure without treating every index as a heavy persistent retrieval system.
    ja: ファイル目録やノード一覧など完全なベクトル基盤を要しない発見方式を表し、低コスト索引にも識別と構造がある一方、全索引を重い永続検索システムと誤認することを防ぎます。
  includes:
    - zh: 纳入具有稳定索引身份、以节点 ID 列表、文件清单或资源描述符集合为主要结构并能被查询的索引。
      en: Includes queryable indexes with stable index identity whose primary structure is a node-ID list, file manifest, or collection of resource descriptors.
      ja: 安定した索引識別を持ち、主構造がノード ID 一覧、ファイル目録、資源記述子集合である照会可能索引を含みます。
  excludes:
    - zh: 排除承担分片、向量构建和复杂刷新流程的重型索引实现，以及只保存索引定位符的 IndexPointer、描述入口的 DiscoverySurface 和单次查询结果。
      en: Excludes heavy index implementations whose defining burden is sharding, vector construction, and complex refresh workflows, plus an IndexPointer carrying only a locator, a DiscoverySurface descriptor, and one-query results.
      ja: シャーディング、ベクトル構築、複雑な更新を主要負担とする重い索引実装、位置指定子だけの IndexPointer、入口記述の DiscoverySurface、一回の照会結果を除外します。
  semantic_kind: entity
  aliases: []
