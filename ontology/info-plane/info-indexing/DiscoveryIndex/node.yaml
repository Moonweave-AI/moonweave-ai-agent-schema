          en: An index object stores index_struct and is addressed by retrieval as index_id=docs-main; it is a DiscoveryIndex and therefore an Index.
          ja: 索引オブジェクトが index_struct を保持し、検索処理から index_id=docs-main として参照されるため、発見索引であり索引でもあります。
        field_values:
