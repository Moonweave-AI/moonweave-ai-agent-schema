source_claims:
  - id: claim-discovery-index-001
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex combines a persistent index_id with an index_struct and exposes retrieval construction, supporting DiscoveryIndex as an identity-bearing Index rather than a result record.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.__init__, index_id, index_struct and as_retriever
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-index-002
    source: eng-fw-llamaindex-repo
    supports: BaseIndex builds index structure from nodes and exposes a retriever, supporting the discovery-oriented queryability differentia while leaving the cross-module genus placement as a Moonweave ontology decision.
    locator: llama-index-core/llama_index/core/indices/base.py > build_index_from_nodes and as_retriever
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-index-003
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex stores an index_struct and assigns or accepts an index_id, supporting the example's continuing index identity and structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.__init__, index_struct and index_id
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-index-004
    source: eng-fw-llamaindex-repo
    supports: BaseIndex.as_retriever constructs a retriever from the index, supporting use of the same index object for candidate discovery queries.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.as_retriever
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-index-005
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex defines NodeWithScore as a node plus an optional score, which lacks the index_struct and index_id properties that characterize BaseIndex.
    locator: llama-index-core/llama_index/core/schema.py > NodeWithScore; indices/base.py > BaseIndex
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-index-006
    source: eng-fw-llamaindex-repo
    supports: BaseIndex separates construction of index structure from retrieval results, supporting the boundary between the index entity and a returned candidate.
    locator: llama-index-core/llama_index/core/indices/base.py > build_index_from_nodes and as_retriever
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-discovery-index-007
    source: eng-fw-llamaindex-repo
    supports: BaseIndex exposes index_struct, index_id, and as_retriever, directly supporting the fields and behavior used in this instance.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex index_struct, index_id and as_retriever
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-discovery-index-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex owns an index_struct and exposes index_id, supporting an index object with stable identity and structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and index_id
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-discovery-index-009
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex distinguishes BaseIndex, which owns index_struct, from IndexNode.index_id, which points to another index or retriever.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct; llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-discovery-index-010
    source: eng-fw-llamaindex-repo
    supports: BaseIndex's owned index structure and addressable index identity support treating DiscoveryIndex as a specialized Index; the discovery specialization is Moonweave's reviewed differentia.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.__init__, index_struct, and index_id
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
