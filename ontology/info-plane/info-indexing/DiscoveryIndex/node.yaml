schema: moonweave.ai/ontology-node/v1
id: DiscoveryIndex
kind: concept
status: accepted
labels:
  zh: 发现索引
  en: discovery index
  ja: 発見インデックス
semantics:
  short_definition:
    zh: 发现索引是面向候选发现而建立、具有独立索引身份的可查询索引。
    en: A discovery index is an identity-bearing queryable index built for candidate discovery.
    ja: 発見インデックスは、候補発見のために構築され、固有の索引識別を持つ照会可能な索引です。
  definition:
    zh: DiscoveryIndex 是 Index 的一种：它以稳定的索引身份组织可发现对象，并可由查询或过滤条件检索候选。索引身份将同一索引的结构、刷新与版本连续性联系起来；它不是一次查询结果、索引地址字符串或索引构建运行。
    en: DiscoveryIndex is a kind of Index that organizes discoverable objects under a stable index identity and can be queried or filtered for candidates. The index identity links the structure, refreshes, and version continuity of the same index; the concept is not a query result, an index-address string, or an index-build run.
    ja: DiscoveryIndex は Index の一種で、発見可能な対象を安定した索引識別の下に編成し、クエリまたはフィルタで候補を検索できます。索引識別は同じ索引の構造、更新、版の連続性を結び付けますが、一回の検索結果、索引アドレス文字列、索引構築実行ではありません。
  why_needed:
    zh: 该概念让系统能区分“可反复查询的索引本身”和“指向索引的引用”或“某次检索返回的结果”，从而正确追踪刷新、版本选择与发现活动实际使用的索引。
    en: The concept separates the repeatedly queryable index itself from a reference to that index and from results returned by one retrieval, enabling correct tracking of refreshes, version selection, and the index actually used by a discovery activity.
    ja: この概念により、反復して照会できる索引そのものを、索引への参照や一回の検索結果から区別し、更新、版選択、発見活動が実際に使用した索引を正しく追跡できます。
  includes:
    - zh: 纳入具有索引身份、保存可查询索引结构并服务于候选发现的索引，包括轻量目录索引、关键词索引或向量索引的发现用途视图。
      en: Includes indexes with index identity and queryable index structure used to discover candidates, including lightweight directory, keyword, or vector-index discovery views.
      ja: 索引識別と照会可能な索引構造を持ち、候補発見に用いる索引を含みます。軽量ディレクトリ、キーワード、ベクトル索引の発見用ビューも該当します。
  excludes:
    - zh: 排除仅保存索引 URI 或 ID 的 IndexPointer、某次查询返回的 DiscoveryResult，以及创建或刷新索引的活动；这些对象都不具有索引本身的持续身份与结构。
      en: Excludes an IndexPointer that only carries an index URI or ID, a DiscoveryResult returned by one query, and an activity that builds or refreshes an index; none has the persistent identity and structure of the index itself.
      ja: 索引 URI または ID だけを保持する IndexPointer、一回の照会で返る DiscoveryResult、索引を構築・更新する活動を除外します。いずれも索引自体の継続的識別と構造を持ちません。
  semantic_kind: entity
  aliases: []
