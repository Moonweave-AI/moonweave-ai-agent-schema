schema: moonweave.ai/ontology-node/v1
id: DiscoveryIndex
kind: concept
status: accepted
labels:
  zh: 发现索引
  en: discovery index
  ja: 発見インデックス
semantics:
  short_definition:
    zh: 发现索引是面向候选发现而建立、具有独立索引身份的可查询索引。
    en: A discovery index is an identity-bearing queryable index built for candidate discovery.
    ja: 発見インデックスは、候補発見のために構築され、固有の索引識別を持つ照会可能な索引です。
  definition:
    zh: DiscoveryIndex 是 Index 的一种：它以稳定的索引身份组织可发现对象，并可由查询或过滤条件检索候选。索引身份将同一索引的结构、刷新与版本连续性联系起来；它不是一次查询结果、索引地址字符串或索引构建运行。
    en: DiscoveryIndex is a kind of Index that organizes discoverable objects under a stable index identity and can be queried or filtered for candidates. The index identity links the structure, refreshes, and version continuity of the same index; the concept is not a query result, an index-address string, or an index-build run.
    ja: DiscoveryIndex は Index の一種で、発見可能な対象を安定した索引識別の下に編成し、クエリまたはフィルタで候補を検索できます。索引識別は同じ索引の構造、更新、版の連続性を結び付けますが、一回の検索結果、索引アドレス文字列、索引構築実行ではありません。
  why_needed:
    zh: 该概念让系统能区分“可反复查询的索引本身”和“指向索引的引用”或“某次检索返回的结果”，从而正确追踪刷新、版本选择与发现活动实际使用的索引。
    en: The concept separates the repeatedly queryable index itself from a reference to that index and from results returned by one retrieval, enabling correct tracking of refreshes, version selection, and the index actually used by a discovery activity.
    ja: この概念により、反復して照会できる索引そのものを、索引への参照や一回の検索結果から区別し、更新、版選択、発見活動が実際に使用した索引を正しく追跡できます。
  includes:
    - zh: 纳入具有索引身份、保存可查询索引结构并服务于候选发现的索引，包括轻量目录索引、关键词索引或向量索引的发现用途视图。
      en: Includes indexes with index identity and queryable index structure used to discover candidates, including lightweight directory, keyword, or vector-index discovery views.
      ja: 索引識別と照会可能な索引構造を持ち、候補発見に用いる索引を含みます。軽量ディレクトリ、キーワード、ベクトル索引の発見用ビューも該当します。
  excludes:
    - zh: 排除仅保存索引 URI 或 ID 的 IndexPointer、某次查询返回的 DiscoveryResult，以及创建或刷新索引的活动；这些对象都不具有索引本身的持续身份与结构。
      en: Excludes an IndexPointer that only carries an index URI or ID, a DiscoveryResult returned by one query, and an activity that builds or refreshes an index; none has the persistent identity and structure of the index itself.
      ja: 索引 URI または ID だけを保持する IndexPointer、一回の照会で返る DiscoveryResult、索引を構築・更新する活動を除外します。いずれも索引自体の継続的識別と構造を持ちません。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DiscoveryIndex-example-positive-001
    kind: positive
    labels:
      zh: 发现索引正例
      en: Positive example of discovery index
      ja: 発見インデックスの正例
    scenario_id: null
    descriptions:
      zh: 支持知识库的索引以 support-index-v4 为索引身份保存节点结构，并通过该索引创建 retriever 来回答后续发现查询；多次查询仍指向同一个索引对象。
      en: A support-knowledge index stores its node structure under index identity support-index-v4 and creates a retriever from that index for later discovery queries; repeated queries still address the same index object.
      ja: サポート知識索引は support-index-v4 という索引識別の下にノード構造を保持し、その索引から後続の発見照会用 retriever を作成します。複数回の照会も同じ索引対象を指します。
    field_values:
      index_id: support-index-v4
      index_kind: discovery
      configuration_digest: sha256:support-index-v4-config
    related_node_ids:
      - DiscoveryIndex
      - IndexPointer
    related_relation_ids:
      - IndexPointer-references-DiscoveryIndex
    expected_result:
      zh: 该对象被识别为 DiscoveryIndex，并保留 support-index-v4 的索引身份、索引结构以及可创建 retriever 的能力。
      en: The object is a DiscoveryIndex with index identity support-index-v4, an index structure, and the ability to create a retriever.
      ja: この対象は DiscoveryIndex と判定され、support-index-v4 の索引識別、索引構造、retriever を作成する能力を保持します。
    why_valid_or_invalid:
      zh: 稳定索引身份与可查询索引结构同时成立，符合 Index 的持续对象特征，而不是一次运行产生的临时结果。
      en: Stable index identity and queryable index structure are both present, which are continuing characteristics of an Index rather than a temporary result of one run.
      ja: 安定した索引識別と照会可能な索引構造が共に存在し、一回の実行による一時結果ではなく Index の継続的特徴を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-index-003
      - claim-discovery-index-004
  - id: DiscoveryIndex-example-boundary-001
    kind: boundary
    labels:
      zh: 发现索引边界例
      en: Boundary case for discovery index
      ja: 発見インデックスの境界例
    scenario_id: null
    descriptions:
      zh: 查询 support-index-v4 后返回的 NodeWithScore 只携带候选节点及可选分数；它没有索引结构或持续索引身份，因此即使来自该索引也不是 DiscoveryIndex。
      en: A NodeWithScore returned after querying support-index-v4 carries a candidate node and optional score only; it has neither index structure nor continuing index identity, so provenance from the index does not make it a DiscoveryIndex.
      ja: support-index-v4 の照会で返る NodeWithScore は候補ノードと任意スコアだけを持ち、索引構造も継続的な索引識別も持ちません。その索引に由来しても DiscoveryIndex ではありません。
    field_values: {}
    related_node_ids:
      - DiscoveryIndex
      - IndexPointer
    related_relation_ids:
      - IndexPointer-references-DiscoveryIndex
    expected_result:
      zh: 该返回对象保持 DiscoveryResult 或 NodeWithScore 类型，不得被分类为 DiscoveryIndex。
      en: The returned object remains a DiscoveryResult or NodeWithScore and must not be classified as a DiscoveryIndex.
      ja: 返却対象は DiscoveryResult または NodeWithScore のままであり、DiscoveryIndex に分類してはなりません。
    why_valid_or_invalid:
      zh: 候选结果属于一次查询的输出，而发现索引是可跨查询复用的索引实体；来源关系不消除两者的身份与生命周期差异。
      en: A candidate result is output of one query, whereas a discovery index is an index entity reusable across queries; provenance does not erase their identity and lifecycle difference.
      ja: 候補結果は一回の照会出力であり、発見索引は複数照会で再利用される索引実体です。由来関係は両者の識別とライフサイクルの差を消しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-index-005
      - claim-discovery-index-006
  - id: DiscoveryIndex-example-instance-001
    kind: instance
    labels:
      zh: LlamaIndex 索引实例
      en: LlamaIndex index instance
      ja: LlamaIndex 索引インスタンス
    scenario_id: null
    descriptions:
      zh: 一个 BaseIndex 实例持有 index_struct，并将 index_id 设为 support-index-v4；应用从该实例创建 retriever 以执行候选发现。
      en: A BaseIndex instance holds index_struct, has index_id support-index-v4, and is used to create a retriever for candidate discovery.
      ja: BaseIndex インスタンスが index_struct を保持し、index_id を support-index-v4 とし、候補発見用 retriever の作成に用いられます。
    field_values:
      index_id: support-index-v4
    related_node_ids:
      - DiscoveryIndex
      - Index
    related_relation_ids:
      - DiscoveryIndex-is_a-Index
    expected_result:
      zh: support-index-v4 被记录为 DiscoveryIndex 的一个具体实例。
      en: support-index-v4 is recorded as a concrete DiscoveryIndex instance.
      ja: support-index-v4 は DiscoveryIndex の具体的インスタンスとして記録されます。
    why_valid_or_invalid:
      zh: 该对象同时具有索引身份、索引结构与检索器创建接口，满足发现索引的身份和可查询性条件。
      en: The object has index identity, index structure, and a retriever-construction interface, satisfying both identity and queryability conditions.
      ja: 索引識別、索引構造、retriever 作成インターフェースを持ち、発見索引の識別性と照会可能性を満たします。
    synthetic: true
    verified_version: https://github.com/run-llama/llama_index
    source_claims:
      - claim-discovery-index-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: DiscoveryIndex-is_a-Index
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是索引
      en: is an index
      ja: 索引である
    definitions:
      zh: 发现索引是索引的一种，其限定差是拥有可被发现活动引用和查询的索引身份及结构，而不是一次查询结果或指向索引的引用。
      en: DiscoveryIndex is an Index whose differentia is a stable index identity and structure addressable by discovery activities; it is neither one query result nor a reference that merely points to an index.
      ja: 発見索引は索引の一種であり、発見活動から参照・検索できる安定した索引識別子と構造を持ち、一回の検索結果や索引を指すだけの参照ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该边陈述发现索引的类型归属，不对索引实例数量作限制。
      en: The edge states the type of DiscoveryIndex and does not constrain how many index instances exist.
      ja: この辺は発見索引の型を述べ、索引インスタンス数を制約しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryIndex-is_a-Index-example-positive-001
        kind: positive
        labels:
          zh: 具有索引身份的发现结构
          en: Discovery structure with index identity
          ja: 索引識別子を持つ発見構造
        scenario_id: null
        descriptions:
          zh: 一个索引对象保存 index_struct，并以 index_id=docs-main 被检索流程引用；它既是 DiscoveryIndex，也是更一般的 Index。
          en: An index object stores index_struct and is addressed by retrieval as index_id=docs-main; it is a DiscoveryIndex and therefore an Index.
          ja: 索引オブジェクトが index_struct を保持し、検索処理から index_id=docs-main として参照されるため、発見索引であり索引でもあります。
        field_values:
          index_id: docs-main
        related_node_ids:
          - DiscoveryIndex
          - Index
        related_relation_ids:
          - DiscoveryIndex-is_a-Index
        expected_result:
          zh: 接受发现索引的 Index 归类。
          en: Accept DiscoveryIndex as an Index subtype.
          ja: 発見索引を索引の下位型として受理します。
        why_valid_or_invalid:
          zh: 对象具有持久索引结构与可引用身份，满足父类索引和子类发现用途两层条件。
          en: The object has persistent index structure and addressable identity, satisfying both the Index genus and the discovery-specific differentia.
          ja: 永続的な索引構造と参照可能な識別子を持ち、索引上位型と発見用途の種差を満たします。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-discovery-index-008
      - id: DiscoveryIndex-is_a-Index-example-boundary-001
        kind: boundary
        labels:
          zh: 索引引用不是索引本体
          en: An index reference is not the index
          ja: 索引参照は索引本体ではない
        scenario_id: null
        descriptions:
          zh: 记录只含 index_id=docs-main，用来解析到外部索引，却不拥有 index_struct；它是 IndexPointer，而不是 DiscoveryIndex。
          en: A record only carries index_id=docs-main to resolve an external index and owns no index_struct; it is an IndexPointer, not a DiscoveryIndex.
          ja: 記録は外部索引を解決する index_id=docs-main だけを持ち index_struct を所有しないため、索引ポインタであって発見索引ではありません。
        field_values:
          index_id: docs-main
        related_node_ids:
          - DiscoveryIndex
          - Index
          - IndexPointer
        related_relation_ids:
          - DiscoveryIndex-is_a-Index
        expected_result:
          zh: 拒绝把纯引用归类为 DiscoveryIndex。
          en: Reject the reference as a DiscoveryIndex.
          ja: 純粋な参照を発見索引に分類しません。
        why_valid_or_invalid:
          zh: 同一标识符字段不等于索引身份所有权；引用解析目标，索引本体拥有结构。
          en: "Sharing an identifier field does not confer index identity ownership: a reference resolves the target, while the index owns its structure."
          ja: 同じ識別子フィールドでも索引同一性を所有するとは限らず、参照は対象を解決し、索引本体は構造を所有します。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-discovery-index-009
    source_claims:
      - claim-discovery-index-010
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:Index
