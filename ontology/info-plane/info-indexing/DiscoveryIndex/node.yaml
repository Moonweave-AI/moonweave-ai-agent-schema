schema: moonweave.ai/ontology-node/v1
id: DiscoveryIndex
kind: concept
labels:
  zh: 发现索引
  en: discovery index
  ja: 発見インデックス
semantics:
  short_definition:
    zh: 描述会话内可枚举入口的轻量索引视图分支。
    en: Branch describing lightweight index views for session-local enumeration entry points.
    ja: session-local 列挙入口の lightweight index view 分支。
  definition:
    zh: DiscoveryIndex 含 LightIndex 子类，对应客户端可见的 codebase index 视图或 MCP session 资源目录快照；不是 memory-retrieval-ranking 的持久 Index。
    en: DiscoveryIndex includes LightIndex subclass for client-visible codebase index views or MCP session resource catalog snapshots—not memory-retrieval-ranking durable Index.
    ja: session-local index view（Cursor codebase index snapshot）。
  why_needed:
    zh: 区分“会话可见索引视图”与“后台 RAG/Cursor 持久索引构建产物”。
    en: Separates session-visible index views from background RAG/Cursor durable index build artifacts.
    ja: view vs durable index。
  includes:
    - zh: LightIndex、entry 计数、可见 URI/path 前缀。
      en: LightIndex, entry counts, visible URI/path prefixes.
      ja: LightIndex/entry count/prefixes。
  excludes:
    - zh: IndexBuildRun、Embedding shard、IndexRefreshRun。
      en: IndexBuildRun, Embedding shards, IndexRefreshRun.
      ja: IndexBuildRun/shard/refresh。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor codebase index 在 agent 侧表现为可 search 的文件集合视图→LightIndex；MCP session resources 列表亦可视作 LightIndex snapshot。
    en: Cursor codebase index appears client-side as searchable file-set view→LightIndex; MCP session resources list also acts as LightIndex snapshot.
    ja: Cursor/MCP light index view。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: DiscoveryIndex-example-cursor-view
    labels:
      zh: Cursor 索引视图
      en: Cursor index view
      ja: Cursor index view
    descriptions:
      zh: lightidx-sess-14 表示 workspace 可见文件索引视图。
      en: lightidx-sess-14 represents workspace visible file index view.
      ja: Cursor light index。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: codebase index
    field_values: {}
    related_node_ids:
      - DiscoveryIndex
      - LightIndex
    related_relation_ids: []
    source_claims:
      - claim-didx-cursor
  - id: DiscoveryIndex-example-mcp-snapshot
    labels:
      zh: MCP 资源快照
      en: MCP resource snapshot
      ja: MCP resource snapshot
    descriptions:
      zh: MCP session resources 列表作为 LightIndex snapshot。
      en: MCP session resources list as LightIndex snapshot.
      ja: MCP light snapshot。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/list
    field_values: {}
    related_node_ids:
      - DiscoveryIndex
      - LightIndex
    related_relation_ids: []
    source_claims:
      - claim-didx-mcp
  - id: DiscoveryIndex-example-not-durable
    labels:
      zh: 非持久 Index
      en: Not durable Index
      ja: durable Index ではない
    descriptions:
      zh: DiscoveryIndex 不得注册为 memory-retrieval-ranking Index。
      en: DiscoveryIndex must not register as memory-retrieval-ranking Index.
      ja: ≠durable Index。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DiscoveryIndex
    related_relation_ids: []
    source_claims:
      - claim-didx-design
parent_relation: null
relations:
  - id: DiscoveryIndex-is_a-Index
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是索引
      en: is an index
      ja: 索引である
    definitions:
      zh: 发现索引是索引的一种，其限定差是拥有可被发现活动引用和查询的索引身份及结构，而不是一次查询结果或指向索引的引用。
      en: DiscoveryIndex is an Index whose differentia is a stable index identity and structure addressable by discovery activities; it is neither one query result nor a reference that merely points to an index.
      ja: 発見索引は索引の一種であり、発見活動から参照・検索できる安定した索引識別子と構造を持ち、一回の検索結果や索引を指すだけの参照ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该边陈述发现索引的类型归属，不对索引实例数量作限制。
      en: The edge states the type of DiscoveryIndex and does not constrain how many index instances exist.
      ja: この辺は発見索引の型を述べ、索引インスタンス数を制約しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoveryIndex-is_a-Index-example-positive-001
        labels:
          zh: 具有索引身份的发现结构
          en: Discovery structure with index identity
          ja: 索引識別子を持つ発見構造
        descriptions:
          zh: 一个索引对象保存 index_struct，并以 index_id=docs-main 被检索流程引用；它既是 DiscoveryIndex，也是更一般的 Index。
          en: An index object stores index_struct and is addressed by retrieval as index_id=docs-main; it is a DiscoveryIndex and therefore an Index.
          ja: 索引オブジェクトが index_struct を保持し、検索処理から index_id=docs-main として参照されるため、発見索引であり索引でもあります。
        field_values:
          index_id: docs-main
        related_node_ids:
          - DiscoveryIndex
          - Index
        related_relation_ids:
          - DiscoveryIndex-is_a-Index
        source_claims:
          - claim-discovery-index-008
      - id: DiscoveryIndex-is_a-Index-example-boundary-001
        labels:
          zh: 索引引用不是索引本体
          en: An index reference is not the index
          ja: 索引参照は索引本体ではない
        descriptions:
          zh: 记录只含 index_id=docs-main，用来解析到外部索引，却不拥有 index_struct；它是 IndexPointer，而不是 DiscoveryIndex。
          en: A record only carries index_id=docs-main to resolve an external index and owns no index_struct; it is an IndexPointer, not a DiscoveryIndex.
          ja: 記録は外部索引を解決する index_id=docs-main だけを持ち index_struct を所有しないため、索引ポインタであって発見索引ではありません。
        field_values:
          index_id: docs-main
        related_node_ids:
          - DiscoveryIndex
          - Index
          - IndexPointer
        related_relation_ids:
          - DiscoveryIndex-is_a-Index
        source_claims:
          - claim-discovery-index-009
    source_claims:
      - claim-discovery-index-010
    layout_role: secondary-backbone
    target: concept:Index
sources:
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-mcp-resources-list
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: Session-local resource enumeration.
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-discovery-index-001
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex combines a persistent index_id with an index_struct and exposes retrieval construction, supporting DiscoveryIndex as an identity-bearing Index rather than a result record.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.__init__, index_id, index_struct and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-index-002
    source: eng-fw-llamaindex-repo
    supports: BaseIndex builds index structure from nodes and exposes a retriever, supporting the discovery-oriented queryability differentia while leaving the cross-module genus placement as a Moonweave ontology decision.
    locator: llama-index-core/llama_index/core/indices/base.py > build_index_from_nodes and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-index-003
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex stores an index_struct and assigns or accepts an index_id, supporting the example's continuing index identity and structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.__init__, index_struct and index_id
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-index-004
    source: eng-fw-llamaindex-repo
    supports: BaseIndex.as_retriever constructs a retriever from the index, supporting use of the same index object for candidate discovery queries.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-index-005
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex defines NodeWithScore as a node plus an optional score, which lacks the index_struct and index_id properties that characterize BaseIndex.
    locator: llama-index-core/llama_index/core/schema.py > NodeWithScore; indices/base.py > BaseIndex
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-index-006
    source: eng-fw-llamaindex-repo
    supports: BaseIndex separates construction of index structure from retrieval results, supporting the boundary between the index entity and a returned candidate.
    locator: llama-index-core/llama_index/core/indices/base.py > build_index_from_nodes and as_retriever
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-index-007
    source: eng-fw-llamaindex-repo
    supports: BaseIndex exposes index_struct, index_id, and as_retriever, directly supporting the fields and behavior used in this instance.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex index_struct, index_id and as_retriever
    evidence_kind: official
    confidence: high
  - id: claim-discovery-index-008
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex BaseIndex owns an index_struct and exposes index_id, supporting an index object with stable identity and structure.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct and index_id
    evidence_kind: official
    confidence: high
  - id: claim-discovery-index-009
    source: eng-fw-llamaindex-repo
    supports: LlamaIndex distinguishes BaseIndex, which owns index_struct, from IndexNode.index_id, which points to another index or retriever.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.index_struct; llama-index-core/llama_index/core/schema.py > IndexNode.index_id
    evidence_kind: official
    confidence: high
  - id: claim-discovery-index-010
    source: eng-fw-llamaindex-repo
    supports: BaseIndex's owned index structure and addressable index identity support treating DiscoveryIndex as a specialized Index; the discovery specialization is Moonweave's reviewed differentia.
    locator: llama-index-core/llama_index/core/indices/base.py > BaseIndex.__init__, index_struct, and index_id
    evidence_kind: design-inference
    confidence: high
  - id: claim-didx-cursor
    source: src-cursor-search
    supports: Cursor codebase index is a client-visible searchable view mappable to LightIndex.
    locator: codebase index
    evidence_kind: official-doc
    confidence: medium
  - id: claim-didx-mcp
    source: src-mcp-resources-list
    supports: MCP session resource lists act as lightweight enumeration index snapshots.
    locator: resources/list
    evidence_kind: primary-spec
    confidence: high
  - id: claim-didx-design
    source: src-info-indexing-design
    supports: DiscoveryIndex views are session-local and exclude durable Index ownership.
    locator: DiscoveryIndex
    evidence_kind: design-inference
    confidence: high
