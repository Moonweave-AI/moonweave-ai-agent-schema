      - id: DiscoveryIndex-is_a-Index-example-boundary-001
        labels:
          zh: 索引引用不是索引本体
          en: An index reference is not the index
          ja: 索引参照は索引本体ではない
        scenario_id: null
        descriptions:
          zh: 记录只含 index_id=docs-main，用来解析到外部索引，却不拥有 index_struct；它是 IndexPointer，而不是 DiscoveryIndex。
          en: A record only carries index_id=docs-main to resolve an external index and owns no index_struct; it is an IndexPointer, not a DiscoveryIndex.
          ja: 記録は外部索引を解決する index_id=docs-main だけを持ち index_struct を所有しないため、索引ポインタであって発見索引ではありません。
        field_values:
