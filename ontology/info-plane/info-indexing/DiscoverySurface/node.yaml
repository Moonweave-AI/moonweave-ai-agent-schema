schema: moonweave.ai/ontology-node/v1
id: DiscoverySurface
kind: concept
status: review
labels:
  zh: 发现入口
  en: discovery surface
  ja: 発見面
semantics:
  short_definition:
    zh: 发现入口是描述可枚举或查询候选资源入口的资源描述符。
    en: A discovery surface is a resource descriptor for an entry point whose candidates can be listed or queried.
    ja: 発見入口は、候補を一覧・照会できる入口を記述する資源記述子です。
  definition:
    zh: DiscoverySurface 是 ResourceDescriptor 的一种：它以 URI 或等价定位符、名称和可选说明来描述一个能列举或查询候选的发现入口，例如 MCP 资源集合、文件目录或搜索集合。它是 resource descriptor record，而不是网络端点、检索活动、索引实体或入口中返回的资源内容。
    en: DiscoverySurface is a kind of ResourceDescriptor that describes a candidate-listing or query entry point with a URI or equivalent locator, name, and optional description, such as an MCP resource collection, file directory, or search collection. It is a resource descriptor record, not a network endpoint, retrieval activity, index entity, or content returned through the entry point.
    ja: DiscoverySurface は ResourceDescriptor の一種で、URI または同等の位置指定子、名称、任意説明により、MCP 資源集合、ファイルディレクトリ、検索集合など候補を一覧・照会できる発見入口を記述します。resource descriptor record であり、ネットワーク endpoint、検索活動、索引実体、入口から返る内容ではありません。
  why_needed:
    zh: 该概念使智能体能够先发现“去哪里列举候选”，再决定是否访问内容；把入口描述、实际访问协议和返回资源分开，可避免把 URI 当成已读取内容或把活动误当成节点。
    en: The concept lets an agent first discover where candidates can be listed and then decide whether to access content. Separating entry-point description, access protocol, and returned resource prevents a URI from being mistaken for read content or an activity for a node.
    ja: この概念により、エージェントはまず候補を一覧できる場所を発見し、その後で内容へアクセスするか決定できます。入口記述、アクセス手順、返却資源を分け、URI を既読内容や活動そのものと誤認することを防ぎます。
  includes:
    - zh: 纳入具有可定位标识和人类可读说明、用于枚举或查询候选集合的描述符，包括 MCP 资源列表入口和文件目录发现入口。
      en: Includes descriptors with a locatable identifier and human-readable explanation for listing or querying a candidate collection, including MCP resource-list and file-directory discovery entries.
      ja: 位置指定可能な識別と人間向け説明を持ち、候補集合の一覧・照会に用いる記述子を含みます。MCP 資源一覧やファイルディレクトリ発見入口も該当します。
  excludes:
    - zh: 排除实际 HTTP/MCP 服务进程、调用 resources/list 的 DiscoveryActivity、持有可查询结构的 DiscoveryIndex，以及列表中返回的单个资源描述符或资源内容。
      en: Excludes the actual HTTP/MCP service process, the DiscoveryActivity calling resources/list, a DiscoveryIndex with query structure, and an individual resource descriptor or resource content returned in the list.
      ja: 実際の HTTP/MCP サービス過程、resources/list を呼ぶ DiscoveryActivity、照会構造を持つ DiscoveryIndex、一覧で返る個別資源記述子・資源内容を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DiscoverySurface-example-positive-001
    kind: positive
    labels:
      zh: 发现入口正例
      en: Positive example of discovery surface
      ja: 発見面の正例
    scenario_id: null
    descriptions:
      zh: MCP 服务器发布 URI=repo://handbook、name=员工手册、description=可列举政策文档 的描述符；客户端据此知道该集合可用于发现候选，而尚未读取任何政策正文。
      en: An MCP server publishes a descriptor with URI repo://handbook, name Employee handbook, and description Listable policy documents; the client can identify it as a candidate-discovery collection without reading policy content.
      ja: MCP サーバーが URI=repo://handbook、name=従業員ハンドブック、description=一覧可能な規程文書 の記述子を公開し、クライアントは本文を読まず候補発見集合と識別できます。
    field_values:
      descriptor_id: descriptor-repo-handbook
    related_node_ids:
      - DiscoverySurface
      - DiscoveryActivity
    related_relation_ids:
      - DiscoveryActivity-exposed_by-DiscoverySurface
    expected_result:
      zh: 该描述符被识别为 DiscoverySurface，并保留 URI、名称与说明供人和智能体理解入口用途。
      en: The descriptor is classified as a DiscoverySurface and retains its URI, name, and description for human and agent interpretation.
      ja: この記述子は DiscoverySurface と分類され、入口用途の理解に必要な URI、名称、説明を保持します。
    why_valid_or_invalid:
      zh: MCP 对 Resource 描述符规定 uri、name、description 等发现元数据，正好支持“先描述可发现资源、后读取内容”的边界。
      en: MCP defines uri, name, description, and related discovery metadata for Resource descriptors, supporting the boundary between describing a discoverable resource and reading its content.
      ja: MCP は Resource 記述子に uri、name、description などの発見メタデータを定義し、発見可能資源の記述と内容読取りの境界を支えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-surface-003
      - claim-discovery-surface-004
  - id: DiscoverySurface-example-boundary-001
    kind: boundary
    labels:
      zh: 发现入口边界例
      en: Boundary case for discovery surface
      ja: 発見面の境界例
    scenario_id: null
    descriptions:
      zh: 客户端发出的 resources/list 请求是一次 DiscoveryActivity；它使用资源入口并返回描述符，但请求事件本身没有 URI、名称和说明所构成的资源描述身份。
      en: A client's resources/list request is a DiscoveryActivity that uses the resource entry and returns descriptors; the request event itself lacks the URI-name-description identity of a resource descriptor.
      ja: クライアントの resources/list 要求は資源入口を利用して記述子を返す DiscoveryActivity ですが、要求イベント自体は URI・名称・説明から成る資源記述識別を持ちません。
    field_values: {}
    related_node_ids:
      - DiscoverySurface
      - DiscoveryActivity
    related_relation_ids:
      - DiscoveryActivity-exposed_by-DiscoverySurface
    expected_result:
      zh: resources/list 请求保持 DiscoveryActivity 类型，不被分类为 DiscoverySurface。
      en: The resources/list request remains a DiscoveryActivity and is not classified as a DiscoverySurface.
      ja: resources/list 要求は DiscoveryActivity のままで、DiscoverySurface には分類されません。
    why_valid_or_invalid:
      zh: 协议将请求方法与返回的 Resource 描述符区分开；一个是发生的操作，另一个是描述可发现对象的信息记录。
      en: "The protocol distinguishes the request method from returned Resource descriptors: one is an operation occurrence and the other an information record describing a discoverable object."
      ja: プロトコルは要求メソッドと返却 Resource 記述子を分けます。前者は操作の発生、後者は発見可能対象を記述する情報記録です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-discovery-surface-005
      - claim-discovery-surface-006
  - id: DiscoverySurface-example-instance-001
    kind: instance
    labels:
      zh: 员工手册发现入口实例
      en: Employee-handbook discovery-surface instance
      ja: 従業員ハンドブック発見入口インスタンス
    scenario_id: null
    descriptions:
      zh: "资源描述符 {uri: repo://handbook, name: Employee handbook, description: Listable policy documents} 被记录为员工手册候选集合的 DiscoverySurface。"
      en: "The resource descriptor {uri: repo://handbook, name: Employee handbook, description: Listable policy documents} is recorded as the DiscoverySurface for the handbook candidate collection."
      ja: "資源記述子 {uri: repo://handbook, name: Employee handbook, description: Listable policy documents} をハンドブック候補集合の DiscoverySurface として記録します。"
    field_values:
      uri: repo://handbook
      name: Employee handbook
      description: Listable policy documents
    related_node_ids:
      - DiscoverySurface
      - ResourceDescriptor
    related_relation_ids:
      - DiscoverySurface-is_a-ResourceDescriptor
    expected_result:
      zh: 该记录作为 DiscoverySurface 实例显示，内容读取仍是后续独立操作。
      en: The record is shown as a DiscoverySurface instance while content reading remains a later separate operation.
      ja: 記録は DiscoverySurface インスタンスとして表示され、内容読取りは後続の別操作として残ります。
    why_valid_or_invalid:
      zh: 实例包含 MCP Resource 的定位与可读描述字段，并明确把用途限定为候选发现而非内容本身。
      en: The instance carries MCP Resource locator and human-readable description fields and explicitly limits its role to candidate discovery rather than content itself.
      ja: MCP Resource の位置指定・人間向け説明項目を持ち、役割を内容そのものではなく候補発見へ限定しています。
    synthetic: true
    verified_version: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_claims:
      - claim-discovery-surface-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: DiscoverySurface-is_a-ResourceDescriptor
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是资源描述符
      en: is a resource descriptor
      ja: リソース記述子である
    definitions:
      zh: 发现入口是资源描述符的一种，其限定差是声明可被发现的资源或资源模板及其访问标识；它描述可发现对象，但不是网络端点、检索活动或资源内容本身。
      en: DiscoverySurface is a ResourceDescriptor whose differentia is declaring a discoverable resource or resource template together with its access identifier; it describes what can be discovered rather than being an endpoint, activity, or resource content.
      ja: 発見面はリソース記述子の一種であり、発見可能なリソースまたはテンプレートとアクセス識別子を宣言します。ネットワーク端点・検索活動・内容本体ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 资源描述符的子类型归属不规定服务器必须发布多少个发现入口。
      en: Subtype classification does not prescribe how many discovery surfaces a server must publish.
      ja: 下位型分類はサーバーが公開すべき発見面の数を規定しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoverySurface-is_a-ResourceDescriptor-example-positive-001
        kind: positive
        labels:
          zh: MCP 资源模板描述
          en: MCP resource-template descriptor
          ja: MCP リソーステンプレート記述子
        scenario_id: null
        descriptions:
          zh: 服务器发布 uriTemplate=repo://{owner}/{name}、名称与媒体类型；该记录描述可发现资源族，因此是 DiscoverySurface 和 ResourceDescriptor。
          en: A server publishes uriTemplate=repo://{owner}/{name}, a name, and media type. This record describes a discoverable resource family, so it is DiscoverySurface and ResourceDescriptor.
          ja: サーバーが uriTemplate=repo://{owner}/{name}、名称、メディア型を公開します。発見可能なリソース族を記述するため発見面かつリソース記述子です。
        field_values:
          uriTemplate: repo://{owner}/{name}
        related_node_ids:
          - DiscoverySurface
          - ResourceDescriptor
        related_relation_ids:
          - DiscoverySurface-is_a-ResourceDescriptor
        expected_result:
          zh: 接受该发现入口的资源描述符归类。
          en: Accept the discovery surface as a resource descriptor.
          ja: 発見面をリソース記述子として受理します。
        why_valid_or_invalid:
          zh: 记录提供模板标识与人类可读元数据，承担描述而非传输或执行职责。
          en: The record supplies a template identifier and human-readable metadata, performing description rather than transport or execution.
          ja: テンプレート識別子と人間可読メタデータを提供し、転送や実行ではなく記述を担います。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-discovery-surface-008
      - id: DiscoverySurface-is_a-ResourceDescriptor-example-boundary-001
        kind: boundary
        labels:
          zh: HTTP 地址不是描述符
          en: An HTTP address is not a descriptor
          ja: HTTP アドレスは記述子ではない
        scenario_id: null
        descriptions:
          zh: 字符串 https://api.example/mcp 只给出传输端点，没有资源名称、模板或描述元数据；它可以是 AccessPath，但不是 DiscoverySurface。
          en: The string https://api.example/mcp identifies only a transport endpoint and carries no resource name, template, or descriptive metadata; it may be an AccessPath, not a DiscoverySurface.
          ja: 文字列 https://api.example/mcp は転送端点だけを示し、名称・テンプレート・記述メタデータを持たないため、アクセス経路にはなり得ますが発見面ではありません。
        field_values:
          endpoint: https://api.example/mcp
        related_node_ids:
          - DiscoverySurface
          - ResourceDescriptor
          - AccessPath
        related_relation_ids:
          - DiscoverySurface-is_a-ResourceDescriptor
        expected_result:
          zh: 拒绝将纯端点地址归为 DiscoverySurface。
          en: Reject the bare endpoint as DiscoverySurface.
          ja: 裸の端点を発見面に分類しません。
        why_valid_or_invalid:
          zh: 访问位置与对可发现资源的描述是不同语义职责。
          en: An access location and a description of discoverable resources perform different semantic roles.
          ja: アクセス位置と発見可能リソースの記述は異なる意味的役割です。
        synthetic: true
        verified_version: 2026-07-16-manual-review
        source_claims:
          - claim-discovery-surface-009
    source_claims:
      - claim-discovery-surface-010
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: pending
    target: concept:ResourceDescriptor
