schema: moonweave.ai/ontology-node/v1
id: DiscoverySurface
kind: concept
labels:
  zh: 发现入口
  en: discovery surface
  ja: 発見面
semantics:
  short_definition:
    zh: 可复用描述候选发现入口面的资源描述。
    en: Reusable resource description of a candidate discovery entry surface.
    ja: 候補発見入口面を記述する reusable resource description。
  definition:
    zh: DiscoverySurface 归 info-storage-sources 引用侧：描述 MCP resources/list 入口、Cursor search 面、RAG collection 入口等可复用 surface；DiscoveryActivity 只记录实际使用的 surface 引用。
    en: "DiscoverySurface is referenced from info-storage-sources side: describes reusable surfaces like MCP resources/list entry, Cursor search surface, RAG collection entry; DiscoveryActivity records only the surface reference actually used."
    ja: reusable discovery entry surface descriptor。
  why_needed:
    zh: 把可复用入口描述与当次 discovery run 分开，避免把 surface 配置误当作一次 session 结果。
    en: Separates reusable entry descriptions from one session discovery run, avoiding mistaking surface config for session results.
    ja: surface vs activity separation。
  includes:
    - zh: surface_id、surface_kind、protocol binding、可见 scope 声明。
      en: surface_id, surface_kind, protocol binding, declared visible scope.
      ja: surface_id/kind/binding/scope。
  excludes:
    - zh: DiscoveryActivity、DiscoveryResult、Index 构建状态。
      en: DiscoveryActivity, DiscoveryResult, and Index build state.
      ja: activity/result/index build。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: surface-mcp-resources 描述 MCP server resources/list URI 模板；surface-cursor-codebase 描述 workspace semantic search 入口。
    en: surface-mcp-resources describes MCP server resources/list URI template; surface-cursor-codebase describes workspace semantic search entry.
    ja: MCP/Cursor surface descriptors。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: DiscoverySurface-example-mcp
    labels:
      zh: MCP 资源面
      en: MCP resource surface
      ja: MCP resource surface
    descriptions:
      zh: surface-mcp-resources 描述 server resources/list 入口。
      en: surface-mcp-resources describes server resources/list entry.
      ja: MCP surface。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/list
    field_values: {}
    related_node_ids:
      - DiscoverySurface
      - info-storage-sources
    related_relation_ids: []
    source_claims:
      - claim-dsurf-mcp
  - id: DiscoverySurface-example-cursor
    labels:
      zh: Cursor 搜索面
      en: Cursor search surface
      ja: Cursor search surface
    descriptions:
      zh: surface-cursor-codebase 描述 @+semantic search 入口。
      en: surface-cursor-codebase describes @+semantic search entry.
      ja: Cursor surface。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/tools/search
      version: search surface
    field_values: {}
    related_node_ids:
      - DiscoverySurface
    related_relation_ids: []
    source_claims:
      - claim-dsurf-cursor
  - id: DiscoverySurface-example-not-activity
    labels:
      zh: 非 Activity
      en: Not activity
      ja: activity ではない
    descriptions:
      zh: DiscoverySurface 配置不是 disc-101 运行记录。
      en: DiscoverySurface config is not disc-101 run record.
      ja: surface≠activity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DiscoverySurface
      - DiscoveryActivity
    related_relation_ids: []
    source_claims:
      - claim-dsurf-design
parent_relation: null
relations:
  - id: DiscoverySurface-is_a-ResourceDescriptor
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是资源描述符
      en: is a resource descriptor
      ja: リソース記述子である
    definitions:
      zh: 发现入口是资源描述符的一种，其限定差是声明可被发现的资源或资源模板及其访问标识；它描述可发现对象，但不是网络端点、检索活动或资源内容本身。
      en: DiscoverySurface is a ResourceDescriptor whose differentia is declaring a discoverable resource or resource template together with its access identifier; it describes what can be discovered rather than being an endpoint, activity, or resource content.
      ja: 発見面はリソース記述子の一種であり、発見可能なリソースまたはテンプレートとアクセス識別子を宣言します。ネットワーク端点・検索活動・内容本体ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 资源描述符的子类型归属不规定服务器必须发布多少个发现入口。
      en: Subtype classification does not prescribe how many discovery surfaces a server must publish.
      ja: 下位型分類はサーバーが公開すべき発見面の数を規定しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DiscoverySurface-is_a-ResourceDescriptor-example-positive-001
        labels:
          zh: MCP 资源模板描述
          en: MCP resource-template descriptor
          ja: MCP リソーステンプレート記述子
        descriptions:
          zh: 服务器发布 uriTemplate=repo://{owner}/{name}、名称与媒体类型；该记录描述可发现资源族，因此是 DiscoverySurface 和 ResourceDescriptor。
          en: A server publishes uriTemplate=repo://{owner}/{name}, a name, and media type. This record describes a discoverable resource family, so it is DiscoverySurface and ResourceDescriptor.
          ja: サーバーが uriTemplate=repo://{owner}/{name}、名称、メディア型を公開します。発見可能なリソース族を記述するため発見面かつリソース記述子です。
        field_values:
          uriTemplate: repo://{owner}/{name}
        related_node_ids:
          - DiscoverySurface
          - ResourceDescriptor
        related_relation_ids:
          - DiscoverySurface-is_a-ResourceDescriptor
        source_claims:
          - claim-discovery-surface-008
      - id: DiscoverySurface-is_a-ResourceDescriptor-example-boundary-001
        labels:
          zh: HTTP 地址不是描述符
          en: An HTTP address is not a descriptor
          ja: HTTP アドレスは記述子ではない
        descriptions:
          zh: 字符串 https://api.example/mcp 只给出传输端点，没有资源名称、模板或描述元数据；它可以是 AccessPath，但不是 DiscoverySurface。
          en: The string https://api.example/mcp identifies only a transport endpoint and carries no resource name, template, or descriptive metadata; it may be an AccessPath, not a DiscoverySurface.
          ja: 文字列 https://api.example/mcp は転送端点だけを示し、名称・テンプレート・記述メタデータを持たないため、アクセス経路にはなり得ますが発見面ではありません。
        field_values:
          endpoint: https://api.example/mcp
        related_node_ids:
          - DiscoverySurface
          - ResourceDescriptor
          - AccessPath
        related_relation_ids:
          - DiscoverySurface-is_a-ResourceDescriptor
        source_claims:
          - claim-discovery-surface-009
    source_claims:
      - claim-discovery-surface-010
    layout_role: secondary-backbone
    target: concept:ResourceDescriptor
sources:
  - id: src-mcp-resources-list
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: Session-local resource enumeration.
  - id: src-cursor-search
    title: Cursor Agent Search Documentation
    publisher: Cursor
    url: https://cursor.com/docs/agent/tools/search
    source_type: official-doc
    relevance: "@ references and semantic search hits."
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-discovery-surface-001
    source: eng-proto-mcp-2025-spec
    supports: MCP defines Resource descriptors with locator and presentation metadata and a separate resources/list discovery operation, supporting DiscoverySurface as a descriptor record for a discoverable entry.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors and Listing resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-surface-002
    source: eng-proto-mcp-2025-spec
    supports: MCP separates Resource descriptor metadata from resource content returned by resources/read, supporting the exclusion of content and operations from DiscoverySurface.
    locator: MCP 2025-11-25 Server features > Resources > Reading resources and Resource contents
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-surface-003
    source: eng-proto-mcp-2025-spec
    supports: MCP Resource descriptors include uri, name, optional title and description, icons, mimeType, and size, directly supporting the descriptor fields in this example.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-surface-004
    source: eng-proto-mcp-2025-spec
    supports: The resources/list operation lets clients discover available resources before reading them, supporting use of a descriptor as a discovery surface rather than content.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources and Reading resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-surface-005
    source: eng-proto-mcp-2025-spec
    supports: MCP specifies resources/list as a request returning a paginated resources array, supporting the distinction between the operation and each descriptor record.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources request and result
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-surface-006
    source: eng-proto-mcp-2025-spec
    supports: Resource descriptor properties belong to returned resources rather than to the resources/list request, directly supporting the semantic boundary.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors and Listing resources
    evidence_kind: design-inference
    confidence: medium
  - id: claim-discovery-surface-007
    source: eng-proto-mcp-2025-spec
    supports: MCP Resource descriptors define uri, name, and optional description fields, directly supporting this concrete descriptor instance.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-surface-008
    source: eng-proto-mcp-2025-spec
    supports: MCP ResourceTemplate records expose uriTemplate, name, description, and mimeType metadata for discoverable resource families.
    locator: Server Features > Resources > Resource templates > ResourceTemplate fields
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-surface-009
    source: eng-proto-mcp-2025-spec
    supports: MCP defines structured Resource and ResourceTemplate descriptors separately from the transport used to reach an MCP server.
    locator: Server Features > Resources > Resources and resource templates; Base Protocol > Transports
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-surface-010
    source: eng-proto-mcp-2025-spec
    supports: The ResourceTemplate schema grounds DiscoverySurface as a descriptive record for a discoverable resource family; the is_a placement under ResourceDescriptor is Moonweave's reviewed ontology decision.
    locator: Server Features > Resources > Resource templates > ResourceTemplate fields
    evidence_kind: design-inference
    confidence: high
  - id: claim-dsurf-mcp
    source: src-mcp-resources-list
    supports: MCP resources/list is a reusable discovery entry surface.
    locator: resources/list
    evidence_kind: primary-spec
    confidence: high
  - id: claim-dsurf-cursor
    source: src-cursor-search
    supports: Cursor agent search is a reusable discovery entry surface.
    locator: agent search
    evidence_kind: official-doc
    confidence: high
  - id: claim-dsurf-design
    source: src-info-indexing-design
    supports: DiscoverySurface describes reusable entry points separate from session activities.
    locator: DiscoverySurface
    evidence_kind: design-inference
    confidence: high
