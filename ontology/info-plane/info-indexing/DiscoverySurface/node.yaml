source_claims:
  - id: claim-discovery-surface-001
    source: eng-proto-mcp-2025-spec
    supports: MCP defines Resource descriptors with locator and presentation metadata and a separate resources/list discovery operation, supporting DiscoverySurface as a descriptor record for a discoverable entry.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors and Listing resources
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-discovery-surface-002
    source: eng-proto-mcp-2025-spec
    supports: MCP separates Resource descriptor metadata from resource content returned by resources/read, supporting the exclusion of content and operations from DiscoverySurface.
    locator: MCP 2025-11-25 Server features > Resources > Reading resources and Resource contents
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-discovery-surface-003
    source: eng-proto-mcp-2025-spec
    supports: MCP Resource descriptors include uri, name, optional title and description, icons, mimeType, and size, directly supporting the descriptor fields in this example.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-discovery-surface-004
    source: eng-proto-mcp-2025-spec
    supports: The resources/list operation lets clients discover available resources before reading them, supporting use of a descriptor as a discovery surface rather than content.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources and Reading resources
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-discovery-surface-005
    source: eng-proto-mcp-2025-spec
    supports: MCP specifies resources/list as a request returning a paginated resources array, supporting the distinction between the operation and each descriptor record.
    locator: MCP 2025-11-25 Server features > Resources > Listing resources request and result
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-discovery-surface-006
    source: eng-proto-mcp-2025-spec
    supports: Resource descriptor properties belong to returned resources rather than to the resources/list request, directly supporting the semantic boundary.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors and Listing resources
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-discovery-surface-007
    source: eng-proto-mcp-2025-spec
    supports: MCP Resource descriptors define uri, name, and optional description fields, directly supporting this concrete descriptor instance.
    locator: MCP 2025-11-25 Server features > Resources > Resource descriptors
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-discovery-surface-008
    source: eng-proto-mcp-2025-spec
    supports: MCP ResourceTemplate records expose uriTemplate, name, description, and mimeType metadata for discoverable resource families.
    locator: Server Features > Resources > Resource templates > ResourceTemplate fields
    evidence_kind: normative
    confidence: high
