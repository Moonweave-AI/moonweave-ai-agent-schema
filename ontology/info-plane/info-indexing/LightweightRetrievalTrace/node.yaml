source_claims:
  - id: claim-lightweight-retrieval-trace-001
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace through spans sharing a TraceId and linked by span context, supporting LightweightRetrievalTrace as a TraceRecord rather than a generic summary.
    locator: OpenTelemetry Specification > Overview > Traces, Spans and SpanContext
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-002
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry spans support attributes and events, grounding retrieval-specific observations without requiring rank or score on every trace.
    locator: OpenTelemetry Specification > Overview > Span attributes and events
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-003
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace as a directed acyclic graph of spans identified by a TraceId, directly supporting the shared trace identifier and multiple spans.
    locator: OpenTelemetry Specification > Overview > Traces and Spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-004
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry spans carry a SpanContext plus attributes and events, supporting retrieval-specific result-count observations on the return span.
    locator: OpenTelemetry Specification > Overview > Span definition, attributes and events
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-005
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry requires SpanContext to contain TraceId and SpanId and defines traces through spans, supporting rejection of a run summary without those structures.
    locator: OpenTelemetry Specification > Overview > SpanContext and Traces
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-006
    source: eng-std-opentelemetry-spec
    supports: The trace model uses parent and child relationships among spans rather than aggregate log fields, grounding the trace-versus-summary boundary.
    locator: OpenTelemetry Specification > Overview > Traces as directed acyclic graphs of spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-007
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry SpanContext and trace models directly support the trace ID, span IDs, and parent-child span structure used by this instance.
    locator: OpenTelemetry Specification > Overview > SpanContext, Spans and Traces
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-008
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace as a graph of spans correlated by TraceId, with spans carrying timing and status information.
    locator: Overview > Traces > Spans; Trace > TraceId
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-009
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry separates logs from traces and defines traces through correlated spans and trace context, grounding the plain-log boundary.
    locator: Overview > Signals > Traces and Logs; Traces > Span context
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-010
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's trace model of TraceId-correlated spans grounds LightweightRetrievalTrace as a specialized TraceRecord; Moonweave narrows the span scope to lightweight retrieval.
    locator: Overview > Traces > Traces and Spans; TraceId
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-011
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry spans carry attributes and events within a trace, supporting a result-return span that records a stable result identifier and source metadata.
    locator: Overview > Traces > Spans > attributes and events
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-012
    source: eng-std-opentelemetry-spec
    supports: Trace context correlates spans under one TraceId, while span attributes provide the explicit object-level evidence needed for the records edge.
    locator: Overview > Traces > Trace context and TraceId; Spans > attributes
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-013
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry scopes attributes and events to specific spans; sharing broader execution context does not make an unmentioned object part of a span record.
    locator: Overview > Traces > Spans > span attributes and events
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-014
    source: eng-std-opentelemetry-spec
    supports: A trace is composed of its recorded spans, so result membership must be evidenced in those spans rather than inferred from an external session inventory.
    locator: Overview > Traces > A trace is a graph of spans
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-015
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's structured span attributes and events ground a trace-to-result records edge when a stable result identifier is present.
    locator: Overview > Traces > Spans > attributes and events
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-lightweight-retrieval-trace-016
    source: eng-std-opentelemetry-spec
    supports: TraceId correlation scopes the relevant span set, while result identity must still be explicit inside that set; Moonweave keeps the relation as a cross-link.
    locator: Overview > Traces > TraceId and span context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

