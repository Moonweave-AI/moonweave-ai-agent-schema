    labels:
      zh: 空结果轨迹
      en: Empty result trace
      ja: 空 result trace
    descriptions:
      zh: disc-102 trace 证明 PDF filter 已执行无候选。
      en: disc-102 trace proves PDF filter ran with no candidates.
      ja: empty trace proof。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: empty trace
    field_values:
      result_count: 0
    related_node_ids:
      - LightweightRetrievalTrace
      - DiscoveryActivity
    related_relation_ids: []
    source_claims:
      - claim-lwtrace-design
  - id: LightweightRetrievalTrace-example-markdown
    labels:
      zh: Markdown 轨迹
      en: Markdown trace
      ja: Markdown trace
    descriptions:
      zh: disc-101 trace 枚举三 Markdown source_uri。
      en: disc-101 trace enumerates three Markdown source_uri.
      ja: markdown trace。
    example_source:
