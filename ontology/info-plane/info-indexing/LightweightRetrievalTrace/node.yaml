schema: moonweave.ai/ontology-node/v1
id: LightweightRetrievalTrace
kind: concept
status: review
labels:
  zh: 轻量检索轨迹
  en: lightweight retrieval trace
  ja: 軽量検索トレース
semantics:
  short_definition:
    zh: 轻量检索轨迹是以统一 trace 标识关联一次轻量检索各操作跨度的追踪记录。
    en: A lightweight retrieval trace is a trace record linking the operation spans of one lightweight retrieval under one trace identifier.
    ja: 軽量検索トレースは、一つの trace 識別の下で軽量検索の操作 span を結ぶ追跡記録です。
  definition:
    zh: LightweightRetrievalTrace 是 TraceRecord 的一种：它必须具有 trace identifier，并以一个或多个 spans 记录轻量检索的请求、索引或表面访问、候选返回及相关属性或事件。它可以关联 DiscoveryResult，但不是候选摘要、结果列表或仅含 run_id 的日志行；没有 trace_id 与 span 结构的记录不属于该概念。
    en: LightweightRetrievalTrace is a kind of TraceRecord that requires a trace identifier and one or more spans recording a lightweight retrieval request, index or surface access, candidate return, and related attributes or events. It may reference DiscoveryResult records, but it is not a candidate summary, result list, or log line carrying only a run_id; a record without trace_id and span structure is outside this concept.
    ja: LightweightRetrievalTrace は TraceRecord の一種で、trace identifier と一つ以上の spans を必須とし、軽量検索要求、索引・入口アクセス、候補返却、関連属性・イベントを記録します。DiscoveryResult を参照できますが候補要約、結果一覧、run_id だけのログ行ではなく、trace_id と span 構造がなければ該当しません。
  why_needed:
    zh: 该概念让审计者能沿同一 trace 重建“收到查询—访问索引—返回候选”的因果时序，同时允许没有开启追踪的 DiscoveryResult 合法存在，避免把可观测性设置变成结果资格。
    en: The concept lets an auditor reconstruct query receipt, index access, and candidate return along one trace while allowing valid DiscoveryResult records when tracing is disabled, so observability configuration does not become result eligibility.
    ja: 同一 trace に沿って照会受信、索引アクセス、候補返却の因果時系列を再構成でき、追跡無効時の DiscoveryResult も合法にして、可観測性設定を結果資格にしません。
  includes:
    - zh: 纳入具有共享 trace_id、父子 span 上下文和检索相关属性或事件的 trace，至少覆盖一次轻量检索的一个操作跨度。
      en: Includes traces with a shared trace_id, parent/child span context, and retrieval-related attributes or events, covering at least one operation span of a lightweight retrieval.
      ja: 共有 trace_id、親子 span 文脈、検索関連属性・イベントを持ち、軽量検索の少なくとも一操作 span を含む trace を対象とします。
  excludes:
    - zh: 排除 DiscoveryResult、候选排名表、只有查询文本与结果数的审计摘要、单条无 trace 上下文日志，以及完整跨服务运行 trace 的其他专门子类。
      en: Excludes a DiscoveryResult, candidate ranking table, audit summary with only query text and result count, a single log line without trace context, and other specialized full cross-service runtime traces.
      ja: DiscoveryResult、候補順位表、照会文と結果数だけの監査要約、trace 文脈のない単一ログ行、他の完全なサービス横断実行 trace を除外します。
  semantic_kind: information
  aliases: []
