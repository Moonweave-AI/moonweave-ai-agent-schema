parent_relation: null
relations:
  - id: LightweightRetrievalTrace-is_a-TraceRecord
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是跟踪记录
      en: is a trace record
      ja: トレース記録である
    definitions:
      zh: 轻量检索跟踪是跟踪记录的一种，其限定差是以 trace identifier 关联轻量检索中的一个或多个 spans，并保存查询、候选读取与结果返回等步骤的时间和状态。
      en: LightweightRetrievalTrace is a TraceRecord whose differentia is using a trace identifier to correlate one or more spans for query handling, candidate reads, and result return in a lightweight retrieval.
      ja: 軽量検索トレースはトレース記録の一種であり、trace identifier により軽量検索の問い合わせ処理・候補読取・結果返却を表す一つ以上の spans を関連付けます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类型包含不规定一次检索跟踪必须包含多少个 span。
      en: Type inclusion does not prescribe the number of spans in one retrieval trace.
      ja: 型包含は一つの検索トレースに必要な span 数を規定しません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有子类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: LightweightRetrievalTrace-is_a-TraceRecord-example-positive-001
        labels:
          zh: 检索链路的多 span 跟踪
          en: Multi-span retrieval trace
          ja: 複数 span の検索トレース
        descriptions:
          zh: trace_id=7af3 关联 query.parse、index.read 和 result.return 三个 span，每个 span 有开始时间、结束时间和状态；该对象是 LightweightRetrievalTrace 与 TraceRecord。
          en: trace_id=7af3 correlates query.parse, index.read, and result.return spans, each with start time, end time, and status. The object is LightweightRetrievalTrace and TraceRecord.
          ja: trace_id=7af3 が query.parse、index.read、result.return の各 span を関連付け、開始・終了時刻と状態を持つため、軽量検索トレースかつトレース記録です。
        field_values:
          trace_id: 7af3
          span_count: 3
        related_node_ids:
          - LightweightRetrievalTrace
          - TraceRecord
        related_relation_ids:
          - LightweightRetrievalTrace-is_a-TraceRecord
        source_claims:
          - claim-lightweight-retrieval-trace-008
      - id: LightweightRetrievalTrace-is_a-TraceRecord-example-boundary-001
        labels:
          zh: 无 trace id 的文本摘要
          en: Text summary without trace ID
          ja: trace ID のない文章要約
        descriptions:
          zh: 日志行“检索完成，返回 5 条”没有 trace_id、span 边界或时间字段；它可作为运行说明，但不是 LightweightRetrievalTrace。
          en: The log line “retrieval complete, 5 returned” has no trace_id, span boundaries, or timing fields. It may be a runtime note, but it is not LightweightRetrievalTrace.
          ja: ログ行「検索完了、5 件返却」には trace_id、span 境界、時刻がなく、実行注記にはなりますが軽量検索トレースではありません。
        field_values:
          message: retrieval complete, 5 returned
        related_node_ids:
          - LightweightRetrievalTrace
          - TraceRecord
        related_relation_ids:
          - LightweightRetrievalTrace-is_a-TraceRecord
        source_claims:
          - claim-lightweight-retrieval-trace-009
    source_claims:
      - claim-lightweight-retrieval-trace-010
    layout_role: secondary-backbone
    target: concept:TraceRecord
  - id: LightweightRetrievalTrace-records-DiscoveryResult
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录
      en: records
      ja: 記録する
    definitions:
      zh: 当 LightweightRetrievalTrace 的 span、事件或结构化属性明确保存某个 DiscoveryResult 的 result_id 或等价稳定引用时，该跟踪 records 此结果；同一会话中出现但未被跟踪引用的结果不成立。
      en: LightweightRetrievalTrace records DiscoveryResult when a span, event, or structured attribute stores that result's result_id or an equivalent stable reference; a result in the same session but absent from the trace does not satisfy the relation.
      ja: LightweightRetrievalTrace の span・イベント・構造化属性が DiscoveryResult の result_id または同等の安定参照を保存する場合に records が成立し、同じセッションにあるだけでトレース未参照の結果には成立しません。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_target_of_records
      labels:
        zh: 反向：记录
        en: is target of records
        ja: 逆方向：記録する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: LightweightRetrievalTrace-records-DiscoveryResult-example-positive-001
        labels:
          zh: 记录正例
          en: Positive example of records
          ja: 記録するの正例
        descriptions:
          zh: trace 7af3 的 result.return span 包含 result.id=d-21、source.uri=repo://policy 和返回时间；该 LightweightRetrievalTrace records DiscoveryResult d-21。
          en: The result.return span in trace 7af3 contains result.id=d-21, source.uri=repo://policy, and return timing; this LightweightRetrievalTrace records DiscoveryResult d-21.
          ja: trace 7af3 の result.return span に result.id=d-21、source.uri=repo://policy、返却時刻があり、この LightweightRetrievalTrace は DiscoveryResult d-21 を記録します。
        field_values: {}
        related_node_ids:
          - LightweightRetrievalTrace
          - DiscoveryResult
        related_relation_ids:
          - LightweightRetrievalTrace-records-DiscoveryResult
        source_claims:
          - claim-lightweight-retrieval-trace-011
          - claim-lightweight-retrieval-trace-012
      - id: LightweightRetrievalTrace-records-DiscoveryResult-example-boundary-001
        labels:
          zh: 记录边界例
          en: Boundary case for records
          ja: 記録するの境界例
        descriptions:
          zh: 同一会话还产生 DiscoveryResult d-99，但 trace 7af3 的所有 spans 只引用 d-21；不能断言 trace 7af3 records d-99。
          en: The session also produces DiscoveryResult d-99, but every span in trace 7af3 references only d-21. Trace 7af3 does not record d-99.
          ja: 同じセッションで DiscoveryResult d-99 も生成されても、trace 7af3 の全 spans が d-21 だけを参照するなら、trace 7af3 は d-99 を記録しません。
        field_values: {}
        related_node_ids:
          - LightweightRetrievalTrace
          - DiscoveryResult
        related_relation_ids:
          - LightweightRetrievalTrace-records-DiscoveryResult
        source_claims:
          - claim-lightweight-retrieval-trace-013
          - claim-lightweight-retrieval-trace-014
    source_claims:
      - claim-lightweight-retrieval-trace-015
      - claim-lightweight-retrieval-trace-016
    layout_role: cross-link
    target: concept:DiscoveryResult
sources:
  - id: src-mcp-resources-list
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: Session-local resource enumeration.
  - id: src-info-indexing-design
    title: Moonweave info-indexing module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Session-local discovery separate from durable Index.
source_claims:
  - id: claim-lightweight-retrieval-trace-001
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace through spans sharing a TraceId and linked by span context, supporting LightweightRetrievalTrace as a TraceRecord rather than a generic summary.
    locator: OpenTelemetry Specification > Overview > Traces, Spans and SpanContext
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-trace-002
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry spans support attributes and events, grounding retrieval-specific observations without requiring rank or score on every trace.
    locator: OpenTelemetry Specification > Overview > Span attributes and events
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-trace-003
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace as a directed acyclic graph of spans identified by a TraceId, directly supporting the shared trace identifier and multiple spans.
    locator: OpenTelemetry Specification > Overview > Traces and Spans
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-trace-004
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry spans carry a SpanContext plus attributes and events, supporting retrieval-specific result-count observations on the return span.
    locator: OpenTelemetry Specification > Overview > Span definition, attributes and events
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-trace-005
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry requires SpanContext to contain TraceId and SpanId and defines traces through spans, supporting rejection of a run summary without those structures.
    locator: OpenTelemetry Specification > Overview > SpanContext and Traces
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-trace-006
    source: eng-std-opentelemetry-spec
    supports: The trace model uses parent and child relationships among spans rather than aggregate log fields, grounding the trace-versus-summary boundary.
    locator: OpenTelemetry Specification > Overview > Traces as directed acyclic graphs of spans
    evidence_kind: design-inference
    confidence: medium
  - id: claim-lightweight-retrieval-trace-007
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry SpanContext and trace models directly support the trace ID, span IDs, and parent-child span structure used by this instance.
    locator: OpenTelemetry Specification > Overview > SpanContext, Spans and Traces
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-008
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines a trace as a graph of spans correlated by TraceId, with spans carrying timing and status information.
    locator: Overview > Traces > Spans; Trace > TraceId
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-009
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry separates logs from traces and defines traces through correlated spans and trace context, grounding the plain-log boundary.
    locator: Overview > Signals > Traces and Logs; Traces > Span context
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-010
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's trace model of TraceId-correlated spans grounds LightweightRetrievalTrace as a specialized TraceRecord; Moonweave narrows the span scope to lightweight retrieval.
    locator: Overview > Traces > Traces and Spans; TraceId
    evidence_kind: design-inference
    confidence: high
  - id: claim-lightweight-retrieval-trace-011
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry spans carry attributes and events within a trace, supporting a result-return span that records a stable result identifier and source metadata.
    locator: Overview > Traces > Spans > attributes and events
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-012
    source: eng-std-opentelemetry-spec
    supports: Trace context correlates spans under one TraceId, while span attributes provide the explicit object-level evidence needed for the records edge.
    locator: Overview > Traces > Trace context and TraceId; Spans > attributes
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-013
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry scopes attributes and events to specific spans; sharing broader execution context does not make an unmentioned object part of a span record.
    locator: Overview > Traces > Spans > span attributes and events
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-014
    source: eng-std-opentelemetry-spec
    supports: A trace is composed of its recorded spans, so result membership must be evidenced in those spans rather than inferred from an external session inventory.
    locator: Overview > Traces > A trace is a graph of spans
    evidence_kind: normative
    confidence: high
  - id: claim-lightweight-retrieval-trace-015
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's structured span attributes and events ground a trace-to-result records edge when a stable result identifier is present.
    locator: Overview > Traces > Spans > attributes and events
    evidence_kind: design-inference
    confidence: high
  - id: claim-lightweight-retrieval-trace-016
    source: eng-std-opentelemetry-spec
    supports: TraceId correlation scopes the relevant span set, while result identity must still be explicit inside that set; Moonweave keeps the relation as a cross-link.
    locator: Overview > Traces > TraceId and span context
    evidence_kind: design-inference
    confidence: high
  - id: claim-lwtrace-mcp
    source: src-mcp-resources-list
    supports: MCP list/filter discovery can be traced with enumerated URIs.
    locator: resources/list
    evidence_kind: primary-spec
    confidence: high
  - id: claim-lwtrace-design
    source: src-info-indexing-design
    supports: LightweightRetrievalTrace proves discovery ran including empty results.
    locator: LightweightRetrievalTrace
    evidence_kind: design-inference
    confidence: high
