schema: moonweave.ai/ontology-node/v1
id: LightweightRetrievalTrace
kind: concept
labels:
  zh: 轻量检索轨迹
  en: lightweight retrieval trace
  ja: 軽量検索トレース
semantics:
  short_definition:
    zh: 轻量检索活动的查询、过滤与候选来源轨迹记录。
    en: Trace record of query, filters, and candidate provenance for lightweight retrieval.
    ja: lightweight retrieval の query/filter/candidate provenance trace record。
  definition:
    zh: LightweightRetrievalTrace 绑定 discovery_activity_id，记录 query_text、filter_predicate、enumerated_sources 与 empty-result 证明；不是 replayable RetrievalTrace。
    en: LightweightRetrievalTrace binds discovery_activity_id recording query_text, filter_predicate, enumerated_sources, and empty-result proof—not a replayable RetrievalTrace.
    ja: session-local lightweight trace。
  why_needed:
    zh: 空结果时仍需证明“已执行发现”，trace 提供审计证据。
    en: Empty results still require proof discovery ran; trace supplies audit evidence.
    ja: empty-result audit proof。
  includes:
    - zh: trace_id、query、filters、source list snapshot、timestamps。
      en: trace_id, query, filters, source list snapshot, timestamps.
      ja: trace/query/filters/sources/time。
  excludes:
    - zh: 跨库 RetrievalTrace、IndexBuildRun 日志。
      en: Cross-store RetrievalTrace and IndexBuildRun logs.
      ja: RetrievalTrace/IndexBuildRun。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: disc-102 trace 记录 mime_type=application/pdf filter 后 result_count=0；disc-101 trace 保留三 Markdown URI。
    en: disc-102 trace records mime_type=application/pdf filter with result_count=0; disc-101 trace retains three Markdown URIs.
    ja: trace for empty/non-empty discovery。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list enumeration with uri and mimeType.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list template enumeration.
    - name: Cursor Agent Search
      url: https://cursor.com/docs/agent/tools/search
      description: "@ references and semantic codebase search."
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
