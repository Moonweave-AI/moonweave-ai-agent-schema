      ja: RetrievalTrace ではない
    descriptions:
      zh: LightweightRetrievalTrace 不可 replay 跨库 retrieval pipeline。
      en: LightweightRetrievalTrace cannot replay cross-store retrieval pipelines.
      ja: ≠RetrievalTrace。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
