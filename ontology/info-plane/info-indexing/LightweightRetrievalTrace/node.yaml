      zh: OpenTelemetry 将 trace 定义为共享 TraceId 的 spans 集合，并允许 span 携带 attributes 和 events；该记录同时具备标识、跨度与检索观测。
      en: OpenTelemetry models a trace as spans sharing a TraceId and permits attributes and events on spans; this record contains identifier, span structure, and retrieval observations.
      ja: OpenTelemetry は trace を共有 TraceId の spans とし、span の attributes・events を許可します。この記録は識別、span 構造、検索観測を備えます。
