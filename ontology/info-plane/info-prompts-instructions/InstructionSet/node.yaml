schema: moonweave.ai/ontology-node/v1
id: InstructionSet
kind: concept
status: accepted
labels:
  zh: 指令集合
  en: Instruction Set
  ja: 指示集合
semantics:
  short_definition:
    zh: Moonweave 本地档案，用于按确定顺序选择多个本地 Instruction 并编译到一次模型运行。
    en: Moonweave local profile that selects multiple local Instructions in deterministic order for compilation into one model run.
    ja: 1 回のモデル実行へコンパイルするために、複数のローカル Instruction を決定的順序で選択する Moonweave ローカルプロファイル。
  definition:
    zh: InstructionSet 是 Moonweave 定义的本地配置对象，保存一组指令 ID、编译目标和选择上下文。运行时依据该档案构造 Agents SDK instructions 或 Responses instructions。它不是 MCP Prompt、MCP prompts/list 响应、MCP prompts/get 参数包或协议原生资源；若要采用服务器提示，必须先通过显式适配生成本地 Instruction。
    en: InstructionSet is a Moonweave-defined local configuration object that stores a group of instruction IDs, a compilation target, and a selection context. A runtime uses the profile to construct Agents SDK instructions or Responses instructions. It is not an MCP Prompt, an MCP prompts/list response, an MCP prompts/get argument package, or a protocol-native resource; a server prompt must first be explicitly adapted into a local Instruction before adoption.
    ja: InstructionSet は、指示 ID のグループ、コンパイル対象、選択コンテキストを保存する Moonweave 定義のローカル設定オブジェクトである。ランタイムはこのプロファイルを用いて Agents SDK instructions または Responses instructions を構成する。MCP Prompt、MCP prompts/list 応答、MCP prompts/get 引数パッケージ、プロトコルネイティブリソースではなく、サーバープロンプトを採用するには最初に明示的にローカル Instruction へ適応しなければならない。
  why_needed:
    zh: 将规则集合建模为可识别档案可使应用按工作流选择稳定配置、解释编译顺序并将一组规则与服务器公开提示区分开。
    en: Modeling a rule collection as an identifiable profile lets an application select stable configuration by workflow, explain compilation order, and distinguish a group of rules from a server-exposed prompt.
    ja: ルール集合を識別可能なプロファイルとしてモデル化することで、アプリケーションはワークフロー別に安定した設定を選択し、コンパイル順序を説明し、ルール群をサーバー公開プロンプトから区別できる。
  includes:
    - zh: 本地代码审查或客户支持运行使用的有序 Instruction ID 列表。
      en: An ordered list of local Instruction IDs used by a code-review or customer-support run.
      ja: コードレビューまたはカスタマーサポート実行で使用する順序付きローカル Instruction ID リスト。
    - zh: 指明输出应送往 Responses instructions 或 Agents SDK instructions 的编译目标。
      en: A compilation target stating whether output is sent to Responses instructions or Agents SDK instructions.
      ja: 出力を Responses instructions または Agents SDK instructions のどちらへ送るかを示すコンパイル対象。
  excludes:
    - zh: 由 MCP 服务器发现的 Prompt 定义、PromptArgument 或 PromptMessage。
      en: A Prompt definition, PromptArgument, or PromptMessage discovered from an MCP server.
      ja: MCP サーバーから発見された Prompt 定義、PromptArgument、または PromptMessage。
    - zh: 单次请求的用户输入或模型返回内容。
      en: User input for one request or content returned by a model.
      ja: 1 回の要求のユーザー入力またはモデルが返した内容。
  semantic_kind: entity
  aliases: [Moonweave instruction profile, local rule bundle, 本地规则档案]
engineering:
  explanation:
    zh: Moonweave 配置解析器根据任务类型选择 InstructionSet，读取其 instruction_ids，按声明顺序加载启用规则，并在冲突处理后生成单个发送载荷。profile 中只存本地 Instruction 引用；外部 MCP 记录不能直接插入，因为其发现、用户选择和参数化由另一个协议处理。
    en: A Moonweave configuration resolver selects an InstructionSet by task type, reads its instruction_ids, loads enabled rules in declared order, and generates one send payload after conflict handling. The profile stores only local Instruction references; external MCP records cannot be inserted directly because their discovery, user selection, and parameterization belong to another protocol.
    ja: Moonweave 設定リゾルバーはタスク種別で InstructionSet を選択し、その instruction_ids を読み、宣言順に有効なルールを読み込み、競合処理後に 1 つの送信ペイロードを生成する。プロファイルはローカル Instruction 参照だけを保存し、外部 MCP 記録は直接挿入できない。発見、ユーザー選択、パラメータ化は別プロトコルに属するためである。
  typical_input:
    - description:
        zh: 本地代码审查档案
        en: Local code-review profile
        ja: ローカルコードレビュープロファイル
      format: |-
        {"instruction_set_id":"iset-review","instruction_ids":["inst-brief","inst-cite"],"compilation_target":"responses_instructions"}
  typical_output:
    - description:
        zh: 已编译的指令字符串
        en: Compiled instructions string
        ja: コンパイル済み instructions 文字列
      format: |-
        {"instructions":"Answer in three bullets. Cite files.","profile_id":"iset-review","included_instruction_ids":["inst-brief","inst-cite"]}
  reference_implementations:
    - name: OpenAI Responses create
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Documents the instructions field used to insert local system or developer guidance into a response context.
    - name: OpenAI Agents SDK Agents
      url: https://openai.github.io/openai-agents-js/guides/agents/
      description: Documents instructions as local Agent configuration.
    - name: Model Context Protocol Prompts 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines remote server prompt discovery and retrieval rather than Moonweave local profiles.
structure:
  identity_keys: [instruction_set_id]
  fields:
    - id: instruction_set_id
      labels: {zh: 指令集合 ID, en: Instruction set ID, ja: 指示集合 ID}
      definitions: {zh: 一份 Moonweave 本地指令档案的稳定标识符。, en: Stable identifier for one Moonweave local instruction profile., ja: 1 つの Moonweave ローカル指示プロファイルの安定した識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: iset-review
      source_claims: [claim-agents-sdk-instructions]
    - id: instruction_ids
      labels: {zh: 指令 ID 列表, en: Instruction ID list, ja: 指示 ID リスト}
      definitions: {zh: 按确定顺序包含在该档案中的本地 Instruction 标识符。, en: Local Instruction identifiers included in this profile in deterministic order., ja: このプロファイルに決定的順序で含まれるローカル Instruction 識別子。}
      datatype: array<string>
      required: true
      cardinality: {min: 1, max: null}
      example_value: '["inst-brief","inst-cite"]'
      source_claims: [claim-agents-sdk-instructions]
    - id: compilation_target
      labels: {zh: 编译目标, en: Compilation target, ja: コンパイル対象}
      definitions: {zh: 本地档案编译结果发送到的本地 API 或 SDK 配置位置。, en: Local API or SDK configuration position receiving the compiled profile result., ja: ローカルプロファイルのコンパイル結果を受け取るローカル API または SDK 設定位置。}
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [responses_instructions, agents_sdk_instructions]
      example_value: responses_instructions
      source_claims: [claim-responses-instructions, claim-agents-sdk-instructions]
    - id: selection_context
      labels: {zh: 选择上下文, en: Selection context, ja: 選択コンテキスト}
      definitions: {zh: 本地运行时用于选择此档案的工作流或任务类别标识符。, en: Workflow or task-category identifier a local runtime uses to select this profile., ja: ローカルランタイムがこのプロファイルを選択するために使用するワークフローまたはタスクカテゴリ識別子。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: code_review
      source_claims: []
  constraints:
    - id: instruction-set-local-membership
      severity: error
      language: plain
      expression: Every instruction_ids entry must resolve to an enabled local Instruction and must not directly reference an MCP Prompt, PromptArgument, or PromptMessage.
      explanation: {zh: 指令集合是 Moonweave 本地档案，不能把不同协议的对象当作成员。, en: An instruction set is a Moonweave local profile and cannot treat objects from another protocol as members., ja: 指示集合は Moonweave ローカルプロファイルであり、別プロトコルのオブジェクトをメンバーとして扱えない。}
      source_claims: [claim-mcp-prompt-boundary, claim-agents-sdk-instructions]
    - id: instruction-set-deterministic-order
      severity: error
      language: plain
      expression: instruction_ids must be unique and ordered, and any unresolved conflict must be rejected before compilation.
      explanation: {zh: 稳定顺序和冲突处理使同一档案在相同上下文中生成可解释结果。, en: Stable ordering and conflict handling make the same profile produce explainable results in the same context., ja: 安定した順序と競合処理により、同じプロファイルは同じコンテキストで説明可能な結果を生成する。}
      source_claims: [claim-responses-instructions]
  required_relations: [InstructionSet-contains-Instruction]
examples:
  - id: instruction-set-code-review-instruction-profile
    labels:
      zh: 代码审查指令档案
      en: Code-review instruction profile
      ja: コードレビュー指示プロファイル

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; InstructionSet maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; InstructionSet maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; InstructionSet context/token boundary."}
    source_claims: [claim-responses-instructions, claim-agents-sdk-instructions]
parent_relation: null
relations:
  - id: InstructionSet-contains-Instruction
    predicate: contains
    target: concept:Instruction
    endpoint_order: set-to-member
    direction: source-to-target
    relation_kind: composition
    labels: {zh: 包含本地指令, en: contains local instruction, ja: ローカル指示を含む}
    definitions: {zh: 本地指令集合按声明顺序包含可编译的本地 Instruction。, en: A local instruction set contains compilable local Instructions in declared order., ja: ローカル指示集合は宣言順にコンパイル可能なローカル Instruction を含む。}
    cardinality: {source: {min: 1, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_member_of_instruction_set
      labels: {zh: 是指令集合成员, en: is member of instruction set, ja: 指示集合のメンバーである}
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-agents-sdk-instructions]
    distinct_fact_rationale: {zh: 此关系记录本地档案成员关系，而不表示 MCP 协议所有权。, en: This relation records local-profile membership and does not represent MCP protocol ownership., ja: この関係はローカルプロファイルメンバーシップを記録し、MCP プロトコル所有権を表さない。}
    layout_role: cross-link
sources:
  - id: openai-responses-create
    title: OpenAI Responses create
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-api-reference
    relevance: Defines the instructions field used as a local model-context input.
  - id: openai-agents-sdk
    title: OpenAI Agents SDK Agents
    url: https://openai.github.io/openai-agents-js/guides/agents/
    source_type: official-sdk-doc
    relevance: Defines instructions as local configuration on an Agent instance.
  - id: mcp-prompts
    title: Model Context Protocol Prompts 2025-11-25
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    source_type: official-spec
    relevance: Defines remote prompt protocol records that are distinct from Moonweave local profiles.
source_claims:
  - id: claim-responses-instructions
    source: openai-responses-create
    supports: The Responses API defines instructions as a system or developer message inserted into model context.
    locator: instructions
    evidence_kind: official-api-reference
    confidence: high
  - id: claim-agents-sdk-instructions
    source: openai-agents-sdk
    supports: The OpenAI Agents SDK documents instructions as the system prompt configuration for an Agent.
    locator: Basic configuration
    evidence_kind: official-sdk-doc
    confidence: high
  - id: claim-mcp-prompt-boundary
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 defines server-exposed prompt definitions and messages retrieved through prompts/list and prompts/get.
    locator: MCP Prompts 2025-11-25 § Protocol Messages
    evidence_kind: official-spec
    confidence: high

