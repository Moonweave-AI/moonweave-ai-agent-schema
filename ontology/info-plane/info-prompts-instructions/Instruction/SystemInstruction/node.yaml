schema: moonweave.ai/ontology-node/v1
id: SystemInstruction
kind: concept
labels:
  zh: 系统指令
  en: System instruction
  ja: システム指示
semantics:
  short_definition:
    zh: 由平台或系统层来源赋予规范效力的 Instruction 特化。
    en: Instruction specialization whose normative force comes from platform or system-tier sources.
    ja: platform/system tier source から normative force を得る Instruction 特化。
  definition:
    zh: SystemInstruction 映射 Anthropic Messages API 顶层 system 参数、OpenAI 历史 role=system 与 developer 级产品策略、MCP server 声明的全局行为约束；authority 通常为 platform 或 organization，scope 常为 session。
    en: SystemInstruction maps Anthropic Messages API top-level system parameter, OpenAI legacy role=system and developer-tier product policy, and MCP server global behavioral constraints; authority is typically platform or organization with session scope.
    ja: SystemInstruction は Anthropic system/OpenAI system/developer/MCP global constraint。
  why_needed:
    zh: 区分系统级约束与用户/任务级指令，使冲突解析能优先 platform system 文本。
    en: Separates system-tier constraints from user/task instructions so conflict resolution can prioritize platform system text.
    ja: system-tier constraint を user/task instruction と分離。
  includes:
    - zh: platform/organization 来源、session 或 global scope 的系统行为约束。
      en: System behavioral constraints from platform/organization sources with session or global scope.
      ja: platform/organization 由来 session/global scope constraint。
  excludes:
    - zh: 用户任务指令、模板成员 Instruction（除非显式标记 system-tier）、Message 包络本身。
      en: User task directives, template member Instructions unless explicitly system-tier, and Message envelopes themselves.
      ja: user task directive/template member（非 system-tier）/Message envelope。
  semantic_kind: specification
  aliases:
    - language: en
      value: system prompt
      alias_kind: synonym
    - language: zh
      value: 系统提示
      alias_kind: synonym
    - language: ja
      value: システムプロンプト
      alias_kind: synonym
engineering:
  explanation:
    zh: Anthropic POST /v1/messages system="Never reveal internal tool names."→inst-system-v12；不得把 system 字符串复制成 UserMessage。
    en: Anthropic POST /v1/messages system="Never reveal internal tool names."→inst-system-v12; do not copy system string into UserMessage.
    ja: Anthropic system 参数写像。
  typical_input:
    - description: Anthropic system
      format: '{"system":"Answer in bullet points. Never reveal internal tool names.","messages":[...]}'
      source_claims:
        - claim-system-anthropic
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - instruction_id
  fields:
    - id: instruction_id
      labels:
        zh: 指令标识
        en: Instruction ID
        ja: 指示 ID
      definitions:
        zh: 稳定标识这一项系统权威规范。
        en: Stably identifies this system-authority directive.
        ja: system-authority directive を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sysinst-data-boundary
      allowed_values: []
      source_claims:
        - claim-system-instruction-001
    - id: directive_text
      labels:
        zh: 指示正文
        en: Directive text
        ja: 指示本文
      definitions:
        zh: 记录系统权威实际施加的行为约束。
        en: Records the behavioral constraint actually imposed at system authority.
        ja: system authority が実際に課す行動 constraint を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Never expose secrets from tool output.
      allowed_values: []
      source_claims:
        - claim-system-instruction-001
    - id: authority_tier
      labels:
        zh: 权威层级
        en: Authority tier
        ja: 権威層
      definitions:
        zh: 固定该子类所要求的 system 权威身份。
        en: Records the system authority identity required by this subtype.
        ja: subtype が要求する system authority identity を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: system
      allowed_values: []
      source_claims:
        - claim-system-instruction-001
    - id: scope_ref
      labels:
        zh: 作用域引用
        en: Scope reference
        ja: scope 参照
      definitions:
        zh: 指向该系统指令实际约束的会话、代理或资源。
        en: References the session, agent, or resource governed by this system instruction.
        ja: system instruction が拘束する session・agent・resource を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: session:secure-agent
      allowed_values: []
      source_claims:
        - claim-system-instruction-001
    - id: valid_from
      labels:
        zh: 生效时间
        en: Valid from
        ja: 有効開始
      definitions:
        zh: 记录系统指令开始生效的时间。
        en: Records when the system instruction becomes effective.
        ja: system instruction の有効開始時刻を記録します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      allowed_values: []
      source_claims:
        - claim-system-instruction-001
    - id: valid_until
      labels:
        zh: 失效时间
        en: Valid until
        ja: 有効終了
      definitions:
        zh: 可选记录系统指令停止生效的时间。
        en: Optionally records when the system instruction ceases to be effective.
        ja: system instruction の有効終了時刻を任意記録します。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2027-07-16T00:00:00Z
      allowed_values: []
      source_claims:
        - claim-system-instruction-001
  constraints: []
  required_relations: []
examples:
  - id: SystemInstruction-example-anthropic
    labels:
      zh: Anthropic system 指令
      en: Anthropic system instruction
      ja: Anthropic system 指示
    descriptions:
      zh: inst-system-v12 authority=platform scope=session 来自顶层 system 参数。
      en: inst-system-v12 authority=platform scope=session from top-level system parameter.
      ja: Anthropic system instruction。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: system parameter
    field_values:
      instruction_id: inst-system-v12
      instruction_authority: platform
    related_node_ids:
      - SystemInstruction
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-system-anthropic
  - id: SystemInstruction-example-openai-developer-as-system
    labels:
      zh: OpenAI developer 级系统策略
      en: OpenAI developer-tier system policy
      ja: OpenAI developer 级 system policy
    descriptions:
      zh: inst-dev-policy-1 作为 platform 级 SystemInstruction 约束 credential 披露。
      en: inst-dev-policy-1 as platform-tier SystemInstruction constraining credential disclosure.
      ja: developer as system policy。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: developer role
    field_values: {}
    related_node_ids:
      - SystemInstruction
    related_relation_ids: []
    source_claims:
      - claim-system-openai
  - id: SystemInstruction-example-user-not-system
    labels:
      zh: 用户非系统指令
      en: User not system
      ja: user は system ではない
    descriptions:
      zh: 用户 "always use emojis" 是 Instruction 但不是 SystemInstruction。
      en: User "always use emojis" is Instruction but not SystemInstruction.
      ja: user directive≠SystemInstruction。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SystemInstruction
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-system-design
parent_relation:
  id: SystemInstruction-is_a-Instruction
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: SystemInstruction 是一种 Instruction，其种差是 system 权威层级以及明确的作用域和有效期，而不是使用名为 system prompt 的载体。
    en: SystemInstruction is_a Instruction whose differentia is system authority with explicit scope and validity, not use of a carrier named system prompt.
    ja: SystemInstruction is_a Instruction は system authority・explicit scope・validity を種差とし system prompt と呼ばれる carrier 使用では決まりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SystemInstruction-is_a-Instruction-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: sysinst-data-boundary 具有 system authority、会话作用域和有效期，因此满足 Instruction 上位条件及系统种差。
        en: sysinst-data-boundary has system authority, conversation scope, and validity, satisfying the Instruction genus and system differentia.
        ja: sysinst-data-boundary は system authority・conversation scope・validity を持ち Instruction genus と system 種差を満たします。
      field_values: {}
      related_node_ids:
        - SystemInstruction
        - Instruction
      related_relation_ids:
        - SystemInstruction-is_a-Instruction
      source_claims:
        - claim-system-instruction-002
    - id: SystemInstruction-is_a-Instruction-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: SDK 字段名写作 system_prompt，但适配器实际发送 developer message。
        en: An SDK field is named system_prompt, but the adapter actually sends a developer message.
        ja: SDK field 名が system_prompt でも adapter は実際に developer message を送信します。
      field_values: {}
      related_node_ids:
        - SystemInstruction
        - Instruction
      related_relation_ids:
        - SystemInstruction-is_a-Instruction
      source_claims:
        - claim-system-instruction-002
  source_claims:
    - claim-system-instruction-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
