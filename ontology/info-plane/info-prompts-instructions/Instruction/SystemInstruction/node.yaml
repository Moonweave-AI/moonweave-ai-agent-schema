source_claims:
  - id: claim-system-instruction-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec defines System as an authority level and system messages as a source of instructions, while roles also describe message carriers. Moonweave names the normative object SystemInstruction to avoid conflating authority with the carrier label SystemPrompt.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; Definitions > system messages
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-system-instruction-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec recognizes system-level instructions and separately defines system as a message role. Moonweave classifies the normative object SystemInstruction under Instruction while keeping its carrier distinct.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; Definitions > system messages
    evidence_kind: design-inference
    confidence: high
    review_status: pending
