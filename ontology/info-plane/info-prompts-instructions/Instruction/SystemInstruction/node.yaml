  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-system-instruction-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec defines System as an authority level and system messages as a source of instructions, while roles also describe message carriers. Moonweave names the normative object SystemInstruction to avoid conflating authority with the carrier label SystemPrompt.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; Definitions > system messages
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-instruction-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec recognizes system-level instructions and separately defines system as a message role. Moonweave classifies the normative object SystemInstruction under Instruction while keeping its carrier distinct.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; Definitions > system messages
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-anthropic
    source: src-anthropic-messages
    supports: Anthropic top-level system parameter carries session-scoped system instructions.
    locator: system parameter
    evidence_kind: primary-api
    confidence: high
  - id: claim-system-openai
    source: src-openai-chat
    supports: OpenAI developer role may carry platform-tier behavioral constraints modeled as SystemInstruction.
    locator: developer role
    evidence_kind: primary-api
    confidence: high
  - id: claim-system-design
    source: src-info-prompts-design
    supports: SystemInstruction is a specialization by authority tier not message role alone.
    locator: SystemInstruction
    evidence_kind: design-inference
    confidence: high
