schema: moonweave.ai/ontology-node/v1
id: SystemInstruction
kind: concept
status: review
labels:
  zh: 系统指令
  en: System instruction
  ja: システム指示
semantics:
  short_definition:
    zh: 由系统权威发出并在明确作用域与有效期内约束行为的指令。
    en: An instruction issued at system authority and bounded by explicit scope and validity.
    ja: system authority から発行され明示 scope・validity 内で行動を拘束する指示です。
  definition:
    zh: 系统指令是一类 Instruction，其规范身份由 system 权威层级、指令正文、作用域和有效期共同决定；它不等于名为 system 的消息包络，也不等于 SDK 将 instructions 字符串称作的“system prompt”传输表示。
    en: A SystemInstruction is an Instruction whose normative identity is jointly determined by system authority, directive text, scope, and validity. It is not a message envelope named system or the transport representation an SDK may call a “system prompt.”
    ja: SystemInstruction は system authority・directive text・scope・validity で規範 identity が決まる Instruction です。system と名付けた message envelope や SDK が “system prompt” と呼ぶ transport representation とは異なります。
  why_needed:
    zh: 用 SystemInstruction 取代 SystemPrompt 可把权威语义与消息/提示载体分开，并精确表达生命周期和作用域。
    en: Replacing SystemPrompt with SystemInstruction separates authority semantics from message or prompt carriers and expresses lifecycle and scope precisely.
    ja: SystemPrompt を SystemInstruction に置換することで authority semantics を message/prompt carrier から分離し lifecycle・scope を正確に表します。
  includes:
    - zh: 纳入稳定指令标识、规范正文、system 权威层级、作用域引用和有效时间区间。
      en: Includes stable instruction ID, normative text, system authority tier, scope reference, and validity interval.
      ja: stable instruction ID・normative text・system authority tier・scope reference・validity interval を含みます。
  excludes:
    - zh: 排除 SystemMessage 包络、普通 PromptTemplate、developer/user 指令和仅被库函数称为 system prompt 的字符串。
      en: Excludes SystemMessage envelopes, ordinary PromptTemplates, developer/user instructions, and strings called system prompts only by a library API.
      ja: SystemMessage envelope・通常 PromptTemplate・developer/user instruction・library API が system prompt と呼ぶだけの string を除外します。
  semantic_kind: specification
  aliases:
    - language: en
      value: system prompt
      alias_kind: synonym
    - language: zh
      value: 系统提示
      alias_kind: synonym
    - language: ja
      value: システムプロンプト
      alias_kind: synonym
structure:
  identity_keys:
    - instruction_id
  fields:
    - id: instruction_id
      labels:
        zh: 指令标识
        en: Instruction ID
        ja: 指示 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识这一项系统权威规范。
        en: Stably identifies this system-authority directive.
        ja: system-authority directive を安定識別します。
      allowed_values: []
      pattern: null
      example_value: sysinst-data-boundary
      source_claims:
        - claim-system-instruction-001
    - id: directive_text
      labels:
        zh: 指示正文
        en: Directive text
        ja: 指示本文
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录系统权威实际施加的行为约束。
        en: Records the behavioral constraint actually imposed at system authority.
        ja: system authority が実際に課す行動 constraint を記録します。
      allowed_values: []
      pattern: null
      example_value: Never expose secrets from tool output.
      source_claims:
        - claim-system-instruction-001
    - id: authority_tier
      labels:
        zh: 权威层级
        en: Authority tier
        ja: 権威層
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定该子类所要求的 system 权威身份。
        en: Records the system authority identity required by this subtype.
        ja: subtype が要求する system authority identity を記録します。
      allowed_values: []
      pattern: null
      example_value: system
      source_claims:
        - claim-system-instruction-001
    - id: scope_ref
      labels:
        zh: 作用域引用
        en: Scope reference
        ja: scope 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向该系统指令实际约束的会话、代理或资源。
        en: References the session, agent, or resource governed by this system instruction.
        ja: system instruction が拘束する session・agent・resource を参照します。
      allowed_values: []
      pattern: null
      example_value: session:secure-agent
      source_claims:
        - claim-system-instruction-001
    - id: valid_from
      labels:
        zh: 生效时间
        en: Valid from
        ja: 有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录系统指令开始生效的时间。
        en: Records when the system instruction becomes effective.
        ja: system instruction の有効開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-system-instruction-001
    - id: valid_until
      labels:
        zh: 失效时间
        en: Valid until
        ja: 有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选记录系统指令停止生效的时间。
        en: Optionally records when the system instruction ceases to be effective.
        ja: system instruction の有効終了時刻を任意記録します。
      allowed_values: []
      pattern: null
      example_value: 2027-07-16T00:00:00Z
      source_claims:
        - claim-system-instruction-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: SystemInstruction-manual-positive-20260716
    kind: positive
    labels:
      zh: 系统指令正例
      en: System instruction positive case
      ja: システム指示正例
    scenario_id: null
    descriptions:
      zh: sysinst-data-boundary 由 system 层发出，要求 secure-agent 会话不得泄露工具输出中的密钥，并声明一年有效期。
      en: sysinst-data-boundary is issued at system authority, forbids the secure-agent session from exposing keys in tool output, and declares a one-year validity interval.
      ja: sysinst-data-boundary は system authority で発行され、secure-agent session に tool output 内 key の開示禁止と一年の validity interval を宣言します。
    field_values:
      instruction_id: sysinst-data-boundary
      directive_text: Never expose secrets from tool output.
      authority_tier: system
      scope_ref: session:secure-agent
      valid_from: 2026-07-16T00:00:00Z
      valid_until: 2027-07-16T00:00:00Z
    related_node_ids:
      - SystemInstruction
      - Instruction
      - InstructionAuthority
      - InstructionScope
    related_relation_ids:
      - SystemInstruction-is_a-Instruction
      - Instruction-has_authority-InstructionAuthority
      - Instruction-has_scope-InstructionScope
    expected_result:
      zh: 对象归为 SystemInstruction，并通过 Instruction 元数据参与权威与作用域解析。
      en: The object is classified as SystemInstruction and participates in authority and scope resolution through Instruction metadata.
      ja: object は SystemInstruction と分類され Instruction metadata を通じ authority/scope resolution に参加します。
    why_valid_or_invalid:
      zh: 规范正文、system 权威、作用域和有效期四类身份条件均明确。
      en: Directive text, system authority, scope, and validity identity conditions are all explicit.
      ja: directive text・system authority・scope・validity の identity condition が全て明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-instruction-001
  - id: SystemInstruction-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 系统指令边界例
      en: System instruction boundary case
      ja: システム指示境界例
    scenario_id: null
    descriptions:
      zh: SDK 的 Agent.instructions 字符串被称为 system prompt，但部署适配器把它作为 developer message 发送；载体名称不能把它提升为 system 权威。
      en: An SDK calls Agent.instructions a system prompt, but the deployment adapter sends it as a developer message; the carrier name cannot elevate it to system authority.
      ja: SDK は Agent.instructions を system prompt と呼びますが deployment adapter は developer message として送信し、carrier 名だけで system authority へ昇格できません。
    field_values: {}
    related_node_ids:
      - SystemInstruction
      - DeveloperMessage
      - Instruction
    related_relation_ids: []
    expected_result:
      zh: 该对象按实际权威记录为普通 Instruction，而不是 SystemInstruction。
      en: The object is recorded as an ordinary Instruction at its actual authority, not as SystemInstruction.
      ja: object は実 authority の通常 Instruction として記録し SystemInstruction とはしません。
    why_valid_or_invalid:
      zh: SystemInstruction 的分类依赖规范权威事实，而不是框架字段名。
      en: SystemInstruction classification depends on normative authority evidence, not a framework field name.
      ja: SystemInstruction classification は framework field 名ではなく normative authority evidence に依存します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-instruction-001
external_mappings: []
applicability:
  - core
