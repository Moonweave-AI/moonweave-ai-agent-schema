schema: moonweave.ai/ontology-node/v1
id: InstructionScope
kind: concept
status: accepted
labels:
  zh: 指令作用域
  en: Instruction scope
  ja: 指示スコープ
semantics:
  short_definition:
    zh: 限定一项指令约束哪些对象、时段或操作的信息。
    en: Information limiting which objects, times, or actions an instruction governs.
    ja: 指示が拘束する対象・期間・操作を限定する情報です。
  definition:
    zh: 指令作用域是一类 InstructionMetadata，明确 Instruction 的对象边界、任务边界、时间窗口或资源范围；解析只在交叠范围内比较指令，不把局部约束外推到无关对象。
    en: InstructionScope is InstructionMetadata defining the object, task, time-window, or resource boundary of an Instruction. Resolution compares instructions only where scopes overlap and does not project local constraints onto unrelated objects.
    ja: InstructionScope は Instruction の object・task・time-window・resource boundary を定義する InstructionMetadata です。resolution は scope が重なる範囲だけ比較し、local constraint を無関係な object へ外挿しません。
  why_needed:
    zh: 显式作用域能解释两条文字冲突的指令为何可以同时有效，也防止把会话局部约束错误提升为全局规则。
    en: Explicit scope explains why textually conflicting instructions may both be valid and prevents a conversation-local constraint from becoming global.
    ja: explicit scope により文面上 conflict する instruction が同時に有効な理由を説明し、conversation-local constraint の global 化を防ぎます。
  includes:
    - zh: 纳入会话、任务、文件、工具、受众、时间窗口或资源集合的边界引用。
      en: Includes boundary references for conversations, tasks, files, tools, audiences, time windows, or resource sets.
      ja: conversation・task・file・tool・audience・time window・resource set の boundary reference を含みます。
  excludes:
    - zh: 排除来源权威、同级排序和当前条件是否满足的适用性判断。
      en: Excludes source authority, same-level ordering, and the applicability judgment that current conditions are met.
      ja: source authority・same-level ordering・current condition 成立の applicability judgment を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: scope_ref
      labels:
        zh: 作用域引用
        en: Scope reference
        ja: scope 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向受该指令约束的对象或资源集合。
        en: References the object or resource set governed by the instruction.
        ja: instruction が拘束する object/resource set を参照します。
      allowed_values: []
      pattern: null
      example_value: file:/reports/q2.md
      source_claims:
        - claim-instruction-scope-001
    - id: valid_from
      labels:
        zh: 生效时间
        en: Valid from
        ja: 有効開始
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录时间作用域开始；没有时间限制时可为空。
        en: Records the start of temporal scope and may be absent when the scope is not time-bounded.
        ja: temporal scope の開始を記録し時間制限がなければ省略できます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      source_claims:
        - claim-instruction-scope-001
    - id: valid_until
      labels:
        zh: 失效时间
        en: Valid until
        ja: 有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录时间作用域结束，不得被解释为来源权威变化。
        en: Records the end of temporal scope and must not be interpreted as a change in source authority.
        ja: temporal scope の終了を記録し source authority 変更とは解釈しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T08:00:00Z
      source_claims:
        - claim-instruction-scope-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionScope-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令作用域正例
      en: Instruction scope positive case
      ja: 指示スコープ正例
    scenario_id: null
    descriptions:
      zh: “不得修改”只绑定 file:/reports/q2.md；对另一份草稿文件的编辑请求不与其发生作用域交叠。
      en: “Do not modify” is bound only to file:/reports/q2.md; an edit request for another draft does not overlap that scope.
      ja: 「変更禁止」は file:/reports/q2.md のみに binding され、別 draft file の edit request とは scope が重なりません。
    field_values:
      scope_ref: file:/reports/q2.md
      metadata_id: metadata-inst-do-not-modify-report
      instruction_ref: inst-do-not-modify-report
    related_node_ids:
      - InstructionScope
      - Instruction
      - FileResourceReference
    related_relation_ids:
      - Instruction-has_scope-InstructionScope
    expected_result:
      zh: 保护约束仅对 q2.md 生效，其他文件按各自指令处理。
      en: The protective constraint applies only to q2.md; other files follow their own instructions.
      ja: protective constraint は q2.md のみに適用され、他 file は各 instruction に従います。
    why_valid_or_invalid:
      zh: 对象引用明确且解析没有把局部边界外推。
      en: The object reference is explicit and resolution does not extrapolate the local boundary.
      ja: object reference が明示され、resolution は local boundary を外挿していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-scope-001
  - id: InstructionScope-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令作用域边界例
      en: Instruction scope boundary case
      ja: 指示スコープ境界例
    scenario_id: null
    descriptions:
      zh: 一项 system 约束具有更高权威，但其作用域只覆盖外部发布；内部草稿编辑不因此自动禁止。
      en: A system constraint has higher authority but covers only external publication; it does not automatically prohibit internal draft editing.
      ja: system constraint は higher authority でも external publication のみを scope とし、internal draft editing を自動禁止しません。
    field_values: {}
    related_node_ids:
      - InstructionScope
      - InstructionAuthority
    related_relation_ids: []
    expected_result:
      zh: 权威信息保持不变，但无作用域交叠时不建立冲突。
      en: Authority remains unchanged, but no conflict is created without scope overlap.
      ja: authority は不変ですが scope overlap がなければ conflict を作りません。
    why_valid_or_invalid:
      zh: 高权威并不取消对其自身作用域边界的检查。
      en: Higher authority does not remove the need to test its own scope boundary.
      ja: higher authority でも自身の scope boundary 検査は必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-scope-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
