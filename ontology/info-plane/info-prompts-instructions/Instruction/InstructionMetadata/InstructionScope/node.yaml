        en: Scope reference
        ja: scope 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向受该指令约束的对象或资源集合。
        en: References the object or resource set governed by the instruction.
        ja: instruction が拘束する object/resource set を参照します。
      allowed_values: []
      pattern: null
      example_value: file:/reports/q2.md
      source_claims:
