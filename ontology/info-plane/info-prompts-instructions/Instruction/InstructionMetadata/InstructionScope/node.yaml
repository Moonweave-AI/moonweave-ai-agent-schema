    - id: InstructionScope-is_a-InstructionMetadata-manual-positive-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: null
      descriptions:
        zh: scope-file-report 将“不得修改”限定到 q2.md，因此是 InstructionScope 并作为该指令的 Metadata。
        en: scope-file-report limits “do not modify” to q2.md, making it InstructionScope and metadata of that directive.
        ja: scope-file-report は「変更禁止」を q2.md に限定し InstructionScope かつ directive の Metadata です。
      field_values: {}
      related_node_ids:
        - InstructionScope
        - InstructionMetadata
      related_relation_ids:
