schema: moonweave.ai/ontology-node/v1
id: InstructionScope
kind: concept
labels:
  zh: 指令作用域
  en: Instruction scope
  ja: 指示スコープ
semantics:
  short_definition:
    zh: 记录 Instruction 实际约束对象或任务边界的元数据。
    en: Metadata recording the object or task boundary an Instruction actually constrains.
    ja: Instruction が実際に拘束する object/task boundary を記録する metadata。
  definition:
    zh: InstructionScope 取值 session、task、tool-call、message、resource；决定哪些 Instruction 可进入同一冲突比较（scope 交叠）。
    en: InstructionScope values session, task, tool-call, message, resource; determines which Instructions enter the same conflict comparison via scope overlap.
    ja: session/task/tool-call/message/resource scope。
  why_needed:
    zh: 没有 scope，相反措辞但不同资源的指令会被误标冲突。
    en: Without scope, textually opposing directives on different resources would be mislabeled as conflicting.
    ja: scope なし→false conflict。
  includes:
    - zh: scope_kind 与可选 scope_target 资源引用。
      en: scope_kind and optional scope_target resource reference.
      ja: scope_kind/scope_target。
  excludes:
    - zh: applicability 条件表达式、directive_text 全文。
      en: Applicability condition expressions and full directive_text.
      ja: applicability/directive_text。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: '"不得修改" has_scope file:/reports/q2.md 与 edit q2.md 请求 scope 交叠→冲突检测。'
    en: '"Do not modify" has_scope file:/reports/q2.md overlaps edit q2.md request scope→conflict detection.'
    ja: scope overlap 检测。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys: []
  fields:
    - id: scope_ref
      labels:
        zh: 作用域引用
        en: Scope reference
        ja: scope 参照
      definitions:
        zh: 指向受该指令约束的对象或资源集合。
        en: References the object or resource set governed by the instruction.
        ja: instruction が拘束する object/resource set を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:/reports/q2.md
      allowed_values: []
      source_claims:
        - claim-instruction-scope-001
    - id: valid_from
      labels:
        zh: 生效时间
        en: Valid from
        ja: 有効開始
      definitions:
        zh: 记录时间作用域开始；没有时间限制时可为空。
        en: Records the start of temporal scope and may be absent when the scope is not time-bounded.
        ja: temporal scope の開始を記録し時間制限がなければ省略できます。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      allowed_values: []
      source_claims:
        - claim-instruction-scope-001
    - id: valid_until
      labels:
        zh: 失效时间
        en: Valid until
        ja: 有効終了
      definitions:
        zh: 记录时间作用域结束，不得被解释为来源权威变化。
        en: Records the end of temporal scope and must not be interpreted as a change in source authority.
        ja: temporal scope の終了を記録し source authority 変更とは解釈しません。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2026-07-17T08:00:00Z
      allowed_values: []
      source_claims:
        - claim-instruction-scope-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionScope-example-file
    labels:
      zh: 文件作用域
      en: File scope
      ja: file scope
    descriptions:
      zh: inst-no-edit-q2 has_scope file:/reports/q2.md。
      en: inst-no-edit-q2 has_scope file:/reports/q2.md.
      ja: file scope。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: file scope
    field_values:
      scope_kind: resource
      scope_target: file:/reports/q2.md
    related_node_ids:
      - InstructionScope
    related_relation_ids: []
    source_claims:
      - claim-iscope-design
  - id: InstructionScope-example-session
    labels:
      zh: 会话作用域
      en: Session scope
      ja: session scope
    descriptions:
      zh: inst-system-v12 scope_kind=session 约束整个调用。
      en: inst-system-v12 scope_kind=session constrains entire call.
      ja: session scope。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: system
    field_values:
      scope_kind: session
    related_node_ids:
      - InstructionScope
      - SystemInstruction
    related_relation_ids: []
    source_claims:
      - claim-iscope-anthropic
  - id: InstructionScope-example-no-text-conflict
    labels:
      zh: 无 scope 交叠
      en: No scope overlap
      ja: scope overlap なし
    descriptions:
      zh: q2.md 约束与 draft.md 编辑无 scope 交叠，不得仅凭文字冲突。
      en: q2.md constraint and draft.md edit have no scope overlap; textual opposition alone insufficient.
      ja: different resource→no conflict。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionScope
    related_relation_ids: []
    source_claims:
      - claim-iscope-design
parent_relation:
  id: InstructionScope-is_a-InstructionMetadata
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: InstructionScope 是一种 InstructionMetadata，其种差是记录指令约束的对象、任务、资源或有效时间边界。
    en: InstructionScope is_a InstructionMetadata whose differentia is the object, task, resource, or validity boundary governed by an instruction.
    ja: InstructionScope is_a InstructionMetadata は instruction が拘束する object・task・resource・validity boundary を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionScope-is_a-InstructionMetadata-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: scope-file-report 将“不得修改”限定到 q2.md，因此是 InstructionScope 并作为该指令的 Metadata。
        en: scope-file-report limits “do not modify” to q2.md, making it InstructionScope and metadata of that directive.
        ja: scope-file-report は「変更禁止」を q2.md に限定し InstructionScope かつ directive の Metadata です。
      field_values: {}
      related_node_ids:
        - InstructionScope
        - InstructionMetadata
      related_relation_ids:
        - InstructionScope-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-scope-002
    - id: InstructionScope-is_a-InstructionMetadata-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: InstructionApplicability 的 task.type 条件决定是否进入解析，不直接列出受约束资源边界。
        en: An InstructionApplicability task.type condition decides entry into resolution but does not itself enumerate governed resources.
        ja: InstructionApplicability の task.type condition は resolution 参加を決めますが governed resource boundary を列挙しません。
      field_values: {}
      related_node_ids:
        - InstructionScope
        - InstructionMetadata
      related_relation_ids:
        - InstructionScope-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-scope-002
  source_claims:
    - claim-instruction-scope-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Top-level system string separate from turn messages.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-scope-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires instructions and delegated actions to stay within an agreed scope and resolves only applicable instructions. Moonweave records the object and temporal boundary of each directive as InstructionScope.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy; Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-scope-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires adherence to explicit scope boundaries. Moonweave classifies the boundary qualifying a directive as InstructionScope under InstructionMetadata.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy
    evidence_kind: design-inference
    confidence: high
  - id: claim-iscope-anthropic
    source: src-anthropic-messages
    supports: Anthropic system parameter applies session-scoped behavioral constraints.
    locator: system parameter
    evidence_kind: primary-api
    confidence: high
  - id: claim-iscope-design
    source: src-info-prompts-design
    supports: InstructionScope determines conflict comparison sets via object boundaries.
    locator: InstructionScope
    evidence_kind: design-inference
    confidence: high
