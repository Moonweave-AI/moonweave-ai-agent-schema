      expected_result:
        zh: 类型查询保留 Scope 到 Metadata 的路径，并允许独立比较范围交叠。
        en: Type traversal preserves Scope under Metadata and allows independent overlap comparison.
        ja: type traversal は Scope→Metadata を保持し scope overlap を独立比較できます。
      why_valid_or_invalid:
        zh: 对象边界限定同一指令何处生效，符合父类限定信息条件。
        en: The object boundary qualifies where the same instruction applies, satisfying the parent information condition.
        ja: object boundary は同一 instruction の適用範囲を限定し parent information 条件を満たします。
