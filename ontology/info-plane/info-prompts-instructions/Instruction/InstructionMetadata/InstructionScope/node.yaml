    - id: InstructionScope-is_a-InstructionMetadata-manual-boundary-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: null
      descriptions:
        zh: InstructionApplicability 的 task.type 条件决定是否进入解析，不直接列出受约束资源边界。
        en: An InstructionApplicability task.type condition decides entry into resolution but does not itself enumerate governed resources.
        ja: InstructionApplicability の task.type condition は resolution 参加を決めますが governed resource boundary を列挙しません。
      field_values: {}
      related_node_ids:
        - InstructionScope
        - InstructionMetadata
      related_relation_ids:
        - InstructionScope-is_a-InstructionMetadata
      expected_result:
        zh: 适用条件保持 Applicability，不因相关而归为 Scope。
        en: The condition remains Applicability and is not classified as Scope merely because related.
        ja: condition は Applicability のままで関連だけで Scope に分類しません。
