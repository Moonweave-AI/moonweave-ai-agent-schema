schema: moonweave.ai/ontology-node/v1
id: InstructionMetadata
kind: concept
status: accepted
labels:
  zh: 指令元数据
  en: Instruction metadata
  ja: 指示メタデータ
semantics:
  short_definition:
    zh: 描述一项指令如何生效和被解析的信息集合。
    en: The information set describing how one instruction applies and is resolved.
    ja: 一つの指示がどう適用・解決されるかを記述する情報集合です。
  definition:
    zh: 指令元数据是附着于某一 Instruction 的组成信息，汇集适用性、权威、优先级、来源和作用域；它描述指令的规范条件，但自身不提出行为要求，也不是通用消息元数据。
    en: InstructionMetadata is compositional information attached to one Instruction that groups applicability, authority, priority, provenance, and scope. It describes normative conditions but issues no behavioral requirement and is not generic message metadata.
    ja: InstructionMetadata は一つの Instruction に付随し、applicability・authority・priority・provenance・scope をまとめる構成情報です。規範条件を記述しますが行動要求を発行せず、汎用 message metadata でもありません。
  why_needed:
    zh: 把效力条件从指令正文分离后，系统可以独立比较权威、时序和范围，同时保持这些信息仍属于同一项指令。
    en: Separating effect conditions from directive text enables independent comparison of authority, time, and scope while keeping them part of the same instruction.
    ja: 効力条件を directive text から分離すると、同一 instruction の一部であることを保ちながら authority・time・scope を独立比較できます。
  includes:
    - zh: 纳入专属于某一 Instruction 的适用、权威、优先、来源和范围说明。
      en: Includes applicability, authority, priority, provenance, and scope descriptions specific to one Instruction.
      ja: 一つの Instruction に固有の applicability・authority・priority・provenance・scope 記述を含みます。
  excludes:
    - zh: 排除消息时间戳、传输头、模板变量值以及独立的解析活动或解析结果。
      en: Excludes message timestamps, transport headers, template variable values, and independent processing activities or resolution results.
      ja: message timestamp、transport header、template variable 値、独立 processing activity、resolution result を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - metadata_id
  fields:
    - id: metadata_id
      labels:
        zh: 元数据标识
        en: Metadata ID
        ja: メタデータ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一组只属于同一项指令的解析条件。
        en: Identifies one condition bundle belonging to a single instruction.
        ja: 一つの instruction に属する条件 bundle を識別します。
      allowed_values: []
      pattern: null
      example_value: imeta-42
      source_claims:
        - claim-instruction-metadata-001
    - id: instruction_ref
      labels:
        zh: 指令引用
        en: Instruction reference
        ja: 指示参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向这些条件所修饰的 Instruction。
        en: References the Instruction qualified by these conditions.
        ja: これらの条件が修飾する Instruction を参照します。
      allowed_values: []
      pattern: null
      example_value: inst-user-42
      source_claims:
        - claim-instruction-metadata-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionMetadata-manual-positive-20260716

    labels:
      zh: 指令元数据正例
      en: Instruction metadata positive case
      ja: 指示メタデータ正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; InstructionMetadata maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; InstructionMetadata maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; InstructionMetadata context/token boundary."}

    field_values:
