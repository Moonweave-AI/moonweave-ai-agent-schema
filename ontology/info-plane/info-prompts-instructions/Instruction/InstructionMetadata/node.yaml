schema: moonweave.ai/ontology-node/v1
id: InstructionMetadata
kind: concept
status: review
labels:
  zh: 指令元数据
  en: Instruction metadata
  ja: 指示メタデータ
semantics:
  short_definition:
    zh: 描述一项指令如何生效和被解析的信息集合。
    en: The information set describing how one instruction applies and is resolved.
    ja: 一つの指示がどう適用・解決されるかを記述する情報集合です。
  definition:
    zh: 指令元数据是附着于某一 Instruction 的组成信息，汇集适用性、权威、优先级、来源和作用域；它描述指令的规范条件，但自身不提出行为要求，也不是通用消息元数据。
    en: InstructionMetadata is compositional information attached to one Instruction that groups applicability, authority, priority, provenance, and scope. It describes normative conditions but issues no behavioral requirement and is not generic message metadata.
    ja: InstructionMetadata は一つの Instruction に付随し、applicability・authority・priority・provenance・scope をまとめる構成情報です。規範条件を記述しますが行動要求を発行せず、汎用 message metadata でもありません。
  why_needed:
    zh: 把效力条件从指令正文分离后，系统可以独立比较权威、时序和范围，同时保持这些信息仍属于同一项指令。
    en: Separating effect conditions from directive text enables independent comparison of authority, time, and scope while keeping them part of the same instruction.
    ja: 効力条件を directive text から分離すると、同一 instruction の一部であることを保ちながら authority・time・scope を独立比較できます。
  includes:
    - zh: 纳入专属于某一 Instruction 的适用、权威、优先、来源和范围说明。
      en: Includes applicability, authority, priority, provenance, and scope descriptions specific to one Instruction.
      ja: 一つの Instruction に固有の applicability・authority・priority・provenance・scope 記述を含みます。
  excludes:
    - zh: 排除消息时间戳、传输头、模板变量值以及独立的解析活动或解析结果。
      en: Excludes message timestamps, transport headers, template variable values, and independent processing activities or resolution results.
      ja: message timestamp、transport header、template variable 値、独立 processing activity、resolution result を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - metadata_id
  fields:
    - id: metadata_id
      labels:
        zh: 元数据标识
        en: Metadata ID
        ja: メタデータ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一组只属于同一项指令的解析条件。
        en: Identifies one condition bundle belonging to a single instruction.
        ja: 一つの instruction に属する条件 bundle を識別します。
      allowed_values: []
      pattern: null
      example_value: imeta-42
      source_claims:
        - claim-instruction-metadata-001
    - id: instruction_ref
      labels:
        zh: 指令引用
        en: Instruction reference
        ja: 指示参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向这些条件所修饰的 Instruction。
        en: References the Instruction qualified by these conditions.
        ja: これらの条件が修飾する Instruction を参照します。
      allowed_values: []
      pattern: null
      example_value: inst-user-42
      source_claims:
        - claim-instruction-metadata-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionMetadata-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令元数据正例
      en: Instruction metadata positive case
      ja: 指示メタデータ正例
    scenario_id: null
    descriptions:
      zh: 解析器为 inst-user-42 建立 imeta-42，并在该组内分别记录 user 权威、当前会话作用域和后发优先事实。
      en: The parser creates imeta-42 for inst-user-42 and records user authority, current-conversation scope, and later-at-same-level precedence in that bundle.
      ja: parser は inst-user-42 用に imeta-42 を作成し、user authority・current-conversation scope・同一 level での later precedence を記録します。
    field_values:
      metadata_id: imeta-42
      instruction_ref: inst-user-42
    related_node_ids:
      - Instruction
      - InstructionMetadata
    related_relation_ids:
      - Instruction-has_metadata-InstructionMetadata
    expected_result:
      zh: 该组作为 Instruction 的组成元数据保存，各项子信息仍可单独查询。
      en: The bundle is retained as compositional metadata of the Instruction while each child fact remains queryable.
      ja: bundle は Instruction の構成 metadata として保持され、各 child fact を個別照会できます。
    why_valid_or_invalid:
      zh: 所有内容都限定同一指令的规范效力，并未引入另一项行为要求。
      en: Every item qualifies the normative effect of the same instruction and introduces no separate behavioral directive.
      ja: 全項目が同一 instruction の規範効力を限定し、別の行動 directive を導入していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-metadata-001
  - id: InstructionMetadata-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令元数据边界例
      en: Instruction metadata boundary case
      ja: 指示メタデータ境界例
    scenario_id: null
    descriptions:
      zh: HTTP 请求头中的 content-type 与 request-id 描述传输包络，而不改变某项 Instruction 的权威或适用条件。
      en: HTTP content-type and request-id headers describe a transport envelope and do not qualify the authority or applicability of an Instruction.
      ja: HTTP の content-type と request-id は transport envelope を記述し、Instruction の authority や applicability を限定しません。
    field_values: {}
    related_node_ids:
      - InstructionMetadata
      - ProtocolEnvelope
    related_relation_ids: []
    expected_result:
      zh: 这些字段留在协议或消息元数据中，不归类为 InstructionMetadata。
      en: Those fields stay in protocol or message metadata and are not classified as InstructionMetadata.
      ja: これらの field は protocol/message metadata に残り InstructionMetadata へ分類しません。
    why_valid_or_invalid:
      zh: 其身份由传输请求决定，而不是由某项指令的规范效力决定。
      en: Their identity depends on the transport request rather than the normative effect of an instruction.
      ja: 同一性は instruction の規範効力ではなく transport request に依存します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-metadata-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Instruction-has_metadata-InstructionMetadata
  predicate: has_metadata
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: has metadata
    en: has metadata
    ja: has metadata
  definitions:
    zh: 每项 Instruction 以 has_metadata 组成关系拥有描述其适用性、权威、优先级、来源和作用域的 InstructionMetadata；元数据随该指令身份存在但不成为指令正文。
    en: Instruction has_metadata InstructionMetadata means the instruction compositionally owns the applicability, authority, priority, provenance, and scope information qualifying it; the metadata is not directive text.
    ja: Instruction has_metadata InstructionMetadata は instruction が applicability・authority・priority・provenance・scope 情報を構成要素として持ち、metadata は directive text ではないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: inverse_has_metadata
    labels:
      zh: 反向 has_metadata
      en: inverse has_metadata
      ja: 逆 has_metadata
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Instruction-has_metadata-InstructionMetadata-manual-positive-20260716
      kind: positive
      labels:
        zh: has_metadata 正例
        en: has_metadata positive case
        ja: has_metadata 正例
      scenario_id: null
      descriptions:
        zh: inst-user-42 明确拥有 imeta-42，后者汇集该指令的 user 权威、会话作用域和同级后发顺序。
        en: inst-user-42 explicitly owns imeta-42, which groups its user authority, conversation scope, and same-level recency.
        ja: inst-user-42 は user authority・conversation scope・same-level recency をまとめる imeta-42 を明示的に持ちます。
      field_values: {}
      related_node_ids:
        - Instruction
        - InstructionMetadata
      related_relation_ids:
        - Instruction-has_metadata-InstructionMetadata
      expected_result:
        zh: 查询从 Instruction 唯一进入其组成元数据，不把元数据当成另一项指令。
        en: Traversal reaches the instruction's compositional metadata without treating it as another instruction.
        ja: traversal は instruction の構成 metadata に到達し metadata を別 instruction と扱いません。
      why_valid_or_invalid:
        zh: 元数据限定同一指令的效力条件并随该指令管理。
        en: The metadata qualifies and is managed with the same instruction's effect conditions.
        ja: metadata は同一 instruction の効力条件を限定し一体管理されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-instruction-metadata-002
    - id: Instruction-has_metadata-InstructionMetadata-manual-boundary-20260716
      kind: boundary
      labels:
        zh: has_metadata 边界例
        en: has_metadata boundary case
        ja: has_metadata 境界例
      scenario_id: null
      descriptions:
        zh: Message 的 request-id 与 Instruction 同时出现，但它属于传输包络且没有 has_metadata 断言。
        en: A Message request-id appears beside an Instruction but belongs to the transport envelope and has no has_metadata assertion.
        ja: Message の request-id は Instruction と同時に現れますが transport envelope に属し has_metadata assertion がありません。
      field_values: {}
      related_node_ids:
        - Instruction
        - InstructionMetadata
      related_relation_ids:
        - Instruction-has_metadata-InstructionMetadata
      expected_result:
        zh: 不得把 request-id 推成该 Instruction 的 InstructionMetadata。
        en: The request-id must not be inferred as InstructionMetadata of the Instruction.
        ja: request-id を Instruction の InstructionMetadata と推論してはなりません。
      why_valid_or_invalid:
        zh: 组成关系要求元数据真实限定该指令的规范效力。
        en: Composition requires the metadata to qualify that instruction's normative effect.
        ja: composition には metadata が当該 instruction の規範効力を限定する必要があります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-instruction-metadata-002
  source_claims:
    - claim-instruction-metadata-002
