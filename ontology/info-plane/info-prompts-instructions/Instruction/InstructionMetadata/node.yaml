schema: moonweave.ai/ontology-node/v1
id: InstructionMetadata
kind: concept
labels:
  zh: 指令元数据
  en: Instruction metadata
  ja: 指示メタデータ
semantics:
  short_definition:
    zh: 描述 Instruction 效力、来源、范围与优先级的元数据分支根。
    en: Metadata branch root describing Instruction force, provenance, scope, and priority.
    ja: Instruction の force/provenance/scope/priority を記述する metadata branch root。
  definition:
    zh: InstructionMetadata 拥有 InstructionAuthority、InstructionScope、InstructionPriority、InstructionApplicability、InstructionProvenance 子节点；对应 OpenAI Model Spec authority chain 的可查询字段，不是 Instruction 正文。
    en: InstructionMetadata owns InstructionAuthority, InstructionScope, InstructionPriority, InstructionApplicability, and InstructionProvenance—queryable fields aligned with OpenAI Model Spec authority chain, not Instruction body text.
    ja: InstructionMetadata は authority/scope/priority/applicability/provenance 子节点を所有。
  why_needed:
    zh: 把规范元数据与 directive_text 分开，使冲突检测可在不重新解析全文的情况下比较 authority 与 scope。
    en: Separating normative metadata from directive_text lets conflict detection compare authority and scope without re-parsing full text.
    ja: metadata と directive_text 分離で conflict detection 効率化。
  includes:
    - zh: authority、scope、priority、applicability、provenance 五类结构化元数据记录。
      en: Structured metadata records for authority, scope, priority, applicability, and provenance.
      ja: authority/scope/priority/applicability/provenance metadata。
  excludes:
    - zh: directive_text 正文、Message 包络字段、PromptInjectionSignal 与 mitigation 动作。
      en: directive_text body, Message envelope fields, PromptInjectionSignal, and mitigation actions.
      ja: directive_text/Message envelope/injection mitigation。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Instruction-has_authority/has_scope/has_priority/has_applicability/has_provenance 边连接各子节点；解析活动填充 metadata 后再进入冲突检测。
    en: Instruction-has_authority/has_scope/has_priority/has_applicability/has_provenance edges link subnodes; parsing activities populate metadata before conflict detection.
    ja: metadata relation 链。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - metadata_id
  fields:
    - id: metadata_id
      labels:
        zh: 元数据标识
        en: Metadata ID
        ja: メタデータ ID
      definitions:
        zh: 标识一组只属于同一项指令的解析条件。
        en: Identifies one condition bundle belonging to a single instruction.
        ja: 一つの instruction に属する条件 bundle を識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: imeta-42
      allowed_values: []
      source_claims:
        - claim-instruction-metadata-001
    - id: instruction_ref
      labels:
        zh: 指令引用
        en: Instruction reference
        ja: 指示参照
      definitions:
        zh: 指向这些条件所修饰的 Instruction。
        en: References the Instruction qualified by these conditions.
        ja: これらの条件が修飾する Instruction を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: inst-user-42
      allowed_values: []
      source_claims:
        - claim-instruction-metadata-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionMetadata-example-full-metadata
    labels:
      zh: 完整元数据链
      en: Full metadata chain
      ja: 完全 metadata 链
    descriptions:
      zh: inst-system-v12 链接 authority=platform scope=session priority=default provenance=platform-config。
      en: inst-system-v12 links authority=platform scope=session priority=default provenance=platform-config.
      ja: full metadata chain。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: metadata
    field_values: {}
    related_node_ids:
      - InstructionMetadata
      - InstructionAuthority
      - InstructionScope
    related_relation_ids: []
    source_claims:
      - claim-imeta-design
  - id: InstructionMetadata-example-partial-parse
    labels:
      zh: 部分解析
      en: Partial parse
      ja: 部分 parse
    descriptions:
      zh: 用户指令仅有 provenance 无 scope 时进入 InstructionParsingActivity 补全 scope。
      en: User instruction with provenance only enters InstructionParsingActivity to complete scope.
      ja: partial metadata→parsing。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: parsing
    field_values: {}
    related_node_ids:
      - InstructionMetadata
      - InstructionParsingActivity
    related_relation_ids: []
    source_claims:
      - claim-imeta-design
  - id: InstructionMetadata-example-not-body
    labels:
      zh: 非正文
      en: Not body text
      ja: 本文ではない
    descriptions:
      zh: directive_text 字段不属于 InstructionMetadata 子树。
      en: directive_text field does not belong to InstructionMetadata subtree.
      ja: directive_text∉metadata。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionMetadata
    related_relation_ids: []
    source_claims:
      - claim-imeta-design
parent_relation:
  id: Instruction-has_metadata-InstructionMetadata
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: has metadata
    en: has metadata
    ja: has metadata
  definitions:
    zh: 每项 Instruction 以 has_metadata 组成关系拥有描述其适用性、权威、优先级、来源和作用域的 InstructionMetadata；元数据随该指令身份存在但不成为指令正文。
    en: Instruction has_metadata InstructionMetadata means the instruction compositionally owns the applicability, authority, priority, provenance, and scope information qualifying it; the metadata is not directive text.
    ja: Instruction has_metadata InstructionMetadata は instruction が applicability・authority・priority・provenance・scope 情報を構成要素として持ち、metadata は directive text ではないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 has_metadata
      en: inverse has_metadata
      ja: 逆 has_metadata
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Instruction-has_metadata-InstructionMetadata-manual-positive-20260716
      labels:
        zh: has_metadata 正例
        en: has_metadata positive case
        ja: has_metadata 正例
      descriptions:
        zh: inst-user-42 明确拥有 imeta-42，后者汇集该指令的 user 权威、会话作用域和同级后发顺序。
        en: inst-user-42 explicitly owns imeta-42, which groups its user authority, conversation scope, and same-level recency.
        ja: inst-user-42 は user authority・conversation scope・same-level recency をまとめる imeta-42 を明示的に持ちます。
      field_values: {}
      related_node_ids:
        - Instruction
        - InstructionMetadata
      related_relation_ids:
        - Instruction-has_metadata-InstructionMetadata
      source_claims:
        - claim-instruction-metadata-002
    - id: Instruction-has_metadata-InstructionMetadata-manual-boundary-20260716
      labels:
        zh: has_metadata 边界例
        en: has_metadata boundary case
        ja: has_metadata 境界例
      descriptions:
        zh: Message 的 request-id 与 Instruction 同时出现，但它属于传输包络且没有 has_metadata 断言。
        en: A Message request-id appears beside an Instruction but belongs to the transport envelope and has no has_metadata assertion.
        ja: Message の request-id は Instruction と同時に現れますが transport envelope に属し has_metadata assertion がありません。
      field_values: {}
      related_node_ids:
        - Instruction
        - InstructionMetadata
      related_relation_ids:
        - Instruction-has_metadata-InstructionMetadata
      source_claims:
        - claim-instruction-metadata-002
  source_claims:
    - claim-instruction-metadata-002
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
