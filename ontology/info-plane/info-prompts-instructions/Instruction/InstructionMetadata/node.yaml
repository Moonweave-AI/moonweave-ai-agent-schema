source_claims:
  - id: claim-instruction-metadata-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec evaluates candidate instructions by source authority, applicability, scope, and ordering. Moonweave groups those independently inspectable facts as metadata belonging to a particular Instruction.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-metadata-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec resolves an instruction only after inspecting source authority, applicability, scope, and ordering. Moonweave groups those qualifying facts under Instruction-has_metadata-InstructionMetadata as a composition backbone.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-imeta-design
    source: src-info-prompts-design
    supports: InstructionMetadata captures normative facets separate from directive body text.
    locator: InstructionMetadata
    evidence_kind: design-inference
    confidence: high
