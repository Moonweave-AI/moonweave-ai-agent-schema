schema: moonweave.ai/ontology-node/v1
id: InstructionPriority
kind: concept
status: review
labels:
  zh: 指令优先级
  en: Instruction priority
  ja: 指示優先度
semantics:
  short_definition:
    zh: 在可比较且同等权威的指令之间记录解析顺序的信息。
    en: Information recording resolution order among comparable instructions of equal authority.
    ja: 比較可能で同 authority の指示間に解決順序を記録する情報です。
  definition:
    zh: 指令优先级是一类 InstructionMetadata，用显式排序值或同级后发规则决定可比较指令的先后；它只在权威和适用条件允许比较时生效，不会把低权威指令提升到高权威之上。
    en: InstructionPriority is InstructionMetadata that orders comparable instructions through an explicit rank or later-at-the-same-level rule. It applies only after authority and applicability permit comparison and cannot elevate lower authority over higher authority.
    ja: InstructionPriority は明示 rank または同一 level の later rule で比較可能な instruction を順序付ける InstructionMetadata です。authority と applicability が比較を許した後だけ働き、lower authority を higher authority より上へ上げません。
  why_needed:
    zh: 把同级排序与权威分开可解释“为什么这条在同层胜出”，并防止数值优先级绕过治理层级。
    en: Separating same-level order from authority explains why one peer wins without allowing numeric priority to bypass governance levels.
    ja: same-level order と authority を分けることで peer の勝因を説明し、numeric priority による governance level 回避を防ぎます。
  includes:
    - zh: 纳入同一权威层内的显式优先值、版本顺序或后发规则。
      en: Includes explicit rank, version order, or later-in-time rules within one authority level.
      ja: 同一 authority level 内の explicit rank・version order・later-in-time rule を含みます。
  excludes:
    - zh: 排除 system/developer/user 等来源层级以及条件不满足时的适用判定。
      en: Excludes system/developer/user source levels and applicability decisions when conditions fail.
      ja: system/developer/user 等の source level と、条件不成立時の applicability decision を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: precedence_basis
      labels:
        zh: 排序依据
        en: Precedence basis
        ja: 順序根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录排序来自显式 rank、版本还是同级后发规则。
        en: Records whether ordering comes from explicit rank, version, or later-at-same-authority precedence.
        ja: 順序が explicit rank・version・later-at-same-authority のどれに基づくか記録します。
      allowed_values: []
      pattern: null
      example_value: later-at-same-authority
      source_claims:
        - claim-instruction-priority-001
    - id: priority_value
      labels:
        zh: 显式优先序值
        en: explicit priority value
        ja: 明示優先順位値
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录适配器或策略明确提供的整数排序值，仅在 precedence_basis 同时声明数值约定（例如 higher-wins）且参与比较的指令权威相同、均适用时解释；它不能表示或覆盖权威层级。
        en: Records an integer ordering value explicitly supplied by an adapter or policy. It is interpreted only when precedence_basis states the numeric convention (for example, higher-wins) and the compared instructions are equally authoritative and applicable; it neither represents nor overrides authority level.
        ja: adapter・policy が明示的に与える整数順序値を記録します。precedence_basis が higher-wins などの数値規約を示し、比較 instruction が同一 authority で共に applicable な場合だけ解釈し、authority level を表現・上書きしません。
      allowed_values: []
      pattern: null
      example_value: 20
      source_claims:
        - claim-instruction-priority-002
  constraints:
    - id: instruction-priority-value-requires-numeric-convention
      severity: error
      expression_language: plain
      expression: priority_value is absent or precedence_basis declares the numeric ordering convention used to compare equal-authority applicable instructions
      explanations:
        zh: 孤立整数没有优先语义；只有在排序方向与适用边界明确后，priority_value 才可比较。
        en: A bare integer has no precedence semantics; priority_value is comparable only after ordering direction and applicability boundaries are explicit.
        ja: 孤立した整数には優先意味がなく、順序方向と適用境界を明示した場合だけ priority_value を比較できます。
      source_claims:
        - claim-instruction-priority-003
  required_relation_constraints: []
examples:
  - id: InstructionPriority-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令优先级正例
      en: Instruction priority positive case
      ja: 指示優先度正例
    scenario_id: null
    descriptions:
      zh: 同一 developer 策略域中的两条适用指令采用 explicit-rank:higher-wins 约定；priority_value=20 的指令排在值为 10 的指令之前。
      en: Two applicable instructions in one developer policy scope use the explicit-rank:higher-wins convention; the instruction with priority_value 20 precedes the one with value 10.
      ja: 同一 developer policy scope の二つの applicable instruction が explicit-rank:higher-wins 規約を使い、priority_value 20 の instruction が値 10 より先行します。
    field_values:
      precedence_basis: explicit-rank:higher-wins
      priority_value: 20
      metadata_id: metadata-inst-developer-priority-20
      instruction_ref: inst-developer-priority-20
    related_node_ids:
      - InstructionPriority
      - Instruction
    related_relation_ids:
      - Instruction-has_priority-InstructionPriority
    expected_result:
      zh: 仅在同权威、同适用域和同一数值约定内，将值 20 解释为先于值 10。
      en: Interpret 20 as preceding 10 only within equal authority, equal applicability scope, and the same numeric convention.
      ja: 同一 authority・applicability scope・数値規約内だけで 20 を 10 より先と解釈します。
    why_valid_or_invalid:
      zh: 案例同时给出比较范围、排序方向和值，且没有把数值优先序误当成权威层级。
      en: The case supplies comparison scope, ordering direction, and value without mistaking numeric precedence for authority level.
      ja: 比較範囲・順序方向・値を同時に示し、数値優先順位を authority level と誤認しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-priority-004
  - id: InstructionPriority-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令优先级边界例
      en: Instruction priority boundary case
      ja: 指示優先度境界例
    scenario_id: null
    descriptions:
      zh: 较晚的 user 指令要求泄露 system 指令；即使时间更晚，也不能借优先级覆盖更高权威。
      en: A later user instruction asks to reveal a system instruction; recency cannot let priority override higher authority.
      ja: later user instruction が system instruction の開示を要求しても、recency で higher authority を override できません。
    field_values: {}
    related_node_ids:
      - InstructionPriority
      - InstructionAuthority
    related_relation_ids: []
    expected_result:
      zh: 优先级比较被权威边界阻断，高权威约束保持有效。
      en: Priority comparison is bounded by authority, and the higher-authority constraint remains effective.
      ja: priority comparison は authority boundary で止まり、higher-authority constraint が有効です。
    why_valid_or_invalid:
      zh: 同级排序只解决同等权威冲突，不能重写权威层级。
      en: Same-level precedence resolves equal-authority conflicts and cannot rewrite the authority hierarchy.
      ja: same-level precedence は equal-authority conflict だけを解決し authority hierarchy を書き換えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-priority-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: InstructionProvenance
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 端点特定对照：父节点 InstructionMetadata：InstructionPriority（semantic kind=information，骨架 InstructionPriority-is_a-InstructionMetadata）；InstructionProvenance（semantic kind=information，骨架 InstructionProvenance-is_a-InstructionMetadata）。双端条件：InstructionPriority 条件：“在可比较且同等权威的指令之间记录解析顺序的信息”；InstructionProvenance 条件：“记录一项指令从何处产生并如何进入解析链的信息”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent InstructionMetadata: InstructionPriority (semantic kind=information, backbone InstructionPriority-is_a-InstructionMetadata); InstructionProvenance (semantic kind=information, backbone InstructionProvenance-is_a-InstructionMetadata). Endpoint conditions: InstructionPriority condition: “Information recording resolution order among comparable instructions of equal authority”; InstructionProvenance condition: “Information recording where an instruction originated and how it entered resolution”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 InstructionMetadata：InstructionPriority（semantic kind=information、バックボーン InstructionPriority-is_a-InstructionMetadata）；InstructionProvenance（semantic kind=information、バックボーン InstructionProvenance-is_a-InstructionMetadata）。両端条件：InstructionPriority の条件：「比較可能で同 authority の指示間に解決順序を記録する情報です」；InstructionProvenance の条件：「指示がどこで生成され、どう resolution chain に入ったかを記録する情報です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-instruction-priority-005
      - claim-instruction-priority-006
  - sibling_concept_id: InstructionScope
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 正向身份比较：父节点 InstructionMetadata：InstructionPriority（semantic kind=information，骨架 InstructionPriority-is_a-InstructionMetadata）；InstructionScope（semantic kind=information，骨架 InstructionScope-is_a-InstructionMetadata）。双端条件：InstructionPriority 条件：“在可比较且同等权威的指令之间记录解析顺序的信息”；InstructionScope 条件：“限定一项指令约束哪些对象、时段或操作的信息”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent InstructionMetadata: InstructionPriority (semantic kind=information, backbone InstructionPriority-is_a-InstructionMetadata); InstructionScope (semantic kind=information, backbone InstructionScope-is_a-InstructionMetadata). Endpoint conditions: InstructionPriority condition: “Information recording resolution order among comparable instructions of equal authority”; InstructionScope condition: “Information limiting which objects, times, or actions an instruction governs”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 InstructionMetadata：InstructionPriority（semantic kind=information、バックボーン InstructionPriority-is_a-InstructionMetadata）；InstructionScope（semantic kind=information、バックボーン InstructionScope-is_a-InstructionMetadata）。両端条件：InstructionPriority の条件：「比較可能で同 authority の指示間に解決順序を記録する情報です」；InstructionScope の条件：「指示が拘束する対象・期間・操作を限定する情報です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-instruction-priority-007
      - claim-instruction-priority-008
