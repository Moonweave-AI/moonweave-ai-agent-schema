schema: moonweave.ai/ontology-node/v1
id: InstructionPriority
kind: concept
labels:
  zh: 指令优先级
  en: Instruction priority
  ja: 指示優先度
semantics:
  short_definition:
    zh: 记录同级 Instruction 排序依据的元数据。
    en: Metadata recording peer-ordering basis among Instructions at the same authority tier.
    ja: 同一 authority tier 内 Instruction peer-ordering basis を記録する metadata。
  definition:
    zh: InstructionPriority 记录 explicit rank 或 later-at-equal-authority 规则；不能改变 authority 层级。
    en: InstructionPriority records explicit rank or later-at-equal-authority rule; it cannot change authority tier.
    ja: explicit rank/later-at-equal-authority。authority 変更不可。
  why_needed:
    zh: 同权威多条 user 指令需要可比较 precedence 而不重新解析全文。
    en: Multiple user directives at equal authority need comparable precedence without re-parsing full text.
    ja: equal authority 下 precedence 比較。
  includes:
    - zh: priority_kind、numeric_rank 或 temporal_precedence 标记。
      en: priority_kind, numeric_rank, or temporal_precedence marker.
      ja: priority_kind/numeric_rank/temporal_precedence。
  excludes:
    - zh: 跨 authority 覆盖、applicability 条件。
      en: Cross-authority overrides and applicability conditions.
      ja: cross-authority/applicability。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 后发 user 指令 has_priority later-at-equal-authority；priority=999 的 user 指令不得覆盖 developer 指令。
    en: Later user directive has_priority later-at-equal-authority; user priority=999 must not override developer instruction.
    ja: peer order only。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys: []
  fields:
    - id: precedence_basis
      labels:
        zh: 排序依据
        en: Precedence basis
        ja: 順序根拠
      definitions:
        zh: 记录排序来自显式 rank、版本还是同级后发规则。
        en: Records whether ordering comes from explicit rank, version, or later-at-same-authority precedence.
        ja: 順序が explicit rank・version・later-at-same-authority のどれに基づくか記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: later-at-same-authority
      allowed_values: []
      source_claims:
        - claim-instruction-priority-001
    - id: priority_value
      labels:
        zh: 显式优先序值
        en: explicit priority value
        ja: 明示優先順位値
      definitions:
        zh: 记录适配器或策略明确提供的整数排序值，仅在 precedence_basis 同时声明数值约定（例如 higher-wins）且参与比较的指令权威相同、均适用时解释；它不能表示或覆盖权威层级。
        en: Records an integer ordering value explicitly supplied by an adapter or policy. It is interpreted only when precedence_basis states the numeric convention (for example, higher-wins) and the compared instructions are equally authoritative and applicable; it neither represents nor overrides authority level.
        ja: adapter・policy が明示的に与える整数順序値を記録します。precedence_basis が higher-wins などの数値規約を示し、比較 instruction が同一 authority で共に applicable な場合だけ解釈し、authority level を表現・上書きしません。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 20
      allowed_values: []
      source_claims:
        - claim-instruction-priority-002
  constraints:
    - id: instruction-priority-value-requires-numeric-convention
      severity: error
      expression_language: plain
      expression: priority_value is absent or precedence_basis declares the numeric ordering convention used to compare equal-authority applicable instructions
      explanation:
        zh: 孤立整数没有优先语义；只有在排序方向与适用边界明确后，priority_value 才可比较。
        en: A bare integer has no precedence semantics; priority_value is comparable only after ordering direction and applicability boundaries are explicit.
        ja: 孤立した整数には優先意味がなく、順序方向と適用境界を明示した場合だけ priority_value を比較できます。
      source_claims:
        - claim-instruction-priority-003
  required_relations: []
examples:
  - id: InstructionPriority-example-later-user
    labels:
      zh: 后发 user 优先
      en: Later user precedence
      ja: later user precedence
    descriptions:
      zh: inst-user-43 后发覆盖 inst-user-41 于相同 authority/scope。
      en: inst-user-43 later overrides inst-user-41 at equal authority/scope.
      ja: later user wins peer order。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: peer order
    field_values:
      priority_kind: later-at-equal-authority
    related_node_ids:
      - InstructionPriority
    related_relation_ids: []
    source_claims:
      - claim-ipriority-design
  - id: InstructionPriority-example-explicit-rank
    labels:
      zh: 显式 rank
      en: Explicit rank
      ja: explicit rank
    descriptions:
      zh: inst-task-2 priority_kind=explicit rank=10 高于 rank=5。
      en: inst-task-2 priority_kind=explicit rank=10 beats rank=5.
      ja: explicit rank。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: explicit rank
    field_values:
      numeric_rank: 10
    related_node_ids:
      - InstructionPriority
    related_relation_ids: []
    source_claims:
      - claim-ipriority-design
  - id: InstructionPriority-example-no-cross-authority
    labels:
      zh: 不跨权威
      en: No cross-authority
      ja: cross-authority 不可
    descriptions:
      zh: user priority=999 不得越过 developer authority。
      en: User priority=999 must not cross developer authority.
      ja: priority≠authority。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: developer vs user
    field_values: {}
    related_node_ids:
      - InstructionPriority
      - InstructionAuthority
    related_relation_ids: []
    source_claims:
      - claim-ipriority-design
parent_relation:
  id: InstructionPriority-is_a-InstructionMetadata
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: InstructionPriority 是一种 InstructionMetadata，其种差是在权威与适用性允许比较后记录同级指令的排序依据。
    en: InstructionPriority is_a InstructionMetadata whose differentia is the ordering basis among instructions after authority and applicability permit comparison.
    ja: InstructionPriority is_a InstructionMetadata は authority・applicability が比較を許した後の instruction ordering basis を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionPriority-is_a-InstructionMetadata-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: prio-user-later 保存两项 user 指令的后发排序，因此是 InstructionPriority 也是限定该指令的 Metadata。
        en: prio-user-later stores recency between two user instructions, so it is InstructionPriority and qualifying InstructionMetadata.
        ja: prio-user-later は二つの user instruction の recency を保存し InstructionPriority かつ限定 InstructionMetadata です。
      field_values: {}
      related_node_ids:
        - InstructionPriority
        - InstructionMetadata
      related_relation_ids:
        - InstructionPriority-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-priority-009
    - id: InstructionPriority-is_a-InstructionMetadata-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: developer 高于 user 是 InstructionAuthority 事实，即使没有时间顺序也成立。
        en: Developer outranking user is an InstructionAuthority fact and holds without temporal ordering.
        ja: developer が user より上位なのは InstructionAuthority fact で時間順序なしでも成立します。
      field_values: {}
      related_node_ids:
        - InstructionPriority
        - InstructionMetadata
      related_relation_ids:
        - InstructionPriority-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-priority-009
  source_claims:
    - claim-instruction-priority-009
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-priority-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec states that a later instruction at the same authority overrides an earlier conflicting instruction, after higher-authority conflicts are handled. Moonweave records that independent ordering fact as InstructionPriority.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-priority-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires higher-authority conflicts to be resolved before same-level precedence. It does not prescribe numeric instruction ranks; Moonweave therefore preserves an adapter-supplied integer only as optional same-level ordering metadata with an explicit convention.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-priority-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec makes precedence conditional on authority, applicability, conflict, and same-level ordering. Moonweave derives the requirement that an optional numeric encoding declare its comparison convention.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-priority-004
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires authority and applicability to bound precedence comparisons. The explicit integer encoding in this example is a Moonweave adapter convention, not a numeric hierarchy asserted by the Model Spec.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-priority-005
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec supplies ordering rules for conflicting applicable instructions, including authority and later instructions at the same level. InstructionPriority records the comparable-instruction ordering result; it does not establish origin lineage.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-priority-006
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec treats message role and trusted versus untrusted origin as necessary context for instruction handling. InstructionProvenance records that origin path, but a provenance fact alone does not order two comparable instructions.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-priority-007
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec resolves conflicts among instructions that are both applicable and comparable. InstructionPriority records that ordering; it does not declare the object, action, or temporal scope within which either instruction is allowed to operate.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-priority-008
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec's autonomy rule requires explicit operational limits. InstructionScope records those limits independently of InstructionPriority, because a higher same-level rank cannot enlarge an instruction beyond its agreed scope.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy; Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-priority-009
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec uses later-at-the-same-authority ordering after authority comparison. Moonweave classifies that ordering fact as InstructionPriority under InstructionMetadata.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-ipriority-design
    source: src-info-prompts-design
    supports: InstructionPriority records peer order without granting authority.
    locator: InstructionPriority
    evidence_kind: design-inference
    confidence: high
