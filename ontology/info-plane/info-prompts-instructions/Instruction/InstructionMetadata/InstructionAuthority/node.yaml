schema: moonweave.ai/ontology-node/v1
id: InstructionAuthority
kind: concept
status: accepted
labels:
  zh: 指令权威
  en: Instruction authority
  ja: 指示権威
semantics:
  short_definition:
    zh: 表示指令来源在治理层级中所处位置的信息。
    en: Information locating an instruction source in the governing authority hierarchy.
    ja: 指示 source を統治 authority hierarchy 上に位置付ける情報です。
  definition:
    zh: 指令权威是一类 InstructionMetadata，记录赋予指令规范效力的来源层级，例如 system、developer 或 user；它用于解决不同层级之间的冲突，不等同于同一层级内的先后顺序或数值优先级。
    en: InstructionAuthority is InstructionMetadata recording the source level that grants normative force, such as system, developer, or user. It resolves cross-level conflicts and is distinct from temporal or numeric precedence within one level.
    ja: InstructionAuthority は system・developer・user など規範効力を与える source level を記録する InstructionMetadata です。level 間 conflict を解決し、同一 level 内の時系列・数値 precedence とは異なります。
  why_needed:
    zh: 单独表示权威可避免把角色、发送顺序和业务优先数混成一个不透明分值。
    en: Representing authority separately prevents role, arrival order, and business priority from collapsing into one opaque score.
    ja: authority を独立表現することで role・arrival order・business priority を一つの不透明 score に混同しません。
  includes:
    - zh: 纳入由规范或平台明确赋予的 root、system、developer、user 等权威层级及其发出主体。
      en: Includes authority tiers explicitly assigned by a governing specification or platform, with the issuing principal.
      ja: governing specification/platform が明示付与する root・system・developer・user 等の tier と issuing principal を含みます。
  excludes:
    - zh: 排除同级指令的时间先后、任务紧急度和指令是否适用的条件。
      en: Excludes same-level temporal order, task urgency, and conditions deciding whether the instruction applies.
      ja: 同一 level の時系列、task urgency、instruction applicability condition を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: authority_tier
      labels:
        zh: 权威层级
        en: Authority tier
        ja: 権威層
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录治理顺序中的来源层级，而非业务优先分。
        en: Records the source level in the governing order rather than a business priority score.
        ja: business priority score ではなく governing order 上の source level を記録します。
      allowed_values: []
      pattern: null
      example_value: developer
      source_claims:
        - claim-instruction-authority-001
    - id: issuer_ref
      labels:
        zh: 发出主体引用
        en: Issuer reference
        ja: 発行主体参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向实际发出该指令并取得此权威层级的主体或消息。
        en: References the principal or message that actually issued the instruction at this authority tier.
        ja: この authority tier で instruction を実際に発行した principal/message を参照します。
      allowed_values: []
      pattern: null
      example_value: message:developer:17
      source_claims:
        - claim-instruction-authority-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionAuthority-manual-positive-20260716

    labels:
      zh: 指令权威正例
      en: Instruction authority positive case
      ja: 指示権威正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; InstructionAuthority maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; InstructionAuthority maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; InstructionAuthority context/token boundary."}

    field_values:
      authority_tier: developer
      metadata_id: metadata-inst-developer-formatting
      instruction_ref: inst-developer-formatting
    related_node_ids:
      - InstructionAuthority
      - DeveloperMessage
      - Instruction
    related_relation_ids:
      - Instruction-has_authority-InstructionAuthority

    source_claims:
      - claim-instruction-authority-001
  - id: InstructionAuthority-manual-boundary-20260716

    labels:
      zh: 指令权威边界例
      en: Instruction authority boundary case
      ja: 指示権威境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; InstructionAuthority must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; InstructionAuthority must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - InstructionAuthority
      - InstructionPriority
    related_relation_ids: []

    source_claims:
      - claim-instruction-authority-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: InstructionPriority
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 端点特定对照：父节点 InstructionMetadata：InstructionAuthority（semantic kind=information，骨架 InstructionAuthority-is_a-InstructionMetadata）；InstructionPriority（semantic kind=information，骨架 InstructionPriority-is_a-InstructionMetadata）。双端条件：InstructionAuthority 条件：“表示指令来源在治理层级中所处位置的信息”；InstructionPriority 条件：“在可比较且同等权威的指令之间记录解析顺序的信息”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent InstructionMetadata: InstructionAuthority (semantic kind=information, backbone InstructionAuthority-is_a-InstructionMetadata); InstructionPriority (semantic kind=information, backbone InstructionPriority-is_a-InstructionMetadata). Endpoint conditions: InstructionAuthority condition: “Information locating an instruction source in the governing authority hierarchy”; InstructionPriority condition: “Information recording resolution order among comparable instructions of equal authority”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 InstructionMetadata：InstructionAuthority（semantic kind=information、バックボーン InstructionAuthority-is_a-InstructionMetadata）；InstructionPriority（semantic kind=information、バックボーン InstructionPriority-is_a-InstructionMetadata）。両端条件：InstructionAuthority の条件：「指示 source を統治 authority hierarchy 上に位置付ける情報です」；InstructionPriority の条件：「比較可能で同 authority の指示間に解決順序を記録する情報です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-instruction-authority-002
  - sibling_concept_id: InstructionProvenance
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 正向身份比较：父节点 InstructionMetadata：InstructionAuthority（semantic kind=information，骨架 InstructionAuthority-is_a-InstructionMetadata）；InstructionProvenance（semantic kind=information，骨架 InstructionProvenance-is_a-InstructionMetadata）。双端条件：InstructionAuthority 条件：“表示指令来源在治理层级中所处位置的信息”；InstructionProvenance 条件：“记录一项指令从何处产生并如何进入解析链的信息”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent InstructionMetadata: InstructionAuthority (semantic kind=information, backbone InstructionAuthority-is_a-InstructionMetadata); InstructionProvenance (semantic kind=information, backbone InstructionProvenance-is_a-InstructionMetadata). Endpoint conditions: InstructionAuthority condition: “Information locating an instruction source in the governing authority hierarchy”; InstructionProvenance condition: “Information recording where an instruction originated and how it entered resolution”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 InstructionMetadata：InstructionAuthority（semantic kind=information、バックボーン InstructionAuthority-is_a-InstructionMetadata）；InstructionProvenance（semantic kind=information、バックボーン InstructionProvenance-is_a-InstructionMetadata）。両端条件：InstructionAuthority の条件：「指示 source を統治 authority hierarchy 上に位置付ける情報です」；InstructionProvenance の条件：「指示がどこで生成され、どう resolution chain に入ったかを記録する情報です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-instruction-authority-003
      - claim-instruction-authority-004
  - sibling_concept_id: InstructionScope
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 端点特定对照：父节点 InstructionMetadata：InstructionAuthority（semantic kind=information，骨架 InstructionAuthority-is_a-InstructionMetadata）；InstructionScope（semantic kind=information，骨架 InstructionScope-is_a-InstructionMetadata）。双端条件：InstructionAuthority 条件：“表示指令来源在治理层级中所处位置的信息”；InstructionScope 条件：“限定一项指令约束哪些对象、时段或操作的信息”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent InstructionMetadata: InstructionAuthority (semantic kind=information, backbone InstructionAuthority-is_a-InstructionMetadata); InstructionScope (semantic kind=information, backbone InstructionScope-is_a-InstructionMetadata). Endpoint conditions: InstructionAuthority condition: “Information locating an instruction source in the governing authority hierarchy”; InstructionScope condition: “Information limiting which objects, times, or actions an instruction governs”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 InstructionMetadata：InstructionAuthority（semantic kind=information、バックボーン InstructionAuthority-is_a-InstructionMetadata）；InstructionScope（semantic kind=information、バックボーン InstructionScope-is_a-InstructionMetadata）。両端条件：InstructionAuthority の条件：「指示 source を統治 authority hierarchy 上に位置付ける情報です」；InstructionScope の条件：「指示が拘束する対象・期間・操作を限定する情報です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-instruction-authority-005
      - claim-instruction-authority-006
