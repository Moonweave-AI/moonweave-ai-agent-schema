schema: moonweave.ai/ontology-node/v1
id: InstructionAuthority
kind: concept
labels:
  zh: 指令权威
  en: Instruction authority
  ja: 指示権威
semantics:
  short_definition:
    zh: 记录 Instruction 规范效力来源层级的元数据。
    en: Metadata recording the authority tier granting an Instruction normative force.
    ja: Instruction の normative force を付与する authority tier を記録する metadata。
  definition:
    zh: InstructionAuthority 取值如 platform、organization、template、user、tool；OpenAI developer→platform、Cursor rules→organization、MCP server prompt→template。
    en: InstructionAuthority values include platform, organization, template, user, tool; OpenAI developer→platform, Cursor rules→organization, MCP server prompt→template.
    ja: platform/organization/template/user/tool authority tier。
  why_needed:
    zh: 权威层级是冲突解析的首要比较键，必须在 Instruction 解析后显式可查。
    en: Authority tier is the primary comparison key in conflict resolution and must be explicitly queryable after Instruction parsing.
    ja: authority tier は conflict resolution 第一比较键。
  includes:
    - zh: 可枚举 authority_tier 与可选 issuing_actor 引用。
      en: Enumerable authority_tier and optional issuing_actor reference.
      ja: authority_tier/issuing_actor。
  excludes:
    - zh: Message role 字符串本身、quoted provenance 自动赋予的 authority。
      en: Message role string itself and authority auto-granted by quoted provenance.
      ja: message role/quoted auto-authority。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: inst-developer-9 has_authority authority_tier=developer；user 引用 developer 文本不自动 has_authority developer。
    en: inst-developer-9 has_authority authority_tier=developer; user quoting developer text does not auto has_authority developer.
    ja: has_authority 边语义。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys: []
  fields:
    - id: authority_tier
      labels:
        zh: 权威层级
        en: Authority tier
        ja: 権威層
      definitions:
        zh: 记录治理顺序中的来源层级，而非业务优先分。
        en: Records the source level in the governing order rather than a business priority score.
        ja: business priority score ではなく governing order 上の source level を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: developer
      allowed_values: []
      source_claims:
        - claim-instruction-authority-001
    - id: issuer_ref
      labels:
        zh: 发出主体引用
        en: Issuer reference
        ja: 発行主体参照
      definitions:
        zh: 指向实际发出该指令并取得此权威层级的主体或消息。
        en: References the principal or message that actually issued the instruction at this authority tier.
        ja: この authority tier で instruction を実際に発行した principal/message を参照します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: message:developer:17
      allowed_values: []
      source_claims:
        - claim-instruction-authority-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionAuthority-example-platform
    labels:
      zh: platform 权威
      en: Platform authority
      ja: platform authority
    descriptions:
      zh: inst-system-v12 authority_tier=platform。
      en: inst-system-v12 authority_tier=platform.
      ja: platform tier。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: system
    field_values:
      authority_tier: platform
    related_node_ids:
      - InstructionAuthority
      - SystemInstruction
    related_relation_ids: []
    source_claims:
      - claim-iauth-design
  - id: InstructionAuthority-example-organization
    labels:
      zh: organization 权威
      en: Organization authority
      ja: organization authority
    descriptions:
      zh: inst-rule-security-mdc authority_tier=organization 来自 Cursor rules。
      en: inst-rule-security-mdc authority_tier=organization from Cursor rules.
      ja: organization tier from rules。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/rules
      version: rules
    field_values:
      authority_tier: organization
    related_node_ids:
      - InstructionAuthority
    related_relation_ids: []
    source_claims:
      - claim-iauth-cursor
  - id: InstructionAuthority-example-quoted-boundary
    labels:
      zh: 引用不赋权
      en: Quote does not grant authority
      ja: quote は authority 付与しない
    descriptions:
      zh: user 消息引用 developer 文本不得建立 has_authority developer。
      en: User message quoting developer text must not establish has_authority developer.
      ja: quoted text≠authority。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionAuthority
    related_relation_ids: []
    source_claims:
      - claim-iauth-design
parent_relation:
  id: InstructionAuthority-is_a-InstructionMetadata
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: InstructionAuthority 是一种 InstructionMetadata，其种差是记录赋予指令效力的来源层级和发出主体。
    en: InstructionAuthority is_a InstructionMetadata whose differentia is the issuing source and authority tier granting normative force.
    ja: InstructionAuthority is_a InstructionMetadata は規範効力を与える issuing source・authority tier を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionAuthority-is_a-InstructionMetadata-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: auth-developer 记录 developer tier 并限定一项 Instruction，因此同时满足 Authority 种差和 Metadata 上位条件。
        en: auth-developer records the developer tier for one Instruction, satisfying both the Authority differentia and Metadata genus.
        ja: auth-developer は一つの Instruction に developer tier を記録し Authority 種差と Metadata genus を満たします。
      field_values: {}
      related_node_ids:
        - InstructionAuthority
        - InstructionMetadata
      related_relation_ids:
        - InstructionAuthority-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-authority-007
    - id: InstructionAuthority-is_a-InstructionMetadata-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: later-at-same-authority 描述同级先后，属于 InstructionPriority 而非 InstructionAuthority。
        en: later-at-same-authority describes peer ordering and belongs to InstructionPriority, not InstructionAuthority.
        ja: later-at-same-authority は peer ordering を表し InstructionPriority に属して InstructionAuthority ではありません。
      field_values: {}
      related_node_ids:
        - InstructionAuthority
        - InstructionMetadata
      related_relation_ids:
        - InstructionAuthority-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-authority-007
  source_claims:
    - claim-instruction-authority-007
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-cursor-rules
    title: Cursor Rules Documentation
    publisher: Cursor
    url: https://cursor.com/docs/context/rules
    source_type: official-doc
    relevance: Project rules injected as versioned instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-authority-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec explicitly orders Root, System, Developer, User, Guideline, and No Authority, and states that higher-authority instructions override lower-authority instructions. This directly supports an inspectable authority fact for each instruction.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-authority-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec distinguishes source-based levels of authority from conflict rules among instructions that are otherwise comparable, including later instructions at the same level. Moonweave records the former as InstructionAuthority and the latter as InstructionPriority.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-authority-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec's chain of command defines authority levels that govern conflict resolution. This supports InstructionAuthority but does not prove which concrete message, template instance, or authorized source carried a particular instruction.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-authority-004
    source: eng-spec-openai-model-2025-10-27
    supports: Message-role definitions and the rule to ignore untrusted data by default make origin and carrier material to instruction handling. Moonweave records that lineage as InstructionProvenance; origin evidence must still be interpreted to assign an authority tier.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-authority-005
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec orders instructions by levels of authority. InstructionAuthority records that source level; it does not state the resource, action, temporal, or phase boundaries within which the instruction may operate.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-authority-006
    source: eng-spec-openai-model-2025-10-27
    supports: The requirement to act within an agreed-upon scope of autonomy supports explicit InstructionScope limits. A scope can constrain even a high-authority instruction and therefore remains separate from the authority tier assigned to its issuer.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy; Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-authority-007
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec explicitly assigns authority levels to instruction sources. Moonweave classifies that source-level fact as InstructionAuthority under InstructionMetadata.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-iauth-cursor
    source: src-cursor-rules
    supports: Cursor project rules carry organization-tier instruction authority.
    locator: project rules
    evidence_kind: official-doc
    confidence: high
  - id: claim-iauth-design
    source: src-info-prompts-design
    supports: InstructionAuthority records explicit normative tier separate from message role.
    locator: InstructionAuthority
    evidence_kind: design-inference
    confidence: high
