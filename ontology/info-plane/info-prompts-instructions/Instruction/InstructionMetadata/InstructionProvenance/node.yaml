schema: moonweave.ai/ontology-node/v1
id: InstructionProvenance
kind: concept
labels:
  zh: 指令来源
  en: Instruction provenance
  ja: 指示来歴
semantics:
  short_definition:
    zh: 记录 Instruction 从原始载体派生的来源链元数据。
    en: Metadata recording derivation lineage of an Instruction from its original carrier.
    ja: Instruction の original carrier からの derivation lineage を記録する metadata。
  definition:
    zh: InstructionProvenance 链接 user message、PromptTemplateInstance、rules 文件或 MCP prompt；可追溯不等于有 authority。
    en: InstructionProvenance links user message, PromptTemplateInstance, rules file, or MCP prompt; traceable origin does not automatically grant authority.
    ja: user message/template instance/rules file/MCP prompt lineage。
  why_needed:
    zh: 审计需要沿来源链找到原始载体，再独立判断 authority。
    en: Audit must follow lineage to the original carrier and evaluate authority independently.
    ja: lineage→carrier→authority 独立判定。
  includes:
    - zh: carrier_kind、carrier_id、derivation_event_id。
      en: carrier_kind, carrier_id, derivation_event_id.
      ja: carrier_kind/carrier_id/derivation_event。
  excludes:
    - zh: authority 判定本身、directive_text 副本。
      en: Authority determination itself and directive_text copies.
      ja: authority determination/directive copy。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: parsed translation Instruction has_provenance iprov-msg-88→user message 88；相同文本不同 message 不共享 provenance。
    en: Parsed translation Instruction has_provenance iprov-msg-88→user message 88; identical text from different messages does not share provenance.
    ja: provenance per carrier。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys: []
  fields:
    - id: source_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: source 参照
      definitions:
        zh: 指向产生或承载该指令的可核验来源。
        en: References the verifiable source that produced or carried the instruction.
        ja: instruction を生成・運搬した検証可能 source を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: message:user:88
      allowed_values: []
      source_claims:
        - claim-instruction-provenance-001
    - id: derivation_note
      labels:
        zh: 派生说明
        en: Derivation note
        ja: 派生説明
      definitions:
        zh: 说明载体内容如何被识别为结构化 Instruction，并保留未由来源事实推出的判断。
        en: Explains how carrier content became a structured Instruction while keeping judgments not implied by provenance separate.
        ja: carrier content が structured Instruction になった過程を説明し provenance から導けない判断を分離します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Parsed from message content span 14-39 without changing authority.
      allowed_values: []
      source_claims:
        - claim-instruction-provenance-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionProvenance-example-user-msg
    labels:
      zh: 用户消息来源
      en: User message provenance
      ja: user message provenance
    descriptions:
      zh: inst-user-42 has_provenance iprov-msg-88→user message 88。
      en: inst-user-42 has_provenance iprov-msg-88→user message 88.
      ja: user message lineage。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: user message
    field_values:
      carrier_kind: user_message
      carrier_id: msg-88
    related_node_ids:
      - InstructionProvenance
    related_relation_ids: []
    source_claims:
      - claim-iprov-design
  - id: InstructionProvenance-example-rules-file
    labels:
      zh: rules 文件来源
      en: Rules file provenance
      ja: rules file provenance
    descriptions:
      zh: inst-rule-security-mdc provenance .cursor/rules/security.mdc ingestion event。
      en: inst-rule-security-mdc provenance from .cursor/rules/security.mdc ingestion event.
      ja: rules file lineage。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/rules
      version: rules file
    field_values: {}
    related_node_ids:
      - InstructionProvenance
    related_relation_ids: []
    source_claims:
      - claim-iprov-cursor
  - id: InstructionProvenance-example-not-same-text
    labels:
      zh: 同文不同源
      en: Same text different source
      ja: same text different source
    descriptions:
      zh: 两指令文本相同但来自不同 message，provenance 不得合并。
      en: Two directives with identical text from different messages must not merge provenance.
      ja: text equality≠shared provenance。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionProvenance
    related_relation_ids: []
    source_claims:
      - claim-iprov-design
parent_relation:
  id: InstructionProvenance-is_a-InstructionMetadata
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: InstructionProvenance 是一种 InstructionMetadata，其种差是把指令绑定到原始载体和必要派生步骤。
    en: InstructionProvenance is_a InstructionMetadata whose differentia is linking an instruction to its original carrier and derivation steps.
    ja: InstructionProvenance is_a InstructionMetadata は instruction を original carrier・derivation step に結ぶことを種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionProvenance-is_a-InstructionMetadata-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: iprov-msg-88 将一项 Instruction 追溯到 user message 88，满足来源种差并限定该指令。
        en: iprov-msg-88 traces an Instruction to user message 88, satisfying the provenance differentia while qualifying that instruction.
        ja: iprov-msg-88 は Instruction を user message 88 へ追跡し provenance 種差と instruction 限定条件を満たします。
      field_values: {}
      related_node_ids:
        - InstructionProvenance
        - InstructionMetadata
      related_relation_ids:
        - InstructionProvenance-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-provenance-004
    - id: InstructionProvenance-is_a-InstructionMetadata-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: SourceReference 标识文档位置，但未说明该文档如何产生某项 Instruction。
        en: A SourceReference identifies a document location but does not say how that document produced an Instruction.
        ja: SourceReference は document location を識別しますが document が Instruction を生成した経路を示しません。
      field_values: {}
      related_node_ids:
        - InstructionProvenance
        - InstructionMetadata
      related_relation_ids:
        - InstructionProvenance-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-provenance-004
  source_claims:
    - claim-instruction-provenance-004
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: InstructionProvenance-references_source-SourceReference
    predicate: references_source
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: references source
      en: references source
      ja: references source
    definitions:
      zh: InstructionProvenance references_source SourceReference 把来源记录指向可稳定解析的消息、文件或资源位置，但不取得该资源本体所有权。
      en: InstructionProvenance references_source SourceReference points the provenance record to a stably resolvable message, file, or resource location without taking ownership of the referent.
      ja: InstructionProvenance references_source SourceReference は provenance record を安定解決可能な message・file・resource location に向け、referent の ownership は取得しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_references_source
      labels:
        zh: 反向 references_source
        en: inverse references_source
        ja: 逆 references_source
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples:
      - id: InstructionProvenance-references_source-SourceReference-manual-positive-20260716
        labels:
          zh: references_source 正例
          en: references_source positive case
          ja: references_source 正例
        descriptions:
          zh: iprov-readme-5 references_source file:/repo/AGENTS.md#L12-L18，并记录该片段由用户任务授权读取。
          en: iprov-readme-5 references_source file:/repo/AGENTS.md#L12-L18 and records that the user task authorized consulting that span.
          ja: iprov-readme-5 は references_source file:/repo/AGENTS.md#L12-L18 を持ち user task がその span の参照を委任したと記録します。
        field_values: {}
        related_node_ids:
          - InstructionProvenance
          - SourceReference
        related_relation_ids:
          - InstructionProvenance-references_source-SourceReference
        source_claims:
          - claim-instruction-provenance-005
      - id: InstructionProvenance-references_source-SourceReference-manual-boundary-20260716
        labels:
          zh: references_source 边界例
          en: references_source boundary case
          ja: references_source 境界例
        descriptions:
          zh: SourceReference 指向一个网页，但没有任何 InstructionProvenance 声明该网页片段产生了指令。
          en: A SourceReference points to a webpage, but no InstructionProvenance states that its span produced an instruction.
          ja: SourceReference は webpage を指しますが span が instruction を生成したとする InstructionProvenance がありません。
        field_values: {}
        related_node_ids:
          - InstructionProvenance
          - SourceReference
        related_relation_ids:
          - InstructionProvenance-references_source-SourceReference
        source_claims:
          - claim-instruction-provenance-005
    source_claims:
      - claim-instruction-provenance-005
    layout_role: cross-link
    target: concept:SourceReference
sources:
  - id: src-cursor-rules
    title: Cursor Rules Documentation
    publisher: Cursor
    url: https://cursor.com/docs/context/rules
    source_type: official-doc
    relevance: Project rules injected as versioned instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-provenance-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec distinguishes message roles as instruction sources and treats quoted text, tool output, and multimodal data as having no authority by default. This supports recording provenance before assigning authority.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-provenance-002
    source: eng-spec-openai-model-2025-10-27
    supports: Message roles and trusted-data rules make the instruction's carrier and origin independently auditable. Moonweave captures that lineage in InstructionProvenance; provenance does not by itself limit the instruction's permitted objects, actions, or duration.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-provenance-003
    source: eng-spec-openai-model-2025-10-27
    supports: Acting within an agreed-upon scope of autonomy requires explicit object, action, and temporal limits. InstructionScope records those limits; it remains distinct from InstructionProvenance, which answers where the instruction came from.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy; Follow all applicable instructions
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-provenance-004
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec makes source role and untrusted-data provenance material to whether text has instruction authority. Moonweave classifies that lineage information under InstructionMetadata.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-provenance-005
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires distinguishing instruction-bearing messages from quoted or tool-provided data. Moonweave uses a stable SourceReference so an InstructionProvenance record can identify the exact carrier examined.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: design-inference
    confidence: high
  - id: claim-iprov-cursor
    source: src-cursor-rules
    supports: Cursor rules files are provenance carriers for parsed Instructions.
    locator: project rules
    evidence_kind: official-doc
    confidence: high
  - id: claim-iprov-design
    source: src-info-prompts-design
    supports: InstructionProvenance records carrier lineage without granting authority.
    locator: InstructionProvenance
    evidence_kind: design-inference
    confidence: high
