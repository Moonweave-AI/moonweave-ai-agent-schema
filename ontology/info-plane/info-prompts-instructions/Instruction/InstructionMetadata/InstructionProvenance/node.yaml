  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Model Spec 指令权威链、Agents SDK instructions 与 MCP prompts 逐项核验；Instruction 元数据层级、PromptTemplate 实例化与 InstructionProcessing 解析-冲突-解决语义成立。
    en: Verified against OpenAI Model Spec instruction authority chain, Agents SDK instructions, and MCP prompts; Instruction metadata tiers, PromptTemplate instantiation, and InstructionProcessing parse-conflict-resolve semantics hold.
    ja: OpenAI Model Spec instruction authority chain、Agents SDK instructions、MCP prompts に照らし Instruction metadata tier/PromptTemplate instantiation/InstructionProcessing parse-conflict-resolve semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-instruction-provenance-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec distinguishes message roles as instruction sources and treats quoted text, tool output, and multimodal data as having no authority by default. This supports recording provenance before assigning authority.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-provenance-002
    source: eng-spec-openai-model-2025-10-27
    supports: Message roles and trusted-data rules make the instruction's carrier and origin independently auditable. Moonweave captures that lineage in InstructionProvenance; provenance does not by itself limit the instruction's permitted objects, actions, or duration.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-provenance-003
    source: eng-spec-openai-model-2025-10-27
    supports: Acting within an agreed-upon scope of autonomy requires explicit object, action, and temporal limits. InstructionScope records those limits; it remains distinct from InstructionProvenance, which answers where the instruction came from.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy; Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-provenance-004
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec makes source role and untrusted-data provenance material to whether text has instruction authority. Moonweave classifies that lineage information under InstructionMetadata.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-provenance-005
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires distinguishing instruction-bearing messages from quoted or tool-provided data. Moonweave uses a stable SourceReference so an InstructionProvenance record can identify the exact carrier examined.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
