schema: moonweave.ai/ontology-node/v1
id: InstructionProvenance
kind: concept
status: accepted
labels:
  zh: 指令来源
  en: Instruction provenance
  ja: 指示来歴
semantics:
  short_definition:
    zh: 记录一项指令从何处产生并如何进入解析链的信息。
    en: Information recording where an instruction originated and how it entered resolution.
    ja: 指示がどこで生成され、どう resolution chain に入ったかを記録する情報です。
  definition:
    zh: 指令来源是一类 InstructionMetadata，将 Instruction 绑定到原始消息、模板实例或经授权的来源引用，并记录必要的派生步骤；它证明来源链，却不自行赋予该来源权威。
    en: InstructionProvenance is InstructionMetadata linking an Instruction to its originating message, template instance, or authorized source reference, with necessary derivation steps. It proves origin lineage but does not itself grant authority.
    ja: InstructionProvenance は Instruction を originating message・template instance・authorized source reference に結び、必要な derivation step を記録する InstructionMetadata です。来歴を証明しますが source に authority を付与しません。
  why_needed:
    zh: 来源链支持审计解析输入、区分直接指令与引用数据，并在争议时回到原始载体。
    en: Provenance supports auditing resolution inputs, separating direct instructions from quoted data, and returning to the original carrier when disputed.
    ja: provenance により resolution input を監査し、direct instruction と quoted data を区別し、争議時に original carrier へ戻れます。
  includes:
    - zh: 纳入原始 Message、PromptTemplateInstance、SourceReference 及从载体到规范指令的派生记录。
      en: Includes originating Message, PromptTemplateInstance, SourceReference, and derivation records from carrier to normative instruction.
      ja: originating Message・PromptTemplateInstance・SourceReference と carrier から normative instruction への derivation record を含みます。
  excludes:
    - zh: 排除来源的权威等级、引用资源本体以及把不可信内容自动升级为指令的结论。
      en: Excludes source authority level, the referenced resource itself, and any conclusion that automatically promotes untrusted content to instruction.
      ja: source authority level・referenced resource 自体・untrusted content を自動で instruction に昇格する結論を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: source_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: source 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向产生或承载该指令的可核验来源。
        en: References the verifiable source that produced or carried the instruction.
        ja: instruction を生成・運搬した検証可能 source を参照します。
      allowed_values: []
      pattern: null
      example_value: message:user:88
      source_claims:
        - claim-instruction-provenance-001
    - id: derivation_note
      labels:
        zh: 派生说明
        en: Derivation note
        ja: 派生説明
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明载体内容如何被识别为结构化 Instruction，并保留未由来源事实推出的判断。
        en: Explains how carrier content became a structured Instruction while keeping judgments not implied by provenance separate.
        ja: carrier content が structured Instruction になった過程を説明し provenance から導けない判断を分離します。
      allowed_values: []
      pattern: null
      example_value: Parsed from message content span 14-39 without changing authority.
      source_claims:
        - claim-instruction-provenance-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionProvenance-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令来源正例
      en: Instruction provenance positive case
      ja: 指示来歴正例
    scenario_id: null
    descriptions:
      zh: 解析活动从 user message 88 提取翻译要求，并把 message:user:88 保存为该 Instruction 的来源引用。
      en: Parsing extracts a translation directive from user message 88 and stores message:user:88 as the Instruction's source reference.
      ja: parsing が user message 88 から translation directive を抽出し、message:user:88 を Instruction の source reference として保存します。
    field_values:
      source_ref: message:user:88
      metadata_id: metadata-inst-translation-msg-88
      instruction_ref: inst-translation-msg-88
    related_node_ids:
      - InstructionProvenance
      - SourceReference
      - Message
      - Instruction
    related_relation_ids:
      - InstructionProvenance-references_source-SourceReference
    expected_result:
      zh: 审计可从 Instruction 回到原始消息，同时另行查询其 user 权威。
      en: Audit can return from the Instruction to the original message while authority remains a separate query.
      ja: audit は Instruction から original message へ戻れ、user authority は別照会できます。
    why_valid_or_invalid:
      zh: 来源引用与派生动作明确，但没有把来源事实误当作权威判断。
      en: The source reference and derivation are explicit without mistaking origin for an authority judgment.
      ja: source reference と derivation が明示され、origin を authority judgment と誤認していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-provenance-001
  - id: InstructionProvenance-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令来源边界例
      en: Instruction provenance boundary case
      ja: 指示来歴境界例
    scenario_id: null
    descriptions:
      zh: 工具结果引用了 README 中的句子，但没有任何上位指令授权 README 为指令来源；可记录来源，不可据此赋予规范权威。
      en: A tool result quotes a README sentence, but no higher instruction delegates directive authority to that README; origin may be recorded without granting normative authority.
      ja: tool result が README の文を引用しても、上位 instruction が README に directive authority を委任していません。origin は記録できますが規範 authority は付与できません。
    field_values: {}
    related_node_ids:
      - InstructionProvenance
      - SourceReference
      - InstructionAuthority
    related_relation_ids:
      - InstructionProvenance-references_source-SourceReference
    expected_result:
      zh: 该记录可以成为来源证据，但不会单独产生有效 Instruction。
      en: The record may remain provenance evidence but does not independently create an effective Instruction.
      ja: record は provenance evidence になれますが、単独で effective Instruction を生成しません。
    why_valid_or_invalid:
      zh: 来源可追溯性与来源权威是不同判断。
      en: Traceable origin and source authority are distinct judgments.
      ja: traceable origin と source authority は別の判断です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-provenance-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: InstructionScope
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 端点特定对照：父节点 InstructionMetadata：InstructionProvenance（semantic kind=information，骨架 InstructionProvenance-is_a-InstructionMetadata）；InstructionScope（semantic kind=information，骨架 InstructionScope-is_a-InstructionMetadata）。双端条件：InstructionProvenance 条件：“记录一项指令从何处产生并如何进入解析链的信息”；InstructionScope 条件：“限定一项指令约束哪些对象、时段或操作的信息”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent InstructionMetadata: InstructionProvenance (semantic kind=information, backbone InstructionProvenance-is_a-InstructionMetadata); InstructionScope (semantic kind=information, backbone InstructionScope-is_a-InstructionMetadata). Endpoint conditions: InstructionProvenance condition: “Information recording where an instruction originated and how it entered resolution”; InstructionScope condition: “Information limiting which objects, times, or actions an instruction governs”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 InstructionMetadata：InstructionProvenance（semantic kind=information、バックボーン InstructionProvenance-is_a-InstructionMetadata）；InstructionScope（semantic kind=information、バックボーン InstructionScope-is_a-InstructionMetadata）。両端条件：InstructionProvenance の条件：「指示がどこで生成され、どう resolution chain に入ったかを記録する情報です」；InstructionScope の条件：「指示が拘束する対象・期間・操作を限定する情報です」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-instruction-provenance-002
      - claim-instruction-provenance-003
parent_relation:
  id: InstructionProvenance-is_a-InstructionMetadata
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: InstructionProvenance 是一种 InstructionMetadata，其种差是把指令绑定到原始载体和必要派生步骤。
    en: InstructionProvenance is_a InstructionMetadata whose differentia is linking an instruction to its original carrier and derivation steps.
    ja: InstructionProvenance is_a InstructionMetadata は instruction を original carrier・derivation step に結ぶことを種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionProvenance-is_a-InstructionMetadata-manual-positive-20260716
      kind: positive
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      scenario_id: null
      descriptions:
        zh: iprov-msg-88 将一项 Instruction 追溯到 user message 88，满足来源种差并限定该指令。
        en: iprov-msg-88 traces an Instruction to user message 88, satisfying the provenance differentia while qualifying that instruction.
        ja: iprov-msg-88 は Instruction を user message 88 へ追跡し provenance 種差と instruction 限定条件を満たします。
      field_values: {}
      related_node_ids:
        - InstructionProvenance
        - InstructionMetadata
      related_relation_ids:
        - InstructionProvenance-is_a-InstructionMetadata
      expected_result:
        zh: 类型查询返回 Provenance 到 Metadata 的上位路径。
        en: Type traversal returns the Provenance-to-Metadata genus path.
        ja: type traversal は Provenance→Metadata genus path を返します。
      why_valid_or_invalid:
        zh: 来源链是指令解析所需的限定信息。
        en: Origin lineage is qualifying information needed for instruction resolution.
        ja: origin lineage は instruction resolution に必要な限定情報です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-instruction-provenance-004
    - id: InstructionProvenance-is_a-InstructionMetadata-manual-boundary-20260716
      kind: boundary
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      scenario_id: null
      descriptions:
        zh: SourceReference 标识文档位置，但未说明该文档如何产生某项 Instruction。
        en: A SourceReference identifies a document location but does not say how that document produced an Instruction.
        ja: SourceReference は document location を識別しますが document が Instruction を生成した経路を示しません。
      field_values: {}
      related_node_ids:
        - InstructionProvenance
        - InstructionMetadata
      related_relation_ids:
        - InstructionProvenance-is_a-InstructionMetadata
      expected_result:
        zh: SourceReference 保持外部来源类型，不自动成为 InstructionProvenance。
        en: SourceReference remains an external source type and does not automatically become InstructionProvenance.
        ja: SourceReference は external source type のままで InstructionProvenance に自動分類しません。
      why_valid_or_invalid:
        zh: 来源引用是端点，来源元数据还需要与具体指令的派生绑定。
        en: A source reference is an endpoint; provenance also needs derivation binding to a specific instruction.
        ja: source reference は endpoint で provenance には特定 instruction への derivation binding も必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-instruction-provenance-004
  source_claims:
    - claim-instruction-provenance-004
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
