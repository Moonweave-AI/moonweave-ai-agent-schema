schema: moonweave.ai/ontology-node/v1
id: InstructionApplicability
kind: concept
status: accepted
labels:
  zh: 指令适用性
  en: Instruction applicability
  ja: 指示適用性
semantics:
  short_definition:
    zh: 判定一项指令在当前情境是否参与解析的条件信息。
    en: Conditions determining whether an instruction participates in the current resolution.
    ja: 指示が現在の解決に参加するかを決める条件情報です。
  definition:
    zh: 指令适用性是一类 InstructionMetadata，用可验证条件说明一项指令是否适用于当前请求、对象、阶段或环境；它先于权威比较过滤候选指令，不表示指令最终胜出。
    en: InstructionApplicability is InstructionMetadata expressing testable conditions under which an instruction applies to the current request, object, phase, or environment. It filters candidates before authority comparison and does not mean the instruction ultimately prevails.
    ja: InstructionApplicability は current request・object・phase・environment に指示が適用される検証可能条件を表す InstructionMetadata です。authority comparison 前に候補を絞りますが、最終的な勝利を意味しません。
  why_needed:
    zh: 显式适用性可防止把过期、条件不满足或对象无关的指令错误送入冲突解析。
    en: Explicit applicability prevents expired, condition-failing, or object-irrelevant instructions from entering conflict resolution incorrectly.
    ja: 明示 applicability により、期限切れ・条件不成立・対象外 instruction が誤って conflict resolution に入ることを防ぎます。
  includes:
    - zh: 纳入基于请求类型、资源、角色、时间或运行阶段可判真的适用条件。
      en: Includes testable applicability conditions based on request type, resource, role, time, or runtime phase.
      ja: request type・resource・role・time・runtime phase に基づく検証可能な適用条件を含みます。
  excludes:
    - zh: 排除指令的来源权威、同级先后顺序和解析后的胜出结论。
      en: Excludes source authority, same-level ordering, and the post-resolution winning conclusion.
      ja: source authority・同一 level の順序・resolution 後の勝出結論を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: condition_expression
      labels:
        zh: 条件表达式
        en: Condition expression
        ja: 条件式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录决定候选指令是否进入解析的可求值条件。
        en: Records the evaluable condition deciding whether the candidate instruction enters resolution.
        ja: candidate instruction が resolution に入るかを決める評価可能条件を記録します。
      allowed_values: []
      pattern: null
      example_value: task.type == 'translation'
      source_claims:
        - claim-instruction-applicability-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionApplicability-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令适用性正例
      en: Instruction applicability positive case
      ja: 指示適用性正例
    scenario_id: null
    descriptions:
      zh: “翻译任务必须保留术语表”仅在 task.type=translation 时进入候选集；当前请求满足该条件。
      en: “Translation tasks must preserve the glossary” enters the candidate set only when task.type=translation; the current request satisfies that condition.
      ja: 「翻訳 task は glossary を保持」は task.type=translation の場合だけ候補集合に入り、current request は条件を満たします。
    field_values:
      condition_expression: task.type == 'translation'
      metadata_id: metadata-inst-translation-glossary
      instruction_ref: inst-translation-glossary
    related_node_ids:
      - InstructionApplicability
      - Instruction
    related_relation_ids:
      - Instruction-has_applicability-InstructionApplicability
    expected_result:
      zh: 适用性求值为真，该 Instruction 可继续参与权威和优先级比较。
      en: Applicability evaluates true, so the Instruction may proceed to authority and precedence comparison.
      ja: applicability が true となり、Instruction は authority・precedence comparison に進めます。
    why_valid_or_invalid:
      zh: 条件表达式、当前事实和被限定的指令均明确可复核。
      en: The condition expression, current fact, and qualified instruction are all explicit and reviewable.
      ja: condition expression・current fact・限定対象 instruction が明示され再確認できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-applicability-001
  - id: InstructionApplicability-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令适用性边界例
      en: Instruction applicability boundary case
      ja: 指示適用性境界例
    scenario_id: null
    descriptions:
      zh: 同一指令来自 developer 并不证明它适用于当前图像分类任务；来源层级属于 InstructionAuthority。
      en: A developer source does not prove that the same instruction applies to the current image-classification task; source level belongs to InstructionAuthority.
      ja: 同じ instruction が developer source である事実だけでは current image-classification task への適用を証明せず、source level は InstructionAuthority に属します。
    field_values: {}
    related_node_ids:
      - InstructionApplicability
      - InstructionAuthority
    related_relation_ids: []
    expected_result:
      zh: 不得用权威层级代替适用条件，适用性保持未判定。
      en: Authority level must not substitute for an applicability condition; applicability remains unresolved.
      ja: authority level で applicability condition を代替せず、適用性は未判定のままです。
    why_valid_or_invalid:
      zh: “谁发出”与“何时适用”是两种独立信息。
      en: Who issued an instruction and when it applies are independent facts.
      ja: 誰が発行したかと、いつ適用されるかは独立した事実です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-applicability-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: InstructionAuthority
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 正向身份比较：父节点 InstructionMetadata：InstructionApplicability（semantic kind=information，骨架 InstructionApplicability-is_a-InstructionMetadata）；InstructionAuthority（semantic kind=information，骨架 InstructionAuthority-is_a-InstructionMetadata）。双端条件：InstructionApplicability 条件：“判定一项指令在当前情境是否参与解析的条件信息”；InstructionAuthority 条件：“表示指令来源在治理层级中所处位置的信息”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent InstructionMetadata: InstructionApplicability (semantic kind=information, backbone InstructionApplicability-is_a-InstructionMetadata); InstructionAuthority (semantic kind=information, backbone InstructionAuthority-is_a-InstructionMetadata). Endpoint conditions: InstructionApplicability condition: “Conditions determining whether an instruction participates in the current resolution”; InstructionAuthority condition: “Information locating an instruction source in the governing authority hierarchy”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 InstructionMetadata：InstructionApplicability（semantic kind=information、バックボーン InstructionApplicability-is_a-InstructionMetadata）；InstructionAuthority（semantic kind=information、バックボーン InstructionAuthority-is_a-InstructionMetadata）。両端条件：InstructionApplicability の条件：「指示が現在の解決に参加するかを決める条件情報です」；InstructionAuthority の条件：「指示 source を統治 authority hierarchy 上に位置付ける情報です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-instruction-applicability-002
  - sibling_concept_id: InstructionPriority
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 已审查兄弟区分：父节点 InstructionMetadata：InstructionApplicability（semantic kind=information，骨架 InstructionApplicability-is_a-InstructionMetadata）；InstructionPriority（semantic kind=information，骨架 InstructionPriority-is_a-InstructionMetadata）。双端条件：InstructionApplicability 条件：“判定一项指令在当前情境是否参与解析的条件信息”；InstructionPriority 条件：“在可比较且同等权威的指令之间记录解析顺序的信息”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent InstructionMetadata: InstructionApplicability (semantic kind=information, backbone InstructionApplicability-is_a-InstructionMetadata); InstructionPriority (semantic kind=information, backbone InstructionPriority-is_a-InstructionMetadata). Endpoint conditions: InstructionApplicability condition: “Conditions determining whether an instruction participates in the current resolution”; InstructionPriority condition: “Information recording resolution order among comparable instructions of equal authority”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 InstructionMetadata：InstructionApplicability（semantic kind=information、バックボーン InstructionApplicability-is_a-InstructionMetadata）；InstructionPriority（semantic kind=information、バックボーン InstructionPriority-is_a-InstructionMetadata）。両端条件：InstructionApplicability の条件：「指示が現在の解決に参加するかを決める条件情報です」；InstructionPriority の条件：「比較可能で同 authority の指示間に解決順序を記録する情報です」。一方の成立は他方を証明しません。
    source_claims:
      - claim-instruction-applicability-003
  - sibling_concept_id: InstructionProvenance
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 共享父节点对照：父节点 InstructionMetadata：InstructionApplicability（semantic kind=information，骨架 InstructionApplicability-is_a-InstructionMetadata）；InstructionProvenance（semantic kind=information，骨架 InstructionProvenance-is_a-InstructionMetadata）。双端条件：InstructionApplicability 条件：“判定一项指令在当前情境是否参与解析的条件信息”；InstructionProvenance 条件：“记录一项指令从何处产生并如何进入解析链的信息”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent InstructionMetadata: InstructionApplicability (semantic kind=information, backbone InstructionApplicability-is_a-InstructionMetadata); InstructionProvenance (semantic kind=information, backbone InstructionProvenance-is_a-InstructionMetadata). Endpoint conditions: InstructionApplicability condition: “Conditions determining whether an instruction participates in the current resolution”; InstructionProvenance condition: “Information recording where an instruction originated and how it entered resolution”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 InstructionMetadata：InstructionApplicability（semantic kind=information、バックボーン InstructionApplicability-is_a-InstructionMetadata）；InstructionProvenance（semantic kind=information、バックボーン InstructionProvenance-is_a-InstructionMetadata）。両端条件：InstructionApplicability の条件：「指示が現在の解決に参加するかを決める条件情報です」；InstructionProvenance の条件：「指示がどこで生成され、どう resolution chain に入ったかを記録する情報です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-instruction-applicability-004
      - claim-instruction-applicability-005
  - sibling_concept_id: InstructionScope
    shared_parent_concept_id: InstructionMetadata
    differentia:
      zh: 已审查兄弟区分：父节点 InstructionMetadata：InstructionApplicability（semantic kind=information，骨架 InstructionApplicability-is_a-InstructionMetadata）；InstructionScope（semantic kind=information，骨架 InstructionScope-is_a-InstructionMetadata）。双端条件：InstructionApplicability 条件：“判定一项指令在当前情境是否参与解析的条件信息”；InstructionScope 条件：“限定一项指令约束哪些对象、时段或操作的信息”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent InstructionMetadata: InstructionApplicability (semantic kind=information, backbone InstructionApplicability-is_a-InstructionMetadata); InstructionScope (semantic kind=information, backbone InstructionScope-is_a-InstructionMetadata). Endpoint conditions: InstructionApplicability condition: “Conditions determining whether an instruction participates in the current resolution”; InstructionScope condition: “Information limiting which objects, times, or actions an instruction governs”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 InstructionMetadata：InstructionApplicability（semantic kind=information、バックボーン InstructionApplicability-is_a-InstructionMetadata）；InstructionScope（semantic kind=information、バックボーン InstructionScope-is_a-InstructionMetadata）。両端条件：InstructionApplicability の条件：「指示が現在の解決に参加するかを決める条件情報です」；InstructionScope の条件：「指示が拘束する対象・期間・操作を限定する情報です」。一方の成立は他方を証明しません。
    source_claims:
      - claim-instruction-applicability-006
      - claim-instruction-applicability-007
