schema: moonweave.ai/ontology-node/v1
id: InstructionApplicability
kind: concept
labels:
  zh: 指令适用性
  en: Instruction applicability
  ja: 指示適用性
semantics:
  short_definition:
    zh: 记录 Instruction 进入当前解析所需可求值条件的元数据。
    en: Metadata recording evaluable conditions required for an Instruction to enter current resolution.
    ja: Instruction が current resolution に入る evaluable condition を記録する metadata。
  definition:
    zh: InstructionApplicability 存储 task.type=translation 等表达式；条件为假时高 authority 也不进入比较。
    en: InstructionApplicability stores expressions like task.type=translation; when false, higher authority does not enter comparison.
    ja: task.type=translation 等 applicability expression。
  why_needed:
    zh: 链式命令计算仅限 applicable instructions；缺少 applicability 会把无关约束拉入冲突。
    en: Chain-of-command applies only to applicable instructions; missing applicability pulls irrelevant constraints into conflict.
    ja: applicable のみ conflict 参加。
  includes:
    - zh: expression_language、condition_expression 与可选 fact_bindings。
      en: expression_language, condition_expression, and optional fact_bindings.
      ja: expression/condition/fact_bindings。
  excludes:
    - zh: 最终胜出结论、authority/scope 本身。
      en: Final winning outcome and authority/scope themselves.
      ja: winning outcome/authority/scope。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: glossary directive has_applicability task.type=translation；当前 image 任务为假→不进入比较。
    en: Glossary directive has_applicability task.type=translation; current image task false→excluded from comparison.
    ja: applicability gate。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
