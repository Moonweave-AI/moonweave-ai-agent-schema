source_claims:
  - id: claim-instruction-applicability-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires following all applicable instructions and excludes instructions whose conditions are not met. Moonweave represents that pre-resolution eligibility test as InstructionApplicability.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires following all applicable instructions while separately ordering instructions by levels of authority. Moonweave therefore keeps applicability conditions, which decide whether an instruction enters resolution, distinct from authority metadata, which records the instruction source's governing level.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec first limits compliance to applicable instructions and then resolves conflicts according to authority and, within a level, recency or specificity rules. This supports distinct InstructionApplicability and InstructionPriority metadata instead of one overloaded rank field.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-004
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec's requirement to follow all applicable instructions supports InstructionApplicability as a testable participation filter. It does not by itself establish the instruction's message or template lineage, which belongs to InstructionProvenance.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-005
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec assigns meaning to message roles and requires treating quoted, tool, and other untrusted content according to its origin. This supports recording InstructionProvenance; provenance proves where content came from but does not decide whether its instruction applies now.
    locator: Model Spec 2025-10-27 > Definitions > message roles; The chain of command > Ignore untrusted data by default
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-006
    source: eng-spec-openai-model-2025-10-27
    supports: Following all applicable instructions requires evaluating current request and environment conditions. Moonweave represents those predicates as InstructionApplicability; this claim does not define the object, action, or time limits recorded by InstructionScope.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-007
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires acting within an agreed scope of autonomy. That supports InstructionScope as explicit limits over objects, actions, phases, or time; a scope declaration alone does not determine whether all current applicability conditions are satisfied.
    locator: Model Spec 2025-10-27 > The chain of command > Act within an agreed-upon scope of autonomy; Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-applicability-008
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec's requirement to follow all applicable instructions supports applicability as qualifying instruction information; Moonweave classifies that information under InstructionMetadata.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
