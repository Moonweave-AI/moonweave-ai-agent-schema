      definitions:
        zh: 记录决定候选指令是否进入解析的可求值条件。
        en: Records the evaluable condition deciding whether the candidate instruction enters resolution.
        ja: candidate instruction が resolution に入るかを決める評価可能条件を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: task.type == 'translation'
      allowed_values: []
      source_claims:
        - claim-instruction-applicability-001
  constraints: []
  required_relations: []
