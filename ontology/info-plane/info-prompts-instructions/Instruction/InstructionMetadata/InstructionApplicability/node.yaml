    en: is a
    ja: is a
  definitions:
    zh: InstructionApplicability 是一种 InstructionMetadata，其种差是记录候选指令进入当前解析所必须满足的可求值条件。
    en: InstructionApplicability is_a InstructionMetadata whose differentia is an evaluable condition deciding whether a candidate instruction enters the current resolution.
    ja: InstructionApplicability is_a InstructionMetadata は candidate instruction が current resolution に入るかを決める評価可能 condition を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionApplicability-is_a-InstructionMetadata-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: task.type=translation 的条件记录既是 InstructionApplicability，也满足 InstructionMetadata 的限定信息定义。
        en: A task.type=translation condition is InstructionApplicability and also satisfies the qualifying-information definition of InstructionMetadata.
        ja: task.type=translation condition は InstructionApplicability であり InstructionMetadata の限定情報定義も満たします。
      field_values: {}
      related_node_ids:
        - InstructionApplicability
        - InstructionMetadata
      related_relation_ids:
        - InstructionApplicability-is_a-InstructionMetadata
      source_claims:
        - claim-instruction-applicability-008
    - id: InstructionApplicability-is_a-InstructionMetadata-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: InstructionAuthority 也属于 InstructionMetadata，但记录来源层级而非适用条件。
        en: InstructionAuthority is also InstructionMetadata but records source level rather than an applicability condition.
        ja: InstructionAuthority も InstructionMetadata ですが applicability condition ではなく source level を記録します。
      field_values: {}
