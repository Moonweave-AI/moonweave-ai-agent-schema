    definitions:
      zh: Instruction has_provenance InstructionProvenance 将结构化指令连接到其原始消息、模板实例或授权来源的派生链；来源可追溯不自动意味着来源有权威。
      en: Instruction has_provenance InstructionProvenance links a structured directive to its derivation from an original message, template instance, or authorized source. Traceable origin does not automatically grant authority.
