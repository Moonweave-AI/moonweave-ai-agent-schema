          en: Quoted origin and normative issuing authority must be verified separately.
          ja: quoted origin と normative issuing authority は別検証が必要です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-instruction-003
    source_claims:
      - claim-instruction-003
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
