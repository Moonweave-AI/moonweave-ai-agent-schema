          zh: has_authority 边界例
          en: has_authority boundary case
          ja: has_authority 境界例
        scenario_id: null
        descriptions:
          zh: user 消息引用了一段 developer 文本；引用来源不把其中内容自动赋予 developer 权威。
          en: A user message quotes developer text; quoted provenance does not grant developer authority to its content.
          ja: user message が developer text を引用しても quoted provenance は content に developer authority を付与しません。
        field_values: {}
        related_node_ids:
          - Instruction
          - InstructionAuthority
        related_relation_ids:
