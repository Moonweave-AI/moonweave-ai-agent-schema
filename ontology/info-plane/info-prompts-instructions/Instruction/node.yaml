      zh: Instruction has_applicability InstructionApplicability 将候选指令连接到决定其是否进入当前解析的可求值条件，而不是连接到最终胜出结论。
      en: Instruction has_applicability InstructionApplicability links a candidate directive to the evaluable condition deciding entry into current resolution, not to the final winning outcome.
      ja: Instruction has_applicability InstructionApplicability は candidate directive を current resolution 参加条件に結び、final winning outcome には結びません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
