          en: has_authority positive case
          ja: has_authority 正例
        scenario_id: null
        descriptions:
          zh: inst-developer-9 通过 has_authority 指向 authority_tier=developer 的记录。
          en: inst-developer-9 has_authority a record whose authority_tier is developer.
          ja: inst-developer-9 は has_authority で authority_tier=developer record を指します。
        field_values: {}
        related_node_ids:
          - Instruction
          - InstructionAuthority
        related_relation_ids:
          - Instruction-has_authority-InstructionAuthority
        expected_result:
          zh: 冲突解析可从指令获取 developer 权威事实。
          en: Conflict resolution can retrieve the developer authority fact from the instruction.
