          ja: later user directive は has_priority prio-user-later を持ち earlier user directive と authority/scope が同じです。
        field_values: {}
        related_node_ids:
          - Instruction
          - InstructionPriority
        related_relation_ids:
          - Instruction-has_priority-InstructionPriority
        expected_result:
          zh: 解析器在同层比较中采用后发指令。
