          en: The relation records peer order and grants no authority.
          ja: relation は peer order を記録し authority を付与しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-instruction-004
    source_claims:
      - claim-instruction-004
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:InstructionPriority
  - id: Instruction-has_provenance-InstructionProvenance
    predicate: has_provenance
    direction: source-to-target
    relation_kind: information
    labels:
      zh: has provenance
      en: has provenance
      ja: has provenance
    definitions:
      zh: Instruction has_provenance InstructionProvenance 将结构化指令连接到其原始消息、模板实例或授权来源的派生链；来源可追溯不自动意味着来源有权威。
