        field_values: {}
        related_node_ids:
          - Instruction
          - InstructionPriority
        related_relation_ids:
          - Instruction-has_priority-InstructionPriority
        expected_result:
          zh: 数值优先不得越过权威层级覆盖 developer 指令。
