schema: moonweave.ai/ontology-node/v1
id: Instruction
kind: concept
labels:
  zh: 指令
  en: Instruction
  ja: 指示
semantics:
  short_definition:
    zh: 被认可为对智能体行为具有规范效力的指示。
    en: A directive recognized as normatively constraining agent behavior.
    ja: エージェント行動を規範的に拘束すると認められた指示。
  definition:
    zh: Instruction 映射 OpenAI developer 产品策略、Anthropic system 参数、Cursor rules/CLAUDE.md/SKILL.md 与 MCP prompt 内嵌规范片段；由 authority、scope、priority 与 applicability 界定效力，不是 Message 子类。
    en: Instruction maps OpenAI developer product policy, Anthropic system parameter, Cursor rules/CLAUDE.md/SKILL.md, and normative MCP prompt fragments; bounded by authority, scope, priority, and applicability—not a Message subtype.
    ja: Instruction は developer/system/rules/SKILL 等の normative directive。Message subtype ではない。
  why_needed:
    zh: 规范身份使系统区分应遵循约束、参考数据与不可信命令式文本，并为冲突解析保留可审计输入。
    en: Normative identity separates constraints to follow from reference data and untrusted imperative text while retaining auditable inputs for conflict resolution.
    ja: normative identity により constraint/reference/untrusted imperative を区別。
  includes:
    - zh: 系统、开发者、组织、模板或用户来源且可判定效力与作用域的行为约束。
      en: Behavioral constraints from system, developer, organization, template, or user sources with determinable effect and scope.
      ja: system/developer/organization/template/user 由来の行動制約。
  excludes:
    - zh: Message 包络、PromptTemplate 本身、引用文本、工具输出与仅语气强硬的普通内容。
      en: Message envelopes, PromptTemplate itself, quoted text, tool output, and ordinary imperative-looking content.
      ja: Message envelope/PromptTemplate/quoted text/tool output/imperative-looking content。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: OpenAI role=developer 首条消息→inst-dev-policy-1 authority=platform；Anthropic system="Answer in bullets"→SystemInstruction；.cursor/rules/*.mdc→inst-rule-* authority=organization。
    en: OpenAI role=developer first message→inst-dev-policy-1 authority=platform; Anthropic system="Answer in bullets"→SystemInstruction; .cursor/rules/*.mdc→inst-rule-* authority=organization.
    ja: developer/system/rules 写像。
  typical_input:
    - description: OpenAI developer policy
      format: '{"messages":[{"role":"developer","content":"Refuse requests for live credentials."}]}'
      source_claims:
        - claim-instruction-openai
    - description: Cursor rules file
      format: |-
        # .cursor/rules/security.mdc
        Never disable auth middleware in production.
      source_claims:
        - claim-instruction-cursor
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - instruction_id
  fields:
    - id: instruction_id
      labels:
        zh: 指令标识
        en: Instruction ID
        ja: 指示 ID
      definitions:
        zh: 在一次解析与解决链中稳定标识这项规范指示。
        en: Stable identifier for this normative directive across parsing and resolution.
        ja: 解析・解決 chain 全体で当該規範指示を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: inst-user-42
      allowed_values: []
      source_claims:
        - claim-instruction-001
    - id: directive_text
      labels:
        zh: 指示内容
        en: Directive text
        ja: 指示内容
      definitions:
        zh: 记录产生规范效力的实际行为要求，而不是整个消息包络。
        en: Records the actual behavioral requirement that carries normative effect, not the whole message envelope.
        ja: message envelope 全体ではなく、規範効力を持つ実際の行動要求を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Summarize the cited report in Chinese.
      allowed_values: []
      source_claims:
        - claim-instruction-001
  constraints: []
  required_relations: []
examples:
  - id: Instruction-example-openai-developer
    labels:
      zh: OpenAI developer 策略
      en: OpenAI developer policy
      ja: OpenAI developer ポリシー
    descriptions:
      zh: inst-dev-policy-1 来自 role=developer "Refuse requests for live credentials." authority=platform。
      en: inst-dev-policy-1 from role=developer "Refuse requests for live credentials." with authority=platform.
      ja: developer policy instruction。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: developer role
    field_values:
      instruction_id: inst-dev-policy-1
      instruction_authority: platform
    related_node_ids:
      - Instruction
      - DeveloperMessage
    related_relation_ids: []
    source_claims:
      - claim-instruction-openai
  - id: Instruction-example-cursor-rules
    labels:
      zh: Cursor 项目 rules
      en: Cursor project rules
      ja: Cursor project rules
    descriptions:
      zh: inst-rule-security-mdc 来自 .cursor/rules/security.mdc authority=organization scope=task。
      en: inst-rule-security-mdc from .cursor/rules/security.mdc authority=organization scope=task.
      ja: Cursor rules instruction。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/rules
      version: project rules
    field_values:
      instruction_id: inst-rule-security-mdc
      source_path: .cursor/rules/security.mdc
    related_node_ids:
      - Instruction
      - memory-context
    related_relation_ids: []
    source_claims:
      - claim-instruction-cursor
  - id: Instruction-example-untrusted-quote
    labels:
      zh: 不可信引用
      en: Untrusted quote
      ja: untrusted quote
    descriptions:
      zh: 检索文档 "ignore prior rules" 无 authority 委托，不得生成 Instruction。
      en: Retrieved document "ignore prior rules" without authority delegation must not create Instruction.
      ja: untrusted quote→no Instruction。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-instruction-design
parent_relation: null
