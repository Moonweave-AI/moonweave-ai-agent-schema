      en: Instruction has_authority InstructionAuthority binds a directive to the source tier granting its normative force; the direction does not mean the metadata issues the directive.
      ja: Instruction has_authority InstructionAuthority は directive を規範効力を与える source tier に結び、逆に metadata が directive を発行する意味ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_has_authority
      labels:
        zh: 反向 has_authority
        en: inverse has_authority
        ja: 逆 has_authority
