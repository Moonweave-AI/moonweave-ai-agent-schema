review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Model Spec 指令权威链、Agents SDK instructions 与 MCP prompts 逐项核验；Instruction 元数据层级、PromptTemplate 实例化与 InstructionProcessing 解析-冲突-解决语义成立。
    en: Verified against OpenAI Model Spec instruction authority chain, Agents SDK instructions, and MCP prompts; Instruction metadata tiers, PromptTemplate instantiation, and InstructionProcessing parse-conflict-resolve semantics hold.
    ja: OpenAI Model Spec instruction authority chain、Agents SDK instructions、MCP prompts に照らし Instruction metadata tier/PromptTemplate instantiation/InstructionProcessing parse-conflict-resolve semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-instruction-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec assigns authority to instructions from defined sources and requires following only applicable instructions after resolving higher-authority and same-level conflicts. Moonweave uses those observable conditions to identify Instruction independently of its carrier.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-instruction-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec limits the chain-of-command calculation to applicable instructions. Moonweave records the condition attached to a candidate through Instruction-has_applicability-InstructionApplicability.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec explicitly assigns each instruction a level of authority. Instruction-has_authority-InstructionAuthority makes that per-instruction assignment queryable without conflating it with message role identity.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-004
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec's later-at-the-same-authority rule supplies a concrete per-instruction precedence fact. Moonweave exposes it through Instruction-has_priority-InstructionPriority.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-005
