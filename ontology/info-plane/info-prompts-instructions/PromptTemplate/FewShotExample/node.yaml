schema: moonweave.ai/ontology-node/v1
id: FewShotExample
kind: concept
labels:
  zh: 少样本示例
  en: Few-shot example
  ja: 少数例示
semantics:
  short_definition:
    zh: 嵌入模板、用示范输入与期望输出展示任务模式的组成信息。
    en: Compositional information in a template demonstrating task patterns with example input and target output.
    ja: example input/target output で task pattern を示す template 内 composition 情報。
  definition:
    zh: FewShotExample 对应 prompt 中的 in-context examples（OpenAI/Anthropic messages[] 里的 user/assistant 示范对、DSPy demonstrations）；它影响实例化提示但不构成独立 Instruction 或真实用户请求。
    en: FewShotExample maps to in-context examples in prompts—OpenAI/Anthropic demonstration user/assistant pairs in messages[], DSPy demonstrations. It influences instantiated prompts but is not an independent Instruction or live user request.
    ja: FewShotExample は in-context demonstration pair。独立 Instruction/live user request ではない。
  why_needed:
    zh: 明确示例节点保存顺序与输入输出边界，避免把示范文字误读成当前会话规范指令。
    en: An explicit example node preserves order and I/O boundaries so demonstration text is not misread as current-session normative instruction.
    ja: example node により demonstration text を normative instruction と誤読しません。
  includes:
    - zh: 示范输入、目标输出、可选 chain-of-thought 片段与示例顺序。
      en: Demonstration input, target output, optional chain-of-thought fragment, and example order.
      ja: demonstration input/target output/optional CoT fragment/order。
  excludes:
    - zh: 真实 TraceEvent、评测数据集、普通说明段落与当前用户 Message。
      en: Live TraceEvents, evaluation datasets, ordinary explanatory paragraphs, and current user Messages.
      ja: live TraceEvent/eval dataset/explanatory paragraph/current user Message。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI few-shot 在 messages[] 前置 user/assistant 对；Anthropic 亦可在 user content 前放置示例块；"think step by step" 类 CoT 片段可存为 optional reasoning_fragment 字段而非独立 Instruction。
    en: OpenAI few-shot prepends user/assistant pairs in messages[]; Anthropic may place example blocks before user content; "think step by step" CoT fragments may live in optional reasoning_fragment rather than as independent Instructions.
    ja: few-shot pair/CoT fragment 建模。
  typical_input:
    - description: Few-shot message prefix
      format: '{"messages":[{"role":"user","content":"Input: 2+2"},{"role":"assistant","content":"Output: 4"},{"role":"user","content":"Input: 3+5"}]}'
      source_claims:
        - claim-fewshot-openai
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - example_id
  fields:
    - id: example_id
      labels:
        zh: 示例标识
        en: Example ID
        ja: example ID
      definitions:
        zh: 在模板内稳定标识一条示范。
        en: Stably identifies one demonstration inside a template.
        ja: template 内の一つの demonstration を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: fs-arithmetic-2
      allowed_values: []
      source_claims:
        - claim-few-shot-example-001
    - id: sequence_index
      labels:
        zh: 示例顺序
        en: Sequence index
        ja: 例示順序
      definitions:
        zh: 记录该示范在同一模板版本内的确定顺序。
        en: Records the demonstration's deterministic order within one template version.
        ja: 同一 template version 内で demonstration の確定順序を記録します。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims:
        - claim-few-shot-example-001
    - id: demonstration_input
      labels:
        zh: 示范输入
        en: Demonstration input
        ja: demonstration input
      definitions:
        zh: 记录示例问题或输入情境。
        en: Records the exemplar question or input situation.
        ja: example question/input situation を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Roger has 5 balls and buys 2 cans of 3. How many?
      allowed_values: []
      source_claims:
        - claim-few-shot-example-001
    - id: reasoning_fragment
      labels:
        zh: 示范推导
        en: Reasoning fragment
        ja: 例示推論
      definitions:
        zh: 按模板作者选择记录可选的示范推导，不代表当前运行的内部思维。
        en: Records optional template-authored demonstration reasoning without claiming it is a live run's internal thought.
        ja: template author が選んだ任意 demonstration reasoning を記録し live run の internal thought とは主張しません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 5 + 2 × 3 = 11
      allowed_values: []
      source_claims:
        - claim-few-shot-example-001
    - id: target_output
      labels:
        zh: 目标输出
        en: Target output
        ja: target output
      definitions:
        zh: 记录模板希望模型从示例学习的目标结果。
        en: Records the target result demonstrated to the model.
        ja: model に示す target result を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "11"
      allowed_values: []
      source_claims:
        - claim-few-shot-example-001
  constraints: []
  required_relations: []
examples:
  - id: FewShotExample-example-arithmetic
    labels:
      zh: 算术示范对
      en: Arithmetic demonstration pair
      ja: 算術 demonstration pair
    descriptions:
      zh: 'code-review@3 模板含 FewShotExample ex-1：输入 diff 片段，输出 "Severity: medium" 审查摘要。'
      en: 'code-review@3 template contains FewShotExample ex-1: input diff snippet, output "Severity: medium" review summary.'
      ja: ex-1 demonstration pair。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: few-shot messages
    field_values:
      example_id: ex-1
      example_order: 1
    related_node_ids:
      - FewShotExample
      - PromptTemplate
    related_relation_ids: []
    source_claims:
      - claim-fewshot-openai
  - id: FewShotExample-example-cot-fragment
    labels:
      zh: CoT 示范片段
      en: CoT demonstration fragment
      ja: CoT demonstration fragment
    descriptions:
      zh: 模板示例 assistant 段含 "Let us think step by step" 推导，标记为 reasoning_fragment 而非 SystemInstruction。
      en: Template example assistant segment contains "Let us think step by step" reasoning marked reasoning_fragment not SystemInstruction.
      ja: CoT reasoning_fragment。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/chain-of-thought
      version: chain-of-thought
    field_values: {}
    related_node_ids:
      - FewShotExample
    related_relation_ids: []
    source_claims:
      - claim-fewshot-cot
  - id: FewShotExample-example-not-instruction
    labels:
      zh: 非 Instruction
      en: Not Instruction
      ja: Instruction ではない
    descriptions:
      zh: 示例 assistant 答案 "please continue" 只是 target output，不得自动提取为 Instruction。
      en: Example assistant answer "please continue" is only target output and must not auto-extract as Instruction.
      ja: example output≠Instruction。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - FewShotExample
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-fewshot-design
parent_relation:
  id: PromptTemplate-contains-FewShotExample
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: contains
    en: contains
    ja: contains
  definitions:
    zh: PromptTemplate contains FewShotExample 表示示例作为模板版本内有顺序的示范组成部分存在，随模板复制但不代表一次真实运行。
    en: PromptTemplate contains FewShotExample means an ordered demonstration is a compositional part of that template version, copied with the template but not representing a live run.
    ja: PromptTemplate contains FewShotExample は ordered demonstration が template version の構成部分として存在し template と共に複製されるが live run ではないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 contains
      en: inverse contains
      ja: 逆 contains
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PromptTemplate-contains-FewShotExample-manual-positive-20260716
      labels:
        zh: contains 正例
        en: contains positive case
        ja: contains 正例
      descriptions:
        zh: arithmetic-cot v2 在目标问题前按顺序包含 fs-arithmetic-2 的输入、推导和答案。
        en: arithmetic-cot v2 contains fs-arithmetic-2's input, reasoning, and answer in order before the target question.
        ja: arithmetic-cot v2 は target question 前に fs-arithmetic-2 の input・reasoning・answer を順序付きで含みます。
      field_values: {}
      related_node_ids:
        - PromptTemplate
        - FewShotExample
      related_relation_ids:
        - PromptTemplate-contains-FewShotExample
      source_claims:
        - claim-few-shot-example-002
    - id: PromptTemplate-contains-FewShotExample-manual-boundary-20260716
      labels:
        zh: contains 边界例
        en: contains boundary case
        ja: contains 境界例
      descriptions:
        zh: 运行 TraceEvent 记录了一次真实问答，但模板定义中没有包含该记录。
        en: A runtime TraceEvent records a real question and answer, but the template definition does not contain it.
        ja: runtime TraceEvent が実 question/answer を記録しても template definition はそれを含みません。
      field_values: {}
      related_node_ids:
        - PromptTemplate
        - FewShotExample
      related_relation_ids:
        - PromptTemplate-contains-FewShotExample
      source_claims:
        - claim-few-shot-example-002
  source_claims:
    - claim-few-shot-example-002
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Top-level system string separate from turn messages.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-few-shot-example-001
    source: lit-mech-cot
    supports: Wei et al. present few-shot exemplars pairing questions with worked reasoning and answers inside prompts, and show that such demonstrations elicit a target reasoning pattern. Moonweave represents each reusable exemplar as FewShotExample.
    locator: NeurIPS 2022 paper > Section 2 Chain-of-thought prompting and Figure 1 few-shot exemplars
    evidence_kind: peer-reviewed
    confidence: high
  - id: claim-few-shot-example-002
    source: lit-mech-cot
    supports: Wei et al. place worked exemplars inside few-shot prompts before the target question. Moonweave represents that template membership with PromptTemplate-contains-FewShotExample.
    locator: NeurIPS 2022 paper > Section 2 Chain-of-thought prompting and Figure 1 few-shot exemplars
    evidence_kind: peer-reviewed
    confidence: high
  - id: claim-fewshot-openai
    source: src-openai-chat
    supports: OpenAI few-shot prompting uses prior user/assistant message pairs as in-context examples.
    locator: messages array few-shot
    evidence_kind: primary-api
    confidence: high
  - id: claim-fewshot-cot
    source: src-anthropic-messages
    supports: Chain-of-thought demonstration text in examples is compositional, not normative instruction by default.
    locator: prompt engineering chain-of-thought
    evidence_kind: official-doc
    confidence: medium
  - id: claim-fewshot-design
    source: src-info-prompts-design
    supports: FewShotExample is demonstration information distinct from Instruction normative identity.
    locator: FewShotExample boundary
    evidence_kind: design-inference
    confidence: high
