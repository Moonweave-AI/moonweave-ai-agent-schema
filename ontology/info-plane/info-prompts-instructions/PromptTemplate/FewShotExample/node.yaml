schema: moonweave.ai/ontology-node/v1
id: FewShotExample
kind: concept
status: review
labels:
  zh: 少样本示例
  en: Few-shot example
  ja: 少数例示
semantics:
  short_definition:
    zh: 嵌入提示模板、用示范输入与期望输出传达任务模式的信息。
    en: Information embedded in a prompt template to demonstrate a task pattern with example input and target output.
    ja: example input と target output で task pattern を示す prompt-template 内情報です。
  definition:
    zh: 少样本示例是 PromptTemplate 的组成信息，以一个或少量成对的示范输入、推导片段或目标输出展示期望行为；它通过示范影响实例化提示，但不是一次真实用户请求、运行轨迹或独立 Instruction。
    en: A FewShotExample is compositional information in a PromptTemplate using one or a small set of paired demonstration inputs, optional reasoning fragments, and target outputs to show expected behavior. It influences instantiated prompts by demonstration but is not a live user request, runtime trace, or independent Instruction.
    ja: FewShotExample は一つまたは少数の demonstration input・optional reasoning fragment・target output の組で期待行動を示す PromptTemplate の構成情報です。demonstration で instantiated prompt に影響しますが live user request・runtime trace・独立 Instruction ではありません。
  why_needed:
    zh: 明确示例节点可保存顺序、输入输出边界和适用任务，同时避免把示例中的文字误读成当前会话事实。
    en: An explicit example node preserves order, input/output boundary, and task applicability without reading demonstration text as current-conversation fact.
    ja: 明示 example node により order・input/output boundary・task applicability を保持し、demonstration text を current-conversation fact と誤読しません。
  includes:
    - zh: 纳入模板作者选定的示范输入、目标输出、可选推导片段和示例顺序。
      en: Includes template-authored demonstration input, target output, optional reasoning fragment, and example order.
      ja: template author が選んだ demonstration input・target output・optional reasoning fragment・example order を含みます。
  excludes:
    - zh: 排除真实运行的 TraceEvent、评测样本集合、普通说明段落和当前用户请求。
      en: Excludes live TraceEvents, evaluation datasets, ordinary explanatory paragraphs, and the current user request.
      ja: live TraceEvent・evaluation dataset・通常説明 paragraph・current user request を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - example_id
  fields:
    - id: example_id
      labels:
        zh: 示例标识
        en: Example ID
        ja: example ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在模板内稳定标识一条示范。
        en: Stably identifies one demonstration inside a template.
        ja: template 内の一つの demonstration を安定識別します。
      allowed_values: []
      pattern: null
      example_value: fs-arithmetic-2
      source_claims:
        - claim-few-shot-example-001
    - id: sequence_index
      labels:
        zh: 示例顺序
        en: Sequence index
        ja: 例示順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该示范在同一模板版本内的确定顺序。
        en: Records the demonstration's deterministic order within one template version.
        ja: 同一 template version 内で demonstration の確定順序を記録します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-few-shot-example-001
    - id: demonstration_input
      labels:
        zh: 示范输入
        en: Demonstration input
        ja: demonstration input
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录示例问题或输入情境。
        en: Records the exemplar question or input situation.
        ja: example question/input situation を記録します。
      allowed_values: []
      pattern: null
      example_value: Roger has 5 balls and buys 2 cans of 3. How many?
      source_claims:
        - claim-few-shot-example-001
    - id: reasoning_fragment
      labels:
        zh: 示范推导
        en: Reasoning fragment
        ja: 例示推論
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 按模板作者选择记录可选的示范推导，不代表当前运行的内部思维。
        en: Records optional template-authored demonstration reasoning without claiming it is a live run's internal thought.
        ja: template author が選んだ任意 demonstration reasoning を記録し live run の internal thought とは主張しません。
      allowed_values: []
      pattern: null
      example_value: 5 + 2 × 3 = 11
      source_claims:
        - claim-few-shot-example-001
    - id: target_output
      labels:
        zh: 目标输出
        en: Target output
        ja: target output
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录模板希望模型从示例学习的目标结果。
        en: Records the target result demonstrated to the model.
        ja: model に示す target result を記録します。
      allowed_values: []
      pattern: null
      example_value: "11"
      source_claims:
        - claim-few-shot-example-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: FewShotExample-manual-positive-20260716
    kind: positive
    labels:
      zh: 少样本示例正例
      en: Few-shot example positive case
      ja: 少数例示正例
    scenario_id: null
    descriptions:
      zh: 算术模板按顺序包含一条“5 加两组 3 得 11”的输入、推导和答案示范，随后才放入未解问题。
      en: An arithmetic template contains an ordered demonstration showing that 5 plus two groups of 3 gives 11, including input, reasoning, and answer before the unsolved question.
      ja: arithmetic template は未解 question 前に「5 + 2×3 = 11」の input・reasoning・answer demonstration を順序付きで含みます。
    field_values:
      example_id: fs-arithmetic-2
      sequence_index: 2
      demonstration_input: Roger has 5 balls and buys 2 cans of 3. How many?
      reasoning_fragment: 5 + 2 × 3 = 11
      target_output: "11"
    related_node_ids:
      - FewShotExample
      - PromptTemplate
    related_relation_ids:
      - PromptTemplate-contains-FewShotExample
    expected_result:
      zh: 该对象归为模板内 FewShotExample，并保持与真实请求分离。
      en: The object is classified as a FewShotExample contained in the template and remains separate from the live request.
      ja: object は template 内 FewShotExample と分類され live request と分離されます。
    why_valid_or_invalid:
      zh: 示范输入、目标输出、模板归属和顺序均明确。
      en: Demonstration input, target output, template membership, and order are explicit.
      ja: demonstration input・target output・template membership・order が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-few-shot-example-001
  - id: FewShotExample-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 少样本示例边界例
      en: Few-shot example boundary case
      ja: 少数例示境界例
    scenario_id: null
    descriptions:
      zh: 模型刚刚完成的真实工具调用包含输入和输出，但它属于运行 TraceEvent，并非模板作者预置的示范。
      en: A just-completed real tool call has input and output, but it is a runtime TraceEvent rather than a template-authored demonstration.
      ja: 直前の実 tool call は input/output を持ちますが、template author が事前配置した demonstration ではなく runtime TraceEvent です。
    field_values: {}
    related_node_ids:
      - FewShotExample
      - TraceEvent
    related_relation_ids: []
    expected_result:
      zh: 该记录保持运行轨迹类型，不归类为 FewShotExample。
      en: The record remains a runtime trace and is not classified as FewShotExample.
      ja: record は runtime trace のままで FewShotExample へ分類しません。
    why_valid_or_invalid:
      zh: 输入输出成对不足以建立示例身份，还必须具有模板内示范用途。
      en: Paired input and output are insufficient; identity also requires a demonstration role inside a template.
      ja: input/output pair だけでは不十分で template 内 demonstration role が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-few-shot-example-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PromptTemplate-contains-FewShotExample
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: contains
    en: contains
    ja: contains
  definitions:
    zh: PromptTemplate contains FewShotExample 表示示例作为模板版本内有顺序的示范组成部分存在，随模板复制但不代表一次真实运行。
    en: PromptTemplate contains FewShotExample means an ordered demonstration is a compositional part of that template version, copied with the template but not representing a live run.
    ja: PromptTemplate contains FewShotExample は ordered demonstration が template version の構成部分として存在し template と共に複製されるが live run ではないことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: inverse_contains
    labels:
      zh: 反向 contains
      en: inverse contains
      ja: 逆 contains
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PromptTemplate-contains-FewShotExample-manual-positive-20260716
      kind: positive
      labels:
        zh: contains 正例
        en: contains positive case
        ja: contains 正例
      scenario_id: null
      descriptions:
        zh: arithmetic-cot v2 在目标问题前按顺序包含 fs-arithmetic-2 的输入、推导和答案。
        en: arithmetic-cot v2 contains fs-arithmetic-2's input, reasoning, and answer in order before the target question.
        ja: arithmetic-cot v2 は target question 前に fs-arithmetic-2 の input・reasoning・answer を順序付きで含みます。
      field_values: {}
      related_node_ids:
        - PromptTemplate
        - FewShotExample
      related_relation_ids:
        - PromptTemplate-contains-FewShotExample
      expected_result:
        zh: 模板查询返回该示例作为组成节点并保留顺序。
        en: Template traversal returns the example as a compositional node with order preserved.
        ja: template traversal は example を構成 node として返し order を保持します。
      why_valid_or_invalid:
        zh: 示例由模板作者预置并随该模板版本复用。
        en: The demonstration is template-authored and reused with that template version.
        ja: demonstration は template author が配置し当該 template version と再利用されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-few-shot-example-002
    - id: PromptTemplate-contains-FewShotExample-manual-boundary-20260716
      kind: boundary
      labels:
        zh: contains 边界例
        en: contains boundary case
        ja: contains 境界例
      scenario_id: null
      descriptions:
        zh: 运行 TraceEvent 记录了一次真实问答，但模板定义中没有包含该记录。
        en: A runtime TraceEvent records a real question and answer, but the template definition does not contain it.
        ja: runtime TraceEvent が実 question/answer を記録しても template definition はそれを含みません。
      field_values: {}
      related_node_ids:
        - PromptTemplate
        - FewShotExample
      related_relation_ids:
        - PromptTemplate-contains-FewShotExample
      expected_result:
        zh: 不得因形式相似建立 contains FewShotExample。
        en: Formal similarity must not create a contains FewShotExample fact.
        ja: 形式類似だけで contains FewShotExample fact を作りません。
      why_valid_or_invalid:
        zh: 组成关系要求模板作者定义的成员身份。
        en: Composition requires membership declared by the template definition.
        ja: composition には template definition が宣言する membership が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-few-shot-example-002
  source_claims:
    - claim-few-shot-example-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
