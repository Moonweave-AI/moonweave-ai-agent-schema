source_claims:
  - id: claim-few-shot-example-001
    source: lit-mech-cot
    supports: Wei et al. present few-shot exemplars pairing questions with worked reasoning and answers inside prompts, and show that such demonstrations elicit a target reasoning pattern. Moonweave represents each reusable exemplar as FewShotExample.
    locator: NeurIPS 2022 paper > Section 2 Chain-of-thought prompting and Figure 1 few-shot exemplars
    evidence_kind: peer-reviewed
    confidence: high
    review_status: pending
  - id: claim-few-shot-example-002
    source: lit-mech-cot
    supports: Wei et al. place worked exemplars inside few-shot prompts before the target question. Moonweave represents that template membership with PromptTemplate-contains-FewShotExample.
    locator: NeurIPS 2022 paper > Section 2 Chain-of-thought prompting and Figure 1 few-shot exemplars
    evidence_kind: peer-reviewed
    confidence: high
    review_status: pending
