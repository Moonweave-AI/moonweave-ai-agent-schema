schema: moonweave.ai/ontology-node/v1
id: PromptTemplateInstance
kind: concept
labels:
  zh: 提示模板实例
  en: Prompt template instance
  ja: プロンプトテンプレート実体
semantics:
  short_definition:
    zh: 一次变量绑定后从 PromptTemplate 产生的具体实例。
    en: Concrete instance produced from a PromptTemplate after one variable binding.
    ja: 一回の variable binding 後 PromptTemplate から生成される具体 instance。
  definition:
    zh: PromptTemplateInstance 记录 template_id@version 与本次 bindings（例如 MCP prompts/get arguments.language=typescript）；产出可注入 messages[] 或 Instruction 成员，但不是 PromptTemplate 规范本身或 ConversationTurn。
    en: PromptTemplateInstance records template_id@version and bindings such as MCP prompts/get arguments.language=typescript, producing injectable messages[] or Instruction members—not the PromptTemplate spec or a ConversationTurn.
    ja: PromptTemplateInstance は bindings を記録し injectable messages[]/Instruction member を生成。
  why_needed:
    zh: 实例身份使审计能回答“这次 MCP prompt 绑定了哪些变量”，而不把模板 lineage 与一次运行混淆。
    en: Instance identity lets audit answer which variables this MCP prompt bound without conflating template lineage with one run.
    ja: instance identity により「今回どの variable を bind したか」を監査可能に。
  includes:
    - zh: instance_id、template 引用、完整 bindings、实例化时间与产出 Message/Instruction 引用。
      en: instance_id, template reference, complete bindings, instantiation time, and produced Message/Instruction references.
      ja: instance_id/template ref/bindings/instantiation time/produced refs。
  excludes:
    - zh: 未绑定必填变量的部分实例、PromptTemplate 规范正文、模型 completion 输出。
      en: Partial instances with missing required variables, PromptTemplate spec body, and model completion output.
      ja: 必須 variable 欠落 partial instance/template spec body/completion output。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: prompts/get name=code-review arguments={language,diff} 返回 messages[] 后创建 pti-code-review-808；Cursor skill 激活也可视为 template instance。
    en: After prompts/get name=code-review with language and diff arguments returns messages[], create pti-code-review-808; Cursor skill activation may also be a template instance.
    ja: MCP prompts/get 後 instance 作成。
  typical_input:
    - description: MCP prompts/get result
      format: '{"messages":[{"role":"user","content":{"type":"text","text":"Review this TypeScript diff."}}]}'
      source_claims:
        - claim-pti-mcp
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - instance_id
  fields:
    - id: instance_id
      labels:
        zh: 实例标识
        en: Instance ID
        ja: instance ID
      definitions:
        zh: 标识一次确定的模板绑定结果。
        en: Identifies one determinate template-binding result.
        ja: 一つの確定 template-binding result を識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: pti-code-review-808
      allowed_values: []
      source_claims:
        - claim-prompt-template-instance-001
    - id: template_ref
      labels:
        zh: 模板引用
        en: Template reference
        ja: template 参照
      definitions:
        zh: 指向被实例化的唯一 PromptTemplate 版本。
        en: References the single PromptTemplate version instantiated.
        ja: instance 化した唯一 PromptTemplate version を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code-review@3
      allowed_values: []
      source_claims:
        - claim-prompt-template-instance-001
    - id: variable_bindings
      labels:
        zh: 变量绑定
        en: Variable bindings
        ja: variable binding
      definitions:
        zh: 保存本次实例化的变量名和值。
        en: Preserves variable names and values for this instantiation.
        ja: 今回 instantiation の variable name/value を保存します。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        code: "def add(a,b): return a-b"
        policy: correctness
      allowed_values: []
      source_claims:
        - claim-prompt-template-instance-001
    - id: rendered_digest
      labels:
        zh: 渲染摘要
        en: Rendered digest
        ja: rendering digest
      definitions:
        zh: 固定本次绑定所产生渲染内容的摘要，以便检测模板或绑定漂移。
        en: Fixes a digest of content rendered by this binding so template or binding drift can be detected.
        ja: この binding が render した content の digest を固定し template/binding drift を検出します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha256:2b91...
      allowed_values: []
      source_claims:
        - claim-prompt-template-instance-001
  constraints: []
  required_relations: []
examples:
  - id: PromptTemplateInstance-example-mcp
    labels:
      zh: MCP 实例化
      en: MCP instantiation
      ja: MCP 实例化
    descriptions:
      zh: pti-code-review-808 实例化 code-review@3，bindings language=typescript diff=present。
      en: pti-code-review-808 instantiates code-review@3 with bindings language=typescript diff=present.
      ja: pti-code-review-808 bindings 記録。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: prompts/get
    field_values:
      instance_id: pti-code-review-808
      prompt_template_id: code-review
      template_version: "3"
    related_node_ids:
      - PromptTemplateInstance
      - PromptTemplate
    related_relation_ids: []
    source_claims:
      - claim-pti-mcp
  - id: PromptTemplateInstance-example-openai-dynamic
    labels:
      zh: OpenAI 动态 instructions
      en: OpenAI dynamic instructions
      ja: OpenAI dynamic instructions
    descriptions:
      zh: Agents SDK dynamic instructions 回调产出 inst-review-12 并保留 template_version=3 引用。
      en: Agents SDK dynamic instructions callback produces inst-review-12 retaining template_version=3 reference.
      ja: dynamic instructions callback。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/agents
      version: dynamic instructions
    field_values: {}
    related_node_ids:
      - PromptTemplateInstance
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-pti-openai
  - id: PromptTemplateInstance-example-incomplete
    labels:
      zh: 绑定不完整
      en: Incomplete binding
      ja: binding 不完全
    descriptions:
      zh: 缺少必填 policy 变量却声称完整实例化时必须拒绝并标记 binding_incomplete。
      en: Missing required policy variable must reject complete instantiation and mark binding_incomplete.
      ja: 必須 policy 欠落→binding_incomplete。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: validation
    field_values: {}
    related_node_ids:
      - PromptTemplateInstance
    related_relation_ids: []
    source_claims:
      - claim-pti-design
parent_relation:
  id: PromptTemplateInstance-instantiates-PromptTemplate
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: instantiates
    en: instantiates
    ja: instantiates
  definitions:
    zh: PromptTemplateInstance instantiates PromptTemplate 表示该实例完整绑定了目标模板的一个确定版本，实例保留模板引用但拥有独立运行身份。
    en: PromptTemplateInstance instantiates PromptTemplate means the instance completely binds one determinate template version, retaining its reference while owning a distinct runtime identity.
    ja: PromptTemplateInstance instantiates PromptTemplate は instance が特定 template version を完全 binding し、template reference を保持しつつ独立 runtime identity を持つことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 instantiates
      en: inverse instantiates
      ja: 逆 instantiates
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: PromptTemplateInstance-instantiates-PromptTemplate-manual-positive-20260716
      labels:
        zh: instantiates 正例
        en: instantiates positive case
        ja: instantiates 正例
      descriptions:
        zh: pti-code-review-808 指向 code-review@3，并为 code 与 policy 提供完整绑定。
        en: pti-code-review-808 points to code-review@3 and supplies complete bindings for code and policy.
        ja: pti-code-review-808 は code-review@3 を指し code/policy の完全 binding を提供します。
      field_values: {}
      related_node_ids:
        - PromptTemplateInstance
        - PromptTemplate
      related_relation_ids:
        - PromptTemplateInstance-instantiates-PromptTemplate
      source_claims:
        - claim-prompt-template-instance-002
    - id: PromptTemplateInstance-instantiates-PromptTemplate-manual-boundary-20260716
      labels:
        zh: instantiates 边界例
        en: instantiates boundary case
        ja: instantiates 境界例
      descriptions:
        zh: 渲染文本与模板相似，但缺少 template_id、版本和变量绑定记录。
        en: Rendered text resembles a template but lacks template ID, version, and binding record.
        ja: rendered text は template に似ていますが template ID・version・binding record を欠きます。
      field_values: {}
      related_node_ids:
        - PromptTemplateInstance
        - PromptTemplate
      related_relation_ids:
        - PromptTemplateInstance-instantiates-PromptTemplate
      source_claims:
        - claim-prompt-template-instance-002
  source_claims:
    - claim-prompt-template-instance-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mcp-prompts
    title: MCP Server Prompts Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    source_type: official-spec
    relevance: Reusable prompt templates with argument binding.
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-prompt-template-instance-001
    source: eng-proto-mcp-spec
    supports: MCP prompts/get accepts a prompt name plus argument bindings and returns rendered prompt messages. Moonweave separates that bound retrieval result from the reusable template as PromptTemplateInstance.
    locator: Protocol revision 2025-06-18 > Server features > Prompts > Protocol messages and data types
    evidence_kind: design-inference
    confidence: high
  - id: claim-prompt-template-instance-002
    source: eng-proto-mcp-spec
    supports: MCP prompts/get takes a prompt name and argument map, returning rendered messages for that request. Moonweave records the bound result's link to its reusable definition as PromptTemplateInstance-instantiates-PromptTemplate.
    locator: Protocol revision 2025-06-18 > Server features > Prompts > Protocol messages and data types
    evidence_kind: design-inference
    confidence: high
  - id: claim-pti-mcp
    source: src-mcp-prompts
    supports: MCP prompts/get instantiates a template with bound arguments returning messages.
    locator: prompts/get
    evidence_kind: primary-spec
    confidence: high
  - id: claim-pti-openai
    source: src-openai-chat
    supports: OpenAI agent configurations may instantiate instruction templates at runtime.
    locator: dynamic instructions
    evidence_kind: design-inference
    confidence: medium
  - id: claim-pti-design
    source: src-info-prompts-design
    supports: PromptTemplateInstance records one binding event separate from template lineage.
    locator: PromptTemplateInstance
    evidence_kind: design-inference
    confidence: high
