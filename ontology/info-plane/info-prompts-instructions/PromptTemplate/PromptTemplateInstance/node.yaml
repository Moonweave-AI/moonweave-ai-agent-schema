    en: PromptTemplateInstance instantiates PromptTemplate means the instance completely binds one determinate template version, retaining its reference while owning a distinct runtime identity.
    ja: PromptTemplateInstance instantiates PromptTemplate は instance が特定 template version を完全 binding し、template reference を保持しつつ独立 runtime identity を持つことを表します。
