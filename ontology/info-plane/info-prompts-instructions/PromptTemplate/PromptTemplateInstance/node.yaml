schema: moonweave.ai/ontology-node/v1
id: PromptTemplateInstance
kind: concept
status: review
labels:
  zh: 提示模板实例
  en: Prompt template instance
  ja: プロンプトテンプレート実体
semantics:
  short_definition:
    zh: 把一版提示模板与一次完整变量绑定固定在一起的信息对象。
    en: An information object fixing one prompt-template version to one complete variable binding.
    ja: 一つの prompt-template version と一回の完全 variable binding を固定する information object です。
  definition:
    zh: 提示模板实例是一项信息对象，引用且只引用一版 PromptTemplate，保存本次参数绑定和渲染结果摘要；它可被解析活动消费，但不是模板规范、会话 Message 或模型输出。
    en: A PromptTemplateInstance is an information object referencing exactly one PromptTemplate version and preserving current argument bindings plus a rendered-content digest. Parsing may consume it, but it is not the template specification, a conversation Message, or model output.
    ja: PromptTemplateInstance は一つの PromptTemplate version だけを参照し、current argument binding と rendered-content digest を保存する information object です。parsing が consume できますが template specification・conversation Message・model output ではありません。
  why_needed:
    zh: 独立实例对象使同一模板的不同绑定、版本和渲染结果可区分，也为解析活动提供不可变输入引用。
    en: A distinct instance separates bindings, versions, and renderings of one template and gives parsing an immutable input reference.
    ja: 独立 instance により同一 template の binding・version・rendering を区別し、parsing に immutable input reference を提供します。
  includes:
    - zh: 纳入实例标识、模板及版本引用、完整变量绑定和渲染摘要。
      en: Includes instance ID, template/version reference, complete variable bindings, and rendered digest.
      ja: instance ID・template/version reference・complete variable binding・rendered digest を含みます。
  excludes:
    - zh: 排除缺失必填变量的绑定、模板定义本身、发送后的 Message 和模型生成内容。
      en: Excludes bindings missing required variables, the template definition itself, transmitted Messages, and model-generated content.
      ja: 必須 variable 欠落 binding・template definition 自体・送信後 Message・model-generated content を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - instance_id
  fields:
    - id: instance_id
      labels:
        zh: 实例标识
        en: Instance ID
        ja: instance ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次确定的模板绑定结果。
        en: Identifies one determinate template-binding result.
        ja: 一つの確定 template-binding result を識別します。
      allowed_values: []
      pattern: null
      example_value: pti-code-review-808
      source_claims:
        - claim-prompt-template-instance-001
    - id: template_ref
      labels:
        zh: 模板引用
        en: Template reference
        ja: template 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被实例化的唯一 PromptTemplate 版本。
        en: References the single PromptTemplate version instantiated.
        ja: instance 化した唯一 PromptTemplate version を参照します。
      allowed_values: []
      pattern: null
      example_value: code-review@3
      source_claims:
        - claim-prompt-template-instance-001
    - id: variable_bindings
      labels:
        zh: 变量绑定
        en: Variable bindings
        ja: variable binding
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存本次实例化的变量名和值。
        en: Preserves variable names and values for this instantiation.
        ja: 今回 instantiation の variable name/value を保存します。
      allowed_values: []
      pattern: null
      example_value:
        code: "def add(a,b): return a-b"
        policy: correctness
      source_claims:
        - claim-prompt-template-instance-001
    - id: rendered_digest
      labels:
        zh: 渲染摘要
        en: Rendered digest
        ja: rendering digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次绑定所产生渲染内容的摘要，以便检测模板或绑定漂移。
        en: Fixes a digest of content rendered by this binding so template or binding drift can be detected.
        ja: この binding が render した content の digest を固定し template/binding drift を検出します。
      allowed_values: []
      pattern: null
      example_value: sha256:2b91...
      source_claims:
        - claim-prompt-template-instance-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptTemplateInstance-manual-positive-20260716
    kind: positive
    labels:
      zh: 提示模板实例正例
      en: Prompt template instance positive case
      ja: プロンプトテンプレート実体正例
    scenario_id: null
    descriptions:
      zh: pti-code-review-808 引用 code-review@3，并完整绑定 code 与 policy；实例保留渲染摘要后交给解析活动。
      en: pti-code-review-808 references code-review@3, completely binds code and policy, preserves a rendering digest, and is passed to parsing.
      ja: pti-code-review-808 は code-review@3 を参照し code/policy を完全 binding、rendering digest を保持して parsing へ渡します。
    field_values:
      instance_id: pti-code-review-808
      template_ref: code-review@3
      variable_bindings:
        code: "def add(a,b): return a-b"
        policy: correctness
      rendered_digest: sha256:2b91...
    related_node_ids:
      - PromptTemplateInstance
      - PromptTemplate
      - InstructionParsingActivity
    related_relation_ids:
      - PromptTemplateInstance-instantiates-PromptTemplate
      - InstructionParsingActivity-consumes-PromptTemplateInstance
    expected_result:
      zh: 实例通过 instantiates 指向唯一模板，并可作为 parsing 的 consumes 目标。
      en: The instance points to exactly one template through instantiates and can be the consumes target of parsing.
      ja: instance は instantiates で唯一 template を指し、parsing の consumes target になれます。
    why_valid_or_invalid:
      zh: 模板版本和全部必填绑定都明确，模板与实例的语义类型保持不同。
      en: Template version and all required bindings are explicit, while template and instance retain different semantic kinds.
      ja: template version と全必須 binding が明示され、template と instance は異なる semantic kind を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-template-instance-001
  - id: PromptTemplateInstance-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 提示模板实例边界例
      en: Prompt template instance boundary case
      ja: プロンプトテンプレート実体境界例
    scenario_id: null
    descriptions:
      zh: 请求只提供 code，遗漏模板声明为必填的 policy；服务返回 invalid params。
      en: The request supplies code but omits required policy, and the service returns invalid params.
      ja: request は code だけを提供し必須 policy を欠くため service は invalid params を返します。
    field_values: {}
    related_node_ids:
      - PromptTemplateInstance
      - PromptTemplate
    related_relation_ids:
      - PromptTemplateInstance-instantiates-PromptTemplate
    expected_result:
      zh: 不得创建 accepted PromptTemplateInstance，应保留显式绑定错误。
      en: No accepted PromptTemplateInstance is created; an explicit binding error is retained.
      ja: accepted PromptTemplateInstance を作成せず explicit binding error を保持します。
    why_valid_or_invalid:
      zh: 实例身份要求对所选模板完成其必填参数契约。
      en: Instance identity requires satisfying the selected template's required argument contract.
      ja: instance identity には selected template の required argument contract 充足が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-template-instance-001
external_mappings: []
