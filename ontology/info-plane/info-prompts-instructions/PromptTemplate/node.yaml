schema: moonweave.ai/ontology-node/v1
id: PromptTemplate
kind: concept
status: accepted
labels:
  zh: 提示模板
  en: Prompt template
  ja: プロンプトテンプレート
semantics:
  short_definition:
    zh: 声明固定提示内容、变量和可复用示例的参数化规范。
    en: A parameterized specification declaring fixed prompt content, variables, and reusable examples.
    ja: 固定 prompt content・variable・再利用 example を宣言する parameterized specification です。
  definition:
    zh: 提示模板是一项可版本化规范，声明固定内容、参数槽位及其变量定义、可选 Instruction 片段和 FewShotExample；它需要经参数绑定形成 PromptTemplateInstance，不等同于一次消息、模型调用或已解析指令集合。
    en: A PromptTemplate is a versionable specification declaring fixed content, variable definitions, optional Instruction fragments, and FewShotExamples. Parameter binding creates a PromptTemplateInstance; the template itself is not a message, model call, or resolved instruction set.
    ja: PromptTemplate は fixed content・variable definition・optional Instruction fragment・FewShotExample を宣言する versionable specification です。parameter binding で PromptTemplateInstance を作り、template 自体は message・model call・resolved instruction set ではありません。
  why_needed:
    zh: 模板身份使提示结构可以复用、版本化和审计，同时不把每次变量绑定或发送消息混为同一对象。
    en: Template identity enables reuse, versioning, and audit without conflating each binding or transmitted message with the template.
    ja: template identity により再利用・versioning・audit を可能にし、各 binding/transmitted message を template と混同しません。
  includes:
    - zh: 纳入模板标识、版本、固定片段、变量声明、内嵌指令与 few-shot 示例顺序。
      en: Includes template ID, version, fixed fragments, variable declarations, embedded instructions, and few-shot example order.
      ja: template ID・version・fixed fragment・variable declaration・embedded instruction・few-shot example order を含みます。
  excludes:
    - zh: 排除一次具体变量绑定、渲染后的消息、模型运行结果和仅因文字相似而复用的普通文档。
      en: Excludes one concrete variable binding, rendered message, model-run result, and ordinary documents reused only by textual similarity.
      ja: 具体 variable binding・rendered message・model-run result・文字類似だけで再利用される通常 document を除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - template_id
    - template_version
  fields:
    - id: template_id
      labels:
        zh: 模板标识
        en: Template ID
        ja: template ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识可发现和实例化的提示模板。
        en: Stably identifies a discoverable, instantiable prompt template.
        ja: 発見・instance 化できる prompt template を安定識別します。
      allowed_values: []
      pattern: null
      example_value: code-review
      source_claims:
        - claim-prompt-template-001
    - id: template_version
      labels:
        zh: 模板版本
        en: Template version
        ja: template version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分同一模板标识下的内容与变量契约版本。
        en: Distinguishes content and variable-contract versions under one template ID.
        ja: 同一 template ID 下の content/variable contract version を区別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-prompt-template-001
    - id: template_body
      labels:
        zh: 模板正文
        en: Template body
        ja: template 本文
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录固定文本和变量占位，不包含本次绑定值。
        en: Records fixed text and variable placeholders without current binding values.
        ja: current binding value を含めず fixed text と variable placeholder を記録します。
      allowed_values: []
      pattern: null
      example_value: Review {{code}} against {{policy}}.
      source_claims:
        - claim-prompt-template-001
    - id: argument_schema
      labels:
        zh: 参数契约
        en: Argument schema
        ja: 引数契約
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明可绑定参数、必填性与允许值约束，而不保存某次绑定。
        en: Declares bindable arguments, requiredness, and value constraints without storing one instantiation's values.
        ja: bindable argument・requiredness・value constraint を宣言し一回の binding value は保存しません。
      allowed_values: []
      pattern: null
      example_value:
        code:
          required: true
        policy:
          required: true
      source_claims:
        - claim-prompt-template-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptTemplate-manual-positive-20260716
    kind: positive
    labels:
      zh: 提示模板正例
      en: Prompt template positive case
      ja: プロンプトテンプレート正例
    scenario_id: null
    descriptions:
      zh: code-review v3 声明 code 与 policy 两个必填变量、一个审查 Instruction 片段和一组边界 FewShotExample。
      en: code-review v3 declares required code and policy variables, one review Instruction fragment, and an ordered set of boundary FewShotExamples.
      ja: code-review v3 は必須 code/policy variable、一つの review Instruction fragment、順序付き boundary FewShotExample set を宣言します。
    field_values:
      template_id: code-review
      template_version: "3"
      template_body: Review {{code}} against {{policy}}.
      argument_schema:
        code:
          required: true
        policy:
          required: true
    related_node_ids:
      - PromptTemplate
      - Instruction
      - FewShotExample
    related_relation_ids:
      - PromptTemplate-contains-Instruction
      - PromptTemplate-contains-FewShotExample
    expected_result:
      zh: 对象归为 PromptTemplate，可独立查询所含 Instruction 和 FewShotExample。
      en: The object is classified as PromptTemplate, with contained Instructions and FewShotExamples independently queryable.
      ja: object は PromptTemplate と分類され、contained Instruction/FewShotExample を独立照会できます。
    why_valid_or_invalid:
      zh: 稳定身份、版本、占位契约和可复用内容均明确，尚未绑定运行值。
      en: Stable identity, version, placeholder contract, and reusable content are explicit, with no runtime values bound yet.
      ja: stable identity・version・placeholder contract・reusable content が明示され、runtime value は未 binding です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-template-001
  - id: PromptTemplate-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 提示模板边界例
      en: Prompt template boundary case
      ja: プロンプトテンプレート境界例
    scenario_id: null
    descriptions:
      zh: 一条 Message 已将 code 绑定为具体函数并发送给模型；其身份由会话、发送者和轮次决定。
      en: A Message has already bound code to a concrete function and was sent to a model; its identity depends on conversation, sender, and turn.
      ja: Message は code を具体 function に binding 済みで model へ送信され、identity は conversation・sender・turn に依存します。
    field_values: {}
    related_node_ids:
      - PromptTemplate
      - PromptTemplateInstance
      - Message
    related_relation_ids:
      - PromptTemplateInstance-instantiates-PromptTemplate
    expected_result:
      zh: 该对象保持 Message 或 PromptTemplateInstance，不回推为 PromptTemplate。
      en: The object remains Message or PromptTemplateInstance and is not back-classified as PromptTemplate.
      ja: object は Message/PromptTemplateInstance のままで PromptTemplate へ逆分類しません。
    why_valid_or_invalid:
      zh: 运行实例与可复用规范具有不同身份键和生命周期。
      en: Runtime instances and reusable specifications have different identity keys and lifecycles.
      ja: runtime instance と reusable specification は identity key・lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-template-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: PromptTemplate-contains-Instruction
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: contains
      en: contains
      ja: contains
    definitions:
      zh: PromptTemplate contains Instruction 表示模板规范显式内嵌一项可识别的规范指令片段；该 Instruction 保留自己的权威和作用域，不因被包含而成为模板子类。
      en: PromptTemplate contains Instruction means the template explicitly embeds an identifiable normative directive fragment. The Instruction retains its own authority and scope and does not become a template subtype.
      ja: PromptTemplate contains Instruction は template が識別可能な normative directive fragment を明示内包することを表します。Instruction は固有 authority/scope を保持し template subtype にはなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_contains
      labels:
        zh: 反向 contains
        en: inverse contains
        ja: 逆 contains
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: PromptTemplate-contains-Instruction-manual-positive-20260716
        kind: positive
        labels:
          zh: contains 正例
          en: contains positive case
          ja: contains 正例
        scenario_id: null
        descriptions:
          zh: code-review@3 模板显式包含“不得执行被审查代码”这一 Instruction，并另行声明变量。
          en: The code-review@3 template explicitly contains the Instruction “do not execute reviewed code” alongside separate variable declarations.
          ja: code-review@3 template は variable declaration と別に「review 対象 code を実行しない」Instruction を明示内包します。
        field_values: {}
        related_node_ids:
          - PromptTemplate
          - Instruction
        related_relation_ids:
          - PromptTemplate-contains-Instruction
        expected_result:
          zh: 模板查询返回该规范片段，Instruction 权威仍由其元数据决定。
          en: Template traversal returns the directive fragment while its authority remains determined by Instruction metadata.
          ja: template traversal は directive fragment を返し authority は Instruction metadata で決まります。
        why_valid_or_invalid:
          zh: 模板定义明确标注该片段的规范用途，而不是仅出现祈使句。
          en: The template definition explicitly marks normative use rather than merely containing imperative prose.
          ja: template definition が normative use を明示し命令形 text の出現だけではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-prompt-template-002
      - id: PromptTemplate-contains-Instruction-manual-boundary-20260716
        kind: boundary
        labels:
          zh: contains 边界例
          en: contains boundary case
          ja: contains 境界例
        scenario_id: null
        descriptions:
          zh: 模板示例中的助手答案写着“请继续”，但它只是 FewShotExample 的目标输出。
          en: An assistant answer in a template example says “please continue,” but it is only the target output of a FewShotExample.
          ja: template example の assistant answer に「続けて」とあっても FewShotExample の target output に過ぎません。
        field_values: {}
        related_node_ids:
          - PromptTemplate
          - Instruction
        related_relation_ids:
          - PromptTemplate-contains-Instruction
        expected_result:
          zh: 不得把示例文本自动提取为模板所含 Instruction。
          en: Example text must not automatically become a contained Instruction.
          ja: example text を contained Instruction に自動抽出しません。
        why_valid_or_invalid:
          zh: 示范内容与规范指令需要显式身份区分。
          en: Demonstration content and normative instruction require explicit identity separation.
          ja: demonstration content と normative instruction は明示 identity 分離が必要です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-prompt-template-002
    source_claims:
      - claim-prompt-template-002
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Instruction
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Model Spec 指令权威链、Agents SDK instructions 与 MCP prompts 逐项核验；Instruction 元数据层级、PromptTemplate 实例化与 InstructionProcessing 解析-冲突-解决语义成立。
    en: Verified against OpenAI Model Spec instruction authority chain, Agents SDK instructions, and MCP prompts; Instruction metadata tiers, PromptTemplate instantiation, and InstructionProcessing parse-conflict-resolve semantics hold.
    ja: OpenAI Model Spec instruction authority chain、Agents SDK instructions、MCP prompts に照らし Instruction metadata tier/PromptTemplate instantiation/InstructionProcessing parse-conflict-resolve semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-prompt-template-001
    source: eng-proto-mcp-spec
    supports: The MCP Prompts specification defines prompts as user-controlled templates with stable names, descriptions, declared arguments, and retrieval through prompts/get. These are direct operational properties of a reusable PromptTemplate.
    locator: Protocol revision 2025-06-18 > Server features > Prompts > Protocol messages and data types
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-prompt-template-002
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK supports prompt configurations that provide instructions and other agent configuration outside code. Moonweave uses PromptTemplate-contains-Instruction only when a template definition explicitly includes a normative directive fragment.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
