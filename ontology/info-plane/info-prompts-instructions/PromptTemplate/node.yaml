schema: moonweave.ai/ontology-node/v1
id: PromptTemplate
kind: concept
labels:
  zh: 提示模板
  en: Prompt template
  ja: プロンプトテンプレート
semantics:
  short_definition:
    zh: 声明固定内容、变量槽位与可复用示例的参数化提示规范。
    en: Parameterized prompt specification declaring fixed content, variable slots, and reusable examples.
    ja: fixed content/variable slot/reusable example を宣言する parameterized prompt 仕様。
  definition:
    zh: PromptTemplate 是可版本化规范，对应 OpenAI system/developer 消息模板、Anthropic 顶层 system 字符串声明、MCP prompts/get 可发现模板，以及产品内 SKILL.md 骨架；经变量绑定形成 PromptTemplateInstance，本身不是一次 Message、模型调用或已解析 Instruction 集合。
    en: PromptTemplate is a versionable specification mapping to OpenAI system/developer message templates, Anthropic top-level system declarations, MCP prompts/get discoverable templates, and in-product SKILL.md skeletons. Binding creates PromptTemplateInstance; it is not a Message, model call, or resolved Instruction set.
    ja: PromptTemplate は OpenAI system/developer、Anthropic system、MCP prompts/get、SKILL.md skeleton に写像する versionable 仕様。
  why_needed:
    zh: 模板身份使提示结构可复用、版本化与审计，而不把每次变量绑定或发送消息混为同一对象。
    en: Template identity enables reuse, versioning, and audit without conflating each binding or transmitted message with the template.
    ja: template identity により reuse/versioning/audit を可能にし binding/transmitted message を template と混同しません。
  includes:
    - zh: 模板标识、版本、固定片段、变量声明、内嵌 Instruction 与 FewShotExample 顺序。
      en: Template ID, version, fixed fragments, variable declarations, embedded Instructions, and FewShotExample order.
      ja: template ID/version/variable declaration/embedded Instruction/FewShotExample order。
  excludes:
    - zh: 一次具体变量绑定、渲染后的 Message、模型运行结果与普通文档复用。
      en: One concrete variable binding, rendered Message, model-run result, and ordinary document reuse.
      ja: 具体 binding/rendered Message/model-run result/通常 document 再利用。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: MCP prompts/list 发现 name+arguments schema；prompts/get 绑定 arguments 返回 messages[]。OpenAI developer 消息与 Anthropic system 参数是运行时实例化面，Moonweave 把 template_id/template_version 与 binding 分开建模。
    en: MCP prompts/list discovers name and argument schema; prompts/get binds arguments returning messages[]. OpenAI developer messages and Anthropic system parameters are runtime instantiation surfaces; Moonweave models template_id/template_version separately from binding.
    ja: MCP prompts/list/get、OpenAI developer、Anthropic system を template/binding 分離モデル化。
  typical_input:
    - description: MCP prompts/get
      format: '{"method":"prompts/get","params":{"name":"code-review","arguments":{"language":"typescript"}}}'
      source_claims:
        - claim-prompt-template-mcp
  typical_output:
    - description: PromptTemplate projection
      format: '{"prompt_template_id":"code-review","template_version":"3","argument_schema":{"language":{"required":true}}}'
      source_claims:
        - claim-prompt-template-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - template_id
    - template_version
  fields:
    - id: template_id
      labels:
        zh: 模板标识
        en: Template ID
        ja: template ID
      definitions:
        zh: 稳定标识可发现和实例化的提示模板。
        en: Stably identifies a discoverable, instantiable prompt template.
        ja: 発見・instance 化できる prompt template を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code-review
      allowed_values: []
      source_claims:
        - claim-prompt-template-001
    - id: template_version
      labels:
        zh: 模板版本
        en: Template version
        ja: template version
      definitions:
        zh: 区分同一模板标识下的内容与变量契约版本。
        en: Distinguishes content and variable-contract versions under one template ID.
        ja: 同一 template ID 下の content/variable contract version を区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "3"
      allowed_values: []
      source_claims:
        - claim-prompt-template-001
    - id: template_body
      labels:
        zh: 模板正文
        en: Template body
        ja: template 本文
      definitions:
        zh: 记录固定文本和变量占位，不包含本次绑定值。
        en: Records fixed text and variable placeholders without current binding values.
        ja: current binding value を含めず fixed text と variable placeholder を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Review {{code}} against {{policy}}.
      allowed_values: []
      source_claims:
        - claim-prompt-template-001
    - id: argument_schema
      labels:
        zh: 参数契约
        en: Argument schema
        ja: 引数契約
      definitions:
        zh: 声明可绑定参数、必填性与允许值约束，而不保存某次绑定。
        en: Declares bindable arguments, requiredness, and value constraints without storing one instantiation's values.
        ja: bindable argument・requiredness・value constraint を宣言し一回の binding value は保存しません。
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value:
        code:
          required: true
        policy:
          required: true
      allowed_values: []
      source_claims:
        - claim-prompt-template-001
  constraints: []
  required_relations: []
examples:
  - id: PromptTemplate-example-mcp-code-review
    labels:
      zh: MCP code-review 模板
      en: MCP code-review template
      ja: MCP code-review テンプレート
    descriptions:
      zh: prompts/list 返回 name=code-review@3，arguments 声明 language 与 diff 必填；尚未 prompts/get 绑定。
      en: prompts/list returns name=code-review@3 with required language and diff arguments; not yet bound via prompts/get.
      ja: code-review@3 が language/diff 必須 argument を宣言。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: prompts/list
    field_values:
      prompt_template_id: code-review
      template_version: "3"
    related_node_ids:
      - PromptTemplate
      - FewShotExample
    related_relation_ids: []
    source_claims:
      - claim-prompt-template-mcp
  - id: PromptTemplate-example-anthropic-system-template
    labels:
      zh: Anthropic system 模板
      en: Anthropic system template
      ja: Anthropic system テンプレート
    descriptions:
      zh: 产品把 "Answer in bullet points." 存为可版本 system 模板 sys-bullets-v2，运行时填入 Messages API system 参数。
      en: Product stores "Answer in bullet points." as versioned system template sys-bullets-v2 injected via Messages API system parameter at runtime.
      ja: sys-bullets-v2 を Messages API system 参数へ注入。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: system parameter
    field_values:
      prompt_template_id: sys-bullets-v2
    related_node_ids:
      - PromptTemplate
      - SystemInstruction
    related_relation_ids: []
    source_claims:
      - claim-prompt-template-anthropic
  - id: PromptTemplate-example-not-message
    labels:
      zh: 非 Message
      en: Not a Message
      ja: Message ではない
    descriptions:
      zh: 已绑定 code 函数并发送给模型的 Message 是 PromptTemplateInstance 或 Message，不得回推为 PromptTemplate。
      en: A Message that bound code and was sent to the model is PromptTemplateInstance or Message, not back-classified as PromptTemplate.
      ja: binding 済み Message は PromptTemplate に逆分類しません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - PromptTemplate
      - PromptTemplateInstance
    related_relation_ids: []
    source_claims:
      - claim-prompt-template-design
parent_relation: null
relations:
  - id: PromptTemplate-contains-Instruction
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: contains
      en: contains
      ja: contains
    definitions:
      zh: PromptTemplate contains Instruction 表示模板规范显式内嵌一项可识别的规范指令片段；该 Instruction 保留自己的权威和作用域，不因被包含而成为模板子类。
      en: PromptTemplate contains Instruction means the template explicitly embeds an identifiable normative directive fragment. The Instruction retains its own authority and scope and does not become a template subtype.
      ja: PromptTemplate contains Instruction は template が識別可能な normative directive fragment を明示内包することを表します。Instruction は固有 authority/scope を保持し template subtype にはなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_contains
      labels:
        zh: 反向 contains
        en: inverse contains
        ja: 逆 contains
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: PromptTemplate-contains-Instruction-manual-positive-20260716
        labels:
          zh: contains 正例
          en: contains positive case
          ja: contains 正例
        descriptions:
          zh: code-review@3 模板显式包含“不得执行被审查代码”这一 Instruction，并另行声明变量。
          en: The code-review@3 template explicitly contains the Instruction “do not execute reviewed code” alongside separate variable declarations.
          ja: code-review@3 template は variable declaration と別に「review 対象 code を実行しない」Instruction を明示内包します。
        field_values: {}
        related_node_ids:
          - PromptTemplate
          - Instruction
        related_relation_ids:
          - PromptTemplate-contains-Instruction
        source_claims:
          - claim-prompt-template-002
      - id: PromptTemplate-contains-Instruction-manual-boundary-20260716
        labels:
          zh: contains 边界例
          en: contains boundary case
          ja: contains 境界例
        descriptions:
          zh: 模板示例中的助手答案写着“请继续”，但它只是 FewShotExample 的目标输出。
          en: An assistant answer in a template example says “please continue,” but it is only the target output of a FewShotExample.
          ja: template example の assistant answer に「続けて」とあっても FewShotExample の target output に過ぎません。
        field_values: {}
        related_node_ids:
          - PromptTemplate
          - Instruction
        related_relation_ids:
          - PromptTemplate-contains-Instruction
        source_claims:
          - claim-prompt-template-002
    source_claims:
      - claim-prompt-template-002
    layout_role: cross-link
    target: concept:Instruction
sources:
  - id: src-mcp-prompts
    title: MCP Server Prompts Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    source_type: official-spec
    relevance: Reusable prompt templates with argument binding.
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Top-level system string separate from turn messages.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-prompt-template-001
    source: eng-proto-mcp-spec
    supports: The MCP Prompts specification defines prompts as user-controlled templates with stable names, descriptions, declared arguments, and retrieval through prompts/get. These are direct operational properties of a reusable PromptTemplate.
    locator: Protocol revision 2025-06-18 > Server features > Prompts > Protocol messages and data types
    evidence_kind: normative
    confidence: high
  - id: claim-prompt-template-002
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK supports prompt configurations that provide instructions and other agent configuration outside code. Moonweave uses PromptTemplate-contains-Instruction only when a template definition explicitly includes a normative directive fragment.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-prompt-template-mcp
    source: src-mcp-prompts
    supports: MCP defines reusable prompt templates with stable names and declared arguments.
    locator: prompts/list and prompts/get
    evidence_kind: primary-spec
    confidence: high
  - id: claim-prompt-template-anthropic
    source: src-anthropic-messages
    supports: Anthropic top-level system can be modeled as a versioned template specification.
    locator: system parameter
    evidence_kind: primary-api
    confidence: high
  - id: claim-prompt-template-design
    source: src-info-prompts-design
    supports: PromptTemplate identity is separate from Message carriage and runtime binding.
    locator: PromptTemplate boundary
    evidence_kind: design-inference
    confidence: high
