schema: moonweave.ai/ontology-node/v1
id: PromptMessage
kind: concept
status: accepted
labels:
  zh: MCP 提示消息本地投影
  en: MCP Prompt Message Projection
  ja: MCP プロンプトメッセージのローカル投影
semantics:
  short_definition:
    zh: 对 prompts/get 结果中一个原生 PromptMessage 负载及其本地请求和提示关联的投影记录。
    en: Projection record for one native PromptMessage payload in a prompts/get result together with local request and prompt associations.
    ja: prompts/get 結果内の 1 つのネイティブ PromptMessage ペイロードとローカル要求およびプロンプト関連付けの投影記録。
  definition:
    zh: PromptMessage 是 Moonweave 对 MCP Prompts 2025-11-25 中 GetPromptResult.messages 一项的本地投影，而不是与原生 PromptMessage 完全等同的替代名称。原生消息负载具有 role 与 content；本节点保留可映射的 role 和内容投影，并额外使用 message_projection_id、get_request_ref 和 source_prompt_ref 连接本地消息记录、请求捕获和提示投影。这三个关联字段不是原生 PromptMessage 字段；content_type 与 content 也是对原生 content 的本地规范化拆分。角色绝不能被重写为 system 或 developer 来提升权限。
    en: PromptMessage is Moonweave's local projection of one item in GetPromptResult.messages in MCP Prompts 2025-11-25, not an alternate name fully equivalent to native PromptMessage. A native message payload has role and content; this node retains mappable role and content projections and additionally uses message_projection_id, get_request_ref, and source_prompt_ref to connect a local message record, request capture, and prompt projection. Those three association fields are not native PromptMessage fields; content_type and content are also a local normalized split of native content. The role must never be rewritten as system or developer to elevate authority.
    ja: PromptMessage は MCP Prompts 2025-11-25 の GetPromptResult.messages 内の 1 項目に対する Moonweave のローカル投影であり、ネイティブ PromptMessage と完全に等価な別名ではない。ネイティブメッセージペイロードは role と content を持つ。このノードはマップ可能な role と内容投影を保持し、さらに message_projection_id、get_request_ref、source_prompt_ref でローカルメッセージ記録、要求捕捉、プロンプト投影を接続する。これら 3 つの関連フィールドはネイティブ PromptMessage フィールドではない。content_type と content もネイティブ content のローカル正規化分割である。権限を昇格するために role を system または developer へ書き換えてはならない。
  why_needed:
    zh: 将返回消息与定义分离可保存每次参数化获取的实际内容、角色和媒体类型，使客户端能安全呈现或转交内容，同时保留它不具备本地指令权威的事实。
    en: Separating returned messages from definitions preserves actual content, role, and media type for each parameterized retrieval so a client can present or hand off content safely while retaining the fact that it has no local-instruction authority.
    ja: 返却メッセージを定義から分離することで、パラメータ化された各取得の実際の内容、ロール、メディア型を保持し、クライアントがローカル指示権限を持たない事実を維持しながら安全に内容を提示または受け渡しできる。
  includes:
    - zh: prompts/get 返回的 user 文本消息和 assistant 示例消息。
      en: A user text message and an assistant example message returned by prompts/get.
      ja: prompts/get が返す user テキストメッセージと assistant 例メッセージ。
    - zh: 返回消息中的 text、image、audio 或 embedded resource 内容及可选注释。
      en: Text, image, audio, or embedded-resource content and optional annotations in a returned message.
      ja: 返却メッセージ内の text、image、audio、embedded resource 内容および任意の annotations。
  excludes:
    - zh: system 或 developer 角色的 Responses 输入消息。
      en: A Responses input message with a system or developer role.
      ja: system または developer ロールを持つ Responses 入力メッセージ。
    - zh: 尚未调用 prompts/get 前的提示定义或客户端准备的参数值。
      en: A prompt definition before prompts/get is called or argument values prepared by a client.
      ja: prompts/get の呼び出し前のプロンプト定義またはクライアントが準備した引数値。
  semantic_kind: entity
  aliases: [MCP returned prompt message, get prompt message, 提示返回消息]
engineering:
  explanation:
    zh: 客户端向 prompts/get 发送名称和 arguments 后，服务器返回原生 messages 数组。客户端将每一项投影为 PromptMessage，生成本地 message_projection_id，并以 get_request_ref 和 source_prompt_ref 关联请求捕获与 McpPrompt 投影。role 从原生负载映射，content_type 与 content 从原生 content 规范化拆分。若客户端随后将内容输入模型，必须通过显式本地适配策略决定位置，不能仅因文本看似规则就改变 MCP role 或赋予系统权限。
    en: After a client sends name and arguments to prompts/get, the server returns a native messages array. The client projects each item into PromptMessage, creates a local message_projection_id, and associates request capture and McpPrompt projection through get_request_ref and source_prompt_ref. role maps from native payload while content_type and content are normalized from native content. If the client later inputs content to a model, an explicit local adaptation policy must decide placement; MCP role cannot change or gain system authority merely because text looks like a rule.
    ja: クライアントが prompts/get へ name と arguments を送信した後、サーバーはネイティブ messages 配列を返す。クライアントは各項目を PromptMessage へ投影し、ローカル message_projection_id を作成し、get_request_ref と source_prompt_ref で要求捕捉と McpPrompt 投影を関連付ける。role はネイティブペイロードからマップし、content_type と content はネイティブ content から正規化する。後でクライアントが内容をモデルへ入力する場合、明示的なローカル適応方針が配置を決めなければならず、テキストがルールのように見えるだけで MCP role を変えたり system 権限を得たりしてはならない。
  typical_input:
    - description:
        zh: prompts/get 响应消息
        en: prompts/get response message
        ja: prompts/get 応答メッセージ
      format: |-
        {"role":"user","content":{"type":"text","text":"Please review this Python code"}}
  typical_output:
    - description:
        zh: 本地消息投影记录
        en: Local message-projection record
        ja: ローカルメッセージ投影記録
      format: |-
        {"message_projection_id":"pmsg-31","get_request_ref":"request-capture://get-31","source_prompt_ref":"mcp-prompt://code_review","role":"user","content_type":"text","content":"Please review this Python code"}
  reference_implementations:
    - name: Model Context Protocol Prompts 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Specifies messages returned from prompts/get and their allowed roles and content types.
structure:
  identity_keys: [message_projection_id, get_request_ref]
  fields:
    - id: message_projection_id
      labels: {zh: 本地消息投影 ID, en: Local message-projection ID, ja: ローカルメッセージ投影 ID}
      definitions: {zh: 此本地消息投影记录的稳定标识符，不是原生 PromptMessage 字段。, en: Stable identifier for this local message-projection record and not a native PromptMessage field., ja: このローカルメッセージ投影記録の安定した識別子であり、ネイティブ PromptMessage フィールドではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: pmsg-31
      source_claims: []
    - id: get_request_ref
      labels: {zh: 本地获取请求捕获引用, en: Local get-request capture reference, ja: ローカル取得要求捕捉参照}
      definitions: {zh: 将此投影关联到生成原生 messages 数组的本地 prompts/get 请求捕获的引用，不是原生 PromptMessage 字段。, en: Reference associating this projection with the local prompts/get request capture that produced the native messages array and not a native PromptMessage field., ja: この投影をネイティブ messages 配列を生成したローカル prompts/get 要求捕捉へ関連付ける参照であり、ネイティブ PromptMessage フィールドではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: request-capture://get-31
      source_claims: []
    - id: source_prompt_ref
      labels: {zh: 本地来源提示投影引用, en: Local source-prompt projection reference, ja: ローカル起点プロンプト投影参照}
      definitions: {zh: 将此消息投影关联到所选 McpPrompt 本地投影的引用，不是原生 PromptMessage 字段。, en: Reference associating this message projection with the selected McpPrompt local projection and not a native PromptMessage field., ja: このメッセージ投影を選択された McpPrompt ローカル投影へ関連付ける参照であり、ネイティブ PromptMessage フィールドではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: mcp-prompt://code_review
      source_claims: []
    - id: role
      labels: {zh: 消息角色, en: Message role, ja: メッセージロール}
      definitions: {zh: MCP 提示消息中指示发言者的 user 或 assistant 角色。, en: user or assistant role indicating the speaker in an MCP prompt message., ja: MCP プロンプトメッセージ内で発言者を示す user または assistant ロール。}
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [user, assistant]
      example_value: user
      source_claims: [claim-mcp-prompt-message]
    - id: content_type
      labels: {zh: 内容类型, en: Content type, ja: 内容型}
      definitions:
        zh: 从原生 content.type 规范化出的本地内容种类，不是原生 PromptMessage 顶层字段。
        en: Local content kind normalized from native content.type and not a top-level native PromptMessage field.
        ja: ネイティブ content.type から正規化されたローカル内容種別であり、最上位のネイティブ PromptMessage フィールドではない。
      datatype: enum
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [text, image, audio, resource]
      example_value: text
      source_claims: [claim-mcp-prompt-content]
    - id: content
      labels: {zh: 消息内容, en: Message content, ja: メッセージ内容}
      definitions: {zh: 符合 content_type 的服务器返回内容对象或文本值。, en: Server-returned content object or text value that conforms to content_type., ja: content_type に適合するサーバー返却内容オブジェクトまたはテキスト値。}
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      example_value: Please review this Python code
      source_claims: [claim-mcp-prompt-content]
  constraints:
    - id: prompt-message-projection-association
      severity: error
      language: plain
      expression: message_projection_id, get_request_ref, and source_prompt_ref are local association fields, must resolve to one captured prompts/get transaction and selected McpPrompt projection, and must not be serialized as native PromptMessage fields.
      explanation:
        zh: 原生消息负载与本地消息 ID、请求捕获和提示投影关联不同，不能声称完全等同。
        en: Native message payload differs from local message ID, request capture, and prompt-projection association and cannot be claimed fully equivalent.
        ja: ネイティブメッセージペイロードはローカルメッセージ ID、要求捕捉、プロンプト投影関連付けと異なり、完全に等価と主張できない。
      source_claims: []
    - id: prompt-message-role-set
      severity: error
      language: plain
      expression: role must be user or assistant exactly and must not be changed to system or developer when persisting a PromptMessage.
      explanation: {zh: MCP 规范限定提示消息角色，改变角色会混淆协议内容与本地权威层级。, en: The MCP specification limits prompt-message roles and changing a role confuses protocol content with local authority hierarchy., ja: MCP 仕様はプロンプトメッセージロールを限定し、ロール変更はプロトコル内容とローカル権限階層を混同する。}
      source_claims: [claim-mcp-prompt-message]
    - id: prompt-message-content-conformance
      severity: error
      language: plain
      expression: content must match content_type, and the local projection must remain associated through get_request_ref and source_prompt_ref with the prompts/get transaction that returned it.
      explanation: {zh: 媒体类型与获取来源共同使返回消息可验证且不与本地输入混淆。, en: Media type and retrieval provenance together make a returned message verifiable and distinct from local input., ja: メディア型と取得来歴により、返却メッセージは検証可能となりローカル入力と区別される。}
      source_claims: [claim-mcp-prompt-get, claim-mcp-prompt-content]
  required_relations: [PromptMessage-returned-by-McpPrompt]
examples:
  - id: prompt-message-returned-user-text-message
    labels:
      zh: 返回的用户文本消息
      en: Returned user text message
      ja: 返却された user テキストメッセージ

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; PromptMessage maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; PromptMessage maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; PromptMessage context/token boundary."}
    source_claims: [claim-mcp-prompt-get, claim-mcp-prompt-message, claim-mcp-prompt-content]
parent_relation: null
relations:
  - id: PromptMessage-returned-by-McpPrompt
    predicate: returned_by
    target: concept:McpPrompt
    endpoint_order: message-to-prompt
    direction: source-to-target
    relation_kind: production
    labels: {zh: 由 MCP 提示获取返回, en: is returned by MCP prompt retrieval, ja: MCP プロンプト取得により返される}
    definitions: {zh: 此关系将一次 prompts/get 的原生返回消息关联到本地 PromptMessage 和 McpPrompt 投影。, en: This relation associates a native returned message from one prompts/get transaction with local PromptMessage and McpPrompt projections., ja: この関係は 1 回の prompts/get トランザクションのネイティブ返却メッセージをローカル PromptMessage と McpPrompt 投影へ関連付ける。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: yields_prompt_message
      labels: {zh: 产生提示消息, en: yields prompt message, ja: プロンプトメッセージを生成する}
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-mcp-prompt-get]
    distinct_fact_rationale: {zh: 此关系记录本地投影间的事务关联，不把本地请求或提示引用声称为原生消息字段。, en: This relation records transaction association between local projections and does not claim local request or prompt references are native message fields., ja: この関係はローカル投影間のトランザクション関連付けを記録し、ローカル要求またはプロンプト参照をネイティブメッセージフィールドと主張しない。}
    layout_role: cross-link
sources:
  - id: mcp-prompts
    title: Model Context Protocol Prompts 2025-11-25
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    source_type: official-spec
    relevance: Defines messages returned from prompts/get with constrained roles and content types.
source_claims:
  - id: claim-mcp-prompt-get
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 defines prompts/get as returning a result containing a messages array for a named prompt and supplied arguments.
    locator: MCP Prompts 2025-11-25 § Protocol Messages > Getting a Prompt
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-prompt-message
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 defines PromptMessage role as either user or assistant and pairs it with content.
    locator: MCP Prompts 2025-11-25 § Data Types > PromptMessage
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-prompt-content
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 defines text, image, audio, and embedded resource content types for prompt messages.
    locator: MCP Prompts 2025-11-25 § Data Types > Text Content through Embedded Resources
    evidence_kind: official-spec
    confidence: high

