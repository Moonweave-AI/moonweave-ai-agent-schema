schema: moonweave.ai/ontology-node/v1
id: McpPrompt
kind: concept
status: accepted
labels:
  zh: MCP 提示本地投影
  en: MCP Prompt Projection
  ja: MCP プロンプトのローカル投影
semantics:
  short_definition:
    zh: 对 prompts/list 中一个原生 MCP Prompt 负载及其本地服务器关联的投影记录。
    en: Projection record for one native MCP Prompt payload from prompts/list together with its local server association.
    ja: prompts/list 内の 1 つのネイティブ MCP Prompt ペイロードとそのローカルサーバー関連付けの投影記録。
  definition:
    zh: McpPrompt 是 Moonweave 对 MCP Prompts 2025-11-25 中原生 Prompt 负载的本地投影，而不是与原生类型完全等同的替代名称。原生 Prompt 包含 name 以及可选 title、description、icons 和 arguments；McpPrompt 保留这些可映射负载信息，并额外使用 server_ref 与 argument_projection_ids 连接本地服务器捕获和已拆分的参数投影。它不是 Moonweave InstructionSet、本地 PromptTemplate、Responses instructions 或 A2A 类型；server_ref、argument_projection_ids 和任何会话版本信息都不是原生 Prompt 字段。
    en: McpPrompt is Moonweave's local projection of the native Prompt payload in MCP Prompts 2025-11-25, not an alternate name fully equivalent to the native type. A native Prompt contains name plus optional title, description, icons, and arguments; McpPrompt preserves mappable payload information and additionally uses server_ref and argument_projection_ids to connect a local server capture and split argument projections. It is not a Moonweave InstructionSet, local PromptTemplate, Responses instructions, or A2A type; server_ref, argument_projection_ids, and any session-version information are not native Prompt fields.
    ja: McpPrompt は MCP Prompts 2025-11-25 のネイティブ Prompt ペイロードに対する Moonweave のローカル投影であり、ネイティブ型と完全に等価な別名ではない。ネイティブ Prompt は name と任意の title、description、icons、arguments を含む。McpPrompt はマップ可能なペイロード情報を保持し、さらに server_ref と argument_projection_ids でローカルサーバー捕捉と分割された引数投影を接続する。Moonweave InstructionSet、ローカル PromptTemplate、Responses instructions、A2A 型ではない。server_ref、argument_projection_ids、およびセッション版情報はいずれもネイティブ Prompt フィールドではない。
  why_needed:
    zh: 独立协议对象使客户端能够以服务器声明的名称发现、展示和调用用户可选提示，同时避免把远程模板混入本地规则权限或代理配置生命周期。
    en: A separate protocol object lets a client discover, display, and invoke user-selectable prompts by the server-declared name while preventing remote templates from being mixed into local rule authority or agent-configuration lifecycle.
    ja: 独立したプロトコルオブジェクトにより、クライアントはサーバー宣言名でユーザー選択可能なプロンプトを発見、表示、呼び出しでき、リモートテンプレートがローカルルール権限またはエージェント設定ライフサイクルへ混在することを防ぐ。
  includes:
    - zh: prompts/list 响应中名为 code_review 的原生 Prompt 负载的本地捕获。
      en: Local capture of a native Prompt payload named code_review in a prompts/list response.
      ja: prompts/list 応答内の code_review という名前のネイティブ Prompt ペイロードのローカル捕捉。
    - zh: 原生显示标题、描述、图标和参数数组的可追溯投影。
      en: Traceable projection of native display title, description, icons, and arguments array.
      ja: ネイティブ表示タイトル、説明、アイコン、arguments 配列の追跡可能な投影。
  excludes:
    - zh: prompts/get 返回的单条 PromptMessage，后者是展开后的消息记录。
      en: A PromptMessage returned by prompts/get, which is an expanded message record.
      ja: prompts/get が返す PromptMessage。これは展開済みメッセージ記録である。
    - zh: Moonweave 本地指令档案或用户向模型提交的普通输入文本。
      en: A Moonweave local instruction profile or ordinary input text submitted by a user to a model.
      ja: Moonweave ローカル指示プロファイルまたはユーザーがモデルへ提出する通常の入力テキスト。
  semantic_kind: entity
  aliases: [MCP Prompt, server prompt definition, MCP 提示]
engineering:
  explanation:
    zh: MCP 服务器在初始化时声明 prompts 能力。客户端读取 prompts/list 的原生 Prompt 负载，并将 name、title、description、icons 和内联 arguments 投影为 McpPrompt 及 PromptArgument 本地记录；server_ref 仅关联本地会话或服务器捕获。用户选择名称后，客户端发送 prompts/get，并按参数声明填充 arguments。协议版本在 initialize 会话协商中处理，不能写进每个 McpPrompt；返回消息也保持为协议投影，不能提升为本地系统指令。
    en: An MCP server declares the prompts capability during initialization. A client reads native Prompt payloads from prompts/list and projects name, title, description, icons, and inline arguments into local McpPrompt and PromptArgument records; server_ref only associates a local session or server capture. After a user selects a name, the client sends prompts/get and fills arguments according to declarations. Protocol version is handled in initialize session negotiation and cannot be written into each McpPrompt; returned messages also remain protocol projections and cannot be elevated into local system instructions.
    ja: MCP サーバーは初期化時に prompts 能力を宣言する。クライアントは prompts/list のネイティブ Prompt ペイロードを読み、name、title、description、icons、インライン arguments をローカル McpPrompt と PromptArgument 記録へ投影する。server_ref はローカルセッションまたはサーバー捕捉を関連付けるだけである。ユーザーが名前を選択した後、クライアントは宣言に従って arguments を満たして prompts/get を送信する。プロトコル版は initialize のセッションネゴシエーションで処理され、各 McpPrompt に書けない。返却メッセージもプロトコル投影に留まり、ローカル system 指示へ昇格できない。
  typical_input:
    - description:
        zh: prompts/list 响应条目
        en: prompts/list response entry
        ja: prompts/list 応答項目
      format: |-
        {"name":"code_review","title":"Request Code Review","description":"Review code","icons":[{"src":"https://modelcontextprotocol.io/favicon.svg","mimeType":"image/svg+xml"}],"arguments":[{"name":"code","required":true}]}
  typical_output:
    - description:
        zh: 本地提示投影记录
        en: Local prompt-projection record
        ja: ローカルプロンプト投影記録
      format: |-
        {"server_ref":"server-capture://mcp-review-server/session-7","name":"code_review","argument_projection_ids":["parg-code"]}
  reference_implementations:
    - name: Model Context Protocol Prompts 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Specifies prompt capability negotiation plus prompts/list and prompts/get protocol messages.
structure:
  identity_keys: [server_ref, name]
  fields:
    - id: server_ref
      labels: {zh: 本地服务器捕获引用, en: Local server-capture reference, ja: ローカルサーバー捕捉参照}
      definitions: {zh: 连接此本地投影与捕获原生 Prompt 负载的本地 MCP 服务器或会话记录的关联引用，不是原生 Prompt 字段。, en: Association reference connecting this local projection to the local MCP server or session record that captured the native Prompt payload and not a native Prompt field., ja: このローカル投影をネイティブ Prompt ペイロードを捕捉したローカル MCP サーバーまたはセッション記録へ接続する関連参照であり、ネイティブ Prompt フィールドではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: server-capture://mcp-review-server/session-7
      source_claims: []
    - id: name
      labels: {zh: 提示名称, en: Prompt name, ja: プロンプト名}
      definitions: {zh: 在服务器提示列表中唯一标识该提示的名称。, en: Name that uniquely identifies this prompt in the server prompt list., ja: サーバープロンプト一覧でこのプロンプトを一意に識別する名前。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: code_review
      source_claims: [claim-mcp-prompt-definition]
    - id: title
      labels: {zh: 显示标题, en: Display title, ja: 表示タイトル}
      definitions: {zh: 供客户端界面显示的可选人类可读标题。, en: Optional human-readable title for client display., ja: クライアント表示用の任意の人間可読タイトル。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: Request Code Review
      source_claims: [claim-mcp-prompt-definition]
    - id: description
      labels: {zh: 提示描述, en: Prompt description, ja: プロンプト説明}
      definitions: {zh: 说明服务器提示预期用途的可选人类可读描述。, en: Optional human-readable description of the server prompt's intended use., ja: サーバープロンプトの意図した用途を示す任意の人間可読説明。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: Review code for defects.
      source_claims: [claim-mcp-prompt-definition]
    - id: icons
      labels: {zh: 图标, en: Icons, ja: アイコン}
      definitions: {zh: 从原生 Prompt 的可选 icons 数组保留的显示图标负载，不推断为本地服务器身份或策略。, en: Display-icon payload retained from the optional native Prompt icons array and not inferred as local server identity or policy., ja: 任意のネイティブ Prompt icons 配列から保持される表示アイコンペイロードであり、ローカルサーバー ID または方針とは推論しない。}
      datatype: json-array
      required: false
      cardinality: {min: 0, max: null}
      example_value: '[{"src":"https://modelcontextprotocol.io/favicon.svg","mimeType":"image/svg+xml"}]'
      source_claims: [claim-mcp-prompt-definition]
    - id: argument_projection_ids
      labels: {zh: 本地参数投影 ID 列表, en: Local argument-projection ID list, ja: ローカル引数投影 ID リスト}
      definitions: {zh: 连接此本地 Prompt 投影与从原生 arguments 数组拆分出的 PromptArgument 本地投影的关联列表，不是原生 Prompt 的 arguments 字段。, en: Association list connecting this local Prompt projection to PromptArgument local projections split from the native arguments array and not the native Prompt arguments field., ja: このローカル Prompt 投影をネイティブ arguments 配列から分割した PromptArgument ローカル投影へ接続する関連リストであり、ネイティブ Prompt の arguments フィールドではない。}
      datatype: array<string>
      required: false
      cardinality: {min: 0, max: null}
      example_value: '["parg-code"]'
      source_claims: []
  constraints:
    - id: mcp-prompt-capability-negotiation
      severity: error
      language: plain
      expression: server_ref must resolve to a local capture of an MCP server session that declared the prompts capability before the client treats this projection as discoverable through prompts/list.
      explanation: {zh: 提示发现依赖 MCP 能力协商，不能由本地名称猜测替代。, en: Prompt discovery depends on MCP capability negotiation and cannot be replaced by guessing a local name., ja: プロンプト発見は MCP 能力ネゴシエーションに依存し、ローカル名の推測で置き換えられない。}
      source_claims: [claim-mcp-prompts-capability]
    - id: mcp-prompt-protocol-identity
      severity: error
      language: plain
      expression: name must be unique within server_ref, and this record must retain its observed mcp_prompts payload origin rather than being classified as a local InstructionSet or A2A type.
      explanation: {zh: 服务器提示需要稳定协议身份，且不能因文本相似而改变对象族。, en: A server prompt needs stable protocol identity and cannot change object family because its text is similar., ja: サーバープロンプトには安定したプロトコル ID が必要であり、テキストが似ているからといってオブジェクトファミリーを変えられない。}
      source_claims: [claim-mcp-prompt-definition]
    - id: mcp-prompt-projection-boundary
      severity: error
      language: plain
      expression: server_ref and argument_projection_ids must be treated as local association fields, must not be serialized as native Prompt fields, and protocolVersion must not appear on McpPrompt because it belongs to initialize session negotiation.
      explanation:
        zh: 原生 Prompt 负载与本地捕获、拆分和会话协商记录具有不同边界，不能声称完全等同。
        en: Native Prompt payload and local capture, splitting, and session-negotiation records have different boundaries and cannot be claimed fully equivalent.
        ja: ネイティブ Prompt ペイロードとローカル捕捉、分割、セッションネゴシエーション記録は異なる境界を持ち、完全に等価と主張できない。
      source_claims: [claim-mcp-prompt-definition, claim-mcp-lifecycle-version]
  required_relations: [McpPrompt-has-PromptArgument, McpPrompt-yields-PromptMessage]
examples:
  - id: mcp-prompt-discoverable-code-review-prompt
    labels:
      zh: 可发现的代码审查提示
      en: Discoverable code-review prompt
      ja: 発見可能なコードレビュープロンプト

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; McpPrompt maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; McpPrompt maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; McpPrompt context/token boundary."}
    source_claims: [claim-mcp-prompt-definition, claim-mcp-prompts-capability]
parent_relation: null
relations:
  - id: McpPrompt-has-PromptArgument
    predicate: has_argument
    target: concept:PromptArgument
    endpoint_order: prompt-to-argument
    direction: source-to-target
    relation_kind: composition
    labels: {zh: 具有提示参数, en: has prompt argument, ja: プロンプト引数を持つ}
    definitions: {zh: 此本地关系将 McpPrompt 投影连接到从原生 Prompt arguments 数组拆分出的 PromptArgument 投影。, en: This local relation connects an McpPrompt projection to PromptArgument projections split from the native Prompt arguments array., ja: このローカル関係は McpPrompt 投影をネイティブ Prompt arguments 配列から分割した PromptArgument 投影へ接続する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_argument_of_mcp_prompt
      labels: {zh: 是 MCP 提示参数, en: is argument of MCP prompt, ja: MCP プロンプトの引数である}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-mcp-prompt-definition]
    distinct_fact_rationale: {zh: 此关系是本地拆分关联，不把参数投影 ID 声称为原生 Prompt 字段或参数值。, en: This relation is a local split association and does not claim projection IDs are native Prompt fields or argument values., ja: この関係はローカル分割関連付けであり、投影 ID がネイティブ Prompt フィールドまたは引数値であると主張しない。}
    layout_role: cross-link
  - id: McpPrompt-yields-PromptMessage
    predicate: yields
    target: concept:PromptMessage
    endpoint_order: prompt-to-returned-message
    direction: source-to-target
    relation_kind: production
    labels: {zh: 获取后产生提示消息, en: yields prompt message on retrieval, ja: 取得時にプロンプトメッセージを生成する}
    definitions: {zh: 对已选择的原生 Prompt 调用 prompts/get 可返回消息；此关系将该事务结果关联到本地 McpPrompt 与 PromptMessage 投影。, en: prompts/get for a selected native Prompt can return messages; this relation associates that transaction result with local McpPrompt and PromptMessage projections., ja: 選択したネイティブ Prompt に対する prompts/get はメッセージを返し得る。この関係はそのトランザクション結果をローカル McpPrompt と PromptMessage 投影へ関連付ける。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_returned_for_mcp_prompt
      labels: {zh: 是 MCP 提示获取结果, en: is returned for MCP prompt, ja: MCP プロンプトの取得結果である}
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-mcp-prompt-discovery-and-get]
    distinct_fact_rationale:
      zh: 此关系记录本地投影间的获取关联，不把原生定义、消息内容和本地关联字段合并为同一类型。
      en: This relation records retrieval association between local projections and does not merge native definition, message content, and local association fields into one type.
      ja: この関係はローカル投影間の取得関連付けを記録し、ネイティブ定義、メッセージ内容、ローカル関連付けフィールドを 1 型へ統合しない。
    layout_role: cross-link
sources:
  - id: mcp-prompts
    title: Model Context Protocol Prompts 2025-11-25
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    source_type: official-spec
    relevance: Defines prompt capability negotiation plus prompt discovery and retrieval protocol records.
  - id: mcp-lifecycle
    title: Model Context Protocol Lifecycle 2025-11-25
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    version: 2025-11-25
    source_type: official-spec
    relevance: Defines initialize-time protocol-version and capability negotiation for an MCP session.
source_claims:
  - id: claim-mcp-prompts-capability
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 requires a server that supports prompts to declare the prompts capability during initialization.
    locator: MCP Prompts 2025-11-25 § Capabilities
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-prompt-definition
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 defines a Prompt with a unique name and optional title, description, icons, and arguments.
    locator: MCP Prompts 2025-11-25 § Data Types > Prompt
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-prompt-discovery-and-get
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 defines prompts/list for discovery and prompts/get for retrieving a named prompt with optional arguments and returned messages.
    locator: MCP Prompts 2025-11-25 § Protocol Messages > Listing Prompts and Getting a Prompt
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-lifecycle-version
    source: mcp-lifecycle
    supports: MCP 2025-11-25 negotiates protocolVersion in the initialize request and response for a client-server session, not in each Prompt payload.
    locator: MCP Lifecycle 2025-11-25 § Initialization and Version Negotiation
    evidence_kind: official-spec
    confidence: high

