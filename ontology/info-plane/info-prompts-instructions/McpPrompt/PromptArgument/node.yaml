schema: moonweave.ai/ontology-node/v1
id: PromptArgument
kind: concept
status: accepted
labels:
  zh: MCP 提示参数本地投影
  en: MCP Prompt Argument Projection
  ja: MCP プロンプト引数のローカル投影
semantics:
  short_definition:
    zh: 对原生 Prompt arguments 数组中一项及其本地父投影关联的投影记录。
    en: Projection record for one item in a native Prompt arguments array together with its local parent-projection association.
    ja: ネイティブ Prompt arguments 配列内の 1 項目とそのローカル親投影関連付けの投影記録。
  definition:
    zh: PromptArgument 是 Moonweave 对 MCP Prompts 2025-11-25 原生 Prompt arguments 数组中一项的本地投影，而不是原生参数对象的完全等同名称。原生项包含 name、可选 description 和 required；本节点保留这些可映射字段，并额外以 server_ref 和 prompt_projection_ref 将其关联到本地服务器捕获和 McpPrompt 投影。两个关联字段不是原生 arguments 项字段，实际参数值仍属于 prompts/get 请求负载。
    en: PromptArgument is Moonweave's local projection of one item in the native Prompt arguments array in MCP Prompts 2025-11-25, not a name fully equivalent to the native argument object. A native item contains name, optional description, and required; this node preserves those mappable fields and additionally uses server_ref and prompt_projection_ref to associate it with a local server capture and McpPrompt projection. The two association fields are not native arguments-item fields, and actual argument values remain in a prompts/get request payload.
    ja: PromptArgument は MCP Prompts 2025-11-25 のネイティブ Prompt arguments 配列内の 1 項目に対する Moonweave のローカル投影であり、ネイティブ引数オブジェクトと完全に等価な名称ではない。ネイティブ項目は name、任意の description、required を含む。このノードはそれらのマップ可能なフィールドを保持し、さらに server_ref と prompt_projection_ref でローカルサーバー捕捉と McpPrompt 投影へ関連付ける。2 つの関連フィールドはネイティブ arguments 項目フィールドではなく、実際の引数値は prompts/get 要求ペイロードに留まる。
  why_needed:
    zh: 独立参数声明让客户端能够在展示提示前验证必填项和解释输入用途，而不必从提示文本猜测占位符或把用户值存入定义对象。
    en: A separate argument declaration lets a client validate required input and explain its purpose before presenting a prompt without guessing placeholders from text or storing user values in the definition object.
    ja: 独立した引数宣言により、クライアントはテキストからプレースホルダーを推測したり定義オブジェクトへユーザー値を保存したりせずに、プロンプト表示前に必須入力を検証し目的を説明できる。
  includes:
    - zh: code_review 提示中名称为 code 且 required 为 true 的参数声明。
      en: An argument declaration named code with required true for a code_review prompt.
      ja: code_review プロンプトの code という名前で required true の引数宣言。
    - zh: 用于客户端表单或补全界面展示的可选参数说明。
      en: An optional argument description displayed by a client form or completion interface.
      ja: クライアントフォームまたは補完インターフェースが表示する任意の引数説明。
  excludes:
    - zh: 用户在一次 prompts/get 调用中提交的 code 文本值。
      en: The code text value a user supplies in one prompts/get call.
      ja: ユーザーが 1 回の prompts/get 呼び出しで渡す code テキスト値。
    - zh: MCP Prompt 定义本身或 prompts/get 返回的 PromptMessage。
      en: The MCP Prompt definition itself or a PromptMessage returned by prompts/get.
      ja: MCP Prompt 定義そのものまたは prompts/get が返す PromptMessage。
  semantic_kind: entity
  aliases: [MCP argument declaration, prompt parameter declaration, 提示参数]
engineering:
  explanation:
    zh: 客户端读取 prompts/list 中原生 Prompt 的内联 arguments 数组，并为每个条目创建 PromptArgument 本地投影，同时记录 server_ref 和 prompt_projection_ref。用户选择提示后，客户端以原生 name 为键构造 prompts/get.params.arguments；服务器应在处理前验证缺失的 required 项。关联引用仅支持本地追溯，既不写回原生参数项，也不存储实际请求值。
    en: A client reads the inline arguments array of a native Prompt in prompts/list and creates a local PromptArgument projection for each item while recording server_ref and prompt_projection_ref. After a user selects the prompt, the client constructs prompts/get.params.arguments keyed by native name; the server should validate missing required items before processing. Association references support local traceability only, are not written back to native argument items, and do not store actual request values.
    ja: クライアントは prompts/list 内のネイティブ Prompt のインライン arguments 配列を読み、server_ref と prompt_projection_ref を記録しながら各項目のローカル PromptArgument 投影を作成する。ユーザーがプロンプトを選択した後、クライアントはネイティブ name をキーとして prompts/get.params.arguments を構成し、サーバーは処理前に不足した required 項目を検証すべきである。関連参照はローカル追跡可能性だけを支え、ネイティブ引数項目へ書き戻されず、実際の要求値も保存しない。
  typical_input:
    - description:
        zh: prompts/list 参数条目
        en: prompts/list argument entry
        ja: prompts/list 引数項目
      format: |-
        {"name":"code","description":"The code to review","required":true}
  typical_output:
    - description:
        zh: 本地参数投影记录
        en: Local argument-projection record
        ja: ローカル引数投影記録
      format: |-
        {"server_ref":"server-capture://mcp-review-server/session-7","prompt_projection_ref":"mcp-prompt://code_review","name":"code","required":true}
  reference_implementations:
    - name: Model Context Protocol Prompts 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Specifies prompt argument declarations in prompts/list and argument values in prompts/get.
structure:
  identity_keys: [server_ref, prompt_projection_ref, name]
  fields:
    - id: server_ref
      labels: {zh: 本地服务器捕获引用, en: Local server-capture reference, ja: ローカルサーバー捕捉参照}
      definitions: {zh: 将本地参数投影关联到捕获其原生 Prompt 负载的本地服务器或会话记录的引用，不是原生参数项字段。, en: Reference associating this local argument projection with the local server or session record that captured its native Prompt payload and not a native argument-item field., ja: このローカル引数投影をネイティブ Prompt ペイロードを捕捉したローカルサーバーまたはセッション記録へ関連付ける参照であり、ネイティブ引数項目フィールドではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: server-capture://mcp-review-server/session-7
      source_claims: []
    - id: prompt_projection_ref
      labels: {zh: 本地提示投影引用, en: Local prompt-projection reference, ja: ローカルプロンプト投影参照}
      definitions: {zh: 将本地参数投影关联到其 McpPrompt 本地投影的引用，不是原生参数项的字段。, en: Reference associating this local argument projection with its McpPrompt local projection and not a field of the native argument item., ja: このローカル引数投影を McpPrompt ローカル投影へ関連付ける参照であり、ネイティブ引数項目のフィールドではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: mcp-prompt://code_review
      source_claims: []
    - id: name
      labels: {zh: 参数名称, en: Argument name, ja: 引数名}
      definitions: {zh: 客户端在 prompts/get.params.arguments 中使用的键名称。, en: Key name a client uses in prompts/get.params.arguments., ja: クライアントが prompts/get.params.arguments で使用するキー名。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      example_value: code
      source_claims: [claim-mcp-prompt-arguments]
    - id: description
      labels: {zh: 参数描述, en: Argument description, ja: 引数説明}
      definitions: {zh: 供客户端向用户说明参数用途的可选人类可读描述。, en: Optional human-readable description that explains argument purpose to a client user., ja: クライアントユーザーへ引数目的を説明する任意の人間可読説明。}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      example_value: The code to review
      source_claims: [claim-mcp-prompt-arguments]
    - id: required
      labels: {zh: 是否必填, en: Required, ja: 必須か}
      definitions: {zh: 表示服务器是否要求客户端在获取提示时提供此参数值。, en: Indicates whether the server requires a client to provide this argument value when retrieving the prompt., ja: プロンプト取得時にクライアントがこの引数値を提供する必要があるかを示す。}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      example_value: true
      source_claims: [claim-mcp-prompt-arguments]
  constraints:
    - id: prompt-argument-unique-name
      severity: error
      language: plain
      expression: name must be unique among PromptArgument projections for the same server_ref and prompt_projection_ref.
      explanation: {zh: 同一提示中的重复键会使 prompts/get 参数映射无法确定地解释。, en: Duplicate keys in one prompt make a prompts/get argument map impossible to interpret deterministically., ja: 1 つのプロンプト内の重複キーは prompts/get 引数マップを決定的に解釈できなくする。}
      source_claims: [claim-mcp-prompt-arguments]
    - id: prompt-argument-projection-boundary
      severity: error
      language: plain
      expression: server_ref and prompt_projection_ref are local association fields, must not be serialized as native Prompt arguments-item fields, and actual argument values must not appear in this declaration projection.
      explanation:
        zh: 本地关联、原生参数声明和单次请求值具有不同边界，不能混为一个协议对象。
        en: Local association, native argument declaration, and one request value have different boundaries and cannot be merged into one protocol object.
        ja: ローカル関連付け、ネイティブ引数宣言、1 回の要求値は異なる境界を持ち、1 つのプロトコルオブジェクトへ統合できない。
      source_claims: []
    - id: prompt-argument-required-validation
      severity: error
      language: plain
      expression: A prompts/get transaction must include a value for every PromptArgument whose required flag is true before the server processes the prompt.
      explanation: {zh: 必填声明是请求验证契约，不是允许在定义记录中填入值的槽位。, en: A required declaration is a request-validation contract and is not a slot for placing a value in the definition record., ja: required 宣言は要求検証契約であり、定義記録に値を置くスロットではない。}
      source_claims: [claim-mcp-prompt-arguments, claim-mcp-prompt-validation]
  required_relations: [PromptArgument-part-of-McpPrompt]
examples:
  - id: prompt-argument-code-argument-declaration
    labels:
      zh: 代码参数声明
      en: Code argument declaration
      ja: code 引数宣言

    descriptions: {zh: "DSPy Signatures 'context, question -> answer'; RAGAnswer(dspy.Signature) InputField/OutputField; PromptArgument maps PromptTemplate/SystemInstruction/PromptVariable field contracts.", en: "DSPy Signatures 'context, question -> answer'; RAGAnswer(dspy.Signature) InputField/OutputField; PromptArgument maps PromptTemplate/SystemInstruction/PromptVariable field contracts.", ja: "DSPy Signature InputField/OutputField; PromptArgument PromptTemplate."}
    source_claims: [claim-mcp-prompt-arguments]
parent_relation:
  id: PromptArgument-part-of-McpPrompt
  predicate: part_of
  target: concept:McpPrompt
  endpoint_order: argument-to-prompt
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是 MCP 提示的一部分, en: is part of MCP prompt, ja: MCP プロンプトの一部である}
  definitions:
    zh: 此关系将本地 PromptArgument 投影关联到其 McpPrompt 投影，并反映原生 Prompt 的内联 arguments 结构。
    en: This relation associates a local PromptArgument projection with its McpPrompt projection and reflects the native Prompt inline arguments structure.
    ja: この関係はローカル PromptArgument 投影をその McpPrompt 投影へ関連付け、ネイティブ Prompt のインライン arguments 構造を反映する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_prompt_argument
    labels: {zh: 具有提示参数, en: has prompt argument, ja: プロンプト引数を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-mcp-prompt-arguments]
  distinct_fact_rationale:
    zh: 此关系是本地投影关联，不把父提示引用或调用值声称为原生参数项字段。
    en: This relation is a local projection association and does not claim parent-prompt reference or call value as native argument-item fields.
    ja: この関係はローカル投影関連付けであり、親プロンプト参照または呼び出し値をネイティブ引数項目フィールドと主張しない。
  layout_role: primary-backbone
relations: []
sources:
  - id: mcp-prompts
    title: Model Context Protocol Prompts 2025-11-25
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    source_type: official-spec
    relevance: Defines prompt argument declarations and the prompts/get request argument map.
source_claims:
  - id: claim-mcp-prompt-arguments
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 shows Prompt arguments with name, description, and required fields and shows same-name values in prompts/get arguments.
    locator: MCP Prompts 2025-11-25 § Protocol Messages > Listing Prompts and Getting a Prompt
    evidence_kind: official-spec
    confidence: high
  - id: claim-mcp-prompt-validation
    source: mcp-prompts
    supports: MCP Prompts 2025-11-25 states that servers should validate prompt arguments before processing and identifies missing required arguments as invalid parameters.
    locator: MCP Prompts 2025-11-25 § Error Handling and Implementation Considerations
    evidence_kind: official-spec
    confidence: high

