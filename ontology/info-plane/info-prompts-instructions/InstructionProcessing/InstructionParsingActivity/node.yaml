source_claims:
  - id: claim-instruction-parsing-activity-001
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK accepts instructions separately from prompt configuration and supports dynamic prompt generation. Moonweave treats the observable conversion from a bound prompt or carrier into normalized Instructions as a parsing activity.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-parsing-activity-002
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK accepts static or dynamic agent instructions and can render prompt templates into concrete model input. Moonweave models the subsequent extraction and normalization of instruction-bearing fragments as InstructionParsingActivity; the SDK does not define conflict resolution here.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-parsing-activity-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec applies authority, applicability, scope, and same-level conflict rules to decide which instructions govern behavior. Moonweave represents that decision occurrence as InstructionResolutionActivity, distinct from earlier parsing that only identifies candidates.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-parsing-activity-004
    source: eng-fw-openai-python-docs
    supports: The Agents SDK separates prompt configuration and instruction content. Moonweave classifies the observable conversion of bound prompt content into Instructions as a specialized InstructionProcessing activity.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-parsing-activity-005
    source: eng-fw-openai-python-docs
    supports: The Agents SDK can generate prompt configuration at runtime and then use it as model-facing instructions and configuration. Moonweave records the bound prompt instance read by parsing through InstructionParsingActivity-consumes-PromptTemplateInstance.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-parsing-activity-006
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec first determines applicable candidate instructions and then identifies and reconciles conflicts. Moonweave records the observable run order without using phase order as hierarchy.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-parsing-activity-007
    source: eng-fw-openai-python-docs
    supports: The Agents SDK distinguishes configured instructions, prompt templates, and runtime inputs. Reifying the first normalization as InstructionParsingActivity and using it as a display parent are Moonweave design inferences.
    locator: Agents > Basic configuration > instructions; Prompt templates; Dynamic instructions
    evidence_kind: design-inference
    confidence: high
