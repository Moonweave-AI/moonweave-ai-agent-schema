      en: InstructionParsingActivity precedes InstructionConflictDetectionActivity means candidate instructions are identified and normalized before conflict detection in the same processing run; the order is not taxonomy.
      ja: InstructionParsingActivity precedes InstructionConflictDetectionActivity は同一 processing run で candidate instruction の識別・正規化後に conflict detection を行い、この順序は taxonomy ではないことを表します。
    cardinality: null
