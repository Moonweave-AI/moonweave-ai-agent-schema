          ja: resolution activity は既存 Instruction を読み effective と記録しますが text を再 parse しません。
        field_values: {}
        related_node_ids:
          - InstructionParsingActivity
          - Instruction
        related_relation_ids:
          - InstructionParsingActivity-produces-Instruction
        source_claims:
