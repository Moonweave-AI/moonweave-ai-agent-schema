          en: Assert only when the parsing activity creates the first normalized identity of the Instruction from a named carrier and records provenance plus parsed metadata; loading or referencing an already identified Instruction is insufficient.
          ja: parsing activity が named carrier から Instruction の最初の normalized identity を作り、provenance と parsed metadata を記録した場合だけ成立します。既存 Instruction の load/reference は production ではありません。
