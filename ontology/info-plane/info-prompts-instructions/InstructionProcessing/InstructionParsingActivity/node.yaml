      labels:
        zh: 反向 produces
        en: inverse produces
        ja: 逆 produces
    conditions:
      - id: InstructionParsingActivity-produces-Instruction-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the parsing activity creates the first normalized identity of the Instruction from a named carrier and records provenance plus parsed metadata; loading or referencing an already identified Instruction is insufficient.
        source_claims:
