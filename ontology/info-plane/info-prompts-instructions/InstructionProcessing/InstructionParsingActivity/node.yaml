  - id: InstructionParsingActivity-produces-Instruction
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces
      en: produces
      ja: produces
    definitions:
      zh: InstructionParsingActivity produces Instruction 表示结构化指令的首次身份由该解析执行形成，并保留其来源与元数据；仅引用既有指令不构成产生。
      en: InstructionParsingActivity produces Instruction means the parsing execution creates the structured directive's first identity with provenance and metadata; merely referencing an existing Instruction is not production.
      ja: InstructionParsingActivity produces Instruction は parsing execution が provenance/metadata と共に structured directive の初回 identity を生成することを表し既存 Instruction の参照は production ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
