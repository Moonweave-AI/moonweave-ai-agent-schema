          zh: parse-551 从模板实例识别规范片段并首次创建 inst-review-no-execute 及其来源记录。
          en: parse-551 identifies a normative fragment from the template instance and first creates inst-review-no-execute with provenance.
          ja: parse-551 は template instance から normative fragment を識別し inst-review-no-execute と provenance を初回作成します。
        field_values: {}
        related_node_ids:
          - InstructionParsingActivity
          - Instruction
        related_relation_ids:
          - InstructionParsingActivity-produces-Instruction
        source_claims:
          - claim-instruction-parsing-activity-008
      - id: InstructionParsingActivity-produces-Instruction-manual-boundary-20260716
