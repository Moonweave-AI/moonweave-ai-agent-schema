    relation_kind: information
    labels:
      zh: consumes
      en: consumes
      ja: consumes
    definitions:
      zh: InstructionParsingActivity consumes PromptTemplateInstance 表示一次解析执行读取了该已绑定实例作为不可变输入；消费不改变实例所属模板或把实例变成活动组成部分。
      en: InstructionParsingActivity consumes PromptTemplateInstance means a parsing execution reads that bound instance as immutable input; consumption changes neither its template membership nor its type into an activity part.
      ja: InstructionParsingActivity consumes PromptTemplateInstance は parsing execution が bound instance を immutable input として読むことを表し template membership/type は変更しません。
    cardinality: null
    cardinality_not_applicable_reason:
