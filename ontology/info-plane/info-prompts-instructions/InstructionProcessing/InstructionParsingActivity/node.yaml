      descriptions:
        zh: PromptTemplateInstance 是解析输入的信息对象，没有执行标识和解析动作。
        en: PromptTemplateInstance is an information input to parsing and has no execution identity or parsing action.
        ja: PromptTemplateInstance は parsing input の information object で execution identity/parsing action を持ちません。
