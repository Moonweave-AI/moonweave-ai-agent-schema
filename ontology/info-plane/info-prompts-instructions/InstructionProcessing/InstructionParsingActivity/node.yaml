      descriptions:
        zh: parse-551 从 pti-77 形成结构化 Instruction，具有父类处理活动身份和解析种差。
        en: parse-551 forms structured Instructions from pti-77, carrying both processing-activity identity and parsing differentia.
        ja: parse-551 は pti-77 から structured Instruction を形成し processing activity identity と parsing 種差を持ちます。
      field_values: {}
      related_node_ids:
        - InstructionParsingActivity
        - InstructionProcessing
