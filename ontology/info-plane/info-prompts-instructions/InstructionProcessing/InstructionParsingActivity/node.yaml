    differentia:
      zh: 共享父节点对照：父节点 InstructionProcessing：InstructionParsingActivity（semantic kind=activity，骨架 InstructionParsingActivity-is_a-InstructionProcessing）；InstructionResolutionActivity（semantic kind=activity，骨架 InstructionResolutionActivity-is_a-InstructionProcessing）。双端条件：InstructionParsingActivity 条件：“从已承载内容中识别并规范化候选指令的活动”；InstructionResolutionActivity 条件：“应用权威、适用性、作用域和优先规则解决已检测冲突的活动”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent InstructionProcessing: InstructionParsingActivity (semantic kind=activity, backbone InstructionParsingActivity-is_a-InstructionProcessing); InstructionResolutionActivity (semantic kind=activity, backbone InstructionResolutionActivity-is_a-InstructionProcessing). Endpoint conditions: InstructionParsingActivity condition: “An activity that identifies and normalizes candidate instructions from carried content”; InstructionResolutionActivity condition: “An activity applying authority, applicability, scope, and precedence rules to a detected conflict”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 InstructionProcessing：InstructionParsingActivity（semantic kind=activity、バックボーン InstructionParsingActivity-is_a-InstructionProcessing）；InstructionResolutionActivity（semantic kind=activity、バックボーン InstructionResolutionActivity-is_a-InstructionProcessing）。両端条件：InstructionParsingActivity の条件：「carrier content から candidate instruction を識別・正規化する activity です」；InstructionResolutionActivity の条件：「検出済み conflict に authority・applicability・scope・precedence rule を適用する activity です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
