schema: moonweave.ai/ontology-node/v1
id: InstructionParsingActivity
kind: concept
status: accepted
labels:
  zh: 指令解析活动
  en: Instruction parsing activity
  ja: 指示解析活動
semantics:
  short_definition:
    zh: 从已承载内容中识别并规范化候选指令的活动。
    en: An activity that identifies and normalizes candidate instructions from carried content.
    ja: carrier content から candidate instruction を識別・正規化する activity です。
  definition:
    zh: 指令解析活动是一类 InstructionProcessing，它读取 PromptTemplateInstance 或消息承载内容，识别具有规范身份的片段并产生结构化 Instruction，同时保留来源；它不判定冲突胜者。
    en: InstructionParsingActivity is InstructionProcessing that reads a PromptTemplateInstance or carried message content, identifies normatively qualified fragments, produces structured Instructions, and preserves provenance. It does not choose conflict winners.
    ja: InstructionParsingActivity は PromptTemplateInstance または message carrier content を読み、規範 identity を持つ fragment を識別して structured Instruction を生成し provenance を保持する InstructionProcessing です。conflict winner は決めません。
  why_needed:
    zh: 独立解析活动使“文本如何成为指令”可审计，并阻止模板渲染或消息承载被误当作解析结果。
    en: A separate parsing activity makes how text became an instruction auditable and prevents template rendering or message carriage from masquerading as a resolution result.
    ja: 独立 parsing activity により text が instruction になった過程を監査でき、template rendering/message carriage を resolution result と誤認しません。
  includes:
    - zh: 纳入一次带输入引用、解析规则版本、输出 Instruction 标识和来源保留记录的解析执行。
      en: Includes a parsing execution with input reference, parser version, output Instruction IDs, and provenance retention.
      ja: input reference・parser version・output Instruction ID・provenance retention を持つ parsing execution を含みます。
  excludes:
    - zh: 排除模板实例本身、仅拆分 ContentBlock 的活动以及选择最终有效指令的解决活动。
      en: Excludes the template instance itself, activities that only split ContentBlock, and resolution activities selecting effective instructions.
      ja: template instance 自体、ContentBlock を分割するだけの activity、effective instruction を選ぶ resolution activity を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: parser_version
      labels:
        zh: 解析器版本
        en: Parser version
        ja: parser version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录用于识别规范片段的解析器版本。
        en: Records the parser version used to identify normative fragments.
        ja: 規範 fragment を識別した parser version を記録します。
      allowed_values: []
      pattern: null
      example_value: instruction-parser/3
      source_claims:
        - claim-instruction-parsing-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionParsingActivity-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令解析活动正例
      en: Instruction parsing activity positive case
      ja: 指示解析活動正例
    scenario_id: null
    descriptions:
      zh: parse-551 消费模板实例 pti-77，识别其中的 system 指令片段和 user 占位值，并产出两项来源可追踪的 Instruction。
      en: parse-551 consumes template instance pti-77, identifies a system directive fragment and a user-bound value, and produces two provenance-traceable Instructions.
      ja: parse-551 は template instance pti-77 を consume し、system directive fragment と user-bound value を識別して provenance traceable な二つの Instruction を生成します。
    field_values:
      parser_version: instruction-parser/3
      processing_id: parse-551
      started_at: 2026-07-16T10:01:00Z
    related_node_ids:
      - InstructionParsingActivity
      - PromptTemplateInstance
      - Instruction
    related_relation_ids:
      - InstructionParsingActivity-consumes-PromptTemplateInstance
      - InstructionParsingActivity-produces-Instruction
    expected_result:
      zh: 记录一条 consumes 和相应 produces 事实，但不生成冲突胜出结论。
      en: The run records consumes and produces facts without creating a conflict-winning conclusion.
      ja: run は consumes と produces fact を記録しますが conflict-winning conclusion は生成しません。
    why_valid_or_invalid:
      zh: 输入、执行身份和结构化输出均明确，职责停留在识别与规范化。
      en: Input, execution identity, and structured outputs are explicit, and responsibility stops at identification and normalization.
      ja: input・execution identity・structured output が明示され、責務は識別・正規化に留まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-parsing-activity-001
  - id: InstructionParsingActivity-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令解析活动边界例
      en: Instruction parsing activity boundary case
      ja: 指示解析活動境界例
    scenario_id: null
    descriptions:
      zh: 渲染器只把 {{language}} 替换为 zh 并输出字符串，没有判断任何片段是否具有规范效力。
      en: A renderer only replaces {{language}} with zh and returns text, without deciding whether any fragment has normative force.
      ja: renderer は {{language}} を zh に置換して text を返すだけで、fragment の規範効力を判定しません。
    field_values: {}
    related_node_ids:
      - InstructionParsingActivity
      - PromptTemplateInstance
    related_relation_ids: []
    expected_result:
      zh: 该执行属于模板实例化，不足以认定为 InstructionParsingActivity。
      en: The execution belongs to template instantiation and is insufficient for InstructionParsingActivity.
      ja: execution は template instantiation に属し InstructionParsingActivity とは認定できません。
    why_valid_or_invalid:
      zh: 变量绑定与规范身份识别是两个不同操作。
      en: Variable binding and normative-identity recognition are different operations.
      ja: variable binding と normative-identity recognition は別操作です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-parsing-activity-001
