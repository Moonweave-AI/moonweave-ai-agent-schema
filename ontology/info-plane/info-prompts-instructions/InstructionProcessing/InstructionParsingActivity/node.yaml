    en: InstructionParsingActivity is_a InstructionProcessing whose differentia is identifying and normalizing candidate instructions from a template instance or message carrier.
    ja: InstructionParsingActivity is_a InstructionProcessing は template instance/message carrier から candidate instruction を識別・正規化することを種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
