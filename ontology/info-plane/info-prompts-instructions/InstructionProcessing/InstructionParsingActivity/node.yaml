schema: moonweave.ai/ontology-node/v1
id: InstructionParsingActivity
kind: concept
labels:
  zh: 指令解析活动
  en: Instruction parsing activity
  ja: 指示解析活動
semantics:
  short_definition:
    zh: 把载体文本解析为结构化 Instruction 候选的活动。
    en: Activity parsing carrier text into structured Instruction candidates.
    ja: carrier text を structured Instruction candidate に parse する activity。
  definition:
    zh: InstructionParsingActivity 读取 Message carries_instruction、rules 文件、MCP prompt 返回 messages[]，提取 directive_text 并填充 metadata；不决定最终冲突胜出。
    en: InstructionParsingActivity reads Message carries_instruction, rules files, MCP prompt returned messages[], extracts directive_text and populates metadata; it does not decide final conflict winners.
    ja: parse→Instruction candidates+metadata。
  why_needed:
    zh: 解析活动把“某 Message 含指令文本”与“形成可比较 Instruction 对象”分开记录。
    en: Parsing separates "a Message carries instruction text" from "forming comparable Instruction objects" in the audit trail.
    ja: parse activity 監査分離。
  includes:
    - zh: activity_id、输入载体引用、产出 Instruction 列表与解析时间。
      en: activity_id, input carrier references, output Instruction list, and parse time.
      ja: activity_id/carrier refs/output list/parse time。
  excludes:
    - zh: 冲突检测结果、最终 effective set、injection 分类。
      en: Conflict detection results, final effective set, and injection classification.
      ja: conflict result/effective set/injection。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: OpenAI developer 首条消息→ParsingActivity parse-dev-1→inst-dev-policy-1；Anthropic system 参数→inst-system-v12。
    en: OpenAI developer first message→ParsingActivity parse-dev-1→inst-dev-policy-1; Anthropic system parameter→inst-system-v12.
    ja: developer/system parse。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys: []
  fields:
    - id: parser_version
      labels:
        zh: 解析器版本
        en: Parser version
        ja: parser version
      definitions:
        zh: 记录用于识别规范片段的解析器版本。
        en: Records the parser version used to identify normative fragments.
        ja: 規範 fragment を識別した parser version を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: instruction-parser/3
      allowed_values: []
      source_claims:
        - claim-instruction-parsing-activity-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionParsingActivity-example-developer
    labels:
      zh: developer 解析
      en: Developer parse
      ja: developer parse
    descriptions:
      zh: parse-dev-1 从 role=developer 消息创建 inst-dev-policy-1。
      en: parse-dev-1 creates inst-dev-policy-1 from role=developer message.
      ja: developer parse。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: developer
    field_values:
      activity_id: parse-dev-1
    related_node_ids:
      - InstructionParsingActivity
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-iparse-openai
  - id: InstructionParsingActivity-example-mcp-prompt
    labels:
      zh: MCP prompt 解析
      en: MCP prompt parse
      ja: MCP prompt parse
    descriptions:
      zh: parse-mcp-8 从 prompts/get messages[] 提取 inst-review-12。
      en: parse-mcp-8 extracts inst-review-12 from prompts/get messages[].
      ja: MCP prompt parse。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: prompts/get
    field_values: {}
    related_node_ids:
      - InstructionParsingActivity
    related_relation_ids: []
    source_claims:
      - claim-iparse-mcp
  - id: InstructionParsingActivity-example-no-resolution
    labels:
      zh: 不解析冲突
      en: No conflict resolution
      ja: conflict resolution しない
    descriptions:
      zh: ParsingActivity 不产出 superseded 列表。
      en: ParsingActivity does not produce superseded lists.
      ja: parse≠resolve。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionParsingActivity
    related_relation_ids: []
    source_claims:
      - claim-iparse-design
