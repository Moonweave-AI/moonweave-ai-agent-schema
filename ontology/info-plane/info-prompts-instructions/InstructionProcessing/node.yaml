schema: moonweave.ai/ontology-node/v1
id: InstructionProcessing
kind: concept
status: accepted
labels:
  zh: 指令处理
  en: Instruction processing
  ja: 指示処理
semantics:
  short_definition:
    zh: 把承载内容转换为可解析指令并形成解析结果的活动类。
    en: The activity class that turns carried content into resolvable instructions and resolution records.
    ja: carrier content を解決可能 instruction と resolution record に変える activity class です。
  definition:
    zh: 指令处理是一类活动，涵盖指令解析、冲突检测和冲突解决三种可独立发生并可追踪先后的处理行为；它是活动的种属上位，不是阶段清单、规范文本或处理结果。
    en: InstructionProcessing is an activity genus covering independently identifiable parsing, conflict detection, and resolution activities whose temporal order can be traced. It is not a phase list, normative text, or processing result.
    ja: InstructionProcessing は独立識別できる parsing・conflict detection・resolution activity を包含し、その時系列を追跡できる activity genus です。phase list・規範 text・processing result ではありません。
  why_needed:
    zh: 活动上位类统一处理事件的执行身份，同时允许每种活动拥有不同输入、输出和拒绝边界。
    en: The activity genus unifies execution identity while letting each processing activity retain different inputs, outputs, and refusal boundaries.
    ja: activity genus が実行 identity を統一しつつ、各 processing activity が異なる input・output・拒否境界を保持できます。
  includes:
    - zh: 纳入一次具体的解析活动、冲突检测活动或解决活动及其运行时间和执行主体。
      en: Includes a concrete parsing, conflict-detection, or resolution activity with its run time and executor.
      ja: 具体的 parsing・conflict-detection・resolution activity と run time・executor を含みます。
  excludes:
    - zh: 排除 PromptTemplate、Instruction、InstructionConflict 和 InstructionResolution 这些规范或信息对象。
      en: Excludes specification or information objects such as PromptTemplate, Instruction, InstructionConflict, and InstructionResolution.
      ja: PromptTemplate・Instruction・InstructionConflict・InstructionResolution 等の specification/information object を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - processing_id
  fields:
    - id: processing_id
      labels:
        zh: 处理标识
        en: Processing ID
        ja: 処理 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次可追踪的指令处理活动。
        en: Identifies one traceable instruction-processing activity.
        ja: 一つの追跡可能な instruction-processing activity を識別します。
      allowed_values: []
      pattern: null
      example_value: iproc-20260716-01
      source_claims:
        - claim-instruction-processing-001
    - id: started_at
      labels:
        zh: 开始时间
        en: Started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该处理活动实际开始的时间。
        en: Records when the processing activity actually began.
        ja: processing activity が実際に開始した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:30:00Z
      source_claims:
        - claim-instruction-processing-001
    - id: ended_at
      labels:
        zh: 结束时间
        en: Ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录处理活动完成或中止的时间，用于与后继活动核对顺序。
        en: Records when processing completed or stopped so ordering with later activities can be checked.
        ja: processing 完了または中止時刻を記録し後続 activity との順序確認に使います。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:30:01Z
      source_claims:
        - claim-instruction-processing-001
    - id: performed_by_ref
      labels:
        zh: 执行主体引用
        en: Performed-by reference
        ja: 実行主体参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向实际执行处理活动的智能体、模型或系统服务。
        en: References the agent, model, or system service that performed the activity.
        ja: activity を実行した agent・model・system service を参照します。
      allowed_values: []
      pattern: null
      example_value: actor:instruction-engine
      source_claims:
        - claim-instruction-processing-001
  constraints: []
  required_relation_constraints: []
