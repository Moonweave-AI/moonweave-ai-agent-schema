schema: moonweave.ai/ontology-node/v1
id: InstructionProcessing
kind: concept
labels:
  zh: 指令处理
  en: Instruction processing
  ja: 指示処理
semantics:
  short_definition:
    zh: 解析、检测冲突并解决 Instruction 集合的可审计活动分支根。
    en: Auditable activity branch root for parsing, conflict-detecting, and resolving Instruction sets.
    ja: Instruction 集合の parse/conflict-detect/resolve auditable activity branch root。
  definition:
    zh: InstructionProcessing 拥有 InstructionParsingActivity、InstructionConflictDetectionActivity、InstructionResolutionActivity；在 context assembly 前把 OpenAI/Anthropic/MCP/Cursor 来源文本转为结构化 Instruction 并产出 effective set。
    en: InstructionProcessing owns InstructionParsingActivity, InstructionConflictDetectionActivity, and InstructionResolutionActivity; before context assembly converts OpenAI/Anthropic/MCP/Cursor source text into structured Instructions and an effective set.
    ja: Parsing/ConflictDetection/Resolution activity 分支。
  why_needed:
    zh: 没有处理活动链，系统无法解释哪条 system 文本最终生效以及为何 user override 被 supersede。
    en: Without the processing activity chain, the system cannot explain which system text ultimately prevails and why a user override was superseded.
    ja: processing chain なし→effective set 不可説明。
  includes:
    - zh: 解析、冲突检测、解决三类 activity 及其结果对象。
      en: Parsing, conflict detection, and resolution activities plus their result objects.
      ja: parse/conflict/resolution activity+result。
  excludes:
    - zh: PromptInjectionSignal、TrustedInstructionOverride mitigation、Message 身份。
      en: PromptInjectionSignal, TrustedInstructionOverride mitigations, and Message identity.
      ja: injection mitigation/Message identity。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: InstructionParsingActivity 读取 developer/system/rules→Instruction 图；ConflictDetection 找 scope 重叠；Resolution 按 authority 产出 ires-session-27 effective/superseded 列表。
    en: InstructionParsingActivity reads developer/system/rules→Instruction graph; ConflictDetection finds scope overlap; Resolution by authority produces ires-session-27 effective/superseded lists.
    ja: parse→detect→resolve 流水线。
  typical_input: []
  typical_output:
    - description: Resolution projection
      format: '{"instruction_resolution_id":"ires-session-27","effective_instructions":["inst-system-v12"],"superseded_instructions":["inst-user-override-3"]}'
      source_claims:
        - claim-iproc-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - processing_id
  fields:
    - id: processing_id
      labels:
        zh: 处理标识
        en: Processing ID
        ja: 処理 ID
      definitions:
        zh: 标识一次可追踪的指令处理活动。
        en: Identifies one traceable instruction-processing activity.
        ja: 一つの追跡可能な instruction-processing activity を識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: iproc-20260716-01
      allowed_values: []
      source_claims:
        - claim-instruction-processing-001
    - id: started_at
      labels:
        zh: 开始时间
        en: Started at
        ja: 開始時刻
      definitions:
        zh: 记录该处理活动实际开始的时间。
        en: Records when the processing activity actually began.
        ja: processing activity が実際に開始した時刻を記録します。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T08:30:00Z
      allowed_values: []
      source_claims:
        - claim-instruction-processing-001
    - id: ended_at
      labels:
        zh: 结束时间
        en: Ended at
        ja: 終了時刻
      definitions:
        zh: 记录处理活动完成或中止的时间，用于与后继活动核对顺序。
        en: Records when processing completed or stopped so ordering with later activities can be checked.
        ja: processing 完了または中止時刻を記録し後続 activity との順序確認に使います。
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2026-07-16T08:30:01Z
      allowed_values: []
      source_claims:
        - claim-instruction-processing-001
    - id: performed_by_ref
      labels:
        zh: 执行主体引用
        en: Performed-by reference
        ja: 実行主体参照
      definitions:
        zh: 指向实际执行处理活动的智能体、模型或系统服务。
        en: References the agent, model, or system service that performed the activity.
        ja: activity を実行した agent・model・system service を参照します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: actor:instruction-engine
      allowed_values: []
      source_claims:
        - claim-instruction-processing-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionProcessing-example-full-chain
    labels:
      zh: 完整处理链
      en: Full processing chain
      ja: 完全 processing 链
    descriptions:
      zh: session-27：Parsing→ConflictDetection（platform vs user）→Resolution platform 生效。
      en: "session-27: Parsing→ConflictDetection (platform vs user)→Resolution platform prevails."
      ja: full chain。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: processing chain
    field_values:
      resolution_id: ires-session-27
    related_node_ids:
      - InstructionProcessing
      - InstructionResolutionActivity
    related_relation_ids: []
    source_claims:
      - claim-iproc-design
  - id: InstructionProcessing-example-cursor-rules-parse
    labels:
      zh: Cursor rules 解析
      en: Cursor rules parse
      ja: Cursor rules parse
    descriptions:
      zh: InstructionParsingActivity 解析 .cursor/rules/security.mdc 为 inst-rule-security-mdc。
      en: InstructionParsingActivity parses .cursor/rules/security.mdc into inst-rule-security-mdc.
      ja: rules parse。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/context/rules
      version: rules parsing
    field_values: {}
    related_node_ids:
      - InstructionProcessing
      - InstructionParsingActivity
    related_relation_ids: []
    source_claims:
      - claim-iproc-cursor
  - id: InstructionProcessing-example-not-safety
    labels:
      zh: 非 safety 缓解
      en: Not safety mitigation
      ja: safety mitigation ではない
    descriptions:
      zh: PromptInjectionSignal 处理不归 InstructionProcessing。
      en: PromptInjectionSignal handling does not belong to InstructionProcessing.
      ja: injection→safety module。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionProcessing
    related_relation_ids: []
    source_claims:
      - claim-iproc-design
parent_relation: null
relations: []
sources:
  - id: src-cursor-rules
    title: Cursor Rules Documentation
    publisher: Cursor
    url: https://cursor.com/docs/context/rules
    source_type: official-doc
    relevance: Project rules injected as versioned instructions.
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-processing-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec separates identifying applicable instructions from reconciling conflicts by authority and later same-level order. Moonweave models these observable operations as InstructionProcessing activities rather than taxonomy phases.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-iproc-cursor
    source: src-cursor-rules
    supports: Cursor rules are parsed into Instructions before context assembly.
    locator: rules injection
    evidence_kind: official-doc
    confidence: high
  - id: claim-iproc-design
    source: src-info-prompts-design
    supports: InstructionProcessing produces auditable effective instruction sets.
    locator: InstructionProcessing
    evidence_kind: design-inference
    confidence: high
