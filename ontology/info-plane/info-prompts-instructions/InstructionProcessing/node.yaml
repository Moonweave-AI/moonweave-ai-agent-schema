source_claims:
  - id: claim-instruction-processing-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec separates identifying applicable instructions from reconciling conflicts by authority and later same-level order. Moonweave models these observable operations as InstructionProcessing activities rather than taxonomy phases.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

