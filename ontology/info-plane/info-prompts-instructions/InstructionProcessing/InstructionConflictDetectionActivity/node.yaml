        ja: 比較集合参照
      definitions:
        zh: 指向经过适用性与作用域筛选的候选指令集合。
        en: References the candidate instruction set after applicability and scope filtering.
        ja: applicability・scope filtering 後の candidate instruction set を参照します。
      datatype: string
