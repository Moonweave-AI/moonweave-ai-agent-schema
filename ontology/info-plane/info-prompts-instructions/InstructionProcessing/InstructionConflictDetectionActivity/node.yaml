    target: concept:InstructionConflict
  - id: InstructionConflictDetectionActivity-precedes-InstructionResolutionActivity
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: precedes
      en: precedes
      ja: precedes
    definitions:
      zh: InstructionConflictDetectionActivity precedes InstructionResolutionActivity 表示同一冲突在被确认后才交给解决执行；该边描述实例时间，不把 detection 当作 resolution 的父类。
      en: InstructionConflictDetectionActivity precedes InstructionResolutionActivity means a conflict is handed to resolution only after detection in the same case; it describes instance time and not a parent-child type relation.
      ja: InstructionConflictDetectionActivity precedes InstructionResolutionActivity は同一 conflict が detection 後に resolution へ渡される instance time を表し parent-child type relation ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_precedes
      labels:
        zh: 反向 precedes
        en: inverse precedes
        ja: 逆 precedes
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: InstructionConflictDetectionActivity-precedes-InstructionResolutionActivity-manual-positive-20260716
