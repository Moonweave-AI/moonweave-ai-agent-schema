    zh: InstructionConflictDetectionActivity 是一种 InstructionProcessing，其种差是比较适用且作用域交叠的指令并识别不可兼容义务。
    en: InstructionConflictDetectionActivity is_a InstructionProcessing whose differentia is comparing applicable scope-overlapping instructions to detect incompatible obligations.
    ja: InstructionConflictDetectionActivity is_a InstructionProcessing は applicable かつ scope-overlapping instruction を比較し incompatible obligation を検出することを種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
