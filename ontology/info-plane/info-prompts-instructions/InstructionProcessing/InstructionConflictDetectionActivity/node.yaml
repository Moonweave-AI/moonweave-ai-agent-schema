      en: Instruction conflict-detection activity boundary case
      ja: 指示競合検出活動境界例
    scenario_id: null
    descriptions:
      zh: “保持术语表”约束翻译内容，“输出 JSON”约束序列化格式；两者可同时满足，不构成冲突。
      en: “Preserve the glossary” constrains translation content while “output JSON” constrains serialization; both can be satisfied together.
      ja: 「glossary を保持」は translation content、「JSON 出力」は serialization を拘束し、同時充足できます。
    field_values: {}
    related_node_ids:
      - InstructionConflictDetectionActivity
      - InstructionConflict
    related_relation_ids: []
    expected_result:
      zh: 检测活动不得仅因文本不同而建立 InstructionConflict。
      en: Detection must not create InstructionConflict merely because the texts differ.
      ja: text が異なるだけで InstructionConflict を作成してはなりません。
    why_valid_or_invalid:
      zh: 冲突要求同一适用对象上的不可兼容义务，而不是任意差异。
      en: Conflict requires incompatible obligations over the same applicable object, not arbitrary difference.
      ja: conflict には同一 applicable object 上の incompatible obligation が必要で、任意の差異ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-conflict-detection-activity-001
