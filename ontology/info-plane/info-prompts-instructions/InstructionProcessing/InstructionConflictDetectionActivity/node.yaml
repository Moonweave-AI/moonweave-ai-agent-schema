  - id: InstructionConflictDetectionActivity-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令冲突检测活动正例
      en: Instruction conflict-detection activity positive case
      ja: 指示競合検出活動正例
    scenario_id: null
    descriptions:
      zh: detect-91 比较同一文件上“不得改动”与“立即重写”两项均适用指令，记录它们无法同时满足。
      en: detect-91 compares two applicable instructions over the same file—“do not modify” and “rewrite immediately”—and records that they cannot both be satisfied.
      ja: detect-91 は同一 file 上の applicable instruction「変更禁止」と「直ちに rewrite」を比較し、同時充足不能を記録します。
    field_values:
      comparison_set_ref: iset-applicable-12
      processing_id: detect-91
      started_at: 2026-07-16T10:04:00Z
    related_node_ids:
      - InstructionConflictDetectionActivity
      - InstructionConflict
      - Instruction
    related_relation_ids:
      - InstructionConflictDetectionActivity-detects-InstructionConflict
    expected_result:
      zh: 活动产生 detects 指向 InstructionConflict 的事实，解析结果尚未决定。
      en: The activity records a detects fact to InstructionConflict while the resolution outcome remains undecided.
      ja: activity は InstructionConflict への detects fact を記録し、resolution outcome は未決です。
    why_valid_or_invalid:
      zh: 两项指令已通过适用与作用域筛选，且义务在同一对象上互斥。
      en: Both instructions passed applicability and scope filtering, and their obligations are mutually exclusive on the same object.
      ja: 両 instruction は applicability・scope filtering を通過し、同一 object 上で obligation が排他的です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-conflict-detection-activity-001
  - id: InstructionConflictDetectionActivity-manual-boundary-20260716
