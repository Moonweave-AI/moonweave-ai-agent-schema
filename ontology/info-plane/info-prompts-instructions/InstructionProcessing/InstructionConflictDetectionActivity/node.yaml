          en: precedes positive case
          ja: precedes 正例
        descriptions:
          zh: detect-91 于 08:30:02 记录 conflict-91，resolve-91 于 08:30:03 读取该冲突开始解析。
          en: detect-91 records conflict-91 at 08:30:02 and resolve-91 starts reading that conflict at 08:30:03.
          ja: detect-91 は 08:30:02 に conflict-91 を記録し resolve-91 は 08:30:03 に読み始めます。
        field_values: {}
        related_node_ids:
          - InstructionConflictDetectionActivity
          - InstructionResolutionActivity
        related_relation_ids:
          - InstructionConflictDetectionActivity-precedes-InstructionResolutionActivity
        source_claims:
          - claim-instruction-conflict-detection-activity-004
      - id: InstructionConflictDetectionActivity-precedes-InstructionResolutionActivity-manual-boundary-20260716
        labels:
          zh: precedes 边界例
          en: precedes boundary case
          ja: precedes 境界例
        descriptions:
          zh: 未检测到冲突时处理直接结束，没有 InstructionResolutionActivity。
          en: When no conflict is detected, processing ends without an InstructionResolutionActivity.
          ja: conflict が検出されない場合 processing は InstructionResolutionActivity なしで終了します。
        field_values: {}
        related_node_ids:
          - InstructionConflictDetectionActivity
          - InstructionResolutionActivity
        related_relation_ids:
          - InstructionConflictDetectionActivity-precedes-InstructionResolutionActivity
        source_claims:
          - claim-instruction-conflict-detection-activity-004
    source_claims:
      - claim-instruction-conflict-detection-activity-004
    layout_role: cross-link
    target: concept:InstructionResolutionActivity
