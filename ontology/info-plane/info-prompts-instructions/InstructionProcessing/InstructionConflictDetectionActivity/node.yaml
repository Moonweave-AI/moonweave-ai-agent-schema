relations:
  - id: InstructionConflictDetectionActivity-detects-InstructionConflict
    predicate: detects
    direction: source-to-target
    relation_kind: information
    labels:
      zh: detects
      en: detects
      ja: detects
    definitions:
      zh: InstructionConflictDetectionActivity detects InstructionConflict 表示检测活动在适用且作用域交叠的指令间确认了不可兼容义务；该边不表示已经决定胜者或判定恶意。
      en: InstructionConflictDetectionActivity detects InstructionConflict means detection confirms incompatible obligations among applicable scope-overlapping instructions; it neither selects a winner nor judges maliciousness.
      ja: InstructionConflictDetectionActivity detects InstructionConflict は applicable かつ scope-overlapping instruction 間の incompatible obligation を確認し winner selection/maliciousness judgment は行わないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_detects
      labels:
        zh: 反向 detects
        en: inverse detects
        ja: 逆 detects
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples:
      - id: InstructionConflictDetectionActivity-detects-InstructionConflict-manual-positive-20260716
        labels:
          zh: detects 正例
          en: detects positive case
          ja: detects 正例
        descriptions:
          zh: detect-91 确认同一文件上的“禁止修改”和“立即重写”无法同时满足。
          en: detect-91 confirms that “do not modify” and “rewrite immediately” over the same file cannot both be satisfied.
          ja: detect-91 は同一 file 上の「変更禁止」と「直ちに rewrite」が同時充足不能と確認します。
        field_values: {}
        related_node_ids:
          - InstructionConflictDetectionActivity
          - InstructionConflict
        related_relation_ids:
          - InstructionConflictDetectionActivity-detects-InstructionConflict
        source_claims:
          - claim-instruction-conflict-detection-activity-003
      - id: InstructionConflictDetectionActivity-detects-InstructionConflict-manual-boundary-20260716
        labels:
          zh: detects 边界例
          en: detects boundary case
          ja: detects 境界例
        descriptions:
          zh: 一项约束内容、一项约束 JSON 格式，两者可共同满足。
          en: One directive constrains content and another JSON format; both can hold together.
          ja: 一方は content、他方は JSON format を拘束し同時充足できます。
        field_values: {}
        related_node_ids:
          - InstructionConflictDetectionActivity
          - InstructionConflict
        related_relation_ids:
          - InstructionConflictDetectionActivity-detects-InstructionConflict
        source_claims:
          - claim-instruction-conflict-detection-activity-003
