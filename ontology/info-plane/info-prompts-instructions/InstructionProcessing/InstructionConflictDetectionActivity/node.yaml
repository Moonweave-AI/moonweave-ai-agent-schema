source_claims:
  - id: claim-instruction-conflict-detection-activity-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires identifying conflicts between applicable instructions before applying higher-authority or later-at-the-same-level precedence. Moonweave externalizes that comparison as a distinct detection activity.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-conflict-detection-activity-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires recognizing conflicts among applicable instructions before applying precedence. Moonweave classifies this comparison as specialized InstructionProcessing.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-conflict-detection-activity-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires conflicting instructions to be identified before authority and same-level precedence are applied. Moonweave records that observed conflict through InstructionConflictDetectionActivity-detects-InstructionConflict.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-instruction-conflict-detection-activity-004
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec requires a conflicting set to be identified before precedence can resolve it. Moonweave records that run-specific order as a temporal edge rather than a hierarchy edge.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

