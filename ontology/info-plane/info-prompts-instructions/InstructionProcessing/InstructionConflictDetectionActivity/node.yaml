schema: moonweave.ai/ontology-node/v1
id: InstructionConflictDetectionActivity
kind: concept
status: accepted
labels:
  zh: 指令冲突检测活动
  en: Instruction conflict-detection activity
  ja: 指示競合検出活動
semantics:
  short_definition:
    zh: 比较适用指令并识别无法同时满足约束的活动。
    en: An activity comparing applicable instructions to identify constraints that cannot jointly hold.
    ja: applicable instruction を比較し同時充足できない constraint を識別する activity です。
  definition:
    zh: 指令冲突检测活动是一类 InstructionProcessing，它在适用性和作用域筛选后比较指令义务，识别互斥、禁止/要求矛盾或输出格式不兼容，并产生对 safety-owned InstructionConflict 的检测事实；它不执行威胁分类，也不选择胜者。
    en: InstructionConflictDetectionActivity is InstructionProcessing that compares obligations after applicability and scope filtering, detects mutual exclusion, prohibition/requirement contradictions, or incompatible output constraints, and records detection of a safety-owned InstructionConflict. It neither classifies threats nor selects a winner.
    ja: InstructionConflictDetectionActivity は applicability・scope filtering 後の obligation を比較し、mutual exclusion・prohibition/requirement contradiction・incompatible output constraint を検出して safety-owned InstructionConflict の detection fact を記録する InstructionProcessing です。threat classification も winner selection も行いません。
  why_needed:
    zh: 把检测从解决分开能记录未解决冲突，并清楚区分普通规范矛盾与注入攻击判断。
    en: Separating detection from resolution preserves unresolved conflicts and distinguishes ordinary normative contradiction from injection-attack judgment.
    ja: detection と resolution を分けることで unresolved conflict を記録し、通常の規範 contradiction と injection attack judgment を区別できます。
  includes:
    - zh: 纳入一次针对已适用、作用域交叠的指令集合执行的矛盾检查及检测依据。
      en: Includes a contradiction check over applicable, scope-overlapping instructions with its detection basis.
      ja: applicable かつ scope-overlapping な instruction set に対する contradiction check と detection basis を含みます。
  excludes:
    - zh: 排除威胁信号分类、恶意意图判断、缓解措施以及最终有效指令选择。
      en: Excludes threat-signal classification, malicious-intent judgment, mitigation, and final effective-instruction selection.
      ja: threat-signal classification・malicious-intent judgment・mitigation・final effective-instruction selection を除外します。
  semantic_kind: activity
  aliases: []
