schema: moonweave.ai/ontology-node/v1
id: InstructionConflictDetectionActivity
kind: concept
labels:
  zh: 指令冲突检测活动
  en: Instruction conflict-detection activity
  ja: 指示競合検出活動
semantics:
  short_definition:
    zh: 检测 applicable Instruction 之间 scope 重叠与语义冲突的活动。
    en: Activity detecting scope overlap and semantic conflict among applicable Instructions.
    ja: applicable Instruction 間の scope overlap/semantic conflict を detect する activity。
  definition:
    zh: InstructionConflictDetectionActivity 在同等 authority 比较前先过滤 applicability，再找 scope 交叠且 directive 矛盾的 Instruction 对；对应 Model Spec chain-of-command 前置步骤。
    en: InstructionConflictDetectionActivity filters applicability before equal-authority comparison, then finds Instruction pairs with overlapping scope and contradictory directives—Model Spec chain-of-command pre-step.
    ja: applicability filter→scope overlap→conflict pairs。
  why_needed:
    zh: 显式冲突检测使 Resolution 有输入事实，而不是在模型隐式行为中猜测。
    en: Explicit conflict detection gives Resolution input facts instead of guessing from implicit model behavior.
    ja: explicit conflict facts→resolution。
  includes:
    - zh: conflict_detection_id、冲突 Instruction 对、冲突类型与检测时间。
      en: conflict_detection_id, conflicting Instruction pairs, conflict type, and detection time.
      ja: detection_id/conflict pairs/type/time。
  excludes:
    - zh: 最终胜出决策、injection 威胁分类。
      en: Final winning decisions and injection threat classification.
      ja: winning decision/injection threat。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: inst-system-v12 "Never reveal tool names" vs inst-user-override-3 "Always show tool names" scope=session 重叠→conflict pair。
    en: inst-system-v12 "Never reveal tool names" vs inst-user-override-3 "Always show tool names" scope=session overlap→conflict pair.
    ja: session scope conflict pair。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
