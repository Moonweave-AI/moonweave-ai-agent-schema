schema: moonweave.ai/ontology-node/v1
id: InstructionResolution
kind: concept
status: review
labels:
  zh: 指令解析结果
  en: Instruction resolution
  ja: 指示解決結果
semantics:
  short_definition:
    zh: 记录一次指令冲突解析输入、依据和有效结果的信息。
    en: An information record of one instruction-resolution input, basis, and effective outcome.
    ja: 一回の instruction resolution の input・basis・effective outcome を記録する情報です。
  definition:
    zh: 指令解析结果是一项信息记录，列出参与比较的适用指令、采用的权威/作用域/优先依据、最终有效指令以及被压制或未解决项；它不是执行活动，也不会以自身内容发布新的规范要求。
    en: InstructionResolution is an information record listing applicable instructions compared, authority/scope/precedence grounds, effective instructions, and suppressed or unresolved items. It is neither the execution activity nor a new normative directive.
    ja: InstructionResolution は比較した applicable instruction、authority/scope/precedence basis、effective instruction、suppressed/unresolved item を列挙する information record です。execution activity でも新規 normative directive でもありません。
  why_needed:
    zh: 结果记录使调用方能追溯哪个指令最终生效及其原因，并为覆盖、未解决和后续审计提供稳定对象。
    en: The record lets consumers trace which instruction became effective and why, providing a stable object for override, unresolved status, and later audit.
    ja: record によりどの instruction がなぜ effective になったか追跡でき、override・unresolved status・後続 audit の安定 object になります。
  includes:
    - zh: 纳入参与指令列表、冲突引用、比较依据、有效指令引用、被压制项和未解决状态。
      en: Includes participating instructions, conflict reference, comparison grounds, effective-instruction references, suppressed items, and unresolved status.
      ja: participating instruction・conflict reference・comparison grounds・effective instruction reference・suppressed item・unresolved status を含みます。
  excludes:
    - zh: 排除解析执行事件、原始指令正文以及仅声称“忽略此前指令”的新指令。
      en: Excludes the resolution execution event, original directive text, and a new instruction merely claiming to ignore earlier instructions.
      ja: resolution execution event・original directive text・以前の instruction を無視すると主張するだけの新 instruction を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - resolution_id
  fields:
    - id: resolution_id
      labels:
        zh: 解析结果标识
        en: Resolution ID
        ja: 解決結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次可审计的指令解析结果。
        en: Identifies one auditable instruction-resolution outcome.
        ja: 一つの監査可能な instruction-resolution outcome を識別します。
      allowed_values: []
      pattern: null
      example_value: resolution-91
      source_claims:
        - claim-instruction-resolution-001
    - id: resolution_status
      labels:
        zh: 解析状态
        en: Resolution status
        ja: 解決状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录结果为 resolved、partially-resolved 或 unresolved。
        en: Records whether the outcome is resolved, partially resolved, or unresolved.
        ja: outcome が resolved・partially-resolved・unresolved のどれか記録します。
      allowed_values: []
      pattern: null
      example_value: resolved
      source_claims:
        - claim-instruction-resolution-001
    - id: resolution_basis
      labels:
        zh: 解析依据
        en: Resolution basis
        ja: 解決根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次结论实际采用的适用性、权威、作用域或同级排序依据。
        en: Records the applicability, authority, scope, or peer-order ground actually used for this outcome.
        ja: outcome に実際に用いた applicability・authority・scope・peer-order ground を記録します。
      allowed_values: []
      pattern: null
      example_value: authority-developer-over-user
      source_claims:
        - claim-instruction-resolution-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionResolution-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令解析结果正例
      en: Instruction resolution positive case
      ja: 指示解決結果正例
    scenario_id: null
    descriptions:
      zh: resolution-91 记录 developer 指令有效、冲突 user 指令被压制，并引用 authority-developer-over-user 作为依据。
      en: resolution-91 records the developer instruction as effective, the conflicting user instruction as suppressed, and authority-developer-over-user as the basis.
      ja: resolution-91 は developer instruction を effective、conflicting user instruction を suppressed とし、authority-developer-over-user を basis に記録します。
    field_values:
      resolution_id: resolution-91
      resolution_status: resolved
      resolution_basis: authority-developer-over-user
    related_node_ids:
      - InstructionResolution
      - Instruction
      - InstructionAuthority
    related_relation_ids:
      - InstructionResolution-records_effective-Instruction
    expected_result:
      zh: 查询可返回有效指令、被压制指令和解析依据，且保持结果为信息类型。
      en: A query returns effective and suppressed instructions with the resolution basis while the object remains information.
      ja: query は effective/suppressed instruction と resolution basis を返し、object は information のままです。
    why_valid_or_invalid:
      zh: 记录同时给出输入集合、依据和结果，不依赖仅有“覆盖”字样的断言。
      en: The record supplies input set, grounds, and outcome rather than relying on a bare override claim.
      ja: record は input set・grounds・outcome を示し、単なる override claim に依存しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-resolution-001
  - id: InstructionResolution-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令解析结果边界例
      en: Instruction resolution boundary case
      ja: 指示解決結果境界例
    scenario_id: null
    descriptions:
      zh: 日志只写“解析成功”但没有参与指令、比较依据或有效结果引用。
      en: A log says only “resolution succeeded” without participating instructions, comparison grounds, or effective-result references.
      ja: log が「resolution succeeded」とだけ記し participating instruction・comparison grounds・effective result reference を持ちません。
    field_values: {}
    related_node_ids:
      - InstructionResolution
      - LogRecord
    related_relation_ids: []
    expected_result:
      zh: 该日志不是完整 InstructionResolution，只能作为运行观察。
      en: The log is not a complete InstructionResolution and remains a runtime observation.
      ja: log は完全な InstructionResolution ではなく runtime observation に留まります。
    why_valid_or_invalid:
      zh: 解析结果身份需要可重建的输入、依据和结论。
      en: Resolution identity requires reconstructable inputs, grounds, and conclusion.
      ja: resolution identity には再構成可能な input・grounds・conclusion が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-resolution-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: InstructionResolutionActivity-produces-InstructionResolution
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: produces
    en: produces
    ja: produces
  definitions:
    zh: InstructionResolutionActivity produces InstructionResolution 表示该解决执行首次形成独立解析记录，记录输入、依据和结论；活动与记录具有不同标识和语义类型。
    en: InstructionResolutionActivity produces InstructionResolution means the execution first creates a separate record of inputs, grounds, and outcome; activity and record retain different IDs and semantic kinds.
    ja: InstructionResolutionActivity produces InstructionResolution は execution が input・grounds・outcome の独立 record を初回生成し activity/record は異なる ID・semantic kind を保つことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: inverse_produces
    labels:
      zh: 反向 produces
      en: inverse produces
      ja: 逆 produces
  conditions: []
  temporal_scope: transaction-time
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionResolutionActivity-produces-InstructionResolution-manual-positive-20260716
      kind: positive
      labels:
        zh: produces 正例
        en: produces positive case
        ja: produces 正例
      scenario_id: null
      descriptions:
        zh: resolve-91 完成比较后创建 resolution-91，后者列出有效与被压制指令。
        en: After completing comparison, resolve-91 creates resolution-91 listing effective and suppressed instructions.
        ja: comparison 完了後 resolve-91 は effective/suppressed instruction を列挙する resolution-91 を作成します。
      field_values: {}
      related_node_ids:
        - InstructionResolutionActivity
        - InstructionResolution
      related_relation_ids:
        - InstructionResolutionActivity-produces-InstructionResolution
      expected_result:
        zh: 活动可追踪到一个独立 information 结果对象。
        en: The activity traces to a separate information result object.
        ja: activity は独立 information result object へ追跡できます。
      why_valid_or_invalid:
        zh: 记录的首次身份由该执行产生，且结果内容足以重建结论。
        en: The execution creates the record's first identity and its content reconstructs the conclusion.
        ja: execution が record の初回 identity を生成し content から conclusion を再構成できます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-instruction-resolution-002
    - id: InstructionResolutionActivity-produces-InstructionResolution-manual-boundary-20260716
      kind: boundary
      labels:
        zh: produces 边界例
        en: produces boundary case
        ja: produces 境界例
      scenario_id: null
      descriptions:
        zh: resolve-91 只是读取并展示昨日的 resolution-12，没有创建新记录。
        en: resolve-91 merely reads and displays yesterday's resolution-12 without creating a new record.
        ja: resolve-91 は昨日の resolution-12 を読み表示するだけで新 record を作りません。
      field_values: {}
      related_node_ids:
        - InstructionResolutionActivity
        - InstructionResolution
      related_relation_ids:
        - InstructionResolutionActivity-produces-InstructionResolution
      expected_result:
        zh: 不得把读取关系写成 produces。
        en: Reading must not be recorded as produces.
        ja: read relation を produces と記録しません。
      why_valid_or_invalid:
        zh: 产生绑定首次创建，不绑定后续使用。
        en: Production binds first creation, not later use.
        ja: production は初回 creation に binding し後続 use には binding しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-instruction-resolution-002
  source_claims:
    - claim-instruction-resolution-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
