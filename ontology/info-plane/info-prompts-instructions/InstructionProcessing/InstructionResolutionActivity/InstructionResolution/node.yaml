schema: moonweave.ai/ontology-node/v1
id: InstructionResolution
kind: concept
labels:
  zh: 指令解析结果
  en: Instruction resolution
  ja: 指示解決結果
semantics:
  short_definition:
    zh: 一次冲突解决运行的结果记录。
    en: Result record of one conflict resolution run.
    ja: 一回の conflict resolution run の result record。
  definition:
    zh: InstructionResolution 绑定 instruction_resolution_id、effective_instructions[]、superseded_instructions[] 与 resolution_reason；是 ResolutionActivity 的产物快照。
    en: InstructionResolution binds instruction_resolution_id, effective_instructions[], superseded_instructions[], and resolution_reason—a snapshot product of ResolutionActivity.
    ja: effective/superseded snapshot。
  why_needed:
    zh: 结果对象使下游 context assembly 可引用固定 effective set 而不重跑解析。
    en: The result object lets downstream context assembly reference a fixed effective set without re-running parsing.
    ja: fixed effective set reference。
  includes:
    - zh: resolution_id、effective 列表、superseded 列表、reason 代码。
      en: resolution_id, effective list, superseded list, reason codes.
      ja: resolution_id/effective/superseded/reason。
  excludes:
    - zh: Activity 运行时日志、Instruction 正文副本。
      en: Activity runtime logs and Instruction body copies.
      ja: runtime logs/body copies。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: ires-session-27 JSON 投影供 ctxasm-27 消费；superseded 每条含 instruction_id 与 reason。
    en: ires-session-27 JSON projection consumed by ctxasm-27; each superseded entry has instruction_id and reason.
    ja: resolution JSON projection。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - resolution_id
  fields:
    - id: resolution_id
      labels:
        zh: 解析结果标识
        en: Resolution ID
        ja: 解決結果 ID
      definitions:
        zh: 标识一次可审计的指令解析结果。
        en: Identifies one auditable instruction-resolution outcome.
        ja: 一つの監査可能な instruction-resolution outcome を識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: resolution-91
      allowed_values: []
      source_claims:
        - claim-instruction-resolution-001
    - id: resolution_status
      labels:
        zh: 解析状态
        en: Resolution status
        ja: 解決状態
      definitions:
        zh: 记录结果为 resolved、partially-resolved 或 unresolved。
        en: Records whether the outcome is resolved, partially resolved, or unresolved.
        ja: outcome が resolved・partially-resolved・unresolved のどれか記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: resolved
      allowed_values: []
      source_claims:
        - claim-instruction-resolution-001
    - id: resolution_basis
      labels:
        zh: 解析依据
        en: Resolution basis
        ja: 解決根拠
      definitions:
        zh: 记录本次结论实际采用的适用性、权威、作用域或同级排序依据。
        en: Records the applicability, authority, scope, or peer-order ground actually used for this outcome.
        ja: outcome に実際に用いた applicability・authority・scope・peer-order ground を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: authority-developer-over-user
      allowed_values: []
      source_claims:
        - claim-instruction-resolution-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionResolution-example-effective-set
    labels:
      zh: 生效集合
      en: Effective set
      ja: effective set
    descriptions:
      zh: ires-session-27 effective=[inst-system-v12] superseded=[inst-user-override-3]。
      en: ires-session-27 effective=[inst-system-v12] superseded=[inst-user-override-3].
      ja: effective/superseded lists。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: resolution result
    field_values: {}
    related_node_ids:
      - InstructionResolution
    related_relation_ids: []
    source_claims:
      - claim-iresult-design
  - id: InstructionResolution-example-no-superseded
    labels:
      zh: 无 superseded
      en: No superseded
      ja: superseded なし
    descriptions:
      zh: 无冲突时 superseded 为空但 resolution 仍记录 effective。
      en: No conflicts yields empty superseded but resolution still records effective.
      ja: empty superseded OK。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: no conflict
    field_values: {}
    related_node_ids:
      - InstructionResolution
    related_relation_ids: []
    source_claims:
      - claim-iresult-design
  - id: InstructionResolution-example-not-activity
    labels:
      zh: 非 Activity
      en: Not activity
      ja: activity ではない
    descriptions:
      zh: InstructionResolution 是结果不是 InstructionResolutionActivity。
      en: InstructionResolution is a result not InstructionResolutionActivity.
      ja: result≠activity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionResolution
      - InstructionResolutionActivity
    related_relation_ids: []
    source_claims:
      - claim-iresult-design
parent_relation:
  id: InstructionResolutionActivity-produces-InstructionResolution
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: produces
    en: produces
    ja: produces
  definitions:
    zh: InstructionResolutionActivity produces InstructionResolution 表示该解决执行首次形成独立解析记录，记录输入、依据和结论；活动与记录具有不同标识和语义类型。
    en: InstructionResolutionActivity produces InstructionResolution means the execution first creates a separate record of inputs, grounds, and outcome; activity and record retain different IDs and semantic kinds.
    ja: InstructionResolutionActivity produces InstructionResolution は execution が input・grounds・outcome の独立 record を初回生成し activity/record は異なる ID・semantic kind を保つことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 produces
      en: inverse produces
      ja: 逆 produces
  conditions: []
  temporal_scope: transaction-time
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionResolutionActivity-produces-InstructionResolution-manual-positive-20260716
      labels:
        zh: produces 正例
        en: produces positive case
        ja: produces 正例
      descriptions:
        zh: resolve-91 完成比较后创建 resolution-91，后者列出有效与被压制指令。
        en: After completing comparison, resolve-91 creates resolution-91 listing effective and suppressed instructions.
        ja: comparison 完了後 resolve-91 は effective/suppressed instruction を列挙する resolution-91 を作成します。
      field_values: {}
      related_node_ids:
        - InstructionResolutionActivity
        - InstructionResolution
      related_relation_ids:
        - InstructionResolutionActivity-produces-InstructionResolution
      source_claims:
        - claim-instruction-resolution-002
    - id: InstructionResolutionActivity-produces-InstructionResolution-manual-boundary-20260716
      labels:
        zh: produces 边界例
        en: produces boundary case
        ja: produces 境界例
      descriptions:
        zh: resolve-91 只是读取并展示昨日的 resolution-12，没有创建新记录。
        en: resolve-91 merely reads and displays yesterday's resolution-12 without creating a new record.
        ja: resolve-91 は昨日の resolution-12 を読み表示するだけで新 record を作りません。
      field_values: {}
      related_node_ids:
        - InstructionResolutionActivity
        - InstructionResolution
      related_relation_ids:
        - InstructionResolutionActivity-produces-InstructionResolution
      source_claims:
        - claim-instruction-resolution-002
  source_claims:
    - claim-instruction-resolution-002
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: InstructionResolution-records_effective-Instruction
    predicate: records_effective
    direction: source-to-target
    relation_kind: information
    labels:
      zh: records effective
      en: records effective
      ja: records effective
    definitions:
      zh: InstructionResolution records_effective Instruction 表示解析记录明确指出哪项已参与比较的指令在给定作用域和时间内生效；它不创建或改写该 Instruction。
      en: InstructionResolution records_effective Instruction means the resolution record identifies a compared directive as effective within a stated scope and time; it neither creates nor rewrites that Instruction.
      ja: InstructionResolution records_effective Instruction は compared directive が指定 scope/time で effective と記録し、その Instruction を作成・改変しないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_records_effective
      labels:
        zh: 反向 records_effective
        en: inverse records_effective
        ja: 逆 records_effective
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: InstructionResolution-records_effective-Instruction-manual-positive-20260716
        labels:
          zh: records_effective 正例
          en: records_effective positive case
          ja: records_effective 正例
        descriptions:
          zh: resolution-91 records_effective inst-developer-9，并同时保存冲突 user 指令为 suppressed。
          en: resolution-91 records_effective inst-developer-9 and separately retains the conflicting user instruction as suppressed.
          ja: resolution-91 は records_effective inst-developer-9 を持ち conflicting user instruction を suppressed と別保存します。
        field_values: {}
        related_node_ids:
          - InstructionResolution
          - Instruction
        related_relation_ids:
          - InstructionResolution-records_effective-Instruction
        source_claims:
          - claim-instruction-resolution-003
      - id: InstructionResolution-records_effective-Instruction-manual-boundary-20260716
        labels:
          zh: records_effective 边界例
          en: records_effective boundary case
          ja: records_effective 境界例
        descriptions:
          zh: 解析记录只列出所有候选指令，没有 effective、suppressed 或 unresolved 状态。
          en: A record lists all candidate instructions but no effective, suppressed, or unresolved status.
          ja: record は candidate instruction を列挙するだけで effective/suppressed/unresolved status を持ちません。
        field_values: {}
        related_node_ids:
          - InstructionResolution
          - Instruction
        related_relation_ids:
          - InstructionResolution-records_effective-Instruction
        source_claims:
          - claim-instruction-resolution-003
    source_claims:
      - claim-instruction-resolution-003
    layout_role: cross-link
    target: concept:Instruction
sources:
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-resolution-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec provides deterministic grounds for deciding which applicable instruction governs after authority and same-level ordering are considered. Moonweave records the evaluated set and outcome as InstructionResolution for auditability.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-resolution-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec provides the grounds for a resolution outcome. Moonweave separates applying those grounds from the audit record and links them with InstructionResolutionActivity-produces-InstructionResolution.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-resolution-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec determines which applicable instruction governs after conflict resolution. Moonweave records that outcome through InstructionResolution-records_effective-Instruction.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-iresult-design
    source: src-info-prompts-design
    supports: InstructionResolution snapshots effective and superseded instruction sets.
    locator: InstructionResolution
    evidence_kind: design-inference
    confidence: high
