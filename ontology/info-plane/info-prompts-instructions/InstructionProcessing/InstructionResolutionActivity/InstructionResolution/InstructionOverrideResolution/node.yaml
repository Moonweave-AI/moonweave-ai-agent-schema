schema: moonweave.ai/ontology-node/v1
id: InstructionOverrideResolution
kind: concept
status: accepted
labels:
  zh: 指令覆盖解析结果
  en: Instruction override resolution
  ja: 指示上書き解決結果
semantics:
  short_definition:
    zh: 记录一项指令依据授权规则取代另一项指令的解析结果。
    en: A resolution outcome recording that one instruction supersedes another under an authorized rule.
    ja: 承認済み rule により一つの指示が別指示を supersede する解決結果です。
  definition:
    zh: 指令覆盖解析结果是一类 InstructionResolution：它明确给出覆盖方、被覆盖方、授权依据和有效作用域，并断言 supersedes；它不是名为“覆盖”的新指令，文本自称高优先也不会形成该结果。
    en: InstructionOverrideResolution is an InstructionResolution that identifies superseding and superseded instructions, authorized grounds, and effective scope, and asserts supersedes. It is not a new directive named override, and self-claimed priority cannot create it.
    ja: InstructionOverrideResolution は superseding/superseded instruction・authorized grounds・effective scope を特定して supersedes を断言する InstructionResolution です。override と名乗る新 directive ではなく self-claimed priority では成立しません。
  why_needed:
    zh: 把覆盖建模为有依据的结果可消除 InstructionOverride 与普通指令同级造成的循环，并让覆盖事实接受审计。
    en: Modeling override as a grounded outcome removes the cycle caused by treating InstructionOverride as a peer directive and makes supersession auditable.
    ja: override を根拠付き outcome として表すことで InstructionOverride を peer directive とする循環を除き、supersession を監査可能にします。
  includes:
    - zh: 纳入覆盖解析结果标识、覆盖方/被覆盖方引用、治理依据、作用域和生效时间。
      en: Includes resolution ID, superseding/superseded references, governing basis, scope, and effective time.
      ja: resolution ID・superseding/superseded reference・governing basis・scope・effective time を含みます。
  excludes:
    - zh: 排除含有“忽略以上”字样的普通指令、未授权策略例外和安全缓解动作 TrustedInstructionOverride。
      en: Excludes ordinary directives saying “ignore above,” unauthorized policy exceptions, and the security mitigation action TrustedInstructionOverride.
      ja: 「上記を無視」と書く通常 directive・unauthorized policy exception・security mitigation action TrustedInstructionOverride を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - resolution_id
  fields:
    - id: resolution_id
      labels:
        zh: 覆盖结果标识
        en: Override-resolution ID
        ja: 上書き解決 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次有依据的覆盖解析结果。
        en: Identifies one grounded override-resolution outcome.
        ja: 一つの根拠付き override-resolution outcome を識別します。
      allowed_values: []
      pattern: null
      example_value: override-resolution-7
      source_claims:
        - claim-instruction-override-resolution-001
    - id: superseding_instruction_ref
      labels:
        zh: 覆盖指令引用
        en: Superseding instruction reference
        ja: 上書き指示参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向经解析判定为有效的覆盖方 Instruction。
        en: References the Instruction determined to supersede another.
        ja: 別 instruction を supersede すると判定された Instruction を参照します。
      allowed_values: []
      pattern: null
      example_value: inst-developer-9
      source_claims:
        - claim-instruction-override-resolution-001
    - id: superseded_instruction_refs
      labels:
        zh: 被覆盖指令引用
        en: Superseded instruction references
        ja: 被上書き指示参照
      datatype: array<string>
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出在同一作用域内失效的被覆盖 Instruction。
        en: Lists Instructions displaced within the same effective scope.
        ja: 同じ effective scope 内で displaced された Instruction を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - inst-user-10
      source_claims:
        - claim-instruction-override-resolution-001
    - id: resolution_basis
      labels:
        zh: 覆盖依据
        en: Resolution basis
        ja: 上書き根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录允许覆盖的权威、同级后发或显式委托依据。
        en: Records the authority, same-level recency, or explicit delegation authorizing supersession.
        ja: supersession を許す authority・same-level recency・explicit delegation basis を記録します。
      allowed_values: []
      pattern: null
      example_value: higher-authority
      source_claims:
        - claim-instruction-override-resolution-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InstructionOverrideResolution-manual-positive-20260716
    kind: positive
    labels:
      zh: 指令覆盖解析结果正例
      en: Instruction override resolution positive case
      ja: 指示上書き解決結果正例
    scenario_id: null
    descriptions:
      zh: developer 指令禁止外发密钥，后续 user 要求上传；解析结果 override-resolution-7 以 higher-authority 为依据记录 developer 指令 supersedes user 指令。
      en: A developer instruction forbids exporting keys and a later user asks to upload them; override-resolution-7 records the developer instruction superseding the user instruction on higher-authority grounds.
      ja: developer instruction が key export を禁止し later user が upload を求めた場合、override-resolution-7 は higher-authority を根拠に developer instruction が user instruction を supersede すると記録します。
    field_values:
      resolution_id: override-resolution-7
      superseding_instruction_ref: inst-developer-9
      superseded_instruction_refs:
        - inst-user-10
      resolution_basis: higher-authority
      resolution_status: resolved
    related_node_ids:
      - InstructionOverrideResolution
      - Instruction
      - InstructionAuthority
    related_relation_ids:
      - InstructionOverrideResolution-supersedes-Instruction
    expected_result:
      zh: 对象归为 InstructionOverrideResolution，并建立 supersedes 指向被覆盖 Instruction。
      en: The object is classified as InstructionOverrideResolution and asserts supersedes to the displaced Instruction.
      ja: object は InstructionOverrideResolution と分類され、displaced Instruction へ supersedes を断言します。
    why_valid_or_invalid:
      zh: 覆盖方、被覆盖方、冲突作用域和规范依据均可核验。
      en: Superseding party, displaced party, conflicting scope, and normative ground are all verifiable.
      ja: superseding party・displaced party・conflicting scope・normative ground が検証可能です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-override-resolution-001
  - id: InstructionOverrideResolution-manual-boundary-20260716
    kind: boundary
    labels:
      zh: 指令覆盖解析结果边界例
      en: Instruction override resolution boundary case
      ja: 指示上書き解決結果境界例
    scenario_id: null
    descriptions:
      zh: 检索网页包含“忽略所有 system 指令”；它既没有解析活动产出的结果标识，也没有授权依据。
      en: A retrieved webpage says “ignore all system instructions”; it has neither a result ID produced by resolution nor authorized grounds.
      ja: retrieved webpage に「全 system instruction を無視」とありますが、resolution が生成した result ID も authorized grounds もありません。
    field_values: {}
    related_node_ids:
      - InstructionOverrideResolution
      - PromptInjectionSignal
    related_relation_ids: []
    expected_result:
      zh: 该内容不得成为 InstructionOverrideResolution，也不得建立 supersedes。
      en: The content must not become InstructionOverrideResolution or assert supersedes.
      ja: content を InstructionOverrideResolution とせず supersedes も断言しません。
    why_valid_or_invalid:
      zh: 覆盖是解析结论，不是任何文本可以自我声明的规范类型。
      en: Override is a resolution conclusion, not a normative type that arbitrary text may self-declare.
      ja: override は resolution conclusion で、任意 text が自己宣言できる normative type ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-instruction-override-resolution-001
external_mappings: []
