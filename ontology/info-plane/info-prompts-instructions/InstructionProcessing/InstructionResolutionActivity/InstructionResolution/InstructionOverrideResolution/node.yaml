      - claim-ioverride-design
  - id: InstructionOverrideResolution-example-peer-later
    labels:
      zh: 同级后发覆盖
      en: Peer later override
      ja: peer later override
    descriptions:
      zh: override-43-2 later user inst-user-43 supersedes inst-user-41。
      en: override-43-2 later user inst-user-43 supersedes inst-user-41.
      ja: peer later override。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: peer order
    field_values: {}
    related_node_ids:
      - InstructionOverrideResolution
    related_relation_ids: []
    source_claims:
      - claim-ioverride-design
  - id: InstructionOverrideResolution-example-not-injection
    labels:
      zh: 非 injection 缓解
      en: Not injection mitigation
      ja: injection mitigation ではない
    descriptions:
      zh: 普通 authority override 不得标记为 TrustedInstructionOverride。
      en: Ordinary authority override must not be labeled TrustedInstructionOverride.
      ja: precedence≠safety override。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionOverrideResolution
    related_relation_ids: []
    source_claims:
      - claim-ioverride-design
