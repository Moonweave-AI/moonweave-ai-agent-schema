schema: moonweave.ai/ontology-node/v1
id: InstructionOverrideResolution
kind: concept
labels:
  zh: 指令覆盖解析结果
  en: Instruction override resolution
  ja: 指示上書き解決結果
semantics:
  short_definition:
    zh: 记录一条 Instruction 被更高权威或同级规则覆盖的特化结果。
    en: Specialized result recording one Instruction overridden by higher authority or peer rule.
    ja: higher authority/peer rule により一 Instruction が override されたことを記録する specialized result。
  definition:
    zh: InstructionOverrideResolution 指向被 superseded 的 instruction_id、胜出 instruction_id 与 override_reason（如 lower-authority-than-platform-system）；对应 TrustedInstructionOverride 之外的普通 precedence 结果。
    en: InstructionOverrideResolution points to superseded instruction_id, winning instruction_id, and override_reason such as lower-authority-than-platform-system—ordinary precedence outside TrustedInstructionOverride mitigations.
    ja: superseded/winner/reason override record。
  why_needed:
    zh: 逐条 override 记录使审计能解释单条指令为何未进入 effective set。
    en: Per-instruction override records let audit explain why one directive did not enter the effective set.
    ja: per-instruction override audit。
  includes:
    - zh: superseded_instruction_id、winning_instruction_id、override_reason。
      en: superseded_instruction_id, winning_instruction_id, override_reason.
      ja: superseded/winner/reason。
  excludes:
    - zh: PromptInjection mitigation、TrustedInstructionOverride 安全动作。
      en: PromptInjection mitigation and TrustedInstructionOverride safety actions.
      ja: injection/safety override。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: inst-user-override-3 superseded by inst-system-v12 reason=lower-authority-than-platform-system。
    en: inst-user-override-3 superseded by inst-system-v12 reason=lower-authority-than-platform-system.
    ja: authority override reason。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys:
    - resolution_id
  fields:
    - id: resolution_id
      labels:
        zh: 覆盖结果标识
        en: Override-resolution ID
        ja: 上書き解決 ID
      definitions:
        zh: 标识一次有依据的覆盖解析结果。
        en: Identifies one grounded override-resolution outcome.
        ja: 一つの根拠付き override-resolution outcome を識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: override-resolution-7
      allowed_values: []
      source_claims:
        - claim-instruction-override-resolution-001
    - id: superseding_instruction_ref
      labels:
        zh: 覆盖指令引用
        en: Superseding instruction reference
        ja: 上書き指示参照
      definitions:
        zh: 指向经解析判定为有效的覆盖方 Instruction。
        en: References the Instruction determined to supersede another.
        ja: 別 instruction を supersede すると判定された Instruction を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: inst-developer-9
      allowed_values: []
      source_claims:
        - claim-instruction-override-resolution-001
    - id: superseded_instruction_refs
      labels:
        zh: 被覆盖指令引用
        en: Superseded instruction references
        ja: 被上書き指示参照
      definitions:
        zh: 列出在同一作用域内失效的被覆盖 Instruction。
        en: Lists Instructions displaced within the same effective scope.
        ja: 同じ effective scope 内で displaced された Instruction を列挙します。
      datatype: array<string>
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        - inst-user-10
      allowed_values: []
      source_claims:
        - claim-instruction-override-resolution-001
    - id: resolution_basis
      labels:
        zh: 覆盖依据
        en: Resolution basis
        ja: 上書き根拠
      definitions:
        zh: 记录允许覆盖的权威、同级后发或显式委托依据。
        en: Records the authority, same-level recency, or explicit delegation authorizing supersession.
        ja: supersession を許す authority・same-level recency・explicit delegation basis を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: higher-authority
      allowed_values: []
      source_claims:
        - claim-instruction-override-resolution-001
  constraints: []
  required_relations: []
