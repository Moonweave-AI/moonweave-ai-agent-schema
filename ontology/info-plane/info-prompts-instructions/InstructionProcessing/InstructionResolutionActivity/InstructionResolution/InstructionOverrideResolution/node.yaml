source_claims:
  - id: claim-instruction-override-resolution-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec states that higher-authority instructions override lower-authority instructions and later instructions override earlier conflicts only at the same authority. Moonweave records a particular authorized supersession as InstructionOverrideResolution rather than treating override as another directive type.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-override-resolution-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec defines when higher authority or later same-level instructions override conflicts. Moonweave classifies a recorded supersession outcome as a specialized InstructionResolution.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-override-resolution-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec states the conditions under which higher-authority or later same-level instructions override conflicting directives. Moonweave represents a particular displaced target through InstructionOverrideResolution-supersedes-Instruction.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-ioverride-design
    source: src-info-prompts-design
    supports: InstructionOverrideResolution records per-directive precedence outcomes.
    locator: InstructionOverrideResolution
    evidence_kind: design-inference
    confidence: high
