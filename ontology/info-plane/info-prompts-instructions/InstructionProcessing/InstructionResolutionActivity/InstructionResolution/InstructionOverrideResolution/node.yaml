      en: InstructionOverrideResolution supersedes Instruction means a grounded outcome displaces the target directive within explicit scope and validity while preserving its historical identity and provenance.
      ja: InstructionOverrideResolution supersedes Instruction は grounded outcome が explicit scope/validity 内で target directive を失効させ、historical identity/provenance は保持することを表します。
