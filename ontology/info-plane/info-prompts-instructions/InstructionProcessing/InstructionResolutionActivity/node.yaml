  - id: claim-instruction-resolution-activity-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec prescribes the ordered reconciliation of conflicting instructions. Moonweave classifies execution of that reconciliation as specialized InstructionProcessing.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
