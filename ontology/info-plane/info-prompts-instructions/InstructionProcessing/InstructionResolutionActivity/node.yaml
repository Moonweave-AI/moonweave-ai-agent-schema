schema: moonweave.ai/ontology-node/v1
id: InstructionResolutionActivity
kind: concept
status: accepted
labels:
  zh: 指令解决活动
  en: Instruction resolution activity
  ja: 指示解決活動
semantics:
  short_definition:
    zh: 应用权威、适用性、作用域和优先规则解决已检测冲突的活动。
    en: An activity applying authority, applicability, scope, and precedence rules to a detected conflict.
    ja: 検出済み conflict に authority・applicability・scope・precedence rule を適用する activity です。
  definition:
    zh: 指令解决活动是一类 InstructionProcessing，它读取已检测冲突及相关元数据，按治理顺序计算有效、被压制或仍未解决的指令，并产生 InstructionResolution；活动执行本身不同于其结果记录。
    en: InstructionResolutionActivity is InstructionProcessing that reads a detected conflict and its metadata, applies governing order to compute effective, suppressed, or unresolved instructions, and produces an InstructionResolution. The execution is distinct from its result record.
    ja: InstructionResolutionActivity は detected conflict と metadata を読み、governing order で effective・suppressed・unresolved instruction を計算し InstructionResolution を生成する InstructionProcessing です。execution 自体は result record と異なります。
  why_needed:
    zh: 活动节点保存采用的解析规则、时间和执行者，使结果可以重放而不会把结果误当作新指令。
    en: The activity preserves the rule set, time, and executor needed to replay the outcome without mistaking that outcome for a new instruction.
    ja: activity node は replay に必要な rule set・time・executor を保存し、outcome を新 instruction と誤認しません。
  includes:
    - zh: 纳入一次读取冲突、比较元数据并产出解析记录的具体执行。
      en: Includes a concrete execution that reads a conflict, compares metadata, and emits a resolution record.
      ja: conflict を読み metadata を比較して resolution record を出力する具体 execution を含みます。
  excludes:
    - zh: 排除冲突检测、威胁缓解、InstructionResolution 记录以及声称覆盖的指令文本。
      en: Excludes conflict detection, threat mitigation, the InstructionResolution record, and directive text claiming an override.
      ja: conflict detection・threat mitigation・InstructionResolution record・override を主張する directive text を除外します。
  semantic_kind: activity
  aliases: []
