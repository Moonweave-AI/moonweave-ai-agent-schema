schema: moonweave.ai/ontology-node/v1
id: InstructionResolutionActivity
kind: concept
labels:
  zh: 指令解决活动
  en: Instruction resolution activity
  ja: 指示解決活動
semantics:
  short_definition:
    zh: 依据 authority 与 priority 决定冲突 Instruction 最终生效集合的活动。
    en: Activity deciding the final effective Instruction set from authority and priority among conflicts.
    ja: authority/priority に基づき conflict Instruction の final effective set を決める activity。
  definition:
    zh: InstructionResolutionActivity 消费 ConflictDetection 结果，产出 InstructionResolution 与可选 InstructionOverrideResolution；记录 effective 与 superseded 列表供 context assembly 使用。
    en: InstructionResolutionActivity consumes ConflictDetection results, producing InstructionResolution and optional InstructionOverrideResolution; records effective and superseded lists for context assembly.
    ja: ConflictDetection→Resolution→effective/superseded lists。
  why_needed:
    zh: 可审计 resolution 回答“为何 developer 指令仍覆盖 user 要求”。
    en: Auditable resolution answers why developer instruction still overrides user request.
    ja: auditable resolution outcome。
  includes:
    - zh: resolution_activity_id、输入 conflict 引用、产出 InstructionResolution。
      en: resolution_activity_id, input conflict references, output InstructionResolution.
      ja: activity_id/conflict refs/InstructionResolution。
  excludes:
    - zh: Parsing 本身、PromptInjection mitigation、模型最终 compliance 证明。
      en: Parsing itself, PromptInjection mitigation, and proof of final model compliance.
      ja: parsing/injection mitigation/compliance proof。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: ires-session-27：platform inst-system-v12 effective，inst-user-override-3 superseded reason=lower-authority-than-platform-system。
    en: "ires-session-27: platform inst-system-v12 effective, inst-user-override-3 superseded reason=lower-authority-than-platform-system."
    ja: authority-based resolution。
  typical_input: []
  typical_output:
    - description: Effective instruction set
      format: '{"instruction_resolution_id":"ires-session-27","effective_instructions":["inst-system-v12"],"superseded_instructions":["inst-user-override-3"]}'
      source_claims:
        - claim-ires-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer/system roles and message instructions.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter for session instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get template instantiation.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules as persistent instructions.
structure:
  identity_keys: []
  fields:
    - id: rule_set_version
      labels:
        zh: 规则集版本
        en: Rule-set version
        ja: rule set version
      definitions:
        zh: 记录本次比较实际采用的治理规则版本。
        en: Records the governing-rule version actually applied by this comparison.
        ja: comparison が実際に適用した governing-rule version を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: model-spec/2025-10-27
      allowed_values: []
      source_claims:
        - claim-instruction-resolution-activity-001
  constraints: []
  required_relations: []
examples:
  - id: InstructionResolutionActivity-example-session-27
    labels:
      zh: session-27 解析
      en: Session-27 resolution
      ja: session-27 resolution
    descriptions:
      zh: ires-session-27 platform 指令生效，user override superseded。
      en: ires-session-27 platform instruction prevails, user override superseded.
      ja: platform wins。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: resolution
    field_values:
      instruction_resolution_id: ires-session-27
    related_node_ids:
      - InstructionResolutionActivity
      - InstructionResolution
    related_relation_ids: []
    source_claims:
      - claim-ires-design
  - id: InstructionResolutionActivity-example-peer-priority
    labels:
      zh: 同级 priority
      en: Peer priority
      ja: peer priority
    descriptions:
      zh: 同等 authority 下后发 user 指令在 Resolution 中胜出。
      en: Later user directive wins in Resolution at equal authority.
      ja: later-at-equal-authority。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: peer order
    field_values: {}
    related_node_ids:
      - InstructionResolutionActivity
    related_relation_ids: []
    source_claims:
      - claim-ires-design
  - id: InstructionResolutionActivity-example-no-conflict-input
    labels:
      zh: 无冲突输入
      en: No conflict input
      ja: conflict input なし
    descriptions:
      zh: 无 ConflictDetection 结果时 Resolution 不得臆造 superseded。
      en: Resolution must not invent superseded without ConflictDetection results.
      ja: no conflict→no superseded。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - InstructionResolutionActivity
    related_relation_ids: []
    source_claims:
      - claim-ires-design
parent_relation:
  id: InstructionResolutionActivity-is_a-InstructionProcessing
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: InstructionResolutionActivity 是一种 InstructionProcessing，其种差是应用权威、作用域和同级优先规则并产出解析结果。
    en: InstructionResolutionActivity is_a InstructionProcessing whose differentia is applying authority, scope, and peer-precedence rules to produce a resolution.
    ja: InstructionResolutionActivity is_a InstructionProcessing は authority・scope・peer precedence rule を適用し resolution を生成することを種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
    en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
    ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InstructionResolutionActivity-is_a-InstructionProcessing-manual-positive-20260716
      labels:
        zh: is_a 正例
        en: is_a positive case
        ja: is_a 正例
      descriptions:
        zh: resolve-91 应用 developer-over-user 规则并产出 resolution-91，满足处理活动和解决种差。
        en: resolve-91 applies developer-over-user and produces resolution-91, satisfying both processing identity and resolution differentia.
        ja: resolve-91 は developer-over-user を適用して resolution-91 を生成し processing identity と resolution 種差を満たします。
      field_values: {}
      related_node_ids:
        - InstructionResolutionActivity
        - InstructionProcessing
      related_relation_ids:
        - InstructionResolutionActivity-is_a-InstructionProcessing
      source_claims:
        - claim-instruction-resolution-activity-002
    - id: InstructionResolutionActivity-is_a-InstructionProcessing-manual-boundary-20260716
      labels:
        zh: is_a 边界例
        en: is_a boundary case
        ja: is_a 境界例
      descriptions:
        zh: InstructionResolution 保存结果但不执行规则应用。
        en: InstructionResolution stores the result but does not execute rule application.
        ja: InstructionResolution は result を保存しますが rule application を実行しません。
      field_values: {}
      related_node_ids:
        - InstructionResolutionActivity
        - InstructionProcessing
      related_relation_ids:
        - InstructionResolutionActivity-is_a-InstructionProcessing
      source_claims:
        - claim-instruction-resolution-activity-002
  source_claims:
    - claim-instruction-resolution-activity-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: InstructionResolutionActivity-resolves-InstructionConflict
    predicate: resolves
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: resolves
      en: resolves
      ja: resolves
    definitions:
      zh: InstructionResolutionActivity resolves InstructionConflict 表示该执行对特定已检测冲突应用治理规则并形成可记录结论；未产生结论的尝试不能声明 resolves。
      en: InstructionResolutionActivity resolves InstructionConflict means the execution applies governing rules to a specific detected conflict and reaches a recordable conclusion; an attempt with no outcome cannot assert resolves.
      ja: InstructionResolutionActivity resolves InstructionConflict は specific detected conflict に governing rule を適用して記録可能 conclusion に達することを表し outcome のない attempt は resolves を断言できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可验证语义事实；具体运行可按协议或策略另行约束基数。
      en: This ontology relation records a verifiable semantic fact; concrete runtimes may constrain cardinality separately by protocol or policy.
      ja: この ontology relation は検証可能な意味 fact を記録し、具体 runtime の cardinality は protocol/policy で別途制約できます。
    inverse_reading:
      predicate: inverse_resolves
      labels:
        zh: 反向 resolves
        en: inverse resolves
        ja: 逆 resolves
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples:
      - id: InstructionResolutionActivity-resolves-InstructionConflict-manual-positive-20260716
        labels:
          zh: resolves 正例
          en: resolves positive case
          ja: resolves 正例
        descriptions:
          zh: resolve-91 对 conflict-91 应用 developer-over-user 并得到确定有效指令。
          en: resolve-91 applies developer-over-user to conflict-91 and obtains a determinate effective instruction.
          ja: resolve-91 は conflict-91 に developer-over-user を適用し determinate effective instruction を得ます。
        field_values: {}
        related_node_ids:
          - InstructionResolutionActivity
          - InstructionConflict
        related_relation_ids:
          - InstructionResolutionActivity-resolves-InstructionConflict
        source_claims:
          - claim-instruction-resolution-activity-003
      - id: InstructionResolutionActivity-resolves-InstructionConflict-manual-boundary-20260716
        labels:
          zh: resolves 边界例
          en: resolves boundary case
          ja: resolves 境界例
        descriptions:
          zh: 解析器因缺少指令来源暂停并请求澄清，没有产生有效或未解决结论记录。
          en: Resolution pauses for clarification because source evidence is missing and produces no effective or unresolved conclusion record.
          ja: resolution は source evidence 欠落で clarification 待ちとなり effective/unresolved conclusion record を生成しません。
        field_values: {}
        related_node_ids:
          - InstructionResolutionActivity
          - InstructionConflict
        related_relation_ids:
          - InstructionResolutionActivity-resolves-InstructionConflict
        source_claims:
          - claim-instruction-resolution-activity-003
    source_claims:
      - claim-instruction-resolution-activity-003
    layout_role: cross-link
    target: concept:InstructionConflict
sources:
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: developer and system role behavioral instructions.
  - id: src-info-prompts-design
    title: Moonweave info-prompts-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Instruction normative identity separate from Message carriage.
source_claims:
  - id: claim-instruction-resolution-activity-001
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec specifies the ordered comparison used to reconcile conflicting applicable instructions. Moonweave treats the observable application of that comparison as InstructionResolutionActivity and keeps its resulting record separate.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-resolution-activity-002
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec prescribes the ordered reconciliation of conflicting instructions. Moonweave classifies execution of that reconciliation as specialized InstructionProcessing.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-instruction-resolution-activity-003
    source: eng-spec-openai-model-2025-10-27
    supports: The Model Spec gives the authority and same-level ordering used to reconcile conflicts. Moonweave records successful application of that order through InstructionResolutionActivity-resolves-InstructionConflict.
    locator: Model Spec 2025-10-27 > Instructions and levels of authority; The chain of command > Follow all applicable instructions
    evidence_kind: design-inference
    confidence: high
  - id: claim-ires-design
    source: src-info-prompts-design
    supports: InstructionResolutionActivity produces auditable effective and superseded instruction lists.
    locator: InstructionResolutionActivity
    evidence_kind: design-inference
    confidence: high
