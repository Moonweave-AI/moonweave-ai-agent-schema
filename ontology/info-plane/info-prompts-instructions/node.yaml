module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入是已完成变量绑定的 PromptTemplateInstance；解析活动读取该实例但不取得模板所有权。
          en: Input is a fully bound PromptTemplateInstance; parsing reads the instance without taking ownership of its template definition.
          ja: input は完全 binding 済み PromptTemplateInstance で parsing は template definition の ownership を取らず instance を読みます。
        family_concept_ids:
          - PromptTemplateInstance
        relation_ids:
          - InstructionParsingActivity-consumes-PromptTemplateInstance
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是解析形成的 Instruction、普通 InstructionResolution 和有依据的 InstructionOverrideResolution；结果只记录效力，不成为新指令。
          en: Outputs are parsed Instruction, ordinary InstructionResolution, and grounded InstructionOverrideResolution; outcomes record effect and do not become new directives.
          ja: output は parsed Instruction・通常 InstructionResolution・grounded InstructionOverrideResolution で outcome は効力を記録し新 directive にはなりません。
        family_concept_ids:
          - Instruction
          - InstructionResolution
          - InstructionOverrideResolution
        relation_ids:
          - InstructionParsingActivity-produces-Instruction
          - InstructionResolutionActivity-produces-InstructionResolution
          - InstructionResolution-records_effective-Instruction
          - InstructionOverrideResolution-supersedes-Instruction
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 失败面记录 safety-owned InstructionConflict 被检测但尚未解决；普通冲突不自动等同注入攻击。
          en: The failure facet records a safety-owned InstructionConflict that was detected but not yet resolved; ordinary conflict is not automatically an injection attack.
          ja: failure facet は safety-owned InstructionConflict の detection 未解決状態を記録し、通常 conflict を injection attack と同一視しません。
        family_concept_ids:
          - InstructionConflict
        relation_ids:
          - InstructionConflictDetectionActivity-detects-InstructionConflict
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 恢复由 InstructionResolutionActivity 对已检测冲突应用治理顺序并形成可审计结果。
          en: Recovery is an InstructionResolutionActivity applying governing order to a detected conflict and producing an auditable outcome.
          ja: recovery は InstructionResolutionActivity が detected conflict に governing order を適用し監査可能 outcome を形成します。
        family_concept_ids:
          - InstructionResolutionActivity
        relation_ids:
          - InstructionResolutionActivity-resolves-InstructionConflict
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 领域审查按一次指令处理闭环核实四个面：已绑定模板实例是输入，解析指令与两类解决结果是输出，未解决 InstructionConflict 是失败事实，InstructionResolutionActivity 是恢复活动；解决结果不会被误作新指令。
            en: "Domain review checked the four facets as one instruction-processing loop: a bound template instance is input; parsed instructions and two resolution outcomes are outputs; unresolved InstructionConflict is the failure fact; InstructionResolutionActivity is recovery; no outcome is treated as a new directive."
            ja: domain review は instruction-processing loop として四 facet を確認しました。bound template instance が input、parsed instruction と二種 resolution outcome が output、未解決 InstructionConflict が failure fact、InstructionResolutionActivity が recovery で、outcome を新 directive と扱いません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查逐边确认 input/output/failure/recovery 的 family 与 relation 均存在且方向一致；跨到 safety 的 InstructionConflict 仅被引用，交互合同没有改变其唯一 owner。
            en: Structure review verified every input, output, failure, and recovery family and relation with matching direction; the safety-owned InstructionConflict is referenced only, so the interaction contract does not change its unique owner.
            ja: structure review は input/output/failure/recovery の全 family と relation の存在・方向を確認しました。safety-owned InstructionConflict は参照のみで interaction contract は unique owner を変更しません。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Instruction
      - PromptTemplate
      - InstructionProcessing
    allowed_backbone_predicates:
      - contains
      - has_metadata
      - instantiates
      - is_a
      - produces
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 领域审查确认 Instruction 回答规范效力，PromptTemplate 回答可复用模板，InstructionProcessing 回答解析活动，三者仍是不同根。InstructionResolution 由 InstructionResolutionActivity 首次形成，PromptTemplateInstance 明确绑定且实例化一个模板版本，因此这两个 A/A-X 对不再平铺。
            en: Domain review confirms that Instruction answers normative effect, PromptTemplate answers reusable-template structure, and InstructionProcessing answers processing activity, so these three remain distinct roots. InstructionResolution is first formed by InstructionResolutionActivity, and PromptTemplateInstance explicitly binds and instantiates one template version, so these two A/A-X pairs are no longer flattened.
            ja: domain review は Instruction が規範効力、PromptTemplate が再利用 template、InstructionProcessing が解析活動を答える別 root と確認しました。InstructionResolution は InstructionResolutionActivity が初めて形成し、PromptTemplateInstance は一つの template version を明示的に binding・instantiate するため、この二つの A/A-X 組を平置きしません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 模块保留 PromptTemplate 与 InstructionProcessing 两根：模板回答可复用提示规范，处理根回答识别、冲突检测和解析流程，二者不存在诚实的域内上位事实。Instruction 通过 InstructionParsingActivity produces Instruction 接入处理链；这是类级主要阅读入口而非全称基数，人工编写或预注册指令仍可先于解析运行存在。PromptTemplate contains Instruction 只表达显式嵌入子集，保持 cross-link。
            en: "The module retains two roots, PromptTemplate and InstructionProcessing: the former answers reusable prompt specification, the latter recognition, conflict detection, and resolution processing; no honest intra-domain fact subsumes both. Instruction enters the processing chain through InstructionParsingActivity produces Instruction. This is a class-level primary reading rather than universal cardinality, so authored or pre-registered instructions may predate a parsing run. PromptTemplate contains Instruction describes only the explicitly embedded subset and remains cross-link."
            ja: PromptTemplate と InstructionProcessing の二 root を保持します。前者は reusable prompt specification、後者は recognition・conflict detection・resolution processing を答え、両者を包摂する誠実な domain fact はありません。Instruction は InstructionParsingActivity produces Instruction で processing chain に入り、class-level primary reading で全称基数ではないため authored/pre-registered instruction は parsing run 前に存在できます。PromptTemplate contains Instruction は explicit embedded subset だけを表し cross-link です。
  competency_questions:
    - id: info-prompts-instructions-cq-template-instantiation-v3
      semantic_key: info-prompts-instructions.template-instantiation
      primary_owner_module_id: info-prompts-instructions
      related_module_ids:
        - info-content-block-modality
      questions:
        zh: 某个 PromptTemplateInstance 实例化了哪个模板，变量绑定和内容块是否满足模板约束？
        en: Which template does a PromptTemplateInstance instantiate, and do its variable bindings and content blocks satisfy template constraints?
        ja: PromptTemplateInstance はどの template を instantiate し、variable binding と content block は template constraint を満たしますか。
      query: Resolve one PromptTemplateInstance to exactly one PromptTemplate version, verify every required binding, then traverse the template's explicit Instruction and FewShotExample members.
      expected_assertion: The instance has one compatible template version and complete bindings; contained directives and demonstrations remain typed nodes rather than flattened text.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - PromptTemplate
          - PromptTemplateInstance
        related_concept_ids:
          - Instruction
          - FewShotExample
        relation_ids:
          - PromptTemplateInstance-instantiates-PromptTemplate
          - PromptTemplate-contains-Instruction
          - PromptTemplate-contains-FewShotExample
        not_applicable_reason: null
      positive_example_ids:
        - info-prompts-instructions-cq-template-instantiation-v3-example-positive
      counterexample_ids:
        - info-prompts-instructions-cq-template-instantiation-v3-example-counter
      source_claims:
        - claim-info-prompts-instructions-004
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-info-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 该问题能同时检验实例是否唯一指向模板版本、变量绑定是否完整，以及 Instruction 与 FewShotExample 是否仍为模板中的显式成员。
              en: This question jointly tests unique template-version instantiation, binding completeness, and preservation of Instruction and FewShotExample as explicit template members.
