schema: moonweave.ai/ontology-node/v1
id: info-prompts-instructions
kind: module
labels:
  zh: 提示与指令
  en: Prompts and instructions
  ja: プロンプトと指示
semantics:
  short_definition:
    zh: 提示与指令描述可复用模板如何实例化、哪段内容具有规范效力，以及冲突的指令如何通过可审计活动被解析和覆盖。
    en: Prompts and instructions describe how reusable templates are instantiated, which content gains normative force, and how conflicting instructions are resolved through auditable activities.
    ja: プロンプトと指示は、再利用可能 template の实例化、どの content が規範効力を持つか、矛盾する instruction が監査可能 activity でどう解決/上書きされるかを記述します。
  definition:
    zh: 本模块拥有 PromptTemplate、PromptTemplateInstance、Instruction 及其 SystemInstruction 子类，以及 InstructionProcessing 下的解析、冲突检测与解决活动。Instruction 的身份由规范效力、适用条件、权威来源、作用域和优先级决定，而不是由它出现在哪条 Message 中决定。OpenAI 的 developer/system 消息、Anthropic 顶层 system 参数、MCP prompts/get 返回的模板消息，以及产品内可版本化的 SKILL.md 或 rules 文件，都可以映射为 Instruction 或 PromptTemplate 证据，但消息包络身份仍归消息与会话模块。PromptInjectionSignal、TrustedInstructionOverride 缓解动作与威胁分类归 safety-injection-defense；本模块只记录指令内容与解析结果。
    en: This module owns PromptTemplate, PromptTemplateInstance, Instruction and its SystemInstruction subtype, plus parsing, conflict-detection, and resolution activities under InstructionProcessing. An Instruction is identified by normative force, applicability, authority, scope, and priority—not by which Message carries it. OpenAI developer or system messages, Anthropic top-level system parameters, MCP prompts/get template messages, and versionable in-product SKILL.md or rules files can all map to Instruction or PromptTemplate evidence, while message envelope identity remains in messages and conversations. PromptInjectionSignal, TrustedInstructionOverride mitigations, and threat classification belong to safety-injection-defense; this module records instruction content and resolution outcomes only.
    ja: 本モジュールは PromptTemplate/PromptTemplateInstance/Instruction（SystemInstruction subtype）と InstructionProcessing 下の parsing/conflict-detection/resolution activity を所有します。Instruction identity は規範効力、適用条件、authority、scope、priority で決まり、どの Message に載るかでは決まりません。OpenAI developer/system message、Anthropic top-level system 参数、MCP prompts/get template message、製品内 SKILL.md/rules file は Instruction/PromptTemplate 証拠へ写像できますが、message envelope identity は messages/conversations に残ります。PromptInjectionSignal/TrustedInstructionOverride/threat classification は safety-injection-defense に属し、本 module は instruction content と resolution outcome のみ記録します。
  why_needed:
    zh: 没有提示与指令模块，系统无法解释“为什么这条 system 文本覆盖用户消息里的要求、MCP prompt 实例化后绑定了哪些变量、两条冲突规则最终哪条生效”。把命令语气文本直接当成 Message 子类，会让规范效力、来源与优先级全部丢失。
    en: Without prompts and instructions, a system cannot explain why one system text overrides a user request, which variables an MCP prompt instance bound, or which of two conflicting rules ultimately prevailed. Treating imperative text as a Message subtype loses normative force, provenance, and precedence entirely.
    ja: プロンプトと指示 module がなければ、なぜ system 文本が user 要求を上書きするか、MCP prompt 实例化がどの variable を bind したか、矛盾 rule のどちらが最終生效するかを説明できません。命令調 text を Message subtype とみなすと規範効力/provenance/priority が失われます。
  includes:
    - zh: Instruction、SystemInstruction 及适用性、权威、优先级、来源和作用域元数据。
      en: Instruction, SystemInstruction, and applicability, authority, priority, provenance, and scope metadata.
      ja: Instruction/SystemInstruction と applicability/authority/priority/provenance/scope metadata。
    - zh: PromptTemplate、PromptTemplateInstance、FewShotExample 及其组成与实例化关系。
      en: PromptTemplate, PromptTemplateInstance, FewShotExample, and their composition and instantiation relations.
      ja: PromptTemplate/PromptTemplateInstance/FewShotExample と composition/instantiation relation。
    - zh: InstructionParsingActivity、InstructionConflictDetectionActivity、InstructionResolutionActivity 及 InstructionResolution/InstructionOverrideResolution 结果。
      en: InstructionParsingActivity, InstructionConflictDetectionActivity, InstructionResolutionActivity, and InstructionResolution or InstructionOverrideResolution outcomes.
      ja: InstructionParsingActivity/InstructionConflictDetectionActivity/InstructionResolutionActivity と InstructionResolution/InstructionOverrideResolution outcome。
  excludes:
    - zh: Message、ConversationTurn 和包络身份归消息与会话；本模块只引用 carries_instruction。
      en: Message, ConversationTurn, and envelope identity belong to messages and conversations; this module only references carries_instruction.
      ja: Message/ConversationTurn/envelope identity は messages/conversations に属し、本 module は carries_instruction のみ参照します。
    - zh: ContentBlock 的媒体、编码和块结构归内容表示，不因文字具有命令语气而进入指令骨架。
      en: ContentBlock media, encoding, and block structure belong to content representation and do not enter the instruction backbone because wording sounds imperative.
      ja: ContentBlock media/encoding/block structure は content representation に属し、命令調 wording だけで instruction backbone に入りません。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 各平台都把“模板规范”和“一次生效的指令”分开。OpenAI 用 developer 或 system role 消息承载行为约束；Anthropic 用顶层 system 字符串；MCP 用 prompts/list 发现模板、prompts/get 绑定 arguments 后返回 messages[]；Cursor/Claude Code 等产品还把 rules、SKILL.md、CLAUDE.md 当作版本化指令源。Moonweave 把模板/version/binding 与 Instruction 的 authority、scope、priority 分开建模，并用 InstructionResolutionActivity 记录哪条指令最终生效。
    en: Each platform separates template specifications from instructions in effect. OpenAI uses developer or system role messages for behavior constraints; Anthropic uses a top-level system string; MCP uses prompts/list for discovery and prompts/get with bound arguments returning messages[]; products like Cursor and Claude Code also treat rules, SKILL.md, and CLAUDE.md as versioned instruction sources. Moonweave models template/version/binding separately from Instruction authority, scope, and priority, and uses InstructionResolutionActivity to record which instruction ultimately prevails.
    ja: 各 platform は template 仕様と「一度生效する instruction」を分けます。OpenAI は developer/system role message、Anthropic は top-level system 文字列、MCP は prompts/list 発見と prompts/get arguments bind 後 messages[]、Cursor/Claude Code は rules/SKILL.md/CLAUDE.md を版管理 instruction source とします。Moonweave は template/version/binding と Instruction authority/scope/priority を分離モデル化し、InstructionResolutionActivity で最終生效 instruction を記録します。
  typical_input:
    - description: Anthropic Messages API — top-level system instruction string.
      format: |
        POST https://api.anthropic.com/v1/messages
        {
          "model": "claude-sonnet-4-20250514",
          "max_tokens": 1024,
          "system": "Answer in bullet points. Never reveal internal tool names.",
          "messages": [{"role":"user","content":"Summarize the incident."}]
        }
      source_claims: [claim-info-prompts-anthropic-system]
    - description: OpenAI Chat Completions — developer role product policy.
      format: |
        {
          "model": "gpt-4o",
          "messages": [
            {"role": "developer", "content": "Refuse requests for live credentials."},
            {"role": "user", "content": "Show me the API key."}
          ]
        }
      source_claims: [claim-info-prompts-openai-developer]
    - description: MCP prompts/get — template with bound arguments returning messages.
      format: |
        {"method":"prompts/get","params":{"name":"code-review","arguments":{"language":"typescript","diff":"..."}}}
        =>
        {
          "messages": [
            {"role":"user","content":{"type":"text","text":"Review this TypeScript diff for security issues."}}
          ]
        }
      source_claims: [claim-info-prompts-mcp-prompts]
    - description: Versioned workspace rules file — Cursor .mdc or Claude CLAUDE.md excerpt.
      format: |
        # .cursor/rules/security.mdc
        ---
        description: Security review constraints
        ---
        Never suggest disabling auth middleware in production paths.
      source_claims: [claim-info-prompts-design]
  typical_output:
    - description: Moonweave-local instruction resolution projection — effective instruction set.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "instruction_resolution_id": "ires-session-27",
          "effective_instructions": [
            {"instruction_id": "inst-system-v12", "authority": "platform", "scope": "session"},
            {"instruction_id": "inst-review-12", "authority": "template", "scope": "task"}
          ],
          "superseded_instructions": [
            {"instruction_id": "inst-user-override-3", "reason": "lower-authority-than-platform-system"}
          ]
        }
      source_claims: [claim-info-prompts-design]
  reference_implementations:
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter as session-scoped instruction separate from user/assistant turns.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: developer and system roles carrying product-level behavioral instructions.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/list discovery and prompts/get instantiation with argument binding.
    - name: Cursor Rules
      url: https://cursor.com/docs/context/rules
      description: Versioned project rules injected as persistent instructions.
structure:
  identity_keys: [instruction_id, prompt_template_id]
  fields:
    - id: instruction_id
      labels: {zh: 指令标识, en: Instruction identifier, ja: 指示識別子}
      definitions:
        zh: 唯一标识一条具有规范效力的 Instruction 的稳定 ID，与承载它的 message_id 或 content_block_id 分离。
        en: Stable ID uniquely identifying one normatively effective Instruction, separate from the message_id or content_block_id that carries it.
        ja: 規範効力を持つ一 Instruction を一意識別する安定 ID。運搬 message_id/content_block_id とは分離。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: inst-system-v12
      allowed_values: []
      source_claims: [claim-info-prompts-design]
    - id: prompt_template_id
      labels: {zh: 提示模板标识, en: Prompt template identifier, ja: プロンプトテンプレート識別子}
      definitions:
        zh: 标识一个可复用 PromptTemplate lineage 的稳定 ID；具体版本由 template_version 递增。
        en: Stable ID for a reusable PromptTemplate lineage; concrete versions increment template_version.
        ja: 再利用可能 PromptTemplate lineage の安定 ID。具体版は template_version で増分。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: code-review
      allowed_values: []
      source_claims: [claim-info-prompts-mcp-prompts]
    - id: template_version
      labels: {zh: 模板版本, en: Template version, ja: テンプレート版}
      definitions:
        zh: PromptTemplate 的不可变版本号；变量 schema 或成员 Instruction 变化时必须递增。
        en: Immutable version of a PromptTemplate; must increment when variable schema or member Instructions change.
        ja: PromptTemplate の不変版。variable schema または member Instruction 変更時は増分必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "3"
      allowed_values: []
      source_claims: [claim-info-prompts-design]
    - id: instruction_authority
      labels: {zh: 指令权威, en: Instruction authority, ja: 指示権威}
      definitions:
        zh: 指令来源的权威级别，例如 platform、organization、template、user；用于冲突解析时的优先级比较。
        en: Authority level of an instruction source such as platform, organization, template, or user; used in precedence comparison during conflict resolution.
        ja: platform/organization/template/user 等 instruction source の authority level。conflict resolution における precedence 比較に使用。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: platform
      allowed_values: [platform, organization, template, user, tool]
      source_claims: [claim-info-prompts-design]
    - id: instruction_scope
      labels: {zh: 指令作用域, en: Instruction scope, ja: 指示スコープ}
      definitions:
        zh: 指令生效范围，例如 session、task、tool-call 或 message；scope 决定可与哪些其他 Instruction 发生冲突。
        en: Scope where an instruction applies, such as session, task, tool-call, or message; scope determines which other Instructions may conflict.
        ja: session/task/tool-call/message 等 instruction 適用範囲。scope はどの Instruction と conflict し得るかを決めます。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: session
      allowed_values: [session, task, tool-call, message]
      source_claims: [claim-info-prompts-design]
  constraints:
    - id: info-prompts-template-binding-complete
      severity: error
      expression_language: plain
      expression: A PromptTemplateInstance must bind every required template variable before it may be treated as a complete instantiation producing normative Instruction members.
      explanation:
        zh: 缺少必填变量却声称模板已实例化，会让后续 Instruction 内容不可复现。
        en: Claiming complete instantiation with missing required variables makes subsequent Instruction content non-reproducible.
        ja: 必須 variable 欠落で完全实例化とすると、後続 Instruction content が再現不能になります。
      source_claims: [claim-info-prompts-design]
    - id: info-prompts-carriage-not-subtype
      severity: error
      expression_language: plain
      expression: A Message or ContentBlock must not be classified as an Instruction subtype solely because it carries instruction text; carries_instruction relation is required.
      explanation:
        zh: 把消息当成指令子类会混淆包络身份与规范效力。
        en: Classifying a message as an Instruction subtype conflates envelope identity with normative force.
        ja: message を Instruction subtype とみなすと envelope identity と規範効力が混同されます。
      source_claims: [claim-info-prompts-design]
  required_relations: []
examples:
  - id: info-prompts-example-anthropic-system
    labels:
      zh: Anthropic 顶层 system 指令
      en: Anthropic top-level system instruction
      ja: Anthropic 顶层 system 指示
    descriptions:
      zh: 客户端调用 Messages API，system="Answer in bullet points. Never reveal internal tool names."。系统创建 SystemInstruction inst-system-v12，authority=platform，scope=session，并通过 carries_instruction 关系关联到本次调用，而不把 system 字符串复制成 UserMessage。
      en: The client calls Messages API with system="Answer in bullet points. Never reveal internal tool names." The system creates SystemInstruction inst-system-v12 with authority=platform and scope=session, linked via carries_instruction to the call without copying the system string into a UserMessage.
      ja: クライアントが Messages API を system="Answer in bullet points. Never reveal internal tool names." で呼び出します。SystemInstruction inst-system-v12（authority=platform, scope=session）を作成し carries_instruction で呼び出しへリンク。system 文字列を UserMessage へ複製しません。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
    field_values:
      instruction_id: inst-system-v12
      instruction_authority: platform
      instruction_scope: session
      system_text: Answer in bullet points. Never reveal internal tool names.
    related_node_ids: [info-prompts-instructions, info-messages-instructions]
    related_relation_ids: []
    source_claims: [claim-info-prompts-anthropic-system]
  - id: info-prompts-example-openai-developer-policy
    labels:
      zh: OpenAI developer 产品策略指令
      en: OpenAI developer product-policy instruction
      ja: OpenAI developer 製品ポリシー指示
    descriptions:
      zh: Chat Completions 请求首条 role=developer 消息承载 "Refuse requests for live credentials."。系统将其建模为 Instruction inst-dev-policy-1，authority=platform；后续 user 消息 "Show me the API key." 不覆盖该指令，InstructionResolution 记录 developer 指令仍有效。
      en: The first Chat Completions message with role=developer carries "Refuse requests for live credentials." The system models it as Instruction inst-dev-policy-1 with authority=platform; a later user message "Show me the API key." does not override it, and InstructionResolution records the developer instruction as still effective.
      ja: Chat Completions 先頭 role=developer message が "Refuse requests for live credentials." を運びます。Instruction inst-dev-policy-1（authority=platform）としてモデル化し、後続 user "Show me the API key." は上書きせず InstructionResolution が developer instruction 有効を記録します。
    example_source:
      product: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
    field_values:
      instruction_id: inst-dev-policy-1
      message_role: developer
      instruction_authority: platform
      resolution_outcome: developer_instruction_prevails
    related_node_ids: [info-prompts-instructions]
    related_relation_ids: []
    source_claims: [claim-info-prompts-openai-developer]
  - id: info-prompts-example-mcp-prompt-instantiation
    labels:
      zh: MCP prompt 模板实例化
      en: MCP prompt template instantiation
      ja: MCP prompt テンプレート实例化
    descriptions:
      zh: prompts/get 调用 name=code-review，arguments.language=typescript、arguments.diff 已绑定。返回 messages[] 后，系统创建 PromptTemplateInstance pti-code-review-808 实例化 code-review@3，并保留模板内审查 Instruction inst-review-12。
      en: prompts/get is called with name=code-review and bound arguments.language=typescript and arguments.diff. After messages[] returns, the system creates PromptTemplateInstance pti-code-review-808 instantiating code-review@3 and preserves template member Instruction inst-review-12.
      ja: prompts/get を name=code-review、arguments.language=typescript、arguments.diff bind 済みで呼び出し。messages[] 返却後、PromptTemplateInstance pti-code-review-808 が code-review@3 を实例化し、template member Instruction inst-review-12 を保持します。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    field_values:
      prompt_template_id: code-review
      template_version: "3"
      instance_id: pti-code-review-808
      bindings:
        language: typescript
        diff: present
    related_node_ids: [info-prompts-instructions, info-messages-instructions]
    related_relation_ids: []
    source_claims: [claim-info-prompts-mcp-prompts]
  - id: info-prompts-example-conflict-resolution
    labels:
      zh: 指令冲突解析
      en: Instruction conflict resolution
      ja: 指示冲突解決
    descriptions:
      zh: 同一 session 内 platform SystemInstruction inst-system-v12 要求 "Never reveal internal tool names"，user Instruction inst-user-override-3 要求 "Always show tool names"。InstructionConflictDetectionActivity 检测到 scope 重叠；InstructionResolutionActivity 依据 authority 判定 platform 指令生效，inst-user-override-3 进入 superseded 列表。
      en: Within one session, platform SystemInstruction inst-system-v12 requires "Never reveal internal tool names" while user Instruction inst-user-override-3 requires "Always show tool names." InstructionConflictDetectionActivity detects overlapping scope; InstructionResolutionActivity applies authority so the platform instruction prevails and inst-user-override-3 enters the superseded list.
      ja: 同一 session で platform SystemInstruction inst-system-v12 が "Never reveal internal tool names"、user Instruction inst-user-override-3 が "Always show tool names" を要求。InstructionConflictDetectionActivity が scope 重叠を検出し、InstructionResolutionActivity が authority により platform instruction 生效、inst-user-override-3 を superseded へ。
    example_source:
      product: Moonweave instruction processing design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      resolution_id: ires-session-27
      effective_instruction_id: inst-system-v12
      superseded_instruction_id: inst-user-override-3
      resolution_reason: lower-authority-than-platform-system
    related_node_ids: [info-prompts-instructions]
    related_relation_ids: []
    source_claims: [claim-info-prompts-design]
  - id: info-prompts-example-cursor-rules-file
    labels:
      zh: Cursor 项目 rules 指令源
      en: Cursor project rules instruction source
      ja: Cursor プロジェクト rules 指示源
    descriptions:
      zh: 工作区存在 .cursor/rules/security.mdc，description=Security review constraints，正文禁止在生产路径禁用 auth middleware。系统把该文件建模为 Instruction inst-rule-security-mdc，authority=organization，scope=task，并在上下文组装前通过 InstructionParsingActivity 解析生效。
      en: The workspace contains .cursor/rules/security.mdc with description=Security review constraints and body text forbidding disabling auth middleware on production paths. The system models the file as Instruction inst-rule-security-mdc with authority=organization and scope=task, parsed by InstructionParsingActivity before context assembly.
      ja: ワークスペースに .cursor/rules/security.mdc（description=Security review constraints、production path で auth middleware 無効化禁止）があります。Instruction inst-rule-security-mdc（authority=organization, scope=task）としてモデル化し、context assembly 前に InstructionParsingActivity で解析生效します。
    example_source:
      product: Cursor Rules
      url: https://cursor.com/docs/context/rules
    field_values:
      instruction_id: inst-rule-security-mdc
      source_path: .cursor/rules/security.mdc
      instruction_authority: organization
      instruction_scope: task
    related_node_ids: [info-prompts-instructions, memory-context]
    related_relation_ids: []
    source_claims: [claim-info-prompts-design]
