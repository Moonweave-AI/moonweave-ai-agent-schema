schema: moonweave.ai/ontology-node/v1
id: info-prompts-instructions
kind: module
status: accepted
labels:
  zh: 提示与指令
  en: Prompts and instructions
  ja: プロンプトと指示
semantics:
  short_definition:
    zh: 提示与指令区分三件事：PromptTemplate 是可复用并可绑定变量的提示规范；Instruction 是已具备适用条件、权威、作用域和优先级的规范性指示；InstructionProcessing 是解析、检测冲突并形成解决结果的可审计活动。承载它们的消息和文本不因此成为指令子类。
    en: Prompts and instructions describes how reusable prompt templates are bound, how carried content becomes normatively effective Instruction, and how applicability, authority, scope, and precedence are applied by activities to produce auditable resolutions. Sources, rules, and frameworks remain node and relation evidence.
    ja: prompts and instructions は reusable prompt template の binding、carrier content が normative Instruction になる過程、applicability・authority・scope・precedence を activity が適用して監査可能 resolution を作る過程を記述します。source・rule・framework は node/relation evidence に留めます。
  definition:
    zh: 提示与指令描述可复用提示模板如何被绑定、承载内容如何成为具有规范效力的 Instruction，以及适用性、权威、作用域与优先规则如何通过活动形成可审计解析结果。来源、规范与框架仅作为节点和关系证据。
    en: Prompts and instructions describes how reusable prompt templates are bound, how carried content becomes normatively effective Instruction, and how applicability, authority, scope, and precedence are applied by activities to produce auditable resolutions. Sources, rules, and frameworks remain node and relation evidence.
    ja: prompts and instructions は reusable prompt template の binding、carrier content が normative Instruction になる過程、applicability・authority・scope・precedence を activity が適用して監査可能 resolution を作る過程を記述します。source・rule・framework は node/relation evidence に留めます。
  why_needed:
    zh: 重建一次完整的指令生命周期：模板与绑定是什么、哪段内容为何具有规范效力、来自何处、何时适用、权威与范围如何比较、最终哪项生效或被覆盖。
    en: "Reconstruct a complete instruction lifecycle: template and binding, why content has normative effect, its origin and applicability, authority and scope comparison, and which instruction becomes effective or superseded."
    ja: 一つの instruction lifecycle、すなわち template/binding、content の規範効力理由、origin/applicability、authority/scope comparison、effective/superseded instruction を再構成します。
  includes:
    - zh: Instruction、SystemInstruction 及适用性、权威、优先级、来源和作用域元数据。
      en: Instruction, SystemInstruction, and applicability, authority, priority, provenance, and scope metadata.
      ja: Instruction・SystemInstruction と applicability・authority・priority・provenance・scope metadata。
    - zh: PromptTemplate、PromptTemplateInstance、FewShotExample 及其明确组成与实例化关系。
      en: PromptTemplate, PromptTemplateInstance, FewShotExample, and their explicit composition and instantiation facts.
      ja: PromptTemplate・PromptTemplateInstance・FewShotExample と明示 composition/instantiation fact。
    - zh: 解析、冲突检测、解决活动，以及 InstructionResolution 和 InstructionOverrideResolution 结果。
      en: Parsing, conflict-detection, and resolution activities plus InstructionResolution and InstructionOverrideResolution outcomes.
      ja: parsing・conflict-detection・resolution activity と InstructionResolution/InstructionOverrideResolution outcome。
  excludes:
    - zh: Message、ConversationTurn 和包络身份归消息与会话；本模块只引用 carries_instruction。
      en: Message, ConversationTurn, and envelope identity belong to messages and conversations; this module only references carries_instruction.
      ja: Message・ConversationTurn・envelope identity は messages and conversations に属し本 module は carries_instruction のみ参照します。
    - zh: ContentBlock 的媒体、编码和块结构归内容表示，不因文字具有命令语气而进入指令骨架。
      en: ContentBlock media, encoding, and block structure belong to content representation and do not enter the instruction backbone because wording sounds imperative.
      ja: ContentBlock の media・encoding・block structure は content representation に属し命令調 text だけで instruction backbone に入りません。
    - zh: PromptInjectionSignal、威胁分类、污点和 TrustedInstructionOverride 缓解动作归 safety-injection-defense。
      en: PromptInjectionSignal, threat classification, taint, and the TrustedInstructionOverride mitigation action belong to safety-injection-defense.
      ja: PromptInjectionSignal・threat classification・taint・TrustedInstructionOverride mitigation action は safety-injection-defense に属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 重建一次完整的指令生命周期：模板与绑定是什么、哪段内容为何具有规范效力、来自何处、何时适用、权威与范围如何比较、最终哪项生效或被覆盖。
  en: "Reconstruct a complete instruction lifecycle: template and binding, why content has normative effect, its origin and applicability, authority and scope comparison, and which instruction becomes effective or superseded."
  ja: 一つの instruction lifecycle、すなわち template/binding、content の規範効力理由、origin/applicability、authority/scope comparison、effective/superseded instruction を再構成します。
