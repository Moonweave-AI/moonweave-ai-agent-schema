schema: moonweave.ai/ontology-node/v1
id: info-messages-instructions
kind: module
status: accepted
labels:
  zh: 消息与会话
  en: Messages and conversations
  ja: メッセージと会話
semantics:
  short_definition:
    zh: 消息与会话描述一段交互如何由可寻址、有顺序的会话元素组成。Conversation 是唯一根，其下区分轮次、具有发送角色的 Message、独立的历史投影与协议包络；消息承载的内容、指令或工具结果仍由各自模块拥有。
    en: The messages-and-conversations ontology uses Conversation as its key notion and owns logical conversations, addressable conversation elements, turns, message roles, and independent history projections and protocol envelopes. Content carriers, instruction force, context assembly, tool execution, and runtime lifecycle are referenced only by relations.
    ja: メッセージと会話の本体は「会話」（Conversation）をキー概念とし、論理会話、アドレス可能な会話要素、ターン、メッセージ役割、および独立した履歴投影とプロトコル包絡を所有します。内容媒体、指示の規範効力、コンテキスト組立て、ツール実行、実行時ライフサイクルは関係でのみ参照します。
  definition:
    zh: 消息与会话本体以“会话”（Conversation）为关键概念，拥有逻辑会话、可寻址会话元素、轮次、消息角色，以及独立的历史投影和协议包络；内容载体、指令效力、上下文装配、工具执行与运行生命周期只通过关系引用。
    en: The messages-and-conversations ontology uses Conversation as its key notion and owns logical conversations, addressable conversation elements, turns, message roles, and independent history projections and protocol envelopes. Content carriers, instruction force, context assembly, tool execution, and runtime lifecycle are referenced only by relations.
    ja: メッセージと会話の本体は「会話」（Conversation）をキー概念とし、論理会話、アドレス可能な会話要素、ターン、メッセージ役割、および独立した履歴投影とプロトコル包絡を所有します。内容媒体、指示の規範効力、コンテキスト組立て、ツール実行、実行時ライフサイクルは関係でのみ参照します。
  why_needed:
    zh: 用一棵无漏级、无冗余快捷边的会话树重建谁在何处发送了什么，以及该通信如何被历史和协议引用。
    en: Reconstruct who communicated what and where, plus how that communication is referenced by history and protocol, through a conversation tree with no skipped levels or redundant shortcut edges.
    ja: level skipやredundant shortcut edgeのないconversation treeで誰が何をどこで通信しhistory/protocolがどう参照するか再構成します。
  includes:
    - zh: Conversation → ConversationElement → ConversationTurn/Message → 角色消息的分类与组成主干。
      en: The Conversation → ConversationElement → ConversationTurn/Message → role-message taxonomy and composition backbone.
      ja: Conversation→ConversationElement→ConversationTurn/Message→role-messageのtaxonomy/composition backbone。
    - zh: MessageHistory 与 ProtocolEnvelope 两个独立关键根，以及必要的顺序、内容、指令、上下文、回复、安全扫描和工具结果引用。
      en: Independent MessageHistory and ProtocolEnvelope key roots plus necessary order, content, instruction, context, reply, safety-scan, and tool-result references.
      ja: 独立MessageHistory/ProtocolEnvelope key rootと必要order・content・instruction・context・reply・safety-scan・tool-result reference。
  excludes:
    - zh: ContentBlock 的模态与编码归内容表示；Instruction 的规范身份归提示与指令；二者不因被消息承载而成为消息子类。
      en: ContentBlock modality and encoding belong to content representation, while Instruction's normative identity belongs to prompts and instructions; carriage does not make either a Message subtype.
      ja: ContentBlock modality/encodingはcontent representation、Instruction normative identityはprompts/instructionsが所有しcarriageでMessage subtypeになりません。
    - zh: ContextPackage、ToolResult、RuntimeSession、MCP participant/session/transport 和 PatternScan 活动由各自本体拥有。
      en: ContextPackage, ToolResult, RuntimeSession, MCP participants/sessions/transports, and PatternScan activities remain owned by their respective ontologies.
      ja: ContextPackage・ToolResult・RuntimeSession・MCP participant/session/transport・PatternScan activityは各ontologyが所有します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 用一棵无漏级、无冗余快捷边的会话树重建谁在何处发送了什么，以及该通信如何被历史和协议引用。
  en: Reconstruct who communicated what and where, plus how that communication is referenced by history and protocol, through a conversation tree with no skipped levels or redundant shortcut edges.
  ja: level skipやredundant shortcut edgeのないconversation treeで誰が何をどこで通信しhistory/protocolがどう参照するか再構成します。
