        zh: ToolResultMessage 记录工具结果进入哪次会话、哪一轮次和哪个消息包络；这些身份条件不同于返回载荷和调用尝试。因此消息与会话拥有 ToolResultMessage，并通过 references_tool_result 引用 ToolResult。
        en: ToolResultMessage records the conversation, turn, and message envelope through which a tool result entered dialogue; those identity conditions differ from the returned payload and invocation attempt. Messages and conversations therefore own ToolResultMessage and reference ToolResult through references_tool_result.
        ja: ToolResultMessage は tool result が入った会話、turn、message 包絡を記録し、その同一性条件は返却ペイロードや invocation attempt と異なります。したがって messages/conversations が所有し references_tool_result で ToolResult を参照します。
