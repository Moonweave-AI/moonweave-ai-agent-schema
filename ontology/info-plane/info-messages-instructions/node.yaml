        zh: 本行拥有实际 Message：其身份由 message_id、Conversation/Turn 位置、发送角色和有序内容决定。ProtocolMessageMapping 只把某协议版本的消息构造对应到该稳定语义；maps_to 不把协议映射提升为消息，也不把协议字段复制进消息分类树。
        en: This row owns the actual Message, whose identity is determined by message_id, Conversation or Turn position, sender role, and ordered content. ProtocolMessageMapping only maps a versioned protocol construct to that stable meaning; maps_to neither turns the mapping into a message nor copies protocol fields into the message taxonomy.
