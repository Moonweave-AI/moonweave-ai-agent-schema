schema: moonweave.ai/ontology-node/v1
id: info-messages-instructions
kind: module
labels:
  zh: 消息与会话
  en: Messages and conversations
  ja: メッセージと会話
semantics:
  short_definition:
    zh: 消息与会话描述一次交互中谁以何种角色、以什么顺序发送了哪些可寻址消息，以及这些消息如何被历史与协议引用。
    en: Messages and conversations describe who sent which addressable messages in what role and order during one interaction, and how those messages are referenced by history and protocol envelopes.
    ja: メッセージと会話は、一回の対話で誰がどの role でどの順序でアドレス可能なメッセージを送ったか、および履歴とプロトコル包絡がそれらをどう参照するかを記述します。
  definition:
    zh: 本模块以 Conversation 为关键概念，拥有逻辑会话、可寻址会话元素、轮次分组、消息角色分类，以及独立的历史投影与协议包络。Message 的身份由会话位置、发送角色和消息标识共同决定；其承载的 ContentBlock、Instruction 或 ToolResult 只通过关系引用，不因被承载而成为 Message 的子类。OpenAI Chat Completions 的 role/content 数组、Anthropic Messages 的 role 加 content block、MCP prompts/get 返回的 messages 数组，以及 A2A Message 的 role 加 parts，都映射到同一套会话树，而不复制任一厂商的完整 wire 载荷。ContextPackage 组装、工具执行结果身份和运行生命周期事件归各自模块，本模块最多引用它们作为消息来源或关联对象。
    en: This module uses Conversation as its key notion and owns logical conversations, addressable conversation elements, turn grouping, message-role taxonomy, and independent history projections and protocol envelopes. A Message is identified jointly by conversation position, sender role, and message ID; carried ContentBlocks, Instructions, or ToolResults are referenced only through relations and do not become Message subtypes because they are carried. OpenAI Chat Completions role/content arrays, Anthropic Messages role plus content blocks, MCP prompts/get message arrays, and A2A Message role plus parts all map to one conversation tree without copying any vendor's full wire payload. ContextPackage assembly, tool-execution result identity, and runtime lifecycle events belong to their owning modules; this module references them at most as message sources or linked objects.
    ja: 本モジュールは Conversation をキー概念とし、論理会話、アドレス可能な会話要素、ターン分组、メッセージ role 分類、独立した履歴投影とプロトコル包絡を所有します。Message の identity は会話位置・送信 role・message ID で決まり、運搬される ContentBlock・Instruction・ToolResult は relation 参照のみで Message subtype にはなりません。OpenAI Chat Completions の role/content 配列、Anthropic Messages の role+content block、MCP prompts/get の messages 配列、A2A Message の role+parts はいずれも一つの会話木へ写像し、ベンダー完全 wire ペイロードは複製しません。ContextPackage 組立、ツール実行結果 identity、実行ライフサイクル event は各 owner module に属し、本 module は message source として参照するだけです。
  why_needed:
    zh: 没有这一模块，系统只能看到厂商 API 的原始 JSON，无法一致回答“这条 user 消息在第几轮、assistant 的 tool_use 与后续 tool_result 如何配对、MCP prompt 模板实例化后对应哪条会话消息”。跨协议映射、历史重放和引用审计都会失去共同语义骨架。
    en: Without this module, a system only sees vendor API JSON and cannot consistently answer which turn a user message belongs to, how an assistant tool_use pairs with a later tool_result, or which conversation message an MCP prompt instantiation produced. Cross-protocol mapping, history replay, and citation audit lose a shared semantic backbone.
    ja: この module がなければベンダー API JSON しか見えず、user message の turn、assistant tool_use と後続 tool_result の対応、MCP prompt 实例化がどの会話 message に対応するかを一貫して答えられません。プロトコル横断写像、履歴再生、引用監査の共通 semantic backbone が失われます。
  includes:
    - zh: Conversation → ConversationElement → ConversationTurn/Message 的分类与组成主干，以及 UserMessage、AssistantMessage、SystemMessage、ToolResultMessage 等角色消息类型。
      en: The Conversation → ConversationElement → ConversationTurn/Message taxonomy and composition backbone, plus role-message types such as UserMessage, AssistantMessage, SystemMessage, and ToolResultMessage.
      ja: Conversation→ConversationElement→ConversationTurn/Message の taxonomy/composition backbone と UserMessage・AssistantMessage・SystemMessage・ToolResultMessage 等の role message 型。
    - zh: MessageHistory 与 ProtocolEnvelope 两个独立关键根，以及消息顺序、内容承载、指令引用、上下文引用、回复关联和工具结果引用关系。
      en: Independent MessageHistory and ProtocolEnvelope key roots, plus message order, content carriage, instruction reference, context reference, reply linkage, and tool-result reference relations.
      ja: 独立 MessageHistory/ProtocolEnvelope key root と message order・content carriage・instruction reference・context reference・reply linkage・tool-result reference relation。
  excludes:
    - zh: ContentBlock 的模态与编码归内容表示；Instruction 的规范身份归提示与指令；二者不因被消息承载而成为 Message 子类。
      en: ContentBlock modality and encoding belong to content representation; Instruction normative identity belongs to prompts and instructions; carriage does not make either a Message subtype.
      ja: ContentBlock modality/encoding は content representation、Instruction normative identity は prompts/instructions が所有し、carriage だけで Message subtype にはなりません。
    - zh: ContextPackage、ToolResult 执行身份、RuntimeSession 与 MCP participant/session/transport 归各自模块；本模块只记录消息如何引用它们。
      en: ContextPackage, ToolResult execution identity, RuntimeSession, and MCP participant/session/transport belong to their modules; this module only records how messages reference them.
      ja: ContextPackage、ToolResult 実行 identity、RuntimeSession、MCP participant/session/transport は各 module が所有し、本 module は message がどう参照するかだけを記録します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 主流协议都把“谁在说话（role）”“说了什么（content/parts/blocks）”“属于哪段会话（conversation/history）”拆成不同字段。本模块用这些权威 wire 形状说明消息与会话的工程边界：OpenAI 把 system 放在 messages 数组或独立 instructions 参数；Anthropic 把 system 作为顶层参数、turn 内用 content block 数组表达多模态与工具往返；MCP prompts/get 直接返回可注入模型的 messages 数组；A2A 用 Message.role 加 parts[] 表达 agent/user 往返。Moonweave 保留 role、顺序与消息 identity，把具体 part/block 类型交给内容表示模块。
    en: Mainstream protocols split who is speaking (role), what was said (content/parts/blocks), and which conversation segment it belongs to (conversation/history) into different fields. This module uses those authoritative wire shapes to explain message-and-conversation boundaries. OpenAI places system in the messages array or a separate instructions parameter; Anthropic passes system as a top-level parameter and uses content-block arrays within a turn for multimodal and tool round-trips; MCP prompts/get returns injectable message arrays; A2A uses Message.role plus parts[] for agent/user exchange. Moonweave keeps role, order, and message identity while delegating concrete part/block types to content representation.
    ja: 主要プロトコルは「誰が話すか(role)」「何を言ったか(content/parts/blocks)」「どの会話区間か(conversation/history)」を別フィールドに分けます。本 module は権威 wire 形状で message/conversation 境界を示します。OpenAI は system を messages 配列または独立 instructions 参数へ、Anthropic は system を top-level 参数、turn 内 content block 配列でマルチモーダル/tool 往復、MCP prompts/get は inject 可能 messages 配列、A2A は Message.role+parts[] で agent/user 往復。Moonweave は role・順序・message identity を保持し、具体 part/block 型は content representation へ委譲します。
  typical_input:
    - description: OpenAI Chat Completions — role/content with multimodal content parts and developer role.
      format: |
        POST https://api.openai.com/v1/chat/completions
        {
          "model": "gpt-4o",
          "messages": [
            {"role": "developer", "content": "You are a concise assistant."},
            {
              "role": "user",
              "content": [
                {"type": "text", "text": "Transcribe this clip."},
                {
                  "type": "input_audio",
                  "input_audio": {"data": "<base64>", "format": "wav"}
                }
              ]
            }
          ]
        }
      source_claims: [claim-info-messages-openai-roles]
    - description: Anthropic Messages API — system as top-level param; turns use content blocks.
      format: |
        POST https://api.anthropic.com/v1/messages
        {
          "model": "claude-sonnet-4-20250514",
          "max_tokens": 1024,
          "system": "Answer in bullet points.",
          "messages": [
            {"role": "user", "content": [{"type": "text", "text": "Summarize this chart."}, {"type": "image", "source": {"type": "url", "url": "https://example.com/chart.png"}}]},
            {"role": "assistant", "content": [{"type": "tool_use", "id": "toolu_01", "name": "lookup", "input": {"id": "Q1"}}]},
            {"role": "user", "content": [{"type": "tool_result", "tool_use_id": "toolu_01", "content": "Revenue +12%"}]}
          ]
        }
      source_claims: [claim-info-messages-anthropic-blocks]
    - description: MCP prompts/get — server returns a messages array for model injection.
      format: |
        {"jsonrpc":"2.0","id":4,"method":"prompts/get","params":{"name":"code-review","arguments":{"language":"typescript"}}}
        =>
        {
          "description": "Review TypeScript changes",
          "messages": [
            {"role":"user","content":{"type":"text","text":"Review the following diff for security issues:\n{{diff}}"}},
            {"role":"assistant","content":{"type":"text","text":"I will focus on auth boundaries and input validation."}}
          ]
        }
      source_claims: [claim-info-messages-mcp-prompts]
    - description: A2A Message — role plus ordered Parts (TextPart, FilePart, DataPart).
      format: |
        {
          "messageId": "msg-a2a-441",
          "role": "agent",
          "parts": [
            {"kind": "text", "text": "Invoice summary attached."},
            {"kind": "file", "file": {"name": "invoice-441.pdf", "mimeType": "application/pdf", "bytes": "<base64>"}},
            {"kind": "data", "data": {"total_usd": 128.40, "currency": "USD"}}
          ],
          "contextId": "ctx-billing-27",
          "taskId": "task-a2a-551"
        }
      source_claims: [claim-info-messages-a2a-parts]
  typical_output:
    - description: Moonweave-local conversation projection — ordered messages with role and content-block refs.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "conversation_id": "conv-support-042",
          "message_ids": ["msg-042-1", "msg-042-2"],
          "turn_ids": ["turn-042-1", "turn-042-2"],
          "messages": [
            {"message_id": "msg-042-1", "role": "user", "content_block_ids": ["text-042-1"]},
            {"message_id": "msg-042-2", "role": "assistant", "content_block_ids": ["text-042-2", "tool-use-042-1"]}
          ]
        }
      source_claims: [claim-info-messages-design]
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: system, user, assistant, developer, and tool roles with text, image_url, and input_audio content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Top-level system parameter and ordered text, image, tool_use, and tool_result content blocks per role.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns description plus messages array with role and content for model injection.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message object with role, messageId, contextId, taskId, and ordered text/file/data Parts.
structure:
  identity_keys: [conversation_id, message_id]
  fields:
    - id: conversation_id
      labels: {zh: 会话标识, en: Conversation identifier, ja: 会話識別子}
      definitions:
        zh: 唯一标识一段逻辑会话的稳定 ID；同一 contextId 或 thread 下的消息必须能归并到同一会话或显式分叉记录。
        en: Stable ID uniquely identifying one logical conversation; messages under the same contextId or thread must merge into one conversation or record an explicit fork.
        ja: 一つの論理会話を一意識別する安定 ID。同一 contextId/thread 下の message は一会話へ統合するか明示 fork を記録します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: conv-support-042
      allowed_values: []
      source_claims: [claim-info-messages-design, claim-info-messages-a2a-parts]
    - id: message_id
      labels: {zh: 消息标识, en: Message identifier, ja: メッセージ識別子}
      definitions:
        zh: 在会话内唯一标识一条 Message 的稳定 ID，对应 OpenAI message id、Anthropic message 顺序位次、MCP prompt message 序号或 A2A messageId。
        en: Stable ID uniquely identifying one Message within a conversation; maps to OpenAI message id, Anthropic turn order, MCP prompt message index, or A2A messageId.
        ja: 会話内で一 Message を一意識別する安定 ID。OpenAI message id、Anthropic turn 順位、MCP prompt message index、A2A messageId に対応します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: msg-042-1
      allowed_values: []
      source_claims: [claim-info-messages-openai-roles, claim-info-messages-a2a-parts]
    - id: message_role
      labels: {zh: 消息角色, en: Message role, ja: メッセージ役割}
      definitions:
        zh: 协议规定的发送方角色：OpenAI/Anthropic 的 user、assistant、system、tool/developer；A2A 的 user/agent；MCP prompt message 的 user/assistant。
        en: Protocol-defined sender role such as OpenAI/Anthropic user, assistant, system, tool, or developer; A2A user or agent; MCP prompt user or assistant.
        ja: OpenAI/Anthropic の user/assistant/system/tool/developer、A2A の user/agent、MCP prompt の user/assistant などプロトコル定義の送信 role。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: user
      allowed_values: [user, assistant, system, tool, developer, agent]
      source_claims: [claim-info-messages-openai-roles, claim-info-messages-anthropic-blocks, claim-info-messages-a2a-parts]
    - id: content_part_type
      labels: {zh: 内容部分类型, en: Content part type, ja: 内容パート種別}
      definitions:
        zh: 单条消息内一个内容部分的类型，例如 text、image_url、input_audio、tool_use、tool_result，或 A2A text/file/data kind。
        en: Type of one content part within a message, such as text, image_url, input_audio, tool_use, tool_result, or A2A text/file/data kind.
        ja: message 内一 content part の型。text、image_url、input_audio、tool_use、tool_result、A2A text/file/data kind など。
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: tool_use
      allowed_values: [text, image_url, input_audio, tool_use, tool_result, image, file, data]
      source_claims: [claim-info-messages-openai-roles, claim-info-messages-anthropic-blocks, claim-info-messages-a2a-parts]
    - id: tool_use_id
      labels: {zh: 工具调用标识, en: Tool use identifier, ja: ツール呼び出し識別子}
      definitions:
        zh: assistant 侧 tool_use block 的唯一 ID；后续 user/tool_result 消息必须通过 tool_use_id 引用它。
        en: Unique ID of an assistant-side tool_use block; later user or tool_result messages must reference it via tool_use_id.
        ja: assistant 側 tool_use block の一意 ID。後続 user/tool_result message は tool_use_id で参照必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: toolu_01A2B3
      allowed_values: []
      source_claims: [claim-info-messages-anthropic-blocks]
  constraints:
    - id: info-messages-tool-result-pairs-tool-use
      severity: error
      expression_language: plain
      expression: Every tool_result content block must reference the tool_use_id of a prior assistant tool_use block in the same conversation thread.
      explanation:
        zh: 孤立的 tool_result 无法解释对应哪次工具调用，会破坏可复现的交互语义。
        en: An orphan tool_result cannot explain which tool invocation it answers, breaking reproducible interaction semantics.
        ja: 孤立 tool_result はどの tool 呼び出しへの応答か説明できず、再現可能な対話意味を壊します。
      source_claims: [claim-info-messages-anthropic-blocks]
    - id: info-messages-role-required
      severity: error
      expression_language: plain
      expression: Every Message must declare a protocol-supported message_role; anonymous payloads without role must not be registered as Message evidence.
      explanation:
        zh: 没有 role，就无法在会话树中定位发送方语义，也无法与厂商 API 对齐。
        en: Without role, sender semantics cannot be placed in the conversation tree or aligned with vendor APIs.
        ja: role がなければ送信者意味を会話木に配置できず、ベンダー API と整合できません。
      source_claims: [claim-info-messages-openai-roles]
  required_relations: []
examples:
  - id: info-messages-example-openai-multimodal-user
    labels:
      zh: OpenAI 多模态 user 消息
      en: OpenAI multimodal user message
      ja: OpenAI マルチモーダル user メッセージ
    descriptions:
      zh: 用户通过 Chat Completions 发送 role=user 消息，content 数组同时包含 type=text 与 type=image_url（detail=auto）。系统把每个 part 映射为独立 content block，绑定同一 message_id=msg-842-1，并在进入会话 conv-support-042 时保留 part 顺序。
      en: A user sends role=user via Chat Completions with a content array containing type=text and type=image_url (detail=auto). Each part maps to a separate content block under message_id=msg-842-1, preserving part order when entering conversation conv-support-042.
      ja: 利用者が Chat Completions で role=user を送り、content 配列に type=text と type=image_url（detail=auto）を含めます。各 part を別 content block として message_id=msg-842-1 に束ね、conv-support-042 投入時に part 順序を保持します。
    example_source:
      product: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
    field_values:
      api_endpoint: POST /v1/chat/completions
      conversation_id: conv-support-042
      message_id: msg-842-1
      message_role: user
      content_parts:
        - type: text
          text: What is in this architecture diagram?
        - type: image_url
          image_url:
            url: https://example.com/arch.png
            detail: auto
    related_node_ids: [info-messages-instructions, info-content-block-modality]
    related_relation_ids: []
    source_claims: [claim-info-messages-openai-roles]
  - id: info-messages-example-anthropic-system-and-tool-roundtrip
    labels:
      zh: Anthropic system 参数与 tool 往返
      en: Anthropic system parameter and tool round-trip
      ja: Anthropic system 参数と tool 往復
    descriptions:
      zh: 客户端调用 Messages API，system 作为顶层字符串传入；user turn 含 text block；assistant 返回 tool_use（id=toolu_01, name=get_weather）；user follow-up 携带 tool_result（tool_use_id=toolu_01）。系统把 system 建模为独立 SystemInstruction 引用，三次 turn 按会话顺序链接。
      en: The client calls Messages API with system as a top-level string; a user turn contains a text block; the assistant returns tool_use (id=toolu_01, name=get_weather); a user follow-up carries tool_result (tool_use_id=toolu_01). System is modeled as a separate SystemInstruction reference and the three turns link in conversation order.
      ja: クライアントが Messages API を呼び system を top-level 文字列で渡します。user turn に text block、assistant が tool_use（id=toolu_01, name=get_weather）を返し、user follow-up が tool_result（tool_use_id=toolu_01）を含みます。system は独立 SystemInstruction 参照としてモデル化し、三 turn を会話順にリンクします。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
    field_values:
      api_endpoint: POST /v1/messages
      system: Answer briefly in Celsius when reporting weather.
      tool_use_id: toolu_01
      tool_name: get_weather
      tool_result_content: 22°C, cloudy
      message_ids: [msg-901-user, msg-902-assistant, msg-903-user]
    related_node_ids: [info-messages-instructions, info-prompts-instructions]
    related_relation_ids: []
    source_claims: [claim-info-messages-anthropic-blocks]
  - id: info-messages-example-mcp-prompts-get
    labels:
      zh: MCP prompts/get 消息模板
      en: MCP prompts/get message template
      ja: MCP prompts/get メッセージテンプレート
    descriptions:
      zh: 客户端对 MCP 服务器调用 prompts/get，params.name=code-review，arguments.language=typescript。响应 messages[] 含 role=user 与 role=assistant 两条模板消息。系统为每条响应消息创建 message_id，并记录其来自 prompt template 而非 live user input。
      en: The client calls prompts/get on an MCP server with params.name=code-review and arguments.language=typescript. The response messages[] contains role=user and role=assistant template messages. The system assigns a message_id to each response message and records that it originated from a prompt template rather than live user input.
      ja: クライアントが MCP サーバーへ prompts/get を呼び params.name=code-review、arguments.language=typescript を指定します。応答 messages[] に role=user と role=assistant の template message が含まれます。各応答 message に message_id を付与し、live user input ではなく prompt template 由来と記録します。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
    field_values:
      jsonrpc_method: prompts/get
      prompt_name: code-review
      prompt_arguments:
        language: typescript
      response_messages:
        - role: user
          content: Review the following diff for security issues.
        - role: assistant
          content: I will focus on auth boundaries and input validation.
    related_node_ids: [info-messages-instructions, info-prompts-instructions]
    related_relation_ids: []
    source_claims: [claim-info-messages-mcp-prompts]
  - id: info-messages-example-a2a-agent-message-parts
    labels:
      zh: A2A agent Message 与多类型 Part
      en: A2A agent Message with multimodal Parts
      ja: A2A agent Message と多型 Part
    descriptions:
      zh: billing_agent 在 task-a2a-551 中发送 role=agent 的 Message，messageId=msg-a2a-441，parts 含 kind=text、kind=file（invoice-441.pdf）与 kind=data（total_usd=128.40）。系统把每个 Part 映射为 content block，保留 contextId 与 taskId 作为会话关联字段。
      en: billing_agent sends a role=agent Message in task-a2a-551 with messageId=msg-a2a-441 and parts containing kind=text, kind=file (invoice-441.pdf), and kind=data (total_usd=128.40). Each Part maps to a content block while contextId and taskId remain conversation correlation fields.
      ja: billing_agent が task-a2a-551 で role=agent の Message（messageId=msg-a2a-441）を送り、parts に kind=text、kind=file（invoice-441.pdf）、kind=data（total_usd=128.40）を含めます。各 Part を content block へ写像し、contextId と taskId を会話 correlation フィールドとして保持します。
    example_source:
