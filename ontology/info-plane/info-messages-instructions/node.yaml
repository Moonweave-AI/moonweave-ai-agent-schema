          decision_note:
            zh: 已逐节点、逐字段、逐关系核验 13 个概念与 20 条必要关系，并废弃 5 条漏级、逆向重复或措辞冗余边。
            en: Thirteen concepts and twenty necessary relations were reviewed node by node, field by field, and edge by edge; five skipped-level, inverse-duplicate, or redundantly worded edges were deprecated.
            ja: 13 concept/20必要relationをnode・field・edge別に審査しlevel skip・inverse duplicate・冗長wordingの五edgeを廃止しました。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: Conversation 是唯一主根：contains 展开 ConversationElement，后者以 is_a 分出 ConversationTurn 与 Message，Message 再分出各角色消息。Conversation 通过反向展示的 MessageHistory snapshot_of Conversation 接到历史投影；Message 通过反向展示的 ProtocolEnvelope wraps Message 接到协议包络。两条关系保留各自 canonical 方向，只提供类级主阅读，不把历史或包络误说成会话元素，也不宣称每个会话已有快照、每条内存消息已序列化。
            en: "Conversation is the sole primary root. contains unfolds ConversationElement, which specializes through is_a into ConversationTurn and Message, and Message then specializes into role messages. Conversation reaches its history projection through the reverse display of MessageHistory snapshot_of Conversation; Message reaches its protocol envelope through the reverse display of ProtocolEnvelope wraps Message. Both relations retain their canonical directions and provide only a class-level primary reading: neither history nor envelope becomes a ConversationElement, and the layout does not claim every conversation has a snapshot or every in-memory message is serialized."
            ja: Conversation を唯一 primary root とします。contains で ConversationElement を展開し、is_a で ConversationTurn と Message に分け、Message はさらに role message に特殊化します。Conversation は MessageHistory snapshot_of Conversation の reverse display で history projection に、Message は ProtocolEnvelope wraps Message の reverse display で protocol envelope に接続します。両 relation は canonical direction を維持する class-level primary reading で、history/envelope を ConversationElement にせず、全 conversation が snapshot 済み、全 in-memory message が serialized 済みとも主張しません。
