module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: 协议包络或已建立轮次把 Message 接入会话；输入事实只决定通信位置，不决定内容模态或指令效力。
          en: A protocol envelope or established turn admits Message into the conversation; input facts determine communication position, not content modality or instruction force.
          ja: protocol envelopeまたはestablished turnがMessageをconversationへ入れinput factはcommunication positionだけを決めcontent modality/instruction forceを決めません。
        family_concept_ids:
          - Message
        relation_ids:
          - ProtocolEnvelope-wraps-Message
          - ConversationTurn-contains_message-Message
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: Message 可承载 Instruction 和有序 ContentBlock；二者由各自唯一所有者定义，并通过明确关系输出。
          en: Message may carry Instruction and ordered ContentBlock members; each is defined by its unique owner and exposed through explicit relations.
          ja: MessageはInstructionとordered ContentBlockを運び得て各unique ownerが定義し明示relationで出力します。
        family_concept_ids:
          - Instruction
          - ContentBlock
        relation_ids:
          - Message-carries_instruction-Instruction
          - Message-contains_content_block-ContentBlock
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本模块记录失败消息的通信身份，但运行失败判定、错误产物和恢复状态由运行或工具调用本体拥有。
          en: This module records the communication identity of failure messages, while runtime-failure adjudication, error artifacts, and recovery state are owned by runtime or tool-invocation ontologies.
          ja: このmoduleはfailure messageのcommunication identityを記録しruntime-failure adjudication・error artifact・recovery stateはruntime/tool-invocation ontologyが所有します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 发送或引用一条消息不会启动恢复流程；恢复活动只可引用 Message 或 ConversationTurn 作为证据位置。
          en: Sending or referencing a message does not start recovery; a recovery activity may only reference Message or ConversationTurn as an evidence location.
          ja: messageの送信/参照はrecoveryを開始せずrecovery activityはevidence locationとしてMessage/ConversationTurnを参照するだけです。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 领域逐项核验把会话身份、轮次分组、角色消息、历史投影和线路包络分开：Conversation 拥有逻辑通信容器，MessageHistory 是某检查点的有序投影，ProtocolEnvelope 是一次线路编码边界。内容块、指令权威、工具结果和上下文包仍由各自模块拥有，只通过明确关系引用；不能因一条消息承载它们就复制节点或改变 owner。
            en: Point-by-point domain review separates conversation identity, optional turn grouping, role messages, history projections, and wire envelopes. Conversation owns the logical communication container, MessageHistory is an ordered projection at a checkpoint, and ProtocolEnvelope is one wire-encoding boundary. Content blocks, instruction authority, tool results, and context packages remain owned by their modules and are only referenced through explicit relations; carriage by a message neither duplicates their nodes nor changes their owner.
            ja: domain 個別審査は conversation identity、optional turn grouping、role message、history projection、wire envelope を分離します。Conversation は logical communication container、MessageHistory は checkpoint 時の ordered projection、ProtocolEnvelope は一回の wire-encoding boundary です。content block・instruction authority・tool result・context package は各 module が所有し、明示 relation だけで参照され、message が運んでも node 複製や owner 変更はしません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: Conversation 是唯一根：contains 展开 ConversationElement 与 Message；Message 再以反向展示 wraps 接到 ProtocolEnvelope；Conversation 以反向展示 snapshot_of 接到 MessageHistory。包络说明协议承载，历史说明某检查点的有序成员，两者不再作为并列根，也不互相替代。
            en: Conversation is the sole root. contains unfolds ConversationElement and Message; Message then reaches ProtocolEnvelope through reversed-display wraps, while Conversation reaches MessageHistory through reversed-display snapshot_of. The envelope explains protocol carriage and the history explains ordered membership at a checkpoint; neither remains a peer root or substitutes for the other.
            ja: Conversation を唯一 root とします。contains で ConversationElement と Message を展開し、Message から reverse-display wraps で ProtocolEnvelope、Conversation から reverse-display snapshot_of で MessageHistory に接続します。envelope は protocol carriage、history は checkpoint 時の ordered membership を説明し、並列 root にせず相互代替もしません。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Conversation
    allowed_backbone_predicates:
