        en: This row references only ContentBlock, the content-domain endpoint of the accepted Message contains_content_block ContentBlock relation. Carriage by Message changes neither ContentBlock's payload class, local fields, media type, encoding boundary, nor owner. TextBlock is not an endpoint of this cross-boundary edge, and its is_a relation remains internal to content representation.
        ja: この行が参照するのは、承認済み Message contains_content_block ContentBlock 関係の content-domain 側 endpoint である ContentBlock だけです。Message に運ばれても payload class・局所項目・media type・encoding boundary・owner は変わりません。TextBlock はこの跨域辺の endpoint ではなく、その is_a 関係は content representation 内部に留めます。
