schema: moonweave.ai/ontology-node/v1
id: ExternalAgentMessage
kind: concept
labels:
  zh: 外部智能体消息
  en: External-agent message
  ja: 外部エージェントメッセージ
semantics:
  short_definition:
    zh: 由外部 A2A 智能体以 agent 角色发送的跨系统消息。
    en: Cross-system message sent by an external A2A agent with agent role.
    ja: 外部 A2A agent が agent role で送る cross-system message。
  definition:
    zh: ExternalAgentMessage 映射 A2A Message role:agent（以及协议等价的 remote agent 角色）；external_agent_id 指向远程智能体，task_id/context_id 保存协议关联字段。它不是本地 AssistantMessage，也不是 ToolResult 或 Artifact。
    en: ExternalAgentMessage maps A2A Message role:agent (and protocol-equivalent remote-agent roles). external_agent_id references the remote agent; task_id/context_id preserve protocol correlation. It is not a local AssistantMessage, ToolResult, or Artifact.
    ja: ExternalAgentMessage は A2A role:agent に写像。local AssistantMessage ではない。
  why_needed:
    zh: 区分本地助手发言与远端智能体通信，保留跨组织身份、协议语境和信任边界，而不复制整个 A2A 任务模型。
    en: Distinguishes local assistant speech from remote-agent communication, preserving cross-organization identity, protocol context, and trust boundary without duplicating the A2A task model.
    ja: local assistant発話とremote-agent communicationを区別しA2A task modelを複製せずcross-organization identity・protocol context・trust boundaryを保持します。
  includes:
    - zh: 纳入发送者可由外部 agent_id 或 AgentCard 确认、并封装为本地 Message 的 A2A 通信。
      en: Includes A2A communications whose sender is confirmed by external agent_id or AgentCard and normalized as a local Message.
      ja: senderをexternal agent_id/AgentCardで確認しlocal MessageへnormalizeしたA2A communicationを含みます。
  excludes:
    - zh: 排除本地 AssistantMessage、MCP 工具响应、AgentActor、DelegationRecord 和未经认证的外部文本。
      en: Excludes local AssistantMessage, MCP tool responses, AgentActor, DelegationRecord, and unauthenticated external text.
      ja: local AssistantMessage・MCP tool response・AgentActor・DelegationRecord・未認証external textを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: A2A Message 含 messageId、role、contextId、taskId、parts[]；ExternalAgentMessage 保留这些关联字段并把 Part 映射为 content block。与本地 assistant 输出共存于同一 Conversation 时靠 sender_id 与 role 区分。
    en: A2A Message includes messageId, role, contextId, taskId, parts[]; ExternalAgentMessage preserves correlation fields and maps Parts to content blocks. When coexisting with local assistant output in one Conversation, sender_id and role distinguish them.
    ja: A2A agent Message を ExternalAgentMessage として記録。
  typical_input:
    - description: A2A agent message
      format: '{"messageId":"msg-a2a-441","role":"agent","contextId":"ctx-billing-27","taskId":"task-a2a-551","parts":[{"kind":"text","text":"Summary attached."}]}'
      source_claims:
        - claim-external-a2a
  typical_output:
    - description: External agent identity
      format: '{"message_id":"msg-a2a-441","external_agent_id":"Agent:billing-agent","task_id":"task-a2a-551"}'
      source_claims:
        - claim-external-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: external_agent_id
      labels:
        zh: 外部智能体标识
        en: external agent ID
        ja: 外部agent ID
      definitions:
        zh: 引用通过协议身份验证的远端智能体。
        en: References the remote agent authenticated through protocol identity.
        ja: protocol identityで認証されたremote agentを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: AgentActor:partner-booking
      allowed_values: []
      source_claims:
        - claim-external-agent-message-002
    - id: task_id
      labels:
        zh: 外部任务标识
        en: task ID
        ja: 外部task ID
      definitions:
        zh: 保存 A2A 消息可选关联的任务标识。
        en: Preserves the optional task identifier associated with an A2A message.
        ja: A2A messageに関連する任意task identifierを保持します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: a2a-task-771
      allowed_values: []
      source_claims:
        - claim-external-agent-message-003
  constraints: []
  required_relations: []
examples:
  - id: ExternalAgentMessage-example-a2a-agent
    labels:
      zh: A2A agent 消息
      en: A2A agent message
      ja: A2A agent message
    descriptions:
      zh: billing_agent 发送 msg-a2a-441 role=agent 含 invoice file Part。
      en: billing_agent sends msg-a2a-441 role=agent with invoice file Part.
      ja: billing_agent の agent message。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: role=agent
    field_values:
      message_id: msg-a2a-441
      external_agent_id: Agent:billing-agent
      task_id: task-a2a-551
    related_node_ids:
      - ExternalAgentMessage
    related_relation_ids: []
    source_claims:
      - claim-external-a2a
  - id: ExternalAgentMessage-example-context-task
    labels:
      zh: contextId 与 taskId
      en: contextId and taskId
      ja: contextId と taskId
    descriptions:
      zh: protocol_context_id=ctx-billing-27 与 task_id=task-a2a-551 关联到 conversation_id=conv-billing-27。
      en: protocol_context_id=ctx-billing-27 and task_id=task-a2a-551 link to conversation_id=conv-billing-27.
      ja: A2A correlation 字段。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: contextId/taskId
    field_values:
      context_id: ctx-billing-27
      task_id: task-a2a-551
    related_node_ids:
      - ExternalAgentMessage
      - Conversation
    related_relation_ids: []
    source_claims:
      - claim-external-a2a
  - id: ExternalAgentMessage-example-not-local-assistant
    labels:
      zh: 非本地 assistant
      en: Not local assistant
      ja: local assistant ではない
    descriptions:
      zh: 本地 gpt-4o assistant 回复是 AssistantMessage，即使文本风格类似也不得标记为 ExternalAgentMessage。
      en: Local gpt-4o assistant reply is AssistantMessage and must not be labeled ExternalAgentMessage even if stylistically similar.
      ja: local assistant≠ExternalAgentMessage。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ExternalAgentMessage
      - AssistantMessage
    related_relation_ids: []
    source_claims:
      - claim-external-design
parent_relation:
  id: ExternalAgentMessage-is_a-Message
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种消息
    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明由具有独立智能体协议身份的远端智能体发送、并归一化为本地通信记录的每个 ExternalAgentMessage 都是 Message。
    en: States that every ExternalAgentMessage sent by a remote agent with independent agent-protocol identity and normalized as a local communication record is a Message.
    ja: 独立agent-protocol identityを持つremote agentが送りlocal communication recordへnormalizeした全ExternalAgentMessageがMessageであると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ExternalAgentMessage-is_a-Message-example-positive-manual-001
      labels:
        zh: 是一种消息正例
        en: "Positive case: is a message"
        ja: メッセージの一種正例
      descriptions:
        zh: a2a-msg-501 由已认证 partner-booking 智能体发送并有唯一 messageId。
        en: a2a-msg-501 is sent by authenticated agent partner-booking and has a unique messageId.
        ja: a2a-msg-501 は認証済partner-booking agentが送りunique messageIdを持ちます。
      field_values: {}
      related_node_ids:
        - ExternalAgentMessage
        - Message
      related_relation_ids:
        - ExternalAgentMessage-is_a-Message
      source_claims:
        - claim-external-agent-message-007
    - id: ExternalAgentMessage-is_a-Message-example-boundary-manual-001
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      descriptions:
        zh: agent-card-501 描述远端智能体能力，但不是通信记录。
        en: agent-card-501 describes remote-agent capabilities but is not a communication record.
        ja: agent-card-501 はremote-agent capabilityを記述しますがcommunication recordではありません。
      field_values: {}
      related_node_ids:
        - ExternalAgentMessage
        - Message
      related_relation_ids:
        - ExternalAgentMessage-is_a-Message
      source_claims:
        - claim-external-agent-message-008
  source_claims:
    - claim-external-agent-message-009
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-a2a-message
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Message role, messageId, contextId, taskId, and Parts.
  - id: src-info-messages-design
    title: Moonweave info-messages-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Conversation and Message identity separate from carried content.
source_claims:
  - id: claim-external-agent-message-001
    source: eng-proto-a2a-spec
    supports: A2A §6.4 identifies Message sender role as user or agent and gives each message messageId plus optional taskId/contextId; Moonweave reserves ExternalAgentMessage for authenticated remote agents.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-002
    source: eng-proto-a2a-spec
    supports: "A2A §6.4 identifies Message sender role as user or agent and gives each message messageId plus optional taskId/contextId; Moonweave reserves ExternalAgentMessage for authenticated remote agents. For ExternalAgentMessage, the external_agent_id field records exactly this auditable datum: References the remote agent authenticated through protocol identity."
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-003
    source: eng-proto-a2a-spec
    supports: "A2A §6.4 identifies Message sender role as user or agent and gives each message messageId plus optional taskId/contextId; Moonweave reserves ExternalAgentMessage for authenticated remote agents. For ExternalAgentMessage, the task_id field records exactly this auditable datum: Preserves the optional task identifier associated with an A2A message."
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-004
    source: eng-proto-a2a-spec
    supports: A2A §6.4 identifies Message sender role as user or agent and gives each message messageId plus optional taskId/contextId; Moonweave reserves ExternalAgentMessage for authenticated remote agents. A2A defines agent/user roles, messageId, taskId, and contextId for agent-to-agent communication.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-005
    source: eng-proto-a2a-spec
    supports: A2A §6.4 identifies Message sender role as user or agent and gives each message messageId plus optional taskId/contextId; Moonweave reserves ExternalAgentMessage for authenticated remote agents. A2A agent messages and MCP JSON-RPC tool responses have different participant and envelope semantics.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-006
    source: eng-proto-a2a-spec
    supports: A2A §6.4 identifies Message sender role as user or agent and gives each message messageId plus optional taskId/contextId; Moonweave reserves ExternalAgentMessage for authenticated remote agents. Moonweave contrasts ExternalAgentMessage with ToolObservationMessage under Message using the endpoint-specific identity condition stated in this differentia.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-007
    source: eng-proto-a2a-spec
    supports: A2A §6.4 defines Message with role user or agent, unique messageId, and optional taskId/contextId. The case directly uses A2A's agent-role Message fields.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-008
    source: eng-proto-a2a-spec
    supports: A2A §6.4 defines Message with role user or agent, unique messageId, and optional taskId/contextId. A2A defines AgentCard and Message as separate protocol objects.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-agent-message-009
    source: eng-proto-a2a-spec
    supports: A2A §6.4 defines Message with role user or agent, unique messageId, and optional taskId/contextId.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-external-a2a
    source: src-a2a-message
    supports: A2A agent role identifies remote agent Messages with contextId and taskId.
    locator: Message role agent
    evidence_kind: primary-spec
    confidence: high
  - id: claim-external-design
    source: src-info-messages-design
    supports: ExternalAgentMessage distinguishes remote agent envelopes from local AssistantMessage.
    locator: ExternalAgentMessage boundary
    evidence_kind: design-inference
    confidence: high
