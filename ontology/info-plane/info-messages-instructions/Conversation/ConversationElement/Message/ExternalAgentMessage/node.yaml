schema: moonweave.ai/ontology-node/v1
id: ExternalAgentMessage
kind: concept
status: review
labels:
  zh: 外部智能体消息
  en: External-agent message
  ja: 外部エージェントメッセージ
semantics:
  short_definition:
    zh: 由独立外部智能体经智能体间协议发送的消息。
    en: A message sent by an independently identified external agent through an agent-to-agent protocol.
    ja: 独立識別されたexternal agentがagent-to-agent protocolで送るmessageです。
  definition:
    zh: ExternalAgentMessage 是 Message 的角色专门类型，其发送者是本系统信任边界之外、具有独立 AgentCard 或协议身份的智能体；它可以映射 A2A 的 agent 角色，但不等同于本地 AssistantMessage、MCP participant、委派任务或远端 AgentActor 本身。
    en: ExternalAgentMessage is a role specialization of Message whose sender is an agent outside the local system trust boundary with an independent AgentCard or protocol identity. It may map A2A's agent role, but is not the local AssistantMessage, an MCP participant, a delegated task, or the remote AgentActor itself.
    ja: ExternalAgentMessage はlocal system trust boundary外で独立AgentCard/protocol identityを持つagentがsenderとなるMessage specializationです。A2A agent roleへmapできますがlocal AssistantMessage・MCP participant・delegated task・remote AgentActor自体ではありません。
  why_needed:
    zh: 区分本地助手发言与远端智能体通信，保留跨组织身份、协议语境和信任边界，而不复制整个 A2A 任务模型。
    en: Distinguishes local assistant speech from remote-agent communication, preserving cross-organization identity, protocol context, and trust boundary without duplicating the A2A task model.
    ja: local assistant発話とremote-agent communicationを区別しA2A task modelを複製せずcross-organization identity・protocol context・trust boundaryを保持します。
  includes:
    - zh: 纳入发送者可由外部 agent_id 或 AgentCard 确认、并封装为本地 Message 的 A2A 通信。
      en: Includes A2A communications whose sender is confirmed by external agent_id or AgentCard and normalized as a local Message.
      ja: senderをexternal agent_id/AgentCardで確認しlocal MessageへnormalizeしたA2A communicationを含みます。
  excludes:
    - zh: 排除本地 AssistantMessage、MCP 工具响应、AgentActor、DelegationRecord 和未经认证的外部文本。
      en: Excludes local AssistantMessage, MCP tool responses, AgentActor, DelegationRecord, and unauthenticated external text.
      ja: local AssistantMessage・MCP tool response・AgentActor・DelegationRecord・未認証external textを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: external_agent_id
      labels:
        zh: 外部智能体标识
        en: external agent ID
        ja: 外部agent ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用通过协议身份验证的远端智能体。
        en: References the remote agent authenticated through protocol identity.
        ja: protocol identityで認証されたremote agentを参照します。
      allowed_values: []
      pattern: null
      example_value: AgentActor:partner-booking
      source_claims:
        - claim-external-agent-message-002
    - id: task_id
      labels:
        zh: 外部任务标识
        en: task ID
        ja: 外部task ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存 A2A 消息可选关联的任务标识。
        en: Preserves the optional task identifier associated with an A2A message.
        ja: A2A messageに関連する任意task identifierを保持します。
      allowed_values: []
      pattern: null
      example_value: a2a-task-771
      source_claims:
        - claim-external-agent-message-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExternalAgentMessage-example-positive-manual-001
    kind: positive
    labels:
      zh: 外部智能体消息正例
      en: "Positive case: External-agent message"
      ja: 外部エージェントメッセージ正例
    scenario_id: null
    descriptions:
      zh: a2a-msg-501 由已认证 partner-booking 智能体发送，并关联 a2a-task-771。
      en: a2a-msg-501 is sent by authenticated agent partner-booking and references a2a-task-771.
      ja: a2a-msg-501 は認証済partner-booking agentが送りa2a-task-771を参照します。
    field_values:
      external_agent_id: AgentActor:partner-booking
      task_id: a2a-task-771
      message_role: external-agent
      sender_id: AgentActor:partner-booking
      element_id: a2a-msg-501
      conversation_id: a2a-context-61
      sequence_index: 3
    related_node_ids:
      - ExternalAgentMessage
    related_relation_ids: []
    expected_result:
      zh: 识别为 ExternalAgentMessage。
      en: Identify ExternalAgentMessage.
      ja: ExternalAgentMessageと識別します。
    why_valid_or_invalid:
      zh: 远端智能体、消息与任务身份均由 A2A 包络明确提供。
      en: Remote-agent, message, and task identities are explicit in the A2A envelope.
      ja: remote-agent・message・task identityがA2A envelopeで明示されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-external-agent-message-004
  - id: ExternalAgentMessage-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 外部智能体消息边界例
      en: "Boundary case: External-agent message"
      ja: 外部エージェントメッセージ境界例
    scenario_id: null
    descriptions:
      zh: mcp-response-501 来自一个 MCP server，关联 tool-call-12，但该 server 没有 A2A AgentCard。
      en: mcp-response-501 comes from an MCP server and correlates to tool-call-12, but the server has no A2A AgentCard.
      ja: mcp-response-501 はMCP server由来でtool-call-12に相関しますがA2A AgentCardを持ちません。
    field_values: {}
    related_node_ids:
      - ExternalAgentMessage
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 ExternalAgentMessage；它是 ToolResultMessage。
      en: Do not identify ExternalAgentMessage; it is ToolResultMessage.
      ja: ExternalAgentMessageとせずToolResultMessageです。
    why_valid_or_invalid:
      zh: 工具服务器参与者不因返回内容自然语言化而成为外部智能体发送者。
      en: A tool-server participant does not become an external-agent sender merely because its returned content is natural language.
      ja: tool-server participantは返却contentが自然言語でもexternal-agent senderになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-external-agent-message-005
external_mappings: []
