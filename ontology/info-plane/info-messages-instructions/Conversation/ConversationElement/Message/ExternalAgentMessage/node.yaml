sibling_differentiation:
  - sibling_concept_id: ToolObservationMessage
    shared_parent_concept_id: Message
    differentia:
      zh: ExternalAgentMessage 的发送者是具备独立智能体协议身份的远端智能体；ToolObservationMessage 的来源是工具或环境交互，不要求智能体身份。
      en: ExternalAgentMessage is sent by a remote agent with independent agent-protocol identity; ToolObservationMessage originates from tool or environment interaction and does not require agent identity.
      ja: ExternalAgentMessageは独立agent-protocol identityを持つremote agentが送りToolObservationMessageはagent identityを要しないtool/environment interaction由来です。
    source_claims:
      - claim-external-agent-message-006
