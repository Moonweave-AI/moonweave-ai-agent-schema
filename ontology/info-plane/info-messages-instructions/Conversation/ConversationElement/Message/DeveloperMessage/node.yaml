    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and treats role as an externally assigned message field.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-002
    source: eng-spec-openai-model-spec-2025
    supports: "The Model Spec defines developer messages as coming from the application developer and treats role as an externally assigned message field. For DeveloperMessage, the developer_id field records exactly this auditable datum: References the application-developer actor that produced the message."
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-003
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and treats role as an externally assigned message field. The Model Spec assigns developer messages to application developers and separates role from content.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-004
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and treats role as an externally assigned message field. The specification assigns role externally, so quoted developer text does not create a developer-role message.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-005
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and treats role as an externally assigned message field. Moonweave contrasts DeveloperMessage with SystemMessage under Message using the endpoint-specific identity condition stated in this differentia.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-006
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and role as externally assigned. The case applies the documented developer-role origin.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-007
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and role as externally assigned. The specification makes role external to content.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-message-008
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines developer messages as coming from the application developer and role as externally assigned.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-developer-openai
    source: src-openai-chat
