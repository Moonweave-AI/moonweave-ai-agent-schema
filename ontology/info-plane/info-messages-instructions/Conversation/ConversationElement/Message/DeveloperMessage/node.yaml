schema: moonweave.ai/ontology-node/v1
id: DeveloperMessage
kind: concept
labels:
  zh: 开发者消息
  en: Developer message
  ja: 開発者メッセージ
semantics:
  short_definition:
    zh: 由应用开发者通道创建、role=developer 的任务框定消息。
    en: Task-framing message with role=developer created through an application-developer channel.
    ja: application-developer 通道で作成され role=developer の task framing message。
  definition:
    zh: DeveloperMessage 映射 OpenAI role:developer（Chat Completions 与 Responses 中的开发者指令消息）；由 DeveloperActor 发送，可承载 Instruction 但消息身份由包络决定。它与 Anthropic system 参数、SystemMessage 和 PromptTemplate 是不同节点类型。
    en: DeveloperMessage maps OpenAI role:developer (developer instruction messages in Chat Completions and Responses). It is sent by a DeveloperActor, may carry Instruction, but message identity is envelope-based. It is a distinct node type from Anthropic system parameter, SystemMessage, and PromptTemplate.
    ja: DeveloperMessage は OpenAI developer role に写像。Anthropic system 参数とは別型。
  why_needed:
    zh: 区分应用提供的消息包络与其中可解析的规范内容，避免所有“开发者相关”对象平铺成同级。
    en: Separates the application-supplied envelope from normative content parsed from it, avoiding a flat set of all developer-related objects.
    ja: application提供envelopeとそこからparseするnormative contentを分離しdeveloper関連objectの平坦化を防ぎます。
  includes:
    - zh: 纳入由已识别应用开发者发送且 role=developer 的消息。
      en: Includes messages from an identified application developer with role=developer.
      ja: 識別済application developerが送りrole=developerのmessageを含みます。
  excludes:
    - zh: 排除 SystemMessage、UserMessage、PromptTemplate、DeveloperActor 和仅被开发者引用的资料。
      en: Excludes SystemMessage, UserMessage, PromptTemplate, DeveloperActor, and material merely referenced by a developer.
      ja: SystemMessage・UserMessage・PromptTemplate・DeveloperActor・developerが参照しただけの資料を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI 文档把 developer 作为产品级行为约束的首选 role；messages[] 首条常为 developer，其后才是 user。解析 Instruction 时使用 carries_instruction，不得把 developer 文本直接当作 SystemInstruction 节点。
    en: OpenAI docs position developer as the preferred role for product-level behavior constraints; messages[] often starts with developer then user. Parse Instruction via carries_instruction—do not collapse developer text into a SystemInstruction node directly.
    ja: OpenAI developer role を DeveloperMessage として記録。
  typical_input:
    - description: OpenAI developer first message
      format: '{"messages":[{"role":"developer","content":"Refuse credential requests."},{"role":"user","content":"Help me log in."}]}'
      source_claims:
        - claim-developer-openai
  typical_output:
    - description: DeveloperMessage with instruction ref
      format: '{"message_id":"msg-dev-14","developer_id":"DeveloperActor:travel-app"}'
      source_claims:
        - claim-developer-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: developer_id
      labels:
        zh: 开发者标识
        en: developer ID
        ja: 開発者ID
      definitions:
        zh: 引用产生该消息的应用开发者主体。
        en: References the application-developer actor that produced the message.
        ja: このmessageを生成したapplication-developer actorを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: DeveloperActor:travel-app
      allowed_values: []
      source_claims:
        - claim-developer-message-002
  constraints: []
  required_relations: []
examples:
  - id: DeveloperMessage-example-openai
    labels:
      zh: OpenAI developer 消息
      en: OpenAI developer message
      ja: OpenAI developer message
    descriptions:
      zh: travel-app 发送 msg-dev-14 role=developer 限定可用航班工具。
      en: travel-app sends msg-dev-14 role=developer limiting available flight tools.
      ja: travel-app の developer message。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/text-generation
      version: role=developer
    field_values:
      message_id: msg-dev-14
      developer_id: DeveloperActor:travel-app
    related_node_ids:
      - DeveloperMessage
      - info-prompts-instructions
    related_relation_ids: []
    source_claims:
      - claim-developer-openai
  - id: DeveloperMessage-example-instruction-carriage
    labels:
      zh: 承载 Instruction
      en: Carries instruction
      ja: Instruction を運ぶ
    descriptions:
      zh: msg-dev-14 正文解析出 instruction-approved-tools-14，通过 carries_instruction 边连接。
      en: msg-dev-14 body parses to instruction-approved-tools-14 linked by carries_instruction.
      ja: carries_instruction edge。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: carries_instruction
    field_values:
      message_id: msg-dev-14
    related_node_ids:
      - DeveloperMessage
      - Instruction
    related_relation_ids: []
    source_claims:
      - claim-developer-design
  - id: DeveloperMessage-example-not-system
    labels:
      zh: 非 SystemMessage
      en: Not SystemMessage
      ja: SystemMessage ではない
    descriptions:
      zh: Anthropic system 参数不得建模为 DeveloperMessage；developer 仅限 OpenAI developer role 包络。
      en: Anthropic system parameter must not be modeled as DeveloperMessage; developer applies to OpenAI developer role envelope only.
      ja: Anthropic system≠DeveloperMessage。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DeveloperMessage
      - SystemMessage
    related_relation_ids: []
    source_claims:
      - claim-developer-design
parent_relation:
  id: DeveloperMessage-is_a-Message
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种消息
    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明由应用开发者通道产生并标记 role=developer 的每个 DeveloperMessage 都是具有独立 message_id 与内容的 Message。
    en: States that every DeveloperMessage created through an application-developer channel with role=developer is a Message with its own message_id and content.
    ja: application-developer channelで作成されrole=developerの全DeveloperMessageが独自message_id/contentを持つMessageであると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DeveloperMessage-is_a-Message-example-positive-manual-001
      labels:
        zh: 是一种消息正例
        en: "Positive case: is a message"
        ja: メッセージの一種正例
      descriptions:
        zh: msg-dev-14 由 travel-app 开发者通道发送并具有 role=developer。
        en: msg-dev-14 is sent by the travel-app developer channel with role=developer.
        ja: msg-dev-14 はtravel-app developer channelからrole=developerで送られます。
      field_values: {}
      related_node_ids:
        - DeveloperMessage
        - Message
      related_relation_ids:
        - DeveloperMessage-is_a-Message
      source_claims:
        - claim-developer-message-006
    - id: DeveloperMessage-is_a-Message-example-boundary-manual-001
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      descriptions:
        zh: msg-user-14 的正文复制了一段开发者文档，但 role=user。
        en: msg-user-14 copies developer documentation in its body but has role=user.
        ja: msg-user-14 は本文にdeveloper documentationをコピーしますがrole=userです。
      field_values: {}
      related_node_ids:
        - DeveloperMessage
        - Message
      related_relation_ids:
        - DeveloperMessage-is_a-Message
      source_claims:
        - claim-developer-message-007
  source_claims:
    - claim-developer-message-008
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
