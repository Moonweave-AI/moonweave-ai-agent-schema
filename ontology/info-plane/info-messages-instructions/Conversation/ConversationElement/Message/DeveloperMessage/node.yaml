schema: moonweave.ai/ontology-node/v1
id: DeveloperMessage
kind: concept
status: accepted
labels:
  zh: 开发者消息
  en: Developer message
  ja: 開発者メッセージ
semantics:
  short_definition:
    zh: 由应用开发者以 developer 角色提供任务框定或约束的消息。
    en: A message supplied by the application developer with the developer role to frame or constrain a task.
    ja: application developerがdeveloper roleでtask framingまたはconstraintを与えるmessageです。
  definition:
    zh: DeveloperMessage 是 Message 的角色专门类型，由应用开发者通道创建并标记为 developer；它可以承载 Instruction，但其消息身份由发送者与包络确定，不能与指令权威、提示模板或开发者 Actor 身份混为一体。
    en: DeveloperMessage is a role specialization of Message created through an application-developer channel and marked developer. It may carry Instruction, but its message identity is determined by sender and envelope and must not be conflated with instruction authority, a prompt template, or the developer Actor.
    ja: DeveloperMessage はapplication-developer channelで作成されdeveloperと標記されるMessageのrole specializationです。Instructionを運び得ますがmessage identityはsender/envelopeで決まりinstruction authority・prompt template・developer Actorと混同しません。
  why_needed:
    zh: 区分应用提供的消息包络与其中可解析的规范内容，避免所有“开发者相关”对象平铺成同级。
    en: Separates the application-supplied envelope from normative content parsed from it, avoiding a flat set of all developer-related objects.
    ja: application提供envelopeとそこからparseするnormative contentを分離しdeveloper関連objectの平坦化を防ぎます。
  includes:
    - zh: 纳入由已识别应用开发者发送且 role=developer 的消息。
      en: Includes messages from an identified application developer with role=developer.
      ja: 識別済application developerが送りrole=developerのmessageを含みます。
  excludes:
    - zh: 排除 SystemMessage、UserMessage、PromptTemplate、DeveloperActor 和仅被开发者引用的资料。
      en: Excludes SystemMessage, UserMessage, PromptTemplate, DeveloperActor, and material merely referenced by a developer.
      ja: SystemMessage・UserMessage・PromptTemplate・DeveloperActor・developerが参照しただけの資料を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: developer_id
      labels:
        zh: 开发者标识
        en: developer ID
        ja: 開発者ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该消息的应用开发者主体。
        en: References the application-developer actor that produced the message.
        ja: このmessageを生成したapplication-developer actorを参照します。
      allowed_values: []
      pattern: null
      example_value: DeveloperActor:travel-app
      source_claims:
        - claim-developer-message-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeveloperMessage-example-positive-manual-001
    kind: positive
    labels:
      zh: 开发者消息正例
      en: "Positive case: Developer message"
      ja: 開発者メッセージ正例
    scenario_id: null
    descriptions:
      zh: msg-dev-14 由 travel-app 开发者通道发送，限定回答只能调用已批准的航班工具。
      en: msg-dev-14 is sent through the travel-app developer channel and limits replies to approved flight tools.
      ja: msg-dev-14 はtravel-app developer channelから送られ承認済flight toolだけを使うよう制約します。
    field_values:
      developer_id: DeveloperActor:travel-app
      message_role: developer
      sender_id: DeveloperActor:travel-app
      element_id: msg-dev-14
      conversation_id: conv-travel-202
      sequence_index: 1
    related_node_ids:
      - DeveloperMessage
    related_relation_ids: []
    expected_result:
      zh: 识别为 DeveloperMessage；其中指令另行解析。
      en: Identify DeveloperMessage; parse any instructions separately.
      ja: DeveloperMessageとしinstructionは別途parseします。
    why_valid_or_invalid:
      zh: 外部角色和开发者主体确定消息子类，正文的规范效力由指令本体另判。
      en: The external role and developer actor determine the message subtype; normative force is evaluated by the instruction ontology.
      ja: external roleとdeveloper actorがmessage subtypeを決めnormative forceはinstruction ontologyが判定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-developer-message-003
  - id: DeveloperMessage-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 开发者消息边界例
      en: "Boundary case: Developer message"
      ja: 開発者メッセージ境界例
    scenario_id: null
    descriptions:
      zh: msg-user-14 是最终用户粘贴的一段开发文档，正文包含“developer settings”。
      en: msg-user-14 is a user-pasted developer document whose body contains the words “developer settings.”
      ja: msg-user-14 はuserが貼ったdeveloper documentで本文に「developer settings」とあります。
    field_values: {}
    related_node_ids:
      - DeveloperMessage
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 DeveloperMessage；它是 UserMessage 承载的内容。
      en: Do not identify DeveloperMessage; it is content carried by UserMessage.
      ja: DeveloperMessageとせずUserMessageが運ぶcontentです。
    why_valid_or_invalid:
      zh: 被引用文本的主题不能改变受信发送角色。
      en: The subject of quoted text cannot change the trusted sender role.
      ja: quoted textの主題はtrusted sender roleを変更できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-developer-message-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SystemMessage
    shared_parent_concept_id: Message
    differentia:
      zh: DeveloperMessage 由应用开发者发送并处于 developer 层；SystemMessage 来自平台或系统层，来源与规范层级更高。
      en: DeveloperMessage comes from an application developer at developer authority; SystemMessage comes from the platform/system layer with a different, higher source authority.
      ja: DeveloperMessageはapplication developer由来のdeveloper authority、SystemMessageはplatform/system由来でsource authorityが異なります。
    source_claims:
      - claim-developer-message-005
parent_relation:
  id: DeveloperMessage-is_a-Message
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种消息
    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明由应用开发者通道产生并标记 role=developer 的每个 DeveloperMessage 都是具有独立 message_id 与内容的 Message。
    en: States that every DeveloperMessage created through an application-developer channel with role=developer is a Message with its own message_id and content.
    ja: application-developer channelで作成されrole=developerの全DeveloperMessageが独自message_id/contentを持つMessageであると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_specialization
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DeveloperMessage-is_a-Message-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种消息正例
        en: "Positive case: is a message"
        ja: メッセージの一種正例
      scenario_id: null
      descriptions:
        zh: msg-dev-14 由 travel-app 开发者通道发送并具有 role=developer。
        en: msg-dev-14 is sent by the travel-app developer channel with role=developer.
        ja: msg-dev-14 はtravel-app developer channelからrole=developerで送られます。
      field_values: {}
      related_node_ids:
        - DeveloperMessage
        - Message
      related_relation_ids:
        - DeveloperMessage-is_a-Message
      expected_result:
        zh: 断言 DeveloperMessage-is_a-Message。
        en: Assert DeveloperMessage-is_a-Message.
        ja: DeveloperMessage-is_a-Messageをassertします。
      why_valid_or_invalid:
        zh: 发送来源与受信角色共同满足子类条件。
        en: Sender source and trusted role jointly satisfy subtype conditions.
        ja: sender sourceとtrusted roleがsubtype条件を共同で満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-developer-message-006
    - id: DeveloperMessage-is_a-Message-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      scenario_id: null
      descriptions:
        zh: msg-user-14 的正文复制了一段开发者文档，但 role=user。
        en: msg-user-14 copies developer documentation in its body but has role=user.
        ja: msg-user-14 は本文にdeveloper documentationをコピーしますがrole=userです。
      field_values: {}
      related_node_ids:
        - DeveloperMessage
        - Message
      related_relation_ids:
        - DeveloperMessage-is_a-Message
      expected_result:
        zh: 不得断言 DeveloperMessage-is_a-Message；应判为 UserMessage。
        en: Do not apply the DeveloperMessage edge; classify UserMessage.
        ja: DeveloperMessage edgeを適用せずUserMessageとします。
      why_valid_or_invalid:
        zh: 正文来源主题不能覆盖包络角色，发送者身份仍由外部字段决定。
        en: Body subject matter cannot override envelope role; external fields still determine sender identity.
        ja: body subject matterはenvelope roleを上書きできずsender identityはexternal fieldで決まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-developer-message-007
  source_claims:
    - claim-developer-message-008
  distinct_fact_rationale:
    zh: 该分类只决定消息包络类型，不替代其中 Instruction 的规范权威判定。
    en: The classification determines only envelope type and does not replace normative authority evaluation for carried Instruction.
    ja: この分類はenvelope typeだけを決め運ぶInstructionのnormative authority判定を代替しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenAI Chat Completions 角色、Model Spec 权威链、A2A Message/Part 与 MCP JSON-RPC 包络逐项核验；Conversation、Message 角色子类、ToolObservationMessage 与 ProtocolEnvelope 语义成立。
    en: Verified against OpenAI Chat Completions roles, Model Spec authority chain, A2A Message/Part, and MCP JSON-RPC envelopes; Conversation, Message role specializations, ToolObservationMessage, and ProtocolEnvelope semantics hold.
    ja: OpenAI Chat Completions role、Model Spec authority chain、A2A Message/Part、MCP JSON-RPC envelope に照らし Conversation/Message role specialization/ToolObservationMessage/ProtocolEnvelope semantics を個別確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
