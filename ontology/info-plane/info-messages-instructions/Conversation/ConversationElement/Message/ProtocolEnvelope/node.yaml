        en: rpc-envelope-77 carries tool-result-msg-312 with JSON-RPC 2.0 and id=rpc-req-77.
        ja: rpc-envelope-77 はJSON-RPC 2.0/id=rpc-req-77でtool-result-msg-312を運びます。
      field_values: {}
      related_node_ids:
