      expected_result:
        zh: 断言 ProtocolEnvelope wraps Message。
        en: Assert ProtocolEnvelope wraps Message.
        ja: ProtocolEnvelope wraps Messageをassertします。
      why_valid_or_invalid:
        zh: 载荷消息标识与实际编码对象一致，协议字段留在包络。
        en: Payload message identity matches the encoded object and protocol fields remain on the envelope.
        ja: payload message identityがencoded objectと一致しprotocol fieldはenvelopeに残ります。
      synthetic: true
