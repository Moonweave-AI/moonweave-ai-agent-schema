    - id: ProtocolEnvelope-wraps-Message-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 封装消息边界例
        en: "Boundary case: wraps message"
        ja: メッセージを包む境界例
      scenario_id: null
      descriptions:
        zh: http-connection-77 传输了多个 RPC 包络，但没有单一 payload_message_id。
        en: http-connection-77 transports several RPC envelopes and has no single payload_message_id.
        ja: http-connection-77 は複数RPC envelopeをtransportしsingle payload_message_idを持ちません。
      field_values: {}
      related_node_ids:
