schema: moonweave.ai/ontology-node/v1
id: ProtocolEnvelope
kind: concept
status: review
labels:
  zh: 协议包络
  en: Protocol envelope
  ja: プロトコル包絡
semantics:
  short_definition:
    zh: 在特定协议版本下承载并关联一条消息的传输级包络。
    en: A transport-level envelope that carries and correlates one message under a protocol version.
    ja: protocol version下で一messageを運び相関するtransport-level envelopeです。
  definition:
    zh: ProtocolEnvelope 是独立信息根，表示 JSON-RPC、A2A 或其他协议在线路上使用的消息封装及关联字段；它记录协议名、版本、请求/响应关联和载荷消息，但不是 Message、网络连接、MCP session 或 TransportChannel。
    en: ProtocolEnvelope is an independent information root representing the wire-level wrapper and correlation fields used by JSON-RPC, A2A, or another protocol. It records protocol name, version, request/response correlation, and the payload Message, but is not the Message, network connection, MCP session, or TransportChannel.
    ja: ProtocolEnvelope はJSON-RPC・A2A等protocolのwire-level wrapper/correlation fieldを表す独立information rootです。protocol名・version・request/response correlation・payload Messageを記録しますがMessage・network connection・MCP session・TransportChannelではありません。
  why_needed:
    zh: 把通用消息语义与具体协议编码分开，使同一 Message 可经不同传输映射而不改变自身身份。
    en: Separates generic message semantics from protocol encoding so the same Message can be mapped through different transports without changing its identity.
    ja: generic message semanticsをprotocol encodingから分離し同じMessageを異なるtransportへmapしてもidentityを変えません。
  includes:
    - zh: 纳入具有协议版本、包络标识、载荷消息标识和可选关联标识的传输封装。
      en: Includes transport wrappers with protocol version, envelope ID, payload message ID, and optional correlation ID.
      ja: protocol version・envelope ID・payload message ID・任意correlation IDを持つtransport wrapperを含みます。
  excludes:
    - zh: 排除 Message、MCP session、TransportChannel、HTTP 请求对象和未编码的 ContentBlock。
      en: Excludes Message, MCP session, TransportChannel, HTTP request objects, and unencoded ContentBlock.
      ja: Message・MCP session・TransportChannel・HTTP request object・unencoded ContentBlockを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - envelope_id
  fields:
    - id: envelope_id
      labels:
        zh: 包络标识
        en: envelope ID
        ja: 包絡ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次协议封装记录。
        en: Stable identifier for one protocol-envelope record.
        ja: 一protocol-envelope recordを安定識別します。
      allowed_values: []
      pattern: null
      example_value: rpc-envelope-77
      source_claims:
        - claim-protocol-envelope-002
    - id: protocol_name
      labels:
        zh: 协议名称
        en: protocol name
        ja: プロトコル名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录解释包络字段所需的协议族。
        en: Records the protocol family needed to interpret envelope fields.
        ja: envelope field解釈に必要なprotocol familyを記録します。
      allowed_values: []
      pattern: null
      example_value: JSON-RPC
      source_claims:
        - claim-protocol-envelope-003
    - id: protocol_version
      labels:
        zh: 协议版本
        en: protocol version
        ja: プロトコルversion
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际编码该包络的协议版本。
        en: Records the protocol version actually encoding the envelope.
        ja: envelopeを実際にencodeしたprotocol versionを記録します。
      allowed_values: []
      pattern: null
      example_value: "2.0"
      source_claims:
        - claim-protocol-envelope-004
    - id: correlation_id
      labels:
        zh: 关联标识
        en: correlation ID
        ja: 相関ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 关联请求与对应响应而不改变载荷消息身份。
        en: Correlates a request with its response without changing payload-message identity.
        ja: payload-message identityを変えずrequestとresponseを相関します。
      allowed_values: []
      pattern: null
      example_value: rpc-req-77
      source_claims:
        - claim-protocol-envelope-005
    - id: payload_message_id
      labels:
        zh: 载荷消息标识
        en: payload message ID
        ja: payload message ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被包络承载的 Message。
        en: References the Message carried by the envelope.
        ja: envelopeが運ぶMessageを参照します。
      allowed_values: []
      pattern: null
      example_value: tool-result-msg-312
      source_claims:
        - claim-protocol-envelope-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProtocolEnvelope-example-positive-manual-001
    kind: positive
    labels:
      zh: 协议包络正例
      en: "Positive case: Protocol envelope"
      ja: プロトコル包絡正例
    scenario_id: null
    descriptions:
      zh: rpc-envelope-77 以 JSON-RPC 2.0 响应承载 tool-result-msg-312，并用 rpc-req-77 与请求关联。
      en: rpc-envelope-77 carries tool-result-msg-312 as a JSON-RPC 2.0 response correlated by rpc-req-77.
      ja: rpc-envelope-77 はtool-result-msg-312をJSON-RPC 2.0 responseとして運びrpc-req-77でrequestへ相関します。
    field_values:
      envelope_id: rpc-envelope-77
      protocol_name: JSON-RPC
      protocol_version: "2.0"
      correlation_id: rpc-req-77
      payload_message_id: tool-result-msg-312
    related_node_ids:
      - ProtocolEnvelope
    related_relation_ids: []
    expected_result:
      zh: 识别为 ProtocolEnvelope，并保持载荷 Message 独立。
      en: Identify ProtocolEnvelope while keeping the payload Message independent.
      ja: ProtocolEnvelopeと識別しpayload Messageを独立保持します。
    why_valid_or_invalid:
      zh: 协议版本、关联标识与载荷引用均属于线路包络，不是消息内容或角色。
      en: Protocol version, correlation, and payload reference are wire-envelope facts, not message content or role.
      ja: protocol version・correlation・payload referenceはwire-envelope factでmessage content/roleではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-envelope-007
  - id: ProtocolEnvelope-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 协议包络边界例
      en: "Boundary case: Protocol envelope"
      ja: プロトコル包絡境界例
    scenario_id: null
    descriptions:
      zh: msg-77 是应用内部的 UserMessage，尚未被序列化或分配任何协议关联标识。
      en: msg-77 is an internal UserMessage not yet serialized or assigned any protocol correlation ID.
      ja: msg-77 はapplication内部UserMessageで未serialize、protocol correlation ID未付与です。
    field_values: {}
    related_node_ids:
      - ProtocolEnvelope
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 ProtocolEnvelope；它只是 Message。
      en: Do not identify ProtocolEnvelope; it is only Message.
      ja: ProtocolEnvelopeとせずMessageだけです。
    why_valid_or_invalid:
      zh: 通用消息身份不自动包含某个传输协议的线路封装。
      en: Generic message identity does not automatically include a wire wrapper for a particular transport protocol.
      ja: generic message identityは特定transport protocolのwire wrapperを自動包含しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-envelope-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ProtocolEnvelope-wraps-Message
  predicate: wraps
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 封装消息
    en: wraps message
    ja: メッセージを包む
  definitions:
    zh: 将一个 ProtocolEnvelope 连接到其实际编码和传输的 Message 载荷；包络负责协议版本与关联字段，Message 保持发送角色、内容和会话身份。
    en: Connects a ProtocolEnvelope to the Message payload it actually encodes and transports. The envelope owns protocol version and correlation fields; Message retains sender role, content, and conversation identity.
    ja: ProtocolEnvelopeを実encode/transportするMessage payloadへ接続します。envelopeはprotocol version/correlation fieldを担当しMessageはsender role・content・conversation identityを保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: is_wrapped_by_envelope
    labels:
      zh: 由包络封装
      en: is wrapped by envelope
      ja: 包絡に包まれる
  conditions:
    - id: ProtocolEnvelope-wraps-Message-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when one serialized protocol object contains the same Message payload identity and the exact protocol version, request or notification discriminator, correlation ID when applicable, and result or error boundary; transport co-delivery alone is insufficient.
      explanations:
        zh: 仅当一个序列化协议对象包含同一 Message 载荷身份，并具备精确协议版本、请求或通知判别、适用时的关联 ID 以及 result/error 边界时成立；只是在同一传输中交付不足。
        en: Assert only when one serialized protocol object contains the same Message payload identity and the exact protocol version, request or notification discriminator, correlation ID when applicable, and result or error boundary; transport co-delivery alone is insufficient.
        ja: 一つの serialized protocol object が同一 Message payload identity と、正確な protocol version・request/notification discriminator・該当時 correlation ID・result/error boundary を含む場合だけ成立します。同一 transport delivery だけでは不十分です。
      source_claims:
        - claim-protocol-envelope-009
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
