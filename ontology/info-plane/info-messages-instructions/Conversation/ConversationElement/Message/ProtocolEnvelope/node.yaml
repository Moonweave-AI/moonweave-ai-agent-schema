schema: moonweave.ai/ontology-node/v1
id: ProtocolEnvelope
kind: concept
labels:
  zh: 协议包络
  en: Protocol envelope
  ja: プロトコル包絡
semantics:
  short_definition:
    zh: 在特定协议版本下封装并关联一条 Message 的传输级包络记录。
    en: Transport-level envelope record wrapping and correlating one Message under a protocol version.
    ja: protocol version 下で一 Message を wrap/correlate する transport-level envelope record。
  definition:
    zh: ProtocolEnvelope 独立记录 JSON-RPC 2.0、A2A HTTP 封装或 MCP 会话上的 wire 元数据：protocol_name、protocol_version、correlation_id 与 payload_message_id。同一 Message 可有多条包络映射到不同传输，但包络不是 Message、MCP session 或 TransportChannel。
    en: "ProtocolEnvelope independently records JSON-RPC 2.0, A2A HTTP wrapping, or MCP session wire metadata: protocol_name, protocol_version, correlation_id, and payload_message_id. One Message may have multiple envelopes for different transports, but an envelope is not the Message, MCP session, or TransportChannel."
    ja: ProtocolEnvelope は JSON-RPC/A2A/MCP wire metadata。Message 本体ではない。
  why_needed:
    zh: 把通用消息语义与具体协议编码分开，使同一 Message 可经不同传输映射而不改变自身身份。
    en: Separates generic message semantics from protocol encoding so the same Message can be mapped through different transports without changing its identity.
    ja: generic message semanticsをprotocol encodingから分離し同じMessageを異なるtransportへmapしてもidentityを変えません。
  includes:
    - zh: 纳入具有协议版本、包络标识、载荷消息标识和可选关联标识的传输封装。
      en: Includes transport wrappers with protocol version, envelope ID, payload message ID, and optional correlation ID.
      ja: protocol version・envelope ID・payload message ID・任意correlation IDを持つtransport wrapperを含みます。
  excludes:
    - zh: 排除 Message、MCP session、TransportChannel、HTTP 请求对象和未编码的 ContentBlock。
      en: Excludes Message, MCP session, TransportChannel, HTTP request objects, and unencoded ContentBlock.
      ja: Message・MCP session・TransportChannel・HTTP request object・unencoded ContentBlockを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: MCP JSON-RPC 请求含 jsonrpc、id、method、params；A2A Message 可能在 HTTP+JSON 上传 messageId；ProtocolEnvelope.wraps Message 保存 correlation 而不复制 content。
    en: MCP JSON-RPC requests include jsonrpc, id, method, params; A2A Messages may ride HTTP+JSON with messageId; ProtocolEnvelope.wraps Message preserves correlation without copying content.
    ja: JSON-RPC id/method と payload Message を関連付け。
  typical_input:
    - description: MCP JSON-RPC envelope
      format: '{"jsonrpc":"2.0","id":4,"method":"prompts/get","params":{"name":"code-review"}}'
      source_claims:
        - claim-protocol-mcp
  typical_output:
    - description: Envelope wraps message
      format: '{"envelope_id":"rpc-envelope-77","protocol_name":"JSON-RPC","payload_message_id":"msg-mcp-4"}'
      source_claims:
        - claim-protocol-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys:
    - envelope_id
  fields:
    - id: envelope_id
      labels:
        zh: 包络标识
        en: envelope ID
        ja: 包絡ID
      definitions:
        zh: 稳定标识一次协议封装记录。
        en: Stable identifier for one protocol-envelope record.
        ja: 一protocol-envelope recordを安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rpc-envelope-77
      allowed_values: []
      source_claims:
        - claim-protocol-envelope-002
    - id: protocol_name
      labels:
        zh: 协议名称
        en: protocol name
        ja: プロトコル名
      definitions:
        zh: 记录解释包络字段所需的协议族。
        en: Records the protocol family needed to interpret envelope fields.
        ja: envelope field解釈に必要なprotocol familyを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: JSON-RPC
      allowed_values: []
      source_claims:
        - claim-protocol-envelope-003
    - id: protocol_version
      labels:
        zh: 协议版本
        en: protocol version
        ja: プロトコルversion
      definitions:
        zh: 记录实际编码该包络的协议版本。
        en: Records the protocol version actually encoding the envelope.
        ja: envelopeを実際にencodeしたprotocol versionを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "2.0"
      allowed_values: []
      source_claims:
        - claim-protocol-envelope-004
    - id: correlation_id
      labels:
        zh: 关联标识
        en: correlation ID
        ja: 相関ID
      definitions:
        zh: 关联请求与对应响应而不改变载荷消息身份。
        en: Correlates a request with its response without changing payload-message identity.
        ja: payload-message identityを変えずrequestとresponseを相関します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: rpc-req-77
      allowed_values: []
      source_claims:
        - claim-protocol-envelope-005
    - id: payload_message_id
      labels:
        zh: 载荷消息标识
        en: payload message ID
        ja: payload message ID
      definitions:
        zh: 引用被包络承载的 Message。
        en: References the Message carried by the envelope.
        ja: envelopeが運ぶMessageを参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: tool-result-msg-312
      allowed_values: []
      source_claims:
        - claim-protocol-envelope-006
  constraints: []
  required_relations: []
examples:
  - id: ProtocolEnvelope-example-mcp-jsonrpc
    labels:
      zh: MCP JSON-RPC 包络
      en: MCP JSON-RPC envelope
      ja: MCP JSON-RPC envelope
    descriptions:
      zh: rpc-envelope-77 protocol_name=JSON-RPC correlation_id=4 包装 prompts/get 产生的 msg-mcp-4。
      en: rpc-envelope-77 protocol_name=JSON-RPC correlation_id=4 wraps msg-mcp-4 from prompts/get.
      ja: MCP JSON-RPC envelope。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      version: JSON-RPC 2.0
    field_values:
      envelope_id: rpc-envelope-77
      protocol_name: JSON-RPC
      correlation_id: "4"
    related_node_ids:
      - ProtocolEnvelope
      - Message
    related_relation_ids: []
    source_claims:
      - claim-protocol-mcp
  - id: ProtocolEnvelope-example-a2a-http
    labels:
      zh: A2A HTTP 封装
      en: A2A HTTP wrapping
      ja: A2A HTTP wrap
    descriptions:
      zh: envelope-a2a-12 protocol_name=A2A protocol_version=0.3 payload_message_id=msg-a2a-441。
      en: envelope-a2a-12 protocol_name=A2A protocol_version=0.3 payload_message_id=msg-a2a-441.
      ja: A2A HTTP envelope。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: HTTP transport
    field_values:
      envelope_id: envelope-a2a-12
      protocol_name: A2A
      payload_message_id: msg-a2a-441
    related_node_ids:
      - ProtocolEnvelope
      - ExternalAgentMessage
    related_relation_ids: []
    source_claims:
      - claim-protocol-a2a
  - id: ProtocolEnvelope-example-not-message
    labels:
      zh: 非 Message 本体
      en: Not Message body
      ja: Message 本体ではない
    descriptions:
      zh: 未解码 JSON-RPC params 字节流没有 payload_message_id，不得识别为 ProtocolEnvelope。
      en: Undecoded JSON-RPC params bytes without payload_message_id must not be ProtocolEnvelope.
      ja: payload_message_id 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ProtocolEnvelope
    related_relation_ids: []
    source_claims:
      - claim-protocol-design
parent_relation:
  id: ProtocolEnvelope-wraps-Message
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 封装消息
    en: wraps message
    ja: メッセージを包む
  definitions:
    zh: 将一个 ProtocolEnvelope 连接到其实际编码和传输的 Message 载荷；包络负责协议版本与关联字段，Message 保持发送角色、内容和会话身份。
    en: Connects a ProtocolEnvelope to the Message payload it actually encodes and transports. The envelope owns protocol version and correlation fields; Message retains sender role, content, and conversation identity.
    ja: ProtocolEnvelopeを実encode/transportするMessage payloadへ接続します。envelopeはprotocol version/correlation fieldを担当しMessageはsender role・content・conversation identityを保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由包络封装
      en: is wrapped by envelope
      ja: 包絡に包まれる
  conditions:
    - id: ProtocolEnvelope-wraps-Message-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when one serialized protocol object contains the same Message payload identity and the exact protocol version, request or notification discriminator, correlation ID when applicable, and result or error boundary; transport co-delivery alone is insufficient.
      source_claims:
        - claim-protocol-envelope-009
      explanation:
        zh: 仅当一个序列化协议对象包含同一 Message 载荷身份，并具备精确协议版本、请求或通知判别、适用时的关联 ID 以及 result/error 边界时成立；只是在同一传输中交付不足。
        en: Assert only when one serialized protocol object contains the same Message payload identity and the exact protocol version, request or notification discriminator, correlation ID when applicable, and result or error boundary; transport co-delivery alone is insufficient.
        ja: 一つの serialized protocol object が同一 Message payload identity と、正確な protocol version・request/notification discriminator・該当時 correlation ID・result/error boundary を含む場合だけ成立します。同一 transport delivery だけでは不十分です。
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ProtocolEnvelope-wraps-Message-example-positive-manual-001
      labels:
        zh: 封装消息正例
        en: "Positive case: wraps message"
        ja: メッセージを包む正例
      descriptions:
        zh: rpc-envelope-77 以 JSON-RPC 2.0 和 id=rpc-req-77 承载 tool-result-msg-312。
        en: rpc-envelope-77 carries tool-result-msg-312 with JSON-RPC 2.0 and id=rpc-req-77.
        ja: rpc-envelope-77 はJSON-RPC 2.0/id=rpc-req-77でtool-result-msg-312を運びます。
      field_values: {}
      related_node_ids:
        - ProtocolEnvelope
        - Message
      related_relation_ids:
        - ProtocolEnvelope-wraps-Message
      source_claims:
        - claim-protocol-envelope-010
    - id: ProtocolEnvelope-wraps-Message-example-boundary-manual-001
      labels:
        zh: 封装消息边界例
        en: "Boundary case: wraps message"
        ja: メッセージを包む境界例
      descriptions:
        zh: http-connection-77 传输了多个 RPC 包络，但没有单一 payload_message_id。
        en: http-connection-77 transports several RPC envelopes and has no single payload_message_id.
        ja: http-connection-77 は複数RPC envelopeをtransportしsingle payload_message_idを持ちません。
      field_values: {}
      related_node_ids:
        - ProtocolEnvelope
        - Message
      related_relation_ids:
        - ProtocolEnvelope-wraps-Message
      source_claims:
        - claim-protocol-envelope-011
  source_claims:
    - claim-protocol-envelope-012
  layout_role: primary-backbone
  endpoint_order: child-to-parent
