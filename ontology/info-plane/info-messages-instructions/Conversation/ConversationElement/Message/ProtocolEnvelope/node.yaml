  distinct_fact_rationale:
    zh: 协议包络与通用消息是两种身份，通过 composition 连接而不建立 is_a 或复制字段。
    en: Protocol envelope and generic message have separate identities connected by composition, not is_a or duplicated fields.
    ja: protocol envelopeとgeneric messageは別identityでcomposition接続しis_aやfield複製をしません。
