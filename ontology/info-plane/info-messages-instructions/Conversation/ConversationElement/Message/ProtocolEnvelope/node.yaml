schema: moonweave.ai/ontology-node/v1
id: ProtocolEnvelope
kind: concept
status: accepted
labels:
  zh: 协议包络
  en: Protocol envelope
  ja: プロトコル包絡
semantics:
  short_definition:
    zh: 在特定协议版本下承载并关联一条消息的传输级包络。
    en: A transport-level envelope that carries and correlates one message under a protocol version.
    ja: protocol version下で一messageを運び相関するtransport-level envelopeです。
  definition:
    zh: ProtocolEnvelope 是独立信息根，表示 JSON-RPC、A2A 或其他协议在线路上使用的消息封装及关联字段；它记录协议名、版本、请求/响应关联和载荷消息，但不是 Message、网络连接、MCP session 或 TransportChannel。
    en: ProtocolEnvelope is an independent information root representing the wire-level wrapper and correlation fields used by JSON-RPC, A2A, or another protocol. It records protocol name, version, request/response correlation, and the payload Message, but is not the Message, network connection, MCP session, or TransportChannel.
    ja: ProtocolEnvelope はJSON-RPC・A2A等protocolのwire-level wrapper/correlation fieldを表す独立information rootです。protocol名・version・request/response correlation・payload Messageを記録しますがMessage・network connection・MCP session・TransportChannelではありません。
  why_needed:
    zh: 把通用消息语义与具体协议编码分开，使同一 Message 可经不同传输映射而不改变自身身份。
    en: Separates generic message semantics from protocol encoding so the same Message can be mapped through different transports without changing its identity.
    ja: generic message semanticsをprotocol encodingから分離し同じMessageを異なるtransportへmapしてもidentityを変えません。
  includes:
    - zh: 纳入具有协议版本、包络标识、载荷消息标识和可选关联标识的传输封装。
      en: Includes transport wrappers with protocol version, envelope ID, payload message ID, and optional correlation ID.
      ja: protocol version・envelope ID・payload message ID・任意correlation IDを持つtransport wrapperを含みます。
  excludes:
    - zh: 排除 Message、MCP session、TransportChannel、HTTP 请求对象和未编码的 ContentBlock。
      en: Excludes Message, MCP session, TransportChannel, HTTP request objects, and unencoded ContentBlock.
      ja: Message・MCP session・TransportChannel・HTTP request object・unencoded ContentBlockを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - envelope_id
  fields:
    - id: envelope_id
      labels:
        zh: 包络标识
        en: envelope ID
        ja: 包絡ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次协议封装记录。
        en: Stable identifier for one protocol-envelope record.
        ja: 一protocol-envelope recordを安定識別します。
      allowed_values: []
      pattern: null
      example_value: rpc-envelope-77
      source_claims:
        - claim-protocol-envelope-002
    - id: protocol_name
      labels:
        zh: 协议名称
        en: protocol name
        ja: プロトコル名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录解释包络字段所需的协议族。
        en: Records the protocol family needed to interpret envelope fields.
        ja: envelope field解釈に必要なprotocol familyを記録します。
      allowed_values: []
      pattern: null
      example_value: JSON-RPC
      source_claims:
        - claim-protocol-envelope-003
    - id: protocol_version
      labels:
        zh: 协议版本
        en: protocol version
        ja: プロトコルversion
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录实际编码该包络的协议版本。
        en: Records the protocol version actually encoding the envelope.
        ja: envelopeを実際にencodeしたprotocol versionを記録します。
      allowed_values: []
      pattern: null
      example_value: "2.0"
      source_claims:
        - claim-protocol-envelope-004
    - id: correlation_id
      labels:
        zh: 关联标识
        en: correlation ID
        ja: 相関ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 关联请求与对应响应而不改变载荷消息身份。
        en: Correlates a request with its response without changing payload-message identity.
        ja: payload-message identityを変えずrequestとresponseを相関します。
      allowed_values: []
      pattern: null
      example_value: rpc-req-77
      source_claims:
        - claim-protocol-envelope-005
    - id: payload_message_id
      labels:
        zh: 载荷消息标识
        en: payload message ID
        ja: payload message ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被包络承载的 Message。
        en: References the Message carried by the envelope.
        ja: envelopeが運ぶMessageを参照します。
      allowed_values: []
      pattern: null
      example_value: tool-result-msg-312
      source_claims:
        - claim-protocol-envelope-006
  constraints: []
  required_relation_constraints: []
