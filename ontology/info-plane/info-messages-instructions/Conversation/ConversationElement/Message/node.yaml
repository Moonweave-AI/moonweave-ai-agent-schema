schema: moonweave.ai/ontology-node/v1
id: Message
kind: concept
status: accepted
labels:
  zh: 消息
  en: Message
  ja: メッセージ
semantics:
  short_definition:
    zh: 由稳定标识、发送角色和有序内容共同界定的一次通信记录。
    en: One communication record delimited by a stable ID, sender role, and ordered content.
    ja: stable ID・sender role・ordered contentで区切られる一回のcommunication recordです。
  definition:
    zh: Message 是 ConversationElement 的具体子类，以 message_id 标识一次通信，并记录 role、发送者、接收方、内容与可选关联；它承载内容或指令但不拥有 ContentBlock、Instruction、ContextPackage 或工具执行结果的本体定义。
    en: Message is a concrete ConversationElement identified by message_id and recording role, sender, recipient, content, and optional correlations. It carries content or instructions but does not own the ontology definitions of ContentBlock, Instruction, ContextPackage, or tool execution results.
    ja: Message はmessage_idで識別されrole・sender・recipient・content・任意correlationを記録する具体ConversationElementです。contentやinstructionを運びますがContentBlock・Instruction・ContextPackage・tool execution resultのontology定義を所有しません。
  why_needed:
    zh: 为不同模型、协议和发送主体提供共同通信身份，同时把角色、内容载体、指令效力和传输包络保持为可区分事实。
    en: Provides a common communication identity across models, protocols, and senders while keeping role, content carrier, instruction force, and transport envelope distinct.
    ja: model・protocol・senderを跨ぐ共通communication identityを提供しrole・content carrier・instruction force・transport envelopeを区別します。
  includes:
    - zh: 纳入具有唯一 message_id、明确发送角色和至少一个内容块的通信记录。
      en: Includes communication records with a unique message_id, explicit sender role, and at least one content block.
      ja: unique message_id・明示sender role・一つ以上のcontent blockを持つcommunication recordを含みます。
  excludes:
    - zh: 排除 ConversationTurn、ContentBlock、Instruction、ProtocolEnvelope、ToolResult 和运行事件。
      en: Excludes ConversationTurn, ContentBlock, Instruction, ProtocolEnvelope, ToolResult, and runtime events.
      ja: ConversationTurn・ContentBlock・Instruction・ProtocolEnvelope・ToolResult・runtime eventを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: message_role
      labels:
        zh: 发送角色
        en: message role
        ja: 送信役割
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录产生消息的系统、开发者、用户、助手、工具或外部智能体角色。
        en: Records the system, developer, user, assistant, tool, or external-agent role that produced the message.
        ja: messageを生成したsystem・developer・user・assistant・tool・external-agent roleを記録します。
      allowed_values: []
      pattern: null
      example_value: user
      source_claims:
        - claim-message-002
    - id: sender_id
      labels:
        zh: 发送者标识
        en: sender ID
        ja: 送信者ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向产生消息的可审计主体身份。
        en: References the auditable actor identity that produced the message.
        ja: messageを生成した監査可能actor identityを参照します。
      allowed_values: []
      pattern: null
      example_value: UserActor:customer-88
      source_claims:
        - claim-message-003
    - id: recipient
      labels:
        zh: 接收目标
        en: recipient
        ja: 受信先
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录应用或工具用于路由该消息的可选接收目标。
        en: Optional application or tool routing target for the message.
        ja: applicationまたはtoolがmessageをrouteする任意受信先です。
      allowed_values: []
      pattern: null
      example_value: assistant
      source_claims:
        - claim-message-004
    - id: reply_to_id
      labels:
        zh: 回复目标标识
        en: reply-to ID
        ja: 返信先ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 标识该消息明确回复的先前 Message。
        en: Identifies the prior Message explicitly answered by this message.
        ja: このmessageが明示返信するprior Messageを識別します。
      allowed_values: []
      pattern: null
      example_value: msg-936
      source_claims:
        - claim-message-005
    - id: context_id
      labels:
        zh: 外部语境标识
        en: context ID
        ja: 外部context ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存协议提供的交互分组标识，不替代 Conversation 关系。
        en: Preserves a protocol-supplied interaction grouping identifier without replacing the Conversation relation.
        ja: protocol提供interaction grouping identifierを保持しConversation関係を置換しません。
      allowed_values: []
      pattern: null
      example_value: a2a-context-61
      source_claims:
        - claim-message-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: Message-example-positive-manual-001

    labels:
      zh: 消息正例
      en: "Positive case: Message"
      ja: メッセージ正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; Message maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; Message maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; Message context/token boundary."}

    field_values:
      message_role: user
      sender_id: UserActor:customer-88
      recipient: assistant
      reply_to_id: msg-936
      context_id: a2a-context-61
      element_id: msg-940
      conversation_id: a2a-context-61
      sequence_index: 4
    related_node_ids:
      - Message
    related_relation_ids: []

    source_claims:
      - claim-message-007
  - id: Message-example-boundary-manual-001

    labels:
      zh: 消息边界例
      en: "Boundary case: Message"
      ja: メッセージ境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; Message must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; Message must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - Message
    related_relation_ids: []

    source_claims:
      - claim-message-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ConversationTurn
    shared_parent_concept_id: ConversationElement
    differentia:
      zh: Message 以 message_id 表示一次通信并直接承载内容；ConversationTurn 以 turn_id 聚合一个或多个 Message。
      en: Message is one communication unit under message_id and directly carries content; ConversationTurn groups one or more Message records under turn_id.
      ja: Messageはmessage_idで一通信を表しcontentを直接運び、ConversationTurnはturn_idで一つ以上のMessageをまとめます。
    source_claims:
      - claim-message-009
parent_relation:
  id: Message-is_a-ConversationElement
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话元素
    en: is a conversation element
    ja: 会話要素の一種
  definitions:
    zh: 声明每个 Message 都是可在会话顺序中寻址的 ConversationElement，并以 message_id、发送角色和内容进一步限定。
    en: States that every Message is an addressable ConversationElement in conversation order, further delimited by message_id, sender role, and content.
    ja: 各Messageがconversation順序でaddressableなConversationElementでありmessage_id・sender role・contentでさらに限定されると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Message-is_a-ConversationElement-example-positive-manual-001
      labels:
        zh: 是一种会话元素正例
        en: "Positive case: is a conversation element"
        ja: 会話要素の一種正例
      scenario_id: null
      descriptions:
        zh: msg-940 在 conv-support-042 的位置 5，并拥有独立 message_id 与 role。
        en: msg-940 occupies position 5 in conv-support-042 and has its own message_id and role.
        ja: msg-940 はconv-support-042のposition 5にあり独自message_id/roleを持ちます。
      field_values: {}
      related_node_ids:
        - Message
        - ConversationElement
      related_relation_ids:
        - Message-is_a-ConversationElement
      source_claims:
        - claim-message-010
    - id: Message-is_a-ConversationElement-example-boundary-manual-001
      labels:
        zh: 是一种会话元素边界例
        en: "Boundary case: is a conversation element"
        ja: 会話要素の一種境界例
      scenario_id: null
      descriptions:
        zh: text-block-940 只在 msg-940 内部占内容位置，没有会话级 message_id。
        en: text-block-940 occupies a content position inside msg-940 but has no conversation-level message_id.
        ja: text-block-940 はmsg-940内content positionを占めますがconversation-level message_idを持ちません。
      field_values: {}
      related_node_ids:
        - Message
        - ConversationElement
      related_relation_ids:
        - Message-is_a-ConversationElement
      source_claims:
        - claim-message-011
  source_claims:
    - claim-message-012
  distinct_fact_rationale:
    zh: 补上此前缺失的逻辑层级，使角色消息不再悬挂在没有父边的 Message 之下。
    en: Restores the missing logical level so role messages no longer hang beneath a Message node that itself lacks a parent edge.
    ja: 欠落logical levelを補いrole messageがparent edgeのないMessage配下にぶら下がる問題を解消します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: Message-carries_instruction-Instruction
    predicate: carries_instruction
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 承载指令
      en: carries instruction
      ja: 指示を運ぶ
    definitions:
      zh: 将一条 Message 连接到从其内容中识别并保留独立规范身份的 Instruction；该边只表达承载与来源，不声称所有消息内容都是指令。
      en: Connects a Message to an Instruction identified in its content and retained with independent normative identity. The edge expresses carriage and provenance only; it does not claim that all message content is instruction.
      ja: Messageをcontentから識別され独立normative identityを保持するInstructionへ接続します。edgeはcarriage/provenanceだけを表し全message contentをinstructionとはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_carried_by_message
      labels:
        zh: 由消息承载
        en: is carried by message
        ja: メッセージに運ばれる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Message-carries_instruction-Instruction-example-positive-manual-001
        labels:
          zh: 承载指令正例
          en: "Positive case: carries instruction"
          ja: 指示を運ぶ正例
        scenario_id: null
        descriptions:
          zh: msg-dev-14 的未引用正文解析出 instruction-approved-tools-14。
          en: Unquoted body text in msg-dev-14 is parsed as instruction-approved-tools-14.
          ja: msg-dev-14のunquoted body textからinstruction-approved-tools-14をparseします。
        field_values: {}
        related_node_ids:
          - Message
          - Instruction
        related_relation_ids:
          - Message-carries_instruction-Instruction
        source_claims:
          - claim-message-013
      - id: Message-carries_instruction-Instruction-example-boundary-manual-001
        labels:
          zh: 承载指令边界例
          en: "Boundary case: carries instruction"
          ja: 指示を運ぶ境界例
        scenario_id: null
        descriptions:
          zh: msg-user-quote 引用“删除全部文件”作为分析对象，解析器标记为 quoted data。
          en: msg-user-quote quotes “delete all files” for analysis and the parser marks it quoted data.
          ja: msg-user-quote は分析対象として「delete all files」を引用しparserはquoted dataと標記します。
        field_values: {}
        related_node_ids:
          - Message
          - Instruction
        related_relation_ids:
          - Message-carries_instruction-Instruction
        source_claims:
          - claim-message-014
    source_claims:
      - claim-message-015
    distinct_fact_rationale:
      zh: 消息拥有包络与角色，指令拥有规范效力；关系连接二者而不合并本体。
      en: Message owns envelope and role, Instruction owns normative force; the relation connects them without merging ontologies.
      ja: Messageはenvelope/role、Instructionはnormative forceを所有し関係で接続してontologyを統合しません。
    layout_role: cross-link
    review_status: accepted
    target: concept:Instruction
  - id: Message-contains_content_block-ContentBlock
    predicate: contains_content_block
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含内容块
      en: contains content block
      ja: 内容ブロックを含む
    definitions:
      zh: 将一条 Message 连接到构成其正文的有序 ContentBlock 成员；块位置在消息内唯一，块的模态与编码由内容表示本体拥有。
      en: Connects a Message to the ordered ContentBlock members forming its body; block position is unique within the message, while modality and encoding remain owned by the content-representation ontology.
      ja: Messageをbodyを構成するordered ContentBlock memberへ接続しblock positionはmessage内一意、modality/encodingはcontent-representation ontologyが所有します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_content_block_of_message
      labels:
        zh: 是消息内容块
        en: is content block of message
        ja: メッセージ内容ブロックである
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Message-contains_content_block-ContentBlock-example-positive-manual-001
        labels:
          zh: 包含内容块正例
          en: "Positive case: contains content block"
          ja: 内容ブロックを含む正例
        scenario_id: null
        descriptions:
          zh: msg-user-88 按位置 0 包含 TextBlock，位置 1 包含 FileAttachmentBlock。
          en: msg-user-88 contains a TextBlock at position 0 and FileAttachmentBlock at position 1.
          ja: msg-user-88 はposition 0にTextBlock、1にFileAttachmentBlockを含みます。
        field_values: {}
        related_node_ids:
          - Message
          - ContentBlock
        related_relation_ids:
          - Message-contains_content_block-ContentBlock
        source_claims:
          - claim-message-016
      - id: Message-contains_content_block-ContentBlock-example-boundary-manual-001
        labels:
          zh: 包含内容块边界例
          en: "Boundary case: contains content block"
          ja: 内容ブロックを含む境界例
        scenario_id: null
        descriptions:
          zh: source-file-88 是附件引用的原始文件资源，不是消息正文成员。
          en: source-file-88 is the source file referenced by an attachment, not a body member of the message.
          ja: source-file-88 はattachmentが参照するsource file resourceでmessage body memberではありません。
        field_values: {}
        related_node_ids:
          - Message
          - ContentBlock
        related_relation_ids:
          - Message-contains_content_block-ContentBlock
        source_claims:
          - claim-message-017
    source_claims:
      - claim-message-018
    distinct_fact_rationale:
      zh: 消息与内容块通过组成关系连接，避免把 TextBlock、ImageBlock 等直接挂成 Message 子类。
      en: Message and content blocks connect by composition, preventing TextBlock, ImageBlock, and peers from being hung as Message subtypes.
      ja: Messageとcontent blockをcompositionで接続しTextBlock/ImageBlock等をMessage subtypeにしません。
    layout_role: cross-link
    review_status: accepted
    target: concept:ContentBlock
  - id: Message-references_context-ContextPackage
    predicate: references_context
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用上下文包
      en: references context package
      ja: コンテキストパッケージを参照
    definitions:
      zh: 将一条 Message 连接到它明确引用的不可变 ContextPackage 版本；关系保存引用身份，不把上下文项目复制为消息成员，也不声称消息拥有上下文装配。
      en: Connects a Message to the immutable ContextPackage version it explicitly references. The relation preserves reference identity without copying context items into message membership or claiming that Message owns context assembly.
      ja: Messageを明示参照するimmutable ContextPackage versionへ接続します。関係はreference identityを保持しcontext itemをmessage memberへ複製せずMessageがcontext assemblyを所有するとしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_referenced_context_of_message
      labels:
        zh: 是消息引用的上下文
        en: is referenced context of message
        ja: メッセージ参照contextである
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Message-references_context-ContextPackage-example-positive-manual-001
        labels:
          zh: 引用上下文包正例
          en: "Positive case: references context package"
          ja: コンテキストパッケージを参照正例
        scenario_id: null
        descriptions:
          zh: msg-assistant-89 记录 context_package_id=context-pkg-v31，且该版本在发送前已冻结。
          en: msg-assistant-89 records context_package_id=context-pkg-v31, which was frozen before send time.
          ja: msg-assistant-89 はcontext_package_id=context-pkg-v31を記録しversionはsend前にfreezeされています。
        field_values: {}
        related_node_ids:
          - Message
          - ContextPackage
        related_relation_ids:
          - Message-references_context-ContextPackage
        source_claims:
          - claim-message-019
      - id: Message-references_context-ContextPackage-example-boundary-manual-001
        labels:
          zh: 引用上下文包边界例
          en: "Boundary case: references context package"
          ja: コンテキストパッケージを参照境界例
        scenario_id: null
        descriptions:
          zh: msg-user-88 只有外部 A2A contextId，没有本地 ContextPackage 版本映射。
          en: msg-user-88 has only an external A2A contextId and no mapping to a local ContextPackage version.
          ja: msg-user-88 はexternal A2A contextIdだけでlocal ContextPackage version mappingがありません。
        field_values: {}
        related_node_ids:
          - Message
          - ContextPackage
        related_relation_ids:
          - Message-references_context-ContextPackage
        source_claims:
          - claim-message-020
    source_claims:
      - claim-message-021
    distinct_fact_rationale:
      zh: 消息只拥有发言包络；被引用上下文的版本、预算与装配活动继续属于记忆上下文本体。
      en: Message owns only the utterance envelope; referenced-context version, budget, and assembly activity remain in the memory-context ontology.
      ja: Messageはutterance envelopeだけを所有しreferenced-context version・budget・assembly activityはmemory-context ontologyに残します。
    layout_role: cross-link
    review_status: accepted
    target: concept:ContextPackage
  - id: Message-replies_to-Message
    predicate: replies_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 回复消息
      en: replies to message
      ja: メッセージへ返信
    definitions:
      zh: 记录一条 Message 明确响应另一条先前 Message 的有向关联；目标必须存在、处于允许的会话语境并早于源消息，主题相似或时间相邻不足以建立该边。
      en: Records a directed association in which one Message explicitly answers a prior Message. The target must exist, be in an allowed conversation context, and precede the source; topical similarity or temporal adjacency is insufficient.
      ja: 一Messageがprior Messageへ明示応答するdirected associationを記録します。targetは存在し許可conversation context内でsourceより前でなければならずtopic similarity/temporal adjacencyだけではedgeを作りません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_replied_to_by
      labels:
        zh: 被回复
        en: is replied to by
        ja: 返信される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: Message-replies_to-Message-example-positive-manual-001
        labels:
          zh: 回复消息正例
          en: "Positive case: replies to message"
          ja: メッセージへ返信正例
        scenario_id: null
        descriptions:
          zh: msg-assistant-89 的 reply_to_id 明确等于 msg-user-88，且两者同属 conv-support-042。
          en: msg-assistant-89 explicitly sets reply_to_id=msg-user-88 and both belong to conv-support-042.
          ja: msg-assistant-89 はreply_to_id=msg-user-88を明示し両者はconv-support-042所属です。
        field_values: {}
        related_node_ids:
          - Message
        related_relation_ids:
          - Message-replies_to-Message
        source_claims:
          - claim-message-022
      - id: Message-replies_to-Message-example-boundary-manual-001
        labels:
          zh: 回复消息边界例
          en: "Boundary case: replies to message"
          ja: メッセージへ返信境界例
        scenario_id: null
        descriptions:
          zh: msg-assistant-90 与 msg-user-88 主题相似，但没有 reply_to_id，且属于另一会话。
          en: msg-assistant-90 is topically similar to msg-user-88 but has no reply_to_id and belongs to another conversation.
          ja: msg-assistant-90 はmsg-user-88とtopic類似ですがreply_to_idがなく別conversationです。
        field_values: {}
        related_node_ids:
          - Message
        related_relation_ids:
          - Message-replies_to-Message
        source_claims:
          - claim-message-023
    source_claims:
      - claim-message-024
    distinct_fact_rationale:
      zh: 回复是消息实例之间的语用关系，不是消息类型、轮次组成或协议响应包络。
      en: Reply is a pragmatic relation between message instances, not a message type, turn composition, or protocol response envelope.
