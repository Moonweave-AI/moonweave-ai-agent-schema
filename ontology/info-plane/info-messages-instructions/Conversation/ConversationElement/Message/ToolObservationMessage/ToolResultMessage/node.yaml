schema: moonweave.ai/ontology-node/v1
id: ToolResultMessage
kind: concept
labels:
  zh: 工具结果消息
  en: Tool-result message
  ja: ツール結果メッセージ
semantics:
  short_definition:
    zh: 携带一次已完成工具调用结果内容的 ToolObservationMessage 特化。
    en: ToolObservationMessage specialization carrying content of one completed tool invocation result.
    ja: 完了した tool 呼び出し結果 content を運ぶ ToolObservationMessage 特化。
  definition:
    zh: ToolResultMessage 通过 tool_call_id/tool_use_id 引用先前 AssistantMessage 中的 tool_use 或 OpenAI tool_calls；result_status 记录 success、error 或 cancelled。它是模型可见的结果消息，不是 ToolResult 执行身份或 runtime 模块中的 invocation 记录。
    en: ToolResultMessage references prior tool_use in AssistantMessage or OpenAI tool_calls via tool_call_id/tool_use_id; result_status records success, error, or cancelled. It is the model-visible result message, not ToolResult execution identity or runtime invocation records.
    ja: ToolResultMessage は tool_use_id 配对で結果を返す model-visible message。
  why_needed:
    zh: 形成“工具观测 → 工具结果消息”的真实层级，保留消息身份与执行结果身份之间的可追踪桥接。
    en: Creates the real ToolObservationMessage → ToolResultMessage hierarchy while preserving a traceable bridge between message identity and execution-result identity.
    ja: ToolObservationMessage→ToolResultMessageの実階層を作りmessage identityとexecution-result identityのtraceable bridgeを保持します。
  includes:
    - zh: 纳入与 tool_call_id 关联、状态为 success 或 terminal-error 并引用 ToolResult 的会话消息。
      en: Includes conversation messages correlated by tool_call_id with success or terminal-error status and a ToolResult reference.
      ja: tool_call_idで相関しstatusがsuccess/terminal-errorでToolResultを参照するconversation messageを含みます。
  excludes:
    - zh: 排除进度、日志和非终止警告通知，以及 ToolResult、ToolInvocation 和原始工具输出本身。
      en: Excludes progress, logs, non-terminal warnings, and the ToolResult, ToolInvocation, or raw tool output itself.
      ja: progress・log・non-terminal warning・ToolResult・ToolInvocation・raw tool output自体を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 配对规则：Anthropic tool_result.tool_use_id 必须指向同会话较早 assistant tool_use；OpenAI tool_call_id 必须指向 assistant tool_calls.id。孤立 tool_result 拒绝注册为 ToolResultMessage evidence。
    en: "Pairing rule: Anthropic tool_result.tool_use_id must point to an earlier assistant tool_use in the same conversation; OpenAI tool_call_id must point to assistant tool_calls.id. Orphan tool_result must not register as ToolResultMessage evidence."
    ja: tool_use_id/tool_call_id 配对必須。
  typical_input:
    - description: Paired Anthropic tool_result
      format: '{"role":"user","content":[{"type":"tool_result","tool_use_id":"toolu_01","content":"Revenue +12%"}]}'
      source_claims:
        - claim-tool-result-anthropic
  typical_output:
    - description: ToolResultMessage record
      format: '{"message_id":"msg-903-user","tool_call_id":"toolu_01","result_status":"success"}'
      source_claims:
        - claim-tool-result-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: tool_call_id
      labels:
        zh: 工具调用标识
        en: tool call ID
        ja: ツール呼出しID
      definitions:
        zh: 关联产生该终止结果的具体 ToolInvocation。
        en: Correlates the concrete ToolInvocation that produced this terminal result.
        ja: このterminal resultを生成した具体ToolInvocationに相関します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: tool-call-312
      allowed_values: []
      source_claims:
        - claim-tool-result-message-002
    - id: result_status
      labels:
        zh: 结果状态
        en: result status
        ja: 結果状態
      definitions:
        zh: 记录包装结果是 success 还是 terminal-error。
        en: Records whether the packaged result is success or terminal-error.
        ja: packaged resultがsuccessかterminal-errorか記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: success
      allowed_values: []
      source_claims:
        - claim-tool-result-message-003
  constraints: []
  required_relations: []
examples:
  - id: ToolResultMessage-example-anthropic-pair
    labels:
      zh: Anthropic 配对 tool_result
      en: Anthropic paired tool_result
      ja: Anthropic 配对 tool_result
    descriptions:
      zh: msg-903-user tool_result tool_use_id=toolu_01 回答 msg-902-assistant 的 lookup 调用，result_status=success。
      en: msg-903-user tool_result tool_use_id=toolu_01 answers msg-902-assistant lookup call with result_status=success.
      ja: tool_use 配对 tool_result。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: tool_result pairing
    field_values:
      tool_call_id: toolu_01
      result_status: success
    related_node_ids:
      - ToolResultMessage
      - AssistantMessage
    related_relation_ids: []
    source_claims:
      - claim-tool-result-anthropic
  - id: ToolResultMessage-example-openai-tool
    labels:
      zh: OpenAI tool 结果
      en: OpenAI tool result
      ja: OpenAI tool result
    descriptions:
      zh: role=tool tool_call_id=call_01 返回 JSON，result_status=success。
      en: role=tool tool_call_id=call_01 returns JSON with result_status=success.
      ja: OpenAI tool result message。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: role=tool
    field_values:
      tool_call_id: call_01
      result_status: success
    related_node_ids:
      - ToolResultMessage
    related_relation_ids: []
    source_claims:
      - claim-tool-result-openai
  - id: ToolResultMessage-example-orphan-boundary
    labels:
      zh: 孤立 tool_result 边界
      en: Orphan tool_result boundary
      ja: 孤立 tool_result 境界
    descriptions:
      zh: tool_use_id=toolu_99 无对应 assistant tool_use 时不得断言 ToolResultMessage。
      en: tool_use_id=toolu_99 without matching assistant tool_use must not assert ToolResultMessage.
      ja: orphan tool_result 拒否。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values:
      tool_call_id: toolu_99
    related_node_ids:
      - ToolResultMessage
    related_relation_ids: []
    source_claims:
      - claim-tool-result-design
parent_relation:
  id: ToolResultMessage-is_a-ToolObservationMessage
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种工具观测消息
    en: is a tool-observation message
    ja: ツール観測メッセージの一種
  definitions:
    zh: 声明每个与一次 ToolInvocation 关联、具有终止状态并引用 ToolResult 的 ToolResultMessage 都是更一般的 ToolObservationMessage。
    en: States that every ToolResultMessage correlated to a ToolInvocation, carrying terminal status, and referencing ToolResult is a more specific ToolObservationMessage.
    ja: ToolInvocationに相関しterminal statusを持ちToolResultを参照する全ToolResultMessageがより一般的ToolObservationMessageであると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolResultMessage-is_a-ToolObservationMessage-example-positive-manual-001
      labels:
        zh: 是一种工具观测消息正例
        en: "Positive case: is a tool-observation message"
        ja: ツール観測メッセージの一種正例
      descriptions:
        zh: tool-result-msg-312 关联 tool-call-312、状态 success，并引用 result-312。
        en: tool-result-msg-312 correlates tool-call-312, has status success, and references result-312.
        ja: tool-result-msg-312 はtool-call-312に相関しstatus=successでresult-312を参照します。
      field_values: {}
      related_node_ids:
        - ToolResultMessage
        - ToolObservationMessage
      related_relation_ids:
        - ToolResultMessage-is_a-ToolObservationMessage
      source_claims:
        - claim-tool-result-message-006
    - id: ToolResultMessage-is_a-ToolObservationMessage-example-boundary-manual-001
      labels:
        zh: 是一种工具观测消息边界例
        en: "Boundary case: is a tool-observation message"
        ja: ツール観測メッセージの一種境界例
      descriptions:
        zh: tool-progress-msg-312 只有进行中进度，没有结果引用。
        en: tool-progress-msg-312 carries in-progress status and no result reference.
        ja: tool-progress-msg-312 はin-progress statusだけでresult referenceがありません。
      field_values: {}
      related_node_ids:
        - ToolResultMessage
        - ToolObservationMessage
      related_relation_ids:
        - ToolResultMessage-is_a-ToolObservationMessage
      source_claims:
        - claim-tool-result-message-007
  source_claims:
    - claim-tool-result-message-008
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ToolResultMessage-references_tool_result-ToolResult
    predicate: references_tool_result
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用工具结果
      en: references tool result
      ja: ツール結果を参照
    definitions:
      zh: 将一个 ToolResultMessage 连接到它所包装的独立 ToolResult 记录；两端必须共享同一 tool_call_id，消息只负责会话呈现，结果记录负责执行输出与状态。
      en: Connects a ToolResultMessage to the separate ToolResult record it packages. Both endpoints must share tool_call_id; the message owns conversational presentation while the result record owns execution output and status.
      ja: ToolResultMessageをpackagingする独立ToolResult recordへ接続します。両endpointは同一tool_call_idを共有しmessageはconversation presentation、result recordはexecution output/statusを所有します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_referenced_by_tool_result_message
      labels:
        zh: 被工具结果消息引用
        en: is referenced by tool-result message
        ja: tool-result messageに参照される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ToolResultMessage-references_tool_result-ToolResult-example-positive-manual-001
        labels:
          zh: 引用工具结果正例
          en: "Positive case: references tool result"
          ja: ツール結果を参照正例
        descriptions:
          zh: tool-result-msg-312 与 result-312 均记录 tool_call_id=tool-call-312。
          en: tool-result-msg-312 and result-312 both record tool_call_id=tool-call-312.
          ja: tool-result-msg-312/result-312は共にtool_call_id=tool-call-312を記録します。
        field_values: {}
        related_node_ids:
          - ToolResultMessage
          - ToolResult
        related_relation_ids:
          - ToolResultMessage-references_tool_result-ToolResult
        source_claims:
          - claim-tool-result-message-009
      - id: ToolResultMessage-references_tool_result-ToolResult-example-boundary-manual-001
        labels:
          zh: 引用工具结果边界例
          en: "Boundary case: references tool result"
          ja: ツール結果を参照境界例
        descriptions:
          zh: tool-progress-msg-312 关联同一调用但没有终止 ToolResult。
          en: tool-progress-msg-312 correlates to the same call but has no terminal ToolResult.
          ja: tool-progress-msg-312 は同callに相関しますがterminal ToolResultがありません。
        field_values: {}
        related_node_ids:
          - ToolResultMessage
          - ToolResult
        related_relation_ids:
          - ToolResultMessage-references_tool_result-ToolResult
        source_claims:
          - claim-tool-result-message-010
    source_claims:
      - claim-tool-result-message-011
    layout_role: cross-link
    target: concept:ToolResult
