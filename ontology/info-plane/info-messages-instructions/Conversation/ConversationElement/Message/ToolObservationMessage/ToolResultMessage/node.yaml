schema: moonweave.ai/ontology-node/v1
id: ToolResultMessage
kind: concept
status: accepted
labels:
  zh: 工具结果消息
  en: Tool-result message
  ja: ツール結果メッセージ
semantics:
  short_definition:
    zh: 把一次工具调用的终止结果封装进会话的工具观测消息。
    en: A tool-observation message that stages one tool invocation's terminal result into a conversation.
    ja: 一tool invocationのterminal resultをconversationへstageするtool-observation messageです。
  definition:
    zh: ToolResultMessage 是 ToolObservationMessage 的严格子类，表示一次已关联 ToolInvocation 的成功结果或终止错误被包装为会话消息；它必须引用独立 ToolResult，不覆盖进度或日志通知，也不把消息包络误作工具执行结果本身。
    en: ToolResultMessage is a strict subtype of ToolObservationMessage representing a successful result or terminal error of a correlated ToolInvocation packaged as a conversation message. It must reference a separate ToolResult, excludes progress and log notifications, and does not turn the message envelope into the execution result itself.
    ja: ToolResultMessage はcorrelated ToolInvocationのsuccess resultまたはterminal errorをconversation messageに包むToolObservationMessageのstrict subtypeです。独立ToolResultを参照しprogress/log notificationを除外しmessage envelopeをexecution result自体にしません。
  why_needed:
    zh: 形成“工具观测 → 工具结果消息”的真实层级，保留消息身份与执行结果身份之间的可追踪桥接。
    en: Creates the real ToolObservationMessage → ToolResultMessage hierarchy while preserving a traceable bridge between message identity and execution-result identity.
    ja: ToolObservationMessage→ToolResultMessageの実階層を作りmessage identityとexecution-result identityのtraceable bridgeを保持します。
  includes:
    - zh: 纳入与 tool_call_id 关联、状态为 success 或 terminal-error 并引用 ToolResult 的会话消息。
      en: Includes conversation messages correlated by tool_call_id with success or terminal-error status and a ToolResult reference.
      ja: tool_call_idで相関しstatusがsuccess/terminal-errorでToolResultを参照するconversation messageを含みます。
  excludes:
    - zh: 排除进度、日志和非终止警告通知，以及 ToolResult、ToolInvocation 和原始工具输出本身。
      en: Excludes progress, logs, non-terminal warnings, and the ToolResult, ToolInvocation, or raw tool output itself.
      ja: progress・log・non-terminal warning・ToolResult・ToolInvocation・raw tool output自体を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: tool_call_id
      labels:
        zh: 工具调用标识
        en: tool call ID
        ja: ツール呼出しID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 关联产生该终止结果的具体 ToolInvocation。
        en: Correlates the concrete ToolInvocation that produced this terminal result.
        ja: このterminal resultを生成した具体ToolInvocationに相関します。
      allowed_values: []
      pattern: null
      example_value: tool-call-312
      source_claims:
        - claim-tool-result-message-002
    - id: result_status
      labels:
        zh: 结果状态
        en: result status
        ja: 結果状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录包装结果是 success 还是 terminal-error。
        en: Records whether the packaged result is success or terminal-error.
        ja: packaged resultがsuccessかterminal-errorか記録します。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-tool-result-message-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolResultMessage-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具结果消息正例
      en: "Positive case: Tool-result message"
      ja: ツール結果メッセージ正例
    scenario_id: null
    descriptions:
      zh: tool-result-msg-312 包装 tool-call-312 的成功结果并引用 ToolResult result-312。
      en: tool-result-msg-312 packages the successful result of tool-call-312 and references ToolResult result-312.
      ja: tool-result-msg-312 はtool-call-312のsuccess resultを包みToolResult result-312を参照します。
    field_values:
      tool_call_id: tool-call-312
      result_status: success
      tool_name: flight_search
      observation_kind: result
      message_role: tool
      sender_id: ToolActor:flight_search
      element_id: tool-result-msg-312
      conversation_id: conv-travel-202
      sequence_index: 5
    related_node_ids:
      - ToolResultMessage
    related_relation_ids: []
    expected_result:
      zh: 识别为 ToolResultMessage。
      en: Identify ToolResultMessage.
      ja: ToolResultMessageと識別します。
    why_valid_or_invalid:
      zh: 消息具有终止状态、调用关联和独立结果引用，满足更深子类条件。
      en: The message has terminal status, invocation correlation, and a separate result reference, satisfying the deeper subtype condition.
      ja: terminal status・invocation correlation・separate result referenceを持ちdeep subtype条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-result-message-004
  - id: ToolResultMessage-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具结果消息边界例
      en: "Boundary case: Tool-result message"
      ja: ツール結果メッセージ境界例
    scenario_id: null
    descriptions:
      zh: tool-progress-msg-312 报告 75% 进度，调用仍在运行且没有 ToolResult。
      en: tool-progress-msg-312 reports 75% progress while the call is still running and has no ToolResult.
      ja: tool-progress-msg-312 は75% progressを報告しcallは実行中でToolResultがありません。
    field_values: {}
    related_node_ids:
      - ToolResultMessage
    related_relation_ids: []
    expected_result:
      zh: 只识别为 ToolObservationMessage，不得识别为 ToolResultMessage。
      en: Identify only ToolObservationMessage, not ToolResultMessage.
      ja: ToolObservationMessageだけとしToolResultMessageではありません。
    why_valid_or_invalid:
      zh: 非终止通知缺少完成状态和结果身份。
      en: A non-terminal notification lacks completion status and result identity.
      ja: non-terminal notificationはcompletion statusとresult identityを欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-result-message-005
