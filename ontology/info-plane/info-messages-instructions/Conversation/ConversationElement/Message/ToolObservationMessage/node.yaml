external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ExternalAgentMessage
    shared_parent_concept_id: Message
    differentia:
      zh: ToolObservationMessage 的来源是工具或环境反馈；ExternalAgentMessage 的来源是具有独立协议身份的远端智能体。
      en: ToolObservationMessage originates from tool or environment feedback; ExternalAgentMessage originates from a remote agent with independent protocol identity.
      ja: ToolObservationMessageはtool/environment feedback由来、ExternalAgentMessageは独立protocol identityを持つremote agent由来です。
    source_claims:
      - claim-tool-observation-message-006
parent_relation:
