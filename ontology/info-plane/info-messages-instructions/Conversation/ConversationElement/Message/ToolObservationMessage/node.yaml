      en: "Positive case: Tool-observation message"
      ja: ツール観測メッセージ正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ToolObservationMessage maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ToolObservationMessage maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ToolObservationMessage context/token boundary."}

    field_values:
