  distinct_fact_rationale:
    zh: 该父节点统一结果、进度、日志、警告与错误的消息形式，但不吞并实际执行或遥测对象。
    en: This parent unifies the message form of results, progress, logs, warnings, and errors without absorbing the execution or telemetry objects themselves.
    ja: result・progress・log・warning・errorのmessage formを統一しexecution/telemetry object自体を吸収しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
