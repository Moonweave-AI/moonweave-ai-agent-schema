schema: moonweave.ai/ontology-node/v1
id: ToolObservationMessage
kind: concept
labels:
  zh: 工具观测消息
  en: Tool-observation message
  ja: ツール観測メッセージ
semantics:
  short_definition:
    zh: 记录工具或环境观察结果、以 tool 相关角色提交的消息上位类型。
    en: Supertype for messages submitting tool or environment observations under tool-related roles.
    ja: tool 関連 role で tool/environment observation を提出する message 上位型。
  definition:
    zh: ToolObservationMessage 是 Message 的子类，覆盖 OpenAI role:tool、Anthropic user turn 中的 tool_result block 载体，以及 MCP 工具结果注入消息；observation_kind 区分 result、error 或 progress。它不是 ToolInvocation 执行记录或 ToolResult 本体。
    en: ToolObservationMessage is a Message subtype covering OpenAI role:tool, Anthropic user-turn carriers of tool_result blocks, and MCP tool-result injection messages. observation_kind distinguishes result, error, or progress. It is not a ToolInvocation execution record or ToolResult ontology object.
    ja: ToolObservationMessage は OpenAI tool/Anthropic tool_result 载体。ToolResult 本体ではない。
  why_needed:
    zh: 为工具返回进入会话的“消息形式”建立上位节点，使最终结果成为更深子类而非与所有工具观测平铺。
    en: Provides a superclass for the message form of tool feedback, allowing final results to be a deeper subtype rather than a peer of all tool observations.
    ja: tool feedbackのmessage formに上位nodeを与えfinal resultを全tool observationと平置きせず深いsubtypeにします。
  includes:
    - zh: 纳入以 tool 角色或等价协议来源进入会话的结果、进度、日志、警告与错误观测。
      en: Includes result, progress, log, warning, and error observations entering the conversation with tool role or equivalent protocol provenance.
      ja: tool roleまたは同等protocol provenanceでconversationへ入るresult・progress・log・warning・error observationを含みます。
  excludes:
    - zh: 排除实际 ToolInvocation、独立 ToolResult、环境 TraceEvent、AssistantMessage 和未封装的 stdout chunk。
      en: Excludes the actual ToolInvocation, standalone ToolResult, environment TraceEvent, AssistantMessage, and unwrapped stdout chunks.
      ja: 実際のToolInvocation・独立ToolResult・environment TraceEvent・AssistantMessage・unwrapped stdout chunkを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Anthropic 要求 tool_result 出现在 user role turn 内并通过 tool_use_id 配对；OpenAI 使用 role:tool 与 tool_call_id。ToolObservationMessage 统一“把工具输出送回模型”的消息语义而不复制执行 telemetry。
    en: Anthropic requires tool_result in a user-role turn paired via tool_use_id; OpenAI uses role:tool with tool_call_id. ToolObservationMessage unifies messages returning tool output to the model without copying execution telemetry.
    ja: tool_result/tool role を ToolObservationMessage に統一。
  typical_input:
    - description: Anthropic tool_result in user turn
      format: '{"role":"user","content":[{"type":"tool_result","tool_use_id":"toolu_01","content":"22C"}]}'
      source_claims:
        - claim-tool-obs-anthropic
  typical_output:
    - description: OpenAI tool role message
      format: '{"role":"tool","tool_call_id":"call_01","content":"{\"temp\":22}"}'
      source_claims:
        - claim-tool-obs-openai
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: tool_name
      labels:
        zh: 工具名称
        en: tool name
        ja: ツール名
      definitions:
        zh: 记录产生该观测的工具名称或环境适配器。
        en: Records the tool name or environment adapter that produced the observation.
        ja: observationを生成したtool名またはenvironment adapterを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: flight_search
      allowed_values: []
      source_claims:
        - claim-tool-observation-message-002
    - id: observation_kind
      labels:
        zh: 观测类别
        en: observation kind
        ja: 観測種別
      definitions:
        zh: 区分 result、progress、log、warning 或 error 等消息形式。
        en: Distinguishes result, progress, log, warning, or error message forms.
        ja: result・progress・log・warning・error等message formを区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: progress
      allowed_values: []
      source_claims:
        - claim-tool-observation-message-003
  constraints: []
  required_relations: []
examples:
  - id: ToolObservationMessage-example-anthropic
    labels:
      zh: Anthropic tool_result 载体
      en: Anthropic tool_result carrier
      ja: Anthropic tool_result 载体
    descriptions:
      zh: user turn 含 tool_result block tool_use_id=toolu_01，建模为 ToolObservationMessage observation_kind=result。
      en: User turn with tool_result block tool_use_id=toolu_01 modeled as ToolObservationMessage observation_kind=result.
      ja: Anthropic tool_result carrier。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: tool_result
    field_values:
      tool_name: get_weather
      observation_kind: result
    related_node_ids:
      - ToolObservationMessage
      - ToolResultMessage
    related_relation_ids: []
    source_claims:
      - claim-tool-obs-anthropic
  - id: ToolObservationMessage-example-openai-tool-role
    labels:
      zh: OpenAI role:tool
      en: OpenAI role:tool
      ja: OpenAI role:tool
    descriptions:
      zh: role=tool 消息 tool_call_id=call_01 返回 JSON 字符串，建模为 ToolObservationMessage。
      en: role=tool message tool_call_id=call_01 returns JSON string modeled as ToolObservationMessage.
      ja: OpenAI tool role message。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: role=tool
    field_values:
      tool_name: get_weather
      observation_kind: result
    related_node_ids:
      - ToolObservationMessage
    related_relation_ids: []
    source_claims:
      - claim-tool-obs-openai
  - id: ToolObservationMessage-example-not-invocation
    labels:
      zh: 非 ToolInvocation
      en: Not ToolInvocation
      ja: ToolInvocation ではない
    descriptions:
      zh: 工具执行 HTTP 日志没有 message role，不得识别为 ToolObservationMessage。
      en: Tool execution HTTP logs without message role must not be ToolObservationMessage.
      ja: HTTP log≠ToolObservationMessage。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ToolObservationMessage
    related_relation_ids: []
    source_claims:
      - claim-tool-obs-design
parent_relation:
  id: ToolObservationMessage-is_a-Message
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种消息
    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明每个进入会话、具有 message_id 和工具或环境来源的 ToolObservationMessage 都满足 Message 条件。
    en: States that every ToolObservationMessage staged into a conversation with message_id and tool or environment provenance satisfies Message conditions.
    ja: conversationへstageされmessage_idとtool/environment provenanceを持つ全ToolObservationMessageがMessage条件を満たすと宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolObservationMessage-is_a-Message-example-positive-manual-001
      labels:
        zh: 是一种消息正例
        en: "Positive case: is a message"
        ja: メッセージの一種正例
      descriptions:
        zh: tool-obs-msg-311 是进入当前轮次的工具进度通知。
        en: tool-obs-msg-311 is a tool progress notification staged into the current turn.
        ja: tool-obs-msg-311 はcurrent turnへstageされたtool progress notificationです。
      field_values: {}
      related_node_ids:
        - ToolObservationMessage
        - Message
      related_relation_ids:
        - ToolObservationMessage-is_a-Message
      source_claims:
        - claim-tool-observation-message-007
    - id: ToolObservationMessage-is_a-Message-example-boundary-manual-001
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      descriptions:
        zh: trace-311 是未进入会话的内部 TraceEvent。
        en: trace-311 is an internal TraceEvent never staged into the conversation.
        ja: trace-311 はconversationへstageされない内部TraceEventです。
      field_values: {}
      related_node_ids:
        - ToolObservationMessage
        - Message
      related_relation_ids:
        - ToolObservationMessage-is_a-Message
      source_claims:
        - claim-tool-observation-message-008
  source_claims:
    - claim-tool-observation-message-009
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
