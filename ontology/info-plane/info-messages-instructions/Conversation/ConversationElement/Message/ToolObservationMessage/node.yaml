schema: moonweave.ai/ontology-node/v1
id: ToolObservationMessage
kind: concept
status: accepted
labels:
  zh: 工具观测消息
  en: Tool-observation message
  ja: ツール観測メッセージ
semantics:
  short_definition:
    zh: 把工具或环境交互产生的观测封装进会话的消息。
    en: A message that stages an observation from tool or environment interaction into a conversation.
    ja: toolまたはenvironment interactionのobservationをconversationへstageするmessageです。
  definition:
    zh: ToolObservationMessage 是 Message 的角色专门类型，表示工具、环境或协议参与方产生并进入后续对话上下文的观测；它覆盖最终结果、进度、日志、警告或错误消息，但不等同于 ToolInvocation、ToolResult、TraceEvent 或原始标准输出。
    en: ToolObservationMessage is a role specialization of Message for observations produced by a tool, environment, or protocol participant and staged into later conversational context. It covers final results, progress, logs, warnings, or error messages, but is not the ToolInvocation, ToolResult, TraceEvent, or raw standard output itself.
    ja: ToolObservationMessage はtool・environment・protocol participantが生成し後続conversation contextへstageするobservationのMessage specializationです。final result・progress・log・warning・error messageを含みますがToolInvocation・ToolResult・TraceEvent・raw stdout自体ではありません。
  why_needed:
    zh: 为工具返回进入会话的“消息形式”建立上位节点，使最终结果成为更深子类而非与所有工具观测平铺。
    en: Provides a superclass for the message form of tool feedback, allowing final results to be a deeper subtype rather than a peer of all tool observations.
    ja: tool feedbackのmessage formに上位nodeを与えfinal resultを全tool observationと平置きせず深いsubtypeにします。
  includes:
    - zh: 纳入以 tool 角色或等价协议来源进入会话的结果、进度、日志、警告与错误观测。
      en: Includes result, progress, log, warning, and error observations entering the conversation with tool role or equivalent protocol provenance.
      ja: tool roleまたは同等protocol provenanceでconversationへ入るresult・progress・log・warning・error observationを含みます。
  excludes:
    - zh: 排除实际 ToolInvocation、独立 ToolResult、环境 TraceEvent、AssistantMessage 和未封装的 stdout chunk。
      en: Excludes the actual ToolInvocation, standalone ToolResult, environment TraceEvent, AssistantMessage, and unwrapped stdout chunks.
      ja: 実際のToolInvocation・独立ToolResult・environment TraceEvent・AssistantMessage・unwrapped stdout chunkを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: tool_name
      labels:
        zh: 工具名称
        en: tool name
        ja: ツール名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录产生该观测的工具名称或环境适配器。
        en: Records the tool name or environment adapter that produced the observation.
        ja: observationを生成したtool名またはenvironment adapterを記録します。
      allowed_values: []
      pattern: null
      example_value: flight_search
      source_claims:
        - claim-tool-observation-message-002
    - id: observation_kind
      labels:
        zh: 观测类别
        en: observation kind
        ja: 観測種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 result、progress、log、warning 或 error 等消息形式。
        en: Distinguishes result, progress, log, warning, or error message forms.
        ja: result・progress・log・warning・error等message formを区別します。
      allowed_values: []
      pattern: null
      example_value: progress
      source_claims:
        - claim-tool-observation-message-003
  constraints: []
  required_relation_constraints: []
examples:
