        zh: tool-obs-msg-311 是进入当前轮次的工具进度通知。
        en: tool-obs-msg-311 is a tool progress notification staged into the current turn.
        ja: tool-obs-msg-311 はcurrent turnへstageされたtool progress notificationです。
      field_values: {}
