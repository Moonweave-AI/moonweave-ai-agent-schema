    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec Definitions section lists the system role and states that role is set externally by the application/platform.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-002
    source: eng-spec-openai-model-spec-2025
    supports: "The Model Spec Definitions section lists the system role and states that role is set externally by the application/platform. For SystemMessage, the authority_source field records exactly this auditable datum: Trusted platform source assigning the system role rather than a value inferred from body text."
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-003
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec Definitions section lists the system role and states that role is set externally by the application/platform. The Model Spec states that role is set externally and defines system messages as platform-supplied messages.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-004
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec Definitions section lists the system role and states that role is set externally by the application/platform. The Model Spec makes role externally assigned and treats lower-authority content as unable to self-promote.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-005
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec Definitions section lists the system role and states that role is set externally by the application/platform. Moonweave contrasts SystemMessage with DeveloperMessage under Message using the endpoint-specific identity condition stated in this differentia.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-006
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec enumerates system as a message role and states that role is assigned externally. The case directly instantiates the system-role definition.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-007
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec enumerates system as a message role and states that role is assigned externally. External role assignment provides the authoritative boundary.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-message-008
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec enumerates system as a message role and states that role is assigned externally.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-system-openai
    source: src-openai-chat
    supports: OpenAI supports system role messages for platform-level constraints.
    locator: role system
    evidence_kind: primary-api
    confidence: high
  - id: claim-system-anthropic
