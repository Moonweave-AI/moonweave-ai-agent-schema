    labels:
      zh: 系统消息正例
      en: "Positive case: System message"
      ja: システムメッセージ正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SystemMessage maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SystemMessage maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SystemMessage context/token boundary."}

    field_values:
      authority_source: platform-policy-channel
      message_role: system
      sender_id: SystemActor:platform-policy
      element_id: msg-system-01
      conversation_id: conv-travel-202
      sequence_index: 0
    related_node_ids:
      - SystemMessage
    related_relation_ids: []

    source_claims:
      - claim-system-message-003
  - id: SystemMessage-example-boundary-manual-001

    labels:
      zh: 系统消息边界例
      en: "Boundary case: System message"
      ja: システムメッセージ境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SystemMessage must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SystemMessage must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - SystemMessage
    related_relation_ids: []

    source_claims:
      - claim-system-message-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DeveloperMessage
    shared_parent_concept_id: Message
    differentia:
      zh: SystemMessage 的可信发送来源是平台或系统层；DeveloperMessage 的来源是应用开发者，规范层级和可覆盖范围不同。
      en: SystemMessage has a trusted platform/system source; DeveloperMessage comes from the application developer, with different authority and override scope.
      ja: SystemMessageはplatform/system source、DeveloperMessageはapplication developer sourceでauthorityとoverride scopeが異なります。
    source_claims:
      - claim-system-message-005
parent_relation:
