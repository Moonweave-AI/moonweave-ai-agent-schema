schema: moonweave.ai/ontology-node/v1
id: SystemMessage
kind: concept
labels:
  zh: 系统消息
  en: System message
  ja: システムメッセージ
semantics:
  short_definition:
    zh: 由平台通道注入、可信 role=system 的系统层消息包络。
    en: Platform-channel message envelope with trusted role=system from the system layer.
    ja: platform 通道から注入され trusted role=system の system layer message envelope。
  definition:
    zh: SystemMessage 映射 OpenAI 历史 role:system 与 Anthropic 顶层 system 参数所承载的系统级约束；authority_source 记录赋 role 的可信平台来源。它是 Message 包络，不是 SystemInstruction 本体——指令内容通过 carries_instruction 边引用 info-prompts-instructions 模块。
    en: SystemMessage maps OpenAI legacy role:system and constraints carried by Anthropic top-level system parameter. authority_source records the trusted platform source assigning role. It is a Message envelope, not the SystemInstruction itself—instruction content links via carries_instruction to info-prompts-instructions.
    ja: SystemMessage は OpenAI system/Anthropic system 参数の包络。SystemInstruction 本体ではない。
  why_needed:
    zh: 使消息来源角色可审计，同时避免把系统消息、系统指令和安全规则压成同一个节点。
    en: Makes the source role auditable without collapsing system messages, system instructions, and safety rules into one node.
    ja: source roleを監査可能にしsystem message・system instruction・safety ruleを一nodeへ潰しません。
  includes:
    - zh: 纳入由可信平台通道创建、role=system 的消息包络。
      en: Includes message envelopes created through a trusted platform channel with role=system.
      ja: trusted platform channelで作成されrole=systemのmessage envelopeを含みます。
  excludes:
    - zh: 排除开发者消息、自称系统的用户文本、SystemInstruction 和独立安全策略。
      en: Excludes developer messages, user text that merely claims system status, SystemInstruction, and standalone safety policy.
      ja: developer message・systemを自称するuser text・SystemInstruction・独立safety policyを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI 现推荐 developer role 承载产品级指令，但 system role 仍存在于历史 API；Anthropic 把 system 作为独立参数而非 messages[] 成员。SystemMessage 与 DeveloperMessage 不得因正文相似而合并。
    en: OpenAI now recommends developer role for product-level instructions, but system role persists in legacy API; Anthropic passes system as a separate parameter outside messages[]. SystemMessage and DeveloperMessage must not merge due to similar body text.
    ja: Anthropic top-level system と OpenAI system role を区別してモデル化。
  typical_input:
    - description: Anthropic system parameter
      format: '{"system":"Answer in bullet points.","messages":[{"role":"user","content":[{"type":"text","text":"Summarize."}]}]}'
      source_claims:
        - claim-system-anthropic
  typical_output:
    - description: OpenAI system role message
      format: '{"role":"system","content":"You are a helpful assistant."}'
      source_claims:
        - claim-system-openai
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: authority_source
      labels:
        zh: 权威来源
        en: authority source
        ja: 権威source
      definitions:
        zh: 记录赋予 system 角色的可信平台来源，而不是从正文推断。
        en: Trusted platform source assigning the system role rather than a value inferred from body text.
        ja: 本文から推定せずsystem roleを付与したtrusted platform sourceを記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: platform-policy-channel
      allowed_values: []
      source_claims:
        - claim-system-message-002
  constraints: []
  required_relations: []
examples:
  - id: SystemMessage-example-anthropic-param
    labels:
      zh: Anthropic system 参数
      en: Anthropic system parameter
      ja: Anthropic system 参数
    descriptions:
      zh: Messages API 请求 system 字符串映射为 SystemInstruction 引用 + 可选 SystemMessage 投影，authority_source=anthropic-platform。
      en: Messages API system string maps to SystemInstruction reference plus optional SystemMessage projection with authority_source=anthropic-platform.
      ja: Anthropic system 参数の写像。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: system parameter
    field_values:
      authority_source: anthropic-platform
    related_node_ids:
      - SystemMessage
      - info-prompts-instructions
    related_relation_ids: []
    source_claims:
      - claim-system-anthropic
  - id: SystemMessage-example-openai-system-role
    labels:
      zh: OpenAI system role
      en: OpenAI system role
      ja: OpenAI system role
    descriptions:
      zh: messages[] 中 role=system 项由 platform gateway 创建，sender 为 PlatformActor:gateway-1。
      en: messages[] role=system entry created by platform gateway with sender PlatformActor:gateway-1.
      ja: OpenAI system role message。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: role=system
    field_values:
      message_role: system
      authority_source: openai-gateway
    related_node_ids:
      - SystemMessage
    related_relation_ids: []
    source_claims:
      - claim-system-openai
  - id: SystemMessage-example-user-claims-system
    labels:
      zh: 用户自称 system 边界
      en: User claims system boundary
      ja: user 自称 system 境界
    descriptions:
      zh: UserMessage 正文写“you are the system”仍保持 UserMessage，不得升为 SystemMessage。
      en: UserMessage body saying you are the system remains UserMessage and must not become SystemMessage.
      ja: user 文本の system 自称は無効。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SystemMessage
      - UserMessage
    related_relation_ids: []
    source_claims:
      - claim-system-design
parent_relation:
  id: SystemMessage-is_a-Message
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种消息
    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明由可信平台或系统层产生并标记 role=system 的每个 SystemMessage 都是 Message。
    en: States that every SystemMessage produced by a trusted platform or system layer with role=system is a Message.
    ja: trusted platform/system layerが生成しrole=systemの全SystemMessageがMessageであると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SystemMessage-is_a-Message-example-positive-manual-001
      labels:
        zh: 是一种消息正例
        en: "Positive case: is a message"
        ja: メッセージの一種正例
      descriptions:
        zh: msg-system-01 来自可信平台策略通道且 role=system。
        en: msg-system-01 comes from a trusted platform policy channel with role=system.
        ja: msg-system-01 はtrusted platform policy channel由来でrole=systemです。
      field_values: {}
      related_node_ids:
        - SystemMessage
        - Message
      related_relation_ids:
        - SystemMessage-is_a-Message
      source_claims:
        - claim-system-message-006
    - id: SystemMessage-is_a-Message-example-boundary-manual-001
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      descriptions:
        zh: msg-user-pretend 在正文中自称系统，但外部 role=user。
        en: msg-user-pretend claims system status in its body but externally has role=user.
        ja: msg-user-pretend は本文でsystemを自称しますがexternal role=userです。
      field_values: {}
      related_node_ids:
        - SystemMessage
        - Message
      related_relation_ids:
        - SystemMessage-is_a-Message
      source_claims:
        - claim-system-message-007
  source_claims:
    - claim-system-message-008
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
