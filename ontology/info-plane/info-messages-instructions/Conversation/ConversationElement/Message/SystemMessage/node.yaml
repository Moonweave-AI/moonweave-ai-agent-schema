        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      scenario_id: null
      descriptions:
        zh: msg-user-pretend 在正文中自称系统，但外部 role=user。
        en: msg-user-pretend claims system status in its body but externally has role=user.
        ja: msg-user-pretend は本文でsystemを自称しますがexternal role=userです。
      field_values: {}
