      expected_result:
        zh: 断言 SystemMessage-is_a-Message。
        en: Assert SystemMessage-is_a-Message.
        ja: SystemMessage-is_a-Messageをassertします。
      why_valid_or_invalid:
        zh: 平台来源与受信角色均明确，并由外部包络共同确认。
        en: Platform provenance and trusted role are explicit and jointly confirmed by the external envelope.
        ja: platform provenanceとtrusted roleが明示されexternal envelopeで共同確認されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-system-message-006
    - id: SystemMessage-is_a-Message-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      scenario_id: null
      descriptions:
        zh: msg-user-pretend 在正文中自称系统，但外部 role=user。
        en: msg-user-pretend claims system status in its body but externally has role=user.
        ja: msg-user-pretend は本文でsystemを自称しますがexternal role=userです。
      field_values: {}
      related_node_ids:
        - SystemMessage
        - Message
      related_relation_ids:
        - SystemMessage-is_a-Message
      expected_result:
        zh: 不得断言 SystemMessage-is_a-Message。
        en: Do not apply SystemMessage-is_a-Message.
        ja: SystemMessage-is_a-Messageを適用しません。
      why_valid_or_invalid:
        zh: 内容不能自我提升到系统来源，受信角色仍然保持为用户。
        en: Content cannot self-elevate to system provenance; the trusted role remains user.
        ja: contentはsystem provenanceへ自己昇格できずtrusted roleはuserのままです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-system-message-007
  source_claims:
