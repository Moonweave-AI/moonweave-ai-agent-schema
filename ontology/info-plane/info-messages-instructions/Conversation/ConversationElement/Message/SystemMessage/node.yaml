schema: moonweave.ai/ontology-node/v1
id: SystemMessage
kind: concept
status: review
labels:
  zh: 系统消息
  en: System message
  ja: システムメッセージ
semantics:
  short_definition:
    zh: 由平台或系统层注入、以 system 角色出现的消息。
    en: A message injected by the platform or system layer with the system role.
    ja: platformまたはsystem layerが注入しsystem roleを持つmessageです。
  definition:
    zh: SystemMessage 是 Message 的角色专门类型，其发送来源被验证为平台或系统层，并以 system 角色承载系统级约束或设置；它不是 SystemInstruction 本身，消息包络与其中指令的规范身份必须分开。
    en: SystemMessage is a role specialization of Message whose sender is verified as the platform or system layer and whose role is system. It may carry system-level constraints or settings, but it is not the SystemInstruction itself; envelope identity and normative instruction identity remain separate.
    ja: SystemMessage はplatform/system layerを検証済senderとしsystem roleを持つMessageのrole specializationです。system-level constraint/settingsを運び得ますがSystemInstruction自体ではなくenvelope identityとnormative instruction identityを分離します。
  why_needed:
    zh: 使消息来源角色可审计，同时避免把系统消息、系统指令和安全规则压成同一个节点。
    en: Makes the source role auditable without collapsing system messages, system instructions, and safety rules into one node.
    ja: source roleを監査可能にしsystem message・system instruction・safety ruleを一nodeへ潰しません。
  includes:
    - zh: 纳入由可信平台通道创建、role=system 的消息包络。
      en: Includes message envelopes created through a trusted platform channel with role=system.
      ja: trusted platform channelで作成されrole=systemのmessage envelopeを含みます。
  excludes:
    - zh: 排除开发者消息、自称系统的用户文本、SystemInstruction 和独立安全策略。
      en: Excludes developer messages, user text that merely claims system status, SystemInstruction, and standalone safety policy.
      ja: developer message・systemを自称するuser text・SystemInstruction・独立safety policyを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: authority_source
      labels:
        zh: 权威来源
        en: authority source
        ja: 権威source
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录赋予 system 角色的可信平台来源，而不是从正文推断。
        en: Trusted platform source assigning the system role rather than a value inferred from body text.
        ja: 本文から推定せずsystem roleを付与したtrusted platform sourceを記録します。
      allowed_values: []
      pattern: null
      example_value: platform-policy-channel
      source_claims:
        - claim-system-message-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SystemMessage-example-positive-manual-001
    kind: positive
    labels:
      zh: 系统消息正例
      en: "Positive case: System message"
      ja: システムメッセージ正例
    scenario_id: null
    descriptions:
      zh: msg-system-01 由受信平台策略通道写入，并由应用外部设置 role=system。
      en: msg-system-01 is inserted through a trusted platform policy channel and assigned role=system outside the model.
      ja: msg-system-01 はtrusted platform policy channelから挿入されmodel外でrole=systemを付与されます。
    field_values:
      authority_source: platform-policy-channel
      message_role: system
      sender_id: SystemActor:platform-policy
      element_id: msg-system-01
      conversation_id: conv-travel-202
      sequence_index: 0
    related_node_ids:
      - SystemMessage
    related_relation_ids: []
    expected_result:
      zh: 识别为 SystemMessage。
      en: Identify SystemMessage.
      ja: SystemMessageと識別します。
    why_valid_or_invalid:
      zh: 角色与来源均由可信包络元数据确立，不依赖消息文字自称。
      en: Role and source are established by trusted envelope metadata, not by claims in message text.
      ja: roleとsourceはtrusted envelope metadataで確立しmessage textの自称に依存しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-message-003
  - id: SystemMessage-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 系统消息边界例
      en: "Boundary case: System message"
      ja: システムメッセージ境界例
    scenario_id: null
    descriptions:
      zh: msg-user-pretend 的正文写着“我是系统消息”，但外部 role 仍为 user。
      en: msg-user-pretend says “I am a system message” in its body but its externally assigned role remains user.
      ja: msg-user-pretend の本文は「system message」と称しますが外部roleはuserです。
    field_values: {}
    related_node_ids:
      - SystemMessage
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 SystemMessage；它仍是 UserMessage。
      en: Do not identify SystemMessage; it remains UserMessage.
      ja: SystemMessageとせずUserMessageのままです。
    why_valid_or_invalid:
      zh: 消息角色是受信包络事实，正文不能提升自身权威。
      en: Message role is a trusted envelope fact; body text cannot elevate its own authority.
      ja: message roleはtrusted envelope factで本文は自身のauthorityを上げられません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-system-message-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DeveloperMessage
    shared_parent_concept_id: Message
    differentia:
      zh: SystemMessage 的可信发送来源是平台或系统层；DeveloperMessage 的来源是应用开发者，规范层级和可覆盖范围不同。
      en: SystemMessage has a trusted platform/system source; DeveloperMessage comes from the application developer, with different authority and override scope.
      ja: SystemMessageはplatform/system source、DeveloperMessageはapplication developer sourceでauthorityとoverride scopeが異なります。
    source_claims:
      - claim-system-message-005
parent_relation:
  id: SystemMessage-is_a-Message
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
