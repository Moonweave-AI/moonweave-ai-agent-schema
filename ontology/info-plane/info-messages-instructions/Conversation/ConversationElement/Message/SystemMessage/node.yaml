  distinct_fact_rationale:
    zh: 系统来源是消息子类种差；SystemInstruction 和安全规则仍是独立规范对象。
    en: System provenance is the message-subtype differentia; SystemInstruction and safety rules remain separate normative objects.
    ja: system provenanceがmessage-subtype differentiaでSystemInstruction/safety ruleは独立normative objectです。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
