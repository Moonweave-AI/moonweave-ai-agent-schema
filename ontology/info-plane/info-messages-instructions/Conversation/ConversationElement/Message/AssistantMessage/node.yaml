schema: moonweave.ai/ontology-node/v1
id: AssistantMessage
kind: concept
labels:
  zh: 助手消息
  en: Assistant message
  ja: アシスタントメッセージ
semantics:
  short_definition:
    zh: 由模型或智能体以 assistant 角色产生的对话侧响应消息。
    en: Conversation-side response message produced by a model or agent with assistant role.
    ja: model/agent が assistant role で生成する対話側 response message。
  definition:
    zh: AssistantMessage 映射 OpenAI role:assistant、Anthropic assistant turn 与 A2A role:agent 的模型侧输出；可含面向用户的文本或 tool_use/function_call 意图，但不是 ModelCall、ToolInvocation 或最终 Artifact。end_turn 记录 Anthropic stop_reason=end_turn 等等价信号。
    en: AssistantMessage maps OpenAI role:assistant, Anthropic assistant turns, and A2A role:agent model-side output. It may contain user-facing text or tool_use/function_call intent but is not a ModelCall, ToolInvocation, or final Artifact. end_turn records Anthropic stop_reason=end_turn and equivalents.
    ja: AssistantMessage は OpenAI assistant/Anthropic assistant/A2A agent 出力に写像。tool_use 意图は block 参照。
  why_needed:
    zh: 将助手输出的通信包络与生成它的运行、规划动作和工具执行分离，使回放时能准确定位“说了什么”与“做了什么”。
    en: Separates the assistant's communication envelope from the run, planned action, and tool execution that produced or followed it, allowing replay to distinguish what was said from what was done.
    ja: assistant communication envelopeを生成run・planned action・tool executionから分離しreplayで「何を言ったか」と「何をしたか」を区別します。
  includes:
    - zh: 纳入可信 role=assistant 且由模型或智能体参与方产生的消息。
      en: Includes messages with trusted role=assistant produced by a model or agent participant.
      ja: trusted role=assistantでmodel/agent participantが生成するmessageを含みます。
  excludes:
    - zh: 排除 ToolObservationMessage、ModelCall、ActionPlan、ReportArtifact 和用户伪造的助手文本。
      en: Excludes ToolObservationMessage, ModelCall, ActionPlan, ReportArtifact, and assistant text fabricated inside a user message.
      ja: ToolObservationMessage・ModelCall・ActionPlan・ReportArtifact・user message内で偽装されたassistant textを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI assistant message 可含 content 与 tool_calls；Anthropic assistant content[] 可交替 text 与 tool_use；流式 delta 在 completed 前只是临时片段。AssistantMessage 在 tool_use 后必须能链接后续 ToolResultMessage。
    en: OpenAI assistant messages may include content and tool_calls; Anthropic assistant content[] alternates text and tool_use; stream deltas are transient until completed. AssistantMessage with tool_use must link to a later ToolResultMessage.
    ja: OpenAI tool_calls・Anthropic tool_use を assistant message として記録。
  typical_input:
    - description: OpenAI assistant with tool_calls
      format: '{"role":"assistant","tool_calls":[{"id":"call_01","type":"function","function":{"name":"get_weather","arguments":"{}"}}]}'
      source_claims:
        - claim-assistant-openai
  typical_output:
    - description: Anthropic assistant tool_use
      format: '{"role":"assistant","content":[{"type":"tool_use","id":"toolu_01","name":"lookup","input":{"id":"Q1"}}]}'
      source_claims:
        - claim-assistant-anthropic
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: assistant_id
      labels:
        zh: 助手标识
        en: assistant ID
        ja: アシスタントID
      definitions:
        zh: 引用产生消息的模型或智能体参与方。
        en: References the model or agent participant that produced the message.
        ja: messageを生成したmodel/agent participantを参照します。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: AgentActor:travel-assistant
      allowed_values: []
      source_claims:
        - claim-assistant-message-002
    - id: end_turn
      labels:
        zh: 结束轮次
        en: end turn
        ja: ターン終了
      definitions:
        zh: 记录助手是否请求把控制权交还给应用。
        en: Records whether the assistant requests yielding control back to the application.
        ja: assistantがapplicationへcontrolを返すよう要求するか記録します。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: true
      allowed_values: []
      source_claims:
        - claim-assistant-message-003
  constraints: []
  required_relations: []
examples:
  - id: AssistantMessage-example-openai-tool-calls
    labels:
      zh: OpenAI tool_calls
      en: OpenAI tool_calls
      ja: OpenAI tool_calls
    descriptions:
      zh: msg-905-assistant 含 function tool_calls call_01；AssistantMessage 记录 assistant_id 与 tool call block 引用。
      en: msg-905-assistant includes function tool_calls call_01; AssistantMessage records assistant_id and tool-call block refs.
      ja: tool_calls 付き assistant message。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: tool_calls
    field_values:
      message_id: msg-905-assistant
      assistant_id: Model:gpt-4o
    related_node_ids:
      - AssistantMessage
    related_relation_ids: []
    source_claims:
      - claim-assistant-openai
  - id: AssistantMessage-example-anthropic-text
    labels:
      zh: Anthropic 文本回复
      en: Anthropic text reply
      ja: Anthropic 文本 reply
    descriptions:
      zh: assistant 返回 text block 与 end_turn=true；映射为 AssistantMessage。
      en: Assistant returns text block with end_turn=true mapped to AssistantMessage.
      ja: text block assistant 応答。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: text block
    field_values:
      message_id: msg-902-assistant
      end_turn: true
    related_node_ids:
      - AssistantMessage
    related_relation_ids: []
    source_claims:
      - claim-assistant-anthropic
  - id: AssistantMessage-example-not-model-call
    labels:
      zh: 非 ModelCall
      en: Not ModelCall
      ja: ModelCall ではない
    descriptions:
      zh: 一次 HTTP 调用元数据不是 AssistantMessage；必须有 role=assistant 消息包络。
      en: HTTP call metadata is not AssistantMessage; role=assistant envelope is required.
      ja: HTTP metadata は AssistantMessage ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - AssistantMessage
    related_relation_ids: []
    source_claims:
      - claim-assistant-design
parent_relation:
  id: AssistantMessage-is_a-Message
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种消息
    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明 role=assistant 且由模型或智能体参与方产生的每个 AssistantMessage 都满足 Message 的通信身份、内容和会话归属条件。
    en: States that every AssistantMessage with role=assistant produced by a model or agent participant satisfies Message identity, content, and conversation-membership conditions.
    ja: role=assistantでmodel/agent participantが生成する全AssistantMessageがMessageのidentity・content・conversation-membership条件を満たすと宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: AssistantMessage-is_a-Message-example-positive-manual-001
      labels:
        zh: 是一种消息正例
        en: "Positive case: is a message"
        ja: メッセージの一種正例
      descriptions:
        zh: msg-assistant-89 的外部 role=assistant，发送主体为 travel-assistant。
        en: msg-assistant-89 has external role=assistant and sender travel-assistant.
        ja: msg-assistant-89 はexternal role=assistantでsenderはtravel-assistantです。
      field_values: {}
      related_node_ids:
        - AssistantMessage
        - Message
      related_relation_ids:
        - AssistantMessage-is_a-Message
      source_claims:
        - claim-assistant-message-007
    - id: AssistantMessage-is_a-Message-example-boundary-manual-001
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      descriptions:
        zh: report-89 是助手生成的 PDF，但没有 role 或 message_id。
        en: report-89 is an assistant-generated PDF with no role or message_id.
        ja: report-89 はassistant生成PDFですがrole/message_idを持ちません。
      field_values: {}
      related_node_ids:
        - AssistantMessage
        - Message
      related_relation_ids:
        - AssistantMessage-is_a-Message
      source_claims:
        - claim-assistant-message-008
  source_claims:
    - claim-assistant-message-009
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
