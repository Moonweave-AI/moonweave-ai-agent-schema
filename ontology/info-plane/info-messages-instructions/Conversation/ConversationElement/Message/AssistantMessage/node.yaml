schema: moonweave.ai/ontology-node/v1
id: AssistantMessage
kind: concept
status: review
labels:
  zh: 助手消息
  en: Assistant message
  ja: アシスタントメッセージ
semantics:
  short_definition:
    zh: 由模型或智能体以 assistant 角色产生的消息。
    en: A message produced by a model or agent with the assistant role.
    ja: modelまたはagentがassistant roleで生成するmessageです。
  definition:
    zh: AssistantMessage 是 Message 的角色专门类型，表示模型或智能体作为对话参与方产生的一次通信；它可包含面向用户的回复或工具调用意图，但不是 ModelCall、Action、ToolInvocation 或最终业务产物。
    en: AssistantMessage is a role specialization of Message representing one communication produced by the model or agent as a conversation participant. It may contain a user-facing reply or tool-call intent, but it is not a ModelCall, Action, ToolInvocation, or final business artifact.
    ja: AssistantMessage はmodel/agentがconversation participantとして生成する一communicationを表すMessage specializationです。user-facing replyやtool-call intentを含み得ますがModelCall・Action・ToolInvocation・final business artifactではありません。
  why_needed:
    zh: 将助手输出的通信包络与生成它的运行、规划动作和工具执行分离，使回放时能准确定位“说了什么”与“做了什么”。
    en: Separates the assistant's communication envelope from the run, planned action, and tool execution that produced or followed it, allowing replay to distinguish what was said from what was done.
    ja: assistant communication envelopeを生成run・planned action・tool executionから分離しreplayで「何を言ったか」と「何をしたか」を区別します。
  includes:
    - zh: 纳入可信 role=assistant 且由模型或智能体参与方产生的消息。
      en: Includes messages with trusted role=assistant produced by a model or agent participant.
      ja: trusted role=assistantでmodel/agent participantが生成するmessageを含みます。
  excludes:
    - zh: 排除 ToolObservationMessage、ModelCall、ActionPlan、ReportArtifact 和用户伪造的助手文本。
      en: Excludes ToolObservationMessage, ModelCall, ActionPlan, ReportArtifact, and assistant text fabricated inside a user message.
      ja: ToolObservationMessage・ModelCall・ActionPlan・ReportArtifact・user message内で偽装されたassistant textを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: assistant_id
      labels:
        zh: 助手标识
        en: assistant ID
        ja: アシスタントID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生消息的模型或智能体参与方。
        en: References the model or agent participant that produced the message.
        ja: messageを生成したmodel/agent participantを参照します。
      allowed_values: []
      pattern: null
      example_value: AgentActor:travel-assistant
      source_claims:
        - claim-assistant-message-002
    - id: end_turn
      labels:
        zh: 结束轮次
        en: end turn
        ja: ターン終了
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录助手是否请求把控制权交还给应用。
        en: Records whether the assistant requests yielding control back to the application.
        ja: assistantがapplicationへcontrolを返すよう要求するか記録します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-assistant-message-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: AssistantMessage-example-positive-manual-001
    kind: positive
    labels:
      zh: 助手消息正例
      en: "Positive case: Assistant message"
      ja: アシスタントメッセージ正例
    scenario_id: null
    descriptions:
      zh: msg-assistant-89 由 travel-assistant 生成最终答复，并以 end_turn=true 交还控制。
      en: msg-assistant-89 is produced by travel-assistant as the final reply and sets end_turn=true.
      ja: msg-assistant-89 はtravel-assistantがfinal replyとして生成しend_turn=trueでcontrolを返します。
    field_values:
      assistant_id: AgentActor:travel-assistant
      end_turn: true
      message_role: assistant
      sender_id: AgentActor:travel-assistant
      element_id: msg-assistant-89
      conversation_id: conv-travel-202
      sequence_index: 6
    related_node_ids:
      - AssistantMessage
    related_relation_ids: []
    expected_result:
      zh: 识别为 AssistantMessage。
      en: Identify AssistantMessage.
      ja: AssistantMessageと識別します。
    why_valid_or_invalid:
      zh: 发送角色、生成主体和控制交还字段共同符合助手消息身份。
      en: Sender role, producing participant, and control-yield field all fit assistant-message identity.
      ja: sender role・producing participant・control-yield fieldがassistant-message identityに一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-assistant-message-004
  - id: AssistantMessage-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 助手消息边界例
      en: "Boundary case: Assistant message"
      ja: アシスタントメッセージ境界例
    scenario_id: null
    descriptions:
      zh: report-89 是助手生成后保存的 PDF 文件，具有 artifact_id 而没有 message_id 或 assistant role。
      en: report-89 is a PDF saved after assistant generation; it has artifact_id but no message_id or assistant role.
      ja: report-89 はassistant生成後保存されたPDFでartifact_idを持ちmessage_idやassistant roleを持ちません。
    field_values: {}
    related_node_ids:
      - AssistantMessage
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 AssistantMessage；它是 ReportArtifact。
      en: Do not identify AssistantMessage; it is a ReportArtifact.
      ja: AssistantMessageとせずReportArtifactです。
    why_valid_or_invalid:
      zh: 由助手产生不等于消息；业务产物拥有独立身份与生命周期。
      en: Being produced by an assistant does not make an object a message; a business artifact has its own identity and lifecycle.
      ja: assistant生成というだけでmessageではなくbusiness artifactは独自identity/lifecycleを持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-assistant-message-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: UserMessage
    shared_parent_concept_id: Message
    differentia:
      zh: AssistantMessage 由模型或智能体以 assistant 角色生成；UserMessage 由最终用户或其应用入口以 user 角色提交。
      en: AssistantMessage is produced by a model or agent with role assistant; UserMessage is submitted by an end user or user-facing application entry point with role user.
      ja: AssistantMessageはmodel/agentがrole=assistantで生成しUserMessageはend user/user-facing entry pointがrole=userで提出します。
    source_claims:
      - claim-assistant-message-006
