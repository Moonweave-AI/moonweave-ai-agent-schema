    en: is a message
    ja: メッセージの一種
  definitions:
    zh: 声明受信 role=user 且来自用户或用户入口的每个 UserMessage 都满足 Message 的通信记录条件。
    en: States that every UserMessage with trusted role=user from a user or user-facing entry point satisfies Message communication-record conditions.
    ja: trusted role=userでuser/user-facing entry point由来の全UserMessageがMessage communication-record条件を満たすと宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
