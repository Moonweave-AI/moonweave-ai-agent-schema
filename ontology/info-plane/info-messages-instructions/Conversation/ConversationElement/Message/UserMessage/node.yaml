    - id: UserMessage-is_a-Message-example-boundary-manual-001
      labels:
        zh: 是一种消息边界例
        en: "Boundary case: is a message"
        ja: メッセージの一種境界例
      scenario_id: null
      descriptions:
        zh: memory-pref-88 保存用户偏好但从未被发送。
        en: memory-pref-88 stores a user preference but was never sent.
        ja: memory-pref-88 はuser preferenceを保存しますが送信されていません。
      field_values: {}
      related_node_ids:
        - UserMessage
        - Message
      related_relation_ids:
        - UserMessage-is_a-Message
      source_claims:
        - claim-user-message-007
  source_claims:
    - claim-user-message-008
  distinct_fact_rationale:
    zh: 关于用户的记录不自动成为用户消息；必须存在实际通信身份。
    en: A record about a user does not automatically become a user message; an actual communication identity is required.
    ja: userに関するrecordは自動でuser messageにならず実communication identityが必要です。
