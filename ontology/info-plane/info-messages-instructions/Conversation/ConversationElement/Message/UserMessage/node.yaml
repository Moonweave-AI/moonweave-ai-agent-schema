external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AssistantMessage
    shared_parent_concept_id: Message
    differentia:
      zh: UserMessage 的可信发送角色是 user；AssistantMessage 的发送角色是 assistant，并表示模型或智能体对外形成的通信。
      en: UserMessage has trusted sender role user; AssistantMessage has role assistant and represents communication produced by the model or agent.
      ja: UserMessageはtrusted sender role=user、AssistantMessageはrole=assistantでmodel/agentが生成したcommunicationです。
    source_claims:
      - claim-user-message-005
parent_relation:
  id: UserMessage-is_a-Message
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
