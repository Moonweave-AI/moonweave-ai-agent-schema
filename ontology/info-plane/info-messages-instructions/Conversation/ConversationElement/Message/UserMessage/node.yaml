schema: moonweave.ai/ontology-node/v1
id: UserMessage
kind: concept
status: accepted
labels:
  zh: 用户消息
  en: User message
  ja: ユーザーメッセージ
semantics:
  short_definition:
    zh: 由最终用户或应用所代表用户以 user 角色提交的消息。
    en: A message submitted with the user role by an end user or an application representing one.
    ja: end userまたはそれを代理するapplicationがuser roleで提出するmessageです。
  definition:
    zh: UserMessage 是 Message 的角色专门类型，其可信包络 role=user，发送者为最终用户或代理该用户的应用入口；它可承载请求、数据或引用材料，但内容中出现命令语气、系统字样或代理名称不会改变其角色身份。
    en: UserMessage is a role specialization of Message whose trusted envelope has role=user and whose sender is an end user or an application entry point acting for one. It may carry requests, data, or quoted material; imperative wording, the word system, or an agent name in content does not alter its role identity.
    ja: UserMessage はtrusted envelopeがrole=userでsenderがend userまたはその代理application entry pointであるMessage specializationです。request・data・quoted materialを運びますがimperative wordingやsystem語、agent名でrole identityは変わりません。
  why_needed:
    zh: 把用户来源的通信身份与内容语义分开，使外部数据、引用和提示注入不能仅凭文本伪装成更高角色。
    en: Separates user-origin communication identity from content semantics so external data, quotations, and prompt injection cannot impersonate a higher role by text alone.
    ja: user-origin communication identityをcontent semanticsから分離しexternal data・quotation・prompt injectionがtextだけでhigher roleを偽装できないようにします。
  includes:
    - zh: 纳入受信 role=user 且可追踪到用户或用户入口的消息。
      en: Includes messages with trusted role=user traceable to a user or user-facing entry point.
      ja: trusted role=userでuserまたはuser-facing entry pointへ追跡できるmessageを含みます。
  excludes:
    - zh: 排除 AssistantMessage、ExternalAgentMessage、未封装的 ContentBlock 和仅储存用户偏好的 MemoryRecord。
      en: Excludes AssistantMessage, ExternalAgentMessage, unwrapped ContentBlock, and MemoryRecord objects that merely store user preferences.
      ja: AssistantMessage・ExternalAgentMessage・unwrapped ContentBlock・user preferenceを保存するだけのMemoryRecordを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: user_id
      labels:
        zh: 用户标识
        en: user ID
        ja: ユーザーID
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在可用且允许时引用提交消息的用户主体。
        en: References the submitting user actor when available and permitted.
        ja: 利用可能かつ許可時にmessage提出user actorを参照します。
      allowed_values: []
      pattern: null
      example_value: UserActor:customer-88
      source_claims:
        - claim-user-message-002
  constraints: []
  required_relation_constraints: []
examples:
