schema: moonweave.ai/ontology-node/v1
id: ConversationTurn
kind: concept
status: accepted
labels:
  zh: 会话轮次
  en: Conversation turn
  ja: 会話ターン
semantics:
  short_definition:
    zh: 在一个会话内聚合一次连贯发言或工具交换的可寻址会话元素。
    en: An addressable conversation element grouping one coherent utterance or tool exchange.
    ja: 一つのcoherent utteranceまたはtool exchangeをまとめるaddressable conversation elementです。
  definition:
    zh: ConversationTurn 是 ConversationElement 的具体子类，以 turn_id 和 turn_index 标识一个交互单元，并可包含一条或多条 Message；它不是 Message 的上位类型，也不是 RuntimeSession 的生命周期阶段。
    en: ConversationTurn is a concrete ConversationElement identified by turn_id and turn_index and may group one or more Message records. It is neither a superclass of Message nor a lifecycle phase of RuntimeSession.
    ja: ConversationTurn はturn_idとturn_indexで識別され一つ以上のMessageをまとめ得る具体ConversationElementです。Messageの上位型でもRuntimeSession lifecycle phaseでもありません。
  why_needed:
    zh: 表达一次用户发言及其工具往返可能跨多条消息的逻辑交换，同时保留每条消息的独立身份。
    en: Represents a logical exchange that may span a user utterance and several tool messages while preserving each message's identity.
    ja: user utteranceと複数tool messageに跨るlogical exchangeを表し各messageの独立identityを保持します。
  includes:
    - zh: 纳入具有稳定 turn_id、会话内索引和明确消息成员的交互单元。
      en: Includes interaction units with stable turn_id, in-conversation index, and explicit message members.
      ja: stable turn_id・conversation内index・明示message memberを持つinteraction unitを含みます。
  excludes:
    - zh: 排除单条 Message、运行尝试、模型调用和只表示先后关系的时间戳。
      en: Excludes individual Message records, run attempts, model calls, and timestamps that only express order.
      ja: 個別Message・run attempt・model call・順序だけを表すtimestampを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: turn_index
      labels:
        zh: 轮次序号
        en: turn index
        ja: ターン順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录轮次在会话中的稳定非负顺序。
        en: Stable non-negative order of the turn within the conversation.
        ja: conversation内turnのstable non-negative orderです。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-conversation-turn-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ConversationTurn-example-positive-manual-001

    labels:
      zh: 会话轮次正例
      en: "Positive case: Conversation turn"
      ja: 会話ターン正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ConversationTurn maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ConversationTurn maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ConversationTurn context/token boundary."}

    field_values:
      conversation_id: conv-support-042
      turn_index: 2
      element_id: turn-17
      sequence_index: 2
    related_node_ids:
      - ConversationTurn
    related_relation_ids: []

    source_claims:
      - claim-conversation-turn-003
  - id: ConversationTurn-example-boundary-manual-001

    labels:
      zh: 会话轮次边界例
      en: "Boundary case: Conversation turn"
      ja: 会話ターン境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; ConversationTurn must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; ConversationTurn must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - ConversationTurn
    related_relation_ids: []

    source_claims:
      - claim-conversation-turn-004
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: Message
    shared_parent_concept_id: ConversationElement
    differentia:
      zh: ConversationTurn 以 turn_id 聚合一个或多个通信记录；Message 以 message_id 表示单次通信，不能继承聚合职责。
      en: ConversationTurn groups one or more communication records under turn_id; Message is one communication unit under message_id and does not inherit the grouping role.
      ja: ConversationTurnはturn_idで一つ以上のcommunication recordをまとめ、Messageはmessage_idで一通信を表しgrouping roleを継承しません。
    source_claims:
      - claim-conversation-turn-005
parent_relation:
  id: ConversationTurn-is_a-ConversationElement
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话元素
    en: is a conversation element
    ja: 会話要素の一種
  definitions:
    zh: 声明每个 ConversationTurn 都满足 ConversationElement 的会话归属与可寻址顺序条件，并以 turn_id 增加对连贯交换的分组身份。
    en: States that every ConversationTurn satisfies ConversationElement's conversation-membership and addressable-order conditions and adds a turn_id grouping identity for one coherent exchange.
    ja: 各ConversationTurnがConversationElementのconversation-membership/addressable-order条件を満たしturn_idによるcoherent exchange grouping identityを追加すると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ConversationTurn-is_a-ConversationElement-example-positive-manual-001
      labels:
        zh: 是一种会话元素正例
        en: "Positive case: is a conversation element"
        ja: 会話要素の一種正例
      scenario_id: null
      descriptions:
        zh: turn-17 具有 element_id、conversation_id、sequence_index 和专有 turn_id。
        en: turn-17 has element_id, conversation_id, sequence_index, and its own turn_id.
        ja: turn-17 はelement_id・conversation_id・sequence_index・固有turn_idを持ちます。
      field_values: {}
      related_node_ids:
        - ConversationTurn
        - ConversationElement
      related_relation_ids:
        - ConversationTurn-is_a-ConversationElement
      source_claims:
        - claim-conversation-turn-006
    - id: ConversationTurn-is_a-ConversationElement-example-boundary-manual-001
      labels:
        zh: 是一种会话元素边界例
        en: "Boundary case: is a conversation element"
        ja: 会話要素の一種境界例
      scenario_id: null
      descriptions:
        zh: msg-940 是一次通信，有 message_id 但没有 turn_id 或分组职责。
        en: msg-940 is one communication with message_id but no turn_id or grouping responsibility.
        ja: msg-940 はmessage_idを持つ一communicationでturn_id/grouping responsibilityを持ちません。
      field_values: {}
      related_node_ids:
        - ConversationTurn
        - ConversationElement
      related_relation_ids:
        - ConversationTurn-is_a-ConversationElement
      source_claims:
        - claim-conversation-turn-007
  source_claims:
    - claim-conversation-turn-008
  distinct_fact_rationale:
    zh: 轮次是会话元素的具体类型，而不是消息的父类或运行阶段。
    en: A turn is a concrete conversation-element type, not a Message superclass or runtime phase.
    ja: turnは具体conversation-element typeでMessage superclassやruntime phaseではありません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ConversationTurn-contains_message-Message
    predicate: contains_message
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 聚合消息
      en: groups message
      ja: メッセージをまとめる
    definitions:
      zh: 将一个 ConversationTurn 实例连接到共同完成该逻辑交换的一条或多条 Message；所有成员必须属于同一 Conversation，且消息顺序落在该轮次范围内。
      en: Connects a ConversationTurn instance to one or more Message records that jointly complete the logical exchange; all members must belong to the same Conversation and their order must fall within the turn range.
      ja: ConversationTurn instanceをlogical exchangeを共同完成する一つ以上のMessageへ接続し全memberは同一Conversationに属しmessage順序はturn範囲内でなければなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_grouped_by_turn
      labels:
        zh: 由轮次聚合
        en: is grouped by turn
        ja: ターンにまとめられる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ConversationTurn-contains_message-Message-example-positive-manual-001
        labels:
          zh: 聚合消息正例
          en: "Positive case: groups message"
          ja: メッセージをまとめる正例
        scenario_id: null
        descriptions:
          zh: turn-17 聚合 user msg-17a、assistant msg-17b 和 tool result msg-17c。
          en: turn-17 groups user msg-17a, assistant msg-17b, and tool-result msg-17c.
          ja: turn-17 はuser msg-17a・assistant msg-17b・tool-result msg-17cをまとめます。
        field_values: {}
        related_node_ids:
          - ConversationTurn
          - Message
        related_relation_ids:
          - ConversationTurn-contains_message-Message
        source_claims:
          - claim-conversation-turn-009
      - id: ConversationTurn-contains_message-Message-example-boundary-manual-001
        labels:
          zh: 聚合消息边界例
          en: "Boundary case: groups message"
          ja: メッセージをまとめる境界例
        scenario_id: null
        descriptions:
          zh: msg-18 属于下一个用户轮次，尽管时间上紧邻 msg-17c。
          en: msg-18 belongs to the next user turn even though it immediately follows msg-17c in time.
          ja: msg-18 は時間的にmsg-17c直後ですが次user turnに属します。
        field_values: {}
        related_node_ids:
          - ConversationTurn
          - Message
        related_relation_ids:
          - ConversationTurn-contains_message-Message
        source_claims:
          - claim-conversation-turn-010
    source_claims:
      - claim-conversation-turn-011
    distinct_fact_rationale:
      zh: 这是实例分组关系而非分类主干；Message 已通过 is_a 直接归入 ConversationElement。
      en: This is an instance-grouping relation, not a taxonomy backbone; Message already enters ConversationElement through is_a.
      ja: instance grouping関係でtaxonomy backboneではなくMessageはis_aでConversationElementへ入ります。
    layout_role: cross-link
    review_status: accepted
    target: concept:Message
  - id: ConversationTurn-precedes-ConversationTurn
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 先于下一轮
      en: precedes turn
      ja: 次ターンに先行
    definitions:
      zh: 记录同一 Conversation 中一个 ConversationTurn 的结束顺序早于另一个轮次的开始顺序；该事实要求明确顺序或前驱标识，不由图上距离推断。
      en: Records that one ConversationTurn ends before another begins within the same Conversation; the fact requires explicit order or predecessor identity and is not inferred from graph distance.
      ja: 同一Conversationで一ConversationTurnが別turn開始前に終わることを記録し明示order/predecessor identityを要しgraph distanceから推定しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: follows
      labels:
        zh: 后继于
        en: follows
        ja: 後続する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ConversationTurn-precedes-ConversationTurn-example-positive-manual-001
        labels:
          zh: 先于下一轮正例
          en: "Positive case: precedes turn"
          ja: 次ターンに先行正例
        scenario_id: null
        descriptions:
          zh: turn-17 的 turn_index=2，turn-18 的 turn_index=3，且属于同一会话。
          en: turn-17 has turn_index 2, turn-18 has turn_index 3, and both belong to one conversation.
          ja: turn-17はturn_index=2、turn-18は3で同一conversationに属します。
        field_values: {}
        related_node_ids:
          - ConversationTurn
        related_relation_ids:
          - ConversationTurn-precedes-ConversationTurn
        source_claims:
          - claim-conversation-turn-012
      - id: ConversationTurn-precedes-ConversationTurn-example-boundary-manual-001
        labels:
          zh: 先于下一轮边界例
          en: "Boundary case: precedes turn"
          ja: 次ターンに先行境界例
        scenario_id: null
        descriptions:
          zh: turn-a 与 turn-b 属于不同 Conversation，索引都为 2。
          en: turn-a and turn-b belong to different Conversations and both have index 2.
          ja: turn-a/turn-bは別Conversationに属し共にindex 2です。
        field_values: {}
        related_node_ids:
          - ConversationTurn
        related_relation_ids:
          - ConversationTurn-precedes-ConversationTurn
        source_claims:
          - claim-conversation-turn-013
    source_claims:
      - claim-conversation-turn-014
    distinct_fact_rationale:
      zh: 顺序是轮次之间的时间事实，不应伪装成父子层级。
      en: Order is a temporal fact between turns and must not masquerade as a parent-child hierarchy.
      ja: orderはturn間temporal factでparent-child hierarchyにしません。
    layout_role: cross-link
    review_status: accepted
    target: concept:ConversationTurn
