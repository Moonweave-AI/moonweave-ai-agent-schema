schema: moonweave.ai/ontology-node/v1
id: ConversationTurn
kind: concept
labels:
  zh: 会话轮次
  en: Conversation turn
  ja: 会話ターン
semantics:
  short_definition:
    zh: 在会话内聚合一次连贯发言或工具交换的可寻址轮次单元。
    en: Addressable turn unit grouping one coherent utterance or tool exchange within a conversation.
    ja: conversation 内で一 coherent utterance または tool exchange をまとめる addressable turn unit。
  definition:
    zh: ConversationTurn 以 turn_id/turn_index 标识一个交互单元，可包含一条或多条 Message（例如 user 提问 + 多条 tool 结果）；它是 ConversationElement 子类，不是 Message 的上位类型，也不等于 Anthropic 单条 messages[] 项或 OpenAI 单次 API 调用。
    en: ConversationTurn is identified by turn_id/turn_index and may group one or more Messages (e.g., user question plus several tool results). It is a ConversationElement subtype, not a Message superclass, and is not equivalent to one Anthropic messages[] entry or one OpenAI API call.
    ja: ConversationTurn は複数 Message をまとめる turn 単位。単一 messages[] item ではない。
  why_needed:
    zh: 表达一次用户发言及其工具往返可能跨多条消息的逻辑交换，同时保留每条消息的独立身份。
    en: Represents a logical exchange that may span a user utterance and several tool messages while preserving each message's identity.
    ja: user utteranceと複数tool messageに跨るlogical exchangeを表し各messageの独立identityを保持します。
  includes:
    - zh: 纳入具有稳定 turn_id、会话内索引和明确消息成员的交互单元。
      en: Includes interaction units with stable turn_id, in-conversation index, and explicit message members.
      ja: stable turn_id・conversation内index・明示message memberを持つinteraction unitを含みます。
  excludes:
    - zh: 排除单条 Message、运行尝试、模型调用和只表示先后关系的时间戳。
      en: Excludes individual Message records, run attempts, model calls, and timestamps that only express order.
      ja: 個別Message・run attempt・model call・順序だけを表すtimestampを除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 当应用把一次 user 发言与后续 tool_result 消息视为同一“轮次”时使用 ConversationTurn；协议 wire 格式仍按 Message 列表传输，turn 是 Moonweave 逻辑分组，optional 映射到 UI turn 或 LangGraph step。
    en: Use ConversationTurn when the application treats one user utterance and follow-up tool_result messages as one turn; wire formats still transmit Message lists—turn is a Moonweave logical grouping optionally mapped to UI turns or LangGraph steps.
    ja: Message 列表の上に logical turn grouping を追加。
  typical_input:
    - description: Turn with multiple messages
      format: '{"turn_id":"turn-042-3","turn_index":3,"message_ids":["msg-user-88","msg-tool-89","msg-tool-90"]}'
      source_claims:
        - claim-turn-design
  typical_output:
    - description: Single-message turn
      format: '{"turn_id":"turn-042-1","turn_index":1,"message_ids":["msg-user-86"]}'
      source_claims:
        - claim-turn-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys: []
  fields:
    - id: turn_index
      labels:
        zh: 轮次序号
        en: turn index
        ja: ターン順序
      definitions:
        zh: 记录轮次在会话中的稳定非负顺序。
        en: Stable non-negative order of the turn within the conversation.
        ja: conversation内turnのstable non-negative orderです。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims:
        - claim-conversation-turn-002
  constraints: []
  required_relations: []
examples:
  - id: ConversationTurn-example-tool-roundtrip
    labels:
      zh: 工具往返轮次
      en: Tool round-trip turn
      ja: tool 往復 turn
    descriptions:
      zh: turn-042-3 聚合 msg-user-88、msg-assistant-tool-use、msg-tool-result 三条 Message。
      en: turn-042-3 groups msg-user-88, msg-assistant-tool-use, and msg-tool-result Messages.
      ja: tool 往復を一 turn に分组。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: tool round-trip
    field_values:
      turn_id: turn-042-3
      turn_index: 3
    related_node_ids:
      - ConversationTurn
      - Message
    related_relation_ids: []
    source_claims:
      - claim-turn-anthropic
  - id: ConversationTurn-example-single-user
    labels:
      zh: 单消息轮次
      en: Single-message turn
      ja: 単一 message turn
    descriptions:
      zh: turn-042-1 只含一条 UserMessage，turn_index=1。
      en: turn-042-1 contains one UserMessage with turn_index=1.
      ja: 単一 user message turn。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: one message per turn
    field_values:
      turn_id: turn-042-1
      turn_index: 1
    related_node_ids:
      - ConversationTurn
      - UserMessage
    related_relation_ids: []
    source_claims:
      - claim-turn-openai
  - id: ConversationTurn-example-not-message
    labels:
      zh: 非 Message
      en: Not Message
      ja: Message ではない
    descriptions:
      zh: 单条 Message 可直接存在于 Conversation 而无 ConversationTurn；不得强制每条 Message 都有 turn。
      en: A Message may exist in Conversation without ConversationTurn; do not require a turn for every Message.
      ja: Message ごとに turn 必須ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ConversationTurn
    related_relation_ids: []
    source_claims:
      - claim-turn-design
parent_relation:
  id: ConversationTurn-is_a-ConversationElement
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种会话元素
    en: is a conversation element
    ja: 会話要素の一種
  definitions:
    zh: 声明每个 ConversationTurn 都满足 ConversationElement 的会话归属与可寻址顺序条件，并以 turn_id 增加对连贯交换的分组身份。
    en: States that every ConversationTurn satisfies ConversationElement's conversation-membership and addressable-order conditions and adds a turn_id grouping identity for one coherent exchange.
    ja: 各ConversationTurnがConversationElementのconversation-membership/addressable-order条件を満たしturn_idによるcoherent exchange grouping identityを追加すると宣言します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有专门类型
      en: has specialization
      ja: 特殊型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ConversationTurn-is_a-ConversationElement-example-positive-manual-001
      labels:
        zh: 是一种会话元素正例
        en: "Positive case: is a conversation element"
        ja: 会話要素の一種正例
      descriptions:
        zh: turn-17 具有 element_id、conversation_id、sequence_index 和专有 turn_id。
        en: turn-17 has element_id, conversation_id, sequence_index, and its own turn_id.
        ja: turn-17 はelement_id・conversation_id・sequence_index・固有turn_idを持ちます。
      field_values: {}
      related_node_ids:
        - ConversationTurn
        - ConversationElement
      related_relation_ids:
        - ConversationTurn-is_a-ConversationElement
      source_claims:
        - claim-conversation-turn-006
    - id: ConversationTurn-is_a-ConversationElement-example-boundary-manual-001
      labels:
        zh: 是一种会话元素边界例
        en: "Boundary case: is a conversation element"
        ja: 会話要素の一種境界例
      descriptions:
        zh: msg-940 是一次通信，有 message_id 但没有 turn_id 或分组职责。
        en: msg-940 is one communication with message_id but no turn_id or grouping responsibility.
        ja: msg-940 はmessage_idを持つ一communicationでturn_id/grouping responsibilityを持ちません。
      field_values: {}
      related_node_ids:
        - ConversationTurn
        - ConversationElement
      related_relation_ids:
        - ConversationTurn-is_a-ConversationElement
      source_claims:
        - claim-conversation-turn-007
  source_claims:
    - claim-conversation-turn-008
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ConversationTurn-contains_message-Message
    predicate: contains_message
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 聚合消息
      en: groups message
      ja: メッセージをまとめる
    definitions:
      zh: 将一个 ConversationTurn 实例连接到共同完成该逻辑交换的一条或多条 Message；所有成员必须属于同一 Conversation，且消息顺序落在该轮次范围内。
      en: Connects a ConversationTurn instance to one or more Message records that jointly complete the logical exchange; all members must belong to the same Conversation and their order must fall within the turn range.
      ja: ConversationTurn instanceをlogical exchangeを共同完成する一つ以上のMessageへ接続し全memberは同一Conversationに属しmessage順序はturn範囲内でなければなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_grouped_by_turn
      labels:
        zh: 由轮次聚合
        en: is grouped by turn
        ja: ターンにまとめられる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ConversationTurn-contains_message-Message-example-positive-manual-001
        labels:
          zh: 聚合消息正例
          en: "Positive case: groups message"
          ja: メッセージをまとめる正例
        descriptions:
          zh: turn-17 聚合 user msg-17a、assistant msg-17b 和 tool result msg-17c。
          en: turn-17 groups user msg-17a, assistant msg-17b, and tool-result msg-17c.
          ja: turn-17 はuser msg-17a・assistant msg-17b・tool-result msg-17cをまとめます。
        field_values: {}
        related_node_ids:
          - ConversationTurn
          - Message
        related_relation_ids:
          - ConversationTurn-contains_message-Message
        source_claims:
          - claim-conversation-turn-009
      - id: ConversationTurn-contains_message-Message-example-boundary-manual-001
        labels:
          zh: 聚合消息边界例
          en: "Boundary case: groups message"
          ja: メッセージをまとめる境界例
        descriptions:
          zh: msg-18 属于下一个用户轮次，尽管时间上紧邻 msg-17c。
          en: msg-18 belongs to the next user turn even though it immediately follows msg-17c in time.
          ja: msg-18 は時間的にmsg-17c直後ですが次user turnに属します。
        field_values: {}
        related_node_ids:
          - ConversationTurn
          - Message
        related_relation_ids:
          - ConversationTurn-contains_message-Message
        source_claims:
          - claim-conversation-turn-010
    source_claims:
      - claim-conversation-turn-011
    layout_role: cross-link
    target: concept:Message
  - id: ConversationTurn-precedes-ConversationTurn
    predicate: precedes
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 先于下一轮
      en: precedes turn
      ja: 次ターンに先行
    definitions:
      zh: 记录同一 Conversation 中一个 ConversationTurn 的结束顺序早于另一个轮次的开始顺序；该事实要求明确顺序或前驱标识，不由图上距离推断。
      en: Records that one ConversationTurn ends before another begins within the same Conversation; the fact requires explicit order or predecessor identity and is not inferred from graph distance.
      ja: 同一Conversationで一ConversationTurnが別turn開始前に終わることを記録し明示order/predecessor identityを要しgraph distanceから推定しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: follows
      labels:
        zh: 后继于
        en: follows
        ja: 後続する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ConversationTurn-precedes-ConversationTurn-example-positive-manual-001
        labels:
          zh: 先于下一轮正例
          en: "Positive case: precedes turn"
          ja: 次ターンに先行正例
        descriptions:
          zh: turn-17 的 turn_index=2，turn-18 的 turn_index=3，且属于同一会话。
          en: turn-17 has turn_index 2, turn-18 has turn_index 3, and both belong to one conversation.
          ja: turn-17はturn_index=2、turn-18は3で同一conversationに属します。
        field_values: {}
        related_node_ids:
          - ConversationTurn
        related_relation_ids:
          - ConversationTurn-precedes-ConversationTurn
        source_claims:
          - claim-conversation-turn-012
      - id: ConversationTurn-precedes-ConversationTurn-example-boundary-manual-001
        labels:
          zh: 先于下一轮边界例
          en: "Boundary case: precedes turn"
          ja: 次ターンに先行境界例
        descriptions:
          zh: turn-a 与 turn-b 属于不同 Conversation，索引都为 2。
          en: turn-a and turn-b belong to different Conversations and both have index 2.
          ja: turn-a/turn-bは別Conversationに属し共にindex 2です。
        field_values: {}
        related_node_ids:
          - ConversationTurn
        related_relation_ids:
          - ConversationTurn-precedes-ConversationTurn
        source_claims:
          - claim-conversation-turn-013
    source_claims:
      - claim-conversation-turn-014
    layout_role: cross-link
    target: concept:ConversationTurn
