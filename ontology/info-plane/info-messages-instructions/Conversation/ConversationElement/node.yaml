schema: moonweave.ai/ontology-node/v1
id: ConversationElement
kind: concept
status: accepted
labels:
  zh: 会话元素
  en: Conversation element
  ja: 会話要素
semantics:
  short_definition:
    zh: 在一个会话顺序中具有可寻址位置的消息或轮次上位概念。
    en: The superclass for an addressable message or turn occupying a position in conversation order.
    ja: conversation順序でaddressable positionを占めるmessageまたはturnの上位概念です。
  definition:
    zh: ConversationElement 是 Conversation 直接组织的抽象信息成员；Message 与 ConversationTurn 继承其位置和会话归属约束，但元素本身不是内容块、运行事件或协议包络。
    en: ConversationElement is the abstract information member directly organized by Conversation. Message and ConversationTurn inherit its position and conversation-membership constraints; the element itself is not a content block, runtime event, or protocol envelope.
    ja: ConversationElement はConversationが直接組織するabstract information memberです。MessageとConversationTurnはpositionとconversation-membership constraintを継承しますが、content block・runtime event・protocol envelopeではありません。
  why_needed:
    zh: 提供一个真实共同父节点，使轮次和消息共享顺序语义，又不把二者错误地互作组成层级。
    en: Provides a real shared parent so turns and messages share ordering semantics without falsely making one the other's composition level.
    ja: turnとmessageがordering semanticsを共有する実在の共通parentを提供し、一方を他方のcomposition levelと誤りません。
  includes:
    - zh: 纳入可在会话序列中独立寻址的 ConversationTurn 与 Message。
      en: Includes independently addressable ConversationTurn and Message members of a conversation sequence.
      ja: conversation sequenceで独立address可能なConversationTurnとMessageを含みます。
  excludes:
    - zh: 排除 ContentBlock、ProtocolEnvelope、TraceEvent 和仅用于排序的整数值。
      en: Excludes ContentBlock, ProtocolEnvelope, TraceEvent, and scalar ordering values.
      ja: ContentBlock・ProtocolEnvelope・TraceEvent・単なるordering整数値を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - element_id
  fields:
    - id: element_id
      labels:
        zh: 元素标识
        en: element ID
        ja: 要素ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可寻址会话成员。
        en: Stable identifier for one addressable conversation member.
        ja: 一つのaddressable conversation memberを安定識別します。
      allowed_values: []
      pattern: null
      example_value: element-103
      source_claims:
        - claim-conversation-element-002
    - id: conversation_id
      labels:
        zh: 所属会话
        en: conversation ID
        ja: 所属会話ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识直接组织该元素的 Conversation。
        en: Identifies the Conversation that directly organizes this element.
        ja: このelementを直接組織するConversationを識別します。
      allowed_values: []
      pattern: null
      example_value: conv-support-042
      source_claims:
        - claim-conversation-element-003
    - id: sequence_index
      labels:
        zh: 顺序位置
        en: sequence index
        ja: 順序位置
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录元素在会话级有序序列中的非负唯一位置。
        en: Non-negative unique position of the element in conversation-level order.
        ja: conversation-level順序における非負で一意な位置です。
      allowed_values: []
      pattern: null
      example_value: 5
      source_claims:
        - claim-conversation-element-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ConversationElement-example-positive-manual-001
    kind: positive
    labels:
      zh: 会话元素正例
      en: "Positive case: Conversation element"
      ja: 会話要素正例
    scenario_id: null
    descriptions:
      zh: element-103 以 sequence_index=5 位于 conv-support-042，并被具体化为一条 Message。
      en: element-103 occupies sequence_index 5 in conv-support-042 and is specialized as a Message.
      ja: element-103 はconv-support-042のsequence_index 5にありMessageとして特殊化されます。
    field_values:
      element_id: element-103
      conversation_id: conv-support-042
      sequence_index: 5
    related_node_ids:
      - ConversationElement
    related_relation_ids: []
    expected_result:
      zh: 识别为 ConversationElement，并继续判定其具体子类。
      en: Identify ConversationElement and continue to its concrete subtype.
      ja: ConversationElementとし具体下位型を判定します。
    why_valid_or_invalid:
      zh: 它拥有会话归属和可寻址顺序位置，满足共同上位概念条件。
      en: It has conversation membership and an addressable sequence position, satisfying the shared superclass condition.
      ja: conversation所属とaddressable sequence positionを持ち共通上位概念条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-conversation-element-005
  - id: ConversationElement-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 会话元素边界例
      en: "Boundary case: Conversation element"
      ja: 会話要素境界例
    scenario_id: null
    descriptions:
      zh: text-block-103 是消息内第一个文本块，但没有自己的 conversation_id 或会话级位置。
      en: text-block-103 is the first text block inside a message but has no conversation_id or conversation-level position.
      ja: text-block-103 はmessage内最初のtext blockですがconversation_idやconversation-level positionを持ちません。
    field_values: {}
    related_node_ids:
      - ConversationElement
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 ConversationElement；它是 ContentBlock。
      en: Do not identify ConversationElement; it is a ContentBlock.
      ja: ConversationElementとせずContentBlockです。
    why_valid_or_invalid:
      zh: 块内顺序不是会话级成员身份，不能因出现在消息中而进入本分支。
      en: Block order is not conversation-member identity; appearing inside a message does not place it in this branch.
      ja: block順序はconversation-member identityではなくmessage内出現だけでこのbranchに入りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-conversation-element-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Conversation-contains-ConversationElement
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含会话元素
    en: contains conversation element
    ja: 会話要素を含む
  definitions:
    zh: 将一个 Conversation 连接到其直接组织并排序的 ConversationElement 成员；成员归属由同一 conversation_id 和唯一 sequence_index 共同约束。
    en: Connects a Conversation to the ConversationElement members it directly organizes and orders; membership is constrained by the same conversation_id and a unique sequence_index.
    ja: Conversationを直接組織・順序付けるConversationElement memberへ接続し同一conversation_idとunique sequence_indexで所属を制約します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: is_contained_by
    labels:
      zh: 被包含于
      en: is contained by
      ja: 含まれる
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Conversation-contains-ConversationElement-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含会话元素正例
        en: "Positive case: contains conversation element"
        ja: 会話要素を含む正例
      scenario_id: null
      descriptions:
        zh: conv-support-042 以位置 0–5 包含六个 ConversationElement。
        en: conv-support-042 contains six ConversationElement members at positions 0–5.
        ja: conv-support-042 はposition 0–5の六ConversationElement memberを含みます。
      field_values: {}
      related_node_ids:
        - Conversation
        - ConversationElement
      related_relation_ids:
        - Conversation-contains-ConversationElement
      expected_result:
        zh: 保留该 contains 事实，并验证位置在会话内唯一。
        en: Keep the contains fact and validate position uniqueness within the conversation.
        ja: contains factを保持しconversation内position一意性を検証します。
      why_valid_or_invalid:
        zh: 容器标识与每个成员的 conversation_id 一致，顺序没有重复。
        en: The container ID agrees with every member's conversation_id and order has no duplicates.
        ja: container IDと各memberのconversation_idが一致しorder重複がありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-conversation-element-007
    - id: Conversation-contains-ConversationElement-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含会话元素边界例
        en: "Boundary case: contains conversation element"
        ja: 会話要素を含む境界例
      scenario_id: null
      descriptions:
        zh: history-204 保存同一元素的截断快照，但不是逻辑会话容器。
        en: history-204 stores a truncated snapshot of the same elements but is not the logical conversation container.
        ja: history-204 は同elementのtruncated snapshotを保存しますがlogical conversation containerではありません。
      field_values: {}
      related_node_ids:
        - Conversation
        - ConversationElement
      related_relation_ids:
        - Conversation-contains-ConversationElement
      expected_result:
        zh: 不得断言 Conversation-contains；应使用 MessageHistory-contains。
        en: Do not assert Conversation-contains; use MessageHistory-contains.
        ja: Conversation-containsをassertせずMessageHistory-containsを使います。
      why_valid_or_invalid:
        zh: 历史投影与持续会话具有不同身份和完整性语义。
        en: A history projection has different identity and completeness semantics from the enduring conversation.
        ja: history projectionは持続conversationと異なるidentity/completeness semanticsを持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-conversation-element-008
  source_claims:
    - claim-conversation-element-009
  distinct_fact_rationale:
    zh: 这是会话树唯一的组成主干；Message 与 ConversationTurn 通过类型继承进入该成员范围，不再绘制可推导的专门快捷边。
    en: This is the conversation tree's sole composition backbone; Message and ConversationTurn enter its member range by subtype inheritance, so derivable specialized shortcuts are not drawn.
    ja: conversation tree唯一のcomposition backboneでMessage/ConversationTurnはsubtype継承でmember範囲へ入り導出可能shortcutを描きません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
