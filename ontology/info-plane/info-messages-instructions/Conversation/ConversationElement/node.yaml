schema: moonweave.ai/ontology-node/v1
id: ConversationElement
kind: concept
labels:
  zh: 会话元素
  en: Conversation element
  ja: 会話要素
semantics:
  short_definition:
    zh: 在会话顺序中占据可寻址位置的 Message 或 ConversationTurn 共同上位概念。
    en: Shared superclass for Message or ConversationTurn occupying an addressable position in conversation order.
    ja: conversation 順序で addressable position を占める Message/ConversationTurn の共通上位概念。
  definition:
    zh: ConversationElement 是 Conversation 直接组织的抽象成员，Message 与 ConversationTurn 通过 is_a 继承其 conversation_id 与 sequence_index 约束；它对应协议中“列表里的一项”，但不是 content block、tool result 执行记录或 ProtocolEnvelope。
    en: ConversationElement is the abstract member Conversation organizes directly; Message and ConversationTurn inherit conversation_id and sequence_index via is_a. It maps to one item in a protocol list, but is not a content block, tool-result execution record, or ProtocolEnvelope.
    ja: ConversationElement は Conversation が直接組織する abstract member。protocol 列表の一 item に対応。
  why_needed:
    zh: 提供一个真实共同父节点，使轮次和消息共享顺序语义，又不把二者错误地互作组成层级。
    en: Provides a real shared parent so turns and messages share ordering semantics without falsely making one the other's composition level.
    ja: turnとmessageがordering semanticsを共有する実在の共通parentを提供し、一方を他方のcomposition levelと誤りません。
  includes:
    - zh: 纳入可在会话序列中独立寻址的 ConversationTurn 与 Message。
      en: Includes independently addressable ConversationTurn and Message members of a conversation sequence.
      ja: conversation sequenceで独立address可能なConversationTurnとMessageを含みます。
  excludes:
    - zh: 排除 ContentBlock、ProtocolEnvelope、TraceEvent 和仅用于排序的整数值。
      en: Excludes ContentBlock, ProtocolEnvelope, TraceEvent, and scalar ordering values.
      ja: ContentBlock・ProtocolEnvelope・TraceEvent・単なるordering整数値を除外します。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI messages[i]、Anthropic messages[i]、A2A history[i] 都可映射为带 sequence_index 的 ConversationElement；element_id 是 Moonweave 本地稳定 ID，可与 messageId 或数组下标配对。
    en: OpenAI messages[i], Anthropic messages[i], and A2A history[i] map to ConversationElement with sequence_index; element_id is a stable Moonweave ID pairable with messageId or array index.
    ja: messages[i] を sequence_index 付き ConversationElement へ写像。
  typical_input:
    - description: Ordered member in messages array
      format: '{"element_id":"element-103","conversation_id":"conv-support-042","sequence_index":5}'
      source_claims:
        - claim-conversation-element-design
  typical_output:
    - description: Specialized as Message
      format: '{"element_id":"element-103","most_specific_class":"UserMessage"}'
      source_claims:
        - claim-conversation-element-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys:
    - element_id
  fields:
    - id: element_id
      labels:
        zh: 元素标识
        en: element ID
        ja: 要素ID
      definitions:
        zh: 稳定标识一个可寻址会话成员。
        en: Stable identifier for one addressable conversation member.
        ja: 一つのaddressable conversation memberを安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: element-103
      allowed_values: []
      source_claims:
        - claim-conversation-element-002
    - id: conversation_id
      labels:
        zh: 所属会话
        en: conversation ID
        ja: 所属会話ID
      definitions:
        zh: 标识直接组织该元素的 Conversation。
        en: Identifies the Conversation that directly organizes this element.
        ja: このelementを直接組織するConversationを識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: conv-support-042
      allowed_values: []
      source_claims:
        - claim-conversation-element-003
    - id: sequence_index
      labels:
        zh: 顺序位置
        en: sequence index
        ja: 順序位置
      definitions:
        zh: 记录元素在会话级有序序列中的非负唯一位置。
        en: Non-negative unique position of the element in conversation-level order.
        ja: conversation-level順序における非負で一意な位置です。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 5
      allowed_values: []
      source_claims:
        - claim-conversation-element-004
  constraints: []
  required_relations: []
examples:
  - id: ConversationElement-example-openai-index
    labels:
      zh: OpenAI 数组下标
      en: OpenAI array index
      ja: OpenAI 配列 index
    descriptions:
      zh: element-103 对应 messages[5] role=user 项，sequence_index=5。
      en: element-103 corresponds to messages[5] role=user with sequence_index=5.
      ja: element-103 が messages[5] に対応。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: messages index
    field_values:
      element_id: element-103
      sequence_index: 5
    related_node_ids:
      - ConversationElement
      - UserMessage
    related_relation_ids: []
    source_claims:
      - claim-conversation-element-openai
  - id: ConversationElement-example-turn-grouping
    labels:
      zh: 轮次分组元素
      en: Turn grouping element
      ja: turn 分组 element
    descriptions:
      zh: element-200 具体化为 ConversationTurn turn_index=3，聚合三条 tool 往返 Message。
      en: element-200 specializes as ConversationTurn turn_index=3 grouping three tool round-trip Messages.
      ja: element-200 が ConversationTurn に特殊化。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: ConversationTurn
    field_values:
      element_id: element-200
      sequence_index: 3
    related_node_ids:
      - ConversationElement
      - ConversationTurn
    related_relation_ids: []
    source_claims:
      - claim-conversation-element-design
  - id: ConversationElement-example-not-content-block
    labels:
      zh: 非内容块
      en: Not a content block
      ja: content block ではない
    descriptions:
      zh: text-block-103 只有块内顺序，没有 conversation_id，不得识别为 ConversationElement。
      en: text-block-103 has only in-block order without conversation_id and must not be ConversationElement.
      ja: conversation_id なし text block は ConversationElement ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ConversationElement
    related_relation_ids: []
    source_claims:
      - claim-conversation-element-design
parent_relation:
  id: Conversation-contains-ConversationElement
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含会话元素
    en: contains conversation element
    ja: 会話要素を含む
  definitions:
    zh: 将一个 Conversation 连接到其直接组织并排序的 ConversationElement 成员；成员归属由同一 conversation_id 和唯一 sequence_index 共同约束。
    en: Connects a Conversation to the ConversationElement members it directly organizes and orders; membership is constrained by the same conversation_id and a unique sequence_index.
    ja: Conversationを直接組織・順序付けるConversationElement memberへ接続し同一conversation_idとunique sequence_indexで所属を制約します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被包含于
      en: is contained by
      ja: 含まれる
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Conversation-contains-ConversationElement-example-positive-manual-001
      labels:
        zh: 包含会话元素正例
        en: "Positive case: contains conversation element"
        ja: 会話要素を含む正例
      descriptions:
        zh: conv-support-042 以位置 0–5 包含六个 ConversationElement。
        en: conv-support-042 contains six ConversationElement members at positions 0–5.
        ja: conv-support-042 はposition 0–5の六ConversationElement memberを含みます。
      field_values: {}
      related_node_ids:
        - Conversation
        - ConversationElement
      related_relation_ids:
        - Conversation-contains-ConversationElement
      source_claims:
        - claim-conversation-element-007
    - id: Conversation-contains-ConversationElement-example-boundary-manual-001
      labels:
        zh: 包含会话元素边界例
        en: "Boundary case: contains conversation element"
        ja: 会話要素を含む境界例
      descriptions:
        zh: history-204 保存同一元素的截断快照，但不是逻辑会话容器。
        en: history-204 stores a truncated snapshot of the same elements but is not the logical conversation container.
        ja: history-204 は同elementのtruncated snapshotを保存しますがlogical conversation containerではありません。
      field_values: {}
      related_node_ids:
        - Conversation
        - ConversationElement
      related_relation_ids:
        - Conversation-contains-ConversationElement
      source_claims:
        - claim-conversation-element-008
  source_claims:
    - claim-conversation-element-009
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: role/content message arrays and developer role.
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: system parameter and content blocks including tool_use/tool_result.
  - id: src-a2a-message
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Message role, messageId, contextId, taskId, and Parts.
  - id: src-info-messages-design
    title: Moonweave info-messages-instructions module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Conversation and Message identity separate from carried content.
source_claims:
  - id: claim-conversation-element-001
    source: eng-proto-a2a-spec
    supports: A2A gives Message its own messageId and contextId and defines Part separately; Moonweave introduces ConversationElement as the reviewed common parent for addressable turns and messages.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-002
    source: eng-proto-a2a-spec
    supports: "A2A gives Message its own messageId and contextId and defines Part separately; Moonweave introduces ConversationElement as the reviewed common parent for addressable turns and messages. For ConversationElement, the element_id field records exactly this auditable datum: Stable identifier for one addressable conversation member."
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-003
    source: eng-proto-a2a-spec
    supports: "A2A gives Message its own messageId and contextId and defines Part separately; Moonweave introduces ConversationElement as the reviewed common parent for addressable turns and messages. For ConversationElement, the conversation_id field records exactly this auditable datum: Identifies the Conversation that directly organizes this element."
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-004
    source: eng-proto-a2a-spec
    supports: "A2A gives Message its own messageId and contextId and defines Part separately; Moonweave introduces ConversationElement as the reviewed common parent for addressable turns and messages. For ConversationElement, the sequence_index field records exactly this auditable datum: Non-negative unique position of the element in conversation-level order."
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-005
    source: eng-proto-a2a-spec
    supports: A2A gives Message its own messageId and contextId and defines Part separately; Moonweave introduces ConversationElement as the reviewed common parent for addressable turns and messages. The design generalizes the ordered message-list and A2A message identity into an explicit shared member superclass.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-006
    source: eng-proto-a2a-spec
    supports: A2A gives Message its own messageId and contextId and defines Part separately; Moonweave introduces ConversationElement as the reviewed common parent for addressable turns and messages. A2A models Part as content within Message, distinct from the Message communication unit.
    locator: A2A v0.3.0 Specification §6.4 Message and §6.5 Part (lines 1226–1315)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-007
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines a conversation as a list of messages; Moonweave generalizes the ordered members to ConversationElement so turns and messages share one non-redundant composition backbone. The case instantiates the documented ordered conversation membership with explicit identity and position checks.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-008
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines a conversation as a list of messages; Moonweave generalizes the ordered members to ConversationElement so turns and messages share one non-redundant composition backbone. A2A history arrays and Model Spec conversation identity support keeping a history projection distinct from the conversation container.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-009
    source: eng-spec-openai-model-spec-2025
    supports: The Model Spec defines a conversation as a list of messages; Moonweave generalizes the ordered members to ConversationElement so turns and messages share one non-redundant composition backbone.
    locator: Definitions > Conversation, message fields, role values, and tool responses (lines 152–175)
    evidence_kind: design-inference
    confidence: high
  - id: claim-conversation-element-openai
    source: src-openai-chat
    supports: Each messages[] entry is an ordered conversation member distinct from content parts inside it.
    locator: messages[]
    evidence_kind: primary-api
    confidence: high
  - id: claim-conversation-element-design
    source: src-info-messages-design
    supports: ConversationElement is the shared ordered member superclass for Message and ConversationTurn.
    locator: ConversationElement boundary
    evidence_kind: design-inference
    confidence: high
