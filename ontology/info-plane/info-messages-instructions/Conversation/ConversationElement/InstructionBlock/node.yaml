schema: moonweave.ai/ontology-node/v1
id: InstructionBlock
kind: concept
status: accepted
labels:
  zh: 指令块
  en: Instruction Block
  ja: 指示ブロック
semantics:
  short_definition:
    zh: 可单独审阅和组合的本地指令片段。
    en: A locally authored instruction fragment that can be reviewed and composed independently.
    ja: 独立に review と composition できる、local に作成された instruction fragment。
  definition:
    zh: >-
      InstructionBlock 是 Moonweave 对一段有明确意图的指令文本或结构化规则的本体概念，例如角色边界、输出格式、工具使用条件或示例。它由应用在本地创作、版本控制和组合，可被渲染到 OpenAI `instructions` 参数或 developer/system 消息中，或用于生成 MCP PromptMessage 内容；但它不是 OpenAI、A2A 或 MCP 的原生 wire type，也不是完整的 SystemMessage、DeveloperMessage、MCP Prompt 或 A2A Part。
    en: >-
      An InstructionBlock is Moonweave's ontology concept for a locally authored text or structured rule segment with one clear intent, such as a role boundary, output format, tool-use condition, or example. An application can version, review, and compose it, then render it into OpenAI `instructions` or developer/system messages, or use it to generate MCP PromptMessage content; it is not an OpenAI, A2A, or MCP native wire type and is not a complete SystemMessage, DeveloperMessage, MCP Prompt, or A2A Part.
    ja: >-
      InstructionBlock は、role boundary、output format、tool-use condition、example など、一つの明確な意図を持つ local に作成された text または structured rule segment の Moonweave 本体概念である。application はこれを version 管理、review、composition し、OpenAI `instructions` または developer/system message に render でき、MCP PromptMessage content の生成にも使える。OpenAI、A2A、MCP の native wire type ではなく、完全な SystemMessage、DeveloperMessage、MCP Prompt、A2A Part でもない。
  why_needed:
    zh: >-
      指令往往同时承担行为、格式和安全边界。把每个意图单独命名，团队才能审阅变化、测试组合顺序并知道哪一段被渲染到哪个目标接口，而不是把一长段提示词当作不可解释的字符串。
    en: >-
      Instructions often carry behavior, format, and safety boundaries at once. Naming each intent separately lets a team review changes, test composition order, and know which segment was rendered to which target interface instead of treating one long prompt as an opaque string.
    ja: >-
      instruction は behavior、format、safety boundary を同時に担うことが多い。意図を個別に命名すれば、team は変更を review し、composition order を test し、どの segment がどの target interface に render されたかを知ることができ、一つの長い prompt を不透明な string として扱わずに済む。
  includes:
    - zh: 开发者维护的角色、业务规则、输出格式、工具使用条件和少样本示例片段。
      en: Developer-maintained role, business-rule, output-format, tool-use-condition, and few-shot-example segments.
      ja: developer が保守する role、business-rule、output-format、tool-use-condition、few-shot-example の segment。
    - zh: 在保持来源与渲染目标记录的前提下，组成 OpenAI 高优先级指令或 MCP PromptMessage 文本的本地构建块。
      en: Local building blocks that compose OpenAI high-priority instructions or MCP PromptMessage text while retaining source and render-target records.
      ja: source と render target の record を保持しつつ、OpenAI high-priority instruction または MCP PromptMessage text を組み立てる local building block。
  excludes:
    - zh: 完整的 DeveloperMessage、SystemMessage、MCP Prompt 或 A2A v1 Part；这些是目标协议或消息层对象，不是本地片段。
      en: A complete DeveloperMessage, SystemMessage, MCP Prompt, or A2A v1 Part; those are target message or protocol objects rather than local fragments.
      ja: 完全な DeveloperMessage、SystemMessage、MCP Prompt、A2A v1 Part。これらは local fragment ではなく target message または protocol object である。
    - zh: 来自用户或工具且未经信任判定的文本、孤立 ContentPart、传输包络、参与者身份或工具结果；它们不因被拼接进文本而获得指令权威。
      en: Text from a user or tool without a trust decision, an isolated ContentPart, a transport envelope, participant identity, or tool result; none gains instruction authority merely by being concatenated into text.
      ja: trust decision のない user または tool 由来の text、孤立した ContentPart、transport envelope、participant identity、tool result。text に連結しただけで instruction authority を得るものではない。
  semantic_kind: information
engineering:
  explanation:
    zh: >-
      提示构建器读取带 `block_id`、`intent_kind` 与 `body` 的受控块，按应用策略组合，再渲染目标原生形状。例如 OpenAI 可接收顶层 `instructions` 或带 `role: developer` 的 input message；MCP `prompts/get` 返回的是 role 为 user/assistant 的 PromptMessage。构建器保存块和目标对象的映射作为本地来源记录，但不会把 `block_id` 插入这些协议 JSON。
    en: >-
      A prompt builder reads controlled blocks with block_id, intent_kind, and body, composes them under application policy, then renders a native target shape. For example, OpenAI can receive top-level instructions or an input message with role developer; MCP prompts/get returns PromptMessages whose role is user or assistant. The builder retains a local provenance record linking blocks and target objects but does not insert block_id into those protocol JSON objects.
    ja: >-
      prompt builder は block_id、intent_kind、body を持つ controlled block を読み、application policy の下で composition し、native target shape に render する。例えば OpenAI は top-level instructions または role developer の input message を受け取れる。MCP prompts/get は role が user または assistant の PromptMessage を返す。builder は block と target object を結ぶ local provenance record を保持するが、protocol JSON に block_id を挿入しない。
  typical_input:
    - description:
        zh: 受控指令块
        en: Controlled instruction block
        ja: Controlled instruction block
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"instruction-block","element_id":"el-policy-json","element_kind":"instruction-block","source_object_ref":"app:prompt-source/policy-json","block_id":"policy-json","intent_kind":"output-format","body":"Return one JSON object and no markdown.","author_ref":"application:triage-team","render_target_protocol":"openai-responses"}
      source_claims: [claim-instruction-block-local]
  typical_output:
    - description:
        zh: OpenAI 开发者消息渲染结果
        en: Rendered OpenAI developer message
        ja: Render 済み OpenAI developer message
      format: |-
        {"type":"message","role":"developer","content":[{"type":"input_text","text":"Return one JSON object and no markdown."}]}
      source_claims: [claim-instruction-block-openai]
  reference_implementations:
    - name: OpenAI Responses text generation
      url: https://developers.openai.com/api/docs/guides/text
      description: Documents the instructions parameter and developer message role for high-priority application instructions.
    - name: MCP prompts specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Documents prompt definitions and PromptMessage output roles and content.
structure:
  identity_keys: [element_id, block_id]
  fields:
    - id: element_id
      labels:
        zh: 对话元素标识
        en: Conversation-element identifier
        ja: Conversation-element 識別子
      definitions:
        zh: 稳定标识本地对话描述中承载此指令块的位置；它使块可与消息、轮次区分，但不取代任何 API 请求项或协议消息标识。
        en: Stably identifies the place carrying this instruction block in a local conversation description; it distinguishes the block from messages and turns without replacing an API request item or protocol-message identifier.
        ja: local conversation description 内でこの instruction block を担う位置を安定して識別する。block を message や turn と区別するが、API request item や protocol-message identifier を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: el-policy-json
      source_claims: [claim-instruction-block-local]
    - id: element_kind
      labels:
        zh: 对话元素种类
        en: Conversation-element kind
        ja: Conversation-element kind
      definitions:
        zh: 固定为 `instruction-block` 的 Moonweave 分类值，表示待审阅的本地构建片段；它不能作为 OpenAI、A2A 或 MCP role 或对象类型发送。
        en: The Moonweave classification fixed to `instruction-block`, denoting a local construction fragment awaiting review; it cannot be sent as an OpenAI, A2A, or MCP role or object type.
        ja: "`instruction-block` に固定された Moonweave classification 値で、review 対象の local construction fragment を表す。OpenAI、A2A、MCP の role や object type として送信できない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [instruction-block]
      pattern: null
      example_value: instruction-block
      source_claims: [claim-instruction-block-local]
    - id: source_object_ref
      labels:
        zh: 来源对象引用
        en: Source-object reference
        ja: Source-object 参照
      definitions:
        zh: 指向经过控制和审阅的应用配置、提示源文件或其他可审计来源；渲染后的 OpenAI 或 MCP 对象须另以其自身标识保存。
        en: Points to the controlled and reviewed application configuration, prompt source file, or other auditable source; the rendered OpenAI or MCP object must be retained separately under its own identifier.
        ja: controlled かつ review 済みの application configuration、prompt source file、または他の監査可能な source を指す。render 後の OpenAI または MCP object は自身の identifier で別に保持しなければならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: app:prompt-source/policy-json
      source_claims: [claim-instruction-block-local]
    - id: block_id
      labels:
        zh: 指令块标识
        en: Instruction-block identifier
        ja: Instruction-block 識別子
      definitions:
        zh: 稳定标识一个本地维护的指令片段，支持对其来源、审阅和渲染记录进行追踪。
        en: Stably identifies one locally maintained instruction segment for provenance, review, and render records.
        ja: provenance、review、render record のために、local に保守される一つの instruction segment を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy-json
      source_claims: [claim-instruction-block-local]
    - id: intent_kind
      labels:
        zh: 指令意图种类
        en: Instruction intent kind
        ja: Instruction intent kind
      definitions:
        zh: Moonweave 的本地分类，说明该片段约束角色、行为、格式、工具使用或示例；它不是模型 API 的 role 字段。
        en: A Moonweave local classification stating whether the segment constrains role, behavior, format, tool use, or an example; it is not a model API role field.
        ja: segment が role、behavior、format、tool use、example のどれを制約するかを示す Moonweave local classification。model API の role field ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [role, behavior-rule, output-format, tool-guidance, example]
      pattern: null
      example_value: output-format
      source_claims: [claim-instruction-block-local]
    - id: body
      labels:
        zh: 指令正文
        en: Instruction body
        ja: Instruction body
      definitions:
        zh: 经授权创作者提供、可在渲染前验证的文本或结构化规则主体；不包括未审查的外部输入。
        en: Text or structured rule body supplied by an authorized author and verifiable before rendering; it excludes unreviewed external input.
        ja: 承認された author が提供し render 前に検証できる text または structured rule body。未 review の external input は含まない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Return one JSON object and no markdown.
      source_claims: [claim-instruction-block-openai]
    - id: author_ref
      labels:
        zh: 授权作者引用
        en: Authorized-author reference
        ja: Authorized-author 参照
      definitions:
        zh: 指向有权维护该规则的开发者、团队或受控配置主体；它证明来源控制，不等同于 OpenAI `developer` role 或任意用户身份。
        en: Points to the developer, team, or controlled configuration principal authorized to maintain this rule; it evidences source control and is neither an OpenAI `developer` role nor an arbitrary user identity.
        ja: この rule を保守する権限を持つ developer、team、または controlled configuration principal を指す。source control の証拠であり、OpenAI `developer` role や任意の user identity ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: application:triage-team
      source_claims: [claim-instruction-block-local]
    - id: render_target_protocol
      labels:
        zh: 渲染目标协议
        en: Render-target protocol
        ja: Render-target protocol
      definitions:
        zh: 声明本指令块要被渲染到的目标接口类别，以便渲染器采用该接口真实允许的角色和内容形状；它不是目标负载中的自定义字段。
        en: Declares the target interface class into which this block is rendered so the renderer uses that interface's actually permitted role and content shape; it is not a custom field in the target payload.
        ja: renderer が target interface で実際に許可された role と content shape を使えるよう、この block を render する target interface class を宣言する。target payload 内の custom field ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [openai-responses, mcp-prompts]
      pattern: null
      example_value: openai-responses
      source_claims: [claim-instruction-block-openai, claim-instruction-block-mcp]
  constraints:
    - id: instruction-block-authority-before-render
      severity: error
      language: plain
      expression: A block rendered into a high-priority instruction channel must retain author_ref, an explicit intent_kind, and a source_object_ref; untrusted user or tool text cannot be promoted into that channel as an InstructionBlock.
      explanation:
        zh: 将外部内容和应用规则分开，可防止提示注入文本被误提升为开发者意图。
        en: Separating external content from application rules prevents prompt-injection text from being mistakenly elevated into developer intent.
        ja: external content と application rule を分離すると、prompt-injection text が developer intent に誤って昇格することを防げる。
      source_claims: [claim-instruction-block-openai]
    - id: instruction-block-render-target-preserved
      severity: error
      language: plain
      expression: Rendering an InstructionBlock must retain render_target_protocol and the target's role semantics; a local block_id, element_kind, or intent_kind must not be presented as an OpenAI, A2A, or MCP wire field.
      explanation:
        zh: 同一片段可以渲染到不同目标，但每个目标仍需使用其官方结构和角色规则。
        en: The same fragment may render to different targets, but each target must still use its official structure and role rules.
        ja: 同じ fragment は異なる target に render できるが、各 target は公式の structure と role rule を使わなければならない。
      source_claims: [claim-instruction-block-mcp, claim-instruction-block-openai]
  required_relations: []
examples:
  - id: instruction-block-openai-post-v1-chat-completions-messages
    labels:
      zh: JSON 输出规则块
      en: JSON output-rule block
      ja: JSON output-rule block

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; InstructionBlock maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; InstructionBlock maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; InstructionBlock context/token boundary."}
    field_values: {element_id: el-policy-json, element_kind: instruction-block, source_object_ref: app:prompt-source/policy-json, block_id: policy-json, intent_kind: output-format, body: Return one JSON object and no markdown., author_ref: application:triage-team, render_target_protocol: openai-responses}
    related_node_ids: [InstructionBlock, DeveloperMessage]
    source_claims: [claim-instruction-block-openai, claim-instruction-block-local]
parent_relation:
  id: InstructionBlock-is_a-ConversationElement
  predicate: is_a
  target: concept:ConversationElement
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是对话元素的一种
    en: is a kind of conversation element
    ja: conversation element の一種である
  definitions:
    zh: InstructionBlock 是在对话描述中可被定位和审阅的一类 ConversationElement，但其实际传输仍由渲染后的消息或协议对象承担。
    en: An InstructionBlock is a ConversationElement that can be located and reviewed in a dialogue description, while actual transport remains the responsibility of rendered messages or protocol objects.
    ja: InstructionBlock は dialogue description 内で位置付けと review ができる ConversationElement だが、実際の transport は render 済み message または protocol object が担う。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_instruction_block
    labels:
      zh: 具有指令块
      en: has instruction block
      ja: instruction block を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy is a Moonweave description relation, not a protocol-native inheritance tree.
  constraints: []
  examples: []
  source_claims: [claim-instruction-block-local]
  distinct_fact_rationale:
    zh: 层次关系只表达本地指令片段可作为对话元素分析；它不将片段等同于完整消息或协议内容联合。
    en: The hierarchy only says a local instruction fragment can be analyzed as a conversation element; it does not equate the fragment with a complete message or protocol content union.
    ja: hierarchy は local instruction fragment を conversation element として分析できることだけを示し、完全な message や protocol content union と同一視しない。
relations: []
sources:
  - id: openai-responses-text
    title: OpenAI API — Text generation
    url: https://developers.openai.com/api/docs/guides/text
    source_type: official-doc
    relevance: Documents top-level instructions and the developer role used by an application to convey higher-priority instructions.
  - id: mcp-prompts-2025-11-25
    title: Model Context Protocol — Prompts
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    source_type: official-spec
    relevance: Defines prompt definitions, prompts/get, PromptMessage roles, and content.
source_claims:
  - id: claim-instruction-block-openai
    source: openai-responses-text
    supports: OpenAI Responses supports high-level instructions and developer messages, whose instructions take priority over user messages; application-authored blocks may be rendered into those native inputs without becoming native types themselves.
    locator: Text generation — Message roles and instruction following
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-block-mcp
    source: mcp-prompts-2025-11-25
    supports: MCP prompts/get returns PromptMessages whose role is user or assistant and whose content uses MCP-defined content types.
    locator: Prompts — Getting a Prompt and PromptMessage
    evidence_kind: normative
    confidence: high
  - id: claim-instruction-block-local
    source: openai-responses-text
    supports: Identifying, reviewing, and composing local instruction fragments before rendering is a Moonweave application-design inference; it remains distinct from OpenAI, A2A, and MCP wire schemas.
    locator: Text generation — Version prompts in code; Message roles and instruction following
    evidence_kind: design-inference
    confidence: high

