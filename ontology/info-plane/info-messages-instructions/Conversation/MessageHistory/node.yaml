      en: Uses one general member edge for Message and ConversationTurn in history and removes the derivable contains_message shortcut.
      ja: history内Message/ConversationTurnに一general member edgeを使いtype継承で導出可能なcontains_message shortcutを除去します。
    layout_role: cross-link
    review_status: accepted
    target: concept:ConversationElement
