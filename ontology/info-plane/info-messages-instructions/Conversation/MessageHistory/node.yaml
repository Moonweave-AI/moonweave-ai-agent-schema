schema: moonweave.ai/ontology-node/v1
id: MessageHistory
kind: concept
labels:
  zh: 消息历史
  en: Message history
  ja: メッセージ履歴
semantics:
  short_definition:
    zh: 某会话在特定版本与范围边界上的有序元素快照投影。
    en: Ordered element snapshot projection of a conversation at a declared version and range boundary.
    ja: 宣言 version/range 境界における conversation element の ordered snapshot projection。
  definition:
    zh: MessageHistory 独立记录某 Conversation 在 history_version、range_start/end 与 completeness 声明下的 ConversationElement 序列；它对应 Anthropic/OpenAI 客户端重放时提交的 messages[] 子集、A2A Task 返回的历史数组，或 LangGraph checkpoint 中的 thread 快照，但不是 Conversation 本身或 ContextPackage。
    en: MessageHistory independently records the ConversationElement sequence for a Conversation under history_version, range_start/end, and completeness. It maps to messages[] subsets replayed to Anthropic/OpenAI, A2A Task history arrays, or LangGraph thread checkpoints, but is not the Conversation itself or a ContextPackage.
    ja: MessageHistory は history_version/range/completeness 下の element 序列を記録。Anthropic/OpenAI 再投入 messages[] 部分集合や A2A history 配列に対応。
  why_needed:
    zh: 区分持续存在的逻辑会话与某时刻可读取的历史投影，使截断、分页和快照不会改变 Conversation 身份。
    en: Separates the enduring logical conversation from a readable historical projection at a point in time, so truncation, pagination, and snapshots do not alter Conversation identity.
    ja: 持続logical conversationと時点readable history projectionを分離しtruncation・pagination・snapshotでConversation identityを変えません。
  includes:
    - zh: 纳入声明 conversation_id、history_version、元素范围和完整性的有序历史记录。
      en: Includes ordered histories declaring conversation_id, history_version, element range, and completeness.
      ja: conversation_id・history_version・element range・completenessを宣言するordered historyを含みます。
  excludes:
    - zh: 排除 Conversation、ContextPackage、TraceLog、MemoryStore 和没有顺序声明的消息集合。
      en: Excludes Conversation, ContextPackage, TraceLog, MemoryStore, and message sets without an ordering declaration.
      ja: Conversation・ContextPackage・TraceLog・MemoryStore・ordering宣言のないmessage setを除外します。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: Anthropic messages[] 与 OpenAI 多轮 history 都是 MessageHistory 的工程对照面；A2A Task 示例返回带 messageId 的有序 history；completeness=truncated 时必须显式声明，不能把 context window 可见集合当作完整历史。
    en: Anthropic messages[] and OpenAI multi-turn history are engineering surfaces for MessageHistory; A2A Task examples return ordered history with messageId; completeness=truncated must be explicit—context-window visibility is not full history.
    ja: Anthropic/OpenAI history は MessageHistory の engineering 面。truncated は明示必須。
  typical_input:
    - description: Truncated history projection
      format: '{"history_id":"history-204","history_version":"v12","conversation_id":"conv-support-042","range_start":0,"range_end":19,"completeness":"truncated"}'
      source_claims:
        - claim-message-history-design
  typical_output:
    - description: Replayable checkpoint
      format: '{"history_id":"history/thread-42@cp-9","completeness":"complete","message_count":18}'
      source_claims:
        - claim-message-history-a2a
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys:
    - history_id
    - history_version
  fields:
    - id: history_id
      labels:
        zh: 历史标识
        en: history ID
        ja: 履歴ID
      definitions:
        zh: 稳定标识一个会话历史序列。
        en: Stable identifier for one conversation-history sequence.
        ja: 一つのconversation-history sequenceを安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: history-204
      allowed_values: []
      source_claims:
        - claim-message-history-002
    - id: history_version
      labels:
        zh: 历史版本
        en: history version
        ja: 履歴version
      definitions:
        zh: 标识该历史投影的不可混淆版本。
        en: Identifies the non-interchangeable version of this history projection.
        ja: このhistory projectionの非互換versionを識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: v12
      allowed_values: []
      source_claims:
        - claim-message-history-003
    - id: conversation_id
      labels:
        zh: 会话标识
        en: conversation ID
        ja: 会話ID
      definitions:
        zh: 标识该历史记录所投影的 Conversation。
        en: Identifies the Conversation projected by this history record.
        ja: このhistory recordがprojectするConversationを識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: conv-support-042
      allowed_values: []
      source_claims:
        - claim-message-history-004
    - id: range_start
      labels:
        zh: 起始位置
        en: range start
        ja: 範囲開始
      definitions:
        zh: 记录历史所含第一个会话元素位置。
        en: Position of the first conversation element included in the history.
        ja: historyに含む最初のconversation element positionです。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0
      allowed_values: []
      source_claims:
        - claim-message-history-005
    - id: range_end
      labels:
        zh: 结束位置
        en: range end
        ja: 範囲終了
      definitions:
        zh: 记录历史所含最后一个会话元素位置。
        en: Position of the last conversation element included in the history.
        ja: historyに含む最後のconversation element positionです。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 19
      allowed_values: []
      source_claims:
        - claim-message-history-006
    - id: completeness
      labels:
        zh: 完整性声明
        en: completeness
        ja: 完全性宣言
      definitions:
        zh: 声明该记录是 complete、truncated 或 paged。
        en: Declares whether the record is complete, truncated, or paged.
        ja: recordがcomplete・truncated・pagedか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: truncated
      allowed_values: []
      source_claims:
        - claim-message-history-007
  constraints: []
  required_relations: []
examples:
  - id: MessageHistory-example-anthropic-replay
    labels:
      zh: Anthropic 历史重放
      en: Anthropic history replay
      ja: Anthropic 履歴 replay
    descriptions:
      zh: history-204/v12 保存 conv-support-042 元素 0–19 并标记 truncated；重放时仅注入该范围的 messages[]。
      en: history-204/v12 stores elements 0–19 of conv-support-042 marked truncated; replay injects only that messages[] range.
      ja: history-204/v12 が element 0–19 を truncated で保存。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: messages history
    field_values:
      history_id: history-204
      history_version: v12
      completeness: truncated
    related_node_ids:
      - MessageHistory
      - Conversation
    related_relation_ids: []
    source_claims:
      - claim-message-history-design
  - id: MessageHistory-example-a2a-task-history
    labels:
      zh: A2A Task 消息历史
      en: A2A Task message history
      ja: A2A Task message history
    descriptions:
      zh: task-a2a-551 返回有序 Message 数组含 messageId 与 contextId；系统创建 history_version=task-complete 的快照。
      en: task-a2a-551 returns ordered Message array with messageId and contextId; system creates snapshot history_version=task-complete.
      ja: task-a2a-551 が ordered Message 配列を返却。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Task history
    field_values:
      history_id: history-task-551
      conversation_id: conv-billing-27
    related_node_ids:
      - MessageHistory
      - Conversation
    related_relation_ids: []
    source_claims:
      - claim-message-history-a2a
  - id: MessageHistory-example-not-context-window
    labels:
      zh: 非上下文窗口
      en: Not a context window
      ja: context window ではない
    descriptions:
      zh: context-window-204 只有本次调用可见片段，没有 history_version，不得识别为 MessageHistory。
      en: context-window-204 holds only call-visible fragments without history_version and must not be MessageHistory.
      ja: history_version なし context window は MessageHistory ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - MessageHistory
    related_relation_ids: []
    source_claims:
      - claim-message-history-design
parent_relation:
  id: MessageHistory-snapshot_of-Conversation
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 是会话快照
    en: snapshot of
    ja: conversation の snapshot
  definitions:
    zh: MessageHistory snapshot_of Conversation 表示一份有版本、带截取边界的消息历史重现同一会话在某一检查点可见的有序消息成员；任意消息列表、摘要或跨会话拼接均不自动成为该会话的快照。
    en: MessageHistory snapshot_of Conversation means that a versioned, bounded message history reproduces the ordered message membership visible for the same conversation at one checkpoint; an arbitrary message list, summary, or cross-conversation concatenation is not automatically its snapshot.
    ja: MessageHistory snapshot_of Conversation は、version と cut boundary を持つ message history が同一 conversation の一 checkpoint で可視な ordered message membership を再現することを示します。任意 message list・summary・cross-conversation 連結は自動的に snapshot になりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个会话可有多个历史版本，且尚未持久化的会话可以暂时没有快照。
    en: A conversation may have many history versions, and a not-yet-persisted conversation may temporarily have none.
    ja: conversation は複数 history version を持て、未 persistence conversation は一時的に snapshot を持たない場合があります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有历史快照
      en: has history snapshot
      ja: history snapshot を持つ
  conditions:
    - id: MessageHistory-snapshot_of-Conversation-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the history records the same conversation or thread identity, checkpoint or version identifier, ordering rule, and inclusion boundary, and every retained message belongs to that conversation at the cut.
      source_claims:
        - claim-message-history-010
      explanation:
        zh: 仅当历史记录同一会话或 thread 身份、checkpoint 或版本标识、排序规则和纳入边界，且保留的每条消息在该截点都属于该会话时成立。
        en: Assert only when the history records the same conversation or thread identity, checkpoint or version identifier, ordering rule, and inclusion boundary, and every retained message belongs to that conversation at the cut.
        ja: history が同一 conversation/thread identity、checkpoint/version ID、ordering rule、inclusion boundary を記録し、保持 message が cut 時点で当該 conversation に属する場合だけ成立します。
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: MessageHistory-snapshot_of-Conversation-example-positive-001
      labels:
        zh: 检查点消息历史
        en: Checkpointed message history
        ja: checkpoint message history
      descriptions:
        zh: 历史 `history/thread-42@cp-9` 记录 thread `42`、checkpoint `cp-9`、按序号排序及 `1..18` 的纳入范围，十八条消息均属于会话 `conversation/42`。
        en: History `history/thread-42@cp-9` records thread `42`, checkpoint `cp-9`, sequence ordering, and inclusion range `1..18`; all eighteen messages belong to `conversation/42`.
        ja: history `history/thread-42@cp-9` は thread `42`、checkpoint `cp-9`、sequence order、inclusion range `1..18` を記録し、18 message はすべて `conversation/42` に属します。
      field_values: {}
      related_node_ids:
        - MessageHistory
        - Conversation
      related_relation_ids:
        - MessageHistory-snapshot_of-Conversation
      source_claims:
        - claim-message-history-011
    - id: MessageHistory-snapshot_of-Conversation-example-boundary-001
      labels:
        zh: 跨会话拼接边界
        en: Cross-conversation concatenation boundary
        ja: cross-conversation concat 境界
      descriptions:
        zh: 导出文件把 thread `42` 与 `77` 的消息按时间拼接，没有 checkpoint 或会话纳入边界。
        en: An export concatenates messages from threads `42` and `77` by timestamp and records neither a checkpoint nor a conversation inclusion boundary.
        ja: export は thread `42` と `77` の message を timestamp で連結し、checkpoint も conversation inclusion boundary も記録しません。
      field_values: {}
      related_node_ids:
        - MessageHistory
        - Conversation
      related_relation_ids:
        - MessageHistory-snapshot_of-Conversation
      source_claims:
        - claim-message-history-012
  source_claims:
    - claim-message-history-013
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: MessageHistory-contains-ConversationElement
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: 保存会话元素
      en: contains conversation element
      ja: 会話要素を保存
    definitions:
      zh: 将一个 MessageHistory 版本连接到其声明范围内保存的有序 ConversationElement；元素顺序、范围与完整性由历史版本共同约束。
      en: Connects one MessageHistory version to the ordered ConversationElement records saved within its declared range; element order, range, and completeness are jointly constrained by the history version.
      ja: 一MessageHistory versionをdeclared range内に保存するordered ConversationElementへ接続しelement order・range・completenessをhistory versionで共同制約します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_contained_by
      labels:
        zh: 被包含于
        en: is contained by
        ja: 含まれる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: MessageHistory-contains-ConversationElement-example-positive-manual-001
        labels:
          zh: 保存会话元素正例
          en: "Positive case: contains conversation element"
          ja: 会話要素を保存正例
        descriptions:
          zh: history-204/v12 保存 element-100 至 element-119，并标记范围 0–19。
          en: history-204/v12 stores element-100 through element-119 and declares range 0–19.
          ja: history-204/v12 はelement-100から119を保存しrange 0–19を宣言します。
        field_values: {}
        related_node_ids:
          - MessageHistory
          - ConversationElement
        related_relation_ids:
          - MessageHistory-contains-ConversationElement
        source_claims:
          - claim-message-history-014
      - id: MessageHistory-contains-ConversationElement-example-boundary-manual-001
        labels:
          zh: 保存会话元素边界例
          en: "Boundary case: contains conversation element"
          ja: 会話要素を保存境界例
        descriptions:
          zh: element-120 位于同一 Conversation，但超出 history-204/v12 的结束位置 19。
          en: element-120 belongs to the same Conversation but lies beyond history-204/v12's end position 19.
          ja: element-120 は同じConversation所属ですがhistory-204/v12のend position 19外です。
        field_values: {}
        related_node_ids:
          - MessageHistory
          - ConversationElement
        related_relation_ids:
          - MessageHistory-contains-ConversationElement
        source_claims:
          - claim-message-history-015
    source_claims:
      - claim-message-history-016
    layout_role: cross-link
    target: concept:ConversationElement
