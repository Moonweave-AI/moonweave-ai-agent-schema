schema: moonweave.ai/ontology-node/v1
id: MessageHistory
kind: concept
status: accepted
labels:
  zh: 消息历史
  en: Message history
  ja: メッセージ履歴
semantics:
  short_definition:
    zh: 对一个会话元素序列在特定范围与版本上的有序记录。
    en: An ordered record of a conversation-element sequence at a declared range and version.
    ja: 指定range/versionにおけるconversation-element sequenceのordered recordです。
  definition:
    zh: MessageHistory 是独立集合根，表示某 Conversation 在给定版本、范围和完整性声明下保存的 ConversationElement 序列；它可以是完整历史、截断视图或任务返回的快照，但不是 Conversation 本身、上下文窗口、审计日志或 MemoryStore。
    en: MessageHistory is an independent collection root representing the ConversationElement sequence saved for a Conversation under a declared version, range, and completeness statement. It may be a complete history, truncated view, or task-returned snapshot, but is not the Conversation itself, a context window, an audit log, or a MemoryStore.
    ja: MessageHistory は指定version・range・completeness statementでConversationのConversationElement sequenceを保存する独立collection rootです。complete history・truncated view・task-returned snapshotになり得ますがConversation自体・context window・audit log・MemoryStoreではありません。
  why_needed:
    zh: 区分持续存在的逻辑会话与某时刻可读取的历史投影，使截断、分页和快照不会改变 Conversation 身份。
    en: Separates the enduring logical conversation from a readable historical projection at a point in time, so truncation, pagination, and snapshots do not alter Conversation identity.
    ja: 持続logical conversationと時点readable history projectionを分離しtruncation・pagination・snapshotでConversation identityを変えません。
  includes:
    - zh: 纳入声明 conversation_id、history_version、元素范围和完整性的有序历史记录。
      en: Includes ordered histories declaring conversation_id, history_version, element range, and completeness.
      ja: conversation_id・history_version・element range・completenessを宣言するordered historyを含みます。
  excludes:
    - zh: 排除 Conversation、ContextPackage、TraceLog、MemoryStore 和没有顺序声明的消息集合。
      en: Excludes Conversation, ContextPackage, TraceLog, MemoryStore, and message sets without an ordering declaration.
      ja: Conversation・ContextPackage・TraceLog・MemoryStore・ordering宣言のないmessage setを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - history_id
    - history_version
  fields:
    - id: history_id
      labels:
        zh: 历史标识
        en: history ID
        ja: 履歴ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个会话历史序列。
        en: Stable identifier for one conversation-history sequence.
        ja: 一つのconversation-history sequenceを安定識別します。
      allowed_values: []
      pattern: null
      example_value: history-204
      source_claims:
        - claim-message-history-002
    - id: history_version
      labels:
        zh: 历史版本
        en: history version
        ja: 履歴version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该历史投影的不可混淆版本。
        en: Identifies the non-interchangeable version of this history projection.
        ja: このhistory projectionの非互換versionを識別します。
      allowed_values: []
      pattern: null
      example_value: v12
      source_claims:
        - claim-message-history-003
    - id: conversation_id
      labels:
        zh: 会话标识
        en: conversation ID
        ja: 会話ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该历史记录所投影的 Conversation。
        en: Identifies the Conversation projected by this history record.
        ja: このhistory recordがprojectするConversationを識別します。
      allowed_values: []
      pattern: null
      example_value: conv-support-042
      source_claims:
        - claim-message-history-004
    - id: range_start
      labels:
        zh: 起始位置
        en: range start
        ja: 範囲開始
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录历史所含第一个会话元素位置。
        en: Position of the first conversation element included in the history.
        ja: historyに含む最初のconversation element positionです。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-message-history-005
    - id: range_end
      labels:
        zh: 结束位置
        en: range end
        ja: 範囲終了
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录历史所含最后一个会话元素位置。
        en: Position of the last conversation element included in the history.
        ja: historyに含む最後のconversation element positionです。
      allowed_values: []
      pattern: null
      example_value: 19
      source_claims:
        - claim-message-history-006
    - id: completeness
      labels:
        zh: 完整性声明
        en: completeness
        ja: 完全性宣言
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该记录是 complete、truncated 或 paged。
        en: Declares whether the record is complete, truncated, or paged.
        ja: recordがcomplete・truncated・pagedか宣言します。
      allowed_values: []
      pattern: null
      example_value: truncated
      source_claims:
        - claim-message-history-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: MessageHistory-example-positive-manual-001
    kind: positive
    labels:
      zh: 消息历史正例
      en: "Positive case: Message history"
      ja: メッセージ履歴正例
    scenario_id: null
    descriptions:
      zh: history-204/v12 保存 conv-support-042 的元素 0–19，并明确标记为 truncated。
      en: history-204/v12 stores elements 0–19 of conv-support-042 and explicitly marks the view truncated.
      ja: history-204/v12 はconv-support-042のelement 0–19を保存しtruncatedと明示します。
    field_values:
      history_id: history-204
      history_version: v12
      conversation_id: conv-support-042
      range_start: 0
      range_end: 19
      completeness: truncated
    related_node_ids:
      - MessageHistory
    related_relation_ids: []
    expected_result:
      zh: 识别为 MessageHistory 的截断版本。
      en: Identify a truncated MessageHistory version.
      ja: truncated MessageHistory versionと識別します。
    why_valid_or_invalid:
      zh: 历史身份、版本、范围、顺序和完整性均被显式记录。
      en: History identity, version, range, order, and completeness are explicit.
      ja: history identity・version・range・order・completenessが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-message-history-008
  - id: MessageHistory-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 消息历史边界例
      en: "Boundary case: Message history"
      ja: メッセージ履歴境界例
    scenario_id: null
    descriptions:
      zh: context-window-204 只包含本次模型调用可见的相关消息与记忆片段，没有历史版本或完整性声明。
      en: context-window-204 contains only messages and memory fragments visible to one model call and has no history version or completeness statement.
      ja: context-window-204 は一model callに可視なmessage/memory fragmentだけを含みhistory version/completeness statementを持ちません。
    field_values: {}
    related_node_ids:
      - MessageHistory
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 MessageHistory；它是上下文装配产物。
      en: Do not identify MessageHistory; it is a context-assembly artifact.
      ja: MessageHistoryとせずcontext-assembly artifactです。
    why_valid_or_invalid:
      zh: 调用可见性选择不等于会话历史的保存范围与版本。
      en: Model-call visibility selection is not the saved range and version of conversation history.
      ja: model-call visibility selectionはconversation historyのsaved range/versionではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-message-history-009
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MessageHistory-snapshot_of-Conversation
  predicate: snapshot_of
  direction: source-to-target
  relation_kind: mapping
  labels:
    zh: 是会话快照
    en: snapshot of
    ja: conversation の snapshot
  definitions:
    zh: MessageHistory snapshot_of Conversation 表示一份有版本、带截取边界的消息历史重现同一会话在某一检查点可见的有序消息成员；任意消息列表、摘要或跨会话拼接均不自动成为该会话的快照。
    en: MessageHistory snapshot_of Conversation means that a versioned, bounded message history reproduces the ordered message membership visible for the same conversation at one checkpoint; an arbitrary message list, summary, or cross-conversation concatenation is not automatically its snapshot.
    ja: MessageHistory snapshot_of Conversation は、version と cut boundary を持つ message history が同一 conversation の一 checkpoint で可視な ordered message membership を再現することを示します。任意 message list・summary・cross-conversation 連結は自動的に snapshot になりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个会话可有多个历史版本，且尚未持久化的会话可以暂时没有快照。
    en: A conversation may have many history versions, and a not-yet-persisted conversation may temporarily have none.
    ja: conversation は複数 history version を持て、未 persistence conversation は一時的に snapshot を持たない場合があります。
  inverse_reading:
    predicate: has_history_snapshot
    labels:
      zh: 具有历史快照
      en: has history snapshot
      ja: history snapshot を持つ
  conditions:
    - id: MessageHistory-snapshot_of-Conversation-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the history records the same conversation or thread identity, checkpoint or version identifier, ordering rule, and inclusion boundary, and every retained message belongs to that conversation at the cut.
      explanations:
        zh: 仅当历史记录同一会话或 thread 身份、checkpoint 或版本标识、排序规则和纳入边界，且保留的每条消息在该截点都属于该会话时成立。
        en: Assert only when the history records the same conversation or thread identity, checkpoint or version identifier, ordering rule, and inclusion boundary, and every retained message belongs to that conversation at the cut.
        ja: history が同一 conversation/thread identity、checkpoint/version ID、ordering rule、inclusion boundary を記録し、保持 message が cut 時点で当該 conversation に属する場合だけ成立します。
      source_claims:
        - claim-message-history-010
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: MessageHistory-snapshot_of-Conversation-example-positive-001
      kind: positive
      labels:
        zh: 检查点消息历史
        en: Checkpointed message history
        ja: checkpoint message history
      scenario_id: null
      descriptions:
        zh: 历史 `history/thread-42@cp-9` 记录 thread `42`、checkpoint `cp-9`、按序号排序及 `1..18` 的纳入范围，十八条消息均属于会话 `conversation/42`。
        en: History `history/thread-42@cp-9` records thread `42`, checkpoint `cp-9`, sequence ordering, and inclusion range `1..18`; all eighteen messages belong to `conversation/42`.
        ja: history `history/thread-42@cp-9` は thread `42`、checkpoint `cp-9`、sequence order、inclusion range `1..18` を記録し、18 message はすべて `conversation/42` に属します。
      field_values: {}
      related_node_ids:
        - MessageHistory
        - Conversation
      related_relation_ids:
        - MessageHistory-snapshot_of-Conversation
      expected_result:
        zh: 建立 snapshot_of 边并允许按 checkpoint 重放。
        en: A snapshot_of edge is created and replay by checkpoint is supported.
        ja: snapshot_of 辺を作り checkpoint replay を可能にします。
      why_valid_or_invalid:
        zh: 会话身份、版本、顺序和成员边界完整且一致。
        en: Conversation identity, version, order, and membership boundary are complete and consistent.
        ja: conversation identity、version、order、membership boundary が完全で整合します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-message-history-011
    - id: MessageHistory-snapshot_of-Conversation-example-boundary-001
      kind: boundary
      labels:
        zh: 跨会话拼接边界
        en: Cross-conversation concatenation boundary
        ja: cross-conversation concat 境界
      scenario_id: null
      descriptions:
        zh: 导出文件把 thread `42` 与 `77` 的消息按时间拼接，没有 checkpoint 或会话纳入边界。
        en: An export concatenates messages from threads `42` and `77` by timestamp and records neither a checkpoint nor a conversation inclusion boundary.
        ja: export は thread `42` と `77` の message を timestamp で連結し、checkpoint も conversation inclusion boundary も記録しません。
      field_values: {}
      related_node_ids:
        - MessageHistory
        - Conversation
      related_relation_ids:
        - MessageHistory-snapshot_of-Conversation
      expected_result:
        zh: 保留导出集合，但不声明它是任一会话的 MessageHistory 快照。
        en: The export collection is retained but is not asserted as a MessageHistory snapshot of either conversation.
        ja: export collection は保持しますが、どちらの conversation の MessageHistory snapshot とも断言しません。
      why_valid_or_invalid:
        zh: 快照必须有单一会话身份和可重放截点，时间排序不足以替代。
        en: A snapshot requires one conversation identity and a replayable cut; timestamp ordering cannot substitute for them.
        ja: snapshot には一 conversation identity と replayable cut が必要で、timestamp order では代替できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-message-history-012
  source_claims:
    - claim-message-history-013
  distinct_fact_rationale:
    zh: snapshot_of 记录有版本历史与持续会话之间的映射；Conversation contains ConversationElement 记录会话当前成员，两者的时间边界不同。
    en: snapshot_of maps a versioned history to an enduring conversation; Conversation contains ConversationElement records current membership. Their temporal boundaries differ.
    ja: snapshot_of は versioned history と継続 conversation の mapping を、contains は current membership を記録し、時間境界が異なります。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
