schema: moonweave.ai/ontology-node/v1
id: Conversation
kind: concept
labels:
  zh: 会话
  en: Conversation
  ja: 会話
semantics:
  short_definition:
    zh: 按共同交互语境组织有序会话元素的身份容器。
    en: Identity container that orders conversation elements within one shared interaction context.
    ja: 共通 interaction context 内で conversation element を順序付ける identity container。
  definition:
    zh: Conversation 以 conversation_id 界定一段逻辑对话，直接组织 ConversationElement 的有序成员；它对应 OpenAI/Anthropic messages[] 数组所服务的同一会话线程，以及 A2A contextId 所关联的交互分组，但不等于 RuntimeSession、HTTP 连接或模型上下文窗口裁剪结果。
    en: Conversation is a logical dialogue delimited by conversation_id and ordered ConversationElement members. It maps to the thread served by OpenAI/Anthropic messages[] arrays and A2A contextId groupings, but is not a RuntimeSession, HTTP connection, or model context-window clip.
    ja: Conversation は conversation_id で論理対話を区切り ConversationElement を順序付けます。OpenAI/Anthropic messages[] や A2A contextId に写像しますが RuntimeSession/HTTP 接続/context window clip ではありません。
  why_needed:
    zh: 把对话身份与运行会话、协议传输和上下文裁剪分开，使消息仍可在不同执行和传输中保持同一会话归属。
    en: Separates dialogue identity from runtime sessions, protocol transport, and context truncation so messages can retain conversation membership across executions and transports.
    ja: dialogue identityをruntime session・protocol transport・context truncationから分離し、実行やtransportを跨いでmessageのconversation所属を保持します。
  includes:
    - zh: 纳入由 conversation_id 界定并拥有明确元素顺序的逻辑对话。
      en: Includes logical dialogues delimited by conversation_id with an explicit element order.
      ja: conversation_idで区切られelement順序が明示されたlogical dialogueを含みます。
  excludes:
    - zh: 排除 RuntimeSession、MCP session、HTTP 连接、上下文窗口和消息历史快照。
      en: Excludes RuntimeSession, MCP sessions, HTTP connections, context windows, and message-history snapshots.
      ja: RuntimeSession・MCP session・HTTP connection・context window・message-history snapshotを除外します。
  semantic_kind: collection
  aliases: []
engineering:
  explanation:
    zh: OpenAI Chat Completions 把整段交互建模为 messages[]；Anthropic 用顶层 system 加 messages[] turn 历史；A2A 用 contextId/taskId 关联 Message 序列。Moonweave 用 conversation_id 归并跨调用的消息，protocol_context_id 保存外部 contextId 而不替代会话身份。
    en: OpenAI Chat Completions models an interaction as messages[]; Anthropic uses top-level system plus messages[] turn history; A2A correlates Message sequences with contextId/taskId. Moonweave merges cross-call messages under conversation_id while protocol_context_id preserves external contextId without replacing conversation identity.
    ja: OpenAI messages[]、Anthropic system+messages[]、A2A contextId/taskId を conversation_id に統合し protocol_context_id で外部 ID を保持します。
  typical_input:
    - description: OpenAI thread messages
      format: '{"messages":[{"role":"user","content":"Reset my password."},{"role":"assistant","content":"I can help with that."}]}'
      source_claims:
        - claim-conversation-openai
  typical_output:
    - description: Moonweave conversation projection
      format: '{"conversation_id":"conv-support-042","element_ids":["element-100","element-101"]}'
      source_claims:
        - claim-conversation-design
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: messages[] with role and content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system parameter and role/content block turns.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/prompts
      description: prompts/get returns injectable messages array.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message with role, messageId, contextId, and parts.
structure:
  identity_keys:
    - conversation_id
  fields:
    - id: conversation_id
      labels:
        zh: 会话标识
        en: conversation ID
        ja: 会話ID
      definitions:
        zh: 跨消息稳定标识一个逻辑对话。
        en: Stable identifier for one logical dialogue across messages.
        ja: messageを跨いで一つのlogical dialogueを安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: conv-support-042
      allowed_values: []
      source_claims:
        - claim-conversation-002
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      definitions:
        zh: 记录该逻辑会话首次建立的事件时间。
        en: Event time at which the logical conversation was first established.
        ja: logical conversationが初めて成立したevent timeです。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      allowed_values: []
      source_claims:
        - claim-conversation-003
    - id: protocol_context_id
      labels:
        zh: 协议语境标识
        en: protocol context ID
        ja: protocol context ID
      definitions:
        zh: 保存外部协议用于关联交互的可选语境标识，不改变会话身份。
        en: Optional protocol context identifier used to correlate interactions without replacing conversation identity.
        ja: interaction相関に使う任意protocol context identifierでconversation identityを置換しません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: a2a-context-61
      allowed_values: []
      source_claims:
        - claim-conversation-004
  constraints: []
  required_relations: []
examples:
  - id: Conversation-example-openai-thread
    labels:
      zh: OpenAI 会话线程
      en: OpenAI conversation thread
      ja: OpenAI 会話 thread
    descriptions:
      zh: conv-support-042 跨两次 Chat Completions 调用保留同一 conversation_id，messages[] 按 sequence_index 0–5 排序。
      en: conv-support-042 keeps one conversation_id across two Chat Completions calls with messages[] ordered sequence_index 0–5.
      ja: conv-support-042 が二回の Chat Completions で同一 conversation_id を保持。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: messages array
    field_values:
      conversation_id: conv-support-042
      protocol_context_id: null
      element_count: 6
    related_node_ids:
      - Conversation
      - Message
    related_relation_ids: []
    source_claims:
      - claim-conversation-openai
      - claim-conversation-design
  - id: Conversation-example-a2a-context
    labels:
      zh: A2A contextId 归并
      en: A2A contextId grouping
      ja: A2A contextId 統合
    descriptions:
      zh: billing 交互中三条 A2A Message 共享 contextId=ctx-billing-27 并映射到 conversation_id=conv-billing-27。
      en: Three A2A Messages in billing share contextId=ctx-billing-27 mapped to conversation_id=conv-billing-27.
      ja: 三 A2A Message が contextId=ctx-billing-27 を共有。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Message.contextId
    field_values:
      conversation_id: conv-billing-27
      protocol_context_id: ctx-billing-27
    related_node_ids:
      - Conversation
      - ExternalAgentMessage
    related_relation_ids: []
    source_claims:
      - claim-conversation-a2a
  - id: Conversation-example-not-runtime-session
    labels:
      zh: 非运行会话边界
      en: Not a runtime session
      ja: runtime session ではない
    descriptions:
      zh: runtime-session-042 记录执行生命周期但没有 conversation element 序列，不得识别为 Conversation。
      en: runtime-session-042 records execution lifecycle without conversation elements and must not be identified as Conversation.
      ja: runtime-session-042 は element 序列なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - Conversation
    related_relation_ids: []
    source_claims:
      - claim-conversation-design
parent_relation: null
relations: []
