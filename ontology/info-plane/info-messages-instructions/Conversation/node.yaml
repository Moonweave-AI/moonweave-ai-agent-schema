schema: moonweave.ai/ontology-node/v1
id: Conversation
kind: concept
status: accepted
labels:
  zh: 会话
  en: Conversation
  ja: 会話
semantics:
  short_definition:
    zh: 按共同交互语境组织有序会话元素的身份容器。
    en: An identity-bearing container that orders conversation elements within one interaction context.
    ja: 一つのinteraction contextでconversation elementを順序付けるidentity containerです。
  definition:
    zh: Conversation 是由稳定会话标识界定、按顺序容纳 ConversationElement 的集合；它描述对话内容的逻辑边界，不等同于 RuntimeSession、网络连接或模型上下文窗口。
    en: A Conversation is a collection delimited by a stable identifier and ordered ConversationElement members. It expresses a logical dialogue boundary, not a RuntimeSession, network connection, or model context window.
    ja: Conversation はstable conversation identityで区切られ、ConversationElementを順序付きで含むcollectionです。RuntimeSession・network connection・model context windowとは異なります。
  why_needed:
    zh: 把对话身份与运行会话、协议传输和上下文裁剪分开，使消息仍可在不同执行和传输中保持同一会话归属。
    en: Separates dialogue identity from runtime sessions, protocol transport, and context truncation so messages can retain conversation membership across executions and transports.
    ja: dialogue identityをruntime session・protocol transport・context truncationから分離し、実行やtransportを跨いでmessageのconversation所属を保持します。
  includes:
    - zh: 纳入由 conversation_id 界定并拥有明确元素顺序的逻辑对话。
      en: Includes logical dialogues delimited by conversation_id with an explicit element order.
      ja: conversation_idで区切られelement順序が明示されたlogical dialogueを含みます。
  excludes:
    - zh: 排除 RuntimeSession、MCP session、HTTP 连接、上下文窗口和消息历史快照。
      en: Excludes RuntimeSession, MCP sessions, HTTP connections, context windows, and message-history snapshots.
      ja: RuntimeSession・MCP session・HTTP connection・context window・message-history snapshotを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - conversation_id
  fields:
    - id: conversation_id
      labels:
        zh: 会话标识
        en: conversation ID
        ja: 会話ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨消息稳定标识一个逻辑对话。
        en: Stable identifier for one logical dialogue across messages.
        ja: messageを跨いで一つのlogical dialogueを安定識別します。
      allowed_values: []
      pattern: null
      example_value: conv-support-042
      source_claims:
        - claim-conversation-002
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: 作成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该逻辑会话首次建立的事件时间。
        en: Event time at which the logical conversation was first established.
        ja: logical conversationが初めて成立したevent timeです。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      source_claims:
        - claim-conversation-003
    - id: protocol_context_id
      labels:
        zh: 协议语境标识
        en: protocol context ID
        ja: protocol context ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存外部协议用于关联交互的可选语境标识，不改变会话身份。
        en: Optional protocol context identifier used to correlate interactions without replacing conversation identity.
        ja: interaction相関に使う任意protocol context identifierでconversation identityを置換しません。
      allowed_values: []
      pattern: null
      example_value: a2a-context-61
      source_claims:
        - claim-conversation-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: Conversation-example-positive-manual-001
    kind: positive
    labels:
      zh: 会话正例
      en: "Positive case: Conversation"
      ja: 会話正例
    scenario_id: null
    descriptions:
      zh: conv-support-042 包含三次用户/助手交换，并在两个模型调用之间保持同一 conversation_id。
      en: conv-support-042 contains three user/assistant exchanges and retains one conversation_id across two model calls.
      ja: conv-support-042 は三回のuser/assistant交換を含み、二回のmodel callで同じconversation_idを保持します。
    field_values:
      conversation_id: conv-support-042
      created_at: 2026-07-16T08:00:00Z
      protocol_context_id: a2a-context-61
    related_node_ids:
      - Conversation
    related_relation_ids: []
    expected_result:
      zh: 识别为同一个 Conversation。
      en: Identify one Conversation.
      ja: 一つのConversationと識別します。
    why_valid_or_invalid:
      zh: 逻辑交互语境和元素顺序连续，模型调用边界没有改变对话身份。
      en: The logical interaction context and element order remain continuous; model-call boundaries do not change dialogue identity.
      ja: logical interaction contextとelement順序が連続しmodel-call境界でdialogue identityは変わりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-conversation-005
  - id: Conversation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 会话边界例
      en: "Boundary case: Conversation"
      ja: 会話境界例
    scenario_id: null
    descriptions:
      zh: runtime-session-042 只记录一次执行的开始、暂停和结束，没有对话元素序列。
      en: runtime-session-042 records one execution's start, pause, and end but has no ordered dialogue elements.
      ja: runtime-session-042 は一実行のstart/pause/endだけを記録しordered dialogue elementを持ちません。
    field_values: {}
    related_node_ids:
      - Conversation
    related_relation_ids: []
    expected_result:
      zh: 不得识别为 Conversation；它属于运行系统。
      en: Do not identify it as Conversation; it belongs to the runtime system.
      ja: Conversationとせずruntime systemに属します。
    why_valid_or_invalid:
      zh: 执行生命周期不能替代由会话身份和元素顺序定义的对话边界。
      en: An execution lifecycle cannot substitute for a dialogue boundary defined by conversation identity and element order.
      ja: execution lifecycleはconversation identityとelement順序で定義するdialogue境界を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-conversation-006
