schema: moonweave.ai/ontology-node/v1
id: HttpEntityTag
kind: concept
status: accepted
labels:
  zh: HTTP ETag 字段
  en: HTTP ETag Field
  ja: HTTP ETag フィールド
semantics:
  short_definition:
    zh: RFC 9110 ETag 字段中绑定到所选 HTTP 表示的不可解析验证器记录。
    en: A record of an opaque validator from the RFC 9110 ETag field bound to a selected HTTP representation.
    ja: 選択された HTTP 表現に束縛された RFC 9110 ETag フィールドの不透明なバリデーター記録。
  definition:
    zh: HttpEntityTag 记录 RFC 9110 定义的 ETag：用于比较所选表示的不可解析验证器，并明确其强或弱形式。它绑定到一个已区分的所选表示，因为内容协商可能使同一资源 URI 的多个表示具有不同验证器；它不是来源版本、发布者修订、字节摘要、响应正文、访问授权或跨表示的恒定标识。
    en: 'HttpEntityTag records the RFC 9110 ETag: an opaque validator used to compare a selected representation and explicitly classified as strong or weak. It binds to a distinguished selected representation because content negotiation can give multiple representations of one resource URI different validators; it is not a source version, publisher revision, byte digest, response body, access authorization, or invariant identifier across representations.'
    ja: HttpEntityTag は、選択表現を比較するために用いられ、strong または weak として明示的に分類される RFC 9110 ETag の不透明なバリデーターを記録します。内容ネゴシエーションにより一つのリソース URI の複数表現が異なるバリデーターを持ち得るため、区別された選択表現に束縛します。ソース版、発行者改訂、バイトダイジェスト、応答本文、アクセス認可、または表現をまたぐ不変識別子ではありません。
  why_needed:
    zh: HTTP 缓存和条件请求需要在正确的所选表示上下文中处理验证器。显式记录强弱形式和表示标识可防止把 ETag 文本提升为来源版本，或把语言、编码等协商变体误认为同一表示。
    en: HTTP caching and conditional requests need validators to be handled in the correct selected-representation context. Recording strength and representation identifier explicitly prevents an ETag string from being promoted to a source version or negotiated variants by language or encoding from being mistaken for one representation.
    ja: HTTP キャッシュおよび条件付きリクエストでは、正しい選択表現の文脈でバリデーターを扱う必要があります。strong と weak の形式および表現識別子を明示的に記録することで、ETag 文字列がソース版に昇格したり、言語または符号化によるネゴシエーション変種が一つの表現と誤認されたりすることを防ぎます。
  includes:
    - zh: 所选表示标识、带引号的 ETag 值，以及其 strong 或 weak 验证器形式。
      en: Selected-representation identifier, quoted ETag value, and its strong or weak validator form.
      ja: 選択表現識別子、引用符付き ETag 値、および strong または weak のバリデーター形式。
  excludes:
    - zh: 发布者版本标签、来源修订 URI、HTTP Content-Digest 或 Repr-Digest、响应正文、凭据和不同所选表示间的相等性承诺。
      en: Publisher version labels, source revision URIs, HTTP Content-Digest or Repr-Digest, response body, credentials, and equality guarantees across different selected representations.
      ja: 発行者版ラベル、ソース改訂 URI、HTTP Content-Digest または Repr-Digest、応答本文、資格情報、異なる選択表現間の等価性保証。
  semantic_kind: information
  aliases:
    - etag-validator
    - selected-representation-validator
engineering:
  explanation:
    zh: 在 HTTP 响应字段解析边界接收 selected_representation_identifier、entity_tag 和 validator_strength。实现必须将 ETag 作为不可解析字符串保留，验证 weak 形式使用 W/ 前缀而 strong 形式不使用该前缀，并把它绑定到一个明确的所选表示。不得将标签解析为来源修订、将弱验证器当作强验证器，或从一个协商变体推断另一个变体的标签。
    en: At the HTTP response-field parsing boundary, accept selected_representation_identifier, entity_tag, and validator_strength. An implementation must preserve ETag as an opaque string, validate that weak form uses the W/ prefix and strong form does not, and bind it to one explicit selected representation. It must not parse the tag as a source revision, treat a weak validator as strong, or infer another negotiated variant's tag from one variant.
    ja: HTTP 応答フィールド解析境界では selected_representation_identifier、entity_tag、validator_strength を受け取ります。実装は ETag を不透明な文字列として保持し、weak 形式が W/ 接頭辞を使用し strong 形式が使用しないことを検証し、一つの明示的な選択表現に束縛します。タグをソース改訂として解析したり、weak バリデーターを strong として扱ったり、一つの変種から別のネゴシエーション変種のタグを推論したりしてはなりません。
  typical_input:
    - description:
        zh: 绑定英语所选表示的 strong ETag header
        en: Strong ETag header bound to the English selected representation
        ja: 英語選択表現に束縛された strong ETag header
      format: 'ETag: "en-v42"'
      source_claims:
        - claim-rfc9110-entity-tag-validator
  typical_output:
    - description:
        zh: 不含响应正文或来源版本结论的所选表示验证器记录
        en: Selected-representation validator record without response body or source-version conclusion
        ja: 応答本文またはソース版の結論を含まない選択表現バリデーター記録
      format: '{"selected_representation_identifier":"https://example.org/spec#language-en","entity_tag":"\"en-v42\"","validator_strength":"strong"}'
      source_claims:
        - claim-rfc9110-entity-tag-validator
  reference_implementations:
    - name: RFC 9110 ETag field
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Defines ETag as a validator for selected representations and specifies strong and weak comparison forms.
structure:
  identity_keys:
    - selected_representation_identifier
    - entity_tag
    - validator_strength
  fields:
    - id: selected_representation_identifier
      labels:
        zh: 所选表示标识
        en: Selected representation identifier
        ja: 選択表現識別子
      definitions:
        zh: 调用方用于区分该 ETag 所验证的所选 HTTP 表示的本地或外部标识。
        en: Local or external identifier used by the caller to distinguish the selected HTTP representation validated by this ETag.
        ja: この ETag が検証する選択 HTTP 表現を区別するために呼び出し側が用いるローカルまたは外部識別子。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://example.org/spec#language-en
      allowed_values: []
      source_claims:
        - claim-rfc9110-entity-tag-validator
        - claim-rfc9110-selected-representation-boundary
    - id: entity_tag
      labels:
        zh: 实体标签值
        en: Entity-tag value
        ja: エンティティタグ値
      definitions:
        zh: 从 ETag 字段取得、按 HTTP 语义保留为不可解析的带引号标签字符串。
        en: Quoted tag string obtained from the ETag field and retained as opaque under HTTP semantics.
        ja: ETag フィールドから取得し、HTTP 意味論の下で不透明なものとして保持される引用符付きタグ文字列。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '"en-v42"'
      allowed_values: []
      source_claims:
        - claim-rfc9110-entity-tag-validator
    - id: validator_strength
      labels:
        zh: 验证器强度
        en: Validator strength
        ja: バリデーター強度
      definitions:
        zh: 声明 entity_tag 使用 strong 还是 weak 比较形式的本地分类。
        en: Local classification declaring whether entity_tag uses strong or weak comparison form.
        ja: entity_tag が strong または weak の比較形式を使用するかを宣言するローカル分類。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: strong
      allowed_values:
        - strong
        - weak
      source_claims:
        - claim-rfc9110-entity-tag-validator
  constraints:
    - id: http-entity-tag-requires-selected-representation-and-strength-match
      severity: error
      expression_language: plain
      expression: selected_representation_identifier, entity_tag, and validator_strength must be present; a strong tag must be quoted without a W/ prefix, a weak tag must use the W/ prefix, and the tag must remain an opaque validator for the identified selected representation rather than a source revision, digest, or cross-variant equality claim.
      explanation:
        zh: ETag 的比较语义取决于强弱形式和所选表示。标签文本本身不提供发布者版本或不同协商表示相等的证据。
        en: ETag comparison semantics depend on strength form and selected representation. The tag text itself does not provide evidence of a publisher version or equality of differently negotiated representations.
        ja: ETag の比較意味論は strong と weak の形式および選択表現に依存します。タグ文字列自体は、発行者版または異なるネゴシエーション表現の等価性の根拠を提供しません。
      source_claims:
        - claim-rfc9110-entity-tag-validator
        - claim-rfc9110-selected-representation-boundary
        - claim-local-etag-selected-representation-binding
        - claim-local-etag-selected-representation-binding
  required_relations: []
