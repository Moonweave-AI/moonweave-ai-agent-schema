parent_relation: null
relations: []
sources:
  - id: rfc9110
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: official-standard
    relevance: Defines ETag as a selected-representation validator and specifies weak and strong comparison semantics.
source_claims:
  - id: claim-rfc9110-entity-tag-validator
    source: rfc9110
    supports: RFC 9110 defines ETag as an opaque validator for a selected representation and specifies weak entity tags with W/ prefix alongside strong and weak comparison semantics.
    locator: Section 8.8.3 ETag
    evidence_kind: official-standard
    confidence: high
  - id: claim-rfc9110-selected-representation-boundary
    source: rfc9110
    supports: RFC 9110 defines validators in relation to selected representations.
    locator: Sections 8.8 and 8.8.3
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-etag-selected-representation-binding
    source: rfc9110
    supports: HttpEntityTag binds an entity tag to an explicit selected-representation identifier and does not infer equality across negotiated variants; this is a local ontology record constraint.
    locator: Sections 8.8 and 8.8.3
    evidence_kind: design-inference
    confidence: high

