schema: moonweave.ai/ontology-node/v1
id: HttpReprDigest
kind: concept
status: accepted
labels:
  zh: HTTP Repr-Digest 字段
  en: HTTP Repr-Digest Field
  ja: HTTP Repr-Digest フィールド
semantics:
  short_definition:
    zh: RFC 9530 Repr-Digest HTTP 字段的完整性信息对象，用于整个所选表示数据。
    en: An integrity-information object for the RFC 9530 Repr-Digest HTTP field over entire selected representation data.
    ja: 選択表現データ全体に対する RFC 9530 Repr-Digest HTTP フィールドの完全性情報オブジェクト。
  definition:
    zh: HttpReprDigest 记录 RFC 9530 定义的 Repr-Digest 字段：一个 HTTP Structured Fields Dictionary，其成员将摘要算法名称映射到整个所选表示数据的字节序列摘要值。它覆盖完整选定表示，而不是 Content-Digest 的实际 HTTP 消息内容、局部字节范围、通用文件摘要、来源版本、ETag、响应正文或访问授权。
    en: 'HttpReprDigest records the RFC 9530 Repr-Digest field: an HTTP Structured Fields Dictionary whose members map digest-algorithm names to byte-sequence digest values for entire selected representation data. It covers the complete selected representation rather than Content-Digest''s actual HTTP message content, a partial byte range, a general file digest, source version, ETag, response body, or access authorization.'
    ja: HttpReprDigest は、ダイジェストアルゴリズム名を選択表現データ全体のバイト列ダイジェスト値へ対応付ける HTTP Structured Fields Dictionary である RFC 9530 の Repr-Digest フィールドを記録します。完全な選択表現を対象とし、Content-Digest の実際の HTTP メッセージ内容、部分バイト範囲、一般的なファイルダイジェスト、ソース版、ETag、応答本文、アクセス認可ではありません。
  why_needed:
    zh: 内容协商或传输变换可能使实际 HTTP 消息内容与所选表示数据不同。保留 Repr-Digest 的字段名称、Dictionary 形状和完整表示绑定，可避免把两种 HTTP 完整性范围合并为一个本地标签。
    en: Content negotiation or transfer transformations can make actual HTTP message content differ from selected representation data. Preserving Repr-Digest's field name, Dictionary shape, and complete-representation binding avoids merging the two HTTP integrity scopes into one local label.
    ja: 内容ネゴシエーションまたは転送変換により、実際の HTTP メッセージ内容が選択表現データと異なることがあります。Repr-Digest のフィールド名、Dictionary 形状、完全表現への束縛を保持することで、二つの HTTP 完全性範囲を一つのローカルラベルへ統合することを防ぎます。
  includes:
    - zh: 所选表示标识、header 或 trailer 位置，以及包含一个或多个算法成员的 Repr-Digest Dictionary。
      en: Selected-representation identifier, header or trailer location, and a Repr-Digest Dictionary with one or more algorithm members.
      ja: 選択表現識別子、header または trailer の位置、および一つ以上のアルゴリズムメンバーを持つ Repr-Digest Dictionary。
  excludes:
    - zh: Content-Digest 的消息内容范围、局部字节范围、文件字节摘要、HTTP 响应正文、ETag、签名、来源修订和认证信息。
      en: Content-Digest message-content scope, partial byte ranges, file-byte digest, HTTP response body, ETag, signature, source revision, and authentication information.
      ja: Content-Digest のメッセージ内容範囲、部分バイト範囲、ファイルバイトダイジェスト、HTTP 応答本文、ETag、署名、ソース改訂、認証情報。
  semantic_kind: information
  aliases:
    - Repr-Digest
    - HTTP Repr-Digest field
    - repr-digest-field
engineering:
  explanation:
    zh: 在 HTTP 字段解析边界接收 selected_representation_identifier、field_location 和 digest_members。实现必须将 Repr-Digest 解析为 Structured Fields Dictionary，保留全部成员并绑定整个所选表示数据；它不能使用 Content-Digest、文件哈希或仅覆盖局部范围的摘要替代。
    en: At the HTTP field-parsing boundary, accept selected_representation_identifier, field_location, and digest_members. An implementation must parse Repr-Digest as a Structured Fields Dictionary, preserve all members, and bind it to the entire selected representation data; it cannot substitute Content-Digest, a file hash, or a digest covering only a partial range.
    ja: HTTP フィールド解析境界では selected_representation_identifier、field_location、digest_members を受け取ります。実装は Repr-Digest を Structured Fields Dictionary として解析し、すべてのメンバーを保持して選択表現データ全体に束縛します。Content-Digest、ファイルハッシュ、部分範囲だけを対象とするダイジェストで代替できません。
  typical_input:
    - description:
        zh: HTTP trailer 中含两个算法成员的 Repr-Digest 字段
        en: Repr-Digest trailer field with two algorithm members
        ja: 二つのアルゴリズムメンバーを持つ Repr-Digest trailer フィールド
      format: 'Repr-Digest: sha-256=:YWJj:, sha-512=:ZGVm:'
      source_claims:
        - claim-rfc9530-repr-digest-field
  typical_output:
    - description:
        zh: 不含表示正文的完整所选表示摘要字段对象
        en: Entire-selected-representation digest field object without representation body
        ja: 表現本文を含まない選択表現全体ダイジェストフィールドオブジェクト
      format: '{"selected_representation_identifier":"https://example.org/spec#language-en","field_location":"trailer","digest_members":{"sha-256":":YWJj:","sha-512":":ZGVm:"}}'
      source_claims:
        - claim-rfc9530-repr-digest-field
  reference_implementations:
    - name: RFC 9530 Repr-Digest field
      url: https://www.rfc-editor.org/rfc/rfc9530.html
      description: Defines Repr-Digest as an HTTP Structured Fields Dictionary for entire selected representation data.
structure:
  identity_keys:
    - selected_representation_identifier
    - field_location
    - digest_members
  fields:
    - id: selected_representation_identifier
      labels:
        zh: 所选表示标识
        en: Selected representation identifier
        ja: 選択表現識別子
      definitions:
        zh: 调用方用于区分 Repr-Digest 所覆盖完整所选表示数据的本地或外部标识。
        en: Local or external identifier used by the caller to distinguish the entire selected representation data covered by Repr-Digest.
        ja: Repr-Digest が対象とする選択表現データ全体を区別するために呼び出し側が用いるローカルまたは外部識別子。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://example.org/spec#language-en
      allowed_values: []
      source_claims:
        - claim-rfc9530-repr-digest-field
    - id: field_location
      labels:
        zh: 字段位置
        en: Field location
        ja: フィールド位置
      definitions:
        zh: Repr-Digest 在该 HTTP 消息中出现于 header 还是 trailer 的位置。
        en: Location at which Repr-Digest appears in the HTTP message as a header or trailer.
        ja: Repr-Digest が HTTP メッセージ内で header または trailer として現れる位置。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: trailer
      allowed_values:
        - header
        - trailer
      source_claims:
        - claim-rfc9530-repr-digest-field
    - id: digest_members
      labels:
        zh: 摘要成员字典
        en: Digest-member dictionary
        ja: ダイジェストメンバー辞書
      definitions:
        zh: 以算法名称为键、以 HTTP Structured Fields 字节序列值为值的非空 Repr-Digest Dictionary。
        en: Nonempty Repr-Digest Dictionary keyed by algorithm name with HTTP Structured Fields byte-sequence values.
        ja: アルゴリズム名をキー、HTTP Structured Fields のバイト列値を値とする空でない Repr-Digest Dictionary。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        sha-256: ':YWJj:'
        sha-512: ':ZGVm:'
      allowed_values: []
      source_claims:
        - claim-rfc9530-repr-digest-field
  constraints:
    - id: http-repr-digest-requires-complete-representation-dictionary
      severity: error
      expression_language: plain
      expression: selected_representation_identifier, field_location, and digest_members must be present; field_location must be header or trailer; digest_members must contain one or more algorithm-name keys with Structured Fields byte-sequence values and must describe entire selected representation data rather than actual HTTP message content, a partial byte range, or a response body.
      explanation:
        zh: RFC 9530 的 Repr-Digest 是协议字段 Dictionary，完整性语义绑定整个所选表示数据。它不能被降格为无范围的通用校验字符串。
        en: RFC 9530 Repr-Digest is a protocol-field Dictionary whose integrity semantics bind entire selected representation data. It cannot be reduced to an unscoped general checksum string.
        ja: RFC 9530 の Repr-Digest は、完全性意味論が選択表現データ全体に束縛されるプロトコルフィールド Dictionary です。範囲のない一般的なチェックサム文字列へ縮小できません。
      source_claims:
        - claim-rfc9530-repr-digest-field
        - claim-local-http-repr-digest-record-projection
        - claim-local-http-repr-digest-record-projection
  required_relations: []
