parent_relation: null
relations: []
sources:
  - id: rfc9530
    title: RFC 9530 Digest Fields
    url: https://www.rfc-editor.org/rfc/rfc9530.html
    source_type: official-standard
    relevance: Defines Content-Digest and Repr-Digest HTTP fields as Structured Fields Dictionaries for different covered data.
source_claims:
  - id: claim-rfc9530-repr-digest-field
    source: rfc9530
    supports: RFC 9530 defines Repr-Digest as an HTTP Structured Fields Dictionary whose members provide digest values for entire selected representation data.
    locator: Sections 1.2 and 3
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-http-repr-digest-record-projection
    source: rfc9530
    supports: Moonweave's selected_representation_identifier, field_location, and digest_members record is a local projection of the RFC 9530 Repr-Digest field; it retains the field location and dictionary members without claiming that this JSON shape is an RFC serialization.
    locator: Sections 1.2 and 3
    evidence_kind: design-inference
    confidence: high

