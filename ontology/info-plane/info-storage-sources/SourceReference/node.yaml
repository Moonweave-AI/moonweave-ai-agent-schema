schema: moonweave.ai/ontology-node/v1
id: SourceReference
kind: concept
labels:
  zh: 来源引用
  en: source reference
  ja: 出典参照
semantics:
  short_definition:
    zh: 指向可识别对象而不复制其正文的稳定引用记录根。
    en: Root stable reference record pointing at an identifiable object without copying its body.
    ja: identifiable object を指し本文を複製しない stable reference record root。
  definition:
    zh: SourceReference 是模块唯一根，通过 reference_id 与分类子类（ResourceReference、RecordReference、GovernanceReference）表达 pointer 与 locator；对应 MCP resource URI、RAG document source、A2A FilePart uri 与 OpenAI/Anthropic 消息附件来源。被引用正文与 read activity 归其他模块。
    en: SourceReference is the module root using reference_id and subclasses (ResourceReference, RecordReference, GovernanceReference) for pointer and locator—mapping MCP resource URIs, RAG document sources, A2A FilePart uri, and OpenAI/Anthropic message attachment provenance. Referent bodies and read activities belong elsewhere.
    ja: SourceReference は pointer/locator root。MCP URI/RAG source/A2A attachment に写像。
  why_needed:
    zh: 没有这一根节点，文件路径、数据库键、图节点键和治理对象键会被误作同一种位置值，也无法统一表达引用与被引用对象的身份分离。
    en: Without this root, file paths, database keys, graph-node keys, and governance-object keys collapse into one kind of location value, and reference identity cannot be kept separate from referent identity.
    ja: この根がないと file path、database key、graph node key、governance object key が同じ location value に潰れ、参照と参照先の同一性も分離できません。
  includes:
    - zh: 具有独立 reference_id 且可解析为一个资源、记录或治理对象的引用记录。
      en: Reference records with an independent reference_id that resolve to a resource, record, or governance object.
      ja: 独立 reference_id を持ち、resource・record・governance object に解決する参照記録。
  excludes:
    - zh: 来源对象本身、对象中的坐标范围、抓取动作以及仅供显示的标题或媒体类型。
      en: The source object itself, a coordinate range inside it, retrieval activity, and display-only titles or media types.
      ja: 出典対象そのもの、内部座標範囲、取得 activity、表示だけの title や media type。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: MCP resources/read 用 uri；A2A FilePart 用 name/mimeType/uri；RAG 用 document_id+span+digest 组合。引用节点不得注册为 referent 正文 identity。
    en: MCP resources/read uses uri; A2A FilePart uses name/mimeType/uri; RAG combines document_id+span+digest. Reference nodes must not register as referent body identity.
    ja: uri/name/span/digest 组合。
  typical_input:
    - description: MCP resources/read
      format: '{"method":"resources/read","params":{"uri":"file:///workspace/docs/onboarding.md"}}'
      source_claims:
        - claim-source-ref-mcp
  typical_output:
    - description: SourceReference projection
      format: '{"source_reference_id":"source-ref-mcp-onboarding-md","most_specific_class":"FileResourceReference","resource_uri":"file:///workspace/docs/onboarding.md"}'
      source_claims:
        - claim-source-ref-design
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - reference_id
  fields:
    - id: reference_id
      labels:
        zh: 引用记录标识
        en: reference record ID
        ja: 参照記録 ID
      definitions:
        zh: 唯一标识引用记录，而非被引用对象。
        en: Uniquely identifies the reference record rather than the referent.
        ja: 参照先ではなく参照記録を一意に識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: src-ref-42
      allowed_values: []
      source_claims:
        - claim-source-reference-002
    - id: reference_value
      labels:
        zh: 引用值
        en: reference value
        ja: 参照値
      definitions:
        zh: 保存按引用类别解释的 URI、路径或业务键。
        en: Carries the URI, path, or business key interpreted according to the reference category.
        ja: 参照カテゴリに従って解釈する URI・path・business key を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://example.org/manual
      allowed_values: []
      source_claims:
        - claim-source-reference-003
  constraints: []
  required_relations: []
examples:
  - id: SourceReference-example-mcp
    labels:
      zh: MCP 资源引用
      en: MCP resource reference
      ja: MCP resource 参照
    descriptions:
      zh: source-ref-mcp-onboarding-md 指向 file:///workspace/docs/onboarding.md。
      en: source-ref-mcp-onboarding-md points to file:///workspace/docs/onboarding.md.
      ja: MCP URI reference。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/read
    field_values:
      source_reference_id: source-ref-mcp-onboarding-md
    related_node_ids:
      - SourceReference
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-source-ref-mcp
  - id: SourceReference-example-a2a-file
    labels:
      zh: A2A 附件引用
      en: A2A attachment reference
      ja: A2A 添付参照
    descriptions:
      zh: FileResourceReference 保存 invoice-104.pdf uri 不复制 bytes。
      en: FileResourceReference stores invoice-104.pdf uri without copying bytes.
      ja: A2A file uri。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: FilePart
    field_values: {}
    related_node_ids:
      - SourceReference
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-source-ref-a2a
  - id: SourceReference-example-not-body
    labels:
      zh: 非正文
      en: Not body content
      ja: 本文ではない
    descriptions:
      zh: SourceReference 不得作为被引用 Markdown 正文的 canonical identity。
      en: SourceReference must not be canonical identity of referenced Markdown body.
      ja: pointer≠payload。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceReference
    related_relation_ids: []
    source_claims:
      - claim-source-ref-design
parent_relation: null
relations:
  - id: SourceReference-governed_by-GovernanceReference
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受治理对象约束
      en: governed by
      ja: ガバナンス対象に統治される
    definitions:
      zh: 来源引用受治理对象约束关系把引用记录连接到决定其数据处置或信任范围的 GovernanceReference；该边不等于授权或边界穿越。
      en: SourceReference governed_by GovernanceReference links a reference record to the GovernanceReference determining its data-handling or trust scope; the edge is neither an authorization nor a boundary crossing.
      ja: SourceReference governed_by GovernanceReference は reference record を data-handling/trust scope を決める GovernanceReference に結び、この edge は authorization/boundary crossing ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_governed_by
      labels:
        zh: 反向：受治理对象约束
        en: inverse of governed by
        ja: 逆：ガバナンス対象に統治される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SourceReference-governed_by-GovernanceReference-example-positive-manual-001
        labels:
          zh: SourceReference-governed_by-GovernanceReference正例
          en: SourceReference-governed_by-GovernanceReference positive case
          ja: SourceReference-governed_by-GovernanceReference正例
        descriptions:
          zh: src-ref-customer-export 连接 restricted-eu DataZoneReference。
          en: src-ref-customer-export links to the restricted-eu DataZoneReference.
          ja: src-ref-customer-export は restricted-eu DataZoneReference に接続します。
        field_values: {}
        related_node_ids:
          - SourceReference
          - GovernanceReference
        related_relation_ids:
          - SourceReference-governed_by-GovernanceReference
        source_claims:
          - claim-source-reference-007
      - id: SourceReference-governed_by-GovernanceReference-example-boundary-manual-001
        labels:
          zh: SourceReference-governed_by-GovernanceReference边界例
          en: SourceReference-governed_by-GovernanceReference boundary case
          ja: SourceReference-governed_by-GovernanceReference境界例
        descriptions:
          zh: 来源带 classification=restricted 标签，但没有治理对象引用。
          en: A source carries classification=restricted but has no governance-object reference.
          ja: source は classification=restricted label を持つが governance-object reference がありません。
        field_values: {}
        related_node_ids:
          - SourceReference
          - GovernanceReference
        related_relation_ids:
          - SourceReference-governed_by-GovernanceReference
        source_claims:
          - claim-source-reference-008
    source_claims:
      - claim-source-reference-009
    layout_role: cross-link
    target: concept:GovernanceReference
sources:
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
  - id: src-a2a-file
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: FilePart attachment provenance with uri or bytes.
  - id: src-prov-o
    title: PROV-O — The PROV Ontology
    publisher: W3C
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Entity, location, and provenance separation.
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-reference-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C separates a SpecificResource from its source and requires exactly one source relationship; Moonweave applies that identity separation to SourceReference.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and requires exactly one source relationship; Moonweave applies that identity separation to SourceReference. For SourceReference.reference_id, the field records this reviewed value: Uniquely identifies the reference record rather than the referent."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and requires exactly one source relationship; Moonweave applies that identity separation to SourceReference. For SourceReference.reference_value, the field records this reviewed value: Carries the URI, path, or business key interpreted according to the reference category."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-004
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and requires exactly one source relationship; Moonweave applies that identity separation to SourceReference. This evidence supports the manually reviewed positive case for SourceReference: Record src-ref-42 points to an external runbook by URI while the document owner still owns its content."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-005
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and requires exactly one source relationship; Moonweave applies that identity separation to SourceReference. This evidence supports the manually reviewed instance case for SourceReference: An event stores reference_id=src-ref-42 and reference_value=https://example.org/manual."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and requires exactly one source relationship; Moonweave applies that identity separation to SourceReference. This evidence supports the manually reviewed boundary case for SourceReference: A cache stores the full runbook content and ingestion state but has no independent reference_id."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-007
    source: eng-security-cisa-zero-trust-maturity-v2
    supports: "CISA's Data pillar requires data inventory, categorization, labeling, and lifecycle governance; Moonweave connects a source reference to the governing scope explicitly. This evidence supports the manually reviewed positive case for SourceReference-governed_by-GovernanceReference: src-ref-customer-export links to the restricted-eu DataZoneReference."
    locator: CISA Zero Trust Maturity Model v2 §5 and Table 6, Data pillar
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-008
    source: eng-security-cisa-zero-trust-maturity-v2
    supports: "CISA's Data pillar requires data inventory, categorization, labeling, and lifecycle governance; Moonweave connects a source reference to the governing scope explicitly. This evidence supports the manually reviewed boundary case for SourceReference-governed_by-GovernanceReference: A source carries classification=restricted but has no governance-object reference."
    locator: CISA Zero Trust Maturity Model v2 §5 and Table 6, Data pillar
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-reference-009
    source: eng-security-cisa-zero-trust-maturity-v2
    supports: CISA's Data pillar requires data inventory, categorization, labeling, and lifecycle governance; Moonweave connects a source reference to the governing scope explicitly.
    locator: CISA Zero Trust Maturity Model v2 §5 and Table 6, Data pillar
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-ref-mcp
    source: src-mcp-resources
    supports: MCP resources/read fetches by URI returning contents with uri and mimeType.
    locator: resources/read
    evidence_kind: primary-spec
    confidence: high
  - id: claim-source-ref-a2a
    source: src-a2a-file
    supports: A2A FilePart provides uri provenance for attachments.
    locator: FilePart
    evidence_kind: primary-spec
    confidence: high
  - id: claim-source-ref-design
    source: src-info-sources-design
    supports: SourceReference records pointer/locator separate from referent content.
    locator: SourceReference root
    evidence_kind: design-inference
    confidence: high
