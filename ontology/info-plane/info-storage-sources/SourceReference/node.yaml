schema: moonweave.ai/ontology-node/v1
id: SourceReference
kind: concept
status: accepted
labels:
  zh: 来源引用
  en: source reference
  ja: 出典参照
semantics:
  short_definition:
    zh: 指向来源对象而不复制该对象的稳定引用记录。
    en: A stable record that points to a source object without copying it.
    ja: 出典対象を複製せず指し示す安定参照記録。
  definition:
    zh: 来源引用是一种信息记录，以自身的引用标识和引用值指向另一个可识别对象；它保存的是如何确认 referent，而不是 referent 的正文、运行生命周期或业务所有权。
    en: SourceReference is an information record whose own reference identifier and reference value identify another object; it records how to recognize the referent, not the referent's content, runtime lifecycle, or business ownership.
    ja: SourceReference は自身の参照 ID と参照値で別の対象を識別する情報記録であり、referent の本文・実行ライフサイクル・業務所有権を保持するものではありません。
  why_needed:
    zh: 没有这一根节点，文件路径、数据库键、图节点键和治理对象键会被误作同一种位置值，也无法统一表达引用与被引用对象的身份分离。
    en: Without this root, file paths, database keys, graph-node keys, and governance-object keys collapse into one kind of location value, and reference identity cannot be kept separate from referent identity.
    ja: この根がないと file path、database key、graph node key、governance object key が同じ location value に潰れ、参照と参照先の同一性も分離できません。
  includes:
    - zh: 具有独立 reference_id 且可解析为一个资源、记录或治理对象的引用记录。
      en: Reference records with an independent reference_id that resolve to a resource, record, or governance object.
      ja: 独立 reference_id を持ち、resource・record・governance object に解決する参照記録。
  excludes:
    - zh: 来源对象本身、对象中的坐标范围、抓取动作以及仅供显示的标题或媒体类型。
      en: The source object itself, a coordinate range inside it, retrieval activity, and display-only titles or media types.
      ja: 出典対象そのもの、内部座標範囲、取得 activity、表示だけの title や media type。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - reference_id
  fields:
    - id: reference_id
      labels:
        zh: 引用记录标识
        en: reference record ID
        ja: 参照記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识引用记录，而非被引用对象。
        en: Uniquely identifies the reference record rather than the referent.
        ja: 参照先ではなく参照記録を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: src-ref-42
      source_claims:
        - claim-source-reference-002
    - id: reference_value
      labels:
        zh: 引用值
        en: reference value
        ja: 参照値
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存按引用类别解释的 URI、路径或业务键。
        en: Carries the URI, path, or business key interpreted according to the reference category.
        ja: 参照カテゴリに従って解釈する URI・path・business key を保持します。
      allowed_values: []
      pattern: null
      example_value: https://example.org/manual
      source_claims:
        - claim-source-reference-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源引用正例
      en: source reference positive case
      ja: 出典参照正例
    scenario_id: null
    descriptions:
      zh: 记录 src-ref-42 以 URI 指向外部操作手册，同时正文仍由文档 owner 管理。
      en: Record src-ref-42 points to an external runbook by URI while the document owner still owns its content.
      ja: 記録 src-ref-42 は URI で外部 runbook を指し、本文は document owner が保持します。
    field_values:
      reference_id: src-ref-42
      reference_value: https://example.org/manual
    related_node_ids:
      - SourceReference
      - SourceIdentity
    related_relation_ids:
      - SourceReference-has_identity-SourceIdentity
    expected_result:
      zh: SourceReference 保持其已审查身份，并按定义解释 SourceReference-has_identity-SourceIdentity。
      en: Retain the reviewed identity of SourceReference and interpret SourceReference-has_identity-SourceIdentity exactly as defined.
      ja: SourceReference の reviewed identity を保持し SourceReference-has_identity-SourceIdentity を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用记录与来源对象保持两个身份。
      en: The reference record and source object remain two identities.
      ja: 参照記録と出典対象は二つの同一性を保ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-reference-004
  - id: SourceReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源引用实例
      en: source reference instance case
      ja: 出典参照実例
    scenario_id: null
    descriptions:
      zh: 一个事件保存 reference_id=src-ref-42 与 reference_value=https://example.org/manual。
      en: An event stores reference_id=src-ref-42 and reference_value=https://example.org/manual.
      ja: event が reference_id=src-ref-42 と reference_value=https://example.org/manual を保存します。
    field_values:
      reference_id: src-ref-42
      reference_value: https://example.org/manual
    related_node_ids:
      - SourceReference
      - SourceIdentity
    related_relation_ids:
      - SourceReference-has_identity-SourceIdentity
    expected_result:
      zh: SourceReference 保持其已审查身份，并按定义解释 SourceReference-has_identity-SourceIdentity。
      en: Retain the reviewed identity of SourceReference and interpret SourceReference-has_identity-SourceIdentity exactly as defined.
      ja: SourceReference の reviewed identity を保持し SourceReference-has_identity-SourceIdentity を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 可用引用标识复用该指向而不复制文档。
      en: The pointer can be reused by reference ID without copying the document.
      ja: 文書を複製せず reference ID で指し示しを再利用できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-reference-005
  - id: SourceReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源引用边界例
      en: source reference boundary case
      ja: 出典参照境界例
    scenario_id: null
    descriptions:
      zh: 缓存中保存了整份手册正文和摄入状态，但没有独立 reference_id。
      en: A cache stores the full runbook content and ingestion state but has no independent reference_id.
      ja: cache は runbook 全文と ingestion state を持つが独立 reference_id はありません。
    field_values:
      embedded_content: full runbook body with ingestion state
    related_node_ids:
      - SourceReference
      - SourceIdentity
    related_relation_ids:
      - SourceReference-has_identity-SourceIdentity
    expected_result:
      zh: 不把该对象归入 SourceReference，也不凭邻近或词形推断 SourceReference-has_identity-SourceIdentity。
      en: Do not classify the object as SourceReference or infer SourceReference-has_identity-SourceIdentity from proximity or lexical form.
      ja: object を SourceReference に分類せず proximity/lexical form から SourceReference-has_identity-SourceIdentity を推論しません。
    why_valid_or_invalid:
      zh: 这是摄入内容实体，不是来源引用记录。
      en: This is an ingested content entity, not a source reference record.
      ja: これは取込 content entity であり source reference record ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-reference-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: SourceReference-governed_by-GovernanceReference
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受治理对象约束
      en: governed by
      ja: ガバナンス対象に統治される
    definitions:
      zh: 来源引用受治理对象约束关系把引用记录连接到决定其数据处置或信任范围的 GovernanceReference；该边不等于授权或边界穿越。
      en: SourceReference governed_by GovernanceReference links a reference record to the GovernanceReference determining its data-handling or trust scope; the edge is neither an authorization nor a boundary crossing.
      ja: SourceReference governed_by GovernanceReference は reference record を data-handling/trust scope を決める GovernanceReference に結び、この edge は authorization/boundary crossing ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_governed_by
      labels:
        zh: 反向：受治理对象约束
        en: inverse of governed by
        ja: 逆：ガバナンス対象に統治される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SourceReference-governed_by-GovernanceReference-example-positive-manual-001
        kind: positive
        labels:
          zh: SourceReference-governed_by-GovernanceReference正例
          en: SourceReference-governed_by-GovernanceReference positive case
          ja: SourceReference-governed_by-GovernanceReference正例
        scenario_id: null
        descriptions:
          zh: src-ref-customer-export 连接 restricted-eu DataZoneReference。
          en: src-ref-customer-export links to the restricted-eu DataZoneReference.
          ja: src-ref-customer-export は restricted-eu DataZoneReference に接続します。
        field_values: {}
        related_node_ids:
          - SourceReference
          - GovernanceReference
        related_relation_ids:
          - SourceReference-governed_by-GovernanceReference
        expected_result:
          zh: 建立 SourceReference —governed_by→ GovernanceReference，并保持该方向与限定条件。
          en: Assert SourceReference —governed_by→ GovernanceReference while preserving its direction and qualifiers.
          ja: SourceReference —governed_by→ GovernanceReference を assertion し direction/qualifier を保持します。
        why_valid_or_invalid:
          zh: 治理引用明确解析到负责处置范围的对象。
          en: The governance reference explicitly resolves to the object responsible for handling scope.
          ja: governance reference は handling scope を担う object に明示解決します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-source-reference-007
      - id: SourceReference-governed_by-GovernanceReference-example-boundary-manual-001
        kind: boundary
        labels:
          zh: SourceReference-governed_by-GovernanceReference边界例
          en: SourceReference-governed_by-GovernanceReference boundary case
          ja: SourceReference-governed_by-GovernanceReference境界例
        scenario_id: null
        descriptions:
          zh: 来源带 classification=restricted 标签，但没有治理对象引用。
          en: A source carries classification=restricted but has no governance-object reference.
          ja: source は classification=restricted label を持つが governance-object reference がありません。
        field_values: {}
        related_node_ids:
          - SourceReference
          - GovernanceReference
        related_relation_ids:
          - SourceReference-governed_by-GovernanceReference
        expected_result:
          zh: 拒绝建立 SourceReference-governed_by-GovernanceReference，两端对象仍保留各自身份。
          en: Reject SourceReference-governed_by-GovernanceReference; both endpoint objects retain their own identities.
          ja: SourceReference-governed_by-GovernanceReference を拒否し両 endpoint object は各 identity を保持します。
        why_valid_or_invalid:
          zh: 标签不足以建立 governed_by 边。
          en: A label is insufficient to establish governed_by.
          ja: label だけでは governed_by edge を確立できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-source-reference-008
    source_claims:
      - claim-source-reference-009
    distinct_fact_rationale:
      zh: SourceReference-governed_by-GovernanceReference 记录 SourceReference 到 GovernanceReference 的单一 governed_by 事实，不能由端点命名、共现或其他边自动替代。
      en: SourceReference-governed_by-GovernanceReference records one governed_by fact from SourceReference to GovernanceReference; endpoint naming, co-occurrence, or another edge cannot substitute for it.
      ja: SourceReference-governed_by-GovernanceReference は SourceReference から GovernanceReference への一 governed_by fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
    layout_role: cross-link
    review_status: accepted
    target: concept:GovernanceReference
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
