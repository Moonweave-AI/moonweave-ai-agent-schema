schema: moonweave.ai/ontology-node/v1
id: DatabaseRowReference
kind: concept
labels:
  zh: 数据库行引用
  en: database row reference
  ja: データベース行参照
semantics:
  short_definition:
    zh: 以库表主键标识单行记录的结构化引用。
    en: Structured reference identifying one row by database table primary key.
    ja: DB table primary key で一行 record を識別する structured reference。
  definition:
    zh: DatabaseRowReference 记录 database_id、relation_name 与 primary_key map；用于 CRM 订单行等结构化 citation，不是 ORM 实体缓存。
    en: DatabaseRowReference records database_id, relation_name, and primary_key map for structured citations like CRM order rows—not ORM entity caches.
    ja: DatabaseRowReference は row pointer。
  why_needed:
    zh: 数据库行需要表范围和键语义；若只保存行号，排序或压缩后引用会漂移并与来源位置混淆。
    en: A database row requires relation scope and key semantics; storing only a row number drifts after sorting or compaction and confuses record identity with source location.
    ja: database row には relation scope と key semantics が必要で、row number だけでは sort・compaction 後に drift して source location と混同します。
  includes:
    - zh: 带 database/schema、relation 与候选键值的行引用。
      en: Row references carrying database or schema, relation, and candidate-key values.
      ja: database/schema・relation・candidate-key value を持つ row reference。
  excludes:
    - zh: 结果集中的第 N 行、整张表资源、SQL 查询文本和已加载的行数据副本。
      en: The Nth row in a result set, the whole table resource, SQL query text, and loaded copies of row data.
      ja: result set の N 行目・table 全体・SQL query text・load 済み row data copy。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: primary_key 字段必须可复核；resource_identifier 可选记录连接 URI。
    en: primary_key fields must be verifiable; resource_identifier optionally records connection URI.
    ja: primary_key 必須。
  typical_input:
    - description: Database row reference
      format: '{"reference_id":"dbrow-crm-orders-7812","database_id":"crm","relation_name":"orders","primary_key":{"order_id":7812}}'
      source_claims:
        - claim-db-row-design
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - relation_name
  fields:
    - id: relation_name
      labels:
        zh: 关系名称
        en: relation name
        ja: 関係名
      definitions:
        zh: 声明候选键所属的表或视图。
        en: Declares the table or view in which the candidate key is interpreted.
        ja: candidate key を解釈する table または view を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: orders
      allowed_values: []
      source_claims:
        - claim-database-row-reference-002
    - id: candidate_key
      labels:
        zh: 候选键
        en: candidate key
        ja: 候補キー
      definitions:
        zh: 保存稳定标识该行的键字段和值。
        en: Carries the key fields and values that stably identify the row.
        ja: row を安定識別する key field と value を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: order_id=7812
      allowed_values: []
      source_claims:
        - claim-database-row-reference-003
  constraints: []
  required_relations: []
examples:
  - id: DatabaseRowReference-example-order
    labels:
      zh: 订单行引用
      en: Order row reference
      ja: order row 参照
    descriptions:
      zh: order_id=7812 在 crm.orders 创建 dbrow-crm-orders-7812。
      en: order_id=7812 in crm.orders creates dbrow-crm-orders-7812.
      ja: CRM order row。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: primary key
    field_values:
      reference_id: dbrow-crm-orders-7812
      primary_key:
        order_id: 7812
    related_node_ids:
      - DatabaseRowReference
    related_relation_ids: []
    source_claims:
      - claim-db-row-design
  - id: DatabaseRowReference-example-composite-key
    labels:
      zh: 复合主键
      en: Composite primary key
      ja: composite primary key
    descriptions:
      zh: 复合 primary_key 所有列必须出现在引用记录中。
      en: All composite primary_key columns must appear in reference record.
      ja: composite key。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: composite
    field_values: {}
    related_node_ids:
      - DatabaseRowReference
    related_relation_ids: []
    source_claims:
      - claim-db-row-design
  - id: DatabaseRowReference-example-not-query-result
    labels:
      zh: 非查询结果正文
      en: Not query result body
      ja: query result 本文ではない
    descriptions:
      zh: SELECT 返回的 JSON 行正文不是 DatabaseRowReference。
      en: JSON row body from SELECT is not DatabaseRowReference.
      ja: pointer≠result body。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DatabaseRowReference
    related_relation_ids: []
    source_claims:
      - claim-db-row-design
parent_relation:
  id: DatabaseRowReference-is_a-RecordReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 数据库行引用是一种记录引用，并以数据库关系范围和候选键值共同确定一行为种差。
    en: DatabaseRowReference is a RecordReference specialized by relation scope and candidate-key values jointly identifying one row.
    ja: DatabaseRowReference は relation scope と candidate-key value で一 row を共同識別する RecordReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DatabaseRowReference-is_a-RecordReference-example-positive-manual-001
      labels:
        zh: DatabaseRowReference-is_a-RecordReference正例
        en: DatabaseRowReference-is_a-RecordReference positive case
        ja: DatabaseRowReference-is_a-RecordReference正例
      descriptions:
        zh: crm.orders 与 order_id=7812 唯一标识一行。
        en: crm.orders and order_id=7812 uniquely identify one row.
        ja: crm.orders と order_id=7812 は一 row を一意識別します。
      field_values: {}
      related_node_ids:
        - DatabaseRowReference
        - RecordReference
      related_relation_ids:
        - DatabaseRowReference-is_a-RecordReference
      source_claims:
        - claim-database-row-reference-009
    - id: DatabaseRowReference-is_a-RecordReference-example-boundary-manual-001
      labels:
        zh: DatabaseRowReference-is_a-RecordReference边界例
        en: DatabaseRowReference-is_a-RecordReference boundary case
        ja: DatabaseRowReference-is_a-RecordReference境界例
      descriptions:
        zh: 排序结果中的第七行随查询顺序变化。
        en: The seventh result row changes when query ordering changes.
        ja: result row 7 は query ordering で変化します。
      field_values: {}
      related_node_ids:
        - DatabaseRowReference
        - RecordReference
      related_relation_ids:
        - DatabaseRowReference-is_a-RecordReference
      source_claims:
        - claim-database-row-reference-010
  source_claims:
    - claim-database-row-reference-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-database-row-reference-001
    source: eng-ont-prov-o
    supports: PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate.
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-002
    source: eng-ont-prov-o
    supports: "PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate. For DatabaseRowReference.relation_name, the field records this reviewed value: Declares the table or view in which the candidate key is interpreted."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-003
    source: eng-ont-prov-o
    supports: "PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate. For DatabaseRowReference.candidate_key, the field records this reviewed value: Carries the key fields and values that stably identify the row."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-004
    source: eng-ont-prov-o
    supports: "PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate. This evidence supports the manually reviewed positive case for DatabaseRowReference: relation_name=orders and candidate_key=order_id=7812 uniquely identify an order row."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-005
    source: eng-ont-prov-o
    supports: "PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate. This evidence supports the manually reviewed instance case for DatabaseRowReference: Audit evidence references order_id=7812 in crm.orders without storing customer fields."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-006
    source: eng-ont-prov-o
    supports: "PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate. This evidence supports the manually reviewed boundary case for DatabaseRowReference: The currently displayed seventh result points to another order after re-sorting."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-007
    source: eng-ont-prov-o
    supports: PROV-O recognizes row and column as non-geographic locations; Moonweave adds key semantics to distinguish row identity from a mere coordinate. This claim supports only the DatabaseRowReference endpoint of its sibling distinction.
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-008
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation model separates SpecificResource identity from its source and constraints; Moonweave applies compound source-plus-member identity to graph nodes. This claim supports only the GraphNodeReference endpoint of its sibling distinction.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-009
    source: eng-ont-prov-o
    supports: "PROV-O recognizes rows as locations; Moonweave adds relation scope and candidate-key identity for durable row references. This evidence supports the manually reviewed positive case for DatabaseRowReference-is_a-RecordReference: crm.orders and order_id=7812 uniquely identify one row."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-010
    source: eng-ont-prov-o
    supports: "PROV-O recognizes rows as locations; Moonweave adds relation scope and candidate-key identity for durable row references. This evidence supports the manually reviewed boundary case for DatabaseRowReference-is_a-RecordReference: The seventh result row changes when query ordering changes."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-database-row-reference-011
    source: eng-ont-prov-o
    supports: PROV-O recognizes rows as locations; Moonweave adds relation scope and candidate-key identity for durable row references.
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-db-row-design
    source: src-info-sources-design
    supports: DatabaseRowReference identifies rows by complete primary key without storing row body.
    locator: DatabaseRowReference
    evidence_kind: design-inference
    confidence: high
