      labels:
        zh: 关系名称
        en: relation name
        ja: 関係名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明候选键所属的表或视图。
        en: Declares the table or view in which the candidate key is interpreted.
        ja: candidate key を解釈する table または view を宣言します。
      allowed_values: []
      pattern: null
      example_value: orders
      source_claims:
        - claim-database-row-reference-002
    - id: candidate_key
      labels:
        zh: 候选键
        en: candidate key
        ja: 候補キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存稳定标识该行的键字段和值。
        en: Carries the key fields and values that stably identify the row.
        ja: row を安定識別する key field と value を保持します。
      allowed_values: []
      pattern: null
      example_value: order_id=7812
      source_claims:
        - claim-database-row-reference-003
  constraints: []
  required_relation_constraints: []
