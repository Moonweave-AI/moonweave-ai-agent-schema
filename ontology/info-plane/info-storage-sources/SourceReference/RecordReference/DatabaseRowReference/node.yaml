schema: moonweave.ai/ontology-node/v1
id: DatabaseRowReference
kind: concept
status: review
labels:
  zh: 数据库行引用
  en: database row reference
  ja: データベース行参照
semantics:
  short_definition:
    zh: 以数据库关系和候选键标识一行的记录引用。
    en: A record reference that identifies one database row by relation and candidate key.
    ja: database relation と candidate key で一行を識別する record reference。
  definition:
    zh: 数据库行引用是记录引用的一类，种差是用数据库或 schema 身份、关系名称和候选键值共同标识一行；查询序号和当前物理页不能替代稳定行键。
    en: DatabaseRowReference is a RecordReference specialized by database or schema identity, relation name, and candidate-key values that jointly identify one row; query ordinal and current physical page do not substitute for a stable row key.
    ja: DatabaseRowReference は database/schema identity・relation name・candidate-key value で一 row を識別する RecordReference であり、query ordinal や physical page は stable row key を代替しません。
  why_needed:
    zh: 数据库行需要表范围和键语义；若只保存行号，排序或压缩后引用会漂移并与来源位置混淆。
    en: A database row requires relation scope and key semantics; storing only a row number drifts after sorting or compaction and confuses record identity with source location.
    ja: database row には relation scope と key semantics が必要で、row number だけでは sort・compaction 後に drift して source location と混同します。
  includes:
    - zh: 带 database/schema、relation 与候选键值的行引用。
      en: Row references carrying database or schema, relation, and candidate-key values.
      ja: database/schema・relation・candidate-key value を持つ row reference。
  excludes:
    - zh: 结果集中的第 N 行、整张表资源、SQL 查询文本和已加载的行数据副本。
      en: The Nth row in a result set, the whole table resource, SQL query text, and loaded copies of row data.
      ja: result set の N 行目・table 全体・SQL query text・load 済み row data copy。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - relation_name
  fields:
    - id: relation_name
      labels:
        zh: 关系名称
        en: relation name
        ja: 関係名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明候选键所属的表或视图。
        en: Declares the table or view in which the candidate key is interpreted.
        ja: candidate key を解釈する table または view を宣言します。
      allowed_values: []
      pattern: null
      example_value: orders
      source_claims:
        - claim-database-row-reference-002
    - id: candidate_key
      labels:
        zh: 候选键
        en: candidate key
        ja: 候補キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存稳定标识该行的键字段和值。
        en: Carries the key fields and values that stably identify the row.
        ja: row を安定識別する key field と value を保持します。
      allowed_values: []
      pattern: null
      example_value: order_id=7812
      source_claims:
        - claim-database-row-reference-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: DatabaseRowReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 数据库行引用正例
      en: database row reference positive case
      ja: データベース行参照正例
    scenario_id: null
    descriptions:
      zh: relation_name=orders 与 candidate_key=order_id=7812 唯一标识订单行。
      en: relation_name=orders and candidate_key=order_id=7812 uniquely identify an order row.
      ja: relation_name=orders と candidate_key=order_id=7812 が order row を一意に識別します。
    field_values:
      relation_name: orders
      candidate_key: order_id=7812
      record_key: orders/7812
      reference_id: database-row-ref-orders-7812
      reference_value: orders/order_id=7812
    related_node_ids:
      - DatabaseRowReference
      - RecordReference
    related_relation_ids:
      - DatabaseRowReference-is_a-RecordReference
    expected_result:
      zh: DatabaseRowReference 保持其已审查身份，并按定义解释 DatabaseRowReference-is_a-RecordReference。
      en: Retain the reviewed identity of DatabaseRowReference and interpret DatabaseRowReference-is_a-RecordReference exactly as defined.
      ja: DatabaseRowReference の reviewed identity を保持し DatabaseRowReference-is_a-RecordReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 关系范围和稳定候选键同时存在且共同确定该行。
      en: Both relation scope and a stable candidate key are present.
      ja: relation scope と stable candidate key が共に存在します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-database-row-reference-004
  - id: DatabaseRowReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 数据库行引用实例
      en: database row reference instance case
      ja: データベース行参照実例
    scenario_id: null
    descriptions:
      zh: 审计证据引用 crm.orders 的 order_id=7812，而不保存客户字段。
      en: Audit evidence references order_id=7812 in crm.orders without storing customer fields.
      ja: audit evidence は customer field を保存せず crm.orders の order_id=7812 を参照します。
    field_values:
      relation_name: orders
      candidate_key: order_id=7812
    related_node_ids:
      - DatabaseRowReference
      - RecordReference
    related_relation_ids:
      - DatabaseRowReference-is_a-RecordReference
    expected_result:
      zh: DatabaseRowReference 保持其已审查身份，并按定义解释 DatabaseRowReference-is_a-RecordReference。
      en: Retain the reviewed identity of DatabaseRowReference and interpret DatabaseRowReference-is_a-RecordReference exactly as defined.
      ja: DatabaseRowReference の reviewed identity を保持し DatabaseRowReference-is_a-RecordReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用记录可独立于行内容传递。
      en: The reference record can travel independently of row content.
      ja: reference record は row content から独立して移送できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-database-row-reference-005
  - id: DatabaseRowReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 数据库行引用边界例
      en: database row reference boundary case
      ja: データベース行参照境界例
    scenario_id: null
    descriptions:
      zh: 查询结果当前显示的第 7 行在重新排序后指向另一订单。
      en: The currently displayed seventh result points to another order after re-sorting.
      ja: 現在表示中の第七 result は再 sort 後に別 order を指します。
    field_values:
      relation_name: orders
      candidate_key: order_id=7812
    related_node_ids:
      - DatabaseRowReference
      - RecordReference
    related_relation_ids:
      - DatabaseRowReference-is_a-RecordReference
    expected_result:
      zh: 不把该对象归入 DatabaseRowReference，也不凭邻近或词形推断 DatabaseRowReference-is_a-RecordReference。
      en: Do not classify the object as DatabaseRowReference or infer DatabaseRowReference-is_a-RecordReference from proximity or lexical form.
      ja: object を DatabaseRowReference に分類せず proximity/lexical form から DatabaseRowReference-is_a-RecordReference を推論しません。
    why_valid_or_invalid:
      zh: 显示序号不是候选键，不能建立数据库行引用。
      en: A display ordinal is not a candidate key and cannot establish a database-row reference.
      ja: display ordinal は candidate key ではなく database-row reference を確立できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-database-row-reference-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: GraphNodeReference
    shared_parent_concept_id: RecordReference
    differentia:
      zh: 数据库行引用依据“数据库行引用是记录引用的一类，种差是用数据库或 schema 身份、关系名称和候选键值共同标识一行；查询序号和当前物理页不能替代稳定行键。”归类；图节点引用依据“图节点引用是记录引用的一类，种差是 graph_id 与 node_key 在指定图版本或命名空间中共同确定节点；可视化坐标、显示标签和节点度数均不是节点身份。”归类。二者共享 RecordReference，但任一端条件均不推出另一端。
      en: DatabaseRowReference is classified by “DatabaseRowReference is a RecordReference specialized by database or schema identity, relation name, and candidate-key values that jointly identify one row; query ordinal and current physical page do not substitute for a stable row key.” whereas GraphNodeReference is classified by “GraphNodeReference is a RecordReference whose graph_id and node_key jointly determine a node within a specified graph version or namespace; visualization coordinates, display labels, and node degree are not node identity.”. They share RecordReference, but satisfying either condition leaves the other unproven.
      ja: DatabaseRowReference は「DatabaseRowReference は database/schema identity・relation name・candidate-key value で一 row を識別する RecordReference であり、query ordinal や physical page は stable row key を代替しません。」で分類し、GraphNodeReference は「GraphNodeReference は graph_id と node_key が指定 graph version/namespace 内の node を決める RecordReference であり、visualization coordinate・display label・node degree は identity ではありません。」で分類します。両者は RecordReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-database-row-reference-007
      - claim-database-row-reference-008
