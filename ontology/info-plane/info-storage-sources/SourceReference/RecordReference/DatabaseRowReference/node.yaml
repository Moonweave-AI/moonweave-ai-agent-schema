    en: DatabaseRowReference-is_a-RecordReference records one is_a fact from DatabaseRowReference to RecordReference; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: DatabaseRowReference-is_a-RecordReference は DatabaseRowReference から RecordReference への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
