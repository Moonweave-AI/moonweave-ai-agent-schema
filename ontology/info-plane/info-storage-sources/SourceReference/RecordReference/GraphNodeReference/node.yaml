schema: moonweave.ai/ontology-node/v1
id: GraphNodeReference
kind: concept
labels:
  zh: 图节点引用
  en: graph node reference
  ja: グラフノード参照
semantics:
  short_definition:
    zh: 以图节点键标识知识图谱节点的结构化引用。
    en: Structured reference identifying a knowledge-graph node by node key.
    ja: graph node key で KG node を識別する structured reference。
  definition:
    zh: GraphNodeReference 记录 graph_id、node_label 与 node_key；用于实体链接 citation，不是图遍历活动或边集合。
    en: GraphNodeReference records graph_id, node_label, and node_key for entity-linking citations—not graph traversal activities or edge sets.
    ja: GraphNodeReference は node pointer。
  why_needed:
    zh: 同一个 node_key 可在不同图中复用，图布局还会变化；组合身份防止把画布位置或标签误当持久引用。
    en: The same node_key can be reused across graphs and graph layout can change; compound identity prevents canvas position or label from becoming a false durable reference.
    ja: 同じ node_key は別 graph で再利用され layout も変化するため、compound identity が canvas position や label を durable reference と誤認することを防ぎます。
  includes:
    - zh: 包含 graph_id、node_key 以及必要图版本限定的节点引用。
      en: Node references containing graph_id, node_key, and any required graph-version qualifier.
      ja: graph_id・node_key・必要な graph-version qualifier を含む node reference。
  excludes:
    - zh: 节点屏幕坐标、节点标签搜索结果、整张图资源和无 graph_id 的孤立键。
      en: Node screen coordinates, label-search results, whole-graph resources, and isolated keys without graph_id.
      ja: node screen coordinate・label search result・graph 全体・graph_id のない isolated key。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: node_key 必须在该 graph_id 内唯一；与 DatabaseRowReference 互斥分类。
    en: node_key must be unique within graph_id; mutually exclusive with DatabaseRowReference.
    ja: graph node 一意性。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - graph_id
  fields:
    - id: graph_id
      labels:
        zh: 图标识
        en: graph ID
        ja: グラフ ID
      definitions:
        zh: 声明节点键所属的图或图版本。
        en: Declares the graph or graph version in which the node key is interpreted.
        ja: node key を解釈する graph または graph version を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ontology-2026-07-16
      allowed_values: []
      source_claims:
        - claim-graph-node-reference-002
    - id: node_key
      labels:
        zh: 节点键
        en: node key
        ja: ノードキー
      definitions:
        zh: 在声明图中稳定标识节点。
        en: Stably identifies the node in the declared graph.
        ja: 宣言 graph 内で node を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: SourceReference
      allowed_values: []
      source_claims:
        - claim-graph-node-reference-003
  constraints: []
  required_relations: []
examples:
  - id: GraphNodeReference-example-entity
    labels:
      zh: 实体节点
      en: Entity node
      ja: entity node
    descriptions:
      zh: graph-kb 中 Person:alice-42 创建 GraphNodeReference。
      en: Person:alice-42 in graph-kb creates GraphNodeReference.
      ja: entity node。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: graph node
    field_values: {}
    related_node_ids:
      - GraphNodeReference
    related_relation_ids: []
    source_claims:
      - claim-graph-node-design
  - id: GraphNodeReference-example-label-key
    labels:
      zh: 标签与键
      en: Label and key
      ja: label と key
    descriptions:
      zh: node_label 与 node_key 共同确定节点。
      en: node_label and node_key jointly identify node.
      ja: label+key。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: identity
    field_values: {}
    related_node_ids:
      - GraphNodeReference
    related_relation_ids: []
    source_claims:
      - claim-graph-node-design
  - id: GraphNodeReference-example-not-edge
    labels:
      zh: 非边
      en: Not edge
      ja: edge ではない
    descriptions:
      zh: 图边遍历结果不是 GraphNodeReference。
      en: Graph edge traversal results are not GraphNodeReference.
      ja: edge≠node ref。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - GraphNodeReference
    related_relation_ids: []
    source_claims:
      - claim-graph-node-design
parent_relation:
  id: GraphNodeReference-is_a-RecordReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 图节点引用是一种记录引用，并以图身份和节点键共同确定节点为种差。
    en: GraphNodeReference is a RecordReference specialized by graph identity and node key jointly determining one node.
    ja: GraphNodeReference は graph identity と node key で一 node を共同決定する RecordReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GraphNodeReference-is_a-RecordReference-example-positive-manual-001
      labels:
        zh: GraphNodeReference-is_a-RecordReference正例
        en: GraphNodeReference-is_a-RecordReference positive case
        ja: GraphNodeReference-is_a-RecordReference正例
      descriptions:
        zh: ontology-v42 与 node-17 共同标识图节点。
        en: ontology-v42 and node-17 jointly identify a graph node.
        ja: ontology-v42 と node-17 は graph node を共同識別します。
      field_values: {}
      related_node_ids:
        - GraphNodeReference
        - RecordReference
      related_relation_ids:
        - GraphNodeReference-is_a-RecordReference
      source_claims:
        - claim-graph-node-reference-009
    - id: GraphNodeReference-is_a-RecordReference-example-boundary-manual-001
      labels:
        zh: GraphNodeReference-is_a-RecordReference边界例
        en: GraphNodeReference-is_a-RecordReference boundary case
        ja: GraphNodeReference-is_a-RecordReference境界例
      descriptions:
        zh: x=240,y=180 在重布局后指向另一节点。
        en: x=240,y=180 points to another node after re-layout.
        ja: x=240,y=180 は re-layout 後に別 node を指します。
      field_values: {}
      related_node_ids:
        - GraphNodeReference
        - RecordReference
      related_relation_ids:
        - GraphNodeReference-is_a-RecordReference
      source_claims:
        - claim-graph-node-reference-010
  source_claims:
    - claim-graph-node-reference-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
