schema: moonweave.ai/ontology-node/v1
id: GraphNodeReference
kind: concept
status: review
labels:
  zh: 图节点引用
  en: graph node reference
  ja: グラフノード参照
semantics:
  short_definition:
    zh: 以图身份和节点键标识一个图节点的记录引用。
    en: A record reference that identifies one graph node by graph identity and node key.
    ja: graph identity と node key で一 graph node を識別する record reference。
  definition:
    zh: 图节点引用是记录引用的一类，种差是 graph_id 与 node_key 在指定图版本或命名空间中共同确定节点；可视化坐标、显示标签和节点度数均不是节点身份。
    en: GraphNodeReference is a RecordReference whose graph_id and node_key jointly determine a node within a specified graph version or namespace; visualization coordinates, display labels, and node degree are not node identity.
    ja: GraphNodeReference は graph_id と node_key が指定 graph version/namespace 内の node を決める RecordReference であり、visualization coordinate・display label・node degree は identity ではありません。
  why_needed:
    zh: 同一个 node_key 可在不同图中复用，图布局还会变化；组合身份防止把画布位置或标签误当持久引用。
    en: The same node_key can be reused across graphs and graph layout can change; compound identity prevents canvas position or label from becoming a false durable reference.
    ja: 同じ node_key は別 graph で再利用され layout も変化するため、compound identity が canvas position や label を durable reference と誤認することを防ぎます。
  includes:
    - zh: 包含 graph_id、node_key 以及必要图版本限定的节点引用。
      en: Node references containing graph_id, node_key, and any required graph-version qualifier.
      ja: graph_id・node_key・必要な graph-version qualifier を含む node reference。
  excludes:
    - zh: 节点屏幕坐标、节点标签搜索结果、整张图资源和无 graph_id 的孤立键。
      en: Node screen coordinates, label-search results, whole-graph resources, and isolated keys without graph_id.
      ja: node screen coordinate・label search result・graph 全体・graph_id のない isolated key。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - graph_id
  fields:
    - id: graph_id
      labels:
        zh: 图标识
        en: graph ID
        ja: グラフ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明节点键所属的图或图版本。
        en: Declares the graph or graph version in which the node key is interpreted.
        ja: node key を解釈する graph または graph version を宣言します。
      allowed_values: []
      pattern: null
      example_value: ontology-2026-07-16
      source_claims:
        - claim-graph-node-reference-002
    - id: node_key
      labels:
        zh: 节点键
        en: node key
        ja: ノードキー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在声明图中稳定标识节点。
        en: Stably identifies the node in the declared graph.
        ja: 宣言 graph 内で node を安定識別します。
      allowed_values: []
      pattern: null
      example_value: SourceReference
      source_claims:
        - claim-graph-node-reference-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: GraphNodeReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 图节点引用正例
      en: graph node reference positive case
      ja: グラフノード参照正例
    scenario_id: null
    descriptions:
      zh: graph_id=ontology-2026-07-16 与 node_key=SourceReference 共同标识节点。
      en: graph_id=ontology-2026-07-16 and node_key=SourceReference jointly identify a node.
      ja: graph_id=ontology-2026-07-16 と node_key=SourceReference が node を共同識別します。
    field_values:
      graph_id: ontology-2026-07-16
      node_key: SourceReference
      record_key: ontology-2026-07-16/SourceReference
      reference_id: graph-node-ref-source-reference
      reference_value: graph://ontology-2026-07-16/SourceReference
    related_node_ids:
      - GraphNodeReference
      - RecordReference
    related_relation_ids:
      - GraphNodeReference-is_a-RecordReference
    expected_result:
      zh: GraphNodeReference 保持其已审查身份，并按定义解释 GraphNodeReference-is_a-RecordReference。
      en: Retain the reviewed identity of GraphNodeReference and interpret GraphNodeReference-is_a-RecordReference exactly as defined.
      ja: GraphNodeReference の reviewed identity を保持し GraphNodeReference-is_a-RecordReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 图范围和节点键都明确，布局变化不影响身份。
      en: Graph scope and node key are explicit, so layout changes do not affect identity.
      ja: graph scope と node key が明示され layout 変化は identity に影響しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-graph-node-reference-004
  - id: GraphNodeReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 图节点引用实例
      en: graph node reference instance case
      ja: グラフノード参照実例
    scenario_id: null
    descriptions:
      zh: 审计报告引用图版本 v42 的节点 n17，不保存其邻接表。
      en: An audit report references node n17 in graph version v42 without storing its adjacency list.
      ja: audit report は adjacency list を保存せず graph version v42 の node n17 を参照します。
    field_values:
      graph_id: ontology-2026-07-16
      node_key: SourceReference
    related_node_ids:
      - GraphNodeReference
      - RecordReference
    related_relation_ids:
      - GraphNodeReference-is_a-RecordReference
    expected_result:
      zh: GraphNodeReference 保持其已审查身份，并按定义解释 GraphNodeReference-is_a-RecordReference。
      en: Retain the reviewed identity of GraphNodeReference and interpret GraphNodeReference-is_a-RecordReference exactly as defined.
      ja: GraphNodeReference の reviewed identity を保持し GraphNodeReference-is_a-RecordReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用仅保存复合键，图内容仍归图存储。
      en: The reference stores only the compound key; graph storage owns graph content.
      ja: 参照は compound key だけを保存し graph content は graph storage が所有します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-graph-node-reference-005
  - id: GraphNodeReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 图节点引用边界例
      en: graph node reference boundary case
      ja: グラフノード参照境界例
    scenario_id: null
    descriptions:
      zh: 画布位置 x=240,y=180 在重新布局后落到另一节点。
      en: Canvas position x=240,y=180 lands on another node after re-layout.
      ja: canvas position x=240,y=180 は re-layout 後に別 node へ移ります。
    field_values:
      graph_id: ontology-2026-07-16
      node_key: SourceReference
    related_node_ids:
      - GraphNodeReference
      - RecordReference
    related_relation_ids:
      - GraphNodeReference-is_a-RecordReference
    expected_result:
      zh: 不把该对象归入 GraphNodeReference，也不凭邻近或词形推断 GraphNodeReference-is_a-RecordReference。
      en: Do not classify the object as GraphNodeReference or infer GraphNodeReference-is_a-RecordReference from proximity or lexical form.
      ja: object を GraphNodeReference に分類せず proximity/lexical form から GraphNodeReference-is_a-RecordReference を推論しません。
    why_valid_or_invalid:
      zh: 显示坐标不是图节点键，不能作为 GraphNodeReference。
      en: Display coordinates are not a graph-node key and cannot form a GraphNodeReference.
      ja: display coordinate は graph-node key ではなく GraphNodeReference を構成できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-graph-node-reference-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DatabaseRowReference
    shared_parent_concept_id: RecordReference
    differentia:
      zh: 图节点引用依据“图节点引用是记录引用的一类，种差是 graph_id 与 node_key 在指定图版本或命名空间中共同确定节点；可视化坐标、显示标签和节点度数均不是节点身份。”归类；数据库行引用依据“数据库行引用是记录引用的一类，种差是用数据库或 schema 身份、关系名称和候选键值共同标识一行；查询序号和当前物理页不能替代稳定行键。”归类。二者共享 RecordReference，但任一端条件均不推出另一端。
      en: GraphNodeReference is classified by “GraphNodeReference is a RecordReference whose graph_id and node_key jointly determine a node within a specified graph version or namespace; visualization coordinates, display labels, and node degree are not node identity.” whereas DatabaseRowReference is classified by “DatabaseRowReference is a RecordReference specialized by database or schema identity, relation name, and candidate-key values that jointly identify one row; query ordinal and current physical page do not substitute for a stable row key.”. They share RecordReference, but satisfying either condition leaves the other unproven.
      ja: GraphNodeReference は「GraphNodeReference は graph_id と node_key が指定 graph version/namespace 内の node を決める RecordReference であり、visualization coordinate・display label・node degree は identity ではありません。」で分類し、DatabaseRowReference は「DatabaseRowReference は database/schema identity・relation name・candidate-key value で一 row を識別する RecordReference であり、query ordinal や physical page は stable row key を代替しません。」で分類します。両者は RecordReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-graph-node-reference-007
      - claim-graph-node-reference-008
