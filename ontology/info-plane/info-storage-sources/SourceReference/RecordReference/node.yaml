schema: moonweave.ai/ontology-node/v1
id: RecordReference
kind: concept
labels:
  zh: 记录引用
  en: record reference
  ja: レコード参照
semantics:
  short_definition:
    zh: 以结构化记录键标识数据库行或图节点的引用分类。
    en: Reference classification identifying database rows or graph nodes by structured record keys.
    ja: structured record key で DB row/graph node を識別する reference 分類。
  definition:
    zh: RecordReference 覆盖 database_id+relation+primary_key 与 graph node key；不是 Resource URI 也不是查询结果正文。
    en: RecordReference covers database_id+relation+primary_key and graph node keys—not resource URIs or query result bodies.
    ja: RecordReference は structured record pointer。
  why_needed:
    zh: 该中间层让数据库行与图节点共享“容器加成员键”的真正 genus，同时又与完整资源引用和坐标范围分开。
    en: This intermediate genus gives database rows and graph nodes the genuine shared genus of container plus member key while separating them from whole-resource references and coordinate ranges.
    ja: この中間 genus は database row と graph node に container＋member key という共通 genus を与え、whole-resource reference と coordinate range から分離します。
  includes:
    - zh: 由容器标识和稳定成员键确定的表行、图节点或类似逻辑记录引用。
      en: Table-row, graph-node, or similar logical-record references determined by a container ID and stable member key.
      ja: container ID と stable member key で決まる table-row・graph-node・類似 logical-record reference。
  excludes:
    - zh: 整个数据集资源、查询结果快照、行号范围以及没有容器身份的裸键。
      en: Whole dataset resources, query-result snapshots, line-number ranges, and bare keys without container identity.
      ja: dataset 全体・query-result snapshot・line-number range・container identity のない bare key。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: DatabaseRowReference 与 GraphNodeReference 是 RecordReference 子类；primary_key 必须完整。
    en: DatabaseRowReference and GraphNodeReference are RecordReference subclasses; primary_key must be complete.
    ja: record key 完全性。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - record_key
  fields:
    - id: record_key
      labels:
        zh: 成员键
        en: member key
        ja: メンバーキー
      definitions:
        zh: 在声明的结构化容器内唯一标识逻辑成员。
        en: Uniquely identifies the logical member within the declared structured container.
        ja: 宣言済み structured container 内で logical member を一意に識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: orders/7812
      allowed_values: []
      source_claims:
        - claim-record-reference-002
  constraints: []
  required_relations: []
examples:
  - id: RecordReference-example-db-row
    labels:
      zh: 数据库行
      en: Database row
      ja: DB row
    descriptions:
      zh: dbrow-crm-orders-7812 分类 DatabaseRowReference。
      en: dbrow-crm-orders-7812 classifies as DatabaseRowReference.
      ja: DB row ref。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: database row
    field_values: {}
    related_node_ids:
      - RecordReference
      - DatabaseRowReference
    related_relation_ids: []
    source_claims:
      - claim-record-ref-design
  - id: RecordReference-example-graph-node
    labels:
      zh: 图节点
      en: Graph node
      ja: graph node
    descriptions:
      zh: graph node key 分类 GraphNodeReference。
      en: Graph node key classifies as GraphNodeReference.
      ja: graph node ref。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: graph node
    field_values: {}
    related_node_ids:
      - RecordReference
      - GraphNodeReference
    related_relation_ids: []
    source_claims:
      - claim-record-ref-design
  - id: RecordReference-example-not-uri
    labels:
      zh: 非 URI
      en: Not URI
      ja: URI ではない
    descriptions:
      zh: https:// API 资源不得建模为 RecordReference。
      en: https:// API resources must not be RecordReference.
      ja: URL→ResourceReference。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
