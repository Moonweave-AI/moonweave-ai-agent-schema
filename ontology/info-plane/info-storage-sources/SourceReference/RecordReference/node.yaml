        ja: RecordReference-is_a-SourceReference正例
      descriptions:
        zh: graph-9/node-17 由图身份与节点键共同确定。
        en: graph-9/node-17 is determined jointly by graph identity and node key.
        ja: graph-9/node-17 は graph identity と node key で共同決定します。
      field_values: {}
      related_node_ids:
        - RecordReference
        - SourceReference
      related_relation_ids:
        - RecordReference-is_a-SourceReference
      source_claims:
        - claim-record-reference-008
    - id: RecordReference-is_a-SourceReference-example-boundary-manual-001
      labels:
        zh: RecordReference-is_a-SourceReference边界例
        en: RecordReference-is_a-SourceReference boundary case
        ja: RecordReference-is_a-SourceReference境界例
      descriptions:
        zh: https://example.org/dataset 指向整个数据集。
        en: https://example.org/dataset points to an entire dataset.
        ja: https://example.org/dataset は dataset 全体を指します。
      field_values: {}
      related_node_ids:
        - RecordReference
        - SourceReference
      related_relation_ids:
        - RecordReference-is_a-SourceReference
      source_claims:
        - claim-record-reference-009
  source_claims:
