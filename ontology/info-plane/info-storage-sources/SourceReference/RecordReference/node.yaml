schema: moonweave.ai/ontology-node/v1
id: RecordReference
kind: concept
status: accepted
labels:
  zh: 记录引用
  en: record reference
  ja: レコード参照
semantics:
  short_definition:
    zh: 指向结构化容器中一个逻辑成员的来源引用。
    en: A source reference to one logical member of a structured container.
    ja: structured container 内の一 logical member への source reference。
  definition:
    zh: 记录引用是来源引用的一类，种差是通过容器身份与成员键的组合标识表行、图节点等逻辑记录；它不把整个数据库、图或文件当作 referent。
    en: RecordReference is a SourceReference specialized by the combination of container identity and member key that identifies a logical record such as a table row or graph node; it does not identify the database, graph, or file as a whole.
    ja: RecordReference は container identity と member key の組で table row や graph node の logical record を識別する SourceReference であり、database・graph・file 全体を指しません。
  why_needed:
    zh: 该中间层让数据库行与图节点共享“容器加成员键”的真正 genus，同时又与完整资源引用和坐标范围分开。
    en: This intermediate genus gives database rows and graph nodes the genuine shared genus of container plus member key while separating them from whole-resource references and coordinate ranges.
    ja: この中間 genus は database row と graph node に container＋member key という共通 genus を与え、whole-resource reference と coordinate range から分離します。
  includes:
    - zh: 由容器标识和稳定成员键确定的表行、图节点或类似逻辑记录引用。
      en: Table-row, graph-node, or similar logical-record references determined by a container ID and stable member key.
      ja: container ID と stable member key で決まる table-row・graph-node・類似 logical-record reference。
  excludes:
    - zh: 整个数据集资源、查询结果快照、行号范围以及没有容器身份的裸键。
      en: Whole dataset resources, query-result snapshots, line-number ranges, and bare keys without container identity.
      ja: dataset 全体・query-result snapshot・line-number range・container identity のない bare key。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - record_key
  fields:
    - id: record_key
      labels:
        zh: 成员键
        en: member key
        ja: メンバーキー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在声明的结构化容器内唯一标识逻辑成员。
        en: Uniquely identifies the logical member within the declared structured container.
        ja: 宣言済み structured container 内で logical member を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: orders/7812
      source_claims:
        - claim-record-reference-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: RecordReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 记录引用正例
      en: record reference positive case
      ja: レコード参照正例
    scenario_id: null
    descriptions:
      zh: container=orders 与 record_key=7812 共同标识一个订单记录。
      en: container=orders and record_key=7812 together identify one order record.
      ja: container=orders と record_key=7812 が一つの order record を識別します。
    field_values:
      record_key: orders/7812
      reference_id: record-ref-orders-7812
      reference_value: orders/7812
    related_node_ids:
      - RecordReference
      - SourceReference
    related_relation_ids:
      - RecordReference-is_a-SourceReference
    expected_result:
      zh: RecordReference 保持其已审查身份，并按定义解释 RecordReference-is_a-SourceReference。
      en: Retain the reviewed identity of RecordReference and interpret RecordReference-is_a-SourceReference exactly as defined.
      ja: RecordReference の reviewed identity を保持し RecordReference-is_a-SourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 容器身份与成员键共同构成记录引用。
      en: Container identity and member key jointly form the record reference.
      ja: container identity と member key が共同で record reference を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-record-reference-003
  - id: RecordReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 记录引用实例
      en: record reference instance case
      ja: レコード参照実例
    scenario_id: null
    descriptions:
      zh: 审计事件引用图 graph-9 中 node-17，而不复制节点属性。
      en: An audit event references node-17 in graph-9 without copying node properties.
      ja: audit event は node property を複製せず graph-9 の node-17 を参照します。
    field_values:
      record_key: orders/7812
    related_node_ids:
      - RecordReference
      - SourceReference
    related_relation_ids:
      - RecordReference-is_a-SourceReference
    expected_result:
      zh: RecordReference 保持其已审查身份，并按定义解释 RecordReference-is_a-SourceReference。
      en: Retain the reviewed identity of RecordReference and interpret RecordReference-is_a-SourceReference exactly as defined.
      ja: RecordReference の reviewed identity を保持し RecordReference-is_a-SourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 该引用即使未加载图内容仍可成立。
      en: The reference remains valid without loading graph content.
      ja: graph content を load しなくても参照は成立します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-record-reference-004
  - id: RecordReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 记录引用边界例
      en: record reference boundary case
      ja: レコード参照境界例
    scenario_id: null
    descriptions:
      zh: 一个 CSV 文件的 URI 标识整个文件，没有成员键。
      en: A CSV file URI identifies the whole file and has no member key.
      ja: CSV file URI は file 全体を識別し member key を持ちません。
    field_values:
      record_key: orders/7812
    related_node_ids:
      - RecordReference
      - SourceReference
    related_relation_ids:
      - RecordReference-is_a-SourceReference
    expected_result:
      zh: 不把该对象归入 RecordReference，也不凭邻近或词形推断 RecordReference-is_a-SourceReference。
      en: Do not classify the object as RecordReference or infer RecordReference-is_a-SourceReference from proximity or lexical form.
      ja: object を RecordReference に分類せず proximity/lexical form から RecordReference-is_a-SourceReference を推論しません。
    why_valid_or_invalid:
      zh: 这是 ResourceReference，不是 RecordReference。
      en: This is a ResourceReference, not a RecordReference.
      ja: これは RecordReference ではなく ResourceReference です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-record-reference-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: GovernanceReference
    shared_parent_concept_id: SourceReference
    differentia:
      zh: 记录引用依据“记录引用是来源引用的一类，种差是通过容器身份与成员键的组合标识表行、图节点等逻辑记录；它不把整个数据库、图或文件当作 referent。”归类；治理对象引用依据“治理对象引用是来源引用的一类，种差是 referent 用于定义数据处置域、信任边界或类似治理范围；引用本身不执行策略判断，也不代表来源已经获准跨界。”归类。二者共享 SourceReference，但任一端条件均不推出另一端。
      en: RecordReference is classified by “RecordReference is a SourceReference specialized by the combination of container identity and member key that identifies a logical record such as a table row or graph node; it does not identify the database, graph, or file as a whole.” whereas GovernanceReference is classified by “GovernanceReference is a SourceReference whose referent defines a data-handling zone, trust boundary, or comparable governance scope; the reference itself neither evaluates policy nor asserts that the source may cross the boundary.”. They share SourceReference, but satisfying either condition leaves the other unproven.
      ja: RecordReference は「RecordReference は container identity と member key の組で table row や graph node の logical record を識別する SourceReference であり、database・graph・file 全体を指しません。」で分類し、GovernanceReference は「GovernanceReference は data-handling zone・trust boundary・同等 governance scope を定義する referent への SourceReference であり、policy evaluation や cross-boundary authorization を表しません。」で分類します。両者は SourceReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-record-reference-006
      - claim-record-reference-007
parent_relation:
  id: RecordReference-is_a-SourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 记录引用是一种来源引用，并以结构化容器身份与成员键共同标识逻辑记录为种差。
    en: RecordReference is a SourceReference specialized by container identity and member key jointly identifying a logical record.
    ja: RecordReference は container identity と member key で logical record を共同識別する SourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RecordReference-is_a-SourceReference-example-positive-manual-001
      kind: positive
      labels:
        zh: RecordReference-is_a-SourceReference正例
        en: RecordReference-is_a-SourceReference positive case
        ja: RecordReference-is_a-SourceReference正例
      scenario_id: null
      descriptions:
        zh: graph-9/node-17 由图身份与节点键共同确定。
        en: graph-9/node-17 is determined jointly by graph identity and node key.
        ja: graph-9/node-17 は graph identity と node key で共同決定します。
      field_values: {}
      related_node_ids:
        - RecordReference
        - SourceReference
      related_relation_ids:
        - RecordReference-is_a-SourceReference
      expected_result:
        zh: 建立 RecordReference —is_a→ SourceReference，并保持该方向与限定条件。
        en: Assert RecordReference —is_a→ SourceReference while preserving its direction and qualifiers.
        ja: RecordReference —is_a→ SourceReference を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 该对象是容器中的稳定逻辑成员且具有成员解析键。
        en: The object is a stable logical member of a container.
        ja: object は container 内の stable logical member です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-record-reference-008
    - id: RecordReference-is_a-SourceReference-example-boundary-manual-001
      kind: boundary
      labels:
        zh: RecordReference-is_a-SourceReference边界例
        en: RecordReference-is_a-SourceReference boundary case
        ja: RecordReference-is_a-SourceReference境界例
      scenario_id: null
      descriptions:
        zh: https://example.org/dataset 指向整个数据集。
        en: https://example.org/dataset points to an entire dataset.
        ja: https://example.org/dataset は dataset 全体を指します。
      field_values: {}
      related_node_ids:
        - RecordReference
        - SourceReference
      related_relation_ids:
        - RecordReference-is_a-SourceReference
      expected_result:
        zh: 拒绝建立 RecordReference-is_a-SourceReference，两端对象仍保留各自身份。
        en: Reject RecordReference-is_a-SourceReference; both endpoint objects retain their own identities.
        ja: RecordReference-is_a-SourceReference を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 完整资源应归 ResourceReference 而非 RecordReference。
        en: A whole resource belongs under ResourceReference rather than RecordReference.
        ja: whole resource は RecordReference でなく ResourceReference に属します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-record-reference-009
  source_claims:
    - claim-record-reference-010
  distinct_fact_rationale:
    zh: RecordReference-is_a-SourceReference 记录 RecordReference 到 SourceReference 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: RecordReference-is_a-SourceReference records one is_a fact from RecordReference to SourceReference; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: RecordReference-is_a-SourceReference は RecordReference から SourceReference への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
