source_claims:
  - id: claim-record-reference-001
    source: eng-ont-prov-o
    supports: PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location.
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-002
    source: eng-ont-prov-o
    supports: "PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location. For RecordReference.record_key, the field records this reviewed value: Uniquely identifies the logical member within the declared structured container."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-003
    source: eng-ont-prov-o
    supports: "PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location. This evidence supports the manually reviewed positive case for RecordReference: container=orders and record_key=7812 together identify one order record."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-004
    source: eng-ont-prov-o
    supports: "PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location. This evidence supports the manually reviewed instance case for RecordReference: An audit event references node-17 in graph-9 without copying node properties."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-005
    source: eng-ont-prov-o
    supports: "PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location. This evidence supports the manually reviewed boundary case for RecordReference: A CSV file URI identifies the whole file and has no member key."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-006
    source: eng-ont-prov-o
    supports: PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location. This claim supports only the RecordReference endpoint of its sibling distinction.
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-007
    source: eng-network-nist-zero-trust
    supports: NIST defines per-resource policy decisions and enforcement boundaries; Moonweave keeps a reference to such governance objects separate from decisions and crossings. This claim supports only the GovernanceReference endpoint of its sibling distinction.
    locator: NIST SP 800-207 §§2–3, Resource Access and Policy Enforcement
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-008
    source: eng-ont-prov-o
    supports: "PROV-O includes row and column as non-geographic locations; Moonweave distinguishes stable keyed record identity from positional coordinates. This evidence supports the manually reviewed positive case for RecordReference-is_a-SourceReference: graph-9/node-17 is determined jointly by graph identity and node key."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-record-reference-009
    source: eng-ont-prov-o
    supports: "PROV-O includes row and column as non-geographic locations; Moonweave distinguishes stable keyed record identity from positional coordinates. This evidence supports the manually reviewed boundary case for RecordReference-is_a-SourceReference: https://example.org/dataset points to an entire dataset."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
