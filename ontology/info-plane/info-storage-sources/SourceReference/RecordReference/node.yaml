    related_relation_ids: []
    source_claims:
      - claim-record-ref-design
parent_relation:
  id: RecordReference-is_a-SourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 记录引用是一种来源引用，并以结构化容器身份与成员键共同标识逻辑记录为种差。
    en: RecordReference is a SourceReference specialized by container identity and member key jointly identifying a logical record.
    ja: RecordReference は container identity と member key で logical record を共同識別する SourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
