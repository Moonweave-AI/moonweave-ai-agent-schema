    locator: §3.2 > prov:wasDerivedFrom, prov:wasRevisionOf, prov:hadPrimarySource
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-source-provenance-005
    source: eng-ont-prov-o
    supports: PROV-O relates an entity state to the activity responsible for its generation.
    locator: §3.2 > prov:wasGeneratedBy and prov:Generation
