    confidence: high
    review_status: pending
  - id: claim-source-provenance-002
    source: eng-ont-prov-o
    supports: "PROV-O explains why secondary sources reference primary sources so reliability can be investigated; SourceProvenance records such lineage facts. For SourceProvenance.provenance_id, the field records this reviewed value: Stably identifies a reviewed set of source-history facts."
    locator: §3.2 expanded properties, prov:hadPrimarySource, lines 1604–1607
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-source-provenance-003
    source: eng-ont-prov-o
    supports: PROV-O defines distinct relations for derivation, revision, primary source, generation, and attribution. SourceProvenance preserves that distinction instead of collapsing every fact into derived_from.
    locator: §3.2 > derivation, revision, primary source, generation, and attribution properties
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-source-provenance-004
    source: eng-ont-prov-o
