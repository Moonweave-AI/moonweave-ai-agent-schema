schema: moonweave.ai/ontology-node/v1
id: SourceProvenance
kind: concept
status: accepted
labels:
  zh: 来源出处记录
  en: source provenance record
  ja: 出典来歴記録
semantics:
  short_definition:
    zh: 记录某个来源引用的派生、修订、生成或归属链的出处事实集。
    en: A provenance fact set recording derivation, revision, generation, or attribution for a source reference.
    ja: source reference の derivation・revision・generation・attribution chain を記録する provenance fact set。
  definition:
    zh: 来源出处记录是一组与 SourceReference 关联的信息事实，以 provenance_id 标识，记录被引用来源与先前实体、首要来源、生成活动或归属主体之间的派生和责任链；它不是显示用 ResourceDescriptor，也不是 SourceIdentity 的版本或 digest 组成。
    en: SourceProvenance is an information fact set associated with a SourceReference, identified by provenance_id, that records derivation and responsibility links from the referenced source to earlier entities, primary sources, generating activities, or attributed agents. It is neither a display-oriented ResourceDescriptor nor a version or digest component of SourceIdentity.
    ja: SourceProvenance は SourceReference に関連する information fact set で、provenance_id により識別し、referenced source から earlier entity・primary source・generating activity・attributed agent への derivation/responsibility link を記録します。表示用 ResourceDescriptor や SourceIdentity の version/digest component ではありません。
  why_needed:
    zh: 出处回答“这个被引用来源从何而来、由谁或什么活动产生”，状态身份回答“它是哪一个内容状态”；用 has_provenance 连接二者可保持事实语义而不伪造描述符种属。
    en: Provenance answers where the referenced source came from and which agent or activity produced it, while state identity answers which content state it is. Connecting them with has_provenance preserves that fact semantics without inventing a descriptor genus.
    ja: provenance は referenced source の由来と生成 agent/activity、state identity は content state を答えます。has_provenance で結ぶことで descriptor genus を捏造せず fact semantics を保ちます。
  includes:
    - zh: 含 provenance_id 并记录 wasDerivedFrom、wasRevisionOf、hadPrimarySource、wasGeneratedBy 或 attribution 的可核验事实集。
      en: Verifiable fact sets with provenance_id recording wasDerivedFrom, wasRevisionOf, hadPrimarySource, wasGeneratedBy, or attribution.
      ja: provenance_id を持ち wasDerivedFrom・wasRevisionOf・hadPrimarySource・wasGeneratedBy・attribution を記録する検証可能 fact set。
  excludes:
    - zh: 当前版本字符串、内容摘要、引用位置、生成活动本体和未经证据支持的来源猜测。
      en: Current version strings, content digests, reference locations, generating-activity entities, and unsupported source guesses.
      ja: current version string・content digest・reference location・generating-activity entity・unsupported source guess。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - provenance_id
  fields:
    - id: provenance_id
      labels:
        zh: 出处记录标识
        en: provenance record ID
        ja: 来歴記録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一组经审查的来源历史事实。
        en: Stably identifies a reviewed set of source-history facts.
        ja: reviewed source-history fact set を安定識別します。
      allowed_values: []
      pattern: null
      example_value: prov-runbook-v7
      source_claims:
        - claim-source-provenance-002
    - id: relation_type
      labels:
        zh: 出处关系类型
        en: provenance relation type
        ja: provenance relation type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该记录表达派生、修订、首要来源、生成或归属中的哪一种出处事实。
        en: Declares whether the record expresses derivation, revision, primary source, generation, or attribution.
        ja: record が derivation・revision・primary source・generation・attribution のどれを表すか宣言します。
      allowed_values: []
      pattern: null
      example_value: wasRevisionOf
      source_claims:
        - claim-source-provenance-003
    - id: source_entity_ref
      labels:
        zh: 相关来源实体
        en: source entity reference
        ja: source entity reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向派生、修订或首要来源事实中的另一已识别实体。
        en: References the other identified entity in a derivation, revision, or primary-source fact.
        ja: derivation・revision・primary-source fact の other identified entity を参照します。
      allowed_values: []
      pattern: null
      example_value: doc:ops:recovery:v6
      source_claims:
        - claim-source-provenance-004
    - id: activity_ref
      labels:
        zh: 生成活动引用
        en: generation activity reference
        ja: generation activity reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向使当前来源状态可用的生成活动。
        en: References the activity that generated and made the current source state available.
        ja: current source state を生成して利用可能にした activity を参照します。
      allowed_values: []
      pattern: null
      example_value: revision-run-2026-07-03
      source_claims:
        - claim-source-provenance-005
    - id: agent_ref
      labels:
        zh: 归属主体引用
        en: attributed agent reference
        ja: attributed agent reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向对当前来源状态承担归属责任的主体。
        en: References the agent to whom responsibility for the current source state is attributed.
        ja: current source state の responsibility が attributed される agent を参照します。
      allowed_values: []
      pattern: null
      example_value: actor-docs-maintainer
      source_claims:
        - claim-source-provenance-006
  constraints:
    - id: source-provenance-has-qualified-fact
      severity: error
      expression_language: plain
      expression: relation_type determines at least one applicable source_entity_ref, activity_ref, or agent_ref
      explanations:
        zh: 出处记录必须给出与关系类型匹配的实体、活动或主体端点；只有标题、版本值或时间戳不是出处事实。
        en: A provenance record supplies an entity, activity, or agent endpoint compatible with relation_type; a title, version value, or timestamp alone is not a provenance fact.
        ja: provenance record は relation_type に適合する entity/activity/agent endpoint を持ち、title・version value・timestamp だけでは provenance fact になりません。
      source_claims:
        - claim-source-provenance-007
  required_relation_constraints: []
examples:
  - id: SourceProvenance-example-positive-manual-001

    labels:
      zh: 来源出处描述正例
      en: source provenance descriptor positive case
      ja: 出典来歴記述正例

    descriptions: {zh: "Claude Citations API citations=[{type:char_location, cited_text, document_index, start_char_index, end_char_index}]; supports document/URL/plain text; SourceProvenance maps Citation/ContentAnchor/SourceProvenance.", en: "Claude Citations API char_location start/end_char_index document_index; SourceProvenance maps Citation/ContentAnchor/SourceProvenance.", ja: "Claude Citations char_location start/end; SourceProvenance ContentAnchor."}

    field_values:
      provenance_id: prov-runbook-v7
      relation_type: wasRevisionOf
      source_entity_ref: doc:ops:recovery:v6
      activity_ref: revision-run-2026-07-03
    related_node_ids:
      - SourceReference
      - SourceProvenance
    related_relation_ids:
      - SourceReference-has_provenance-SourceProvenance

    source_claims:
      - claim-source-provenance-008
  - id: SourceProvenance-example-instance-manual-002

    labels:
      zh: 来源出处描述实例
      en: source provenance descriptor instance case
      ja: 出典来歴記述実例

    descriptions: {zh: "Attention instance: max_context_tokens=8192 sequence_index=42->SourceProvenance addressable segment.", en: "Attention instance: max_context_tokens=8192 sequence_index=42->SourceProvenance addressable segment.", ja: "Attention instance maps to SourceProvenance."}

    field_values:
      provenance_id: prov-runbook-v7
      relation_type: hadPrimarySource
      source_entity_ref: https://www.w3.org/TR/prov-o/
    related_node_ids:
      - SourceReference
      - SourceProvenance
    related_relation_ids:
      - SourceReference-has_provenance-SourceProvenance

    source_claims:
      - claim-source-provenance-009
  - id: SourceProvenance-example-boundary-manual-003

    labels:
      zh: 来源出处描述边界例
      en: source provenance descriptor boundary case
      ja: 出典来歴記述境界例

    descriptions: {zh: "[1] is CitationAnchor; full SourceReference needs url+digest; SourceProvenance must not treat hallucinated URL as verified source.", en: "[1] is CitationAnchor; full SourceReference needs url+digest; SourceProvenance must not treat hallucinated URL as verified source.", ja: "Hallucinated URL not verified source."}

    field_values:
      media_type_only: application/pdf
    related_node_ids:
      - SourceReference
      - SourceProvenance
    related_relation_ids:
      - SourceReference-has_provenance-SourceProvenance

    source_claims:
      - claim-source-provenance-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceReference-has_provenance-SourceProvenance
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有来源出处
    en: has provenance
    ja: 出典来歴を持つ
  definitions:
    zh: SourceReference has_provenance SourceProvenance 表示被引用来源具有一组可核验的派生、修订、首要来源、生成或归属事实；这些事实说明来源历史，而不是引用的显示方式。
    en: SourceReference has_provenance SourceProvenance means that the referenced source has a verifiable set of derivation, revision, primary-source, generation, or attribution facts. Those facts state source history rather than how the reference is displayed.
    ja: SourceReference has_provenance SourceProvenance は、referenced source が derivation・revision・primary source・generation・attribution の検証可能 fact set を持つことを表します。これらは参照の表示方法ではなく source history を示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：has provenance
      en: is target of has provenance
      ja: 逆方向：has provenance
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_provenance-SourceProvenance-example-positive-001
      labels:
        zh: has provenance正例
        en: Positive example of has provenance
        ja: has provenanceの正例
      scenario_id: null
      descriptions:
        zh: runbook:v7 的 SourceReference 连接 prov-runbook-v7；该出处记录明确 v7 wasRevisionOf v6，并记录修订活动与归属主体。
        en: The SourceReference for runbook:v7 links to prov-runbook-v7, which states that v7 wasRevisionOf v6 and records the revision activity and attributed agent.
        ja: runbook:v7 の SourceReference は prov-runbook-v7 に結び、v7 wasRevisionOf v6 と revision activity・attributed agent を記録します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceProvenance
      related_relation_ids:
        - SourceReference-has_provenance-SourceProvenance
      source_claims:
        - claim-source-provenance-011
    - id: SourceReference-has_provenance-SourceProvenance-example-boundary-001
      labels:
        zh: has provenance边界例
        en: Boundary case for has provenance
        ja: has provenanceの境界例
      scenario_id: null
      descriptions:
        zh: ResourceDescriptor 只给出标题与媒体类型，另有一个未指明对象的出处记录；没有证据表明该出处属于当前 SourceReference。
        en: A ResourceDescriptor gives only a title and media type while an unscoped provenance record appears elsewhere; no evidence shows that the provenance belongs to the current SourceReference.
        ja: ResourceDescriptor は title と media type だけを示し、scope 未指定の provenance record が別に存在しますが、その provenance が current SourceReference に属する証拠はありません。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceProvenance
      related_relation_ids:
        - SourceReference-has_provenance-SourceProvenance
      source_claims:
        - claim-source-provenance-012
  source_claims:
    - claim-source-provenance-013
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-source-provenance-001
    source: eng-ont-prov-o
    supports: PROV-O explains why secondary sources reference primary sources so reliability can be investigated; SourceProvenance records such lineage facts.
    locator: §3.2 expanded properties, prov:hadPrimarySource, lines 1604–1607
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-002
    source: eng-ont-prov-o
    supports: "PROV-O explains why secondary sources reference primary sources so reliability can be investigated; SourceProvenance records such lineage facts. For SourceProvenance.provenance_id, the field records this reviewed value: Stably identifies a reviewed set of source-history facts."
    locator: §3.2 expanded properties, prov:hadPrimarySource, lines 1604–1607
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-003
    source: eng-ont-prov-o
    supports: PROV-O defines distinct relations for derivation, revision, primary source, generation, and attribution. SourceProvenance preserves that distinction instead of collapsing every fact into derived_from.
    locator: §3.2 > derivation, revision, primary source, generation, and attribution properties
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-004
    source: eng-ont-prov-o
    supports: PROV-O relates identified entities through derivation, revision, and primary-source properties.
    locator: §3.2 > prov:wasDerivedFrom, prov:wasRevisionOf, prov:hadPrimarySource
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-005
    source: eng-ont-prov-o
    supports: PROV-O relates an entity state to the activity responsible for its generation.
    locator: §3.2 > prov:wasGeneratedBy and prov:Generation
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-006
    source: eng-ont-prov-o
    supports: PROV-O relates an entity to the agent bearing attributed responsibility.
    locator: §3.2 > prov:wasAttributedTo and prov:Attribution
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-007
    source: eng-ont-prov-o
    supports: PROV-O provenance properties relate identified entities to other entities, activities, or agents. Moonweave validates that endpoint role explicitly.
    locator: §3.2 > Entity influence and qualified provenance relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-008
    source: eng-ont-prov-o
    supports: "PROV-O explains why secondary sources reference primary sources so reliability can be investigated; SourceProvenance records such lineage facts. This evidence supports the manually reviewed positive case for SourceProvenance: prov-runbook-v7 records that v7 wasRevisionOf v6 and links the revision activity."
    locator: §3.2 expanded properties, prov:hadPrimarySource, lines 1604–1607
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-009
    source: eng-ont-prov-o
    supports: "PROV-O explains why secondary sources reference primary sources so reliability can be investigated; SourceProvenance records such lineage facts. This evidence supports the manually reviewed instance case for SourceProvenance: A research report's provenance descriptor points to an official standard through hadPrimarySource."
    locator: §3.2 expanded properties, prov:hadPrimarySource, lines 1604–1607
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-010
    source: eng-ont-prov-o
    supports: "PROV-O explains why secondary sources reference primary sources so reliability can be investigated; SourceProvenance records such lineage facts. This evidence supports the manually reviewed boundary case for SourceProvenance: version_value=v7 only names the current revision and states no derivation relation."
    locator: §3.2 expanded properties, prov:hadPrimarySource, lines 1604–1607
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-011
    source: eng-ont-prov-o
    supports: PROV-O defines wasRevisionOf, wasGeneratedBy, wasAttributedTo, and related provenance properties for an entity. The runbook example applies those properties to the entity referenced by SourceReference.
    locator: W3C PROV-O Recommendation §3.2 > derivation, revision, generation, attribution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-012
    source: eng-ont-prov-o
    supports: PROV-O provenance properties relate a particular entity to its source, activity, or agent. A title, media type, or unscoped provenance record does not establish that entity-specific relation.
    locator: W3C PROV-O Recommendation §3.2 > Entity influence and qualified provenance relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-provenance-013
    source: eng-ont-prov-o
    supports: PROV-O defines provenance as information about entities, activities, and agents involved in producing a piece of data or thing, including derivation, generation, attribution, revision, and primary-source facts. Moonweave attaches that fact set to the SourceReference that identifies the referenced entity.
    locator: W3C PROV-O Recommendation §1.1 and §3.2 > Entity provenance relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

