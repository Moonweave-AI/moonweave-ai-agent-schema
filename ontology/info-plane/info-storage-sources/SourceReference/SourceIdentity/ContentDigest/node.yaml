schema: moonweave.ai/ontology-node/v1
id: ContentDigest
kind: concept
labels:
  zh: 内容摘要记录
  en: content digest record
  ja: 内容ダイジェスト記録
semantics:
  short_definition:
    zh: 固定 cited 内容状态的 cryptographic digest。
    en: Cryptographic digest fixing cited content state.
    ja: cited content state を固定する cryptographic digest。
  definition:
    zh: ContentDigest 常用 SHA-256 over normalized cited bytes；重读 live content 时 digest 不匹配则拒绝 same-evidence 并记录 revision drift。
    en: ContentDigest commonly SHA-256 over normalized cited bytes; digest mismatch on reread rejects same-evidence and records revision drift.
    ja: ContentDigest は cited state 検証。
  why_needed:
    zh: RFC 9530 的字段值以算法键关联 checksum 输出；将算法、适用范围和输出值保存在同一结构记录中，才能完整比较、验证和传递该断言，避免把无身份的值误建为分类层。
    en: RFC 9530 field values associate an algorithm key with checksum output. Keeping algorithm, scope, and output in one structured record makes the assertion comparable, verifiable, and transferable without turning an identity-free value into a taxonomic layer.
    ja: RFC 9530 field value は algorithm key と checksum output を関連付けます。algorithm・scope・output を一つの structured record に保持し、比較・検証・伝達を可能にして identity のない value を taxonomy layer にしません。
  includes:
    - zh: 带 algorithm、checksum_bytes 和 applies_to=content|representation 的完整摘要断言。
      en: Complete digest assertions carrying algorithm, checksum_bytes, and applies_to=content or representation.
      ja: algorithm・checksum_bytes・applies_to=content|representation を持つ complete digest assertion。
  excludes:
    - zh: 没有算法或适用范围的裸字节、版本标签、签名证书，以及仅靠 checksum 值建立的独立来源对象。
      en: Raw bytes lacking an algorithm or applicability scope, version labels, signing certificates, and independent source objects identified only by a checksum value.
      ja: algorithm または applicability scope のない raw byte・version label・signing certificate・checksum value だけで識別する独立 source object。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: content_digest_sha256 字段 pattern ^[a-f0-9]{64}$。
    en: content_digest_sha256 field pattern ^[a-f0-9]{64}$.
    ja: sha256 pattern。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - algorithm
    - applies_to
    - checksum_bytes
  fields:
    - id: algorithm
      labels:
        zh: 摘要算法键
        en: digest algorithm key
        ja: ダイジェストアルゴリズムキー
      definitions:
        zh: 声明生成 checksum 字节的注册算法。
        en: Declares the registered algorithm that produced the checksum bytes.
        ja: checksum byte を生成した registered algorithm を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha-256
      allowed_values: []
      source_claims:
        - claim-content-digest-002
    - id: applies_to
      labels:
        zh: 摘要适用对象
        en: digest applicability
        ja: ダイジェスト適用対象
      definitions:
        zh: 区分摘要覆盖 HTTP message content 还是 selected representation。
        en: Distinguishes whether the digest covers HTTP message content or the selected representation.
        ja: digest が HTTP message content か selected representation のどちらを覆うか区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: representation
      allowed_values: []
      source_claims:
        - claim-content-digest-003
    - id: checksum_bytes
      labels:
        zh: 校验输出字节
        en: checksum output bytes
        ja: チェックサム出力バイト
      definitions:
        zh: 保存由 algorithm 字段所指注册算法对 applies_to 所指字节序列生成的规范字节编码；该值必须与算法和适用对象一同解释。
        en: Carries the canonical byte encoding produced over the byte sequence identified by applies_to using the registered algorithm named by algorithm; the value must be interpreted with both algorithm and applicability.
        ja: algorithm field が示す registered algorithm を applies_to が示す byte sequence に適用して得た canonical byte encoding を保持し、algorithm と applicability と一緒に解釈します。
      datatype: base64
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: d435Qo+nKZ+gLcUHn7GQtQ72hiBVAgqoLsZnZPiTGPk=
      allowed_values: []
      source_claims:
        - claim-content-digest-004
  constraints: []
  required_relations: []
examples:
  - id: ContentDigest-example-match
    labels:
      zh: digest 匹配
      en: Digest match
      ja: digest match
    descriptions:
      zh: 重读 digest 匹配，citation 有效。
      en: Reread digest matches; citation valid.
      ja: digest match。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: match
    field_values:
      content_digest_sha256: 355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e
    related_node_ids:
      - ContentDigest
    related_relation_ids: []
    source_claims:
      - claim-content-digest-design
  - id: ContentDigest-example-drift
    labels:
      zh: revision drift
      en: Revision drift
      ja: revision drift
    descriptions:
      zh: digest 不匹配记录 drift 并拒绝 same-evidence。
      en: Digest mismatch records drift and rejects same-evidence.
      ja: drift。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: drift
    field_values: {}
    related_node_ids:
      - ContentDigest
    related_relation_ids: []
    source_claims:
      - claim-content-digest-design
  - id: ContentDigest-example-optional
    labels:
      zh: 可选 digest
      en: Optional digest
      ja: optional digest
    descriptions:
      zh: 无 digest 的引用可解析但 immutable citation 断言受限。
      en: References without digest may resolve but immutable citation claims are limited.
      ja: optional digest。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: optional
    field_values: {}
    related_node_ids:
      - ContentDigest
    related_relation_ids: []
    source_claims:
      - claim-content-digest-design
parent_relation:
  id: SourceIdentity-has_digest-ContentDigest
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有摘要
    en: has digest
    ja: ダイジェストを持つ
  definitions:
    zh: 来源状态身份具有摘要关系把 SourceIdentity 连接到覆盖指定 content 或 representation 的完整性断言；摘要是身份组成而非 SourceIdentity 子类。
    en: SourceIdentity has_digest ContentDigest links a source-state identity to an integrity assertion over specified content or representation; the digest is an identity component rather than a SourceIdentity subtype.
    ja: SourceIdentity has_digest ContentDigest は source-state identity を指定 content/representation の integrity assertion に結び、digest は SourceIdentity subtype でなく identity component です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有摘要
      en: inverse of has digest
      ja: 逆：ダイジェストを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceIdentity-has_digest-ContentDigest-example-positive-manual-001
      labels:
        zh: SourceIdentity-has_digest-ContentDigest正例
        en: SourceIdentity-has_digest-ContentDigest positive case
        ja: SourceIdentity-has_digest-ContentDigest正例
      descriptions:
        zh: source-state-a 连接覆盖 selected representation 的 sha-256 摘要。
        en: source-state-a links to a SHA-256 digest over the selected representation.
        ja: source-state-a は selected representation の SHA-256 digest に接続します。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - ContentDigest
      related_relation_ids:
        - SourceIdentity-has_digest-ContentDigest
      source_claims:
        - claim-content-digest-008
    - id: SourceIdentity-has_digest-ContentDigest-example-boundary-manual-001
      labels:
        zh: SourceIdentity-has_digest-ContentDigest边界例
        en: SourceIdentity-has_digest-ContentDigest boundary case
        ja: SourceIdentity-has_digest-ContentDigest境界例
      descriptions:
        zh: 一个 sha-256 字符串与状态记录同页显示，但未绑定。
        en: A SHA-256 string is displayed on the same page as the state record but is not bound to it.
        ja: SHA-256 string が state record と同じ page に表示されるが bound されていません。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - ContentDigest
      related_relation_ids:
        - SourceIdentity-has_digest-ContentDigest
      source_claims:
        - claim-content-digest-009
  source_claims:
    - claim-content-digest-010
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-content-digest-001
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines checksum as algorithm output and digest only for field values; ContentDigest models the structured assertion rather than raw checksum bytes.
    locator: RFC 9530 §1.2 Terminology, paragraphs 159–163
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-002
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines checksum as algorithm output and digest only for field values; ContentDigest models the structured assertion rather than raw checksum bytes. For ContentDigest.algorithm, the field records this reviewed value: Declares the registered algorithm that produced the checksum bytes."
    locator: RFC 9530 §1.2 Terminology, paragraphs 159–163
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-003
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines checksum as algorithm output and digest only for field values; ContentDigest models the structured assertion rather than raw checksum bytes. For ContentDigest.applies_to, the field records this reviewed value: Distinguishes whether the digest covers HTTP message content or the selected representation."
    locator: RFC 9530 §1.2 Terminology, paragraphs 159–163
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-004
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines a checksum as algorithm output over a byte sequence and encodes digest field values under the corresponding algorithm key; checksum_bytes records that output inside the structured ContentDigest assertion.
    locator: RFC 9530 §1.2 Terminology and §2 Digest Fields
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-005
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines checksum as algorithm output and digest only for field values; ContentDigest models the structured assertion rather than raw checksum bytes. This evidence supports the manually reviewed positive case for ContentDigest: algorithm=sha-256, applies_to=representation, and an encoded value jointly form a Repr-Digest assertion."
    locator: RFC 9530 §1.2 Terminology, paragraphs 159–163
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-006
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines checksum as algorithm output and digest only for field values; ContentDigest models the structured assertion rather than raw checksum bytes. This evidence supports the manually reviewed instance case for ContentDigest: One SourceIdentity stores both SHA-256 and SHA-512 ContentDigest records."
    locator: RFC 9530 §1.2 Terminology, paragraphs 159–163
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-007
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines checksum as algorithm output and digest only for field values; ContentDigest models the structured assertion rather than raw checksum bytes. This evidence supports the manually reviewed boundary case for ContentDigest: A 32-byte value has no algorithm key and does not say whether it covers content or representation."
    locator: RFC 9530 §1.2 Terminology, paragraphs 159–163
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-008
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines Content-Digest as an algorithm-keyed digest over actual message content; Moonweave composes such integrity assertions into source-state identity. This evidence supports the manually reviewed positive case for SourceIdentity-has_digest-ContentDigest: source-state-a links to a SHA-256 digest over the selected representation."
    locator: RFC 9530 §2 Content-Digest, paragraphs 165–168
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-009
    source: eng-proto-rfc9530-digest-fields
    supports: "RFC 9530 defines Content-Digest as an algorithm-keyed digest over actual message content; Moonweave composes such integrity assertions into source-state identity. This evidence supports the manually reviewed boundary case for SourceIdentity-has_digest-ContentDigest: A SHA-256 string is displayed on the same page as the state record but is not bound to it."
    locator: RFC 9530 §2 Content-Digest, paragraphs 165–168
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-010
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines Content-Digest as an algorithm-keyed digest over actual message content; Moonweave composes such integrity assertions into source-state identity.
    locator: RFC 9530 §2 Content-Digest, paragraphs 165–168
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-digest-design
    source: src-info-sources-design
    supports: ContentDigest verifies cited content state and detects revision drift.
    locator: ContentDigest
    evidence_kind: design-inference
    confidence: high
