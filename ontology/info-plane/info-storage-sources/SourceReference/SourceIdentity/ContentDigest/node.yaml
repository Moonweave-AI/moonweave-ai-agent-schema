schema: moonweave.ai/ontology-node/v1
id: ContentDigest
kind: concept
status: review
labels:
  zh: 内容摘要记录
  en: content digest record
  ja: 内容ダイジェスト記録
semantics:
  short_definition:
    zh: 以算法键和编码 checksum 值声明内容完整性的身份组成。
    en: An identity component asserting content integrity with an algorithm key and encoded checksum value.
    ja: algorithm key と encoded checksum value で content integrity を主張する identity component。
  definition:
    zh: 内容摘要记录是 SourceIdentity 的组成信息，以注册算法键、适用字节序列类别和编码后的 checksum 输出共同构成一条可传递完整性断言；算法、适用对象和值缺一不可，不再把 checksum 字节拆成独立节点。
    en: ContentDigest is a SourceIdentity component forming one transferable integrity assertion from a registered algorithm key, the applicable byte-sequence category, and encoded checksum output; algorithm, applicability, and value are inseparable, so checksum bytes are not modeled as another node.
    ja: ContentDigest は registered algorithm key・適用 byte-sequence category・encoded checksum output から一つの transferable integrity assertion を構成する SourceIdentity component です。algorithm・applicability・value は不可分で、checksum byte を別 node にしません。
  why_needed:
    zh: RFC 9530 的字段值以算法键关联 checksum 输出；将算法、适用范围和输出值保存在同一结构记录中，才能完整比较、验证和传递该断言，避免把无身份的值误建为分类层。
    en: RFC 9530 field values associate an algorithm key with checksum output. Keeping algorithm, scope, and output in one structured record makes the assertion comparable, verifiable, and transferable without turning an identity-free value into a taxonomic layer.
    ja: RFC 9530 field value は algorithm key と checksum output を関連付けます。algorithm・scope・output を一つの structured record に保持し、比較・検証・伝達を可能にして identity のない value を taxonomy layer にしません。
  includes:
    - zh: 带 algorithm、checksum_bytes 和 applies_to=content|representation 的完整摘要断言。
      en: Complete digest assertions carrying algorithm, checksum_bytes, and applies_to=content or representation.
      ja: algorithm・checksum_bytes・applies_to=content|representation を持つ complete digest assertion。
  excludes:
    - zh: 没有算法或适用范围的裸字节、版本标签、签名证书，以及仅靠 checksum 值建立的独立来源对象。
      en: Raw bytes lacking an algorithm or applicability scope, version labels, signing certificates, and independent source objects identified only by a checksum value.
      ja: algorithm または applicability scope のない raw byte・version label・signing certificate・checksum value だけで識別する独立 source object。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - algorithm
    - applies_to
    - checksum_bytes
  fields:
    - id: algorithm
      labels:
        zh: 摘要算法键
        en: digest algorithm key
        ja: ダイジェストアルゴリズムキー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明生成 checksum 字节的注册算法。
        en: Declares the registered algorithm that produced the checksum bytes.
        ja: checksum byte を生成した registered algorithm を宣言します。
      allowed_values: []
      pattern: null
      example_value: sha-256
      source_claims:
        - claim-content-digest-002
    - id: applies_to
      labels:
        zh: 摘要适用对象
        en: digest applicability
        ja: ダイジェスト適用対象
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分摘要覆盖 HTTP message content 还是 selected representation。
        en: Distinguishes whether the digest covers HTTP message content or the selected representation.
        ja: digest が HTTP message content か selected representation のどちらを覆うか区別します。
      allowed_values: []
      pattern: null
      example_value: representation
      source_claims:
        - claim-content-digest-003
    - id: checksum_bytes
      labels:
        zh: 校验输出字节
        en: checksum output bytes
        ja: チェックサム出力バイト
      datatype: base64
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存由 algorithm 字段所指注册算法对 applies_to 所指字节序列生成的规范字节编码；该值必须与算法和适用对象一同解释。
        en: Carries the canonical byte encoding produced over the byte sequence identified by applies_to using the registered algorithm named by algorithm; the value must be interpreted with both algorithm and applicability.
        ja: algorithm field が示す registered algorithm を applies_to が示す byte sequence に適用して得た canonical byte encoding を保持し、algorithm と applicability と一緒に解釈します。
      allowed_values: []
      pattern: null
      example_value: d435Qo+nKZ+gLcUHn7GQtQ72hiBVAgqoLsZnZPiTGPk=
      source_claims:
        - claim-content-digest-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContentDigest-example-positive-manual-001
    kind: positive
    labels:
      zh: 内容摘要记录正例
      en: content digest record positive case
      ja: 内容ダイジェスト記録正例
    scenario_id: null
    descriptions:
      zh: algorithm=sha-256、applies_to=representation 与编码值共同形成 Repr-Digest 断言。
      en: algorithm=sha-256, applies_to=representation, and an encoded value jointly form a Repr-Digest assertion.
      ja: algorithm=sha-256・applies_to=representation・encoded value が Repr-Digest assertion を構成します。
    field_values:
      algorithm: sha-256
      applies_to: representation
      checksum_bytes: d435Qo+nKZ+gLcUHn7GQtQ72hiBVAgqoLsZnZPiTGPk=
    related_node_ids:
      - SourceIdentity
      - ContentDigest
    related_relation_ids:
      - SourceIdentity-has_digest-ContentDigest
    expected_result:
      zh: ContentDigest 保持其已审查身份，并按定义解释 SourceIdentity-has_digest-ContentDigest。
      en: Retain the reviewed identity of ContentDigest and interpret SourceIdentity-has_digest-ContentDigest exactly as defined.
      ja: ContentDigest の reviewed identity を保持し SourceIdentity-has_digest-ContentDigest を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 摘要算法、适用表示范围和摘要值均已明确。
      en: Algorithm, applicable representation, and digest value are explicit.
      ja: algorithm・applicable representation・digest value が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-content-digest-005
  - id: ContentDigest-example-instance-manual-002
    kind: instance
    labels:
      zh: 内容摘要记录实例
      en: content digest record instance case
      ja: 内容ダイジェスト記録実例
    scenario_id: null
    descriptions:
      zh: 同一 SourceIdentity 同时保存 sha-256 与 sha-512 两条 ContentDigest。
      en: One SourceIdentity stores both SHA-256 and SHA-512 ContentDigest records.
      ja: 一 SourceIdentity が SHA-256 と SHA-512 の ContentDigest record を保存します。
    field_values:
      algorithm: sha-256
      applies_to: representation
    related_node_ids:
      - SourceIdentity
      - ContentDigest
    related_relation_ids:
      - SourceIdentity-has_digest-ContentDigest
    expected_result:
      zh: ContentDigest 保持其已审查身份，并按定义解释 SourceIdentity-has_digest-ContentDigest。
      en: Retain the reviewed identity of ContentDigest and interpret SourceIdentity-has_digest-ContentDigest exactly as defined.
      ja: ContentDigest の reviewed identity を保持し SourceIdentity-has_digest-ContentDigest を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 不同算法的摘要断言保持独立且可并存。
      en: Digest assertions for different algorithms remain independent and can coexist.
      ja: 異なる algorithm の digest assertion は独立して共存できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-content-digest-006
  - id: ContentDigest-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 内容摘要记录边界例
      en: content digest record boundary case
      ja: 内容ダイジェスト記録境界例
    scenario_id: null
    descriptions:
      zh: 32 字节值没有算法键，也没有说明覆盖 content 还是 representation。
      en: A 32-byte value has no algorithm key and does not say whether it covers content or representation.
      ja: 32-byte value は algorithm key も content/representation applicability も持ちません。
    field_values:
      algorithm: sha-256
      applies_to: representation
    related_node_ids:
      - SourceIdentity
      - ContentDigest
    related_relation_ids:
      - SourceIdentity-has_digest-ContentDigest
    expected_result:
      zh: 不把该对象归入 ContentDigest，也不凭邻近或词形推断 SourceIdentity-has_digest-ContentDigest。
      en: Do not classify the object as ContentDigest or infer SourceIdentity-has_digest-ContentDigest from proximity or lexical form.
      ja: object を ContentDigest に分類せず proximity/lexical form から SourceIdentity-has_digest-ContentDigest を推論しません。
    why_valid_or_invalid:
      zh: 这是未解释的 checksum 字节，不是 ContentDigest 记录。
      en: These are uninterpreted checksum bytes, not a ContentDigest record.
      ja: これは uninterpreted checksum byte で ContentDigest record ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-content-digest-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceIdentity-has_digest-ContentDigest
  predicate: has_digest
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有摘要
    en: has digest
    ja: ダイジェストを持つ
  definitions:
    zh: 来源状态身份具有摘要关系把 SourceIdentity 连接到覆盖指定 content 或 representation 的完整性断言；摘要是身份组成而非 SourceIdentity 子类。
    en: SourceIdentity has_digest ContentDigest links a source-state identity to an integrity assertion over specified content or representation; the digest is an identity component rather than a SourceIdentity subtype.
    ja: SourceIdentity has_digest ContentDigest は source-state identity を指定 content/representation の integrity assertion に結び、digest は SourceIdentity subtype でなく identity component です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: is_target_of_has_digest
    labels:
      zh: 反向：具有摘要
      en: inverse of has digest
      ja: 逆：ダイジェストを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceIdentity-has_digest-ContentDigest-example-positive-manual-001
      kind: positive
      labels:
        zh: SourceIdentity-has_digest-ContentDigest正例
        en: SourceIdentity-has_digest-ContentDigest positive case
        ja: SourceIdentity-has_digest-ContentDigest正例
      scenario_id: null
      descriptions:
        zh: source-state-a 连接覆盖 selected representation 的 sha-256 摘要。
        en: source-state-a links to a SHA-256 digest over the selected representation.
        ja: source-state-a は selected representation の SHA-256 digest に接続します。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - ContentDigest
      related_relation_ids:
        - SourceIdentity-has_digest-ContentDigest
      expected_result:
        zh: 建立 SourceIdentity —has_digest→ ContentDigest，并保持该方向与限定条件。
        en: Assert SourceIdentity —has_digest→ ContentDigest while preserving its direction and qualifiers.
        ja: SourceIdentity —has_digest→ ContentDigest を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 摘要算法、适用范围和值均与该状态绑定。
        en: Digest algorithm, applicability, and value are bound to that state.
        ja: digest algorithm・applicability・value が state に結び付きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-content-digest-008
    - id: SourceIdentity-has_digest-ContentDigest-example-boundary-manual-001
      kind: boundary
      labels:
        zh: SourceIdentity-has_digest-ContentDigest边界例
        en: SourceIdentity-has_digest-ContentDigest boundary case
        ja: SourceIdentity-has_digest-ContentDigest境界例
      scenario_id: null
      descriptions:
        zh: 一个 sha-256 字符串与状态记录同页显示，但未绑定。
        en: A SHA-256 string is displayed on the same page as the state record but is not bound to it.
        ja: SHA-256 string が state record と同じ page に表示されるが bound されていません。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - ContentDigest
      related_relation_ids:
        - SourceIdentity-has_digest-ContentDigest
      expected_result:
        zh: 拒绝建立 SourceIdentity-has_digest-ContentDigest，两端对象仍保留各自身份。
        en: Reject SourceIdentity-has_digest-ContentDigest; both endpoint objects retain their own identities.
        ja: SourceIdentity-has_digest-ContentDigest を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 显示邻近不能建立 has_digest 组成事实。
        en: Display proximity cannot establish a has_digest composition fact.
        ja: display proximity は has_digest composition fact を確立できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-content-digest-009
  source_claims:
    - claim-content-digest-010
  distinct_fact_rationale:
    zh: SourceIdentity-has_digest-ContentDigest 记录 SourceIdentity 到 ContentDigest 的单一 has_digest 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceIdentity-has_digest-ContentDigest records one has_digest fact from SourceIdentity to ContentDigest; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceIdentity-has_digest-ContentDigest は SourceIdentity から ContentDigest への一 has_digest fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
