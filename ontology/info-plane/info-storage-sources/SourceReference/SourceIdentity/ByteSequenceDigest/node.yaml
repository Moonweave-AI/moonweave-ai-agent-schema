schema: moonweave.ai/ontology-node/v1
id: ByteSequenceDigest
kind: concept
status: accepted
labels:
  zh: 字节序列摘要
  en: Byte Sequence Digest
  ja: バイト列ダイジェスト
semantics:
  short_definition:
    zh: 将已声明字节序列与算法和编码后的摘要值关联的本地来源身份记录。
    en: A local source-identity record that associates a declared byte sequence with an algorithm and encoded digest value.
    ja: 宣言されたバイト列をアルゴリズムおよび符号化済みダイジェスト値に関連付けるローカルなソース識別記録。
  definition:
    zh: ByteSequenceDigest 是 SourceIdentity 的一种，以摘要算法、编码和摘要值记录一个已声明字节序列的可比较特征。它适用于文件字节、序列化字节或其他明确的字节捕获，但不是 HTTP Content-Digest 或 Repr-Digest 字段，也不携带字节正文、作者身份、访问授权、来源版本或未来不变性保证。
    en: ByteSequenceDigest is a kind of SourceIdentity that records a comparable characteristic of a declared byte sequence with a digest algorithm, encoding, and digest value. It applies to file bytes, serialized bytes, or another explicit byte capture, but is not an HTTP Content-Digest or Repr-Digest field and carries neither byte body, author identity, access authorization, source version, nor a future-immutability guarantee.
    ja: ByteSequenceDigest は、ダイジェストアルゴリズム、符号化、ダイジェスト値によって宣言済みバイト列の比較可能な特性を記録する SourceIdentity の一種です。ファイルバイト、直列化バイト、その他の明示的なバイト取得に適用されますが、HTTP Content-Digest または Repr-Digest フィールドではなく、バイト本文、著者識別、アクセス認可、ソース版、将来の不変性保証を保持しません。
  why_needed:
    zh: 需要在不嵌入文件正文时比较同一捕获的字节。把算法、编码和字节序列标识显式记录，可避免把只是一串校验值的文本误当成版本号或 HTTP 完整性字段。
    en: Systems need to compare bytes from the same capture without embedding the file body. Recording algorithm, encoding, and byte-sequence identifier explicitly prevents an unscoped checksum string from being mistaken for a version number or HTTP integrity field.
    ja: システムはファイル本文を埋め込まずに同じ取得物のバイトを比較する必要があります。アルゴリズム、符号化、バイト列識別子を明示的に記録することで、範囲のないチェックサム文字列が版番号または HTTP 完全性フィールドと誤認されることを防ぎます。
  includes:
    - zh: 文件、序列化对象或明确字节捕获的 SHA-2 摘要记录及其算法和编码。
      en: SHA-2 digest records for file bytes, serialized objects, or explicit byte captures together with their algorithm and encoding.
      ja: ファイルバイト、直列化オブジェクト、または明示的なバイト取得の SHA-2 ダイジェスト記録と、そのアルゴリズムおよび符号化。
  excludes:
    - zh: 实际字节正文、HTTP 完整性字段、发布者版本标签、ETag、签名、访问授权和对来源可信度的判断。
      en: Actual byte body, HTTP integrity fields, publisher version labels, ETags, signatures, access authorization, and judgments of source trustworthiness.
      ja: 実際のバイト本文、HTTP 完全性フィールド、発行者版ラベル、ETag、署名、アクセス認可、ソース信頼性の判断。
  semantic_kind: information
  aliases:
    - byte-digest-record
    - file-byte-digest
engineering:
  explanation:
    zh: 在捕获边界接收 byte_sequence_identifier、digest_algorithm、digest_encoding 和 digest_value。实现必须先确定待比较的精确字节序列，再按声明算法计算并按声明编码保存输出；重新编码、重新序列化或选择不同字节都会要求重新计算，摘要匹配也不能替代签名或版本机制。
    en: At the capture boundary, accept byte_sequence_identifier, digest_algorithm, digest_encoding, and digest_value. An implementation must first determine the exact byte sequence to compare, then calculate with the declared algorithm and store the output in the declared encoding; re-encoding, reserialization, or selecting different bytes requires recomputation, and a matching digest cannot replace a signature or version mechanism.
    ja: 取得境界では byte_sequence_identifier、digest_algorithm、digest_encoding、digest_value を受け取ります。実装はまず比較対象の正確なバイト列を定め、宣言されたアルゴリズムで計算し宣言された符号化で出力を保存します。再符号化、再直列化、異なるバイト選択には再計算が必要であり、一致するダイジェストは署名または版機構を置き換えません。
  typical_input:
    - description:
        zh: 已捕获文件字节的 SHA-256 摘要记录输入
        en: SHA-256 digest-record input for captured file bytes
        ja: 取得済みファイルバイトの SHA-256 ダイジェスト記録入力
      format: '{"byte_sequence_identifier":"file:release-manifest.json#bytes","digest_algorithm":"sha-256","digest_encoding":"hex-lower","digest_value":"ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad"}'
      source_claims:
        - claim-fips1804-byte-sequence-digest
  typical_output:
    - description:
        zh: 不含文件正文的可比较字节摘要记录
        en: Comparable byte-digest record without the file body
        ja: ファイル本文を含まない比較可能なバイトダイジェスト記録
      format: '{"byte_sequence_identifier":"file:release-manifest.json#bytes","digest_algorithm":"sha-256","digest_encoding":"hex-lower","digest_value":"ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad"}'
      source_claims:
        - claim-fips1804-byte-sequence-digest
  reference_implementations:
    - name: NIST FIPS 180-4 Secure Hash Standard
      url: https://csrc.nist.gov/pubs/fips/180-4/final
      description: Specifies SHA message-digest algorithms over a message input.
structure:
  identity_keys:
    - canonical_identifier
    - identity_basis
    - byte_sequence_identifier
    - digest_algorithm
    - digest_encoding
    - digest_value
  fields:
    - id: canonical_identifier
      labels:
        zh: 规范字节捕获标识
        en: Canonical byte-capture identifier
        ja: 正規バイト取得識別子
      definitions:
        zh: 继承自 SourceIdentity 的稳定标识；在本子类型中必须与 byte_sequence_identifier 相等，因此它标识被摘要覆盖的精确字节捕获，而不是文件正文或 HTTP 字段。
        en: Stable identifier inherited from SourceIdentity. In this subtype it must equal byte_sequence_identifier, so it identifies the exact byte capture covered by the digest rather than a file body or HTTP field.
        ja: SourceIdentity から継承する安定識別子。この下位型では byte_sequence_identifier と等しくなければならず、ファイル本文又は HTTP フィールドではなくダイジェスト対象の正確なバイト取得物を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:release-manifest.json#bytes
      allowed_values: []
      source_claims:
        - claim-fips1804-byte-sequence-digest
    - id: identity_basis
      labels:
        zh: 身份复核依据
        en: Identity verification basis
        ja: 識別確認基準
      definitions:
        zh: 继承自 SourceIdentity 的复核依据；在本子类型中固定为 digest，表示该记录以声明算法、编码和字节捕获下的摘要作为身份依据。
        en: Verification basis inherited from SourceIdentity. It is fixed to digest in this subtype, meaning that identity is reviewed from the digest under the declared algorithm, encoding, and byte capture.
        ja: SourceIdentity から継承する確認基準。この下位型では digest に固定され、宣言したアルゴリズム、符号化及びバイト取得物におけるダイジェストで識別を確認することを示す。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: digest
      allowed_values:
        - digest
      source_claims:
        - claim-fips1804-byte-sequence-digest
    - id: version_or_digest_ref
      labels:
        zh: 算法限定摘要引用
        en: Algorithm-qualified digest reference
        ja: アルゴリズム限定ダイジェスト参照
      definitions:
        zh: 继承的补充身份值；在本子类型中以 `digest_algorithm:digest_encoding:digest_value` 的本地可比较形式重复声明摘要，不定义新的 HTTP 字段语法。
        en: Inherited supplementary identity value. In this subtype it restates the digest in the locally comparable form `digest_algorithm:digest_encoding:digest_value`; it does not define a new HTTP-field syntax.
        ja: 継承した補助識別値。この下位型では `digest_algorithm:digest_encoding:digest_value` というローカルで比較可能な形式でダイジェストを再表現し、新たな HTTP フィールド構文を定義しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha-256:hex-lower:ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad
      allowed_values: []
      source_claims:
        - claim-fips1804-byte-sequence-digest
    - id: byte_sequence_identifier
      labels:
        zh: 字节序列标识
        en: Byte-sequence identifier
        ja: バイト列識別子
      definitions:
        zh: 调用方用于区分本摘要所覆盖精确字节捕获的本地标识；它不是字节正文。
        en: Local identifier used by the caller to distinguish the exact byte capture covered by this digest; it is not the byte body.
        ja: このダイジェストが対象とする正確なバイト取得物を区別するために呼び出し側が用いるローカル識別子であり、バイト本文ではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:release-manifest.json#bytes
      allowed_values: []
      source_claims:
        - claim-fips1804-byte-sequence-digest
    - id: digest_algorithm
      labels:
        zh: 摘要算法
        en: Digest algorithm
        ja: ダイジェストアルゴリズム
      definitions:
        zh: 产生 digest_value 的受支持 SHA-2 算法标识。
        en: Supported SHA-2 algorithm identifier that produces digest_value.
        ja: digest_value を生成するサポート対象の SHA-2 アルゴリズム識別子。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha-256
      allowed_values:
        - sha-256
        - sha-384
        - sha-512
      source_claims:
        - claim-fips1804-byte-sequence-digest
    - id: digest_encoding
      labels:
        zh: 摘要编码
        en: Digest encoding
        ja: ダイジェスト符号化
      definitions:
        zh: 用于表示摘要输出值的本地编码约定。
        en: Local encoding convention used to represent the digest output value.
        ja: ダイジェスト出力値を表すために用いるローカル符号化規約。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: hex-lower
      allowed_values:
        - hex-lower
        - base64
      source_claims:
        - claim-fips1804-byte-sequence-digest
    - id: digest_value
      labels:
        zh: 摘要值
        en: Digest value
        ja: ダイジェスト値
      definitions:
        zh: 以 digest_encoding 表示、由 digest_algorithm 对声明字节序列计算得到的非空输出值。
        en: Nonempty output calculated by digest_algorithm over the declared byte sequence and represented with digest_encoding.
        ja: 宣言されたバイト列に対して digest_algorithm が計算し、digest_encoding で表される空でない出力値。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad
      allowed_values: []
      source_claims:
        - claim-fips1804-byte-sequence-digest
  constraints:
    - id: byte-sequence-digest-requires-declared-algorithm-encoding-and-capture
      severity: error
      expression_language: plain
      expression: canonical_identifier must equal byte_sequence_identifier; identity_basis must be digest; version_or_digest_ref must equal digest_algorithm + ":" + digest_encoding + ":" + digest_value; byte_sequence_identifier, digest_algorithm, digest_encoding, and digest_value must be present; verification must hash the same declared byte capture with the same algorithm and compare values using the declared encoding; the record must not assert source trust, authorization, HTTP field semantics, or semantic-version equality.
      explanation:
        zh: 摘要匹配只是在明确算法、编码和字节捕获下的比较。它不表示谁发布了字节、是否有权访问，也不证明发布版本或 HTTP 消息完整性字段。
        en: A digest match is only a comparison under declared algorithm, encoding, and byte capture. It does not state who published the bytes, whether access is authorized, nor prove a publisher version or HTTP message-integrity field.
        ja: ダイジェスト一致は、宣言されたアルゴリズム、符号化、バイト取得物の下での比較にすぎません。誰がバイトを公開したか、アクセスが認可されるか、発行者版または HTTP メッセージ完全性フィールドを証明するものではありません。
      source_claims:
        - claim-fips1804-byte-sequence-digest
        - claim-local-byte-sequence-digest-record
  required_relations: []
