parent_relation:
  id: ByteSequenceDigest-is_a-SourceIdentity
  predicate: is_a
  target: concept:SourceIdentity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种字节摘要来源身份
    en: is a byte-digest source-identity kind of
    ja: バイトダイジェストソース識別の一種である
  definitions:
    zh: ByteSequenceDigest 以显式字节捕获、算法、编码和输出值细化 SourceIdentity。
    en: ByteSequenceDigest refines SourceIdentity with an explicit byte capture, algorithm, encoding, and output value.
    ja: ByteSequenceDigest は、明示的なバイト取得物、アルゴリズム、符号化、出力値で SourceIdentity を詳細化します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  conditions:
    - The digest identity must retain SourceIdentity binding and identify the exact byte capture, algorithm, encoding, and digest output without claiming an HTTP digest field or source immutability.
  temporal_scope: valid-time
  boundary_context: A byte-sequence digest is an identity subtype for a declared byte capture; it is not an HTTP Content-Digest or Repr-Digest header field, a byte payload, an author identity, or an authorization decision.
  constraints: []
  source_claims:
    - claim-fips1804-byte-sequence-digest
  distinct_fact_rationale:
    zh: 该关系是真实分类，因为字节序列摘要仍提供来源身份所需的可复核标识依据，只将该依据收窄为一个明确字节捕获的算法化摘要。
    en: This is genuine classification because a byte-sequence digest still provides a reviewable identifier basis for source identity and only narrows that basis to an algorithmic digest of an explicit byte capture.
    ja: これは真正な分類である。バイト列ダイジェストはソース識別に必要なレビュー可能な識別基準を提供し続け、その基準を明示的なバイト取得物のアルゴリズム的ダイジェストへ狭めるだけである。
  layout_role: primary-backbone
relations: []
sources:
  - id: fips-180-4
    title: FIPS 180-4 Secure Hash Standard
    url: https://csrc.nist.gov/pubs/fips/180-4/final
    source_type: official-standard
    relevance: Specifies SHA hash algorithms that process a message input and produce a message digest.
source_claims:
  - id: claim-fips1804-byte-sequence-digest
    source: fips-180-4
    supports: FIPS 180-4 specifies SHA hash algorithms that process a message input and produce a fixed-length message digest.
    locator: Sections 1 and 5
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-byte-sequence-digest-record
    source: fips-180-4
    supports: ByteSequenceDigest records a digest only with an explicitly declared local byte capture and encoding; that record shape is a local ontology constraint rather than a FIPS serialization.
    locator: Sections 1 and 5
    evidence_kind: design-inference
    confidence: high

