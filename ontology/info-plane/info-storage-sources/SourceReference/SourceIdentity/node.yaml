schema: moonweave.ai/ontology-node/v1
id: SourceIdentity
kind: concept
labels:
  zh: 来源状态身份
  en: source-state identity
  ja: 出典状態同一性
semantics:
  short_definition:
    zh: 固定被引用内容在某一版本状态下的身份分支。
    en: Identity branch fixing cited content state at a specific version.
    ja: 特定 version における cited content state を固定する identity branch。
  definition:
    zh: SourceIdentity 含 SourceVersion 与 ContentDigest，用于验证引用解析时内容是否仍与 cited state 一致；对应 RAG document version 与 MCP resource 重读校验。
    en: SourceIdentity includes SourceVersion and ContentDigest to verify resolved content still matches cited state—RAG document versions and MCP resource reread checks.
    ja: SourceIdentity は version+digest 固定。
  why_needed:
    zh: 同一 URI 可以随时间返回不同内容；独立状态身份让引用解析与位置选择都绑定到可核验版本，并明确版本值和摘要值不是身份记录本身。
    en: The same URI can return different content over time; an independent state identity binds reference resolution and location selection to a verifiable version while clarifying that version and digest values are not the identity record itself.
    ja: 同じ URI は時間により別 content を返すため、independent state identity が reference resolution/location selection を verifiable version に結び、version/digest value が identity record 自体でないことを明確にします。
  includes:
    - zh: 具有 source_identity_id 并至少组合版本或完整性证据之一的来源状态记录。
      en: Source-state records with source_identity_id and at least one version or integrity evidence component.
      ja: source_identity_id と少なくとも一 version/integrity evidence component を持つ source-state record。
  excludes:
    - zh: 裸版本字符串、裸 checksum 字节、资源 URI、位置范围以及来源的业务实体。
      en: Bare version strings, bare checksum bytes, resource URIs, location ranges, and the source business entity.
      ja: bare version string・bare checksum byte・resource URI・location range・source business entity。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: content_digest_sha256 不匹配时必须记录 revision drift 并拒绝 same-evidence 断言。
    en: content_digest_sha256 mismatch must record revision drift and reject same-evidence claims.
    ja: digest mismatch→drift。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - source_identity_id
  fields:
    - id: source_identity_id
      labels:
        zh: 来源状态身份标识
        en: source-state identity ID
        ja: 出典状態同一性 ID
      definitions:
        zh: 稳定标识由版本与完整性证据组成的状态记录。
        en: Stably identifies the state record composed from version and integrity evidence.
        ja: version/integrity evidence から成る state record を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: source-state-2026-07-16-a
      allowed_values: []
      source_claims:
        - claim-source-identity-002
  constraints:
    - id: source-identity-has-version-or-digest
      severity: error
      expression_language: plain
      expression: at least one accepted SourceIdentity-has_version-SourceVersion or SourceIdentity-has_digest-ContentDigest fact exists
      explanation:
        zh: 来源身份必须至少固定一个版本标识或内容/表示摘要；只有裸 ID 不能核验来源状态。
        en: A source identity pins at least one version identifier or content/representation digest; a bare ID cannot verify source state.
        ja: source identity は少なくとも version identifier または content/representation digest を固定し、bare ID だけでは source state を検証できません。
      source_claims:
        - claim-source-identity-003
        - claim-source-identity-004
  required_relations: []
examples:
  - id: SourceIdentity-example-digest
    labels:
      zh: 带 digest 的身份
      en: Identity with digest
      ja: digest 付き identity
    descriptions:
      zh: lines:42..58 与 sha256 digest 固定 cited 版本。
      en: lines:42..58 with sha256 digest pins cited version.
      ja: digest pin。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: digest
    field_values: {}
    related_node_ids:
      - SourceIdentity
      - ContentDigest
    related_relation_ids: []
    source_claims:
      - claim-source-identity-design
  - id: SourceIdentity-example-version
    labels:
      zh: 文档版本
      en: Document version
      ja: document version
    descriptions:
      zh: doc-policy/v7 SourceVersion 与 TextDocumentReference 组合。
      en: doc-policy/v7 SourceVersion combined with TextDocumentReference.
      ja: doc version。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: version
    field_values: {}
    related_node_ids:
      - SourceIdentity
      - SourceVersion
    related_relation_ids: []
    source_claims:
      - claim-source-identity-design
  - id: SourceIdentity-example-live-only
    labels:
      zh: 无固定身份
      en: No pinned identity
      ja: pin なし identity
    descriptions:
      zh: 仅 URL 无 version/digest 的引用 identity 弱，需显式标记。
      en: URL-only references without version/digest have weak identity and need explicit marking.
      ja: weak identity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: weak
    field_values: {}
    related_node_ids:
      - SourceIdentity
    related_relation_ids: []
    source_claims:
      - claim-source-identity-design
parent_relation:
  id: SourceReference-has_identity-SourceIdentity
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有来源状态身份
    en: has source-state identity
    ja: 出典状態同一性を持つ
  definitions:
    zh: 来源引用具有状态身份关系把稳定引用记录连接到它所指的具体可核验来源状态；引用身份与内容状态身份仍是两个节点。
    en: SourceReference has_identity SourceIdentity links a stable reference record to the concrete verifiable source state it denotes while keeping reference identity and content-state identity as separate nodes.
    ja: SourceReference has_identity SourceIdentity は stable reference record を concrete verifiable source state に結び reference identity/content-state identity を別 node に保ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有来源状态身份
      en: inverse of has source-state identity
      ja: 逆：出典状態同一性を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_identity-SourceIdentity-example-positive-manual-001
      labels:
        zh: SourceReference-has_identity-SourceIdentity正例
        en: SourceReference-has_identity-SourceIdentity positive case
        ja: SourceReference-has_identity-SourceIdentity正例
      descriptions:
        zh: src-ref-42 连接 source-state-a，后者组合 v7 与 Repr-Digest。
        en: src-ref-42 links to source-state-a, which composes v7 and a Repr-Digest.
        ja: src-ref-42 は v7/Repr-Digest を構成する source-state-a に接続します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceIdentity
      related_relation_ids:
        - SourceReference-has_identity-SourceIdentity
      source_claims:
        - claim-source-identity-008
    - id: SourceReference-has_identity-SourceIdentity-example-boundary-manual-001
      labels:
        zh: SourceReference-has_identity-SourceIdentity边界例
        en: SourceReference-has_identity-SourceIdentity boundary case
        ja: SourceReference-has_identity-SourceIdentity境界例
      descriptions:
        zh: src-ref-42 与 source-state-a 只共享同一 URI 字符串。
        en: src-ref-42 and source-state-a merely share the same URI string.
        ja: src-ref-42 と source-state-a は同じ URI string を共有するだけです。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceIdentity
      related_relation_ids:
        - SourceReference-has_identity-SourceIdentity
      source_claims:
        - claim-source-identity-009
  source_claims:
    - claim-source-identity-010
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
  - id: src-prov-o
    title: PROV-O — The PROV Ontology
    publisher: W3C
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Entity, location, and provenance separation.
source_claims:
  - id: claim-source-identity-001
    source: eng-ont-prov-o
    supports: PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity.
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-002
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. For SourceIdentity.source_identity_id, the field records this reviewed value: Stably identifies the state record composed from version and integrity evidence."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-003
    source: eng-ont-prov-o
    supports: PROV-O distinguishes entity states and revisions, while Moonweave requires a version or digest to make the referenced state verifiable.
    locator: §3.2 > specialization, revision, and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-004
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines digest fields for content and representation integrity. Moonweave accepts a digest as one way to pin SourceIdentity state.
    locator: RFC 9530 §§2–3 > Content-Digest and Repr-Digest
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-005
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. This evidence supports the manually reviewed positive case for SourceIdentity: source-state-2026-07-16-a composes version=v7 and a SHA-256 digest to constrain one document state."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-006
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. This evidence supports the manually reviewed instance case for SourceIdentity: Two SourceReferences may share one SourceIdentity to denote the same content state."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-007
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. This evidence supports the manually reviewed boundary case for SourceIdentity: String v7 declares only a version value and has no identity_id or integrity composition."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-008
    source: eng-ont-prov-o
    supports: "PROV-O uses specializationOf to relate a concrete entity state to a more general entity; Moonweave cross-links a reference to its cited state identity. This evidence supports the manually reviewed positive case for SourceReference-has_identity-SourceIdentity: src-ref-42 links to source-state-a, which composes v7 and a Repr-Digest."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-009
    source: eng-ont-prov-o
    supports: "PROV-O uses specializationOf to relate a concrete entity state to a more general entity; Moonweave cross-links a reference to its cited state identity. This evidence supports the manually reviewed boundary case for SourceReference-has_identity-SourceIdentity: src-ref-42 and source-state-a merely share the same URI string."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-010
    source: eng-ont-prov-o
    supports: PROV-O uses specializationOf to relate a concrete entity state to a more general entity; Moonweave cross-links a reference to its cited state identity.
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-identity-design
    source: src-info-sources-design
    supports: SourceIdentity pins cited state via version and digest for verification.
    locator: SourceIdentity
    evidence_kind: design-inference
    confidence: high
