  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-source-identity-001
    source: eng-ont-prov-o
    supports: PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity.
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-002
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. For SourceIdentity.source_identity_id, the field records this reviewed value: Stably identifies the state record composed from version and integrity evidence."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-003
    source: eng-ont-prov-o
    supports: PROV-O distinguishes entity states and revisions, while Moonweave requires a version or digest to make the referenced state verifiable.
    locator: §3.2 > specialization, revision, and generation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-004
    source: eng-proto-rfc9530-digest-fields
    supports: RFC 9530 defines digest fields for content and representation integrity. Moonweave accepts a digest as one way to pin SourceIdentity state.
    locator: RFC 9530 §§2–3 > Content-Digest and Repr-Digest
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-005
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. This evidence supports the manually reviewed positive case for SourceIdentity: source-state-2026-07-16-a composes version=v7 and a SHA-256 digest to constrain one document state."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-006
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. This evidence supports the manually reviewed instance case for SourceIdentity: Two SourceReferences may share one SourceIdentity to denote the same content state."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-007
    source: eng-ont-prov-o
    supports: "PROV-O models concrete entity states as specializations of a more general entity; Moonweave records the cited source state as SourceIdentity. This evidence supports the manually reviewed boundary case for SourceIdentity: String v7 declares only a version value and has no identity_id or integrity composition."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-008
    source: eng-ont-prov-o
    supports: "PROV-O uses specializationOf to relate a concrete entity state to a more general entity; Moonweave cross-links a reference to its cited state identity. This evidence supports the manually reviewed positive case for SourceReference-has_identity-SourceIdentity: src-ref-42 links to source-state-a, which composes v7 and a Repr-Digest."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-009
    source: eng-ont-prov-o
    supports: "PROV-O uses specializationOf to relate a concrete entity state to a more general entity; Moonweave cross-links a reference to its cited state identity. This evidence supports the manually reviewed boundary case for SourceReference-has_identity-SourceIdentity: src-ref-42 and source-state-a merely share the same URI string."
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-identity-010
    source: eng-ont-prov-o
    supports: PROV-O uses specializationOf to relate a concrete entity state to a more general entity; Moonweave cross-links a reference to its cited state identity.
    locator: §3.2 expanded properties, prov:alternateOf and prov:specializationOf, lines 1444–1505
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
