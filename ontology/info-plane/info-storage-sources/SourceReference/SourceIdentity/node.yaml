schema: moonweave.ai/ontology-node/v1
id: SourceIdentity
kind: concept
status: accepted
labels:
  zh: 来源状态身份
  en: source-state identity
  ja: 出典状態同一性
semantics:
  short_definition:
    zh: 把来源引用限定到一个可核验内容状态的身份记录。
    en: An identity record constraining a source reference to one verifiable content state.
    ja: source reference を一 verifiable content state に限定する identity record。
  definition:
    zh: 来源状态身份是一种信息记录，以独立 identity_id 组合 SourceVersion 与 ContentDigest，从而把 SourceReference 限定到一个具体来源状态；摘要算法由 ContentDigest.algorithm 记录，规范摘要字节由 ContentDigest.checksum_bytes 承载，二者是 SourceIdentity 的组成证据而不是其伪子类。
    en: SourceIdentity is an information record with its own identity_id that composes SourceVersion and ContentDigest to constrain a SourceReference to one concrete source state. ContentDigest.algorithm records the digest algorithm, and ContentDigest.checksum_bytes carries the canonical digest bytes; both records are components rather than fake subtypes of SourceIdentity.
    ja: SourceIdentity は独自の identity_id で SourceVersion と ContentDigest を組み合わせ、SourceReference を一つの具体的な source state に限定する情報記録である。digest algorithm は ContentDigest.algorithm が記録し、canonical digest bytes は ContentDigest.checksum_bytes が保持する。両記録は SourceIdentity の構成証拠であって偽の下位型ではない。
  why_needed:
    zh: 同一 URI 可以随时间返回不同内容；独立状态身份让引用解析与位置选择都绑定到可核验版本，并明确版本值和摘要值不是身份记录本身。
    en: The same URI can return different content over time; an independent state identity binds reference resolution and location selection to a verifiable version while clarifying that version and digest values are not the identity record itself.
    ja: 同じ URI は時間により別 content を返すため、independent state identity が reference resolution/location selection を verifiable version に結び、version/digest value が identity record 自体でないことを明確にします。
  includes:
    - zh: 具有 source_identity_id 并至少组合版本或完整性证据之一的来源状态记录。
      en: Source-state records with source_identity_id and at least one version or integrity evidence component.
      ja: source_identity_id と少なくとも一 version/integrity evidence component を持つ source-state record。
  excludes:
    - zh: 裸版本字符串、裸 checksum 字节、资源 URI、位置范围以及来源的业务实体。
      en: Bare version strings, bare checksum bytes, resource URIs, location ranges, and the source business entity.
      ja: bare version string・bare checksum byte・resource URI・location range・source business entity。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - source_identity_id
  fields:
    - id: source_identity_id
      labels:
        zh: 来源状态身份标识
        en: source-state identity ID
        ja: 出典状態同一性 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识由版本与完整性证据组成的状态记录。
        en: Stably identifies the state record composed from version and integrity evidence.
        ja: version/integrity evidence から成る state record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: source-state-2026-07-16-a
      source_claims:
        - claim-source-identity-002
  constraints:
    - id: source-identity-has-version-or-digest
      severity: error
      expression_language: plain
      expression: at least one accepted SourceIdentity-has_version-SourceVersion or SourceIdentity-has_digest-ContentDigest fact exists
      explanations:
        zh: 来源身份必须至少固定一个版本标识或内容/表示摘要；只有裸 ID 不能核验来源状态。
        en: A source identity pins at least one version identifier or content/representation digest; a bare ID cannot verify source state.
        ja: source identity は少なくとも version identifier または content/representation digest を固定し、bare ID だけでは source state を検証できません。
      source_claims:
        - claim-source-identity-003
        - claim-source-identity-004
  required_relation_constraints: []
examples:
  - id: SourceIdentity-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源状态身份正例
      en: source-state identity positive case
      ja: 出典状態同一性正例
    scenario_id: null
    descriptions:
      zh: source-state-2026-07-16-a 组合 version=v7 与 sha-256 摘要，限定同一文档状态。
      en: source-state-2026-07-16-a composes version=v7 and a SHA-256 digest to constrain one document state.
      ja: source-state-2026-07-16-a は version=v7 と SHA-256 digest を構成し一 document state を限定します。
    field_values:
      source_identity_id: source-state-2026-07-16-a
    related_node_ids:
      - SourceReference
      - SourceIdentity
    related_relation_ids:
      - SourceReference-has_identity-SourceIdentity
    expected_result:
      zh: SourceIdentity 保持其已审查身份，并按定义解释 SourceReference-has_identity-SourceIdentity。
      en: Retain the reviewed identity of SourceIdentity and interpret SourceReference-has_identity-SourceIdentity exactly as defined.
      ja: SourceIdentity の reviewed identity を保持し SourceReference-has_identity-SourceIdentity を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 身份记录自身可引用，并以组成证据核验状态。
      en: The identity record is independently referenceable and verifies state through its components.
      ja: identity record は独立参照でき component で state を検証します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-identity-005
  - id: SourceIdentity-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源状态身份实例
      en: source-state identity instance case
      ja: 出典状態同一性実例
    scenario_id: null
    descriptions:
      zh: 两个 SourceReference 可共享同一 SourceIdentity，表示它们指向同一内容状态。
      en: Two SourceReferences may share one SourceIdentity to denote the same content state.
      ja: 二 SourceReference が一 SourceIdentity を共有し同じ content state を示します。
    field_values:
      source_identity_id: source-state-2026-07-16-a
    related_node_ids:
      - SourceReference
      - SourceIdentity
    related_relation_ids:
      - SourceReference-has_identity-SourceIdentity
    expected_result:
      zh: SourceIdentity 保持其已审查身份，并按定义解释 SourceReference-has_identity-SourceIdentity。
      en: Retain the reviewed identity of SourceIdentity and interpret SourceReference-has_identity-SourceIdentity exactly as defined.
      ja: SourceIdentity の reviewed identity を保持し SourceReference-has_identity-SourceIdentity を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 共享状态身份不合并两条引用记录。
      en: Sharing state identity does not merge the two reference records.
      ja: state identity の共有は二 reference record を merge しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-identity-006
  - id: SourceIdentity-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源状态身份边界例
      en: source-state identity boundary case
      ja: 出典状態同一性境界例
    scenario_id: null
    descriptions:
      zh: 字符串 v7 只声明一个版本值，没有 identity_id 或完整性组合。
      en: String v7 declares only a version value and has no identity_id or integrity composition.
      ja: string v7 は version value だけを宣言し identity_id/integrity composition がありません。
    field_values:
      display_title: v7
    related_node_ids:
      - SourceReference
      - SourceIdentity
    related_relation_ids:
      - SourceReference-has_identity-SourceIdentity
    expected_result:
      zh: 不把该对象归入 SourceIdentity，也不凭邻近或词形推断 SourceReference-has_identity-SourceIdentity。
      en: Do not classify the object as SourceIdentity or infer SourceReference-has_identity-SourceIdentity from proximity or lexical form.
      ja: object を SourceIdentity に分類せず proximity/lexical form から SourceReference-has_identity-SourceIdentity を推論しません。
    why_valid_or_invalid:
      zh: 该值是 SourceVersion 组成，不是 SourceIdentity。
      en: That value is a SourceVersion component, not SourceIdentity.
      ja: その value は SourceIdentity ではなく SourceVersion component です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-identity-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceReference-has_identity-SourceIdentity
  predicate: has_identity
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 具有来源状态身份
    en: has source-state identity
    ja: 出典状態同一性を持つ
  definitions:
    zh: 来源引用具有状态身份关系把稳定引用记录连接到它所指的具体可核验来源状态；引用身份与内容状态身份仍是两个节点。
    en: SourceReference has_identity SourceIdentity links a stable reference record to the concrete verifiable source state it denotes while keeping reference identity and content-state identity as separate nodes.
    ja: SourceReference has_identity SourceIdentity は stable reference record を concrete verifiable source state に結び reference identity/content-state identity を別 node に保ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: is_target_of_has_identity
    labels:
      zh: 反向：具有来源状态身份
      en: inverse of has source-state identity
      ja: 逆：出典状態同一性を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_identity-SourceIdentity-example-positive-manual-001
      kind: positive
      labels:
        zh: SourceReference-has_identity-SourceIdentity正例
        en: SourceReference-has_identity-SourceIdentity positive case
        ja: SourceReference-has_identity-SourceIdentity正例
      scenario_id: null
      descriptions:
        zh: src-ref-42 连接 source-state-a，后者组合 v7 与 Repr-Digest。
        en: src-ref-42 links to source-state-a, which composes v7 and a Repr-Digest.
        ja: src-ref-42 は v7/Repr-Digest を構成する source-state-a に接続します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceIdentity
      related_relation_ids:
        - SourceReference-has_identity-SourceIdentity
      expected_result:
        zh: 建立 SourceReference —has_identity→ SourceIdentity，并保持该方向与限定条件。
        en: Assert SourceReference —has_identity→ SourceIdentity while preserving its direction and qualifiers.
        ja: SourceReference —has_identity→ SourceIdentity を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 引用记录与可核验内容状态之间存在明确绑定事实。
        en: The reference is explicitly bound to a verifiable state.
        ja: reference と verifiable state が明示結合されています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-identity-008
    - id: SourceReference-has_identity-SourceIdentity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: SourceReference-has_identity-SourceIdentity边界例
        en: SourceReference-has_identity-SourceIdentity boundary case
        ja: SourceReference-has_identity-SourceIdentity境界例
      scenario_id: null
      descriptions:
        zh: src-ref-42 与 source-state-a 只共享同一 URI 字符串。
        en: src-ref-42 and source-state-a merely share the same URI string.
        ja: src-ref-42 と source-state-a は同じ URI string を共有するだけです。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceIdentity
      related_relation_ids:
        - SourceReference-has_identity-SourceIdentity
      expected_result:
        zh: 拒绝建立 SourceReference-has_identity-SourceIdentity，两端对象仍保留各自身份。
        en: Reject SourceReference-has_identity-SourceIdentity; both endpoint objects retain their own identities.
        ja: SourceReference-has_identity-SourceIdentity を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: URI 相同不能证明状态身份相同。
        en: URI equality does not prove source-state identity.
        ja: URI equality は source-state identity を証明しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-identity-009
  source_claims:
    - claim-source-identity-010
  distinct_fact_rationale:
    zh: SourceReference-has_identity-SourceIdentity 记录 SourceReference 到 SourceIdentity 的单一 has_identity 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceReference-has_identity-SourceIdentity records one has_identity fact from SourceReference to SourceIdentity; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceReference-has_identity-SourceIdentity は SourceReference から SourceIdentity への一 has_identity fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
