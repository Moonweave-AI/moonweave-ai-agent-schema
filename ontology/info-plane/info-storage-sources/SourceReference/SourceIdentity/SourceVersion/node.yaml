    review_status: accepted
  - id: claim-source-version-006
    source: eng-ont-prov-o
    supports: "PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion. This evidence supports the manually reviewed boundary case for SourceVersion: latest is a mutable alias with no declared version_scheme."
