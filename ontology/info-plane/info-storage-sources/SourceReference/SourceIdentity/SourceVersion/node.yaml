schema: moonweave.ai/ontology-node/v1
id: SourceVersion
kind: concept
labels:
  zh: 来源版本标识
  en: source version identifier
  ja: 出典版識別子
semantics:
  short_definition:
    zh: 被引用对象不可混淆的版本标识。
    en: Non-interchangeable version identifier of the referenced object.
    ja: 参照 object の非互換 version 識別子。
  definition:
    zh: SourceVersion 记录 v7、etag、commit sha 等；RAG ingestion 产出 document_version，MCP resource 可用 list changed 通知触发新版本。
    en: SourceVersion records v7, etag, commit sha, etc.; RAG ingestion produces document_version; MCP resources may version via list changed notifications.
    ja: SourceVersion は revision pin。
  why_needed:
    zh: 版本值适合人类和版本系统追踪，但同一标签可能被重置；把它作为身份组成而非子类，可与 digest 独立核验。
    en: Version values support human and version-system tracking but labels can be reset; modeling them as components rather than subtypes lets them be verified independently from digests.
    ja: version value は human/version-system tracking に有用ですが label は reset され得るため、subtype ではなく component として digest と独立検証します。
  includes:
    - zh: 带版本体系的语义版本、提交 SHA、快照 ID、修订号或发布日期标识。
      en: Semantic versions, commit SHAs, snapshot IDs, revision numbers, or release-date identifiers with a declared scheme.
      ja: 宣言 scheme を持つ semantic version・commit SHA・snapshot ID・revision number・release-date identifier。
  excludes:
    - zh: 内容摘要、裸 checksum、SourceIdentity 汇总记录和没有版本体系的显示标签。
      en: Content digests, bare checksums, SourceIdentity aggregate records, and display labels without a version scheme.
      ja: content digest・bare checksum・SourceIdentity aggregate record・version scheme のない display label。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: doc-policy/v7 与 content_digest 联合构成 SourceIdentity。
    en: doc-policy/v7 with content_digest forms SourceIdentity.
    ja: version+digest。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - version_scheme
    - version_value
  fields:
    - id: version_scheme
      labels:
        zh: 版本体系
        en: version scheme
        ja: 版体系
      definitions:
        zh: 声明 version_value 的解释规则。
        en: Declares the rules under which version_value is interpreted.
        ja: version_value の解釈 rule を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: git-commit
      allowed_values: []
      source_claims:
        - claim-source-version-002
    - id: version_value
      labels:
        zh: 版本值
        en: version value
        ja: 版値
      definitions:
        zh: 保存版本体系中的具体修订标识。
        en: Carries the concrete revision identifier in the version scheme.
        ja: version scheme 内の concrete revision identifier を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 3d2a0b7
      allowed_values: []
      source_claims:
        - claim-source-version-003
  constraints: []
  required_relations: []
examples:
  - id: SourceVersion-example-doc-v7
    labels:
      zh: 文档 v7
      en: Document v7
      ja: document v7
    descriptions:
      zh: document_version=v7 引用 policy 文档。
      en: document_version=v7 cites policy document.
      ja: doc v7。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: version
    field_values:
      document_version: v7
    related_node_ids:
      - SourceVersion
    related_relation_ids: []
    source_claims:
      - claim-source-version-design
  - id: SourceVersion-example-git-sha
    labels:
      zh: Git commit
      en: Git commit
      ja: Git commit
    descriptions:
      zh: commit sha 作为 SourceVersion 用于 repo 文档。
      en: Commit sha as SourceVersion for repo documents.
      ja: git sha version。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: git
    field_values: {}
    related_node_ids:
      - SourceVersion
    related_relation_ids: []
    source_claims:
      - claim-source-version-design
  - id: SourceVersion-example-missing
    labels:
      zh: 缺失版本
      en: Missing version
      ja: missing version
    descriptions:
      zh: 无 SourceVersion 时不得断言不可变 citation。
      en: Without SourceVersion cannot assert immutable citation.
      ja: version 必須 for immutable cite。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceVersion
    related_relation_ids: []
    source_claims:
      - claim-source-version-design
parent_relation:
  id: SourceIdentity-has_version-SourceVersion
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有版本
    en: has version
    ja: 版を持つ
  definitions:
    zh: 来源状态身份具有版本关系把一个 SourceIdentity 连接到组成该状态的命名修订标识；版本是组成信息，不是身份记录的子类。
    en: SourceIdentity has_version SourceVersion links one source-state identity to the named revision component that helps determine that state; the version is a component, not a subtype of the identity record.
    ja: SourceIdentity has_version SourceVersion は source-state identity をその state を構成する named revision component に結び、version は identity record の subtype ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有版本
      en: inverse of has version
      ja: 逆：版を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceIdentity-has_version-SourceVersion-example-positive-manual-001
      labels:
        zh: SourceIdentity-has_version-SourceVersion正例
        en: SourceIdentity-has_version-SourceVersion positive case
        ja: SourceIdentity-has_version-SourceVersion正例
      descriptions:
        zh: source-state-a 组合 git commit 3d2a0b7 作为版本证据。
        en: source-state-a composes Git commit 3d2a0b7 as version evidence.
        ja: source-state-a は Git commit 3d2a0b7 を version evidence として構成します。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - SourceVersion
      related_relation_ids:
        - SourceIdentity-has_version-SourceVersion
      source_claims:
        - claim-source-version-007
    - id: SourceIdentity-has_version-SourceVersion-example-boundary-manual-001
      labels:
        zh: SourceIdentity-has_version-SourceVersion边界例
        en: SourceIdentity-has_version-SourceVersion boundary case
        ja: SourceIdentity-has_version-SourceVersion境界例
      descriptions:
        zh: v7 与 source-state-a 仅在同一日志中出现。
        en: v7 and source-state-a merely occur in the same log.
        ja: v7 と source-state-a は同じ log に現れるだけです。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - SourceVersion
      related_relation_ids:
        - SourceIdentity-has_version-SourceVersion
      source_claims:
        - claim-source-version-008
  source_claims:
    - claim-source-version-009
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
source_claims:
  - id: claim-source-version-001
    source: eng-ont-prov-o
    supports: PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion.
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-002
    source: eng-ont-prov-o
    supports: "PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion. For SourceVersion.version_scheme, the field records this reviewed value: Declares the rules under which version_value is interpreted."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-003
    source: eng-ont-prov-o
    supports: "PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion. For SourceVersion.version_value, the field records this reviewed value: Carries the concrete revision identifier in the version scheme."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-004
    source: eng-ont-prov-o
    supports: "PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion. This evidence supports the manually reviewed positive case for SourceVersion: version_scheme=git-commit and version_value=3d2a0b7 identify one repository state."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-005
    source: eng-ont-prov-o
    supports: "PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion. This evidence supports the manually reviewed instance case for SourceVersion: SourceIdentity stores release label v7 together with a Repr-Digest."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-006
    source: eng-ont-prov-o
    supports: "PROV-O describes Revision as qualifying wasRevisionOf from a newer entity to an earlier entity; Moonweave records the scheme-specific revision identifier as SourceVersion. This evidence supports the manually reviewed boundary case for SourceVersion: latest is a mutable alias with no declared version_scheme."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-007
    source: eng-ont-prov-o
    supports: "PROV-O models revision as a relation between newer and earlier entities; Moonweave composes the scheme-specific revision identifier into SourceIdentity. This evidence supports the manually reviewed positive case for SourceIdentity-has_version-SourceVersion: source-state-a composes Git commit 3d2a0b7 as version evidence."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-008
    source: eng-ont-prov-o
    supports: "PROV-O models revision as a relation between newer and earlier entities; Moonweave composes the scheme-specific revision identifier into SourceIdentity. This evidence supports the manually reviewed boundary case for SourceIdentity-has_version-SourceVersion: v7 and source-state-a merely occur in the same log."
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-009
    source: eng-ont-prov-o
    supports: PROV-O models revision as a relation between newer and earlier entities; Moonweave composes the scheme-specific revision identifier into SourceIdentity.
    locator: §3.3 Qualified Terms, prov:Revision and prov:wasRevisionOf, lines 2661–2671
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-version-design
    source: src-info-sources-design
    supports: SourceVersion pins non-interchangeable referenced revision.
    locator: SourceVersion
    evidence_kind: design-inference
    confidence: high
