schema: moonweave.ai/ontology-node/v1
id: SourceVersion
kind: concept
status: accepted
labels:
  zh: 来源版本标识
  en: source version identifier
  ja: 出典版識別子
semantics:
  short_definition:
    zh: 在声明版本体系中标识来源修订状态的身份组成。
    en: An identity component identifying a source revision in a declared version scheme.
    ja: 宣言 version scheme 内で source revision を識別する identity component。
  definition:
    zh: 来源版本标识是 SourceIdentity 的组成信息，以 version_scheme 与 version_value 标识命名修订、提交、快照或发布日期；它没有 SourceIdentity 的独立汇总身份，也不证明内容字节未变化。
    en: SourceVersion is a component of SourceIdentity that uses version_scheme and version_value to identify a named revision, commit, snapshot, or release; it lacks SourceIdentity's aggregate identity and does not prove that content bytes are unchanged.
    ja: SourceVersion は version_scheme/version_value で named revision・commit・snapshot・release を識別する SourceIdentity component です。SourceIdentity の aggregate identity を持たず content byte 不変も証明しません。
  why_needed:
    zh: 版本值适合人类和版本系统追踪，但同一标签可能被重置；把它作为身份组成而非子类，可与 digest 独立核验。
    en: Version values support human and version-system tracking but labels can be reset; modeling them as components rather than subtypes lets them be verified independently from digests.
    ja: version value は human/version-system tracking に有用ですが label は reset され得るため、subtype ではなく component として digest と独立検証します。
  includes:
    - zh: 带版本体系的语义版本、提交 SHA、快照 ID、修订号或发布日期标识。
      en: Semantic versions, commit SHAs, snapshot IDs, revision numbers, or release-date identifiers with a declared scheme.
      ja: 宣言 scheme を持つ semantic version・commit SHA・snapshot ID・revision number・release-date identifier。
  excludes:
    - zh: 内容摘要、裸 checksum、SourceIdentity 汇总记录和没有版本体系的显示标签。
      en: Content digests, bare checksums, SourceIdentity aggregate records, and display labels without a version scheme.
      ja: content digest・bare checksum・SourceIdentity aggregate record・version scheme のない display label。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - version_scheme
    - version_value
  fields:
    - id: version_scheme
      labels:
        zh: 版本体系
        en: version scheme
        ja: 版体系
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 version_value 的解释规则。
        en: Declares the rules under which version_value is interpreted.
        ja: version_value の解釈 rule を宣言します。
      allowed_values: []
      pattern: null
      example_value: git-commit
      source_claims:
        - claim-source-version-002
    - id: version_value
      labels:
        zh: 版本值
        en: version value
        ja: 版値
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存版本体系中的具体修订标识。
        en: Carries the concrete revision identifier in the version scheme.
        ja: version scheme 内の concrete revision identifier を保持します。
      allowed_values: []
      pattern: null
      example_value: 3d2a0b7
      source_claims:
        - claim-source-version-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceVersion-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源版本标识正例
      en: source version identifier positive case
      ja: 出典版識別子正例
    scenario_id: null
    descriptions:
      zh: version_scheme=git-commit 与 version_value=3d2a0b7 标识一个仓库状态。
      en: version_scheme=git-commit and version_value=3d2a0b7 identify one repository state.
      ja: version_scheme=git-commit と version_value=3d2a0b7 は一 repository state を識別します。
    field_values:
      version_scheme: git-commit
      version_value: 3d2a0b7
    related_node_ids:
      - SourceIdentity
      - SourceVersion
    related_relation_ids:
      - SourceIdentity-has_version-SourceVersion
    expected_result:
      zh: SourceVersion 保持其已审查身份，并按定义解释 SourceIdentity-has_version-SourceVersion。
      en: Retain the reviewed identity of SourceVersion and interpret SourceIdentity-has_version-SourceVersion exactly as defined.
      ja: SourceVersion の reviewed identity を保持し SourceIdentity-has_version-SourceVersion を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 版本体系和值共同可解释并能定位命名修订状态。
      en: The version scheme and value are jointly interpretable.
      ja: version scheme と value を共同解釈できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-version-004
  - id: SourceVersion-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源版本标识实例
      en: source version identifier instance case
      ja: 出典版識別子実例
    scenario_id: null
    descriptions:
      zh: SourceIdentity 将发布标签 v7 与 Repr-Digest 一起保存。
      en: SourceIdentity stores release label v7 together with a Repr-Digest.
      ja: SourceIdentity は release label v7 と Repr-Digest を共に保存します。
    field_values:
      version_scheme: git-commit
      version_value: 3d2a0b7
    related_node_ids:
      - SourceIdentity
      - SourceVersion
    related_relation_ids:
      - SourceIdentity-has_version-SourceVersion
    expected_result:
      zh: SourceVersion 保持其已审查身份，并按定义解释 SourceIdentity-has_version-SourceVersion。
      en: Retain the reviewed identity of SourceVersion and interpret SourceIdentity-has_version-SourceVersion exactly as defined.
      ja: SourceVersion の reviewed identity を保持し SourceIdentity-has_version-SourceVersion を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 版本提供命名修订，摘要提供字节完整性。
      en: The version names the revision while the digest supplies byte integrity.
      ja: version は revision を命名し digest は byte integrity を与えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-version-005
  - id: SourceVersion-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源版本标识边界例
      en: source version identifier boundary case
      ja: 出典版識別子境界例
    scenario_id: null
    descriptions:
      zh: latest 是可变别名，且未声明 version_scheme。
      en: latest is a mutable alias with no declared version_scheme.
      ja: latest は mutable alias で version_scheme がありません。
    field_values:
      digest_value: latest
    related_node_ids:
      - SourceIdentity
      - SourceVersion
    related_relation_ids:
      - SourceIdentity-has_version-SourceVersion
    expected_result:
      zh: 不把该对象归入 SourceVersion，也不凭邻近或词形推断 SourceIdentity-has_version-SourceVersion。
      en: Do not classify the object as SourceVersion or infer SourceIdentity-has_version-SourceVersion from proximity or lexical form.
      ja: object を SourceVersion に分類せず proximity/lexical form から SourceIdentity-has_version-SourceVersion を推論しません。
    why_valid_or_invalid:
      zh: 可变显示标签不能作为可核验 SourceVersion。
      en: A mutable display label cannot serve as a verifiable SourceVersion.
      ja: mutable display label は verifiable SourceVersion になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-version-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceIdentity-has_version-SourceVersion
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有版本
    en: has version
    ja: 版を持つ
  definitions:
    zh: 来源状态身份具有版本关系把一个 SourceIdentity 连接到组成该状态的命名修订标识；版本是组成信息，不是身份记录的子类。
    en: SourceIdentity has_version SourceVersion links one source-state identity to the named revision component that helps determine that state; the version is a component, not a subtype of the identity record.
    ja: SourceIdentity has_version SourceVersion は source-state identity をその state を構成する named revision component に結び、version は identity record の subtype ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有版本
      en: inverse of has version
      ja: 逆：版を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceIdentity-has_version-SourceVersion-example-positive-manual-001
      kind: positive
      labels:
        zh: SourceIdentity-has_version-SourceVersion正例
        en: SourceIdentity-has_version-SourceVersion positive case
        ja: SourceIdentity-has_version-SourceVersion正例
      scenario_id: null
      descriptions:
        zh: source-state-a 组合 git commit 3d2a0b7 作为版本证据。
        en: source-state-a composes Git commit 3d2a0b7 as version evidence.
        ja: source-state-a は Git commit 3d2a0b7 を version evidence として構成します。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - SourceVersion
      related_relation_ids:
        - SourceIdentity-has_version-SourceVersion
      expected_result:
        zh: 建立 SourceIdentity —has_version→ SourceVersion，并保持该方向与限定条件。
        en: Assert SourceIdentity —has_version→ SourceVersion while preserving its direction and qualifiers.
        ja: SourceIdentity —has_version→ SourceVersion を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 版本值属于该身份记录并按声明体系解释。
        en: The version value belongs to that identity record and is interpreted under a declared scheme.
        ja: version value は identity record に属し宣言 scheme で解釈します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-version-007
    - id: SourceIdentity-has_version-SourceVersion-example-boundary-manual-001
      kind: boundary
      labels:
        zh: SourceIdentity-has_version-SourceVersion边界例
        en: SourceIdentity-has_version-SourceVersion boundary case
        ja: SourceIdentity-has_version-SourceVersion境界例
      scenario_id: null
      descriptions:
        zh: v7 与 source-state-a 仅在同一日志中出现。
        en: v7 and source-state-a merely occur in the same log.
        ja: v7 と source-state-a は同じ log に現れるだけです。
      field_values: {}
      related_node_ids:
        - SourceIdentity
        - SourceVersion
      related_relation_ids:
        - SourceIdentity-has_version-SourceVersion
      expected_result:
        zh: 拒绝建立 SourceIdentity-has_version-SourceVersion，两端对象仍保留各自身份。
        en: Reject SourceIdentity-has_version-SourceVersion; both endpoint objects retain their own identities.
        ja: SourceIdentity-has_version-SourceVersion を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 共现不能证明版本组成，必须有明确归属事实。
        en: Co-occurrence does not prove version composition; an explicit assignment is required.
        ja: co-occurrence は version composition を証明せず explicit assignment が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-version-008
  source_claims:
    - claim-source-version-009
  distinct_fact_rationale:
    zh: SourceIdentity-has_version-SourceVersion 记录 SourceIdentity 到 SourceVersion 的单一 has_version 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceIdentity-has_version-SourceVersion records one has_version fact from SourceIdentity to SourceVersion; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceIdentity-has_version-SourceVersion は SourceIdentity から SourceVersion への一 has_version fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
