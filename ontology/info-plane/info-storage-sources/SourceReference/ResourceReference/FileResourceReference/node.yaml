schema: moonweave.ai/ontology-node/v1
id: FileResourceReference
kind: concept
labels:
  zh: 文件资源引用
  en: file resource reference
  ja: ファイルリソース参照
semantics:
  short_definition:
    zh: 以 file URI 或文件路径标识文件的资源引用特化。
    en: Resource reference specialized by file URI or filesystem path.
    ja: file URI/path で file を識別する resource reference 特化。
  definition:
    zh: FileResourceReference 映射 MCP resources/read 的 file:// URI、A2A FilePart.uri 与 OpenAI/Anthropic 用户上传文件来源；不断言文件已读取或授权。
    en: FileResourceReference maps MCP resources/read file:// URIs, A2A FilePart.uri, and OpenAI/Anthropic user-upload file provenance without asserting read or authorization.
    ja: FileResourceReference は Attachment/Source 映射。
  why_needed:
    zh: 文件路径的相对基准、大小写和规范化规则不同于网络 URI，单独建模才能解释同一路径字符串在不同工作目录下为何不是同一引用。
    en: Filesystem base, case, and normalization rules differ from network URI rules; separate modeling explains why the same path string can denote different files under different working directories.
    ja: filesystem の base・case・normalization rule は network URI と異なるため、同じ path string が working directory により別 file を示す理由を表現できます。
  includes:
    - zh: 带明确路径基准或 file URI 的文件引用。
      en: File references with an explicit path base or file URI.
      ja: 明示 path base または file URI を持つ file reference。
  excludes:
    - zh: HTTP URL、文档业务 ID、文件字节范围以及已加载的文件内容。
      en: HTTP URLs, document business IDs, byte ranges within files, and loaded file content.
      ja: HTTP URL・document business ID・file byte range・読込済み file content。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: A2A file.name+mimeType+uri；MCP contents[].uri；OpenAI image_url/file part URL。
    en: A2A file.name+mimeType+uri; MCP contents[].uri; OpenAI image_url/file part URL.
    ja: Attachment 形状映射。
  typical_input:
    - description: A2A FilePart
      format: '{"kind":"file","file":{"name":"invoice-104.pdf","mimeType":"application/pdf","uri":"https://storage.example.com/invoices/104.pdf"}}'
      source_claims:
        - claim-file-ref-a2a
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - reference_id
    - file_uri
  fields:
    - id: reference_id
      labels:
        zh: 文件引用标识
        en: file-reference ID
        ja: file reference ID
      definitions:
        zh: 稳定标识引用记录本身，使引用生命周期不与文件对象身份混同。
        en: Stably identifies the reference record itself so its lifecycle is not conflated with the file object.
        ja: reference record 自体を安定識別し、その lifecycle を file object identity と混同しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file-ref-runbook-v7
      allowed_values: []
      source_claims:
        - claim-file-resource-reference-002
    - id: file_uri
      labels:
        zh: 文件 URI
        en: file URI
        ja: file URI
      definitions:
        zh: 以 file 方案、authority 与路径组成可交换文件标识；平台相关大小写和本地解析由解析环境处理。
        en: Identifies the file through the file scheme, authority, and path; platform-specific case and local resolution remain resolver concerns.
        ja: file scheme・authority・path で file を識別し、platform 固有の case/local resolution は resolver の責任とします。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: "^file:"
      example_value: file:///D:/runbooks/recovery.md
      allowed_values: []
      source_claims:
        - claim-file-resource-reference-003
  constraints: []
  required_relations: []
examples:
  - id: FileResourceReference-example-mcp
    labels:
      zh: MCP Markdown 文件
      en: MCP Markdown file
      ja: MCP Markdown file
    descriptions:
      zh: source-ref-mcp-onboarding-md file_uri=file:///workspace/docs/onboarding.md mime_type=text/markdown。
      en: source-ref-mcp-onboarding-md file_uri=file:///workspace/docs/onboarding.md mime_type=text/markdown.
      ja: MCP file read。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/read
    field_values:
      file_uri: file:///workspace/docs/onboarding.md
      mime_type: text/markdown
    related_node_ids:
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-file-ref-mcp
  - id: FileResourceReference-example-a2a
    labels:
      zh: A2A PDF 附件
      en: A2A PDF attachment
      ja: A2A PDF 添付
    descriptions:
      zh: invoice-104.pdf application/pdf uri 创建 FileResourceReference。
      en: invoice-104.pdf application/pdf uri creates FileResourceReference.
      ja: A2A attachment。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: FilePart
    field_values:
      file_name: invoice-104.pdf
    related_node_ids:
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-file-ref-a2a
  - id: FileResourceReference-example-no-bytes
    labels:
      zh: 不含 bytes
      en: No embedded bytes
      ja: bytes 不含
    descriptions:
      zh: Reference 节点不复制 PDF bytes；bytes 在 content block 或 read activity。
      en: Reference node does not copy PDF bytes; bytes live in content block or read activity.
      ja: bytes 複製なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-file-ref-design
parent_relation:
  id: FileResourceReference-is_a-ResourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 文件资源引用是一种资源引用，并以文件 URI 或带解析基准的规范化文件路径为种差。
    en: FileResourceReference is a ResourceReference specialized by a file URI or a normalized filesystem path with an explicit resolution base.
    ja: FileResourceReference は file URI または resolution base 付き normalized filesystem path で細分化した ResourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FileResourceReference-is_a-ResourceReference-example-positive-manual-001
      labels:
        zh: FileResourceReference-is_a-ResourceReference正例
        en: FileResourceReference-is_a-ResourceReference positive case
        ja: FileResourceReference-is_a-ResourceReference正例
      descriptions:
        zh: file:///D:/runbooks/recovery.md 以文件命名规则标识资源。
        en: file:///D:/runbooks/recovery.md identifies a resource through filesystem naming.
        ja: file:///D:/runbooks/recovery.md は filesystem naming で resource を識別します。
      field_values: {}
      related_node_ids:
        - FileResourceReference
        - ResourceReference
      related_relation_ids:
        - FileResourceReference-is_a-ResourceReference
      source_claims:
        - claim-file-resource-reference-009
    - id: FileResourceReference-is_a-ResourceReference-example-boundary-manual-001
      labels:
        zh: FileResourceReference-is_a-ResourceReference边界例
        en: FileResourceReference-is_a-ResourceReference boundary case
        ja: FileResourceReference-is_a-ResourceReference境界例
      descriptions:
        zh: https://docs.example.org/recovery.md 使用网络 authority。
        en: https://docs.example.org/recovery.md uses a network authority.
        ja: https://docs.example.org/recovery.md は network authority を使います。
      field_values: {}
      related_node_ids:
        - FileResourceReference
        - ResourceReference
      related_relation_ids:
        - FileResourceReference-is_a-ResourceReference
      source_claims:
        - claim-file-resource-reference-010
  source_claims:
    - claim-file-resource-reference-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
  - id: src-a2a-file
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: FilePart attachment provenance with uri or bytes.
  - id: src-openai-chat
    title: OpenAI Chat Completions API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/chat/create
    source_type: official-doc
    relevance: image_url and file attachment content parts.
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-file-resource-reference-001
    source: eng-std-rfc8089-file-uri
    supports: RFC 8089 defines file URI syntax and the filesystem-specific semantics needed to identify a file without conflating that reference with file access or existence.
    locator: RFC 8089 §§2–3 > Syntax and Operations
    evidence_kind: normative
    confidence: high
  - id: claim-file-resource-reference-002
    source: eng-std-w3c-web-annotation-model
    supports: W3C distinguishes a specific reference description from the source resource. Moonweave gives the file-reference record its own ID.
    locator: §4 Specific Resources > source relationship
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-003
    source: eng-std-rfc8089-file-uri
    supports: RFC 8089 defines the file URI scheme, authority and path components, and filesystem-specific interpretation. Moonweave uses that standard form instead of an unscoped normalized_path string.
    locator: RFC 8089 §§2–3 > Syntax and Operations
    evidence_kind: normative
    confidence: high
  - id: claim-file-resource-reference-004
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines URI references and relative references; Moonweave uses file URI or normalized path identity while keeping retrieval separate. This evidence supports the manually reviewed positive case for FileResourceReference: file:///D:/runbooks/recovery.md identifies one file under the declared Windows base."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-005
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines URI references and relative references; Moonweave uses file URI or normalized path identity while keeping retrieval separate. This evidence supports the manually reviewed instance case for FileResourceReference: A build record stores normalized_path=D:/runbooks/recovery.md without copying its content."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-006
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines URI references and relative references; Moonweave uses file URI or normalized path identity while keeping retrieval separate. This evidence supports the manually reviewed boundary case for FileResourceReference: https://docs.example.org/recovery.md uses a network authority and the HTTP scheme."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-007
    source: eng-std-rfc3986-uri-generic-syntax
    supports: RFC 3986 defines URI references and relative references; Moonweave uses file URI or normalized path identity while keeping retrieval separate. This claim supports only the FileResourceReference endpoint of its sibling distinction.
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-008
    source: eng-std-rfc3986-uri-generic-syntax
    supports: RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia. This claim supports only the NetworkSourceReference endpoint of its sibling distinction.
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-009
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines URI and relative-reference resolution; Moonweave applies those rules to file-resource identity. This evidence supports the manually reviewed positive case for FileResourceReference-is_a-ResourceReference: file:///D:/runbooks/recovery.md identifies a resource through filesystem naming."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-010
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines URI and relative-reference resolution; Moonweave applies those rules to file-resource identity. This evidence supports the manually reviewed boundary case for FileResourceReference-is_a-ResourceReference: https://docs.example.org/recovery.md uses a network authority."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-resource-reference-011
    source: eng-std-rfc3986-uri-generic-syntax
    supports: RFC 3986 defines URI and relative-reference resolution; Moonweave applies those rules to file-resource identity.
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-file-ref-mcp
    source: src-mcp-resources
    supports: MCP file URIs identify FileResourceReference targets.
    locator: file URI
    evidence_kind: primary-spec
    confidence: high
  - id: claim-file-ref-a2a
    source: src-a2a-file
    supports: A2A FilePart uri/name/mimeType map to FileResourceReference.
    locator: FilePart
    evidence_kind: primary-spec
    confidence: high
  - id: claim-file-ref-design
    source: src-info-sources-design
    supports: FileResourceReference is pointer without embedded file bytes.
    locator: FileResourceReference
    evidence_kind: design-inference
    confidence: high
