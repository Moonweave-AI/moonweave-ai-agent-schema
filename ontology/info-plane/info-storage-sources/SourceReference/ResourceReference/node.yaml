schema: moonweave.ai/ontology-node/v1
id: ResourceReference
kind: concept
labels:
  zh: 资源引用
  en: resource reference
  ja: リソース参照
semantics:
  short_definition:
    zh: 指向文件、网络文档或 URI 标识资源的引用分类。
    en: Reference classification pointing at files, network documents, or URI-identified resources.
    ja: file/network document/URI resource を指す reference 分類。
  definition:
    zh: ResourceReference 覆盖 MCP/A2A/仓库 URI 与 HTTP(S) 文档；子类 FileResourceReference、NetworkSourceReference、TextDocumentReference 表达不同命名规则。不是 Attachment content block 本身。
    en: ResourceReference covers MCP/A2A/repository URIs and HTTP(S) documents; subclasses FileResourceReference, NetworkSourceReference, TextDocumentReference express naming rules. Not the Attachment content block itself.
    ja: ResourceReference は URI/path 系 reference 分類。
  why_needed:
    zh: 该中间层把完整资源引用与结构化记录引用、治理对象引用分开，避免所有 XXXReference 直接平铺在来源引用之下。
    en: This intermediate genus separates whole-resource references from structured-record and governance references, preventing every XXXReference from being flattened under SourceReference.
    ja: この中間 genus は whole-resource reference を structured-record・governance reference から分け、すべての XXXReference が SourceReference 直下に平置きされることを防ぎます。
  includes:
    - zh: 能够通过资源标识整体识别的文件、网络资源或逻辑文档引用。
      en: References to files, network resources, or logical documents identifiable as whole resources.
      ja: resource identifier で全体を識別できる file・network resource・logical document の参照。
  excludes:
    - zh: 只标识表中一行、图中一节点或数据治理分区的引用。
      en: References that identify only one table row, graph node, or data-governance partition.
      ja: table row・graph node・data governance partition だけを識別する参照。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Attachment→FileResourceReference；RAG document→TextDocumentReference；https URL→NetworkSourceReference。
    en: Attachment→FileResourceReference; RAG document→TextDocumentReference; https URL→NetworkSourceReference.
    ja: Attachment/RAG/URL 映射。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - resource_identifier
  fields:
    - id: resource_identifier
      labels:
        zh: 资源标识
        en: resource identifier
        ja: リソース識別子
      definitions:
        zh: 在其命名体系内标识完整资源。
        en: Identifies the whole resource within its naming system.
        ja: 命名体系内で resource 全体を識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: urn:docs:runbook-42
      allowed_values: []
      source_claims:
        - claim-resource-reference-002
  constraints: []
  required_relations: []
examples:
  - id: ResourceReference-example-file
    labels:
      zh: 文件资源
      en: File resource
      ja: file resource
    descriptions:
      zh: file:///workspace/docs/onboarding.md 分类为 FileResourceReference。
      en: file:///workspace/docs/onboarding.md classifies as FileResourceReference.
      ja: file URI。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: file URI
    field_values: {}
    related_node_ids:
      - ResourceReference
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-resource-ref-mcp
  - id: ResourceReference-example-network
    labels:
      zh: 网络源
      en: Network source
      ja: network source
    descriptions:
      zh: https://docs.example.com/policy 分类为 NetworkSourceReference。
      en: https://docs.example.com/policy classifies as NetworkSourceReference.
      ja: https URL。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: network
    field_values: {}
    related_node_ids:
      - ResourceReference
      - NetworkSourceReference
    related_relation_ids: []
    source_claims:
      - claim-resource-ref-design
  - id: ResourceReference-example-not-record
    labels:
      zh: 非 RecordReference
      en: Not RecordReference
      ja: RecordReference ではない
    descriptions:
      zh: PostgreSQL 行键不得建模为 ResourceReference。
      en: PostgreSQL row keys must not be ResourceReference.
      ja: DB row→RecordReference。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ResourceReference
    related_relation_ids: []
    source_claims:
      - claim-resource-ref-design
parent_relation:
  id: ResourceReference-is_a-SourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 资源引用是一种来源引用，并以完整资源及其独立资源标识为种差。
    en: ResourceReference is a SourceReference specialized by a whole resource and its independent resource identifier.
    ja: ResourceReference は whole resource と independent resource identifier で細分化した SourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ResourceReference-is_a-SourceReference-example-positive-manual-001
      labels:
        zh: ResourceReference-is_a-SourceReference正例
        en: ResourceReference-is_a-SourceReference positive case
        ja: ResourceReference-is_a-SourceReference正例
      descriptions:
        zh: urn:docs:runbook-42 指向完整文档资源。
        en: urn:docs:runbook-42 points to a complete document resource.
        ja: urn:docs:runbook-42 は complete document resource を指します。
      field_values: {}
      related_node_ids:
        - ResourceReference
        - SourceReference
      related_relation_ids:
        - ResourceReference-is_a-SourceReference
      source_claims:
        - claim-resource-reference-008
    - id: ResourceReference-is_a-SourceReference-example-boundary-manual-001
      labels:
        zh: ResourceReference-is_a-SourceReference边界例
        en: ResourceReference-is_a-SourceReference boundary case
        ja: ResourceReference-is_a-SourceReference境界例
      descriptions:
        zh: orders/7812 只标识表内一行。
        en: orders/7812 identifies only one row within a table.
        ja: orders/7812 は table 内の一 row だけを識別します。
      field_values: {}
      related_node_ids:
        - ResourceReference
        - SourceReference
      related_relation_ids:
        - ResourceReference-is_a-SourceReference
      source_claims:
        - claim-resource-reference-009
  source_claims:
    - claim-resource-reference-010
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-resource-reference-001
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-002
    source: eng-std-w3c-web-annotation-model
    supports: "The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus. For ResourceReference.resource_identifier, the field records this reviewed value: Identifies the whole resource within its naming system."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-003
    source: eng-std-w3c-web-annotation-model
    supports: "The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus. This evidence supports the manually reviewed positive case for ResourceReference: urn:docs:runbook-42 identifies the complete runbook rather than one line within it."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-004
    source: eng-std-w3c-web-annotation-model
    supports: "The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus. This evidence supports the manually reviewed instance case for ResourceReference: A resource catalog stores the durable identifier of a PDF as resource_identifier."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-005
    source: eng-std-w3c-web-annotation-model
    supports: "The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus. This evidence supports the manually reviewed boundary case for ResourceReference: Primary key 7812 in the orders table identifies only one record."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-006
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus. This claim supports only the ResourceReference endpoint of its sibling distinction.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-007
    source: eng-ont-prov-o
    supports: PROV-O explicitly allows non-geographic locations such as a directory, row, or column; Moonweave distinguishes a keyed record reference from a coordinate location. This claim supports only the RecordReference endpoint of its sibling distinction.
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires a SpecificResource to refer to exactly one source resource; Moonweave classifies whole-resource references under SourceReference. This evidence supports the manually reviewed positive case for ResourceReference-is_a-SourceReference: urn:docs:runbook-42 points to a complete document resource."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires a SpecificResource to refer to exactly one source resource; Moonweave classifies whole-resource references under SourceReference. This evidence supports the manually reviewed boundary case for ResourceReference-is_a-SourceReference: orders/7812 identifies only one row within a table."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-reference-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires a SpecificResource to refer to exactly one source resource; Moonweave classifies whole-resource references under SourceReference.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-ref-mcp
    source: src-mcp-resources
    supports: MCP resource URIs classify as ResourceReference.
    locator: Resource URI
    evidence_kind: primary-spec
    confidence: high
  - id: claim-resource-ref-design
    source: src-info-sources-design
    supports: ResourceReference covers URI/path resources distinct from database records.
    locator: ResourceReference
    evidence_kind: design-inference
    confidence: high
