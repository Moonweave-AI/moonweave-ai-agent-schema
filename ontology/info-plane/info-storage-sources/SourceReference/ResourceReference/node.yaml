schema: moonweave.ai/ontology-node/v1
id: ResourceReference
kind: concept
status: review
labels:
  zh: 资源引用
  en: resource reference
  ja: リソース参照
semantics:
  short_definition:
    zh: 指向可独立识别资源的来源引用。
    en: A source reference to an independently identifiable resource.
    ja: 独立識別可能な resource への source reference。
  definition:
    zh: 资源引用是来源引用的一类，种差是 referent 作为完整资源存在并有自己的资源标识；文件、网络对象和逻辑文档都可作为资源，但行记录或治理分区不属于此类。
    en: ResourceReference is a SourceReference whose referent exists as a complete resource with its own resource identifier; files, network objects, and logical documents qualify, whereas row records and governance partitions do not.
    ja: ResourceReference は完全な resource として独自の識別子を持つ referent への SourceReference です。file・network object・logical document を含みますが、row record や governance partition は含みません。
  why_needed:
    zh: 该中间层把完整资源引用与结构化记录引用、治理对象引用分开，避免所有 XXXReference 直接平铺在来源引用之下。
    en: This intermediate genus separates whole-resource references from structured-record and governance references, preventing every XXXReference from being flattened under SourceReference.
    ja: この中間 genus は whole-resource reference を structured-record・governance reference から分け、すべての XXXReference が SourceReference 直下に平置きされることを防ぎます。
  includes:
    - zh: 能够通过资源标识整体识别的文件、网络资源或逻辑文档引用。
      en: References to files, network resources, or logical documents identifiable as whole resources.
      ja: resource identifier で全体を識別できる file・network resource・logical document の参照。
  excludes:
    - zh: 只标识表中一行、图中一节点或数据治理分区的引用。
      en: References that identify only one table row, graph node, or data-governance partition.
      ja: table row・graph node・data governance partition だけを識別する参照。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - resource_identifier
  fields:
    - id: resource_identifier
      labels:
        zh: 资源标识
        en: resource identifier
        ja: リソース識別子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在其命名体系内标识完整资源。
        en: Identifies the whole resource within its naming system.
        ja: 命名体系内で resource 全体を識別します。
      allowed_values: []
      pattern: null
      example_value: urn:docs:runbook-42
      source_claims:
        - claim-resource-reference-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ResourceReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 资源引用正例
      en: resource reference positive case
      ja: リソース参照正例
    scenario_id: null
    descriptions:
      zh: urn:docs:runbook-42 标识完整操作手册，而不是其中一行。
      en: urn:docs:runbook-42 identifies the complete runbook rather than one line within it.
      ja: urn:docs:runbook-42 は一行ではなく runbook 全体を識別します。
    field_values:
      resource_identifier: urn:docs:runbook-42
      reference_id: resource-ref-runbook-42
      reference_value: urn:docs:runbook-42
    related_node_ids:
      - ResourceReference
      - SourceReference
    related_relation_ids:
      - ResourceReference-is_a-SourceReference
    expected_result:
      zh: ResourceReference 保持其已审查身份，并按定义解释 ResourceReference-is_a-SourceReference。
      en: Retain the reviewed identity of ResourceReference and interpret ResourceReference-is_a-SourceReference exactly as defined.
      ja: ResourceReference の reviewed identity を保持し ResourceReference-is_a-SourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: referent 是有独立标识的完整资源。
      en: The referent is a complete independently identified resource.
      ja: referent は独立識別された完全 resource です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-reference-003
  - id: ResourceReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 资源引用实例
      en: resource reference instance case
      ja: リソース参照実例
    scenario_id: null
    descriptions:
      zh: 资源目录以 resource_identifier 保存一个 PDF 的持久标识。
      en: A resource catalog stores the durable identifier of a PDF as resource_identifier.
      ja: resource catalog が PDF の永続識別子を resource_identifier として保存します。
    field_values:
      resource_identifier: urn:docs:runbook-42
    related_node_ids:
      - ResourceReference
      - SourceReference
    related_relation_ids:
      - ResourceReference-is_a-SourceReference
    expected_result:
      zh: ResourceReference 保持其已审查身份，并按定义解释 ResourceReference-is_a-SourceReference。
      en: Retain the reviewed identity of ResourceReference and interpret ResourceReference-is_a-SourceReference exactly as defined.
      ja: ResourceReference の reviewed identity を保持し ResourceReference-is_a-SourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 该记录可在不读取 PDF 内容时成立。
      en: The record remains complete without reading the PDF content.
      ja: PDF 本文を読まなくても記録は成立します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-reference-004
  - id: ResourceReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 资源引用边界例
      en: resource reference boundary case
      ja: リソース参照境界例
    scenario_id: null
    descriptions:
      zh: orders 表中主键 7812 只标识一条记录。
      en: Primary key 7812 in the orders table identifies only one record.
      ja: orders table の primary key 7812 は一 record だけを識別します。
    field_values:
      record_primary_key: 7812
    related_node_ids:
      - ResourceReference
      - SourceReference
    related_relation_ids:
      - ResourceReference-is_a-SourceReference
    expected_result:
      zh: 不把该对象归入 ResourceReference，也不凭邻近或词形推断 ResourceReference-is_a-SourceReference。
      en: Do not classify the object as ResourceReference or infer ResourceReference-is_a-SourceReference from proximity or lexical form.
      ja: object を ResourceReference に分類せず proximity/lexical form から ResourceReference-is_a-SourceReference を推論しません。
    why_valid_or_invalid:
      zh: 该对象属于 RecordReference，而非完整资源引用。
      en: That object is a RecordReference, not a whole-resource reference.
      ja: その対象は whole-resource reference ではなく RecordReference です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-reference-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: RecordReference
    shared_parent_concept_id: SourceReference
    differentia:
      zh: 资源引用依据“资源引用是来源引用的一类，种差是 referent 作为完整资源存在并有自己的资源标识；文件、网络对象和逻辑文档都可作为资源，但行记录或治理分区不属于此类。”归类；记录引用依据“记录引用是来源引用的一类，种差是通过容器身份与成员键的组合标识表行、图节点等逻辑记录；它不把整个数据库、图或文件当作 referent。”归类。二者共享 SourceReference，但任一端条件均不推出另一端。
      en: ResourceReference is classified by “ResourceReference is a SourceReference whose referent exists as a complete resource with its own resource identifier; files, network objects, and logical documents qualify, whereas row records and governance partitions do not.” whereas RecordReference is classified by “RecordReference is a SourceReference specialized by the combination of container identity and member key that identifies a logical record such as a table row or graph node; it does not identify the database, graph, or file as a whole.”. They share SourceReference, but satisfying either condition leaves the other unproven.
      ja: ResourceReference は「ResourceReference は完全な resource として独自の識別子を持つ referent への SourceReference です。file・network object・logical document を含みますが、row record や governance partition は含みません。」で分類し、RecordReference は「RecordReference は container identity と member key の組で table row や graph node の logical record を識別する SourceReference であり、database・graph・file 全体を指しません。」で分類します。両者は SourceReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-resource-reference-006
      - claim-resource-reference-007
parent_relation:
  id: ResourceReference-is_a-SourceReference
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 资源引用是一种来源引用，并以完整资源及其独立资源标识为种差。
    en: ResourceReference is a SourceReference specialized by a whole resource and its independent resource identifier.
    ja: ResourceReference は whole resource と independent resource identifier で細分化した SourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: is_target_of_is_a
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ResourceReference-is_a-SourceReference-example-positive-manual-001
      kind: positive
      labels:
        zh: ResourceReference-is_a-SourceReference正例
        en: ResourceReference-is_a-SourceReference positive case
        ja: ResourceReference-is_a-SourceReference正例
      scenario_id: null
      descriptions:
        zh: urn:docs:runbook-42 指向完整文档资源。
        en: urn:docs:runbook-42 points to a complete document resource.
        ja: urn:docs:runbook-42 は complete document resource を指します。
      field_values: {}
      related_node_ids:
        - ResourceReference
        - SourceReference
      related_relation_ids:
        - ResourceReference-is_a-SourceReference
      expected_result:
        zh: 建立 ResourceReference —is_a→ SourceReference，并保持该方向与限定条件。
        en: Assert ResourceReference —is_a→ SourceReference while preserving its direction and qualifiers.
        ja: ResourceReference —is_a→ SourceReference を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: referent 有独立资源标识且不是容器成员。
        en: The referent has an independent resource identifier and is not merely a container member.
        ja: referent は independent resource identifier を持ち container member だけではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-resource-reference-008
    - id: ResourceReference-is_a-SourceReference-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ResourceReference-is_a-SourceReference边界例
        en: ResourceReference-is_a-SourceReference boundary case
        ja: ResourceReference-is_a-SourceReference境界例
      scenario_id: null
      descriptions:
        zh: orders/7812 只标识表内一行。
        en: orders/7812 identifies only one row within a table.
        ja: orders/7812 は table 内の一 row だけを識別します。
      field_values: {}
      related_node_ids:
        - ResourceReference
        - SourceReference
      related_relation_ids:
        - ResourceReference-is_a-SourceReference
      expected_result:
        zh: 拒绝建立 ResourceReference-is_a-SourceReference，两端对象仍保留各自身份。
        en: Reject ResourceReference-is_a-SourceReference; both endpoint objects retain their own identities.
        ja: ResourceReference-is_a-SourceReference を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 成员键应归 RecordReference，不能建立该 is_a 边。
        en: A member key belongs under RecordReference and does not justify this is_a edge.
        ja: member key は RecordReference に属し、この is_a edge を正当化しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-resource-reference-009
  source_claims:
    - claim-resource-reference-010
  distinct_fact_rationale:
    zh: ResourceReference-is_a-SourceReference 记录 ResourceReference 到 SourceReference 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: ResourceReference-is_a-SourceReference records one is_a fact from ResourceReference to SourceReference; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: ResourceReference-is_a-SourceReference は ResourceReference から SourceReference への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
