    source_claims:
      - claim-network-source-reference-003
  - id: NetworkSourceReference-example-instance-manual-002

    labels:
      zh: 网络来源引用实例
      en: network source reference instance case
      ja: ネットワーク出典参照実例

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->NetworkSourceReference.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->NetworkSourceReference.", ja: "DSPy instance maps to NetworkSourceReference PromptTemplate."}

    field_values:
      absolute_uri: https://docs.example.org/runbook
    related_node_ids:
      - NetworkSourceReference
      - ResourceReference
    related_relation_ids:
      - NetworkSourceReference-is_a-ResourceReference

    source_claims:
      - claim-network-source-reference-004
  - id: NetworkSourceReference-example-boundary-manual-003

    labels:
      zh: 网络来源引用边界例
      en: network source reference boundary case
      ja: ネットワーク出典参照境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; NetworkSourceReference must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; NetworkSourceReference must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values:
      file_uri: file:///D:/runbooks/recovery.md
    related_node_ids:
      - NetworkSourceReference
      - ResourceReference
    related_relation_ids:
      - NetworkSourceReference-is_a-ResourceReference

    source_claims:
