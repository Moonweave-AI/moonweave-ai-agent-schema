    supports: "RFC 3986 distinguishes URI references by scheme syntax and defines their components; Moonweave uses the absolute network form as this specialization. This evidence supports the manually reviewed positive case for NetworkSourceReference-is_a-ResourceReference: An HTTPS URI explicitly names a remote standards page."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-source-reference-009
