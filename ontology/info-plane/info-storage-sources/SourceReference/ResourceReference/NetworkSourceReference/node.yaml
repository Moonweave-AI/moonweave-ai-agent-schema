    - id: NetworkSourceReference-is_a-ResourceReference-example-boundary-manual-001
      labels:
        zh: NetworkSourceReference-is_a-ResourceReference边界例
        en: NetworkSourceReference-is_a-ResourceReference boundary case
        ja: NetworkSourceReference-is_a-ResourceReference境界例
      scenario_id: null
      descriptions:
        zh: 相对路径 ../manual.md 没有网络 scheme。
        en: Relative path ../manual.md has no network scheme.
        ja: relative path ../manual.md は network scheme を持ちません。
      field_values: {}
      related_node_ids:
        - NetworkSourceReference
        - ResourceReference
      related_relation_ids:
        - NetworkSourceReference-is_a-ResourceReference
      source_claims:
        - claim-network-source-reference-009
  source_claims:
    - claim-network-source-reference-010
  distinct_fact_rationale:
    zh: NetworkSourceReference-is_a-ResourceReference 记录 NetworkSourceReference 到 ResourceReference 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: NetworkSourceReference-is_a-ResourceReference records one is_a fact from NetworkSourceReference to ResourceReference; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: NetworkSourceReference-is_a-ResourceReference は NetworkSourceReference から ResourceReference への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
