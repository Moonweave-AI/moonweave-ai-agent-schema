    supports: "RFC 3986 distinguishes URI references by scheme syntax and defines their components; Moonweave uses the absolute network form as this specialization. This evidence supports the manually reviewed boundary case for NetworkSourceReference-is_a-ResourceReference: Relative path ../manual.md has no network scheme."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
