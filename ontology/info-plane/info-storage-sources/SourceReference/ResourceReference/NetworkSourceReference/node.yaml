external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TextDocumentReference
    shared_parent_concept_id: ResourceReference
    differentia:
      zh: 网络来源引用依据“网络来源引用是资源引用的一类，种差是绝对 URI 中的 scheme 与 authority 共同确定网络命名空间；它不等同于一次 HTTP 请求、连接状态或抓取结果。”归类；文本文档引用依据“文本文档引用是资源引用的一类，种差是 referent 被识别为具有独立文档身份的文本作品或文档版本；其身份不以当前文件路径、下载 URL 或摄入副本为必要条件。”归类。二者共享 ResourceReference，但任一端条件均不推出另一端。
      en: NetworkSourceReference is classified by “NetworkSourceReference is a ResourceReference specialized by an absolute URI whose scheme and authority establish a network namespace; it is not an HTTP request, connection state, or fetched representation.” whereas TextDocumentReference is classified by “TextDocumentReference is a ResourceReference whose referent is a textual work or document version with independent document identity; its identity need not depend on the current file path, download URL, or ingested copy.”. They share ResourceReference, but satisfying either condition leaves the other unproven.
      ja: NetworkSourceReference は「NetworkSourceReference は scheme と authority が network namespace を定める absolute URI を持つ ResourceReference であり、HTTP request・connection state・fetched representation ではありません。」で分類し、TextDocumentReference は「TextDocumentReference は独立 document identity を持つ textual work または document version への ResourceReference であり、current file path・download URL・ingested copy に依存しません。」で分類します。両者は ResourceReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-network-source-reference-006
      - claim-network-source-reference-007
parent_relation:
  id: NetworkSourceReference-is_a-ResourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 网络来源引用是一种资源引用，并以绝对网络 URI 的 scheme 与 authority 为种差。
    en: NetworkSourceReference is a ResourceReference specialized by the scheme and authority of an absolute network URI.
    ja: NetworkSourceReference は absolute network URI の scheme/authority で細分化した ResourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: NetworkSourceReference-is_a-ResourceReference-example-positive-manual-001
      labels:
        zh: NetworkSourceReference-is_a-ResourceReference正例
        en: NetworkSourceReference-is_a-ResourceReference positive case
        ja: NetworkSourceReference-is_a-ResourceReference正例
      scenario_id: null
      descriptions:
        zh: HTTPS URI 明确命名远程标准页面。
        en: An HTTPS URI explicitly names a remote standards page.
        ja: HTTPS URI は remote standards page を明示命名します。
      field_values: {}
      related_node_ids:
