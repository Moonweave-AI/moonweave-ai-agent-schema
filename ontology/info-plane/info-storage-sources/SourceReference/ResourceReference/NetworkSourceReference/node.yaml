source_claims:
  - id: claim-network-source-reference-001
    source: eng-std-rfc3986-uri-generic-syntax
    supports: RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia.
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-source-reference-002
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia. For NetworkSourceReference.absolute_uri, the field records this reviewed value: A complete network identifier containing a scheme and, when applicable, an authority."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-source-reference-003
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia. This evidence supports the manually reviewed positive case for NetworkSourceReference: https://docs.example.org/runbook identifies a remote resource through the HTTPS scheme and docs.example.org authority."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-source-reference-004
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia. This evidence supports the manually reviewed instance case for NetworkSourceReference: A reference record stores absolute_uri before any request is made."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-source-reference-005
    source: eng-std-rfc3986-uri-generic-syntax
    supports: "RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia. This evidence supports the manually reviewed boundary case for NetworkSourceReference: A GET /runbook request log contains only method, path, and response status."
    locator: RFC 3986 §4.1 URI Reference, page 25, paragraphs 1–2
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-source-reference-006
    source: eng-std-rfc3986-uri-generic-syntax
    supports: RFC 3986 defines a URI reference and its scheme-based distinction from relative references; Moonweave uses the absolute network form as this subtype's differentia. This claim supports only the NetworkSourceReference endpoint of its sibling distinction.
