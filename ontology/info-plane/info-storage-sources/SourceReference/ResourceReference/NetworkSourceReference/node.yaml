schema: moonweave.ai/ontology-node/v1
id: NetworkSourceReference
kind: concept
status: accepted
labels:
  zh: 网络来源引用
  en: network source reference
  ja: ネットワーク出典参照
semantics:
  short_definition:
    zh: 以绝对网络 URI 标识远程资源的资源引用。
    en: A resource reference that identifies a remote resource with an absolute network URI.
    ja: absolute network URI で remote resource を識別する resource reference。
  definition:
    zh: 网络来源引用是资源引用的一类，种差是绝对 URI 中的 scheme 与 authority 共同确定网络命名空间；它不等同于一次 HTTP 请求、连接状态或抓取结果。
    en: NetworkSourceReference is a ResourceReference specialized by an absolute URI whose scheme and authority establish a network namespace; it is not an HTTP request, connection state, or fetched representation.
    ja: NetworkSourceReference は scheme と authority が network namespace を定める absolute URI を持つ ResourceReference であり、HTTP request・connection state・fetched representation ではありません。
  why_needed:
    zh: 网络 URI 的规范化、相对解析和片段处理遵循 RFC 规则，与本地路径及文档业务键不同，必须单独表达。
    en: Network URI normalization, relative resolution, and fragment handling follow RFC rules distinct from local paths and document business keys, so they require a separate class.
    ja: network URI の normalization・relative resolution・fragment 処理は local path や document business key と異なる RFC rule に従うため別 class が必要です。
  includes:
    - zh: 含 scheme 与 authority 的 HTTP、HTTPS 或其他网络 URI 引用。
      en: HTTP, HTTPS, or other network URI references containing a scheme and authority.
      ja: scheme と authority を含む HTTP・HTTPS・他 network URI reference。
  excludes:
    - zh: 相对文件路径、网络请求执行、响应内容和没有网络命名空间的文档 ID。
      en: Relative file paths, network-request execution, response content, and document IDs without a network namespace.
      ja: relative file path・network request execution・response content・network namespace を持たない document ID。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - absolute_uri
  fields:
    - id: absolute_uri
      labels:
        zh: 绝对 URI
        en: absolute URI
        ja: 絶対 URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 包含 scheme 并在适用时包含 authority 的完整网络标识。
        en: A complete network identifier containing a scheme and, when applicable, an authority.
        ja: scheme と必要に応じ authority を含む完全 network identifier。
      allowed_values: []
      pattern: null
      example_value: https://docs.example.org/runbook
      source_claims:
        - claim-network-source-reference-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkSourceReference-example-positive-manual-001

    labels:
      zh: 网络来源引用正例
      en: network source reference positive case
      ja: ネットワーク出典参照正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; NetworkSourceReference maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; NetworkSourceReference maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; NetworkSourceReference context/token boundary."}

    field_values:
      absolute_uri: https://docs.example.org/runbook
      resource_identifier: https://docs.example.org/runbook
      reference_id: network-ref-docs-runbook
      reference_value: https://docs.example.org/runbook
    related_node_ids:
      - NetworkSourceReference
      - ResourceReference
    related_relation_ids:
