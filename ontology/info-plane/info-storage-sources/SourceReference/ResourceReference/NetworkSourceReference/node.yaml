schema: moonweave.ai/ontology-node/v1
id: NetworkSourceReference
kind: concept
labels:
  zh: 网络来源引用
  en: network source reference
  ja: ネットワーク出典参照
semantics:
  short_definition:
    zh: 以 HTTP(S) 或网络 URI 标识远程资源的引用特化。
    en: Resource reference specialized by HTTP(S) or network URI for remote resources.
    ja: HTTP(S)/network URI で remote resource を識別する reference 特化。
  definition:
    zh: NetworkSourceReference 映射 https:// 文档、OpenAI image_url.url 与 Anthropic image source url；需记录 mime_type 与可选 content_digest 以验证漂移。
    en: NetworkSourceReference maps https:// documents, OpenAI image_url.url, and Anthropic image source url; records mime_type and optional content_digest for drift verification.
    ja: NetworkSourceReference は URL 系 source。
  why_needed:
    zh: 网络 URI 的规范化、相对解析和片段处理遵循 RFC 规则，与本地路径及文档业务键不同，必须单独表达。
    en: Network URI normalization, relative resolution, and fragment handling follow RFC rules distinct from local paths and document business keys, so they require a separate class.
    ja: network URI の normalization・relative resolution・fragment 処理は local path や document business key と異なる RFC rule に従うため別 class が必要です。
  includes:
    - zh: 含 scheme 与 authority 的 HTTP、HTTPS 或其他网络 URI 引用。
      en: HTTP, HTTPS, or other network URI references containing a scheme and authority.
      ja: scheme と authority を含む HTTP・HTTPS・他 network URI reference。
  excludes:
    - zh: 相对文件路径、网络请求执行、响应内容和没有网络命名空间的文档 ID。
      en: Relative file paths, network-request execution, response content, and document IDs without a network namespace.
      ja: relative file path・network request execution・response content・network namespace を持たない document ID。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI {"type":"image_url","image_url":{"url":"https://..."}} 与 Anthropic {"type":"image","source":{"type":"url","url":"..."}} 产生 NetworkSourceReference。
    en: OpenAI image_url and Anthropic image url blocks produce NetworkSourceReference.
    ja: image_url/url block 映射。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - absolute_uri
  fields:
    - id: absolute_uri
      labels:
        zh: 绝对 URI
        en: absolute URI
        ja: 絶対 URI
      definitions:
        zh: 包含 scheme 并在适用时包含 authority 的完整网络标识。
        en: A complete network identifier containing a scheme and, when applicable, an authority.
        ja: scheme と必要に応じ authority を含む完全 network identifier。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://docs.example.org/runbook
      allowed_values: []
      source_claims:
        - claim-network-source-reference-002
  constraints: []
  required_relations: []
examples:
  - id: NetworkSourceReference-example-openai-image
    labels:
      zh: OpenAI image_url
      en: OpenAI image_url
      ja: OpenAI image_url
    descriptions:
      zh: https://example.com/arch.png image_url 创建 NetworkSourceReference。
      en: https://example.com/arch.png image_url creates NetworkSourceReference.
      ja: OpenAI image_url。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/chat/create
      version: image_url
    field_values: {}
    related_node_ids:
      - NetworkSourceReference
    related_relation_ids: []
    source_claims:
      - claim-network-ref-openai
  - id: NetworkSourceReference-example-anthropic-image
    labels:
      zh: Anthropic image url
      en: Anthropic image url
      ja: Anthropic image url
    descriptions:
      zh: Anthropic image block source.url 映射为 NetworkSourceReference。
      en: Anthropic image block source.url maps to NetworkSourceReference.
      ja: Anthropic image url。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: image url
    field_values: {}
    related_node_ids:
      - NetworkSourceReference
    related_relation_ids: []
    source_claims:
      - claim-network-ref-anthropic
  - id: NetworkSourceReference-example-file-uri
    labels:
      zh: 非 file URI
      en: Not file URI
      ja: file URI ではない
    descriptions:
      zh: file:/// 路径必须使用 FileResourceReference 而非 NetworkSourceReference。
      en: file:/// paths must use FileResourceReference not NetworkSourceReference.
      ja: file://→FileResourceReference。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - NetworkSourceReference
    related_relation_ids: []
    source_claims:
      - claim-network-ref-design
parent_relation:
  id: NetworkSourceReference-is_a-ResourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 网络来源引用是一种资源引用，并以绝对网络 URI 的 scheme 与 authority 为种差。
    en: NetworkSourceReference is a ResourceReference specialized by the scheme and authority of an absolute network URI.
    ja: NetworkSourceReference は absolute network URI の scheme/authority で細分化した ResourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: NetworkSourceReference-is_a-ResourceReference-example-positive-manual-001
      labels:
        zh: NetworkSourceReference-is_a-ResourceReference正例
        en: NetworkSourceReference-is_a-ResourceReference positive case
        ja: NetworkSourceReference-is_a-ResourceReference正例
      descriptions:
        zh: HTTPS URI 明确命名远程标准页面。
        en: An HTTPS URI explicitly names a remote standards page.
        ja: HTTPS URI は remote standards page を明示命名します。
      field_values: {}
      related_node_ids:
        - NetworkSourceReference
        - ResourceReference
      related_relation_ids:
        - NetworkSourceReference-is_a-ResourceReference
      source_claims:
        - claim-network-source-reference-008
    - id: NetworkSourceReference-is_a-ResourceReference-example-boundary-manual-001
      labels:
        zh: NetworkSourceReference-is_a-ResourceReference边界例
        en: NetworkSourceReference-is_a-ResourceReference boundary case
        ja: NetworkSourceReference-is_a-ResourceReference境界例
      descriptions:
        zh: 相对路径 ../manual.md 没有网络 scheme。
        en: Relative path ../manual.md has no network scheme.
        ja: relative path ../manual.md は network scheme を持ちません。
      field_values: {}
      related_node_ids:
        - NetworkSourceReference
        - ResourceReference
      related_relation_ids:
        - NetworkSourceReference-is_a-ResourceReference
      source_claims:
        - claim-network-source-reference-009
  source_claims:
    - claim-network-source-reference-010
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
