schema: moonweave.ai/ontology-node/v1
id: HttpResourceReference
kind: concept
status: accepted
labels:
  zh: HTTP(S) 资源观察引用
  en: HTTP(S) Resource Observation Reference
  ja: HTTP(S) リソース観測参照
semantics:
  short_definition:
    zh: 以不可复用的本地观察标识、HTTP(S) URI、获取时间和必需的已观察表示证据引用描述一次 HTTP(S) 表示观察的引用对象。
    en: Reference object that describes one HTTP(S) representation observation with a nonreusable local observation identifier, HTTP(S) URI, retrieval time, and required observed-representation evidence reference.
    ja: 再利用できないローカル観測識別子、HTTP(S) URI、取得時刻、必須の観測済み表現証拠参照で一回の HTTP(S) 表現観測を記述する参照オブジェクト。
  definition:
    zh: HttpResourceReference 是 ResourceReference 的一种，记录不可复用的本地 HTTP 观察标识、HTTP 或 HTTPS URI、观察到某个表示的 RFC 3339 UTC 时间、指向已捕获 HTTP 响应或所选表示的必需 observed_representation_ref，以及可选的 HttpEntityTag 引用和 Content-Location URI。它标识一次可审阅的 HTTP(S) 表示观察，不覆盖 SSH、FTP、WebSocket、消息队列或其他非 HTTP(S) 协议，也不承诺 URI 永久可用、内容不变或请求必然获得授权。
    en: HttpResourceReference is a kind of ResourceReference that records a nonreusable local HTTP observation identifier, an HTTP or HTTPS URI, the RFC 3339 UTC time at which one representation was observed, a required observed_representation_ref to captured HTTP response or selected-representation evidence, and optional HttpEntityTag reference and Content-Location URI. It identifies one reviewable HTTP(S) representation observation, does not cover SSH, FTP, WebSocket, message queues, or other non-HTTP(S) protocols, and does not promise that the URI remains available, the content remains unchanged, or a request will be authorized.
    ja: HttpResourceReference は、再利用できないローカル HTTP 観測識別子、HTTP または HTTPS URI、ある表現を観測した RFC 3339 UTC 時刻、捕捉済み HTTP 応答または選択表現証拠を指す必須 observed_representation_ref、任意の HttpEntityTag 参照と Content-Location URI を記録する ResourceReference の一種です。レビュー可能な一回の HTTP(S) 表現観測を識別し、SSH、FTP、WebSocket、メッセージキュー、その他の非 HTTP(S) プロトコルを対象とせず、URI が永続的に利用可能であること、内容が不変であること、要求が認可されることも約束しません。
  why_needed:
    zh: 同一 HTTP(S) URI 可在同一秒内被多次观察并可随时间返回不同表示。不可复用观察标识、获取时间、必需的表示证据引用和类型化定位符共同避免把多次观察、单纯访问尝试或 Web 地址误当成固定内容版本。
    en: The same HTTP(S) URI can be observed more than once in the same second and can return different representations over time. A nonreusable observation identifier, retrieval time, required representation-evidence reference, and typed locators avoid treating separate observations, a mere access attempt, or a Web address as a fixed content version.
    ja: 同じ HTTP(S) URI は同一秒内に複数回観測され、時刻によって異なる表現を返すことがあります。再利用できない観測識別子、取得時刻、必須の表現証拠参照、型付きロケータにより、別々の観測、単なるアクセス試行、または Web アドレスを固定の内容版と誤認することを避けられます。
  includes:
    - zh: 不可复用的观察标识、HTTP 或 HTTPS 目标 URI、观察到的获取时间、必需的已捕获表示证据引用、类型化 HttpEntityTag 引用和 Content-Location URI。
      en: Nonreusable observation identifiers, HTTP or HTTPS target URIs, observed retrieval times, required captured-representation evidence references, typed HttpEntityTag references, and Content-Location URIs.
      ja: 再利用できない観測識別子、HTTP または HTTPS の対象 URI、観測された取得時刻、必須の捕捉済み表現証拠参照、型付き HttpEntityTag 参照、Content-Location URI。
  excludes:
    - zh: 没有已捕获表示证据的访问尝试、已获取的响应正文、HTTP 凭据、重试策略、缓存实现、永久性承诺、未类型化表示对象，以及 SSH、FTP、WebSocket、消息队列或其他非 HTTP(S) 协议的定位。
      en: Access attempts without captured representation evidence, retrieved response bodies, HTTP credentials, retry policies, cache implementations, permanence guarantees, untyped representation objects, and locators for SSH, FTP, WebSocket, message queues, or other non-HTTP(S) protocols.
      ja: 捕捉済み表現証拠のないアクセス試行、取得済みの応答本文、HTTP 資格情報、再試行方針、キャッシュ実装、永続性の保証、型なし表現オブジェクト、ならびに SSH、FTP、WebSocket、メッセージキュー、その他の非 HTTP(S) プロトコルのロケータ。
  semantic_kind: information
  aliases:
    - http-resource-reference
    - https-resource-reference
    - http-observation-locator
engineering:
  explanation:
    zh: 本地摄取器为每次 HTTP 表示观察生成不可复用的 http_observation_id，解析 URI scheme，保存调用方实际观察到的 UTC 获取时间，并要求 observed_representation_ref 指向已捕获 HTTP 响应或所选表示证据。它可另存 http_entity_tag_ref 或 content_location_uri。这是本体的本地投影，而非 RFC 规定的 JSON 记录格式。读取正文、重定向跟随和认证由独立 HTTP 客户端及安全策略处理，不能从定位对象推导。
    en: A local ingestor creates a nonreusable http_observation_id for each HTTP representation observation, parses the URI scheme, retains the UTC retrieval time actually observed by the caller, and requires observed_representation_ref to resolve to captured HTTP response or selected-representation evidence. It can additionally retain http_entity_tag_ref or content_location_uri. This is a local ontology projection rather than an RFC-mandated JSON record. Body retrieval, redirect following, and authentication are handled by a separate HTTP client and security policy and cannot be inferred from the locator object.
    ja: ローカル取り込み器は HTTP 表現観測ごとに再利用できない http_observation_id を作成し、URI スキームを解析して、呼び出し側が実際に観測した UTC 取得時刻を保持し、observed_representation_ref が捕捉済み HTTP 応答または選択表現証拠へ解決することを要求します。さらに http_entity_tag_ref または content_location_uri を保持できます。これは RFC が義務付ける JSON 記録ではなく、ローカル本体投影です。本文取得、リダイレクト追従、認証は別の HTTP クライアントとセキュリティ方針が扱い、ロケータオブジェクトから推論できません。
  typical_input:
    - description:
        zh: 包含观察标识、已捕获表示证据和类型化 ETag 引用的 HTTPS 本地投影输入
        en: Local-projection HTTPS input with observation identifier captured representation evidence and typed ETag reference
        ja: 観測識別子、捕捉済み表現証拠、型付き ETag 参照を含む HTTPS ローカル投影入力
      format: '{"http_observation_id":"http-observation-20260718-001","http_uri":"https://example.org/spec","retrieved_at":"2026-07-18T09:00:00Z","observed_representation_ref":"captured-response-42/representation-1","http_entity_tag_ref":"http-entity-tag-42"}'
      source_claims:
        - claim-rfc3986-uri
        - claim-rfc9110-etag-validator
        - claim-local-http-observation-projection
  typical_output:
    - description:
        zh: 不包含响应正文但包含已捕获表示证据的类型化网络观察本地投影
        en: Typed local-projection network observation with captured representation evidence and without response body
        ja: 応答本文を含まず捕捉済み表現証拠を含む型付きネットワーク観測のローカル投影
      format: '{"http_observation_id":"http-observation-20260718-001","http_uri":"https://example.org/spec","retrieved_at":"2026-07-18T09:00:00Z","observed_representation_ref":"captured-response-42/representation-1","content_location_uri":"https://cdn.example.org/spec-v42"}'
      source_claims:
        - claim-rfc9110-content-location
        - claim-local-http-observation-projection
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Defines HTTP target URI semantics, ETag validators, and Content-Location field semantics.
structure:
  identity_keys:
    - source_reference_id
    - resource_identifier
    - identifier_form
    - http_observation_id
  fields:
    - id: source_reference_id
      labels:
        zh: 来源引用标识
        en: Source reference ID
        ja: ソース参照 ID
      definitions:
        zh: 继承的本地来源引用记录标识，用于索引 HTTP 表示观察，而不是 HTTP 请求标识或响应正文。
        en: Inherited local source-reference record identifier indexing the HTTP representation observation rather than an HTTP request identifier or response body.
        ja: HTTP リクエスト識別子や応答本文ではなく、HTTP 表現観測を索引する継承済みのローカル・ソース参照記録識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^src-ref-[a-z0-9-]+$
      example_value: src-ref-http-spec-observation-001
      allowed_values: []
      source_claims:
        - claim-local-http-observation-projection
    - id: reference_type
      labels:
        zh: 引用类型
        en: Reference type
        ja: 参照種別
      definitions:
        zh: 继承的解析类型，固定为 uri，说明来源标识按 HTTP(S) URI 处理而非 ETag、版本标签或响应内容。
        en: Inherited resolution type fixed to uri, stating that the source identifier is handled as an HTTP(S) URI rather than an ETag, version label, or response content.
        ja: 継承する解決種別であり、uri に固定する。ソース識別子が ETag、版ラベル、または応答内容ではなく HTTP(S) URI として扱われることを示す。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: uri
      allowed_values:
        - uri
      source_claims:
        - claim-rfc3986-uri
        - claim-http-target-uri
    - id: source_identifier
      labels:
        zh: 来源标识值
        en: Source identifier value
        ja: ソース識別子値
      definitions:
        zh: 继承的 HTTP(S) 来源标识值，必须等于 resource_identifier 和 http_uri；它定位请求目标，不承诺长期相同的表示。
        en: Inherited HTTP(S) source identifier value that must equal resource_identifier and http_uri; it locates the request target without promising a stable representation over time.
        ja: resource_identifier および http_uri と等しくなければならない継承済みの HTTP(S) ソース識別子値。リクエスト対象を位置付けるが、長期に同じ表現であることを約束しない。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^https?:'
      example_value: https://example.org/spec
      allowed_values: []
      source_claims:
        - claim-rfc3986-uri
        - claim-http-target-uri
    - id: resource_identifier
      labels:
        zh: 资源标识
        en: Resource identifier
        ja: リソース識別子
      definitions:
        zh: 继承的可读取资源标识；在此子类中必须等于 http_uri，而表示元数据和响应证据另行保存。
        en: Inherited readable-resource identifier that must equal http_uri in this subtype, while representation metadata and response evidence remain separate.
        ja: この下位型では http_uri と等しくなければならない継承済みの読み取り可能リソース識別子。表現メタデータと応答証拠は別に保持する。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^https?:'
      example_value: https://example.org/spec
      allowed_values: []
      source_claims:
        - claim-http-target-uri
    - id: identifier_form
      labels:
        zh: 标识形式
        en: Identifier form
        ja: 識別子形式
      definitions:
        zh: 继承的资源标识形式，在此子类中固定为 uri，而不是 HTTP ETag、Content-Location 或本地观察 ID。
        en: Inherited resource identifier form fixed to uri in this subtype, not an HTTP ETag, Content-Location, or local observation ID.
        ja: この下位型では uri に固定される継承済みのリソース識別子形式。HTTP ETag、Content-Location、またはローカル観測 ID ではない。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: uri
      allowed_values:
        - uri
      source_claims:
        - claim-http-target-uri
    - id: read_mechanism
      labels:
        zh: 读取机制
        en: Read mechanism
        ja: 読み取り機構
      definitions:
        zh: 继承的内容读取操作名称，固定为 http-fetch；它表示一次 HTTP 获取而不是对响应内容、授权或永久可用性的保证。
        en: Inherited content-read operation name fixed to http-fetch; it denotes one HTTP retrieval rather than a guarantee about response content, authorization, or permanent availability.
        ja: http-fetch に固定される継承済みの内容読み取り操作名。応答内容、認可、または恒久的可用性の保証ではなく、一回の HTTP 取得を表す。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: http-fetch
      allowed_values:
        - http-fetch
      source_claims:
        - claim-http-target-uri
    - id: http_observation_id
      labels:
        zh: HTTP 观察标识
        en: HTTP observation identifier
        ja: HTTP 観測識別子
      definitions:
        zh: 由本地摄取器为一次且仅一次 HTTP 观察创建的不可复用关联标识，不是 HTTP 协议字段。
        en: Nonreusable correlation identifier created by a local ingestor for one and only one HTTP observation and not an HTTP protocol field.
        ja: 一回だけの HTTP 観測のためにローカル取り込み器が作成する再利用不能な相関識別子であり、HTTP プロトコルフィールドではありません。
      datatype: identifier
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^http-observation-[A-Za-z0-9._~-]+$'
      example_value: http-observation-20260718-001
      allowed_values: []
      source_claims:
        - claim-local-http-observation-projection
    - id: http_uri
      labels:
        zh: HTTP(S) URI
        en: HTTP(S) URI
        ja: HTTP(S) URI
      definitions:
        zh: 使用 HTTP 或 HTTPS scheme 的目标资源 URI，不泛指其他网络协议地址。
        en: Target resource URI using the HTTP or HTTPS scheme and not a generic address for other network protocols.
        ja: HTTP または HTTPS スキームを使う対象リソース URI であり、他のネットワークプロトコルの汎用アドレスではありません。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^(http|https)://'
      example_value: https://example.org/spec
      allowed_values: []
      source_claims:
        - claim-rfc3986-uri
        - claim-http-target-uri
    - id: retrieved_at
      labels:
        zh: 获取时间
        en: Retrieved at
        ja: 取得時刻
      definitions:
        zh: 调用方观察到该网络表示时的可解释 UTC 时间戳。
        en: Interpretable UTC timestamp at which the caller observed the network representation.
        ja: 呼び出し側がネットワーク表現を観測したときの解釈可能な UTC タイムスタンプ。
      datatype: rfc3339-date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$'
      example_value: 2026-07-18T09:00:00Z
      allowed_values: []
      source_claims:
        - claim-rfc3339-utc-date-time
        - claim-local-http-observation-projection
    - id: observed_representation_ref
      labels:
        zh: 已观察表示证据引用
        en: Observed representation evidence reference
        ja: 観測済み表現証拠参照
      definitions:
        zh: 指向调用方已捕获 HTTP 响应或所选表示证据的必需类型化引用，用于证明该记录描述的是表示观察而非单纯访问尝试。
        en: Required typed reference to captured HTTP response or selected-representation evidence held by the caller, proving that this record describes a representation observation rather than a mere access attempt.
        ja: この記録が単なるアクセス試行ではなく表現観測を記述することを示すため、呼び出し側が保持する捕捉済み HTTP 応答または選択表現証拠への必須型付き参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: captured-response-42/representation-1
      allowed_values: []
      source_claims:
        - claim-local-http-observation-projection
    - id: http_entity_tag_ref
      labels:
        zh: HTTP 实体标签引用
        en: HTTP entity tag reference
        ja: HTTP エンティティタグ参照
      definitions:
        zh: 指向已观察到的 HttpEntityTag 记录的类型化引用，不能将 ETag 原始值压入无类型表示对象。
        en: Typed reference to an observed HttpEntityTag record and not an untyped representation object containing a raw ETag value.
        ja: 観測済み HttpEntityTag レコードへの型付き参照であり、生の ETag 値を含む型なし表現オブジェクトではありません。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: http-entity-tag-42
      allowed_values: []
      source_claims:
        - claim-rfc9110-etag-validator
        - claim-local-http-observation-projection
    - id: content_location_uri
      labels:
        zh: Content-Location URI
        en: Content-Location URI
        ja: Content-Location URI
      definitions:
        zh: 观察到的 HTTP Content-Location 字段的 URI 引用，独立于 ETag，不等同于响应正文或永久规范 URI。
        en: URI reference observed in an HTTP Content-Location field and independent of ETag, not a response body or a permanent canonical URI.
        ja: HTTP Content-Location フィールドで観測された URI 参照であり、ETag とは独立し、応答本文または恒久的な正規 URI ではありません。
      datatype: uri-reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: https://cdn.example.org/spec-v42
      allowed_values: []
      source_claims:
        - claim-rfc9110-content-location
        - claim-local-http-observation-projection
  constraints:
    - id: http-resource-reference-requires-unique-observation-context
      severity: error
      expression_language: plain
      expression: source_reference_id, source_identifier, resource_identifier, http_observation_id, http_uri, retrieved_at, observed_representation_ref, identifier_form uri, and read_mechanism http-fetch are required; source_identifier and resource_identifier must equal http_uri; http_observation_id must be unique and never reused; http_uri must use HTTP or HTTPS; retrieved_at must be an RFC 3339 UTC date-time ending in Z; observed_representation_ref must resolve to captured HTTP response or selected-representation evidence; http_entity_tag_ref when present must reference HttpEntityTag; content_location_uri when present is an observed Content-Location URI reference and no field may contain a response body credentials or a permanence guarantee.
      explanation:
        zh: 本地观察标识保证同一 URI 在同一秒的多次观察仍可区分，必需的表示证据引用保证记录确实描述一个响应表示。ETag 与 Content-Location 各有 HTTP 语义并必须保持类型化，URI 仍只是定位符而非版本承诺。
        en: The local observation identifier keeps multiple same-second observations of one URI distinguishable, and the required representation-evidence reference ensures that the record actually describes a response representation. ETag and Content-Location have separate HTTP semantics and must remain typed, while a URI is still a locator rather than a version promise.
        ja: ローカル観測識別子により、一つの URI に対する同一秒内の複数観測も区別でき、必須の表現証拠参照により記録が実際に応答表現を記述することを保証します。ETag と Content-Location は別々の HTTP 意味論を持つため型付きのままにし、URI はなお版の約束ではなくロケータです。
      source_claims:
        - claim-rfc3986-uri
        - claim-rfc3339-utc-date-time
        - claim-local-retrieved-at-utc-policy
        - claim-rfc9110-etag-validator
        - claim-rfc9110-content-location
        - claim-local-http-observation-projection
  required_relations: []
examples:
  - id: http-resource-reference-a-reference-card-cites-the-rfc-3986-page
    labels:
      zh: 具有类型化 ETag 的 HTTPS 观察
      en: Anthropic Citations char_location, LangChain Document.metadata.source, RFC 9110 ETag/Content-Digest: HTTPS observation with typed ETag
      ja: Anthropic Citations / LangChain metadata.source / RFC 9110: 型付き ETag を伴う HTTPS 観測

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; HttpResourceReference maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; HttpResourceReference maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; HttpResourceReference context/token boundary."}
    field_values:
      source_reference_id: src-ref-http-spec-observation-001
      reference_type: uri
      source_identifier: https://example.org/spec
      resource_identifier: https://example.org/spec
      identifier_form: uri
      read_mechanism: http-fetch
      http_observation_id: http-observation-20260718-001
      http_uri: https://example.org/spec
      retrieved_at: 2026-07-18T09:00:00Z
      observed_representation_ref: captured-response-42/representation-1
      http_entity_tag_ref: http-entity-tag-42
    related_node_ids:
      - ResourceReference
      - HttpEntityTag
      - SourceIdentity
      - HttpResourceReference-specializes-ResourceReference
    source_claims:
      - claim-rfc9110-etag-validator
      - claim-local-http-observation-projection

      - HttpResourceReference
      - HttpResourceReference-specializes-ResourceReference
      - claim-local-http-observation-projection

      - ResourceReference
      - SourceProvenance
      - HttpResourceReference-specializes-ResourceReference
      - claim-rfc9110-content-location
      - claim-local-http-observation-projection

      - SourceReference
      - HttpResourceReference
      - HttpResourceReference-specializes-ResourceReference
      - claim-rfc3986-uri
      - claim-local-http-observation-projection

      - ResourceReference
      - HttpEntityTag
      - SourceIdentity
      - HttpResourceReference-specializes-ResourceReference
