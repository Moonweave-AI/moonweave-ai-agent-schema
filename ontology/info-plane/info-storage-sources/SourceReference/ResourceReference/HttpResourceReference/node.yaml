sources:
  - id: rfc3986
    title: RFC 3986 Uniform Resource Identifier Generic Syntax
    url: https://www.rfc-editor.org/rfc/rfc3986.html
    source_type: official-standard
    relevance: Defines generic URI syntax and resource identification without promising immutable representations.
  - id: rfc3339
    title: RFC 3339 Date and Time on the Internet Timestamps
    url: https://www.rfc-editor.org/rfc/rfc3339.html
    source_type: official-standard
    relevance: Defines the Internet date-time form and UTC designator used for observed retrieval timestamps.
  - id: rfc9110
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: official-standard
    relevance: Defines HTTP target URI semantics ETag validators and Content-Location field semantics.
source_claims:
  - id: claim-rfc3986-uri
    source: rfc3986
    supports: RFC 3986 defines generic URI syntax and explains that a URI identifies a resource without guaranteeing a particular representation remains unchanged.
    locator: Sections 1.1.3 and 3
    evidence_kind: official-standard
    confidence: high
  - id: claim-http-target-uri
    source: rfc9110
    supports: RFC 9110 defines HTTP target URI semantics for accessing a resource.
    locator: Section 7.1 Target URI
    evidence_kind: official-standard
    confidence: high
  - id: claim-rfc3339-utc-date-time
    source: rfc3339
    supports: RFC 3339 defines a date-time format whose UTC representation uses the Z suffix.
    locator: Sections 4.2 and 5.6
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-retrieved-at-utc-policy
    source: rfc3339
    supports: HttpResourceReference locally requires the RFC 3339 UTC Z form for retrieved_at; that field policy is not an RFC 3339 object model.
    locator: Sections 4.2 and 5.6
    evidence_kind: design-inference
    confidence: high
  - id: claim-rfc9110-etag-validator
    source: rfc9110
    supports: RFC 9110 defines ETag as an entity-tag validator for the selected representation.
    locator: Section 8.8.3 ETag
    evidence_kind: official-standard
    confidence: high
  - id: claim-rfc9110-content-location
    source: rfc9110
    supports: RFC 9110 defines Content-Location field semantics for identifying a resource corresponding to the representation data.
    locator: Section 8.7 Content-Location
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-http-observation-projection
    source: rfc9110
    supports: The nonreusable observation identifier required observed representation evidence reference and local JSON projection that separately links URI time ETag and Content-Location are ontology design choices rather than an RFC-mandated message format.
    locator: Sections 7.1, 8.7, and 8.8.3
    evidence_kind: design-inference
    confidence: high

