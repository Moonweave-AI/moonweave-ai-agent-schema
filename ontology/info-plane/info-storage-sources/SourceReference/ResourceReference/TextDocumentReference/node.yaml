schema: moonweave.ai/ontology-node/v1
id: TextDocumentReference
kind: concept
labels:
  zh: 文本文档引用
  en: text document reference
  ja: テキスト文書参照
semantics:
  short_definition:
    zh: 以文档 lineage 标识文本语料库对象的资源引用特化。
    en: Resource reference specialized by document lineage identifier for text corpus objects.
    ja: document lineage ID で text corpus object を識別する resource reference 特化。
  definition:
    zh: TextDocumentReference 用于 RAG 索引中的 repo://、doc-policy/v7 等逻辑文档身份，可与 SourceSpan 和 ContentDigest 组合表达 Citation；不是单次 HTTP GET URL。
    en: TextDocumentReference identifies logical documents like repo:// or doc-policy/v7 in RAG indexes, combinable with SourceSpan and ContentDigest for Citations—not a one-off HTTP GET URL.
    ja: TextDocumentReference は RAG document source。
  why_needed:
    zh: 同一文档可从文件系统、网络镜像或知识库读取；文档引用让这些访问位置变化时仍可保持 referent 身份。
    en: The same document can be read from a filesystem, network mirror, or knowledge base; a document reference preserves referent identity while those access locations change.
    ja: 同じ document は filesystem・network mirror・knowledge base から読めるため、access location が変化しても document reference が referent identity を保ちます。
  includes:
    - zh: 由文档 ID、文档版本 ID 或出版物标识指向文本资源的引用。
      en: References to text resources by document ID, document-version ID, or publication identifier.
      ja: document ID・document-version ID・publication identifier で text resource を指す参照。
  excludes:
    - zh: 文件路径引用、网页 URL 引用、已摄入 TextDocument 实体和文档内字符范围。
      en: File-path references, web-URL references, ingested TextDocument entities, and character ranges within a document.
      ja: file-path reference・web-URL reference・ingested TextDocument entity・document 内 character range。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: RAG chunk metadata document_id+version；Citation 回溯到 TextDocumentReference+SourceLineRange/SourcePageRange。
    en: RAG chunk metadata document_id+version; Citations trace to TextDocumentReference+line/page ranges.
    ja: RAG citation 回溯。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - document_identifier
  fields:
    - id: document_identifier
      labels:
        zh: 文档标识
        en: document identifier
        ja: 文書識別子
      definitions:
        zh: 在文档目录中稳定标识作品或指定文档版本。
        en: Stably identifies a work or specified document version in a document catalog.
        ja: document catalog 内で work または指定 document version を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: doc:ops:recovery:v7
      allowed_values: []
      source_claims:
        - claim-text-document-reference-002
  constraints: []
  required_relations: []
examples:
  - id: TextDocumentReference-example-rag-doc
    labels:
      zh: RAG 文档 lineage
      en: RAG document lineage
      ja: RAG document lineage
    descriptions:
      zh: doc-policy/v7 repo://docs/security-boundary.md 创建 TextDocumentReference。
      en: doc-policy/v7 repo://docs/security-boundary.md creates TextDocumentReference.
      ja: RAG doc id。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: document lineage
    field_values:
      document_id: doc-policy
      document_version: v7
    related_node_ids:
      - TextDocumentReference
      - SourceVersion
    related_relation_ids: []
    source_claims:
      - claim-text-doc-design
  - id: TextDocumentReference-example-citation-span
    labels:
      zh: 引用行范围
      en: Citation line span
      ja: citation line span
    descriptions:
      zh: lines:42..58 与 TextDocumentReference 组合构成 Citation。
      en: lines:42..58 combined with TextDocumentReference forms Citation.
      ja: line span citation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: citation
    field_values: {}
    related_node_ids:
      - TextDocumentReference
      - SourceLineRange
      - CitationAnchor
    related_relation_ids: []
    source_claims:
      - claim-text-doc-design
  - id: TextDocumentReference-example-not-mcp-file
    labels:
      zh: 非 MCP file URI
      en: Not MCP file URI alone
      ja: MCP file URI 単体ではない
    descriptions:
      zh: 纯 file:/// MCP 读取应优先 FileResourceReference；TextDocumentReference 强调 ingestion lineage。
      en: Pure file:/// MCP reads prefer FileResourceReference; TextDocumentReference emphasizes ingestion lineage.
      ja: lineage vs file URI。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: boundary
    field_values: {}
    related_node_ids:
      - TextDocumentReference
    related_relation_ids: []
    source_claims:
      - claim-text-doc-design
parent_relation:
  id: TextDocumentReference-is_a-ResourceReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 文本文档引用是一种资源引用，并以独立于当前访问位置的文本作品或文档版本身份为种差。
    en: TextDocumentReference is a ResourceReference specialized by textual-work or document-version identity independent of the current access location.
    ja: TextDocumentReference は current access location から独立した textual-work/document-version identity で細分化した ResourceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TextDocumentReference-is_a-ResourceReference-example-positive-manual-001
      labels:
        zh: TextDocumentReference-is_a-ResourceReference正例
        en: TextDocumentReference-is_a-ResourceReference positive case
        ja: TextDocumentReference-is_a-ResourceReference正例
      descriptions:
        zh: doc:ops:recovery:v7 指向一个具名文档版本。
        en: doc:ops:recovery:v7 points to a named document version.
        ja: doc:ops:recovery:v7 は named document version を指します。
      field_values: {}
      related_node_ids:
        - TextDocumentReference
        - ResourceReference
      related_relation_ids:
        - TextDocumentReference-is_a-ResourceReference
      source_claims:
        - claim-text-document-reference-008
    - id: TextDocumentReference-is_a-ResourceReference-example-boundary-manual-001
      labels:
        zh: TextDocumentReference-is_a-ResourceReference边界例
        en: TextDocumentReference-is_a-ResourceReference boundary case
        ja: TextDocumentReference-is_a-ResourceReference境界例
      descriptions:
        zh: 摄入后的 TextDocument 保存正文和分块状态。
        en: An ingested TextDocument stores content and chunking state.
        ja: ingested TextDocument は content/chunking state を保存します。
      field_values: {}
      related_node_ids:
        - TextDocumentReference
        - ResourceReference
      related_relation_ids:
        - TextDocumentReference-is_a-ResourceReference
      source_claims:
        - claim-text-document-reference-009
  source_claims:
    - claim-text-document-reference-010
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TextDocumentReference-refers_to-TextDocument
    predicate: refers_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 指向文本文档
      en: refers to text document
      ja: テキスト文書を参照する
    definitions:
      zh: 文本文档引用指向文本文档关系把引用记录解析到记忆摄入域拥有的 TextDocument 内容实体；引用不复制正文或摄入生命周期。
      en: TextDocumentReference refers_to TextDocument resolves the reference record to the TextDocument content entity owned by memory ingestion; the reference copies neither content nor ingestion lifecycle.
      ja: TextDocumentReference refers_to TextDocument は reference record を memory-ingestion 所有 TextDocument content entity に解決し content/ingestion lifecycle を複製しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_refers_to
      labels:
        zh: 反向：指向文本文档
        en: inverse of refers to text document
        ja: 逆：テキスト文書を参照する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: TextDocumentReference-refers_to-TextDocument-example-positive-manual-001
        labels:
          zh: TextDocumentReference-refers_to-TextDocument正例
          en: TextDocumentReference-refers_to-TextDocument positive case
          ja: TextDocumentReference-refers_to-TextDocument正例
        descriptions:
          zh: doc:ops:recovery:v7 唯一解析到摄入文档 doc-7812。
          en: doc:ops:recovery:v7 uniquely resolves to ingested document doc-7812.
          ja: doc:ops:recovery:v7 は ingested document doc-7812 に一意解決します。
        field_values: {}
        related_node_ids:
          - TextDocumentReference
          - TextDocument
        related_relation_ids:
          - TextDocumentReference-refers_to-TextDocument
        source_claims:
          - claim-text-document-reference-011
      - id: TextDocumentReference-refers_to-TextDocument-example-boundary-manual-001
        labels:
          zh: TextDocumentReference-refers_to-TextDocument边界例
          en: TextDocumentReference-refers_to-TextDocument boundary case
          ja: TextDocumentReference-refers_to-TextDocument境界例
        descriptions:
          zh: 标题 Recovery Guide 同时匹配三个文档。
          en: Title Recovery Guide matches three documents.
          ja: title Recovery Guide は三 document に match します。
        field_values: {}
        related_node_ids:
          - TextDocumentReference
          - TextDocument
        related_relation_ids:
          - TextDocumentReference-refers_to-TextDocument
        source_claims:
          - claim-text-document-reference-012
    source_claims:
      - claim-text-document-reference-013
    layout_role: cross-link
    target: concept:TextDocument
