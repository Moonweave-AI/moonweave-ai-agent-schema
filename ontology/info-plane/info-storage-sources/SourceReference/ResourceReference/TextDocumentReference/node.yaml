schema: moonweave.ai/ontology-node/v1
id: TextDocumentReference
kind: concept
status: accepted
labels:
  zh: 文本文档引用
  en: text document reference
  ja: テキスト文書参照
semantics:
  short_definition:
    zh: 以文档业务身份指向可读文本资源的资源引用。
    en: A resource reference to a readable text resource through document identity.
    ja: document identity で readable text resource を指す resource reference。
  definition:
    zh: 文本文档引用是资源引用的一类，种差是 referent 被识别为具有独立文档身份的文本作品或文档版本；其身份不以当前文件路径、下载 URL 或摄入副本为必要条件。
    en: TextDocumentReference is a ResourceReference whose referent is a textual work or document version with independent document identity; its identity need not depend on the current file path, download URL, or ingested copy.
    ja: TextDocumentReference は独立 document identity を持つ textual work または document version への ResourceReference であり、current file path・download URL・ingested copy に依存しません。
  why_needed:
    zh: 同一文档可从文件系统、网络镜像或知识库读取；文档引用让这些访问位置变化时仍可保持 referent 身份。
    en: The same document can be read from a filesystem, network mirror, or knowledge base; a document reference preserves referent identity while those access locations change.
    ja: 同じ document は filesystem・network mirror・knowledge base から読めるため、access location が変化しても document reference が referent identity を保ちます。
  includes:
    - zh: 由文档 ID、文档版本 ID 或出版物标识指向文本资源的引用。
      en: References to text resources by document ID, document-version ID, or publication identifier.
      ja: document ID・document-version ID・publication identifier で text resource を指す参照。
  excludes:
    - zh: 文件路径引用、网页 URL 引用、已摄入 TextDocument 实体和文档内字符范围。
      en: File-path references, web-URL references, ingested TextDocument entities, and character ranges within a document.
      ja: file-path reference・web-URL reference・ingested TextDocument entity・document 内 character range。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - document_identifier
  fields:
    - id: document_identifier
      labels:
        zh: 文档标识
        en: document identifier
        ja: 文書識別子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在文档目录中稳定标识作品或指定文档版本。
        en: Stably identifies a work or specified document version in a document catalog.
        ja: document catalog 内で work または指定 document version を安定識別します。
      allowed_values: []
      pattern: null
      example_value: doc:ops:recovery:v7
      source_claims:
        - claim-text-document-reference-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: TextDocumentReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 文本文档引用正例
      en: text document reference positive case
      ja: テキスト文書参照正例
    scenario_id: null
    descriptions:
      zh: doc:ops:recovery:v7 指向第七版恢复手册，无论它从文件还是镜像读取。
      en: doc:ops:recovery:v7 points to version seven of the recovery manual regardless of whether it is read from a file or mirror.
      ja: doc:ops:recovery:v7 は file か mirror かに関係なく recovery manual 第七版を指します。
    field_values:
      document_identifier: doc:ops:recovery:v7
      resource_identifier: doc:ops:recovery:v7
      reference_id: text-document-ref-ops-recovery-v7
      reference_value: doc:ops:recovery:v7
    related_node_ids:
      - TextDocumentReference
      - ResourceReference
    related_relation_ids:
      - TextDocumentReference-is_a-ResourceReference
    expected_result:
      zh: TextDocumentReference 保持其已审查身份，并按定义解释 TextDocumentReference-is_a-ResourceReference。
      en: Retain the reviewed identity of TextDocumentReference and interpret TextDocumentReference-is_a-ResourceReference exactly as defined.
      ja: TextDocumentReference の reviewed identity を保持し TextDocumentReference-is_a-ResourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 文档版本身份独立于访问位置且可以单独解析。
      en: Document-version identity is independent of access location.
      ja: document-version identity は access location から独立します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-text-document-reference-003
  - id: TextDocumentReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 文本文档引用实例
      en: text document reference instance case
      ja: テキスト文書参照実例
    scenario_id: null
    descriptions:
      zh: 引用目录保存 document_identifier=doc:ops:recovery:v7 并连接 TextDocument。
      en: A reference catalog stores document_identifier=doc:ops:recovery:v7 and links it to TextDocument.
      ja: reference catalog は document_identifier=doc:ops:recovery:v7 を保存し TextDocument へ結びます。
    field_values:
      document_identifier: doc:ops:recovery:v7
    related_node_ids:
      - TextDocumentReference
      - ResourceReference
    related_relation_ids:
      - TextDocumentReference-is_a-ResourceReference
    expected_result:
      zh: TextDocumentReference 保持其已审查身份，并按定义解释 TextDocumentReference-is_a-ResourceReference。
      en: Retain the reviewed identity of TextDocumentReference and interpret TextDocumentReference-is_a-ResourceReference exactly as defined.
      ja: TextDocumentReference の reviewed identity を保持し TextDocumentReference-is_a-ResourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用可以解析 referent，但不取得文档内容所有权。
      en: The reference can resolve the referent without taking ownership of document content.
      ja: 参照は document content を所有せず referent を解決できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-text-document-reference-004
  - id: TextDocumentReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 文本文档引用边界例
      en: text document reference boundary case
      ja: テキスト文書参照境界例
    scenario_id: null
    descriptions:
      zh: 摄入器保存了正文、分块状态和持久文档 ID。
      en: An ingester stores text content, chunking state, and a persistent document ID.
      ja: ingester は本文・chunking state・persistent document ID を保存します。
    field_values:
      document_identifier: doc:ops:recovery:v7
    related_node_ids:
      - TextDocumentReference
      - ResourceReference
    related_relation_ids:
      - TextDocumentReference-is_a-ResourceReference
    expected_result:
      zh: 不把该对象归入 TextDocumentReference，也不凭邻近或词形推断 TextDocumentReference-is_a-ResourceReference。
      en: Do not classify the object as TextDocumentReference or infer TextDocumentReference-is_a-ResourceReference from proximity or lexical form.
      ja: object を TextDocumentReference に分類せず proximity/lexical form から TextDocumentReference-is_a-ResourceReference を推論しません。
    why_valid_or_invalid:
      zh: 这是 memory-ingestion 的 TextDocument 实体，不是引用。
      en: This is the memory-ingestion TextDocument entity, not a reference.
      ja: これは参照ではなく memory-ingestion の TextDocument entity です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-text-document-reference-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: FileResourceReference
    shared_parent_concept_id: ResourceReference
    differentia:
      zh: 文本文档引用依据“文本文档引用是资源引用的一类，种差是 referent 被识别为具有独立文档身份的文本作品或文档版本；其身份不以当前文件路径、下载 URL 或摄入副本为必要条件。”归类；文件资源引用依据“文件资源引用是资源引用的一类，种差是用文件 URI 或规范化路径标识文件对象；路径用于身份解析，不表示文件已经读取、存在或获得访问授权。”归类。二者共享 ResourceReference，但任一端条件均不推出另一端。
      en: TextDocumentReference is classified by “TextDocumentReference is a ResourceReference whose referent is a textual work or document version with independent document identity; its identity need not depend on the current file path, download URL, or ingested copy.” whereas FileResourceReference is classified by “FileResourceReference is a ResourceReference specialized by a file URI or normalized path that identifies a file object; the path supports reference resolution but does not assert that the file was read, exists, or is authorized.”. They share ResourceReference, but satisfying either condition leaves the other unproven.
      ja: TextDocumentReference は「TextDocumentReference は独立 document identity を持つ textual work または document version への ResourceReference であり、current file path・download URL・ingested copy に依存しません。」で分類し、FileResourceReference は「FileResourceReference は file URI または正規化 path で file object を識別する ResourceReference です。path は参照解決に使いますが、read・existence・authorization を主張しません。」で分類します。両者は ResourceReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-text-document-reference-006
      - claim-text-document-reference-007
