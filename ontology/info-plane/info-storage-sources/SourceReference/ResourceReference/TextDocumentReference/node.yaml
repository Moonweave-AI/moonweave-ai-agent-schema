    evidence_kind: design-inference
    confidence: high
  - id: claim-text-document-reference-002
    source: eng-std-w3c-web-annotation-model
    supports: "The Web Annotation source relationship may use a detailed resource or its IRI; Moonweave applies that separation to a document identity independent of retrieval location. For TextDocumentReference.document_identifier, the field records this reviewed value: Stably identifies a work or specified document version in a document catalog."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-text-document-reference-003
