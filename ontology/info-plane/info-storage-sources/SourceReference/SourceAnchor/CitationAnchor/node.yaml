  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 引用锚是一种来源锚，并以人类可见 citation_key 与 locator_label 绑定来源选择为种差。
    en: CitationAnchor is a SourceAnchor specialized by a human-visible citation_key and locator_label binding a source selection.
    ja: CitationAnchor は human-visible citation_key/locator_label で source selection を結ぶ SourceAnchor です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CitationAnchor-is_a-SourceAnchor-example-positive-manual-001
      kind: positive
      labels:
        zh: CitationAnchor-is_a-SourceAnchor正例
        en: CitationAnchor-is_a-SourceAnchor positive case
        ja: CitationAnchor-is_a-SourceAnchor正例
      scenario_id: null
      descriptions:
        zh: "[7] 与 p.42 共同回指文档来源选择。"
        en: "[7] and p.42 jointly return to a document source selection."
        ja: "[7] と p.42 が document source selection に戻ります。"
      field_values: {}
      related_node_ids:
        - CitationAnchor
        - SourceAnchor
      related_relation_ids:
        - CitationAnchor-is_a-SourceAnchor
      expected_result:
        zh: 建立 CitationAnchor —is_a→ SourceAnchor，并保持该方向与限定条件。
        en: Assert CitationAnchor —is_a→ SourceAnchor while preserving its direction and qualifiers.
        ja: CitationAnchor —is_a→ SourceAnchor を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 引用显示键可供读者查看且对应来源选择能够解析。
        en: The citation key is displayable and the source selection resolvable.
        ja: citation key は表示可能で source selection は解決可能です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-citation-anchor-009
    - id: CitationAnchor-is_a-SourceAnchor-example-boundary-manual-001
      kind: boundary
      labels:
        zh: CitationAnchor-is_a-SourceAnchor边界例
        en: CitationAnchor-is_a-SourceAnchor boundary case
        ja: CitationAnchor-is_a-SourceAnchor境界例
      scenario_id: null
      descriptions:
        zh: exact/prefix/suffix 用于内容重识别。
        en: exact/prefix/suffix are used for content re-identification.
        ja: exact/prefix/suffix は content re-identification に使います。
      field_values: {}
      related_node_ids:
        - CitationAnchor
        - SourceAnchor
      related_relation_ids:
        - CitationAnchor-is_a-SourceAnchor
      expected_result:
        zh: 拒绝建立 CitationAnchor-is_a-SourceAnchor，两端对象仍保留各自身份。
        en: Reject CitationAnchor-is_a-SourceAnchor; both endpoint objects retain their own identities.
        ja: CitationAnchor-is_a-SourceAnchor を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 内容匹配锚应归 ContentAnchor。
        en: A content-matching anchor belongs under ContentAnchor.
        ja: content-matching anchor は ContentAnchor に属します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-citation-anchor-010
  source_claims:
