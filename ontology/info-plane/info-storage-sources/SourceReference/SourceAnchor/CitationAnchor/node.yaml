schema: moonweave.ai/ontology-node/v1
id: CitationAnchor
kind: concept
status: accepted
labels:
  zh: 引用锚
  en: citation anchor
  ja: 引用アンカー
semantics:
  short_definition:
    zh: 以人类可读引用键绑定来源选择的来源锚。
    en: A source anchor binding a source selection through a human-readable citation key.
    ja: human-readable citation key で source selection を結ぶ source anchor。
  definition:
    zh: 引用锚是来源锚的一类，种差是保存可显示、可交换的 citation_key 与 locator_label，使报告或回答中的引用可回到 SourceReference 和 SourceLocation；它不承担文本漂移后的内容匹配。
    en: CitationAnchor is a SourceAnchor specialized by a displayable, exchangeable citation_key and locator_label that let a citation in a report or answer return to its SourceReference and SourceLocation; it does not perform content matching after text drift.
    ja: CitationAnchor は displayable/exchangeable citation_key と locator_label で report/answer の citation を SourceReference/SourceLocation に戻す SourceAnchor です。text drift 後の content matching は担いません。
  why_needed:
    zh: 引用锚解决“用户看到的 [7] 指向哪里”，而内容锚解决“坐标漂移后如何重找”；两者必须在共同上位概念下清楚分开。
    en: Citation anchors answer where user-visible [7] points, while content anchors answer how to re-find content after coordinate drift; they require a shared parent with explicit differentiation.
    ja: CitationAnchor は user-visible [7] の指先を示し、ContentAnchor は coordinate drift 後の再発見を担うため、共通 parent 下で明確に分けます。
  includes:
    - zh: 带 citation_key、locator_label 并连接来源引用和位置的引用锚。
      en: Citation anchors carrying citation_key and locator_label and connecting a source reference and location.
      ja: citation_key・locator_label を持ち source reference/location を結ぶ citation anchor。
  excludes:
    - zh: exact/prefix/suffix 内容锚、单纯脚注文本、资源引用本身和没有位置的显示编号。
      en: Exact/prefix/suffix content anchors, plain footnote text, source references themselves, and display numbers without locations.
      ja: exact/prefix/suffix content anchor・plain footnote text・source reference 本体・location のない display number。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - citation_key
  fields:
    - id: citation_key
      labels:
        zh: 引用键
        en: citation key
        ja: 引用キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在输出或报告范围内稳定标识一条引用。
        en: Stably identifies one citation within an output or report scope.
        ja: output/report scope 内で一 citation を安定識別します。
      allowed_values: []
      pattern: null
      example_value: cite-7
      source_claims:
        - claim-citation-anchor-002
    - id: locator_label
      labels:
        zh: 位置标签
        en: locator label
        ja: 位置ラベル
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 向人类显示来源位置，如页码或章节。
        en: Displays a human-readable source locator such as page or section.
        ja: page/section など human-readable source locator を表示します。
      allowed_values: []
      pattern: null
      example_value: p. 42, §4.2
      source_claims:
        - claim-citation-anchor-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: CitationAnchor-example-positive-manual-001
    kind: positive
    labels:
      zh: 引用锚正例
      en: citation anchor positive case
      ja: 引用アンカー正例
    scenario_id: null
    descriptions:
      zh: citation_key=cite-7 与 locator_label='p. 42, §4.2' 绑定来源引用和页范围。
      en: citation_key=cite-7 and locator_label='p. 42, §4.2' bind a source reference and page range.
      ja: citation_key=cite-7 と locator_label='p. 42, §4.2' が source reference/page range を結びます。
    field_values:
      citation_key: cite-7
      locator_label: p. 42, §4.2
      anchor_id: citation-anchor-cite-7
      selector_kind: range
    related_node_ids:
      - CitationAnchor
      - SourceAnchor
    related_relation_ids:
      - CitationAnchor-is_a-SourceAnchor
    expected_result:
      zh: CitationAnchor 保持其已审查身份，并按定义解释 CitationAnchor-is_a-SourceAnchor。
      en: Retain the reviewed identity of CitationAnchor and interpret CitationAnchor-is_a-SourceAnchor exactly as defined.
      ja: CitationAnchor の reviewed identity を保持し CitationAnchor-is_a-SourceAnchor を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 用户可见键与可解析来源选择同时存在。
      en: A user-visible key and resolvable source selection are both present.
      ja: user-visible key と resolvable source selection が共に存在します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-citation-anchor-004
  - id: CitationAnchor-example-instance-manual-002
    kind: instance
    labels:
      zh: 引用锚实例
      en: citation anchor instance case
      ja: 引用アンカー実例
    scenario_id: null
    descriptions:
      zh: 回答中的 [7] 通过 CitationAnchor 回到标准第 42 页。
      en: Citation [7] in an answer resolves through CitationAnchor to page 42 of a standard.
      ja: answer の [7] は CitationAnchor で standard page 42 に解決します。
    field_values:
      citation_key: cite-7
      locator_label: p. 42, §4.2
    related_node_ids:
      - CitationAnchor
      - SourceAnchor
    related_relation_ids:
      - CitationAnchor-is_a-SourceAnchor
    expected_result:
      zh: CitationAnchor 保持其已审查身份，并按定义解释 CitationAnchor-is_a-SourceAnchor。
      en: Retain the reviewed identity of CitationAnchor and interpret CitationAnchor-is_a-SourceAnchor exactly as defined.
      ja: CitationAnchor の reviewed identity を保持し CitationAnchor-is_a-SourceAnchor を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用显示与来源定位通过锚明确绑定。
      en: Citation display and source location are explicitly bound by the anchor.
      ja: citation display と source location は anchor で明示結合されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-citation-anchor-005
  - id: CitationAnchor-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 引用锚边界例
      en: citation anchor boundary case
      ja: 引用アンカー境界例
    scenario_id: null
    descriptions:
      zh: exact='selected text'、prefix 和 suffix 能重找文本，但没有 citation_key。
      en: exact='selected text' with prefix and suffix can re-find text but has no citation_key.
      ja: exact='selected text' と prefix/suffix は text を再発見できるが citation_key がありません。
    field_values:
      citation_key: cite-7
      locator_label: p. 42, §4.2
    related_node_ids:
      - CitationAnchor
      - SourceAnchor
    related_relation_ids:
      - CitationAnchor-is_a-SourceAnchor
    expected_result:
      zh: 不把该对象归入 CitationAnchor，也不凭邻近或词形推断 CitationAnchor-is_a-SourceAnchor。
      en: Do not classify the object as CitationAnchor or infer CitationAnchor-is_a-SourceAnchor from proximity or lexical form.
      ja: object を CitationAnchor に分類せず proximity/lexical form から CitationAnchor-is_a-SourceAnchor を推論しません。
    why_valid_or_invalid:
      zh: 该对象是 ContentAnchor，不是 CitationAnchor。
      en: That object is a ContentAnchor, not a CitationAnchor.
      ja: その object は CitationAnchor ではなく ContentAnchor です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-citation-anchor-006
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ContentAnchor
    shared_parent_concept_id: SourceAnchor
    differentia:
      zh: 引用锚依据“引用锚是来源锚的一类，种差是保存可显示、可交换的 citation_key 与 locator_label，使报告或回答中的引用可回到 SourceReference 和 SourceLocation；它不承担文本漂移后的内容匹配。”归类；内容锚依据“内容锚是来源锚的一类，种差是保存 exact 内容以及可选 prefix、suffix，在 SourceLocation 失效时匹配原选择；它复制的仅是最小重识别证据，不等同于所选内容实体或引用显示键。”归类。二者共享 SourceAnchor，但任一端条件均不推出另一端。
      en: CitationAnchor is classified by “CitationAnchor is a SourceAnchor specialized by a displayable, exchangeable citation_key and locator_label that let a citation in a report or answer return to its SourceReference and SourceLocation; it does not perform content matching after text drift.” whereas ContentAnchor is classified by “ContentAnchor is a SourceAnchor specialized by exact content and optional prefix and suffix used to match the original selection when SourceLocation becomes stale; it copies only minimal re-identification evidence and is neither the selected content entity nor a citation display key.”. They share SourceAnchor, but satisfying either condition leaves the other unproven.
      ja: CitationAnchor は「CitationAnchor は displayable/exchangeable citation_key と locator_label で report/answer の citation を SourceReference/SourceLocation に戻す SourceAnchor です。text drift 後の content matching は担いません。」で分類し、ContentAnchor は「ContentAnchor は SourceLocation stale 時に original selection を match する exact content と optional prefix/suffix を持つ SourceAnchor です。最小 re-identification evidence だけを copy し selected content entity/citation display key ではありません。」で分類します。両者は SourceAnchor を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-citation-anchor-007
      - claim-citation-anchor-008
parent_relation:
