schema: moonweave.ai/ontology-node/v1
id: CitationAnchor
kind: concept
labels:
  zh: 引用锚
  en: citation anchor
  ja: 引用アンカー
semantics:
  short_definition:
    zh: 面向读者展示的来源归因锚点。
    en: Reader-facing source-attribution anchor.
    ja: 読者向け source attribution anchor。
  definition:
    zh: CitationAnchor 把 answer/output 片段链接到 SourceReference 与 page/line range；对应 RAG 回答脚注与 OutputCitation。
    en: CitationAnchor links answer/output fragments to SourceReference and page/line ranges—RAG footnotes and OutputCitation.
    ja: CitationAnchor は reader-facing cite。
  why_needed:
    zh: 引用锚解决“用户看到的 [7] 指向哪里”，而内容锚解决“坐标漂移后如何重找”；两者必须在共同上位概念下清楚分开。
    en: Citation anchors answer where user-visible [7] points, while content anchors answer how to re-find content after coordinate drift; they require a shared parent with explicit differentiation.
    ja: CitationAnchor は user-visible [7] の指先を示し、ContentAnchor は coordinate drift 後の再発見を担うため、共通 parent 下で明確に分けます。
  includes:
    - zh: 带 citation_key、locator_label 并连接来源引用和位置的引用锚。
      en: Citation anchors carrying citation_key and locator_label and connecting a source reference and location.
      ja: citation_key・locator_label を持ち source reference/location を結ぶ citation anchor。
  excludes:
    - zh: exact/prefix/suffix 内容锚、单纯脚注文本、资源引用本身和没有位置的显示编号。
      en: Exact/prefix/suffix content anchors, plain footnote text, source references themselves, and display numbers without locations.
      ja: exact/prefix/suffix content anchor・plain footnote text・source reference 本体・location のない display number。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OutputCitation→CitationAnchor→SourceReference+SourcePageRange/SourceLineRange。
    en: OutputCitation→CitationAnchor→SourceReference+SourcePageRange/SourceLineRange.
    ja: output citation chain。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - citation_key
  fields:
    - id: citation_key
      labels:
        zh: 引用键
        en: citation key
        ja: 引用キー
      definitions:
        zh: 在输出或报告范围内稳定标识一条引用。
        en: Stably identifies one citation within an output or report scope.
        ja: output/report scope 内で一 citation を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: cite-7
      allowed_values: []
      source_claims:
        - claim-citation-anchor-002
    - id: locator_label
      labels:
        zh: 位置标签
        en: locator label
        ja: 位置ラベル
      definitions:
        zh: 向人类显示来源位置，如页码或章节。
        en: Displays a human-readable source locator such as page or section.
        ja: page/section など human-readable source locator を表示します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: p. 42, §4.2
      allowed_values: []
      source_claims:
        - claim-citation-anchor-003
  constraints: []
  required_relations: []
examples:
  - id: CitationAnchor-example-page
    labels:
      zh: 页码引用锚
      en: Page citation anchor
      ja: page citation anchor
    descriptions:
      zh: cite-204-1 CitationAnchor pages:3..3 policy.pdf。
      en: cite-204-1 CitationAnchor pages:3..3 policy.pdf.
      ja: page anchor。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: page
    field_values: {}
    related_node_ids:
      - CitationAnchor
      - OutputCitation
    related_relation_ids: []
    source_claims:
      - claim-citation-anchor-design
  - id: CitationAnchor-example-mcp-line
    labels:
      zh: MCP 行引用锚
      en: MCP line citation anchor
      ja: MCP line citation anchor
    descriptions:
      zh: onboarding.md lines:12..24 CitationAnchor。
      en: onboarding.md lines:12..24 CitationAnchor.
      ja: MCP line anchor。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: line cite
    field_values: {}
    related_node_ids:
      - CitationAnchor
    related_relation_ids: []
    source_claims:
      - claim-citation-anchor-mcp
  - id: CitationAnchor-example-bare-url
    labels:
      zh: 裸 URL 不足
      en: Bare URL insufficient
      ja: bare URL 不足
    descriptions:
      zh: 未建立 SourceReference 的 URL 不能构成 CitationAnchor。
      en: URL without SourceReference cannot form CitationAnchor.
      ja: SourceReference 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - CitationAnchor
    related_relation_ids: []
    source_claims:
      - claim-citation-anchor-design
parent_relation:
  id: CitationAnchor-is_a-SourceAnchor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 引用锚是一种来源锚，并以人类可见 citation_key 与 locator_label 绑定来源选择为种差。
    en: CitationAnchor is a SourceAnchor specialized by a human-visible citation_key and locator_label binding a source selection.
    ja: CitationAnchor は human-visible citation_key/locator_label で source selection を結ぶ SourceAnchor です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CitationAnchor-is_a-SourceAnchor-example-positive-manual-001
      labels:
        zh: CitationAnchor-is_a-SourceAnchor正例
        en: CitationAnchor-is_a-SourceAnchor positive case
        ja: CitationAnchor-is_a-SourceAnchor正例
      descriptions:
        zh: "[7] 与 p.42 共同回指文档来源选择。"
        en: "[7] and p.42 jointly return to a document source selection."
        ja: "[7] と p.42 が document source selection に戻ります。"
      field_values: {}
      related_node_ids:
        - CitationAnchor
        - SourceAnchor
      related_relation_ids:
        - CitationAnchor-is_a-SourceAnchor
      source_claims:
        - claim-citation-anchor-009
    - id: CitationAnchor-is_a-SourceAnchor-example-boundary-manual-001
      labels:
        zh: CitationAnchor-is_a-SourceAnchor边界例
        en: CitationAnchor-is_a-SourceAnchor boundary case
        ja: CitationAnchor-is_a-SourceAnchor境界例
      descriptions:
        zh: exact/prefix/suffix 用于内容重识别。
        en: exact/prefix/suffix are used for content re-identification.
        ja: exact/prefix/suffix は content re-identification に使います。
      field_values: {}
      related_node_ids:
        - CitationAnchor
        - SourceAnchor
      related_relation_ids:
        - CitationAnchor-is_a-SourceAnchor
      source_claims:
        - claim-citation-anchor-010
  source_claims:
    - claim-citation-anchor-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
source_claims:
  - id: claim-citation-anchor-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. For CitationAnchor.citation_key, the field records this reviewed value: Stably identifies one citation within an output or report scope."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. For CitationAnchor.locator_label, the field records this reviewed value: Displays a human-readable source locator such as page or section."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-004
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. This evidence supports the manually reviewed positive case for CitationAnchor: citation_key=cite-7 and locator_label='p. 42, §4.2' bind a source reference and page range."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-005
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. This evidence supports the manually reviewed instance case for CitationAnchor: Citation [7] in an answer resolves through CitationAnchor to page 42 of a standard."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. This evidence supports the manually reviewed boundary case for CitationAnchor: exact='selected text' with prefix and suffix can re-find text but has no citation_key."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-007
    source: eng-std-w3c-web-annotation-model
    supports: W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. This claim supports only the CitationAnchor endpoint of its sibling distinction.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. This claim supports only the ContentAnchor endpoint of its sibling distinction.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C models source and selector separately; Moonweave adds a citation-facing anchor that binds the pair without replacing either. This evidence supports the manually reviewed positive case for CitationAnchor-is_a-SourceAnchor: [7] and p.42 jointly return to a document source selection."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-010
    source: eng-std-w3c-web-annotation-model
    supports: "W3C models source and selector separately; Moonweave adds a citation-facing anchor that binds the pair without replacing either. This evidence supports the manually reviewed boundary case for CitationAnchor-is_a-SourceAnchor: exact/prefix/suffix are used for content re-identification."
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-011
    source: eng-std-w3c-web-annotation-model
    supports: W3C models source and selector separately; Moonweave adds a citation-facing anchor that binds the pair without replacing either.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-design
    source: src-info-sources-design
    supports: CitationAnchor requires resolvable SourceReference and range for reader attribution.
    locator: CitationAnchor
    evidence_kind: design-inference
    confidence: high
  - id: claim-citation-anchor-mcp
    source: src-mcp-resources
    supports: MCP resource line citations use CitationAnchor over FileResourceReference.
    locator: resource citation
    evidence_kind: primary-spec
    confidence: high
