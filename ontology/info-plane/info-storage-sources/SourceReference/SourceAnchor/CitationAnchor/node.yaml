  distinct_fact_rationale:
    zh: CitationAnchor-is_a-SourceAnchor 记录 CitationAnchor 到 SourceAnchor 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: CitationAnchor-is_a-SourceAnchor records one is_a fact from CitationAnchor to SourceAnchor; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: CitationAnchor-is_a-SourceAnchor は CitationAnchor から SourceAnchor への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
