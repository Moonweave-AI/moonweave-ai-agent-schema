schema: moonweave.ai/ontology-node/v1
id: ContentAnchor
kind: concept
labels:
  zh: 内容锚
  en: content anchor
  ja: 内容アンカー
semantics:
  short_definition:
    zh: 内容内部稳定结构锚点。
    en: Stable structural anchor inside content.
    ja: content 内部の安定 structural anchor。
  definition:
    zh: ContentAnchor 记录 HTML id、PDF named destination、代码 AST node id 等；用于精确定位非 page/line 坐标系下的片段。
    en: ContentAnchor records HTML id, PDF named destination, code AST node id, etc., for fragments outside page/line coordinate systems.
    ja: ContentAnchor は structural anchor。
  why_needed:
    zh: 字符偏移会随编辑变化；内容锚提供独立于旧坐标的恢复路径，同时与引用编号和完整正文保持边界。
    en: Character offsets change after edits; a content anchor provides a recovery path independent of stale coordinates while remaining distinct from citation numbers and full content copies.
    ja: character offset は edit で変化するため content anchor が stale coordinate から独立した recovery path を与え、citation number/full content copy と分離します。
  includes:
    - zh: 含 exact 文本并可用 prefix、suffix 消歧的最小内容锚。
      en: Minimal content anchors carrying exact text and optional prefix and suffix for disambiguation.
      ja: exact text と optional prefix/suffix で disambiguation する minimal content anchor。
  excludes:
    - zh: 完整文档副本、纯字符坐标、引用编号和不受来源约束的搜索查询。
      en: Full document copies, bare character coordinates, citation numbers, and search queries not constrained to a source.
      ja: full document copy・bare character coordinate・citation number・source 制約のない search query。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: "#section-4、pdf-dest:fig-2 等映射 ContentAnchor。"
    en: "#section-4, pdf-dest:fig-2 map to ContentAnchor."
    ja: structural ids。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - exact
  fields:
    - id: exact
      labels:
        zh: 精确内容
        en: exact content
        ja: 完全一致内容
      definitions:
        zh: 保存被选片段的最小精确文本。
        en: Carries the minimal exact text of the selected segment.
        ja: selected segment の minimal exact text を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: policy enforcement point
      allowed_values: []
      source_claims:
        - claim-content-anchor-002
    - id: prefix
      labels:
        zh: 前文
        en: prefix context
        ja: 前方文脈
      definitions:
        zh: 保存用于区分重复 exact 内容的前置文本。
        en: Carries preceding text used to disambiguate repeated exact content.
        ja: repeated exact content を disambiguate する preceding text を保持します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: "traffic through the "
      allowed_values: []
      source_claims:
        - claim-content-anchor-003
    - id: suffix
      labels:
        zh: 后文
        en: suffix context
        ja: 後方文脈
      definitions:
        zh: 保存用于区分重复 exact 内容的后续文本。
        en: Carries following text used to disambiguate repeated exact content.
        ja: repeated exact content を disambiguate する following text を保持します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: " is inspected"
      allowed_values: []
      source_claims:
        - claim-content-anchor-004
  constraints: []
  required_relations: []
examples:
  - id: ContentAnchor-example-html-id
    labels:
      zh: HTML 锚
      en: HTML anchor
      ja: HTML anchor
    descriptions:
      zh: "#security-boundary ContentAnchor 指向章节。"
      en: "#security-boundary ContentAnchor points to section."
      ja: html id anchor。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: html id
    field_values:
      anchor: "#security-boundary"
    related_node_ids:
      - ContentAnchor
    related_relation_ids: []
    source_claims:
      - claim-content-anchor-design
  - id: ContentAnchor-example-pdf-dest
    labels:
      zh: PDF 命名目标
      en: PDF named destination
      ja: PDF named destination
    descriptions:
      zh: pdf-dest:fig-2 ContentAnchor。
      en: pdf-dest:fig-2 ContentAnchor.
      ja: pdf dest。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: pdf dest
    field_values: {}
    related_node_ids:
      - ContentAnchor
    related_relation_ids: []
    source_claims:
      - claim-content-anchor-design
  - id: ContentAnchor-example-not-citation
    labels:
      zh: 非 CitationAnchor
      en: Not CitationAnchor
      ja: CitationAnchor ではない
    descriptions:
      zh: ContentAnchor 面向结构定位，读者脚注优先 CitationAnchor。
      en: ContentAnchor targets structural location; reader footnotes prefer CitationAnchor.
      ja: structural vs reader cite。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ContentAnchor
    related_relation_ids: []
    source_claims:
      - claim-content-anchor-design
parent_relation:
  id: ContentAnchor-is_a-SourceAnchor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 内容锚是一种来源锚，并以 exact 内容及可选 prefix、suffix 在坐标漂移后重识别选择为种差。
    en: ContentAnchor is a SourceAnchor specialized by exact content and optional prefix and suffix for re-identifying a selection after coordinate drift.
    ja: ContentAnchor は exact content と optional prefix/suffix で coordinate drift 後 selection を再識別する SourceAnchor です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ContentAnchor-is_a-SourceAnchor-example-positive-manual-001
      labels:
        zh: ContentAnchor-is_a-SourceAnchor正例
        en: ContentAnchor-is_a-SourceAnchor positive case
        ja: ContentAnchor-is_a-SourceAnchor正例
      descriptions:
        zh: exact 及前后文在编辑后唯一匹配原段。
        en: Exact content and context uniquely match the original segment after editing.
        ja: exact content と context が edit 後 original segment を一意 match します。
      field_values: {}
      related_node_ids:
        - ContentAnchor
        - SourceAnchor
      related_relation_ids:
        - ContentAnchor-is_a-SourceAnchor
      source_claims:
        - claim-content-anchor-010
    - id: ContentAnchor-is_a-SourceAnchor-example-boundary-manual-001
      labels:
        zh: ContentAnchor-is_a-SourceAnchor边界例
        en: ContentAnchor-is_a-SourceAnchor boundary case
        ja: ContentAnchor-is_a-SourceAnchor境界例
      descriptions:
        zh: citation_key=cite-7 只提供显示引用键。
        en: citation_key=cite-7 provides only a display citation key.
        ja: citation_key=cite-7 は display citation key だけを提供します。
      field_values: {}
      related_node_ids:
        - ContentAnchor
        - SourceAnchor
      related_relation_ids:
        - ContentAnchor-is_a-SourceAnchor
      source_claims:
        - claim-content-anchor-011
  source_claims:
    - claim-content-anchor-012
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-content-anchor-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. For ContentAnchor.exact, the field records this reviewed value: Carries the minimal exact text of the selected segment."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. For ContentAnchor.prefix, the field records this reviewed value: Carries preceding text used to disambiguate repeated exact content."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-004
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. For ContentAnchor.suffix, the field records this reviewed value: Carries following text used to disambiguate repeated exact content."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-005
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. This evidence supports the manually reviewed positive case for ContentAnchor: exact='policy enforcement point' with surrounding context uniquely matches the original segment after editing."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. This evidence supports the manually reviewed instance case for ContentAnchor: After an old SourceSpan becomes stale, a resolver uses exact/prefix/suffix to find the new span."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. This evidence supports the manually reviewed boundary case for ContentAnchor: Ten thousand words are copied for retrieval without a minimal selection or constrained source."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextQuoteSelector copies exact text plus optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that re-identification role. This claim supports only the ContentAnchor endpoint of its sibling distinction.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C separates a SpecificResource from its source and selector; Moonweave adds a citation key that binds the human-visible citation to that pair. This claim supports only the CitationAnchor endpoint of its sibling distinction.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-010
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector uses exact text with optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that role. This evidence supports the manually reviewed positive case for ContentAnchor-is_a-SourceAnchor: Exact content and context uniquely match the original segment after editing."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-011
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector uses exact text with optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that role. This evidence supports the manually reviewed boundary case for ContentAnchor-is_a-SourceAnchor: citation_key=cite-7 provides only a display citation key."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-012
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextQuoteSelector uses exact text with optional prefix and suffix to distinguish repeated sequences; ContentAnchor adopts that role.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-content-anchor-design
    source: src-info-sources-design
    supports: ContentAnchor provides structural in-content anchors distinct from reader citations.
    locator: ContentAnchor
    evidence_kind: design-inference
    confidence: high
