schema: moonweave.ai/ontology-node/v1
id: ContentAnchor
kind: concept
status: accepted
labels:
  zh: 内容锚
  en: content anchor
  ja: 内容アンカー
semantics:
  short_definition:
    zh: 以精确内容及前后文在坐标漂移后重识别选择的来源锚。
    en: A source anchor re-identifying a selection after coordinate drift using exact content and context.
    ja: exact content と context で coordinate drift 後に selection を再識別する source anchor。
  definition:
    zh: 内容锚是来源锚的一类，种差是保存 exact 内容以及可选 prefix、suffix，在 SourceLocation 失效时匹配原选择；它复制的仅是最小重识别证据，不等同于所选内容实体或引用显示键。
    en: ContentAnchor is a SourceAnchor specialized by exact content and optional prefix and suffix used to match the original selection when SourceLocation becomes stale; it copies only minimal re-identification evidence and is neither the selected content entity nor a citation display key.
    ja: ContentAnchor は SourceLocation stale 時に original selection を match する exact content と optional prefix/suffix を持つ SourceAnchor です。最小 re-identification evidence だけを copy し selected content entity/citation display key ではありません。
  why_needed:
    zh: 字符偏移会随编辑变化；内容锚提供独立于旧坐标的恢复路径，同时与引用编号和完整正文保持边界。
    en: Character offsets change after edits; a content anchor provides a recovery path independent of stale coordinates while remaining distinct from citation numbers and full content copies.
    ja: character offset は edit で変化するため content anchor が stale coordinate から独立した recovery path を与え、citation number/full content copy と分離します。
  includes:
    - zh: 含 exact 文本并可用 prefix、suffix 消歧的最小内容锚。
      en: Minimal content anchors carrying exact text and optional prefix and suffix for disambiguation.
      ja: exact text と optional prefix/suffix で disambiguation する minimal content anchor。
  excludes:
    - zh: 完整文档副本、纯字符坐标、引用编号和不受来源约束的搜索查询。
      en: Full document copies, bare character coordinates, citation numbers, and search queries not constrained to a source.
      ja: full document copy・bare character coordinate・citation number・source 制約のない search query。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - exact
  fields:
    - id: exact
      labels:
        zh: 精确内容
        en: exact content
        ja: 完全一致内容
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存被选片段的最小精确文本。
        en: Carries the minimal exact text of the selected segment.
        ja: selected segment の minimal exact text を保持します。
      allowed_values: []
      pattern: null
      example_value: policy enforcement point
      source_claims:
        - claim-content-anchor-002
    - id: prefix
      labels:
        zh: 前文
        en: prefix context
        ja: 前方文脈
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存用于区分重复 exact 内容的前置文本。
        en: Carries preceding text used to disambiguate repeated exact content.
        ja: repeated exact content を disambiguate する preceding text を保持します。
      allowed_values: []
      pattern: null
      example_value: "traffic through the "
      source_claims:
        - claim-content-anchor-003
    - id: suffix
      labels:
        zh: 后文
        en: suffix context
        ja: 後方文脈
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存用于区分重复 exact 内容的后续文本。
        en: Carries following text used to disambiguate repeated exact content.
        ja: repeated exact content を disambiguate する following text を保持します。
      allowed_values: []
      pattern: null
      example_value: " is inspected"
      source_claims:
        - claim-content-anchor-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ContentAnchor-example-positive-manual-001
    kind: positive
    labels:
      zh: 内容锚正例
      en: content anchor positive case
      ja: 内容アンカー正例
    scenario_id: null
    descriptions:
      zh: exact='policy enforcement point' 与前后文在文档编辑后唯一匹配原片段。
      en: exact='policy enforcement point' with surrounding context uniquely matches the original segment after editing.
      ja: exact='policy enforcement point' と周辺 context が edit 後 original segment を一意 match します。
    field_values:
      exact: policy enforcement point
      prefix: "traffic through the "
      suffix: " is inspected"
      anchor_id: content-anchor-policy-enforcement-point
      selector_kind: text-quote
    related_node_ids:
      - ContentAnchor
      - SourceAnchor
    related_relation_ids:
      - ContentAnchor-is_a-SourceAnchor
    expected_result:
      zh: ContentAnchor 保持其已审查身份，并按定义解释 ContentAnchor-is_a-SourceAnchor。
      en: Retain the reviewed identity of ContentAnchor and interpret ContentAnchor-is_a-SourceAnchor exactly as defined.
      ja: ContentAnchor の reviewed identity を保持し ContentAnchor-is_a-SourceAnchor を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 最小引文与上下文足以在指定来源中消歧。
      en: Minimal quotation and context suffice to disambiguate within the specified source.
      ja: minimal quotation と context が指定 source 内 disambiguation に十分です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-content-anchor-005
  - id: ContentAnchor-example-instance-manual-002
    kind: instance
    labels:
      zh: 内容锚实例
      en: content anchor instance case
      ja: 内容アンカー実例
    scenario_id: null
    descriptions:
      zh: 旧 SourceSpan 失效后，解析器用 exact/prefix/suffix 找到新跨度。
      en: After an old SourceSpan becomes stale, a resolver uses exact/prefix/suffix to find the new span.
      ja: old SourceSpan stale 後 resolver が exact/prefix/suffix で new span を見つけます。
    field_values:
      exact: policy enforcement point
      prefix: "traffic through the "
      suffix: " is inspected"
    related_node_ids:
      - ContentAnchor
      - SourceAnchor
    related_relation_ids:
      - ContentAnchor-is_a-SourceAnchor
    expected_result:
      zh: ContentAnchor 保持其已审查身份，并按定义解释 ContentAnchor-is_a-SourceAnchor。
      en: Retain the reviewed identity of ContentAnchor and interpret ContentAnchor-is_a-SourceAnchor exactly as defined.
      ja: ContentAnchor の reviewed identity を保持し ContentAnchor-is_a-SourceAnchor を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 锚负责重识别，新坐标仍记录为 SourceSpan。
      en: The anchor performs re-identification and the new coordinates are still recorded as SourceSpan.
      ja: anchor が re-identification を担い new coordinate は SourceSpan として記録します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-content-anchor-006
  - id: ContentAnchor-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 内容锚边界例
      en: content anchor boundary case
      ja: 内容アンカー境界例
    scenario_id: null
    descriptions:
      zh: 全文复制了一万字并用于检索，没有限定最小选择或来源。
      en: Ten thousand words are copied for retrieval without a minimal selection or constrained source.
      ja: 一万 word を retrieval 用に copy し minimal selection/source constraint がありません。
    field_values:
      exact: policy enforcement point
      prefix: "traffic through the "
      suffix: " is inspected"
    related_node_ids:
      - ContentAnchor
      - SourceAnchor
    related_relation_ids:
      - ContentAnchor-is_a-SourceAnchor
    expected_result:
      zh: 不把该对象归入 ContentAnchor，也不凭邻近或词形推断 ContentAnchor-is_a-SourceAnchor。
      en: Do not classify the object as ContentAnchor or infer ContentAnchor-is_a-SourceAnchor from proximity or lexical form.
      ja: object を ContentAnchor に分類せず proximity/lexical form から ContentAnchor-is_a-SourceAnchor を推論しません。
    why_valid_or_invalid:
      zh: 这是内容副本或检索语料，不是最小 ContentAnchor。
      en: This is a content copy or retrieval corpus, not a minimal ContentAnchor.
      ja: これは content copy/retrieval corpus で minimal ContentAnchor ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-content-anchor-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: CitationAnchor
    shared_parent_concept_id: SourceAnchor
    differentia:
      zh: 内容锚依据“内容锚是来源锚的一类，种差是保存 exact 内容以及可选 prefix、suffix，在 SourceLocation 失效时匹配原选择；它复制的仅是最小重识别证据，不等同于所选内容实体或引用显示键。”归类；引用锚依据“引用锚是来源锚的一类，种差是保存可显示、可交换的 citation_key 与 locator_label，使报告或回答中的引用可回到 SourceReference 和 SourceLocation；它不承担文本漂移后的内容匹配。”归类。二者共享 SourceAnchor，但任一端条件均不推出另一端。
      en: ContentAnchor is classified by “ContentAnchor is a SourceAnchor specialized by exact content and optional prefix and suffix used to match the original selection when SourceLocation becomes stale; it copies only minimal re-identification evidence and is neither the selected content entity nor a citation display key.” whereas CitationAnchor is classified by “CitationAnchor is a SourceAnchor specialized by a displayable, exchangeable citation_key and locator_label that let a citation in a report or answer return to its SourceReference and SourceLocation; it does not perform content matching after text drift.”. They share SourceAnchor, but satisfying either condition leaves the other unproven.
      ja: ContentAnchor は「ContentAnchor は SourceLocation stale 時に original selection を match する exact content と optional prefix/suffix を持つ SourceAnchor です。最小 re-identification evidence だけを copy し selected content entity/citation display key ではありません。」で分類し、CitationAnchor は「CitationAnchor は displayable/exchangeable citation_key と locator_label で report/answer の citation を SourceReference/SourceLocation に戻す SourceAnchor です。text drift 後の content matching は担いません。」で分類します。両者は SourceAnchor を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-content-anchor-008
      - claim-content-anchor-009
parent_relation:
  id: ContentAnchor-is_a-SourceAnchor
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 内容锚是一种来源锚，并以 exact 内容及可选 prefix、suffix 在坐标漂移后重识别选择为种差。
    en: ContentAnchor is a SourceAnchor specialized by exact content and optional prefix and suffix for re-identifying a selection after coordinate drift.
    ja: ContentAnchor は exact content と optional prefix/suffix で coordinate drift 後 selection を再識別する SourceAnchor です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ContentAnchor-is_a-SourceAnchor-example-positive-manual-001
      kind: positive
      labels:
        zh: ContentAnchor-is_a-SourceAnchor正例
        en: ContentAnchor-is_a-SourceAnchor positive case
        ja: ContentAnchor-is_a-SourceAnchor正例
      scenario_id: null
      descriptions:
        zh: exact 及前后文在编辑后唯一匹配原段。
        en: Exact content and context uniquely match the original segment after editing.
        ja: exact content と context が edit 後 original segment を一意 match します。
      field_values: {}
      related_node_ids:
        - ContentAnchor
        - SourceAnchor
      related_relation_ids:
        - ContentAnchor-is_a-SourceAnchor
      expected_result:
        zh: 建立 ContentAnchor —is_a→ SourceAnchor，并保持该方向与限定条件。
        en: Assert ContentAnchor —is_a→ SourceAnchor while preserving its direction and qualifiers.
        ja: ContentAnchor —is_a→ SourceAnchor を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 最小内容证据能在指定来源内消歧。
        en: Minimal content evidence disambiguates within the specified source.
        ja: minimal content evidence が指定 source 内で disambiguate します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-content-anchor-010
    - id: ContentAnchor-is_a-SourceAnchor-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ContentAnchor-is_a-SourceAnchor边界例
        en: ContentAnchor-is_a-SourceAnchor boundary case
        ja: ContentAnchor-is_a-SourceAnchor境界例
      scenario_id: null
      descriptions:
        zh: citation_key=cite-7 只提供显示引用键。
        en: citation_key=cite-7 provides only a display citation key.
        ja: citation_key=cite-7 は display citation key だけを提供します。
      field_values: {}
      related_node_ids:
        - ContentAnchor
        - SourceAnchor
      related_relation_ids:
        - ContentAnchor-is_a-SourceAnchor
      expected_result:
        zh: 拒绝建立 ContentAnchor-is_a-SourceAnchor，两端对象仍保留各自身份。
        en: Reject ContentAnchor-is_a-SourceAnchor; both endpoint objects retain their own identities.
        ja: ContentAnchor-is_a-SourceAnchor を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 仅有显示键不能在内容漂移后完成可靠的重新识别。
        en: A display key cannot perform content re-identification.
        ja: display key は content re-identification を実行できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-content-anchor-011
  source_claims:
    - claim-content-anchor-012
  distinct_fact_rationale:
    zh: ContentAnchor-is_a-SourceAnchor 记录 ContentAnchor 到 SourceAnchor 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: ContentAnchor-is_a-SourceAnchor records one is_a fact from ContentAnchor to SourceAnchor; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: ContentAnchor-is_a-SourceAnchor は ContentAnchor から SourceAnchor への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
