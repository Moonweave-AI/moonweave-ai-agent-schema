        source_claims:
          - claim-source-anchor-016
    source_claims:
      - claim-source-anchor-017
    distinct_fact_rationale:
      zh: SourceAnchor-anchors-SourceLocation 记录 SourceAnchor 到 SourceLocation 的单一 anchors 事实，不能由端点命名、共现或其他边自动替代。
      en: SourceAnchor-anchors-SourceLocation records one anchors fact from SourceAnchor to SourceLocation; endpoint naming, co-occurrence, or another edge cannot substitute for it.
      ja: SourceAnchor-anchors-SourceLocation は SourceAnchor から SourceLocation への一 anchors fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
    layout_role: cross-link
    review_status: accepted
    target: concept:SourceLocation
