schema: moonweave.ai/ontology-node/v1
id: SourceAnchor
kind: concept
labels:
  zh: 来源锚
  en: source anchor
  ja: 出典アンカー
semantics:
  short_definition:
    zh: 把引用绑定到内容内部可复核锚点的分支根。
    en: Root branch binding references to verifiable anchors inside content.
    ja: reference を content 内部の検証可能 anchor に binding する branch root。
  definition:
    zh: SourceAnchor 含 CitationAnchor（面向读者的引用锚）与 ContentAnchor（内容内部稳定锚）；用于 OutputCitation 与 RAG answer attribution。
    en: SourceAnchor includes CitationAnchor (reader-facing citation anchor) and ContentAnchor (stable in-content anchor) for OutputCitation and RAG answer attribution.
    ja: SourceAnchor は citation/content anchor 分支。
  why_needed:
    zh: 坐标可能因编辑漂移，引用标签又不一定能重找内容；统一锚 genus 后可再分 CitationAnchor 与 ContentAnchor，避免二者混成同级属性。
    en: Coordinates can drift after editing and citation labels may not re-find content; a shared anchor genus can then specialize CitationAnchor and ContentAnchor without collapsing their roles into flat properties.
    ja: coordinate は edit 後 drift し citation label だけでは content を再発見できないため、共通 anchor genus から CitationAnchor/ContentAnchor を分けます。
  includes:
    - zh: 带独立 anchor_id，且用于引用显示或内容重识别的锚记录。
      en: Anchor records with an independent anchor_id used for citation display or content re-identification.
      ja: independent anchor_id を持ち citation display/content re-identification に使う anchor record。
  excludes:
    - zh: 纯位置范围、资源 URI、版本摘要以及没有来源连接的任意文本标签。
      en: Bare location ranges, resource URIs, version digests, and arbitrary labels without a source link.
      ja: bare location range・resource URI・version digest・source link のない arbitrary label。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: CitationAnchor 常链接 SourceReference+SourceRange；ContentAnchor 可用于 HTML id 或 PDF object anchor。
    en: CitationAnchor usually links SourceReference+SourceRange; ContentAnchor may use HTML id or PDF object anchor.
    ja: citation vs content anchor。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - anchor_id
  fields:
    - id: anchor_id
      labels:
        zh: 锚标识
        en: anchor ID
        ja: アンカー ID
      definitions:
        zh: 稳定标识引用或内容锚记录。
        en: Stably identifies the citation or content-anchor record.
        ja: citation/content-anchor record を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: anchor-runbook-7-p42
      allowed_values: []
      source_claims:
        - claim-source-anchor-002
    - id: selector_kind
      labels:
        zh: 选择器类型
        en: selector kind
        ja: selector kind
      definitions:
        zh: 声明锚使用精确引文、位置、范围或组合选择器进行恢复。
        en: Declares whether recovery uses a quote, position, range, or composite selector.
        ja: recovery が quote・position・range・composite selector のどれを使うか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: text-quote
      allowed_values: []
      source_claims:
        - claim-source-anchor-003
    - id: exact_quote
      labels:
        zh: 精确引文
        en: exact quote
        ja: exact quote
      definitions:
        zh: 保存待重识别选择的精确文本；非文本锚可省略。
        en: Carries the exact text to be re-identified; non-text anchors may omit it.
        ja: 再識別する exact text を保持し、non-text anchor では省略できます。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Escalate only after the retry budget is exhausted.
      allowed_values: []
      source_claims:
        - claim-source-anchor-004
    - id: prefix
      labels:
        zh: 引文前文
        en: quote prefix
        ja: quote prefix
      definitions:
        zh: 保存精确引文之前的上下文，用于区分重复匹配。
        en: Carries context immediately before the exact quote to distinguish repeated matches.
        ja: exact quote 直前の context を保持し repeated match を区別します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: "Recovery policy: "
      allowed_values: []
      source_claims:
        - claim-source-anchor-005
    - id: suffix
      labels:
        zh: 引文后文
        en: quote suffix
        ja: quote suffix
      definitions:
        zh: 保存精确引文之后的上下文，用于区分重复匹配。
        en: Carries context immediately after the exact quote to distinguish repeated matches.
        ja: exact quote 直後の context を保持し repeated match を区別します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: " Record the terminal cause."
      allowed_values: []
      source_claims:
        - claim-source-anchor-006
  constraints: []
  required_relations:
    - id: source-anchor-owned-by-reference
      direction: incoming
      predicate: has_anchor
      target_concept_id: SourceReference
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 SourceAnchor 必须属于一个被锚定的 SourceReference。
        en: Every SourceAnchor belongs to exactly one anchored SourceReference.
        ja: 各 SourceAnchor は一つの anchored SourceReference に属します。
      source_claims:
        - claim-source-anchor-007
    - id: source-anchor-targets-location
      direction: outgoing
      predicate: anchors
      target_concept_id: SourceLocation
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 SourceAnchor 必须指向一个当前可解析或已恢复的 SourceLocation。
        en: Every SourceAnchor targets one currently resolvable or recovered SourceLocation.
        ja: 各 SourceAnchor は一つの resolvable/recovered SourceLocation を対象とします。
      source_claims:
        - claim-source-anchor-008
examples:
  - id: SourceAnchor-example-citation
    labels:
      zh: 引用锚
      en: Citation anchor
      ja: citation anchor
    descriptions:
      zh: OutputCitation 使用 CitationAnchor 指向 policy.pdf pages:3..3。
      en: OutputCitation uses CitationAnchor to policy.pdf pages:3..3.
      ja: citation anchor。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: citation
    field_values: {}
    related_node_ids:
      - SourceAnchor
      - CitationAnchor
      - info-output-disclosure
    related_relation_ids: []
    source_claims:
      - claim-source-anchor-design
  - id: SourceAnchor-example-content
    labels:
      zh: 内容锚
      en: Content anchor
      ja: content anchor
    descriptions:
      zh: "HTML #section-4 作为 ContentAnchor。"
      en: "HTML #section-4 as ContentAnchor."
      ja: content anchor。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: html id
    field_values: {}
    related_node_ids:
      - SourceAnchor
      - ContentAnchor
    related_relation_ids: []
    source_claims:
      - claim-source-anchor-design
  - id: SourceAnchor-example-without-range
    labels:
      zh: 无范围锚
      en: Anchor without range
      ja: range なし anchor
    descriptions:
      zh: CitationAnchor 必须可解析到 SourceRange 或等价 locators。
      en: CitationAnchor must resolve to SourceRange or equivalent locators.
      ja: range 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceAnchor
    related_relation_ids: []
    source_claims:
      - claim-source-anchor-design
parent_relation:
  id: SourceReference-has_anchor-SourceAnchor
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有来源锚
    en: has source anchor
    ja: 出典アンカーを持つ
  definitions:
    zh: 来源引用具有锚关系把引用记录连接到支持人类引用或内容重识别的锚记录；锚补充位置，不替代引用或位置身份。
    en: SourceReference has_anchor SourceAnchor links a reference record to an anchor supporting human citation or content re-identification; the anchor supplements rather than replaces reference or location identity.
    ja: SourceReference has_anchor SourceAnchor は reference record を human citation/content re-identification anchor に結び、anchor は reference/location identity を置換せず補足します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有来源锚
      en: inverse of has source anchor
      ja: 逆：出典アンカーを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_anchor-SourceAnchor-example-positive-manual-001
      labels:
        zh: SourceReference-has_anchor-SourceAnchor正例
        en: SourceReference-has_anchor-SourceAnchor positive case
        ja: SourceReference-has_anchor-SourceAnchor正例
      descriptions:
        zh: src-ref-42 连接 cite-7，cite-7 再定位第 42 页。
        en: src-ref-42 links to cite-7, which in turn identifies page 42.
        ja: src-ref-42 は cite-7 に接続し cite-7 は page 42 を識別します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceAnchor
      related_relation_ids:
        - SourceReference-has_anchor-SourceAnchor
      source_claims:
        - claim-source-anchor-012
    - id: SourceReference-has_anchor-SourceAnchor-example-boundary-manual-001
      labels:
        zh: SourceReference-has_anchor-SourceAnchor边界例
        en: SourceReference-has_anchor-SourceAnchor boundary case
        ja: SourceReference-has_anchor-SourceAnchor境界例
      descriptions:
        zh: 一个脚注编号与来源引用仅在同一段出现。
        en: A footnote number merely appears in the same paragraph as a source reference.
        ja: footnote number が source reference と同じ paragraph に現れるだけです。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceAnchor
      related_relation_ids:
        - SourceReference-has_anchor-SourceAnchor
      source_claims:
        - claim-source-anchor-013
  source_claims:
    - claim-source-anchor-014
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: SourceAnchor-anchors-SourceLocation
    predicate: anchors
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 锚定来源位置
      en: anchors source location
      ja: 出典位置をアンカーする
    definitions:
      zh: 来源锚锚定位置关系把引用显示键或内容重识别证据连接到它所解释、恢复或替代的 SourceLocation。
      en: SourceAnchor anchors SourceLocation links citation-display or content re-identification evidence to the SourceLocation that it explains, recovers, or replaces after drift.
      ja: SourceAnchor anchors SourceLocation は citation-display/content re-identification evidence を説明・復元・drift 後代替する SourceLocation に結びます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_anchors
      labels:
        zh: 反向：锚定来源位置
        en: inverse of anchors source location
        ja: 逆：出典位置をアンカーする
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SourceAnchor-anchors-SourceLocation-example-positive-manual-001
        labels:
          zh: SourceAnchor-anchors-SourceLocation正例
          en: SourceAnchor-anchors-SourceLocation positive case
          ja: SourceAnchor-anchors-SourceLocation正例
        descriptions:
          zh: ContentAnchor 的 exact/prefix/suffix 重识别旧 SourceSpan 对应的新跨度。
          en: A ContentAnchor's exact/prefix/suffix re-identifies the new span corresponding to an old SourceSpan.
          ja: ContentAnchor の exact/prefix/suffix が old SourceSpan 対応 new span を再識別します。
        field_values: {}
        related_node_ids:
          - SourceAnchor
          - SourceLocation
        related_relation_ids:
          - SourceAnchor-anchors-SourceLocation
        source_claims:
          - claim-source-anchor-015
      - id: SourceAnchor-anchors-SourceLocation-example-boundary-manual-001
        labels:
          zh: SourceAnchor-anchors-SourceLocation边界例
          en: SourceAnchor-anchors-SourceLocation boundary case
          ja: SourceAnchor-anchors-SourceLocation境界例
        descriptions:
          zh: 锚文本在来源中出现两次，未用上下文消歧。
          en: Anchor text occurs twice in the source and has no contextual disambiguation.
          ja: anchor text が source 内で二回現れ context disambiguation がありません。
        field_values: {}
        related_node_ids:
          - SourceAnchor
          - SourceLocation
        related_relation_ids:
          - SourceAnchor-anchors-SourceLocation
        source_claims:
          - claim-source-anchor-016
    source_claims:
      - claim-source-anchor-017
    layout_role: cross-link
    target: concept:SourceLocation
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-anchor-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor. For SourceAnchor.anchor_id, the field records this reviewed value: Stably identifies the citation or content-anchor record."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-003
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines multiple selector forms with distinct recovery semantics. Moonweave records the selected form explicitly.
    locator: §4.2 Selectors and §4.2.4 Text Quote Selector
    evidence_kind: normative
    confidence: high
  - id: claim-source-anchor-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines exact as the selected textual content. Moonweave uses it for drift-resistant re-identification.
    locator: §4.2.4 Text Quote Selector > exact property
    evidence_kind: normative
    confidence: high
  - id: claim-source-anchor-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines optional prefix context to distinguish the selected quote.
    locator: §4.2.4 Text Quote Selector > prefix property
    evidence_kind: normative
    confidence: high
  - id: claim-source-anchor-006
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines optional suffix context to distinguish the selected quote.
    locator: §4.2.4 Text Quote Selector > suffix property
    evidence_kind: normative
    confidence: high
  - id: claim-source-anchor-007
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires a specific resource to identify its source. Moonweave applies the same ownership invariant to SourceAnchor.
    locator: §4 Specific Resources > source relationship
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C selectors determine a segment within the source. Moonweave requires the anchor to materialize that result as SourceLocation.
    locator: §4.2 Selectors > segment determination
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor. This evidence supports the manually reviewed positive case for SourceAnchor: anchor-runbook-7-p42 connects a document reference with page 42 and stores a readable label."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-010
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor. This evidence supports the manually reviewed instance case for SourceAnchor: The system first uses SourceLocation and falls back to a ContentAnchor for re-identification."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-011
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor. This evidence supports the manually reviewed boundary case for SourceAnchor: [412,795) has only character coordinates and no anchor_id or supplemental evidence."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-012
    source: eng-std-w3c-web-annotation-model
    supports: "W3C provides quotation selectors for locating content beyond bare positions; Moonweave links such anchoring evidence to the source reference. This evidence supports the manually reviewed positive case for SourceReference-has_anchor-SourceAnchor: src-ref-42 links to cite-7, which in turn identifies page 42."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-013
    source: eng-std-w3c-web-annotation-model
    supports: "W3C provides quotation selectors for locating content beyond bare positions; Moonweave links such anchoring evidence to the source reference. This evidence supports the manually reviewed boundary case for SourceReference-has_anchor-SourceAnchor: A footnote number merely appears in the same paragraph as a source reference."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-014
    source: eng-std-w3c-web-annotation-model
    supports: W3C provides quotation selectors for locating content beyond bare positions; Moonweave links such anchoring evidence to the source reference.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-015
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector and TextPositionSelector offer different ways to determine a segment; Moonweave records the anchor-location correspondence explicitly. This evidence supports the manually reviewed positive case for SourceAnchor-anchors-SourceLocation: A ContentAnchor's exact/prefix/suffix re-identifies the new span corresponding to an old SourceSpan."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-016
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextQuoteSelector and TextPositionSelector offer different ways to determine a segment; Moonweave records the anchor-location correspondence explicitly. This evidence supports the manually reviewed boundary case for SourceAnchor-anchors-SourceLocation: Anchor text occurs twice in the source and has no contextual disambiguation."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-017
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextQuoteSelector and TextPositionSelector offer different ways to determine a segment; Moonweave records the anchor-location correspondence explicitly.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-anchor-design
    source: src-info-sources-design
    supports: SourceAnchor binds citations to verifiable in-content anchors.
    locator: SourceAnchor
    evidence_kind: design-inference
    confidence: high
