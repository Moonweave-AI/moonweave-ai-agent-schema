source_claims:
  - id: claim-source-anchor-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor.
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor. For SourceAnchor.anchor_id, the field records this reviewed value: Stably identifies the citation or content-anchor record."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-003
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines multiple selector forms with distinct recovery semantics. Moonweave records the selected form explicitly.
    locator: §4.2 Selectors and §4.2.4 Text Quote Selector
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines exact as the selected textual content. Moonweave uses it for drift-resistant re-identification.
    locator: §4.2.4 Text Quote Selector > exact property
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines optional prefix context to distinguish the selected quote.
    locator: §4.2.4 Text Quote Selector > prefix property
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-006
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines optional suffix context to distinguish the selected quote.
    locator: §4.2.4 Text Quote Selector > suffix property
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-007
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires a specific resource to identify its source. Moonweave applies the same ownership invariant to SourceAnchor.
    locator: §4 Specific Resources > source relationship
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C selectors determine a segment within the source. Moonweave requires the anchor to materialize that result as SourceLocation.
    locator: §4.2 Selectors > segment determination
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines text quotation information for selecting and distinguishing content; Moonweave generalizes human citation and resilient content anchoring under SourceAnchor. This evidence supports the manually reviewed positive case for SourceAnchor: anchor-runbook-7-p42 connects a document reference with page 42 and stores a readable label."
    locator: §4.2.4 Text Quote Selector, lines 940–980
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-anchor-010
