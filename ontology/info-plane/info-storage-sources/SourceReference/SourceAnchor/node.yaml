schema: moonweave.ai/ontology-node/v1
id: SourceAnchor
kind: concept
status: accepted
labels:
  zh: 来源锚
  en: source anchor
  ja: 出典アンカー
semantics:
  short_definition:
    zh: 为来源选择保存可读引用或内容重识别证据的锚记录。
    en: An anchor record carrying a readable citation or content re-identification evidence for a source selection.
    ja: source selection の readable citation または content re-identification evidence を持つ anchor record。
  definition:
    zh: 来源锚是一种信息记录，连接 SourceReference 与 SourceLocation 并保存超出纯坐标的信息，使人类可引用该选择或系统可在位置漂移后重识别它；锚不替代精确位置，也不定义来源身份。
    en: SourceAnchor is an information record that connects a SourceReference and SourceLocation with information beyond bare coordinates, enabling human citation or machine re-identification after location drift; an anchor neither replaces exact location nor defines source identity.
    ja: SourceAnchor は SourceReference/SourceLocation を bare coordinate 以上の情報で結び、人間 citation または location drift 後の machine re-identification を可能にする情報記録です。exact location も source identity も置換しません。
  why_needed:
    zh: 坐标可能因编辑漂移，引用标签又不一定能重找内容；统一锚 genus 后可再分 CitationAnchor 与 ContentAnchor，避免二者混成同级属性。
    en: Coordinates can drift after editing and citation labels may not re-find content; a shared anchor genus can then specialize CitationAnchor and ContentAnchor without collapsing their roles into flat properties.
    ja: coordinate は edit 後 drift し citation label だけでは content を再発見できないため、共通 anchor genus から CitationAnchor/ContentAnchor を分けます。
  includes:
    - zh: 带独立 anchor_id，且用于引用显示或内容重识别的锚记录。
      en: Anchor records with an independent anchor_id used for citation display or content re-identification.
      ja: independent anchor_id を持ち citation display/content re-identification に使う anchor record。
  excludes:
    - zh: 纯位置范围、资源 URI、版本摘要以及没有来源连接的任意文本标签。
      en: Bare location ranges, resource URIs, version digests, and arbitrary labels without a source link.
      ja: bare location range・resource URI・version digest・source link のない arbitrary label。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - anchor_id
  fields:
    - id: anchor_id
      labels:
        zh: 锚标识
        en: anchor ID
        ja: アンカー ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识引用或内容锚记录。
        en: Stably identifies the citation or content-anchor record.
        ja: citation/content-anchor record を安定識別します。
      allowed_values: []
      pattern: null
      example_value: anchor-runbook-7-p42
      source_claims:
        - claim-source-anchor-002
    - id: selector_kind
      labels:
        zh: 选择器类型
        en: selector kind
        ja: selector kind
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明锚使用精确引文、位置、范围或组合选择器进行恢复。
        en: Declares whether recovery uses a quote, position, range, or composite selector.
        ja: recovery が quote・position・range・composite selector のどれを使うか宣言します。
      allowed_values: []
      pattern: null
      example_value: text-quote
      source_claims:
        - claim-source-anchor-003
    - id: exact_quote
      labels:
        zh: 精确引文
        en: exact quote
        ja: exact quote
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存待重识别选择的精确文本；非文本锚可省略。
        en: Carries the exact text to be re-identified; non-text anchors may omit it.
        ja: 再識別する exact text を保持し、non-text anchor では省略できます。
      allowed_values: []
      pattern: null
      example_value: Escalate only after the retry budget is exhausted.
      source_claims:
        - claim-source-anchor-004
    - id: prefix
      labels:
        zh: 引文前文
        en: quote prefix
        ja: quote prefix
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存精确引文之前的上下文，用于区分重复匹配。
        en: Carries context immediately before the exact quote to distinguish repeated matches.
        ja: exact quote 直前の context を保持し repeated match を区別します。
      allowed_values: []
      pattern: null
      example_value: "Recovery policy: "
      source_claims:
        - claim-source-anchor-005
    - id: suffix
      labels:
        zh: 引文后文
        en: quote suffix
        ja: quote suffix
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存精确引文之后的上下文，用于区分重复匹配。
        en: Carries context immediately after the exact quote to distinguish repeated matches.
        ja: exact quote 直後の context を保持し repeated match を区別します。
      allowed_values: []
      pattern: null
      example_value: " Record the terminal cause."
      source_claims:
        - claim-source-anchor-006
  constraints: []
  required_relation_constraints:
    - id: source-anchor-owned-by-reference
      direction: incoming
      predicate: has_anchor
      target_concept_id: SourceReference
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 SourceAnchor 必须属于一个被锚定的 SourceReference。
        en: Every SourceAnchor belongs to exactly one anchored SourceReference.
        ja: 各 SourceAnchor は一つの anchored SourceReference に属します。
      source_claims:
        - claim-source-anchor-007
    - id: source-anchor-targets-location
      direction: outgoing
      predicate: anchors
      target_concept_id: SourceLocation
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个 SourceAnchor 必须指向一个当前可解析或已恢复的 SourceLocation。
        en: Every SourceAnchor targets one currently resolvable or recovered SourceLocation.
        ja: 各 SourceAnchor は一つの resolvable/recovered SourceLocation を対象とします。
      source_claims:
        - claim-source-anchor-008
examples:
  - id: SourceAnchor-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源锚正例
      en: source anchor positive case
      ja: 出典アンカー正例
    scenario_id: null
    descriptions:
      zh: anchor-runbook-7-p42 同时连接文档引用与第 42 页位置，并保存可读标签。
      en: anchor-runbook-7-p42 connects a document reference with page 42 and stores a readable label.
      ja: anchor-runbook-7-p42 は document reference と page 42 を結び readable label を保存します。
    field_values:
      anchor_id: anchor-runbook-7-p42
      selector_kind: text-quote
      exact_quote: Escalate only after the retry budget is exhausted.
      prefix: "Recovery policy: "
      suffix: " Record the terminal cause."
    related_node_ids:
      - SourceReference
      - SourceAnchor
    related_relation_ids:
      - SourceReference-has_anchor-SourceAnchor
    expected_result:
      zh: SourceAnchor 保持其已审查身份，并按定义解释 SourceReference-has_anchor-SourceAnchor。
      en: Retain the reviewed identity of SourceAnchor and interpret SourceReference-has_anchor-SourceAnchor exactly as defined.
      ja: SourceAnchor の reviewed identity を保持し SourceReference-has_anchor-SourceAnchor を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 锚具有独立身份并补充纯坐标信息。
      en: The anchor has independent identity and augments bare coordinates.
      ja: anchor は independent identity を持ち bare coordinate を補います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-anchor-009
  - id: SourceAnchor-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源锚实例
      en: source anchor instance case
      ja: 出典アンカー実例
    scenario_id: null
    descriptions:
      zh: 系统先用 SourceLocation 定位，再在失败时使用 ContentAnchor 重识别。
      en: The system first uses SourceLocation and falls back to a ContentAnchor for re-identification.
      ja: system はまず SourceLocation を使い failure 時 ContentAnchor で再識別します。
    field_values:
      anchor_id: anchor-runbook-7-p42
      selector_kind: text-quote
      exact_quote: Escalate only after the retry budget is exhausted.
    related_node_ids:
      - SourceReference
      - SourceAnchor
    related_relation_ids:
      - SourceReference-has_anchor-SourceAnchor
    expected_result:
      zh: SourceAnchor 保持其已审查身份，并按定义解释 SourceReference-has_anchor-SourceAnchor。
      en: Retain the reviewed identity of SourceAnchor and interpret SourceReference-has_anchor-SourceAnchor exactly as defined.
      ja: SourceAnchor の reviewed identity を保持し SourceReference-has_anchor-SourceAnchor を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 位置和锚分工明确，可联合使用。
      en: Location and anchor have distinct roles and can be used together.
      ja: location と anchor は役割が異なり共同利用できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-anchor-010
  - id: SourceAnchor-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源锚边界例
      en: source anchor boundary case
      ja: 出典アンカー境界例
    scenario_id: null
    descriptions:
      zh: "[412,795) 只有字符坐标，没有 anchor_id 或附加证据。"
      en: "[412,795) has only character coordinates and no anchor_id or supplemental evidence."
      ja: "[412,795) は character coordinate だけで anchor_id/supplemental evidence がありません。"
    field_values:
      coordinate_only: "[412,795)"
    related_node_ids:
      - SourceReference
      - SourceAnchor
    related_relation_ids:
      - SourceReference-has_anchor-SourceAnchor
    expected_result:
      zh: 不把该对象归入 SourceAnchor，也不凭邻近或词形推断 SourceReference-has_anchor-SourceAnchor。
      en: Do not classify the object as SourceAnchor or infer SourceReference-has_anchor-SourceAnchor from proximity or lexical form.
      ja: object を SourceAnchor に分類せず proximity/lexical form から SourceReference-has_anchor-SourceAnchor を推論しません。
    why_valid_or_invalid:
      zh: 这是 SourceSpan，而不是 SourceAnchor。
      en: This is a SourceSpan, not a SourceAnchor.
      ja: これは SourceAnchor ではなく SourceSpan です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-anchor-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceReference-has_anchor-SourceAnchor
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有来源锚
    en: has source anchor
    ja: 出典アンカーを持つ
  definitions:
    zh: 来源引用具有锚关系把引用记录连接到支持人类引用或内容重识别的锚记录；锚补充位置，不替代引用或位置身份。
    en: SourceReference has_anchor SourceAnchor links a reference record to an anchor supporting human citation or content re-identification; the anchor supplements rather than replaces reference or location identity.
    ja: SourceReference has_anchor SourceAnchor は reference record を human citation/content re-identification anchor に結び、anchor は reference/location identity を置換せず補足します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有来源锚
      en: inverse of has source anchor
      ja: 逆：出典アンカーを持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_anchor-SourceAnchor-example-positive-manual-001
      kind: positive
      labels:
        zh: SourceReference-has_anchor-SourceAnchor正例
        en: SourceReference-has_anchor-SourceAnchor positive case
        ja: SourceReference-has_anchor-SourceAnchor正例
      scenario_id: null
      descriptions:
        zh: src-ref-42 连接 cite-7，cite-7 再定位第 42 页。
        en: src-ref-42 links to cite-7, which in turn identifies page 42.
        ja: src-ref-42 は cite-7 に接続し cite-7 は page 42 を識別します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceAnchor
      related_relation_ids:
        - SourceReference-has_anchor-SourceAnchor
      expected_result:
        zh: 建立 SourceReference —has_anchor→ SourceAnchor，并保持该方向与限定条件。
        en: Assert SourceReference —has_anchor→ SourceAnchor while preserving its direction and qualifiers.
        ja: SourceReference —has_anchor→ SourceAnchor を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 锚记录具有独立身份且明确服务于这一来源引用。
        en: The anchor has independent identity and explicitly serves that reference.
        ja: anchor は independent identity を持ち reference に明示対応します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-anchor-012
    - id: SourceReference-has_anchor-SourceAnchor-example-boundary-manual-001
      kind: boundary
      labels:
        zh: SourceReference-has_anchor-SourceAnchor边界例
        en: SourceReference-has_anchor-SourceAnchor boundary case
        ja: SourceReference-has_anchor-SourceAnchor境界例
      scenario_id: null
      descriptions:
        zh: 一个脚注编号与来源引用仅在同一段出现。
        en: A footnote number merely appears in the same paragraph as a source reference.
        ja: footnote number が source reference と同じ paragraph に現れるだけです。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceAnchor
      related_relation_ids:
        - SourceReference-has_anchor-SourceAnchor
      expected_result:
        zh: 拒绝建立 SourceReference-has_anchor-SourceAnchor，两端对象仍保留各自身份。
        en: Reject SourceReference-has_anchor-SourceAnchor; both endpoint objects retain their own identities.
        ja: SourceReference-has_anchor-SourceAnchor を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 共现不构成 has_anchor 事实。
        en: Co-occurrence does not establish a has_anchor fact.
        ja: co-occurrence は has_anchor fact を確立しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-anchor-013
  source_claims:
    - claim-source-anchor-014
  distinct_fact_rationale:
    zh: SourceReference-has_anchor-SourceAnchor 记录 SourceReference 到 SourceAnchor 的单一 has_anchor 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceReference-has_anchor-SourceAnchor records one has_anchor fact from SourceReference to SourceAnchor; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceReference-has_anchor-SourceAnchor は SourceReference から SourceAnchor への一 has_anchor fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
