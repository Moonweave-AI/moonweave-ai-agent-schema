    direction: source-to-target
    relation_kind: information
    labels:
      zh: 锚定来源位置
      en: anchors source location
      ja: 出典位置をアンカーする
    definitions:
      zh: 来源锚锚定位置关系把引用显示键或内容重识别证据连接到它所解释、恢复或替代的 SourceLocation。
      en: SourceAnchor anchors SourceLocation links citation-display or content re-identification evidence to the SourceLocation that it explains, recovers, or replaces after drift.
      ja: SourceAnchor anchors SourceLocation は citation-display/content re-identification evidence を説明・復元・drift 後代替する SourceLocation に結びます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_anchors
      labels:
        zh: 反向：锚定来源位置
        en: inverse of anchors source location
        ja: 逆：出典位置をアンカーする
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
