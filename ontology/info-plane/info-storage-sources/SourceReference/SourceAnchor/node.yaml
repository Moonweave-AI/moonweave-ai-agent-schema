          ja: SourceAnchor-anchors-SourceLocation境界例
        scenario_id: null
        descriptions:
          zh: 锚文本在来源中出现两次，未用上下文消歧。
          en: Anchor text occurs twice in the source and has no contextual disambiguation.
          ja: anchor text が source 内で二回現れ context disambiguation がありません。
        field_values: {}
        related_node_ids:
          - SourceAnchor
          - SourceLocation
        related_relation_ids:
          - SourceAnchor-anchors-SourceLocation
        expected_result:
          zh: 拒绝建立 SourceAnchor-anchors-SourceLocation，两端对象仍保留各自身份。
          en: Reject SourceAnchor-anchors-SourceLocation; both endpoint objects retain their own identities.
          ja: SourceAnchor-anchors-SourceLocation を拒否し両 endpoint object は各 identity を保持します。
        why_valid_or_invalid:
