          zh: ContentAnchor 的 exact/prefix/suffix 重识别旧 SourceSpan 对应的新跨度。
          en: A ContentAnchor's exact/prefix/suffix re-identifies the new span corresponding to an old SourceSpan.
          ja: ContentAnchor の exact/prefix/suffix が old SourceSpan 対応 new span を再識別します。
        field_values: {}
        related_node_ids:
          - SourceAnchor
          - SourceLocation
        related_relation_ids:
