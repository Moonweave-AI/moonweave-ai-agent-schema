          en: Assert SourceAnchor —anchors→ SourceLocation while preserving its direction and qualifiers.
          ja: SourceAnchor —anchors→ SourceLocation を assertion し direction/qualifier を保持します。
        why_valid_or_invalid:
          zh: 锚证据与被解释的位置有可验证对应。
          en: Anchor evidence has a verifiable correspondence with the interpreted location.
          ja: anchor evidence と interpreted location に verifiable correspondence があります。
