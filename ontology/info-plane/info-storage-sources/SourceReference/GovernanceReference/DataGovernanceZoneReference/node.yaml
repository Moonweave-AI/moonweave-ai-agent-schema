parent_relation:
  id: DataGovernanceZoneReference-is_a-GovernanceReference
  predicate: is_a
  target: concept:GovernanceReference
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种治理引用
    en: Is a kind of governance reference
    ja: ガバナンス参照の一種である
  definitions:
    zh: DataGovernanceZoneReference 保留 GovernanceReference 的治理引用标识、声明 URI、声明角色和可选来源链接，将声明角色收窄为 data-zone-declaration，再增加数据治理区标识和区划依据。
    en: DataGovernanceZoneReference retains GovernanceReference's governance-reference identifier, declaration URI, declaration role, and optional source link, narrows the declaration role to data-zone-declaration, and adds a data-governance-zone identifier plus zoning basis.
    ja: DataGovernanceZoneReference は GovernanceReference のガバナンス参照識別子、宣言 URI、宣言役割、任意のソースリンクを保持し、宣言役割を data-zone-declaration に限定した上で、データガバナンスゾーン識別子と区分根拠を追加します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subclass
    labels:
      zh: 具有数据治理区引用子类
      en: Has data-governance-zone-reference subclass
