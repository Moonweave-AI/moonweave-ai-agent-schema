schema: moonweave.ai/ontology-node/v1
id: DataGovernanceZoneReference
kind: concept
status: accepted
labels:
  zh: 数据治理区声明引用
  en: Data Governance Zone Reference
  ja: データガバナンスゾーン宣言参照
semantics:
  short_definition:
    zh: 指向适用于某个来源的数据治理区声明的可解析治理引用。
    en: A resolvable governance reference to a data-governance zone declaration applicable to a source.
    ja: ソースに適用されるデータガバナンスゾーン宣言への解決可能なガバナンス参照。
  definition:
    zh: DataGovernanceZoneReference 是 GovernanceReference 的一种。它使用继承的本地治理引用标识、声明 URI 和声明角色，以及声明内稳定的数据治理区标识和区划依据，记录某来源需要审阅的数据治理区声明上下文。它引用声明而非声明覆盖的数据、云部署或法律结论；它不是零信任安全区、访问许可、策略决定或执行端点。
    en: DataGovernanceZoneReference is a kind of GovernanceReference. Using its inherited local governance-reference identifier, declaration URI, and declaration role together with a stable data-governance-zone identifier and zoning basis, it records context from a data-governance zone declaration that a source must be reviewed against. It references that declaration rather than the data governed by it, a cloud deployment, or a legal conclusion; it is not a zero-trust security zone, access permission, policy decision, or enforcement endpoint.
    ja: DataGovernanceZoneReference は GovernanceReference の一種です。継承したローカルのガバナンス参照識別子、宣言 URI、宣言役割に、安定したデータガバナンスゾーン識別子と区分根拠を組み合わせ、ソースが照合すべきデータガバナンスゾーン宣言の文脈を記録します。これはその宣言を参照するのであって、対象データ、クラウド配備、又は法的結論そのものではありません。ゼロトラストのセキュリティゾーン、アクセス許可、方針決定、又は実施エンドポイントでもありません。
  why_needed:
    zh: 数据治理的责任、决策参数和审阅依据不能由数据存放位置或一次访问决定替代。保留可解析声明 URI、区标识和区划依据，使审阅者能够追溯治理声明，而不会把元数据误作驻留配置、合规结论或授权结果。
    en: Data-governance responsibility, decision parameters, and review basis cannot be replaced by a data location or a single access decision. Retaining a resolvable declaration URI, zone identifier, and zoning basis lets a reviewer trace the applicable governance declaration without mistaking metadata for residency configuration, a compliance conclusion, or an authorization result.
    ja: データガバナンスの責任、意思決定パラメータ、及びレビュー根拠は、データ所在地又は単一のアクセス決定に置き換えられません。解決可能な宣言 URI、ゾーン識別子、区分根拠を保持することで、レビュー担当者はメタデータをレジデンシー設定、コンプライアンス結論、又は認可結果と取り違えずに適用対象の宣言を追跡できます。
  includes:
    - zh: 治理声明的绝对 URI、稳定的数据治理区标识、地理/法律/组织区划依据，以及可选的适用来源引用。
      en: An absolute governance-declaration URI, a stable data-governance-zone identifier, geographic/legal/organizational zoning basis, and an optional applicable source reference.
      ja: 絶対ガバナンス宣言 URI、安定したデータガバナンスゾーン識別子、地理的・法的・組織的な区分根拠、及び任意の適用対象ソース参照。
  excludes:
    - zh: 区内数据副本、云区域或数据库连接配置、数据驻留或跨境传输的法律裁定、访问许可、策略决定和控制执行端点。
      en: Data copies in the zone, cloud-region or database-connection configuration, legal determinations about residency or cross-border transfer, access permissions, policy decisions, and control-enforcement endpoints.
      ja: ゾーン内のデータコピー、クラウドリージョン又はデータベース接続設定、レジデンシー又は越境移転に関する法的判断、アクセス許可、方針決定、及び統制実施エンドポイント。
  semantic_kind: information
  aliases:
    - data-governance-declaration-locator
    - governance-zone-reference
engineering:
  explanation:
    zh: 目录摄取器为每个数据治理区声明分配继承的 governance_reference_id，验证 governance_subject_uri 为绝对 URI，并将 governance_role 固定为 data-zone-declaration。它保留声明内 data_governance_zone_identifier 和本地选择的 zoning_basis，已知时再链接 applies_to_source_ref。合规、法律和授权系统仍须独立解释政策与执行控制。
    en: A catalog ingestor assigns the inherited governance_reference_id to each data-governance-zone declaration, validates governance_subject_uri as an absolute URI, and fixes governance_role to data-zone-declaration. It retains the declaration's data_governance_zone_identifier and locally selected zoning_basis, then links applies_to_source_ref when known. Compliance, legal, and authorization systems must still interpret policies and enforce controls independently.
    ja: カタログ取込器は各データガバナンスゾーン宣言に継承した governance_reference_id を割り当て、governance_subject_uri が絶対 URI であることを検証し、governance_role を data-zone-declaration に固定します。宣言の data_governance_zone_identifier とローカル選択の zoning_basis を保持し、判明時には applies_to_source_ref を接続します。コンプライアンス、法務、及び認可システムは依然として独立して方針を解釈し統制を実施します。
  typical_input:
    - description:
        zh: 将客户导出来源关联到组织目录中的欧盟个人数据治理区声明。
        en: Associate a customer-export source with an EU personal-data governance-zone declaration in an organizational catalog.
        ja: 顧客エクスポートソースを組織カタログ内の EU 個人データガバナンスゾーン宣言に関連付ける。
      format: '{"governance_reference_id":"gov-ref-data-zone-eu-001","governance_subject_uri":"https://catalog.example.org/governance-zones/eu-personal-data","governance_role":"data-zone-declaration","data_governance_zone_identifier":"eu-personal-data","zoning_basis":"legal","applies_to_source_ref":"src-ref-customer-export-7"}'
      source_claims:
        - claim-rfc3986-governance-zone-uri
        - claim-local-data-governance-zone-projection
  typical_output:
    - description:
        zh: 可审阅的数据治理依据引用，而不是数据库、云区域、合规结论或访问配置。
        en: A reviewable data-governance basis reference rather than a database, cloud region, compliance conclusion, or access configuration.
        ja: データベース、クラウドリージョン、コンプライアンス結論、又はアクセス設定ではなく、レビュー可能なデータガバナンス根拠参照。
      format: '{"governance_reference_id":"gov-ref-data-zone-eu-001","governance_subject_uri":"https://catalog.example.org/governance-zones/eu-personal-data","governance_role":"data-zone-declaration","data_governance_zone_identifier":"eu-personal-data","zoning_basis":"legal","applies_to_source_ref":"src-ref-customer-export-7"}'
      source_claims:
        - claim-nist-data-governance-definition
        - claim-local-data-governance-zone-projection
  reference_implementations:
    - name: NIST CSRC Data Governance Glossary
      url: https://csrc.nist.gov/glossary/term/data_governance
      description: Defines data governance in terms of formal management, authority, and decision-making parameters for enterprise data assets; it does not prescribe a data-zone term or this record schema.
    - name: RFC 3986 URI Generic Syntax
      url: https://www.rfc-editor.org/rfc/rfc3986.html
      description: Defines URI identification without promising resource access or a particular operational configuration.
structure:
  identity_keys:
    - source_reference_id
    - governance_reference_id
  fields:
    - id: source_reference_id
      labels:
        zh: 来源引用标识
        en: Source reference ID
        ja: ソース参照 ID
      definitions:
        zh: 继承自 SourceReference 的本地引用记录标识，用于索引这条数据治理区声明定位记录；它不是数据治理区名称，也不是零信任区标识。
        en: SourceReference-inherited local record identifier for this data-governance-zone declaration locator; it is neither the data-governance-zone name nor a zero-trust-zone identifier.
        ja: このデータ・ガバナンス・ゾーン宣言ロケーターのために SourceReference から継承するローカル記録識別子。データ・ガバナンス・ゾーン名でもゼロトラスト・ゾーン識別子でもない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^src-ref-[a-z0-9-]+$
      example_value: src-ref-data-zone-eu-001
      allowed_values: []
      source_claims:
        - claim-local-data-governance-zone-projection
    - id: reference_type
      labels:
        zh: 引用类型
        en: Reference type
        ja: 参照種別
      definitions:
        zh: 继承的解析类型，固定为 governance-id，表示来源标识定位治理声明而非数据载荷、云部署或访问权限。
        en: Inherited resolution type fixed to governance-id, stating that the source identifier locates a governance declaration rather than data payload, cloud deployment, or access permission.
        ja: 継承する解決種別であり、governance-id に固定する。ソース識別子がデータ・ペイロード、クラウド配置、アクセス権ではなく、ガバナンス宣言を位置付けることを示す。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: governance-id
      allowed_values:
        - governance-id
      source_claims:
        - claim-local-data-governance-zone-projection
    - id: source_identifier
      labels:
        zh: 来源标识值
        en: Source identifier value
        ja: ソース識別子値
      definitions:
        zh: 继承的可解析来源标识值，必须与治理声明 URI 相同；它只定位声明，不证明合规、授予权限或执行区域隔离。
        en: Inherited resolvable source identifier equal to the governance declaration URI; it only locates the declaration and neither proves compliance, grants permission, nor enforces regional isolation.
        ja: ガバナンス宣言 URI と等しい継承済みの解決可能なソース識別子値。宣言を位置付けるだけで、準拠を証明せず、権限を与えず、地域隔離を実施しない。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[A-Za-z][A-Za-z0-9+.-]*:'
      example_value: https://catalog.example.org/governance-zones/eu-personal-data
      allowed_values: []
      source_claims:
        - claim-rfc3986-governance-zone-uri
        - claim-local-data-governance-zone-projection
    - id: governance_reference_id
      labels:
        zh: 治理引用标识
        en: Governance reference identifier
        ja: ガバナンス参照識別子
      definitions:
        zh: 继承自 GovernanceReference 的本地不可复用标识，用于区分一条数据治理区声明引用，而不是数据治理区本身的名称。
        en: The GovernanceReference-inherited, nonreusable local identifier for one data-governance-zone declaration reference, not the name of the data-governance zone itself.
        ja: 一つのデータガバナンスゾーン宣言参照を区別する、GovernanceReference から継承した再利用不能なローカル識別子であり、データガバナンスゾーン自体の名前ではありません。
      datatype: identifier
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^gov-ref-[A-Za-z0-9._~-]+$'
      example_value: gov-ref-data-zone-eu-001
      allowed_values: []
      source_claims:
        - claim-local-data-governance-zone-projection
    - id: governance_subject_uri
      labels:
        zh: 治理声明 URI
        en: Governance declaration URI
        ja: ガバナンス宣言 URI
      definitions:
        zh: 继承自 GovernanceReference 的绝对 URI，定位描述数据治理区的受控声明，而不是区内数据位置、云服务端点或数据库连接。
        en: The GovernanceReference-inherited absolute URI that locates a controlled declaration describing a data-governance zone, rather than a data location in the zone, cloud-service endpoint, or database connection.
        ja: データガバナンスゾーンを記述する管理された宣言を位置付ける、GovernanceReference から継承した絶対 URI であり、ゾーン内データの場所、クラウドサービスエンドポイント、又はデータベース接続ではありません。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[A-Za-z][A-Za-z0-9+.-]*:'
      example_value: https://catalog.example.org/governance-zones/eu-personal-data
      allowed_values: []
      source_claims:
        - claim-rfc3986-governance-zone-uri
    - id: governance_role
      labels:
        zh: 治理角色
        en: Governance role
        ja: ガバナンス役割
      definitions:
        zh: 继承自 GovernanceReference 且在该子类中收窄为 data-zone-declaration，说明 URI 标识数据治理区声明，而非政策文本、控制实现或授权决定。
        en: Inherited from GovernanceReference and narrowed in this subtype to data-zone-declaration, indicating that the URI identifies a data-governance-zone declaration rather than policy text, control implementation, or an authorization decision.
        ja: GovernanceReference から継承し、この下位型では data-zone-declaration に限定されます。URI が方針本文、統制実装、又は認可決定ではなくデータガバナンスゾーン宣言を識別することを示します。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: data-zone-declaration
      allowed_values:
        - data-zone-declaration
      source_claims:
        - claim-local-data-governance-zone-projection
    - id: applies_to_source_ref
      labels:
        zh: 适用来源引用
        en: Applicable source reference
        ja: 適用対象ソース参照
      definitions:
        zh: 继承自 GovernanceReference 的可选 SourceReference 链接，表明哪条来源获得该数据治理声明的审阅上下文；它不传递访问权限。
        en: The optional GovernanceReference-inherited SourceReference link showing which source receives review context from this data-governance declaration; it conveys no access permission.
        ja: どのソースがこのデータガバナンス宣言からレビュー文脈を受けるかを示す、GovernanceReference から継承した任意の SourceReference リンクであり、アクセス許可は伝達しません。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: src-ref-customer-export-7
      allowed_values: []
      source_claims:
        - claim-local-data-governance-zone-projection
    - id: data_governance_zone_identifier
      labels:
        zh: 数据治理区标识
        en: Data-governance-zone identifier
        ja: データガバナンスゾーン識別子
      definitions:
        zh: 在 governance_subject_uri 标识的声明内稳定地区分一个数据治理区的标识，不是云区域名称、数据库连接字符串或数据对象标识。
        en: Identifier that stably distinguishes one data-governance zone within the declaration identified by governance_subject_uri, not a cloud-region name, database connection string, or data-object identifier.
        ja: governance_subject_uri が識別する宣言内で一つのデータガバナンスゾーンを安定して区別する識別子であり、クラウドリージョン名、データベース接続文字列、又はデータオブジェクト識別子ではありません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[A-Za-z0-9][A-Za-z0-9._~-]*$'
      example_value: eu-personal-data
      allowed_values: []
      source_claims:
        - claim-local-data-governance-zone-projection
    - id: zoning_basis
      labels:
        zh: 区划依据
        en: Zoning basis
        ja: 区分根拠
      definitions:
        zh: 本地声明用于界定数据治理区的主要依据。该枚举是本体设计推断，不声称任何标准规定这些类别，也不表示某项法规已经满足。
        en: Primary basis used by the local declaration to delimit the data-governance zone. This enumeration is an ontology design inference; it does not claim that a standard prescribes these categories or that a regulation has been satisfied.
        ja: ローカル宣言がデータガバナンスゾーンを区切るために用いる主要根拠です。この列挙はオントロジー設計上の推論であり、標準がこれらの分類を規定すること又は規制要件が満たされたことを主張しません。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: legal
      allowed_values:
        - geographic
        - legal
        - organizational
      source_claims:
        - claim-local-data-governance-zone-projection
  constraints:
    - id: data-governance-zone-reference-declares-context-only
      severity: error
      expression_language: plain
      expression: source_reference_id and governance_reference_id must be unique; reference_type must equal governance-id; source_identifier must equal governance_subject_uri; governance_subject_uri must be an absolute URI; governance_role must equal data-zone-declaration; data_governance_zone_identifier must be nonempty and unique within that declaration; zoning_basis must be geographic, legal, or organizational; applies_to_source_ref when present must resolve to SourceReference; no field may carry data payload, cloud configuration, a legal compliance determination, an authorization decision, or an enforcement endpoint.
      explanation:
        zh: 该形状记录可审阅的数据治理区声明上下文。它不能配置基础设施、保存数据、证明法律或保留要求已满足，或作出并执行访问决定。
        en: This shape records reviewable data-governance-zone declaration context. It cannot configure infrastructure, store data, prove that legal or retention requirements are met, or make and enforce an access decision.
        ja: この形状はレビュー可能なデータガバナンスゾーン宣言文脈を記録します。インフラを構成し、データを保存し、法的又は保持要件が満たされたことを証明し、又はアクセス決定を行い実施することはできません。
      source_claims:
        - claim-rfc3986-governance-zone-uri
        - claim-nist-data-governance-definition
        - claim-local-data-governance-zone-projection
  required_relations: []
