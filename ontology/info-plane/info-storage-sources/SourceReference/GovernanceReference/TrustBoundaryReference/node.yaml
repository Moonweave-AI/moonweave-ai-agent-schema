        labels:
          zh: TrustBoundaryReference-refers_to-TrustBoundary正例
          en: TrustBoundaryReference-refers_to-TrustBoundary positive case
          ja: TrustBoundaryReference-refers_to-TrustBoundary正例
        descriptions:
          zh: trust_boundary_id=host-to-sandbox 唯一解析目标边界。
          en: trust_boundary_id=host-to-sandbox uniquely resolves the target boundary.
          ja: trust_boundary_id=host-to-sandbox は target boundary を一意解決します。
        field_values: {}
        related_node_ids:
          - TrustBoundaryReference
          - TrustBoundary
        related_relation_ids:
          - TrustBoundaryReference-refers_to-TrustBoundary
        source_claims:
