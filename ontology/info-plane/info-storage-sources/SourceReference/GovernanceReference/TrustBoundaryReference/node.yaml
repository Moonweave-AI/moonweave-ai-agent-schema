      en: refers to trust boundary
      ja: 信頼境界を参照する
    definitions:
      zh: 信任边界引用指向信任边界关系把信息域引用解析到安全域拥有的 TrustBoundary 实体，而不复制边界策略或穿越状态。
      en: TrustBoundaryReference refers_to TrustBoundary resolves an information-domain reference to the TrustBoundary entity owned by the safety domain without copying boundary policy or crossing state.
      ja: TrustBoundaryReference refers_to TrustBoundary は information-domain reference を safety-domain TrustBoundary entity に解決し boundary policy/crossing state を複製しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_refers_to
      labels:
