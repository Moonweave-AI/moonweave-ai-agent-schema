schema: moonweave.ai/ontology-node/v1
id: TrustBoundaryReference
kind: concept
status: accepted
labels:
  zh: 信任边界引用
  en: trust boundary reference
  ja: 信頼境界参照
semantics:
  short_definition:
    zh: 指向信任变化与策略执行边界的治理对象引用。
    en: A governance reference to a trust-changing policy-enforcement boundary.
    ja: trust change と policy enforcement boundary への governance reference。
  definition:
    zh: 信任边界引用是治理对象引用的一类，种差是 referent 描述主体、资源或通信路径进入不同信任与执行范围的边界；它不是边界本体，也不是一次 BoundaryCrossing 事件。
    en: TrustBoundaryReference is a GovernanceReference whose referent marks where subjects, resources, or communication paths enter a different trust and enforcement scope; it is neither the boundary entity itself nor a BoundaryCrossing event.
    ja: TrustBoundaryReference は subject・resource・communication path が別 trust/enforcement scope に入る境界を指す GovernanceReference であり、boundary entity や BoundaryCrossing event ではありません。
  why_needed:
    zh: 引用信息有时必须指明由哪个信任边界约束，但信息模块不应复制安全域的 Boundary 实体或穿越事件。
    en: Source information sometimes must identify the trust boundary that constrains it, while the information module must not duplicate the safety domain's Boundary entity or crossing events.
    ja: source information は制約する trust boundary を示す必要がありますが information module は safety domain の Boundary entity/crossing event を複製すべきではありません。
  includes:
    - zh: 带 trust_boundary_id 并解析到安全域 TrustBoundary 的引用。
      en: References carrying trust_boundary_id and resolving to a safety-domain TrustBoundary.
      ja: trust_boundary_id を持ち safety-domain TrustBoundary に解決する参照。
  excludes:
    - zh: TrustBoundary 实体、边界穿越事件、授权结果和网络路由。
      en: The TrustBoundary entity, boundary-crossing events, authorization outcomes, and network routes.
      ja: TrustBoundary entity・boundary-crossing event・authorization outcome・network route。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: TrustBoundaryReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 信任边界引用正例
      en: trust boundary reference positive case
      ja: 信頼境界参照正例
    scenario_id: null
    descriptions:
      zh: trust_boundary_id=host-to-sandbox 指向主机进入沙箱时的信任边界。
      en: trust_boundary_id=host-to-sandbox points to the trust boundary crossed when entering the sandbox.
      ja: trust_boundary_id=host-to-sandbox は host から sandbox へ入る trust boundary を指します。
    field_values:
      reference_id: gov-ref-trust-boundary-host-to-sandbox
      reference_value: trust-boundary://host-to-sandbox
    related_node_ids:
      - TrustBoundaryReference
      - GovernanceReference
    related_relation_ids:
      - TrustBoundaryReference-is_a-GovernanceReference
    expected_result:
      zh: TrustBoundaryReference 保持其已审查身份，并按定义解释 TrustBoundaryReference-is_a-GovernanceReference。
      en: Retain the reviewed identity of TrustBoundaryReference and interpret TrustBoundaryReference-is_a-GovernanceReference exactly as defined.
      ja: TrustBoundaryReference の reviewed identity を保持し TrustBoundaryReference-is_a-GovernanceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用能解析安全域边界但不表示已经穿越。
      en: The reference resolves the safety boundary without asserting a crossing.
      ja: reference は safety boundary を解決するが crossing を主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-trust-boundary-reference-002
  - id: TrustBoundaryReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 信任边界引用实例
      en: trust boundary reference instance case
      ja: 信頼境界参照実例
    scenario_id: null
    descriptions:
      zh: 文件来源记录保存信任边界引用供后续访问策略检查。
      en: A file-source record stores the trust-boundary reference for later access-policy checks.
      ja: file-source record は後続 access-policy check のため trust-boundary reference を保存します。
    field_values:
      reference_id: gov-ref-trust-boundary-host-to-sandbox
      reference_value: trust-boundary://host-to-sandbox
    related_node_ids:
      - TrustBoundaryReference
      - GovernanceReference
    related_relation_ids:
      - TrustBoundaryReference-is_a-GovernanceReference
    expected_result:
      zh: TrustBoundaryReference 保持其已审查身份，并按定义解释 TrustBoundaryReference-is_a-GovernanceReference。
      en: Retain the reviewed identity of TrustBoundaryReference and interpret TrustBoundaryReference-is_a-GovernanceReference exactly as defined.
      ja: TrustBoundaryReference の reviewed identity を保持し TrustBoundaryReference-is_a-GovernanceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 信息记录只指出约束边界，检查由安全流程执行。
      en: The information record only identifies the constraining boundary; the safety workflow performs the check.
      ja: information record は constraining boundary を示すだけで safety workflow が check を実行します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-trust-boundary-reference-003
  - id: TrustBoundaryReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 信任边界引用边界例
      en: trust boundary reference boundary case
      ja: 信頼境界参照境界例
    scenario_id: null
    descriptions:
      zh: BoundaryCrossing 记录主体在 10:42 实际越过边界。
      en: A BoundaryCrossing records that a subject actually crossed at 10:42.
      ja: BoundaryCrossing は subject が 10:42 に実際に越境したことを記録します。
    field_values: {}
    related_node_ids:
      - TrustBoundaryReference
      - GovernanceReference
    related_relation_ids:
      - TrustBoundaryReference-is_a-GovernanceReference
    expected_result:
      zh: 不把该对象归入 TrustBoundaryReference，也不凭邻近或词形推断 TrustBoundaryReference-is_a-GovernanceReference。
      en: Do not classify the object as TrustBoundaryReference or infer TrustBoundaryReference-is_a-GovernanceReference from proximity or lexical form.
      ja: object を TrustBoundaryReference に分類せず proximity/lexical form から TrustBoundaryReference-is_a-GovernanceReference を推論しません。
    why_valid_or_invalid:
      zh: 这是事件而不是对边界对象的引用。
      en: This is an event, not a reference to the boundary object.
      ja: これは boundary object への reference ではなく event です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-trust-boundary-reference-004
