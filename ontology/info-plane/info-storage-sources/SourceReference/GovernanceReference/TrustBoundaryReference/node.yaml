schema: moonweave.ai/ontology-node/v1
id: TrustBoundaryReference
kind: concept
labels:
  zh: 信任边界引用
  en: trust boundary reference
  ja: 信頼境界参照
semantics:
  short_definition:
    zh: 指向 TrustBoundary 信任边界对象的引用特化。
    en: Governance reference specialized to a TrustBoundary object.
    ja: TrustBoundary object を指す reference 特化。
  definition:
    zh: TrustBoundaryReference 记录 trust_boundary_id，用于说明 citation 或 Attachment 来自 internal/external/ partner 边界哪一侧；不执行授权判定。
    en: TrustBoundaryReference records trust_boundary_id explaining whether citation or Attachment originates inside internal/external/partner boundary—it does not perform authorization.
    ja: TrustBoundaryReference は boundary locate。
  why_needed:
    zh: 引用信息有时必须指明由哪个信任边界约束，但信息模块不应复制安全域的 Boundary 实体或穿越事件。
    en: Source information sometimes must identify the trust boundary that constrains it, while the information module must not duplicate the safety domain's Boundary entity or crossing events.
    ja: source information は制約する trust boundary を示す必要がありますが information module は safety domain の Boundary entity/crossing event を複製すべきではありません。
  includes:
    - zh: 带 trust_boundary_id 并解析到安全域 TrustBoundary 的引用。
      en: References carrying trust_boundary_id and resolving to a safety-domain TrustBoundary.
      ja: trust_boundary_id を持ち safety-domain TrustBoundary に解決する参照。
  excludes:
    - zh: TrustBoundary 实体、边界穿越事件、授权结果和网络路由。
      en: The TrustBoundary entity, boundary-crossing events, authorization outcomes, and network routes.
      ja: TrustBoundary entity・boundary-crossing event・authorization outcome・network route。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 跨边界 MCP resource 引用可同时带 TrustBoundaryReference 与 FileResourceReference。
    en: Cross-boundary MCP resource references may carry both TrustBoundaryReference and FileResourceReference.
    ja: cross-boundary citation。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
