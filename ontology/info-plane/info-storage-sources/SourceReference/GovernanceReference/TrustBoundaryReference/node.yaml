  definitions:
    zh: 信任边界引用是一种治理对象引用，并以指向信任与策略执行范围发生变化的边界为种差。
    en: TrustBoundaryReference is a GovernanceReference specialized by pointing to a boundary where trust and policy-enforcement scope changes.
    ja: TrustBoundaryReference は trust/policy-enforcement scope が変化する boundary を指す GovernanceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
