sibling_differentiation:
  - sibling_concept_id: DataZoneReference
    shared_parent_concept_id: GovernanceReference
    differentia:
      zh: 信任边界引用依据“信任边界引用是治理对象引用的一类，种差是 referent 描述主体、资源或通信路径进入不同信任与执行范围的边界；它不是边界本体，也不是一次 BoundaryCrossing 事件。”归类；数据区引用依据“数据区引用是治理对象引用的一类，种差是 referent 按数据敏感度、驻留、保留或允许用途划定处置区域；引用不会复制 DataZone 的规则，也不等于数据记录属于该区的事实。”归类。二者共享 GovernanceReference，但任一端条件均不推出另一端。
      en: TrustBoundaryReference is classified by “TrustBoundaryReference is a GovernanceReference whose referent marks where subjects, resources, or communication paths enter a different trust and enforcement scope; it is neither the boundary entity itself nor a BoundaryCrossing event.” whereas DataZoneReference is classified by “DataZoneReference is a GovernanceReference whose referent partitions handling by data sensitivity, residency, retention, or allowed use; it neither copies DataZone rules nor equals the fact that a record belongs to that zone.”. They share GovernanceReference, but satisfying either condition leaves the other unproven.
      ja: TrustBoundaryReference は「TrustBoundaryReference は subject・resource・communication path が別 trust/enforcement scope に入る境界を指す GovernanceReference であり、boundary entity や BoundaryCrossing event ではありません。」で分類し、DataZoneReference は「DataZoneReference は data sensitivity・residency・retention・allowed use で handling を区分する DataZone への GovernanceReference であり、rule copy や record membership fact ではありません。」で分類します。両者は GovernanceReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-trust-boundary-reference-005
      - claim-trust-boundary-reference-006
