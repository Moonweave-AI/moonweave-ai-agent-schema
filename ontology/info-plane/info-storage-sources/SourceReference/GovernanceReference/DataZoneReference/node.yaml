    zh: 数据区引用是一种治理对象引用，并以指向敏感度、驻留、保留或允许用途的数据处置区为种差。
    en: DataZoneReference is a GovernanceReference specialized by pointing to a data-handling zone defined by sensitivity, residency, retention, or allowed use.
    ja: DataZoneReference は sensitivity・residency・retention・allowed use で定義する data-handling zone を指す GovernanceReference です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
