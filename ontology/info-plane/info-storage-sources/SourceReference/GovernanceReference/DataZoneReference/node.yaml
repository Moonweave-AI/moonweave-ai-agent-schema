schema: moonweave.ai/ontology-node/v1
id: DataZoneReference
kind: concept
status: review
labels:
  zh: 数据区引用
  en: data zone reference
  ja: データゾーン参照
semantics:
  short_definition:
    zh: 指向数据分类与处置区域的治理对象引用。
    en: A governance reference to a data-classification and handling zone.
    ja: data classification/handling zone への governance reference。
  definition:
    zh: 数据区引用是治理对象引用的一类，种差是 referent 按数据敏感度、驻留、保留或允许用途划定处置区域；引用不会复制 DataZone 的规则，也不等于数据记录属于该区的事实。
    en: DataZoneReference is a GovernanceReference whose referent partitions handling by data sensitivity, residency, retention, or allowed use; it neither copies DataZone rules nor equals the fact that a record belongs to that zone.
    ja: DataZoneReference は data sensitivity・residency・retention・allowed use で handling を区分する DataZone への GovernanceReference であり、rule copy や record membership fact ではありません。
  why_needed:
    zh: 来源可以引用数据区而不把安全域实体复制进信息模块；该区分还能避免把 DataZoneReference 当成普通 SourceReference 平级子类。
    en: A source can reference a data zone without copying the security-domain entity into the information module; this distinction also avoids treating DataZoneReference as a flat SourceReference subtype.
    ja: source は security-domain entity を information module に複製せず data zone を参照でき、DataZoneReference を flat SourceReference subtype とする誤りも防ぎます。
  includes:
    - zh: 含 data_zone_id 并明确指向 safety-trust-boundary 所有 DataZone 的引用。
      en: References carrying data_zone_id and explicitly pointing to the DataZone owned by safety-trust-boundary.
      ja: data_zone_id を持ち safety-trust-boundary 所有 DataZone を明示的に指す参照。
  excludes:
    - zh: DataZone 实体、来源属于数据区的断言、数据标签字段和一次策略决定。
      en: The DataZone entity, an assertion that a source belongs to a zone, data-label fields, and a policy decision.
      ja: DataZone entity・source-zone membership assertion・data-label field・policy decision。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DataZoneReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 数据区引用正例
      en: data zone reference positive case
      ja: データゾーン参照正例
    scenario_id: null
    descriptions:
      zh: data_zone_id=restricted-eu 指向限制在欧盟处置的数据区。
      en: data_zone_id=restricted-eu points to the zone governing restricted EU handling.
      ja: data_zone_id=restricted-eu は restricted EU handling を統治する zone を指します。
    field_values:
      reference_id: gov-ref-data-zone-restricted-eu
      reference_value: data-zone://restricted-eu
    related_node_ids:
      - DataZoneReference
      - GovernanceReference
    related_relation_ids:
      - DataZoneReference-is_a-GovernanceReference
    expected_result:
      zh: DataZoneReference 保持其已审查身份，并按定义解释 DataZoneReference-is_a-GovernanceReference。
      en: Retain the reviewed identity of DataZoneReference and interpret DataZoneReference-is_a-GovernanceReference exactly as defined.
      ja: DataZoneReference の reviewed identity を保持し DataZoneReference-is_a-GovernanceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 标识解析到明确 DataZone，规则仍由安全域拥有。
      en: The identifier resolves to a specific DataZone while the safety domain owns its rules.
      ja: identifier は specific DataZone に解決し rule は safety domain が所有します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-data-zone-reference-002
  - id: DataZoneReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 数据区引用实例
      en: data zone reference instance case
      ja: データゾーン参照実例
    scenario_id: null
    descriptions:
      zh: SourceReference 通过 governed_by 连接该 DataZoneReference。
      en: A SourceReference connects to this DataZoneReference through governed_by.
      ja: SourceReference は governed_by でこの DataZoneReference に接続します。
    field_values:
      reference_id: gov-ref-data-zone-restricted-eu
      reference_value: data-zone://restricted-eu
    related_node_ids:
      - DataZoneReference
      - GovernanceReference
    related_relation_ids:
      - DataZoneReference-is_a-GovernanceReference
    expected_result:
      zh: DataZoneReference 保持其已审查身份，并按定义解释 DataZoneReference-is_a-GovernanceReference。
      en: Retain the reviewed identity of DataZoneReference and interpret DataZoneReference-is_a-GovernanceReference exactly as defined.
      ja: DataZoneReference の reviewed identity を保持し DataZoneReference-is_a-GovernanceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用链表达治理指向而不复制区域定义。
      en: The reference chain expresses governance without copying the zone definition.
      ja: reference chain は zone definition を複製せず governance を表します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-data-zone-reference-003
  - id: DataZoneReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 数据区引用边界例
      en: data zone reference boundary case
      ja: データゾーン参照境界例
    scenario_id: null
    descriptions:
      zh: 字段 classification=restricted 只是数据标签，没有 data_zone_id。
      en: Field classification=restricted is only a data label and has no data_zone_id.
      ja: field classification=restricted は data label にすぎず data_zone_id がありません。
    field_values: {}
    related_node_ids:
      - DataZoneReference
      - GovernanceReference
    related_relation_ids:
      - DataZoneReference-is_a-GovernanceReference
    expected_result:
      zh: 不把该对象归入 DataZoneReference，也不凭邻近或词形推断 DataZoneReference-is_a-GovernanceReference。
      en: Do not classify the object as DataZoneReference or infer DataZoneReference-is_a-GovernanceReference from proximity or lexical form.
      ja: object を DataZoneReference に分類せず proximity/lexical form から DataZoneReference-is_a-GovernanceReference を推論しません。
    why_valid_or_invalid:
      zh: 标签不能独自解析到 DataZoneReference。
      en: A label alone cannot resolve a DataZoneReference.
      ja: label だけでは DataZoneReference を解決できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-data-zone-reference-004
