schema: moonweave.ai/ontology-node/v1
id: DataZoneReference
kind: concept
labels:
  zh: 数据区引用
  en: data zone reference
  ja: データゾーン参照
semantics:
  short_definition:
    zh: 指向 DataZone 数据治理区对象的引用特化。
    en: Governance reference specialized to a DataZone data-governance object.
    ja: DataZone governance object を指す reference 特化。
  definition:
    zh: DataZoneReference 记录 data_zone_id，说明后续资源引用处于哪一数据区管辖；不等于 zone 策略规则实例。
    en: DataZoneReference records data_zone_id indicating which data zone governs later resource references—not zone policy rule instances.
    ja: DataZoneReference は zone locate。
  why_needed:
    zh: 来源可以引用数据区而不把安全域实体复制进信息模块；该区分还能避免把 DataZoneReference 当成普通 SourceReference 平级子类。
    en: A source can reference a data zone without copying the security-domain entity into the information module; this distinction also avoids treating DataZoneReference as a flat SourceReference subtype.
    ja: source は security-domain entity を information module に複製せず data zone を参照でき、DataZoneReference を flat SourceReference subtype とする誤りも防ぎます。
  includes:
    - zh: 含 data_zone_id 并明确指向 safety-trust-boundary 所有 DataZone 的引用。
      en: References carrying data_zone_id and explicitly pointing to the DataZone owned by safety-trust-boundary.
      ja: data_zone_id を持ち safety-trust-boundary 所有 DataZone を明示的に指す参照。
  excludes:
    - zh: DataZone 实体、来源属于数据区的断言、数据标签字段和一次策略决定。
      en: The DataZone entity, an assertion that a source belongs to a zone, data-label fields, and a policy decision.
      ja: DataZone entity・source-zone membership assertion・data-label field・policy decision。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: customer export FileResourceReference 可链接 gov-ref-zone-pii-eu。
    en: Customer export FileResourceReference may link gov-ref-zone-pii-eu.
    ja: resource↔zone link。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
