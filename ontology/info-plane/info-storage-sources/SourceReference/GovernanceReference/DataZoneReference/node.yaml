relations:
  - id: DataZoneReference-refers_to-DataZone
    predicate: refers_to
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 指向数据区
      en: refers to data zone
      ja: データゾーンを参照する
    definitions:
      zh: 数据区引用指向数据区关系把信息域中的引用记录解析到安全域拥有的 DataZone 实体，同时保持两模块 owner 分离。
      en: DataZoneReference refers_to DataZone resolves the information-domain reference record to the DataZone entity owned by the safety domain while preserving module ownership separation.
      ja: DataZoneReference refers_to DataZone は information-domain reference record を safety domain 所有 DataZone entity に解決し module ownership を分離します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数取决于具体来源系统、版本策略和选择器策略。
      en: Cardinality depends on the concrete source system, version policy, and selector policy.
      ja: cardinality は concrete source system・version policy・selector policy に依存します。
    inverse_reading:
      predicate: is_target_of_refers_to
      labels:
        zh: 反向：指向数据区
        en: inverse of refers to data zone
        ja: 逆：データゾーンを参照する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DataZoneReference-refers_to-DataZone-example-positive-manual-001
        labels:
          zh: DataZoneReference-refers_to-DataZone正例
          en: DataZoneReference-refers_to-DataZone positive case
          ja: DataZoneReference-refers_to-DataZone正例
        descriptions:
          zh: data_zone_id=restricted-eu 精确解析到 DataZone restricted-eu。
          en: data_zone_id=restricted-eu resolves exactly to DataZone restricted-eu.
          ja: data_zone_id=restricted-eu は DataZone restricted-eu に正確解決します。
        field_values: {}
        related_node_ids:
          - DataZoneReference
          - DataZone
        related_relation_ids:
          - DataZoneReference-refers_to-DataZone
        source_claims:
          - claim-data-zone-reference-010
      - id: DataZoneReference-refers_to-DataZone-example-boundary-manual-001
        labels:
          zh: DataZoneReference-refers_to-DataZone边界例
          en: DataZoneReference-refers_to-DataZone boundary case
          ja: DataZoneReference-refers_to-DataZone境界例
        descriptions:
          zh: 标签 restricted 同时匹配多个数据区。
          en: Label restricted matches several data zones.
          ja: label restricted は複数 data zone に match します。
        field_values: {}
        related_node_ids:
