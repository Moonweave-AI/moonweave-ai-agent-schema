sibling_differentiation:
  - sibling_concept_id: ResourceReference
    shared_parent_concept_id: SourceReference
    differentia:
      zh: 治理对象引用依据“治理对象引用是来源引用的一类，种差是 referent 用于定义数据处置域、信任边界或类似治理范围；引用本身不执行策略判断，也不代表来源已经获准跨界。”归类；资源引用依据“资源引用是来源引用的一类，种差是 referent 作为完整资源存在并有自己的资源标识；文件、网络对象和逻辑文档都可作为资源，但行记录或治理分区不属于此类。”归类。二者共享 SourceReference，但任一端条件均不推出另一端。
      en: GovernanceReference is classified by “GovernanceReference is a SourceReference whose referent defines a data-handling zone, trust boundary, or comparable governance scope; the reference itself neither evaluates policy nor asserts that the source may cross the boundary.” whereas ResourceReference is classified by “ResourceReference is a SourceReference whose referent exists as a complete resource with its own resource identifier; files, network objects, and logical documents qualify, whereas row records and governance partitions do not.”. They share SourceReference, but satisfying either condition leaves the other unproven.
      ja: GovernanceReference は「GovernanceReference は data-handling zone・trust boundary・同等 governance scope を定義する referent への SourceReference であり、policy evaluation や cross-boundary authorization を表しません。」で分類し、ResourceReference は「ResourceReference は完全な resource として独自の識別子を持つ referent への SourceReference です。file・network object・logical document を含みますが、row record や governance partition は含みません。」で分類します。両者は SourceReference を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-governance-reference-005
      - claim-governance-reference-006
