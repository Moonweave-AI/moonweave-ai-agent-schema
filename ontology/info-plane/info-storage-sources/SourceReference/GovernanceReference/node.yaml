schema: moonweave.ai/ontology-node/v1
id: GovernanceReference
kind: concept
labels:
  zh: 治理对象引用
  en: governance reference
  ja: ガバナンス参照
semantics:
  short_definition:
    zh: 定位 TrustBoundary 或 DataZone 等治理对象的引用分类。
    en: Reference classification locating governance objects such as TrustBoundary or DataZone.
    ja: TrustBoundary/DataZone 等 governance object を locate する reference 分類。
  definition:
    zh: GovernanceReference 只定位治理对象，不复制 retention/access 规则；后续 FileResourceReference 可声明受某 DataZone 管辖。
    en: GovernanceReference locates governance objects only without copying retention/access rules; later FileResourceReference may declare governance under a DataZone.
    ja: GovernanceReference は locate のみ。
  why_needed:
    zh: 数据区和信任边界都属于治理对象而不是普通资源或记录；共享中间层可消除它们作为平根或直接来源子类的混乱。
    en: Data zones and trust boundaries are governance objects rather than ordinary resources or records; a shared intermediate genus removes their previous treatment as flat roots or direct source subtypes.
    ja: data zone と trust boundary は ordinary resource/record ではなく governance object であり、共通 genus が flat root や direct source subtype の混乱を解消します。
  includes:
    - zh: 指向数据分类区、信任边界或同类治理范围的稳定引用。
      en: Stable references to data-classification zones, trust boundaries, or comparable governance scopes.
      ja: data-classification zone・trust boundary・同等 governance scope への stable reference。
  excludes:
    - zh: 策略决定、访问授权、边界穿越事件以及普通文件或数据库记录引用。
      en: Policy decisions, access grants, boundary-crossing events, and ordinary file or database-record references.
      ja: policy decision・access grant・boundary-crossing event・ordinary file/database-record reference。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: gov-ref-zone-pii-eu→DataZone zone/pii-eu；TrustBoundaryReference 用于跨边界 citation 说明。
    en: gov-ref-zone-pii-eu→DataZone zone/pii-eu; TrustBoundaryReference explains cross-boundary citations.
    ja: governance locate。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
