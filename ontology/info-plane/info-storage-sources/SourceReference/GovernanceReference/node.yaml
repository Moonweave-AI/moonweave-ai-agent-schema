    supports: "NIST defines per-resource policy decisions and enforcement boundaries; Moonweave keeps a reference to such governance objects separate from decisions and crossings. This evidence supports the manually reviewed positive case for GovernanceReference: gov-ref-restricted-zone points to a restricted data zone but contains no admission decision."
    locator: NIST SP 800-207 §§2–3, Resource Access and Policy Enforcement
    evidence_kind: design-inference
    confidence: high
  - id: claim-governance-reference-003
    source: eng-network-nist-zero-trust
    supports: "NIST defines per-resource policy decisions and enforcement boundaries; Moonweave keeps a reference to such governance objects separate from decisions and crossings. This evidence supports the manually reviewed instance case for GovernanceReference: A source record labels its handling scope with a GovernanceReference that a policy service later reads."
    locator: NIST SP 800-207 §§2–3, Resource Access and Policy Enforcement
    evidence_kind: design-inference
    confidence: high
  - id: claim-governance-reference-004
    source: eng-network-nist-zero-trust
    supports: "NIST defines per-resource policy decisions and enforcement boundaries; Moonweave keeps a reference to such governance objects separate from decisions and crossings. This evidence supports the manually reviewed boundary case for GovernanceReference: PolicyDecision=deny is the adjudicated result for one request."
    locator: NIST SP 800-207 §§2–3, Resource Access and Policy Enforcement
    evidence_kind: design-inference
    confidence: high
  - id: claim-governance-reference-005
    source: eng-network-nist-zero-trust
    supports: NIST defines per-resource policy decisions and enforcement boundaries; Moonweave keeps a reference to such governance objects separate from decisions and crossings. This claim supports only the GovernanceReference endpoint of its sibling distinction.
    locator: NIST SP 800-207 §§2–3, Resource Access and Policy Enforcement
    evidence_kind: design-inference
    confidence: high
  - id: claim-governance-reference-006
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation model distinguishes a SpecificResource from the source resource that it represents more specifically; this supports a whole-resource reference genus. This claim supports only the ResourceReference endpoint of its sibling distinction.
    locator: §2 Web Annotation Principles and §4 Specific Resources, lines 177–186 and 742–765
    evidence_kind: design-inference
    confidence: high
  - id: claim-governance-reference-007
    source: eng-network-nist-zero-trust
    supports: "NIST separates resource access policy and enforcement roles; Moonweave references governance objects without copying decisions or events. This evidence supports the manually reviewed positive case for GovernanceReference-is_a-SourceReference: gov-ref-zone points to a restricted data-handling zone."
