schema: moonweave.ai/ontology-node/v1
id: GovernanceReference
kind: concept
status: review
labels:
  zh: 治理对象引用
  en: governance reference
  ja: ガバナンス参照
semantics:
  short_definition:
    zh: 指向政策治理分区或边界对象的来源引用。
    en: A source reference to a policy-governance partition or boundary object.
    ja: policy governance partition または boundary object への source reference。
  definition:
    zh: 治理对象引用是来源引用的一类，种差是 referent 用于定义数据处置域、信任边界或类似治理范围；引用本身不执行策略判断，也不代表来源已经获准跨界。
    en: GovernanceReference is a SourceReference whose referent defines a data-handling zone, trust boundary, or comparable governance scope; the reference itself neither evaluates policy nor asserts that the source may cross the boundary.
    ja: GovernanceReference は data-handling zone・trust boundary・同等 governance scope を定義する referent への SourceReference であり、policy evaluation や cross-boundary authorization を表しません。
  why_needed:
    zh: 数据区和信任边界都属于治理对象而不是普通资源或记录；共享中间层可消除它们作为平根或直接来源子类的混乱。
    en: Data zones and trust boundaries are governance objects rather than ordinary resources or records; a shared intermediate genus removes their previous treatment as flat roots or direct source subtypes.
    ja: data zone と trust boundary は ordinary resource/record ではなく governance object であり、共通 genus が flat root や direct source subtype の混乱を解消します。
  includes:
    - zh: 指向数据分类区、信任边界或同类治理范围的稳定引用。
      en: Stable references to data-classification zones, trust boundaries, or comparable governance scopes.
      ja: data-classification zone・trust boundary・同等 governance scope への stable reference。
  excludes:
    - zh: 策略决定、访问授权、边界穿越事件以及普通文件或数据库记录引用。
      en: Policy decisions, access grants, boundary-crossing events, and ordinary file or database-record references.
      ja: policy decision・access grant・boundary-crossing event・ordinary file/database-record reference。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: GovernanceReference-example-positive-manual-001
    kind: positive
    labels:
      zh: 治理对象引用正例
      en: governance reference positive case
      ja: ガバナンス参照正例
    scenario_id: null
    descriptions:
      zh: gov-ref-restricted-zone 指向限制数据区，但不包含一次准入决定。
      en: gov-ref-restricted-zone points to a restricted data zone but contains no admission decision.
      ja: gov-ref-restricted-zone は restricted data zone を指すが admission decision を含みません。
    field_values:
      reference_id: gov-ref-restricted-zone
      reference_value: governance://data-zone/restricted-zone
    related_node_ids:
      - GovernanceReference
      - SourceReference
    related_relation_ids:
      - GovernanceReference-is_a-SourceReference
    expected_result:
      zh: GovernanceReference 保持其已审查身份，并按定义解释 GovernanceReference-is_a-SourceReference。
      en: Retain the reviewed identity of GovernanceReference and interpret GovernanceReference-is_a-SourceReference exactly as defined.
      ja: GovernanceReference の reviewed identity を保持し GovernanceReference-is_a-SourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: referent 是治理范围，引用与策略执行分离。
      en: The referent is a governance scope and the reference is separate from policy execution.
      ja: referent は governance scope で reference は policy execution から分離します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-governance-reference-002
  - id: GovernanceReference-example-instance-manual-002
    kind: instance
    labels:
      zh: 治理对象引用实例
      en: governance reference instance case
      ja: ガバナンス参照実例
    scenario_id: null
    descriptions:
      zh: 来源记录以 GovernanceReference 标注其处置域，再由策略服务读取该引用。
      en: A source record labels its handling scope with a GovernanceReference that a policy service later reads.
      ja: source record は handling scope を GovernanceReference で示し policy service が後で読みます。
    field_values:
      reference_id: gov-ref-restricted-zone
      reference_value: governance://data-zone/restricted-zone
    related_node_ids:
      - GovernanceReference
      - SourceReference
    related_relation_ids:
      - GovernanceReference-is_a-SourceReference
    expected_result:
      zh: GovernanceReference 保持其已审查身份，并按定义解释 GovernanceReference-is_a-SourceReference。
      en: Retain the reviewed identity of GovernanceReference and interpret GovernanceReference-is_a-SourceReference exactly as defined.
      ja: GovernanceReference の reviewed identity を保持し GovernanceReference-is_a-SourceReference を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 引用负责定位治理对象，策略服务负责判定。
      en: The reference locates the governance object; the policy service makes the decision.
      ja: reference は governance object を locate し policy service が decision を担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-governance-reference-003
  - id: GovernanceReference-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 治理对象引用边界例
      en: governance reference boundary case
      ja: ガバナンス参照境界例
    scenario_id: null
    descriptions:
      zh: PolicyDecision=deny 是某次请求的判定结果。
      en: PolicyDecision=deny is the adjudicated result for one request.
      ja: PolicyDecision=deny は一 request の adjudicated result です。
    field_values: {}
    related_node_ids:
      - GovernanceReference
      - SourceReference
    related_relation_ids:
      - GovernanceReference-is_a-SourceReference
    expected_result:
      zh: 不把该对象归入 GovernanceReference，也不凭邻近或词形推断 GovernanceReference-is_a-SourceReference。
      en: Do not classify the object as GovernanceReference or infer GovernanceReference-is_a-SourceReference from proximity or lexical form.
      ja: object を GovernanceReference に分類せず proximity/lexical form から GovernanceReference-is_a-SourceReference を推論しません。
    why_valid_or_invalid:
      zh: 判定结果不是指向治理对象的引用。
      en: An adjudicated result is not a reference to a governance object.
      ja: adjudicated result は governance object への reference ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-governance-reference-004
