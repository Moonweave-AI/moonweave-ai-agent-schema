schema: moonweave.ai/ontology-node/v1
id: ResourceDescriptor
kind: concept
labels:
  zh: 资源描述记录
  en: resource descriptor
  ja: リソース記述記録
semantics:
  short_definition:
    zh: 描述被引用资源发现与读取元数据的附属记录。
    en: Auxiliary record describing discovery and read metadata of a referenced resource.
    ja: 参照 resource の discovery/read metadata を記述する附属 record。
  definition:
    zh: ResourceDescriptor 保存 title、description、mimeType 等 MCP resources/list 或 A2A FilePart 声明；辅助解析但不替代 resource_uri 身份。
    en: ResourceDescriptor stores title, description, mimeType from MCP resources/list or A2A FilePart declarations—auxiliary to parsing, not replacing resource_uri identity.
    ja: ResourceDescriptor は metadata adjunct。
  why_needed:
    zh: 描述元数据被多个模块复用，尤其是 DiscoverySurface；保留独立根并用 cross-link 连接引用，可避免把描述符伪装成 SourceReference 的组成分类。
    en: Descriptive metadata is reused by modules such as DiscoverySurface; retaining an independent root linked by a cross-link avoids pretending descriptors are a taxonomic or compositional kind of SourceReference.
    ja: descriptor metadata は DiscoverySurface など複数 module が再利用するため、independent root を cross-link し SourceReference の taxonomy/composition と偽装しません。
  includes:
    - zh: 具有 descriptor_id 且描述媒体类型、语言、标题或资源类别的记录。
      en: Records with descriptor_id describing media type, language, title, or resource category.
      ja: descriptor_id を持ち media type・language・title・resource category を記述する record。
  excludes:
    - zh: 来源引用身份、来源位置、访问动作、权威资源内容和无来源关联的 UI 文案。
      en: Source-reference identity, source location, access activity, authoritative resource content, and UI copy without a source association.
      ja: source-reference identity・source location・access activity・authoritative resource content・source association のない UI copy。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: MCP resources/list 返回 name、description、mimeType；resources/read 返回 contents[].mimeType。
    en: MCP resources/list returns name, description, mimeType; resources/read returns contents[].mimeType.
    ja: MCP list/read metadata。
  typical_input:
    - description: MCP resource descriptor
      format: '{"uri":"file:///workspace/docs/onboarding.md","name":"Onboarding","mimeType":"text/markdown"}'
      source_claims:
        - claim-resource-desc-mcp
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - descriptor_id
  fields:
    - id: descriptor_id
      labels:
        zh: 描述记录标识
        en: descriptor ID
        ja: 記述記録 ID
      definitions:
        zh: 稳定标识一次资源描述记录。
        en: Stably identifies one resource-description record.
        ja: 一 resource-description record を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: descriptor-runbook-v7
      allowed_values: []
      source_claims:
        - claim-resource-descriptor-002
    - id: media_type
      labels:
        zh: 媒体类型
        en: media type
        ja: メディアタイプ
      definitions:
        zh: 提示解释来源表示所需的媒体类型。
        en: Hints at the media type needed to interpret the source representation.
        ja: source representation 解釈に必要な media type を提示します。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: application/pdf
      allowed_values: []
      source_claims:
        - claim-resource-descriptor-003
    - id: language
      labels:
        zh: 内容语言
        en: content language
        ja: content language
      definitions:
        zh: 提示来源表示使用的自然语言；它不是访问权限或编程语言。
        en: Hints at the natural language of the source representation; it is neither access authority nor a programming language.
        ja: source representation の natural language を示し、access authority/programming language ではありません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: zh-CN
      allowed_values: []
      source_claims:
        - claim-resource-descriptor-004
    - id: title
      labels:
        zh: 显示标题
        en: display title
        ja: display title
      definitions:
        zh: 保存面向人员展示的标题；标题不参与来源对象或版本身份。
        en: Carries a human-facing display title; the title does not participate in source-object or version identity.
        ja: human-facing display title を保持し、source object/version identity には参加しません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Moonweave recovery runbook
      allowed_values: []
      source_claims:
        - claim-resource-descriptor-005
    - id: resource_category
      labels:
        zh: 资源类别
        en: resource category
        ja: resource category
      definitions:
        zh: 提供用于展示与发现的非权威类别，不替代 ResourceReference 的本体分类。
        en: Provides a non-authoritative category for display and discovery without replacing ResourceReference ontology classification.
        ja: display/discovery 用の non-authoritative category を提供し、ResourceReference ontology classification を置換しません。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: operations-runbook
      allowed_values: []
      source_claims:
        - claim-resource-descriptor-006
  constraints: []
  required_relations: []
examples:
  - id: ResourceDescriptor-example-mcp-list
    labels:
      zh: MCP list 元数据
      en: MCP list metadata
      ja: MCP list metadata
    descriptions:
      zh: resources/list 返回 onboarding.md mimeType=text/markdown。
      en: resources/list returns onboarding.md mimeType=text/markdown.
      ja: MCP list meta。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resources/list
    field_values: {}
    related_node_ids:
      - ResourceDescriptor
      - FileResourceReference
    related_relation_ids: []
    source_claims:
      - claim-resource-desc-mcp
  - id: ResourceDescriptor-example-a2a-mime
    labels:
      zh: A2A mimeType
      en: A2A mimeType
      ja: A2A mimeType
    descriptions:
      zh: FilePart mimeType=application/pdf 存入 ResourceDescriptor。
      en: FilePart mimeType=application/pdf stored in ResourceDescriptor.
      ja: A2A mime。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: FilePart
    field_values:
      mime_type: application/pdf
    related_node_ids:
      - ResourceDescriptor
    related_relation_ids: []
    source_claims:
      - claim-resource-desc-a2a
  - id: ResourceDescriptor-example-not-uri
    labels:
      zh: 非 URI 身份
      en: Not URI identity
      ja: URI identity ではない
    descriptions:
      zh: title/mimeType  alone 不能替代 resource_uri 作为 SourceReference 身份。
      en: title/mimeType alone cannot replace resource_uri as SourceReference identity.
      ja: uri 必須 for identity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ResourceDescriptor
    related_relation_ids: []
    source_claims:
      - claim-resource-desc-design
parent_relation:
  id: SourceReference-described_by-ResourceDescriptor
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 由资源描述记录说明
    en: described by resource descriptor
    ja: リソース記述で説明される
  definitions:
    zh: 来源引用由资源描述记录说明关系把引用连接到媒体类型、语言、标题或 provenance 等解释信息；描述信息不参与引用的稳定身份。
    en: SourceReference described_by ResourceDescriptor links a reference to interpretive information such as media type, language, title, or provenance; descriptor information does not participate in stable reference identity.
    ja: SourceReference described_by ResourceDescriptor は reference を media type・language・title・provenance など interpretive information に結び、descriptor information は stable reference identity に参加しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：由资源描述记录说明
      en: inverse of described by resource descriptor
      ja: 逆：リソース記述で説明される
  conditions:
    - id: SourceReference-described_by-ResourceDescriptor-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when the descriptor explicitly identifies the same referenced resource or canonical locator and records the descriptor version or observation time; a nearby title, page preview, or metadata record for another revision is insufficient.
      source_claims:
        - claim-resource-descriptor-010
      explanation:
        zh: 仅当描述记录明确标识同一个被引资源或 canonical locator，并记录描述版本或观测时间时成立；相邻标题、页面预览或属于另一修订版的元数据不足。
        en: Assert only when the descriptor explicitly identifies the same referenced resource or canonical locator and records the descriptor version or observation time; a nearby title, page preview, or metadata record for another revision is insufficient.
        ja: descriptor が同一 referenced resource または canonical locator を明示し、descriptor version または observation time を記録した場合だけ成立します。近接 title・page preview・別 revision の metadata は不十分です。
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-described_by-ResourceDescriptor-example-positive-manual-001
      labels:
        zh: SourceReference-described_by-ResourceDescriptor正例
        en: SourceReference-described_by-ResourceDescriptor positive case
        ja: SourceReference-described_by-ResourceDescriptor正例
      descriptions:
        zh: src-ref-42 连接声明 application/pdf 的 descriptor-runbook-v7。
        en: src-ref-42 links to descriptor-runbook-v7 declaring application/pdf.
        ja: src-ref-42 は application/pdf を宣言する descriptor-runbook-v7 に接続します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - ResourceDescriptor
      related_relation_ids:
        - SourceReference-described_by-ResourceDescriptor
      source_claims:
        - claim-resource-descriptor-011
    - id: SourceReference-described_by-ResourceDescriptor-example-boundary-manual-001
      labels:
        zh: SourceReference-described_by-ResourceDescriptor边界例
        en: SourceReference-described_by-ResourceDescriptor boundary case
        ja: SourceReference-described_by-ResourceDescriptor境界例
      descriptions:
        zh: 引用 URI 与媒体类型字符串同时出现在日志中。
        en: A reference URI and media-type string merely appear in the same log.
        ja: reference URI と media-type string が同じ log に現れるだけです。
      field_values: {}
      related_node_ids:
        - SourceReference
        - ResourceDescriptor
      related_relation_ids:
        - SourceReference-described_by-ResourceDescriptor
      source_claims:
        - claim-resource-descriptor-012
  source_claims:
    - claim-resource-descriptor-013
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
  - id: src-a2a-file
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: FilePart attachment provenance with uri or bytes.
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-resource-descriptor-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C permits format and language hints for external resources while stating that the external resource remains authoritative; ResourceDescriptor captures those hints.
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits format and language hints for external resources while stating that the external resource remains authoritative; ResourceDescriptor captures those hints. For ResourceDescriptor.descriptor_id, the field records this reviewed value: Stably identifies one resource-description record."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits format and language hints for external resources while stating that the external resource remains authoritative; ResourceDescriptor captures those hints. For ResourceDescriptor.media_type, the field records this reviewed value: Hints at the media type needed to interpret the source representation."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C permits language hints for external resources while leaving the resource authoritative.
    locator: §3.2.1 External Web Resources > language property
    evidence_kind: normative
    confidence: high
  - id: claim-resource-descriptor-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C permits descriptive information about external resources without replacing the resource. Moonweave records a display title as an optional local hint.
    locator: §3.2.1 External Web Resources > descriptive information
    evidence_kind: design-inference
    confidence: medium
  - id: claim-resource-descriptor-006
    source: eng-std-w3c-web-annotation-model
    supports: W3C separates descriptive metadata from the external resource itself. Moonweave treats resource_category as a non-authoritative descriptive hint.
    locator: §3.2 External Web Resources > descriptive properties
    evidence_kind: design-inference
    confidence: medium
  - id: claim-resource-descriptor-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits format and language hints for external resources while stating that the external resource remains authoritative; ResourceDescriptor captures those hints. This evidence supports the manually reviewed positive case for ResourceDescriptor: descriptor-runbook-v7 declares application/pdf and language=en and links to a document reference."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits format and language hints for external resources while stating that the external resource remains authoritative; ResourceDescriptor captures those hints. This evidence supports the manually reviewed instance case for ResourceDescriptor: A DiscoverySurface acts as a ResourceDescriptor for a query entry point without becoming a SourceReference."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits format and language hints for external resources while stating that the external resource remains authoritative; ResourceDescriptor captures those hints. This evidence supports the manually reviewed boundary case for ResourceDescriptor: reference_id=src-42 uniquely identifies the reference record rather than a resource-description observation."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-010
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation model distinguishes an External Web Resource identified by source from descriptive information and allows resource state/refinement. Moonweave's ResourceDescriptor identity and primary display are design inferences.
    locator: Web Annotation Data Model §3.2.1 External Web Resources; Resource state and refinement
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-011
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits descriptive hints for external resources while declaring the external resource authoritative; Moonweave keeps those hints in a cross-linked descriptor. This evidence supports the manually reviewed positive case for SourceReference-described_by-ResourceDescriptor: src-ref-42 links to descriptor-runbook-v7 declaring application/pdf."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-012
    source: eng-std-w3c-web-annotation-model
    supports: "W3C permits descriptive hints for external resources while declaring the external resource authoritative; Moonweave keeps those hints in a cross-linked descriptor. This evidence supports the manually reviewed boundary case for SourceReference-described_by-ResourceDescriptor: A reference URI and media-type string merely appear in the same log."
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-descriptor-013
    source: eng-std-w3c-web-annotation-model
    supports: W3C permits descriptive hints for external resources while declaring the external resource authoritative; Moonweave keeps those hints in a cross-linked descriptor.
    locator: §3.2.1 External Web Resources, lines 224–245
    evidence_kind: design-inference
    confidence: high
  - id: claim-resource-desc-mcp
    source: src-mcp-resources
    supports: MCP resources/list and read provide descriptor metadata separate from URI identity.
    locator: resources/list
    evidence_kind: primary-spec
    confidence: high
  - id: claim-resource-desc-a2a
    source: src-a2a-file
    supports: A2A FilePart name and mimeType are descriptor fields.
    locator: FilePart
    evidence_kind: primary-spec
    confidence: high
  - id: claim-resource-desc-design
    source: src-info-sources-design
    supports: ResourceDescriptor is auxiliary metadata not reference identity.
    locator: ResourceDescriptor
    evidence_kind: design-inference
    confidence: high
