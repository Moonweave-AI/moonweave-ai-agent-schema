parent_relation:
  id: SourcePageRange-is_a-SourceLocation
  predicate: is_a
  target: concept:SourceLocation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是来源连续范围的一种
    en: Is a rendered-page source location
    ja: ソース連続範囲の一種である
  definitions:
    zh: SourcePageRange 是直接的 SourceLocation 子类，保留来源和表示绑定，并以同一渲染页序列中的页面位置记录有序、排他终止的端点。
    en: SourcePageRange retains required SourceLocation source and representation bindings and adds an explicit rendered-page coordinate profile with ordered exclusive-end page positions.
    ja: SourcePageRange は直接の SourceLocation 下位型であり、ソース及び表現の結び付きを保持し、同じレンダリング済みページ列内のページ位置で順序付き排他的終了端点を記録する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有页范围子类型
      en: Has source-page-range subtype
      ja: ソースページ範囲下位型を持つ
  conditions:
    - A page range must retain SourceLocation source and representation bindings; representation_ref must equal rendered_representation_ref; it must declare location_kind range, coordinate_system rendered-page-position, and one rendered page sequence.
  temporal_scope: valid-time
  boundary_context: Direct SourceLocation profile for a concrete rendering; W3C Web Annotation supports source-bound selectors but does not define a universal page-range selector, and a page position is not an offset.
  constraints:
    - id: source-page-range-subtype-narrowing
      expression: SourcePageRange must satisfy SourceLocation bindings and ordered exclusive-end interval semantics while representing endpoints as positions in one rendered page sequence; it cannot assert an abstract-work page identity, byte/character offset, line range, or payload.
      explanation:
        zh: 该子类型将连续范围限定为渲染页位置，同时完整保留父类型的来源、表示和端点语义。
        en: This direct SourceLocation subtype records rendered page positions while retaining source and representation bindings without falsely inheriting byte- or character-offset fields.
        ja: この下位型は連続範囲をレンダリング済みページ位置へ制限しつつ、親型のソース、表現、端点意味論を保持する。
  examples: []
  source_claims:
    - claim-w3c-specific-resource
    - claim-local-page-range-projection
  distinct_fact_rationale:
    zh: 该关系是真实分类，因为每个页范围都是一个绑定到同一表示的有序一维连续范围，只额外限定坐标为渲染页位置。
    en: This is genuine classification because every page range is a representation-bound source location with ordered page endpoints, while its coordinate model is rendered-page position rather than a byte or character-offset range.
    ja: これは真正な分類である。全てのページ範囲が一つの表現に結び付く順序付き一次元連続範囲であり、座標をレンダリング済みページ位置へ追加制限するだけである。
  layout_role: primary-backbone
relations: []
sources:
  - id: w3c-web-annotation
    title: W3C Web Annotation Data Model
    url: https://www.w3.org/TR/annotation-model/
    source_type: official-standard
    relevance: Defines a Specific Resource selected from a source and establishes a representation-bound selector model used here as design context.
  - id: pdf-association-pdf2
    title: PDF Association ISO 32000-2 resource
    url: https://pdfa.org/resource/iso-32000-2/
    source_type: industry-organization
    relevance: Provides general PDF 2.0 context for paginated renderings; it does not define a universal page-range selector or stable page locator.
source_claims:
  - id: claim-w3c-specific-resource
    source: w3c-web-annotation
    supports: W3C Web Annotation models a specific resource as selected from a source.
    locator: Section 4 Specific Resources
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-page-range-projection
    source: w3c-web-annotation
    supports: Page positions, one-based display labels, rendered-page-sequence basis, reflow invalidation, and the JSON record shape are local ontology design choices; no cited source is asserted to define a universal page-range selector.
    locator: Section 4
    evidence_kind: design-inference
    confidence: high
  - id: claim-pdfa-iso-32000-2-resource
    source: pdf-association-pdf2
    supports: The PDF Association resource identifies ISO 32000-2 as PDF 2.0 context for a captured PDF rendering; it does not establish page numbers as stable universal locators.
    locator: PDF Association resource page “ISO 32000-2”
    evidence_kind: industry-organization
    confidence: high

