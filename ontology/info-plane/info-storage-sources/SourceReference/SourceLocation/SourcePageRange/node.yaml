schema: moonweave.ai/ontology-node/v1
id: SourcePageRange
kind: concept
status: accepted
labels:
  zh: 来源页范围
  en: Source Page Range
  ja: ソースページ範囲
semantics:
  short_definition:
    zh: 在一个特定渲染表示中由有序页位置界定的连续页面区间。
    en: A continuous page interval with ordered page positions in one specific rendered representation.
    ja: 一つの特定レンダリング表現内で、順序付きページ位置により区切る連続ページ区間。
  definition:
    zh: 来源页范围是 SourceLocation 的直接子类，以来源位置标识、来源引用、渲染表示证据引用、明确的范围种类、渲染页坐标体系、起始页位置、排他终止页位置、展示页号基准和渲染页序列基准记录连续页面选择。页位置指向同一已捕获渲染结果中的页面顺序，而不是抽象作品的固有属性；它不是 PDF 字节区间、印刷页码文本、行范围、视觉截图载荷或跨渲染稳定的永久定位。
    en: SourcePageRange is a direct subtype of SourceLocation that records a consecutive page selection through a source-location identifier, source reference, rendered-representation evidence reference, explicit range kind, rendered-page coordinate system, start page position, exclusive end page position, display page-number base, and rendered-page-sequence basis. Its page positions address order in the same captured rendering rather than an intrinsic property of an abstract work; they are not byte or character offsets.
    ja: ソースページ範囲は SourceLocation の直接下位型であり、ソース位置識別子、ソース参照、レンダリング表現証拠参照、明示的な範囲種別、レンダリング済みページ座標系、開始ページ位置、排他的終了ページ位置、表示ページ番号基準、レンダリング済みページ列基準により連続ページ選択を記録する。ページ位置は抽象作品に固有の性質ではなく、同じ捕捉レンダリング内の順序を指定する。PDF バイト区間、印刷ページ番号テキスト、行範囲、視覚スクリーンショット本文、又はレンダリングをまたいで恒久的に安定する位置ではない。
  why_needed:
    zh: 读者通常以页来审阅文档，但分页会因版式、纸张、字体、设备或修订而改变。将页区间绑定到渲染表示可支持审阅，同时避免把页面位置误当作来源本身的永久身份。
    en: Readers commonly review documents by page, but pagination can change with layout, paper, font, device, or revision. Binding a page interval to a rendered representation supports review while avoiding treatment of page position as a permanent identity of the source itself.
    ja: 読者は文書をページでレビューすることが多いが、ページ分割はレイアウト、用紙、フォント、装置、又は改訂で変化し得る。ページ区間をレンダリング表現に結び付けるとレビューを支援しつつ、ページ位置をソース自体の恒久的識別として扱うことを避けられる。
  includes:
    - zh: 已捕获 PDF、印刷预览或其他分页渲染中的连续页面位置区间。
      en: Consecutive page-position intervals in captured PDF, print-preview, or other paginated renderings.
      ja: 捕捉済み PDF、印刷プレビュー、又は他のページ化レンダリング内の連続ページ位置区間。
  excludes:
    - zh: 未绑定渲染的页码、封面印刷字符、物理纸张、页图像内容、文字行范围和语义引文。
      en: Page numbers without a bound rendering, cover-page printed characters, physical paper, page-image content, text line ranges, and semantic quotations.
      ja: 結び付いたレンダリングのないページ番号、表紙に印刷された文字、物理的な紙、ページ画像内容、テキスト行範囲、及び意味的引用。
  semantic_kind: information
  aliases:
    - rendered-page-range
    - page-position-range
engineering:
  explanation:
    zh: 渲染器或摄取器先捕获分页输出及其摘要，再以 one-based display labels 映射到零基连续页位置，并保存 start_page 与 end_page_exclusive。验证器必须确认两个页位置来自同一渲染表示和页序列；当模板、字体、渲染器、文档版本或摘要变化时，旧范围必须重新解析，且节点不得嵌入页面图像。
    en: A renderer or ingestor captures paginated output and its digest before mapping one-based display labels to zero-based continuous page positions and saving start_page and end_page_exclusive. A validator must confirm that both page positions come from the same rendered representation and page sequence; when template, font, renderer, document version, or digest changes, the old range must be re-resolved, and the node must not embed page images.
    ja: レンダラー又は取込み側はページ化出力とそのダイジェストを捕捉してから、一始まり表示ラベルを零始まり連続ページ位置へ写像し、start_page と end_page_exclusive を保存する。検証器は両ページ位置が同じレンダリング表現とページ列から来ることを確認しなければならない。テンプレート、フォント、レンダラー、文書版、又はダイジェストが変われば古い範囲を再解決し、ノードにページ画像を埋め込んではならない。
  typical_input:
    - description:
        zh: 绑定捕获 PDF 渲染的第 12 至第 14 个展示页范围。
        en: Display pages 12 through 14 in a captured PDF rendering.
        ja: 捕捉済み PDF レンダリングの表示ページ 12 から 14。
      format: '{"source_location_id":"loc-page-001","source_reference_ref":"src-ref-report-1","representation_ref":"captured-report-pdf-1","rendered_representation_ref":"captured-report-pdf-1","location_kind":"range","coordinate_system":"rendered-page-position","start_page":12,"end_page_exclusive":15,"page_number_base":"one-based-display","page_sequence_basis":"rendered-page-sequence"}'
      source_claims:
        - claim-w3c-specific-resource
        - claim-local-page-range-projection
  typical_output:
    - description:
        zh: 可在同一渲染中复核的连续页位置，而非页面图像。
        en: Consecutive page positions reviewable in the same rendering rather than page images.
        ja: ページ画像ではなく、同じレンダリングでレビュー可能な連続ページ位置。
      format: '{"resolution_state":"matched","start_page":12,"end_page_exclusive":15,"rendered_representation_ref":"captured-report-pdf-1"}'
      source_claims:
        - claim-local-page-range-projection
  reference_implementations:
    - name: W3C Web Annotation Data Model
      url: https://www.w3.org/TR/annotation-model/
      description: Defines a Specific Resource selected from a source and provides a general selector model that can be bound to a concrete representation.
    - name: PDF Association ISO 32000-2 resource
      url: https://pdfa.org/resource/iso-32000-2/
      description: Identifies the PDF Association resource page for ISO 32000-2 and provides general PDF 2.0 context; page-position projection in this node remains a local ontology design.
structure:
  identity_keys:
    - source_location_id
  fields:
    - id: source_location_id
      labels:
        zh: 来源位置标识
        en: Source-location identifier
        ja: ソース位置識別子
      definitions:
        zh: 本地系统为一次页范围记录分配的不可复用标识。
        en: Nonreusable identifier assigned by the local system to one page-range record.
        ja: 一つのページ範囲記録にローカルシステムが割り当てる再利用しない識別子。
      datatype: identifier
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^loc-page-[A-Za-z0-9._~-]+$'
      example_value: loc-page-001
      allowed_values: []
      source_claims:
        - claim-local-page-range-projection
    - id: source_reference_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: ソース参照
      definitions:
        zh: 此页范围所依附的 SourceReference 的必需本地引用。
        en: Required local reference to the SourceReference to which this page range is attached.
        ja: このページ範囲が付属する SourceReference への必須ローカル参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: src-ref-report-1
      allowed_values: []
      source_claims:
        - claim-local-page-range-projection
    - id: rendered_representation_ref
      labels:
        zh: 渲染表示证据引用
        en: Rendered-representation evidence reference
        ja: レンダリング表現証拠参照
      definitions:
        zh: 指向产生该页序列的已捕获分页渲染或等效表示证据的必需引用。
        en: Required reference to the captured paginated rendering or equivalent representation evidence that produced this page sequence.
        ja: このページ列を生成した捕捉済みページ化レンダリング又は同等の表現証拠への必須参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: captured-report-pdf-1
      allowed_values: []
      source_claims:
        - claim-w3c-specific-resource
        - claim-local-page-range-projection
    - id: representation_ref
      labels:
        zh: 表示证据引用
        en: Representation evidence reference
        ja: 表現証拠参照
      definitions:
        zh: 继承自 SourceLocation 的表示证据引用；在本节点中必须与 rendered_representation_ref 相等，从而明确页位置属于该一次已捕获渲染。
        en: Representation-evidence reference inherited from SourceLocation. It must equal rendered_representation_ref in this node, making explicit that page positions belong to that one captured rendering.
        ja: SourceLocation から継承する表現証拠参照。このノードでは rendered_representation_ref と等しくなければならず、ページ位置がその一つの取得済みレンダリングに属することを明示する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: captured-report-pdf-1
      allowed_values: []
      source_claims:
        - claim-w3c-specific-resource
        - claim-local-page-range-projection
    - id: location_kind
      labels:
        zh: 位置种类
        en: Location kind
        ja: 位置種別
      definitions:
        zh: 继承自 SourceLocation 的位置种类；本节点固定为 range，表示起止页位置共同界定一个连续页区间。
        en: Location kind inherited from SourceLocation. It is fixed to range here because the start and end page positions delimit one continuous page interval.
        ja: SourceLocation から継承する位置種別。このノードでは range に固定され、開始と終了のページ位置が一つの連続ページ区間を区切る。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: range
      allowed_values:
        - range
      source_claims:
        - claim-local-page-range-projection
    - id: coordinate_system
      labels:
        zh: 坐标体系
        en: Coordinate system
        ja: 座標系
      definitions:
        zh: 继承自 SourceLocation 的坐标体系；本节点以本地标记 rendered-page-position 表示绑定渲染页序列中的读者可见页位置，不声称存在通用页面选择器标准。
        en: Coordinate system inherited from SourceLocation. The local marker rendered-page-position denotes reader-visible positions in the bound rendered page sequence; it does not claim a universal page-selector standard.
        ja: SourceLocation から継承する座標系。ローカルの rendered-page-position は束縛したレンダリング済みページ列で読者に見えるページ位置を示し、汎用ページセレクター標準を主張しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rendered-page-position
      allowed_values:
        - rendered-page-position
      source_claims:
        - claim-local-page-range-projection
    - id: start_page
      labels:
        zh: 起始页位置
        en: Start page position
        ja: 開始ページ位置
      definitions:
        zh: 在已绑定渲染页序列中按声明基准计数的包含性起始页位置。
        en: Inclusive start page position counted under the declared base in the bound rendered page sequence.
        ja: 結び付いたレンダリング済みページ列で宣言済み基準に従って数える包含的開始ページ位置。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[1-9][0-9]*$'
      example_value: 12
      allowed_values: []
      source_claims:
        - claim-local-page-range-projection
    - id: end_page_exclusive
      labels:
        zh: 排他终止页位置
        en: Exclusive end page position
        ja: 排他的終了ページ位置
      definitions:
        zh: 在同一渲染页序列中按声明基准计数的范围外页位置，不属于所选页面。
        en: Outside page position counted under the declared base in the same rendered page sequence that does not belong to the selected pages.
        ja: 同じレンダリング済みページ列で宣言済み基準に従って数える、選択ページに属さない範囲外ページ位置。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[1-9][0-9]*$'
      example_value: 15
      allowed_values: []
      source_claims:
        - claim-local-page-range-projection
    - id: page_number_base
      labels:
        zh: 展示页号基准
        en: Display page-number base
        ja: 表示ページ番号基準
      definitions:
        zh: 声明记录使用面向读者的从一开始页面位置，并与渲染器内部页索引区分。
        en: Declares that the record uses reader-facing one-based page positions and distinguishes them from a renderer's internal page index.
        ja: この記録が読者向けの一始まりページ位置を使用し、レンダラー内部のページ索引と区別することを宣言する。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: one-based-display
      allowed_values:
        - one-based-display
      source_claims:
        - claim-local-page-range-projection
    - id: page_sequence_basis
      labels:
        zh: 页序列基准
        en: Page-sequence basis
        ja: ページ列基準
      definitions:
        zh: 声明页位置来自一个已捕获的渲染页序列，而非抽象作品或物理纸张。
        en: Declares that page positions come from one captured rendered page sequence rather than an abstract work or physical paper.
        ja: ページ位置が抽象作品又は物理的な紙ではなく、一つの捕捉済みレンダリングページ列から来ることを宣言する。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rendered-page-sequence
      allowed_values:
        - rendered-page-sequence
      source_claims:
        - claim-local-page-range-projection
  constraints:
    - id: source-page-range-rendered-ordered-pages
      severity: error
      expression_language: plain
      expression: source_location_id must be unique; source_reference_ref, representation_ref, and rendered_representation_ref must resolve; representation_ref must equal rendered_representation_ref; location_kind must be range; coordinate_system must be rendered-page-position; start_page and end_page_exclusive must be positive integers with start_page less than or equal to end_page_exclusive; page_number_base must be one-based-display; page_sequence_basis must be rendered-page-sequence; both endpoints must be re-resolved after any rendering or representation change; no page image or source payload may be stored.
      explanation:
        zh: 页面位置依赖同一个已捕获渲染及其页序列，不能由来源标识或印刷文本单独推断。
        en: Page positions depend on the same captured rendering and page sequence and cannot be inferred from source identity or printed text alone.
        ja: ページ位置は同じ捕捉レンダリングとページ列に依存し、ソース識別又は印刷テキストだけから推論できない。
      source_claims:
        - claim-w3c-specific-resource
        - claim-pdfa-iso-32000-2-resource
        - claim-local-page-range-projection
  required_relations: []
