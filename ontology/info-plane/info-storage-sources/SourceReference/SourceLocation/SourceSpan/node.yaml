schema: moonweave.ai/ontology-node/v1
id: SourceSpan
kind: concept
status: accepted
labels:
  zh: 来源文本跨度
  en: Source Span
  ja: ソーステキストスパン
semantics:
  short_definition:
    zh: 在一个绑定文本表示中由零基行和字符位置对界定、终点排他的连续文本范围。
    en: A continuous text range in a bound representation delimited by zero-based line-and-character position pairs with an exclusive end.
    ja: 結び付いたテキスト表現内で、零始まりの行と文字位置対により区切り、終了点を排他的にする連続テキスト範囲。
  definition:
    zh: 来源文本范围是 SourceLocation 的直接子类，以来源位置标识、来源引用、文本表示证据引用、明确的范围种类、LSP 位置坐标体系、零基起始行与字符、零基终止行与字符以及协商的位置编码记录一个按字典序有序的文本范围。它采用 LSP Range 的起点包含、终点排他语义，但只在明确声明相同文本表示和位置编码时适用；它不是像素矩形、单点光标、未协商编码的视觉列号、编辑操作或正文载荷。
    en: SourceSpan is a direct subtype of SourceLocation that records one lexicographically ordered text range through a source-location identifier, source reference, text-representation evidence reference, explicit range kind, LSP position coordinate system, zero-based start line and character, zero-based end line and character, and a negotiated position encoding. It adopts LSP Range start-inclusive end-exclusive semantics, but is not an offset range because a line-and-character pair cannot honestly be represented as one byte or character offset without a conversion record.
    ja: ソーステキストスパンは SourceLocation の直接下位型であり、ソース位置識別子、ソース参照、テキスト表現証拠参照、明示的な範囲種別、LSP 位置座標系、零始まりの開始行と文字、零始まりの終了行と文字、協調された位置符号化により、一つの辞書順で順序付けられたテキスト範囲を記録する。LSP Range の開始包含、終了排他の意味論を採用するが、同じテキスト表現と位置符号化が明示される場合にのみ適用する。ピクセル矩形、単一点カーソル、協調されていない符号化での視覚列番号、編集操作、又は本文ではない。
  why_needed:
    zh: 代码、标记和结构化文本工具常以行与字符坐标交换位置。把编码协商和表示证据保留下来，才能防止 Unicode 代理对、换行处理或客户端编码差异让同一数字对指向不同字符。
    en: Code, markup, and structured-text tools commonly exchange locations as line-and-character coordinates. Retaining encoding negotiation and representation evidence prevents Unicode surrogate pairs, line-ending treatment, or client encoding differences from making the same number pair point at different characters.
    ja: コード、マークアップ、構造化テキストのツールは、位置を行と文字座標として交換することが多い。符号化協調と表現証拠を保持すると、Unicode サロゲート対、行終端処理、又はクライアント符号化の差異により同じ数値対が異なる文字を指すことを防げる。
  includes:
    - zh: 同一 LSP 风格文本表示中、具有一个已协商字符偏移编码的多行或单行连续文本范围。
      en: Single-line or multi-line continuous text ranges in one LSP-style text representation with one negotiated character-offset encoding.
      ja: 一つの協調済み文字オフセット符号化を持つ、同じ LSP 形式テキスト表現内の単一行又は複数行の連続テキスト範囲。
  excludes:
    - zh: 屏幕像素区域、无结束位置的光标、用户界面选区状态、编辑指令、未绑定表示的 Git 行链接和字符串正文。
      en: Screen-pixel regions, cursors without an end position, user-interface selection state, edit instructions, Git line links without bound representation, and string payload.
      ja: 画面ピクセル領域、終了位置のないカーソル、ユーザーインターフェース選択状態、編集指令、結び付いた表現のない Git 行リンク、及び文字列本文。
  semantic_kind: information
  aliases:
    - lsp-range
    - text-span
engineering:
  explanation:
    zh: 适配器从一次捕获的文本表示和 LSP 会话中记录 start_line、start_character、end_line、end_character 与 position_encoding。验证器按行优先、字符次序比较端点，要求所有值非负且使用同一已协商编码；文本版本、编码协商或换行规范化变化后，它必须返回 unresolved 或重新解析，不能把当前编辑器选区当作永久事实。
    en: An adapter records start_line, start_character, end_line, end_character, and position_encoding from one captured text representation and LSP session. A validator compares endpoints by line first and character second, requires all values to be nonnegative and use the same negotiated encoding, and must return unresolved or re-resolve after text version, encoding negotiation, or line-ending normalization changes; it cannot treat a current editor selection as permanent fact.
    ja: アダプターは一つの捕捉テキスト表現と LSP セッションから start_line、start_character、end_line、end_character、position_encoding を記録する。検証器は行を先、文字を次にして端点を比較し、全値が非負で同じ協調済み符号化を使用することを要求する。テキスト版、符号化協調、又は行終端正規化が変わった後は unresolved を返すか再解決しなければならず、現在のエディター選択を恒久的事実として扱えない。
  typical_input:
    - description:
        zh: 已协商 UTF-16 的 LSP 样式文本范围。
        en: LSP-style text range with negotiated UTF-16 positions.
        ja: 協調済み UTF-16 位置を持つ LSP 形式テキスト範囲。
      format: '{"source_location_id":"loc-span-001","source_reference_ref":"src-ref-code-1","representation_ref":"captured-code-v1-1","location_kind":"range","coordinate_system":"lsp-position:utf-16","start_line":5,"start_character":23,"end_line":6,"end_character":0,"position_encoding":"utf-16"}'
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
  typical_output:
    - description:
        zh: 在同一文本表示和编码下可复核的排他终点跨度。
        en: An exclusive-end span reviewable under the same text representation and encoding.
        ja: 同じテキスト表現と符号化の下でレビュー可能な排他的終了スパン。
      format: '{"resolution_state":"matched","start":{"line":5,"character":23},"end":{"line":6,"character":0},"position_encoding":"utf-16"}'
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
  reference_implementations:
    - name: Language Server Protocol specification
      url: https://microsoft.github.io/language-server-protocol/specifications/lsp/3.17/specification/
      description: Defines zero-based Position values, negotiated position encodings, and Range values whose end position is exclusive.
    - name: Visual Studio Code Language Server Extension Guide
      url: https://code.visualstudio.com/api/language-extensions/language-server-extension-guide
      description: Documents a real editor integration that uses Language Server Protocol requests and locations.
structure:
  identity_keys:
    - source_location_id
  fields:
    - id: source_location_id
      labels:
        zh: 来源位置标识
        en: Source-location identifier
        ja: ソース位置識別子
      definitions:
        zh: 本地系统为一次文本跨度记录分配的不可复用标识。
        en: Nonreusable identifier assigned by the local system to one text-span record.
        ja: 一つのテキストスパン記録にローカルシステムが割り当てる再利用しない識別子。
      datatype: identifier
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^loc-span-[A-Za-z0-9._~-]+$'
      example_value: loc-span-001
      allowed_values: []
      source_claims:
        - claim-local-span-projection
    - id: source_reference_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: ソース参照
      definitions:
        zh: 此文本跨度所依附的 SourceReference 的必需本地引用。
        en: Required local reference to the SourceReference to which this text span is attached.
        ja: このテキストスパンが付属する SourceReference への必須ローカル参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: src-ref-code-1
      allowed_values: []
      source_claims:
        - claim-local-span-projection
    - id: representation_ref
      labels:
        zh: 文本表示证据引用
        en: Text-representation evidence reference
        ja: テキスト表現証拠参照
      definitions:
        zh: 指向计算此行和字符位置的已捕获文本表示或等效证据的必需引用。
        en: Required reference to the captured text representation or equivalent evidence used to calculate these line and character positions.
        ja: これらの行と文字位置を計算する捕捉済みテキスト表現又は同等の証拠への必須参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: captured-code-v1-1
      allowed_values: []
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: location_kind
      labels:
        zh: 位置种类
        en: Location kind
        ja: 位置種別
      definitions:
        zh: 继承自 SourceLocation 的位置种类；本节点固定为 range，表示起点与终点 LSP Position 共同界定连续文本区间。
        en: Location kind inherited from SourceLocation. It is fixed to range here because start and end LSP Positions delimit one continuous text interval.
        ja: SourceLocation から継承する位置種別。このノードでは range に固定され、開始と終了の LSP Position が一つの連続テキスト区間を区切る。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: range
      allowed_values:
        - range
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: coordinate_system
      labels:
        zh: 坐标体系
        en: Coordinate system
        ja: 座標系
      definitions:
        zh: 继承自 SourceLocation 的坐标体系；本受限配置使用本地标记 lsp-position:utf-16，表示 LSP Position 的行/字符对并明确 UTF-16 协商编码，而非屏幕列或字节偏移。
        en: Coordinate system inherited from SourceLocation. This constrained profile uses the local marker lsp-position:utf-16 for LSP Position line-and-character pairs under explicitly negotiated UTF-16, not screen columns or byte offsets.
        ja: SourceLocation から継承する座標系。この制約付きプロファイルはローカルの lsp-position:utf-16 マーカーを用い、明示的にネゴシエートされた UTF-16 下の LSP Position 行・文字対を示す。画面列又はバイトオフセットではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: lsp-position:utf-16
      allowed_values:
        - lsp-position:utf-16
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: start_line
      labels:
        zh: 起始行位置
        en: Start line position
        ja: 開始行位置
      definitions:
        zh: 从零开始计数的包含性范围起始行。
        en: Zero-based line containing the inclusive start of the range.
        ja: 範囲の包含的開始を含む零始まり行。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]+$'
      example_value: 5
      allowed_values: []
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: start_character
      labels:
        zh: 起始字符位置
        en: Start character position
        ja: 開始文字位置
      definitions:
        zh: 在起始行中按 position_encoding 解释、从零开始计数的包含性字符边界。
        en: Zero-based inclusive character boundary on start_line interpreted under position_encoding.
        ja: position_encoding の下で解釈する、start_line 上の零始まり包含的文字境界。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]+$'
      example_value: 23
      allowed_values: []
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: end_line
      labels:
        zh: 终止行位置
        en: End line position
        ja: 終了行位置
      definitions:
        zh: 从零开始计数、包含排他终止字符边界的行。
        en: Zero-based line containing the exclusive end character boundary.
        ja: 排他的終了文字境界を含む零始まり行。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]+$'
      example_value: 6
      allowed_values: []
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: end_character
      labels:
        zh: 排他终止字符位置
        en: Exclusive end character position
        ja: 排他的終了文字位置
      definitions:
        zh: 在终止行中按 position_encoding 解释、从零开始计数且不属于跨度的字符边界。
        en: Zero-based character boundary on end_line interpreted under position_encoding that does not belong to the span.
        ja: position_encoding の下で解釈する、end_line 上の零始まり文字境界であり、スパンには属さない。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]+$'
      example_value: 0
      allowed_values: []
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
    - id: position_encoding
      labels:
        zh: 位置编码
        en: Position encoding
        ja: 位置符号化
      definitions:
        zh: 声明行内字符偏移的协商解释方式；此受限节点只接受已明确协商的 UTF-16。
        en: Declares the negotiated interpretation of in-line character offsets; this constrained node accepts only explicitly negotiated UTF-16.
        ja: 行内文字オフセットの協調済み解釈を宣言する。この制約付きノードは明示的に協調された UTF-16 だけを受け入れる。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: utf-16
      allowed_values:
        - utf-16
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
  constraints:
    - id: source-span-lsp-ordered-positions
      severity: error
      expression_language: plain
      expression: source_location_id must be unique; source_reference_ref and representation_ref must resolve; location_kind must be range; coordinate_system must be lsp-position:utf-16; start_line start_character end_line and end_character must be nonnegative integers; the pair start_line start_character must be lexicographically less than or equal to end_line end_character; position_encoding must be explicitly negotiated utf-16 for the bound representation; the end position is exclusive; re-resolve after representation version encoding or line-ending changes; no source text or edit instruction may be stored.
      explanation:
        zh: 行和字符数字只有在同一文本表示及同一协商编码下才可以排序和解释，终点不属于选中跨度。
        en: Line and character numbers can be ordered and interpreted only under the same text representation and negotiated encoding, and the end position is outside the selected span.
        ja: 行と文字の数値は同じテキスト表現と協調済み符号化の下でのみ順序付けて解釈でき、終了位置は選択スパンの外側である。
      source_claims:
        - claim-lsp-position-and-range
        - claim-local-span-projection
  required_relations: []
