parent_relation:
  id: SourceSpan-is_a-SourceLocation
  predicate: is_a
  target: concept:SourceLocation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是来源连续范围的一种
    en: Is an LSP-coordinate source location
    ja: ソース連続範囲の一種である
  definitions:
    zh: SourceSpan 是直接的 SourceLocation 子类，保留来源和表示绑定，并以带协商编码的行和字符位置对记录有序、排他终止的端点。
    en: SourceSpan retains required SourceLocation source and representation bindings and applies ordered exclusive-end semantics to LSP line-and-character position pairs under one negotiated encoding.
    ja: SourceSpan は直接の SourceLocation 下位型であり、ソース及び表現の結び付きを保持し、協調済み符号化を持つ行と文字位置対で順序付き排他的終了端点を記録する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有文本跨度子类型
      en: Has source-span subtype
      ja: ソーステキストスパン下位型を持つ
  conditions:
    - A span must retain SourceLocation source and representation bindings, declare location_kind range and coordinate_system lsp-position:utf-16, and use one negotiated position encoding.
  temporal_scope: valid-time
  boundary_context: Direct SourceLocation profile aligned with LSP positions; it does not assert that every text source uses Language Server Protocol positions and does not make a line-and-character pair an offset.
  constraints:
    - id: source-span-subtype-narrowing
      expression: SourceSpan must satisfy SourceLocation bindings and ordered exclusive-end interval semantics while representing endpoints as zero-based LSP line and character pairs under one negotiated encoding; it cannot represent a pixel region, edit, payload, or byte/character offset without an explicit conversion record.
      explanation:
        zh: 该子类型只增加 LSP 风格位置对及编码要求，并不取消父类型的连续范围语义。
        en: This direct SourceLocation subtype adds LSP-style position pairs and encoding requirements without falsely inheriting scalar offset fields.
        ja: この下位型は LSP 形式の位置対と符号化要件を追加するだけで、親型の連続範囲意味論を取り除かない。
  examples: []
  source_claims:
    - claim-lsp-position-and-range
    - claim-local-span-projection
  distinct_fact_rationale:
    zh: 该关系是真实分类，因为每个文本跨度仍是同一表示中的有序连续范围，只额外限定端点坐标和字符编码。
    en: This is genuine classification because every text span is a representation-bound source location with ordered endpoints, while its coordinate model is an LSP line-and-character pair rather than a scalar offset range.
    ja: これは真正な分類である。全てのテキストスパンが一つの表現内の順序付き連続範囲であり続け、端点座標と文字符号化だけを追加制約するためである。
  layout_role: primary-backbone
relations: []
sources:
  - id: lsp-specification
    title: Language Server Protocol Specification 3.17
    url: https://microsoft.github.io/language-server-protocol/specifications/lsp/3.17/specification/
    source_type: official-specification
    relevance: Defines zero-based Position values, negotiated character-offset encoding, and Range start-inclusive end-exclusive semantics.
  - id: vscode-language-server-guide
    title: Visual Studio Code Language Server Extension Guide
    url: https://code.visualstudio.com/api/language-extensions/language-server-extension-guide
    source_type: official-documentation
    relevance: Shows a practical editor implementation context for Language Server Protocol locations.
source_claims:
  - id: claim-lsp-position-and-range
    source: lsp-specification
    supports: LSP Position uses zero-based line and character offsets whose meaning is determined by negotiated PositionEncodingKind, and LSP Range has zero-based start and end positions with an exclusive end.
    locator: Sections Position and Range
    evidence_kind: official-specification
    confidence: high
  - id: claim-local-span-projection
    source: lsp-specification
    supports: This local SourceSpan identifier, source and representation bindings, UTF-16-only profile, validation result vocabulary, and JSON record shape are ontology design choices rather than a mandatory LSP persistence format.
    locator: Sections Position and Range
    evidence_kind: design-inference
    confidence: high

