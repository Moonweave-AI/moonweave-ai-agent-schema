      - SourceLocation
      - SourceLineRange-is_a-SourceLocation
      - claim-local-line-range-projection

      - SourceLocation
      - SourceReference
      - SourceLineRange-is_a-SourceLocation
      - claim-rfc5147-line-range
      - claim-local-line-range-projection

      - SourceLineRange
      - SourceLineRange-is_a-SourceLocation
      - claim-local-line-range-projection

      - SourceLocation
      - SourceOffset
      - SourceLineRange-is_a-SourceLocation
