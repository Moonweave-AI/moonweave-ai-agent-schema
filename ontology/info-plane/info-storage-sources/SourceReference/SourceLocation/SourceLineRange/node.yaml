parent_relation:
  id: SourceLineRange-is_a-SourceLocation
  predicate: is_a
  target: concept:SourceLocation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是来源连续范围的一种
    en: Is a line-coordinate source location
    ja: ソース連続範囲の一種である
  definitions:
    zh: SourceLineRange 是直接的 SourceLocation 子类，保留来源和表示绑定，并以带行结束处理基准的零基行位置记录有序、排他终止的端点。
    en: SourceLineRange retains the required SourceLocation source and representation bindings and narrows its coordinate system to zero-based RFC 5147 line positions with a declared line-ending treatment.
    ja: SourceLineRange は直接の SourceLocation 下位型であり、ソース及び表現の結び付きを保持し、行終端処理基準付きの零始まり行位置で順序付き排他的終了端点を記録する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有行范围子类型
      en: Has source-line-range subtype
      ja: ソース行範囲下位型を持つ
  conditions:
    - A line range must retain SourceLocation source and representation bindings, declare location_kind range and coordinate_system rfc5147-line, and use one declared line-ending treatment.
  temporal_scope: valid-time
  boundary_context: Direct SourceLocation profile for RFC 5147-style line positions; it is deliberately not an offset-range subtype because a line position is not a byte or character offset without a separate conversion.
  constraints:
    - id: source-line-range-subtype-narrowing
      expression: SourceLineRange must satisfy SourceLocation bindings and ordered interval semantics while representing endpoints as zero-based RFC 5147 line positions under one declared line-ending treatment; it cannot represent pages, columns, payload, or a byte/character offset without an explicit conversion record.
      explanation:
        zh: 该子类型增加的是行位置解释，而不是移除父类型的连续范围与表示绑定要求。
        en: This direct SourceLocation subtype adds line-position interpretation and retains the required representation binding without falsely inheriting byte- or character-offset fields.
        ja: この下位型は行位置解釈を追加するが、親型の連続範囲及び表現結び付き要件を取り除かない。
  examples: []
  source_claims:
    - claim-rfc5147-line-range
    - claim-local-line-range-projection
  distinct_fact_rationale:
    zh: 该关系是真实分类，因为每个行范围仍是同一表示中的有序连续范围，只将端点解释限定为行位置。
    en: This is genuine classification because every line range is a representation-bound location with ordered endpoints, while its coordinate model is RFC 5147 line positions rather than a byte or character-offset range.
    ja: これは真正な分類である。全ての行範囲が一つの表現内の順序付き連続範囲であり続け、端点解釈だけを行位置へ狭めるためである。
  layout_role: primary-backbone
relations: []
sources:
  - id: rfc5147
    title: RFC 5147 URI Fragment Identifiers for the text/plain Media Type
    url: https://www.rfc-editor.org/rfc/rfc5147.html
    source_type: official-standard
    relevance: Defines zero-based line positions and line ranges for text/plain, including line-ending treatment and changed-resource caveats.
  - id: github-code-links
    title: GitHub Docs permanent links to code
    url: https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/creating-a-permanent-link-to-a-code-snippet
    source_type: official-documentation
    relevance: Demonstrates a practical code-review line-link interface but does not remove the need for representation binding in this ontology.
source_claims:
  - id: claim-rfc5147-line-range
    source: rfc5147
    supports: RFC 5147 defines zero-based line positions and line ranges for text/plain and describes a line range as a consecutive region from starting to ending line position.
    locator: Sections 2.1.2 and 2.2.4
    evidence_kind: official-standard
    confidence: high
  - id: claim-rfc5147-line-endings
    source: rfc5147
    supports: RFC 5147 states that line-based fragments include line endings and describes handling line endings and position values during processing.
    locator: Sections 2.1.2 and 4.1
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-line-range-projection
    source: rfc5147
    supports: The source_location_id, source and representation references, fixed exclusive-end record shape, and line-ending-basis enumeration are local ontology design choices rather than an RFC 5147 serialization.
    locator: Sections 2.2.4 and 3
    evidence_kind: design-inference
    confidence: high

