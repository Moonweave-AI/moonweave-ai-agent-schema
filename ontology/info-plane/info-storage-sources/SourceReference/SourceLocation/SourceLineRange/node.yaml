schema: moonweave.ai/ontology-node/v1
id: SourceLineRange
kind: concept
status: accepted
labels:
  zh: 来源行范围
  en: Source Line Range
  ja: ソース行範囲
semantics:
  short_definition:
    zh: 在一个绑定文本表示中由零基起始行位置和排他终止行位置界定的连续行区间。
    en: A continuous line interval in a bound text representation with zero-based start and exclusive end line positions.
    ja: 結び付いたテキスト表現内で、零始まりの開始行位置と排他的終了行位置により区切る連続行区間。
  definition:
    zh: 来源行范围是 SourceLocation 的直接子类，以来源位置标识、来源引用、表示证据引用、明确的范围种类、RFC 5147 行坐标体系、零基起始行位置、排他终止行位置、行号基准和行结束处理基准记录连续文本行。它保留来源和表示绑定，并将端点解释限定为行位置；它不是页码区间、字节偏移、行列字符 span、单独行标签或无表示基准的代码链接。
    en: SourceLineRange is a direct subtype of SourceLocation that records consecutive text lines through a source-location identifier, source reference, representation-evidence reference, explicit range kind, RFC 5147 line coordinate system, zero-based start line position, exclusive end line position, line-number base, and line-ending treatment basis. It is not an offset range; a line position cannot honestly supply a byte or character offset without a separate conversion record.
    ja: ソース行範囲は SourceLocation の直接下位型であり、ソース位置識別子、ソース参照、表現証拠参照、明示的な範囲種別、RFC 5147 の行座標系、零始まり開始行位置、排他的終了行位置、行番号基準、行終端処理基準により連続テキスト行を記録する。ソース及び表現の結び付きを保持したまま、端点解釈を行位置に制限する。ページ区間、バイトオフセット、行列文字 span、単独の行ラベル、又は表現基準のないコードリンクではない。
  why_needed:
    zh: 行号只有在具体文本表示及其换行处理规则下才稳定可解释。将端点、零基约定和行结束基准记录在一起，可防止编辑器、平台或渲染器的差异悄然改变引用内容。
    en: Line numbers are interpretable only against a specific text representation and its line-ending treatment. Recording endpoints, the zero-based convention, and line-ending basis together prevents editor, platform, or renderer differences from silently changing the cited content.
    ja: 行番号は具体的なテキスト表現とその行終端処理に対してのみ安定して解釈できる。端点、零始まり規約、行終端基準を一緒に記録すると、エディター、プラットフォーム、又はレンダラーの差異が引用内容を黙って変えることを防げる。
  includes:
    - zh: text/plain 或已声明文本表示中的连续行位置范围，以及为该表示声明的行结束处理规则。
      en: Consecutive line-position ranges in text/plain or another declared text representation together with its declared line-ending treatment.
      ja: text/plain 又は別の宣言済みテキスト表現内の連続行位置範囲と、その表現の宣言済み行終端処理。
  excludes:
    - zh: PDF 页码、显示行折返、未绑定 Git 平台链接、字符列范围、语义引文和正文内容。
      en: PDF page numbers, visual soft wrapping, unbound Git-platform links, character-column ranges, semantic quotations, and body content.
      ja: PDF ページ番号、視覚的なソフトラップ、結び付いていない Git プラットフォームリンク、文字列範囲、意味的引用、及び本文内容。
  semantic_kind: information
  aliases:
    - line-position-range
    - source-lines
engineering:
  explanation:
    zh: 摄取器在捕获文本后先规范化或明确保留其行结束规则，再记录零基 start_line 和排他 end_line_exclusive。验证器要求两个端点有序且来自同一表示，并在内容摘要、编码或行结束处理变化后重新解析；它可以返回选中的行位置，但绝不把行文本复制进此节点。
    en: After capturing text, an ingestor either normalizes or explicitly preserves its line-ending treatment before recording zero-based start_line and exclusive end_line_exclusive. A validator requires ordered endpoints from the same representation and re-resolves after content digest, encoding, or line-ending treatment changes; it can return selected line positions but never copies line text into this node.
    ja: テキストを捕捉した後、取込み側は行終端処理を正規化するか明示的に保持してから、零始まりの start_line と排他的 end_line_exclusive を記録する。検証器は同じ表現からの順序付き端点を要求し、内容ダイジェスト、符号化、又は行終端処理が変化した後に再解決する。選択行位置を返してよいが、行テキストをこのノードへ複製してはならない。
  typical_input:
    - description:
        zh: text/plain 表示中的零基连续行范围。
        en: Zero-based continuous line range in a text/plain representation.
        ja: text/plain 表現内の零始まり連続行範囲。
      format: '{"source_location_id":"loc-line-001","source_reference_ref":"src-ref-rfc5147-1","representation_ref":"captured-rfc5147-text-1","location_kind":"range","coordinate_system":"rfc5147-line","start_line":9,"end_line_exclusive":20,"line_number_base":"zero-based","line_ending_basis":"representation-native"}'
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
  typical_output:
    - description:
        zh: 在同一表示中可复核的第 9 至第 19 行选择。
        en: A reviewable selection of line positions 9 through 19 in the same representation.
        ja: 同じ表現内でレビュー可能な行位置 9 から 19 の選択。
      format: '{"resolution_state":"matched","start_line":9,"end_line_exclusive":20,"representation_ref":"captured-rfc5147-text-1"}'
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
  reference_implementations:
    - name: RFC 5147 URI Fragment Identifiers for text/plain
      url: https://www.rfc-editor.org/rfc/rfc5147.html
      description: Defines zero-based line positions and line ranges for text/plain and specifies that line-based fragments include line endings.
    - name: GitHub permanent links to code
      url: https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/creating-a-permanent-link-to-a-code-snippet
      description: Documents a practical code-review implementation that uses source line links, while this ontology still requires concrete representation evidence.
structure:
  identity_keys:
    - source_location_id
  fields:
    - id: source_location_id
      labels:
        zh: 来源位置标识
        en: Source-location identifier
        ja: ソース位置識別子
      definitions:
        zh: 本地系统为一次行范围记录分配的不可复用标识。
        en: Nonreusable identifier assigned by the local system to one line-range record.
        ja: 一つの行範囲記録にローカルシステムが割り当てる再利用しない識別子。
      datatype: identifier
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^loc-line-[A-Za-z0-9._~-]+$'
      example_value: loc-line-001
      allowed_values: []
      source_claims:
        - claim-local-line-range-projection
    - id: source_reference_ref
      labels:
        zh: 来源引用
        en: Source reference
        ja: ソース参照
      definitions:
        zh: 此行范围所依附的 SourceReference 的必需本地引用。
        en: Required local reference to the SourceReference to which this line range is attached.
        ja: この行範囲が付属する SourceReference への必須ローカル参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: src-ref-rfc5147-1
      allowed_values: []
      source_claims:
        - claim-local-line-range-projection
    - id: representation_ref
      labels:
        zh: 表示证据引用
        en: Representation evidence reference
        ja: 表現証拠参照
      definitions:
        zh: 指向计算行位置所依据的已捕获文本表示或等效证据的必需引用。
        en: Required reference to the captured text representation or equivalent evidence from which line positions are calculated.
        ja: 行位置を計算する捕捉済みテキスト表現又は同等の証拠への必須参照。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: captured-rfc5147-text-1
      allowed_values: []
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
    - id: location_kind
      labels:
        zh: 位置种类
        en: Location kind
        ja: 位置種別
      definitions:
        zh: 继承自 SourceLocation 的位置种类；本节点固定为 range，表示两个行位置共同界定连续区间，而不是单个插入点或二维区域。
        en: Location kind inherited from SourceLocation. It is fixed to range here, so two line positions delimit one continuous interval rather than a single insertion point or two-dimensional region.
        ja: SourceLocation から継承する位置種別。このノードでは range に固定され、二つの行位置が単一の挿入点又は二次元領域ではなく連続区間を区切ることを示す。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: range
      allowed_values:
        - range
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
    - id: coordinate_system
      labels:
        zh: 坐标体系
        en: Coordinate system
        ja: 座標系
      definitions:
        zh: 继承自 SourceLocation 的坐标体系；本节点使用本地标记 rfc5147-line 来指明 RFC 5147 的零基 line 位置语义及其对绑定 text/plain 表示的依赖。
        en: Coordinate system inherited from SourceLocation. This node uses the local marker rfc5147-line to name RFC 5147 zero-based line-position semantics and their dependency on the bound text/plain representation.
        ja: SourceLocation から継承する座標系。このノードはローカルの rfc5147-line マーカーで、RFC 5147 の零始まり行位置意味論と束縛した text/plain 表現への依存を示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: rfc5147-line
      allowed_values:
        - rfc5147-line
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
    - id: start_line
      labels:
        zh: 起始行位置
        en: Start line position
        ja: 開始行位置
      definitions:
        zh: 在绑定表示中从零开始计数的包含性行范围起点。
        en: Inclusive line-range start counted from zero in the bound representation.
        ja: 結び付いた表現で零から数える、包含的な行範囲開始点。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]+$'
      example_value: 9
      allowed_values: []
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
    - id: end_line_exclusive
      labels:
        zh: 排他终止行位置
        en: Exclusive end line position
        ja: 排他的終了行位置
      definitions:
        zh: 在同一绑定表示中从零开始计数的范围外行位置，不属于所选连续行。
        en: Zero-based outside line position in the same bound representation that does not belong to the selected consecutive lines.
        ja: 同じ結び付いた表現で零から数える、選択された連続行に属さない範囲外行位置。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[0-9]+$'
      example_value: 20
      allowed_values: []
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
    - id: line_number_base
      labels:
        zh: 行号基准
        en: Line-number base
        ja: 行番号基準
      definitions:
        zh: 声明此节点使用零基行位置，避免与展示型一基行号混淆。
        en: Declares that this node uses zero-based line positions to avoid confusion with display-oriented one-based line numbers.
        ja: 表示向けの一始まり行番号との混同を避けるため、このノードが零始まり行位置を使用することを宣言する。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: zero-based
      allowed_values:
        - zero-based
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
    - id: line_ending_basis
      labels:
        zh: 行结束处理基准
        en: Line-ending treatment basis
        ja: 行終端処理基準
      definitions:
        zh: 标明行位置是按捕获表示自身的行结束处理还是按已声明规范化处理得到。
        en: States whether line positions use the captured representation's native line-ending treatment or a declared normalized treatment.
        ja: 行位置が捕捉表現本来の行終端処理を使用するか、又は宣言済み正規化処理を使用するかを示す。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: representation-native
      allowed_values:
        - representation-native
        - normalized-crlf
      source_claims:
        - claim-rfc5147-line-range
        - claim-local-line-range-projection
  constraints:
    - id: source-line-range-ordered-representation-bound-lines
      severity: error
      expression_language: plain
      expression: source_location_id must be unique; source_reference_ref and representation_ref must resolve; location_kind must be range; coordinate_system must be rfc5147-line; start_line and end_line_exclusive must be nonnegative integers with start_line less than or equal to end_line_exclusive; line_number_base must be zero-based; line_ending_basis must be recorded and applied consistently to both endpoints; the range must be revalidated after representation text or line-ending treatment changes; no line content may be stored.
      explanation:
        zh: 行位置依赖同一文本表示及其行结束处理，端点必须有序并使用一个明确的零基计数体系。
        en: Line positions depend on one text representation and its line-ending treatment, so endpoints must be ordered and use one explicit zero-based counting system.
        ja: 行位置は一つのテキスト表現とその行終端処理に依存するため、端点は順序付きで、一つの明示的な零始まり計数体系を使用しなければならない。
      source_claims:
        - claim-rfc5147-line-range
        - claim-rfc5147-line-endings
        - claim-local-line-range-projection
  required_relations: []
examples:
  - id: source-line-range-anthropic-citations-char-location-langch
    labels:
      zh: text/plain 连续行范围
      en: Anthropic Citations char_location, LangChain Document.metadata.source, RFC 9110 ETag/Content-Digest: Consecutive text/plain line range
      ja: Anthropic Citations / LangChain metadata.source / RFC 9110: 連続する text/plain 行範囲

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SourceLineRange maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SourceLineRange maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SourceLineRange context/token boundary."}
    field_values:
      source_location_id: loc-line-001
      source_reference_ref: src-ref-rfc5147-1
      representation_ref: captured-rfc5147-text-1
      location_kind: range
      coordinate_system: rfc5147-line
      start_line: 9
      end_line_exclusive: 20
      line_number_base: zero-based
      line_ending_basis: representation-native
    related_node_ids:
      - SourceLocation
      - SourceReference
      - SourceLineRange-is_a-SourceLocation
    source_claims:
      - claim-rfc5147-line-range
      - claim-local-line-range-projection

      - SourceLineRange
