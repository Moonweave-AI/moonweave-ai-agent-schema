schema: moonweave.ai/ontology-node/v1
id: SourceCellRange
kind: concept
labels:
  zh: 来源单元格范围
  en: source cell range
  ja: 出典セル範囲
semantics:
  short_definition:
    zh: 电子表格中的单元格矩形区域。
    en: Rectangular cell area in a spreadsheet.
    ja: spreadsheet 中の cell 矩形区域。
  definition:
    zh: SourceCellRange 记录 sheet 名与 A1 记法矩形范围 cells:B2:D10；用于表格数据 Citation。
    en: SourceCellRange records sheet name and A1 rectangular range cells:B2:D10 for tabular data Citations.
    ja: SourceCellRange は spreadsheet citation。
  why_needed:
    zh: 单元格地址是二维结构，不能仅用通用整数范围表达；工作表身份也决定相同 A1:C9 指向哪个区域。
    en: Cell addresses are two-dimensional and cannot be expressed by a generic integer range alone; worksheet identity also determines which region A1:C9 denotes.
    ja: cell address は二次元で generic integer range だけでは表せず、worksheet identity が A1:C9 の指す region を決めます。
  includes:
    - zh: 带 workbook/sheet 身份和规范化矩形单元格范围的选择。
      en: Selections with workbook or sheet identity and a normalized rectangular cell range.
      ja: workbook/sheet identity と normalized rectangular cell range を持つ selection。
  excludes:
    - zh: 数据库行引用、单一 CSV 行、工作表对象本身和没有 sheet 身份的显示文本。
      en: Database-row references, single CSV lines, worksheet objects themselves, and display text without sheet identity.
      ja: database-row reference・single CSV line・worksheet object 本体・sheet identity のない display text。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: RAG over Excel 命中常带 sheet+cell metadata。
    en: RAG over Excel hits often include sheet+cell metadata.
    ja: Excel RAG metadata。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - sheet_id
    - start_cell
    - end_cell
    - address_notation
  fields:
    - id: sheet_id
      labels:
        zh: 工作表标识
        en: sheet ID
        ja: シート ID
      definitions:
        zh: 声明单元格地址所属工作表。
        en: Declares the worksheet in which cell addresses are interpreted.
        ja: cell address を解釈する worksheet を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Summary
      allowed_values: []
      source_claims:
        - claim-source-cell-range-002
    - id: start_cell
      labels:
        zh: 起始单元格
        en: start cell
        ja: start cell
      definitions:
        zh: 保存矩形左上角的规范单元格地址。
        en: Carries the normalized address of the rectangle's top-left cell.
        ja: rectangle top-left cell の normalized address を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: B4
      allowed_values: []
      source_claims:
        - claim-source-cell-range-003
    - id: end_cell
      labels:
        zh: 结束单元格
        en: end cell
        ja: end cell
      definitions:
        zh: 保存矩形右下角的规范单元格地址。
        en: Carries the normalized address of the rectangle's bottom-right cell.
        ja: rectangle bottom-right cell の normalized address を保持します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: D9
      allowed_values: []
      source_claims:
        - claim-source-cell-range-004
    - id: address_notation
      labels:
        zh: 地址记法
        en: address notation
        ja: address notation
      definitions:
        zh: 声明单元格地址采用 A1、R1C1 或其他明确记法。
        en: Declares whether cell addresses use A1, R1C1, or another explicit notation.
        ja: cell address が A1・R1C1・その他 explicit notation のどれかを宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: A1
      allowed_values: []
      source_claims:
        - claim-source-cell-range-005
  constraints: []
  required_relations: []
examples:
  - id: SourceCellRange-example-sales
    labels:
      zh: 销售表区域
      en: Sales sheet range
      ja: sales sheet range
    descriptions:
      zh: sales.xlsx Sheet1 cells:B2:D10 引用 Q1 数据。
      en: sales.xlsx Sheet1 cells:B2:D10 cites Q1 data.
      ja: sales cells。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: cells
    field_values:
      source_range: cells:B2:D10
      sheet: Sheet1
    related_node_ids:
      - SourceCellRange
    related_relation_ids: []
    source_claims:
      - claim-source-cell-design
  - id: SourceCellRange-example-single-cell
    labels:
      zh: 单单元格
      en: Single cell
      ja: single cell
    descriptions:
      zh: cells:C5..C5 单格引用。
      en: cells:C5..C5 single cell citation.
      ja: single cell。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: single cell
    field_values: {}
    related_node_ids:
      - SourceCellRange
    related_relation_ids: []
    source_claims:
      - claim-source-cell-design
  - id: SourceCellRange-example-not-line
    labels:
      zh: 非行范围
      en: Not line range
      ja: line range ではない
    descriptions:
      zh: CSV 纯文本行引用使用 SourceLineRange 不是 SourceCellRange。
      en: CSV plain text line citations use SourceLineRange not SourceCellRange.
      ja: CSV→lines。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceCellRange
    related_relation_ids: []
    source_claims:
      - claim-source-cell-design
parent_relation:
  id: SourceCellRange-is_a-SourceRegion
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 每个 SourceCellRange 都是 SourceRegion；种差是工作表身份、单元格地址与地址记法。
    en: Every SourceCellRange is a SourceRegion distinguished by worksheet identity, cell addresses, and address notation.
    ja: すべての SourceCellRange は worksheet identity・cell address・address notation を種差とする SourceRegion です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系不使用实例基数。
    en: Instance cardinality does not apply to a genus relation.
    ja: genus relation に instance cardinality は適用しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceCellRange-is_a-SourceRegion-example-positive-manual-001
      labels:
        zh: 单元格区域种属正例
        en: cell-range hierarchy positive case
        ja: cell-range hierarchy 正例
      descriptions:
        zh: Summary!B4:D9 在明确工作表和 A1 记法中界定行列矩形。
        en: Summary!B4:D9 delimits a row-column rectangle under an identified worksheet and A1 notation.
        ja: Summary!B4:D9 は identified worksheet/A1 notation で row-column rectangle を区切ります。
      field_values: {}
      related_node_ids:
        - SourceCellRange
        - SourceRegion
      related_relation_ids:
        - SourceCellRange-is_a-SourceRegion
      source_claims:
        - claim-source-cell-range-009
    - id: SourceCellRange-is_a-SourceRegion-example-boundary-manual-001
      labels:
        zh: 单元格区域种属边界例
        en: cell-range hierarchy boundary case
        ja: cell-range hierarchy 境界例
      descriptions:
        zh: 图像裁剪框有两个轴，但没有工作表或单元格地址。
        en: An image crop box has two axes but no worksheet or cell addresses.
        ja: image crop box は二 axis を持ちますが worksheet/cell address はありません。
      field_values: {}
      related_node_ids:
        - SourceCellRange
        - SourceRegion
      related_relation_ids:
        - SourceCellRange-is_a-SourceRegion
      source_claims:
        - claim-source-cell-range-010
  source_claims:
    - claim-source-cell-range-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-cell-range-001
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph models an Excel range as a worksheet-scoped address with independent row and column coordinates and extents. Moonweave specializes SourceRegion with cell-address notation.
    locator: workbookRange resource type > address, rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-002
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph resolves workbook ranges within an identified worksheet and exposes their address, row, and column dimensions. SourceCellRange therefore pins sheet identity.
    locator: workbookRange resource type and worksheet-scoped range endpoints
    evidence_kind: official
    confidence: high
  - id: claim-source-cell-range-003
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph identifies a worksheet range by address and exposes the first row and column indexes. Moonweave records the corresponding start cell explicitly.
    locator: workbookRange resource type > address and rowIndex/columnIndex
    evidence_kind: official
    confidence: high
  - id: claim-source-cell-range-004
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph exposes a rectangular address with row and column extents. Moonweave normalizes its lower-right boundary as end_cell.
    locator: workbookRange resource type > address, rowCount, and columnCount
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-005
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph distinguishes a canonical address from a locale-dependent address. Moonweave records the chosen notation explicitly.
    locator: workbookRange resource type > address and addressLocal
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-006
    source: eng-ont-prov-o
    supports: "PROV-O includes row and column as non-geographic locations; Moonweave combines both dimensions with worksheet scope for a cell range. This evidence supports the manually reviewed positive case for SourceCellRange: sheet_id=Summary and cell_range=B4:D9 select one rectangular worksheet region."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-007
    source: eng-ont-prov-o
    supports: "PROV-O includes row and column as non-geographic locations; Moonweave combines both dimensions with worksheet scope for a cell range. This evidence supports the manually reviewed instance case for SourceCellRange: An audit citation locates Summary!B4:D9 without copying cell values."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-008
    source: eng-ont-prov-o
    supports: "PROV-O includes row and column as non-geographic locations; Moonweave combines both dimensions with worksheet scope for a cell range. This evidence supports the manually reviewed boundary case for SourceCellRange: order_id=7812 in the orders table identifies a logical row and has no sheet_id."
    locator: §3.2 Expanded Classes, prov:Location, lines 1414–1418
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-009
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph's worksheet range has an address and independent row/column dimensions, directly supporting this cell-range specialization case.
    locator: workbookRange resource type > address, rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-010
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph workbook ranges are worksheet-scoped and address-bearing; a generic image rectangle lacks that specialization.
    locator: workbookRange resource type > worksheet range address
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-range-011
    source: eng-api-microsoft-graph-workbook-range
    supports: The official workbook range resource provides the worksheet address plus two-dimensional extents that distinguish SourceCellRange from generic SourceRegion.
    locator: workbookRange resource type > address, rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-cell-design
    source: src-info-sources-design
    supports: SourceCellRange cites spreadsheet rectangles in A1 notation.
    locator: SourceCellRange
    evidence_kind: design-inference
    confidence: high
