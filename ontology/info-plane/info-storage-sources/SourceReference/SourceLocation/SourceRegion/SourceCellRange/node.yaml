schema: moonweave.ai/ontology-node/v1
id: SourceCellRange
kind: concept
status: accepted
labels:
  zh: 来源单元格范围
  en: source cell range
  ja: 出典セル範囲
semantics:
  short_definition:
    zh: 以工作表和矩形单元格地址选定区域的来源范围。
    en: A source range selecting a rectangular cell region in a worksheet.
    ja: worksheet 内の rectangular cell region を選ぶ source range。
  definition:
    zh: 来源单元格范围是来源二维区域的一类，种差是工作表标识、地址记法与起止单元格共同确定矩形；数据库行键、CSV 物理行号和无工作表上下文的 A1 字符串不属于该类。
    en: SourceCellRange is a SourceRegion specialized by worksheet identity, address notation, and start/end cell addresses; database row keys, CSV physical line numbers, and A1 strings without worksheet context do not qualify.
    ja: SourceCellRange は worksheet identity・address notation・start/end cell address で rectangle を決める SourceRegion です。database row key・CSV physical line number・worksheet context のない A1 string は含みません。
  why_needed:
    zh: 单元格地址是二维结构，不能仅用通用整数范围表达；工作表身份也决定相同 A1:C9 指向哪个区域。
    en: Cell addresses are two-dimensional and cannot be expressed by a generic integer range alone; worksheet identity also determines which region A1:C9 denotes.
    ja: cell address は二次元で generic integer range だけでは表せず、worksheet identity が A1:C9 の指す region を決めます。
  includes:
    - zh: 带 workbook/sheet 身份和规范化矩形单元格范围的选择。
      en: Selections with workbook or sheet identity and a normalized rectangular cell range.
      ja: workbook/sheet identity と normalized rectangular cell range を持つ selection。
  excludes:
    - zh: 数据库行引用、单一 CSV 行、工作表对象本身和没有 sheet 身份的显示文本。
      en: Database-row references, single CSV lines, worksheet objects themselves, and display text without sheet identity.
      ja: database-row reference・single CSV line・worksheet object 本体・sheet identity のない display text。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - sheet_id
    - start_cell
    - end_cell
    - address_notation
  fields:
    - id: sheet_id
      labels:
        zh: 工作表标识
        en: sheet ID
        ja: シート ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明单元格地址所属工作表。
        en: Declares the worksheet in which cell addresses are interpreted.
        ja: cell address を解釈する worksheet を宣言します。
      allowed_values: []
      pattern: null
      example_value: Summary
      source_claims:
        - claim-source-cell-range-002
    - id: start_cell
      labels:
        zh: 起始单元格
        en: start cell
        ja: start cell
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存矩形左上角的规范单元格地址。
        en: Carries the normalized address of the rectangle's top-left cell.
        ja: rectangle top-left cell の normalized address を保持します。
      allowed_values: []
      pattern: null
      example_value: B4
      source_claims:
        - claim-source-cell-range-003
    - id: end_cell
      labels:
        zh: 结束单元格
        en: end cell
        ja: end cell
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存矩形右下角的规范单元格地址。
        en: Carries the normalized address of the rectangle's bottom-right cell.
        ja: rectangle bottom-right cell の normalized address を保持します。
      allowed_values: []
      pattern: null
      example_value: D9
      source_claims:
        - claim-source-cell-range-004
    - id: address_notation
      labels:
        zh: 地址记法
        en: address notation
        ja: address notation
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明单元格地址采用 A1、R1C1 或其他明确记法。
        en: Declares whether cell addresses use A1, R1C1, or another explicit notation.
        ja: cell address が A1・R1C1・その他 explicit notation のどれかを宣言します。
      allowed_values: []
      pattern: null
      example_value: A1
      source_claims:
        - claim-source-cell-range-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceCellRange-example-positive-manual-001

    labels:
      zh: 来源单元格范围正例
      en: source cell range positive case
      ja: 出典セル範囲正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SourceCellRange maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SourceCellRange maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SourceCellRange context/token boundary."}

    field_values:
      sheet_id: Summary
      start_cell: B4
      end_cell: D9
      address_notation: A1
      first_axis_start: 3
      first_axis_end: 9
      second_axis_start: 1
      second_axis_end: 4
      endpoint_rule: "[start,end) on both axes"
      source_reference_id: workbook-ref-operations-summary-v3
      source_identity_id: source-identity-workbook-operations-summary-v3
      coordinate_system: zero-based-row-column
    related_node_ids:
      - SourceCellRange
      - SourceRegion
    related_relation_ids:
      - SourceCellRange-is_a-SourceRegion

    source_claims:
      - claim-source-cell-range-006
  - id: SourceCellRange-example-instance-manual-002

    labels:
      zh: 来源单元格范围实例
      en: source cell range instance case
      ja: 出典セル範囲実例

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceCellRange.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceCellRange.", ja: "DSPy instance maps to SourceCellRange PromptTemplate."}

    field_values:
      sheet_id: Summary
      start_cell: B4
      end_cell: D9
      address_notation: A1
    related_node_ids:
      - SourceCellRange
      - SourceRange
    related_relation_ids:
      - SourceCellRange-is_a-SourceRange

    source_claims:
      - claim-source-cell-range-007
  - id: SourceCellRange-example-boundary-manual-003

    labels:
      zh: 来源单元格范围边界例
      en: source cell range boundary case
      ja: 出典セル範囲境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceCellRange must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceCellRange must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values:
      record_primary_key: orders/order_id=7812
    related_node_ids:
      - SourceCellRange
      - SourceRange
    related_relation_ids:
      - SourceCellRange-is_a-SourceRange

    source_claims:
      - claim-source-cell-range-008
external_mappings: []
