schema: moonweave.ai/ontology-node/v1
id: SourceRegion
kind: concept
status: accepted
labels:
  zh: 来源二维区域
  en: source region
  ja: 出典二次元領域
semantics:
  short_definition:
    zh: 在同一来源状态与二维坐标系中界定的矩形区域。
    en: A rectangular region delimited in a two-dimensional coordinate system of one source state.
    ja: 一つの source state の二次元 coordinate system で区切る rectangular region。
  definition:
    zh: 来源二维区域是来源位置的一类，种差是在同一来源状态和坐标系统中分别给出第一轴与第二轴的起止边界，并声明统一的半开端点约定；它适用于工作表、图像或矩阵矩形，不属于只含一个有序轴的 SourceRange。
    en: SourceRegion is a SourceLocation specialized by start and end boundaries on two axes within one source state and coordinate system plus an explicit half-open endpoint convention; it covers spreadsheet, image, or matrix rectangles and is not a one-axis SourceRange.
    ja: SourceRegion は一 source state/coordinate system 内で二 axis の start/end boundary と half-open endpoint convention を持つ SourceLocation です。spreadsheet・image・matrix rectangle に適用し、一 ordered axis だけの SourceRange ではありません。
  why_needed:
    zh: 二维矩形的身份需要同时固定行列或横纵两个轴；把它压成单一 start/end 会丢失几何维度并让边界比较失真。
    en: A rectangle must pin row/column or horizontal/vertical bounds on both axes; collapsing it into one start/end pair loses dimensionality and corrupts boundary comparison.
    ja: rectangle は row/column または horizontal/vertical の二 axis を固定する必要があり、一 start/end pair への圧縮は dimension と boundary comparison を失わせます。
  includes:
    - zh: 以两个有序轴和半开边界表达的工作表、图像或矩阵矩形。
      en: Spreadsheet, image, or matrix rectangles expressed by two ordered axes and half-open bounds.
      ja: 二 ordered axis と half-open bound で表す spreadsheet・image・matrix rectangle。
  excludes:
    - zh: 单一字符、字节、行或页区间，以及不连续多边形或业务记录键。
      en: Single character, byte, line, or page intervals, discontinuous polygons, and business record keys.
      ja: single character・byte・line・page interval、discontinuous polygon、business record key。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - first_axis_start
    - first_axis_end
    - second_axis_start
    - second_axis_end
    - endpoint_rule
  fields:
    - id: first_axis_start
      labels:
        zh: 第一轴起点
        en: first-axis start
        ja: first-axis start
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 第一坐标轴的包含起点。
        en: Inclusive start on the first coordinate axis.
        ja: first coordinate axis の inclusive start。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-source-region-002
    - id: first_axis_end
      labels:
        zh: 第一轴终点
        en: first-axis end
        ja: first-axis end
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 第一坐标轴的排他终点。
        en: Exclusive end on the first coordinate axis.
        ja: first coordinate axis の exclusive end。
      allowed_values: []
      pattern: null
      example_value: 9
      source_claims:
        - claim-source-region-003
    - id: second_axis_start
      labels:
        zh: 第二轴起点
        en: second-axis start
        ja: second-axis start
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 第二坐标轴的包含起点。
        en: Inclusive start on the second coordinate axis.
        ja: second coordinate axis の inclusive start。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-source-region-004
    - id: second_axis_end
      labels:
        zh: 第二轴终点
        en: second-axis end
        ja: second-axis end
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 第二坐标轴的排他终点。
        en: Exclusive end on the second coordinate axis.
        ja: second coordinate axis の exclusive end。
      allowed_values: []
      pattern: null
      example_value: 4
      source_claims:
        - claim-source-region-005
    - id: endpoint_rule
      labels:
        zh: 二维端点约定
        en: two-axis endpoint rule
        ja: two-axis endpoint rule
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明两个轴都采用包含起点、排除终点的半开约定。
        en: Declares start-inclusive, end-exclusive half-open bounds on both axes.
        ja: 両 axis で start-inclusive/end-exclusive half-open bound を宣言します。
      allowed_values: []
      pattern: null
      example_value: "[start,end) on both axes"
      source_claims:
        - claim-source-region-006
  constraints:
    - id: source-region-ordered-axes
      severity: error
      expression_language: plain
      expression: first_axis_end > first_axis_start and second_axis_end > second_axis_start
      explanations:
        zh: 两个轴都必须形成非空正向区间。
        en: Both axes form non-empty forward intervals.
        ja: 両 axis は non-empty forward interval を形成します。
      source_claims:
        - claim-source-region-007
  required_relation_constraints: []
examples:
  - id: SourceRegion-example-positive-manual-001

    labels:
      zh: 来源二维区域正例
      en: source region positive case
      ja: source region 正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SourceRegion maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SourceRegion maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SourceRegion context/token boundary."}

    field_values:
      first_axis_start: 3
      first_axis_end: 9
      second_axis_start: 1
      second_axis_end: 4
      endpoint_rule: "[start,end) on both axes"
      source_reference_id: workbook-ref-operations-summary-v3
      source_identity_id: source-identity-workbook-operations-summary-v3
      coordinate_system: zero-based-row-column
    related_node_ids:
      - SourceRegion
      - SourceLocation
    related_relation_ids:
      - SourceRegion-is_a-SourceLocation

    source_claims:
      - claim-source-region-008
  - id: SourceRegion-example-instance-manual-002

    labels:
      zh: 来源二维区域实例
      en: source region instance case
      ja: source region 実例

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceRegion.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceRegion.", ja: "DSPy instance maps to SourceRegion PromptTemplate."}

    field_values:
      first_axis_start: 120
      first_axis_end: 380
      second_axis_start: 40
      second_axis_end: 220
      endpoint_rule: "[start,end) on both axes"
    related_node_ids:
      - SourceRegion
      - SourceLocation
    related_relation_ids:
      - SourceRegion-is_a-SourceLocation

    source_claims:
      - claim-source-region-009
  - id: SourceRegion-example-boundary-manual-003

    labels:
      zh: 来源二维区域边界例
      en: source region boundary case
      ja: source region 境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceRegion must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceRegion must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values:
      linear_start: 412
      linear_end: 795
    related_node_ids:
      - SourceRegion
      - SourceRange
      - SourceLocation
    related_relation_ids:
      - SourceRegion-is_a-SourceLocation
      - SourceRange-is_a-SourceLocation

    source_claims:
      - claim-source-region-010
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SourceRange
    shared_parent_concept_id: SourceLocation
    differentia:
      zh: SourceRegion 固定两个轴，SourceRange 只固定一个轴。
      en: SourceRegion pins two axes, whereas SourceRange pins one ordered axis.
      ja: SourceRegion は二 axis、SourceRange は一 ordered axis を固定します。
    source_claims:
      - claim-source-region-011
      - claim-source-region-012
parent_relation:
  id: SourceRegion-is_a-SourceLocation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 每个 SourceRegion 都是 SourceLocation；种差是在一个来源状态中同时固定两个有序坐标轴的非空边界。
    en: Every SourceRegion is a SourceLocation distinguished by non-empty bounds on two ordered coordinate axes within one source state.
    ja: すべての SourceRegion は一 source state 内で二 ordered coordinate axis の non-empty bounds を持つ SourceLocation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 种属关系不使用实例基数。
    en: Instance cardinality does not apply to a genus relation.
    ja: genus relation に instance cardinality は適用しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceRegion-is_a-SourceLocation-example-positive-manual-001
      labels:
        zh: 二维区域种属正例
        en: source-region hierarchy positive case
        ja: source-region hierarchy 正例
      scenario_id: null
      descriptions:
        zh: 工作簿来源 source-ref-finance-v12 的 Summary 工作表用零基行区间 [3,9) 与列区间 [1,4) 选定 B4:D9；两个独立轴都在同一已核验来源状态内，因而先成立为 SourceLocation，再以双轴边界成立为 SourceRegion。
        en: Within verified workbook source source-ref-finance-v12, worksheet Summary selects B4:D9 as zero-based row interval [3,9) and column interval [1,4). Both independently bounded axes belong to the same source state, so the value is a SourceLocation and specifically a SourceRegion.
        ja: 検証済み workbook source source-ref-finance-v12 の Summary worksheet で B4:D9 を zero-based row interval [3,9) と column interval [1,4) として選択します。二つの independently bounded axis が同一 source state に属するため SourceLocation かつ SourceRegion です。
      field_values:
        source_reference_id: source-ref-finance
        source_identity_id: source-ref-finance-v12
        coordinate_system: worksheet-zero-based-row-column
        first_axis_start: 3
        first_axis_end: 9
        second_axis_start: 1
        second_axis_end: 4
        endpoint_rule: "[start,end) on both axes"
      related_node_ids:
        - SourceRegion
        - SourceLocation
      related_relation_ids:
        - SourceRegion-is_a-SourceLocation
      source_claims:
        - claim-source-region-013
    - id: SourceRegion-is_a-SourceLocation-example-boundary-manual-001
      labels:
        zh: 二维区域种属边界例
        en: source-region hierarchy boundary case
        ja: source-region hierarchy 境界例
      scenario_id: null
      descriptions:
        zh: image-ref-dashboard 只有资源 URI 与版本摘要，既未声明坐标系统，也未给出第一轴和第二轴的起止边界；它可以是 SourceReference，却不是 SourceLocation，更不能仅因图像天然具有宽高就推断为 SourceRegion。
        en: image-ref-dashboard carries only a resource URI and version digest. It declares neither a coordinate system nor first- and second-axis bounds. It may be a SourceReference, but it is not a SourceLocation and cannot be inferred as SourceRegion merely because images have width and height.
        ja: image-ref-dashboard は resource URI と version digest だけを持ち、coordinate system も first/second-axis bound も宣言しません。SourceReference にはなり得ますが SourceLocation ではなく、画像に width/height があるだけで SourceRegion と推論できません。
      field_values:
        source_reference_id: image-ref-dashboard
        resource_uri: https://example.invalid/dashboard.png
        content_digest: "sha-256=:example:"
        coordinate_system: null
        first_axis_start: null
        first_axis_end: null
        second_axis_start: null
        second_axis_end: null
      related_node_ids:
        - SourceRegion
        - SourceLocation
      related_relation_ids:
        - SourceRegion-is_a-SourceLocation
      source_claims:
        - claim-source-region-014
  source_claims:
    - claim-source-region-015
  distinct_fact_rationale:
    zh: 该边只表达二维区域属于来源位置，不表达工作表专门化或资源引用。
    en: This edge states only that a two-axis region is a source location; it does not assert spreadsheet specialization or resource reference.
    ja: この edge は two-axis region が source location であることだけを表し spreadsheet specialization/resource reference は表しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-source-region-001
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph models workbook ranges with a worksheet-scoped address plus independent row and column indexes and counts. Moonweave abstracts that two-axis structure as SourceRegion.
    locator: workbookRange resource type > address, rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-002
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph exposes the first row index and row count of a workbook range, directly demonstrating an independently bounded row axis.
    locator: workbookRange resource type > rowIndex and rowCount
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-source-region-003
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph returns rowIndex and rowCount separately; Moonweave derives the exclusive first-axis end as start plus count.
    locator: workbookRange resource type > rowIndex and rowCount
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-004
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph exposes the first column index and column count independently of the row axis.
    locator: workbookRange resource type > columnIndex and columnCount
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-source-region-005
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph returns columnIndex and columnCount separately; Moonweave derives the exclusive second-axis end as start plus count.
    locator: workbookRange resource type > columnIndex and columnCount
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-006
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph's index-plus-count representation is naturally normalized as a half-open interval on each axis. That normalization is a Moonweave design inference.
    locator: workbookRange resource type > rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-007
    source: eng-api-microsoft-graph-workbook-range
    supports: Workbook ranges expose positive row and column extents. Moonweave expresses the corresponding ordered-axis invariant explicitly.
    locator: workbookRange resource type > rowCount and columnCount
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-008
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph represents a workbook range with independent row and column indexes and counts, supporting this two-axis positive case.
    locator: workbookRange resource type > rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-source-region-009
    source: eng-api-microsoft-graph-workbook-range
    supports: The official workbook range model provides a concrete two-axis exemplar; Moonweave generalizes the reviewed region genus to other rectangular sources.
    locator: workbookRange resource type > independent row and column dimensions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-source-region-010
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph workbook ranges expose both row and column dimensions; a one-axis character interval is outside this reviewed boundary.
    locator: workbookRange resource type > row and column dimensions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-011
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph exposes independent row and column dimensions, grounding the two-axis side of this sibling distinction.
    locator: workbookRange resource type > row and column dimensions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-012
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector exposes a single ordered start/end axis, grounding the linear side of this sibling distinction.
    locator: §4.2.5 Text Position Selector > start and end
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-region-013
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph officially exposes a workbook range through independent zero-based row and column indexes and counts. The example instantiates those documented coordinates; only the reusable SourceRegion genus name is Moonweave terminology.
    locator: workbookRange resource type > rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-source-region-014
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph officially supplies row and column coordinates for a workbook range. The boundary record supplies none of those documented dimensions, so it cannot instantiate the reviewed two-axis range pattern.
    locator: workbookRange resource type > rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-source-region-015
    source: eng-api-microsoft-graph-workbook-range
    supports: Microsoft Graph explicitly represents a source-internal range with independent row and column coordinates. Moonweave abstracts that as a two-axis SourceLocation subtype.
    locator: workbookRange resource type > address, rowIndex, rowCount, columnIndex, columnCount
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

