schema: moonweave.ai/ontology-node/v1
id: SourceLocation
kind: concept
status: accepted
labels:
  zh: 来源位置
  en: source location
  ja: 出典位置
semantics:
  short_definition:
    zh: 在一个来源表示内部选定点、一维范围或多轴区域的坐标描述。
    en: A coordinate description selecting a point, one-dimensional range, or multi-axis region inside one source representation.
    ja: 一 source representation 内の point・one-dimensional range・multi-axis region を選ぶ coordinate description。
  definition:
    zh: 来源位置是一种选择器信息，以声明的坐标系统在某个来源表示内部确定点、一维连续范围或多轴区域；它必须与来源引用和来源身份配合解释，不承担 referent 身份、版本状态或内容重识别。
    en: SourceLocation is selector information that determines a point, one-dimensional contiguous range, or multi-axis region within one source representation under a declared coordinate system; it is interpreted with a SourceReference and SourceIdentity and does not carry referent identity, version state, or content re-identification.
    ja: SourceLocation は宣言済み coordinate system で一 source representation 内の point・one-dimensional contiguous range・multi-axis region を決める selector information です。SourceReference/SourceIdentity と共に解釈し、referent identity・version state・content re-identification は担いません。
  why_needed:
    zh: 把位置独立成家族，可以清楚区分“引用哪个对象”和“选中对象中的哪一部分”，并防止路径、版本与内容锚继续混在一层。
    en: Making location an independent family separates which object is referenced from which part of that object is selected, preventing paths, versions, and content anchors from remaining in one flat layer.
    ja: location を独立 family にすることで「どの object を参照するか」と「そのどの部分を選ぶか」を分け、path・version・content anchor の平坦混在を防ぎます。
  includes:
    - zh: 带坐标系和单位的偏移、一维行/页/文本范围，以及带两个独立坐标轴的工作表区域。
      en: Offsets, one-dimensional line/page/text ranges, and worksheet regions with two independently bounded axes.
      ja: coordinate system/unit を持つ offset・one-dimensional line/page/text range と、二つの independently bounded axis を持つ worksheet region。
  excludes:
    - zh: 资源 URI、文档版本、内容摘要、引用标签和用于恢复漂移文本的精确引文。
      en: Resource URIs, document versions, content digests, citation labels, and exact quotations used to recover drifting text.
      ja: resource URI・document version・content digest・citation label・drift text を復元する exact quotation。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - source_reference_id
    - source_identity_id
    - coordinate_system
  fields:
    - id: source_reference_id
      labels:
        zh: 来源引用标识
        en: source reference ID
        ja: 出典参照 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定该选择器在其中解释的 SourceReference；相同坐标不能脱离来源引用独立识别位置。
        en: Pins the SourceReference within which the selector is interpreted; the same coordinate cannot identify a location independently of its source reference.
        ja: selector を解釈する SourceReference を固定し、同じ coordinate だけでは source reference から独立して location を識別できません。
      allowed_values: []
      pattern: null
      example_value: src-ref-runbook-v7
      source_claims:
        - claim-source-location-002
    - id: source_identity_id
      labels:
        zh: 来源状态标识
        en: source identity ID
        ja: 出典状態 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定坐标适用的来源版本或摘要状态，防止同一数值在内容更新后静默漂移。
        en: Pins the version-or-digest state to which the coordinate applies so the same number cannot silently drift after content changes.
        ja: coordinate が適用される version/digest state を固定し、content 更新後に同じ数値が静かに drift することを防ぎます。
      allowed_values: []
      pattern: null
      example_value: source-identity-runbook-v7
      source_claims:
        - claim-source-location-003
    - id: coordinate_system
      labels:
        zh: 坐标系统
        en: coordinate system
        ja: 座標系
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明偏移或范围相对于哪一种来源表示解释。
        en: Declares the source representation against which an offset or range is interpreted.
        ja: offset/range をどの source representation に対して解釈するか宣言します。
      allowed_values: []
      pattern: null
      example_value: utf16-code-unit
      source_claims:
        - claim-source-location-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceLocation-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源位置正例
      en: source location positive case
      ja: 出典位置正例
    scenario_id: null
    descriptions:
      zh: 在文档版本 v7 的 utf16-code-unit 坐标系中选择 [412,795)。
      en: Select [412,795) in the utf16-code-unit coordinate system of document version v7.
      ja: document version v7 の utf16-code-unit coordinate system で [412,795) を選択します。
    field_values:
      source_reference_id: src-ref-runbook-v7
      source_identity_id: source-identity-runbook-v7
      coordinate_system: utf16-code-unit
    related_node_ids:
      - SourceReference
      - SourceLocation
    related_relation_ids:
      - SourceReference-has_location-SourceLocation
    expected_result:
      zh: SourceLocation 保持其已审查身份，并按定义解释 SourceReference-has_location-SourceLocation。
      en: Retain the reviewed identity of SourceLocation and interpret SourceReference-has_location-SourceLocation exactly as defined.
      ja: SourceLocation の reviewed identity を保持し SourceReference-has_location-SourceLocation を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 来源表示、坐标系统和范围均已声明。
      en: The source representation, coordinate system, and range are all declared.
      ja: source representation・coordinate system・range がすべて宣言されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-location-005
  - id: SourceLocation-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源位置实例
      en: source location instance case
      ja: 出典位置実例
    scenario_id: null
    descriptions:
      zh: 引用通过 has_location 连接一个页范围，并由查看器解释页码。
      en: A reference links to a page range through has_location and the viewer interprets page numbers.
      ja: reference は has_location で page range に接続し viewer が page number を解釈します。
    field_values:
      source_reference_id: src-ref-runbook-v7
      source_identity_id: source-identity-runbook-v7
      coordinate_system: utf16-code-unit
    related_node_ids:
      - SourceReference
      - SourceLocation
    related_relation_ids:
      - SourceReference-has_location-SourceLocation
    expected_result:
      zh: SourceLocation 保持其已审查身份，并按定义解释 SourceReference-has_location-SourceLocation。
      en: Retain the reviewed identity of SourceLocation and interpret SourceReference-has_location-SourceLocation exactly as defined.
      ja: SourceLocation の reviewed identity を保持し SourceReference-has_location-SourceLocation を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 位置只承担来源内部选择，不替代来源引用。
      en: Location performs only source-internal selection and does not replace the source reference.
      ja: location は source 内 selection だけを担い source reference を置換しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-location-006
  - id: SourceLocation-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源位置边界例
      en: source location boundary case
      ja: 出典位置境界例
    scenario_id: null
    descriptions:
      zh: 版本号 v7 用来指定内容状态，但没有内部坐标。
      en: Version value v7 specifies a content state but has no internal coordinate.
      ja: version value v7 は content state を指定するが internal coordinate を持ちません。
    field_values:
      version_value: v7
    related_node_ids:
      - SourceReference
      - SourceLocation
    related_relation_ids:
      - SourceReference-has_location-SourceLocation
    expected_result:
      zh: 不把该对象归入 SourceLocation，也不凭邻近或词形推断 SourceReference-has_location-SourceLocation。
      en: Do not classify the object as SourceLocation or infer SourceReference-has_location-SourceLocation from proximity or lexical form.
      ja: object を SourceLocation に分類せず proximity/lexical form から SourceReference-has_location-SourceLocation を推論しません。
    why_valid_or_invalid:
      zh: 版本属于 SourceIdentity 组成，不是 SourceLocation。
      en: A version is a SourceIdentity component, not a SourceLocation.
      ja: version は SourceIdentity component であり SourceLocation ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-location-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceReference-has_location-SourceLocation
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有来源位置
    en: has source location
    ja: 出典位置を持つ
  definitions:
    zh: 来源引用具有位置关系把所引用对象连接到在该对象指定表示内解释的点或范围选择；位置不能脱离引用独自确定 referent。
    en: SourceReference has_location SourceLocation links the referenced object to a point or range interpreted within a specified representation of that object; the location cannot determine the referent independently of the reference.
    ja: SourceReference has_location SourceLocation は referenced object をその specified representation 内で解釈する point/range に結び、location 単独では referent を決定できません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有来源位置
      en: inverse of has source location
      ja: 逆：出典位置を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_location-SourceLocation-example-positive-manual-001
      kind: positive
      labels:
        zh: SourceReference-has_location-SourceLocation正例
        en: SourceReference-has_location-SourceLocation positive case
        ja: SourceReference-has_location-SourceLocation正例
      scenario_id: null
      descriptions:
        zh: 文档引用连接 UTF-16 [412,795) 文本跨度。
        en: A document reference links to the UTF-16 text span [412,795).
        ja: document reference は UTF-16 text span [412,795) に接続します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceLocation
      related_relation_ids:
        - SourceReference-has_location-SourceLocation
      expected_result:
        zh: 建立 SourceReference —has_location→ SourceLocation，并保持该方向与限定条件。
        en: Assert SourceReference —has_location→ SourceLocation while preserving its direction and qualifiers.
        ja: SourceReference —has_location→ SourceLocation を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 位置的坐标系统针对该引用的来源表示。
        en: The location's coordinate system is scoped to the referenced source representation.
        ja: location coordinate system は referenced source representation に scope されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-location-008
    - id: SourceReference-has_location-SourceLocation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: SourceReference-has_location-SourceLocation边界例
        en: SourceReference-has_location-SourceLocation boundary case
        ja: SourceReference-has_location-SourceLocation境界例
      scenario_id: null
      descriptions:
        zh: 同一 [412,795) 范围同时出现在两个不同文档中。
        en: The same [412,795) range occurs in two different documents.
        ja: 同じ [412,795) range が二 different document に現れます。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceLocation
      related_relation_ids:
        - SourceReference-has_location-SourceLocation
      expected_result:
        zh: 拒绝建立 SourceReference-has_location-SourceLocation，两端对象仍保留各自身份。
        en: Reject SourceReference-has_location-SourceLocation; both endpoint objects retain their own identities.
        ja: SourceReference-has_location-SourceLocation を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 范围数值相同不能推断它属于任一引用。
        en: Equal range values cannot infer which reference owns the location.
        ja: equal range value からどの reference の location か推論できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-location-009
  source_claims:
    - claim-source-location-010
  distinct_fact_rationale:
    zh: SourceReference-has_location-SourceLocation 记录 SourceReference 到 SourceLocation 的单一 has_location 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceReference-has_location-SourceLocation records one has_location fact from SourceReference to SourceLocation; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceReference-has_location-SourceLocation は SourceReference から SourceLocation への一 has_location fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
