schema: moonweave.ai/ontology-node/v1
id: SourceLocation
kind: concept
labels:
  zh: 来源位置
  en: source location
  ja: 出典位置
semantics:
  short_definition:
    zh: 在已引用对象内部选择证据片段的位置分支根。
    en: Root branch for selecting evidence fragments inside an already-referenced object.
    ja: 参照済 object 内部で evidence fragment を選ぶ location branch root。
  definition:
    zh: SourceLocation 拥有 SourceOffset、SourceRange、SourceRegion 子结构，回答“对象内哪一段”；必须与 SourceReference 指针配合，不能单独充当引用。
    en: SourceLocation owns SourceOffset, SourceRange, SourceRegion substructures answering which segment inside the object—it must accompany SourceReference pointers and cannot alone serve as a reference.
    ja: SourceLocation は object 内 segment 選択。
  why_needed:
    zh: 把位置独立成家族，可以清楚区分“引用哪个对象”和“选中对象中的哪一部分”，并防止路径、版本与内容锚继续混在一层。
    en: Making location an independent family separates which object is referenced from which part of that object is selected, preventing paths, versions, and content anchors from remaining in one flat layer.
    ja: location を独立 family にすることで「どの object を参照するか」と「そのどの部分を選ぶか」を分け、path・version・content anchor の平坦混在を防ぎます。
  includes:
    - zh: 带坐标系和单位的偏移、一维行/页/文本范围，以及带两个独立坐标轴的工作表区域。
      en: Offsets, one-dimensional line/page/text ranges, and worksheet regions with two independently bounded axes.
      ja: coordinate system/unit を持つ offset・one-dimensional line/page/text range と、二つの independently bounded axis を持つ worksheet region。
  excludes:
    - zh: 资源 URI、文档版本、内容摘要、引用标签和用于恢复漂移文本的精确引文。
      en: Resource URIs, document versions, content digests, citation labels, and exact quotations used to recover drifting text.
      ja: resource URI・document version・content digest・citation label・drift text を復元する exact quotation。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: lines:42..58、pages:3..3、cells:B2:D10 等坐标系由子类表达。
    en: Coordinate systems like lines:42..58, pages:3..3, cells:B2:D10 expressed by subclasses.
    ja: coordinate subclasses。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - source_reference_id
    - source_identity_id
    - coordinate_system
  fields:
    - id: source_reference_id
      labels:
        zh: 来源引用标识
        en: source reference ID
        ja: 出典参照 ID
      definitions:
        zh: 固定该选择器在其中解释的 SourceReference；相同坐标不能脱离来源引用独立识别位置。
        en: Pins the SourceReference within which the selector is interpreted; the same coordinate cannot identify a location independently of its source reference.
        ja: selector を解釈する SourceReference を固定し、同じ coordinate だけでは source reference から独立して location を識別できません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: src-ref-runbook-v7
      allowed_values: []
      source_claims:
        - claim-source-location-002
    - id: source_identity_id
      labels:
        zh: 来源状态标识
        en: source identity ID
        ja: 出典状態 ID
      definitions:
        zh: 固定坐标适用的来源版本或摘要状态，防止同一数值在内容更新后静默漂移。
        en: Pins the version-or-digest state to which the coordinate applies so the same number cannot silently drift after content changes.
        ja: coordinate が適用される version/digest state を固定し、content 更新後に同じ数値が静かに drift することを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: source-identity-runbook-v7
      allowed_values: []
      source_claims:
        - claim-source-location-003
    - id: coordinate_system
      labels:
        zh: 坐标系统
        en: coordinate system
        ja: 座標系
      definitions:
        zh: 声明偏移或范围相对于哪一种来源表示解释。
        en: Declares the source representation against which an offset or range is interpreted.
        ja: offset/range をどの source representation に対して解釈するか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: utf16-code-unit
      allowed_values: []
      source_claims:
        - claim-source-location-004
  constraints: []
  required_relations: []
examples:
  - id: SourceLocation-example-line-range
    labels:
      zh: 行范围
      en: Line range
      ja: line range
    descriptions:
      zh: repo://docs/security-boundary.md lines:42..58 使用 SourceLineRange。
      en: repo://docs/security-boundary.md lines:42..58 uses SourceLineRange.
      ja: line range。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: line range
    field_values: {}
    related_node_ids:
      - SourceLocation
      - SourceLineRange
    related_relation_ids: []
    source_claims:
      - claim-source-location-design
  - id: SourceLocation-example-page-range
    labels:
      zh: 页范围
      en: Page range
      ja: page range
    descriptions:
      zh: policy.pdf pages:3..3 使用 SourcePageRange。
      en: policy.pdf pages:3..3 uses SourcePageRange.
      ja: page range。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: page range
    field_values: {}
    related_node_ids:
      - SourceLocation
      - SourcePageRange
    related_relation_ids: []
    source_claims:
      - claim-source-location-design
  - id: SourceLocation-example-without-pointer
    labels:
      zh: 无指针边界
      en: Without pointer boundary
      ja: pointer なし境界
    descriptions:
      zh: 单独 SourceLocation 没有 SourceReference 指针时不得构成完整 Citation。
      en: SourceLocation alone without SourceReference pointer cannot form complete Citation.
      ja: pointer+location 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceLocation
    related_relation_ids: []
    source_claims:
      - claim-source-location-design
parent_relation:
  id: SourceReference-has_location-SourceLocation
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有来源位置
    en: has source location
    ja: 出典位置を持つ
  definitions:
    zh: 来源引用具有位置关系把所引用对象连接到在该对象指定表示内解释的点或范围选择；位置不能脱离引用独自确定 referent。
    en: SourceReference has_location SourceLocation links the referenced object to a point or range interpreted within a specified representation of that object; the location cannot determine the referent independently of the reference.
    ja: SourceReference has_location SourceLocation は referenced object をその specified representation 内で解釈する point/range に結び、location 単独では referent を決定できません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有来源位置
      en: inverse of has source location
      ja: 逆：出典位置を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceReference-has_location-SourceLocation-example-positive-manual-001
      labels:
        zh: SourceReference-has_location-SourceLocation正例
        en: SourceReference-has_location-SourceLocation positive case
        ja: SourceReference-has_location-SourceLocation正例
      descriptions:
        zh: 文档引用连接 UTF-16 [412,795) 文本跨度。
        en: A document reference links to the UTF-16 text span [412,795).
        ja: document reference は UTF-16 text span [412,795) に接続します。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceLocation
      related_relation_ids:
        - SourceReference-has_location-SourceLocation
      source_claims:
        - claim-source-location-008
    - id: SourceReference-has_location-SourceLocation-example-boundary-manual-001
      labels:
        zh: SourceReference-has_location-SourceLocation边界例
        en: SourceReference-has_location-SourceLocation boundary case
        ja: SourceReference-has_location-SourceLocation境界例
      descriptions:
        zh: 同一 [412,795) 范围同时出现在两个不同文档中。
        en: The same [412,795) range occurs in two different documents.
        ja: 同じ [412,795) range が二 different document に現れます。
      field_values: {}
      related_node_ids:
        - SourceReference
        - SourceLocation
      related_relation_ids:
        - SourceReference-has_location-SourceLocation
      source_claims:
        - claim-source-location-009
  source_claims:
    - claim-source-location-010
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-location-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines a Selector as the description of how to determine a segment from within a source resource; Moonweave uses that role for SourceLocation.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-002
    source: eng-std-w3c-web-annotation-model
    supports: W3C selectors determine a segment within a particular source resource. Moonweave therefore makes the owning SourceReference part of SourceLocation identity.
    locator: §4 Specific Resources and §4.2 Selectors
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-003
    source: eng-std-w3c-web-annotation-model
    supports: W3C separates source state from the selector used within that state. Moonweave records the referenced SourceIdentity explicitly on each SourceLocation.
    locator: §4.1 States and §4.2 Selectors
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-004
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines a Selector as the description of how to determine a segment from within a source resource; Moonweave uses that role for SourceLocation. For SourceLocation.coordinate_system, the field records this reviewed value: Declares the source representation against which an offset or range is interpreted."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-005
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines a Selector as the description of how to determine a segment from within a source resource; Moonweave uses that role for SourceLocation. This evidence supports the manually reviewed positive case for SourceLocation: Select [412,795) in the utf16-code-unit coordinate system of document version v7."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines a Selector as the description of how to determine a segment from within a source resource; Moonweave uses that role for SourceLocation. This evidence supports the manually reviewed instance case for SourceLocation: A reference links to a page range through has_location and the viewer interprets page numbers."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines a Selector as the description of how to determine a segment from within a source resource; Moonweave uses that role for SourceLocation. This evidence supports the manually reviewed boundary case for SourceLocation: Version value v7 specifies a content state but has no internal coordinate."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines a Selector as describing how to determine a segment from within the Source resource; this cross-link preserves that source-selector dependency. This evidence supports the manually reviewed positive case for SourceReference-has_location-SourceLocation: A document reference links to the UTF-16 text span [412,795)."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C defines a Selector as describing how to determine a segment from within the Source resource; this cross-link preserves that source-selector dependency. This evidence supports the manually reviewed boundary case for SourceReference-has_location-SourceLocation: The same [412,795) range occurs in two different documents."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines a Selector as describing how to determine a segment from within the Source resource; this cross-link preserves that source-selector dependency.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-location-design
    source: src-info-sources-design
    supports: SourceLocation selects internal segments and requires accompanying SourceReference pointer.
    locator: SourceLocation
    evidence_kind: design-inference
    confidence: high
