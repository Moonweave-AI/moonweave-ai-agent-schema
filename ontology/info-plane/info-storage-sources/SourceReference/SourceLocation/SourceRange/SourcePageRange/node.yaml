schema: moonweave.ai/ontology-node/v1
id: SourcePageRange
kind: concept
labels:
  zh: 来源页范围
  en: source page range
  ja: 出典ページ範囲
semantics:
  short_definition:
    zh: 分页文档中的页码闭区间范围。
    en: Closed page-number interval range in a paginated document.
    ja: paginated document 中の page 番号閉区間 range。
  definition:
    zh: SourcePageRange 用于 PDF/幻灯片等 page reference Citation；pages:3..3 表示第 3 页。
    en: SourcePageRange supports PDF/slide page-reference Citations; pages:3..3 denotes page 3.
    ja: SourcePageRange は page citation。
  why_needed:
    zh: 页码只对具体分页表示有意义；关联来源身份后才能区分 PDF 印刷页、逻辑页和查看器页。
    en: Page numbers are meaningful only for a particular paginated representation; linking identity distinguishes PDF printed pages, logical pages, and viewer pages.
    ja: page number は特定 paginated representation にだけ意味があり、identity linkage が PDF printed page・logical page・viewer page を区別します。
  includes:
    - zh: 对固定版 PDF 或其他稳定分页表示声明的连续页范围。
      en: Contiguous page ranges declared for a fixed-edition PDF or other stable paginated representation.
      ja: fixed-edition PDF または stable paginated representation の contiguous page range。
  excludes:
    - zh: 可重排网页的屏幕页、单一偏移、无文档版本的临时打印页和页内文本跨度。
      en: Screen pages of reflowable web content, point offsets, temporary print pages without document version, and text spans within a page.
      ja: reflowable web content の screen page・point offset・document version のない temporary print page・page 内 text span。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: RAG PDF 检索命中常带 page metadata 映射 SourcePageRange。
    en: RAG PDF retrieval hits often carry page metadata mapping to SourcePageRange.
    ja: PDF page metadata。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - start_page
    - end_page
    - page_base
    - endpoint_rule
  fields:
    - id: start_page
      labels:
        zh: 起始页
        en: start page
        ja: 開始ページ
      definitions:
        zh: 指定分页表示中的首个页码。
        en: The first page number in the specified paginated representation.
        ja: 指定 paginated representation の first page number。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 42
      allowed_values: []
      source_claims:
        - claim-source-page-range-002
    - id: end_page
      labels:
        zh: 结束页
        en: end page
        ja: 終了ページ
      definitions:
        zh: 指定分页表示中的末页边界。
        en: The final-page boundary in the specified paginated representation.
        ja: 指定 paginated representation の final-page boundary。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 45
      allowed_values: []
      source_claims:
        - claim-source-page-range-003
    - id: page_base
      labels:
        zh: 页码基准
        en: page-number base
        ja: 頁番号基準
      definitions:
        zh: 声明首个物理页的编号基准；显示页标签与物理页序号不得隐式混用。
        en: Declares the numbering base for the first physical page; display labels and physical page indexes must not be mixed implicitly.
        ja: first physical page の numbering base を宣言し、display label と physical page index を暗黙に混用しません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims:
        - claim-source-page-range-004
    - id: endpoint_rule
      labels:
        zh: 页终点约定
        en: page endpoint rule
        ja: 頁端点規則
      definitions:
        zh: 声明 end_page 是排他边界，统一为 [start_page,end_page)。
        en: Declares end_page as an exclusive boundary using [start_page,end_page).
        ja: end_page を exclusive boundary とし [start_page,end_page) を使用します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "[start_page,end_page)"
      allowed_values: []
      source_claims:
        - claim-source-page-range-005
  constraints: []
  required_relations: []
examples:
  - id: SourcePageRange-example-pdf
    labels:
      zh: PDF 单页
      en: PDF single page
      ja: PDF 単一 page
    descriptions:
      zh: policy.pdf pages:3..3 Citation。
      en: policy.pdf pages:3..3 Citation.
      ja: PDF page。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: page range
    field_values:
      source_range: pages:3..3
    related_node_ids:
      - SourcePageRange
    related_relation_ids: []
    source_claims:
      - claim-source-page-design
  - id: SourcePageRange-example-multi-page
    labels:
      zh: 多页范围
      en: Multi-page range
      ja: multi-page range
    descriptions:
      zh: pages:2..4 引用连续三页。
      en: pages:2..4 cites three consecutive pages.
      ja: multi page。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: multi page
    field_values: {}
    related_node_ids:
      - SourcePageRange
    related_relation_ids: []
    source_claims:
      - claim-source-page-design
  - id: SourcePageRange-example-markdown
    labels:
      zh: Markdown 非页码
      en: Markdown not paged
      ja: Markdown 非 page
    descriptions:
      zh: 纯 Markdown 行引用应使用 SourceLineRange。
      en: Pure Markdown line citations should use SourceLineRange.
      ja: md→lines。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourcePageRange
    related_relation_ids: []
    source_claims:
      - claim-source-page-design
parent_relation:
  id: SourcePageRange-is_a-SourceRange
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源页范围是一种来源范围，并以固定分页表示中的连续起止页为种差。
    en: SourcePageRange is a SourceRange specialized by contiguous start and end pages in a fixed-pagination representation.
    ja: SourcePageRange は fixed-pagination representation の contiguous start/end page で細分化した SourceRange です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourcePageRange-is_a-SourceRange-example-positive-manual-001
      labels:
        zh: SourcePageRange-is_a-SourceRange正例
        en: SourcePageRange-is_a-SourceRange positive case
        ja: SourcePageRange-is_a-SourceRange正例
      descriptions:
        zh: PDF v3 的第 42–45 页形成可复现页范围。
        en: Pages 42–45 of PDF v3 form a reproducible page range.
        ja: PDF v3 の pages 42–45 は reproducible page range を形成します。
      field_values: {}
      related_node_ids:
        - SourcePageRange
        - SourceRange
      related_relation_ids:
        - SourcePageRange-is_a-SourceRange
      source_claims:
        - claim-source-page-range-011
    - id: SourcePageRange-is_a-SourceRange-example-boundary-manual-001
      labels:
        zh: SourcePageRange-is_a-SourceRange边界例
        en: SourcePageRange-is_a-SourceRange boundary case
        ja: SourcePageRange-is_a-SourceRange境界例
      descriptions:
        zh: 响应式页面在不同设备产生不同屏数。
        en: A responsive page produces different screen counts on different devices.
        ja: responsive page は device ごとに異なる screen count になります。
      field_values: {}
      related_node_ids:
        - SourcePageRange
        - SourceRange
      related_relation_ids:
        - SourcePageRange-is_a-SourceRange
      source_claims:
        - claim-source-page-range-012
  source_claims:
    - claim-source-page-range-013
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-page-range-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. For SourcePageRange.start_page, the field records this reviewed value: The first page number in the specified paginated representation."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. For SourcePageRange.end_page, the field records this reviewed value: The final-page boundary in the specified paginated representation."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires sufficient selector information. Moonweave makes page-number base explicit because physical indexes and printed labels can differ.
    locator: §4.2 Selectors > determining a segment within a source
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C uses an inclusive start and exclusive end. Moonweave applies the same non-overlapping convention to physical-page intervals.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. This evidence supports the manually reviewed positive case for SourcePageRange: start_page=42,end_page=45 selects four contiguous pages of PDF version 3."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. This evidence supports the manually reviewed instance case for SourcePageRange: A report cites pages 42–45 of a standard and separately links SourceVersion."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. This evidence supports the manually reviewed boundary case for SourcePageRange: A responsive page occupies twelve screens on mobile and five on desktop."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. This claim supports only the SourcePageRange endpoint of its sibling distinction.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract. This claim supports only the SourceSpan endpoint of its sibling distinction.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-011
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes Selector interpretation dependent on source representation and media type; Moonweave requires stable pagination. This evidence supports the manually reviewed positive case for SourcePageRange-is_a-SourceRange: Pages 42–45 of PDF v3 form a reproducible page range."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-012
    source: eng-std-w3c-web-annotation-model
    supports: "W3C makes Selector interpretation dependent on source representation and media type; Moonweave requires stable pagination. This evidence supports the manually reviewed boundary case for SourcePageRange-is_a-SourceRange: A responsive page produces different screen counts on different devices."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-range-013
    source: eng-std-w3c-web-annotation-model
    supports: W3C makes Selector interpretation dependent on source representation and media type; Moonweave requires stable pagination.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-page-design
    source: src-info-sources-design
    supports: SourcePageRange cites paginated documents by page intervals.
    locator: SourcePageRange
    evidence_kind: design-inference
    confidence: high
