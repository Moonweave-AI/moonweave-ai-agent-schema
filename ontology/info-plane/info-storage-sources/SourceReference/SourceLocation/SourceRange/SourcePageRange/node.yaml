schema: moonweave.ai/ontology-node/v1
id: SourcePageRange
kind: concept
status: accepted
labels:
  zh: 来源页范围
  en: source page range
  ja: 出典ページ範囲
semantics:
  short_definition:
    zh: 在固定分页表示中选定连续页段的来源范围。
    en: A source range selecting contiguous pages in a fixed-pagination representation.
    ja: fixed-pagination representation の contiguous page segment を選ぶ source range。
  definition:
    zh: 来源页范围是来源范围的一类，种差是对具有稳定分页的指定表示保存起止页与页码基准；可重排网页、无版次限定的文档或查看器临时页码不满足该身份。
    en: SourcePageRange is a SourceRange specialized by start/end pages and page-number base for a specified representation with stable pagination; reflowable pages, documents without representation version, and viewer-temporary page numbers do not qualify.
    ja: SourcePageRange は stable pagination を持つ指定 representation の start/end page と page-number base を持つ SourceRange です。reflowable page・version 未指定 document・viewer temporary page number は含みません。
  why_needed:
    zh: 页码只对具体分页表示有意义；关联来源身份后才能区分 PDF 印刷页、逻辑页和查看器页。
    en: Page numbers are meaningful only for a particular paginated representation; linking identity distinguishes PDF printed pages, logical pages, and viewer pages.
    ja: page number は特定 paginated representation にだけ意味があり、identity linkage が PDF printed page・logical page・viewer page を区別します。
  includes:
    - zh: 对固定版 PDF 或其他稳定分页表示声明的连续页范围。
      en: Contiguous page ranges declared for a fixed-edition PDF or other stable paginated representation.
      ja: fixed-edition PDF または stable paginated representation の contiguous page range。
  excludes:
    - zh: 可重排网页的屏幕页、单一偏移、无文档版本的临时打印页和页内文本跨度。
      en: Screen pages of reflowable web content, point offsets, temporary print pages without document version, and text spans within a page.
      ja: reflowable web content の screen page・point offset・document version のない temporary print page・page 内 text span。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - start_page
    - end_page
    - page_base
    - endpoint_rule
  fields:
    - id: start_page
      labels:
        zh: 起始页
        en: start page
        ja: 開始ページ
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定分页表示中的首个页码。
        en: The first page number in the specified paginated representation.
        ja: 指定 paginated representation の first page number。
      allowed_values: []
      pattern: null
      example_value: 42
      source_claims:
        - claim-source-page-range-002
    - id: end_page
      labels:
        zh: 结束页
        en: end page
        ja: 終了ページ
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定分页表示中的末页边界。
        en: The final-page boundary in the specified paginated representation.
        ja: 指定 paginated representation の final-page boundary。
      allowed_values: []
      pattern: null
      example_value: 45
      source_claims:
        - claim-source-page-range-003
    - id: page_base
      labels:
        zh: 页码基准
        en: page-number base
        ja: 頁番号基準
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明首个物理页的编号基准；显示页标签与物理页序号不得隐式混用。
        en: Declares the numbering base for the first physical page; display labels and physical page indexes must not be mixed implicitly.
        ja: first physical page の numbering base を宣言し、display label と physical page index を暗黙に混用しません。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-source-page-range-004
    - id: endpoint_rule
      labels:
        zh: 页终点约定
        en: page endpoint rule
        ja: 頁端点規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 end_page 是排他边界，统一为 [start_page,end_page)。
        en: Declares end_page as an exclusive boundary using [start_page,end_page).
        ja: end_page を exclusive boundary とし [start_page,end_page) を使用します。
      allowed_values: []
      pattern: null
      example_value: "[start_page,end_page)"
      source_claims:
        - claim-source-page-range-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourcePageRange-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源页范围正例
      en: source page range positive case
      ja: 出典ページ範囲正例
    scenario_id: null
    descriptions:
      zh: PDF version 3 的 start_page=42,end_page=45 按半开区间选择第 42 至 44 页，共连续三页。
      en: With a half-open interval, start_page=42,end_page=45 selects three contiguous pages, pages 42 through 44, of PDF version 3.
      ja: 半開区間では PDF version 3 の start_page=42,end_page=45 が 42～44 page、連続三 page を選びます。
    field_values:
      start_page: 42
      end_page: 45
      page_base: 1
      endpoint_rule: "[start_page,end_page)"
      start: 42
      end: 45
      unit: page
      source_reference_id: file-ref-runbook-pdf-v3
      source_identity_id: source-identity-runbook-pdf-v3
      coordinate_system: one-based-pdf-page-number
    related_node_ids:
      - SourcePageRange
      - SourceRange
    related_relation_ids:
      - SourcePageRange-is_a-SourceRange
    expected_result:
      zh: SourcePageRange 保持其已审查身份，并按定义解释 SourcePageRange-is_a-SourceRange。
      en: Retain the reviewed identity of SourcePageRange and interpret SourcePageRange-is_a-SourceRange exactly as defined.
      ja: SourcePageRange の reviewed identity を保持し SourcePageRange-is_a-SourceRange を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 分页表示及版本固定，页码可复现。
      en: The paginated representation and version are fixed, making page numbers reproducible.
      ja: paginated representation と version が固定され page number を再現できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-page-range-006
  - id: SourcePageRange-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源页范围实例
      en: source page range instance case
      ja: 出典ページ範囲実例
    scenario_id: null
    descriptions:
      zh: 报告引用标准第 42–45 页，并另连 SourceVersion。
      en: A report cites pages 42–45 of a standard and separately links SourceVersion.
      ja: report は standard の pages 42–45 を cite し SourceVersion を別に結びます。
    field_values:
      start_page: 42
      end_page: 45
      page_base: 1
      endpoint_rule: "[start_page,end_page)"
    related_node_ids:
      - SourcePageRange
      - SourceRange
    related_relation_ids:
      - SourcePageRange-is_a-SourceRange
    expected_result:
      zh: SourcePageRange 保持其已审查身份，并按定义解释 SourcePageRange-is_a-SourceRange。
      en: Retain the reviewed identity of SourcePageRange and interpret SourcePageRange-is_a-SourceRange exactly as defined.
      ja: SourcePageRange の reviewed identity を保持し SourcePageRange-is_a-SourceRange を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 位置和版本保持独立但可联合解析。
      en: Location and version remain separate but can be resolved together.
      ja: location と version は分離しつつ共同解決できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-page-range-007
  - id: SourcePageRange-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源页范围边界例
      en: source page range boundary case
      ja: 出典ページ範囲境界例
    scenario_id: null
    descriptions:
      zh: 响应式网页在手机上显示为 12 屏、桌面上显示为 5 屏。
      en: A responsive page occupies twelve screens on mobile and five on desktop.
      ja: responsive page は mobile で十二 screen、desktop で五 screen です。
    field_values:
      line_number: 12
      rendering_mode: responsive-screen
    related_node_ids:
      - SourcePageRange
      - SourceRange
    related_relation_ids:
      - SourcePageRange-is_a-SourceRange
    expected_result:
      zh: 不把该对象归入 SourcePageRange，也不凭邻近或词形推断 SourcePageRange-is_a-SourceRange。
      en: Do not classify the object as SourcePageRange or infer SourcePageRange-is_a-SourceRange from proximity or lexical form.
      ja: object を SourcePageRange に分類せず proximity/lexical form から SourcePageRange-is_a-SourceRange を推論しません。
    why_valid_or_invalid:
      zh: 屏幕动态分页不是稳定且可重现的来源分页。
      en: Screen pagination is not stable source pagination.
      ja: screen pagination は stable source pagination ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-page-range-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SourceSpan
    shared_parent_concept_id: SourceRange
    differentia:
      zh: 来源页范围依据“来源页范围是来源范围的一类，种差是对具有稳定分页的指定表示保存起止页与页码基准；可重排网页、无版次限定的文档或查看器临时页码不满足该身份。”归类；来源文本跨度依据“来源文本跨度是来源范围的一类，种差是在指定文本表示与字符单位中采用 start-inclusive、end-exclusive 边界选择连续字符；它不复制所选文本，也不能在内容修改后自行重识别。”归类。二者共享 SourceRange，但任一端条件均不推出另一端。
      en: SourcePageRange is classified by “SourcePageRange is a SourceRange specialized by start/end pages and page-number base for a specified representation with stable pagination; reflowable pages, documents without representation version, and viewer-temporary page numbers do not qualify.” whereas SourceSpan is classified by “SourceSpan is a SourceRange specialized by start-inclusive and end-exclusive boundaries in a specified text representation and character unit; it does not copy selected text and cannot re-identify the segment after content changes by itself.”. They share SourceRange, but satisfying either condition leaves the other unproven.
      ja: SourcePageRange は「SourcePageRange は stable pagination を持つ指定 representation の start/end page と page-number base を持つ SourceRange です。reflowable page・version 未指定 document・viewer temporary page number は含みません。」で分類し、SourceSpan は「SourceSpan は指定 text representation/character unit の start-inclusive・end-exclusive boundary で contiguous character を選ぶ SourceRange です。selected text を copy せず、content change 後の再識別も単独ではできません。」で分類します。両者は SourceRange を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-source-page-range-009
      - claim-source-page-range-010
