schema: moonweave.ai/ontology-node/v1
id: SourceSpan
kind: concept
status: review
labels:
  zh: 来源文本跨度
  en: source text span
  ja: 出典テキスト範囲
semantics:
  short_definition:
    zh: 以字符流起止位置选定文本片段的来源范围。
    en: A source range selecting a text segment by start and end in a character stream.
    ja: character stream の start/end で text segment を選ぶ source range。
  definition:
    zh: 来源文本跨度是来源范围的一类，种差是在指定文本表示与字符单位中采用 start-inclusive、end-exclusive 边界选择连续字符；它不复制所选文本，也不能在内容修改后自行重识别。
    en: SourceSpan is a SourceRange specialized by start-inclusive and end-exclusive boundaries in a specified text representation and character unit; it does not copy selected text and cannot re-identify the segment after content changes by itself.
    ja: SourceSpan は指定 text representation/character unit の start-inclusive・end-exclusive boundary で contiguous character を選ぶ SourceRange です。selected text を copy せず、content change 後の再識別も単独ではできません。
  why_needed:
    zh: 文本跨度明确字符单位和半开区间，防止 Unicode 代码点、UTF-16 单元和字节偏移之间的隐式换算。
    en: Text spans make character unit and half-open interval explicit, preventing implicit conversion among Unicode code points, UTF-16 units, and byte offsets.
    ja: text span は character unit と half-open interval を明示し Unicode code point・UTF-16 unit・byte offset の暗黙変換を防ぎます。
  includes:
    - zh: 在固定文本表示中带 start、end 和 character_unit 的连续文本片段。
      en: Contiguous text segments with start, end, and character_unit in a fixed text representation.
      ja: fixed text representation 内で start・end・character_unit を持つ contiguous text segment。
  excludes:
    - zh: 复制的引文文本、字节范围、整行范围和内容改动后用于重识别的锚。
      en: Copied quotation text, byte ranges, whole-line ranges, and anchors used for re-identification after edits.
      ja: copied quotation text・byte range・whole-line range・edit 後の re-identification anchor。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - start_character
    - end_character
    - character_unit
    - endpoint_rule
  fields:
    - id: start_character
      labels:
        zh: 字符起点
        en: character start
        ja: 文字開始
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 所选文本首字符之前的位置，包含该字符。
        en: The position before the first selected character, which is included.
        ja: selected first character の直前位置で、その character を含みます。
      allowed_values: []
      pattern: null
      example_value: 412
      source_claims:
        - claim-source-span-002
    - id: end_character
      labels:
        zh: 字符终点
        en: character end
        ja: 文字終了
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 所选文本末字符之后的位置，不包含该位置字符。
        en: The position after the last selected character, excluding the character at that position.
        ja: selected last character の後位置で、その位置の character を含みません。
      allowed_values: []
      pattern: null
      example_value: 795
      source_claims:
        - claim-source-span-003
    - id: character_unit
      labels:
        zh: 字符计量单位
        en: character unit
        ja: 文字計量単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明字符边界按 Unicode 码点、UTF-16 代码单元或其他明确单位计数。
        en: Declares whether character boundaries are counted as Unicode code points, UTF-16 code units, or another explicit unit.
        ja: character boundary を Unicode code point・UTF-16 code unit・その他 explicit unit のどれで数えるか宣言します。
      allowed_values: []
      pattern: null
      example_value: unicode-code-point
      source_claims:
        - claim-source-span-004
    - id: endpoint_rule
      labels:
        zh: 字符终点约定
        en: character endpoint rule
        ja: 文字端点規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 end_character 为排他边界，统一为 [start_character,end_character)。
        en: Declares end_character as an exclusive boundary using [start_character,end_character).
        ja: end_character を exclusive boundary とし [start_character,end_character) を使用します。
      allowed_values: []
      pattern: null
      example_value: "[start_character,end_character)"
      source_claims:
        - claim-source-span-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceSpan-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源文本跨度正例
      en: source text span positive case
      ja: 出典テキスト範囲正例
    scenario_id: null
    descriptions:
      zh: UTF-16 文本中 start=412,end=795 选择 [412,795) 字符单元。
      en: In UTF-16 text, start=412,end=795 selects character units [412,795).
      ja: UTF-16 text で start=412,end=795 は character unit [412,795) を選びます。
    field_values:
      start_character: 412
      end_character: 795
      character_unit: utf16-code-unit
      endpoint_rule: "[start_character,end_character)"
      start: 412
      end: 795
      unit: utf16-code-unit
      source_reference_id: text-document-ref-ops-recovery-v7
      source_identity_id: source-identity-ops-recovery-v7
      coordinate_system: utf16-code-unit
    related_node_ids:
      - SourceSpan
      - SourceRange
    related_relation_ids:
      - SourceSpan-is_a-SourceRange
    expected_result:
      zh: SourceSpan 保持其已审查身份，并按定义解释 SourceSpan-is_a-SourceRange。
      en: Retain the reviewed identity of SourceSpan and interpret SourceSpan-is_a-SourceRange exactly as defined.
      ja: SourceSpan の reviewed identity を保持し SourceSpan-is_a-SourceRange を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 字符表示、计数单位和半开区间边界信息完整。
      en: Text representation, unit, and half-open boundaries are complete.
      ja: text representation・unit・half-open boundary が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-span-006
  - id: SourceSpan-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源文本跨度实例
      en: source text span instance case
      ja: 出典テキスト範囲実例
    scenario_id: null
    descriptions:
      zh: 输出引用保存 SourceSpan，再用 ContentAnchor 处理后续文本漂移。
      en: An output citation stores SourceSpan and uses ContentAnchor separately for later text drift.
      ja: output citation は SourceSpan を保存し後続 text drift に ContentAnchor を別利用します。
    field_values:
      start_character: 412
      end_character: 795
      character_unit: unicode-code-point
      endpoint_rule: "[start_character,end_character)"
    related_node_ids:
      - SourceSpan
      - SourceRange
    related_relation_ids:
      - SourceSpan-is_a-SourceRange
    expected_result:
      zh: SourceSpan 保持其已审查身份，并按定义解释 SourceSpan-is_a-SourceRange。
      en: Retain the reviewed identity of SourceSpan and interpret SourceSpan-is_a-SourceRange exactly as defined.
      ja: SourceSpan の reviewed identity を保持し SourceSpan-is_a-SourceRange を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 精确坐标与重识别信息保持不同节点。
      en: Exact coordinates and re-identification information remain separate nodes.
      ja: exact coordinate と re-identification information は別 node を保ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-span-007
  - id: SourceSpan-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源文本跨度边界例
      en: source text span boundary case
      ja: 出典テキスト範囲境界例
    scenario_id: null
    descriptions:
      zh: exact='access denied' 只保存引文，没有 start 与 end。
      en: exact='access denied' stores a quotation but has no start or end.
      ja: exact='access denied' は quotation を保存するが start/end がありません。
    field_values:
      quote_without_coordinates: access denied
    related_node_ids:
      - SourceSpan
      - SourceRange
    related_relation_ids:
      - SourceSpan-is_a-SourceRange
    expected_result:
      zh: 不把该对象归入 SourceSpan，也不凭邻近或词形推断 SourceSpan-is_a-SourceRange。
      en: Do not classify the object as SourceSpan or infer SourceSpan-is_a-SourceRange from proximity or lexical form.
      ja: object を SourceSpan に分類せず proximity/lexical form から SourceSpan-is_a-SourceRange を推論しません。
    why_valid_or_invalid:
      zh: 该对象是 ContentAnchor，不是 SourceSpan。
      en: That object is a ContentAnchor, not a SourceSpan.
      ja: その object は SourceSpan ではなく ContentAnchor です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-span-008
external_mappings: []
