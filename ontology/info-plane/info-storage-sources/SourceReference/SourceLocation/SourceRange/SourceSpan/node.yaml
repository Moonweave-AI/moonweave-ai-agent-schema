schema: moonweave.ai/ontology-node/v1
id: SourceSpan
kind: concept
labels:
  zh: 来源文本跨度
  en: source text span
  ja: 出典テキスト範囲
semantics:
  short_definition:
    zh: 规范化正文中的字符偏移闭区间范围。
    en: Closed character-offset interval range in normalized body text.
    ja: 正規化本文中の文字 offset 閉区間 range。
  definition:
    zh: SourceSpan 记录 start/end char offset（或 byte offset 与 unit）；用于 RAG snippet 与 output citation chars:0..479。
    en: SourceSpan records start/end char offsets (or byte offsets with unit) for RAG snippets and output citation chars:0..479.
    ja: SourceSpan は char/byte span。
  why_needed:
    zh: 文本跨度明确字符单位和半开区间，防止 Unicode 代码点、UTF-16 单元和字节偏移之间的隐式换算。
    en: Text spans make character unit and half-open interval explicit, preventing implicit conversion among Unicode code points, UTF-16 units, and byte offsets.
    ja: text span は character unit と half-open interval を明示し Unicode code point・UTF-16 unit・byte offset の暗黙変換を防ぎます。
  includes:
    - zh: 在固定文本表示中带 start、end 和 character_unit 的连续文本片段。
      en: Contiguous text segments with start, end, and character_unit in a fixed text representation.
      ja: fixed text representation 内で start・end・character_unit を持つ contiguous text segment。
  excludes:
    - zh: 复制的引文文本、字节范围、整行范围和内容改动后用于重识别的锚。
      en: Copied quotation text, byte ranges, whole-line ranges, and anchors used for re-identification after edits.
      ja: copied quotation text・byte range・whole-line range・edit 後の re-identification anchor。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 披露模块 chars:0..479 与 SourceSpan 对齐。
    en: Disclosure module chars:0..479 aligns with SourceSpan.
    ja: disclosure chars range。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - start_character
    - end_character
    - character_unit
    - endpoint_rule
  fields:
    - id: start_character
      labels:
        zh: 字符起点
        en: character start
        ja: 文字開始
      definitions:
        zh: 所选文本首字符之前的位置，包含该字符。
        en: The position before the first selected character, which is included.
        ja: selected first character の直前位置で、その character を含みます。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 412
      allowed_values: []
      source_claims:
        - claim-source-span-002
    - id: end_character
      labels:
        zh: 字符终点
        en: character end
        ja: 文字終了
      definitions:
        zh: 所选文本末字符之后的位置，不包含该位置字符。
        en: The position after the last selected character, excluding the character at that position.
        ja: selected last character の後位置で、その位置の character を含みません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 795
      allowed_values: []
      source_claims:
        - claim-source-span-003
    - id: character_unit
      labels:
        zh: 字符计量单位
        en: character unit
        ja: 文字計量単位
      definitions:
        zh: 声明字符边界按 Unicode 码点、UTF-16 代码单元或其他明确单位计数。
        en: Declares whether character boundaries are counted as Unicode code points, UTF-16 code units, or another explicit unit.
        ja: character boundary を Unicode code point・UTF-16 code unit・その他 explicit unit のどれで数えるか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: unicode-code-point
      allowed_values: []
      source_claims:
        - claim-source-span-004
    - id: endpoint_rule
      labels:
        zh: 字符终点约定
        en: character endpoint rule
        ja: 文字端点規則
      definitions:
        zh: 声明 end_character 为排他边界，统一为 [start_character,end_character)。
        en: Declares end_character as an exclusive boundary using [start_character,end_character).
        ja: end_character を exclusive boundary とし [start_character,end_character) を使用します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "[start_character,end_character)"
      allowed_values: []
      source_claims:
        - claim-source-span-005
  constraints: []
  required_relations: []
examples:
  - id: SourceSpan-example-chars
    labels:
      zh: 字符跨度
      en: Character span
      ja: 文字 span
    descriptions:
      zh: chars:0..479 引用 assistant 输出片段。
      en: chars:0..479 cites assistant output fragment.
      ja: output chars。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: chars span
    field_values:
      start: 0
      end: 479
      unit: chars
    related_node_ids:
      - SourceSpan
      - info-output-disclosure
    related_relation_ids: []
    source_claims:
      - claim-source-span-design
  - id: SourceSpan-example-rag
    labels:
      zh: RAG 片段
      en: RAG snippet
      ja: RAG snippet
    descriptions:
      zh: doc snippet chars:1600..2400 与 chunk 对齐。
      en: Doc snippet chars:1600..2400 aligns with chunk.
      ja: RAG span。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: RAG
    field_values: {}
    related_node_ids:
      - SourceSpan
    related_relation_ids: []
    source_claims:
      - claim-source-span-design
  - id: SourceSpan-example-invalid
    labels:
      zh: 无效范围
      en: Invalid range
      ja: invalid range
    descriptions:
      zh: end<start 的 span 必须拒绝。
      en: Span with end<start must be rejected.
      ja: invalid span。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: validation
    field_values: {}
    related_node_ids:
      - SourceSpan
    related_relation_ids: []
    source_claims:
      - claim-source-span-design
parent_relation:
  id: SourceSpan-is_a-SourceRange
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源文本跨度是一种来源范围，并以指定字符单位的起点包含、终点排除区间为种差。
    en: SourceSpan is a SourceRange specialized by a start-inclusive, end-exclusive interval in a specified character unit.
    ja: SourceSpan は指定 character unit の start-inclusive/end-exclusive interval で細分化した SourceRange です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceSpan-is_a-SourceRange-example-positive-manual-001
      labels:
        zh: SourceSpan-is_a-SourceRange正例
        en: SourceSpan-is_a-SourceRange positive case
        ja: SourceSpan-is_a-SourceRange正例
      descriptions:
        zh: UTF-16 [412,795) 选择连续文本单元。
        en: UTF-16 [412,795) selects contiguous text units.
        ja: UTF-16 [412,795) は contiguous text unit を選びます。
      field_values: {}
      related_node_ids:
        - SourceSpan
        - SourceRange
      related_relation_ids:
        - SourceSpan-is_a-SourceRange
      source_claims:
        - claim-source-span-009
    - id: SourceSpan-is_a-SourceRange-example-boundary-manual-001
      labels:
        zh: SourceSpan-is_a-SourceRange边界例
        en: SourceSpan-is_a-SourceRange boundary case
        ja: SourceSpan-is_a-SourceRange境界例
      descriptions:
        zh: exact='selected text' 只有引文内容。
        en: exact='selected text' contains only quotation content.
        ja: exact='selected text' は quotation content だけです。
      field_values: {}
      related_node_ids:
        - SourceSpan
        - SourceRange
      related_relation_ids:
        - SourceSpan-is_a-SourceRange
      source_claims:
        - claim-source-span-010
  source_claims:
    - claim-source-span-011
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-span-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract. For SourceSpan.start_character, the field records this reviewed value: The position before the first selected character, which is included."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract. For SourceSpan.end_character, the field records this reviewed value: The position after the last selected character, excluding the character at that position."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines character-position selectors and warns that processing must use the same normalized representation. Moonweave records the counting unit explicitly.
    locator: §4.2.5 Text Position Selector > character positions
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C makes text-position start inclusive and end exclusive. Moonweave records that rule directly on SourceSpan.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: normative
    confidence: high
  - id: claim-source-span-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract. This evidence supports the manually reviewed positive case for SourceSpan: In UTF-16 text, start=412,end=795 selects character units [412,795)."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract. This evidence supports the manually reviewed instance case for SourceSpan: An output citation stores SourceSpan and uses ContentAnchor separately for later text drift."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector explicitly defines start-inclusive and end-exclusive positions in a text stream; SourceSpan adopts that contract. This evidence supports the manually reviewed boundary case for SourceSpan: exact='access denied' stores a quotation but has no start or end."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines start and end positions with the start included and end excluded; SourceSpan follows that exact contract. This evidence supports the manually reviewed positive case for SourceSpan-is_a-SourceRange: UTF-16 [412,795) selects contiguous text units."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-010
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines start and end positions with the start included and end excluded; SourceSpan follows that exact contract. This evidence supports the manually reviewed boundary case for SourceSpan-is_a-SourceRange: exact='selected text' contains only quotation content."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-011
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines start and end positions with the start included and end excluded; SourceSpan follows that exact contract.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-span-design
    source: src-info-sources-design
    supports: SourceSpan expresses char/byte intervals with ordered bounds.
    locator: SourceSpan
    evidence_kind: design-inference
    confidence: high
