schema: moonweave.ai/ontology-node/v1
id: SourceRange
kind: concept
status: accepted
labels:
  zh: 来源范围
  en: source range
  ja: 出典範囲
semantics:
  short_definition:
    zh: 以同一坐标系的起点和终点选定连续区间的来源位置。
    en: A source location selecting a contiguous interval by start and end in one coordinate system.
    ja: 同一 coordinate system の start/end で contiguous interval を選ぶ source location。
  definition:
    zh: 来源范围是来源位置的一类，种差是在同一有序坐标轴中保存 start 与 end，并采用明确的端点包含规则；行、页和文本跨度继承该一维区间语义，二维单元格区域则属于平级的 SourceRegion 分支。
    en: SourceRange is a SourceLocation specialized by start and end on one ordered coordinate axis plus an explicit endpoint-inclusion rule; line, page, and text ranges inherit this one-dimensional interval meaning, while two-dimensional cell regions belong to the sibling SourceRegion branch.
    ja: SourceRange は一 ordered coordinate axis の start/end と明示 endpoint-inclusion rule を持つ SourceLocation です。line・page・text range はこの one-dimensional interval semantics を継承し、two-dimensional cell region は sibling SourceRegion branch に属します。
  why_needed:
    zh: 公共范围层消除了 SourceLineRange、SourcePageRange 与 SourceSpan 的直接平铺，并集中表达单轴 start/end 顺序与端点约定；它不把二维单元格矩形压成一维区间。
    en: A shared range layer removes the flat placement of SourceLineRange, SourcePageRange, and SourceSpan and centralizes one-axis start/end ordering and endpoint conventions without flattening a two-dimensional cell rectangle into one interval.
    ja: 共通 range layer は SourceLineRange・SourcePageRange・SourceSpan の平置きを解消し、一 axis の start/end ordering と endpoint convention を集約します。two-dimensional cell rectangle を一 interval に平坦化しません。
  includes:
    - zh: 带同一坐标系 start、end 和端点规则的连续来源区间。
      en: Contiguous source intervals with start, end, and endpoint rules in one coordinate system.
      ja: 同一 coordinate system の start・end・endpoint rule を持つ contiguous source interval。
  excludes:
    - zh: 单点偏移、不连续选择集合、内容引文锚和跨两个不同来源的区间。
      en: Point offsets, discontinuous selection sets, content quotation anchors, and intervals spanning two different sources.
      ja: point offset・discontinuous selection set・content quotation anchor・二 source にまたがる interval。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - start
    - end
    - unit
    - endpoint_rule
  fields:
    - id: start
      labels:
        zh: 范围起点
        en: range start
        ja: 範囲開始
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按坐标系统解释的包含起点。
        en: The inclusive start interpreted in the coordinate system.
        ja: coordinate system で解釈する inclusive start。
      allowed_values: []
      pattern: null
      example_value: 412
      source_claims:
        - claim-source-range-002
    - id: end
      labels:
        zh: 范围终点
        en: range end
        ja: 範囲終了
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按声明约定解释的排他或包含终点。
        en: The exclusive or inclusive end interpreted under the declared convention.
        ja: 宣言 convention に従う exclusive/inclusive end。
      allowed_values: []
      pattern: null
      example_value: 795
      source_claims:
        - claim-source-range-003
    - id: unit
      labels:
        zh: 范围单位
        en: range unit
        ja: 範囲単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 start 与 end 按字节、字符、代码单元或其他有序单位解释；不同单位不得直接比较。
        en: Declares whether start and end are interpreted as bytes, characters, code units, or another ordered unit; unlike units cannot be compared directly.
        ja: start/end を byte・character・code unit・その他 ordered unit のどれで解釈するか宣言し、異なる unit は直接比較しません。
      allowed_values: []
      pattern: null
      example_value: unicode-code-point
      source_claims:
        - claim-source-range-004
    - id: endpoint_rule
      labels:
        zh: 端点约定
        en: endpoint rule
        ja: 端点規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明起点包含且终点排他的半开区间约定，避免同一 start/end 被解释成不同长度。
        en: Declares the start-inclusive, end-exclusive half-open interval convention so one start/end pair cannot denote different lengths.
        ja: start-inclusive/end-exclusive の half-open interval を宣言し、同じ start/end が異なる length を示すことを防ぎます。
      allowed_values: []
      pattern: null
      example_value: "[start,end)"
      source_claims:
        - claim-source-range-005
  constraints:
    - id: source-range-ordered-bounds
      severity: error
      expression_language: plain
      expression: start >= 0 and end > start
      explanations:
        zh: 范围起点不得为负，终点必须严格大于起点；空区间与反向区间不是有效 SourceRange。
        en: Range start is non-negative and end is strictly greater than start; empty or reversed intervals are not valid SourceRange values.
        ja: range start は non-negative、end は start より大きく、empty/reversed interval は有効な SourceRange ではありません。
      source_claims:
        - claim-source-range-006
  required_relation_constraints: []
examples:
  - id: SourceRange-example-positive-manual-001

    labels:
      zh: 来源范围正例
      en: source range positive case
      ja: 出典範囲正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SourceRange maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SourceRange maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SourceRange context/token boundary."}

    field_values:
      start: 412
      end: 795
      unit: unicode-code-point
      endpoint_rule: "[start,end)"
      source_reference_id: text-document-ref-ops-recovery-v7
      source_identity_id: source-identity-ops-recovery-v7
      coordinate_system: unicode-code-point
    related_node_ids:
      - SourceRange
      - SourceLocation
    related_relation_ids:
      - SourceRange-is_a-SourceLocation

    source_claims:
      - claim-source-range-007
  - id: SourceRange-example-instance-manual-002

    labels:
      zh: 来源范围实例
      en: source range instance case
      ja: 出典範囲実例

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceRange.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceRange.", ja: "DSPy instance maps to SourceRange PromptTemplate."}

    field_values:
      start: 412
      end: 795
      unit: unicode-code-point
      endpoint_rule: "[start,end)"
    related_node_ids:
      - SourceRange
      - SourceLocation
    related_relation_ids:
      - SourceRange-is_a-SourceLocation

    source_claims:
      - claim-source-range-008
  - id: SourceRange-example-boundary-manual-003

    labels:
      zh: 来源范围边界例
      en: source range boundary case
      ja: 出典範囲境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceRange must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceRange must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values:
      point_offset: 412
    related_node_ids:
      - SourceRange
      - SourceLocation
    related_relation_ids:
      - SourceRange-is_a-SourceLocation

    source_claims:
      - claim-source-range-009
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SourceOffset
    shared_parent_concept_id: SourceLocation
    differentia:
      zh: 来源范围依据“在一个有序坐标轴上记录 start、end 与端点约定，行、页和文本跨度继承该一维区间语义”归类；来源偏移依据“仅记录一个带单位与原点的非负 offset，表示边界点而非有长度区间”归类。二维区域属于 SourceRegion，不属于任一端。二者共享 SourceLocation，但任一端条件均不推出另一端。
      en: SourceRange is classified by start, end, and an endpoint convention on one ordered axis, inherited by line, page, and text ranges; SourceOffset is classified by one non-negative offset with an explicit unit and origin, denoting a point rather than an interval with length. Two-dimensional regions belong to SourceRegion, not either endpoint. Both share SourceLocation, but satisfying either condition leaves the other unproven.
      ja: SourceRange は一 ordered axis の start/end/endpoint convention で line・page・text range に継承され、SourceOffset は explicit unit/origin を持つ一 non-negative offset で point を示します。two-dimensional region は SourceRegion に属します。両者は SourceLocation を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-source-range-010
      - claim-source-range-011
parent_relation:
  id: SourceRange-is_a-SourceLocation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源范围是一种来源位置，并以同一有序坐标系中的起点、终点和端点约定为种差。
    en: SourceRange is a SourceLocation specialized by start, end, and endpoint convention in one ordered coordinate system.
    ja: SourceRange は一 ordered coordinate system の start・end・endpoint convention で細分化した SourceLocation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceRange-is_a-SourceLocation-example-positive-manual-001
      labels:
        zh: SourceRange-is_a-SourceLocation正例
        en: SourceRange-is_a-SourceLocation positive case
        ja: SourceRange-is_a-SourceLocation正例
      scenario_id: null
      descriptions:
        zh: "[412,795) 是一个连续半开区间。"
        en: "[412,795) is one contiguous half-open interval."
        ja: "[412,795) は一 contiguous half-open interval です。"
      field_values: {}
      related_node_ids:
        - SourceRange
        - SourceLocation
      related_relation_ids:
        - SourceRange-is_a-SourceLocation
      source_claims:
        - claim-source-range-012
    - id: SourceRange-is_a-SourceLocation-example-boundary-manual-001
      labels:
        zh: SourceRange-is_a-SourceLocation边界例
        en: SourceRange-is_a-SourceLocation boundary case
        ja: SourceRange-is_a-SourceLocation境界例
      scenario_id: null
      descriptions:
        zh: offset=412 仅表示一个点。
        en: offset=412 denotes only one point.
        ja: offset=412 は一 point だけを示します。
      field_values: {}
      related_node_ids:
        - SourceRange
        - SourceLocation
      related_relation_ids:
        - SourceRange-is_a-SourceLocation
      source_claims:
        - claim-source-range-013
  source_claims:
    - claim-source-range-014
  distinct_fact_rationale:
    zh: SourceRange-is_a-SourceLocation 记录 SourceRange 到 SourceLocation 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceRange-is_a-SourceLocation records one is_a fact from SourceRange to SourceLocation; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceRange-is_a-SourceLocation は SourceRange から SourceLocation への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
