schema: moonweave.ai/ontology-node/v1
id: SourceRange
kind: concept
labels:
  zh: 来源范围
  en: source range
  ja: 出典範囲
semantics:
  short_definition:
    zh: 对象内有起止边界的有序范围上位概念。
    en: Supertype for ordered ranges with start/end boundaries inside an object.
    ja: object 内で start/end 境界を持つ ordered range 上位概念。
  definition:
    zh: SourceRange 子类 SourceSpan、SourceLineRange、SourcePageRange 表达不同坐标系；whole object 引用时 SourceRange 可缺省。
    en: SourceRange subclasses SourceSpan, SourceLineRange, SourcePageRange express coordinate systems; SourceRange may be absent for whole-object references.
    ja: SourceRange は range 上位。
  why_needed:
    zh: 公共范围层消除了 SourceLineRange、SourcePageRange 与 SourceSpan 的直接平铺，并集中表达单轴 start/end 顺序与端点约定；它不把二维单元格矩形压成一维区间。
    en: A shared range layer removes the flat placement of SourceLineRange, SourcePageRange, and SourceSpan and centralizes one-axis start/end ordering and endpoint conventions without flattening a two-dimensional cell rectangle into one interval.
    ja: 共通 range layer は SourceLineRange・SourcePageRange・SourceSpan の平置きを解消し、一 axis の start/end ordering と endpoint convention を集約します。two-dimensional cell rectangle を一 interval に平坦化しません。
  includes:
    - zh: 带同一坐标系 start、end 和端点规则的连续来源区间。
      en: Contiguous source intervals with start, end, and endpoint rules in one coordinate system.
      ja: 同一 coordinate system の start・end・endpoint rule を持つ contiguous source interval。
  excludes:
    - zh: 单点偏移、不连续选择集合、内容引文锚和跨两个不同来源的区间。
      en: Point offsets, discontinuous selection sets, content quotation anchors, and intervals spanning two different sources.
      ja: point offset・discontinuous selection set・content quotation anchor・二 source にまたがる interval。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Citation 常用 lines/pages/chars range 与 ContentDigest 组合。
    en: Citations often combine lines/pages/chars range with ContentDigest.
    ja: range+digest。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - start
    - end
    - unit
    - endpoint_rule
  fields:
    - id: start
      labels:
        zh: 范围起点
        en: range start
        ja: 範囲開始
      definitions:
        zh: 按坐标系统解释的包含起点。
        en: The inclusive start interpreted in the coordinate system.
        ja: coordinate system で解釈する inclusive start。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 412
      allowed_values: []
      source_claims:
        - claim-source-range-002
    - id: end
      labels:
        zh: 范围终点
        en: range end
        ja: 範囲終了
      definitions:
        zh: 按声明约定解释的排他或包含终点。
        en: The exclusive or inclusive end interpreted under the declared convention.
        ja: 宣言 convention に従う exclusive/inclusive end。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 795
      allowed_values: []
      source_claims:
        - claim-source-range-003
    - id: unit
      labels:
        zh: 范围单位
        en: range unit
        ja: 範囲単位
      definitions:
        zh: 声明 start 与 end 按字节、字符、代码单元或其他有序单位解释；不同单位不得直接比较。
        en: Declares whether start and end are interpreted as bytes, characters, code units, or another ordered unit; unlike units cannot be compared directly.
        ja: start/end を byte・character・code unit・その他 ordered unit のどれで解釈するか宣言し、異なる unit は直接比較しません。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: unicode-code-point
      allowed_values: []
      source_claims:
        - claim-source-range-004
    - id: endpoint_rule
      labels:
        zh: 端点约定
        en: endpoint rule
        ja: 端点規則
      definitions:
        zh: 声明起点包含且终点排他的半开区间约定，避免同一 start/end 被解释成不同长度。
        en: Declares the start-inclusive, end-exclusive half-open interval convention so one start/end pair cannot denote different lengths.
        ja: start-inclusive/end-exclusive の half-open interval を宣言し、同じ start/end が異なる length を示すことを防ぎます。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "[start,end)"
      allowed_values: []
      source_claims:
        - claim-source-range-005
  constraints:
    - id: source-range-ordered-bounds
      severity: error
      expression_language: plain
      expression: start >= 0 and end > start
      explanation:
        zh: 范围起点不得为负，终点必须严格大于起点；空区间与反向区间不是有效 SourceRange。
        en: Range start is non-negative and end is strictly greater than start; empty or reversed intervals are not valid SourceRange values.
        ja: range start は non-negative、end は start より大きく、empty/reversed interval は有効な SourceRange ではありません。
      source_claims:
        - claim-source-range-006
  required_relations: []
examples:
  - id: SourceRange-example-line
    labels:
      zh: 行范围子类
      en: Line range subtype
      ja: line range subtype
    descriptions:
      zh: lines:42..58 是 SourceLineRange。
      en: lines:42..58 is SourceLineRange.
      ja: line range。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: line
    field_values: {}
    related_node_ids:
      - SourceRange
      - SourceLineRange
    related_relation_ids: []
    source_claims:
      - claim-source-range-design
  - id: SourceRange-example-span
    labels:
      zh: 字符跨度
      en: Character span
      ja: 文字 span
    descriptions:
      zh: chars:0..479 是 SourceSpan。
      en: chars:0..479 is SourceSpan.
      ja: char span。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: chars
    field_values: {}
    related_node_ids:
      - SourceRange
      - SourceSpan
    related_relation_ids: []
    source_claims:
      - claim-source-range-design
  - id: SourceRange-example-whole-object
    labels:
      zh: 整对象引用
      en: Whole object reference
      ja: whole object 参照
    descriptions:
      zh: 无 SourceRange 表示引用整个 MCP resource 对象。
      en: Absent SourceRange means whole MCP resource object referenced.
      ja: whole object。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: whole resource
    field_values: {}
    related_node_ids:
      - SourceRange
    related_relation_ids: []
    source_claims:
      - claim-source-range-mcp
parent_relation:
  id: SourceRange-is_a-SourceLocation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源范围是一种来源位置，并以同一有序坐标系中的起点、终点和端点约定为种差。
    en: SourceRange is a SourceLocation specialized by start, end, and endpoint convention in one ordered coordinate system.
    ja: SourceRange は一 ordered coordinate system の start・end・endpoint convention で細分化した SourceLocation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceRange-is_a-SourceLocation-example-positive-manual-001
      labels:
        zh: SourceRange-is_a-SourceLocation正例
        en: SourceRange-is_a-SourceLocation positive case
        ja: SourceRange-is_a-SourceLocation正例
      descriptions:
        zh: "[412,795) 是一个连续半开区间。"
        en: "[412,795) is one contiguous half-open interval."
        ja: "[412,795) は一 contiguous half-open interval です。"
      field_values: {}
      related_node_ids:
        - SourceRange
        - SourceLocation
      related_relation_ids:
        - SourceRange-is_a-SourceLocation
      source_claims:
        - claim-source-range-012
    - id: SourceRange-is_a-SourceLocation-example-boundary-manual-001
      labels:
        zh: SourceRange-is_a-SourceLocation边界例
        en: SourceRange-is_a-SourceLocation boundary case
        ja: SourceRange-is_a-SourceLocation境界例
      descriptions:
        zh: offset=412 仅表示一个点。
        en: offset=412 denotes only one point.
        ja: offset=412 は一 point だけを示します。
      field_values: {}
      related_node_ids:
        - SourceRange
        - SourceLocation
      related_relation_ids:
        - SourceRange-is_a-SourceLocation
      source_claims:
        - claim-source-range-013
  source_claims:
    - claim-source-range-014
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
source_claims:
  - id: claim-source-range-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. For SourceRange.start, the field records this reviewed value: The inclusive start interpreted in the coordinate system."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. For SourceRange.end, the field records this reviewed value: The exclusive or inclusive end interpreted under the declared convention."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C distinguishes character positions from byte-stream positions. Moonweave makes that coordinate unit explicit on the common range genus.
    locator: §4.2.5 Text Position Selector and §4.2.6 Data Position Selector
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines start as inclusive and end as exclusive. Moonweave carries that endpoint convention explicitly on SourceRange.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: normative
    confidence: high
  - id: claim-source-range-006
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires start before end for text-position selection. Moonweave expresses the ordering invariant as a validation constraint.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: normative
    confidence: high
  - id: claim-source-range-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This evidence supports the manually reviewed positive case for SourceRange: start=412,end=795 with endpoint_rule=[start,end) selects one contiguous interval."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This evidence supports the manually reviewed instance case for SourceRange: A page range and text span both reuse SourceRange endpoint conventions."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This evidence supports the manually reviewed boundary case for SourceRange: offset=412 denotes one point and has no end."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This claim supports only the SourceRange endpoint of its sibling distinction.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-011
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This claim supports only the SourceOffset endpoint of its sibling distinction.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-012
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines an inclusive start and exclusive end; Moonweave generalizes that interval contract under SourceRange. This evidence supports the manually reviewed positive case for SourceRange-is_a-SourceLocation: [412,795) is one contiguous half-open interval."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-013
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines an inclusive start and exclusive end; Moonweave generalizes that interval contract under SourceRange. This evidence supports the manually reviewed boundary case for SourceRange-is_a-SourceLocation: offset=412 denotes only one point."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-014
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines an inclusive start and exclusive end; Moonweave generalizes that interval contract under SourceRange.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-design
    source: src-info-sources-design
    supports: SourceRange subclasses express coordinate-specific spans.
    locator: SourceRange
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-range-mcp
    source: src-mcp-resources
    supports: Whole MCP resource reads may omit internal SourceRange.
    locator: resources/read
    evidence_kind: primary-spec
    confidence: high
