  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-source-range-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. For SourceRange.start, the field records this reviewed value: The inclusive start interpreted in the coordinate system."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. For SourceRange.end, the field records this reviewed value: The exclusive or inclusive end interpreted under the declared convention."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C distinguishes character positions from byte-stream positions. Moonweave makes that coordinate unit explicit on the common range genus.
    locator: §4.2.5 Text Position Selector and §4.2.6 Data Position Selector
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines start as inclusive and end as exclusive. Moonweave carries that endpoint convention explicitly on SourceRange.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-range-006
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires start before end for text-position selection. Moonweave expresses the ordering invariant as a validation constraint.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-range-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This evidence supports the manually reviewed positive case for SourceRange: start=412,end=795 with endpoint_rule=[start,end) selects one contiguous interval."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This evidence supports the manually reviewed instance case for SourceRange: A page range and text span both reuse SourceRange endpoint conventions."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-009
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This evidence supports the manually reviewed boundary case for SourceRange: offset=412 denotes one point and has no end."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This claim supports only the SourceRange endpoint of its sibling distinction.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-011
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This claim supports only the SourceOffset endpoint of its sibling distinction.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-012
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines an inclusive start and exclusive end; Moonweave generalizes that interval contract under SourceRange. This evidence supports the manually reviewed positive case for SourceRange-is_a-SourceLocation: [412,795) is one contiguous half-open interval."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-013
    source: eng-std-w3c-web-annotation-model
    supports: "W3C TextPositionSelector defines an inclusive start and exclusive end; Moonweave generalizes that interval contract under SourceRange. This evidence supports the manually reviewed boundary case for SourceRange-is_a-SourceLocation: offset=412 denotes only one point."
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-range-014
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines an inclusive start and exclusive end; Moonweave generalizes that interval contract under SourceRange.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

