schema: moonweave.ai/ontology-node/v1
id: SourceLineRange
kind: concept
status: accepted
labels:
  zh: 来源行范围
  en: source line range
  ja: 出典行範囲
semantics:
  short_definition:
    zh: 以声明的行计数规则选定连续行段的来源范围。
    en: A source range selecting contiguous lines under a declared counting convention.
    ja: 宣言 line-count convention で contiguous line segment を選ぶ source range。
  definition:
    zh: 来源行范围是来源范围的一类，种差是按声明的一基或零基行号与终点约定选择连续完整行；它不等同于数据库行身份，也不能在换行规范改变后自动保持稳定。
    en: SourceLineRange is a SourceRange specialized by one-based or zero-based line numbers and an endpoint convention that select contiguous complete lines; it is not database-row identity and does not automatically remain stable when newline normalization changes.
    ja: SourceLineRange は one-based/zero-based line number と endpoint convention で contiguous complete line を選ぶ SourceRange です。database-row identity ではなく newline normalization 変更後の安定性も自動保証しません。
  why_needed:
    zh: 行范围适合代码和日志引用，但必须记录计数基准；否则 line 12–18 在不同工具中可能产生偏一错误。
    en: Line ranges suit code and log citations but must record the counting base; otherwise lines 12–18 can incur off-by-one errors across tools.
    ja: line range は code/log citation に適するが counting base が必要で、なければ tool 間で lines 12–18 に off-by-one error が生じます。
  includes:
    - zh: 带 line_base、start_line 和 end_line 的连续完整行选择。
      en: Contiguous complete-line selections with line_base, start_line, and end_line.
      ja: line_base・start_line・end_line を持つ contiguous complete-line selection。
  excludes:
    - zh: 数据库候选键、字符跨度、只给一个行号的点位置和视觉换行后的显示行。
      en: Database candidate keys, character spans, point locations with one line number, and display lines created by visual wrapping.
      ja: database candidate key・character span・一 line number だけの point location・visual wrap による display line。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - start_line
    - end_line
    - line_base
    - endpoint_rule
  fields:
    - id: start_line
      labels:
        zh: 起始行
        en: start line
        ja: 開始行
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按声明 line_base 解释的首行。
        en: The first line interpreted under the declared line_base.
        ja: 宣言 line_base で解釈する first line。
      allowed_values: []
      pattern: null
      example_value: 12
      source_claims:
        - claim-source-line-range-002
    - id: end_line
      labels:
        zh: 结束行
        en: end line
        ja: 終了行
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按端点约定解释的末行边界。
        en: The final-line boundary interpreted under the endpoint convention.
        ja: endpoint convention で解釈する final-line boundary。
      allowed_values: []
      pattern: null
      example_value: 18
      source_claims:
        - claim-source-line-range-003
    - id: line_base
      labels:
        zh: 行号基准
        en: line-number base
        ja: 行番号基準
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明首行编号为零还是一，防止同一行号在编辑器与协议间产生一行偏移。
        en: Declares whether the first line is numbered zero or one, preventing one-line drift between editors and protocols.
        ja: first line が zero/one のどちらかを宣言し、editor/protocol 間の one-line drift を防ぎます。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-source-line-range-004
    - id: endpoint_rule
      labels:
        zh: 行终点约定
        en: line endpoint rule
        ja: 行端点規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 end_line 是排他边界，统一为 [start_line,end_line)。
        en: Declares end_line as an exclusive boundary using [start_line,end_line).
        ja: end_line を exclusive boundary とし [start_line,end_line) を使用します。
      allowed_values: []
      pattern: null
      example_value: "[start_line,end_line)"
      source_claims:
        - claim-source-line-range-005
  constraints: []
  required_relation_constraints: []
