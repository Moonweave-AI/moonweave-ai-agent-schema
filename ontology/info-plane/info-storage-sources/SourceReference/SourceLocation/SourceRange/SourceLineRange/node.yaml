      ja: 出典行範囲実例

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceLineRange.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceLineRange.", ja: "DSPy instance maps to SourceLineRange PromptTemplate."}

    field_values:
      start_line: 12
      end_line: 18
      line_base: 1
      endpoint_rule: "[start_line,end_line)"
    related_node_ids:
      - SourceLineRange
      - SourceRange
    related_relation_ids:
      - SourceLineRange-is_a-SourceRange

    source_claims:
      - claim-source-line-range-007
  - id: SourceLineRange-example-boundary-manual-003

    labels:
