source_claims:
  - id: claim-source-line-range-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. For SourceLineRange.start_line, the field records this reviewed value: The first line interpreted under the declared line_base."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. For SourceLineRange.end_line, the field records this reviewed value: The final-line boundary interpreted under the endpoint convention."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires a selector to be sufficient to determine its segment. Moonweave makes the otherwise implementation-specific line-number base explicit.
    locator: §4.2 Selectors > determining a segment within a source
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C uses an inclusive start and exclusive end. Moonweave applies the same non-overlapping convention to line intervals.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This evidence supports the manually reviewed positive case for SourceLineRange: line_base=1,start_line=12,end_line=18 selects seven contiguous source lines."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This evidence supports the manually reviewed instance case for SourceLineRange: A code review cites lines 12 through 18 while keeping the file reference separate."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This evidence supports the manually reviewed boundary case for SourceLineRange: The twelfth visual line on a wrapped webpage changes with viewport width."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This claim supports only the SourceLineRange endpoint of its sibling distinction.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. This claim supports only the SourcePageRange endpoint of its sibling distinction.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-011
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation Data Model's Selector boundary supports identifying a segment without copying the source. Moonweave defines SourceLineRange as contiguous complete lines under an explicit line base and endpoint convention; the standard does not prescribe line-number selectors.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-line-range-012
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation TextPositionSelector identifies a text segment by start and end character positions. This directly supports SourceSpan's character-offset identity and distinguishes it from SourceLineRange, whose endpoints count complete lines under a declared convention.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
