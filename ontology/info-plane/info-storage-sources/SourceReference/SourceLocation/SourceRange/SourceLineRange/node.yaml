    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceLineRange must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceLineRange must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

