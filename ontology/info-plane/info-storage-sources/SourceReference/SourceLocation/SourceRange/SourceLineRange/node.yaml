schema: moonweave.ai/ontology-node/v1
id: SourceLineRange
kind: concept
labels:
  zh: 来源行范围
  en: source line range
  ja: 出典行範囲
semantics:
  short_definition:
    zh: 文本文档中的行号闭区间范围。
    en: Closed line-number interval range in a text document.
    ja: text document 中の行番号閉区間 range。
  definition:
    zh: SourceLineRange 映射 repo:// 文档与 MCP text/markdown 资源的 lines:start..end；page reference 的代码侧等价物。
    en: SourceLineRange maps repo:// documents and MCP text/markdown resources as lines:start..end—the code-side equivalent of page references.
    ja: SourceLineRange は line citation。
  why_needed:
    zh: 行范围适合代码和日志引用，但必须记录计数基准；否则 line 12–18 在不同工具中可能产生偏一错误。
    en: Line ranges suit code and log citations but must record the counting base; otherwise lines 12–18 can incur off-by-one errors across tools.
    ja: line range は code/log citation に適するが counting base が必要で、なければ tool 間で lines 12–18 に off-by-one error が生じます。
  includes:
    - zh: 带 line_base、start_line 和 end_line 的连续完整行选择。
      en: Contiguous complete-line selections with line_base, start_line, and end_line.
      ja: line_base・start_line・end_line を持つ contiguous complete-line selection。
  excludes:
    - zh: 数据库候选键、字符跨度、只给一个行号的点位置和视觉换行后的显示行。
      en: Database candidate keys, character spans, point locations with one line number, and display lines created by visual wrapping.
      ja: database candidate key・character span・一 line number だけの point location・visual wrap による display line。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: lines:42..58 与 content_digest 固定 cited revision。
    en: lines:42..58 with content_digest pins cited revision.
    ja: line range+digest。
  typical_input:
    - description: Line span citation
      format: '{"resource_uri":"repo://docs/security-boundary.md","source_range":"lines:42..58","content_digest_sha256":"355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e"}'
      source_claims:
        - claim-source-line-design
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - start_line
    - end_line
    - line_base
    - endpoint_rule
  fields:
    - id: start_line
      labels:
        zh: 起始行
        en: start line
        ja: 開始行
      definitions:
        zh: 按声明 line_base 解释的首行。
        en: The first line interpreted under the declared line_base.
        ja: 宣言 line_base で解釈する first line。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 12
      allowed_values: []
      source_claims:
        - claim-source-line-range-002
    - id: end_line
      labels:
        zh: 结束行
        en: end line
        ja: 終了行
      definitions:
        zh: 按端点约定解释的末行边界。
        en: The final-line boundary interpreted under the endpoint convention.
        ja: endpoint convention で解釈する final-line boundary。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 18
      allowed_values: []
      source_claims:
        - claim-source-line-range-003
    - id: line_base
      labels:
        zh: 行号基准
        en: line-number base
        ja: 行番号基準
      definitions:
        zh: 声明首行编号为零还是一，防止同一行号在编辑器与协议间产生一行偏移。
        en: Declares whether the first line is numbered zero or one, preventing one-line drift between editors and protocols.
        ja: first line が zero/one のどちらかを宣言し、editor/protocol 間の one-line drift を防ぎます。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims:
        - claim-source-line-range-004
    - id: endpoint_rule
      labels:
        zh: 行终点约定
        en: line endpoint rule
        ja: 行端点規則
      definitions:
        zh: 声明 end_line 是排他边界，统一为 [start_line,end_line)。
        en: Declares end_line as an exclusive boundary using [start_line,end_line).
        ja: end_line を exclusive boundary とし [start_line,end_line) を使用します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "[start_line,end_line)"
      allowed_values: []
      source_claims:
        - claim-source-line-range-005
  constraints: []
  required_relations: []
examples:
  - id: SourceLineRange-example-security-doc
    labels:
      zh: 安全文档行引用
      en: Security doc line citation
      ja: security doc line citation
    descriptions:
      zh: repo://docs/security-boundary.md lines:42..58 带 digest。
      en: repo://docs/security-boundary.md lines:42..58 with digest.
      ja: line citation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: line range
    field_values:
      source_range: lines:42..58
    related_node_ids:
      - SourceLineRange
      - ContentDigest
    related_relation_ids: []
    source_claims:
      - claim-source-line-design
  - id: SourceLineRange-example-mcp-md
    labels:
      zh: MCP Markdown 行
      en: MCP Markdown lines
      ja: MCP Markdown lines
    descriptions:
      zh: onboarding.md lines:12..24 来自 MCP text/markdown read。
      en: onboarding.md lines:12..24 from MCP text/markdown read.
      ja: MCP md lines。
    example_source:
      product: MCP
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: text/markdown
    field_values: {}
    related_node_ids:
      - SourceLineRange
    related_relation_ids: []
    source_claims:
      - claim-source-line-mcp
  - id: SourceLineRange-example-pdf-boundary
    labels:
      zh: PDF 非行坐标
      en: PDF not line coords
      ja: PDF 非 line 坐标
    descriptions:
      zh: PDF page 引用应使用 SourcePageRange 而非 SourceLineRange。
      en: PDF page citations should use SourcePageRange not SourceLineRange.
      ja: PDF→page range。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceLineRange
    related_relation_ids: []
    source_claims:
      - claim-source-line-design
parent_relation:
  id: SourceLineRange-is_a-SourceRange
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源行范围是一种来源范围，并以声明行计数基准的连续完整行为种差。
    en: SourceLineRange is a SourceRange specialized by contiguous complete lines under a declared line-count base.
    ja: SourceLineRange は宣言 line-count base の contiguous complete line で細分化した SourceRange です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceLineRange-is_a-SourceRange-example-positive-manual-001
      labels:
        zh: SourceLineRange-is_a-SourceRange正例
        en: SourceLineRange-is_a-SourceRange positive case
        ja: SourceLineRange-is_a-SourceRange正例
      descriptions:
        zh: 一基行号 12–18 选中连续源码行。
        en: One-based lines 12–18 select contiguous source lines.
        ja: one-based lines 12–18 は contiguous source line を選びます。
      field_values: {}
      related_node_ids:
        - SourceLineRange
        - SourceRange
      related_relation_ids:
        - SourceLineRange-is_a-SourceRange
      source_claims:
        - claim-source-line-range-013
    - id: SourceLineRange-is_a-SourceRange-example-boundary-manual-001
      labels:
        zh: SourceLineRange-is_a-SourceRange边界例
        en: SourceLineRange-is_a-SourceRange boundary case
        ja: SourceLineRange-is_a-SourceRange境界例
      descriptions:
        zh: 响应式网页的视觉第十二行随宽度变化。
        en: The twelfth visual line of a responsive page changes with width.
        ja: responsive page の visual line 12 は width で変化します。
      field_values: {}
      related_node_ids:
        - SourceLineRange
        - SourceRange
      related_relation_ids:
        - SourceLineRange-is_a-SourceRange
      source_claims:
        - claim-source-line-range-014
  source_claims:
    - claim-source-line-range-015
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
  - id: src-mcp-resources
    title: MCP Server Resources Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity and resources/read contents.
source_claims:
  - id: claim-source-line-range-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. For SourceLineRange.start_line, the field records this reviewed value: The first line interpreted under the declared line_base."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. For SourceLineRange.end_line, the field records this reviewed value: The final-line boundary interpreted under the endpoint convention."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires a selector to be sufficient to determine its segment. Moonweave makes the otherwise implementation-specific line-number base explicit.
    locator: §4.2 Selectors > determining a segment within a source
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C uses an inclusive start and exclusive end. Moonweave applies the same non-overlapping convention to line intervals.
    locator: §4.2.5 Text Position Selector, start and end properties
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This evidence supports the manually reviewed positive case for SourceLineRange: line_base=1,start_line=12,end_line=18 selects seven contiguous source lines."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This evidence supports the manually reviewed instance case for SourceLineRange: A code review cites lines 12 through 18 while keeping the file reference separate."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-008
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This evidence supports the manually reviewed boundary case for SourceLineRange: The twelfth visual line on a wrapped webpage changes with viewport width."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires selectors to describe how a segment is determined within the source; Moonweave makes the line-count convention explicit for line selectors. This claim supports only the SourceLineRange endpoint of its sibling distinction.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C makes selector interpretation dependent on the source and media type; Moonweave requires a fixed paginated representation for page ranges. This claim supports only the SourcePageRange endpoint of its sibling distinction.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-011
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation Data Model's Selector boundary supports identifying a segment without copying the source. Moonweave defines SourceLineRange as contiguous complete lines under an explicit line base and endpoint convention; the standard does not prescribe line-number selectors.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-012
    source: eng-std-w3c-web-annotation-model
    supports: The Web Annotation TextPositionSelector identifies a text segment by start and end character positions. This directly supports SourceSpan's character-offset identity and distinguishes it from SourceLineRange, whose endpoints count complete lines under a declared convention.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-013
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to state how a segment is determined within the source; Moonweave makes line counting explicit. This evidence supports the manually reviewed positive case for SourceLineRange-is_a-SourceRange: One-based lines 12–18 select contiguous source lines."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-014
    source: eng-std-w3c-web-annotation-model
    supports: "W3C requires selectors to state how a segment is determined within the source; Moonweave makes line counting explicit. This evidence supports the manually reviewed boundary case for SourceLineRange-is_a-SourceRange: The twelfth visual line of a responsive page changes with width."
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-range-015
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires selectors to state how a segment is determined within the source; Moonweave makes line counting explicit.
    locator: §4.2 Selectors, lines 794–802
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-design
    source: src-info-sources-design
    supports: SourceLineRange cites text documents by inclusive line intervals.
    locator: SourceLineRange
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-line-mcp
    source: src-mcp-resources
    supports: MCP text/markdown resources support line-range citations.
    locator: text/markdown
    evidence_kind: primary-spec
    confidence: high
