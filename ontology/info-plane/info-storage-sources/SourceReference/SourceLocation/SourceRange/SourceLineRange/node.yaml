    source_claims:
      - claim-source-line-range-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SourcePageRange
    shared_parent_concept_id: SourceRange
    differentia:
      zh: 来源行范围依据“来源行范围是来源范围的一类，种差是按声明的一基或零基行号与终点约定选择连续完整行；它不等同于数据库行身份，也不能在换行规范改变后自动保持稳定。”归类；来源页范围依据“来源页范围是来源范围的一类，种差是对具有稳定分页的指定表示保存起止页与页码基准；可重排网页、无版次限定的文档或查看器临时页码不满足该身份。”归类。二者共享 SourceRange，但任一端条件均不推出另一端。
      en: SourceLineRange is classified by “SourceLineRange is a SourceRange specialized by one-based or zero-based line numbers and an endpoint convention that select contiguous complete lines; it is not database-row identity and does not automatically remain stable when newline normalization changes.” whereas SourcePageRange is classified by “SourcePageRange is a SourceRange specialized by start/end pages and page-number base for a specified representation with stable pagination; reflowable pages, documents without representation version, and viewer-temporary page numbers do not qualify.”. They share SourceRange, but satisfying either condition leaves the other unproven.
      ja: SourceLineRange は「SourceLineRange は one-based/zero-based line number と endpoint convention で contiguous complete line を選ぶ SourceRange です。database-row identity ではなく newline normalization 変更後の安定性も自動保証しません。」で分類し、SourcePageRange は「SourcePageRange は stable pagination を持つ指定 representation の start/end page と page-number base を持つ SourceRange です。reflowable page・version 未指定 document・viewer temporary page number は含みません。」で分類します。両者は SourceRange を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-source-line-range-009
      - claim-source-line-range-010
  - sibling_concept_id: SourceSpan
    shared_parent_concept_id: SourceRange
    differentia:
      zh: 正向身份比较：父节点 SourceRange：SourceLineRange（semantic kind=information，骨架 SourceLineRange-is_a-SourceRange）；SourceSpan（semantic kind=information，骨架 SourceSpan-is_a-SourceRange）。双端条件：SourceLineRange 条件：“以声明的行计数规则选定连续行段的来源范围”；SourceSpan 条件：“以字符流起止位置选定文本片段的来源范围”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent SourceRange: SourceLineRange (semantic kind=information, backbone SourceLineRange-is_a-SourceRange); SourceSpan (semantic kind=information, backbone SourceSpan-is_a-SourceRange). Endpoint conditions: SourceLineRange condition: “A source range selecting contiguous lines under a declared counting convention”; SourceSpan condition: “A source range selecting a text segment by start and end in a character stream”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 SourceRange：SourceLineRange（semantic kind=information、バックボーン SourceLineRange-is_a-SourceRange）；SourceSpan（semantic kind=information、バックボーン SourceSpan-is_a-SourceRange）。両端条件：SourceLineRange の条件：「宣言 line-count convention で contiguous line segment を選ぶ source range」；SourceSpan の条件：「character stream の start/end で text segment を選ぶ source range」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-source-line-range-011
      - claim-source-line-range-012
