schema: moonweave.ai/ontology-node/v1
id: SourceOffset
kind: concept
status: accepted
labels:
  zh: 来源偏移
  en: source offset
  ja: 出典オフセット
semantics:
  short_definition:
    zh: 在声明单位下选定来源表示中一个点的位置。
    en: A source location selecting one point under a declared unit.
    ja: 宣言 unit で source representation 内の一 point を選ぶ location。
  definition:
    zh: 来源偏移是来源位置的一类，种差是仅记录单一非负 offset 与明确单位，表示边界点或起始点而非有长度的区间；字符偏移与字节偏移不可互换。
    en: SourceOffset is a SourceLocation specialized by one non-negative offset and explicit unit, denoting a boundary or starting point rather than an interval with length; character and byte offsets are not interchangeable.
    ja: SourceOffset は一つの non-negative offset と明示 unit を持つ SourceLocation で、長さを持つ interval ではなく boundary/start point を示します。character offset と byte offset は交換できません。
  why_needed:
    zh: 点位置与范围有不同基数和验证规则，单独建模可防止把 start=4096 误读为完整字节区间。
    en: Point locations and ranges have different cardinality and validation rules; separate modeling prevents start=4096 from being misread as a complete byte interval.
    ja: point location と range は cardinality/validation が異なり、start=4096 を complete byte interval と誤読することを防ぎます。
  includes:
    - zh: 带 unit 的字符边界、字节边界或其他单点偏移。
      en: Character boundaries, byte boundaries, or other point offsets carrying a unit.
      ja: unit を持つ character boundary・byte boundary・他 point offset。
  excludes:
    - zh: 具有 start 与 end 的范围、页码区间、行号区间和没有单位的裸整数。
      en: Ranges with start and end, page intervals, line intervals, and bare integers without a unit.
      ja: start/end を持つ range・page interval・line interval・unit のない bare integer。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - offset
    - unit
    - coordinate_origin
  fields:
    - id: offset
      labels:
        zh: 偏移值
        en: offset value
        ja: オフセット値
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 从坐标系统原点开始计数的非负位置。
        en: A non-negative position counted from the coordinate-system origin.
        ja: coordinate-system origin から数える non-negative position。
      allowed_values: []
      pattern: null
      example_value: 4096
      source_claims:
        - claim-source-offset-002
    - id: unit
      labels:
        zh: 偏移单位
        en: offset unit
        ja: オフセット単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 offset 按字节、字符或代码单元解释。
        en: Declares whether offset is interpreted in bytes, characters, or code units.
        ja: offset を byte・character・code unit のどれで解釈するか宣言します。
      allowed_values: []
      pattern: null
      example_value: byte
      source_claims:
        - claim-source-offset-003
    - id: coordinate_origin
      labels:
        zh: 坐标原点
        en: coordinate origin
        ja: 座標原点
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 offset 的计数原点；W3C 字节与文本位置选择器均以零为首位置。
        en: Declares the counting origin for offset; W3C byte and text position selectors use zero for the first position.
        ja: offset の counting origin を宣言し、W3C byte/text position selector では first position を zero とします。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-source-offset-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceOffset-example-positive-manual-001
    kind: positive
    labels:
      zh: 来源偏移正例
      en: source offset positive case
      ja: 出典オフセット正例
    scenario_id: null
    descriptions:
      zh: offset=4096 与 unit=byte 指向磁盘镜像的一个字节边界。
      en: offset=4096 with unit=byte points to one byte boundary in a disk image.
      ja: offset=4096 と unit=byte は disk image の一 byte boundary を指します。
    field_values:
      offset: 4096
      unit: byte
      coordinate_origin: 0
      source_reference_id: file-ref-disk-image-1
      source_identity_id: source-identity-disk-image-1
      coordinate_system: zero-based-byte-offset
    related_node_ids:
      - SourceOffset
      - SourceLocation
    related_relation_ids:
      - SourceOffset-is_a-SourceLocation
    expected_result:
      zh: SourceOffset 保持其已审查身份，并按定义解释 SourceOffset-is_a-SourceLocation。
      en: Retain the reviewed identity of SourceOffset and interpret SourceOffset-is_a-SourceLocation exactly as defined.
      ja: SourceOffset の reviewed identity を保持し SourceOffset-is_a-SourceLocation を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 该记录只有一个坐标点并明确声明计量单位。
      en: The record denotes one point and declares its unit.
      ja: record は一 point を示し unit を宣言します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-offset-005
  - id: SourceOffset-example-instance-manual-002
    kind: instance
    labels:
      zh: 来源偏移实例
      en: source offset instance case
      ja: 出典オフセット実例
    scenario_id: null
    descriptions:
      zh: 解析器从字符 offset=412 开始读取，但结束位置由另一规则给出。
      en: A parser begins reading at character offset=412 while another rule supplies the end.
      ja: parser は character offset=412 から読み、end は別 rule が与えます。
    field_values:
      offset: 4096
      unit: byte
      coordinate_origin: 0
    related_node_ids:
      - SourceOffset
      - SourceLocation
    related_relation_ids:
      - SourceOffset-is_a-SourceLocation
    expected_result:
      zh: SourceOffset 保持其已审查身份，并按定义解释 SourceOffset-is_a-SourceLocation。
      en: Retain the reviewed identity of SourceOffset and interpret SourceOffset-is_a-SourceLocation exactly as defined.
      ja: SourceOffset の reviewed identity を保持し SourceOffset-is_a-SourceLocation を定義どおり解釈します。
    why_valid_or_invalid:
      zh: 单点起始位置仍是 SourceOffset。
      en: A single starting point remains a SourceOffset.
      ja: single starting point は SourceOffset です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-offset-006
  - id: SourceOffset-example-boundary-manual-003
    kind: boundary
    labels:
      zh: 来源偏移边界例
      en: source offset boundary case
      ja: 出典オフセット境界例
    scenario_id: null
    descriptions:
      zh: start=4096,end=4104 选择八个字节。
      en: start=4096,end=4104 selects eight bytes.
      ja: start=4096,end=4104 は八 byte を選択します。
    field_values:
      start: 4096
      end: 4104
      unit: byte
    related_node_ids:
      - SourceOffset
      - SourceLocation
    related_relation_ids:
      - SourceOffset-is_a-SourceLocation
    expected_result:
      zh: 不把该对象归入 SourceOffset，也不凭邻近或词形推断 SourceOffset-is_a-SourceLocation。
      en: Do not classify the object as SourceOffset or infer SourceOffset-is_a-SourceLocation from proximity or lexical form.
      ja: object を SourceOffset に分類せず proximity/lexical form から SourceOffset-is_a-SourceLocation を推論しません。
    why_valid_or_invalid:
      zh: 该对象是 SourceRange，而非单点 SourceOffset。
      en: That object is a SourceRange rather than a point SourceOffset.
      ja: その object は point SourceOffset ではなく SourceRange です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-source-offset-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SourceRange
    shared_parent_concept_id: SourceLocation
    differentia:
      zh: 来源偏移依据“仅记录一个带单位与原点的非负 offset，表示边界点而非有长度区间”归类；来源范围依据“在一个有序坐标轴上记录 start、end 与端点约定，行、页和文本跨度继承该一维区间语义”归类。二维区域属于 SourceRegion，不属于任一端。二者共享 SourceLocation，但任一端条件均不推出另一端。
      en: SourceOffset is classified by one non-negative offset with an explicit unit and origin, denoting a point rather than an interval with length; SourceRange is classified by start, end, and an endpoint convention on one ordered axis, inherited by line, page, and text ranges. Two-dimensional regions belong to SourceRegion, not either endpoint. Both share SourceLocation, but satisfying either condition leaves the other unproven.
      ja: SourceOffset は explicit unit/origin を持つ一 non-negative offset で point を示し、SourceRange は一 ordered axis の start/end/endpoint convention で line・page・text range に継承されます。two-dimensional region は SourceRegion に属します。両者は SourceLocation を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-source-offset-008
      - claim-source-offset-009
parent_relation:
  id: SourceOffset-is_a-SourceLocation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源偏移是一种来源位置，并以声明单位下的单一非负点坐标为种差。
    en: SourceOffset is a SourceLocation specialized by one non-negative point coordinate under a declared unit.
    ja: SourceOffset は宣言 unit の一 non-negative point coordinate で細分化した SourceLocation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: is_target_of_is_a
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceOffset-is_a-SourceLocation-example-positive-manual-001
      kind: positive
      labels:
        zh: SourceOffset-is_a-SourceLocation正例
        en: SourceOffset-is_a-SourceLocation positive case
        ja: SourceOffset-is_a-SourceLocation正例
      scenario_id: null
      descriptions:
        zh: byte offset 4096 指向一个边界点。
        en: Byte offset 4096 points to one boundary point.
        ja: byte offset 4096 は一 boundary point を指します。
      field_values: {}
      related_node_ids:
        - SourceOffset
        - SourceLocation
      related_relation_ids:
        - SourceOffset-is_a-SourceLocation
      expected_result:
        zh: 建立 SourceOffset —is_a→ SourceLocation，并保持该方向与限定条件。
        en: Assert SourceOffset —is_a→ SourceLocation while preserving its direction and qualifiers.
        ja: SourceOffset —is_a→ SourceLocation を assertion し direction/qualifier を保持します。
      why_valid_or_invalid:
        zh: 记录只有一个坐标点且其计量单位已经明确声明。
        en: There is one coordinate and its unit is explicit.
        ja: 一 coordinate で unit が明示されています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-offset-010
    - id: SourceOffset-is_a-SourceLocation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: SourceOffset-is_a-SourceLocation边界例
        en: SourceOffset-is_a-SourceLocation boundary case
        ja: SourceOffset-is_a-SourceLocation境界例
      scenario_id: null
      descriptions:
        zh: start=4096,end=4104 选择一个区间。
        en: start=4096,end=4104 selects an interval.
        ja: start=4096,end=4104 は interval を選びます。
      field_values: {}
      related_node_ids:
        - SourceOffset
        - SourceLocation
      related_relation_ids:
        - SourceOffset-is_a-SourceLocation
      expected_result:
        zh: 拒绝建立 SourceOffset-is_a-SourceLocation，两端对象仍保留各自身份。
        en: Reject SourceOffset-is_a-SourceLocation; both endpoint objects retain their own identities.
        ja: SourceOffset-is_a-SourceLocation を拒否し両 endpoint object は各 identity を保持します。
      why_valid_or_invalid:
        zh: 有终点的选择属于 SourceRange。
        en: A selection with an end belongs to SourceRange.
        ja: end を持つ selection は SourceRange に属します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-source-offset-011
  source_claims:
    - claim-source-offset-012
  distinct_fact_rationale:
    zh: SourceOffset-is_a-SourceLocation 记录 SourceOffset 到 SourceLocation 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceOffset-is_a-SourceLocation records one is_a fact from SourceOffset to SourceLocation; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceOffset-is_a-SourceLocation は SourceOffset から SourceLocation への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
