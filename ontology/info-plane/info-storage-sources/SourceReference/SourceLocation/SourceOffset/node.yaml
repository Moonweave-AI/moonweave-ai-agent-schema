schema: moonweave.ai/ontology-node/v1
id: SourceOffset
kind: concept
labels:
  zh: 来源偏移
  en: source offset
  ja: 出典オフセット
semantics:
  short_definition:
    zh: 对象内单一整数偏移位置点。
    en: Single integer offset point inside an object.
    ja: object 内の単一 integer offset 点。
  definition:
    zh: SourceOffset 记录从规范化正文起点开始的零基 offset；用于精确 Citation 锚点或 revision drift 恢复。
    en: SourceOffset records zero-based offset from normalized body start for precise citation anchors or revision drift recovery.
    ja: SourceOffset は point locator。
  why_needed:
    zh: 点位置与范围有不同基数和验证规则，单独建模可防止把 start=4096 误读为完整字节区间。
    en: Point locations and ranges have different cardinality and validation rules; separate modeling prevents start=4096 from being misread as a complete byte interval.
    ja: point location と range は cardinality/validation が異なり、start=4096 を complete byte interval と誤読することを防ぎます。
  includes:
    - zh: 带 unit 的字符边界、字节边界或其他单点偏移。
      en: Character boundaries, byte boundaries, or other point offsets carrying a unit.
      ja: unit を持つ character boundary・byte boundary・他 point offset。
  excludes:
    - zh: 具有 start 与 end 的范围、页码区间、行号区间和没有单位的裸整数。
      en: Ranges with start and end, page intervals, line intervals, and bare integers without a unit.
      ja: start/end を持つ range・page interval・line interval・unit のない bare integer。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: char offset 与 byte offset 必须在引用记录中声明单位。
    en: char versus byte offset must declare unit in reference record.
    ja: unit 宣言必須。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/read URI identity with mimeType and contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri.
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: image_url and file content parts for attachments.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: image and document blocks with source URLs.
structure:
  identity_keys:
    - offset
    - unit
    - coordinate_origin
  fields:
    - id: offset
      labels:
        zh: 偏移值
        en: offset value
        ja: オフセット値
      definitions:
        zh: 从坐标系统原点开始计数的非负位置。
        en: A non-negative position counted from the coordinate-system origin.
        ja: coordinate-system origin から数える non-negative position。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 4096
      allowed_values: []
      source_claims:
        - claim-source-offset-002
    - id: unit
      labels:
        zh: 偏移单位
        en: offset unit
        ja: オフセット単位
      definitions:
        zh: 声明 offset 按字节、字符或代码单元解释。
        en: Declares whether offset is interpreted in bytes, characters, or code units.
        ja: offset を byte・character・code unit のどれで解釈するか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: byte
      allowed_values: []
      source_claims:
        - claim-source-offset-003
    - id: coordinate_origin
      labels:
        zh: 坐标原点
        en: coordinate origin
        ja: 座標原点
      definitions:
        zh: 声明 offset 的计数原点；W3C 字节与文本位置选择器均以零为首位置。
        en: Declares the counting origin for offset; W3C byte and text position selectors use zero for the first position.
        ja: offset の counting origin を宣言し、W3C byte/text position selector では first position を zero とします。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0
      allowed_values: []
      source_claims:
        - claim-source-offset-004
  constraints: []
  required_relations: []
examples:
  - id: SourceOffset-example-char
    labels:
      zh: 字符偏移
      en: Character offset
      ja: 文字 offset
    descriptions:
      zh: chars offset=1600 指向规范化正文位置。
      en: chars offset=1600 points into normalized body.
      ja: char offset。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: char offset
    field_values:
      offset: 1600
      unit: chars
    related_node_ids:
      - SourceOffset
    related_relation_ids: []
    source_claims:
      - claim-source-offset-design
  - id: SourceOffset-example-byte
    labels:
      zh: 字节偏移
      en: Byte offset
      ja: byte offset
    descriptions:
      zh: bytes offset=4096 用于二进制文件锚点。
      en: bytes offset=4096 anchors binary file.
      ja: byte offset。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: byte offset
    field_values: {}
    related_node_ids:
      - SourceOffset
    related_relation_ids: []
    source_claims:
      - claim-source-offset-design
  - id: SourceOffset-example-not-range
    labels:
      zh: 非范围
      en: Not range
      ja: range ではない
    descriptions:
      zh: SourceOffset 是点不是 SourceRange。
      en: SourceOffset is a point not SourceRange.
      ja: point≠range。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SourceOffset
    related_relation_ids: []
    source_claims:
      - claim-source-offset-design
parent_relation:
  id: SourceOffset-is_a-SourceLocation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源偏移是一种来源位置，并以声明单位下的单一非负点坐标为种差。
    en: SourceOffset is a SourceLocation specialized by one non-negative point coordinate under a declared unit.
    ja: SourceOffset は宣言 unit の一 non-negative point coordinate で細分化した SourceLocation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceOffset-is_a-SourceLocation-example-positive-manual-001
      labels:
        zh: SourceOffset-is_a-SourceLocation正例
        en: SourceOffset-is_a-SourceLocation positive case
        ja: SourceOffset-is_a-SourceLocation正例
      descriptions:
        zh: byte offset 4096 指向一个边界点。
        en: Byte offset 4096 points to one boundary point.
        ja: byte offset 4096 は一 boundary point を指します。
      field_values: {}
      related_node_ids:
        - SourceOffset
        - SourceLocation
      related_relation_ids:
        - SourceOffset-is_a-SourceLocation
      source_claims:
        - claim-source-offset-010
    - id: SourceOffset-is_a-SourceLocation-example-boundary-manual-001
      labels:
        zh: SourceOffset-is_a-SourceLocation边界例
        en: SourceOffset-is_a-SourceLocation boundary case
        ja: SourceOffset-is_a-SourceLocation境界例
      descriptions:
        zh: start=4096,end=4104 选择一个区间。
        en: start=4096,end=4104 selects an interval.
        ja: start=4096,end=4104 は interval を選びます。
      field_values: {}
      related_node_ids:
        - SourceOffset
        - SourceLocation
      related_relation_ids:
        - SourceOffset-is_a-SourceLocation
      source_claims:
        - claim-source-offset-011
  source_claims:
    - claim-source-offset-012
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-sources-design
    title: Moonweave info-storage-sources module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SourceReference as pointer and locator without referent body.
source_claims:
  - id: claim-source-offset-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. For SourceOffset.offset, the field records this reviewed value: A non-negative position counted from the coordinate-system origin."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. For SourceOffset.unit, the field records this reviewed value: Declares whether offset is interpreted in bytes, characters, or code units."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines the first character or byte as position zero. Moonweave records that origin explicitly so point coordinates are not ambiguous.
    locator: §4.2.5 Text Position Selector and §4.2.6 Data Position Selector
    evidence_kind: normative
    confidence: high
  - id: claim-source-offset-005
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed positive case for SourceOffset: offset=4096 with unit=byte points to one byte boundary in a disk image."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed instance case for SourceOffset: A parser begins reading at character offset=412 while another rule supplies the end."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed boundary case for SourceOffset: start=4096,end=4104 selects eight bytes."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This claim supports only the SourceOffset endpoint of its sibling distinction.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This claim supports only the SourceRange endpoint of its sibling distinction.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-010
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector defines byte-stream positions; Moonweave separates one point offset from a start-end range. This evidence supports the manually reviewed positive case for SourceOffset-is_a-SourceLocation: Byte offset 4096 points to one boundary point."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-011
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector defines byte-stream positions; Moonweave separates one point offset from a start-end range. This evidence supports the manually reviewed boundary case for SourceOffset-is_a-SourceLocation: start=4096,end=4104 selects an interval."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-012
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector defines byte-stream positions; Moonweave separates one point offset from a start-end range.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
  - id: claim-source-offset-design
    source: src-info-sources-design
    supports: SourceOffset is a single point locator with declared unit.
    locator: SourceOffset
    evidence_kind: design-inference
    confidence: high
