    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed instance case for SourceOffset: A parser begins reading at character offset=412 while another rule supplies the end."
