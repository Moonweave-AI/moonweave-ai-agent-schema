schema: moonweave.ai/ontology-node/v1
id: SourceOffset
kind: concept
status: accepted
labels:
  zh: 来源偏移
  en: source offset
  ja: 出典オフセット
semantics:
  short_definition:
    zh: 在声明单位下选定来源表示中一个点的位置。
    en: A source location selecting one point under a declared unit.
    ja: 宣言 unit で source representation 内の一 point を選ぶ location。
  definition:
    zh: 来源偏移是来源位置的一类，种差是仅记录单一非负 offset 与明确单位，表示边界点或起始点而非有长度的区间；字符偏移与字节偏移不可互换。
    en: SourceOffset is a SourceLocation specialized by one non-negative offset and explicit unit, denoting a boundary or starting point rather than an interval with length; character and byte offsets are not interchangeable.
    ja: SourceOffset は一つの non-negative offset と明示 unit を持つ SourceLocation で、長さを持つ interval ではなく boundary/start point を示します。character offset と byte offset は交換できません。
  why_needed:
    zh: 点位置与范围有不同基数和验证规则，单独建模可防止把 start=4096 误读为完整字节区间。
    en: Point locations and ranges have different cardinality and validation rules; separate modeling prevents start=4096 from being misread as a complete byte interval.
    ja: point location と range は cardinality/validation が異なり、start=4096 を complete byte interval と誤読することを防ぎます。
  includes:
    - zh: 带 unit 的字符边界、字节边界或其他单点偏移。
      en: Character boundaries, byte boundaries, or other point offsets carrying a unit.
      ja: unit を持つ character boundary・byte boundary・他 point offset。
  excludes:
    - zh: 具有 start 与 end 的范围、页码区间、行号区间和没有单位的裸整数。
      en: Ranges with start and end, page intervals, line intervals, and bare integers without a unit.
      ja: start/end を持つ range・page interval・line interval・unit のない bare integer。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - offset
    - unit
    - coordinate_origin
  fields:
    - id: offset
      labels:
        zh: 偏移值
        en: offset value
        ja: オフセット値
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 从坐标系统原点开始计数的非负位置。
        en: A non-negative position counted from the coordinate-system origin.
        ja: coordinate-system origin から数える non-negative position。
      allowed_values: []
      pattern: null
      example_value: 4096
      source_claims:
        - claim-source-offset-002
    - id: unit
      labels:
        zh: 偏移单位
        en: offset unit
        ja: オフセット単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 offset 按字节、字符或代码单元解释。
        en: Declares whether offset is interpreted in bytes, characters, or code units.
        ja: offset を byte・character・code unit のどれで解釈するか宣言します。
      allowed_values: []
      pattern: null
      example_value: byte
      source_claims:
        - claim-source-offset-003
    - id: coordinate_origin
      labels:
        zh: 坐标原点
        en: coordinate origin
        ja: 座標原点
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 offset 的计数原点；W3C 字节与文本位置选择器均以零为首位置。
        en: Declares the counting origin for offset; W3C byte and text position selectors use zero for the first position.
        ja: offset の counting origin を宣言し、W3C byte/text position selector では first position を zero とします。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-source-offset-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: SourceOffset-example-positive-manual-001

    labels:
      zh: 来源偏移正例
      en: source offset positive case
      ja: 出典オフセット正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SourceOffset maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SourceOffset maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SourceOffset context/token boundary."}

    field_values:
      offset: 4096
      unit: byte
      coordinate_origin: 0
      source_reference_id: file-ref-disk-image-1
      source_identity_id: source-identity-disk-image-1
      coordinate_system: zero-based-byte-offset
    related_node_ids:
      - SourceOffset
      - SourceLocation
    related_relation_ids:
      - SourceOffset-is_a-SourceLocation

    source_claims:
      - claim-source-offset-005
  - id: SourceOffset-example-instance-manual-002

    labels:
      zh: 来源偏移实例
      en: source offset instance case
      ja: 出典オフセット実例

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceOffset.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->SourceOffset.", ja: "DSPy instance maps to SourceOffset PromptTemplate."}

    field_values:
      offset: 4096
      unit: byte
      coordinate_origin: 0
    related_node_ids:
      - SourceOffset
      - SourceLocation
    related_relation_ids:
      - SourceOffset-is_a-SourceLocation

    source_claims:
      - claim-source-offset-006
  - id: SourceOffset-example-boundary-manual-003

    labels:
      zh: 来源偏移边界例
      en: source offset boundary case
      ja: 出典オフセット境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceOffset must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SourceOffset must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values:
      start: 4096
      end: 4104
      unit: byte
    related_node_ids:
      - SourceOffset
      - SourceLocation
    related_relation_ids:
      - SourceOffset-is_a-SourceLocation

    source_claims:
      - claim-source-offset-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SourceRange
    shared_parent_concept_id: SourceLocation
    differentia:
      zh: 来源偏移依据“仅记录一个带单位与原点的非负 offset，表示边界点而非有长度区间”归类；来源范围依据“在一个有序坐标轴上记录 start、end 与端点约定，行、页和文本跨度继承该一维区间语义”归类。二维区域属于 SourceRegion，不属于任一端。二者共享 SourceLocation，但任一端条件均不推出另一端。
      en: SourceOffset is classified by one non-negative offset with an explicit unit and origin, denoting a point rather than an interval with length; SourceRange is classified by start, end, and an endpoint convention on one ordered axis, inherited by line, page, and text ranges. Two-dimensional regions belong to SourceRegion, not either endpoint. Both share SourceLocation, but satisfying either condition leaves the other unproven.
      ja: SourceOffset は explicit unit/origin を持つ一 non-negative offset で point を示し、SourceRange は一 ordered axis の start/end/endpoint convention で line・page・text range に継承されます。two-dimensional region は SourceRegion に属します。両者は SourceLocation を共有しますが、一方の条件から他方は導けません。
    source_claims:
      - claim-source-offset-008
      - claim-source-offset-009
parent_relation:
  id: SourceOffset-is_a-SourceLocation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: 来源偏移是一种来源位置，并以声明单位下的单一非负点坐标为种差。
    en: SourceOffset is a SourceLocation specialized by one non-negative point coordinate under a declared unit.
    ja: SourceOffset は宣言 unit の一 non-negative point coordinate で細分化した SourceLocation です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体来源系统、版本策略和选择器策略。
    en: Cardinality depends on the concrete source system, version policy, and selector policy.
    ja: cardinality は concrete source system・version policy・selector policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SourceOffset-is_a-SourceLocation-example-positive-manual-001
      labels:
        zh: SourceOffset-is_a-SourceLocation正例
        en: SourceOffset-is_a-SourceLocation positive case
        ja: SourceOffset-is_a-SourceLocation正例
      scenario_id: null
      descriptions:
        zh: byte offset 4096 指向一个边界点。
        en: Byte offset 4096 points to one boundary point.
        ja: byte offset 4096 は一 boundary point を指します。
      field_values: {}
      related_node_ids:
        - SourceOffset
        - SourceLocation
      related_relation_ids:
        - SourceOffset-is_a-SourceLocation
      source_claims:
        - claim-source-offset-010
    - id: SourceOffset-is_a-SourceLocation-example-boundary-manual-001
      labels:
        zh: SourceOffset-is_a-SourceLocation边界例
        en: SourceOffset-is_a-SourceLocation boundary case
        ja: SourceOffset-is_a-SourceLocation境界例
      scenario_id: null
      descriptions:
        zh: start=4096,end=4104 选择一个区间。
        en: start=4096,end=4104 selects an interval.
        ja: start=4096,end=4104 は interval を選びます。
      field_values: {}
      related_node_ids:
        - SourceOffset
        - SourceLocation
      related_relation_ids:
        - SourceOffset-is_a-SourceLocation
      source_claims:
        - claim-source-offset-011
  source_claims:
    - claim-source-offset-012
  distinct_fact_rationale:
    zh: SourceOffset-is_a-SourceLocation 记录 SourceOffset 到 SourceLocation 的单一 is_a 事实，不能由端点命名、共现或其他边自动替代。
    en: SourceOffset-is_a-SourceLocation records one is_a fact from SourceOffset to SourceLocation; endpoint naming, co-occurrence, or another edge cannot substitute for it.
    ja: SourceOffset-is_a-SourceLocation は SourceOffset から SourceLocation への一 is_a fact を記録し、endpoint naming・co-occurrence・他 edge では代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against W3C Web Annotation, RFC 3986/8089/9530, LSP position encoding, and PROV-O.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-source-offset-001
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-002
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. For SourceOffset.offset, the field records this reviewed value: A non-negative position counted from the coordinate-system origin."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-003
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. For SourceOffset.unit, the field records this reviewed value: Declares whether offset is interpreted in bytes, characters, or code units."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-004
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines the first character or byte as position zero. Moonweave records that origin explicitly so point coordinates are not ambiguous.
    locator: §4.2.5 Text Position Selector and §4.2.6 Data Position Selector
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-source-offset-005
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed positive case for SourceOffset: offset=4096 with unit=byte points to one byte boundary in a disk image."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-006
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed instance case for SourceOffset: A parser begins reading at character offset=412 while another rule supplies the end."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-007
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This evidence supports the manually reviewed boundary case for SourceOffset: start=4096,end=4104 selects eight bytes."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector uses numeric stream positions and defines the first byte as position zero; Moonweave retains a point-only offset subtype. This claim supports only the SourceOffset endpoint of its sibling distinction.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a start-inclusive and end-exclusive range; Moonweave generalizes the interval contract before specializing units. This claim supports only the SourceRange endpoint of its sibling distinction.
    locator: §4.2.5 Text Position Selector, lines 983–1002
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-010
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector defines byte-stream positions; Moonweave separates one point offset from a start-end range. This evidence supports the manually reviewed positive case for SourceOffset-is_a-SourceLocation: Byte offset 4096 points to one boundary point."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-011
    source: eng-std-w3c-web-annotation-model
    supports: "W3C DataPositionSelector defines byte-stream positions; Moonweave separates one point offset from a start-end range. This evidence supports the manually reviewed boundary case for SourceOffset-is_a-SourceLocation: start=4096,end=4104 selects an interval."
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-offset-012
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector defines byte-stream positions; Moonweave separates one point offset from a start-end range.
    locator: §4.2.6 Data Position Selector, lines 1021–1035
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

