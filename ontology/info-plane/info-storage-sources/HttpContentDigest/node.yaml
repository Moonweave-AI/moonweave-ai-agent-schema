    url: https://www.rfc-editor.org/rfc/rfc9530.html
    source_type: official-standard
    relevance: Defines Content-Digest and Repr-Digest HTTP fields as Structured Fields Dictionaries for different covered data.
source_claims:
  - id: claim-rfc9530-content-digest-field
    source: rfc9530
    supports: RFC 9530 defines Content-Digest as an HTTP Structured Fields Dictionary whose members provide digest values for HTTP message content.
    locator: Sections 1.2 and 2
    evidence_kind: official-standard
    confidence: high
  - id: claim-local-http-content-digest-record-projection
    source: rfc9530
    supports: Moonweave's http_message_identifier, field_location, and digest_members record is a local projection of the RFC 9530 Content-Digest field; it retains the field location and dictionary members without claiming that this JSON shape is an RFC serialization.
    locator: Sections 1.2 and 2
    evidence_kind: design-inference
    confidence: high

