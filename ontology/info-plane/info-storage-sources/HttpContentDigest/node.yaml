schema: moonweave.ai/ontology-node/v1
id: HttpContentDigest
kind: concept
status: accepted
labels:
  zh: HTTP Content-Digest 字段
  en: HTTP Content-Digest Field
  ja: HTTP Content-Digest フィールド
semantics:
  short_definition:
    zh: RFC 9530 Content-Digest HTTP 字段的完整性信息对象，用于 HTTP 消息内容。
    en: An integrity-information object for the RFC 9530 Content-Digest HTTP field over HTTP message content.
    ja: HTTP メッセージ内容に対する RFC 9530 Content-Digest HTTP フィールドの完全性情報オブジェクト。
  definition:
    zh: HttpContentDigest 记录 RFC 9530 定义的 Content-Digest 字段：一个 HTTP Structured Fields Dictionary，其成员将摘要算法名称映射到 HTTP 消息内容的字节序列摘要值。它仅覆盖实际 HTTP 消息内容，不是 Repr-Digest 的整个所选表示数据，不是通用文件摘要、来源版本、ETag、响应正文或访问授权。
    en: 'HttpContentDigest records the RFC 9530 Content-Digest field: an HTTP Structured Fields Dictionary whose members map digest-algorithm names to byte-sequence digest values for HTTP message content. It covers only actual HTTP message content, not Repr-Digest''s entire selected representation data, a general file digest, source version, ETag, response body, or access authorization.'
    ja: HttpContentDigest は、ダイジェストアルゴリズム名を HTTP メッセージ内容のバイト列ダイジェスト値へ対応付ける HTTP Structured Fields Dictionary である RFC 9530 の Content-Digest フィールドを記録します。実際の HTTP メッセージ内容だけを対象とし、Repr-Digest の選択表現データ全体、一般的なファイルダイジェスト、ソース版、ETag、応答本文、アクセス認可ではありません。
  why_needed:
    zh: HTTP 消息内容可能经由头字段或 trailer 携带多个算法的完整性成员。保留 Dictionary 形状和字段位置可使消费者处理协议字段，而不会把它误作本地字节摘要或所选表示摘要。
    en: HTTP message content can carry integrity members for multiple algorithms in a header field or trailer. Preserving the Dictionary shape and field location lets consumers handle the protocol field without mistaking it for a local byte digest or selected-representation digest.
    ja: HTTP メッセージ内容は、ヘッダーフィールドまたはトレーラーで複数アルゴリズムの完全性メンバーを伝達できます。Dictionary 形状とフィールド位置を保持することで、利用者はそれをローカルバイトダイジェストまたは選択表現ダイジェストと誤認せずにプロトコルフィールドを処理できます。
  includes:
    - zh: HTTP 消息标识、header 或 trailer 位置，以及包含一个或多个算法成员的 Content-Digest Dictionary。
      en: HTTP message identifier, header or trailer location, and a Content-Digest Dictionary with one or more algorithm members.
      ja: HTTP メッセージ識別子、header または trailer の位置、および一つ以上のアルゴリズムメンバーを持つ Content-Digest Dictionary。
  excludes:
    - zh: 整个所选表示数据的 Repr-Digest、文件字节摘要、HTTP 响应正文、ETag、签名、来源修订和认证信息。
      en: Repr-Digest for entire selected representation data, file-byte digest, HTTP response body, ETag, signature, source revision, and authentication information.
      ja: 選択表現データ全体の Repr-Digest、ファイルバイトダイジェスト、HTTP 応答本文、ETag、署名、ソース改訂、認証情報。
  semantic_kind: information
  aliases:
    - content-digest-field
    - http-message-content-digest
engineering:
  explanation:
    zh: 在 HTTP 字段解析边界接收 http_message_identifier、field_location 和 digest_members。实现必须将 Content-Digest 解析为 Structured Fields Dictionary，保留全部成员并将每个成员解释为字节序列值；它只能绑定实际 HTTP 消息内容，不能用 Repr-Digest、文件哈希或部分字节范围替代。
    en: At the HTTP field-parsing boundary, accept http_message_identifier, field_location, and digest_members. An implementation must parse Content-Digest as a Structured Fields Dictionary, preserve all members, and interpret each member as a byte-sequence value; it can bind only actual HTTP message content and cannot substitute Repr-Digest, a file hash, or a partial byte range.
    ja: HTTP フィールド解析境界では http_message_identifier、field_location、digest_members を受け取ります。実装は Content-Digest を Structured Fields Dictionary として解析し、すべてのメンバーを保持して各メンバーをバイト列値として解釈します。実際の HTTP メッセージ内容だけに束縛でき、Repr-Digest、ファイルハッシュ、部分バイト範囲で代替できません。
  typical_input:
    - description:
        zh: HTTP header 中含两个算法成员的 Content-Digest 字段
        en: Content-Digest header field with two algorithm members
        ja: 二つのアルゴリズムメンバーを持つ Content-Digest header フィールド
      format: 'Content-Digest: sha-256=:YWJj:, sha-512=:ZGVm:'
      source_claims:
        - claim-rfc9530-content-digest-field
  typical_output:
    - description:
        zh: 不含消息正文的字段信息对象
        en: Field-information object without message body
        ja: メッセージ本文を含まないフィールド情報オブジェクト
      format: '{"http_message_identifier":"https://example.org/spec#response-42","field_location":"header","digest_members":{"sha-256":":YWJj:","sha-512":":ZGVm:"}}'
      source_claims:
        - claim-rfc9530-content-digest-field
  reference_implementations:
    - name: RFC 9530 Content-Digest field
      url: https://www.rfc-editor.org/rfc/rfc9530.html
      description: Defines Content-Digest as an HTTP Structured Fields Dictionary for HTTP message content integrity.
structure:
  identity_keys:
    - http_message_identifier
    - field_location
    - digest_members
  fields:
    - id: http_message_identifier
      labels:
        zh: HTTP 消息标识
        en: HTTP message identifier
        ja: HTTP メッセージ識別子
      definitions:
        zh: 调用方用于区分承载该 Content-Digest 字段的 HTTP 消息的本地或外部标识。
        en: Local or external identifier used by the caller to distinguish the HTTP message carrying this Content-Digest field.
        ja: この Content-Digest フィールドを運ぶ HTTP メッセージを区別するために呼び出し側が用いるローカルまたは外部識別子。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: https://example.org/spec#response-42
      allowed_values: []
      source_claims:
        - claim-rfc9530-content-digest-field
    - id: field_location
      labels:
        zh: 字段位置
        en: Field location
        ja: フィールド位置
      definitions:
        zh: Content-Digest 在该 HTTP 消息中出现于 header 还是 trailer 的位置。
        en: Location at which Content-Digest appears in the HTTP message as a header or trailer.
        ja: Content-Digest が HTTP メッセージ内で header または trailer として現れる位置。
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: header
      allowed_values:
        - header
        - trailer
      source_claims:
        - claim-rfc9530-content-digest-field
    - id: digest_members
      labels:
        zh: 摘要成员字典
        en: Digest-member dictionary
        ja: ダイジェストメンバー辞書
      definitions:
        zh: 以算法名称为键、以 HTTP Structured Fields 字节序列值为值的非空 Content-Digest Dictionary。
        en: Nonempty Content-Digest Dictionary keyed by algorithm name with HTTP Structured Fields byte-sequence values.
        ja: アルゴリズム名をキー、HTTP Structured Fields のバイト列値を値とする空でない Content-Digest Dictionary。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        sha-256: ':YWJj:'
        sha-512: ':ZGVm:'
      allowed_values: []
      source_claims:
        - claim-rfc9530-content-digest-field
  constraints:
    - id: http-content-digest-requires-message-content-dictionary
      severity: error
      expression_language: plain
      expression: http_message_identifier, field_location, and digest_members must be present; field_location must be header or trailer; digest_members must contain one or more algorithm-name keys with Structured Fields byte-sequence values and must describe actual HTTP message content rather than entire selected representation data, a partial byte range, or a response body.
      explanation:
        zh: RFC 9530 的 Content-Digest 是协议字段 Dictionary，不是一个可随意缩减为单一哈希字符串的通用摘要对象。它的完整性语义绑定 HTTP 消息内容。
        en: RFC 9530 Content-Digest is a protocol-field Dictionary, not a general digest object that can be reduced arbitrarily to one hash string. Its integrity semantics bind HTTP message content.
        ja: RFC 9530 の Content-Digest はプロトコルフィールド Dictionary であり、任意に単一ハッシュ文字列へ縮小できる一般的なダイジェストオブジェクトではありません。その完全性意味論は HTTP メッセージ内容に束縛されます。
      source_claims:
        - claim-rfc9530-content-digest-field
        - claim-local-http-content-digest-record-projection
        - claim-local-http-content-digest-record-projection
  required_relations: []
