          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验确认 SourceReference 是被引用对象的稳定入口；SourceLocation、SourceIdentity 与 SourceAnchor 分别承接定位、可核验状态和漂移后重识别。ResourceDescriptor 只描述引用的展示与读取信息，SourceProvenance 则作为该 SourceReference 的出处事实分支，记录派生、生成与归属链。
            en: Point-by-point review confirms SourceReference as the stable entry to the referent, with SourceLocation, SourceIdentity, and SourceAnchor owning location, verifiable state, and drift-resistant re-identification. ResourceDescriptor only carries display and retrieval description for the reference, whereas SourceProvenance is the reference's provenance-fact branch for derivation, generation, and attribution chains.
            ja: 個別審査により SourceReference を referent への安定入口とし、SourceLocation・SourceIdentity・SourceAnchor が location・verifiable state・drift-resistant re-identification を担います。ResourceDescriptor は参照の表示・読取情報だけを記述し、SourceProvenance はその SourceReference の derivation・generation・attribution chain を記録する provenance fact 分枝です。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: SourceReference 是唯一根，并以 has_identity、has_location、has_anchor、described_by 与 has_provenance 展开可核验状态、定位、锚点、展示说明和出处事实。SourceProvenance 不再伪装成 ResourceDescriptor 的下位类型；两条旧描述符边仅作为迁移历史保留。
            en: SourceReference is the sole root and unfolds verifiable state, location, anchor, display description, and provenance facts through has_identity, has_location, has_anchor, described_by, and has_provenance. SourceProvenance is no longer presented as a ResourceDescriptor subtype; the two old descriptor edges remain only as migration history.
