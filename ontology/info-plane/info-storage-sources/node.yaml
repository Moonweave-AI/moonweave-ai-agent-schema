schema: moonweave.ai/ontology-node/v1
id: info-storage-sources
kind: module
status: accepted
labels:
  zh: 来源引用与证据定位
  en: Source references and evidence location
  ja: 出典参照と証拠位置
semantics:
  short_definition:
    zh: 来源引用与证据定位只描述“如何指向并核对一个已有对象”。SourceReference 是唯一根，其下区分资源、结构化记录与治理对象的引用，并通过位置、范围、锚点、版本、摘要和出处信息定位引用对象；被引用对象本身不在此重新分类。
    en: Source references and verification uses source reference (SourceReference) as its key notion, classifies references to resources, records, and governance objects, and connects independent source-location, source-identity, source-anchor, and resource-description branches for selection, state, recovery, and provenance.
    ja: 出典参照と検証は「出典参照」（SourceReference）をキー概念とし、資源、記録、ガバナンス対象への参照を階層化します。独立した出典位置、出典同一性、出典アンカー、資源記述の各分岐によって、選択、状態、復元、来歴の情報を接続します。
  definition:
    zh: 本模块拥有引用记录而非 referent。ResourceReference、RecordReference 和 GovernanceReference 回答“指向什么类型的对象”；SourceLocation/SourceRange/SourceRegion 回答“对象内的哪一部分”；SourceIdentity 以版本与摘要固定内容状态；SourceAnchor 保留可重定位的引用或内容锚。读取、检索、授权或执行该对象的活动属于其他模块。
    en: Source references and verification uses source reference (SourceReference) as its key notion, classifies references to resources, records, and governance objects, and connects independent source-location, source-identity, source-anchor, and resource-description branches for selection, state, recovery, and provenance.
    ja: 出典参照と検証は「出典参照」（SourceReference）をキー概念とし、資源、記録、ガバナンス対象への参照を階層化します。独立した出典位置、出典同一性、出典アンカー、資源記述の各分岐によって、選択、状態、復元、来歴の情報を接続します。
  why_needed:
    zh: 使每个来源事实都能回答引用哪个对象、选择哪一部分、核验哪个内容状态、如何恢复漂移位置以及由谁治理。
    en: Make every source fact answer which object is referenced, which part is selected, which content state is verified, how a drifting location is recovered, and who governs it.
    ja: 各 source fact が referenced object・selected part・verified content state・drift recovery・governance owner を答えられるようにします。
  includes:
    - zh: ResourceReference、RecordReference 和 GovernanceReference 的任意深度引用分类。
      en: Arbitrary-depth reference classification under ResourceReference, RecordReference, and GovernanceReference.
      ja: ResourceReference・RecordReference・GovernanceReference 下の arbitrary-depth reference classification。
    - zh: SourceLocation 的点/一维范围/多轴区域结构、SourceIdentity 的版本/摘要/校验值组成，以及 SourceAnchor 的引用/内容锚。
      en: SourceLocation point, one-dimensional range, and multi-axis region structure; SourceIdentity version/digest/checksum composition; and SourceAnchor citation/content anchors.
      ja: SourceLocation の point・one-dimensional range・multi-axis region structure、SourceIdentity の version/digest/checksum composition、SourceAnchor の citation/content anchor。
    - zh: ResourceDescriptor 与 SourceProvenance 描述，以及到 TextDocument、DataZone 和 TrustBoundary 的 referent 连接。
      en: ResourceDescriptor and SourceProvenance descriptions plus referent links to TextDocument, DataZone, and TrustBoundary.
      ja: ResourceDescriptor/SourceProvenance description と TextDocument・DataZone・TrustBoundary への referent link。
  excludes:
    - zh: 被引用资源正文、摄入生命周期和持久化副本归 memory-ingestion 或资源业务 owner。
      en: Referenced content, ingestion lifecycle, and persisted copies belong to memory-ingestion or the resource's business owner.
      ja: referenced content・ingestion lifecycle・persisted copy は memory-ingestion または resource business owner に属します。
    - zh: 授权、策略决定、边界穿越和数据区规则归安全域；GovernanceReference 只定位这些对象。
      en: Authorization, policy decisions, boundary crossings, and data-zone rules belong to safety; GovernanceReference only locates those objects.
      ja: authorization・policy decision・boundary crossing・data-zone rule は safety 所有で GovernanceReference はそれらを locate するだけです。
    - zh: 检索、抓取、文件读取和网络请求是运行活动，不是 SourceReference 或 SourceLocation。
      en: Retrieval, fetching, file reads, and network requests are runtime activities, not SourceReference or SourceLocation.
      ja: retrieval・fetching・file read・network request は runtime activity で SourceReference/SourceLocation ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 使每个来源事实都能回答引用哪个对象、选择哪一部分、核验哪个内容状态、如何恢复漂移位置以及由谁治理。
  en: Make every source fact answer which object is referenced, which part is selected, which content state is verified, how a drifting location is recovered, and who governs it.
  ja: 各 source fact が referenced object・selected part・verified content state・drift recovery・governance owner を答えられるようにします。
