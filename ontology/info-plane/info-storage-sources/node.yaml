schema: moonweave.ai/ontology-node/v1
id: info-storage-sources
kind: module
labels:
  zh: 来源引用与证据定位
  en: Source references and evidence location
  ja: 出典参照と証拠位置
semantics:
  short_definition:
    zh: 来源引用与证据定位描述如何指向并核对一个已有对象，以及在该对象内部选择哪一段、哪一版本、哪一个锚点作为证据。
    en: Source references and evidence location describe how to point at and verify an existing object and which segment, version, or anchor inside it counts as evidence.
    ja: 出典参照と証拠位置は、既存オブジェクトへの指し示しと検証、およびその内部でどの segment・version・anchor を証拠とするかを記述します。
  definition:
    zh: 本模块以 SourceReference 为唯一根，拥有 ResourceReference、RecordReference 和 GovernanceReference 三类引用分类，并通过 SourceLocation、SourceIdentity、SourceAnchor 与 SourceProvenance 分支回答“指向什么、选中哪一部分、固定哪个内容状态、如何恢复漂移位置、由谁治理”。ResourceReference 覆盖文件、网络文档与 MCP/A2A 资源 URI；RecordReference 覆盖数据库行与图节点；GovernanceReference 只定位 TrustBoundary 与 DataZone 等治理对象而不复制策略规则。被引用对象的正文、摄入生命周期、读取活动与授权判定归其他模块；这里只记录引用记录本身及其可复核的定位字段。
    en: This module roots in SourceReference and owns ResourceReference, RecordReference, and GovernanceReference classifications plus SourceLocation, SourceIdentity, SourceAnchor, and SourceProvenance branches that answer what is referenced, which part is selected, which content state is fixed, how a drifting location is recovered, and who governs it. ResourceReference covers files, network documents, and MCP/A2A resource URIs; RecordReference covers database rows and graph nodes; GovernanceReference locates TrustBoundary and DataZone objects without copying policy rules. Referenced content bodies, ingestion lifecycles, read activities, and authorization decisions belong elsewhere; this module records only the reference and its verifiable locators.
    ja: 本モジュールは SourceReference を唯一 root とし、ResourceReference/RecordReference/GovernanceReference 分類と SourceLocation/SourceIdentity/SourceAnchor/SourceProvenance branch で「何を参照するか、どの part を選ぶか、どの content state を固定するか、drift 位置をどう復元するか、誰が govern するか」を答えます。ResourceReference は file/network document/MCP/A2A resource URI、RecordReference は DB row/graph node、GovernanceReference は TrustBoundary/DataZone を locate するだけで policy rule は複製しません。参照先本文、ingestion lifecycle、read activity、認可判定は他 module に属し、ここでは reference と検証可能 locator のみを記録します。
  why_needed:
    zh: 没有来源引用，prompt 里的段落无法回答“来自哪份文件第几行、引用的是哪个版本、URI 漂移后如何仍指向同一证据”。Citation、检索命中和 MCP resources/read 结果都会退化成无法审计的裸文本。
    en: Without source references, a prompt passage cannot answer which file and line it came from, which version was cited, or how the same evidence is recovered after URI drift. Citations, retrieval hits, and MCP resources/read results devolve into unauditable bare text.
    ja: 出典参照がなければ prompt 内段落が「どの file の何行か、どの version か、URI drift 後も同一証拠をどう指すか」を答えられません。Citation、検索 hit、MCP resources/read 結果は監査不能な裸 text に退化します。
  includes:
    - zh: ResourceReference、RecordReference、GovernanceReference 及其下任意深度的引用分类（文件、网络源、数据库行、图节点等）。
      en: ResourceReference, RecordReference, GovernanceReference, and arbitrary-depth subtypes such as files, network sources, database rows, and graph nodes.
      ja: ResourceReference/RecordReference/GovernanceReference と file/network source/DB row/graph node 等の任意深度 subtype。
    - zh: SourceLocation 的点/范围/区域结构、SourceIdentity 的版本与内容摘要、SourceAnchor 的引用锚与内容锚，以及 ResourceDescriptor 与 SourceProvenance。
      en: SourceLocation point, range, and region structures; SourceIdentity version and content digest; SourceAnchor citation and content anchors; plus ResourceDescriptor and SourceProvenance.
      ja: SourceLocation point/range/region 構造、SourceIdentity version/content digest、SourceAnchor citation/content anchor、ResourceDescriptor/SourceProvenance。
  excludes:
    - zh: 被引用资源正文、摄入生命周期和持久化副本归 memory-ingestion 或资源业务 owner。
      en: Referenced content bodies, ingestion lifecycles, and persisted copies belong to memory-ingestion or the resource's business owner.
      ja: 参照先本文、ingestion lifecycle、永続 copy は memory-ingestion または resource business owner に属します。
    - zh: 授权、策略决定与边界穿越归安全域；GovernanceReference 只定位这些对象。
      en: Authorization, policy decisions, and boundary crossings belong to safety; GovernanceReference only locates those objects.
      ja: 認可、policy decision、boundary crossing は safety domain に属し、GovernanceReference は locate のみです。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 主流系统都把“资源 URI”“文件路径”“数据库主键”“页码/行号/单元格范围”和“内容 digest”作为不同字段。MCP resources/read 用 uri 读取并返回 contents[].uri、mimeType 与 text/blob；A2A FilePart 用 name、mimeType 与 bytes 或 uri 指向附件；OpenAI/Anthropic 消息中的 image_url 或 file block 则提供 URL 或 base64 来源。本模块用这些权威字段组合成可复核的 SourceReference，而不把读取活动或引用正文复制进引用节点本身。
    en: Mainstream systems treat resource URI, file path, database primary key, page/line/cell ranges, and content digest as distinct fields. MCP resources/read reads by uri and returns contents[].uri, mimeType, and text or blob; A2A FilePart uses name, mimeType, and bytes or uri for attachments; OpenAI and Anthropic image_url or file blocks provide URL or base64 provenance. This module combines those authoritative fields into verifiable SourceReferences without copying read activities or referenced bodies into the reference node itself.
    ja: 主要システムは resource URI、file path、DB primary key、page/line/cell range、content digest を別フィールドとして扱います。MCP resources/read は uri で読み contents[].uri/mimeType/text/blob を返し、A2A FilePart は name/mimeType/bytes/uri で添付を指し、OpenAI/Anthropic image_url/file block は URL/base64 provenance を提供します。本 module はこれら権威 field を検証可能 SourceReference に合成し、read activity や参照本文を reference node 自体へ複製しません。
  typical_input:
    - description: MCP resources/read — URI-identified contextual resource.
      format: |
        {"jsonrpc":"2.0","id":3,"method":"resources/read","params":{"uri":"file:///workspace/docs/onboarding.md"}}
        =>
        {
          "contents": [
            {"uri":"file:///workspace/docs/onboarding.md","mimeType":"text/markdown","text":"# Onboarding\n..."}
          ]
        }
      source_claims: [claim-info-sources-mcp-resources]
    - description: A2A FilePart — named file attachment with mimeType and bytes or uri.
      format: |
        {
          "kind": "file",
          "file": {
            "name": "invoice-104.pdf",
            "mimeType": "application/pdf",
            "uri": "https://storage.example.com/invoices/104.pdf"
          }
        }
      source_claims: [claim-info-sources-a2a-file]
    - description: Structured record reference — database row by container and primary key.
      format: |
        {
          "reference_id": "dbrow-crm-orders-7812",
          "database_id": "crm",
          "relation_name": "orders",
          "primary_key": {"order_id": 7812},
          "resource_identifier": "postgresql://crm/orders"
        }
      source_claims: [claim-info-sources-design]
    - description: Text document span — file plus line range and content digest.
      format: |
        {
          "resource_uri": "repo://docs/security-boundary.md",
          "source_range": {"kind": "line", "start": 42, "end": 58},
          "content_digest_sha256": "355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e"
        }
      source_claims: [claim-info-sources-design]
  typical_output:
    - description: Moonweave-local SourceReference projection — referent, location, identity, and provenance.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "source_reference_id": "source-ref-mcp-onboarding-md",
          "most_specific_class": "FileResourceReference",
          "resource_uri": "file:///workspace/docs/onboarding.md",
          "mime_type": "text/markdown",
          "source_span": "lines:12..24",
          "content_digest_sha256": "355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e"
        }
      source_claims: [claim-info-sources-design]
  reference_implementations:
    - name: MCP Server Resources
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list, resources/read, and URI-scheme resource identity with mimeType and text/blob contents.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: FilePart with name, mimeType, bytes, or uri for attachment provenance.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Entity, location, and generation semantics for provenance-aware references.
structure:
  identity_keys: [source_reference_id]
  fields:
    - id: source_reference_id
      labels: {zh: 来源引用标识, en: Source reference identifier, ja: 出典参照識別子}
      definitions:
        zh: 唯一标识一条 SourceReference 记录的稳定 ID；引用节点记录 pointer 与 locator，不替代 referent 对象身份。
        en: Stable ID uniquely identifying one SourceReference record; the reference node holds pointers and locators, not the referent object's identity.
        ja: 一 SourceReference 記録を一意識別する安定 ID。reference node は pointer/locator を保持し、referent object identity は代替しません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: source-ref-mcp-onboarding-md
      allowed_values: []
      source_claims: [claim-info-sources-design]
    - id: resource_uri
      labels: {zh: 资源 URI, en: Resource URI, ja: リソース URI}
      definitions:
        zh: MCP、A2A 或仓库协议中用于读取或引用上下文的 URI 字符串，例如 file:///workspace/docs/onboarding.md 或 repo://docs/architecture.md。
        en: URI string used to read or reference contextual data in MCP, A2A, or repository schemes, such as file:///workspace/docs/onboarding.md or repo://docs/architecture.md.
        ja: MCP/A2A/リポジトリ scheme で文脈データを読取/参照する URI 文字列（file:///workspace/docs/onboarding.md、repo://docs/architecture.md 等）。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: file:///workspace/docs/onboarding.md
      allowed_values: []
      source_claims: [claim-info-sources-mcp-resources]
    - id: mime_type
      labels: {zh: 媒体类型, en: Media type, ja: メディアタイプ}
      definitions:
        zh: 被引用资源或片段的 MIME 类型，例如 text/markdown、application/pdf；必须与读取响应或 FilePart 声明一致。
        en: MIME type of the referenced resource or segment, such as text/markdown or application/pdf; must match the read response or FilePart declaration.
        ja: 参照 resource/segment の MIME type（text/markdown、application/pdf 等）。read response または FilePart 宣言と一致必須。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: text/markdown
      allowed_values: []
      source_claims: [claim-info-sources-mcp-resources, claim-info-sources-a2a-file]
    - id: source_range
      labels: {zh: 来源范围, en: Source range, ja: 出典範囲}
      definitions:
        zh: 对象内部的选中范围，例如 lines:42..58、chars:0..479、pages:3..3 或 cells:B2:D10；无范围时表示整对象引用。
        en: Selected internal range such as lines:42..58, chars:0..479, pages:3..3, or cells:B2:D10; absent when the whole object is referenced.
        ja: オブジェクト内部の選択 range（lines:42..58、chars:0..479、pages:3..3、cells:B2:D10 等）。範囲なしは whole object 参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: lines:42..58
      allowed_values: []
      source_claims: [claim-info-sources-design]
    - id: content_digest_sha256
      labels: {zh: 内容摘要, en: Content digest, ja: 内容ダイジェスト}
      definitions:
        zh: 被引用内容在固定版本下的 SHA-256 摘要，用于验证引用时内容是否仍与 cited state 一致。
        en: SHA-256 digest of referenced content at a fixed version, used to verify the content still matches the cited state when the reference is resolved.
        ja: 固定 version における参照 content の SHA-256 digest。reference 解決時に cited state と一致するか検証します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[a-f0-9]{64}$'
      example_value: 355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e
      allowed_values: []
      source_claims: [claim-info-sources-design]
  constraints:
    - id: info-sources-reference-not-referent
      severity: error
      expression_language: plain
      expression: A SourceReference must not be registered as the canonical identity of referenced content; resolving a reference must not mutate the referent's owning module classification.
      explanation:
        zh: 把引用当成正文会把 pointer 与 payload 混同，破坏跨模块边界。
        en: Treating a reference as content conflates pointer and payload and breaks cross-module boundaries.
        ja: reference を content とみなすと pointer/payload が混同され、module 境界が壊れます。
      source_claims: [claim-info-sources-design]
    - id: info-sources-digest-mismatch-rejects-citation
      severity: error
      expression_language: plain
      expression: When content_digest_sha256 is present, a resolved reference whose live content digest differs must not satisfy a citation claim without recording revision drift.
      explanation:
        zh: 没有 digest 校验，就无法发现“引用的版本”和“实际读到的版本”已经分叉。
        en: Without digest verification, a cited version and the live read version can diverge unnoticed.
        ja: digest 検証がなければ cited version と live read version の分岐に気付けません。
      source_claims: [claim-info-sources-design]
  required_relations: []
examples:
  - id: info-sources-example-mcp-resource-read
    labels:
      zh: MCP resources/read Markdown 文档引用
      en: MCP resources/read Markdown document reference
      ja: MCP resources/read Markdown 文書参照
    descriptions:
      zh: 客户端对 MCP 服务器调用 resources/read，params.uri=file:///workspace/docs/onboarding.md。响应 contents[0] 含 uri、mimeType=text/markdown 与 text 正文。系统创建 source-ref-mcp-onboarding-md，most_specific_class=FileResourceReference，并保存 mime_type 与 resource_uri。
      en: The client calls resources/read with params.uri=file:///workspace/docs/onboarding.md. Response contents[0] includes uri, mimeType=text/markdown, and text body. The system creates source-ref-mcp-onboarding-md as FileResourceReference and stores mime_type and resource_uri.
      ja: クライアントが resources/read を呼び params.uri=file:///workspace/docs/onboarding.md を指定。応答 contents[0] は uri、mimeType=text/markdown、text 本文を含みます。source-ref-mcp-onboarding-md を FileResourceReference として作成し mime_type/resource_uri を保存します。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    field_values:
      source_reference_id: source-ref-mcp-onboarding-md
      resource_uri: file:///workspace/docs/onboarding.md
      mime_type: text/markdown
      most_specific_class: FileResourceReference
    related_node_ids: [info-storage-sources, info-indexing]
    related_relation_ids: []
    source_claims: [claim-info-sources-mcp-resources]
  - id: info-sources-example-a2a-file-part
    labels:
      zh: A2A FilePart 附件来源
      en: A2A FilePart attachment source
      ja: A2A FilePart 添付出典
    descriptions:
      zh: A2A Message 含 kind=file 的 Part，file.name=invoice-104.pdf，mimeType=application/pdf，uri=https://storage.example.com/invoices/104.pdf。系统创建 FileResourceReference，保留 name 与 uri，但不把 PDF bytes 复制进 SourceReference 节点。
      en: An A2A Message contains a kind=file Part with file.name=invoice-104.pdf, mimeType=application/pdf, uri=https://storage.example.com/invoices/104.pdf. The system creates a FileResourceReference preserving name and uri without copying PDF bytes into the SourceReference node.
      ja: A2A Message に kind=file Part（file.name=invoice-104.pdf、mimeType=application/pdf、uri=https://storage.example.com/invoices/104.pdf）を含みます。FileResourceReference を作成し name/uri を保持しますが、PDF bytes は SourceReference node へ複製しません。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
    field_values:
      file_name: invoice-104.pdf
      mime_type: application/pdf
      resource_uri: https://storage.example.com/invoices/104.pdf
    related_node_ids: [info-storage-sources, info-messages-instructions]
    related_relation_ids: []
    source_claims: [claim-info-sources-a2a-file]
  - id: info-sources-example-database-row-reference
    labels:
      zh: 数据库行 RecordReference
      en: Database row RecordReference
      ja: データベース行 RecordReference
    descriptions:
      zh: 引用 dbrow-crm-orders-7812 以 database_id=crm、relation_name=orders、primary_key.order_id=7812 标识单行。分类为 DatabaseRowReference，祖先链 SourceReference→RecordReference→DatabaseRowReference。
      en: Reference dbrow-crm-orders-7812 identifies one row by database_id=crm, relation_name=orders, and primary_key.order_id=7812. It classifies as DatabaseRowReference with ancestry SourceReference→RecordReference→DatabaseRowReference.
      ja: 参照 dbrow-crm-orders-7812 が database_id=crm、relation_name=orders、primary_key.order_id=7812 で一行を識別。DatabaseRowReference に分類し、祖先链 SourceReference→RecordReference→DatabaseRowReference。
    example_source:
      product: Moonweave source reference design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      reference_id: dbrow-crm-orders-7812
      database_id: crm
      relation_name: orders
      primary_key:
        order_id: 7812
    related_node_ids: [info-storage-sources]
    related_relation_ids: []
    source_claims: [claim-info-sources-design]
  - id: info-sources-example-line-span-with-digest
    labels:
      zh: 带 digest 的行范围引用
      en: Line-span reference with content digest
      ja: digest 付き行範囲参照
    descriptions:
      zh: 对 repo://docs/security-boundary.md 的 lines:42..58 创建引用，content_digest_sha256 固定 cited 版本。重读时若 digest 不匹配，系统拒绝“仍指向同一证据”断言并记录 revision drift。
      en: A reference to repo://docs/security-boundary.md lines:42..58 stores content_digest_sha256 for the cited version. On reread, if the digest mismatches, the system rejects a same-evidence claim and records revision drift.
      ja: repo://docs/security-boundary.md lines:42..58 参照に content_digest_sha256 を保存。再読込で digest 不一致なら同一証拠 claim を拒否し revision drift を記録します。
    example_source:
      product: Moonweave source reference design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      resource_uri: repo://docs/security-boundary.md
      source_range: lines:42..58
      content_digest_sha256: 355247694ba49e2a3be867fbf737a3d157f0a5ed4c9d60723c1fb47ef880dc1e
    related_node_ids: [info-storage-sources]
    related_relation_ids: []
    source_claims: [claim-info-sources-design]
  - id: info-sources-example-governance-reference
    labels:
      zh: GovernanceReference 定位数据区
      en: GovernanceReference locating a data zone
      ja: GovernanceReference によるデータゾーン位置付け
    descriptions:
      zh: GovernanceReference gov-ref-zone-pii-eu 指向 DataZone zone/pii-eu，用于说明后续 FileResourceReference 引用的客户导出文件受该数据区治理。本模块只定位 zone，不复制 zone 内的 retention 或 access 规则。
      en: GovernanceReference gov-ref-zone-pii-eu points to DataZone zone/pii-eu to indicate that a later FileResourceReference to a customer export file is governed by that zone. This module locates the zone only and does not copy retention or access rules inside it.
      ja: GovernanceReference gov-ref-zone-pii-eu が DataZone zone/pii-eu を指し、後続 FileResourceReference の customer export file が当該 zone 管轄であることを示します。本 module は zone を locate するだけで retention/access rule は複製しません。
    example_source:
      product: Moonweave governance reference design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      governance_reference_id: gov-ref-zone-pii-eu
      data_zone_id: zone/pii-eu
      most_specific_class: DataZoneReference
    related_node_ids: [info-storage-sources]
    related_relation_ids: []
    source_claims: [claim-info-sources-design]
parent_relation: null
relations: []
