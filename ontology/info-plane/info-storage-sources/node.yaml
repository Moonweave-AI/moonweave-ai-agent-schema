source_claims:
  - id: claim-info-sources-mcp-resources
    source: src-mcp-resources
    supports: MCP resources/read fetches contextual data by URI and returns contents with uri, mimeType, and text or blob fields distinct from tool invocation results.
    locator: Server features > Resources > resources/read request and response
    evidence_kind: primary-spec
    confidence: high
  - id: claim-info-sources-a2a-file
