      content_digest: sha256:884
    related_node_ids:
      - OutputInformation
    related_relation_ids: []

    source_claims:
      - claim-output-information-001
      - claim-output-information-002
  - id: OutputInformation-example-boundary-manual-20260716

    labels:
      zh: 仅声明首尾上限的窗口
      en: Window declaring only head and tail limits
      ja: head/tail 上限だけの window

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; OutputInformation must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; OutputInformation must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

