schema: moonweave.ai/ontology-node/v1
id: OutputInformation
kind: concept
labels:
  zh: 输出信息
  en: output information
  ja: 出力情報
semantics:
  short_definition:
    zh: 在某次披露语境中被选中、扣留或截断的信息集合根。
    en: Root collection of information selected, withheld, or truncated in one disclosure context.
    ja: 一回開示文脈で selected/withheld/truncated された情報の root collection。
  definition:
    zh: OutputInformation 组织 DisclosedOutputSegment、SuppressedContext、TruncatedContextSpan 与 OutputCitation；它描述披露产物，不是源模型输出或 DisclosureActivity 本身。
    en: OutputInformation organizes DisclosedOutputSegment, SuppressedContext, TruncatedContextSpan, and OutputCitation. It describes disclosure products, not raw model output or DisclosureActivity itself.
    ja: OutputInformation は disclosure 产物を组织。
  why_needed:
    zh: 共同上位类让披露内容和输出引用共享来源、范围与摘要查询，同时避免把操作或规范误当成内容节点。
    en: A common parent lets disposition content and output citations share source, extent, and digest queries without misclassifying operations or specifications as content.
    ja: 共通上位型により処置内容と出力引用が出典・範囲・digest 検索を共有し、操作や仕様を内容ノードと誤分類しません。
  includes:
    - zh: 带有稳定来源、产生者和可核验范围的文本、结构化结果、输出片段或支持性引用。
      en: Text, structured results, output fragments, or supporting citations with stable source, producer, and verifiable extent.
      ja: 安定した出典・生成者・検証可能な範囲を持つ text・structured result・output fragment・supporting citation。
  excludes:
    - zh: 生成或披露内容的活动、决定处置的记录、窗口限制规范，以及只承载输出的流容器。
      en: Activities that generate or disclose content, disposition decisions, window-limit specifications, and stream containers that merely carry output.
      ja: content を生成・開示する活動、処置判断、window limit 仕様、出力を運ぶだけの stream container。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OpenAI output_text 可见子集、Anthropic text block 子集与 A2A Artifact part 子集都可作为 OutputInformation 成员。
    en: Visible subsets of OpenAI output_text, Anthropic text blocks, and A2A Artifact parts may be OutputInformation members.
    ja: 各 protocol visible subset を member 化。
  typical_input: []
  typical_output:
    - description: Output information bundle
      format: '{"output_information_id":"outinfo-204","disclosure_record_id":"record-204"}'
      source_claims:
        - claim-output-info-design
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys:
    - output_information_id
  fields:
    - id: output_information_id
      labels:
        zh: 输出信息标识
        en: output-information ID
        ja: 出力情報 ID
      definitions:
        zh: 稳定标识一项输出内容或输出证据。
        en: Stably identifies one item of output content or evidence.
        ja: 一つの出力内容または証拠を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-info-884
      allowed_values: []
      source_claims:
        - claim-output-information-001
        - claim-output-information-002
    - id: producer_ref
      labels:
        zh: 产生者引用
        en: producer reference
        ja: 生成者参照
      definitions:
        zh: 引用产生该信息的模型、工具或执行活动。
        en: References the model, tool, or execution activity that produced the information.
        ja: 情報を生成した model・tool・execution activity を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: tool-attempt-41
      allowed_values: []
      source_claims:
        - claim-output-information-001
        - claim-output-information-002
    - id: source_ref
      labels:
        zh: 来源引用
        en: source reference
        ja: 出典参照
      definitions:
        zh: 引用可回溯到的输入、轨迹或持久工件。
        en: References the input, trace, or persisted artifact to which the output can be traced.
        ja: 出力を遡及できる input・trace・persisted artifact を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: trace-span-41
      allowed_values: []
      source_claims:
        - claim-output-information-001
        - claim-output-information-002
    - id: extent
      labels:
        zh: 输出范围
        en: output extent
        ja: 出力範囲
      definitions:
        zh: 记录该项在来源输出中的顺序位置或连续范围。
        en: Records the item's ordinal position or contiguous extent in source output.
        ja: source output 内の順序位置または連続範囲を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: bytes:120-880
      allowed_values: []
      source_claims:
        - claim-output-information-001
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      definitions:
        zh: 固定用于审计同一内容版本的摘要值。
        en: Fixes the digest used to audit the same content revision.
        ja: 同じ内容版を監査する digest 値を固定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha256:884
      allowed_values: []
      source_claims:
        - claim-output-information-002
  constraints: []
  required_relations: []
examples:
  - id: OutputInformation-example-mixed
    labels:
      zh: 混合披露信息
      en: Mixed disclosure information
      ja: 混合 disclosure 情報
    descriptions:
      zh: outinfo-204 同时含 DisclosedOutputSegment 与 SuppressedContext。
      en: outinfo-204 contains both DisclosedOutputSegment and SuppressedContext.
      ja: 混合 member。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: mixed members
    field_values: {}
    related_node_ids:
      - OutputInformation
    related_relation_ids: []
    source_claims:
      - claim-output-info-design
  - id: OutputInformation-example-citation
    labels:
      zh: 含引用信息
      en: With citation information
      ja: citation 付き
    descriptions:
      zh: DisclosedOutputSegment 关联 OutputCitation 指向 SourceReference。
      en: DisclosedOutputSegment links OutputCitation to SourceReference.
      ja: citation 关联。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: citation link
    field_values: {}
    related_node_ids:
      - OutputInformation
      - OutputCitation
      - info-storage-sources
    related_relation_ids: []
    source_claims:
      - claim-output-info-design
  - id: OutputInformation-example-not-source
    labels:
      zh: 非源输出
      en: Not source output
      ja: source output ではない
    descriptions:
      zh: 完整 resp_01ABC JSON 是源输出，不是 OutputInformation。
      en: Full resp_01ABC JSON is source output, not OutputInformation.
      ja: full JSON≠OutputInformation。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/responses
      version: boundary
    field_values: {}
    related_node_ids:
      - OutputInformation
    related_relation_ids: []
    source_claims:
      - claim-output-info-design
parent_relation: null
relations: []
sources:
  - id: src-openai-responses
    title: OpenAI Responses API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/responses
    source_type: official-doc
    relevance: response.output[] typed items and output_text aggregation.
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
source_claims:
  - id: claim-output-information-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-information-002
    source: eng-fw-openai-tracing
    supports: OpenAI Agents SDK tracing distinguishes a generation span's model input and output from the surrounding trace and allows sensitive input or output capture to be disabled. Moonweave therefore models source output, disclosure processing, and audience-visible disposition as separate facts.
    locator: OpenAI Agents SDK Tracing documentation, Traces and spans plus Sensitive data sections
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-information-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents context-engineering documentation describes replacing a large result with a bounded preview and a stable file reference while preserving access to the complete stored output. Moonweave uses this as evidence for output-window specifications and separately recorded omitted ranges, not as a definition of Moonweave's window classes.
    locator: Deep Agents JavaScript documentation, Context engineering > Offloading, large tool result preview
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-info-design
    source: src-info-output-design
    supports: OutputInformation bundles disclosure products distinct from full source output.
    locator: OutputInformation
    evidence_kind: design-inference
    confidence: high
