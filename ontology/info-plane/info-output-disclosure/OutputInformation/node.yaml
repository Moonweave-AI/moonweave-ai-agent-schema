schema: moonweave.ai/ontology-node/v1
id: OutputInformation
kind: concept
status: review
labels:
  zh: 输出信息
  en: output information
  ja: 出力情報
semantics:
  short_definition:
    zh: 由一次模型、工具或执行产生，并具有可追踪来源与范围的输出内容或证据。
    en: Output content or evidence produced by a model, tool, or execution with traceable source and extent.
    ja: model・tool・execution が生成し、追跡可能な出典と範囲を持つ出力内容または証拠です。
  definition:
    zh: 输出信息是一种信息实体，以输出标识、产生者、来源、顺序或范围以及内容摘要为身份。DisclosureArtifact 和 OutputCitation 在本模块中分别表示披露处置内容与证据引用；OutputWindow 是选择规范，DisclosureActivity 是处理活动，均不是输出信息。
    en: OutputInformation is an information entity identified by output ID, producer, source, order or extent, and content digest. In this module, DisclosureArtifact and OutputCitation represent disposition content and evidentiary citation respectively; OutputWindow is a selection specification and DisclosureActivity is a processing activity, so neither is OutputInformation.
    ja: OutputInformation は output ID・producer・source・order/extent・content digest で識別する情報実体です。本モジュールの DisclosureArtifact と OutputCitation は処置内容と証拠引用を表しますが、OutputWindow は選択仕様、DisclosureActivity は処理活動であり出力情報ではありません。
  why_needed:
    zh: 共同上位类让披露内容和输出引用共享来源、范围与摘要查询，同时避免把操作或规范误当成内容节点。
    en: A common parent lets disposition content and output citations share source, extent, and digest queries without misclassifying operations or specifications as content.
    ja: 共通上位型により処置内容と出力引用が出典・範囲・digest 検索を共有し、操作や仕様を内容ノードと誤分類しません。
  includes:
    - zh: 带有稳定来源、产生者和可核验范围的文本、结构化结果、输出片段或支持性引用。
      en: Text, structured results, output fragments, or supporting citations with stable source, producer, and verifiable extent.
      ja: 安定した出典・生成者・検証可能な範囲を持つ text・structured result・output fragment・supporting citation。
  excludes:
    - zh: 生成或披露内容的活动、决定处置的记录、窗口限制规范，以及只承载输出的流容器。
      en: Activities that generate or disclose content, disposition decisions, window-limit specifications, and stream containers that merely carry output.
      ja: content を生成・開示する活動、処置判断、window limit 仕様、出力を運ぶだけの stream container。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - output_information_id
  fields:
    - id: output_information_id
      labels:
        zh: 输出信息标识
        en: output-information ID
        ja: 出力情報 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一项输出内容或输出证据。
        en: Stably identifies one item of output content or evidence.
        ja: 一つの出力内容または証拠を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: output-info-884
      source_claims:
        - claim-output-information-001
        - claim-output-information-002
    - id: producer_ref
      labels:
        zh: 产生者引用
        en: producer reference
        ja: 生成者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该信息的模型、工具或执行活动。
        en: References the model, tool, or execution activity that produced the information.
        ja: 情報を生成した model・tool・execution activity を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-41
      source_claims:
        - claim-output-information-001
        - claim-output-information-002
    - id: source_ref
      labels:
        zh: 来源引用
        en: source reference
        ja: 出典参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用可回溯到的输入、轨迹或持久工件。
        en: References the input, trace, or persisted artifact to which the output can be traced.
        ja: 出力を遡及できる input・trace・persisted artifact を参照します。
      allowed_values: []
      pattern: null
      example_value: trace-span-41
      source_claims:
        - claim-output-information-001
        - claim-output-information-002
    - id: extent
      labels:
        zh: 输出范围
        en: output extent
        ja: 出力範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该项在来源输出中的顺序位置或连续范围。
        en: Records the item's ordinal position or contiguous extent in source output.
        ja: source output 内の順序位置または連続範囲を記録します。
      allowed_values: []
      pattern: null
      example_value: bytes:120-880
      source_claims:
        - claim-output-information-001
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定用于审计同一内容版本的摘要值。
        en: Fixes the digest used to audit the same content revision.
        ja: 同じ内容版を監査する digest 値を固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:884
      source_claims:
        - claim-output-information-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: OutputInformation-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 工具输出中的诊断片段
      en: Diagnostic fragment from a tool result
      ja: tool result の診断断片
    scenario_id: null
    descriptions:
      zh: output-info-884 由 tool-attempt-41 产生，指向 trace-span-41 的 bytes 120–880，并保存 sha256:884 摘要。
      en: output-info-884 was produced by tool-attempt-41, covers bytes 120–880 of trace-span-41, and carries digest sha256:884.
      ja: output-info-884 は tool-attempt-41 が生成し、trace-span-41 の bytes 120–880 を占め、sha256:884 を持ちます。
    field_values:
      output_information_id: output-info-884
      producer_ref: tool-attempt-41
      source_ref: trace-span-41
      extent: bytes:120-880
      content_digest: sha256:884
    related_node_ids:
      - OutputInformation
    related_relation_ids: []
    expected_result:
      zh: 建立一项可按来源、范围和摘要查询的输出信息。
      en: Create one output-information item queryable by source, extent, and digest.
      ja: 出典・範囲・digest で照会できる出力情報を作成します。
    why_valid_or_invalid:
      zh: 产生者、来源、范围和内容版本均可核验，不依赖披露处置才成立。
      en: Producer, source, extent, and content revision are verifiable independently of any disclosure disposition.
      ja: 生成者・出典・範囲・内容版を開示処置と独立に検証できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-output-information-001
      - claim-output-information-002
  - id: OutputInformation-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 仅声明首尾上限的窗口
      en: Window declaring only head and tail limits
      ja: head/tail 上限だけの window
    scenario_id: output-disclosure-outputinformation-boundary
    descriptions:
      zh: window-12 只声明保留首 80 行、末 40 行；它没有产生者、来源范围或内容摘要，也不承载具体输出。
      en: window-12 only declares that the first eighty and last forty lines may be retained; it has no producer, source extent, or content digest and carries no output itself.
      ja: window-12 は先頭 80 行と末尾 40 行の保持だけを宣言し、生成者・出典範囲・content digest・具体内容を持ちません。
    field_values: {}
    related_node_ids:
      - OutputWindow
      - OutputInformation
    related_relation_ids: []
    expected_result:
      zh: 分类为 OutputWindow，不建立 OutputInformation。
      en: Classify it as OutputWindow and do not create OutputInformation.
      ja: OutputWindow と分類し OutputInformation を作りません。
    why_valid_or_invalid:
      zh: 范围规范约束可能内容，但自身不是被产生的输出内容或证据。
      en: A range specification constrains possible content but is not produced output content or evidence.
      ja: 範囲仕様は内容を制約しますが、生成された出力内容や証拠ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-output-information-003
      - claim-output-information-001
external_mappings: []
