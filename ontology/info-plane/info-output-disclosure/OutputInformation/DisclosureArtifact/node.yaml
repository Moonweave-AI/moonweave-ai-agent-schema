        ja: 適用受け手参照
      definitions:
        zh: 引用该处置内容针对的 Actor 或受众组。
        en: References the Actor or audience group for which the disposition applies.
        ja: 処置が適用される Actor または受け手群を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
