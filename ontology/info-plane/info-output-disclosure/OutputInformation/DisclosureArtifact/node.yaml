schema: moonweave.ai/ontology-node/v1
id: DisclosureArtifact
kind: concept
labels:
  zh: 披露处置内容
  en: disclosure disposition artifact
  ja: 開示処置内容
semantics:
  short_definition:
    zh: 披露过程产生的可持久化产物上位类型。
    en: Supertype for durable artifacts produced by disclosure processing.
    ja: disclosure 処理が生成する durable artifact 上位型。
  definition:
    zh: DisclosureArtifact 覆盖 DisclosedOutputSegment、SuppressedContext、TruncatedContextSpan；它是审计产物，不是 Streaming chunk 临时缓冲或模型原始 JSON。
    en: DisclosureArtifact covers DisclosedOutputSegment, SuppressedContext, TruncatedContextSpan—audit artifacts, not streaming chunk buffers or raw model JSON.
    ja: DisclosureArtifact は audit 产物 branch root。
  why_needed:
    zh: 该中间层把三种互斥处置内容纳入同一来源范围核算，同时不把它们与活动、决定或持久运行产物混为一类。
    en: This intermediate class gives three mutually exclusive disposition contents one source-range accounting while keeping them distinct from activities, decisions, and persistent runtime artifacts.
    ja: この中間型は三つの排他的処置内容を同じ出典範囲会計にまとめ、活動・判断・永続 runtime artifact と分離します。
  includes:
    - zh: 对一个来源范围明确标记为 disclosed、suppressed 或 truncated 的受众相关内容记录。
      en: Audience-specific content records marking one source extent as disclosed, suppressed, or truncated.
      ja: 一つの source extent を disclosed・suppressed・truncated と明示する受け手別内容記録。
  excludes:
    - zh: 完整报告文件、导出包、策略决定、处理活动，以及只汇总处置事实而不承载范围的 DisclosureRecord。
      en: Complete report files, export packages, policy decisions, processing activities, and DisclosureRecord entries that summarize dispositions without carrying the content extent.
      ja: 完全な report file・export package・policy decision・processing activity・内容範囲を運ばない DisclosureRecord。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 每个 artifact 绑定 disclosure_activity_id 与 source_range。
    en: Each artifact binds disclosure_activity_id and source_range.
    ja: artifact は activity/range に binding。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
