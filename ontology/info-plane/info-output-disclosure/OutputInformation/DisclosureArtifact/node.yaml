        zh: 处置种类
        en: disposition kind
        ja: 処置種別
      definitions:
        zh: 记录 disclosed、suppressed 或 truncated 中的一种内容状态。
        en: "Records one content state: disclosed, suppressed, or truncated."
        ja: disclosed・suppressed・truncated のいずれかの内容状態を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
