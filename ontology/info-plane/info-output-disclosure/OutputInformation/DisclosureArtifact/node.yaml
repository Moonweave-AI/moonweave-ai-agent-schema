        en: source-output reference
        ja: 元出力参照
      definitions:
        zh: 引用处置前未改变的来源输出。
        en: References the unchanged source output before disposition.
        ja: 処置前の変更されていない source output を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-segment-17
      allowed_values: []
      source_claims:
        - claim-disclosure-artifact-003
        - claim-disclosure-artifact-001
    - id: audience_ref
