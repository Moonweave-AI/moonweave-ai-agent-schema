schema: moonweave.ai/ontology-node/v1
id: DisclosureArtifact
kind: concept
status: accepted
labels:
  zh: 披露处置内容
  en: disclosure disposition artifact
  ja: 開示処置内容
semantics:
  short_definition:
    zh: 记录一次受众相关披露处置所涉及内容范围与结果的输出信息。
    en: Output information recording the content extent and result of one audience-specific disclosure disposition.
    ja: 一回の受け手別開示処置について内容範囲と結果を記録する出力情報です。
  definition:
    zh: 披露处置内容是 OutputInformation 的子类，以被处置的内容片段或其稳定引用、来源输出、受众与处置种类为身份。其下位类分别表示已发布、按规则扣留和按窗口省略的内容；它不是披露活动、选择决定或审计记录，也不是运行 Artifact 的存储版本。
    en: A DisclosureArtifact is an OutputInformation subtype identified by disposition-artifact ID, source output, audience, disposition kind, and content digest. Its subtypes record published content, rule-withheld content, and window-omitted content; it is neither a stored runtime Artifact revision nor the activity or audit record that performs or records the disposition.
    ja: DisclosureArtifact は disposition artifact ID・source output・audience・disposition kind・content digest で識別する OutputInformation subtype です。下位型は公開内容・規則で留保した内容・window で省略した内容を記録し、保存 runtime Artifact 版、処置活動、監査記録ではありません。
  why_needed:
    zh: 该中间层把三种互斥处置内容纳入同一来源范围核算，同时不把它们与活动、决定或持久运行产物混为一类。
    en: This intermediate class gives three mutually exclusive disposition contents one source-range accounting while keeping them distinct from activities, decisions, and persistent runtime artifacts.
    ja: この中間型は三つの排他的処置内容を同じ出典範囲会計にまとめ、活動・判断・永続 runtime artifact と分離します。
  includes:
    - zh: 对一个来源范围明确标记为 disclosed、suppressed 或 truncated 的受众相关内容记录。
      en: Audience-specific content records marking one source extent as disclosed, suppressed, or truncated.
      ja: 一つの source extent を disclosed・suppressed・truncated と明示する受け手別内容記録。
  excludes:
    - zh: 完整报告文件、导出包、策略决定、处理活动，以及只汇总处置事实而不承载范围的 DisclosureRecord。
      en: Complete report files, export packages, policy decisions, processing activities, and DisclosureRecord entries that summarize dispositions without carrying the content extent.
      ja: 完全な report file・export package・policy decision・processing activity・内容範囲を運ばない DisclosureRecord。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: source_output_ref
      labels:
        zh: 来源输出引用
        en: source-output reference
        ja: 元出力参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用处置前未改变的来源输出。
        en: References the unchanged source output before disposition.
        ja: 処置前の変更されていない source output を参照します。
      allowed_values: []
      pattern: null
      example_value: output-segment-17
      source_claims:
        - claim-disclosure-artifact-003
        - claim-disclosure-artifact-001
    - id: audience_ref
      labels:
        zh: 适用受众引用
        en: applicable-audience reference
        ja: 適用受け手参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该处置内容针对的 Actor 或受众组。
        en: References the Actor or audience group for which the disposition applies.
        ja: 処置が適用される Actor または受け手群を参照します。
      allowed_values: []
      pattern: null
      example_value: user-7
      source_claims:
        - claim-disclosure-artifact-004
    - id: disposition_kind
      labels:
        zh: 处置种类
        en: disposition kind
        ja: 処置種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 disclosed、suppressed 或 truncated 中的一种内容状态。
        en: "Records one content state: disclosed, suppressed, or truncated."
        ja: disclosed・suppressed・truncated のいずれかの内容状態を記録します。
      allowed_values: []
      pattern: null
      example_value: suppressed
      source_claims:
        - claim-disclosure-artifact-002
        - claim-disclosure-artifact-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureArtifact-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 记录被扣留的令牌范围
      en: Record a withheld token range
      ja: 留保 token 範囲を記録
    scenario_id: null
    descriptions:
      zh: disposition-artifact-17 指向 output-segment-17 的令牌范围、user-7 和 sha256:17，并标记为 suppressed。
      en: disposition-artifact-17 points to the token extent of output-segment-17 for user-7, fixes digest sha256:17, and marks it suppressed.
      ja: disposition-artifact-17 は output-segment-17 の token 範囲・user-7・sha256:17 を結び、suppressed と記録します。
    field_values:
      source_output_ref: output-segment-17
      audience_ref: user-7
      disposition_kind: suppressed
      content_digest: sha256:17
      output_information_id: output-info-disposition-artifact-17
      producer_ref: suppress-884
      source_ref: output-segment-17
      extent: tokens:340-412
    related_node_ids:
      - DisclosureArtifact
      - SuppressedContext
    related_relation_ids: []
    expected_result:
      zh: 建立处置内容上位记录，并由具体 SuppressedContext 表达扣留种类。
      en: Create the disposition-content record and use SuppressedContext for the concrete withheld kind.
      ja: 処置内容記録を作り、具体的留保種別を SuppressedContext で表します。
    why_valid_or_invalid:
      zh: 来源范围、受众、处置值与内容版本完整，且记录承载内容范围而非仅汇总审计。
      en: Source extent, audience, disposition, and content revision are complete, and the record carries content rather than only an audit summary.
      ja: 出典範囲・受け手・処置・内容版が揃い、単なる監査要約でなく内容範囲を運びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-artifact-001
      - claim-disclosure-artifact-002
      - claim-disclosure-artifact-004
  - id: DisclosureArtifact-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 独立版本化的报告文件
      en: Independently versioned report file
      ja: 独立 versioned report file
    scenario_id: output-disclosure-disclosureartifact-boundary
    descriptions:
      zh: report-41 具有 artifact ID、存储位置、版本和完整文件摘要，可被多个披露活动复用，但没有受众相关的处置种类。
      en: report-41 has an artifact ID, storage location, version, and full-file digest and can be reused by many disclosures, but it has no audience-specific disposition kind.
      ja: report-41 は artifact ID・storage location・version・full-file digest を持ち複数開示で再利用されますが、受け手別処置種別を持ちません。
    field_values: {}
    related_node_ids:
      - ReportArtifact
      - DisclosureArtifact
    related_relation_ids: []
    expected_result:
      zh: 保留为运行产物，不创建 DisclosureArtifact。
      en: Keep it as a runtime artifact and do not create a DisclosureArtifact.
      ja: runtime artifact として保持し DisclosureArtifact を作りません。
    why_valid_or_invalid:
      zh: 其身份由存储和版本沿革决定，而不是一次披露的受众、范围与处置。
      en: Its identity comes from storage and version lineage, not one disclosure's audience, extent, and disposition.
      ja: 同一性は storage/version lineage で決まり、一回の開示の受け手・範囲・処置ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-artifact-001
      - claim-disclosure-artifact-003
external_mappings: []
