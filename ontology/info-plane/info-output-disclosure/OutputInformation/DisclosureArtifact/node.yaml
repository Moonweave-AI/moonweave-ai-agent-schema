  definitions:
    zh: 具有可追踪来源、受众、处置种类和内容范围的 DisclosureArtifact，是 OutputInformation 中专门记录披露处置内容的子类。
    en: A DisclosureArtifact with traceable source, audience, disposition kind, and content extent is the OutputInformation subtype dedicated to disclosure-disposition content.
    ja: 追跡可能な source・audience・disposition kind・content extent を持つ DisclosureArtifact を、開示処置内容専用の OutputInformation subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
