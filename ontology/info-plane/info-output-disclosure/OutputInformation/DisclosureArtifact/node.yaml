    en: disclosure disposition artifact is output information
    ja: 開示処置内容は出力情報である
  definitions:
    zh: 具有可追踪来源、受众、处置种类和内容范围的 DisclosureArtifact，是 OutputInformation 中专门记录披露处置内容的子类。
    en: A DisclosureArtifact with traceable source, audience, disposition kind, and content extent is the OutputInformation subtype dedicated to disclosure-disposition content.
    ja: 追跡可能な source・audience・disposition kind・content extent を持つ DisclosureArtifact を、開示処置内容専用の OutputInformation subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
