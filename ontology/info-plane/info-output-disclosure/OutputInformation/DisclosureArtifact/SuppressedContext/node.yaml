schema: moonweave.ai/ontology-node/v1
id: SuppressedContext
kind: concept
status: accepted
labels:
  zh: 已抑制内容
  en: suppressed content
  ja: 抑制済み内容
semantics:
  short_definition:
    zh: 因授权、隐私、安全或信任规则而不向指定受众发布的披露处置内容。
    en: Disclosure disposition content withheld from a specified audience by an authorization, privacy, safety, or trust rule.
    ja: authorization・privacy・safety・trust rule により指定受け手へ公開しない開示処置内容です。
  definition:
    zh: 已抑制内容是 DisclosureArtifact 的子类，以抑制记录标识、来源范围、受众、规则引用和扣留原因代码为身份。它表示规则驱动的 withheld 处置内容而非审计记录本身，也不是长度窗口造成的省略、可由用户展开的界面折叠或删除原始输出。
    en: SuppressedContext is a DisclosureArtifact subtype identified by suppression ID, source extent, audience, rule reference, and withhold-reason code. It represents a rule-driven withheld disposition, not omission caused by a length window, a user-expandable UI collapse, or deletion of source output.
    ja: SuppressedContext は suppression ID・source extent・audience・rule reference・withhold reason code で識別する DisclosureArtifact subtype です。rule-driven withheld 処置を表し、length window の省略、展開可能 UI、source output 削除ではありません。
  why_needed:
    zh: 独立记录被扣留范围，可在不暴露敏感内容的情况下证明哪条规则阻止了哪个受众看到哪些来源范围。
    en: A separate withheld-range record proves which rule prevented which audience from seeing which source extent without exposing the sensitive content itself.
    ja: 留保範囲を別記録し、機微内容を公開せず、どの規則がどの受け手にどの範囲を見せなかったかを証明します。
  includes:
    - zh: 密钥、个人信息、越权数据、恶意工具输出或按信任边界禁止发布的连续范围。
      en: Secrets, personal data, unauthorized data, malicious tool output, or contiguous extents barred at a trust boundary.
      ja: secret・personal data・unauthorized data・malicious tool output・trust boundary で禁止された連続範囲。
  excludes:
    - zh: 只因输出过长而省略的行、仍可由受众展开的详情、已成功脱敏后允许发布的片段和源文件删除。
      en: Lines omitted only because output is long, detail still expandable by the audience, successfully redacted and allowed fragments, and source-file deletion.
      ja: 長さだけで省略した行・受け手が展開可能な detail・redaction 後 allow された fragment・source file 削除。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: source_range
      labels:
        zh: 扣留来源范围
        en: withheld source range
        ja: 留保元範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录未向受众发布的来源输出偏移。
        en: Records the source-output offsets not released to the audience.
        ja: 受け手へ公開しなかった source-output offset を記録します。
      allowed_values: []
      pattern: null
      example_value: bytes:340-412
      source_claims:
        - claim-suppressed-context-004
    - id: rule_ref
      labels:
        zh: 扣留规则引用
        en: withhold-rule reference
        ja: 留保規則参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用直接要求扣留该范围的 DisclosureRule。
        en: References the DisclosureRule directly requiring the extent to be withheld.
        ja: 範囲の留保を直接要求する DisclosureRule を参照します。
      allowed_values: []
      pattern: null
      example_value: secret-rule-3
      source_claims:
        - claim-suppressed-context-001
        - claim-suppressed-context-002
    - id: reason_code
      labels:
        zh: 扣留原因代码
        en: withhold-reason code
        ja: 留保理由コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 authorization、privacy、safety 或 trust 中的直接原因类别。
        en: "Records the immediate reason category: authorization, privacy, safety, or trust."
        ja: authorization・privacy・safety・trust の直接理由区分を記録します。
      allowed_values: []
      pattern: null
      example_value: secret
      source_claims:
        - claim-suppressed-context-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: SuppressedContext-example-positive-manual-20260716

    labels:
      zh: 扣留访问令牌
      en: Withhold an access token
      ja: access token を留保

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; SuppressedContext maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; SuppressedContext maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; SuppressedContext context/token boundary."}

    field_values:
      source_range: bytes:340-412
      audience_ref: external-user-7
      rule_ref: secret-rule-3
      reason_code: secret
      source_output_ref: output-41
      disposition_kind: suppressed
      content_digest: sha256:suppressed-17
      output_information_id: output-info-suppressed-17
      producer_ref: suppress-884
      source_ref: output-41
      extent: bytes:340-412
    related_node_ids:
      - SuppressedContext
      - DisclosureRule
    related_relation_ids:
      - SuppressedContext-withheld_by-DisclosureRule

    source_claims:
      - claim-suppressed-context-001
      - claim-suppressed-context-002
      - claim-suppressed-context-003
  - id: SuppressedContext-example-boundary-manual-20260716

    labels:
      zh: 为长度省略日志中段
      en: Omit log middle for length
      ja: 長さのため log 中央を省略

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SuppressedContext must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; SuppressedContext must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - TruncatedContextSpan
      - SuppressedContext
    related_relation_ids: []

    source_claims:
      - claim-suppressed-context-005
      - claim-suppressed-context-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SuppressedContext-is_a-DisclosureArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 已抑制内容属于披露处置内容
    en: suppressed content is disclosure disposition content
    ja: 抑制済み内容は開示処置内容である
  definitions:
    zh: 绑定受众、来源范围、扣留规则和原因的 withheld 内容记录，是 DisclosureArtifact 的 suppressed 处置子类。
    en: A withheld content record binding audience, source extent, withhold rule, and reason is the suppressed-disposition subtype of DisclosureArtifact.
    ja: audience・source extent・withhold rule・reason を結ぶ withheld 内容記録を DisclosureArtifact の suppressed 処置 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：已抑制内容属于披露处置内容
      en: inverse reading of suppressed content is disclosure disposition content
      ja: 抑制済み内容は開示処置内容であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SuppressedContext-is_a-DisclosureArtifact-example-positive-manual-20260716
      labels:
        zh: 确认已抑制内容属于披露处置内容
        en: Confirm suppressed content is disclosure disposition content
        ja: 抑制済み内容は開示処置内容であるを確認
      scenario_id: output-disclosure-suppressedcontext-is_a-disclosureartifact-positive
      descriptions:
        zh: suppressed-17 记录 secret-rule-3 阻止 external-user-7 看见 bytes 340–412。
        en: suppressed-17 records that secret-rule-3 prevented external-user-7 from seeing bytes 340–412.
        ja: suppressed-17 は secret-rule-3 が external-user-7 に bytes 340–412 を見せなかったことを記録します。
      field_values: {}
      related_node_ids:
        - SuppressedContext
        - DisclosureArtifact
      related_relation_ids:
        - SuppressedContext-is_a-DisclosureArtifact
      source_claims:
        - claim-suppressed-context-004
        - claim-suppressed-context-001
        - claim-suppressed-context-002
    - id: SuppressedContext-is_a-DisclosureArtifact-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判已抑制内容属于披露处置内容
        en: Reject a false suppressed content is disclosure disposition content
        ja: 抑制済み内容は開示処置内容であるの誤判定を拒否
      scenario_id: output-disclosure-suppressedcontext-is_a-disclosureartifact-boundary
      descriptions:
        zh: 日志中段仅因 120 行上限未保留，没有 DisclosureRule。
        en: A log middle is omitted only because of a 120-line limit and has no DisclosureRule.
        ja: log middle は 120 行上限だけで省略され DisclosureRule がありません。
      field_values: {}
      related_node_ids:
        - SuppressedContext
        - DisclosureArtifact
      related_relation_ids:
        - SuppressedContext-is_a-DisclosureArtifact
      source_claims:
        - claim-suppressed-context-004
        - claim-suppressed-context-001
        - claim-suppressed-context-002
  source_claims:
    - claim-suppressed-context-004
    - claim-suppressed-context-001
    - claim-suppressed-context-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: SuppressedContext-withheld_by-DisclosureRule
    predicate: withheld_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 已抑制内容被披露规则扣留
      en: suppressed content is withheld by a disclosure rule
      ja: 抑制済み内容が開示規則により留保される
    definitions:
      zh: 该关系指向直接要求对特定受众扣留该来源范围的 DisclosureRule，并保留规则版本和原因；规则不是被扣留内容的父类。
      en: This relation points to the DisclosureRule revision that directly requires a source extent to be withheld from an audience and preserves its reason; the rule is not a parent class of the content.
      ja: 特定受け手から source extent を留保する直接の DisclosureRule revision と理由を示し、rule を内容の親型とはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_withheld_by
      labels:
        zh: 反向读取：已抑制内容被披露规则扣留
        en: inverse reading of suppressed content is withheld by a disclosure rule
        ja: 抑制済み内容が開示規則により留保されるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: SuppressedContext-withheld_by-DisclosureRule-example-positive-manual-20260716
        labels:
          zh: 确认已抑制内容被披露规则扣留
          en: Confirm suppressed content is withheld by a disclosure rule
          ja: 抑制済み内容が開示規則により留保されるを確認
        scenario_id: output-disclosure-suppressedcontext-withheld_by-disclosurerule-positive
        descriptions:
          zh: suppressed-17 的 rule_ref 为 secret-rule-3@5，决定日志记录该版本返回 deny。
          en: suppressed-17 has rule_ref secret-rule-3@5, and the decision log records deny from that revision.
          ja: suppressed-17 の rule_ref は secret-rule-3@5 で decision log はその版の deny を記録します。
        field_values: {}
        related_node_ids:
          - SuppressedContext
          - DisclosureRule
        related_relation_ids:
          - SuppressedContext-withheld_by-DisclosureRule
        source_claims:
          - claim-suppressed-context-001
          - claim-suppressed-context-002
      - id: SuppressedContext-withheld_by-DisclosureRule-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判已抑制内容被披露规则扣留
          en: Reject a false suppressed content is withheld by a disclosure rule
          ja: 抑制済み内容が開示規則により留保されるの誤判定を拒否
        scenario_id: output-disclosure-suppressedcontext-withheld_by-disclosurerule-boundary
        descriptions:
          zh: secret-rule-4 也处理密钥，但未参与本次决定，版本和受众均不同。
          en: secret-rule-4 also concerns secrets but did not participate in this decision and has a different revision and audience.
          ja: secret-rule-4 も secret を扱いますが本判断に参加せず revision/audience が異なります。
        field_values: {}
        related_node_ids:
          - SuppressedContext
          - DisclosureRule
        related_relation_ids:
          - SuppressedContext-withheld_by-DisclosureRule
        source_claims:
          - claim-suppressed-context-001
          - claim-suppressed-context-002
    source_claims:
      - claim-suppressed-context-001
      - claim-suppressed-context-002
    distinct_fact_rationale:
      zh: 本关系只表达所列源端到目标端的具体事实，不把相邻节点、共享受众或时间接近自动推成该事实。
      en: This relation states only the listed source-to-target fact; adjacent nodes, a shared audience, or temporal proximity do not imply it.
      ja: この relation は列挙した source-to-target 事実だけを表し、隣接 node・shared audience・time proximity から自動推論しません。
    layout_role: cross-link
    review_status: accepted
    target: concept:DisclosureRule
