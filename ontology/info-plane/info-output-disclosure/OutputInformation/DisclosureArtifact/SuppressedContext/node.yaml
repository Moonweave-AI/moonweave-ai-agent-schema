        expected_result:
          zh: 不得因规则主题相似而建立 withheld_by 关系。
          en: Do not create withheld_by merely because the rule topic is similar.
          ja: rule topic が似るだけで withheld_by を作りません。
        why_valid_or_invalid:
          zh: 必须由具体决定日志证明哪个规则版本直接导致扣留。
          en: A concrete decision log must prove which rule revision directly caused withholding.
          ja: 具体 decision log がどの rule revision が留保を直接生じたか証明する必要があります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-suppressed-context-001
          - claim-suppressed-context-002
    source_claims:
      - claim-suppressed-context-001
      - claim-suppressed-context-002
