schema: moonweave.ai/ontology-node/v1
id: SuppressedContext
kind: concept
labels:
  zh: 已抑制内容
  en: suppressed content
  ja: 抑制済み内容
semantics:
  short_definition:
    zh: 因规则抑制而未向受众发布的源输出范围记录。
    en: Record of source output ranges withheld from audience by rule suppression.
    ja: rule suppress により audience へ未公開の source range record。
  definition:
    zh: SuppressedContext 记录 suppress disposition 的 source_range 与 rule_id；例如内部 tool_use 细节或 credential 片段。不是 SuppressionRule 本体。
    en: SuppressedContext records source_range and rule_id for suppress dispositions—e.g., internal tool_use details or credential spans. Not the SuppressionRule itself.
    ja: SuppressedContext は withhold 范围 audit。
  why_needed:
    zh: 独立记录被扣留范围，可在不暴露敏感内容的情况下证明哪条规则阻止了哪个受众看到哪些来源范围。
    en: A separate withheld-range record proves which rule prevented which audience from seeing which source extent without exposing the sensitive content itself.
    ja: 留保範囲を別記録し、機微内容を公開せず、どの規則がどの受け手にどの範囲を見せなかったかを証明します。
  includes:
    - zh: 密钥、个人信息、越权数据、恶意工具输出或按信任边界禁止发布的连续范围。
      en: Secrets, personal data, unauthorized data, malicious tool output, or contiguous extents barred at a trust boundary.
      ja: secret・personal data・unauthorized data・malicious tool output・trust boundary で禁止された連続範囲。
  excludes:
    - zh: 只因输出过长而省略的行、仍可由受众展开的详情、已成功脱敏后允许发布的片段和源文件删除。
      en: Lines omitted only because output is long, detail still expandable by the audience, successfully redacted and allowed fragments, and source-file deletion.
      ja: 長さだけで省略した行・受け手が展開可能な detail・redaction 後 allow された fragment・source file 削除。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 必须与 DisclosureRecord coverage 一致；缺失 suppress 产物时不得声称完整披露。
    en: Must align with DisclosureRecord coverage; missing suppress artifact blocks complete-disclosure claims.
    ja: suppress artifact は closure に必須。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: source_range
      labels:
        zh: 扣留来源范围
        en: withheld source range
        ja: 留保元範囲
      definitions:
        zh: 记录未向受众发布的来源输出偏移。
        en: Records the source-output offsets not released to the audience.
        ja: 受け手へ公開しなかった source-output offset を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: bytes:340-412
      allowed_values: []
      source_claims:
        - claim-suppressed-context-004
    - id: rule_ref
      labels:
        zh: 扣留规则引用
        en: withhold-rule reference
        ja: 留保規則参照
      definitions:
        zh: 引用直接要求扣留该范围的 DisclosureRule。
        en: References the DisclosureRule directly requiring the extent to be withheld.
        ja: 範囲の留保を直接要求する DisclosureRule を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: secret-rule-3
      allowed_values: []
      source_claims:
        - claim-suppressed-context-001
        - claim-suppressed-context-002
    - id: reason_code
      labels:
        zh: 扣留原因代码
        en: withhold-reason code
        ja: 留保理由コード
      definitions:
        zh: 记录 authorization、privacy、safety 或 trust 中的直接原因类别。
        en: "Records the immediate reason category: authorization, privacy, safety, or trust."
        ja: authorization・privacy・safety・trust の直接理由区分を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: secret
      allowed_values: []
      source_claims:
        - claim-suppressed-context-002
  constraints: []
  required_relations: []
examples:
  - id: SuppressedContext-example-tool-use
    labels:
      zh: 抑制 tool 细节
      en: Suppress tool details
      ja: tool 詳細 suppress
    descriptions:
      zh: chars:480..639 tool_use 细节对外部用户 suppress。
      en: chars:480..639 tool_use details suppressed from external users.
      ja: tool detail suppress。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: tool_use suppress
    field_values: {}
    related_node_ids:
      - SuppressedContext
    related_relation_ids: []
    source_claims:
      - claim-suppressed-anthropic
  - id: SuppressedContext-example-credential
    labels:
      zh: 抑制凭证片段
      en: Suppress credential span
      ja: credential span suppress
    descriptions:
      zh: rule/credential-external 抑制输出中的 API key 子串。
      en: rule/credential-external suppresses API key substring in output.
      ja: credential suppress。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: credential rule
    field_values: {}
    related_node_ids:
      - SuppressedContext
    related_relation_ids: []
    source_claims:
      - claim-suppressed-design
  - id: SuppressedContext-example-not-rule
    labels:
      zh: 非规则对象
      en: Not rule object
      ja: rule object ではない
    descriptions:
      zh: SuppressedContext 不复制 allow/deny 规则链。
      en: SuppressedContext does not copy allow/deny rule chains.
      ja: rule 链複製なし。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - SuppressedContext
    related_relation_ids: []
    source_claims:
      - claim-suppressed-design
parent_relation:
  id: SuppressedContext-is_a-DisclosureArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 已抑制内容属于披露处置内容
    en: suppressed content is disclosure disposition content
    ja: 抑制済み内容は開示処置内容である
  definitions:
    zh: 绑定受众、来源范围、扣留规则和原因的 withheld 内容记录，是 DisclosureArtifact 的 suppressed 处置子类。
    en: A withheld content record binding audience, source extent, withhold rule, and reason is the suppressed-disposition subtype of DisclosureArtifact.
    ja: audience・source extent・withhold rule・reason を結ぶ withheld 内容記録を DisclosureArtifact の suppressed 処置 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：已抑制内容属于披露处置内容
      en: inverse reading of suppressed content is disclosure disposition content
      ja: 抑制済み内容は開示処置内容であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: SuppressedContext-is_a-DisclosureArtifact-example-positive-manual-20260716
      labels:
        zh: 确认已抑制内容属于披露处置内容
        en: Confirm suppressed content is disclosure disposition content
        ja: 抑制済み内容は開示処置内容であるを確認
      descriptions:
        zh: suppressed-17 记录 secret-rule-3 阻止 external-user-7 看见 bytes 340–412。
        en: suppressed-17 records that secret-rule-3 prevented external-user-7 from seeing bytes 340–412.
        ja: suppressed-17 は secret-rule-3 が external-user-7 に bytes 340–412 を見せなかったことを記録します。
      field_values: {}
      related_node_ids:
        - SuppressedContext
        - DisclosureArtifact
      related_relation_ids:
        - SuppressedContext-is_a-DisclosureArtifact
      source_claims:
        - claim-suppressed-context-004
        - claim-suppressed-context-001
        - claim-suppressed-context-002
    - id: SuppressedContext-is_a-DisclosureArtifact-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判已抑制内容属于披露处置内容
        en: Reject a false suppressed content is disclosure disposition content
        ja: 抑制済み内容は開示処置内容であるの誤判定を拒否
      descriptions:
        zh: 日志中段仅因 120 行上限未保留，没有 DisclosureRule。
        en: A log middle is omitted only because of a 120-line limit and has no DisclosureRule.
        ja: log middle は 120 行上限だけで省略され DisclosureRule がありません。
      field_values: {}
      related_node_ids:
        - SuppressedContext
        - DisclosureArtifact
      related_relation_ids:
        - SuppressedContext-is_a-DisclosureArtifact
      source_claims:
        - claim-suppressed-context-004
        - claim-suppressed-context-001
        - claim-suppressed-context-002
  source_claims:
    - claim-suppressed-context-004
    - claim-suppressed-context-001
    - claim-suppressed-context-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: SuppressedContext-withheld_by-DisclosureRule
    predicate: withheld_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 已抑制内容被披露规则扣留
      en: suppressed content is withheld by a disclosure rule
      ja: 抑制済み内容が開示規則により留保される
    definitions:
      zh: 该关系指向直接要求对特定受众扣留该来源范围的 DisclosureRule，并保留规则版本和原因；规则不是被扣留内容的父类。
      en: This relation points to the DisclosureRule revision that directly requires a source extent to be withheld from an audience and preserves its reason; the rule is not a parent class of the content.
      ja: 特定受け手から source extent を留保する直接の DisclosureRule revision と理由を示し、rule を内容の親型とはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_withheld_by
      labels:
        zh: 反向读取：已抑制内容被披露规则扣留
        en: inverse reading of suppressed content is withheld by a disclosure rule
        ja: 抑制済み内容が開示規則により留保されるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: SuppressedContext-withheld_by-DisclosureRule-example-positive-manual-20260716
        labels:
          zh: 确认已抑制内容被披露规则扣留
          en: Confirm suppressed content is withheld by a disclosure rule
          ja: 抑制済み内容が開示規則により留保されるを確認
        descriptions:
          zh: suppressed-17 的 rule_ref 为 secret-rule-3@5，决定日志记录该版本返回 deny。
          en: suppressed-17 has rule_ref secret-rule-3@5, and the decision log records deny from that revision.
          ja: suppressed-17 の rule_ref は secret-rule-3@5 で decision log はその版の deny を記録します。
        field_values: {}
        related_node_ids:
          - SuppressedContext
          - DisclosureRule
        related_relation_ids:
          - SuppressedContext-withheld_by-DisclosureRule
        source_claims:
          - claim-suppressed-context-001
          - claim-suppressed-context-002
      - id: SuppressedContext-withheld_by-DisclosureRule-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判已抑制内容被披露规则扣留
          en: Reject a false suppressed content is withheld by a disclosure rule
          ja: 抑制済み内容が開示規則により留保されるの誤判定を拒否
        descriptions:
          zh: secret-rule-4 也处理密钥，但未参与本次决定，版本和受众均不同。
          en: secret-rule-4 also concerns secrets but did not participate in this decision and has a different revision and audience.
          ja: secret-rule-4 も secret を扱いますが本判断に参加せず revision/audience が異なります。
        field_values: {}
        related_node_ids:
          - SuppressedContext
          - DisclosureRule
        related_relation_ids:
          - SuppressedContext-withheld_by-DisclosureRule
        source_claims:
          - claim-suppressed-context-001
          - claim-suppressed-context-002
    source_claims:
      - claim-suppressed-context-001
      - claim-suppressed-context-002
    layout_role: cross-link
    target: concept:DisclosureRule
sources:
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Assistant content blocks and streaming content_block_delta.
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
source_claims:
  - id: claim-suppressed-context-001
    source: eng-policy-opa
    supports: OPA decision logs distinguish policy query input, result, decision identifier, requester, timestamp, and erased or masked fields. Moonweave uses that evidence to keep a disclosure selection decision separate from the disclosure activity and from the record of what was finally displayed.
    locator: Open Policy Agent documentation, Management > Decision Logs, event fields and masking
    evidence_kind: design-inference
    confidence: high
  - id: claim-suppressed-context-002
    source: eng-security-nist-abac
    supports: NIST SP 800-162 evaluates subject, object, requested operation, environment, policy, and rules to compute an authorization decision. Moonweave uses the same separation when an audience, output object, display operation, and environment determine whether output is published, truncated, or suppressed.
    locator: NIST SP 800-162 Sections 2.1-2.3 and Figure 2, basic ABAC scenario
    evidence_kind: design-inference
    confidence: high
  - id: claim-suppressed-context-003
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 separates resources, access requests, policy decisions, policy enforcement points, trust zones, monitoring, and termination. Moonweave uses that distinction to link an optional disclosure record to a concrete boundary crossing instead of classifying visible content as a trust boundary.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones and policy enforcement points
    evidence_kind: design-inference
    confidence: high
  - id: claim-suppressed-context-004
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-suppressed-context-005
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents context-engineering documentation describes replacing a large result with a bounded preview and a stable file reference while preserving access to the complete stored output. Moonweave uses this as evidence for output-window specifications and separately recorded omitted ranges, not as a definition of Moonweave's window classes.
    locator: Deep Agents JavaScript documentation, Context engineering > Offloading, large tool result preview
    evidence_kind: design-inference
    confidence: high
  - id: claim-suppressed-anthropic
    source: src-anthropic-messages
    supports: Tool-use details may be suppressed from external disclosure.
    locator: tool_use
    evidence_kind: primary-api
    confidence: high
  - id: claim-suppressed-design
    source: src-info-output-design
    supports: SuppressedContext records withheld ranges without owning rule definitions.
    locator: SuppressedContext
    evidence_kind: design-inference
    confidence: high
