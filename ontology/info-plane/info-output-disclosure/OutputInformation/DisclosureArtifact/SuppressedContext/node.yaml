        en: Classify it as TruncatedContextSpan and do not assert SuppressedContext through this edge.
        ja: TruncatedContextSpan とし、この辺で SuppressedContext を主張しません。
      why_valid_or_invalid:
        zh: 容量省略没有规则驱动的 withheld 身份，属于另一处置子类。
        en: Capacity omission lacks a rule-driven withheld identity and belongs to another disposition subtype.
        ja: capacity omission は rule-driven withheld の同一性を欠き別処置 subtype です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-suppressed-context-004
        - claim-suppressed-context-001
        - claim-suppressed-context-002
