    en: A capacity gap with source output, contiguous start and end offsets, measurement unit, and window revision is the truncated-disposition subtype of DisclosureArtifact.
    ja: source output・contiguous start/end offset・measurement unit・window revision を持つ容量欠落を DisclosureArtifact の truncated 処置 subtype とします。
