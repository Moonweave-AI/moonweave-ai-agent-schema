        en: The contiguous gap, unit, and window revision prove a capacity-truncation disposition.
        ja: 連続欠落・単位・window revision が capacity truncation 処置を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
