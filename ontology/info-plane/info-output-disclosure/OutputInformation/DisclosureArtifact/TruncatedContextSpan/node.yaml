schema: moonweave.ai/ontology-node/v1
id: TruncatedContextSpan
kind: concept
labels:
  zh: 截断省略范围
  en: truncation-omission span
  ja: 切詰め省略範囲
semantics:
  short_definition:
    zh: 因输出窗口规范被截断而未发布的源输出范围。
    en: Source output range clipped by output-window specification and not published.
    ja: output window 仕様により clip され未公開の source range。
  definition:
    zh: TruncatedContextSpan 记录 truncate disposition 与 output_window_id；对应超出 char/token 上限被切掉的部分。不是 OutputWindow 规范本身。
    en: TruncatedContextSpan records truncate disposition and output_window_id for portions beyond char/token limits. Not the OutputWindow specification itself.
    ja: TruncatedContextSpan は window clip audit。
  why_needed:
    zh: 显式保存省略范围，使首尾窗口的可见部分与缺口能够无重叠核算，并可从展示结果回溯到完整来源。
    en: Persisting omitted extents lets retained head and tail ranges and their gap be accounted for without overlap and traced back to complete source output.
    ja: 省略範囲を保存し、保持 head/tail と欠落を重複なく会計し、表示結果から完全な元出力へ追跡できます。
  includes:
    - zh: 因行数、字节数、字符数、记录数或 token 上限而从连续输出中省略的可寻址中段或尾段。
      en: Addressable middle or tail extents omitted from contiguous output because of line, byte, character, record, or token limits.
      ja: line・byte・character・record・token 上限で連続出力から省略した addressable middle/tail extent。
  excludes:
    - zh: 保留并展示的首尾范围、因隐私或授权被完全扣留的范围、摘要生成结果和已经删除的来源数据。
      en: Retained and displayed head or tail extents, privacy- or authorization-withheld extents, summaries, and deleted source data.
      ja: 保持・表示した head/tail 範囲、privacy/authorization で留保した範囲、summary、削除 source data。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: HeadTailWindow 截断中间段时产生 TruncatedContextSpan 记录中间缺口。
    en: HeadTailWindow clipping middle sections produces TruncatedContextSpan for the middle gap.
    ja: head-tail 中间 gap 記録。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: omitted_start
      labels:
        zh: 省略起点
        en: omitted start
        ja: 省略開始
      definitions:
        zh: 记录未保留连续范围的包含式起点。
        en: Records the inclusive start of the non-retained contiguous extent.
        ja: 保持しなかった連続範囲の包含開始点を記録します。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 81
      allowed_values: []
      source_claims:
        - claim-truncated-context-span-001
    - id: omitted_end
      labels:
        zh: 省略终点
        en: omitted end
        ja: 省略終了
      definitions:
        zh: 记录未保留连续范围的包含式终点。
        en: Records the inclusive end of the non-retained contiguous extent.
        ja: 保持しなかった連続範囲の包含終了点を記録します。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1960
      allowed_values: []
      source_claims:
        - claim-truncated-context-span-001
    - id: unit
      labels:
        zh: 范围单位
        en: extent unit
        ja: 範囲単位
      definitions:
        zh: 声明起止偏移使用 line、byte、character、record 或 token。
        en: Declares whether offsets use line, byte, character, record, or token units.
        ja: offset が line・byte・character・record・token のどれを使うか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: line
      allowed_values: []
      source_claims:
        - claim-truncated-context-span-001
    - id: window_ref
      labels:
        zh: 应用窗口引用
        en: applied-window reference
        ja: 適用 window 参照
      definitions:
        zh: 引用导致该省略范围的 OutputWindow 版本。
        en: References the OutputWindow revision that caused the omitted extent.
        ja: 省略範囲を生じさせた OutputWindow revision を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: head-tail-window-9@2
      allowed_values: []
      source_claims:
        - claim-truncated-context-span-001
  constraints: []
  required_relations: []
examples:
  - id: TruncatedContextSpan-example-char-cap
    labels:
      zh: 字符上限截断
      en: Character cap truncation
      ja: 文字上限 truncate
    descriptions:
      zh: window/800-char 截断 chars:640..1199。
      en: window/800-char truncates chars:640..1199.
      ja: char cap truncate。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: char window
    field_values: {}
    related_node_ids:
      - TruncatedContextSpan
      - OutputWindow
    related_relation_ids: []
    source_claims:
      - claim-truncated-design
  - id: TruncatedContextSpan-example-token
    labels:
      zh: Token 窗口截断
      en: Token window truncation
      ja: token window truncate
    descriptions:
      zh: token 上限 4096 截断尾部 tool output。
      en: Token limit 4096 truncates tail tool output.
      ja: token truncate。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/responses
      version: token limit
    field_values: {}
    related_node_ids:
      - TruncatedContextSpan
    related_relation_ids: []
    source_claims:
      - claim-truncated-design
  - id: TruncatedContextSpan-example-not-window-spec
    labels:
      zh: 非窗口规范
      en: Not window spec
      ja: window spec ではない
    descriptions:
      zh: TruncatedContextSpan 是应用结果，不是 OutputWindow revision 对象。
      en: TruncatedContextSpan is application outcome, not OutputWindow revision object.
      ja: spec≠span。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - TruncatedContextSpan
    related_relation_ids: []
    source_claims:
      - claim-truncated-design
parent_relation:
  id: TruncatedContextSpan-is_a-DisclosureArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 截断省略范围属于披露处置内容
    en: truncation-omission span is disclosure disposition content
    ja: 切詰め省略範囲は開示処置内容である
  definitions:
    zh: 具有来源输出、连续起止偏移、计量单位和窗口版本的容量缺口，是 DisclosureArtifact 的 truncated 处置子类。
    en: A capacity gap with source output, contiguous start and end offsets, measurement unit, and window revision is the truncated-disposition subtype of DisclosureArtifact.
    ja: source output・contiguous start/end offset・measurement unit・window revision を持つ容量欠落を DisclosureArtifact の truncated 処置 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：截断省略范围属于披露处置内容
      en: inverse reading of truncation-omission span is disclosure disposition content
      ja: 切詰め省略範囲は開示処置内容であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TruncatedContextSpan-is_a-DisclosureArtifact-example-positive-manual-20260716
      labels:
        zh: 确认截断省略范围属于披露处置内容
        en: Confirm truncation-omission span is disclosure disposition content
        ja: 切詰め省略範囲は開示処置内容であるを確認
      descriptions:
        zh: span-41 记录 output-41 在 head-tail-window-9@2 下省略的第 81–1960 行。
        en: span-41 records lines 81–1960 of output-41 omitted under head-tail-window-9@2.
        ja: span-41 は head-tail-window-9@2 で省略した output-41 の 81–1960 行を記録します。
      field_values: {}
      related_node_ids:
        - TruncatedContextSpan
        - DisclosureArtifact
      related_relation_ids:
        - TruncatedContextSpan-is_a-DisclosureArtifact
      source_claims:
        - claim-truncated-context-span-002
        - claim-truncated-context-span-001
    - id: TruncatedContextSpan-is_a-DisclosureArtifact-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判截断省略范围属于披露处置内容
        en: Reject a false truncation-omission span is disclosure disposition content
        ja: 切詰め省略範囲は開示処置内容であるの誤判定を拒否
      descriptions:
        zh: secret-rule-3 隐藏一个未超限的短令牌，没有任何窗口缺口。
        en: secret-rule-3 hides a short token that exceeds no limit and creates no window gap.
        ja: secret-rule-3 は limit を超えない短い token を隠し window gap がありません。
      field_values: {}
      related_node_ids:
        - TruncatedContextSpan
        - DisclosureArtifact
      related_relation_ids:
        - TruncatedContextSpan-is_a-DisclosureArtifact
      source_claims:
        - claim-truncated-context-span-002
        - claim-truncated-context-span-001
  source_claims:
    - claim-truncated-context-span-002
    - claim-truncated-context-span-001
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: TruncatedContextSpan-omitted_by-OutputWindow
    predicate: omitted_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 截断省略范围由输出窗口省略
      en: truncation-omission span is omitted by an output window
      ja: 切詰め省略範囲が出力 window により省略される
    definitions:
      zh: 该关系记录哪个 OutputWindow 版本的容量边界导致该连续来源范围未被保留；省略范围不是从窗口对象内部移除的部件。
      en: This relation records which OutputWindow revision's capacity bounds caused a contiguous source extent not to be retained; the omitted span is not a component removed from the specification object.
      ja: どの OutputWindow revision の capacity bound が連続 source extent を非保持にしたか記録し、省略範囲を仕様 object から除去した部品とはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_omitted_by
      labels:
        zh: 反向读取：截断省略范围由输出窗口省略
        en: inverse reading of truncation-omission span is omitted by an output window
        ja: 切詰め省略範囲が出力 window により省略されるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: TruncatedContextSpan-omitted_by-OutputWindow-example-positive-manual-20260716
        labels:
          zh: 确认截断省略范围由输出窗口省略
          en: Confirm truncation-omission span is omitted by an output window
          ja: 切詰め省略範囲が出力 window により省略されるを確認
        descriptions:
          zh: span-41 的 window_ref 为 head-tail-window-9@2，其第 81–1960 行正是该版本计算出的缺口。
          en: span-41 has window_ref head-tail-window-9@2, whose application computes lines 81–1960 as the gap.
          ja: span-41 の window_ref は head-tail-window-9@2 で、その適用が 81–1960 行を欠落として計算します。
        field_values: {}
        related_node_ids:
          - TruncatedContextSpan
          - OutputWindow
        related_relation_ids:
          - TruncatedContextSpan-omitted_by-OutputWindow
        source_claims:
          - claim-truncated-context-span-001
          - claim-truncated-context-span-002
      - id: TruncatedContextSpan-omitted_by-OutputWindow-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判截断省略范围由输出窗口省略
          en: Reject a false truncation-omission span is omitted by an output window
          ja: 切詰め省略範囲が出力 window により省略されるの誤判定を拒否
        descriptions:
          zh: span-42 由 privacy-rule-4 扣留，虽然恰好位于窗口中段但未因容量省略。
          en: span-42 is withheld by privacy-rule-4; although it lies in the middle, capacity did not omit it.
          ja: span-42 は privacy-rule-4 で留保され、middle にありますが capacity omission ではありません。
        field_values: {}
        related_node_ids:
          - TruncatedContextSpan
          - OutputWindow
        related_relation_ids:
          - TruncatedContextSpan-omitted_by-OutputWindow
        source_claims:
          - claim-truncated-context-span-001
          - claim-truncated-context-span-002
    source_claims:
      - claim-truncated-context-span-001
      - claim-truncated-context-span-002
    layout_role: cross-link
    target: concept:OutputWindow
sources:
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
  - id: src-openai-responses
    title: OpenAI Responses API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/responses
    source_type: official-doc
    relevance: response.output[] typed items and output_text aggregation.
source_claims:
  - id: claim-truncated-context-span-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents context-engineering documentation describes replacing a large result with a bounded preview and a stable file reference while preserving access to the complete stored output. Moonweave uses this as evidence for output-window specifications and separately recorded omitted ranges, not as a definition of Moonweave's window classes.
    locator: Deep Agents JavaScript documentation, Context engineering > Offloading, large tool result preview
    evidence_kind: design-inference
    confidence: high
  - id: claim-truncated-context-span-002
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-truncated-context-span-003
    source: eng-fw-openai-tracing
    supports: OpenAI Agents SDK tracing distinguishes a generation span's model input and output from the surrounding trace and allows sensitive input or output capture to be disabled. Moonweave therefore models source output, disclosure processing, and audience-visible disposition as separate facts.
    locator: OpenAI Agents SDK Tracing documentation, Traces and spans plus Sensitive data sections
    evidence_kind: design-inference
    confidence: high
  - id: claim-truncated-context-span-004
    source: eng-security-nist-abac
    supports: NIST SP 800-162 evaluates subject, object, requested operation, environment, policy, and rules to compute an authorization decision. Moonweave uses the same separation when an audience, output object, display operation, and environment determine whether output is published, truncated, or suppressed.
    locator: NIST SP 800-162 Sections 2.1-2.3 and Figure 2, basic ABAC scenario
    evidence_kind: design-inference
    confidence: high
  - id: claim-truncated-design
    source: src-info-output-design
    supports: TruncatedContextSpan records clipped ranges from applied OutputWindow specs.
    locator: TruncatedContextSpan
    evidence_kind: design-inference
    confidence: high
