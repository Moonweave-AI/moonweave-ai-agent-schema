    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; TruncatedContextSpan maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; TruncatedContextSpan maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; TruncatedContextSpan context/token boundary."}

