schema: moonweave.ai/ontology-node/v1
id: TruncatedContextSpan
kind: concept
status: review
labels:
  zh: 截断省略范围
  en: truncation-omission span
  ja: 切詰め省略範囲
semantics:
  short_definition:
    zh: 应用输出窗口时因容量边界而未保留的连续来源输出范围。
    en: A contiguous source-output extent not retained because of capacity bounds when an output window is applied.
    ja: 出力 window 適用時の容量境界により保持されなかった連続 source-output 範囲です。
  definition:
    zh: 截断省略范围是 DisclosureArtifact 的子类，以范围标识、来源输出、起止偏移、计量单位和所用窗口版本为身份。它记录容量裁剪留下的缺口，不是审计记录，也不等于保留的首尾内容、按敏感规则扣留的内容，且不修改或删除来源输出。
    en: A TruncatedContextSpan is a DisclosureArtifact subtype identified by span ID, source output, start and end offsets, unit, and applied window revision. It records a gap left by capacity clipping; it is neither retained head or tail content nor rule-withheld content, and it does not modify or delete source output.
    ja: TruncatedContextSpan は span ID・source output・start/end offset・unit・applied window revision で識別する DisclosureArtifact subtype です。capacity clipping の欠落を記録し、保持した head/tail、rule-withheld content、source output の変更・削除ではありません。
  why_needed:
    zh: 显式保存省略范围，使首尾窗口的可见部分与缺口能够无重叠核算，并可从展示结果回溯到完整来源。
    en: Persisting omitted extents lets retained head and tail ranges and their gap be accounted for without overlap and traced back to complete source output.
    ja: 省略範囲を保存し、保持 head/tail と欠落を重複なく会計し、表示結果から完全な元出力へ追跡できます。
  includes:
    - zh: 因行数、字节数、字符数、记录数或 token 上限而从连续输出中省略的可寻址中段或尾段。
      en: Addressable middle or tail extents omitted from contiguous output because of line, byte, character, record, or token limits.
      ja: line・byte・character・record・token 上限で連続出力から省略した addressable middle/tail extent。
  excludes:
    - zh: 保留并展示的首尾范围、因隐私或授权被完全扣留的范围、摘要生成结果和已经删除的来源数据。
      en: Retained and displayed head or tail extents, privacy- or authorization-withheld extents, summaries, and deleted source data.
      ja: 保持・表示した head/tail 範囲、privacy/authorization で留保した範囲、summary、削除 source data。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: omitted_start
      labels:
        zh: 省略起点
        en: omitted start
        ja: 省略開始
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录未保留连续范围的包含式起点。
        en: Records the inclusive start of the non-retained contiguous extent.
        ja: 保持しなかった連続範囲の包含開始点を記録します。
      allowed_values: []
      pattern: null
      example_value: 81
      source_claims:
        - claim-truncated-context-span-001
    - id: omitted_end
      labels:
        zh: 省略终点
        en: omitted end
        ja: 省略終了
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录未保留连续范围的包含式终点。
        en: Records the inclusive end of the non-retained contiguous extent.
        ja: 保持しなかった連続範囲の包含終了点を記録します。
      allowed_values: []
      pattern: null
      example_value: 1960
      source_claims:
        - claim-truncated-context-span-001
    - id: unit
      labels:
        zh: 范围单位
        en: extent unit
        ja: 範囲単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明起止偏移使用 line、byte、character、record 或 token。
        en: Declares whether offsets use line, byte, character, record, or token units.
        ja: offset が line・byte・character・record・token のどれを使うか宣言します。
      allowed_values: []
      pattern: null
      example_value: line
      source_claims:
        - claim-truncated-context-span-001
    - id: window_ref
      labels:
        zh: 应用窗口引用
        en: applied-window reference
        ja: 適用 window 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用导致该省略范围的 OutputWindow 版本。
        en: References the OutputWindow revision that caused the omitted extent.
        ja: 省略範囲を生じさせた OutputWindow revision を参照します。
      allowed_values: []
      pattern: null
      example_value: head-tail-window-9@2
      source_claims:
        - claim-truncated-context-span-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: TruncatedContextSpan-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 记录首尾窗口的中间缺口
      en: Record the gap in a head-tail window
      ja: head-tail window の中間欠落を記録
    scenario_id: null
    descriptions:
      zh: truncated-span-41 指向 output-41，记录 head-tail-window-9@2 未保留的第 81–1960 行。
      en: truncated-span-41 points to output-41 and records lines 81–1960 omitted by head-tail-window-9@2.
      ja: truncated-span-41 は output-41 を参照し head-tail-window-9@2 が省略した 81–1960 行を記録します。
    field_values:
      source_output_ref: output-41
      omitted_start: 81
      omitted_end: 1960
      unit: line
      window_ref: head-tail-window-9@2
      audience_ref: user-7
      disposition_kind: truncated
      content_digest: sha256:truncated-span-41
      output_information_id: output-info-truncated-span-41
      producer_ref: truncate-884
      source_ref: output-41
      extent: lines:81-1960
    related_node_ids:
      - TruncatedContextSpan
      - OutputWindow
    related_relation_ids:
      - TruncatedContextSpan-omitted_by-OutputWindow
    expected_result:
      zh: 建立一个可与保留首尾范围拼合核对的省略范围。
      en: Create an omitted span that can be reconciled with retained head and tail extents.
      ja: 保持 head/tail と照合できる省略範囲を作成します。
    why_valid_or_invalid:
      zh: 起止、单位、完整来源和窗口版本均明确，且原因仅为容量边界。
      en: Start, end, unit, complete source, and window revision are explicit, and the cause is only capacity.
      ja: 開始・終了・単位・完全元・window revision が明示され、原因は容量だけです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-truncated-context-span-001
      - claim-truncated-context-span-002
  - id: TruncatedContextSpan-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 隐私规则扣留短电话号码
      en: Privacy rule withholds a short phone number
      ja: privacy rule が短い電話番号を留保
    scenario_id: output-disclosure-truncatedcontextspan-boundary
    descriptions:
      zh: 一个 11 位电话号码虽未超过任何窗口上限，仍因 privacy-rule-4 对 external-user-7 完全隐藏。
      en: An eleven-digit phone number exceeds no window limit but is fully withheld from external-user-7 under privacy-rule-4.
      ja: 11 桁電話番号は window limit を超えませんが privacy-rule-4 により external-user-7 から完全留保されます。
    field_values: {}
    related_node_ids:
      - SuppressedContext
      - TruncatedContextSpan
    related_relation_ids: []
    expected_result:
      zh: 分类为 SuppressedContext，不建立截断省略范围。
      en: Classify it as SuppressedContext and do not create a truncation-omission span.
      ja: SuppressedContext と分類し切詰め省略範囲を作りません。
    why_valid_or_invalid:
      zh: 不存在容量窗口造成的连续缺口，处置依据是隐私规则。
      en: No capacity-window gap exists; the disposition is caused by a privacy rule.
      ja: capacity window の連続欠落はなく、処置原因は privacy rule です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-truncated-context-span-004
      - claim-truncated-context-span-001
external_mappings: []
