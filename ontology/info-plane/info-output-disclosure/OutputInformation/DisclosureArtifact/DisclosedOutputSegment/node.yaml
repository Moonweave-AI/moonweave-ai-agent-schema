schema: moonweave.ai/ontology-node/v1
id: DisclosedOutputSegment
kind: concept
labels:
  zh: 已披露输出片段
  en: disclosed output segment
  ja: 開示済み出力区間
semantics:
  short_definition:
    zh: 经披露后对特定受众可见的输出片段。
    en: Output fragment visible to a specific audience after disclosure.
    ja: 開示後に特定 audience へ visible な output fragment。
  definition:
    zh: DisclosedOutputSegment 映射 OpenAI output_text 可见子集、Anthropic text block 字符范围，或 A2A Artifact part 的已发布字节；携带 artifact_id 与 source_range。
    en: DisclosedOutputSegment maps visible subset of OpenAI output_text, Anthropic text block char range, or published bytes of A2A Artifact part with artifact_id and source_range.
    ja: DisclosedOutputSegment は visible fragment。
  why_needed:
    zh: 把实际可见片段单独建模，才能回答谁在何时看到了哪个精确范围，并与仅允许但交付失败的情况区分。
    en: Modeling the actually visible segment separately answers who saw which exact extent and when, and distinguishes delivery from permission followed by failure.
    ja: 実可視区間を別にすることで、誰がいつどの範囲を見たかを答え、許可後の配送失敗と区別できます。
  includes:
    - zh: 具有接收受众、可见时间、来源偏移和内容摘要的已交付文本、表格、图像说明或工具结果片段。
      en: Delivered text, table, image description, or tool-result fragments with recipient, visibility time, source offset, and content digest.
      ja: recipient・visibility time・source offset・content digest を持つ配送済み text・table・image description・tool-result fragment。
  excludes:
    - zh: 只被允许但尚未送达的内容、被策略扣留的范围、因容量省略的范围和可独立版本化的完整产物。
      en: Content allowed but not delivered, rule-withheld extents, capacity-omitted extents, and independently versioned complete artifacts.
      ja: 許可済み未配送内容・rule-withheld extent・capacity-omitted extent・独立 versioned complete artifact。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: TextOutput 是 plain text 形态的 DisclosedOutputSegment 常见情况。
    en: TextOutput is a common plain-text DisclosedOutputSegment case.
    ja: TextOutput⊂DisclosedOutputSegment。
  typical_input:
    - description: Disclosed segment
      format: '{"artifact_id":"displayed/204/1","source_range":"chars:0..479","text":"Root cause: stale cache."}'
      source_claims:
        - claim-disclosed-segment-openai
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: source_range
      labels:
        zh: 来源范围
        en: source range
        ja: 元範囲
      definitions:
        zh: 记录片段在未处置来源输出中的起止偏移。
        en: Records start and end offsets in the undisposed source output.
        ja: 処置前 source output 内の開始・終了 offset を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: lines:1-80
      allowed_values: []
      source_claims:
        - claim-disclosed-output-segment-004
        - claim-disclosed-output-segment-001
    - id: visible_at
      labels:
        zh: 可见时间
        en: visible at
        ja: 可視時刻
      definitions:
        zh: 记录片段对该受众实际可见的时间。
        en: Records when the segment actually became visible to that audience.
        ja: 区間が受け手に実際に可視となった時刻を記録します。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:01Z
      allowed_values: []
      source_claims:
        - claim-disclosed-output-segment-001
  constraints: []
  required_relations: []
examples:
  - id: DisclosedOutputSegment-example-openai-text
    labels:
      zh: OpenAI 文本片段
      en: OpenAI text segment
      ja: OpenAI text segment
    descriptions:
      zh: displayed/204/1 发布 chars:0..31 的 output_text。
      en: displayed/204/1 publishes output_text chars:0..31.
      ja: output_text segment。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/responses
      version: output_text
    field_values: {}
    related_node_ids:
      - DisclosedOutputSegment
    related_relation_ids: []
    source_claims:
      - claim-disclosed-segment-openai
  - id: DisclosedOutputSegment-example-anthropic
    labels:
      zh: Anthropic 文本块片段
      en: Anthropic text block segment
      ja: Anthropic text block segment
    descriptions:
      zh: chars:0..59 的 assistant text block 对外部用户可见。
      en: Assistant text block chars:0..59 visible to external users.
      ja: text block segment。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: text block
    field_values: {}
    related_node_ids:
      - DisclosedOutputSegment
    related_relation_ids: []
    source_claims:
      - claim-disclosed-segment-anthropic
  - id: DisclosedOutputSegment-example-a2a-data
    labels:
      zh: A2A data part 片段
      en: A2A data part segment
      ja: A2A data part segment
    descriptions:
      zh: Artifact data part 完整发布给 partner API。
      en: Artifact data part fully published to partner API.
      ja: data part publish。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Artifact part
    field_values: {}
    related_node_ids:
      - DisclosedOutputSegment
    related_relation_ids: []
    source_claims:
      - claim-disclosed-segment-a2a
parent_relation:
  id: DisclosedOutputSegment-is_a-DisclosureArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 已披露输出片段属于披露处置内容
    en: disclosed output segment is disclosure disposition content
    ja: 開示済み出力区間は開示処置内容である
  definitions:
    zh: 具有实际接收者、可见时间、来源范围与内容摘要的已交付片段，是 DisclosureArtifact 的 disclosed 处置子类。
    en: A delivered segment with actual recipient, visibility time, source extent, and content digest is the disclosed-disposition subtype of DisclosureArtifact.
    ja: 実受信者・可視時刻・source extent・content digest を持つ配送済み区間を DisclosureArtifact の disclosed 処置 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：已披露输出片段属于披露处置内容
      en: inverse reading of disclosed output segment is disclosure disposition content
      ja: 開示済み出力区間は開示処置内容であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosedOutputSegment-is_a-DisclosureArtifact-example-positive-manual-20260716
      labels:
        zh: 确认已披露输出片段属于披露处置内容
        en: Confirm disclosed output segment is disclosure disposition content
        ja: 開示済み出力区間は開示処置内容であるを確認
      descriptions:
        zh: segment-77 记录 user-7 实际看见 output-41 第 1–80 行及其摘要。
        en: segment-77 records that user-7 actually saw lines 1–80 of output-41 and preserves their digest.
        ja: segment-77 は user-7 が output-41 の 1–80 行を実際に見たことと digest を記録します。
      field_values: {}
      related_node_ids:
        - DisclosedOutputSegment
        - DisclosureArtifact
      related_relation_ids:
        - DisclosedOutputSegment-is_a-DisclosureArtifact
      source_claims:
        - claim-disclosed-output-segment-001
        - claim-disclosed-output-segment-002
    - id: DisclosedOutputSegment-is_a-DisclosureArtifact-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判已披露输出片段属于披露处置内容
        en: Reject a false disclosed output segment is disclosure disposition content
        ja: 開示済み出力区間は開示処置内容であるの誤判定を拒否
      descriptions:
        zh: 一份 allow 决定引用同一范围，但发送失败且没有 visible_at。
        en: An allow decision references the same extent, but sending fails and no visible_at value exists.
        ja: allow 判断が同じ範囲を参照しますが送信失敗し visible_at がありません。
      field_values: {}
      related_node_ids:
        - DisclosedOutputSegment
        - DisclosureArtifact
      related_relation_ids:
        - DisclosedOutputSegment-is_a-DisclosureArtifact
      source_claims:
        - claim-disclosed-output-segment-001
        - claim-disclosed-output-segment-002
  source_claims:
    - claim-disclosed-output-segment-001
    - claim-disclosed-output-segment-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: DisclosedOutputSegment-visible_to-Actor
    predicate: visible_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 已披露输出片段对参与者可见
      en: disclosed output segment is visible to an actor
      ja: 開示済み出力区間が Actor に可視である
    definitions:
      zh: 该关系记录哪个 Actor 在何次发布后实际能够看到具有确定来源范围与摘要的 DisclosedOutputSegment；受众资格与实际可见是不同事实。
      en: This relation records which Actor could actually see a DisclosedOutputSegment with fixed source extent and digest after publication; audience eligibility and actual visibility are distinct facts.
      ja: 公開後に fixed source extent/digest の DisclosedOutputSegment を実際に見られた Actor を記録し、audience eligibility と actual visibility を区別します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_visible_to
      labels:
        zh: 反向读取：已披露输出片段对参与者可见
        en: inverse reading of disclosed output segment is visible to an actor
        ja: 開示済み出力区間が Actor に可視であるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosedOutputSegment-visible_to-Actor-example-positive-manual-20260716
        labels:
          zh: 确认已披露输出片段对参与者可见
          en: Confirm disclosed output segment is visible to an actor
          ja: 開示済み出力区間が Actor に可視であるを確認
        descriptions:
          zh: segment-77 的 audience_ref 为 user-7，发布回执和 visible_at 均确认 user-7 已接收。
          en: segment-77 has audience_ref user-7, and both delivery receipt and visible_at confirm receipt by user-7.
          ja: segment-77 の audience_ref は user-7 で delivery receipt と visible_at が受信を確認します。
        field_values: {}
        related_node_ids:
          - DisclosedOutputSegment
          - Actor
        related_relation_ids:
          - DisclosedOutputSegment-visible_to-Actor
        source_claims:
          - claim-disclosed-output-segment-001
          - claim-disclosed-output-segment-006
          - claim-disclosed-output-segment-003
      - id: DisclosedOutputSegment-visible_to-Actor-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判已披露输出片段对参与者可见
          en: Reject a false disclosed output segment is visible to an actor
          ja: 開示済み出力区間が Actor に可視であるの誤判定を拒否
        descriptions:
          zh: user-8 具有同一角色但未被列为接收者，也没有任何交付回执。
          en: user-8 has the same role but is not a recipient and has no delivery receipt.
          ja: user-8 は同じ role ですが recipient でなく delivery receipt もありません。
        field_values: {}
        related_node_ids:
          - DisclosedOutputSegment
          - Actor
        related_relation_ids:
          - DisclosedOutputSegment-visible_to-Actor
        source_claims:
          - claim-disclosed-output-segment-001
          - claim-disclosed-output-segment-006
          - claim-disclosed-output-segment-003
    source_claims:
      - claim-disclosed-output-segment-001
      - claim-disclosed-output-segment-006
      - claim-disclosed-output-segment-003
    layout_role: cross-link
    target: concept:Actor
