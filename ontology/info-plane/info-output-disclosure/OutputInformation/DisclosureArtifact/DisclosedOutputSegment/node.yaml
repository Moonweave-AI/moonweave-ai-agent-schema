parent_relation:
  id: DisclosedOutputSegment-is_a-DisclosureArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 已披露输出片段属于披露处置内容
    en: disclosed output segment is disclosure disposition content
    ja: 開示済み出力区間は開示処置内容である
  definitions:
    zh: 具有实际接收者、可见时间、来源范围与内容摘要的已交付片段，是 DisclosureArtifact 的 disclosed 处置子类。
    en: A delivered segment with actual recipient, visibility time, source extent, and content digest is the disclosed-disposition subtype of DisclosureArtifact.
    ja: 実受信者・可視時刻・source extent・content digest を持つ配送済み区間を DisclosureArtifact の disclosed 処置 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：已披露输出片段属于披露处置内容
      en: inverse reading of disclosed output segment is disclosure disposition content
      ja: 開示済み出力区間は開示処置内容であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
