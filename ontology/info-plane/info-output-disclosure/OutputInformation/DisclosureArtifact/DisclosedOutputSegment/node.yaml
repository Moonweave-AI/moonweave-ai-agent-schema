        en: Do not create a disclosed instance under this subtype relation.
        ja: この subtype relation の開示済み instance を作りません。
      why_valid_or_invalid:
        zh: 来源范围存在不代表已披露，仍缺少实际接收证据。
        en: Existence of a source extent does not prove disclosure; actual receipt evidence is missing.
        ja: source extent の存在は開示を証明せず実受信証拠が不足します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosed-output-segment-001
        - claim-disclosed-output-segment-002
