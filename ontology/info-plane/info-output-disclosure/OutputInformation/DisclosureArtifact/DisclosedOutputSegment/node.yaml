schema: moonweave.ai/ontology-node/v1
id: DisclosedOutputSegment
kind: concept
status: review
labels:
  zh: 已披露输出片段
  en: disclosed output segment
  ja: 開示済み出力区間
semantics:
  short_definition:
    zh: 已经实际交付给指定受众并保留来源范围的披露处置内容。
    en: Disclosure disposition content actually delivered to a specified audience with its source extent preserved.
    ja: 指定受け手へ実際に配送され、元範囲を保持する開示処置内容です。
  definition:
    zh: 已披露输出片段是 DisclosureArtifact 的子类，以片段标识、来源范围、内容摘要、受众和实际可见时间为身份。它证明内容已经交付，是可见的信息实体，不是发布活动或发布记录；未送达的允许结果、仍可展开的界面折叠和独立存储的报告文件均不属于本类。
    en: A DisclosedOutputSegment is a DisclosureArtifact subtype identified by segment ID, source extent, content digest, audience, and actual visibility time. It proves delivery rather than merely an allow decision; an undelivered permission, a collapsible UI region, and an independently stored report file are outside this class.
    ja: DisclosedOutputSegment は segment ID・source extent・content digest・audience・actual visibility time で識別する DisclosureArtifact subtype です。allow 判断だけでなく配送を証明し、未配送の許可、展開可能 UI、独立保存 report file は含みません。
  why_needed:
    zh: 把实际可见片段单独建模，才能回答谁在何时看到了哪个精确范围，并与仅允许但交付失败的情况区分。
    en: Modeling the actually visible segment separately answers who saw which exact extent and when, and distinguishes delivery from permission followed by failure.
    ja: 実可視区間を別にすることで、誰がいつどの範囲を見たかを答え、許可後の配送失敗と区別できます。
  includes:
    - zh: 具有接收受众、可见时间、来源偏移和内容摘要的已交付文本、表格、图像说明或工具结果片段。
      en: Delivered text, table, image description, or tool-result fragments with recipient, visibility time, source offset, and content digest.
      ja: recipient・visibility time・source offset・content digest を持つ配送済み text・table・image description・tool-result fragment。
  excludes:
    - zh: 只被允许但尚未送达的内容、被策略扣留的范围、因容量省略的范围和可独立版本化的完整产物。
      en: Content allowed but not delivered, rule-withheld extents, capacity-omitted extents, and independently versioned complete artifacts.
      ja: 許可済み未配送内容・rule-withheld extent・capacity-omitted extent・独立 versioned complete artifact。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: source_range
      labels:
        zh: 来源范围
        en: source range
        ja: 元範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录片段在未处置来源输出中的起止偏移。
        en: Records start and end offsets in the undisposed source output.
        ja: 処置前 source output 内の開始・終了 offset を記録します。
      allowed_values: []
      pattern: null
      example_value: lines:1-80
      source_claims:
        - claim-disclosed-output-segment-004
        - claim-disclosed-output-segment-001
    - id: visible_at
      labels:
        zh: 可见时间
        en: visible at
        ja: 可視時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录片段对该受众实际可见的时间。
        en: Records when the segment actually became visible to that audience.
        ja: 区間が受け手に実際に可視となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:01Z
      source_claims:
        - claim-disclosed-output-segment-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosedOutputSegment-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 向用户显示脱敏日志首部
      en: Show a redacted log head to a user
      ja: redacted log head を user に表示
    scenario_id: null
    descriptions:
      zh: disclosed-segment-77 记录 user-7 于 04:00:01 看见 output-41 的第 1–80 行，内容摘要为 sha256:77。
      en: disclosed-segment-77 records that user-7 saw lines 1–80 of output-41 at 04:00:01 with content digest sha256:77.
      ja: disclosed-segment-77 は user-7 が 04:00:01 に output-41 の 1–80 行を見たことと sha256:77 を記録します。
    field_values:
      source_range: lines:1-80
      audience_ref: user-7
      visible_at: 2026-07-16T04:00:01Z
      content_digest: sha256:77
      source_output_ref: output-41
      disposition_kind: disclosed
      output_information_id: output-info-disclosed-segment-77
      producer_ref: publish-884
      source_ref: trace-span-41
      extent: lines:1-80
    related_node_ids:
      - DisclosedOutputSegment
      - Actor
    related_relation_ids:
      - DisclosedOutputSegment-visible_to-Actor
    expected_result:
      zh: 建立可追溯到来源范围和具体接收者的已披露片段。
      en: Create a disclosed segment traceable to its source extent and concrete recipient.
      ja: 元範囲と具体的受信者へ追跡できる開示区間を作成します。
    why_valid_or_invalid:
      zh: 范围、摘要、受众和可见时间共同证明实际交付发生。
      en: Extent, digest, audience, and visibility time jointly prove actual delivery.
      ja: 範囲・digest・受け手・可視時刻が実配送を共同で証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosed-output-segment-001
      - claim-disclosed-output-segment-002
      - claim-disclosed-output-segment-003
  - id: DisclosedOutputSegment-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 允许后客户端断开
      en: Client disconnects after allow
      ja: allow 後に client disconnect
    scenario_id: output-disclosure-disclosedoutputsegment-boundary
    descriptions:
      zh: decision-78 为 allow，但发送前客户端断开，没有接收者确认、可见时间或最终内容摘要。
      en: decision-78 is allow, but the client disconnects before transmission, leaving no recipient confirmation, visibility time, or final content digest.
      ja: decision-78 は allow ですが送信前に client が切断し、受信確認・可視時刻・最終 digest がありません。
    field_values: {}
    related_node_ids:
      - DisclosureSelectionDecision
      - DisclosedOutputSegment
    related_relation_ids: []
    expected_result:
      zh: 保留允许决定，不建立已披露输出片段。
      en: Keep the allow decision and do not create a disclosed output segment.
      ja: allow 判断を保持し、開示済み出力区間を作りません。
    why_valid_or_invalid:
      zh: 决定允许不等于内容已到达受众，缺少交付身份条件。
      en: Permission is not delivery; the identity conditions proving arrival are absent.
      ja: 許可は配送ではなく、到達を証明する同一性条件がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosed-output-segment-005
      - claim-disclosed-output-segment-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DisclosedOutputSegment-is_a-DisclosureArtifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 已披露输出片段属于披露处置内容
    en: disclosed output segment is disclosure disposition content
    ja: 開示済み出力区間は開示処置内容である
  definitions:
    zh: 具有实际接收者、可见时间、来源范围与内容摘要的已交付片段，是 DisclosureArtifact 的 disclosed 处置子类。
    en: A delivered segment with actual recipient, visibility time, source extent, and content digest is the disclosed-disposition subtype of DisclosureArtifact.
    ja: 実受信者・可視時刻・source extent・content digest を持つ配送済み区間を DisclosureArtifact の disclosed 処置 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: is_target_of_is_a
    labels:
      zh: 反向读取：已披露输出片段属于披露处置内容
      en: inverse reading of disclosed output segment is disclosure disposition content
      ja: 開示済み出力区間は開示処置内容であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosedOutputSegment-is_a-DisclosureArtifact-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 确认已披露输出片段属于披露处置内容
        en: Confirm disclosed output segment is disclosure disposition content
        ja: 開示済み出力区間は開示処置内容であるを確認
      scenario_id: output-disclosure-disclosedoutputsegment-is_a-disclosureartifact-positive
      descriptions:
        zh: segment-77 记录 user-7 实际看见 output-41 第 1–80 行及其摘要。
        en: segment-77 records that user-7 actually saw lines 1–80 of output-41 and preserves their digest.
        ja: segment-77 は user-7 が output-41 の 1–80 行を実際に見たことと digest を記録します。
      field_values: {}
      related_node_ids:
        - DisclosedOutputSegment
        - DisclosureArtifact
      related_relation_ids:
        - DisclosedOutputSegment-is_a-DisclosureArtifact
      expected_result:
        zh: 将 segment-77 归为已披露输出片段和披露处置内容。
        en: Classify segment-77 as both DisclosedOutputSegment and DisclosureArtifact.
        ja: segment-77 を DisclosedOutputSegment と DisclosureArtifact に分類します。
      why_valid_or_invalid:
        zh: 交付证据与来源范围满足 disclosed 内容的完整种差。
        en: Delivery evidence and source extent satisfy the complete differentia of disclosed content.
        ja: 配送証拠と source extent が disclosed content の完全な種差を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosed-output-segment-001
        - claim-disclosed-output-segment-002
    - id: DisclosedOutputSegment-is_a-DisclosureArtifact-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 拒绝误判已披露输出片段属于披露处置内容
        en: Reject a false disclosed output segment is disclosure disposition content
        ja: 開示済み出力区間は開示処置内容であるの誤判定を拒否
      scenario_id: output-disclosure-disclosedoutputsegment-is_a-disclosureartifact-boundary
      descriptions:
        zh: 一份 allow 决定引用同一范围，但发送失败且没有 visible_at。
        en: An allow decision references the same extent, but sending fails and no visible_at value exists.
        ja: allow 判断が同じ範囲を参照しますが送信失敗し visible_at がありません。
      field_values: {}
      related_node_ids:
        - DisclosedOutputSegment
        - DisclosureArtifact
      related_relation_ids:
        - DisclosedOutputSegment-is_a-DisclosureArtifact
      expected_result:
