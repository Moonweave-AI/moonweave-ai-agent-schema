      ja: 開示済み出力区間が Actor に可視である
    definitions:
      zh: 该关系记录哪个 Actor 在何次发布后实际能够看到具有确定来源范围与摘要的 DisclosedOutputSegment；受众资格与实际可见是不同事实。
      en: This relation records which Actor could actually see a DisclosedOutputSegment with fixed source extent and digest after publication; audience eligibility and actual visibility are distinct facts.
      ja: 公開後に fixed source extent/digest の DisclosedOutputSegment を実際に見られた Actor を記録し、audience eligibility と actual visibility を区別します。
    cardinality: null
    cardinality_not_applicable_reason:
