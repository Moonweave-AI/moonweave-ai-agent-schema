        ja: 開示済み出力区間は開示処置内容であるを確認
      scenario_id: output-disclosure-disclosedoutputsegment-is_a-disclosureartifact-positive
      descriptions:
        zh: segment-77 记录 user-7 实际看见 output-41 第 1–80 行及其摘要。
        en: segment-77 records that user-7 actually saw lines 1–80 of output-41 and preserves their digest.
        ja: segment-77 は user-7 が output-41 の 1–80 行を実際に見たことと digest を記録します。
      field_values: {}
      related_node_ids:
