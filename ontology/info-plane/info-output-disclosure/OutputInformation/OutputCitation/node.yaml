schema: moonweave.ai/ontology-node/v1
id: OutputCitation
kind: concept
labels:
  zh: 输出引用
  en: output citation
  ja: 出力引用
semantics:
  short_definition:
    zh: 披露可见片段所附的来源归因引用。
    en: Source-attribution citation attached to a disclosed visible fragment.
    ja: 開示 visible fragment に付く source attribution citation。
  definition:
    zh: OutputCitation 把 DisclosedOutputSegment 链接到 info-storage-sources 的 SourceReference 或 CitationAnchor；对应 RAG 回答中的 page reference 或 MCP 资源 URI 归因，不是正文复制。
    en: OutputCitation links DisclosedOutputSegment to SourceReference or CitationAnchor in info-storage-sources—like RAG page references or MCP resource URI attribution, not body copy.
    ja: OutputCitation は SourceReference へ link。
  why_needed:
    zh: 把引用作为输出信息保留，可在披露后验证每个可见主张的精确证据位置，又不把来源、引用锚点或框架文档画成同级内容。
    en: Keeping citations as output information lets each visible claim be checked against a precise evidence location without turning sources, anchors, or framework documentation into peer content nodes.
    ja: 引用を出力情報として保持し、可視主張を正確な証拠位置で検証しつつ、source・anchor・framework document を同列内容ノードにしません。
  includes:
    - zh: 具有被支持输出范围、来源片段、页码/行号/偏移锚点和稳定来源身份的内联或脚注引用。
      en: Inline or footnote citations with supported-output extent, source span, page/line/offset anchor, and stable source identity.
      ja: supported-output extent・source span・page/line/offset anchor・stable source identity を持つ inline/footnote citation。
  excludes:
    - zh: 无定位信息的网页链接、检索候选、来源文档副本、模型置信度和仅列在参考文献中的未绑定条目。
      en: Web links without locators, retrieval candidates, source-document copies, model confidence, and unbound bibliography entries.
      ja: locator のない web link・retrieval candidate・source document copy・model confidence・未結合 bibliography entry。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 引用必须可解析到 resource_uri 或 page/line range；无 SourceReference 的裸 URL 字符串不足以构成 OutputCitation。
    en: Citations must resolve to resource_uri or page/line range; bare URL strings without SourceReference are insufficient.
    ja: SourceReference 解決必須。
  typical_input:
    - description: Output citation
      format: '{"citation_id":"cite-204-1","source_reference_id":"source-ref-mcp-onboarding-md","source_range":"lines:12..24"}'
      source_claims:
        - claim-output-citation-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: supported_output_ref
      labels:
        zh: 被支持输出引用
        en: supported-output reference
        ja: 支持出力参照
      definitions:
        zh: 引用该证据直接支持的输出主张或片段范围。
        en: References the output claim or fragment extent directly supported by the evidence.
        ja: 証拠が直接支持する出力主張または断片範囲を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: disclosed-segment-77#claim-output-citation-design
      allowed_values: []
      source_claims:
        - claim-output-citation-001
    - id: source_span_ref
      labels:
        zh: 来源片段引用
        en: source-span reference
        ja: source span 参照
      definitions:
        zh: 引用包含支持证据的精确 SourceSpan。
        en: References the precise SourceSpan containing the supporting evidence.
        ja: 支持証拠を含む正確な SourceSpan を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: source-span-31
      allowed_values: []
      source_claims:
        - claim-output-citation-001
    - id: anchor_ref
      labels:
        zh: 引用锚点引用
        en: citation-anchor reference
        ja: citation anchor 参照
      definitions:
        zh: 引用页码、行号、段落或偏移组成的 CitationAnchor。
        en: References a CitationAnchor expressed as page, line, paragraph, or offset.
        ja: page・line・paragraph・offset で表す CitationAnchor を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: anchor-page-7-lines-12-18
      allowed_values: []
      source_claims:
        - claim-output-citation-001
  constraints: []
  required_relations: []
examples:
  - id: OutputCitation-example-rag-page
    labels:
      zh: RAG 页码引用
      en: RAG page citation
      ja: RAG page citation
    descriptions:
      zh: 披露段落 cite-204-1 引用 policy.pdf pages:3..3。
      en: Disclosed paragraph cite-204-1 cites policy.pdf pages:3..3.
      ja: page citation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: page range
    field_values: {}
    related_node_ids:
      - OutputCitation
      - info-storage-sources
    related_relation_ids: []
    source_claims:
      - claim-output-citation-design
  - id: OutputCitation-example-mcp-uri
    labels:
      zh: MCP URI 引用
      en: MCP URI citation
      ja: MCP URI citation
    descriptions:
      zh: cite-204-2 指向 file:///workspace/docs/onboarding.md lines:12..24。
      en: cite-204-2 points to file:///workspace/docs/onboarding.md lines:12..24.
      ja: MCP URI citation。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      version: resource URI
    field_values: {}
    related_node_ids:
      - OutputCitation
    related_relation_ids: []
    source_claims:
      - claim-output-citation-mcp
  - id: OutputCitation-example-bare-url
    labels:
      zh: 裸 URL 边界
      en: Bare URL boundary
      ja: bare URL 境界
    descriptions:
      zh: 输出中未建立 SourceReference 的 https://example.com 不构成 OutputCitation。
      en: https://example.com in output without SourceReference does not constitute OutputCitation.
      ja: bare URL 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - OutputCitation
    related_relation_ids: []
    source_claims:
      - claim-output-citation-design
parent_relation:
  id: OutputCitation-is_a-OutputInformation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 输出引用属于输出信息
    en: output citation is output information
    ja: 出力引用は出力情報である
  definitions:
    zh: 把一个输出主张范围绑定到精确 SourceSpan 和 CitationAnchor 的证据记录，是 OutputInformation 的引用子类。
    en: An evidence record binding an output-claim extent to a precise SourceSpan and CitationAnchor is the citation subtype of OutputInformation.
    ja: 出力主張範囲を正確な SourceSpan と CitationAnchor に結ぶ証拠記録を OutputInformation の引用 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：输出引用属于输出信息
      en: inverse reading of output citation is output information
      ja: 出力引用は出力情報であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: OutputCitation-is_a-OutputInformation-example-positive-manual-20260716
      labels:
        zh: 确认输出引用属于输出信息
        en: Confirm output citation is output information
        ja: 出力引用は出力情報であるを確認
      descriptions:
        zh: citation-12 把 claim-output-citation-design 连接到第 7 页第 12–18 行的来源片段。
        en: citation-12 links claim-output-citation-design to a source span at page 7, lines 12–18.
        ja: citation-12 は claim-output-citation-design を page 7 lines 12–18 の source span に結びます。
      field_values: {}
      related_node_ids:
        - OutputCitation
        - OutputInformation
      related_relation_ids:
        - OutputCitation-is_a-OutputInformation
      source_claims:
        - claim-output-citation-001
    - id: OutputCitation-is_a-OutputInformation-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判输出引用属于输出信息
        en: Reject a false output citation is output information
        ja: 出力引用は出力情報であるの誤判定を拒否
      descriptions:
        zh: 文末裸 URL 没有绑定任何输出主张，也没有页码、行号或偏移。
        en: A bare URL at the end binds no output claim and gives no page, line, or offset.
        ja: 末尾の bare URL は出力主張を結ばず page・line・offset を持ちません。
      field_values: {}
      related_node_ids:
        - OutputCitation
        - OutputInformation
      related_relation_ids:
        - OutputCitation-is_a-OutputInformation
      source_claims:
        - claim-output-citation-001
  source_claims:
    - claim-output-citation-001
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: OutputCitation-anchored_by-CitationAnchor
    predicate: anchored_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 输出引用由引用锚点定位
      en: output citation is anchored by a citation anchor
      ja: 出力引用が引用 anchor により定位される
    definitions:
      zh: 该关系给 OutputCitation 指定页码、行号、段落、时间码或偏移锚点，使同一 SourceSpan 内的证据位置可重复定位。
      en: This relation assigns an OutputCitation a page, line, paragraph, timecode, or offset anchor so its evidence location within a SourceSpan can be reproduced.
      ja: OutputCitation に page・line・paragraph・timecode・offset anchor を割り当て、SourceSpan 内の証拠位置を再現可能にします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_anchored_by
      labels:
        zh: 反向读取：输出引用由引用锚点定位
        en: inverse reading of output citation is anchored by a citation anchor
        ja: 出力引用が引用 anchor により定位されるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: OutputCitation-anchored_by-CitationAnchor-example-positive-manual-20260716
        labels:
          zh: 确认输出引用由引用锚点定位
          en: Confirm output citation is anchored by a citation anchor
          ja: 出力引用が引用 anchor により定位されるを確認
        descriptions:
          zh: citation-12 使用 anchor-page-7-lines-12-18 定位 source-span-31。
          en: citation-12 uses anchor-page-7-lines-12-18 to locate evidence within source-span-31.
          ja: citation-12 は anchor-page-7-lines-12-18 で source-span-31 内の証拠を定位します。
        field_values: {}
        related_node_ids:
          - OutputCitation
          - CitationAnchor
        related_relation_ids:
          - OutputCitation-anchored_by-CitationAnchor
        source_claims:
          - claim-output-citation-001
      - id: OutputCitation-anchored_by-CitationAnchor-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判输出引用由引用锚点定位
          en: Reject a false output citation is anchored by a citation anchor
          ja: 出力引用が引用 anchor により定位されるの誤判定を拒否
        descriptions:
          zh: source-span-31 只有文档级 URL，没有页码、行号或其他局部定位。
          en: source-span-31 has only a document-level URL and no page, line, or other local locator.
          ja: source-span-31 は document-level URL だけで page・line・local locator がありません。
        field_values: {}
        related_node_ids:
          - OutputCitation
          - CitationAnchor
        related_relation_ids:
          - OutputCitation-anchored_by-CitationAnchor
        source_claims:
          - claim-output-citation-001
    source_claims:
      - claim-output-citation-001
    layout_role: cross-link
    target: concept:CitationAnchor
  - id: OutputCitation-cites-SourceSpan
    predicate: cites
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 输出引用引用来源片段
      en: output citation cites a source span
      ja: 出力引用が source span を引用する
    definitions:
      zh: 该关系把一个输出主张的 OutputCitation 连接到直接支持它的精确 SourceSpan，并保留来源版本；主题相关文档不自动成为被引证据。
      en: This relation links an output claim's OutputCitation to the precise SourceSpan directly supporting it and preserves source revision; a topically related document is not automatically cited evidence.
      ja: 出力主張の OutputCitation を直接支持する正確な SourceSpan と source revision に結び、topic-related document を自動的な引用証拠とはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_cites
      labels:
        zh: 反向读取：输出引用引用来源片段
        en: inverse reading of output citation cites a source span
        ja: 出力引用が source span を引用するの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: OutputCitation-cites-SourceSpan-example-positive-manual-20260716
        labels:
          zh: 确认输出引用引用来源片段
          en: Confirm output citation cites a source span
          ja: 出力引用が source span を引用するを確認
        descriptions:
          zh: citation-12 的 claim-output-citation-design 可在 source-span-31 的对应句子中逐项核对。
          en: claim-output-citation-design of citation-12 can be checked point by point against the corresponding sentence in source-span-31.
          ja: citation-12 の claim-output-citation-design を source-span-31 の対応文と項目別に照合できます。
        field_values: {}
        related_node_ids:
          - OutputCitation
          - SourceSpan
        related_relation_ids:
          - OutputCitation-cites-SourceSpan
        source_claims:
          - claim-output-citation-001
      - id: OutputCitation-cites-SourceSpan-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判输出引用引用来源片段
          en: Reject a false output citation cites a source span
          ja: 出力引用が source span を引用するの誤判定を拒否
        descriptions:
          zh: source-span-32 与主题相关，但只讨论背景，没有支持 claim-output-citation-design 的事实。
          en: source-span-32 is topically related but discusses only background and contains no fact supporting claim-output-citation-design.
          ja: source-span-32 は topic-related ですが背景だけで claim-output-citation-design を支持する事実がありません。
        field_values: {}
        related_node_ids:
          - OutputCitation
          - SourceSpan
        related_relation_ids:
          - OutputCitation-cites-SourceSpan
        source_claims:
          - claim-output-citation-001
    source_claims:
      - claim-output-citation-001
    layout_role: cross-link
    target: concept:SourceSpan
sources:
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
  - id: src-mcp-resources
    title: MCP Server Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    source_type: official-spec
    relevance: URI-based resource identity for citations.
source_claims:
  - id: claim-output-citation-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-citation-design
    source: src-info-output-design
    supports: OutputCitation requires resolvable SourceReference not bare URLs.
    locator: OutputCitation
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-citation-mcp
    source: src-mcp-resources
    supports: MCP resource URIs provide authoritative citation targets.
    locator: resources URI
    evidence_kind: primary-spec
    confidence: high
