  - id: info-output-example-window-truncation-accounting
    labels:
      zh: 窗口截断与范围闭包核算
      en: Window truncation with range-closure accounting
      ja: ウィンドウ切詰めと範囲 closure 核算
    descriptions:
      zh: 源输出 output/run-204 共 1200 字符。对 actor/customer-support-7，disclose/run-204 发布 0..479、规则抑制 480..639、窗口 window/800-char 截断 640..1199；coverage_complete=true。若缺少 480..639 的 suppress 产物，则必须拒绝“完整披露”断言。
      en: Source output output/run-204 spans 1200 characters. For actor/customer-support-7, disclose/run-204 publishes 0..479, rule-suppresses 480..639, and window window/800-char truncates 640..1199 with coverage_complete=true. If the 480..639 suppress artifact is missing, a complete-disclosure claim must be rejected.
      ja: source output output/run-204 は 1200 文字。actor/customer-support-7 向け disclose/run-204 が 0..479 公開、480..639 rule suppress、640..1199 を window/800-char で truncate（coverage_complete=true）。480..639 suppress artifact が欠ければ完全開示 claim を拒否します。
    example_source:
      product: Moonweave disclosure design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      source_output_id: output/run-204
      source_extent: chars:0..1199
      dispositions:
        - kind: display
          range: chars:0..479
        - kind: suppress
          range: chars:480..639
        - kind: truncate
          range: chars:640..1199
      coverage_complete: true
    related_node_ids: [info-output-disclosure]
    related_relation_ids: []
    source_claims: [claim-info-output-design]
