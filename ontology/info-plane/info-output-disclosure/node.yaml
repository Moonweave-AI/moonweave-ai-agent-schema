schema: moonweave.ai/ontology-node/v1
id: info-output-disclosure
kind: module
status: review
labels:
  zh: 输出披露
  en: Output disclosure
  ja: 出力開示
semantics:
  short_definition:
    zh: 输出披露描述结果产生之后，针对特定受众如何选择、截断、扣留或发布输出，并记录实际可见与未披露的范围。披露活动、披露后信息与窗口规范是三个并列根；原始输出流、通用内容类型、安全规则和来源文档不进入该层级。
    en: Output disclosure describes how, after runtime output exists, the system makes an audience-specific disposition decision and uses selection, truncation, suppression, and publication activities to form auditable visible, withheld, and omitted extents. Rules, frameworks, and sources remain evidence attached to nodes or relations rather than taxonomy branches.
    ja: 出力開示は runtime output 生成後に system が具体受け手向け処置判断を行い、selection・truncation・suppression・publication activity で監査可能な visible・withheld・omitted extent を形成する仕組みです。rule・framework・source は node/relation の証拠であり分類 branch にしません。
  definition:
    zh: DisclosureActivity 以源输出、受众、处置决定和执行时间为身份；OutputInformation 只表示在该披露语境中被选中、扣留或截断的信息及证据；OutputWindow 是对保留范围与计量单位的版本化规范。安全规则在安全模块中定义，本模块只记录规则在一次披露中造成的实际处置。
    en: Output disclosure describes how, after runtime output exists, the system makes an audience-specific disposition decision and uses selection, truncation, suppression, and publication activities to form auditable visible, withheld, and omitted extents. Rules, frameworks, and sources remain evidence attached to nodes or relations rather than taxonomy branches.
    ja: 出力開示は runtime output 生成後に system が具体受け手向け処置判断を行い、selection・truncation・suppression・publication activity で監査可能な visible・withheld・omitted extent を形成する仕組みです。rule・framework・source は node/relation の証拠であり分類 branch にしません。
  why_needed:
    zh: 重建一次输出披露的完整证据链：处理了什么来源输出、为谁作出何种决定、选用哪个窗口、执行了什么处置、最终哪些范围可见或不可见。
    en: "Reconstruct the complete evidence chain of one output disclosure: source output processed, audience and decision, selected window, executed dispositions, and extents ultimately visible or invisible."
    ja: 一回の出力開示について、処理 source output・audience/decision・selected window・executed disposition・最終 visible/invisible extent の完全な証拠 chain を再構成します。
  includes:
    - zh: DisclosureActivity 及其四个活动子类：DisclosureSelectionActivity、DisclosureTruncationActivity、DisclosureSuppressionActivity 和 DisclosurePublicationActivity。
      en: "DisclosureActivity and its four activity subtypes: DisclosureSelectionActivity, DisclosureTruncationActivity, DisclosureSuppressionActivity, and DisclosurePublicationActivity."
      ja: DisclosureActivity と、その四つの活動下位型 DisclosureSelectionActivity・DisclosureTruncationActivity・DisclosureSuppressionActivity・DisclosurePublicationActivity。
    - zh: 独立 DisclosureSelectionDecision、OutputWindow/HeadTailWindow 规范、OutputInformation 下的披露内容与引用分支，以及 AuditRecord 下的 DisclosureRecord。
      en: An independent DisclosureSelectionDecision, OutputWindow and HeadTailWindow specifications, the disposition-content and citation branches under OutputInformation, and DisclosureRecord under AuditRecord.
      ja: 独立 DisclosureSelectionDecision、OutputWindow/HeadTailWindow 仕様、OutputInformation 下の処置内容・引用 branch、AuditRecord 下の DisclosureRecord。
  excludes:
    - zh: 模型调用前的 ContextPackage 组装与输入上下文选择归 memory-context；这里只引用其 VisibleContextWindow 符合哪份输出窗口规范。
      en: Pre-invocation ContextPackage assembly and input-context selection belong to memory-context; this module only references which output-window specification a VisibleContextWindow conforms to.
      ja: 呼出し前 ContextPackage assembly と input-context selection は memory-context に属し、本 module は VisibleContextWindow がどの output-window 仕様に適合するかだけ参照します。
    - zh: 敏感识别、DisclosureRule、脱敏算法与 ProgressiveDisclosure 策略归 safety-disclosure-redaction；这里记录规则被采用后实际执行和显示的结果。
      en: Sensitive-data detection, DisclosureRule, redaction algorithms, and ProgressiveDisclosure policy belong to safety-disclosure-redaction; this module records execution and display outcomes after those rules are adopted.
      ja: sensitive detection・DisclosureRule・redaction algorithm・ProgressiveDisclosure policy は safety-disclosure-redaction に属し、本 module は採用後の実行・表示結果を記録します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 重建一次输出披露的完整证据链：处理了什么来源输出、为谁作出何种决定、选用哪个窗口、执行了什么处置、最终哪些范围可见或不可见。
  en: "Reconstruct the complete evidence chain of one output disclosure: source output processed, audience and decision, selected window, executed dispositions, and extents ultimately visible or invisible."
  ja: 一回の出力開示について、処理 source output・audience/decision・selected window・executed disposition・最終 visible/invisible extent の完全な証拠 chain を再構成します。
structure: null
examples:
  - id: info-output-disclosure-cq-visible-fragments-v3-example-positive
    kind: positive
    labels:
      zh: 某个运行结果向指定受众实际显示了哪些片段，哪些被截断或抑制？：正例
      en: "Which fragments of a runtime result were actually shown to a specified audience, and which were truncated or suppressed?: positive case"
      ja: ある実行結果のどの断片が指定受け手へ実際に表示され、どれが切詰めまたは抑制されましたか。：正例
    scenario_id: null
    descriptions:
      zh: 披露活动 disclose/run-204 处理运行输出 output/run-204，并生成记录 disclosure-record/204。对受众 actor/customer-support-7，字符 0..479 已发布、480..639 因凭据规则被抑制、640..1199 因窗口容量被截断；三项处置按源顺序完整覆盖 0..1199。
      en: Disclosure activity disclose/run-204 processes output/run-204 and produces disclosure-record/204. For actor/customer-support-7, characters 0..479 are published, 480..639 are rule-suppressed, and 640..1199 are window-truncated, accounting for the full 0..1199 source extent in order.
      ja: 開示活動 disclose/run-204 は実行出力 output/run-204 を処理して disclosure-record/204 を生成します。受け手 actor/customer-support-7 に対し文字 0..479 は公開、480..639 は credential rule で抑制、640..1199 は window 容量で切詰められ、0..1199 全体を順序通りに説明します。
    field_values:
      source_output_id: output/run-204
      source_extent: chars:0..1199
      audience_id: actor/customer-support-7
      disclosure_activity_id: disclose/run-204
      disclosure_record_ref: disclosure-record/204
      selection_decision_id: disclosure-decision/204
      dispositions:
        - kind: display
          artifact_id: displayed/204/1
          range: chars:0..479
        - kind: suppress
          artifact_id: suppressed/204/1
          range: chars:480..639
          rule_id: rule/credential-external
        - kind: truncate
          artifact_id: truncated/204/1
          range: chars:640..1199
          window_id: window/800-char
      coverage_complete: true
    related_node_ids:
      - DisclosureActivity
      - DisclosureRecord
      - DisclosureArtifact
      - DisclosedOutputSegment
      - SuppressedContext
      - TruncatedContextSpan
      - OutputSegment
    related_relation_ids:
      - DisclosureActivity-processes-OutputSegment
      - DisclosureActivity-produces-DisclosureRecord
      - DisclosureRecord-records_disposition-DisclosureArtifact
      - DisclosurePublicationActivity-produces-DisclosedOutputSegment
      - DisclosureSuppressionActivity-produces-SuppressedContext
      - DisclosureTruncationActivity-produces-TruncatedContextSpan
    expected_result:
      zh: 返回同一输出、受众和披露记录下的三段有序范围，coverage_complete=true；每段分别指向已发布、规则抑制或窗口截断产物，不得把源 Artifact 本身当作披露事实。
      en: Return the three ordered ranges under the same output, audience, and disclosure record with coverage_complete=true. Each range must point to a publication, rule-suppression, or window-truncation artifact; the source Artifact alone is not proof of disclosure.
      ja: 同一 output・受け手・開示記録に属する三つの順序付き範囲と coverage_complete=true を返します。各範囲は公開・rule 抑制・window 切詰め artifact を指し、source Artifact だけを開示事実とは扱いません。
    why_valid_or_invalid:
      zh: 处理活动把外部拥有的 OutputSegment 与本域的 DisclosureRecord 连接起来，记录再指向三个处置产物；范围无重叠、无缺口且受众一致，因此能回答“实际显示与未显示什么”。
      en: The processing activity links the externally owned OutputSegment to this module's DisclosureRecord, which records three disposition artifacts. Non-overlapping, gap-free ranges and one audience establish what was actually shown and withheld.
      ja: 処理 activity が外部 owner の OutputSegment と本 domain の DisclosureRecord を結び、record が三つの disposition artifact を記録します。範囲は重複・欠落がなく受け手も一致するため、実際の表示・非表示を判定できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-info-output-disclosure-003
      - claim-info-output-disclosure-004
  - id: info-output-disclosure-cq-visible-fragments-v3-example-counter
    kind: counterexample
    labels:
      zh: 某个运行结果向指定受众实际显示了哪些片段，哪些被截断或抑制？：反例
      en: "Which fragments of a runtime result were actually shown to a specified audience, and which were truncated or suppressed?: counterexample"
      ja: ある実行結果のどの断片が指定受け手へ実際に表示され、どれが切詰めまたは抑制されましたか。：反例
    scenario_id: null
    descriptions:
      zh: 候选记录 disclosure-record/205 属于内部受众 actor/security-reviewer，而查询要求 actor/customer-support-7；它只记录 0..479 已显示和 640..1199 已截断，字符 480..639 没有任何处置产物，不能据此声称完成披露核算。
      en: Candidate disclosure-record/205 is for internal actor/security-reviewer, not the requested actor/customer-support-7. It records display for 0..479 and truncation for 640..1199 but has no disposition artifact for 480..639, so it cannot establish complete disclosure accounting.
      ja: 候補 disclosure-record/205 の受け手は内部 actor/security-reviewer で、要求された actor/customer-support-7 ではありません。0..479 の表示と 640..1199 の切詰めだけを記録し 480..639 の disposition artifact がないため、完全な開示説明になりません。
    field_values:
      source_output_id: output/run-204
      source_extent: chars:0..1199
      requested_audience_id: actor/customer-support-7
      disclosure_record_ref: disclosure-record/205
      recorded_audience_id: actor/security-reviewer
      dispositions:
        - kind: display
          range: chars:0..479
        - kind: truncate
          range: chars:640..1199
      unaccounted_ranges:
        - chars:480..639
      coverage_complete: false
    related_node_ids:
      - DisclosureActivity
      - DisclosureRecord
      - DisclosureArtifact
      - DisclosedOutputSegment
      - SuppressedContext
      - TruncatedContextSpan
      - OutputSegment
    related_relation_ids:
      - DisclosureActivity-processes-OutputSegment
      - DisclosureActivity-produces-DisclosureRecord
      - DisclosureRecord-records_disposition-DisclosureArtifact
      - DisclosurePublicationActivity-produces-DisclosedOutputSegment
      - DisclosureSuppressionActivity-produces-SuppressedContext
      - DisclosureTruncationActivity-produces-TruncatedContextSpan
    expected_result:
      zh: 返回 audience_mismatch 与 unaccounted_ranges=[chars:480..639]，并令 coverage_complete=false；不得把同一输出 ID 或内部受众记录外推为客户实际看见的内容。
      en: Return audience_mismatch, unaccounted_ranges=[chars:480..639], and coverage_complete=false. A shared output ID or an internal-audience record must not be extrapolated into what the customer actually saw.
      ja: audience_mismatch、unaccounted_ranges=[chars:480..639]、coverage_complete=false を返し、同一 output ID や内部受け手 record から顧客が実際に見た内容を外挿しません。
    why_valid_or_invalid:
      zh: 披露事实同时受记录身份、受众与范围闭包约束；本例受众不一致且存在未核算区间，任何一个缺陷都足以否定“实际显示范围完整可知”。
      en: Disclosure facts are constrained jointly by record identity, audience, and range closure. This record has both an audience mismatch and an uncovered interval, either of which defeats a complete actual-display claim.
      ja: 開示事実は record identity・受け手・範囲 closure に共同制約されます。本例は受け手不一致と未説明区間を併せ持ち、どちらだけでも完全な実表示 claim を否定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-info-output-disclosure-005
      - claim-info-output-disclosure-006
  - id: info-output-disclosure-cq-window-application-v3-example-positive
    kind: positive
    labels:
      zh: 首尾窗口或长度窗口如何应用到内容片段，实际边界与不可变上下文版本有何关系？：正例
      en: "How is a head/tail or length window applied to content fragments, and how do actual boundaries relate to the immutable context version?: positive case"
      ja: 先頭・末尾窓または長さ窓は内容断片へどう適用され、実際の境界は不変コンテキスト版とどう関係しますか。：正例
    scenario_id: null
    descriptions:
      zh: 不可变上下文包 context/package-73@17 含 2400 token 的源输出。选择决定采用 window/head-tail-800@5，保留 0..399 与 2000..2399，并由 truncation/span-73 记录 400..1999 的容量省略；源包摘要在应用前后均为 sha256:pkg73v17。
      en: Immutable context/package-73@17 contains a 2,400-token source output. The selection decision applies window/head-tail-800@5, retaining 0..399 and 2000..2399 while truncation/span-73 records the capacity omission 400..1999; the package digest remains sha256:pkg73v17 before and after application.
      ja: 不変 context/package-73@17 は 2400 token の source output を含みます。selection decision は window/head-tail-800@5 を適用して 0..399 と 2000..2399 を保持し、truncation/span-73 が容量省略 400..1999 を記録します。適用前後の package digest は sha256:pkg73v17 のままです。
    field_values:
      context_package_id: context/package-73
      context_package_version: 17
      visible_context_window_id: visible-window/73
      output_window_id: window/head-tail-800
      window_revision: 5
      source_extent: tokens:0..2399
      retained_ranges:
        - tokens:0..399
        - tokens:2000..2399
      omitted_ranges:
        - tokens:400..1999
      source_mutated: false
    related_node_ids:
      - ContextPackage
      - DisclosureSelectionDecision
      - OutputWindow
      - DisclosureTruncationActivity
      - TruncatedContextSpan
      - VisibleContextWindow
    related_relation_ids:
      - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
      - DisclosureSelectionDecision-selects_window-OutputWindow
      - DisclosureTruncationActivity-applies-OutputWindow
      - TruncatedContextSpan-omitted_by-OutputWindow
      - has_visible_window
      - VisibleContextWindow-conforms_to-OutputWindow
    expected_result:
      zh: 返回 context/package-73@17、window revision 5、两段保留范围和一段省略范围，并确认 source_mutated=false；OutputWindow 是被引用的规范，不取得 ContextPackage 所有权。
      en: Return context/package-73@17, window revision 5, the two retained ranges, the one omitted range, and source_mutated=false. OutputWindow remains a referenced specification and does not acquire ownership of ContextPackage.
      ja: context/package-73@17、window revision 5、二つの保持範囲、一つの省略範囲、source_mutated=false を返します。OutputWindow は参照仕様のままで ContextPackage の owner にはなりません。
    why_valid_or_invalid:
      zh: ContextPackage 通过 has_visible_window 指向 VisibleContextWindow，后者再 conforms_to 同一 revision 的 OutputWindow；省略跨度也回指该窗口，且源摘要未变，故选择结果可重放。
      en: ContextPackage points to VisibleContextWindow through has_visible_window, that window conforms to the same OutputWindow revision, and the omitted span points back to it. An unchanged source digest makes the selection replayable.
      ja: ContextPackage は has_visible_window で VisibleContextWindow を指し、その window は同じ revision の OutputWindow に conforms_to します。省略 span も同 window を参照し、source digest が不変なので選択を再現できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-info-output-disclosure-007
      - claim-info-output-disclosure-008
  - id: info-output-disclosure-cq-window-application-v3-example-counter
    kind: counterexample
    labels:
      zh: 首尾窗口或长度窗口如何应用到内容片段，实际边界与不可变上下文版本有何关系？：反例
      en: "How is a head/tail or length window applied to content fragments, and how do actual boundaries relate to the immutable context version?: counterexample"
      ja: 先頭・末尾窓または長さ窓は内容断片へどう適用され、実際の境界は不変コンテキスト版とどう関係しますか。：反例
    scenario_id: null
    descriptions:
      zh: 候选结果引用 context/package-73@17，却实际读取已更新的 version 18；VisibleContextWindow 声称符合 OutputWindow revision 5，而 DisclosureRecord 记录的是 revision 4，并且实现就地删除了源包的中段。
      en: The candidate cites context/package-73@17 but reads current version 18. VisibleContextWindow claims conformance to OutputWindow revision 5 while DisclosureRecord records revision 4, and the implementation deletes the middle of the source package in place.
      ja: 候補は context/package-73@17 を引用しながら実際には version 18 を読みます。VisibleContextWindow は OutputWindow revision 5 への適合を主張しますが DisclosureRecord は revision 4 を記録し、実装は source package の中間を inplace 削除しています。
    field_values:
      context_package_id: context/package-73
      cited_context_package_version: 17
      actual_context_package_version: 18
      visible_context_window_id: visible-window/73-bad
      output_window_id: window/head-tail-800
      window_revision: 5
      recorded_window_revision: 4
      claimed_retained_ranges:
        - tokens:0..399
        - tokens:2000..2399
      source_mutated: true
    related_node_ids:
      - ContextPackage
      - DisclosureSelectionDecision
      - OutputWindow
      - DisclosureTruncationActivity
      - TruncatedContextSpan
      - VisibleContextWindow
    related_relation_ids:
      - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
      - DisclosureSelectionDecision-selects_window-OutputWindow
      - DisclosureTruncationActivity-applies-OutputWindow
      - TruncatedContextSpan-omitted_by-OutputWindow
      - has_visible_window
      - VisibleContextWindow-conforms_to-OutputWindow
    expected_result:
      zh: 返回 version_mismatch、window_revision_mismatch 与 source_mutated=true，拒绝给出可信保留范围；必须重新绑定同一 ContextPackage 版本与窗口 revision 后再计算。
      en: Return version_mismatch, window_revision_mismatch, and source_mutated=true and reject the claimed retained ranges. Rebind one ContextPackage version and one window revision before recomputing.
      ja: version_mismatch、window_revision_mismatch、source_mutated=true を返し、主張された保持範囲を拒否します。同一 ContextPackage version と window revision を再 binding してから再計算します。
    why_valid_or_invalid:
      zh: 窗口结果只能由同一源版本和同一规范 revision 重放；跨版本读取和就地修改都破坏偏移坐标，关系名称相同也无法修复证据链。
      en: A window result is replayable only against one source version and one specification revision. Cross-version reading and in-place mutation invalidate offsets; matching relation names cannot repair that evidence chain.
      ja: window result は一つの source version と一つの specification revision に対してのみ再現できます。version 横断読取と inplace 変更は offset を無効化し、同名 relation でも証拠鎖を修復できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-info-output-disclosure-009
      - claim-info-output-disclosure-010
  - id: info-output-disclosure-cq-policy-to-display-v3-example-positive
    kind: positive
    labels:
      zh: 一项安全披露决定如何改变最终显示，安全变换和实际披露是否都有独立证据？：正例
      en: "How does a safety-disclosure decision change final display, and are the security transformation and actual disclosure independently evidenced?: positive case"
      ja: 安全開示判断は最終表示をどう変え、安全変換と実際の開示はそれぞれ独立した証拠を持ちますか。：正例
    scenario_id: null
    descriptions:
      zh: 安全控制 redaction/91 按 rule/credential-external 抑制字符 128..171；随后 disclosure/publish-91 为 actor/external-customer 发布其余两段并生成 disclosure-record/91。记录同时指向安全控制、输出选择决定、处置产物与 crossing/customer-api-91。
      en: Safety control redaction/91 suppresses characters 128..171 under rule/credential-external. Disclosure/publish-91 then publishes the two remaining spans to actor/external-customer and produces disclosure-record/91, which records the safety control, output selection decision, disposition artifacts, and crossing/customer-api-91.
      ja: 安全 control redaction/91 は rule/credential-external に基づき文字 128..171 を抑制します。その後 disclosure/publish-91 が残る二範囲を actor/external-customer へ公開し disclosure-record/91 を生成し、同 record は安全 control・output selection decision・disposition artifact・crossing/customer-api-91 を記録します。
    field_values:
      disclosure_control_activity_id: redaction/91
      disclosure_rule_id: rule/credential-external
      selection_decision_id: disclosure-decision/91
      disclosure_activity_id: disclosure/publish-91
      disclosure_record_ref: disclosure-record/91
      boundary_crossing_id: crossing/customer-api-91
      suppressed_span: chars:128..171
      displayed_spans:
        - chars:0..127
        - chars:172..511
      audience_id: actor/external-customer
    related_node_ids:
      - DisclosureActivity
      - DisclosureRecord
      - DisclosureControlActivity
      - DisclosureArtifact
      - DisclosureSelectionDecision
      - SuppressedContext
      - DisclosedOutputSegment
      - ProgressiveDisclosure
      - DisclosureRule
      - BoundaryCrossing
    related_relation_ids:
      - DisclosureActivity-governed_by-ProgressiveDisclosure
      - DisclosureActivity-produces-DisclosureRecord
      - DisclosureRecord-records_control-DisclosureControlActivity
      - DisclosureRecord-records_decision-DisclosureSelectionDecision
      - DisclosureRecord-records_disposition-DisclosureArtifact
      - SuppressedContext-withheld_by-DisclosureRule
      - DisclosurePublicationActivity-produces-DisclosedOutputSegment
