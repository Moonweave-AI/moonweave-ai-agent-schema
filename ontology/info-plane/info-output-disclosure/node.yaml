    en: Output disclosure owns an object when its identity depends on a post-result audience, DisclosureSelectionDecision, selected OutputWindow, execution activity, or actual visible, withheld, or omitted extent.
    ja: 対象の同一性が result 生成後の audience・DisclosureSelectionDecision・selected OutputWindow・execution activity・actual visible/withheld/omitted extent に依存する場合、output disclosure が所有します。
  references_when:
    zh: 披露活动从执行观测引用原始 OutputSegment，从安全模块引用 DisclosureRule 或边界决定，从来源模块引用 SourceSpan/CitationAnchor；不在披露树中复制这些节点。
    en: Disclosure activities may reference externally owned OutputSegment, Actor, AuditRecord, DisclosureRule, ProgressiveDisclosure, BoundaryCrossing, SourceSpan, CitationAnchor, and VisibleContextWindow without redefining them here.
    ja: 開示活動は外部 owner の OutputSegment・Actor・AuditRecord・DisclosureRule・ProgressiveDisclosure・BoundaryCrossing・SourceSpan・CitationAnchor・VisibleContextWindow を参照できますが再定義しません。
