            zh: 逐项核验确认 DisclosureActivity 是实际披露处置活动，DisclosureSelectionActivity 产生 DisclosureSelectionDecision；因此决定记录不再独立成根。OutputInformation 是候选输出内容，OutputWindow 是可复用容量规范，它们可被多次活动或决定引用，不能并入活动—决定产出链。
            en: Point-by-point review confirms DisclosureActivity as the actual disclosure-disposition activity and DisclosureSelectionActivity as producing DisclosureSelectionDecision, so the decision record is no longer an independent root. OutputInformation is candidate output content and OutputWindow is a reusable capacity specification; both may be referenced by many activities or decisions and cannot be folded into the activity-to-decision production chain.
            ja: 個別審査により DisclosureActivity は実際の開示処置活動、DisclosureSelectionActivity は DisclosureSelectionDecision を生成すると確認し、decision record を独立 root から外します。OutputInformation は候補出力内容、OutputWindow は再利用可能容量仕様で複数活動・decision から参照されるため、活動—decision 生成鎖へ統合できません。
