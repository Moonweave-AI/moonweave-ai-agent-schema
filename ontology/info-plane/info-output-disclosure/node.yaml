          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: DisclosureActivity 主根经 is_a 展开选择、截断、抑制与发布活动，DisclosureSelectionActivity 通过 produces 展开 DisclosureSelectionDecision。OutputInformation 与 OutputWindow 都是可在具体活动之前独立存在并被多次复用的组合根；selects 与 applies 只记录运行时引用，均为 cross-link，不能把窗口伪装成某次决定或活动的下位概念。
            en: The DisclosureActivity key root specializes into selection, truncation, suppression, and publication activities, and DisclosureSelectionActivity expands to DisclosureSelectionDecision through produces. OutputInformation and OutputWindow are independent composition roots that may pre-exist and be reused across activities. selects and applies record runtime references only; both are cross-links and cannot make a window a subtype or component of one decision or activity.
            ja: DisclosureActivity key root から selection・truncation・suppression・publication activity を is_a 展開し、DisclosureSelectionActivity は produces で DisclosureSelectionDecision へ続きます。OutputInformation と OutputWindow は活動前から独立して存在し再利用できる composition root です。selects と applies は runtime reference の cross-link にすぎず、window を一つの decision/activity の下位概念にしません。
