      owner_module_id: info-output-disclosure
      rationale:
        zh: 本行拥有一次受众披露中的 DisclosureActivity、DisclosureRecord、OutputInformation 与 SuppressedContext。五条边分别记录活动受渐进披露治理、过滤器可能产生未披露上下文并压制输出信息、披露记录追溯控制活动、实际未披露范围由规则扣留；它们共同闭合“策略—控制—结果—审计”，而不复制安全策略节点。
        en: This row owns DisclosureActivity, DisclosureRecord, OutputInformation, and SuppressedContext for one audience disclosure. The five edges state that the activity is governed by progressive disclosure, a filter may produce withheld context and suppress output information, the disclosure record traces the control activity, and the actual withheld extent is withheld by a rule. Together they close the policy-control-outcome-audit loop without copying safety-policy nodes.
        ja: この行は一 audience disclosure の DisclosureActivity・DisclosureRecord・OutputInformation・SuppressedContext を所有します。五辺は activity が progressive disclosure に govern され、filter が withheld context を生成し output information を suppress し得ること、disclosure record が control activity を追跡し、実 withheld extent が rule により withheld されることを表し、safety policy node を複製せず policy—control—outcome—audit loop を閉じます。
      relation_ids:
        - DisclosureActivity-governed_by-ProgressiveDisclosure
        - DisclosureFilter-may_produce-SuppressedContext
        - DisclosureFilter-suppresses-OutputInformation
        - DisclosureRecord-records_control-DisclosureControlActivity
        - SuppressedContext-withheld_by-DisclosureRule
