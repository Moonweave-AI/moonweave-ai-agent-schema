schema: moonweave.ai/ontology-node/v1
id: info-output-disclosure
kind: module
labels:
  zh: 输出披露
  en: Output disclosure
  ja: 出力開示
semantics:
  short_definition:
    zh: 输出披露描述模型或工具已经产生结果之后，系统如何面向特定受众选择、截断、抑制或发布可见片段，并记录实际看到与未看到的内容。
    en: Output disclosure describes how, after a model or tool has already produced a result, the system selects, truncates, suppresses, or publishes visible fragments for a specific audience and records what was actually seen versus withheld.
    ja: 出力開示は、モデルまたはツールが結果を生成した後に、特定受け手向けに可視断片を選択・切詰め・抑制・公開し、実際に見えた内容と見えなかった内容を記録する仕組みです。
  definition:
    zh: 本模块以 DisclosureActivity 为处理活动根，以 OutputInformation 表示在某次披露语境中被选中、扣留或截断的信息，以 OutputWindow 描述保留范围与计量单位的版本化规范。一次完整披露必须能重建：处理了哪份源输出、面向哪个受众、采用了哪份窗口规范、执行了哪些处置、最终哪些范围可见或不可见。OpenAI Responses API 的 response.output[] 项与 output_text 辅助字段、Anthropic assistant content block 序列、SSE 流式 delta/complete 事件，以及 A2A 完成任务后交付给客户端的 Artifact，都提供“已完成输出”与“实际交付片段”之间的工程对照面。安全规则、脱敏算法与 ProgressiveDisclosure 策略在安全模块定义；本模块只记录规则被采用后的实际处置与展示结果，不复制 allow/deny 责任链。
    en: This module roots processing in DisclosureActivity, represents information selected, withheld, or truncated in one disclosure context through OutputInformation, and versions retention scope through OutputWindow specifications. A complete disclosure must reconstruct which source output was processed, which audience it targeted, which window specification applied, which dispositions ran, and which ranges were ultimately visible or invisible. OpenAI Responses API response.output[] items and output_text helper, Anthropic assistant content-block sequences, SSE streaming delta versus complete events, and A2A Artifacts delivered to the client after task completion all provide engineering surfaces between finished output and actually delivered fragments. Safety rules, redaction algorithms, and progressive-disclosure policies are defined in the safety module; this module records execution and display outcomes after those rules are adopted without copying allow/deny accountability.
    ja: 本モジュールは DisclosureActivity を処理 activity root、OutputInformation で一回の開示文脈における選択/保留/切詰め情報、OutputWindow で保持範囲と計量単位の版管理仕様を表します。完全な開示は、どの source output を処理し、どの audience を対象にし、どの window 仕様を適用し、どの disposition を実行し、最終的にどの範囲が visible/invisible だったかを再構成できなければなりません。OpenAI Responses API の response.output[] と output_text、Anthropic assistant content block 列、SSE streaming delta/complete event、A2A Task 完了後 client へ渡す Artifact は、完成 output と実際交付 fragment の engineering 対照面です。安全 rule、redaction algorithm、ProgressiveDisclosure policy は safety module が定義し、本 module は採用後の実行/表示結果だけを記録します。
  why_needed:
    zh: 没有输出披露，系统只能看到模型返回的完整 JSON 或流式 chunk，无法回答“客户实际看到了哪几段、哪段因窗口被截断、哪段因规则被隐藏”。把 preview 当成完整交付、把内部审查视图外推给外部受众，都会在合规与调试时造成不可审计的缺口。
    en: Without output disclosure, a system only sees the model's full JSON or stream chunks and cannot answer which segments a customer actually saw, which were window-truncated, or which were rule-suppressed. Treating a preview as full delivery or extrapolating an internal review view to an external audience creates non-auditable gaps during compliance and debugging.
    ja: 出力開示がなければモデル完全 JSON や stream chunk しか見えず、顧客が実際に見た segment、window で切詰められた segment、rule で抑制された segment を答えられません。preview を完全交付とみなしたり、内部 review view を外部 audience へ外挿したりすると、コンプライアンス/デバッグで監査不能な欠落が生じます。
  includes:
    - zh: DisclosureActivity 及其选择、截断、抑制、发布四类活动子类，以及产生的 DisclosureRecord 与 DisclosedOutputSegment。
      en: DisclosureActivity and its selection, truncation, suppression, and publication activity subtypes, plus resulting DisclosureRecord and DisclosedOutputSegment objects.
      ja: DisclosureActivity と selection/truncation/suppression/publication activity subtype、および DisclosureRecord/DisclosedOutputSegment。
    - zh: DisclosureSelectionDecision、OutputWindow/HeadTailWindow 规范，以及 OutputInformation 下的披露内容、引用与抑制/截断产物分支。
      en: DisclosureSelectionDecision, OutputWindow and HeadTailWindow specifications, and the disposition-content, citation, suppression, and truncation branches under OutputInformation.
      ja: DisclosureSelectionDecision、OutputWindow/HeadTailWindow 仕様、OutputInformation 下の disposition content/citation/suppression/truncation branch。
  excludes:
    - zh: 调用前的 ContextPackage 组装与输入上下文选择归 memory-context；这里只引用其 VisibleContextWindow 符合哪份输出窗口规范。
      en: Pre-invocation ContextPackage assembly and input-context selection belong to memory-context; this module only references which output-window specification a VisibleContextWindow conforms to.
      ja: 呼出し前 ContextPackage assembly と input-context selection は memory-context に属し、本 module は VisibleContextWindow がどの output-window 仕様に適合するかだけ参照します。
    - zh: 敏感识别、DisclosureRule、脱敏算法与 ProgressiveDisclosure 策略归 safety-disclosure-redaction；这里记录规则被采用后实际执行和显示的结果。
      en: Sensitive-data detection, DisclosureRule, redaction algorithms, and ProgressiveDisclosure policy belong to safety-disclosure-redaction; this module records execution and display outcomes after those rules are adopted.
      ja: sensitive detection、DisclosureRule、redaction algorithm、ProgressiveDisclosure policy は safety-disclosure-redaction に属し、本 module は採用後の実行/表示結果を記録します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 各协议都在“完整生成结果”和“客户端实际收到什么”之间留有实现空间。OpenAI Responses API 用 response.output[] 列出 message、function_call、reasoning 等 typed item，并提供 output_text 聚合助手文本；流式模式通过 SSE event（如 response.output_text.delta 与 response.completed）区分增量片段与完成态。Anthropic 非流式响应直接在 assistant message 的 content[] 返回 text/tool_use 等 block；流式则用 content_block_delta 与 message_delta 事件。A2A 则在 Task 完成时通过 Artifact（artifactId、name、parts[]）把 durable output 交给 client，与 history 中的 transient Message Part 分离。本模块用这些形状记录披露活动、窗口规范与受众可见范围，而不把任一 API 载荷本身当作披露完成证据。
    en: Each protocol leaves room between the full generated result and what the client actually receives. OpenAI Responses API lists typed items such as message, function_call, and reasoning in response.output[] and provides output_text to aggregate assistant text; streaming uses SSE events like response.output_text.delta and response.completed to separate incremental fragments from completion. Anthropic non-streaming returns text and tool_use blocks directly in the assistant message content[]; streaming uses content_block_delta and message_delta events. A2A delivers durable output to the client through Artifact (artifactId, name, parts[]) when a Task completes, separate from transient Message Parts in history. This module uses those shapes to record disclosure activity, window specifications, and audience-visible ranges without treating any API payload alone as proof of completed disclosure.
    ja: 各プロトコルは「完全生成結果」と「client が実際に受け取る内容」の間に実装余地を残します。OpenAI Responses API は response.output[] に message/function_call/reasoning 等 typed item を列挙し output_text で assistant 文本を集約。streaming は SSE event（response.output_text.delta、response.completed）で増分 fragment と完了态を分離。Anthropic 非 streaming は assistant message content[] に text/tool_use block を直接返し、streaming は content_block_delta/message_delta event を使います。A2A は Task 完了時に Artifact（artifactId、name、parts[]）で durable output を client へ渡し、history の transient Message Part と分離。本 module はこれら形状で disclosure activity、window 仕様、audience visible range を記録し、いずれか API ペイロード単体を開示完了証拠とはしません。
  typical_input:
    - description: OpenAI Responses API — completed response.output[] with output_text helper.
      format: |
        POST https://api.openai.com/v1/responses
        {
          "model": "gpt-4.1",
          "input": "Summarize the incident report."
        }
        =>
        {
          "id": "resp_01ABC",
          "status": "completed",
          "output": [
            {"type": "message", "role": "assistant", "content": [{"type": "output_text", "text": "Root cause: stale cache."}]}
          ],
          "output_text": "Root cause: stale cache."
        }
      source_claims: [claim-info-output-openai-responses]
    - description: OpenAI Responses streaming — SSE delta versus completed events.
      format: |
        event: response.output_text.delta
        data: {"type":"response.output_text.delta","delta":"Root cause"}

        event: response.output_text.delta
        data: {"type":"response.output_text.delta","delta":": stale cache."}

        event: response.completed
        data: {"type":"response.completed","response":{"id":"resp_01ABC","status":"completed"}}
      source_claims: [claim-info-output-openai-stream]
    - description: Anthropic Messages API — assistant content blocks in final message.
      format: |
        POST https://api.anthropic.com/v1/messages
        =>
        {
          "id": "msg_01XYZ",
          "role": "assistant",
          "content": [
            {"type": "text", "text": "Summary: cache invalidation lag caused the outage."},
            {"type": "tool_use", "id": "toolu_02", "name": "create_ticket", "input": {"severity": "high"}}
          ],
          "stop_reason": "end_turn"
        }
      source_claims: [claim-info-output-anthropic-blocks]
    - description: A2A Artifact — completed output delivered to client after Task finishes.
      format: |
        {
          "taskId": "task-a2a-551",
          "status": {"state": "completed"},
          "artifacts": [
            {
              "artifactId": "artifact-invoice-summary-104",
              "name": "billing-summary.json",
              "parts": [
                {"kind": "data", "data": {"ticket_id": "T-104", "status": "approved", "total_usd": 128.40}}
              ]
            }
          ]
        }
      source_claims: [claim-info-output-a2a-artifact]
  typical_output:
    - description: Moonweave-local disclosure record — audience, window, and ordered dispositions.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "disclosure_activity_id": "disclose/run-204",
          "source_output_id": "output/run-204",
          "audience_id": "actor/customer-support-7",
          "output_window_id": "window/800-char",
          "dispositions": [
            {"kind": "display", "range": "chars:0..479", "artifact_id": "displayed/204/1"},
            {"kind": "suppress", "range": "chars:480..639", "rule_id": "rule/credential-external"},
            {"kind": "truncate", "range": "chars:640..1199", "window_id": "window/800-char"}
          ],
          "coverage_complete": true
        }
      source_claims: [claim-info-output-design]
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] typed items, output_text helper, and SSE stream events for delta and completion.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant message content blocks and streaming content_block_delta events.
    - name: Server-Sent Events (SSE)
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delta chunks versus terminal complete events.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact objects as durable completed outputs delivered to the client.
structure:
  identity_keys: [disclosure_activity_id, disclosure_record_id]
  fields:
    - id: disclosure_activity_id
      labels: {zh: 披露活动标识, en: Disclosure activity identifier, ja: 開示活動識別子}
      definitions:
        zh: 唯一标识一次针对特定受众处理源输出的披露活动，包含选择、截断、抑制或发布阶段。
        en: Uniquely identifies one disclosure activity that processes a source output for a specific audience through selection, truncation, suppression, or publication phases.
        ja: 特定 audience 向けに source output を selection/truncation/suppression/publication 各 phase で処理する一回の disclosure activity を一意識別します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:/-]{3,128}$'
      example_value: disclose/run-204
      allowed_values: []
      source_claims: [claim-info-output-design]
    - id: source_output_id
      labels: {zh: 源输出标识, en: Source output identifier, ja: ソース出力識別子}
      definitions:
        zh: 指向被披露的完整生成结果，例如 OpenAI response.id 对应的 output 集合、Anthropic message.id 的 assistant content，或 A2A Task 关联的 Artifact 集合；不是披露后的可见片段本身。
        en: Reference to the full generated result being disclosed, such as the output set for an OpenAI response.id, assistant content for an Anthropic message.id, or Artifacts linked to an A2A Task—not the post-disclosure visible fragment itself.
        ja: 開示対象の完全生成結果（OpenAI response.id の output 集合、Anthropic message.id assistant content、A2A Task 関連 Artifact 集合など）への参照。開示後 visible fragment 自体ではありません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: output/run-204
      allowed_values: []
      source_claims: [claim-info-output-openai-responses, claim-info-output-a2a-artifact]
    - id: audience_id
      labels: {zh: 受众标识, en: Audience identifier, ja: 受け手識別子}
      definitions:
        zh: 本次披露面向的接收者或接收者类别；不同受众的披露记录不得混用，不能把内部审查视图外推为客户视图。
        en: Recipient or recipient class for this disclosure; disclosure records for different audiences must not be merged, and internal review views must not be extrapolated to customer views.
        ja: 今回開示の受信者または受信者クラス。異なる audience の disclosure record を混在させず、内部 review view を customer view へ外挿してはなりません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: actor/customer-support-7
      allowed_values: []
      source_claims: [claim-info-output-design]
    - id: output_window_id
      labels: {zh: 输出窗口规范标识, en: Output window specification identifier, ja: 出力ウィンドウ仕様識別子}
      definitions:
        zh: 版本化的 OutputWindow 规范 ID，定义字符/token/字节上限或 head-tail 保留策略；输入上下文窗口规范不得与此混淆。
        en: Versioned OutputWindow specification ID defining character, token, or byte limits or head-tail retention policy; input context-window specifications must not be conflated with it.
        ja: 文字/token/byte 上限または head-tail 保持方針を定義する版管理 OutputWindow 仕様 ID。入力 context window 仕様と混同してはなりません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: window/800-char
      allowed_values: []
      source_claims: [claim-info-output-design]
    - id: disposition_kind
      labels: {zh: 处置类型, en: Disposition kind, ja: 処置種別}
      definitions:
        zh: "对源输出某范围的处置类别：display（发布可见）、suppress（规则抑制）、truncate（窗口截断）或 omit（未处理且需显式记录）。"
        en: "Disposition category for a source range—display (published visible), suppress (rule withheld), truncate (window clipped), or omit (unprocessed and explicitly recorded)."
        ja: "source output 範囲への処置 category。display（公開可視）、suppress（rule 抑制）、truncate（window 切詰め）、omit（未処理で明示記録）。"
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: suppress
      allowed_values: [display, suppress, truncate, omit]
      source_claims: [claim-info-output-design]
    - id: source_range
      labels: {zh: 源输出范围, en: Source output range, ja: ソース出力範囲}
      definitions:
        zh: "在源输出坐标系中的有序范围，例如 chars:0..479 或 output[0].content[1].text:12..88；范围必须可闭包核算。"
        en: "Ordered range in the source-output coordinate system, such as chars:0..479 or output[0].content[1].text:12..88; ranges must be closable for accounting."
        ja: "source output 座標系の有序 range（chars:0..479、output[0].content[1].text:12..88 等）。range は closure 可能でなければなりません。"
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: chars:480..639
      allowed_values: []
      source_claims: [claim-info-output-design]
  constraints:
    - id: info-output-audience-must-match-record
      severity: error
      expression_language: plain
      expression: A disclosure record queried for audience A must not be satisfied by a record whose audience_id differs unless an explicit audience-mapping relation exists.
      explanation:
        zh: 受众不一致时，不能把同一输出 ID 或内部记录外推为另一受众实际看见的内容。
        en: With an audience mismatch, a shared output ID or internal record must not be extrapolated into what another audience actually saw.
        ja: audience 不一致時、同一 output ID や内部 record から別 audience が実際に見た内容を外挿してはなりません。
      source_claims: [claim-info-output-design]
    - id: info-output-range-closure
      severity: error
      expression_language: plain
      expression: For a declared source extent, disposition ranges for one audience and disclosure record must be non-overlapping, gap-free, and collectively cover the extent when coverage_complete=true.
      explanation:
        zh: 没有范围闭包，就无法审计“实际显示了什么、未显示什么”。
        en: Without range closure, what was actually shown versus withheld cannot be audited.
        ja: range closure がなければ、実際に表示/非表示だった内容を監査できません。
      source_claims: [claim-info-output-design]
    - id: info-output-stream-delta-not-final
      severity: warning
      expression_language: plain
      expression: Incremental SSE delta fragments must not be registered as final disclosed output until a terminal completed event or non-streaming response is recorded for the same output identity.
      explanation:
        zh: 把流式 delta 直接当作最终交付，会在连接中断时误报已完成披露。
        en: Treating stream deltas as final delivery misreports completed disclosure when the connection drops mid-stream.
        ja: stream delta を最終交付とみなすと、接続中断時に開示完了を誤報します。
      source_claims: [claim-info-output-openai-stream]
  required_relations: []
examples:
  - id: info-output-example-openai-responses-output-items
    labels:
      zh: OpenAI Responses output[] 与 output_text
      en: OpenAI Responses output[] and output_text
      ja: OpenAI Responses output[] と output_text
    descriptions:
      zh: "模型返回 resp_01ABC，status=completed，output[] 含 type=message 的 assistant 内容，output_text 聚合为 \"Root cause: stale cache.\"。披露活动 disclose/run-204 对 actor/customer-support-7 发布 chars:0..31，并记录完整源 output 与可见片段分离。"
      en: "The model returns resp_01ABC with status=completed; output[] contains an assistant type=message item and output_text aggregates to \"Root cause: stale cache.\" Disclosure activity disclose/run-204 publishes chars:0..31 for actor/customer-support-7 while keeping the full source output separate from the visible fragment."
      ja: "モデルが resp_01ABC（status=completed）を返し、output[] に assistant type=message、output_text が \"Root cause: stale cache.\" を集約。disclosure activity disclose/run-204 が actor/customer-support-7 向け chars:0..31 を公開し、完全 source output と visible fragment を分離記録します。"
    example_source:
      product: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses/object
    field_values:
      response_id: resp_01ABC
      output_text: "Root cause: stale cache."
      disclosure_activity_id: disclose/run-204
      audience_id: actor/customer-support-7
      displayed_range: chars:0..31
    related_node_ids: [info-output-disclosure]
    related_relation_ids: []
    source_claims: [claim-info-output-openai-responses]
  - id: info-output-example-openai-sse-stream
    labels:
      zh: OpenAI SSE 流式 delta 与 completed
      en: OpenAI SSE streaming delta and completed
      ja: OpenAI SSE ストリーミング delta と completed
    descriptions:
      zh: "客户端订阅 Responses 流式接口，先后收到 response.output_text.delta（\"Root cause\" 与 \": stale cache.\"）与 response.completed。系统把 delta 记为临时 OutputSegment，仅在 completed 事件到达后创建最终 DisclosureRecord。"
      en: "The client subscribes to Responses streaming and receives response.output_text.delta events (\"Root cause\" and \": stale cache.\") followed by response.completed. The system records deltas as transient OutputSegments and creates a final DisclosureRecord only after the completed event arrives."
      ja: "クライアントが Responses streaming を購読し、response.output_text.delta（\"Root cause\"、\": stale cache.\"）の後 response.completed を受信。delta を一時 OutputSegment として記録し、completed event 到達後のみ最終 DisclosureRecord を作成します。"
    example_source:
      product: OpenAI Responses API streaming
      url: https://platform.openai.com/docs/guides/streaming-responses
    field_values:
      stream_events:
        - type: response.output_text.delta
          delta: Root cause
        - type: response.output_text.delta
          delta: ": stale cache."
        - type: response.completed
          response_id: resp_01ABC
      final_disclosure_record_created: true
    related_node_ids: [info-output-disclosure]
    related_relation_ids: []
    source_claims: [claim-info-output-openai-stream]
  - id: info-output-example-anthropic-assistant-blocks
    labels:
      zh: Anthropic assistant content block 披露
      en: Anthropic assistant content block disclosure
      ja: Anthropic assistant content block 開示
    descriptions:
      zh: "Anthropic 返回 assistant message msg_01XYZ，content[] 含 text block 与 tool_use block。对外部用户只披露 text block 的 chars:0..59；tool_use block 标记为 suppress 并引用内部-only 规则，因为函数调用细节不应展示给终端客户。"
      en: "Anthropic returns assistant message msg_01XYZ whose content[] includes a text block and a tool_use block. Only text block chars:0..59 are disclosed to external users; the tool_use block is marked suppress under an internal-only rule because function-call details must not be shown to end customers."
      ja: "Anthropic が assistant message msg_01XYZ を返し、content[] に text block と tool_use block を含みます。外部 user には text block chars:0..59 のみ開示し、tool_use block は internal-only rule 下で suppress としてマークします。"
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
    field_values:
      message_id: msg_01XYZ
      disclosed_text_range: chars:0..59
      suppressed_block_type: tool_use
      audience_id: actor/customer-external
    related_node_ids: [info-output-disclosure, info-messages-instructions]
    related_relation_ids: []
