source_claims:
  - id: claim-info-output-disclosure-001
    source: eng-proto-mcp-spec
    supports: MCP content annotations can describe intended audience and priority for content, while protocol messages carry concrete content blocks. This supports keeping candidate content and audience metadata explicit before display; MCP does not prove actual publication, so DisclosureActivity phases, DisclosureRecord, and displayed-range identity are Moonweave design inferences.
    locator: "Schema Reference > Annotations: audience and priority; ContentBlock and message content"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-info-output-disclosure-002
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents offloading and summarization replace oversized or older inline content while preserving canonical material for later retrieval. This supports distinguishing selected visible fragments from preserved but currently undisclosed content; external-audience publication, policy suppression, and disclosure records remain Moonweave-specific concepts.
    locator: Context engineering > Offloading; Summarization; Filesystem preservation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-info-output-disclosure-003
    source: eng-proto-mcp-spec
    supports: MCP Tool Result content may carry optional audience and priority annotations, but the protocol does not define actual UI delivery, source-range accounting, or Moonweave DisclosureRecord. The three disposition ranges and coverage requirement in this example are a Moonweave design inference over that explicit audience metadata.
    locator: Server Features > Tools > Data Types > Tool Result > content annotations (audience and priority)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-output-disclosure-004
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents documents replacing an oversized tool result with a file reference and a preview of its first ten lines while preserving the original externally. It does not define disclosure audiences or suppression decisions; Moonweave design inference records visible, suppressed, and truncated ranges separately instead of equating a preview with the source result.
    locator: Context compression > Offloading > tool call results exceed 20,000 tokens
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-output-disclosure-005
    source: eng-proto-mcp-spec
    supports: MCP defines optional audience annotations on content but does not state that content for one audience was displayed to another. Moonweave does not infer cross-audience delivery and, as a design inference, also requires a disposition for every considered source range.
    locator: Server Features > Tools > Data Types > Tool Result > content annotations (audience and priority)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-output-disclosure-006
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents explicitly distinguishes a retained preview from the preserved original when offloading oversized results. It does not define Moonweave range closure; Moonweave does not infer the missing middle range from the existence of the original file or the two recorded fragments.
    locator: Context compression > Offloading > tool call results exceed 20,000 tokens
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-output-disclosure-007
    source: eng-proto-mcp-spec
    supports: MCP Tool Result defines content items and optional metadata but does not define a head-tail window, immutable ContextPackage, or truncation offsets. Moonweave design inference therefore treats protocol content as the referenced source and records window revision and ranges in separate ontology objects.
    locator: Server Features > Tools > Data Types > Tool Result and Structured Content
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-output-disclosure-008
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents directly documents replacing oversized in-context tool content with a preview and a filesystem pointer while retaining the original. It does not prescribe Moonweave head-tail coordinates; source immutability plus a separately versioned OutputWindow is a Moonweave design inference that makes this selection auditable.
    locator: Context compression > Offloading > original preservation and first-ten-line preview
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
