  - id: info-output-example-a2a-artifact-delivery
    labels:
      zh: A2A Artifact 完成交付
      en: A2A Artifact completed delivery
      ja: A2A Artifact 完了交付
    descriptions:
      zh: Task task-a2a-551 完成后，billing_agent 返回 Artifact artifact-invoice-summary-104（billing-summary.json，kind=data part）。协调者把 Artifact 作为 disclose/artifact-104 的源输出，向 actor/partner-api-3 完整发布 data part，而 history 中的 transient text Part 不作为最终交付证据。
      en: After task-a2a-551 completes, billing_agent returns Artifact artifact-invoice-summary-104 (billing-summary.json with a kind=data part). The coordinator treats the Artifact as the source output for disclose/artifact-104 and fully publishes the data part to actor/partner-api-3 while transient text Parts in history are not proof of final delivery.
      ja: task-a2a-551 完了後、billing_agent が Artifact artifact-invoice-summary-104（billing-summary.json、kind=data part）を返します。調整者は Artifact を disclose/artifact-104 の source output とし、actor/partner-api-3 へ data part を完全公開。history の transient text Part は最終交付証拠になりません。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
    field_values:
      task_id: task-a2a-551
      artifact_id: artifact-invoice-summary-104
      audience_id: actor/partner-api-3
      disposition_kind: display
      coverage_complete: true
