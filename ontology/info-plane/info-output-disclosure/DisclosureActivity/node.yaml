schema: moonweave.ai/ontology-node/v1
id: DisclosureActivity
kind: concept
labels:
  zh: 输出披露活动
  en: output disclosure activity
  ja: 出力開示活動
semantics:
  short_definition:
    zh: 面向特定受众处理已生成源输出的有时限披露活动根。
    en: Time-bounded root activity processing already-generated source output for a specific audience.
    ja: 特定 audience 向けに生成済 source output を処理する time-bounded activity root。
  definition:
    zh: DisclosureActivity 以 disclosure_activity_id、source_output_id、audience_id 与状态标识一次完整披露处理；子类执行选择、截断、抑制或发布并生成 DisclosureRecord。它发生在 OpenAI response.completed、Anthropic 最终 assistant message 或 A2A Task Artifact 交付之后，不拥有安全规则或输入 ContextPackage 组装。
    en: DisclosureActivity is identified by disclosure_activity_id, source_output_id, audience_id, and status for one disclosure run. Subtypes perform selection, truncation, suppression, or publication and emit DisclosureRecord. It occurs after OpenAI response.completed, Anthropic final assistant message, or A2A Task Artifact delivery—not owning safety rules or input ContextPackage assembly.
    ja: DisclosureActivity は生成後 output を audience 向けに処理する activity root。
  why_needed:
    zh: 把处理活动与决定、内容和记录分开，才能重建“依据什么决定、执行了什么、最终显示了什么”。
    en: Separating processing activity from decision, content, and record makes it possible to reconstruct what was decided, what was done, and what was actually shown.
    ja: processing activity を decision/content/record と分けることで decision・execution・actual display を再構成できます。
  includes:
    - zh: 面向用户、智能体或下游系统的一次输出选择、裁剪、隐藏或发布处理。
      en: One output-selection, clipping, withholding, or publication operation for a user, agent, or downstream system.
      ja: user/agent/downstream system 向け one output selection・clip・withhold・publication operation。
  excludes:
    - zh: 模型生成本身、长期披露规则、输出字节片段和只描述长度上限的窗口规范。
      en: The model generation itself, durable disclosure rules, output byte ranges, and window specifications that only state limits.
      ja: model generation 自体・durable disclosure rule・output byte range・limit のみの window specification。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: OpenAI Responses 完成态 response.output[] 是 source_output；Anthropic assistant content[] 是源；A2A artifacts[] 是 durable 源。DisclosureActivity 链式记录 disposition，coverage_complete 要求范围闭包。
    en: OpenAI Responses completed response.output[] is source output; Anthropic assistant content[] is source; A2A artifacts[] are durable sources. DisclosureActivity chains dispositions; coverage_complete requires range closure.
    ja: OpenAI/Anthropic/A2A 完成 output を source_output として処理。
  typical_input:
    - description: Disclosure activity start
      format: '{"disclosure_activity_id":"disclose/run-204","source_output_id":"output/run-204","audience_id":"actor/customer-support-7","status":"running"}'
      source_claims:
        - claim-disclosure-design
  typical_output:
    - description: Completed disclosure record
      format: '{"disclosure_activity_id":"disclose/run-204","status":"completed","coverage_complete":true}'
      source_claims:
        - claim-disclosure-design
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys:
    - disclosure_activity_id
  fields:
    - id: disclosure_activity_id
      labels:
        zh: 披露活动标识
        en: disclosure activity ID
        ja: disclosure activity ID
      definitions:
        zh: 稳定标识一次披露处理活动。
        en: Stably identifies one disclosure-processing activity.
        ja: one disclosure-processing activity を stable に識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: disclosure-884
      allowed_values: []
      source_claims:
        - claim-disclosure-activity-001
    - id: source_output_ref
      labels:
        zh: 来源输出引用
        en: source-output reference
        ja: source-output reference
      definitions:
        zh: 引用被处理的 OutputStream、OutputSegment 或 OutputInformation。
        en: References the OutputStream, OutputSegment, or OutputInformation being processed.
        ja: 処理対象 OutputStream/OutputSegment/OutputInformation を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-stream-41
      allowed_values: []
      source_claims:
        - claim-disclosure-activity-002
        - claim-disclosure-activity-001
    - id: audience_ref
      labels:
        zh: 受众引用
        en: audience reference
        ja: audience reference
      definitions:
        zh: 引用允许看到结果的 Actor 或受众组。
        en: References the Actor or audience group allowed to see the result.
        ja: result を見られる Actor/audience group を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: user-7
      allowed_values: []
      source_claims:
        - claim-disclosure-activity-003
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      definitions:
        zh: 记录活动开始处理输出的时间。
        en: Records when output processing began.
        ja: output processing 開始時刻を記録します。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:00Z
      allowed_values: []
      source_claims:
        - claim-disclosure-activity-001
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: ended at
      definitions:
        zh: 记录活动完成或终止的时间。
        en: Records when the activity completed or terminated.
        ja: activity 完了/終了時刻を記録します。
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:01Z
      allowed_values: []
      source_claims:
        - claim-disclosure-activity-001
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: activity status
      definitions:
        zh: 记录 planned、running、completed 或 failed。
        en: Records planned, running, completed, or failed.
        ja: planned・running・completed・failed を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: completed
      allowed_values: []
      source_claims:
        - claim-disclosure-activity-001
  constraints: []
  required_relations: []
examples:
  - id: DisclosureActivity-example-openai-response
    labels:
      zh: OpenAI 响应披露
      en: OpenAI response disclosure
      ja: OpenAI response 開示
    descriptions:
      zh: disclose/run-204 处理 resp_01ABC output[] 对 actor/customer-support-7 发布 assistant 文本。
      en: disclose/run-204 processes resp_01ABC output[] to publish assistant text to actor/customer-support-7.
      ja: OpenAI response 開示 activity。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/responses
      version: completed response
    field_values:
      disclosure_activity_id: disclose/run-204
      source_output_id: resp_01ABC
    related_node_ids:
      - DisclosureActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-openai
  - id: DisclosureActivity-example-a2a-artifact
    labels:
      zh: A2A Artifact 披露
      en: A2A Artifact disclosure
      ja: A2A Artifact 開示
    descriptions:
      zh: disclose/artifact-104 以 Task artifact-invoice-summary-104 为源向 partner API 完整发布。
      en: disclose/artifact-104 uses Task artifact-invoice-summary-104 as source and fully publishes to partner API.
      ja: A2A Artifact 開示。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Artifact delivery
    field_values:
      disclosure_activity_id: disclose/artifact-104
    related_node_ids:
      - DisclosureActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-a2a
  - id: DisclosureActivity-example-not-generation
    labels:
      zh: 非模型生成
      en: Not model generation
      ja: model generation ではない
    descriptions:
      zh: 进行中的 ModelCall 没有 completed 源输出，不得启动 DisclosureActivity。
      en: In-flight ModelCall lacks completed source output and must not start DisclosureActivity.
      ja: completed source 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DisclosureActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-design
parent_relation: null
relations:
  - id: DisclosureActivity-governed_by-ProgressiveDisclosure
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 输出披露活动受渐进披露策略治理
      en: output disclosure activity is governed by progressive disclosure
      ja: 出力開示活動は段階的開示方針に統治される
    definitions:
      zh: 该关系表明一次披露活动执行 ProgressiveDisclosure 所声明的逐步展示、最小必要范围与受众适配原则，但策略本身不执行活动。
      en: This relation states that a disclosure activity executes ProgressiveDisclosure principles for staged display, minimum necessary extent, and audience fit; the policy itself does not perform the activity.
      ja: 開示活動が ProgressiveDisclosure の staged display・minimum necessary extent・audience fit 原則を実行し、policy 自体は活動を実行しないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_governed_by
      labels:
        zh: 反向读取：输出披露活动受渐进披露策略治理
        en: inverse reading of output disclosure activity is governed by progressive disclosure
        ja: 出力開示活動は段階的開示方針に統治されるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureActivity-governed_by-ProgressiveDisclosure-example-positive-manual-20260716
        labels:
          zh: 确认输出披露活动受渐进披露策略治理
          en: Confirm output disclosure activity is governed by progressive disclosure
          ja: 出力開示活動は段階的開示方針に統治されるを確認
        descriptions:
          zh: disclosure-884 先显示摘要，再按 user-7 请求发布受控详情，并保留每步记录。
          en: disclosure-884 shows a summary first, releases controlled detail on user-7's request, and records each step.
          ja: disclosure-884 は summary を先に表示し user-7 の要求で controlled detail を公開し各段階を記録します。
        field_values: {}
        related_node_ids:
          - DisclosureActivity
          - ProgressiveDisclosure
        related_relation_ids:
          - DisclosureActivity-governed_by-ProgressiveDisclosure
        source_claims:
          - claim-disclosure-activity-004
          - claim-disclosure-activity-003
      - id: DisclosureActivity-governed_by-ProgressiveDisclosure-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判输出披露活动受渐进披露策略治理
          en: Reject a false output disclosure activity is governed by progressive disclosure
          ja: 出力開示活動は段階的開示方針に統治されるの誤判定を拒否
        descriptions:
          zh: progressive-policy-2 仅存在于配置库，disclosure-885 未读取其版本或执行其步骤。
          en: progressive-policy-2 exists in configuration, but disclosure-885 neither reads its revision nor follows its stages.
          ja: progressive-policy-2 は設定にありますが disclosure-885 は版を読まず段階も実行しません。
        field_values: {}
        related_node_ids:
          - DisclosureActivity
          - ProgressiveDisclosure
        related_relation_ids:
          - DisclosureActivity-governed_by-ProgressiveDisclosure
        source_claims:
          - claim-disclosure-activity-004
          - claim-disclosure-activity-003
    source_claims:
      - claim-disclosure-activity-004
      - claim-disclosure-activity-003
    layout_role: cross-link
    target: concept:ProgressiveDisclosure
  - id: DisclosureActivity-processes-OutputSegment
    predicate: processes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 输出披露活动处理输出片段
      en: output disclosure activity processes an output segment
      ja: 出力開示活動が出力区間を処理する
    definitions:
      zh: 该关系识别一次披露活动实际读取并按受众决定处理的来源 OutputSegment；活动不拥有或修改该来源片段的运行产物身份。
      en: This relation identifies the source OutputSegment actually read and dispositioned for an audience by a disclosure activity; the activity neither owns nor mutates the segment's runtime identity.
      ja: 開示活動が実際に読み受け手向け処置を行う source OutputSegment を示し、活動がその runtime identity を所有・変更するとはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_processes
      labels:
        zh: 反向读取：输出披露活动处理输出片段
        en: inverse reading of output disclosure activity processes an output segment
        ja: 出力開示活動が出力区間を処理するの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureActivity-processes-OutputSegment-example-positive-manual-20260716
        labels:
          zh: 确认输出披露活动处理输出片段
          en: Confirm output disclosure activity processes an output segment
          ja: 出力開示活動が出力区間を処理するを確認
        descriptions:
          zh: disclosure-884 的 source_output_ref 为 output-segment-41，三个处置范围均落在该片段内。
          en: disclosure-884 has source_output_ref output-segment-41, and all three disposition extents fall within that segment.
          ja: disclosure-884 の source_output_ref は output-segment-41 で三処置範囲がすべてその区間内です。
        field_values: {}
        related_node_ids:
          - DisclosureActivity
          - OutputSegment
        related_relation_ids:
          - DisclosureActivity-processes-OutputSegment
        source_claims:
          - claim-disclosure-activity-001
          - claim-disclosure-activity-002
      - id: DisclosureActivity-processes-OutputSegment-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判输出披露活动处理输出片段
          en: Reject a false output disclosure activity processes an output segment
          ja: 出力開示活動が出力区間を処理するの誤判定を拒否
        descriptions:
          zh: output-segment-42 仅与片段 41 属于同一 OutputStream，但本活动没有读取它。
          en: output-segment-42 merely shares an OutputStream with segment 41 and was not read by this activity.
          ja: output-segment-42 は segment 41 と同じ OutputStream に属するだけで本活動は読みません。
        field_values: {}
        related_node_ids:
          - DisclosureActivity
          - OutputSegment
        related_relation_ids:
          - DisclosureActivity-processes-OutputSegment
        source_claims:
          - claim-disclosure-activity-001
          - claim-disclosure-activity-002
    source_claims:
      - claim-disclosure-activity-001
      - claim-disclosure-activity-002
    layout_role: cross-link
    target: concept:OutputSegment
sources:
  - id: src-openai-responses
    title: OpenAI Responses API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/responses
    source_type: official-doc
    relevance: response.output[] typed items and output_text aggregation.
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Assistant content blocks and streaming content_block_delta.
  - id: src-a2a-artifact
    title: A2A Protocol Specification
    publisher: A2A Protocol
    url: https://a2a-protocol.org/latest/specification/
    source_type: standard
    relevance: Artifact objects as durable task outputs.
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
source_claims:
  - id: claim-disclosure-activity-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-activity-002
    source: eng-fw-openai-tracing
    supports: OpenAI Agents SDK tracing distinguishes a generation span's model input and output from the surrounding trace and allows sensitive input or output capture to be disabled. Moonweave therefore models source output, disclosure processing, and audience-visible disposition as separate facts.
    locator: OpenAI Agents SDK Tracing documentation, Traces and spans plus Sensitive data sections
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-activity-003
    source: eng-security-nist-abac
    supports: NIST SP 800-162 evaluates subject, object, requested operation, environment, policy, and rules to compute an authorization decision. Moonweave uses the same separation when an audience, output object, display operation, and environment determine whether output is published, truncated, or suppressed.
    locator: NIST SP 800-162 Sections 2.1-2.3 and Figure 2, basic ABAC scenario
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-activity-004
    source: eng-policy-opa
    supports: OPA decision logs distinguish policy query input, result, decision identifier, requester, timestamp, and erased or masked fields. Moonweave uses that evidence to keep a disclosure selection decision separate from the disclosure activity and from the record of what was finally displayed.
    locator: Open Policy Agent documentation, Management > Decision Logs, event fields and masking
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-openai
    source: src-openai-responses
    supports: DisclosureActivity processes completed OpenAI Responses output as source.
    locator: response.completed
    evidence_kind: primary-api
    confidence: high
  - id: claim-disclosure-a2a
    source: src-a2a-artifact
    supports: A2A Artifacts provide durable source outputs for disclosure activities.
    locator: Artifact
    evidence_kind: primary-spec
    confidence: high
  - id: claim-disclosure-design
    source: src-info-output-design
    supports: DisclosureActivity records post-generation audience processing distinct from generation itself.
    locator: DisclosureActivity boundary
    evidence_kind: design-inference
    confidence: high
