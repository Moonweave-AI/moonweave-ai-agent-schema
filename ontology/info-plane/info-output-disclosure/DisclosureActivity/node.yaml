schema: moonweave.ai/ontology-node/v1
id: DisclosureActivity
kind: concept
status: review
labels:
  zh: 输出披露活动
  en: output disclosure activity
  ja: 出力開示活動
semantics:
  short_definition:
    zh: 针对一个受众，把运行输出选择、截断、抑制或发布的一次有时限处理活动。
    en: A time-bounded activity that selects, truncates, suppresses, or publishes runtime output for one audience.
    ja: one audience に対し runtime output を select・truncate・suppress・publish する time-bounded activity。
  definition:
    zh: 输出披露活动是一种处理活动，以活动标识、来源输出、目标受众、开始/结束时间和状态为身份；它根据披露决定执行选择、截断、抑制或发布，并生成可审计的 DisclosureRecord。它不是输出内容、策略规则、选择决定或展示窗口规范。
    en: A DisclosureActivity is a processing activity identified by activity ID, source output, target audience, start and end time, and status. It carries out selection, truncation, suppression, or publication under a disclosure decision and generates an auditable DisclosureRecord. It is not output content, a policy rule, a selection decision, or a display-window specification.
    ja: DisclosureActivity は activity ID・source output・target audience・start/end time・status で識別する processing activity で disclosure decision に基づき selection/truncation/suppression/publication を実行し DisclosureRecord を生成します。output content・policy rule・decision・window specification ではありません。
  why_needed:
    zh: 把处理活动与决定、内容和记录分开，才能重建“依据什么决定、执行了什么、最终显示了什么”。
    en: Separating processing activity from decision, content, and record makes it possible to reconstruct what was decided, what was done, and what was actually shown.
    ja: processing activity を decision/content/record と分けることで decision・execution・actual display を再構成できます。
  includes:
    - zh: 面向用户、智能体或下游系统的一次输出选择、裁剪、隐藏或发布处理。
      en: One output-selection, clipping, withholding, or publication operation for a user, agent, or downstream system.
      ja: user/agent/downstream system 向け one output selection・clip・withhold・publication operation。
  excludes:
    - zh: 模型生成本身、长期披露规则、输出字节片段和只描述长度上限的窗口规范。
      en: The model generation itself, durable disclosure rules, output byte ranges, and window specifications that only state limits.
      ja: model generation 自体・durable disclosure rule・output byte range・limit のみの window specification。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - disclosure_activity_id
  fields:
    - id: disclosure_activity_id
      labels:
        zh: 披露活动标识
        en: disclosure activity ID
        ja: disclosure activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次披露处理活动。
        en: Stably identifies one disclosure-processing activity.
        ja: one disclosure-processing activity を stable に識別します。
      allowed_values: []
      pattern: null
      example_value: disclosure-884
      source_claims:
        - claim-disclosure-activity-001
    - id: source_output_ref
      labels:
        zh: 来源输出引用
        en: source-output reference
        ja: source-output reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被处理的 OutputStream、OutputSegment 或 OutputInformation。
        en: References the OutputStream, OutputSegment, or OutputInformation being processed.
        ja: 処理対象 OutputStream/OutputSegment/OutputInformation を参照します。
      allowed_values: []
      pattern: null
      example_value: output-stream-41
      source_claims:
        - claim-disclosure-activity-002
        - claim-disclosure-activity-001
    - id: audience_ref
      labels:
        zh: 受众引用
        en: audience reference
        ja: audience reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用允许看到结果的 Actor 或受众组。
        en: References the Actor or audience group allowed to see the result.
        ja: result を見られる Actor/audience group を参照します。
      allowed_values: []
      pattern: null
      example_value: user-7
      source_claims:
        - claim-disclosure-activity-003
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动开始处理输出的时间。
        en: Records when output processing began.
        ja: output processing 開始時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:00Z
      source_claims:
        - claim-disclosure-activity-001
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: ended at
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录活动完成或终止的时间。
        en: Records when the activity completed or terminated.
        ja: activity 完了/終了時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:01Z
      source_claims:
        - claim-disclosure-activity-001
    - id: status
      labels:
        zh: 活动状态
        en: activity status
        ja: activity status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 planned、running、completed 或 failed。
        en: Records planned, running, completed, or failed.
        ja: planned・running・completed・failed を記録します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-disclosure-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 向用户披露工具结果
      en: Disclose a tool result to a user
      ja: tool result を user に開示
    scenario_id: null
    descriptions:
      zh: disclosure-884 读取 output-stream-41，面向 user-7 执行选择与脱敏后发布，并在一秒内完成。
      en: disclosure-884 reads output-stream-41, selects and redacts it for user-7, then publishes the result and completes within one second.
      ja: disclosure-884 は output-stream-41 を読み user-7 向け select/redact/publish して一秒以内に完了します。
    field_values:
      disclosure_activity_id: disclosure-884
      source_output_ref: output-stream-41
      audience_ref: user-7
      started_at: 2026-07-16T04:00:00Z
      ended_at: 2026-07-16T04:00:01Z
      status: completed
    related_node_ids:
      - DisclosureActivity
      - DisclosureRecord
    related_relation_ids:
      - DisclosureActivity-produces-DisclosureRecord
    expected_result:
      zh: 建立一次 DisclosureActivity 并生成独立披露记录。
      en: Create one DisclosureActivity and a separate disclosure record.
      ja: one DisclosureActivity と separate record を作成します。
    why_valid_or_invalid:
      zh: 具有可识别输入、受众、时间范围、执行结果和记录。
      en: It has identifiable input, audience, time interval, execution result, and record.
      ja: identifiable input・audience・time interval・result・record を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-activity-001
      - claim-disclosure-activity-002
  - id: DisclosureActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 静态披露规则
      en: Static disclosure rule
      ja: static disclosure rule
    scenario_id: output-disclosure-disclosureactivity-boundary
    descriptions:
      zh: 一条配置写着“隐藏访问令牌”，但没有活动标识、来源输出、目标受众或执行时间。
      en: A configuration says “hide access tokens” but has no activity ID, source output, target audience, or execution time.
      ja: configuration は access token を隠すと記述しますが activity ID・source output・audience・execution time がありません。
    field_values: {}
    related_node_ids:
      - DisclosureRule
      - DisclosureActivity
    related_relation_ids: []
    expected_result:
      zh: 保留为 DisclosureRule，不创建 DisclosureActivity。
      en: Keep it as a DisclosureRule and do not create a DisclosureActivity.
      ja: DisclosureRule として保持し DisclosureActivity を作りません。
    why_valid_or_invalid:
      zh: 规范意图不等于一次已经发生的处理活动。
      en: A normative intention is not an occurred processing activity.
      ja: normative intention は occurred processing activity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-activity-003
      - claim-disclosure-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: DisclosureActivity-governed_by-ProgressiveDisclosure
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 输出披露活动受渐进披露策略治理
      en: output disclosure activity is governed by progressive disclosure
      ja: 出力開示活動は段階的開示方針に統治される
    definitions:
      zh: 该关系表明一次披露活动执行 ProgressiveDisclosure 所声明的逐步展示、最小必要范围与受众适配原则，但策略本身不执行活动。
      en: This relation states that a disclosure activity executes ProgressiveDisclosure principles for staged display, minimum necessary extent, and audience fit; the policy itself does not perform the activity.
      ja: 開示活動が ProgressiveDisclosure の staged display・minimum necessary extent・audience fit 原則を実行し、policy 自体は活動を実行しないことを表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_governed_by
      labels:
        zh: 反向读取：输出披露活动受渐进披露策略治理
        en: inverse reading of output disclosure activity is governed by progressive disclosure
        ja: 出力開示活動は段階的開示方針に統治されるの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureActivity-governed_by-ProgressiveDisclosure-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 确认输出披露活动受渐进披露策略治理
          en: Confirm output disclosure activity is governed by progressive disclosure
          ja: 出力開示活動は段階的開示方針に統治されるを確認
        scenario_id: output-disclosure-disclosureactivity-governed_by-progressivedisclosure-positive
        descriptions:
          zh: disclosure-884 先显示摘要，再按 user-7 请求发布受控详情，并保留每步记录。
          en: disclosure-884 shows a summary first, releases controlled detail on user-7's request, and records each step.
          ja: disclosure-884 は summary を先に表示し user-7 の要求で controlled detail を公開し各段階を記録します。
        field_values: {}
        related_node_ids:
          - DisclosureActivity
          - ProgressiveDisclosure
        related_relation_ids:
          - DisclosureActivity-governed_by-ProgressiveDisclosure
        expected_result:
          zh: 记录 disclosure-884 governed_by progressive-policy-2。
          en: Record that disclosure-884 is governed_by progressive-policy-2.
          ja: disclosure-884 governed_by progressive-policy-2 を記録します。
        why_valid_or_invalid:
          zh: 活动步骤明确实施同一策略版本的渐进与最小披露约束。
          en: Activity steps explicitly implement staged and minimum-disclosure constraints from the same policy revision.
          ja: activity step が同一 policy revision の staged/minimum disclosure 制約を実施します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-disclosure-activity-004
          - claim-disclosure-activity-003
      - id: DisclosureActivity-governed_by-ProgressiveDisclosure-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 拒绝误判输出披露活动受渐进披露策略治理
          en: Reject a false output disclosure activity is governed by progressive disclosure
          ja: 出力開示活動は段階的開示方針に統治されるの誤判定を拒否
        scenario_id: output-disclosure-disclosureactivity-governed_by-progressivedisclosure-boundary
        descriptions:
          zh: progressive-policy-2 仅存在于配置库，disclosure-885 未读取其版本或执行其步骤。
          en: progressive-policy-2 exists in configuration, but disclosure-885 neither reads its revision nor follows its stages.
          ja: progressive-policy-2 は設定にありますが disclosure-885 は版を読まず段階も実行しません。
        field_values: {}
        related_node_ids:
          - DisclosureActivity
          - ProgressiveDisclosure
        related_relation_ids:
          - DisclosureActivity-governed_by-ProgressiveDisclosure
        expected_result:
          zh: 不得仅凭策略可用性建立 governed_by 关系。
          en: Do not create governed_by merely because the policy is available.
          ja: policy が利用可能なだけで governed_by を作りません。
        why_valid_or_invalid:
          zh: 治理关系需要活动实际采用该策略版本的证据。
          en: The governance relation requires evidence that the activity actually adopted that policy revision.
          ja: governance relation は activity がその policy revision を実際に採用した証拠を要します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-disclosure-activity-004
          - claim-disclosure-activity-003
    source_claims:
      - claim-disclosure-activity-004
      - claim-disclosure-activity-003
    distinct_fact_rationale:
      zh: 本关系只表达所列源端到目标端的具体事实，不把相邻节点、共享受众或时间接近自动推成该事实。
      en: This relation states only the listed source-to-target fact; adjacent nodes, a shared audience, or temporal proximity do not imply it.
      ja: この relation は列挙した source-to-target 事実だけを表し、隣接 node・shared audience・time proximity から自動推論しません。
    layout_role: cross-link
    review_status: pending
    target: concept:ProgressiveDisclosure
