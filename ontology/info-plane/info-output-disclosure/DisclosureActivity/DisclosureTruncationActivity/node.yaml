schema: moonweave.ai/ontology-node/v1
id: DisclosureTruncationActivity
kind: concept
status: accepted
labels:
  zh: 披露截断活动
  en: disclosure truncation activity
  ja: 開示切詰め活動
semantics:
  short_definition:
    zh: 按照已选输出窗口保留部分范围并记录省略范围的披露活动。
    en: A disclosure activity that retains ranges under a selected output window and records omitted ranges.
    ja: selected output window に従い range を保持し omitted range を記録する disclosure activity。
  definition:
    zh: 披露截断活动是 DisclosureActivity 的子类，其种差是应用一份已选 OutputWindow，把来源输出分成保留范围与 TruncatedContextSpan，并保持可回溯偏移；它不是直接丢弃原始输出，也不是安全抑制。
    en: A DisclosureTruncationActivity is a DisclosureActivity distinguished by applying a selected OutputWindow, dividing source output into retained ranges and TruncatedContextSpan records while preserving traceable offsets. It neither deletes the original output nor constitutes safety suppression.
    ja: DisclosureTruncationActivity は selected OutputWindow を apply し source output を retained range と TruncatedContextSpan に分け traceable offset を保持する subtype です。original output deletion や safety suppression ではありません。
  why_needed:
    zh: 独立记录截断活动可以区分容量裁剪与策略抑制，并验证实际窗口。
    en: Recording truncation separately distinguishes capacity clipping from policy suppression and makes the applied window verifiable.
    ja: truncation を別記録し capacity clipping と policy suppression を区別して actual window を検証できます。
  includes:
    - zh: 按行、字节、字符或记录上限应用 head、tail、head-tail 或连续范围窗口。
      en: Applying head, tail, head-tail, or contiguous-range windows measured in lines, bytes, characters, or records.
      ja: line・byte・character・record 単位 head/tail/head-tail/contiguous window application。
  excludes:
    - zh: 因隐私或权限规则完全隐藏内容，以及修改原始持久输出。
      en: Completely withholding content for privacy or authorization and modifying the persisted source output.
      ja: privacy/authorization による complete withholding と persisted source output modification。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: applied_window_ref
      labels:
        zh: 应用窗口引用
        en: applied-window reference
        ja: applied-window reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次实际执行的 OutputWindow 版本。
        en: References the OutputWindow revision actually applied.
        ja: 実際に apply した OutputWindow revision を参照します。
      allowed_values: []
      pattern: null
      example_value: output-window-9@2
      source_claims:
        - claim-disclosure-truncation-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureTruncationActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 保留首尾日志
      en: Retain log head and tail
      ja: log head/tail を保持
    scenario_id: null
    descriptions:
      zh: truncate-884 对 2,000 行日志应用 output-window-9@2，保留首 80 行和末 40 行并记录中间省略范围。
      en: truncate-884 applies output-window-9@2 to a 2,000-line log, retaining the first eighty and last forty lines and recording the omitted middle range.
      ja: truncate-884 は 2,000-line log に window を apply し first 80/last 40 lines を保持して middle omitted range を記録します。
    field_values:
      applied_window_ref: output-window-9@2
      disclosure_activity_id: truncate-884
      source_output_ref: output-41
      audience_ref: user-7
      started_at: 2026-07-16T04:00:00Z
      status: completed
    related_node_ids:
      - DisclosureTruncationActivity
      - OutputWindow
      - TruncatedContextSpan
    related_relation_ids:
      - DisclosureTruncationActivity-applies-OutputWindow
      - DisclosureTruncationActivity-produces-TruncatedContextSpan
    expected_result:
      zh: 建立截断活动和可寻址省略范围。
      en: Create the truncation activity and an addressable omitted range.
      ja: truncation activity と addressable omitted range を作成します。
    why_valid_or_invalid:
      zh: 窗口版本、原始范围、保留范围和省略范围均可核验。
      en: Window revision, original extent, retained extent, and omitted extent are verifiable.
      ja: window revision・original/retained/omitted extent を検証できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-truncation-activity-001
      - claim-disclosure-truncation-activity-002
  - id: DisclosureTruncationActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 敏感令牌被隐藏
      en: Sensitive token withheld
      ja: sensitive token withheld
    scenario_id: output-disclosure-disclosuretruncationactivity-boundary
    descriptions:
      zh: 一段访问令牌即使很短也因 DisclosureRule 被完全隐藏，没有容量窗口或保留范围。
      en: An access token is withheld in full under a DisclosureRule despite being short; no capacity window or retained range applies.
      ja: short access token が DisclosureRule により完全 withheld され capacity window/retained range はありません。
    field_values: {}
    related_node_ids:
      - DisclosureSuppressionActivity
      - DisclosureTruncationActivity
    related_relation_ids: []
    expected_result:
      zh: 分类为披露抑制，不分类为截断。
      en: Classify it as disclosure suppression, not truncation.
      ja: disclosure suppression とし truncation にはしません。
    why_valid_or_invalid:
      zh: 种差是策略禁止披露，而不是窗口容量。
      en: The differentia is a policy prohibition, not window capacity.
      ja: differentia は policy prohibition で window capacity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-truncation-activity-003
      - claim-disclosure-truncation-activity-001
external_mappings: []
applicability:
