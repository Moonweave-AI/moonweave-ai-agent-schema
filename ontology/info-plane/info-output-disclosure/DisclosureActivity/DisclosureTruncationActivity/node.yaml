schema: moonweave.ai/ontology-node/v1
id: DisclosureTruncationActivity
kind: concept
labels:
  zh: 披露截断活动
  en: disclosure truncation activity
  ja: 開示切詰め活動
semantics:
  short_definition:
    zh: 按 OutputWindow 规范截断源输出可保留范围的披露活动。
    en: Disclosure activity truncating retainable source ranges per OutputWindow specification.
    ja: OutputWindow 仕様に従い source range を truncate する disclosure activity。
  definition:
    zh: DisclosureTruncationActivity 应用 HeadTailWindow 或容量上限，产生 TruncatedContextSpan 记录被窗口切掉的范围；对应 OpenAI 流式聚合前只保留前 N 字符或 Anthropic 长回复裁剪。
    en: DisclosureTruncationActivity applies HeadTailWindow or capacity limits, producing TruncatedContextSpan for clipped ranges—like keeping first N characters before OpenAI stream aggregation or clipping long Anthropic replies.
    ja: DisclosureTruncationActivity は TruncatedContextSpan を生成。
  why_needed:
    zh: 独立记录截断活动可以区分容量裁剪与策略抑制，并验证实际窗口。
    en: Recording truncation separately distinguishes capacity clipping from policy suppression and makes the applied window verifiable.
    ja: truncation を別記録し capacity clipping と policy suppression を区別して actual window を検証できます。
  includes:
    - zh: 按行、字节、字符或记录上限应用 head、tail、head-tail 或连续范围窗口。
      en: Applying head, tail, head-tail, or contiguous-range windows measured in lines, bytes, characters, or records.
      ja: line・byte・character・record 単位 head/tail/head-tail/contiguous window application。
  excludes:
    - zh: 因隐私或权限规则完全隐藏内容，以及修改原始持久输出。
      en: Completely withholding content for privacy or authorization and modifying the persisted source output.
      ja: privacy/authorization による complete withholding と persisted source output modification。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: window/800-char 等对 chars:640..1199 执行 truncate；必须与 selection 范围闭包一致。
    en: window/800-char truncates chars:640..1199; must align with selection range closure.
    ja: truncate range は closure と一致。
  typical_input:
    - description: Truncation activity
      format: '{"disclosure_activity_id":"disclose-trunc-204","output_window_id":"window/800-char","source_range":"chars:640..1199"}'
      source_claims:
        - claim-disclosure-trunc-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: applied_window_ref
      labels:
        zh: 应用窗口引用
        en: applied-window reference
        ja: applied-window reference
      definitions:
        zh: 引用本次实际执行的 OutputWindow 版本。
        en: References the OutputWindow revision actually applied.
        ja: 実際に apply した OutputWindow revision を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-window-9@2
      allowed_values: []
      source_claims:
        - claim-disclosure-truncation-activity-001
  constraints: []
  required_relations: []
examples:
  - id: DisclosureTruncationActivity-example-char-window
    labels:
      zh: 字符窗口截断
      en: Character window truncation
      ja: 文字 window truncate
    descriptions:
      zh: 800 字符窗口截断 chars:640..1199 并记录 TruncatedContextSpan。
      en: 800-char window truncates chars:640..1199 and records TruncatedContextSpan.
      ja: char window truncate。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: char window
    field_values: {}
    related_node_ids:
      - DisclosureTruncationActivity
      - TruncatedContextSpan
    related_relation_ids: []
    source_claims:
      - claim-disclosure-trunc-design
  - id: DisclosureTruncationActivity-example-head-tail
    labels:
      zh: Head-tail 保留
      en: Head-tail retention
      ja: head-tail 保持
    descriptions:
      zh: HeadTailWindow 保留前 400 与后 200 字符，中间标记 truncate。
      en: HeadTailWindow retains first 400 and last 200 chars; middle marked truncate.
      ja: head-tail window。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: HeadTailWindow
    field_values: {}
    related_node_ids:
      - DisclosureTruncationActivity
      - HeadTailWindow
    related_relation_ids: []
    source_claims:
      - claim-disclosure-trunc-design
  - id: DisclosureTruncationActivity-example-stream-incomplete
    labels:
      zh: 流式未完成
      en: Incomplete stream
      ja: 未完成 stream
    descriptions:
      zh: 仅有 SSE delta 没有 response.completed 时不得对最终披露执行 truncate 完成断言。
      en: With only SSE deltas and no response.completed, do not assert final truncation completion.
      ja: completed 前 truncate 完成断言不可。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/streaming-responses
      version: streaming boundary
    field_values: {}
    related_node_ids:
      - DisclosureTruncationActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-trunc-stream
parent_relation:
  id: DisclosureTruncationActivity-is_a-DisclosureActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 披露截断活动属于输出披露活动
    en: disclosure truncation activity is an output disclosure activity
    ja: 開示切詰め活動は出力開示活動である
  definitions:
    zh: 应用已选 OutputWindow、保留规定范围并记录可回溯省略范围的处理活动，是 DisclosureActivity 的截断子类。
    en: A processing activity that applies a selected OutputWindow, retains prescribed extents, and records traceable omissions is the truncation subtype of DisclosureActivity.
    ja: selected OutputWindow を適用し規定範囲を保持して追跡可能な省略範囲を記録する処理活動を DisclosureActivity の切詰め subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：披露截断活动属于输出披露活动
      en: inverse reading of disclosure truncation activity is an output disclosure activity
      ja: 開示切詰め活動は出力開示活動であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureTruncationActivity-is_a-DisclosureActivity-example-positive-manual-20260716
      labels:
        zh: 确认披露截断活动属于输出披露活动
        en: Confirm disclosure truncation activity is an output disclosure activity
        ja: 開示切詰め活動は出力開示活動であるを確認
      descriptions:
        zh: truncate-884 对 2,000 行输出应用首尾窗口，并记录第 81–1960 行缺口。
        en: truncate-884 applies a head-tail window to 2,000 output lines and records the gap at lines 81–1960.
        ja: truncate-884 は 2,000 行出力に head-tail window を適用し 81–1960 行の欠落を記録します。
      field_values: {}
      related_node_ids:
        - DisclosureTruncationActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosureTruncationActivity-is_a-DisclosureActivity
      source_claims:
        - claim-disclosure-truncation-activity-002
        - claim-disclosure-truncation-activity-001
    - id: DisclosureTruncationActivity-is_a-DisclosureActivity-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判披露截断活动属于输出披露活动
        en: Reject a false disclosure truncation activity is an output disclosure activity
        ja: 開示切詰め活動は出力開示活動であるの誤判定を拒否
      descriptions:
        zh: secret-rule-3 完全扣留一个短令牌，没有容量窗口或保留范围。
        en: secret-rule-3 withholds a short token completely, with no capacity window or retained extent.
        ja: secret-rule-3 は短い token を完全留保し capacity window や保持範囲がありません。
      field_values: {}
      related_node_ids:
        - DisclosureTruncationActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosureTruncationActivity-is_a-DisclosureActivity
      source_claims:
        - claim-disclosure-truncation-activity-002
        - claim-disclosure-truncation-activity-001
  source_claims:
    - claim-disclosure-truncation-activity-002
    - claim-disclosure-truncation-activity-001
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: DisclosureTruncationActivity-applies-OutputWindow
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 披露截断活动应用输出窗口
      en: disclosure truncation activity applies an output window
      ja: 開示切詰め活動が出力 window を適用する
    definitions:
      zh: 该关系表示一次截断活动实际执行指定 OutputWindow 版本的模式、单位和上限；选择窗口的决定与应用窗口的活动是两项不同事实。
      en: This relation states that a truncation activity actually executes the mode, unit, and limits of a specified OutputWindow revision; selecting a window and applying it are different facts.
      ja: 切詰め活動が指定 OutputWindow revision の mode・unit・limit を実行したことを表し、window 選択判断と適用活動を別事実とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_applies
      labels:
        zh: 反向读取：披露截断活动应用输出窗口
        en: inverse reading of disclosure truncation activity applies an output window
        ja: 開示切詰め活動が出力 window を適用するの逆読み
    conditions:
      - id: DisclosureTruncationActivity-applies-OutputWindow-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the identified truncation activity actually executes the exact OutputWindow identity and version and records retained and omitted extents; a prior decision selecting the window is not yet application.
        source_claims:
          - claim-disclosure-truncation-activity-004
        explanation:
          zh: 仅当同一次截断活动实际执行精确 OutputWindow 身份和版本，并记录保留与省略范围时成立；先前决定选择窗口并不等于活动已经应用。
          en: Assert only when the identified truncation activity actually executes the exact OutputWindow identity and version and records retained and omitted extents; a prior decision selecting the window is not yet application.
          ja: 識別済み truncation activity が正確な OutputWindow ID/version を実行し、retained/omitted extent を記録した場合だけ成立します。先行 decision の window 選択はまだ application ではありません。
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureTruncationActivity-applies-OutputWindow-example-positive-manual-20260716
        labels:
          zh: 确认披露截断活动应用输出窗口
          en: Confirm disclosure truncation activity applies an output window
          ja: 開示切詰め活動が出力 window を適用するを確認
        descriptions:
          zh: truncate-884 读取 output-window-9@2，并按 head=80、tail=40 计算保留范围。
          en: truncate-884 reads output-window-9@2 and computes retained extents with head=80 and tail=40.
          ja: truncate-884 は output-window-9@2 を読み head=80・tail=40 で保持範囲を計算します。
        field_values: {}
        related_node_ids:
          - DisclosureTruncationActivity
          - OutputWindow
        related_relation_ids:
          - DisclosureTruncationActivity-applies-OutputWindow
        source_claims:
          - claim-disclosure-truncation-activity-001
          - claim-disclosure-truncation-activity-002
      - id: DisclosureTruncationActivity-applies-OutputWindow-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判披露截断活动应用输出窗口
          en: Reject a false disclosure truncation activity applies an output window
          ja: 開示切詰め活動が出力 window を適用するの誤判定を拒否
        descriptions:
          zh: decision-885 选择 window-10，但执行在开始前取消，没有计算任何范围。
          en: decision-885 selects window-10, but execution is cancelled before starting and computes no extent.
          ja: decision-885 は window-10 を選びますが実行開始前に取消され範囲を計算しません。
        field_values: {}
        related_node_ids:
          - DisclosureTruncationActivity
          - OutputWindow
        related_relation_ids:
          - DisclosureTruncationActivity-applies-OutputWindow
        source_claims:
          - claim-disclosure-truncation-activity-001
          - claim-disclosure-truncation-activity-002
    source_claims:
      - claim-disclosure-truncation-activity-001
      - claim-disclosure-truncation-activity-002
    layout_role: cross-link
    target: concept:OutputWindow
  - id: DisclosureTruncationActivity-produces-TruncatedContextSpan
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 披露截断活动产生截断省略范围
      en: disclosure truncation activity produces a truncation-omission span
      ja: 開示切詰め活動が切詰め省略範囲を生成する
    definitions:
      zh: 该关系连接一次已完成截断活动与它计算出的连续省略范围；范围的来源输出、单位和窗口版本必须与活动输入一致。
      en: This relation links a completed truncation activity to the contiguous omitted extent it calculated; source output, unit, and window revision must match the activity input.
      ja: 完了した切詰め活動と計算した連続省略範囲を結び、source output・unit・window revision が activity input と一致しなければなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_produces
      labels:
        zh: 反向读取：披露截断活动产生截断省略范围
        en: inverse reading of disclosure truncation activity produces a truncation-omission span
        ja: 開示切詰め活動が切詰め省略範囲を生成するの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureTruncationActivity-produces-TruncatedContextSpan-example-positive-manual-20260716
        labels:
          zh: 确认披露截断活动产生截断省略范围
          en: Confirm disclosure truncation activity produces a truncation-omission span
          ja: 開示切詰め活動が切詰め省略範囲を生成するを確認
        descriptions:
          zh: truncate-884 完成后生成 span-41，记录 output-41 第 81–1960 行缺口。
          en: On completion, truncate-884 generates span-41 for the gap at lines 81–1960 of output-41.
          ja: truncate-884 完了時に output-41 の 81–1960 行欠落を示す span-41 を生成します。
        field_values: {}
        related_node_ids:
          - DisclosureTruncationActivity
          - TruncatedContextSpan
        related_relation_ids:
          - DisclosureTruncationActivity-produces-TruncatedContextSpan
        source_claims:
          - claim-disclosure-truncation-activity-002
          - claim-disclosure-truncation-activity-001
      - id: DisclosureTruncationActivity-produces-TruncatedContextSpan-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判披露截断活动产生截断省略范围
          en: Reject a false disclosure truncation activity produces a truncation-omission span
          ja: 開示切詰め活動が切詰め省略範囲を生成するの誤判定を拒否
        descriptions:
          zh: span-42 来自另一运行的 output-52，窗口和时间均与 truncate-884 不同。
          en: span-42 belongs to output-52 in another run and has a different window and time from truncate-884.
          ja: span-42 は別 run の output-52 に属し window と時刻が truncate-884 と異なります。
        field_values: {}
        related_node_ids:
          - DisclosureTruncationActivity
          - TruncatedContextSpan
        related_relation_ids:
          - DisclosureTruncationActivity-produces-TruncatedContextSpan
        source_claims:
          - claim-disclosure-truncation-activity-002
          - claim-disclosure-truncation-activity-001
    source_claims:
      - claim-disclosure-truncation-activity-002
      - claim-disclosure-truncation-activity-001
    layout_role: cross-link
    target: concept:TruncatedContextSpan
sources:
  - id: src-openai-responses
    title: OpenAI Responses API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/responses
    source_type: official-doc
    relevance: response.output[] typed items and output_text aggregation.
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
source_claims:
  - id: claim-disclosure-truncation-activity-001
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents context-engineering documentation describes replacing a large result with a bounded preview and a stable file reference while preserving access to the complete stored output. Moonweave uses this as evidence for output-window specifications and separately recorded omitted ranges, not as a definition of Moonweave's window classes.
    locator: Deep Agents JavaScript documentation, Context engineering > Offloading, large tool result preview
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-truncation-activity-002
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-truncation-activity-003
    source: eng-security-nist-abac
    supports: NIST SP 800-162 evaluates subject, object, requested operation, environment, policy, and rules to compute an authorization decision. Moonweave uses the same separation when an audience, output object, display operation, and environment determine whether output is published, truncated, or suppressed.
    locator: NIST SP 800-162 Sections 2.1-2.3 and Figure 2, basic ABAC scenario
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-truncation-activity-004
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents grounds actual bounded-preview execution and preservation of a stable full-output reference. Separating selection from application is Moonweave design inference.
    locator: Context engineering > bounded preview and stable file reference for large results
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-trunc-design
    source: src-info-output-design
    supports: DisclosureTruncationActivity records window-applied clipping as TruncatedContextSpan.
    locator: truncation activity
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-trunc-stream
    source: src-openai-stream
    supports: Truncation completion requires terminal stream completion event.
    locator: response.completed
    evidence_kind: primary-api
    confidence: high
