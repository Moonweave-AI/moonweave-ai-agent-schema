    en: A processing activity that applies a selected OutputWindow, retains prescribed extents, and records traceable omissions is the truncation subtype of DisclosureActivity.
    ja: selected OutputWindow を適用し規定範囲を保持して追跡可能な省略範囲を記録する処理活動を DisclosureActivity の切詰め subtype とします。
