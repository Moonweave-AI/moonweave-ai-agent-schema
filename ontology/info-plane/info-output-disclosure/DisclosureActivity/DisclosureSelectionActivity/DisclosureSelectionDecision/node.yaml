schema: moonweave.ai/ontology-node/v1
id: DisclosureSelectionDecision
kind: concept
labels:
  zh: 披露选择决定
  en: disclosure selection decision
  ja: 開示選択判断
semantics:
  short_definition:
    zh: 声明对源输出哪些范围采用何种披露处置的决定对象。
    en: Decision object declaring which source ranges receive which disclosure disposition.
    ja: source output のどの range にどの disposition を適用するかを宣言する decision object。
  definition:
    zh: DisclosureSelectionDecision 绑定 audience、output_window_id 与 disposition 列表；它是规范层决定，不执行截断也不等于 DisclosureRecord。安全模块的 DisclosureRule 被采用后，本节点记录实际选用的窗口与范围计划。
    en: DisclosureSelectionDecision binds audience, output_window_id, and disposition list. It is a normative plan—not execution or DisclosureRecord. After safety DisclosureRule adoption, this node records the chosen window and range plan.
    ja: DisclosureSelectionDecision は disposition 計画を宣言。
  why_needed:
    zh: 独立保存决定，才能区分求值、执行与事后审计，并在同一输出对不同受众得到不同处置时保持证据。
    en: Persisting the decision separately distinguishes evaluation, execution, and audit and preserves evidence when the same output receives different dispositions for different audiences.
    ja: 判断を独立保存することで評価・実行・監査を区別し、同じ出力が受け手ごとに異なる処置となる証拠を保持できます。
  includes:
    - zh: 一次明确绑定候选输出、目标受众、窗口版本和 allow、truncate 或 suppress 处置的结果。
      en: A result that binds candidate output, target audience, a window revision, and an allow, truncate, or suppress disposition.
      ja: 候補出力・対象受け手・window revision・allow/truncate/suppress 処置を結び付ける結果。
  excludes:
    - zh: 模型调用前的 ContextSelection、仅声明容量的 OutputWindow、长期 DisclosureRule，以及真正执行处置的活动。
      en: Pre-invocation context selection, an OutputWindow that only declares capacity, a durable DisclosureRule, and the activity that executes a disposition.
      ja: 呼出し前 context selection、容量だけを宣言する OutputWindow、永続 DisclosureRule、処置を実行する活動。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 决定引用 OutputWindow revision 与 audience_id；执行由 DisclosureSelectionActivity 完成。
    en: Decision references OutputWindow revision and audience_id; DisclosureSelectionActivity executes.
    ja: OutputWindow revision と audience を参照。
  typical_input:
    - description: Selection decision
      format: '{"decision_id":"decision-204","audience_id":"actor/customer-support-7","output_window_id":"window/800-char"}'
      source_claims:
        - claim-disclosure-decision-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断 ID
      definitions:
        zh: 稳定标识一次受众相关的披露决定。
        en: Stably identifies one audience-specific disclosure decision.
        ja: 一つの受け手別開示判断を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: disclosure-decision-884
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-001
    - id: candidate_output_ref
      labels:
        zh: 候选输出引用
        en: candidate-output reference
        ja: 候補出力参照
      definitions:
        zh: 引用本次被决定处置的完整候选输出集合。
        en: References the complete candidate-output set whose disposition is decided.
        ja: 処置を判断する完全な候補出力集合を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-output-884
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-004
        - claim-disclosure-selection-decision-005
    - id: audience_ref
      labels:
        zh: 受众引用
        en: audience reference
        ja: 受け手参照
      definitions:
        zh: 引用该决定专门适用的 Actor 或受众组。
        en: References the Actor or audience group to which this decision specifically applies.
        ja: この判断が特に適用される Actor または受け手群を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: user-7
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-002
    - id: window_ref
      labels:
        zh: 窗口引用
        en: window reference
        ja: ウィンドウ参照
      definitions:
        zh: 引用求值时选择的不可变 OutputWindow 版本。
        en: References the immutable OutputWindow revision selected during evaluation.
        ja: 評価時に選択した不変 OutputWindow revision を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-window-9@2
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-003
    - id: disposition
      labels:
        zh: 处置
        en: disposition
        ja: 処置
      definitions:
        zh: 记录 allow、truncate 或 suppress 中的一种决定结果。
        en: "Records one decision result: allow, truncate, or suppress."
        ja: allow・truncate・suppress のいずれかの判断結果を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: truncate
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-001
        - claim-disclosure-selection-decision-002
    - id: rationale
      labels:
        zh: 决定理由
        en: decision rationale
        ja: 判断理由
      definitions:
        zh: 记录窗口、受众属性与治理条件如何共同导出该处置。
        en: Records how window, audience attributes, and governing conditions produced the disposition.
        ja: window・audience attribute・governing condition から処置を導いた理由を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Retain diagnostic head and tail; withhold the secret-bearing middle range.
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-001
        - claim-disclosure-selection-decision-002
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      definitions:
        zh: 记录处置结果成为有效决定的时间。
        en: Records when the disposition became an effective decision.
        ja: 処置結果が有効な判断となった時刻を記録します。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:00Z
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-decision-001
        - claim-disclosure-selection-decision-004
  constraints: []
  required_relations: []
examples:
  - id: DisclosureSelectionDecision-example-window
    labels:
      zh: 窗口规范绑定
      en: Window spec binding
      ja: window 仕様 binding
    descriptions:
      zh: decision-204 选用 window/800-char revision=2 对 support 受众。
      en: decision-204 selects window/800-char revision=2 for support audience.
      ja: OutputWindow 绑定。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: window binding
    field_values:
      decision_id: decision-204
      output_window_id: window/800-char
    related_node_ids:
      - DisclosureSelectionDecision
      - OutputWindow
    related_relation_ids: []
    source_claims:
      - claim-disclosure-decision-design
  - id: DisclosureSelectionDecision-example-multi-disposition
    labels:
      zh: 多处置计划
      en: Multi-disposition plan
      ja: multi-disposition 計画
    descriptions:
      zh: 计划含 display 0..479、suppress 480..639、truncate 640..1199。
      en: Plan includes display 0..479, suppress 480..639, truncate 640..1199.
      ja: multi disposition 計画。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: disposition plan
    field_values: {}
    related_node_ids:
      - DisclosureSelectionDecision
    related_relation_ids: []
    source_claims:
      - claim-disclosure-decision-design
  - id: DisclosureSelectionDecision-example-not-record
    labels:
      zh: 非 DisclosureRecord
      en: Not DisclosureRecord
      ja: DisclosureRecord ではない
    descriptions:
      zh: 未执行的决定不得当作 DisclosureRecord 查询为“已展示内容”。
      en: Unexecuted decision must not be queried as DisclosureRecord for what was shown.
      ja: 未実行 decision≠record。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DisclosureSelectionDecision
    related_relation_ids: []
    source_claims:
      - claim-disclosure-decision-design
parent_relation:
  id: DisclosureSelectionActivity-produces-DisclosureSelectionDecision
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 披露选择活动产生披露选择决定
    en: disclosure selection activity produces a disclosure selection decision
    ja: 開示選択活動が開示選択判断を生成する
  definitions:
    zh: 该关系断言一次完成的披露选择求值活动生成一个具有同一候选输出、受众、窗口、处置和时间的 DisclosureSelectionDecision。
    en: This relation states that a completed disclosure-selection evaluation generates a DisclosureSelectionDecision with the same candidate output, audience, window, disposition, and decision time.
    ja: 完了した開示選択評価が同じ candidate output・audience・window・disposition・decision time を持つ DisclosureSelectionDecision を生成したことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：披露选择活动产生披露选择决定
      en: inverse reading of disclosure selection activity produces a disclosure selection decision
      ja: 開示選択活動が開示選択判断を生成するの逆読み
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureSelectionActivity-produces-DisclosureSelectionDecision-example-positive-manual-20260716
      labels:
        zh: 确认披露选择活动产生披露选择决定
        en: Confirm disclosure selection activity produces a disclosure selection decision
        ja: 開示選択活動が開示選択判断を生成するを確認
      descriptions:
        zh: selection-884 对 candidate-output-884 求值，并在完成时生成 decision-884。
        en: selection-884 evaluates candidate-output-884 and generates decision-884 when it completes.
        ja: selection-884 は candidate-output-884 を評価し完了時に decision-884 を生成します。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureSelectionDecision
      related_relation_ids:
        - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
      source_claims:
        - claim-disclosure-selection-decision-004
        - claim-disclosure-selection-decision-001
    - id: DisclosureSelectionActivity-produces-DisclosureSelectionDecision-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判披露选择活动产生披露选择决定
        en: Reject a false disclosure selection activity produces a disclosure selection decision
        ja: 開示選択活動が開示選択判断を生成するの誤判定を拒否
      descriptions:
        zh: decision-885 由人工导入，没有对应选择活动标识或求值轨迹。
        en: decision-885 is imported manually and has no corresponding selection-activity ID or evaluation trace.
        ja: decision-885 は手動 import され selection activity ID や evaluation trace がありません。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureSelectionDecision
      related_relation_ids:
        - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
      source_claims:
        - claim-disclosure-selection-decision-004
        - claim-disclosure-selection-decision-001
  source_claims:
    - claim-disclosure-selection-decision-004
    - claim-disclosure-selection-decision-001
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: DisclosureSelectionDecision-selects_window-OutputWindow
    predicate: selects_window
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 披露选择决定选定输出窗口
      en: disclosure selection decision selects an output window
      ja: 開示選択判断が出力 window を選定する
    definitions:
      zh: 该关系记录一次受众相关决定采用了哪个不可变 OutputWindow 版本来计算允许、截断或抑制范围；窗口规范不反向作出决定。
      en: This relation records which immutable OutputWindow revision an audience-specific decision adopts to compute allowed, truncated, or suppressed extents; the specification does not make the decision in reverse.
      ja: 受け手別判断が allow・truncate・suppress 範囲の計算に採用した不変 OutputWindow revision を記録し、仕様が逆に判断するとはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_selects_window
      labels:
        zh: 反向读取：披露选择决定选定输出窗口
        en: inverse reading of disclosure selection decision selects an output window
        ja: 開示選択判断が出力 window を選定するの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureSelectionDecision-selects_window-OutputWindow-example-positive-manual-20260716
        labels:
          zh: 确认披露选择决定选定输出窗口
          en: Confirm disclosure selection decision selects an output window
          ja: 開示選択判断が出力 window を選定するを確認
        descriptions:
          zh: decision-884 的 window_ref 为 output-window-9@2，处置理由明确引用其 120 行限制。
          en: decision-884 has window_ref output-window-9@2 and its rationale cites that revision's 120-line limit.
          ja: decision-884 の window_ref は output-window-9@2 で理由はその 120 行 limit を参照します。
        field_values: {}
        related_node_ids:
          - DisclosureSelectionDecision
          - OutputWindow
        related_relation_ids:
          - DisclosureSelectionDecision-selects_window-OutputWindow
        source_claims:
          - claim-disclosure-selection-decision-001
          - claim-disclosure-selection-decision-003
      - id: DisclosureSelectionDecision-selects_window-OutputWindow-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判披露选择决定选定输出窗口
          en: Reject a false disclosure selection decision selects an output window
          ja: 開示選択判断が出力 window を選定するの誤判定を拒否
        descriptions:
          zh: output-window-10 只是系统默认配置，decision-884 未引用或应用它。
          en: output-window-10 is merely a system default and decision-884 neither references nor applies it.
          ja: output-window-10 は system default にすぎず decision-884 は参照も適用もしません。
        field_values: {}
        related_node_ids:
          - DisclosureSelectionDecision
          - OutputWindow
        related_relation_ids:
          - DisclosureSelectionDecision-selects_window-OutputWindow
        source_claims:
          - claim-disclosure-selection-decision-001
          - claim-disclosure-selection-decision-003
    source_claims:
      - claim-disclosure-selection-decision-001
      - claim-disclosure-selection-decision-003
    layout_role: cross-link
    target: concept:OutputWindow
  - id: DisclosureSelectionDecision-selects-OutputWindow
    predicate: selects
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 选择输出窗口
      en: selects
      ja: output window を選択する
    definitions:
      zh: DisclosureSelectionDecision selects OutputWindow 表示一次面向特定受众和候选输出的披露决定明确选择一个有版本的窗口规范，作为随后截断或发布活动的范围依据；活动实际应用窗口是另一事实。
      en: DisclosureSelectionDecision selects OutputWindow means that one audience- and candidate-specific disclosure decision explicitly chooses a versioned window specification as the range basis for later truncation or publication; an activity's actual application of the window is a separate fact.
      ja: DisclosureSelectionDecision selects OutputWindow は、一 audience・candidate output に固有の disclosure decision が versioned window specification を後続 truncation/publication の range basis として明示選択することを示します。activity が window を実際に適用することは別事実です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类级阅读不要求每个决定都完成，也不限制不同决定重复选择同一窗口版本。
      en: The class-level reading neither requires every decision to be complete nor prevents different decisions from selecting the same window version.
      ja: class-level 読解は全 decision の完了も、複数 decision が同じ window version を選ぶことの禁止も要求しません。
    inverse_reading:
      predicate: selected_by_disclosure_decision
      labels:
        zh: 由披露决定选择
        en: selected by disclosure decision
        ja: disclosure decision により選択される
    conditions:
      - id: DisclosureSelectionDecision-selects-OutputWindow-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the decision records the same audience and candidate-output scope, the exact OutputWindow identity and version, and a completed disposition that makes that window authoritative for the next disclosure step.
        source_claims:
          - claim-disclosure-selection-decision-006
        explanation:
          zh: 仅当决定记录同一受众与候选输出范围、精确 OutputWindow 身份和版本，并以已完成处置使该窗口成为下一披露步骤的依据时成立。
          en: Assert only when the decision records the same audience and candidate-output scope, the exact OutputWindow identity and version, and a completed disposition that makes that window authoritative for the next disclosure step.
          ja: decision が同一 audience・candidate-output scope、正確な OutputWindow ID/version、次 disclosure step で window を authoritative にする completed disposition を記録した場合だけ成立します。
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureSelectionDecision-selects-OutputWindow-example-positive-001
        labels:
          zh: 受众决定选择窗口
          en: Audience decision selects window
          ja: audience decision の window 選択
        descriptions:
          zh: 决定 `disclosure/decision-9` 面向外部审计员，为候选输出 `report/31` 选择 `window/preview-2000@v3`，并记录字符单位与 2000 上限。
          en: Decision `disclosure/decision-9`, for an external auditor and candidate output `report/31`, selects `window/preview-2000@v3` and records character units and limit 2000.
          ja: decision `disclosure/decision-9` は external auditor と candidate output `report/31` について `window/preview-2000@v3` を選択し、character unit と limit 2000 を記録します。
        field_values: {}
        related_node_ids:
          - DisclosureSelectionDecision
          - OutputWindow
        related_relation_ids:
          - DisclosureSelectionDecision-selects-OutputWindow
        source_claims:
          - claim-disclosure-selection-decision-007
      - id: DisclosureSelectionDecision-selects-OutputWindow-example-boundary-001
        labels:
          zh: 仅推荐窗口边界
          en: Recommended-only window boundary
          ja: window recommendation のみ境界
        descriptions:
          zh: 策略建议 `window/preview-2000@v3`，但决定仍为 pending，未绑定受众和候选输出。
          en: A policy recommends `window/preview-2000@v3`, but the decision remains pending and binds neither audience nor candidate output.
          ja: policy は `window/preview-2000@v3` を推奨しますが、decision は pending で audience/candidate output を結合していません。
        field_values: {}
        related_node_ids:
          - DisclosureSelectionDecision
          - OutputWindow
        related_relation_ids:
          - DisclosureSelectionDecision-selects-OutputWindow
        source_claims:
          - claim-disclosure-selection-decision-008
    source_claims:
      - claim-disclosure-selection-decision-009
    layout_role: cross-link
    target: concept:OutputWindow
sources:
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
source_claims:
  - id: claim-disclosure-selection-decision-001
    source: eng-policy-opa
    supports: OPA decision logs distinguish policy query input, result, decision identifier, requester, timestamp, and erased or masked fields. Moonweave uses that evidence to keep a disclosure selection decision separate from the disclosure activity and from the record of what was finally displayed.
    locator: Open Policy Agent documentation, Management > Decision Logs, event fields and masking
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-decision-002
    source: eng-security-nist-abac
    supports: NIST SP 800-162 evaluates subject, object, requested operation, environment, policy, and rules to compute an authorization decision. Moonweave uses the same separation when an audience, output object, display operation, and environment determine whether output is published, truncated, or suppressed.
    locator: NIST SP 800-162 Sections 2.1-2.3 and Figure 2, basic ABAC scenario
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-decision-003
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents context-engineering documentation describes replacing a large result with a bounded preview and a stable file reference while preserving access to the complete stored output. Moonweave uses this as evidence for output-window specifications and separately recorded omitted ranges, not as a definition of Moonweave's window classes.
    locator: Deep Agents JavaScript documentation, Context engineering > Offloading, large tool result preview
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-decision-004
    source: eng-ont-prov-o
