schema: moonweave.ai/ontology-node/v1
id: DisclosureSelectionDecision
kind: concept
status: review
labels:
  zh: 披露选择决定
  en: disclosure selection decision
  ja: 開示選択判断
semantics:
  short_definition:
    zh: 针对一组候选输出、一个受众和一个窗口作出的单次披露处置决定。
    en: An occurrence-specific disclosure disposition decision for candidate output, one audience, and one window.
    ja: 候補出力・一受け手・一ウィンドウについて行う一回限りの開示処置判断です。
  definition:
    zh: 披露选择决定是一种决定记录，以决定标识、候选输出、受众、所选窗口、处置值、理由和决定时间为身份。它陈述允许发布、需要截断或必须抑制的结果，但不执行截断、抑制或发布，也不是模型调用前的输入上下文选择。
    en: A DisclosureSelectionDecision is a decision record identified by decision ID, candidate output, audience, selected window, disposition, rationale, and decision time. It states whether output may be published, must be truncated, or must be suppressed; it performs none of those activities and is not a pre-invocation input-context selection.
    ja: DisclosureSelectionDecision は decision ID・candidate output・audience・selected window・disposition・rationale・decision time で識別する判断記録です。公開許可、切詰め、抑制の結論を述べますが、それらを実行せず、呼出し前の入力コンテキスト選択でもありません。
  why_needed:
    zh: 独立保存决定，才能区分求值、执行与事后审计，并在同一输出对不同受众得到不同处置时保持证据。
    en: Persisting the decision separately distinguishes evaluation, execution, and audit and preserves evidence when the same output receives different dispositions for different audiences.
    ja: 判断を独立保存することで評価・実行・監査を区別し、同じ出力が受け手ごとに異なる処置となる証拠を保持できます。
  includes:
    - zh: 一次明确绑定候选输出、目标受众、窗口版本和 allow、truncate 或 suppress 处置的结果。
      en: A result that binds candidate output, target audience, a window revision, and an allow, truncate, or suppress disposition.
      ja: 候補出力・対象受け手・window revision・allow/truncate/suppress 処置を結び付ける結果。
  excludes:
    - zh: 模型调用前的 ContextSelection、仅声明容量的 OutputWindow、长期 DisclosureRule，以及真正执行处置的活动。
      en: Pre-invocation context selection, an OutputWindow that only declares capacity, a durable DisclosureRule, and the activity that executes a disposition.
      ja: 呼出し前 context selection、容量だけを宣言する OutputWindow、永続 DisclosureRule、処置を実行する活動。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次受众相关的披露决定。
        en: Stably identifies one audience-specific disclosure decision.
        ja: 一つの受け手別開示判断を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: disclosure-decision-884
      source_claims:
        - claim-disclosure-selection-decision-001
    - id: candidate_output_ref
      labels:
        zh: 候选输出引用
        en: candidate-output reference
        ja: 候補出力参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次被决定处置的完整候选输出集合。
        en: References the complete candidate-output set whose disposition is decided.
        ja: 処置を判断する完全な候補出力集合を参照します。
      allowed_values: []
      pattern: null
      example_value: candidate-output-884
      source_claims:
        - claim-disclosure-selection-decision-004
        - claim-disclosure-selection-decision-005
    - id: audience_ref
      labels:
        zh: 受众引用
        en: audience reference
        ja: 受け手参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该决定专门适用的 Actor 或受众组。
        en: References the Actor or audience group to which this decision specifically applies.
        ja: この判断が特に適用される Actor または受け手群を参照します。
      allowed_values: []
      pattern: null
      example_value: user-7
      source_claims:
        - claim-disclosure-selection-decision-002
    - id: window_ref
      labels:
        zh: 窗口引用
        en: window reference
        ja: ウィンドウ参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用求值时选择的不可变 OutputWindow 版本。
        en: References the immutable OutputWindow revision selected during evaluation.
        ja: 評価時に選択した不変 OutputWindow revision を参照します。
      allowed_values: []
      pattern: null
      example_value: output-window-9@2
      source_claims:
        - claim-disclosure-selection-decision-003
    - id: disposition
      labels:
        zh: 处置
        en: disposition
        ja: 処置
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 allow、truncate 或 suppress 中的一种决定结果。
        en: "Records one decision result: allow, truncate, or suppress."
        ja: allow・truncate・suppress のいずれかの判断結果を記録します。
      allowed_values: []
      pattern: null
      example_value: truncate
      source_claims:
        - claim-disclosure-selection-decision-001
        - claim-disclosure-selection-decision-002
    - id: rationale
      labels:
        zh: 决定理由
        en: decision rationale
        ja: 判断理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录窗口、受众属性与治理条件如何共同导出该处置。
        en: Records how window, audience attributes, and governing conditions produced the disposition.
        ja: window・audience attribute・governing condition から処置を導いた理由を記録します。
      allowed_values: []
      pattern: null
      example_value: Retain diagnostic head and tail; withhold the secret-bearing middle range.
      source_claims:
        - claim-disclosure-selection-decision-001
        - claim-disclosure-selection-decision-002
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录处置结果成为有效决定的时间。
        en: Records when the disposition became an effective decision.
        ja: 処置結果が有効な判断となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:00Z
      source_claims:
        - claim-disclosure-selection-decision-001
        - claim-disclosure-selection-decision-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureSelectionDecision-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 面向支持人员截断诊断输出
      en: Truncate diagnostics for support staff
      ja: support staff 向け診断出力を切詰め
    scenario_id: null
    descriptions:
      zh: decision-884 将 candidate-output-884 绑定到 support-agent-7 和 output-window-9@2，结论为 truncate，并记录决定时间与理由。
      en: decision-884 binds candidate-output-884 to support-agent-7 and output-window-9@2, records a truncate disposition, and preserves its time and rationale.
      ja: decision-884 は candidate-output-884・support-agent-7・output-window-9@2 を結び、truncate 処置と時刻・理由を記録します。
    field_values:
      decision_id: decision-884
      candidate_output_ref: candidate-output-884
      audience_ref: support-agent-7
      window_ref: output-window-9@2
      disposition: truncate
      rationale: The middle range contains credentials.
      decided_at: 2026-07-16T04:00:00Z
    related_node_ids:
      - DisclosureSelectionDecision
      - OutputWindow
    related_relation_ids:
      - DisclosureSelectionDecision-selects_window-OutputWindow
    expected_result:
      zh: 保存一个可由后续活动执行并由 DisclosureRecord 引用的决定。
      en: Persist one decision that later activities can execute and a DisclosureRecord can reference.
      ja: 後続活動が実行し DisclosureRecord が参照できる判断を保存します。
    why_valid_or_invalid:
      zh: 候选输出、受众、窗口、处置、理由和时间均固定，足以区分一次决定。
      en: Candidate output, audience, window, disposition, rationale, and time are fixed and identify one decision.
      ja: 候補出力・受け手・window・処置・理由・時刻が固定され、一つの判断を識別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-selection-decision-001
      - claim-disclosure-selection-decision-002
      - claim-disclosure-selection-decision-003
  - id: DisclosureSelectionDecision-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 模型调用前选择上下文
      en: Select input context before invocation
      ja: 呼出し前に入力 context を選択
    scenario_id: output-disclosure-disclosureselectiondecision-boundary
    descriptions:
      zh: context-choice-12 在模型运行前按 token 预算选择 ContextSlot，不绑定输出受众，也没有 allow、truncate 或 suppress 处置。
      en: context-choice-12 selects ContextSlot records under a token budget before model execution; it binds no output audience and has no allow, truncate, or suppress disposition.
      ja: context-choice-12 は model 実行前に token budget で ContextSlot を選び、出力受け手や allow/truncate/suppress 処置を持ちません。
    field_values: {}
    related_node_ids:
      - ContextSelectionDecision
      - DisclosureSelectionDecision
    related_relation_ids: []
    expected_result:
      zh: 保留为上下文组装决定，不建立披露选择决定。
      en: Keep it as a context-assembly decision and do not create a disclosure-selection decision.
      ja: context assembly の判断として保持し、開示選択判断を作りません。
    why_valid_or_invalid:
      zh: 时间点、对象和结果种类都属于输入准备，而不是结果产生后的受众披露。
      en: Its timing, object, and result kind belong to input preparation rather than audience disclosure after result production.
      ja: 時点・対象・結果種別は入力準備に属し、結果生成後の受け手向け開示ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-selection-decision-002
      - claim-disclosure-selection-decision-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DisclosureSelectionActivity-produces-DisclosureSelectionDecision
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 披露选择活动产生披露选择决定
    en: disclosure selection activity produces a disclosure selection decision
    ja: 開示選択活動が開示選択判断を生成する
  definitions:
    zh: 该关系断言一次完成的披露选择求值活动生成一个具有同一候选输出、受众、窗口、处置和时间的 DisclosureSelectionDecision。
    en: This relation states that a completed disclosure-selection evaluation generates a DisclosureSelectionDecision with the same candidate output, audience, window, disposition, and decision time.
    ja: 完了した開示選択評価が同じ candidate output・audience・window・disposition・decision time を持つ DisclosureSelectionDecision を生成したことを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: is_target_of_produces
    labels:
      zh: 反向读取：披露选择活动产生披露选择决定
      en: inverse reading of disclosure selection activity produces a disclosure selection decision
      ja: 開示選択活動が開示選択判断を生成するの逆読み
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureSelectionActivity-produces-DisclosureSelectionDecision-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 确认披露选择活动产生披露选择决定
        en: Confirm disclosure selection activity produces a disclosure selection decision
        ja: 開示選択活動が開示選択判断を生成するを確認
      scenario_id: output-disclosure-disclosureselectionactivity-produces-disclosureselectiondecision-positive
      descriptions:
        zh: selection-884 对 candidate-output-884 求值，并在完成时生成 decision-884。
        en: selection-884 evaluates candidate-output-884 and generates decision-884 when it completes.
        ja: selection-884 は candidate-output-884 を評価し完了時に decision-884 を生成します。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureSelectionDecision
      related_relation_ids:
        - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
      expected_result:
        zh: 记录从 selection-884 到 decision-884 的 produces 事实。
        en: Record the produces fact from selection-884 to decision-884.
        ja: selection-884 から decision-884 への produces 事実を記録します。
      why_valid_or_invalid:
        zh: 活动输出与决定字段在候选集、受众和完成时间上可对应核验。
        en: Activity output and decision fields reconcile on candidate set, audience, and completion time.
        ja: activity output と decision field を candidate set・audience・completion time で照合できます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-selection-decision-004
        - claim-disclosure-selection-decision-001
    - id: DisclosureSelectionActivity-produces-DisclosureSelectionDecision-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 拒绝误判披露选择活动产生披露选择决定
        en: Reject a false disclosure selection activity produces a disclosure selection decision
        ja: 開示選択活動が開示選択判断を生成するの誤判定を拒否
      scenario_id: output-disclosure-disclosureselectionactivity-produces-disclosureselectiondecision-boundary
      descriptions:
        zh: decision-885 由人工导入，没有对应选择活动标识或求值轨迹。
        en: decision-885 is imported manually and has no corresponding selection-activity ID or evaluation trace.
        ja: decision-885 は手動 import され selection activity ID や evaluation trace がありません。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureSelectionDecision
      related_relation_ids:
        - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
      expected_result:
        zh: 保留决定，但不得虚构该 produces 关系。
        en: Keep the decision but do not invent this produces relation.
        ja: 判断を保持し、この produces relation を捏造しません。
      why_valid_or_invalid:
        zh: 决定存在并不能证明特定活动生成了它，必须有产生沿革。
        en: Existence of a decision does not prove that a particular activity generated it; generation provenance is required.
        ja: 判断の存在だけでは特定活動の生成を証明せず generation provenance が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-selection-decision-004
        - claim-disclosure-selection-decision-001
  source_claims:
    - claim-disclosure-selection-decision-004
    - claim-disclosure-selection-decision-001
  distinct_fact_rationale:
    zh: 本关系只表达所列源端到目标端的具体事实，不把相邻节点、共享受众或时间接近自动推成该事实。
    en: This relation states only the listed source-to-target fact; adjacent nodes, a shared audience, or temporal proximity do not imply it.
    ja: この relation は列挙した source-to-target 事実だけを表し、隣接 node・shared audience・time proximity から自動推論しません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
