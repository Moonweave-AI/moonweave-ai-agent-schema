schema: moonweave.ai/ontology-node/v1
id: DisclosureSelectionActivity
kind: concept
status: review
labels:
  zh: 披露选择活动
  en: disclosure selection activity
  ja: 開示選択活動
semantics:
  short_definition:
    zh: 对候选输出逐项求值并生成披露选择决定的披露活动。
    en: A disclosure activity that evaluates candidate output and produces a disclosure selection decision.
    ja: candidate output を evaluate し disclosure selection decision を生成する disclosure activity。
  definition:
    zh: 披露选择活动是 DisclosureActivity 的子类，其种差是对指定受众、候选输出、窗口与治理条件进行求值并产生 DisclosureSelectionDecision；它不直接等于决定，也不证明内容已发布。
    en: A DisclosureSelectionActivity is a DisclosureActivity distinguished by evaluating candidate output, audience, window, and governing conditions and producing a DisclosureSelectionDecision. It is not the decision itself and does not prove publication.
    ja: DisclosureSelectionActivity は candidate output・audience・window・governance condition を evaluate し DisclosureSelectionDecision を生成する DisclosureActivity subtype です。decision 自体でも publication proof でもありません。
  why_needed:
    zh: 把求值活动与决定记录分开，可记录重算、不同输入和决定版本。
    en: Separating evaluation activity from decision record preserves reevaluation, changed input, and decision revisions.
    ja: evaluation activity と decision record を分け reevaluation・changed input・decision revision を保持します。
  includes:
    - zh: 对输出片段进行受众适用性、窗口限制、相关性与策略结果求值。
      en: Evaluation of output segments for audience applicability, window limits, relevance, and policy result.
      ja: output segment の audience applicability・window limit・relevance・policy result evaluation。
  excludes:
    - zh: 内容发布、输出生成、长期策略编写和仅由人工口头表达的偏好。
      en: Content publication, output generation, durable policy authoring, and an unrecorded verbal preference.
      ja: content publication・output generation・durable policy authoring・unrecorded verbal preference。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: candidate_set_ref
      labels:
        zh: 候选集引用
        en: candidate-set reference
        ja: candidate-set reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次被逐项求值的候选 OutputInformation 集。
        en: References the candidate OutputInformation set evaluated in this activity.
        ja: activity で evaluate する candidate OutputInformation set を参照します。
      allowed_values: []
      pattern: null
      example_value: candidate-set-884
      source_claims:
        - claim-disclosure-selection-activity-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureSelectionActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 筛选测试输出
      en: Select test output
      ja: test output を select
    scenario_id: null
    descriptions:
      zh: selection-884 对 40 个输出片段按 user-7、visible-window-9 和 rule-set-5 求值，生成 decision-884。
      en: selection-884 evaluates forty output segments for user-7 under visible-window-9 and rule-set-5 and produces decision-884.
      ja: selection-884 は 40 output segment を user-7・visible-window-9・rule-set-5 で evaluate し decision-884 を生成します。
    field_values:
      candidate_set_ref: candidate-set-884
      disclosure_activity_id: selection-884
      source_output_ref: output-stream-41
      audience_ref: user-7
      started_at: 2026-07-16T03:59:58Z
      status: completed
    related_node_ids:
      - DisclosureSelectionActivity
      - DisclosureSelectionDecision
    related_relation_ids:
      - DisclosureSelectionActivity-produces-DisclosureSelectionDecision
    expected_result:
      zh: 建立选择活动和独立决定。
      en: Create the selection activity and separate decision.
      ja: selection activity と separate decision を作成します。
    why_valid_or_invalid:
      zh: 候选集、受众和求值条件均固定，且产生明确决定。
      en: Candidate set, audience, and evaluation conditions are fixed and produce an explicit decision.
      ja: candidate set・audience・condition が固定され explicit decision を生成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-selection-activity-001
      - claim-disclosure-selection-activity-002
  - id: DisclosureSelectionActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 窗口配置本身
      en: Window configuration alone
      ja: window configuration のみ
    scenario_id: output-disclosure-disclosureselectionactivity-boundary
    descriptions:
      zh: output-window-9 声明最多 120 行，但没有候选集求值、活动时点或决定结果。
      en: output-window-9 declares at most 120 lines but has no candidate evaluation, activity time, or decision result.
      ja: output-window-9 は max 120 lines を宣言しますが candidate evaluation・activity time・decision result がありません。
    field_values: {}
    related_node_ids:
      - OutputWindow
      - DisclosureSelectionActivity
    related_relation_ids: []
    expected_result:
      zh: 仅建立 OutputWindow。
      en: Create only the OutputWindow.
      ja: OutputWindow のみ作成します。
    why_valid_or_invalid:
      zh: 规范不执行求值，也不产生一次决定。
      en: A specification performs no evaluation and produces no occurrence-specific decision.
      ja: specification は evaluation を実行せず occurrence-specific decision を生成しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-selection-activity-004
      - claim-disclosure-selection-activity-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DisclosureSuppressionActivity
    shared_parent_concept_id: DisclosureActivity
    differentia:
      zh: 正向身份比较：父节点 DisclosureActivity：DisclosureSelectionActivity（semantic kind=activity，骨架 DisclosureSelectionActivity-is_a-DisclosureActivity）；DisclosureSuppressionActivity（semantic kind=activity，骨架 DisclosureSuppressionActivity-is_a-DisclosureActivity）。双端条件：DisclosureSelectionActivity 条件：“对候选输出逐项求值并生成披露选择决定的披露活动”；DisclosureSuppressionActivity 条件：“依据披露决定阻止候选内容到达指定受众的披露活动”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent DisclosureActivity: DisclosureSelectionActivity (semantic kind=activity, backbone DisclosureSelectionActivity-is_a-DisclosureActivity); DisclosureSuppressionActivity (semantic kind=activity, backbone DisclosureSuppressionActivity-is_a-DisclosureActivity). Endpoint conditions: DisclosureSelectionActivity condition: “A disclosure activity that evaluates candidate output and produces a disclosure selection decision”; DisclosureSuppressionActivity condition: “A disclosure activity that prevents candidate content from reaching an audience under a disclosure decision”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 DisclosureActivity：DisclosureSelectionActivity（semantic kind=activity、バックボーン DisclosureSelectionActivity-is_a-DisclosureActivity）；DisclosureSuppressionActivity（semantic kind=activity、バックボーン DisclosureSuppressionActivity-is_a-DisclosureActivity）。両端条件：DisclosureSelectionActivity の条件：「candidate output を evaluate し disclosure selection decision を生成する disclosure activity」；DisclosureSuppressionActivity の条件：「disclosure decision に基づき candidate content が audience に届くことを防ぐ disclosure activity」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-disclosure-selection-activity-005
  - sibling_concept_id: DisclosureTruncationActivity
    shared_parent_concept_id: DisclosureActivity
    differentia:
      zh: 共享父节点对照：父节点 DisclosureActivity：DisclosureSelectionActivity（semantic kind=activity，骨架 DisclosureSelectionActivity-is_a-DisclosureActivity）；DisclosureTruncationActivity（semantic kind=activity，骨架 DisclosureTruncationActivity-is_a-DisclosureActivity）。双端条件：DisclosureSelectionActivity 条件：“对候选输出逐项求值并生成披露选择决定的披露活动”；DisclosureTruncationActivity 条件：“按照已选输出窗口保留部分范围并记录省略范围的披露活动”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent DisclosureActivity: DisclosureSelectionActivity (semantic kind=activity, backbone DisclosureSelectionActivity-is_a-DisclosureActivity); DisclosureTruncationActivity (semantic kind=activity, backbone DisclosureTruncationActivity-is_a-DisclosureActivity). Endpoint conditions: DisclosureSelectionActivity condition: “A disclosure activity that evaluates candidate output and produces a disclosure selection decision”; DisclosureTruncationActivity condition: “A disclosure activity that retains ranges under a selected output window and records omitted ranges”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 DisclosureActivity：DisclosureSelectionActivity（semantic kind=activity、バックボーン DisclosureSelectionActivity-is_a-DisclosureActivity）；DisclosureTruncationActivity（semantic kind=activity、バックボーン DisclosureTruncationActivity-is_a-DisclosureActivity）。両端条件：DisclosureSelectionActivity の条件：「candidate output を evaluate し disclosure selection decision を生成する disclosure activity」；DisclosureTruncationActivity の条件：「selected output window に従い range を保持し omitted range を記録する disclosure activity」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-disclosure-selection-activity-006
parent_relation:
  id: DisclosureSelectionActivity-is_a-DisclosureActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 披露选择活动属于输出披露活动
    en: disclosure selection activity is an output disclosure activity
    ja: 開示選択活動は出力開示活動である
  definitions:
    zh: 当且仅当一项活动对候选输出、受众、窗口和治理条件求值并生成 DisclosureSelectionDecision 时，它作为 DisclosureActivity 的选择子类。
    en: DisclosureSelectionActivity is a DisclosureActivity subtype exactly when the activity evaluates candidate output, audience, window, and governing conditions and produces a DisclosureSelectionDecision.
    ja: 候補出力・受け手・window・governing condition を評価し DisclosureSelectionDecision を生成する活動だけを DisclosureActivity の選択 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: is_target_of_is_a
    labels:
      zh: 反向读取：披露选择活动属于输出披露活动
      en: inverse reading of disclosure selection activity is an output disclosure activity
      ja: 開示選択活動は出力開示活動であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureSelectionActivity-is_a-DisclosureActivity-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 确认披露选择活动属于输出披露活动
        en: Confirm disclosure selection activity is an output disclosure activity
        ja: 開示選択活動は出力開示活動であるを確認
      scenario_id: output-disclosure-disclosureselectionactivity-is_a-disclosureactivity-positive
      descriptions:
        zh: selection-884 对候选集和 user-7 求值后生成 decision-884，活动具有开始、结束与状态。
        en: selection-884 evaluates a candidate set for user-7, produces decision-884, and has activity start, end, and status.
        ja: selection-884 は user-7 の候補集合を評価し decision-884 を生成し、activity の開始・終了・状態を持ちます。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosureSelectionActivity-is_a-DisclosureActivity
      expected_result:
        zh: 将 selection-884 归入 DisclosureSelectionActivity 与 DisclosureActivity。
        en: Classify selection-884 as both DisclosureSelectionActivity and DisclosureActivity.
        ja: selection-884 を DisclosureSelectionActivity と DisclosureActivity に分類します。
      why_valid_or_invalid:
        zh: 它继承活动身份并具有生成披露选择决定这一明确种差。
        en: It inherits activity identity and has the explicit differentia of producing a disclosure-selection decision.
        ja: activity の同一性を継承し、開示選択判断を生成する明確な種差を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-selection-activity-003
        - claim-disclosure-selection-activity-001
    - id: DisclosureSelectionActivity-is_a-DisclosureActivity-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 拒绝误判披露选择活动属于输出披露活动
        en: Reject a false disclosure selection activity is an output disclosure activity
        ja: 開示選択活動は出力開示活動であるの誤判定を拒否
      scenario_id: output-disclosure-disclosureselectionactivity-is_a-disclosureactivity-boundary
      descriptions:
        zh: decision-884 只有处置、理由与决定时间，没有活动时段，也不执行候选求值。
        en: decision-884 has a disposition, rationale, and decision time but no activity interval and performs no candidate evaluation.
        ja: decision-884 は処置・理由・判断時刻を持ちますが activity interval や候補評価を持ちません。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosureSelectionActivity-is_a-DisclosureActivity
      expected_result:
        zh: 只保留 DisclosureSelectionDecision，不沿该分类边建立活动类型。
        en: Keep only DisclosureSelectionDecision and do not assert this activity classification.
        ja: DisclosureSelectionDecision のみ保持し、この活動分類を主張しません。
      why_valid_or_invalid:
        zh: 决定是活动产物而非活动子类，二者身份条件不可互换。
        en: A decision is an activity result, not an activity subtype; their identity conditions are not interchangeable.
        ja: 判断は活動結果であり活動 subtype ではなく、同一性条件を交換できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-selection-activity-003
        - claim-disclosure-selection-activity-001
  source_claims:
    - claim-disclosure-selection-activity-003
    - claim-disclosure-selection-activity-001
