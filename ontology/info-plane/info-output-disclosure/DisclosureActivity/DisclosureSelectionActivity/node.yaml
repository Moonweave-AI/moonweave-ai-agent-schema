schema: moonweave.ai/ontology-node/v1
id: DisclosureSelectionActivity
kind: concept
labels:
  zh: 披露选择活动
  en: disclosure selection activity
  ja: 開示選択活動
semantics:
  short_definition:
    zh: 从源输出中选择可披露片段的披露活动。
    en: Disclosure activity that selects disclosable fragments from source output.
    ja: source output から開示可能 fragment を選択する disclosure activity。
  definition:
    zh: DisclosureSelectionActivity 消费 DisclosureSelectionDecision 与 OutputWindow 规范，在源输出坐标系中标记 display 或 omit 范围；对应从 OpenAI output[] 挑选 message 项或 Anthropic content block 子集。
    en: DisclosureSelectionActivity applies DisclosureSelectionDecision and OutputWindow specs to mark display or omit ranges in source coordinates—selecting OpenAI output[] items or Anthropic content-block subsets.
    ja: DisclosureSelectionActivity は selection decision に基づき display/omit range を标记。
  why_needed:
    zh: 把求值活动与决定记录分开，可记录重算、不同输入和决定版本。
    en: Separating evaluation activity from decision record preserves reevaluation, changed input, and decision revisions.
    ja: evaluation activity と decision record を分け reevaluation・changed input・decision revision を保持します。
  includes:
    - zh: 对输出片段进行受众适用性、窗口限制、相关性与策略结果求值。
      en: Evaluation of output segments for audience applicability, window limits, relevance, and policy result.
      ja: output segment の audience applicability・window limit・relevance・policy result evaluation。
  excludes:
    - zh: 内容发布、输出生成、长期策略编写和仅由人工口头表达的偏好。
      en: Content publication, output generation, durable policy authoring, and an unrecorded verbal preference.
      ja: content publication・output generation・durable policy authoring・unrecorded verbal preference。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 选择阶段不修改源字节，只产生 DisclosedOutputSegment 或 omit 记录。
    en: Selection stage does not mutate source bytes—only DisclosedOutputSegment or omit records.
    ja: 選択段階は source bytes を変更しない。
  typical_input:
    - description: Selection activity
      format: '{"disclosure_activity_id":"disclose-select-204","disposition_kind":"display","source_range":"output[0].content[0].text:0..479"}'
      source_claims:
        - claim-disclosure-select-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: candidate_set_ref
      labels:
        zh: 候选集引用
        en: candidate-set reference
        ja: candidate-set reference
      definitions:
        zh: 引用本次被逐项求值的候选 OutputInformation 集。
        en: References the candidate OutputInformation set evaluated in this activity.
        ja: activity で evaluate する candidate OutputInformation set を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: candidate-set-884
      allowed_values: []
      source_claims:
        - claim-disclosure-selection-activity-003
  constraints: []
  required_relations: []
examples:
  - id: DisclosureSelectionActivity-example-openai-item
    labels:
      zh: OpenAI output 项选择
      en: OpenAI output item selection
      ja: OpenAI output item 選択
    descriptions:
      zh: 选择 response.output[0] type=message 的 output_text 范围 chars:0..479。
      en: Select output_text range chars:0..479 from response.output[0] type=message.
      ja: OpenAI output item 選択。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/responses
      version: output[] selection
    field_values: {}
    related_node_ids:
      - DisclosureSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-select-openai
  - id: DisclosureSelectionActivity-example-anthropic-text-block
    labels:
      zh: Anthropic text block 选择
      en: Anthropic text block selection
      ja: Anthropic text block 選択
    descriptions:
      zh: 对外部用户只选择 assistant text block chars:0..59。
      en: Select only assistant text block chars:0..59 for external users.
      ja: text block 選択。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: content block selection
    field_values: {}
    related_node_ids:
      - DisclosureSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-select-anthropic
  - id: DisclosureSelectionActivity-example-omit
    labels:
      zh: 显式 omit 范围
      en: Explicit omit range
      ja: 明示 omit range
    descriptions:
      zh: 内部 reasoning output item 标记 omit 并记录未处理原因。
      en: Internal reasoning output item marked omit with recorded reason.
      ja: reasoning item omit。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: omit disposition
    field_values: {}
    related_node_ids:
      - DisclosureSelectionActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-select-design
parent_relation:
  id: DisclosureSelectionActivity-is_a-DisclosureActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 披露选择活动属于输出披露活动
    en: disclosure selection activity is an output disclosure activity
    ja: 開示選択活動は出力開示活動である
  definitions:
    zh: 当且仅当一项活动对候选输出、受众、窗口和治理条件求值并生成 DisclosureSelectionDecision 时，它作为 DisclosureActivity 的选择子类。
    en: DisclosureSelectionActivity is a DisclosureActivity subtype exactly when the activity evaluates candidate output, audience, window, and governing conditions and produces a DisclosureSelectionDecision.
    ja: 候補出力・受け手・window・governing condition を評価し DisclosureSelectionDecision を生成する活動だけを DisclosureActivity の選択 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：披露选择活动属于输出披露活动
      en: inverse reading of disclosure selection activity is an output disclosure activity
      ja: 開示選択活動は出力開示活動であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureSelectionActivity-is_a-DisclosureActivity-example-positive-manual-20260716
      labels:
        zh: 确认披露选择活动属于输出披露活动
        en: Confirm disclosure selection activity is an output disclosure activity
        ja: 開示選択活動は出力開示活動であるを確認
      descriptions:
        zh: selection-884 对候选集和 user-7 求值后生成 decision-884，活动具有开始、结束与状态。
        en: selection-884 evaluates a candidate set for user-7, produces decision-884, and has activity start, end, and status.
        ja: selection-884 は user-7 の候補集合を評価し decision-884 を生成し、activity の開始・終了・状態を持ちます。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosureSelectionActivity-is_a-DisclosureActivity
      source_claims:
        - claim-disclosure-selection-activity-003
        - claim-disclosure-selection-activity-001
    - id: DisclosureSelectionActivity-is_a-DisclosureActivity-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判披露选择活动属于输出披露活动
        en: Reject a false disclosure selection activity is an output disclosure activity
        ja: 開示選択活動は出力開示活動であるの誤判定を拒否
      descriptions:
        zh: decision-884 只有处置、理由与决定时间，没有活动时段，也不执行候选求值。
        en: decision-884 has a disposition, rationale, and decision time but no activity interval and performs no candidate evaluation.
        ja: decision-884 は処置・理由・判断時刻を持ちますが activity interval や候補評価を持ちません。
      field_values: {}
      related_node_ids:
        - DisclosureSelectionActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosureSelectionActivity-is_a-DisclosureActivity
      source_claims:
        - claim-disclosure-selection-activity-003
        - claim-disclosure-selection-activity-001
  source_claims:
    - claim-disclosure-selection-activity-003
    - claim-disclosure-selection-activity-001
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-openai-responses
    title: OpenAI Responses API Reference
    publisher: OpenAI
    url: https://platform.openai.com/docs/api-reference/responses
    source_type: official-doc
    relevance: response.output[] typed items and output_text aggregation.
  - id: src-anthropic-messages
    title: Anthropic Messages API Reference
    publisher: Anthropic
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Assistant content blocks and streaming content_block_delta.
  - id: src-info-output-design
    title: Moonweave info-output-disclosure module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Audience-bound disclosure after model output is produced.
source_claims:
  - id: claim-disclosure-selection-activity-001
    source: eng-policy-opa
    supports: OPA decision logs distinguish policy query input, result, decision identifier, requester, timestamp, and erased or masked fields. Moonweave uses that evidence to keep a disclosure selection decision separate from the disclosure activity and from the record of what was finally displayed.
    locator: Open Policy Agent documentation, Management > Decision Logs, event fields and masking
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-activity-002
    source: eng-security-nist-abac
    supports: NIST SP 800-162 evaluates subject, object, requested operation, environment, policy, and rules to compute an authorization decision. Moonweave uses the same separation when an audience, output object, display operation, and environment determine whether output is published, truncated, or suppressed.
    locator: NIST SP 800-162 Sections 2.1-2.3 and Figure 2, basic ABAC scenario
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-activity-003
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-activity-004
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents context-engineering documentation describes replacing a large result with a bounded preview and a stable file reference while preserving access to the complete stored output. Moonweave uses this as evidence for output-window specifications and separately recorded omitted ranges, not as a definition of Moonweave's window classes.
    locator: Deep Agents JavaScript documentation, Context engineering > Offloading, large tool result preview
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-activity-005
    source: eng-ont-prov-o
    supports: PROV-O permits separate Activities to use the same candidate Entity and generate different result Entities. Moonweave therefore keeps DisclosureSelectionActivity, which generates a selection decision, distinct from DisclosureSuppressionActivity, which executes a withheld disposition under a governing decision.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-selection-activity-006
    source: eng-ont-prov-o
    supports: PROV-O distinguishes the generating Activity from the generated Entity and can relate later Activities through used. Moonweave treats selection as the decision-producing Activity and truncation as a subsequent range-transforming Activity governed by that decision; this workflow specialization is not asserted by PROV-O.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-select-openai
    source: src-openai-responses
    supports: OpenAI output[] typed items can be individually selected for disclosure.
    locator: output[]
    evidence_kind: primary-api
    confidence: high
  - id: claim-disclosure-select-anthropic
    source: src-anthropic-messages
    supports: Anthropic assistant content blocks can be selected independently for audience views.
    locator: content blocks
    evidence_kind: primary-api
    confidence: high
  - id: claim-disclosure-select-design
    source: src-info-output-design
    supports: DisclosureSelectionActivity marks display/omit ranges without mutating source output.
    locator: selection activity
    evidence_kind: design-inference
    confidence: high
