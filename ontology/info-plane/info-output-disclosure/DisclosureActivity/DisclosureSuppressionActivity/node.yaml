      source_claims:
        - claim-disclosure-suppression-activity-001
        - claim-disclosure-suppression-activity-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureSuppressionActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 隐藏访问令牌
      en: Withhold an access token
      ja: access token を withhold
    scenario_id: null
    descriptions:
      zh: suppress-884 根据 decision-884 和 secret-rule-3，把 output-segment-17 的令牌范围标记为 SuppressedContext，不向 user-7 发布。
      en: suppress-884 follows decision-884 and secret-rule-3, marks the token range in output-segment-17 as SuppressedContext, and does not publish it to user-7.
      ja: suppress-884 は decision-884/secret-rule-3 に従い token range を SuppressedContext とし user-7 に publish しません。
    field_values:
      governing_decision_ref: decision-884
      disclosure_activity_id: suppress-884
      source_output_ref: output-segment-17
      audience_ref: user-7
      started_at: 2026-07-16T04:00:00Z
      status: completed
    related_node_ids:
      - DisclosureSuppressionActivity
      - SuppressedContext
    related_relation_ids:
      - DisclosureSuppressionActivity-produces-SuppressedContext
    expected_result:
      zh: 建立抑制活动、处置内容和规则证据。
      en: Create the suppression activity, disposition content, and rule evidence.
      ja: suppression activity・disposition content・rule evidence を作成します。
    why_valid_or_invalid:
      zh: 具体决定、规则、范围和受众共同证明 withheld 处置。
      en: Concrete decision, rule, range, and audience jointly prove the withheld disposition.
      ja: decision・rule・range・audience が withheld disposition を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-suppression-activity-001
      - claim-disclosure-suppression-activity-002
  - id: DisclosureSuppressionActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 默认折叠详细日志
      en: Collapsed detail log
      ja: collapsed detail log
    scenario_id: output-disclosure-disclosuresuppressionactivity-boundary
    descriptions:
      zh: 界面默认折叠详细日志，但用户可展开查看，且没有拒绝或隐藏决定。
      en: The UI collapses detailed logs by default, but the user can expand them and no deny or withhold decision exists.
      ja: UI は detail log を default collapse しますが user は展開でき deny/withhold decision はありません。
    field_values: {}
    related_node_ids:
      - DisclosureSuppressionActivity
    related_relation_ids: []
    expected_result:
      zh: 不得为可展开详情创建披露抑制活动。
      en: Do not create a disclosure-suppression activity.
      ja: disclosure suppression activity を作成しません。
    why_valid_or_invalid:
      zh: 可展开的展示状态没有阻止受众访问内容。
      en: A reversible display state does not prevent the audience from accessing content.
      ja: reversible display state は audience access を防ぎません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-suppression-activity-002
