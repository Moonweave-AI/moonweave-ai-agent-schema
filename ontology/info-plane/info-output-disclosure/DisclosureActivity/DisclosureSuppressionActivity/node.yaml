sibling_differentiation:
  - sibling_concept_id: DisclosureTruncationActivity
    shared_parent_concept_id: DisclosureActivity
    differentia:
      zh: 已审查兄弟区分：父节点 DisclosureActivity：DisclosureSuppressionActivity（semantic kind=activity，骨架 DisclosureSuppressionActivity-is_a-DisclosureActivity）；DisclosureTruncationActivity（semantic kind=activity，骨架 DisclosureTruncationActivity-is_a-DisclosureActivity）。双端条件：DisclosureSuppressionActivity 条件：“依据披露决定阻止候选内容到达指定受众的披露活动”；DisclosureTruncationActivity 条件：“按照已选输出窗口保留部分范围并记录省略范围的披露活动”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent DisclosureActivity: DisclosureSuppressionActivity (semantic kind=activity, backbone DisclosureSuppressionActivity-is_a-DisclosureActivity); DisclosureTruncationActivity (semantic kind=activity, backbone DisclosureTruncationActivity-is_a-DisclosureActivity). Endpoint conditions: DisclosureSuppressionActivity condition: “A disclosure activity that prevents candidate content from reaching an audience under a disclosure decision”; DisclosureTruncationActivity condition: “A disclosure activity that retains ranges under a selected output window and records omitted ranges”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 DisclosureActivity：DisclosureSuppressionActivity（semantic kind=activity、バックボーン DisclosureSuppressionActivity-is_a-DisclosureActivity）；DisclosureTruncationActivity（semantic kind=activity、バックボーン DisclosureTruncationActivity-is_a-DisclosureActivity）。両端条件：DisclosureSuppressionActivity の条件：「disclosure decision に基づき candidate content が audience に届くことを防ぐ disclosure activity」；DisclosureTruncationActivity の条件：「selected output window に従い range を保持し omitted range を記録する disclosure activity」。一方の成立は他方を証明しません。
    source_claims:
      - claim-disclosure-suppression-activity-004
