schema: moonweave.ai/ontology-node/v1
id: DisclosureSuppressionActivity
kind: concept
status: accepted
labels:
  zh: 披露抑制活动
  en: disclosure suppression activity
  ja: 開示抑制活動
semantics:
  short_definition:
    zh: 依据披露决定阻止候选内容到达指定受众的披露活动。
    en: A disclosure activity that prevents candidate content from reaching an audience under a disclosure decision.
    ja: disclosure decision に基づき candidate content が audience に届くことを防ぐ disclosure activity。
  definition:
    zh: 披露抑制活动是 DisclosureActivity 的子类，其种差是根据授权、隐私、安全或信任规则把候选内容判为 withheld，并生成 SuppressedContext 处置记录；它不同于因长度不足而截断，也不同于删除源输出。
    en: A DisclosureSuppressionActivity is a DisclosureActivity distinguished by withholding candidate content under authorization, privacy, safety, or trust rules and generating a SuppressedContext disposition record. It differs from length-based truncation and from deleting source output.
    ja: DisclosureSuppressionActivity は authorization/privacy/safety/trust rule により candidate content を withheld とし SuppressedContext を生成する subtype です。length truncation や source deletion とは異なります。
  why_needed:
    zh: 显式抑制活动使未显示内容的政策依据和执行事实均可审计。
    en: An explicit suppression activity makes both policy basis and execution fact auditable for content that was not shown.
    ja: explicit suppression activity により not-shown content の policy basis/execution fact を audit できます。
  includes:
    - zh: 隐藏密钥、个人信息、越权数据、恶意工具输出或不适合当前受众的内容。
      en: Withholding secrets, personal data, unauthorized data, malicious tool output, or content unsuitable for the current audience.
      ja: secret・personal data・unauthorized data・malicious tool output・audience-inappropriate content の withholding。
  excludes:
    - zh: 仅因长度限制省略中间行、用户界面折叠但仍可访问，以及删除源工件。
      en: Omitting middle lines only for length, a collapsible UI region that remains accessible, and deletion of the source artifact.
      ja: length-only middle omission・still-accessible collapsed UI・source artifact deletion。
  semantic_kind: activity
  aliases: []
