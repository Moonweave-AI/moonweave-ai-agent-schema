schema: moonweave.ai/ontology-node/v1
id: DisclosureRecord
kind: concept
labels:
  zh: 输出披露记录
  en: output disclosure record
  ja: 出力開示記録
semantics:
  short_definition:
    zh: 一次披露活动对特定受众的可审计结果记录。
    en: Auditable outcome record of one disclosure activity for a specific audience.
    ja: 一回 disclosure activity の特定 audience 向け auditable outcome record。
  definition:
    zh: DisclosureRecord 汇总 source_output_id、audience_id、dispositions 与 coverage_complete；用于回答“该受众实际看到什么”。它不是源输出全文或内部审查视图的外推。
    en: DisclosureRecord aggregates source_output_id, audience_id, dispositions, and coverage_complete to answer what that audience actually saw. It is not full source output or extrapolated internal review views.
    ja: DisclosureRecord は audience ごとの実際表示を再構成。
  why_needed:
    zh: 统一审计记录使查询能从一个活动追到决定、三种内容处置、接收受众和边界越过，同时保持记录与内容本身分离。
    en: A unified audit record lets a query follow one activity to its decision, three content dispositions, recipient, and boundary crossing while keeping the record separate from content itself.
    ja: 統一監査記録により一活動から判断・三処置・受信者・境界通過へ追跡し、記録と内容自体を分離します。
  includes:
    - zh: 包含活动与决定引用、受众、来源输出、处置结果摘要和可选 BoundaryCrossing 的不可变审计条目。
      en: Immutable audit entries containing activity and decision references, audience, source output, disposition-result digest, and an optional BoundaryCrossing.
      ja: activity/decision 参照・audience・source output・disposition result digest・任意 BoundaryCrossing を含む不変監査 entry。
  excludes:
    - zh: 披露正文、被抑制内容的明文副本、策略规则、选择决定本身、执行活动和一般运行日志行。
      en: Disclosed body content, plaintext copies of suppressed content, policy rules, the selection decision itself, execution activities, and ordinary runtime log lines.
      ja: 開示本文・抑制内容の平文 copy・policy rule・selection decision 自体・execution activity・一般 runtime log line。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: coverage_complete=true 要求 disposition 范围非重叠且无缺口；audience 不一致时不得混用 record。
    en: coverage_complete=true requires non-overlapping gap-free disposition ranges; records must not merge across audiences.
    ja: coverage_complete は range closure。
  typical_input:
    - description: Disclosure record
      format: '{"disclosure_record_id":"record-204","disclosure_activity_id":"disclose/run-204","audience_id":"actor/customer-support-7","coverage_complete":true}'
      source_claims:
        - claim-disclosure-record-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: activity_ref
      labels:
        zh: 披露活动引用
        en: disclosure-activity reference
        ja: 開示活動参照
      definitions:
        zh: 引用产生本记录的一次 DisclosureActivity。
        en: References the DisclosureActivity that generated this record.
        ja: 本記録を生成した DisclosureActivity を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: disclosure-884
      allowed_values: []
      source_claims:
        - claim-disclosure-record-001
    - id: decision_ref
      labels:
        zh: 披露决定引用
        en: disclosure-decision reference
        ja: 開示判断参照
      definitions:
        zh: 引用本次处置所依据的 DisclosureSelectionDecision。
        en: References the DisclosureSelectionDecision on which the disposition was based.
        ja: 処置の根拠となる DisclosureSelectionDecision を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: decision-884
      allowed_values: []
      source_claims:
        - claim-disclosure-record-002
    - id: audience_ref
      labels:
        zh: 审计受众引用
        en: audited-audience reference
        ja: 監査受け手参照
      definitions:
        zh: 引用本记录核算其可见范围的 Actor 或受众组。
        en: References the Actor or audience group whose visible extent this record accounts for.
        ja: 本記録が可視範囲を会計する Actor または受け手群を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: user-7
      allowed_values: []
      source_claims:
        - claim-disclosure-record-005
    - id: source_output_ref
      labels:
        zh: 审计来源输出引用
        en: audited-source-output reference
        ja: 監査元出力参照
      definitions:
        zh: 引用被处置但未由记录修改的来源输出。
        en: References the source output dispositioned but not modified by the record.
        ja: 処置対象であり記録が変更しない source output を参照します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-41
      allowed_values: []
      source_claims:
        - claim-disclosure-record-003
        - claim-disclosure-record-001
    - id: recorded_at
      labels:
        zh: 记录时间
        en: recorded at
        ja: 記録時刻
      definitions:
        zh: 记录审计条目成为不可变事实的时间。
        en: Records when the audit entry became an immutable fact.
        ja: 監査 entry が不変事実となった時刻を記録します。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:02Z
      allowed_values: []
      source_claims:
        - claim-disclosure-record-002
        - claim-disclosure-record-001
    - id: outcome_digest
      labels:
        zh: 处置结果摘要
        en: disposition-outcome digest
        ja: 処置結果 digest
      definitions:
        zh: 汇总已发布、抑制与截断范围及其决定的稳定摘要。
        en: Provides a stable digest over published, suppressed, and truncated extents and their decision.
        ja: published・suppressed・truncated 範囲と判断の安定 digest を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sha256:disclosure-884
      allowed_values: []
      source_claims:
        - claim-disclosure-record-003
        - claim-disclosure-record-002
  constraints: []
  required_relations: []
examples:
  - id: DisclosureRecord-example-closure
    labels:
      zh: 范围闭包记录
      en: Range-closure record
      ja: range closure record
    descriptions:
      zh: record-204 含 display/suppress/truncate 三段且 coverage_complete=true。
      en: record-204 includes display/suppress/truncate segments with coverage_complete=true.
      ja: closure 完成 record。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: range closure
    field_values: {}
    related_node_ids:
      - DisclosureRecord
    related_relation_ids: []
    source_claims:
      - claim-disclosure-record-design
  - id: DisclosureRecord-example-audience-bound
    labels:
      zh: 受众绑定
      en: Audience-bound
      ja: audience 绑定
    descriptions:
      zh: actor/customer-support-7 的 record 不得满足 actor/customer-external 的查询。
      en: Record for actor/customer-support-7 must not satisfy queries for actor/customer-external.
      ja: audience 混用不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: audience binding
    field_values: {}
    related_node_ids:
      - DisclosureRecord
    related_relation_ids: []
    source_claims:
      - claim-disclosure-record-design
  - id: DisclosureRecord-example-incomplete
    labels:
      zh: 不完整披露拒绝
      en: Incomplete disclosure rejection
      ja: 不完全開示拒否
    descriptions:
      zh: 缺少 suppress 产物时拒绝 coverage_complete=true 断言。
      en: Reject coverage_complete=true when suppress artifact is missing.
      ja: missing suppress 拒否。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: incomplete
    field_values: {}
    related_node_ids:
      - DisclosureRecord
    related_relation_ids: []
    source_claims:
      - claim-disclosure-record-design
parent_relation:
  id: DisclosureActivity-produces-DisclosureRecord
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 输出披露活动产生输出披露记录
    en: output disclosure activity produces an output disclosure record
    ja: 出力開示活動が出力開示記録を生成する
  definitions:
    zh: 该关系表示一次披露活动完成或终止时生成一条不可变 DisclosureRecord，用来汇总活动身份、决定、受众和实际处置结果。
    en: This relation states that a disclosure activity generates an immutable DisclosureRecord on completion or termination to summarize activity identity, decision, audience, and actual dispositions.
    ja: 開示活動が完了または終了時に不変 DisclosureRecord を生成し activity identity・decision・audience・actual disposition を要約することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：输出披露活动产生输出披露记录
      en: inverse reading of output disclosure activity produces an output disclosure record
      ja: 出力開示活動が出力開示記録を生成するの逆読み
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureActivity-produces-DisclosureRecord-example-positive-manual-20260716
      labels:
        zh: 确认输出披露活动产生输出披露记录
        en: Confirm output disclosure activity produces an output disclosure record
        ja: 出力開示活動が出力開示記録を生成するを確認
      descriptions:
        zh: disclosure-884 完成后生成 record-884，活动 ID、受众和时间范围对应。
        en: disclosure-884 generates record-884 on completion, with matching activity ID, audience, and time interval.
        ja: disclosure-884 完了時に record-884 を生成し activity ID・audience・time interval が一致します。
      field_values: {}
      related_node_ids:
        - DisclosureActivity
        - DisclosureRecord
      related_relation_ids:
        - DisclosureActivity-produces-DisclosureRecord
      source_claims:
        - claim-disclosure-record-001
        - claim-disclosure-record-002
    - id: DisclosureActivity-produces-DisclosureRecord-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判输出披露活动产生输出披露记录
        en: Reject a false output disclosure activity produces an output disclosure record
        ja: 出力開示活動が出力開示記録を生成するの誤判定を拒否
      descriptions:
        zh: record-900 从外部审计系统导入，没有本系统 DisclosureActivity 引用。
        en: record-900 is imported from an external audit system and references no local DisclosureActivity.
        ja: record-900 は外部 audit system から import され local DisclosureActivity を参照しません。
      field_values: {}
      related_node_ids:
        - DisclosureActivity
        - DisclosureRecord
      related_relation_ids:
        - DisclosureActivity-produces-DisclosureRecord
      source_claims:
        - claim-disclosure-record-001
        - claim-disclosure-record-002
  source_claims:
    - claim-disclosure-record-001
    - claim-disclosure-record-002
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: DisclosureRecord-records_control-DisclosureControlActivity
    predicate: records_control
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录披露控制活动
      en: records disclosure-control activity
      ja: 開示制御活動を記録する
    definitions:
      zh: DisclosureRecord 通过稳定执行引用标识其审计的具体 DisclosureControlActivity；仅共享追踪标识、规则或时间窗口而无法唯一定位活动时，不建立此边。
      en: A DisclosureRecord identifies the particular DisclosureControlActivity it audits through a stable execution reference; sharing only a trace identifier, rule, or time window without uniquely resolving the activity does not assert this edge.
      ja: DisclosureRecord は安定した execution reference により監査対象の特定 DisclosureControlActivity を識別します。trace identifier・rule・time window の共有だけで activity を一意に解決できない場合、この edge は成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个记录可汇总同一披露决定编排的多个控制活动，而活动也可被增量审计记录引用，因此不施加统一基数。
      en: One record may summarize several control activities orchestrated by one disclosure decision, while an activity may be referenced by incremental audit records, so no universal cardinality is imposed.
      ja: 一つの record が同一 disclosure decision による複数 control activity を要約でき、activity も増分 audit record から参照され得るため、一律 cardinality を課しません。
    inverse_reading:
      predicate: recorded_by_disclosure_record
      labels:
        zh: 由披露记录记载
        en: recorded by disclosure record
        ja: 開示記録に記載される
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureRecord-records_control-DisclosureControlActivity-example-positive-001
        labels:
          zh: 记录凭据过滤执行
          en: Credential-filter execution recorded
          ja: 資格情報 filter 実行の記録
        descriptions:
          zh: disclosure_record_44 保存 control_activity_ref=filter_run_44，并同时记录规则修订、受众、来源输出、处置摘要与时间。
          en: disclosure_record_44 stores control_activity_ref=filter_run_44 together with rule revision, audience, source output, disposition digest, and time.
          ja: disclosure_record_44 は control_activity_ref=filter_run_44 と rule revision・audience・source output・disposition digest・time を記録します。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - DisclosureControlActivity
        related_relation_ids:
          - DisclosureRecord-records_control-DisclosureControlActivity
        source_claims:
          - claim-disclosure-record-006
      - id: DisclosureRecord-records_control-DisclosureControlActivity-example-boundary-001
        labels:
          zh: 仅共享追踪标识
          en: Shared trace only
          ja: trace 共有のみ
        descriptions:
          zh: disclosure_record_45 与三个并行过滤运行共享 trace_45，但没有能唯一定位某次活动的引用。
          en: disclosure_record_45 shares trace_45 with three concurrent filter runs but has no reference that uniquely resolves one activity.
          ja: disclosure_record_45 は三つの並行 filter run と trace_45 を共有しますが、一つの activity を一意に解決する参照がありません。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - DisclosureControlActivity
        related_relation_ids:
          - DisclosureRecord-records_control-DisclosureControlActivity
        source_claims:
          - claim-disclosure-record-007
    source_claims:
      - claim-disclosure-record-008
    layout_role: cross-link
    target: concept:DisclosureControlActivity
  - id: DisclosureRecord-is_a-AuditRecord
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 输出披露记录属于审计记录
      en: output disclosure record is an audit record
      ja: 出力開示記録は監査記録である
    definitions:
      zh: 能够按不可变标识、时间和结果摘要重建一次披露活动、决定与实际处置的 DisclosureRecord，是 AuditRecord 的披露专用子类。
      en: A DisclosureRecord that reconstructs one disclosure activity, decision, and actual dispositions through immutable ID, time, and outcome digest is a disclosure-specific subtype of AuditRecord.
      ja: 不変 ID・時刻・outcome digest で一回の開示活動・判断・実処置を再構成する DisclosureRecord を AuditRecord の開示専用 subtype とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_is_a
      labels:
        zh: 反向读取：输出披露记录属于审计记录
        en: inverse reading of output disclosure record is an audit record
        ja: 出力開示記録は監査記録であるの逆読み
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureRecord-is_a-AuditRecord-example-positive-manual-20260716
        labels:
          zh: 确认输出披露记录属于审计记录
          en: Confirm output disclosure record is an audit record
          ja: 出力開示記録は監査記録であるを確認
        descriptions:
          zh: record-884 连接 disclosure-884、decision-884、三种处置和 recorded_at。
          en: record-884 links disclosure-884, decision-884, three dispositions, and recorded_at.
          ja: record-884 は disclosure-884・decision-884・三処置・recorded_at を結びます。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - AuditRecord
        related_relation_ids:
          - DisclosureRecord-is_a-AuditRecord
        source_claims:
          - claim-disclosure-record-001
          - claim-disclosure-record-002
      - id: DisclosureRecord-is_a-AuditRecord-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判输出披露记录属于审计记录
          en: Reject a false output disclosure record is an audit record
          ja: 出力開示記録は監査記録であるの誤判定を拒否
        descriptions:
          zh: 普通日志只写 response sent，缺少决定、受众、范围和结果摘要。
          en: An ordinary log says only response sent and lacks decision, audience, extent, and outcome digest.
          ja: 一般 log は response sent だけで decision・audience・extent・outcome digest がありません。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - AuditRecord
        related_relation_ids:
          - DisclosureRecord-is_a-AuditRecord
        source_claims:
          - claim-disclosure-record-001
          - claim-disclosure-record-002
    source_claims:
      - claim-disclosure-record-001
      - claim-disclosure-record-002
    layout_role: secondary-backbone
    target: concept:AuditRecord
  - id: DisclosureRecord-records_crossing-BoundaryCrossing
    predicate: records_crossing
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 输出披露记录记载边界越过
      en: output disclosure record records a boundary crossing
      ja: 出力開示記録が境界通過を記録する
    definitions:
      zh: 当发布把输出从一个信任域交付到另一个信任域时，该关系将 DisclosureRecord 连接到记录相同主体、方向、资源和时间的 BoundaryCrossing。
      en: When publication delivers output across trust zones, this relation links DisclosureRecord to a BoundaryCrossing with matching subject, direction, resource, and time.
      ja: 公開が trust zone 間で出力を配送した場合、DisclosureRecord を同じ subject・direction・resource・time の BoundaryCrossing に結びます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_records_crossing
      labels:
        zh: 反向读取：输出披露记录记载边界越过
        en: inverse reading of output disclosure record records a boundary crossing
        ja: 出力開示記録が境界通過を記録するの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureRecord-records_crossing-BoundaryCrossing-example-positive-manual-20260716
        labels:
          zh: 确认输出披露记录记载边界越过
          en: Confirm output disclosure record records a boundary crossing
          ja: 出力開示記録が境界通過を記録するを確認
        descriptions:
          zh: record-884 记载 user-7 接收 segment-77，crossing-884 同时记录 internal→external 边界与相同摘要。
          en: record-884 records user-7 receiving segment-77, while crossing-884 records internal-to-external passage with the same digest.
          ja: record-884 は user-7 の segment-77 受信を記録し crossing-884 は同じ digest の internal→external 通過を記録します。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - BoundaryCrossing
        related_relation_ids:
          - DisclosureRecord-records_crossing-BoundaryCrossing
        source_claims:
          - claim-disclosure-record-004
          - claim-disclosure-record-001
      - id: DisclosureRecord-records_crossing-BoundaryCrossing-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判输出披露记录记载边界越过
          en: Reject a false output disclosure record records a boundary crossing
          ja: 出力開示記録が境界通過を記録するの誤判定を拒否
        descriptions:
