schema: moonweave.ai/ontology-node/v1
id: DisclosureRecord
kind: concept
status: accepted
labels:
  zh: 输出披露记录
  en: output disclosure record
  ja: 出力開示記録
semantics:
  short_definition:
    zh: 汇总一次披露活动、其决定、受众、处置内容与边界越过事实的审计记录。
    en: An audit record summarizing one disclosure activity, its decision, audience, disposition content, and boundary crossing.
    ja: 一回の開示活動、その判断・受け手・処置内容・境界通過をまとめる監査記録です。
  definition:
    zh: 输出披露记录是一条可审计记录，也是 AuditRecord 的子类。它沿用 AuditRecord.record_id，并以 record_kind=disclosure、发生时间、运行关联和来源形成可查询的审计身份；披露活动、选择决定、受众、来源输出和结果摘要构成披露专用种差，而不是第二个 disclosure_record_id。它把实际处置内容与治理决定连接成事后证据，但不承载被披露或被抑制内容本身、不执行任何处置，也不能仅凭 allow 决定断言发布成功。
    en: A DisclosureRecord is an auditable record and an AuditRecord subtype. It retains AuditRecord.record_id, while record_kind=disclosure, occurrence time, runtime correlation, and provenance form its queryable audit identity. Its disclosure activity, selection decision, audience, source output, and outcome digest are disclosure-specific differentia rather than a second disclosure_record_id. It joins actual disposition content to its governing decision as after-the-fact evidence, but carries no disclosed body, performs no disposition, and cannot infer successful publication from an allow decision alone.
    ja: DisclosureRecord は監査可能な記録であり、AuditRecord の subtype です。AuditRecord.record_id を継承し、record_kind=disclosure・発生時刻・runtime correlation・provenance が照会可能な監査 identity を構成します。disclosure activity・selection decision・audience・source output・outcome digest は開示固有の種差であり、第二の disclosure_record_id ではありません。実処置内容と判断を事後証拠として結びますが、開示本文を運ばず処置を実行せず、allow 判断だけから公開成功を推論しません。
  why_needed:
    zh: 统一审计记录使查询能从一个活动追到决定、三种内容处置、接收受众和边界越过，同时保持记录与内容本身分离。
    en: A unified audit record lets a query follow one activity to its decision, three content dispositions, recipient, and boundary crossing while keeping the record separate from content itself.
    ja: 統一監査記録により一活動から判断・三処置・受信者・境界通過へ追跡し、記録と内容自体を分離します。
  includes:
    - zh: 包含活动与决定引用、受众、来源输出、处置结果摘要和可选 BoundaryCrossing 的不可变审计条目。
      en: Immutable audit entries containing activity and decision references, audience, source output, disposition-result digest, and an optional BoundaryCrossing.
      ja: activity/decision 参照・audience・source output・disposition result digest・任意 BoundaryCrossing を含む不変監査 entry。
  excludes:
    - zh: 披露正文、被抑制内容的明文副本、策略规则、选择决定本身、执行活动和一般运行日志行。
      en: Disclosed body content, plaintext copies of suppressed content, policy rules, the selection decision itself, execution activities, and ordinary runtime log lines.
      ja: 開示本文・抑制内容の平文 copy・policy rule・selection decision 自体・execution activity・一般 runtime log line。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: activity_ref
      labels:
        zh: 披露活动引用
        en: disclosure-activity reference
        ja: 開示活動参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生本记录的一次 DisclosureActivity。
        en: References the DisclosureActivity that generated this record.
        ja: 本記録を生成した DisclosureActivity を参照します。
      allowed_values: []
      pattern: null
      example_value: disclosure-884
      source_claims:
        - claim-disclosure-record-001
    - id: decision_ref
      labels:
        zh: 披露决定引用
        en: disclosure-decision reference
        ja: 開示判断参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次处置所依据的 DisclosureSelectionDecision。
        en: References the DisclosureSelectionDecision on which the disposition was based.
        ja: 処置の根拠となる DisclosureSelectionDecision を参照します。
      allowed_values: []
      pattern: null
      example_value: decision-884
      source_claims:
        - claim-disclosure-record-002
    - id: audience_ref
      labels:
        zh: 审计受众引用
        en: audited-audience reference
        ja: 監査受け手参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本记录核算其可见范围的 Actor 或受众组。
        en: References the Actor or audience group whose visible extent this record accounts for.
        ja: 本記録が可視範囲を会計する Actor または受け手群を参照します。
      allowed_values: []
      pattern: null
      example_value: user-7
      source_claims:
        - claim-disclosure-record-005
    - id: source_output_ref
      labels:
        zh: 审计来源输出引用
        en: audited-source-output reference
        ja: 監査元出力参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被处置但未由记录修改的来源输出。
        en: References the source output dispositioned but not modified by the record.
        ja: 処置対象であり記録が変更しない source output を参照します。
      allowed_values: []
      pattern: null
      example_value: output-41
      source_claims:
        - claim-disclosure-record-003
        - claim-disclosure-record-001
    - id: recorded_at
      labels:
        zh: 记录时间
        en: recorded at
        ja: 記録時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录审计条目成为不可变事实的时间。
        en: Records when the audit entry became an immutable fact.
        ja: 監査 entry が不変事実となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:02Z
      source_claims:
        - claim-disclosure-record-002
        - claim-disclosure-record-001
    - id: outcome_digest
      labels:
        zh: 处置结果摘要
        en: disposition-outcome digest
        ja: 処置結果 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 汇总已发布、抑制与截断范围及其决定的稳定摘要。
        en: Provides a stable digest over published, suppressed, and truncated extents and their decision.
        ja: published・suppressed・truncated 範囲と判断の安定 digest を記録します。
      allowed_values: []
      pattern: null
      example_value: sha256:disclosure-884
      source_claims:
        - claim-disclosure-record-003
        - claim-disclosure-record-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureRecord-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 审计一次部分披露
      en: Audit one partial disclosure
      ja: 一回の部分開示を監査
    scenario_id: null
    descriptions:
      zh: disclosure-record-884 连接 disclosure-884、decision-884、user-7 和 output-41，记录一个已发布首部、一个抑制令牌范围、一个截断中段以及 crossing-884。
      en: disclosure-record-884 links disclosure-884, decision-884, user-7, and output-41 and records a published head, a suppressed token extent, a truncated middle, and crossing-884.
      ja: disclosure-record-884 は disclosure-884・decision-884・user-7・output-41 を結び、published head・suppressed token・truncated middle・crossing-884 を記録します。
    field_values:
      record_id: disclosure-record-884
      record_kind: disclosure
      observed_at: 2026-07-16T04:00:02Z
      runtime_correlation_ref: disclosure-884
      provenance_ref: decision-884
      activity_ref: disclosure-884
      decision_ref: decision-884
      audience_ref: user-7
      source_output_ref: output-41
      recorded_at: 2026-07-16T04:00:02Z
      outcome_digest: sha256:disclosure-884
    related_node_ids:
      - DisclosureRecord
      - DisclosureSelectionDecision
      - DisclosureArtifact
      - BoundaryCrossing
    related_relation_ids:
      - DisclosureRecord-records_decision-DisclosureSelectionDecision
      - DisclosureRecord-records_disposition-DisclosureArtifact
      - DisclosureRecord-records_crossing-BoundaryCrossing
    expected_result:
      zh: 建立一条从活动和决定到实际处置范围的完整审计记录。
      en: Create one complete audit record from activity and decision to actual disposition extents.
      ja: 活動と判断から実処置範囲までの完全な監査記録を作成します。
    why_valid_or_invalid:
      zh: 活动、决定、受众、来源、三种处置和边界事实均可由同一摘要核对。
      en: Activity, decision, audience, source, three dispositions, and boundary fact can all be reconciled against one digest.
      ja: activity・decision・audience・source・三処置・boundary fact を一 digest で照合できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-record-001
      - claim-disclosure-record-002
      - claim-disclosure-record-004
  - id: DisclosureRecord-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 普通调试日志行
      en: Ordinary debug log line
      ja: 一般 debug log line
    scenario_id: output-disclosure-disclosurerecord-boundary
    descriptions:
      zh: 日志仅写“response sent”，没有披露活动标识、决定、受众、来源输出、处置范围或结果摘要。
      en: A log says only “response sent” and contains no disclosure-activity ID, decision, audience, source output, disposition extent, or outcome digest.
      ja: log は response sent だけで disclosure activity ID・decision・audience・source output・disposition extent・outcome digest がありません。
    field_values: {}
    related_node_ids:
      - AuditRecord
      - DisclosureRecord
    related_relation_ids: []
    expected_result:
      zh: 保留为一般运行日志或观测记录，不建立 DisclosureRecord。
      en: Keep it as an ordinary runtime log or observation and do not create a DisclosureRecord.
      ja: 一般 runtime log/observation として保持し DisclosureRecord を作りません。
    why_valid_or_invalid:
      zh: 它没有重建一次披露所需的决定与处置证据链。
      en: It lacks the decision and disposition evidence chain required to reconstruct one disclosure.
      ja: 一回の開示を再構成する判断・処置証拠 chain がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-record-001
      - claim-disclosure-record-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DisclosureActivity-produces-DisclosureRecord
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 输出披露活动产生输出披露记录
    en: output disclosure activity produces an output disclosure record
    ja: 出力開示活動が出力開示記録を生成する
  definitions:
    zh: 该关系表示一次披露活动完成或终止时生成一条不可变 DisclosureRecord，用来汇总活动身份、决定、受众和实际处置结果。
    en: This relation states that a disclosure activity generates an immutable DisclosureRecord on completion or termination to summarize activity identity, decision, audience, and actual dispositions.
    ja: 開示活動が完了または終了時に不変 DisclosureRecord を生成し activity identity・decision・audience・actual disposition を要約することを表します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: is_target_of_produces
    labels:
      zh: 反向读取：输出披露活动产生输出披露记录
      en: inverse reading of output disclosure activity produces an output disclosure record
      ja: 出力開示活動が出力開示記録を生成するの逆読み
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureActivity-produces-DisclosureRecord-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 确认输出披露活动产生输出披露记录
        en: Confirm output disclosure activity produces an output disclosure record
        ja: 出力開示活動が出力開示記録を生成するを確認
      scenario_id: output-disclosure-disclosureactivity-produces-disclosurerecord-positive
      descriptions:
        zh: disclosure-884 完成后生成 record-884，活动 ID、受众和时间范围对应。
        en: disclosure-884 generates record-884 on completion, with matching activity ID, audience, and time interval.
        ja: disclosure-884 完了時に record-884 を生成し activity ID・audience・time interval が一致します。
      field_values: {}
      related_node_ids:
        - DisclosureActivity
        - DisclosureRecord
      related_relation_ids:
        - DisclosureActivity-produces-DisclosureRecord
      expected_result:
        zh: 记录 disclosure-884 produces record-884。
        en: Record that disclosure-884 produces record-884.
        ja: disclosure-884 produces record-884 を記録します。
      why_valid_or_invalid:
        zh: 记录明确引用活动且形成于活动结束之后，产生沿革完整。
        en: The record explicitly references the activity and is formed after the activity ends, completing generation provenance.
        ja: record は activity を明示参照し終了後に形成され generation provenance が揃います。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-record-001
        - claim-disclosure-record-002
    - id: DisclosureActivity-produces-DisclosureRecord-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 拒绝误判输出披露活动产生输出披露记录
        en: Reject a false output disclosure activity produces an output disclosure record
        ja: 出力開示活動が出力開示記録を生成するの誤判定を拒否
      scenario_id: output-disclosure-disclosureactivity-produces-disclosurerecord-boundary
      descriptions:
        zh: record-900 从外部审计系统导入，没有本系统 DisclosureActivity 引用。
        en: record-900 is imported from an external audit system and references no local DisclosureActivity.
        ja: record-900 は外部 audit system から import され local DisclosureActivity を参照しません。
      field_values: {}
      related_node_ids:
        - DisclosureActivity
        - DisclosureRecord
      related_relation_ids:
        - DisclosureActivity-produces-DisclosureRecord
      expected_result:
        zh: 保留外部记录，但不虚构本地活动产生关系。
        en: Keep the external record but do not invent a local activity-production relation.
        ja: 外部 record を保持し local activity production relation を捏造しません。
      why_valid_or_invalid:
        zh: 审计记录类型相同不能证明其由指定本地活动生成。
        en: Sharing an audit-record type does not prove generation by a specified local activity.
        ja: 同じ audit-record type でも指定 local activity の生成を証明しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-record-001
        - claim-disclosure-record-002
  source_claims:
    - claim-disclosure-record-001
    - claim-disclosure-record-002
  distinct_fact_rationale:
    zh: 本关系只表达所列源端到目标端的具体事实，不把相邻节点、共享受众或时间接近自动推成该事实。
    en: This relation states only the listed source-to-target fact; adjacent nodes, a shared audience, or temporal proximity do not imply it.
    ja: この relation は列挙した source-to-target 事実だけを表し、隣接 node・shared audience・time proximity から自動推論しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: DisclosureRecord-records_control-DisclosureControlActivity
    predicate: records_control
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录披露控制活动
      en: records disclosure-control activity
      ja: 開示制御活動を記録する
    definitions:
      zh: DisclosureRecord 通过稳定执行引用标识其审计的具体 DisclosureControlActivity；仅共享追踪标识、规则或时间窗口而无法唯一定位活动时，不建立此边。
      en: A DisclosureRecord identifies the particular DisclosureControlActivity it audits through a stable execution reference; sharing only a trace identifier, rule, or time window without uniquely resolving the activity does not assert this edge.
      ja: DisclosureRecord は安定した execution reference により監査対象の特定 DisclosureControlActivity を識別します。trace identifier・rule・time window の共有だけで activity を一意に解決できない場合、この edge は成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一个记录可汇总同一披露决定编排的多个控制活动，而活动也可被增量审计记录引用，因此不施加统一基数。
      en: One record may summarize several control activities orchestrated by one disclosure decision, while an activity may be referenced by incremental audit records, so no universal cardinality is imposed.
      ja: 一つの record が同一 disclosure decision による複数 control activity を要約でき、activity も増分 audit record から参照され得るため、一律 cardinality を課しません。
    inverse_reading:
      predicate: recorded_by_disclosure_record
      labels:
        zh: 由披露记录记载
        en: recorded by disclosure record
        ja: 開示記録に記載される
    conditions: []
    temporal_scope: transaction-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureRecord-records_control-DisclosureControlActivity-example-positive-001
        kind: positive
        labels:
          zh: 记录凭据过滤执行
          en: Credential-filter execution recorded
          ja: 資格情報 filter 実行の記録
        scenario_id: null
        descriptions:
          zh: disclosure_record_44 保存 control_activity_ref=filter_run_44，并同时记录规则修订、受众、来源输出、处置摘要与时间。
          en: disclosure_record_44 stores control_activity_ref=filter_run_44 together with rule revision, audience, source output, disposition digest, and time.
          ja: disclosure_record_44 は control_activity_ref=filter_run_44 と rule revision・audience・source output・disposition digest・time を記録します。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - DisclosureControlActivity
        related_relation_ids:
          - DisclosureRecord-records_control-DisclosureControlActivity
        expected_result:
          zh: 建立记录到该过滤运行的信息边。
          en: Assert the information edge from the record to that filter run.
          ja: record から当該 filter run への information edge を成立させます。
        why_valid_or_invalid:
          zh: 稳定执行引用唯一定位被审计活动。
          en: The stable execution reference uniquely identifies the audited activity.
          ja: 安定 execution reference が audited activity を一意に識別します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-disclosure-record-006
      - id: DisclosureRecord-records_control-DisclosureControlActivity-example-boundary-001
        kind: boundary
        labels:
          zh: 仅共享追踪标识
          en: Shared trace only
          ja: trace 共有のみ
        scenario_id: null
        descriptions:
          zh: disclosure_record_45 与三个并行过滤运行共享 trace_45，但没有能唯一定位某次活动的引用。
          en: disclosure_record_45 shares trace_45 with three concurrent filter runs but has no reference that uniquely resolves one activity.
          ja: disclosure_record_45 は三つの並行 filter run と trace_45 を共有しますが、一つの activity を一意に解決する参照がありません。
        field_values: {}
        related_node_ids:
          - DisclosureRecord
          - DisclosureControlActivity
        related_relation_ids:
          - DisclosureRecord-records_control-DisclosureControlActivity
        expected_result:
          zh: 在获得稳定活动引用前不建立边。
          en: Assert no edge until a stable activity reference is available.
          ja: 安定 activity reference が得られるまで edge を成立させません。
        why_valid_or_invalid:
          zh: 追踪共现不能证明记录审计了哪次控制执行。
          en: Trace co-occurrence does not prove which control execution the record audits.
          ja: trace 共起では record がどの control execution を監査するか証明できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-disclosure-record-007
    source_claims:
      - claim-disclosure-record-008
    distinct_fact_rationale:
      zh: AuditRecord 分类只说明记录类型；本边另行标识被审计的具体控制活动。
      en: AuditRecord classification identifies the record type; this edge separately identifies the particular control activity audited.
      ja: AuditRecord 分類は record type のみを示し、この edge は audited control activity を別途特定します。
    layout_role: cross-link
    review_status: accepted
    target: concept:DisclosureControlActivity
  - id: DisclosureRecord-is_a-AuditRecord
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 输出披露记录属于审计记录
      en: output disclosure record is an audit record
      ja: 出力開示記録は監査記録である
