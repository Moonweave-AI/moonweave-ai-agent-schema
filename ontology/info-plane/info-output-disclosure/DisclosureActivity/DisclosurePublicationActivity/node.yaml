schema: moonweave.ai/ontology-node/v1
id: DisclosurePublicationActivity
kind: concept
labels:
  zh: 披露发布活动
  en: disclosure publication activity
  ja: 開示公開活動
semantics:
  short_definition:
    zh: 向受众发布已选中可见片段的披露活动。
    en: Disclosure activity publishing selected visible fragments to an audience.
    ja: 選択済 visible fragment を audience へ publish する disclosure activity。
  definition:
    zh: DisclosurePublicationActivity 把 DisclosedOutputSegment 交付给 audience_id 所指接收者；对应客户端收到 OpenAI 流式 completed 后最终文本、Anthropic 非流式响应体，或 A2A Artifact parts 的可见子集。
    en: DisclosurePublicationActivity delivers DisclosedOutputSegment to audience_id—final text after OpenAI stream completed, Anthropic non-stream body, or visible subset of A2A Artifact parts.
    ja: DisclosurePublicationActivity は DisclosedOutputSegment を deliver。
  why_needed:
    zh: 单独建模发布发生可区分“允许显示”和“已经被谁看到”。
    en: Modeling publication occurrence separately distinguishes permission to display from evidence of who actually saw it.
    ja: publication occurrence を別にし permission to display と actual viewer evidence を区別します。
  includes:
    - zh: 向用户界面、下游智能体、外部 API 或审计接收方交付允许内容。
      en: Delivery of allowed content to a user interface, downstream agent, external API, or audit recipient.
      ja: UI・downstream agent・external API・audit recipient への allowed content delivery。
  excludes:
    - zh: 仅生成输出、仅作出 allow 决定、缓存但尚未交付，以及发布意图。
      en: Output generation alone, an allow decision alone, caching before delivery, and publication intent.
      ja: output generation only・allow decision only・pre-delivery cache・publication intent。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: publication 必须在 selection/truncation/suppression 之后；SSE delta  alone 不是 publication 完成。
    en: Publication follows selection/truncation/suppression; SSE deltas alone are not completed publication.
    ja: publication は disposition 後。delta alone≠完了。
  typical_input:
    - description: Publication activity
      format: '{"disclosure_activity_id":"disclose-pub-204","audience_id":"actor/customer-support-7","artifact_id":"displayed/204/1"}'
      source_claims:
        - claim-disclosure-pub-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: published_at
      labels:
        zh: 发布时间
        en: published at
        ja: published at
      definitions:
        zh: 记录内容实际对受众可见的时间。
        en: Records when the content actually became visible to the audience.
        ja: content が audience に actual visible となった時刻を記録します。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-16T04:00:01Z
      allowed_values: []
      source_claims:
        - claim-disclosure-publication-activity-001
  constraints: []
  required_relations: []
examples:
  - id: DisclosurePublicationActivity-example-openai-completed
    labels:
      zh: OpenAI 完成后发布
      en: Publish after OpenAI completed
      ja: OpenAI completed 後 publish
    descriptions:
      zh: response.completed 到达后向 support 发布 output_text 聚合结果。
      en: After response.completed, publish aggregated output_text to support.
      ja: completed 後 publish。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/guides/streaming-responses
      version: response.completed
    field_values: {}
    related_node_ids:
      - DisclosurePublicationActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-pub-stream
  - id: DisclosurePublicationActivity-example-a2a-data-part
    labels:
      zh: A2A data part 发布
      en: Publish A2A data part
      ja: A2A data part publish
    descriptions:
      zh: 向 partner-api-3 完整发布 Artifact billing-summary.json data part。
      en: Fully publish Artifact billing-summary.json data part to partner-api-3.
      ja: Artifact data part publish。
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      version: Artifact parts
    field_values: {}
    related_node_ids:
      - DisclosurePublicationActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-pub-a2a
  - id: DisclosurePublicationActivity-example-preview-boundary
    labels:
      zh: 预览非最终发布
      en: Preview is not final publication
      ja: preview≠最終 publish
    descriptions:
      zh: 开发预览 UI 看到的 partial stream 不等同于 DisclosurePublicationActivity 完成记录。
      en: Dev preview UI partial stream is not DisclosurePublicationActivity completion record.
      ja: preview≠publication record。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - DisclosurePublicationActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-pub-design
parent_relation:
  id: DisclosurePublicationActivity-is_a-DisclosureActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 披露发布活动属于输出披露活动
    en: disclosure publication activity is an output disclosure activity
    ja: 開示公開活動は出力開示活動である
  definitions:
    zh: 把内容摘要固定的允许片段在具体时间实际交付给指定受众的活动，是 DisclosureActivity 的发布子类。
    en: An activity that actually delivers an allowed segment with a fixed content digest to a specified audience at a concrete time is the publication subtype of DisclosureActivity.
    ja: fixed content digest の allow 済み区間を具体時刻に指定受け手へ実配送する活動を DisclosureActivity の公開 subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：披露发布活动属于输出披露活动
      en: inverse reading of disclosure publication activity is an output disclosure activity
      ja: 開示公開活動は出力開示活動であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosurePublicationActivity-is_a-DisclosureActivity-example-positive-manual-20260716
      labels:
        zh: 确认披露发布活动属于输出披露活动
        en: Confirm disclosure publication activity is an output disclosure activity
        ja: 開示公開活動は出力開示活動であるを確認
      descriptions:
        zh: publish-884 于 04:00:01 把 sha256:77 的 segment-77 交付给 user-7。
        en: publish-884 delivers segment-77 with digest sha256:77 to user-7 at 04:00:01.
        ja: publish-884 は sha256:77 の segment-77 を 04:00:01 に user-7 へ配送します。
      field_values: {}
      related_node_ids:
        - DisclosurePublicationActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosurePublicationActivity-is_a-DisclosureActivity
      source_claims:
        - claim-disclosure-publication-activity-001
        - claim-disclosure-publication-activity-002
    - id: DisclosurePublicationActivity-is_a-DisclosureActivity-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判披露发布活动属于输出披露活动
        en: Reject a false disclosure publication activity is an output disclosure activity
        ja: 開示公開活動は出力開示活動であるの誤判定を拒否
      descriptions:
        zh: decision-885 为 allow，但客户端在发送前断开，没有交付确认。
        en: decision-885 is allow, but the client disconnects before sending and no delivery confirmation exists.
        ja: decision-885 は allow ですが送信前に client が切断し配送確認がありません。
      field_values: {}
      related_node_ids:
        - DisclosurePublicationActivity
        - DisclosureActivity
      related_relation_ids:
        - DisclosurePublicationActivity-is_a-DisclosureActivity
      source_claims:
        - claim-disclosure-publication-activity-001
        - claim-disclosure-publication-activity-002
  source_claims:
    - claim-disclosure-publication-activity-001
    - claim-disclosure-publication-activity-002
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: DisclosurePublicationActivity-produces-DisclosedOutputSegment
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 披露发布活动产生已披露输出片段
      en: disclosure publication activity produces a disclosed output segment
      ja: 開示公開活動が開示済み出力区間を生成する
    definitions:
      zh: 该关系连接一次成功交付活动与接收者实际看到的确定范围、摘要和可见时间；仅有 allow 决定不足以建立本关系。
      en: This relation links a successful delivery activity to the exact extent, digest, and visibility time actually seen by the recipient; an allow decision alone is insufficient.
      ja: 成功配送活動と受信者が実際に見た exact extent・digest・visibility time を結び、allow 判断だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
      en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
      ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
    inverse_reading:
      predicate: is_target_of_produces
      labels:
        zh: 反向读取：披露发布活动产生已披露输出片段
        en: inverse reading of disclosure publication activity produces a disclosed output segment
        ja: 開示公開活動が開示済み出力区間を生成するの逆読み
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosurePublicationActivity-produces-DisclosedOutputSegment-example-positive-manual-20260716
        labels:
          zh: 确认披露发布活动产生已披露输出片段
          en: Confirm disclosure publication activity produces a disclosed output segment
          ja: 開示公開活動が開示済み出力区間を生成するを確認
        descriptions:
          zh: publish-884 成功把 sha256:77 的第 1–80 行交付给 user-7，并生成 segment-77。
          en: publish-884 successfully delivers lines 1–80 with digest sha256:77 to user-7 and generates segment-77.
          ja: publish-884 は sha256:77 の 1–80 行を user-7 へ配送し segment-77 を生成します。
        field_values: {}
        related_node_ids:
          - DisclosurePublicationActivity
          - DisclosedOutputSegment
        related_relation_ids:
          - DisclosurePublicationActivity-produces-DisclosedOutputSegment
        source_claims:
          - claim-disclosure-publication-activity-001
          - claim-disclosure-publication-activity-003
      - id: DisclosurePublicationActivity-produces-DisclosedOutputSegment-example-boundary-manual-20260716
        labels:
          zh: 拒绝误判披露发布活动产生已披露输出片段
          en: Reject a false disclosure publication activity produces a disclosed output segment
          ja: 開示公開活動が開示済み出力区間を生成するの誤判定を拒否
        descriptions:
          zh: 发送尝试超时，虽然内容已缓存，但没有接收确认或可见时间。
          en: The send attempt times out; content is cached but there is no receipt or visibility time.
          ja: send attempt は timeout し content は cache されますが receipt や visibility time がありません。
        field_values: {}
        related_node_ids:
          - DisclosurePublicationActivity
          - DisclosedOutputSegment
        related_relation_ids:
          - DisclosurePublicationActivity-produces-DisclosedOutputSegment
        source_claims:
          - claim-disclosure-publication-activity-001
          - claim-disclosure-publication-activity-003
    source_claims:
      - claim-disclosure-publication-activity-001
      - claim-disclosure-publication-activity-003
    layout_role: cross-link
    target: concept:DisclosedOutputSegment
