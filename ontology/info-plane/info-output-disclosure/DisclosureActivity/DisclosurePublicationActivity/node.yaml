source_claims:
  - id: claim-disclosure-publication-activity-001
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes an Activity that uses or generates Entities from the generated Entity and from the Agent bearing responsibility. Moonweave applies that distinction to disclosure activities, their decision and disposition records, and the actors who can see a released segment.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-publication-activity-002
    source: eng-policy-opa
    supports: OPA decision logs distinguish policy query input, result, decision identifier, requester, timestamp, and erased or masked fields. Moonweave uses that evidence to keep a disclosure selection decision separate from the disclosure activity and from the record of what was finally displayed.
    locator: Open Policy Agent documentation, Management > Decision Logs, event fields and masking
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-publication-activity-003
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 separates resources, access requests, policy decisions, policy enforcement points, trust zones, monitoring, and termination. Moonweave uses that distinction to link an optional disclosure record to a concrete boundary crossing instead of classifying visible content as a trust boundary.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones and policy enforcement points
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-publication-activity-004
    source: eng-ont-prov-o
    supports: "PROV-O distinguishes an Activity from the Entity it uses or generates. Moonweave applies that occurrence boundary twice: DisclosureSelectionActivity uses candidate output and generates a selection decision, whereas DisclosurePublicationActivity occurs only when selected content is actually delivered. PROV-O does not name these disclosure subtypes."
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-publication-activity-005
    source: eng-ont-prov-o
    supports: PROV-O models Activities through the entities they use and generate. Moonweave distinguishes publication, which generates audience-visible delivery evidence, from suppression, which generates a withheld-content disposition; the two subtype names and their shared DisclosureActivity parent are design inferences.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-publication-activity-006
    source: eng-ont-prov-o
    supports: PROV-O's Activity, used, and wasGeneratedBy pattern supports tracing an output transformation separately from its resulting entity. Moonweave uses the result condition to separate DisclosureTruncationActivity, which selects retained ranges, from DisclosurePublicationActivity, which delivers those ranges to an audience.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-disclosure-pub-stream
    source: src-openai-stream
    supports: Publication completes after terminal streaming completion event.
    locator: response.completed
    evidence_kind: primary-api
    confidence: high
  - id: claim-disclosure-pub-a2a
    source: src-a2a-artifact
    supports: A2A Artifact parts may be fully published to partner audiences.
    locator: Artifact parts
    evidence_kind: primary-spec
    confidence: high
  - id: claim-disclosure-pub-design
    source: src-info-output-design
    supports: DisclosurePublicationActivity delivers audience-visible segments distinct from previews.
    locator: publication activity
    evidence_kind: design-inference
    confidence: high
