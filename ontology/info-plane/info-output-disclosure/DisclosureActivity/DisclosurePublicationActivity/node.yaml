    labels:
      zh: 发布脱敏报告
      en: Publish a redacted report
      ja: redacted report を publish

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; DisclosurePublicationActivity maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; DisclosurePublicationActivity maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; DisclosurePublicationActivity context/token boundary."}

