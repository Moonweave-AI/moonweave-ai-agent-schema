schema: moonweave.ai/ontology-node/v1
id: DisclosurePublicationActivity
kind: concept
status: accepted
labels:
  zh: 披露发布活动
  en: disclosure publication activity
  ja: 開示公開活動
semantics:
  short_definition:
    zh: 把已允许的最终输出片段实际交付给指定受众的披露活动。
    en: A disclosure activity that actually delivers allowed final output segments to a specified audience.
    ja: allowed final output segment を specified audience に actual deliver する disclosure activity。
  definition:
    zh: 披露发布活动是 DisclosureActivity 的子类，其种差是按照有效 DisclosureSelectionDecision，把确定内容摘要的输出片段在特定时间交付给 Actor，并在必要时关联 BoundaryCrossing；选择为 allow 不等于已经发布。
    en: A DisclosurePublicationActivity is a DisclosureActivity distinguished by delivering output segments with fixed content digests to an Actor at a specific time under a valid DisclosureSelectionDecision and, where applicable, linking a BoundaryCrossing. An allow decision alone is not publication.
    ja: DisclosurePublicationActivity は valid DisclosureSelectionDecision に基づき fixed digest の output segment を specific time に Actor へ deliver し必要なら BoundaryCrossing を link する subtype です。allow decision のみでは publication ではありません。
  why_needed:
    zh: 单独建模发布发生可区分“允许显示”和“已经被谁看到”。
    en: Modeling publication occurrence separately distinguishes permission to display from evidence of who actually saw it.
    ja: publication occurrence を別にし permission to display と actual viewer evidence を区別します。
  includes:
    - zh: 向用户界面、下游智能体、外部 API 或审计接收方交付允许内容。
      en: Delivery of allowed content to a user interface, downstream agent, external API, or audit recipient.
      ja: UI・downstream agent・external API・audit recipient への allowed content delivery。
  excludes:
    - zh: 仅生成输出、仅作出 allow 决定、缓存但尚未交付，以及发布意图。
      en: Output generation alone, an allow decision alone, caching before delivery, and publication intent.
      ja: output generation only・allow decision only・pre-delivery cache・publication intent。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: published_at
      labels:
        zh: 发布时间
        en: published at
        ja: published at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录内容实际对受众可见的时间。
        en: Records when the content actually became visible to the audience.
        ja: content が audience に actual visible となった時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T04:00:01Z
      source_claims:
        - claim-disclosure-publication-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosurePublicationActivity-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 发布脱敏报告
      en: Publish a redacted report
      ja: redacted report を publish
    scenario_id: null
    descriptions:
      zh: publish-884 在 decision-884 允许后，把 digest=sha256:77 的 segment-77 于 04:00:01 显示给 user-7，并记录 crossing-884。
      en: After decision-884 allows it, publish-884 displays segment-77 with digest sha256:77 to user-7 at 04:00:01 and records crossing-884.
      ja: decision-884 allow 後 publish-884 は digest sha256:77 の segment-77 を 04:00:01 に user-7 へ表示し crossing-884 を記録します。
    field_values:
      published_at: 2026-07-16T04:00:01Z
      disclosure_activity_id: publish-884
      source_output_ref: segment-77
      audience_ref: user-7
      started_at: 2026-07-16T04:00:00Z
      status: completed
    related_node_ids:
      - DisclosurePublicationActivity
      - DisclosedOutputSegment
      - Actor
      - BoundaryCrossing
    related_relation_ids:
      - DisclosurePublicationActivity-produces-DisclosedOutputSegment
      - DisclosedOutputSegment-visible_to-Actor
    expected_result:
      zh: 建立发布活动和受众可见片段。
      en: Create the publication activity and audience-visible segment.
      ja: publication activity と audience-visible segment を作成します。
    why_valid_or_invalid:
      zh: 决定、内容摘要、接收者和可见时间均一致。
      en: Decision, content digest, recipient, and visibility time agree.
      ja: decision・digest・recipient・visibility time が一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-publication-activity-001
      - claim-disclosure-publication-activity-003
  - id: DisclosurePublicationActivity-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 已允许但发送失败
      en: Allowed but delivery failed
      ja: allowed but delivery failed
    scenario_id: output-disclosure-disclosurepublicationactivity-boundary
    descriptions:
      zh: decision-885 为 allow，但客户端断开，未产生接收确认、可见时间或已披露片段。
      en: decision-885 is allow, but the client disconnects and no receipt confirmation, visibility time, or disclosed segment exists.
      ja: decision-885 は allow でも client disconnect で receipt confirmation・visibility time・disclosed segment がありません。
    field_values: {}
    related_node_ids:
      - DisclosureSelectionDecision
      - DisclosurePublicationActivity
    related_relation_ids: []
    expected_result:
      zh: 保留决定和失败活动，不断言成功发布。
      en: Keep the decision and failed activity but do not assert successful publication.
      ja: decision/failed activity を保持し successful publication を主張しません。
    why_valid_or_invalid:
      zh: 允许结果只表达治理许可，不构成实际交付已经发生的证据。
      en: An allow result is not evidence that delivery occurred.
      ja: allow result は delivery occurrence evidence ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-publication-activity-002
      - claim-disclosure-publication-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DisclosureSelectionActivity
    shared_parent_concept_id: DisclosureActivity
    differentia:
      zh: 端点特定对照：父节点 DisclosureActivity：DisclosurePublicationActivity（semantic kind=activity，骨架 DisclosurePublicationActivity-is_a-DisclosureActivity）；DisclosureSelectionActivity（semantic kind=activity，骨架 DisclosureSelectionActivity-is_a-DisclosureActivity）。双端条件：DisclosurePublicationActivity 条件：“把已允许的最终输出片段实际交付给指定受众的披露活动”；DisclosureSelectionActivity 条件：“对候选输出逐项求值并生成披露选择决定的披露活动”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent DisclosureActivity: DisclosurePublicationActivity (semantic kind=activity, backbone DisclosurePublicationActivity-is_a-DisclosureActivity); DisclosureSelectionActivity (semantic kind=activity, backbone DisclosureSelectionActivity-is_a-DisclosureActivity). Endpoint conditions: DisclosurePublicationActivity condition: “A disclosure activity that actually delivers allowed final output segments to a specified audience”; DisclosureSelectionActivity condition: “A disclosure activity that evaluates candidate output and produces a disclosure selection decision”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 DisclosureActivity：DisclosurePublicationActivity（semantic kind=activity、バックボーン DisclosurePublicationActivity-is_a-DisclosureActivity）；DisclosureSelectionActivity（semantic kind=activity、バックボーン DisclosureSelectionActivity-is_a-DisclosureActivity）。両端条件：DisclosurePublicationActivity の条件：「allowed final output segment を specified audience に actual deliver する disclosure activity」；DisclosureSelectionActivity の条件：「candidate output を evaluate し disclosure selection decision を生成する disclosure activity」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-disclosure-publication-activity-004
  - sibling_concept_id: DisclosureSuppressionActivity
    shared_parent_concept_id: DisclosureActivity
    differentia:
      zh: 正向身份比较：父节点 DisclosureActivity：DisclosurePublicationActivity（semantic kind=activity，骨架 DisclosurePublicationActivity-is_a-DisclosureActivity）；DisclosureSuppressionActivity（semantic kind=activity，骨架 DisclosureSuppressionActivity-is_a-DisclosureActivity）。双端条件：DisclosurePublicationActivity 条件：“把已允许的最终输出片段实际交付给指定受众的披露活动”；DisclosureSuppressionActivity 条件：“依据披露决定阻止候选内容到达指定受众的披露活动”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent DisclosureActivity: DisclosurePublicationActivity (semantic kind=activity, backbone DisclosurePublicationActivity-is_a-DisclosureActivity); DisclosureSuppressionActivity (semantic kind=activity, backbone DisclosureSuppressionActivity-is_a-DisclosureActivity). Endpoint conditions: DisclosurePublicationActivity condition: “A disclosure activity that actually delivers allowed final output segments to a specified audience”; DisclosureSuppressionActivity condition: “A disclosure activity that prevents candidate content from reaching an audience under a disclosure decision”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 DisclosureActivity：DisclosurePublicationActivity（semantic kind=activity、バックボーン DisclosurePublicationActivity-is_a-DisclosureActivity）；DisclosureSuppressionActivity（semantic kind=activity、バックボーン DisclosureSuppressionActivity-is_a-DisclosureActivity）。両端条件：DisclosurePublicationActivity の条件：「allowed final output segment を specified audience に actual deliver する disclosure activity」；DisclosureSuppressionActivity の条件：「disclosure decision に基づき candidate content が audience に届くことを防ぐ disclosure activity」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-disclosure-publication-activity-005
  - sibling_concept_id: DisclosureTruncationActivity
    shared_parent_concept_id: DisclosureActivity
    differentia:
      zh: 共享父节点对照：父节点 DisclosureActivity：DisclosurePublicationActivity（semantic kind=activity，骨架 DisclosurePublicationActivity-is_a-DisclosureActivity）；DisclosureTruncationActivity（semantic kind=activity，骨架 DisclosureTruncationActivity-is_a-DisclosureActivity）。双端条件：DisclosurePublicationActivity 条件：“把已允许的最终输出片段实际交付给指定受众的披露活动”；DisclosureTruncationActivity 条件：“按照已选输出窗口保留部分范围并记录省略范围的披露活动”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent DisclosureActivity: DisclosurePublicationActivity (semantic kind=activity, backbone DisclosurePublicationActivity-is_a-DisclosureActivity); DisclosureTruncationActivity (semantic kind=activity, backbone DisclosureTruncationActivity-is_a-DisclosureActivity). Endpoint conditions: DisclosurePublicationActivity condition: “A disclosure activity that actually delivers allowed final output segments to a specified audience”; DisclosureTruncationActivity condition: “A disclosure activity that retains ranges under a selected output window and records omitted ranges”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 DisclosureActivity：DisclosurePublicationActivity（semantic kind=activity、バックボーン DisclosurePublicationActivity-is_a-DisclosureActivity）；DisclosureTruncationActivity（semantic kind=activity、バックボーン DisclosureTruncationActivity-is_a-DisclosureActivity）。両端条件：DisclosurePublicationActivity の条件：「allowed final output segment を specified audience に actual deliver する disclosure activity」；DisclosureTruncationActivity の条件：「selected output window に従い range を保持し omitted range を記録する disclosure activity」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-disclosure-publication-activity-006
