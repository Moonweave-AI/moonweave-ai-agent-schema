      - DisclosedOutputSegment-visible_to-Actor

    source_claims:
      - claim-disclosure-publication-activity-001
      - claim-disclosure-publication-activity-003
  - id: DisclosurePublicationActivity-example-boundary-manual-20260716

    labels:
      zh: 已允许但发送失败
      en: Allowed but delivery failed
      ja: allowed but delivery failed

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; DisclosurePublicationActivity must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; DisclosurePublicationActivity must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - DisclosureSelectionDecision
      - DisclosurePublicationActivity
    related_relation_ids: []

    source_claims:
      - claim-disclosure-publication-activity-002
      - claim-disclosure-publication-activity-001
external_mappings: []
applicability:
