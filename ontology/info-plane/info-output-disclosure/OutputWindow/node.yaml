schema: moonweave.ai/ontology-node/v1
id: OutputWindow
kind: concept
status: review
labels:
  zh: 输出窗口规范
  en: output-window specification
  ja: 出力ウィンドウ仕様
semantics:
  short_definition:
    zh: 规定一次输出披露可保留哪些有界范围及其计量单位的选择规范。
    en: A selection specification defining the bounded output extents that may be retained in a disclosure and their unit.
    ja: 一回の出力開示で保持できる有界範囲と単位を定める選択仕様です。
  definition:
    zh: 输出窗口规范是一种规范对象，以窗口标识、版本、窗口模式、计量单位和容量限制为身份。它声明可应用的范围边界，但不选择具体受众、不执行截断，也不等于应用后产生的 VisibleContextWindow 或 TruncatedContextSpan。
    en: An OutputWindow is a specification object identified by window ID, revision, mode, measurement unit, and capacity limits. It declares applicable extent bounds but selects no audience, performs no truncation, and is not the VisibleContextWindow or TruncatedContextSpan produced when the specification is applied.
    ja: OutputWindow は window ID・revision・mode・measurement unit・capacity limit で識別する仕様対象です。適用可能な範囲境界を宣言しますが、受け手を選択せず切詰めを実行せず、適用後の VisibleContextWindow や TruncatedContextSpan でもありません。
  why_needed:
    zh: 把窗口保留为可版本化规范，决定可选择具体版本，截断活动可记录实际应用，结果范围则能独立核验。
    en: Keeping the window as a versioned specification lets a decision select a revision, an activity record its application, and resulting extents be verified independently.
    ja: window を versioned specification とし、判断が版を選び、活動が適用を記録し、結果範囲を独立検証できます。
  includes:
    - zh: 按行、字节、字符、记录或 token 声明 head、tail、head-tail 或连续范围上限的不可变规范版本。
      en: Immutable specification revisions declaring head, tail, head-tail, or contiguous-range limits in lines, bytes, characters, records, or tokens.
      ja: line・byte・character・record・token 単位で head・tail・head-tail・contiguous range limit を宣言する不変仕様版。
  excludes:
    - zh: 具体输出内容、输入 ContextWindow、已经计算出的可见范围、截断缺口，以及作出处置的决定或活动。
      en: Concrete output content, an input ContextWindow, an already computed visible extent, a truncation gap, and the decision or activity that applies a disposition.
      ja: 具体出力内容・input ContextWindow・計算済み可視範囲・切詰め欠落・処置判断または活動。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - window_id
    - revision
  fields:
    - id: window_id
      labels:
        zh: 窗口标识
        en: window ID
        ja: window ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个输出范围规范系列。
        en: Stably identifies one output-range specification series.
        ja: 一つの出力範囲仕様系列を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: output-window-9
      source_claims:
        - claim-output-window-001
    - id: revision
      labels:
        zh: 窗口版本
        en: window revision
        ja: window revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分同一窗口标识下不可变的限制版本。
        en: Distinguishes immutable limit revisions under one window ID.
        ja: 同じ window ID の不変 limit revision を区別します。
      allowed_values: []
      pattern: null
      example_value: "2"
      source_claims:
        - claim-output-window-001
    - id: mode
      labels:
        zh: 窗口模式
        en: window mode
        ja: window mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 head、tail、head-tail 或 contiguous 中的一种选取方式。
        en: "Declares one selection mode: head, tail, head-tail, or contiguous."
        ja: head・tail・head-tail・contiguous の選択方式を宣言します。
      allowed_values: []
      pattern: null
      example_value: head-tail
      source_claims:
        - claim-output-window-001
    - id: unit
      labels:
        zh: 计量单位
        en: measurement unit
        ja: 計量単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明所有范围上限使用 line、byte、character、record 或 token。
        en: Declares whether all extent limits use line, byte, character, record, or token units.
        ja: すべての範囲上限が line・byte・character・record・token のどれを使うか宣言します。
      allowed_values: []
      pattern: null
      example_value: line
      source_claims:
        - claim-output-window-001
    - id: head_limit
      labels:
        zh: 首部上限
        en: head limit
        ja: 先頭上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明从来源开头最多保留的单位数。
        en: Declares the maximum units retained from the start of source output.
        ja: source output 先頭から保持する最大単位数を宣言します。
      allowed_values: []
      pattern: null
      example_value: 80
      source_claims:
        - claim-output-window-001
    - id: tail_limit
      labels:
        zh: 尾部上限
        en: tail limit
        ja: 末尾上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明从来源末尾最多保留的单位数。
        en: Declares the maximum units retained from the end of source output.
        ja: source output 末尾から保持する最大単位数を宣言します。
      allowed_values: []
      pattern: null
      example_value: 40
      source_claims:
        - claim-output-window-001
    - id: total_limit
      labels:
        zh: 总量上限
        en: total limit
        ja: 総量上限
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 声明最终可见范围允许包含的最大单位总数。
        en: Declares the maximum total units allowed in the final visible extent.
        ja: 最終可視範囲に許される最大総単位数を宣言します。
      allowed_values: []
      pattern: null
      example_value: 120
      source_claims:
        - claim-output-window-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: OutputWindow-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 定义 120 行首尾窗口
      en: Define a 120-line head-tail window
      ja: 120-line head-tail window を定義
    scenario_id: null
    descriptions:
      zh: output-window-9@2 声明 line 单位、head-tail 模式、首 80 行、末 40 行和总上限 120 行。
      en: output-window-9@2 declares line units, head-tail mode, an eighty-line head, a forty-line tail, and a 120-line total limit.
      ja: output-window-9@2 は line 単位・head-tail mode・head 80・tail 40・total 120 を宣言します。
    field_values:
      window_id: output-window-9
      revision: "2"
      mode: head-tail
      unit: line
      head_limit: 80
      tail_limit: 40
      total_limit: 120
    related_node_ids:
      - OutputWindow
    related_relation_ids: []
    expected_result:
      zh: 建立可由决定选择、由截断活动应用的不可变窗口版本。
      en: Create an immutable window revision that a decision can select and a truncation activity can apply.
      ja: 判断が選択し切詰め活動が適用できる不変 window revision を作成します。
    why_valid_or_invalid:
      zh: 模式、单位和各上限彼此一致，规范本身不声称已经处理具体输出。
      en: Mode, unit, and limits are consistent, and the specification does not claim that concrete output has been processed.
      ja: mode・unit・limit が整合し、仕様自体は具体出力を処理済みと主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-output-window-001
  - id: OutputWindow-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 记录实际可见的首尾范围
      en: Record actually visible head and tail extents
      ja: 実可視 head/tail 範囲を記録
    scenario_id: output-disclosure-outputwindow-boundary
    descriptions:
      zh: visible-window-41 保存 output-41 实际可见的第 1–80 行与第 1961–2000 行，并绑定一次具体运行。
      en: visible-window-41 stores the actually visible lines 1–80 and 1961–2000 of output-41 and is bound to one concrete run.
      ja: visible-window-41 は output-41 の実可視 1–80 行と 1961–2000 行を保存し一具体実行に結びます。
    field_values: {}
    related_node_ids:
      - VisibleContextWindow
      - OutputWindow
    related_relation_ids: []
    expected_result:
      zh: 保留为应用结果窗口，并通过 conforms_to 引用 OutputWindow。
      en: Keep it as an applied-result window and link it to OutputWindow through conforms_to.
      ja: 適用結果 window として保持し conforms_to で OutputWindow を参照します。
    why_valid_or_invalid:
      zh: 实际范围的身份依赖具体来源和运行，而规范只声明可复用限制。
      en: The actual extent depends on a concrete source and run, while the specification only declares reusable limits.
      ja: 実範囲は具体 source/run に依存し、仕様は再利用可能 limit だけを宣言します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-output-window-001
      - claim-output-window-002
external_mappings: []
