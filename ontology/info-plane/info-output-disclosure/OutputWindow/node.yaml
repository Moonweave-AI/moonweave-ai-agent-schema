schema: moonweave.ai/ontology-node/v1
id: OutputWindow
kind: concept
labels:
  zh: 输出窗口规范
  en: output-window specification
  ja: 出力ウィンドウ仕様
semantics:
  short_definition:
    zh: 声明输出披露可保留范围与计量单位的版本化规范。
    en: Versioned specification declaring retainable output ranges and measurement units for disclosure.
    ja: 出力開示で保持可能な range と計量単位を宣言する versioned 仕様。
  definition:
    zh: OutputWindow 以 window_id/revision 标识不可变限制版本，mode 声明 head、tail、head-tail 或 contiguous 策略；输入 ContextWindow 规范不得与此混淆。
    en: OutputWindow is an immutable limit revision identified by window_id/revision; mode declares head, tail, head-tail, or contiguous policy. Input ContextWindow specs must not be conflated with it.
    ja: OutputWindow は output-side window 仕様。
  why_needed:
    zh: 把窗口保留为可版本化规范，决定可选择具体版本，截断活动可记录实际应用，结果范围则能独立核验。
    en: Keeping the window as a versioned specification lets a decision select a revision, an activity record its application, and resulting extents be verified independently.
    ja: window を versioned specification とし、判断が版を選び、活動が適用を記録し、結果範囲を独立検証できます。
  includes:
    - zh: 按行、字节、字符、记录或 token 声明 head、tail、head-tail 或连续范围上限的不可变规范版本。
      en: Immutable specification revisions declaring head, tail, head-tail, or contiguous-range limits in lines, bytes, characters, records, or tokens.
      ja: line・byte・character・record・token 単位で head・tail・head-tail・contiguous range limit を宣言する不変仕様版。
  excludes:
    - zh: 具体输出内容、输入 ContextWindow、已经计算出的可见范围、截断缺口，以及作出处置的决定或活动。
      en: Concrete output content, an input ContextWindow, an already computed visible extent, a truncation gap, and the decision or activity that applies a disposition.
      ja: 具体出力内容・input ContextWindow・計算済み可視範囲・切詰め欠落・処置判断または活動。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: window/800-char revision=2 等被 DisclosureSelectionDecision 引用；执行截断由 DisclosureTruncationActivity 完成。
    en: window/800-char revision=2 is referenced by DisclosureSelectionDecision; DisclosureTruncationActivity executes clipping.
    ja: decision が window revision を参照。
  typical_input:
    - description: Output window spec
      format: '{"window_id":"window/800-char","revision":"2","mode":"contiguous","unit":"chars","capacity":800}'
      source_claims:
        - claim-output-window-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys:
    - window_id
    - revision
  fields:
    - id: window_id
      labels:
        zh: 窗口标识
        en: window ID
        ja: window ID
      definitions:
        zh: 稳定标识一个输出范围规范系列。
        en: Stably identifies one output-range specification series.
        ja: 一つの出力範囲仕様系列を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: output-window-9
      allowed_values: []
      source_claims:
        - claim-output-window-001
    - id: revision
      labels:
        zh: 窗口版本
        en: window revision
        ja: window revision
      definitions:
        zh: 区分同一窗口标识下不可变的限制版本。
        en: Distinguishes immutable limit revisions under one window ID.
        ja: 同じ window ID の不変 limit revision を区別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "2"
      allowed_values: []
      source_claims:
        - claim-output-window-001
    - id: mode
      labels:
        zh: 窗口模式
        en: window mode
        ja: window mode
      definitions:
        zh: 声明 head、tail、head-tail 或 contiguous 中的一种选取方式。
        en: "Declares one selection mode: head, tail, head-tail, or contiguous."
        ja: head・tail・head-tail・contiguous の選択方式を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: head-tail
      allowed_values: []
      source_claims:
        - claim-output-window-001
    - id: unit
      labels:
        zh: 计量单位
        en: measurement unit
        ja: 計量単位
      definitions:
        zh: 声明所有范围上限使用 line、byte、character、record 或 token。
        en: Declares whether all extent limits use line, byte, character, record, or token units.
        ja: すべての範囲上限が line・byte・character・record・token のどれを使うか宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: line
      allowed_values: []
      source_claims:
        - claim-output-window-001
    - id: head_limit
      labels:
        zh: 首部上限
        en: head limit
        ja: 先頭上限
      definitions:
        zh: 声明从来源开头最多保留的单位数。
        en: Declares the maximum units retained from the start of source output.
        ja: source output 先頭から保持する最大単位数を宣言します。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 80
      allowed_values: []
      source_claims:
        - claim-output-window-001
    - id: tail_limit
      labels:
        zh: 尾部上限
        en: tail limit
        ja: 末尾上限
      definitions:
        zh: 声明从来源末尾最多保留的单位数。
        en: Declares the maximum units retained from the end of source output.
        ja: source output 末尾から保持する最大単位数を宣言します。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 40
      allowed_values: []
      source_claims:
        - claim-output-window-001
    - id: total_limit
      labels:
        zh: 总量上限
        en: total limit
        ja: 総量上限
      definitions:
        zh: 声明最终可见范围允许包含的最大单位总数。
        en: Declares the maximum total units allowed in the final visible extent.
        ja: 最終可視範囲に許される最大総単位数を宣言します。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 120
      allowed_values: []
      source_claims:
        - claim-output-window-001
  constraints: []
  required_relations: []
examples:
  - id: OutputWindow-example-char-contiguous
    labels:
      zh: 连续字符窗口
      en: Contiguous character window
      ja: 連続文字 window
    descriptions:
      zh: window/800-char revision=2 capacity=800 unit=chars。
      en: window/800-char revision=2 capacity=800 unit=chars.
      ja: char contiguous window。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: char window
    field_values: {}
    related_node_ids:
      - OutputWindow
    related_relation_ids: []
    source_claims:
      - claim-output-window-design
