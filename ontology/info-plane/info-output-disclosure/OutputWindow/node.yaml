      ja: token window
    descriptions:
      zh: window/4096-token revision=1 unit=tokens capacity=4096。
      en: window/4096-token revision=1 unit=tokens capacity=4096.
      ja: token window。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/responses
      version: token limits
    field_values: {}
    related_node_ids:
      - OutputWindow
    related_relation_ids: []
