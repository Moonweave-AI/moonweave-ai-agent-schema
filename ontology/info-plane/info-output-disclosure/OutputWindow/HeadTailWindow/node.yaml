schema: moonweave.ai/ontology-node/v1
id: HeadTailWindow
kind: concept
status: review
labels:
  zh: 首尾输出窗口
  en: head-tail output window
  ja: 先頭末尾出力ウィンドウ
semantics:
  short_definition:
    zh: 同时规定从输出开头与末尾保留范围、并省略中间连续范围的输出窗口规范。
    en: An output-window specification retaining bounded head and tail extents while omitting the contiguous middle.
    ja: 出力の有界 head と tail を保持し連続 middle を省略する出力 window 仕様です。
  definition:
    zh: 首尾输出窗口是 OutputWindow 的子类，其种差是 mode 固定为 head-tail，首部上限与尾部上限分别为正值，并明确中间范围在超过总量时被省略。它不是只保留首部的 head 窗口、保留单一连续范围的窗口，也不是应用后算出的两个可见片段。
    en: A HeadTailWindow is an OutputWindow subtype distinguished by mode=head-tail, positive head and tail limits, and explicit omission of the middle when total extent exceeds capacity. It is neither a head-only window, a single contiguous-range window, nor the pair of visible fragments computed after application.
    ja: HeadTailWindow は mode=head-tail、正の head/tail limit、容量超過時の middle 省略で区別する OutputWindow subtype です。head-only window・single contiguous window・適用後の二可視区間ではありません。
  why_needed:
    zh: 首尾策略需要同时表达两个非连续保留区和一个可审计缺口，不能用单一长度上限含糊替代。
    en: A head-tail policy must express two non-contiguous retained regions and an auditable gap rather than hiding that behavior behind one length limit.
    ja: head-tail 方針は二つの非連続保持領域と監査可能欠落を表し、単一 length limit で曖昧にしません。
  includes:
    - zh: 保留日志开头的错误背景和末尾的退出状态，同时省略容量过大的中间详情的窗口规范。
      en: Window specifications retaining error context at the start and exit status at the end of a log while omitting an oversized middle.
      ja: log 先頭の error context と末尾の exit status を保持し oversized middle を省略する window 仕様。
  excludes:
    - zh: 仅保留首部、仅保留尾部、滑动连续窗口、摘要算法，以及已经生成的可见片段或省略范围。
      en: Head-only, tail-only, sliding contiguous windows, summarization algorithms, and already generated visible or omitted extents.
      ja: head-only・tail-only・sliding contiguous window・summarization algorithm・生成済み visible/omitted extent。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: middle_disposition
      labels:
        zh: 中段处置
        en: middle disposition
        ja: 中段処置
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明容量不足时中间连续范围必须记为 omitted。
        en: Declares that the contiguous middle must be recorded as omitted when capacity is insufficient.
        ja: 容量不足時に連続 middle を omitted と記録することを宣言します。
      allowed_values: []
      pattern: null
      example_value: omitted
      source_claims:
        - claim-head-tail-window-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: HeadTailWindow-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 保留命令输出首 80 行与末 40 行
      en: Retain the first 80 and last 40 command-output lines
      ja: command output の先頭 80 と末尾 40 行を保持
    scenario_id: null
    descriptions:
      zh: head-tail-window-9@2 继承 line 单位和版本，指定 head=80、tail=40，并要求超限中段记录为 omitted。
      en: head-tail-window-9@2 inherits its line unit and revision, sets head=80 and tail=40, and requires an oversized middle to be recorded as omitted.
      ja: head-tail-window-9@2 は line unit/revision を継承し head=80・tail=40 とし、超過 middle を omitted と記録させます。
    field_values:
      middle_disposition: omitted
      window_id: head-tail-window-9
      revision: "2"
      mode: head-tail
      unit: line
    related_node_ids:
      - HeadTailWindow
      - OutputWindow
    related_relation_ids:
      - HeadTailWindow-is_a-OutputWindow
    expected_result:
      zh: 建立一个具有双端保留语义的 OutputWindow 子类实例。
      en: Create an OutputWindow subtype instance with two-ended retention semantics.
      ja: 両端保持意味を持つ OutputWindow subtype instance を作成します。
    why_valid_or_invalid:
      zh: 两个正上限和中段省略规则共同构成首尾窗口种差。
      en: Two positive limits and the middle-omission rule jointly establish the head-tail differentia.
      ja: 二つの正 limit と middle omission rule が head-tail の種差を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-head-tail-window-001
  - id: HeadTailWindow-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只保留日志最后 100 行
      en: Retain only the final 100 log lines
      ja: log 最終 100 行だけ保持
    scenario_id: output-disclosure-headtailwindow-boundary
    descriptions:
      zh: tail-window-3 只有 tail_limit=100，未声明首部范围，也不存在两个非连续保留区。
      en: tail-window-3 has only tail_limit=100, declares no head extent, and yields no two non-contiguous retained regions.
      ja: tail-window-3 は tail_limit=100 のみで head 範囲や二つの非連続保持領域がありません。
    field_values: {}
    related_node_ids:
      - OutputWindow
      - HeadTailWindow
    related_relation_ids: []
    expected_result:
      zh: 分类为一般 tail OutputWindow，不分类为 HeadTailWindow。
      en: Classify it as a general tail OutputWindow, not as HeadTailWindow.
      ja: 一般 tail OutputWindow とし HeadTailWindow にはしません。
    why_valid_or_invalid:
      zh: 缺少首部上限和双端保留结构，不满足首尾窗口种差。
      en: Without a head limit and two-ended retention structure, it fails the head-tail differentia.
      ja: head limit と両端保持構造がなく head-tail の種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-head-tail-window-001
