schema: moonweave.ai/ontology-node/v1
id: HeadTailWindow
kind: concept
labels:
  zh: 首尾输出窗口
  en: head-tail output window
  ja: 先頭末尾出力ウィンドウ
semantics:
  short_definition:
    zh: 同时保留源输出头部与尾部、丢弃中间部分的窗口规范特化。
    en: Output-window specialization retaining both head and tail while dropping the middle.
    ja: head と tail を保持し middle を discard する window 仕様特化。
  definition:
    zh: HeadTailWindow 在 OutputWindow 上增加 head_capacity 与 tail_capacity；用于长日志或长 assistant 回复的可读摘要披露。
    en: HeadTailWindow adds head_capacity and tail_capacity to OutputWindow for readable disclosure of long logs or assistant replies.
    ja: HeadTailWindow は head/tail 保持 policy。
  why_needed:
    zh: 首尾策略需要同时表达两个非连续保留区和一个可审计缺口，不能用单一长度上限含糊替代。
    en: A head-tail policy must express two non-contiguous retained regions and an auditable gap rather than hiding that behavior behind one length limit.
    ja: head-tail 方針は二つの非連続保持領域と監査可能欠落を表し、単一 length limit で曖昧にしません。
  includes:
    - zh: 保留日志开头的错误背景和末尾的退出状态，同时省略容量过大的中间详情的窗口规范。
      en: Window specifications retaining error context at the start and exit status at the end of a log while omitting an oversized middle.
      ja: log 先頭の error context と末尾の exit status を保持し oversized middle を省略する window 仕様。
  excludes:
    - zh: 仅保留首部、仅保留尾部、滑动连续窗口、摘要算法，以及已经生成的可见片段或省略范围。
      en: Head-only, tail-only, sliding contiguous windows, summarization algorithms, and already generated visible or omitted extents.
      ja: head-only・tail-only・sliding contiguous window・summarization algorithm・生成済み visible/omitted extent。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 中间被丢弃范围产生 TruncatedContextSpan；head/tail 分别产生 DisclosedOutputSegment。
    en: Dropped middle yields TruncatedContextSpan; head/tail yield DisclosedOutputSegment.
    ja: middle→TruncatedContextSpan。
  typical_input:
    - description: Head-tail window
      format: '{"window_id":"window/head-tail-log","revision":"1","head_capacity":400,"tail_capacity":200,"unit":"chars"}'
      source_claims:
        - claim-head-tail-design
  typical_output: []
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: response.output[] items and output_text helper.
    - name: OpenAI Streaming Responses
      url: https://platform.openai.com/docs/guides/streaming-responses
      description: SSE response.output_text.delta and response.completed events.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Assistant content blocks and streaming deltas.
    - name: Server-Sent Events
      url: https://html.spec.whatwg.org/multipage/server-sent-events.html
      description: Event-stream framing for incremental delivery.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Task Artifact as durable completed output.
structure:
  identity_keys: []
  fields:
    - id: middle_disposition
      labels:
        zh: 中段处置
        en: middle disposition
        ja: 中段処置
      definitions:
        zh: 声明容量不足时中间连续范围必须记为 omitted。
        en: Declares that the contiguous middle must be recorded as omitted when capacity is insufficient.
        ja: 容量不足時に連続 middle を omitted と記録することを宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: omitted
      allowed_values: []
      source_claims:
        - claim-head-tail-window-001
  constraints: []
  required_relations: []
examples:
  - id: HeadTailWindow-example-log
    labels:
      zh: 日志 head-tail
      en: Log head-tail
      ja: log head-tail
    descriptions:
      zh: 400+200 字符 head-tail 披露 incident log。
      en: 400+200 char head-tail discloses incident log.
      ja: log head-tail。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: head-tail
    field_values: {}
    related_node_ids:
      - HeadTailWindow
    related_relation_ids: []
    source_claims:
      - claim-head-tail-design
  - id: HeadTailWindow-example-middle-truncated
    labels:
      zh: 中间截断记录
      en: Middle truncation record
      ja: middle truncate record
    descriptions:
      zh: chars:400..999 标记为 TruncatedContextSpan。
      en: chars:400..999 marked TruncatedContextSpan.
      ja: middle span。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: middle gap
    field_values: {}
    related_node_ids:
      - HeadTailWindow
      - TruncatedContextSpan
    related_relation_ids: []
    source_claims:
      - claim-head-tail-design
  - id: HeadTailWindow-example-not-contiguous-only
    labels:
      zh: 非纯 contiguous
      en: Not contiguous-only
      ja: contiguous-only ではない
    descriptions:
      zh: HeadTailWindow mode=head-tail，不同于纯 contiguous 上限。
      en: HeadTailWindow mode=head-tail differs from contiguous cap only.
      ja: mode 区分。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: mode
    field_values: {}
    related_node_ids:
      - HeadTailWindow
    related_relation_ids: []
    source_claims:
      - claim-head-tail-design
parent_relation:
  id: HeadTailWindow-is_a-OutputWindow
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 首尾输出窗口属于输出窗口规范
    en: head-tail output window is an output-window specification
    ja: 先頭末尾出力 window は出力 window 仕様である
  definitions:
    zh: mode=head-tail 且同时具有正首部上限、正尾部上限和中段省略规则的规范，是 OutputWindow 的首尾子类。
    en: A specification with mode=head-tail, positive head and tail limits, and a middle-omission rule is the head-tail subtype of OutputWindow.
    ja: mode=head-tail、正の head/tail limit、middle omission rule を持つ仕様を OutputWindow の head-tail subtype とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该事实记录一次可核验的披露关系；除专门约束另有声明外，不对所有运行施加统一基数。
    en: This fact records one verifiable disclosure relation; no universal runtime cardinality is imposed unless a dedicated constraint says otherwise.
    ja: この事実は検証可能な開示 relation を記録し、専用制約がない限り全 runtime に一律 cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取：首尾输出窗口属于输出窗口规范
      en: inverse reading of head-tail output window is an output-window specification
      ja: 先頭末尾出力 window は出力 window 仕様であるの逆読み
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: HeadTailWindow-is_a-OutputWindow-example-positive-manual-20260716
      labels:
        zh: 确认首尾输出窗口属于输出窗口规范
        en: Confirm head-tail output window is an output-window specification
        ja: 先頭末尾出力 window は出力 window 仕様であるを確認
      descriptions:
        zh: window-9@2 声明首 80 行、末 40 行并在超限时省略中段。
        en: window-9@2 declares an eighty-line head, forty-line tail, and middle omission on overflow.
        ja: window-9@2 は head 80・tail 40 と超過時 middle omission を宣言します。
      field_values: {}
      related_node_ids:
        - HeadTailWindow
        - OutputWindow
      related_relation_ids:
        - HeadTailWindow-is_a-OutputWindow
      source_claims:
        - claim-head-tail-window-001
    - id: HeadTailWindow-is_a-OutputWindow-example-boundary-manual-20260716
      labels:
        zh: 拒绝误判首尾输出窗口属于输出窗口规范
        en: Reject a false head-tail output window is an output-window specification
        ja: 先頭末尾出力 window は出力 window 仕様であるの誤判定を拒否
      descriptions:
        zh: tail-window-3 只保留末 100 行，没有首部上限。
        en: tail-window-3 retains only the final 100 lines and has no head limit.
        ja: tail-window-3 は末尾 100 行だけ保持し head limit がありません。
      field_values: {}
      related_node_ids:
        - HeadTailWindow
        - OutputWindow
      related_relation_ids:
        - HeadTailWindow-is_a-OutputWindow
      source_claims:
        - claim-head-tail-window-001
  source_claims:
    - claim-head-tail-window-001
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
