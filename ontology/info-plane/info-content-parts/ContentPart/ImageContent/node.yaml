schema: moonweave.ai/ontology-node/v1
id: ImageContent
kind: concept
status: accepted
labels:
  zh: 图像内容
  en: Image Content
  ja: 画像コンテンツ
semantics:
  short_definition:
    zh: 以图像字节、URL 或平台文件标识供视觉能力处理的内容片段。
    en: A content part that supplies image bytes, a URL, or a platform file identifier for vision processing.
    ja: 視覚処理のために画像バイト、URL、またはプラットフォームのファイル識別子を提供するコンテンツパート。
  definition:
    zh: >-
      Image Content 是以图像为主要语义载荷的 Content Part。MCP Prompts 直接定义 Image Content，
      使用 base64 数据和 MIME 类型；OpenAI Responses 使用 `input_image`，其图像可由 image_url 或
      file_id 提供；A2A 不定义单独 ImagePart，而通过 Part 的 raw 或 url 分支加图像 mediaType 承载。
      因此本节点保留图像语义和目标协议，但不宣称 MCP、OpenAI 与 A2A 有相同字段或相同认证模型。
    en: >-
      Image Content is a Content Part whose primary semantic payload is an image. MCP Prompts directly defines
      Image Content with base64 data and a MIME type; OpenAI Responses uses input_image whose image can be
      supplied by image_url or file_id; A2A does not define a separate ImagePart and carries an image through
      the raw or url Part branch with an image media type. This node therefore preserves image semantics and
      target protocol without claiming that MCP, OpenAI, and A2A have identical fields or authentication models.
    ja: >-
      Image Content は主な意味ペイロードが画像である Content Part です。MCP Prompts は base64 データと
      MIME 型を持つ Image Content を直接定義します。OpenAI Responses は image_url または file_id で
      画像を与える input_image を使います。A2A は独立した ImagePart を定義せず、画像 mediaType を伴う
      Part の raw または url 分岐で画像を運びます。そのため本ノードは画像意味と対象プロトコルを保持しますが、
      MCP、OpenAI、A2A が同じフィールドや認証モデルを持つとは主張しません。
  why_needed:
    zh: >-
      视觉模型需要知道载荷是图像，才能选择图像编码、细节级别和图像安全控制。若把图像 URL 或字节混在
      普通文字字段中，调用方无法可靠地构建视觉请求，也可能在记录中丢失图像的 MIME 类型与访问来源。
    en: >-
      A vision-capable model needs to know that a payload is an image in order to select image encoding, detail
      level, and image safety controls. If image URLs or bytes are mixed into ordinary text fields, a caller
      cannot reliably build a vision request and may lose the image MIME type and access source in records.
    ja: >-
      視覚能力を持つモデルは、画像符号化、詳細レベル、画像安全制御を選ぶために、ペイロードが画像であると
      知る必要があります。画像 URL やバイトが通常のテキストフィールドに混在すると、呼び出し側は視覚
      リクエストを確実に構築できず、記録内の MIME 型とアクセス元を失う可能性があります。
  includes:
    - zh: MCP PromptMessage 的 Image Content。
      en: Image Content in an MCP PromptMessage.
      ja: MCP PromptMessage の Image Content。
    - zh: OpenAI Responses 请求的 input_image 项，包括 image_url 或 file_id 形式。
      en: An input_image item in an OpenAI Responses request, including image_url or file_id form.
      ja: image_url または file_id 形式を含む、OpenAI Responses リクエストの input_image 項目。
    - zh: A2A Part 中带 image/* mediaType 的 raw 或 url 图像载荷。
      en: An A2A Part raw or URL image payload with an image/* mediaType.
      ja: image/* mediaType を持つ A2A Part の raw または URL 画像ペイロード。
  excludes:
    - zh: SVG 或其他源代码文本；它们是 TextContent，即使可渲染为图像。
      en: SVG or other source-code text; it is Text Content even when it can render as an image.
      ja: SVG などのソースコードテキスト。画像として描画できても Text Content です。
    - zh: PDF 或 Office 文档中嵌入的图像；整个文件应先作为 FileAttachment 处理。
      en: An image embedded in a PDF or Office document; the whole document is first handled as a File Attachment.
      ja: PDF や Office 文書に埋め込まれた画像。文書全体はまず File Attachment として扱う。
    - zh: OCR 提取出的文字或视觉模型生成的文字说明；它们是派生内容。
      en: OCR-extracted text or a vision model's generated caption; these are derived content.
      ja: OCR で抽出したテキストや視覚モデルが生成したキャプション。これらは派生内容です。
engineering:
  explanation:
    zh: >-
      OpenAI Responses 可将 `input_text` 与 `input_image` 放在同一条消息的 content 数组中；图像可用
      HTTPS URL、base64 data URL 或已上传文件的 file_id 提供。MCP Image Content 使用 `data` 与
      `mimeType`。A2A 接收方则根据 Part 的 raw/url 分支和 `image/png` 等 mediaType 判断图像。工程
      代码必须选择一种目标形状并验证 MIME 类型，不能从一个内部 `image_source` 直接猜出所有协议字段。
    en: >-
      OpenAI Responses can place input_text and input_image in the content array of one message; an image can
      be provided by an HTTPS URL, a base64 data URL, or an uploaded file's file_id. MCP Image Content uses
      data and mimeType. An A2A receiver identifies an image from the raw/url Part branch and a media type such
      as image/png. Engineering code chooses one target shape and validates the MIME type rather than guessing
      all protocol fields from one internal image_source.
    ja: >-
      OpenAI Responses は一つのメッセージの content 配列に input_text と input_image を置けます。画像は
      HTTPS URL、base64 data URL、アップロード済みファイルの file_id で提供できます。MCP Image Content は
      data と mimeType を使います。A2A 受信側は raw/url Part 分岐と image/png などの mediaType から画像を
      判断します。工程コードは一つの対象形状を選び、内部 image_source からすべてのプロトコルフィールドを
      推測するのではなく MIME 型を検証します。
  typical_input:
    - description: OpenAI Chat Completions image_url content part.
      format: |
        {
          "role": "user",
          "content": [
            {"type": "text", "text": "What is in this image?"},
            {"type": "image_url", "image_url": {"url": "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"}}
          ]
        }
      source_claims: [claim-image-content-openai-chat-completions]
    - description: OpenAI Responses API image input by URL.
      format: |
        {
          "role": "user",
          "content": [
            {"type": "input_text", "text": "What is in this image?"},
            {"type": "input_image", "image_url": "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"}
          ]
        }
      source_claims: [claim-image-content-openai]
    - description: MCP Image Content with base64 data.
      format: |
        {
          "type": "image",
          "data": "iVBORw0KGgoAAAANSUhEUg==",
          "mimeType": "image/png"
        }
      source_claims: [claim-image-content-mcp]
  typical_output:
    - description: A2A image Part projected through the URL branch.
      format: |
        {
          "url": "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg",
          "filename": "chart.png",
          "mediaType": "image/png"
        }
      source_claims: [claim-image-content-a2a]
    - description: OpenAI Responses API image input using an uploaded file ID.
      format: |
        {
          "type": "input_image",
          "file_id": "file-vision-42"
        }
      source_claims: [claim-image-content-openai]
  reference_implementations:
    - name: OpenAI API Images and vision guide
      url: https://developers.openai.com/api/docs/guides/images-vision
      description: Documents input_text plus input_image, URL/data-URL image input, and uploaded file IDs.
    - name: Model Context Protocol Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines the Image Content prompt-message data type.
    - name: A2A Protocol Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines raw and URL payload branches and mediaType for carrying image file content.
structure:
  identity_keys: [part_id]
  fields:
    - id: part_id
      labels: {zh: 片段标识, en: part identifier, ja: パート識別子}
      definitions:
        zh: 本地系统用于关联和审计图像内容的稳定标识。
        en: A stable local identifier for associating and auditing image content.
        ja: 画像コンテンツを関連付け、監査するための安定したローカル識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: kind
      labels: {zh: 内容种类, en: content kind, ja: 内容種別}
      definitions:
        zh: 本地规范化判别标签；在此子类中固定为 image，用于选择图像适配器，并不是 A2A 或 OpenAI 的线格式字段。
        en: The local-normalized discriminator, fixed to image for this subtype; it selects an image adapter and is not an A2A or OpenAI wire field.
        ja: このサブタイプでは image に固定されるローカル正規化判別子。画像アダプターの選択に用い、A2A や OpenAI のワイヤフィールドではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: image_source
      labels: {zh: 图像来源, en: image source, ja: 画像ソース}
      definitions:
        zh: 按目标协议解释的 URL、编码数据或平台文件 ID。
        en: A URL, encoded data, or platform file ID interpreted by the target protocol.
        ja: 対象プロトコルで解釈される URL、符号化データ、またはプラットフォーム file ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディア型}
      definitions:
        zh: 图像的 MIME 类型，例如 image/png 或 image/jpeg。
        en: The image MIME type, such as image/png or image/jpeg.
        ja: image/png や image/jpeg などの画像 MIME 型。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: target_protocol
      labels: {zh: 目标协议, en: target protocol, ja: 対象プロトコル}
      definitions:
        zh: 决定图像实际字段和认证方式的协议或 API。
        en: The protocol or API that determines the actual image fields and authentication mechanism.
        ja: 実際の画像フィールドと認証方式を決めるプロトコルまたは API。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: payload
      labels: {zh: 协议载荷, en: protocol payload, ja: プロトコルペイロード}
      definitions:
        zh: 以目标协议真实字段保存的图像项，例如 MCP 的 type/data/mimeType、OpenAI 的 input_image，或 A2A 的 raw/url 分支。
        en: The image item in the target protocol's real fields, such as MCP type/data/mimeType, OpenAI input_image, or an A2A raw/url branch.
        ja: 対象プロトコルの実際のフィールドで保存する画像項目。MCP の type/data/mimeType、OpenAI input_image、または A2A の raw/url 分岐など。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
    - id: detail
      labels: {zh: 图像细节级别, en: image detail level, ja: 画像詳細レベル}
      definitions:
        zh: 仅在目标 API 支持时使用的可选视觉处理细节设置。
        en: An optional visual-processing detail setting used only when the target API supports it.
        ja: 対象 API が対応するときだけ使う、任意の視覚処理詳細設定。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
  constraints:
    - id: image-content-media-type
      expression: media_type starts_with "image/"
      explanation:
        zh: 图像内容必须声明 image/* MIME 类型，防止把任意 URL 错当作图像。
        en: Image Content must declare an image/* MIME type so an arbitrary URL is not mistaken for an image.
        ja: 任意の URL を画像と取り違えないため、Image Content は image/* MIME 型を宣言しなければならない。
    - id: image-content-openai-shape
      expression: target_protocol != "openai-responses" OR exactly_one(payload.image_url, payload.file_id)
      explanation:
        zh: OpenAI input_image 投影使用 image_url 或 file_id 之一，不把二者混成一个输入项。
        en: An OpenAI input_image projection uses one of image_url or file_id instead of mixing both into one input item.
        ja: OpenAI input_image 投影は image_url または file_id の一方を使い、両方を一つの入力項目に混在させない。
    - id: image-content-is-source-not-caption
      expression: derived_caption_ref = null OR derived_caption_ref != part_id
      explanation:
        zh: 图像本身与由视觉模型生成的文字说明必须保存为不同内容和来源记录。
        en: The image itself and a vision-model-generated caption must be stored as different content and provenance records.
        ja: 画像自体と視覚モデル生成キャプションは、別の内容および来歴記録として保存しなければならない。
  required_relations: []
examples:
  - id: image-content-openai-url-image-input
    labels:
      zh: OpenAI URL 图像输入
      en: OpenAI URL image input
      ja: OpenAI URL 画像入力

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ImageContent context/token boundary."}
    field_values:
      part_id: image-42
      kind: image
      image_source: "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"
      media_type: image/png
      target_protocol: openai-responses
      payload: {type: input_image, image_url: "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"}
    related_relation_ids: [ImageContent-specializes-ContentPart]
    source_claims: [claim-image-content-openai]
  - id: image-content-openai-url-file-mix
    labels:
      zh: OpenAI input_image 混用 image_url 与 file_id
      en: OpenAI input_image mixing image_url and file_id
      ja: OpenAI input_image で image_url と file_id 混在
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ImageContent context/token boundary."}
    field_values:
      part_id: image-43
      kind: image
      image_source: "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"
      media_type: image/png
      target_protocol: openai-responses
      payload: {type: input_image, image_url: "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg", file_id: file-vision-42}
    related_relation_ids: [ImageContent-specializes-ContentPart]
    source_claims: [claim-image-content-openai]
  - id: image-content-a2a-url-part
    labels:
      zh: A2A Part url 图像分支
      en: A2A Part url image branch
      ja: A2A Part url 画像分岐
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ImageContent context/token boundary."}
    field_values:
      part_id: image-44
      kind: image
      image_source: "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"
      media_type: image/png
      target_protocol: a2a-1.0
      payload: {url: "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg", filename: chart.png, mediaType: image/png}
    related_relation_ids: [ImageContent-specializes-ContentPart]
    source_claims: [claim-image-content-a2a]
  - id: image-content-anthropic-mcp-base64
    labels:
      zh: Anthropic/MCP base64 图像
      en: Anthropic/MCP base64 image
      ja: Anthropic/MCP base64 画像
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ImageContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ImageContent context/token boundary."}
    field_values:
      part_id: image-45
      kind: image
      image_source: iVBORw0KGgoAAAANSUhEUg==
      media_type: image/png
      target_protocol: mcp-2025-11-25
      payload: {type: image, data: iVBORw0KGgoAAAANSUhEUg==, mimeType: image/png}
    related_relation_ids: [ImageContent-specializes-ContentPart]
    source_claims: [claim-image-content-mcp]
parent_relation:
  id: ImageContent-specializes-ContentPart
  predicate: is_a
  target: concept:ContentPart
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是内容片段的一种
    en: is a content part
    ja: コンテンツパートの一種である
  definitions:
    zh: 图像内容是以图像语义载荷为主的内容片段。
    en: Image Content is a Content Part whose primary semantic payload is an image.
    ja: Image Content は主な意味ペイロードが画像である Content Part です。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_image_specialization
    labels: {zh: 具有图像特化, en: has image specialization, ja: 画像特化を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-image-content-design]
  distinct_fact_rationale:
    zh: 此关系只说明图像内容种类，不表示视觉推理、OCR 或图像生成已经发生。
    en: This relation states only an image-content kind and does not assert that vision reasoning, OCR, or image generation occurred.
    ja: この関係は画像内容種別だけを示し、視覚推論、OCR、画像生成が起きたとは主張しない。
  layout_role: primary-backbone
relations: []
