      en: A2A Part text branch
      ja: A2A Part text 分岐

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; TextContent context/token boundary."}
    field_values:
      part_id: text-17
      kind: text
      text: Summarize the report in three bullets.
      target_protocol: a2a-1.0
      payload: {text: Summarize the report in three bullets.}
      media_type: text/plain
    related_node_ids: [TextContent, ContentPart]
    source_claims: [claim-text-content-a2a]
  - id: text-content-a2a-part-text-url-mix
    labels:
      zh: A2A Part 混用 text 与 url
      en: A2A Part mixing text and url
      ja: A2A Part で text と url を混在
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; TextContent context/token boundary."}
    field_values:
      part_id: text-18
      kind: text
      text: Read this PDF.
      target_protocol: a2a-1.0
      payload: {text: Read this PDF., url: "https://example.com/doc.pdf"}
    related_node_ids: [TextContent, ContentPart]
    source_claims: [claim-text-content-a2a]
  - id: text-content-openai-chat-completions-text
    labels:
      zh: OpenAI Chat Completions type text
      en: OpenAI Chat Completions type text
      ja: OpenAI Chat Completions type text
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; TextContent context/token boundary."}
    field_values:
      part_id: openai-chat-text-1
      kind: text
      text: Summarize the report in three bullets.
      target_protocol: openai-chat-completions
      payload: {type: text, text: "Summarize the report in three bullets."}
    related_node_ids: [TextContent, ContentPart]
    source_claims: [claim-text-content-openai-chat]
  - id: text-content-openai-responses-input-text
    labels:
      zh: OpenAI Responses input_text
      en: OpenAI Responses input_text
      ja: OpenAI Responses input_text
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; TextContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; TextContent context/token boundary."}
    field_values:
      part_id: openai-text-1
      kind: text
      text: Summarize the report in three bullets.
      target_protocol: openai-responses
      payload: {type: input_text, text: "Summarize the report in three bullets."}
    related_node_ids: [TextContent, ContentPart]
    source_claims: [claim-text-content-openai-responses]
  - id: text-content-mcp-prompt-text
    labels:
      zh: MCP PromptMessage Text Content
      en: MCP PromptMessage Text Content
      ja: MCP PromptMessage Text Content
    descriptions: {zh: "Vercel AI SDK streamText({model:openai('gpt-4'),prompt})->textStream; for await chunk of textStream; TextContent maps StreamingOutput/OutputRepresentation.", en: "Vercel AI SDK streamText->textStream; for await chunk of textStream; TextContent maps StreamingOutput/OutputRepresentation.", ja: "Vercel AI SDK streamText textStream chunk; TextContent StreamingOutput."}
    field_values:
      part_id: mcp-text-1
      kind: text
      text: Review this patch for security issues.
      target_protocol: mcp-prompts-2025-11-25
      payload: {type: text, text: "Review this patch for security issues."}
    related_node_ids: [TextContent, ContentPart]
    source_claims: [claim-text-content-mcp]
