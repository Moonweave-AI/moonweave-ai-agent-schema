source_claims:
  - id: claim-text-content-a2a
    source: a2a-part-text-branch
    supports: A2A Part contains exactly one of text, raw, url, or data, making text a distinct payload branch rather than a mixed content object.
    locator: A2A specification section 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-text-content-mcp
    source: mcp-text-content
    supports: MCP Prompts defines Text Content as a content type for PromptMessage.
    locator: MCP Prompts specification sections PromptMessage and Text Content
    evidence_kind: normative
    confidence: high
  - id: claim-text-content-openai-chat-completions
    source: openai-chat-completions-create
    supports: OpenAI Chat Completions documents text content parts with type text inside a message content array.
    locator: Chat Completions create — messages and content
    evidence_kind: official
    confidence: high
  - id: claim-text-content-openai
    source: openai-text-input
    supports: OpenAI documents direct model text prompting through the Responses API and its typed input content.
    locator: Text generation guide sections Use the Responses API and Generate text from a simple prompt
    evidence_kind: official
    confidence: high
  - id: claim-text-content-design
    source: a2a-part-text-branch
    supports: Treating code as text plus optional presentation metadata is a Moonweave boundary decision; it does not assert an external code-only protocol type.
    locator: A2A Part section 4.1.6 and the contrasted MCP/OpenAI text interfaces
    evidence_kind: design-inference
    confidence: medium


