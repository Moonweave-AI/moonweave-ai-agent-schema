schema: moonweave.ai/ontology-node/v1
id: TextContent
kind: concept
status: accepted
labels:
  zh: 文本片段
  en: Text Content
  ja: テキストパート
semantics:
  short_definition:
    zh: 以字符序列承载自然语言、标记文本或代码文本的内容片段。
    en: A content part that carries natural language, markup, or code as a character sequence.
    ja: 自然言語、マークアップ、またはコードを文字列として運ぶコンテンツパート。
  definition:
    zh: >-
      Text Content 是以文本作为主载荷的 Content Part。它映射到 A2A Part 的 text 分支、MCP Prompts
      的 Text Content，以及 OpenAI 请求中的 input_text 项。它可以携带纯文本、Markdown 或代码文本，
      但并不因显示为代码就成为另一种协议内容类型；语言标签、渲染和执行策略属于额外元数据、UI 或工具
      执行边界。它也不等同于图像的 OCR 转写或音频的 ASR 转写，后者是由其他内容派生的新文本。
    en: >-
      Text Content is a Content Part whose primary payload is text. It maps to the text branch of an
      A2A Part, MCP Prompts Text Content, and an OpenAI input_text item. It can carry plain text,
      Markdown, or source code, but displaying code does not create another protocol content type; language
      tags, rendering, and execution policy belong to additional metadata, UI, or tool-execution boundaries.
      It is also not OCR or ASR text derived from image or audio, which is new text derived from another part.
    ja: >-
      Text Content は主ペイロードがテキストである Content Part です。A2A Part の text 分岐、MCP Prompts
      の Text Content、OpenAI の input_text 項目に対応します。プレーンテキスト、Markdown、ソース
      コードを運べますが、コードとして表示されても別のプロトコル内容型にはなりません。言語タグ、
      レンダリング、実行ポリシーは追加メタデータ、UI、またはツール実行の境界に属します。また、画像や
      音声から派生する OCR/ASR テキストとも異なり、それらは別のパートから作られた新しいテキストです。
  why_needed:
    zh: >-
      文本几乎出现在每个智能体交互中，但“文本”并不意味着可以忽略编码、协议字段或来源。明确的文本
      片段让系统能安全地保留用户指令、工具说明和模型输出，也能避免把代码显示规则或转写来源混进原文。
    en: >-
      Text appears in nearly every agent interaction, but text does not mean encoding, protocol fields, or
      provenance can be ignored. Explicit Text Content preserves user instructions, tool descriptions, and
      model output safely, while preventing code-display rules or transcription provenance from being folded
      into the source text.
    ja: >-
      テキストはほぼすべてのエージェント対話に現れますが、テキストだからといって符号化、プロトコル
      フィールド、来歴を無視できるわけではありません。明示的な Text Content はユーザー指示、ツール説明、
      モデル出力を安全に保持し、コード表示規則や文字起こしの来歴が元テキストに混ざることを防ぎます。
  includes:
    - zh: A2A Part 的 text 字段。
      en: The text field of an A2A Part.
      ja: A2A Part の text フィールド。
    - zh: MCP PromptMessage 的 Text Content。
      en: Text Content in an MCP PromptMessage.
      ja: MCP PromptMessage の Text Content。
    - zh: OpenAI Responses 请求中的 input_text 项。
      en: An input_text item in an OpenAI Responses request.
      ja: OpenAI Responses リクエストの input_text 項目。
  excludes:
    - zh: 用 URL、文件 ID 或字节表示的文件与图像载荷。
      en: A file or image payload represented by a URL, file ID, or bytes.
      ja: URL、file ID、またはバイトで表されるファイルや画像のペイロード。
    - zh: A2A Part 的 data 分支中的结构化 JSON 值。
      en: A structured JSON value in the data branch of an A2A Part.
      ja: A2A Part の data 分岐に含まれる構造化 JSON 値。
    - zh: 语法高亮主题、代码执行许可或 Markdown 渲染树。
      en: A syntax-highlighting theme, code-execution permission, or Markdown render tree.
      ja: シンタックスハイライトテーマ、コード実行許可、または Markdown のレンダーツリー。
engineering:
  explanation:
    zh: >-
      发送端按照目标接口构造文本：A2A 发送 `{text: "..."}`，MCP prompt 发送
      `{type: "text", text: "..."}`，OpenAI Responses 发送 `{type: "input_text", text: "..."}`。
      本体中的 `text` 字段保存逻辑内容；若应用需要 Markdown 预览、代码高亮或执行，应另行调用 UI
      或 Tool 层，而不要篡改该文本片段的协议种类。
    en: >-
      A sender constructs text for the target interface: A2A sends {text: "..."}, an MCP prompt sends
      {type: "text", text: "..."}, and OpenAI Responses sends {type: "input_text", text: "..."}. The
      ontology text field stores logical content. If an application needs Markdown preview, code highlighting,
      or execution, it calls the UI or Tool layer separately instead of changing the protocol kind of Text Content.
    ja: >-
      送信側は対象インターフェース用にテキストを構成します。A2A は {text: "..."} を、MCP prompt は
      {type: "text", text: "..."} を、OpenAI Responses は {type: "input_text", text: "..."} を送ります。
      本体の text フィールドは論理的内容を保存します。Markdown プレビュー、コードハイライト、実行が必要な
      場合は、テキストパートのプロトコル種別を変えずに UI または Tool 層を別途呼び出します。
  typical_input:
    - description: An A2A Part using the text payload branch.
      format: |
        {
          "text": "Summarize the report in three bullets.",
          "mediaType": "text/plain"
        }
      source_claims: [claim-text-content-a2a]
    - description: OpenAI Chat Completions text content part.
      format: |
        {
          "type": "text",
          "text": "Summarize the report in three bullets."
        }
      source_claims: [claim-text-content-openai-chat-completions]
    - description: OpenAI Responses API text input.
      format: |
        {
          "type": "input_text",
          "text": "Summarize the report in three bullets."
        }
      source_claims: [claim-text-content-openai]
  typical_output:
    - description: MCP prompt text content.
      format: |
        {
          "role": "user",
          "content": {"type": "text", "text": "Summarize the report in three bullets."}
        }
      source_claims: [claim-text-content-mcp]
    - description: A preserved local Text Content record before target projection.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "record_kind": "content-part",
          "part_id": "text-17",
          "kind": "text",
          "target_protocol": "local-normalized",
          "text": "Summarize the report in three bullets."
        }
      source_claims: [claim-text-content-design]
  reference_implementations:
    - name: OpenAI Chat Completions create
      url: https://developers.openai.com/api/reference/resources/chat/subresources/completions/methods/create
      description: Documents text content parts with type text in the messages array.
    - name: A2A Protocol Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the text branch of a Part and its use in messages and artifacts.
    - name: Model Context Protocol Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines Text Content used in an MCP PromptMessage.
    - name: OpenAI API Text generation guide
      url: https://developers.openai.com/api/docs/guides/text
      description: Documents direct text prompting with the Responses API.
structure:
  identity_keys: [part_id]
  fields:
    - id: part_id
      labels: {zh: 片段标识, en: part identifier, ja: パート識別子}
      definitions:
        zh: 本地系统用于关联和审计文本片段的稳定标识。
        en: A stable local identifier used to associate and audit Text Content.
        ja: テキストパートを関連付け、監査するためにローカルシステムが使う安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: kind
      labels: {zh: 内容种类, en: content kind, ja: 内容種別}
      definitions:
        zh: 本地规范化判别标签；该子类固定为 text，不能把它当作 A2A 1.0 Part 的线格式字段。
        en: The local-normalized discriminator, fixed to text for this subtype; it is not an A2A 1.0 Part wire field.
        ja: このサブタイプでは text に固定されるローカル正規化判別子。A2A 1.0 Part のワイヤフィールドではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: text
      labels: {zh: 文本, en: text, ja: テキスト}
      definitions:
        zh: 要按目标协议文本字段编码的 Unicode 字符序列。
        en: A Unicode character sequence to encode in the target protocol's text field.
        ja: 対象プロトコルのテキストフィールドに符号化する Unicode 文字列。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: payload
      labels: {zh: 协议载荷, en: protocol payload, ja: プロトコルペイロード}
      definitions:
        zh: 按 target_protocol 的真实字段形状保存的文本载荷；例如 A2A 的 text、MCP 的 type/text 或 OpenAI 的 input_text。
        en: The text payload in the real field shape of target_protocol, such as A2A text, MCP type/text, or OpenAI input_text.
        ja: target_protocol の実際のフィールド形状で保持するテキストペイロード。例えば A2A text、MCP type/text、OpenAI input_text。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
    - id: target_protocol
      labels: {zh: 目标协议, en: target protocol, ja: 対象プロトコル}
      definitions:
        zh: 决定文本将采用 A2A、MCP、OpenAI 或本地规范化形状的标识。
        en: An identifier that determines whether text uses an A2A, MCP, OpenAI, or local-normalized shape.
        ja: テキストが A2A、MCP、OpenAI、またはローカル正規化の形状を使うかを決める識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディア型}
      definitions:
        zh: 可选 MIME 类型，例如 text/plain 或 text/markdown。
        en: An optional MIME type such as text/plain or text/markdown.
        ja: text/plain や text/markdown などの任意の MIME 型。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
    - id: code_language
      labels: {zh: 代码语言, en: code language, ja: コード言語}
      definitions:
        zh: 可选的源代码语言提示，只供显示或工具选择使用，不改变文本内容的协议种类。
        en: An optional source-code language hint for presentation or tool selection; it does not change the protocol kind of the text.
        ja: 表示またはツール選択のための任意のソースコード言語ヒント。テキストのプロトコル種別を変えない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
  constraints:
    - id: text-content-has-text
      expression: text.trim().length > 0
      explanation:
        zh: 文本片段必须有非空文本；空的载荷应被省略而非伪装成内容。
        en: Text Content must contain non-empty text; an empty payload should be omitted rather than masquerading as content.
        ja: Text Content には空でないテキストが必要であり、空のペイロードは内容のように装わず省略すべきである。
    - id: text-content-a2a-shape
      expression: target_protocol != "a2a-1.0" OR (payload.text = text AND payload.raw = null AND payload.url = null AND payload.data = null)
      explanation:
        zh: A2A 投影必须将 text 置于 Part 的 text 分支，且不能与 raw、url 或 data 混用。
        en: An A2A projection must put text in the Part text branch and cannot mix raw, url, or data.
        ja: A2A への投影は text を Part の text 分岐へ置き、raw、url、data を混在させてはならない。
    - id: text-content-code-is-still-text
      expression: code_language != null implies kind = "text"
      explanation:
        zh: 代码语言元数据不会创建一个新的内容协议类型；代码仍以文本内容传递。
        en: Code-language metadata does not create a new protocol content type; code still travels as text.
        ja: コード言語メタデータは新しいプロトコル内容型を作らず、コードは引き続きテキストとして運ばれる。
  required_relations: []
examples:
