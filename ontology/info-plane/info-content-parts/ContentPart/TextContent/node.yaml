  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是内容片段的一种
    en: is a content part
    ja: コンテンツパートの一種である
  definitions:
    zh: 文本片段是以字符序列为主载荷的内容片段。
    en: Text Content is a Content Part whose primary payload is a character sequence.
    ja: Text Content は主ペイロードが文字列である Content Part です。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_text_specialization
    labels: {zh: 具有文本特化, en: has text specialization, ja: テキスト特化を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-text-content-design]
  distinct_fact_rationale:
    zh: 该关系只表达内容种类层级，不表示消息发送、模型生成或界面渲染事件。
    en: This relation expresses only content-kind hierarchy, not a message send, model generation, or UI rendering event.
    ja: この関係は内容種別の階層だけを表し、メッセージ送信、モデル生成、UI 描画イベントは表さない。
  layout_role: primary-backbone
relations: []
