schema: moonweave.ai/ontology-node/v1
id: StructuredData
kind: concept
status: accepted
labels:
  zh: 数据片段
  en: Structured Data
  ja: データパート
semantics:
  short_definition:
    zh: 以一个结构化 JSON 值作为载荷的 A2A 内容片段。
    en: An A2A content part whose payload is one structured JSON value.
    ja: 一つの構造化 JSON 値をペイロードとする A2A のコンテンツパート。
  definition:
    zh: >-
      Structured Data 映射到 A2A 1.0 Part 的 data 分支：data 可以是对象、数组、字符串、数值、布尔值或 null，
      并可带 mediaType。它代表应用希望接收方按 JSON 值而不是自然语言段落解释的内容。Structured Data 不是
      MCP PromptMessage 的通用内容类型，也不是 OpenAI Responses 的通用 `input_data` 类型；在那些接口中，
      结构化 JSON 可能是文本、嵌入资源、工具参数或结构化输出，各自有不同的边界。本节点不把它们合并。
    en: >-
      Structured Data maps to the data branch of an A2A 1.0 Part: data may be an object, array, string, number,
      boolean, or null and may carry mediaType. It represents content that a receiver should interpret as a
      JSON value rather than a natural-language passage. Structured Data is not a general MCP PromptMessage content
      type or a general OpenAI Responses input_data type; in those interfaces structured JSON may be text, an
      embedded resource, tool arguments, or structured output, each with a different boundary. This node does
      not merge them.
    ja: >-
      Structured Data は A2A 1.0 Part の data 分岐に写像されます。data はオブジェクト、配列、文字列、数値、
      真偽値、null のいずれでもよく、mediaType を持てます。これは受信側が自然言語段落ではなく JSON 値
      として解釈すべき内容を表します。Structured Data は一般的な MCP PromptMessage 内容型でも、一般的な
      OpenAI Responses の input_data 型でもありません。これらのインターフェースでは構造化 JSON は
      テキスト、埋め込みリソース、ツール引数、構造化出力になり得て、それぞれ境界が異なります。本ノードは
      それらを統合しません。
  why_needed:
    zh: >-
      JSON 看起来像文本，但下游通常需要保留其键、数组和类型，而不是让模型把它当散文重写。Structured Data
      让 A2A 交互明确“这是一项数据值”，并阻止工程实现把任何出现 JSON 的地方都误标为跨协议的统一数据块。
    en: >-
      JSON looks like text, but downstream code often needs to preserve its keys, arrays, and types rather
      than let a model rewrite it as prose. Structured Data makes an A2A interaction explicitly say “this is a data
      value” and prevents an implementation from labeling every occurrence of JSON as one shared cross-protocol type.
    ja: >-
      JSON はテキストに見えますが、下流コードではモデルに文章として書き換えさせず、キー、配列、型を
      保持する必要があります。Structured Data は A2A の対話で「これはデータ値である」と明示し、JSON が現れる
      すべての場所を一つのプロトコル横断データブロックと誤ってラベル付けすることを防ぎます。
  includes:
    - zh: A2A Part 的 `data` JSON 值。
      en: The data JSON value of an A2A Part.
      ja: A2A Part の `data` JSON 値。
    - zh: 带 `application/json` 或更具体媒体类型的 A2A 数据载荷。
      en: An A2A data payload with application/json or a more specific media type.
      ja: application/json またはより具体的なメディア型を持つ A2A データペイロード。
    - zh: 作为一项 A2A Message 或 Artifact 内容被传递的机器可读值。
      en: A machine-readable value carried as one item of A2A Message or Artifact content.
      ja: A2A Message または Artifact 内容の一項目として運ばれる機械可読値。
  excludes:
    - zh: 仅仅把 JSON 字符串写入 TextContent 的文本载荷。
      en: A JSON string merely written into the text payload of Text Content.
      ja: Text Content のテキストペイロードに単に書かれた JSON 文字列。
    - zh: OpenAI 的工具参数或结构化输出约束；它们是调用或输出合同，而非 A2A Part 的 data 分支。
      en: OpenAI tool arguments or structured-output constraints; these are invocation or output contracts, not the data branch of an A2A Part.
      ja: OpenAI のツール引数または構造化出力制約。これらは A2A Part の data 分岐ではなく、呼出または出力契約です。
    - zh: CSV、XLSX 或 PDF 文件；它们应使用文件载荷并由文件处理流程解释。
      en: A CSV, XLSX, or PDF file; it uses a file payload and is interpreted by a file-processing flow.
      ja: CSV、XLSX、PDF ファイル。これらはファイルペイロードを使い、ファイル処理フローで解釈されます。
engineering:
  explanation:
    zh: >-
      A2A 客户端在 `parts` 数组中放入 `{data: ..., mediaType: "application/json"}`，服务器按协议将其
      解析为一项数据值。若目标是 OpenAI function calling，应使用该工具的 JSON Schema 参数，而非把数据
      部分伪造为 `input_data`；若目标是 MCP prompt，则应使用文档化的内容类型或资源接口。适配器必须根据
      `target_protocol` 选择这些真实接口。
    en: >-
      An A2A client places {data: ..., mediaType: "application/json"} in a parts array and the server parses
      it as one data value. If the target is OpenAI function calling, use that tool's JSON Schema parameters
      rather than inventing an input_data item; if the target is an MCP prompt, use a documented content type
      or resource interface. An adapter selects these real interfaces from target_protocol.
    ja: >-
      A2A クライアントは parts 配列に {data: ..., mediaType: "application/json"} を置き、サーバーは
      それを一つのデータ値として解析します。対象が OpenAI function calling なら input_data 項目を
      捏造せず、そのツールの JSON Schema パラメータを使います。対象が MCP prompt なら文書化された
      内容型またはリソースインターフェースを使います。アダプターは target_protocol からこれらの実際の
      インターフェースを選択します。
  typical_input:
    - description: An A2A 1.0 Part using the data branch for an extraction result.
      format: |
        {
          "data": {
            "invoice_id": "INV-42",
            "total": 120.50,
            "currency": "USD"
          },
          "mediaType": "application/json"
        }
      source_claims: [claim-structured-data-a2a]
  typical_output:
    - description: A2A Message whose parts array contains the data value.
      format: |
        {
          "messageId": "msg-data-42",
          "role": "ROLE_AGENT",
          "parts": [{"data": {"invoice_id": "INV-42", "total": 120.50}, "mediaType": "application/json"}]
        }
      source_claims: [claim-structured-data-a2a]
    - description: Rejection for an attempted OpenAI input_data projection.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "record_kind": "content-part-projection-error",
          "error": "No documented OpenAI Responses input_data item; choose a tool-argument, text, file, or other documented API shape."
        }
      source_claims: [claim-structured-data-openai-boundary, claim-structured-data-design]
  reference_implementations:
    - name: A2A Protocol Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the data field as one of the Part one-of payload branches and permits mediaType.
    - name: OpenAI API Function calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Documents JSON Schema tool parameters as the supported shape for structured tool arguments.
    - name: Model Context Protocol Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Documents the actual MCP prompt content types, which do not imply equivalence with an A2A Part data branch.
structure:
  identity_keys: [part_id]
  fields:
    - id: part_id
      labels: {zh: 片段标识, en: part identifier, ja: パート識別子}
      definitions:
        zh: 本地系统为该数据片段分配的稳定关联标识。
        en: A stable association identifier assigned to structured data by a local system.
        ja: ローカルシステムがデータパートに割り当てる安定した関連識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: kind
      labels: {zh: 内容种类, en: content kind, ja: 内容種別}
      definitions:
        zh: 本地规范化判别标签；在此子类中固定为 data，用于选择 A2A data 分支适配器，并不是 A2A 的额外线格式字段。
        en: The local-normalized discriminator, fixed to data for this subtype; it selects an A2A data-branch adapter and is not an additional A2A wire field.
        ja: このサブタイプでは data に固定されるローカル正規化判別子。A2A data 分岐アダプターの選択に用い、A2A の追加ワイヤフィールドではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: data
      labels: {zh: 数据值, en: data value, ja: データ値}
      definitions:
        zh: A2A Part data 分支所承载的一个 JSON 值。
        en: One JSON value carried by the A2A Part data branch.
        ja: A2A Part の data 分岐が運ぶ一つの JSON 値。
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
    - id: target_protocol
      labels: {zh: 目标协议, en: target protocol, ja: 対象プロトコル}
      definitions:
        zh: 应为 a2a-1.0 或在本地规范化阶段明确标识为待投影的目标。
        en: a2a-1.0 or an explicitly marked pending target during local normalization.
        ja: a2a-1.0、またはローカル正規化中に明示された投影待ちの対象。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: payload
      labels: {zh: 协议载荷, en: protocol payload, ja: プロトコルペイロード}
      definitions:
        zh: 以目标协议真实字段保存的数据项；在 A2A 中是带可选 mediaType 的 data 分支，而不是跨协议通用 JSON API。
        en: The data item in the target protocol's real fields; in A2A it is the data branch with optional mediaType, not a general cross-protocol JSON API.
        ja: 対象プロトコルの実際のフィールドで保存するデータ項目。A2A では任意の mediaType を持つ data 分岐であり、プロトコル横断の汎用 JSON API ではない。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディア型}
      definitions:
        zh: 描述数据解释方式的可选 MIME 类型，JSON 例通常为 application/json。
        en: An optional MIME type describing data interpretation, commonly application/json for JSON examples.
        ja: データ解釈を記述する任意の MIME 型。JSON の例では通常 application/json。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
  constraints:
    - id: structured-data-a2a-data-branch
      expression: target_protocol != "a2a-1.0" OR (payload has_key "data" AND NOT (payload has_key "text" OR payload has_key "raw" OR payload has_key "url") AND payload.data = data)
      explanation:
        zh: A2A Part 的 data 投影必须使用 data 分支，不能和 text、raw 或 url 叠加。
        en: A Structured Data projection to A2A must use the Part data branch and cannot be combined with text, raw, or url.
        ja: A2A への Structured Data 投影は Part の data 分岐を使い、text、raw、url と組み合わせてはならない。
    - id: structured-data-json-media-type
      expression: media_type = null OR media_type matches "^[a-z]+/[a-z0-9.+-]+$"
      explanation:
        zh: 若声明媒体类型，它必须是可解析的 MIME 类型，而不是人类描述。
        en: When declared, media_type must be a parseable MIME type rather than a human description.
        ja: media_type を宣言する場合は、人間向け説明ではなく解析可能な MIME 型でなければならない。
  required_relations: []
examples:
  - id: structured-data-a2a-invoice-extraction-data
    labels:
      zh: A2A 发票提取数据
      en: A2A invoice extraction data
      ja: A2A 請求書抽出データ

    descriptions: {zh: "Instructor client=instructor.from_openai(OpenAI()); create(response_model=User, messages=[...]) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", en: "Instructor from_openai; create(response_model=User, messages) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", ja: "Instructor response_model=User Pydantic; StructuredData StructuredContent."}
    field_values:
      part_id: data-42
      kind: data
      data: {invoice_id: INV-42, total: 120.50, currency: USD}
      target_protocol: a2a-1.0
      media_type: application/json
      payload: {data: {invoice_id: INV-42, total: 120.50, currency: USD}, mediaType: application/json}
    related_relation_ids: [StructuredData-specializes-ContentPart]
    source_claims: [claim-structured-data-a2a]
  - id: structured-data-a2a-data-text-mix
    labels:
      zh: A2A data 与 text 混用
      en: A2A data and text mixed
      ja: A2A data と text 混在
    descriptions: {zh: "Instructor client=instructor.from_openai(OpenAI()); create(response_model=User, messages=[...]) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", en: "Instructor from_openai; create(response_model=User, messages) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", ja: "Instructor response_model=User Pydantic; StructuredData StructuredContent."}
    field_values:
      part_id: data-43
      kind: data
      data: {invoice_id: INV-42}
      target_protocol: a2a-1.0
      media_type: application/json
      payload: {data: {invoice_id: INV-42}, text: Invoice extracted}
    related_relation_ids: [StructuredData-specializes-ContentPart]
    source_claims: [claim-structured-data-a2a]
  - id: structured-data-openai-json-schema-response
    labels:
      zh: OpenAI json_schema 结构化输出
      en: OpenAI json_schema structured output
      ja: OpenAI json_schema 構造化出力
    descriptions: {zh: "Instructor client=instructor.from_openai(OpenAI()); create(response_model=User, messages=[...]) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", en: "Instructor from_openai; create(response_model=User, messages) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", ja: "Instructor response_model=User Pydantic; StructuredData StructuredContent."}
    field_values:
      target_protocol: openai-function-calling
      tool_parameters: {type: object, properties: {invoice_id: {type: string}}}
    related_relation_ids: [StructuredData-specializes-ContentPart]
    source_claims: [claim-structured-data-openai-boundary]
  - id: structured-data-a2a-rag-scores
    labels:
      zh: A2A RAG 分数数组
      en: A2A RAG score array
      ja: A2A RAG スコア配列
    descriptions: {zh: "Instructor client=instructor.from_openai(OpenAI()); create(response_model=User, messages=[...]) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", en: "Instructor from_openai; create(response_model=User, messages) Pydantic validation; StructuredData maps StructuredContent/OutputFormat type-safe parsing.", ja: "Instructor response_model=User Pydantic; StructuredData StructuredContent."}
    field_values:
      part_id: data-44
      kind: data
      data: [{id: doc-1, score: 0.91}, {id: doc-2, score: 0.84}, {id: doc-3, score: 0.71}]
      target_protocol: a2a-1.0
      media_type: application/json
      payload: {data: [{id: doc-1, score: 0.91}, {id: doc-2, score: 0.84}, {id: doc-3, score: 0.71}], mediaType: application/json}
    related_relation_ids: [StructuredData-specializes-ContentPart]
    source_claims: [claim-structured-data-a2a]
parent_relation:
  id: StructuredData-specializes-ContentPart
  predicate: is_a
  target: concept:ContentPart
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是内容片段的一种
    en: is a content part
    ja: コンテンツパートの一種である
  definitions:
    zh: 数据片段是主载荷为结构化 JSON 值的内容片段。
    en: Structured Data is a Content Part whose primary payload is a structured JSON value.
    ja: Structured Data は主ペイロードが構造化 JSON 値である Content Part です。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_data_specialization
    labels: {zh: 具有数据特化, en: has data specialization, ja: データ特化を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-structured-data-design]
  distinct_fact_rationale:
    zh: 该关系描述内容种类，并不表示一项具体的 A2A 发送或工具调用。
    en: This relation describes a content kind and does not represent a concrete A2A send or tool invocation.
    ja: この関係は内容種別を記述し、具体的な A2A 送信やツール呼出を表すものではない。
  layout_role: primary-backbone
relations: []
sources:
  - id: a2a-part-data-branch
    title: A2A Protocol Specification
    publisher: A2A Project
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0
    accessed_on: 2026-07-18
    source_type: standard
    relevance: Defines the data field of Part as an arbitrary JSON value and requires one payload branch.
  - id: openai-function-calling-data-boundary
    title: OpenAI API Function calling guide
    publisher: OpenAI
    url: https://developers.openai.com/api/docs/guides/function-calling
    version: Documentation accessed 2026-07-18
    accessed_on: 2026-07-18
    source_type: official-doc
    relevance: Documents JSON Schema parameters for function-tool calls, establishing a distinct invocation boundary.
  - id: mcp-prompts-data-boundary
    title: Model Context Protocol Prompts Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: standard
    relevance: Lists MCP prompt content types and supports the explicit non-equivalence boundary with A2A data.
source_claims:
  - id: claim-structured-data-a2a
    source: a2a-part-data-branch
    supports: A2A Part permits data to be any JSON value and requires a Part to contain exactly one of text, raw, url, or data.
    locator: A2A specification section 4.1.6 Part
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-openai-boundary
    source: openai-function-calling-data-boundary
    supports: OpenAI function calling documents JSON Schema parameters for tool calls, supporting the distinction from an A2A message content part.
    locator: Function calling guide sections Define tools and JSON Schema parameters
    evidence_kind: official
    confidence: high
  - id: claim-structured-data-mcp-boundary
    source: mcp-prompts-data-boundary
    supports: MCP Prompts defines its own prompt content data types rather than an A2A-compatible Part data branch.
    locator: MCP Prompts specification sections PromptMessage and Data Types
    evidence_kind: normative
    confidence: high
  - id: claim-structured-data-design
    source: a2a-part-data-branch
    supports: Naming this node Structured Data and limiting its A2A mapping to the Part data branch is a Moonweave design choice that prevents false protocol equivalence.
    locator: A2A Part section 4.1.6 and contrasted OpenAI/MCP interfaces
    evidence_kind: design-inference
    confidence: medium


