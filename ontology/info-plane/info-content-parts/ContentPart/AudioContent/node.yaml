schema: moonweave.ai/ontology-node/v1
id: AudioContent
kind: concept
status: accepted
labels:
  zh: 音频内容
  en: Audio Content
  ja: 音声コンテンツ
semantics:
  short_definition:
    zh: 以带格式说明的音频字节、URL 或编码数据供语音或音频模型处理的内容片段。
    en: A content part that supplies audio bytes, a URL, or encoded data with format information for speech or audio-model processing.
    ja: 音声またはオーディオモデル処理のために、形式情報付きの音声バイト、URL、または符号化データを提供するコンテンツパート。
  definition:
    zh: >-
      Audio Content 是主载荷为声音的 Content Part。MCP Prompts 定义 Audio Content，使用 base64 数据和
      MIME 类型；OpenAI 的音频输入示例在 Chat Completions 内容中使用 `input_audio`，其内部有 base64
      `data` 与 `format`；A2A 将音频通过 Part 的 raw 或 url 分支并以 `audio/*` mediaType 传递。它不是
      文字转写、TTS 文本、扬声器选择或实时会话状态；这些是对音频的派生结果、输出配置或运行时资源。
    en: >-
      Audio Content is a Content Part whose primary payload is sound. MCP Prompts defines Audio Content with
      base64 data and MIME type; OpenAI's audio-input example uses input_audio in Chat Completions content with
      base64 data and format; A2A transfers audio through the raw or URL Part branch with an audio/* media type.
      It is not a transcript, TTS source text, speaker selection, or realtime-session state; those are derived
      results, output configuration, or runtime resources related to audio.
    ja: >-
      Audio Content は主ペイロードが音である Content Part です。MCP Prompts は base64 データと MIME 型を
      持つ Audio Content を定義します。OpenAI の音声入力例は Chat Completions 内容で、base64 data と
      format を持つ input_audio を使います。A2A は audio/* mediaType を伴う Part の raw または URL 分岐で
      音声を転送します。これは文字起こし、TTS の元テキスト、話者選択、Realtime セッション状態ではありません。
      それらは音声に関係する派生結果、出力設定、またはランタイム資源です。
  why_needed:
    zh: >-
      语音交互需要明确格式和数据来源：模型不能从一段普通字符串判断 WAV、MP3 或 base64 字节，也不能安全
      地决定是否可转写或理解。音频内容让系统保留编码边界，避免把录音、转写文本和语音输出配置混成一个“语音消息”。
    en: >-
      Voice interaction needs explicit format and data origin: a model cannot infer WAV, MP3, or base64 bytes
      from ordinary text or safely decide whether it can transcribe or understand them. Audio Content preserves
      the encoding boundary and avoids merging a recording, its transcript, and speech-output configuration into
      one “voice message.”
    ja: >-
      音声対話には明示的な形式とデータ元が必要です。モデルは通常テキストから WAV、MP3、base64 バイトを
      推論できず、文字起こしや理解が可能かも安全に判断できません。Audio Content は符号化境界を保持し、
      録音、文字起こし、音声出力設定を一つの「音声メッセージ」に統合することを避けます。
  includes:
    - zh: MCP PromptMessage 的 Audio Content。
      en: Audio Content in an MCP PromptMessage.
      ja: MCP PromptMessage の Audio Content。
    - zh: OpenAI Chat Completions 内容中的 input_audio 与 data/format 载荷。
      en: An input_audio item with data and format payload in OpenAI Chat Completions content.
      ja: OpenAI Chat Completions 内容内の data と format ペイロードを持つ input_audio 項目。
    - zh: A2A Part 中带 audio/* mediaType 的 raw 或 URL 音频载荷。
      en: An A2A Part raw or URL audio payload with an audio/* mediaType.
      ja: audio/* mediaType を持つ A2A Part の raw または URL 音声ペイロード。
  excludes:
    - zh: 从音频得到的文本转写；它是新的 TextContent。
      en: Text transcribed from audio; it is new Text Content.
      ja: 音声から文字起こししたテキスト。これは新しい Text Content です。
    - zh: 文本到语音请求的文本、声音名称或输出格式配置。
      en: Text-to-speech request text, voice name, or output-format configuration.
      ja: Text-to-speech リクエストのテキスト、voice 名、または出力形式設定。
    - zh: 实时连接的会话、WebSocket 或语音活动检测事件。
      en: A realtime connection session, WebSocket, or voice-activity-detection event.
      ja: Realtime 接続セッション、WebSocket、または音声活動検出イベント。
engineering:
  explanation:
    zh: >-
      对 OpenAI 音频模型，Chat Completions 请求把 `{type: "input_audio", input_audio: {data, format}}`
      放入用户消息内容数组；`data` 是 base64，`format` 例如 wav。MCP Audio Content 采用 data 与 mimeType。
      A2A 接收方使用 raw/url 与 `audio/wav` 等 mediaType。实现必须为目标接口执行重新编码或上传，而不是把
      MCP 的 mimeType 字段直接复制到 OpenAI input_audio，或把转写结果覆盖原始音频。
    en: >-
      For an OpenAI audio model, a Chat Completions request places {type: "input_audio", input_audio:
      {data, format}} in a user-message content array; data is base64 and format can be wav. MCP Audio Content
      uses data and mimeType. An A2A receiver uses raw/url and a media type such as audio/wav. An implementation
      re-encodes or uploads for the target interface rather than copying MCP mimeType into OpenAI input_audio or
      overwriting source audio with a transcript.
    ja: >-
      OpenAI 音声モデルでは、Chat Completions リクエストはユーザーメッセージ内容配列に
      {type: "input_audio", input_audio: {data, format}} を置きます。data は base64 で format は wav
      などです。MCP Audio Content は data と mimeType を使います。A2A 受信側は raw/url と audio/wav
      などの mediaType を使います。実装は MCP mimeType を OpenAI input_audio にコピーしたり、文字起こしで
      ソース音声を上書きしたりせず、対象インターフェース用に再符号化またはアップロードします。
  typical_input:
    - description: OpenAI Chat Completions audio input item.
      format: |
        {
          "type": "input_audio",
          "input_audio": {
            "data": "<base64 WAV bytes>",
            "format": "wav"
          }
        }
      source_claims: [claim-audio-content-openai]
    - description: MCP Audio Content.
      format: |
        {
          "type": "audio",
          "data": "<base64 audio bytes>",
          "mimeType": "audio/wav"
        }
      source_claims: [claim-audio-content-mcp]
  typical_output:
    - description: A2A URL audio Part.
      format: |
        {
          "url": "https://cdn.openai.com/API/docs/audio/alloy.wav",
          "filename": "meeting.wav",
          "mediaType": "audio/wav"
        }
      source_claims: [claim-audio-content-a2a]
    - description: A separate local transcript record derived from, not replacing, audio.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "record_kind": "derived-transcript",
          "source_audio_part_id": "audio-42",
          "derived_text_part_id": "text-transcript-42",
          "text": "The meeting starts at nine."
        }
      source_claims: [claim-audio-content-design]
  reference_implementations:
    - name: OpenAI API Audio and speech guide
      url: https://developers.openai.com/api/docs/guides/audio
      description: Documents input_audio with encoded data and format in Chat Completions content.
    - name: Model Context Protocol Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines Audio Content with base64 data and MIME type for MCP prompt messages.
    - name: A2A Protocol Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines raw and URL payload branches and mediaType for file-like audio content.
structure:
  identity_keys: [part_id]
  fields:
    - id: part_id
      labels: {zh: 片段标识, en: part identifier, ja: パート識別子}
      definitions:
        zh: 本地系统用于关联和审计音频内容的稳定标识。
        en: A stable local identifier for associating and auditing audio content.
        ja: 音声コンテンツを関連付け、監査するための安定したローカル識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: kind
      labels: {zh: 内容种类, en: content kind, ja: 内容種別}
      definitions:
        zh: 本地规范化判别标签；在此子类中固定为 audio，用于选择音频适配器，并不是 MCP、A2A 或 OpenAI 的线格式字段。
        en: The local-normalized discriminator, fixed to audio for this subtype; it selects an audio adapter and is not an MCP, A2A, or OpenAI wire field.
        ja: このサブタイプでは audio に固定されるローカル正規化判別子。音声アダプターの選択に用い、MCP、A2A、OpenAI のワイヤフィールドではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: audio_source
      labels: {zh: 音频来源, en: audio source, ja: 音声ソース}
      definitions:
        zh: 按目标协议解释的 URL、编码字节或平台托管文件标识。
        en: A URL, encoded bytes, or platform-hosted file identifier interpreted by the target protocol.
        ja: 対象プロトコルで解釈される URL、符号化バイト、またはプラットフォームホストのファイル識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディア型}
      definitions:
        zh: 音频 MIME 类型，例如 audio/wav 或 audio/mpeg。
        en: An audio MIME type such as audio/wav or audio/mpeg.
        ja: audio/wav や audio/mpeg などの音声 MIME 型。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: format
      labels: {zh: 编码格式, en: encoding format, ja: 符号化形式}
      definitions:
        zh: 目标 API 需要时使用的格式名称，例如 OpenAI input_audio 的 wav。
        en: A format name used when the target API requires one, such as wav for OpenAI input_audio.
        ja: 対象 API が必要とする場合に使う形式名。例として OpenAI input_audio の wav。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
    - id: target_protocol
      labels: {zh: 目标协议, en: target protocol, ja: 対象プロトコル}
      definitions:
        zh: 决定实际音频字段形状和会话边界的协议或 API。
        en: The protocol or API that determines the actual audio-field shape and session boundary.
        ja: 実際の音声フィールド形状とセッション境界を決めるプロトコルまたは API。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: payload
      labels: {zh: 协议载荷, en: protocol payload, ja: プロトコルペイロード}
      definitions:
        zh: 以目标协议真实字段保存的音频项，例如 OpenAI 的 input_audio/data/format、MCP 的 type/data/mimeType，或 A2A 的 raw/url 分支。
        en: The audio item in the target protocol's real fields, such as OpenAI input_audio/data/format, MCP type/data/mimeType, or an A2A raw/url branch.
        ja: 対象プロトコルの実際のフィールドで保存する音声項目。OpenAI の input_audio/data/format、MCP の type/data/mimeType、または A2A の raw/url 分岐など。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
  constraints:
    - id: audio-content-media-type
      expression: media_type starts_with "audio/"
      explanation:
        zh: 音频内容必须声明 audio/* MIME 类型，不能用普通文本 MIME 类型替代。
        en: Audio Content must declare an audio/* MIME type and cannot substitute an ordinary text MIME type.
        ja: Audio Content は audio/* MIME 型を宣言し、通常のテキスト MIME 型で代用してはならない。
    - id: audio-content-openai-format
      expression: target_protocol != "openai-chat-completions-audio" OR (format != null AND format != "")
      explanation:
        zh: 当投影到 OpenAI 文档化的音频输入时，必须提供 format；具体允许值随目标 API 和模型文档核验，不能由本地节点臆定。
        en: When projecting to the documented OpenAI audio input, a non-empty format is required; the allowed value must be verified against the target API and model documentation rather than invented locally.
        ja: 文書化された OpenAI 音声入力へ投影する場合は空でない format が必要である。許容値はローカルで作らず、対象 API とモデルの文書で検証しなければならない。
    - id: audio-content-transcript-separate
      expression: derived_transcript_part_id = null OR derived_transcript_part_id != part_id
      explanation:
        zh: 转写必须是新 TextContent，不能把音频内容的字节和文字覆盖到同一记录。
        en: A transcript must be new Text Content and cannot overwrite audio bytes and text into one record.
        ja: 文字起こしは新しい Text Content でなければならず、音声バイトとテキストを一つの記録に上書きできない。
  required_relations: []
examples:
  - id: audio-content-openai-wav-audio-input
    labels:
      zh: OpenAI WAV 音频输入
      en: OpenAI WAV audio input
      ja: OpenAI WAV 音声入力
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; AudioContent context/token boundary."}

    field_values:
      part_id: audio-42
      kind: audio
      audio_source: UklGRiQAAABXQVZFZm10IBAAAAABAAEA
      media_type: audio/wav
      format: wav
      target_protocol: openai-chat-completions-audio
      payload: {type: input_audio, input_audio: {data: UklGRiQAAABXQVZFZm10IBAAAAABAAEA, format: wav}}
    related_relation_ids: [AudioContent-specializes-ContentPart]
    source_claims: [claim-audio-content-openai]
  - id: audio-content-no-format
    labels:
      zh: 没有格式的 OpenAI 音频输入
      en: OpenAI audio input without format
      ja: format のない OpenAI 音声入力
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; AudioContent context/token boundary."}

    field_values:
      part_id: audio-43
      kind: audio
      audio_source: UklGRiQAAABXQVZFZm10IBAAAAABAAEA
      media_type: audio/wav
      target_protocol: openai-chat-completions-audio
      payload: {type: input_audio, input_audio: {data: UklGRiQAAABXQVZFZm10IBAAAAABAAEA}}
    related_relation_ids: [AudioContent-specializes-ContentPart]
    source_claims: [claim-audio-content-openai]
  - id: audio-content-transcript
    labels:
      zh: 从录音派生的文字转写
      en: Transcript derived from a recording
      ja: 録音から派生した文字起こし
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; AudioContent context/token boundary."}

    field_values:
      source_audio_part_id: audio-42
      derived_text_part_id: text-transcript-42
      transcript_text: The meeting starts at nine.
    related_relation_ids: [AudioContent-specializes-ContentPart]
    source_claims: [claim-audio-content-design]
  - id: audio-content-mcp-base64
    labels:
      zh: MCP base64 音频内容
      en: MCP base64 audio content
      ja: MCP base64 音声コンテンツ
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; AudioContent maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; AudioContent context/token boundary."}

    field_values:
      part_id: audio-44
      kind: audio
      audio_source: UklGRiQAAABXQVZFZm10IBAAAAABAAEA
      media_type: audio/wav
      target_protocol: mcp-2025-11-25
      payload: {type: audio, data: UklGRiQAAABXQVZFZm10IBAAAAABAAEA, mimeType: audio/wav}
    related_relation_ids: [AudioContent-specializes-ContentPart]
    source_claims: [claim-audio-content-mcp]
