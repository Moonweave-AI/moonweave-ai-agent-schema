    en: is a content part
    ja: コンテンツパートの一種である
  definitions:
    zh: 音频内容是以声音为主语义载荷的内容片段。
    en: Audio Content is a Content Part whose primary semantic payload is sound.
    ja: Audio Content は主な意味ペイロードが音である Content Part です。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_audio_specialization
    labels: {zh: 具有音频特化, en: has audio specialization, ja: 音声特化を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-audio-content-design]
  distinct_fact_rationale:
    zh: 此关系只说明音频内容种类，不表示转写、TTS 或实时会话已经发生。
    en: This relation states only an audio-content kind and does not assert that transcription, TTS, or a realtime session occurred.
    ja: この関係は音声内容種別だけを示し、文字起こし、TTS、Realtime セッションが起きたとは主張しない。
  layout_role: primary-backbone
relations: []
