schema: moonweave.ai/ontology-node/v1
id: ContentPart
kind: concept
status: accepted
labels:
  zh: 内容片段
  en: Content Part
  ja: コンテンツパート
semantics:
  short_definition:
    zh: 可放入一条消息或工件的、带明确内容种类的单个载荷单元。
    en: One payload unit with an explicit content kind that can be placed in a message or artifact.
    ja: メッセージまたは成果物に入れられる、明示的な内容種別を持つ一つのペイロード単位。
  definition:
    zh: >-
      Content Part 是本体中的中性概念，用来记录一个内容单位及其协议边界。A2A 将此类单位规范为
      Part：它恰好含 text、raw、url、data 中的一项；MCP 在 PromptMessage 中使用不同的
      TextContent、ImageContent、AudioContent、EmbeddedResource 联合类型；OpenAI API 使用带
      type 判别符的输入项。因而本概念要求每个实例带有种类、目标协议和实际载荷，而不把任何一个
      厂商的 JSON 字段提升为通用规范。
    en: >-
      Content Part is a neutral ontology concept that records one content unit and its protocol boundary.
      A2A specifies such a unit as Part with exactly one of text, raw, url, or data; MCP uses the distinct
      TextContent, ImageContent, AudioContent, and EmbeddedResource unions in PromptMessage; OpenAI API
      uses input items with a type discriminator. Therefore every instance carries a kind, target protocol,
      and actual payload instead of promoting any vendor JSON field to a universal standard.
    ja: >-
      Content Part は一つの内容単位とそのプロトコル境界を記録する中立的な本体概念です。A2A はこの
      ような単位を Part として規定し、text、raw、url、data のちょうど一つを持たせます。MCP は
      PromptMessage で別個の TextContent、ImageContent、AudioContent、EmbeddedResource の union 型を
      使用し、OpenAI API は type 判別子を持つ入力項目を使用します。そのため、どのインスタンスも
      種別、対象プロトコル、実際のペイロードを持ち、ベンダー JSON のフィールドを普遍標準にはしません。
  why_needed:
    zh: >-
      同一消息里可以同时有文字、图像和文件，但它们的大小、编码和可用模型能力完全不同。内容片段能让
      系统在持久化、审计和发出请求时保留这种差异；否则图像 URL 可能被当成文字，或 JSON 数据被错误地
      拼进提示词。
    en: >-
      A single message can contain text, an image, and a file, but their size, encoding, and available
      model capabilities differ. A content part preserves those differences during persistence, audit, and
      request construction; otherwise an image URL can be treated as prose or JSON can be concatenated into
      a prompt incorrectly.
    ja: >-
      一つのメッセージにはテキスト、画像、ファイルを同時に含められますが、サイズ、符号化、利用可能な
      モデル能力は異なります。コンテンツパートは保存、監査、リクエスト構築時にこの違いを保ちます。
      それがなければ画像 URL を文章として扱ったり、JSON を誤ってプロンプトに連結したりします。
  includes:
    - zh: A2A Part 中的一项 text、raw、url 或 data 载荷。
      en: One text, raw, url, or data payload branch of an A2A Part.
      ja: A2A Part の text、raw、url、data のいずれか一つのペイロード分岐。
    - zh: MCP PromptMessage 的一种内容联合成员。
      en: One content-union member of an MCP PromptMessage.
      ja: MCP PromptMessage の一つの内容 union メンバー。
    - zh: OpenAI 请求 content 数组中的带 type 输入项。
      en: A typed input item in an OpenAI request content array.
      ja: OpenAI リクエストの content 配列内にある type 付き入力項目。
  excludes:
    - zh: 消息角色、消息 ID 或会话 ID 等通信包络字段。
      en: Communication-envelope fields such as message role, message ID, or conversation ID.
      ja: メッセージの role、message ID、conversation ID などの通信エンベロープフィールド。
    - zh: 文本转写、OCR 或嵌入向量等由内容处理得到的派生结果。
      en: A derived result of processing content, such as a transcript, OCR text, or an embedding vector.
      ja: 文字起こし、OCR テキスト、埋め込みベクトルなど、内容処理から得た派生結果。
    - zh: 数据库记录或对象存储位置；这些是内容的引用或存储，而不是内容载荷。
      en: A database record or object-storage location; these reference or store content rather than being its payload.
      ja: データベース記録またはオブジェクトストレージの場所。これらは内容ペイロードではなく、内容を参照または保存するものです。
engineering:
  explanation:
    zh: >-
      在实现中，Content Part 通常是内部判别联合，然后由目标适配器编码。例如 A2A 发送器将 `kind: text`
      投影为 `{text: ...}`，MCP prompt 发送器投影为 `{type: "text", text: ...}`，OpenAI Responses
      发送器投影为 `{type: "input_text", text: ...}`。这些输出不能互换；适配器必须拒绝不支持的种类，
      例如把音频对象直接塞进只支持文本的 MCP 服务器。
    en: >-
      In implementation, a Content Part is usually an internal discriminated union encoded by a target
      adapter. An A2A sender projects kind: text to {text: ...}, an MCP prompt sender to
      {type: "text", text: ...}, and an OpenAI Responses sender to {type: "input_text", text: ...}.
      These outputs are not interchangeable; an adapter must reject an unsupported kind, such as placing an
      audio object directly into a text-only MCP server.
    ja: >-
      実装では Content Part は通常、対象アダプターが符号化する内部の判別 union です。A2A 送信側は
      kind: text を {text: ...} に、MCP prompt 送信側は {type: "text", text: ...} に、OpenAI
      Responses 送信側は {type: "input_text", text: ...} に投影します。これらの出力は交換可能では
      ありません。アダプターは、テキスト専用 MCP サーバーに音声オブジェクトを直接置くような、未対応の
      種別を拒否しなければなりません。
  typical_input:
    - description: Local Text Content before A2A serialization.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "record_kind": "content-part",
          "kind": "text",
          "target_protocol": "a2a-1.0",
          "media_type": "text/plain",
          "payload": {"text": "Summarize the report."}
        }
      source_claims: [claim-content-part-design]
    - description: An OpenAI Responses image input item.
      format: |
        {
          "type": "input_image",
          "image_url": "https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg"
        }
      source_claims: [claim-content-part-openai]
  typical_output:
    - description: A2A 1.0 Part projection.
      format: |
        {"text": "Summarize the report.", "mediaType": "text/plain"}
      source_claims: [claim-content-part-a2a]
    - description: MCP prompt text content projection.
      format: |
        {"type": "text", "text": "Summarize the report."}
      source_claims: [claim-content-part-mcp]
  reference_implementations:
    - name: A2A Protocol Part
      url: https://a2a-protocol.org/latest/specification/
      description: The normative Part union used in A2A Message and Artifact content.
    - name: Model Context Protocol Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines PromptMessage content variants and their fields.
    - name: OpenAI Responses API images and vision
      url: https://developers.openai.com/api/docs/guides/images-vision
      description: Shows typed text and image input items in one content array.
structure:
  identity_keys: [part_id]
  fields:
    - id: part_id
      labels: {zh: 片段标识, en: part identifier, ja: パート識別子}
      definitions:
        zh: 本地持久化或审计系统分配给该内容片段的稳定标识，不声称是外部协议必填字段。
        en: A stable identifier assigned by local persistence or audit systems; it is not asserted to be required by an external protocol.
        ja: ローカルの永続化または監査システムが割り当てる安定識別子。外部プロトコルの必須フィールドとは主張しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: kind
      labels: {zh: 内容种类, en: content kind, ja: 内容種別}
      definitions:
        zh: 表示文本、文件、数据、图像或音频等本地规范化种类的判别标签。
        en: A discriminating label for a locally normalized kind such as text, file, data, image, or audio.
        ja: テキスト、ファイル、データ、画像、音声などのローカル正規化種別を示す判別ラベル。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: target_protocol
      labels: {zh: 目标协议, en: target protocol, ja: 対象プロトコル}
      definitions:
        zh: 指定载荷需要遵循哪一份真实协议或 API 文档。
        en: Specifies which real protocol or API documentation governs the payload.
        ja: ペイロードが従うべき実際のプロトコルまたは API 文書を指定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: payload
      labels: {zh: 内容载荷, en: content payload, ja: 内容ペイロード}
      definitions:
        zh: 包含按目标协议字段组织的文字、URL、字节或 JSON 值。
        en: Contains text, a URL, bytes, or a JSON value organized in target-protocol fields.
        ja: 対象プロトコルのフィールドで構成されたテキスト、URL、バイト、または JSON 値を含む。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディア型}
      definitions:
        zh: 文件、媒体或数据需要时使用的可选 MIME 类型。
        en: An optional MIME type used when a file, media, or data payload needs one.
        ja: ファイル、メディア、またはデータペイロードで必要な場合に使う任意の MIME 型。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
  constraints:
    - id: content-part-has-real-protocol-shape
      expression: target_protocol != "" AND payload != null
      explanation:
        zh: 每个内容片段必须能追溯到一个目标协议和非空载荷，不能是无类型占位符。
        en: Every content part must be traceable to a target protocol and non-empty payload rather than being an untyped placeholder.
        ja: すべてのコンテンツパートは、型なしプレースホルダーではなく、対象プロトコルと空でないペイロードに追跡できなければならない。
    - id: content-part-a2a-one-of
      expression: target_protocol != "a2a-1.0" OR exactly_one(payload.text, payload.raw, payload.url, payload.data)
      explanation:
        zh: A2A 1.0 Part 只能选择 text、raw、url、data 中的一个载荷分支。
        en: An A2A 1.0 Part can select only one of the text, raw, url, or data payload branches.
        ja: A2A 1.0 Part は text、raw、url、data のペイロード分岐から一つだけを選べる。
    - id: content-part-no-rendering-semantics
      expression: payload does_not_require ui_renderer_configuration
      explanation:
        zh: 本节点存储传输内容，而不是语法高亮、表格列宽或播放器状态等呈现配置。
        en: This node stores transport content rather than presentation configuration such as syntax highlighting, table widths, or player state.
        ja: このノードは、シンタックスハイライト、表の幅、プレーヤー状態などの表示設定ではなく、転送内容を保存する。
  required_relations: []
examples:
  - id: content-part-a2a-pdf-file-attachment
    labels:
      zh: A2A PDF 文件附件
      en: A2A PDF file attachment
      ja: A2A PDF ファイル添付

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ContentPart context/token boundary."}
    field_values:
      part_id: part-8
      kind: file
      target_protocol: a2a-1.0
      payload: {url: "https://example.com/doc.pdf", filename: report.pdf, mediaType: application/pdf}
    related_relation_ids: []
    source_claims: [claim-content-part-a2a]
  - id: content-part-a2a-text-url-mix
    labels:
      zh: A2A text 与 url 混于同一 Part
      en: A2A text and url in one Part
      ja: A2A text と url を同一 Part に混在
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ContentPart context/token boundary."}
    field_values:
      part_id: part-9
      kind: text
      target_protocol: a2a-1.0
      payload: {text: Read this file, url: "https://example.com/doc.pdf"}
    related_relation_ids: []
    source_claims: [claim-content-part-a2a]
  - id: content-part-derived-transcript
    labels:
      zh: 派生转写 ContentPart
      en: Derived transcript ContentPart
      ja: 派生文字起こし ContentPart
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ContentPart context/token boundary."}
    field_values:
      source_part_id: audio-4
      derived_part_id: text-4
      kind: text
      target_protocol: local-normalized
      payload: {text: "Meeting starts at nine."}
    related_relation_ids: []
    source_claims: [claim-content-part-design]
  - id: content-part-mcp-image-normalized
    labels:
      zh: MCP 图像 ContentPart 规范化
      en: MCP image ContentPart normalized
      ja: MCP 画像 ContentPart 正規化
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ContentPart maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ContentPart context/token boundary."}
    field_values:
      part_id: mcp-image-1
      kind: image
      target_protocol: mcp-2025-11-25
      payload: {type: image, mimeType: image/png, data: iVBORw0KGgoAAAANSUhEUg==}
    related_relation_ids: []
    source_claims: [claim-content-part-mcp]
parent_relation: null
relations: []
sources:
  - id: a2a-content-part
    title: A2A Protocol Specification
    publisher: A2A Project
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0
    accessed_on: 2026-07-18
    source_type: standard
    relevance: Defines the Part content union and its placement in A2A Message and Artifact.
  - id: mcp-content-part
    title: Model Context Protocol Prompts Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: standard
    relevance: Defines the PromptMessage content variants that must not be conflated with A2A Part.
  - id: openai-content-part
    title: OpenAI API Images and vision guide
    publisher: OpenAI
    url: https://developers.openai.com/api/docs/guides/images-vision
    version: Documentation accessed 2026-07-18
    accessed_on: 2026-07-18
    source_type: official-doc
    relevance: Documents input_text and input_image in a Responses API content array.
source_claims:
  - id: claim-content-part-a2a
    source: a2a-content-part
    supports: A2A defines Part as a content unit with exactly one of text, raw, url, or data and optional mediaType and filename fields.
    locator: A2A specification section 4.1.6 Part and section 4.1.7 Artifact
    evidence_kind: normative
    confidence: high
  - id: claim-content-part-mcp
    source: mcp-content-part
    supports: MCP PromptMessage content has the distinct Text Content, Image Content, Audio Content, and Embedded Resources types.
    locator: MCP Prompts specification sections PromptMessage and Data Types
    evidence_kind: normative
    confidence: high
  - id: claim-content-part-openai
    source: openai-content-part
    supports: OpenAI documents input_text and input_image as separately typed objects inside one Responses API message content array.
    locator: Images and vision guide section Analyze images
    evidence_kind: official
    confidence: high
  - id: claim-content-part-design
    source: a2a-content-part
    supports: Content Part is a Moonweave neutral modeling boundary; preserving a target protocol is a design inference rather than a claim of one shared external object.
    locator: A2A Part section 4.1.6 and the contrasted MCP and OpenAI interfaces
    evidence_kind: design-inference
    confidence: medium


