schema: moonweave.ai/ontology-node/v1
id: FileAttachment
kind: concept
status: accepted
labels:
  zh: 文件片段
  en: File Attachment
  ja: ファイルパート
semantics:
  short_definition:
    zh: 通过字节或 URL 携带一个命名文件及其媒体类型的内容片段。
    en: A content part that carries one named file and its media type through bytes or a URL.
    ja: バイトまたは URL を通じて、一つの名前付きファイルとそのメディア型を運ぶコンテンツパート。
  definition:
    zh: >-
      File Attachment 以 A2A 1.0 Part 的 raw 或 url 载荷分支表示一个文件，通常补充 filename 与 mediaType。
      它覆盖 PDF、文档、表格和其他需要文件处理管线的二进制或外部内容。OpenAI Responses 的 input_file
      可以使用 file_url、file_id 或 file_data；MCP Prompts 则可使用 Embedded Resource。三者均可表达
      “给系统一个文件”，但字段、认证与生命周期不同，因此 File Attachment 是保留协议边界的本体概念，不能直接
      序列化为任一其他接口。
    en: >-
      File Attachment represents one file with the raw or url payload branch of an A2A 1.0 Part, normally with
      filename and mediaType. It covers PDFs, documents, spreadsheets, and other binary or external content
      that needs a file-processing flow. An OpenAI Responses input_file may use file_url, file_id, or file_data;
      MCP Prompts may use an Embedded Resource. All can express “give the system a file,” but their fields,
      authentication, and lifecycle differ, so File Attachment is an ontology concept that preserves protocol
      boundaries and cannot be directly serialized into another interface.
    ja: >-
      File Attachment は A2A 1.0 Part の raw または url ペイロード分岐で一つのファイルを表し、通常 filename と
      mediaType を伴います。PDF、文書、表計算、その他のバイナリまたは外部内容で、ファイル処理フローを
      必要とするものを対象にします。OpenAI Responses の input_file は file_url、file_id、file_data を
      使え、MCP Prompts は Embedded Resource を使えます。いずれも「システムにファイルを渡す」を表せますが、
      フィールド、認証、ライフサイクルは異なります。そのため File Attachment はプロトコル境界を保つ本体概念で、
      他のインターフェースへ直接直列化することはできません。
  why_needed:
    zh: >-
      文件不能当作一大段字符串处理：PDF 可能需要文字和页面图像，CSV/XLSX 可能需要表格专用处理，外部
      URL 还需要授权和下载控制。文件片段让系统保留文件的获取方式和媒体类型，从而选择合适的解析路径，
      而不把 URL、文件 ID 和原始字节混为同一种字段。
    en: >-
      A file cannot be treated as one long string: a PDF may need text and page images, a CSV or XLSX may need
      spreadsheet handling, and an external URL needs authorization and download control. A File Attachment retains
      how the file is obtained and its media type, letting the system select the appropriate parsing path
      without conflating URLs, file IDs, and raw bytes.
    ja: >-
      ファイルを一つの長い文字列として扱うことはできません。PDF にはテキストとページ画像が必要な場合があり、
      CSV や XLSX には表計算処理が必要で、外部 URL には認可とダウンロード制御が必要です。File Attachment は
      ファイルの取得方法とメディア型を保持し、URL、file ID、raw bytes を同じフィールドと混同せずに
      適切な解析経路を選べるようにします。
  includes:
    - zh: A2A Part 中带 filename/mediaType 的 raw 或 url 文件载荷。
      en: An A2A Part raw or URL file payload with filename and mediaType.
      ja: filename と mediaType を持つ A2A Part の raw または URL ファイルペイロード。
    - zh: OpenAI Responses 请求中的 input_file 项。
      en: An input_file item in an OpenAI Responses request.
      ja: OpenAI Responses リクエストの input_file 項目。
    - zh: 表示一个可获取文件的 MCP Embedded Resource，而不是任意文本内容。
      en: An MCP Embedded Resource that represents an obtainable file rather than arbitrary text content.
      ja: 任意のテキスト内容ではなく、取得可能なファイルを表す MCP Embedded Resource。
    - zh: MCP Tool Result 中带 URI、名称和 MIME 类型、指向可获取文件的 ResourceLink。
      en: A ResourceLink in an MCP Tool Result with a URI, name, and MIME type for an obtainable file.
      ja: 取得可能なファイルの URI・名前・MIME 型を持つ MCP Tool Result 内の ResourceLink。
  excludes:
    - zh: 直接作为视觉输入发送的 OpenAI input_image 项。
      en: An OpenAI input_image item sent directly as visual input.
      ja: 視覚入力として直接送信される OpenAI input_image 項目。
    - zh: 内联 JSON 数据值；它在 A2A 中属于 data 分支。
      en: An inline JSON data value, which belongs to the A2A data branch.
      ja: A2A の data 分岐に属するインライン JSON データ値。
    - zh: 文件的提取文本、页面图像、嵌入向量或工作表摘要等处理结果。
      en: A processing result such as extracted text, page images, embeddings, or a worksheet summary.
      ja: 抽出テキスト、ページ画像、埋め込み、ワークシート要約などのファイル処理結果。
engineering:
  explanation:
    zh: >-
      A2A 输出可使用 `{url, filename, mediaType}` 或 `{raw, filename, mediaType}`；OpenAI Responses
      使用 `input_file` 的 `file_url`、`file_id` 或 `file_data`。部署代码必须在发送前选定其中一个协议，
      并按其访问控制获取文件。OpenAI 文档还说明不同文件类型有不同处理：PDF 可传递文本和页面图像，
      非 PDF 文档通常提取文本，表格则走专用增强流程。文件引用本身不等于提取结果。
    en: >-
      An A2A output may use {url, filename, mediaType} or {raw, filename, mediaType}; OpenAI Responses uses
      input_file with file_url, file_id, or file_data. Deployment code must choose one protocol before sending
      and fetch the file under that protocol's access control. OpenAI also documents distinct processing by
      file type: PDFs can pass text and page images, non-PDF documents usually extract text, and spreadsheets
      use a specialized augmentation flow. A file reference is not the same as an extraction result.
    ja: >-
      A2A 出力は {url, filename, mediaType} または {raw, filename, mediaType} を使え、OpenAI Responses は
      file_url、file_id、file_data を持つ input_file を使います。デプロイコードは送信前に一つのプロトコルを
      選び、そのアクセス制御下でファイルを取得しなければなりません。OpenAI はファイル種別ごとの異なる
      処理も文書化しています。PDF はテキストとページ画像を渡せ、非 PDF 文書は通常テキストを抽出し、
      表計算は専用の強化フローを使います。ファイル参照は抽出結果と同じではありません。
  typical_input:
    - description: An A2A 1.0 Part using the URL payload branch for a file attachment.
      format: |
        {
          "url": "https://example.com/doc.pdf",
          "filename": "report.pdf",
          "mediaType": "application/pdf"
        }
      source_claims: [claim-file-attachment-a2a]
    - description: OpenAI Responses API file input using a hosted file URL.
      format: |
        {
          "type": "input_file",
          "file_url": "https://example.com/doc.pdf"
        }
      source_claims: [claim-file-attachment-openai]
  typical_output:
    - description: An A2A Message with a file-attachment Part and a separate Part using the text branch.
      format: |
        {
          "parts": [
            {"text": "Summarize this report."},
            {"url": "https://example.com/doc.pdf", "filename": "report.pdf", "mediaType": "application/pdf"}
          ]
        }
      source_claims: [claim-file-attachment-a2a]
    - description: OpenAI Responses API file-data input with a filename.
      format: |
        {
          "type": "input_file",
          "filename": "report.pdf",
          "file_data": "data:application/pdf;base64,..."
        }
      source_claims: [claim-file-attachment-openai]
    - description: MCP Tool Result ResourceLink for a downloadable report.
      format: |
        {
          "content": [{
            "type": "resource_link",
            "uri": "https://example.com/doc.pdf",
            "name": "report.pdf",
            "mimeType": "application/pdf"
          }]
        }
      source_claims: [claim-file-attachment-mcp-tool]
  reference_implementations:
    - name: A2A Protocol Part
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the raw and URL Part payload branches plus filename and mediaType fields.
    - name: OpenAI API File inputs guide
      url: https://developers.openai.com/api/docs/guides/file-inputs
      description: Documents input_file using file URL, file ID, and file data, including file-type processing behavior.
    - name: Model Context Protocol Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines Embedded Resources as a distinct MCP prompt-content form.
    - name: Model Context Protocol Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines ResourceLink content with uri, name, and optional mimeType in a tool result.
structure:
  identity_keys: [part_id]
  fields:
    - id: part_id
      labels: {zh: 片段标识, en: part identifier, ja: パート識別子}
      definitions:
        zh: 本地系统为该文件内容片段保留的稳定关联标识。
        en: A stable association identifier retained locally for this file content part.
        ja: このファイル内容パートのためにローカルで保持する安定した関連識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: kind
      labels: {zh: 内容种类, en: content kind, ja: 内容種別}
      definitions:
        zh: 本地规范化判别标签；在此子类中固定为 file，用于选择文件适配器，不是 A2A、MCP 或 OpenAI 的统一线格式字段。
        en: The local-normalized discriminator, fixed to file for this subtype; it selects a file adapter and is not a shared A2A, MCP, or OpenAI wire field.
        ja: このサブタイプでは file に固定されるローカル正規化判別子。ファイルアダプターの選択に用い、A2A、MCP、OpenAI で共有されるワイヤフィールドではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: access_mode
      labels: {zh: 获取方式, en: access mode, ja: 取得方式}
      definitions:
        zh: 标识文件通过 URL、原始字节、平台文件 ID 或本地规范化引用获得。
        en: Indicates whether the file is obtained through a URL, raw bytes, a platform file ID, or a local normalized reference.
        ja: URL、raw bytes、プラットフォーム file ID、またはローカル正規化参照のどれでファイルを取得するかを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: locator_or_bytes
      labels: {zh: 文件定位符或字节, en: file locator or bytes, ja: ファイルロケーターまたはバイト}
      definitions:
        zh: 由 access_mode 解释的 URL、编码字节或平台文件标识。
        en: A URL, encoded bytes, or platform file identifier interpreted by access_mode.
        ja: access_mode によって解釈される URL、符号化バイト、またはプラットフォームのファイル識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: filename
      labels: {zh: 文件名, en: filename, ja: ファイル名}
      definitions:
        zh: 供接收方展示或选择解析器使用的可选文件名。
        en: An optional filename for receiver display or parser selection.
        ja: 受信側の表示またはパーサー選択に使う任意のファイル名。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
    - id: media_type
      labels: {zh: 媒体类型, en: media type, ja: メディア型}
      definitions:
        zh: 描述文件内容的 MIME 类型，例如 application/pdf 或 text/csv。
        en: A MIME type describing file content, such as application/pdf or text/csv.
        ja: application/pdf や text/csv など、ファイル内容を記述する MIME 型。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: target_protocol
      labels: {zh: 目标协议, en: target protocol, ja: 対象プロトコル}
      definitions:
        zh: 决定实际文件字段形状和授权规则的协议或 API。
        en: The protocol or API that determines the actual file-field shape and authorization rules.
        ja: 実際のファイルフィールド形状と認可規則を決めるプロトコルまたは API。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
    - id: payload
      labels: {zh: 协议载荷, en: protocol payload, ja: プロトコルペイロード}
      definitions:
        zh: 以目标协议真实字段保存的文件项，例如 A2A 的 raw/url 分支、OpenAI 的 input_file，或 MCP 的 resource/resource_link 内容块。
        en: The file item in the target protocol's real fields, such as an A2A raw/url branch, OpenAI input_file, or an MCP resource/resource_link content block.
        ja: 対象プロトコルの実際のフィールドで保存するファイル項目。A2A の raw/url 分岐、OpenAI input_file、MCP の resource/resource_link コンテンツブロックなど。
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
  constraints:
    - id: file-attachment-has-accessible-payload
      expression: locator_or_bytes != "" AND media_type != ""
      explanation:
        zh: 文件片段需要一个可解释的获取载荷和媒体类型，不能只有展示名称。
        en: A File Attachment needs an interpretable access payload and media type, not only a display name.
        ja: File Attachment には表示名だけでなく、解釈可能な取得ペイロードとメディア型が必要である。
    - id: file-attachment-a2a-one-of
      expression: target_protocol != "a2a-1.0" OR exactly_one(payload.raw, payload.url)
      explanation:
        zh: A2A 文件投影应选 raw 或 url 之一，不能同时写入二者。
        en: An A2A file projection must choose raw or url and cannot write both.
        ja: A2A ファイル投影は raw または url のどちらかを選び、両方を書いてはならない。
    - id: file-attachment-openai-input-shape
      expression: target_protocol != "openai-responses" OR (payload.type = "input_file" AND exactly_one(payload.file_url, payload.file_id, payload.file_data))
      explanation:
        zh: OpenAI Responses 的文件投影必须使用 input_file，并选定 file_url、file_id 或 file_data 中一种文档化的文件提供方式。
        en: "An OpenAI Responses file projection must use input_file and select one documented file-provision method: file_url, file_id, or file_data."
        ja: OpenAI Responses のファイル投影は input_file を用い、file_url、file_id、file_data の文書化された一つのファイル提供方式を選ばなければならない。
  required_relations: []
examples:
  - id: file-attachment-mcp-tool-resource-link
    labels:
      zh: MCP 工具结果中的文件 ResourceLink
      en: File ResourceLink in an MCP tool result
      ja: MCP ツール結果内のファイル ResourceLink

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; FileAttachment context/token boundary."}
    field_values:
      part_id: mcp-file-46
      kind: file
      access_mode: url
      locator_or_bytes: https://example.com/doc.pdf
      filename: report.pdf
      media_type: application/pdf
      target_protocol: mcp-2025-11-25
      payload:
        type: resource_link
        uri: https://example.com/doc.pdf
        name: report.pdf
        mimeType: application/pdf
    related_relation_ids: [FileAttachment-specializes-ContentPart]
    source_claims: [claim-file-attachment-mcp-tool]
  - id: file-attachment-a2a-url-part
    labels:
      zh: A2A url 文件 Part
      en: A2A url file Part
      ja: A2A url ファイル Part
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; FileAttachment context/token boundary."}
    field_values:
      part_id: file-42
      kind: file
      access_mode: url
      locator_or_bytes: "https://example.com/doc.pdf"
      filename: report.pdf
      media_type: application/pdf
      target_protocol: a2a-1.0
      payload: {url: "https://example.com/doc.pdf", filename: report.pdf, mediaType: application/pdf}
    related_relation_ids: [FileAttachment-specializes-ContentPart]
    source_claims: [claim-file-attachment-a2a]
  - id: file-attachment-a2a-raw-url-mix
    labels:
      zh: A2A raw 与 url 混用
      en: A2A raw and url mixed
      ja: A2A raw と url 混在
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; FileAttachment context/token boundary."}
    field_values:
      part_id: file-43
      kind: file
      access_mode: encoded-bytes
      locator_or_bytes: aGVsbG8=
      media_type: application/pdf
      target_protocol: a2a-1.0
      payload: {raw: aGVsbG8=, url: "https://example.com/doc.pdf", filename: report.pdf, mediaType: application/pdf}
    related_relation_ids: [FileAttachment-specializes-ContentPart]
    source_claims: [claim-file-attachment-a2a]
  - id: file-attachment-openai-input-file-id
    labels:
      zh: OpenAI input_file file_id
      en: OpenAI input_file file_id
      ja: OpenAI input_file file_id
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; FileAttachment context/token boundary."}
    field_values:
      part_id: file-44
      kind: file
      access_mode: platform-file-id
      locator_or_bytes: file-abc123
      media_type: application/pdf
      target_protocol: openai-responses
      payload: {type: input_file, file_id: file-abc123}
    related_relation_ids: [FileAttachment-specializes-ContentPart]
    source_claims: [claim-file-attachment-openai]
  - id: file-attachment-openai-input-file-data
    labels:
      zh: OpenAI input_file file_data
      en: OpenAI input_file file_data
      ja: OpenAI input_file file_data
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; FileAttachment maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; FileAttachment context/token boundary."}
    field_values:
      part_id: file-45
      kind: file
      access_mode: encoded-bytes
      locator_or_bytes: data:application/pdf;base64,...
      filename: report.pdf
      media_type: application/pdf
      target_protocol: openai-responses
      payload: {type: input_file, filename: report.pdf, file_data: "data:application/pdf;base64,..."}
    related_relation_ids: [FileAttachment-specializes-ContentPart]
    source_claims: [claim-file-attachment-openai]
parent_relation:
  id: FileAttachment-specializes-ContentPart
  predicate: is_a
  target: concept:ContentPart
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是内容片段的一种
    en: is a content part
    ja: コンテンツパートの一種である
  definitions:
    zh: 文件片段是以文件访问载荷为主内容的内容片段。
    en: A File Attachment is a Content Part whose primary content is a file-access payload.
    ja: File Attachment は主内容がファイルアクセスペイロードである Content Part です。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_file_specialization
    labels: {zh: 具有文件特化, en: has file specialization, ja: ファイル特化を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-file-attachment-design]
  distinct_fact_rationale:
    zh: 此层级关系只说明载荷种类，不声称文件已经下载、解析或授权。
    en: This hierarchy relation states only payload kind and does not claim that a file was downloaded, parsed, or authorized.
    ja: この階層関係はペイロード種別だけを示し、ファイルがダウンロード、解析、認可済みであるとは主張しない。
  layout_role: primary-backbone
relations: []
