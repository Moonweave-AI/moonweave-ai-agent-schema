    related_relation_ids: []
    source_claims: [claim-content-parts-openai-image]
  - id: info-content-parts-openai-multimodal-input
    labels:
      zh: OpenAI 多模态 input 数组
      en: OpenAI multimodal input array
      ja: OpenAI マルチモーダル input 配列
    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; info-content-parts maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; info-content-parts maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; info-content-parts context/token boundary."}
    field_values:
      target_protocol: openai-responses
      content:
        - type: input_text
          text: "what's in this image?"
        - type: input_image
          image_url: https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg
      source_doc: OpenAI Images and vision guide — Responses API content array
    related_relation_ids: []
    source_claims: [claim-content-parts-openai-image]
