source_claims:
  - id: claim-content-parts-a2a
    source: a2a-part
    supports: A2A defines Part as a message or artifact content unit with exactly one of text, raw, url, or data, plus optional mediaType and filename.
    locator: A2A specification section 4.1.4 Message, section 4.1.6 Part, and section 4.1.7 Artifact
    evidence_kind: normative
    confidence: high
  - id: claim-content-parts-mcp
    source: mcp-prompts-content
    supports: MCP defines PromptMessage content and the Text Content, Image Content, Audio Content, and Embedded Resources data types.
    locator: MCP Prompts specification sections PromptMessage and Data Types
    evidence_kind: normative
    confidence: high
  - id: claim-content-parts-openai-image
    source: openai-responses-images
    supports: OpenAI documents input_text and input_image items together in a Responses API message content array.
    locator: Images and vision guide section Analyze images
    evidence_kind: official
    confidence: high
  - id: claim-content-parts-openai-file
    source: openai-responses-files
    supports: OpenAI documents input_file request shapes including file_url, file_id, and file_data.
    locator: File inputs guide sections How it works and File URLs
    evidence_kind: official
    confidence: high
  - id: claim-content-parts-openai-audio
    source: openai-audio-input
    supports: OpenAI documents input_audio with base64 data and an audio format inside message content for the audio model API.
    locator: Audio and speech guide section audio input example
    evidence_kind: official
    confidence: high
  - id: claim-content-parts-design
    source: a2a-part
    supports: Treating Content Parts as a local normalized boundary while preserving the target protocol is a Moonweave design inference; A2A, MCP, and OpenAI do not define one shared wire object.
    locator: A2A Part section 4.1.6, MCP Prompts Data Types, and OpenAI API request examples
    evidence_kind: design-inference
    confidence: medium


