schema: moonweave.ai/ontology-node/v1
id: ExecutionObservation
kind: concept
status: accepted
labels:
  zh: 执行观测
  en: execution observation
  ja: 実行観測
semantics:
  short_definition:
    zh: 观察者在确定时刻对某个执行结果形成的、具有独立身份的信息记录。
    en: An identity-bearing information record formed by an observer about one execution result at a known time.
    ja: 観測者が既知の時刻に一つの実行結果について形成する、独立同一性を持つ情報記録。
  definition:
    zh: 执行观测是一种信息对象，用 observation_id 标识观察者在 observed_at 时刻对恰好一个 ExecutionResult 所记录的可见现象，并保留来源与采集条件。它可以晚于被观测现象产生，也可以只披露结果的一部分；因此它不同于执行活动、结果对象和发生在运行中的 TraceEvent。
    en: An ExecutionObservation is an information object identified by observation_id that records the visible phenomenon an observer saw at observed_at for exactly one ExecutionResult, retaining provenance and collection conditions. It may be formed after the phenomenon and may disclose only part of the result, so it differs from the execution activity, the result object, and a TraceEvent occurring during the run.
    ja: ExecutionObservation は observation_id で識別され、観測者が observed_at にちょうど一つの ExecutionResult について見た可視現象を、来歴と収集条件とともに記録する情報対象です。現象より後に形成され、結果の一部だけを開示し得るため、実行活動、結果対象、実行中の TraceEvent とは異なります。
  why_needed:
    zh: 需要独立观测层来记录“系统实际看到了什么”，否则采集延迟、截断、脱敏和权限过滤会被误写成 ExecutionResult 本身的性质，也无法比较不同观察者的视图。
    en: A separate observation layer records what the system actually saw; otherwise collection delay, truncation, redaction, and authority filtering would be mistaken for properties of ExecutionResult itself and views from different observers could not be compared.
    ja: システムが実際に何を見たかを記録する独立観測層が必要です。そうしなければ収集遅延、切詰め、秘匿、権限フィルタが ExecutionResult 自体の性質と誤認され、観測者間の視野も比較できません。
  includes:
    - zh: 包含具有唯一 observation_id、observed_at、恰好一个被观测 ExecutionResult，以及能够说明采集者或来源的记录；载荷可以是输出观测或退出状态观测。
      en: Includes records with a unique observation_id, observed_at, exactly one observed ExecutionResult, and provenance identifying the collector or source; payload specializations include output and exit-status observations.
      ja: 一意の observation_id、observed_at、ちょうど一つの観測対象 ExecutionResult、収集者または出典を示す来歴を持つ記録を含みます。payload の特殊化には出力観測と終了状態観測があります。
  excludes:
    - zh: 不包含 CommandExecution、ExecutionResult、TraceEvent、ContextIngressEvent 或 OutputStream；没有观测时刻与被观测结果身份的普通日志文本也不属于本类。
      en: Excludes CommandExecution, ExecutionResult, TraceEvent, ContextIngressEvent, and OutputStream; ordinary log text without an observation time and observed-result identity is also outside this class.
      ja: CommandExecution、ExecutionResult、TraceEvent、ContextIngressEvent、OutputStream を含みません。観測時刻と対象結果の同一性を欠く通常ログ文字列も本クラス外です。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - observation_id
  fields:
    - id: observation_id
      labels:
        zh: 观测标识
        en: observation ID
        ja: 観測 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次执行结果观测。
        en: Stable identifier for one observation of an execution result.
        ja: 一つの実行結果観測を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: obs-command-001
      source_claims: []
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 形成该观测记录的 UTC 时间。
        en: UTC instant at which the observation record was formed.
        ja: この観測記録が形成された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T01:02:03.000Z
      source_claims:
        - claim-execution-observation-002
  constraints:
    - id: execution-observation-result-bound
      severity: error
      expression_language: plain
      expression: an observation identifies exactly one observed execution result
      explanations:
        zh: 执行观测只能描述一个明确的执行结果。
        en: An execution observation describes exactly one identified execution result.
        ja: 実行観測は一つの明確な実行結果だけを記述します。
      source_claims: []
  required_relation_constraints:
    - id: execution-observation-observes-result
      direction: outgoing
      predicate: observes
      target_concept_id: ExecutionResult
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 执行观测必须指向被观测的执行结果。
        en: An execution observation points to the execution result it observes.
        ja: 実行観測は観測対象の実行結果を指します。
      source_claims: []
examples:
  - id: ExecutionObservation-example-positive-001
    kind: positive
    labels:
      zh: 执行观测正例
      en: Positive example of execution observation
      ja: 実行観測の正例
    scenario_id: null
    descriptions:
      zh: ExecutionResult result-214 在 01:02:01Z 形成；collector-3 于 01:02:03Z 创建 obs-command-001，只记录其获准查看的输出与终止状态，并保留两秒采集延迟。
      en: ExecutionResult result-214 is formed at 01:02:01Z; collector-3 creates obs-command-001 at 01:02:03Z, recording only the output and termination status it is authorized to see and preserving the two-second collection delay.
      ja: ExecutionResult result-214 は 01:02:01Z に形成され、collector-3 は 01:02:03Z に obs-command-001 を作成し、許可された出力と終了状態だけを記録して 2 秒の収集遅延を保ちます。
    field_values:
      observation_id: obs-command-001
      observed_at: 2026-07-13T01:02:03.000Z
    related_node_ids:
      - ExecutionObservation
      - ExecutionResult
    related_relation_ids:
      - ExecutionObservation-observes-ExecutionResult
    expected_result:
      zh: obs-command-001 归为 ExecutionObservation，observed_at 保持 01:02:03Z，并恰好观察 result-214。
      en: obs-command-001 is an ExecutionObservation, retains observed_at 01:02:03Z, and observes exactly result-214.
      ja: obs-command-001 は ExecutionObservation で、observed_at 01:02:03Z を保持し、ちょうど result-214 を観測します。
    why_valid_or_invalid:
      zh: 观测具有自己的身份和观察时刻，并明确指向一个既存结果；观察者视图与结果事实没有被合并。
      en: The observation has its own identity and observation time and points to one existing result; the observer view is not merged with result facts.
      ja: 観測は独自 identity と観測時刻を持ち、一つの既存結果を指し、観測者 view と結果事実を統合していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-execution-observation-003
  - id: ExecutionObservation-example-boundary-001
    kind: boundary
    labels:
      zh: 执行观测边界例
      en: Boundary case for execution observation
      ja: 実行観測の境界例
    scenario_id: null
    descriptions:
      zh: result-215 是执行请求的返回对象，包含 artifact 引用和 exit code；它没有 observation_id、observed_at 或观察者身份。即使随后有观测指向它，result-215 本身仍不是 ExecutionObservation。
      en: result-215 is the return object for an execution request and contains an artifact reference and exit code. It has no observation_id, observed_at, or observer identity. Even if an observation later points to it, result-215 is not an ExecutionObservation.
      ja: result-215 は実行要求の返却対象で artifact reference と exit code を含みますが、observation_id、observed_at、観測者 identity を持ちません。後で観測が指しても result-215 自体は ExecutionObservation ではありません。
    field_values: {}
    related_node_ids:
      - ExecutionObservation
      - ExecutionResult
    related_relation_ids:
      - ExecutionObservation-observes-ExecutionResult
    expected_result:
      zh: result-215 保持 ExecutionResult；只有另建的、带观测身份与时刻的记录可以归入 ExecutionObservation。
      en: result-215 remains an ExecutionResult; only a separate record with observation identity and time can be an ExecutionObservation.
      ja: result-215 は ExecutionResult のままで、観測 identity と時刻を持つ別記録だけが ExecutionObservation になれます。
    why_valid_or_invalid:
      zh: 结果是被观察对象，观测是对结果形成的有来源视图；二者的时间、身份和责任主体不同。
      en: A result is the referent being observed, whereas an observation is a sourced view formed about it; their time, identity, and accountable producer differ.
      ja: 結果は観測対象、観測はそれについて形成された出典付き view であり、時刻、同一性、責任 producer が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: ExecutionObservation-example-instance-001
    kind: instance
    labels:
      zh: 执行观测结构化实例
      en: Structured instance of execution observation
      ja: 実行観測の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: obs-command-001 标识 collector-3 在 2026-07-13T01:02:03Z 对 result-214 形成的视图；同一结果由另一个审计收集器观察时应获得不同 observation_id。
      en: obs-command-001 identifies collector-3's view of result-214 formed at 2026-07-13T01:02:03Z; another audit collector observing the same result would receive a different observation_id.
      ja: obs-command-001 は collector-3 が 2026-07-13T01:02:03Z に形成した result-214 の view を識別し、別監査 collector が同じ結果を観測すれば異なる observation_id を持ちます。
    field_values:
      observation_id: obs-command-001
      observed_at: 2026-07-13T01:02:03.000Z
    related_node_ids:
      - ExecutionObservation
    related_relation_ids: []
    expected_result:
      zh: observation_id 与 observed_at 均为单值且可验证，实例必须再关联恰好一个 ExecutionResult。
      en: observation_id and observed_at are each single and valid, and the instance must additionally relate to exactly one ExecutionResult.
      ja: observation_id と observed_at は各一値で検証可能で、instance はさらにちょうど一つの ExecutionResult へ関連しなければなりません。
    why_valid_or_invalid:
      zh: 字段刻画观测本身的身份与形成时间，而被观察结果通过必需关系给出，避免把 result ID 混入观测身份。
      en: The fields describe the observation's own identity and formation time, while the observed result is supplied by a required relation so result ID is not conflated with observation identity.
      ja: field は観測自身の identity と形成時刻を記述し、観測対象結果は必須関係で与えるため result ID と観測 identity を混同しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ExecutionObservation-observes-ExecutionResult
    predicate: observes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 观测执行结果
      en: observes execution result
      ja: 実行結果を観測
    definitions:
      zh: 把执行观测指向它所描述的执行结果对象，明确区分“关于结果的证据记录”与“结果本身”。
      en: Links an execution observation to the execution-result object it describes, separating an evidence record about a result from the result itself.
      ja: 実行観測を記述対象の実行結果オブジェクトへ結び付け、結果についての証拠記録と結果本体を区別します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: observed_by_execution_observation
      labels:
        zh: 由执行观测记录
        en: observed by execution observation
        ja: 実行観測に記録される
    conditions:
      - id: ExecutionObservation-observes-ExecutionResult-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the observation record names one ExecutionResult identity and records what an observer could see about that result at observed_at; a copied payload without result identity or an ExecutionResult standing alone is insufficient.
        explanations:
          zh: 仅当观测记录明确指向一个 ExecutionResult 标识，并记录观察者在 observed_at 时刻可见的该结果现象时成立；没有结果标识的复制载荷或单独存在的 ExecutionResult 均不足。
          en: Assert only when the observation record names one ExecutionResult identity and records what an observer could see about that result at observed_at; a copied payload without result identity or an ExecutionResult standing alone is insufficient.
          ja: observation record が一つの ExecutionResult ID を明示し、observed_at 時点で observer に見えた現象を記録するときだけ成立します。result ID のない payload copy や単独の ExecutionResult だけでは不十分です。
        source_claims:
          - claim-execution-observation-004
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ExecutionObservation 仍由 info-plane 拥有，ExecutionResult 仍由 tool-plane 拥有；该 information 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: ExecutionObservation remains owned by info-plane and ExecutionResult by tool-plane; this information fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: ExecutionObservation は info-plane、ExecutionResult は tool-plane に引き続き所有されます。この information 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 ExecutionObservation → ExecutionResult 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical ExecutionObservation → ExecutionResult assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは ExecutionObservation → ExecutionResult の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: ExecutionObservation-observes-ExecutionResult-example-positive-001
        kind: positive
        labels:
          zh: 观测执行结果正例
          en: "Accepted case: observes execution result"
          ja: 実行結果を観測の受理例
        scenario_id: null
        descriptions:
          zh: observation obs-21 记录 result_id=result-21、采集时间和观测器版本，并指向该工具调用返回的 ExecutionResult。
          en: Observation obs-21 records result_id=result-21, collection time, and observer version, and points to the ExecutionResult returned by that tool call.
          ja: 観測 obs-21 は result_id=result-21、収集時刻、観測器版を記録し、そのツール呼出しが返した ExecutionResult を指します。
        field_values: {}
        related_node_ids:
          - ExecutionObservation
          - ExecutionResult
        related_relation_ids:
          - ExecutionObservation-observes-ExecutionResult
        expected_result:
          zh: 接受 obs-21 对 result-21 的观测边。
          en: Accept that obs-21 observes result-21.
          ja: obs-21 が result-21 を観測する辺を受理します。
        why_valid_or_invalid:
          zh: 观测具有独立身份和采集元数据，并明确绑定唯一结果对象。
          en: The observation has its own identity and collection metadata and is bound to one result object.
          ja: 観測は独自の同一性と収集メタデータを持ち、一つの結果オブジェクトへ明示的に結び付きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-execution-observation-005
      - id: ExecutionObservation-observes-ExecutionResult-example-boundary-001
        kind: boundary
        labels:
          zh: 观测执行结果拒绝边界
          en: "Rejection boundary: observes execution result"
          ja: 実行結果を観測の拒否境界
        scenario_id: null
        descriptions:
          zh: ExecutionResult result-21 仅包含工具返回值，没有独立 observation_id 或采集元数据。
          en: ExecutionResult result-21 contains only the tool return value and has no observation identifier or collection metadata.
          ja: ExecutionResult result-21 はツール戻り値だけを含み、observation_id や収集メタデータがありません。
        field_values: {}
        related_node_ids:
          - ExecutionObservation
          - ExecutionResult
        related_relation_ids:
          - ExecutionObservation-observes-ExecutionResult
        expected_result:
          zh: 不得把执行结果对象自身登记为一条独立执行观测。
          en: Do not treat the result object itself as an execution observation.
          ja: 結果オブジェクト自体を実行観測として扱いません。
        why_valid_or_invalid:
          zh: 被观测对象不能在缺少独立观测记录时同时充当观测证据。
          en: The observed object cannot also be the observation evidence without a separate observation record.
          ja: 観測対象は、独立した観測記録なしに観測証拠を兼ねられません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-execution-observation-006
    source_claims:
      - claim-execution-observation-007
    distinct_fact_rationale:
      zh: 把执行观测指向它所描述的执行结果对象，明确区分“关于结果的证据记录”与“结果本身”。 拒绝边界是：被观测对象不能在缺少独立观测记录时同时充当观测证据。
      en: "Links an execution observation to the execution-result object it describes, separating an evidence record about a result from the result itself. Its rejection boundary is: The observed object cannot also be the observation evidence without a separate observation record."
      ja: 実行観測を記述対象の実行結果オブジェクトへ結び付け、結果についての証拠記録と結果本体を区別します。 拒否境界は次のとおりです。観測対象は、独立した観測記録なしに観測証拠を兼ねられません。
    layout_role: cross-link
    review_status: accepted
    target: concept:ExecutionResult
