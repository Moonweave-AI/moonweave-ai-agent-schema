schema: moonweave.ai/ontology-node/v1
id: ExecutionObservation
kind: concept
labels:
  zh: 执行观测
  en: execution observation
  ja: 実行観測
semantics:
  short_definition:
    zh: 观察者在已知时刻对某次执行结果形成的独立身份记录。
    en: Identity-bearing record formed by an observer about one execution result at a known time.
    ja: 既知時刻に observer が一 execution result について形成する独立 identity record。
  definition:
    zh: ExecutionObservation 用 observation_id 标识对 ExecutionResult 的可见现象记录，含 observed_at 与采集条件；子类 CommandOutputObservation 与 ExitStatusObservation 分别捕获输出流与退出码。不声称 Command 已被调用。
    en: ExecutionObservation uses observation_id to record visible phenomena of an ExecutionResult with observed_at and collection conditions; subclasses CommandOutputObservation and ExitStatusObservation capture output streams and exit codes without claiming Command invocation.
    ja: ExecutionObservation root with output/exit subclasses。
  why_needed:
    zh: 独立观测层记录“系统实际看到了什么”，避免把采集延迟/截断误写成 ExecutionResult 属性。
    en: Separate observation layer records what the system actually saw, avoiding mistaking collection delay or truncation for ExecutionResult properties.
    ja: observer view vs result facts。
  includes:
    - zh: observation_id、observed_at、恰好一个被观测 ExecutionResult、采集者来源。
      en: observation_id, observed_at, exactly one observed ExecutionResult, collector provenance.
      ja: observation_id/observed_at/result/provenance。
  excludes:
    - zh: CommandExecution、RunResult 身份、TraceEvent、OutputStream 内容副本。
      en: CommandExecution, RunResult identity, TraceEvent, OutputStream content copies.
      ja: invocation/RunResult/trace/stream copy。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: MCP tools/call 返回 Tool Result→CommandOutputObservation；shell exit code→ExitStatusObservation；Docker logs→CommandOutputObservation 分 channel 重组。
    en: MCP tools/call Tool Result→CommandOutputObservation; shell exit code→ExitStatusObservation; Docker logs→CommandOutputObservation reassembled by channel.
    ja: MCP/shell/Docker observation mapping。
  typical_input:
    - description: POSIX tool result
      format: '{"stdout_chunks":[{"sequence":0,"text":"compile\n"}],"stderr_chunks":[],"exit_code":0}'
      source_claims:
        - claim-eobs-posix
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys:
    - observation_id
  fields:
    - id: observation_id
      labels:
        zh: 观测标识
        en: observation ID
        ja: 観測 ID
      definitions:
        zh: 稳定标识一次执行结果观测。
        en: Stable identifier for one observation of an execution result.
        ja: 一つの実行結果観測を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: obs-command-001
      allowed_values: []
      source_claims: []
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      definitions:
        zh: 形成该观测记录的 UTC 时间。
        en: UTC instant at which the observation record was formed.
        ja: この観測記録が形成された UTC 時刻です。
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-07-13T01:02:03.000Z
      allowed_values: []
      source_claims:
        - claim-execution-observation-002
  constraints:
    - id: execution-observation-result-bound
      severity: error
      expression_language: plain
      expression: an observation identifies exactly one observed execution result
      explanation:
        zh: 执行观测只能描述一个明确的执行结果。
        en: An execution observation describes exactly one identified execution result.
        ja: 実行観測は一つの明確な実行結果だけを記述します。
      source_claims: []
  required_relations:
    - id: execution-observation-observes-result
      direction: outgoing
      predicate: observes
      target_concept_id: ExecutionResult
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 执行观测必须指向被观测的执行结果。
        en: An execution observation points to the execution result it observes.
        ja: 実行観測は観測対象の実行結果を指します。
      source_claims: []
examples:
  - id: ExecutionObservation-example-cmd-output
    labels:
      zh: 命令输出观测
      en: Command output observation
      ja: コマンド出力観測
    descriptions:
      zh: cmdobs-build-17 观察 stdout/stderr 分块与 exit 0。
      en: cmdobs-build-17 observes stdout/stderr chunks and exit 0.
      ja: command output observation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: observation
    field_values:
      observation_id: cmdobs-build-17
    related_node_ids:
      - ExecutionObservation
      - CommandOutputObservation
    related_relation_ids: []
    source_claims:
      - claim-eobs-design
  - id: ExecutionObservation-example-mcp-tool
    labels:
      zh: MCP Tool Result 观测
      en: MCP Tool Result observation
      ja: MCP Tool Result 観測
    descriptions:
      zh: cmdobs-ls-4 从 MCP Tool Result text 映射 stdout sequence 0。
      en: cmdobs-ls-4 maps MCP Tool Result text to stdout sequence 0.
      ja: MCP tool output observation。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      version: Tool Result
    field_values: {}
    related_node_ids:
      - ExecutionObservation
      - CommandOutputObservation
    related_relation_ids: []
    source_claims:
      - claim-eobs-mcp
  - id: ExecutionObservation-example-not-result
    labels:
      zh: 非 ExecutionResult
      en: Not ExecutionResult
      ja: ExecutionResult ではない
    descriptions:
      zh: ExecutionResult 本身不是 ExecutionObservation。
      en: ExecutionResult itself is not ExecutionObservation.
      ja: result≠observation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ExecutionObservation
    related_relation_ids: []
    source_claims:
      - claim-eobs-design
parent_relation: null
relations:
  - id: ExecutionObservation-observes-ExecutionResult
    predicate: observes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 观测执行结果
      en: observes execution result
      ja: 実行結果を観測
    definitions:
      zh: 把执行观测指向它所描述的执行结果对象，明确区分“关于结果的证据记录”与“结果本身”。
      en: Links an execution observation to the execution-result object it describes, separating an evidence record about a result from the result itself.
      ja: 実行観測を記述対象の実行結果オブジェクトへ結び付け、結果についての証拠記録と結果本体を区別します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: observed_by_execution_observation
      labels:
        zh: 由执行观测记录
        en: observed by execution observation
        ja: 実行観測に記録される
    conditions:
      - id: ExecutionObservation-observes-ExecutionResult-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the observation record names one ExecutionResult identity and records what an observer could see about that result at observed_at; a copied payload without result identity or an ExecutionResult standing alone is insufficient.
        source_claims:
          - claim-execution-observation-004
        explanation:
          zh: 仅当观测记录明确指向一个 ExecutionResult 标识，并记录观察者在 observed_at 时刻可见的该结果现象时成立；没有结果标识的复制载荷或单独存在的 ExecutionResult 均不足。
          en: Assert only when the observation record names one ExecutionResult identity and records what an observer could see about that result at observed_at; a copied payload without result identity or an ExecutionResult standing alone is insufficient.
          ja: observation record が一つの ExecutionResult ID を明示し、observed_at 時点で observer に見えた現象を記録するときだけ成立します。result ID のない payload copy や単独の ExecutionResult だけでは不十分です。
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ExecutionObservation 仍由 info-plane 拥有，ExecutionResult 仍由 tool-plane 拥有；该 information 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: ExecutionObservation remains owned by info-plane and ExecutionResult by tool-plane; this information fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: ExecutionObservation は info-plane、ExecutionResult は tool-plane に引き続き所有されます。この information 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 ExecutionObservation → ExecutionResult 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical ExecutionObservation → ExecutionResult assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは ExecutionObservation → ExecutionResult の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: ExecutionObservation-observes-ExecutionResult-example-positive-001
        labels:
          zh: 观测执行结果正例
          en: "Accepted case: observes execution result"
          ja: 実行結果を観測の受理例
        descriptions:
          zh: observation obs-21 记录 result_id=result-21、采集时间和观测器版本，并指向该工具调用返回的 ExecutionResult。
          en: Observation obs-21 records result_id=result-21, collection time, and observer version, and points to the ExecutionResult returned by that tool call.
          ja: 観測 obs-21 は result_id=result-21、収集時刻、観測器版を記録し、そのツール呼出しが返した ExecutionResult を指します。
        field_values: {}
        related_node_ids:
          - ExecutionObservation
          - ExecutionResult
        related_relation_ids:
          - ExecutionObservation-observes-ExecutionResult
        source_claims:
          - claim-execution-observation-005
      - id: ExecutionObservation-observes-ExecutionResult-example-boundary-001
        labels:
          zh: 观测执行结果拒绝边界
          en: "Rejection boundary: observes execution result"
          ja: 実行結果を観測の拒否境界
        descriptions:
          zh: ExecutionResult result-21 仅包含工具返回值，没有独立 observation_id 或采集元数据。
          en: ExecutionResult result-21 contains only the tool return value and has no observation identifier or collection metadata.
          ja: ExecutionResult result-21 はツール戻り値だけを含み、observation_id や収集メタデータがありません。
        field_values: {}
        related_node_ids:
          - ExecutionObservation
          - ExecutionResult
        related_relation_ids:
          - ExecutionObservation-observes-ExecutionResult
        source_claims:
          - claim-execution-observation-006
    source_claims:
      - claim-execution-observation-007
    layout_role: cross-link
    target: concept:ExecutionResult
sources:
  - id: src-posix-exit-status
    title: POSIX Shell Command Language — Exit Status
    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    source_type: standard
    relevance: stdout/stderr and exit codes.
  - id: src-mcp-tool-result
    title: MCP Server Tools Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    source_type: official-spec
    relevance: Tool Result text output from commands.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-execution-observation-001
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's LogRecord model separates event time from ObservedTimestamp and attaches resource, body, and attributes to what a collection system observed. ExecutionObservation generalizes that observer-view boundary for one ExecutionResult, with an independent observation identity and required observes relation. Owner info-container-command, semantic kind information, and module-key-root status are Moonweave design inferences.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Body, Resource, Attributes
    evidence_kind: official
    confidence: high
  - id: claim-execution-observation-002
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines ObservedTimestamp as the time at which the telemetry collection system observed the event. Moonweave maps observed_at to that collector-side instant and requires a normalized UTC date-time for deterministic comparison.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > ObservedTimestamp
    evidence_kind: official
    confidence: high
  - id: claim-execution-observation-003
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry distinguishes the time an event occurred from the time it was observed and permits resource and attribute context on the observation record. The example applies that distinction by giving the collector view its own identity and observed_at while keeping result-214 as a separate referent.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Resource, Attributes
    evidence_kind: official
    confidence: high
  - id: claim-execution-observation-004
    source: eng-fw-openai-agents-tools
    supports: OpenAI Agents tools distinguish a tool execution's returned output from subsequent handling of that output. The exact one-result observation identity and primary-backbone placement are reviewed Moonweave inferences.
    locator: OpenAI Agents SDK Tools > Local runtime tools and Function tools > returning tool output
    evidence_kind: design-inference
    confidence: high
  - id: claim-execution-observation-005
    source: eng-fw-openai-agents-tools
    supports: "ExecutionObservation-observes-ExecutionResult: The accepted record is Observation obs-21 records result_id=result-21, collection time, and observer version, and points to the ExecutionResult returned by that tool call. OpenAI tool calls produce returned outputs, allowing a separate observation record to point to the result it describes. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
  - id: claim-execution-observation-006
    source: eng-fw-openai-agents-tools
    supports: "ExecutionObservation-observes-ExecutionResult: The rejected record is outside the relation because The observed object cannot also be the observation evidence without a separate observation record. OpenAI tool calls produce returned outputs, allowing a separate observation record to point to the result it describes. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
  - id: claim-execution-observation-007
    source: eng-fw-openai-agents-tools
    supports: "ExecutionObservation-observes-ExecutionResult: The official material supports the operational distinction used by this edge. OpenAI tool calls produce returned outputs, allowing a separate observation record to point to the result it describes. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
  - id: claim-eobs-posix
    source: src-posix-exit-status
    supports: POSIX execution exposes observable stdout/stderr and exit code outcomes.
    locator: exit status
    evidence_kind: standard
    confidence: high
  - id: claim-eobs-mcp
    source: src-mcp-tool-result
    supports: MCP Tool Results provide observable command output separate from protocol message identity.
    locator: Tool Result
    evidence_kind: primary-spec
    confidence: high
  - id: claim-eobs-design
    source: src-info-container-design
    supports: ExecutionObservation records observer views separate from execution results.
    locator: ExecutionObservation
    evidence_kind: design-inference
    confidence: high
