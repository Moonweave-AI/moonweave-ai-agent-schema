source_claims:
  - id: claim-execution-observation-001
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's LogRecord model separates event time from ObservedTimestamp and attaches resource, body, and attributes to what a collection system observed. ExecutionObservation generalizes that observer-view boundary for one ExecutionResult, with an independent observation identity and required observes relation. Owner info-container-command, semantic kind information, and module-key-root status are Moonweave design inferences.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Body, Resource, Attributes
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-observation-002
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines ObservedTimestamp as the time at which the telemetry collection system observed the event. Moonweave maps observed_at to that collector-side instant and requires a normalized UTC date-time for deterministic comparison.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > ObservedTimestamp
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-observation-003
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry distinguishes the time an event occurred from the time it was observed and permits resource and attribute context on the observation record. The example applies that distinction by giving the collector view its own identity and observed_at while keeping result-214 as a separate referent.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Resource, Attributes
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-observation-004
    source: eng-fw-openai-agents-tools
    supports: OpenAI Agents tools distinguish a tool execution's returned output from subsequent handling of that output. The exact one-result observation identity and primary-backbone placement are reviewed Moonweave inferences.
    locator: OpenAI Agents SDK Tools > Local runtime tools and Function tools > returning tool output
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-observation-005
    source: eng-fw-openai-agents-tools
    supports: "ExecutionObservation-observes-ExecutionResult: The accepted record is Observation obs-21 records result_id=result-21, collection time, and observer version, and points to the ExecutionResult returned by that tool call. OpenAI tool calls produce returned outputs, allowing a separate observation record to point to the result it describes. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-observation-006
    source: eng-fw-openai-agents-tools
    supports: "ExecutionObservation-observes-ExecutionResult: The rejected record is outside the relation because The observed object cannot also be the observation evidence without a separate observation record. OpenAI tool calls produce returned outputs, allowing a separate observation record to point to the result it describes. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-observation-007
    source: eng-fw-openai-agents-tools
    supports: "ExecutionObservation-observes-ExecutionResult: The official material supports the operational distinction used by this edge. OpenAI tool calls produce returned outputs, allowing a separate observation record to point to the result it describes. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted

