    en: "An exit-status observation is an execution observation specialized for the exit code or terminating signal recorded at command completion, together with collection provenance rather than subjective success judgment. Its rejection boundary is: The inference has no POSIX exit-status value and lacks observation provenance."
    ja: 終了状態観測は、コマンド完了時の終了コードまたは終了シグナルと収集来歴に特化した実行観測であり、主観的な成否評価ではありません。 拒否境界は次のとおりです。推測には POSIX 終了状態値がなく、観測来歴もありません。
