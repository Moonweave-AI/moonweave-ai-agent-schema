schema: moonweave.ai/ontology-node/v1
id: ExitStatusObservation
kind: concept
status: accepted
labels:
  zh: 退出状态观测
  en: exit status observation
  ja: 終了状態観測
semantics:
  short_definition:
    zh: 对一次命令如何终止所作的执行观测，其载荷为退出码或终止信号。
    en: An execution observation of how one command terminated, carrying an exit code or termination signal.
    ja: 一回のコマンドがどのように終了したかを、終了コードまたは終了 signal で表す実行観測。
  definition:
    zh: 退出状态观测是一种 ExecutionObservation，把观察到的命令终止结果记录为结构化 exit_status：正常终止时记录退出码，信号终止时记录信号和原因，并关联被观测的 ExecutionResult。它只陈述进程终止状态；退出码为零不自动证明上层任务成功，非零也不等同于安全或策略失败。
    en: "An ExitStatusObservation is an ExecutionObservation that records observed command termination as structured exit_status: an exit code for normal termination or a signal and reason for signal termination, linked to the observed ExecutionResult. It states process termination only; code zero does not prove higher-level task success, and nonzero does not by itself mean a safety or policy failure."
    ja: ExitStatusObservation は、観測したコマンド終了を構造化 exit_status として記録する ExecutionObservation です。通常終了では exit code、signal 終了では signal と理由を保持し、観測対象 ExecutionResult へ関連付けます。プロセス終了だけを述べ、code 0 は上位タスク成功を証明せず、非 0 も安全・方針失敗そのものではありません。
  why_needed:
    zh: 需要把终止状态作为可审计观测而非伪类或结果标签：这样可保留原始代码/信号、观测时间和来源，同时让任务结果与策略判断独立演算。
    en: It keeps termination status as an auditable observation rather than a pseudo-class or result label, preserving raw code or signal, observation time, and provenance while task outcome and policy judgment remain separate.
    ja: 終了状態を疑似クラスや結果 label ではなく監査可能な観測として保ち、raw code・signal・観測時刻・来歴を保存しつつ、タスク outcome と方針判断を分離するために必要です。
  includes:
    - zh: 包含与一个被观测执行结果关联、具有观测时刻，并携带互相一致的 code、signal 与 reason 组合的终止观测。
      en: Includes termination observations linked to one observed execution result, with an observation time and a mutually consistent combination of code, signal, and reason.
      ja: 一つの観測対象実行結果へ関連し、観測時刻と、整合する code・signal・reason の組合せを持つ終了観測を含みます。
  excludes:
    - zh: 不包含 stdout/stderr 内容、CommandOutputObservation、ExecutionResult、任务级成功/失败结果或策略拒绝；单独整数 0/1 在没有执行与观测语境时也不是本类实例。
      en: Excludes stdout/stderr content, CommandOutputObservation, ExecutionResult, task-level success or failure, and policy denial; a bare integer 0 or 1 without execution and observation context is not an instance either.
      ja: stdout/stderr 内容、CommandOutputObservation、ExecutionResult、タスク級成功・失敗、方針拒否を含みません。実行・観測文脈のない単独整数 0/1 も本クラスの instance ではありません。
  semantic_kind: information
  aliases: []
