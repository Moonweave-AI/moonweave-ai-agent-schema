schema: moonweave.ai/ontology-node/v1
id: ExitStatusObservation
kind: concept
labels:
  zh: 退出状态观测
  en: exit status observation
  ja: 終了状態観測
semantics:
  short_definition:
    zh: 记录进程或命令整数退出码或信号的执行观测特化。
    en: Execution observation specialization recording integer exit code or signal of a process or command.
    ja: process/command integer exit code/signal を記録する execution observation 特化。
  definition:
    zh: ExitStatusObservation 映射 POSIX exit code、Docker container exit status；与 CommandOutputObservation 分开记录，stdout 为空时也不得省略。
    en: ExitStatusObservation maps POSIX exit codes and Docker container exit status; recorded separately from CommandOutputObservation and must not be omitted when stdout is empty.
    ja: exit_code/signal observation separate from streams。
  why_needed:
    zh: 退出状态是独立可观察事实，不能与 stdout 文本混为单一 TextBlock。
    en: Exit status is an independently observable fact and must not merge with stdout text as one TextBlock.
    ja: exit status separate evidence。
  includes:
    - zh: exit_code、optional signal、observation_id、execution_reference_id。
      en: exit_code, optional signal, observation_id, execution_reference_id.
      ja: exit_code/signal/observation/exec ref。
  excludes:
    - zh: stdout/stderr 文本块、Command 调用记录。
      en: stdout/stderr text chunks and Command invocation records.
      ja: stream text/command invocation。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: build exit_code=2 stderr 含 failure message→ExitStatusObservation 与 CommandOutputObservation 分别记录；exit 0 亦需 ExitStatusObservation。
    en: build exit_code=2 with stderr failure message→ExitStatusObservation and CommandOutputObservation recorded separately; exit 0 also requires ExitStatusObservation.
    ja: non-zero and zero exit recording。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys: []
  fields:
    - id: exit_status
      labels:
        zh: 命令退出状态
        en: command exit status
        ja: コマンド終了状態
      definitions:
        zh: 退出码或终止状态是 ExitStatusObservation 的标量观测值，不具独立业务身份；字段化后仍可记录代码、信号和原因。
        en: An exit code or termination status is a scalar observed value of ExitStatusObservation without independent business identity; a field can still record code, signal, and reason.
        ja: 終了コードまたは終了状態は独立業務同一性を持たない ExitStatusObservation のスカラー観測値であり、項目でコード・シグナル・理由を保持できます。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value:
        code: 0
        signal: null
        reason: completed
      allowed_values: []
      source_claims:
        - claim-exit-status-observation-002
  constraints: []
  required_relations: []
examples:
  - id: ExitStatusObservation-example-nonzero
    labels:
      zh: 非零退出码
      en: Non-zero exit code
      ja: 非ゼロ exit code
    descriptions:
      zh: cmdobs-build-19 exit_code=2 与 stderr 分块分开记录。
      en: cmdobs-build-19 exit_code=2 recorded separately from stderr chunks.
      ja: exit 2 observation。
    example_source:
      product: POSIX
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      version: exit status
    field_values:
      exit_code: 2
    related_node_ids:
      - ExitStatusObservation
      - CommandOutputObservation
    related_relation_ids: []
    source_claims:
      - claim-exitobs-posix
  - id: ExitStatusObservation-example-zero
    labels:
      zh: 零退出码
      en: Zero exit code
      ja: ゼロ exit code
    descriptions:
      zh: cmdobs-build-17 exit_code=0 即使 stdout 有内容也单独 ExitStatusObservation。
      en: cmdobs-build-17 exit_code=0 gets separate ExitStatusObservation even with stdout content.
      ja: exit 0 observation。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: exit 0
    field_values:
      exit_code: 0
    related_node_ids:
      - ExitStatusObservation
    related_relation_ids: []
    source_claims:
      - claim-exitobs-design
  - id: ExitStatusObservation-example-not-stdout
    labels:
      zh: 非 stdout 文本
      en: Not stdout text
      ja: stdout text ではない
    descriptions:
      zh: 不得仅用 stdout TextBlock 代替 ExitStatusObservation。
      en: Must not substitute stdout TextBlock for ExitStatusObservation.
      ja: TextBlock≠exit status。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ExitStatusObservation
    related_relation_ids: []
    source_claims:
      - claim-exitobs-design
parent_relation:
  id: ExitStatusObservation-is_a-ExecutionObservation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种执行观测
    en: is an execution observation
    ja: 実行観測の一種
  definitions:
    zh: 退出状态观测是执行观测的专门类型，记录命令完成时的退出码或信号以及采集溯源，而不是对成功或失败的主观评价。
    en: An exit-status observation is an execution observation specialized for the exit code or terminating signal recorded at command completion, together with collection provenance rather than subjective success judgment.
    ja: 終了状態観測は、コマンド完了時の終了コードまたは終了シグナルと収集来歴に特化した実行観測であり、主観的な成否評価ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ExitStatusObservation-is_a-ExecutionObservation-example-positive-001
      labels:
        zh: 是一种执行观测正例
        en: "Accepted case: is an execution observation"
        ja: 実行観測の一種の受理例
      descriptions:
        zh: status-13 记录 execution_id=exec-13、exit_code=0 和 observed_at，并由等待该进程的运行器采集。
        en: status-13 records execution_id=exec-13, exit_code=0, and observed_at, collected by the runner that waited for the process.
        ja: status-13 は execution_id=exec-13、exit_code=0、observed_at を記録し、プロセスを待機したランナーが収集しています。
      field_values: {}
      related_node_ids:
        - ExitStatusObservation
        - ExecutionObservation
      related_relation_ids:
        - ExitStatusObservation-is_a-ExecutionObservation
      source_claims:
        - claim-exit-status-observation-005
    - id: ExitStatusObservation-is_a-ExecutionObservation-example-boundary-001
      labels:
        zh: 是一种执行观测拒绝边界
        en: "Rejection boundary: is an execution observation"
        ja: 実行観測の一種の拒否境界
      descriptions:
        zh: 诊断器生成“command likely failed”警告，但没有读取退出码或终止信号。
        en: A diagnostic component emits “command likely failed” without reading an exit code or terminating signal.
        ja: 診断器が終了コードや終了シグナルを読まずに「command likely failed」と警告します。
      field_values: {}
      related_node_ids:
        - ExitStatusObservation
        - ExecutionObservation
      related_relation_ids:
        - ExitStatusObservation-is_a-ExecutionObservation
      source_claims:
        - claim-exit-status-observation-006
  source_claims:
    - claim-exit-status-observation-007
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-posix-exit-status
    title: POSIX Shell Command Language — Exit Status
    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    source_type: standard
    relevance: stdout/stderr and exit codes.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-exit-status-observation-001
    source: eng-std-posix-shell-2024
    supports: POSIX defines command exit status and the conventions by which normal and signal termination yield status values. ExitStatusObservation uses that termination evidence but adds an observation identity, observation time, and explicit separation from higher-level task outcome. Its ownership by info-container-command, semantic kind information, and backbone ExitStatusObservation-is_a-ExecutionObservation are Moonweave design inferences.
    locator: POSIX.1-2024 Shell Command Language §2.8.2 > Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-exit-status-observation-002
    source: eng-std-posix-shell-2024
    supports: POSIX defines a command exit status as a numeric value and separately specifies signal-derived status values. That supports preserving the observed code or termination signal; Moonweave's code/signal/reason object is an explicit representation choice and does not imply task-level success.
    locator: POSIX.1-2024 Shell Command Language §2.8.2 > Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-exit-status-observation-003
    source: eng-std-posix-shell-2024
    supports: POSIX §2.8.2 makes the command's numeric exit status the termination evidence. The example therefore preserves code 0 as observed data while deliberately withholding a stronger task-success assertion.
    locator: POSIX.1-2024 Shell Command Language §2.8.2 > Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-exit-status-observation-004
    source: eng-std-posix-shell-2024
    supports: POSIX separately specifies standard output and standard error streams and command exit status. Those independent operational facts support distinguishing the observed output chunks of CommandOutputObservation from the termination status recorded by ExitStatusObservation; the observation-record taxonomy is a Moonweave design inference.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 and Shell Command Language §2.8.2
    evidence_kind: normative
    confidence: high
  - id: claim-exit-status-observation-005
    source: eng-std-posix-shell-2024
    supports: "ExitStatusObservation-is_a-ExecutionObservation: The accepted record is status-13 records execution_id=exec-13, exit_code=0, and observed_at, collected by the runner that waited for the process. POSIX assigns an exit status to command completion; Moonweave represents a provenance-bearing capture of that status as an execution observation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.8.2 Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-exit-status-observation-006
    source: eng-std-posix-shell-2024
    supports: "ExitStatusObservation-is_a-ExecutionObservation: The rejected record is outside the relation because The inference has no POSIX exit-status value and lacks observation provenance. POSIX assigns an exit status to command completion; Moonweave represents a provenance-bearing capture of that status as an execution observation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.8.2 Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-exit-status-observation-007
    source: eng-std-posix-shell-2024
    supports: "ExitStatusObservation-is_a-ExecutionObservation: The official material supports the operational distinction used by this edge. POSIX assigns an exit status to command completion; Moonweave represents a provenance-bearing capture of that status as an execution observation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.8.2 Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-exitobs-posix
    source: src-posix-exit-status
    supports: POSIX defines integer exit codes as distinct observable outcomes.
    locator: exit status
    evidence_kind: standard
    confidence: high
  - id: claim-exitobs-design
    source: src-info-container-design
    supports: ExitStatusObservation records exit codes separately from output stream chunks.
    locator: ExitStatusObservation
    evidence_kind: design-inference
    confidence: high
