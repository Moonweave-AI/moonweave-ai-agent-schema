sibling_differentiation:
  - sibling_concept_id: CommandOutputObservation
    shared_parent_concept_id: ExecutionObservation
    differentia:
      zh: 已审查兄弟区分：父节点 ExecutionObservation：ExitStatusObservation（semantic kind=information，骨架 ExitStatusObservation-is_a-ExecutionObservation）；CommandOutputObservation（semantic kind=information，骨架 CommandOutputObservation-is_a-ExecutionObservation）。双端条件：ExitStatusObservation 条件：“退出状态观测属于执行观测，区别于其他同类对象的条件是：它表示退出状态被观察并暂存为智能体步骤上下文证据后的形式”；CommandOutputObservation 条件：“命令输出观测是一种执行观测；其区分条件是：它记录作为进入上下文的证据的可观察命令输出，同时不拥有产生该输出的命令执行或容器”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ExecutionObservation: ExitStatusObservation (semantic kind=information, backbone ExitStatusObservation-is_a-ExecutionObservation); CommandOutputObservation (semantic kind=information, backbone CommandOutputObservation-is_a-ExecutionObservation). Endpoint conditions: ExitStatusObservation condition: “Exit status observation is an execution observation whose defining condition is that it represents an exit status after it has been observed and staged as context evidence for an agent step”; CommandOutputObservation condition: “As an execution observation, Command output observation is distinguished by the fact that it records observable command output as context-ingress evidence without owning the command execution or container that produced it”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ExecutionObservation：ExitStatusObservation（semantic kind=information、バックボーン ExitStatusObservation-is_a-ExecutionObservation）；CommandOutputObservation（semantic kind=information、バックボーン CommandOutputObservation-is_a-ExecutionObservation）。両端条件：ExitStatusObservation の条件：「終了状態観測は実行観測のうち、次の事実を定義条件とする対象です：それは、終了状態が観測され、エージェント手順のコンテキスト証拠としてステージングされた状態を表します」；CommandOutputObservation の条件：「実行観測に属するコマンド出力観測は、次の事実を種差とします：それは、コンテキスト取り込み証拠としての観測可能なコマンド出力を記録し、その出力を生んだ実行やコンテナ自体は所有しません」。一方の成立は他方を証明しません。
    source_claims:
      - claim-exit-status-observation-004
