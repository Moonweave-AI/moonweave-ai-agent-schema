schema: moonweave.ai/ontology-node/v1
id: ExitStatusObservation
kind: concept
status: review
labels:
  zh: 退出状态观测
  en: exit status observation
  ja: 終了状態観測
semantics:
  short_definition:
    zh: 对一次命令如何终止所作的执行观测，其载荷为退出码或终止信号。
    en: An execution observation of how one command terminated, carrying an exit code or termination signal.
    ja: 一回のコマンドがどのように終了したかを、終了コードまたは終了 signal で表す実行観測。
  definition:
    zh: 退出状态观测是一种 ExecutionObservation，把观察到的命令终止结果记录为结构化 exit_status：正常终止时记录退出码，信号终止时记录信号和原因，并关联被观测的 ExecutionResult。它只陈述进程终止状态；退出码为零不自动证明上层任务成功，非零也不等同于安全或策略失败。
    en: "An ExitStatusObservation is an ExecutionObservation that records observed command termination as structured exit_status: an exit code for normal termination or a signal and reason for signal termination, linked to the observed ExecutionResult. It states process termination only; code zero does not prove higher-level task success, and nonzero does not by itself mean a safety or policy failure."
    ja: ExitStatusObservation は、観測したコマンド終了を構造化 exit_status として記録する ExecutionObservation です。通常終了では exit code、signal 終了では signal と理由を保持し、観測対象 ExecutionResult へ関連付けます。プロセス終了だけを述べ、code 0 は上位タスク成功を証明せず、非 0 も安全・方針失敗そのものではありません。
  why_needed:
    zh: 需要把终止状态作为可审计观测而非伪类或结果标签：这样可保留原始代码/信号、观测时间和来源，同时让任务结果与策略判断独立演算。
    en: It keeps termination status as an auditable observation rather than a pseudo-class or result label, preserving raw code or signal, observation time, and provenance while task outcome and policy judgment remain separate.
    ja: 終了状態を疑似クラスや結果 label ではなく監査可能な観測として保ち、raw code・signal・観測時刻・来歴を保存しつつ、タスク outcome と方針判断を分離するために必要です。
  includes:
    - zh: 包含与一个被观测执行结果关联、具有观测时刻，并携带互相一致的 code、signal 与 reason 组合的终止观测。
      en: Includes termination observations linked to one observed execution result, with an observation time and a mutually consistent combination of code, signal, and reason.
      ja: 一つの観測対象実行結果へ関連し、観測時刻と、整合する code・signal・reason の組合せを持つ終了観測を含みます。
  excludes:
    - zh: 不包含 stdout/stderr 内容、CommandOutputObservation、ExecutionResult、任务级成功/失败结果或策略拒绝；单独整数 0/1 在没有执行与观测语境时也不是本类实例。
      en: Excludes stdout/stderr content, CommandOutputObservation, ExecutionResult, task-level success or failure, and policy denial; a bare integer 0 or 1 without execution and observation context is not an instance either.
      ja: stdout/stderr 内容、CommandOutputObservation、ExecutionResult、タスク級成功・失敗、方針拒否を含みません。実行・観測文脈のない単独整数 0/1 も本クラスの instance ではありません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: exit_status
      labels:
        zh: 命令退出状态
        en: command exit status
        ja: コマンド終了状態
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 退出码或终止状态是 ExitStatusObservation 的标量观测值，不具独立业务身份；字段化后仍可记录代码、信号和原因。
        en: An exit code or termination status is a scalar observed value of ExitStatusObservation without independent business identity; a field can still record code, signal, and reason.
        ja: 終了コードまたは終了状態は独立業務同一性を持たない ExitStatusObservation のスカラー観測値であり、項目でコード・シグナル・理由を保持できます。
      allowed_values: []
      pattern: null
      example_value:
        code: 0
        signal: null
        reason: completed
      source_claims:
        - claim-exit-status-observation-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExitStatusObservation-example-positive-001
    kind: positive
    labels:
      zh: 退出状态观测正例
      en: Positive example of exit status observation
      ja: 終了状態観測の正例
    scenario_id: null
    descriptions:
      zh: 执行 exec-214 在 01:02:01Z 正常终止；采集器于 01:02:03Z 记录 code=0、signal=null、reason=completed，并把该观测关联到同一次执行结果。退出码被原样保存，没有被改写成“任务成功”。
      en: Execution exec-214 terminated normally at 01:02:01Z. At 01:02:03Z the collector recorded code 0, no signal, and reason completed, linked the observation to that execution result, and did not translate the code into a claim of task success.
      ja: 実行 exec-214 は 01:02:01Z に通常終了し、collector は 01:02:03Z に code 0、signal なし、reason completed を同じ実行結果へ関連付けて記録しました。code はタスク成功という判定へ変換されていません。
    field_values:
      observation_id: obs-command-001
      observed_at: 2026-07-13T01:02:03.000Z
      exit_status:
        code: 0
        signal: null
        reason: completed
    related_node_ids:
      - ExitStatusObservation
      - CommandOutputObservation
    related_relation_ids:
      - CommandOutputObservation-has_exit_status_observation-ExitStatusObservation
    expected_result:
      zh: 记录被识别为 ExitStatusObservation，并可从命令输出观测查询到该结构化终止证据。
      en: The record is classified as an ExitStatusObservation and is queryable from the command-output observation as structured termination evidence.
      ja: 記録は ExitStatusObservation と判定され、コマンド出力観測から構造化終了証拠として照会できます。
    why_valid_or_invalid:
      zh: 它具有明确执行对象、独立观测时刻以及互相一致的 code/signal/reason，并把终止状态与任务结论分开。
      en: It identifies the execution, has a distinct observation time, carries a consistent code/signal/reason combination, and keeps termination status separate from task outcome.
      ja: 実行対象、独立した観測時刻、整合する code/signal/reason を持ち、終了状態とタスク結果を分離しているため有効です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-exit-status-observation-003
  - id: ExitStatusObservation-example-boundary-001
    kind: boundary
    labels:
      zh: 退出状态观测边界例
      en: Boundary case for exit status observation
      ja: 終了状態観測の境界例
    scenario_id: null
    descriptions:
      zh: 日志正文只有字符串“exit=0”，但没有执行标识、观测时刻，也无法判断该数字来自 shell 退出状态、应用消息还是测试数据。这个文本片段不能单独实例化为 ExitStatusObservation。
      en: A log body contains only the text “exit=0”, with no execution identity, observation time, or way to tell whether the number came from shell termination, an application message, or test data. The text alone is not an ExitStatusObservation.
      ja: log 本文には “exit=0” だけがあり、実行 identity、観測時刻、shell 終了・application message・test data のどれに由来するかを示す情報がありません。この文字列だけでは ExitStatusObservation になりません。
    field_values: {}
    related_node_ids:
      - ExitStatusObservation
    related_relation_ids: []
    expected_result:
      zh: 该字符串保持普通日志内容身份，直至补足可验证的执行与观测语境。
      en: The string remains ordinary log content unless verifiable execution and observation context is supplied.
      ja: 検証可能な実行・観測文脈が補われるまで、この文字列は通常の log content のままです。
    why_valid_or_invalid:
      zh: 数值外观并不能证明它是对一次命令终止的结构化观测，关键身份与来历均缺失。
      en: A number that looks like an exit code does not establish a structured observation of command termination; identity and provenance are missing.
      ja: 終了 code に見える数値だけではコマンド終了の構造化観測を証明できず、identity と provenance が欠けています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: ExitStatusObservation-example-instance-001
    kind: instance
    labels:
      zh: 退出状态观测结构化实例
      en: Structured instance of exit status observation
      ja: 終了状態観測の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: obs-exit-214 记录 exec-214 的终止载荷 {code:0, signal:null, reason:"completed"}，observed_at 晚于执行终止时刻两秒；它作为 obs-command-214 的退出状态组成部分保存在节点详情中。
      en: obs-exit-214 records exec-214's termination payload {code:0, signal:null, reason:"completed"}; observed_at is two seconds after termination, and the record is retained as the exit-status component of obs-command-214.
      ja: obs-exit-214 は exec-214 の終了 payload {code:0, signal:null, reason:"completed"} を記録し、observed_at は終了の 2 秒後です。この記録は obs-command-214 の終了状態部分として保持されます。
    field_values:
      observation_id: obs-command-001
      observed_at: 2026-07-13T01:02:03.000Z
      exit_status:
        code: 0
        signal: null
        reason: completed
    related_node_ids:
      - ExitStatusObservation
      - CommandOutputObservation
    related_relation_ids:
      - CommandOutputObservation-has_exit_status_observation-ExitStatusObservation
    expected_result:
      zh: 实例通过结构校验，并可沿命令输出观测的 has_exit_status_observation 关系检索。
      en: The instance passes the structure contract and is retrievable through the command-output observation's has_exit_status_observation relation.
      ja: instance は構造 contract を満たし、コマンド出力観測の has_exit_status_observation 関係から取得できます。
    why_valid_or_invalid:
      zh: 它给出唯一观测标识、观测时刻、互斥一致的 code 与 signal，并明确依附于一个命令输出观测。
      en: It provides one observation identity, an observation time, a consistent mutually exclusive code and signal, and an explicit link to one command-output observation.
      ja: 一意の観測 identity、観測時刻、排他的に整合する code と signal、および一つのコマンド出力観測への明示的 link を持つため有効です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
