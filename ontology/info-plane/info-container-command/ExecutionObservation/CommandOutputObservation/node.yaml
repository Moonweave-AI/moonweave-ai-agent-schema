    source: eng-std-posix-shell-2024
    supports: "has_stdout_chunk: The accepted record is obs-71 references stdout-chunk-2, whose channel=stdout, sequence=2, byte_range=512..1023, and execution identifier match the observation. POSIX treats standard output as file descriptor 1, distinct from standard error; chunk identity therefore preserves the stdout channel explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
