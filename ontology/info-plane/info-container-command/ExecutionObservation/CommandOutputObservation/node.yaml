        descriptions:
          zh: stderr 中出现“permission denied”，但没有退出码、终止信号或对应 ExitStatusObservation 标识。
          en: Standard error contains “permission denied”, but no exit code, terminating signal, or exit-status observation identifier is recorded.
          ja: 標準エラーに「permission denied」がありますが、終了コード、終了シグナル、終了状態観測 ID は記録されていません。
        field_values: {}
        related_node_ids:
