      - id: derived_from_trace_event-example-boundary-001
        labels:
          zh: 派生自追踪事件拒绝边界
          en: "Rejection boundary: derived from trace event"
          ja: トレースイベントから派生の拒否境界
        descriptions:
          zh: obs-56 与 evt-55 只有相同 trace_id 和相近时间，没有 event_id 或转换记录。
          en: Observation obs-56 merely shares trace_id and a nearby timestamp with evt-55; it has no event identifier or transformation record.
          ja: 観測 obs-56 は evt-55 と trace_id と近い時刻を共有するだけで、event_id や変換記録がありません。
        field_values: {}
        related_node_ids:
          - CommandOutputObservation
          - TraceEvent
        related_relation_ids:
          - derived_from_trace_event
        source_claims:
          - claim-command-output-observation-016
    source_claims:
      - claim-command-output-observation-017
    layout_role: cross-link
    target: concept:TraceEvent
  - id: has_stderr_chunk
    predicate: has_stderr_chunk
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用标准错误分块
      en: references stderr chunk
      ja: 標準エラーチャンクを参照
    definitions:
      zh: 从命令输出观测指向它所记录的有边界标准错误分块，保留通道、序号和字节范围；这是一条证据引用边，不表示观测产生了分块。
      en: Links a command-output observation to a bounded standard-error chunk it records, preserving channel, sequence, and byte range; this evidence reference does not claim that the observation produced the chunk.
      ja: コマンド出力観測から、記録対象の境界付き標準エラーチャンクを指し、チャネル、順序、バイト範囲を保持します。観測がチャンクを生成したとは主張しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
