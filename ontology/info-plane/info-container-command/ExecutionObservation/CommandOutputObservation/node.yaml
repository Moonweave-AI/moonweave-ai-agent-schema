    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    source_type: standard
    relevance: stdout/stderr and exit codes.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-command-output-observation-001
    source: eng-std-posix-shell-2024
    supports: POSIX provides the independent operational facts for stdout, stderr, stream order, and command exit status. CommandOutputObservation groups the captured observer view of those facts for one execution without becoming the command, execution activity, or result. Owner info-container-command, semantic kind information, and backbone CommandOutputObservation-is_a-ExecutionObservation are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 and Shell Command Language §2.8.2
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-002
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's LogRecord separates observation time from event time and attaches body, attributes, and resource context to the observed record. CommandOutputObservation adopts that observer-record boundary for captured command output; its aggregation of channel chunks and exit observation is a Moonweave design inference, not an OpenTelemetry class.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > ObservedTimestamp, Body, Resource, Attributes
    evidence_kind: official
    confidence: high
  - id: claim-command-output-observation-003
    source: eng-std-posix-shell-2024
    supports: POSIX separately defines standard output, standard error, and command exit status. The example preserves those three observation dimensions separately instead of inferring output capture from exit status or merging the two channels.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.355 and Shell Command Language §2.8.2
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-004
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry's LogRecord model distinguishes the event timestamp from ObservedTimestamp and carries body, attributes, and resource context. The example follows that observer-view pattern by assigning obs-command-001 its own observed_at and provenance rather than treating the execution result itself as the observation.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp and ObservedTimestamp
    evidence_kind: official
    confidence: high
  - id: claim-command-output-observation-005
    source: eng-std-posix-shell-2024
    supports: POSIX treats command exit status separately from the bytes written to standard output and standard error. That operational separation supports distinguishing an output-capture observation from a termination-status observation; their common ExecutionObservation parent is a Moonweave taxonomy decision.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.355 and Shell Command Language §2.8.2
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-006
    source: eng-std-posix-shell-2024
    supports: "CommandOutputObservation-is_a-ExecutionObservation: The accepted record is Observation obs-42 records an execution identifier, stdout chunk sequence, and exit-status identifier, making it a specialized observation of command execution. POSIX distinguishes command execution from the standard-output and standard-error data it produces; Moonweave models the provenance-bearing observation as the specialized record. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-007
    source: eng-std-posix-shell-2024
    supports: "CommandOutputObservation-is_a-ExecutionObservation: The rejected record is outside the relation because Output content is evidence referenced by an observation, not the provenance-bearing observation record itself. POSIX distinguishes command execution from the standard-output and standard-error data it produces; Moonweave models the provenance-bearing observation as the specialized record. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-008
    source: eng-std-posix-shell-2024
    supports: "CommandOutputObservation-is_a-ExecutionObservation: The official material supports the operational distinction used by this edge. POSIX distinguishes command execution from the standard-output and standard-error data it produces; Moonweave models the provenance-bearing observation as the specialized record. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-009
    source: eng-std-posix-shell-2024
    supports: "CommandOutputObservation-has_exit_status_observation-ExitStatusObservation: The accepted record is Output observation obs-42 for execution exec-42 records exit-status observation status-42 with exit_code=2 and the same execution identifier. POSIX defines a command's exit status separately from the bytes written to its output channels. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.8.2 Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-010
    source: eng-std-posix-shell-2024
    supports: "CommandOutputObservation-has_exit_status_observation-ExitStatusObservation: The rejected record is outside the relation because Diagnostic text can accompany several outcomes and cannot substitute for exit-status evidence. POSIX defines a command's exit status separately from the bytes written to its output channels. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.8.2 Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-011
    source: eng-std-posix-shell-2024
    supports: "CommandOutputObservation-has_exit_status_observation-ExitStatusObservation: The official material supports the operational distinction used by this edge. POSIX defines a command's exit status separately from the bytes written to its output channels. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.8.2 Exit Status for Commands
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-012
    source: eng-fw-openai-agents-tools
    supports: "CommandOutputObservation-references_execution_result-ExecutionResultReference: The accepted record is Observation obs-87 stores result_ref=result://run-9/tool-3, which resolves to the tool result that owns the recorded output chunks. OpenAI tool executions return outputs that can be represented separately from the tracing or observation record that refers to them. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
  - id: claim-command-output-observation-013
    source: eng-fw-openai-agents-tools
    supports: "CommandOutputObservation-references_execution_result-ExecutionResultReference: The rejected record is outside the relation because A result object and a reference to that result have different identities and lifecycles. OpenAI tool executions return outputs that can be represented separately from the tracing or observation record that refers to them. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
