schema: moonweave.ai/ontology-node/v1
id: CommandOutputObservation
kind: concept
status: accepted
labels:
  zh: 命令输出观测
  en: command output observation
  ja: コマンド出力観測
semantics:
  short_definition:
    zh: 对一次命令执行实际产生的标准输出、标准错误及其捕获边界所作的执行观测。
    en: An execution observation of the stdout, stderr, and capture boundaries actually produced by one command execution.
    ja: 一回のコマンド実行が実際に生成した標準出力・標準エラーと捕捉境界についての実行観測。
  definition:
    zh: 命令输出观测是一种执行观测，它把某次命令范围 InvocationAttempt 中被收集器实际看到的 stdout、stderr 分块、顺序、截断状态和观测时刻固化为证据，并可关联对应的 ExecutionResult 与退出状态观测。它不是命令活动、调用尝试、执行结果或输出流内容本身。
    en: A CommandOutputObservation is an ExecutionObservation that fixes the stdout and stderr chunks actually seen by a collector, their order, truncation state, and observation time for one command-scoped InvocationAttempt, with links to the corresponding ExecutionResult and exit-status observation. It is not the command activity, invocation attempt, result, or stream content.
    ja: CommandOutputObservation は command-scoped InvocationAttempt で collector が実際に観測した stdout/stderr chunk・順序・truncation・時刻を evidence として固定し、ExecutionResult と exit-status observation に関連付ける ExecutionObservation です。command activity・invocation attempt・result・stream content 自体ではありません。
  why_needed:
    zh: 需要它把运行活动与可进入上下文的证据分开：同一 InvocationAttempt 可产生多次收集或截断后的观测，而尝试与 ExecutionResult 的身份不随展示方式改变。
    en: "It separates runtime activity from context-ready evidence: one InvocationAttempt may be collected or truncated into different observations while the identities of the attempt and ExecutionResult remain unchanged."
    ja: runtime activity と context-ready evidence を分離します。同一 InvocationAttempt から異なる collection/truncation の observation を作っても attempt と ExecutionResult の identity は変わりません。
  includes:
    - zh: 包含能够标识被观测执行结果，并记录实际捕获的 stdout/stderr 分块或明确的零长度流、观测时刻与截断状态的不可变记录。
      en: Includes immutable records that identify the observed execution result and record captured stdout/stderr chunks—or an explicit zero-length stream—together with observation time and truncation state.
      ja: 観測対象の実行結果を識別し、実際に捕捉した stdout/stderr チャンク、または明示的な空ストリームを、観測時刻と切詰め状態とともに記録する不変記録を含みます。
  excludes:
    - zh: 不包含 Command、InvocationAttempt 或 ExecutionResult；也不把单独的 ExitStatusObservation、原始 OutputStream、ContextIngressEvent 或仅保存命令文本的日志行归为本类。
      en: Excludes Command, InvocationAttempt, and ExecutionResult, as well as a standalone ExitStatusObservation, raw OutputStream, ContextIngressEvent, or a log line that merely stores command text.
      ja: Command・InvocationAttempt・ExecutionResult、および standalone ExitStatusObservation・raw OutputStream・ContextIngressEvent・command text だけの log line を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: CommandOutputObservation-example-positive-001
    kind: positive
    labels:
      zh: 命令输出观测正例
      en: Positive example of command output observation
      ja: コマンド出力観測の正例
    scenario_id: null
    descriptions:
      zh: collector-3 在 01:02:03Z 完成对 command-exec-214 的采集：stdout 两个分块合成“12 tests passed”，stderr 一个分块为弃用警告，退出状态观测为 code 0；obs-command-001 仅保存已捕获视图并引用原执行结果。
      en: "At 01:02:03Z collector-3 finishes collecting command-exec-214: two stdout chunks form “12 tests passed,” one stderr chunk carries a deprecation warning, and the exit-status observation is code 0. obs-command-001 stores only the captured view and references the original result."
      ja: 01:02:03Z に collector-3 が command-exec-214 の収集を完了し、二つの stdout chunk が『12 tests passed』を構成し、一つの stderr chunk が非推奨 warning を持ち、終了状態観測は code 0 です。obs-command-001 は捕捉 view だけを保存し元結果を参照します。
    field_values:
      observation_id: obs-command-001
      observed_at: 2026-07-13T01:02:03.000Z
    related_node_ids:
      - CommandOutputObservation
      - ExitStatusObservation
    related_relation_ids:
      - CommandOutputObservation-has_exit_status_observation-ExitStatusObservation
    expected_result:
      zh: obs-command-001 被归为 CommandOutputObservation，并可分别追到 stdout/stderr 分块、ExecutionResult 与 code 0 的 ExitStatusObservation。
      en: obs-command-001 is classified as CommandOutputObservation and separately traces to stdout/stderr chunks, the ExecutionResult, and the code-0 ExitStatusObservation.
      ja: obs-command-001 は CommandOutputObservation に分類され、stdout/stderr chunk、ExecutionResult、code 0 の ExitStatusObservation へ個別に追跡できます。
    why_valid_or_invalid:
      zh: 记录具有独立观测身份与时刻，内容来自一次已识别命令执行的实际通道采集，并未把活动或结果复制成本体成员。
      en: The record has its own observation identity and time, derives content from actual channel capture of one identified command execution, and does not copy the activity or result as the observation.
      ja: 記録は独自の観測同一性と時刻を持ち、一つの識別済みコマンド実行の実 channel 捕捉から内容を得て、活動や結果を観測として複製しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-command-output-observation-003
      - claim-command-output-observation-004
  - id: CommandOutputObservation-example-boundary-001
    kind: boundary
    labels:
      zh: 命令输出观测边界例
      en: Boundary case for command output observation
      ja: コマンド出力観測の境界例
    scenario_id: null
    descriptions:
      zh: command-exec-215 只留下 code 0 的 ExitStatusObservation；采集器明确报告 stdout 与 stderr 未被捕获，而不是空流已被观测。这个终止状态不能补造一份 CommandOutputObservation。
      en: command-exec-215 leaves only a code-0 ExitStatusObservation; the collector explicitly reports that stdout and stderr were not captured, rather than observed as empty streams. The termination status cannot manufacture a CommandOutputObservation.
      ja: command-exec-215 には code 0 の ExitStatusObservation だけが残り、収集器は stdout/stderr を空 stream として観測したのではなく未捕捉と報告します。この終了状態から CommandOutputObservation を作れません。
    field_values: {}
    related_node_ids:
      - CommandOutputObservation
      - ExitStatusObservation
    related_relation_ids:
      - CommandOutputObservation-has_exit_status_observation-ExitStatusObservation
    expected_result:
      zh: 保留 ExitStatusObservation；由于没有任何已观测流、分块或明确零长度流，不创建 CommandOutputObservation。
      en: Retain the ExitStatusObservation and create no CommandOutputObservation because no observed stream, chunk, or explicit zero-length stream exists.
      ja: ExitStatusObservation を保持し、観測 stream、chunk、明示的空 stream がないため CommandOutputObservation を作成しません。
    why_valid_or_invalid:
      zh: 退出状态与输出捕获是可分别缺失的观测维度；知道命令终止方式不等于知道任何输出内容被观察到。
      en: Termination status and output capture are independently missing observation dimensions; knowing how a command terminated does not mean any output content was observed.
      ja: 終了状態と出力捕捉は独立して欠け得る観測次元であり、コマンドの終了方法を知っても出力内容を観測したことにはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: CommandOutputObservation-example-instance-001
    kind: instance
    labels:
      zh: 命令输出观测结构化实例
      en: Structured instance of command output observation
      ja: コマンド出力観測の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: obs-command-001 是 collector-3 于 2026-07-13T01:02:03Z 形成的命令输出观测记录；它标识一次固定采集视图，而不是 command-exec-214 或其结果对象。
      en: obs-command-001 is the command-output observation formed by collector-3 at 2026-07-13T01:02:03Z. It identifies one fixed collection view, not command-exec-214 or its result object.
      ja: obs-command-001 は collector-3 が 2026-07-13T01:02:03Z に形成したコマンド出力観測です。一つの固定収集 view を識別し、command-exec-214 や結果対象ではありません。
    field_values:
      observation_id: obs-command-001
      observed_at: 2026-07-13T01:02:03.000Z
    related_node_ids:
      - CommandOutputObservation
    related_relation_ids: []
    expected_result:
      zh: observation_id 唯一，observed_at 是规范化 UTC 时刻；实例保持 CommandOutputObservation 类型。
      en: observation_id is unique, observed_at is a normalized UTC instant, and the instance remains a CommandOutputObservation.
      ja: observation_id は一意、observed_at は正規化 UTC 時刻で、instance は CommandOutputObservation のままです。
    why_valid_or_invalid:
      zh: 稳定标识与观测时间共同区分这份采集记录；输出、退出状态和结果身份通过关系保存，不被压成字段字符串。
      en: Stable identity and observation time distinguish this collection record; output, exit status, and result identity remain relations rather than flattened field strings.
      ja: 安定識別子と観測時刻がこの収集記録を区別し、出力、終了状態、結果同一性は field 文字列へ平坦化せず関係で保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ExitStatusObservation
    shared_parent_concept_id: ExecutionObservation
    differentia:
      zh: 已审查兄弟区分：父节点 ExecutionObservation：CommandOutputObservation（semantic kind=information，骨架 CommandOutputObservation-is_a-ExecutionObservation）；ExitStatusObservation（semantic kind=information，骨架 ExitStatusObservation-is_a-ExecutionObservation）。双端条件：CommandOutputObservation 条件：“命令输出观测是一种执行观测；其区分条件是：它记录作为进入上下文的证据的可观察命令输出，同时不拥有产生该输出的命令执行或容器”；ExitStatusObservation 条件：“退出状态观测属于执行观测，区别于其他同类对象的条件是：它表示退出状态被观察并暂存为智能体步骤上下文证据后的形式”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ExecutionObservation: CommandOutputObservation (semantic kind=information, backbone CommandOutputObservation-is_a-ExecutionObservation); ExitStatusObservation (semantic kind=information, backbone ExitStatusObservation-is_a-ExecutionObservation). Endpoint conditions: CommandOutputObservation condition: “As an execution observation, Command output observation is distinguished by the fact that it records observable command output as context-ingress evidence without owning the command execution or container that produced it”; ExitStatusObservation condition: “Exit status observation is an execution observation whose defining condition is that it represents an exit status after it has been observed and staged as context evidence for an agent step”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ExecutionObservation：CommandOutputObservation（semantic kind=information、バックボーン CommandOutputObservation-is_a-ExecutionObservation）；ExitStatusObservation（semantic kind=information、バックボーン ExitStatusObservation-is_a-ExecutionObservation）。両端条件：CommandOutputObservation の条件：「実行観測に属するコマンド出力観測は、次の事実を種差とします：それは、コンテキスト取り込み証拠としての観測可能なコマンド出力を記録し、その出力を生んだ実行やコンテナ自体は所有しません」；ExitStatusObservation の条件：「終了状態観測は実行観測のうち、次の事実を定義条件とする対象です：それは、終了状態が観測され、エージェント手順のコンテキスト証拠としてステージングされた状態を表します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-command-output-observation-005
parent_relation:
  id: CommandOutputObservation-is_a-ExecutionObservation
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种执行观测
    en: is an execution observation
    ja: 実行観測の一種
  definitions:
    zh: 命令输出观测是执行观测的专门类型：它以命令执行为被观测对象，并保存输出通道、顺序范围和完成状态的证据。
    en: A command-output observation is an execution observation specialized for evidence about a command's output channels, ordering ranges, and completion status.
    ja: コマンド出力観測は、コマンドの出力チャネル、順序範囲、完了状態の証拠に特化した実行観測です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CommandOutputObservation-is_a-ExecutionObservation-example-positive-001
      kind: positive
      labels:
        zh: 是一种执行观测正例
        en: "Accepted case: is an execution observation"
        ja: 実行観測の一種の受理例
      scenario_id: null
      descriptions:
        zh: obs-42 同时记录 execution_id、stdout 分块序号和 exit_status_id，因而是针对命令执行结果的专门观测。
        en: Observation obs-42 records an execution identifier, stdout chunk sequence, and exit-status identifier, making it a specialized observation of command execution.
        ja: 観測 obs-42 は execution_id、stdout チャンク順序、exit_status_id を記録し、コマンド実行に特化した観測です。
      field_values: {}
      related_node_ids:
