    supports: "derived_from_trace_event: The official material supports the operational distinction used by this edge. OpenTelemetry spans carry timestamped events with attributes; provenance can therefore identify the exact event used to derive an observation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: OpenTelemetry Tracing API, Span Creation, Add Events, Links, and Span lifetime
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-018
    source: eng-std-posix-shell-2024
    supports: "has_stderr_chunk: The accepted record is obs-72 references stderr-chunk-3, whose channel=stderr, sequence=3, byte_range=1024..1535, and execution identifier match the observation. POSIX treats standard error as file descriptor 2, distinct from standard output; chunk identity therefore preserves the stderr channel explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-command-output-observation-019
    source: eng-std-posix-shell-2024
    supports: "has_stderr_chunk: The rejected record is outside the relation because Content derivation does not establish which standard-error chunk the observation directly references. POSIX treats standard error as file descriptor 2, distinct from standard output; chunk identity therefore preserves the stderr channel explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
