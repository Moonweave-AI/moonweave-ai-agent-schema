        descriptions:
          zh: obs-87 保存 result_ref=result://run-9/tool-3，并且该引用解析到产生这些输出分块的工具结果。
          en: Observation obs-87 stores result_ref=result://run-9/tool-3, which resolves to the tool result that owns the recorded output chunks.
          ja: 観測 obs-87 の result_ref=result://run-9/tool-3 は、記録された出力チャンクを持つツール結果へ解決されます。
