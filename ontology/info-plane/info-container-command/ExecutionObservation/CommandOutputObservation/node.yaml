        en: is target of derived from trace event
        ja: 逆方向：derived from trace event
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: CommandOutputObservation 仍由 info-plane 拥有，TraceEvent 仍由 runtime-plane 拥有；该 information 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: CommandOutputObservation remains owned by info-plane and TraceEvent by runtime-plane; this information fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: CommandOutputObservation は info-plane、TraceEvent は runtime-plane に引き続き所有されます。この information 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 CommandOutputObservation → TraceEvent 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical CommandOutputObservation → TraceEvent assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは CommandOutputObservation → TraceEvent の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: derived_from_trace_event-example-positive-001
        labels:
          zh: 派生自追踪事件正例
          en: "Accepted case: derived from trace event"
          ja: トレースイベントから派生の受理例
        descriptions:
          zh: obs-55 的 provenance.event_id 指向 command.output 事件 evt-55，并记录 parser_version 与原始事件时间戳。
          en: Observation obs-55 names command.output event evt-55 in provenance.event_id and records the parser version and original event timestamp.
          ja: 観測 obs-55 は provenance.event_id で command.output イベント evt-55 を示し、パーサ版と元イベント時刻を記録します。
        field_values: {}
