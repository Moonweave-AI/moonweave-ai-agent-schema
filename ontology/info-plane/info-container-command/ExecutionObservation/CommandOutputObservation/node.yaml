    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
  - id: claim-command-output-observation-015
    source: eng-std-opentelemetry-trace-api
    supports: "derived_from_trace_event: The accepted record is Observation obs-55 names command.output event evt-55 in provenance.event_id and records the parser version and original event timestamp. OpenTelemetry spans carry timestamped events with attributes; provenance can therefore identify the exact event used to derive an observation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
