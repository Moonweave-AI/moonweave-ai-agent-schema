          ja: 観測に完全な ExecutionResult JSON が埋め込まれていますが、参照 ID や解決規則がありません。
        field_values: {}
        related_node_ids:
          - CommandOutputObservation
          - ExecutionResultReference
        related_relation_ids:
          - CommandOutputObservation-references_execution_result-ExecutionResultReference
        source_claims:
          - claim-command-output-observation-013
    source_claims:
      - claim-command-output-observation-014
    layout_role: cross-link
    target: concept:ExecutionResultReference
  - id: derived_from_trace_event
    predicate: derived_from_trace_event
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 派生自追踪事件
      en: derived from trace event
      ja: トレースイベントから派生
    definitions:
      zh: 记录命令输出观测由某个带时间戳的追踪事件转换而来，并保留事件标识和转换溯源；共享 trace_id 或时间接近不足以证明派生。
      en: Records that a command-output observation was transformed from a particular timestamped trace event while retaining event identity and transformation provenance; a shared trace identifier is insufficient.
      ja: コマンド出力観測が特定のタイムスタンプ付きトレースイベントから変換され、イベント ID と変換来歴を保持することを記録します。同じ trace_id だけでは不十分です。
    cardinality: null
    cardinality_not_applicable_reason:
