    source: eng-std-posix-shell-2024
    supports: "has_stderr_chunk: The official material supports the operational distinction used by this edge. POSIX treats standard error as file descriptor 2, distinct from standard output; chunk identity therefore preserves the stderr channel explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
