      expected_result:
        zh: 把 obs-42 归入执行观测分支。
        en: Classify obs-42 under execution observations.
        ja: obs-42 を実行観測の配下に分類します。
      why_valid_or_invalid:
        zh: 其身份由被观测执行及其输出证据决定，而不是由文本内容本身决定。
        en: Its identity is determined by the observed execution and output evidence, not by text content alone.
        ja: 同一性はテキスト内容だけでなく、観測対象の実行と出力証拠によって決まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-command-output-observation-006
    - id: CommandOutputObservation-is_a-ExecutionObservation-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种执行观测拒绝边界
        en: "Rejection boundary: is an execution observation"
        ja: 実行観測の一種の拒否境界
      scenario_id: null
      descriptions:
        zh: 一段仅含“build complete”的 stdout 字节没有 execution_id、通道范围或观测记录。
        en: A stdout byte range containing only “build complete” has no execution identifier, channel range, or observation record.
        ja: 「build complete」だけを含む stdout バイト列には、execution_id、チャネル範囲、観測記録がありません。
      field_values: {}
      related_node_ids:
        - CommandOutputObservation
        - ExecutionObservation
      related_relation_ids:
        - CommandOutputObservation-is_a-ExecutionObservation
      expected_result:
        zh: 将其保留为输出段，不归类为命令输出观测。
        en: Keep it as an output segment, not a command-output observation.
        ja: 出力セグメントとして保持し、コマンド出力観測には分類しません。
      why_valid_or_invalid:
        zh: 输出内容是观测所引用的证据，不等同于带有执行溯源的观测记录。
        en: Output content is evidence referenced by an observation, not the provenance-bearing observation record itself.
        ja: 出力内容は観測が参照する証拠であり、実行来歴を持つ観測記録そのものではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-command-output-observation-007
  source_claims:
    - claim-command-output-observation-008
  distinct_fact_rationale:
    zh: 命令输出观测是执行观测的专门类型：它以命令执行为被观测对象，并保存输出通道、顺序范围和完成状态的证据。 拒绝边界是：输出内容是观测所引用的证据，不等同于带有执行溯源的观测记录。
    en: "A command-output observation is an execution observation specialized for evidence about a command's output channels, ordering ranges, and completion status. Its rejection boundary is: Output content is evidence referenced by an observation, not the provenance-bearing observation record itself."
    ja: コマンド出力観測は、コマンドの出力チャネル、順序範囲、完了状態の証拠に特化した実行観測です。 拒否境界は次のとおりです。出力内容は観測が参照する証拠であり、実行来歴を持つ観測記録そのものではありません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
