      zh: 从命令输出观测指向可解析的执行结果引用，使输出证据能够回到完整工具结果，同时避免把结果载荷复制进观测节点。
      en: Points from a command-output observation to a resolvable execution-result reference so the evidence can reach the complete tool result without copying that result into the observation.
      ja: コマンド出力観測から解決可能な実行結果参照を指し、結果本体を観測へ複製せずに完全なツール結果へ到達できるようにします。
