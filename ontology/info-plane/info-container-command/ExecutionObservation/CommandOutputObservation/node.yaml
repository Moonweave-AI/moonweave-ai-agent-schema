schema: moonweave.ai/ontology-node/v1
id: CommandOutputObservation
kind: concept
labels:
  zh: 命令输出观测
  en: command output observation
  ja: コマンド出力観測
semantics:
  short_definition:
    zh: 对命令执行 stdout/stderr 捕获边界与分块顺序的执行观测特化。
    en: Execution observation specialization of stdout/stderr capture boundaries and chunk order from command execution.
    ja: command 実行 stdout/stderr capture boundary/chunk order の execution observation 特化。
  definition:
    zh: CommandOutputObservation 映射 shell 命令 stdout/stderr、MCP Tool Result text content、Docker/E2B 容器 log stream；用 channel、sequence、observation_id 重组输出，文本载荷 cross-link 到 TextBlock。
    en: CommandOutputObservation maps shell stdout/stderr, MCP Tool Result text content, and Docker/E2B container log streams; reassembles via channel, sequence, observation_id, cross-linking text payloads to TextBlock.
    ja: CommandOutput/stdout/stderr/MCP tool result mapping。
  why_needed:
    zh: 分通道分块观测支持缺块检测与按通道引用 stderr 片段。
    en: Per-channel chunked observations support missing-chunk detection and per-channel stderr citation.
    ja: channel+sequence reassembly。
  includes:
    - zh: stdout/stderr chunks、sequence ordinals、truncation state、execution_reference_id。
      en: stdout/stderr chunks, sequence ordinals, truncation state, execution_reference_id.
      ja: chunks/sequence/truncation/exec ref。
  excludes:
    - zh: Command 调用活动、RunResult 身份、ExitStatusObservation（分开记录）。
      en: Command invocation activity, RunResult identity, ExitStatusObservation (recorded separately).
      ja: invocation/RunResult/exit status。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: cmdobs-build-17 stdout seq 0..1 stderr seq 0 重组；MCP ls -l text→stdout seq 0 StandardOutputChunk；missing seq 1→reconstruction_complete=false。
    en: cmdobs-build-17 stdout seq 0..1 stderr seq 0 reassembly; MCP ls -l text→stdout seq 0 StandardOutputChunk; missing seq 1→reconstruction_complete=false.
    ja: reassembly and gap detection。
  typical_input:
    - description: MCP Tool Result
      format: '{"content":[{"type":"text","text":"total 24\n-rw-r--r-- 1 user staff 4096 README.md"}]}'
      source_claims:
        - claim-cmdobs-mcp
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: CommandOutputObservation-example-reassembly
    labels:
      zh: stdout/stderr 重组
      en: stdout/stderr reassembly
      ja: stdout/stderr 再構成
    descriptions:
      zh: cmdobs-build-17 三 chunk 重组 compile/tests passed 与 deprecation warning。
      en: cmdobs-build-17 three chunks reassemble compile/tests passed and deprecation warning.
      ja: channel reassembly。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: reassembly
    field_values:
      observation_id: cmdobs-build-17
    related_node_ids:
      - CommandOutputObservation
      - StandardOutputChunk
    related_relation_ids: []
    source_claims:
      - claim-cmdobs-design
  - id: CommandOutputObservation-example-mcp-ls
    labels:
      zh: MCP ls 输出
      en: MCP ls output
      ja: MCP ls 出力
    descriptions:
      zh: cmdobs-ls-4 MCP Tool Result text→stdout sequence 0 cross-link TextBlock。
      en: cmdobs-ls-4 MCP Tool Result text→stdout sequence 0 cross-link TextBlock.
      ja: MCP output observation。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      version: Tool Result
    field_values:
      observation_id: cmdobs-ls-4
    related_node_ids:
      - CommandOutputObservation
      - info-content-block-modality
    related_relation_ids: []
    source_claims:
      - claim-cmdobs-mcp
  - id: CommandOutputObservation-example-missing-chunk
    labels:
      zh: 缺块检测
      en: Missing chunk detection
      ja: 欠落 chunk 検出
    descriptions:
      zh: cmdobs-build-18 stdout seq 0,2 缺 seq 1→missing_sequences=[1]。
      en: cmdobs-build-18 stdout seq 0,2 missing seq 1→missing_sequences=[1].
      ja: gap detection。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: missing chunk
    field_values: {}
    related_node_ids:
      - CommandOutputObservation
    related_relation_ids: []
    source_claims:
      - claim-cmdobs-design
parent_relation:
  id: CommandOutputObservation-is_a-ExecutionObservation
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种执行观测
    en: is an execution observation
    ja: 実行観測の一種
  definitions:
    zh: 命令输出观测是执行观测的专门类型：它以命令执行为被观测对象，并保存输出通道、顺序范围和完成状态的证据。
    en: A command-output observation is an execution observation specialized for evidence about a command's output channels, ordering ranges, and completion status.
    ja: コマンド出力観測は、コマンドの出力チャネル、順序範囲、完了状態の証拠に特化した実行観測です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CommandOutputObservation-is_a-ExecutionObservation-example-positive-001
      labels:
        zh: 是一种执行观测正例
        en: "Accepted case: is an execution observation"
        ja: 実行観測の一種の受理例
      descriptions:
        zh: obs-42 同时记录 execution_id、stdout 分块序号和 exit_status_id，因而是针对命令执行结果的专门观测。
        en: Observation obs-42 records an execution identifier, stdout chunk sequence, and exit-status identifier, making it a specialized observation of command execution.
        ja: 観測 obs-42 は execution_id、stdout チャンク順序、exit_status_id を記録し、コマンド実行に特化した観測です。
      field_values: {}
      related_node_ids:
        - CommandOutputObservation
        - ExecutionObservation
      related_relation_ids:
        - CommandOutputObservation-is_a-ExecutionObservation
      source_claims:
        - claim-command-output-observation-006
    - id: CommandOutputObservation-is_a-ExecutionObservation-example-boundary-001
      labels:
        zh: 是一种执行观测拒绝边界
        en: "Rejection boundary: is an execution observation"
        ja: 実行観測の一種の拒否境界
      descriptions:
        zh: 一段仅含“build complete”的 stdout 字节没有 execution_id、通道范围或观测记录。
        en: A stdout byte range containing only “build complete” has no execution identifier, channel range, or observation record.
        ja: 「build complete」だけを含む stdout バイト列には、execution_id、チャネル範囲、観測記録がありません。
      field_values: {}
      related_node_ids:
        - CommandOutputObservation
        - ExecutionObservation
      related_relation_ids:
        - CommandOutputObservation-is_a-ExecutionObservation
      source_claims:
        - claim-command-output-observation-007
  source_claims:
    - claim-command-output-observation-008
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: CommandOutputObservation-has_exit_status_observation-ExitStatusObservation
    predicate: has_exit_status_observation
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录退出状态观测
      en: records exit-status observation
      ja: 終了状態観測を記録
    definitions:
      zh: 把一次命令输出观测关联到同一命令执行的退出码或终止信号观测；该边只记录观测证据，不把诊断文本推断为退出状态。
      en: Associates a command-output observation with the exit-code or terminating-signal observation from the same command execution; diagnostic text alone is not an exit status.
      ja: コマンド出力観測を、同じコマンド実行の終了コードまたは終了シグナルの観測へ関連付けます。診断文だけを終了状態とは扱いません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_has_exit_status_observation
      labels:
        zh: 反向：has exit status observation
