        descriptions:
          zh: 执行 exec-42 的输出观测 obs-42 记录 ExitStatusObservation status-42，其中 exit_code=2，且二者使用同一 execution_id。
          en: Output observation obs-42 for execution exec-42 records exit-status observation status-42 with exit_code=2 and the same execution identifier.
          ja: 実行 exec-42 の出力観測 obs-42 が、同一 execution_id と exit_code=2 を持つ終了状態観測 status-42 を記録しています。
        field_values: {}
        related_node_ids:
