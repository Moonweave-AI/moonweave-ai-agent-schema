schema: moonweave.ai/ontology-node/v1
id: OutputStream
kind: concept
labels:
  zh: 输出流
  en: output stream
  ja: 出力ストリーム
semantics:
  short_definition:
    zh: 同一执行通道内有序组织输出片段的集合根。
    en: Root collection ordering output segments within one execution channel.
    ja: 一 execution channel 内 output segment を有序化する collection root。
  definition:
    zh: OutputStream 映射 POSIX stdout/stderr 两通道、Docker multiplexed logs；拥有 StandardOutput、StandardError、OutputSegment→OutputChunk 层级；不是 Command 或 Container 本身。
    en: OutputStream maps POSIX stdout/stderr channels and Docker multiplexed logs; owns StandardOutput, StandardError, OutputSegment→OutputChunk hierarchy; not Command or Container itself.
    ja: stdout/stderr OutputStream hierarchy。
  why_needed:
    zh: 输出流身份使分块重组与缺块检测有稳定容器，而不把流混为 TextBlock。
    en: Output stream identity gives chunk reassembly and gap detection a stable container without mixing streams as TextBlock.
    ja: stream container for chunks。
  includes:
    - zh: output_channel、OutputSegment 有序成员、observation 引用。
      en: output_channel, ordered OutputSegment members, observation reference.
      ja: channel/segments/observation ref。
  excludes:
    - zh: Command invocation、Container 运行时对象、generic TextBlock。
      en: Command invocation, Container runtime objects, generic TextBlock.
      ja: invocation/container/TextBlock。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: CommandOutputObservation 创建 stdout OutputStream 与 stderr OutputStream；每通道独立 sequence 计数。
    en: CommandOutputObservation creates stdout OutputStream and stderr OutputStream; independent sequence counting per channel.
    ja: per-channel OutputStream。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys:
    - stream_id
  fields:
    - id: stream_id
      labels:
        zh: 输出流标识
        en: output-stream ID
        ja: 出力 stream ID
      definitions:
        zh: 在同一产生者范围内稳定标识一个有序输出通道。
        en: Stably identifies one ordered output channel within its producer scope.
        ja: 生成者 scope 内の一つの ordered output channel を安定識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: stream-exec-214-fd1
      allowed_values: []
      source_claims:
        - claim-output-stream-002
    - id: producer_ref
      labels:
        zh: 产生者引用
        en: producer reference
        ja: 生成者参照
      definitions:
        zh: 指向拥有该通道的一次执行或进程，而不是任一输出片段。
        en: References the execution or process that owns the channel rather than any individual segment.
        ja: 個別 segment ではなく channel を所有する execution または process を参照します。
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: exec-214
      allowed_values: []
      source_claims:
        - claim-output-stream-003
    - id: channel
      labels:
        zh: 通道
        en: channel
        ja: channel
      definitions:
        zh: 声明产生者内的输出通道，例如 stdout、stderr 或具名输出通道。
        en: Declares the producer-local output channel, such as stdout, stderr, or a named output channel.
        ja: stdout・stderr・named output channel など生成者内の出力 channel を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: stdout
      allowed_values: []
      source_claims:
        - claim-output-stream-004
    - id: lifecycle_state
      labels:
        zh: 流生命周期状态
        en: stream lifecycle state
        ja: stream lifecycle state
      definitions:
        zh: 说明该集合仍开放、已完整关闭、被截断或因采集错误不完整。
        en: States whether the collection is open, complete, truncated, or incomplete because of a capture error.
        ja: collection が open・complete・truncated・capture error による incomplete のいずれかを示します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: complete
      allowed_values: []
      source_claims:
        - claim-output-stream-005
  constraints:
    - id: output-stream-order-is-channel-local
      severity: error
      expression_language: plain
      expression: segment order is total within one producer_ref and channel; cross-channel wall-clock order is not inferred
      explanation:
        zh: 片段顺序只在同一产生者的同一通道内成立，不能据此推断 stdout 与 stderr 的全序。
        en: Segment order is defined within one producer channel and does not imply a total order across stdout and stderr.
        ja: segment 順序は同じ producer channel 内だけで定義され、stdout と stderr 間の全順序を意味しません。
      source_claims:
        - claim-output-stream-006
  required_relations: []
examples:
  - id: OutputStream-example-stdout-stderr
    labels:
      zh: stdout/stderr 流
      en: stdout/stderr streams
      ja: stdout/stderr stream
    descriptions:
      zh: cmdobs-build-17 两 OutputStream 分别承载 stdout/stderr chunks。
      en: cmdobs-build-17 two OutputStreams carry stdout/stderr chunks separately.
      ja: dual channel streams。
    example_source:
      product: POSIX
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      version: stdout/stderr
    field_values: {}
    related_node_ids:
      - OutputStream
      - StandardOutput
      - StandardError
    related_relation_ids: []
    source_claims:
      - claim-ostream-posix
  - id: OutputStream-example-docker-logs
    labels:
      zh: Docker 日志流
      en: Docker log stream
      ja: Docker log stream
    descriptions:
      zh: container log_lines 按 stream 字段归入 stdout/stderr OutputStream。
      en: container log_lines routed to stdout/stderr OutputStream by stream field.
      ja: docker log streams。
    example_source:
      product: Docker
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      version: container logs
    field_values: {}
    related_node_ids:
      - OutputStream
    related_relation_ids: []
    source_claims:
      - claim-ostream-docker
  - id: OutputStream-example-not-command
    labels:
      zh: 非 Command
      en: Not Command
      ja: Command ではない
    descriptions:
      zh: OutputStream 不声称 shell 命令已被调用。
      en: OutputStream does not claim shell command was invoked.
      ja: stream≠invocation claim。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - OutputStream
    related_relation_ids: []
    source_claims:
      - claim-ostream-design
parent_relation: null
relations: []
sources:
  - id: src-posix-exit-status
    title: POSIX Shell Command Language — Exit Status
    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    source_type: standard
    relevance: stdout/stderr and exit codes.
  - id: src-docker-container-logs
    title: Docker Engine API — Container logs
    publisher: Docker
    url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
    source_type: official-doc
    relevance: Container stdout/stderr log streams.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-output-stream-001
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered sequence of bytes and distinguishes the standard output and standard error streams. OutputStream retains one execution-channel identity, its internal ordering, and a completion boundary; owner info-container-command, semantic kind collection, and composition-root status are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: normative
    confidence: high
  - id: claim-output-stream-002
    source: eng-std-posix-shell-2024
    supports: POSIX distinguishes standard output and standard error as separate streams. stream_id is Moonweave's stable identity for retaining that channel separation across captured chunks.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-stream-003
    source: eng-std-posix-shell-2024
    supports: POSIX standard streams belong to a process environment. producer_ref preserves the process or execution scope needed to disambiguate identical channel names from different executions.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Streams
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-stream-004
    source: eng-std-posix-shell-2024
    supports: POSIX normatively distinguishes the standard output and standard error streams. channel records that stream role without treating a chunk as the stream itself.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error and Standard Output
    evidence_kind: normative
    confidence: high
  - id: claim-output-stream-005
    source: eng-std-posix-shell-2024
    supports: POSIX defines end-of-file and stream closure behavior. lifecycle_state is Moonweave's explicit record of whether captured stream membership is final or incomplete.
    locator: POSIX.1-2024 Base Definitions > End-of-File and Stream
    evidence_kind: design-inference
    confidence: medium
  - id: claim-output-stream-006
    source: eng-std-posix-shell-2024
    supports: POSIX specifies separate ordered byte streams for standard output and standard error; Moonweave therefore preserves order per channel and rejects an invented cross-channel order.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-stream-007
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered sequence of bytes and defines standard output and standard error as distinct output streams. The example preserves one execution-local channel identity and its internal order rather than merging channels by wall-clock time.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: normative
    confidence: high
  - id: claim-ostream-posix
    source: src-posix-exit-status
    supports: POSIX defines separate stdout and stderr output streams.
    locator: standard streams
    evidence_kind: standard
    confidence: high
  - id: claim-ostream-docker
    source: src-docker-container-logs
    supports: Docker container logs multiplex stdout and stderr streams.
    locator: container logs
    evidence_kind: official-doc
    confidence: high
  - id: claim-ostream-design
    source: src-info-container-design
    supports: OutputStream orders segments per channel without claiming invocation.
    locator: OutputStream
    evidence_kind: design-inference
    confidence: high
