schema: moonweave.ai/ontology-node/v1
id: OutputStream
kind: concept
status: accepted
labels:
  zh: 输出流
  en: output stream
  ja: 出力ストリーム
semantics:
  short_definition:
    zh: 属于同一执行通道并按产生顺序排列的输出片段集合。
    en: An ordered collection of output segments belonging to one execution channel.
    ja: 一つの実行 channel に属し、生成順に並ぶ出力区間の集合。
  definition:
    zh: 输出流是一种有序集合，以产生者、执行或通道身份为范围，按确定顺序包含零个或多个 OutputSegment。它保存成员顺序和流是否完成、截断或仍开放等集合级信息；成员承载具体内容。OutputStream 不是产生输出的进程，也不是单个字节、行或片段。
    en: An OutputStream is an ordered collection scoped by producer, execution, or channel identity and containing zero or more OutputSegments in a determinate order. It stores collection-level facts such as member order and whether the stream is complete, truncated, or still open, while members carry content. It is neither the producing process nor a single byte, line, or segment.
    ja: OutputStream は、生成者・実行・channel identity で範囲づけられ、確定順序で 0 個以上の OutputSegment を含む順序集合です。member 順序と complete・truncated・open 等の集合レベル事実を保持し、内容は member が担います。生成プロセスや単一 byte・行・segment ではありません。
  why_needed:
    zh: 需要集合节点来保持片段间顺序、通道身份和完整性；否则 stdout 与 stderr 分块会成为无归属平级节点，无法正确重放或判断缺失。
    en: A collection node preserves cross-segment order, channel identity, and completeness; without it stdout and stderr chunks become unowned peers that cannot be replayed or checked for gaps reliably.
    ja: segment 間順序、channel identity、完全性を保つ集合 node が必要です。これがなければ stdout/stderr chunk は所属のない平級 node となり、正確な再生や欠落判定ができません。
  includes:
    - zh: 包含由一个执行通道标识、成员顺序明确且允许显式为空的输出集合；StandardOutput 与 StandardError 是按通道语义专化的成员。
      en: Includes output collections identified by one execution channel, with explicit member order and an allowed explicit empty state; StandardOutput and StandardError specialize the channel semantics.
      ja: 一つの実行 channel で識別され、member 順序が明示され、明示的空状態を許す出力集合を含みます。StandardOutput と StandardError は channel semantics の特殊化です。
  excludes:
    - zh: 不包含单个 OutputSegment 或 OutputChunk、产生输出的 CommandExecution、ExecutionResult、展示窗口或把 stdout 与 stderr 无序合并后的文本。
      en: Excludes an individual OutputSegment or OutputChunk, the producing CommandExecution, ExecutionResult, a display window, and text formed by unordered merging of stdout and stderr.
      ja: 単独の OutputSegment・OutputChunk、生成元 CommandExecution、ExecutionResult、表示 window、stdout と stderr を無順序結合した text を含みません。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - stream_id
  fields:
    - id: stream_id
      labels:
        zh: 输出流标识
        en: output-stream ID
        ja: 出力 stream ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在同一产生者范围内稳定标识一个有序输出通道。
        en: Stably identifies one ordered output channel within its producer scope.
        ja: 生成者 scope 内の一つの ordered output channel を安定識別します。
      allowed_values: []
      pattern: null
      example_value: stream-exec-214-fd1
      source_claims:
        - claim-output-stream-002
    - id: producer_ref
      labels:
        zh: 产生者引用
        en: producer reference
        ja: 生成者参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向拥有该通道的一次执行或进程，而不是任一输出片段。
        en: References the execution or process that owns the channel rather than any individual segment.
        ja: 個別 segment ではなく channel を所有する execution または process を参照します。
      allowed_values: []
      pattern: null
      example_value: exec-214
      source_claims:
        - claim-output-stream-003
    - id: channel
      labels:
        zh: 通道
        en: channel
        ja: channel
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明产生者内的输出通道，例如 stdout、stderr 或具名输出通道。
        en: Declares the producer-local output channel, such as stdout, stderr, or a named output channel.
        ja: stdout・stderr・named output channel など生成者内の出力 channel を宣言します。
      allowed_values: []
      pattern: null
      example_value: stdout
      source_claims:
        - claim-output-stream-004
    - id: lifecycle_state
      labels:
        zh: 流生命周期状态
        en: stream lifecycle state
        ja: stream lifecycle state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该集合仍开放、已完整关闭、被截断或因采集错误不完整。
        en: States whether the collection is open, complete, truncated, or incomplete because of a capture error.
        ja: collection が open・complete・truncated・capture error による incomplete のいずれかを示します。
      allowed_values: []
      pattern: null
      example_value: complete
      source_claims:
        - claim-output-stream-005
  constraints:
    - id: output-stream-order-is-channel-local
      severity: error
      expression_language: plain
      expression: segment order is total within one producer_ref and channel; cross-channel wall-clock order is not inferred
      explanations:
        zh: 片段顺序只在同一产生者的同一通道内成立，不能据此推断 stdout 与 stderr 的全序。
        en: Segment order is defined within one producer channel and does not imply a total order across stdout and stderr.
        ja: segment 順序は同じ producer channel 内だけで定義され、stdout と stderr 間の全順序を意味しません。
      source_claims:
        - claim-output-stream-006
  required_relation_constraints: []
examples:
  - id: OutputStream-example-positive-001
    kind: positive
    labels:
      zh: 输出流正例
      en: Positive example of output stream
      ja: 出力ストリームの正例
    scenario_id: null
    descriptions:
      zh: exec-214 的文件描述符 1 被建模为 stream-exec-214-fd1；采集到的 chunk 0、1、2 依序属于该流，流在进程关闭 fd 1 后标记 complete。流身份在各分块之间保持不变。
      en: File descriptor 1 of exec-214 is represented as stream-exec-214-fd1. Captured chunks 0, 1, and 2 belong to that stream in order, and the stream becomes complete when the process closes fd 1; its identity persists across chunks.
      ja: exec-214 の file descriptor 1 は stream-exec-214-fd1 として表されます。capture chunk 0、1、2 は順番に同じ stream に属し、process が fd 1 を閉じると complete になります。stream identity は chunk 間で不変です。
    field_values:
      stream_id: stream-exec-214-fd1
      producer_ref: exec-214
      channel: stdout
      lifecycle_state: complete
    related_node_ids:
      - OutputStream
      - OutputSegment
    related_relation_ids:
      - OutputStream-contains_segment-OutputSegment
    expected_result:
      zh: 系统返回一个有序 OutputStream，并可按偏移或序号读取其 OutputSegment 与 OutputChunk。
      en: The system returns one ordered OutputStream whose OutputSegments and OutputChunks can be read by offset or sequence.
      ja: system は一つの ordered OutputStream を返し、その OutputSegment と OutputChunk を offset または sequence で取得できます。
    why_valid_or_invalid:
      zh: 它拥有执行内唯一通道身份、稳定的流内顺序与完成边界；这些属性属于集合整体而非任一片段。
      en: It owns a unique execution-local channel identity, stable in-stream order, and a completion boundary—properties of the collection rather than any one segment.
      ja: 実行内で一意な channel identity、安定した stream 内順序、completion boundary を集合全体が持つため有効です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-output-stream-007
  - id: OutputStream-example-boundary-001
    kind: boundary
    labels:
      zh: 输出流边界例
      en: Boundary case for output stream
      ja: 出力ストリームの境界例
    scenario_id: null
    descriptions:
      zh: 终端界面按时间戳把 stdout 与 stderr 行交错成一个显示列表。该列表丢失了两个原始通道各自的流内偏移，也没有一个执行通道身份，因此不是 OutputStream。
      en: A terminal UI interleaves stdout and stderr lines into one timestamp-sorted display list. The list loses each original channel's offsets and has no single execution-channel identity, so it is not an OutputStream.
      ja: terminal UI は stdout と stderr の行を timestamp 順に一つの表示 list へ混在させます。各元 channel の offset と単一の execution-channel identity を失うため、これは OutputStream ではありません。
    field_values: {}
    related_node_ids:
      - OutputStream
    related_relation_ids: []
    expected_result:
      zh: 显示列表保持派生视图身份；stdout 与 stderr 仍应分别由两个 OutputStream 表示。
      en: The display list remains a derived view; stdout and stderr must still be represented by separate OutputStreams.
      ja: 表示 list は派生 view のままで、stdout と stderr は引き続き別々の OutputStream として表す必要があります。
    why_valid_or_invalid:
      zh: 跨通道展示顺序不是任一通道的字节顺序，不能替代流身份与内部排序。
      en: Cross-channel display order is not the byte order of either channel and cannot replace stream identity and internal ordering.
      ja: channel 横断の表示順はどちらの channel の byte 順序でもなく、stream identity と内部順序を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: OutputStream-example-instance-001
    kind: instance
    labels:
      zh: 输出流结构化实例
      en: Structured instance of output stream
      ja: 出力ストリームの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: stream-exec-214-fd1 以 execution_id=exec-214、channel=stdout、descriptor=1 标识，包含 offsets [0,8192) 的三个有序片段，completion_state=closed。
      en: stream-exec-214-fd1 is identified by execution_id exec-214, channel stdout, and descriptor 1; it contains three ordered segments covering offsets [0,8192) and has completion_state closed.
      ja: stream-exec-214-fd1 は execution_id=exec-214、channel=stdout、descriptor=1 で識別され、offset [0,8192) を覆う三つの ordered segment を含み、completion_state=closed です。
    field_values:
      stream_id: stream-exec-214-fd1
      execution_id: exec-214
      channel: stdout
      descriptor: 1
      completion_state: closed
    related_node_ids:
      - OutputStream
      - OutputSegment
    related_relation_ids:
      - OutputStream-contains_segment-OutputSegment
    expected_result:
      zh: 实例按一个执行通道及其有序成员验证为 OutputStream。
      en: The instance validates as an OutputStream through one execution channel and its ordered members.
      ja: 一つの execution channel と ordered member により OutputStream として検証されます。
    why_valid_or_invalid:
      zh: 执行、通道与描述符共同确定集合身份，成员范围连续且完成状态明确。
      en: Execution, channel, and descriptor jointly determine collection identity; member ranges are ordered and completion state is explicit.
      ja: execution・channel・descriptor が集合 identity を共同で決め、member range が順序化され completion state も明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against POSIX stdout/stderr/exit status and shell redirection semantics.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-output-stream-001
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered sequence of bytes and distinguishes the standard output and standard error streams. OutputStream retains one execution-channel identity, its internal ordering, and a completion boundary; owner info-container-command, semantic kind collection, and composition-root status are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-output-stream-002
    source: eng-std-posix-shell-2024
    supports: POSIX distinguishes standard output and standard error as separate streams. stream_id is Moonweave's stable identity for retaining that channel separation across captured chunks.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-output-stream-003
    source: eng-std-posix-shell-2024
    supports: POSIX standard streams belong to a process environment. producer_ref preserves the process or execution scope needed to disambiguate identical channel names from different executions.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Streams
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-output-stream-004
    source: eng-std-posix-shell-2024
    supports: POSIX normatively distinguishes the standard output and standard error streams. channel records that stream role without treating a chunk as the stream itself.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error and Standard Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-output-stream-005
    source: eng-std-posix-shell-2024
    supports: POSIX defines end-of-file and stream closure behavior. lifecycle_state is Moonweave's explicit record of whether captured stream membership is final or incomplete.
    locator: POSIX.1-2024 Base Definitions > End-of-File and Stream
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-output-stream-006
    source: eng-std-posix-shell-2024
    supports: POSIX specifies separate ordered byte streams for standard output and standard error; Moonweave therefore preserves order per channel and rejects an invented cross-channel order.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-output-stream-007
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered sequence of bytes and defines standard output and standard error as distinct output streams. The example preserves one execution-local channel identity and its internal order rather than merging channels by wall-clock time.
    locator: POSIX.1-2024 Base Definitions §3.353–§3.357 > Standard Error, Standard Output, Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
