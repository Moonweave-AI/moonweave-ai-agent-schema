schema: moonweave.ai/ontology-node/v1
id: StandardError
kind: concept
status: review
labels:
  zh: 标准错误流
  en: standard error stream
  ja: 標準エラーストリーム
semantics:
  short_definition:
    zh: 标识标准错误通道并有序收集其片段的输出流。
    en: An output stream identifying the standard-error channel and ordering its segments.
    ja: 標準エラー channel を識別し、その segment を順序づける出力ストリーム。
  definition:
    zh: 标准错误流是一种 OutputStream，表示执行环境的 stderr 通道（POSIX 中初始对应文件描述符 2），有序包含从该通道捕获的 StandardErrorChunk。它通常承载诊断信息，但通道归属不判定命令是否失败：成功程序可以写入警告，失败程序也可能没有 stderr。
    en: "StandardError is an OutputStream for the execution environment's stderr channel—initially file descriptor 2 in POSIX—and orders StandardErrorChunks captured from that channel. It commonly carries diagnostics, but channel membership does not decide command failure: a successful program may emit warnings and a failed one may emit no stderr."
    ja: StandardError は実行環境の stderr channel（POSIX では初期 file descriptor 2）を表し、そこから捕捉した StandardErrorChunk を順序づける OutputStream です。通常は診断を運びますが、channel 所属はコマンド失敗を決めません。成功プログラムも warning を出せ、失敗プログラムに stderr がない場合もあります。
  why_needed:
    zh: 需要保留 stderr 与 stdout 的通道身份和各自顺序，才能正确展示诊断、执行重定向、应用披露策略并避免用“是否报错”猜测来源。
    en: It preserves stderr identity and order separately from stdout for diagnostics, redirection, disclosure policy, and replay without guessing channel origin from whether text looks like an error.
    ja: 診断、redirection、開示方針、再生のため stdout と別に stderr identity と順序を保持し、text が error らしいかで出典 channel を推測しないために必要です。
  includes:
    - zh: 包含某次执行的 stderr 通道集合，即使其为空或被重定向；其每个可见成员必须能追到该通道及流内顺序。
      en: Includes the stderr-channel collection for an execution even when empty or redirected; every visible member remains traceable to that channel and its in-stream order.
      ja: 空または redirect 済みでも、一回の実行の stderr-channel collection を含みます。各可視 member はその channel と stream 内順序へ追跡可能でなければなりません。
  excludes:
    - zh: 不包含 StandardOutput、单个 StandardErrorChunk、错误对象、异常事件或失败结果；写在 stdout 上的错误文字仍属于 StandardOutput。
      en: Excludes StandardOutput, an individual StandardErrorChunk, error objects, exception events, and failure results; error-looking text written on stdout still belongs to StandardOutput.
      ja: StandardOutput、単独 StandardErrorChunk、error object、exception event、failure result を含みません。stdout に書かれた error らしい text は StandardOutput に属します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StandardError-example-positive-001
    kind: positive
    labels:
      zh: 标准错误流正例
      en: Positive example of standard error stream
      ja: 標準エラーストリームの正例
    scenario_id: null
    descriptions:
      zh: exec-214 把“deprecated option”写入文件描述符 2，并最终以 code 0 退出。采集器将 fd 2 的完整有序字节序列保存为 StandardError；警告内容与零退出码可以同时存在。
      en: exec-214 writes “deprecated option” to file descriptor 2 and ultimately exits with code 0. The collector preserves fd 2's ordered byte sequence as StandardError; warning content and a zero exit code coexist without contradiction.
      ja: exec-214 は “deprecated option” を file descriptor 2 へ書き、最終的に code 0 で終了します。collector は fd 2 の ordered byte sequence を StandardError として保持し、warning と zero exit code は両立します。
    field_values:
      stream_id: stream-exec-214-fd2
      producer_ref: exec-214
      channel: stderr
      lifecycle_state: complete
    related_node_ids:
      - StandardError
      - StandardErrorChunk
    related_relation_ids:
      - StandardErrorChunk-part_of-StandardError
    expected_result:
      zh: fd 2 通道被识别为 StandardError，且其 StandardErrorChunk 保持原始流内顺序。
      en: The fd 2 channel is classified as StandardError and its StandardErrorChunks retain their original in-stream order.
      ja: fd 2 channel は StandardError と判定され、その StandardErrorChunk は元の stream 内順序を保持します。
    why_valid_or_invalid:
      zh: 通道身份由执行的 fd 2 决定，而不是由文本是否像错误或退出码是否非零决定。
      en: Channel identity is determined by the execution's fd 2, not by whether the text looks erroneous or the exit code is nonzero.
      ja: channel identity は execution の fd 2 で決まり、text が error らしいか、exit code が非 0 かでは決まりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-standard-error-002
  - id: StandardError-example-boundary-001
    kind: boundary
    labels:
      zh: 标准错误流边界例
      en: Boundary case for standard error stream
      ja: 標準エラーストリームの境界例
    scenario_id: null
    descriptions:
      zh: "程序把字符串“ERROR: invalid row”写入文件描述符 1，fd 2 为空。虽然文本看起来是诊断消息，该字节仍属于 StandardOutput，而不是 StandardError。"
      en: "A program writes “ERROR: invalid row” to file descriptor 1 while fd 2 is empty. Although the text looks diagnostic, those bytes belong to StandardOutput, not StandardError."
      ja: "program は “ERROR: invalid row” を file descriptor 1 へ書き、fd 2 は空です。text が diagnostic に見えても、その byte は StandardOutput に属し、StandardError ではありません。"
    field_values: {}
    related_node_ids:
      - StandardError
      - StandardOutput
    related_relation_ids: []
    expected_result:
      zh: 该输出保持 StandardOutput 类型；分类器不得依据词汇“ERROR”改写通道。
      en: The output remains StandardOutput; a classifier must not rewrite its channel based on the word “ERROR”.
      ja: この出力は StandardOutput のままで、classifier は “ERROR” という語だけで channel を書き換えてはなりません。
    why_valid_or_invalid:
      zh: stdout/stderr 是通道事实，不是内容主题或严重度标签；fd 1 明确排除了 StandardError 身份。
      en: stdout and stderr are channel facts, not content topics or severity labels; fd 1 rules out StandardError identity.
      ja: stdout/stderr は channel fact であり、content topic や severity label ではありません。fd 1 は StandardError identity を排除します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: StandardError-example-instance-001
    kind: instance
    labels:
      zh: 标准错误流结构化实例
      en: Structured instance of standard error stream
      ja: 標準エラーストリームの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: stream-exec-214-fd2 以 execution_id=exec-214、descriptor=2、channel=stderr 标识，包含两个按 offset 排序的 StandardErrorChunk，并在执行结束时关闭。
      en: stream-exec-214-fd2 is identified by execution_id exec-214, descriptor 2, and channel stderr; it contains two offset-ordered StandardErrorChunks and closes when the execution ends.
      ja: stream-exec-214-fd2 は execution_id=exec-214、descriptor=2、channel=stderr で識別され、offset 順の二つの StandardErrorChunk を含み、実行終了時に閉じます。
    field_values:
      stream_id: stream-exec-214-fd2
      execution_id: exec-214
      descriptor: 2
      channel: stderr
      completion_state: closed
    related_node_ids:
      - StandardError
      - OutputStream
    related_relation_ids:
      - StandardError-is_a-OutputStream
    expected_result:
      zh: 实例被验证为 OutputStream 的 StandardError 子类实例。
      en: The instance validates as a StandardError specialization of OutputStream.
      ja: instance は OutputStream の StandardError specialization として検証されます。
    why_valid_or_invalid:
      zh: fd 2、执行标识和有序成员共同确定标准错误流身份，文本严重度不参与分类。
      en: fd 2, execution identity, and ordered membership establish standard-error identity; textual severity does not participate in classification.
      ja: fd 2、execution identity、ordered membership が standard-error identity を確立し、text severity は分類に使われません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StandardOutput
    shared_parent_concept_id: OutputStream
    differentia:
      zh: 端点特定对照：父节点 OutputStream：StandardError（semantic kind=collection，骨架 StandardError-is_a-OutputStream）；StandardOutput（semantic kind=collection，骨架 StandardOutput-is_a-OutputStream）。双端条件：StandardError 条件：“标准错误流是以如下事实为区分特征的输出流：它记录命令、进程、沙箱或工具执行产生的诊断输出流，这些诊断输出可作为可观察证据进入上下文”；StandardOutput 条件：“标准输出流属于输出流，区别于其他同类对象的条件是：标准输出捕获命令、进程、沙箱或工具执行发出的它，作为可暂存进上下文的可观察输出”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent OutputStream: StandardError (semantic kind=collection, backbone StandardError-is_a-OutputStream); StandardOutput (semantic kind=collection, backbone StandardOutput-is_a-OutputStream). Endpoint conditions: StandardError condition: “Standard error stream is an output stream; its differentiating condition is that it captures the stderr stream emitted by a command, process, sandbox, or tool execution as observable diagnostic output”; StandardOutput condition: “Standard output stream is an output stream whose defining condition is that it captures the stdout stream emitted by a command, process, sandbox, or tool execution as observable output available for staging into context”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 OutputStream：StandardError（semantic kind=collection、バックボーン StandardError-is_a-OutputStream）；StandardOutput（semantic kind=collection、バックボーン StandardOutput-is_a-OutputStream）。両端条件：StandardError の条件：「標準エラーストリームは出力ストリームの一種であり、次の条件で区別されます：それは、コマンド、プロセス、サンドボックス、ツール実行から生じる診断出力ストリームを記録し、それらを観測可能な証拠としてコンテキストへ入れられるようにします」；StandardOutput の条件：「標準出力ストリームは出力ストリームのうち、次の事実を定義条件とする対象です：それは、コマンド、プロセス、サンドボックス、ツール実行から発せられる出力ストリームを、コンテキストへステージング可能な観測出力として捕捉します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-standard-error-003
