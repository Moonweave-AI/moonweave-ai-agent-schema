source_claims:
  - id: claim-standard-error-001
    source: eng-std-posix-shell-2024
    supports: POSIX defines Standard Error as the output stream associated with file descriptor 2 and describes diagnostics as its usual use, not a mandatory content type. StandardError specializes OutputStream by channel identity; owner info-container-command, semantic kind collection, and backbone StandardError-is_a-OutputStream are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.353 > Standard Error
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-standard-error-002
    source: eng-std-posix-shell-2024
    supports: POSIX identifies standard error as the output stream associated with file descriptor 2 and notes its customary diagnostic use. The example correctly classifies by fd 2 while avoiding the false inference that every stderr byte denotes execution failure.
    locator: POSIX.1-2024 Base Definitions §3.353 > Standard Error
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-standard-error-003
    source: eng-std-posix-shell-2024
    supports: POSIX defines standard error as file descriptor 2 and standard output as file descriptor 1. The channel, not message severity or content format, supplies the differentia between these OutputStream specializations.
    locator: POSIX.1-2024 Base Definitions §3.353 and §3.355 > Standard Error; Standard Output
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-standard-error-004
    source: eng-std-posix-shell-2024
    supports: "StandardError-is_a-OutputStream: The accepted record is Stream stderr-5 records fd=2, channel=stderr, execution_id=exec-5, and contains diagnostic segments in write order. POSIX assigns standard error to file descriptor 2 and standard output to file descriptor 1, preserving separate channel semantics under redirection. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-standard-error-005
    source: eng-std-posix-shell-2024
    supports: "StandardError-is_a-OutputStream: The rejected record is outside the relation because Standard error is defined by the output channel, not the topic of its text. POSIX assigns standard error to file descriptor 2 and standard output to file descriptor 1, preserving separate channel semantics under redirection. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-standard-error-006
    source: eng-std-posix-shell-2024
    supports: "StandardError-is_a-OutputStream: The official material supports the operational distinction used by this edge. POSIX assigns standard error to file descriptor 2 and standard output to file descriptor 1, preserving separate channel semantics under redirection. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
