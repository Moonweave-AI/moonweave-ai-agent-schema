schema: moonweave.ai/ontology-node/v1
id: StandardError
kind: concept
labels:
  zh: 标准错误流
  en: standard error stream
  ja: 標準エラーストリーム
semantics:
  short_definition:
    zh: POSIX stderr 通道的 OutputStream 特化。
    en: OutputStream specialization for the POSIX stderr channel.
    ja: POSIX stderr channel OutputStream 特化。
  definition:
    zh: StandardError 承载 stderr sequence 0..n 的 OutputChunk；构建警告、lint 消息、容器 deprecated API 警告典型映射到此通道。
    en: StandardError carries OutputChunks stderr sequence 0..n; build warnings, lint messages, and container deprecated API warnings typically map here.
    ja: stderr channel chunk container。
  why_needed:
    zh: stderr 分通道保留使 agent 可单独引用错误流而不污染 stdout 摘要。
    en: Separate stderr preserves agent ability to cite error stream without polluting stdout summaries.
    ja: stderr citation separation。
  includes:
    - zh: stderr OutputChunk 成员、observation_id。
      en: stderr OutputChunk members, observation_id.
      ja: stderr chunks/observation。
  excludes:
    - zh: stdout 内容、ExitStatusObservation（分开记录）。
      en: stdout content and ExitStatusObservation (recorded separately).
      ja: stdout/exit status。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 'cmdobs-build-17 stderr seq 0 "1 deprecation warning\n"；container stderr "warning: deprecated API"。'
    en: 'cmdobs-build-17 stderr seq 0 "1 deprecation warning\n"; container stderr "warning: deprecated API".'
    ja: stderr warning chunks。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
