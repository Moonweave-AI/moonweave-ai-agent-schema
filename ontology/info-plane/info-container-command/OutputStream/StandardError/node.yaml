parent_relation:
  id: StandardError-is_a-OutputStream
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种输出流
    en: is an output stream
    ja: 出力ストリームの一種
  definitions:
    zh: 标准错误是输出流的专门类型，对应命令执行的文件描述符 2，并保持与标准输出不同的通道身份，即使二者被重定向到同一文件。
    en: Standard error is the output-stream specialization for file descriptor 2 of a command execution and retains an identity distinct from standard output even when both are redirected to one file.
    ja: 標準エラーはコマンド実行のファイル記述子 2 に対応する出力ストリームで、標準出力と同じファイルへリダイレクトされても別のチャネル ID を保ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StandardError-is_a-OutputStream-example-positive-001
      labels:
        zh: 是一种输出流正例
        en: "Accepted case: is an output stream"
        ja: 出力ストリームの一種の受理例
      descriptions:
        zh: stream stderr-5 标记 fd=2、channel=stderr、execution_id=exec-5，并按写入顺序包含诊断输出段。
        en: Stream stderr-5 records fd=2, channel=stderr, execution_id=exec-5, and contains diagnostic segments in write order.
        ja: ストリーム stderr-5 は fd=2、channel=stderr、execution_id=exec-5 を記録し、診断セグメントを出力順に含みます。
      field_values: {}
      related_node_ids:
        - StandardError
        - OutputStream
      related_relation_ids:
        - StandardError-is_a-OutputStream
      source_claims:
