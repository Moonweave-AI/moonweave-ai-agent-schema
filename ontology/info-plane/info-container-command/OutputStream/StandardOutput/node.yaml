schema: moonweave.ai/ontology-node/v1
id: StandardOutput
kind: concept
labels:
  zh: 标准输出流
  en: standard output stream
  ja: 標準出力ストリーム
semantics:
  short_definition:
    zh: POSIX stdout 通道的 OutputStream 特化。
    en: OutputStream specialization for the POSIX stdout channel.
    ja: POSIX stdout channel OutputStream 特化。
  definition:
    zh: StandardOutput 承载 stdout sequence 0..n 的 OutputChunk；MCP Tool Result text 默认映射为 stdout sequence 0。
    en: StandardOutput carries OutputChunks with stdout sequence 0..n; MCP Tool Result text defaults to stdout sequence 0.
    ja: stdout channel chunk container。
  why_needed:
    zh: 显式 stdout 通道使 stderr 警告与 stdout 结果可分通道引用。
    en: Explicit stdout channel enables separate citation of stderr warnings and stdout results.
    ja: stdout channel separation。
  includes:
    - zh: stdout OutputSegment/OutputChunk 成员、observation_id。
      en: stdout OutputSegment/OutputChunk members, observation_id.
      ja: stdout chunks/observation。
  excludes:
    - zh: stderr 内容、exit code。
      en: stderr content and exit code.
      ja: stderr/exit code。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: compile\ntests passed\n 两个 StandardOutputChunk seq 0,1。
    en: compile\ntests passed\n as two StandardOutputChunk seq 0,1.
    ja: stdout chunk sequences。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
