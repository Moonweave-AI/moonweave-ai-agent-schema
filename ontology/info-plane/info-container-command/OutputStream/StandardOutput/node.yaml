sibling_differentiation:
  - sibling_concept_id: StandardError
    shared_parent_concept_id: OutputStream
    differentia:
      zh: 已审查兄弟区分：父节点 OutputStream：StandardOutput（semantic kind=collection，骨架 StandardOutput-is_a-OutputStream）；StandardError（semantic kind=collection，骨架 StandardError-is_a-OutputStream）。双端条件：StandardOutput 条件：“标准输出流属于输出流，区别于其他同类对象的条件是：标准输出捕获命令、进程、沙箱或工具执行发出的它，作为可暂存进上下文的可观察输出”；StandardError 条件：“标准错误流是以如下事实为区分特征的输出流：它记录命令、进程、沙箱或工具执行产生的诊断输出流，这些诊断输出可作为可观察证据进入上下文”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent OutputStream: StandardOutput (semantic kind=collection, backbone StandardOutput-is_a-OutputStream); StandardError (semantic kind=collection, backbone StandardError-is_a-OutputStream). Endpoint conditions: StandardOutput condition: “Standard output stream is an output stream whose defining condition is that it captures the stdout stream emitted by a command, process, sandbox, or tool execution as observable output available for staging into context”; StandardError condition: “Standard error stream is an output stream; its differentiating condition is that it captures the stderr stream emitted by a command, process, sandbox, or tool execution as observable diagnostic output”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 OutputStream：StandardOutput（semantic kind=collection、バックボーン StandardOutput-is_a-OutputStream）；StandardError（semantic kind=collection、バックボーン StandardError-is_a-OutputStream）。両端条件：StandardOutput の条件：「標準出力ストリームは出力ストリームのうち、次の事実を定義条件とする対象です：それは、コマンド、プロセス、サンドボックス、ツール実行から発せられる出力ストリームを、コンテキストへステージング可能な観測出力として捕捉します」；StandardError の条件：「標準エラーストリームは出力ストリームの一種であり、次の条件で区別されます：それは、コマンド、プロセス、サンドボックス、ツール実行から生じる診断出力ストリームを記録し、それらを観測可能な証拠としてコンテキストへ入れられるようにします」。一方の成立は他方を証明しません。
    source_claims:
      - claim-standard-output-003
