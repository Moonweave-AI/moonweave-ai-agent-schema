source_claims:
  - id: claim-standard-output-001
    source: eng-std-posix-shell-2024
    supports: POSIX defines Standard Output as the output stream associated with file descriptor 1 and says it is ordinarily used for primary data. StandardOutput specializes OutputStream by channel identity; owner info-container-command, semantic kind collection, and backbone StandardOutput-is_a-OutputStream are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.355 > Standard Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-002
    source: eng-std-posix-shell-2024
    supports: POSIX identifies standard output as the output stream associated with file descriptor 1 and describes it as the usual destination for primary data. The example classifies by fd 1 and keeps stderr separate, irrespective of payload format.
    locator: POSIX.1-2024 Base Definitions §3.355 > Standard Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-003
    source: eng-std-posix-shell-2024
    supports: POSIX defines standard output as file descriptor 1 and standard error as file descriptor 2. This makes channel membership, rather than payload meaning, the test that separates the two OutputStream children.
    locator: POSIX.1-2024 Base Definitions §3.353 and §3.355 > Standard Error; Standard Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-004
    source: eng-std-posix-shell-2024
    supports: "StandardOutput-is_a-OutputStream: The accepted record is Stream stdout-5 records fd=1, channel=stdout, execution_id=exec-5, and contains ordinary output segments in write order. POSIX assigns standard output to file descriptor 1 and specifies redirection without collapsing its originating channel identity into standard error. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-005
    source: eng-std-posix-shell-2024
    supports: "StandardOutput-is_a-OutputStream: The rejected record is outside the relation because A shared destination file does not change the standard-file-descriptor identity at write time. POSIX assigns standard output to file descriptor 1 and specifies redirection without collapsing its originating channel identity into standard error. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-006
    source: eng-std-posix-shell-2024
    supports: "StandardOutput-is_a-OutputStream: The official material supports the operational distinction used by this edge. POSIX assigns standard output to file descriptor 1 and specifies redirection without collapsing its originating channel identity into standard error. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted

