parent_relation:
  id: StandardOutput-is_a-OutputStream
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种输出流
    en: is an output stream
    ja: 出力ストリームの一種
  definitions:
    zh: 标准输出是输出流的专门类型，对应命令执行的文件描述符 1，并保持与标准错误不同的通道身份，即使发生重定向。
    en: Standard output is the output-stream specialization for file descriptor 1 of a command execution and retains an identity distinct from standard error under redirection.
    ja: 標準出力はコマンド実行のファイル記述子 1 に対応する出力ストリームで、リダイレクト時も標準エラーとは別のチャネル ID を保ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StandardOutput-is_a-OutputStream-example-positive-001
      labels:
        zh: 是一种输出流正例
        en: "Accepted case: is an output stream"
        ja: 出力ストリームの一種の受理例
      descriptions:
        zh: stream stdout-5 标记 fd=1、channel=stdout、execution_id=exec-5，并按写入顺序包含普通输出段。
        en: Stream stdout-5 records fd=1, channel=stdout, execution_id=exec-5, and contains ordinary output segments in write order.
        ja: ストリーム stdout-5 は fd=1、channel=stdout、execution_id=exec-5 を記録し、通常出力セグメントを順番に含みます。
      field_values: {}
      related_node_ids:
        - StandardOutput
        - OutputStream
      related_relation_ids:
        - StandardOutput-is_a-OutputStream
      source_claims:
        - claim-standard-output-004
    - id: StandardOutput-is_a-OutputStream-example-boundary-001
      labels:
        zh: 是一种输出流拒绝边界
        en: "Rejection boundary: is an output stream"
        ja: 出力ストリームの一種の拒否境界
      descriptions:
        zh: 执行把 fd=2 重定向到与 fd=1 相同的文件，但源通道仍记录为 stderr。
        en: An execution redirects fd=2 to the same file as fd=1, but the source channel remains recorded as stderr.
        ja: 実行が fd=2 を fd=1 と同じファイルへリダイレクトしても、元チャネルは stderr と記録されています。
      field_values: {}
      related_node_ids:
        - StandardOutput
        - OutputStream
      related_relation_ids:
        - StandardOutput-is_a-OutputStream
      source_claims:
        - claim-standard-output-005
  source_claims:
    - claim-standard-output-006
