schema: moonweave.ai/ontology-node/v1
id: StandardOutput
kind: concept
status: accepted
labels:
  zh: 标准输出流
  en: standard output stream
  ja: 標準出力ストリーム
semantics:
  short_definition:
    zh: 标识标准输出通道并有序收集其片段的输出流。
    en: An output stream identifying the standard-output channel and ordering its segments.
    ja: 標準出力 channel を識別し、その segment を順序づける出力ストリーム。
  definition:
    zh: 标准输出流是一种 OutputStream，表示执行环境的 stdout 通道（POSIX 中初始对应文件描述符 1），有序包含从该通道捕获的 StandardOutputChunk。它通常承载程序的主要数据输出，但通道语义由写入位置决定，而不是由文本看起来像结果、进度或错误来决定。
    en: StandardOutput is an OutputStream for the execution environment's stdout channel—initially file descriptor 1 in POSIX—and orders StandardOutputChunks captured from that channel. It usually carries primary program data, but channel semantics are determined by where bytes were written, not by whether text resembles a result, progress message, or error.
    ja: StandardOutput は実行環境の stdout channel（POSIX では初期 file descriptor 1）を表し、そこから捕捉した StandardOutputChunk を順序づける OutputStream です。通常は主データ出力を運びますが、channel semantics は byte の書込先で決まり、text が結果・進捗・error に見えるかでは決まりません。
  why_needed:
    zh: 需要保留 stdout 独立身份与顺序，才能复现管道和重定向、选择进入上下文的主输出，并避免与 stderr 的诊断字节发生无序混合。
    en: It preserves stdout identity and order for pipelines and redirection, selection of primary output for context, and prevention of unordered mixing with stderr diagnostics.
    ja: pipeline・redirection の再現、context へ入れる主出力の選択、stderr 診断との無順序混合防止のため、stdout identity と順序を保持する必要があります。
  includes:
    - zh: 包含某次执行的 stdout 通道集合，即使其为空、接入管道或被重定向；每个可见成员必须保留该通道与流内顺序。
      en: Includes the stdout-channel collection for an execution even when empty, piped, or redirected; every visible member retains that channel and its in-stream order.
      ja: 空、pipe 接続、redirect 済みでも、一回の実行の stdout-channel collection を含みます。各可視 member はその channel と stream 内順序を保持します。
  excludes:
    - zh: 不包含 StandardError、单个 StandardOutputChunk、ExecutionResult 或用户最终答案；写在 stderr 上的普通数据仍属于 StandardError。
      en: Excludes StandardError, an individual StandardOutputChunk, ExecutionResult, and a user's final answer; ordinary data written on stderr still belongs to StandardError.
      ja: StandardError、単独 StandardOutputChunk、ExecutionResult、利用者への最終回答を含みません。stderr に書かれた通常データは StandardError に属します。
  semantic_kind: collection
  aliases: []
