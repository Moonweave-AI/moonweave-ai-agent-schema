    zh: 标准输出是输出流的专门类型，对应命令执行的文件描述符 1，并保持与标准错误不同的通道身份，即使发生重定向。 拒绝边界是：共同目标文件不会改变写入发生时的标准文件描述符身份。
    en: "Standard output is the output-stream specialization for file descriptor 1 of a command execution and retains an identity distinct from standard error under redirection. Its rejection boundary is: A shared destination file does not change the standard-file-descriptor identity at write time."
