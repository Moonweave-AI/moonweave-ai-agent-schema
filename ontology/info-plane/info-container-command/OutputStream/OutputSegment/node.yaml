schema: moonweave.ai/ontology-node/v1
id: OutputSegment
kind: concept
status: accepted
labels:
  zh: 输出片段
  en: output segment
  ja: 出力区間
semantics:
  short_definition:
    zh: 以所属输出流和连续偏移范围寻址的一段输出信息。
    en: Output information addressable by an output-stream identity and a contiguous offset range.
    ja: 所属出力ストリームと連続 offset 範囲で指定できる出力情報。
  definition:
    zh: 输出片段是一种 OutputInformation，表示同一 OutputStream 中按字节、字符或记录偏移可寻址的连续范围，并保留流身份、范围、编码、来源和可见性元数据。它可以是原始采集分块，也可以是为引用、脱敏或披露而组合出的逻辑范围；它不是流集合本身。
    en: An OutputSegment is OutputInformation representing a contiguous range addressable by byte, character, or record offsets within one OutputStream, retaining stream identity, range, encoding, provenance, and visibility metadata. It may be a raw capture chunk or a logical range assembled for citation, redaction, or disclosure; it is not the stream collection itself.
    ja: OutputSegment は、一つの OutputStream 内で byte、文字、record offset により指定できる連続範囲を表し、stream identity、範囲、encoding、来歴、可視性 metadata を保持する OutputInformation です。raw capture chunk にも引用・秘匿・開示用に組み立てた論理範囲にもなれますが、stream collection 自体ではありません。
  why_needed:
    zh: 需要稳定的范围对象来精确附着来源、敏感片段、引用和披露决定；若只保留整条流或自由文本，就无法说明究竟哪一段被截断、隐藏或送入上下文。
    en: A stable range object is needed for provenance, sensitive spans, citations, and disclosure decisions; a whole stream or free text cannot identify exactly which portion was truncated, hidden, or admitted to context.
    ja: 来歴、機微範囲、引用、開示判断を正確に付与する安定 range object が必要です。stream 全体や自由 text だけでは、どの部分が切詰め・秘匿・context 投入されたかを示せません。
  includes:
    - zh: 包含能够唯一确定所属流、连续起止范围和编码的原始或派生片段；派生片段应保留与原范围的来源联系。
      en: Includes raw or derived segments that uniquely identify one stream, a contiguous start/end range, and an encoding; derived segments retain provenance to the source range.
      ja: 一つの stream、連続した開始・終了範囲、encoding を一意に示す raw または派生 segment を含み、派生 segment は元範囲への来歴を保持します。
  excludes:
    - zh: 不包含 OutputStream 集合、OutputCitation、SensitiveSpan、ContextSummary、整个 ExecutionResult，或没有所属流与连续范围的任意文本摘录。
      en: Excludes the OutputStream collection, OutputCitation, SensitiveSpan, ContextSummary, an entire ExecutionResult, and arbitrary text excerpts without a stream identity and contiguous range.
      ja: OutputStream collection、OutputCitation、SensitiveSpan、ContextSummary、ExecutionResult 全体、所属 stream と連続範囲のない任意 text 抜粋を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
