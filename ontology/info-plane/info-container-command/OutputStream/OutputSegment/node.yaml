    source_claims:
      - claim-output-segment-014
    distinct_fact_rationale:
      zh: 输出段是输出信息的有界、可定位特化，承载某个输出通道中连续的字节或字符范围，而不是整个通道集合。 拒绝边界是：集合的身份由成员和通道决定，段的身份由一个有界范围决定。
      en: "An output segment is a bounded, addressable specialization of output information carrying a contiguous byte or character range from one output channel rather than the whole channel collection. Its rejection boundary is: A collection is identified by its channel and members, whereas a segment is identified by one bounded range."
      ja: 出力セグメントは、出力チャネル内の連続したバイトまたは文字範囲を持つ、境界付きで位置指定可能な出力情報です。チャネル集合全体ではありません。 拒否境界は次のとおりです。集合はチャネルとメンバーで識別され、セグメントは一つの境界範囲で識別されます。
