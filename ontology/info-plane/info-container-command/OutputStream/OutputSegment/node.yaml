        related_relation_ids:
          - output_segment_has_sensitive_span
        source_claims:
          - claim-output-segment-008
      - id: output_segment_has_sensitive_span-example-boundary-001
        labels:
          zh: 标注敏感区间拒绝边界
          en: "Rejection boundary: marks sensitive span"
          ja: 機密区間を示すの拒否境界
        scenario_id: null
        descriptions:
          zh: 工具输出被 guardrail 整体阻断，记录只含 blocked=true，没有任何区间偏移。
          en: A guardrail blocks the entire tool output and records only blocked=true, with no span offsets.
          ja: guardrail がツール出力全体を遮断し、blocked=true だけを記録して区間オフセットがありません。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - SensitiveSpan
        related_relation_ids:
          - output_segment_has_sensitive_span
        source_claims:
          - claim-output-segment-009
          - claim-output-segment-010
    source_claims:
      - claim-output-segment-011
    distinct_fact_rationale:
      zh: 把输出段关联到其中经过定位的敏感区间，区间必须给出相对该段的字符或字节边界以及敏感类别；整段阻断不自动产生区间。 拒绝边界是：输出可能敏感与已经定位出敏感子区间是两个不同事实。
      en: "Associates an output segment with a located sensitive span that gives character or byte offsets relative to that segment and a sensitivity category; blocking the whole output does not create a span. Its rejection boundary is: Potentially sensitive output and a located sensitive subrange are different facts."
      ja: 出力セグメントを、当該セグメント相対の文字またはバイト境界と機密分類を持つ機密区間へ関連付けます。出力全体の遮断だけでは区間になりません。 拒否境界は次のとおりです。機密の可能性がある出力と、位置特定済みの機密部分範囲は別の事実です。
    layout_role: cross-link
    review_status: accepted
    target: concept:SensitiveSpan
