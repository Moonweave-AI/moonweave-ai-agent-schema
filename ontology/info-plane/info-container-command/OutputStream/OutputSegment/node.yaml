schema: moonweave.ai/ontology-node/v1
id: OutputSegment
kind: concept
labels:
  zh: 输出片段
  en: output segment
  ja: 出力区間
semantics:
  short_definition:
    zh: OutputStream 内一段逻辑连续的输出片段分组。
    en: Grouping of logically contiguous output fragments within an OutputStream.
    ja: OutputStream 内 logically contiguous output fragment 分组。
  definition:
    zh: OutputSegment 把同一 flush 或同一 log burst 的 OutputChunk 分组；便于截断披露与分段引用。
    en: OutputSegment groups OutputChunks from the same flush or log burst; supports truncation disclosure and segmented citation.
    ja: flush/burst segment grouping。
  why_needed:
    zh: 分段使大型命令输出可按 segment 截断披露而不丢失通道顺序。
    en: Segments let large command outputs truncate-disclose per segment without losing channel order.
    ja: segment-level disclosure。
  includes:
    - zh: segment_id、segment_sequence、member OutputChunk refs。
      en: segment_id, segment_sequence, member OutputChunk refs.
      ja: segment_id/sequence/chunk refs。
  excludes:
    - zh: 跨通道混合、CommandOutputObservation 身份。
      en: Cross-channel mixing and CommandOutputObservation identity.
      ja: cross-channel/observation identity。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 大型 npm test 日志按 64KB segment 切分 OutputSegment seg-0..seg-12 仍保持 stdout sequence 全局连续。
    en: Large npm test log split into 64KB OutputSegments seg-0..seg-12 while stdout sequence remains globally contiguous.
    ja: segment split with global sequence。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
examples:
  - id: OutputSegment-example-large-log
    labels:
      zh: 大日志分段
      en: Large log segment
      ja: large log segment
    descriptions:
      zh: npm test 输出 seg-3 含 chunk seq 48..51。
      en: npm test output seg-3 contains chunks seq 48..51.
      ja: large log segment。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: segment
    field_values: {}
    related_node_ids:
      - OutputSegment
      - OutputChunk
    related_relation_ids: []
    source_claims:
      - claim-oseg-design
  - id: OutputSegment-example-docker-burst
    labels:
      zh: Docker 日志 burst
      en: Docker log burst
      ja: Docker log burst
    descriptions:
      zh: container 同一 burst 两条 log_lines 同一 OutputSegment。
      en: container two log_lines in same burst share one OutputSegment.
      ja: docker burst segment。
    example_source:
      product: Docker
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      version: log burst
    field_values: {}
    related_node_ids:
      - OutputSegment
    related_relation_ids: []
    source_claims:
      - claim-oseg-docker
  - id: OutputSegment-example-single-channel
    labels:
      zh: 单通道
      en: Single channel
      ja: single channel
    descriptions:
      zh: OutputSegment 不得混合 stdout 与 stderr chunks。
      en: OutputSegment must not mix stdout and stderr chunks.
      ja: no cross-channel segment。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - OutputSegment
    related_relation_ids: []
    source_claims:
      - claim-oseg-design
parent_relation:
  id: OutputStream-contains_segment-OutputSegment
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含输出段
    en: contains output segment
    ja: 出力セグメントを含む
  definitions:
    zh: 把一个输出流集合关联到属于该执行与通道的有序 OutputSegment；成员资格必须由 stream_id、通道和顺序范围共同确认。
    en: Associates an output-stream collection with an ordered OutputSegment belonging to the same execution and channel; membership requires matching stream identity, channel, and ordering range.
    ja: 出力ストリーム集合を、同じ実行とチャネルに属する順序付き OutputSegment へ関連付けます。stream_id、チャネル、順序範囲の一致が必要です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：contains segment
      en: segment of
      ja: 逆方向：contains segment
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: OutputStream-contains_segment-OutputSegment-example-positive-001
      labels:
        zh: 包含输出段正例
        en: "Accepted case: contains output segment"
        ja: 出力セグメントを含むの受理例
      descriptions:
        zh: stdout-stream-4 包含 segment-4-7；该段记录 stream_id=stdout-stream-4、channel=stdout、sequence=7。
        en: stdout-stream-4 contains segment-4-7, which records stream_id=stdout-stream-4, channel=stdout, and sequence=7.
        ja: stdout-stream-4 は segment-4-7 を含み、その stream_id=stdout-stream-4、channel=stdout、sequence=7 が記録されています。
      field_values: {}
      related_node_ids:
        - OutputStream
        - OutputSegment
      related_relation_ids:
        - OutputStream-contains_segment-OutputSegment
      source_claims:
        - claim-output-segment-005
    - id: OutputStream-contains_segment-OutputSegment-example-boundary-001
      labels:
        zh: 包含输出段拒绝边界
        en: "Rejection boundary: contains output segment"
        ja: 出力セグメントを含むの拒否境界
      descriptions:
        zh: stderr-stream-4 的 segment-err-1 与 stdout-stream-4 时间相邻，但 channel=stderr 且 stream_id 不同。
        en: segment-err-1 from stderr-stream-4 is adjacent in time to stdout-stream-4 but has channel=stderr and a different stream identifier.
        ja: stderr-stream-4 の segment-err-1 は stdout-stream-4 と時間的に隣接しますが、channel=stderr で stream_id も異なります。
      field_values: {}
      related_node_ids:
        - OutputStream
        - OutputSegment
      related_relation_ids:
        - OutputStream-contains_segment-OutputSegment
      source_claims:
        - claim-output-segment-006
  source_claims:
    - claim-output-segment-007
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: output_segment_has_sensitive_span
    predicate: output_segment_has_sensitive_span
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 标注敏感区间
      en: marks sensitive span
      ja: 機密区間を示す
    definitions:
      zh: 把输出段关联到其中经过定位的敏感区间，区间必须给出相对该段的字符或字节边界以及敏感类别；整段阻断不自动产生区间。
      en: Associates an output segment with a located sensitive span that gives character or byte offsets relative to that segment and a sensitivity category; blocking the whole output does not create a span.
      ja: 出力セグメントを、当該セグメント相対の文字またはバイト境界と機密分類を持つ機密区間へ関連付けます。出力全体の遮断だけでは区間になりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_output_segment_has_sensitive_span
      labels:
        zh: 反向：output segment has sensitive span
        en: is target of output segment has sensitive span
        ja: 逆方向：output segment has sensitive span
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: OutputSegment 仍由 info-plane 拥有，SensitiveSpan 仍由 safety-plane 拥有；该 information 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: OutputSegment remains owned by info-plane and SensitiveSpan by safety-plane; this information fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: OutputSegment は info-plane、SensitiveSpan は safety-plane に引き続き所有されます。この information 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 OutputSegment → SensitiveSpan 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical OutputSegment → SensitiveSpan assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは OutputSegment → SensitiveSpan の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
      - id: output_segment_has_sensitive_span-example-positive-001
        labels:
          zh: 标注敏感区间正例
          en: "Accepted case: marks sensitive span"
          ja: 機密区間を示すの受理例
        descriptions:
          zh: segment-8 的字符 114..145 被标为 credential，SensitiveSpan span-8 同时保存 start=114、end=145 和 detector_id。
          en: Characters 114..145 of segment-8 are marked credential; SensitiveSpan span-8 records start=114, end=145, and detector_id.
          ja: segment-8 の文字 114..145 が credential と判定され、SensitiveSpan span-8 は start=114、end=145、detector_id を記録します。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - SensitiveSpan
        related_relation_ids:
          - output_segment_has_sensitive_span
        source_claims:
          - claim-output-segment-008
      - id: output_segment_has_sensitive_span-example-boundary-001
        labels:
          zh: 标注敏感区间拒绝边界
          en: "Rejection boundary: marks sensitive span"
          ja: 機密区間を示すの拒否境界
        descriptions:
          zh: 工具输出被 guardrail 整体阻断，记录只含 blocked=true，没有任何区间偏移。
          en: A guardrail blocks the entire tool output and records only blocked=true, with no span offsets.
          ja: guardrail がツール出力全体を遮断し、blocked=true だけを記録して区間オフセットがありません。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - SensitiveSpan
        related_relation_ids:
          - output_segment_has_sensitive_span
        source_claims:
          - claim-output-segment-009
          - claim-output-segment-010
    source_claims:
      - claim-output-segment-011
    layout_role: cross-link
    target: concept:SensitiveSpan
  - id: OutputSegment-is_a-OutputInformation
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种输出信息
      en: is output information
      ja: 出力情報の一種
    definitions:
      zh: 输出段是输出信息的有界、可定位特化，承载某个输出通道中连续的字节或字符范围，而不是整个通道集合。
      en: An output segment is a bounded, addressable specialization of output information carrying a contiguous byte or character range from one output channel rather than the whole channel collection.
      ja: 出力セグメントは、出力チャネル内の連続したバイトまたは文字範囲を持つ、境界付きで位置指定可能な出力情報です。チャネル集合全体ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：是一种
        en: has subtype
        ja: 逆方向：の一種である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: OutputSegment-is_a-OutputInformation-example-positive-001
        labels:
          zh: 是一种输出信息正例
          en: "Accepted case: is output information"
          ja: 出力情報の一種の受理例
        descriptions:
          zh: segment-14 记录 stream_id=stdout-9、char_range=200..399、encoding=utf-8，并可独立引用。
          en: segment-14 records stream_id=stdout-9, char_range=200..399, encoding=utf-8, and can be referenced independently.
          ja: segment-14 は stream_id=stdout-9、char_range=200..399、encoding=utf-8 を記録し、独立して参照できます。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - OutputInformation
        related_relation_ids:
          - OutputSegment-is_a-OutputInformation
        source_claims:
          - claim-output-segment-012
      - id: OutputSegment-is_a-OutputInformation-example-boundary-001
        labels:
          zh: 是一种输出信息拒绝边界
          en: "Rejection boundary: is output information"
          ja: 出力情報の一種の拒否境界
        descriptions:
          zh: stdout-9 是包含许多段的 OutputStream 集合，本身没有单一连续范围。
          en: stdout-9 is an OutputStream collection containing many segments and has no single contiguous range.
          ja: stdout-9 は複数セグメントを含む OutputStream 集合で、単一の連続範囲を持ちません。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - OutputInformation
        related_relation_ids:
          - OutputSegment-is_a-OutputInformation
        source_claims:
          - claim-output-segment-013
    source_claims:
      - claim-output-segment-014
    layout_role: secondary-backbone
    target: concept:OutputInformation
  - id: OutputSegment-partitioned_into-OutputChunk
    predicate: partitioned_into
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 切分为输出分块
      en: partitioned into output chunk
      ja: 出力チャンクへ分割
    definitions:
      zh: 记录一个输出段按确定的范围方案被切分出某个 OutputChunk；每个分块必须回指该父段并给出不歧义的序号或偏移。
      en: Records that an output segment was partitioned into a particular OutputChunk under a defined range scheme; the chunk must point back to that parent segment with an unambiguous sequence or offset.
      ja: 出力セグメントが定義済み範囲方式で特定の OutputChunk へ分割されたことを記録します。チャンクは親セグメントと明確な順序またはオフセットを示します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_partitioned_into
      labels:
        zh: 反向：partitioned into
        en: is target of partitioned into
        ja: 逆方向：partitioned into
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: OutputSegment-partitioned_into-OutputChunk-example-positive-001
        labels:
          zh: 切分为输出分块正例
          en: "Accepted case: partitioned into output chunk"
          ja: 出力チャンクへ分割の受理例
        descriptions:
          zh: segment-30 的 bytes 0..2047 按 1024 字节方案切分，chunk-30-1 标记 parent=segment-30、sequence=1、range=0..1023。
          en: segment-30 bytes 0..2047 use a 1024-byte partition scheme; chunk-30-1 records parent=segment-30, sequence=1, range=0..1023.
          ja: segment-30 の bytes 0..2047 は 1024 バイト方式で分割され、chunk-30-1 は parent=segment-30、sequence=1、range=0..1023 を記録します。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - OutputChunk
        related_relation_ids:
          - OutputSegment-partitioned_into-OutputChunk
        source_claims:
          - claim-output-segment-015
      - id: OutputSegment-partitioned_into-OutputChunk-example-boundary-001
        labels:
          zh: 切分为输出分块拒绝边界
          en: "Rejection boundary: partitioned into output chunk"
          ja: 出力チャンクへ分割の拒否境界
        descriptions:
          zh: chunk-a 与 chunk-b 位于同一 stdout 流，但二者都没有 parent_segment，也没有覆盖同一段的分区方案。
          en: chunk-a and chunk-b occur in the same stdout stream, but neither names a parent segment or a partition scheme over one segment.
          ja: chunk-a と chunk-b は同じ stdout ストリームにありますが、親セグメントや一つのセグメントに対する分割方式を示しません。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - OutputChunk
        related_relation_ids:
          - OutputSegment-partitioned_into-OutputChunk
        source_claims:
          - claim-output-segment-016
    source_claims:
      - claim-output-segment-017
    layout_role: cross-link
    target: concept:OutputChunk
sources:
  - id: src-docker-container-logs
    title: Docker Engine API — Container logs
    publisher: Docker
    url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
    source_type: official-doc
    relevance: Container stdout/stderr log streams.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-output-segment-001
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered byte sequence. OutputSegment uses that order to identify a contiguous, re-addressable range within one stream; visibility, provenance, and citation annotations are Moonweave metadata. The owner info-container-command, semantic kind information, and taxonomy backbone OutputSegment-is_a-OutputInformation are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.357 > Stream
    evidence_kind: normative
    confidence: high
  - id: claim-output-segment-002
    source: eng-std-posix-shell-2024
    supports: POSIX models a stream as an ordered byte sequence, making offsets within one stream meaningful. Moonweave uses that ordered substrate to define an addressable contiguous OutputSegment; citation and sensitivity metadata remain optional annotations.
    locator: POSIX.1-2024 Base Definitions §3.357 > Stream
    evidence_kind: normative
    confidence: high
  - id: claim-output-segment-003
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered sequence of data and distinguishes the standard output streams. This supports OutputSegment as an addressable range of stream content; offset identity and the OutputInformation taxonomy are Moonweave design decisions.
    locator: POSIX.1-2024 Base Definitions §3.357 > Stream
    evidence_kind: normative
    confidence: high
  - id: claim-output-segment-004
    source: eng-ont-prov-o
    supports: PROV-O distinguishes entities and their provenance relations, supporting an evidence link from visible output to the entity or span that informed it. This supports the OutputCitation endpoint without turning the citation into the output segment or the source itself; Moonweave supplies the citation-anchor specialization.
    locator: W3C PROV-O Recommendation Sections 2 and 3.1, Entity, Activity, Agent, usage and generation
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-segment-005
    source: eng-std-posix-shell-2024
    supports: "OutputStream-contains_segment-OutputSegment: The accepted record is stdout-stream-4 contains segment-4-7, which records stream_id=stdout-stream-4, channel=stdout, and sequence=7. POSIX defines distinct standard-output and standard-error file descriptors and redirection behavior; membership must retain the originating channel. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-output-segment-006
    source: eng-std-posix-shell-2024
    supports: "OutputStream-contains_segment-OutputSegment: The rejected record is outside the relation because Temporal adjacency cannot override channel and stream-identity boundaries. POSIX defines distinct standard-output and standard-error file descriptors and redirection behavior; membership must retain the originating channel. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-output-segment-007
    source: eng-std-posix-shell-2024
    supports: "OutputStream-contains_segment-OutputSegment: The official material supports the operational distinction used by this edge. POSIX defines distinct standard-output and standard-error file descriptors and redirection behavior; membership must retain the originating channel. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
  - id: claim-output-segment-008
    source: eng-fw-openai-tracing
    supports: "output_segment_has_sensitive_span: The accepted record is Characters 114..145 of segment-8 are marked credential; SensitiveSpan span-8 records start=114, end=145, and detector_id. OpenAI tracing can capture sensitive inputs and outputs; Moonweave's SensitiveSpan adds explicit offsets so only the located portion is represented. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: OpenAI Agents SDK Tracing, Default tracing and Sensitive data
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-segment-009
    source: eng-fw-openai-tracing
    supports: "output_segment_has_sensitive_span: The rejected record is outside the relation because Potentially sensitive output and a located sensitive subrange are different facts. OpenAI tracing can capture sensitive inputs and outputs; Moonweave's SensitiveSpan adds explicit offsets so only the located portion is represented. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: OpenAI Agents SDK Tracing, Default tracing and Sensitive data
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-segment-010
    source: eng-fw-openai-guardrails
    supports: "output_segment_has_sensitive_span: OpenAI output and tool guardrails can block or replace complete outputs; that whole-output decision does not itself identify a character or byte span. This supports rejecting the boundary record without changing Moonweave's endpoint or relation-kind decision."
    locator: OpenAI Agents SDK Guardrails, Output guardrails and Tool guardrails
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-segment-011
