    descriptions: {zh: "context length is model constraint; OutputSegment records info structure; KV cache is not SourceReference.", en: "context length is model constraint; OutputSegment records info structure; KV cache is not SourceReference.", ja: "KV cache not SourceReference."}

    field_values: {}
