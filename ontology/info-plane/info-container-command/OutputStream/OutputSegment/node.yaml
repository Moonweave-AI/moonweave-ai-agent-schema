          en: "Rejection boundary: is output information"
          ja: 出力情報の一種の拒否境界
        scenario_id: null
        descriptions:
          zh: stdout-9 是包含许多段的 OutputStream 集合，本身没有单一连续范围。
          en: stdout-9 is an OutputStream collection containing many segments and has no single contiguous range.
          ja: stdout-9 は複数セグメントを含む OutputStream 集合で、単一の連続範囲を持ちません。
        field_values: {}
        related_node_ids:
          - OutputSegment
          - OutputInformation
        related_relation_ids:
          - OutputSegment-is_a-OutputInformation
        source_claims:
