    descriptions: {zh: "Outlines instance: regex SSN validated output->OutputSegment StructuredData schema_ref=ssn-regex-v1.", en: "Outlines instance: regex SSN validated output->OutputSegment StructuredData.", ja: "Outlines instance maps to OutputSegment StructuredData."}

