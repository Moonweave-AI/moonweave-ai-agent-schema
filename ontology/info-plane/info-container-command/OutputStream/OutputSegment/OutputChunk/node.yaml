parent_relation:
  id: OutputChunk-is_a-OutputSegment
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种输出段
    en: is an output segment
    ja: 出力セグメントの一種
  definitions:
    zh: 输出分块是输出段的传输级特化：它具有父段、稳定序号和有界范围，可用于分页、暂存或上下文卸载，同时仍保持输出信息身份。
    en: An output chunk is a transport-level specialization of output segment with a parent segment, stable sequence, and bounded range for paging, staging, or context offloading while retaining output-information identity.
    ja: 出力チャンクは、親セグメント、安定した順序、境界範囲を持つ転送レベルの出力セグメントで、ページング、段階保存、コンテキスト退避に使われます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: OutputChunk-is_a-OutputSegment-example-positive-001
      labels:
        zh: 是一种输出段正例
        en: "Accepted case: is an output segment"
        ja: 出力セグメントの一種の受理例
      descriptions:
        zh: chunk-2 声明 parent_segment=segment-1、sequence=2、byte_range=4096..8191，并保留原输出编码。
        en: chunk-2 declares parent_segment=segment-1, sequence=2, byte_range=4096..8191, and preserves the source output encoding.
        ja: chunk-2 は parent_segment=segment-1、sequence=2、byte_range=4096..8191 を宣言し、元の出力符号化を保持します。
      field_values: {}
      related_node_ids:
        - OutputChunk
        - OutputSegment
      related_relation_ids:
        - OutputChunk-is_a-OutputSegment
      source_claims:
        - claim-output-chunk-003
    - id: OutputChunk-is_a-OutputSegment-example-boundary-001
      labels:
        zh: 是一种输出段拒绝边界
        en: "Rejection boundary: is an output segment"
        ja: 出力セグメントの一種の拒否境界
      descriptions:
        zh: segment-whole 表示完整逻辑输出，只有起止边界，没有 parent_segment 或 chunk sequence。
        en: segment-whole represents one complete logical output and has boundaries but no parent_segment or chunk sequence.
        ja: segment-whole は完全な論理出力を表し、境界はありますが parent_segment や chunk sequence がありません。
      field_values: {}
      related_node_ids:
        - OutputChunk
        - OutputSegment
      related_relation_ids:
        - OutputChunk-is_a-OutputSegment
      source_claims:
        - claim-output-chunk-004
  source_claims:
    - claim-output-chunk-005
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-output-chunk-001
    source: eng-std-posix-shell-2024
    supports: POSIX's stream model supplies the ordered-byte substrate on which bounded reads or emissions can be identified. OutputChunk narrows OutputSegment to a contiguous range created by one collection, transmission, or persistence boundary; the class name, owner info-container-command, semantic kind information, and backbone OutputChunk-is_a-OutputSegment are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.357 > Stream
    evidence_kind: normative
    confidence: high
  - id: claim-output-chunk-002
    source: eng-std-posix-shell-2024
    supports: POSIX defines a stream as an ordered sequence of bytes. Moonweave therefore treats a collector-bounded contiguous byte range as an OutputChunk and records its sequence independently of whether the range aligns with a line, Unicode character, or JSON value.
    locator: POSIX.1-2024 Base Definitions §3.357 > Stream
    evidence_kind: normative
    confidence: high
  - id: claim-output-chunk-003
    source: eng-fw-deepagents-context-engineering
    supports: "OutputChunk-is_a-OutputSegment: The accepted record is chunk-2 declares parent_segment=segment-1, sequence=2, byte_range=4096..8191, and preserves the source output encoding. Deep Agents recommends offloading large outputs and returning compact references or summaries; bounded ordered chunks provide the transport unit for that operation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "Deep Agents Context engineering, Context compression: offloading and summarization"
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-chunk-004
    source: eng-fw-deepagents-context-engineering
    supports: "OutputChunk-is_a-OutputSegment: The rejected record is outside the relation because Every chunk is a segment, but not every segment is a transport partition. Deep Agents recommends offloading large outputs and returning compact references or summaries; bounded ordered chunks provide the transport unit for that operation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "Deep Agents Context engineering, Context compression: offloading and summarization"
    evidence_kind: design-inference
    confidence: high
  - id: claim-output-chunk-005
    source: eng-fw-deepagents-context-engineering
    supports: "OutputChunk-is_a-OutputSegment: The official material supports the operational distinction used by this edge. Deep Agents recommends offloading large outputs and returning compact references or summaries; bounded ordered chunks provide the transport unit for that operation. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "Deep Agents Context engineering, Context compression: offloading and summarization"
    evidence_kind: design-inference
    confidence: high
  - id: claim-ochunk-design
    source: src-info-container-design
    supports: OutputChunk records sequenced fragments for reassembly and gap detection.
    locator: OutputChunk
    evidence_kind: design-inference
    confidence: high
