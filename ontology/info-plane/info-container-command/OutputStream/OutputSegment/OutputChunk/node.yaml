parent_relation:
  id: OutputChunk-is_a-OutputSegment
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种输出段
    en: is an output segment
    ja: 出力セグメントの一種
  definitions:
    zh: 输出分块是输出段的传输级特化：它具有父段、稳定序号和有界范围，可用于分页、暂存或上下文卸载，同时仍保持输出信息身份。
    en: An output chunk is a transport-level specialization of output segment with a parent segment, stable sequence, and bounded range for paging, staging, or context offloading while retaining output-information identity.
    ja: 出力チャンクは、親セグメント、安定した順序、境界範囲を持つ転送レベルの出力セグメントで、ページング、段階保存、コンテキスト退避に使われます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: OutputChunk-is_a-OutputSegment-example-positive-001
      kind: positive
      labels:
        zh: 是一种输出段正例
        en: "Accepted case: is an output segment"
        ja: 出力セグメントの一種の受理例
      scenario_id: null
      descriptions:
        zh: chunk-2 声明 parent_segment=segment-1、sequence=2、byte_range=4096..8191，并保留原输出编码。
        en: chunk-2 declares parent_segment=segment-1, sequence=2, byte_range=4096..8191, and preserves the source output encoding.
        ja: chunk-2 は parent_segment=segment-1、sequence=2、byte_range=4096..8191 を宣言し、元の出力符号化を保持します。
      field_values: {}
      related_node_ids:
        - OutputChunk
        - OutputSegment
      related_relation_ids:
        - OutputChunk-is_a-OutputSegment
      expected_result:
        zh: 把 chunk-2 归入 OutputSegment。
        en: Classify chunk-2 as an OutputSegment.
        ja: chunk-2 を OutputSegment に分類します。
      why_valid_or_invalid:
        zh: 它既是有界输出区间，又具有分块所需的父段和顺序身份。
        en: It is a bounded output range with the parent and ordering identity required of a chunk.
        ja: 境界付き出力範囲であり、チャンクに必要な親と順序の同一性を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-output-chunk-003
    - id: OutputChunk-is_a-OutputSegment-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种输出段拒绝边界
        en: "Rejection boundary: is an output segment"
        ja: 出力セグメントの一種の拒否境界
      scenario_id: null
      descriptions:
        zh: segment-whole 表示完整逻辑输出，只有起止边界，没有 parent_segment 或 chunk sequence。
        en: segment-whole represents one complete logical output and has boundaries but no parent_segment or chunk sequence.
        ja: segment-whole は完全な論理出力を表し、境界はありますが parent_segment や chunk sequence がありません。
      field_values: {}
      related_node_ids:
        - OutputChunk
        - OutputSegment
      related_relation_ids:
        - OutputChunk-is_a-OutputSegment
      expected_result:
        zh: 保留为 OutputSegment，不提升为 OutputChunk。
        en: Keep it as an OutputSegment without classifying it as an OutputChunk.
        ja: OutputSegment として保持し、OutputChunk には分類しません。
      why_valid_or_invalid:
        zh: 所有分块都是输出段，但并非每个输出段都是为传输切分的分块。
        en: Every chunk is a segment, but not every segment is a transport partition.
        ja: 全チャンクはセグメントですが、全セグメントが転送分割チャンクとは限りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-output-chunk-004
  source_claims:
    - claim-output-chunk-005
  distinct_fact_rationale:
    zh: 输出分块是输出段的传输级特化：它具有父段、稳定序号和有界范围，可用于分页、暂存或上下文卸载，同时仍保持输出信息身份。 拒绝边界是：所有分块都是输出段，但并非每个输出段都是为传输切分的分块。
    en: "An output chunk is a transport-level specialization of output segment with a parent segment, stable sequence, and bounded range for paging, staging, or context offloading while retaining output-information identity. Its rejection boundary is: Every chunk is a segment, but not every segment is a transport partition."
    ja: 出力チャンクは、親セグメント、安定した順序、境界範囲を持つ転送レベルの出力セグメントで、ページング、段階保存、コンテキスト退避に使われます。 拒否境界は次のとおりです。全チャンクはセグメントですが、全セグメントが転送分割チャンクとは限りません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
