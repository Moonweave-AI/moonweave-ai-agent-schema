schema: moonweave.ai/ontology-node/v1
id: OutputChunk
kind: concept
status: accepted
labels:
  zh: 输出分块
  en: output chunk
  ja: 出力チャンク
semantics:
  short_definition:
    zh: 由一次读取、推送或采集动作确定边界和序号的输出片段。
    en: An output segment whose boundary and sequence are fixed by one read, emission, or collection operation.
    ja: 一回の読取・送出・収集操作によって境界と順序番号が固定される出力区間。
  definition:
    zh: 输出分块是一种 OutputSegment，其起止边界由收集器的一次读取、进程的一次推送或传输层的一次交付确定，并在所属输出流内带有稳定序号。分块边界是采集事实，不保证与行、JSON 对象、token 或其他语义单位对齐；后续可以把相邻分块组合成较大的逻辑片段。
    en: An OutputChunk is an OutputSegment whose start and end are fixed by one collector read, process emission, or transport delivery and that has a stable sequence within its output stream. A chunk boundary is a collection fact and need not align with a line, JSON object, token, or other semantic unit; adjacent chunks may later be combined into a larger logical segment.
    ja: OutputChunk は、収集器の一回の読取、プロセスの一回の送出、または transport の一回の配送で始終境界が決まり、所属出力ストリーム内で安定 sequence を持つ OutputSegment です。境界は収集事実であり、行、JSON object、token 等の意味単位と一致する保証はなく、隣接 chunk は後で大きな論理 segment に結合できます。
  why_needed:
    zh: 需要它保留流式捕获的原始顺序、丢失与截断边界，支持增量显示和重放，同时避免把偶然的 I/O 读取边界误当成语义段落。
    en: It preserves original order, gaps, and truncation boundaries for streaming capture, incremental display, and replay without mistaking incidental I/O read boundaries for semantic paragraphs.
    ja: stream 捕捉の原順序、欠落、切詰め境界を保存し、増分表示と再生を可能にしつつ、偶然の I/O 読取境界を意味段落と誤認しないために必要です。
  includes:
    - zh: 包含标明所属流、序号、捕获边界和载荷编码的分块，包括零字节终结标记之外实际捕获的 stdout 或 stderr 数据块。
      en: Includes chunks that identify their stream, sequence, capture boundary, and payload encoding, including actually captured stdout or stderr data chunks rather than a zero-byte end marker alone.
      ja: 所属 stream、sequence、捕捉境界、payload encoding を示す chunk を含み、ゼロ byte 終端 marker だけでなく実際に捕捉した stdout または stderr data chunk を扱います。
  excludes:
    - zh: 不包含整个 OutputStream、按语义或披露策略选出的任意 OutputSegment、命令执行活动、ContextSummary，或只有 chunk 大小配置而没有实际载荷的设置项。
      en: Excludes an entire OutputStream, an arbitrary OutputSegment selected by semantic or disclosure policy, command execution activity, ContextSummary, and chunk-size configuration without an actual payload.
      ja: OutputStream 全体、意味または開示方針で選ばれた任意 OutputSegment、コマンド実行活動、ContextSummary、実 payload のない chunk-size 設定を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: OutputChunk-example-positive-001
    kind: positive
    labels:
      zh: 输出分块正例
      en: Positive example of output chunk
      ja: 出力チャンクの正例
    scenario_id: null
    descriptions:
      zh: stdout 采集器的第 7 次读取取得字节区间 4096–8191，并按 sequence=7 保存；内容从一个 JSON 字符串中间开始，也在该字符串闭合前结束。读取边界而非文本语义决定了这个 OutputChunk。
      en: The seventh read from the stdout collector captures bytes 4096–8191 and stores them with sequence 7. The bytes begin and end inside one JSON string; the collector read boundary, not text meaning, defines this OutputChunk.
      ja: stdout collector の 7 回目の read は byte 4096–8191 を sequence 7 として保存します。内容は一つの JSON 文字列の途中で始まり途中で終わり、意味ではなく read 境界がこの OutputChunk を定めます。
    field_values: {}
    related_node_ids:
      - OutputChunk
      - OutputSegment
    related_relation_ids:
      - OutputSegment-partitioned_into-OutputChunk
    expected_result:
      zh: 该字节区间被识别为一个 OutputChunk，并保留其所属 OutputSegment 与采集顺序。
      en: The byte range is classified as one OutputChunk while retaining its containing OutputSegment and capture order.
      ja: この byte 範囲は一つの OutputChunk と判定され、所属 OutputSegment と収集順序を保持します。
    why_valid_or_invalid:
      zh: 它有明确流来源、连续偏移范围和采集序号；即使切断语义单元，也仍满足分块身份。
      en: It has a specific stream source, contiguous offsets, and a capture sequence; splitting a semantic unit does not invalidate chunk identity.
      ja: 特定 stream、連続 offset、capture sequence を持つため、意味単位を途中で切っていても chunk として有効です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-output-chunk-002
  - id: OutputChunk-example-boundary-001
    kind: boundary
    labels:
      zh: 输出分块边界例
      en: Boundary case for output chunk
      ja: 出力チャンクの境界例
    scenario_id: null
    descriptions:
      zh: 解析器把三个相邻采集分块重组为一个完整 JSON 对象，并给它业务字段和验证结果。这个派生对象跨越分块边界，是语义记录而不是新的 OutputChunk。
      en: A parser reassembles three adjacent capture chunks into one complete JSON object and assigns business fields and a validation result. That derived object crosses chunk boundaries and is a semantic record, not another OutputChunk.
      ja: parser は隣接する三つの capture chunk を完全な JSON object に再構成し、business field と validation result を付けます。この派生 object は chunk 境界をまたぐ意味記録であり、新たな OutputChunk ではありません。
    field_values: {}
    related_node_ids:
      - OutputChunk
    related_relation_ids: []
    expected_result:
      zh: 重组对象保持其解析后记录类型；原有三个采集分块仍分别存在。
      en: The reassembled object retains its parsed-record type while the three original capture chunks remain distinct.
      ja: 再構成 object は解析済み record 型を保ち、元の三つの capture chunk は別々に残ります。
    why_valid_or_invalid:
      zh: 它的边界来自解析语义而非一次读取、发送或持久化动作，因此不满足分块种差。
      en: Its boundary comes from parsed meaning rather than one read, emission, or persistence action, so it lacks the chunk differentia.
      ja: 境界が read・emission・persistence 動作ではなく解析意味から生じるため、chunk の種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: OutputChunk-example-instance-001
    kind: instance
    labels:
      zh: 输出分块结构化实例
      en: Structured instance of output chunk
      ja: 出力チャンクの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: chunk-stdout-007 属于 stdout segment-04，覆盖 offset 4096 到 8192，sequence 为 7，capture_boundary 为 collector-read；其后续 chunk-stdout-008 从 8192 继续。
      en: chunk-stdout-007 belongs to stdout segment-04, covers offsets 4096 through 8192, has sequence 7 and capture boundary collector-read; chunk-stdout-008 continues at offset 8192.
      ja: chunk-stdout-007 は stdout segment-04 に属し、offset 4096–8192、sequence 7、capture boundary collector-read を持ちます。次の chunk-stdout-008 は offset 8192 から続きます。
    field_values:
      chunk_id: chunk-stdout-007
      start_offset: 4096
      end_offset: 8192
      sequence: 7
      capture_boundary: collector-read
    related_node_ids:
      - OutputChunk
      - OutputSegment
    related_relation_ids:
      - OutputChunk-is_a-OutputSegment
    expected_result:
      zh: 实例按连续偏移与采集顺序验证为 OutputChunk，并继承 OutputSegment 的可寻址范围语义。
      en: The instance validates as an OutputChunk by contiguous offsets and capture order and inherits OutputSegment's addressable-range semantics.
      ja: 連続 offset と capture order により OutputChunk と検証され、OutputSegment の addressable range 意味を継承します。
    why_valid_or_invalid:
      zh: 起止偏移连续、序号明确且边界由采集动作产生；没有把内容含义误当作分块边界。
      en: The offsets are contiguous, the sequence is explicit, and the boundary comes from capture; content meaning is not mistaken for chunk identity.
      ja: offset が連続し sequence が明示され、境界は capture に由来します。内容意味を chunk identity と取り違えていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
