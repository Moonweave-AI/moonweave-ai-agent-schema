schema: moonweave.ai/ontology-node/v1
id: OutputChunk
kind: concept
labels:
  zh: 输出分块
  en: output chunk
  ja: 出力チャンク
semantics:
  short_definition:
    zh: OutputSegment 内单个有序输出分块上位概念。
    en: Supertype for a single ordered output chunk within an OutputSegment.
    ja: OutputSegment 内 single ordered output chunk 上位概念。
  definition:
    zh: OutputChunk 子类 StandardOutputChunk 与 StandardErrorChunk 记录 chunk_sequence 与 text/binary payload 引用；对应 terminal line/chunk 回传。
    en: OutputChunk subclasses StandardOutputChunk and StandardErrorChunk record chunk_sequence and text/binary payload references—terminal line/chunk returns.
    ja: stdout/stderr chunk with sequence。
  why_needed:
    zh: 分块序号支持重组与缺块检测。
    en: Chunk ordinals support reassembly and missing-chunk detection.
    ja: sequence for reassembly。
  includes:
    - zh: chunk_sequence、payload cross-link、output_channel。
      en: chunk_sequence, payload cross-link, output_channel.
      ja: sequence/payload/channel。
  excludes:
    - zh: 完整重组后的 OutputStream 文本、RunResult 摘要。
      en: Fully reassembled OutputStream text and RunResult summaries.
      ja: reassembled text/RunResult summary。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: chunk_sequence 在同一 observation_id+channel 内从 0 连续递增；缺 seq 1→missing_sequences。
    en: chunk_sequence contiguous from 0 within observation_id+channel; missing seq 1→missing_sequences.
    ja: contiguous sequence constraint。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
