parent_relation:
  id: StandardErrorChunk-is_a-OutputChunk
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种输出分块
    en: is an output chunk
    ja: 出力チャンクの一種
  definitions:
    zh: 标准错误分块是 OutputChunk 的通道特化，必须具有 stderr 通道、父段或父流、稳定序号和有界范围。
    en: A standard-error chunk is an OutputChunk specialized to the stderr channel and must carry its parent segment or stream, stable sequence, and bounded range.
    ja: 標準エラーチャンクは stderr チャネルに特化した OutputChunk で、親セグメントまたは親ストリーム、安定順序、境界範囲を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StandardErrorChunk-is_a-OutputChunk-example-positive-001
      labels:
        zh: 是一种输出分块正例
        en: "Accepted case: is an output chunk"
        ja: 出力チャンクの一種の受理例
      descriptions:
        zh: chunk err-6-4 标记 channel=stderr、sequence=4、byte_range=1536..2047、parent_segment=err-seg-6。
        en: Chunk err-6-4 records channel=stderr, sequence=4, byte_range=1536..2047, and parent_segment=err-seg-6.
        ja: チャンク err-6-4 は channel=stderr、sequence=4、byte_range=1536..2047、parent_segment=err-seg-6 を記録します。
      field_values: {}
      related_node_ids:
        - StandardErrorChunk
        - OutputChunk
      related_relation_ids:
        - StandardErrorChunk-is_a-OutputChunk
      source_claims:
        - claim-standard-error-chunk-004
    - id: StandardErrorChunk-is_a-OutputChunk-example-boundary-001
      labels:
        zh: 是一种输出分块拒绝边界
        en: "Rejection boundary: is an output chunk"
        ja: 出力チャンクの一種の拒否境界
      descriptions:
        zh: chunk out-6-4 的 sequence 和范围相同，但 channel=stdout 且父流为 stdout-6。
        en: Chunk out-6-4 has the same sequence and range, but channel=stdout and parent stream stdout-6.
        ja: チャンク out-6-4 は同じ順序と範囲ですが、channel=stdout で親ストリームは stdout-6 です。
      field_values: {}
      related_node_ids:
        - StandardErrorChunk
        - OutputChunk
      related_relation_ids:
        - StandardErrorChunk-is_a-OutputChunk
      source_claims:
        - claim-standard-error-chunk-005
  source_claims:
    - claim-standard-error-chunk-006
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: StandardErrorChunk-part_of-StandardError
    predicate: part_of
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 属于标准错误流
      en: part of standard error
      ja: 標準エラーストリームの一部
    definitions:
      zh: 表示某个标准错误分块是指定 StandardError 流的直接成员；分块与流必须共享 execution_id、stderr 通道和 stream_id。
      en: States that a standard-error chunk is a direct member of a particular StandardError stream; chunk and stream must share execution identifier, stderr channel, and stream identifier.
      ja: 標準エラーチャンクが特定の StandardError ストリームの直接メンバーであることを示し、execution_id、stderr チャネル、stream_id の一致を要求します。
    cardinality: null
