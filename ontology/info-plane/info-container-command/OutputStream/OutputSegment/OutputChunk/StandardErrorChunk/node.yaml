source_claims:
  - id: claim-standard-error-chunk-001
    source: eng-std-posix-shell-2024
    supports: POSIX identifies standard error by file descriptor 2 and streams by ordered bytes. StandardErrorChunk is an OutputChunk whose containing stream is stderr; collector boundary and sequence are Moonweave capture metadata. Owner info-container-command, semantic kind information, and backbone StandardErrorChunk-is_a-OutputChunk are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.353 and §3.357 > Standard Error; Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-002
    source: eng-std-posix-shell-2024
    supports: POSIX binds standard error to file descriptor 2 and defines streams as ordered byte sequences. Moonweave combines that channel identity with a collector boundary and sequence number to identify a StandardErrorChunk.
    locator: POSIX.1-2024 Base Definitions §3.353 and §3.357 > Standard Error; Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-003
    source: eng-std-posix-shell-2024
    supports: POSIX's fd 2 versus fd 1 distinction carries through to captured byte ranges. A StandardErrorChunk belongs to the stderr stream and a StandardOutputChunk to stdout; their collector boundaries and sequence numbers do not erase channel identity.
    locator: POSIX.1-2024 Base Definitions §3.353, §3.355, and §3.357
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-004
    source: eng-std-posix-shell-2024
    supports: "StandardErrorChunk-is_a-OutputChunk: The accepted record is Chunk err-6-4 records channel=stderr, sequence=4, byte_range=1536..2047, and parent_segment=err-seg-6. POSIX assigns standard error to file descriptor 2; a chunk subtype preserves that channel while adding bounded transport identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-005
    source: eng-std-posix-shell-2024
    supports: "StandardErrorChunk-is_a-OutputChunk: The rejected record is outside the relation because Sequence and range cannot override an explicit output-channel difference. POSIX assigns standard error to file descriptor 2; a chunk subtype preserves that channel while adding bounded transport identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-006
    source: eng-std-posix-shell-2024
    supports: "StandardErrorChunk-is_a-OutputChunk: The official material supports the operational distinction used by this edge. POSIX assigns standard error to file descriptor 2; a chunk subtype preserves that channel while adding bounded transport identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-007
    source: eng-std-posix-shell-2024
    supports: "StandardErrorChunk-part_of-StandardError: The accepted record is err-chunk-8-2 has stream_id=stderr-8, execution_id=exec-8, and channel=stderr, exactly matching StandardError stderr-8. POSIX distinguishes standard error by file descriptor; Moonweave additionally keys each stream to one execution so chunks cannot cross stream identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-008
    source: eng-std-posix-shell-2024
    supports: "StandardErrorChunk-part_of-StandardError: The rejected record is outside the relation because The same channel type does not imply membership in the same concrete stream. POSIX distinguishes standard error by file descriptor; Moonweave additionally keys each stream to one execution so chunks cannot cross stream identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-009
    source: eng-std-posix-shell-2024
    supports: "StandardErrorChunk-part_of-StandardError: The official material supports the operational distinction used by this edge. POSIX distinguishes standard error by file descriptor; Moonweave additionally keys each stream to one execution so chunks cannot cross stream identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted

