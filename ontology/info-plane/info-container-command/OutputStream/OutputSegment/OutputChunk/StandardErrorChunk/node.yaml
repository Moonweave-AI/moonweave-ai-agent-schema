      en: Not stdout chunk
      ja: stdout chunk ではない
    descriptions:
      zh: tests passed 属于 StandardOutputChunk。
      en: tests passed belongs to StandardOutputChunk.
      ja: success→stdout chunk。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
