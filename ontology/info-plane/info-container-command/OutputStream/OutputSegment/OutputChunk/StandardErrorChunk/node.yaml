      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: part_of
      labels:
        zh: 反向：组成
        en: contains
        ja: 逆方向：一部である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: StandardErrorChunk-part_of-StandardError-example-positive-001
        labels:
          zh: 属于标准错误流正例
          en: "Accepted case: part of standard error"
          ja: 標準エラーストリームの一部の受理例
        descriptions:
          zh: err-chunk-8-2 的 stream_id=stderr-8、execution_id=exec-8、channel=stderr，与 StandardError stderr-8 完全一致。
          en: err-chunk-8-2 has stream_id=stderr-8, execution_id=exec-8, and channel=stderr, exactly matching StandardError stderr-8.
          ja: err-chunk-8-2 の stream_id=stderr-8、execution_id=exec-8、channel=stderr は StandardError stderr-8 と一致します。
        field_values: {}
        related_node_ids:
          - StandardErrorChunk
          - StandardError
        related_relation_ids:
          - StandardErrorChunk-part_of-StandardError
        source_claims:
          - claim-standard-error-chunk-007
      - id: StandardErrorChunk-part_of-StandardError-example-boundary-001
        labels:
          zh: 属于标准错误流拒绝边界
          en: "Rejection boundary: part of standard error"
          ja: 標準エラーストリームの一部の拒否境界
        descriptions:
