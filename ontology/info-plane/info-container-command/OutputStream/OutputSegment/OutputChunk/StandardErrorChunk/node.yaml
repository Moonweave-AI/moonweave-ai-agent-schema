schema: moonweave.ai/ontology-node/v1
id: StandardErrorChunk
kind: concept
status: accepted
labels:
  zh: 标准错误分块
  en: standard error chunk
  ja: 標準エラーチャンク
semantics:
  short_definition:
    zh: 由一次采集动作从标准错误通道取得的、有序输出分块。
    en: An ordered output chunk obtained from the standard-error channel by one collection operation.
    ja: 一回の収集操作で標準エラー channel から得た、順序付き出力 chunk。
  definition:
    zh: 标准错误分块是一种 OutputChunk，其通道身份固定为所属 StandardError，并带有该流内的捕获序号、范围、编码和截断信息。其内容可能是诊断、警告、进度或任意程序写入 stderr 的字节；“看起来像错误”不是分类条件。
    en: A StandardErrorChunk is an OutputChunk whose channel identity is fixed by its containing StandardError and that carries capture sequence, range, encoding, and truncation information within that stream. Its content may be diagnostics, warnings, progress, or arbitrary bytes written to stderr; looking like an error is not the classification criterion.
    ja: StandardErrorChunk は、所属 StandardError によって channel identity が固定され、その stream 内の capture sequence、範囲、encoding、切詰め情報を持つ OutputChunk です。内容は診断、warning、進捗、stderr へ書かれた任意 byte であり、error らしい見た目は分類条件ではありません。
  why_needed:
    zh: 需要它在增量读取时保留 stderr 来源与局部顺序，使诊断可独立截断、引用和脱敏，同时不把整个流复制成每个观测的单一字符串。
    en: It preserves stderr origin and local order during incremental reads so diagnostics can be truncated, cited, and redacted independently without copying the whole stream into one observation string.
    ja: 増分読取で stderr 出典と局所順序を保ち、stream 全体を一つの観測文字列へ複製せず、診断を独立に切詰め・引用・秘匿するために必要です。
  includes:
    - zh: 包含明确 part_of 某个 StandardError、具有流内序号和实际载荷的捕获块，无论载荷最终是否被用户展示。
      en: Includes captured chunks explicitly part of one StandardError, with an in-stream sequence and actual payload, whether or not the payload is ultimately shown to a user.
      ja: 一つの StandardError の part_of であることが明示され、stream 内 sequence と実 payload を持つ capture chunk を含み、最終的に利用者へ表示されるかは問いません。
  excludes:
    - zh: 不包含 StandardOutputChunk、整个 StandardError 流、ExitStatusObservation、应用异常对象，或仅因文本包含“error”而从 stdout 重新分类的分块。
      en: Excludes StandardOutputChunk, the whole StandardError stream, ExitStatusObservation, application exception objects, and chunks reclassified from stdout merely because their text contains “error”.
      ja: StandardOutputChunk、StandardError stream 全体、ExitStatusObservation、application exception object、text に『error』を含むだけで stdout から再分類した chunk を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StandardErrorChunk-example-positive-001
    kind: positive
    labels:
      zh: 标准错误分块正例
      en: Positive example of standard error chunk
      ja: 標準エラーチャンクの正例
    scenario_id: null
    descriptions:
      zh: stderr 采集器把第 3 次读取保存为 chunk-stderr-003，内容是“deprecated option”，sequence=3；所属命令最终 code=0。该分块因来自 fd 2 而是 StandardErrorChunk，而不是因为它含有警告词。
      en: The stderr collector stores its third read as chunk-stderr-003 with text “deprecated option” and sequence 3; the command later exits with code 0. It is a StandardErrorChunk because it came from fd 2, not because its text contains a warning.
      ja: stderr collector は 3 回目の read を chunk-stderr-003、text “deprecated option”、sequence 3 として保存し、command は後に code 0 で終了します。warning 語ではなく fd 2 由来であるため StandardErrorChunk です。
    field_values: {}
    related_node_ids:
      - StandardErrorChunk
      - StandardError
    related_relation_ids:
      - StandardErrorChunk-part_of-StandardError
    expected_result:
      zh: 记录被识别为 StandardErrorChunk，并按 sequence=3 归入对应 StandardError。
      en: The record is classified as a StandardErrorChunk and placed at sequence 3 in its StandardError stream.
      ja: 記録は StandardErrorChunk と判定され、対応する StandardError の sequence 3 に配置されます。
    why_valid_or_invalid:
      zh: 它同时满足采集边界、stderr 通道成员资格和流内顺序；退出码与文本含义都不改变这些事实。
      en: It has a capture boundary, stderr membership, and in-stream order; neither exit code nor textual meaning changes those facts.
      ja: capture boundary、stderr membership、stream 内順序を持ち、exit code や text meaning はこれらを変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-standard-error-chunk-002
  - id: StandardErrorChunk-example-boundary-001
    kind: boundary
    labels:
      zh: 标准错误分块边界例
      en: Boundary case for standard error chunk
      ja: 標準エラーチャンクの境界例
    scenario_id: null
    descriptions:
      zh: "chunk-stdout-009 来自 fd 1，内容恰好是“error count: 0”。它仍是 StandardOutputChunk；内容中出现 error 字样不能把通道改成 stderr。"
      en: "chunk-stdout-009 comes from fd 1 and happens to contain “error count: 0”. It remains a StandardOutputChunk; the word error cannot change its channel to stderr."
      ja: "chunk-stdout-009 は fd 1 由来で、たまたま “error count: 0” を含みます。error という語は channel を stderr に変えないため、StandardOutputChunk のままです。"
    field_values: {}
    related_node_ids:
      - StandardErrorChunk
      - StandardOutputChunk
    related_relation_ids: []
    expected_result:
      zh: 该记录保持 StandardOutputChunk 类型，不建立 StandardErrorChunk 成员资格。
      en: The record remains a StandardOutputChunk and gains no StandardErrorChunk membership.
      ja: この記録は StandardOutputChunk のままで、StandardErrorChunk membership は成立しません。
    why_valid_or_invalid:
      zh: 分块所属通道由采集来源决定，不能通过词汇或情感分类器推断。
      en: A chunk's channel comes from its capture source and cannot be inferred from vocabulary or sentiment.
      ja: chunk の channel は capture source で決まり、語彙や sentiment classifier から推定できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: StandardErrorChunk-example-instance-001
    kind: instance
    labels:
      zh: 标准错误分块结构化实例
      en: Structured instance of standard error chunk
      ja: 標準エラーチャンクの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: chunk-stderr-003 属于 stream-exec-214-fd2，sequence=3，offset=[512,640)，capture_boundary=collector-read；内容为 UTF-8 警告且未截断。
      en: chunk-stderr-003 belongs to stream-exec-214-fd2, has sequence 3, offsets [512,640), and capture_boundary collector-read; its UTF-8 warning text is not truncated.
      ja: chunk-stderr-003 は stream-exec-214-fd2 に属し、sequence=3、offset=[512,640)、capture_boundary=collector-read で、UTF-8 warning text は非 truncation です。
    field_values:
      chunk_id: chunk-stderr-003
      stream_id: stream-exec-214-fd2
      sequence: 3
      start_offset: 512
      end_offset: 640
      capture_boundary: collector-read
    related_node_ids:
      - StandardErrorChunk
      - StandardError
    related_relation_ids:
      - StandardErrorChunk-part_of-StandardError
    expected_result:
      zh: 实例作为 StandardError 的第三个 StandardErrorChunk 被检索。
      en: The instance is retrieved as the third StandardErrorChunk in its StandardError stream.
      ja: instance は StandardError stream の三番目の StandardErrorChunk として取得されます。
    why_valid_or_invalid:
      zh: stderr 流身份、连续范围、序号和采集边界均明确，满足通道专属分块条件。
      en: stderr stream identity, contiguous range, sequence, and capture boundary are explicit, satisfying the channel-specific chunk conditions.
      ja: stderr stream identity、連続範囲、sequence、capture boundary が明示され、channel-specific chunk 条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StandardOutputChunk
    shared_parent_concept_id: OutputChunk
    differentia:
      zh: 正向身份比较：父节点 OutputChunk：StandardErrorChunk（semantic kind=information，骨架 StandardErrorChunk-is_a-OutputChunk）；StandardOutputChunk（semantic kind=information，骨架 StandardOutputChunk-is_a-OutputChunk）。双端条件：StandardErrorChunk 条件：“标准错误分块是一种输出分块；其区分条件是：它表示带有顺序、诊断含义、来源片段、截断和上下文选择元数据的有边界标准错误片段”；StandardOutputChunk 条件：“标准输出分块是以如下事实为区分特征的输出分块：它表示带有顺序、来源片段、截断和上下文选择元数据的有边界标准输出片段”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent OutputChunk: StandardErrorChunk (semantic kind=information, backbone StandardErrorChunk-is_a-OutputChunk); StandardOutputChunk (semantic kind=information, backbone StandardOutputChunk-is_a-OutputChunk). Endpoint conditions: StandardErrorChunk condition: “As an output chunk, Standard error chunk is distinguished by the fact that it represents a bounded stderr segment with ordering, diagnostic meaning, source span, truncation, and context-selection metadata”; StandardOutputChunk condition: “Standard output chunk is an output chunk; its differentiating condition is that it represents a bounded stdout segment with ordering, source span, truncation, and context-selection metadata”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 OutputChunk：StandardErrorChunk（semantic kind=information、バックボーン StandardErrorChunk-is_a-OutputChunk）；StandardOutputChunk（semantic kind=information、バックボーン StandardOutputChunk-is_a-OutputChunk）。両端条件：StandardErrorChunk の条件：「出力チャンクに属する標準エラーチャンクは、次の事実を種差とします：それは、順序、診断上の意味、出典断片、切り詰め、コンテキスト選択メタデータを持つ境界付きの標準エラー部分です」；StandardOutputChunk の条件：「標準出力チャンクは出力チャンクの一種であり、次の条件で区別されます：それは、順序、出典断片、切り詰め、コンテキスト選択メタデータを持つ境界付きの標準出力部分です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-standard-error-chunk-003
parent_relation:
  id: StandardErrorChunk-is_a-OutputChunk
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种输出分块
    en: is an output chunk
    ja: 出力チャンクの一種
