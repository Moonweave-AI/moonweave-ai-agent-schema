schema: moonweave.ai/ontology-node/v1
id: StandardErrorChunk
kind: concept
labels:
  zh: 标准错误分块
  en: standard error chunk
  ja: 標準エラーチャンク
semantics:
  short_definition:
    zh: stderr 通道的 OutputChunk 特化。
    en: OutputChunk specialization for the stderr channel.
    ja: stderr channel OutputChunk 特化。
  definition:
    zh: StandardErrorChunk 记录 stderr text 与 chunk_sequence；构建失败、lint、容器 deprecated API 警告映射此类型。
    en: StandardErrorChunk records stderr text and chunk_sequence; build failures, lint, and container deprecated API warnings map here.
    ja: stderr chunk with sequence。
  why_needed:
    zh: stderr chunk 独立类型支持错误流单独披露与引用。
    en: Separate stderr chunk type supports isolated error-stream disclosure and citation.
    ja: stderr-only fragments。
  includes:
    - zh: chunk_sequence、stderr text ref、observation_id。
      en: chunk_sequence, stderr text ref, observation_id.
      ja: sequence/text/observation。
  excludes:
    - zh: stdout chunks、ExitStatusObservation。
      en: stdout chunks and ExitStatusObservation.
      ja: stdout/exit status。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: stderr seq 0 "1 deprecation warning\n"；exit_code=2 时 stderr 仍可独立分块。
    en: stderr seq 0 "1 deprecation warning\n"; with exit_code=2 stderr still chunked independently.
    ja: stderr warning/error chunks。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relations: []
