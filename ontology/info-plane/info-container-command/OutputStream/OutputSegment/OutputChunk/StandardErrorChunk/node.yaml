source_claims:
  - id: claim-standard-error-chunk-001
    source: eng-std-posix-shell-2024
    supports: POSIX identifies standard error by file descriptor 2 and streams by ordered bytes. StandardErrorChunk is an OutputChunk whose containing stream is stderr; collector boundary and sequence are Moonweave capture metadata. Owner info-container-command, semantic kind information, and backbone StandardErrorChunk-is_a-OutputChunk are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.353 and §3.357 > Standard Error; Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-002
    source: eng-std-posix-shell-2024
    supports: POSIX binds standard error to file descriptor 2 and defines streams as ordered byte sequences. Moonweave combines that channel identity with a collector boundary and sequence number to identify a StandardErrorChunk.
    locator: POSIX.1-2024 Base Definitions §3.353 and §3.357 > Standard Error; Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-error-chunk-003
    source: eng-std-posix-shell-2024
    supports: POSIX's fd 2 versus fd 1 distinction carries through to captured byte ranges. A StandardErrorChunk belongs to the stderr stream and a StandardOutputChunk to stdout; their collector boundaries and sequence numbers do not erase channel identity.
    locator: POSIX.1-2024 Base Definitions §3.353, §3.355, and §3.357
    evidence_kind: normative
