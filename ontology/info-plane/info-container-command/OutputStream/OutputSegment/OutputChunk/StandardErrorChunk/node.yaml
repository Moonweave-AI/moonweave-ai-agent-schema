      expected_result:
        zh: 保留为 StandardOutputChunk，拒绝归入 StandardErrorChunk。
        en: Keep it as a StandardOutputChunk and reject StandardErrorChunk classification.
        ja: StandardOutputChunk として保持し、StandardErrorChunk 分類を拒否します。
      why_valid_or_invalid:
        zh: 即使序号和范围相同，也不能覆盖记录中明确存在的输出通道差异。
        en: Sequence and range cannot override an explicit output-channel difference.
        ja: 順序と範囲は明示的な出力チャネル差を上書きできません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-standard-error-chunk-005
  source_claims:
    - claim-standard-error-chunk-006
  distinct_fact_rationale:
    zh: 标准错误分块是 OutputChunk 的通道特化，必须具有 stderr 通道、父段或父流、稳定序号和有界范围。 拒绝边界是：即使序号和范围相同，也不能覆盖记录中明确存在的输出通道差异。
    en: "A standard-error chunk is an OutputChunk specialized to the stderr channel and must carry its parent segment or stream, stable sequence, and bounded range. Its rejection boundary is: Sequence and range cannot override an explicit output-channel difference."
    ja: 標準エラーチャンクは stderr チャネルに特化した OutputChunk で、親セグメントまたは親ストリーム、安定順序、境界範囲を持ちます。 拒否境界は次のとおりです。順序と範囲は明示的な出力チャネル差を上書きできません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
