        en: It satisfies generic chunk identity and further fixes the channel to standard error.
        ja: 一般チャンクの同一性を満たし、さらに標準エラーチャネルへ限定されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
