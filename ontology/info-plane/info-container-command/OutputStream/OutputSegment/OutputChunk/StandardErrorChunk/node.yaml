      en: Warning chunk
      ja: warning chunk
    descriptions:
      zh: stderr seq 0 "1 deprecation warning\n"。
      en: stderr seq 0 "1 deprecation warning\n".
      ja: stderr warning chunk。
    example_source:
      product: Moonweave
