schema: moonweave.ai/ontology-node/v1
id: StandardOutputChunk
kind: concept
status: accepted
labels:
  zh: 标准输出分块
  en: standard output chunk
  ja: 標準出力チャンク
semantics:
  short_definition:
    zh: 由一次采集动作从标准输出通道取得的、有序输出分块。
    en: An ordered output chunk obtained from the standard-output channel by one collection operation.
    ja: 一回の収集操作で標準出力 channel から得た、順序付き出力 chunk。
  definition:
    zh: 标准输出分块是一种 OutputChunk，其通道身份固定为所属 StandardOutput，并带有该流内的捕获序号、范围、编码和截断信息。它只保证字节来自 stdout；单个分块可能是不完整的一行、被拆开的 UTF-8 序列或结构化输出的一部分。
    en: A StandardOutputChunk is an OutputChunk whose channel identity is fixed by its containing StandardOutput and that carries capture sequence, range, encoding, and truncation information within that stream. It guarantees only that bytes came from stdout; one chunk may be a partial line, a split UTF-8 sequence, or part of structured output.
    ja: StandardOutputChunk は、所属 StandardOutput によって channel identity が固定され、その stream 内の capture sequence、範囲、encoding、切詰め情報を持つ OutputChunk です。byte が stdout 由来であることだけを保証し、一つの chunk は不完全な行、分割 UTF-8 sequence、構造化出力の一部になり得ます。
  why_needed:
    zh: 需要它为增量显示、背压、截断和上下文选择提供最小可追踪单元，同时保留 stdout 来源，不要求等到整个命令结束才记录输出。
    en: It provides a minimal traceable unit for incremental display, backpressure, truncation, and context selection while retaining stdout origin without waiting for the whole command to finish.
    ja: コマンド全体の終了を待たず stdout 出典を保ち、増分表示、backpressure、切詰め、context selection の最小追跡単位を提供するために必要です。
  includes:
    - zh: 包含明确 part_of 某个 StandardOutput、具有流内序号和实际载荷的捕获块，包括被重定向后仍从逻辑 stdout 收集的块。
      en: Includes captured chunks explicitly part of one StandardOutput, with an in-stream sequence and actual payload, including chunks collected from logical stdout after redirection.
      ja: 一つの StandardOutput の part_of であり、stream 内 sequence と実 payload を持つ capture chunk を含み、redirect 後も論理 stdout から収集した chunk を扱います。
  excludes:
    - zh: 不包含 StandardErrorChunk、整个 StandardOutput 流、ContextSummary、解析后的业务记录，或仅因内容看起来正常而从 stderr 重新分类的分块。
      en: Excludes StandardErrorChunk, the whole StandardOutput stream, ContextSummary, parsed business records, and chunks reclassified from stderr merely because their content looks normal.
      ja: StandardErrorChunk、StandardOutput stream 全体、ContextSummary、parse 済み業務 record、内容が正常に見えるだけで stderr から再分類した chunk を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: StandardOutputChunk-example-positive-001
    kind: positive
    labels:
      zh: 标准输出分块正例
      en: Positive example of standard output chunk
      ja: 標準出力チャンクの正例
    scenario_id: null
    descriptions:
      zh: stdout 采集器第 5 次读取获得 chunk-stdout-005；它在一行末尾之前结束，并切在一个多字节 UTF-8 字符的中间，下一分块负责补全。来自 fd 1 和 sequence=5 共同确定其 StandardOutputChunk 身份。
      en: The fifth stdout collector read yields chunk-stdout-005. It ends before the line terminator and in the middle of a multibyte UTF-8 character, which the next chunk completes; fd 1 origin plus sequence 5 establish its StandardOutputChunk identity.
      ja: stdout collector の 5 回目の read は chunk-stdout-005 を生成し、line terminator 前かつ multibyte UTF-8 character の途中で終わり、次 chunk が補完します。fd 1 由来と sequence 5 が StandardOutputChunk identity を決めます。
    field_values: {}
    related_node_ids:
      - StandardOutputChunk
      - StandardOutput
    related_relation_ids:
      - StandardOutputChunk-part_of-StandardOutput
    expected_result:
      zh: 该读取被识别为 StandardOutputChunk，并在解码时与下一分块连续处理而不改变边界。
      en: The read is classified as a StandardOutputChunk and decoded continuously with the next chunk without rewriting its capture boundary.
      ja: この read は StandardOutputChunk と判定され、capture boundary を書き換えず次 chunk と連続 decode されます。
    why_valid_or_invalid:
      zh: 它具有 stdout 成员资格、连续偏移和一次采集边界；行、字符或 JSON 边界不必与分块边界重合。
      en: It has stdout membership, contiguous offsets, and one capture boundary; line, character, and JSON boundaries need not coincide with the chunk.
      ja: stdout membership、連続 offset、一回の capture boundary を持ち、line・character・JSON 境界との一致は不要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-standard-output-chunk-002
  - id: StandardOutputChunk-example-boundary-001
    kind: boundary
    labels:
      zh: 标准输出分块边界例
      en: Boundary case for standard output chunk
      ja: 標準出力チャンクの境界例
    scenario_id: null
    descriptions:
      zh: chunk-stderr-006 来自 fd 2，内容是正常进度“50% complete”。即使消息没有错误语义，它仍是 StandardErrorChunk，不能因内容友好而归为 StandardOutputChunk。
      en: chunk-stderr-006 comes from fd 2 and contains the benign progress message “50% complete”. Despite having no error semantics, it is a StandardErrorChunk and cannot be reclassified as a StandardOutputChunk.
      ja: chunk-stderr-006 は fd 2 由来で、benign な progress message “50% complete” を含みます。error 意味がなくても StandardErrorChunk であり、StandardOutputChunk へ再分類できません。
    field_values: {}
    related_node_ids:
      - StandardOutputChunk
      - StandardErrorChunk
    related_relation_ids: []
    expected_result:
      zh: 该记录保持 StandardErrorChunk 类型，不建立 StandardOutputChunk 成员资格。
      en: The record remains a StandardErrorChunk and gains no StandardOutputChunk membership.
      ja: この記録は StandardErrorChunk のままで、StandardOutputChunk membership は成立しません。
    why_valid_or_invalid:
      zh: 通道来源是必要种差，消息是否表示错误、进度或数据都不能替代 fd 事实。
      en: Channel origin is the necessary differentia; whether the message expresses an error, progress, or data cannot replace the fd fact.
      ja: channel origin が必要な種差であり、message が error・progress・data のどれを表すかは fd fact を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: StandardOutputChunk-example-instance-001
    kind: instance
    labels:
      zh: 标准输出分块结构化实例
      en: Structured instance of standard output chunk
      ja: 標準出力チャンクの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: chunk-stdout-005 属于 stream-exec-214-fd1，sequence=5，offset=[8192,9216)，capture_boundary=collector-read，decode_state=incomplete-code-point。
      en: chunk-stdout-005 belongs to stream-exec-214-fd1, has sequence 5, offsets [8192,9216), capture_boundary collector-read, and decode_state incomplete-code-point.
      ja: chunk-stdout-005 は stream-exec-214-fd1 に属し、sequence=5、offset=[8192,9216)、capture_boundary=collector-read、decode_state=incomplete-code-point です。
    field_values:
      chunk_id: chunk-stdout-005
      stream_id: stream-exec-214-fd1
      sequence: 5
      start_offset: 8192
      end_offset: 9216
      capture_boundary: collector-read
      decode_state: incomplete-code-point
    related_node_ids:
      - StandardOutputChunk
      - StandardOutput
    related_relation_ids:
      - StandardOutputChunk-part_of-StandardOutput
    expected_result:
      zh: 实例作为 StandardOutput 的第五个 StandardOutputChunk 被检索，并等待下一分块完成解码。
      en: The instance is retrieved as the fifth StandardOutputChunk in its StandardOutput stream and awaits the next chunk for decoding completion.
      ja: instance は StandardOutput stream の五番目の StandardOutputChunk として取得され、次 chunk で decode 完了を待ちます。
    why_valid_or_invalid:
      zh: stdout 流身份、连续范围、序号和采集边界均明确；不完整字符是状态而非分类失败。
      en: stdout stream identity, contiguous range, sequence, and capture boundary are explicit; an incomplete character is state, not a classification failure.
      ja: stdout stream identity、連続範囲、sequence、capture boundary が明示され、不完全 character は state であって分類失敗ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StandardErrorChunk
    shared_parent_concept_id: OutputChunk
    differentia:
      zh: 共享父节点对照：父节点 OutputChunk：StandardOutputChunk（semantic kind=information，骨架 StandardOutputChunk-is_a-OutputChunk）；StandardErrorChunk（semantic kind=information，骨架 StandardErrorChunk-is_a-OutputChunk）。双端条件：StandardOutputChunk 条件：“标准输出分块是以如下事实为区分特征的输出分块：它表示带有顺序、来源片段、截断和上下文选择元数据的有边界标准输出片段”；StandardErrorChunk 条件：“标准错误分块是一种输出分块；其区分条件是：它表示带有顺序、诊断含义、来源片段、截断和上下文选择元数据的有边界标准错误片段”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent OutputChunk: StandardOutputChunk (semantic kind=information, backbone StandardOutputChunk-is_a-OutputChunk); StandardErrorChunk (semantic kind=information, backbone StandardErrorChunk-is_a-OutputChunk). Endpoint conditions: StandardOutputChunk condition: “Standard output chunk is an output chunk; its differentiating condition is that it represents a bounded stdout segment with ordering, source span, truncation, and context-selection metadata”; StandardErrorChunk condition: “As an output chunk, Standard error chunk is distinguished by the fact that it represents a bounded stderr segment with ordering, diagnostic meaning, source span, truncation, and context-selection metadata”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 OutputChunk：StandardOutputChunk（semantic kind=information、バックボーン StandardOutputChunk-is_a-OutputChunk）；StandardErrorChunk（semantic kind=information、バックボーン StandardErrorChunk-is_a-OutputChunk）。両端条件：StandardOutputChunk の条件：「標準出力チャンクは出力チャンクの一種であり、次の条件で区別されます：それは、順序、出典断片、切り詰め、コンテキスト選択メタデータを持つ境界付きの標準出力部分です」；StandardErrorChunk の条件：「出力チャンクに属する標準エラーチャンクは、次の事実を種差とします：それは、順序、診断上の意味、出典断片、切り詰め、コンテキスト選択メタデータを持つ境界付きの標準エラー部分です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-standard-output-chunk-003
parent_relation:
