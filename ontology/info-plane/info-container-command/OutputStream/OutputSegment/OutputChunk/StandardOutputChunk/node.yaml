source_claims:
  - id: claim-standard-output-chunk-001
    source: eng-std-posix-shell-2024
    supports: POSIX identifies standard output by file descriptor 1 and streams by ordered bytes. StandardOutputChunk is an OutputChunk whose containing stream is stdout; collector boundary, sequence, and decode state are Moonweave capture metadata. Owner info-container-command, semantic kind information, and backbone StandardOutputChunk-is_a-OutputChunk are Moonweave design inferences.
    locator: POSIX.1-2024 Base Definitions §3.355 and §3.357 > Standard Output; Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-002
    source: eng-std-posix-shell-2024
    supports: POSIX binds standard output to file descriptor 1 and defines a stream as ordered bytes. A collector read may therefore be preserved as an ordered stdout chunk even when it does not align with higher-level text or encoding boundaries.
    locator: POSIX.1-2024 Base Definitions §3.355 and §3.357 > Standard Output; Stream
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-003
    source: eng-std-posix-shell-2024
    supports: POSIX's separate standard-output and standard-error streams determine chunk specialization by containing channel. Text that looks diagnostic can remain stdout, and benign text can remain stderr.
    locator: POSIX.1-2024 Base Definitions §3.353, §3.355, and §3.357
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-004
    source: eng-std-posix-shell-2024
    supports: "StandardOutputChunk-is_a-OutputChunk: The accepted record is Chunk out-6-4 records channel=stdout, sequence=4, byte_range=1536..2047, and parent_segment=out-seg-6. POSIX assigns standard output to file descriptor 1; a chunk subtype preserves that channel while adding bounded transport identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-005
    source: eng-std-posix-shell-2024
    supports: "StandardOutputChunk-is_a-OutputChunk: The rejected record is outside the relation because Sequence and range cannot override an explicit output-channel difference. POSIX assigns standard output to file descriptor 1; a chunk subtype preserves that channel while adding bounded transport identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-006
    source: eng-std-posix-shell-2024
    supports: "StandardOutputChunk-is_a-OutputChunk: The official material supports the operational distinction used by this edge. POSIX assigns standard output to file descriptor 1; a chunk subtype preserves that channel while adding bounded transport identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-007
    source: eng-std-posix-shell-2024
    supports: "StandardOutputChunk-part_of-StandardOutput: The accepted record is out-chunk-8-2 has stream_id=stdout-8, execution_id=exec-8, and channel=stdout, exactly matching StandardOutput stdout-8. POSIX distinguishes standard output by file descriptor; Moonweave additionally keys each stream to one execution so chunks cannot cross stream identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-008
    source: eng-std-posix-shell-2024
    supports: "StandardOutputChunk-part_of-StandardOutput: The rejected record is outside the relation because The same channel type does not imply membership in the same concrete stream. POSIX distinguishes standard output by file descriptor; Moonweave additionally keys each stream to one execution so chunks cannot cross stream identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-standard-output-chunk-009
    source: eng-std-posix-shell-2024
    supports: "StandardOutputChunk-part_of-StandardOutput: The official material supports the operational distinction used by this edge. POSIX distinguishes standard output by file descriptor; Moonweave additionally keys each stream to one execution so chunks cannot cross stream identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.7 Redirection and §2.7.2 Redirecting Output
    evidence_kind: normative
    confidence: high
    review_status: accepted

