schema: moonweave.ai/ontology-node/v1
id: StandardOutputChunk
kind: concept
labels:
  zh: 标准输出分块
  en: standard output chunk
  ja: 標準出力チャンク
semantics:
  short_definition:
    zh: stdout 通道的 OutputChunk 特化。
    en: OutputChunk specialization for the stdout channel.
    ja: stdout channel OutputChunk 特化。
  definition:
    zh: StandardOutputChunk 记录 stdout text/binary payload 与 chunk_sequence；MCP Tool Result 默认首 chunk。
    en: StandardOutputChunk records stdout text/binary payload and chunk_sequence; MCP Tool Result defaults to first chunk.
    ja: stdout chunk with sequence。
  why_needed:
    zh: stdout chunk 类型化使 stderr 分块不会混入 stdout 重组。
    en: Typing stdout chunks prevents stderr fragments from entering stdout reassembly.
    ja: stdout-only reassembly。
  includes:
    - zh: chunk_sequence、text payload ref、observation_id。
      en: chunk_sequence, text payload ref, observation_id.
      ja: sequence/text/observation。
  excludes:
    - zh: stderr chunks、exit code。
      en: stderr chunks and exit code.
      ja: stderr/exit code。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: MCP ls text→StandardOutputChunk seq 0 cross-link TextBlock。
    en: MCP ls text→StandardOutputChunk seq 0 cross-link TextBlock.
    ja: MCP stdout chunk mapping。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
