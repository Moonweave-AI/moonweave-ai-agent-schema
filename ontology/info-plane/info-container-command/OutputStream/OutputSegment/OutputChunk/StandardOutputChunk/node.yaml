    en: "A standard-output chunk is an OutputChunk specialized to the stdout channel and must carry its parent segment or stream, stable sequence, and bounded range. Its rejection boundary is: Sequence and range cannot override an explicit output-channel difference."
    ja: 標準出力チャンクは stdout チャネルに特化した OutputChunk で、親セグメントまたは親ストリーム、安定順序、境界範囲を持ちます。 拒否境界は次のとおりです。順序と範囲は明示的な出力チャネル差を上書きできません。
