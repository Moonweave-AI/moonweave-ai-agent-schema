    zh: 标准输出分块是 OutputChunk 的通道特化，必须具有 stdout 通道、父段或父流、稳定序号和有界范围。
    en: A standard-output chunk is an OutputChunk specialized to the stdout channel and must carry its parent segment or stream, stable sequence, and bounded range.
    ja: 標準出力チャンクは stdout チャネルに特化した OutputChunk で、親セグメントまたは親ストリーム、安定順序、境界範囲を持ちます。
