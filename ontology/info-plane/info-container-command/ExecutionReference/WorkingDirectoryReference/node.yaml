schema: moonweave.ai/ontology-node/v1
id: WorkingDirectoryReference
kind: concept
labels:
  zh: 工作目录引用
  en: working directory reference
  ja: 作業ディレクトリ参照
semantics:
  short_definition:
    zh: 指向命令或进程工作目录的 ExecutionReference 特化。
    en: ExecutionReference specialization pointing at command or process working directory.
    ja: command/process working directory を指す ExecutionReference 特化。
  definition:
    zh: WorkingDirectoryReference 记录 cwd 路径或 URI（如 /workspace/app、file:///workspace）；Cursor/Claude Code 终端工具返回 cwd 作为观测语境。
    en: WorkingDirectoryReference records cwd path or URI such as /workspace/app or file:///workspace; Cursor/Claude Code terminal tools return cwd as observation context.
    ja: shell cwd/path reference。
  why_needed:
    zh: 相对路径命令输出需要 cwd 才能正确解释。
    en: Relative-path command output needs cwd for correct interpretation.
    ja: cwd for relative path interpretation。
  includes:
    - zh: working_directory_path 或 URI、execution_reference_id。
      en: working_directory_path or URI, execution_reference_id.
      ja: path/URI/exec ref。
  excludes:
    - zh: EnvironmentBindingReference、OutputStream 内容。
      en: EnvironmentBindingReference and OutputStream content.
      ja: env binding/stream content。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: agent terminal tool 返回 cwd=/workspace/app 与 ls 输出；Moonweave WorkingDirectoryReference 绑定 exec-ref-build-17。
    en: Agent terminal tool returns cwd=/workspace/app with ls output; Moonweave WorkingDirectoryReference binds exec-ref-build-17.
    ja: terminal cwd binding。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
