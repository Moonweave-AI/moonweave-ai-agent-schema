sibling_differentiation:
  - sibling_concept_id: EnvironmentBindingReference
    shared_parent_concept_id: ExecutionReference
    differentia:
      zh: 共享父节点对照：父节点 ExecutionReference：WorkingDirectoryReference（semantic kind=information，骨架 WorkingDirectoryReference-is_a-ExecutionReference）；EnvironmentBindingReference（semantic kind=information，骨架 EnvironmentBindingReference-is_a-ExecutionReference）。双端条件：WorkingDirectoryReference 条件：“作为执行引用，工作目录引用由这一事实区分：它记录与观测执行输出相关的工作目录，而不把目录本身建模为进入上下文的产物”；EnvironmentBindingReference 条件：“环境绑定引用是以如下事实为区分特征的执行引用：它记录与观测执行输出相关的运行环境绑定，同时默认不暴露隐藏值或密钥值”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent ExecutionReference: WorkingDirectoryReference (semantic kind=information, backbone WorkingDirectoryReference-is_a-ExecutionReference); EnvironmentBindingReference (semantic kind=information, backbone EnvironmentBindingReference-is_a-ExecutionReference). Endpoint conditions: WorkingDirectoryReference condition: “Working directory reference belongs to the execution reference category and differs from broader members in that it references the working directory relevant to observed execution output without making the directory itself a context-ingress artifact”; EnvironmentBindingReference condition: “Environment binding reference is an execution reference; its differentiating condition is that it references a runtime environment binding relevant to observed execution output without exposing hidden or secret values by default”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 ExecutionReference：WorkingDirectoryReference（semantic kind=information、バックボーン WorkingDirectoryReference-is_a-ExecutionReference）；EnvironmentBindingReference（semantic kind=information、バックボーン EnvironmentBindingReference-is_a-ExecutionReference）。両端条件：WorkingDirectoryReference の条件：「作業ディレクトリ参照は実行参照として、次の条件により他の対象と区別されます：それは、観測された実行出力に関係する作業ディレクトリを記録し、ディレクトリ自体をコンテキスト取り込み成果物としては扱いません」；EnvironmentBindingReference の条件：「環境バインディング参照は実行参照の一種であり、次の条件で区別されます：環境束縛参照は、観測された実行出力に関係する実行環境の束縛を記録し、隠れた値や秘密値は既定では公開しません」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-working-directory-reference-003
