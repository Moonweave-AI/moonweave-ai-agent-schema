    related_relation_ids: []
    source_claims:
      - claim-wdref-design
  - id: WorkingDirectoryReference-example-relative-ls
    labels:
      zh: 相对路径 ls
      en: Relative path ls
      ja: relative path ls
    descriptions:
      zh: cwd=/workspace 下 ls docs 输出需 WorkingDirectoryReference 解释相对路径。
      en: ls docs output under cwd=/workspace needs WorkingDirectoryReference to interpret relative paths.
      ja: relative path context。
    example_source:
      product: POSIX
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      version: cwd
    field_values: {}
    related_node_ids:
      - WorkingDirectoryReference
