schema: moonweave.ai/ontology-node/v1
id: WorkingDirectoryReference
kind: concept
status: accepted
labels:
  zh: 工作目录引用
  en: working directory reference
  ja: 作業ディレクトリ参照
semantics:
  short_definition:
    zh: 指向一次执行解析相对路径时所用基准目录的执行引用。
    en: An execution reference to the base directory used to resolve relative paths for one run.
    ja: 一回の実行で相対 path の解決基準となった directory を指す実行参照。
  definition:
    zh: 工作目录引用是一种 ExecutionReference，保存运行环境命名空间中的路径或 URI、适用的执行/尝试关联键及必要的解析边界，从而指向该次执行用于相对路径解析和默认文件操作的 WorkingDirectory。它不包含目录内容，也不授予读取权限。
    en: A WorkingDirectoryReference is an ExecutionReference carrying a path or URI in a runtime-environment namespace, the applicable execution or attempt correlation key, and required resolution boundary, thereby pointing to the WorkingDirectory used for relative-path resolution and default file operations. It contains no directory contents and grants no read authority.
    ja: WorkingDirectoryReference は、実行環境 namespace 内の path または URI、適用 execution/attempt 相関 key、必要な解決境界を保持し、相対 path 解決と既定 file 操作に使った WorkingDirectory を指す ExecutionReference です。directory 内容を含まず、読取権限も付与しません。
  why_needed:
    zh: 需要它解释相对路径、命令搜索结果和文件副作用，同时避免把宿主绝对路径、目录清单或文件内容无条件暴露给上下文消费者。
    en: It explains relative paths, command-resolution results, and file side effects without unconditionally exposing host absolute paths, directory listings, or file contents to context consumers.
    ja: 相対 path、command resolution、file 副作用を説明しつつ、host 絶対 path、directory listing、file 内容を context consumer へ無条件開示しないために必要です。
  includes:
    - zh: 包含能在指定容器、沙箱或远程工作区命名空间中解析到一个基准目录，并标明其适用执行范围的 path/URI 引用。
      en: Includes path or URI references that resolve to one base directory in a named container, sandbox, or remote-workspace namespace and state the execution scope to which they apply.
      ja: 指定 container、sandbox、remote workspace namespace 内で一つの基準 directory へ解決し、適用 execution scope を示す path/URI 参照を含みます。
  excludes:
    - zh: 不包含 WorkingDirectory 本身、目录内容、文件资源、RuntimeEnvironment、EnvironmentBindingReference 或代表仓库根但未被该次执行采用的候选路径。
      en: Excludes WorkingDirectory itself, directory contents, file resources, RuntimeEnvironment, EnvironmentBindingReference, and a candidate repository root not actually used by the execution.
      ja: WorkingDirectory 自体、directory 内容、file resource、RuntimeEnvironment、EnvironmentBindingReference、その実行で実際に使われなかった候補 repository root を含みません。
  semantic_kind: information
  aliases: []
