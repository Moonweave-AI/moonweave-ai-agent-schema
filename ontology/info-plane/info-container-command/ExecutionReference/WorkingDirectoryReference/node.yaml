  - id: WorkingDirectoryReference-example-not-env
    labels:
      zh: 非环境变量
      en: Not environment
      ja: environment ではない
    descriptions:
      zh: PATH 变量属于 EnvironmentBindingReference 不是 WorkingDirectoryReference。
      en: PATH variable belongs to EnvironmentBindingReference not WorkingDirectoryReference.
      ja: PATH→env binding。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - WorkingDirectoryReference
      - EnvironmentBindingReference
    related_relation_ids: []
    source_claims:
      - claim-wdref-design
parent_relation:
  id: WorkingDirectoryReference-is_a-ExecutionReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种工作目录引用
    en: is a working-directory reference
    ja: 作業ディレクトリ参照の一種
  definitions:
    zh: 工作目录引用是执行引用的一种，定位某次命令执行解析相对路径时使用的目录身份或快照，而不是目录内容或输出中的任意路径字符串。
    en: A working-directory reference is an execution reference that identifies the directory or snapshot used to resolve relative paths for a particular command execution, not directory content or any path string appearing in output.
    ja: 作業ディレクトリ参照は、特定のコマンド実行で相対パス解決に使われたディレクトリまたはスナップショットを識別する実行参照で、内容や出力中の任意パスではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: WorkingDirectoryReference-is_a-ExecutionReference-example-positive-001
      labels:
        zh: 是一种工作目录引用正例
        en: "Accepted case: is a working-directory reference"
        ja: 作業ディレクトリ参照の一種の受理例
      descriptions:
        zh: cwd_ref=workspace://run-17/tree-a/subdir 指向 exec-17 启动时固定的工作树快照和子目录。
        en: cwd_ref=workspace://run-17/tree-a/subdir identifies the workspace snapshot and subdirectory fixed when exec-17 started.
        ja: cwd_ref=workspace://run-17/tree-a/subdir は exec-17 開始時に固定されたワークスペーススナップショットとサブディレクトリを示します。
      field_values: {}
      related_node_ids:
        - WorkingDirectoryReference
        - ExecutionReference
      related_relation_ids:
        - WorkingDirectoryReference-is_a-ExecutionReference
      source_claims:
        - claim-working-directory-reference-004
    - id: WorkingDirectoryReference-is_a-ExecutionReference-example-boundary-001
      labels:
        zh: 是一种工作目录引用拒绝边界
        en: "Rejection boundary: is a working-directory reference"
        ja: 作業ディレクトリ参照の一種の拒否境界
      descriptions:
        zh: stdout 中出现字符串 /tmp/build，但没有表明命令从该目录启动或提供目录引用。
        en: The string /tmp/build appears in stdout, but nothing says the command started there or provides a directory reference.
        ja: stdout に /tmp/build という文字列がありますが、そこからコマンドが開始した証拠やディレクトリ参照はありません。
      field_values: {}
      related_node_ids:
        - WorkingDirectoryReference
        - ExecutionReference
      related_relation_ids:
        - WorkingDirectoryReference-is_a-ExecutionReference
      source_claims:
        - claim-working-directory-reference-005
  source_claims:
    - claim-working-directory-reference-006
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: src-posix-exit-status
    title: POSIX Shell Command Language — Exit Status
    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    source_type: standard
    relevance: stdout/stderr and exit codes.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-working-directory-reference-001
    source: eng-std-posix-shell-2024
    supports: POSIX makes the current working directory part of the shell execution environment. WorkingDirectoryReference records the directory actually used by one execution attempt through a locator and runtime namespace, without embedding its contents or granting access. Owner info-container-command, semantic kind information, and backbone WorkingDirectoryReference-is_a-ExecutionReference are Moonweave design inferences.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
  - id: claim-working-directory-reference-002
    source: eng-std-posix-shell-2024
    supports: POSIX includes the current working directory in the shell execution environment and specifies that command execution uses that environment. The example preserves the actual directory used by one attempt as a namespaced reference rather than embedding directory contents.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
  - id: claim-working-directory-reference-003
    source: eng-std-posix-shell-2024
    supports: POSIX lists the current working directory and exported variables as distinct parts of the shell execution environment. WorkingDirectoryReference therefore points to the directory locator, while EnvironmentBindingReference identifies one named binding and scope.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
  - id: claim-working-directory-reference-004
    source: eng-std-posix-shell-2024
    supports: "WorkingDirectoryReference-is_a-ExecutionReference: The accepted record is cwd_ref=workspace://run-17/tree-a/subdir identifies the workspace snapshot and subdirectory fixed when exec-17 started. POSIX shell execution environments include a current working directory used by command execution; Moonweave references that execution-scoped directory explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.12 Shell Execution Environment
    evidence_kind: normative
    confidence: high
  - id: claim-working-directory-reference-005
    source: eng-std-posix-shell-2024
    supports: "WorkingDirectoryReference-is_a-ExecutionReference: The rejected record is outside the relation because Path content is not the identity of the working directory actually used by the execution. POSIX shell execution environments include a current working directory used by command execution; Moonweave references that execution-scoped directory explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.12 Shell Execution Environment
    evidence_kind: normative
    confidence: high
  - id: claim-working-directory-reference-006
    source: eng-std-posix-shell-2024
    supports: "WorkingDirectoryReference-is_a-ExecutionReference: The official material supports the operational distinction used by this edge. POSIX shell execution environments include a current working directory used by command execution; Moonweave references that execution-scoped directory explicitly. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: POSIX.1-2024 Shell Command Language, §2.12 Shell Execution Environment
    evidence_kind: normative
    confidence: high
  - id: claim-wdref-posix
    source: src-posix-exit-status
    supports: Shell commands execute relative to a working directory context.
    locator: working directory
    evidence_kind: standard
    confidence: high
  - id: claim-wdref-design
    source: src-info-container-design
    supports: WorkingDirectoryReference records cwd separate from environment bindings.
    locator: WorkingDirectoryReference
    evidence_kind: design-inference
    confidence: high
