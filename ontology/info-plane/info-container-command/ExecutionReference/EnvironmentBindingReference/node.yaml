schema: moonweave.ai/ontology-node/v1
id: EnvironmentBindingReference
kind: concept
status: accepted
labels:
  zh: 环境绑定引用
  en: environment binding reference
  ja: 環境バインディング参照
semantics:
  short_definition:
    zh: 指向一次执行所使用的环境变量绑定、但不复制敏感值的执行引用。
    en: An execution reference to an environment-variable binding used by a run without copying its sensitive value.
    ja: 実行が使用した環境変数束縛を指し、機微な値を複製しない実行参照。
  definition:
    zh: 环境绑定引用是一种 ExecutionReference，用变量名、作用域和不可逆摘要或密钥引用标识某次命令执行实际采用的环境绑定。它可以证明“使用了哪个绑定版本”，但不得承载明文密钥，也不是 RuntimeEnvironment 或环境变量值本身。
    en: An EnvironmentBindingReference is an ExecutionReference that identifies the environment binding actually used by a command through its variable name, scope, and an irreversible digest or secret reference. It can evidence which binding version was used, but it carries no plaintext secret and is neither the RuntimeEnvironment nor the variable value itself.
    ja: EnvironmentBindingReference は、変数名、作用域、不可逆 digest または secret reference によりコマンド実行が実際に用いた環境束縛を識別する ExecutionReference です。どの束縛版を使ったかを証明できますが、平文 secret を保持せず、RuntimeEnvironment や変数値そのものでもありません。
  why_needed:
    zh: 需要它在不泄露凭据的前提下解释输出差异并支持重放：环境绑定会影响命令搜索、区域设置和程序行为，但审计记录不应把秘密复制进上下文。
    en: "It supports replay and explanation of output differences without credential disclosure: environment bindings affect command search, locale, and program behavior, but audit context must not duplicate secrets."
    ja: 認証情報を漏らさずに出力差異の説明と再生を行うために必要です。環境束縛はコマンド検索、locale、プログラム動作へ影響しますが、監査コンテキストへ secret を複製してはなりません。
  includes:
    - zh: 包含可解析到特定执行作用域的变量名、绑定版本或密钥引用，以及值是否存在和是否被遮蔽的信息；例如 PATH 版本摘要或 API_TOKEN 的 secret-manager key。
      en: Includes a variable name resolvable in a specific execution scope, a binding version or secret reference, and presence/redaction metadata, such as a PATH digest or an API_TOKEN secret-manager key.
      ja: 特定実行作用域で解決できる変数名、束縛版または secret reference、存在・秘匿 metadata を含みます。例は PATH の digest や API_TOKEN の secret-manager key です。
  excludes:
    - zh: 不包含明文密码、令牌或证书，不把整个 RuntimeEnvironment、普通配置文档、WorkingDirectoryReference 或 ExecutionResultReference 归入本类。
      en: Excludes plaintext passwords, tokens, and certificates, the RuntimeEnvironment as a whole, ordinary configuration documents, WorkingDirectoryReference, and ExecutionResultReference.
      ja: 平文 password・token・certificate、RuntimeEnvironment 全体、通常の設定文書、WorkingDirectoryReference、ExecutionResultReference を含みません。
  semantic_kind: information
  aliases: []
