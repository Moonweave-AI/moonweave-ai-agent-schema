schema: moonweave.ai/ontology-node/v1
id: EnvironmentBindingReference
kind: concept
labels:
  zh: 环境绑定引用
  en: environment binding reference
  ja: 環境バインディング参照
semantics:
  short_definition:
    zh: 指向命令或进程环境变量绑定的 ExecutionReference 特化。
    en: ExecutionReference specialization pointing at environment variable bindings for a command or process.
    ja: command/process environment variable binding を指す ExecutionReference 特化。
  definition:
    zh: EnvironmentBindingReference 记录 env key/value 快照（如 NODE_ENV=test、PATH=...）；Docker container env 与 E2B sandbox env 亦映射此类型。
    en: EnvironmentBindingReference records env key/value snapshots such as NODE_ENV=test and PATH=...; Docker container env and E2B sandbox env also map here.
    ja: env binding snapshot for shell/container/sandbox。
  why_needed:
    zh: 相同命令在不同 env 下输出不同，观测必须保留 env 语境。
    en: The same command yields different output under different env; observations must retain env context.
    ja: env context for output interpretation。
  includes:
    - zh: env_bindings map、redaction markers for secrets。
      en: env_bindings map and redaction markers for secrets.
      ja: env map/secret redaction。
  excludes:
    - zh: WorkingDirectoryReference、完整 shell profile 文件正文。
      en: WorkingDirectoryReference and full shell profile file bodies.
      ja: cwd/profile body。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: exec-ref-build-17 env NODE_ENV=test；secrets 必须 redact 不得明文写入 observation。
    en: exec-ref-build-17 env NODE_ENV=test; secrets must be redacted not stored plaintext in observations.
    ja: env snapshot with redaction。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
