parent_relation:
  id: EnvironmentBindingReference-is_a-ExecutionReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种执行环境引用
    en: is an execution-environment reference
    ja: 実行環境参照の一種
  definitions:
    zh: 环境绑定引用是执行引用的一种，标识某次运行使用的环境变量绑定或其脱敏快照，而不承载变量的秘密值。
    en: An environment-binding reference is an execution reference that identifies the environment-variable binding set or redacted snapshot used by a run without carrying secret values.
    ja: 環境バインディング参照は、実行で使われた環境変数バインディング集合または秘匿化スナップショットを識別し、秘密値を保持しない実行参照です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EnvironmentBindingReference-is_a-ExecutionReference-example-positive-001
      labels:
        zh: 是一种执行环境引用正例
        en: "Accepted case: is an execution-environment reference"
        ja: 実行環境参照の一種の受理例
      descriptions:
        zh: env_ref=env-snapshot://run-9/v3 指向 run-9 的脱敏环境快照，字段只列变量名和版本哈希。
        en: env_ref=env-snapshot://run-9/v3 identifies run-9's redacted environment snapshot and exposes only variable names and a version hash.
        ja: env_ref=env-snapshot://run-9/v3 は run-9 の秘匿化環境スナップショットを示し、変数名と版ハッシュだけを公開します。
      field_values: {}
      related_node_ids:
        - EnvironmentBindingReference
        - ExecutionReference
      related_relation_ids:
        - EnvironmentBindingReference-is_a-ExecutionReference
      source_claims:
        - claim-environment-binding-reference-005
    - id: EnvironmentBindingReference-is_a-ExecutionReference-example-boundary-001
      labels:
        zh: 是一种执行环境引用拒绝边界
        en: "Rejection boundary: is an execution-environment reference"
        ja: 実行環境参照の一種の拒否境界
      descriptions:
        zh: 字符串 API_KEY=sk-live-… 直接包含环境变量值，但没有快照标识或引用语义。
        en: The string API_KEY=sk-live-… contains an environment value directly and has no snapshot identifier or reference semantics.
        ja: 文字列 API_KEY=sk-live-… は環境値を直接含み、スナップショット ID や参照意味を持ちません。
      field_values: {}
      related_node_ids:
        - EnvironmentBindingReference
        - ExecutionReference
      related_relation_ids:
        - EnvironmentBindingReference-is_a-ExecutionReference
      source_claims:
        - claim-environment-binding-reference-006
  source_claims:
