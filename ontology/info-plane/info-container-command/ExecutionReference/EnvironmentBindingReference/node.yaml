sibling_differentiation:
  - sibling_concept_id: ExecutionResultReference
    shared_parent_concept_id: ExecutionReference
    differentia:
      zh: 端点特定对照：父节点 ExecutionReference：EnvironmentBindingReference（semantic kind=information，骨架 EnvironmentBindingReference-is_a-ExecutionReference）；ExecutionResultReference（semantic kind=information，骨架 ExecutionResultReference-is_a-ExecutionReference）。双端条件：EnvironmentBindingReference 条件：“环境绑定引用是以如下事实为区分特征的执行引用：它记录与观测执行输出相关的运行环境绑定，同时默认不暴露隐藏值或密钥值”；ExecutionResultReference 条件：“执行结果引用属于执行引用，区别于其他同类对象的条件是：它指向其可观察输出或状态正在被暂存进上下文的运行结果或工具执行结果”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ExecutionReference: EnvironmentBindingReference (semantic kind=information, backbone EnvironmentBindingReference-is_a-ExecutionReference); ExecutionResultReference (semantic kind=information, backbone ExecutionResultReference-is_a-ExecutionReference). Endpoint conditions: EnvironmentBindingReference condition: “Environment binding reference is an execution reference; its differentiating condition is that it references a runtime environment binding relevant to observed execution output without exposing hidden or secret values by default”; ExecutionResultReference condition: “Execution result reference is an execution reference whose defining condition is that it references a runtime or tool execution result whose observable output or status is being staged into context”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ExecutionReference：EnvironmentBindingReference（semantic kind=information、バックボーン EnvironmentBindingReference-is_a-ExecutionReference）；ExecutionResultReference（semantic kind=information、バックボーン ExecutionResultReference-is_a-ExecutionReference）。両端条件：EnvironmentBindingReference の条件：「環境バインディング参照は実行参照の一種であり、次の条件で区別されます：環境束縛参照は、観測された実行出力に関係する実行環境の束縛を記録し、隠れた値や秘密値は既定では公開しません」；ExecutionResultReference の条件：「実行結果参照は実行参照のうち、次の事実を定義条件とする対象です：それは、観測可能な出力または状態がコンテキストへステージングされている実行結果またはツール実行結果を指します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-environment-binding-reference-003
      - claim-environment-binding-reference-004
