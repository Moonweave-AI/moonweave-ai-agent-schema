schema: moonweave.ai/ontology-node/v1
id: EnvironmentBindingReference
kind: concept
status: accepted
labels:
  zh: 环境绑定引用
  en: environment binding reference
  ja: 環境バインディング参照
semantics:
  short_definition:
    zh: 指向一次执行所使用的环境变量绑定、但不复制敏感值的执行引用。
    en: An execution reference to an environment-variable binding used by a run without copying its sensitive value.
    ja: 実行が使用した環境変数束縛を指し、機微な値を複製しない実行参照。
  definition:
    zh: 环境绑定引用是一种 ExecutionReference，用变量名、作用域和不可逆摘要或密钥引用标识某次命令执行实际采用的环境绑定。它可以证明“使用了哪个绑定版本”，但不得承载明文密钥，也不是 RuntimeEnvironment 或环境变量值本身。
    en: An EnvironmentBindingReference is an ExecutionReference that identifies the environment binding actually used by a command through its variable name, scope, and an irreversible digest or secret reference. It can evidence which binding version was used, but it carries no plaintext secret and is neither the RuntimeEnvironment nor the variable value itself.
    ja: EnvironmentBindingReference は、変数名、作用域、不可逆 digest または secret reference によりコマンド実行が実際に用いた環境束縛を識別する ExecutionReference です。どの束縛版を使ったかを証明できますが、平文 secret を保持せず、RuntimeEnvironment や変数値そのものでもありません。
  why_needed:
    zh: 需要它在不泄露凭据的前提下解释输出差异并支持重放：环境绑定会影响命令搜索、区域设置和程序行为，但审计记录不应把秘密复制进上下文。
    en: "It supports replay and explanation of output differences without credential disclosure: environment bindings affect command search, locale, and program behavior, but audit context must not duplicate secrets."
    ja: 認証情報を漏らさずに出力差異の説明と再生を行うために必要です。環境束縛はコマンド検索、locale、プログラム動作へ影響しますが、監査コンテキストへ secret を複製してはなりません。
  includes:
    - zh: 包含可解析到特定执行作用域的变量名、绑定版本或密钥引用，以及值是否存在和是否被遮蔽的信息；例如 PATH 版本摘要或 API_TOKEN 的 secret-manager key。
      en: Includes a variable name resolvable in a specific execution scope, a binding version or secret reference, and presence/redaction metadata, such as a PATH digest or an API_TOKEN secret-manager key.
      ja: 特定実行作用域で解決できる変数名、束縛版または secret reference、存在・秘匿 metadata を含みます。例は PATH の digest や API_TOKEN の secret-manager key です。
  excludes:
    - zh: 不包含明文密码、令牌或证书，不把整个 RuntimeEnvironment、普通配置文档、WorkingDirectoryReference 或 ExecutionResultReference 归入本类。
      en: Excludes plaintext passwords, tokens, and certificates, the RuntimeEnvironment as a whole, ordinary configuration documents, WorkingDirectoryReference, and ExecutionResultReference.
      ja: 平文 password・token・certificate、RuntimeEnvironment 全体、通常の設定文書、WorkingDirectoryReference、ExecutionResultReference を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: EnvironmentBindingReference-example-positive-001
    kind: positive
    labels:
      zh: 环境绑定引用正例
      en: Positive example of environment binding reference
      ja: 環境バインディング参照の正例
    scenario_id: null
    descriptions:
      zh: env-ref-44 说明 command-exec-214 使用运行作用域 run-88 中的 PATH 绑定版本 sha256:7a…，并记录 API_TOKEN 来自 secret://agent/prod/token-v3 且值已遮蔽；引用没有复制任何变量值。
      en: env-ref-44 states that command-exec-214 used the PATH binding version sha256:7a… in run scope run-88 and that API_TOKEN came from secret://agent/prod/token-v3 with its value redacted; the reference copies no variable value.
      ja: env-ref-44 は command-exec-214 が run scope run-88 の PATH 束縛版 sha256:7a… を使用し、API_TOKEN が secret://agent/prod/token-v3 由来で値は秘匿済みと示します。参照は変数値を複製しません。
    field_values:
      reference_id: env-ref-44
      reference_kind: environment-binding
      locator: mw://runtime/run-88/environment@sha256:7a
      target_namespace: run-88
      visibility: metadata-only
    related_node_ids:
      - EnvironmentBindingReference
      - ExecutionReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference
    expected_result:
      zh: env-ref-44 归为 EnvironmentBindingReference；审计可比较绑定版本，但上下文中看不到 secret 明文。
      en: env-ref-44 is an EnvironmentBindingReference; an audit can compare binding versions while plaintext secrets remain unavailable to context.
      ja: env-ref-44 は EnvironmentBindingReference であり、監査は束縛版を比較できますが context には平文 secret が見えません。
    why_valid_or_invalid:
      zh: 记录能解析到实际执行作用域中的绑定版本，并以摘要或密钥引用代替敏感值，满足引用而非复制的边界。
      en: The record resolves to binding versions in the actual execution scope and substitutes digests or secret references for sensitive values, satisfying the reference-not-copy boundary.
      ja: 実行作用域の束縛版へ解決し、機微値を digest または secret reference で置換して、参照であって複製ではない境界を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-environment-binding-reference-002
  - id: EnvironmentBindingReference-example-boundary-001
    kind: boundary
    labels:
      zh: 环境绑定引用边界例
      en: Boundary case for environment binding reference
      ja: 環境バインディング参照の境界例
    scenario_id: null
    descriptions:
      zh: 一条调试记录把完整的 API_TOKEN=sk-live-… 连同其他环境变量复制进 CommandOutputObservation；它虽然描述环境，却是敏感值泄露，不是合法 EnvironmentBindingReference。
      en: A debug record copies the complete API_TOKEN=sk-live-… and other environment values into a CommandOutputObservation. Although it describes the environment, it is a sensitive-value disclosure, not a valid EnvironmentBindingReference.
      ja: debug 記録が完全な API_TOKEN=sk-live-… と他環境値を CommandOutputObservation へ複製しています。環境を記述していても機微値の漏洩であり、適法な EnvironmentBindingReference ではありません。
    field_values: {}
    related_node_ids:
      - EnvironmentBindingReference
      - ExecutionReference
      - ExecutionResultReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference
    expected_result:
      zh: 拒绝将该记录归为 EnvironmentBindingReference，并触发秘密脱敏；只有遮蔽后的绑定定位信息可保留。
      en: Reject EnvironmentBindingReference classification and trigger secret redaction; only redacted binding-location information may remain.
      ja: EnvironmentBindingReference 分類を拒否し secret redaction を起動し、秘匿済み束縛位置情報だけを残します。
    why_valid_or_invalid:
      zh: 本概念的核心是安全地指向绑定；复制明文值既越过引用边界，也违反默认不披露秘密的约束。
      en: The concept safely points to a binding; copying plaintext crosses the reference boundary and violates the default no-secret-disclosure constraint.
      ja: 本概念は束縛を安全に指すもので、平文の複製は参照境界を越え、既定の secret 非開示制約にも反します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: EnvironmentBindingReference-example-instance-001
    kind: instance
    labels:
      zh: 环境绑定引用结构化实例
      en: Structured instance of environment binding reference
      ja: 環境束縛参照の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: env-ref-44 指向 attempt-03 的 PATH 绑定，保存 scope=process、value_digest=sha256:8e3… 与 secret_state=not-secret；对 API_TOKEN 只保存 secret_ref=secret://runner/api-token，不保存明文。
      en: env-ref-44 points to attempt-03's PATH binding and stores scope process, value_digest sha256:8e3…, and secret_state not-secret; for API_TOKEN it stores only secret_ref secret://runner/api-token, never plaintext.
      ja: env-ref-44 は attempt-03 の PATH binding を指し、scope=process、value_digest=sha256:8e3…、secret_state=not-secret を保持します。API_TOKEN には secret_ref=secret://runner/api-token だけを保存し平文は保持しません。
    field_values:
      reference_id: env-ref-44
      attempt_id: attempt-03
      binding_name: PATH
      scope: process
      value_digest: sha256:8e3…
      secret_state: not-secret
    related_node_ids:
      - EnvironmentBindingReference
      - ExecutionReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference
    expected_result:
      zh: 实例作为 ExecutionReference 的环境绑定专门化通过校验，且没有秘密明文。
      en: The instance validates as an environment-binding specialization of ExecutionReference without secret plaintext.
      ja: instance は secret plaintext を含まない ExecutionReference の環境束縛 specialization として検証されます。
    why_valid_or_invalid:
      zh: 绑定名称、执行尝试、作用域与摘要足以定位和比较绑定；秘密值通过外部引用隔离。
      en: Binding name, execution attempt, scope, and digest are sufficient to locate and compare the binding, while secret values remain isolated behind an external reference.
      ja: binding name、execution attempt、scope、digest で束縛を特定・比較でき、secret value は外部 reference の背後に隔離されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
