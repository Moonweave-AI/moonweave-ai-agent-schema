source_claims:
  - id: claim-environment-binding-reference-001
    source: eng-std-posix-shell-2024
    supports: POSIX specifies that command execution occurs in a shell execution environment containing exported variables. EnvironmentBindingReference points to one such runtime binding through attempt, name, scope, and safe comparison metadata while excluding plaintext secrets. Owner info-container-command, semantic kind information, and backbone EnvironmentBindingReference-is_a-ExecutionReference are Moonweave design inferences.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-environment-binding-reference-002
    source: eng-std-posix-shell-2024
    supports: POSIX includes exported variables in the shell execution environment inherited by commands. The example identifies one binding by attempt, name, and scope and uses a digest or secret reference rather than copying a value; the non-disclosure rule is a Moonweave security constraint.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-environment-binding-reference-003
    source: eng-std-posix-shell-2024
    supports: POSIX defines the shell execution environment, including environment variables and the current working context. This supports EnvironmentBindingReference as an execution reference to the binding used by a command; digest-only secret handling and Moonweave class placement remain design decisions.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-environment-binding-reference-004
    source: eng-proto-mcp-spec
    supports: MCP tool results and resource links provide stable result-oriented targets that can be referenced without embedding the full returned payload. This supports ExecutionResultReference as the result endpoint in the comparison; the shared ExecutionReference taxonomy is a Moonweave design decision.
    locator: MCP 2025-06-18 > Server Features > Tools > Calling Tools > Tool Result and Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-environment-binding-reference-005
    source: eng-fw-deepagents-context-engineering
    supports: "EnvironmentBindingReference-is_a-ExecutionReference: The accepted record is env_ref=env-snapshot://run-9/v3 identifies run-9's redacted environment snapshot and exposes only variable names and a version hash. Deep Agents runtime context supplies immutable per-run configuration and dependencies without requiring those values to be copied into every state record. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "Deep Agents Context engineering, Types of context: runtime context and per-run configuration"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-environment-binding-reference-006
    source: eng-fw-deepagents-context-engineering
    supports: "EnvironmentBindingReference-is_a-ExecutionReference: The rejected record is outside the relation because A value is not a stable reference to the run's binding set and would breach the secret boundary. Deep Agents runtime context supplies immutable per-run configuration and dependencies without requiring those values to be copied into every state record. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "Deep Agents Context engineering, Types of context: runtime context and per-run configuration"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-environment-binding-reference-007
    source: eng-fw-deepagents-context-engineering
    supports: "EnvironmentBindingReference-is_a-ExecutionReference: The official material supports the operational distinction used by this edge. Deep Agents runtime context supplies immutable per-run configuration and dependencies without requiring those values to be copied into every state record. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "Deep Agents Context engineering, Types of context: runtime context and per-run configuration"
    evidence_kind: design-inference
    confidence: high
