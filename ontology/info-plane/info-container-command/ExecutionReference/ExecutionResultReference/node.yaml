schema: moonweave.ai/ontology-node/v1
id: ExecutionResultReference
kind: concept
status: accepted
labels:
  zh: 执行结果引用
  en: execution result reference
  ja: 実行結果参照
semantics:
  short_definition:
    zh: 指向恰好一个 ExecutionResult、但不内嵌其输出与状态的执行引用。
    en: An execution reference to exactly one ExecutionResult that does not embed the result's output or status.
    ja: ちょうど一つの ExecutionResult を指し、その出力や状態を埋め込まない実行参照。
  definition:
    zh: 执行结果引用是一种 ExecutionReference，用结果 ID 及其所属运行或尝试的关联信息解析到唯一 ExecutionResult。它允许 CommandOutputObservation 或上下文包引用结果，同时把结果载荷、退出状态与任务成功判断留在各自对象中。
    en: An ExecutionResultReference is an ExecutionReference that resolves to one unique ExecutionResult through a result ID plus run or attempt correlation. It lets a CommandOutputObservation or context package cite the result while leaving result payload, exit status, and task-success judgment on their respective objects.
    ja: ExecutionResultReference は、結果 ID と run または attempt の相関情報により一意の ExecutionResult へ解決する ExecutionReference です。CommandOutputObservation や context package が結果を参照しつつ、結果 payload、終了状態、タスク成功判断を各対象に残せます。
  why_needed:
    zh: 需要它在观测、消息和上下文之间传递结果身份而不重复大体积输出，并防止引用记录被误当作结果或执行活动。
    en: It carries result identity across observations, messages, and context without duplicating large output and prevents a reference record from being mistaken for the result or execution activity.
    ja: 大きな出力を複製せず観測・メッセージ・コンテキスト間で結果同一性を渡し、参照記録を結果や実行活動と誤認しないために必要です。
  includes:
    - zh: 包含具有唯一结果标识、结果所属运行或尝试的关联键、目标命名空间和必要访问限制的引用记录。
      en: Includes reference records with a unique result identifier, a run or attempt correlation key, target namespace, and necessary access restrictions.
      ja: 一意の結果識別子、所属 run または attempt の相関 key、対象 namespace、必要なアクセス制限を持つ参照記録を含みます。
  excludes:
    - zh: 不包含 ExecutionResult 本身、ExecutionObservation、CommandExecution、仅指向工作目录或环境绑定的引用，也不把协议层 JSON-RPC Response 当作核心结果引用。
      en: Excludes ExecutionResult itself, ExecutionObservation, CommandExecution, references only to a working directory or environment binding, and a protocol-level JSON-RPC Response treated as though it were the core result reference.
      ja: ExecutionResult 自体、ExecutionObservation、CommandExecution、作業ディレクトリや環境束縛だけへの参照、プロトコル層 JSON-RPC Response を中核結果参照とみなすものを含みません。
  semantic_kind: information
  aliases: []
