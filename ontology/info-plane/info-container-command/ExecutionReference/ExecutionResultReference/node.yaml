sibling_differentiation:
  - sibling_concept_id: WorkingDirectoryReference
    shared_parent_concept_id: ExecutionReference
    differentia:
      zh: 端点特定对照：父节点 ExecutionReference：ExecutionResultReference（semantic kind=information，骨架 ExecutionResultReference-is_a-ExecutionReference）；WorkingDirectoryReference（semantic kind=information，骨架 WorkingDirectoryReference-is_a-ExecutionReference）。双端条件：ExecutionResultReference 条件：“执行结果引用属于执行引用，区别于其他同类对象的条件是：它指向其可观察输出或状态正在被暂存进上下文的运行结果或工具执行结果”；WorkingDirectoryReference 条件：“作为执行引用，工作目录引用由这一事实区分：它记录与观测执行输出相关的工作目录，而不把目录本身建模为进入上下文的产物”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ExecutionReference: ExecutionResultReference (semantic kind=information, backbone ExecutionResultReference-is_a-ExecutionReference); WorkingDirectoryReference (semantic kind=information, backbone WorkingDirectoryReference-is_a-ExecutionReference). Endpoint conditions: ExecutionResultReference condition: “Execution result reference is an execution reference whose defining condition is that it references a runtime or tool execution result whose observable output or status is being staged into context”; WorkingDirectoryReference condition: “Working directory reference belongs to the execution reference category and differs from broader members in that it references the working directory relevant to observed execution output without making the directory itself a context-ingress artifact”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ExecutionReference：ExecutionResultReference（semantic kind=information、バックボーン ExecutionResultReference-is_a-ExecutionReference）；WorkingDirectoryReference（semantic kind=information、バックボーン WorkingDirectoryReference-is_a-ExecutionReference）。両端条件：ExecutionResultReference の条件：「実行結果参照は実行参照のうち、次の事実を定義条件とする対象です：それは、観測可能な出力または状態がコンテキストへステージングされている実行結果またはツール実行結果を指します」；WorkingDirectoryReference の条件：「作業ディレクトリ参照は実行参照として、次の条件により他の対象と区別されます：それは、観測された実行出力に関係する作業ディレクトリを記録し、ディレクトリ自体をコンテキスト取り込み成果物としては扱いません」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-execution-result-reference-003
      - claim-execution-result-reference-004
