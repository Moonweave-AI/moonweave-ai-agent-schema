source_claims:
  - id: claim-execution-result-reference-001
    source: eng-proto-mcp-spec
    supports: MCP's tool-call contract separates a ToolResult from links that identify related resources. ExecutionResultReference is the execution-domain locator that resolves to one existing ExecutionResult and excludes the protocol response envelope itself. Owner info-container-command, semantic kind information, and backbone ExecutionResultReference-is_a-ExecutionReference are Moonweave design inferences.
    locator: MCP 2025-06-18 > Server Features > Tools > Calling Tools > Tool Result and Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-result-reference-002
    source: eng-proto-mcp-spec
    supports: MCP distinguishes the result of a tool call from resource links contained in that result. The example uses a stable locator plus run, attempt, and result identifiers to refer to the core execution result; those Moonweave identifiers are deliberately distinct from a JSON-RPC correlation ID.
    locator: MCP 2025-06-18 > Server Features > Tools > Calling Tools > Tool Result and Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-result-reference-003
    source: eng-proto-mcp-spec
    supports: MCP distinguishes a returned tool result and its resource links from the environment in which a command runs. This supports ExecutionResultReference as a stable reference to one result while leaving its payload on the result object.
    locator: MCP 2025-06-18 > Server Features > Tools > Calling Tools > Tool Result and Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-result-reference-004
    source: eng-std-posix-shell-2024
    supports: POSIX makes the current working directory part of the shell execution environment and uses it to resolve relative paths. This supports WorkingDirectoryReference as a locator for execution context rather than a result reference; the Moonweave reference class is a design inference.
    locator: POSIX.1-2024 Shell Command Language §2.13 > Shell Execution Environment
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-execution-result-reference-005
    source: eng-fw-openai-agents-tools
    supports: "ExecutionResultReference-is_a-ExecutionReference: The accepted record is result://run-11/call-4 resolves to the sole tool result for call-4 and remains stable with the archived run. OpenAI tools return discrete result values for each invocation; Moonweave gives references to those values a separate execution-scoped identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-result-reference-006
    source: eng-fw-openai-agents-tools
    supports: "ExecutionResultReference-is_a-ExecutionReference: The rejected record is outside the relation because Result content cannot substitute for the stable location capability required of a reference. OpenAI tools return discrete result values for each invocation; Moonweave gives references to those values a separate execution-scoped identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-result-reference-007
    source: eng-fw-openai-agents-tools
    supports: "ExecutionResultReference-is_a-ExecutionReference: The official material supports the operational distinction used by this edge. OpenAI tools return discrete result values for each invocation; Moonweave gives references to those values a separate execution-scoped identity. The endpoint direction and ontology classification are Moonweave's reviewed modeling decision."
    locator: "OpenAI Agents SDK Tools, Local runtime tools and Function tools: returning tool output"
    evidence_kind: design-inference
