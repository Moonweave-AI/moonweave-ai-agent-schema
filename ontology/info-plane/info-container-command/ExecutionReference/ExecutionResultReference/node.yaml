schema: moonweave.ai/ontology-node/v1
id: ExecutionResultReference
kind: concept
labels:
  zh: 执行结果引用
  en: execution result reference
  ja: 実行結果参照
semantics:
  short_definition:
    zh: 指向被观测 ExecutionResult 而不复制其身份的 ExecutionReference 特化。
    en: ExecutionReference specialization pointing at observed ExecutionResult without copying its identity.
    ja: 観測対象 ExecutionResult を指し identity を複製しない ExecutionReference 特化。
  definition:
    zh: ExecutionResultReference 链接 tool-plane ExecutionResult（如 result-214）供 ExecutionObservation observes 边使用；不转移 RunResult 规范所有权。
    en: ExecutionResultReference links tool-plane ExecutionResult such as result-214 for ExecutionObservation observes edges without transferring canonical RunResult ownership.
    ja: cross-plane ExecutionResult pointer。
  why_needed:
    zh: 观测与结果跨域关联需要稳定引用而不把 result 字段复制进 observation。
    en: Cross-domain observation-result linking needs stable references without copying result fields into observations.
    ja: cross-link without copying result。
  includes:
    - zh: execution_result_id、optional invocation_id、protocol session ref。
      en: execution_result_id, optional invocation_id, protocol session ref.
      ja: result_id/invocation/session ref。
  excludes:
    - zh: RunResult 正文、CommandOutputObservation 载荷。
      en: RunResult body and CommandOutputObservation payloads.
      ja: result body/output payload。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: ExecutionObservation-observes-ExecutionResult via ExecutionResultReference result-214；MCP tool call result_id 映射。
    en: ExecutionObservation-observes-ExecutionResult via ExecutionResultReference result-214; MCP tool call result_id mapping.
    ja: observes edge via result ref。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
