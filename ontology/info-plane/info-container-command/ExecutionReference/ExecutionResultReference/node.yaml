schema: moonweave.ai/ontology-node/v1
id: ExecutionResultReference
kind: concept
status: accepted
labels:
  zh: 执行结果引用
  en: execution result reference
  ja: 実行結果参照
semantics:
  short_definition:
    zh: 指向恰好一个 ExecutionResult、但不内嵌其输出与状态的执行引用。
    en: An execution reference to exactly one ExecutionResult that does not embed the result's output or status.
    ja: ちょうど一つの ExecutionResult を指し、その出力や状態を埋め込まない実行参照。
  definition:
    zh: 执行结果引用是一种 ExecutionReference，用结果 ID 及其所属运行或尝试的关联信息解析到唯一 ExecutionResult。它允许 CommandOutputObservation 或上下文包引用结果，同时把结果载荷、退出状态与任务成功判断留在各自对象中。
    en: An ExecutionResultReference is an ExecutionReference that resolves to one unique ExecutionResult through a result ID plus run or attempt correlation. It lets a CommandOutputObservation or context package cite the result while leaving result payload, exit status, and task-success judgment on their respective objects.
    ja: ExecutionResultReference は、結果 ID と run または attempt の相関情報により一意の ExecutionResult へ解決する ExecutionReference です。CommandOutputObservation や context package が結果を参照しつつ、結果 payload、終了状態、タスク成功判断を各対象に残せます。
  why_needed:
    zh: 需要它在观测、消息和上下文之间传递结果身份而不重复大体积输出，并防止引用记录被误当作结果或执行活动。
    en: It carries result identity across observations, messages, and context without duplicating large output and prevents a reference record from being mistaken for the result or execution activity.
    ja: 大きな出力を複製せず観測・メッセージ・コンテキスト間で結果同一性を渡し、参照記録を結果や実行活動と誤認しないために必要です。
  includes:
    - zh: 包含具有唯一结果标识、结果所属运行或尝试的关联键、目标命名空间和必要访问限制的引用记录。
      en: Includes reference records with a unique result identifier, a run or attempt correlation key, target namespace, and necessary access restrictions.
      ja: 一意の結果識別子、所属 run または attempt の相関 key、対象 namespace、必要なアクセス制限を持つ参照記録を含みます。
  excludes:
    - zh: 不包含 ExecutionResult 本身、ExecutionObservation、CommandExecution、仅指向工作目录或环境绑定的引用，也不把协议层 JSON-RPC Response 当作核心结果引用。
      en: Excludes ExecutionResult itself, ExecutionObservation, CommandExecution, references only to a working directory or environment binding, and a protocol-level JSON-RPC Response treated as though it were the core result reference.
      ja: ExecutionResult 自体、ExecutionObservation、CommandExecution、作業ディレクトリや環境束縛だけへの参照、プロトコル層 JSON-RPC Response を中核結果参照とみなすものを含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExecutionResultReference-example-positive-001
    kind: positive
    labels:
      zh: 执行结果引用正例
      en: Positive example of execution result reference
      ja: 実行結果参照の正例
    scenario_id: null
    descriptions:
      zh: result-ref-214 以 run_id=run-88、attempt_id=attempt-2 和 result_id=result-214 定位唯一 ExecutionResult；obs-command-001 引用它，而不是复制结果的 stdout 与产物。
      en: result-ref-214 locates one ExecutionResult using run_id=run-88, attempt_id=attempt-2, and result_id=result-214. obs-command-001 cites it rather than copying the result's stdout and artifacts.
      ja: result-ref-214 は run_id=run-88、attempt_id=attempt-2、result_id=result-214 で一つの ExecutionResult を特定し、obs-command-001 は stdout と artifact を複製せず参照します。
    field_values:
      reference_id: result-ref-214
      reference_kind: execution-result
      locator: mw://runtime/run-88/attempt-2/results/result-214
      target_namespace: run-88
      visibility: audit
    related_node_ids:
      - ExecutionResultReference
      - CommandOutputObservation
    related_relation_ids:
      - CommandOutputObservation-references_execution_result-ExecutionResultReference
    expected_result:
      zh: result-ref-214 归为 ExecutionResultReference，并且在声明的运行命名空间中只解析到 result-214。
      en: result-ref-214 is an ExecutionResultReference and resolves only to result-214 in the declared run namespace.
      ja: result-ref-214 は ExecutionResultReference で、宣言 run namespace 内で result-214 だけへ解決します。
    why_valid_or_invalid:
      zh: 结果 ID 与 run/attempt 关联消除了跨重试歧义，且引用载荷没有冒充结果对象。
      en: Result ID plus run/attempt correlation removes retry ambiguity, and the reference payload does not impersonate the result object.
      ja: result ID と run/attempt 相関で retry ambiguity を除き、参照 payload は結果対象を装いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-execution-result-reference-002
  - id: ExecutionResultReference-example-boundary-001
    kind: boundary
    labels:
      zh: 执行结果引用边界例
      en: Boundary case for execution result reference
      ja: 実行結果参照の境界例
    scenario_id: null
    descriptions:
      zh: JSON-RPC Response id=42 包含一个 tool result，但 id=42 只关联协议请求，且 result 字段内嵌载荷；没有运行、尝试与核心 ExecutionResult 的定位信息。
      en: JSON-RPC Response id=42 contains a tool result, but id=42 correlates only the protocol request and the result field embeds payload; it has no run, attempt, or core ExecutionResult locator.
      ja: JSON-RPC Response id=42 は tool result を含みますが、id=42 は protocol request だけを相関し、result field は payload を埋め込みます。run・attempt・中核 ExecutionResult locator がありません。
    field_values: {}
    related_node_ids:
      - ExecutionResultReference
      - CommandOutputObservation
      - EnvironmentBindingReference
    related_relation_ids:
      - CommandOutputObservation-references_execution_result-ExecutionResultReference
    expected_result:
      zh: 该对象保持协议 Response；适配器只有在建立稳定核心结果定位符后，才能另建 ExecutionResultReference。
      en: The object remains a protocol Response; an adapter may create a separate ExecutionResultReference only after establishing a stable core-result locator.
      ja: 対象は protocol Response のままで、adapter は安定した中核結果 locator を確立した後だけ別 ExecutionResultReference を作れます。
    why_valid_or_invalid:
      zh: 协议相关 ID 与本体 referent ID 解决不同问题；Response 传输结果不等于它是可跨域解析的结果引用。
      en: A protocol correlation ID and an ontology referent ID solve different problems; transporting a result in a Response does not make the Response a cross-domain result reference.
      ja: protocol correlation ID と ontology referent ID は別問題を解き、Response が結果を運ぶことは cross-domain 結果参照であることを意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: ExecutionResultReference-example-instance-001
    kind: instance
    labels:
      zh: 执行结果引用结构化实例
      en: Structured instance of execution result reference
      ja: 実行結果参照の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: result-ref-214 记录 run_id=run-88、attempt_id=attempt-03、result_id=result-214 与稳定 locator；obs-command-001 通过 references_execution_result 指向它。
      en: result-ref-214 records run_id run-88, attempt_id attempt-03, result_id result-214, and a stable locator; obs-command-001 points to it through references_execution_result.
      ja: result-ref-214 は run_id=run-88、attempt_id=attempt-03、result_id=result-214、stable locator を記録し、obs-command-001 は references_execution_result でそれを指します。
    field_values:
      reference_id: result-ref-214
      run_id: run-88
      attempt_id: attempt-03
      result_id: result-214
      locator: mw://runs/run-88/attempts/03/results/214
    related_node_ids:
      - ExecutionResultReference
      - CommandOutputObservation
    related_relation_ids:
      - CommandOutputObservation-references_execution_result-ExecutionResultReference
    expected_result:
      zh: 实例唯一解析到 result-214，并可由对应命令输出观测反向定位。
      en: The instance resolves uniquely to result-214 and is discoverable from the corresponding command-output observation.
      ja: instance は result-214 へ一意に解決され、対応する command-output observation から発見できます。
    why_valid_or_invalid:
      zh: 运行、尝试和结果三元组消除重试歧义，定位符指向结果而不是 JSON-RPC 响应封套。
      en: The run-attempt-result tuple removes retry ambiguity, and the locator addresses the result rather than a JSON-RPC response envelope.
      ja: run-attempt-result tuple が retry ambiguity を除去し、locator は JSON-RPC response envelope ではなく結果を指します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
