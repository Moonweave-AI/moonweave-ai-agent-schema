parent_relation:
  id: ExecutionResultReference-is_a-ExecutionReference
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种执行结果引用
    en: is an execution-result reference
    ja: 実行結果参照の一種
  definitions:
    zh: 执行结果引用是执行引用的一种，以稳定标识定位某次工具或命令执行的结果，而不复制结果载荷。
    en: An execution-result reference is an execution reference whose stable identifier locates the result of a particular tool or command execution without duplicating its payload.
    ja: 実行結果参照は、特定のツールまたはコマンド実行結果を安定 ID で指し、結果ペイロードを複製しない実行参照です。
  cardinality: null
  cardinality_not_applicable_reason:
