schema: moonweave.ai/ontology-node/v1
id: ExecutionReference
kind: concept
status: accepted
labels:
  zh: 执行引用
  en: execution reference
  ja: 実行参照
semantics:
  short_definition:
    zh: 用稳定定位符指向执行相关对象、而不复制该对象的信息记录。
    en: An information record that points to an execution-related referent through a stable locator without copying it.
    ja: 安定した locator で実行関連の参照先を指し、対象を複製しない情報記録。
  definition:
    zh: 执行引用是一种信息对象，保存引用种类、目标系统或命名空间、稳定定位符和可见性限制，使消费方能够解析到某个执行结果、工作目录或环境绑定。引用可以跨进程与信任边界传递，但它既不拥有目标，也不保证当前调用者有权解引用。
    en: An ExecutionReference is an information object carrying a reference kind, target system or namespace, stable locator, and visibility restrictions so a consumer can resolve an execution result, working directory, or environment binding. It may cross process and trust boundaries, but it neither owns the referent nor guarantees that the current caller may dereference it.
    ja: ExecutionReference は、参照種別、対象システムまたは namespace、安定 locator、可視性制限を保持し、利用者が実行結果、作業ディレクトリ、環境束縛を解決できる情報対象です。プロセスや信頼境界を越えて渡せますが、参照先を所有せず、現呼出者の解決権限も保証しません。
  why_needed:
    zh: 需要统一引用层来保持轻量、可验证的跨域关联，避免把 ExecutionResult、WorkingDirectory 或秘密环境值复制进观测和上下文包。
    en: A common reference layer keeps cross-domain links lightweight and verifiable without copying ExecutionResult, WorkingDirectory, or secret environment values into observations and context packages.
    ja: 共通参照層により、ExecutionResult、WorkingDirectory、秘密環境値を観測や context package へ複製せず、軽量で検証可能なドメイン間関連を保てます。
  includes:
    - zh: 包含能够在声明的目标系统中解析、标明 referent kind 并保留访问限制的 ExecutionResultReference、WorkingDirectoryReference 和 EnvironmentBindingReference。
      en: Includes ExecutionResultReference, WorkingDirectoryReference, and EnvironmentBindingReference records that declare referent kind, resolve within a named target system, and retain access restrictions.
      ja: 参照先種別を示し、指定対象システム内で解決でき、アクセス制限を保持する ExecutionResultReference、WorkingDirectoryReference、EnvironmentBindingReference を含みます。
  excludes:
    - zh: 不包含被引用的 ExecutionResult、WorkingDirectory、RuntimeEnvironment 或环境值，也不包含负责把外部协议字段转换为核心引用的 ProtocolAdapter。
      en: Excludes the referenced ExecutionResult, WorkingDirectory, RuntimeEnvironment, and environment value, as well as a ProtocolAdapter that translates external protocol fields into the core reference.
      ja: 参照先の ExecutionResult、WorkingDirectory、RuntimeEnvironment、環境値、および外部プロトコル項目を中核参照へ変換する ProtocolAdapter を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - reference_id
  fields:
    - id: reference_id
      labels:
        zh: 引用标识
        en: reference ID
        ja: 参照 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识引用记录本身；它不等于被引用对象的标识。
        en: Stably identifies the reference record itself rather than the referenced object.
        ja: 参照対象ではなく参照記録自体を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: ref-88
      source_claims:
        - claim-execution-reference-002
    - id: reference_kind
      labels:
        zh: 引用种类
        en: reference kind
        ja: 参照種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明定位符所指对象的语义种类，使解析器不能把结果、目录和环境绑定混读。
        en: Declares the semantic kind of referent so a resolver cannot conflate results, directories, and environment bindings.
        ja: resolver が結果・directory・environment binding を混同しないよう参照先の意味種別を宣言します。
      allowed_values: []
      pattern: null
      example_value: execution-result
      source_claims:
        - claim-execution-reference-003
    - id: locator
      labels:
        zh: 稳定定位符
        en: stable locator
        ja: 安定 locator
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在目标命名空间内解析被引用对象的 URI，不内嵌对象内容。
        en: URI used to resolve the referent within its target namespace without embedding its contents.
        ja: 内容を埋め込まず対象 namespace 内で参照先を解決する URI です。
      allowed_values: []
      pattern: null
      example_value: mw://runtime/run-88/results/result-214
      source_claims:
        - claim-execution-reference-004
    - id: target_namespace
      labels:
        zh: 目标命名空间
        en: target namespace
        ja: 対象 namespace
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定定位符应在哪个系统、租户或环境中解析。
        en: Scopes resolution to the system, tenant, or environment in which the locator is meaningful.
        ja: locator を解決する system・tenant・environment を限定します。
      allowed_values: []
      pattern: null
      example_value: prod-eu
      source_claims:
        - claim-execution-reference-005
    - id: visibility
      labels:
        zh: 可见性范围
        en: visibility scope
        ja: 可視性範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录谁可以看到该引用的元数据；它不授予解引用权限。
        en: Records who may see the reference metadata without granting permission to dereference it.
        ja: 参照解除権限を付与せず参照 metadata を閲覧できる範囲を記録します。
      allowed_values: []
      pattern: null
      example_value: audit
      source_claims:
        - claim-execution-reference-006
  constraints:
    - id: execution-reference-does-not-confer-access
      severity: error
      expression_language: plain
      expression: resolving locator requires authorization independent of visibility
      explanations:
        zh: 能看见引用不意味着有权读取引用对象。
        en: Visibility of a reference does not authorize access to its referent.
        ja: 参照の可視性は参照先へのアクセスを認可しません。
      source_claims:
        - claim-execution-reference-007
  required_relation_constraints: []
examples:
  - id: ExecutionReference-example-positive-001
    kind: positive
    labels:
      zh: 执行引用正例
      en: Positive example of execution reference
      ja: 実行参照の正例
    scenario_id: null
    descriptions:
      zh: ref-88 携带 kind=execution-result、locator=mw://runtime/run-88/results/result-214、namespace=prod-eu 和 visibility=audit；解析器可定位结果，但记录不包含结果输出。
      en: ref-88 carries kind=execution-result, locator=mw://runtime/run-88/results/result-214, namespace=prod-eu, and visibility=audit. A resolver can locate the result, but the record contains none of its output.
      ja: ref-88 は kind=execution-result、locator=mw://runtime/run-88/results/result-214、namespace=prod-eu、visibility=audit を持ち、resolver は結果を特定できますが記録は結果出力を含みません。
    field_values:
      reference_id: ref-88
      reference_kind: execution-result
      locator: mw://runtime/run-88/results/result-214
      target_namespace: prod-eu
      visibility: audit
    related_node_ids:
      - ExecutionReference
      - EnvironmentBindingReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference
    expected_result:
      zh: ref-88 归为 ExecutionReference；授权解析后得到 result-214，未授权消费者只能看到引用元数据。
      en: ref-88 is an ExecutionReference; authorized resolution yields result-214, while unauthorized consumers see reference metadata only.
      ja: ref-88 は ExecutionReference で、認可解決では result-214 を得て、未認可 consumer は参照 metadata だけを見ます。
    why_valid_or_invalid:
      zh: 记录具有目标种类、命名空间、稳定定位符与可见性约束，并保持 referent 与 reference 的独立身份。
      en: The record has referent kind, namespace, stable locator, and visibility restriction while preserving separate identities for referent and reference.
      ja: 参照先種別、namespace、安定 locator、可視性制限を持ち、referent と reference の別 identity を保ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-execution-reference-008
  - id: ExecutionReference-example-boundary-001
    kind: boundary
    labels:
      zh: 执行引用边界例
      en: Boundary case for execution reference
      ja: 実行参照の境界例
    scenario_id: null
    descriptions:
      zh: 一个上下文条目直接内嵌 result-214 的全部 stdout、stderr、退出码和产物，而没有 locator、目标命名空间或解析步骤；它是结果副本，不是 ExecutionReference。
      en: A context entry embeds all stdout, stderr, exit code, and artifacts of result-214 with no locator, target namespace, or resolution step. It is a copied result, not an ExecutionReference.
      ja: context entry が result-214 の全 stdout、stderr、exit code、artifact を locator・対象 namespace・解決手順なしで埋め込みます。これは結果 copy で ExecutionReference ではありません。
    field_values: {}
    related_node_ids:
      - ExecutionReference
      - EnvironmentBindingReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference
    expected_result:
      zh: 该条目按嵌入的结果信息处理；除非另有稳定 locator，否则不得标注为 ExecutionReference。
      en: Treat the entry as embedded result information and do not type it as ExecutionReference unless a separate stable locator exists.
      ja: 埋込結果情報として扱い、別の安定 locator がない限り ExecutionReference と型付けしません。
    why_valid_or_invalid:
      zh: 引用的种差是通过受约束定位符指向 referent；复制目标载荷既不轻量，也无法证明与原对象的持续同一性。
      en: The reference differentia is pointing through a constrained locator; copying target payload is neither lightweight nor proof of continuing identity with the original object.
      ja: 参照の種差は制約付き locator で referent を指すことであり、payload copy は軽量でなく元対象との継続同一性も証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
  - id: ExecutionReference-example-instance-001
    kind: instance
    labels:
      zh: 执行引用结构化实例
      en: Structured instance of execution reference
      ja: 実行参照の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: result-ref-214 以 reference_kind=execution-result、locator=mw://runs/run-88/attempts/03/results/214、namespace=moonweave-prod 和 visibility=team 指向一个执行结果，而不复制结果载荷。
      en: result-ref-214 points to one execution result using reference_kind execution-result, locator mw://runs/run-88/attempts/03/results/214, namespace moonweave-prod, and visibility team, without copying the result payload.
      ja: result-ref-214 は reference_kind=execution-result、locator=mw://runs/run-88/attempts/03/results/214、namespace=moonweave-prod、visibility=team で一つの execution result を指し、payload は複写しません。
    field_values:
      reference_id: result-ref-214
      reference_kind: execution-result
      locator: mw://runs/run-88/attempts/03/results/214
      namespace: moonweave-prod
      visibility: team
    related_node_ids:
      - ExecutionReference
      - ExecutionResultReference
    related_relation_ids:
      - ExecutionResultReference-is_a-ExecutionReference
    expected_result:
      zh: 实例按轻量定位符契约验证为 ExecutionReference，并进一步专门化为 ExecutionResultReference。
      en: The instance validates against the lightweight locator contract of ExecutionReference and specializes further as ExecutionResultReference.
      ja: instance は ExecutionReference の軽量 locator contract を満たし、さらに ExecutionResultReference として specialization されます。
    why_valid_or_invalid:
      zh: 引用身份、类型、命名空间和可见性均明确，且 referent 与引用载荷保持分离。
      en: Reference identity, kind, namespace, and visibility are explicit, and the referent remains separate from the reference payload.
      ja: reference identity・kind・namespace・visibility が明示され、referent と reference payload が分離されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-info-verification
  reviewed_on: 2026-07-17
  note:
    zh: Manual semantic verification completed.
    en: Verified against POSIX stdout/stderr/exit status and shell redirection semantics.
    ja: Manual semantic verification completed.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-execution-reference-001
    source: eng-proto-mcp-spec
    supports: MCP distinguishes a resource link, which identifies a target by URI and metadata, from embedded resource contents. ExecutionReference adopts that lightweight-reference boundary for execution-scoped targets and adds namespace and visibility without asserting access authority. Owner info-container-command, semantic kind information, and composition-root status are Moonweave design inferences.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-reference-002
    source: eng-proto-mcp-spec
    supports: MCP resource links are distinct response objects that identify a target resource through URI and metadata. A separate reference_id is Moonweave's design-inference for addressing the link record independently from its referent.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-reference-003
    source: eng-proto-mcp-spec
    supports: MCP resource links carry target metadata alongside the URI, while embedded resources carry contents. reference_kind makes that target-category distinction explicit in the Moonweave reference model.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links and Embedded Resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-reference-004
    source: eng-proto-mcp-spec
    supports: MCP requires each resource link to identify its resource with a URI. locator directly preserves that resolvable-reference boundary.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-execution-reference-005
    source: eng-proto-mcp-spec
    supports: MCP resource URIs are resolved by the exposing server. target_namespace is Moonweave's explicit system boundary for preserving that server-relative resolution context.
    locator: MCP 2025-06-18 > Server Features > Resources > Resources and URIs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-execution-reference-006
    source: eng-proto-mcp-spec
    supports: MCP separates resource identification from authorization decisions. visibility records disclosure of link metadata while leaving dereference authorization to the security owner.
    locator: MCP 2025-06-18 > Server Features > Resources; Authorization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-execution-reference-007
    source: eng-proto-mcp-spec
    supports: MCP treats resource exposure and authorization as separate protocol concerns; Moonweave therefore forbids treating link visibility as access authority.
    locator: MCP 2025-06-18 > Server Features > Resources; Authorization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-execution-reference-008
    source: eng-proto-mcp-spec
    supports: MCP ToolResult may carry resource links identified by URI plus descriptive metadata rather than embedding each resource. The example follows that locator pattern while adding reference kind, namespace, and visibility so the target is resolvable in Moonweave's execution domain.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: official
    confidence: high
    review_status: accepted
