schema: moonweave.ai/ontology-node/v1
id: ExecutionReference
kind: concept
labels:
  zh: 执行引用
  en: execution reference
  ja: 実行参照
semantics:
  short_definition:
    zh: 解析执行语境而不复制 referent 对象的引用分支根。
    en: Reference branch root resolving execution context without copying referent objects.
    ja: execution context を解決し referent を複製しない reference branch root。
  definition:
    zh: ExecutionReference 拥有 WorkingDirectoryReference、EnvironmentBindingReference、ExecutionResultReference；对应 shell cwd/env、Docker container ID、E2B sandbox 会话引用；不转移 RunResult 所有权。
    en: ExecutionReference owns WorkingDirectoryReference, EnvironmentBindingReference, ExecutionResultReference; maps shell cwd/env, Docker container ID, E2B sandbox session refs without transferring RunResult ownership.
    ja: cwd/env/container/sandbox execution context refs。
  why_needed:
    zh: 观测需要指向“哪次执行语境”而不把 invocation 或 RunResult 混为观测节点。
    en: Observations need to point to which execution context without conflating invocation or RunResult with observation nodes.
    ja: execution context pointer。
  includes:
    - zh: execution_reference_id、referent kind、解析字段（cwd/container_id/sandbox_id）。
      en: execution_reference_id, referent kind, resolution fields (cwd/container_id/sandbox_id).
      ja: ref_id/kind/resolution fields。
  excludes:
    - zh: CommandOutputObservation 载荷、RunResult 正文、Command 调用活动。
      en: CommandOutputObservation payloads, RunResult bodies, Command invocation activities.
      ja: output payload/RunResult body/invocation。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: exec-ref-build-17 cwd=/workspace/app env NODE_ENV=test；exec-ref-container-901 container_id=run-container-901；E2B sandbox session→ExecutionReference。
    en: exec-ref-build-17 cwd=/workspace/app env NODE_ENV=test; exec-ref-container-901 container_id=run-container-901; E2B sandbox session→ExecutionReference.
    ja: shell/container/sandbox refs。
  typical_input: []
  typical_output: []
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit codes.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command output.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log streams.
structure:
  identity_keys:
    - reference_id
  fields:
    - id: reference_id
      labels:
        zh: 引用标识
        en: reference ID
        ja: 参照 ID
      definitions:
        zh: 稳定标识引用记录本身；它不等于被引用对象的标识。
        en: Stably identifies the reference record itself rather than the referenced object.
        ja: 参照対象ではなく参照記録自体を安定して識別します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ref-88
      allowed_values: []
      source_claims:
        - claim-execution-reference-002
    - id: reference_kind
      labels:
        zh: 引用种类
        en: reference kind
        ja: 参照種別
      definitions:
        zh: 声明定位符所指对象的语义种类，使解析器不能把结果、目录和环境绑定混读。
        en: Declares the semantic kind of referent so a resolver cannot conflate results, directories, and environment bindings.
        ja: resolver が結果・directory・environment binding を混同しないよう参照先の意味種別を宣言します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: execution-result
      allowed_values: []
      source_claims:
        - claim-execution-reference-003
    - id: locator
      labels:
        zh: 稳定定位符
        en: stable locator
        ja: 安定 locator
      definitions:
        zh: 在目标命名空间内解析被引用对象的 URI，不内嵌对象内容。
        en: URI used to resolve the referent within its target namespace without embedding its contents.
        ja: 内容を埋め込まず対象 namespace 内で参照先を解決する URI です。
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mw://runtime/run-88/results/result-214
      allowed_values: []
      source_claims:
        - claim-execution-reference-004
    - id: target_namespace
      labels:
        zh: 目标命名空间
        en: target namespace
        ja: 対象 namespace
      definitions:
        zh: 限定定位符应在哪个系统、租户或环境中解析。
        en: Scopes resolution to the system, tenant, or environment in which the locator is meaningful.
        ja: locator を解決する system・tenant・environment を限定します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: prod-eu
      allowed_values: []
      source_claims:
        - claim-execution-reference-005
    - id: visibility
      labels:
        zh: 可见性范围
        en: visibility scope
        ja: 可視性範囲
      definitions:
        zh: 记录谁可以看到该引用的元数据；它不授予解引用权限。
        en: Records who may see the reference metadata without granting permission to dereference it.
        ja: 参照解除権限を付与せず参照 metadata を閲覧できる範囲を記録します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: audit
      allowed_values: []
      source_claims:
        - claim-execution-reference-006
  constraints:
    - id: execution-reference-does-not-confer-access
      severity: error
      expression_language: plain
      expression: resolving locator requires authorization independent of visibility
      explanation:
        zh: 能看见引用不意味着有权读取引用对象。
        en: Visibility of a reference does not authorize access to its referent.
        ja: 参照の可視性は参照先へのアクセスを認可しません。
      source_claims:
        - claim-execution-reference-007
  required_relations: []
examples:
  - id: ExecutionReference-example-shell
    labels:
      zh: Shell 执行引用
      en: Shell execution reference
      ja: shell execution reference
    descriptions:
      zh: exec-ref-build-17 解析 cwd 与 env binding。
      en: exec-ref-build-17 resolves cwd and env binding.
      ja: shell exec ref。
    example_source:
      product: POSIX
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      version: shell context
    field_values:
      execution_reference_id: exec-ref-build-17
    related_node_ids:
      - ExecutionReference
      - WorkingDirectoryReference
    related_relation_ids: []
    source_claims:
      - claim-exref-design
  - id: ExecutionReference-example-container
    labels:
      zh: 容器执行引用
      en: Container execution reference
      ja: container execution reference
    descriptions:
      zh: exec-ref-container-901 Docker container run-container-901。
      en: exec-ref-container-901 Docker container run-container-901.
      ja: container exec ref。
    example_source:
      product: Docker
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      version: container
    field_values: {}
    related_node_ids:
      - ExecutionReference
    related_relation_ids: []
    source_claims:
      - claim-exref-docker
  - id: ExecutionReference-example-not-run-result
    labels:
      zh: 非 RunResult
      en: Not RunResult
      ja: RunResult ではない
    descriptions:
      zh: ExecutionReference 不复制 RunResult 身份。
      en: ExecutionReference does not copy RunResult identity.
      ja: ref≠RunResult identity。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: boundary
    field_values: {}
    related_node_ids:
      - ExecutionReference
    related_relation_ids: []
    source_claims:
      - claim-exref-design
parent_relation: null
relations: []
sources:
  - id: src-posix-exit-status
    title: POSIX Shell Command Language — Exit Status
    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    source_type: standard
    relevance: stdout/stderr and exit codes.
  - id: src-docker-container-logs
    title: Docker Engine API — Container logs
    publisher: Docker
    url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
    source_type: official-doc
    relevance: Container stdout/stderr log streams.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Execution observations separate from invocation and RunResult.
source_claims:
  - id: claim-execution-reference-001
    source: eng-proto-mcp-spec
    supports: MCP distinguishes a resource link, which identifies a target by URI and metadata, from embedded resource contents. ExecutionReference adopts that lightweight-reference boundary for execution-scoped targets and adds namespace and visibility without asserting access authority. Owner info-container-command, semantic kind information, and composition-root status are Moonweave design inferences.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: official
    confidence: high
  - id: claim-execution-reference-002
    source: eng-proto-mcp-spec
    supports: MCP resource links are distinct response objects that identify a target resource through URI and metadata. A separate reference_id is Moonweave's design-inference for addressing the link record independently from its referent.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: design-inference
    confidence: high
  - id: claim-execution-reference-003
    source: eng-proto-mcp-spec
    supports: MCP resource links carry target metadata alongside the URI, while embedded resources carry contents. reference_kind makes that target-category distinction explicit in the Moonweave reference model.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links and Embedded Resources
    evidence_kind: design-inference
    confidence: high
  - id: claim-execution-reference-004
    source: eng-proto-mcp-spec
    supports: MCP requires each resource link to identify its resource with a URI. locator directly preserves that resolvable-reference boundary.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: official
    confidence: high
  - id: claim-execution-reference-005
    source: eng-proto-mcp-spec
    supports: MCP resource URIs are resolved by the exposing server. target_namespace is Moonweave's explicit system boundary for preserving that server-relative resolution context.
    locator: MCP 2025-06-18 > Server Features > Resources > Resources and URIs
    evidence_kind: design-inference
    confidence: medium
  - id: claim-execution-reference-006
    source: eng-proto-mcp-spec
    supports: MCP separates resource identification from authorization decisions. visibility records disclosure of link metadata while leaving dereference authorization to the security owner.
    locator: MCP 2025-06-18 > Server Features > Resources; Authorization
    evidence_kind: design-inference
    confidence: medium
  - id: claim-execution-reference-007
    source: eng-proto-mcp-spec
    supports: MCP treats resource exposure and authorization as separate protocol concerns; Moonweave therefore forbids treating link visibility as access authority.
    locator: MCP 2025-06-18 > Server Features > Resources; Authorization
    evidence_kind: design-inference
    confidence: high
  - id: claim-execution-reference-008
    source: eng-proto-mcp-spec
    supports: MCP ToolResult may carry resource links identified by URI plus descriptive metadata rather than embedding each resource. The example follows that locator pattern while adding reference kind, namespace, and visibility so the target is resolvable in Moonweave's execution domain.
    locator: MCP 2025-06-18 > Server Features > Tools > Tool Result > Resource Links
    evidence_kind: official
    confidence: high
  - id: claim-exref-docker
    source: src-docker-container-logs
    supports: Docker container runs provide execution context references for log observations.
    locator: container logs
    evidence_kind: official-doc
    confidence: high
  - id: claim-exref-design
    source: src-info-container-design
    supports: ExecutionReference locates execution context without owning RunResult.
    locator: ExecutionReference
    evidence_kind: design-inference
    confidence: high
