      locator: mw://runtime/run-88/results/result-214
      target_namespace: prod-eu
      visibility: audit
    related_node_ids:
      - ExecutionReference
      - EnvironmentBindingReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference

    source_claims:
      - claim-execution-reference-008
  - id: ExecutionReference-example-boundary-001

    labels:
      zh: 执行引用边界例
      en: Boundary case for execution reference
      ja: 実行参照の境界例

    descriptions: {zh: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; ExecutionReference must not treat partial delta as final Message.", en: "textStream chunk is OutputSegment event; complete AssistantMessage is terminal; ExecutionReference must not treat partial delta as final Message.", ja: "Partial delta not final Message."}

    field_values: {}
    related_node_ids:
      - ExecutionReference
      - EnvironmentBindingReference
    related_relation_ids:
      - EnvironmentBindingReference-is_a-ExecutionReference

    source_claims: []
  - id: ExecutionReference-example-instance-001

    labels:
      zh: 执行引用结构化实例
      en: Structured instance of execution reference
      ja: 実行参照の構造化インスタンス

    descriptions: {zh: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->ExecutionReference.", en: "DSPy instance: Signature->PromptTemplate variable_names=[context, question]->ExecutionReference.", ja: "DSPy instance maps to ExecutionReference PromptTemplate."}

    field_values:
      reference_id: result-ref-214
      reference_kind: execution-result
      locator: mw://runs/run-88/attempts/03/results/214
      namespace: moonweave-prod
      visibility: team
    related_node_ids:
