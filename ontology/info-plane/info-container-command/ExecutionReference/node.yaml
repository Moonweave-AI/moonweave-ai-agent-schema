      ja: 実行参照の正例

    descriptions: {zh: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V scaled dot-product; context window is transformer sequence foundation; ExecutionReference maps ContentPart/token boundaries.", en: "Attention Is All You Need (Vaswani et al., 2017) self-attention Q/K/V; context window is transformer sequence foundation; ExecutionReference maps ContentPart/token boundaries.", ja: "Attention self-attention Q/K/V; ExecutionReference context/token boundary."}

    field_values:
      reference_id: ref-88
