module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 执行观测的输入概念族为执行结果、追踪事件；责任交接由已接受事实 执行观测 —observes→ 执行结果 (ExecutionObservation-observes-ExecutionResult)；命令输出观测 —derived_from_trace_event→ 追踪事件 (derived_from_trace_event) 明确给出。
          en: The input families for Execution observations are Execution Result, trace event; the accepted facts execution observation —observes→ Execution Result (ExecutionObservation-observes-ExecutionResult); command output observation —derived_from_trace_event→ trace event (derived_from_trace_event) make the responsibility handoff explicit.
          ja: 実行観測の入力概念族は実行結果、トレースイベントです。責任の受け渡しは承認済み事実 実行観測 —observes→ 実行結果 (ExecutionObservation-observes-ExecutionResult)；コマンド出力観測 —derived_from_trace_event→ トレースイベント (derived_from_trace_event) により明示されます。
        family_concept_ids:
          - ExecutionResult
          - TraceEvent
        relation_ids:
          - ExecutionObservation-observes-ExecutionResult
          - derived_from_trace_event
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出面发布可核验的 CommandOutputObservation，并以 has_stdout_chunk 引用具体 StandardOutputChunk；是否把该观测接入某个 ContextPackage 由 memory-context 的 ContextIngressEvent 另行决定。
          en: The output facet publishes a verifiable CommandOutputObservation and references concrete StandardOutputChunks through has_stdout_chunk; memory-context separately decides whether a ContextIngressEvent admits that observation into a ContextPackage.
          ja: output facet は検証可能な CommandOutputObservation を公開し、has_stdout_chunk で具体 StandardOutputChunk を参照します。その observation を ContextPackage へ取り込むかは memory-context の ContextIngressEvent が別途判断します。
        family_concept_ids:
          - CommandOutputObservation
          - StandardOutputChunk
        relation_ids:
          - has_stdout_chunk
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 执行观测的失败概念族为标准错误分块；责任交接由已接受事实 命令输出观测 —has_stderr_chunk→ 标准错误分块 (has_stderr_chunk) 明确给出。
          en: The failure families for Execution observations are standard error chunk; the accepted facts command output observation —has_stderr_chunk→ standard error chunk (has_stderr_chunk) make the responsibility handoff explicit.
          ja: 実行観測の失敗概念族は標準エラーチャンクです。責任の受け渡しは承認済み事実 コマンド出力観測 —has_stderr_chunk→ 標準エラーチャンク (has_stderr_chunk) により明示されます。
        family_concept_ids:
          - StandardErrorChunk
        relation_ids:
          - has_stderr_chunk
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。运行追踪、诊断或上下文组装消费执行输出证据而不改变其通道和顺序身份时，引用这里的观测。
          en: This ontology does not initiate a recovery workflow. Runtime tracing, diagnostics, or context assembly references these observations when consuming execution-output evidence without changing channel and order identity.
          ja: このオントロジーは回復ワークフローを開始しません。実行トレース、診断、コンテキスト組み立てがチャネルと順序の同一性を変えず出力証拠を利用するとき、ここで定義した観測を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 执行观测与追踪与检查点按唯一 owner 和可判定问题分界。
            en: Execution observations and Tracing and checkpoints are separated by unique ownership and answerable questions.
            ja: 実行観測とトレースとチェックポイントは一意の所有者と判定可能な問いで分離されます。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 执行观测与追踪与检查点按唯一 owner 和可判定问题分界。
            en: Execution observations and Tracing and checkpoints are separated by unique ownership and answerable questions.
            ja: 実行観測とトレースとチェックポイントは一意の所有者と判定可能な問いで分離されます。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - OutputStream
      - ExecutionObservation
      - ExecutionReference
    allowed_backbone_predicates:
      - contains_segment
      - is_a
      - observes
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-info-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后，执行观测只拥有 ExecutionResult→ExecutionObservation 与 OutputStream→OutputSegment 等输出证据分支。ContextIngressEvent 的身份依赖确定 ContextPackage 版本，已整体转归 memory-context；本模块只保留 CommandOutputObservation 端点供 makes_available 引用。OutputStream 与 ExecutionReference 是两个诚实根：空流可无分段，ExecutionReference 也可分别定位结果、工作目录或环境绑定。
            en: Point-by-point review limits execution observations to output-evidence branches such as ExecutionResult→ExecutionObservation and OutputStream→OutputSegment. ContextIngressEvent depends on a determinate ContextPackage version and is wholly owned by memory-context; this module retains only the CommandOutputObservation endpoint referenced by makes_available. OutputStream and ExecutionReference are honest roots because an empty stream may have no segment and an ExecutionReference may locate a result, working directory, or environment binding.
            ja: 個別審査により execution observations は ExecutionResult→ExecutionObservation と OutputStream→OutputSegment 等の出力証拠 branch のみを所有します。ContextIngressEvent は特定 ContextPackage 版に依存するため memory-context へ完全移管し、本 module は makes_available が参照する CommandOutputObservation endpoint だけを保持します。OutputStream と ExecutionReference は空 stream・複数参照先のため誠実な root です。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查保留 OutputStream 与 ExecutionReference 两个诚实根。ExecutionObservation —observes→ ExecutionResult 是本模块的跨域主骨架；OutputStream —contains_segment→ OutputSegment 是流内成员的主阅读父边，基数允许空流；OutputSegment —is_a→ OutputInformation 继续作为真实但次级的跨模块种属骨架。ContextIngressEvent、ingested_into_context 与 makes_available 均由 memory-context 定义，makes_available 在此仅跨链到可复用 CommandOutputObservation。
            en: Structure review retains OutputStream and ExecutionReference as two honest roots. ExecutionObservation —observes→ ExecutionResult is this module's cross-domain primary backbone. OutputStream —contains_segment→ OutputSegment is the primary reading parent for stream membership and its cardinality still permits an empty stream; OutputSegment —is_a→ OutputInformation remains a genuine but secondary cross-module taxonomy backbone. memory-context defines ContextIngressEvent, ingested_into_context, and makes_available; the latter merely cross-links here to reusable CommandOutputObservation.
            ja: 構造審査は OutputStream と ExecutionReference を二つの誠実な root とします。ExecutionObservation —observes→ ExecutionResult は本 module のcross-domain主backboneです。OutputStream —contains_segment→ OutputSegment はstream membershipの主読解親で、cardinalityは空streamも許します。OutputSegment —is_a→ OutputInformation は真のcross-module種別関係としてsecondary backboneに保持します。ContextIngressEvent・ingested_into_context・makes_available は memory-context が定義し、後者だけが再利用可能 CommandOutputObservation へ cross-link します。
  competency_questions:
    - id: info-container-command-cq-ordered-output-v3
      semantic_key: info-container-command.ordered-output
      primary_owner_module_id: info-container-command
