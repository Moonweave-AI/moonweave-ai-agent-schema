schema: moonweave.ai/ontology-node/v1
id: info-container-command
kind: module
labels:
  zh: 执行输出观测
  en: Execution output observations
  ja: 実行出力観測
semantics:
  short_definition:
    zh: 执行输出观测记录某次命令或进程执行对外可见的输出证据，包括按通道与序号组织的输出流、退出状态，以及定位执行语境的引用。
    en: Execution output observations record externally visible evidence from one command or process execution, including channel-ordered output streams, exit status, and references that locate the execution context.
    ja: 実行出力観測は、一回のコマンドまたはプロセス実行から外部に見える証拠（チャネル順序付き出力ストリーム、終了状態、実行文脈を位置付ける参照）を記録します。
  definition:
    zh: 本模块有三个并列根：ExecutionObservation 是对执行结果的带时间与采集条件观测；OutputStream 是在同一执行通道内有序组织输出片段的集合；ExecutionReference 是不复制目标对象的执行语境引用。CommandOutputObservation 捕获 stdout/stderr 分块及其 sequence；ExitStatusObservation 记录退出码或信号。该模块回答“观察到了什么输出、属于哪次执行语境”，但不声称命令已被调用、不拥有 RunResult 身份，也不把通用 TextBlock 或长期日志 Sink 重新分类为观测节点。Agent 沙箱、终端工具或容器运行时返回的 byte stream 是典型输入面。
    en: This module has three parallel roots. ExecutionObservation is a time- and acquisition-qualified observation of an execution result; OutputStream is the ordered collection of output segments within one execution channel; ExecutionReference resolves execution-scoped objects without copying them. CommandOutputObservation captures stdout and stderr chunks with sequence ordinals; ExitStatusObservation records exit codes or signals. The module answers what output was observed and to which execution context it belongs, but does not claim a command was invoked, does not own RunResult identity, and does not reclassify generic TextBlocks or durable log Sinks as observation nodes. Byte streams returned by agent sandboxes, terminal tools, or container runtimes are typical input surfaces.
    ja: 本モジュールは三並列 root です。ExecutionObservation は時刻/取得条件付き実行結果観測、OutputStream は一実行チャネル内有序 output segment 集合、ExecutionReference は対象複製なし execution-scoped 参照。CommandOutputObservation は stdout/stderr chunk+sequence、ExitStatusObservation は exit code/signal を記録。何が観測されどの execution context に属するかを答えますが、command 呼出し claim、RunResult identity 所有、generic TextBlock/永続 log Sink の observation node 再分類は行いません。agent sandbox/terminal tool/container runtime byte stream が典型 input 面です。
  why_needed:
    zh: 没有执行输出观测，工具返回的 stdout/stderr 只能被整段塞进 prompt，无法按通道重组、检测缺块或引用“第 17 号构建观测的第 2 段 stderr”。执行、观测与内容载荷三种身份会混为一体。
    en: Without execution output observations, tool-returned stdout and stderr get pasted wholesale into prompts with no way to reassemble by channel, detect missing chunks, or cite stderr segment 2 of build observation 17. Execution, observation, and content-payload identities collapse into one.
    ja: 実行出力観測がなければ tool 返却 stdout/stderr を prompt に丸ごと貼るだけになり、channel 再構成、欠落 chunk 検出、「build observation 17 の stderr segment 2」引用ができません。execution/observation/content payload identity が一体化します。
  includes:
    - zh: CommandOutputObservation、ExitStatusObservation、StandardOutputChunk、StandardErrorChunk 及 OutputStream 有序分块。
      en: CommandOutputObservation, ExitStatusObservation, StandardOutputChunk, StandardErrorChunk, and ordered OutputStream chunks.
      ja: CommandOutputObservation/ExitStatusObservation/StandardOutputChunk/StandardErrorChunk と ordered OutputStream chunk。
    - zh: ExecutionReference 定位执行结果、工作目录和环境绑定，且不改变 referent 身份。
      en: ExecutionReference locating execution results, working directories, and environment bindings without changing referent identity.
      ja: ExecutionReference による execution result/working directory/environment binding 位置付け（referent identity 不変）。
  excludes:
    - zh: 命令调用、ExecutionAttempt、RunResult 身份归 tool-invocation-execution 或 runtime-plane。
      en: Command invocation, ExecutionAttempt, and RunResult identity belong to tool-invocation-execution or runtime-plane.
      ja: command invocation/ExecutionAttempt/RunResult identity は tool-invocation-execution/runtime-plane に属します。
    - zh: 通用 TextBlock、CodeBlock 和 FileReferenceBlock 归 info-content-block-modality；长期日志流与 Sink 归 logging/telemetry。
      en: Generic TextBlock, CodeBlock, and FileReferenceBlock belong to info-content-block-modality; durable log streams and Sinks belong to logging and telemetry.
      ja: generic TextBlock/CodeBlock/FileReferenceBlock は info-content-block-modality、永続 log stream/Sink は logging/telemetry に属します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 容器与终端工具普遍把“执行活动”和“可见输出流”分开。POSIX 进程提供 stdout/stderr 两个通道与 exit code；Docker/API 返回 logs 流；Cursor/Claude Code 等 agent 终端工具把 shell 输出按 chunk 或 line 回传。Moonweave 用 channel（stdout/stderr）、sequence 和 observation_id 重组输出，并把文本载荷通过 cross-link 交给 ContentBlock，而不把观测节点本身当成 Message 或 RunResult。
    en: Container and terminal tools universally separate execution activity from visible output streams. POSIX processes expose stdout and stderr channels plus an exit code; Docker and similar APIs return log streams; agent terminal tools in Cursor and Claude Code return shell output as chunks or lines. Moonweave reassembles output using channel (stdout/stderr), sequence, and observation_id, and cross-links text payloads to ContentBlock without treating observation nodes as Message or RunResult objects.
    ja: container/terminal tool は一般に「実行 activity」と「可視 output stream」を分けます。POSIX process は stdout/stderr channel+exit code、Docker 等 API は log stream、Cursor/Claude Code agent terminal tool は shell output を chunk/line で返します。Moonweave は channel/sequence/observation_id で output を再構成し、text payload は cross-link で ContentBlock へ渡します。observation node を Message/RunResult とみなしません。
  typical_input:
    - description: POSIX shell execution — stdout/stderr chunks with exit code.
      format: |
        # conceptual tool result
        {
          "execution_reference_id": "exec-ref-build-17",
          "stdout_chunks": [
            {"sequence": 0, "text": "compile\n"},
            {"sequence": 1, "text": "tests passed\n"}
          ],
          "stderr_chunks": [
            {"sequence": 0, "text": "1 deprecation warning\n"}
          ],
          "exit_code": 0
        }
      source_claims: [claim-info-container-posix]
    - description: MCP tool result text content — large command output returned to the model.
      format: |
        {
          "content": [
            {"type": "text", "text": "total 24\n-rw-r--r-- 1 user staff  4096 Jul 19 10:00 README.md"}
          ],
          "isError": false
        }
      source_claims: [claim-info-container-mcp-tool-result]
    - description: Container log stream — timestamped stdout/stderr lines from one run.
      format: |
        {
          "run_id": "run-container-901",
          "log_lines": [
            {"stream": "stdout", "sequence": 0, "message": "Starting service..."},
            {"stream": "stderr", "sequence": 0, "message": "warning: deprecated API"}
          ]
        }
      source_claims: [claim-info-container-design]
  typical_output:
    - description: Moonweave-local command output observation — reassembled streams and gap check.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "observation_id": "cmdobs-build-17",
          "execution_reference_id": "exec-ref-build-17",
          "reconstructed_stdout": "compile\ntests passed\n",
          "reconstructed_stderr": "1 deprecation warning\n",
          "missing_sequences": {"stdout": [], "stderr": []},
          "exit_code": 0
        }
      source_claims: [claim-info-container-design]
  reference_implementations:
    - name: POSIX Shell Exit Status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
      description: stdout/stderr streams and exit code semantics for command execution.
    - name: MCP Tools — Tool Result
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool Result content arrays returning command or script output to the client.
    - name: Docker Engine API — Container logs
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
      description: Multiplexed stdout/stderr log stream from container execution.
structure:
  identity_keys: [observation_id, execution_reference_id]
  fields:
    - id: observation_id
      labels: {zh: 观测标识, en: Observation identifier, ja: 観測識別子}
      definitions:
        zh: 唯一标识一次 ExecutionObservation 记录的稳定 ID，例如 cmdobs-build-17。
        en: Stable ID uniquely identifying one ExecutionObservation record, such as cmdobs-build-17.
        ja: cmdobs-build-17 等、一 ExecutionObservation 記録を一意識別する安定 ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: cmdobs-build-17
      allowed_values: []
      source_claims: [claim-info-container-design]
    - id: execution_reference_id
      labels: {zh: 执行引用标识, en: Execution reference identifier, ja: 実行参照識別子}
      definitions:
        zh: 指向观测所属的 ExecutionReference，解析工作目录、容器 ID 或 invocation 语境，但不复制 RunResult 身份。
        en: Points to the ExecutionReference for the observation, resolving working directory, container ID, or invocation context without copying RunResult identity.
        ja: 観測が属する ExecutionReference を指し、working directory/container ID/invocation context を解決。RunResult identity は複製しません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: exec-ref-build-17
      allowed_values: []
      source_claims: [claim-info-container-design]
    - id: output_channel
      labels: {zh: 输出通道, en: Output channel, ja: 出力チャネル}
      definitions:
        zh: 输出流通道名称，通常为 stdout 或 stderr；不同通道的 sequence 独立计数。
        en: Output stream channel name, typically stdout or stderr; sequence ordinals are counted independently per channel.
        ja: 通常 stdout/stderr の output stream channel 名。sequence ordinal は channel ごとに独立计数。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: stdout
      allowed_values: [stdout, stderr]
      source_claims: [claim-info-container-posix]
    - id: chunk_sequence
      labels: {zh: 分块序号, en: Chunk sequence, ja: チャンク序号}
      definitions:
        zh: 在同一 observation_id 与 output_channel 内的从 0 开始连续递增序号；用于重组与缺块检测。
        en: Zero-based contiguous ordinal within the same observation_id and output_channel; used for reassembly and missing-chunk detection.
        ja: 同一 observation_id/output_channel 内の 0 始まり連続 ordinal。再構成と欠落 chunk 検出に使用。
      datatype: integer
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [claim-info-container-design]
    - id: exit_code
      labels: {zh: 退出码, en: Exit code, ja: 終了コード}
      definitions:
        zh: 进程或命令执行的整数退出码；与 OutputStream 分块分开记录为 ExitStatusObservation。
        en: Integer exit code of the process or command execution, recorded separately from OutputStream chunks as ExitStatusObservation.
        ja: process/command 実行の整数 exit code。OutputStream chunk とは別に ExitStatusObservation として記録。
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 0
      allowed_values: []
      source_claims: [claim-info-container-posix]
  constraints:
    - id: info-container-sequence-continuity
      severity: error
      expression_language: plain
      expression: For each observation_id and output_channel, chunk_sequence values must form a contiguous range starting at 0 before reconstructed output may be treated as complete.
      explanation:
        zh: 序号不连续时，重组 stdout/stderr 会 silently 丢失中间输出。
        en: With non-contiguous sequences, reassembled stdout or stderr silently drops intermediate output.
        ja: sequence が非連続だと再構成 stdout/stderr が中間 output を silent に落とします。
      source_claims: [claim-info-container-design]
    - id: info-container-observation-not-execution
      severity: error
      expression_language: plain
      expression: An ExecutionObservation or OutputStream must not be registered as an ExecutionAttempt or RunResult; observing output does not prove the owning module executed the command.
      explanation:
        zh: 把观测当成执行会把“看到了输出”误当成“发起了调用”。 
        en: Treating observation as execution misreports seeing output as having invoked the command.
        ja: observation を execution とみなすと「output を見た」を「command を起動した」と誤ります。
      source_claims: [claim-info-container-design]
  required_relations: []
examples:
  - id: info-container-example-stdout-stderr-reassembly
    labels:
      zh: stdout/stderr 分块重组
      en: stdout/stderr chunk reassembly
      ja: stdout/stderr チャンク再構成
    descriptions:
      zh: CommandOutputObservation cmdobs-build-17 保存 stdout sequence 0..1 与 stderr sequence 0 三个分块。按通道重组后 stdout 为 "compile\ntests passed\n"，stderr 为 "1 deprecation warning\n"；missing_sequences 两通道皆为空。
      en: CommandOutputObservation cmdobs-build-17 stores stdout sequences 0..1 and stderr sequence 0. Per-channel reassembly yields stdout "compile\ntests passed\n" and stderr "1 deprecation warning\n" with empty missing_sequences on both channels.
      ja: CommandOutputObservation cmdobs-build-17 が stdout sequence 0..1 と stderr sequence 0 の三 chunk を保存。channel ごと再構成で stdout "compile\ntests passed\n"、stderr "1 deprecation warning\n"、両 channel missing_sequences 空。
    example_source:
      product: Moonweave execution observation design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      observation_id: cmdobs-build-17
      execution_reference_id: exec-ref-build-17
      stdout_sequences: [0, 1]
      stderr_sequences: [0]
      exit_code: 0
    related_node_ids: [info-container-command]
    related_relation_ids: []
    source_claims: [claim-info-container-design]
  - id: info-container-example-missing-chunk-detection
    labels:
      zh: 缺块检测失败例
      en: Missing chunk detection failure
      ja: 欠落チャンク検出失敗例
    descriptions:
      zh: cmdobs-build-18 的 stdout 只有 sequence 0 与 2，缺少 sequence 1。系统拒绝输出 reconstruction_complete=true，并返回 missing_sequences.stdout=[1]，不得用 RunResult 摘要臆造缺失文本。
      en: cmdobs-build-18 stdout has only sequences 0 and 2, missing sequence 1. The system rejects reconstruction_complete=true and returns missing_sequences.stdout=[1], without inventing missing text from a RunResult summary.
      ja: cmdobs-build-18 stdout が sequence 0 と 2 のみで sequence 1 欠落。reconstruction_complete=true を拒否し missing_sequences.stdout=[1] を返し、RunResult 要約から欠落 text を捏造しません。
    example_source:
      product: Moonweave execution observation design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      observation_id: cmdobs-build-18
      stdout_sequences: [0, 2]
      missing_sequences:
        stdout: [1]
      reconstruction_complete: false
    related_node_ids: [info-container-command]
    related_relation_ids: []
    source_claims: [claim-info-container-design]
  - id: info-container-example-mcp-tool-result-text
    labels:
      zh: MCP Tool Result 文本输出观测
      en: MCP Tool Result text output observation
      ja: MCP Tool Result テキスト出力観測
    descriptions:
      zh: MCP tools/call 返回 Tool Result，content[0].type=text，text 为 ls -l 样式目录列表。系统创建 CommandOutputObservation cmdobs-ls-4，把 text 映射为 stdout sequence 0 的 StandardOutputChunk，并 cross-link 到 TextBlock，而不把 Tool Result 消息身份与观测混同。
      en: MCP tools/call returns a Tool Result with content[0].type=text containing an ls -l style directory listing. The system creates CommandOutputObservation cmdobs-ls-4, maps the text to StandardOutputChunk stdout sequence 0, and cross-links to TextBlock without conflating Tool Result message identity with the observation.
      ja: MCP tools/call が content[0].type=text（ls -l 形式 directory listing）の Tool Result を返します。CommandOutputObservation cmdobs-ls-4 を作成し text を stdout sequence 0 StandardOutputChunk へ写像、TextBlock へ cross-link。Tool Result message identity と observation を混同しません。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    field_values:
      observation_id: cmdobs-ls-4
      tool_result_type: text
      output_channel: stdout
      chunk_sequence: 0
    related_node_ids: [info-container-command, info-content-block-modality, info-messages-instructions]
    related_relation_ids: []
    source_claims: [claim-info-container-mcp-tool-result]
  - id: info-container-example-nonzero-exit-status
    labels:
      zh: 非零退出码观测
      en: Non-zero exit status observation
      ja: 非ゼロ終了コード観測
    descriptions:
      zh: '构建命令返回 exit_code=2，stderr 含 "error: test suite failed"。ExitStatusObservation 与 CommandOutputObservation 分别记录退出码与 stderr 分块；不得仅因 stdout 为空就省略 ExitStatusObservation。'
      en: 'A build command returns exit_code=2 with stderr containing "error: test suite failed". ExitStatusObservation and CommandOutputObservation record the exit code and stderr chunks separately; ExitStatusObservation must not be omitted just because stdout is empty.'
      ja: 'build command が exit_code=2、stderr "error: test suite failed" を返します。ExitStatusObservation と CommandOutputObservation が exit code/stderr chunk を分别記録。stdout 空を理由に ExitStatusObservation を省略してはなりません。'
    example_source:
      product: POSIX exit status
      url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    field_values:
      observation_id: cmdobs-build-19
      exit_code: 2
      stderr_text: "error: test suite failed"
    related_node_ids: [info-container-command]
    related_relation_ids: []
    source_claims: [claim-info-container-posix]
  - id: info-container-example-container-log-stream
    labels:
      zh: 容器日志流观测
      en: Container log stream observation
      ja: コンテナログストリーム観測
    descriptions:
      zh: '容器 run-container-901 返回两条 log_lines：stdout sequence 0 "Starting service..." 与 stderr sequence 0 "warning: deprecated API"。系统为同一 execution_reference_id 创建单一 CommandOutputObservation，并按 stream 字段分别归入 stdout/stderr OutputStream。'
      en: 'Container run-container-901 returns two log_lines—stdout sequence 0 "Starting service..." and stderr sequence 0 "warning: deprecated API". The system creates one CommandOutputObservation for the same execution_reference_id and routes each line into stdout or stderr OutputStream by stream field.'
      ja: 'container run-container-901 が log_lines 二件（stdout seq0 "Starting service..."、stderr seq0 "warning: deprecated API"）を返します。同一 execution_reference_id で一 CommandOutputObservation を作成し stream field で stdout/stderr OutputStream へ振り分けます。'
    example_source:
      product: Docker Engine API
      url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
    field_values:
      execution_reference_id: exec-ref-container-901
      run_id: run-container-901
      log_line_count: 2
    related_node_ids: [info-container-command]
    related_relation_ids: []
    source_claims: [claim-info-container-design]
parent_relation: null
relations: []
sources:
  - id: src-posix-exit-status
    title: POSIX Shell Command Language — Exit Status
    publisher: IEEE/Open Group
    url: https://pubs.opengroup.org/onlinepubs/9699919799/utilities/V3_chap02.html
    version: exit status checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: standard
    authority: A
    status: fetched
    why_it_matters: Defines stdout/stderr streams and integer exit codes for command execution.
  - id: src-mcp-tool-result
    title: MCP Server Tools Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    version: Tool Result checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    status: fetched
    why_it_matters: Defines Tool Result content arrays returning command or script output text to clients.
  - id: src-docker-container-logs
    title: Docker Engine API — Container logs
    publisher: Docker
    url: https://docs.docker.com/engine/api/v1.43/#tag/Container/operation/ContainerLogs
    version: multiplexed stdout/stderr logs checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-doc
    authority: B
    status: fetched
    why_it_matters: Defines timestamped stdout/stderr log streams from container execution.
  - id: src-info-container-design
    title: Moonweave info-container-command module boundary design
    publisher: Moonweave
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    version: module boundary checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: design-inference
    authority: B
    status: fetched
    why_it_matters: Separates execution observations from invocation, RunResult identity, and generic content blocks.
source_claims:
  - id: claim-info-container-posix
    source: src-posix-exit-status
    supports: POSIX command execution exposes stdout and stderr streams and an integer exit code as distinct observable outcomes.
    locator: Shell command language > Exit status
    evidence_kind: standard
    confidence: high
  - id: claim-info-container-mcp-tool-result
    source: src-mcp-tool-result
    supports: MCP Tool Result returns content arrays with text payloads suitable for modeling as observed command output separate from protocol message identity.
    locator: Server features > Tools > Tool Result
    evidence_kind: primary-spec
    confidence: high
  - id: claim-info-container-design
    source: src-info-container-design
    supports: Moonweave models channel-ordered output chunks and exit-status observations separately from command invocation and RunResult identity.
    locator: Execution output observations module boundary
    evidence_kind: design-inference
    confidence: high
