schema: moonweave.ai/ontology-node/v1
id: info-container-command
kind: module
status: accepted
labels:
  zh: 执行输出观测
  en: Execution output observations
  ja: 実行出力観測
semantics:
  short_definition:
    zh: 执行输出观测记录某次命令或进程执行对外可见的输出证据：按通道与序号组织的输出流和分块、退出状态观测，以及用于解析执行结果、工作目录或环境绑定的执行引用。它不表示命令调用或执行活动本身。
    en: Execution output observations record externally visible evidence from one command or process execution, including channel-ordered streams and chunks, exit-status observations, and references that resolve an execution result, working directory, or environment binding. They do not represent command invocation or execution activity itself.
    ja: 実行出力観測は、一回のコマンドまたはプロセス実行から外部に見える証拠を記録します。チャネル別に順序化されたストリームとチャンク、終了状態観測、実行結果・作業ディレクトリ・環境バインドを解決する参照を含み、呼出しや実行活動そのものは表しません。
  definition:
    zh: 本模块有三个并列根：ExecutionObservation 是对执行结果的带时间与采集条件观测；OutputStream 是在同一执行通道内有序组织输出片段的集合；ExecutionReference 是不复制目标对象的执行语境引用。三者共同回答“观察到了什么，以及该证据属于哪个执行语境”，但不重新定义执行、通用内容或持久日志。
    en: The module has three parallel roots. ExecutionObservation is a time- and acquisition-qualified observation of an execution result; OutputStream is the ordered collection of output segments within one execution channel; ExecutionReference resolves execution-scoped objects without copying them. Together they answer what was observed and to which execution context the evidence belongs, without redefining execution, generic content, or durable logs.
    ja: 本モジュールは三つの並列ルートを持ちます。ExecutionObservation は時刻と取得条件を伴う実行結果の観測、OutputStream は一つの実行チャネル内の順序付き出力セグメント集合、ExecutionReference は対象を複製せず実行スコープの対象を解決する参照です。実行、汎用内容、永続ログは再定義しません。
  why_needed:
    zh: 使执行输出能按通道、顺序和采集条件被重组、审计与引用，同时保持“执行”、“观测”和“内容载荷”三种身份分离。
    en: Turn output and exit status from command or process execution into ordered observational evidence that may enter context.
    ja: コマンドまたはプロセス実行の出力と終了状態を、コンテキストへ取り込める順序付き観測証拠へ変換します。
  includes:
    - zh: 命令输出观测、退出状态观测、标准输出与标准错误流及其有序分块。
      en: Command-output observations, exit-status observations, stdout and stderr streams, and their ordered chunks.
      ja: コマンド出力観測、終了状態観測、標準出力・標準エラーストリーム、および順序付きチャンク。
    - zh: 定位执行结果、工作目录和环境绑定且不改变其身份的引用。
      en: References that locate execution results, working directories, and environment bindings without changing their identity.
      ja: 実行結果、作業ディレクトリ、環境バインディングを同一性を変えずに位置付ける参照。
  excludes:
    - zh: 命令调用、执行尝试、重试与结果身份归调用与执行或执行尝试与结果；这里不声称执行了命令。
      en: Command invocation, execution attempts, retries, and result identity belong to invocation and execution or execution attempts and outcomes; this scope does not claim to execute commands.
      ja: コマンド呼出し、実行試行、再試行、結果の同一性は呼出しと実行または実行試行と結果に属し、ここではコマンド実行そのものを所有しません。
    - zh: 通用文本、代码或文件内容形式归内容表示；长期日志流与 Sink 归日志与遥测。
      en: Generic text, code, and file content forms belong to content representation; durable log streams and sinks belong to logging and telemetry.
      ja: 一般的なテキスト、コード、ファイル内容形式は内容表現、永続ログストリームと Sink はログとテレメトリに属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 使执行输出能按通道、顺序和采集条件被重组、审计与引用，同时保持“执行”、“观测”和“内容载荷”三种身份分离。
  en: Turn output and exit status from command or process execution into ordered observational evidence that may enter context.
  ja: コマンドまたはプロセス実行の出力と終了状態を、コンテキストへ取り込める順序付き観測証拠へ変換します。
