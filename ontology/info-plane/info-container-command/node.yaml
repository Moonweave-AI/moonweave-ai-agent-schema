    en: execution output evidence
    ja: 実行出力証拠
  owns_when:
    zh: 当对象必须依靠某次执行的标识、输出通道、分块次序、观测时间或退出状态才能确定身份，或它是用于解析执行语境的专用引用时，由本模块拥有。
    en: Own an object when its identity requires a particular execution ID together with output channel, chunk order, observation time, or exit status, or when it is a dedicated reference for resolving execution context.
    ja: 対象の同一性が特定の実行 ID と出力チャネル、チャンク順序、観測時刻、または終了状態に依存する場合、あるいは実行コンテキストを解決する専用参照である場合に所有します。
  references_when:
    zh: 执行活动与 ExecutionResult 由运行时模块拥有，通用文本或代码由内容表示拥有，持久日志由日志与遥测拥有；这些模块需要输出证据时只引用本模块的观测、流或引用。
    en: Runtime owns execution activities and ExecutionResult, content representation owns generic text or code, and logging and telemetry own durable logs. Those modules reference this module's observations, streams, or references when they need execution-output evidence.
    ja: 実行活動と ExecutionResult は runtime、汎用テキストやコードは content representation、永続ログは logging/telemetry が所有し、実行出力証拠が必要なときに本モジュールの観測、ストリーム、参照を利用します。
