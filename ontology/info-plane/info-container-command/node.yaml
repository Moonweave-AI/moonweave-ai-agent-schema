source_claims:
  - id: claim-info-container-command-001
    source: eng-std-posix-shell-2024
    supports: POSIX.1-2024 normatively distinguishes standard output, standard error, redirection, command completion, and exit status. Those facts support CommandOutputObservation, separate output channels, chunks, and exit-status observations; Moonweave adds chunk identity, context-ingress events, and the module ownership rule.
    locator: Shell Command Language 搂2.7 Redirection; 搂2.8.2 Exit Status for Commands; standard output and standard error
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-info-container-command-002
    source: eng-fw-deepagents-context-engineering
    supports: Deep Agents context engineering offloads large tool inputs and results to files, preserves the original content, and replaces inline history with references that can be searched and retrieved. This supports separating an execution observation from its admission or summary in active context; Moonweave's channel/chunk schema and ownership boundary are design inferences.
    locator: Context engineering > Offloading > large tool inputs and results; Filesystem preservation; Summarization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-info-container-command-003
    source: eng-std-posix-shell-2024
    supports: POSIX.1-2024 normatively distinguishes standard output and standard error as separate command streams. It directly supports the channel distinction in cmdobs-build-17/18; Moonweave's chunk IDs, per-channel sequence continuity, duplicate detection, and gap reporting are reviewed design inferences.
    locator: Shell Command Language 搂2.7 Redirection, including standard-output and standard-error file descriptors
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-container-command-004
    source: eng-fw-deepagents-js-docs
    supports: Source eng-fw-deepagents-js-docs at Documentation page > Deep Agents JS docs heading and documented conceptual model supports operational notions used by Moonweave CQ info-container-command-cq-ordered-output-v3 (info-container-command.ordered-output), owned by info-container-command and compared with runtime-execution-attempts. The source does not define Moonweave CQ info-container-command-cq-ordered-output-v3, its query, assertion, owner, or evidence binding. The query "For one execution reference, partition OutputChunk values by stream kind, order by sequence, and detect sequence gaps or duplicates." and expected assertion "Each channel yields a deterministic byte/text sequence; missing and duplicate positions are reported rather than silently reordered." are a Moonweave design inference over the registered evidence.
    locator: Context engineering > Offloading > large tool inputs and results; Filesystem preservation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-container-command-005
    source: eng-std-posix-shell-2024
    supports: POSIX.1-2024 defines exit-status interpretation for commands, including zero, non-zero, command-not-found, non-executable, and signal-related outcomes. This supports retaining exit_code as raw evidence; Moonweave separately records the policy that turns it into a diagnostic conclusion.
    locator: Shell Command Language 搂2.8.2 Exit Status for Commands
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-info-container-command-006
    source: eng-fw-deepagents-js-docs
    supports: Source eng-fw-deepagents-js-docs at Documentation page > Deep Agents JS docs heading and documented conceptual model supports operational notions used by Moonweave CQ info-container-command-cq-exit-status-evidence-v3 (info-container-command.exit-status-evidence), owned by info-container-command and compared with feedback-warning-error. The source does not define Moonweave CQ info-container-command-cq-exit-status-evidence-v3, its query, assertion, owner, or evidence binding. The query "Resolve an ExitStatusObservation to its execution reference and recorded fields, then apply the declared status interpretation policy." and expected assertion "Exit code remains a field; success or failure is asserted only when the interpretation policy and required fields are present." are a Moonweave design inference over the registered evidence.
    locator: Context engineering > Offloading > large tool inputs and results; Filesystem preservation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
