schema: moonweave.ai/ontology-node/v1
id: info-plane
kind: domain
status: accepted
labels:
  en: Context Ingress & Staging Domain
  zh: 上下文摄入与暂存域
  ja: コンテキスト取り込みとステージングドメイン
semantics:
  short_definition:
    en: Context Ingress & Staging Domain is the operational concern domain for observable content becoming available to an agent step or model call. It models message and instruction envelopes, source references, content blocks, context windows, lightweight discovery pointers, disclosed output segments, and execution observations as they are selected, transformed, cited, suppressed, or staged into context.
    zh: 上下文摄入与暂存域是描述可观察内容如何进入某次 agent 步骤或模型调用可见上下文的运行关注域。它建模消息与指令包络、来源引用、内容块、上下文窗口、轻量发现指针、已披露输出片段，以及执行观测在被选择、转换、引用、抑制或暂存进上下文时的语义。
    ja: コンテキスト取り込みとステージングドメインは、観測可能な内容がエージェントのステップまたはモデル呼び出しで利用可能なコンテキストになる過程を扱う運用関心ドメインです。メッセージと指示の包絡、出典参照、内容ブロック、コンテキストウィンドウ、軽量発見ポインタ、開示済み出力セグメント、実行観測が、選択、変換、引用、抑制、またはコンテキストへステージングされるときの意味をモデル化します。
  definition:
    en: Context Ingress & Staging Domain is the operational concern domain for observable content becoming available to an agent step or model call. It models message and instruction envelopes, source references, content blocks, context windows, lightweight discovery pointers, disclosed output segments, and execution observations as they are selected, transformed, cited, suppressed, or staged into context.
    zh: 上下文摄入与暂存域是描述可观察内容如何进入某次 agent 步骤或模型调用可见上下文的运行关注域。它建模消息与指令包络、来源引用、内容块、上下文窗口、轻量发现指针、已披露输出片段，以及执行观测在被选择、转换、引用、抑制或暂存进上下文时的语义。
    ja: コンテキスト取り込みとステージングドメインは、観測可能な内容がエージェントのステップまたはモデル呼び出しで利用可能なコンテキストになる過程を扱う運用関心ドメインです。メッセージと指示の包絡、出典参照、内容ブロック、コンテキストウィンドウ、軽量発見ポインタ、開示済み出力セグメント、実行観測が、選択、変換、引用、抑制、またはコンテキストへステージングされるときの意味をモデル化します。
  why_needed:
    zh: 把外部或运行信息转成可定位、可选择、可披露的上下文证据。
    en: Turns external and runtime information into locatable, selectable, and disclosable context evidence.
    ja: 外部情報と実行情報を、位置付け・選択・開示可能なコンテキスト証拠へ変換します。
  includes:
    - zh: "信息域负责内容表示（owner: info-content-block-modality）与上下文发现（owner: info-indexing）：前者定义多模态内容的可解释形态，后者定义证据的索引、引用和访问路径。"
      en: "The Info domain owns Content representation (owner: info-content-block-modality) and Context discovery (owner: info-indexing): the first defines interpretable multimodal content forms, while the second defines evidence indexes, references, and access paths."
      ja: "情報ドメインは内容表現（owner: info-content-block-modality）とコンテキスト発見（owner: info-indexing）を所有します。前者は解釈可能なマルチモーダル内容形式を、後者は証拠の索引・参照・アクセス経路を定義します。"
    - zh: "信息域还负责输出披露（owner: info-output-disclosure），即决定已经形成的信息如何分段、解释并向当前接收者呈现，但不在此重新定义授权或长期记忆身份。"
      en: "The Info domain also owns Output disclosure (owner: info-output-disclosure), which determines how formed information is segmented, explained, and presented to the current recipient without redefining authorization or persistent-memory identity."
      ja: "情報ドメインは出力開示（owner: info-output-disclosure）も所有し、形成済み情報を現在の受信者へどう分割・説明・提示するかを定めますが、認可や永続記憶の同一性は再定義しません。"
  excludes:
    - zh: "上下文组装（owner: memory-context）属于记忆域，因为它选择并编排可持续使用的记忆内容；信息域只提供可引用的信息单位与披露形式，并通过显式关系连接该外域职责。"
      en: "Context assembly (owner: memory-context) belongs to Memory because it selects and composes memory content for continued use; Info supplies referable information units and disclosure forms and connects to that foreign responsibility only through explicit relations."
      ja: "コンテキスト組み立て（owner: memory-context）は継続利用する記憶内容を選択・編成するため記憶ドメインに属します。情報ドメインは参照可能な情報単位と開示形式を供給し、明示的関係だけでこの外部責務へ接続します。"
    - zh: "披露与脱敏（owner: safety-disclosure-redaction）属于安全域，因为它依据敏感性和策略决定允许显示的范围；信息域描述输出结构，不复制脱敏规则、授权判定或安全责任。"
      en: "Disclosure and redaction (owner: safety-disclosure-redaction) belongs to Safety because it decides permitted visibility from sensitivity and policy; Info describes output structure without copying redaction rules, authorization decisions, or safety accountability."
      ja: "開示と墨消し（owner: safety-disclosure-redaction）は機密性と方針から表示可能範囲を決めるため安全ドメインに属します。情報ドメインは出力構造を記述しますが、墨消し規則・認可判断・安全責任を複製しません。"
  semantic_kind: null
  aliases: []
