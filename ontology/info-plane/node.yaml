schema: moonweave.ai/ontology-node/v1
id: info-plane
kind: domain
status: accepted
labels:
  en: Context Ingress & Staging Domain
  zh: 上下文摄入与暂存域
  ja: コンテキスト取り込みとステージングドメイン
semantics:
  short_definition:
    en: Context Ingress & Staging Domain is the operational concern domain for observable content becoming available to an agent step or model call. It models message and instruction envelopes, source references, content blocks, context windows, lightweight discovery pointers, disclosed output segments, and execution observations as they are selected, transformed, cited, suppressed, or staged into context.
    zh: 上下文摄入与暂存域是描述可观察内容如何进入某次 agent 步骤或模型调用可见上下文的运行关注域。它建模消息与指令包络、来源引用、内容块、上下文窗口、轻量发现指针、已披露输出片段，以及执行观测在被选择、转换、引用、抑制或暂存进上下文时的语义。
    ja: コンテキスト取り込みとステージングドメインは、観測可能な内容がエージェントのステップまたはモデル呼び出しで利用可能なコンテキストになる過程を扱う運用関心ドメインです。メッセージと指示の包絡、出典参照、内容ブロック、コンテキストウィンドウ、軽量発見ポインタ、開示済み出力セグメント、実行観測が、選択、変換、引用、抑制、またはコンテキストへステージングされるときの意味をモデル化します。
  definition:
    en: Context Ingress & Staging Domain is the operational concern domain for observable content becoming available to an agent step or model call. It models message and instruction envelopes, source references, content blocks, context windows, lightweight discovery pointers, disclosed output segments, and execution observations as they are selected, transformed, cited, suppressed, or staged into context.
    zh: 上下文摄入与暂存域是描述可观察内容如何进入某次 agent 步骤或模型调用可见上下文的运行关注域。它建模消息与指令包络、来源引用、内容块、上下文窗口、轻量发现指针、已披露输出片段，以及执行观测在被选择、转换、引用、抑制或暂存进上下文时的语义。
    ja: コンテキスト取り込みとステージングドメインは、観測可能な内容がエージェントのステップまたはモデル呼び出しで利用可能なコンテキストになる過程を扱う運用関心ドメインです。メッセージと指示の包絡、出典参照、内容ブロック、コンテキストウィンドウ、軽量発見ポインタ、開示済み出力セグメント、実行観測が、選択、変換、引用、抑制、またはコンテキストへステージングされるときの意味をモデル化します。
  why_needed:
    zh: 把外部或运行信息转成可定位、可选择、可披露的上下文证据。
    en: Turns external and runtime information into locatable, selectable, and disclosable context evidence.
    ja: 外部情報と実行情報を、位置付け・選択・開示可能なコンテキスト証拠へ変換します。
  includes:
    - zh: "信息域负责内容表示（owner: info-content-block-modality）与上下文发现（owner: info-indexing）：前者定义多模态内容的可解释形态，后者定义证据的索引、引用和访问路径。"
      en: "The Info domain owns Content representation (owner: info-content-block-modality) and Context discovery (owner: info-indexing): the first defines interpretable multimodal content forms, while the second defines evidence indexes, references, and access paths."
      ja: "情報ドメインは内容表現（owner: info-content-block-modality）とコンテキスト発見（owner: info-indexing）を所有します。前者は解釈可能なマルチモーダル内容形式を、後者は証拠の索引・参照・アクセス経路を定義します。"
    - zh: "信息域还负责输出披露（owner: info-output-disclosure），即决定已经形成的信息如何分段、解释并向当前接收者呈现，但不在此重新定义授权或长期记忆身份。"
      en: "The Info domain also owns Output disclosure (owner: info-output-disclosure), which determines how formed information is segmented, explained, and presented to the current recipient without redefining authorization or persistent-memory identity."
      ja: "情報ドメインは出力開示（owner: info-output-disclosure）も所有し、形成済み情報を現在の受信者へどう分割・説明・提示するかを定めますが、認可や永続記憶の同一性は再定義しません。"
  excludes:
    - zh: "上下文组装（owner: memory-context）属于记忆域，因为它选择并编排可持续使用的记忆内容；信息域只提供可引用的信息单位与披露形式，并通过显式关系连接该外域职责。"
      en: "Context assembly (owner: memory-context) belongs to Memory because it selects and composes memory content for continued use; Info supplies referable information units and disclosure forms and connects to that foreign responsibility only through explicit relations."
      ja: "コンテキスト組み立て（owner: memory-context）は継続利用する記憶内容を選択・編成するため記憶ドメインに属します。情報ドメインは参照可能な情報単位と開示形式を供給し、明示的関係だけでこの外部責務へ接続します。"
    - zh: "披露与脱敏（owner: safety-disclosure-redaction）属于安全域，因为它依据敏感性和策略决定允许显示的范围；信息域描述输出结构，不复制脱敏规则、授权判定或安全责任。"
      en: "Disclosure and redaction (owner: safety-disclosure-redaction) belongs to Safety because it decides permitted visibility from sensitivity and policy; Info describes output structure without copying redaction rules, authorization decisions, or safety accountability."
      ja: "開示と墨消し（owner: safety-disclosure-redaction）は機密性と方針から表示可能範囲を決めるため安全ドメインに属します。情報ドメインは出力構造を記述しますが、墨消し規則・認可判断・安全責任を複製しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 把外部或运行信息转成可定位、可选择、可披露的上下文证据。
  en: Turns external and runtime information into locatable, selectable, and disclosable context evidence.
  ja: 外部情報と実行情報を、位置付け・選択・開示可能なコンテキスト証拠へ変換します。
structure: null
examples:
  - id: info-plane-example-positive-001
    kind: positive
    labels:
      zh: 带来源的文档片段进入当前调用
      en: Sourced document segments enter the current call
      ja: 出典付き文書断片が現在の呼出しへ入る
    scenario_id: null
    descriptions:
      zh: 用户在 message-842 中要求比较两份规范。系统把 PDF 页段解析为 content-block-31/32，分别绑定 source-ref-rfc7396 与 source-ref-mcp-20261125，再用 index-pointer-77 定位候选段；只有被选择且通过披露检查的片段进入 context-window-call-842，回答中的引用仍指回原页段。
      en: In message-842 the user asks to compare two specifications. The system parses PDF passages into content-block-31/32, binds them to source-ref-rfc7396 and source-ref-mcp-20261125, and locates candidates through index-pointer-77. Only selected, disclosure-cleared segments enter context-window-call-842, and answer citations still resolve to the original passages.
      ja: message-842 で利用者が二つの仕様比較を依頼します。PDF の段落を content-block-31/32 に解析し source-ref-rfc7396 と source-ref-mcp-20261125 に結び、index-pointer-77 で候補を特定します。選択され開示確認を通った断片だけが context-window-call-842 に入り、回答引用は元の段落へ解決できます。
    field_values:
      message_envelope_id: message-842
      content_block_ids:
        - content-block-31
        - content-block-32
      source_reference_ids:
        - source-ref-rfc7396
        - source-ref-mcp-20261125
      index_pointer_id: index-pointer-77
      context_window_id: context-window-call-842
      disclosure_status: selected-and-cleared
    related_node_ids:
      - info-plane
    related_relation_ids: []
    expected_result:
      zh: 查询可说明每个可见片段如何进入本次调用、为何被选择、向谁披露，以及引用如何返回原始来源；不据此声称片段已经成为长期记忆。
      en: A query can explain how each visible segment entered this call, why it was selected, to whom it was disclosed, and how its citation resolves to origin, without claiming that it became persistent memory.
      ja: 各可視断片が今回の呼出しへ入った経路、選択理由、開示先、元出典への解決を説明でき、永続記憶になったとは主張しません。
    why_valid_or_invalid:
      zh: 对象身份由消息包络、可引用内容单位、来源定位、候选发现和当前窗口披露共同决定，回答的是“哪些可观察信息进入当前上下文”，而不是长期保存或策略授权。
      en: Identity is determined by the envelope, referable content units, source location, candidate discovery, and current-window disclosure. It answers what observable information entered current context, not long-term retention or policy authorization.
      ja: 同一性は envelope・参照可能 content unit・source location・candidate discovery・current-window disclosure で決まり、現在の文脈へ入った情報を答え、長期保存や方針認可は扱いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-info-plane-003
  - id: info-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 跨会话偏好记录不是临时信息摄入
      en: A cross-session preference record is not transient ingress
      ja: セッション横断の選好記録は一時情報取込ではない
    scenario_id: null
    descriptions:
      zh: 用户偏好 preference-17 已在三次会话后仍保存在 memory-store-user-4，并通过 retrieval-run-91 被重新纳入新会话；当前消息只引用了该记录，没有重新创建其身份。
      en: Preference preference-17 remains in memory-store-user-4 across three sessions and is reintroduced by retrieval-run-91 into a new session. The current message merely references the record and does not recreate its identity.
      ja: preference-17 は三セッションを越えて memory-store-user-4 に残り retrieval-run-91 で新セッションへ再導入されます。現在の message は記録を参照するだけで同一性を作り直しません。
    field_values:
      memory_record_id: preference-17
      memory_store_id: memory-store-user-4
      retention_scope: cross-session
      retrieval_run_id: retrieval-run-91
      current_message_role: reference-only
    related_node_ids:
      - info-plane
      - memory-plane
    related_relation_ids: []
    expected_result:
      zh: 把 preference-17 的持久身份、生命周期与检索归入记忆域；信息域只记录它在本次消息和上下文窗口中的引用与披露。
      en: Assign preference-17's persistent identity, lifecycle, and retrieval to Memory; Info records only its reference and disclosure in the current message and context window.
      ja: preference-17 の永続同一性・life cycle・retrieval は Memory に置き、Info は今回 message/context window での参照と開示だけを記録します。
    why_valid_or_invalid:
      zh: 跨会话保留和再次检索是 MemoryRecord 的身份条件；仅因为记录最终出现在当前上下文，不能把持久化本体迁入信息域。
      en: Cross-session retention and later retrieval determine MemoryRecord identity. Appearing in current context does not move the persistence ontology into Info.
      ja: セッション横断保持と後の retrieval が MemoryRecord の同一性条件であり、現在文脈に現れたことだけで永続化本体を Info へ移しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-info-plane-004
