schema: moonweave.ai/ontology-node/v1
id: info-plane
kind: domain
labels:
  en: Context Ingress & Staging Domain
  zh: 上下文摄入与暂存域
  ja: コンテキスト取り込みとステージングドメイン
semantics:
  short_definition:
    zh: 信息域描述可观察内容如何被表示、引用、发现并分段披露，以便进入某次模型调用或智能体步骤的可见上下文。
    en: The information domain describes how observable content is represented, referenced, discovered, and disclosed in segments so it can enter the visible context of one model call or agent step.
    ja: 情報ドメインは、観測可能な内容がどのように表現・参照・発見・分割開示され、一回のモデル呼び出しまたはエージェントステップの可視コンテキストへ入るかを扱います。
  definition:
    zh: 上下文摄入与暂存域是智能体系统中负责“内容如何被看见”的运行域。它把来自用户、工具、协议或外部系统的消息、内容块、来源引用、发现指针和输出披露片段组织成可解释、可定位、可引用的信息单位，供当前调用选择、转换或暂存进上下文窗口。该域覆盖多模态内容表示、消息与会话包络、来源与资源引用、轻量索引发现，以及面向当前接收者的输出分段与呈现结构；但不拥有跨会话记忆写入、运行执行轨迹、编排路由决策或安全授权判定本身。边界上，仅影响一次调用的临时可见内容属于本域，而需要持久保留、检索与生命周期治理的状态属于记忆域，由显式关系连接而非语义混同。
    en: Context Ingress & Staging Domain is the operational domain for how content becomes visible in agentic systems. It organizes messages, content blocks, source references, discovery pointers, and output-disclosure segments from users, tools, protocols, or external systems into interpretable, locatable, referable information units that the current call may select, transform, or stage into a context window. The domain spans multimodal content representation, message and conversation envelopes, source and resource references, lightweight index discovery, and output segmentation for the current recipient. It does not own cross-session memory writes, runtime execution traces, orchestration routing decisions, or security-authorization adjudication. Transient content visible only for one call belongs here; durable state requiring retention, retrieval, and lifecycle governance belongs to the memory domain and connects only through explicit relations.
    ja: コンテキスト取り込みとステージングドメインは、エージェント系において「内容がどう可視化されるか」を担う運用ドメインです。利用者、ツール、プロトコル、外部システム由来のメッセージ、内容ブロック、出典参照、発見ポインタ、出力開示セグメントを、解釈可能・位置特定可能・参照可能な情報単位へ整理し、現在の呼び出しが選択・変換・コンテキストウィンドウへステージングできるようにします。マルチモーダル内容表現、メッセージ/会話包絡、出典/リソース参照、軽量索引発見、現受信者向け出力分割を包含しますが、セッション横断記憶書き込み、実行トレース、オーケストレーションルーティング、安全認可判定そのものは所有しません。一回の呼び出しだけで可視な一時内容は本ドメイン、保持・検索・ライフサイクル管理が必要な永続状態は記憶ドメインに属し、明示的関係でのみ接続します。
  why_needed:
    zh: 没有这一域，系统只能看到原始 API 载荷，无法回答“这段文字来自哪份文件、为何进入当前 prompt、向谁披露、以及如何被不同厂商的消息格式一致引用”。多模态块、MCP 资源、A2A 工件和工具结果会被误当成长期记忆或运行日志，导致引用不可审计、上下文不可复现。
    en: Without this domain, a system only sees raw API payloads and cannot explain which file a passage came from, why it entered the current prompt, to whom it was disclosed, or how vendor-specific message shapes map to one referable model. Multimodal blocks, MCP resources, A2A artifacts, and tool results get misclassified as long-term memory or runtime logs, making citations non-auditable and context non-reproducible.
    ja: このドメインがなければ、生 API ペイロードしか見えず、文章の出典ファイル、現 prompt への入り方、開示先、各ベンダーのメッセージ形状を一貫参照する方法を説明できません。マルチモーダル块、MCP リソース、A2A 成果物、ツール結果が長期記憶や実行ログと誤分類され、引用監査と文脈再現が失われます。
  includes:
    - zh: 消息、内容块、指令包络及其 role/content 或 content-block 结构，使一次交互中的可观察载荷可被寻址与排序。
      en: Messages, content blocks, instruction envelopes, and their role/content or content-block structures so observable payloads in one interaction are addressable and ordered.
      ja: メッセージ、内容ブロック、指示包絡と role/content または content-block 構造により、一回の対話における観測ペイロードをアドレス可能・順序付け可能にします。
    - zh: 来源引用、MCP/A2A 资源 URI、发现指针与索引路径，使候选证据可被定位并在进入上下文前被选择。
      en: Source references, MCP/A2A resource URIs, discovery pointers, and index paths so candidate evidence can be located and selected before entering context.
      ja: 出典参照、MCP/A2A リソース URI、発見ポインタ、索引経路により、候補証拠を位置特定し文脈投入前に選択できます。
    - zh: 面向当前接收者的输出披露分段与呈现结构，说明已形成的信息如何被解释和展示，但不重新定义授权或长期记忆身份。
      en: Output-disclosure segmentation and presentation structure for the current recipient, explaining how formed information is interpreted and shown without redefining authorization or persistent-memory identity.
      ja: 現受信者向け出力開示分割と提示構造。形成済み情報の解釈/表示方法を示しますが、認可や永続記憶同一性は再定義しません。
  excludes:
    - zh: 跨会话写入、检索、合并与生命周期治理的记忆对象；信息域最多保存其引用或披露片段，不自动把一次窗口内容永久化。
      en: Cross-session memory objects involving writes, retrieval, merges, and lifecycle governance; this domain may retain references or disclosure segments but does not automatically persist one-window content.
      ja: セッション横断の書き込み・検索・統合・ライフサイクル管理を伴う記憶オブジェクト。参照や開示断片は保持できますが、一回ウィンドウ内容を自動永続化しません。
    - zh: 运行尝试、trace span、检查点与会话生命周期等已发生执行事实；信息域可引用运行观测作为内容来源，但不重新声明执行身份。
      en: Occurred execution facts such as runtime attempts, trace spans, checkpoints, and session lifecycle; this domain may reference runtime observations as content sources but does not redeclare execution identity.
      ja: 実行試行、trace span、チェックポイント、セッションライフサイクルなどの発生済み実行事実。実行観測を内容出典として参照できますが、実行同一性を再宣言しません。
    - zh: 基于敏感度决定能否展示内容的授权、脱敏和披露策略；信息域描述输出结构，不复制 allow/deny 规则或安全责任。
      en: Authorization, redaction, and disclosure policies that decide visibility from sensitivity; this domain describes output structure without copying allow/deny rules or safety accountability.
      ja: 機密性に基づく表示可否を決める認可、墨消し、開示方針。出力構造を記述しますが allow/deny 規則や安全責任は複製しません。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 主流厂商把“消息 role/content 形状”“多模态 content part”“MCP 资源读取”“A2A Part/Artifact”拆成不同协议面。本域用这些权威 wire 形状说明信息摄入与暂存的工程边界，而不把任一产品的完整载荷复制进本体。
    en: Mainstream vendors split message role/content shapes, multimodal content parts, MCP resource reads, and A2A Part/Artifact into different protocol surfaces. This domain uses those authoritative wire shapes to explain ingress-and-staging boundaries without copying any one product payload into the ontology.
    ja: 主要ベンダーは message role/content 形状、マルチモーダル content part、MCP リソース読取、A2A Part/Artifact を別プロトコル面に分けます。本ドメインは権威ある配線形状で取り込み/ステージング境界を示し、いずれか一製品の完全ペイロードを本体へ複製しません。
  typical_input:
    - description: OpenAI Chat Completions message — role/content with multimodal content parts.
      format: |
        POST https://api.openai.com/v1/chat/completions
        {
          "model": "gpt-4o",
          "messages": [
            {
              "role": "user",
              "content": [
                {"type": "text", "text": "What is in this diagram?"},
                {
                  "type": "image_url",
                  "image_url": {"url": "https://example.com/arch.png", "detail": "auto"}
                }
              ]
            }
          ]
        }
      source_claims: [claim-info-plane-openai-messages]
    - description: Anthropic Messages API — alternating text, image, tool_use, and tool_result blocks.
      format: |
        POST https://api.anthropic.com/v1/messages
        {
          "model": "claude-sonnet-4-20250514",
          "max_tokens": 1024,
          "messages": [
            {
              "role": "user",
              "content": [
                {"type": "text", "text": "Run the weather lookup for NYC."}
              ]
            },
            {
              "role": "assistant",
              "content": [
                {
                  "type": "tool_use",
                  "id": "toolu_01A2B3",
                  "name": "get_weather",
                  "input": {"city": "New York"}
                }
              ]
            },
            {
              "role": "user",
              "content": [
                {
                  "type": "tool_result",
                  "tool_use_id": "toolu_01A2B3",
                  "content": "72°F, partly cloudy"
                }
              ]
            }
          ]
        }
      source_claims: [claim-info-plane-anthropic-blocks]
    - description: MCP resources/read — fetch contextual resource by URI.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 3,
          "method": "resources/read",
          "params": {
            "uri": "file:///workspace/docs/onboarding.md"
          }
        }
        =>
        {
          "contents": [
            {
              "uri": "file:///workspace/docs/onboarding.md",
              "mimeType": "text/markdown",
              "text": "# Onboarding\n..."
            }
          ]
        }
      source_claims: [claim-info-plane-mcp-resources]
    - description: A2A Message with text/file/data Parts inside a Task history.
      format: |
        {
          "role": "agent",
          "parts": [
            {"kind": "text", "text": "Here is the billing summary."},
            {
              "kind": "file",
              "file": {
                "name": "invoice-104.pdf",
                "mimeType": "application/pdf",
                "bytes": "<base64>"
              }
            },
            {
              "kind": "data",
              "data": {"total_usd": 128.40, "currency": "USD"}
            }
          ]
        }
      source_claims: [claim-info-plane-a2a-parts]
  typical_output:
    - description: Moonweave-local staged context projection — referable units selected for one call window.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "context_window_ref": "context-window-call-842",
          "message_envelope_ids": ["message-842"],
          "content_block_ids": ["content-block-31", "content-block-32"],
          "source_reference_ids": ["source-ref-mcp-onboarding-md"],
          "disclosure_segment_ids": ["disclosure-seg-77"]
        }
      source_claims: [claim-info-plane-domain-design]
    - description: A2A Artifact attached to a completed Task — durable output separate from transient message parts.
      format: |
        {
          "artifactId": "artifact-invoice-summary-104",
          "name": "billing-summary.json",
          "parts": [
            {"kind": "data", "data": {"ticket_id": "T-104", "status": "approved"}}
          ]
        }
      source_claims: [claim-info-plane-a2a-artifact]
  reference_implementations:
    - name: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
      description: role/content messages with text, image_url, and input_audio content parts.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: Content blocks for text, image, tool_use, and tool_result in ordered message arrays.
    - name: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
      description: resources/list, resources/read, and URI-scheme resource identity for contextual data.
    - name: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
      description: Message Part kinds (text, file, data) and Task Artifact objects for agent outputs.
structure:
  identity_keys: [content_unit_ref, source_ref]
  fields:
    - id: content_unit_ref
      labels: {zh: 内容单位引用, en: Content unit reference, ja: 内容単位参照}
      definitions:
        zh: 在当前调用上下文中唯一标识一段可解释内容（消息、内容块、Part 或披露段）的稳定引用；不得用嵌入向量或临时检索分数代替。
        en: Stable reference uniquely identifying one interpretable content unit—message, content block, Part, or disclosure segment—in the current call context; it must not be replaced by an embedding vector or ephemeral retrieval score.
        ja: 現在呼び出し文脈で解釈可能な一内容単位（message、content block、Part、開示段）を一意に識別する安定参照。埋め込みベクトルや一時検索スコアで代用してはなりません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: content-block:msg-842:part-2
      allowed_values: []
      source_claims: [claim-info-plane-openai-messages, claim-info-plane-anthropic-blocks]
    - id: message_role
      labels: {zh: 消息角色, en: Message role, ja: メッセージ役割}
      definitions:
        zh: 协议规定的消息发送方角色，例如 OpenAI/Anthropic 的 user、assistant、system，或 A2A 的 user/agent；role 决定内容块在会话中的语义位置。
        en: Protocol-defined sender role such as OpenAI/Anthropic user, assistant, system, or A2A user/agent; role determines semantic placement of content blocks in a conversation.
        ja: OpenAI/Anthropic の user/assistant/system や A2A の user/agent など、プロトコル定義の送信者 role。role は会話内 content block の意味的位置を決めます。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: user
      allowed_values: [user, assistant, system, tool, agent]
      source_claims: [claim-info-plane-openai-messages, claim-info-plane-a2a-parts]
    - id: content_part_type
      labels: {zh: 内容部分类型, en: Content part type, ja: 内容パート種別}
      definitions:
        zh: 单个内容部分的多模态或交互类型，例如 text、image_url、input_audio、tool_use、tool_result，或 A2A 的 text/file/data kind。
        en: Multimodal or interaction type of one content part, such as text, image_url, input_audio, tool_use, tool_result, or A2A text/file/data kind.
        ja: text、image_url、input_audio、tool_use、tool_result、または A2A text/file/data kind など、一 content part のマルチモーダル/対話種別。
      datatype: string
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: image_url
      allowed_values: [text, image_url, input_audio, tool_use, tool_result, file, data, image]
      source_claims: [claim-info-plane-openai-messages, claim-info-plane-anthropic-blocks, claim-info-plane-a2a-parts]
    - id: source_ref
      labels: {zh: 来源引用, en: Source reference, ja: 出典参照}
      definitions:
        zh: 指向产生或承载该内容的外部来源，例如 MCP resource URI、文件路径、A2A file Part 或上游消息 ID；无来源时不得伪造 provenance。
        en: Reference to the external source that produced or holds the content, such as an MCP resource URI, file path, A2A file Part, or upstream message ID; provenance must not be fabricated when absent.
        ja: MCP resource URI、ファイルパス、A2A file Part、上流 message ID など、内容を生成/保持する外部出典への参照。出典がなければ provenance を捏造してはなりません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp:file:///workspace/docs/onboarding.md
      allowed_values: []
      source_claims: [claim-info-plane-mcp-resources, claim-info-plane-a2a-parts]
    - id: resource_uri
      labels: {zh: 资源 URI, en: Resource URI, ja: リソース URI}
      definitions:
        zh: MCP 或 A2A 协议中用于读取或引用上下文的 URI 字符串；必须符合服务器声明的 URI 模板或 scheme。
        en: URI string used to read or reference contextual data in MCP or A2A; it must conform to server-declared URI templates or schemes.
        ja: MCP または A2A で文脈データを読取/参照する URI 文字列。サーバー宣言 URI テンプレート/scheme に適合する必要があります。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: file:///workspace/docs/onboarding.md
      allowed_values: []
      source_claims: [claim-info-plane-mcp-resources]
  constraints:
    - id: info-content-requires-addressable-unit
      severity: error
      expression_language: plain
      expression: Every content staged into a context window must resolve to a content_unit_ref; anonymous raw prompt text without identity must not be registered as referable info-plane evidence.
      explanation:
        zh: 没有可寻址的内容单位，就无法审计引用、披露范围或跨厂商映射。
        en: Without an addressable content unit, citations, disclosure scope, and cross-vendor mapping cannot be audited.
        ja: アドレス可能な content unit がなければ、引用、開示範囲、ベンダー横断写像を監査できません。
      source_claims: [claim-info-plane-domain-design]
    - id: info-is-not-persistent-memory
      severity: error
      expression_language: plain
      expression: Content visible only in the current call window and not written through a memory lifecycle operation must not be registered as a cross-session memory record.
      explanation:
        zh: 把一次窗口文本自动永久化会把所有提示都变成“长期偏好”。
        en: Auto-persisting one-call window text would incorrectly treat every prompt as a long-term preference.
        ja: 一回ウィンドウ文本を自動永続化すると、全プロンプトが長期選好になります。
      source_claims: [claim-info-plane-domain-design]
    - id: info-tool-result-pairs-tool-use
      severity: error
      expression_language: plain
      expression: A tool_result content block must reference the tool_use_id of a prior assistant tool_use block in the same conversation thread.
      explanation:
        zh: 孤立的 tool_result 无法解释对应哪次工具调用，会破坏可复现的交互语义。
        en: An orphan tool_result cannot explain which tool invocation it answers, breaking reproducible interaction semantics.
        ja: 孤立 tool_result はどの tool 呼び出しへの応答か説明できず、再現可能な対話意味を壊します。
      source_claims: [claim-info-plane-anthropic-blocks]
  required_relations: []
examples:
  - id: info-plane-example-openai-multimodal-message
    labels:
      zh: OpenAI 多模态 user 消息
      en: OpenAI multimodal user message
      ja: OpenAI マルチモーダル user メッセージ
    descriptions:
      zh: 用户通过 Chat Completions 发送 role=user 消息，content 数组同时包含 type=text 与 type=image_url（detail=auto）。系统把 text 与 image_url 各映射为独立 content block，绑定同一 message envelope，并在进入 context-window-call-842 时保留 part 顺序与 image URL 来源。
      en: A user sends role=user via Chat Completions with a content array containing type=text and type=image_url (detail=auto). The system maps text and image_url into separate content blocks under one message envelope, preserving part order and the image URL provenance when entering context-window-call-842.
      ja: 利用者が Chat Completions で role=user を送り、content 配列に type=text と type=image_url（detail=auto）を含めます。text と image_url を同一 message envelope 下の別 content block へ写像し、context-window-call-842 投入時に part 順序と image URL 出典を保持します。
    example_source:
      product: OpenAI Chat Completions API
      url: https://platform.openai.com/docs/api-reference/chat/create
    field_values:
      api_endpoint: POST /v1/chat/completions
      message_role: user
      content_parts:
        - type: text
          text: What is in this architecture diagram?
        - type: image_url
          image_url:
            url: https://example.com/arch.png
            detail: auto
      mapped_content_block_ids:
        - content-block-text-842-1
        - content-block-image-842-2
      context_window_ref: context-window-call-842
    related_node_ids:
      - info-plane
      - info-content-block-modality
      - info-messages-instructions
    related_relation_ids: []
    source_claims:
      - claim-info-plane-openai-messages
  - id: info-plane-example-mcp-resource-read
    labels:
      zh: MCP resources/read 文档片段摄入
      en: MCP resources/read document segment ingress
      ja: MCP resources/read 文書断片取り込み
    descriptions:
      zh: 客户端对 MCP 服务器调用 resources/read，params.uri=file:///workspace/docs/onboarding.md。返回 contents[0] 含 uri、mimeType=text/markdown 与 text 正文。系统创建 source-ref-mcp-onboarding-md 与 content-block-31，把该 Markdown 段作为可引用候选，经 index-pointer-77 定位后进入当前调用窗口。
      en: The client calls resources/read on an MCP server with params.uri=file:///workspace/docs/onboarding.md. The response contents[0] includes uri, mimeType=text/markdown, and text body. The system creates source-ref-mcp-onboarding-md and content-block-31, stages the Markdown segment as referable candidate evidence, and after index-pointer-77 locates it, includes it in the current call window.
      ja: クライアントが MCP サーバーへ resources/read を呼び params.uri=file:///workspace/docs/onboarding.md を指定します。応答 contents[0] は uri、mimeType=text/markdown、text 本文を含みます。source-ref-mcp-onboarding-md と content-block-31 を作成し、Markdown 断片を参照可能候補として index-pointer-77 経由で現呼び出しウィンドウへ投入します。
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/resources
    field_values:
      jsonrpc_method: resources/read
      resource_uri: file:///workspace/docs/onboarding.md
      mime_type: text/markdown
      source_reference_id: source-ref-mcp-onboarding-md
