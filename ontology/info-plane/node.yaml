source_claims:
  - id: claim-info-plane-openai-messages
    source: src-openai-chat-completions
    supports: OpenAI chat messages use role plus content that may be a string or an array of typed parts including text, image_url, and input_audio.
    locator: Create chat completion > messages[] > role and content part types
    evidence_kind: primary-api
    confidence: high
  - id: claim-info-plane-anthropic-blocks
    source: src-anthropic-messages
    supports: Anthropic Messages API represents each turn as role plus an ordered array of content blocks including text, image, tool_use, and tool_result with paired tool_use_id references.
    locator: Messages API > message format > content block types
    evidence_kind: primary-api
    confidence: high
  - id: claim-info-plane-mcp-resources
    source: src-mcp-resources
    supports: MCP resources/read fetches contextual data by URI and returns contents with uri, mimeType, and text or blob fields distinct from tool invocation results.
    locator: Server features > Resources > resources/read request and response
    evidence_kind: primary-spec
    confidence: high
  - id: claim-info-plane-a2a-parts
    source: src-a2a-protocol
    supports: A2A Messages carry an ordered parts array whose kind may be text, file, or data, supporting multimodal and structured ingress separate from Task lifecycle state.
    locator: Specification > Message object > Part kinds
    evidence_kind: primary-spec
    confidence: high
  - id: claim-info-plane-a2a-artifact
    source: src-a2a-protocol
    supports: A2A Artifact objects provide durable task outputs with artifactId, name, and parts distinct from transient message history entries.
    locator: Specification > Artifact object
    evidence_kind: primary-spec
    confidence: high
  - id: claim-info-plane-domain-design
    source: src-info-plane-design
    supports: Moonweave assigns referable ingress, source location, discovery, and disclosure to info-plane while cross-session memory, runtime attempts, and authorization remain in their owning domains.
    locator: Context ingress and staging domain boundary
    evidence_kind: design-inference
    confidence: high
