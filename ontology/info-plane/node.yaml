source_claims:
  - id: claim-info-plane-001
    source: eng-proto-mcp-spec
    supports: "The MCP specification separates protocol lifecycle and transport from three server primitives: resources expose contextual data, prompts provide parameterized message templates, and tools expose model-callable operations. That separation supports representing referenced or staged content independently from the operation that may consume it. MCP does not define Moonweave's ContextWindow, SourceReference, DisclosureSegment, or runtime-observation hierarchy; their ownership in info-plane remains an ontology design inference."
    locator: Specification > Architecture; Lifecycle; Server Features > Resources, Prompts, and Tools
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-info-plane-002
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents Context management separately documents input context, memory, skills, summarization/context offloading, and prompt caching, while typed streams expose messages, tool calls, values, and delegated-task output. These distinctions support an ingress-and-staging domain for observable content entering or leaving model context. The specific Moonweave classes for envelopes, source references, disclosure segments, discovery pointers, and observations are design inferences rather than Deep Agents terminology.
    locator: Deep Agents overview > Context management > Skills; Memory; Summarization and context offloading; Execution environment > Streaming
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-info-plane-003
    source: eng-proto-mcp-spec
    supports: MCP separates messages, content-bearing protocol objects, resources, prompts, and server-provided context. Moonweave uses those observable protocol boundaries to model referable content entering one call without treating it as persistent memory.
    locator: Specification > Architecture and base protocol > Messages, content, resources, and prompts
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-info-plane-004
    source: eng-fw-deepagents-js-docs
    supports: Deep Agents documents memory and context management as separate mechanisms, supporting the boundary between persistent cross-session records and content staged for one active context.
    locator: Deep Agents overview > Context management > Memory; Summarization and context offloading
    evidence_kind: design-inference
    confidence: high
    review_status: pending
