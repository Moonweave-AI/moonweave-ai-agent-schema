  - id: info-plane-example-a2a-task-artifact
    labels:
      zh: A2A Task 工件输出
      en: A2A Task artifact output
      ja: A2A Task 成果物出力
    descriptions:
      zh: "billing_agent 完成任务 task-a2a-551 后返回 Artifact artifactId=artifact-invoice-summary-104，name=billing-summary.json，parts 含 kind=data 的结构化字段。协调者把 Artifact 与 Task history 中的 text Part 分开建模：history Part 属于 transient message ingress，Artifact 属于可版本引用的 disclosed output segment。"
      en: "After completing task-a2a-551, billing_agent returns Artifact artifactId=artifact-invoice-summary-104, name=billing-summary.json, with a kind=data structured part. The coordinator models the Artifact separately from text Parts in Task history: history Parts are transient message ingress; the Artifact is a version-referable disclosed output segment."
      ja: "billing_agent が task-a2a-551 完了後、Artifact artifactId=artifact-invoice-summary-104、name=billing-summary.json、kind=data 構造化 part を返します。調整者は Task history の text Part と Artifact を分離モデル化し、history Part は一時 message ingress、Artifact は版参照可能な disclosed output segment です。"
    example_source:
      product: A2A Protocol
      url: https://a2a-protocol.org/latest/specification/
    field_values:
      task_id: task-a2a-551
      artifact_id: artifact-invoice-summary-104
      artifact_name: billing-summary.json
      artifact_part_kind: data
      artifact_data:
        ticket_id: T-104
        status: approved
        total_usd: 128.40
      disclosure_segment_id: disclosure-seg-artifact-104
    related_node_ids:
      - info-plane
      - info-output-disclosure
      - info-messages-instructions
    related_relation_ids: []
    source_claims:
      - claim-info-plane-a2a-artifact
      - claim-info-plane-a2a-parts
  - id: info-plane-example-anthropic-tool-use-result-flow
    labels:
      zh: Anthropic tool_use 与 tool_result 往返
      en: Anthropic tool_use and tool_result round-trip
      ja: Anthropic tool_use と tool_result 往復
    descriptions:
      zh: 用户在 Messages API 中发送 text 请求；assistant 返回 type=tool_use（id=toolu_01A2B3, name=get_weather）；用户 follow-up 消息携带 type=tool_result（tool_use_id=toolu_01A2B3, content="72°F, partly cloudy"）。系统把三次 content block 按会话顺序链接，并在进入下一次模型调用前验证 tool_result 与 tool_use 配对。
      en: The user sends a text request via Messages API; the assistant returns type=tool_use (id=toolu_01A2B3, name=get_weather); a user follow-up carries type=tool_result (tool_use_id=toolu_01A2B3, content="72°F, partly cloudy"). The system links the three content blocks in conversation order and validates tool_result pairing before the next model call.
      ja: 利用者が Messages API で text 要求を送信し、assistant が type=tool_use（id=toolu_01A2B3, name=get_weather）を返し、user follow-up が type=tool_result（tool_use_id=toolu_01A2B3, content="72°F, partly cloudy"）を含みます。三 content block を会話順にリンクし、次モデル呼び出し前に tool_result ペアリングを検証します。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
    field_values:
      api_endpoint: POST /v1/messages
      tool_use_id: toolu_01A2B3
      tool_name: get_weather
      tool_input:
        city: New York
      tool_result_content: 72°F, partly cloudy
      content_block_ids:
        - content-block-user-text-901
        - content-block-assistant-tool-use-902
        - content-block-user-tool-result-903
    related_node_ids:
      - info-plane
      - info-content-block-modality
      - info-messages-instructions
    related_relation_ids: []
    source_claims:
      - claim-info-plane-anthropic-blocks
  - id: info-plane-example-boundary-cross-session-preference
    labels:
      zh: 跨会话偏好记录不是临时信息摄入
      en: Cross-session preference record is not transient ingress
      ja: セッション横断選好記録は一時取込ではない
    descriptions:
      zh: 用户偏好 “Prefers TypeScript” 已通过 Mem0 写入 memory-store-user-4 并在 retrieval-run-91 中被召回。当前 message 仅引用 memory_record_id=preference-17，没有重新创建 content block 身份。信息域只记录本次窗口中的引用与披露，持久身份与生命周期归记忆域。
      en: The preference “Prefers TypeScript” was written to memory-store-user-4 via Mem0 and recalled by retrieval-run-91. The current message only references memory_record_id=preference-17 without recreating content-block identity. Info records reference and disclosure in this window; persistent identity and lifecycle belong to Memory.
      ja: 選好 “Prefers TypeScript” は Mem0 で memory-store-user-4 に書き込まれ retrieval-run-91 で想起されます。現 message は memory_record_id=preference-17 を参照するだけで content block 同一性を作り直しません。Info は今回ウィンドウの参照/開示を記録し、永続同一性/ライフサイクルは Memory が所有します。
    example_source:
      product: Moonweave domain boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      memory_record_id: preference-17
      memory_store_id: memory-store-user-4
      retrieval_run_id: retrieval-run-91
      current_message_role: reference-only
      content_block_recreated: false
    related_node_ids:
      - info-plane
      - memory-plane
    related_relation_ids: []
    source_claims:
      - claim-info-plane-domain-design
