id: state.context_lifecycle
artifact: StateMachine
label: Context Lifecycle
label_zh: 上下文生命周期
description: >
  Lifecycle of a context assembly from initialization through active use,
  compaction, archival, and invalidation.
states:
  - name: empty
    initial: true
    description: No context materialized yet
  - name: assembling
    description: Sources being loaded and ranked
  - name: ready
    description: Context available for model invocation
  - name: compacting
    description: History or chunks being summarized under pressure
  - name: stale
    description: Context outdated relative to source mutations
  - name: archived
    terminal: true
    description: Context snapshot persisted and no longer active
  - name: invalidated
    terminal: true
    description: Context discarded due to policy or error
transitions:
  - from: empty
    to: assembling
    trigger: load_sources
    description: Begin context assembly
  - from: assembling
    to: ready
    trigger: assembly_complete
    description: Context ready for use
  - from: ready
    to: compacting
    trigger: budget_pressure
    description: Token limit triggers compaction
  - from: compacting
    to: ready
    trigger: compaction_complete
    description: Compacted context restored
  - from: ready
    to: stale
    trigger: source_changed
    description: Underlying source mutated
  - from: stale
    to: assembling
    trigger: refresh
    description: Rebuild from sources
  - from: ready
    to: archived
    trigger: archive
    description: Persist snapshot for audit
  - from: assembling
    to: invalidated
    trigger: assembly_failed
    description: Unrecoverable assembly error
status: active
