id: constraint.light_index_must_have_discovery_edge
artifact: GraphConstraint
label: Light Index Must Have Discovery Edge
label_zh: 轻量索引必须有发现边
severity: warning
rule: >
  Every LightIndex node instance MUST have at least one incoming SUMMARIZES_TO
  edge and at least one outgoing or incoming DISCLOSES_ON_DEMAND edge connecting
  progressive disclosure to loadable sources.
applies_to:
  nodes: [node.light_index]
  edges: [edge.SUMMARIZES_TO, edge.DISCLOSES_ON_DEMAND]
description: >
  Light indexes exist to enable discovery-driven progressive disclosure.
  Orphan indexes without summarization or disclosure links indicate incomplete
  context architecture.
status: active
