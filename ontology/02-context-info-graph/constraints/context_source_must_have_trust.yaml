id: constraint.context_source_must_have_trust
artifact: GraphConstraint
label: Context Source Must Have Trust
label_zh: 上下文源必须有信任标签
severity: error
rule: >
  Every context source node (file_system_source, database_source, network_source,
  graph_source, embedding_source, skill_source, tool_info_source,
  memory_file_source) MUST declare a trust_label attribute with a non-empty
  value from the allowed enumeration.
applies_to:
  nodes:
    - node.file_system_source
    - node.database_source
    - node.network_source
    - node.graph_source
    - node.embedding_source
    - node.skill_source
    - node.tool_info_source
    - node.memory_file_source
description: >
  Information flow control requires explicit trust classification on all
  context sources per FIDES and safety-policy subgraph alignment.
status: active
