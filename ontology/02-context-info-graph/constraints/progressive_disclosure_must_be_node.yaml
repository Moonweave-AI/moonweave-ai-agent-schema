id: constraint.progressive_disclosure_must_be_node
artifact: GraphConstraint
label: Progressive Disclosure Must Be Node
label_zh: 渐进式披露必须是节点
severity: error
rule: >
  The context-info subgraph MUST define node.progressive_disclosure as an
  active NodeClass. Implementations referencing progressive disclosure patterns
  must link via DISCLOSES_ON_DEMAND edges.
applies_to:
  nodes: [node.progressive_disclosure]
  edges: [edge.DISCLOSES_ON_DEMAND]
description: >
  Progressive disclosure is a first-class ontology concept from the Agent
  Structure Graph InfoPlane, not an implicit implementation detail.
status: active
