id: contract.indexable
artifact: InterfaceContract
label: Indexable
label_zh: 可索引
description: >
  Content or metadata sources implementing this contract support insertion
  into light, sparse, dense, or graph indexes for discovery and retrieval.
operations:
  - name: index_entry
    description: Add or update an index entry
    input:
      key:
        type: string
      summary:
        type: string
      metadata:
        type: object
    output:
      entry_id:
        type: string
    errors: [IndexWriteError]
  - name: search
    description: Query index by keyword or embedding
    input:
      query:
        type: string
      top_k:
        type: integer
    output:
      results:
        type: array
    errors: [IndexQueryError]
status: active
