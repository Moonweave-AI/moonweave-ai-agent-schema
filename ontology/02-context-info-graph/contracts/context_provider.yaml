id: contract.context_provider
artifact: InterfaceContract
label: Context Provider
label_zh: 上下文提供者
description: >
  Nodes implementing this contract can supply assembled context material to
  agents or cognitive cores with token budget awareness.
operations:
  - name: assemble_context
    description: Build context snapshot for a given query or turn
    input:
      query:
        type: string
      token_budget:
        type: integer
    output:
      context:
        type: object
        description: Assembled context payload
      token_count:
        type: integer
    errors: [BudgetExceededError, SourceUnavailableError]
  - name: list_sources
    description: Enumerate attached context sources
    input: {}
    output:
      sources:
        type: array
    errors: []
status: active
