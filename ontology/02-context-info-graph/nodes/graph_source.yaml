id: node.graph_source
artifact: NodeClass
label: GraphSource
label_zh: 图数据源
layer: context-info
plane: InfoPlane
description: >
  Structured knowledge graph used for relational retrieval, multi-hop expansion,
  and context assembly beyond flat chunk similarity.
attributes:
  graph_uri:
    type: uri
    required: false
    description: Location of graph store
  node_count:
    type: integer
    required: false
    description: Approximate entity count
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: Trust classification for graph-derived facts
evidence:
  - ref: evidence.network_of_thought
  - ref: evidence.retrieval_pipeline_diagram
status: active
