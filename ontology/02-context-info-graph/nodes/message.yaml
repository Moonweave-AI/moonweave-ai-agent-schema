id: node.message
artifact: NodeClass
label: Message
label_zh: 消息
intra_level: 2
intra_group: transcript-layer
intra_group_zh: 消息转录层
intra_axis: workspace-transcript
intra_axis_zh: 消息转录层 / 上下文容器
intra_role: artifact
parent_node: node.message_history
layer: context-info
plane: InfoPlane
description: >
  Typed conversational unit in the transcript with role, content, metadata,
  and optional tool correlation identifiers.
description_zh: >
  在记录中键入对话单元，其中包含角色、内容、元数据和可选工具相关标识符。
attributes:
  role:
    type: enum
    required: true
    values: [system, user, agent, tool, developer]
    description: Message role discriminator
  content:
    type: string
    required: true
    description: Message body text or structured content
  timestamp:
    type: datetime
    required: false
    description: Message creation instant
  correlation_id:
    type: string
    required: false
    description: Links related messages and tool calls
evidence:
  - ref: evidence.message_assembly_diagram
status: active
