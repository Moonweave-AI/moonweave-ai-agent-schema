id: node.network_source
artifact: NodeClass
label: NetworkSource
label_zh: 网络源
intra_level: 2
intra_group: source-catalog
intra_group_zh: 来源目录
intra_role: resource
parent_node: node.context_graph
layer: context-info
plane: InfoPlane
description: >
  External network connectivity surface for HTTP retrieval, API calls, and
  remote resource fetching subject to egress policy.
attributes:
  allowed_domains:
    type: array
    required: false
    description: Domain allowlist for outbound requests
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: IFC label for fetched remote content
  protocol:
    type: enum
    required: false
    values: [http, https, websocket]
    description: Permitted protocol types
evidence:
  - ref: evidence.fides_ifc
  - ref: evidence.tool_policy_diagram
status: active
