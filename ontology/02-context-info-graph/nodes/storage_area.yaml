id: node.storage_area
artifact: NodeClass
label: StorageArea
label_zh: 存储区
layer: context-info
plane: InfoPlane
description: >
  Durable or session-scoped artifact store within a container holding files,
  outputs, and intermediate results referenced by context assembly.
attributes:
  storage_type:
    type: enum
    required: false
    values: [ephemeral, session, persistent]
    description: Durability class of stored artifacts
  quota_bytes:
    type: integer
    required: false
    description: Maximum storage allocation
evidence:
  - ref: evidence.container_context_diagram
status: active
