id: node.chunk_policy
artifact: NodeClass
label: ChunkPolicy
label_zh: 分块策略
layer: context-info
plane: InfoPlane
description: >
  Rules governing text segmentation and truncation including chunk size,
  overlap, and head-tail preservation under length limits.
attributes:
  max_chunk_tokens:
    type: integer
    required: true
    description: Maximum tokens per chunk
  overlap_tokens:
    type: integer
    required: false
    description: Overlap between adjacent chunks
  truncation_strategy:
    type: enum
    required: false
    values: [tail, head, head_and_tail, middle_elide]
    description: Strategy when content exceeds limits
evidence:
  - ref: evidence.message_assembly_diagram
  - ref: evidence.parallax_stages
status: active
