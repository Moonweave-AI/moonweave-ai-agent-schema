id: node.memory_file_source
artifact: NodeClass
label: MemoryFileSource
label_zh: 记忆文件源
intra_level: 2
intra_group: source-catalog
intra_group_zh: 来源目录
intra_axis: source-retrieval
intra_axis_zh: 来源目录 / 加载控制
intra_role: resource
parent_node: node.context_graph
layer: context-info
plane: MemoryPlane
description: >
  File-backed persistent memory store outside the live transcript, bridging
  MemoryPlane recall into InfoPlane context assembly.
attributes:
  file_path:
    type: string
    required: true
    description: Path to memory file or directory
  format:
    type: enum
    required: false
    values: [markdown, json, sqlite, custom]
    description: Serialization format
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: Trust classification for recalled memories
evidence:
  - ref: evidence.hierarchical_memory
status: active
