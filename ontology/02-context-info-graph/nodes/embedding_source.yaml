id: node.embedding_source
artifact: NodeClass
label: EmbeddingSource
label_zh: 嵌入源
intra_level: 2
intra_group: source-catalog
intra_group_zh: 来源目录
intra_role: resource
parent_node: node.context_graph
layer: context-info
plane: InfoPlane
description: >
  Dense vector index source combining embedding model outputs with vector store
  for semantic similarity retrieval.
attributes:
  embedding_dimensions:
    type: integer
    required: false
    description: Vector dimensionality
  index_backend:
    type: enum
    required: false
    values: [flat, hnsw, ivf, hybrid]
    description: Approximate nearest neighbor index type
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: Trust label for retrieved passages
evidence:
  - ref: evidence.retrieval_pipeline_diagram
status: active
