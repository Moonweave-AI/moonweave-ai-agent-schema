id: node.text_input
artifact: NodeClass
label: TextInput
label_zh: 文本输入
layer: context-info
plane: InfoPlane
description: >
  Raw textual input entering the context pipeline from user queries, documents,
  or tool returns before chunking and indexing.
attributes:
  encoding:
    type: string
    required: false
    description: Character encoding (default UTF-8)
  language:
    type: string
    required: false
    description: Detected or declared language (BCP 47)
  char_count:
    type: integer
    required: false
    description: Character length of input text
evidence:
  - ref: evidence.retrieval_pipeline_diagram
status: active
