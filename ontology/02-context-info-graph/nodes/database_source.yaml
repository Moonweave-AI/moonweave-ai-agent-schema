id: node.database_source
artifact: NodeClass
label: DatabaseSource
label_zh: 数据库源
layer: context-info
plane: InfoPlane
description: >
  Structured datastore source enabling query-backed retrieval and tool-mediated
  mutations with schema-aware context injection.
attributes:
  connection_uri:
    type: uri
    required: false
    description: Connection endpoint (redacted in logs)
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: IFC trust classification for query results
  dialect:
    type: string
    required: false
    description: SQL or NoSQL dialect identifier
evidence:
  - ref: evidence.fides_ifc
status: active
