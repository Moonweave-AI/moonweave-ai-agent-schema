id: node.file_system_source
artifact: NodeClass
label: FileSystemSource
label_zh: 文件系统源
intra_level: 2
intra_group: source-catalog
intra_group_zh: 来源目录
intra_axis: source-retrieval
intra_axis_zh: 来源目录 / 加载控制
intra_role: resource
parent_node: node.context_graph
layer: context-info
plane: InfoPlane
description: >
  Filesystem-backed context and action surface providing read/write access to
  files within trust boundaries.
attributes:
  root_path:
    type: string
    required: true
    description: Root directory for accessible files
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: Information flow control trust classification
  read_only:
    type: boolean
    required: false
    description: Whether writes are prohibited
evidence:
  - ref: evidence.fides_ifc
  - ref: evidence.container_context_diagram
status: active
