id: node.agent_message
artifact: NodeClass
label: AgentMessage
label_zh: 智能体消息
layer: context-info
plane: InfoPlane
description: >
  Message produced by the agent including natural language responses, tool call
  requests, and structured reasoning outputs.
attributes:
  finish_reason:
    type: enum
    required: false
    values: [stop, tool_calls, length, error]
