id: node.context_graph
artifact: NodeClass
label: ContextGraph
label_zh: 上下文图
intra_level: 0
intra_group: context-root
intra_group_zh: 上下文根
intra_role: anchor
layer: context-info
plane: InfoPlane
description: >
  Root assembly node representing the working context presented to the cognitive
  core: messages, instructions, retrieved chunks, and source references woven
  into a coherent graph structure.
attributes:
  token_budget:
    type: integer
    required: false
    description: Maximum tokens allocated to assembled context
  assembly_strategy:
    type: enum
    required: false
    values: [linear, graph_expansion, priority_ranked]
    description: Algorithm for composing context from sources
interfaces:
  - ref: contract.context_provider
evidence:
  - ref: evidence.retrieval_pipeline_diagram
  - ref: evidence.network_of_thought
status: active
