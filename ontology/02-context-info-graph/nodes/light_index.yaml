id: node.light_index
artifact: NodeClass
label: LightIndex
label_zh: 轻量索引
layer: context-info
plane: InfoPlane
description: >
  Lightweight discovery index storing summaries, metadata, and tags enabling
  progressive disclosure without loading full source content.
attributes:
  index_type:
    type: enum
    required: true
    values: [metadata, summary, hybrid]
    description: Primary index content type
  entry_count:
    type: integer
    required: false
    description: Number of indexed entries
interfaces:
  - ref: contract.indexable
evidence:
  - ref: evidence.progressive_disclosure_diagram
status: active
