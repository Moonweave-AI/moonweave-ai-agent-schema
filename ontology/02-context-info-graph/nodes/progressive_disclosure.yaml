id: node.progressive_disclosure
artifact: NodeClass
label: ProgressiveDisclosure
label_zh: 渐进式披露
intra_level: 1
intra_group: loading-control
intra_group_zh: 加载控制
intra_axis: source-retrieval
intra_axis_zh: 来源目录 / 加载控制
intra_role: process
parent_node: node.context_graph
layer: context-info
plane: InfoPlane
description: >
  On-demand context loading strategy deferring full content materialization
  until retrieval, selection, or explicit request reduces upfront token cost.
attributes:
  disclosure_trigger:
    type: enum
    required: false
    values: [on_query, on_selection, on_tool_use, manual]
    description: Event triggering full content load
  prefetch_depth:
    type: integer
    required: false
    description: Levels of metadata to prefetch before full load
evidence:
  - ref: evidence.progressive_disclosure_diagram
  - ref: evidence.parallax_stages
status: active
