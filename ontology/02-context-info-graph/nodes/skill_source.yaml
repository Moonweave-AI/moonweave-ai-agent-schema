id: node.skill_source
artifact: NodeClass
label: SkillSource
label_zh: 技能源
layer: context-info
plane: InfoPlane
description: >
  Packaged capability module combining instructions, tool bindings, and examples
  loaded as a cohesive context extension.
attributes:
  skill_id:
    type: string
    required: true
    description: Unique skill package identifier
  version:
    type: string
    required: false
    description: Skill package version
  trust_label:
    type: enum
    required: true
    values: [untrusted, internal, trusted, sensitive]
    description: Trust level for skill-provided instructions
evidence:
  - ref: evidence.mcp_tool_protocol
status: active
