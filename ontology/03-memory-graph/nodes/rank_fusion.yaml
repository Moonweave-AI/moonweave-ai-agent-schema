id: node.rank_fusion
artifact: NodeClass
label: Rank Fusion
label_zh: 排序融合
intra_level: 3
intra_group: retrieval-ranking
intra_group_zh: 检索排序
intra_axis: retrieval-output
intra_axis_zh: 检索排序 / 检索输出
intra_role: process
parent_node: node.memory_retriever
description: Component that merges multiple retrieval score lists from heterogeneous indexes into a unified ranking, commonly
  using reciprocal rank fusion or weighted combination.
description_zh: >
  将异构索引中的多个检索评分列表合并为统一排名的组件，通常使用倒数排名融合或加权组合。
attributes:
  fusion_method:
    type: string
    required: true
    values:
    - rrf
    - weighted_sum
    - comb_sum
    - comb_mnz
    description: Algorithm for combining rank lists
  rrf_k:
    type: integer
    required: false
    description: RRF constant k (typically 60)
  source_weights:
    type: object
    required: false
    description: Per-index weight map for weighted fusion
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
