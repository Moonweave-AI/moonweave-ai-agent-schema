id: node.sparse_index
artifact: NodeClass
label: Sparse Index
label_zh: 稀疏索引
intra_level: 3
intra_group: index-store
intra_group_zh: 索引存储
intra_role: index
parent_node: node.memory_store
description: Lexical index supporting keyword matching via TF-IDF, BM25, or related sparse retrieval methods. Complements
  dense vector search for exact-term recall.
attributes:
  algorithm:
    type: string
    required: true
    values:
    - bm25
    - tf_idf
    - boolean
    - hybrid_sparse
    description: Sparse retrieval algorithm
  document_count:
    type: integer
    required: false
    description: Number of indexed documents or chunks
  k1:
    type: number
    required: false
    description: BM25 term frequency saturation parameter
  b:
    type: number
    required: false
    description: BM25 length normalization parameter
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
