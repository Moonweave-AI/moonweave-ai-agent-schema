id: node.vector_index
artifact: NodeClass
label: Vector Index
label_zh: 向量索引
intra_level: 3
intra_group: index-store
intra_group_zh: 索引存储
intra_axis: records-index
intra_axis_zh: 记忆数据单元 / 索引存储
intra_role: index
parent_node: node.vector_store
description: Approximate nearest neighbor index for fast semantic similarity search over embedding vectors. Supports configurable
  recall-latency tradeoffs.
attributes:
  index_type:
    type: string
    required: true
    values:
    - flat
    - hnsw
    - ivf
    - pq
    - scann
    description: ANN index algorithm
  vector_count:
    type: integer
    required: false
    description: Number of vectors indexed
  ef_search:
    type: integer
    required: false
    description: Search-time parameter controlling recall vs speed
  dimensions:
    type: integer
    required: true
    description: Vector dimensionality (must match embedding model)
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
