id: node.vector_store
artifact: NodeClass
label: Vector Store
label_zh: 向量存储
intra_level: 2
intra_group: index-store
intra_group_zh: 索引存储
intra_axis: records-index
intra_axis_zh: 记忆数据单元 / 索引存储
intra_role: storage
parent_node: node.memory_store
description: Persistent storage layer for embedding vectors with associated metadata and chunk identifiers. Often paired with
  a vector index for query acceleration.
description_zh: >
  用于嵌入具有关联元数据和块标识符的向量的持久存储层。通常与向量索引配对以实现查询加速。
attributes:
  storage_backend:
    type: string
    required: false
    values:
    - local
    - distributed
    - in_memory
    description: Physical storage backing
  vector_count:
    type: integer
    required: false
    description: Total vectors stored
  metadata_schema:
    type: object
    required: false
    description: Schema for per-vector metadata fields
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
