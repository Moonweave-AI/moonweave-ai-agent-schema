id: node.working_memory
artifact: NodeClass
label: Working Memory
label_zh: 工作记忆
intra_level: 1
intra_group: memory-kind
intra_group_zh: 记忆类型
intra_axis: memory-taxonomy
intra_axis_zh: 记忆类型
intra_role: memory
parent_node: node.memory_store
description: 'Active, bounded context window holding the agent''s current focus: recent messages, retrieved snippets, and
  in-flight reasoning. Capacity is constrained by token or slot limits and subject to eviction when new information arrives.'
description_zh: >
  活动的有界上下文窗口保持智能体的当前焦点：最近的消息、检索到的片段和正在进行的推理。容量受到令牌或插槽限制的限制，并且在新信息到达时会被驱逐。
attributes:
  capacity_tokens:
    type: integer
    required: true
    description: Maximum token budget for active context
  current_tokens:
    type: integer
    required: false
    description: Approximate tokens currently occupied
  eviction_policy:
    type: string
    required: false
    values:
    - fifo
    - lru
    - priority
    - sliding_window
    description: Strategy for removing content when capacity is exceeded
  refresh_interval_ms:
    type: integer
    required: false
    description: Optional periodic refresh cadence for volatile entries
evidence:
- ref: evidence.paper.cognitive_architecture
- ref: evidence.paper.hierarchical_memory
layer: memory
plane: memory
