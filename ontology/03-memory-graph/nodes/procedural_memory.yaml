intra_group: memory-kind
intra_group_zh: 记忆类型
intra_role: memory
parent_node: node.memory_store
description: Stored skills, workflows, action sequences, and tool usage patterns that guide how the agent performs tasks.
  Encodes how-to knowledge rather than declarative facts.
attributes:
  skill_count:
    type: integer
    required: false
    description: Number of registered procedural entries
  execution_mode:
    type: string
    required: false
    values:
    - scripted
    - adaptive
    - hybrid
    description: How procedures are applied at runtime
  last_used_at:
    type: string
    required: false
    description: ISO timestamp of most recent procedure invocation
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
