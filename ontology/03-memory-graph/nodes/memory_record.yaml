id: node.memory_record
artifact: NodeClass
label: Memory Record
label_zh: 记忆记录
intra_level: 2
intra_group: memory-data-unit
intra_group_zh: 记忆数据单元
intra_role: artifact
parent_node: node.memory_store
description: 'Individual memory entry with content payload and rich metadata: provenance, timestamps, access counts, relevance
  scores, and lifecycle state.'
attributes:
  content_hash:
    type: string
    required: false
    description: Content fingerprint for deduplication
  created_at:
    type: string
    required: true
    description: ISO timestamp of record creation
  last_accessed_at:
    type: string
    required: false
    description: ISO timestamp of most recent retrieval
  access_count:
    type: integer
    required: false
    description: Number of times this record has been retrieved
  memory_type:
    type: string
    required: true
    values:
    - episodic
    - semantic
    - procedural
    - preference
    - working_snapshot
    description: Classification of memory content
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
state_machine:
  ref: state.memory_record_lifecycle
