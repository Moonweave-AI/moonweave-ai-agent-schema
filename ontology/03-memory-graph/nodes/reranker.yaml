id: node.reranker
artifact: NodeClass
label: Reranker
label_zh: 重排序器
intra_level: 3
intra_group: retrieval-ranking
intra_group_zh: 检索排序
intra_role: process
parent_node: node.memory_retriever
description: Cross-encoder or language-model-based component that re-scores candidate results for query-document relevance
  after initial retrieval.
attributes:
  reranker_type:
    type: string
    required: true
    values:
    - cross_encoder
    - llm_pointwise
    - llm_listwise
    - colbert
    description: Reranking approach
  top_k_input:
    type: integer
    required: false
    description: Maximum candidates passed to reranker
  top_k_output:
    type: integer
    required: false
    description: Number of results returned after reranking
  latency_budget_ms:
    type: integer
    required: false
    description: Maximum allowed reranking latency
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
