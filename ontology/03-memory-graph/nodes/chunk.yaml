id: node.chunk
artifact: NodeClass
label: Chunk
label_zh: 文本块
intra_level: 3
intra_group: memory-data-unit
intra_group_zh: 记忆数据单元
intra_axis: records-index
intra_axis_zh: 记忆数据单元 / 索引存储
intra_role: artifact
parent_node: node.memory_record
description: Raw text segment extracted from a document, conversation transcript, or knowledge source. Serves as the atomic
  unit for indexing and embedding.
description_zh: >
  从文档、对话记录或知识源中提取的原始文本片段。用作索引和嵌入的原子单元。
attributes:
  text:
    type: string
    required: true
    description: Raw chunk text content
  token_count:
    type: integer
    required: false
    description: Approximate token length of the chunk
  source_offset:
    type: integer
    required: false
    description: Character or token offset in the source document
  chunk_index:
    type: integer
    required: false
    description: Sequential index within the source document
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
