id: node.memory_store
artifact: NodeClass
label: Memory Store
label_zh: 记忆存储
intra_level: 0
intra_group: memory-root
intra_group_zh: 记忆根
intra_role: anchor
description: Abstract persistent storage backend that holds memory records across sessions. May be partitioned into blocks
  and indexed for retrieval.
attributes:
  store_type:
    type: string
    required: true
    values:
    - relational
    - document
    - key_value
    - graph
    - object
    description: Underlying storage paradigm
  durability:
    type: string
    required: false
    values:
    - persistent
    - ephemeral
    - replicated
    description: Durability guarantees of the store
  namespace:
    type: string
    required: false
    description: Logical namespace or tenant identifier
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
interfaces:
- ref: contract.retrievable
- ref: contract.writable
