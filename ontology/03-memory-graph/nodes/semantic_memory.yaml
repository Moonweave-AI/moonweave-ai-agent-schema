id: node.semantic_memory
artifact: NodeClass
label: Semantic Memory
label_zh: 语义记忆
description: Structured factual knowledge, world models, and concept relations independent of the specific episode in which
  they were learned. Supports generalization, inference, and cross-session knowledge reuse.
attributes:
  schema_version:
    type: string
    required: false
    description: Version of the knowledge schema or ontology used
  confidence_threshold:
    type: number
    required: false
    description: Minimum confidence for facts to be treated as reliable
  update_mode:
    type: string
    required: false
    values:
    - append
    - merge
    - replace
    description: How new facts integrate with existing knowledge
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
