id: node.memory_forgetting_policy
artifact: NodeClass
label: Memory Forgetting Policy
label_zh: 记忆遗忘策略
intra_level: 3
intra_group: memory-pipeline
intra_group_zh: 记忆流水线
intra_axis: memory-operations
intra_axis_zh: 记忆流水线
intra_role: policy
parent_node: node.memory_compactor
description: Rules governing what memory records to discard, archive, or deprioritize and under what conditions. Implements
  intentional forgetting to manage capacity and privacy.
description_zh: >
  管理哪些内存记录要丢弃、存档或取消优先级以及在什么条件下进行的规则。实施故意遗忘来管理容量和隐私。
attributes:
  policy_type:
    type: string
    required: true
    values:
    - ttl
    - lru
    - importance_score
    - privacy_request
    - capacity_pressure
    description: Primary forgetting criterion
  ttl_days:
    type: integer
    required: false
    description: Time-to-live in days for TTL policies
  min_importance:
    type: number
    required: false
    description: Minimum importance score to retain under score-based policies
  requires_confirmation:
    type: boolean
    required: false
    description: Whether forgetting requires explicit approval
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
