id: node.memory_compactor
artifact: NodeClass
label: Memory Compactor
label_zh: 记忆压缩器
description: Summarizes, merges, and prunes memory records over time to control storage growth while preserving salient information
  and retrieval quality.
attributes:
  compaction_strategy:
    type: string
    required: true
    values:
    - summarize
    - merge_similar
    - archive_cold
    - hierarchical
    description: Primary compaction approach
  trigger_threshold:
    type: integer
    required: false
    description: Record count or size threshold triggering compaction
  preserve_recent_days:
    type: integer
    required: false
    description: Minimum age before records are compaction candidates
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
interfaces:
- ref: contract.compactable
