id: node.memory_writer
artifact: NodeClass
label: Memory Writer
label_zh: 记忆写入器
intra_level: 1
intra_group: memory-pipeline
intra_group_zh: 记忆流水线
intra_axis: memory-operations
intra_axis_zh: 记忆流水线
intra_role: process
parent_node: node.memory_store
description: Processes incoming content, extracts metadata, deduplicates, and persists new memory records to the appropriate
  store and indexes.
attributes:
  write_mode:
    type: string
    required: false
    values:
    - sync
    - async
    - batch
    description: Persistence timing strategy
  deduplication:
    type: boolean
    required: false
    description: Whether duplicate content is detected and skipped
  auto_index:
    type: boolean
    required: false
    description: Whether new records are automatically indexed
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
interfaces:
- ref: contract.writable
