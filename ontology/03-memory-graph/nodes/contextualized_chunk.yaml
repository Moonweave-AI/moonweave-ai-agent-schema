id: node.contextualized_chunk
artifact: NodeClass
label: Contextualized Chunk
label_zh: 上下文化文本块
description: Chunk augmented with situating context summary that disambiguates meaning when the chunk is retrieved in isolation.
  Improves retrieval precision and downstream use.
attributes:
  context_summary:
    type: string
    required: true
    description: Situation summary prepended or appended to chunk text
  parent_chunk_id:
    type: string
    required: true
    description: Reference to the source chunk
  contextualization_method:
    type: string
    required: false
    values:
    - llm_summary
    - heading_prefix
    - metadata_injection
    - neighbor_window
    description: Technique used to add context
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
