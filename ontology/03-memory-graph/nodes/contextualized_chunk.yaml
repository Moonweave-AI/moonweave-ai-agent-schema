id: node.contextualized_chunk
artifact: NodeClass
label: Contextualized Chunk
label_zh: 上下文化文本块
intra_level: 3
intra_group: memory-data-unit
intra_group_zh: 记忆数据单元
intra_axis: records-index
intra_axis_zh: 记忆数据单元 / 索引存储
intra_role: artifact
parent_node: node.memory_record
description: Chunk augmented with situating context summary that disambiguates meaning when the chunk is retrieved in isolation.
  Improves retrieval precision and downstream use.
description_zh: >
  块通过定位上下文摘要进行增强，当单独检索块时，可以消除含义的歧义。提高检索精度和下游使用。
attributes:
  context_summary:
    type: string
    required: true
    description: Situation summary prepended or appended to chunk text
  parent_chunk_id:
    type: string
    required: true
    description: Reference to the source chunk
  contextualization_method:
    type: string
    required: false
    values:
    - llm_summary
    - heading_prefix
    - metadata_injection
    - neighbor_window
    description: Technique used to add context
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
