id: node.virtual_context
artifact: NodeClass
label: Virtual Context
label_zh: 虚拟上下文
description: Reconstructed context assembled on demand from long-term memory when the active working memory window cannot
  hold all relevant information.
attributes:
  assembly_method:
    type: string
    required: false
    values:
    - retrieval_augmented
    - hierarchical_summary
    - graph_traversal
    description: How virtual context is built
  max_tokens:
    type: integer
    required: false
    description: Token budget for assembled virtual context
  freshness_requirement:
    type: string
    required: false
    description: Maximum age of included memory for time-sensitive tasks
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
