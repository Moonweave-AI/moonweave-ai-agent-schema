id: node.episodic_memory
artifact: NodeClass
label: Episodic Memory
label_zh: 情景记忆
intra_level: 1
intra_group: memory-kind
intra_group_zh: 记忆类型
intra_axis: memory-taxonomy
intra_axis_zh: 记忆类型
intra_role: memory
parent_node: node.memory_store
description: Chronologically ordered records of past events, sessions, and interactions. Each episode captures who, what,
  when, and situational context, enabling temporal recall and experience-based learning.
description_zh: >
  按时间顺序排列的过去事件、会话和交互的记录。每个情节都会捕捉人物、事件、时间和情境背景，从而实现时间回忆和基于经验的学习。
attributes:
  retention_days:
    type: integer
    required: false
    description: Default retention horizon for episodes
  ordering:
    type: string
    required: true
    values:
    - chronological
    - reverse_chronological
    description: Default temporal ordering for retrieval
  granularity:
    type: string
    required: false
    values:
    - session
    - turn
    - event
    - sub_event
    description: Unit of episodic segmentation
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
