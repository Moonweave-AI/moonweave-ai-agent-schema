id: node.memory_block
artifact: NodeClass
label: Memory Block
label_zh: 记忆分区
description: Logical partition within a memory store grouping related records by topic, time, tenant, or access policy. Enables
  scoped retrieval and independent compaction.
attributes:
  block_id:
    type: string
    required: true
    description: Unique identifier within the parent store
  record_count:
    type: integer
    required: false
    description: Approximate number of records in this block
  access_tier:
    type: string
    required: false
    values:
    - hot
    - warm
    - cold
    - archive
    description: Storage tier affecting latency and cost
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
