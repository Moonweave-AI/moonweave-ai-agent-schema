id: node.embedding_model
artifact: NodeClass
label: Embedding Model
label_zh: 嵌入模型
intra_level: 3
intra_group: index-store
intra_group_zh: 索引存储
intra_axis: records-index
intra_axis_zh: 记忆数据单元 / 索引存储
intra_role: model
parent_node: node.vector_store
description: Model that maps text to dense vector representations for semantic similarity search. Defines dimensionality,
  distance metric, and normalization behavior.
description_zh: >
  将文本映射到密集向量表示以进行语义相似性搜索的模型。定义维度、距离度量和标准化行为。
attributes:
  dimensions:
    type: integer
    required: true
    description: Output vector dimensionality
  max_input_tokens:
    type: integer
    required: false
    description: Maximum input length the model accepts
  distance_metric:
    type: string
    required: false
    values:
    - cosine
    - euclidean
    - dot_product
    description: Similarity metric used at query time
  model_version:
    type: string
    required: false
    description: Version identifier for reproducibility
evidence:
- ref: evidence.paper.cognitive_architecture
layer: memory
plane: memory
