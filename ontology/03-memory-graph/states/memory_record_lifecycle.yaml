id: state.memory_record_lifecycle
artifact: StateMachine
label: Memory Record Lifecycle
label_zh: 记忆记录生命周期
description: Lifecycle states for individual memory records from creation through compaction or forgetting.
states:
- name: created
  initial: true
  description: Record has been written but not yet indexed or accessed
- name: active
  description: Record is indexed, retrievable, and within retention policy
- name: archived
  description: Record moved to cold storage; retrievable with higher latency
- name: compacted
  terminal: true
  description: Record content merged into a summary; original superseded
- name: forgotten
  terminal: true
  description: Record permanently removed per forgetting policy
transitions:
- from: created
  to: active
  trigger: indexed
  description: Record indexed and available for retrieval
- from: active
  to: archived
  trigger: age_threshold
  description: Record aged out of hot tier
- from: active
  to: compacted
  trigger: compaction_run
  description: Record merged into summary
- from: active
  to: forgotten
  trigger: forget_policy
  description: Record deleted by forgetting policy
- from: archived
  to: forgotten
  trigger: forget_policy
  description: Archived record purged
- from: archived
  to: active
  trigger: reactivated
  description: Record promoted back to hot tier on access
