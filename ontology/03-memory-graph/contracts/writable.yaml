id: contract.writable
artifact: InterfaceContract
label: Writable
label_zh: 可写入
description: Interface for components that accept and persist new memory content.
operations:
- name: write
  description: Persist a new memory record with metadata
  input:
    content: string
    metadata: object
    memory_type: string
  output:
    record_id: string
    indexed: boolean
  errors:
  - quota_exceeded
  - policy_denied
  - duplicate
- name: update
  description: Update an existing memory record
  input:
    record_id: string
    content: string
    metadata: object
  output:
    record_id: string
    version: integer
  errors:
  - not_found
  - conflict
