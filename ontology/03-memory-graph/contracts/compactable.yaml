id: contract.compactable
artifact: InterfaceContract
label: Compactable
label_zh: 可压缩
description: Interface for components that support memory compression and summarization.
operations:
- name: compact
  description: Run compaction over a set of memory records
  input:
    record_ids: array
    strategy: string
  output:
    summary_record_id: string
    archived_ids: array
  errors:
  - insufficient_records
  - compaction_failed
- name: estimate_savings
  description: Estimate storage reduction from proposed compaction
  input:
    record_ids: array
  output:
    estimated_bytes_saved: integer
  errors: []
