id: contract.retrievable
artifact: InterfaceContract
label: Retrievable
label_zh: 可检索
description: Interface for components that support memory query and retrieval operations.
operations:
- name: query
  description: Execute a retrieval query against indexed memory
  input:
    query_text: string
    top_k: integer
    filters: object
  output:
    results: array
    scores: array
    latency_ms: number
  errors:
  - index_unavailable
  - query_timeout
  - invalid_filter
- name: get_by_id
  description: Fetch a single memory record by identifier
  input:
    record_id: string
  output:
    record: object
  errors:
  - not_found
