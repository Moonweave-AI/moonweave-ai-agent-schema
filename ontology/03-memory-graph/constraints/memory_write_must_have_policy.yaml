id: constraint.memory_write_must_have_policy
artifact: GraphConstraint
label: Memory Write Must Have Policy
label_zh: 记忆写入必须关联策略
severity: error
rule: Every MemoryWriter instance MUST have at least one outgoing WRITES_TO edge to a MemoryStore that is governed by a MemoryForgettingPolicy
  via FORGETS_BY_POLICY or an equivalent policy binding.
description: Ensures all memory persistence operations are subject to retention and forgetting rules.
applies_to:
  nodes:
  - node.memory_writer
  edges:
  - edge.WRITES_TO
