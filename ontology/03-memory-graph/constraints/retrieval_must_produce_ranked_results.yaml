id: constraint.retrieval_must_produce_ranked_results
artifact: GraphConstraint
label: Retrieval Must Produce Ranked Results
label_zh: 检索必须产生排序结果
severity: error
rule: Every MemoryRetriever query operation MUST produce an ordered list of results with associated relevance scores. Empty
  results are valid; unordered results are not.
description: Guarantees downstream consumers receive consistently ranked retrieval output.
applies_to:
  nodes:
  - node.memory_retriever
