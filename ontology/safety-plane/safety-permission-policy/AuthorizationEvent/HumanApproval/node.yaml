        en: The record satisfies both shared authorization-event identity and the human-approval differentia.
        ja: 記録は共通認可イベント同一性と人間承認種差をともに満たします。

        en: A verifiable human actor, occurrence time, request object, and approval effect are present.
        ja: 検証可能な人間行為者、発生時刻、要求対象、承認効果があります。
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-004
    - id: HumanApproval-is_a-AuthorizationEvent-example-boundary-manual-001
      labels:
        zh: 是一种授权事件边界反例
        en: Boundary counterexample for is an authorization event
        ja: 認可イベントの一種であるの境界反例
      descriptions:
        zh: response-42 只记录用户提交 approve 文本，尚未验证资格、请求一致性和范围；它仍是 PermissionResponse，不是 HumanApproval 事件。
        en: response-42 only records submitted approve text before eligibility, request identity, and scope are validated; it remains a PermissionResponse rather than a HumanApproval event.
        ja: response-42 は資格・要求同一性・範囲検証前の approve 入力記録にすぎず、PermissionResponse のままで HumanApproval イベントではありません。
      field_values: {}
      related_node_ids:
