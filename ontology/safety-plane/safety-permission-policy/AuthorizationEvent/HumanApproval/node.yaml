schema: moonweave.ai/ontology-node/v1
id: HumanApproval
kind: concept
status: accepted
labels:
  zh: 人工批准事件
  en: human approval event
  ja: 人間承認イベント
semantics:
  short_definition:
    zh: 有资格的人针对一个确定授权请求、范围和期限作出肯定批准的事件。
    en: An event in which an eligible human affirmatively approves one fixed authorization request, scope, and validity interval.
    ja: 資格ある人間が一つの固定認可要求・範囲・有効期間を肯定承認したイベントです。
  definition:
    zh: 人工批准是一种 AuthorizationEvent，继承 event_id 作为唯一事件身份；审批者、AuthorizationRequest、不超过请求的 PermissionScope、生效时间、权限依据和理由构成批准种差。它不是可复用凭证，也不直接签发 AuthorizationGrant；PolicyEvaluation 可将其作为决定证据。
    en: A HumanApproval is an AuthorizationEvent and inherits event_id as its sole event identity. Approver, AuthorizationRequest, no-broader PermissionScope, occurrence time, authority basis, and rationale form its approval differentia. It is not a reusable credential and does not directly issue an AuthorizationGrant; PolicyEvaluation may use it as decision evidence.
    ja: HumanApproval は AuthorizationEvent の一種で、唯一のイベント同一性として event_id を継承します。審査者、AuthorizationRequest、要求を超えない PermissionScope、発生時刻、権限根拠、理由が承認の種差です。再利用資格でも AuthorizationGrant の直接発行でもなく、PolicyEvaluation の証拠になります。
  why_needed:
    zh: 它把人的行为证据与机器策略决定和持久授权授予分开，避免“一次点击”自动扩张为长期权限。
    en: It separates evidence of a human act from machine policy decision and durable grant, preventing one click from silently expanding into standing authority.
    ja: 人間行為の証拠を機械方針判断と持続付与から分離し、一回のクリックが恒常権限へ拡張されるのを防ぎます。
  includes:
    - zh: 包含批准事件标识、请求引用、审批者、批准范围、发生时间、失效时间、权限依据和理由。
      en: Includes approval-event identity, request reference, approver, approved scope, occurrence time, expiry, authority basis, and rationale.
      ja: 承認イベント識別子、要求参照、承認者、承認範囲、発生時刻、失効時刻、権限根拠、理由を含みます。
  excludes:
    - zh: 不包含原始提示或响应、PolicyDecision、AuthorizationGrant、审批者身份本体或工具执行结果。
      en: Excludes the original prompt or response, PolicyDecision, AuthorizationGrant, approver identity itself, or tool execution result.
      ja: 元提示・応答、PolicyDecision、AuthorizationGrant、承認者同一性自体、ツール実行結果を含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本事件明确批准的 AuthorizationRequest。
        en: AuthorizationRequest explicitly approved by the event.
        ja: イベントが明示的に承認する AuthorizationRequest です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: approver_ref
      labels:
        zh: 审批者引用
        en: approver reference
        ja: 承認者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 具有相应审批权限的人类主体。
        en: Human principal holding the required approval authority.
        ja: 必要な承認権限を持つ人間主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: approved_scope_ref
      labels:
        zh: 批准范围引用
        en: approved scope reference
        ja: 承認範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审批者明确同意且不超过请求的范围。
        en: Scope explicitly accepted by the reviewer without exceeding the request.
        ja: 審査者が明示同意し要求を超えない範囲です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: valid_until
      labels:
        zh: 批准失效时间
        en: approval valid until
        ja: 承認失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该批准证据可参与评估的最晚时刻。
        en: Latest instant when the approval evidence may participate in evaluation.
        ja: 承認証拠が評価へ参加できる最終時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: rationale
      labels:
        zh: 批准理由
        en: approval rationale
        ja: 承認理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 人工批准所依据的可审计理由。
        en: Auditable rationale supporting the human approval.
        ja: 人間承認を支える監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: read-only search required for task
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: human-approval-openai_hitl
    labels:
      zh: 人工批准事件 - OpenAI Agents SDK 人工审批
      en: human approval event - OpenAI Agents SDK human approval
      ja: 人間承認イベント - OpenAI Agents SDK 人手承認
    descriptions: {zh: "人工批准事件(HumanApproval) [HumanApproval]: 有资格的人针对一个确定授权请求、范围和期限作出肯定批准的事件。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: valid_until, request_ref, approved_scope_ref.", en: "human approval event (HumanApproval) [HumanApproval]: An event in which an eligible human affirmatively approves one fixed authorization request, scope, and validity interval.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include valid_until, request_ref, approved_scope_ref.", ja: "人間承認イベント(HumanApproval) [HumanApproval]: 資格ある人間が一つの固定認可要求・範囲・有効期間を肯定承認したイベントです。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: valid_until, request_ref, approved_scope_ref."}
    field_values:
      approved_scope_ref: scope-search-read
      approver_ref: "human:owner-7"
      rationale: "read-only search required for task"
      request_ref: request-42
      valid_until: "2026-07-16T01:25:00Z"
    related_node_ids:
      - AuthorizationRequest
      - HumanApproval
      - PolicyEvaluation
    related_relation_ids:
      - AuthorizationRequest
      - claim-human-approval-001
      - claim-human-approval-002
      - HumanApproval
      - HumanApproval-approves-AuthorizationRequest
      - PolicyEvaluation
      - PolicyEvaluation-considers-HumanApproval
    example_source: OpenAI Agents SDK HITL
    source_claims:
      - claim-human-approval-001
  - id: human-approval-langgraph_interrupt
    labels:
      zh: 人工批准事件 - LangGraph 人工中断
      en: human approval event - LangGraph human interrupt
      ja: 人間承認イベント - LangGraph 人手 interrupt
    descriptions: {zh: "人工批准事件(HumanApproval) [HumanApproval]: 有资格的人针对一个确定授权请求、范围和期限作出肯定批准的事件。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: valid_until, request_ref, approved_scope_ref.", en: "human approval event (HumanApproval) [HumanApproval]: An event in which an eligible human affirmatively approves one fixed authorization request, scope, and validity interval.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include valid_until, request_ref, approved_scope_ref.", ja: "人間承認イベント(HumanApproval) [HumanApproval]: 資格ある人間が一つの固定認可要求・範囲・有効期間を肯定承認したイベントです。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: valid_until, request_ref, approved_scope_ref."}
    field_values:
      approved_scope_ref: scope-search-read
      approver_ref: "human:owner-7"
      rationale: "read-only search required for task"
      request_ref: request-42
      valid_until: "2026-07-16T01:25:00Z"
    related_node_ids:
      - AuthorizationRequest
      - HumanApproval
      - PolicyEvaluation
    related_relation_ids:
      - AuthorizationRequest
      - claim-human-approval-001
      - claim-human-approval-002
      - HumanApproval
      - HumanApproval-approves-AuthorizationRequest
      - PolicyEvaluation
      - PolicyEvaluation-considers-HumanApproval
    example_source: LangGraph interrupt
    source_claims:
      - claim-human-approval-001
  - id: human-approval-anthropic_cai
    labels:
      zh: 人工批准事件 - Anthropic Constitutional AI
      en: human approval event - Anthropic Constitutional AI
      ja: 人間承認イベント - Anthropic Constitutional AI
    descriptions: {zh: "人工批准事件(HumanApproval) [HumanApproval]: 有资格的人针对一个确定授权请求、范围和期限作出肯定批准的事件。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: valid_until, request_ref, approved_scope_ref.", en: "human approval event (HumanApproval) [HumanApproval]: An event in which an eligible human affirmatively approves one fixed authorization request, scope, and validity interval.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include valid_until, request_ref, approved_scope_ref.", ja: "人間承認イベント(HumanApproval) [HumanApproval]: 資格ある人間が一つの固定認可要求・範囲・有効期間を肯定承認したイベントです。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: valid_until, request_ref, approved_scope_ref."}
    field_values:
      approved_scope_ref: scope-search-read
      approver_ref: "human:owner-7"
      rationale: "read-only search required for task"
      request_ref: request-42
      valid_until: "2026-07-16T01:25:00Z"
    related_node_ids:
      - AuthorizationRequest
      - HumanApproval
      - PolicyEvaluation
    related_relation_ids:
