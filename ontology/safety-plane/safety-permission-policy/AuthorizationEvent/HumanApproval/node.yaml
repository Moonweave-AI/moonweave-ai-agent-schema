      labels:
        zh: 是一种授权事件正例
        en: Positive is an authorization event case
        ja: 認可イベントの一種であるの正例
      descriptions:
        zh: approval-42 由合格审批者在期限内针对 request-42 发生，并记录权限依据与批准范围。
        en: approval-42 occurs when an eligible reviewer approves request-42 within the interval and records authority basis and approved scope.
        ja: approval-42 は資格ある審査者が期限内に request-42 を承認し、権限根拠と承認範囲を記録します。
      field_values: {}
      related_node_ids:
        - HumanApproval
        - AuthorizationEvent
      related_relation_ids:
