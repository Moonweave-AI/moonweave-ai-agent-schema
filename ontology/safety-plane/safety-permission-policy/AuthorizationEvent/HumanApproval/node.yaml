external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AuthorizationRevocation
    shared_parent_concept_id: AuthorizationEvent
    differentia:
      zh: HumanApproval 为确定请求提供肯定的人类证据；AuthorizationRevocation 使确定授予不再授权未来动作。批准请求不等于撤销或签发授予。
      en: HumanApproval supplies affirmative human evidence for a fixed request; AuthorizationRevocation stops a fixed grant from authorizing future actions. Approving a request is neither revoking nor issuing a grant.
      ja: HumanApproval は固定要求への肯定的人間証拠、AuthorizationRevocation は固定付与の将来認可を停止します。要求承認は取消や付与発行ではありません。
    source_claims:
      - claim-human-approval-001
      - claim-human-approval-003
parent_relation:
  id: HumanApproval-is_a-AuthorizationEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种授权事件
    en: is an authorization event
    ja: 認可イベントの一種である
  definitions:
    zh: HumanApproval 是 AuthorizationEvent 的子类：它继承事件行动者、时间、对象和权限依据，并以有资格的人肯定一个确定 AuthorizationRequest 及不扩大范围作为种差。
    en: HumanApproval is a subtype of AuthorizationEvent. It inherits actor, time, object, and authority-basis identity and is distinguished by an eligible human affirmatively approving one fixed AuthorizationRequest without widening its scope.
    ja: HumanApproval は AuthorizationEvent の下位型です。行為者・時刻・対象・権限根拠を継承し、資格ある人間が一つの固定 AuthorizationRequest を範囲拡大なく肯定承認する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有人工批准子类
      en: has human-approval subtype
      ja: 人間承認下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
