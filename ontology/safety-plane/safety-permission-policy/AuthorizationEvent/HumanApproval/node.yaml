        en: Classification refuses promotion to HumanApproval and evaluation cannot authorize directly from it.
        ja: 分類は HumanApproval への昇格を拒否し、評価はそれだけで認可できません。

        en: A message answer and an authorization event with business effect have different identities.
        ja: メッセージ回答と業務効果を持つ認可イベントは同一性が異なります。
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-004
  source_claims:
