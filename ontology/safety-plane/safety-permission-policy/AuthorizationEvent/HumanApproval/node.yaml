schema: moonweave.ai/ontology-node/v1
id: HumanApproval
kind: concept
status: accepted
labels:
  zh: 人工批准事件
  en: human approval event
  ja: 人間承認イベント
semantics:
  short_definition:
    zh: 有资格的人针对一个确定授权请求、范围和期限作出肯定批准的事件。
    en: An event in which an eligible human affirmatively approves one fixed authorization request, scope, and validity interval.
    ja: 資格ある人間が一つの固定認可要求・範囲・有効期間を肯定承認したイベントです。
  definition:
    zh: 人工批准是一种 AuthorizationEvent，继承 event_id 作为唯一事件身份；审批者、AuthorizationRequest、不超过请求的 PermissionScope、生效时间、权限依据和理由构成批准种差。它不是可复用凭证，也不直接签发 AuthorizationGrant；PolicyEvaluation 可将其作为决定证据。
    en: A HumanApproval is an AuthorizationEvent and inherits event_id as its sole event identity. Approver, AuthorizationRequest, no-broader PermissionScope, occurrence time, authority basis, and rationale form its approval differentia. It is not a reusable credential and does not directly issue an AuthorizationGrant; PolicyEvaluation may use it as decision evidence.
    ja: HumanApproval は AuthorizationEvent の一種で、唯一のイベント同一性として event_id を継承します。審査者、AuthorizationRequest、要求を超えない PermissionScope、発生時刻、権限根拠、理由が承認の種差です。再利用資格でも AuthorizationGrant の直接発行でもなく、PolicyEvaluation の証拠になります。
  why_needed:
    zh: 它把人的行为证据与机器策略决定和持久授权授予分开，避免“一次点击”自动扩张为长期权限。
    en: It separates evidence of a human act from machine policy decision and durable grant, preventing one click from silently expanding into standing authority.
    ja: 人間行為の証拠を機械方針判断と持続付与から分離し、一回のクリックが恒常権限へ拡張されるのを防ぎます。
  includes:
    - zh: 包含批准事件标识、请求引用、审批者、批准范围、发生时间、失效时间、权限依据和理由。
      en: Includes approval-event identity, request reference, approver, approved scope, occurrence time, expiry, authority basis, and rationale.
      ja: 承認イベント識別子、要求参照、承認者、承認範囲、発生時刻、失効時刻、権限根拠、理由を含みます。
  excludes:
    - zh: 不包含原始提示或响应、PolicyDecision、AuthorizationGrant、审批者身份本体或工具执行结果。
      en: Excludes the original prompt or response, PolicyDecision, AuthorizationGrant, approver identity itself, or tool execution result.
      ja: 元提示・応答、PolicyDecision、AuthorizationGrant、承認者同一性自体、ツール実行結果を含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本事件明确批准的 AuthorizationRequest。
        en: AuthorizationRequest explicitly approved by the event.
        ja: イベントが明示的に承認する AuthorizationRequest です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: approver_ref
      labels:
        zh: 审批者引用
        en: approver reference
        ja: 承認者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 具有相应审批权限的人类主体。
        en: Human principal holding the required approval authority.
        ja: 必要な承認権限を持つ人間主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: approved_scope_ref
      labels:
        zh: 批准范围引用
        en: approved scope reference
        ja: 承認範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审批者明确同意且不超过请求的范围。
        en: Scope explicitly accepted by the reviewer without exceeding the request.
        ja: 審査者が明示同意し要求を超えない範囲です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: valid_until
      labels:
        zh: 批准失效时间
        en: approval valid until
        ja: 承認失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该批准证据可参与评估的最晚时刻。
        en: Latest instant when the approval evidence may participate in evaluation.
        ja: 承認証拠が評価へ参加できる最終時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
    - id: rationale
      labels:
        zh: 批准理由
        en: approval rationale
        ja: 承認理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 人工批准所依据的可审计理由。
        en: Auditable rationale supporting the human approval.
        ja: 人間承認を支える監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: read-only search required for task
      source_claims:
        - claim-human-approval-001
        - claim-human-approval-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: HumanApproval-example-positive-manual-001
    kind: positive
    labels:
      zh: 人工批准事件正例
      en: Positive human approval event case
      ja: 人間承認イベントの正例
    scenario_id: null
    descriptions:
      zh: human:owner-7 依据 project-owner-policy@3 在 prompt-42 有效期内批准 request-42 的只读搜索范围；approval-42 不批准写入或其他工具。
      en: Under project-owner-policy@3, human:owner-7 approves request-42's read-only search scope while prompt-42 is valid; approval-42 does not approve writes or other tools.
      ja: human:owner-7 は project-owner-policy@3 に基づき prompt-42 有効中に request-42 の読取専用検索範囲を承認し、approval-42 は書込や他ツールを承認しません。
    field_values:
      event_id: approval-42
      event_kind: human-approval
      actor_ref: human:owner-7
      authorization_object_ref: request-42
      request_ref: request-42
      approver_ref: human:owner-7
      approved_scope_ref: scope-search-read
      occurred_at: 2026-07-16T01:21:00Z
      valid_until: 2026-07-16T01:25:00Z
      authority_basis: project-owner-policy@3
      rationale: read-only search required for task
    related_node_ids:
      - HumanApproval
      - AuthorizationRequest
      - PolicyEvaluation
    related_relation_ids:
      - HumanApproval-approves-AuthorizationRequest
      - PolicyEvaluation-considers-HumanApproval
    expected_result:
      zh: 评估可验证审批者、请求、范围和时间，并把 approval-42 作为证据而非授权凭证。
      en: Evaluation can verify approver, request, scope, and time and treat approval-42 as evidence rather than a credential.
      ja: 評価は承認者・要求・範囲・時刻を検証し、approval-42 を資格ではなく証拠として扱えます。
    why_valid_or_invalid:
      zh: 批准事实被严格绑定到一个请求和范围，没有跨请求或无限期复用。
      en: The approval fact is strictly bound to one request and scope with no cross-request or indefinite reuse.
      ja: 承認事実は一要求・一範囲へ厳密に束縛され、要求横断や無期限再利用がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-human-approval-001
      - claim-human-approval-002
  - id: HumanApproval-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 人工批准事件边界反例
      en: Boundary counterexample for human approval event
      ja: 人間承認イベントの境界反例
    scenario_id: null
    descriptions:
      zh: human:owner-7 曾在昨天批准相似搜索，但旧批准引用 request-17；它不能作为 request-42 的 HumanApproval。
      en: human:owner-7 approved a similar search yesterday, but that approval references request-17 and cannot serve as HumanApproval for request-42.
      ja: human:owner-7 が昨日類似検索を承認していても request-17 を参照するため request-42 の HumanApproval には使えません。
    field_values: {}
    related_node_ids:
      - HumanApproval
      - AuthorizationRequest
    related_relation_ids:
      - HumanApproval-approves-AuthorizationRequest
    expected_result:
      zh: 验证按 request_ref 和有效期拒绝复用旧批准。
      en: Validation rejects reuse of the old approval by request_ref and validity interval.
      ja: 検証は request_ref と有効期間により旧承認の再利用を拒否します。
    why_valid_or_invalid:
      zh: 动作名称相似不改变审批事件由请求和时间决定的身份。
      en: Similar action names do not change approval-event identity determined by request and time.
      ja: 操作名の類似は要求と時刻で決まる承認イベント同一性を変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-human-approval-001
      - claim-human-approval-002
