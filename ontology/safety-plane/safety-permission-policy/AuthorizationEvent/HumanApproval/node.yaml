  - id: human-approval-cedar
    labels:
      zh: 人工批准事件 - Cedar 授权评估
      en: human approval event - Cedar authorization evaluation
      ja: 人間承認イベント - Cedar 認可評価
    descriptions: {zh: "人工批准事件(HumanApproval) [HumanApproval]: 有资格的人针对一个确定授权请求、范围和期限作出肯定批准的事件。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: valid_until, request_ref, approved_scope_ref.", en: "human approval event (HumanApproval) [HumanApproval]: An event in which an eligible human affirmatively approves one fixed authorization request, scope, and validity interval.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include valid_until, request_ref, approved_scope_ref.", ja: "人間承認イベント(HumanApproval) [HumanApproval]: 資格ある人間が一つの固定認可要求・範囲・有効期間を肯定承認したイベントです。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: valid_until, request_ref, approved_scope_ref."}
    field_values:
      approved_scope_ref: scope-search-read
