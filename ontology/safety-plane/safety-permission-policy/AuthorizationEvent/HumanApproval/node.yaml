applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AuthorizationRevocation
    shared_parent_concept_id: AuthorizationEvent
    differentia:
      zh: HumanApproval 为确定请求提供肯定的人类证据；AuthorizationRevocation 使确定授予不再授权未来动作。批准请求不等于撤销或签发授予。
      en: HumanApproval supplies affirmative human evidence for a fixed request; AuthorizationRevocation stops a fixed grant from authorizing future actions. Approving a request is neither revoking nor issuing a grant.
      ja: HumanApproval は固定要求への肯定的人間証拠、AuthorizationRevocation は固定付与の将来認可を停止します。要求承認は取消や付与発行ではありません。
    source_claims:
      - claim-human-approval-001
      - claim-human-approval-003
