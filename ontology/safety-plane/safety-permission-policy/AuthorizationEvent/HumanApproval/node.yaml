schema: moonweave.ai/ontology-node/v1
id: HumanApproval
kind: concept
labels:
  zh: 人工批准事件
  en: human approval event
  ja: 人間承認イベント
semantics:
  short_definition:
    zh: 有资格的人类对固定 AuthorizationRequest 作出肯定批准的可审计事件。
    en: An auditable event where an eligible human affirmatively approves one fixed AuthorizationRequest.
    ja: 資格ある人間が固定 AuthorizationRequest を肯定承認した監査可能イベント。
  definition:
    zh: HumanApproval 继承 AuthorizationEvent 的 event_id，并以 approver_ref、request_ref、approved_scope_ref、valid_until 与 rationale 为种差。它映射 MCP OAuth consent 页用户点击 Allow、Cursor "Cursor wants to run X" 对话框 Run、Claude Code "Allow tool?" yesAllow 与 allowForSession 会话级人工证据；是 PolicyEvaluation 的 defer→allow 证据，不直接签发 AuthorizationGrant。
    en: HumanApproval inherits AuthorizationEvent event_id and is distinguished by approver_ref, request_ref, approved_scope_ref, valid_until, and rationale. It maps MCP OAuth consent Allow clicks, Cursor "Cursor wants to run X" Run, Claude Code "Allow tool?" yesAllow and allowForSession human evidence; it is defer→allow evidence for PolicyEvaluation, not a direct AuthorizationGrant issuer.
    ja: HumanApproval は AuthorizationEvent event_id を継承し approver_ref/request_ref/approved_scope_ref/valid_until/rationale が種差。MCP OAuth Allow、Cursor wants to run X Run、Claude Allow tool yesAllow/allowForSession を写像。PolicyEvaluation の defer→allow 証拠で AuthorizationGrant 直接発行ではない。
  why_needed:
    zh: 必须把 OAuth consent 点击与机器 allow 决定分开，否则 MCP scope 会被误当作永久 grant。
    en: OAuth consent clicks must be separated from machine allow decisions or MCP scopes are mistaken for permanent grants.
    ja: OAuth consent クリックと machine allow decision を分離しないと MCP scope が permanent grant と誤認されます。
  includes:
    - zh: 包含批准事件标识、请求引用、审批者、批准范围、发生时间、失效时间、权限依据和理由。
      en: Includes approval-event identity, request reference, approver, approved scope, occurrence time, expiry, authority basis, and rationale.
      ja: 承認イベント識別子、要求参照、承認者、承認範囲、発生時刻、失効時刻、権限根拠、理由を含みます。
  excludes:
    - zh: 不包含原始提示或响应、PolicyDecision、AuthorizationGrant、审批者身份本体或工具执行结果。
      en: Excludes the original prompt or response, PolicyDecision, AuthorizationGrant, approver identity itself, or tool execution result.
      ja: 元提示・応答、PolicyDecision、AuthorizationGrant、承認者同一性自体、ツール実行結果を含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: HumanApproval 仅在 PermissionResponse 通过资格、prompt 有效期与 request 一致性验证后创建；MCP consent 与 Cursor/Claude 对话框都先产生 PermissionPrompt/PermissionResponse，再升格为 HumanApproval。绑定 request_ref 与 approved_scope_ref，禁止跨 request 复用。
    en: Create HumanApproval only after PermissionResponse passes eligibility, prompt validity, and request-consistency checks; MCP consent and Cursor/Claude dialogs first yield PermissionPrompt/PermissionResponse, then promote to HumanApproval. Bind request_ref and approved_scope_ref; forbid cross-request reuse.
    ja: PermissionResponse が資格/prompt 有効性/request 整合を通過後のみ HumanApproval 作成。MCP consent/Cursor/Claude dialog は PermissionPrompt/PermissionResponse 経由。request_ref/approved_scope_ref 束縛、request 横断再利用禁止。
  typical_input:
    - description: MCP OAuth consent Allow.
      format: user clicks Allow; scopes=tools:read tools:call; resource=https://mcp.example.com
      source_claims:
        - claim-human-approval-design
    - description: Claude Code yesAllow.
      format: "permission_mode: default; user selects yesAllow for Bash tool"
      source_claims:
        - claim-human-approval-design
  typical_output:
    - description: HumanApproval evidence for PolicyEvaluation.
      format: '{"event_id":"approval-42","request_ref":"request-42","approved_scope_ref":"scope-search-read"}'
      source_claims:
        - claim-human-approval-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys: []
  fields:
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本事件明确批准的 AuthorizationRequest。
        en: AuthorizationRequest explicitly approved by the event.
        ja: イベントが明示的に承認する AuthorizationRequest です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-human-approval-design
        - claim-human-approval-design
    - id: approver_ref
      labels:
        zh: 审批者引用
        en: approver reference
        ja: 承認者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 具有相应审批权限的人类主体。
        en: Human principal holding the required approval authority.
        ja: 必要な承認権限を持つ人間主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-human-approval-design
        - claim-human-approval-design
    - id: approved_scope_ref
      labels:
        zh: 批准范围引用
        en: approved scope reference
        ja: 承認範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审批者明确同意且不超过请求的范围。
        en: Scope explicitly accepted by the reviewer without exceeding the request.
        ja: 審査者が明示同意し要求を超えない範囲です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-human-approval-design
        - claim-human-approval-design
    - id: valid_until
      labels:
        zh: 批准失效时间
        en: approval valid until
        ja: 承認失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该批准证据可参与评估的最晚时刻。
        en: Latest instant when the approval evidence may participate in evaluation.
        ja: 承認証拠が評価へ参加できる最終時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-human-approval-design
        - claim-human-approval-design
    - id: rationale
      labels:
        zh: 批准理由
        en: approval rationale
        ja: 承認理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 人工批准所依据的可审计理由。
        en: Auditable rationale supporting the human approval.
        ja: 人間承認を支える監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: read-only search required for task
      source_claims:
        - claim-human-approval-design
        - claim-human-approval-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: HumanApproval-mcp-oauth-allow
    labels:
      zh: MCP OAuth Allow 批准
      en: MCP OAuth Allow approval
      ja: MCP OAuth Allow 承認
    descriptions:
      zh: human:user-7 在 MCP consent 页批准 scope tools:read tools:call；approval-mcp-42 绑定 request-mcp-42。
      en: human:user-7 approves scopes tools:read tools:call on MCP consent; approval-mcp-42 binds request-mcp-42.
      ja: human:user-7 が MCP consent で tools:read tools:call を承認。approval-mcp-42 が request-mcp-42 に束縛。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: OAuth consent
    field_values:
      event_id: approval-mcp-42
      request_ref: request-mcp-42
      approver_ref: human:user-7
      approved_scope_ref: scope-mcp-read-call
    related_node_ids:
      - HumanApproval
      - AuthorizationRequest
    related_relation_ids:
      - HumanApproval-approves-AuthorizationRequest
    source_claims:
      - claim-human-approval-design
  - id: HumanApproval-cursor-run
    labels:
      zh: Cursor Run 批准
      en: Cursor Run approval
      ja: Cursor Run 承認
    descriptions:
      zh: human:owner-7 在 Cursor wants to run npm test 对话框点击 Run；approval-55 仅批准该命令摘要。
      en: human:owner-7 clicks Run on Cursor wants to run npm test; approval-55 approves only that command digest.
      ja: Cursor wants to run npm test で Run クリック。approval-55 は当該 command digest のみ承認。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: wants to run dialog
    field_values:
      event_id: approval-55
      request_ref: request-55
      approver_ref: human:owner-7
    related_node_ids:
      - HumanApproval
      - PermissionPrompt
    related_relation_ids: []
    source_claims:
      - claim-human-approval-design
  - id: HumanApproval-claude-yesallow
    labels:
      zh: Claude yesAllow 批准
      en: Claude yesAllow approval
      ja: Claude yesAllow 承認
    descriptions:
      zh: Claude Code Allow tool? 对话框选择 yesAllow；approval-claude-61 绑定 Bash 写入 workspace 外路径请求。
      en: Claude Code Allow tool? dialog selects yesAllow; approval-claude-61 binds Bash write-outside-workspace request.
      ja: Claude Allow tool? で yesAllow。approval-claude-61 が workspace 外 Bash write request に束縛。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: yesAllow
    field_values:
      event_id: approval-claude-61
      request_ref: request-61
      approver_ref: human:dev-3
    related_node_ids:
      - HumanApproval
      - ToolApprovalGate
    related_relation_ids: []
    source_claims:
      - claim-human-approval-design
  - id: HumanApproval-boundary-stale
    labels:
      zh: 旧批准不能复用
      en: Stale approval cannot reuse
      ja: 旧承認は再利用不可
    descriptions:
      zh: 昨天 approval-17 引用 request-17，不能作为 request-42 的 HumanApproval。
      en: Yesterday approval-17 references request-17 and cannot serve as HumanApproval for request-42.
      ja: 昨日 approval-17 は request-17 参照のため request-42 の HumanApproval になれません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: request binding
    field_values: {}
    related_node_ids:
      - HumanApproval
      - AuthorizationRequest
    related_relation_ids: []
    source_claims:
      - claim-human-approval-design
parent_relation:
  id: HumanApproval-is_a-AuthorizationEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种授权事件
    en: is an authorization event
    ja: 認可イベントの一種である
  definitions:
    zh: HumanApproval 是 AuthorizationEvent 的子类：它继承事件行动者、时间、对象和权限依据，并以有资格的人肯定一个确定 AuthorizationRequest 及不扩大范围作为种差。
    en: HumanApproval is a subtype of AuthorizationEvent. It inherits actor, time, object, and authority-basis identity and is distinguished by an eligible human affirmatively approving one fixed AuthorizationRequest without widening its scope.
    ja: HumanApproval は AuthorizationEvent の下位型です。行為者・時刻・対象・権限根拠を継承し、資格ある人間が一つの固定 AuthorizationRequest を範囲拡大なく肯定承認する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有人工批准子类
      en: has human-approval subtype
      ja: 人間承認下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-human-approval-design
    - claim-human-approval-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: HumanApproval-approves-AuthorizationRequest
    predicate: approves
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 批准授权请求
      en: approves authorization request
      ja: 認可要求を承認する
    definitions:
      zh: HumanApproval 明确肯定一个 AuthorizationRequest，并把批准限制在不超过请求的范围和有效期；该事件只是评估证据，不直接签发 grant。
      en: A HumanApproval affirmatively approves one AuthorizationRequest within a scope and interval no broader than requested; the event is evaluation evidence and does not directly issue a grant.
      ja: HumanApproval は一つの AuthorizationRequest を要求以下の範囲・期間で肯定承認し、評価証拠であって grant を直接発行しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: approved_by_human
      labels:
        zh: 获得人工批准
        en: is approved by human
        ja: 人間に承認される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-human-approval-design
      - claim-human-approval-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AuthorizationRequest
