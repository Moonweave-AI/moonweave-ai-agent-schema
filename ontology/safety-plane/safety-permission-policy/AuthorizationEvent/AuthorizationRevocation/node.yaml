sibling_differentiation:
  - sibling_concept_id: HumanApproval
    shared_parent_concept_id: AuthorizationEvent
    differentia:
      zh: AuthorizationRevocation 终止既有授予的未来有效性；HumanApproval 肯定一个尚待评估的请求。两者都是有行动者和时间的授权事件，但对象与业务效果相反。
      en: AuthorizationRevocation terminates the future validity of an existing grant; HumanApproval affirms a request still awaiting evaluation. Both are actor- and time-bound authorization events, but their objects and effects differ.
      ja: AuthorizationRevocation は既存付与の将来有効性を終了し、HumanApproval は評価待ち要求を肯定します。両者は行為者・時刻付き認可イベントですが対象と効果が異なります。
    source_claims:
      - claim-authorization-revocation-001
      - claim-authorization-revocation-003
