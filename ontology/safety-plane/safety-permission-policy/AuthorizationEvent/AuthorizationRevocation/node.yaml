        en: The query returns the AuthorizationEvent and then its AuthorizationRevocation subtype through the revocation differentia.
        ja: 照会は AuthorizationEvent を返し、取消種差で AuthorizationRevocation 下位型を返します。

        en: The occurrence satisfies the genus identity and the subtype-specific condition of ending future grant validity.
        ja: 発生は上位同一性と付与将来有効性終了という下位型固有条件を満たします。
      source_claims:
