schema: moonweave.ai/ontology-node/v1
id: AuthorizationRevocation
kind: concept
status: review
labels:
  zh: 授权撤销事件
  en: authorization revocation event
  ja: 認可取消イベント
semantics:
  short_definition:
    zh: 有权主体在明确时刻终止一个既有 AuthorizationGrant 未来有效性的事件。
    en: An event in which an authorized principal terminates the future validity of one existing AuthorizationGrant at a stated instant.
    ja: 権限主体が明示時刻に一つの既存 AuthorizationGrant の将来有効性を終了するイベントです。
  definition:
    zh: 授权撤销是一种 AuthorizationEvent，继承 event_id 作为唯一事件身份，并以被撤销 grant、撤销者、撤销时间、权限依据和理由构成撤销种差。它使 grant 自 revoked_at 起不能再授权新动作，但保留历史证据；撤销不是 DenyDecision，也不删除主体或范围。
    en: An AuthorizationRevocation is an AuthorizationEvent and inherits event_id as its sole event identity. The revoked grant, revoker, revocation time, authority basis, and reason form its revocation differentia. It prevents new authorization from revoked_at onward while retaining historical evidence; revocation is not a DenyDecision and deletes neither principal nor scope.
    ja: AuthorizationRevocation は AuthorizationEvent の一種で、唯一のイベント同一性として event_id を継承します。対象 grant、取消者、取消時刻、権限根拠、理由が取消の種差です。revoked_at 以後の新規認可を止めつつ履歴証拠を保ち、DenyDecision ではなく主体や範囲を削除しません。
  why_needed:
    zh: 独立撤销事件提供时间有向的生命周期事实，使历史审计与未来无效性可以同时成立。
    en: A distinct revocation event provides a time-directed lifecycle fact so historical auditability and future invalidity can coexist.
    ja: 独立取消イベントは時間方向のライフサイクル事実を示し、歴史監査性と将来無効性を両立します。
  includes:
    - zh: 包含撤销标识、grant 引用、撤销者、撤销时间、权限依据和原因。
      en: Includes revocation identity, grant reference, revoker, revocation time, authority basis, and reason.
      ja: 取消識別子、grant 参照、取消者、取消時刻、権限根拠、理由を含みます。
  excludes:
    - zh: 不包含 grant 本体、历史访问删除、策略拒绝决定、认证注销或工具失败。
      en: Excludes the grant itself, deletion of historical access, policy denial, authentication logout, or tool failure.
      ja: grant 自体、歴史アクセス削除、方針拒否、認証ログアウト、ツール失敗を含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: grant_ref
      labels:
        zh: 被撤销授予引用
        en: revoked grant reference
        ja: 取消対象付与参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 未来有效性被终止的 AuthorizationGrant。
        en: AuthorizationGrant whose future validity is terminated.
        ja: 将来有効性を終了する AuthorizationGrant です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-authorization-revocation-001
        - claim-authorization-revocation-002
    - id: revoker_ref
      labels:
        zh: 撤销者引用
        en: revoker reference
        ja: 取消者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有权撤销该 grant 的主体。
        en: Principal authorized to revoke the grant.
        ja: grant を取り消す権限主体です。
      allowed_values: []
      pattern: null
      example_value: authorization-service
      source_claims:
        - claim-authorization-revocation-001
        - claim-authorization-revocation-002
    - id: revoked_at
      labels:
        zh: 撤销时间
        en: revoked at
        ja: 取消時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: grant 停止授权新动作的 UTC 时刻。
        en: UTC instant when the grant stops authorizing new actions.
        ja: grant が新操作を認可しなくなる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:23:00Z
      source_claims:
        - claim-authorization-revocation-001
        - claim-authorization-revocation-002
    - id: reason
      labels:
        zh: 撤销原因
        en: revocation reason
        ja: 取消理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释为何提前终止授权。
        en: Explains why authority was terminated early.
        ja: 権限を早期終了する理由です。
      allowed_values: []
      pattern: null
      example_value: user cancelled operation
      source_claims:
        - claim-authorization-revocation-001
        - claim-authorization-revocation-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuthorizationRevocation-example-positive-manual-001
    kind: positive
    labels:
      zh: 授权撤销事件正例
      en: Positive authorization revocation event case
      ja: 認可取消イベントの正例
    scenario_id: null
    descriptions:
      zh: authorization-service 在 01:23 因用户取消撤销 grant-42；01:22 的已完成读取仍可审计，01:23 之后的新调用不再被授权。
      en: authorization-service revokes grant-42 at 01:23 because the user cancelled; a read completed at 01:22 remains auditable, while new calls after 01:23 are unauthorized.
      ja: authorization-service はユーザー取消により 01:23 に grant-42 を取り消し、01:22 完了読取は監査可能なまま、01:23 後の新呼出は未認可です。
    field_values:
      event_id: revocation-42
      event_kind: authorization-revocation
      occurred_at: 2026-07-16T01:23:00Z
      actor_ref: authorization-service
      authorization_object_ref: grant-42
      grant_ref: grant-42
      revoker_ref: authorization-service
      revoked_at: 2026-07-16T01:23:00Z
      authority_basis: grant-issuer-policy@2
      reason: user cancelled operation
    related_node_ids:
      - AuthorizationRevocation
      - AuthorizationGrant
    related_relation_ids:
      - AuthorizationRevocation-revokes-AuthorizationGrant
    expected_result:
      zh: 有效性查询按动作时间判断，历史记录不被删除而未来使用被拒绝。
      en: Validity is decided by action time; historical records remain while future use is rejected.
      ja: 有効性は操作時刻で判断され、歴史記録を保持し将来使用を拒否します。
    why_valid_or_invalid:
      zh: 事件明确了目标、撤销者、权限依据和生效时刻。
      en: The event explicitly identifies target, revoker, authority basis, and effective instant.
      ja: イベントは対象、取消者、権限根拠、発効時刻を明示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-authorization-revocation-001
      - claim-authorization-revocation-002
  - id: AuthorizationRevocation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 授权撤销事件边界反例
      en: Boundary counterexample for authorization revocation event
      ja: 認可取消イベントの境界反例
    scenario_id: null
    descriptions:
      zh: grant-42 在 01:25 自然到期属于有效期判断，没有撤销者或撤销事件，因此不创建 AuthorizationRevocation。
      en: grant-42 naturally expires at 01:25 through its validity interval; with no revoker or revocation occurrence, no AuthorizationRevocation is created.
      ja: grant-42 が 01:25 に自然失効するのは有効期間判定で、取消者や取消発生がないため AuthorizationRevocation を作りません。
    field_values: {}
    related_node_ids:
      - AuthorizationRevocation
      - AuthorizationGrant
    related_relation_ids:
      - AuthorizationRevocation-revokes-AuthorizationGrant
    expected_result:
      zh: grant 状态变为 expired 而非 revoked，事件查询为空。
      en: Grant status becomes expired rather than revoked, and the event query is empty.
      ja: grant 状態は revoked ではなく expired となり、イベント照会は空です。
    why_valid_or_invalid:
      zh: 到期是授予字段决定的时间状态，撤销是有行动者和权限依据的事件。
      en: Expiry is a temporal state from grant fields; revocation is an actor- and authority-backed event.
      ja: 期限切れは付与項目による時間状態、取消は行為者と権限根拠を持つイベントです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-authorization-revocation-001
      - claim-authorization-revocation-002
