sibling_differentiation:
  - sibling_concept_id: HumanApproval
    shared_parent_concept_id: AuthorizationEvent
    differentia:
      zh: AuthorizationRevocation 终止既有授予的未来有效性；HumanApproval 肯定一个尚待评估的请求。两者都是有行动者和时间的授权事件，但对象与业务效果相反。
      en: AuthorizationRevocation terminates the future validity of an existing grant; HumanApproval affirms a request still awaiting evaluation. Both are actor- and time-bound authorization events, but their objects and effects differ.
      ja: AuthorizationRevocation は既存付与の将来有効性を終了し、HumanApproval は評価待ち要求を肯定します。両者は行為者・時刻付き認可イベントですが対象と効果が異なります。
    source_claims:
      - claim-authorization-revocation-001
      - claim-authorization-revocation-003
parent_relation:
  id: AuthorizationRevocation-is_a-AuthorizationEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种授权事件
    en: is an authorization event
    ja: 認可イベントの一種である
  definitions:
    zh: AuthorizationRevocation 是 AuthorizationEvent 的子类：它继承事件行动者、时间、对象和权限依据，并以终止一个既有 AuthorizationGrant 的未来有效性作为种差。
    en: AuthorizationRevocation is a subtype of AuthorizationEvent. It inherits actor, time, object, and authority-basis identity and is distinguished by terminating the future validity of one existing AuthorizationGrant.
    ja: AuthorizationRevocation は AuthorizationEvent の下位型です。行為者・時刻・対象・権限根拠を継承し、一つの既存 AuthorizationGrant の将来有効性を終了する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
