    labels:
      zh: 授权撤销事件 - Cedar 授权评估
      en: authorization revocation event - Cedar authorization evaluation
      ja: 認可取消イベント - Cedar 認可評価
    descriptions: {zh: "授权撤销事件(AuthorizationRevocation) [AuthorizationRevocation]: 有权主体在明确时刻终止一个既有 AuthorizationGrant 未来有效性的事件。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: revoked_at, revoker_ref, reason.", en: "authorization revocation event (AuthorizationRevocation) [AuthorizationRevocation]: An event in which an authorized principal terminates the future validity of one existing AuthorizationGrant at a stated instant.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include revoked_at, revoker_ref, reason.", ja: "認可取消イベント(AuthorizationRevocation) [AuthorizationRevocation]: 権限主体が明示時刻に一つの既存 AuthorizationGrant の将来有効性を終了するイベントです。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: revoked_at, revoker_ref, reason."}
    field_values:
      grant_ref: grant-42
      reason: "user cancelled operation"
      revoked_at: "2026-07-16T01:23:00Z"
      revoker_ref: authorization-service
    related_node_ids:
