    - id: AuthorizationRevocation-is_a-AuthorizationEvent-example-boundary-manual-001
      labels:
        zh: 是一种授权事件边界反例
        en: Boundary counterexample for is an authorization event
        ja: 認可イベントの一種であるの境界反例
      descriptions:
        zh: grant-42 到期但没有行动者和撤销发生；时间状态变化不是 AuthorizationRevocation。
        en: grant-42 expires with no actor or revocation occurrence; a temporal state transition alone is not an AuthorizationRevocation.
        ja: grant-42 が行為者・取消発生なしで期限切れになる時間状態変化だけでは AuthorizationRevocation ではありません。
      field_values: {}
      related_node_ids:
