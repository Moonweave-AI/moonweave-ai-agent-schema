      - claim-authorization-revocation-002
    example_source: Amazon Cedar
    source_claims:
      - claim-authorization-revocation-001
  - id: authorization-revocation-opa
    labels:
      zh: 授权撤销事件 - OPA Rego 策略评估
      en: authorization revocation event - OPA Rego policy evaluation
      ja: 認可取消イベント - OPA Rego ポリシー評価
    descriptions: {zh: "授权撤销事件(AuthorizationRevocation) [AuthorizationRevocation]: 有权主体在明确时刻终止一个既有 AuthorizationGrant 未来有效性的事件。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: revoked_at, revoker_ref, reason.", en: "authorization revocation event (AuthorizationRevocation) [AuthorizationRevocation]: An event in which an authorized principal terminates the future validity of one existing AuthorizationGrant at a stated instant.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include revoked_at, revoker_ref, reason.", ja: "認可取消イベント(AuthorizationRevocation) [AuthorizationRevocation]: 権限主体が明示時刻に一つの既存 AuthorizationGrant の将来有効性を終了するイベントです。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: revoked_at, revoker_ref, reason."}
    field_values:
