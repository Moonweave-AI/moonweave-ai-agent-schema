      labels:
        zh: 是一种授权事件正例
        en: Positive is an authorization event case
        ja: 認可イベントの一種であるの正例
      descriptions:
        zh: revocation-42 具有授权事件共同身份，并以 revoked grant、revoker 和 revoked_at 证明它是撤销子类。
        en: revocation-42 has the shared authorization-event identity and proves revocation subtype membership through the revoked grant, revoker, and revoked_at.
        ja: revocation-42 は共通認可イベント同一性を持ち、対象 grant・取消者・revoked_at により取消下位型所属を証明します。
      field_values: {}
      related_node_ids:
