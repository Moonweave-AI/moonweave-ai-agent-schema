schema: moonweave.ai/ontology-node/v1
id: AuthorizationRevocation
kind: concept
labels:
  zh: 授权撤销事件
  en: authorization revocation event
  ja: 認可取消イベント
semantics:
  short_definition:
    zh: 有权主体在明确时刻终止既有 AuthorizationGrant 未来有效性的撤销事件。
    en: A revocation event where an authorized principal terminates future validity of one AuthorizationGrant at a stated instant.
    ja: 権限主体が明示時刻に既存 AuthorizationGrant の将来有効性を終了する取消イベント。
  definition:
    zh: AuthorizationRevocation 继承 AuthorizationEvent，以 grant_ref、revoker_ref、revoked_at 与 reason 为种差。它映射 RFC 7009 OAuth token revocation、MCP authorization server 主动 invalidation、Claude session 权限撤销与用户取消操作；使 grant 自 revoked_at 起不能授权新动作，但保留历史审计。自然到期不是撤销。
    en: AuthorizationRevocation inherits AuthorizationEvent and is distinguished by grant_ref, revoker_ref, revoked_at, and reason. It maps RFC 7009 OAuth token revocation, MCP authorization-server invalidation, Claude session permission revocation, and user cancellation; it stops new authorization from revoked_at while preserving audit history. Natural expiry is not revocation.
    ja: AuthorizationRevocation は AuthorizationEvent を継承し grant_ref/revoker_ref/revoked_at/reason が種差。RFC 7009 OAuth revocation、MCP authorization server invalidation、Claude session 取消、ユーザー取消を写像。revoked_at 以降新規認可停止、履歴監査保持。自然失効は取消ではない。
  why_needed:
    zh: OAuth 与 MCP 都允许主动 invalidation；没有撤销事件无法区分 expired 与 revoked。
    en: OAuth and MCP allow active invalidation; without revocation events expired and revoked cannot be distinguished.
    ja: OAuth/MCP は能動 invalidation を許すため、取消イベントなしでは expired/revoked を区別できません。
  includes:
    - zh: 包含撤销标识、grant 引用、撤销者、撤销时间、权限依据和原因。
      en: Includes revocation identity, grant reference, revoker, revocation time, authority basis, and reason.
      ja: 取消識別子、grant 参照、取消者、取消時刻、権限根拠、理由を含みます。
  excludes:
    - zh: 不包含 grant 本体、历史访问删除、策略拒绝决定、认证注销或工具失败。
      en: Excludes the grant itself, deletion of historical access, policy denial, authentication logout, or tool failure.
      ja: grant 自体、歴史アクセス削除、方針拒否、認証ログアウト、ツール失敗を含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成 RFC 7009 POST /revoke、MCP token introspection invalid 响应与 Claude 用户撤销 session 权限时创建 AuthorizationRevocation；validity 查询按动作时间与 revoked_at 比较；历史已执行动作仍可审计。
    en: On RFC 7009 POST /revoke, MCP token introspection invalid responses, or Claude user session-permission revocation, create AuthorizationRevocation; validity queries compare action time to revoked_at; historically executed actions remain auditable.
    ja: RFC 7009 POST /revoke、MCP introspection invalid、Claude session 取消で AuthorizationRevocation 作成。validity は action time と revoked_at 比較。歴史実行は監査可能。
  typical_input:
    - description: OAuth token revocation.
      format: POST /revoke token=grant-42; reason=user_cancelled
      source_claims:
        - claim-authorization-revocation-design
    - description: MCP server invalidates related credentials.
      format: introspection active=false; grant_ref=grant-mcp-9
      source_claims:
        - claim-authorization-revocation-design
  typical_output:
    - description: Revocation terminates future grant use.
      format: '{"event_id":"revocation-42","grant_ref":"grant-42","revoked_at":"2026-07-16T01:23:00Z"}'
      source_claims:
        - claim-authorization-revocation-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys: []
  fields:
    - id: grant_ref
      labels:
        zh: 被撤销授予引用
        en: revoked grant reference
        ja: 取消対象付与参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 未来有效性被终止的 AuthorizationGrant。
        en: AuthorizationGrant whose future validity is terminated.
        ja: 将来有効性を終了する AuthorizationGrant です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-authorization-revocation-design
        - claim-authorization-revocation-design
    - id: revoker_ref
      labels:
        zh: 撤销者引用
        en: revoker reference
        ja: 取消者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有权撤销该 grant 的主体。
        en: Principal authorized to revoke the grant.
        ja: grant を取り消す権限主体です。
      allowed_values: []
      pattern: null
      example_value: authorization-service
      source_claims:
        - claim-authorization-revocation-design
        - claim-authorization-revocation-design
    - id: revoked_at
      labels:
        zh: 撤销时间
        en: revoked at
        ja: 取消時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: grant 停止授权新动作的 UTC 时刻。
        en: UTC instant when the grant stops authorizing new actions.
        ja: grant が新操作を認可しなくなる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:23:00Z
      source_claims:
        - claim-authorization-revocation-design
        - claim-authorization-revocation-design
    - id: reason
      labels:
        zh: 撤销原因
        en: revocation reason
        ja: 取消理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释为何提前终止授权。
        en: Explains why authority was terminated early.
        ja: 権限を早期終了する理由です。
      allowed_values: []
      pattern: null
      example_value: user cancelled operation
      source_claims:
        - claim-authorization-revocation-design
        - claim-authorization-revocation-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuthorizationRevocation-oauth-revoke
    labels:
      zh: OAuth token 撤销
      en: OAuth token revocation
      ja: OAuth token 取消
    descriptions:
      zh: authorization-service 依据 RFC 7009 在 01:23 撤销 grant-42；01:22 已完成读取仍可审计。
      en: authorization-service revokes grant-42 at 01:23 under RFC 7009; read completed at 01:22 remains auditable.
      ja: RFC 7009 で 01:23 に grant-42 取消。01:22 読取は監査可能。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: RFC 7009
    field_values:
      event_id: revocation-42
      grant_ref: grant-42
      revoked_at: 2026-07-16T01:23:00Z
      reason: user cancelled operation
    related_node_ids:
      - AuthorizationRevocation
      - AuthorizationGrant
    related_relation_ids:
      - AuthorizationRevocation-revokes-AuthorizationGrant
    source_claims:
      - claim-authorization-revocation-design
  - id: AuthorizationRevocation-mcp-invalidation
    labels:
      zh: MCP 凭证失效
      en: MCP credential invalidation
      ja: MCP 資格失効
    descriptions:
      zh: MCP authorization server 使相关 refresh token 失效；revocation-mcp-9 终止 grant-mcp-9。
      en: MCP authorization server invalidates related refresh token; revocation-mcp-9 terminates grant-mcp-9.
      ja: MCP authorization server が refresh token 失効。revocation-mcp-9 が grant-mcp-9 終了。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: credential invalidation
    field_values:
      event_id: revocation-mcp-9
      grant_ref: grant-mcp-9
    related_node_ids:
      - AuthorizationRevocation
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-authorization-revocation-design
  - id: AuthorizationRevocation-claude-session
    labels:
      zh: Claude 会话权限撤销
      en: Claude session permission revocation
      ja: Claude session 権限取消
    descriptions:
      zh: 用户撤销 Claude allowForSession；revocation-claude-61 使 session grant 自撤销时刻起无效。
      en: User revokes Claude allowForSession; revocation-claude-61 invalidates session grant from revocation instant.
      ja: ユーザーが Claude allowForSession 取消。revocation-claude-61 が session grant を無効化。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: session revoke
    field_values:
      event_id: revocation-claude-61
      grant_ref: grant-claude-session-61
    related_node_ids:
      - AuthorizationRevocation
    related_relation_ids: []
    source_claims:
      - claim-authorization-revocation-design
  - id: AuthorizationRevocation-boundary-expiry
    labels:
      zh: 自然到期不是撤销
      en: Natural expiry is not revocation
      ja: 自然失効は取消ではない
    descriptions:
      zh: grant-42 在 01:25 自然到期无撤销者，不创建 AuthorizationRevocation。
      en: grant-42 naturally expires at 01:25 with no revoker; no AuthorizationRevocation is created.
      ja: grant-42 が 01:25 自然失効、取消者なし。AuthorizationRevocation 不作成。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: expired versus revoked
    field_values: {}
    related_node_ids:
      - AuthorizationRevocation
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-authorization-revocation-design
parent_relation:
  id: AuthorizationRevocation-is_a-AuthorizationEvent
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种授权事件
    en: is an authorization event
    ja: 認可イベントの一種である
  definitions:
    zh: AuthorizationRevocation 是 AuthorizationEvent 的子类：它继承事件行动者、时间、对象和权限依据，并以终止一个既有 AuthorizationGrant 的未来有效性作为种差。
    en: AuthorizationRevocation is a subtype of AuthorizationEvent. It inherits actor, time, object, and authority-basis identity and is distinguished by terminating the future validity of one existing AuthorizationGrant.
    ja: AuthorizationRevocation は AuthorizationEvent の下位型です。行為者・時刻・対象・権限根拠を継承し、一つの既存 AuthorizationGrant の将来有効性を終了する種差を持ちます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有撤销事件子类
      en: has revocation-event subtype
      ja: 取消イベント下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-authorization-revocation-design
    - claim-authorization-revocation-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: AuthorizationRevocation-revokes-AuthorizationGrant
    predicate: revokes
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 撤销授权授予
      en: revokes authorization grant
      ja: 認可付与を取り消す
    definitions:
      zh: AuthorizationRevocation 从 revoked_at 起终止指定 AuthorizationGrant 授权新动作的能力，同时保留撤销前历史和原决定。
      en: An AuthorizationRevocation terminates the named AuthorizationGrant's ability to authorize new actions from revoked_at onward while preserving pre-revocation history and the original decision.
      ja: AuthorizationRevocation は revoked_at 以後に指定 AuthorizationGrant の新操作認可能力を終了し、取消前履歴と元判断を保ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: revoked_by
      labels:
        zh: 被撤销事件终止
        en: is revoked by
        ja: 取消イベントに取り消される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-authorization-revocation-design
      - claim-authorization-revocation-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AuthorizationGrant
