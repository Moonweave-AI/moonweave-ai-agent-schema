    descriptions: {zh: "授权撤销事件(AuthorizationRevocation) [AuthorizationRevocation]: 有权主体在明确时刻终止一个既有 AuthorizationGrant 未来有效性的事件。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: revoked_at, revoker_ref, reason.", en: "authorization revocation event (AuthorizationRevocation) [AuthorizationRevocation]: An event in which an authorized principal terminates the future validity of one existing AuthorizationGrant at a stated instant.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include revoked_at, revoker_ref, reason.", ja: "認可取消イベント(AuthorizationRevocation) [AuthorizationRevocation]: 権限主体が明示時刻に一つの既存 AuthorizationGrant の将来有効性を終了するイベントです。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: revoked_at, revoker_ref, reason."}
