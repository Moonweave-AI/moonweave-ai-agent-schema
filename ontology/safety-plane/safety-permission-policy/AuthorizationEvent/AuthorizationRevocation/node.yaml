    ja: 認可イベントの一種である
  definitions:
    zh: AuthorizationRevocation 是 AuthorizationEvent 的子类：它继承事件行动者、时间、对象和权限依据，并以终止一个既有 AuthorizationGrant 的未来有效性作为种差。
    en: AuthorizationRevocation is a subtype of AuthorizationEvent. It inherits actor, time, object, and authority-basis identity and is distinguished by terminating the future validity of one existing AuthorizationGrant.
    ja: AuthorizationRevocation は AuthorizationEvent の下位型です。行為者・時刻・対象・権限根拠を継承し、一つの既存 AuthorizationGrant の将来有効性を終了する種差を持ちます。
