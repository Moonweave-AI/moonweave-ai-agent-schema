    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-authorization-event-design
    source: safety-permission-design
    supports: AuthorizationEvent separates occurred authorization state changes from evaluation activities and UI messages.
    locator: AuthorizationEvent genus
    evidence_kind: design-inference
    confidence: high
  - id: claim-authorization-event-design
    source: mcp-authorization-2025
    supports: MCP OAuth consent completion is an AuthorizationEvent with actor and scope object.
    locator: OAuth consent flow
    evidence_kind: design-inference
    confidence: high
  - id: claim-authorization-event-design
    source: cursor-terminal-sandbox
    supports: Cursor Allow/Run clicks produce AuthorizationEvent evidence bound to tool requests.
    locator: Tool approval dialog
    evidence_kind: design-inference
    confidence: high
  - id: claim-authorization-event-design
    source: mcp-authorization-2025
    supports: OAuth token revocation maps to AuthorizationRevocation subtype events.
    locator: Token invalidation
    evidence_kind: design-inference
    confidence: high
