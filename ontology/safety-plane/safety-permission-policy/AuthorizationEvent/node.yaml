source_claims:
  - id: claim-authorization-event-001
    source: eng-fw-langgraph-interrupts
    supports: LangGraph interrupts persist execution state, expose a payload to an external reviewer, and resume with an explicit Command value rather than implying approval from a pause.
    locator: LangGraph documentation > Interrupts > pause using interrupt and resume using Command with persisted state
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-authorization-event-002
    source: eng-proto-oauth-rfc7009
    supports: RFC 7009 specifies an explicit revocation request and permits invalidation of related authorization credentials while requiring clients to tolerate unexpected invalidation.
    locator: "RFC 7009, Sections 2.1-2.3: token revocation request, response, and authorization-server invalidation behavior"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-authorization-event-003
    source: eng-policy-aws-verified-permissions
    supports: Verified Permissions defines an authorization request over principal, action, resource, and context, and a response containing allow or deny plus determining-policy identifiers.
    locator: Amazon Verified Permissions User Guide > Terms and concepts > authorization request, authorization response, determining policies, and enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
