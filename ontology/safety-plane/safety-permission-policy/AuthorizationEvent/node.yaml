schema: moonweave.ai/ontology-node/v1
id: AuthorizationEvent
kind: concept
labels:
  zh: 授权生命周期事件
  en: authorization lifecycle event
  ja: 認可ライフサイクルイベント
semantics:
  short_definition:
    zh: 一次可审计的授权域状态变化事件，含行动者、时刻与受影响对象。
    en: One auditable authorization-domain state-change event with actor, instant, and affected object.
    ja: 行為者・時刻・影響対象を持つ一回の監査可能な認可 domain 状態変化イベント。
  definition:
    zh: AuthorizationEvent 是 HumanApproval 与 AuthorizationRevocation 的上位概念：以 event_id、event_kind、occurred_at、actor_ref、authorization_object_ref 与 authority_basis 记录已经发生的授权状态变化。MCP OAuth consent 完成、RFC 7009 token revocation、Cursor 用户点击 Allow 后产生的批准事实、Claude Code allowForSession 会话级授权事件，都应投影为此 genus 而非 PolicyEvaluation 或 PermissionPrompt。它不包含长期 grant、策略规范或 UI 消息本体。
    en: "AuthorizationEvent is the genus of HumanApproval and AuthorizationRevocation: it records an occurred authorization state change with event_id, event_kind, occurred_at, actor_ref, authorization_object_ref, and authority_basis. MCP OAuth consent completion, RFC 7009 token revocation, Cursor user Allow clicks, and Claude Code allowForSession session events should project here rather than as PolicyEvaluation or PermissionPrompt. It excludes standing grants, policy specifications, and UI message bodies."
    ja: AuthorizationEvent は HumanApproval/AuthorizationRevocation の上位概念で、event_id/event_kind/occurred_at/actor_ref/authorization_object_ref/authority_basis で発生済み認可状態変化を記録します。MCP OAuth consent、RFC 7009 token revocation、Cursor Allow クリック、Claude allowForSession は PolicyEvaluation/PermissionPrompt ではなくここへ投影します。standing grant/policy specification/UI message body は含みません。
  why_needed:
    zh: 批准与撤销都需要同一套事件身份规则；缺少上位概念会把 OAuth consent 与策略评估混为同一记录。
    en: Approval and revocation share event identity rules; without this genus OAuth consent and policy evaluation merge into one record.
    ja: 承認/取消は同一 event identity rule を共有し、上位概念がないと OAuth consent と policy evaluation が一記録に混ざります。
  includes:
    - zh: 包含事件标识、事件种类、发生时间、行动者、受影响授权对象和权限依据。
      en: Includes event identity, event kind, occurrence time, actor, affected authorization object, and authority basis.
      ja: イベント識別子、種別、発生時刻、行為者、影響対象、権限根拠を含みます。
  excludes:
    - zh: 不包含提示或响应消息、策略评估运行、策略决定、授权授予本体或一般审计日志。
      en: Excludes prompt or response messages, a policy-evaluation run, policy decision, the grant itself, or a generic audit log.
      ja: 提示・応答メッセージ、方針評価実行、方針判断、付与自体、一般監査ログを含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 把 MCP authorization server 回调、OAuth token revocation webhook、Cursor/Claude 人工 Allow 点击与 LangGraph Command resume 映射为 AuthorizationEvent；保留 event_id 与 authority_basis 供 PolicyEvaluation 引用，但不把 interrupt 暂停本身当作批准。
    en: Map MCP authorization-server callbacks, OAuth token-revocation webhooks, Cursor/Claude Allow clicks, and LangGraph Command resume to AuthorizationEvent; retain event_id and authority_basis for PolicyEvaluation citation without treating interrupt pause as approval.
    ja: MCP authorization server callback、OAuth revocation webhook、Cursor/Claude Allow クリック、LangGraph Command resume を AuthorizationEvent に写像。interrupt pause 自体を approval としない。
  typical_input:
    - description: MCP OAuth consent completed.
      format: authorization_code exchanged; actor=human:user-7; object=request-mcp-42
      source_claims:
        - claim-authorization-event-design
    - description: OAuth token revocation (RFC 7009).
      format: POST /revoke token=...; actor=authorization-service
      source_claims:
        - claim-authorization-event-design
  typical_output:
    - description: Moonweave AuthorizationEvent record.
      format: '{"event_id":"authorization-event-42","event_kind":"human_approval","occurred_at":"2026-07-16T01:21:00Z"}'
      source_claims:
        - claim-authorization-event-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - event_id
  fields:
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベントID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次已经发生的授权状态变化。
        en: Stable identifier for one occurred authorization-state change.
        ja: 一回の発生済み認可状態変化を安定識別します。
      allowed_values: []
      pattern: null
      example_value: authorization-event-42
      source_claims:
        - claim-authorization-event-design
        - claim-authorization-event-design
        - claim-authorization-event-design
    - id: event_kind
      labels:
        zh: 事件种类
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 受控值用于区分批准、撤销等授权事件子类。
        en: Controlled value distinguishing approval, revocation, and other reviewed authorization-event subtypes.
        ja: 承認・取消等の審査済み認可イベント下位型を区別する制御値です。
      allowed_values: []
      pattern: null
      example_value: human_approval
      source_claims:
        - claim-authorization-event-design
        - claim-authorization-event-design
        - claim-authorization-event-design
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 事件取得业务效果的 UTC 时刻。
        en: UTC instant when the event acquired its business effect.
        ja: イベントが業務効果を得た UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:00Z
      source_claims:
        - claim-authorization-event-design
        - claim-authorization-event-design
        - claim-authorization-event-design
    - id: actor_ref
      labels:
        zh: 行动者引用
        en: actor reference
        ja: 行為者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实施该状态变化且其资格可被验证的主体。
        en: Principal whose eligibility to enact the state change can be verified.
        ja: 状態変化を行い資格を検証できる主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-authorization-event-design
        - claim-authorization-event-design
        - claim-authorization-event-design
    - id: authorization_object_ref
      labels:
        zh: 授权对象引用
        en: authorization object reference
        ja: 認可対象参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被批准的请求或被撤销的授予等直接受影响对象。
        en: Directly affected object such as an approved request or revoked grant.
        ja: 承認要求または取消付与など直接影響対象です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-authorization-event-design
        - claim-authorization-event-design
        - claim-authorization-event-design
    - id: authority_basis
      labels:
        zh: 权限依据
        en: authority basis
        ja: 権限根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证明行动者有权产生该事件业务效果的依据。
        en: Basis proving the actor may create the event's business effect.
        ja: 行為者がイベント効果を生じさせる権限根拠です。
      allowed_values: []
      pattern: null
      example_value: project-owner-policy@3
      source_claims:
        - claim-authorization-event-design
        - claim-authorization-event-design
        - claim-authorization-event-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuthorizationEvent-mcp-oauth-consent
    labels:
      zh: MCP OAuth 同意事件
      en: MCP OAuth consent event
      ja: MCP OAuth consent イベント
    descriptions:
      zh: 用户在 MCP OAuth consent 页点击 Allow 后 authorization-event-mcp-42 记录 human:user-7 与 scope tools:read tools:call。
      en: After Allow on MCP OAuth consent, authorization-event-mcp-42 records human:user-7 and scopes tools:read tools:call.
      ja: MCP OAuth consent で Allow 後 authorization-event-mcp-42 が human:user-7 と tools:read tools:call を記録。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: OAuth 2.1 consent
    field_values:
      event_id: authorization-event-mcp-42
      event_kind: human_approval
      actor_ref: human:user-7
      authorization_object_ref: request-mcp-42
    related_node_ids:
      - AuthorizationEvent
      - HumanApproval
    related_relation_ids: []
    source_claims:
      - claim-authorization-event-design
  - id: AuthorizationEvent-cursor-allow-click
    labels:
      zh: Cursor Allow 点击事件
      en: Cursor Allow click event
      ja: Cursor Allow クリックイベント
    descriptions:
      zh: 用户在 Cursor "Cursor wants to run npm test" 对话框点击 Run 后记录 authorization-event-55。
      en: User clicking Run on Cursor "Cursor wants to run npm test" records authorization-event-55.
      ja: Cursor wants to run npm test で Run クリック後 authorization-event-55 を記録。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: tool approval dialog
    field_values:
      event_id: authorization-event-55
      event_kind: human_approval
      actor_ref: human:owner-7
    related_node_ids:
      - AuthorizationEvent
      - HumanApproval
      - PermissionPrompt
    related_relation_ids: []
    source_claims:
      - claim-authorization-event-design
  - id: AuthorizationEvent-oauth-revoke
    labels:
      zh: OAuth 撤销事件
      en: OAuth revocation event
      ja: OAuth 取消イベント
    descriptions:
      zh: authorization-service 依据 RFC 7009 撤销 access token 时 authorization-event-rev-9 终止 grant-mcp-9 未来有效性。
      en: authorization-service revoking an access token under RFC 7009 creates authorization-event-rev-9 terminating grant-mcp-9 future validity.
      ja: RFC 7009 で access token 取消時 authorization-event-rev-9 が grant-mcp-9 将来有効性を終了。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: token revocation
    field_values:
      event_id: authorization-event-rev-9
      event_kind: authorization_revocation
      actor_ref: authorization-service
    related_node_ids:
      - AuthorizationEvent
      - AuthorizationRevocation
    related_relation_ids: []
    source_claims:
      - claim-authorization-event-design
  - id: AuthorizationEvent-boundary-evaluation
    labels:
      zh: 评估不是授权事件
      en: Evaluation is not authorization event
      ja: evaluation は認可イベントではない
    descriptions:
      zh: PolicyEvaluation evaluation-42 读取 request-42 但不改变 grant 状态，因此不是 AuthorizationEvent。
      en: PolicyEvaluation evaluation-42 reads request-42 without changing grant state, so it is not an AuthorizationEvent.
      ja: PolicyEvaluation evaluation-42 は request-42 を読むだけで grant 状態を変えないため AuthorizationEvent ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: activity versus event
    field_values: {}
    related_node_ids:
      - AuthorizationEvent
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-authorization-event-design
parent_relation: null
relations: []
