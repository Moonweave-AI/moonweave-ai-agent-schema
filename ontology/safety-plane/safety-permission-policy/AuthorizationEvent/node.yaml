schema: moonweave.ai/ontology-node/v1
id: AuthorizationEvent
kind: concept
status: accepted
labels:
  zh: 授权生命周期事件
  en: authorization lifecycle event
  ja: 認可ライフサイクルイベント
semantics:
  short_definition:
    zh: 在明确时刻由可识别行动者改变某个授权请求或授予状态的事件上位概念。
    en: The event genus for an identified actor changing the state of an authorization request or grant at a stated instant.
    ja: 識別可能な行為者が明示時刻に認可要求または付与の状態を変えるイベント上位概念です。
  definition:
    zh: 授权生命周期事件是 HumanApproval 与 AuthorizationRevocation 的共同上位概念。每个事件具有稳定 event_id、事件种类、发生时间、行动者和被影响的授权对象；它只记录已经发生的授权领域状态变化，不表示长期权限、策略规范、用户界面消息或策略评估活动。
    en: AuthorizationEvent is the shared genus of HumanApproval and AuthorizationRevocation. Each occurrence has a stable event_id, event kind, occurrence time, actor, and affected authorization object. It records an authorization-domain state change that actually occurred; it is not standing authority, a policy specification, a UI message, or a policy-evaluation activity.
    ja: AuthorizationEvent は HumanApproval と AuthorizationRevocation の共通上位概念です。各発生は安定 event_id、種別、発生時刻、行為者、影響対象を持ちます。実際に起きた認可領域の状態変化だけを記録し、継続権限、方針仕様、UI メッセージ、方針評価活動ではありません。
  why_needed:
    zh: 批准与撤销都是真实发生且需要行动者、时间和对象的授权事件；共享上位概念保留共同身份规则，同时让批准和撤销的相反业务效果留在各自子类。
    en: Approval and revocation are both authorization occurrences requiring an actor, time, and object. The shared genus preserves those identity invariants while leaving their opposite business effects in the concrete subtypes.
    ja: 承認と取消はいずれも行為者・時刻・対象を要する認可発生です。共通上位概念は同一性不変条件を保ち、反対の業務効果は各下位型に残します。
  includes:
    - zh: 包含事件标识、事件种类、发生时间、行动者、受影响授权对象和权限依据。
      en: Includes event identity, event kind, occurrence time, actor, affected authorization object, and authority basis.
      ja: イベント識別子、種別、発生時刻、行為者、影響対象、権限根拠を含みます。
  excludes:
    - zh: 不包含提示或响应消息、策略评估运行、策略决定、授权授予本体或一般审计日志。
      en: Excludes prompt or response messages, a policy-evaluation run, policy decision, the grant itself, or a generic audit log.
      ja: 提示・応答メッセージ、方針評価実行、方針判断、付与自体、一般監査ログを含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - event_id
  fields:
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベントID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次已经发生的授权状态变化。
        en: Stable identifier for one occurred authorization-state change.
        ja: 一回の発生済み認可状態変化を安定識別します。
      allowed_values: []
      pattern: null
      example_value: authorization-event-42
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: event_kind
      labels:
        zh: 事件种类
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 受控值用于区分批准、撤销等授权事件子类。
        en: Controlled value distinguishing approval, revocation, and other reviewed authorization-event subtypes.
        ja: 承認・取消等の審査済み認可イベント下位型を区別する制御値です。
      allowed_values: []
      pattern: null
      example_value: human_approval
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 事件取得业务效果的 UTC 时刻。
        en: UTC instant when the event acquired its business effect.
        ja: イベントが業務効果を得た UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:00Z
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: actor_ref
      labels:
        zh: 行动者引用
        en: actor reference
        ja: 行為者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实施该状态变化且其资格可被验证的主体。
        en: Principal whose eligibility to enact the state change can be verified.
        ja: 状態変化を行い資格を検証できる主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: authorization_object_ref
      labels:
        zh: 授权对象引用
        en: authorization object reference
        ja: 認可対象参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被批准的请求或被撤销的授予等直接受影响对象。
        en: Directly affected object such as an approved request or revoked grant.
        ja: 承認要求または取消付与など直接影響対象です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: authority_basis
      labels:
        zh: 权限依据
        en: authority basis
        ja: 権限根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证明行动者有权产生该事件业务效果的依据。
        en: Basis proving the actor may create the event's business effect.
        ja: 行為者がイベント効果を生じさせる権限根拠です。
      allowed_values: []
      pattern: null
      example_value: project-owner-policy@3
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuthorizationEvent-example-positive-manual-001
    kind: positive
    labels:
      zh: 授权生命周期事件正例
      en: Positive authorization lifecycle event case
      ja: 認可ライフサイクルイベントの正例
    scenario_id: null
    descriptions:
      zh: authorization-event-42 记录 human:owner-7 在 01:21 依据 project-owner-policy@3 批准 request-42；它满足共同事件身份，并由 HumanApproval 子类补充批准范围。
      en: authorization-event-42 records human:owner-7 approving request-42 at 01:21 under project-owner-policy@3. It satisfies the shared event identity, while the HumanApproval subtype supplies approval scope.
      ja: authorization-event-42 は human:owner-7 が 01:21 に project-owner-policy@3 に基づき request-42 を承認したことを記録し、共通イベント同一性を満たし HumanApproval 下位型が承認範囲を補います。
    field_values:
      event_id: authorization-event-42
      event_kind: human_approval
      occurred_at: 2026-07-16T01:21:00Z
      actor_ref: human:owner-7
      authorization_object_ref: request-42
      authority_basis: project-owner-policy@3
    related_node_ids:
      - AuthorizationEvent
      - HumanApproval
      - AuthorizationRequest
    related_relation_ids:
      - HumanApproval-is_a-AuthorizationEvent
      - HumanApproval-approves-AuthorizationRequest
    expected_result:
      zh: 查询可先按授权事件共同字段定位，再按 HumanApproval 读取批准专属事实。
      en: A query first locates the occurrence by shared authorization-event fields and then reads approval-specific facts from HumanApproval.
      ja: 照会は共通認可イベント項目で発生を特定し、HumanApproval から承認固有事実を読みます。
    why_valid_or_invalid:
      zh: 行动者、时间、对象和权限依据均明确，且批准效果由正确子类表达。
      en: Actor, time, object, and authority basis are explicit, with the approval effect expressed by the proper subtype.
      ja: 行為者、時刻、対象、権限根拠が明示され、承認効果は正しい下位型で表されます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-authorization-event-001
      - claim-authorization-event-002
      - claim-authorization-event-003
  - id: AuthorizationEvent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 授权生命周期事件边界反例
      en: Boundary counterexample for authorization lifecycle event
      ja: 認可ライフサイクルイベントの境界反例
    scenario_id: null
    descriptions:
      zh: 系统在 01:21 读取 request-42 并开始 PolicyEvaluation；这是一项评估活动，没有行动者改变请求或授予状态，因此不是 AuthorizationEvent。
      en: The system reads request-42 and starts a PolicyEvaluation at 01:21. That is an evaluation activity, with no actor changing request or grant state, so it is not an AuthorizationEvent.
      ja: システムが 01:21 に request-42 を読み PolicyEvaluation を開始しても、要求・付与状態を変える行為者がない評価活動であり AuthorizationEvent ではありません。
    field_values: {}
    related_node_ids:
      - AuthorizationEvent
      - PolicyEvaluation
      - AuthorizationRequest
      - PolicySpecification
    related_relation_ids:
      - PolicyEvaluation-consumes-AuthorizationRequest
    expected_result:
      zh: 该记录只进入评估活动链，不被分类为授权生命周期事件。
      en: The record enters only the evaluation-activity chain and is not classified as an authorization lifecycle event.
      ja: 記録は評価活動連鎖だけに入り、認可ライフサイクルイベントへ分類されません。
    why_valid_or_invalid:
      zh: 读取输入与产生授权状态变化回答不同问题。
      en: Reading an input and causing an authorization-state change answer different questions.
      ja: 入力読取と認可状態変化の発生は別の問いに答えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-authorization-event-001
      - claim-authorization-event-002
      - claim-authorization-event-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-authorization-event-001
    source: eng-fw-langgraph-interrupts
    supports: LangGraph interrupts persist execution state, expose a payload to an external reviewer, and resume with an explicit Command value rather than implying approval from a pause.
    locator: LangGraph documentation > Interrupts > pause using interrupt and resume using Command with persisted state
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-authorization-event-002
    source: eng-proto-oauth-rfc7009
    supports: RFC 7009 specifies an explicit revocation request and permits invalidation of related authorization credentials while requiring clients to tolerate unexpected invalidation.
    locator: "RFC 7009, Sections 2.1-2.3: token revocation request, response, and authorization-server invalidation behavior"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-authorization-event-003
    source: eng-policy-aws-verified-permissions
    supports: Verified Permissions defines an authorization request over principal, action, resource, and context, and a response containing allow or deny plus determining-policy identifiers.
    locator: Amazon Verified Permissions User Guide > Terms and concepts > authorization request, authorization response, determining policies, and enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
