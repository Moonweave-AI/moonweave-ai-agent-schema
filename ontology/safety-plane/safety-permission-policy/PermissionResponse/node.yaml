          en: Prompt and response form an auditable answer fact.
          ja: 提示と応答が監査可能な回答事実を形成します。

          en: Responder, timing, and target prompt are all verifiable.
          ja: 応答者、時刻、対象提示をすべて検証できます。
        source_claims:
