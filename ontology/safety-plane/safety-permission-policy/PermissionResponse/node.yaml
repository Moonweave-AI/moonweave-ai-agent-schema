          en: Positive responds to permission prompt case
          ja: 権限提示に応答するの正例
        descriptions:
          zh: response-42 在 prompt-42 期限内由指定审批者提交 approve，并保留原 prompt_ref。
          en: response-42 is submitted as approve by the named reviewer before prompt-42 expires and retains the original prompt_ref.
          ja: response-42 は prompt-42 期限内に指定審査者が approve を提出し元 prompt_ref を保持します。
        field_values: {}
