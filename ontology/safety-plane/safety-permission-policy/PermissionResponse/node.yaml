    labels:
      zh: 权限响应 - Cedar 授权评估
      en: permission response - Cedar authorization evaluation
      ja: 権限応答 - Cedar 認可評価
    descriptions: {zh: "权限响应(PermissionResponse) [PermissionResponse]: 指定响应者针对一个权限提示提交的、带时间和理由的不可变回答记录。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: outcome, responded_at, rationale.", en: "permission response (PermissionResponse) [PermissionResponse]: An immutable, timed, reasoned answer submitted by a named responder to one permission prompt.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include outcome, responded_at, rationale.", ja: "権限応答(PermissionResponse) [PermissionResponse]: 指定応答者が一つの権限提示へ提出した、時刻と理由を持つ不変回答記録です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: outcome, responded_at, rationale."}
    field_values:
