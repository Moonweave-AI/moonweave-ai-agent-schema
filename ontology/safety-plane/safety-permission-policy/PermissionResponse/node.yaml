    descriptions: {zh: "权限响应(PermissionResponse) [PermissionResponse]: 指定响应者针对一个权限提示提交的、带时间和理由的不可变回答记录。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: outcome, responded_at, rationale.", en: "permission response (PermissionResponse) [PermissionResponse]: An immutable, timed, reasoned answer submitted by a named responder to one permission prompt.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include outcome, responded_at, rationale.", ja: "権限応答(PermissionResponse) [PermissionResponse]: 指定応答者が一つの権限提示へ提出した、時刻と理由を持つ不変回答記録です。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: outcome, responded_at, rationale."}
    field_values:
      outcome: approve
