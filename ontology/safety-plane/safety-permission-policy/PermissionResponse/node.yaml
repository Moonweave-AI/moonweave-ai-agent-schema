schema: moonweave.ai/ontology-node/v1
id: PermissionResponse
kind: concept
labels:
  zh: 权限响应
  en: permission response
  ja: 権限応答
semantics:
  short_definition:
    zh: 响应者对 PermissionPrompt 提交的带时间与理由的不可变回答记录。
    en: An immutable answer record from a responder to a PermissionPrompt with time and rationale.
    ja: 応答者が PermissionPrompt へ提出した時刻と理由付き不変回答記録。
  definition:
    zh: PermissionResponse 是 Message 子类，记录 prompt_ref、responder_ref、outcome（approve/deny/defer）、responded_at 与 rationale。Cursor Run/Deny、Claude yesAllow/deny/allowForSession 与 MCP consent 表单提交都先落成 PermissionResponse；仅当资格、有效期与 request 一致时才可升格为 HumanApproval 证据。
    en: PermissionResponse is a Message subtype recording prompt_ref, responder_ref, outcome (approve/deny/defer), responded_at, and rationale. Cursor Run/Deny, Claude yesAllow/deny/allowForSession, and MCP consent form submissions first become PermissionResponse; promotion to HumanApproval evidence requires eligibility, validity, and request consistency.
    ja: PermissionResponse は Message subtype で prompt_ref/responder_ref/outcome/responded_at/rationale を記録。Cursor Run/Deny、Claude yesAllow/deny/allowForSession、MCP consent 提出はまず PermissionResponse。資格/有効性/request 一致時のみ HumanApproval 証拠へ。
  why_needed:
    zh: 用户输入与有效批准必须分离，否则过期或无权响应会被误当作授权。
    en: User input must be separated from valid approval or expired/ineligible responses become authorization.
    ja: ユーザー入力と有効承認を分離しないと期限切れ/無資格応答が認可になります。
  includes:
    - zh: 包含 Message 信封、响应标识、提示引用、响应者、受控结果、响应时间和理由。
      en: Includes the Message envelope, response identity, prompt reference, responder, controlled outcome, response time, and rationale.
      ja: Message エンベロープ、応答識別子、提示参照、応答者、制御結果、応答時刻、理由を含みます。
  excludes:
    - zh: 不包含提示本身、资格验证、最终 PolicyDecision、AuthorizationGrant 或执行恢复事件。
      en: Excludes the prompt itself, eligibility validation, final PolicyDecision, AuthorizationGrant, or execution-resume event.
      ja: 提示自体、資格検証、最終 PolicyDecision、AuthorizationGrant、実行再開イベントを含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 保留 prompt-response 配对；验证 responder_ref 与 presented_to 一致、responded_at 在 expires_at 之前、outcome 属于 allowed_responses。Guest 或过期 approve 仍是 PermissionResponse 但无授权效力。
    en: Preserve prompt-response pairs; verify responder_ref matches presented_to, responded_at precedes expires_at, and outcome is in allowed_responses. Guest or expired approve remains PermissionResponse without authorization effect.
    ja: prompt-response 対を保持。responder_ref=presented_to、responded_at<expires_at、outcome∈allowed_responses を検証。guest/期限切れ approve は PermissionResponse のまま効力なし。
  typical_input:
    - description: Cursor Run click response.
      format: "outcome: approve; prompt_ref: permission-prompt-55"
      source_claims:
        - claim-permission-response-design
    - description: Claude allowForSession selection.
      format: "outcome: allowForSession; responded_at within prompt window"
      source_claims:
        - claim-permission-response-design
  typical_output:
    - description: Validated response pair.
      format: '{"element_id":"permission-response-42","prompt_ref":"prompt-42","outcome":"approve"}'
      source_claims:
        - claim-permission-response-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys: []
  fields:
    - id: prompt_ref
      labels:
        zh: 提示引用
        en: prompt reference
        ja: 提示参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该回答明确响应的 PermissionPrompt。
        en: PermissionPrompt explicitly answered by the record.
        ja: 記録が明示的に回答する PermissionPrompt です。
      allowed_values: []
      pattern: null
      example_value: prompt-42
      source_claims:
        - claim-permission-response-design
        - claim-permission-response-design
    - id: responder_ref
      labels:
        zh: 响应者引用
        en: responder reference
        ja: 応答者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提交回答的人类或授权系统主体。
        en: Human or authorized system principal submitting the answer.
        ja: 回答を提出する人間または認可済みシステム主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-permission-response-design
        - claim-permission-response-design
    - id: outcome
      labels:
        zh: 响应结果
        en: response outcome
        ja: 応答結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 受控的 approve、deny 或 defer 回答值。
        en: Controlled approve, deny, or defer answer value.
        ja: 制御された approve・deny・defer 回答値です。
      allowed_values: []
      pattern: null
      example_value: approve
      source_claims:
        - claim-permission-response-design
        - claim-permission-response-design
    - id: responded_at
      labels:
        zh: 响应时间
        en: responded at
        ja: 応答時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 回答提交的 UTC 时刻。
        en: UTC instant when the answer was submitted.
        ja: 回答が提出された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:00Z
      source_claims:
        - claim-permission-response-design
        - claim-permission-response-design
    - id: rationale
      labels:
        zh: 响应理由
        en: response rationale
        ja: 応答理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 响应者说明决定依据的可审计理由。
        en: Auditable reason given by the responder for the answer.
        ja: 応答者が回答根拠として示す監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: requested read-only search is expected
      source_claims:
        - claim-permission-response-design
        - claim-permission-response-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PermissionResponse-cursor-approve
    labels:
      zh: Cursor Run 响应
      en: Cursor Run response
      ja: Cursor Run 応答
    descriptions:
      zh: human:owner-7 在 prompt-55 有效期内提交 approve；response-55 待验证后形成 HumanApproval。
      en: human:owner-7 submits approve while prompt-55 is valid; response-55 awaits validation before HumanApproval.
      ja: human:owner-7 が prompt-55 有効中に approve 提出。response-55 は検証後 HumanApproval。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: Run response
    field_values:
      element_id: permission-response-55
      prompt_ref: permission-prompt-55
      outcome: approve
      responder_ref: human:owner-7
    related_node_ids:
      - PermissionResponse
      - PermissionPrompt
      - HumanApproval
    related_relation_ids:
      - PermissionResponse-responds_to-PermissionPrompt
    source_claims:
      - claim-permission-response-design
  - id: PermissionResponse-claude-allowforsession
    labels:
      zh: Claude allowForSession 响应
      en: Claude allowForSession response
      ja: Claude allowForSession 応答
    descriptions:
      zh: response-61 outcome=allowForSession，记录 session 级 Bash 批准理由。
      en: response-61 outcome=allowForSession records session-scoped Bash approval rationale.
      ja: response-61 outcome=allowForSession で session 级 Bash 承認理由を記録。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: allowForSession
    field_values:
      element_id: permission-response-61
      outcome: allowForSession
      prompt_ref: permission-prompt-61
    related_node_ids:
      - PermissionResponse
      - HumanApproval
    related_relation_ids: []
    source_claims:
      - claim-permission-response-design
  - id: PermissionResponse-mcp-deny
    labels:
      zh: MCP consent Deny 响应
      en: MCP consent Deny response
      ja: MCP consent Deny 応答
    descriptions:
      zh: 用户在 MCP OAuth consent 选择 Deny；response-mcp-118 outcome=deny，不生成 HumanApproval。
      en: User selects Deny on MCP OAuth consent; response-mcp-118 outcome=deny, no HumanApproval.
      ja: MCP OAuth consent で Deny。response-mcp-118 outcome=deny、HumanApproval なし。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: consent deny
    field_values:
      element_id: permission-response-mcp-118
      outcome: deny
    related_node_ids:
      - PermissionResponse
      - DenyDecision
    related_relation_ids: []
    source_claims:
      - claim-permission-response-design
  - id: PermissionResponse-boundary-expired
    labels:
      zh: 过期响应无授权效力
      en: Expired response has no authority
      ja: 期限切れ応答に効力なし
    descriptions:
      zh: guest-3 在 prompt-42 过期后 approve；仍是 PermissionResponse 但不能证明 HumanApproval。
      en: guest-3 approves after prompt-42 expires; still PermissionResponse but cannot evidence HumanApproval.
      ja: prompt-42 期限後 guest-3 approve。PermissionResponse のまま HumanApproval 証明不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: validity window
    field_values: {}
    related_node_ids:
      - PermissionResponse
      - HumanApproval
    related_relation_ids: []
    source_claims:
      - claim-permission-response-design
parent_relation: null
relations:
  - id: PermissionResponse-is_a-Message
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种消息
      en: is a message
      ja: メッセージの一種である
    definitions:
      zh: PermissionResponse 是 Message 的授权专用子类：它保留可观察通信信封，并以引用一个 PermissionPrompt、记录响应者、受控回答、时间和理由作为种差。
      en: PermissionResponse is an authorization-specific subtype of Message. It retains the observable communication envelope and is distinguished by referencing one PermissionPrompt and recording responder, controlled answer, time, and rationale.
      ja: PermissionResponse は Message の認可専用下位型です。観測可能通信エンベロープを保持し、一つの PermissionPrompt を参照して応答者・制御回答・時刻・理由を記録する種差を持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有权限响应子类
        en: has permission-response subtype
        ja: 権限応答下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-permission-response-design
      - claim-permission-response-design
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    target: concept:Message
  - id: PermissionResponse-responds_to-PermissionPrompt
    predicate: responds_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 响应权限提示
      en: responds to permission prompt
      ja: 権限提示に応答する
    definitions:
      zh: PermissionResponse 通过 prompt_ref 回答一个仍有效的 PermissionPrompt；响应者资格、响应时间和受控结果必须与该提示一致。
      en: A PermissionResponse answers one still-valid PermissionPrompt through prompt_ref; responder eligibility, response time, and controlled outcome must agree with that prompt.
      ja: PermissionResponse は prompt_ref で一つの有効 PermissionPrompt に回答し、応答資格・時刻・制御結果が提示と一致しなければなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: has_response
      labels:
        zh: 具有响应
        en: has response
        ja: 応答を持つ
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-permission-response-design
      - claim-permission-response-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:PermissionPrompt
