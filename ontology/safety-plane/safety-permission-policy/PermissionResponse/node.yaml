applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PermissionPrompt
    shared_parent_concept_id: Message
    differentia:
      zh: PermissionResponse 回答既有提示并记录响应者、时间与理由；PermissionPrompt 创建待回答呈现并规定允许响应和期限。回答不能反向充当提示。
      en: PermissionResponse answers an existing prompt and records responder, time, and rationale; PermissionPrompt creates the pending presentation and defines allowed answers and expiry. An answer cannot serve as the prompt.
      ja: PermissionResponse は既存提示へ回答し応答者・時刻・理由を記録し、PermissionPrompt は未回答提示を作り許容回答・期限を定めます。回答は提示を代替できません。
    source_claims:
      - claim-permission-response-001
parent_relation: null
relations:
  - id: PermissionResponse-is_a-Message
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种消息
      en: is a message
      ja: メッセージの一種である
    definitions:
      zh: PermissionResponse 是 Message 的授权专用子类：它保留可观察通信信封，并以引用一个 PermissionPrompt、记录响应者、受控回答、时间和理由作为种差。
      en: PermissionResponse is an authorization-specific subtype of Message. It retains the observable communication envelope and is distinguished by referencing one PermissionPrompt and recording responder, controlled answer, time, and rationale.
      ja: PermissionResponse は Message の認可専用下位型です。観測可能通信エンベロープを保持し、一つの PermissionPrompt を参照して応答者・制御回答・時刻・理由を記録する種差を持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有权限响应子类
        en: has permission-response subtype
        ja: 権限応答下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: PermissionResponse-is_a-Message-example-positive-manual-001
        labels:
          zh: 是一种消息正例
          en: Positive is a message case
          ja: メッセージの一種であるの正例
        descriptions:
          zh: response-42 具有发送者和审批通道消息信封，并明确引用 prompt-42、回答 approve、响应时间与理由。
          en: response-42 has a sender and approval-channel message envelope and explicitly references prompt-42 with answer approve, response time, and rationale.
          ja: response-42 は送信者と承認通道メッセージエンベロープを持ち、prompt-42、approve、応答時刻、理由を明示します。
        field_values: {}
        related_node_ids:
