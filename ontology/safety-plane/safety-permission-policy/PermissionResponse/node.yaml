schema: moonweave.ai/ontology-node/v1
id: PermissionResponse
kind: concept
status: accepted
labels:
  zh: 权限响应
  en: permission response
  ja: 権限応答
semantics:
  short_definition:
    zh: 指定响应者针对一个权限提示提交的、带时间和理由的不可变回答记录。
    en: An immutable, timed, reasoned answer submitted by a named responder to one permission prompt.
    ja: 指定応答者が一つの権限提示へ提出した、時刻と理由を持つ不変回答記録です。
  definition:
    zh: 权限响应是 Message 的授权专用子类，继承 element_id 及消息信封身份，不另设 response 身份。它记录原 PermissionPrompt、响应者、approve/deny/defer 结果、响应时间和理由；只有满足响应者资格、提示有效期、请求一致性和策略要求时，才可形成 HumanApproval 证据。
    en: A PermissionResponse is an authorization-specific Message subtype that inherits element_id and the message-envelope identity rather than introducing a separate response identity. It records the original PermissionPrompt, responder, approve/deny/defer outcome, response time, and rationale, and becomes HumanApproval evidence only when eligibility, prompt validity, request consistency, and policy requirements are satisfied.
    ja: PermissionResponse は認可専用 Message 下位型で、element_id と message envelope の同一性を継承し、別の response 同一性を導入しません。元 PermissionPrompt、応答者、approve/deny/defer、応答時刻、理由を記録し、資格・提示有効性・要求整合・方針要件を満たす場合だけ HumanApproval 証拠になります。
  why_needed:
    zh: 响应记录把用户输入与有效审批区分开，使过期、错误审批者或不同请求的回答不会被错误提升为权限。
    en: The response record separates user input from valid approval so expired, ineligible, or wrong-request answers are not promoted to authority.
    ja: 応答記録はユーザー入力と有効承認を分離し、期限切れ・無資格・別要求の回答を権限へ誤昇格させません。
  includes:
    - zh: 包含 Message 信封、响应标识、提示引用、响应者、受控结果、响应时间和理由。
      en: Includes the Message envelope, response identity, prompt reference, responder, controlled outcome, response time, and rationale.
      ja: Message エンベロープ、応答識別子、提示参照、応答者、制御結果、応答時刻、理由を含みます。
  excludes:
    - zh: 不包含提示本身、资格验证、最终 PolicyDecision、AuthorizationGrant 或执行恢复事件。
      en: Excludes the prompt itself, eligibility validation, final PolicyDecision, AuthorizationGrant, or execution-resume event.
      ja: 提示自体、資格検証、最終 PolicyDecision、AuthorizationGrant、実行再開イベントを含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: prompt_ref
      labels:
        zh: 提示引用
        en: prompt reference
        ja: 提示参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该回答明确响应的 PermissionPrompt。
        en: PermissionPrompt explicitly answered by the record.
        ja: 記録が明示的に回答する PermissionPrompt です。
      allowed_values: []
      pattern: null
      example_value: prompt-42
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: responder_ref
      labels:
        zh: 响应者引用
        en: responder reference
        ja: 応答者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提交回答的人类或授权系统主体。
        en: Human or authorized system principal submitting the answer.
        ja: 回答を提出する人間または認可済みシステム主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: outcome
      labels:
        zh: 响应结果
        en: response outcome
        ja: 応答結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 受控的 approve、deny 或 defer 回答值。
        en: Controlled approve, deny, or defer answer value.
        ja: 制御された approve・deny・defer 回答値です。
      allowed_values: []
      pattern: null
      example_value: approve
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: responded_at
      labels:
        zh: 响应时间
        en: responded at
        ja: 応答時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 回答提交的 UTC 时刻。
        en: UTC instant when the answer was submitted.
        ja: 回答が提出された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:00Z
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: rationale
      labels:
        zh: 响应理由
        en: response rationale
        ja: 応答理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 响应者说明决定依据的可审计理由。
        en: Auditable reason given by the responder for the answer.
        ja: 応答者が回答根拠として示す監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: requested read-only search is expected
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PermissionResponse-example-positive-manual-001
    kind: positive
    labels:
      zh: 权限响应正例
      en: Positive permission response case
      ja: 権限応答の正例
    scenario_id: null
    descriptions:
      zh: response-42 由 human:owner-7 在 prompt-42 失效前提交 approve，并说明只读搜索符合预期；记录仍须经过资格和范围验证。
      en: response-42 is submitted by human:owner-7 before prompt-42 expires with approve and a read-only-search rationale; eligibility and scope must still be validated.
      ja: response-42 は human:owner-7 が prompt-42 期限前に approve と読取専用検索理由を提出し、資格と範囲はなお検証されます。
    field_values:
      element_id: permission-response-42
      conversation_id: authorization-conversation/request-42
      sequence_index: 2
      message_role: authorization-response
      sender_id: human:owner-7
      prompt_ref: prompt-42
      responder_ref: human:owner-7
      outcome: approve
      responded_at: 2026-07-16T01:21:00Z
      rationale: requested read-only search is expected
    related_node_ids:
      - PermissionResponse
      - PermissionPrompt
      - HumanApproval
      - AuthorizationRequest
    related_relation_ids:
      - PermissionResponse-responds_to-PermissionPrompt
      - HumanApproval-approves-AuthorizationRequest
    expected_result:
      zh: 系统保留原提示与回答配对，并在形成 HumanApproval 前验证响应者和时间。
      en: The system preserves the prompt-response pair and validates responder and time before recognizing HumanApproval.
      ja: システムは提示・応答対を保ち、HumanApproval と認識する前に応答者と時刻を検証します。
    why_valid_or_invalid:
      zh: 记录包含完整关联和时序，但不把原始回答直接当成最终策略决定。
      en: The record has complete linkage and timing without treating raw human input as the final policy decision.
      ja: 完全な関連と時序を持ちますが、生の人間入力を最終方針判断にしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-permission-response-001
      - claim-permission-response-002
  - id: PermissionResponse-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 权限响应边界反例
      en: Boundary counterexample for permission response
      ja: 権限応答の境界反例
    scenario_id: null
    descriptions:
      zh: human:guest-3 在 prompt-42 过期后发送 approve；由于消息仍引用该提示并记录回答者、受控响应值和时间，它仍是 PermissionResponse，但没有授权效力。
      en: human:guest-3 sends approve after prompt-42 expires. Because the message still references that prompt and records responder, controlled answer, and time, it remains a PermissionResponse but has no authorization effect.
      ja: human:guest-3 が prompt-42 の期限後に approve を送信します。提示参照・応答者・制御回答・時刻を記録するため PermissionResponse のままですが、認可効力はありません。
    field_values: {}
    related_node_ids:
      - PermissionResponse
      - PermissionPrompt
      - Message
      - HumanApproval
      - PolicyEvaluation
    related_relation_ids:
      - PermissionResponse-responds_to-PermissionPrompt
      - PolicyEvaluation-considers-HumanApproval
    expected_result:
      zh: 系统保留该 PermissionResponse 作为通信事实，但它不得证明 HumanApproval，也不得作为 PolicyEvaluation 的有效审批证据；门控继续暂停或拒绝。
      en: The system retains the PermissionResponse as a communication fact, but it must not evidence HumanApproval or enter PolicyEvaluation as valid approval evidence; the gate remains paused or denied.
      ja: システムは PermissionResponse を通信事実として保持しますが、HumanApproval を証明できず PolicyEvaluation の有効承認証拠にもできません。ゲートは停止または拒否のままです。
    why_valid_or_invalid:
      zh: 消息分类取决于它是否记录了对提示的回答；授权效力则另取决于响应者资格、提示有效期和请求绑定，二者不能混为一个判定。
      en: Message classification depends on whether it records an answer to the prompt; authorization effect separately depends on responder eligibility, prompt validity, and request binding.
      ja: message 分類は提示への回答記録で決まり、認可効力は応答資格・提示有効性・要求束縛で別途決まるため、両判定を混同できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-permission-response-001
      - claim-permission-response-002
