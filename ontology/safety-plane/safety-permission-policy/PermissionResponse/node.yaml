          en: The relation rejects the wrong pair by prompt_ref.
          ja: 関係は prompt_ref により誤対応を拒否します。

          en: Audit linkage is established by stable identity, not language similarity.
          ja: 監査連鎖は自然言語類似でなく安定識別で成立します。
        source_claims:
          - claim-permission-response-001
          - claim-permission-response-002
    source_claims:
