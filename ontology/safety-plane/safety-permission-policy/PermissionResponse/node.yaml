      en: permission response - TrustLLM six-dimension trust
      ja: 権限応答 - TrustLLM 6次元信頼性
    descriptions: {zh: "权限响应(PermissionResponse) [PermissionResponse]: 指定响应者针对一个权限提示提交的、带时间和理由的不可变回答记录。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: outcome, responded_at, rationale.", en: "permission response (PermissionResponse) [PermissionResponse]: An immutable, timed, reasoned answer submitted by a named responder to one permission prompt.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include outcome, responded_at, rationale.", ja: "権限応答(PermissionResponse) [PermissionResponse]: 指定応答者が一つの権限提示へ提出した、時刻と理由を持つ不変回答記録です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: outcome, responded_at, rationale."}
    field_values:
