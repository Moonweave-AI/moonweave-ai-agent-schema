schema: moonweave.ai/ontology-node/v1
id: PolicyDecision
kind: concept
status: accepted
labels: {zh: 策略决定, en: Policy Decision, ja: ポリシー判断}
semantics:
  short_definition: {zh: "PolicyEvaluation 对一个 AuthorizationRequest 产生的、带理由和证据的 allow 或 deny 结论。", en: "An allow-or-deny conclusion with rationale and evidence produced by PolicyEvaluation for one AuthorizationRequest.", ja: "一つの AuthorizationRequest に対して PolicyEvaluation が生成する、理由と証拠を持つ allow または deny の結論。"}
  definition: {zh: "PolicyDecision 是策略评估的记录输出，只表示 allow 或 deny。它不是评估过程、AuthorizationCredential、用户同意、静态 ToolApprovalRequirement 或实际执行。", en: "PolicyDecision is the recorded output of policy evaluation and represents only allow or deny. It is not the evaluation process, an AuthorizationCredential, user consent, a static ToolApprovalRequirement, or actual execution.", ja: "PolicyDecision はポリシー評価の記録された出力であり、allow または deny だけを表す。評価過程、AuthorizationCredential、ユーザー同意、静的 ToolApprovalRequirement、実際の実行ではない。"}
  why_needed: {zh: "把可审计结论与规则匹配过程和执行分开，可支持复核、缓存失效和后续授权生命周期管理。", en: "Separating the auditable conclusion from rule matching and execution supports review, cache invalidation, and later authorization-lifecycle management.", ja: "監査可能な結論を規則照合と実行から分離すると、レビュー、キャッシュ無効化、後続の認可ライフサイクル管理を支援できる。"}
  includes: [{zh: "请求引用、决定效果、规则证据、策略版本和决定时间。", en: "Request reference, decision effect, rule evidence, policy version, and decision time.", ja: "要求参照、判断効果、規則証拠、ポリシー版、判断時刻。"}]
  excludes: [{zh: "可直接执行的本地授权凭证、审批响应或实际工具动作。", en: "A local authorization credential usable for execution, an approval response, or an actual tool action.", ja: "実行に使えるローカル認可 credential、承認応答、実際のツール動作。"}]
  semantic_kind: entity
  aliases: [authorization-decision]
engineering:
  explanation: {zh: "策略引擎输出包含版本和适用规则的 allow 或 deny 决定。本地授权服务或运行时适配器可消费该决定，但必须验证其未失效并满足其他独立证据。", en: "A policy engine outputs an allow-or-deny decision containing version and applicable rules. A local authorization service or runtime adapter may consume it but must verify it is not stale and that other independent evidence is satisfied.", ja: "ポリシーエンジンは版と適用規則を含む allow/deny 判断を出力する。ローカル認可サービスまたは runtime adapter はそれを消費できるが、古くないことと他の独立証拠が満たされることを検証しなければならない。"}
  typical_input:
    - description: {zh: "已完成的策略评估输出。", en: "Completed policy-evaluation output.", ja: "完了したポリシー評価出力。"}
      format: '{"policy_evaluation_id":"eval-1","authorization_request_id":"request-1","policy_specification_id":"policy-12","evaluated_policy_version":"12"}'
      source_claims: [claim-cedar-policy-decision, claim-opa-policy-decision-inference]
  typical_output:
    - description: {zh: "可供后续控制消费的决定记录。", en: "Decision record consumable by later controls.", ja: "後続制御が消費できる判断記録。"}
      format: '{"policy_decision_id":"decision-1","authorization_request_id":"request-1","policy_evaluation_id":"eval-1","policy_specification_id":"policy-12","evaluated_policy_version":"12","decision_effect":"allow","decision_evidence_reference":"evidence-1"}'
      source_claims: [claim-cedar-policy-decision, claim-opa-policy-decision-inference]
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/policy-language
      description: Documents policy evaluation over structured input.
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents an authorizer returning allow or deny decisions with diagnostics for an authorization request.
structure:
  identity_keys: [policy_decision_id]
  fields:
    - id: policy_decision_id
      labels: {zh: 策略决定标识符, en: Policy decision ID, ja: ポリシー判断 ID}
      definitions: {zh: "一次策略结论的稳定标识符。", en: "Stable identifier for one policy conclusion.", ja: "一つのポリシー結論の安定した識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: decision-1
      allowed_values: []
      source_claims: [claim-opa-policy-decision-inference]
    - id: decision_effect
      labels: {zh: 决定效果, en: Decision effect, ja: 判断効果}
      definitions: {zh: "策略评估得出的授权结论类别。", en: "Authorization-conclusion category produced by policy evaluation.", ja: "ポリシー評価が生成する認可結論区分。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: allow
      allowed_values: [allow, deny]
      source_claims: [claim-cedar-policy-decision, claim-opa-policy-decision-inference]
    - id: authorization_request_id
      labels: {zh: 授权请求标识符, en: Authorization request ID, ja: 認可要求 ID}
      definitions: {zh: "该决定所对应 AuthorizationRequest 的标识符。", en: "Identifier of the AuthorizationRequest to which this decision applies.", ja: "この判断が適用される AuthorizationRequest の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-1
      allowed_values: []
      source_claims: [claim-cedar-policy-decision]
    - id: policy_evaluation_id
      labels: {zh: 策略评估标识符, en: Policy evaluation ID, ja: ポリシー評価 ID}
      definitions: {zh: "生成该决定的 PolicyEvaluation 标识符。", en: "Identifier of the PolicyEvaluation that generated this decision.", ja: "この判断を生成した PolicyEvaluation の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: eval-1
      allowed_values: []
      source_claims: [claim-cedar-policy-decision]
    - id: policy_specification_id
      labels: {zh: 策略规范标识符, en: Policy specification ID, ja: ポリシー仕様 ID}
      definitions: {zh: "生成该决定时所应用 PolicySpecification 的标识符。", en: "Identifier of the PolicySpecification applied to generate this decision.", ja: "この判断を生成するために適用した PolicySpecification の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: policy-12
      allowed_values: []
      source_claims: [claim-opa-policy-decision-inference]
    - id: evaluated_policy_version
      labels: {zh: 已评估策略版本, en: Evaluated policy version, ja: 評価済みポリシー版}
      definitions: {zh: "生成该决定时使用的不可变策略修订。", en: "Immutable policy revision used to generate this decision.", ja: "この判断の生成に使用した不変ポリシー改訂。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[0-9]+$'
      example_value: '12'
      allowed_values: []
      source_claims: [claim-opa-policy-decision-inference]
    - id: decision_evidence_reference
      labels: {zh: 决定证据引用, en: Decision evidence reference, ja: 判断証拠参照}
      definitions: {zh: "支持该决定效果的规则、输入和诊断证据引用。", en: "Reference to rule, input, and diagnostic evidence supporting this decision effect.", ja: "この判断効果を支える規則、入力、診断証拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evidence-1
      allowed_values: []
      source_claims: [claim-cedar-policy-decision, claim-opa-policy-decision-inference]
  constraints:
    - id: policy-decision-evaluation-provenance
      severity: error
      expression_language: plain
      expression: A PolicyDecision must identify authorization_request_id, policy_evaluation_id, policy_specification_id, evaluated_policy_version, decision_evidence_reference, and decision_effect allow or deny; it must not by itself issue a credential, collect user response, approve a call, or execute access.
      explanations: {zh: "决定是可审计结论，授权创建和执行仍需独立控制。", en: "A decision is an auditable conclusion; authorization creation and execution still need independent control.", ja: "判断は監査可能な結論であり、認可作成と実行には依然として独立した制御が必要である。"}
      explanation: {zh: "决定是可审计结论，授权创建和执行仍需独立控制。", en: "A decision is an auditable conclusion; authorization creation and execution still need independent control.", ja: "判断は監査可能な結論であり、認可作成と実行には依然として独立した制御が必要である。"}
      source_claims: [claim-cedar-policy-decision, claim-opa-policy-decision-inference]
  required_relations: []
examples:
  - id: policy-decision-cedar
    labels:
      zh: 策略决定 - Cedar 授权评估
      en: Policy Decision - Cedar authorization evaluation
      ja: ポリシー判断 - Cedar 認可評価
    descriptions: {zh: "策略决定(PolicyDecision) [PolicyDecision]: PolicyEvaluation 对一个 AuthorizationRequest 产生的、带理由和证据的 allow 或 deny 结论。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference.", en: "Policy Decision (PolicyDecision) [PolicyDecision]: An allow-or-deny conclusion with rationale and evidence produced by PolicyEvaluation for one AuthorizationRequest.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include policy_specification_id, authorization_request_id, decision_evidence_reference.", ja: "ポリシー判断(PolicyDecision) [PolicyDecision]: 一つの AuthorizationRequest に対して PolicyEvaluation が生成する、理由と証拠を持つ allow または deny の結論。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference."}
    field_values:
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - PolicyDecision
    related_relation_ids:
      - claim-opa-policy-decision-inference
      - PolicyDecision
    example_source: Amazon Cedar
    source_claims:
      - claim-opa-policy-decision-inference
  - id: policy-decision-opa
    labels:
      zh: 策略决定 - OPA Rego 策略评估
      en: Policy Decision - OPA Rego policy evaluation
      ja: ポリシー判断 - OPA Rego ポリシー評価
    descriptions: {zh: "策略决定(PolicyDecision) [PolicyDecision]: PolicyEvaluation 对一个 AuthorizationRequest 产生的、带理由和证据的 allow 或 deny 结论。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference.", en: "Policy Decision (PolicyDecision) [PolicyDecision]: An allow-or-deny conclusion with rationale and evidence produced by PolicyEvaluation for one AuthorizationRequest.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include policy_specification_id, authorization_request_id, decision_evidence_reference.", ja: "ポリシー判断(PolicyDecision) [PolicyDecision]: 一つの AuthorizationRequest に対して PolicyEvaluation が生成する、理由と証拠を持つ allow または deny の結論。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference."}
    field_values:
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - PolicyDecision
    related_relation_ids:
      - claim-opa-policy-decision-inference
      - PolicyDecision
    example_source: Open Policy Agent
    source_claims:
      - claim-opa-policy-decision-inference
  - id: policy-decision-trustllm
    labels:
      zh: 策略决定 - TrustLLM 六维可信度
      en: Policy Decision - TrustLLM six-dimension trust
      ja: ポリシー判断 - TrustLLM 6次元信頼性
    descriptions: {zh: "策略决定(PolicyDecision) [PolicyDecision]: PolicyEvaluation 对一个 AuthorizationRequest 产生的、带理由和证据的 allow 或 deny 结论。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference.", en: "Policy Decision (PolicyDecision) [PolicyDecision]: An allow-or-deny conclusion with rationale and evidence produced by PolicyEvaluation for one AuthorizationRequest.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include policy_specification_id, authorization_request_id, decision_evidence_reference.", ja: "ポリシー判断(PolicyDecision) [PolicyDecision]: 一つの AuthorizationRequest に対して PolicyEvaluation が生成する、理由と証拠を持つ allow または deny の結論。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference."}
    field_values:
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - PolicyDecision
    related_relation_ids:
      - claim-opa-policy-decision-inference
      - PolicyDecision
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-opa-policy-decision-inference
  - id: policy-decision-decodingtrust
    labels:
      zh: 策略决定 - DecodingTrust GPT 评估
      en: Policy Decision - DecodingTrust GPT assessment
      ja: ポリシー判断 - DecodingTrust GPT 評価
    descriptions: {zh: "策略决定(PolicyDecision) [PolicyDecision]: PolicyEvaluation 对一个 AuthorizationRequest 产生的、带理由和证据的 allow 或 deny 结论。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference.", en: "Policy Decision (PolicyDecision) [PolicyDecision]: An allow-or-deny conclusion with rationale and evidence produced by PolicyEvaluation for one AuthorizationRequest.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include policy_specification_id, authorization_request_id, decision_evidence_reference.", ja: "ポリシー判断(PolicyDecision) [PolicyDecision]: 一つの AuthorizationRequest に対して PolicyEvaluation が生成する、理由と証拠を持つ allow または deny の結論。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: policy_specification_id, authorization_request_id, decision_evidence_reference."}
    field_values:
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - PolicyDecision
    related_relation_ids:
      - claim-opa-policy-decision-inference
      - PolicyDecision
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-opa-policy-decision-inference
parent_relation: null
relations:
  - id: PolicyDecision-wasGeneratedBy-PolicyEvaluation
    predicate: was_generated_by
    target: activity:PolicyEvaluation
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由策略评估生成, en: was generated by policy evaluation, ja: ポリシー評価によって生成される}
    definitions: {zh: "PolicyDecision 是由 PolicyEvaluation 生成的可审计输出记录；该 PROV-O wasGeneratedBy 关联不把它作为活动的组成部分。", en: "A PolicyDecision is an auditable output record generated by PolicyEvaluation; this PROV-O wasGeneratedBy association does not make it a component of the activity.", ja: "PolicyDecision は PolicyEvaluation が生成した監査可能な出力記録であり、この PROV-O wasGeneratedBy 関連はそれを活動の構成要素にしない。"}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    source_claims: [claim-prov-o-generation]
    layout_role: cross-link
sources:
  - id: opa-policy-language
    title: Open Policy Agent policy language
    url: https://www.openpolicyagent.org/docs/policy-language
    source_type: official-documentation
    relevance: Documents policy evaluation over structured input.
  - id: cedar-authorization
    title: Cedar authorization guide
    url: https://docs.cedarpolicy.com/auth/authorization.html
    source_type: official-documentation
    relevance: Documents authorization responses that return allow or deny decisions with diagnostics.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: w3c-recommendation
    relevance: Defines the provenance relation linking an entity to the activity that generated it.
source_claims:
  - id: claim-opa-policy-decision-inference
    source: opa-policy-language
    supports: OPA documentation motivates structured policy conclusions; it does not define this internal PolicyDecision schema.
    locator: "Policy language overview"
    evidence_kind: design-inference
    confidence: high
  - id: claim-cedar-policy-decision
    source: cedar-authorization
    supports: Cedar's Authorizer evaluates policies for an authorization request and returns an allow or deny response with diagnostics. Moonweave represents that result as a separate local entity record; Cedar does not define this exact record schema.
    locator: "Authorization responses"
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-generation
    source: w3c-prov-o
    supports: PROV-O defines wasGeneratedBy as the inverse of generated, connecting an entity to the activity that generated it.
    locator: "Section 3.1.2 wasGeneratedBy"
    evidence_kind: normative-guidance
    confidence: high
