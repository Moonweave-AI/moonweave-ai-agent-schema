schema: moonweave.ai/ontology-node/v1
id: AllowDecision
kind: concept
status: accepted
labels: {zh: 允许策略决定, en: Allow Decision, ja: 許可ポリシー判断}
semantics:
  short_definition: {zh: "效果固定为 allow 的 PolicyDecision 真正子类型。", en: "A true PolicyDecision subtype whose effect is fixed to allow.", ja: "効果が allow に固定された PolicyDecision の真のサブタイプ。"}
  definition: {zh: "AllowDecision 是 PolicyDecision 的真正子类型：它保留 policy_decision_id、authorization_request_id、policy_evaluation_id、policy_specification_id、evaluated_policy_version 和 decision_evidence_reference，并将 decision_effect 固定为 allow；allowed_scope_reference 说明被允许的范围。它不是 AuthorizationCredential、HumanApproval、用户同意或工具执行。", en: "AllowDecision is a true PolicyDecision subtype: it retains policy_decision_id, authorization_request_id, policy_evaluation_id, policy_specification_id, evaluated_policy_version, and decision_evidence_reference while fixing decision_effect to allow; allowed_scope_reference states the permitted scope. It is not an AuthorizationCredential, HumanApproval, user consent, or tool execution.", ja: "AllowDecision は PolicyDecision の真のサブタイプであり、policy_decision_id、authorization_request_id、policy_evaluation_id、policy_specification_id、evaluated_policy_version、decision_evidence_reference を保持し、decision_effect を allow に固定する。allowed_scope_reference は許可範囲を示す。AuthorizationCredential、HumanApproval、ユーザー同意、ツール実行ではない。"}
  why_needed: {zh: "系统需要可追溯的允许结论来说明哪项请求在何个策略版本下被允许，但该结论不能自行成为可持久使用的凭证或批准证据。", en: "Systems need an auditable allow conclusion showing which request was permitted under which policy version, without turning that conclusion into a standing credential or approval evidence.", ja: "システムはどの要求がどのポリシー版で許可されたかを示す監査可能な結論を必要とするが、その結論を恒久 credential や承認証拠にしてはならない。"}
  includes: [{zh: "继承的决定身份、请求、评估、策略、版本和证据字段，固定 allow 效果以及允许范围。", en: "Inherited decision identity, request, evaluation, policy, version, and evidence fields; a fixed allow effect; and permitted scope.", ja: "継承した判断 ID、要求、評価、ポリシー、版、証拠フィールド、固定 allow 効果、許可 scope。"}]
  excludes: [{zh: "授权凭证的签发、调用级人工批准、Cedar 之外的第三种策略效果或任何执行副作用。", en: "Credential issuance, call-specific human approval, a third policy effect outside allow-or-deny, or any execution side effect.", ja: "credential 発行、呼出し固有の人の承認、allow-or-deny 以外の第三のポリシー効果、実行 side effect。"}]
  semantic_kind: entity
  aliases: [policy-allow-result, authorization-allow-conclusion]
engineering:
  explanation: {zh: "策略评估产生一个包含完整父决定字段的 allow 子类型。后续本地凭证签发或工具适配器可以引用该决定，但必须另外验证凭证、人工批准和安全条件。", en: "Policy evaluation produces an allow subtype containing the complete parent-decision fields. Later local credential issuance or a tool adapter may reference it, but must independently verify credentials, human approval, and safety conditions.", ja: "ポリシー評価は完全な親判断フィールドを含む allow サブタイプを生成する。後続のローカル credential 発行やツール adapter は参照できるが、credential、人の承認、安全条件を別に検証しなければならない。"}
  typical_input:
    - description: {zh: "已评估的授权请求与适用策略版本。", en: "An evaluated authorization request and applicable policy version.", ja: "評価済み認可要求と適用ポリシー版。"}
      format: '{"authorization_request_id":"request-1","policy_evaluation_id":"eval-1","policy_specification_id":"policy-12","evaluated_policy_version":"12","decision_evidence_reference":"evidence-allow-1","allowed_scope_reference":"workspace.write"}'
      source_claims: [claim-cedar-allow-deny, claim-local-allow-decision-subtype]
  typical_output:
    - description: {zh: "保留父决定合同的允许决定。", en: "An allow decision retaining the parent-decision contract.", ja: "親判断契約を保持する allow decision。"}
      format: '{"policy_decision_id":"allow-1","decision_effect":"allow","authorization_request_id":"request-1","policy_evaluation_id":"eval-1","policy_specification_id":"policy-12","evaluated_policy_version":"12","decision_evidence_reference":"evidence-allow-1","allowed_scope_reference":"workspace.write"}'
      source_claims: [claim-cedar-allow-deny, claim-local-allow-decision-subtype]
  reference_implementations:
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents authorization responses limited to allow or deny with diagnostics.
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/policy-language
      description: Documents evaluation of policy over structured input and data.
structure:
  identity_keys: [policy_decision_id]
  fields:
    - id: policy_decision_id
      labels: {zh: 策略决定标识符, en: Policy decision ID, ja: ポリシー判断 ID}
      definitions: {zh: "继承的、一次策略结论的稳定标识符。", en: "Inherited stable identifier for one policy conclusion.", ja: "一つのポリシー結論の継承した安定 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: allow-1
      allowed_values: []
      source_claims: [claim-local-allow-decision-subtype]
    - id: decision_effect
      labels: {zh: 决定效果, en: Decision effect, ja: 判断効果}
      definitions: {zh: "继承的决定效果，在此子类型中固定为 allow。", en: "Inherited decision effect, fixed to allow for this subtype.", ja: "継承した判断効果。このサブタイプでは allow に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: allow
      allowed_values: [allow]
      source_claims: [claim-cedar-allow-deny, claim-local-allow-decision-subtype]
    - id: authorization_request_id
      labels: {zh: 授权请求标识符, en: Authorization request ID, ja: 認可要求 ID}
      definitions: {zh: "继承的、此允许决定适用的 AuthorizationRequest 标识符。", en: "Inherited identifier of the AuthorizationRequest to which this allow decision applies.", ja: "この allow decision が適用される AuthorizationRequest の継承 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-1
      allowed_values: []
      source_claims: [claim-local-allow-decision-subtype]
    - id: policy_evaluation_id
      labels: {zh: 策略评估标识符, en: Policy evaluation ID, ja: ポリシー評価 ID}
      definitions: {zh: "继承的、生成此允许决定的 PolicyEvaluation 标识符。", en: "Inherited identifier of the PolicyEvaluation that generated this allow decision.", ja: "この allow decision を生成した PolicyEvaluation の継承 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: eval-1
      allowed_values: []
      source_claims: [claim-local-allow-decision-subtype]
    - id: policy_specification_id
      labels: {zh: 策略规范标识符, en: Policy specification ID, ja: ポリシー仕様 ID}
      definitions: {zh: "继承的、生成决定时适用的 PolicySpecification 标识符。", en: "Inherited identifier of the PolicySpecification applied to generate this decision.", ja: "この判断の生成に適用された PolicySpecification の継承 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: policy-12
      allowed_values: []
      source_claims: [claim-opa-evaluation, claim-local-allow-decision-subtype]
    - id: evaluated_policy_version
      labels: {zh: 已评估策略版本, en: Evaluated policy version, ja: 評価済みポリシー版}
      definitions: {zh: "继承的、生成此结论时使用的不可变策略修订。", en: "Inherited immutable policy revision used to generate this conclusion.", ja: "この結論の生成に使用された継承した不変ポリシー改訂。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[0-9]+$'
      example_value: '12'
      allowed_values: []
      source_claims: [claim-opa-evaluation, claim-local-allow-decision-subtype]
    - id: decision_evidence_reference
      labels: {zh: 决定证据引用, en: Decision evidence reference, ja: 判断証拠参照}
      definitions: {zh: "继承的、支持 allow 结论的规则、输入和诊断非秘密引用。", en: "Inherited non-secret reference to rule, input, and diagnostics supporting the allow conclusion.", ja: "allow 結論を支持する規則、入力、診断への継承した非秘密参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evidence-allow-1
      allowed_values: []
      source_claims: [claim-cedar-allow-deny, claim-local-allow-decision-subtype]
    - id: allowed_scope_reference
      labels: {zh: 允许范围引用, en: Allowed scope reference, ja: 許可スコープ参照}
      definitions: {zh: "此 allow 结论评估并允许的权限范围引用。", en: "Reference to the permission scope evaluated and allowed by this conclusion.", ja: "この allow 結論が評価して許可した権限 scope への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: workspace.write
      allowed_values: []
      source_claims: [claim-local-allow-decision-subtype]
  constraints:
    - id: allow-decision-retains-parent-contract
      severity: error
      expression_language: plain
      expression: An AllowDecision must retain one policy_decision_id, decision_effect allow, authorization_request_id, policy_evaluation_id, policy_specification_id, evaluated_policy_version, decision_evidence_reference, and allowed_scope_reference. It is not an authorization credential, human approval, or execution permit.
      explanation: {zh: "允许决定是父策略决定的收窄子类型，不能被解释为可重用凭证或调用批准。", en: "An allow decision is a narrowed subtype of a policy decision and cannot be interpreted as a reusable credential or call approval.", ja: "allow decision は policy decision の制限付きサブタイプであり、再利用可能な credential や呼出し承認として解釈できない。"}
      source_claims: [claim-cedar-allow-deny, claim-local-allow-decision-subtype]
  required_relations: []
examples:
  - id: allow-decision-cedar
    labels:
      zh: 允许策略决定 - Cedar 授权评估
      en: Allow Decision - Cedar authorization evaluation
      ja: 許可ポリシー判断 - Cedar 認可評価
    descriptions: {zh: "允许策略决定(AllowDecision) [AllowDecision]: 效果固定为 allow 的 PolicyDecision 真正子类型。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id.", en: "Allow Decision (AllowDecision) [AllowDecision]: A true PolicyDecision subtype whose effect is fixed to allow.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include allowed_scope_reference, policy_specification_id, authorization_request_id.", ja: "許可ポリシー判断(AllowDecision) [AllowDecision]: 効果が allow に固定された PolicyDecision の真のサブタイプ。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id."}
    field_values:
      allowed_scope_reference: workspace.write
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-allow-1
      evaluated_policy_version: '12'
      policy_decision_id: allow-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - AllowDecision
    related_relation_ids:
      - AllowDecision
      - claim-cedar-allow-deny
    example_source: Amazon Cedar
    source_claims:
      - claim-cedar-allow-deny
  - id: allow-decision-opa
    labels:
      zh: 允许策略决定 - OPA Rego 策略评估
      en: Allow Decision - OPA Rego policy evaluation
      ja: 許可ポリシー判断 - OPA Rego ポリシー評価
    descriptions: {zh: "允许策略决定(AllowDecision) [AllowDecision]: 效果固定为 allow 的 PolicyDecision 真正子类型。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id.", en: "Allow Decision (AllowDecision) [AllowDecision]: A true PolicyDecision subtype whose effect is fixed to allow.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include allowed_scope_reference, policy_specification_id, authorization_request_id.", ja: "許可ポリシー判断(AllowDecision) [AllowDecision]: 効果が allow に固定された PolicyDecision の真のサブタイプ。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id."}
    field_values:
      allowed_scope_reference: workspace.write
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-allow-1
      evaluated_policy_version: '12'
      policy_decision_id: allow-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - AllowDecision
    related_relation_ids:
      - AllowDecision
      - claim-cedar-allow-deny
    example_source: Open Policy Agent
    source_claims:
      - claim-cedar-allow-deny
  - id: allow-decision-trustllm
    labels:
      zh: 允许策略决定 - TrustLLM 六维可信度
      en: Allow Decision - TrustLLM six-dimension trust
      ja: 許可ポリシー判断 - TrustLLM 6次元信頼性
    descriptions: {zh: "允许策略决定(AllowDecision) [AllowDecision]: 效果固定为 allow 的 PolicyDecision 真正子类型。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id.", en: "Allow Decision (AllowDecision) [AllowDecision]: A true PolicyDecision subtype whose effect is fixed to allow.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include allowed_scope_reference, policy_specification_id, authorization_request_id.", ja: "許可ポリシー判断(AllowDecision) [AllowDecision]: 効果が allow に固定された PolicyDecision の真のサブタイプ。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id."}
    field_values:
      allowed_scope_reference: workspace.write
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-allow-1
      evaluated_policy_version: '12'
      policy_decision_id: allow-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - AllowDecision
    related_relation_ids:
      - AllowDecision
      - claim-cedar-allow-deny
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-cedar-allow-deny
  - id: allow-decision-decodingtrust
    labels:
      zh: 允许策略决定 - DecodingTrust GPT 评估
      en: Allow Decision - DecodingTrust GPT assessment
      ja: 許可ポリシー判断 - DecodingTrust GPT 評価
    descriptions: {zh: "允许策略决定(AllowDecision) [AllowDecision]: 效果固定为 allow 的 PolicyDecision 真正子类型。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id.", en: "Allow Decision (AllowDecision) [AllowDecision]: A true PolicyDecision subtype whose effect is fixed to allow.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include allowed_scope_reference, policy_specification_id, authorization_request_id.", ja: "許可ポリシー判断(AllowDecision) [AllowDecision]: 効果が allow に固定された PolicyDecision の真のサブタイプ。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: allowed_scope_reference, policy_specification_id, authorization_request_id."}
    field_values:
      allowed_scope_reference: workspace.write
      authorization_request_id: request-1
      decision_effect: allow
      decision_evidence_reference: evidence-allow-1
      evaluated_policy_version: '12'
      policy_decision_id: allow-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids:
      - AllowDecision
    related_relation_ids:
      - AllowDecision
      - claim-cedar-allow-deny
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-cedar-allow-deny
parent_relation:
  id: AllowDecision-is_a-PolicyDecision
  predicate: is_a
  target: entity:PolicyDecision
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是一种策略决定, en: is a policy decision, ja: ポリシー判断である}
  definitions: {zh: "AllowDecision 保留 PolicyDecision 的完整身份和必填合同，并将效果收窄为 allow。", en: "AllowDecision retains the full PolicyDecision identity and required contract while narrowing the effect to allow.", ja: "AllowDecision は PolicyDecision の完全な ID と必須契約を保持し、効果を allow に狭める。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: allow-decision-effect-fixed
      expression_language: plain
      expression: The child subtype retains every PolicyDecision required field and fixes decision_effect to allow.
      explanation: {zh: "子类型仅收窄效果值，不能丢失父决定字段。", en: "The subtype only narrows the effect value and cannot omit parent-decision fields.", ja: "サブタイプは効果値だけを狭め、親判断フィールドを省略できない。"}
      source_claims: [claim-cedar-allow-deny, claim-local-allow-decision-subtype]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-local-allow-decision-subtype]
relations: []
sources:
  - id: cedar-authorization
    title: Cedar authorization guide
    url: https://docs.cedarpolicy.com/auth/authorization.html
    source_type: official-documentation
    relevance: Documents authorization responses limited to allow or deny with diagnostics.
  - id: opa-policy-language
    title: Open Policy Agent policy language
    url: https://www.openpolicyagent.org/docs/policy-language
    source_type: official-documentation
    relevance: Documents evaluation over structured input and policy data.
  - id: moonweave-local-allow-decision
    title: Moonweave local allow-decision subtype
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema#source-model
    source_type: design-inference
    relevance: Defines the local inherited contract for the allow decision subtype.
source_claims:
  - id: claim-cedar-allow-deny
    source: cedar-authorization
    supports: Cedar's Authorizer returns an allow or deny response with diagnostics; it does not define a third decision effect or Moonweave's subtype schema.
    locator: "Authorization responses"
    evidence_kind: normative-guidance
    confidence: high
  - id: claim-opa-evaluation
    source: opa-policy-language
    supports: OPA evaluates policy over structured input and data; it does not define Moonweave's AllowDecision field contract.
    locator: "Policy language"
    evidence_kind: normative-guidance
    confidence: high
  - id: claim-local-allow-decision-subtype
    source: moonweave-local-allow-decision
    supports: Moonweave design inference defines AllowDecision as a true PolicyDecision subtype that retains parent identity and required fields while fixing decision_effect to allow and adding the permitted-scope reference.
    locator: "Moonweave local allow-decision subtype"
    evidence_kind: design-inference
    confidence: high
