schema: moonweave.ai/ontology-node/v1
id: CapabilityCredential
kind: concept
status: accepted
labels: {zh: 本地能力授权凭证, en: Local Capability Credential, ja: ローカル能力認可クレデンシャル}
semantics:
  short_definition: {zh: "将可验证授权凭证收窄到一项能力的本地凭证子类型。", en: "A local authorization-credential subtype narrowed to one capability.", ja: "一つの能力に狭められたローカル認可クレデンシャルのサブタイプ。"}
  definition: {zh: "CapabilityCredential 是 AuthorizationCredential 的真正子类型：它保留同一凭证身份、持有者、授权范围、有效窗口和验证依据，并以 capability_name、可选条件与用量限制进一步收窄使用。若由另一张凭证衍生，parent_credential_ref 仅引用不同的源凭证，不能替代继承字段。", en: "CapabilityCredential is a true AuthorizationCredential subtype: it retains the same credential identity, holder, authorized scope, validity window, and verification basis while further narrowing use with capability_name, optional conditions, and a use limit. If derived from another credential, parent_credential_ref names a distinct source credential and cannot replace inherited fields.", ja: "CapabilityCredential は AuthorizationCredential の真のサブタイプであり、同じ credential ID、保持者、認可範囲、有効期間、検証根拠を保持し、capability_name、任意の条件、利用上限で使用をさらに制限する。別の credential から導出される場合、parent_credential_ref は別のソース credential を参照し、継承フィールドの代わりにはならない。"}
  why_needed: {zh: "基础凭证可能仍过宽；能力子类型让执行前检查能够在不丢失凭证身份与可验证性的前提下施加更窄限制。", en: "A base credential can still be too broad; this subtype enables narrower pre-execution limits without losing credential identity or verifiability.", ja: "基礎 credential が広すぎる場合でも、このサブタイプは credential の同一性と検証可能性を失わずに実行前の制限を狭められる。"}
  includes: [{zh: "继承的凭证身份、持有者、范围、时间窗口和验证引用，以及能力名称、可选源凭证引用、条件和用量限制。", en: "Inherited credential identity, holder, scope, time window, and verification reference plus a capability name, optional source-credential reference, conditions, and use limit.", ja: "継承した credential ID、保持者、範囲、時間窓、検証参照、および能力名、任意のソース credential 参照、条件、利用上限。"}]
  excludes: [{zh: "独立于授权凭证的能力令牌、OAuth 原生范围、人工批准、策略决定或执行效果。", en: "A capability token independent of an authorization credential, an OAuth-native scope, human approval, a policy decision, or an execution effect.", ja: "認可 credential から独立した capability token、OAuth ネイティブ scope、人の承認、ポリシー判断、実行 effect。"}]
  semantic_kind: local-profile
  aliases: [local-capability-credential, bounded-capability-profile]
engineering:
  explanation: {zh: "编排器先验证该子类型继承的凭证字段，再验证 capability_name、可选条件和用量限制。若 parent_credential_ref 存在，派生关系必须指向另一张源凭证；它不是运行时工具调用或批准记录。", en: "An orchestrator first verifies the inherited credential fields, then capability_name, optional conditions, and use limit. When parent_credential_ref is present, the derivation must point to a different source credential; it is not a runtime tool call or approval record.", ja: "オーケストレーターはまず継承した credential フィールドを検証し、その後 capability_name、任意の条件、利用上限を検証する。parent_credential_ref がある場合、導出先は別のソース credential でなければならず、ランタイムのツール呼出しや承認記録ではない。"}
  typical_input:
    - description: {zh: "完整的本地授权凭证字段与一项导出能力。", en: "Complete local authorization-credential fields and one export capability.", ja: "完全なローカル認可 credential フィールドと一つの export capability。"}
      format: '{"authorization_credential_id":"capability-1","holder_reference":"agent-001","authorized_scope":"workspace.export","effective_at":"2026-07-19T04:00:00Z","expires_at":"2026-07-19T04:30:00Z","verification_reference":"authz://capability-1","allow_decision_id":"allow-1","capability_name":"export.once","use_limit":1}'
      source_claims: [claim-local-capability-credential-profile]
  typical_output:
    - description: {zh: "保持凭证身份的受限能力凭证。", en: "A bounded capability credential retaining its credential identity.", ja: "credential ID を保持する制限付き capability credential。"}
      format: '{"authorization_credential_id":"capability-1","holder_reference":"agent-001","authorized_scope":"workspace.export","effective_at":"2026-07-19T04:00:00Z","expires_at":"2026-07-19T04:30:00Z","verification_reference":"authz://capability-1","allow_decision_id":"allow-1","parent_credential_ref":"credential-source-1","capability_name":"export.once","condition_reference":"condition:workspace-only","use_limit":1}'
      source_claims: [claim-local-capability-credential-profile]
  reference_implementations:
    - name: Model Context Protocol Authorization
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
      description: Documents protected-resource and scope constraints without defining this Moonweave-local credential subtype.
structure:
  identity_keys: [authorization_credential_id]
  fields:
    - id: authorization_credential_id
      labels: {zh: 授权凭证标识符, en: Authorization credential ID, ja: 認可クレデンシャル ID}
      definitions: {zh: "此能力凭证作为 AuthorizationCredential 子类型保留的稳定凭证标识符。", en: "Stable credential identifier retained by this AuthorizationCredential subtype.", ja: "この AuthorizationCredential サブタイプが保持する安定した credential 識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: capability-1
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: holder_reference
      labels: {zh: 凭证持有者引用, en: Credential holder reference, ja: クレデンシャル保持者参照}
      definitions: {zh: "继承的、经外部身份层验证的可使用此凭证主体引用。", en: "Inherited reference to the externally verified principal allowed to use this credential.", ja: "この credential を利用できる外部 ID 層で検証済みの主体への継承参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: agent-001
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: authorized_scope
      labels: {zh: 已授权范围, en: Authorized scope, ja: 認可済みスコープ}
      definitions: {zh: "继承的最小权限范围；capability_name 必须不超出该范围。", en: "Inherited least-privilege scope; capability_name must not exceed it.", ja: "継承した最小権限 scope。capability_name はこれを超えてはならない。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: workspace.export
      allowed_values: []
      source_claims: [claim-mcp-scope-boundary, claim-local-capability-credential-profile]
    - id: effective_at
      labels: {zh: 生效时间, en: Effective at, ja: 有効開始時刻}
      definitions: {zh: "继承的、本地验证器可接受该能力凭证的开始时间。", en: "Inherited time from which local verifiers may accept this capability credential.", ja: "ローカル verifier がこの capability credential を受け入れられる継承開始時刻。"}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T04:00:00Z'
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: expires_at
      labels: {zh: 到期时间, en: Expires at, ja: 失効時刻}
      definitions: {zh: "继承的、本地验证器必须停止接受该能力凭证的时间。", en: "Inherited time after which local verifiers must stop accepting this capability credential.", ja: "ローカル verifier がこの capability credential の受け入れを停止する継承時刻。"}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T04:30:00Z'
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: verification_reference
      labels: {zh: 验证引用, en: Verification reference, ja: 検証参照}
      definitions: {zh: "继承的、供本地验证器检查签发、撤销或密钥材料的非秘密引用。", en: "Inherited non-secret reference for local verification of issuance, revocation, or key material.", ja: "発行、撤回、鍵材料をローカルで検証するための継承した非秘密参照。"}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^authz://.+'
      example_value: authz://capability-1
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: allow_decision_id
      labels: {zh: 允许决定标识符, en: Allow decision ID, ja: 許可判断 ID}
      definitions: {zh: "继承的、作为此凭证签发依据的 AllowDecision 标识符。", en: "Inherited AllowDecision identifier used as this credential's issuance basis.", ja: "この credential の発行根拠となる継承した AllowDecision 識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: allow-1
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: parent_credential_ref
      labels: {zh: 源凭证引用, en: Source credential reference, ja: ソースクレデンシャル参照}
      definitions: {zh: "可选地引用一张不同的 AuthorizationCredential，作为此受限凭证的来源；它不是继承身份字段。", en: "Optional reference to a distinct AuthorizationCredential from which this bounded credential was derived; it is not the inherited identity field.", ja: "この制限付き credential の導出元となる別の AuthorizationCredential への任意参照。継承 ID フィールドではない。"}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: credential-source-1
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: capability_name
      labels: {zh: 能力名称, en: Capability name, ja: 能力名}
      definitions: {zh: "在已授权范围内允许的一项具体能力。", en: "One concrete capability permitted within authorized_scope.", ja: "authorized_scope 内で許可される一つの具体的な capability。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: export.once
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: condition_reference
      labels: {zh: 条件引用, en: Condition reference, ja: 条件参照}
      definitions: {zh: "可选的本地条件引用，进一步限制何时可使用该能力。", en: "Optional local condition reference further restricting when the capability may be used.", ja: "capability を利用できる時点をさらに制限する任意のローカル条件参照。"}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: condition:workspace-only
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
    - id: use_limit
      labels: {zh: 使用次数限制, en: Use limit, ja: 利用回数上限}
      definitions: {zh: "可选的最大使用次数，不得放宽继承凭证的限制。", en: "Optional maximum use count that cannot relax inherited credential restrictions.", ja: "継承 credential の制限を緩和できない任意の最大利用回数。"}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [claim-local-capability-credential-profile]
  constraints:
    - id: capability-credential-preserves-parent-contract
      severity: error
      expression_language: plain
      expression: A CapabilityCredential must retain one authorization_credential_id, holder_reference, authorized_scope, effective_at, expires_at after effective_at, verification_reference, allow_decision_id, and capability_name; capability_name, condition_reference, and use_limit may only narrow use. If parent_credential_ref is present, it must name a distinct source credential and must not replace inherited fields.
      explanation: {zh: "能力凭证是完整授权凭证的受限子类型，而不是通过父引用替代凭证合同的独立对象。", en: "A capability credential is a bounded subtype with the full credential contract, not an independent object whose parent reference replaces that contract.", ja: "capability credential は完全な credential 契約を持つ制限付きサブタイプであり、親参照でその契約を置き換える独立オブジェクトではない。"}
      source_claims: [claim-local-capability-credential-profile]
  required_relations: []
examples:
  - id: capability-credential-cedar
    labels:
      zh: 本地能力授权凭证 - Cedar 授权评估
      en: Local Capability Credential - Cedar authorization evaluation
      ja: ローカル能力認可クレデンシャル - Cedar 認可評価
    descriptions: {zh: "本地能力授权凭证(CapabilityCredential) [CapabilityCredential]: 将可验证授权凭证收窄到一项能力的本地凭证子类型。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: allow_decision_id, condition_reference, capability_name.", en: "Local Capability Credential (CapabilityCredential) [CapabilityCredential]: A local authorization-credential subtype narrowed to one capability.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include allow_decision_id, condition_reference, capability_name.", ja: "ローカル能力認可クレデンシャル(CapabilityCredential) [CapabilityCredential]: 一つの能力に狭められたローカル認可クレデンシャルのサブタイプ。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: allow_decision_id, condition_reference, capability_name."}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: capability-1
      authorized_scope: workspace.export
      capability_name: export.once
      condition_reference: "condition:workspace-only"
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      parent_credential_ref: credential-source-1
      use_limit: 1
      verification_reference: "authz://capability-1"
    related_node_ids:
      - CapabilityCredential
    related_relation_ids:
      - CapabilityCredential
      - claim-mcp-scope-boundary
    example_source: Amazon Cedar
    source_claims:
      - claim-mcp-scope-boundary
  - id: capability-credential-opa
    labels:
      zh: 本地能力授权凭证 - OPA Rego 策略评估
      en: Local Capability Credential - OPA Rego policy evaluation
      ja: ローカル能力認可クレデンシャル - OPA Rego ポリシー評価
    descriptions: {zh: "本地能力授权凭证(CapabilityCredential) [CapabilityCredential]: 将可验证授权凭证收窄到一项能力的本地凭证子类型。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: allow_decision_id, condition_reference, capability_name.", en: "Local Capability Credential (CapabilityCredential) [CapabilityCredential]: A local authorization-credential subtype narrowed to one capability.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include allow_decision_id, condition_reference, capability_name.", ja: "ローカル能力認可クレデンシャル(CapabilityCredential) [CapabilityCredential]: 一つの能力に狭められたローカル認可クレデンシャルのサブタイプ。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: allow_decision_id, condition_reference, capability_name."}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: capability-1
      authorized_scope: workspace.export
      capability_name: export.once
      condition_reference: "condition:workspace-only"
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      parent_credential_ref: credential-source-1
      use_limit: 1
      verification_reference: "authz://capability-1"
    related_node_ids:
      - CapabilityCredential
    related_relation_ids:
      - CapabilityCredential
      - claim-mcp-scope-boundary
    example_source: Open Policy Agent
    source_claims:
      - claim-mcp-scope-boundary
  - id: capability-credential-trustllm
    labels:
      zh: 本地能力授权凭证 - TrustLLM 六维可信度
      en: Local Capability Credential - TrustLLM six-dimension trust
      ja: ローカル能力認可クレデンシャル - TrustLLM 6次元信頼性
    descriptions: {zh: "本地能力授权凭证(CapabilityCredential) [CapabilityCredential]: 将可验证授权凭证收窄到一项能力的本地凭证子类型。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: allow_decision_id, condition_reference, capability_name.", en: "Local Capability Credential (CapabilityCredential) [CapabilityCredential]: A local authorization-credential subtype narrowed to one capability.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include allow_decision_id, condition_reference, capability_name.", ja: "ローカル能力認可クレデンシャル(CapabilityCredential) [CapabilityCredential]: 一つの能力に狭められたローカル認可クレデンシャルのサブタイプ。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: allow_decision_id, condition_reference, capability_name."}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: capability-1
      authorized_scope: workspace.export
      capability_name: export.once
      condition_reference: "condition:workspace-only"
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      parent_credential_ref: credential-source-1
      use_limit: 1
      verification_reference: "authz://capability-1"
    related_node_ids:
      - CapabilityCredential
    related_relation_ids:
      - CapabilityCredential
      - claim-mcp-scope-boundary
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-mcp-scope-boundary
  - id: capability-credential-decodingtrust
    labels:
      zh: 本地能力授权凭证 - DecodingTrust GPT 评估
      en: Local Capability Credential - DecodingTrust GPT assessment
      ja: ローカル能力認可クレデンシャル - DecodingTrust GPT 評価
    descriptions: {zh: "本地能力授权凭证(CapabilityCredential) [CapabilityCredential]: 将可验证授权凭证收窄到一项能力的本地凭证子类型。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: allow_decision_id, condition_reference, capability_name.", en: "Local Capability Credential (CapabilityCredential) [CapabilityCredential]: A local authorization-credential subtype narrowed to one capability.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include allow_decision_id, condition_reference, capability_name.", ja: "ローカル能力認可クレデンシャル(CapabilityCredential) [CapabilityCredential]: 一つの能力に狭められたローカル認可クレデンシャルのサブタイプ。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: allow_decision_id, condition_reference, capability_name."}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: capability-1
      authorized_scope: workspace.export
      capability_name: export.once
      condition_reference: "condition:workspace-only"
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      parent_credential_ref: credential-source-1
      use_limit: 1
      verification_reference: "authz://capability-1"
    related_node_ids:
      - CapabilityCredential
    related_relation_ids:
      - CapabilityCredential
      - claim-mcp-scope-boundary
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-mcp-scope-boundary
parent_relation:
  id: CapabilityCredential-is_a-AuthorizationCredential
  predicate: is_a
  target: local-profile:AuthorizationCredential
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是受限的本地授权凭证, en: is a bounded local authorization credential, ja: 制限付きローカル認可クレデンシャルである}
  definitions: {zh: "CapabilityCredential 保留 AuthorizationCredential 的完整身份和必填合同，仅增加收窄字段。", en: "CapabilityCredential retains the full identity and required contract of AuthorizationCredential and adds only narrowing fields.", ja: "CapabilityCredential は AuthorizationCredential の完全な ID と必須契約を保持し、制限フィールドだけを追加する。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: capability-credential-inherits-parent-contract
      expression_language: plain
      expression: Each CapabilityCredential retains the AuthorizationCredential identity and required fields, and its capability-specific values may only narrow authorized use.
      explanation: {zh: "继承不是通过指向另一条父实例记录来代替的。", en: "Inheritance is not substituted by a pointer to another parent-instance record.", ja: "継承は別の親インスタンス記録へのポインターで代替されない。"}
      source_claims: [claim-local-capability-credential-profile]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-local-capability-credential-profile]
relations:
