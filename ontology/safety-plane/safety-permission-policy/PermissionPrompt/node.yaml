      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 具有权限提示子类
        en: has permission-prompt subtype
        ja: 権限提示下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-permission-prompt-design
      - claim-permission-prompt-design
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    target: concept:Message
  - id: PermissionPrompt-presents-AuthorizationRequest
    predicate: presents
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 呈现授权请求
      en: presents authorization request
      ja: 認可要求を提示する
    definitions:
      zh: PermissionPrompt 向指定审批者呈现一个不经改写的 AuthorizationRequest；提示的文案和通道不得改变请求主体、动作、资源或参数摘要。
      en: A PermissionPrompt presents one unmodified AuthorizationRequest to a named reviewer; prompt wording and channel cannot change the request's principal, action, resource, or argument digest.
      ja: PermissionPrompt は一つの未変更 AuthorizationRequest を指定審査者へ提示し、文言や通道は要求の主体・操作・資源・引数ダイジェストを変えません。
