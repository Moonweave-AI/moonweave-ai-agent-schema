          en: prompt-42 has sender, receiver, channel, and content-envelope semantics and additionally binds request-42, allowed responses, and a five-minute expiry.
          ja: prompt-42 は送信者・受信者・通道・内容エンベロープを持ち、request-42、許容応答、五分期限を追加束縛します。
        field_values: {}
