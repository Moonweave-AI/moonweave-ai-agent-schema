schema: moonweave.ai/ontology-node/v1
id: PermissionPrompt
kind: concept
status: review
labels:
  zh: 权限提示
  en: permission prompt
  ja: 権限プロンプト
semantics:
  short_definition:
    zh: 向指定审批者呈现某个不可变授权请求及可选响应的审计记录。
    en: An auditable presentation of one immutable authorization request and allowed responses to a named reviewer.
    ja: 一つの不変認可要求と許容応答を指定審査者へ提示した監査記録です。
  definition:
    zh: 权限提示是 Message 的授权专用子类，继承 element_id 及消息信封身份，不另设 prompt 身份。它把同一消息绑定到 AuthorizationRequest、目标审批者、通道、展示与失效时间和允许响应选项；提示不改变请求语义，也不等于批准。同一请求可产生多个具有各自 element_id 的提示消息。
    en: A PermissionPrompt is an authorization-specific Message subtype that inherits element_id and the message-envelope identity rather than introducing a separate prompt identity. It binds that message to an AuthorizationRequest, intended reviewer, channel, presentation and expiry times, and allowed responses. It is not approval; one request may produce multiple prompt messages with distinct element_id values.
    ja: PermissionPrompt は認可専用 Message 下位型で、element_id と message envelope の同一性を継承し、別の prompt 同一性を導入しません。AuthorizationRequest、提示先、通道、提示・失効時刻、許容応答を束縛します。一要求から異なる element_id を持つ複数提示が生じ得ます。
  why_needed:
    zh: 该节点保留人机审批通道的呈现证据，同时把真正的授权问题留在 AuthorizationRequest，避免把 UI 文本当作权限。
    en: It preserves evidence of human-review presentation while leaving the authorization question in AuthorizationRequest, preventing UI text from being mistaken for authority.
    ja: 人間審査提示の証拠を保ちつつ認可問題を AuthorizationRequest に残し、UI 文言を権限と誤認しません。
  includes:
    - zh: 包含 Message 信封、提示标识、原请求引用、审批者、通道、展示时间、失效时间和允许响应。
      en: Includes the Message envelope, prompt identity, original request reference, reviewer, channel, presentation time, expiry, and allowed responses.
      ja: Message エンベロープ、提示識別子、元要求参照、審査者、通道、提示時刻、失効時刻、許容応答を含みます。
  excludes:
    - zh: 不包含授权请求本体、PermissionResponse、HumanApproval、PolicyDecision 或实际门控结果。
      en: Excludes the request itself, PermissionResponse, HumanApproval, PolicyDecision, or actual gate outcome.
      ja: 要求自体、PermissionResponse、HumanApproval、PolicyDecision、実ゲート結果を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: authorization_request_ref
      labels:
        zh: 授权请求引用
        en: authorization request reference
        ja: 認可要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示所呈现的不可变请求。
        en: Immutable request presented by the prompt.
        ja: 提示が示す不変要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-permission-prompt-001
        - claim-permission-prompt-002
    - id: presented_to
      labels:
        zh: 呈现对象
        en: presented to
        ja: 提示先
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有资格响应提示的审批主体。
        en: Review principal eligible to answer the prompt.
        ja: 提示へ応答する資格を持つ審査主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-permission-prompt-001
        - claim-permission-prompt-002
    - id: channel
      labels:
        zh: 提示通道
        en: prompt channel
        ja: 提示通道
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 承载提示与响应的可审计通道。
        en: Auditable channel carrying the prompt and response.
        ja: 提示と応答を運ぶ監査可能な通道です。
      allowed_values: []
      pattern: null
      example_value: desktop-approval
      source_claims:
        - claim-permission-prompt-001
        - claim-permission-prompt-002
    - id: presented_at
      labels:
        zh: 呈现时间
        en: presented at
        ja: 提示時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示向审批者可见的 UTC 时刻。
        en: UTC instant when the prompt became visible to the reviewer.
        ja: 提示が審査者へ見えるようになった UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:05Z
      source_claims:
        - claim-permission-prompt-001
        - claim-permission-prompt-002
    - id: expires_at
      labels:
        zh: 失效时间
        en: expires at
        ja: 失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示不再接受有效响应的时刻。
        en: Instant after which the prompt accepts no valid response.
        ja: 提示が有効応答を受け付けなくなる時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-permission-prompt-001
        - claim-permission-prompt-002
    - id: allowed_responses
      labels:
        zh: 允许响应
        en: allowed responses
        ja: 許容応答
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 审批者可提交的受控响应集合。
        en: Controlled response set available to the reviewer.
        ja: 審査者が提出できる制御応答集合です。
      allowed_values: []
      pattern: null
      example_value:
        - approve
        - deny
      source_claims:
        - claim-permission-prompt-001
        - claim-permission-prompt-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PermissionPrompt-example-positive-manual-001
    kind: positive
    labels:
      zh: 权限提示正例
      en: Positive permission prompt case
      ja: 権限プロンプトの正例
    scenario_id: null
    descriptions:
      zh: prompt-42 在桌面审批通道向 human:owner-7 呈现 request-42 的主体、工具、参数摘要和范围，只允许 approve 或 deny，并在五分钟后失效。
      en: prompt-42 presents request-42's principal, tool, argument digest, and scope to human:owner-7 over the desktop approval channel, permits only approve or deny, and expires after five minutes.
      ja: prompt-42 は desktop approval 通道で human:owner-7 に request-42 の主体、ツール、引数ダイジェスト、範囲を提示し、approve/deny のみ許し五分後に失効します。
    field_values:
      element_id: permission-prompt-42
      conversation_id: authorization-conversation/request-42
      sequence_index: 1
      message_role: authorization-request
      sender_id: authorization-service
      authorization_request_ref: request-42
      presented_to: human:owner-7
      channel: desktop-approval
      presented_at: 2026-07-16T01:20:05Z
      expires_at: 2026-07-16T01:25:00Z
      allowed_responses:
        - approve
        - deny
    related_node_ids:
      - PermissionPrompt
      - AuthorizationRequest
      - PermissionResponse
    related_relation_ids:
      - PermissionPrompt-presents-AuthorizationRequest
      - PermissionResponse-responds_to-PermissionPrompt
    expected_result:
      zh: 提示可回指原请求，后续响应必须引用 prompt-42 且在期限内。
      en: The prompt points to the original request, and any response must reference prompt-42 within its validity window.
      ja: 提示は元要求へ戻り、後続応答は期限内に prompt-42 を参照しなければなりません。
    why_valid_or_invalid:
      zh: 呈现身份与请求身份分开，提示没有自行产生批准。
      en: Presentation identity is separate from request identity, and the prompt does not manufacture approval.
      ja: 提示同一性は要求同一性と分離され、提示だけで承認を生成しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-permission-prompt-001
      - claim-permission-prompt-002
  - id: PermissionPrompt-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 权限提示边界反例
      en: Boundary counterexample for permission prompt
      ja: 権限プロンプトの境界反例
    scenario_id: null
    descriptions:
      zh: 聊天消息“可以吗？”没有绑定 request_id、审批者、有效期和受控响应，因此只是普通消息，不是 PermissionPrompt。
      en: A chat message saying 'okay?' has no request_id, eligible reviewer, expiry, or controlled responses, so it is an ordinary message rather than a PermissionPrompt.
      ja: チャット文『よいですか』は request_id、審査者、期限、制御応答を持たず、通常メッセージであって PermissionPrompt ではありません。
    field_values: {}
    related_node_ids:
      - PermissionPrompt
      - AuthorizationRequest
      - Message
    related_relation_ids:
      - PermissionPrompt-presents-AuthorizationRequest
    expected_result:
      zh: 该消息不能进入授权审批链，也不能解除 ToolApprovalGate。
      en: The message cannot enter the authorization approval chain or release a ToolApprovalGate.
      ja: メッセージは認可承認連鎖へ入らず ToolApprovalGate を解除できません。
    why_valid_or_invalid:
      zh: 自然语言相似不构成有身份、有时限且绑定请求的审批呈现。
      en: Similar wording does not create an identified, time-bounded presentation bound to a request.
      ja: 類似文言だけでは要求に束縛された識別・期限付き提示になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-permission-prompt-001
      - claim-permission-prompt-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PermissionResponse
    shared_parent_concept_id: Message
    differentia:
      zh: PermissionPrompt 从系统向审批者呈现请求与允许回答；PermissionResponse 从响应者返回一个受控回答并引用原提示。方向、身份键和有效期职责不同。
      en: PermissionPrompt presents a request and allowed answers from system to reviewer; PermissionResponse returns one controlled answer from responder and references the prompt. Direction, identity key, and validity responsibility differ.
      ja: PermissionPrompt はシステムから審査者へ要求・許容回答を提示し、PermissionResponse は応答者から制御回答を返し元提示を参照します。方向・識別キー・有効期責務が異なります。
    source_claims:
      - claim-permission-prompt-001
parent_relation: null
