          ja: 認可要求を提示するの正例
        descriptions:
          zh: prompt-42 呈现 request-42 的完整只读搜索请求，并显示 request_id 和参数摘要。
          en: prompt-42 presents the complete read-only search request-42 including request_id and argument digest.
          ja: prompt-42 は request_id と引数ダイジェストを含む完全な読取専用検索 request-42 を提示します。
        field_values: {}
        related_node_ids:
