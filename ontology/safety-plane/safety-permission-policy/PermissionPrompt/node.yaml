  - id: permission-prompt-openai_hitl
    labels:
      zh: 权限提示 - OpenAI Agents SDK 人工审批
      en: permission prompt - OpenAI Agents SDK human approval
      ja: 権限プロンプト - OpenAI Agents SDK 人手承認
    descriptions: {zh: "权限提示(PermissionPrompt) [PermissionPrompt]: 向指定审批者呈现某个不可变授权请求及可选响应的审计记录。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: presented_to, channel, expires_at.", en: "permission prompt (PermissionPrompt) [PermissionPrompt]: An auditable presentation of one immutable authorization request and allowed responses to a named reviewer.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include presented_to, channel, expires_at.", ja: "権限プロンプト(PermissionPrompt) [PermissionPrompt]: 一つの不変認可要求と許容応答を指定審査者へ提示した監査記録です。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: presented_to, channel, expires_at."}
    field_values:
      authorization_request_ref: request-42
      channel: desktop-approval
      expires_at: "2026-07-16T01:25:00Z"
      presented_at: "2026-07-16T01:20:05Z"
