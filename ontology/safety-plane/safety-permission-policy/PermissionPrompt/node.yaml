      ja: 権限プロンプト - Cedar 認可評価
    descriptions: {zh: "权限提示(PermissionPrompt) [PermissionPrompt]: 向指定审批者呈现某个不可变授权请求及可选响应的审计记录。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: presented_to, channel, expires_at.", en: "permission prompt (PermissionPrompt) [PermissionPrompt]: An auditable presentation of one immutable authorization request and allowed responses to a named reviewer.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include presented_to, channel, expires_at.", ja: "権限プロンプト(PermissionPrompt) [PermissionPrompt]: 一つの不変認可要求と許容応答を指定審査者へ提示した監査記録です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: presented_to, channel, expires_at."}
