      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: presented_by
      labels:
        zh: 由提示呈现
        en: is presented by
        ja: 提示によって示される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-permission-prompt-design
      - claim-permission-prompt-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AuthorizationRequest
