          en: The presented object can be checked by request_id against later evaluation.
          ja: 提示対象を request_id で後続評価と整合検査できます。

          en: The prompt is a presentation record, not a new authorization request.
          ja: 提示は要求の提示記録で新認可要求ではありません。
