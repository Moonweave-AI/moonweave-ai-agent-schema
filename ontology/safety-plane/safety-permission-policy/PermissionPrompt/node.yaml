    descriptions: {zh: "权限提示(PermissionPrompt) [PermissionPrompt]: 向指定审批者呈现某个不可变授权请求及可选响应的审计记录。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: presented_to, channel, expires_at.", en: "permission prompt (PermissionPrompt) [PermissionPrompt]: An auditable presentation of one immutable authorization request and allowed responses to a named reviewer.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include presented_to, channel, expires_at.", ja: "権限プロンプト(PermissionPrompt) [PermissionPrompt]: 一つの不変認可要求と許容応答を指定審査者へ提示した監査記録です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: presented_to, channel, expires_at."}
    field_values:
