          en: request-42 is the authorization question to evaluate; even if serialized for transport, it is not the PermissionPrompt that presents it to a reviewer.
          ja: request-42 は評価対象認可問題で、送信用に直列化されても審査者へ提示する PermissionPrompt ではありません。
        field_values: {}
        related_node_ids:
          - PermissionPrompt
