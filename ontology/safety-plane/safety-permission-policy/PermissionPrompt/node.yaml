sibling_differentiation:
  - sibling_concept_id: PermissionResponse
    shared_parent_concept_id: Message
    differentia:
      zh: PermissionPrompt 从系统向审批者呈现请求与允许回答；PermissionResponse 从响应者返回一个受控回答并引用原提示。方向、身份键和有效期职责不同。
      en: PermissionPrompt presents a request and allowed answers from system to reviewer; PermissionResponse returns one controlled answer from responder and references the prompt. Direction, identity key, and validity responsibility differ.
      ja: PermissionPrompt はシステムから審査者へ要求・許容回答を提示し、PermissionResponse は応答者から制御回答を返し元提示を参照します。方向・識別キー・有効期責務が異なります。
    source_claims:
      - claim-permission-prompt-001
parent_relation: null
relations:
  - id: PermissionPrompt-is_a-Message
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种消息
      en: is a message
      ja: メッセージの一種である
    definitions:
      zh: PermissionPrompt 是 Message 的授权专用子类：它保留可观察通信信封，并以呈现一个不可变 AuthorizationRequest、指定审批者、受控响应集合和失效时间作为种差。
      en: PermissionPrompt is an authorization-specific subtype of Message. It retains the observable communication envelope and is distinguished by presenting one immutable AuthorizationRequest to a named reviewer with controlled responses and expiry.
      ja: PermissionPrompt は Message の認可専用下位型です。観測可能通信エンベロープを保持し、一つの不変 AuthorizationRequest を指定審査者へ制御応答・期限付きで提示する種差を持ちます。
