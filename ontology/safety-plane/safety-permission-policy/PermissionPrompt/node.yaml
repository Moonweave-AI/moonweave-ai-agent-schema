    descriptions: {zh: "权限提示(PermissionPrompt) [PermissionPrompt]: 向指定审批者呈现某个不可变授权请求及可选响应的审计记录。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: presented_to, channel, expires_at.", en: "permission prompt (PermissionPrompt) [PermissionPrompt]: An auditable presentation of one immutable authorization request and allowed responses to a named reviewer.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include presented_to, channel, expires_at.", ja: "権限プロンプト(PermissionPrompt) [PermissionPrompt]: 一つの不変認可要求と許容応答を指定審査者へ提示した監査記録です。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: presented_to, channel, expires_at."}
