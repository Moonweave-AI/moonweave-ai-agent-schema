      en: A PermissionPrompt presents one unmodified AuthorizationRequest to a named reviewer; prompt wording and channel cannot change the request's principal, action, resource, or argument digest.
      ja: PermissionPrompt は一つの未変更 AuthorizationRequest を指定審査者へ提示し、文言や通道は要求の主体・操作・資源・引数ダイジェストを変えません。
