schema: moonweave.ai/ontology-node/v1
id: PermissionPrompt
kind: concept
labels:
  zh: 权限提示
  en: permission prompt
  ja: 権限プロンプト
semantics:
  short_definition:
    zh: 向指定审批者呈现不可变 AuthorizationRequest 与允许响应选项的审计记录。
    en: An auditable record presenting one immutable AuthorizationRequest and allowed response options to a named reviewer.
    ja: 指定審査者へ immutable AuthorizationRequest と許容応答选项を提示した監査記録。
  definition:
    zh: PermissionPrompt 是 Message 的授权专用子类，继承 element_id，绑定 authorization_request_ref、presented_to、channel、presented_at、expires_at 与 allowed_responses。它映射 Cursor "Cursor wants to run X" 对话框、Claude Code "Allow tool?" 提示与 MCP requireApproval 人工门控前的呈现层；不是批准本身，也不改变请求语义。
    en: PermissionPrompt is an authorization-specific Message subtype inheriting element_id, binding authorization_request_ref, presented_to, channel, presented_at, expires_at, and allowed_responses. It maps Cursor "Cursor wants to run X" dialogs, Claude Code "Allow tool?" prompts, and presentation before MCP requireApproval human gates; it is not approval and does not alter request semantics.
    ja: PermissionPrompt は Message 認可 subtype で element_id 継承、authorization_request_ref/presented_to/channel/presented_at/expires_at/allowed_responses を束縛。Cursor wants to run X、Claude Allow tool?、MCP requireApproval 前 presentation を写像。approval ではなく request 意味変更なし。
  why_needed:
    zh: 必须把呈现证据与 AuthorizationRequest 分开，否则 UI 文案会被误当作权限范围。
    en: Presentation evidence must be separated from AuthorizationRequest or UI copy is mistaken for authority scope.
    ja: presentation 証拠を AuthorizationRequest から分離しないと UI 文案が authority scope と誤認されます。
  includes:
    - zh: 包含 Message 信封、提示标识、原请求引用、审批者、通道、展示时间、失效时间和允许响应。
      en: Includes the Message envelope, prompt identity, original request reference, reviewer, channel, presentation time, expiry, and allowed responses.
      ja: Message エンベロープ、提示識別子、元要求参照、審査者、通道、提示時刻、失効時刻、許容応答を含みます。
  excludes:
    - zh: 不包含授权请求本体、PermissionResponse、HumanApproval、PolicyDecision 或实际门控结果。
      en: Excludes the request itself, PermissionResponse, HumanApproval, PolicyDecision, or actual gate outcome.
      ja: 要求自体、PermissionResponse、HumanApproval、PolicyDecision、実ゲート結果を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Cursor terminal 拦截未列命令时生成 PermissionPrompt；Claude Code 在 default 模式对 Bash/MCP 生成 Allow tool?；MCP tool annotation requireApproval=true 时由 host 呈现。保留 prompt_ref 与 expires_at；响应必须引用原 prompt。
    en: Cursor terminal generates PermissionPrompt when blocking unlisted commands; Claude Code default mode shows Allow tool? for Bash/MCP; MCP tool annotation requireApproval=true triggers host presentation. Retain prompt ref and expires_at; responses must reference the prompt.
    ja: Cursor が未登録 command で PermissionPrompt 生成。Claude default で Bash/MCP に Allow tool?。MCP requireApproval=true で host presentation。prompt ref/expires_at 保持、response は prompt 参照必須。
  typical_input:
    - description: Cursor wants to run dialog.
      format: "channel: desktop-approval; command: npm test; allowed: [approve, deny]"
      source_claims:
        - claim-permission-prompt-design
    - description: Claude Allow tool prompt.
      format: "tool: Bash; command digest; allowed: [yesAllow, deny, allowForSession]"
      source_claims:
        - claim-permission-prompt-design
  typical_output:
    - description: PermissionPrompt bound to request.
      format: '{"element_id":"permission-prompt-42","authorization_request_ref":"request-42","expires_at":"2026-07-16T01:25:00Z"}'
      source_claims:
        - claim-permission-prompt-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys: []
  fields:
    - id: authorization_request_ref
      labels:
        zh: 授权请求引用
        en: authorization request reference
        ja: 認可要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示所呈现的不可变请求。
        en: Immutable request presented by the prompt.
        ja: 提示が示す不変要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-permission-prompt-design
        - claim-permission-prompt-design
    - id: presented_to
      labels:
        zh: 呈现对象
        en: presented to
        ja: 提示先
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有资格响应提示的审批主体。
        en: Review principal eligible to answer the prompt.
        ja: 提示へ応答する資格を持つ審査主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-permission-prompt-design
        - claim-permission-prompt-design
    - id: channel
      labels:
        zh: 提示通道
        en: prompt channel
        ja: 提示通道
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 承载提示与响应的可审计通道。
        en: Auditable channel carrying the prompt and response.
        ja: 提示と応答を運ぶ監査可能な通道です。
      allowed_values: []
      pattern: null
      example_value: desktop-approval
      source_claims:
        - claim-permission-prompt-design
        - claim-permission-prompt-design
    - id: presented_at
      labels:
        zh: 呈现时间
        en: presented at
        ja: 提示時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示向审批者可见的 UTC 时刻。
        en: UTC instant when the prompt became visible to the reviewer.
        ja: 提示が審査者へ見えるようになった UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:05Z
      source_claims:
        - claim-permission-prompt-design
        - claim-permission-prompt-design
    - id: expires_at
      labels:
        zh: 失效时间
        en: expires at
        ja: 失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示不再接受有效响应的时刻。
        en: Instant after which the prompt accepts no valid response.
        ja: 提示が有効応答を受け付けなくなる時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-permission-prompt-design
        - claim-permission-prompt-design
    - id: allowed_responses
      labels:
        zh: 允许响应
        en: allowed responses
        ja: 許容応答
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 审批者可提交的受控响应集合。
        en: Controlled response set available to the reviewer.
        ja: 審査者が提出できる制御応答集合です。
      allowed_values: []
      pattern: null
      example_value:
        - approve
        - deny
      source_claims:
        - claim-permission-prompt-design
        - claim-permission-prompt-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PermissionPrompt-cursor-wants-run
    labels:
      zh: Cursor wants to run 提示
      en: Cursor wants to run prompt
      ja: Cursor wants to run 提示
    descriptions:
      zh: prompt-55 在 desktop-approval 向 human:owner-7 呈现 request-55 的 npm test 命令摘要，五分钟后失效。
      en: prompt-55 presents request-55 npm test command digest to human:owner-7 on desktop-approval, expiring in five minutes.
      ja: prompt-55 が desktop-approval で human:owner-7 に npm test digest を提示、5 分後失効。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: wants to run X
    field_values:
      element_id: permission-prompt-55
      authorization_request_ref: request-55
      presented_to: human:owner-7
      channel: desktop-approval
      allowed_responses:
        - approve
        - deny
    related_node_ids:
      - PermissionPrompt
      - AuthorizationRequest
    related_relation_ids:
      - PermissionPrompt-presents-AuthorizationRequest
    source_claims:
      - claim-permission-prompt-design
  - id: PermissionPrompt-claude-allow-tool
    labels:
      zh: Claude Allow tool 提示
      en: Claude Allow tool prompt
      ja: Claude Allow tool 提示
    descriptions:
      zh: prompt-61 呈现 Claude Allow tool? 对 Bash 写入 /etc/passwd 的请求，允许 yesAllow/deny/allowForSession。
      en: prompt-61 presents Claude Allow tool? for Bash writing /etc/passwd, allowing yesAllow/deny/allowForSession.
      ja: prompt-61 が Bash /etc/passwd 書込 request を Allow tool? で提示。yesAllow/deny/allowForSession。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: Allow tool?
    field_values:
      element_id: permission-prompt-61
      authorization_request_ref: request-61
      allowed_responses:
        - yesAllow
        - deny
        - allowForSession
    related_node_ids:
      - PermissionPrompt
      - ToolApprovalGate
    related_relation_ids: []
    source_claims:
      - claim-permission-prompt-design
  - id: PermissionPrompt-mcp-require-approval
    labels:
      zh: MCP requireApproval 提示
      en: MCP requireApproval prompt
      ja: MCP requireApproval 提示
    descriptions:
      zh: MCP tool payments_api 标注 requireApproval=true；host 生成 prompt-mcp-118 呈现 scope 与参数摘要。
      en: MCP tool payments_api annotated requireApproval=true; host generates prompt-mcp-118 presenting scope and argument digest.
      ja: MCP payments_api requireApproval=true。host が prompt-mcp-118 で scope/引数 digest 提示。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: tool annotations
    field_values:
      element_id: permission-prompt-mcp-118
      authorization_request_ref: request-mcp-118
      channel: mcp-host-approval
    related_node_ids:
      - PermissionPrompt
      - AuthorizationRequest
    related_relation_ids: []
    source_claims:
      - claim-permission-prompt-design
  - id: PermissionPrompt-boundary-chat
    labels:
      zh: 聊天消息不是提示
      en: Chat message is not prompt
      ja: chat message は提示ではない
    descriptions:
      zh: 聊天"可以吗？"无 request_id、审批者与 expires_at，只是普通 Message。
      en: Chat "okay?" lacks request_id, reviewer, and expires_at; it is an ordinary Message.
      ja: チャット「よいですか」に request_id/審査者/expires_at なし。通常 Message。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: excessive agency
    field_values: {}
    related_node_ids:
      - PermissionPrompt
      - Message
    related_relation_ids: []
    source_claims:
      - claim-permission-prompt-design
parent_relation: null
relations:
  - id: PermissionPrompt-is_a-Message
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种消息
      en: is a message
      ja: メッセージの一種である
    definitions:
      zh: PermissionPrompt 是 Message 的授权专用子类：它保留可观察通信信封，并以呈现一个不可变 AuthorizationRequest、指定审批者、受控响应集合和失效时间作为种差。
      en: PermissionPrompt is an authorization-specific subtype of Message. It retains the observable communication envelope and is distinguished by presenting one immutable AuthorizationRequest to a named reviewer with controlled responses and expiry.
      ja: PermissionPrompt は Message の認可専用下位型です。観測可能通信エンベロープを保持し、一つの不変 AuthorizationRequest を指定審査者へ制御応答・期限付きで提示する種差を持ちます。
    cardinality: null
    cardinality_not_applicable_reason:
