          en: The request retains AuthorizationRequest identity; only a separate presentation record belongs to this Message subtype.
          ja: 要求は AuthorizationRequest 同一性を保ち、独立提示記録だけがこの Message 下位型に属します。

          en: A transport payload and an auditable presentation record are different business objects.
          ja: 伝送 payload と監査可能提示記録は別業務対象です。
        source_claims:
