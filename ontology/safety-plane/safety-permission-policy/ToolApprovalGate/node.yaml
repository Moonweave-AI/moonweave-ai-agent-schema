  - id: ToolApprovalGate-is_a-Gate
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种门控能力
      en: is a gate capability
      ja: ゲート能力の一種である
    definitions:
      zh: ToolApprovalGate 是 Gate 的领域子类：它继承在控制点评估证据并产生 release、pause 或 block 结果的能力，并以工具调用尝试、PolicyDecision、AuthorizationGrant 和参数摘要的严格绑定作为种差。
      en: ToolApprovalGate is a domain subtype of Gate. It inherits the capability to evaluate evidence at a control point and produce release, pause, or block, and is distinguished by strict binding of a tool-call attempt to PolicyDecision, AuthorizationGrant, and argument digest.
      ja: ToolApprovalGate は Gate の領域下位型です。制御点で証拠を評価し release・pause・block を生じる能力を継承し、ツール呼出試行を PolicyDecision・AuthorizationGrant・引数ダイジェストへ厳密束縛する種差を持ちます。
