      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: enforced_by_gate
      labels:
        zh: 由工具门执行
        en: is enforced by tool gate
        ja: ツールゲートに執行される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
