      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: grant_ref
      labels:
        zh: 授予引用
        en: grant reference
        ja: 付与参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 需要持续授权时所验证的 AuthorizationGrant。
        en: AuthorizationGrant verified when continuing authority is required.
        ja: 持続権限が必要な場合に検証する AuthorizationGrant です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 防止批准后工具参数被替换的不可变摘要。
        en: Immutable digest preventing tool arguments from changing after approval.
        ja: 承認後のツール引数差替えを防ぐ不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:args42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: state
      labels:
        zh: 门状态
        en: gate state
        ja: ゲート状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前是 pending、released 还是 blocked。
        en: Whether the gate is pending, released, or blocked.
        ja: 現在 pending・released・blocked のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: released
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: evaluated_at
      labels:
        zh: 门评估时间
        en: evaluated at
        ja: ゲート評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 门验证决定和授予的 UTC 时刻。
        en: UTC instant when the gate validated decision and grant.
        ja: ゲートが判断と付与を検証した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:05Z
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: reason
      labels:
        zh: 门控原因
        en: gate reason
        ja: ゲート理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释 release、pause 或 block 的依据。
        en: Explains the basis for release, pause, or block.
        ja: release・pause・block の根拠を説明します。
      allowed_values: []
      pattern: null
      example_value: decision and grant match attempt
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
  constraints: []
  required_relation_constraints: []
