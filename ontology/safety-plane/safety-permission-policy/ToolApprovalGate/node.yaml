      ja: ポリシー判断を執行する
    definitions:
      zh: ToolApprovalGate 对一个具体尝试落实 PolicyDecision 的 allow、deny 或 defer，并先校验请求与参数摘要一致；门控不生成或修改决定。
      en: A ToolApprovalGate enforces a PolicyDecision's allow, deny, or defer for one concrete attempt after checking request and argument-digest identity; the gate neither produces nor mutates the decision.
      ja: ToolApprovalGate は要求・引数ダイジェスト一致確認後、一具体試行へ PolicyDecision の allow・deny・defer を執行し、判断を生成・変更しません。
