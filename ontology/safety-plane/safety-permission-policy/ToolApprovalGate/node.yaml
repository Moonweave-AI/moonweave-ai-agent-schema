schema: moonweave.ai/ontology-node/v1
id: ToolApprovalGate
kind: concept
labels:
  zh: 工具授权门
  en: tool authorization gate
  ja: ツール認可ゲート
semantics:
  short_definition:
    zh: 在工具调用控制点验证决定、grant 与请求一致后 release/pause/block 的门控能力。
    en: A gate capability that release/pause/blocks at a tool-call control point after verifying decision, grant, and request alignment.
    ja: tool call 制御点で decision/grant/request 整合検証後 release/pause/block する gate capability。
  definition:
    zh: ToolApprovalGate 以 gate_id+version 定义工具尝试控制点语义，每次应用绑定 ToolCallAttempt，验证 PolicyDecision 与有效 AuthorizationGrant 及 argument_digest 完全匹配。它映射 Claude Code yesAllow/allowForSession 执行前检查、MCP requireApproval host 门控与 Cursor sandbox 命令 spawn 前验证；执行授权结果但不生成 PolicyDecision。
    en: ToolApprovalGate defines tool-attempt control-point semantics via gate_id+version; each application binds a ToolCallAttempt and verifies PolicyDecision, effective AuthorizationGrant, and argument_digest exact match. It maps Claude Code yesAllow/allowForSession pre-execution checks, MCP requireApproval host gates, and Cursor sandbox pre-spawn command verification; it enforces authorization output but does not produce PolicyDecision.
    ja: ToolApprovalGate は gate_id+version で tool attempt 制御点 semantics を定義。ToolCallAttempt 绑定し PolicyDecision/有効 AuthorizationGrant/argument_digest 完全一致を検証。Claude yesAllow/allowForSession、MCP requireApproval host gate、Cursor sandbox pre-spawn を写像。authorization 結果を enforce するが PolicyDecision 生成しない。
  why_needed:
    zh: 决定与执行之间的最后检查必须显式；否则 defer 解除后无 grant 的 attempt 仍会运行。
    en: The final check between decision and execution must be explicit or attempts run after defer clearance without grant.
    ja: decision と execution 間の最終検査を明示しないと defer 解除後 grant なし attempt が実行されます。
  includes:
    - zh: 包含门标识、尝试引用、决定引用、授予引用、参数摘要、门状态、评估时间和原因。
      en: Includes gate identity, attempt, decision and grant references, argument digest, gate state, evaluation time, and reason.
      ja: ゲート識別子、試行・判断・付与参照、引数ダイジェスト、状態、評価時刻、理由を含みます。
  excludes:
    - zh: 不包含 PolicyEvaluation、工具定义、调用执行、工具结果或业务路由选择。
      en: Excludes PolicyEvaluation, tool definition, invocation execution, tool result, or business routing choice.
      ja: PolicyEvaluation、ツール定義、呼出実行、ツール結果、業務経路選択を含みません。
  semantic_kind: capability
  aliases: []
engineering:
  explanation:
    zh: "gate state: release|pause|block；pause 对应 DeferDecision 或待 grant；block 对应 DenyDecision；release 需 AllowDecision+有效 grant+摘要匹配。MCP host 在 tools/call 前运行 gate；Claude 在 Bash spawn 前；Cursor 在 terminal spawn 前。"
    en: Gate states release|pause|block; pause for DeferDecision or pending grant; block for DenyDecision; release requires AllowDecision+valid grant+digest match. MCP host runs gate before tools/call; Claude before Bash spawn; Cursor before terminal spawn.
    ja: gate state release|pause|block。pause=DeferDecision/pending grant。block=DenyDecision。release=AllowDecision+valid grant+digest match。MCP tools/call 前、Claude Bash spawn 前、Cursor terminal spawn 前に gate。
  typical_input:
    - description: Claude yesAllow gate check.
      format: verify HumanApproval + AllowDecision + grant scope before Bash spawn
      source_claims:
        - claim-tool-approval-gate-design
    - description: MCP requireApproval host gate.
      format: tools/call blocked until defer cleared and grant valid
      source_claims:
        - claim-tool-approval-gate-design
  typical_output:
    - description: Gate evaluation record.
      format: '{"gate_id":"tool-gate-42","gate_state":"release","attempt_ref":"attempt-42","decision_ref":"decision-42","grant_ref":"grant-42"}'
      source_claims:
        - claim-tool-approval-gate-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
