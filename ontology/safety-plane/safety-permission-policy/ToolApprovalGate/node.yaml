      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前是 pending、released 还是 blocked。
        en: Whether the gate is pending, released, or blocked.
        ja: 現在 pending・released・blocked のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: released
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: evaluated_at
      labels:
        zh: 门评估时间
        en: evaluated at
        ja: ゲート評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 门验证决定和授予的 UTC 时刻。
        en: UTC instant when the gate validated decision and grant.
        ja: ゲートが判断と付与を検証した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:05Z
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: reason
      labels:
        zh: 门控原因
        en: gate reason
        ja: ゲート理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释 release、pause 或 block 的依据。
        en: Explains the basis for release, pause, or block.
        ja: release・pause・block の根拠を説明します。
      allowed_values: []
      pattern: null
      example_value: decision and grant match attempt
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
  constraints: []
  required_relation_constraints: []
