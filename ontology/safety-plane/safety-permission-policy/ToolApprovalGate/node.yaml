schema: moonweave.ai/ontology-node/v1
id: ToolApprovalGate
kind: concept
status: review
labels:
  zh: 工具授权门
  en: tool authorization gate
  ja: ツール認可ゲート
semantics:
  short_definition:
    zh: 在工具调用控制点验证决定、请求快照和授权范围后释放、暂停或阻断尝试的 Gate 能力。
    en: A Gate capability that releases, pauses, or blocks an attempt after validating its decision, request snapshot, and authority scope at a tool-call control point.
    ja: ツール呼出制御点で判断・要求スナップショット・権限範囲を検証し、試行を解放・停止・阻断する Gate 能力です。
  definition:
    zh: 工具授权门是 Gate 的领域专用能力，由 gate_id 与 version 识别并定义工具调用控制点的验证语义。每次应用把该能力绑定一个 ToolCallAttempt，验证尝试的主体、工具、参数摘要和动作与 PolicyDecision 及有效 AuthorizationGrant 完全匹配，再决定 release、pause 或 block。它执行授权结果但不生成 PolicyDecision，也不保证获准尝试最终成功。
    en: A ToolApprovalGate is a domain-specific Gate capability identified by gate_id and version and defining validation semantics at a tool-call control point. Each application binds the capability to one ToolCallAttempt, verifies that the attempt's principal, tool, argument digest, and action exactly match its PolicyDecision and effective AuthorizationGrant, and then releases, pauses, or blocks it. It enforces authorization output but does not produce a PolicyDecision or guarantee that a released attempt succeeds.
    ja: ToolApprovalGate は gate_id と version で識別されツール呼出制御点の検証意味を定める Gate の領域専用能力です。各適用は能力を一つの ToolCallAttempt へ束縛し、主体・ツール・引数ダイジェスト・操作が PolicyDecision と有効 AuthorizationGrant に一致するか検証して release・pause・block を決めます。判断を生成せず、解放試行の成功も保証しません。
  why_needed:
    zh: 该节点把策略决定与实际执行之间的最后检查显式化，修正旧 PolicyDecision-governs-Execution 对整个 Execution 的过宽关系。
    en: It makes the final decision-to-execution check explicit and replaces the overbroad PolicyDecision-governs-Execution relation over an entire Execution.
    ja: 判断から実行への最終検査を明示し、Execution 全体へ広すぎた PolicyDecision-governs-Execution を置換します。
  includes:
    - zh: 包含门标识、尝试引用、决定引用、授予引用、参数摘要、门状态、评估时间和原因。
      en: Includes gate identity, attempt, decision and grant references, argument digest, gate state, evaluation time, and reason.
      ja: ゲート識別子、試行・判断・付与参照、引数ダイジェスト、状態、評価時刻、理由を含みます。
  excludes:
    - zh: 不包含 PolicyEvaluation、工具定义、调用执行、工具结果或业务路由选择。
      en: Excludes PolicyEvaluation, tool definition, invocation execution, tool result, or business routing choice.
      ja: PolicyEvaluation、ツール定義、呼出実行、ツール結果、業務経路選択を含みません。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - gate_id
    - version
  fields:
    - id: gate_id
      labels:
        zh: 门标识
        en: gate ID
        ja: ゲートID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一个工具尝试的授权门。
        en: Stable identifier for one tool-attempt authorization gate.
        ja: 一つのツール試行認可ゲートを安定識別します。
      allowed_values: []
      pattern: null
      example_value: tool-gate-42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: version
      labels:
        zh: 门版本
        en: gate version
        ja: ゲート版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别该工具授权门的判断与绑定语义版本。
        en: Stable version of the gate's decision and binding semantics.
        ja: ツール認可ゲートの判断・束縛意味を安定識別する版です。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: attempt_ref
      labels:
        zh: 调用尝试引用
        en: attempt reference
        ja: 呼出試行参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该门控制的具体 ToolCallAttempt。
        en: Concrete ToolCallAttempt controlled by the gate.
        ja: ゲートが制御する具体 ToolCallAttempt です。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: decision_ref
      labels:
        zh: 决定引用
        en: decision reference
        ja: 判断参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 门正在执行的 PolicyDecision。
        en: PolicyDecision enforced by the gate.
        ja: ゲートが執行する PolicyDecision です。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: grant_ref
      labels:
        zh: 授予引用
        en: grant reference
        ja: 付与参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 需要持续授权时所验证的 AuthorizationGrant。
        en: AuthorizationGrant verified when continuing authority is required.
        ja: 持続権限が必要な場合に検証する AuthorizationGrant です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 防止批准后工具参数被替换的不可变摘要。
        en: Immutable digest preventing tool arguments from changing after approval.
        ja: 承認後のツール引数差替えを防ぐ不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:args42
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: state
      labels:
        zh: 门状态
        en: gate state
        ja: ゲート状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前是 pending、released 还是 blocked。
        en: Whether the gate is pending, released, or blocked.
        ja: 現在 pending・released・blocked のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: released
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: evaluated_at
      labels:
        zh: 门评估时间
        en: evaluated at
        ja: ゲート評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 门验证决定和授予的 UTC 时刻。
        en: UTC instant when the gate validated decision and grant.
        ja: ゲートが判断と付与を検証した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:05Z
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
    - id: reason
      labels:
        zh: 门控原因
        en: gate reason
        ja: ゲート理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释 release、pause 或 block 的依据。
        en: Explains the basis for release, pause, or block.
        ja: release・pause・block の根拠を説明します。
      allowed_values: []
      pattern: null
      example_value: decision and grant match attempt
      source_claims:
        - claim-tool-approval-gate-001
        - claim-tool-approval-gate-002
        - claim-tool-approval-gate-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolApprovalGate-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具授权门正例
      en: Positive tool authorization gate case
      ja: ツール認可ゲートの正例
    scenario_id: null
    descriptions:
      zh: tool-gate-42 验证 tool-attempt-42 的主体、工具和参数摘要与 decision-42、grant-42 一致且未过期后，将状态置为 released。
      en: tool-gate-42 releases tool-attempt-42 only after its principal, tool, and argument digest match decision-42 and unexpired grant-42.
      ja: tool-gate-42 は tool-attempt-42 の主体、ツール、引数ダイジェストが decision-42 と未期限 grant-42 に一致した後だけ released にします。
    field_values:
      gate_id: tool-gate-42
      gate_kind: capability-grant-check
      decision_function_ref: tool-approval-evaluator@2
      version: "2"
      attempt_ref: tool-attempt-42
      decision_ref: decision-42
      grant_ref: grant-42
      argument_digest: sha256:args42
      state: released
      evaluated_at: 2026-07-16T01:21:05Z
      reason: decision and grant match attempt
    related_node_ids:
      - ToolApprovalGate
      - PolicyDecision
      - AuthorizationGrant
      - ToolCallAttempt
    related_relation_ids:
      - ToolApprovalGate-enforces-PolicyDecision
      - ToolApprovalGate-gates-ToolCallAttempt
    expected_result:
      zh: 只有完全匹配且有效的授权证据释放该尝试；释放不预判工具结果。
      en: Only exactly matching, effective authorization evidence releases the attempt; release does not predict the tool result.
      ja: 完全一致する有効認可証拠だけが試行を解放し、解放はツール結果を予測しません。
    why_valid_or_invalid:
      zh: 门控绑定具体 attempt 和参数摘要，执行关系没有扩张到整个 Execution。
      en: The gate binds one attempt and argument digest, and enforcement does not expand to the entire Execution.
      ja: ゲートは具体 attempt と引数ダイジェストへ束縛され、執行関係を Execution 全体へ拡張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-approval-gate-001
      - claim-tool-approval-gate-002
      - claim-tool-approval-gate-003
  - id: ToolApprovalGate-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具授权门边界反例
      en: Boundary counterexample for tool authorization gate
      ja: ツール認可ゲートの境界反例
    scenario_id: null
    descriptions:
      zh: decision-42 允许旧参数 sha256:args42，但 tool-attempt-43 使用 sha256:args43；即使动作名称相同，门也必须 block。
      en: decision-42 allows old arguments sha256:args42, but tool-attempt-43 uses sha256:args43; the gate must block even though the action name is unchanged.
      ja: decision-42 は旧引数 sha256:args42 を許可しますが tool-attempt-43 は sha256:args43 を使うため、操作名が同じでもゲートは block します。
    field_values: {}
    related_node_ids:
      - ToolApprovalGate
      - PolicyDecision
      - ToolCallAttempt
      - Gate
    related_relation_ids:
      - ToolApprovalGate-enforces-PolicyDecision
      - ToolApprovalGate-gates-ToolCallAttempt
    expected_result:
      zh: 门控拒绝把旧决定复用于新参数，并要求形成新 AuthorizationRequest。
      en: The gate refuses to reuse the stale decision for new arguments and requires a new AuthorizationRequest.
      ja: ゲートは旧判断の新引数への再利用を拒否し、新 AuthorizationRequest を要求します。
    why_valid_or_invalid:
      zh: 授权对象由完整请求快照决定，而不是仅由工具名称决定。
      en: Authorization is determined by the complete request snapshot, not tool name alone.
      ja: 認可対象はツール名だけでなく完全要求スナップショットで決まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-approval-gate-001
      - claim-tool-approval-gate-002
      - claim-tool-approval-gate-003
