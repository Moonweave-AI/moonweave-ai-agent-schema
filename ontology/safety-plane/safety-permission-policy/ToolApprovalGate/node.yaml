  - id: ToolApprovalGate-gates-ToolCallAttempt
    predicate: gates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 门控工具调用尝试
      en: gates tool-call attempt
      ja: ツール呼出試行をゲートする
    definitions:
      zh: ToolApprovalGate 绑定一个准确 ToolCallAttempt，并在 release 前校验其主体、工具、动作和参数摘要；另一尝试的批准不可复用。
      en: A ToolApprovalGate binds one exact ToolCallAttempt and validates principal, tool, action, and argument digest before release; approval for another attempt cannot be reused.
      ja: ToolApprovalGate は一つの正確な ToolCallAttempt へ束縛され、release 前に主体・ツール・操作・引数ダイジェストを検証し、別試行の承認を再利用しません。
    cardinality: null
    cardinality_not_applicable_reason:
