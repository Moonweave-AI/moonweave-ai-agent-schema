      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一个工具尝试的授权门。
        en: Stable identifier for one tool-attempt authorization gate.
        ja: 一つのツール試行認可ゲートを安定識別します。
      allowed_values: []
      pattern: null
      example_value: tool-gate-42
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: version
      labels:
        zh: 门版本
        en: gate version
        ja: ゲート版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别该工具授权门的判断与绑定语义版本。
        en: Stable version of the gate's decision and binding semantics.
        ja: ツール認可ゲートの判断・束縛意味を安定識別する版です。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: attempt_ref
      labels:
        zh: 调用尝试引用
        en: attempt reference
        ja: 呼出試行参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该门控制的具体 ToolCallAttempt。
        en: Concrete ToolCallAttempt controlled by the gate.
        ja: ゲートが制御する具体 ToolCallAttempt です。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-42
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: decision_ref
      labels:
        zh: 决定引用
        en: decision reference
        ja: 判断参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 门正在执行的 PolicyDecision。
        en: PolicyDecision enforced by the gate.
        ja: ゲートが執行する PolicyDecision です。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: grant_ref
      labels:
        zh: 授予引用
        en: grant reference
        ja: 付与参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 需要持续授权时所验证的 AuthorizationGrant。
        en: AuthorizationGrant verified when continuing authority is required.
        ja: 持続権限が必要な場合に検証する AuthorizationGrant です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
        - claim-tool-approval-gate-design
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 防止批准后工具参数被替换的不可变摘要。
        en: Immutable digest preventing tool arguments from changing after approval.
        ja: 承認後のツール引数差替えを防ぐ不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:args42
      source_claims:
