schema: moonweave.ai/ontology-node/v1
id: PermissionScope
kind: concept
status: accepted
labels:
  zh: 权限范围
  en: permission scope
  ja: 権限範囲
semantics:
  short_definition:
    zh: 在请求或策略评估中声明主体、动作、资源和约束，但本身不授予权限的范围规范。
    en: A scope specification declaring subject, actions, resources, and constraints for a request or policy evaluation without itself granting authority.
    ja: request または policy evaluation で subject・action・resource・constraint を宣言しますが、それ自体は authority を付与しない scope specification です。
  definition:
    zh: 权限范围是请求或策略评估中可独立引用的规范对象，精确列出主体选择器、动作集合、资源选择器、上下文限制、有效区间和义务。AuthorizationRequest 表达期望范围，AuthorizationGrant 只能引用相同或更窄的获准范围；仅有 PermissionScope 尚不证明主体已经获权。
    en: PermissionScope is a separately referenceable specification used in an authorization request or policy evaluation to state subject selectors, actions, resources, context constraints, validity interval, and obligations. AuthorizationRequest expresses a requested scope, while AuthorizationGrant may reference the same or a narrower granted scope; PermissionScope alone does not prove effective authority.
    ja: PermissionScope は authorization request または policy evaluation で独立参照する specification で、subject selector・action・resource・context constraint・validity interval・obligation を示します。AuthorizationRequest は requested scope を表し AuthorizationGrant は同一または狭い granted scope を参照できますが、PermissionScope だけでは effective authority を証明しません。
  why_needed:
    zh: 独立范围使请求范围、批准范围和实际授予范围可以比较，能够检测过度授权而不把数据区或角色身份混作权限。
    en: A distinct scope makes requested, approved, and granted authority comparable, detecting over-granting without conflating data zones or role identity with permission.
    ja: 独立範囲により要求・承認・付与範囲を比較し、データ区域や役割同一性を権限と混同せず過剰付与を検出します。
  includes:
    - zh: 包含范围标识、主体选择器、动作集合、资源选择器、上下文约束、有效期和义务。
      en: Includes scope identity, principal selector, action set, resource selector, context constraints, validity, and obligations.
      ja: 範囲識別子、主体選択子、操作集合、資源選択子、文脈制約、有効期間、義務を含みます。
  excludes:
    - zh: 不包含 DataZone 的结构位置、Actor 的身份绑定、策略求值结果或已签发授权凭证。
      en: Excludes DataZone location, Actor identity binding, policy-evaluation result, or an issued authorization credential.
      ja: DataZone の構造位置、Actor の同一性束縛、方針評価結果、発行済み認可資格を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - scope_id
  fields:
    - id: scope_id
      labels:
        zh: 范围标识
        en: scope ID
        ja: 範囲ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一组规范化权限边界。
        en: Stable identifier for one normalized authority boundary.
        ja: 一つの正規化権限境界を安定識別します。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: subject_selector
      labels:
        zh: 主体选择器
        en: principal selector
        ja: 主体選択子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定可以持有该范围的主体。
        en: Limits principals that may hold the scope.
        ja: 範囲を保持できる主体を限定します。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: actions
      labels:
        zh: 动作集合
        en: actions
        ja: 操作集合
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 范围允许或请求的规范化动作集合。
        en: Normalized actions allowed or requested by the scope.
        ja: 範囲が許可または要求する正規化操作集合です。
      allowed_values: []
      pattern: null
      example_value:
        - invoke_tool
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: resource_selector
      labels:
        zh: 资源选择器
        en: resource selector
        ja: 資源選択子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定动作可作用的资源。
        en: Limits resources on which actions may operate.
        ja: 操作対象となる資源を限定します。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: context_constraints
      labels:
        zh: 上下文限制
        en: context constraints
        ja: 文脈制約
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 授权成立仍须满足的运行上下文条件。
        en: Runtime-context conditions that remain necessary for authority.
        ja: 権限成立に引き続き必要な実行文脈条件です。
      allowed_values: []
      pattern: null
      example_value:
        data_class: public
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: valid_from
      labels:
        zh: 范围开始
        en: valid from
        ja: 範囲開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该范围最早可生效的时刻。
        en: Earliest instant at which the scope may become effective.
        ja: 範囲が有効になり得る最早時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: valid_until
      labels:
        zh: 范围结束
        en: valid until
        ja: 範囲終了
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该范围停止有效的时刻。
        en: Instant at which the scope ceases to be effective.
        ja: 範囲の有効性が終了する時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PermissionScope-example-positive-manual-001
    kind: positive
    labels:
      zh: 权限范围正例
      en: Positive permission scope case
      ja: 権限範囲の正例
    scenario_id: null
    descriptions:
      zh: scope-search-read 仅允许 agent:planner-1 在五分钟内调用 search_documents 读取公开数据，不允许写入、其他工具或私有数据。
      en: scope-search-read permits only agent:planner-1 to invoke search_documents on public data for five minutes, excluding writes, other tools, and private data.
      ja: scope-search-read は agent:planner-1 が五分間 search_documents で公開データを読むことだけを許し、書込・他ツール・私有データを除外します。
    field_values:
      scope_id: scope-search-read
      subject_selector: agent:planner-1
      actions:
        - invoke_tool
      resource_selector: tool:search_documents
      context_constraints:
        data_class: public
      valid_from: 2026-07-16T01:20:00Z
      valid_until: 2026-07-16T01:25:00Z
    related_node_ids:
      - PermissionScope
      - AuthorizationRequest
      - AuthorizationGrant
    related_relation_ids:
      - AuthorizationRequest-requests-PermissionScope
      - AuthorizationGrant-scoped_by-PermissionScope
    expected_result:
      zh: 请求和授予可引用该范围，并逐维验证授予没有扩大主体、动作、资源、上下文或期限。
      en: Request and grant can reference the scope and verify dimension by dimension that granted authority was not widened.
      ja: 要求と付与が範囲を参照し、主体・操作・資源・文脈・期間が拡大されていないか各次元で検証できます。
    why_valid_or_invalid:
      zh: 范围给出可比较的规范边界，但没有声称授权已被批准。
      en: The scope supplies a comparable normative boundary without claiming that authorization was approved.
      ja: 範囲は比較可能な規範境界を示しますが、認可済みとは主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-permission-scope-001
      - claim-permission-scope-002
  - id: PermissionScope-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 权限范围边界反例
      en: Boundary counterexample for permission scope
      ja: 権限範囲の境界反例
    scenario_id: null
    descriptions:
      zh: DataZone public-zone 描述数据所处结构区域，不包含特定主体、动作和有效期，因此不是 PermissionScope。
      en: DataZone public-zone describes the structural region containing data and lacks a particular principal, action, and validity interval, so it is not a PermissionScope.
      ja: DataZone public-zone はデータ所在の構造区域を表し、特定主体・操作・有効期間を持たないため PermissionScope ではありません。
    field_values: {}
    related_node_ids:
      - PermissionScope
      - AuthorizationGrant
    related_relation_ids:
      - AuthorizationGrant-scoped_by-PermissionScope
    expected_result:
      zh: 策略可把区域作为上下文约束，但区域身份不转换为权限范围。
      en: Policy may use the zone as a context constraint, but zone identity does not become permission scope.
      ja: 方針は区域を文脈制約として使えますが、区域同一性は権限範囲へ変わりません。
    why_valid_or_invalid:
      zh: 数据位置和规范权能回答不同问题，前者不会随批准或撤销而改变。
      en: Data location and normative authority answer different questions; location does not change with approval or revocation.
      ja: データ位置と規範権限は別の問いに答え、位置は承認・取消で変わりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-permission-scope-001
      - claim-permission-scope-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-permission-scope-001
    source: eng-security-nist-abac
    supports: NIST defines authorization as evaluation of subject, object, requested operation, and environment attributes against policy, rules, or relationships describing allowed operations.
    locator: "NIST SP 800-162, Section 3: ABAC definition using subject, object, operation, environment attributes, policy, and rules"
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-permission-scope-002
    source: eng-proto-mcp-auth
    supports: The MCP authorization specification binds protected resources, resource indicators, authorization-server metadata, and OAuth scopes in an authorization flow.
    locator: MCP 2025-06-18 Authorization specification > authorization flow, protected-resource metadata, resource indicators, and scopes
    evidence_kind: normative
    confidence: high
    review_status: accepted
