schema: moonweave.ai/ontology-node/v1
id: PermissionScope
kind: concept
labels:
  zh: 权限范围
  en: permission scope
  ja: 権限範囲
semantics:
  short_definition:
    zh: 声明主体、动作、资源与约束但不本身授予权限的范围规范。
    en: A scope specification declaring principal, actions, resources, and constraints without itself granting authority.
    ja: 主体・操作・資源・制約を宣言するが authority 自体は付与しない scope specification。
  definition:
    zh: PermissionScope 以 scope_id、subject_selector、actions、resource_selector、context_constraints 与 valid_from/valid_until 表达可比较权限边界。MCP OAuth scope（如 tools:read tools:call）与 resource indicator、OPA input 的 object/action 属性、XACML Target 都应映射为 PermissionScope；AuthorizationRequest 引用请求范围，AuthorizationGrant 只能引用相同或更窄范围。
    en: PermissionScope expresses comparable authority boundaries with scope_id, subject_selector, actions, resource_selector, context_constraints, and valid_from/valid_until. MCP OAuth scopes (e.g., tools:read tools:call) with resource indicators, OPA input object/action attributes, and XACML Targets map here; AuthorizationRequest references requested scope, AuthorizationGrant only same or narrower scope.
    ja: PermissionScope は scope_id/subject_selector/actions/resource_selector/context_constraints/valid_from/until で比較可能 authority boundary を表現。MCP OAuth scope+resource indicator、OPA object/action、XACML Target を写像。AuthorizationRequest は requested scope、AuthorizationGrant は同一または狭い scope のみ。
  why_needed:
    zh: 必须比较请求、批准与授予三维范围，才能检测 MCP scope 膨胀或 OPA 过度 allow。
    en: Requested, approved, and granted scopes must be comparable to detect MCP scope inflation or OPA over-allow.
    ja: 要求/承認/付与 scope を比較しないと MCP scope 膨張や OPA over-allow を検出できません。
  includes:
    - zh: 包含范围标识、主体选择器、动作集合、资源选择器、上下文约束、有效期和义务。
      en: Includes scope identity, principal selector, action set, resource selector, context constraints, validity, and obligations.
      ja: 範囲識別子、主体選択子、操作集合、資源選択子、文脈制約、有効期間、義務を含みます。
  excludes:
    - zh: 不包含 DataZone 的结构位置、Actor 的身份绑定、策略求值结果或已签发授权凭证。
      en: Excludes DataZone location, Actor identity binding, policy-evaluation result, or an issued authorization credential.
      ja: DataZone の構造位置、Actor の同一性束縛、方針評価結果、発行済み認可資格を含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: MCP scope 字符串解析为 actions+resource_selector；OPA Rego 决策输入中的 object/action 字段对齐 PermissionScope；比较时使用维度交集（主体、动作、资源、上下文、时间）。DataZone 只能出现在 context_constraints，不能替代 scope_id。
    en: Parse MCP scope strings into actions+resource_selector; align OPA decision input object/action fields to PermissionScope; compare by dimensional intersection (principal, action, resource, context, time). DataZone appears only in context_constraints, never replacing scope_id.
    ja: MCP scope 文字列を actions+resource_selector に解析。OPA object/action を PermissionScope に整合。主体/操作/資源/context/時間で比較。DataZone は context_constraints のみ。
  typical_input:
    - description: MCP OAuth scopes.
      format: scope=tools:read tools:call; resource=https://mcp.example.com
      source_claims:
        - claim-permission-scope-design
    - description: OPA decision input attributes.
      format: "input: {subject, object, action, environment}"
      source_claims:
        - claim-permission-scope-design
  typical_output:
    - description: Normalized scope record.
      format: '{"scope_id":"scope-mcp-read-call","actions":["tools:read","tools:call"],"resource_selector":"https://mcp.example.com"}'
      source_claims:
        - claim-permission-scope-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - scope_id
  fields:
    - id: scope_id
      labels:
        zh: 范围标识
        en: scope ID
        ja: 範囲ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一组规范化权限边界。
        en: Stable identifier for one normalized authority boundary.
        ja: 一つの正規化権限境界を安定識別します。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
    - id: subject_selector
      labels:
        zh: 主体选择器
        en: principal selector
        ja: 主体選択子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定可以持有该范围的主体。
        en: Limits principals that may hold the scope.
        ja: 範囲を保持できる主体を限定します。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
    - id: actions
      labels:
        zh: 动作集合
        en: actions
        ja: 操作集合
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 范围允许或请求的规范化动作集合。
        en: Normalized actions allowed or requested by the scope.
        ja: 範囲が許可または要求する正規化操作集合です。
      allowed_values: []
      pattern: null
      example_value:
        - invoke_tool
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
    - id: resource_selector
      labels:
        zh: 资源选择器
        en: resource selector
        ja: 資源選択子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定动作可作用的资源。
        en: Limits resources on which actions may operate.
        ja: 操作対象となる資源を限定します。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
    - id: context_constraints
      labels:
        zh: 上下文限制
        en: context constraints
        ja: 文脈制約
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 授权成立仍须满足的运行上下文条件。
        en: Runtime-context conditions that remain necessary for authority.
        ja: 権限成立に引き続き必要な実行文脈条件です。
      allowed_values: []
      pattern: null
      example_value:
        data_class: public
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
    - id: valid_from
      labels:
        zh: 范围开始
        en: valid from
        ja: 範囲開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该范围最早可生效的时刻。
        en: Earliest instant at which the scope may become effective.
        ja: 範囲が有効になり得る最早時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
    - id: valid_until
      labels:
        zh: 范围结束
        en: valid until
        ja: 範囲終了
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该范围停止有效的时刻。
        en: Instant at which the scope ceases to be effective.
        ja: 範囲の有効性が終了する時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-permission-scope-design
        - claim-permission-scope-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PermissionScope-mcp-oauth
    labels:
      zh: MCP OAuth scope
      en: MCP OAuth scope
      ja: MCP OAuth scope
    descriptions:
      zh: scope-mcp-read-call 允许 agent:mcp-client-1 在 15 分钟内对 https://mcp.example.com 执行 tools:read 与 tools:call。
      en: scope-mcp-read-call permits agent:mcp-client-1 tools:read and tools:call on https://mcp.example.com for 15 minutes.
      ja: scope-mcp-read-call が agent:mcp-client-1 に 15 分間 tools:read/tools:call を https://mcp.example.com で許可。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: OAuth scopes
    field_values:
      scope_id: scope-mcp-read-call
      subject_selector: agent:mcp-client-1
      actions:
        - tools:read
        - tools:call
      resource_selector: https://mcp.example.com
    related_node_ids:
      - PermissionScope
      - AuthorizationRequest
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-permission-scope-design
  - id: PermissionScope-opa-target
    labels:
      zh: OPA 目标属性 scope
      en: OPA target attribute scope
      ja: OPA target attribute scope
    descriptions:
      zh: scope-search-read 映射 OPA input object=tool:search_documents action=invoke_tool data_class=public。
      en: scope-search-read maps OPA input object=tool:search_documents action=invoke_tool data_class=public.
      ja: scope-search-read が OPA input object=tool:search_documents action=invoke_tool data_class=public に写像。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: Rego input
    field_values:
      scope_id: scope-search-read
      resource_selector: tool:search_documents
      actions:
        - invoke_tool
    related_node_ids:
      - PermissionScope
      - PolicySpecification
    related_relation_ids: []
    source_claims:
      - claim-permission-scope-design
  - id: PermissionScope-cursor-allowlist
    labels:
      zh: Cursor allowlist 命令 scope
      en: Cursor allowlist command scope
      ja: Cursor allowlist command scope
    descriptions:
      zh: scope-cursor-shell 限定 agent:cursor-1 仅可执行 allowlist 内 npm test 与 git status。
      en: scope-cursor-shell limits agent:cursor-1 to allowlisted npm test and git status.
      ja: scope-cursor-shell が agent:cursor-1 を allowlist npm test/git status に限定。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: command allowlist
    field_values:
      scope_id: scope-cursor-shell
      actions:
        - Bash
      context_constraints:
        allowlist:
          - npm test
          - git status
    related_node_ids:
      - PermissionScope
      - PolicyDecision
    related_relation_ids: []
    source_claims:
      - claim-permission-scope-design
  - id: PermissionScope-boundary-datazone
    labels:
      zh: DataZone 不是 scope
      en: DataZone is not scope
      ja: DataZone は scope ではない
    descriptions:
      zh: DataZone public-zone 描述数据区域位置，无 subject_selector 与 actions，不是 PermissionScope。
      en: DataZone public-zone describes data region location without subject_selector and actions; not PermissionScope.
      ja: DataZone public-zone はデータ区域位置のみで subject_selector/actions なし。PermissionScope ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: zone versus scope
    field_values: {}
    related_node_ids:
      - PermissionScope
      - DataZone
    related_relation_ids: []
    source_claims:
      - claim-permission-scope-design
parent_relation: null
relations: []
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-permission-scope-design
    source: safety-permission-design
    supports: PermissionScope is normative boundary without effective authority.
    locator: Scope versus grant
    evidence_kind: design-inference
    confidence: high
  - id: claim-permission-scope-design
    source: mcp-authorization-2025
    supports: MCP OAuth scopes and resource indicators normalize to PermissionScope.
    locator: Scope binding
    evidence_kind: design-inference
    confidence: high
  - id: claim-permission-scope-design
    source: opa-rego
    supports: OPA decision input attributes map to PermissionScope dimensions.
    locator: Rego input
    evidence_kind: design-inference
    confidence: high
  - id: claim-permission-scope-design
    source: cursor-terminal-sandbox
    supports: Cursor command allowlist defines PermissionScope action constraints.
    locator: Allowlist scope
    evidence_kind: design-inference
    confidence: high
