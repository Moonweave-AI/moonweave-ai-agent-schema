schema: moonweave.ai/ontology-node/v1
id: PermissionScope
kind: concept
status: accepted
labels:
  zh: 权限范围
  en: permission scope
  ja: 権限範囲
semantics:
  short_definition:
    zh: 在请求或策略评估中声明主体、动作、资源和约束，但本身不授予权限的范围规范。
    en: A scope specification declaring subject, actions, resources, and constraints for a request or policy evaluation without itself granting authority.
    ja: request または policy evaluation で subject・action・resource・constraint を宣言しますが、それ自体は authority を付与しない scope specification です。
  definition:
    zh: 权限范围是请求或策略评估中可独立引用的规范对象，精确列出主体选择器、动作集合、资源选择器、上下文限制、有效区间和义务。AuthorizationRequest 表达期望范围，AuthorizationGrant 只能引用相同或更窄的获准范围；仅有 PermissionScope 尚不证明主体已经获权。
    en: PermissionScope is a separately referenceable specification used in an authorization request or policy evaluation to state subject selectors, actions, resources, context constraints, validity interval, and obligations. AuthorizationRequest expresses a requested scope, while AuthorizationGrant may reference the same or a narrower granted scope; PermissionScope alone does not prove effective authority.
    ja: PermissionScope は authorization request または policy evaluation で独立参照する specification で、subject selector・action・resource・context constraint・validity interval・obligation を示します。AuthorizationRequest は requested scope を表し AuthorizationGrant は同一または狭い granted scope を参照できますが、PermissionScope だけでは effective authority を証明しません。
  why_needed:
    zh: 独立范围使请求范围、批准范围和实际授予范围可以比较，能够检测过度授权而不把数据区或角色身份混作权限。
    en: A distinct scope makes requested, approved, and granted authority comparable, detecting over-granting without conflating data zones or role identity with permission.
    ja: 独立範囲により要求・承認・付与範囲を比較し、データ区域や役割同一性を権限と混同せず過剰付与を検出します。
  includes:
    - zh: 包含范围标识、主体选择器、动作集合、资源选择器、上下文约束、有效期和义务。
      en: Includes scope identity, principal selector, action set, resource selector, context constraints, validity, and obligations.
      ja: 範囲識別子、主体選択子、操作集合、資源選択子、文脈制約、有効期間、義務を含みます。
  excludes:
    - zh: 不包含 DataZone 的结构位置、Actor 的身份绑定、策略求值结果或已签发授权凭证。
      en: Excludes DataZone location, Actor identity binding, policy-evaluation result, or an issued authorization credential.
      ja: DataZone の構造位置、Actor の同一性束縛、方針評価結果、発行済み認可資格を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - scope_id
  fields:
    - id: scope_id
      labels:
        zh: 范围标识
        en: scope ID
        ja: 範囲ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一组规范化权限边界。
        en: Stable identifier for one normalized authority boundary.
        ja: 一つの正規化権限境界を安定識別します。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: subject_selector
      labels:
        zh: 主体选择器
        en: principal selector
        ja: 主体選択子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定可以持有该范围的主体。
        en: Limits principals that may hold the scope.
        ja: 範囲を保持できる主体を限定します。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: actions
      labels:
        zh: 动作集合
        en: actions
        ja: 操作集合
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 范围允许或请求的规范化动作集合。
        en: Normalized actions allowed or requested by the scope.
        ja: 範囲が許可または要求する正規化操作集合です。
      allowed_values: []
      pattern: null
      example_value:
        - invoke_tool
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: resource_selector
      labels:
        zh: 资源选择器
        en: resource selector
        ja: 資源選択子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定动作可作用的资源。
        en: Limits resources on which actions may operate.
        ja: 操作対象となる資源を限定します。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: context_constraints
      labels:
        zh: 上下文限制
        en: context constraints
        ja: 文脈制約
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 授权成立仍须满足的运行上下文条件。
        en: Runtime-context conditions that remain necessary for authority.
        ja: 権限成立に引き続き必要な実行文脈条件です。
      allowed_values: []
      pattern: null
      example_value:
        data_class: public
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: valid_from
      labels:
        zh: 范围开始
        en: valid from
        ja: 範囲開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该范围最早可生效的时刻。
        en: Earliest instant at which the scope may become effective.
        ja: 範囲が有効になり得る最早時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
    - id: valid_until
      labels:
        zh: 范围结束
        en: valid until
        ja: 範囲終了
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该范围停止有效的时刻。
        en: Instant at which the scope ceases to be effective.
        ja: 範囲の有効性が終了する時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-permission-scope-001
        - claim-permission-scope-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: permission-scope-cedar
    labels:
      zh: 权限范围 - Cedar 授权评估
      en: permission scope - Cedar authorization evaluation
      ja: 権限範囲 - Cedar 認可評価
    descriptions: {zh: "权限范围(PermissionScope) [PermissionScope]: 在请求或策略评估中声明主体、动作、资源和约束，但本身不授予权限的范围规范。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: subject_selector, scope_id, resource_selector.", en: "permission scope (PermissionScope) [PermissionScope]: A scope specification declaring subject, actions, resources, and constraints for a request or policy evaluation without itself granting authority.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include subject_selector, scope_id, resource_selector.", ja: "権限範囲(PermissionScope) [PermissionScope]: request または policy evaluation で subject・action・resource・constraint を宣言しますが、それ自体は authority を付与しない scope specification です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: subject_selector, scope_id, resource_selector."}
    field_values:
      resource_selector: "tool:search_documents"
      scope_id: scope-search-read
      subject_selector: "agent:planner-1"
      valid_from: "2026-07-16T01:20:00Z"
      valid_until: "2026-07-16T01:25:00Z"
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRequest
      - PermissionScope
    related_relation_ids:
      - AuthorizationGrant
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-permission-scope-001
      - claim-permission-scope-002
      - PermissionScope
    example_source: Amazon Cedar
    source_claims:
      - claim-permission-scope-001
  - id: permission-scope-opa
    labels:
      zh: 权限范围 - OPA Rego 策略评估
      en: permission scope - OPA Rego policy evaluation
      ja: 権限範囲 - OPA Rego ポリシー評価
