schema: moonweave.ai/ontology-node/v1
id: safety-permission-policy
kind: module
status: accepted
labels:
  zh: 授权与策略决策
  en: Authorization and policy decisions
  ja: 認可とポリシー判断
semantics:
  short_definition:
    zh: 授权与策略决策描述主体请求对资源执行某项动作时，如何依据版本化策略和当前环境求值，得到允许、拒绝或暂缓决定，并在允许时形成有范围、期限且可撤销的授权。权限提示、人工批准和工具授权门是取证与执行环节，不能替代授权请求、策略决定或授权授予本身。
    en: Authorization and policy decisions describes how a principal's request to perform an action on a resource is evaluated against versioned policy and current environment to produce an allow, deny, or defer decision, and how an allow decision may yield a scoped, time-bounded, revocable grant. Permission prompts, human approvals, and tool authorization gates are evidence and enforcement steps; they do not replace the authorization request, policy decision, or grant.
    ja: 認可とポリシー判断は、主体が資源へ操作を求めたとき、版管理されたポリシーと現在環境に照らして評価し、許可・拒否・保留の判断を出し、許可時には範囲・期限付きで取消可能な認可を形成する過程を記述します。権限提示、人間承認、ツール認可ゲートは証拠取得と執行の段階であり、認可要求、ポリシー判断、認可付与そのものを置き換えません。
  definition:
    zh: 授权与策略决策描述主体请求对资源执行某项动作时，如何依据版本化策略和当前环境求值，得到允许、拒绝或暂缓决定，并在允许时形成有范围、期限且可撤销的授权。权限提示、人工批准和工具授权门是取证与执行环节，不能替代授权请求、策略决定或授权授予本身。
    en: Authorization and policy decisions describes how a principal's request to perform an action on a resource is evaluated against versioned policy and current environment to produce an allow, deny, or defer decision, and how an allow decision may yield a scoped, time-bounded, revocable grant. Permission prompts, human approvals, and tool authorization gates are evidence and enforcement steps; they do not replace the authorization request, policy decision, or grant.
    ja: 認可とポリシー判断は、主体が資源へ操作を求めたとき、版管理されたポリシーと現在環境に照らして評価し、許可・拒否・保留の判断を出し、許可時には範囲・期限付きで取消可能な認可を形成する過程を記述します。権限提示、人間承認、ツール認可ゲートは証拠取得と執行の段階であり、認可要求、ポリシー判断、認可付与そのものを置き換えません。
  why_needed:
    zh: 让“谁、在什么环境下、可以对什么做什么、依据哪版规则、有效到何时”成为可重放和可撤销的事实链。
    en: Make who may do what to which resource, under what environment, under which policy revision, and until when a replayable and revocable fact chain.
    ja: 誰が、どの環境で、何に対して何をでき、どのポリシー版に基づき、いつまで有効かを、再現・取消可能な事実連鎖にします。
  includes:
    - zh: 版本化 PolicySpecification 及其规则、条件、效果、组合算法、义务与建议；XACML 等规范只是表达这些语义的权威依据，不是额外业务节点。
      en: Versioned PolicySpecifications and their rules, conditions, effects, combining algorithms, obligations, and advice; standards such as XACML are authoritative expression models, not additional business nodes.
      ja: 版管理された PolicySpecification と、その規則、条件、効果、結合アルゴリズム、義務、助言を含みます。XACML などの規格はこれらを表現する権威ある根拠であり、別の業務ノードではありません。
    - zh: 不可变授权请求、权限范围、策略评估、允许/拒绝/暂缓决定、有范围的授权授予及其撤销生命周期。
      en: Immutable authorization requests, permission scopes, policy evaluations, allow/deny/defer decisions, scoped authorization grants, and their revocation lifecycle.
      ja: 不変の認可要求、権限範囲、ポリシー評価、許可・拒否・保留判断、範囲付き認可付与、その取消ライフサイクルを含みます。
    - zh: 与同一请求绑定的权限提示、响应、人工批准证据，以及执行有效决定的工具授权门。
      en: Permission prompts, responses, and human-approval evidence bound to the same request, plus a tool authorization gate that enforces an effective decision.
      ja: 同一要求に結び付く権限提示、応答、人間承認証拠と、有効な判断を執行するツール認可ゲートを含みます。
  excludes:
    - zh: Actor 身份、角色和能力声明归运行参与者；工具定义中声明的权限需求只是授权请求的输入，不是 PolicyDecision 或 AuthorizationGrant。
      en: Actor identity, role, and capability declarations belong to Runtime participants; permission requirements declared by a tool definition are inputs to authorization, not a PolicyDecision or AuthorizationGrant.
      ja: Actor の同一性、役割、能力宣言は実行参加者に属します。ツール定義が示す権限要件は認可への入力であり、PolicyDecision や AuthorizationGrant ではありません。
    - zh: DataZone、TrustBoundary 和实际 BoundaryCrossing 归信任边界；策略把它们作为求值上下文而不复制其身份。
      en: DataZone, TrustBoundary, and actual BoundaryCrossing belong to trust boundaries; policy uses them as evaluation context without copying their identity.
      ja: DataZone、TrustBoundary、実際の BoundaryCrossing は信頼境界に属し、ポリシーはそれらを同一性を複製せず評価文脈として使います。
    - zh: 业务路由、提交幂等性、调用结果和副作用回执分别归路由、提交控制与能力调用；获准执行不等于已经执行或已经改变外部状态。
      en: Business routing, commit idempotency, invocation results, and side-effect receipts belong respectively to routing, commit control, and capability invocation; authorization to execute is not proof of execution or external change.
      ja: 業務経路、確定の冪等性、呼び出し結果、副作用受領はそれぞれ経路、確定制御、能力呼び出しに属します。実行許可は実行済みや外部変更済みの証明ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为策略、请求、评估、决定、授予、人工证据、执行门和撤销建立不混级的授权闭环。
  en: Establish a level-correct authorization loop across policy, request, evaluation, decision, grant, human evidence, enforcement gate, and revocation.
  ja: ポリシー、要求、評価、判断、付与、人間証拠、執行ゲート、取消を、階層を混同しない認可閉路として確立します。
structure: null
examples:
  - id: safety-permission-policy-cq-request-decision-v4-example-positive
    kind: positive
    labels:
      zh: 请求到决定的可追溯正例
      en: Traceable request-to-decision case
      ja: 要求から判断への追跡可能正例
    scenario_id: authorization-request-decision-positive-42
    descriptions:
      zh: request-42 请求只读搜索范围；evaluation-42 使用 tool-authorization@7，验证批准和条件，并产生 allow decision-42。决定回指 request-42、决定规则及 deny-overrides@1。
      en: request-42 asks for read-only search scope; evaluation-42 uses tool-authorization@7, validates approval and conditions, and produces allow decision-42. The decision points back to request-42, determining rules, and deny-overrides@1.
      ja: request-42 は読取専用検索範囲を要求し、evaluation-42 が tool-authorization@7 で承認と条件を検証し allow decision-42 を生成します。判断は request-42、決定規則、deny-overrides@1 へ戻ります。
    field_values:
      request_id: request-42
      subject_ref: agent-researcher-7
      action: tool.search.read
      resource_ref: search-index:public-docs
      context_digest: sha256:request-42-context-a91f
      requested_scope_ref: scope-search-read
      evaluation_id: evaluation-42
      policy_version_ref: tool-authorization@7
      input_digest: sha256:request-42-context-a91f
      decision_id: decision-42
      decision_kind: allow
      determining_rule_refs:
        - allow-approved-read@7
      combining_algorithm_ref: deny-overrides@1
      valid_until: 2026-07-16T01:25:00.000Z
    related_node_ids:
      - AuthorizationRequest
      - PolicyEvaluation
      - PolicySpecification
      - PolicyDecision
      - PolicyRule
    related_relation_ids:
      - PolicyEvaluation-consumes-AuthorizationRequest
      - PolicyEvaluation-uses-PolicySpecification
      - PolicyEvaluation-produces-PolicyDecision
      - PolicyDecision-decides-AuthorizationRequest
      - PolicyDecision-based_on-PolicyRule
    expected_result:
      zh: 授权结果可从同一请求快照、策略版本和决定性规则复现。
      en: The authorization result is reproducible from the same request snapshot, policy version, and determining rules.
      ja: 認可結果を同一要求スナップショット、方針版、決定規則から再現できます。
    why_valid_or_invalid:
      zh: 每个节点保持独立身份，关系链回答了判断对象、规范依据、运行活动和结果来源。
      en: Each node retains independent identity, and the relation chain answers what was decided, under which norm, by which activity, and from which basis.
      ja: 各ノードは独立同一性を保ち、関係連鎖が判断対象、規範根拠、活動、結果根拠へ答えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-permission-policy-004
      - claim-safety-permission-policy-002
      - claim-safety-permission-policy-001
  - id: safety-permission-policy-cq-request-decision-v4-example-counter
    kind: boundary
    labels:
      zh: 旧决定错误复用反例
      en: Stale-decision reuse counterexample
      ja: 旧判断再利用の反例
    scenario_id: authorization-request-decision-stale-reuse-43
    descriptions:
      zh: request-43 使用同一工具名但参数摘要和目标范围不同；仅因 decision-42 为 allow 就把它复用于 request-43，会破坏 decides 关系的请求身份。
      en: request-43 uses the same tool name but a different argument digest and target scope; reusing allow decision-42 merely because the tool matches violates request identity in decides.
      ja: request-43 は同じツール名でも引数ダイジェストと対象範囲が異なり、decision-42 が allow というだけで再利用すると decides の要求同一性を壊します。
    field_values:
      new_request_id: request-43
      subject_ref: agent-researcher-7
      action: tool.search.read
      resource_ref: search-index:restricted-incidents
      argument_digest: sha256:request-43-arguments-4c2e
      context_digest: sha256:request-43-context-77bd
      stale_decision_id: decision-42
      stale_decision_request_ref: request-42
      stale_decision_context_digest: sha256:request-42-context-a91f
      gate_id: tool-gate-43
      gate_state: blocked
      fresh_evaluation_required: true
    related_node_ids:
      - AuthorizationRequest
      - PolicyDecision
      - ToolApprovalGate
    related_relation_ids:
      - PolicyDecision-decides-AuthorizationRequest
      - ToolApprovalGate-enforces-PolicyDecision
    expected_result:
      zh: 门控拒绝旧决定并要求 request-43 的新评估。
      en: The gate rejects the stale decision and requires a new evaluation for request-43.
      ja: ゲートは旧判断を拒否し request-43 の新評価を要求します。
    why_valid_or_invalid:
      zh: 动作名称不是授权对象的完整身份；主体、资源、参数和上下文必须一致。
      en: Action name is not complete authorization identity; principal, resource, arguments, and context must also match.
      ja: 操作名は認可対象の完全同一性ではなく、主体・資源・引数・文脈も一致が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-permission-policy-004
      - claim-safety-permission-policy-006
  - id: safety-permission-policy-cq-grant-validity-v4-example-positive
    kind: positive
    labels:
      zh: 有效授予查询正例
      en: Effective-grant query case
      ja: 有効付与照会の正例
    scenario_id: authorization-grant-effective-at-0122
    descriptions:
      zh: grant-42 由 decision-42 授权，受 scope-search-read 约束，在 01:22 查询时处于 active、未过期且没有撤销事件。
      en: grant-42 is authorized by decision-42, scoped by scope-search-read, and at 01:22 is active, unexpired, and has no revocation event.
      ja: grant-42 は decision-42 に認可され scope-search-read に制約され、01:22 時点で active、未期限、取消イベントなしです。
    field_values:
      grant_id: grant-42
      subject_ref: agent-researcher-7
      basis_decision_ref: decision-42
      scope_ref: scope-search-read
      issued_at: 2026-07-16T01:20:00.000Z
      expires_at: 2026-07-16T01:25:00.000Z
      status: active
      query_at: 2026-07-16T01:22:00.000Z
      requested_action: tool.search.read
      requested_resource: search-index:public-docs
      matching_revocation_ids: []
      effective: true
    related_node_ids:
      - AuthorizationGrant
      - AllowDecision
      - PermissionScope
      - AuthorizationRevocation
    related_relation_ids:
      - AuthorizationGrant-authorized_by-AllowDecision
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRevocation-revokes-AuthorizationGrant
    expected_result:
      zh: grant-42 对与范围完全匹配且发生在有效期内的请求有效。
      en: grant-42 is effective for a request that fully matches scope and occurs within validity.
      ja: grant-42 は範囲完全一致かつ有効期間内の要求に有効です。
    why_valid_or_invalid:
      zh: 有效性同时依赖签发依据、范围、时间和撤销链，而非单个 active 字段。
      en: Effectiveness depends jointly on issuance basis, scope, time, and revocation chain rather than an active field alone.
      ja: 有効性は active 項目だけでなく発行根拠・範囲・時間・取消連鎖へ共同依存します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-permission-policy-003
      - claim-safety-permission-policy-007
      - claim-safety-permission-policy-005
  - id: safety-permission-policy-cq-grant-validity-v4-example-counter
    kind: boundary
    labels:
      zh: 已撤销授予反例
      en: Revoked-grant counterexample
      ja: 取消済み付与の反例
    scenario_id: authorization-grant-revoked-before-use
    descriptions:
      zh: revocation-42 在 01:23 撤销 grant-42；01:24 的请求即使主体和范围匹配，也不能仅凭 grant 原 expires_at=01:25 继续执行。
      en: revocation-42 revokes grant-42 at 01:23; a 01:24 request cannot proceed merely because the grant originally expired at 01:25, even when principal and scope match.
      ja: revocation-42 は 01:23 に grant-42 を取消し、主体・範囲が一致しても元 expires_at=01:25 だけで 01:24 要求を実行できません。
    field_values:
      grant_id: grant-42
      scope_ref: scope-search-read
      original_expires_at: 2026-07-16T01:25:00.000Z
      event_id: revocation-42
      revoked_at: 2026-07-16T01:23:00.000Z
      revoker_ref: security-controller-2
      revocation_reason: session-risk-elevation
      request_at: 2026-07-16T01:24:00.000Z
      subject_and_scope_match: true
      effective: false
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRevocation
      - PermissionScope
    related_relation_ids:
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRevocation-revokes-AuthorizationGrant
    expected_result:
      zh: 有效性为 false，历史 grant 与撤销事件仍保留。
      en: Effectiveness is false while historical grant and revocation event remain.
      ja: 有効性は false で歴史 grant と取消イベントは保持されます。
    why_valid_or_invalid:
      zh: 主动撤销使未来有效性提前终止，但不删除历史身份。
      en: Active revocation ends future validity early without deleting historical identity.
      ja: 能動取消は将来有効性を早期終了し歴史同一性を削除しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-permission-policy-005
      - claim-safety-permission-policy-007
  - id: safety-permission-policy-cq-rule-conflict-v4-example-positive
    kind: positive
    labels:
      zh: 规则冲突可复现正例
      en: Reproducible rule-conflict case
      ja: 再現可能な規則競合正例
    scenario_id: authorization-rule-conflict-deny-overrides-55
    descriptions:
      zh: allow-approved-read 与 deny-sensitive-data 同时适用；tool-authorization@7 采用 deny-overrides@1，因此 decision-55 为 deny，并把 deny-sensitive-data 记录为决定性规则。
      en: allow-approved-read and deny-sensitive-data both apply; tool-authorization@7 uses deny-overrides@1, so decision-55 is deny and records deny-sensitive-data as determining.
      ja: allow-approved-read と deny-sensitive-data が共に適用され、tool-authorization@7 は deny-overrides@1 を使うため decision-55 は deny で deny-sensitive-data を決定規則として記録します。
    field_values:
      policy_version_ref: tool-authorization@7
      applicable_rule_results:
        allow-approved-read@7: allow
        deny-sensitive-data@7: deny
      combining_algorithm_ref: deny-overrides@1
      combining_strategy: deny-overrides
      decision_id: decision-55
      decision_kind: deny
      determining_rule_refs:
        - deny-sensitive-data@7
      input_digest: sha256:decision-55-input-bf09
      replay_result: deny
    related_node_ids:
      - PolicySpecification
      - PolicyRule
      - PolicyCombiningAlgorithm
      - PolicyDecision
    related_relation_ids:
      - PolicySpecification-contains-PolicyRule
      - PolicySpecification-uses-PolicyCombiningAlgorithm
      - PolicyDecision-derived_using-PolicyCombiningAlgorithm
      - PolicyDecision-based_on-PolicyRule
    expected_result:
      zh: 相同规则结果和算法版本稳定重现 deny。
      en: The same rule results and algorithm version reproducibly yield deny.
      ja: 同じ規則結果とアルゴリズム版が安定して deny を再現します。
    why_valid_or_invalid:
      zh: 冲突解决不是隐含优先级，而是策略版本中的显式算法。
      en: Conflict resolution is an explicit algorithm in the policy version rather than implicit priority.
      ja: 競合解決は暗黙優先度でなく方針版内の明示アルゴリズムです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-permission-policy-001
      - claim-safety-permission-policy-004
  - id: safety-permission-policy-cq-rule-conflict-v4-example-counter
    kind: boundary
    labels:
      zh: 缺失组合依据反例
      en: Missing-combining-basis counterexample
      ja: 結合根拠欠落の反例
    scenario_id: authorization-rule-conflict-missing-algorithm
    descriptions:
      zh: 两个规则一个 allow、一个 deny，但决定只记录数组中先出现的结果且没有算法版本；该记录不能回答为何选择最终结果。
      en: Two rules yield allow and deny, but the decision records only whichever appeared first in an array and no algorithm version; it cannot explain selection of the final outcome.
      ja: 二規則が allow と deny を返しても、判断が配列先頭結果だけを記録しアルゴリズム版がなければ最終結果選択を説明できません。
    field_values:
      policy_version_ref: tool-authorization@8-draft
      applicable_rule_results:
        allow-approved-read@8: allow
        deny-sensitive-data@8: deny
      recorded_rule_order:
        - allow-approved-read@8
        - deny-sensitive-data@8
      combining_algorithm_ref: null
      recorded_decision_id: decision-56
      recorded_decision_kind: allow
      determining_rule_refs: []
      replayable: false
      audit_status: insufficient-evidence
    related_node_ids:
      - PolicyRule
      - PolicyDecision
      - PolicyCombiningAlgorithm
    related_relation_ids:
      - PolicyDecision-based_on-PolicyRule
      - PolicyDecision-derived_using-PolicyCombiningAlgorithm
    expected_result:
      zh: 规则冲突 CQ 返回证据不足，决定不能作为已审计结果。
      en: The rule-conflict CQ returns insufficient evidence and the decision is not auditable.
      ja: 規則競合 CQ は証拠不足を返し判断は監査済み結果になりません。
    why_valid_or_invalid:
      zh: 规则共现不说明冲突策略，必须有算法关系。
      en: Rule co-occurrence does not state conflict strategy; the algorithm edge is required.
      ja: 規則共起は競合方式を示さずアルゴリズム辺が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-permission-policy-001
