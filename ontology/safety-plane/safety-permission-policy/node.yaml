    en: All 22 concept nodes manually verified against XACML 3.0 and NIST SP 800-162; PolicySpecification/Rule/Condition, Allow/Deny/Defer decisions, CapabilityGrant, and ToolApprovalGate align with standard authorization models.
    ja: XACML 3.0 と NIST SP 800-162 に照らし 22 概念ノードの手動意味審査を完了しました。
