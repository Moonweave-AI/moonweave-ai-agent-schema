module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 策略评估消费不可变 AuthorizationRequest、使用确定 PolicySpecification 版本，并可在策略要求时考虑与该请求匹配的 HumanApproval。
          en: PolicyEvaluation consumes an immutable AuthorizationRequest, uses an exact PolicySpecification version, and may consider a request-matching HumanApproval when policy requires it.
          ja: PolicyEvaluation は不変 AuthorizationRequest を消費し正確な PolicySpecification 版を使い、方針要求時に要求一致 HumanApproval を考慮できます。
        family_concept_ids:
          - AuthorizationRequest
          - PolicySpecification
          - HumanApproval
        relation_ids:
          - PolicyEvaluation-consumes-AuthorizationRequest
          - PolicyEvaluation-uses-PolicySpecification
          - PolicyEvaluation-considers-HumanApproval
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 策略评估产生 PolicyDecision；若结果为 AllowDecision，授权服务可据此签发受 PermissionScope 限定的 AuthorizationGrant。
