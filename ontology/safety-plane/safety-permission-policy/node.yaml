        - BoundaryCrossing-authorized_by-AuthorizationGrant
        - BoundaryCrossing-evaluated_by-PolicyDecision
      relation_not_applicable_reason: null
      source_claims:
        - claim-safety-permission-policy-008
        - claim-safety-permission-policy-009
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-safety-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认权限侧端点为 AuthorizationGrant 与 PolicyDecision；BoundaryCrossing-authorized_by-AuthorizationGrant 只在授权有效且适用于该跨越时成立，BoundaryCrossing-evaluated_by-PolicyDecision 只在该决定确实评估该跨越时成立。
              en: Domain review confirms AuthorizationGrant and PolicyDecision as the permission-side endpoints. BoundaryCrossing-authorized_by-AuthorizationGrant holds only when the grant is valid and applicable to that crossing, and BoundaryCrossing-evaluated_by-PolicyDecision only when the decision actually evaluates it.
              ja: domain review は permission-side endpoint を AuthorizationGrant と PolicyDecision と確認しました。BoundaryCrossing-authorized_by-AuthorizationGrant は grant が有効かつ crossing に適用される場合のみ、BoundaryCrossing-evaluated_by-PolicyDecision は decision が実際に crossing を評価する場合のみ成立します。
          - reviewer_id: moonweave-ontology-structure-reviewer
