  key_notion:
    zh: 策略规范
    en: policy specification
    ja: ポリシー仕様
  owns_when:
    zh: 当对象必须由策略修订及其规则、一项不可变授权请求、一次求值、决定、可授予范围、授权签发或撤销生命周期来识别时，由本模块拥有。
    en: Own an object when it must be identified by a policy revision and its rules, an immutable authorization request, one evaluation, decision, grantable scope, grant issuance, or revocation lifecycle.
    ja: ポリシー版と規則、不変の認可要求、一回の評価・判断、付与可能範囲、認可発行、取消ライフサイクルによって識別される対象を所有します。
  references_when:
    zh: 本模块引用主体、资源、动作、工具权限需求、数据区和环境属性；运行、工具、网络、隔离或副作用控制证明获准时，必须引用同一请求的有效决定、授权和范围，不能只引用规则名或角色。
    en: This module references the principal, resource, action, tool permission requirement, data zone, and environment attributes. Runtime, tool, network, isolation, or side-effect control proving authorization must reference the effective decision, grant, and scope for the same request—not merely a rule name or role.
    ja: 本モジュールは主体、資源、操作、ツール権限要件、データ区域、環境属性を参照します。実行、ツール、ネットワーク、隔離、副作用制御が認可を証明する場合、同一要求の有効な判断、付与、範囲を参照し、規則名や役割だけに依存してはなりません。
