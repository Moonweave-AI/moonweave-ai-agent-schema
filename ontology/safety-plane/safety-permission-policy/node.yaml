schema: moonweave.ai/ontology-node/v1
id: safety-permission-policy
kind: module
status: accepted
labels:
  zh: 授权与策略决策
  en: Authorization and policy decisions
  ja: 認可とポリシー判断
semantics:
  short_definition:
    zh: 授权与策略决策描述主体请求对资源执行某项动作时，如何依据版本化策略和当前环境求值，得到允许、拒绝或暂缓决定，并在允许时形成有范围、期限且可撤销的授权。权限提示、人工批准和工具授权门是取证与执行环节，不能替代授权请求、策略决定或授权授予本身。
    en: Authorization and policy decisions describes how a principal's request to perform an action on a resource is evaluated against versioned policy and current environment to produce an allow, deny, or defer decision, and how an allow decision may yield a scoped, time-bounded, revocable grant. Permission prompts, human approvals, and tool authorization gates are evidence and enforcement steps; they do not replace the authorization request, policy decision, or grant.
    ja: 認可とポリシー判断は、主体が資源へ操作を求めたとき、版管理されたポリシーと現在環境に照らして評価し、許可・拒否・保留の判断を出し、許可時には範囲・期限付きで取消可能な認可を形成する過程を記述します。権限提示、人間承認、ツール認可ゲートは証拠取得と執行の段階であり、認可要求、ポリシー判断、認可付与そのものを置き換えません。
  definition:
    zh: 授权与策略决策描述主体请求对资源执行某项动作时，如何依据版本化策略和当前环境求值，得到允许、拒绝或暂缓决定，并在允许时形成有范围、期限且可撤销的授权。权限提示、人工批准和工具授权门是取证与执行环节，不能替代授权请求、策略决定或授权授予本身。
    en: Authorization and policy decisions describes how a principal's request to perform an action on a resource is evaluated against versioned policy and current environment to produce an allow, deny, or defer decision, and how an allow decision may yield a scoped, time-bounded, revocable grant. Permission prompts, human approvals, and tool authorization gates are evidence and enforcement steps; they do not replace the authorization request, policy decision, or grant.
    ja: 認可とポリシー判断は、主体が資源へ操作を求めたとき、版管理されたポリシーと現在環境に照らして評価し、許可・拒否・保留の判断を出し、許可時には範囲・期限付きで取消可能な認可を形成する過程を記述します。権限提示、人間承認、ツール認可ゲートは証拠取得と執行の段階であり、認可要求、ポリシー判断、認可付与そのものを置き換えません。
  why_needed:
    zh: 让“谁、在什么环境下、可以对什么做什么、依据哪版规则、有效到何时”成为可重放和可撤销的事实链。
    en: Make who may do what to which resource, under what environment, under which policy revision, and until when a replayable and revocable fact chain.
    ja: 誰が、どの環境で、何に対して何をでき、どのポリシー版に基づき、いつまで有効かを、再現・取消可能な事実連鎖にします。
  includes:
    - zh: 版本化 PolicySpecification 及其规则、条件、效果、组合算法、义务与建议；XACML 等规范只是表达这些语义的权威依据，不是额外业务节点。
      en: Versioned PolicySpecifications and their rules, conditions, effects, combining algorithms, obligations, and advice; standards such as XACML are authoritative expression models, not additional business nodes.
      ja: 版管理された PolicySpecification と、その規則、条件、効果、結合アルゴリズム、義務、助言を含みます。XACML などの規格はこれらを表現する権威ある根拠であり、別の業務ノードではありません。
    - zh: 不可变授权请求、权限范围、策略评估、允许/拒绝/暂缓决定、有范围的授权授予及其撤销生命周期。
      en: Immutable authorization requests, permission scopes, policy evaluations, allow/deny/defer decisions, scoped authorization grants, and their revocation lifecycle.
      ja: 不変の認可要求、権限範囲、ポリシー評価、許可・拒否・保留判断、範囲付き認可付与、その取消ライフサイクルを含みます。
    - zh: 与同一请求绑定的权限提示、响应、人工批准证据，以及执行有效决定的工具授权门。
      en: Permission prompts, responses, and human-approval evidence bound to the same request, plus a tool authorization gate that enforces an effective decision.
      ja: 同一要求に結び付く権限提示、応答、人間承認証拠と、有効な判断を執行するツール認可ゲートを含みます。
  excludes:
    - zh: Actor 身份、角色和能力声明归运行参与者；工具定义中声明的权限需求只是授权请求的输入，不是 PolicyDecision 或 AuthorizationGrant。
      en: Actor identity, role, and capability declarations belong to Runtime participants; permission requirements declared by a tool definition are inputs to authorization, not a PolicyDecision or AuthorizationGrant.
      ja: Actor の同一性、役割、能力宣言は実行参加者に属します。ツール定義が示す権限要件は認可への入力であり、PolicyDecision や AuthorizationGrant ではありません。
    - zh: DataZone、TrustBoundary 和实际 BoundaryCrossing 归信任边界；策略把它们作为求值上下文而不复制其身份。
      en: DataZone, TrustBoundary, and actual BoundaryCrossing belong to trust boundaries; policy uses them as evaluation context without copying their identity.
      ja: DataZone、TrustBoundary、実際の BoundaryCrossing は信頼境界に属し、ポリシーはそれらを同一性を複製せず評価文脈として使います。
    - zh: 业务路由、提交幂等性、调用结果和副作用回执分别归路由、提交控制与能力调用；获准执行不等于已经执行或已经改变外部状态。
      en: Business routing, commit idempotency, invocation results, and side-effect receipts belong respectively to routing, commit control, and capability invocation; authorization to execute is not proof of execution or external change.
      ja: 業務経路、確定の冪等性、呼び出し結果、副作用受領はそれぞれ経路、確定制御、能力呼び出しに属します。実行許可は実行済みや外部変更済みの証明ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为策略、请求、评估、决定、授予、人工证据、执行门和撤销建立不混级的授权闭环。
  en: Establish a level-correct authorization loop across policy, request, evaluation, decision, grant, human evidence, enforcement gate, and revocation.
  ja: ポリシー、要求、評価、判断、付与、人間証拠、執行ゲート、取消を、階層を混同しない認可閉路として確立します。
