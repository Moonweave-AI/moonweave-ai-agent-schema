  - id: claim-safety-permission-policy-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-002
    source: eng-policy-opa
    supports: OPA documents structured input evaluated against policy and data to produce a policy decision, while enforcement remains the caller's responsibility.
    locator: Open Policy Agent documentation > What is OPA? > policy input, evaluation, decision output, and separation from enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-003
    source: eng-security-nist-abac
    supports: NIST defines authorization as evaluation of subject, object, requested operation, and environment attributes against policy, rules, or relationships describing allowed operations.
    locator: "NIST SP 800-162, Section 3: ABAC definition using subject, object, operation, environment attributes, policy, and rules"
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-004
    source: eng-policy-aws-verified-permissions
    supports: Verified Permissions defines an authorization request over principal, action, resource, and context, and a response containing allow or deny plus determining-policy identifiers.
    locator: Amazon Verified Permissions User Guide > Terms and concepts > authorization request, authorization response, determining policies, and enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-005
    source: eng-proto-oauth-rfc7009
    supports: RFC 7009 specifies an explicit revocation request and permits invalidation of related authorization credentials while requiring clients to tolerate unexpected invalidation.
    locator: "RFC 7009, Sections 2.1-2.3: token revocation request, response, and authorization-server invalidation behavior"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-006
    source: eng-fw-langgraph-interrupts
    supports: LangGraph interrupts persist execution state, expose a payload to an external reviewer, and resume with an explicit Command value rather than implying approval from a pause.
    locator: LangGraph documentation > Interrupts > pause using interrupt and resume using Command with persisted state
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-007
    source: eng-proto-mcp-auth
    supports: The MCP authorization specification binds protected resources, resource indicators, authorization-server metadata, and OAuth scopes in an authorization flow.
    locator: MCP 2025-06-18 Authorization specification > authorization flow, protected-resource metadata, resource indicators, and scopes
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-safety-permission-policy-008
    source: eng-security-nist-abac
    supports: NIST SP 800-162 separates access policies, authorization requests, attribute evaluation, and allow or deny decisions. That separation supports independently identifiable AuthorizationGrant and PolicyDecision objects even when no trust-boundary crossing occurs. Their use as targets of BoundaryCrossing relations, and the exact Moonweave ownership split, are reviewed design inferences.
    locator: NIST SP 800-162 Sections 2.1-2.3 and 3, ABAC requests, policies, attributes, and decisions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-009
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 separates policy decisions and enforcement from trust zones and communication paths and rejects implicit trust based on location. This supports connecting one BoundaryCrossing to an explicit AuthorizationGrant and PolicyDecision without treating the grant or decision as part of the boundary itself. The exact classes and two predicates are Moonweave design inferences.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, policy decision points, enforcement points, trust zones, and communication paths
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-010
    source: eng-security-nist-abac
    supports: NIST SP 800-162 models an authorization request and decision over subject, object, operation, and environment attributes. This supports a policy record that can be referenced by a separately identified crossing occurrence, while leaving the physical or logical crossing fact outside the authorization taxonomy. BoundaryCrossing and the two exact relation directions are Moonweave design inferences.
    locator: NIST SP 800-162 Sections 2.1-2.3 and 3, request context, policy evaluation, and decisions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-011
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 distinguishes trust zones and communication paths from policy-engine decisions and enforcement. This supports BoundaryCrossing retaining an occurrence identity while referencing the AuthorizationGrant and PolicyDecision that governed it, rather than duplicating those policy objects in the trust-boundary module. The exact Moonweave predicates are design inferences.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones, policy engine, policy administrator, and enforcement point
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-012
    source: eng-security-nist-abac
    supports: NIST SP 800-162 makes the subject a first-class participant in an access request and evaluates subject attributes separately from policy and decision artifacts. This supports runtime ownership of Actor while an AuthorizationGrant records which actor received authority. AuthorizationGrant-granted_to-Actor and the exact ownership split are Moonweave design inferences.
    locator: NIST SP 800-162 Sections 2.1-2.3, subject, subject attributes, access request, and authorization decision
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-013
    source: eng-proto-mcp-auth
    supports: The MCP authorization specification distinguishes the protected resource, authorization server metadata, resource indicators, and the authenticated client context. That separation supports retaining the runtime Actor identity independently from a permission-domain grant issued to it. The Actor class and AuthorizationGrant-granted_to-Actor predicate are Moonweave design inferences.
    locator: MCP 2025-06-18 Authorization, protected-resource metadata, authorization-server discovery, and resource indicators
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-014
    source: eng-security-nist-abac
    supports: NIST SP 800-162 treats the subject as the entity requesting access while policies and decisions determine authorized operations under attributes and environment conditions. This supports a grant artifact with its own scope and validity that can point to, but is not identical with, the runtime Actor. AuthorizationGrant and the granted_to predicate are Moonweave design inferences.
    locator: NIST SP 800-162 Sections 2.1-2.3 and 3, subjects, access requests, policies, and authorization decisions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-permission-policy-015
    source: eng-proto-mcp-auth
    supports: The MCP authorization flow binds authorization to a protected resource and authenticated client context while keeping resource metadata and authorization-server metadata separately identifiable. This supports permission ownership of the grant and runtime ownership of the receiving Actor. The Moonweave AuthorizationGrant class and AuthorizationGrant-granted_to-Actor relation are design inferences.
    locator: MCP 2025-06-18 Authorization, protected-resource metadata, client authentication context, and resource indicators
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
