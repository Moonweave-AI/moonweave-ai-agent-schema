      decision: owns
      owner_module_id: safety-permission-policy
      rationale:
        zh: 权限侧实际端点只有 AuthorizationGrant 与 PolicyDecision：BoundaryCrossing-authorized_by-AuthorizationGrant 记录一次跨越依据的有效授权，BoundaryCrossing-evaluated_by-PolicyDecision 记录针对该跨越形成的策略结论。PermissionScope 与 PolicyEvaluation 虽在同域，但不是这两条边的端点。
        en: "The permission-side endpoints are exactly AuthorizationGrant and PolicyDecision: BoundaryCrossing-authorized_by-AuthorizationGrant records the valid grant relied on by one crossing, while BoundaryCrossing-evaluated_by-PolicyDecision records the policy conclusion for it. PermissionScope and PolicyEvaluation belong to the domain but are not endpoints of these edges."
        ja: permission-side endpoint は AuthorizationGrant と PolicyDecision のみです。BoundaryCrossing-authorized_by-AuthorizationGrant は一 crossing が依拠する有効 grant、BoundaryCrossing-evaluated_by-PolicyDecision はその crossing に対する policy conclusion を記録します。PermissionScope と PolicyEvaluation は同 domain でも endpoint ではありません。
