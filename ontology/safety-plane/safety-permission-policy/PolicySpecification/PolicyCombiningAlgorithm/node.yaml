schema: moonweave.ai/ontology-node/v1
id: PolicyCombiningAlgorithm
kind: concept
status: accepted
labels:
  zh: 策略组合算法
  en: policy combining algorithm
  ja: ポリシー結合アルゴリズム
semantics:
  short_definition:
    zh: 把多个适用规则结果确定性归并为一个策略决定的版本化规范。
    en: A versioned specification that deterministically combines multiple applicable rule results into one policy decision.
    ja: 複数の適用規則結果を一つの方針判断へ決定的に結合する版管理仕様です。
  definition:
    zh: 策略组合算法是 PolicySpecification 的组成规范，定义多个规则产生 permit、deny、defer、not-applicable 或 indeterminate 时的排序、优先级、短路、平局和默认结果。一次 PolicyDecision 必须记录实际使用的算法版本，不能仅凭规则排列猜测冲突处理。
    en: A PolicyCombiningAlgorithm is a component specification of a PolicySpecification defining ordering, priority, short-circuit, tie, and default behavior when rules yield permit, deny, defer, not-applicable, or indeterminate. Each PolicyDecision records the exact algorithm version used; conflict resolution cannot be inferred merely from rule order.
    ja: PolicyCombiningAlgorithm は PolicySpecification の構成仕様で、規則が permit・deny・defer・not-applicable・indeterminate を返す場合の順序、優先度、短絡、同順位、既定結果を定めます。各 PolicyDecision は使用したアルゴリズム版を記録し、規則順だけから競合処理を推測しません。
  why_needed:
    zh: 它补齐规则冲突 CQ 的决定依据，使 deny-overrides、first-applicable 或自定义策略能够被复现，而不是写成不可验证的口头约定。
    en: It supplies the missing decision basis for the rule-conflict CQ, making deny-overrides, first-applicable, or a custom strategy reproducible rather than an unverifiable convention.
    ja: 規則競合 CQ の判断根拠を補い、deny-overrides・first-applicable・独自方式を検証不能な慣習ではなく再現可能にします。
  includes:
    - zh: 包含算法标识、版本、策略名称、平局处理、缺省结果和确定性要求。
      en: Includes algorithm identity, version, strategy name, tie behavior, default outcome, and determinism requirement.
      ja: アルゴリズム識別子、版、方式名、同順位処理、既定結果、決定性要件を含みます。
  excludes:
    - zh: 不包含一次算法执行、规则本身、最终决定或执行系统的分支路由。
      en: Excludes one algorithm execution, the rules themselves, the final decision, or business routing by an execution system.
      ja: 一回のアルゴリズム実行、規則自体、最終判断、実行系の業務経路選択を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - algorithm_id
    - version
  fields:
    - id: algorithm_id
      labels:
        zh: 算法标识
        en: algorithm ID
        ja: アルゴリズムID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一种规则结果组合策略。
        en: Stable identity for a rule-result combining strategy.
        ja: 規則結果結合方式を安定識別します。
      allowed_values: []
      pattern: null
      example_value: deny-overrides
      source_claims:
        - claim-policy-combining-algorithm-001
    - id: version
      labels:
        zh: 算法版本
        en: algorithm version
        ja: アルゴリズム版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 确定本次决定采用的不可变算法语义。
        en: Immutable semantic version used by a decision.
        ja: 判断で使用する不変の意味版です。
      allowed_values: []
      pattern: null
      example_value: "1"
      source_claims:
        - claim-policy-combining-algorithm-001
    - id: strategy
      labels:
        zh: 组合策略
        en: combining strategy
        ja: 結合方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 描述规则结果的求值和归并顺序。
        en: Describes evaluation and combination order for rule results.
        ja: 規則結果の評価・結合順序を表します。
      allowed_values: []
      pattern: null
      example_value: deny-overrides
      source_claims:
        - claim-policy-combining-algorithm-001
    - id: tie_behavior
      labels:
        zh: 平局处理
        en: tie behavior
        ja: 同順位処理
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 同等优先级结果冲突时的明确处理。
        en: Explicit handling when equal-priority results conflict.
        ja: 同優先度の結果が競合する場合の明示処理です。
      allowed_values: []
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-combining-algorithm-001
    - id: default_outcome
      labels:
        zh: 缺省结果
        en: default outcome
        ja: 既定結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 没有规则产生允许结果时采用的封闭式默认值。
        en: Closed-world default used when no rule produces a permitting result.
        ja: 許可結果を出す規則がない場合の閉世界既定値です。
      allowed_values: []
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-combining-algorithm-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: policy-combining-algorithm-opa
    labels:
      zh: 策略组合算法 - OPA Rego 策略评估
      en: policy combining algorithm - OPA Rego policy evaluation
      ja: ポリシー結合アルゴリズム - OPA Rego ポリシー評価
    descriptions: {zh: "策略组合算法(PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: 把多个适用规则结果确定性归并为一个策略决定的版本化规范。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: tie_behavior, default_outcome, version.", en: "policy combining algorithm (PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: A versioned specification that deterministically combines multiple applicable rule results into one policy decision.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include tie_behavior, default_outcome, version.", ja: "ポリシー結合アルゴリズム(PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: 複数の適用規則結果を一つの方針判断へ決定的に結合する版管理仕様です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: tie_behavior, default_outcome, version."}
    field_values:
      algorithm_id: deny-overrides
      default_outcome: deny
      strategy: deny-overrides
      tie_behavior: deny
      version: "1"
    related_node_ids:
      - PolicyCombiningAlgorithm
      - PolicyDecision
      - PolicyEvaluation
      - PolicySpecification
    related_relation_ids:
