    locator: Combining algorithm boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-combining-design
    source: xacml-3-core
    supports: XACML rule-combining algorithms map to PolicyCombiningAlgorithm revisions.
    locator: Combining algorithms
    evidence_kind: design-inference
    confidence: high
