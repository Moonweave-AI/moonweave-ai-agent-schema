parent_relation:
  id: PolicySpecification-uses-PolicyCombiningAlgorithm
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 采用组合算法
    en: uses combining algorithm
    ja: 結合アルゴリズムを使う
  definitions:
    zh: 一个策略规范版本选择一个明确版本的 PolicyCombiningAlgorithm，规定其规则结果的冲突、优先级、平局和缺省处理。
    en: A PolicySpecification version selects a specific PolicyCombiningAlgorithm version governing conflict, priority, ties, and defaults among its rule results.
    ja: 一つの PolicySpecification 版が特定 PolicyCombiningAlgorithm 版を選び、規則結果の競合・優先度・同順位・既定処理を定めます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被策略采用
      en: is used by policy
      ja: 方針に使用される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicySpecification-uses-PolicyCombiningAlgorithm-example-positive-manual-001
      labels:
        zh: 采用组合算法正例
        en: Positive uses combining algorithm case
        ja: 結合アルゴリズムを使うの正例
      descriptions:
        zh: tool-authorization@7 采用 deny-overrides@1，并在策略版本元数据中固定该引用。
        en: tool-authorization@7 uses deny-overrides@1 and fixes that reference in policy-version metadata.
        ja: tool-authorization@7 は deny-overrides@1 を使用し、方針版メタデータで参照を固定します。
      field_values: {}
      related_node_ids:
        - PolicySpecification
        - PolicyCombiningAlgorithm
      related_relation_ids:
        - PolicySpecification-uses-PolicyCombiningAlgorithm

        en: Every evaluation of the version resolves the same combining semantics.
        ja: その版の任意評価が同じ結合意味を解決します。

        en: The combining algorithm is versioned policy content rather than a runtime random choice.
        ja: 結合アルゴリズムは版管理方針内容で実行時ランダム選択ではありません。
      source_claims:
        - claim-policy-combining-algorithm-001
    - id: PolicySpecification-uses-PolicyCombiningAlgorithm-example-boundary-manual-001
      labels:
        zh: 采用组合算法边界反例
        en: Boundary counterexample for uses combining algorithm
        ja: 結合アルゴリズムを使うの境界反例
      descriptions:
        zh: evaluation-42 按性能优化调整规则求值顺序，但不能因此改变策略声明的 deny-overrides@1。
        en: evaluation-42 changes rule evaluation order for performance but cannot thereby change the policy-declared deny-overrides@1 semantics.
        ja: evaluation-42 は性能のため規則評価順を変えても方針宣言 deny-overrides@1 の意味を変えられません。
      field_values: {}
      related_node_ids:
        - PolicySpecification
        - PolicyCombiningAlgorithm
      related_relation_ids:
        - PolicySpecification-uses-PolicyCombiningAlgorithm

        en: Implementation optimization must preserve equivalent results and uses still points to the declared algorithm.
        ja: 実装最適化は同等結果を保ち uses は宣言アルゴリズムを指し続けます。

        en: Execution order and normative combining semantics are not the same fact.
        ja: 実行順と規範結合意味は同一事実ではありません。
      source_claims:
        - claim-policy-combining-algorithm-001
  source_claims:
