      en: policy combining algorithm - TrustLLM six-dimension trust
      ja: ポリシー結合アルゴリズム - TrustLLM 6次元信頼性
    descriptions: {zh: "策略组合算法(PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: 把多个适用规则结果确定性归并为一个策略决定的版本化规范。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: tie_behavior, default_outcome, version.", en: "policy combining algorithm (PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: A versioned specification that deterministically combines multiple applicable rule results into one policy decision.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include tie_behavior, default_outcome, version.", ja: "ポリシー結合アルゴリズム(PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: 複数の適用規則結果を一つの方針判断へ決定的に結合する版管理仕様です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: tie_behavior, default_outcome, version."}
