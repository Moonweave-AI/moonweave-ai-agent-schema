schema: moonweave.ai/ontology-node/v1
id: PolicyCombiningAlgorithm
kind: concept
labels:
  zh: 策略组合算法
  en: policy combining algorithm
  ja: ポリシー結合アルゴリズム
semantics:
  short_definition:
    zh: 当多条 PolicyRule 同时适用时合并 Permit/Deny 结果的版本化算法规范。
    en: A versioned specification for merging Permit/Deny results when multiple PolicyRules apply.
    ja: 複数 PolicyRule が同時適用されるとき Permit/Deny 結果を合并する版管理 algorithm specification。
  definition:
    zh: PolicyCombiningAlgorithm 以 algorithm_id+version 声明 deny-overrides、permit-overrides、first-applicable 等 XACML 式组合语义。OPA 的 default allow/deny 与 partial set 语义、Rego 中多个 deny/allow 规则冲突时的求值顺序，都应引用显式 combining 版本；数组顺序 alone 不足以审计冲突策略。
    en: PolicyCombiningAlgorithm declares deny-overrides, permit-overrides, first-applicable, and other XACML-style combining semantics via algorithm_id+version. OPA default allow/deny and partial-set semantics, plus Rego evaluation order when multiple deny/allow rules conflict, must cite an explicit combining revision; array order alone is insufficient to audit conflict strategy.
    ja: PolicyCombiningAlgorithm は algorithm_id+version で deny-overrides/permit-overrides/first-applicable 等 XACML 式 combining semantics を宣言。OPA default allow/deny、Rego 複数 deny/allow 競合時の順序は explicit combining revision 参照必須。配列順だけでは監査不可。
  why_needed:
    zh: permit 与 deny 共现时必须可复现冲突策略；否则 OPA 与 XACML 集成无法对齐决定。
    en: When permit and deny co-occur, conflict strategy must be reproducible or OPA and XACML integrations cannot align decisions.
    ja: permit/deny 共起時 conflict strategy を再現できないと OPA/XACML 統合で判断整合不可。
  includes:
    - zh: 包含算法标识、版本、策略名称、平局处理、缺省结果和确定性要求。
      en: Includes algorithm identity, version, strategy name, tie behavior, default outcome, and determinism requirement.
      ja: アルゴリズム識別子、版、方式名、同順位処理、既定結果、決定性要件を含みます。
  excludes:
    - zh: 不包含一次算法执行、规则本身、最终决定或执行系统的分支路由。
      en: Excludes one algorithm execution, the rules themselves, the final decision, or business routing by an execution system.
      ja: 一回のアルゴリズム実行、規則自体、最終判断、実行系の業務経路選択を含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Moonweave 默认 deny-overrides@1 对齐 XACML DenyOverrides；OPA 集成时在 decision 中记录 determining rules 与 algorithm_ref。MCP/Cursor 多层策略（OAuth scope + allowlist + tool annotation）必须声明组合算法。
    en: Moonweave defaults to deny-overrides@1 aligned with XACML DenyOverrides; OPA integrations record determining rules and algorithm_ref on decisions. MCP/Cursor layered policies (OAuth scope + allowlist + tool annotation) must declare a combining algorithm.
    ja: Moonweave 默认 deny-overrides@1（XACML DenyOverrides 整合）。OPA 統合は decision に determining rules/algorithm_ref 記録。MCP/Cursor 多層 policy は combining algorithm 宣言必須。
  typical_input:
    - description: XACML combining identifier.
      format: urn:oasis:names:tc:xacml:3.0:rule-combining-algorithm:deny-overrides
      source_claims:
        - claim-policy-combining-design
  typical_output:
    - description: Decision cites algorithm.
      format: '{"combining_algorithm_ref":"deny-overrides@1","determining_rule_refs":["deny-unlisted-shell@3"]}'
      source_claims:
        - claim-policy-combining-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - algorithm_id
    - version
  fields:
    - id: algorithm_id
      labels:
        zh: 算法标识
        en: algorithm ID
        ja: アルゴリズムID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一种规则结果组合策略。
        en: Stable identity for a rule-result combining strategy.
        ja: 規則結果結合方式を安定識別します。
      allowed_values: []
      pattern: null
      example_value: deny-overrides
      source_claims:
        - claim-policy-combining-design
    - id: version
      labels:
        zh: 算法版本
        en: algorithm version
        ja: アルゴリズム版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 确定本次决定采用的不可变算法语义。
        en: Immutable semantic version used by a decision.
        ja: 判断で使用する不変の意味版です。
      allowed_values: []
      pattern: null
      example_value: "1"
      source_claims:
        - claim-policy-combining-design
    - id: strategy
      labels:
        zh: 组合策略
        en: combining strategy
        ja: 結合方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 描述规则结果的求值和归并顺序。
        en: Describes evaluation and combination order for rule results.
        ja: 規則結果の評価・結合順序を表します。
      allowed_values: []
      pattern: null
      example_value: deny-overrides
      source_claims:
        - claim-policy-combining-design
    - id: tie_behavior
      labels:
        zh: 平局处理
        en: tie behavior
        ja: 同順位処理
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 同等优先级结果冲突时的明确处理。
        en: Explicit handling when equal-priority results conflict.
        ja: 同優先度の結果が競合する場合の明示処理です。
      allowed_values: []
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-combining-design
    - id: default_outcome
      labels:
        zh: 缺省结果
        en: default outcome
        ja: 既定結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 没有规则产生允许结果时采用的封闭式默认值。
        en: Closed-world default used when no rule produces a permitting result.
        ja: 許可結果を出す規則がない場合の閉世界既定値です。
      allowed_values: []
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-combining-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyCombiningAlgorithm-deny-overrides
    labels:
      zh: deny-overrides 算法
      en: deny-overrides algorithm
      ja: deny-overrides algorithm
    descriptions:
      zh: deny-overrides@1 在 allow 与 deny 规则同时命中时选择 deny，对齐 XACML DenyOverrides。
      en: deny-overrides@1 selects deny when allow and deny rules both match, aligned with XACML DenyOverrides.
      ja: deny-overrides@1 は allow/deny 同時命中で deny を選択（XACML DenyOverrides 整合）。
    example_source:
      product: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      version: DenyOverrides
    field_values:
      algorithm_id: deny-overrides
      version: "1"
    related_node_ids:
      - PolicyCombiningAlgorithm
      - PolicyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-combining-design
  - id: PolicyCombiningAlgorithm-opa-partial
    labels:
      zh: OPA partial set 组合
      en: OPA partial set combining
      ja: OPA partial set combining
    descriptions:
      zh: OPA 多 deny 规则 undefined 组合时 decision-55 引用 deny-overrides@1 与 determining deny-unlisted-shell@3。
      en: When OPA partial deny rules are undefined, decision-55 cites deny-overrides@1 and determining deny-unlisted-shell@3.
      ja: OPA partial deny 未定義時 decision-55 が deny-overrides@1 と deny-unlisted-shell@3 を引用。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: undefined decisions
    field_values:
      algorithm_id: deny-overrides
      version: "1"
    related_node_ids:
      - PolicyCombiningAlgorithm
      - DenyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-combining-design
  - id: PolicyCombiningAlgorithm-mcp-layered
    labels:
      zh: MCP 多层策略组合
      en: MCP layered policy combining
      ja: MCP layered policy combining
    descriptions:
      zh: OAuth scope permit 与 MCP requireApproval defer 规则共现时 combining 决定 defer 优先于隐式 allow。
      en: When OAuth scope permit coexists with MCP requireApproval defer rules, combining makes defer prevail over implicit allow.
      ja: OAuth scope permit と MCP requireApproval defer 共起時 combining が implicit allow より defer を優先。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: layered policies
    field_values:
      algorithm_id: defer-over-human
      version: "2"
    related_node_ids:
      - PolicyCombiningAlgorithm
      - DeferDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-combining-design
  - id: PolicyCombiningAlgorithm-boundary-order
    labels:
      zh: 规则顺序不是算法
      en: Rule order is not algorithm
      ja: rule order は algorithm ではない
    descriptions:
      zh: PolicyRule 数组顺序 alone 不能证明 deny-overrides；必须引用 PolicyCombiningAlgorithm 版本。
      en: PolicyRule array order alone cannot prove deny-overrides; PolicyCombiningAlgorithm revision must be cited.
      ja: PolicyRule 配列順だけでは deny-overrides 証明不可。PolicyCombiningAlgorithm revision 引用必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: explicit algorithm
    field_values: {}
    related_node_ids:
      - PolicyCombiningAlgorithm
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-combining-design
parent_relation:
  id: PolicySpecification-uses-PolicyCombiningAlgorithm
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 采用组合算法
    en: uses combining algorithm
    ja: 結合アルゴリズムを使う
  definitions:
    zh: 一个策略规范版本选择一个明确版本的 PolicyCombiningAlgorithm，规定其规则结果的冲突、优先级、平局和缺省处理。
    en: A PolicySpecification version selects a specific PolicyCombiningAlgorithm version governing conflict, priority, ties, and defaults among its rule results.
    ja: 一つの PolicySpecification 版が特定 PolicyCombiningAlgorithm 版を選び、規則結果の競合・優先度・同順位・既定処理を定めます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被策略采用
      en: is used by policy
      ja: 方針に使用される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-combining-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
