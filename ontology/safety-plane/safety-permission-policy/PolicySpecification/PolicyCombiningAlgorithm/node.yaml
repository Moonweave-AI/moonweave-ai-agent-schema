      ja: ポリシー結合アルゴリズム - Cedar 認可評価
    descriptions: {zh: "策略组合算法(PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: 把多个适用规则结果确定性归并为一个策略决定的版本化规范。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: tie_behavior, default_outcome, version.", en: "policy combining algorithm (PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: A versioned specification that deterministically combines multiple applicable rule results into one policy decision.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include tie_behavior, default_outcome, version.", ja: "ポリシー結合アルゴリズム(PolicyCombiningAlgorithm) [PolicyCombiningAlgorithm]: 複数の適用規則結果を一つの方針判断へ決定的に結合する版管理仕様です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: tie_behavior, default_outcome, version."}
    field_values:
      algorithm_id: deny-overrides
