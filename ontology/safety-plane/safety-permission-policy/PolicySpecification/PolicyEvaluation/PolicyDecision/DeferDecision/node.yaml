    descriptions:
      zh: 规则不适用且需人工策略时 decision-9 defer，引用 combining 与 missing-attribute 证据。
      en: When rules not applicable and human policy needed, decision-9 defer with combining and missing-attribute evidence.
      ja: rule 不适用かつ human policy 要→decision-9 defer。
    example_source:
