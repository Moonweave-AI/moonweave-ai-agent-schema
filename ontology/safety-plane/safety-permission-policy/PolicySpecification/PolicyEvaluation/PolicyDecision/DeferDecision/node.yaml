      expected_result:
        zh: 路由决定保持其自身类型。
        en: The routing decision retains its own type.
        ja: 経路判断は固有型を保ちます。
      why_valid_or_invalid:
        zh: 后续去向选择不构成当前授权结果的种差。
        en: Choosing a later destination does not constitute the current authorization-outcome differentia.
        ja: 後続行先選択は現在認可結果の種差を構成しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
