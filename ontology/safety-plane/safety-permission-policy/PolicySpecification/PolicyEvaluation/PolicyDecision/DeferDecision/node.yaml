    source: eng-fw-langgraph-interrupts
    supports: LangGraph interrupts persist execution state, expose a payload to an external reviewer, and resume with an explicit Command value rather than implying approval from a pause.
    locator: LangGraph documentation > Interrupts > pause using interrupt and resume using Command with persisted state
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-defer-decision-003
    source: eng-policy-opa
    supports: OPA documents structured input evaluated against policy and data to produce a policy decision, while enforcement remains the caller's responsibility.
    locator: Open Policy Agent documentation > What is OPA? > policy input, evaluation, decision output, and separation from enforcement
    evidence_kind: official
    confidence: high
