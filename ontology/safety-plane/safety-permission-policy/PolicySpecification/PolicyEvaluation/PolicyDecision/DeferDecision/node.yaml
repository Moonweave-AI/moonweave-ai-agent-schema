schema: moonweave.ai/ontology-node/v1
id: DeferDecision
kind: concept
status: review
labels:
  zh: 暂缓决定
  en: defer decision
  ja: 保留判断
semantics:
  short_definition:
    zh: 在缺少必要证据或授权者时不允许也不最终拒绝、明确等待条件的策略决定。
    en: A PolicyDecision that neither allows nor finally denies because required evidence or authority is missing and explicit resume conditions remain.
    ja: 必要証拠または権限者が不足し、許可も最終拒否もせず明示再開条件を待つ方針判断です。
  definition:
    zh: 暂缓决定是 PolicyDecision 的结果子类，记录 outcome=defer、缺少的证据或审批、下一授权主体及重新评估条件。它不自行路由执行、不等于 Escalation 活动，也绝不能被执行方当作临时 allow；满足条件后必须创建新的 PolicyEvaluation 和决定。
    en: A DeferDecision is the outcome subtype of PolicyDecision recording outcome=defer, missing evidence or approval, next authority, and reevaluation conditions. It does not route execution by itself, is not an escalation activity, and must never be treated as temporary allow; satisfaction of its conditions requires a new PolicyEvaluation and decision.
    ja: DeferDecision は PolicyDecision の結果下位型で、outcome=defer、不足証拠・承認、次の権限主体、再評価条件を記録します。自ら実行経路を選ばず escalation 活動でもなく、仮 allow として扱えません。条件充足後は新 PolicyEvaluation と判断が必要です。
  why_needed:
    zh: 它替代含混的 EscalationDecision，把“当前未授权”与“由谁、补什么证据后重评”写清，同时不侵入路由域。
    en: It replaces ambiguous EscalationDecision by making current non-authorization and the authority/evidence needed for reevaluation explicit without invading routing semantics.
    ja: 曖昧な EscalationDecision を置換し、現在未認可と再評価に必要な権限者・証拠を明示し、経路制御意味へ侵入しません。
  includes:
    - zh: 包含继承的 decision_id、固定 defer 结果、缺失证据、下一授权主体和重评条件。
      en: Includes inherited decision_id, fixed defer outcome, missing evidence, next authority, and reevaluation conditions.
      ja: 継承 decision_id、固定 defer 結果、不足証拠、次権限主体、再評価条件を含みます。
  excludes:
    - zh: 不包含路由目标、人工批准事件、允许决定、拒绝决定或自动恢复活动。
      en: Excludes routing target, HumanApproval event, AllowDecision, DenyDecision, or automatic recovery activity.
      ja: 経路対象、HumanApproval イベント、AllowDecision、DenyDecision、自動回復活動を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision.
        ja: 上位 PolicyDecision と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-43
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
    - id: missing_evidence
      labels:
        zh: 缺失证据
        en: missing evidence
        ja: 不足証拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 阻止当前评估作出 allow 或最终 deny 的证据缺口。
        en: Evidence gaps preventing the current evaluation from allow or final deny.
        ja: 現在評価が allow または最終 deny を出せない証拠不足です。
      allowed_values: []
      pattern: null
      example_value:
        - human approval
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
    - id: next_authority_ref
      labels:
        zh: 下一授权主体
        en: next authority reference
        ja: 次権限主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有资格补足缺失决定依据的主体。
        en: Principal eligible to supply the missing decision basis.
        ja: 不足判断根拠を補える主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
    - id: reevaluation_condition
      labels:
        zh: 重评条件
        en: reevaluation condition
        ja: 再評価条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 触发新 PolicyEvaluation 前必须满足的条件。
        en: Condition required before starting a new PolicyEvaluation.
        ja: 新 PolicyEvaluation 開始前に満たす条件です。
      allowed_values: []
      pattern: null
      example_value: valid approval for request-43
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeferDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 暂缓决定正例
      en: Positive defer decision case
      ja: 保留判断の正例
    scenario_id: null
    descriptions:
      zh: decision-43 因高风险写操作缺少 human:owner-7 的有效批准而 defer，列出缺失证据和新评估条件；工具门控保持暂停。
      en: decision-43 defers a high-risk write because valid approval from human:owner-7 is missing, listing the evidence gap and reevaluation condition while the tool gate remains paused.
      ja: decision-43 は高リスク書込で human:owner-7 の有効承認がないため defer し、不足証拠と再評価条件を列挙しツールゲートは停止します。
    field_values:
      request_ref: request-43
      evaluation_ref: policy-evaluation-43
      decision_kind: defer
      decided_at: 2026-07-16T01:22:00Z
      policy_version_ref: authorization-policy@2
      determining_rule_refs:
        - rule-high-risk-write-needs-owner-approval
      combining_algorithm_ref: deny-overrides@1
      reason: a current owner approval is required before evaluation can finish
      valid_until: 2026-07-16T01:27:00Z
      decision_id: decision-43
      missing_evidence:
        - human approval
      next_authority_ref: human:owner-7
      reevaluation_condition: valid approval for request-43
    related_node_ids:
      - DeferDecision
      - PolicyDecision
      - HumanApproval
      - ToolApprovalGate
    related_relation_ids:
      - DeferDecision-is_a-PolicyDecision
      - ToolApprovalGate-enforces-PolicyDecision
    expected_result:
      zh: 当前请求不能执行；收到有效批准后创建新评估，而不是修改 decision-43 为 allow。
      en: The request cannot execute; valid approval triggers a new evaluation instead of mutating decision-43 into allow.
      ja: 現在要求は実行できず、有効承認後に decision-43 を allow へ変更せず新評価を作ります。
    why_valid_or_invalid:
      zh: 暂缓结果和下一步条件明确，但没有把后续路由或批准活动塞入决定节点。
      en: Deferment and next conditions are explicit without embedding later routing or approval activity in the decision node.
      ja: 保留結果と次条件は明示されますが、後続経路・承認活動を判断ノードへ埋めません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-defer-decision-001
      - claim-defer-decision-002
      - claim-defer-decision-003
  - id: DeferDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 暂缓决定边界反例
      en: Boundary counterexample for defer decision
      ja: 保留判断の境界反例
    scenario_id: null
    descriptions:
      zh: 路由系统把任务发送给 human-review 队列是 RoutingDecision；即使由 defer 触发，该路由事实也不是 DeferDecision。
      en: Routing a task to a human-review queue is a RoutingDecision; even when triggered by defer, that routing fact is not the DeferDecision.
      ja: タスクを human-review キューへ送るのは RoutingDecision で、defer が契機でも経路事実は DeferDecision ではありません。
    field_values: {}
    related_node_ids:
      - DeferDecision
      - PolicyDecision
    related_relation_ids:
      - DeferDecision-is_a-PolicyDecision
    expected_result:
      zh: 授权域记录当前 defer 与重评条件，路由域独立选择后续目的地。
      en: Authorization records defer and reevaluation conditions, while routing independently chooses the next destination.
      ja: 認可域は defer と再評価条件を記録し、経路域が独立に次宛先を選びます。
    why_valid_or_invalid:
      zh: 授权结果回答能否执行，路由决定回答去哪里，两者不能因因果相邻而合并。
      en: Authorization outcome answers whether execution may proceed; routing answers where it goes, and causal adjacency does not merge them.
      ja: 認可結果は実行可否、経路判断は行先に答え、因果隣接で統合されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-defer-decision-001
      - claim-defer-decision-002
      - claim-defer-decision-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AllowDecision
    shared_parent_concept_id: PolicyDecision
    differentia:
      zh: DeferDecision 明确当前未授权且需要新证据；AllowDecision 明确当前已授权并可由门控执行。暂缓绝不能按临时允许解释。
      en: DeferDecision explicitly means currently unauthorized pending new evidence; AllowDecision means currently authorized for enforcement. Deferment must never be interpreted as temporary allow.
      ja: DeferDecision は新証拠待ちで現在未認可、AllowDecision は現在認可済みで執行可能です。保留を仮許可として解釈しません。
    source_claims:
      - claim-defer-decision-001
      - claim-defer-decision-003
parent_relation:
  id: DeferDecision-is_a-PolicyDecision
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
