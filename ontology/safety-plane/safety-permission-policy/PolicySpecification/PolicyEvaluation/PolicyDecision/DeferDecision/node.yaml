schema: moonweave.ai/ontology-node/v1
id: DeferDecision
kind: concept
labels:
  zh: 暂缓决定
  en: defer decision
  ja: 保留判断
semantics:
  short_definition:
    zh: PolicyEvaluation 因缺少人工或补充证据而暂缓的决定子类。
    en: The defer decision subtype when PolicyEvaluation lacks human or supplemental evidence.
    ja: PolicyEvaluation が human/追加証拠不足で暂缓する decision subtype。
  definition:
    zh: DeferDecision 以 decision_kind=defer 为种差，映射 XACML NotApplicable/Indeterminate 与 MCP requireApproval、Claude default 模式、OpenAI Agents SDK needs_approval 等等待人工场景。它暂停 ToolApprovalGate 但不等于 deny；HumanApproval 到达后可重新求值为 AllowDecision。
    en: "DeferDecision has decision_kind=defer, mapping XACML NotApplicable/Indeterminate and wait-for-human scenarios: MCP requireApproval, Claude default mode, OpenAI Agents SDK needs_approval. It pauses ToolApprovalGate but is not deny; HumanApproval may enable re-evaluation to AllowDecision."
    ja: DeferDecision は decision_kind=defer。XACML NotApplicable/Indeterminate、MCP requireApproval、Claude default、OpenAI needs_approval を写像。ToolApprovalGate pause だが deny ではない。HumanApproval 後 AllowDecision へ再評価可。
  why_needed:
    zh: defer 防止把“待人工”记录为 deny 或隐式 allow；MCP HITL 闭环依赖此值。
    en: Defer prevents pending human review from being recorded as deny or implicit allow; MCP HITL loops depend on this value.
    ja: defer で人工待ちを deny/implicit allow と誤記録防止。MCP HITL loop はこの値に依存。
  includes:
    - zh: 包含继承的 decision_id、固定 defer 结果、缺失证据、下一授权主体和重评条件。
      en: Includes inherited decision_id, fixed defer outcome, missing evidence, next authority, and reevaluation conditions.
      ja: 継承 decision_id、固定 defer 結果、不足証拠、次権限主体、再評価条件を含みます。
  excludes:
    - zh: 不包含路由目标、人工批准事件、允许决定、拒绝决定或自动恢复活动。
      en: Excludes routing target, HumanApproval event, AllowDecision, DenyDecision, or automatic recovery activity.
      ja: 経路対象、HumanApproval イベント、AllowDecision、DenyDecision、自動回復活動を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: MCP requireApproval=true 且无 HumanApproval → DeferDecision；Claude default permission_mode 对敏感工具同理；ToolApprovalGate state=pause。收到 HumanApproval 后新 PolicyEvaluation 可产出 AllowDecision，不得原地 mutate defer。
    en: MCP requireApproval=true without HumanApproval → DeferDecision; Claude default permission_mode for sensitive tools likewise; ToolApprovalGate state=pause. After HumanApproval, new PolicyEvaluation may produce AllowDecision; do not mutate defer in place.
    ja: MCP requireApproval=true かつ HumanApproval なし→DeferDecision。Claude default も同様。ToolApprovalGate pause。HumanApproval 後は新 PolicyEvaluation で AllowDecision、defer 原地変更禁止。
  typical_input:
    - description: MCP requireApproval defer.
      format: requireApproval=true; no HumanApproval yet
      source_claims:
        - claim-defer-decision-design
  typical_output:
    - description: Defer pauses gate.
      format: '{"decision_id":"decision-118","decision_kind":"defer","gate_state":"pause"}'
      source_claims:
        - claim-defer-decision-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision.
        ja: 上位 PolicyDecision と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-43
      source_claims:
        - claim-defer-decision-design
        - claim-defer-decision-design
        - claim-defer-decision-design
    - id: missing_evidence
      labels:
        zh: 缺失证据
        en: missing evidence
        ja: 不足証拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 阻止当前评估作出 allow 或最终 deny 的证据缺口。
        en: Evidence gaps preventing the current evaluation from allow or final deny.
        ja: 現在評価が allow または最終 deny を出せない証拠不足です。
      allowed_values: []
      pattern: null
      example_value:
        - human approval
      source_claims:
        - claim-defer-decision-design
        - claim-defer-decision-design
        - claim-defer-decision-design
    - id: next_authority_ref
      labels:
        zh: 下一授权主体
        en: next authority reference
        ja: 次権限主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有资格补足缺失决定依据的主体。
        en: Principal eligible to supply the missing decision basis.
        ja: 不足判断根拠を補える主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-defer-decision-design
        - claim-defer-decision-design
        - claim-defer-decision-design
    - id: reevaluation_condition
      labels:
        zh: 重评条件
        en: reevaluation condition
        ja: 再評価条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 触发新 PolicyEvaluation 前必须满足的条件。
        en: Condition required before starting a new PolicyEvaluation.
        ja: 新 PolicyEvaluation 開始前に満たす条件です。
      allowed_values: []
      pattern: null
      example_value: valid approval for request-43
      source_claims:
        - claim-defer-decision-design
        - claim-defer-decision-design
        - claim-defer-decision-design
  constraints: []
  required_relation_constraints: []
