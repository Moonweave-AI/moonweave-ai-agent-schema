      zh: defer 不是 deny
      en: Defer is not deny
      ja: defer≠deny
    descriptions:
      zh: decision-118 defer 时 ToolApprovalGate pause 而非 block-with-deny。
      en: decision-118 defer pauses ToolApprovalGate rather than block-with-deny.
      ja: decision-118 defer 時 ToolApprovalGate は pause（deny block ではない）。
    example_source:
      product: Moonweave
