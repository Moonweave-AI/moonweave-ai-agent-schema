  - id: defer-decision-opa
    labels:
      zh: 暂缓决定 - OPA Rego 策略评估
      en: defer decision - OPA Rego policy evaluation
      ja: 保留判断 - OPA Rego ポリシー評価
    descriptions: {zh: "暂缓决定(DeferDecision) [DeferDecision]: 在缺少必要证据或授权者时不允许也不最终拒绝、明确等待条件的策略决定。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: decision_id, next_authority_ref, reevaluation_condition.", en: "defer decision (DeferDecision) [DeferDecision]: A PolicyDecision that neither allows nor finally denies because required evidence or authority is missing and explicit resume conditions remain.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include decision_id, next_authority_ref, reevaluation_condition.", ja: "保留判断(DeferDecision) [DeferDecision]: 必要証拠または権限者が不足し、許可も最終拒否もせず明示再開条件を待つ方針判断です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: decision_id, next_authority_ref, reevaluation_condition."}
    field_values:
