    en: is a policy decision
    ja: ポリシー判断の一種
  definitions:
    zh: 每个 DeferDecision 都是 outcome=defer 的 PolicyDecision，并额外明确缺失证据、下一授权主体和重新评估条件。
    en: Every DeferDecision is a PolicyDecision with outcome=defer and additionally identifies missing evidence, next authority, and reevaluation conditions.
    ja: 各 DeferDecision は outcome=defer の PolicyDecision で、不足証拠、次権限主体、再評価条件を追加明示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: has_defer_subtype
    labels:
      zh: 具有暂缓子类
      en: has defer subtype
      ja: 保留下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DeferDecision-is_a-PolicyDecision-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种策略决定正例
        en: Positive is a policy decision case
        ja: ポリシー判断の一種の正例
      scenario_id: null
      descriptions:
        zh: decision-43 的 outcome=defer 且列出 human approval 缺失与重评条件，因此属于 DeferDecision。
        en: decision-43 has outcome=defer and lists missing human approval and reevaluation condition, so it belongs to DeferDecision.
        ja: decision-43 は outcome=defer で不足 human approval と再評価条件を列挙し DeferDecision に属します。
      field_values: {}
      related_node_ids:
        - DeferDecision
        - PolicyDecision
      related_relation_ids:
        - DeferDecision-is_a-PolicyDecision
      expected_result:
        zh: 它继承 PolicyDecision 追溯信息并保持当前未授权。
        en: It inherits PolicyDecision provenance and remains currently unauthorized.
        ja: PolicyDecision の追跡情報を継承し現在未認可を保ちます。
      why_valid_or_invalid:
        zh: 暂缓种差、上位决定身份和重评字段均满足。
        en: The defer differentia, parent decision identity, and reevaluation fields are all satisfied.
        ja: 保留種差、上位判断同一性、再評価項目をすべて満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
