external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: AllowDecision
    shared_parent_concept_id: PolicyDecision
    differentia:
      zh: DeferDecision 明确当前未授权且需要新证据；AllowDecision 明确当前已授权并可由门控执行。暂缓绝不能按临时允许解释。
      en: DeferDecision explicitly means currently unauthorized pending new evidence; AllowDecision means currently authorized for enforcement. Deferment must never be interpreted as temporary allow.
      ja: DeferDecision は新証拠待ちで現在未認可、AllowDecision は現在認可済みで執行可能です。保留を仮許可として解釈しません。
    source_claims:
      - claim-defer-decision-001
      - claim-defer-decision-003
parent_relation:
  id: DeferDecision-is_a-PolicyDecision
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种策略决定
    en: is a policy decision
    ja: ポリシー判断の一種
  definitions:
    zh: 每个 DeferDecision 都是 outcome=defer 的 PolicyDecision，并额外明确缺失证据、下一授权主体和重新评估条件。
    en: Every DeferDecision is a PolicyDecision with outcome=defer and additionally identifies missing evidence, next authority, and reevaluation conditions.
    ja: 各 DeferDecision は outcome=defer の PolicyDecision で、不足証拠、次権限主体、再評価条件を追加明示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有暂缓子类
      en: has defer subtype
      ja: 保留下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DeferDecision-is_a-PolicyDecision-example-positive-manual-001
      labels:
        zh: 是一种策略决定正例
        en: Positive is a policy decision case
        ja: ポリシー判断の一種の正例
      descriptions:
        zh: decision-43 的 outcome=defer 且列出 human approval 缺失与重评条件，因此属于 DeferDecision。
        en: decision-43 has outcome=defer and lists missing human approval and reevaluation condition, so it belongs to DeferDecision.
        ja: decision-43 は outcome=defer で不足 human approval と再評価条件を列挙し DeferDecision に属します。
      field_values: {}
      related_node_ids:
        - DeferDecision
        - PolicyDecision
      related_relation_ids:
        - DeferDecision-is_a-PolicyDecision

        en: It inherits PolicyDecision provenance and remains currently unauthorized.
        ja: PolicyDecision の追跡情報を継承し現在未認可を保ちます。

        en: The defer differentia, parent decision identity, and reevaluation fields are all satisfied.
        ja: 保留種差、上位判断同一性、再評価項目をすべて満たします。
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
    - id: DeferDecision-is_a-PolicyDecision-example-boundary-manual-001
      labels:
        zh: 是一种策略决定边界反例
        en: Boundary counterexample for is a policy decision
        ja: ポリシー判断の一種の境界反例
      descriptions:
        zh: human-review RoutingDecision 选择后续队列，但没有授权 outcome，因此不是 DeferDecision。
        en: A human-review RoutingDecision selects a next queue but has no authorization outcome and is not a DeferDecision.
        ja: human-review RoutingDecision は次キューを選びますが認可 outcome を持たず DeferDecision ではありません。
      field_values: {}
      related_node_ids:
        - DeferDecision
        - PolicyDecision
      related_relation_ids:
        - DeferDecision-is_a-PolicyDecision

        en: The routing decision retains its own type.
        ja: 経路判断は固有型を保ちます。

        en: Choosing a later destination does not constitute the current authorization-outcome differentia.
        ja: 後続行先選択は現在認可結果の種差を構成しません。
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
  source_claims:
