schema: moonweave.ai/ontology-node/v1
id: DeferDecision
kind: concept
status: accepted
labels:
  zh: 暂缓决定
  en: defer decision
  ja: 保留判断
semantics:
  short_definition:
    zh: 在缺少必要证据或授权者时不允许也不最终拒绝、明确等待条件的策略决定。
    en: A PolicyDecision that neither allows nor finally denies because required evidence or authority is missing and explicit resume conditions remain.
    ja: 必要証拠または権限者が不足し、許可も最終拒否もせず明示再開条件を待つ方針判断です。
  definition:
    zh: 暂缓决定是 PolicyDecision 的结果子类，记录 outcome=defer、缺少的证据或审批、下一授权主体及重新评估条件。它不自行路由执行、不等于 Escalation 活动，也绝不能被执行方当作临时 allow；满足条件后必须创建新的 PolicyEvaluation 和决定。
    en: A DeferDecision is the outcome subtype of PolicyDecision recording outcome=defer, missing evidence or approval, next authority, and reevaluation conditions. It does not route execution by itself, is not an escalation activity, and must never be treated as temporary allow; satisfaction of its conditions requires a new PolicyEvaluation and decision.
    ja: DeferDecision は PolicyDecision の結果下位型で、outcome=defer、不足証拠・承認、次の権限主体、再評価条件を記録します。自ら実行経路を選ばず escalation 活動でもなく、仮 allow として扱えません。条件充足後は新 PolicyEvaluation と判断が必要です。
  why_needed:
    zh: 它替代含混的 EscalationDecision，把“当前未授权”与“由谁、补什么证据后重评”写清，同时不侵入路由域。
    en: It replaces ambiguous EscalationDecision by making current non-authorization and the authority/evidence needed for reevaluation explicit without invading routing semantics.
    ja: 曖昧な EscalationDecision を置換し、現在未認可と再評価に必要な権限者・証拠を明示し、経路制御意味へ侵入しません。
  includes:
    - zh: 包含继承的 decision_id、固定 defer 结果、缺失证据、下一授权主体和重评条件。
      en: Includes inherited decision_id, fixed defer outcome, missing evidence, next authority, and reevaluation conditions.
      ja: 継承 decision_id、固定 defer 結果、不足証拠、次権限主体、再評価条件を含みます。
  excludes:
    - zh: 不包含路由目标、人工批准事件、允许决定、拒绝决定或自动恢复活动。
      en: Excludes routing target, HumanApproval event, AllowDecision, DenyDecision, or automatic recovery activity.
      ja: 経路対象、HumanApproval イベント、AllowDecision、DenyDecision、自動回復活動を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision.
        ja: 上位 PolicyDecision と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-43
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
    - id: missing_evidence
      labels:
        zh: 缺失证据
        en: missing evidence
        ja: 不足証拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 阻止当前评估作出 allow 或最终 deny 的证据缺口。
        en: Evidence gaps preventing the current evaluation from allow or final deny.
        ja: 現在評価が allow または最終 deny を出せない証拠不足です。
      allowed_values: []
      pattern: null
      example_value:
        - human approval
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
    - id: next_authority_ref
      labels:
        zh: 下一授权主体
        en: next authority reference
        ja: 次権限主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有资格补足缺失决定依据的主体。
        en: Principal eligible to supply the missing decision basis.
        ja: 不足判断根拠を補える主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
    - id: reevaluation_condition
      labels:
        zh: 重评条件
        en: reevaluation condition
        ja: 再評価条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 触发新 PolicyEvaluation 前必须满足的条件。
        en: Condition required before starting a new PolicyEvaluation.
        ja: 新 PolicyEvaluation 開始前に満たす条件です。
      allowed_values: []
      pattern: null
      example_value: valid approval for request-43
      source_claims:
        - claim-defer-decision-001
        - claim-defer-decision-002
        - claim-defer-decision-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: defer-decision-openai_hitl
    labels:
      zh: 暂缓决定 - OpenAI Agents SDK 人工审批
      en: defer decision - OpenAI Agents SDK human approval
      ja: 保留判断 - OpenAI Agents SDK 人手承認
    descriptions: {zh: "暂缓决定(DeferDecision) [DeferDecision]: 在缺少必要证据或授权者时不允许也不最终拒绝、明确等待条件的策略决定。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: decision_id, next_authority_ref, reevaluation_condition.", en: "defer decision (DeferDecision) [DeferDecision]: A PolicyDecision that neither allows nor finally denies because required evidence or authority is missing and explicit resume conditions remain.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include decision_id, next_authority_ref, reevaluation_condition.", ja: "保留判断(DeferDecision) [DeferDecision]: 必要証拠または権限者が不足し、許可も最終拒否もせず明示再開条件を待つ方針判断です。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: decision_id, next_authority_ref, reevaluation_condition."}
    field_values:
      decision_id: decision-43
      next_authority_ref: "human:owner-7"
      reevaluation_condition: "valid approval for request-43"
    related_node_ids:
      - DeferDecision
      - HumanApproval
      - PolicyDecision
      - ToolApprovalGate
    related_relation_ids:
      - claim-defer-decision-001
      - claim-defer-decision-002
      - claim-defer-decision-003
      - DeferDecision
      - DeferDecision-is_a-PolicyDecision
      - HumanApproval
      - PolicyDecision
      - ToolApprovalGate
      - ToolApprovalGate-enforces-PolicyDecision
    example_source: OpenAI Agents SDK HITL
    source_claims:
      - claim-defer-decision-001
  - id: defer-decision-langgraph_interrupt
    labels:
      zh: 暂缓决定 - LangGraph 人工中断
      en: defer decision - LangGraph human interrupt
      ja: 保留判断 - LangGraph 人手 interrupt
    descriptions: {zh: "暂缓决定(DeferDecision) [DeferDecision]: 在缺少必要证据或授权者时不允许也不最终拒绝、明确等待条件的策略决定。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: decision_id, next_authority_ref, reevaluation_condition.", en: "defer decision (DeferDecision) [DeferDecision]: A PolicyDecision that neither allows nor finally denies because required evidence or authority is missing and explicit resume conditions remain.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include decision_id, next_authority_ref, reevaluation_condition.", ja: "保留判断(DeferDecision) [DeferDecision]: 必要証拠または権限者が不足し、許可も最終拒否もせず明示再開条件を待つ方針判断です。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: decision_id, next_authority_ref, reevaluation_condition."}
    field_values:
      decision_id: decision-43
      next_authority_ref: "human:owner-7"
      reevaluation_condition: "valid approval for request-43"
    related_node_ids:
      - DeferDecision
      - HumanApproval
      - PolicyDecision
      - ToolApprovalGate
    related_relation_ids:
      - claim-defer-decision-001
      - claim-defer-decision-002
      - claim-defer-decision-003
      - DeferDecision
      - DeferDecision-is_a-PolicyDecision
      - HumanApproval
      - PolicyDecision
      - ToolApprovalGate
      - ToolApprovalGate-enforces-PolicyDecision
    example_source: LangGraph interrupt
    source_claims:
      - claim-defer-decision-001
  - id: defer-decision-cedar
    labels:
      zh: 暂缓决定 - Cedar 授权评估
      en: defer decision - Cedar authorization evaluation
      ja: 保留判断 - Cedar 認可評価
    descriptions: {zh: "暂缓决定(DeferDecision) [DeferDecision]: 在缺少必要证据或授权者时不允许也不最终拒绝、明确等待条件的策略决定。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: decision_id, next_authority_ref, reevaluation_condition.", en: "defer decision (DeferDecision) [DeferDecision]: A PolicyDecision that neither allows nor finally denies because required evidence or authority is missing and explicit resume conditions remain.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include decision_id, next_authority_ref, reevaluation_condition.", ja: "保留判断(DeferDecision) [DeferDecision]: 必要証拠または権限者が不足し、許可も最終拒否もせず明示再開条件を待つ方針判断です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: decision_id, next_authority_ref, reevaluation_condition."}
    field_values:
