schema: moonweave.ai/ontology-node/v1
id: AllowDecision
kind: concept
labels:
  zh: 允许决定
  en: allow decision
  ja: 許可判断
semantics:
  short_definition:
    zh: PolicyEvaluation 对特定请求作出的肯定授权决定子类。
    en: The affirmative authorization decision subtype PolicyEvaluation produces for a specific request.
    ja: PolicyEvaluation が特定 request に対して出す肯定認可判断 subtype。
  definition:
    zh: AllowDecision 继承 PolicyDecision 身份并以 decision_kind=allow 为种差，可签发 AuthorizationGrant。OPA `{result:true}`、XACML Permit、MCP scope 校验通过与 Cursor allowlist 匹配都映射为 AllowDecision；它不等于 grant 本身，也不保证执行成功。
    en: AllowDecision inherits PolicyDecision identity with decision_kind=allow and may issue AuthorizationGrant. OPA `{result:true}`, XACML Permit, MCP scope validation pass, and Cursor allowlist match map to AllowDecision; it is not the grant itself and does not guarantee execution success.
    ja: AllowDecision は PolicyDecision を継承し decision_kind=allow が種差。AuthorizationGrant 発行可。OPA result:true、XACML Permit、MCP scope 合格、Cursor allowlist match を写像。grant 自体ではなく実行成功も保証しない。
  why_needed:
    zh: 必须把“决定允许”与“已签发 grant”分开，否则 ToolApprovalGate 无法验证 grant 范围。
    en: Separating decided allow from issued grant is required or ToolApprovalGate cannot verify grant scope.
    ja: decided allow と issued grant を分離しないと ToolApprovalGate が grant scope を検証できません。
  includes:
    - zh: 包含继承的 decision_id、固定 allow 结果、适用义务和允许范围摘要。
      en: Includes inherited decision_id, fixed allow outcome, applicable obligations, and allowed-scope summary.
      ja: 継承 decision_id、固定 allow 結果、適用義務、許可範囲要約を含みます。
  excludes:
    - zh: 不包含 DenyDecision、DeferDecision、AuthorizationGrant、执行成功或副作用回执。
      en: Excludes DenyDecision, DeferDecision, AuthorizationGrant, execution success, or side-effect receipt.
      ja: DenyDecision、DeferDecision、AuthorizationGrant、実行成功、副作用受領を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: AllowDecision 产出后由 authorization service 创建 AuthorizationGrant；ToolApprovalGate 验证 attempt 与 decision+grant 一致。OPA allow 与 MCP OAuth token valid 都应保留 determining_rule_refs。
    en: After AllowDecision, authorization service creates AuthorizationGrant; ToolApprovalGate verifies attempt matches decision+grant. OPA allow and MCP OAuth valid token should retain determining_rule_refs.
    ja: AllowDecision 後 authorization service が AuthorizationGrant 作成。ToolApprovalGate は attempt と decision+grant 一致を検証。OPA allow/MCP valid token は determining_rule_refs 保持。
  typical_input:
    - description: OPA allow result.
      format: '{"result":true}'
      source_claims:
        - claim-allow-decision-design
  typical_output:
    - description: Allow with grant reference.
      format: '{"decision_id":"decision-42","decision_kind":"allow","grant_ref":"grant-42"}'
      source_claims:
        - claim-allow-decision-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision record.
        ja: 上位 PolicyDecision 記録と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-allow-decision-design
        - claim-allow-decision-design
    - id: allowed_scope_ref
      labels:
        zh: 允许范围引用
        en: allowed scope reference
        ja: 許可範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该 allow 结果实际覆盖的 PermissionScope。
        en: PermissionScope actually covered by the allow outcome.
        ja: allow 結果が実際に覆う PermissionScope です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-allow-decision-design
        - claim-allow-decision-design
    - id: obligations
      labels:
        zh: 允许义务
        en: allow obligations
        ja: 許可義務
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 请求继续时执行方必须履行的要求。
        en: Requirements enforcement must fulfill when allowing the request to proceed.
        ja: 要求継続時に執行側が履行する要件です。
      allowed_values: []
      pattern: null
      example_value:
        - audit tool result
      source_claims:
        - claim-allow-decision-design
        - claim-allow-decision-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AllowDecision-mcp-scope
    labels:
      zh: MCP scope 允许决定
      en: MCP scope allow decision
      ja: MCP scope allow decision
    descriptions:
      zh: decision-mcp-42 allow：token introspection 与 scope tools:call 覆盖 resource。
      en: "decision-mcp-42 allow: token introspection and scope tools:call cover resource."
      ja: decision-mcp-42 allow：introspection+scope tools:call が resource を覆盖。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: scope validation
    field_values:
      decision_id: decision-mcp-42
      decision_kind: allow
    related_node_ids:
      - AllowDecision
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-allow-decision-design
  - id: AllowDecision-opa-allow
    labels:
      zh: OPA allow 决定
      en: OPA allow decision
      ja: OPA allow decision
    descriptions:
      zh: decision-42 allow，determining allow-approved-read@7，签发 grant-42 scope-search-read。
      en: decision-42 allow with allow-approved-read@7, issuing grant-42 scope-search-read.
      ja: decision-42 allow、allow-approved-read@7、grant-42 scope-search-read 発行。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: result true
    field_values:
      decision_id: decision-42
      decision_kind: allow
    related_node_ids:
      - AllowDecision
      - AuthorizationGrant
      - PermissionScope
    related_relation_ids: []
    source_claims:
      - claim-allow-decision-design
  - id: AllowDecision-cursor-allowlist
    labels:
      zh: Cursor allowlist 允许
      en: Cursor allowlist allow
      ja: Cursor allowlist allow
    descriptions:
      zh: npm test 在 allowlist 内；decision-77 allow 后 ToolApprovalGate release。
      en: npm test is allowlisted; decision-77 allow then ToolApprovalGate release.
      ja: npm test allowlist 内→decision-77 allow→ToolApprovalGate release。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: allowlist match
    field_values:
      decision_id: decision-77
      decision_kind: allow
    related_node_ids:
      - AllowDecision
      - ToolApprovalGate
    related_relation_ids: []
    source_claims:
      - claim-allow-decision-design
  - id: AllowDecision-boundary-grant
    labels:
      zh: allow 不等于 grant
      en: allow is not grant
      ja: allow≠grant
    descriptions:
      zh: decision-42 allow 但尚未创建 grant-42 时 ToolApprovalGate 仍 pause。
      en: ToolApprovalGate still pauses when decision-42 is allow but grant-42 not yet created.
      ja: decision-42 allow でも grant-42 未作成なら ToolApprovalGate pause。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: decision versus grant
    field_values: {}
    related_node_ids:
      - AllowDecision
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-allow-decision-design
parent_relation:
  id: AllowDecision-is_a-PolicyDecision
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种策略决定
    en: is a policy decision
    ja: ポリシー判断の一種
  definitions:
    zh: 每个 AllowDecision 都是 outcome=allow 的 PolicyDecision，并继承请求、评估、规则、算法、理由和有效期要求。
    en: Every AllowDecision is a PolicyDecision with outcome=allow and inherits request, evaluation, rule, algorithm, rationale, and validity requirements.
    ja: 各 AllowDecision は outcome=allow の PolicyDecision で、要求・評価・規則・アルゴリズム・理由・有効期間要件を継承します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有允许子类
      en: has allow subtype
      ja: 許可下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-allow-decision-design
    - claim-allow-decision-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
