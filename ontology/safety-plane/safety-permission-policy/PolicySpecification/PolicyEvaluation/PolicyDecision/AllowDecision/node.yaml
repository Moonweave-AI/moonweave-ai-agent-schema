schema: moonweave.ai/ontology-node/v1
id: AllowDecision
kind: concept
status: review
labels:
  zh: 允许决定
  en: allow decision
  ja: 許可判断
semantics:
  short_definition:
    zh: 结果为 allow、允许当前请求在记录范围和义务内继续的策略决定。
    en: A PolicyDecision with outcome allow, permitting the current request to continue within recorded scope and obligations.
    ja: 結果が allow で、現在要求を記録範囲と義務内で継続可能にする方針判断です。
  definition:
    zh: 允许决定是 PolicyDecision 的结果子类，只有 outcome=allow 且请求快照、决定规则、有效期和义务均明确时成立。它仅说明授权判断通过；若需要可复用权限，还必须另行签发 AuthorizationGrant，若要执行工具调用，还必须由 ToolApprovalGate 验证和执行。
    en: An AllowDecision is the outcome subtype of PolicyDecision present only when outcome=allow and the request snapshot, determining rules, validity, and obligations are explicit. It states that authorization evaluation passed; reusable authority still requires a separately issued AuthorizationGrant, and a tool call still requires ToolApprovalGate validation and enforcement.
    ja: AllowDecision は PolicyDecision の結果下位型で、outcome=allow かつ要求スナップショット、決定規則、有効期間、義務が明示された場合だけ成立します。認可評価通過を示しますが、再利用権限には別 AuthorizationGrant、ツール呼出には ToolApprovalGate の検証・執行が必要です。
  why_needed:
    zh: 明确允许结果可让执行方采用封闭式检查，同时避免把“允许”误读为副作用已发生或长期授权已建立。
    en: An explicit allow subtype supports closed-world enforcement checks without implying that a side effect occurred or standing authority was established.
    ja: 明示 allow 下位型は閉世界執行検査を支え、副作用発生や恒常権限成立を含意しません。
  includes:
    - zh: 包含继承的 decision_id、固定 allow 结果、适用义务和允许范围摘要。
      en: Includes inherited decision_id, fixed allow outcome, applicable obligations, and allowed-scope summary.
      ja: 継承 decision_id、固定 allow 結果、適用義務、許可範囲要約を含みます。
  excludes:
    - zh: 不包含 DenyDecision、DeferDecision、AuthorizationGrant、执行成功或副作用回执。
      en: Excludes DenyDecision, DeferDecision, AuthorizationGrant, execution success, or side-effect receipt.
      ja: DenyDecision、DeferDecision、AuthorizationGrant、実行成功、副作用受領を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision record.
        ja: 上位 PolicyDecision 記録と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-allow-decision-001
        - claim-allow-decision-002
    - id: allowed_scope_ref
      labels:
        zh: 允许范围引用
        en: allowed scope reference
        ja: 許可範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该 allow 结果实际覆盖的 PermissionScope。
        en: PermissionScope actually covered by the allow outcome.
        ja: allow 結果が実際に覆う PermissionScope です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-allow-decision-001
        - claim-allow-decision-002
    - id: obligations
      labels:
        zh: 允许义务
        en: allow obligations
        ja: 許可義務
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 请求继续时执行方必须履行的要求。
        en: Requirements enforcement must fulfill when allowing the request to proceed.
        ja: 要求継続時に執行側が履行する要件です。
      allowed_values: []
      pattern: null
      example_value:
        - audit tool result
      source_claims:
        - claim-allow-decision-001
        - claim-allow-decision-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: AllowDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 允许决定正例
      en: Positive allow decision case
      ja: 許可判断の正例
    scenario_id: null
    descriptions:
      zh: decision-42 对 request-42 给出 allow，仅覆盖 scope-search-read，并要求审计工具结果；它随后可作为 grant-42 的授权依据。
      en: decision-42 allows request-42 only for scope-search-read and requires auditing the tool result; it may then serve as the authorization basis for grant-42.
      ja: decision-42 は request-42 を scope-search-read に限り allow し、ツール結果監査を義務付け、grant-42 の認可根拠になり得ます。
    field_values:
      request_ref: request-42
      evaluation_ref: policy-evaluation-42
      decision_kind: allow
      decided_at: 2026-07-16T01:21:02Z
      policy_version_ref: authorization-policy@2
      determining_rule_refs:
        - rule-search-read-scope
      combining_algorithm_ref: deny-overrides@1
      reason: the requested read-only search is within the approved scope
      valid_until: 2026-07-16T01:25:00Z
      decision_id: decision-42
      allowed_scope_ref: scope-search-read
      obligations:
        - audit tool result
    related_node_ids:
      - AllowDecision
      - PolicyDecision
      - AuthorizationGrant
    related_relation_ids:
      - AllowDecision-is_a-PolicyDecision
      - AuthorizationGrant-authorized_by-AllowDecision
    expected_result:
      zh: 执行方可验证 allow、范围和义务，但不会把决定本身当作授予或执行回执。
      en: Enforcement can verify allow, scope, and obligations without treating the decision as a grant or execution receipt.
      ja: 執行側は allow・範囲・義務を検証し、判断を付与や実行受領として扱いません。
    why_valid_or_invalid:
      zh: 结果、范围和后续授权依据均显式连接且身份分离。
      en: Outcome, scope, and later authorization basis are explicit while identities remain separate.
      ja: 結果、範囲、後続認可根拠が明示接続され、同一性は分離されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-allow-decision-001
      - claim-allow-decision-002
  - id: AllowDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 允许决定边界反例
      en: Boundary counterexample for allow decision
      ja: 許可判断の境界反例
    scenario_id: null
    descriptions:
      zh: decision-43 的 outcome=defer，要求补充人工批准；即使后续可能转为允许，它当前仍是 DeferDecision。
      en: decision-43 has outcome=defer and requires additional human approval; even if a later evaluation may allow it, it is currently a DeferDecision.
      ja: decision-43 は outcome=defer で追加人間承認を要求し、後続評価で許可され得ても現在は DeferDecision です。
    field_values: {}
    related_node_ids:
      - AllowDecision
      - DeferDecision
      - PolicyDecision
    related_relation_ids:
      - DeferDecision-is_a-PolicyDecision
    expected_result:
      zh: 验证器不得因为潜在未来允许而把 defer 结果分类为 AllowDecision。
      en: Validation must not classify a defer result as AllowDecision because of a possible future allow.
      ja: 将来 allow の可能性だけで defer 結果を AllowDecision に分類しません。
    why_valid_or_invalid:
      zh: 决定子类由当前结果而非预期后续路径确定。
      en: Decision subtype is determined by the current outcome, not an expected later path.
      ja: 判断下位型は現在結果で決まり、予想後続経路では決まりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-allow-decision-001
      - claim-allow-decision-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: DenyDecision
    shared_parent_concept_id: PolicyDecision
    differentia:
      zh: AllowDecision 当前授权请求在记录范围内继续；DenyDecision 当前禁止请求继续。二者共享 PolicyDecision 字段，但 outcome 和执行后果互斥。
      en: AllowDecision permits the current request within recorded scope; DenyDecision prohibits it. They share PolicyDecision fields but have mutually exclusive outcomes and enforcement consequences.
      ja: AllowDecision は現在要求を記録範囲内で許可し、DenyDecision は禁止します。PolicyDecision 項目を共有しますが結果と執行効果は排他的です。
    source_claims:
      - claim-allow-decision-001
