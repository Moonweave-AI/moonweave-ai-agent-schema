schema: moonweave.ai/ontology-node/v1
id: CapabilityGrant
kind: concept
labels:
  zh: 能力授权
  en: capability grant
  ja: 能力付与
semantics:
  short_definition:
    zh: AuthorizationGrant 中 narrowed 到具体能力或工具实例的子类凭证。
    en: An AuthorizationGrant subtype narrowed to a specific capability or tool instance.
    ja: 具体 capability または tool instance に narrowed した AuthorizationGrant subtype 資格。
  definition:
    zh: CapabilityGrant 继承 grant_id 并以 capability_ref、tool_instance_ref 或 fine-grained action token 为种差，范围不得宽于父 AuthorizationGrant。MCP 单工具 tools:call 能力、OPA 细粒度 allow 与 Claude 单次 yesAllow 批准都可选映射为 CapabilityGrant；用于 ToolApprovalGate 精确匹配 attempt。
    en: CapabilityGrant inherits grant_id and is distinguished by capability_ref, tool_instance_ref, or fine-grained action token, never wider than parent AuthorizationGrant. MCP single-tool tools:call capability, OPA fine-grained allow, and Claude one-shot yesAllow may map to CapabilityGrant for precise ToolApprovalGate attempt matching.
    ja: CapabilityGrant は grant_id 継承し capability_ref/tool_instance_ref/fine-grained action token が種差。親 AuthorizationGrant より広く不可。MCP 単 tool tools:call、OPA fine-grained allow、Claude yesAllow を ToolApprovalGate 精确匹配用に写像可。
  why_needed:
    zh: 粗粒度 OAuth scope 内仍需单次工具精确授权；CapabilityGrant 防止 scope 内 over-call。
    en: Coarse OAuth scopes still need per-tool precise authority; CapabilityGrant prevents over-call within scope.
    ja: 粗い OAuth scope 内でも per-tool 精确認可要。CapabilityGrant で scope 内 over-call 防止。
  includes:
    - zh: 包含继承的 grant_id、能力引用、允许操作和能力特定资源限制。
      en: Includes inherited grant_id, capability reference, allowed operations, and capability-specific resource constraints.
      ja: 継承 grant_id、能力参照、許容操作、能力固有資源制約を含みます。
  excludes:
    - zh: 不包含角色能力声明、工具实现、工具发现记录或调用尝试。
      en: Excludes role capability declaration, tool implementation, tool-discovery record, or invocation attempt.
      ja: 役割能力宣言、ツール実装、ツール発見記録、呼出試行を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 从 AuthorizationGrant 派生 CapabilityGrant 时 scope 交集必须更窄；MCP tools/call 对单 server 工具实例；Claude yesAllow 单次命令 digest 绑定 capability_ref。
    en: When deriving CapabilityGrant from AuthorizationGrant, scope intersection must be narrower; MCP tools/call for one server tool instance; Claude yesAllow binds capability_ref to one command digest.
    ja: AuthorizationGrant から CapabilityGrant 派生時 scope 交集はより狭く。MCP tools/call 単 tool instance。Claude yesAllow は command digest を capability_ref に束縛。
  typical_input:
    - description: MCP single tool call grant.
      format: scope tools:call + tool_name=payments_api
      source_claims:
        - claim-capability-grant-design
  typical_output:
    - description: Capability grant record.
      format: '{"grant_id":"cap-grant-118","capability_ref":"tool:payments_api:call"}'
      source_claims:
        - claim-capability-grant-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - grant_id
  fields:
    - id: grant_id
      labels:
        zh: 授予标识
        en: grant ID
        ja: 付与ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 AuthorizationGrant 相同的稳定标识。
        en: Stable identity shared with the parent AuthorizationGrant.
        ja: 上位 AuthorizationGrant と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-capability-grant-design
        - claim-capability-grant-design
    - id: capability_ref
      labels:
        zh: 能力引用
        en: capability reference
        ja: 能力参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权明确覆盖的工具能力面。
        en: Exact tool capability surface covered by the grant.
        ja: 付与が明示的に覆うツール能力面です。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents.read
      source_claims:
        - claim-capability-grant-design
        - claim-capability-grant-design
    - id: allowed_operations
      labels:
        zh: 允许操作
        en: allowed operations
        ja: 許容操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 在能力面内获准的操作集合。
        en: Operations authorized within the capability surface.
        ja: 能力面内で認可された操作集合です。
      allowed_values: []
      pattern: null
      example_value:
        - search
      source_claims:
        - claim-capability-grant-design
        - claim-capability-grant-design
    - id: resource_constraints
      labels:
        zh: 资源限制
        en: resource constraints
        ja: 資源制約
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 进一步限制能力可以接触的资源。
        en: Further limits resources the capability may contact.
        ja: 能力が接触できる資源をさらに限定します。
      allowed_values: []
      pattern: null
      example_value:
        data_class: public
      source_claims:
        - claim-capability-grant-design
        - claim-capability-grant-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: CapabilityGrant-mcp-tool
    labels:
      zh: MCP 单工具 capability
      en: MCP single-tool capability
      ja: MCP 単 tool capability
    descriptions:
      zh: cap-grant-118 在 grant-mcp-42 内 narrowed 到 tool:payments_api invoke。
      en: cap-grant-118 narrows grant-mcp-42 to tool:payments_api invoke.
      ja: cap-grant-118 が grant-mcp-42 を tool:payments_api invoke に narrow。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: tools/call
    field_values:
      grant_id: cap-grant-118
      capability_ref: tool:payments_api:call
    related_node_ids:
      - CapabilityGrant
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-capability-grant-design
  - id: CapabilityGrant-claude-yesallow
    labels:
      zh: Claude yesAllow 单次 capability
      en: Claude yesAllow one-shot capability
      ja: Claude yesAllow 単発 capability
    descriptions:
      zh: cap-grant-61 绑定单次 Bash digest，不得用于后续命令。
      en: cap-grant-61 binds one Bash digest; not valid for later commands.
      ja: cap-grant-61 単一 Bash digest 束縛、後続 command 不可。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: yesAllow
    field_values:
      grant_id: cap-grant-61
      capability_ref: bash:digest-61
    related_node_ids:
      - CapabilityGrant
      - HumanApproval
    related_relation_ids: []
    source_claims:
      - claim-capability-grant-design
  - id: CapabilityGrant-opa-fine
    labels:
      zh: OPA 细粒度 capability
      en: OPA fine-grained capability
      ja: OPA fine-grained capability
    descriptions:
      zh: cap-grant-42 narrowed 到 object=tool:search_documents action=read only。
      en: cap-grant-42 narrowed to object=tool:search_documents action=read only.
      ja: cap-grant-42 object=tool:search_documents action=read のみ。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: fine-grained allow
    field_values:
      grant_id: cap-grant-42
    related_node_ids:
      - CapabilityGrant
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-capability-grant-design
  - id: CapabilityGrant-boundary-wider
    labels:
      zh: capability 不能更宽
      en: Capability cannot be wider
      ja: capability 拡張不可
    descriptions:
      zh: cap-grant-99 若 actions 宽于 grant-42 则被拒绝创建。
      en: cap-grant-99 rejected if actions wider than grant-42.
      ja: cap-grant-99 actions が grant-42 より広いと作成拒否。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: scope narrowing
    field_values: {}
    related_node_ids:
      - CapabilityGrant
      - AuthorizationGrant
    related_relation_ids: []
    source_claims:
      - claim-capability-grant-design
parent_relation:
  id: CapabilityGrant-is_a-AuthorizationGrant
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种授权授予
    en: is an authorization grant
    ja: 認可付与の一種
  definitions:
    zh: 每个 CapabilityGrant 都是 AuthorizationGrant，并以明确 capability_ref 和更窄操作面作为附加种差。
    en: Every CapabilityGrant is an AuthorizationGrant with explicit capability_ref and a narrower operation surface as additional differentia.
    ja: 各 CapabilityGrant は AuthorizationGrant で、明示 capability_ref とより狭い操作面を追加種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有能力授权子类
      en: has capability-grant subtype
      ja: 能力付与下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-capability-grant-design
    - claim-capability-grant-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
