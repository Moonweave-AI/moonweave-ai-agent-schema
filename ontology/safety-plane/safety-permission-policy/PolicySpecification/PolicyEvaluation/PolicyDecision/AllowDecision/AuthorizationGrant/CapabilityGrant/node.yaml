schema: moonweave.ai/ontology-node/v1
id: CapabilityGrant
kind: concept
status: accepted
labels:
  zh: 能力授权
  en: capability grant
  ja: 能力付与
semantics:
  short_definition:
    zh: 把授权范围进一步限定到一个明确工具能力或操作面的 AuthorizationGrant。
    en: An AuthorizationGrant whose scope is further restricted to one explicit tool capability or operation surface.
    ja: 範囲を一つの明示ツール能力または操作面へさらに限定した AuthorizationGrant です。
  definition:
    zh: 能力授权是 AuthorizationGrant 的下位类型，除一般主体、范围和期限外，还明确 capability_ref、允许操作及资源约束，用于在调用点证明某主体获准使用一个具体能力。它不是 Actor 自身拥有的能力声明，也不是 ToolDefinition；撤销该 grant 不改变主体或工具身份。
    en: A CapabilityGrant is a subtype of AuthorizationGrant that adds an explicit capability_ref, allowed operations, and resource constraints so invocation can prove authority for one concrete capability. It is neither a capability declaration inherent to an Actor nor a ToolDefinition; revoking it changes neither principal nor tool identity.
    ja: CapabilityGrant は AuthorizationGrant の下位型で、capability_ref、許容操作、資源制約を追加し、呼出点で具体能力の権限を証明します。Actor 固有能力宣言でも ToolDefinition でもなく、取消しても主体・ツール同一性は変わりません。
  why_needed:
    zh: 该子类让工具级最小权限可直接查询，同时与运行参与者的能力绑定和工具定义保持清晰边界。
    en: The subtype makes tool-level least privilege directly queryable while keeping clear boundaries from runtime actor capability binding and tool definition.
    ja: 下位型によりツール級最小権限を直接照会し、実行主体の能力束縛とツール定義から明確に分離します。
  includes:
    - zh: 包含继承的 grant_id、能力引用、允许操作和能力特定资源限制。
      en: Includes inherited grant_id, capability reference, allowed operations, and capability-specific resource constraints.
      ja: 継承 grant_id、能力参照、許容操作、能力固有資源制約を含みます。
  excludes:
    - zh: 不包含角色能力声明、工具实现、工具发现记录或调用尝试。
      en: Excludes role capability declaration, tool implementation, tool-discovery record, or invocation attempt.
      ja: 役割能力宣言、ツール実装、ツール発見記録、呼出試行を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - grant_id
  fields:
    - id: grant_id
      labels:
        zh: 授予标识
        en: grant ID
        ja: 付与ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 AuthorizationGrant 相同的稳定标识。
        en: Stable identity shared with the parent AuthorizationGrant.
        ja: 上位 AuthorizationGrant と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: capability_ref
      labels:
        zh: 能力引用
        en: capability reference
        ja: 能力参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权明确覆盖的工具能力面。
        en: Exact tool capability surface covered by the grant.
        ja: 付与が明示的に覆うツール能力面です。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents.read
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: allowed_operations
      labels:
        zh: 允许操作
        en: allowed operations
        ja: 許容操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 在能力面内获准的操作集合。
        en: Operations authorized within the capability surface.
        ja: 能力面内で認可された操作集合です。
      allowed_values: []
      pattern: null
      example_value:
        - search
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: resource_constraints
      labels:
        zh: 资源限制
        en: resource constraints
        ja: 資源制約
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 进一步限制能力可以接触的资源。
        en: Further limits resources the capability may contact.
        ja: 能力が接触できる資源をさらに限定します。
      allowed_values: []
      pattern: null
      example_value:
        data_class: public
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: CapabilityGrant-example-positive-manual-001
    kind: positive
    labels:
      zh: 能力授权正例
      en: Positive capability grant case
      ja: 能力付与の正例
    scenario_id: null
    descriptions:
      zh: grant-42 专门授予 tool:search_documents.read 的 search 操作，资源仅限 public；它不能用于 write 或另一个工具。
      en: grant-42 specifically authorizes search on tool:search_documents.read for public resources and cannot authorize write or another tool.
      ja: grant-42 は tool:search_documents.read の search を public 資源に限り認可し、write や別ツールには使えません。
    field_values:
      subject_ref: agent-run/request-42
      scope_ref: scope-search-read
      issuer_ref: authorization-service
      issued_at: 2026-07-16T01:21:05Z
      expires_at: 2026-07-16T01:25:00Z
      basis_decision_ref: decision-42
      status: active
      grant_id: grant-42
      capability_ref: tool:search_documents.read
      allowed_operations:
        - search
      resource_constraints:
        data_class: public
    related_node_ids:
      - CapabilityGrant
      - AuthorizationGrant
    related_relation_ids:
      - CapabilityGrant-is_a-AuthorizationGrant
    expected_result:
      zh: 验证先满足一般 grant 生命周期，再满足能力、操作和资源约束。
      en: Validation first satisfies the general grant lifecycle and then capability, operation, and resource constraints.
      ja: 検証は一般付与ライフサイクルを満たした後、能力・操作・資源制約を満たします。
    why_valid_or_invalid:
      zh: 该记录具备完整 AuthorizationGrant 身份并有更窄的能力种差。
      en: The record has complete AuthorizationGrant identity plus a narrower capability differentia.
      ja: 記録は完全 AuthorizationGrant 同一性とより狭い能力種差を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-capability-grant-001
      - claim-capability-grant-002
  - id: CapabilityGrant-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 能力授权边界反例
      en: Boundary counterexample for capability grant
      ja: 能力付与の境界反例
    scenario_id: null
    descriptions:
      zh: ActorRoleBinding 声明 planner 角色通常能使用搜索工具，但没有 grant_id、期限和撤销状态，因此不是 CapabilityGrant。
      en: An ActorRoleBinding says the planner role generally uses search tools but lacks grant_id, validity, and revocation state, so it is not a CapabilityGrant.
      ja: ActorRoleBinding は planner 役割が通常検索ツールを使うと示しますが grant_id・期間・取消状態を欠き CapabilityGrant ではありません。
    field_values: {}
    related_node_ids:
      - CapabilityGrant
      - AuthorizationGrant
    related_relation_ids:
      - CapabilityGrant-is_a-AuthorizationGrant
    expected_result:
      zh: 角色绑定可作为策略输入，但调用点仍须找到有效 CapabilityGrant。
      en: Role binding may be policy input, but invocation still requires a valid CapabilityGrant.
      ja: 役割束縛は方針入力になれますが、呼出点には有効 CapabilityGrant が必要です。
    why_valid_or_invalid:
      zh: 主体具备能力和主体被授权使用能力是不同事实。
      en: A principal possessing a capability and being authorized to exercise it are different facts.
      ja: 主体が能力を持つことと、その使用を認可されることは別事実です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-capability-grant-001
      - claim-capability-grant-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: CapabilityGrant-is_a-AuthorizationGrant
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种授权授予
    en: is an authorization grant
    ja: 認可付与の一種
  definitions:
    zh: 每个 CapabilityGrant 都是 AuthorizationGrant，并以明确 capability_ref 和更窄操作面作为附加种差。
    en: Every CapabilityGrant is an AuthorizationGrant with explicit capability_ref and a narrower operation surface as additional differentia.
    ja: 各 CapabilityGrant は AuthorizationGrant で、明示 capability_ref とより狭い操作面を追加種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有能力授权子类
      en: has capability-grant subtype
      ja: 能力付与下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CapabilityGrant-is_a-AuthorizationGrant-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种授权授予正例
        en: Positive is an authorization grant case
        ja: 認可付与の一種の正例
      scenario_id: null
      descriptions:
        zh: grant-42 具有一般授予生命周期字段，并进一步指定 tool:search_documents.read，因此分类为 CapabilityGrant。
        en: grant-42 has the general grant lifecycle fields and further names tool:search_documents.read, so it is a CapabilityGrant.
        ja: grant-42 は一般付与ライフサイクル項目を持ち tool:search_documents.read を追加指定するため CapabilityGrant です。
      field_values: {}
      related_node_ids:
        - CapabilityGrant
        - AuthorizationGrant
      related_relation_ids:
        - CapabilityGrant-is_a-AuthorizationGrant
      expected_result:
        zh: 能力授权同时满足上位授予和能力特定约束。
        en: The capability grant satisfies both parent-grant and capability-specific constraints.
        ja: 能力付与は上位付与と能力固有制約を共に満たします。
      why_valid_or_invalid:
        zh: 它继承授予身份并增加严格收窄的能力种差。
        en: It inherits grant identity and adds a strictly narrowing capability differentia.
        ja: 付与同一性を継承し厳密に限定する能力種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: CapabilityGrant-is_a-AuthorizationGrant-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种授权授予边界反例
        en: Boundary counterexample for is an authorization grant
        ja: 認可付与の一種の境界反例
      scenario_id: null
      descriptions:
        zh: ToolDefinition 描述 search_documents 的 schema，但不是签发给主体的 AuthorizationGrant。
        en: ToolDefinition describes the search_documents schema but is not an AuthorizationGrant issued to a principal.
        ja: ToolDefinition は search_documents の schema を記述しますが主体へ発行された AuthorizationGrant ではありません。
      field_values: {}
      related_node_ids:
        - CapabilityGrant
        - AuthorizationGrant
      related_relation_ids:
        - CapabilityGrant-is_a-AuthorizationGrant
      expected_result:
        zh: 工具定义不会因描述能力而成为 CapabilityGrant。
        en: A tool definition does not become a CapabilityGrant by describing capability.
        ja: ツール定義は能力を記述しても CapabilityGrant になりません。
      why_valid_or_invalid:
        zh: 描述能力与授予使用权是不同种类。
        en: Describing capability and granting its use are different categories.
        ja: 能力記述と使用権付与は異なる種類です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
  source_claims:
    - claim-capability-grant-001
    - claim-capability-grant-002
