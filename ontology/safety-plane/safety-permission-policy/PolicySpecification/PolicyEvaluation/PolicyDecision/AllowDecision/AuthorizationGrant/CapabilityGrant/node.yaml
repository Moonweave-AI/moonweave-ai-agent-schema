schema: moonweave.ai/ontology-node/v1
id: CapabilityGrant
kind: concept
status: accepted
labels:
  zh: 能力授权
  en: capability grant
  ja: 能力付与
semantics:
  short_definition:
    zh: 把授权范围进一步限定到一个明确工具能力或操作面的 AuthorizationGrant。
    en: An AuthorizationGrant whose scope is further restricted to one explicit tool capability or operation surface.
    ja: 範囲を一つの明示ツール能力または操作面へさらに限定した AuthorizationGrant です。
  definition:
    zh: 能力授权是 AuthorizationGrant 的下位类型，除一般主体、范围和期限外，还明确 capability_ref、允许操作及资源约束，用于在调用点证明某主体获准使用一个具体能力。它不是 Actor 自身拥有的能力声明，也不是 ToolDefinition；撤销该 grant 不改变主体或工具身份。
    en: A CapabilityGrant is a subtype of AuthorizationGrant that adds an explicit capability_ref, allowed operations, and resource constraints so invocation can prove authority for one concrete capability. It is neither a capability declaration inherent to an Actor nor a ToolDefinition; revoking it changes neither principal nor tool identity.
    ja: CapabilityGrant は AuthorizationGrant の下位型で、capability_ref、許容操作、資源制約を追加し、呼出点で具体能力の権限を証明します。Actor 固有能力宣言でも ToolDefinition でもなく、取消しても主体・ツール同一性は変わりません。
  why_needed:
    zh: 该子类让工具级最小权限可直接查询，同时与运行参与者的能力绑定和工具定义保持清晰边界。
    en: The subtype makes tool-level least privilege directly queryable while keeping clear boundaries from runtime actor capability binding and tool definition.
    ja: 下位型によりツール級最小権限を直接照会し、実行主体の能力束縛とツール定義から明確に分離します。
  includes:
    - zh: 包含继承的 grant_id、能力引用、允许操作和能力特定资源限制。
      en: Includes inherited grant_id, capability reference, allowed operations, and capability-specific resource constraints.
      ja: 継承 grant_id、能力参照、許容操作、能力固有資源制約を含みます。
  excludes:
    - zh: 不包含角色能力声明、工具实现、工具发现记录或调用尝试。
      en: Excludes role capability declaration, tool implementation, tool-discovery record, or invocation attempt.
      ja: 役割能力宣言、ツール実装、ツール発見記録、呼出試行を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - grant_id
  fields:
    - id: grant_id
      labels:
        zh: 授予标识
        en: grant ID
        ja: 付与ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 AuthorizationGrant 相同的稳定标识。
        en: Stable identity shared with the parent AuthorizationGrant.
        ja: 上位 AuthorizationGrant と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: capability_ref
      labels:
        zh: 能力引用
        en: capability reference
        ja: 能力参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权明确覆盖的工具能力面。
        en: Exact tool capability surface covered by the grant.
        ja: 付与が明示的に覆うツール能力面です。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents.read
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: allowed_operations
      labels:
        zh: 允许操作
        en: allowed operations
        ja: 許容操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 在能力面内获准的操作集合。
        en: Operations authorized within the capability surface.
        ja: 能力面内で認可された操作集合です。
      allowed_values: []
      pattern: null
      example_value:
        - search
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
    - id: resource_constraints
      labels:
        zh: 资源限制
        en: resource constraints
        ja: 資源制約
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 进一步限制能力可以接触的资源。
        en: Further limits resources the capability may contact.
        ja: 能力が接触できる資源をさらに限定します。
      allowed_values: []
      pattern: null
      example_value:
        data_class: public
      source_claims:
        - claim-capability-grant-001
        - claim-capability-grant-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: capability-grant-cedar
    labels:
      zh: 能力授权 - Cedar 授权评估
      en: capability grant - Cedar authorization evaluation
      ja: 能力付与 - Cedar 認可評価
    descriptions: {zh: "能力授权(CapabilityGrant) [CapabilityGrant]: 把授权范围进一步限定到一个明确工具能力或操作面的 AuthorizationGrant。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: capability_ref, grant_id.", en: "capability grant (CapabilityGrant) [CapabilityGrant]: An AuthorizationGrant whose scope is further restricted to one explicit tool capability or operation surface.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include capability_ref, grant_id.", ja: "能力付与(CapabilityGrant) [CapabilityGrant]: 範囲を一つの明示ツール能力または操作面へさらに限定した AuthorizationGrant です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: capability_ref, grant_id."}
    field_values:
      capability_ref: "tool:search_documents.read"
      grant_id: grant-42
    related_node_ids:
      - AuthorizationGrant
      - CapabilityGrant
    related_relation_ids:
      - AuthorizationGrant
      - CapabilityGrant
      - CapabilityGrant-is_a-AuthorizationGrant
      - claim-capability-grant-001
      - claim-capability-grant-002
    example_source: Amazon Cedar
    source_claims:
      - claim-capability-grant-001
  - id: capability-grant-opa
    labels:
      zh: 能力授权 - OPA Rego 策略评估
      en: capability grant - OPA Rego policy evaluation
      ja: 能力付与 - OPA Rego ポリシー評価
    descriptions: {zh: "能力授权(CapabilityGrant) [CapabilityGrant]: 把授权范围进一步限定到一个明确工具能力或操作面的 AuthorizationGrant。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: capability_ref, grant_id.", en: "capability grant (CapabilityGrant) [CapabilityGrant]: An AuthorizationGrant whose scope is further restricted to one explicit tool capability or operation surface.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include capability_ref, grant_id.", ja: "能力付与(CapabilityGrant) [CapabilityGrant]: 範囲を一つの明示ツール能力または操作面へさらに限定した AuthorizationGrant です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: capability_ref, grant_id."}
    field_values:
      capability_ref: "tool:search_documents.read"
      grant_id: grant-42
    related_node_ids:
      - AuthorizationGrant
      - CapabilityGrant
    related_relation_ids:
      - AuthorizationGrant
      - CapabilityGrant
      - CapabilityGrant-is_a-AuthorizationGrant
      - claim-capability-grant-001
      - claim-capability-grant-002
    example_source: Open Policy Agent
    source_claims:
      - claim-capability-grant-001
  - id: capability-grant-trustllm
    labels:
      zh: 能力授权 - TrustLLM 六维可信度
      en: capability grant - TrustLLM six-dimension trust
      ja: 能力付与 - TrustLLM 6次元信頼性
    descriptions: {zh: "能力授权(CapabilityGrant) [CapabilityGrant]: 把授权范围进一步限定到一个明确工具能力或操作面的 AuthorizationGrant。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: capability_ref, grant_id.", en: "capability grant (CapabilityGrant) [CapabilityGrant]: An AuthorizationGrant whose scope is further restricted to one explicit tool capability or operation surface.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include capability_ref, grant_id.", ja: "能力付与(CapabilityGrant) [CapabilityGrant]: 範囲を一つの明示ツール能力または操作面へさらに限定した AuthorizationGrant です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: capability_ref, grant_id."}
    field_values:
      capability_ref: "tool:search_documents.read"
      grant_id: grant-42
    related_node_ids:
      - AuthorizationGrant
      - CapabilityGrant
    related_relation_ids:
      - AuthorizationGrant
      - CapabilityGrant
      - CapabilityGrant-is_a-AuthorizationGrant
      - claim-capability-grant-001
      - claim-capability-grant-002
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-capability-grant-001
  - id: capability-grant-decodingtrust
    labels:
      zh: 能力授权 - DecodingTrust GPT 评估
      en: capability grant - DecodingTrust GPT assessment
      ja: 能力付与 - DecodingTrust GPT 評価
    descriptions: {zh: "能力授权(CapabilityGrant) [CapabilityGrant]: 把授权范围进一步限定到一个明确工具能力或操作面的 AuthorizationGrant。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: capability_ref, grant_id.", en: "capability grant (CapabilityGrant) [CapabilityGrant]: An AuthorizationGrant whose scope is further restricted to one explicit tool capability or operation surface.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include capability_ref, grant_id.", ja: "能力付与(CapabilityGrant) [CapabilityGrant]: 範囲を一つの明示ツール能力または操作面へさらに限定した AuthorizationGrant です。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: capability_ref, grant_id."}
    field_values:
      capability_ref: "tool:search_documents.read"
      grant_id: grant-42
    related_node_ids:
      - AuthorizationGrant
      - CapabilityGrant
    related_relation_ids:
      - AuthorizationGrant
      - CapabilityGrant
      - CapabilityGrant-is_a-AuthorizationGrant
      - claim-capability-grant-001
      - claim-capability-grant-002
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-capability-grant-001
