      en: This relation records which issued authorization was granted to which Actor. AuthorizationGrant-scoped_by-PermissionScope records only the grant boundary, while Actor role or identity relations record only actor identity, so neither substitutes for the grant fact.
      ja: 本関係は、どの発行済み認可がどの Actor に付与されたかという付与事実を記録します。AuthorizationGrant-scoped_by-PermissionScope は境界だけ、Actor の役割・同一性関係は主体同一性だけを記録するため、いずれもこの事実を代替できません。
