          en: grant-77, produced by allow-77, grants audit-agent-01 permission to read audit summaries for ten minutes; scope-audit-read bounds the actor, action, resource, and time, and the grant is not revoked.
          ja: allow-77 から生じた grant-77 は audit-agent-01 に監査要約を十分間読む権限を付与します。scope-audit-read が主体・操作・資源・時間を限定し、付与は未失効です。
