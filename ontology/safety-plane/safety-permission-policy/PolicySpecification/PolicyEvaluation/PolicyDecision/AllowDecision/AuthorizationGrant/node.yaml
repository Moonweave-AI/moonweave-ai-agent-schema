        severity: error
        expression_language: plain
        expression: Assert only when an issued AuthorizationGrant identifies the same Actor as grantee, is backed by an AllowDecision, is valid and unrevoked at the evaluated time, and is bounded by the applicable PermissionScope; PermissionScope alone is insufficient.
        explanations:
          zh: 仅有 PermissionScope 不足以建立本关系；必须同时核对已签发 AuthorizationGrant 的受领主体、AllowDecision、有效期、撤销状态与适用范围。
          en: PermissionScope alone is insufficient for this relation; verify the issued AuthorizationGrant's grantee, AllowDecision, validity interval, revocation state, and applicable scope together.
          ja: PermissionScope だけではこの関係を成立させられません。発行済み AuthorizationGrant の受領者、AllowDecision、有効期間、失効状態、適用範囲を併せて検証します。
