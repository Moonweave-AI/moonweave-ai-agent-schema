      - AllowDecision
      - PermissionScope
    related_relation_ids: []
    source_claims:
      - claim-authorization-grant-design
  - id: AuthorizationGrant-claude-session
    labels:
      zh: Claude allowForSession grant
      en: Claude allowForSession grant
      ja: Claude allowForSession grant
