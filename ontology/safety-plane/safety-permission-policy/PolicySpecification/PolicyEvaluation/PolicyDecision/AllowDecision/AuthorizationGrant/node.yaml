schema: moonweave.ai/ontology-node/v1
id: AuthorizationGrant
kind: concept
labels:
  zh: 授权授予
  en: authorization grant
  ja: 認可付与
semantics:
  short_definition:
    zh: AllowDecision 签发的、受 PermissionScope 约束的可撤销授权凭证。
    en: A revocable authorization credential issued by AllowDecision and bounded by PermissionScope.
    ja: AllowDecision が発行し PermissionScope で制約される取消可能認可資格。
  definition:
    zh: AuthorizationGrant 以 grant_id、decision_ref、scope_ref、issued_at、valid_until 与 issuer_ref 标识持久授权凭证。MCP OAuth access token、Cursor session allowlist 批准与 Claude allowForSession 会话授权都映射为 AuthorizationGrant；ToolApprovalGate 验证 grant 仍有效且 scope 覆盖 attempt。AuthorizationRevocation 终止未来有效性但不删除历史。
    en: AuthorizationGrant is a durable credential identified by grant_id, decision_ref, scope_ref, issued_at, valid_until, and issuer_ref. MCP OAuth access tokens, Cursor session allowlist approvals, and Claude allowForSession session grants map here; ToolApprovalGate verifies grant validity and scope coverage. AuthorizationRevocation terminates future validity without deleting history.
    ja: AuthorizationGrant は grant_id/decision_ref/scope_ref/issued_at/valid_until/issuer_ref の durable credential。MCP access token、Cursor session allow、Claude allowForSession を写像。ToolApprovalGate は grant 有効性と scope 覆盖を検証。AuthorizationRevocation は将来有効性のみ終了。
  why_needed:
    zh: grant 使多次 tool call 在 scope 内可审计复用；不能把 OAuth token 与 PolicyDecision 混为同一对象。
    en: Grants enable auditable reuse of tool calls within scope; OAuth tokens must not merge with PolicyDecision identity.
    ja: grant で scope 内 tool call の監査可能再利用。OAuth token と PolicyDecision identity 混同不可。
  includes:
    - zh: 包含授予标识、主体、范围引用、签发者、签发时间、失效时间、依据决定和当前状态。
      en: Includes grant identity, principal, scope reference, issuer, issue time, expiry, basis decision, and current status.
      ja: 付与識別子、主体、範囲参照、発行者、発行時刻、失効時刻、根拠判断、現在状態を含みます。
  excludes:
    - zh: 不包含 AuthorizationRequest、PolicyDecision、HumanApproval、身份认证结果或已发生的资源访问。
      en: Excludes AuthorizationRequest, PolicyDecision, HumanApproval, authentication result, or an access that already occurred.
      ja: AuthorizationRequest、PolicyDecision、HumanApproval、認証結果、発生済み資源アクセスを含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: AllowDecision 后由 authorization service 创建 grant；MCP token 响应映射 grant_id=token jti；validity 查询比较动作时间与 valid_until/revoked_at。CapabilityGrant 是更窄的能力子类。
    en: After AllowDecision, authorization service creates grant; MCP token response maps grant_id=token jti; validity queries compare action time to valid_until/revoked_at. CapabilityGrant is a narrower capability subtype.
    ja: AllowDecision 後 authorization service が grant 作成。MCP token jti→grant_id。validity は action time と valid_until/revoked_at 比較。CapabilityGrant はより狭い capability subtype。
  typical_input:
    - description: MCP access token issued.
      format: access_token, expires_in, scope
      source_claims:
        - claim-authorization-grant-design
  typical_output:
    - description: Grant scoped by PermissionScope.
      format: '{"grant_id":"grant-42","scope_ref":"scope-search-read","valid_until":"2026-07-16T01:25:00Z"}'
      source_claims:
        - claim-authorization-grant-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - grant_id
  fields:
    - id: grant_id
      labels:
        zh: 授予标识
        en: grant ID
        ja: 付与ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一项可撤销授权。
        en: Stable identifier for one revocable authorization grant.
        ja: 一つの取消可能な認可付与を安定識別します。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: subject_ref
      labels:
        zh: 获授权主体
        en: grantee reference
        ja: 被認可主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 持有该授权的已认证主体。
        en: Authenticated principal holding the grant.
        ja: 付与を保持する認証済み主体です。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: scope_ref
      labels:
        zh: 授予范围引用
        en: grant scope reference
        ja: 付与範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该授予实际建立的 PermissionScope。
        en: PermissionScope actually established by the grant.
        ja: 付与が実際に成立させる PermissionScope です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: issuer_ref
      labels:
        zh: 签发者引用
        en: issuer reference
        ja: 発行者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有权签发并撤销该授予的主体。
        en: Authority permitted to issue and revoke the grant.
        ja: 付与を発行・取消できる権限主体です。
      allowed_values: []
      pattern: null
      example_value: authorization-service
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: issued_at
      labels:
        zh: 签发时间
        en: issued at
        ja: 発行時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授予开始存在的 UTC 时刻。
        en: UTC instant when the grant came into existence.
        ja: 付与が成立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:04Z
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: expires_at
      labels:
        zh: 失效时间
        en: expires at
        ja: 失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 即使未撤销也停止有效的 UTC 时刻。
        en: UTC instant when the grant ceases to be effective even if not revoked.
        ja: 取消されなくても付与が無効になる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: basis_decision_ref
      labels:
        zh: 依据决定引用
        en: basis decision reference
        ja: 根拠判断参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权签发所依据的 AllowDecision。
        en: AllowDecision authorizing issuance of the grant.
        ja: 付与発行の根拠となる AllowDecision です。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
    - id: status
      labels:
        zh: 授予状态
        en: grant status
        ja: 付与状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前是 active、expired 还是 revoked。
        en: Whether the grant is currently active, expired, or revoked.
        ja: 現在 active・expired・revoked のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-authorization-grant-design
        - claim-authorization-grant-design
        - claim-authorization-grant-design
  constraints: []
  required_relation_constraints: []
