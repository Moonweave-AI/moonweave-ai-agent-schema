  - id: AuthorizationGrant-boundary-revoked
    labels:
      zh: 撤销后 grant 未来无效
      en: Grant future-invalid after revocation
      ja: 取消後 grant 将来無効
    descriptions:
      zh: revocation-42 后 grant-42 对 01:24 新调用无效但 01:22 历史可读。
      en: After revocation-42, grant-42 invalid for new calls at 01:24 but 01:22 history readable.
      ja: revocation-42 後 grant-42 は 01:24 新呼出無効、01:22 履歴可読。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: revocation lifecycle
    field_values: {}
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRevocation
    related_relation_ids: []
    source_claims:
      - claim-authorization-grant-design
parent_relation:
  id: AuthorizationGrant-authorized_by-AllowDecision
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 由允许决定授权
    en: is authorized by allow decision
    ja: 許可判断に認可される
  definitions:
    zh: AuthorizationGrant 引用批准其签发的 AllowDecision；决定是必要依据，但只有授权服务实际签发后 grant 才存在。
    en: An AuthorizationGrant references the AllowDecision authorizing its issuance; the decision is necessary basis, but the grant exists only after an authorization service actually issues it.
    ja: AuthorizationGrant は発行を認可する AllowDecision を参照し、判断は必要根拠ですが認可サービスが実際に発行した後だけ grant が存在します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 授权授予签发
      en: authorizes grant issuance
      ja: 付与発行を認可する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-authorization-grant-design
    - claim-authorization-grant-design
    - claim-authorization-grant-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: AuthorizationGrant-scoped_by-PermissionScope
    predicate: scoped_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受权限范围约束
      en: is scoped by permission scope
      ja: 権限範囲に制約される
    definitions:
      zh: AuthorizationGrant 的可用主体、动作、资源、上下文和期限由一个 PermissionScope 限定，且不得超过产生它的请求和允许决定。
      en: An AuthorizationGrant's usable principal, actions, resources, context, and interval are bounded by one PermissionScope and may not exceed its request and AllowDecision.
      ja: AuthorizationGrant の利用可能主体・操作・資源・文脈・期間は一つの PermissionScope に限定され、元要求と AllowDecision を超えません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: scopes_grant
      labels:
        zh: 约束授予
        en: scopes grant
        ja: 付与を制約する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-authorization-grant-design
      - claim-authorization-grant-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:PermissionScope
  - id: AuthorizationGrant-granted_to-Actor
    predicate: granted_to
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 授予参与者
      en: is granted to actor
      ja: アクターに付与される
    definitions:
      zh: AuthorizationGrant 把一次已经签发、尚在有效期内且未被撤销的授权授予唯一的 Actor，并保留产生该授权的允许决定与权限边界；PermissionScope 本身不证明授权。
      en: An AuthorizationGrant binds an issued, currently valid, and unrevoked authorization to exactly one Actor while retaining the AllowDecision and permission boundary that produced it; PermissionScope alone does not prove authority.
      ja: AuthorizationGrant は、発行済みで現在有効かつ未失効の認可を一意の Actor に結び付け、その認可を生じさせた AllowDecision と権限境界を保持します。PermissionScope だけでは認可を証明しません。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: receives_authorization_grant
      labels:
        zh: 接受授权授予
        en: receives authorization grant
        ja: 認可付与を受ける
    conditions:
      - id: AuthorizationGrant-granted_to-Actor-condition-valid-grantee-001
        severity: error
        expression_language: plain
        expression: Assert only when an issued AuthorizationGrant identifies the same Actor as grantee, is backed by an AllowDecision, is valid and unrevoked at the evaluated time, and is bounded by the applicable PermissionScope; PermissionScope alone is insufficient.
        explanations:
          zh: 仅有 PermissionScope 不足以建立本关系；必须同时核对已签发 AuthorizationGrant 的受领主体、AllowDecision、有效期、撤销状态与适用范围。
          en: PermissionScope alone is insufficient for this relation; verify the issued AuthorizationGrant's grantee, AllowDecision, validity interval, revocation state, and applicable scope together.
          ja: PermissionScope だけではこの関係を成立させられません。発行済み AuthorizationGrant の受領者、AllowDecision、有効期間、失効状態、適用範囲を併せて検証します。
        source_claims:
          - claim-authorization-grant-design
          - claim-authorization-grant-design
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: AuthorizationGrant 仍由 safety-permission-policy 唯一拥有，Actor 仍由 runtime-actors 唯一拥有；granted_to 只记录已签发授权的受领主体，不把 PermissionScope、角色标签或主体身份误当作授权事实。
        en: AuthorizationGrant remains uniquely owned by safety-permission-policy and Actor by runtime-actors; granted_to records the grantee of an issued authorization without treating PermissionScope, a role label, or actor identity as the authorization fact itself.
        ja: AuthorizationGrant は safety-permission-policy、Actor は runtime-actors に引き続き一意に所有されます。granted_to は発行済み認可の受領者だけを記録し、PermissionScope、役割ラベル、アクター同一性を認可事実そのものとは扱いません。
      protocol_or_resource_context:
        zh: 查询必须把本关系与 AuthorizationGrant-authorized_by-AllowDecision、AuthorizationGrant-scoped_by-PermissionScope 及授权有效期一起解释；跨越信任边界时还需单独核对 BoundaryCrossing-authorized_by-AuthorizationGrant。
        en: Queries interpret this relation together with AuthorizationGrant-authorized_by-AllowDecision, AuthorizationGrant-scoped_by-PermissionScope, and the grant validity interval; crossing a trust boundary separately requires BoundaryCrossing-authorized_by-AuthorizationGrant.
        ja: 照会では本関係を AuthorizationGrant-authorized_by-AllowDecision、AuthorizationGrant-scoped_by-PermissionScope、付与の有効期間と併せて解釈します。信頼境界を越える場合は BoundaryCrossing-authorized_by-AuthorizationGrant も別途検証します。
    constraints: []
    source_claims:
      - claim-authorization-grant-design
      - claim-authorization-grant-design
    distinct_fact_rationale:
      zh: 本关系记录“哪一次已签发授权授予了哪一个参与者”的授予事实；AuthorizationGrant-scoped_by-PermissionScope 只记录授权边界，Actor-role/identity 关系只记录主体身份，因此都不能替代该事实。
      en: This relation records which issued authorization was granted to which Actor. AuthorizationGrant-scoped_by-PermissionScope records only the grant boundary, while Actor role or identity relations record only actor identity, so neither substitutes for the grant fact.
      ja: 本関係は、どの発行済み認可がどの Actor に付与されたかという付与事実を記録します。AuthorizationGrant-scoped_by-PermissionScope は境界だけ、Actor の役割・同一性関係は主体同一性だけを記録するため、いずれもこの事実を代替できません。
    layout_role: cross-link
    target: concept:Actor
