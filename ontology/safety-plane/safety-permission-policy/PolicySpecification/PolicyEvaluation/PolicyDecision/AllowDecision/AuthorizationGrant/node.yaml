    descriptions:
      zh: decision-42 allow 后 grant-42 引用 scope-search-read 与 decision-42。
      en: After decision-42 allow, grant-42 references scope-search-read and decision-42.
      ja: decision-42 allow 後 grant-42 が scope-search-read/decision-42 参照。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
