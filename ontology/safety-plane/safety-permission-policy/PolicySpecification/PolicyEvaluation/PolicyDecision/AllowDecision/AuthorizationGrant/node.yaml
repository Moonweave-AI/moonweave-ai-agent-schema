        expected_result:
          zh: 范围匹配失败，grant 对该请求无效。
          en: Scope matching fails and the grant is ineffective for that request.
          ja: 範囲一致が失敗し grant はその要求に無効です。
        why_valid_or_invalid:
          zh: 范围必须全维匹配，不能只比较主体和资源。
          en: Scope must match every dimension, not only principal and resource.
          ja: 範囲は主体・資源だけでなく全次元一致が必要です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-authorization-grant-001
          - claim-authorization-grant-002
    source_claims:
      - claim-authorization-grant-001
      - claim-authorization-grant-002
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:PermissionScope
  - id: AuthorizationGrant-granted_to-Actor
    predicate: granted_to
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 授予参与者
      en: is granted to actor
      ja: アクターに付与される
    definitions:
      zh: AuthorizationGrant 把一次已经签发、尚在有效期内且未被撤销的授权授予唯一的 Actor，并保留产生该授权的允许决定与权限边界；PermissionScope 本身不证明授权。
      en: An AuthorizationGrant binds an issued, currently valid, and unrevoked authorization to exactly one Actor while retaining the AllowDecision and permission boundary that produced it; PermissionScope alone does not prove authority.
      ja: AuthorizationGrant は、発行済みで現在有効かつ未失効の認可を一意の Actor に結び付け、その認可を生じさせた AllowDecision と権限境界を保持します。PermissionScope だけでは認可を証明しません。
    cardinality:
