          en: The graph asserts grant-77 granted_to audit-agent-01 and can continue through the AllowDecision, scope, and validity interval to verify authority.
          ja: グラフは grant-77 granted_to audit-agent-01 を表明し、AllowDecision、範囲、有効期間をたどって認可を検証できます。
        why_valid_or_invalid:
          zh: 该事实绑定的是已签发且当前有效的授权与其唯一受领主体，而不是根据权限范围或角色名称推测主体有权。
          en: The fact binds an issued and currently valid authorization to its single grantee rather than inferring authority from a permission scope or role name.
          ja: この事実は発行済みで現在有効な認可を一人の受領者へ結び付け、権限範囲や役割名から認可を推測しません。
