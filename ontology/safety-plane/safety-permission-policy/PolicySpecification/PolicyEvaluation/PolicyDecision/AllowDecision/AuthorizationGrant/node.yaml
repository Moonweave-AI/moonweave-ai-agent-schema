schema: moonweave.ai/ontology-node/v1
id: AuthorizationGrant
kind: concept
status: accepted
labels:
  zh: 授权授予
  en: authorization grant
  ja: 認可付与
semantics:
  short_definition:
    zh: 由可识别授权者基于允许决定签发、按主体、范围和期限约束的可撤销权能记录。
    en: A revocable authority record issued by an identified authority from an allow decision and bounded by principal, scope, and time.
    ja: 識別可能な権限者が allow 判断に基づき発行し、主体・範囲・期間で限定した取消可能な権能記録です。
  definition:
    zh: 授权授予是可独立识别和撤销的信息记录，说明哪个主体在什么有效区间内可对哪些资源执行哪些动作，并引用其 PermissionScope、签发者和作为依据的 AllowDecision。它不是泛化的 AuthorizationArtifact，也不是请求或决定；只有状态有效、未过期、未被 AuthorizationRevocation 撤销且当前请求落在范围内时才可使用。
    en: An AuthorizationGrant is independently identified, revocable information stating which principal may perform which actions on which resources during a validity interval, referencing its PermissionScope, issuer, and basis AllowDecision. It is not a generic AuthorizationArtifact, request, or decision; it is usable only while active, unexpired, not revoked by an AuthorizationRevocation, and matched by the current request.
    ja: AuthorizationGrant は独立識別・取消可能な情報で、どの主体がどの有効期間にどの資源へどの操作を行えるかを示し、PermissionScope、発行者、根拠 AllowDecision を参照します。汎用 AuthorizationArtifact、要求、判断ではなく、有効・未期限・未取消かつ現在要求が範囲一致の場合だけ使用できます。
  why_needed:
    zh: 该根把持续权能与一次决定分开，使有效期、范围收窄和撤销可以在不改写历史决定的情况下查询。
    en: This root separates continuing authority from one decision so expiry, scope narrowing, and revocation are queryable without rewriting historical decisions.
    ja: このルートは持続権能を一回の判断から分離し、歴史判断を書き換えず期限・範囲縮小・取消を照会できます。
  includes:
    - zh: 包含授予标识、主体、范围引用、签发者、签发时间、失效时间、依据决定和当前状态。
      en: Includes grant identity, principal, scope reference, issuer, issue time, expiry, basis decision, and current status.
      ja: 付与識別子、主体、範囲参照、発行者、発行時刻、失効時刻、根拠判断、現在状態を含みます。
  excludes:
    - zh: 不包含 AuthorizationRequest、PolicyDecision、HumanApproval、身份认证结果或已发生的资源访问。
      en: Excludes AuthorizationRequest, PolicyDecision, HumanApproval, authentication result, or an access that already occurred.
      ja: AuthorizationRequest、PolicyDecision、HumanApproval、認証結果、発生済み資源アクセスを含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - grant_id
  fields:
    - id: grant_id
      labels:
        zh: 授予标识
        en: grant ID
        ja: 付与ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一项可撤销授权。
        en: Stable identifier for one revocable authorization grant.
        ja: 一つの取消可能な認可付与を安定識別します。
      allowed_values: []
      pattern: null
      example_value: grant-42
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: subject_ref
      labels:
        zh: 获授权主体
        en: grantee reference
        ja: 被認可主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 持有该授权的已认证主体。
        en: Authenticated principal holding the grant.
        ja: 付与を保持する認証済み主体です。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: scope_ref
      labels:
        zh: 授予范围引用
        en: grant scope reference
        ja: 付与範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该授予实际建立的 PermissionScope。
        en: PermissionScope actually established by the grant.
        ja: 付与が実際に成立させる PermissionScope です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: issuer_ref
      labels:
        zh: 签发者引用
        en: issuer reference
        ja: 発行者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有权签发并撤销该授予的主体。
        en: Authority permitted to issue and revoke the grant.
        ja: 付与を発行・取消できる権限主体です。
      allowed_values: []
      pattern: null
      example_value: authorization-service
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: issued_at
      labels:
        zh: 签发时间
        en: issued at
        ja: 発行時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授予开始存在的 UTC 时刻。
        en: UTC instant when the grant came into existence.
        ja: 付与が成立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:04Z
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: expires_at
      labels:
        zh: 失效时间
        en: expires at
        ja: 失効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 即使未撤销也停止有效的 UTC 时刻。
        en: UTC instant when the grant ceases to be effective even if not revoked.
        ja: 取消されなくても付与が無効になる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: basis_decision_ref
      labels:
        zh: 依据决定引用
        en: basis decision reference
        ja: 根拠判断参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权签发所依据的 AllowDecision。
        en: AllowDecision authorizing issuance of the grant.
        ja: 付与発行の根拠となる AllowDecision です。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
    - id: status
      labels:
        zh: 授予状态
        en: grant status
        ja: 付与状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前是 active、expired 还是 revoked。
        en: Whether the grant is currently active, expired, or revoked.
        ja: 現在 active・expired・revoked のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-authorization-grant-001
        - claim-authorization-grant-002
        - claim-authorization-grant-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuthorizationGrant-example-positive-manual-001
    kind: positive
    labels:
      zh: 授权授予正例
      en: Positive authorization grant case
      ja: 認可付与の正例
    scenario_id: null
    descriptions:
      zh: authorization-service 基于 decision-42 向 agent:planner-1 签发 grant-42，仅覆盖 scope-search-read 并在 01:25 失效。
      en: authorization-service issues grant-42 to agent:planner-1 from decision-42, limited to scope-search-read and expiring at 01:25.
      ja: authorization-service は decision-42 に基づき agent:planner-1 へ grant-42 を発行し、scope-search-read に限定して 01:25 に失効します。
    field_values:
      grant_id: grant-42
      subject_ref: agent:planner-1
      scope_ref: scope-search-read
      issuer_ref: authorization-service
      issued_at: 2026-07-16T01:21:04Z
      expires_at: 2026-07-16T01:25:00Z
      basis_decision_ref: decision-42
      status: active
    related_node_ids:
      - AuthorizationGrant
      - AllowDecision
      - PermissionScope
      - AuthorizationRevocation
    related_relation_ids:
      - AuthorizationGrant-authorized_by-AllowDecision
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRevocation-revokes-AuthorizationGrant
    expected_result:
      zh: 有效性查询同时验证依据决定、主体、范围、时间和是否存在撤销。
      en: Validity queries verify basis decision, principal, scope, time, and revocation together.
      ja: 有効性照会は根拠判断、主体、範囲、時刻、取消有無を同時検証します。
    why_valid_or_invalid:
      zh: 授予拥有独立身份和生命周期，并明确引用而非复制决定和范围。
      en: The grant has independent identity and lifecycle and references rather than copies decision and scope.
      ja: 付与は独立同一性とライフサイクルを持ち、判断と範囲を複製せず参照します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-authorization-grant-001
      - claim-authorization-grant-002
      - claim-authorization-grant-003
  - id: AuthorizationGrant-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 授权授予边界反例
      en: Boundary counterexample for authorization grant
      ja: 認可付与の境界反例
    scenario_id: null
    descriptions:
      zh: decision-42 是 AllowDecision，但如果 authorization-service 没有签发 grant-42，就不存在可复用 AuthorizationGrant。
      en: decision-42 is an AllowDecision, but no reusable AuthorizationGrant exists unless authorization-service actually issues grant-42.
      ja: decision-42 は AllowDecision ですが、authorization-service が grant-42 を発行しなければ再利用可能 AuthorizationGrant は存在しません。
    field_values: {}
    related_node_ids:
      - AuthorizationGrant
      - AllowDecision
    related_relation_ids:
      - AuthorizationGrant-authorized_by-AllowDecision
    expected_result:
      zh: 查询返回允许决定存在而授予不存在，执行方不得虚构 grant。
      en: The query returns an allow decision but no grant, and enforcement must not invent one.
      ja: 照会は allow 判断あり・付与なしを返し、執行側は grant を捏造しません。
    why_valid_or_invalid:
      zh: 决定是签发依据，不是签发行为或持续权能本身。
      en: A decision is issuance basis, not the issuance act or continuing authority itself.
      ja: 判断は発行根拠であり、発行行為や持続権能そのものではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-authorization-grant-001
      - claim-authorization-grant-002
      - claim-authorization-grant-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: AuthorizationGrant-authorized_by-AllowDecision
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 由允许决定授权
    en: is authorized by allow decision
    ja: 許可判断に認可される
  definitions:
    zh: AuthorizationGrant 引用批准其签发的 AllowDecision；决定是必要依据，但只有授权服务实际签发后 grant 才存在。
    en: An AuthorizationGrant references the AllowDecision authorizing its issuance; the decision is necessary basis, but the grant exists only after an authorization service actually issues it.
    ja: AuthorizationGrant は発行を認可する AllowDecision を参照し、判断は必要根拠ですが認可サービスが実際に発行した後だけ grant が存在します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 授权授予签发
      en: authorizes grant issuance
      ja: 付与発行を認可する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: AuthorizationGrant-authorized_by-AllowDecision-example-positive-manual-001
      kind: positive
      labels:
        zh: 由允许决定授权正例
        en: Positive is authorized by allow decision case
        ja: 許可判断に認可されるの正例
      scenario_id: null
      descriptions:
        zh: grant-42 的 basis_decision_ref 指向 decision-42，且授予范围未超过 allow 范围。
        en: grant-42's basis_decision_ref points to decision-42 and its scope does not exceed the allow scope.
        ja: grant-42 の basis_decision_ref は decision-42 を指し、付与範囲は allow 範囲を超えません。
      field_values: {}
      related_node_ids:
        - AuthorizationGrant
        - AllowDecision
      related_relation_ids:
        - AuthorizationGrant-authorized_by-AllowDecision
      expected_result:
        zh: 从授予可追溯签发依据并验证范围不扩张。
        en: The grant traces to its issuance basis and supports non-expansion checks.
        ja: 付与から発行根拠へ追跡し範囲非拡張を検証できます。
      why_valid_or_invalid:
        zh: 关系表达权威依据而不是两个信息记录的同一性。
        en: The relation states authority basis, not identity between two information records.
        ja: 関係は権威根拠を表し二情報記録の同一性ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-authorization-grant-004
        - claim-authorization-grant-002
        - claim-authorization-grant-001
    - id: AuthorizationGrant-authorized_by-AllowDecision-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 由允许决定授权边界反例
        en: Boundary counterexample for is authorized by allow decision
        ja: 許可判断に認可されるの境界反例
      scenario_id: null
      descriptions:
        zh: decision-42 存在但 grant_id 尚未生成，因此不能仅凭 allow 建立一个虚构 AuthorizationGrant。
        en: decision-42 exists but no grant_id has been issued, so allow alone cannot establish a fictional AuthorizationGrant.
        ja: decision-42 があっても grant_id 未発行なら allow だけで架空 AuthorizationGrant を作れません。
      field_values: {}
      related_node_ids:
        - AuthorizationGrant
        - AllowDecision
      related_relation_ids:
        - AuthorizationGrant-authorized_by-AllowDecision
      expected_result:
        zh: 关系查询没有源端 grant，返回尚未签发。
        en: The relation query has no source grant and returns not issued.
        ja: 関係照会に source grant がなく未発行を返します。
      why_valid_or_invalid:
        zh: 授权决定与授予签发是相邻但不同事实。
        en: Authorization decision and grant issuance are adjacent but distinct facts.
        ja: 認可判断と付与発行は隣接しますが別事実です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-authorization-grant-004
        - claim-authorization-grant-002
        - claim-authorization-grant-001
  source_claims:
    - claim-authorization-grant-004
    - claim-authorization-grant-002
    - claim-authorization-grant-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: AuthorizationGrant-scoped_by-PermissionScope
    predicate: scoped_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受权限范围约束
      en: is scoped by permission scope
      ja: 権限範囲に制約される
    definitions:
      zh: AuthorizationGrant 的可用主体、动作、资源、上下文和期限由一个 PermissionScope 限定，且不得超过产生它的请求和允许决定。
      en: An AuthorizationGrant's usable principal, actions, resources, context, and interval are bounded by one PermissionScope and may not exceed its request and AllowDecision.
      ja: AuthorizationGrant の利用可能主体・操作・資源・文脈・期間は一つの PermissionScope に限定され、元要求と AllowDecision を超えません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: scopes_grant
      labels:
        zh: 约束授予
        en: scopes grant
        ja: 付与を制約する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: AuthorizationGrant-scoped_by-PermissionScope-example-positive-manual-001
        kind: positive
        labels:
          zh: 受权限范围约束正例
          en: Positive is scoped by permission scope case
          ja: 権限範囲に制約されるの正例
        scenario_id: null
        descriptions:
          zh: grant-42 受 scope-search-read 约束，只允许 agent:planner-1 的公开只读搜索且五分钟失效。
          en: grant-42 is scoped by scope-search-read to agent:planner-1's public read-only search for five minutes.
          ja: grant-42 は scope-search-read により agent:planner-1 の公開読取専用検索を五分間だけ許可します。
        field_values: {}
        related_node_ids:
          - AuthorizationGrant
          - PermissionScope
        related_relation_ids:
          - AuthorizationGrant-scoped_by-PermissionScope
        expected_result:
          zh: 任何使用 grant-42 的请求逐维匹配该范围。
          en: Every request using grant-42 matches the scope dimension by dimension.
          ja: grant-42 を使う各要求が範囲を次元ごとに一致させます。
        why_valid_or_invalid:
          zh: 该关系提供可逐维判定的最小权限边界。
          en: The edge provides a least-authority boundary decidable across every scope dimension.
          ja: 関係は各範囲次元で判定可能な最小権限境界を示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-authorization-grant-001
          - claim-authorization-grant-002
      - id: AuthorizationGrant-scoped_by-PermissionScope-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 受权限范围约束边界反例
          en: Boundary counterexample for is scoped by permission scope
          ja: 権限範囲に制約されるの境界反例
        scenario_id: null
        descriptions:
          zh: grant-42 试图用于写操作时，即使主体与资源相同，也超出 scope-search-read。
          en: Using grant-42 for write exceeds scope-search-read even with the same principal and resource.
          ja: 同じ主体・資源でも grant-42 を書込に使うと scope-search-read を超えます。
        field_values: {}
        related_node_ids:
          - AuthorizationGrant
          - PermissionScope
        related_relation_ids:
