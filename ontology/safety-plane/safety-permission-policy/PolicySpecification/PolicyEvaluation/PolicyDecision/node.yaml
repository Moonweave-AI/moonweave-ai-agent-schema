schema: moonweave.ai/ontology-node/v1
id: PolicyDecision
kind: concept
status: accepted
labels:
  zh: 策略决定
  en: policy decision
  ja: ポリシー判断
semantics:
  short_definition:
    zh: 一次策略评估针对一个授权请求产生的、可追溯的 allow、deny 或 defer 信息结果。
    en: A traceable allow, deny, or defer information result produced by one policy evaluation for one authorization request.
    ja: 一回の方針評価が一つの認可要求に対して生成する、追跡可能な allow・deny・defer 情報結果です。
  definition:
    zh: 策略决定是 PolicyEvaluation 的输出信息，以 decision_id 唯一标识，并固定被决定的 AuthorizationRequest、结果类型、决定时间、策略版本、决定性规则、组合算法、理由、义务和可复用期限。决定不是规范规则，也不执行动作；执行组件必须另行验证决定与当前请求快照一致且仍有效。
    en: A PolicyDecision is the information output of a PolicyEvaluation, uniquely identified by decision_id and fixing the decided AuthorizationRequest, outcome, decision time, policy version, determining rules, combining algorithm, rationale, obligations, and reuse limit. It is neither a policy rule nor an enforcement action; an enforcement component separately verifies that it matches the current request snapshot and remains valid.
    ja: PolicyDecision は PolicyEvaluation の情報出力で、decision_id により一意に識別され、判断対象 AuthorizationRequest、結果、判断時刻、方針版、決定規則、結合アルゴリズム、理由、義務、再利用期限を固定します。規則でも執行动作でもなく、執行側が現要求スナップショット一致と有効性を別途検証します。
  why_needed:
    zh: 独立决定记录提供可审计结果和决定性规则，同时保持“决定”与“执行”分离，防止旧允许结果被错误复用于新请求。
    en: A distinct decision record provides an auditable result and determining rules while separating decision from enforcement and preventing stale allows from being reused for new requests.
    ja: 独立判断記録は監査可能な結果と決定規則を示し、判断と執行を分離して旧 allow の新要求への誤再利用を防ぎます。
  includes:
    - zh: 包含决定标识、请求引用、评估引用、allow/deny/defer 结果、策略版本、决定规则、组合算法、理由、义务和有效期。
      en: Includes decision identity, request and evaluation references, allow/deny/defer outcome, policy version, determining rules, combining algorithm, rationale, obligations, and validity.
      ja: 判断識別子、要求・評価参照、allow/deny/defer 結果、方針版、決定規則、結合アルゴリズム、理由、義務、有効期間を含みます。
  excludes:
    - zh: 不包含策略规范、规则效果、评估活动、执行分支、实际副作用或持久授权授予。
      en: Excludes policy specification, rule effect, evaluation activity, execution branch, actual side effect, or durable authorization grant.
      ja: 方針仕様、規則効果、評価活動、実行分岐、実副作用、持続認可付与を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次策略决定结果。
        en: Stable identifier for one policy-decision result.
        ja: 一つの方針判断結果を安定識別します。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该决定明确回答的授权请求。
        en: Authorization request explicitly answered by the decision.
        ja: 判断が明示的に回答する認可要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: evaluation_ref
      labels:
        zh: 评估引用
        en: evaluation reference
        ja: 評価参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生该决定的 PolicyEvaluation。
        en: PolicyEvaluation that produced the decision.
        ja: 判断を生成した PolicyEvaluation です。
      allowed_values: []
      pattern: null
      example_value: evaluation-42
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: decision_kind
      labels:
        zh: 决定结果种类
        en: decision kind
        ja: 判断種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 策略评估的受控结果：allow、deny、defer、not_applicable 或 indeterminate。
        en: "Controlled policy-evaluation result: allow, deny, defer, not_applicable, or indeterminate."
        ja: 方針評価の制御結果：allow、deny、defer、not_applicable、indeterminate。
      allowed_values:
        - id: DecisionAllow
          value: allow
          labels:
            zh: 允许
            en: Allow
            ja: 許可
          definitions:
            zh: 请求满足适用策略并可在决定范围和义务内继续。
            en: The request satisfies applicable policy and may proceed within the decision's scope and obligations.
            ja: 要求は適用方針を満たし判断範囲・義務内で継続できます。
          status: accepted
          source_claims:
            - claim-policy-decision-003
            - claim-policy-decision-001
        - id: DecisionDeny
          value: deny
          labels:
            zh: 拒绝
            en: Deny
            ja: 拒否
          definitions:
            zh: 请求被适用策略明确禁止继续。
            en: The request is explicitly prohibited from proceeding by applicable policy.
            ja: 要求は適用方針により継続を明示禁止されます。
          status: accepted
          source_claims:
            - claim-policy-decision-003
            - claim-policy-decision-001
        - id: DecisionDefer
          value: defer
          labels:
            zh: 暂缓
            en: Defer
            ja: 保留
          definitions:
            zh: 当前证据不足以允许或终局拒绝，必须补充证据后重新评估。
            en: Current evidence is insufficient for allow or final deny; new evidence and reevaluation are required.
            ja: 現在証拠では許可・最終拒否できず、新証拠と再評価が必要です。
          status: accepted
          source_claims:
            - claim-policy-decision-004
            - claim-policy-decision-005
        - id: DecisionNotApplicable
          value: not_applicable
          labels:
            zh: 不适用
            en: Not applicable
            ja: 非適用
          definitions:
            zh: 没有策略或规则适用于该请求快照。
            en: No policy or rule applies to the request snapshot.
            ja: 要求スナップショットへ適用する方針・規則がありません。
          status: accepted
          source_claims:
            - claim-policy-decision-003
        - id: DecisionIndeterminate
          value: indeterminate
          labels:
            zh: 不确定
            en: Indeterminate
            ja: 不確定
          definitions:
            zh: 缺失属性、处理错误或语义冲突使策略不能形成确定结果。
            en: Missing attributes, processing errors, or semantic conflict prevent a determinate policy result.
            ja: 属性欠落、処理誤り、意味競合により確定方針結果を形成できません。
          status: accepted
          source_claims:
            - claim-policy-decision-003
      pattern: null
      example_value: allow
      source_claims:
        - claim-policy-decision-003
        - claim-policy-decision-001
        - claim-policy-decision-004
        - claim-policy-decision-005
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定形成的 UTC 时刻。
        en: UTC instant when the decision was formed.
        ja: 判断が成立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:03Z
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定所依据的确定策略版本。
        en: Exact policy version on which the decision is based.
        ja: 判断の根拠となる正確な方針版です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: determining_rule_refs
      labels:
        zh: 决定性规则引用
        en: determining rule references
        ja: 決定規則参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 实际决定最终结果的规则集合。
        en: Rules that actually determined the final outcome.
        ja: 最終結果を実際に決定した規則集合です。
      allowed_values: []
      pattern: null
      example_value:
        - allow-approved-read
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: combining_algorithm_ref
      labels:
        zh: 组合算法引用
        en: combining algorithm reference
        ja: 結合アルゴリズム参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 归并规则结果所用的算法版本。
        en: Algorithm version used to combine rule results.
        ja: 規則結果を結合したアルゴリズム版です。
      allowed_values: []
      pattern: null
      example_value: deny-overrides@1
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: reason
      labels:
        zh: 决定理由
        en: decision reason
        ja: 判断理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明决定性规则和证据如何支持结果。
        en: Explains how determining rules and evidence support the result.
        ja: 決定規則と証拠が結果をどう支えるか説明します。
      allowed_values: []
      pattern: null
      example_value: approved read-only scope matched
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
    - id: valid_until
      labels:
        zh: 可复用期限
        en: valid until
        ja: 再利用期限
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行组件可以复用该决定的最晚时刻。
        en: Latest instant when enforcement may reuse the decision.
        ja: 執行側が判断を再利用できる最終時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-policy-decision-001
        - claim-policy-decision-002
        - claim-policy-decision-003
  constraints: []
  required_relation_constraints: []
