schema: moonweave.ai/ontology-node/v1
id: PolicyDecision
kind: concept
labels:
  zh: 策略决定
  en: policy decision
  ja: ポリシー判断
semantics:
  short_definition:
    zh: 一次 PolicyEvaluation 对特定 AuthorizationRequest 产生的 allow/deny/defer 三值决定。
    en: The allow/deny/defer ternary decision one PolicyEvaluation produces for a specific AuthorizationRequest.
    ja: PolicyEvaluation が特定 AuthorizationRequest に対して生成する allow/deny/defer 三値判断。
  definition:
    zh: PolicyDecision 以 decision_id、decision_kind、request_ref、policy_version_ref、combining_algorithm_ref 与 determining_rule_refs 记录求值结果。它映射 XACML Permit/Deny/NotApplicable 模式（Moonweave 用 defer 表达需人工或补充证据的 NotApplicable/Indeterminate）；AllowDecision、DenyDecision、DeferDecision 是互斥子类。决定不能跨 request 复用。
    en: PolicyDecision records evaluation results with decision_id, decision_kind, request_ref, policy_version_ref, combining_algorithm_ref, and determining_rule_refs. It maps XACML Permit/Deny/NotApplicable (Moonweave uses defer for NotApplicable/Indeterminate needing human or supplemental evidence); AllowDecision, DenyDecision, and DeferDecision are mutually exclusive subtypes. Decisions cannot be reused across requests.
    ja: PolicyDecision は decision_id/decision_kind/request_ref/policy_version_ref/combining_algorithm_ref/determining_rule_refs で結果を記録。XACML Permit/Deny/NotApplicable（Moonweave は defer で human/追加証拠要 NotApplicable/Indeterminate）を写像。Allow/Deny/DeferDecision は互斥 subtype。request 横断再利用不可。
  why_needed:
    zh: 三值决定使 MCP requireApproval 与自动 allow/deny 可共存；缺少 defer 会把“待人工”误当 deny。
    en: Three-valued decisions let MCP requireApproval coexist with automatic allow/deny; without defer, pending human review is mistaken for deny.
    ja: 三値判断で MCP requireApproval と自動 allow/deny 共存。defer なしでは人工待ちが deny と誤認されます。
  includes:
    - zh: 包含决定标识、请求引用、评估引用、allow/deny/defer 结果、策略版本、决定规则、组合算法、理由、义务和有效期。
      en: Includes decision identity, request and evaluation references, allow/deny/defer outcome, policy version, determining rules, combining algorithm, rationale, obligations, and validity.
      ja: 判断識別子、要求・評価参照、allow/deny/defer 結果、方針版、決定規則、結合アルゴリズム、理由、義務、有効期間を含みます。
  excludes:
    - zh: 不包含策略规范、规则效果、评估活动、执行分支、实际副作用或持久授权授予。
      en: Excludes policy specification, rule effect, evaluation activity, execution branch, actual side effect, or durable authorization grant.
      ja: 方針仕様、規則効果、評価活動、実行分岐、実副作用、持続認可付与を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: OPA `{result:true/false}` 与 undefined 映射 allow/deny/defer；XACML Permit→allow、Deny→deny、NotApplicable→defer；每次决定必须引用 combining_algorithm_ref 与 determining_rule_refs。ToolApprovalGate 消费 AllowDecision 或 defer 解除后的 allow。
    en: Map OPA `{result:true/false}` and undefined to allow/deny/defer; XACML Permit→allow, Deny→deny, NotApplicable→defer; every decision must cite combining_algorithm_ref and determining_rule_refs. ToolApprovalGate consumes AllowDecision or allow after defer clearance.
    ja: OPA result true/false/undefined→allow/deny/defer。XACML Permit/Deny/NotApplicable→allow/deny/defer。各 decision は combining_algorithm_ref/determining_rule_refs 引用必須。ToolApprovalGate は AllowDecision または defer 解除後 allow を消費。
  typical_input:
    - description: XACML decision.
      format: "Decision: Permit | Deny | NotApplicable"
      source_claims:
        - claim-policy-decision-design
    - description: OPA query result.
      format: '{"result": true} | {"result": false} | undefined'
      source_claims:
        - claim-policy-decision-design
  typical_output:
    - description: Auditable decision record.
      format: '{"decision_id":"decision-42","decision_kind":"allow","determining_rule_refs":["allow-approved-read@7"]}'
      source_claims:
        - claim-policy-decision-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次策略决定结果。
        en: Stable identifier for one policy-decision result.
        ja: 一つの方針判断結果を安定識別します。
      allowed_values: []
      pattern: null
      example_value: decision-42
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该决定明确回答的授权请求。
        en: Authorization request explicitly answered by the decision.
        ja: 判断が明示的に回答する認可要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: evaluation_ref
      labels:
        zh: 评估引用
        en: evaluation reference
        ja: 評価参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生该决定的 PolicyEvaluation。
        en: PolicyEvaluation that produced the decision.
        ja: 判断を生成した PolicyEvaluation です。
      allowed_values: []
      pattern: null
      example_value: evaluation-42
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: decision_kind
      labels:
        zh: 决定结果种类
        en: decision kind
        ja: 判断種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 策略评估的受控结果：allow、deny、defer、not_applicable 或 indeterminate。
        en: "Controlled policy-evaluation result: allow, deny, defer, not_applicable, or indeterminate."
        ja: 方針評価の制御結果：allow、deny、defer、not_applicable、indeterminate。
      allowed_values:
        - id: DecisionAllow
          value: allow
          labels:
            zh: 允许
            en: Allow
            ja: 許可
          definitions:
            zh: 请求满足适用策略并可在决定范围和义务内继续。
            en: The request satisfies applicable policy and may proceed within the decision's scope and obligations.
            ja: 要求は適用方針を満たし判断範囲・義務内で継続できます。
          source_claims:
            - claim-policy-decision-design
            - claim-policy-decision-design
        - id: DecisionDeny
          value: deny
          labels:
            zh: 拒绝
            en: Deny
            ja: 拒否
          definitions:
            zh: 请求被适用策略明确禁止继续。
            en: The request is explicitly prohibited from proceeding by applicable policy.
            ja: 要求は適用方針により継続を明示禁止されます。
          source_claims:
            - claim-policy-decision-design
            - claim-policy-decision-design
        - id: DecisionDefer
          value: defer
          labels:
            zh: 暂缓
            en: Defer
            ja: 保留
          definitions:
            zh: 当前证据不足以允许或终局拒绝，必须补充证据后重新评估。
            en: Current evidence is insufficient for allow or final deny; new evidence and reevaluation are required.
            ja: 現在証拠では許可・最終拒否できず、新証拠と再評価が必要です。
          source_claims:
            - claim-policy-decision-design
            - claim-policy-decision-design
        - id: DecisionNotApplicable
          value: not_applicable
          labels:
            zh: 不适用
            en: Not applicable
            ja: 非適用
          definitions:
            zh: 没有策略或规则适用于该请求快照。
            en: No policy or rule applies to the request snapshot.
            ja: 要求スナップショットへ適用する方針・規則がありません。
          source_claims:
            - claim-policy-decision-design
        - id: DecisionIndeterminate
          value: indeterminate
          labels:
            zh: 不确定
            en: Indeterminate
            ja: 不確定
          definitions:
            zh: 缺失属性、处理错误或语义冲突使策略不能形成确定结果。
            en: Missing attributes, processing errors, or semantic conflict prevent a determinate policy result.
            ja: 属性欠落、処理誤り、意味競合により確定方針結果を形成できません。
          source_claims:
            - claim-policy-decision-design
      pattern: null
      example_value: allow
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: decided_at
      labels:
        zh: 决定时间
        en: decided at
        ja: 判断時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定形成的 UTC 时刻。
        en: UTC instant when the decision was formed.
        ja: 判断が成立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:03Z
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定所依据的确定策略版本。
        en: Exact policy version on which the decision is based.
        ja: 判断の根拠となる正確な方針版です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: determining_rule_refs
      labels:
        zh: 决定性规则引用
        en: determining rule references
        ja: 決定規則参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 实际决定最终结果的规则集合。
        en: Rules that actually determined the final outcome.
        ja: 最終結果を実際に決定した規則集合です。
      allowed_values: []
      pattern: null
      example_value:
        - allow-approved-read
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: combining_algorithm_ref
      labels:
        zh: 组合算法引用
        en: combining algorithm reference
        ja: 結合アルゴリズム参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 归并规则结果所用的算法版本。
        en: Algorithm version used to combine rule results.
        ja: 規則結果を結合したアルゴリズム版です。
      allowed_values: []
      pattern: null
      example_value: deny-overrides@1
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: reason
      labels:
        zh: 决定理由
        en: decision reason
        ja: 判断理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明决定性规则和证据如何支持结果。
        en: Explains how determining rules and evidence support the result.
        ja: 決定規則と証拠が結果をどう支えるか説明します。
      allowed_values: []
      pattern: null
      example_value: approved read-only scope matched
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
    - id: valid_until
      labels:
        zh: 可复用期限
        en: valid until
        ja: 再利用期限
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行组件可以复用该决定的最晚时刻。
        en: Latest instant when enforcement may reuse the decision.
        ja: 執行側が判断を再利用できる最終時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:25:00Z
      source_claims:
        - claim-policy-decision-design
        - claim-policy-decision-design
        - claim-policy-decision-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyDecision-xacml-permit
    labels:
      zh: XACML Permit 映射 allow
      en: XACML Permit maps to allow
      ja: XACML Permit→allow
    descriptions:
      zh: decision-42 decision_kind=allow，determining_rule_refs 含 allow-approved-read@7，对齐 XACML Permit。
      en: decision-42 decision_kind=allow with allow-approved-read@7 in determining_rule_refs, aligned with XACML Permit.
      ja: decision-42 allow、allow-approved-read@7 引用、XACML Permit 整合。
    example_source:
      product: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      version: Permit
    field_values:
      decision_id: decision-42
      decision_kind: allow
      request_ref: request-42
    related_node_ids:
      - PolicyDecision
      - AllowDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-decision-design
  - id: PolicyDecision-opa-deny
    labels:
      zh: OPA false 映射 deny
      en: OPA false maps to deny
      ja: OPA false→deny
    descriptions:
      zh: OPA 返回 result=false；decision-55 deny，determining deny-unlisted-shell@3。
      en: OPA returns result=false; decision-55 deny with determining deny-unlisted-shell@3.
      ja: OPA result=false→decision-55 deny、deny-unlisted-shell@3。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: deny query
    field_values:
      decision_id: decision-55
      decision_kind: deny
    related_node_ids:
      - PolicyDecision
      - DenyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-decision-design
  - id: PolicyDecision-mcp-defer
    labels:
      zh: MCP requireApproval 映射 defer
      en: MCP requireApproval maps to defer
      ja: MCP requireApproval→defer
    descriptions:
      zh: MCP tool requireApproval=true 且无 HumanApproval 时 decision-118 defer 直至人工证据到达。
      en: MCP tool requireApproval=true without HumanApproval yields decision-118 defer until human evidence arrives.
      ja: MCP requireApproval=true で HumanApproval なし→decision-118 defer。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: requireApproval
    field_values:
      decision_id: decision-118
      decision_kind: defer
    related_node_ids:
      - PolicyDecision
      - DeferDecision
      - HumanApproval
    related_relation_ids: []
    source_claims:
      - claim-policy-decision-design
  - id: PolicyDecision-boundary-stale
    labels:
      zh: 旧决定不能复用
      en: Stale decision cannot reuse
      ja: 旧 decision 再利用不可
    descriptions:
      zh: decision-42 绑定 request-42，不能授权 request-55 即使工具名相同。
      en: decision-42 binds request-42 and cannot authorize request-55 even if tool name matches.
      ja: decision-42 は request-42 绑定。tool 名一致でも request-55 認可不可。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: excessive agency
    field_values: {}
    related_node_ids:
      - PolicyDecision
      - AuthorizationRequest
    related_relation_ids: []
    source_claims:
      - claim-policy-decision-design
parent_relation:
  id: PolicyEvaluation-produces-PolicyDecision
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生策略决定
    en: produces policy decision
    ja: ポリシー判断を生成する
  definitions:
    zh: 一次完成的 PolicyEvaluation 产生一个 PolicyDecision，并把请求、策略版本、决定规则、组合算法和时间证据传递到该决定记录。
    en: One completed PolicyEvaluation produces one PolicyDecision and carries request, policy version, determining rules, combining algorithm, and timing evidence into the decision record.
    ja: 一回の完了 PolicyEvaluation が一つの PolicyDecision を生成し、要求、方針版、決定規則、結合アルゴリズム、時刻証拠を判断記録へ渡します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由评估产生
      en: is produced by
      ja: 評価に生成される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-decision-design
    - claim-policy-decision-design
    - claim-policy-decision-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: PolicyDecision-based_on-PolicyRule
    predicate: based_on
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 依据决定性规则
      en: is based on determining rule
      ja: 決定規則に基づく
    definitions:
      zh: PolicyDecision 引用实际决定最终结果的 PolicyRule，而不是把所有被考虑或不适用规则都标为决定依据。
      en: A PolicyDecision cites PolicyRules that actually determined the final outcome, not every considered or non-applicable rule as decision basis.
      ja: PolicyDecision は最終結果を実際に決めた PolicyRule を引用し、考慮済み・非適用規則すべてを根拠にしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: determines_decision
      labels:
        zh: 决定该结果
        en: determines decision
        ja: 判断を決める
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-policy-decision-design
      - claim-policy-decision-design
      - claim-policy-decision-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:PolicyRule
  - id: PolicyDecision-decides-AuthorizationRequest
    predicate: decides
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 裁定授权请求
      en: decides authorization request
      ja: 認可要求を判断する
    definitions:
      zh: PolicyDecision 通过 request_ref 精确回答一个 AuthorizationRequest；决定适用性不能凭相同动作名扩展到不同请求或修改后的参数。
      en: A PolicyDecision answers exactly one AuthorizationRequest through request_ref; applicability cannot extend by matching action name to a different request or modified arguments.
      ja: PolicyDecision は request_ref で一つの AuthorizationRequest を正確に回答し、同じ操作名だけで別要求や変更引数へ適用を拡張できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: decided_by
      labels:
        zh: 由决定裁定
        en: is decided by
        ja: 判断によって裁定される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-policy-decision-design
      - claim-policy-decision-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:AuthorizationRequest
  - id: PolicyDecision-derived_using-PolicyCombiningAlgorithm
    predicate: derived_using
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 通过组合算法导出
      en: is derived using combining algorithm
      ja: 結合アルゴリズムで導出される
    definitions:
      zh: PolicyDecision 明确记录把适用规则结果归并为最终 outcome 的 PolicyCombiningAlgorithm 版本。
      en: A PolicyDecision explicitly records the PolicyCombiningAlgorithm version that combined applicable rule results into its final outcome.
      ja: PolicyDecision は適用規則結果を最終 outcome へ結合した PolicyCombiningAlgorithm 版を明示記録します。
    cardinality: null
    cardinality_not_applicable_reason:
