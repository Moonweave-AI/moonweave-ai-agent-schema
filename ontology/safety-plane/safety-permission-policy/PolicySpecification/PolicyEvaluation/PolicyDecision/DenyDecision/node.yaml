schema: moonweave.ai/ontology-node/v1
id: DenyDecision
kind: concept
status: accepted
labels:
  zh: 拒绝决定
  en: deny decision
  ja: 拒否判断
semantics:
  short_definition:
    zh: 结果为 deny、明确禁止当前授权请求继续的策略决定。
    en: A PolicyDecision with outcome deny that explicitly prohibits the current authorization request from proceeding.
    ja: 結果が deny で現在の認可要求継続を明示禁止する方針判断です。
  definition:
    zh: 拒绝决定是 PolicyDecision 的结果子类，记录 outcome=deny、被拒请求、决定性规则、拒绝理由和可选补救提示。它阻止当前请求，但不表示运行失败，也不撤销其他独立 AuthorizationGrant；执行方按请求身份落实拒绝。
    en: A DenyDecision is the outcome subtype of PolicyDecision recording outcome=deny, the denied request, determining rules, denial rationale, and optional remediation advice. It blocks the current request but is not a runtime failure and does not revoke other independent AuthorizationGrants; enforcement applies denial by request identity.
    ja: DenyDecision は PolicyDecision の結果下位型で、outcome=deny、拒否要求、決定規則、拒否理由、任意改善助言を記録します。現在要求を阻止しますが実行失敗ではなく、別 AuthorizationGrant を取り消さず、執行側が要求同一性で拒否を適用します。
  why_needed:
    zh: 独立拒绝子类支持默认拒绝和可解释拒绝，同时防止把拒绝原因节点、运行错误或撤销事件混为拒绝决定。
    en: A distinct deny subtype supports default-deny and explainable denial without conflating denial reason, runtime error, or revocation event with the decision.
    ja: 独立 deny 下位型は既定拒否と説明可能拒否を支え、拒否理由・実行エラー・取消イベントを判断と混同しません。
  includes:
    - zh: 包含继承的 decision_id、固定 deny 结果、拒绝原因代码和可选补救提示。
      en: Includes inherited decision_id, fixed deny outcome, denial reason code, and optional remediation advice.
      ja: 継承 decision_id、固定 deny 結果、拒否理由コード、任意改善助言を含みます。
  excludes:
    - zh: 不包含运行 ErrorEvent、AuthorizationRevocation、PolicyEffect 或被拒动作的实际尝试。
      en: Excludes runtime ErrorEvent, AuthorizationRevocation, PolicyEffect, or an actual attempt of the denied action.
      ja: 実行 ErrorEvent、AuthorizationRevocation、PolicyEffect、拒否操作の実試行を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision record.
        ja: 上位 PolicyDecision と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-44
      source_claims:
        - claim-deny-decision-001
        - claim-deny-decision-002
    - id: denial_code
      labels:
        zh: 拒绝代码
        en: denial code
        ja: 拒否コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 机器可处理的主要拒绝原因。
        en: Machine-processable primary reason for denial.
        ja: 機械処理可能な主要拒否理由です。
      allowed_values: []
      pattern: null
      example_value: scope_mismatch
      source_claims:
        - claim-deny-decision-001
        - claim-deny-decision-002
    - id: remediation
      labels:
        zh: 补救提示
        en: remediation advice
        ja: 改善助言
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 不会自动授权、仅供重新请求参考的建议。
        en: Advice for a new request that does not itself authorize anything.
        ja: 自動認可せず再要求の参考だけとなる助言です。
      allowed_values: []
      pattern: null
      example_value: request read-only scope
      source_claims:
        - claim-deny-decision-001
        - claim-deny-decision-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: DenyDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 拒绝决定正例
      en: Positive deny decision case
      ja: 拒否判断の正例
    scenario_id: null
    descriptions:
      zh: policy-deny-001 因 request-protected-write-001 访问授权范围外资源而返回 deny 与 scope_mismatch，并建议改用只读范围重新申请。
      en: policy-deny-001 returns deny and scope_mismatch because request-protected-write-001 targets a resource outside authorized scope, and advises a new read-only request.
      ja: policy-deny-001 は request-protected-write-001 が authorized scope 外 resource を対象とするため deny と scope_mismatch を返し read-only request の再申請を助言します。
    field_values:
      decision_id: policy-deny-001
      request_ref: request-protected-write-001
      evaluation_ref: evaluation-protected-write-001
      decision_kind: deny
      decided_at: 2026-07-16T02:20:00Z
      policy_version_ref: tool-authorization@7
      determining_rule_refs:
        - deny-outside-authorized-scope
      combining_algorithm_ref: deny-overrides@1
      reason: protected resource is outside the actor's authorized scope
      valid_until: 2026-07-16T02:25:00Z
      denial_code: scope_mismatch
      remediation: request read-only scope
    related_node_ids:
      - DenyDecision
      - PolicyDecision
      - PolicyRule
    related_relation_ids:
      - DenyDecision-is_a-PolicyDecision
      - PolicyDecision-based_on-PolicyRule
    expected_result:
      zh: 当前请求被阻止，拒绝依据可审计，补救建议不会自动修改请求。
      en: The current request is blocked with auditable basis, and remediation advice does not mutate the request automatically.
      ja: 現在要求は監査可能な根拠で阻止され、改善助言は要求を自動変更しません。
    why_valid_or_invalid:
      zh: 拒绝与补救建议均绑定同一决定，不等于执行错误或撤销。
      en: Denial and advice are bound to one decision and are neither execution error nor revocation.
      ja: 拒否と助言は一判断へ束縛され、実行エラーや取消ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-deny-decision-001
      - claim-deny-decision-002
  - id: DenyDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 拒绝决定边界反例
      en: Boundary counterexample for deny decision
      ja: 拒否判断の境界反例
    scenario_id: null
    descriptions:
      zh: AuthorizationRevocation revocation-7 终止 grant-7 的未来有效性，但它不是针对新 request-44 产生的 DenyDecision。
      en: AuthorizationRevocation revocation-7 terminates grant-7's future validity but is not a DenyDecision produced for new request-44.
      ja: AuthorizationRevocation revocation-7 は grant-7 の将来有効性を終了しますが、新 request-44 の DenyDecision ではありません。
    field_values: {}
    related_node_ids:
      - DenyDecision
      - AuthorizationRevocation
      - AuthorizationGrant
    related_relation_ids:
      - AuthorizationRevocation-revokes-AuthorizationGrant
    expected_result:
      zh: 撤销保持事件身份；若新请求被拒，必须有独立 PolicyEvaluation 和 DenyDecision。
      en: Revocation remains an event; denial of a new request requires a separate PolicyEvaluation and DenyDecision.
      ja: 取消はイベント同一性を保ち、新要求の拒否には別 PolicyEvaluation と DenyDecision が必要です。
    why_valid_or_invalid:
      zh: 终止既有授权与判断新请求是两种不同业务事实。
      en: Terminating existing authority and deciding a new request are different business facts.
      ja: 既存権限終了と新要求判断は異なる業務事実です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-deny-decision-001
      - claim-deny-decision-002
  - id: DenyDecision-example-instance-manual-20260716
    kind: instance
    labels:
      zh: 范围不匹配拒绝实例
      en: Scope-mismatch denial instance
      ja: scope 不一致拒否 instance
    scenario_id: DenyDecision:instance:policy-deny-001
    descriptions:
      zh: policy-deny-001 固定 request-protected-write-001 的 deny 结果、scope_mismatch 代码、决定性规则、组合算法、拒绝理由和补救建议。
      en: policy-deny-001 fixes the deny outcome for request-protected-write-001 together with scope_mismatch, the determining rule, combining algorithm, denial rationale, and remediation advice.
      ja: policy-deny-001 は request-protected-write-001 の deny outcome と scope_mismatch・determining rule・combining algorithm・denial rationale・remediation advice を固定します。
    field_values:
      decision_id: policy-deny-001
      request_ref: request-protected-write-001
      evaluation_ref: evaluation-protected-write-001
      decision_kind: deny
      decided_at: 2026-07-16T02:20:00Z
      policy_version_ref: tool-authorization@7
      determining_rule_refs:
        - deny-outside-authorized-scope
      combining_algorithm_ref: deny-overrides@1
      reason: protected resource is outside the actor's authorized scope
      valid_until: 2026-07-16T02:25:00Z
      denial_code: scope_mismatch
      remediation: request read-only scope
    related_node_ids:
      - DenyDecision
      - PolicyDecision
      - AuthorizationRequest
      - PolicyRule
    related_relation_ids:
      - DenyDecision-is_a-PolicyDecision
      - PolicyDecision-decides-AuthorizationRequest
      - PolicyDecision-based_on-PolicyRule
    expected_result:
      zh: 执行组件按 request_ref 阻止当前请求，并把 remediation 仅作为重新申请建议，不把它解释为自动授权。
      en: Enforcement blocks the current request by request_ref and treats remediation only as advice for a new request, never as automatic authorization.
      ja: enforcement は request_ref により現在 request を阻止し remediation を新 request の助言としてのみ扱い automatic authorization と解釈しません。
    why_valid_or_invalid:
      zh: 全部字段描述同一次策略求值，拒绝结果、依据和有效期一致，且没有把拒绝混同为运行故障或既有授权撤销。
      en: All fields describe one policy evaluation with consistent denial, basis, and validity, without confusing denial with runtime failure or revocation.
      ja: 全 field が同一 policy evaluation の denial・basis・validity を一貫して示し runtime failure や revocation と混同しません。
    synthetic: false
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-deny-decision-001
      - claim-deny-decision-002
