    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有拒绝子类
      en: has deny subtype
      ja: 拒否下位型を持つ
