schema: moonweave.ai/ontology-node/v1
id: DenyDecision
kind: concept
labels:
  zh: 拒绝决定
  en: deny decision
  ja: 拒否判断
semantics:
  short_definition:
    zh: PolicyEvaluation 对特定请求作出的拒绝授权决定子类。
    en: The deny authorization decision subtype PolicyEvaluation produces for a specific request.
    ja: PolicyEvaluation が特定 request に対して出す拒否認可判断 subtype。
  definition:
    zh: DenyDecision 以 decision_kind=deny 为种差，记录 determining deny 规则与义务/建议（如有）。OPA `{result:false}`、XACML Deny、Cursor denylist 命中与 MCP scope 不足都映射为 DenyDecision；它不创建 AuthorizationGrant，ToolApprovalGate 应 block。
    en: DenyDecision has decision_kind=deny, recording determining deny rules and obligations/advice if any. OPA `{result:false}`, XACML Deny, Cursor denylist hits, and insufficient MCP scope map to DenyDecision; it creates no AuthorizationGrant and ToolApprovalGate should block.
    ja: DenyDecision は decision_kind=deny が種差。determining deny rule と obligation/advice を記録。OPA false、XACML Deny、Cursor denylist、MCP scope 不足を写像。AuthorizationGrant なし、ToolApprovalGate block。
  why_needed:
    zh: 显式 deny 使 OWASP 过度 agency 场景可审计；隐式失败不能代替 DenyDecision。
    en: Explicit deny enables auditable OWASP excessive-agency scenarios; implicit failure cannot substitute DenyDecision.
    ja: explicit deny で OWASP excessive agency を監査可能。implicit failure は DenyDecision 代替不可。
  includes:
    - zh: 包含继承的 decision_id、固定 deny 结果、拒绝原因代码和可选补救提示。
      en: Includes inherited decision_id, fixed deny outcome, denial reason code, and optional remediation advice.
      ja: 継承 decision_id、固定 deny 結果、拒否理由コード、任意改善助言を含みます。
  excludes:
    - zh: 不包含运行 ErrorEvent、AuthorizationRevocation、PolicyEffect 或被拒动作的实际尝试。
      en: Excludes runtime ErrorEvent, AuthorizationRevocation, PolicyEffect, or an actual attempt of the denied action.
      ja: 実行 ErrorEvent、AuthorizationRevocation、PolicyEffect、拒否操作の実試行を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: deny-overrides 组合下任一 deny 规则命中即 DenyDecision；Cursor curl/rm -rf denylist 与 OPA deny[msg] 统一映射；记录 determining_rule_refs 供用户解释。
    en: Under deny-overrides, any matching deny rule yields DenyDecision; Cursor curl/rm -rf denylist and OPA deny[msg] map uniformly; record determining_rule_refs for user explanation.
    ja: deny-overrides 下 deny rule 命中で DenyDecision。Cursor curl/rm denylist と OPA deny[msg] を統一写像。determining_rule_refs で説明可能に。
  typical_input:
    - description: Cursor denylist block.
      format: "command: curl * => deny-unlisted-shell@3"
      source_claims:
        - claim-deny-decision-design
  typical_output:
    - description: Deny decision record.
      format: '{"decision_id":"decision-55","decision_kind":"deny","determining_rule_refs":["deny-unlisted-shell@3"]}'
      source_claims:
        - claim-deny-decision-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与上位 PolicyDecision 相同的稳定标识。
        en: Stable identity shared with the parent PolicyDecision record.
        ja: 上位 PolicyDecision と共有する安定識別子です。
      allowed_values: []
      pattern: null
      example_value: decision-44
      source_claims:
        - claim-deny-decision-design
        - claim-deny-decision-design
    - id: denial_code
      labels:
        zh: 拒绝代码
        en: denial code
        ja: 拒否コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 机器可处理的主要拒绝原因。
        en: Machine-processable primary reason for denial.
        ja: 機械処理可能な主要拒否理由です。
      allowed_values: []
      pattern: null
      example_value: scope_mismatch
      source_claims:
        - claim-deny-decision-design
        - claim-deny-decision-design
    - id: remediation
      labels:
        zh: 补救提示
        en: remediation advice
        ja: 改善助言
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 不会自动授权、仅供重新请求参考的建议。
        en: Advice for a new request that does not itself authorize anything.
        ja: 自動認可せず再要求の参考だけとなる助言です。
      allowed_values: []
      pattern: null
      example_value: request read-only scope
      source_claims:
        - claim-deny-decision-design
        - claim-deny-decision-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: DenyDecision-cursor-curl
    labels:
      zh: Cursor 拒绝 curl
      en: Cursor denies curl
      ja: Cursor curl 拒否
    descriptions:
      zh: decision-55 deny：curl https://metadata.internal 不在 allowlist，ToolApprovalGate block。
      en: "decision-55 deny: curl https://metadata.internal not allowlisted; ToolApprovalGate blocks."
      ja: decision-55 deny：curl が allowlist 外、ToolApprovalGate block。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: denylist
    field_values:
      decision_id: decision-55
      decision_kind: deny
    related_node_ids:
      - DenyDecision
      - ToolApprovalGate
    related_relation_ids: []
    source_claims:
      - claim-deny-decision-design
  - id: DenyDecision-opa-deny
    labels:
      zh: OPA deny 规则
      en: OPA deny rule
      ja: OPA deny rule
    descriptions:
      zh: OPA deny[msg] 命中；decision-88 deny，determining deny-admin-api@2。
      en: OPA deny[msg] matches; decision-88 deny with deny-admin-api@2.
      ja: OPA deny[msg] 命中→decision-88 deny、deny-admin-api@2。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: deny rule
    field_values:
      decision_id: decision-88
      decision_kind: deny
    related_node_ids:
      - DenyDecision
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-deny-decision-design
  - id: DenyDecision-mcp-scope
    labels:
      zh: MCP scope 不足拒绝
      en: MCP insufficient scope deny
      ja: MCP scope 不足 deny
    descriptions:
      zh: token scope 仅 tools:read 但请求 tools:call；decision-mcp-17 deny。
      en: Token scope only tools:read but request tools:call; decision-mcp-17 deny.
      ja: scope tools:read のみで tools:call 要求→decision-mcp-17 deny。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: scope mismatch
    field_values:
      decision_id: decision-mcp-17
      decision_kind: deny
    related_node_ids:
      - DenyDecision
      - AuthorizationRequest
    related_relation_ids: []
    source_claims:
      - claim-deny-decision-design
  - id: DenyDecision-boundary-implicit
    labels:
      zh: 隐式失败不是 deny
      en: Implicit failure is not deny
      ja: implicit failure は deny ではない
    descriptions:
      zh: 网络超时未返回 OPA 结果时不应自动创建 DenyDecision。
      en: Network timeout without OPA result must not auto-create DenyDecision.
      ja: OPA 結果なし network timeout で DenyDecision 自動作成不可。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: fail closed versus deny
    field_values: {}
    related_node_ids:
      - DenyDecision
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-deny-decision-design
parent_relation:
  id: DenyDecision-is_a-PolicyDecision
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种策略决定
    en: is a policy decision
    ja: ポリシー判断の一種
  definitions:
    zh: 每个 DenyDecision 都是 outcome=deny 的 PolicyDecision，并继承请求、评估、决定依据和可审计理由要求。
    en: Every DenyDecision is a PolicyDecision with outcome=deny and inherits request, evaluation, determining-basis, and auditable-rationale requirements.
    ja: 各 DenyDecision は outcome=deny の PolicyDecision で、要求・評価・決定根拠・監査可能理由要件を継承します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有拒绝子类
      en: has deny subtype
      ja: 拒否下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-deny-decision-design
    - claim-deny-decision-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
