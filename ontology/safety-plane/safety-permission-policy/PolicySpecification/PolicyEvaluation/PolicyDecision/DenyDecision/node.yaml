sibling_differentiation:
  - sibling_concept_id: DeferDecision
    shared_parent_concept_id: PolicyDecision
    differentia:
      zh: DenyDecision 给出当前请求的终局拒绝；DeferDecision 因缺失证据暂不授权并声明重评条件。拒绝无需等待同一请求补证，暂缓必须等待。
      en: DenyDecision gives a final denial for the current request; DeferDecision withholds authorization for missing evidence and states reevaluation conditions. Denial does not wait for evidence on the same decision, whereas deferment does.
      ja: DenyDecision は現在要求を最終拒否し、DeferDecision は証拠不足で認可せず再評価条件を示します。拒否は同一判断の補証を待たず、保留は待機します。
    source_claims:
      - claim-deny-decision-002
      - claim-deny-decision-003
