schema: moonweave.ai/ontology-node/v1
id: AuthorizationRequest
kind: concept
status: accepted
labels:
  zh: 授权请求
  en: authorization request
  ja: 認可要求
semantics:
  short_definition:
    zh: 把一个主体、动作、资源和当时上下文绑定为一次授权判断输入的不可变记录。
    en: An immutable record binding one principal, action, resource, and contemporaneous context as input to an authorization decision.
    ja: 一つの主体・操作・資源・当時文脈を一回の認可判断入力へ束縛する不変記録です。
  definition:
    zh: 授权请求是一次授权问题的信息记录，以 request_id 唯一标识，并固定主体引用、请求动作、目标资源、目的、请求时间、上下文摘要及请求的 PermissionScope。后续评估、提示或决定都引用它；请求描述想做什么，但不证明主体已经获准。
    en: An AuthorizationRequest is the information record for one authorization question, uniquely identified by request_id and fixing the principal reference, requested action, target resource, purpose, request time, context digest, and requested PermissionScope. Later evaluation, prompt, or decision references it; the request states what is sought but does not prove authority.
    ja: AuthorizationRequest は一つの認可問題を表す情報記録で、request_id により一意に識別され、主体参照、要求操作、対象資源、目的、要求時刻、文脈ダイジェスト、要求 PermissionScope を固定します。後続評価・提示・判断が参照しますが、要求は希望を表すだけで権限を証明しません。
  why_needed:
    zh: 不可变请求把“判断了什么”与策略版本和最终决定关联起来，避免在批准后改写参数造成范围漂移。
    en: An immutable request links exactly what was decided to the policy version and outcome, preventing argument or scope drift after approval.
    ja: 不変要求は判断対象を方針版と結果へ結び、承認後の引数・範囲ドリフトを防ぎます。
  includes:
    - zh: 包含请求标识、主体、动作、资源、上下文摘要、目的、时间和所请求范围。
      en: Includes request identity, principal, action, resource, context digest, purpose, time, and requested scope.
      ja: 要求識別子、主体、操作、資源、文脈ダイジェスト、目的、時刻、要求範囲を含みます。
  excludes:
    - zh: 不包含策略求值过程、允许或拒绝结果、人工响应、授权授予或实际工具调用。
      en: Excludes policy evaluation, allow or deny outcome, human response, authorization grant, or actual tool call.
      ja: 方針評価、許可・拒否結果、人間応答、認可付与、実際のツール呼出を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - request_id
  fields:
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: 要求ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次不可变授权问题。
        en: Stable identifier for one immutable authorization question.
        ja: 一つの不変認可問題を安定識別します。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: subject_ref
      labels:
        zh: 主体引用
        en: principal reference
        ja: 主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提出动作的已认证人类或机器主体。
        en: Authenticated human or machine principal seeking the action.
        ja: 操作を求める認証済み人間または機械主体です。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: action
      labels:
        zh: 请求动作
        en: requested action
        ja: 要求操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 待授权的规范化动作标识。
        en: Normalized action identifier to authorize.
        ja: 認可対象の正規化操作識別子です。
      allowed_values: []
      pattern: null
      example_value: invoke_tool
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: resource_ref
      labels:
        zh: 资源引用
        en: resource reference
        ja: 資源参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 动作将作用的受保护资源。
        en: Protected resource on which the action would operate.
        ja: 操作対象となる保護資源です。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: context_digest
      labels:
        zh: 上下文摘要
        en: context digest
        ja: 文脈ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定策略求值相关上下文的不可变摘要。
        en: Immutable digest fixing context relevant to policy evaluation.
        ja: 方針評価に関係する文脈を固定する不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:42ab
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: purpose
      labels:
        zh: 请求目的
        en: request purpose
        ja: 要求目的
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释为何需要该动作的业务目的。
        en: Business purpose explaining why the action is requested.
        ja: 操作を必要とする業務目的です。
      allowed_values: []
      pattern: null
      example_value: answer user question
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: requested_at
      labels:
        zh: 请求时间
        en: requested at
        ja: 要求時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权问题形成的 UTC 时刻。
        en: UTC instant when the authorization question was formed.
        ja: 認可問題が形成された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
    - id: requested_scope_ref
      labels:
        zh: 请求范围引用
        en: requested scope reference
        ja: 要求範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 请求希望获得的 PermissionScope。
        en: PermissionScope sought by the request.
        ja: 要求が求める PermissionScope です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-authorization-request-001
        - claim-authorization-request-002
        - claim-authorization-request-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: authorization-request-cedar
    labels:
      zh: 授权请求 - Cedar 授权评估
      en: authorization request - Cedar authorization evaluation
      ja: 認可要求 - Cedar 認可評価
    descriptions: {zh: "授权请求(AuthorizationRequest) [AuthorizationRequest]: 把一个主体、动作、资源和当时上下文绑定为一次授权判断输入的不可变记录。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: resource_ref, action, purpose.", en: "authorization request (AuthorizationRequest) [AuthorizationRequest]: An immutable record binding one principal, action, resource, and contemporaneous context as input to an authorization decision.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include resource_ref, action, purpose.", ja: "認可要求(AuthorizationRequest) [AuthorizationRequest]: 一つの主体・操作・資源・当時文脈を一回の認可判断入力へ束縛する不変記録です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: resource_ref, action, purpose."}
    field_values:
      action: invoke_tool
      context_digest: "sha256:42ab"
      purpose: "answer user question"
      request_id: request-42
      requested_at: "2026-07-16T01:20:00Z"
      requested_scope_ref: scope-search-read
      resource_ref: "tool:search_documents"
      subject_ref: "agent:planner-1"
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRequest
      - PermissionScope
      - PolicyEvaluation
    related_relation_ids:
      - AuthorizationGrant
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-authorization-request-001
      - claim-authorization-request-002
      - claim-authorization-request-003
      - PermissionScope
      - PolicyEvaluation
      - PolicyEvaluation-consumes-AuthorizationRequest
    example_source: Amazon Cedar
    source_claims:
      - claim-authorization-request-001
  - id: authorization-request-opa
    labels:
      zh: 授权请求 - OPA Rego 策略评估
      en: authorization request - OPA Rego policy evaluation
      ja: 認可要求 - OPA Rego ポリシー評価
    descriptions: {zh: "授权请求(AuthorizationRequest) [AuthorizationRequest]: 把一个主体、动作、资源和当时上下文绑定为一次授权判断输入的不可变记录。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: resource_ref, action, purpose.", en: "authorization request (AuthorizationRequest) [AuthorizationRequest]: An immutable record binding one principal, action, resource, and contemporaneous context as input to an authorization decision.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include resource_ref, action, purpose.", ja: "認可要求(AuthorizationRequest) [AuthorizationRequest]: 一つの主体・操作・資源・当時文脈を一回の認可判断入力へ束縛する不変記録です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: resource_ref, action, purpose."}
    field_values:
      action: invoke_tool
      context_digest: "sha256:42ab"
      purpose: "answer user question"
      request_id: request-42
      requested_at: "2026-07-16T01:20:00Z"
      requested_scope_ref: scope-search-read
      resource_ref: "tool:search_documents"
      subject_ref: "agent:planner-1"
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRequest
      - PermissionScope
      - PolicyEvaluation
    related_relation_ids:
      - AuthorizationGrant
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-authorization-request-001
      - claim-authorization-request-002
      - claim-authorization-request-003
      - PermissionScope
      - PolicyEvaluation
      - PolicyEvaluation-consumes-AuthorizationRequest
    example_source: Open Policy Agent
    source_claims:
      - claim-authorization-request-001
  - id: authorization-request-trustllm
    labels:
      zh: 授权请求 - TrustLLM 六维可信度
      en: authorization request - TrustLLM six-dimension trust
      ja: 認可要求 - TrustLLM 6次元信頼性
    descriptions: {zh: "授权请求(AuthorizationRequest) [AuthorizationRequest]: 把一个主体、动作、资源和当时上下文绑定为一次授权判断输入的不可变记录。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: resource_ref, action, purpose.", en: "authorization request (AuthorizationRequest) [AuthorizationRequest]: An immutable record binding one principal, action, resource, and contemporaneous context as input to an authorization decision.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include resource_ref, action, purpose.", ja: "認可要求(AuthorizationRequest) [AuthorizationRequest]: 一つの主体・操作・資源・当時文脈を一回の認可判断入力へ束縛する不変記録です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: resource_ref, action, purpose."}
    field_values:
      action: invoke_tool
      context_digest: "sha256:42ab"
      purpose: "answer user question"
      request_id: request-42
      requested_at: "2026-07-16T01:20:00Z"
      requested_scope_ref: scope-search-read
      resource_ref: "tool:search_documents"
      subject_ref: "agent:planner-1"
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRequest
      - PermissionScope
      - PolicyEvaluation
    related_relation_ids:
      - AuthorizationGrant
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-authorization-request-001
      - claim-authorization-request-002
      - claim-authorization-request-003
      - PermissionScope
      - PolicyEvaluation
      - PolicyEvaluation-consumes-AuthorizationRequest
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-authorization-request-001
  - id: authorization-request-envoy_ext_auth
    labels:
      zh: 授权请求 - Envoy ext_authz PEP
      en: authorization request - Envoy ext_authz PEP
      ja: 認可要求 - Envoy ext_authz PEP
    descriptions: {zh: "授权请求(AuthorizationRequest) [AuthorizationRequest]: 把一个主体、动作、资源和当时上下文绑定为一次授权判断输入的不可变记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: resource_ref, action, purpose.", en: "authorization request (AuthorizationRequest) [AuthorizationRequest]: An immutable record binding one principal, action, resource, and contemporaneous context as input to an authorization decision.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include resource_ref, action, purpose.", ja: "認可要求(AuthorizationRequest) [AuthorizationRequest]: 一つの主体・操作・資源・当時文脈を一回の認可判断入力へ束縛する不変記録です。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: resource_ref, action, purpose."}
    field_values:
      action: invoke_tool
      context_digest: "sha256:42ab"
      purpose: "answer user question"
      request_id: request-42
      requested_at: "2026-07-16T01:20:00Z"
      requested_scope_ref: scope-search-read
      resource_ref: "tool:search_documents"
      subject_ref: "agent:planner-1"
    related_node_ids:
      - AuthorizationGrant
      - AuthorizationRequest
      - PermissionScope
      - PolicyEvaluation
    related_relation_ids:
      - AuthorizationGrant
      - AuthorizationGrant-scoped_by-PermissionScope
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-authorization-request-001
      - claim-authorization-request-002
      - claim-authorization-request-003
      - PermissionScope
      - PolicyEvaluation
      - PolicyEvaluation-consumes-AuthorizationRequest
    example_source: Envoy ext_authz
    source_claims:
      - claim-authorization-request-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PolicyEvaluation-consumes-AuthorizationRequest
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 消费授权请求
    en: consumes authorization request
    ja: 認可要求を消費する
  definitions:
    zh: PolicyEvaluation 以一个不可变 AuthorizationRequest 作为本次求值输入，读取其主体、动作、资源、范围和上下文摘要，不修改该请求。
    en: A PolicyEvaluation takes one immutable AuthorizationRequest as evaluation input, reading its principal, action, resource, scope, and context digest without modifying the request.
    ja: PolicyEvaluation は一つの不変 AuthorizationRequest を評価入力として主体・操作・資源・範囲・文脈ダイジェストを読み、要求を変更しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被评估消费
      en: is consumed by
      ja: 評価に消費される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyEvaluation-consumes-AuthorizationRequest-example-positive-manual-001
      labels:
        zh: 消费授权请求正例
        en: Positive consumes authorization request case
        ja: 認可要求を消費するの正例
      descriptions:
        zh: evaluation-42 读取 request-42 的固定输入摘要 sha256:42ab，并把该引用写入评估记录。
        en: evaluation-42 reads request-42's fixed input digest sha256:42ab and records that reference in the evaluation.
        ja: evaluation-42 は request-42 の固定入力ダイジェスト sha256:42ab を読み評価記録へ参照を書きます。
      field_values: {}
      related_node_ids:
        - PolicyEvaluation
        - AuthorizationRequest
      related_relation_ids:
        - PolicyEvaluation-consumes-AuthorizationRequest

        en: The decision chain proves which request snapshot the evaluation used.
        ja: 判断連鎖は評価が使った要求スナップショットを証明できます。

        en: consumes expresses input responsibility and replaces a precedes edge that stated only order.
        ja: consumes は入力責務を表し順序だけの precedes を置換します。
      source_claims:
        - claim-authorization-request-003
        - claim-authorization-request-001
    - id: PolicyEvaluation-consumes-AuthorizationRequest-example-boundary-manual-001
      labels:
        zh: 消费授权请求边界反例
        en: Boundary counterexample for consumes authorization request
        ja: 認可要求を消費するの境界反例
      descriptions:
        zh: request-42 在 evaluation-42 前创建这一时间事实不足以证明 evaluation-42 实际读取了它。
        en: Creation of request-42 before evaluation-42 does not by itself prove that the evaluation consumed it.
        ja: request-42 が evaluation-42 より前に作られた時間事実だけでは評価が消費した証明になりません。
      field_values: {}
      related_node_ids:
        - PolicyEvaluation
        - AuthorizationRequest
      related_relation_ids:
        - PolicyEvaluation-consumes-AuthorizationRequest

        en: No consumes assertion is made without an explicit request reference.
        ja: 明示要求参照がなければ consumes を作りません。

        en: Temporal precedence alone cannot prove that evaluation actually consumed the input.
        ja: 時間先行だけでは評価が実際に入力を消費したと証明できません。
      source_claims:
        - claim-authorization-request-003
        - claim-authorization-request-001
  source_claims:
    - claim-authorization-request-003
    - claim-authorization-request-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: AuthorizationRequest-requests-PermissionScope
    predicate: requests
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 请求权限范围
      en: requests permission scope
      ja: 権限範囲を要求する
    definitions:
      zh: AuthorizationRequest 明确请求一个 PermissionScope，后续批准或授予只能保持或收窄该主体、动作、资源、上下文和期限边界。
      en: An AuthorizationRequest explicitly requests a PermissionScope, and later approval or grant may preserve or narrow—but never widen—its principal, action, resource, context, and time boundaries.
      ja: AuthorizationRequest は PermissionScope を明示要求し、後続承認・付与は主体・操作・資源・文脈・期間境界を維持または縮小できても拡大できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: requested_by
      labels:
        zh: 被请求所求
        en: is requested by
        ja: 要求によって求められる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: AuthorizationRequest-requests-PermissionScope-example-positive-manual-001
        labels:
          zh: 请求权限范围正例
          en: Positive requests permission scope case
          ja: 権限範囲を要求するの正例
        descriptions:
          zh: request-42 请求 scope-search-read，只含一个搜索工具的只读访问和五分钟期限。
          en: request-42 requests scope-search-read, limited to read access on one search tool for five minutes.
          ja: request-42 は scope-search-read を要求し、一検索ツールの読取アクセスと五分期限に限定します。
        field_values: {}
        related_node_ids:
          - AuthorizationRequest
          - PermissionScope
        related_relation_ids:
          - AuthorizationRequest-requests-PermissionScope

          en: Evaluation and grant can compare requested scope dimension by dimension.
          ja: 評価と付与は要求範囲を各次元で比較できます。

          en: Requested scope is modeled explicitly rather than hidden inside request prose.
          ja: 要求範囲は要求文中へ隠さず明示モデル化されます。
        source_claims:
          - claim-authorization-request-002
          - claim-authorization-request-001
      - id: AuthorizationRequest-requests-PermissionScope-example-boundary-manual-001
        labels:
          zh: 请求权限范围边界反例
          en: Boundary counterexample for requests permission scope
          ja: 権限範囲を要求するの境界反例
