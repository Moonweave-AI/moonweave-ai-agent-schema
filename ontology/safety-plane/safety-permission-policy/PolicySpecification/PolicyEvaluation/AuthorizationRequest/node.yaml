schema: moonweave.ai/ontology-node/v1
id: AuthorizationRequest
kind: concept
labels:
  zh: 授权请求
  en: authorization request
  ja: 認可要求
semantics:
  short_definition:
    zh: 主体对资源执行动作的一次不可变授权问题快照。
    en: One immutable authorization question snapshot of a principal requesting action on a resource.
    ja: 主体が資源に対して操作を求める一回の immutable 認可問題スナップショット。
  definition:
    zh: AuthorizationRequest 以 request_id 标识不可变快照，包含 principal_ref、action、resource_ref、argument_digest、context 与 requested_scope_ref。MCP OAuth authorize 请求（client_id、scope、resource indicator）、Cursor 拦截的 shell 命令、Claude Bash/MCP 工具调用计划与 OPA input JSON 都应映射为 AuthorizationRequest；参数或上下文变化必须产生新 request_id。
    en: AuthorizationRequest is an immutable snapshot identified by request_id with principal_ref, action, resource_ref, argument_digest, context, and requested_scope_ref. MCP OAuth authorize requests (client_id, scope, resource indicator), Cursor intercepted shell commands, Claude Bash/MCP tool call plans, and OPA input JSON map here; any argument or context change must yield a new request_id.
    ja: AuthorizationRequest は request_id で immutable snapshot を識別し principal_ref/action/resource_ref/argument_digest/context/requested_scope_ref を含む。MCP OAuth authorize、Cursor shell command、Claude Bash/MCP plan、OPA input JSON を写像。引数/context 変更は新 request_id 必須。
  why_needed:
    zh: 授权对象身份必须稳定；把“相似 curl”当作同一 request 会导致 stale decision 复用。
    en: Authorization object identity must be stable; treating similar curl commands as one request enables stale decision reuse.
    ja: 認可対象 identity は安定必須。類似 curl を同一 request とすると stale decision 再利用が起きます。
  includes:
    - zh: 包含请求标识、主体、动作、资源、上下文摘要、目的、时间和所请求范围。
      en: Includes request identity, principal, action, resource, context digest, purpose, time, and requested scope.
      ja: 要求識別子、主体、操作、資源、文脈ダイジェスト、目的、時刻、要求範囲を含みます。
  excludes:
    - zh: 不包含策略求值过程、允许或拒绝结果、人工响应、授权授予或实际工具调用。
      en: Excludes policy evaluation, allow or deny outcome, human response, authorization grant, or actual tool call.
      ja: 方針評価、許可・拒否結果、人間応答、認可付与、実際のツール呼出を含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 生成 request_id 时 hash principal+action+resource+argument_digest+context；MCP authorize URL 参数与 OPA input 字段一一映射；ToolApprovalGate 验证 attempt 与 request 摘要完全一致。
    en: When generating request_id, hash principal+action+resource+argument_digest+context; map MCP authorize URL parameters and OPA input fields one-to-one; ToolApprovalGate verifies attempt matches request digest exactly.
    ja: request_id 生成時 principal+action+resource+argument_digest+context を hash。MCP authorize URL パラメータと OPA input を 1:1 写像。ToolApprovalGate は attempt と request digest 完全一致を検証。
  typical_input:
    - description: MCP OAuth authorize request.
      format: client_id, scope, resource, redirect_uri, code_challenge
      source_claims:
        - claim-authorization-request-design
    - description: OPA decision input.
      format: '{"input":{"subject","object","action","environment"}}'
      source_claims:
        - claim-authorization-request-design
  typical_output:
    - description: Immutable request record.
      format: '{"request_id":"request-42","principal_ref":"agent:planner-1","action":"invoke_tool","resource_ref":"tool:search_documents"}'
      source_claims:
        - claim-authorization-request-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - request_id
  fields:
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: 要求ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次不可变授权问题。
        en: Stable identifier for one immutable authorization question.
        ja: 一つの不変認可問題を安定識別します。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: subject_ref
      labels:
        zh: 主体引用
        en: principal reference
        ja: 主体参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提出动作的已认证人类或机器主体。
        en: Authenticated human or machine principal seeking the action.
        ja: 操作を求める認証済み人間または機械主体です。
      allowed_values: []
      pattern: null
      example_value: agent:planner-1
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: action
      labels:
        zh: 请求动作
        en: requested action
        ja: 要求操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 待授权的规范化动作标识。
        en: Normalized action identifier to authorize.
        ja: 認可対象の正規化操作識別子です。
      allowed_values: []
      pattern: null
      example_value: invoke_tool
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: resource_ref
      labels:
        zh: 资源引用
        en: resource reference
        ja: 資源参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 动作将作用的受保护资源。
        en: Protected resource on which the action would operate.
        ja: 操作対象となる保護資源です。
      allowed_values: []
      pattern: null
      example_value: tool:search_documents
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: context_digest
      labels:
        zh: 上下文摘要
        en: context digest
        ja: 文脈ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定策略求值相关上下文的不可变摘要。
        en: Immutable digest fixing context relevant to policy evaluation.
        ja: 方針評価に関係する文脈を固定する不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:42ab
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: purpose
      labels:
        zh: 请求目的
        en: request purpose
        ja: 要求目的
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释为何需要该动作的业务目的。
        en: Business purpose explaining why the action is requested.
        ja: 操作を必要とする業務目的です。
      allowed_values: []
      pattern: null
      example_value: answer user question
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: requested_at
      labels:
        zh: 请求时间
        en: requested at
        ja: 要求時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 授权问题形成的 UTC 时刻。
        en: UTC instant when the authorization question was formed.
        ja: 認可問題が形成された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00Z
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
    - id: requested_scope_ref
      labels:
        zh: 请求范围引用
        en: requested scope reference
        ja: 要求範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 请求希望获得的 PermissionScope。
        en: PermissionScope sought by the request.
        ja: 要求が求める PermissionScope です。
      allowed_values: []
      pattern: null
      example_value: scope-search-read
      source_claims:
        - claim-authorization-request-design
        - claim-authorization-request-design
        - claim-authorization-request-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: AuthorizationRequest-mcp-oauth
    labels:
      zh: MCP OAuth 授权请求
      en: MCP OAuth authorization request
      ja: MCP OAuth authorization request
    descriptions:
      zh: request-mcp-42 绑定 client_id=mcp-client-1、scope=tools:read tools:call、resource=https://mcp.example.com。
      en: request-mcp-42 binds client_id=mcp-client-1, scope=tools:read tools:call, resource=https://mcp.example.com.
      ja: request-mcp-42 が client_id/scope/resource を束縛。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: authorize endpoint
    field_values:
      request_id: request-mcp-42
      principal_ref: client:mcp-client-1
      action: oauth_authorize
      resource_ref: https://mcp.example.com
    related_node_ids:
      - AuthorizationRequest
      - PermissionScope
    related_relation_ids: []
    source_claims:
      - claim-authorization-request-design
  - id: AuthorizationRequest-cursor-curl
    labels:
      zh: Cursor curl 命令请求
      en: Cursor curl command request
      ja: Cursor curl command request
    descriptions:
      zh: request-55 快照 agent 请求 Bash curl https://metadata.internal/latest 与 argument_digest。
      en: request-55 snapshots agent Bash curl https://metadata.internal/latest with argument_digest.
      ja: request-55 が Bash curl コマンドと argument_digest を snapshot。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: shell command
    field_values:
      request_id: request-55
      action: Bash
      argument_digest: sha256:curl-metadata-internal
    related_node_ids:
      - AuthorizationRequest
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-authorization-request-design
  - id: AuthorizationRequest-claude-bash
    labels:
      zh: Claude Bash 工具请求
      en: Claude Bash tool request
      ja: Claude Bash tool request
    descriptions:
      zh: request-61 记录 Claude Code 计划执行 echo secret > /etc/passwd 的参数摘要。
      en: request-61 records Claude Code planned echo secret > /etc/passwd argument digest.
      ja: request-61 が Claude Code の /etc/passwd 書込 plan digest を記録。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: Bash tool
    field_values:
      request_id: request-61
      action: Bash
      resource_ref: path:/etc/passwd
    related_node_ids:
      - AuthorizationRequest
      - PermissionPrompt
    related_relation_ids: []
    source_claims:
      - claim-authorization-request-design
  - id: AuthorizationRequest-boundary-similar
    labels:
      zh: 相似命令是新请求
      en: Similar command is new request
      ja: 類似 command は新 request
    descriptions:
      zh: request-55 与 request-56 命令相似但 argument_digest 不同，必须独立 PolicyEvaluation。
      en: request-55 and request-56 have similar commands but different argument_digest; each needs independent PolicyEvaluation.
      ja: request-55/56 は類似 command だが argument_digest 異なり独立 PolicyEvaluation 必須。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: request identity
    field_values: {}
    related_node_ids:
      - AuthorizationRequest
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-authorization-request-design
parent_relation:
  id: PolicyEvaluation-consumes-AuthorizationRequest
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 消费授权请求
    en: consumes authorization request
    ja: 認可要求を消費する
  definitions:
    zh: PolicyEvaluation 以一个不可变 AuthorizationRequest 作为本次求值输入，读取其主体、动作、资源、范围和上下文摘要，不修改该请求。
    en: A PolicyEvaluation takes one immutable AuthorizationRequest as evaluation input, reading its principal, action, resource, scope, and context digest without modifying the request.
    ja: PolicyEvaluation は一つの不変 AuthorizationRequest を評価入力として主体・操作・資源・範囲・文脈ダイジェストを読み、要求を変更しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被评估消费
      en: is consumed by
      ja: 評価に消費される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-authorization-request-design
    - claim-authorization-request-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations:
  - id: AuthorizationRequest-requests-PermissionScope
    predicate: requests
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 请求权限范围
      en: requests permission scope
      ja: 権限範囲を要求する
    definitions:
      zh: AuthorizationRequest 明确请求一个 PermissionScope，后续批准或授予只能保持或收窄该主体、动作、资源、上下文和期限边界。
      en: An AuthorizationRequest explicitly requests a PermissionScope, and later approval or grant may preserve or narrow—but never widen—its principal, action, resource, context, and time boundaries.
      ja: AuthorizationRequest は PermissionScope を明示要求し、後続承認・付与は主体・操作・資源・文脈・期間境界を維持または縮小できても拡大できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: requested_by
      labels:
        zh: 被请求所求
        en: is requested by
        ja: 要求によって求められる
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-authorization-request-design
      - claim-authorization-request-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:PermissionScope
