    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
