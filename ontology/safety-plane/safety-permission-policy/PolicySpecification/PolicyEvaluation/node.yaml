external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PolicyEvaluation-uses-PolicySpecification
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 使用策略版本
    en: uses policy specification
    ja: 方針仕様を使用する
  definitions:
    zh: PolicyEvaluation 引用一个确定 PolicySpecification 版本作为规范依据；评估开始后不得静默切换到另一版本。
    en: A PolicyEvaluation references one exact PolicySpecification version as normative basis and cannot silently switch versions after evaluation begins.
    ja: PolicyEvaluation は一つの正確な PolicySpecification 版を規範根拠として参照し、開始後に別版へ黙って切替えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被评估使用
      en: is used by evaluation
      ja: 評価に使用される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyEvaluation-uses-PolicySpecification-example-positive-manual-001
      labels:
        zh: 使用策略版本正例
        en: Positive uses policy specification case
        ja: 方針仕様を使用するの正例
      descriptions:
        zh: evaluation-42 在开始时固定 tool-authorization@7，并在决定日志中记录该 bundle revision。
        en: evaluation-42 fixes tool-authorization@7 at start and records that bundle revision in the decision log.
        ja: evaluation-42 は開始時 tool-authorization@7 を固定し判断ログへ bundle revision を記録します。
      field_values: {}
      related_node_ids:
        - PolicyEvaluation
        - PolicySpecification
      related_relation_ids:
        - PolicyEvaluation-uses-PolicySpecification

        en: Replay resolves the same policy content.
        ja: 再生評価が同じ方針内容を解決します。

        en: The edge binds versioned specification rather than a 'latest' alias.
        ja: 辺は『最新』別名でなく版管理仕様へ束縛されます。
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
    - id: PolicyEvaluation-uses-PolicySpecification-example-boundary-manual-001
      labels:
        zh: 使用策略版本边界反例
        en: Boundary counterexample for uses policy specification
        ja: 方針仕様を使用するの境界反例
      descriptions:
        zh: 日志只写 policy_id=tool-authorization 而没有版本，无法证明使用了第 7 版。
        en: A log with policy_id=tool-authorization but no version cannot prove version 7 was used.
        ja: ログに policy_id=tool-authorization だけで版がなければ第7版使用を証明できません。
      field_values: {}
      related_node_ids:
        - PolicyEvaluation
        - PolicySpecification
      related_relation_ids:
        - PolicyEvaluation-uses-PolicySpecification

        en: Validation rejects the uses fact as under-evidenced.
        ja: 検証は uses 事実を証拠不足として拒否します。

        en: A general policy identifier cannot replace an immutable, auditable release version.
        ja: 一般方針識別子は不変で監査可能な公開版を代替できません。
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
  source_claims:
    - claim-policy-evaluation-001
    - claim-policy-evaluation-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: PolicyEvaluation-applies-PolicyException
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用策略例外
      en: applies policy exception
      ja: ポリシー例外を適用する
    definitions:
      zh: PolicyEvaluation 只有在 PolicyException 的授权者、范围、期限、撤销条件和补偿控制均匹配当前请求时才应用它。
      en: A PolicyEvaluation applies a PolicyException only when its authorizer, scope, interval, revocation condition, and compensating controls all match the current request.
      ja: PolicyEvaluation は PolicyException の認可者、範囲、期間、取消条件、補償制御が現在要求へすべて一致する場合だけ適用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: applied_by_evaluation
      labels:
        zh: 被评估应用
        en: is applied by evaluation
        ja: 評価に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: PolicyEvaluation-applies-PolicyException-example-positive-manual-001
        labels:
          zh: 应用策略例外正例
          en: Positive applies policy exception case
          ja: ポリシー例外を適用するの正例
        descriptions:
          zh: evaluation-maintenance-17 在限定一小时窗口和只读沙箱均满足时应用 exception-maintenance-17。
          en: evaluation-maintenance-17 applies exception-maintenance-17 only while its one-hour window and read-only sandbox control both hold.
          ja: evaluation-maintenance-17 は一時間窓と読取専用サンドボックス制御が共に成立する間だけ exception-maintenance-17 を適用します。
        field_values: {}
        related_node_ids:
          - PolicyEvaluation
          - PolicyException
        related_relation_ids:
          - PolicyEvaluation-applies-PolicyException

          en: The evaluation trace records matching fields and compensating controls.
          ja: 評価軌跡は一致項目と補償制御を記録します。

          en: Exception application belongs to evaluation activity rather than a final decision selecting an exception itself.
          ja: 例外適用は評価活動に属し、最終判断が自ら例外を選ぶのではありません。
        source_claims:
          - claim-policy-evaluation-004
          - claim-policy-evaluation-005
      - id: PolicyEvaluation-applies-PolicyException-example-boundary-manual-001
        labels:
          zh: 应用策略例外边界反例
          en: Boundary counterexample for applies policy exception
          ja: ポリシー例外を適用するの境界反例
        descriptions:
          zh: 例外已过期但结果恰好为 allow，不能反推 PolicyEvaluation 应用了该例外。
          en: An expired exception followed by an allow outcome does not imply that PolicyEvaluation applied it.
          ja: 期限切れ例外後に allow 結果でも PolicyEvaluation が適用したとは推論できません。
        field_values: {}
        related_node_ids:
