  - id: policy-evaluation-cedar
    labels:
      zh: 策略评估活动 - Cedar 授权评估
      en: policy evaluation activity - Cedar authorization evaluation
      ja: ポリシー評価活動 - Cedar 認可評価
    descriptions: {zh: "策略评估活动(PolicyEvaluation) [PolicyEvaluation]: 使用一个确定策略版本对一个不可变授权请求求值并产出一个决定的活动。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: request_ref, completed_at, started_at.", en: "policy evaluation activity (PolicyEvaluation) [PolicyEvaluation]: An activity that evaluates one immutable authorization request with one fixed policy version and produces one decision.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include request_ref, completed_at, started_at.", ja: "ポリシー評価活動(PolicyEvaluation) [PolicyEvaluation]: 一つの不変認可要求を一つの固定方針版で評価し、一つの判断を生成する活動です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: request_ref, completed_at, started_at."}
    field_values:
      completed_at: "2026-07-16T01:21:03Z"
      evaluation_id: evaluation-42
      input_digest: "sha256:eval42"
      policy_version_ref: "tool-authorization@7"
      request_ref: request-42
      started_at: "2026-07-16T01:21:02Z"
      status: completed
    related_node_ids:
      - AuthorizationRequest
      - HumanApproval
      - PolicyDecision
      - PolicyEvaluation
      - PolicySpecification
    related_relation_ids:
      - AuthorizationRequest
      - claim-policy-evaluation-001
      - claim-policy-evaluation-002
      - claim-policy-evaluation-003
      - HumanApproval
      - PolicyDecision
      - PolicyEvaluation
      - PolicyEvaluation-considers-HumanApproval
      - PolicyEvaluation-consumes-AuthorizationRequest
      - PolicyEvaluation-produces-PolicyDecision
      - PolicyEvaluation-uses-PolicySpecification
      - PolicySpecification
    example_source: Amazon Cedar
    source_claims:
      - claim-policy-evaluation-001
  - id: policy-evaluation-envoy_ext_auth
    labels:
      zh: 策略评估活动 - Envoy ext_authz PEP
      en: policy evaluation activity - Envoy ext_authz PEP
      ja: ポリシー評価活動 - Envoy ext_authz PEP
    descriptions: {zh: "策略评估活动(PolicyEvaluation) [PolicyEvaluation]: 使用一个确定策略版本对一个不可变授权请求求值并产出一个决定的活动。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: request_ref, completed_at, started_at.", en: "policy evaluation activity (PolicyEvaluation) [PolicyEvaluation]: An activity that evaluates one immutable authorization request with one fixed policy version and produces one decision.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include request_ref, completed_at, started_at.", ja: "ポリシー評価活動(PolicyEvaluation) [PolicyEvaluation]: 一つの不変認可要求を一つの固定方針版で評価し、一つの判断を生成する活動です。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: request_ref, completed_at, started_at."}
    field_values:
