schema: moonweave.ai/ontology-node/v1
id: PolicyEvaluation
kind: concept
status: accepted
labels:
  zh: 策略评估活动
  en: policy evaluation activity
  ja: ポリシー評価活動
semantics:
  short_definition:
    zh: 使用一个确定策略版本对一个不可变授权请求求值并产出一个决定的活动。
    en: An activity that evaluates one immutable authorization request with one fixed policy version and produces one decision.
    ja: 一つの不変認可要求を一つの固定方針版で評価し、一つの判断を生成する活動です。
  definition:
    zh: 策略评估活动以 evaluation_id 标识，消费一个 AuthorizationRequest，使用一个确定的 PolicySpecification 版本，检查条件与有效例外，按组合算法归并规则结果，并产生一个 PolicyDecision。活动可以考虑有效 HumanApproval，但不拥有请求、规范或审批事件，也不负责执行决定。
    en: A PolicyEvaluation is identified by evaluation_id, consumes one AuthorizationRequest, uses one fixed PolicySpecification version, evaluates conditions and valid exceptions, combines rule results under the selected algorithm, and produces one PolicyDecision. It may consider a valid HumanApproval, but does not own the request, specification, or approval event and does not enforce the decision.
    ja: PolicyEvaluation は evaluation_id で識別され、一つの AuthorizationRequest を消費し、一つの固定 PolicySpecification 版を使用し、条件と有効例外を評価し、選択アルゴリズムで規則結果を結合して一つの PolicyDecision を生成します。有効 HumanApproval を考慮できますが、要求・仕様・承認イベントを所有せず判断を執行しません。
  why_needed:
    zh: 独立活动节点保留输入快照、策略版本、开始结束时间和状态，使决定可以重放，同时不把运行过程塞进策略或决定记录。
    en: A distinct activity preserves input snapshot, policy version, timing, and status for replay without embedding runtime process inside policy or decision records.
    ja: 独立活動ノードは入力スナップショット、方針版、時刻、状態を保ち、実行過程を方針・判断記録へ埋めず再現可能にします。
  includes:
    - zh: 包含评估标识、请求引用、策略版本引用、输入摘要、开始与结束时间和评估状态。
      en: Includes evaluation identity, request reference, policy-version reference, input digest, start and completion times, and evaluation status.
      ja: 評価識別子、要求参照、方針版参照、入力ダイジェスト、開始・完了時刻、評価状態を含みます。
  excludes:
    - zh: 不包含策略规范内容本身、最终决定身份、执行门控、副作用或授权授予。
      en: Excludes policy content itself, final decision identity, enforcement gate, side effect, or authorization grant.
      ja: 方針内容自体、最終判断同一性、執行ゲート、副作用、認可付与を含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - evaluation_id
  fields:
    - id: evaluation_id
      labels:
        zh: 评估标识
        en: evaluation ID
        ja: 評価ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次策略求值活动。
        en: Stable identifier for one policy-evaluation activity.
        ja: 一回の方針評価活動を安定識別します。
      allowed_values: []
      pattern: null
      example_value: evaluation-42
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该活动消费的不可变授权请求。
        en: Immutable authorization request consumed by the activity.
        ja: 活動が消費する不変認可要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动使用的确定策略发布版本。
        en: Exact released policy version used by the activity.
        ja: 活動が使用する正確な公開方針版です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: input_digest
      labels:
        zh: 评估输入摘要
        en: evaluation input digest
        ja: 評価入力ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 覆盖请求与求值上下文的不可变摘要。
        en: Immutable digest covering request and evaluation context.
        ja: 要求と評価文脈を覆う不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:eval42
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动开始读取输入的 UTC 时刻。
        en: UTC instant when the activity began reading input.
        ja: 活動が入力読取を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:02Z
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动产生最终决定的 UTC 时刻。
        en: UTC instant when the activity produced its final decision.
        ja: 活動が最終判断を生成した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:03Z
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: status
      labels:
        zh: 评估状态
        en: evaluation status
        ja: 評価状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动是运行中、完成还是因输入错误失败。
        en: Whether the activity is running, completed, or failed because input could not be evaluated.
        ja: 活動が実行中、完了、入力評価不能で失敗のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: policy-evaluation-opa
    labels:
      zh: 策略评估活动 - OPA Rego 策略评估
      en: policy evaluation activity - OPA Rego policy evaluation
      ja: ポリシー評価活動 - OPA Rego ポリシー評価
    descriptions: {zh: "策略评估活动(PolicyEvaluation) [PolicyEvaluation]: 使用一个确定策略版本对一个不可变授权请求求值并产出一个决定的活动。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: request_ref, completed_at, started_at.", en: "policy evaluation activity (PolicyEvaluation) [PolicyEvaluation]: An activity that evaluates one immutable authorization request with one fixed policy version and produces one decision.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include request_ref, completed_at, started_at.", ja: "ポリシー評価活動(PolicyEvaluation) [PolicyEvaluation]: 一つの不変認可要求を一つの固定方針版で評価し、一つの判断を生成する活動です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: request_ref, completed_at, started_at."}
    field_values:
      completed_at: "2026-07-16T01:21:03Z"
      evaluation_id: evaluation-42
      input_digest: "sha256:eval42"
      policy_version_ref: "tool-authorization@7"
      request_ref: request-42
      started_at: "2026-07-16T01:21:02Z"
      status: completed
    related_node_ids:
      - AuthorizationRequest
      - HumanApproval
      - PolicyDecision
      - PolicyEvaluation
      - PolicySpecification
    related_relation_ids:
      - AuthorizationRequest
      - claim-policy-evaluation-001
      - claim-policy-evaluation-002
      - claim-policy-evaluation-003
      - HumanApproval
      - PolicyDecision
      - PolicyEvaluation
      - PolicyEvaluation-considers-HumanApproval
      - PolicyEvaluation-consumes-AuthorizationRequest
