schema: moonweave.ai/ontology-node/v1
id: PolicyEvaluation
kind: concept
status: review
labels:
  zh: 策略评估活动
  en: policy evaluation activity
  ja: ポリシー評価活動
semantics:
  short_definition:
    zh: 使用一个确定策略版本对一个不可变授权请求求值并产出一个决定的活动。
    en: An activity that evaluates one immutable authorization request with one fixed policy version and produces one decision.
    ja: 一つの不変認可要求を一つの固定方針版で評価し、一つの判断を生成する活動です。
  definition:
    zh: 策略评估活动以 evaluation_id 标识，消费一个 AuthorizationRequest，使用一个确定的 PolicySpecification 版本，检查条件与有效例外，按组合算法归并规则结果，并产生一个 PolicyDecision。活动可以考虑有效 HumanApproval，但不拥有请求、规范或审批事件，也不负责执行决定。
    en: A PolicyEvaluation is identified by evaluation_id, consumes one AuthorizationRequest, uses one fixed PolicySpecification version, evaluates conditions and valid exceptions, combines rule results under the selected algorithm, and produces one PolicyDecision. It may consider a valid HumanApproval, but does not own the request, specification, or approval event and does not enforce the decision.
    ja: PolicyEvaluation は evaluation_id で識別され、一つの AuthorizationRequest を消費し、一つの固定 PolicySpecification 版を使用し、条件と有効例外を評価し、選択アルゴリズムで規則結果を結合して一つの PolicyDecision を生成します。有効 HumanApproval を考慮できますが、要求・仕様・承認イベントを所有せず判断を執行しません。
  why_needed:
    zh: 独立活动节点保留输入快照、策略版本、开始结束时间和状态，使决定可以重放，同时不把运行过程塞进策略或决定记录。
    en: A distinct activity preserves input snapshot, policy version, timing, and status for replay without embedding runtime process inside policy or decision records.
    ja: 独立活動ノードは入力スナップショット、方針版、時刻、状態を保ち、実行過程を方針・判断記録へ埋めず再現可能にします。
  includes:
    - zh: 包含评估标识、请求引用、策略版本引用、输入摘要、开始与结束时间和评估状态。
      en: Includes evaluation identity, request reference, policy-version reference, input digest, start and completion times, and evaluation status.
      ja: 評価識別子、要求参照、方針版参照、入力ダイジェスト、開始・完了時刻、評価状態を含みます。
  excludes:
    - zh: 不包含策略规范内容本身、最终决定身份、执行门控、副作用或授权授予。
      en: Excludes policy content itself, final decision identity, enforcement gate, side effect, or authorization grant.
      ja: 方針内容自体、最終判断同一性、執行ゲート、副作用、認可付与を含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - evaluation_id
  fields:
    - id: evaluation_id
      labels:
        zh: 评估标识
        en: evaluation ID
        ja: 評価ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次策略求值活动。
        en: Stable identifier for one policy-evaluation activity.
        ja: 一回の方針評価活動を安定識別します。
      allowed_values: []
      pattern: null
      example_value: evaluation-42
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该活动消费的不可变授权请求。
        en: Immutable authorization request consumed by the activity.
        ja: 活動が消費する不変認可要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动使用的确定策略发布版本。
        en: Exact released policy version used by the activity.
        ja: 活動が使用する正確な公開方針版です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: input_digest
      labels:
        zh: 评估输入摘要
        en: evaluation input digest
        ja: 評価入力ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 覆盖请求与求值上下文的不可变摘要。
        en: Immutable digest covering request and evaluation context.
        ja: 要求と評価文脈を覆う不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:eval42
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动开始读取输入的 UTC 时刻。
        en: UTC instant when the activity began reading input.
        ja: 活動が入力読取を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:02Z
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动产生最终决定的 UTC 时刻。
        en: UTC instant when the activity produced its final decision.
        ja: 活動が最終判断を生成した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:03Z
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
    - id: status
      labels:
        zh: 评估状态
        en: evaluation status
        ja: 評価状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动是运行中、完成还是因输入错误失败。
        en: Whether the activity is running, completed, or failed because input could not be evaluated.
        ja: 活動が実行中、完了、入力評価不能で失敗のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
        - claim-policy-evaluation-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyEvaluation-example-positive-manual-001
    kind: positive
    labels:
      zh: 策略评估活动正例
      en: Positive policy evaluation activity case
      ja: ポリシー評価活動の正例
    scenario_id: null
    descriptions:
      zh: evaluation-42 消费 request-42，固定使用 tool-authorization@7，验证 approval-42，按 deny-overrides@1 组合规则并产生 decision-42。
      en: evaluation-42 consumes request-42, fixes tool-authorization@7, validates approval-42, combines rules with deny-overrides@1, and produces decision-42.
      ja: evaluation-42 は request-42 を消費し tool-authorization@7 を固定使用し、approval-42 を検証し、deny-overrides@1 で規則を結合して decision-42 を生成します。
    field_values:
      evaluation_id: evaluation-42
      request_ref: request-42
      policy_version_ref: tool-authorization@7
      input_digest: sha256:eval42
      started_at: 2026-07-16T01:21:02Z
      completed_at: 2026-07-16T01:21:03Z
      status: completed
    related_node_ids:
      - PolicyEvaluation
      - AuthorizationRequest
      - PolicySpecification
      - HumanApproval
      - PolicyDecision
    related_relation_ids:
      - PolicyEvaluation-consumes-AuthorizationRequest
      - PolicyEvaluation-uses-PolicySpecification
      - PolicyEvaluation-considers-HumanApproval
      - PolicyEvaluation-produces-PolicyDecision
    expected_result:
      zh: 活动输入、规范版本、审批证据和输出决定形成可重放链。
      en: Activity input, policy version, approval evidence, and output decision form a replayable chain.
      ja: 活動入力、方針版、承認証拠、出力判断が再現可能な連鎖を形成します。
    why_valid_or_invalid:
      zh: 每个参与对象保持自己的身份，评估只负责求值与产出决定。
      en: Every participant retains its own identity, and the evaluation owns only evaluation and decision production.
      ja: 各参与対象は固有同一性を保ち、評価は求値と判断生成だけを担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-evaluation-001
      - claim-policy-evaluation-002
      - claim-policy-evaluation-003
  - id: PolicyEvaluation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 策略评估活动边界反例
      en: Boundary counterexample for policy evaluation activity
      ja: ポリシー評価活動の境界反例
    scenario_id: null
    descriptions:
      zh: OPA 策略 bundle tool-authorization@7 是 PolicySpecification，不是 PolicyEvaluation；只有具体输入被求值时才产生 evaluation-42 活动。
      en: OPA policy bundle tool-authorization@7 is a PolicySpecification, not a PolicyEvaluation; evaluation-42 exists only when concrete input is evaluated.
      ja: OPA 方針 bundle tool-authorization@7 は PolicySpecification であり PolicyEvaluation ではなく、具体入力評価時だけ evaluation-42 が生じます。
    field_values: {}
    related_node_ids:
      - PolicyEvaluation
      - PolicySpecification
    related_relation_ids:
      - PolicyEvaluation-uses-PolicySpecification
    expected_result:
      zh: 策略版本保持规范身份，运行活动通过 uses 引用它。
      en: The policy version remains a specification and the runtime activity references it through uses.
      ja: 方針版は仕様同一性を保ち、実行活動が uses で参照します。
    why_valid_or_invalid:
      zh: 可复用策略内容与一次求值活动具有不同的身份键和时间语义。
      en: Reusable policy content and one evaluation activity have different identity keys and temporal semantics.
      ja: 再利用方針内容と一回の評価活動は異なる識別鍵と時間意味を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-evaluation-001
      - claim-policy-evaluation-002
      - claim-policy-evaluation-003
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PolicyEvaluation-uses-PolicySpecification
  predicate: uses
  direction: source-to-target
  relation_kind: governance
  labels:
    zh: 使用策略版本
    en: uses policy specification
    ja: 方針仕様を使用する
  definitions:
    zh: PolicyEvaluation 引用一个确定 PolicySpecification 版本作为规范依据；评估开始后不得静默切换到另一版本。
    en: A PolicyEvaluation references one exact PolicySpecification version as normative basis and cannot silently switch versions after evaluation begins.
    ja: PolicyEvaluation は一つの正確な PolicySpecification 版を規範根拠として参照し、開始後に別版へ黙って切替えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: used_by_evaluation
    labels:
      zh: 被评估使用
      en: is used by evaluation
      ja: 評価に使用される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyEvaluation-uses-PolicySpecification-example-positive-manual-001
      kind: positive
      labels:
        zh: 使用策略版本正例
        en: Positive uses policy specification case
        ja: 方針仕様を使用するの正例
      scenario_id: null
      descriptions:
        zh: evaluation-42 在开始时固定 tool-authorization@7，并在决定日志中记录该 bundle revision。
        en: evaluation-42 fixes tool-authorization@7 at start and records that bundle revision in the decision log.
        ja: evaluation-42 は開始時 tool-authorization@7 を固定し判断ログへ bundle revision を記録します。
      field_values: {}
      related_node_ids:
        - PolicyEvaluation
        - PolicySpecification
      related_relation_ids:
        - PolicyEvaluation-uses-PolicySpecification
      expected_result:
        zh: 重放评估解析到相同策略内容。
        en: Replay resolves the same policy content.
        ja: 再生評価が同じ方針内容を解決します。
      why_valid_or_invalid:
        zh: 关系绑定的是版本化规范而非“当前最新”别名。
        en: The edge binds versioned specification rather than a 'latest' alias.
        ja: 辺は『最新』別名でなく版管理仕様へ束縛されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
    - id: PolicyEvaluation-uses-PolicySpecification-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 使用策略版本边界反例
        en: Boundary counterexample for uses policy specification
        ja: 方針仕様を使用するの境界反例
      scenario_id: null
      descriptions:
        zh: 日志只写 policy_id=tool-authorization 而没有版本，无法证明使用了第 7 版。
        en: A log with policy_id=tool-authorization but no version cannot prove version 7 was used.
        ja: ログに policy_id=tool-authorization だけで版がなければ第7版使用を証明できません。
      field_values: {}
      related_node_ids:
        - PolicyEvaluation
        - PolicySpecification
      related_relation_ids:
        - PolicyEvaluation-uses-PolicySpecification
      expected_result:
        zh: 验证将该 uses 事实标为证据不足。
        en: Validation rejects the uses fact as under-evidenced.
        ja: 検証は uses 事実を証拠不足として拒否します。
      why_valid_or_invalid:
        zh: 一般策略标识不能替代不可变且可审计的发布版本。
        en: A general policy identifier cannot replace an immutable, auditable release version.
        ja: 一般方針識別子は不変で監査可能な公開版を代替できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-evaluation-001
        - claim-policy-evaluation-002
  source_claims:
    - claim-policy-evaluation-001
    - claim-policy-evaluation-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: PolicyEvaluation-applies-PolicyException
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用策略例外
      en: applies policy exception
      ja: ポリシー例外を適用する
    definitions:
      zh: PolicyEvaluation 只有在 PolicyException 的授权者、范围、期限、撤销条件和补偿控制均匹配当前请求时才应用它。
      en: A PolicyEvaluation applies a PolicyException only when its authorizer, scope, interval, revocation condition, and compensating controls all match the current request.
      ja: PolicyEvaluation は PolicyException の認可者、範囲、期間、取消条件、補償制御が現在要求へすべて一致する場合だけ適用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: applied_by_evaluation
      labels:
        zh: 被评估应用
        en: is applied by evaluation
        ja: 評価に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: PolicyEvaluation-applies-PolicyException-example-positive-manual-001
        kind: positive
        labels:
          zh: 应用策略例外正例
          en: Positive applies policy exception case
          ja: ポリシー例外を適用するの正例
        scenario_id: null
        descriptions:
          zh: evaluation-maintenance-17 在限定一小时窗口和只读沙箱均满足时应用 exception-maintenance-17。
          en: evaluation-maintenance-17 applies exception-maintenance-17 only while its one-hour window and read-only sandbox control both hold.
          ja: evaluation-maintenance-17 は一時間窓と読取専用サンドボックス制御が共に成立する間だけ exception-maintenance-17 を適用します。
        field_values: {}
        related_node_ids:
          - PolicyEvaluation
          - PolicyException
        related_relation_ids:
          - PolicyEvaluation-applies-PolicyException
        expected_result:
          zh: 评估轨迹记录匹配字段和补偿控制。
          en: The evaluation trace records matching fields and compensating controls.
          ja: 評価軌跡は一致項目と補償制御を記録します。
        why_valid_or_invalid:
          zh: 例外适用属于评估活动，而不是最终决定自行选择例外。
          en: Exception application belongs to evaluation activity rather than a final decision selecting an exception itself.
          ja: 例外適用は評価活動に属し、最終判断が自ら例外を選ぶのではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-policy-evaluation-004
          - claim-policy-evaluation-005
      - id: PolicyEvaluation-applies-PolicyException-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 应用策略例外边界反例
          en: Boundary counterexample for applies policy exception
          ja: ポリシー例外を適用するの境界反例
        scenario_id: null
        descriptions:
          zh: 例外已过期但结果恰好为 allow，不能反推 PolicyEvaluation 应用了该例外。
          en: An expired exception followed by an allow outcome does not imply that PolicyEvaluation applied it.
          ja: 期限切れ例外後に allow 結果でも PolicyEvaluation が適用したとは推論できません。
        field_values: {}
        related_node_ids:
          - PolicyEvaluation
          - PolicyException
        related_relation_ids:
          - PolicyEvaluation-applies-PolicyException
        expected_result:
          zh: 过期例外不建立 applies，决定必须由其他规则解释。
          en: No applies edge is created for the expired exception, and other rules must explain the decision.
          ja: 期限切れ例外には applies を作らず、他規則で判断を説明します。
        why_valid_or_invalid:
          zh: 结果相关性不能替代逐项适用证据。
          en: Outcome correlation cannot replace element-by-element applicability evidence.
          ja: 結果相関は項目別適用証拠を代替しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-policy-evaluation-004
          - claim-policy-evaluation-005
    source_claims:
      - claim-policy-evaluation-004
      - claim-policy-evaluation-005
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:PolicyException
  - id: PolicyEvaluation-considers-HumanApproval
    predicate: considers
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 考虑人工批准
      en: considers human approval
      ja: 人間承認を考慮する
    definitions:
      zh: PolicyEvaluation 在策略要求时验证并考虑与当前请求、范围和时间匹配的 HumanApproval；批准是证据而非自动 allow。
      en: A PolicyEvaluation validates and considers a HumanApproval matching the current request, scope, and time when policy requires it; approval is evidence rather than automatic allow.
      ja: PolicyEvaluation は方針要求時に現在要求・範囲・時刻へ一致する HumanApproval を検証・考慮し、承認を自動 allow でなく証拠として扱います。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: considered_by_evaluation
      labels:
        zh: 被评估考虑
        en: is considered by evaluation
        ja: 評価に考慮される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: PolicyEvaluation-considers-HumanApproval-example-positive-manual-001
        kind: positive
        labels:
          zh: 考虑人工批准正例
          en: Positive considers human approval case
          ja: 人間承認を考慮するの正例
        scenario_id: null
        descriptions:
          zh: evaluation-42 验证 approval-42 的审批者资格、request_ref、范围和有效期后把它作为条件证据。
          en: evaluation-42 verifies approval-42's reviewer authority, request_ref, scope, and validity before using it as condition evidence.
          ja: evaluation-42 は approval-42 の承認資格、request_ref、範囲、有効期間を検証して条件証拠に使います。
        field_values: {}
        related_node_ids:
          - PolicyEvaluation
          - HumanApproval
        related_relation_ids:
          - PolicyEvaluation-considers-HumanApproval
        expected_result:
