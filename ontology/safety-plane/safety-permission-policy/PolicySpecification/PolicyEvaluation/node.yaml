schema: moonweave.ai/ontology-node/v1
id: PolicyEvaluation
kind: concept
labels:
  zh: 策略评估活动
  en: policy evaluation activity
  ja: ポリシー評価活動
semantics:
  short_definition:
    zh: 针对一个不可变 AuthorizationRequest 在明确 PolicySpecification 版本下运行的一次策略求值活动。
    en: One policy-evaluation activity running against an immutable AuthorizationRequest under a stated PolicySpecification revision.
    ja: immutable AuthorizationRequest に対し明示 PolicySpecification revision で実行される一回の policy evaluation activity。
  definition:
    zh: PolicyEvaluation 以 evaluation_id、request_ref、policy_version_ref、started_at 与 evaluator_ref 记录一次实际发生的求值运行。OPA `opa eval`/`data.tool.auth.allow` 查询、AWS Verified Permissions IsAuthorized、MCP token introspection 与 scope 校验、Cursor allowlist 匹配都属于 PolicyEvaluation；它产出 PolicyDecision，但不等于决定本身。
    en: PolicyEvaluation records one actual run with evaluation_id, request_ref, policy_version_ref, started_at, and evaluator_ref. OPA opa eval/data.tool.auth.allow queries, AWS Verified Permissions IsAuthorized, MCP token introspection and scope checks, and Cursor allowlist matching are PolicyEvaluations; it produces PolicyDecision but is not the decision itself.
    ja: PolicyEvaluation は evaluation_id/request_ref/policy_version_ref/started_at/evaluator_ref で実際 run を記録。OPA eval、Verified Permissions IsAuthorized、MCP introspection/scope 検証、Cursor allowlist match は PolicyEvaluation。PolicyDecision を生成するが decision 自体ではない。
  why_needed:
    zh: 必须把“用了哪版策略求值”与“求值结果”分开，否则无法 replay MCP OAuth 拒绝案例。
    en: Separating which policy revision was evaluated from the result is required to replay MCP OAuth denial cases.
    ja: どの policy revision で評価したかと結果を分離しないと MCP OAuth deny case を replay できません。
  includes:
    - zh: 包含评估标识、请求引用、策略版本引用、输入摘要、开始与结束时间和评估状态。
      en: Includes evaluation identity, request reference, policy-version reference, input digest, start and completion times, and evaluation status.
      ja: 評価識別子、要求参照、方針版参照、入力ダイジェスト、開始・完了時刻、評価状態を含みます。
  excludes:
    - zh: 不包含策略规范内容本身、最终决定身份、执行门控、副作用或授权授予。
      en: Excludes policy content itself, final decision identity, enforcement gate, side effect, or authorization grant.
      ja: 方針内容自体、最終判断同一性、執行ゲート、副作用、認可付与を含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 每次 ToolApprovalGate 前或 MCP resource access 前触发 PolicyEvaluation；保留 policy_version_ref 与 request_ref；可 considers HumanApproval 作为证据。不要把 PolicyDecision 与 evaluation 混用同一 ID。
    en: Trigger PolicyEvaluation before each ToolApprovalGate or MCP resource access; retain policy_version_ref and request_ref; may consider HumanApproval as evidence. Do not reuse PolicyDecision ID for evaluation.
    ja: 各 ToolApprovalGate/MCP resource access 前に PolicyEvaluation。policy_version_ref/request_ref 保持。HumanApproval を evidence として considers 可。PolicyDecision ID を evaluation に流用しない。
  typical_input:
    - description: OPA allow query.
      format: POST /v1/data/tool/auth/allow input={subject,object,action}
      source_claims:
        - claim-policy-evaluation-design
    - description: MCP token introspection + scope check.
      format: introspection active + scope covers tools:call
      source_claims:
        - claim-policy-evaluation-design
  typical_output:
    - description: Evaluation produces decision.
      format: '{"evaluation_id":"evaluation-42","policy_version_ref":"tool-authorization@7","decision_ref":"decision-42"}'
      source_claims:
        - claim-policy-evaluation-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - evaluation_id
  fields:
    - id: evaluation_id
      labels:
        zh: 评估标识
        en: evaluation ID
        ja: 評価ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次策略求值活动。
        en: Stable identifier for one policy-evaluation activity.
        ja: 一回の方針評価活動を安定識別します。
      allowed_values: []
      pattern: null
      example_value: evaluation-42
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
    - id: request_ref
      labels:
        zh: 请求引用
        en: request reference
        ja: 要求参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该活动消费的不可变授权请求。
        en: Immutable authorization request consumed by the activity.
        ja: 活動が消費する不変認可要求です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动使用的确定策略发布版本。
        en: Exact released policy version used by the activity.
        ja: 活動が使用する正確な公開方針版です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
    - id: input_digest
      labels:
        zh: 评估输入摘要
        en: evaluation input digest
        ja: 評価入力ダイジェスト
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 覆盖请求与求值上下文的不可变摘要。
        en: Immutable digest covering request and evaluation context.
        ja: 要求と評価文脈を覆う不変ダイジェストです。
      allowed_values: []
      pattern: null
      example_value: sha256:eval42
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动开始读取输入的 UTC 时刻。
        en: UTC instant when the activity began reading input.
        ja: 活動が入力読取を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:02Z
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动产生最终决定的 UTC 时刻。
        en: UTC instant when the activity produced its final decision.
        ja: 活動が最終判断を生成した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:03Z
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
    - id: status
      labels:
        zh: 评估状态
        en: evaluation status
        ja: 評価状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动是运行中、完成还是因输入错误失败。
        en: Whether the activity is running, completed, or failed because input could not be evaluated.
        ja: 活動が実行中、完了、入力評価不能で失敗のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
        - claim-policy-evaluation-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyEvaluation-opa-query
    labels:
      zh: OPA 策略求值
      en: OPA policy evaluation
      ja: OPA policy evaluation
    descriptions:
      zh: evaluation-42 使用 tool-authorization@7 对 request-42 执行 OPA allow 查询并产出 decision-42。
      en: evaluation-42 runs OPA allow query on request-42 with tool-authorization@7 and produces decision-42.
      ja: evaluation-42 が tool-authorization@7 で request-42 の OPA allow 查询を実行し decision-42 を生成。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: allow query
    field_values:
      evaluation_id: evaluation-42
      request_ref: request-42
      policy_version_ref: tool-authorization@7
    related_node_ids:
      - PolicyEvaluation
      - AuthorizationRequest
      - PolicyDecision
    related_relation_ids:
      - PolicyEvaluation-consumes-AuthorizationRequest
    source_claims:
      - claim-policy-evaluation-design
  - id: PolicyEvaluation-mcp-introspection
    labels:
      zh: MCP token  introspection 求值
      en: MCP token introspection evaluation
      ja: MCP token introspection evaluation
    descriptions:
      zh: evaluation-mcp-9 验证 token active 且 scope 覆盖 tools:call 对 resource https://mcp.example.com。
      en: evaluation-mcp-9 verifies token active and scope covers tools:call for resource https://mcp.example.com.
      ja: evaluation-mcp-9 が token active と scope tools:call を https://mcp.example.com で検証。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: introspection
    field_values:
      evaluation_id: evaluation-mcp-9
      policy_version_ref: mcp-oauth-policy@4
    related_node_ids:
      - PolicyEvaluation
      - AuthorizationRequest
    related_relation_ids: []
    source_claims:
      - claim-policy-evaluation-design
  - id: PolicyEvaluation-cursor-allowlist
    labels:
      zh: Cursor allowlist 求值
      en: Cursor allowlist evaluation
      ja: Cursor allowlist evaluation
    descriptions:
      zh: evaluation-55 匹配 cursor-shell-policy@2，agent 请求 curl 未在 allowlist，产出 deny decision-55。
      en: evaluation-55 applies cursor-shell-policy@2; agent curl request not in allowlist, producing deny decision-55.
      ja: evaluation-55 が cursor-shell-policy@2 を適用。curl が allowlist 外で deny decision-55。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: allowlist match
    field_values:
      evaluation_id: evaluation-55
      policy_version_ref: cursor-shell-policy@2
    related_node_ids:
      - PolicyEvaluation
      - DenyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-evaluation-design
  - id: PolicyEvaluation-boundary-decision
    labels:
      zh: 决定不是求值
      en: Decision is not evaluation
      ja: decision は evaluation ではない
    descriptions:
      zh: decision-42 是 PolicyEvaluation 产物，不能反向当作 evaluation 身份。
      en: decision-42 is a PolicyEvaluation product and cannot serve as evaluation identity.
      ja: decision-42 は PolicyEvaluation 産物で evaluation identity になれません。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: activity versus result
    field_values: {}
    related_node_ids:
      - PolicyEvaluation
      - PolicyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-evaluation-design
parent_relation:
  id: PolicyEvaluation-uses-PolicySpecification
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 使用策略版本
    en: uses policy specification
    ja: 方針仕様を使用する
  definitions:
    zh: PolicyEvaluation 引用一个确定 PolicySpecification 版本作为规范依据；评估开始后不得静默切换到另一版本。
    en: A PolicyEvaluation references one exact PolicySpecification version as normative basis and cannot silently switch versions after evaluation begins.
    ja: PolicyEvaluation は一つの正確な PolicySpecification 版を規範根拠として参照し、開始後に別版へ黙って切替えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被评估使用
      en: is used by evaluation
      ja: 評価に使用される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-evaluation-design
    - claim-policy-evaluation-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: PolicyEvaluation-applies-PolicyException
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用策略例外
      en: applies policy exception
      ja: ポリシー例外を適用する
    definitions:
      zh: PolicyEvaluation 只有在 PolicyException 的授权者、范围、期限、撤销条件和补偿控制均匹配当前请求时才应用它。
      en: A PolicyEvaluation applies a PolicyException only when its authorizer, scope, interval, revocation condition, and compensating controls all match the current request.
      ja: PolicyEvaluation は PolicyException の認可者、範囲、期間、取消条件、補償制御が現在要求へすべて一致する場合だけ適用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: applied_by_evaluation
      labels:
        zh: 被评估应用
        en: is applied by evaluation
        ja: 評価に適用される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-policy-evaluation-design
      - claim-policy-evaluation-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:PolicyException
  - id: PolicyEvaluation-considers-HumanApproval
    predicate: considers
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 考虑人工批准
      en: considers human approval
      ja: 人間承認を考慮する
    definitions:
      zh: PolicyEvaluation 在策略要求时验证并考虑与当前请求、范围和时间匹配的 HumanApproval；批准是证据而非自动 allow。
      en: A PolicyEvaluation validates and considers a HumanApproval matching the current request, scope, and time when policy requires it; approval is evidence rather than automatic allow.
      ja: PolicyEvaluation は方針要求時に現在要求・範囲・時刻へ一致する HumanApproval を検証・考慮し、承認を自動 allow でなく証拠として扱います。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
      en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
      ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
    inverse_reading:
      predicate: considered_by_evaluation
      labels:
        zh: 被评估考虑
        en: is considered by evaluation
        ja: 評価に考慮される
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-policy-evaluation-design
      - claim-policy-evaluation-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:HumanApproval
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-policy-evaluation-design
    source: safety-permission-design
    supports: PolicyEvaluation is executed activity distinct from PolicyDecision.
    locator: Evaluation activity boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-evaluation-design
    source: opa-rego
    supports: OPA allow/deny queries map to PolicyEvaluation with policy bundle version.
    locator: Rego evaluation
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-evaluation-design
    source: mcp-authorization-2025
    supports: MCP token introspection and scope validation map to PolicyEvaluation.
    locator: OAuth validation
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-evaluation-design
    source: cursor-terminal-sandbox
    supports: Cursor allowlist matching is a PolicyEvaluation against shell policy revision.
    locator: Allowlist evaluation
    evidence_kind: design-inference
    confidence: high
