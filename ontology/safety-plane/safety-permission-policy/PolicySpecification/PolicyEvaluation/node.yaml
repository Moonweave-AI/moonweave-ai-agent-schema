    labels:
      zh: 策略评估活动 - TrustLLM 六维可信度
      en: policy evaluation activity - TrustLLM six-dimension trust
      ja: ポリシー評価活動 - TrustLLM 6次元信頼性
    descriptions: {zh: "策略评估活动(PolicyEvaluation) [PolicyEvaluation]: 使用一个确定策略版本对一个不可变授权请求求值并产出一个决定的活动。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: request_ref, completed_at, started_at.", en: "policy evaluation activity (PolicyEvaluation) [PolicyEvaluation]: An activity that evaluates one immutable authorization request with one fixed policy version and produces one decision.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include request_ref, completed_at, started_at.", ja: "ポリシー評価活動(PolicyEvaluation) [PolicyEvaluation]: 一つの不変認可要求を一つの固定方針版で評価し、一つの判断を生成する活動です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: request_ref, completed_at, started_at."}
    field_values:
      completed_at: "2026-07-16T01:21:03Z"
      evaluation_id: evaluation-42
      input_digest: "sha256:eval42"
      policy_version_ref: "tool-authorization@7"
      request_ref: request-42
