applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PolicyEffect
    shared_parent_concept_id: PolicyRule
    differentia:
      zh: PolicyException 在有限范围内改变通常规则适用；PolicyEffect 声明规则条件成立时的正常规范结果。例外不等于规则效果。
      en: PolicyException changes ordinary rule application within a bounded scope; PolicyEffect declares the normal normative outcome when rule conditions hold. An exception is not the rule effect.
      ja: PolicyException は限定範囲で通常規則適用を変え、PolicyEffect は条件成立時の通常規範結果を宣言します。例外は規則効果ではありません。
    source_claims:
      - claim-policy-exception-001
parent_relation:
  id: PolicyRule-has_exception-PolicyException
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有限定例外
    en: has bounded exception
    ja: 限定例外を持つ
  definitions:
    zh: PolicyRule 明确关联一个由授权者、范围、期限和补偿控制限定的 PolicyException；未匹配或失效例外不改变规则通常求值。
    en: A PolicyRule explicitly associates a PolicyException bounded by authorizer, scope, time, and compensating controls; a nonmatching or inactive exception does not alter ordinary rule evaluation.
    ja: PolicyRule は認可者・範囲・期間・補償制御で限定された PolicyException を明示関連し、不一致または無効例外は通常評価を変えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是规则例外
      en: is exception of
      ja: 規則の例外である
