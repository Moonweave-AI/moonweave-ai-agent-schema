schema: moonweave.ai/ontology-node/v1
id: PolicyException
kind: concept
labels:
  zh: 策略例外
  en: policy exception
  ja: ポリシー例外
semantics:
  short_definition:
    zh: PolicyRule 在特定上下文下暂停或改写默认效果的例外规范。
    en: An exception specification within a PolicyRule that suspends or modifies the default effect in specific context.
    ja: 特定 context で PolicyRule の default effect を停止/変更する exception specification。
  definition:
    zh: PolicyException 以 exception_id、applicability 条件与 override_effect 声明 break-glass、紧急维护或 HumanApproval 覆盖路径。Claude bypassPermissions 模式、OPA `except` 规则与 XACML Obligation/Exception 映射为 PolicyException；例外必须版本化且审计，不能隐式存在于 UI 配置。
    en: PolicyException declares break-glass, emergency maintenance, or HumanApproval override paths via exception_id, applicability conditions, and override_effect. Claude bypassPermissions mode, OPA except rules, and XACML Obligation/Exception map to PolicyException; exceptions must be versioned and audited, not implicit in UI config.
    ja: PolicyException は exception_id/applicability/override_effect で break-glass/emergency/HumanApproval override path を宣言。Claude bypassPermissions、OPA except、XACML Obligation/Exception を写像。例外は版管理・監査必須、UI config 暗黙不可。
  why_needed:
    zh: 没有显式例外，bypassPermissions 与 break-glass 无法与正常 deny 区分，OWASP 过度 agency 风险不可审计。
    en: Without explicit exceptions, bypassPermissions and break-glass cannot be distinguished from normal deny, making OWASP excessive-agency risk unauditable.
    ja: explicit exception なしでは bypassPermissions/break-glass を normal deny と区別できず OWASP excessive agency 監査不可。
  includes:
    - zh: 包含例外标识、授权者、适用范围、理由、开始与结束时间、补偿控制和撤销条件。
      en: Includes exception identity, authorizer, applicability scope, reason, start and end times, compensating controls, and revocation condition.
      ja: 例外識別子、認可者、適用範囲、理由、開始・終了時刻、補償制御、取消条件を含みます。
  excludes:
    - zh: 不包含普通条件、最终 PolicyDecision、AuthorizationGrant 或无期限的全局规则修改。
      en: Excludes an ordinary condition, final PolicyDecision, AuthorizationGrant, or unbounded global policy change.
      ja: 通常条件、最終 PolicyDecision、AuthorizationGrant、無期限の全局方針変更を含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: PolicyException 仅在 applicability 条件与 HumanApproval 或 break-glass token 同时满足时生效；Claude bypassPermissions 必须映射为 exception 版本而非缺省 allow。记录 exception_id 于 PolicyDecision determining_rule_refs。
    en: PolicyException applies only when applicability conditions and HumanApproval or break-glass token both hold; Claude bypassPermissions must map to exception revision, not default allow. Record exception_id in PolicyDecision determining_rule_refs.
    ja: PolicyException は applicability+HumanApproval/break-glass token 同時成立時のみ有効。Claude bypassPermissions は exception revision 写像（default allow 不可）。exception_id を determining_rule_refs に記録。
  typical_input:
    - description: Claude bypassPermissions.
      format: "permission_mode: bypassPermissions"
      source_claims:
        - claim-policy-exception-design
  typical_output:
    - description: Exception on rule.
      format: '{"exception_id":"exc-break-glass@1","override_effect":"permit"}'
      source_claims:
        - claim-policy-exception-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - exception_id
  fields:
    - id: exception_id
      labels:
        zh: 例外标识
        en: exception ID
        ja: 例外ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一项经授权的规则例外。
        en: Stable identifier for one authorized rule exception.
        ja: 一つの認可済み規則例外を安定識別します。
      allowed_values: []
      pattern: null
      example_value: exception-maintenance-17
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
    - id: authorizer_ref
      labels:
        zh: 授权者引用
        en: authorizer reference
        ja: 認可者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有权批准该例外的主体。
        en: Principal authorized to approve the exception.
        ja: 例外を承認する権限主体です。
      allowed_values: []
      pattern: null
      example_value: security-admin-4
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
    - id: scope_ref
      labels:
        zh: 例外范围引用
        en: exception scope reference
        ja: 例外範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定例外适用主体、动作和资源。
        en: Limits principals, actions, and resources to which the exception applies.
        ja: 例外が適用される主体、操作、資源を限定します。
      allowed_values: []
      pattern: null
      example_value: scope-maintenance-17
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
    - id: reason
      labels:
        zh: 例外理由
        en: exception reason
        ja: 例外理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明偏离常规规则的业务和风险理由。
        en: Business and risk rationale for deviating from the ordinary rule.
        ja: 通常規則から逸脱する業務・リスク理由です。
      allowed_values: []
      pattern: null
      example_value: scheduled index repair
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
    - id: valid_from
      labels:
        zh: 开始时间
        en: valid from
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 例外最早可参与求值的时刻。
        en: Earliest instant when the exception may participate in evaluation.
        ja: 例外が評価に参加できる最早時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:00Z
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
    - id: valid_until
      labels:
        zh: 结束时间
        en: valid until
        ja: 終了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 例外停止适用的明确时刻。
        en: Explicit instant when the exception ceases to apply.
        ja: 例外適用が終了する明示時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:00:00Z
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
    - id: compensating_controls
      labels:
        zh: 补偿控制
        en: compensating controls
        ja: 補償制御
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 例外生效期间仍必须满足的风险控制。
        en: Risk controls that remain mandatory while the exception is active.
        ja: 例外有効中も必須となるリスク制御です。
      allowed_values: []
      pattern: null
      example_value:
        - read-only sandbox
      source_claims:
        - claim-policy-exception-design
        - claim-policy-exception-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyException-claude-bypass
    labels:
      zh: Claude bypassPermissions 例外
      en: Claude bypassPermissions exception
      ja: Claude bypassPermissions exception
    descriptions:
      zh: exc-bypass@1 在 bypassPermissions 模式暂停默认 defer/deny 对 Bash 的效果。
      en: exc-bypass@1 suspends default defer/deny for Bash under bypassPermissions mode.
      ja: exc-bypass@1 bypassPermissions 下 Bash defer/deny 停止。
    example_source:
      product: Claude Code
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      version: bypassPermissions
    field_values:
      exception_id: exc-bypass
      version: "1"
    related_node_ids:
      - PolicyException
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-exception-design
  - id: PolicyException-human-override
    labels:
      zh: 人工批准覆盖例外
      en: Human approval override exception
      ja: human approval override exception
    descriptions:
      zh: exc-owner-override@2 允许 project-owner HumanApproval 覆盖 deny-admin-api。
      en: exc-owner-override@2 lets project-owner HumanApproval override deny-admin-api.
      ja: exc-owner-override@2 project-owner HumanApproval が deny-admin-api 覆盖。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: except rule
    field_values:
      exception_id: exc-owner-override
      version: "2"
    related_node_ids:
      - PolicyException
      - HumanApproval
    related_relation_ids: []
    source_claims:
      - claim-policy-exception-design
  - id: PolicyException-mcp-breakglass
    labels:
      zh: MCP break-glass 例外
      en: MCP break-glass exception
      ja: MCP break-glass exception
    descriptions:
      zh: exc-mcp-breakglass@1 需 break-glass token 与 audit ticket 才 permit destructive tool。
      en: exc-mcp-breakglass@1 requires break-glass token and audit ticket to permit destructive tool.
      ja: exc-mcp-breakglass@1 break-glass token+audit ticket で destructive tool permit。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: break-glass
    field_values:
      exception_id: exc-mcp-breakglass
      version: "1"
    related_node_ids:
      - PolicyException
      - AllowDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-exception-design
  - id: PolicyException-boundary-ui
    labels:
      zh: UI 开关不是例外规范
      en: UI toggle is not exception spec
      ja: UI toggle≠exception spec
    descriptions:
      zh: 未版本化的 settings 勾选不构成 PolicyException；必须发布 exception_id@version。
      en: Unversioned settings checkbox does not constitute PolicyException; exception_id@version must be published.
      ja: 未版管理 settings チェックは PolicyException にならず exception_id@version publish 必須。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: excessive agency
    field_values: {}
    related_node_ids:
      - PolicyException
      - PolicySpecification
    related_relation_ids: []
    source_claims:
      - claim-policy-exception-design
parent_relation:
  id: PolicyRule-has_exception-PolicyException
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有限定例外
    en: has bounded exception
    ja: 限定例外を持つ
  definitions:
    zh: PolicyRule 明确关联一个由授权者、范围、期限和补偿控制限定的 PolicyException；未匹配或失效例外不改变规则通常求值。
    en: A PolicyRule explicitly associates a PolicyException bounded by authorizer, scope, time, and compensating controls; a nonmatching or inactive exception does not alter ordinary rule evaluation.
    ja: PolicyRule は認可者・範囲・期間・補償制御で限定された PolicyException を明示関連し、不一致または無効例外は通常評価を変えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是规则例外
      en: is exception of
      ja: 規則の例外である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-exception-design
    - claim-policy-exception-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-policy-exception-design
    source: safety-permission-design
    supports: PolicyException is versioned override path, not implicit UI bypass.
    locator: Exception boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-exception-design
    source: claude-code-permissions
    supports: Claude bypassPermissions maps to audited PolicyException revision.
    locator: Bypass mode
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-exception-design
    source: opa-rego
    supports: OPA except rules map to PolicyException with applicability conditions.
    locator: Rego except
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-exception-design
    source: mcp-authorization-2025
    supports: MCP break-glass flows map to PolicyException with audit requirements.
    locator: Break-glass
    evidence_kind: design-inference
    confidence: high
