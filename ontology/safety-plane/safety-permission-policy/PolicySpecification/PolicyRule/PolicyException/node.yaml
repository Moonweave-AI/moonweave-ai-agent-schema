    descriptions: {zh: "策略例外(PolicyException) [PolicyException]: 由明确授权者签发、范围和期限均受限的规则适用偏离。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: valid_from, authorizer_ref, valid_until.", en: "policy exception (PolicyException) [PolicyException]: A rule-applicability deviation issued by an identified authority and bounded by scope and time.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include valid_from, authorizer_ref, valid_until.", ja: "ポリシー例外(PolicyException) [PolicyException]: 識別可能な権限者が発行し、範囲と期限で限定された規則適用の例外です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: valid_from, authorizer_ref, valid_until."}
    field_values:
