schema: moonweave.ai/ontology-node/v1
id: PolicyException
kind: concept
status: accepted
labels:
  zh: 策略例外
  en: policy exception
  ja: ポリシー例外
semantics:
  short_definition:
    zh: 由明确授权者签发、范围和期限均受限的规则适用偏离。
    en: A rule-applicability deviation issued by an identified authority and bounded by scope and time.
    ja: 識別可能な権限者が発行し、範囲と期限で限定された規則適用の例外です。
  definition:
    zh: 策略例外是附属于 PolicyRule 的规范组成，只有在明确主体、动作、资源、理由、有效期和补偿控制全部匹配时才改变该规则的适用或效果。例外不是一次决定，也不是长期授权；过期、被撤销或超出范围时，原规则仍按通常方式求值。
    en: A PolicyException is a normative component attached to a PolicyRule that changes the rule's applicability or effect only when its named principal, action, resource, reason, validity interval, and compensating controls all match. It is neither a one-off decision nor a standing grant; when expired, revoked, or out of scope, the original rule evaluates normally.
    ja: PolicyException は PolicyRule に付属する規範構成で、指定主体・操作・資源・理由・有効期間・補償制御がすべて一致する場合だけ規則の適用または効果を変えます。一回の判断でも恒常付与でもなく、期限切れ・取消・範囲外では元規則を通常評価します。
  why_needed:
    zh: 显式例外节点让豁免的签发权、范围、期限和补偿控制可被审计，避免把临时例外暗藏在自由文本或最终决定中。
    en: An explicit exception node makes waiver authority, scope, duration, and compensating controls auditable instead of hiding temporary deviations in prose or a final decision.
    ja: 明示的な例外ノードにより、免除権限・範囲・期間・補償制御を監査でき、一時的逸脱を自由文や最終判断へ隠しません。
  includes:
    - zh: 包含例外标识、授权者、适用范围、理由、开始与结束时间、补偿控制和撤销条件。
      en: Includes exception identity, authorizer, applicability scope, reason, start and end times, compensating controls, and revocation condition.
      ja: 例外識別子、認可者、適用範囲、理由、開始・終了時刻、補償制御、取消条件を含みます。
  excludes:
    - zh: 不包含普通条件、最终 PolicyDecision、AuthorizationGrant 或无期限的全局规则修改。
      en: Excludes an ordinary condition, final PolicyDecision, AuthorizationGrant, or unbounded global policy change.
      ja: 通常条件、最終 PolicyDecision、AuthorizationGrant、無期限の全局方針変更を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - exception_id
  fields:
    - id: exception_id
      labels:
        zh: 例外标识
        en: exception ID
        ja: 例外ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一项经授权的规则例外。
        en: Stable identifier for one authorized rule exception.
        ja: 一つの認可済み規則例外を安定識別します。
      allowed_values: []
      pattern: null
      example_value: exception-maintenance-17
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: authorizer_ref
      labels:
        zh: 授权者引用
        en: authorizer reference
        ja: 認可者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 有权批准该例外的主体。
        en: Principal authorized to approve the exception.
        ja: 例外を承認する権限主体です。
      allowed_values: []
      pattern: null
      example_value: security-admin-4
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: scope_ref
      labels:
        zh: 例外范围引用
        en: exception scope reference
        ja: 例外範囲参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定例外适用主体、动作和资源。
        en: Limits principals, actions, and resources to which the exception applies.
        ja: 例外が適用される主体、操作、資源を限定します。
      allowed_values: []
      pattern: null
      example_value: scope-maintenance-17
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: reason
      labels:
        zh: 例外理由
        en: exception reason
        ja: 例外理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明偏离常规规则的业务和风险理由。
        en: Business and risk rationale for deviating from the ordinary rule.
        ja: 通常規則から逸脱する業務・リスク理由です。
      allowed_values: []
      pattern: null
      example_value: scheduled index repair
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: valid_from
      labels:
        zh: 开始时间
        en: valid from
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 例外最早可参与求值的时刻。
        en: Earliest instant when the exception may participate in evaluation.
        ja: 例外が評価に参加できる最早時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:00:00Z
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: valid_until
      labels:
        zh: 结束时间
        en: valid until
        ja: 終了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 例外停止适用的明确时刻。
        en: Explicit instant when the exception ceases to apply.
        ja: 例外適用が終了する明示時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:00:00Z
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: compensating_controls
      labels:
        zh: 补偿控制
        en: compensating controls
        ja: 補償制御
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 例外生效期间仍必须满足的风险控制。
        en: Risk controls that remain mandatory while the exception is active.
        ja: 例外有効中も必須となるリスク制御です。
      allowed_values: []
      pattern: null
      example_value:
        - read-only sandbox
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyException-example-positive-manual-001
    kind: positive
    labels:
      zh: 策略例外正例
      en: Positive policy exception case
      ja: ポリシー例外の正例
    scenario_id: null
    descriptions:
      zh: security-admin-4 为一次索引修复签发 exception-maintenance-17，仅允许一小时只读沙箱访问；请求超出该窗口即不匹配。
      en: security-admin-4 issues exception-maintenance-17 for an index repair, allowing one hour of read-only sandbox access; a request outside that window does not match.
      ja: security-admin-4 は索引修復用 exception-maintenance-17 を発行し、一時間の読取専用サンドボックスだけを許可します。時間外要求は一致しません。
    field_values:
      exception_id: exception-maintenance-17
      authorizer_ref: security-admin-4
      scope_ref: scope-maintenance-17
      reason: scheduled index repair
      valid_from: 2026-07-16T01:00:00Z
      valid_until: 2026-07-16T02:00:00Z
      compensating_controls:
        - read-only sandbox
    related_node_ids:
      - PolicyException
      - PolicyRule
      - PolicyEvaluation
    related_relation_ids:
      - PolicyRule-has_exception-PolicyException
      - PolicyEvaluation-applies-PolicyException
    expected_result:
      zh: 只有全部范围、时间和补偿控制匹配的评估才能应用该例外。
      en: Only an evaluation matching every scope, time, and compensating-control requirement may apply the exception.
      ja: 範囲・時間・補償制御をすべて満たす評価だけが例外を適用できます。
    why_valid_or_invalid:
      zh: 签发者、理由、范围、期限和控制均明确，例外可被独立撤销和审计。
      en: Issuer, rationale, scope, duration, and controls are explicit, making the exception independently revocable and auditable.
      ja: 発行者、理由、範囲、期限、制御が明示され、例外を独立に取消・監査できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-exception-001
      - claim-policy-exception-002
  - id: PolicyException-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 策略例外边界反例
      en: Boundary counterexample for policy exception
      ja: ポリシー例外の境界反例
    scenario_id: null
    descriptions:
      zh: 条件 context.maintenance == true 只是 PolicyCondition；没有授权者、期限和补偿控制，不能据此当作策略例外。
      en: The condition context.maintenance == true is only a PolicyCondition; without an authorizer, interval, and compensating controls it is not a PolicyException.
      ja: 条件 context.maintenance == true は PolicyCondition にすぎず、認可者・期間・補償制御がないため PolicyException ではありません。
    field_values: {}
    related_node_ids:
      - PolicyException
      - PolicyCondition
      - PolicyRule
    related_relation_ids:
      - PolicyRule-has_condition-PolicyCondition
    expected_result:
      zh: 该谓词仍作为普通条件求值，不获得豁免身份。
      en: The predicate remains an ordinary condition and receives no waiver identity.
      ja: 述語は通常条件として評価され、免除の同一性を得ません。
    why_valid_or_invalid:
      zh: 上下文事实可以触发已存在的例外，但不能自行创建有权威来源的例外。
      en: A context fact may trigger an existing exception but cannot create an authority-backed exception by itself.
      ja: 文脈事実は既存例外を起動できますが、権限根拠を持つ例外を単独で作れません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-exception-001
      - claim-policy-exception-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PolicyEffect
    shared_parent_concept_id: PolicyRule
    differentia:
      zh: PolicyException 在有限范围内改变通常规则适用；PolicyEffect 声明规则条件成立时的正常规范结果。例外不等于规则效果。
      en: PolicyException changes ordinary rule application within a bounded scope; PolicyEffect declares the normal normative outcome when rule conditions hold. An exception is not the rule effect.
      ja: PolicyException は限定範囲で通常規則適用を変え、PolicyEffect は条件成立時の通常規範結果を宣言します。例外は規則効果ではありません。
    source_claims:
      - claim-policy-exception-001
parent_relation:
  id: PolicyRule-has_exception-PolicyException
  predicate: has_exception
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有限定例外
    en: has bounded exception
    ja: 限定例外を持つ
  definitions:
    zh: PolicyRule 明确关联一个由授权者、范围、期限和补偿控制限定的 PolicyException；未匹配或失效例外不改变规则通常求值。
    en: A PolicyRule explicitly associates a PolicyException bounded by authorizer, scope, time, and compensating controls; a nonmatching or inactive exception does not alter ordinary rule evaluation.
    ja: PolicyRule は認可者・範囲・期間・補償制御で限定された PolicyException を明示関連し、不一致または無効例外は通常評価を変えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: exception_of
    labels:
      zh: 是规则例外
      en: is exception of
      ja: 規則の例外である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyRule-has_exception-PolicyException-example-positive-manual-001
      kind: positive
      labels:
        zh: 具有限定例外正例
        en: Positive has bounded exception case
        ja: 限定例外を持つの正例
      scenario_id: null
      descriptions:
        zh: deny-maintenance-write 关联 exception-maintenance-17，且只有指定维护主体、时间窗和只读沙箱全部匹配时适用。
        en: deny-maintenance-write has exception-maintenance-17, applicable only when named maintenance principal, time window, and read-only sandbox all match.
        ja: deny-maintenance-write は exception-maintenance-17 を持ち、指定保守主体・時間窓・読取専用サンドボックスがすべて一致する場合だけ適用します。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyException
      related_relation_ids:
        - PolicyRule-has_exception-PolicyException
      expected_result:
        zh: 规则可枚举该例外，但每次评估仍须单独证明其有效。
        en: The rule enumerates the exception, while each evaluation separately proves it effective.
        ja: 規則は例外を列挙し、各評価が有効性を個別証明します。
      why_valid_or_invalid:
        zh: 组成关系只声明可用例外，不声明某次请求已匹配。
        en: Composition declares an available exception, not that one request matched it.
        ja: 構成関係は利用可能例外を宣言し、特定要求一致を宣言しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
    - id: PolicyRule-has_exception-PolicyException-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 具有限定例外边界反例
        en: Boundary counterexample for has bounded exception
        ja: 限定例外を持つの境界反例
      scenario_id: null
      descriptions:
        zh: 管理员在聊天中说“这次可以”但没有例外标识、期限或授权依据，不能建立 has_exception。
        en: An administrator's chat message saying 'okay this time' lacks exception identity, interval, and authority basis and cannot establish has_exception.
        ja: 管理者チャット『今回はよい』は例外ID・期間・権限根拠を欠き has_exception を作れません。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyException
      related_relation_ids:
        - PolicyRule-has_exception-PolicyException
      expected_result:
        zh: 该消息仅作为未结构化输入处理，原规则保持不变。
        en: The message remains unstructured input and the original rule is unchanged.
        ja: メッセージは非構造入力のまま元規則は変わりません。
      why_valid_or_invalid:
        zh: 例外必须是可审计的规范组成而非即时口头许可。
        en: An exception must be auditable normative content, not ad hoc verbal permission.
        ja: 例外は監査可能な規範構成であり即席口頭許可ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-exception-001
        - claim-policy-exception-002
  source_claims:
    - claim-policy-exception-001
    - claim-policy-exception-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-policy-exception-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-exception-002
    source: eng-security-nist-abac
    supports: NIST defines authorization as evaluation of subject, object, requested operation, and environment attributes against policy, rules, or relationships describing allowed operations.
    locator: "NIST SP 800-162, Section 3: ABAC definition using subject, object, operation, environment attributes, policy, and rules"
    evidence_kind: official
    confidence: high
    review_status: accepted
