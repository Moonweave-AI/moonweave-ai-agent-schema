      en: policy exception - OPA Rego policy evaluation
      ja: ポリシー例外 - OPA Rego ポリシー評価
    descriptions: {zh: "策略例外(PolicyException) [PolicyException]: 由明确授权者签发、范围和期限均受限的规则适用偏离。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: valid_from, authorizer_ref, valid_until.", en: "policy exception (PolicyException) [PolicyException]: A rule-applicability deviation issued by an identified authority and bounded by scope and time.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include valid_from, authorizer_ref, valid_until.", ja: "ポリシー例外(PolicyException) [PolicyException]: 識別可能な権限者が発行し、範囲と期限で限定された規則適用の例外です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: valid_from, authorizer_ref, valid_until."}
    field_values:
      authorizer_ref: security-admin-4
      exception_id: exception-maintenance-17
      reason: "scheduled index repair"
      scope_ref: scope-maintenance-17
      valid_from: "2026-07-16T01:00:00Z"
      valid_until: "2026-07-16T02:00:00Z"
    related_node_ids:
      - PolicyCondition
      - PolicyEvaluation
      - PolicyException
      - PolicyRule
    related_relation_ids:
