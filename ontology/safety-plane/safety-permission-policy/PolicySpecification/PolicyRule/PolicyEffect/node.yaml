schema: moonweave.ai/ontology-node/v1
id: PolicyEffect
kind: concept
status: accepted
labels:
  zh: 策略效果
  en: policy effect
  ja: ポリシー効果
semantics:
  short_definition:
    zh: 策略规则在适用时预先规定的规范结果及其义务，而不是已经执行的动作。
    en: The normative outcome and obligations prescribed in advance for an applicable rule, not an action already executed.
    ja: 規則が適用された場合にあらかじめ定める規範結果と義務であり、実行済み操作ではありません。
  definition:
    zh: 策略效果是 PolicyRule 的规范组成项，对应 XACML 3.0 §5.21 中必需且只能取 Permit 或 Deny 的 Effect。它可关联仅在同一效果进入最终决定时返回的 ObligationExpressions 与 AdviceExpressions；defer、NotApplicable 和 Indeterminate 属于评估或产品工作流的 PolicyDecision 结果，不是 XACML Rule Effect。
    en: A PolicyEffect is the normative component of a PolicyRule corresponding to the required XACML 3.0 §5.21 Effect, whose only values are Permit and Deny. It may associate ObligationExpressions and AdviceExpressions returned only when the matching effect contributes to the final decision. Defer, NotApplicable, and Indeterminate are evaluation or product-workflow PolicyDecision outcomes, not XACML Rule Effects.
    ja: PolicyEffect は PolicyRule の規範構成項で、XACML 3.0 §5.21 の必須 Effect に対応し、値は Permit または Deny のみです。同じ効果が最終判断へ寄与した場合に返す ObligationExpressions と AdviceExpressions を関連付けられます。defer・NotApplicable・Indeterminate は評価または製品 workflow の PolicyDecision 結果で、XACML Rule Effect ではありません。
  why_needed:
    zh: 该节点消除旧 PolicyAction 对“规则预设效果”和“执行动作”的混用，并把 Rule Effect 严格限制为 Permit/Deny，使暂缓、组合失败和执行门控留在各自的决定与活动层。
    en: It removes the old PolicyAction conflation of prescribed rule effect and enforcement action and restricts Rule Effect to Permit/Deny, leaving deferment, combining failure, and enforcement gates in their respective decision and activity layers.
    ja: 旧 PolicyAction による規定 Rule Effect と執行动作の混同を解消し、Rule Effect を Permit/Deny に限定して、保留・結合失敗・執行 gate を各 decision・activity 層に残します。
  includes:
    - zh: 包含 Moonweave 效果标识、permit/deny 结果，以及与该效果匹配的可选义务和建议表达式。
      en: Includes a Moonweave effect identity, permit/deny outcome, and optional obligation and advice expressions associated with that effect.
      ja: Moonweave 効果 identity、permit/deny 結果、その効果に対応する任意 obligation・advice expression を含みます。
  excludes:
    - zh: 不包含 defer、NotApplicable 或 Indeterminate，也不包含已经发生的副作用、执行路由、沙箱实例、脱敏活动或最终 PolicyDecision。
      en: Excludes defer, NotApplicable, and Indeterminate as well as enacted side effects, execution routes, sandbox instances, redaction activities, and final PolicyDecisions.
      ja: defer・NotApplicable・Indeterminate、および実施済み副作用、実行経路、sandbox 実体、秘匿活動、最終 PolicyDecision を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - effect_id
  fields:
    - id: effect_id
      labels:
        zh: 效果标识
        en: effect ID
        ja: 効果ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Moonweave 的图谱身份扩展，用于稳定引用一条规则所规定的唯一 Effect；XACML 本身把 Effect 作为 Rule 的必需属性而非独立带 ID 元素。
        en: A Moonweave graph-identity extension for stably referencing the single Effect prescribed by a rule; XACML itself models Effect as a required Rule attribute rather than a separately identified element.
        ja: 規則が規定する唯一 Effect を安定参照する Moonweave graph identity 拡張です。XACML 自体は Effect を独立 ID 要素ではなく Rule の必須属性として表します。
      allowed_values: []
      pattern: null
      example_value: deny-effect
      source_claims:
        - claim-policy-effect-003
        - claim-policy-effect-002
    - id: outcome
      labels:
        zh: 规范结果
        en: normative outcome
        ja: 規範結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 XACML Rule 的 Effect 值，只能为 permit 或 deny；它是规则内容，不是一次评估产生的决定。
        en: The XACML Rule Effect value, restricted to permit or deny; it is rule content, not a decision produced by an evaluation.
        ja: XACML Rule の Effect 値で permit または deny のみに限定され、評価が生成する判断ではなく規則内容です。
      allowed_values:
        - id: PolicyEffectPermit
          value: permit
          labels:
            zh: 允许
            en: permit
            ja: 許可
          definitions:
            zh: 规则适用且条件为真时贡献 Permit。
            en: The Rule contributes Permit when applicable and its Condition is true.
            ja: 規則が適用され Condition が真のとき Permit を寄与します。
          status: accepted
          source_claims:
            - claim-policy-effect-004
        - id: PolicyEffectDeny
          value: deny
          labels:
            zh: 拒绝
            en: deny
            ja: 拒否
          definitions:
            zh: 规则适用且条件为真时贡献 Deny。
            en: The Rule contributes Deny when applicable and its Condition is true.
            ja: 規則が適用され Condition が真のとき Deny を寄与します。
          status: accepted
          source_claims:
            - claim-policy-effect-005
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-effect-006
        - claim-policy-effect-002
    - id: obligations
      labels:
        zh: 结果义务
        en: result obligations
        ja: 結果義務
      datatype: json
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 对应 XACML ObligationExpressions；只有表达式的 FulfillOn 与本规则 Effect 一致且该效果进入最终决定时，结果中才返回必须履行的义务。
        en: XACML ObligationExpressions. A mandatory obligation is returned only when its FulfillOn matches this Rule Effect and that effect contributes to the final decision.
        ja: XACML ObligationExpressions に対応します。FulfillOn が当該 Rule Effect と一致し、その効果が最終判断へ寄与した場合だけ、履行必須の obligation が結果へ返されます。
      allowed_values: []
      pattern: null
      example_value:
        - record denial reason
      source_claims:
        - claim-policy-effect-007
        - claim-policy-effect-002
    - id: advice
      labels:
        zh: 建议
        en: advice
        ja: 助言
      datatype: json
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 对应 XACML AdviceExpressions；只有表达式的 AppliesTo 与本规则 Effect 一致且该效果进入最终决定时才返回，执行方可忽略而不改变授权结果。
        en: XACML AdviceExpressions. Advice is returned only when AppliesTo matches this Rule Effect and that effect contributes to the final decision; enforcement may ignore it without changing the authorization result.
        ja: XACML AdviceExpressions に対応します。AppliesTo が当該 Rule Effect と一致し、その効果が最終判断へ寄与した場合だけ返され、執行側が無視しても認可結果は変わりません。
      allowed_values: []
      pattern: null
      example_value:
        - request human approval
      source_claims:
        - claim-policy-effect-008
        - claim-policy-effect-002
  constraints: []
  required_relation_constraints: []
