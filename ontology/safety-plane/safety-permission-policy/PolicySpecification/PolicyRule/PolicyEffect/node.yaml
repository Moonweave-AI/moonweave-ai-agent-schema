schema: moonweave.ai/ontology-node/v1
id: PolicyEffect
kind: concept
status: accepted
labels:
  zh: 策略效果
  en: policy effect
  ja: ポリシー効果
semantics:
  short_definition:
    zh: 策略规则在适用时预先规定的规范结果及其义务，而不是已经执行的动作。
    en: The normative outcome and obligations prescribed in advance for an applicable rule, not an action already executed.
    ja: 規則が適用された場合にあらかじめ定める規範結果と義務であり、実行済み操作ではありません。
  definition:
    zh: 策略效果是 PolicyRule 的规范组成项，对应 XACML 3.0 §5.21 中必需且只能取 Permit 或 Deny 的 Effect。它可关联仅在同一效果进入最终决定时返回的 ObligationExpressions 与 AdviceExpressions；defer、NotApplicable 和 Indeterminate 属于评估或产品工作流的 PolicyDecision 结果，不是 XACML Rule Effect。
    en: A PolicyEffect is the normative component of a PolicyRule corresponding to the required XACML 3.0 §5.21 Effect, whose only values are Permit and Deny. It may associate ObligationExpressions and AdviceExpressions returned only when the matching effect contributes to the final decision. Defer, NotApplicable, and Indeterminate are evaluation or product-workflow PolicyDecision outcomes, not XACML Rule Effects.
    ja: PolicyEffect は PolicyRule の規範構成項で、XACML 3.0 §5.21 の必須 Effect に対応し、値は Permit または Deny のみです。同じ効果が最終判断へ寄与した場合に返す ObligationExpressions と AdviceExpressions を関連付けられます。defer・NotApplicable・Indeterminate は評価または製品 workflow の PolicyDecision 結果で、XACML Rule Effect ではありません。
  why_needed:
    zh: 该节点消除旧 PolicyAction 对“规则预设效果”和“执行动作”的混用，并把 Rule Effect 严格限制为 Permit/Deny，使暂缓、组合失败和执行门控留在各自的决定与活动层。
    en: It removes the old PolicyAction conflation of prescribed rule effect and enforcement action and restricts Rule Effect to Permit/Deny, leaving deferment, combining failure, and enforcement gates in their respective decision and activity layers.
    ja: 旧 PolicyAction による規定 Rule Effect と執行动作の混同を解消し、Rule Effect を Permit/Deny に限定して、保留・結合失敗・執行 gate を各 decision・activity 層に残します。
  includes:
    - zh: 包含 Moonweave 效果标识、permit/deny 结果，以及与该效果匹配的可选义务和建议表达式。
      en: Includes a Moonweave effect identity, permit/deny outcome, and optional obligation and advice expressions associated with that effect.
      ja: Moonweave 効果 identity、permit/deny 結果、その効果に対応する任意 obligation・advice expression を含みます。
  excludes:
    - zh: 不包含 defer、NotApplicable 或 Indeterminate，也不包含已经发生的副作用、执行路由、沙箱实例、脱敏活动或最终 PolicyDecision。
      en: Excludes defer, NotApplicable, and Indeterminate as well as enacted side effects, execution routes, sandbox instances, redaction activities, and final PolicyDecisions.
      ja: defer・NotApplicable・Indeterminate、および実施済み副作用、実行経路、sandbox 実体、秘匿活動、最終 PolicyDecision を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - effect_id
  fields:
    - id: effect_id
      labels:
        zh: 效果标识
        en: effect ID
        ja: 効果ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Moonweave 的图谱身份扩展，用于稳定引用一条规则所规定的唯一 Effect；XACML 本身把 Effect 作为 Rule 的必需属性而非独立带 ID 元素。
        en: A Moonweave graph-identity extension for stably referencing the single Effect prescribed by a rule; XACML itself models Effect as a required Rule attribute rather than a separately identified element.
        ja: 規則が規定する唯一 Effect を安定参照する Moonweave graph identity 拡張です。XACML 自体は Effect を独立 ID 要素ではなく Rule の必須属性として表します。
      allowed_values: []
      pattern: null
      example_value: deny-effect
      source_claims:
        - claim-policy-effect-003
        - claim-policy-effect-002
    - id: outcome
      labels:
        zh: 规范结果
        en: normative outcome
        ja: 規範結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 XACML Rule 的 Effect 值，只能为 permit 或 deny；它是规则内容，不是一次评估产生的决定。
        en: The XACML Rule Effect value, restricted to permit or deny; it is rule content, not a decision produced by an evaluation.
        ja: XACML Rule の Effect 値で permit または deny のみに限定され、評価が生成する判断ではなく規則内容です。
      allowed_values:
        - id: PolicyEffectPermit
          value: permit
          labels:
            zh: 允许
            en: permit
            ja: 許可
          definitions:
            zh: 规则适用且条件为真时贡献 Permit。
            en: The Rule contributes Permit when applicable and its Condition is true.
            ja: 規則が適用され Condition が真のとき Permit を寄与します。
          status: accepted
          source_claims:
            - claim-policy-effect-004
        - id: PolicyEffectDeny
          value: deny
          labels:
            zh: 拒绝
            en: deny
            ja: 拒否
          definitions:
            zh: 规则适用且条件为真时贡献 Deny。
            en: The Rule contributes Deny when applicable and its Condition is true.
            ja: 規則が適用され Condition が真のとき Deny を寄与します。
          status: accepted
          source_claims:
            - claim-policy-effect-005
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-effect-006
        - claim-policy-effect-002
    - id: obligations
      labels:
        zh: 结果义务
        en: result obligations
        ja: 結果義務
      datatype: json
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 对应 XACML ObligationExpressions；只有表达式的 FulfillOn 与本规则 Effect 一致且该效果进入最终决定时，结果中才返回必须履行的义务。
        en: XACML ObligationExpressions. A mandatory obligation is returned only when its FulfillOn matches this Rule Effect and that effect contributes to the final decision.
        ja: XACML ObligationExpressions に対応します。FulfillOn が当該 Rule Effect と一致し、その効果が最終判断へ寄与した場合だけ、履行必須の obligation が結果へ返されます。
      allowed_values: []
      pattern: null
      example_value:
        - record denial reason
      source_claims:
        - claim-policy-effect-007
        - claim-policy-effect-002
    - id: advice
      labels:
        zh: 建议
        en: advice
        ja: 助言
      datatype: json
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 对应 XACML AdviceExpressions；只有表达式的 AppliesTo 与本规则 Effect 一致且该效果进入最终决定时才返回，执行方可忽略而不改变授权结果。
        en: XACML AdviceExpressions. Advice is returned only when AppliesTo matches this Rule Effect and that effect contributes to the final decision; enforcement may ignore it without changing the authorization result.
        ja: XACML AdviceExpressions に対応します。AppliesTo が当該 Rule Effect と一致し、その効果が最終判断へ寄与した場合だけ返され、執行側が無視しても認可結果は変わりません。
      allowed_values: []
      pattern: null
      example_value:
        - request human approval
      source_claims:
        - claim-policy-effect-008
        - claim-policy-effect-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyEffect-example-positive-manual-001
    kind: positive
    labels:
      zh: 策略效果正例
      en: Positive policy effect case
      ja: ポリシー効果の正例
    scenario_id: null
    descriptions:
      zh: 规则 deny-unapproved-write 的 PolicyEffect 为 deny，并要求在最终拒绝时记录决定理由；此时尚未对任何具体请求作出决定。
      en: Rule deny-unapproved-write has a deny PolicyEffect and requires recording a decision reason when denial is final; no concrete request has yet been decided.
      ja: 規則 deny-unapproved-write の PolicyEffect は deny で、最終拒否時に判断理由を記録する義務を持ちますが、具体要求はまだ判断されていません。
    field_values:
      effect_id: deny-effect
      outcome: deny
      obligations:
        - record denial reason
      advice: []
    related_node_ids:
      - PolicyEffect
      - PolicyRule
    related_relation_ids:
      - PolicyRule-prescribes-PolicyEffect
    expected_result:
      zh: 图谱显示规则预设 deny 效果，但不生成 DenyDecision 实例。
      en: The graph shows the rule's prescribed deny effect without creating a DenyDecision instance.
      ja: グラフは規則の deny 効果を示しますが DenyDecision 実体は生成しません。
    why_valid_or_invalid:
      zh: 规范效果属于策略内容，具体决定必须等到请求和其他适用规则被评估后产生。
      en: The effect belongs to policy content; a concrete decision requires evaluation of a request and all other applicable rules.
      ja: 効果は方針内容であり、具体判断には要求と他の適用規則の評価が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-effect-001
      - claim-policy-effect-002
  - id: PolicyEffect-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 策略效果边界反例
      en: Boundary counterexample for policy effect
      ja: ポリシー効果の境界反例
    scenario_id: null
    descriptions:
      zh: decision-88 是对 request-42 的 DenyDecision，记录了决定时间和决定规则；它不是规则中预先声明的 PolicyEffect。
      en: decision-88 is a DenyDecision for request-42 with decision time and determining rules; it is not the PolicyEffect prescribed in the rule.
      ja: decision-88 は request-42 の DenyDecision で判断時刻と決定規則を持ち、規則内の PolicyEffect ではありません。
    field_values: {}
    related_node_ids:
      - PolicyEffect
      - DenyDecision
      - PolicyDecision
    related_relation_ids:
      - DenyDecision-is_a-PolicyDecision
    expected_result:
      zh: decision-88 保持评估结果身份，规范效果仍留在规则节点下。
      en: decision-88 remains an evaluation result, while the normative effect remains under the rule.
      ja: decision-88 は評価結果の同一性を保ち、規範効果は規則配下に残ります。
    why_valid_or_invalid:
      zh: 二者可能具有相同的 deny 值，但身份分别由规范位置和评估运行决定。
      en: Both can carry the value deny, but their identities are determined by normative placement and evaluation occurrence respectively.
      ja: 両者は deny 値を持てますが、同一性は規範位置と評価実行によって別々に決まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-effect-001
      - claim-policy-effect-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PolicyCondition
    shared_parent_concept_id: PolicyRule
    differentia:
      zh: PolicyEffect 回答条件成立后规则贡献什么结果；PolicyCondition 回答规则是否适用。结果规范与适用谓词不能互换。
      en: PolicyEffect answers what outcome a rule contributes when applicable; PolicyCondition answers whether the rule applies. Normative result and applicability predicate are not interchangeable.
      ja: PolicyEffect は適用時に規則が与える結果、PolicyCondition は規則適用可否に答え、規範結果と適用述語は交換できません。
    source_claims:
      - claim-policy-effect-001
parent_relation:
  id: PolicyRule-prescribes-PolicyEffect
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 规定效果
    en: prescribes effect
    ja: 効果を規定する
  definitions:
    zh: PolicyRule 预先规定条件成立时贡献的 PolicyEffect 及结果义务；该规范效果只有经过评估与组合后才可能成为具体决定。
    en: A PolicyRule prescribes the PolicyEffect and result obligations contributed when its conditions hold; the normative effect becomes a concrete decision only after evaluation and combination.
    ja: PolicyRule は条件成立時に与える PolicyEffect と結果義務を事前規定し、規範効果は評価・結合後だけ具体判断になり得ます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由规则规定
      en: is prescribed by
      ja: 規則に規定される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyRule-prescribes-PolicyEffect-example-positive-manual-001
      kind: positive
      labels:
        zh: 规定效果正例
        en: Positive prescribes effect case
        ja: 効果を規定するの正例
      scenario_id: null
      descriptions:
        zh: deny-unapproved-write 规定 deny-effect，并要求最终拒绝时记录理由。
        en: deny-unapproved-write prescribes deny-effect and requires recording a reason when denial is final.
        ja: deny-unapproved-write は deny-effect を規定し、最終拒否時に理由記録を要求します。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyEffect
      related_relation_ids:
        - PolicyRule-prescribes-PolicyEffect
      expected_result:
        zh: 规则查询返回预设 deny，而不会创建 request 特定决定。
        en: The rule query returns prescribed deny without creating a request-specific decision.
        ja: 規則照会は所定 deny を返しますが要求固有判断を作りません。
      why_valid_or_invalid:
        zh: 边表达规范组成和预设结果，不表达执行动作。
        en: The edge expresses normative composition and prescribed outcome, not an enforcement action.
        ja: 辺は規範構成と予定結果を表し執行动作ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-effect-001
        - claim-policy-effect-002
    - id: PolicyRule-prescribes-PolicyEffect-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 规定效果边界反例
        en: Boundary counterexample for prescribes effect
        ja: 効果を規定するの境界反例
      scenario_id: null
      descriptions:
        zh: decision-44 的 deny 是 evaluation-44 的输出，不能反向当作规则所含 PolicyEffect。
        en: decision-44's deny is output of evaluation-44 and cannot be reversed into the rule's contained PolicyEffect.
        ja: decision-44 の deny は evaluation-44 の出力で、規則内 PolicyEffect へ逆変換できません。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyEffect
      related_relation_ids:
        - PolicyRule-prescribes-PolicyEffect
      expected_result:
        zh: 决定保持运行结果，规则效果保持规范片段。
        en: The decision remains runtime result and the rule effect remains normative component.
        ja: 判断は実行結果、規則効果は規範構成のままです。
      why_valid_or_invalid:
        zh: 相同结果值不足以证明规范组成关系。
        en: The same outcome value is insufficient to establish normative composition.
        ja: 同じ結果値だけでは規範構成関係を証明しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-effect-001
        - claim-policy-effect-002
  source_claims:
    - claim-policy-effect-001
    - claim-policy-effect-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-policy-effect-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-002
    source: eng-policy-opa
    supports: OPA documents structured input evaluated against policy and data to produce a policy decision, while enforcement remains the caller's responsibility.
    locator: Open Policy Agent documentation > What is OPA? > policy input, evaluation, decision output, and separation from enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-003
    source: eng-policy-xacml-3
    supports: XACML requires one Effect on Rule. Moonweave introduces effect_id only to reference that required component as an ontology node.
    locator: "OASIS XACML 3.0 Core, §5.21 Rule element: required Effect attribute"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-004
    source: eng-policy-xacml-3
    supports: Permit is one of the two allowed XACML Rule Effect values.
    locator: "OASIS XACML 3.0 Core, §5.21 Rule element: Effect value Permit"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-005
    source: eng-policy-xacml-3
    supports: Deny is one of the two allowed XACML Rule Effect values.
    locator: "OASIS XACML 3.0 Core, §5.21 Rule element: Effect value Deny"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-006
    source: eng-policy-xacml-3
    supports: XACML requires the Rule Effect attribute and restricts it to Permit or Deny.
    locator: "OASIS XACML 3.0 Core, §5.21 Rule element: required Effect attribute with Permit or Deny values"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-007
    source: eng-policy-xacml-3
    supports: XACML Rule may contain ObligationExpressions, and matching obligations must be returned and fulfilled with the corresponding Permit or Deny decision.
    locator: OASIS XACML 3.0 Core, §5.21 Rule element, §§5.37-5.38 ObligationExpressions, and §7.18 obligations and advice
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-effect-008
    source: eng-policy-xacml-3
    supports: XACML Rule may contain AdviceExpressions; matching advice may be returned with the corresponding decision and is not mandatory to enforce.
    locator: OASIS XACML 3.0 Core, §5.21 Rule element, §§5.39-5.40 AdviceExpressions, and §7.18 obligations and advice
    evidence_kind: normative
    confidence: high
    review_status: accepted
