schema: moonweave.ai/ontology-node/v1
id: PolicyEffect
kind: concept
labels:
  zh: 策略效果
  en: policy effect
  ja: ポリシー効果
semantics:
  short_definition:
    zh: PolicyRule 在条件满足时产生的 permit 或 deny 效果规范。
    en: The permit or deny effect specification a PolicyRule produces when its condition is satisfied.
    ja: PolicyRule の condition 成立時に生じる permit/deny effect specification。
  definition:
    zh: PolicyEffect 声明 permit/deny（对齐 XACML Permit/Deny effect 与 OPA allow/deny 规则结论）。MCP destructiveHint 映射 deny-side-effect、readOnlyHint 映射 permit-read-only；效果属于规则规范，PolicyDecision 是一次求值对这些效果的组合结果。
    en: PolicyEffect declares permit/deny (aligned with XACML Permit/Deny effects and OPA allow/deny rule conclusions). MCP destructiveHint maps to deny-side-effect, readOnlyHint to permit-read-only; effects belong to rule specification, PolicyDecision is combined evaluation of these effects.
    ja: PolicyEffect は permit/deny を宣言（XACML Permit/Deny、OPA allow/deny 整合）。MCP destructiveHint→deny-side-effect、readOnlyHint→permit-read-only。effect は rule spec 所属、PolicyDecision は组合 evaluation 結果。
  why_needed:
    zh: 必须区分规则固有效果与一次决定；否则无法解释 deny-overrides 下 allow 规则仍存在。
    en: Rule-level effects must be distinguished from one decision or deny-overrides with coexisting allow rules cannot be explained.
    ja: rule-level effect と一回 decision を分離しないと deny-overrides 下の共存 allow rule を説明できません。
  includes:
    - zh: 包含 Moonweave 效果标识、permit/deny 结果，以及与该效果匹配的可选义务和建议表达式。
      en: Includes a Moonweave effect identity, permit/deny outcome, and optional obligation and advice expressions associated with that effect.
      ja: Moonweave 効果 identity、permit/deny 結果、その効果に対応する任意 obligation・advice expression を含みます。
  excludes:
    - zh: 不包含 defer、NotApplicable 或 Indeterminate，也不包含已经发生的副作用、执行路由、沙箱实例、脱敏活动或最终 PolicyDecision。
      en: Excludes defer, NotApplicable, and Indeterminate as well as enacted side effects, execution routes, sandbox instances, redaction activities, and final PolicyDecisions.
      ja: defer・NotApplicable・Indeterminate、および実施済み副作用、実行経路、sandbox 実体、秘匿活動、最終 PolicyDecision を含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: PolicyRule 绑定单一 PolicyEffect；组合由 PolicyCombiningAlgorithm 完成。MCP annotation→effect 映射表应在 PolicySpecification 版本化维护。
    en: Each PolicyRule binds one PolicyEffect; combining is done by PolicyCombiningAlgorithm. MCP annotation→effect mapping tables should be versioned in PolicySpecification.
    ja: 各 PolicyRule は単一 PolicyEffect 绑定。组合は PolicyCombiningAlgorithm。MCP annotation→effect mapping は PolicySpecification で版管理。
  typical_input:
    - description: XACML rule effect.
      format: "RuleEffect: Permit | Deny"
      source_claims:
        - claim-policy-effect-design
  typical_output:
    - description: Effect on rule.
      format: '{"effect_id":"effect-deny-shell","effect_kind":"deny"}'
      source_claims:
        - claim-policy-effect-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - effect_id
  fields:
    - id: effect_id
      labels:
        zh: 效果标识
        en: effect ID
        ja: 効果ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Moonweave 的图谱身份扩展，用于稳定引用一条规则所规定的唯一 Effect；XACML 本身把 Effect 作为 Rule 的必需属性而非独立带 ID 元素。
        en: A Moonweave graph-identity extension for stably referencing the single Effect prescribed by a rule; XACML itself models Effect as a required Rule attribute rather than a separately identified element.
        ja: 規則が規定する唯一 Effect を安定参照する Moonweave graph identity 拡張です。XACML 自体は Effect を独立 ID 要素ではなく Rule の必須属性として表します。
      allowed_values: []
      pattern: null
      example_value: deny-effect
      source_claims:
        - claim-policy-effect-design
        - claim-policy-effect-design
    - id: outcome
      labels:
        zh: 规范结果
        en: normative outcome
        ja: 規範結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 XACML Rule 的 Effect 值，只能为 permit 或 deny；它是规则内容，不是一次评估产生的决定。
        en: The XACML Rule Effect value, restricted to permit or deny; it is rule content, not a decision produced by an evaluation.
        ja: XACML Rule の Effect 値で permit または deny のみに限定され、評価が生成する判断ではなく規則内容です。
      allowed_values:
        - id: PolicyEffectPermit
          value: permit
          labels:
            zh: 允许
            en: permit
            ja: 許可
          definitions:
            zh: 规则适用且条件为真时贡献 Permit。
            en: The Rule contributes Permit when applicable and its Condition is true.
            ja: 規則が適用され Condition が真のとき Permit を寄与します。
          source_claims:
            - claim-policy-effect-design
        - id: PolicyEffectDeny
          value: deny
          labels:
            zh: 拒绝
            en: deny
            ja: 拒否
          definitions:
            zh: 规则适用且条件为真时贡献 Deny。
            en: The Rule contributes Deny when applicable and its Condition is true.
            ja: 規則が適用され Condition が真のとき Deny を寄与します。
          source_claims:
            - claim-policy-effect-design
      pattern: null
      example_value: deny
      source_claims:
        - claim-policy-effect-design
        - claim-policy-effect-design
    - id: obligations
      labels:
        zh: 结果义务
        en: result obligations
        ja: 結果義務
      datatype: json
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 对应 XACML ObligationExpressions；只有表达式的 FulfillOn 与本规则 Effect 一致且该效果进入最终决定时，结果中才返回必须履行的义务。
        en: XACML ObligationExpressions. A mandatory obligation is returned only when its FulfillOn matches this Rule Effect and that effect contributes to the final decision.
        ja: XACML ObligationExpressions に対応します。FulfillOn が当該 Rule Effect と一致し、その効果が最終判断へ寄与した場合だけ、履行必須の obligation が結果へ返されます。
      allowed_values: []
      pattern: null
      example_value:
        - record denial reason
      source_claims:
        - claim-policy-effect-design
        - claim-policy-effect-design
    - id: advice
      labels:
        zh: 建议
        en: advice
        ja: 助言
      datatype: json
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 对应 XACML AdviceExpressions；只有表达式的 AppliesTo 与本规则 Effect 一致且该效果进入最终决定时才返回，执行方可忽略而不改变授权结果。
        en: XACML AdviceExpressions. Advice is returned only when AppliesTo matches this Rule Effect and that effect contributes to the final decision; enforcement may ignore it without changing the authorization result.
        ja: XACML AdviceExpressions に対応します。AppliesTo が当該 Rule Effect と一致し、その効果が最終判断へ寄与した場合だけ返され、執行側が無視しても認可結果は変わりません。
      allowed_values: []
      pattern: null
      example_value:
        - request human approval
      source_claims:
        - claim-policy-effect-design
        - claim-policy-effect-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyEffect-xacml-deny
    labels:
      zh: XACML Deny 效果
      en: XACML Deny effect
      ja: XACML Deny effect
    descriptions:
      zh: effect-deny-shell effect_kind=deny 对齐 XACML RuleEffect Deny。
      en: effect-deny-shell effect_kind=deny aligned with XACML RuleEffect Deny.
      ja: effect-deny-shell deny、XACML RuleEffect Deny 整合。
    example_source:
      product: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      version: RuleEffect Deny
    field_values:
      effect_id: effect-deny-shell
      effect_kind: deny
    related_node_ids:
      - PolicyEffect
      - PolicyRule
      - DenyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-effect-design
  - id: PolicyEffect-mcp-destructive
    labels:
      zh: MCP destructiveHint deny
      en: MCP destructiveHint deny
      ja: MCP destructiveHint deny
    descriptions:
      zh: effect-deny-destructive 由 MCP destructiveHint 注解导出。
      en: effect-deny-destructive derived from MCP destructiveHint annotation.
      ja: effect-deny-destructive MCP destructiveHint 由来。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: destructiveHint
    field_values:
      effect_id: effect-deny-destructive
      effect_kind: deny
    related_node_ids:
      - PolicyEffect
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-effect-design
  - id: PolicyEffect-opa-allow
    labels:
      zh: OPA allow 效果
      en: OPA allow effect
      ja: OPA allow effect
    descriptions:
      zh: effect-allow-read effect_kind=permit 对应 Rego allow 规则结论。
      en: effect-allow-read effect_kind=permit corresponds to Rego allow rule conclusion.
      ja: effect-allow-read permit、Rego allow 结论対応。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: allow effect
    field_values:
      effect_id: effect-allow-read
      effect_kind: permit
    related_node_ids:
      - PolicyEffect
      - AllowDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-effect-design
  - id: PolicyEffect-boundary-decision
    labels:
      zh: 决定不是效果
      en: Decision is not effect
      ja: decision≠effect
    descriptions:
      zh: decision-55 deny 是求值结果，不是 PolicyEffect 规范副本。
      en: decision-55 deny is evaluation result, not a PolicyEffect specification copy.
      ja: decision-55 deny は evaluation 結果で PolicyEffect spec 副本ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: effect versus decision
    field_values: {}
    related_node_ids:
      - PolicyEffect
      - PolicyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-effect-design
parent_relation:
  id: PolicyRule-prescribes-PolicyEffect
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 规定效果
    en: prescribes effect
    ja: 効果を規定する
  definitions:
    zh: PolicyRule 预先规定条件成立时贡献的 PolicyEffect 及结果义务；该规范效果只有经过评估与组合后才可能成为具体决定。
    en: A PolicyRule prescribes the PolicyEffect and result obligations contributed when its conditions hold; the normative effect becomes a concrete decision only after evaluation and combination.
    ja: PolicyRule は条件成立時に与える PolicyEffect と結果義務を事前規定し、規範効果は評価・結合後だけ具体判断になり得ます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由规则规定
      en: is prescribed by
      ja: 規則に規定される
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-effect-design
    - claim-policy-effect-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-policy-effect-design
    source: safety-permission-design
    supports: PolicyEffect is rule-level permit/deny declaration distinct from PolicyDecision.
    locator: Effect boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-effect-design
    source: xacml-3-core
    supports: XACML RuleEffect maps to PolicyEffect permit/deny kinds.
    locator: XACML effects
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-effect-design
    source: mcp-authorization-2025
    supports: MCP tool hint annotations map to PolicyEffect constraints.
    locator: Tool hints
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-effect-design
    source: opa-rego
    supports: OPA allow/deny rule conclusions map to PolicyEffect kinds.
    locator: Rego effects
    evidence_kind: design-inference
    confidence: high
