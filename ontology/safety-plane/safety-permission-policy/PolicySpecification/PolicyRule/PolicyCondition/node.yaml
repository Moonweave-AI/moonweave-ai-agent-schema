schema: moonweave.ai/ontology-node/v1
id: PolicyCondition
kind: concept
status: review
labels:
  zh: 策略条件
  en: policy condition
  ja: ポリシー条件
semantics:
  short_definition:
    zh: 在策略规则内对主体、动作、资源或上下文属性求值的布尔或三值谓词。
    en: A Boolean or three-valued predicate inside a policy rule over principal, action, resource, or context attributes.
    ja: 方針規則内で主体・操作・資源・文脈属性を評価する二値または三値述語です。
  definition:
    zh: 策略条件是 PolicyRule 的组成片段，规定规则何时适用。它记录表达语言、表达式、所需属性以及缺失属性的处理方式；条件的 true、false 或 indeterminate 结果参与规则求值，但条件本身不表示允许、拒绝或授权授予。
    en: A PolicyCondition is a component of a PolicyRule specifying when that rule applies. It records expression language, expression, required attributes, and missing-attribute behavior; its true, false, or indeterminate result participates in rule evaluation, but the condition itself is not a permit, deny, or authorization grant.
    ja: PolicyCondition は PolicyRule の構成片で、規則がいつ適用されるかを定めます。式言語、式、必要属性、属性欠落時の扱いを記録し、true・false・indeterminate の結果が規則評価に参加しますが、条件自体は許可・拒否・認可付与ではありません。
  why_needed:
    zh: 把条件独立出来，可以解释缺失证据为何导致不适用或暂缓，并避免把一个谓词误读为最终安全决定。
    en: Separating conditions explains why missing evidence yields not-applicable or deferment and prevents a predicate from being mistaken for a final safety decision.
    ja: 条件を分離することで、証拠欠落が非適用または保留になる理由を説明し、述語を最終安全判断と誤認しません。
  includes:
    - zh: 包含表达式、表达语言、所需属性集合、缺失属性语义和求值数据类型。
      en: Includes expression, expression language, required attributes, missing-attribute semantics, and evaluation data type.
      ja: 式、式言語、必要属性集合、属性欠落時の意味、評価データ型を含みます。
  excludes:
    - zh: 不包含规则效果、规则组合算法、已求值决定或可授予的权限范围。
      en: Excludes a rule effect, combining algorithm, evaluated decision, or grantable permission scope.
      ja: 規則効果、結合アルゴリズム、評価済み判断、付与可能な権限範囲を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - condition_id
  fields:
    - id: condition_id
      labels:
        zh: 条件标识
        en: condition ID
        ja: 条件ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在规则内稳定识别该条件。
        en: Stable identifier for the condition within a rule.
        ja: 規則内で条件を安定識別します。
      allowed_values: []
      pattern: null
      example_value: approved-write
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: expression_language
      labels:
        zh: 表达语言
        en: expression language
        ja: 式言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释条件表达式所需的求值语言。
        en: Evaluation language required to interpret the condition expression.
        ja: 条件式を解釈するための評価言語です。
      allowed_values: []
      pattern: null
      example_value: cedar
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: 条件式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对请求与上下文属性求值的规范谓词。
        en: Normative predicate evaluated over request and context attributes.
        ja: 要求と文脈属性に対して評価する規範述語です。
      allowed_values: []
      pattern: null
      example_value: context.approved == true
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: required_attributes
      labels:
        zh: 必需属性
        en: required attributes
        ja: 必要属性
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 求值该条件必须可用的属性路径。
        en: Attribute paths that must be available to evaluate the condition.
        ja: 条件評価に必要な属性パスです。
      allowed_values: []
      pattern: null
      example_value:
        - context.approved
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: missing_attribute_behavior
      labels:
        zh: 属性缺失处理
        en: missing-attribute behavior
        ja: 属性欠落時動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 必需属性缺失时返回的显式语义。
        en: Explicit semantic result when a required attribute is missing.
        ja: 必要属性が欠けた場合の明示的な意味結果です。
      allowed_values: []
      pattern: null
      example_value: indeterminate
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyCondition-example-positive-manual-001
    kind: positive
    labels:
      zh: 策略条件正例
      en: Positive policy condition case
      ja: ポリシー条件の正例
    scenario_id: null
    descriptions:
      zh: 条件 approved-write 使用 Cedar 表达式检查 context.approved，若属性缺失则返回 indeterminate，而不是默认视为 true。
      en: Condition approved-write evaluates context.approved in Cedar and returns indeterminate when the attribute is absent instead of defaulting to true.
      ja: 条件 approved-write は Cedar で context.approved を評価し、属性欠落時は true とせず indeterminate を返します。
    field_values:
      condition_id: approved-write
      expression_language: cedar
      expression: context.approved == true
      required_attributes:
        - context.approved
      missing_attribute_behavior: indeterminate
    related_node_ids:
      - PolicyCondition
      - PolicyRule
    related_relation_ids:
      - PolicyRule-has_condition-PolicyCondition
    expected_result:
      zh: 求值器可以区分 true、false 与证据缺失，并把结果交给包含该条件的规则。
      en: The evaluator distinguishes true, false, and missing evidence, then supplies that result to the containing rule.
      ja: 評価器は true・false・証拠欠落を区別し、結果を包含規則へ渡します。
    why_valid_or_invalid:
      zh: 条件只表达适用性，缺失属性处理被显式记录且不授予权限。
      en: The condition expresses applicability only; missing-attribute behavior is explicit and grants no authority.
      ja: 条件は適用性だけを表し、属性欠落動作は明示され、権限を付与しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-condition-001
      - claim-policy-condition-002
  - id: PolicyCondition-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 策略条件边界反例
      en: Boundary counterexample for policy condition
      ja: ポリシー条件の境界反例
    scenario_id: null
    descriptions:
      zh: scope-17 列出可调用的工具集合，它是 PermissionScope；即使策略条件引用该 scope，它也不是条件表达式。
      en: scope-17 lists callable tools and is a PermissionScope; even when a policy condition references that scope, the scope is not the condition expression.
      ja: scope-17 は呼出可能ツール集合を列挙する PermissionScope であり、条件が参照しても条件式そのものではありません。
    field_values: {}
    related_node_ids:
      - PolicyCondition
      - PermissionScope
      - AuthorizationRequest
    related_relation_ids:
      - AuthorizationRequest-requests-PermissionScope
    expected_result:
      zh: scope-17 保持权限范围身份，条件只通过字段值引用它。
      en: scope-17 remains a permission scope and is only referenced as data by the condition.
      ja: scope-17 は権限範囲の同一性を保ち、条件からデータとして参照されるだけです。
    why_valid_or_invalid:
      zh: 可授权范围描述权限边界，策略条件描述可求值谓词，二者不能因引用而合并。
      en: A grantable scope describes an authority boundary, while a condition describes an evaluable predicate; reference does not merge them.
      ja: 付与可能範囲は権限境界を、条件は評価述語を表し、参照によって統合されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-condition-001
      - claim-policy-condition-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PolicyException
    shared_parent_concept_id: PolicyRule
    differentia:
      zh: PolicyCondition 是每次求值的适用谓词；PolicyException 是由授权者签发、有范围与期限的规范偏离。上下文表达式没有授权元数据时只能是条件。
      en: PolicyCondition is an applicability predicate evaluated each time; PolicyException is an authority-issued, scope- and time-bounded normative deviation. A context expression without authority metadata is only a condition.
      ja: PolicyCondition は毎回評価する適用述語、PolicyException は権限者発行で範囲・期限付き規範逸脱です。権限メタデータのない文脈式は条件だけです。
    source_claims:
      - claim-policy-condition-001
parent_relation:
  id: PolicyRule-has_condition-PolicyCondition
  predicate: has_condition
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有条件
    en: has condition
    ja: 条件を持つ
  definitions:
    zh: PolicyRule 以 PolicyCondition 作为适用性组成片段；条件求值结果参与该规则，但不能单独充当规则或最终决定。
    en: A PolicyRule has a PolicyCondition as an applicability component; the condition result participates in that rule but cannot independently serve as the rule or final decision.
    ja: PolicyRule は適用性構成片として PolicyCondition を持ち、条件結果は規則へ参加しますが単独で規則や最終判断にはなりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: condition_of
    labels:
      zh: 是规则条件
      en: is condition of
      ja: 規則の条件である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyRule-has_condition-PolicyCondition-example-positive-manual-001
      kind: positive
      labels:
        zh: 具有条件正例
        en: Positive has condition case
        ja: 条件を持つの正例
      scenario_id: null
      descriptions:
        zh: deny-unapproved-write 具有 approved-write 条件，后者检查 context.approved 并声明缺失属性为 indeterminate。
        en: deny-unapproved-write has condition approved-write, which checks context.approved and declares missing attributes indeterminate.
        ja: deny-unapproved-write は approved-write 条件を持ち、context.approved を調べ欠落属性を indeterminate とします。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyCondition
      related_relation_ids:
        - PolicyRule-has_condition-PolicyCondition
      expected_result:
        zh: 规则求值读取该条件结果并保留条件标识。
        en: Rule evaluation reads the condition result and preserves its identity.
        ja: 規則評価は条件結果を読み条件識別子を保持します。
      why_valid_or_invalid:
        zh: 关系连接规则与可求值适用性片段，没有把条件提升为规则。
        en: The edge connects a rule to an evaluable applicability component without promoting the condition to a rule.
        ja: 辺は規則と評価可能適用片を結び、条件を規則へ昇格しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: PolicyRule-has_condition-PolicyCondition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 具有条件边界反例
        en: Boundary counterexample for has condition
        ja: 条件を持つの境界反例
      scenario_id: null
      descriptions:
        zh: scope-search-read 限定授权资源，但它是 PermissionScope 而非 deny-unapproved-write 的 PolicyCondition。
        en: scope-search-read limits authorized resources but is a PermissionScope, not a PolicyCondition of deny-unapproved-write.
        ja: scope-search-read は認可資源を限定しますが PermissionScope であり deny-unapproved-write の PolicyCondition ではありません。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyCondition
      related_relation_ids:
        - PolicyRule-has_condition-PolicyCondition
      expected_result:
        zh: 范围通过请求和授予关系查询，不建立 has_condition。
        en: The scope is queried through request and grant edges, with no has_condition assertion.
        ja: 範囲は要求・付与辺で照会し has_condition を作りません。
      why_valid_or_invalid:
        zh: 范围是可授权边界，条件是规则内谓词。
        en: A scope is a grantable boundary; a condition is a predicate inside a rule.
        ja: 範囲は付与可能境界、条件は規則内述語です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
  source_claims:
    - claim-policy-condition-001
    - claim-policy-condition-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations: []
