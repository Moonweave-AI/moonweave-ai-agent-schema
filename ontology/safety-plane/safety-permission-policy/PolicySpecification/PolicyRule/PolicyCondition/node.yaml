schema: moonweave.ai/ontology-node/v1
id: PolicyCondition
kind: concept
status: accepted
labels:
  zh: 策略条件
  en: policy condition
  ja: ポリシー条件
semantics:
  short_definition:
    zh: 在策略规则内对主体、动作、资源或上下文属性求值的布尔或三值谓词。
    en: A Boolean or three-valued predicate inside a policy rule over principal, action, resource, or context attributes.
    ja: 方針規則内で主体・操作・資源・文脈属性を評価する二値または三値述語です。
  definition:
    zh: 策略条件是 PolicyRule 的组成片段，规定规则何时适用。它记录表达语言、表达式、所需属性以及缺失属性的处理方式；条件的 true、false 或 indeterminate 结果参与规则求值，但条件本身不表示允许、拒绝或授权授予。
    en: A PolicyCondition is a component of a PolicyRule specifying when that rule applies. It records expression language, expression, required attributes, and missing-attribute behavior; its true, false, or indeterminate result participates in rule evaluation, but the condition itself is not a permit, deny, or authorization grant.
    ja: PolicyCondition は PolicyRule の構成片で、規則がいつ適用されるかを定めます。式言語、式、必要属性、属性欠落時の扱いを記録し、true・false・indeterminate の結果が規則評価に参加しますが、条件自体は許可・拒否・認可付与ではありません。
  why_needed:
    zh: 把条件独立出来，可以解释缺失证据为何导致不适用或暂缓，并避免把一个谓词误读为最终安全决定。
    en: Separating conditions explains why missing evidence yields not-applicable or deferment and prevents a predicate from being mistaken for a final safety decision.
    ja: 条件を分離することで、証拠欠落が非適用または保留になる理由を説明し、述語を最終安全判断と誤認しません。
  includes:
    - zh: 包含表达式、表达语言、所需属性集合、缺失属性语义和求值数据类型。
      en: Includes expression, expression language, required attributes, missing-attribute semantics, and evaluation data type.
      ja: 式、式言語、必要属性集合、属性欠落時の意味、評価データ型を含みます。
  excludes:
    - zh: 不包含规则效果、规则组合算法、已求值决定或可授予的权限范围。
      en: Excludes a rule effect, combining algorithm, evaluated decision, or grantable permission scope.
      ja: 規則効果、結合アルゴリズム、評価済み判断、付与可能な権限範囲を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - condition_id
  fields:
    - id: condition_id
      labels:
        zh: 条件标识
        en: condition ID
        ja: 条件ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在规则内稳定识别该条件。
        en: Stable identifier for the condition within a rule.
        ja: 規則内で条件を安定識別します。
      allowed_values: []
      pattern: null
      example_value: approved-write
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: expression_language
      labels:
        zh: 表达语言
        en: expression language
        ja: 式言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释条件表达式所需的求值语言。
        en: Evaluation language required to interpret the condition expression.
        ja: 条件式を解釈するための評価言語です。
      allowed_values: []
      pattern: null
      example_value: cedar
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: 条件式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对请求与上下文属性求值的规范谓词。
        en: Normative predicate evaluated over request and context attributes.
        ja: 要求と文脈属性に対して評価する規範述語です。
      allowed_values: []
      pattern: null
      example_value: context.approved == true
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: required_attributes
      labels:
        zh: 必需属性
        en: required attributes
        ja: 必要属性
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 求值该条件必须可用的属性路径。
        en: Attribute paths that must be available to evaluate the condition.
        ja: 条件評価に必要な属性パスです。
      allowed_values: []
      pattern: null
      example_value:
        - context.approved
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: missing_attribute_behavior
      labels:
        zh: 属性缺失处理
        en: missing-attribute behavior
        ja: 属性欠落時動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 必需属性缺失时返回的显式语义。
        en: Explicit semantic result when a required attribute is missing.
        ja: 必要属性が欠けた場合の明示的な意味結果です。
      allowed_values: []
      pattern: null
      example_value: indeterminate
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: policy-condition-cedar
    labels:
      zh: 策略条件 - Cedar 授权评估
      en: policy condition - Cedar authorization evaluation
      ja: ポリシー条件 - Cedar 認可評価
    descriptions: {zh: "策略条件(PolicyCondition) [PolicyCondition]: 在策略规则内对主体、动作、资源或上下文属性求值的布尔或三值谓词。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: expression_language, missing_attribute_behavior, condition_id.", en: "policy condition (PolicyCondition) [PolicyCondition]: A Boolean or three-valued predicate inside a policy rule over principal, action, resource, or context attributes.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include expression_language, missing_attribute_behavior, condition_id.", ja: "ポリシー条件(PolicyCondition) [PolicyCondition]: 方針規則内で主体・操作・資源・文脈属性を評価する二値または三値述語です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: expression_language, missing_attribute_behavior, condition_id."}
    field_values:
      condition_id: approved-write
      expression: "context.approved == true"
      expression_language: cedar
      missing_attribute_behavior: indeterminate
    related_node_ids:
      - AuthorizationRequest
      - PermissionScope
      - PolicyCondition
      - PolicyRule
    related_relation_ids:
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-policy-condition-001
      - claim-policy-condition-002
      - PermissionScope
      - PolicyCondition
      - PolicyRule
      - PolicyRule-has_condition-PolicyCondition
    example_source: Amazon Cedar
    source_claims:
      - claim-policy-condition-001
  - id: policy-condition-opa
    labels:
      zh: 策略条件 - OPA Rego 策略评估
      en: policy condition - OPA Rego policy evaluation
      ja: ポリシー条件 - OPA Rego ポリシー評価
    descriptions: {zh: "策略条件(PolicyCondition) [PolicyCondition]: 在策略规则内对主体、动作、资源或上下文属性求值的布尔或三值谓词。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: expression_language, missing_attribute_behavior, condition_id.", en: "policy condition (PolicyCondition) [PolicyCondition]: A Boolean or three-valued predicate inside a policy rule over principal, action, resource, or context attributes.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include expression_language, missing_attribute_behavior, condition_id.", ja: "ポリシー条件(PolicyCondition) [PolicyCondition]: 方針規則内で主体・操作・資源・文脈属性を評価する二値または三値述語です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: expression_language, missing_attribute_behavior, condition_id."}
    field_values:
      condition_id: approved-write
      expression: "context.approved == true"
      expression_language: cedar
      missing_attribute_behavior: indeterminate
    related_node_ids:
      - AuthorizationRequest
      - PermissionScope
      - PolicyCondition
      - PolicyRule
    related_relation_ids:
      - AuthorizationRequest
      - AuthorizationRequest-requests-PermissionScope
      - claim-policy-condition-001
      - claim-policy-condition-002
      - PermissionScope
      - PolicyCondition
      - PolicyRule
      - PolicyRule-has_condition-PolicyCondition
    example_source: Open Policy Agent
    source_claims:
      - claim-policy-condition-001
  - id: policy-condition-trustllm
    labels:
      zh: 策略条件 - TrustLLM 六维可信度
      en: policy condition - TrustLLM six-dimension trust
      ja: ポリシー条件 - TrustLLM 6次元信頼性
    descriptions: {zh: "策略条件(PolicyCondition) [PolicyCondition]: 在策略规则内对主体、动作、资源或上下文属性求值的布尔或三值谓词。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: expression_language, missing_attribute_behavior, condition_id.", en: "policy condition (PolicyCondition) [PolicyCondition]: A Boolean or three-valued predicate inside a policy rule over principal, action, resource, or context attributes.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include expression_language, missing_attribute_behavior, condition_id.", ja: "ポリシー条件(PolicyCondition) [PolicyCondition]: 方針規則内で主体・操作・資源・文脈属性を評価する二値または三値述語です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: expression_language, missing_attribute_behavior, condition_id."}
    field_values:
