external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PolicyException
    shared_parent_concept_id: PolicyRule
    differentia:
      zh: PolicyCondition 是每次求值的适用谓词；PolicyException 是由授权者签发、有范围与期限的规范偏离。上下文表达式没有授权元数据时只能是条件。
      en: PolicyCondition is an applicability predicate evaluated each time; PolicyException is an authority-issued, scope- and time-bounded normative deviation. A context expression without authority metadata is only a condition.
      ja: PolicyCondition は毎回評価する適用述語、PolicyException は権限者発行で範囲・期限付き規範逸脱です。権限メタデータのない文脈式は条件だけです。
    source_claims:
      - claim-policy-condition-001
parent_relation:
  id: PolicyRule-has_condition-PolicyCondition
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有条件
    en: has condition
    ja: 条件を持つ
  definitions:
    zh: PolicyRule 以 PolicyCondition 作为适用性组成片段；条件求值结果参与该规则，但不能单独充当规则或最终决定。
    en: A PolicyRule has a PolicyCondition as an applicability component; the condition result participates in that rule but cannot independently serve as the rule or final decision.
    ja: PolicyRule は適用性構成片として PolicyCondition を持ち、条件結果は規則へ参加しますが単独で規則や最終判断にはなりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是规则条件
      en: is condition of
      ja: 規則の条件である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicyRule-has_condition-PolicyCondition-example-positive-manual-001
      labels:
        zh: 具有条件正例
        en: Positive has condition case
        ja: 条件を持つの正例
      descriptions:
        zh: deny-unapproved-write 具有 approved-write 条件，后者检查 context.approved 并声明缺失属性为 indeterminate。
        en: deny-unapproved-write has condition approved-write, which checks context.approved and declares missing attributes indeterminate.
        ja: deny-unapproved-write は approved-write 条件を持ち、context.approved を調べ欠落属性を indeterminate とします。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyCondition
      related_relation_ids:
        - PolicyRule-has_condition-PolicyCondition

        en: Rule evaluation reads the condition result and preserves its identity.
        ja: 規則評価は条件結果を読み条件識別子を保持します。

        en: The edge connects a rule to an evaluable applicability component without promoting the condition to a rule.
        ja: 辺は規則と評価可能適用片を結び、条件を規則へ昇格しません。
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
    - id: PolicyRule-has_condition-PolicyCondition-example-boundary-manual-001
      labels:
        zh: 具有条件边界反例
        en: Boundary counterexample for has condition
        ja: 条件を持つの境界反例
      descriptions:
        zh: scope-search-read 限定授权资源，但它是 PermissionScope 而非 deny-unapproved-write 的 PolicyCondition。
        en: scope-search-read limits authorized resources but is a PermissionScope, not a PolicyCondition of deny-unapproved-write.
        ja: scope-search-read は認可資源を限定しますが PermissionScope であり deny-unapproved-write の PolicyCondition ではありません。
      field_values: {}
      related_node_ids:
        - PolicyRule
        - PolicyCondition
      related_relation_ids:
        - PolicyRule-has_condition-PolicyCondition

        en: The scope is queried through request and grant edges, with no has_condition assertion.
        ja: 範囲は要求・付与辺で照会し has_condition を作りません。

        en: A scope is a grantable boundary; a condition is a predicate inside a rule.
        ja: 範囲は付与可能境界、条件は規則内述語です。
      source_claims:
        - claim-policy-condition-001
        - claim-policy-condition-002
  source_claims:
    - claim-policy-condition-001
    - claim-policy-condition-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-policy-condition-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-condition-002
    source: eng-security-nist-abac
    supports: NIST defines authorization as evaluation of subject, object, requested operation, and environment attributes against policy, rules, or relationships describing allowed operations.
    locator: "NIST SP 800-162, Section 3: ABAC definition using subject, object, operation, environment attributes, policy, and rules"
    evidence_kind: official
    confidence: high
    review_status: accepted
