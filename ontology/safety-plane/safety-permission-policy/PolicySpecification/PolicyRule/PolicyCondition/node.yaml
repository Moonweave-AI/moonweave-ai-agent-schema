schema: moonweave.ai/ontology-node/v1
id: PolicyCondition
kind: concept
labels:
  zh: 策略条件
  en: policy condition
  ja: ポリシー条件
semantics:
  short_definition:
    zh: PolicyRule 内对主体、资源、动作或上下文属性的可求值条件规范。
    en: An evaluable condition specification within a PolicyRule over principal, resource, action, or context attributes.
    ja: PolicyRule 内で主体・資源・操作・context 属性を評価する condition specification。
  definition:
    zh: PolicyCondition 表达 Rego 规则体中的布尔条件、XACML Condition 元素或 MCP scope 覆盖检查。OPA `input.action == "write"`、MCP `scope covers tools:call` 与 Cursor `command in allowlist` 都映射为 PolicyCondition；条件求值发生在 PolicyEvaluation，不在规范编辑时。
    en: PolicyCondition expresses boolean conditions in Rego rule bodies, XACML Condition elements, or MCP scope coverage checks. OPA `input.action == "write"`, MCP `scope covers tools:call`, and Cursor `command in allowlist` map to PolicyCondition; evaluation occurs in PolicyEvaluation, not at specification edit time.
    ja: PolicyCondition は Rego boolean condition、XACML Condition、MCP scope coverage check を表現。OPA input.action、MCP scope covers、Cursor command in allowlist を写像。評価は PolicyEvaluation で行い spec 編集時ではない。
  why_needed:
    zh: 分离条件规范与一次求值使 NIST ABAC 属性模型可复用到 Agent 授权。
    en: Separating condition specification from evaluation applies NIST ABAC attribute models to agent authorization.
    ja: condition specification と evaluation 分離で NIST ABAC attribute model を agent 認可に適用。
  includes:
    - zh: 包含表达式、表达语言、所需属性集合、缺失属性语义和求值数据类型。
      en: Includes expression, expression language, required attributes, missing-attribute semantics, and evaluation data type.
      ja: 式、式言語、必要属性集合、属性欠落時の意味、評価データ型を含みます。
  excludes:
    - zh: 不包含规则效果、规则组合算法、已求值决定或可授予的权限范围。
      en: Excludes a rule effect, combining algorithm, evaluated decision, or grantable permission scope.
      ja: 規則効果、結合アルゴリズム、評価済み判断、付与可能な権限範囲を含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 条件字段对齐 AuthorizationRequest 与 OPA input；MCP scope 条件解析为 actions+resource_selector 覆盖；记录 condition_id 供 determining_rule 引用。
    en: Align condition fields to AuthorizationRequest and OPA input; parse MCP scope conditions as actions+resource_selector coverage; record condition_id for determining_rule citation.
    ja: condition field を AuthorizationRequest/OPA input に整合。MCP scope condition を actions+resource_selector coverage に解析。condition_id を determining_rule 引用用に記録。
  typical_input:
    - description: Rego condition snippet.
      format: input.object.id == "tool:search_documents"
      source_claims:
        - claim-policy-condition-design
  typical_output:
    - description: Condition on rule.
      format: '{"condition_id":"cond-scope-covers","expression":"scope covers tools:call"}'
      source_claims:
        - claim-policy-condition-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - condition_id
  fields:
    - id: condition_id
      labels:
        zh: 条件标识
        en: condition ID
        ja: 条件ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在规则内稳定识别该条件。
        en: Stable identifier for the condition within a rule.
        ja: 規則内で条件を安定識別します。
      allowed_values: []
      pattern: null
      example_value: approved-write
      source_claims:
        - claim-policy-condition-design
        - claim-policy-condition-design
    - id: expression_language
      labels:
        zh: 表达语言
        en: expression language
        ja: 式言語
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释条件表达式所需的求值语言。
        en: Evaluation language required to interpret the condition expression.
        ja: 条件式を解釈するための評価言語です。
      allowed_values: []
      pattern: null
      example_value: cedar
      source_claims:
        - claim-policy-condition-design
        - claim-policy-condition-design
    - id: expression
      labels:
        zh: 条件表达式
        en: condition expression
        ja: 条件式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对请求与上下文属性求值的规范谓词。
        en: Normative predicate evaluated over request and context attributes.
        ja: 要求と文脈属性に対して評価する規範述語です。
      allowed_values: []
      pattern: null
      example_value: context.approved == true
      source_claims:
        - claim-policy-condition-design
        - claim-policy-condition-design
    - id: required_attributes
      labels:
        zh: 必需属性
        en: required attributes
        ja: 必要属性
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 求值该条件必须可用的属性路径。
        en: Attribute paths that must be available to evaluate the condition.
        ja: 条件評価に必要な属性パスです。
      allowed_values: []
      pattern: null
      example_value:
        - context.approved
      source_claims:
        - claim-policy-condition-design
        - claim-policy-condition-design
    - id: missing_attribute_behavior
      labels:
        zh: 属性缺失处理
        en: missing-attribute behavior
        ja: 属性欠落時動作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 必需属性缺失时返回的显式语义。
        en: Explicit semantic result when a required attribute is missing.
        ja: 必要属性が欠けた場合の明示的な意味結果です。
      allowed_values: []
      pattern: null
      example_value: indeterminate
      source_claims:
        - claim-policy-condition-design
        - claim-policy-condition-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicyCondition-opa-object
    labels:
      zh: OPA object 条件
      en: OPA object condition
      ja: OPA object condition
    descriptions:
      zh: cond-search-tool 要求 input.object.id==tool:search_documents。
      en: cond-search-tool requires input.object.id==tool:search_documents.
      ja: cond-search-tool input.object.id==tool:search_documents 要求。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: Rego condition
    field_values:
      condition_id: cond-search-tool
    related_node_ids:
      - PolicyCondition
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-condition-design
  - id: PolicyCondition-mcp-scope
    labels:
      zh: MCP scope 覆盖条件
      en: MCP scope coverage condition
      ja: MCP scope coverage condition
    descriptions:
      zh: cond-mcp-call 验证 token scope 包含 tools:call 且 resource indicator 匹配。
      en: cond-mcp-call verifies token scope includes tools:call and resource indicator matches.
      ja: cond-mcp-call token scope tools:call+resource indicator 一致検証。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: scope condition
    field_values:
      condition_id: cond-mcp-call
    related_node_ids:
      - PolicyCondition
      - AuthorizationRequest
    related_relation_ids: []
    source_claims:
      - claim-policy-condition-design
  - id: PolicyCondition-cursor-allowlist
    labels:
      zh: Cursor allowlist 条件
      en: Cursor allowlist condition
      ja: Cursor allowlist condition
    descriptions:
      zh: cond-allowlisted 检查 normalized command 属于 allowlist 集合。
      en: cond-allowlisted checks normalized command belongs to allowlist set.
      ja: cond-allowlisted normalized command∈allowlist 検査。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: allowlist condition
    field_values:
      condition_id: cond-allowlisted
    related_node_ids:
      - PolicyCondition
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-condition-design
  - id: PolicyCondition-boundary-runtime
    labels:
      zh: 运行时求值不是条件规范
      en: Runtime evaluation is not condition spec
      ja: runtime evaluation≠condition spec
    descriptions:
      zh: PolicyEvaluation 对 request-42 的 true/false 结果是求值产物，不是 PolicyCondition 规范文本。
      en: PolicyEvaluation true/false on request-42 is evaluation product, not PolicyCondition specification text.
      ja: PolicyEvaluation true/false は evaluation 産物で PolicyCondition spec 文本ではない。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus evaluation
    field_values: {}
    related_node_ids:
      - PolicyCondition
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-policy-condition-design
parent_relation:
  id: PolicyRule-has_condition-PolicyCondition
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有条件
    en: has condition
    ja: 条件を持つ
  definitions:
    zh: PolicyRule 以 PolicyCondition 作为适用性组成片段；条件求值结果参与该规则，但不能单独充当规则或最终决定。
    en: A PolicyRule has a PolicyCondition as an applicability component; the condition result participates in that rule but cannot independently serve as the rule or final decision.
    ja: PolicyRule は適用性構成片として PolicyCondition を持ち、条件結果は規則へ参加しますが単独で規則や最終判断にはなりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是规则条件
      en: is condition of
      ja: 規則の条件である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-condition-design
    - claim-policy-condition-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-policy-condition-design
    source: safety-permission-design
    supports: PolicyCondition is normative predicate, not evaluation outcome.
    locator: Condition boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-condition-design
    source: opa-rego
    supports: Rego rule body expressions map to PolicyCondition specifications.
    locator: Rego conditions
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-condition-design
    source: mcp-authorization-2025
    supports: MCP scope and resource indicator checks map to PolicyCondition.
    locator: Scope conditions
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-condition-design
    source: cursor-terminal-sandbox
    supports: Cursor allowlist membership checks map to PolicyCondition.
    locator: Allowlist condition
    evidence_kind: design-inference
    confidence: high
