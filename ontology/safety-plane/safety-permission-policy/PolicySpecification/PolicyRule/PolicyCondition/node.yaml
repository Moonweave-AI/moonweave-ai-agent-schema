      zh: 策略条件 - DecodingTrust GPT 评估
      en: policy condition - DecodingTrust GPT assessment
      ja: ポリシー条件 - DecodingTrust GPT 評価
    descriptions: {zh: "策略条件(PolicyCondition) [PolicyCondition]: 在策略规则内对主体、动作、资源或上下文属性求值的布尔或三值谓词。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: expression_language, missing_attribute_behavior, condition_id.", en: "policy condition (PolicyCondition) [PolicyCondition]: A Boolean or three-valued predicate inside a policy rule over principal, action, resource, or context attributes.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include expression_language, missing_attribute_behavior, condition_id.", ja: "ポリシー条件(PolicyCondition) [PolicyCondition]: 方針規則内で主体・操作・資源・文脈属性を評価する二値または三値述語です。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: expression_language, missing_attribute_behavior, condition_id."}
    field_values:
      condition_id: approved-write
      expression: "context.approved == true"
      expression_language: cedar
      missing_attribute_behavior: indeterminate
    related_node_ids:
