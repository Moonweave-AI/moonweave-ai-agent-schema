schema: moonweave.ai/ontology-node/v1
id: PolicyRule
kind: concept
labels:
  zh: 策略规则
  en: policy rule
  ja: ポリシー規則
semantics:
  short_definition:
    zh: PolicySpecification 内一条可求值的 permit/deny 规则规范。
    en: One evaluable permit/deny rule specification within a PolicySpecification.
    ja: PolicySpecification 内の一条 evaluable permit/deny rule specification。
  definition:
    zh: PolicyRule 以 rule_id+version 标识，包含 PolicyCondition、PolicyEffect，可选 PolicyException。OPA Rego 规则块、XACML Rule 元素、MCP tool annotation 导出的规则与 Cursor allowlist/denylist 条目都映射为 PolicyRule；它是规范不是一次命中事实。
    en: PolicyRule is identified by rule_id+version with PolicyCondition, PolicyEffect, and optional PolicyException. OPA Rego rule blocks, XACML Rule elements, MCP tool-annotation-derived rules, and Cursor allowlist/denylist entries map to PolicyRule; it is specification, not a match occurrence.
    ja: PolicyRule は rule_id+version で PolicyCondition/PolicyEffect/optional PolicyException を含む。OPA Rego block、XACML Rule、MCP annotation 由来 rule、Cursor allowlist/denylist entry を写像。specification であり hit occurrence ではない。
  why_needed:
    zh: PolicyDecision 必须引用 determining PolicyRule 版本才能 replay OPA/XACML 决定。
    en: PolicyDecision must cite determining PolicyRule revisions to replay OPA/XACML decisions.
    ja: PolicyDecision は determining PolicyRule revision 引用なしに OPA/XACML decision replay 不可。
  includes:
    - zh: 包含所属策略修订与规则标识，并可记录 XACML Description 和 Target；Condition 与 Permit/Deny Effect 通过显式关系连接。
      en: Includes the owning policy revision and RuleId and may record XACML Description and Target; explicit relations connect the Condition and Permit/Deny Effect.
      ja: 所属方針 revision と RuleId を含み、XACML Description と Target を任意に記録します。Condition と Permit/Deny Effect は明示関係で結びます。
  excludes:
    - zh: 不包含已求值的 PolicyDecision，也不臆造 XACML Rule 并未定义的通用 priority 或 enabled 属性；部署启停和规则顺序应由版本发布或明确组合算法建模。
      en: Excludes an evaluated PolicyDecision and does not invent generic priority or enabled attributes absent from the XACML Rule contract; deployment activation and ordering belong to version publication or an explicit combining algorithm.
      ja: 評価済み PolicyDecision を含まず、XACML Rule 契約にない一般的 priority・enabled 属性を捏造しません。配備の有効化と順序は版公開または明示 combining algorithm で表します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Rego `allow`/`deny` 规则发布为 rule_id@version；MCP readOnlyHint 生成 deny-write 规则；Cursor denylist 条目为 deny 规则。PolicyEvaluation 记录 determining_rule_refs。
    en: Publish Rego allow/deny rules as rule_id@version; MCP readOnlyHint generates deny-write rules; Cursor denylist entries are deny rules. PolicyEvaluation records determining_rule_refs.
    ja: Rego allow/deny を rule_id@version で publish。MCP readOnlyHint→deny-write rule。Cursor denylist→deny rule。PolicyEvaluation が determining_rule_refs 記録。
  typical_input:
    - description: OPA Rego rule.
      format: deny[msg] { input.action == "write"; ... }
      source_claims:
        - claim-policy-rule-design
  typical_output:
    - description: Rule reference on decision.
      format: 'determining_rule_refs: ["deny-unlisted-shell@3"]'
      source_claims:
        - claim-policy-rule-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - policy_version_ref
    - rule_id
  fields:
    - id: rule_id
      labels:
        zh: 规则标识
        en: rule ID
        ja: 規則ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 XACML RuleId：在所属 PolicySpecification 修订内唯一、稳定地识别该规则。
        en: "The XACML RuleId: a stable identifier unique within the owning PolicySpecification revision."
        ja: XACML RuleId に対応し、所属 PolicySpecification revision 内で規則を一意かつ安定して識別します。
      allowed_values: []
      pattern: null
      example_value: deny-unapproved-write
      source_claims:
        - claim-policy-rule-design
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Moonweave 的可追溯扩展，标识唯一包含该规则的 PolicySpecification 修订；其值必须与 contains 父边的规范身份与版本一致。
        en: A Moonweave traceability extension identifying the single PolicySpecification revision that contains this rule; it must match the identity and version at the incoming contains edge.
        ja: 当該規則を含む唯一の PolicySpecification revision を示す Moonweave の追跡拡張で、incoming contains 辺の仕様 identity・version と一致しなければなりません。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-rule-design
    - id: description
      labels:
        zh: 规则说明
        en: rule description
        ja: 規則説明
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 对应 XACML Rule 中可选的 Description 元素，只解释规则目的，不覆盖 Target、Condition 或 Effect 的机器可求值语义。
        en: The optional XACML Description element. It explains the rule's purpose but does not override the machine-evaluable Target, Condition, or Effect.
        ja: XACML Rule の任意 Description 要素です。規則目的を説明しますが、機械評価可能な Target・Condition・Effect を上書きしません。
      allowed_values: []
      pattern: null
      example_value: Deny unapproved write operations
      source_claims:
        - claim-policy-rule-design
    - id: target
      labels:
        zh: 规则目标
        en: rule target
        ja: 規則ターゲット
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 对应 XACML Rule 的可选 Target，先于 Condition 判断请求的主体、资源、动作或环境是否落入规则适用集合；省略时按 XACML 的空 Target 语义匹配所有输入。
        en: The optional XACML Rule Target, evaluated before the Condition to determine whether the request's subject, resource, action, or environment is in scope. When omitted, XACML empty-Target semantics match all inputs.
        ja: XACML Rule の任意 Target で、Condition より先に要求の主体・資源・操作・環境が適用集合に入るかを判定します。省略時は XACML の空 Target 意味により全入力に一致します。
      allowed_values: []
      pattern: null
      example_value:
        action: write
        resource_type: external_system
      source_claims:
        - claim-policy-rule-design
  constraints:
    - id: policy-rule-xacml-structure-is-unambiguous
      severity: error
      expression_language: plain
      expression: policy_version_ref matches the sole incoming PolicySpecification contains edge; exactly one outgoing PolicyEffect has outcome permit or deny; at most one outgoing PolicyCondition exists; description never overrides target, condition, or effect
      explanations:
        zh: 规则必须绑定一个确定策略修订和一个 Permit/Deny 效果，至多包含一个 Condition；Description 仅作说明，不能形成与结构化 Target、Condition 或 Effect 冲突的第二套规范。
        en: A rule binds one exact policy revision and one Permit/Deny effect and has at most one Condition. Description is explanatory only and cannot create a second norm conflicting with the structured Target, Condition, or Effect.
        ja: 規則は一つの正確な方針 revision と一つの Permit/Deny 効果に結び、Condition は最大一つです。Description は説明に限り、構造化 Target・Condition・Effect と衝突する第二の規範を作れません。
      source_claims:
        - claim-policy-rule-design
  required_relation_constraints:
    - id: policy-rule-has-one-owning-policy-revision
      direction: incoming
      predicate: part_of
      target_concept_id: PolicySpecification
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条规则必须且只能属于一个不可变 PolicySpecification 修订。
        en: Every rule belongs to exactly one immutable PolicySpecification revision.
        ja: 各規則は一つだけの不変 PolicySpecification revision に属します。
      source_claims:
        - claim-policy-rule-design
    - id: policy-rule-prescribes-one-effect
      direction: outgoing
      predicate: prescribes
      target_concept_id: PolicyEffect
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条规则必须规定且只能规定一个 Permit 或 Deny 效果。
        en: Every rule prescribes exactly one Permit or Deny effect.
        ja: 各規則は一つだけの Permit または Deny 効果を規定します。
      source_claims:
        - claim-policy-rule-design
    - id: policy-rule-has-at-most-one-condition
      direction: outgoing
      predicate: has_condition
      target_concept_id: PolicyCondition
      cardinality:
        min: 0
        max: 1
      explanations:
        zh: 规则可省略 Condition；存在时只能有一个，其布尔结果决定规则是否适用。
        en: A Rule may omit Condition; when present it has at most one, whose Boolean result determines applicability.
        ja: Rule は Condition を省略でき、存在する場合は一つだけで、その Boolean 結果が適用可否を決めます。
      source_claims:
        - claim-policy-rule-design
examples:
  - id: PolicyRule-opa-deny
    labels:
      zh: OPA deny 规则
      en: OPA deny rule
      ja: OPA deny rule
    descriptions:
      zh: deny-unlisted-shell@3 Rego 规则拒绝 allowlist 外 shell 命令。
      en: deny-unlisted-shell@3 Rego rule denies shell commands outside allowlist.
      ja: deny-unlisted-shell@3 が allowlist 外 shell を拒否。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: deny rule
    field_values:
      rule_id: deny-unlisted-shell
      version: "3"
    related_node_ids:
      - PolicyRule
      - PolicyEffect
      - DenyDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-rule-design
  - id: PolicyRule-mcp-readonly
    labels:
      zh: MCP readOnlyHint 规则
      en: MCP readOnlyHint rule
      ja: MCP readOnlyHint rule
    descriptions:
      zh: deny-write-tools@2 由 MCP readOnlyHint 注解生成，拒绝写操作。
      en: deny-write-tools@2 generated from MCP readOnlyHint annotations, denying writes.
      ja: deny-write-tools@2 MCP readOnlyHint 由来、write 拒否。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: readOnlyHint
    field_values:
      rule_id: deny-write-tools
      version: "2"
    related_node_ids:
      - PolicyRule
      - PolicyCondition
    related_relation_ids: []
    source_claims:
      - claim-policy-rule-design
  - id: PolicyRule-cursor-allow
    labels:
      zh: Cursor allowlist 规则
      en: Cursor allowlist rule
      ja: Cursor allowlist rule
    descriptions:
      zh: allow-listed-shell@1 permit npm test 与 git status。
      en: allow-listed-shell@1 permits npm test and git status.
      ja: allow-listed-shell@1 npm test/git status permit。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: allowlist rule
    field_values:
      rule_id: allow-listed-shell
      version: "1"
    related_node_ids:
      - PolicyRule
      - AllowDecision
    related_relation_ids: []
    source_claims:
      - claim-policy-rule-design
  - id: PolicyRule-boundary-hit
    labels:
      zh: 命中不是规则
      en: Match is not rule
      ja: hit は rule ではない
    descriptions:
      zh: 一次 curl deny 命中事实是 PolicyEvaluation 产物，不是 PolicyRule 本体。
      en: One curl deny match occurrence is PolicyEvaluation product, not PolicyRule body.
      ja: 一回 curl deny hit は PolicyEvaluation 産物で PolicyRule 本体ではない。
    example_source:
      product: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      version: rule versus evaluation
    field_values: {}
    related_node_ids:
      - PolicyRule
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-policy-rule-design
parent_relation:
  id: PolicySpecification-contains-PolicyRule
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含规则
    en: contains rule
    ja: 規則を含む
  definitions:
    zh: 一个确定版本的策略规范把可独立引用的 PolicyRule 纳入其规范内容；规则随该版本发布，但规则不是整个策略规范的子类型。
    en: One fixed PolicySpecification version contains independently referable PolicyRules as normative content; a rule is released with that version but is not a subtype of the whole specification.
    ja: 一つの固定 PolicySpecification 版が独立参照可能な PolicyRule を規範内容として含み、規則はその版と公開されますが仕様全体の下位型ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被策略规范包含
      en: is contained in
      ja: 方針仕様に含まれる
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-policy-rule-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-policy-rule-design
    source: safety-permission-design
    supports: PolicyRule is versioned normative rule, not evaluation match.
    locator: PolicyRule boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-rule-design
    source: opa-rego
    supports: OPA Rego rules map to versioned PolicyRule with conditions and effects.
    locator: Rego rules
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-rule-design
    source: mcp-authorization-2025
    supports: MCP tool annotations derive PolicyRule constraints.
    locator: Annotation rules
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-rule-design
    source: cursor-terminal-sandbox
    supports: Cursor allowlist/denylist entries map to PolicyRule permit/deny effects.
    locator: Shell rules
    evidence_kind: design-inference
    confidence: high
