schema: moonweave.ai/ontology-node/v1
id: PolicyRule
kind: concept
status: accepted
labels:
  zh: 策略规则
  en: policy rule
  ja: ポリシー規則
semantics:
  short_definition:
    zh: 策略规范中可独立引用并求值的一条规范，连接适用条件与预设效果。
    en: An independently referable and evaluable norm inside a policy specification that connects applicability conditions to a prescribed effect.
    ja: 方針仕様内で独立に参照・評価でき、適用条件と所定効果を結ぶ規範です。
  definition:
    zh: 策略规则是某一 PolicySpecification 修订中可独立求值的规范组成项，而不是策略规范的子类型。遵循 XACML 3.0 §5.21，每条规则具有 RuleId、Permit 或 Deny 效果，并可带 Description、Target、至多一个 Condition、ObligationExpressions 与 AdviceExpressions；Moonweave 以 policy_version_ref 明确其唯一所属修订，并用关系节点表达效果、条件、义务与建议，避免把相互矛盾的自然语言 statement 另作规范来源。
    en: A PolicyRule is an independently evaluable normative component of one PolicySpecification revision, not a subtype of the policy specification. Following XACML 3.0 §5.21, a rule has a RuleId and a Permit or Deny Effect and may carry Description, Target, at most one Condition, ObligationExpressions, and AdviceExpressions. Moonweave adds policy_version_ref to identify the single owning revision and represents effect, condition, obligations, and advice structurally instead of introducing a second, potentially contradictory prose statement.
    ja: PolicyRule は一つの PolicySpecification revision に属する独立評価可能な規範構成項であり、方針仕様の下位型ではありません。XACML 3.0 §5.21 に従い、RuleId と Permit または Deny の Effect を持ち、Description、Target、最大一つの Condition、ObligationExpressions、AdviceExpressions を任意に持ちます。Moonweave は policy_version_ref で唯一の所有 revision を明示し、効果・条件・義務・助言を構造関係で表し、矛盾し得る別の自然言語 statement は設けません。
  why_needed:
    zh: 独立规则节点使条件、效果、例外和最终决定之间的可追溯链可以逐条查询，而不把整份策略压成一个不透明文本。
    en: A distinct rule node makes conditions, effects, exceptions, and decisive provenance queryable without collapsing an entire policy into opaque text.
    ja: 規則を独立ノードにすることで、方針全体を不透明な文書にせず、条件・効果・例外・決定根拠を追跡できます。
  includes:
    - zh: 包含所属策略修订与规则标识，并可记录 XACML Description 和 Target；Condition 与 Permit/Deny Effect 通过显式关系连接。
      en: Includes the owning policy revision and RuleId and may record XACML Description and Target; explicit relations connect the Condition and Permit/Deny Effect.
      ja: 所属方針 revision と RuleId を含み、XACML Description と Target を任意に記録します。Condition と Permit/Deny Effect は明示関係で結びます。
  excludes:
    - zh: 不包含已求值的 PolicyDecision，也不臆造 XACML Rule 并未定义的通用 priority 或 enabled 属性；部署启停和规则顺序应由版本发布或明确组合算法建模。
      en: Excludes an evaluated PolicyDecision and does not invent generic priority or enabled attributes absent from the XACML Rule contract; deployment activation and ordering belong to version publication or an explicit combining algorithm.
      ja: 評価済み PolicyDecision を含まず、XACML Rule 契約にない一般的 priority・enabled 属性を捏造しません。配備の有効化と順序は版公開または明示 combining algorithm で表します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - policy_version_ref
    - rule_id
  fields:
    - id: rule_id
      labels:
        zh: 规则标识
        en: rule ID
        ja: 規則ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 XACML RuleId：在所属 PolicySpecification 修订内唯一、稳定地识别该规则。
        en: "The XACML RuleId: a stable identifier unique within the owning PolicySpecification revision."
        ja: XACML RuleId に対応し、所属 PolicySpecification revision 内で規則を一意かつ安定して識別します。
      allowed_values: []
      pattern: null
      example_value: deny-unapproved-write
      source_claims:
        - claim-policy-rule-002
    - id: policy_version_ref
      labels:
        zh: 策略版本引用
        en: policy version reference
        ja: 方針版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Moonweave 的可追溯扩展，标识唯一包含该规则的 PolicySpecification 修订；其值必须与 contains 父边的规范身份与版本一致。
        en: A Moonweave traceability extension identifying the single PolicySpecification revision that contains this rule; it must match the identity and version at the incoming contains edge.
        ja: 当該規則を含む唯一の PolicySpecification revision を示す Moonweave の追跡拡張で、incoming contains 辺の仕様 identity・version と一致しなければなりません。
      allowed_values: []
      pattern: null
      example_value: tool-authorization@7
      source_claims:
        - claim-policy-rule-003
    - id: description
      labels:
        zh: 规则说明
        en: rule description
        ja: 規則説明
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 对应 XACML Rule 中可选的 Description 元素，只解释规则目的，不覆盖 Target、Condition 或 Effect 的机器可求值语义。
        en: The optional XACML Description element. It explains the rule's purpose but does not override the machine-evaluable Target, Condition, or Effect.
        ja: XACML Rule の任意 Description 要素です。規則目的を説明しますが、機械評価可能な Target・Condition・Effect を上書きしません。
      allowed_values: []
      pattern: null
      example_value: Deny unapproved write operations
      source_claims:
        - claim-policy-rule-004
    - id: target
      labels:
        zh: 规则目标
        en: rule target
        ja: 規則ターゲット
      datatype: json
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 对应 XACML Rule 的可选 Target，先于 Condition 判断请求的主体、资源、动作或环境是否落入规则适用集合；省略时按 XACML 的空 Target 语义匹配所有输入。
        en: The optional XACML Rule Target, evaluated before the Condition to determine whether the request's subject, resource, action, or environment is in scope. When omitted, XACML empty-Target semantics match all inputs.
        ja: XACML Rule の任意 Target で、Condition より先に要求の主体・資源・操作・環境が適用集合に入るかを判定します。省略時は XACML の空 Target 意味により全入力に一致します。
      allowed_values: []
      pattern: null
      example_value:
        action: write
        resource_type: external_system
      source_claims:
        - claim-policy-rule-005
  constraints:
    - id: policy-rule-xacml-structure-is-unambiguous
      severity: error
      expression_language: plain
      expression: policy_version_ref matches the sole incoming PolicySpecification contains edge; exactly one outgoing PolicyEffect has outcome permit or deny; at most one outgoing PolicyCondition exists; description never overrides target, condition, or effect
      explanations:
        zh: 规则必须绑定一个确定策略修订和一个 Permit/Deny 效果，至多包含一个 Condition；Description 仅作说明，不能形成与结构化 Target、Condition 或 Effect 冲突的第二套规范。
        en: A rule binds one exact policy revision and one Permit/Deny effect and has at most one Condition. Description is explanatory only and cannot create a second norm conflicting with the structured Target, Condition, or Effect.
        ja: 規則は一つの正確な方針 revision と一つの Permit/Deny 効果に結び、Condition は最大一つです。Description は説明に限り、構造化 Target・Condition・Effect と衝突する第二の規範を作れません。
      source_claims:
        - claim-policy-rule-006
  required_relation_constraints:
    - id: policy-rule-has-one-owning-policy-revision
      direction: incoming
      predicate: part_of
      target_concept_id: PolicySpecification
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条规则必须且只能属于一个不可变 PolicySpecification 修订。
        en: Every rule belongs to exactly one immutable PolicySpecification revision.
        ja: 各規則は一つだけの不変 PolicySpecification revision に属します。
      source_claims:
        - claim-policy-rule-007
    - id: policy-rule-prescribes-one-effect
      direction: outgoing
      predicate: prescribes
      target_concept_id: PolicyEffect
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条规则必须规定且只能规定一个 Permit 或 Deny 效果。
        en: Every rule prescribes exactly one Permit or Deny effect.
        ja: 各規則は一つだけの Permit または Deny 効果を規定します。
      source_claims:
        - claim-policy-rule-008
    - id: policy-rule-has-at-most-one-condition
      direction: outgoing
      predicate: has_condition
      target_concept_id: PolicyCondition
      cardinality:
        min: 0
        max: 1
      explanations:
        zh: 规则可省略 Condition；存在时只能有一个，其布尔结果决定规则是否适用。
        en: A Rule may omit Condition; when present it has at most one, whose Boolean result determines applicability.
        ja: Rule は Condition を省略でき、存在する場合は一つだけで、その Boolean 結果が適用可否を決めます。
      source_claims:
        - claim-policy-rule-009
examples:
  - id: policy-rule-cedar
    labels:
      zh: 策略规则 - Cedar 授权评估
      en: policy rule - Cedar authorization evaluation
      ja: ポリシー規則 - Cedar 認可評価
    descriptions: {zh: "策略规则(PolicyRule) [PolicyRule]: 策略规范中可独立引用并求值的一条规范，连接适用条件与预设效果。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: rule_id, description, policy_version_ref.", en: "policy rule (PolicyRule) [PolicyRule]: An independently referable and evaluable norm inside a policy specification that connects applicability conditions to a prescribed effect.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include rule_id, description, policy_version_ref.", ja: "ポリシー規則(PolicyRule) [PolicyRule]: 方針仕様内で独立に参照・評価でき、適用条件と所定効果を結ぶ規範です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: rule_id, description, policy_version_ref."}
    field_values:
      description: "Deny unapproved write operations"
      policy_version_ref: "tool-authorization@7"
      rule_id: deny-unapproved-write
    related_node_ids:
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicySpecification
    related_relation_ids:
      - claim-policy-rule-001
      - claim-policy-rule-010
      - claim-policy-rule-011
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicyRule-has_condition-PolicyCondition
      - PolicyRule-prescribes-PolicyEffect
      - PolicySpecification
      - PolicySpecification-contains-PolicyRule
    example_source: Amazon Cedar
    source_claims:
      - claim-policy-rule-001
  - id: policy-rule-opa
    labels:
      zh: 策略规则 - OPA Rego 策略评估
      en: policy rule - OPA Rego policy evaluation
      ja: ポリシー規則 - OPA Rego ポリシー評価
    descriptions: {zh: "策略规则(PolicyRule) [PolicyRule]: 策略规范中可独立引用并求值的一条规范，连接适用条件与预设效果。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: rule_id, description, policy_version_ref.", en: "policy rule (PolicyRule) [PolicyRule]: An independently referable and evaluable norm inside a policy specification that connects applicability conditions to a prescribed effect.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include rule_id, description, policy_version_ref.", ja: "ポリシー規則(PolicyRule) [PolicyRule]: 方針仕様内で独立に参照・評価でき、適用条件と所定効果を結ぶ規範です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: rule_id, description, policy_version_ref."}
    field_values:
      description: "Deny unapproved write operations"
      policy_version_ref: "tool-authorization@7"
      rule_id: deny-unapproved-write
    related_node_ids:
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicySpecification
    related_relation_ids:
      - claim-policy-rule-001
      - claim-policy-rule-010
      - claim-policy-rule-011
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicyRule-has_condition-PolicyCondition
      - PolicyRule-prescribes-PolicyEffect
      - PolicySpecification
      - PolicySpecification-contains-PolicyRule
    example_source: Open Policy Agent
    source_claims:
      - claim-policy-rule-001
  - id: policy-rule-trustllm
    labels:
      zh: 策略规则 - TrustLLM 六维可信度
      en: policy rule - TrustLLM six-dimension trust
      ja: ポリシー規則 - TrustLLM 6次元信頼性
    descriptions: {zh: "策略规则(PolicyRule) [PolicyRule]: 策略规范中可独立引用并求值的一条规范，连接适用条件与预设效果。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: rule_id, description, policy_version_ref.", en: "policy rule (PolicyRule) [PolicyRule]: An independently referable and evaluable norm inside a policy specification that connects applicability conditions to a prescribed effect.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include rule_id, description, policy_version_ref.", ja: "ポリシー規則(PolicyRule) [PolicyRule]: 方針仕様内で独立に参照・評価でき、適用条件と所定効果を結ぶ規範です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: rule_id, description, policy_version_ref."}
    field_values:
      description: "Deny unapproved write operations"
      policy_version_ref: "tool-authorization@7"
      rule_id: deny-unapproved-write
    related_node_ids:
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicySpecification
    related_relation_ids:
      - claim-policy-rule-001
      - claim-policy-rule-010
      - claim-policy-rule-011
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicyRule-has_condition-PolicyCondition
      - PolicyRule-prescribes-PolicyEffect
      - PolicySpecification
      - PolicySpecification-contains-PolicyRule
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-policy-rule-001
  - id: policy-rule-decodingtrust
    labels:
      zh: 策略规则 - DecodingTrust GPT 评估
      en: policy rule - DecodingTrust GPT assessment
      ja: ポリシー規則 - DecodingTrust GPT 評価
    descriptions: {zh: "策略规则(PolicyRule) [PolicyRule]: 策略规范中可独立引用并求值的一条规范，连接适用条件与预设效果。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: rule_id, description, policy_version_ref.", en: "policy rule (PolicyRule) [PolicyRule]: An independently referable and evaluable norm inside a policy specification that connects applicability conditions to a prescribed effect.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include rule_id, description, policy_version_ref.", ja: "ポリシー規則(PolicyRule) [PolicyRule]: 方針仕様内で独立に参照・評価でき、適用条件と所定効果を結ぶ規範です。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: rule_id, description, policy_version_ref."}
    field_values:
      description: "Deny unapproved write operations"
      policy_version_ref: "tool-authorization@7"
      rule_id: deny-unapproved-write
    related_node_ids:
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicySpecification
    related_relation_ids:
      - claim-policy-rule-001
      - claim-policy-rule-010
      - claim-policy-rule-011
      - PolicyCondition
      - PolicyEffect
      - PolicyRule
      - PolicyRule-has_condition-PolicyCondition
      - PolicyRule-prescribes-PolicyEffect
      - PolicySpecification
      - PolicySpecification-contains-PolicyRule
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-policy-rule-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PolicySpecification-contains-PolicyRule
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含规则
    en: contains rule
    ja: 規則を含む
  definitions:
    zh: 一个确定版本的策略规范把可独立引用的 PolicyRule 纳入其规范内容；规则随该版本发布，但规则不是整个策略规范的子类型。
    en: One fixed PolicySpecification version contains independently referable PolicyRules as normative content; a rule is released with that version but is not a subtype of the whole specification.
    ja: 一つの固定 PolicySpecification 版が独立参照可能な PolicyRule を規範内容として含み、規則はその版と公開されますが仕様全体の下位型ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系描述本体事实；实例基数由所引用规范与生命周期约束决定。
    en: This relation states an ontology fact; instance cardinality is governed by the referenced specification and lifecycle constraints.
    ja: この関係は本体事実を表し、実体基数は参照仕様とライフサイクル制約で決まります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被策略规范包含
      en: is contained in
      ja: 方針仕様に含まれる
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PolicySpecification-contains-PolicyRule-example-positive-manual-001
      labels:
        zh: 包含规则正例
        en: Positive contains rule case
        ja: 規則を含むの正例
      descriptions:
        zh: tool-authorization@7 明确包含规则 deny-unapproved-write，并以规则标识在该版本内引用它。
        en: tool-authorization@7 explicitly contains rule deny-unapproved-write and references it by rule ID within that version.
        ja: tool-authorization@7 は規則 deny-unapproved-write を明示包含し、その版内の規則IDで参照します。
      field_values: {}
      related_node_ids:
        - PolicySpecification
        - PolicyRule
      related_relation_ids:
        - PolicySpecification-contains-PolicyRule

        en: A policy-version query enumerates rules and a rule query returns its single owning version.
        ja: 方針版照会で規則を列挙し、規則照会で単一所属版を返します。

        en: The rule is versioned normative content, so the edge expresses composition rather than taxonomy.
        ja: 規則は版管理規範構成であり、辺は種属でなく構成を表します。
      source_claims:
        - claim-policy-rule-001
    - id: PolicySpecification-contains-PolicyRule-example-boundary-manual-001
      labels:
        zh: 包含规则边界反例
        en: Boundary counterexample for contains rule
        ja: 規則を含むの境界反例
      descriptions:
        zh: evaluation-42 使用 tool-authorization@7，但运行活动不是该策略的组成规则。
        en: evaluation-42 uses tool-authorization@7, but the runtime activity is not a rule contained by the policy.
        ja: evaluation-42 は tool-authorization@7 を使いますが実行活動は方針に含まれる規則ではありません。
      field_values: {}
      related_node_ids:
        - PolicySpecification
        - PolicyRule
      related_relation_ids:
        - PolicySpecification-contains-PolicyRule

        en: The activity references the specification through uses and creates no contains fact.
        ja: 活動は uses で仕様を参照し contains 事実を作りません。

        en: Runtime reference does not change normative composition boundaries.
        ja: 実行参照は規範構成境界を変えません。
      source_claims:
        - claim-policy-rule-001
  source_claims:
    - claim-policy-rule-001
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-policy-rule-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-rule-002
    source: eng-policy-xacml-3
