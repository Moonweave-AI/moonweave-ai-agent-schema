schema: moonweave.ai/ontology-node/v1
id: PolicySpecification
kind: concept
status: accepted
labels:
  zh: 策略规范
  en: policy specification
  ja: ポリシー仕様
semantics:
  short_definition:
    zh: 由明确发布者维护的、带版本与适用范围的规范性授权规则集合。
    en: A versioned normative authorization rule set maintained by an identified issuer and applicability scope.
    ja: 識別可能な発行者が管理する、版と適用範囲を持つ規範的な認可規則集合です。
  definition:
    zh: 策略规范是可独立识别和版本化的规范对象：它由明确发布者签发，界定适用主体、动作、资源和上下文，并包含可求值规则及规则组合算法；一次策略评估引用某个确定版本，但评估活动和评估结果不属于规范本身。
    en: A PolicySpecification is an independently identified, versioned normative object issued by a known authority. It defines applicable principals, actions, resources, and context, contains evaluable rules, and selects a rule-combining algorithm; an evaluation references one fixed version, but neither the evaluation activity nor its resulting decision is part of the specification.
    ja: PolicySpecification は独立に識別・版管理される規範対象です。既知の権限者が発行し、適用する主体・操作・資源・文脈を定め、評価可能な規則と規則結合アルゴリズムを含みます。評価は特定版を参照しますが、評価活動とその判断結果は仕様の一部ではありません。
  why_needed:
    zh: 它把长期有效的规范与一次运行中的请求、评估和决定分开，使决定能够按准确策略版本复现和审计。
    en: It separates durable normative content from one request, evaluation, and decision so a result can be reproduced and audited against the exact policy version.
    ja: 持続する規範内容を一回の要求・評価・判断から分離し、正確な方針版に対して結果を再現・監査できるようにします。
  includes:
    - zh: 包含策略标识、版本、发布者、有效期、适用范围、所含规则和所选组合算法。
      en: Includes policy identity, version, issuer, validity, applicability, contained rules, and selected combining algorithm.
      ja: 方針識別子、版、発行者、有効期間、適用範囲、含まれる規則、選択された結合アルゴリズムを含みます。
  excludes:
    - zh: 不包含一次授权请求、策略评估运行、具体决定、授权授予或执行门控。
      en: Excludes an individual authorization request, evaluation run, concrete decision, authorization grant, or enforcement gate.
      ja: 個別の認可要求、評価実行、具体的判断、認可付与、執行ゲートを含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - policy_id
    - version
  fields:
    - id: policy_id
      labels:
        zh: 策略标识
        en: policy ID
        ja: ポリシーID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本保持稳定的策略族标识。
        en: Stable identifier for the policy family across versions.
        ja: 版をまたいで安定する方針系列の識別子です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: version
      labels:
        zh: 策略版本
        en: policy version
        ja: ポリシー版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次求值所引用的不可变发布版本。
        en: Immutable released version referenced by an evaluation.
        ja: 評価が参照する変更不能な公開版です。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: issuer_ref
      labels:
        zh: 发布者引用
        en: issuer reference
        ja: 発行者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对策略内容具有发布权限的主体。
        en: Authority permitted to issue the policy content.
        ja: 方針内容を発行する権限主体です。
      allowed_values: []
      pattern: null
      example_value: security-governance
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: effective_from
      labels:
        zh: 生效时间
        en: effective from
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该版本开始可用于决定的 UTC 时刻。
        en: UTC instant when this version becomes eligible for decisions.
        ja: この版を判断に使用できるようになる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: effective_until
      labels:
        zh: 失效时间
        en: effective until
        ja: 失効時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该版本停止用于新决定的 UTC 时刻；长期有效时为空。
        en: UTC instant after which this version cannot govern new decisions; absent for open-ended validity.
        ja: 新しい判断に使用できなくなる UTC 時刻で、期限なしの場合は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: applicability
      labels:
        zh: 适用范围
        en: applicability
        ja: 適用範囲
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定策略适用主体、动作、资源和上下文的选择条件。
        en: Selectors limiting the principals, actions, resources, and contexts governed by the policy.
        ja: 方針が適用される主体、操作、資源、文脈を限定する選択条件です。
      allowed_values: []
      pattern: null
      example_value:
        actions:
          - invoke_tool
        resources:
          - tool:search
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: policy-specification-cedar
    labels:
      zh: 策略规范 - Cedar 授权评估
      en: policy specification - Cedar authorization evaluation
      ja: ポリシー仕様 - Cedar 認可評価
    descriptions: {zh: "策略规范(PolicySpecification) [PolicySpecification]: 由明确发布者维护的、带版本与适用范围的规范性授权规则集合。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: policy_id, issuer_ref, version.", en: "policy specification (PolicySpecification) [PolicySpecification]: A versioned normative authorization rule set maintained by an identified issuer and applicability scope.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include policy_id, issuer_ref, version.", ja: "ポリシー仕様(PolicySpecification) [PolicySpecification]: 識別可能な発行者が管理する、版と適用範囲を持つ規範的な認可規則集合です。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: policy_id, issuer_ref, version."}
    field_values:
      effective_from: "2026-07-16T00:00:00Z"
      issuer_ref: security-governance
      policy_id: tool-authorization
      version: "7"
    related_node_ids:
      - PolicyCombiningAlgorithm
      - PolicyEvaluation
      - PolicyRule
      - PolicySpecification
    related_relation_ids:
      - claim-policy-specification-001
      - claim-policy-specification-002
      - PolicyCombiningAlgorithm
      - PolicyEvaluation
      - PolicyEvaluation-uses-PolicySpecification
      - PolicyRule
      - PolicySpecification
      - PolicySpecification-contains-PolicyRule
      - PolicySpecification-uses-PolicyCombiningAlgorithm
    example_source: Amazon Cedar
    source_claims:
      - claim-policy-specification-001
  - id: policy-specification-opa
    labels:
      zh: 策略规范 - OPA Rego 策略评估
      en: policy specification - OPA Rego policy evaluation
      ja: ポリシー仕様 - OPA Rego ポリシー評価
    descriptions: {zh: "策略规范(PolicySpecification) [PolicySpecification]: 由明确发布者维护的、带版本与适用范围的规范性授权规则集合。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: policy_id, issuer_ref, version.", en: "policy specification (PolicySpecification) [PolicySpecification]: A versioned normative authorization rule set maintained by an identified issuer and applicability scope.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include policy_id, issuer_ref, version.", ja: "ポリシー仕様(PolicySpecification) [PolicySpecification]: 識別可能な発行者が管理する、版と適用範囲を持つ規範的な認可規則集合です。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: policy_id, issuer_ref, version."}
    field_values:
      effective_from: "2026-07-16T00:00:00Z"
      issuer_ref: security-governance
      policy_id: tool-authorization
      version: "7"
    related_node_ids:
      - PolicyCombiningAlgorithm
      - PolicyEvaluation
      - PolicyRule
      - PolicySpecification
    related_relation_ids:
      - claim-policy-specification-001
      - claim-policy-specification-002
      - PolicyCombiningAlgorithm
      - PolicyEvaluation
      - PolicyEvaluation-uses-PolicySpecification
      - PolicyRule
      - PolicySpecification
      - PolicySpecification-contains-PolicyRule
      - PolicySpecification-uses-PolicyCombiningAlgorithm
    example_source: Open Policy Agent
    source_claims:
      - claim-policy-specification-001
  - id: policy-specification-trustllm
    labels:
      zh: 策略规范 - TrustLLM 六维可信度
      en: policy specification - TrustLLM six-dimension trust
      ja: ポリシー仕様 - TrustLLM 6次元信頼性
    descriptions: {zh: "策略规范(PolicySpecification) [PolicySpecification]: 由明确发布者维护的、带版本与适用范围的规范性授权规则集合。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: policy_id, issuer_ref, version.", en: "policy specification (PolicySpecification) [PolicySpecification]: A versioned normative authorization rule set maintained by an identified issuer and applicability scope.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include policy_id, issuer_ref, version.", ja: "ポリシー仕様(PolicySpecification) [PolicySpecification]: 識別可能な発行者が管理する、版と適用範囲を持つ規範的な認可規則集合です。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: policy_id, issuer_ref, version."}
    field_values:
