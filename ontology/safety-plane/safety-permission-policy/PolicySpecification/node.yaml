      ja: ポリシー仕様 - DecodingTrust GPT 評価
    descriptions: {zh: "策略规范(PolicySpecification) [PolicySpecification]: 由明确发布者维护的、带版本与适用范围的规范性授权规则集合。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: policy_id, issuer_ref, version.", en: "policy specification (PolicySpecification) [PolicySpecification]: A versioned normative authorization rule set maintained by an identified issuer and applicability scope.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include policy_id, issuer_ref, version.", ja: "ポリシー仕様(PolicySpecification) [PolicySpecification]: 識別可能な発行者が管理する、版と適用範囲を持つ規範的な認可規則集合です。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: policy_id, issuer_ref, version."}
    field_values:
