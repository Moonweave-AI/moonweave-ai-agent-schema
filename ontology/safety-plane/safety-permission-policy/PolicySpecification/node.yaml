schema: moonweave.ai/ontology-node/v1
id: PolicySpecification
kind: concept
status: accepted
labels:
  zh: 策略规范
  en: policy specification
  ja: ポリシー仕様
semantics:
  short_definition:
    zh: 由明确发布者维护的、带版本与适用范围的规范性授权规则集合。
    en: A versioned normative authorization rule set maintained by an identified issuer and applicability scope.
    ja: 識別可能な発行者が管理する、版と適用範囲を持つ規範的な認可規則集合です。
  definition:
    zh: 策略规范是可独立识别和版本化的规范对象：它由明确发布者签发，界定适用主体、动作、资源和上下文，并包含可求值规则及规则组合算法；一次策略评估引用某个确定版本，但评估活动和评估结果不属于规范本身。
    en: A PolicySpecification is an independently identified, versioned normative object issued by a known authority. It defines applicable principals, actions, resources, and context, contains evaluable rules, and selects a rule-combining algorithm; an evaluation references one fixed version, but neither the evaluation activity nor its resulting decision is part of the specification.
    ja: PolicySpecification は独立に識別・版管理される規範対象です。既知の権限者が発行し、適用する主体・操作・資源・文脈を定め、評価可能な規則と規則結合アルゴリズムを含みます。評価は特定版を参照しますが、評価活動とその判断結果は仕様の一部ではありません。
  why_needed:
    zh: 它把长期有效的规范与一次运行中的请求、评估和决定分开，使决定能够按准确策略版本复现和审计。
    en: It separates durable normative content from one request, evaluation, and decision so a result can be reproduced and audited against the exact policy version.
    ja: 持続する規範内容を一回の要求・評価・判断から分離し、正確な方針版に対して結果を再現・監査できるようにします。
  includes:
    - zh: 包含策略标识、版本、发布者、有效期、适用范围、所含规则和所选组合算法。
      en: Includes policy identity, version, issuer, validity, applicability, contained rules, and selected combining algorithm.
      ja: 方針識別子、版、発行者、有効期間、適用範囲、含まれる規則、選択された結合アルゴリズムを含みます。
  excludes:
    - zh: 不包含一次授权请求、策略评估运行、具体决定、授权授予或执行门控。
      en: Excludes an individual authorization request, evaluation run, concrete decision, authorization grant, or enforcement gate.
      ja: 個別の認可要求、評価実行、具体的判断、認可付与、執行ゲートを含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - policy_id
    - version
  fields:
    - id: policy_id
      labels:
        zh: 策略标识
        en: policy ID
        ja: ポリシーID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本保持稳定的策略族标识。
        en: Stable identifier for the policy family across versions.
        ja: 版をまたいで安定する方針系列の識別子です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: version
      labels:
        zh: 策略版本
        en: policy version
        ja: ポリシー版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次求值所引用的不可变发布版本。
        en: Immutable released version referenced by an evaluation.
        ja: 評価が参照する変更不能な公開版です。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: issuer_ref
      labels:
        zh: 发布者引用
        en: issuer reference
        ja: 発行者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对策略内容具有发布权限的主体。
        en: Authority permitted to issue the policy content.
        ja: 方針内容を発行する権限主体です。
      allowed_values: []
      pattern: null
      example_value: security-governance
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: effective_from
      labels:
        zh: 生效时间
        en: effective from
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该版本开始可用于决定的 UTC 时刻。
        en: UTC instant when this version becomes eligible for decisions.
        ja: この版を判断に使用できるようになる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: effective_until
      labels:
        zh: 失效时间
        en: effective until
        ja: 失効時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该版本停止用于新决定的 UTC 时刻；长期有效时为空。
        en: UTC instant after which this version cannot govern new decisions; absent for open-ended validity.
        ja: 新しい判断に使用できなくなる UTC 時刻で、期限なしの場合は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
    - id: applicability
      labels:
        zh: 适用范围
        en: applicability
        ja: 適用範囲
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定策略适用主体、动作、资源和上下文的选择条件。
        en: Selectors limiting the principals, actions, resources, and contexts governed by the policy.
        ja: 方針が適用される主体、操作、資源、文脈を限定する選択条件です。
      allowed_values: []
      pattern: null
      example_value:
        actions:
          - invoke_tool
        resources:
          - tool:search
      source_claims:
        - claim-policy-specification-001
        - claim-policy-specification-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicySpecification-example-positive-manual-001
    kind: positive
    labels:
      zh: 策略规范正例
      en: Positive policy specification case
      ja: ポリシー仕様の正例
    scenario_id: null
    descriptions:
      zh: 安全治理机构发布 tool-authorization 第 7 版，声明其适用于 invoke_tool，并将两条规则和 deny-overrides 组合算法纳入该不可变版本。
      en: Security governance publishes tool-authorization version 7 for invoke_tool, containing two rules and the deny-overrides combining algorithm in that immutable release.
      ja: 安全ガバナンスが invoke_tool 用の tool-authorization 第7版を公開し、二つの規則と deny-overrides 結合アルゴリズムを不変版に含めます。
    field_values:
      policy_id: tool-authorization
      version: "7"
      issuer_ref: security-governance
      effective_from: 2026-07-16T00:00:00Z
      effective_until: null
      applicability:
        actions:
          - invoke_tool
    related_node_ids:
      - PolicySpecification
      - PolicyRule
      - PolicyCombiningAlgorithm
    related_relation_ids:
      - PolicySpecification-contains-PolicyRule
      - PolicySpecification-uses-PolicyCombiningAlgorithm
    expected_result:
      zh: 该规范可按 policy_id 与 version 唯一查询，且规则和组合算法保持同一发布版本。
      en: The specification is uniquely queryable by policy_id and version, with its rules and combining algorithm bound to the same release.
      ja: policy_id と version で一意に検索でき、規則と結合アルゴリズムが同一公開版に束縛されます。
    why_valid_or_invalid:
      zh: 场景给出了发布者、版本、适用范围和规范组成，而没有把运行时决定写进策略对象。
      en: The case supplies issuer, version, applicability, and normative composition without embedding a runtime decision in the policy object.
      ja: 発行者、版、適用範囲、規範構成を示し、実行時判断を方針対象へ混入していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-specification-001
      - claim-policy-specification-002
  - id: PolicySpecification-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 策略规范边界反例
      en: Boundary counterexample for policy specification
      ja: ポリシー仕様の境界反例
    scenario_id: null
    descriptions:
      zh: 一次针对 request-42 的 PolicyEvaluation 即使使用第 7 版策略，也不是 PolicySpecification；它有运行开始时间和输入摘要，而不是发布身份。
      en: A PolicyEvaluation for request-42 is not a PolicySpecification even when it uses version 7; it has a run start time and input digest rather than a release identity.
      ja: request-42 の PolicyEvaluation は第7版を使っても PolicySpecification ではありません。公開同一性ではなく実行開始時刻と入力ダイジェストを持ちます。
    field_values: {}
    related_node_ids:
      - PolicySpecification
      - PolicyEvaluation
    related_relation_ids:
      - PolicyEvaluation-uses-PolicySpecification
    expected_result:
      zh: 评估保持活动类型，并通过 uses 关系引用规范。
      en: The evaluation remains an activity and references the specification through uses.
      ja: 評価は活動型のまま、uses 関係で仕様を参照します。
    why_valid_or_invalid:
      zh: 引用一个规范版本不会把运行活动变成规范组成。
      en: Referencing a policy version does not turn a runtime activity into normative content.
      ja: 方針版の参照は実行活動を規範内容へ変えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-specification-001
      - claim-policy-specification-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-policy-specification-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-specification-002
    source: eng-policy-opa
    supports: OPA documents structured input evaluated against policy and data to produce a policy decision, while enforcement remains the caller's responsibility.
    locator: Open Policy Agent documentation > What is OPA? > policy input, evaluation, decision output, and separation from enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
