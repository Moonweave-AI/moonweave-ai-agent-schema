schema: moonweave.ai/ontology-node/v1
id: PolicySpecification
kind: concept
labels:
  zh: 策略规范
  en: policy specification
  ja: ポリシー仕様
semantics:
  short_definition:
    zh: 由明确发布者维护、带版本与适用范围的规范性授权规则集合。
    en: A versioned normative authorization rule set maintained by an identified issuer with applicability scope.
    ja: 識別可能な発行者が管理する版と適用範囲付き規範的認可規則集合。
  definition:
    zh: PolicySpecification 以 policy_id+version 标识不可变规范，包含 PolicyRule、PolicyCombiningAlgorithm 与 issuer_ref/effective_from。它映射 OPA Rego 策略包与 data.json、MCP tool annotations（readOnlyHint、destructiveHint、requireApproval）、Cursor sandbox.json allowlist/denylist 与 Claude .claude/settings.json 工具权限规则；PolicyEvaluation 引用确定版本，但评估活动与决定不属于规范本身。
    en: PolicySpecification is an immutable norm identified by policy_id+version, containing PolicyRule, PolicyCombiningAlgorithm, and issuer_ref/effective_from. It maps OPA Rego policy bundles with data.json, MCP tool annotations (readOnlyHint, destructiveHint, requireApproval), Cursor sandbox.json allowlist/denylist, and Claude .claude/settings.json tool rules; PolicyEvaluation references a fixed revision, but evaluation activity and decisions are not part of the specification.
    ja: PolicySpecification は policy_id+version で immutable 規範を識別し PolicyRule/PolicyCombiningAlgorithm/issuer_ref/effective_from を含む。OPA Rego bundle、MCP tool annotations、Cursor sandbox.json allowlist/denylist、Claude settings.json tool rule を写像。PolicyEvaluation は固定 revision 参照、評価/判断は仕様に含まない。
  why_needed:
    zh: 决定必须按准确策略版本复现；把 Rego 包与 MCP 注解混为一次运行会丢失审计链。
    en: Decisions must replay against exact policy revisions; merging Rego bundles and MCP annotations into one run loses audit chains.
    ja: 判断は正確 policy revision で replay 必須。Rego bundle と MCP annotation を一回 run に混ぜると監査連鎖が失われます。
  includes:
    - zh: 包含策略标识、版本、发布者、有效期、适用范围、所含规则和所选组合算法。
      en: Includes policy identity, version, issuer, validity, applicability, contained rules, and selected combining algorithm.
      ja: 方針識別子、版、発行者、有効期間、適用範囲、含まれる規則、選択された結合アルゴリズムを含みます。
  excludes:
    - zh: 不包含一次授权请求、策略评估运行、具体决定、授权授予或执行门控。
      en: Excludes an individual authorization request, evaluation run, concrete decision, authorization grant, or enforcement gate.
      ja: 個別の認可要求、評価実行、具体的判断、認可付与、執行ゲートを含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: OPA bundle 发布为 tool-authorization@N；MCP server 启动时加载 tool annotations 合并进 policy；Cursor/Claude settings 变更产生新 version 而非原地修改。Moonweave 保留 policy_id、version、issuer_ref 与 combining_algorithm_ref。
    en: Publish OPA bundles as tool-authorization@N; MCP server startup merges tool annotations into policy; Cursor/Claude settings changes create new versions rather than in-place edits. Moonweave retains policy_id, version, issuer_ref, and combining_algorithm_ref.
    ja: OPA bundle を tool-authorization@N として publish。MCP 起動時 tool annotations を policy に merge。Cursor/Claude settings 変更は新版作成。policy_id/version/issuer_ref/combining_algorithm_ref を保持。
  typical_input:
    - description: OPA Rego policy bundle.
      format: package tool.auth; deny[msg] { ... }; data.json roles
      source_claims:
        - claim-policy-specification-design
    - description: MCP tool annotations merged into policy.
      format: readOnlyHint, destructiveHint, requireApproval per tool
      source_claims:
        - claim-policy-specification-design
  typical_output:
    - description: Versioned policy reference.
      format: '{"policy_id":"tool-authorization","version":"7","combining_algorithm_ref":"deny-overrides@1"}'
      source_claims:
        - claim-policy-specification-design
  reference_implementations:
    - name: MCP Authorization (2025-06-18)
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: OAuth 2.1 flows, scopes, and resource indicators.
    - name: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      description: Rego policies and decision queries.
    - name: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      description: Permit/Deny/NotApplicable and combining algorithms.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: Command approval dialogs and sandbox modes.
    - name: Claude Code permissions
      url: https://docs.anthropic.com/en/docs/claude-code/permissions
      description: yesAllow, allowForSession, and tool permission modes.
structure:
  identity_keys:
    - policy_id
    - version
  fields:
    - id: policy_id
      labels:
        zh: 策略标识
        en: policy ID
        ja: ポリシーID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本保持稳定的策略族标识。
        en: Stable identifier for the policy family across versions.
        ja: 版をまたいで安定する方針系列の識別子です。
      allowed_values: []
      pattern: null
      example_value: tool-authorization
      source_claims:
        - claim-policy-specification-design
        - claim-policy-specification-design
    - id: version
      labels:
        zh: 策略版本
        en: policy version
        ja: ポリシー版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次求值所引用的不可变发布版本。
        en: Immutable released version referenced by an evaluation.
        ja: 評価が参照する変更不能な公開版です。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-policy-specification-design
        - claim-policy-specification-design
    - id: issuer_ref
      labels:
        zh: 发布者引用
        en: issuer reference
        ja: 発行者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对策略内容具有发布权限的主体。
        en: Authority permitted to issue the policy content.
        ja: 方針内容を発行する権限主体です。
      allowed_values: []
      pattern: null
      example_value: security-governance
      source_claims:
        - claim-policy-specification-design
        - claim-policy-specification-design
    - id: effective_from
      labels:
        zh: 生效时间
        en: effective from
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该版本开始可用于决定的 UTC 时刻。
        en: UTC instant when this version becomes eligible for decisions.
        ja: この版を判断に使用できるようになる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-policy-specification-design
        - claim-policy-specification-design
    - id: effective_until
      labels:
        zh: 失效时间
        en: effective until
        ja: 失効時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该版本停止用于新决定的 UTC 时刻；长期有效时为空。
        en: UTC instant after which this version cannot govern new decisions; absent for open-ended validity.
        ja: 新しい判断に使用できなくなる UTC 時刻で、期限なしの場合は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-policy-specification-design
        - claim-policy-specification-design
    - id: applicability
      labels:
        zh: 适用范围
        en: applicability
        ja: 適用範囲
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定策略适用主体、动作、资源和上下文的选择条件。
        en: Selectors limiting the principals, actions, resources, and contexts governed by the policy.
        ja: 方針が適用される主体、操作、資源、文脈を限定する選択条件です。
      allowed_values: []
      pattern: null
      example_value:
        actions:
          - invoke_tool
        resources:
          - tool:search
      source_claims:
        - claim-policy-specification-design
        - claim-policy-specification-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: PolicySpecification-opa-rego
    labels:
      zh: OPA Rego 策略包
      en: OPA Rego policy bundle
      ja: OPA Rego policy bundle
    descriptions:
      zh: tool-authorization@7 包含 Rego deny-unlisted-shell 与 allow-approved-read 规则及 deny-overrides 算法。
      en: tool-authorization@7 contains Rego deny-unlisted-shell and allow-approved-read rules with deny-overrides algorithm.
      ja: tool-authorization@7 が Rego deny-unlisted-shell/allow-approved-read と deny-overrides を含む。
    example_source:
      product: Open Policy Agent
      url: https://www.openpolicyagent.org/docs/latest/policy-language/
      version: Rego bundle
    field_values:
      policy_id: tool-authorization
      version: "7"
      issuer_ref: security-governance
    related_node_ids:
      - PolicySpecification
      - PolicyRule
      - PolicyCombiningAlgorithm
    related_relation_ids: []
    source_claims:
      - claim-policy-specification-design
  - id: PolicySpecification-mcp-annotations
    labels:
      zh: MCP 工具注解策略
      en: MCP tool annotation policy
      ja: MCP tool annotation policy
    descriptions:
      zh: mcp-tool-policy@3 合并 MCP tools/list 的 readOnlyHint 与 requireApproval 注解。
      en: mcp-tool-policy@3 merges MCP tools/list readOnlyHint and requireApproval annotations.
      ja: mcp-tool-policy@3 が MCP tools/list readOnlyHint/requireApproval を merge。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: tool annotations
    field_values:
      policy_id: mcp-tool-policy
      version: "3"
    related_node_ids:
      - PolicySpecification
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-specification-design
  - id: PolicySpecification-cursor-allowlist
    labels:
      zh: Cursor allowlist 策略
      en: Cursor allowlist policy
      ja: Cursor allowlist policy
    descriptions:
      zh: cursor-shell-policy@2 定义 command_allowlist 与 sandbox_mode workspace-write。
      en: cursor-shell-policy@2 defines command_allowlist and sandbox_mode workspace-write.
      ja: cursor-shell-policy@2 が command_allowlist と sandbox_mode workspace-write を定義。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: sandbox.json
    field_values:
      policy_id: cursor-shell-policy
      version: "2"
    related_node_ids:
      - PolicySpecification
      - PolicyRule
    related_relation_ids: []
    source_claims:
      - claim-policy-specification-design
  - id: PolicySpecification-boundary-evaluation
    labels:
      zh: 评估不是规范
      en: Evaluation is not specification
      ja: evaluation は specification ではない
    descriptions:
      zh: PolicyEvaluation evaluation-42 引用 tool-authorization@7 但不成为 PolicySpecification 的一部分。
      en: PolicyEvaluation evaluation-42 references tool-authorization@7 but is not part of PolicySpecification.
      ja: PolicyEvaluation evaluation-42 は tool-authorization@7 参照するが PolicySpecification の一部ではない。
    example_source:
      product: OASIS XACML 3.0
      url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
      version: policy versus evaluation
    field_values: {}
    related_node_ids:
      - PolicySpecification
      - PolicyEvaluation
    related_relation_ids: []
    source_claims:
      - claim-policy-specification-design
parent_relation: null
relations: []
sources:
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: OAuth 2.1 authorization-code/PKCE, protected-resource metadata, resource indicators, and scopes.
  - id: opa-rego
    title: Open Policy Agent — Rego language
    url: https://www.openpolicyagent.org/docs/latest/policy-language/
    source_type: official-doc
    relevance: Versioned policy rules, deny/allow effects, and combining evaluation for authorization.
  - id: xacml-3-core
    title: OASIS XACML 3.0 Core
    url: https://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-cos01-en.html
    source_type: standard
    relevance: Permit/Deny/NotApplicable decisions, policy rules, conditions, and combining algorithms.
  - id: nist-sp-800-162
    title: NIST SP 800-162 — ABAC
    url: https://csrc.nist.gov/publications/detail/sp/800-162/final
    source_type: standard
    relevance: Subject-object-operation-environment attribute evaluation for authorization.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency, insecure plugin design, and human-in-the-loop authorization patterns.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: Command allowlist/denylist and sandbox modes for tool approval.
  - id: claude-code-permissions
    title: Claude Code permissions
    url: https://docs.anthropic.com/en/docs/claude-code/permissions
    source_type: official-doc
    relevance: yesAllow, allowForSession, Bash/edit/MCP permission modes.
  - id: safety-permission-design
    title: Moonweave permission-policy module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: "Authorization loop: request, evaluation, decision, grant, gate, and human approval separation."
source_claims:
  - id: claim-policy-specification-design
    source: safety-permission-design
    supports: PolicySpecification separates durable normative content from evaluation occurrences.
    locator: Policy specification boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-specification-design
    source: opa-rego
    supports: OPA Rego bundles map to versioned PolicySpecification with rules and data.
    locator: Rego packages
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-specification-design
    source: mcp-authorization-2025
    supports: MCP tool annotations merge into PolicySpecification rules.
    locator: Tool metadata
    evidence_kind: design-inference
    confidence: high
  - id: claim-policy-specification-design
    source: cursor-terminal-sandbox
    supports: Cursor allowlist and sandbox settings map to PolicySpecification revisions.
    locator: sandbox.json
    evidence_kind: design-inference
    confidence: high
