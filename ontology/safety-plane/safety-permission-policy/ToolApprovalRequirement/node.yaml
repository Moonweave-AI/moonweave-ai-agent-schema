source_claims:
  - id: claim-openai-needs-approval
    source: openai-agents-hitl
    supports: In the Agents SDK JavaScript human-in-the-loop flow, a tool's needsApproval configuration causes an unapproved call to pause as a pending approval interruption; the application later approves or rejects that exact interruption before resuming.
    locator: "Approval flow; Configuring approval requirements"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-cedar-allow-deny
    source: cedar-authorization
    supports: Cedar evaluates authorization requests and returns an allow or deny response with diagnostics; it does not define Moonweave's static tool requirement profile.
    locator: "Authorization responses"
    evidence_kind: normative-guidance
    confidence: high
  - id: claim-mcp-credential-boundary
    source: mcp-authorization-2025
    supports: MCP HTTP authorization constrains OAuth-based access to protected resources and scopes; it does not define the local AuthorizationCredential profile.
    locator: "Resource and scope requirements"
    evidence_kind: normative-guidance
    confidence: high
  - id: claim-local-tool-approval-requirement
    source: moonweave-local-tool-approval-requirement
    supports: Moonweave design inference defines ToolApprovalRequirement as static configuration attached to ToolDefinition, with needs_approval and evidence kinds only; pending calls, interruption items, approvals, credentials, safety checks, and effects remain separate runtime records.
    locator: "Moonweave local tool-approval requirement profile"
    evidence_kind: design-inference
    confidence: high
