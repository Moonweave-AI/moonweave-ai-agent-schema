schema: moonweave.ai/ontology-node/v1
id: DataZone
kind: concept
status: accepted
labels:
  zh: 数据处理区
  en: data-handling zone
  ja: data-handling zone
semantics:
  short_definition:
    zh: 以信任级别、数据分类和处理规则定义的版本化安全区域。
    en: A versioned security zone defined by trust level, data classifications, and handling rules.
    ja: trust level・data classification・handling rule で定義する versioned security zone。
  definition:
    zh: 数据处理区是一种规范，以区域标识、版本、信任级别、允许的数据分类、处理策略、保留策略和有效期为身份，描述数据在某一安全区域内应如何存储、传输、披露与删除。它不是其成员数据的集合副本，也不是 TrustBoundary 或一次 BoundaryCrossing。
    en: A DataZone is a specification identified by zone ID, version, trust level, permitted data classifications, handling policy, retention policy, and validity interval, describing how data must be stored, transferred, disclosed, and deleted within one security zone. It is not a copied collection of member data, a TrustBoundary, or one BoundaryCrossing.
    ja: DataZone は zone ID・version・trust level・permitted data classification・handling policy・retention policy・validity interval で識別する specification で zone 内の storage・transfer・disclosure・deletion を定めます。member data copy・TrustBoundary・BoundaryCrossing ではありません。
  why_needed:
    zh: 把区域作为版本化处理规范而非数据容器，可以在跨越时比较源区与目标区要求而不复制数据成员。
    en: Treating a zone as a versioned handling specification rather than a data container allows crossing-time comparison of source and target requirements without copying data membership.
    ja: zone を data container でなく versioned handling spec とし crossing 時に source/target requirement を比較し data membership を複製しません。
  includes:
    - zh: 公开、内部、机密、受限工具输出、短期上下文和持久记忆等具名处理区域。
      en: Named public, internal, confidential, restricted-tool-output, transient-context, and persistent-memory handling zones.
      ja: public・internal・confidential・restricted tool output・transient context・persistent memory handling zone。
  excludes:
    - zh: 实际文档或工件集合、物理网络子网、一次传输、授权范围和未版本化的自由文本标签。
      en: Actual document or artifact collections, physical network subnets, one transfer, authority scope, and unversioned free-text labels.
      ja: actual document/artifact collection・physical subnet・one transfer・authority scope・unversioned free-text label。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - data_zone_id
    - version
  fields:
    - id: data_zone_id
      labels:
        zh: 数据区标识
        en: data-zone ID
        ja: data-zone ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一个数据处理区。
        en: Stable logical identifier for a data-handling zone across revisions.
        ja: revision 間で stable な data handling zone ID。
      allowed_values: []
      pattern: null
      example_value: zone-model-context
      source_claims:
        - claim-data-zone-001
    - id: version
      labels:
        zh: 数据区版本
        en: zone version
        ja: zone version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的分类与处理要求。
        en: Fixes one immutable revision of classification and handling requirements.
        ja: classification/handling requirement の immutable revision。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-data-zone-001
    - id: trust_level
      labels:
        zh: 信任级别
        en: trust level
        ja: trust level
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明区域内数据被消费前可采用的信任基线。
        en: States the baseline trust allowed before data in the zone is consumed.
        ja: zone data consumption 前の baseline trust。
      allowed_values: []
      pattern: null
      example_value: untrusted-external
      source_claims:
        - claim-data-zone-002
        - claim-data-zone-001
    - id: data_classifications
      labels:
        zh: 数据分类
        en: data classifications
        ja: data classifications
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该区域允许承载的数据分类标签。
        en: Lists data-classification labels permitted in the zone.
        ja: zone に permitted な data classification label。
      allowed_values: []
      pattern: null
      example_value:
        - public
        - internal
      source_claims:
        - claim-data-zone-001
    - id: handling_policy_ref
      labels:
        zh: 处理策略引用
        en: handling-policy reference
        ja: handling-policy reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用存储、传输、扫描、披露和删除要求。
        en: References storage, transport, scanning, disclosure, and deletion requirements.
        ja: storage・transport・scanning・disclosure・deletion requirement。
      allowed_values: []
      pattern: null
      example_value: handling-untrusted-output-v3
      source_claims:
        - claim-data-zone-001
    - id: retention_policy_ref
      labels:
        zh: 保留策略引用
        en: retention-policy reference
        ja: retention-policy reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用区域数据的保留、过期和清除规则。
        en: References retention, expiration, and purge rules for zone data.
        ja: zone data retention・expiration・purge rule。
      allowed_values: []
      pattern: null
      example_value: retention-24h
      source_claims:
        - claim-data-zone-001
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录区域版本开始适用的时间。
        en: Records when the zone revision begins to apply.
        ja: zone revision apply start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-data-zone-001
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录区域版本停止适用的时间。
        en: Records when the zone revision stops applying.
        ja: zone revision stop time。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-data-zone-001
  constraints: []
  required_relation_constraints: []
