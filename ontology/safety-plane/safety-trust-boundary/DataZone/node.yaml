schema: moonweave.ai/ontology-node/v1
id: DataZone
kind: concept
labels:
  zh: 数据处理区
  en: data-handling zone
  ja: data-handling zone
semantics:
  short_definition:
    zh: 由分类、处理规则与保留策略识别的版本化数据处理区域规范。
    en: A versioned data-handling zone specification identified by classification, handling rules, and retention policy.
    ja: 分類・処理 rule・保持 policy で識別する版管理 data-handling zone specification。
  definition:
    zh: DataZone 以 zone_id+version 声明 data_classification、permitted_handling、retention_rules 与 valid_from/until。它映射 CISA Zero Trust Data pillar 的分类/标签、Anthropic developer instruction zone、untrusted user/tool zone 与 sanitized model-context input zone。DataZone 描述数据所在与允许处理方式，不是 PermissionScope 或 TrustBoundary。
    en: DataZone declares data_classification, permitted_handling, retention_rules, and valid_from/until via zone_id+version. It maps CISA Zero Trust Data pillar classification/labeling, Anthropic developer instruction zone, untrusted user/tool zone, and sanitized model-context input zone. DataZone describes where data lives and permitted handling, not PermissionScope or TrustBoundary.
    ja: DataZone は zone_id+version で data_classification/permitted_handling/retention_rules/valid_from/until を宣言。CISA Data pillar 分類/ラベル、Anthropic developer instruction zone、untrusted user/tool zone、sanitized model-context input zone を写像。PermissionScope/TrustBoundary ではない。
  why_needed:
    zh: BoundaryCrossing 必须引用源/目标 DataZone 版本；把区域与权限范围混用会导致策略求值上下文错误。
    en: BoundaryCrossing must reference source/target DataZone revisions; conflating zones with permission scope corrupts policy evaluation context.
    ja: BoundaryCrossing は source/target DataZone revision 参照必須。zone と permission scope 混同は policy evaluation context を壊します。
  includes:
    - zh: 公开、内部、机密、受限工具输出、短期上下文和持久记忆等具名处理区域。
      en: Named public, internal, confidential, restricted-tool-output, transient-context, and persistent-memory handling zones.
      ja: public・internal・confidential・restricted tool output・transient context・persistent memory handling zone。
  excludes:
    - zh: 实际文档或工件集合、物理网络子网、一次传输、授权范围和未版本化的自由文本标签。
      en: Actual document or artifact collections, physical network subnets, one transfer, authority scope, and unversioned free-text labels.
      ja: actual document/artifact collection・physical subnet・one transfer・authority scope・unversioned free-text label。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Anthropic system/developer blocks→zone-instruction@N；user/tool→zone-untrusted-input@N；post-sanitize context→zone-model-context@N。PolicySpecification 可把 DataZone 作为 context_constraints 输入但不复制 zone 身份。
    en: Anthropic system/developer blocks→zone-instruction@N; user/tool→zone-untrusted-input@N; post-sanitize context→zone-model-context@N. PolicySpecification may use DataZone as context_constraints input without copying zone identity.
    ja: Anthropic system/developer→zone-instruction@N。user/tool→zone-untrusted-input@N。sanitize 後→zone-model-context@N。PolicySpecification は context_constraints 入力に DataZone 使用可、identity 複製不可。
  typical_input:
    - description: Untrusted tool output zone.
      format: zone-tool-output@3 classification=untrusted-tool-output
      source_claims:
        - claim-datazone-design
  typical_output:
    - description: Zone reference on crossing.
      format: '{"source_data_zone_ref":"zone-tool-output@3","target_data_zone_ref":"zone-model-context@7"}'
      source_claims:
        - claim-datazone-design
  reference_implementations:
    - name: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Zero trust zones and policy enforcement points.
    - name: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: Server isolation and protected resources.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system/developer/user/tool role boundaries.
structure:
  identity_keys:
    - data_zone_id
    - version
  fields:
    - id: data_zone_id
      labels:
        zh: 数据区标识
        en: data-zone ID
        ja: data-zone ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一个数据处理区。
        en: Stable logical identifier for a data-handling zone across revisions.
        ja: revision 間で stable な data handling zone ID。
      allowed_values: []
      pattern: null
      example_value: zone-model-context
      source_claims:
        - claim-datazone-design
    - id: version
      labels:
        zh: 数据区版本
        en: zone version
        ja: zone version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的分类与处理要求。
        en: Fixes one immutable revision of classification and handling requirements.
        ja: classification/handling requirement の immutable revision。
      allowed_values: []
      pattern: null
      example_value: "7"
      source_claims:
        - claim-datazone-design
    - id: trust_level
      labels:
        zh: 信任级别
        en: trust level
        ja: trust level
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明区域内数据被消费前可采用的信任基线。
        en: States the baseline trust allowed before data in the zone is consumed.
        ja: zone data consumption 前の baseline trust。
      allowed_values: []
      pattern: null
      example_value: untrusted-external
      source_claims:
        - claim-datazone-design
        - claim-datazone-design
    - id: data_classifications
      labels:
        zh: 数据分类
        en: data classifications
        ja: data classifications
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出该区域允许承载的数据分类标签。
        en: Lists data-classification labels permitted in the zone.
        ja: zone に permitted な data classification label。
      allowed_values: []
      pattern: null
      example_value:
        - public
        - internal
      source_claims:
        - claim-datazone-design
    - id: handling_policy_ref
      labels:
        zh: 处理策略引用
        en: handling-policy reference
        ja: handling-policy reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用存储、传输、扫描、披露和删除要求。
        en: References storage, transport, scanning, disclosure, and deletion requirements.
        ja: storage・transport・scanning・disclosure・deletion requirement。
      allowed_values: []
      pattern: null
      example_value: handling-untrusted-output-v3
      source_claims:
        - claim-datazone-design
    - id: retention_policy_ref
      labels:
        zh: 保留策略引用
        en: retention-policy reference
        ja: retention-policy reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用区域数据的保留、过期和清除规则。
        en: References retention, expiration, and purge rules for zone data.
        ja: zone data retention・expiration・purge rule。
      allowed_values: []
      pattern: null
      example_value: retention-24h
      source_claims:
        - claim-datazone-design
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录区域版本开始适用的时间。
        en: Records when the zone revision begins to apply.
        ja: zone revision apply start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-datazone-design
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录区域版本停止适用的时间。
        en: Records when the zone revision stops applying.
        ja: zone revision stop time。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-datazone-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: DataZone-mcp-tool-output
    labels:
      zh: MCP 工具输出区
      en: MCP tool output zone
      ja: MCP tool output zone
    descriptions:
      zh: zone-tool-output@3 分类 untrusted-tool-output，保留 24h 供扫描。
      en: zone-tool-output@3 classified untrusted-tool-output, retained 24h for scanning.
      ja: zone-tool-output@3 untrusted-tool-output 分類、24h 保持 scan 用。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: tool output handling
    field_values:
      zone_id: zone-tool-output
      version: "3"
      data_classification: untrusted-tool-output
    related_node_ids:
      - DataZone
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-datazone-design
  - id: DataZone-anthropic-instruction
    labels:
      zh: Anthropic 指令区
      en: Anthropic instruction zone
      ja: Anthropic instruction zone
    descriptions:
      zh: zone-instruction@1 存放 developer/system 指令，permitted_handling=trusted-instruction-only。
      en: zone-instruction@1 holds developer/system instructions with permitted_handling=trusted-instruction-only.
      ja: zone-instruction@1 developer/system instruction、trusted-instruction-only。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      version: developer zone
    field_values:
      zone_id: zone-instruction
      version: "1"
    related_node_ids:
      - DataZone
      - TrustBoundary
    related_relation_ids: []
    source_claims:
      - claim-datazone-design
  - id: DataZone-model-context
    labels:
      zh: 模型上下文输入区
      en: Model context input zone
      ja: model context input zone
    descriptions:
      zh: zone-model-context@7 仅允许 sanitized-context-input，retention=session。
      en: zone-model-context@7 allows only sanitized-context-input, retention=session.
      ja: zone-model-context@7 sanitized-context-input のみ、retention=session。
    example_source:
      product: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      version: data pillar
    field_values:
      zone_id: zone-model-context
      version: "7"
    related_node_ids:
      - DataZone
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-datazone-design
  - id: DataZone-boundary-scope
    labels:
      zh: DataZone 不是 PermissionScope
      en: DataZone is not PermissionScope
      ja: DataZone≠PermissionScope
    descriptions:
      zh: public-zone 描述数据位置，无 subject_selector/actions，不能当作 scope-search-read。
      en: public-zone describes data location without subject_selector/actions; cannot substitute scope-search-read.
      ja: public-zone はデータ位置のみで subject_selector/actions なし。scope-search-read 代替不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: zone versus scope
    field_values: {}
    related_node_ids:
      - DataZone
      - PermissionScope
    related_relation_ids: []
    source_claims:
      - claim-datazone-design
parent_relation: null
relations: []
sources:
  - id: nist-sp-800-207
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://csrc.nist.gov/pubs/sp/800/207/final
    source_type: standard
    relevance: Trust zones, policy enforcement points, and never implicit trust by network location.
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: MCP server isolation boundary and OAuth-protected resource access.
  - id: anthropic-messages-api
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: system/developer/user/tool role separation across trust boundaries.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Insecure plugin design and excessive agency across trust zones.
  - id: cisa-ztmm-v2
    title: CISA Zero Trust Maturity Model 2.0
    url: https://www.cisa.gov/zero-trust-maturity-model
    source_type: standard
    relevance: Data pillar inventory, categorization, labeling, and lifecycle protection.
  - id: safety-trust-design
    title: Moonweave trust-boundary module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TrustBoundary, DataZone, and BoundaryCrossing identity separation.
source_claims:
  - id: claim-datazone-design
    source: safety-trust-design
    supports: DataZone is structural handling region distinct from PermissionScope and TrustBoundary.
    locator: DataZone boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-datazone-design
    source: mcp-authorization-2025
    supports: MCP tool outputs reside in untrusted DataZone before model context admission.
    locator: Tool output zone
    evidence_kind: design-inference
    confidence: high
  - id: claim-datazone-design
    source: anthropic-messages-api
    supports: Anthropic role-separated content maps to distinct DataZones.
    locator: Role zones
    evidence_kind: design-inference
    confidence: high
  - id: claim-datazone-design
    source: nist-sp-800-207
    supports: NIST/CISA data classification and lifecycle map to versioned DataZone specifications.
    locator: Data pillar
    evidence_kind: design-inference
    confidence: high
