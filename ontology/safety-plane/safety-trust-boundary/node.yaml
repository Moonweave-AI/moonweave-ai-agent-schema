source_claims:
  - id: claim-safety-trust-boundary-001
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 states that network location alone grants no implicit trust, places enterprise resources beyond policy enforcement points in trust zones, and separates access requests, policy decisions, communication paths, monitoring, and termination; Moonweave uses this to model explicit trust-assumption boundaries and crossing occurrences.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones and policy enforcement points
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-002
    source: eng-security-cisa-zero-trust-maturity-v2
    supports: CISA Zero Trust Maturity Model 2.0 separates identity, device, network, application/workload, and data pillars and requires inventory, categorization, labeling, lifecycle protection, governance, and visibility for data; Moonweave uses these distinctions for versioned DataZone handling profiles.
    locator: CISA Zero Trust Maturity Model 2.0 Section 5 and Table 6, Data pillar
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-003
    source: eng-security-nist-abac
    supports: NIST SP 800-162 distinguishes subject, object, operation, environment attributes, policies, requests, and allow or deny decisions; Moonweave uses it to separate a reusable PermissionScope, issued AuthorizationGrant, concrete PolicyDecision, and one BoundaryCrossing occurrence.
    locator: NIST SP 800-162 Sections 2.1-2.3 and 3, ABAC terms, requests, policy and decision
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-004
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Activity, Entity, and Agent, associates responsibility-bearing agents with activities, and records time and influence; Moonweave models BoundaryCrossing as an occurrence initiated and received by Actors rather than treating actors as crossing subtypes.
    locator: W3C PROV-O Sections 2 and 3.1, Activity, Entity, Agent and association
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-005
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry separates traces, spans, events, resources, attributes, and timestamps; Moonweave uses TraceEvent as observability evidence that records a BoundaryCrossing rather than making the crossing itself a trace record.
    locator: OpenTelemetry Specification Overview, Tracing and Logs data-model sections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-006
    source: eng-proto-a2a-spec
    supports: The A2A protocol identifies remote agents through Agent Cards and addresses cross-agent communication as an interaction with a separately described remote endpoint; Moonweave therefore keeps RemoteAgentReference runtime-owned and uses remote_agent_crosses_trust_boundary only when that reference actually crosses a modeled TrustBoundary.
    locator: A2A specification, Agent Card discovery and remote-agent communication model
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-007
    source: eng-proto-a2a-spec
    supports: The A2A protocol gives a remote agent an independently discoverable Agent Card identity; Moonweave preserves that runtime identity and asserts remote_agent_crosses_trust_boundary only when communication crosses a separately modeled TrustBoundary.
    locator: A2A specification, Agent Card discovery and remote-agent communication model
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
