            decision_note:
              zh: 逐边人工核验确认：本对安全侧端点只有 BoundaryCrossing；两条可接受关系分别是 BoundaryCrossing-authorized_by-AuthorizationGrant 与 BoundaryCrossing-evaluated_by-PolicyDecision。已删除未出现在这些边上的 TrustBoundary、DataZone，避免把模块代表节点冒充关系端点。
              en: Manual edge-by-edge review confirms that BoundaryCrossing is the only safety-side endpoint for this pair and that the accepted relations are exactly BoundaryCrossing-authorized_by-AuthorizationGrant and BoundaryCrossing-evaluated_by-PolicyDecision. TrustBoundary and DataZone were removed because they are not endpoints of either edge.
              ja: edge-by-edge の manual review により、この pair の safety-side endpoint は BoundaryCrossing のみで、accepted relation は BoundaryCrossing-authorized_by-AuthorizationGrant と BoundaryCrossing-evaluated_by-PolicyDecision の二つだけと確認しました。どちらの endpoint でもない TrustBoundary と DataZone は削除しました。
          - reviewer_id: moonweave-trust-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 结构投影按实际边端点而非模块主题取并集：BoundaryCrossing 是两条边的源端，AuthorizationGrant 与 PolicyDecision 是权限域目标端；TrustBoundary、DataZone 虽属本模块，但与本对无直接关系。
              en: "Structural projection follows actual edge endpoints, not a union of module themes: BoundaryCrossing is the source, AuthorizationGrant and PolicyDecision are permission-owned targets, while TrustBoundary and DataZone are unrelated to this pair despite belonging to this module."
              ja: structural projection は module theme の集合ではなく actual edge endpoint に従います。BoundaryCrossing が source、AuthorizationGrant と PolicyDecision が permission-owned target であり、TrustBoundary と DataZone は本 module に属してもこの pair には無関係です。
