    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 separates communication paths and policy enforcement points from trust-zone assumptions; Moonweave uses that distinction to keep NetworkEndpoint and NetworkRoute separate from TrustBoundary identity.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones and policy enforcement points
    evidence_kind: design-inference
    confidence: high
