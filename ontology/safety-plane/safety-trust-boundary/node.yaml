schema: moonweave.ai/ontology-node/v1
id: safety-trust-boundary
kind: module
labels:
  zh: 信任边界与数据区
  en: Trust boundaries and data zones
  ja: 信頼境界とデータゾーン
semantics:
  short_definition:
    zh: 信任边界与数据区描述安全假设何时变化、数据处理区如何划分，以及对象实际跨界的一次可审计发生。
    en: Trust boundaries and data zones describes where security assumptions change, how data-handling zones are partitioned, and one auditable occurrence of an object crossing that boundary.
    ja: 信頼境界とデータゾーンは、安全仮定がいつ変わるか、データ処理区域の区分、対象が境界を実際に越えた一回の監査可能な発生を記述します。
  definition:
    zh: 本模块拥有版本化 TrustBoundary（含 InternalBoundary/ExternalBoundary 位置分类）、由分类/处理/保留规则识别的 DataZone，以及实际 BoundaryCrossing 及其源区、目标区、对象摘要、发起者、接收者与授权引用。它映射 NIST SP 800-207 零信任架构的“永不默认信任网络位置”、policy enforcement point 与 trust zone 分离；MCP 部署中 agent、MCP server、宿主与用户之间的 server isolation 与 context sharing 边界；Anthropic Messages API 的 system/developer/user/tool 角色分离——system/developer 指令与不可信 user/tool 内容必须在 TrustBoundary 上显式建模为跨界而非混在同一 DataZone。网络端点、工具通道或远程智能体只是 crossing 使用的 interaction_surface，不成为 TrustBoundary 子类型。PolicyDecision 与 AuthorizationGrant 由 safety-permission-policy 拥有，本模块只通过 authorized_by 与 evaluated_by 引用。
    en: "This module owns versioned TrustBoundary (including InternalBoundary/ExternalBoundary position classification), DataZone identified by classification, handling, and retention rules, and actual BoundaryCrossing with source and target zones, object digest, initiator, receiver, and authorization references. It maps NIST SP 800-207 zero trust—never implicit trust by network location—and separation of policy enforcement points from trust zones; MCP deployment boundaries among agent, MCP server, host, and user including server isolation and context sharing; and Anthropic Messages API system/developer/user/tool role separation where system/developer instructions and untrusted user/tool content must be modeled as explicit crossings at TrustBoundary rather than merged into one DataZone. Network endpoints, tool channels, or remote agents are interaction surfaces for a crossing, not TrustBoundary subtypes. PolicyDecision and AuthorizationGrant belong to safety-permission-policy; this module references them only through authorized_by and evaluated_by."
    ja: 本モジュールは versioned TrustBoundary（Internal/ExternalBoundary 含む）、分類/処理/保持 rule で識別する DataZone、source/target zone・object digest・initiator/receiver・authorization 参照付き BoundaryCrossing を所有します。NIST SP 800-207 ゼロトラスト（network location への implicit trust なし）、PEP と trust zone 分離、MCP agent/server/host/user 間 server isolation/context sharing 境界、Anthropic Messages API の system/developer/user/tool role 分離—system/developer instruction と不可信 user/tool content は同一 DataZone へ混ぜず TrustBoundary 上の explicit crossing としてモデル化—to 写像します。network endpoint/tool channel/remote agent は crossing の interaction surface であり TrustBoundary subtype ではありません。PolicyDecision/AuthorizationGrant は safety-permission-policy が所有し、authorized_by/evaluated_by のみ参照します。
  why_needed:
    zh: 若只记录“数据来自工具”而不区分边界版本、前后 DataZone 与跨界时刻，Agent 会在 RAG 投毒或 MCP 工具输出进入 model context 后无法审计谁发起、谁接收、依据何授权，也无法发现计划区被误记为实际目标区。
    en: If systems record only 'data came from a tool' without boundary revision, pre/post DataZones, and crossing time, agents cannot audit who initiated or received an crossing, which authorization applied, or detect a planned zone misrecorded as the actual target after RAG poisoning or MCP tool output enters model context.
    ja: boundary revision/pre-post DataZone/crossing 時刻を分離せず「tool 由来データ」だけ記録すると、RAG poisoning や MCP tool output が model context に入った後、誰が initiate/receive しどの authorization が適用されたか監査できず、計画 zone が actual target と誤記録されたことも検出できません。
  includes:
    - zh: 版本化 TrustBoundary 与 InternalBoundary/ExternalBoundary 位置分类。
      en: Versioned TrustBoundary and InternalBoundary or ExternalBoundary position classification.
      ja: 版管理 TrustBoundary と Internal/ExternalBoundary 位置分類。
    - zh: 由数据分类、允许处理、保留规则与有效期识别的 DataZone。
      en: DataZone identified by data classification, permitted handling, retention rules, and validity period.
      ja: データ分類、許可処理、保持 rule、有効期間で識別する DataZone。
    - zh: 实际 BoundaryCrossing 及源区、目标区、边界版本、对象摘要、发起者、接收者、授权与决定引用。
      en: Actual BoundaryCrossing with source and target zones, boundary revision, object digest, initiator, receiver, and grant or decision references.
      ja: source/target zone、boundary revision、object digest、initiator/receiver、grant/decision 参照付き BoundaryCrossing。
  excludes:
    - zh: PolicySpecification、PermissionScope、AuthorizationGrant、PolicyDecision 归 safety-permission-policy；本模块只关联有效授权到一次跨越。
      en: PolicySpecification, PermissionScope, AuthorizationGrant, and PolicyDecision belong to safety-permission-policy; this module relates effective authorization to one crossing only.
      ja: PolicySpecification、PermissionScope、AuthorizationGrant、PolicyDecision は safety-permission-policy；本モジュールは有効認可を一回の crossing に関連付けるだけです。
    - zh: NetworkEndpoint、NetworkRoute、NetworkMessage 归 safety-network-control；它们可承载 crossing 但不成为 TrustBoundary 或 DataZone。
      en: NetworkEndpoint, NetworkRoute, and NetworkMessage belong to safety-network-control; they may carry a crossing but do not become TrustBoundary or DataZone.
      ja: NetworkEndpoint、NetworkRoute、NetworkMessage は safety-network-control；crossing を運んでも TrustBoundary/DataZone にはなりません。
    - zh: 传输计划、编排意图或无 occurred_at/摘要/接收证据的“将要跨界”不构成 BoundaryCrossing。
      en: Transfer plans, orchestration intent, or 'will cross' without occurred_at, digest, or receipt evidence do not constitute BoundaryCrossing.
      ja: transfer plan、orchestration intent、occurred_at/digest/receipt 証拠のない「越境予定」は BoundaryCrossing になりません。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应把 NIST 零信任的“每次访问显式验证”映射为 BoundaryCrossing 必须绑定 occurred_at、payload_digest 与 receipt_evidence；MCP server 与用户/agent 之间的 context 共享映射为 model-tool 或 host-plugin TrustBoundary；Anthropic system/developer 与 user/tool 内容块映射为不同 DataZone，tool_result 进入 model context 前必须记录 crossing-884 类事件。不要把 NetworkRoute 或 MCPSession  ID 当作 TrustBoundary ID；interaction_surface 字段可引用它们但不复制身份。
    en: "Integrations should map NIST zero trust 'explicitly verify every access' to BoundaryCrossing requiring occurred_at, payload_digest, and receipt_evidence; MCP context sharing between server and user/agent to model-tool or host-plugin TrustBoundary; Anthropic system/developer versus user/tool blocks to different DataZones with a crossing-884-style event before tool_result enters model context. Do not use NetworkRoute or MCPSession ID as TrustBoundary ID; interaction_surface may reference them without copying identity."
    ja: NIST ゼロトラストの「毎アクセス明示検証」を BoundaryCrossing の occurred_at/payload_digest/receipt_evidence 必須に写像；MCP server と user/agent 間 context sharing を model-tool/host-plugin TrustBoundary に；Anthropic system/developer と user/tool block を別 DataZone にし tool_result が model context へ入る前に crossing イベントを記録。NetworkRoute/MCPSession ID を TrustBoundary ID にせず interaction_surface で参照のみ。
  typical_input:
    - description: NIST zero-trust access request crossing a policy enforcement point.
      format: |
        trust_zone_source: internal-agent-context
        trust_zone_target: partner-data-zone
        PEP: gateway-enforcement-point-3
        verification: continuous (identity + device + policy)
        => BoundaryCrossing input requires grant + decision refs
      source_claims: [claim-safety-trust-nist-zt]
    - description: MCP tool result prepared for model context admission.
      format: |
        source_data_zone: zone-tool-output@3 (untrusted-tool-output)
        target_data_zone: zone-model-context@7 (sanitized-context-input)
        trust_boundary: boundary-model-tool@4
        payload_digest: sha256:tool-result-weather-884-6e21
        initiating_actor: tool-executor-2
        receiving_actor: context-assembler-4
      source_claims: [claim-safety-trust-mcp-isolation]
    - description: Anthropic Messages API role-separated content blocks.
      format: |
        messages=[
          {"role": "developer", "content": "Never exfiltrate credentials"},
          {"role": "user", "content": "<untrusted webpage>"},
          {"role": "user", "content": [{"type":"tool_result", ...}]}
        ]
        => developer block in zone-instruction@1
        => user/tool blocks cross boundary-model-tool@4 into zone-model-context@7
      source_claims: [claim-safety-trust-anthropic-roles]
  typical_output:
    - description: Audited BoundaryCrossing with distinct grant and decision links.
      format: |
        {
          "crossing_id": "crossing-884",
          "occurred_at": "2026-07-16T03:02:17.000Z",
          "trust_boundary_ref": "boundary-model-tool@4",
          "source_data_zone_ref": "zone-tool-output@3",
          "target_data_zone_ref": "zone-model-context@7",
          "authorized_by": "grant-884",
          "evaluated_by": "decision-884",
          "outcome": "received"
        }
      source_claims: [claim-safety-trust-design]
    - description: Quarantine target zone after failed scan (not planned context zone).
      format: |
        crossing_id: crossing-zone-886
        scan_result: failed-injection-detected
        planned_target: model-context@7
        actual_target: quarantine@6
        target_relation_corrected: true
      source_claims: [claim-safety-trust-design]
  reference_implementations:
    - name: NIST SP 800-207 Zero Trust Architecture
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Trust zones, policy enforcement points, continuous verification.
    - name: CISA Zero Trust Maturity Model 2.0
      url: https://www.cisa.gov/zero-trust-maturity-model
      description: Data pillar inventory, categorization, labeling, lifecycle protection.
    - name: MCP Security Design Considerations (NSA 2026)
      url: https://www.nsa.gov/Press-Room/News-Highlights/Article/Article/4062523/
      description: Separate trust zones for agents, plugins, models, and users.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system/developer/user/tool role separation for trust-boundary modeling.
structure:
  identity_keys: [crossing_id, payload_digest]
  fields:
    - id: crossing_id
      labels: {zh: 跨界标识, en: Crossing identifier, ja: 越境識別子}
      definitions:
        zh: 一次实际 BoundaryCrossing 的唯一 ID；计划或编排 ID 不能替代。
        en: Unique ID of one actual BoundaryCrossing; plan or orchestration IDs cannot substitute.
        ja: 一回の actual BoundaryCrossing の一意 ID。plan/orchestration ID は代替不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^crossing-[A-Za-z0-9._-]+$'
      example_value: crossing-884
      allowed_values: []
      source_claims: [claim-safety-trust-design]
    - id: payload_digest
      labels: {zh: 载荷摘要, en: Payload digest, ja: ペイロードダイジェスト}
      definitions:
        zh: 跨界对象的稳定摘要；PolicyDecision 的 context_digest 必须与之匹配才能 evaluated_by 关联。
        en: Stable digest of the crossed object; PolicyDecision context_digest must match for evaluated_by correlation.
        ja: 越境 object の安定 digest。PolicyDecision context_digest が一致しないと evaluated_by 関連不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]+$'
      example_value: sha256:tool-result-weather-884-6e21
      allowed_values: []
      source_claims: [claim-safety-trust-design]
    - id: trust_boundary_ref
      labels: {zh: 信任边界版本引用, en: Trust boundary revision reference, ja: 信頼境界版参照}
      definitions:
        zh: BoundaryCrossing-crosses-TrustBoundary 所引用的有效边界版本，必须在 occurred_at 时有效。
        en: Effective boundary revision referenced by BoundaryCrossing-crosses-TrustBoundary, valid at occurred_at.
        ja: BoundaryCrossing-crosses-TrustBoundary が参照する有効 boundary revision。occurred_at 時点で有効である必要があります。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: boundary-model-tool@4
      allowed_values: []
      source_claims: [claim-safety-trust-nist-zt]
    - id: occurred_at
      labels: {zh: 发生时刻, en: Occurrence time, ja: 発生時刻}
      definitions:
        zh: 跨界实际发生的 ISO-8601 时间戳；缺失则不得创建 BoundaryCrossing。
        en: ISO-8601 timestamp when the crossing actually occurred; BoundaryCrossing must not be created without it.
        ja: 越境が実際に起きた ISO-8601 タイムスタンプ。なければ BoundaryCrossing を作成しません。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2026-07-16T03:02:17.000Z
      allowed_values: []
      source_claims: [claim-safety-trust-design]
  constraints:
    - id: trust-no-planned-crossing
      severity: error
      expression_language: plain
      expression: A transfer plan or vendor destination without occurred_at, payload_digest, and receiving-actor evidence must not create BoundaryCrossing or crosses/initiated_by/received_by facts.
      explanation:
        zh: 计划目标只记录意图；缺少发生证据无法形成可审计跨界身份。
        en: A planned destination records intent only; without occurrence evidence there is no auditable crossing identity.
        ja: 計画宛先は intent のみ。発生証拠がなければ監査可能 crossing identity は成立しません。
      source_claims: [claim-safety-trust-design]
    - id: trust-target-zone-actual-state
      severity: error
      expression_language: plain
      expression: has_target_zone must reference the DataZone revision that actually governed the object after crossing, not a planned or pre-scan target when quarantine or denial occurred.
      explanation:
        zh: DataZone 关系表达实际处理状态，不是编排意图。
        en: DataZone relations represent actual handling state, not orchestration intent.
        ja: DataZone 関係は orchestration intent ではなく actual handling state を表します。
      source_claims: [claim-safety-trust-design]
    - id: trust-grant-decision-distinct
      severity: error
      expression_language: plain
      expression: authorized_by AuthorizationGrant and evaluated_by PolicyDecision must remain distinct facts with different identity keys; they cannot be collapsed into one authorization node on a crossing.
      explanation:
        zh: 授予回答可用权限及有效期，决定回答同一输入如何求值；二者身份键与生命周期不同。
        en: Grant answers available authority and validity; decision answers how the same input was evaluated—their identity keys and lifecycles differ.
        ja: grant は利用可能権限/有効期間、decision は同一入力の評価方法を答え、同一性キー/ライフサイクルが異なります。
      source_claims: [claim-safety-trust-design]
  required_relations:
    - id: crossing-crosses-boundary
      direction: outgoing
      predicate: crosses
      target_concept_id: TrustBoundary
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每次 BoundaryCrossing 必须 crosses 恰好一条有效 TrustBoundary。
        en: Each BoundaryCrossing must cross exactly one effective TrustBoundary.
        ja: 各 BoundaryCrossing は exactly 一つの effective TrustBoundary を crosses します。
      source_claims: [claim-safety-trust-design]
    - id: crossing-has-zones
      direction: outgoing
      predicate: has_source_zone
      target_concept_id: DataZone
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 跨界必须记录真实源区与目标区 DataZone 版本。
        en: A crossing must record actual source and target DataZone revisions.
        ja: crossing は actual source/target DataZone revision を記録する必要があります。
      source_claims: [claim-safety-trust-design]
examples:
  - id: safety-trust-boundary-example-tool-output-crossing
    labels:
      zh: 工具输出进入模型上下文的实际跨越
      en: Observed tool-output crossing into model context
      ja: ツール出力がモデル文脈へ入った実跨越
    descriptions:
      zh: crossing-884 在 03:02:17 从 zone-tool-output@3 经 boundary-model-tool@4 到 zone-model-context@7，由 tool-executor-2 发起、context-assembler-4 接收；grant-884 与 decision-884 分别通过 authorized_by 与 evaluated_by 连接。
      en: At 03:02:17 crossing-884 moves from zone-tool-output@3 through boundary-model-tool@4 to zone-model-context@7, initiated by tool-executor-2 and received by context-assembler-4; grant-884 and decision-884 connect through authorized_by and evaluated_by respectively.
      ja: 03:02:17 に crossing-884 が zone-tool-output@3 から boundary-model-tool@4 を通り zone-model-context@7 へ。tool-executor-2 が開始、context-assembler-4 が受領。grant-884/decision-884 が authorized_by/evaluated_by で接続。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: tool-output to model-context crossing
    field_values:
      crossing_id: crossing-884
      payload_digest: sha256:tool-result-weather-884-6e21
      trust_boundary_ref: boundary-model-tool@4
      source_data_zone_ref: zone-tool-output@3
      target_data_zone_ref: zone-model-context@7
      outcome: received
    related_node_ids:
      - BoundaryCrossing
      - TrustBoundary
      - DataZone
    related_relation_ids:
      - BoundaryCrossing-crosses-TrustBoundary
      - BoundaryCrossing-has_source_zone-DataZone
      - BoundaryCrossing-has_target_zone-DataZone
    source_claims:
      - claim-safety-trust-design
  - id: safety-trust-boundary-example-anthropic-role-separation
    labels:
      zh: Anthropic 角色分离与跨界
      en: Anthropic role separation and boundary crossing
      ja: Anthropic role 分離と境界越境
    descriptions:
      zh: developer 块留在 zone-instruction@1；不可信 user 网页与 tool_result 块 crossing-901 经 boundary-model-tool@4 进入 zone-model-context@7。system/developer 指令不与 tool 输出共享同一 DataZone，符合 Anthropic 角色隔离建议。
      en: Developer blocks remain in zone-instruction@1; untrusted user webpage and tool_result blocks cross via crossing-901 through boundary-model-tool@4 into zone-model-context@7. System/developer instructions do not share a DataZone with tool output, matching Anthropic role-isolation guidance.
      ja: developer block は zone-instruction@1 に残り、不可信 user 网页/tool_result block は crossing-901 で boundary-model-tool@4 経由 zone-model-context@7 へ。system/developer instruction は tool output と同一 DataZone を共有せず Anthropic role isolation 推奨に整合。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/system-prompts
      version: system/developer/user/tool role separation
    field_values:
      crossing_id: crossing-901
      source_zones: [zone-untrusted-user@2, zone-tool-output@3]
      target_zone: zone-model-context@7
      instruction_zone: zone-instruction@1
    related_node_ids:
      - TrustBoundary
      - DataZone
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-safety-trust-anthropic-roles
  - id: safety-trust-boundary-example-mcp-server-isolation
    labels:
      zh: MCP server 与用户/agent 信任区
      en: MCP server versus user/agent trust zones
      ja: MCP server と user/agent trust zone
    descriptions:
      zh: filesystem MCP server 运行在 zone-mcp-server@2，宿主 agent 在 zone-agent-host@1；tools/call 返回经 boundary-host-mcp@3 跨界 crossing-mcp-12，NSA MCP 指南建议的 server isolation 在此体现为独立 TrustBoundary 而非共享进程信任。
      en: A filesystem MCP server runs in zone-mcp-server@2 while the host agent sits in zone-agent-host@1; tools/call results cross boundary-host-mcp@3 as crossing-mcp-12. NSA MCP guidance for server isolation appears as separate TrustBoundary rather than shared process trust.
      ja: filesystem MCP server が zone-mcp-server@2、host agent が zone-agent-host@1。tools/call 返却が boundary-host-mcp@3 を crossing-mcp-12 で越境。NSA MCP server isolation 推奨は shared process trust ではなく独立 TrustBoundary として現れます。
    example_source:
      product: NSA / MCP
      url: https://www.nsa.gov/Press-Room/News-Highlights/Article/Article/4062523/
      version: MCP trust zone separation
    field_values:
      crossing_id: crossing-mcp-12
      trust_boundary_ref: boundary-host-mcp@3
      source_zone: zone-mcp-server@2
      target_zone: zone-agent-host@1
    related_node_ids:
      - TrustBoundary
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-safety-trust-mcp-isolation
  - id: safety-trust-boundary-example-quarantine-target
    labels:
      zh: 扫描失败后目标区修正为隔离区
      en: Target zone corrected to quarantine after scan failure
      ja: scan 失敗後 target zone を quarantine に修正
    descriptions:
      zh: 扫描失败后载荷进入 quarantine@6，但记录仍写计划的 model-context@7；has_target_zone 必须改为 quarantine@6，quarantine 接收回执是发生证据。
      en: After scan failure the payload enters quarantine@6 but the record still lists planned model-context@7; has_target_zone must change to quarantine@6 with quarantine receipt as occurrence evidence.
      ja: scan failure 後 payload は quarantine@6 へ入るが記録は計画 model-context@7 のまま。has_target_zone を quarantine@6 へ修正し quarantine receipt を発生証拠とします。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: actual vs planned target zone
    field_values:
      crossing_id: crossing-zone-886
      planned_target: model-context@7
      actual_target: quarantine@6
      scan_result: failed-injection-detected
    related_node_ids:
      - BoundaryCrossing
      - DataZone
    related_relation_ids:
      - BoundaryCrossing-has_target_zone-DataZone
    source_claims:
      - claim-safety-trust-design
  - id: safety-trust-boundary-example-stale-authority-reject
    labels:
      zh: 拒绝复用旧 grant 与 decision
      en: Reject reuse of stale grant and decision
      ja: 旧 grant/decision 再利用を拒否
    descriptions:
      zh: crossing-887 对应 calendar 载荷，但 candidate grant-801/decision-801 针对 weather 载荷且 grant 在跨界前已撤销；主体相同不能让授权事实复用。
      en: crossing-887 covers a calendar payload while candidate grant-801/decision-801 target weather and the grant was revoked before crossing; a matching subject cannot reuse those facts.
      ja: crossing-887 は calendar payload だが candidate grant-801/decision-801 は weather 向けで grant は crossing 前に取消済み。subject 一致だけでは fact 再利用不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: authority evidence mismatch
    field_values:
      crossing_id: crossing-887
      payload_digest: sha256:calendar-887-7be0
      candidate_grant: grant-801
      grant_revoked_at: 2026-07-16T03:05:00.000Z
      authority_evidence_sufficient: false
    related_node_ids:
      - BoundaryCrossing
      - AuthorizationGrant
      - PolicyDecision
