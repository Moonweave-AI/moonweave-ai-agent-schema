  key_notion:
    zh: 信任边界
    en: trust boundary
    ja: 信頼境界
  owns_when:
    zh: 当对象必须由边界版本及两侧安全假设、数据区的分类/处理/保留规则，或一次实际跨越的标识、对象摘要和时间来识别时，由本模块拥有。
    en: Own an object when it must be identified by a boundary revision and the security assumptions on both sides, a data zone's classification, handling, and retention rules, or an actual crossing's identifier, object digest, and time.
    ja: 境界版と両側の安全仮定、データ区域の分類・処理・保持規則、または実際の越境の識別子・対象要約・時刻によって識別される対象を所有します。
  references_when:
    zh: 一次跨越引用授权决定、运行主体、承载它的网络或工具交互以及追踪记录；这些对象继续由各自模块拥有，本模块只记录它们与该跨越的事实关系。
    en: A crossing references its authorization decision, Runtime actors, carrying network or tool interaction, and trace record. Those objects remain owned by their modules; this module records only their factual relationship to the crossing.
    ja: 一回の越境は、認可判断、実行主体、越境を運ぶネットワーク・ツール対話、追跡記録を参照します。それらは各モジュールが所有し続け、本モジュールは越境との事実関係だけを記録します。
