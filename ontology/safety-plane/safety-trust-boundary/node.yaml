    source: eng-security-nist-abac
    supports: NIST SP 800-162 distinguishes subjects, objects, operations, environment attributes, authorization requests, policies, and allow or deny decisions; Moonweave uses that identity to keep AuthorizationGrant and PolicyDecision separate from one BoundaryCrossing occurrence.
    locator: NIST SP 800-162 Sections 2.1-2.3 and 3, ABAC terms, requests, policy and decision
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-trust-boundary-009
    source: eng-ont-prov-o
    supports: W3C PROV-O distinguishes Agent from Activity and associates responsibility-bearing agents with occurrences; Moonweave therefore keeps the non-key HumanActor and SoftwareActor participant types distinct from BoundaryCrossing while linking responsibility explicitly.
    locator: W3C PROV-O Sections 2 and 3.1, Activity, Entity, Agent and association
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
