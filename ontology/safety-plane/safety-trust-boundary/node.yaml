            ja: internal/external position だけが互斥 subtype です。BoundaryCrossing は occurrence、DataZone は specification なので abstraction 親子にはできません。crosses は boundary→crossing backbone を形成できますが source/target zone fact は cross-link とし、一回の利用だけで再利用 zone specification を event 配下に置きません。
