module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 一次跨越的输入包括 BoundaryCrossing-crosses-TrustBoundary 所指的有效边界、BoundaryCrossing-has_target_zone-DataZone 所指的目标区，以及发起/接收主体、授权和 BoundaryCrossing-evaluated_by-PolicyDecision 所指的具体决定；这些端点是求值依据，不是跨越产生的输出。
          en: A crossing takes the effective boundary identified by BoundaryCrossing-crosses-TrustBoundary, the target zone identified by BoundaryCrossing-has_target_zone-DataZone, initiating and receiving actors, a grant, and the concrete decision identified by BoundaryCrossing-evaluated_by-PolicyDecision; these endpoints are evaluation inputs rather than outputs produced by the crossing.
          ja: crossing の入力は BoundaryCrossing-crosses-TrustBoundary が示す有効境界、BoundaryCrossing-has_target_zone-DataZone が示す target zone、発信・受信 actor、grant、BoundaryCrossing-evaluated_by-PolicyDecision が示す具体的 decision です。これらの端点は評価根拠であり crossing の生成 output ではありません。
        family_concept_ids:
          - TrustBoundary
          - DataZone
          - Actor
          - AuthorizationGrant
          - PolicyDecision
        relation_ids:
          - BoundaryCrossing-crosses-TrustBoundary
          - BoundaryCrossing-has_source_zone-DataZone
          - BoundaryCrossing-has_target_zone-DataZone
          - BoundaryCrossing-initiated_by-Actor
          - BoundaryCrossing-received_by-Actor
          - BoundaryCrossing-authorized_by-AuthorizationGrant
          - BoundaryCrossing-evaluated_by-PolicyDecision
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是一条带发生时间、载荷摘要和结果的 BoundaryCrossing，并通过 BoundaryCrossing-crosses-TrustBoundary 明确它实际跨越的边界；TraceEvent 对跨越的观测记录由其源端点所属的 runtime-observability 规范存储。
          en: The output is a BoundaryCrossing with occurrence time, payload digest, and outcome, linked through BoundaryCrossing-crosses-TrustBoundary to the boundary actually crossed; the TraceEvent observation is canonically stored by runtime-observability, which owns that relation's source endpoint.
          ja: output は occurrence time・payload digest・outcome を持つ BoundaryCrossing で、BoundaryCrossing-crosses-TrustBoundary により実際に越えた boundary を明示します。TraceEvent observation は relation の source endpoint を所有する runtime-observability が canonical storage を担います。
        family_concept_ids:
          - BoundaryCrossing
          - TrustBoundary
        relation_ids:
          - BoundaryCrossing-crosses-TrustBoundary
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 被拒绝、隔离或失败的尝试仍可作为 BoundaryCrossing 记录真实 outcome、决定和实际目标区。
          en: Denied, quarantined, or failed attempts remain BoundaryCrossing records with the actual outcome, decision, and actual target zone.
          ja: denied/quarantined/failed attempt も actual outcome・decision・target zone を持つ BoundaryCrossing として記録します。
        family_concept_ids:
          - BoundaryCrossing
          - PolicyDecision
          - DataZone
        relation_ids:
          - BoundaryCrossing-evaluated_by-PolicyDecision
          - BoundaryCrossing-has_target_zone-DataZone
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本体记录跨越事实与结果，但重试、补偿或恢复执行由运行时与编排域拥有。
          en: This ontology records crossing fact and outcome, while retry, compensation, and recovery execution belong to runtime and orchestration.
          ja: ontology は crossing fact/outcome を記録し retry/compensation/recovery execution は runtime/orchestration が所有します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-trust-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: interaction contract 已按对象身份、发生条件与可回答证据逐项人工复核：每个输入、输出和失败事实均由已接受关系直接支撑。
            en: "interaction contract was manually reviewed point by point for identity, occurrence conditions, and answerable evidence: Every input, output, and failure fact is supported directly by accepted relations."
            ja: interaction contract は identity・occurrence condition・answerable evidence を項目別に manual review しました：input/output/failure fact は accepted relation で直接 support されます。
