        zh: 本投影只引用权限域拥有的 AuthorizationGrant 与 PolicyDecision：BoundaryCrossing-authorized_by-AuthorizationGrant 记录本次跨越所依据的既有授权，BoundaryCrossing-evaluated_by-PolicyDecision 记录针对本次跨越得出的既有策略决定；两者都不把授权对象重归到信任边界域。
        en: "This projection references only permission-owned AuthorizationGrant and PolicyDecision: BoundaryCrossing-authorized_by-AuthorizationGrant records the existing grant relied on by this crossing, while BoundaryCrossing-evaluated_by-PolicyDecision records the existing policy decision for it. Neither edge re-owns an authorization object in trust boundary."
        ja: この projection は permission domain 所有の AuthorizationGrant と PolicyDecision のみを参照します。BoundaryCrossing-authorized_by-AuthorizationGrant は crossing が依拠した既存 grant、BoundaryCrossing-evaluated_by-PolicyDecision は crossing に対する既存 policy decision を記録し、authorization object を trust boundary 側へ再所有しません。
