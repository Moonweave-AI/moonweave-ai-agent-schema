          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: taxonomy contract 已按对象身份、发生条件与可回答证据逐项人工复核：TrustBoundary 展开内外位置，BoundaryCrossing 通过 crosses 记录一次真实越界；DataZone 则是可在任何越界之前定义、版本化并复用于多次越界的数据处理规范，因此保留独立入口。has_source_zone 与 has_target_zone 都只连接一次越界和当时适用的区域版本。
            en: "The taxonomy contract was manually reviewed point by point: TrustBoundary expands to internal and external positions, and BoundaryCrossing joins an actual boundary through crosses. DataZone is instead a versioned data-handling specification that can exist before and be reused across many crossings, so it remains an independent entry. Both has_source_zone and has_target_zone only link one crossing to the zone revisions applicable at that time."
            ja: taxonomy contract を項目別 review しました。TrustBoundary は internal/external position を展開し、BoundaryCrossing は crosses で一回の実越境を記録します。一方 DataZone は crossing 前に定義でき複数 crossing で再利用する versioned data-handling specification なので独立 entry とします。has_source_zone / has_target_zone は一 crossing と当時適用される zone revision を結ぶだけです。
