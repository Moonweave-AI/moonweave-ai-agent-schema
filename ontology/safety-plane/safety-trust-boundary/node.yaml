            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐边人工核验确认运行时侧端点为 Actor 与 RemoteAgentReference，并完整投影 BoundaryCrossing-initiated_by-Actor、BoundaryCrossing-received_by-Actor、remote_agent_crosses_trust_boundary；前两条表达责任归属，第三条表达远程智能体跨越安全假设，不把主体身份降格为边界子类。
              en: Manual edge-by-edge review confirms Actor and RemoteAgentReference as the runtime-side endpoints and projects exactly BoundaryCrossing-initiated_by-Actor, BoundaryCrossing-received_by-Actor, and remote_agent_crosses_trust_boundary. The first two express accountability and the third a remote agent crossing changed trust assumptions; none turns actor identity into a boundary subtype.
              ja: edge-by-edge の manual review により runtime-side endpoint は Actor と RemoteAgentReference、投影 relation は BoundaryCrossing-initiated_by-Actor・BoundaryCrossing-received_by-Actor・remote_agent_crosses_trust_boundary の三つと確認しました。前二者は accountability、第三者は remote agent の trust-assumption crossing を表し、actor identity を boundary subtype にしません。
          - reviewer_id: moonweave-trust-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: Actor 与 RemoteAgentReference 均可在没有某次跨越记录时独立存在并被引用，故归运行时；BoundaryCrossing 与 TrustBoundary 的身份依赖边界版本、跨越事实和信任变化，故由安全域拥有。
              en: Actor and RemoteAgentReference can exist and be referenced without any particular crossing record, so runtime owns them. BoundaryCrossing and TrustBoundary depend on boundary revision, crossing fact, and changed trust assumptions, so safety owns them.
              ja: Actor と RemoteAgentReference は特定 crossing record が無くても独立存在・参照できるため runtime が所有します。BoundaryCrossing と TrustBoundary は boundary revision・crossing fact・trust change に依存するため safety が所有します。
