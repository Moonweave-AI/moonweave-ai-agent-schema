        - Actor
        - RemoteAgentReference
      decision: references
      owner_module_id: runtime-actors
      rationale:
        zh: 运行时域拥有可跨多次事件保持身份的 Actor 与 RemoteAgentReference。BoundaryCrossing-initiated_by-Actor 和 BoundaryCrossing-received_by-Actor 记录一次跨越两端的责任主体；remote_agent_crosses_trust_boundary 则把远程智能体引用连接到其实际跨越的 TrustBoundary。
        en: Runtime owns Actor and RemoteAgentReference identities that persist across occurrences. BoundaryCrossing-initiated_by-Actor and BoundaryCrossing-received_by-Actor attribute the two accountable sides of one crossing, while remote_agent_crosses_trust_boundary links a remote-agent reference to the TrustBoundary it actually crosses.
        ja: runtime は occurrence を越えて存続する Actor と RemoteAgentReference の identity を所有します。BoundaryCrossing-initiated_by-Actor と BoundaryCrossing-received_by-Actor は一 crossing の両責任主体を記録し、remote_agent_crosses_trust_boundary は remote-agent reference を実際に越える TrustBoundary へ接続します。
