schema: moonweave.ai/ontology-node/v1
id: safety-trust-boundary
kind: module
status: accepted
labels:
  zh: 信任边界与数据区
  en: Trust boundaries and data zones
  ja: 信頼境界とデータゾーン
semantics:
  short_definition:
    zh: 信任边界与数据区描述安全假设、控制责任或数据处理规则发生变化的版本化边界，边界两侧的处理区，以及对象实际越过该边界的一次发生。边界规范、数据区与跨越事件保持不同身份；网络、工具或远程智能体只是跨越所使用的交互面，不成为边界类型。
    en: Trust boundaries and data zones describes versioned boundaries where security assumptions, control responsibility, or data-handling rules change, the handling zones on either side, and an actual occurrence of an object crossing that boundary. Boundary specifications, data zones, and crossing events keep distinct identities; network, tool, or remote-agent channels are interaction surfaces used by a crossing, not boundary types.
    ja: 信頼境界とデータゾーンは、安全上の仮定、制御責任、データ処理規則が変わる版管理された境界、その両側の処理区域、対象が実際に境界を越えた一回の発生を記述します。境界仕様、データ区域、越境イベントは別の同一性を保ち、ネットワーク、ツール、遠隔エージェントは越境に使われる対話面であって境界型ではありません。
  definition:
    zh: 信任边界与数据区描述安全假设、控制责任或数据处理规则发生变化的版本化边界，边界两侧的处理区，以及对象实际越过该边界的一次发生。边界规范、数据区与跨越事件保持不同身份；网络、工具或远程智能体只是跨越所使用的交互面，不成为边界类型。
    en: Trust boundaries and data zones describes versioned boundaries where security assumptions, control responsibility, or data-handling rules change, the handling zones on either side, and an actual occurrence of an object crossing that boundary. Boundary specifications, data zones, and crossing events keep distinct identities; network, tool, or remote-agent channels are interaction surfaces used by a crossing, not boundary types.
    ja: 信頼境界とデータゾーンは、安全上の仮定、制御責任、データ処理規則が変わる版管理された境界、その両側の処理区域、対象が実際に境界を越えた一回の発生を記述します。境界仕様、データ区域、越境イベントは別の同一性を保ち、ネットワーク、ツール、遠隔エージェントは越境に使われる対話面であって境界型ではありません。
  why_needed:
    zh: 让每次跨界都能回答对象从哪个区出发、越过哪版边界、由谁发送和接收、依据什么授权、进入哪个区以及由什么证据记录。
    en: Make every crossing answer its source zone, boundary revision, sender and receiver, authorization basis, destination zone, and recording evidence.
    ja: 各越境について、出発区域、境界版、送信者と受信者、認可根拠、到着区域、記録証拠を説明できるようにします。
  includes:
    - zh: 版本化 TrustBoundary，以及按受控范围两侧位置区分的 InternalBoundary 与 ExternalBoundary。
      en: Versioned TrustBoundary specifications and InternalBoundary or ExternalBoundary classification by position relative to the controlled scope.
      ja: 版管理された TrustBoundary と、制御範囲に対する位置で区分する InternalBoundary／ExternalBoundary を含みます。
    - zh: 由数据分类、允许处理、保留规则与有效期共同识别的 DataZone。
      en: DataZones identified by data classification, permitted handling, retention rules, and validity period.
      ja: データ分類、許可される処理、保持規則、有効期間で識別される DataZone を含みます。
    - zh: 实际 BoundaryCrossing 及其源区、目标区、边界版本、对象摘要、发起者、接收者、授权决定和追踪证据。
      en: Actual BoundaryCrossings with source and target zones, boundary revision, object digest, initiator, receiver, authorization decision, and trace evidence.
      ja: 実際の BoundaryCrossing と、その出発区域、到着区域、境界版、対象要約、開始者、受信者、認可判断、追跡証拠を含みます。
  excludes:
    - zh: Policy、PermissionScope、AuthorizationGrant 与 PolicyDecision 归授权与策略决策；本模块只把有效授权关联到一次跨越。
      en: Policy, PermissionScope, AuthorizationGrant, and PolicyDecision belong to authorization and policy decisions; this module only relates effective authorization to one crossing.
      ja: Policy、PermissionScope、AuthorizationGrant、PolicyDecision は認可とポリシー判断に属し、本モジュールは有効な認可を一回の越境へ関連付けるだけです。
    - zh: 网络端点、代理、路由和请求/响应归网络通信控制；它们可以承载跨越，但不会因此变成 TrustBoundary 或 DataZone。
      en: Network endpoints, proxies, routes, and requests or responses belong to network communication control; they may carry a crossing but do not thereby become a TrustBoundary or DataZone.
      ja: ネットワーク端点、プロキシ、経路、要求・応答はネットワーク通信制御に属します。越境を運ぶことはあっても、TrustBoundary や DataZone にはなりません。
    - zh: 框架名、来源文档、规则原文和展示社区只是节点解释或证据，不进入业务概念层级。
      en: Framework names, source documents, rule text, and visual communities are node explanation or evidence, not business-concept nodes.
      ja: フレームワーク名、出典文書、規則原文、表示コミュニティはノードの説明・証拠であり、業務概念ノードではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把边界规范、数据处理区和真实跨越事件连接成不混淆介质、授权与观测的可审计链路。
  en: Connect boundary specifications, data-handling zones, and actual crossing events into an auditable chain without conflating medium, authorization, or observation.
  ja: 境界仕様、データ処理区域、実際の越境イベントを、媒体、認可、観測を混同しない監査可能な連鎖として接続します。
