            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐边人工核验确认：该 references 决策只列 AuthorizationGrant 与 PolicyDecision，并完整投影 BoundaryCrossing-authorized_by-AuthorizationGrant、BoundaryCrossing-evaluated_by-PolicyDecision；没有把 PermissionScope、PolicyEvaluation 或纯权限域内部关系混入图谱。
              en: Manual edge-by-edge review confirms that this references decision lists only AuthorizationGrant and PolicyDecision and projects exactly BoundaryCrossing-authorized_by-AuthorizationGrant and BoundaryCrossing-evaluated_by-PolicyDecision; it does not mix in PermissionScope, PolicyEvaluation, or permission-internal relations.
              ja: edge-by-edge の manual review により、この references decision は AuthorizationGrant と PolicyDecision のみを列挙し、BoundaryCrossing-authorized_by-AuthorizationGrant と BoundaryCrossing-evaluated_by-PolicyDecision を過不足なく投影し、PermissionScope・PolicyEvaluation・permission-internal relation を混入しないことを確認しました。
          - reviewer_id: moonweave-trust-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本体边界判据是可独立识别性：AuthorizationGrant 与 PolicyDecision 在没有跨越时仍可由签发和评估上下文识别，故归权限域；跨域边只陈述某一 BoundaryCrossing 引用了哪项授权与决定。
              en: "The ownership test is independent identifiability: AuthorizationGrant and PolicyDecision remain identifiable from issuance and evaluation context without any crossing, so permission owns them; the cross edges state only which grant and decision one BoundaryCrossing used."
              ja: ownership 判定は independent identifiability です。AuthorizationGrant と PolicyDecision は crossing が無くても issuance/evaluation context で識別できるため permission が所有し、cross edge は一つの BoundaryCrossing が利用した grant/decision のみを述べます。
