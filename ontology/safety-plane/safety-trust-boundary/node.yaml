        en: "This owns projection lists only BoundaryCrossing, the shared source of the two cross-domain relations: BoundaryCrossing-authorized_by-AuthorizationGrant links an existing grant and BoundaryCrossing-evaluated_by-PolicyDecision links an existing policy decision. TrustBoundary and DataZone do not participate in either edge and are excluded."
