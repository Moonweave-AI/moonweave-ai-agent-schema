          reviewed_on: 2026-07-16
          decision_note:
            zh: 只有内外位置形成互斥种属；BoundaryCrossing 是发生，DataZone 是规范，二者不能互为抽象父子。crosses 可形成边界—越界主干，源区与目标区事实保持 cross-link，避免仅因某次使用就把可复用区域规范挂在事件之下。
