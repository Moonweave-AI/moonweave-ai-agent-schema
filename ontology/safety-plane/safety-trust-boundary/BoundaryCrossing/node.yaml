schema: moonweave.ai/ontology-node/v1
id: BoundaryCrossing
kind: concept
status: accepted
labels:
  zh: 信任边界跨越记录
  en: Trust-Boundary Crossing Record
  ja: 信頼境界横断記録
semantics:
  short_definition:
    zh: 一次请求或传输试图从来源信任区穿过指定信任边界到达目标资源的可审计记录。
    en: An auditable record of one request or transfer attempting to pass from a source TrustZone through a named TrustBoundary to a target resource.
    ja: 一つの要求又は転送が送信元 TrustZone から指定された TrustBoundary を通って対象リソースへ達しようとしたことの監査可能な記録。
  definition:
    zh: BoundaryCrossing 是一次跨区尝试的事件事实，记录请求者、来源区、目标区、资源、动作、所涉边界和当前结果。它可以在策略决定前处于 `requested` 状态，也可以在拒绝或建立连接后成为结果记录；它不是静态边界声明、策略评估活动、策略决定或授权凭据。仅有该记录不能证明实际访问已发生。
    en: BoundaryCrossing is the event fact for one cross-zone attempt, recording requester, source zone, target zone, resource, action, boundary, and current outcome. It may be `requested` before a policy decision or become an outcome record after denial or connection establishment. It is not a static boundary declaration, PolicyEvaluation activity, policy decision, or authorization credential. The record alone does not prove that access occurred.
    ja: BoundaryCrossing は一回のゾーン横断試行について、要求者、送信元ゾーン、対象ゾーン、リソース、操作、境界、現在の結果を記録するイベント事実である。ポリシー決定前は `requested` 状態であり得、拒否又は接続確立後には結果記録となり得る。静的境界宣言、PolicyEvaluation 活動、ポリシー決定、認可資格情報ではない。この記録だけで実アクセスが発生したことは証明しない。
  why_needed:
    zh: 如果“跨区请求”只存在于日志文本里，系统无法把请求、策略决定和连接效果关联起来，也无法区分被拒绝的尝试与真正发生的数据访问。
    en: If a cross-zone request exists only as log text, the system cannot correlate the request, policy decision, and connection effect or distinguish a denied attempt from real data access.
    ja: ゾーン横断要求がログ文だけに存在すると、要求、ポリシー決定、接続効果を関連付けられず、拒否された試行と実際のデータアクセスを区別できない。
  includes:
    - zh: 边界引用、来源区、目标区、请求主体、目标资源、动作、状态和可选的策略决定引用。
      en: Boundary reference, source and target zones, requesting subject, target resource, action, state, and optional policy-decision reference.
      ja: 境界参照、送信元・対象ゾーン、要求主体、対象リソース、操作、状態、及び任意のポリシー決定参照。
    - zh: 已请求、已拒绝、已建立或失败的跨越状态；每种状态的访问效果不同。
      en: Requested, denied, established, or failed crossing states, each with a different access effect.
      ja: requested、denied、established、failed の横断状態。それぞれアクセス効果が異なる。
  excludes:
    - zh: TrustBoundary 的架构配置、一个孤立的策略决定、或未涉及不同信任区的本地函数调用。
      en: TrustBoundary architecture configuration, an isolated policy decision, or a local function call that does not involve different TrustZones.
      ja: TrustBoundary のアーキテクチャ設定、孤立したポリシー決定、又は異なる TrustZone を含まないローカル関数呼出し。
    - zh: 因为存在跨越记录而自动产生的长期访问权、共享令牌或已传输的数据副本。
      en: A long-lived access right, shared token, or transferred data copy automatically created because a crossing record exists.
      ja: 横断記録が存在するだけで自動生成される長期アクセス権、共有トークン、又は転送済みデータコピー。
  semantic_kind: event-record
  aliases:
    - boundary-crossing-record
    - cross-zone-access-attempt
engineering:
  explanation:
    zh: 在策略执行点收到跨区请求时创建本地的 crossing record，并把它作为结构化输入交给 PolicyEvaluation；OPA 的 Data API 将输入映射为决策结果，Envoy 的 ext_authz 在请求到达上游前阻止或放行。若策略拒绝，记录保留 `denied`，但不会把连接写成已建立；只有 PA 通过 PEP 配置路径且 PEP 已启用连接后，才将状态写成 `established`。该 JSON 是 Moonweave 审计记录，不是 OPA 或 Envoy 的原生对象。
    en: Create a local crossing record when an enforcement point receives a cross-zone request and use it as structured input to PolicyEvaluation. OPA's Data API maps input to a decision result, while Envoy ext_authz blocks or allows before the request reaches upstream. On a denial, retain `denied` without recording a connection as established; set `established` only after the PA configures a path through the PEP and the PEP enables the connection. This JSON is a Moonweave audit record, not a native OPA or Envoy object.
    ja: 実施点がゾーン横断要求を受けたときにローカル crossing record を作り、PolicyEvaluation への構造化入力として使う。OPA Data API は入力を決定結果へ対応付け、Envoy ext_authz は要求が上流へ達する前に遮断又は許可する。拒否時は接続を確立済みと記録せず `denied` を残し、PA が PEP を通じて経路を構成し PEP が接続を有効化した後にのみ `established` を設定する。この JSON は Moonweave の監査記録であり、OPA 又は Envoy のネイティブオブジェクトではない。
  typical_input:
    - description:
        zh: 从执行点传给策略评估的 Moonweave 跨越记录；字段可映射到 OPA 的 `input` 文档。
        en: Moonweave crossing record sent from an enforcement point to policy evaluation; its fields can map into OPA's `input` document.
        ja: 実施点からポリシー評価へ送る Moonweave 横断記録。フィールドは OPA の `input` 文書に対応付けられる。
      format: '{"boundary_crossing_id":"cross-42","trust_boundary_ref":"sandbox-to-customer-data","source_zone_ref":"sandbox","target_zone_ref":"customer-data","subject_ref":"agent-42","resource_ref":"case/17","requested_action":"read","crossing_state":"requested"}'
      source_claims:
        - claim-nist-pep-request
        - claim-opa-data-api
  typical_output:
    - description:
        zh: 拒绝后的记录状态；PA 没有通过 PEP 配置通信路径，PEP 也未启用到目标资源的连接。
        en: Record state after denial; the PA has not configured a communication path through the PEP, and the PEP has not enabled a connection to the target resource.
        ja: 拒否後の記録状態。PA は PEP を通じて通信経路を構成しておらず、PEP も対象リソースへの接続を有効化していない。
      format: '{"boundary_crossing_id":"cross-42","policy_decision_ref":"dec-023","crossing_state":"denied","connection_established":false}'
      source_claims:
        - claim-nist-pep-request
  reference_implementations:
    - name: Open Policy Agent Data API
      url: https://www.openpolicyagent.org/docs/rest-api
      description: Accepts structured policy input and returns a decision result with optional decision correlation.
    - name: Envoy external authorization filter
      url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/ext_authz_filter.html
      description: Calls an authorization service before an incoming request reaches its upstream service.
structure:
  identity_keys:
    - boundary_crossing_id
  fields:
    - id: boundary_crossing_id
      labels:
        zh: 边界跨越记录标识
        en: Boundary-crossing record ID
        ja: 境界横断記録 ID
      definitions:
        zh: 稳定标识一个跨区尝试及其后续结果的记录，而不是边界配置标识。
        en: Stable identifier for one cross-zone attempt and its subsequent outcome, not an identifier of the boundary configuration.
        ja: 一回のゾーン横断試行と後続結果を安定して識別する記録 ID。境界設定の ID ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: cross-42
      allowed_values: []
      source_claims:
        - claim-nist-pep-request
    - id: trust_boundary_ref
      labels:
        zh: 信任边界引用
        en: Trust-boundary reference
        ja: 信頼境界参照
      definitions:
        zh: 指向本次尝试跨越的静态 TrustBoundary 声明，而不是本记录的父对象。
        en: Reference to the static TrustBoundary declaration crossed by this attempt, not a parent object of this record.
        ja: この試行が横断する静的 TrustBoundary 宣言への参照。この記録の親対象ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sandbox-to-customer-data
      allowed_values: []
      source_claims:
        - claim-owasp-boundary
    - id: source_zone_ref
      labels:
        zh: 来源信任区引用
        en: Source trust-zone reference
        ja: 送信元トラストゾーン参照
      definitions:
        zh: 本次尝试开始时请求所处的 TrustZone。
        en: TrustZone occupied by the request when this attempt begins.
        ja: この試行開始時に要求が存在する TrustZone。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sandbox
      allowed_values: []
      source_claims:
        - claim-owasp-boundary
    - id: target_zone_ref
      labels:
        zh: 目标信任区引用
        en: Target trust-zone reference
        ja: 対象トラストゾーン参照
      definitions:
        zh: 若连接被建立，目标资源将受其控制的 TrustZone。
        en: TrustZone whose controls apply to the target resource if a connection is established.
        ja: 接続が確立された場合に対象リソースへ適用される制御を持つ TrustZone。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: customer-data
      allowed_values: []
      source_claims:
        - claim-nist-pep-request
    - id: subject_ref
      labels:
        zh: 请求主体引用
        en: Requesting-subject reference
        ja: 要求主体参照
      definitions:
        zh: 发起请求的人或非人主体的稳定引用；它不是授权结论。
        en: Stable reference to the person or non-person entity initiating the request; it is not an authorization conclusion.
        ja: 要求を開始する人又は非人エンティティへの安定参照。認可結論ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: agent-42
      allowed_values: []
      source_claims:
        - claim-nist-pep-request
    - id: resource_ref
      labels:
        zh: 目标资源引用
        en: Target-resource reference
        ja: 対象リソース参照
      definitions:
        zh: 被请求访问的具体企业资源或外部资源引用；它不同于目标区的整体范围。
        en: Reference to the specific enterprise or external resource requested, distinct from the target zone's overall scope.
        ja: 要求された具体的な企業又は外部リソースへの参照。対象ゾーン全体の範囲とは異なる。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: case/17
      allowed_values: []
      source_claims:
        - claim-nist-per-session
    - id: requested_action
      labels:
        zh: 请求动作
        en: Requested action
        ja: 要求操作
      definitions:
        zh: 希望在目标资源上执行的动作，例如 read、write 或 execute；不表示动作已经成功。
        en: Action sought on the target resource, such as read, write, or execute; it does not mean the action succeeded.
        ja: 対象リソースで求める read、write、execute などの操作。操作が成功したことを意味しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: read
      allowed_values: []
      source_claims:
        - claim-nist-per-session
    - id: crossing_state
      labels:
        zh: 跨越状态
        en: Crossing state
        ja: 横断状態
      definitions:
        zh: 记录本次尝试是待判断、已拒绝、连接已建立还是执行失败；状态不等同于业务动作的结果。
        en: States whether the attempt is awaiting decision, denied, connection established, or failed; it is not the result of the business action itself.
        ja: 試行が判断待ち、拒否、接続確立、又は失敗のどれかを示す。業務操作自体の結果ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: requested
      allowed_values:
        - requested
        - denied
        - established
        - failed
      source_claims:
        - claim-nist-pep-request
    - id: policy_decision_ref
      labels:
        zh: 策略决定引用
        en: Policy-decision reference
        ja: ポリシー決定参照
      definitions:
        zh: 对本次跨越适用的策略决定记录引用；在 `requested` 状态下可尚不存在。
        en: Reference to the policy-decision record applicable to this crossing; it can be absent while the state is `requested`.
        ja: この横断に適用するポリシー決定記録への参照。状態が `requested` の間は存在しなくてもよい。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: dec-023
      allowed_values: []
      source_claims:
        - claim-opa-data-api
  constraints:
    - id: boundary-crossing-matches-declared-boundary
      severity: error
      expression_language: plain
      expression: source_zone_ref and target_zone_ref must match the source and target zones declared by trust_boundary_ref.
      explanation:
        zh: 记录必须对应一个真实边界，而不是用任意区名伪造一次跨越。
        en: The record must correspond to a real declared boundary rather than invent a crossing from arbitrary zone names.
        ja: 記録は実在する宣言済み境界に対応しなければならず、任意のゾーン名から横断を作ってはならない。
      source_claims:
        - claim-owasp-boundary
    - id: boundary-crossing-decision-before-establishment
      severity: error
      expression_language: plain
      expression: crossing_state = established requires policy_decision_ref and an allow result before a communication path is recorded as established.
      explanation:
        zh: 尝试、决定和连接是不同事实；allow 后由 PA 通过执行点配置路径，PEP 才启用连接。
        en: Attempt, decision, and connection are different facts; after an allow result the PA configures the path through the enforcement point, then the PEP enables the connection.
        ja: 試行、決定、接続は別の事実である。allow の結果後、PA が実施点を通じて経路を構成し、PEP が接続を有効化する。
      source_claims:
        - claim-nist-pep-request
    - id: boundary-crossing-denial-is-not-access
      severity: error
      expression_language: plain
      expression: crossing_state = denied must not be interpreted as a completed resource action or transferred data.
      explanation:
        zh: 拒绝记录提供审计证据，但不是读取、写入或数据传输的事实。
        en: A denial record provides audit evidence but is not evidence of reading, writing, or data transfer.
        ja: 拒否記録は監査証拠になるが、読取り、書込み、又はデータ転送の証拠ではない。
      source_claims:
        - claim-nist-pep-request
  required_relations: []
