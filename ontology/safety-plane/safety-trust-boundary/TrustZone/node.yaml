schema: moonweave.ai/ontology-node/v1
id: TrustZone
kind: concept
status: accepted
labels:
  zh: 信任区
  en: Trust Zone
  ja: トラストゾーン
semantics:
  short_definition:
    zh: 资源在同一组信任假设和保护控制下被访问的逻辑范围。
    en: A logical scope in which resources are accessed under the same trust assumptions and protection controls.
    ja: 同じ信頼仮定と保護制御の下でリソースにアクセスする論理的な範囲。
  definition:
    zh: TrustZone 是由资源范围、数据分类和保护配置共同界定的逻辑区域。它表达“在最近一次策略判断之后哪些资源处于相同信任上下文”，而不表达某个用户已获许可、一个物理网络、一个数据表或一次策略评估。跨区请求要经过 TrustBoundary 并重新适用目标区的控制。
    en: TrustZone is a logical area delimited by resource scope, data classification, and protection configuration. It states which resources share a trust context after the most recent policy judgment; it does not state that a user is authorized, identify a physical network, equal one data table, or represent a policy evaluation. A cross-zone request passes a TrustBoundary and reapplies the target zone's controls.
    ja: TrustZone はリソース範囲、データ分類、保護設定で区切られた論理領域である。直近のポリシー判断の後にどのリソースが同じ信頼文脈を共有するかを表し、利用者の許可、物理ネットワーク、一つのデータ表、又はポリシー評価そのものを表すものではない。ゾーンをまたぐ要求は TrustBoundary を通り、対象ゾーンの制御を再適用する。
  why_needed:
    zh: 数据分类若没有可落实的资源范围和保护配置，只是标签；而资源分组若不说明信任假设，也无法判断何时需要重新授权。
    en: A data classification without resource scope and protection configuration is only a label, while a resource grouping without a trust assumption cannot show when authorization must be reconsidered.
    ja: リソース範囲と保護設定を持たないデータ分類は単なるラベルであり、信頼仮定を持たないリソースの集まりはいつ認可を再判断すべきかを示せない。
  includes:
    - zh: 该区涵盖的资源范围、分类方案与等级、以及适用的保护配置引用。
      en: The zone's resource scope, classification scheme and level, and reference to its applicable protection configuration.
      ja: ゾーンのリソース範囲、分類方式とレベル、及び適用する保護設定への参照。
    - zh: 受同一数据处理和访问控制要求约束的一组资源。
      en: A collection of resources subject to the same data-handling and access-control requirements.
      ja: 同じデータ取扱い及びアクセス制御要件に従うリソースの集合。
  excludes:
    - zh: 单个数据值、URL、身份令牌或对单个请求的 allow/deny 结果。
      en: One data value, URL, identity token, or allow-or-deny result for a single request.
      ja: 一つのデータ値、URL、ID トークン、又は一回の要求に対する allow/deny の結果。
    - zh: 仅有“机密”标签而没有资源范围和保护配置的分类声明。
      en: A classification label such as confidential without resource scope and protection configuration.
      ja: リソース範囲と保護設定を伴わない confidential のような分類ラベル。
  semantic_kind: boundary-context
  aliases:
    - trust-zone
    - protected-resource-zone
engineering:
  explanation:
    zh: 把资源的区标识、分类和保护配置作为策略输入。NIST 把 PEP 后、托管企业资源的区域称为 trust zone；AWS 则要求先识别分类等级、定义访问规则，再按分类设计安全区。工程实现可以把这些值放入 OPA 的 `input` 文档，让 OPA 输出独立的策略结果；TrustZone 本身不执行该查询。
    en: Supply a resource's zone identifier, classification, and protection configuration as policy input. NIST calls the area beyond a PEP that hosts enterprise resources a trust zone; AWS calls for classification levels, access rules, and security-zone models based on classification. An implementation can put those values into OPA's `input` document and obtain a separate policy result; TrustZone itself does not run that query.
    ja: リソースのゾーン ID、分類、保護設定をポリシー入力として渡す。NIST は PEP の先で企業リソースをホストする領域を trust zone と呼び、AWS は分類レベル、アクセス規則、分類に基づくセキュリティゾーンモデルを求める。実装ではそれらを OPA の `input` 文書に入れて別のポリシー結果を得る。TrustZone 自体はその照会を実行しない。
  typical_input:
    - description:
        zh: OPA Data API 的资源访问输入，带有来自 TrustZone 声明的区与分类上下文。
        en: OPA Data API resource-access input carrying zone and classification context from a TrustZone declaration.
        ja: TrustZone 宣言からゾーン及び分類文脈を受け取る OPA Data API のリソースアクセス入力。
      format: '{"input":{"resource":"case/17","trust_zone":"customer-data","classification":"confidential","protection_profile":"customer-data-v3"}}'
      source_claims:
        - claim-opa-input
  typical_output:
    - description:
        zh: OPA 的策略结果；它是对输入的决策，而不是 TrustZone 的属性。
        en: OPA policy result; it is a decision about the input, not an attribute of the TrustZone.
        ja: OPA のポリシー結果。TrustZone の属性ではなく、入力に対する決定である。
      format: '{"decision_id":"dec-020","result":true}'
      source_claims:
        - claim-opa-input
  reference_implementations:
    - name: Open Policy Agent Data API
      url: https://www.openpolicyagent.org/docs/rest-api
      description: Provides the JSON `input`, `result`, and `decision_id` interface for policy decisions using resource context.
    - name: AWS Well-Architected Data Analytics Lens
      url: https://docs.aws.amazon.com/wellarchitected/latest/analytics-lens/best-practice-3.3---understand-data-classifications-and-their-protection-policies..html
      description: Documents classification levels, access rules, and security-zone models for resources with different data classifications.
structure:
  identity_keys:
    - trust_zone_id
  fields:
    - id: trust_zone_id
      labels:
        zh: 信任区标识
        en: Trust zone ID
        ja: トラストゾーン ID
      definitions:
        zh: 用于在资源、策略输入和边界声明中稳定标识同一逻辑信任区的值。
        en: Value that stably identifies the same logical trust zone in resources, policy input, and boundary declarations.
        ja: リソース、ポリシー入力、境界宣言で同じ論理トラストゾーンを安定して識別する値。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: customer-data
      allowed_values: []
      source_claims:
        - claim-nist-trust-zone
    - id: resource_scope_ref
      labels:
        zh: 资源范围引用
        en: Resource-scope reference
        ja: リソース範囲参照
      definitions:
        zh: 指向定义该区包含哪些企业资源的清单、标签选择器或目录，而非单个资源值。
        en: Reference to the inventory, label selector, or catalog that defines which enterprise resources belong to the zone, rather than one resource value.
        ja: ゾーンに属する企業リソースを定義するインベントリ、ラベルセレクター、又はカタログへの参照。一つのリソース値ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: catalog:customer-records
      allowed_values: []
      source_claims:
        - claim-nist-trust-zone
    - id: classification_scheme_ref
      labels:
        zh: 分类方案引用
        en: Classification-scheme reference
        ja: 分類方式参照
      definitions:
        zh: 指向说明分类标签含义和适用范围的组织或合规方案。
        en: Reference to the organizational or compliance scheme that defines the classification labels and their use.
        ja: 分類ラベルの意味と利用を定義する組織又はコンプライアンス方式への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: org-data-classification-v2
      allowed_values: []
      source_claims:
        - claim-aws-classification
    - id: classification_level
      labels:
        zh: 分类等级
        en: Classification level
        ja: 分類レベル
      definitions:
        zh: 按引用的分类方案赋予资源范围的保护等级；不同组织可采用不同词汇。
        en: Protection level assigned to the resource scope under the referenced classification scheme; organizations can use different vocabularies.
        ja: 参照した分類方式の下でリソース範囲に与える保護レベル。組織ごとに異なる語彙を使える。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: confidential
      allowed_values: []
      source_claims:
        - claim-aws-classification
    - id: protection_profile_ref
      labels:
        zh: 保护配置引用
        en: Protection-profile reference
        ja: 保護プロファイル参照
      definitions:
        zh: 指向该区适用的访问、披露、加密或保留控制的版本化配置；不是一次授权结果。
        en: Reference to the versioned access, disclosure, encryption, or retention controls that apply to the zone; it is not one authorization result.
        ja: ゾーンに適用するバージョン化されたアクセス、開示、暗号化、又は保持制御への参照。一回の認可結果ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: customer-data-v3
      allowed_values: []
      source_claims:
        - claim-aws-protection
  constraints:
    - id: trust-zone-requires-scope-and-controls
      severity: error
      expression_language: plain
      expression: A TrustZone must identify resource_scope_ref, classification_scheme_ref, classification_level, and protection_profile_ref.
      explanation:
        zh: 只有分类标签无法说明哪些资源受保护或该怎样保护；四项共同使区可执行和可审计。
        en: A classification label alone cannot show what is protected or how; these four values make the zone actionable and auditable.
        ja: 分類ラベルだけでは何をどう保護するかを示せない。この四つの値でゾーンを実行可能かつ監査可能にする。
      source_claims:
        - claim-aws-classification
        - claim-aws-protection
    - id: trust-zone-is-not-authorization
      severity: error
      expression_language: plain
      expression: A TrustZone declaration must not be interpreted as a grant for a subject to access every resource in resource_scope_ref.
      explanation:
        zh: 区提供策略上下文；每个资源访问仍需独立的最小权限判断。
        en: The zone supplies policy context; each resource access still needs a separate least-privilege decision.
        ja: ゾーンはポリシー文脈を提供する。各リソースアクセスには別途最小権限の判断が必要である。
      source_claims:
        - claim-nist-per-request
  required_relations: []
examples:
  - id: trust-zone-trustllm
    labels:
      zh: 信任区 - TrustLLM 六维可信度
      en: Trust Zone - TrustLLM six-dimension trust
      ja: トラストゾーン - TrustLLM 6次元信頼性
    descriptions: {zh: "信任区(TrustZone) [TrustZone]: 资源在同一组信任假设和保护控制下被访问的逻辑范围。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: trust_zone_id, resource_scope_ref, classification_level.", en: "Trust Zone (TrustZone) [TrustZone]: A logical scope in which resources are accessed under the same trust assumptions and protection controls.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include trust_zone_id, resource_scope_ref, classification_level.", ja: "トラストゾーン(TrustZone) [TrustZone]: 同じ信頼仮定と保護制御の下でリソースにアクセスする論理的な範囲。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: trust_zone_id, resource_scope_ref, classification_level."}
    field_values:
      classification_level: confidential
      classification_scheme_ref: org-data-classification-v2
      protection_profile_ref: customer-data-v3
      resource_scope_ref: "catalog:customer-records"
      trust_zone_id: customer-data
    related_node_ids:
      - TrustZone
    related_relation_ids: []
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-nist-trust-zone
  - id: trust-zone-decodingtrust
    labels:
      zh: 信任区 - DecodingTrust GPT 评估
      en: Trust Zone - DecodingTrust GPT assessment
      ja: トラストゾーン - DecodingTrust GPT 評価
    descriptions: {zh: "信任区(TrustZone) [TrustZone]: 资源在同一组信任假设和保护控制下被访问的逻辑范围。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: trust_zone_id, resource_scope_ref, classification_level.", en: "Trust Zone (TrustZone) [TrustZone]: A logical scope in which resources are accessed under the same trust assumptions and protection controls.. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include trust_zone_id, resource_scope_ref, classification_level.", ja: "トラストゾーン(TrustZone) [TrustZone]: 同じ信頼仮定と保護制御の下でリソースにアクセスする論理的な範囲。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: trust_zone_id, resource_scope_ref, classification_level."}
    field_values:
      classification_level: confidential
      classification_scheme_ref: org-data-classification-v2
      protection_profile_ref: customer-data-v3
      resource_scope_ref: "catalog:customer-records"
      trust_zone_id: customer-data
    related_node_ids:
      - TrustZone
    related_relation_ids: []
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-nist-trust-zone
  - id: trust-zone-anthropic_cai
    labels:
      zh: 信任区 - Anthropic Constitutional AI
      en: Trust Zone - Anthropic Constitutional AI
      ja: トラストゾーン - Anthropic Constitutional AI
    descriptions: {zh: "信任区(TrustZone) [TrustZone]: 资源在同一组信任假设和保护控制下被访问的逻辑范围。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: trust_zone_id, resource_scope_ref, classification_level.", en: "Trust Zone (TrustZone) [TrustZone]: A logical scope in which resources are accessed under the same trust assumptions and protection controls.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include trust_zone_id, resource_scope_ref, classification_level.", ja: "トラストゾーン(TrustZone) [TrustZone]: 同じ信頼仮定と保護制御の下でリソースにアクセスする論理的な範囲。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: trust_zone_id, resource_scope_ref, classification_level."}
    field_values:
      classification_level: confidential
      classification_scheme_ref: org-data-classification-v2
      protection_profile_ref: customer-data-v3
      resource_scope_ref: "catalog:customer-records"
      trust_zone_id: customer-data
    related_node_ids:
      - TrustZone
    related_relation_ids: []
    example_source: Anthropic Constitutional AI
    source_claims:
      - claim-nist-trust-zone
  - id: trust-zone-envoy_ext_auth
    labels:
      zh: 信任区 - Envoy ext_authz PEP
      en: Trust Zone - Envoy ext_authz PEP
      ja: トラストゾーン - Envoy ext_authz PEP
    descriptions: {zh: "信任区(TrustZone) [TrustZone]: 资源在同一组信任假设和保护控制下被访问的逻辑范围。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: trust_zone_id, resource_scope_ref, classification_level.", en: "Trust Zone (TrustZone) [TrustZone]: A logical scope in which resources are accessed under the same trust assumptions and protection controls.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include trust_zone_id, resource_scope_ref, classification_level.", ja: "トラストゾーン(TrustZone) [TrustZone]: 同じ信頼仮定と保護制御の下でリソースにアクセスする論理的な範囲。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: trust_zone_id, resource_scope_ref, classification_level."}
    field_values:
      classification_level: confidential
      classification_scheme_ref: org-data-classification-v2
      protection_profile_ref: customer-data-v3
      resource_scope_ref: "catalog:customer-records"
      trust_zone_id: customer-data
    related_node_ids:
      - TrustZone
    related_relation_ids: []
    example_source: Envoy ext_authz
    source_claims:
      - claim-nist-trust-zone
parent_relation: null
relations: []
sources:
  - id: nist-zero-trust
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf
    source_type: official-standard
    relevance: Defines implicit trust zones and per-request, least-privilege access decisions for enterprise resources.
  - id: aws-data-classification
    title: "AWS Well-Architected Data Analytics Lens: Data classifications and protection policies"
    url: https://docs.aws.amazon.com/wellarchitected/latest/analytics-lens/best-practice-3.3---understand-data-classifications-and-their-protection-policies..html
    source_type: official-cloud-guidance
    relevance: Separates classification levels, access rules, security-zone models, and protection policies.
  - id: opa-data-api
    title: Open Policy Agent REST API Reference
    url: https://www.openpolicyagent.org/docs/rest-api
    source_type: official-open-source-documentation
    relevance: Defines the structured policy query input and result interface used to consume zone context.
source_claims:
  - id: claim-nist-trust-zone
    source: nist-zero-trust
    supports: The implicit trust zone is the area where entities share the trust level established at the last PDP or PEP gateway, and a PEP guards the trust zone hosting enterprise resources.
    locator: Section 2, page 5; Section 3, page 10
    evidence_kind: standard
    confidence: high
  - id: claim-nist-per-request
    source: nist-zero-trust
    supports: Access to individual enterprise resources is granted per session after evaluating the requester, using dynamic policy and least privilege rather than implicit network trust.
    locator: Section 2.1, zero trust tenets 2 through 4
    evidence_kind: standard
    confidence: high
  - id: claim-aws-classification
    source: aws-data-classification
    supports: Organizations identify data classification levels and define access rules, while common levels can vary by industry and compliance requirements.
    locator: Suggestions 3.3.1 and 3.3.2
    evidence_kind: official-guidance
    confidence: high
  - id: claim-aws-protection
    source: aws-data-classification
    supports: Security-zone models can isolate data by classification, and protection policies should be defined according to sensitivity and criticality.
    locator: Suggestions 3.3.3 and 3.3.4
    evidence_kind: official-guidance
    confidence: high
  - id: claim-opa-input
    source: opa-data-api
    supports: OPA receives a JSON input document for a policy query and returns the policy result with an optional decision_id for correlation.
    locator: Example Request, Example Response, and Request/Response Metadata sections
    evidence_kind: official-api
    confidence: high
