  - id: ExternalBoundary-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 内部沙箱网络边界
      en: Internal sandbox network boundary
      ja: internal sandbox network boundary
    scenario_id: trust-review-externalboundary-boundary
    descriptions:
      zh: 代码沙箱与工具网关均由同一平台管理和执行，虽然通过网络通信，对侧仍在受控系统范围内。
      en: The code sandbox and tool gateway are both managed and enforced by the same platform; although they communicate over a network, the counterparty remains in controlled scope.
      ja: code sandbox/tool gateway は same platform 管理で network communication でも controlled scope 内です。
    field_values: {}
    related_node_ids:
