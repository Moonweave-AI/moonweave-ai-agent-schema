      en: payment-provider is outside organizational management; the boundary revision is external and enforces mTLS and minimal disclosure on network and remote-service surfaces.
      ja: payment-provider は organization management 外で boundary=external、network/remote-service surface に mTLS/minimal disclosure を enforce します。
    field_values:
      boundary_id: payment-provider-boundary
      version: "3"
