schema: moonweave.ai/ontology-node/v1
id: ExternalBoundary
kind: concept
status: accepted
labels:
  zh: 外部信任边界
  en: external trust boundary
  ja: external trust boundary
semantics:
  short_definition:
    zh: 对侧不在受控系统管理与执行范围内的信任边界。
    en: A trust boundary whose counterparty lies outside the controlled system's management and enforcement scope.
    ja: counterparty が controlled system management/enforcement scope 外にある trust boundary。
  definition:
    zh: 外部信任边界是一种 TrustBoundary，其种差是 boundary_position=external：对侧组织、用户、服务或系统不受本系统直接管理和执行。它可以使用网络、工具或远程智能体表面，但这些表面不决定外部身份；同一版本不能同时是 InternalBoundary。
    en: "An ExternalBoundary is a TrustBoundary distinguished by boundary_position=external: the counterparty organization, user, service, or system is outside this system's direct management and enforcement. It may use network, tool, or remote-agent surfaces, but those surfaces do not determine external identity; the same revision cannot also be InternalBoundary."
    ja: ExternalBoundary は boundary_position=external の TrustBoundary で counterparty organization/user/service/system は direct management/enforcement 外です。network/tool/remote-agent surface は利用できますが external identity を決めず同一 revision は InternalBoundary になりません。
  why_needed:
    zh: 以内外管理范围作为唯一种差，可与任何交互介质组合而不产生多继承重叠。
    en: Using management scope as the sole differentia combines cleanly with any interaction medium without multiple-inheritance overlap.
    ja: management scope を sole differentia とし interaction medium と組合せても multiple-inheritance overlap を生みません。
  includes:
    - zh: 第三方 API、外部用户、供应商托管服务、跨组织智能体和公网资源的控制边界。
      en: Third-party APIs, external users, vendor-hosted services, cross-organization agents, and public-resource control boundaries.
      ja: third-party API・external user・vendor-hosted service・cross-organization agent・public resource boundary。
  excludes:
    - zh: 同一受控系统内的隔离进程、内部存储区或内部服务之间的边界。
      en: Boundaries among isolated processes, internal stores, or internal services within the same controlled system.
      ja: same controlled system 内の isolated process・internal store・internal service boundary。
  semantic_kind: specification
  aliases: []
