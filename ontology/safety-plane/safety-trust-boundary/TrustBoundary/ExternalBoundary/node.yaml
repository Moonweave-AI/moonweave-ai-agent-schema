      zh: 对侧不在直接管理执行范围，且条件由边界版本明确。
      en: The counterparty is outside direct management and enforcement and the revision states the conditions explicitly.
      ja: counterparty は direct management/enforcement 外で revision が condition を明示します。
    synthetic: true
