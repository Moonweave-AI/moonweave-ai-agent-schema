      en: Classify as InternalBoundary while interaction_surface may include network.
      ja: InternalBoundary とし interaction_surface は network を含められます。
    why_valid_or_invalid:
      zh: 是否经过网络介质并不能决定边界两侧是否处于外部管理位置。
      en: Network medium does not decide internal versus external management position.
      ja: network medium は internal/external position を決めません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-external-boundary-001
