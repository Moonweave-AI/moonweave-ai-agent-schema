schema: moonweave.ai/ontology-node/v1
id: ExternalBoundary
kind: concept
labels:
  zh: 外部信任边界
  en: external trust boundary
  ja: external trust boundary
semantics:
  short_definition:
    zh: 相对于受控系统范围位于组织或系统外部的 TrustBoundary 位置分类。
    en: The external-position classification of TrustBoundary relative to the controlled-system scope.
    ja: controlled-system scope に対し external 位置の TrustBoundary 分類。
  definition:
    zh: ExternalBoundary 是 TrustBoundary 子类，boundary_position=external，表示对侧为组织外 SaaS、partner API、远程 agent 或用户设备。NIST SP 800-207 中 enterprise 之外的 partner zone、MCP 远程 server 与用户浏览器 OAuth consent 面都可建模为 ExternalBoundary，interaction_surface 可同时包含 network 与 remote-agent。
    en: ExternalBoundary is a TrustBoundary subtype with boundary_position=external where the counterparty is organization-external SaaS, partner API, remote agent, or user device. NIST partner zones outside the enterprise, MCP remote servers, and user-browser OAuth consent surfaces model as ExternalBoundary; interaction_surface may include network and remote-agent together.
    ja: ExternalBoundary は boundary_position=external で counterparty が組織外 SaaS/partner API/remote agent/user device。NIST enterprise 外 partner zone、MCP remote server、user browser OAuth consent surface。interaction_surface に network+remote-agent 同時可。
  why_needed:
    zh: 外部边界驱动更强的 revalidation 与 OAuth/MCP 授权要求；与 internal 混用会低估跨界风险。
    en: External boundaries drive stronger revalidation and OAuth/MCP authorization requirements; conflating with internal underestimates crossing risk.
    ja: external boundary はより強い revalidation/OAuth/MCP 認可を要し、internal 混同は crossing risk 過小評価。
  includes:
    - zh: 第三方 API、外部用户、供应商托管服务、跨组织智能体和公网资源的控制边界。
      en: Third-party APIs, external users, vendor-hosted services, cross-organization agents, and public-resource control boundaries.
      ja: third-party API・external user・vendor-hosted service・cross-organization agent・public resource boundary。
  excludes:
    - zh: 同一受控系统内的隔离进程、内部存储区或内部服务之间的边界。
      en: Boundaries among isolated processes, internal stores, or internal services within the same controlled system.
      ja: same controlled system 内の isolated process・internal store・internal service boundary。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: ExternalBoundary 的 BoundaryCrossing 必须绑定 authorized_by 与 evaluated_by（来自 safety-permission-policy）；MCP OAuth flow 是 external crossing 的典型授权证据。记录 valid_from/valid_until 与 enforcement_point_ref。
    en: BoundaryCrossing at ExternalBoundary must bind authorized_by and evaluated_by (from safety-permission-policy); MCP OAuth flow is typical authorization evidence for external crossings. Record valid_from/valid_until and enforcement_point_ref.
    ja: ExternalBoundary の BoundaryCrossing は authorized_by/evaluated_by 必須（safety-permission-policy）。MCP OAuth flow は typical 授权証拠。valid_from/until/enforcement_point_ref 記録。
  typical_input:
    - description: Partner API external boundary.
      format: boundary_position=external; counterparty=partner-saas
      source_claims:
        - claim-external-boundary-design
  typical_output:
    - description: External boundary with OAuth PEP.
      format: '{"boundary_id":"boundary-partner-api","boundary_position":"external","enforcement_point_ref":"oauth-pep-1"}'
      source_claims:
        - claim-external-boundary-design
  reference_implementations:
    - name: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Zero trust zones and policy enforcement points.
    - name: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: Server isolation and protected resources.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system/developer/user/tool role boundaries.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExternalBoundary-mcp-oauth
    labels:
      zh: MCP OAuth 外部边界
      en: MCP OAuth external boundary
      ja: MCP OAuth external boundary
    descriptions:
      zh: boundary-mcp-oauth@1 external：user browser↔authorization server，surface network+remote-agent。
      en: "boundary-mcp-oauth@1 external: user browser↔authorization server, surfaces network+remote-agent."
      ja: boundary-mcp-oauth@1 external browser↔authorization server。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: OAuth consent
    field_values:
      boundary_id: boundary-mcp-oauth
      version: "1"
      boundary_position: external
    related_node_ids:
      - ExternalBoundary
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-external-boundary-design
  - id: ExternalBoundary-nist-partner
    labels:
      zh: NIST partner zone 外部边界
      en: NIST partner zone external boundary
      ja: NIST partner zone external boundary
    descriptions:
      zh: boundary-partner-data@3 external：enterprise agent 访问 partner-data-zone。
      en: "boundary-partner-data@3 external: enterprise agent accesses partner-data-zone."
      ja: boundary-partner-data@3 external enterprise agent→partner-data-zone。
    example_source:
      product: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      version: partner trust zone
    field_values:
      boundary_id: boundary-partner-data
      version: "3"
      boundary_position: external
    related_node_ids:
      - ExternalBoundary
      - DataZone
    related_relation_ids: []
    source_claims:
      - claim-external-boundary-design
  - id: ExternalBoundary-remote-agent
    labels:
      zh: 远程 agent 外部边界
      en: Remote agent external boundary
      ja: remote agent external boundary
    descriptions:
      zh: boundary-a2a-remote@1 external：local orchestrator↠remote A2A agent，需 grant+decision。
      en: "boundary-a2a-remote@1 external: local orchestrator↠remote A2A agent requiring grant+decision."
      ja: boundary-a2a-remote@1 external local↠remote A2A agent。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: remote agent trust
    field_values:
      boundary_id: boundary-a2a-remote
      version: "1"
      boundary_position: external
      interaction_surface:
        - remote-agent
        - network
    related_node_ids:
      - ExternalBoundary
      - TrustBoundary
    related_relation_ids: []
    source_claims:
      - claim-external-boundary-design
  - id: ExternalBoundary-boundary-internal
    labels:
      zh: 模型—工具面不是 external
      en: Model-tool surface is not external
      ja: model-tool surface は external ではない
    descriptions:
      zh: boundary-model-tool@4 是 InternalBoundary，即使 tool 运行在远程 MCP server。
      en: boundary-model-tool@4 is InternalBoundary even when tool runs on remote MCP server.
      ja: boundary-model-tool@4 remote MCP server でも InternalBoundary。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: scope-relative position
    field_values: {}
    related_node_ids:
      - ExternalBoundary
      - InternalBoundary
    related_relation_ids: []
    source_claims:
      - claim-external-boundary-design
parent_relation:
  id: ExternalBoundary-is_a-TrustBoundary
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: ExternalBoundary 是 TrustBoundary 的子类：它继承两侧、信任变化、执行点和有效期，并以对侧位于受控管理与执行范围之外作为唯一种差；network 或 tool 表面不改变该分类。
    en: "ExternalBoundary is a subtype of TrustBoundary: it inherits sides, changed assumptions, enforcement point, and validity, and adds the sole differentia that the counterparty lies outside controlled management and enforcement; network or tool surface does not change that classification."
    ja: ExternalBoundary は TrustBoundary subtype で side・changed assumption・enforcement point・validity を継承し counterparty が controlled management/enforcement 外という sole differentia を追加します。network/tool surface は分類を変えません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: taxonomic inheritance は instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-external-boundary-design
  distinct_fact_rationale:
    zh: ExternalBoundary 满足 TrustBoundary 的身份并增加互斥位置种差。
    en: ExternalBoundary satisfies TrustBoundary identity and adds mutually exclusive position differentia.
    ja: ExternalBoundary は TrustBoundary identity を満たし mutually exclusive position differentia を追加します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
