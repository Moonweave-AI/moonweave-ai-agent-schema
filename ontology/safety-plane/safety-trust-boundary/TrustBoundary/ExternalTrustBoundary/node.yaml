schema: moonweave.ai/ontology-node/v1
id: ExternalTrustBoundary
kind: concept
status: accepted
labels:
  zh: 外部信任边界
  en: External Trust Boundary
  ja: 外部信頼境界
semantics:
  short_definition:
    zh: 连接受控信任区与由其他组织或主体承担管理责任的目标信任区的信任边界。
    en: A trust boundary connecting a controlled trust zone to a target zone administered by another organization or principal.
    ja: 管理下の信頼ゾーンと、別の組織又は主体が管理責任を負う対象ゾーンを結ぶ信頼境界。
  definition:
    zh: ExternalTrustBoundary 是 TrustBoundary 的真子类，保留 trust_boundary_id、source_zone_ref、target_zone_ref 和可选的 enforcement_point_ref。它以外部管理责任的评估记录限定目标区，而不是以 URL、域名、协议名称或“partner”字符串来判定外部性。它既不是端点配置、OAuth 或 MCP 授权配置，也不单独授予跨越该边界或数据离开来源区的许可。
    en: ExternalTrustBoundary is a true subtype of TrustBoundary that retains trust_boundary_id, source_zone_ref, target_zone_ref, and optional enforcement_point_ref. It narrows the target zone through an assessment of external administrative responsibility, not through a URL, hostname, protocol name, or a partner string. It is neither endpoint configuration nor OAuth or MCP authorization configuration, and it never independently authorizes a crossing or data to leave the source zone.
    ja: ExternalTrustBoundary は TrustBoundary の真の下位型であり、trust_boundary_id、source_zone_ref、target_zone_ref、及び任意の enforcement_point_ref を保持する。URL、ホスト名、プロトコル名、又は partner という文字列ではなく、外部の管理責任に関する評価によって対象ゾーンを限定する。エンドポイント設定、OAuth 又は MCP の認可設定ではなく、境界横断又は送信元ゾーンからのデータ送出を単独で許可しない。
  why_needed:
    zh: 外部管理责任意味着不同的运维、审计和信任假设。显式记录这种差异，并在已部署的受控路径中关联执行点，才能让策略在实际跨越前进行可审计的判断；仅凭一个地址无法说明谁负责目标系统，也无法证明某次跨越可以发生。
    en: External administrative responsibility introduces different operational, audit, and trust assumptions. Recording that difference and linking an enforcement point on a deployed controlled path makes a pre-crossing policy decision auditable. An address alone neither identifies who is responsible for the target system nor proves that a particular crossing may occur.
    ja: 外部の管理責任は、異なる運用、監査、信頼の前提を導入する。その差異を記録し、配備済みの制御経路では実施点を関連付けることで、実際の横断前の方針判断を監査可能にできる。アドレスだけでは対象システムの責任者も特定の横断の可否も示せない。
  includes:
    - zh: 由供应商、合作机构、客户或另一业务主体管理的目标信任区，以及该外部管理责任的评估依据。
      en: A target trust zone operated by a supplier, partner, customer, or another business principal together with evidence of that external administrative responsibility.
      ja: 供給者、協力組織、顧客、又は別の事業主体が運用する対象信頼ゾーンと、その外部管理責任を示す証拠。
    - zh: 可选的策略执行点关联，用于已部署的受控路径；它不是外部类别成立的前提。
      en: An optional policy-enforcement-point association for a deployed controlled path; it is not a prerequisite for the external category.
      ja: 配備済みの制御経路のための任意の方針実施点関連。外部カテゴリの前提ではない。
  excludes:
    - zh: 单独的服务 URL、DNS 名称、API 客户端配置、访问令牌、OAuth scope 或 MCP resource 参数。
      en: A service URL, DNS name, API client configuration, access token, OAuth scope, or MCP resource parameter by itself.
      ja: 単独のサービス URL、DNS 名、API クライアント設定、アクセストークン、OAuth スコープ、又は MCP resource パラメーター。
    - zh: 仅因内部服务使用 HTTPS 或名称包含 partner 而被归类为外部的内部调用。
      en: An internal call classified as external only because it uses HTTPS or contains partner in a name.
      ja: HTTPS を使う、又は名前に partner を含むだけで外部に分類される内部呼出し。
  semantic_kind: boundary
  aliases: [third-party-trust-boundary, cross-organization-trust-boundary]
engineering:
  explanation:
    zh: 在架构或策略目录中先声明来源区、外部目标区和外部管理责任的评估引用。若某条部署路径由策略执行点控制，执行点将 boundary_id、动作和管理责任依据放入 OPA Data API 的 input；OPA 返回 result 和可关联的 decision_id。数据分类、披露授权、MCP canonical resource URI、OAuth scope 和用户同意属于各自的保护、授权或协议配置，只有相应规则和结构存在时才可被判断，不能成为本通用节点的字段或推断前提。
    en: First declare the source zone, external target zone, and external-administration assessment reference in an architecture or policy registry. If a deployed path is controlled by a policy enforcement point, it sends boundary_id, action, and the administration basis in an OPA Data API input document. OPA returns result and a correlatable decision_id. Data classification, disclosure authorization, MCP canonical resource URIs, OAuth scopes, and user consent belong to their respective protection, authorization, or protocol configurations. They can be evaluated only when their own rules and structures exist and are not fields or inference prerequisites of this general node.
    ja: まずアーキテクチャ又は方針レジストリで、送信元ゾーン、外部対象ゾーン、外部管理責任の評価参照を宣言する。配備済み経路が方針実施点で制御される場合、その実施点は boundary_id、操作、管理責任根拠を OPA Data API の input 文書に送る。OPA は result と関連付け可能な decision_id を返す。データ分類、開示認可、MCP canonical resource URI、OAuth スコープ、利用者同意はそれぞれの保護、認可、又はプロトコル設定に属する。これらは自身の規則と構造がある場合にだけ評価でき、この汎用ノードのフィールド又は推論前提ではない。
  typical_input:
    - description:
        zh: OPA Data API 的跨外部边界策略输入。target_zone 表示已建模的目标信任区，而不是直接填写协议端点。
        en: An OPA Data API policy input for an external boundary crossing. target_zone names the modeled target trust zone rather than directly supplying a protocol endpoint.
        ja: 外部境界横断のための OPA Data API 方針入力。target_zone はプロトコルエンドポイントを直接記入せず、モデル化済みの対象信頼ゾーンを示す。
      format: |
        {
          "input": {
            "boundary_id": "customer-data-to-partner-service",
            "source_zone": "customer-data",
            "target_zone": "partner-services",
            "action": "request_case_status",
            "external_administration_basis_ref": "trust-assessment:partner-services-2026-q3"
          }
        }
      source_claims: [claim-opa-data-api, claim-external-boundary-model]
  typical_output:
    - description:
        zh: OPA Data API 的拒绝结果。执行点在 result 为 false 时不得放行实际跨越。
        en: An OPA Data API denial result. The enforcement point must not allow the actual crossing when result is false.
        ja: OPA Data API の拒否結果。result が false のとき、実施点は実際の横断を許可してはならない。
      format: |
        {
          "decision_id": "c2a10f54-11f8-4a55-9f48-7d55978c9eb0",
          "result": false
        }
      source_claims: [claim-opa-data-api]
  reference_implementations:
    - name: Open Policy Agent Data API
      url: https://www.openpolicyagent.org/docs/rest-api
      description: Documents policy queries with a structured input document, result value, and decision identifier for correlation.
    - name: NIST SP 800-207 Zero Trust Architecture
      url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf
      description: Describes consistent security posture for assets and workflows that move between enterprise and nonenterprise infrastructure.
structure:
  identity_keys: [trust_boundary_id]
  fields:
    - id: trust_boundary_id
      labels:
        zh: 信任边界标识
        en: Trust boundary ID
        ja: 信頼境界 ID
      definitions:
        zh: 继承自 TrustBoundary 的稳定标识；本子类以外部管理责任评估限定其所描述的边界。
        en: The stable identifier inherited from TrustBoundary. This subtype constrains the boundary it identifies through an external-administration assessment.
        ja: TrustBoundary から継承した安定識別子。この下位型は外部管理責任の評価により、識別する境界を限定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: customer-data-to-partner-service
      allowed_values: []
      source_claims: [claim-external-boundary-model]
    - id: source_zone_ref
      labels:
        zh: 来源信任区引用
        en: Source trust-zone reference
        ja: 送信元信頼ゾーン参照
      definitions:
        zh: 继承自 TrustBoundary 的来源区引用，表示请求跨越前所在的受控信任区。
        en: The source-zone reference inherited from TrustBoundary, identifying the controlled trust zone occupied before the crossing.
        ja: TrustBoundary から継承した送信元ゾーン参照であり、横断前に占有する管理下の信頼ゾーンを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: customer-data
      allowed_values: []
      source_claims: [claim-owasp-boundary]
    - id: target_zone_ref
      labels:
        zh: 外部目标信任区引用
        en: External target trust-zone reference
        ja: 外部対象信頼ゾーン参照
      definitions:
        zh: 继承自 TrustBoundary 的目标区引用，表示管理责任与来源组织不同的逻辑目标区；它不是 URL 或 endpoint 字段。
        en: The target-zone reference inherited from TrustBoundary, identifying a logical target zone whose administrative responsibility differs from the source organization. It is not a URL or endpoint field.
        ja: TrustBoundary から継承した対象ゾーン参照であり、送信元組織と異なる管理責任を持つ論理的対象ゾーンを示す。URL 又は endpoint フィールドではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: partner-services
      allowed_values: []
      source_claims: [claim-nist-external-posture, claim-external-boundary-model]
    - id: enforcement_point_ref
      labels:
        zh: 策略执行点引用
        en: Policy-enforcement-point reference
        ja: 方針実施点参照
      definitions:
        zh: 继承自 TrustBoundary 的可选执行点引用。若某部署路径需要策略执行，该网关、代理或宿主可在实际跨越前执行已作出的策略决定；它不是判定外部性的证据。
        en: The optional enforcement-point reference inherited from TrustBoundary. When a deployed path needs policy enforcement, this gateway, proxy, or host can enforce a decision before the actual crossing. It is not evidence that the boundary is external.
        ja: TrustBoundary から継承した任意の実施点参照。配備済み経路が方針実施を必要とする場合、このゲートウェイ、プロキシ、又はホストは実際の横断前に決定を実施できる。これは境界が外部である証拠ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: egress-policy-proxy
      allowed_values: []
      source_claims: [claim-nist-pep-role]
    - id: external_administration_basis_ref
      labels:
        zh: 外部管理责任依据引用
        en: External-administration-basis reference
        ja: 外部管理責任根拠参照
      definitions:
        zh: 指向供应商评估、合同责任矩阵、信任区目录或其他可审计记录，用来说明 target_zone_ref 不由来源组织完全管理。它不是端点地址、证书或令牌。
        en: Reference to a supplier assessment, contract responsibility matrix, trust-zone registry, or other auditable record showing that target_zone_ref is not fully administered by the source organization. It is not an endpoint address, certificate, or token.
        ja: target_zone_ref が送信元組織により完全には管理されないことを示す、供給者評価、契約責任マトリクス、信頼ゾーンレジストリ、又は他の監査可能な記録への参照。エンドポイントアドレス、証明書、又はトークンではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: trust-assessment:partner-services-2026-q3
      allowed_values: []
      source_claims: [claim-external-boundary-model]
  constraints:
    - id: external-trust-boundary-has-administration-basis
      severity: error
      expression_language: plain
      expression: external_administration_basis_ref must resolve to auditable evidence that target_zone_ref is not fully administered by the source organization; a URL scheme, hostname, protocol name, or display label is insufficient.
      explanation:
        zh: 外部性来自管理责任和不同信任假设，而不是地址字符串的外观。
        en: Externality comes from administrative responsibility and different trust assumptions, not the appearance of an address string.
        ja: 外部性は管理責任と異なる信頼前提から生じ、アドレス文字列の見た目からは生じない。
      source_claims: [claim-nist-external-posture, claim-external-boundary-model]
    - id: external-trust-boundary-enforcement-when-specified
      severity: error
      expression_language: plain
      expression: If enforcement_point_ref is present, it must identify a policy-enforcement component that acts before a permitted BoundaryCrossing from source_zone_ref to target_zone_ref; the absence of this optional deployment association does not change the boundary's external classification.
      explanation:
        zh: PEP 是零信任架构中的执行组件，不是外部边界类别的定义；在使用它时必须在允许跨越前生效。
        en: A PEP is an enforcement component in a zero-trust deployment rather than the definition of the external boundary category. When used, it must act before a permitted crossing.
        ja: PEP はゼロトラスト配備における実施コンポーネントであり、外部境界カテゴリの定義ではない。使用する場合は、許可された横断の前に動作しなければならない。
      source_claims: [claim-nist-pep-role, claim-opa-data-api]
  required_relations: []
