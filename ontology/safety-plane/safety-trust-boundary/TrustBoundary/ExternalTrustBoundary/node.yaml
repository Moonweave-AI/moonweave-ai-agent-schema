parent_relation:
  id: ExternalTrustBoundary-is_a-TrustBoundary
  predicate: is_a
  target: TrustBoundary
  relation_kind: hierarchy
  labels:
    zh: 是一种信任边界
    en: is a trust boundary
    ja: 信頼境界の一種である
  definitions:
    zh: ExternalTrustBoundary 保留 TrustBoundary 的全部必填字段和重评估义务，并将 target_zone_ref 限定为有外部管理责任依据的目标区。
    en: ExternalTrustBoundary retains every required TrustBoundary field and its re-evaluation obligation, while constraining target_zone_ref to a target zone with evidence of external administrative responsibility.
    ja: ExternalTrustBoundary は TrustBoundary のすべての必須フィールドと再評価義務を保持し、target_zone_ref を外部管理責任の証拠がある対象ゾーンに限定する。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: external-trust-boundary-parent-semantics
