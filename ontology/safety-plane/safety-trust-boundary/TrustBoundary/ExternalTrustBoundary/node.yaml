  - id: external-trust-boundary-trustllm
    labels:
      zh: 外部信任边界 - TrustLLM 六维可信度
      en: External Trust Boundary - TrustLLM six-dimension trust
      ja: 外部信頼境界 - TrustLLM 6次元信頼性
