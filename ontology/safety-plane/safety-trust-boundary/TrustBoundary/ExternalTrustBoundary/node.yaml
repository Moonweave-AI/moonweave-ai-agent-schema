    descriptions: {zh: "外部信任边界(ExternalTrustBoundary) [ExternalTrustBoundary]: 连接受控信任区与由其他组织或主体承担管理责任的目标信任区的信任边界。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: source_zone_ref, external_administration_basis_ref, trust_boundary_id.", en: "External Trust Boundary (ExternalTrustBoundary) [ExternalTrustBoundary]: A trust boundary connecting a controlled trust zone to a target zone administered by another organization or principal.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include source_zone_ref, external_administration_basis_ref, trust_boundary_id.", ja: "外部信頼境界(ExternalTrustBoundary) [ExternalTrustBoundary]: 管理下の信頼ゾーンと、別の組織又は主体が管理責任を負う対象ゾーンを結ぶ信頼境界。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: source_zone_ref, external_administration_basis_ref, trust_boundary_id."}
