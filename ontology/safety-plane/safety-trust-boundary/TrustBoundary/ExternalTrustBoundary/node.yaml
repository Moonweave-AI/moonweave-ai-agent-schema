    descriptions: {zh: "外部信任边界(ExternalTrustBoundary) [ExternalTrustBoundary]: 连接受控信任区与由其他组织或主体承担管理责任的目标信任区的信任边界。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: source_zone_ref, external_administration_basis_ref, trust_boundary_id.", en: "External Trust Boundary (ExternalTrustBoundary) [ExternalTrustBoundary]: A trust boundary connecting a controlled trust zone to a target zone administered by another organization or principal.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include source_zone_ref, external_administration_basis_ref, trust_boundary_id.", ja: "外部信頼境界(ExternalTrustBoundary) [ExternalTrustBoundary]: 管理下の信頼ゾーンと、別の組織又は主体が管理責任を負う対象ゾーンを結ぶ信頼境界。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: source_zone_ref, external_administration_basis_ref, trust_boundary_id."}
