    zh: Verified against Microsoft STRIDE trust-boundary modeling; TrustBoundary, DataZone, and BoundaryCrossing separation holds.
    en: Verified against Microsoft STRIDE trust-boundary modeling; TrustBoundary, DataZone, and BoundaryCrossing separation holds.
    ja: Verified against Microsoft STRIDE trust-boundary modeling; TrustBoundary, DataZone, and BoundaryCrossing separation holds.
