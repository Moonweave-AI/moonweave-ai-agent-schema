schema: moonweave.ai/ontology-node/v1
id: TrustBoundary
kind: concept
labels:
  zh: 信任边界
  en: trust boundary
  ja: 信頼境界
semantics:
  short_definition:
    zh: 两安全区域间信任假设发生变化的版本化边界规范。
    en: A versioned boundary specification where trust assumptions change between two security zones.
    ja: 二つの security zone 間で trust assumption が変化する versioned boundary specification。
  definition:
    zh: TrustBoundary 以 boundary_id+version 声明 controlled_side、counterparty_side、boundary_position、interaction_surface 与 trust_assumption_change。它映射 NIST SP 800-207 零信任 trust zone 与 PEP 分离、MCP server isolation boundary（agent/host/server/user 四方）、Anthropic system/developer/user/tool 角色边界。network/tool/remote-agent 是 interaction_surface 字段值，不是重叠子类。
    en: TrustBoundary declares controlled_side, counterparty_side, boundary_position, interaction_surface, and trust_assumption_change via boundary_id+version. It maps NIST SP 800-207 zero-trust trust zones and PEP separation, MCP server isolation boundaries (agent/host/server/user), and Anthropic system/developer/user/tool role boundaries. network/tool/remote-agent are interaction_surface field values, not overlapping subtypes.
    ja: TrustBoundary は boundary_id+version で controlled_side/counterparty_side/boundary_position/interaction_surface/trust_assumption_change を宣言。NIST SP 800-207 trust zone/PEP 分離、MCP server isolation boundary、Anthropic system/developer/user/tool role boundary を写像。network/tool/remote-agent は interaction_surface 値で overlapping subtype ではない。
  why_needed:
    zh: 必须把边界位置与交互介质分开，使同一 MCP 外部边界可同时声明 tool 与 model-context 表面。
    en: Boundary position must be separated from interaction medium so one MCP external boundary can declare tool and model-context surfaces together.
    ja: boundary position と interaction medium を分離しないと一 MCP external boundary が tool/model-context surface を同時宣言できません。
  includes:
    - zh: 系统内部信任变化、组织外部边界、远程服务接口、模型—工具执行接口和跨数据处理区边界。
      en: Internal trust changes, organization-external boundaries, remote-service interfaces, model-to-tool execution interfaces, and boundaries between data-handling zones.
      ja: internal trust change・organization external boundary・remote service interface・model-tool execution interface・data handling zone boundary。
  excludes:
    - zh: 区域本身、一次数据传输、授权范围、策略决定、网络路由以及只因产品或框架名称不同而划出的页面分组。
      en: The zone itself, one data transfer, authority scope, policy decision, network route, and page grouping based only on product or framework names.
      ja: zone 自体・一 data transfer・authority scope・policy decision・network route・product/framework name のみの page grouping。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: NIST“永不默认信任网络位置”映射为每次 BoundaryCrossing 必须 revalidate；MCP context sharing 映射 boundary-model-tool@N；Anthropic role blocks 映射不同 DataZone 之间的 TrustBoundary。不要把 NetworkRoute ID 当作 boundary_id。
    en: Map NIST never-implicit-trust-by-network-location to mandatory revalidation on each BoundaryCrossing; MCP context sharing to boundary-model-tool@N; Anthropic role blocks to TrustBoundary between DataZones. Do not use NetworkRoute ID as boundary_id.
    ja: NIST implicit trust なし→各 BoundaryCrossing revalidate 必須。MCP context sharing→boundary-model-tool@N。Anthropic role blocks→DataZone 間 TrustBoundary。NetworkRoute ID を boundary_id にしない。
  typical_input:
    - description: NIST trust zone boundary.
      format: controlled_side=agent-runtime; counterparty=tool-runtime; PEP=tool-gateway
      source_claims:
        - claim-trust-boundary-design
    - description: MCP server isolation.
      format: agent↔MCP server↔host trust assumption change
      source_claims:
        - claim-trust-boundary-design
  typical_output:
    - description: Versioned boundary spec.
      format: '{"boundary_id":"boundary-model-tool","version":"4","interaction_surface":["tool","model-context"]}'
      source_claims:
        - claim-trust-boundary-design
  reference_implementations:
    - name: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Zero trust zones and policy enforcement points.
    - name: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: Server isolation and protected resources.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system/developer/user/tool role boundaries.
structure:
  identity_keys:
    - boundary_id
    - version
  fields:
    - id: boundary_id
      labels:
        zh: 边界标识
        en: boundary ID
        ja: boundary ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一个信任边界。
        en: Stable logical identifier for a trust boundary across versions.
        ja: version 間で stable な trust boundary ID。
      allowed_values: []
      pattern: null
      example_value: boundary-model-tool
      source_claims:
        - claim-trust-boundary-design
    - id: version
      labels:
        zh: 边界版本
        en: boundary version
        ja: boundary version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的两侧和信任条件。
        en: Fixes one immutable revision of sides and trust conditions.
        ja: side/trust condition の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-trust-boundary-design
    - id: controlled_side_ref
      labels:
        zh: 受控侧引用
        en: controlled-side reference
        ja: controlled-side reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本系统能够直接实施策略与观测的一侧。
        en: References the side where this system can directly enforce policy and observe behavior.
        ja: system が policy enforce/observe できる side。
      allowed_values: []
      pattern: null
      example_value: agent-runtime
      source_claims:
        - claim-trust-boundary-design
    - id: counterparty_side_ref
      labels:
        zh: 对侧引用
        en: counterparty-side reference
        ja: counterparty-side reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用信任条件不同的另一侧区域、服务或执行面。
        en: References the other zone, service, or execution surface with different trust conditions.
        ja: 異なる trust condition の other zone/service/execution surface。
      allowed_values: []
      pattern: null
      example_value: tool-runtime
      source_claims:
        - claim-trust-boundary-design
    - id: boundary_position
      labels:
        zh: 边界位置
        en: boundary position
        ja: boundary position
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 相对于受控系统范围声明 internal 或 external。
        en: Declares internal or external relative to the controlled-system scope.
        ja: controlled-system scope に対する internal/external。
      allowed_values: []
      pattern: null
      example_value: internal
      source_claims:
        - claim-trust-boundary-design
    - id: interaction_surface
      labels:
        zh: 交互面
        en: interaction surface
        ja: interaction surface
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出 network、tool、remote-agent、data-store 或 model-context 等可并存表面。
        en: Lists coexisting surfaces such as network, tool, remote-agent, data-store, or model-context.
        ja: network・tool・remote-agent・data-store・model-context 等 coexist surface。
      allowed_values: []
      pattern: null
      example_value:
        - tool
        - model-context
      source_claims:
        - claim-trust-boundary-design
        - claim-trust-boundary-design
    - id: trust_assumption_change
      labels:
        zh: 信任假设变化
        en: trust-assumption change
        ja: trust-assumption change
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明身份、权限、可见性、执行控制、数据处理或问责中哪些条件发生变化。
        en: States which identity, authority, visibility, execution-control, data-handling, or accountability assumptions change.
        ja: identity・authority・visibility・execution control・data handling・accountability の change。
      allowed_values: []
      pattern: null
      example_value:
        - untrusted-output
        - side-effects-possible
      source_claims:
        - claim-trust-boundary-design
        - claim-trust-boundary-design
    - id: enforcement_point_ref
      labels:
        zh: 执行点引用
        en: enforcement-point reference
        ja: enforcement-point reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对跨越执行允许、拒绝、监控或终止的控制点。
        en: References the control point that allows, denies, monitors, or terminates crossings.
        ja: crossing を allow/deny/monitor/terminate する control point。
      allowed_values: []
      pattern: null
      example_value: tool-gateway-pep
      source_claims:
        - claim-trust-boundary-design
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该边界版本开始生效的时间。
        en: Records when this boundary revision becomes effective.
        ja: boundary revision effective start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-trust-boundary-design
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；为空表示尚未计划结束。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time、null は scheduled end 無し。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-trust-boundary-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: TrustBoundary-nist-pep
    labels:
      zh: NIST PEP 信任边界
      en: NIST PEP trust boundary
      ja: NIST PEP trust boundary
    descriptions:
      zh: boundary-agent-pep@3 将 agent-runtime 与 partner-data-zone 分开，enforcement_point=pep-gateway-3。
      en: boundary-agent-pep@3 separates agent-runtime from partner-data-zone with enforcement_point=pep-gateway-3.
      ja: boundary-agent-pep@3 agent-runtime/partner-data-zone 分離、pep-gateway-3。
    example_source:
      product: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      version: PEP and trust zones
    field_values:
      boundary_id: boundary-agent-pep
      version: "3"
      enforcement_point_ref: pep-gateway-3
    related_node_ids:
      - TrustBoundary
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-trust-boundary-design
  - id: TrustBoundary-mcp-server
    labels:
      zh: MCP server 隔离边界
      en: MCP server isolation boundary
      ja: MCP server isolation boundary
    descriptions:
      zh: boundary-mcp-host@2 声明 agent↔MCP server↔host 三方 trust assumption change。
      en: boundary-mcp-host@2 declares agent↔MCP server↔host trust assumption change.
      ja: boundary-mcp-host@2 agent↔MCP server↔host trust assumption change。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: server isolation
    field_values:
      boundary_id: boundary-mcp-host
      version: "2"
      interaction_surface:
        - tool
        - network
    related_node_ids:
      - TrustBoundary
      - ExternalBoundary
    related_relation_ids: []
    source_claims:
      - claim-trust-boundary-design
  - id: TrustBoundary-anthropic-roles
    labels:
      zh: Anthropic 角色边界
      en: Anthropic role boundary
      ja: Anthropic role boundary
    descriptions:
      zh: boundary-model-tool@4 分离 developer instruction 与 untrusted user/tool content。
      en: boundary-model-tool@4 separates developer instructions from untrusted user/tool content.
      ja: boundary-model-tool@4 developer instruction と untrusted user/tool content 分離。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      version: role separation
    field_values:
      boundary_id: boundary-model-tool
      version: "4"
      trust_assumption_change:
        - untrusted-output
        - side-effects-possible
    related_node_ids:
      - TrustBoundary
      - InternalBoundary
    related_relation_ids: []
    source_claims:
      - claim-trust-boundary-design
  - id: TrustBoundary-boundary-diagram
    labels:
      zh: 网络图虚线不是边界
      en: Network diagram dashed line is not boundary
      ja: network 図虚線は boundary ではない
    descriptions:
      zh: 架构图虚线无 controlled_side/trust_assumption_change/enforcement_point 时不创建 TrustBoundary。
      en: Architecture dashed lines without controlled_side/trust_assumption_change/enforcement_point do not create TrustBoundary.
      ja: controlled_side/trust_assumption_change/enforcement_point なし architecture 虚線は TrustBoundary 作成不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus diagram
    field_values: {}
    related_node_ids:
      - TrustBoundary
    related_relation_ids: []
    source_claims:
      - claim-trust-boundary-design
parent_relation: null
relations: []
sources:
  - id: nist-sp-800-207
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://csrc.nist.gov/pubs/sp/800/207/final
    source_type: standard
    relevance: Trust zones, policy enforcement points, and never implicit trust by network location.
  - id: mcp-authorization-2025
    title: MCP Authorization Specification (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
    source_type: standard
    relevance: MCP server isolation boundary and OAuth-protected resource access.
  - id: anthropic-messages-api
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: system/developer/user/tool role separation across trust boundaries.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Insecure plugin design and excessive agency across trust zones.
  - id: cisa-ztmm-v2
    title: CISA Zero Trust Maturity Model 2.0
    url: https://www.cisa.gov/zero-trust-maturity-model
    source_type: standard
    relevance: Data pillar inventory, categorization, labeling, and lifecycle protection.
  - id: safety-trust-design
    title: Moonweave trust-boundary module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: TrustBoundary, DataZone, and BoundaryCrossing identity separation.
source_claims:
  - id: claim-trust-boundary-design
    source: safety-trust-design
    supports: TrustBoundary is versioned specification of changed trust assumptions, not a crossing occurrence.
    locator: TrustBoundary boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-trust-boundary-design
    source: nist-sp-800-207
    supports: NIST zero trust trust zones and PEPs map to TrustBoundary revisions.
    locator: Trust zones
    evidence_kind: design-inference
    confidence: high
  - id: claim-trust-boundary-design
    source: mcp-authorization-2025
    supports: MCP server isolation among agent, host, and user maps to TrustBoundary.
    locator: Server isolation
    evidence_kind: design-inference
    confidence: high
  - id: claim-trust-boundary-design
    source: anthropic-messages-api
    supports: Anthropic system/developer/user/tool roles map to TrustBoundary between zones.
    locator: Role boundaries
    evidence_kind: design-inference
    confidence: high
