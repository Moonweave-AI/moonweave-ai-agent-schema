        ja: received_by inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: received_by 记录在目标侧实际接收、解释、存储或执行被转移对象并承担责任的 Actor；仅拥有目标服务或签发策略不能证明接收。
        en: received_by records the target-side Actor that actually receives, interprets, stores, or executes the transferred object and bears responsibility; merely owning the target service or issuing policy does not prove receipt.
        ja: received_by は target側で transferred object を実際に receive・interpret・store・execute し責任を負う Actor を記録します。target service ownership や policy issuance だけでは受領を証明しません。
      protocol_or_resource_context:
        zh: 接收方 actor_id 必须与 crossing_id、对象摘要、目标区、结果、occurred_at 及接收或执行证据一致。
        en: The receiver actor_id must agree with crossing_id, object digest, target zone, outcome, occurred_at, and receipt or execution evidence.
        ja: receiver actor_id は crossing_id・object digest・target zone・outcome・occurred_at・receipt/execution evidence と一致する必要があります。
    constraints: []
    source_claims:
      - claim-boundary-crossing-design
      - claim-boundary-crossing-design
    distinct_fact_rationale:
      zh: 该边表达目标侧接收责任，与策略决定主体不同。
      en: This edge expresses target-side receipt responsibility, distinct from policy-decision responsibility.
      ja: target-side receipt responsibility を表し policy-decision responsibility と異なります。
    layout_role: cross-link
    target: concept:Actor
