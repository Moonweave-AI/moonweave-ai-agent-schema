        en: The target zone must be the DataZone revision whose handling requirements actually govern the object after the enforcement point; if the planned target is denied and the object enters quarantine, record the real quarantine zone.
        ja: target zone は enforcement point 後に object を実際に統制する DataZone revision です。planned target が拒否され quarantine に入る場合は real quarantine zone を記録します。
      protocol_or_resource_context:
        zh: 关联必须固定 crossing_id、对象摘要、结果、occurred_at、target_zone_id、区版本、分类和 handling_policy_ref。
        en: Correlation must fix crossing_id, object digest, outcome, occurred_at, target_zone_id, zone revision, classification, and handling_policy_ref.
