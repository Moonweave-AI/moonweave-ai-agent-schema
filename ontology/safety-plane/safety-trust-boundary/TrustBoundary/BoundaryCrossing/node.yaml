  - id: BoundaryCrossing-initiated_by-Actor
    predicate: initiated_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由主体发起
      en: initiated by actor
      ja: actor に initiated
    definitions:
      zh: BoundaryCrossing initiated_by 指向对对象越过边界的动作承担发起责任的 Actor；仅创建对象、拥有服务或出现在同一会话不够，必须有请求、调用或委派证据。
      en: BoundaryCrossing initiated_by points to the Actor responsible for starting the object's passage across the boundary. Creating the object, owning a service, or sharing a session is insufficient without request, call, or delegation evidence.
      ja: BoundaryCrossing initiated_by は object crossing start に responsibility を持つ Actor を指します。object creation・service ownership・same session のみでは不十分で request/call/delegation evidence を要します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
