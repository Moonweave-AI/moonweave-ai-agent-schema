schema: moonweave.ai/ontology-node/v1
id: BoundaryCrossing
kind: concept
status: accepted
labels:
  zh: 边界跨越
  en: boundary crossing
  ja: boundary crossing
semantics:
  short_definition:
    zh: 一个对象从源数据区越过信任边界到目标数据区的可观测发生。
    en: An observable occurrence in which an object moves from a source data zone across a trust boundary to a target data zone.
    ja: object が source data zone から trust boundary を越え target data zone へ移動する observable occurrence。
  definition:
    zh: 边界跨越是一种事件，以跨越标识、传输对象引用、方向、目的、时间、载荷摘要和结果为身份，并通过关系记录信任边界、源/目标数据区、发起/接收 Actor、AuthorizationGrant、PolicyDecision 与 TraceEvent。它不是长期边界规范、授权范围或数据区。
    en: A BoundaryCrossing is an event identified by crossing ID, transferred-object reference, direction, purpose, time, payload digest, and outcome, with relations recording TrustBoundary, source and target DataZone, initiating and receiving Actor, AuthorizationGrant, PolicyDecision, and TraceEvent. It is not a long-lived boundary specification, authority scope, or data zone.
    ja: BoundaryCrossing は crossing ID・object ref・direction・purpose・time・payload digest・outcome で識別する event で TrustBoundary・source/target DataZone・initiating/receiving Actor・AuthorizationGrant・PolicyDecision・TraceEvent を relation で記録します。boundary specification・authority scope・data zone ではありません。
  why_needed:
    zh: 将一次跨越作为中心事件，可把区域变化、责任主体、授权依据、策略决定和观测证据汇成完整闭环。
    en: Centering one crossing occurrence brings zone change, responsible actors, authorization basis, policy decision, and observability evidence into one closed fact chain.
    ja: one crossing occurrence を中心に zone change・responsible actor・authorization basis・policy decision・observability evidence を closed fact chain にします。
  includes:
    - zh: 数据、消息、工件、控制请求或委派信息跨越内部或外部信任边界的发生。
      en: Occurrences where data, message, artifact, control request, or delegation information crosses an internal or external trust boundary.
      ja: data・message・artifact・control request・delegation information が internal/external trust boundary を越える occurrence。
  excludes:
    - zh: 边界定义、区域策略、计划但未发生的传输、仅有授权决定而没有对象移动的记录。
      en: Boundary definitions, zone policies, planned but unoccurred transfers, and authorization decisions with no object movement.
      ja: boundary definition・zone policy・unoccurred planned transfer・object movement のない authorization decision。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - crossing_id
    - object_ref
  fields:
    - id: crossing_id
      labels:
        zh: 跨越标识
        en: crossing ID
        ja: crossing ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次实际跨越发生。
        en: Stable identifier for one actual crossing occurrence.
        ja: 一 actual crossing occurrence の stable identifier。
      allowed_values: []
      pattern: null
      example_value: crossing-884
      source_claims:
        - claim-boundary-crossing-001
        - claim-boundary-crossing-005
    - id: object_ref
      labels:
        zh: 传输对象引用
        en: transferred-object reference
        ja: transferred-object reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用跨越边界的数据、消息、工件、请求或权限对象。
        en: References the data, message, artifact, request, or authority object crossing the boundary.
        ja: boundary を越える data・message・artifact・request・authority object。
      allowed_values: []
      pattern: null
      example_value: artifact-tool-output-884
      source_claims:
        - claim-boundary-crossing-004
    - id: direction
      labels:
        zh: 跨越方向
        en: crossing direction
        ja: crossing direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按受控侧视角记录 inbound、outbound 或 lateral。
        en: Records inbound, outbound, or lateral from the controlled-side viewpoint.
        ja: controlled-side viewpoint の inbound・outbound・lateral。
      allowed_values: []
      pattern: null
      example_value: inbound
      source_claims:
        - claim-boundary-crossing-001
    - id: purpose
      labels:
        zh: 跨越目的
        en: crossing purpose
        ja: crossing purpose
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对象为何需要跨越以及预期消费操作。
        en: Records why the object crosses and the intended consuming operation.
        ja: object crossing 理由と intended consuming operation。
      allowed_values: []
      pattern: null
      example_value: return-tool-result
      source_claims:
        - claim-boundary-crossing-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: occurred at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对象实际越过执行点的时间。
        en: Records when the object actually passed the enforcement point.
        ja: object が enforcement point を通過した時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T03:02:17Z
      source_claims:
        - claim-boundary-crossing-005
        - claim-boundary-crossing-004
    - id: payload_digest
      labels:
        zh: 载荷摘要
        en: payload digest
        ja: payload digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定跨越对象内容用于关联与防篡改核验。
        en: Fixes the transferred content for correlation and tamper checking.
        ja: transferred content を correlation/tamper check 用に固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:884...
      source_claims:
        - claim-boundary-crossing-005
    - id: outcome
      labels:
        zh: 跨越结果
        en: crossing outcome
        ja: crossing outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 allowed、denied、redacted、quarantined 或 failed。
        en: Records allowed, denied, redacted, quarantined, or failed.
        ja: allowed・denied・redacted・quarantined・failed。
      allowed_values: []
      pattern: null
      example_value: redacted
      source_claims:
        - claim-boundary-crossing-003
        - claim-boundary-crossing-001
  constraints: []
  required_relation_constraints: []
