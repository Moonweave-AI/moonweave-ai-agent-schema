      predicate: is_initiated_by_of
      labels:
        zh: 反向 initiated_by
        en: is initiated_by of
        ja: initiated_by inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: initiated_by 记录对开始对象越界负有责任的 Actor；必须由请求、调用或委派证据证明，创建对象、拥有服务或共享会话均不足以归责。
        en: initiated_by records the Actor accountable for starting the object's passage; request, call, or delegation evidence must establish that responsibility, while creating the object, owning a service, or sharing a session is insufficient.
        ja: initiated_by は object passage の開始に責任を負う Actor を記録し、request・call・delegation evidence が必要です。object creator・service owner・shared session だけでは帰責できません。
      protocol_or_resource_context:
        zh: actor_id 必须与 crossing_id、对象摘要、发生时间及具体 request/call/delegation 引用共同相关。
        en: actor_id must correlate jointly with crossing_id, object digest, occurrence time, and the concrete request, call, or delegation reference.
        ja: actor_id は crossing_id・object digest・occurrence time・具体的 request/call/delegation reference と共同で関連付ける必要があります。
    constraints: []
    source_claims:
      - claim-boundary-crossing-design
      - claim-boundary-crossing-design
    distinct_fact_rationale:
      zh: 该边表达活动发起责任，不是对象作者或授权者。
      en: This edge expresses activity-start responsibility, not object authorship or authorization.
      ja: activity start responsibility を表し object authorship/authorization ではありません。
    layout_role: cross-link
    target: concept:Actor
  - id: BoundaryCrossing-received_by-Actor
    predicate: received_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 由主体接收
      en: received by actor
      ja: actor に received
    definitions:
      zh: BoundaryCrossing received_by 指向在目标侧实际接收、解释、存储或执行传输对象并承担责任的 Actor；仅作为目标服务所有者或策略签发者不建立。
      en: BoundaryCrossing received_by points to the Actor on the target side that actually receives, interprets, stores, or executes the transferred object and bears responsibility. Merely owning the target service or issuing policy does not establish it.
      ja: BoundaryCrossing received_by は target side で object を actual receive・interpret・store・execute し responsibility を持つ Actor を指します。service owner/policy issuer のみでは成立しません。
    cardinality:
      source:
        min: 0
        max: null
