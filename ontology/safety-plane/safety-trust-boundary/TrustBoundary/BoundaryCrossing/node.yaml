schema: moonweave.ai/ontology-node/v1
id: BoundaryCrossing
kind: concept
labels:
  zh: 边界跨越
  en: boundary crossing
  ja: boundary crossing
semantics:
  short_definition:
    zh: 对象在明确 TrustBoundary 版本下从一个 DataZone 实际进入另一个 DataZone 的可审计发生。
    en: An auditable occurrence of an object actually moving from one DataZone to another under a stated TrustBoundary revision.
    ja: 明示 TrustBoundary revision 下で object が一 DataZone から他 DataZone へ実際に移動した監査可能 occurrence。
  definition:
    zh: BoundaryCrossing 以 crossing_id、occurred_at、trust_boundary_ref、source_data_zone_ref、target_data_zone_ref、payload_digest、initiating_actor_ref、receiving_actor_ref 与 authorized_by/evaluated_by 记录一次实际跨界。MCP tool_result 进入 model context、Anthropic tool_result block Admission、NIST PEP 处 verified access 都应投影为 BoundaryCrossing；计划或编排意图不是 crossing。
    en: BoundaryCrossing records an actual crossing with crossing_id, occurred_at, trust_boundary_ref, source_data_zone_ref, target_data_zone_ref, payload_digest, initiating_actor_ref, receiving_actor_ref, and authorized_by/evaluated_by. MCP tool_result entering model context, Anthropic tool_result block admission, and NIST PEP verified access project to BoundaryCrossing; plans or orchestration intent are not crossings.
    ja: BoundaryCrossing は crossing_id/occurred_at/trust_boundary_ref/source/target zone/payload_digest/initiator/receiver/authorized_by/evaluated_by で actual crossing を記録。MCP tool_result→model context、Anthropic tool_result admission、NIST PEP verified access を投影。plan/orchestration intent は crossing ではない。
  why_needed:
    zh: 若只记录“数据来自工具”而无 occurred_at 与 zone 版本，RAG 投毒后无法审计授权与接收者。
    en: Recording only data came from a tool without occurred_at and zone revisions prevents auditing authorization and receiver after RAG poisoning.
    ja: occurred_at/zone revision なしで tool 由来だけ記録すると RAG poisoning 後に authorization/receiver 監査不可。
  includes:
    - zh: 数据、消息、工件、控制请求或委派信息跨越内部或外部信任边界的发生。
      en: Occurrences where data, message, artifact, control request, or delegation information crosses an internal or external trust boundary.
      ja: data・message・artifact・control request・delegation information が internal/external trust boundary を越える occurrence。
  excludes:
    - zh: 边界定义、区域策略、计划但未发生的传输、仅有授权决定而没有对象移动的记录。
      en: Boundary definitions, zone policies, planned but unoccurred transfers, and authorization decisions with no object movement.
      ja: boundary definition・zone policy・unoccurred planned transfer・object movement のない authorization decision。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 每次 tool_result 进入 model context 前创建 crossing 记录；绑定 grant/decision refs；若扫描失败修正 target_data_zone_ref 为 quarantine。NIST continuous verification 要求 payload_digest 与 receipt_evidence。
    en: Create crossing record before each tool_result enters model context; bind grant/decision refs; if scan fails, correct target_data_zone_ref to quarantine. NIST continuous verification requires payload_digest and receipt_evidence.
    ja: tool_result→model context 前に crossing 作成。grant/decision refs 束縛。scan 失敗時 target→quarantine。NIST continuous verification で payload_digest/receipt_evidence 必須。
  typical_input:
    - description: MCP tool result admission.
      format: source=zone-tool-output@3; target=zone-model-context@7; boundary=boundary-model-tool@4
      source_claims:
        - claim-boundary-crossing-design
    - description: Anthropic tool_result block.
      format: tool_result crosses into model context with role=user content block
      source_claims:
        - claim-boundary-crossing-design
  typical_output:
    - description: Audited crossing record.
      format: '{"crossing_id":"crossing-884","occurred_at":"2026-07-16T03:02:17Z","authorized_by":"grant-884"}'
      source_claims:
        - claim-boundary-crossing-design
  reference_implementations:
    - name: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Zero trust zones and policy enforcement points.
    - name: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: Server isolation and protected resources.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system/developer/user/tool role boundaries.
structure:
  identity_keys:
    - crossing_id
    - object_ref
  fields:
    - id: crossing_id
      labels:
        zh: 跨越标识
        en: crossing ID
        ja: crossing ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次实际跨越发生。
        en: Stable identifier for one actual crossing occurrence.
        ja: 一 actual crossing occurrence の stable identifier。
      allowed_values: []
      pattern: null
      example_value: crossing-884
      source_claims:
        - claim-boundary-crossing-design
        - claim-boundary-crossing-design
    - id: object_ref
      labels:
        zh: 传输对象引用
        en: transferred-object reference
        ja: transferred-object reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用跨越边界的数据、消息、工件、请求或权限对象。
        en: References the data, message, artifact, request, or authority object crossing the boundary.
        ja: boundary を越える data・message・artifact・request・authority object。
      allowed_values: []
      pattern: null
      example_value: artifact-tool-output-884
      source_claims:
        - claim-boundary-crossing-design
    - id: direction
      labels:
        zh: 跨越方向
        en: crossing direction
        ja: crossing direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按受控侧视角记录 inbound、outbound 或 lateral。
        en: Records inbound, outbound, or lateral from the controlled-side viewpoint.
        ja: controlled-side viewpoint の inbound・outbound・lateral。
      allowed_values: []
      pattern: null
      example_value: inbound
      source_claims:
        - claim-boundary-crossing-design
    - id: purpose
      labels:
        zh: 跨越目的
        en: crossing purpose
        ja: crossing purpose
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对象为何需要跨越以及预期消费操作。
        en: Records why the object crosses and the intended consuming operation.
        ja: object crossing 理由と intended consuming operation。
      allowed_values: []
      pattern: null
      example_value: return-tool-result
      source_claims:
        - claim-boundary-crossing-design
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: occurred at
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录对象实际越过执行点的时间。
        en: Records when the object actually passed the enforcement point.
        ja: object が enforcement point を通過した時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T03:02:17Z
      source_claims:
        - claim-boundary-crossing-design
        - claim-boundary-crossing-design
    - id: payload_digest
      labels:
        zh: 载荷摘要
        en: payload digest
        ja: payload digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定跨越对象内容用于关联与防篡改核验。
        en: Fixes the transferred content for correlation and tamper checking.
        ja: transferred content を correlation/tamper check 用に固定します。
      allowed_values: []
      pattern: null
      example_value: sha256:884...
      source_claims:
        - claim-boundary-crossing-design
    - id: outcome
      labels:
        zh: 跨越结果
        en: crossing outcome
        ja: crossing outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 allowed、denied、redacted、quarantined 或 failed。
        en: Records allowed, denied, redacted, quarantined, or failed.
        ja: allowed・denied・redacted・quarantined・failed。
      allowed_values: []
      pattern: null
      example_value: redacted
      source_claims:
        - claim-boundary-crossing-design
        - claim-boundary-crossing-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: BoundaryCrossing-mcp-tool-result
    labels:
      zh: MCP 工具结果跨界
      en: MCP tool result crossing
      ja: MCP tool result crossing
    descriptions:
      zh: crossing-884：tool-result weather 从 zone-tool-output@3 经 boundary-model-tool@4 进入 zone-model-context@7。
      en: "crossing-884: weather tool-result from zone-tool-output@3 via boundary-model-tool@4 into zone-model-context@7."
      ja: crossing-884 weather tool-result zone-tool-output@3→zone-model-context@7。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: tool_result admission
    field_values:
      crossing_id: crossing-884
      trust_boundary_ref: boundary-model-tool@4
      authorized_by: grant-884
    related_node_ids:
      - BoundaryCrossing
      - TrustBoundary
      - DataZone
    related_relation_ids: []
    source_claims:
      - claim-boundary-crossing-design
  - id: BoundaryCrossing-anthropic-tool
    labels:
      zh: Anthropic tool_result 跨界
      en: Anthropic tool_result crossing
      ja: Anthropic tool_result crossing
    descriptions:
      zh: crossing-anthropic-42：tool_result block 从 untrusted zone 进入 sanitized model context。
      en: "crossing-anthropic-42: tool_result block from untrusted zone into sanitized model context."
      ja: crossing-anthropic-42 tool_result untrusted→sanitized model context。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      version: tool_result block
    field_values:
      crossing_id: crossing-anthropic-42
    related_node_ids:
      - BoundaryCrossing
      - InternalBoundary
    related_relation_ids: []
    source_claims:
      - claim-boundary-crossing-design
  - id: BoundaryCrossing-nist-pep
    labels:
      zh: NIST PEP 验证跨界
      en: NIST PEP verified crossing
      ja: NIST PEP verified crossing
    descriptions:
      zh: crossing-pep-3 在 pep-gateway-3 经验证后进入 partner-data-zone。
      en: crossing-pep-3 enters partner-data-zone after verification at pep-gateway-3.
      ja: crossing-pep-3 pep-gateway-3 検証後 partner-data-zone 進入。
    example_source:
      product: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      version: PEP verification
    field_values:
      crossing_id: crossing-pep-3
      evaluated_by: decision-pep-3
    related_node_ids:
      - BoundaryCrossing
      - ExternalBoundary
    related_relation_ids: []
    source_claims:
      - claim-boundary-crossing-design
  - id: BoundaryCrossing-boundary-planned
    labels:
      zh: 计划跨界不是 crossing
      en: Planned crossing is not crossing
      ja: 計画 crossing は crossing ではない
    descriptions:
      zh: 编排计划将 tool output 送入 context 但无 occurred_at/payload_digest 时不创建 BoundaryCrossing。
      en: Orchestration plan to send tool output to context without occurred_at/payload_digest does not create BoundaryCrossing.
      ja: occurred_at/payload_digest なし orchestration plan は BoundaryCrossing 作成不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: occurrence versus plan
    field_values: {}
    related_node_ids:
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-boundary-crossing-design
parent_relation:
  id: BoundaryCrossing-crosses-TrustBoundary
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 跨越信任边界
    en: crosses trust boundary
    ja: trust boundary を crossing
  definitions:
    zh: BoundaryCrossing 仅在对象实际经过指定 TrustBoundary 的执行点且 crossing 时间落在边界版本有效期内时 crosses 它；计划路线、相邻组件或视觉连线不足以建立。
    en: BoundaryCrossing crosses a TrustBoundary only when the object actually passes that boundary's enforcement point while the boundary revision is valid. A planned route, adjacent components, or a visual connector is insufficient.
    ja: BoundaryCrossing は object が valid boundary revision の enforcement point を実際に通過した場合のみ TrustBoundary を crosses します。planned route・adjacent component・visual connector は不十分です。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 crosses
      en: is crosses of
      ja: crosses inverse
  conditions: []
  temporal_scope: valid-time
  boundary_context:
    trust_boundary_concept_id: TrustBoundary
    authority_basis:
      zh: 该关系只在对象实际通过指定 TrustBoundary 的策略执行点、且边界版本在 occurred_at 有效时成立；计划路径、邻接或图上连线均不是跨越证据。
      en: This relation holds only when the object actually passes the specified TrustBoundary's policy-enforcement point while that boundary revision is valid at occurred_at; a planned route, adjacency, or graph connector is not crossing evidence.
      ja: object が指定 TrustBoundary の policy-enforcement point を実際に通過し、boundary revision が occurred_at に有効な場合だけ成立します。planned route・adjacency・graph connector は crossing evidence ではありません。
    protocol_or_resource_context:
      zh: 跨越证据必须关联 crossing_id、对象摘要、边界版本、执行点、方向、源区、目标区和发生时间。
      en: Crossing evidence must correlate crossing_id, object digest, boundary revision, enforcement point, direction, source zone, target zone, and occurrence time.
      ja: crossing evidence は crossing_id・object digest・boundary revision・enforcement point・direction・source/target zone・occurrence time を関連付ける必要があります。
  constraints: []
  source_claims:
    - claim-boundary-crossing-design
    - claim-boundary-crossing-design
  distinct_fact_rationale:
    zh: 该边连接发生事件与长期边界规范。
    en: This edge links an occurrence event to a long-lived boundary specification.
    ja: occurrence event と long-lived boundary specification を結びます。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: BoundaryCrossing-authorized_by-AuthorizationGrant
    predicate: authorized_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由授权授予支持
      en: authorized by grant
      ja: grant に authorized
    definitions:
      zh: BoundaryCrossing authorized_by 指向在 occurred_at 仍有效、未撤销且其主体、对象、操作、数据区和边界范围覆盖此次跨越的 AuthorizationGrant；PermissionScope 请求或 PolicyDecision 本身不等于已签发授权。
      en: BoundaryCrossing authorized_by points to an AuthorizationGrant that remains valid and unrevoked at occurred_at and whose subject, object, operation, data-zone, and boundary scope cover this crossing. A requested PermissionScope or PolicyDecision alone is not an issued grant.
      ja: BoundaryCrossing authorized_by は occurred_at に valid/unrevoked で subject・object・operation・data zone・boundary scope が crossing を cover する AuthorizationGrant を指します。PermissionScope request/PolicyDecision のみは issued grant ではありません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_authorized_by_of
      labels:
        zh: 反向 authorized_by
        en: is authorized_by of
        ja: authorized_by inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 只有在发生时仍有效且未撤销、并覆盖主体、对象、操作、源区、目标区与该边界的 AuthorizationGrant，才能授权这次跨越；请求范围或策略决定本身不是已签发授权。
        en: Only an AuthorizationGrant that is valid and unrevoked at occurrence time and covers the subject, object, operation, source zone, target zone, and boundary authorizes this crossing; a requested scope or policy decision is not an issued grant.
        ja: occurrence時に有効かつ未失効で subject・object・operation・source/target zone・boundary を覆う AuthorizationGrant だけが crossing を認可します。requested scope や policy decision は issued grant ではありません。
      protocol_or_resource_context:
        zh: 证据必须同时绑定 crossing_id、对象摘要、occurred_at、grant_id、授权版本与撤销状态，不能复用另一对象或另一时刻的授权。
        en: Evidence must jointly bind crossing_id, object digest, occurred_at, grant_id, grant revision, and revocation state; authority from another object or time cannot be reused.
        ja: evidence は crossing_id・object digest・occurred_at・grant_id・grant revision・revocation state を同時に束縛し、別object/timeの権限を再利用できません。
    constraints: []
    source_claims:
      - claim-boundary-crossing-design
      - claim-boundary-crossing-design
    distinct_fact_rationale:
      zh: AuthorizationGrant 是已生效授权依据，区别于 requested scope 和 concrete decision。
      en: AuthorizationGrant is the effective authority basis, distinct from requested scope and concrete decision.
      ja: AuthorizationGrant は effective authority basis で requested scope/concrete decision と異なります。
    layout_role: cross-link
    target: concept:AuthorizationGrant
  - id: BoundaryCrossing-evaluated_by-PolicyDecision
    predicate: evaluated_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由策略决定评估
      en: evaluated by policy decision
      ja: policy decision に evaluated
    definitions:
      zh: BoundaryCrossing evaluated_by 指向对该对象、主体、操作、源/目标区和环境上下文作出 allow、deny、redact、quarantine 或 escalate 结果的具体 PolicyDecision；通用策略文档或其他调用的决定不建立。
      en: BoundaryCrossing evaluated_by points to the concrete PolicyDecision producing allow, deny, redact, quarantine, or escalate for this object, subject, operation, source and target zones, and environment context. A generic policy document or another call's decision does not establish it.
      ja: BoundaryCrossing evaluated_by は object・subject・operation・source/target zone・environment context に allow/deny/redact/quarantine/escalate を出した concrete PolicyDecision を指します。generic policy/other call decision は不十分です。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_evaluated_by_of
      labels:
        zh: 反向 evaluated_by
        en: is evaluated_by of
        ja: evaluated_by inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 只有对同一对象、主体、操作、源区、目标区与环境上下文产生允许、拒绝、脱敏、隔离或升级结果的具体 PolicyDecision，才能作为该跨越的评估依据。
        en: Only the concrete PolicyDecision that produced allow, deny, redact, quarantine, or escalate for the same object, subject, operation, source zone, target zone, and environment context is the evaluation basis for this crossing.
        ja: 同じ object・subject・operation・source/target zone・environment context に対して allow/deny/redact/quarantine/escalate を生成した具体的 PolicyDecision だけが crossing の evaluation basis です。
      protocol_or_resource_context:
        zh: decision_id、request_ref、对象摘要、策略版本、occurred_at 与 crossing_id 必须一致；通用策略文档或另一调用的决定不能替代。
        en: decision_id, request_ref, object digest, policy revision, occurred_at, and crossing_id must agree; a generic policy document or another call's decision cannot substitute.
        ja: decision_id・request_ref・object digest・policy revision・occurred_at・crossing_id が一致する必要があり、generic policy document や別callのdecisionは代替できません。
    constraints: []
    source_claims:
      - claim-boundary-crossing-design
      - claim-boundary-crossing-design
    distinct_fact_rationale:
      zh: PolicyDecision 是一次评估结果，和长期 AuthorizationGrant 分开记录。
      en: PolicyDecision is one evaluation outcome and is recorded separately from long-lived AuthorizationGrant.
      ja: PolicyDecision は one evaluation outcome で long-lived AuthorizationGrant と別記録です。
    layout_role: cross-link
    target: concept:PolicyDecision
  - id: BoundaryCrossing-has_source_zone-DataZone
    predicate: has_source_zone
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 具有源数据区
      en: has source data zone
      ja: source data zone を持つ
    definitions:
      zh: BoundaryCrossing 的 has_source_zone 指向对象越过执行点之前实际适用的数据处理区版本；必须由对象分类、时间和处理策略证据决定，不采用计划目标或历史区域。
      en: BoundaryCrossing has_source_zone points to the DataZone revision actually governing the object immediately before the enforcement point. Object classification, time, and handling-policy evidence determine it, not planned destination or a historical zone.
      ja: BoundaryCrossing has_source_zone は enforcement point 直前に object を govern した DataZone revision を指し object classification・time・handling evidence で決め planned destination/history は使いません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_has_source_zone_of
      labels:
        zh: 反向 has_source_zone
        en: is has_source_zone of
        ja: has_source_zone inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 源区必须是在跨越执行点之前实际约束对象的数据处理区版本，由对象分类、有效期与处理策略共同证明；计划目标区或历史成员关系不能替代。
        en: The source zone must be the DataZone revision that actually governed the object immediately before the enforcement point, established jointly by object classification, validity, and handling policy; a planned target or historical membership cannot substitute.
        ja: source zone は enforcement point 直前に object を実際に統制した DataZone revision で、object classification・validity・handling policy により証明します。planned target や historical membership は代替できません。
      protocol_or_resource_context:
        zh: 关联必须固定 crossing_id、对象摘要、occurred_at、source_zone_id、区版本、分类和 handling_policy_ref。
        en: Correlation must fix crossing_id, object digest, occurred_at, source_zone_id, zone revision, classification, and handling_policy_ref.
        ja: correlation は crossing_id・object digest・occurred_at・source_zone_id・zone revision・classification・handling_policy_ref を固定します。
    constraints: []
    source_claims:
      - claim-boundary-crossing-design
      - claim-boundary-crossing-design
    distinct_fact_rationale:
      zh: 源区是跨越前状态，与目标区方向不可互换。
      en: Source zone is the pre-crossing state and is not interchangeable with target direction.
      ja: source zone は pre-crossing state で target direction と交換できません。
    layout_role: cross-link
    target: concept:DataZone
  - id: BoundaryCrossing-has_target_zone-DataZone
    predicate: has_target_zone
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 具有目标数据区
      en: has target data zone
      ja: target data zone を持つ
    definitions:
      zh: BoundaryCrossing 的 has_target_zone 指向对象通过执行点后将实际受其处理要求治理的数据区版本；期望目标若被拒绝或隔离，必须记录真正落入的 quarantine 区而非计划区。
      en: BoundaryCrossing has_target_zone points to the DataZone revision whose handling requirements actually govern the object after the enforcement point. If the intended target is denied or quarantined, record the real quarantine zone rather than the planned zone.
      ja: BoundaryCrossing has_target_zone は PEP 後に object を actual govern する DataZone revision を指します。intended target が deny/quarantine の場合 planned zone でなく actual quarantine zone を記録します。
