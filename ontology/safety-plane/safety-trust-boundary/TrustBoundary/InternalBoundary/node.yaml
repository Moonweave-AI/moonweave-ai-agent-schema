schema: moonweave.ai/ontology-node/v1
id: InternalBoundary
kind: concept
labels:
  zh: 内部信任边界
  en: internal trust boundary
  ja: internal trust boundary
semantics:
  short_definition:
    zh: 相对于受控系统范围位于内部的 TrustBoundary 位置分类。
    en: The internal-position classification of TrustBoundary relative to the controlled-system scope.
    ja: controlled-system scope に対し internal 位置の TrustBoundary 分類。
  definition:
    zh: InternalBoundary 是 TrustBoundary 子类，boundary_position=internal，表示信任变化发生在受控系统内部（如 agent-runtime 到 tool-runtime、model context 到 tool output）。MCP 模型—工具执行面与 Anthropic user/tool 内容进入 model context 都属于 internal boundary，即使涉及外部工具服务器。
    en: InternalBoundary is a TrustBoundary subtype with boundary_position=internal, meaning trust changes occur inside the controlled system (e.g., agent-runtime to tool-runtime, model context to tool output). MCP model-to-tool execution and Anthropic user/tool content entering model context are internal boundaries even when external tool servers are involved.
    ja: InternalBoundary は TrustBoundary subtype で boundary_position=internal。trust 変化が controlled system 内部（agent-runtime→tool-runtime、model context→tool output）。MCP model-tool execution、Anthropic user/tool→model context は external tool server があっても internal boundary。
  why_needed:
    zh: 内外位置是互斥分类维度，与 interaction_surface 正交，避免 network/tool 子类重叠。
    en: Internal/external position is a mutually exclusive dimension orthogonal to interaction_surface, avoiding overlapping network/tool subtypes.
    ja: internal/external position は interaction_surface と直交する互斥次元で network/tool subtype 重叠を避けます。
  includes:
    - zh: 模型与工具执行器、主进程与沙箱、在线上下文与持久存储、内部服务身份之间的边界。
      en: Model and tool executor, host process and sandbox, live context and persistent store, and internal service-identity boundaries.
      ja: model/tool executor・host process/sandbox・live context/persistent store・internal service identity boundary。
  excludes:
    - zh: 不受本组织管理的第三方服务、外部用户和跨组织远程智能体。
      en: Third-party services, external users, and cross-organization remote agents outside organizational management.
      ja: organization management 外の third-party service・external user・cross-organization remote agent。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: boundary-model-tool@N 通常为 InternalBoundary；记录 tool 与 model-context interaction_surface。ExternalBoundary 用于组织外 partner API；二者相对 controlled-system scope 互斥。
    en: boundary-model-tool@N is typically InternalBoundary with tool and model-context interaction_surface. ExternalBoundary is for organization-external partner APIs; mutually exclusive relative to controlled-system scope.
    ja: boundary-model-tool@N は通常 InternalBoundary、tool/model-context surface。ExternalBoundary は組織外 partner API。controlled-system scope で互斥。
  typical_input:
    - description: Model-to-tool internal boundary.
      format: boundary_position=internal; controlled=agent-runtime; counterparty=tool-runtime
      source_claims:
        - claim-internal-boundary-design
  typical_output:
    - description: Internal boundary revision.
      format: '{"boundary_id":"boundary-model-tool","boundary_position":"internal"}'
      source_claims:
        - claim-internal-boundary-design
  reference_implementations:
    - name: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Zero trust zones and policy enforcement points.
    - name: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      description: Server isolation and protected resources.
    - name: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      description: system/developer/user/tool role boundaries.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: InternalBoundary-model-tool
    labels:
      zh: 模型—工具内部边界
      en: Model-to-tool internal boundary
      ja: model-tool internal boundary
    descriptions:
      zh: boundary-model-tool@4 internal：agent-runtime→tool-runtime，surface tool+model-context。
      en: "boundary-model-tool@4 internal: agent-runtime→tool-runtime, surfaces tool+model-context."
      ja: boundary-model-tool@4 internal agent-runtime→tool-runtime。
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/api/messages
      version: model-tool boundary
    field_values:
      boundary_id: boundary-model-tool
      version: "4"
      boundary_position: internal
    related_node_ids:
      - InternalBoundary
      - TrustBoundary
      - BoundaryCrossing
    related_relation_ids: []
    source_claims:
      - claim-internal-boundary-design
  - id: InternalBoundary-mcp-tool-exec
    labels:
      zh: MCP 工具执行内部边界
      en: MCP tool execution internal boundary
      ja: MCP tool execution internal boundary
    descriptions:
      zh: boundary-mcp-exec@1 internal：agent orchestrator 到 MCP tool executor 的信任变化。
      en: "boundary-mcp-exec@1 internal: trust change from agent orchestrator to MCP tool executor."
      ja: boundary-mcp-exec@1 internal orchestrator→MCP executor。
    example_source:
      product: MCP Authorization
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/authorization/
      version: tool execution
    field_values:
      boundary_id: boundary-mcp-exec
      version: "1"
      boundary_position: internal
    related_node_ids:
      - InternalBoundary
      - TrustBoundary
    related_relation_ids: []
    source_claims:
      - claim-internal-boundary-design
  - id: InternalBoundary-rag-context
    labels:
      zh: RAG 上下文内部边界
      en: RAG context internal boundary
      ja: RAG context internal boundary
    descriptions:
      zh: boundary-rag-ingest@2 internal：retrieval pipeline 到 model context assembler。
      en: "boundary-rag-ingest@2 internal: retrieval pipeline to model context assembler."
      ja: boundary-rag-ingest@2 internal retrieval→context assembler。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: RAG trust
    field_values:
      boundary_id: boundary-rag-ingest
      version: "2"
      boundary_position: internal
    related_node_ids:
      - InternalBoundary
      - DataZone
    related_relation_ids: []
    source_claims:
      - claim-internal-boundary-design
  - id: InternalBoundary-boundary-external
    labels:
      zh: 组织外 API 不是 internal
      en: Org-external API is not internal
      ja: 組織外 API は internal ではない
    descriptions:
      zh: boundary-partner-api@1 面向外部 SaaS 应为 ExternalBoundary 而非 InternalBoundary。
      en: boundary-partner-api@1 facing external SaaS should be ExternalBoundary not InternalBoundary.
      ja: boundary-partner-api@1 外部 SaaS 向けは ExternalBoundary。
    example_source:
      product: NIST SP 800-207
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      version: internal versus external
    field_values: {}
    related_node_ids:
      - InternalBoundary
      - ExternalBoundary
    related_relation_ids: []
    source_claims:
      - claim-internal-boundary-design
parent_relation:
  id: InternalBoundary-is_a-TrustBoundary
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: InternalBoundary 是 TrustBoundary 的子类：它继承边界规范身份，并以两侧都在受控管理范围内、但至少一项安全假设发生变化作为互斥种差。
    en: "InternalBoundary is a subtype of TrustBoundary: it inherits boundary-specification identity and adds the mutually exclusive differentia that both sides are within controlled management while at least one security assumption changes."
    ja: InternalBoundary は TrustBoundary subtype で boundary-spec identity を継承し両 side が controlled management 内だが少なくとも一 security assumption が変化する differentia を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: taxonomic inheritance は instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 具有子类
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-internal-boundary-design
  distinct_fact_rationale:
    zh: InternalBoundary 满足 TrustBoundary 的身份并增加互斥位置种差。
    en: InternalBoundary satisfies TrustBoundary identity and adds mutually exclusive position differentia.
    ja: InternalBoundary は TrustBoundary identity を満たし mutually exclusive position differentia を追加します。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
