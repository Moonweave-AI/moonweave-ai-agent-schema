    scenario_id: trust-review-internalboundary-boundary
    descriptions:
      zh: 远程智能体由供应商控制，本系统只能验证接口和合同，不能直接管理其执行环境。
      en: A vendor controls the remote agent; this system can verify interface and contract but cannot directly manage its execution environment.
      ja: vendor が remote agent を control し system は interface/contract は verify できても execution environment を direct manage できません。
