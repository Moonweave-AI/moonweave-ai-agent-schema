    why_valid_or_invalid:
      zh: 管理范围相同但权限与执行控制假设发生变化。
      en: Management scope is shared while authority and execution-control assumptions change.
      ja: management scope は same でも authority/execution control assumption が変化します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-internal-boundary-001
  - id: InternalBoundary-example-boundary-manual-20260716
    kind: boundary
