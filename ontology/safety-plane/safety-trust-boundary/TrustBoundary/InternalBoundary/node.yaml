      en: Both sides are Moonweave-managed, but the sandbox receives restricted filesystem, process, and network capabilities, so boundary position is internal.
      ja: 両 side は Moonweave-managed ですが sandbox は restricted filesystem/process/network capability のため boundary position=internal です。
    field_values:
      boundary_id: code-sandbox-boundary
      version: "4"
