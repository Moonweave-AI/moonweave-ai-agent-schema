schema: moonweave.ai/ontology-node/v1
id: InternalBoundary
kind: concept
status: accepted
labels:
  zh: 内部信任边界
  en: internal trust boundary
  ja: internal trust boundary
semantics:
  short_definition:
    zh: 两侧均受同一系统管理但安全假设不同的信任边界。
    en: A trust boundary whose two sides are managed by the same system but have different security assumptions.
    ja: 両 side が same system 管理内だが security assumption が異なる trust boundary。
  definition:
    zh: 内部信任边界是一种 TrustBoundary，其种差是 boundary_position=internal：两侧都在受控系统管理范围内，但身份、权限、可见性、执行控制、数据处理或问责至少一项不同，仍需策略执行点。它不因使用本地调用而消失，也不因经过网络就变成 ExternalBoundary。
    en: "An InternalBoundary is a TrustBoundary distinguished by boundary_position=internal: both sides remain within controlled-system management, but at least one identity, authority, visibility, execution-control, data-handling, or accountability assumption differs and still requires a policy enforcement point. Local invocation does not remove it, and network transport does not make it ExternalBoundary."
    ja: InternalBoundary は boundary_position=internal の TrustBoundary で両 side は controlled management 内ですが identity・authority・visibility・execution control・data handling・accountability の少なくとも一 assumption が異なり PEP を要します。local call でも消えず network transport でも ExternalBoundary にはなりません。
  why_needed:
    zh: 内部零信任边界防止把同一平台或本地进程误认为天然可信，并与真正外部对侧保持互斥。
    en: An internal zero-trust boundary prevents same-platform or local processes from being treated as inherently trusted while remaining exclusive from a genuinely external counterparty.
    ja: internal zero-trust boundary は same-platform/local process の implicit trust を防ぎ genuine external counterparty と互斥です。
  includes:
    - zh: 模型与工具执行器、主进程与沙箱、在线上下文与持久存储、内部服务身份之间的边界。
      en: Model and tool executor, host process and sandbox, live context and persistent store, and internal service-identity boundaries.
      ja: model/tool executor・host process/sandbox・live context/persistent store・internal service identity boundary。
  excludes:
    - zh: 不受本组织管理的第三方服务、外部用户和跨组织远程智能体。
      en: Third-party services, external users, and cross-organization remote agents outside organizational management.
      ja: organization management 外の third-party service・external user・cross-organization remote agent。
  semantic_kind: specification
  aliases: []
