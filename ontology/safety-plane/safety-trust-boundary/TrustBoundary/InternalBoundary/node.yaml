        - network
      trust_assumption_change: delegated code receives only explicitly restricted capabilities despite common organizational control
      enforcement_point_ref: enforcement/sandbox-policy-set@4
      valid_from: 2026-07-16T00:00:00Z
    related_node_ids:
      - InternalBoundary
