schema: moonweave.ai/ontology-node/v1
id: InternalTrustBoundary
kind: concept
status: accepted
labels:
  zh: 内部信任边界
  en: Internal Trust Boundary
  ja: 内部信頼境界
semantics:
  short_definition:
    zh: 同一组织或受控部署内部、但信任假设不同的两个信任区之间的逻辑过渡。
    en: A logical transition between two TrustZones inside one organization or controlled deployment that have different trust assumptions.
    ja: 一つの組織又は管理下のデプロイメント内部で、異なる信頼仮定を持つ二つの TrustZone 間の論理遷移。
  definition:
    zh: InternalTrustBoundary 是 TrustBoundary 的一种，其来源区和目标区都属于建模的组织或部署，但它们不能因“同在内网”“同属一个账户”或“同一工作负载”而相互继承访问权。它必须在进入目标资源前重新应用策略；它不是内部子网、命名空间或容器隔离本身。
    en: InternalTrustBoundary is a TrustBoundary whose source and target zones both belong to the modeled organization or deployment, yet neither inherits access from the other merely because they are on an internal network, in one account, or run by one workload. Policy must be reapplied before the target resource is used. It is not an internal subnet, namespace, or container isolation by itself.
    ja: InternalTrustBoundary は、送信元と対象の両ゾーンがモデル化された組織又はデプロイメントに属する TrustBoundary である。ただし、内部ネットワーク、同一アカウント、又は同一ワークロードにあるだけで相互にアクセス権を継承しない。対象リソースを使う前にポリシーを再適用しなければならない。内部サブネット、名前空間、又はコンテナ隔離そのものではない。
  why_needed:
    zh: 代理常从低信任执行区、共享服务或一个租户访问更敏感的内部资源；把这类路径标为“内部”不能替代最小权限检查。
    en: Agents often move from lower-trust execution zones, shared services, or one tenant toward more sensitive internal resources; calling that route internal cannot replace least-privilege checks.
    ja: エージェントは低信頼の実行ゾーン、共有サービス、又は一つのテナントから、より機微な内部リソースへ移動することがある。その経路を内部と呼んでも最小権限の検査を置き換えられない。
  includes:
    - zh: 沙箱到内部服务、租户到租户、开发到生产等由同一组织管理但必须分开评估的过渡。
      en: Sandbox-to-service, tenant-to-tenant, and development-to-production transitions managed by one organization but evaluated separately.
      ja: 同一組織が管理するが個別に評価する、サンドボックスからサービス、テナント間、開発から本番への遷移。
    - zh: 组织管理范围的引用，以及在受控运行路径已部署时可选的策略执行点引用。
      en: A reference to the organization's administrative scope and an optional policy-enforcement-point reference when a controlled operating path is deployed.
      ja: 組織の管理範囲への参照と、制御された運用経路が配備された場合の任意の方針実施点参照。
  excludes:
    - zh: 通向合作方、公共互联网或用户控制环境的外部过渡。
      en: A transition to a partner, public internet, or user-controlled environment.
      ja: パートナー、パブリックインターネット、又は利用者管理環境への遷移。
    - zh: 没有不同资源控制或重新判断义务的私有网络连通性。
      en: Private-network connectivity with no different resource controls or re-evaluation obligation.
      ja: 異なるリソース制御又は再評価義務を持たないプライベートネットワーク接続。
  semantic_kind: boundary
  aliases:
    - internal-trust-boundary
    - east-west-trust-boundary
engineering:
  explanation:
    zh: 在策略输入中传入源区、目标区、资源和组织范围。NIST 要求即使请求来自企业拥有的网络也满足相同安全要求，并要求对每个资源访问评估主体与设备状态。若某条部署路径使用 PEP，则它应在进入目标资源前执行本地 PDP 的决定；OPA 可以作为 PEP 调用的 PDP，Envoy 可在上游内部服务前执行授权检查。逻辑 InternalTrustBoundary 的存在不以 PEP 已部署为前提。
    en: Pass source zone, target zone, resource, and administrative scope into policy input. NIST requires requests from enterprise-owned networks to meet the same security requirements and evaluates subject and device state per resource access. If a deployed path uses a PEP, it should enforce a local PDP decision before target-resource entry. OPA can serve as a PDP invoked by a PEP, and Envoy can check authorization before an internal upstream service. The existence of a logical InternalTrustBoundary does not require that a PEP already be deployed.
    ja: 送信元ゾーン、対象ゾーン、リソース、管理範囲を方針入力に渡す。NIST は企業所有ネットワークからの要求にも同じ安全要件を求め、リソースアクセスごとに主体とデバイス状態を評価する。配備済み経路が PEP を使う場合、その PEP は対象リソースに入る前にローカル PDP の決定を実施すべきである。OPA は PEP から呼ばれる PDP として使え、Envoy は内部上流サービスの前で認可を検査できる。論理的な InternalTrustBoundary の存在は、PEP が既に配備されていることを必要としない。
  typical_input:
    - description:
        zh: OPA 对内部资源读取进行决策的输入。
        en: OPA input for a decision about reading an internal resource.
        ja: 内部リソース読取りの判断に対する OPA 入力。
      format: '{"input":{"source_zone":"sandbox","target_zone":"customer-data","administrative_scope":"org:moonweave","resource":"case/17","action":"read"}}'
      source_claims:
        - claim-opa-pdp
  typical_output:
    - description:
        zh: 已部署 PEP 可执行的 OPA 决策结果。
        en: OPA decision result that a deployed PEP can enforce.
        ja: 配備済み PEP が実施できる OPA 決定結果。
      format: '{"decision_id":"dec-021","result":false}'
      source_claims:
        - claim-opa-pdp
  reference_implementations:
    - name: Open Policy Agent deployment model
      url: https://www.openpolicyagent.org/docs/deploy
      description: Describes OPA as a policy decision point making decisions for policy enforcement points.
    - name: Envoy external authorization filter
      url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/ext_authz_filter.html
      description: Invokes an authorization service before forwarding a request to an upstream service.
structure:
  identity_keys:
    - trust_boundary_id
  fields:
    - id: trust_boundary_id
      labels:
        zh: 信任边界标识
        en: Trust boundary ID
        ja: 信頼境界 ID
      definitions:
        zh: 继承自 TrustBoundary 的稳定标识；本子类用行政范围进一步限定它是一条内部过渡。
        en: Stable identifier inherited from TrustBoundary; this subtype further constrains it to an internal transition through administrative scope.
        ja: TrustBoundary から継承する安定識別子。このサブタイプは管理範囲によって内部遷移にさらに限定する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: sandbox-to-customer-data
      allowed_values: []
      source_claims:
        - claim-nist-no-network-trust
    - id: source_zone_ref
      labels:
        zh: 来源信任区引用
        en: Source trust-zone reference
        ja: 送信元トラストゾーン参照
      definitions:
        zh: 请求跨越前所在的内部 TrustZone，而非调用者的身份或 IP 地址。
        en: Internal TrustZone occupied before the transition, rather than the caller's identity or IP address.
        ja: 遷移前に要求がある内部 TrustZone。呼出し元の ID や IP アドレスではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sandbox
      allowed_values: []
      source_claims:
        - claim-nist-no-network-trust
    - id: target_zone_ref
      labels:
        zh: 目标信任区引用
        en: Target trust-zone reference
        ja: 対象トラストゾーン参照
      definitions:
        zh: 请求进入后需要应用不同资源控制的内部 TrustZone。
        en: Internal TrustZone whose different resource controls apply after entry.
        ja: 入域後に異なるリソース制御が適用される内部 TrustZone。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: customer-data
      allowed_values: []
      source_claims:
        - claim-nist-per-resource
    - id: administrative_scope_ref
      labels:
        zh: 管理范围引用
        en: Administrative-scope reference
        ja: 管理範囲参照
      definitions:
        zh: 说明来源区和目标区均由哪个组织或部署管理的稳定引用。
        en: Stable reference stating which organization or deployment manages both source and target zones.
        ja: 送信元・対象ゾーンの両方を管理する組織又はデプロイメントを示す安定参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: org:moonweave
      allowed_values: []
      source_claims:
        - claim-nist-no-network-trust
    - id: enforcement_point_ref
      labels:
        zh: 策略执行点引用
        en: Policy-enforcement-point reference
        ja: ポリシー実施点参照
      definitions:
        zh: 可选的网关、代理或 PEP 引用。若其关联到已部署运行路径，则在进入目标区前实施策略结果；它不是该边界，也不是边界类别成立的证据。
        en: Optional reference to a gateway, proxy, or PEP. When associated with a deployed operating path, it enforces the policy result before target-zone entry. It is neither the boundary nor evidence that the boundary category exists.
        ja: 任意のゲートウェイ、プロキシ、又は PEP への参照。配備済み運用経路と関連付けられる場合、対象ゾーンへ入る前に方針結果を実施する。境界そのものでも、境界カテゴリが存在する証拠でもない。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: envoy-customer-ext-authz
      allowed_values: []
      source_claims:
        - claim-opa-pdp
  constraints:
    - id: internal-trust-boundary-distinct-zones
      severity: error
      expression_language: plain
      expression: source_zone_ref and target_zone_ref must be distinct zones within administrative_scope_ref.
      explanation:
        zh: 同一组织管理并不取消分区；否则这只是区内调用，不能称为内部信任边界。
        en: One administrative owner does not erase segmentation; otherwise this is an in-zone call, not an internal trust boundary.
        ja: 一つの管理者であっても分離は消えない。そうでなければこれはゾーン内呼出しであり、内部信頼境界ではない。
      source_claims:
        - claim-nist-no-network-trust
    - id: internal-trust-boundary-enforcement-when-specified
      severity: error
      expression_language: plain
      expression: If enforcement_point_ref is present, it must identify a policy-enforcement component that receives a policy decision before it forwards a permitted request across this boundary to the target resource; its absence does not change the internal boundary classification.
      explanation:
        zh: 内部网络位置不是授权。PEP 是受控路径的执行组件，而不是 InternalTrustBoundary 类型的定义。
        en: Internal network location is not authorization. A PEP is an enforcement component of a controlled path, not the definition of the InternalTrustBoundary type.
        ja: 内部ネットワーク位置は認可ではない。PEP は制御された経路の実施コンポーネントであり、InternalTrustBoundary 型の定義ではない。
      source_claims:
        - claim-nist-per-resource
        - claim-opa-pdp
  required_relations: []
examples:
  - id: internal-trust-boundary-trustllm
    labels:
      zh: 内部信任边界 - TrustLLM 六维可信度
      en: Internal Trust Boundary - TrustLLM six-dimension trust
      ja: 内部信頼境界 - TrustLLM 6次元信頼性
    descriptions: {zh: "内部信任边界(InternalTrustBoundary) [InternalTrustBoundary]: 同一组织或受控部署内部、但信任假设不同的两个信任区之间的逻辑过渡。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref.", en: "Internal Trust Boundary (InternalTrustBoundary) [InternalTrustBoundary]: A logical transition between two TrustZones inside one organization or controlled deployment that have different trust assumptions.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include source_zone_ref, trust_boundary_id, target_zone_ref.", ja: "内部信頼境界(InternalTrustBoundary) [InternalTrustBoundary]: 一つの組織又は管理下のデプロイメント内部で、異なる信頼仮定を持つ二つの TrustZone 間の論理遷移。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref."}
    field_values:
      administrative_scope_ref: "org:moonweave"
      enforcement_point_ref: envoy-customer-ext-authz
      source_zone_ref: sandbox
      target_zone_ref: customer-data
      trust_boundary_id: sandbox-to-customer-data
    related_node_ids:
      - InternalTrustBoundary
    related_relation_ids: []
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-nist-no-network-trust
  - id: internal-trust-boundary-anthropic_cai
    labels:
      zh: 内部信任边界 - Anthropic Constitutional AI
      en: Internal Trust Boundary - Anthropic Constitutional AI
      ja: 内部信頼境界 - Anthropic Constitutional AI
    descriptions: {zh: "内部信任边界(InternalTrustBoundary) [InternalTrustBoundary]: 同一组织或受控部署内部、但信任假设不同的两个信任区之间的逻辑过渡。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref.", en: "Internal Trust Boundary (InternalTrustBoundary) [InternalTrustBoundary]: A logical transition between two TrustZones inside one organization or controlled deployment that have different trust assumptions.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include source_zone_ref, trust_boundary_id, target_zone_ref.", ja: "内部信頼境界(InternalTrustBoundary) [InternalTrustBoundary]: 一つの組織又は管理下のデプロイメント内部で、異なる信頼仮定を持つ二つの TrustZone 間の論理遷移。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref."}
    field_values:
      administrative_scope_ref: "org:moonweave"
      enforcement_point_ref: envoy-customer-ext-authz
      source_zone_ref: sandbox
      target_zone_ref: customer-data
      trust_boundary_id: sandbox-to-customer-data
    related_node_ids:
      - InternalTrustBoundary
    related_relation_ids: []
    example_source: Anthropic Constitutional AI
    source_claims:
      - claim-nist-no-network-trust
  - id: internal-trust-boundary-envoy_ext_auth
    labels:
      zh: 内部信任边界 - Envoy ext_authz PEP
      en: Internal Trust Boundary - Envoy ext_authz PEP
      ja: 内部信頼境界 - Envoy ext_authz PEP
    descriptions: {zh: "内部信任边界(InternalTrustBoundary) [InternalTrustBoundary]: 同一组织或受控部署内部、但信任假设不同的两个信任区之间的逻辑过渡。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref.", en: "Internal Trust Boundary (InternalTrustBoundary) [InternalTrustBoundary]: A logical transition between two TrustZones inside one organization or controlled deployment that have different trust assumptions.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include source_zone_ref, trust_boundary_id, target_zone_ref.", ja: "内部信頼境界(InternalTrustBoundary) [InternalTrustBoundary]: 一つの組織又は管理下のデプロイメント内部で、異なる信頼仮定を持つ二つの TrustZone 間の論理遷移。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref."}
    field_values:
      administrative_scope_ref: "org:moonweave"
      enforcement_point_ref: envoy-customer-ext-authz
      source_zone_ref: sandbox
      target_zone_ref: customer-data
      trust_boundary_id: sandbox-to-customer-data
    related_node_ids:
      - InternalTrustBoundary
    related_relation_ids: []
    example_source: Envoy ext_authz
    source_claims:
      - claim-nist-no-network-trust
  - id: internal-trust-boundary-cedar
    labels:
      zh: 内部信任边界 - Cedar 授权评估
      en: Internal Trust Boundary - Cedar authorization evaluation
      ja: 内部信頼境界 - Cedar 認可評価
    descriptions: {zh: "内部信任边界(InternalTrustBoundary) [InternalTrustBoundary]: 同一组织或受控部署内部、但信任假设不同的两个信任区之间的逻辑过渡。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref.", en: "Internal Trust Boundary (InternalTrustBoundary) [InternalTrustBoundary]: A logical transition between two TrustZones inside one organization or controlled deployment that have different trust assumptions.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include source_zone_ref, trust_boundary_id, target_zone_ref.", ja: "内部信頼境界(InternalTrustBoundary) [InternalTrustBoundary]: 一つの組織又は管理下のデプロイメント内部で、異なる信頼仮定を持つ二つの TrustZone 間の論理遷移。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: source_zone_ref, trust_boundary_id, target_zone_ref."}
    field_values:
      administrative_scope_ref: "org:moonweave"
      enforcement_point_ref: envoy-customer-ext-authz
      source_zone_ref: sandbox
      target_zone_ref: customer-data
      trust_boundary_id: sandbox-to-customer-data
    related_node_ids:
      - InternalTrustBoundary
    related_relation_ids: []
    example_source: Amazon Cedar
    source_claims:
      - claim-nist-no-network-trust
parent_relation:
  id: InternalTrustBoundary-is_a-TrustBoundary
  predicate: is_a
  target: TrustBoundary
  relation_kind: hierarchy
  labels:
    zh: 是一种信任边界
    en: is a trust boundary
    ja: 信頼境界の一種である
  definitions:
    zh: InternalTrustBoundary 保留 TrustBoundary 的重评估义务，并将两个区的管理范围限定为同一组织或部署。
    en: InternalTrustBoundary retains TrustBoundary's re-evaluation obligation while limiting both zones to one organization or deployment.
    ja: InternalTrustBoundary は TrustBoundary の再評価義務を保持し、両ゾーンを一つの組織又はデプロイメントに限定する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  conditions:
    - id: internal-trust-boundary-parent-semantics
      severity: error
      expression_language: plain
      expression: The child must satisfy TrustBoundary semantics and add an administrative scope shared by both zones.
      explanation:
        zh: 该子类增加的是组织归属限制，而不是减弱或绕开父类的重评估义务。
        en: The subtype adds a shared administrative scope; it does not weaken or bypass the parent's re-evaluation obligation.
        ja: このサブタイプは共有管理範囲を追加する。親の再評価義務を弱めたり回避したりしない。
      source_claims:
        - claim-nist-no-network-trust
  temporal_scope: timeless
  constraints: []
  source_claims:
    - claim-nist-no-network-trust
relations: []
sources:
  - id: nist-zero-trust
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf
    source_type: official-standard
    relevance: Requires the same security requirements for requests from enterprise-owned networks and per-resource policy evaluation.
  - id: opa-deployment
    title: Open Policy Agent deployment documentation
    url: https://www.openpolicyagent.org/docs/deploy
    source_type: official-open-source-documentation
    relevance: Describes OPA as a policy decision point used by policy enforcement points.
  - id: envoy-ext-authz
    title: Envoy external authorization filter
    url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/ext_authz_filter.html
    source_type: official-open-source-documentation
    relevance: Provides a concrete pre-upstream authorization enforcement interface.
source_claims:
  - id: claim-nist-no-network-trust
    source: nist-zero-trust
    supports: Network location alone does not imply trust, and requests from enterprise-owned network infrastructure must meet the same security requirements as other requests.
    locator: Section 2.1, zero trust tenet 2
    evidence_kind: standard
    confidence: high
  - id: claim-nist-per-resource
    source: nist-zero-trust
    supports: Access to individual enterprise resources is granted per session after evaluating the requester, resource, and dynamic policy inputs with least privilege.
    locator: Section 2.1, zero trust tenets 3 and 4
    evidence_kind: standard
    confidence: high
  - id: claim-opa-pdp
    source: opa-deployment
    supports: OPA is a policy decision point that makes decisions on behalf of applications acting as policy enforcement points.
    locator: How to Deploy OPA, introduction
    evidence_kind: official-documentation
    confidence: high
  - id: claim-envoy-ext-authz
    source: envoy-ext-authz
    supports: Envoy calls an external HTTP or gRPC authorization service to determine whether an incoming request is authorized before it reaches an upstream service.
    locator: External Authorization overview
    evidence_kind: official-api
    confidence: high
