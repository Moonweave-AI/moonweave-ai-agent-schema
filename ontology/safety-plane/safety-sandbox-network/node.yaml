schema: moonweave.ai/ontology-node/v1
id: safety-sandbox-network
kind: module
status: accepted
labels:
  zh: 执行环境隔离
  en: Execution-environment isolation
  ja: 実行環境の隔離
semantics:
  short_definition:
    zh: 执行环境隔离描述可复用的文件系统和进程隔离规范、实际加载这些规范的具体沙箱，以及针对该沙箱且有证据支持的逃逸风险。它回答本地执行能看见和操作什么，不回答远端网络能访问什么，也不把容器、进程句柄或授权决定复制进隔离层级。
    en: Execution-environment isolation describes reusable filesystem and process isolation specifications, concrete sandboxes that actually load them, and evidence-backed escape risks tied to those sandboxes. It answers what local execution can see and operate, not what remote network destinations are reachable, and it does not copy containers, process handles, or authorization decisions into the isolation hierarchy.
    ja: 実行環境の隔離は、再利用可能なファイルシステム・プロセス隔離仕様、それらを実際に読み込んだ具体的なサンドボックス、そのサンドボックスに結び付く証拠付き逃避リスクを記述します。ローカル実行が何を見て操作できるかを扱い、遠隔ネットワークの到達性は扱わず、コンテナ、プロセスハンドル、認可判断を隔離階層へ複製しません。
  definition:
    zh: 执行环境隔离描述可复用的文件系统和进程隔离规范、实际加载这些规范的具体沙箱，以及针对该沙箱且有证据支持的逃逸风险。它回答本地执行能看见和操作什么，不回答远端网络能访问什么，也不把容器、进程句柄或授权决定复制进隔离层级。
    en: Execution-environment isolation describes reusable filesystem and process isolation specifications, concrete sandboxes that actually load them, and evidence-backed escape risks tied to those sandboxes. It answers what local execution can see and operate, not what remote network destinations are reachable, and it does not copy containers, process handles, or authorization decisions into the isolation hierarchy.
    ja: 実行環境の隔離は、再利用可能なファイルシステム・プロセス隔離仕様、それらを実際に読み込んだ具体的なサンドボックス、そのサンドボックスに結び付く証拠付き逃避リスクを記述します。ローカル実行が何を見て操作できるかを扱い、遠隔ネットワークの到達性は扱わず、コンテナ、プロセスハンドル、認可判断を隔離階層へ複製しません。
  why_needed:
    zh: 让每次本地执行都能核实实际加载了哪版隔离规范、哪些路径和进程能力可见，以及逃逸判断基于什么实例证据。
    en: Make every local execution verifiable as to which isolation revision was loaded, which paths and process capabilities were visible, and what instance evidence supports any escape judgment.
    ja: 各ローカル実行について、どの隔離仕様版を読み込み、どの経路とプロセス能力が見え、逃避判断がどの実例証拠に基づくかを検証できるようにします。
  includes:
    - zh: 可版本化的 IsolationSpecification，以及描述路径、挂载、读写权限、进程创建、系统调用或能力限制的 FilesystemPolicy 与 ProcessPolicy。
      en: Versioned IsolationSpecifications plus FilesystemPolicy and ProcessPolicy constraints over paths, mounts, read/write rights, process creation, system calls, or capabilities.
      ja: 版管理された IsolationSpecification と、経路、マウント、読書権限、プロセス生成、システムコール、能力を制約する FilesystemPolicy／ProcessPolicy を含みます。
    - zh: 具体 Sandbox 身份、它实际加载并强制的规范版本，以及绑定该实例、逃逸向量和证据的 SandboxEscapeRisk。
      en: Concrete Sandbox identity, the specification revisions actually loaded and enforced, and SandboxEscapeRisk tied to that instance, escape vector, and evidence.
      ja: 具体的な Sandbox の同一性、実際に読み込んで強制した仕様版、その実例・逃避経路・証拠に結び付く SandboxEscapeRisk を含みます。
  excludes:
    - zh: NetworkCall、ProxyRoute、NetworkPolicy 和远端目的地归网络通信控制；“允许联网”与“本地文件/进程隔离”是可并存但不同的控制。
      en: NetworkCall, ProxyRoute, NetworkPolicy, and remote destinations belong to network communication control; network permission and local filesystem/process isolation are distinct controls that may coexist.
      ja: NetworkCall、ProxyRoute、NetworkPolicy、遠隔宛先はネットワーク通信制御に属します。ネットワーク許可とローカルのファイル／プロセス隔離は、併存し得る別の制御です。
    - zh: Container、RuntimeEnvironment 和 ProcessHandle 是运行时实体；AuthorizationGrant 与 PolicyDecision 是授权事实；一次访问拒绝是执行或审计事件，而不是隔离规范类型。
      en: Container, RuntimeEnvironment, and ProcessHandle are Runtime entities; AuthorizationGrant and PolicyDecision are authorization facts; one access denial is an execution or audit event, not an isolation-specification type.
      ja: Container、RuntimeEnvironment、ProcessHandle は実行時の実体、AuthorizationGrant と PolicyDecision は認可事実、一回のアクセス拒否は実行・監査イベントであり隔離仕様型ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把隔离规范、实际沙箱、有效本地边界和逃逸证据连接成可审计闭环。
  en: Connect isolation specifications, concrete sandboxes, effective local boundaries, and escape evidence into an auditable loop.
  ja: 隔離仕様、具体的サンドボックス、有効なローカル境界、逃避証拠を監査可能な閉路として接続します。
