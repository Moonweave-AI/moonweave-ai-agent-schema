schema: moonweave.ai/ontology-node/v1
id: safety-sandbox-network
kind: module
status: review
labels:
  zh: 执行环境隔离
  en: Execution-environment isolation
  ja: 実行環境の隔離
semantics:
  short_definition:
    zh: 执行环境隔离描述可复用的文件系统和进程隔离规范、实际加载这些规范的具体沙箱，以及针对该沙箱且有证据支持的逃逸风险。它回答本地执行能看见和操作什么，不回答远端网络能访问什么，也不把容器、进程句柄或授权决定复制进隔离层级。
    en: Execution-environment isolation describes reusable filesystem and process isolation specifications, concrete sandboxes that actually load them, and evidence-backed escape risks tied to those sandboxes. It answers what local execution can see and operate, not what remote network destinations are reachable, and it does not copy containers, process handles, or authorization decisions into the isolation hierarchy.
    ja: 実行環境の隔離は、再利用可能なファイルシステム・プロセス隔離仕様、それらを実際に読み込んだ具体的なサンドボックス、そのサンドボックスに結び付く証拠付き逃避リスクを記述します。ローカル実行が何を見て操作できるかを扱い、遠隔ネットワークの到達性は扱わず、コンテナ、プロセスハンドル、認可判断を隔離階層へ複製しません。
  definition:
    zh: 执行环境隔离描述可复用的文件系统和进程隔离规范、实际加载这些规范的具体沙箱，以及针对该沙箱且有证据支持的逃逸风险。它回答本地执行能看见和操作什么，不回答远端网络能访问什么，也不把容器、进程句柄或授权决定复制进隔离层级。
    en: Execution-environment isolation describes reusable filesystem and process isolation specifications, concrete sandboxes that actually load them, and evidence-backed escape risks tied to those sandboxes. It answers what local execution can see and operate, not what remote network destinations are reachable, and it does not copy containers, process handles, or authorization decisions into the isolation hierarchy.
    ja: 実行環境の隔離は、再利用可能なファイルシステム・プロセス隔離仕様、それらを実際に読み込んだ具体的なサンドボックス、そのサンドボックスに結び付く証拠付き逃避リスクを記述します。ローカル実行が何を見て操作できるかを扱い、遠隔ネットワークの到達性は扱わず、コンテナ、プロセスハンドル、認可判断を隔離階層へ複製しません。
  why_needed:
    zh: 让每次本地执行都能核实实际加载了哪版隔离规范、哪些路径和进程能力可见，以及逃逸判断基于什么实例证据。
    en: Make every local execution verifiable as to which isolation revision was loaded, which paths and process capabilities were visible, and what instance evidence supports any escape judgment.
    ja: 各ローカル実行について、どの隔離仕様版を読み込み、どの経路とプロセス能力が見え、逃避判断がどの実例証拠に基づくかを検証できるようにします。
  includes:
    - zh: 可版本化的 IsolationSpecification，以及描述路径、挂载、读写权限、进程创建、系统调用或能力限制的 FilesystemPolicy 与 ProcessPolicy。
      en: Versioned IsolationSpecifications plus FilesystemPolicy and ProcessPolicy constraints over paths, mounts, read/write rights, process creation, system calls, or capabilities.
      ja: 版管理された IsolationSpecification と、経路、マウント、読書権限、プロセス生成、システムコール、能力を制約する FilesystemPolicy／ProcessPolicy を含みます。
    - zh: 具体 Sandbox 身份、它实际加载并强制的规范版本，以及绑定该实例、逃逸向量和证据的 SandboxEscapeRisk。
      en: Concrete Sandbox identity, the specification revisions actually loaded and enforced, and SandboxEscapeRisk tied to that instance, escape vector, and evidence.
      ja: 具体的な Sandbox の同一性、実際に読み込んで強制した仕様版、その実例・逃避経路・証拠に結び付く SandboxEscapeRisk を含みます。
  excludes:
    - zh: NetworkCall、ProxyRoute、NetworkPolicy 和远端目的地归网络通信控制；“允许联网”与“本地文件/进程隔离”是可并存但不同的控制。
      en: NetworkCall, ProxyRoute, NetworkPolicy, and remote destinations belong to network communication control; network permission and local filesystem/process isolation are distinct controls that may coexist.
      ja: NetworkCall、ProxyRoute、NetworkPolicy、遠隔宛先はネットワーク通信制御に属します。ネットワーク許可とローカルのファイル／プロセス隔離は、併存し得る別の制御です。
    - zh: Container、RuntimeEnvironment 和 ProcessHandle 是运行时实体；AuthorizationGrant 与 PolicyDecision 是授权事实；一次访问拒绝是执行或审计事件，而不是隔离规范类型。
      en: Container, RuntimeEnvironment, and ProcessHandle are Runtime entities; AuthorizationGrant and PolicyDecision are authorization facts; one access denial is an execution or audit event, not an isolation-specification type.
      ja: Container、RuntimeEnvironment、ProcessHandle は実行時の実体、AuthorizationGrant と PolicyDecision は認可事実、一回のアクセス拒否は実行・監査イベントであり隔離仕様型ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把隔离规范、实际沙箱、有效本地边界和逃逸证据连接成可审计闭环。
  en: Connect isolation specifications, concrete sandboxes, effective local boundaries, and escape evidence into an auditable loop.
  ja: 隔離仕様、具体的サンドボックス、有効なローカル境界、逃避証拠を監査可能な閉路として接続します。
structure: null
examples:
  - id: safety-sandbox-network-cq-resource-visibility-v3-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 计算有效路径权限
      en: Compute effective path permissions
      ja: 有効な経路権限の算出
    scenario_id: sandbox-review-safety-sandbox-network-cq-resource-visibility-v3-positive
    descriptions:
      zh: sandbox-run-884 加载 fs-code@4；查询 /workspace/repo/app.py 得到 read=true、write=false、execute=false，/secrets/token 三项均 false。
      en: sandbox-run-884 loads fs-code@4; querying /workspace/repo/app.py yields read=true, write=false, execute=false, while all three are false for /secrets/token.
      ja: sandbox-run-884 は fs-code@4 を読み込み、/workspace/repo/app.py には read=true、write=false、execute=false を、/secrets/token には三操作すべて false を返します。
    field_values:
      sandbox_id: sandbox-run-884
      isolation_spec_ref: fs-code@4
      normalized_path: /workspace/repo/app.py
      matched_mount_target: /workspace/repo
      matched_path_rule: repo-source-readonly@4
      mount_mode: ro
      read_allowed: true
      write_allowed: false
      execute_allowed: false
      denied_control_path: /secrets/token
      denied_control_path_rights:
        read: false
        write: false
        execute: false
      enforcement_layers:
        - mount-readonly
        - landlock-fs-code-v4
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
    related_relation_ids:
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 返回规范化路径、匹配规则、挂载模式和最终读写执行布尔值。
      en: Return normalized path, matched rule, mount mode, and final read/write/execute booleans.
      ja: 正規化済み経路、適合した mount と規則、読取専用モード、最終的な read/write/execute の真偽値を返します。
    why_valid_or_invalid:
      zh: 查询由实际加载关系和文件系统字段完整回答。
      en: The loaded-specification relation and filesystem fields fully answer the query.
      ja: 実際に読み込まれた fs-code@4 と強制レイヤーの積集合を使うため、宿主権限や計画設定だけでは得られない有効権限を再現できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-sandbox-network-002
      - claim-safety-sandbox-network-003
  - id: safety-sandbox-network-cq-resource-visibility-v3-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只看宿主权限的错误判定
      en: Host-permission-only error
      ja: 宿主権限だけに基づく誤判定
    scenario_id: sandbox-review-safety-sandbox-network-cq-resource-visibility-v3-boundary
    descriptions:
      zh: 宿主用户可写 /repo，但查询忽略 sandbox 的只读 mount 与 Landlock 层，错误返回 write=true。
      en: The host user can write /repo, but the query ignores the sandbox read-only mount and Landlock layer and incorrectly returns write=true.
      ja: 宿主ユーザーは /repo に書込可能ですが、sandbox の読取専用 mount と Landlock レイヤーを無視して write=true と誤判定しています。
    field_values:
      sandbox_id: sandbox-run-884
      queried_path: /workspace/repo/app.py
      host_path: /repo/app.py
      host_dac_write_allowed: true
      sandbox_mount_mode: ro
      landlock_rule_ref: repo-source-readonly@4
      landlock_write_allowed: false
      incorrect_reported_write_allowed: true
      effective_write_allowed: false
      failed_layer_intersection: true
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
    related_relation_ids:
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 拒绝该结果，并按所有强制层的交集返回 write=false。
      en: Reject the result and return write=false from the intersection of all enforced layers.
      ja: 宿主 DAC だけの結果を拒否し、読取専用 mount と Landlock を含む全強制レイヤーの積集合から write=false を返します。
    why_valid_or_invalid:
      zh: 宿主 DAC 权限不能覆盖沙箱中额外的只读与 Landlock 约束。
      en: Host DAC permission cannot override additional read-only and Landlock restrictions.
      ja: Landlock では全ポリシーレイヤーと他のアクセス制御が同時に許可する必要があり、宿主 DAC の許可は sandbox の追加制約を上書きできません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-sandbox-network-003
      - claim-safety-sandbox-network-002
  - id: safety-sandbox-network-cq-mount-resolution-v3-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 解析只读 bind mount
      en: Resolve read-only bind mount
      ja: 読取専用 bind mount の解決
    scenario_id: sandbox-review-safety-sandbox-network-cq-mount-resolution-v3-positive
    descriptions:
      zh: 对 /workspace/repo/src/a.ts 最长匹配到 target=/workspace/repo、source=/repo、mode=ro；去除 target 前缀后规范宿主路径为 /repo/src/a.ts。
      en: For /workspace/repo/src/a.ts, longest match selects target=/workspace/repo, source=/repo, mode=ro; removing the target prefix resolves normalized host path /repo/src/a.ts.
      ja: /workspace/repo/src/a.ts は最長一致により target=/workspace/repo、source=/repo、mode=ro を選び、target 接頭辞を除いて宿主経路 /repo/src/a.ts へ解決します。
    field_values:
      sandbox_id: sandbox-run-884
      filesystem_policy_ref: fs-code@4
      requested_sandbox_path: /workspace/repo/src/a.ts
      normalized_sandbox_path: /workspace/repo/src/a.ts
      matched_mount_target: /workspace/repo
      matched_mount_source: /repo
      mount_mode: ro
      relative_path_after_match: src/a.ts
      resolved_host_path: /repo/src/a.ts
      write_allowed: false
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
    related_relation_ids:
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 返回唯一宿主路径与只读模式，并拒绝写入。
      en: Return one host path with read-only mode and deny writing.
      ja: 一意な宿主経路 /repo/src/a.ts と mode=ro を返し、書込みを拒否します。
    why_valid_or_invalid:
      zh: 挂载映射、路径规范化和最长匹配均由具名策略版本给出。
      en: Mount mapping, path normalization, and longest match come from the named policy revision.
      ja: 正規化、最長 target 一致、相対接尾辞の再結合が fs-code@4 の同じ mount mapping から追跡できるため、文字列の偶然一致ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-sandbox-network-002
      - claim-safety-sandbox-network-003
  - id: safety-sandbox-network-cq-mount-resolution-v3-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 路径遍历越出挂载根
      en: Traversal escapes mount root
      ja: 経路 traversal による mount root 逸脱
    scenario_id: sandbox-review-safety-sandbox-network-cq-mount-resolution-v3-boundary
    descriptions:
      zh: 请求 /workspace/repo/../../secrets/token 若先字符串拼接会解析到宿主 /secrets/token，但策略要求先在沙箱空间规范化并阻止越根。
      en: Request /workspace/repo/../../secrets/token would string-concatenate to host /secrets/token, but policy requires sandbox-space normalization and blocks root escape.
      ja: /workspace/repo/../../secrets/token を単純連結すると宿主 /secrets/token になりますが、ポリシーは sandbox 名前空間で先に正規化し、mount root からの逸脱を拒否します。
    field_values:
      filesystem_policy_ref: fs-code@4
      requested_sandbox_path: /workspace/repo/../../secrets/token
      matched_mount_target_before_normalization: /workspace/repo
      unsafe_string_concatenation_result: /secrets/token
      normalized_path_within_mount: null
      path_escape_detected: true
      resolved_host_path: null
      decision: deny-path-traversal
    related_node_ids:
      - FilesystemPolicy
    related_relation_ids: []
    expected_result:
      zh: 返回路径越界拒绝，不产生宿主目标。
      en: Return a traversal denial and no host target.
      ja: deny-path-traversal を返し、宿主側の解決先を生成しません。
    why_valid_or_invalid:
      zh: 路径规范化必须先于映射，且结果必须留在匹配目标根内。
      en: Normalization precedes mapping and the result must remain under the matched target root.
      ja: mapping 前の正規化結果が適合 target root 内に残ることを検証しなければ、相対成分が隔離外の宿主経路を参照できてしまいます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-sandbox-network-003
  - id: safety-sandbox-network-cq-escape-risk-v3-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 逃逸风险与缓解复核
      en: Escape risk and mitigation re-check
      ja: 逃逸リスクと緩和後の再検証
    scenario_id: sandbox-review-safety-sandbox-network-cq-escape-risk-v3-positive
    descriptions:
      zh: escape-risk-884-1 由可写宿主挂载与 CAP_SYS_ADMIN 证据支持；修复为 ro mount 并删除 capability 后，独立复核记录所有越界写入均被拒绝。
      en: escape-risk-884-1 is supported by writable host mount and CAP_SYS_ADMIN evidence; after changing to ro and dropping the capability, an independent re-check records all crossing writes denied.
      ja: escape-risk-884-1 は書込可能な宿主 mount と CAP_SYS_ADMIN の証拠に基づきます。mount を ro に変更し capability を削除した後、独立再検証が境界外への全書込み拒否を記録します。
    field_values:
      escape_risk_id: escape-risk-884-1
      sandbox_id: sandbox-run-884
      pre_change_isolation_spec_ref: process-code@4+fs-code@4
      escape_vector: writable-host-bind-mount-with-cap-sys-admin
      pre_change_mount_mode: rw
      pre_change_capabilities:
        - CAP_SYS_ADMIN
      severity: critical
      post_change_isolation_spec_ref: process-code@5+fs-code@5
      post_change_mount_mode: ro
      post_change_capabilities: []
      mitigation_verification_ref: sandbox-recheck-884-2
      boundary_write_attempts: 12
      boundary_write_denials: 12
      mitigation_effective: true
    related_node_ids:
      - SandboxEscapeRisk
      - Sandbox
    related_relation_ids:
      - SandboxEscapeRisk-threatens-Sandbox
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 先返回具证据的风险，再仅凭通过的修复后复核标记缓解有效。
      en: Return the evidenced risk and mark mitigation effective only from a passing post-change re-check.
      ja: 変更前の具体的なリスク証拠を返し、変更後の独立再検証が 12 件すべてを拒否した場合に限り mitigation_effective=true とします。
    why_valid_or_invalid:
      zh: 风险与缓解分别绑定修改前和修改后的实际配置证据。
      en: Risk and mitigation bind actual pre-change and post-change configuration evidence separately.
      ja: リスク判定と緩和判定を、それぞれ変更前と変更後に実際に読み込まれた仕様・実行証拠へ別々に結び付けているため、設定ファイルの差分だけで完了扱いしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-sandbox-network-001
      - claim-safety-sandbox-network-002
  - id: safety-sandbox-network-cq-escape-risk-v3-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只有配置承诺的伪缓解
      en: Configuration-only pseudo-mitigation
      ja: 設定変更だけを根拠にした擬似緩和
    scenario_id: sandbox-review-safety-sandbox-network-cq-escape-risk-v3-boundary
    descriptions:
      zh: 策略文件已改为 ro，但目标 sandbox 尚未重启且审计仍显示旧 rw mount；系统却把风险标为已缓解。
      en: The policy file changed to ro, but the target sandbox has not restarted and audit still shows the old rw mount; the system nevertheless marks risk mitigated.
      ja: ポリシーファイルは ro に変更済みですが、対象 sandbox は再起動されず、監査証拠も旧 rw mount を示しています。それにもかかわらずリスクを mitigated と記録しています。
    field_values:
      escape_risk_id: escape-risk-884-1
      sandbox_id: sandbox-run-884
      declared_policy_ref: fs-code@5
      declared_mount_mode: ro
      sandbox_restart_completed: false
      loaded_policy_ref: fs-code@4
      observed_mount_mode: rw
      mitigation_verification_ref: null
      incorrect_recorded_mitigation_state: mitigated
      required_mitigation_state: open
    related_node_ids:
      - SandboxEscapeRisk
      - Sandbox
    related_relation_ids:
      - SandboxEscapeRisk-threatens-Sandbox
    expected_result:
      zh: 拒绝缓解结论，风险保持开放直到有效配置复核通过。
      en: Reject mitigation; keep risk open until effective-configuration re-check passes.
      ja: 緩和済みという結論を拒否し、対象 sandbox が新仕様を読み込んだ証拠と再検証の成功が得られるまで risk を open に保ちます。
    why_valid_or_invalid:
      zh: 声明性配置变化不等于运行实例已加载新约束。
      en: A declarative configuration change does not mean the running instance loaded the new constraint.
      ja: 宣言ファイルの更新時点と実行中 sandbox の有効設定時点は異なり、loaded_policy_ref と検証証拠がなければ実際の制約変更を証明できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-sandbox-network-001
      - claim-safety-sandbox-network-002
