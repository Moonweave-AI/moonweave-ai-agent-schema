            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 领域复核确认 ProxyRoute 是代理选择与路径事实，NetworkPolicy 是网络通信规则；二者均不由 Sandbox 的文件、进程、挂载或命名空间身份决定，因此只在此引用，不转归隔离域。
              en: Domain review confirms ProxyRoute as a proxy-selection and path fact and NetworkPolicy as a network-communication rule. Neither is identified by Sandbox filesystem, process, mount, or namespace identity, so they are referenced here without transferring ownership to isolation.
              ja: domain review は ProxyRoute が proxy-selection/path fact、NetworkPolicy が network communication rule で、Sandbox filesystem/process/mount/namespace identity に依存せず isolation へ ownership transfer しないと確認しました。
