        zh: 本地资源隔离与网络目的地控制
        en: Local-resource isolation versus network-destination control
        ja: ローカル資源分離とネットワーク宛先制御
      candidate_concept_ids:
        - ProxyRoute
        - NetworkPolicy
      overlap_reason:
        zh: 两者都约束执行可接触对象，但隔离回答进程内部能看到什么，网络控制回答流量能去哪里及经何路径。
        en: Both constrain what execution may contact, but isolation answers what a process can see locally while network control answers where traffic may go and by which path.
        ja: どちらも実行が接触できる対象を制約しますが、分離はプロセス内で見えるもの、ネットワーク制御は通信先と経路を答えます。
