        zh: 若目标通过文件路径、mount 或进程能力识别，则归执行隔离；若目标通过 scheme、host、port、route 或 proxy 识别，则归网络访问控制。
        en: If the target is identified by filesystem path, mount, or process capability, it belongs to execution isolation; if by scheme, host, port, route, or proxy, it belongs to network access control.
        ja: 対象がファイルパス、mount、プロセス能力で識別されるなら実行分離、scheme、host、port、route、proxy ならネットワークアクセス制御に属します。
