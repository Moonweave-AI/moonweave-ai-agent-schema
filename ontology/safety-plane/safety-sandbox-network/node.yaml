source_claims:
  - id: claim-safety-sandbox-e2b
    source: e2b-sandbox-docs
    supports: E2B Sandbox API provides isolated cloud execution environments with template-defined resource and filesystem boundaries mappable to Sandbox and IsolationSpecification.
    locator: E2B docs > Sandbox create and templates
    evidence_kind: official
    confidence: high
  - id: claim-safety-sandbox-oci
    source: oci-linux-runtime
    supports: OCI Linux runtime defines namespaces, cgroups, mounts, masked/readonly paths, and seccomp integration for enforceable process and filesystem isolation.
    locator: OCI config-linux > Namespaces, Mounts, Readonly paths
    evidence_kind: normative
    confidence: high
  - id: claim-safety-sandbox-gvisor
    source: gvisor-docs
    supports: gVisor runsc provides an application kernel boundary isolating untrusted workloads from the host kernel, mappable to ProcessPolicy isolation_backend.
    locator: gVisor docs > Architecture and runsc
    evidence_kind: official
    confidence: high
  - id: claim-safety-sandbox-cursor
