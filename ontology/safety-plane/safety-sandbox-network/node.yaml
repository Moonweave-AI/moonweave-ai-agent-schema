            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 通用漏洞不自动威胁实例，缓解声明也不等于运行边界已更新；两端均要求实例证据。
              en: A generic vulnerability does not automatically threaten an instance and a mitigation declaration does not update a running boundary; both require instance evidence.
              ja: generic vulnerability は自動的に instance を脅かさず mitigation declaration も running boundary 更新を意味しないため双方 instance evidence を要求します。
          - reviewer_id: moonweave-isolation-ontology-reviewer
            reviewer_role: ontology
