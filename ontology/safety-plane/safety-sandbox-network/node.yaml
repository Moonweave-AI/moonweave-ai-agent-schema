              zh: 领域复核确认 Sandbox 是运行隔离实例，SandboxEscapeRisk 是针对该边界失效可能性的安全风险；两者的身份条件与网络端点、路由或策略不同，网络只可能是逃逸向量之一。
              en: Domain review confirms Sandbox as an execution-isolation instance and SandboxEscapeRisk as the security risk of that boundary failing. Their identity conditions differ from network endpoint, route, or policy identity; network is only one possible escape vector.
              ja: domain review は Sandbox が execution-isolation instance、SandboxEscapeRisk が boundary failure risk で、network endpoint/route/policy と identity condition が異なり network は可能な escape vector の一つにすぎないと確認しました。
