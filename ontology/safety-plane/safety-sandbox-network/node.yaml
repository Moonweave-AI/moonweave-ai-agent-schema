        zh: 权限侧候选 AuthorizationRequest 表达主体对资源与操作的授权请求，PolicyDecision 表达规则评估结论；隔离规范决定进程在操作系统边界内实际可见和可执行的范围。两种控制需同时满足，但当前没有 accepted 直接关系。
        en: The permission-side candidate AuthorizationRequest expresses a subject's request over resource and operation, and PolicyDecision the evaluated conclusion. Isolation determines what the process can see and execute at the operating-system boundary. Both controls may be required, but no accepted direct relation currently joins them.
