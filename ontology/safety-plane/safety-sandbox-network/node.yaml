        not_applicable_reason: null
      output:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域不产生工具结果或命令输出；它提供执行边界与判定证据。
          en: This domain produces no tool result or command output; it supplies execution-boundary and decision evidence.
          ja: tool result/command output は生成せず execution-boundary/decision evidence を提供します。
      failure:
        applicable: true
        description:
          zh: 具实例适用性证据的 SandboxEscapeRisk 通过 threatens 指向受威胁沙箱。
          en: An instance-applicable SandboxEscapeRisk points to the threatened Sandbox through threatens.
          ja: instance-applicable evidence 付き SandboxEscapeRisk は threatens で対象 Sandbox を指します。
        family_concept_ids:
          - SandboxEscapeRisk
        relation_ids:
          - SandboxEscapeRisk-threatens-Sandbox
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域记录修改后隔离复核证据，但缓解动作、重启和补偿执行由安全或运行域拥有。
          en: This domain records post-change isolation re-check evidence, but security or runtime owns mitigation actions, restart, and compensation execution.
          ja: post-change isolation re-check evidence は記録しますが mitigation action・restart・compensation execution は security/runtime が所有します。
