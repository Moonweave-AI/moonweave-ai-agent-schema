schema: moonweave.ai/ontology-node/v1
id: safety-sandbox-network
kind: module
labels:
  zh: 执行环境隔离
  en: Execution-environment isolation
  ja: 実行環境の隔離
semantics:
  short_definition:
    zh: 执行环境隔离描述本地进程能看见什么、能操作哪些路径与能力，以及沙箱是否存在可证实的逃逸风险。
    en: Execution-environment isolation describes what a local process can see, which paths and capabilities it may use, and whether a sandbox has evidence-backed escape risk.
    ja: 実行環境隔離は、ローカル process が何を見え、どの path/capability を使え、sandbox に証拠付き escape risk があるかを記述します。
  definition:
    zh: 本模块拥有可版本化的 IsolationSpecification（含 FilesystemPolicy 与 ProcessPolicy）、实际加载这些规范的具体 Sandbox，以及绑定该实例与逃逸向量证据的 SandboxEscapeRisk。它映射 E2B Sandbox API 的 cloud sandbox 生命周期与 file/process/network 限制；Docker-in-Docker 与 OCI Linux runtime 的 namespaces、cgroups、masked/readonly paths、seccomp；gVisor 的 sentry/application kernel 隔离；Firecracker microVM 的 KVM 轻量虚拟化边界；以及 Cursor Agent Terminal 的 sandbox 模式（如 workspace-write）与命令 allowlist 叠加的本地执行边界。本模块回答“本地执行边界内可见与可操作什么”，不回答远端网络目的地可达性（归 safety-network-control），也不把 Container、ProcessHandle 或 AuthorizationGrant 复制进隔离层级。
    en: "This module owns versioned IsolationSpecification (including FilesystemPolicy and ProcessPolicy), concrete Sandbox instances that load those specifications, and SandboxEscapeRisk tied to instance and vector evidence. It maps E2B Sandbox API cloud sandbox lifecycle with file, process, and network limits; Docker-in-Docker and OCI Linux runtime namespaces, cgroups, masked/readonly paths, and seccomp; gVisor sentry/application-kernel isolation; Firecracker microVM KVM lightweight virtualization boundaries; and Cursor Agent Terminal sandbox modes (e.g., workspace-write) with command allowlists as layered local execution boundaries. It answers what is visible and operable within the local execution boundary, not remote network reachability (safety-network-control), and does not copy Container, ProcessHandle, or AuthorizationGrant into the isolation hierarchy."
    ja: 本モジュールは versioned IsolationSpecification（FilesystemPolicy/ProcessPolicy 含む）、それを load する concrete Sandbox、instance/vector 証拠付き SandboxEscapeRisk を所有します。E2B Sandbox API cloud sandbox lifecycle/file/process/network 制限、Docker-in-Docker と OCI Linux runtime namespace/cgroup/masked-readonly path/seccomp、gVisor sentry/application kernel 隔離、Firecracker microVM KVM 軽量仮想化境界、Cursor Agent Terminal sandbox mode（workspace-write 等）と command allowlist 叠加 local execution boundary を写像します。「local execution boundary 内で visible/operable なもの」を答え、remote network reachability（safety-network-control）は答えず Container/ProcessHandle/AuthorizationGrant を隔離階層へ複製しません。
  why_needed:
    zh: 若只检查宿主 DAC 权限而忽略沙箱只读 mount 与 Landlock 层，Agent 会误判可写路径并在容器逃逸或 capability 泄露时无法追溯实际加载的隔离版与缓解是否生效。
    en: If systems check only host DAC while ignoring sandbox read-only mounts and Landlock layers, agents misjudge writable paths and cannot trace which isolation revision loaded or whether mitigation worked after container escape or capability leakage.
    ja: host DAC のみ確認し sandbox ro mount/Landlock layer を無視すると、writable path を誤判定し container escape/capability leak 後に loaded isolation revision や mitigation 有効性を追跡できません。
  includes:
    - zh: IsolationSpecification、FilesystemPolicy、ProcessPolicy 及路径、挂载、读写执行权限、能力、seccomp、cgroup 约束。
      en: IsolationSpecification, FilesystemPolicy, ProcessPolicy, and constraints over paths, mounts, read/write/execute rights, capabilities, seccomp, and cgroups.
      ja: IsolationSpecification、FilesystemPolicy、ProcessPolicy と path/mount/rwx/capability/seccomp/cgroup 制約。
    - zh: Sandbox 实例、constrained_by 加载的规范版本，以及 threatens 关系绑定的 SandboxEscapeRisk 与缓解复核证据。
      en: Sandbox instance, constrained_by loaded specification revisions, and SandboxEscapeRisk with mitigation re-check evidence bound through threatens.
      ja: Sandbox instance、constrained_by loaded spec revision、threatens 绑定 SandboxEscapeRisk と mitigation re-check 証拠。
  excludes:
    - zh: NetworkCall、ProxyRoute、NetworkPolicy 与远端目的地归 safety-network-control。
      en: NetworkCall, ProxyRoute, NetworkPolicy, and remote destinations belong to safety-network-control.
      ja: NetworkCall、ProxyRoute、NetworkPolicy、remote destination は safety-network-control。
    - zh: Container、RuntimeEnvironment、ProcessHandle 归 runtime-system；AuthorizationGrant 归 safety-permission-policy。
      en: Container, RuntimeEnvironment, and ProcessHandle belong to runtime-system; AuthorizationGrant belongs to safety-permission-policy.
      ja: Container、RuntimeEnvironment、ProcessHandle は runtime-system；AuthorizationGrant は safety-permission-policy。
    - zh: 声明性策略文件变更不等于运行实例已加载新约束；未重启/未复核不得标记缓解有效。
      en: Declarative policy file changes do not mean a running instance loaded new constraints; mitigation is not effective without restart or re-check.
      ja: 宣言 policy 変更は running instance の新 constraint load を意味せず、restart/re-check なしに mitigation effective とできません。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应把 E2B `Sandbox.create()` 返回的 sandbox ID 与模板限制映射为 Sandbox + IsolationSpecification；Docker `docker run --read-only --cap-drop=ALL` 与 OCI maskedPaths/readonlyPaths 映射为 FilesystemPolicy；gVisor `runsc` 与 Firecracker `firecracker-containerd` 映射为 ProcessPolicy 的 isolation backend 字段；Cursor terminal sandbox 映射为 workspace 写入边界与 allowlist 叠加层。路径权限查询必须 intersect 所有强制层（mount、Landlock、seccomp），不得以宿主 DAC 覆盖。缓解必须绑定 post-change loaded_policy_ref 与独立复核。
    en: "Integrations should map E2B Sandbox.create() sandbox ID and template limits to Sandbox plus IsolationSpecification; Docker docker run --read-only --cap-drop=ALL and OCI maskedPaths/readonlyPaths to FilesystemPolicy; gVisor runsc and Firecracker firecracker-containerd to ProcessPolicy isolation backend fields; Cursor terminal sandbox to workspace write boundary with allowlist overlay. Path permission queries must intersect all enforced layers (mount, Landlock, seccomp) and cannot be overridden by host DAC. Mitigation must bind post-change loaded_policy_ref and independent re-check."
    ja: E2B Sandbox.create() の sandbox ID/template limit を Sandbox+IsolationSpecification に、Docker --read-only/--cap-drop=ALL と OCI masked/readonly path を FilesystemPolicy に、gVisor runsc/Firecracker firecracker-containerd を ProcessPolicy backend に、Cursor terminal sandbox を workspace write boundary+allowlist overlay に写像。path permission query は mount/Landlock/seccomp 全 layer intersect 必須で host DAC 上書き不可。mitigation は post-change loaded_policy_ref と独立 re-check 绑定。
  typical_input:
    - description: E2B cloud sandbox creation with template constraints.
      format: |
        from e2b import Sandbox
        sandbox = Sandbox.create(template="code-interpreter-v1")
        sandbox.filesystem.write("/tmp/out.txt", "hello")
        # template defines CPU, memory, network, filesystem boundaries
      source_claims: [claim-safety-sandbox-e2b]
    - description: OCI/Docker read-only root with dropped capabilities.
      format: |
        docker run --read-only --cap-drop=ALL \
          --mount type=bind,src=/repo,dst=/workspace,readonly \
          agent-runner npm test
      source_claims: [claim-safety-sandbox-oci]
    - description: Cursor Agent terminal sandbox mode.
      format: |
        {"sandbox_mode": "workspace-write",
         "command_allowlist": ["npm test", "git status", "pnpm lint"]}
        // commands outside list blocked before spawn
      source_claims: [claim-safety-sandbox-cursor]
  typical_output:
    - description: Effective path permissions from loaded specification layers.
      format: |
        sandbox_id: sandbox-run-884
        isolation_spec_ref: fs-code@4
        path: /workspace/repo/app.py
        read_allowed: true
        write_allowed: false
        execute_allowed: false
        enforcement_layers: [mount-readonly, landlock-fs-code-v4]
      source_claims: [claim-safety-sandbox-design]
    - description: Escape risk with verified post-change mitigation.
      format: |
        escape_risk_id: escape-risk-884-1
        vector: writable-host-bind-mount-with-cap-sys-admin
        post_change_mount_mode: ro
        mitigation_verification_ref: sandbox-recheck-884-2
        boundary_write_denials: 12
        mitigation_effective: true
      source_claims: [claim-safety-sandbox-design]
  reference_implementations:
    - name: E2B Sandbox API
      url: https://e2b.dev/docs
      description: Cloud sandbox lifecycle, filesystem, process, and network isolation templates.
    - name: OCI Runtime Specification — Linux
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      description: Namespaces, cgroups, mounts, masked/readonly paths, seccomp.
    - name: gVisor Documentation
      url: https://gvisor.dev/docs/
      description: Application kernel isolation with runsc runtime.
    - name: Firecracker microVM
      url: https://firecracker-microvm.github.io/
      description: Lightweight KVM microVM boundaries for multi-tenant isolation.
    - name: Cursor Agent Terminal Sandbox
      url: https://cursor.com/docs/agent/terminal
      description: workspace-write sandbox and command allowlist layering.
structure:
  identity_keys: [sandbox_id, isolation_spec_ref]
  fields:
    - id: sandbox_id
      labels: {zh: 沙箱标识, en: Sandbox identifier, ja: サンドボックス識別子}
      definitions:
        zh: 一次具体 Sandbox 运行实例的唯一 ID；规范版本变更但实例未 reload 时 identity 不变。
        en: Unique ID of one concrete Sandbox runtime instance; identity unchanged when spec changes but instance has not reloaded.
        ja: 一回の concrete Sandbox runtime instance の一意 ID。spec 変更でも instance 未 reload なら identity 不変。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sandbox-[A-Za-z0-9._-]+$'
      example_value: sandbox-run-884
      allowed_values: []
      source_claims: [claim-safety-sandbox-design]
    - id: isolation_spec_ref
      labels: {zh: 隔离规范版本引用, en: Isolation specification revision reference, ja: 隔離仕様版参照}
      definitions:
        zh: Sandbox-constrained_by 实际加载并强制的 IsolationSpecification 版本。
        en: IsolationSpecification revision actually loaded and enforced per Sandbox-constrained_by.
        ja: Sandbox-constrained_by で実際 load/enforce された IsolationSpecification revision。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: fs-code@4
      allowed_values: []
      source_claims: [claim-safety-sandbox-oci]
    - id: mount_mode
      labels: {zh: 挂载模式, en: Mount mode, ja: マウントモード}
      definitions:
        zh: 匹配 mount 规则的 ro/rw 模式；与宿主路径权限 intersect 决定最终 write_allowed。
        en: ro/rw mode of matched mount rule; intersected with host path rights for final write_allowed.
        ja: 一致 mount rule の ro/rw mode。host path 権限と intersect して final write_allowed を決定。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: ro
      allowed_values: [ro, rw]
      source_claims: [claim-safety-sandbox-landlock]
  constraints:
    - id: sandbox-intersect-enforcement-layers
      severity: error
      expression_language: plain
      expression: Effective read/write/execute for a normalized path must be the intersection of all enforced layers including mount mode, Landlock, seccomp, and capability drops; host DAC alone cannot grant access denied by sandbox layers.
      explanation:
        zh: 宿主 DAC 不能覆盖沙箱中额外的只读与 Landlock 约束。
        en: Host DAC cannot override additional read-only and Landlock restrictions in the sandbox.
        ja: host DAC は sandbox 内 ro mount/Landlock 等の追加制約を上書きできません。
      source_claims: [claim-safety-sandbox-landlock]
    - id: sandbox-normalize-before-map
      severity: error
      expression_language: plain
      expression: Path normalization in sandbox namespace must precede host mapping; traversal escaping the matched mount target root must deny with no resolved host path.
      explanation:
        zh: 路径规范化必须先于映射，结果必须留在匹配 target 根内。
        en: Normalization precedes mapping and the result must remain under the matched target root.
        ja: mapping 前正規化し、結果は matched target root 内に留まる必要があります。
      source_claims: [claim-safety-sandbox-landlock]
    - id: sandbox-mitigation-requires-loaded-evidence
      severity: error
      expression_language: plain
      expression: SandboxEscapeRisk mitigation_effective=true requires loaded_policy_ref matching declared post-change spec and a passing independent re-check; declared config change alone is insufficient.
      explanation:
        zh: 声明性配置变化不等于运行实例已加载新约束。
        en: A declarative configuration change does not mean the running instance loaded the new constraint.
        ja: 宣言 config 変更は running instance の新 constraint load を意味しません。
      source_claims: [claim-safety-sandbox-design]
  required_relations:
    - id: sandbox-constrained-by-spec
      direction: outgoing
      predicate: constrained_by
      target_concept_id: IsolationSpecification
      cardinality: {min: 1, max: null}
      explanations:
        zh: Sandbox 必须 constrained_by 至少一条实际加载的 IsolationSpecification 版本。
        en: Sandbox must be constrained_by at least one actually loaded IsolationSpecification revision.
        ja: Sandbox は少なくとも一 loaded IsolationSpecification revision に constrained_by される必要があります。
      source_claims: [claim-safety-sandbox-design]
examples:
  - id: safety-sandbox-network-example-e2b-cloud
    labels:
      zh: E2B 云沙箱模板隔离
      en: E2B cloud sandbox template isolation
      ja: E2B cloud sandbox template 隔離
    descriptions:
      zh: E2B Sandbox.create(template="code-interpreter-v1") 返回 sandbox-e2b-17；模板限制 CPU/内存/网络，FilesystemPolicy fs-e2b@1 仅允许 /home/user 写入。Agent 在沙箱内执行 Python，宿主 /etc 不可见。
      en: E2B Sandbox.create(template="code-interpreter-v1") returns sandbox-e2b-17; the template limits CPU, memory, and network while FilesystemPolicy fs-e2b@1 allows writes only under /home/user. The agent runs Python inside the sandbox and cannot see host /etc.
      ja: E2B Sandbox.create(template="code-interpreter-v1") が sandbox-e2b-17 を返し、template が CPU/メモリ/ネットワークを制限、FilesystemPolicy fs-e2b@1 は /home/user 下のみ書込可。Agent は sandbox 内 Python を実行し host /etc は不可視。
    example_source:
      product: E2B
      url: https://e2b.dev/docs
      version: Sandbox API templates
    field_values:
      sandbox_id: sandbox-e2b-17
      template: code-interpreter-v1
      isolation_spec_ref: fs-e2b@1
      host_etc_visible: false
    related_node_ids:
      - Sandbox
      - IsolationSpecification
      - FilesystemPolicy
    related_relation_ids:
      - Sandbox-constrained_by-IsolationSpecification
    source_claims:
      - claim-safety-sandbox-e2b
  - id: safety-sandbox-network-example-docker-readonly
    labels:
      zh: Docker 只读根与 capability 丢弃
      en: Docker read-only root with capability drop
      ja: Docker 読取専用 root と capability drop
    descriptions:
      zh: docker run --read-only --cap-drop=ALL 启动 sandbox-run-884，加载 fs-code@4 与 process-code@4；查询 /workspace/repo/app.py 可读不可写，/secrets/token 三项均 false。OCI maskedPaths 与 seccomp 共同强制。
      en: docker run --read-only --cap-drop=ALL starts sandbox-run-884 loading fs-code@4 and process-code@4; /workspace/repo/app.py is readable but not writable and /secrets/token denies all three operations, enforced jointly by OCI maskedPaths and seccomp.
      ja: docker run --read-only --cap-drop=ALL で sandbox-run-884 起動、fs-code@4/process-code@4 load。/workspace/repo/app.py は read-only、/secrets/token は三操作すべて deny。OCI maskedPaths と seccomp が共同 enforce。
    example_source:
      product: OCI / Docker
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      version: Linux container configuration
    field_values:
      sandbox_id: sandbox-run-884
      mount_mode: ro
      capabilities: []
      read_path: /workspace/repo/app.py
      write_allowed: false
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
      - ProcessPolicy
    related_relation_ids: []
    source_claims:
      - claim-safety-sandbox-oci
  - id: safety-sandbox-network-example-gvisor-firecracker
    labels:
      zh: gVisor 与 Firecracker 隔离后端
      en: gVisor and Firecracker isolation backends
      ja: gVisor と Firecracker 隔離 backend
    descriptions:
      zh: 多租户平台对不可信代码使用 gVisor runsc（application kernel）或 Firecracker microVM；ProcessPolicy process-tenant@2 记录 isolation_backend=gvisor|firecracker。逃逸向量若涉及 KVM 侧信道，SandboxEscapeRisk 须绑定具体实例证据而非通用 CVE 名称。
      en: A multi-tenant platform runs untrusted code with gVisor runsc (application kernel) or Firecracker microVM; ProcessPolicy process-tenant@2 records isolation_backend=gvisor|firecracker. Escape vectors involving KVM side channels require SandboxEscapeRisk bound to instance evidence, not a generic CVE name alone.
      ja: マルチテナント platform が untrusted code を gVisor runsc または Firecracker microVM で実行。ProcessPolicy process-tenant@2 が isolation_backend=gvisor|firecracker を記録。KVM side channel 逃逸 vector には generic CVE 名だけでなく instance 証拠绑定 SandboxEscapeRisk が必要。
    example_source:
      product: gVisor / Firecracker
      url: https://gvisor.dev/docs/
      version: runsc and microVM isolation
    field_values:
      isolation_backend: gvisor
      alternative_backend: firecracker
      process_policy_ref: process-tenant@2
    related_node_ids:
      - ProcessPolicy
      - Sandbox
      - SandboxEscapeRisk
    related_relation_ids: []
    source_claims:
      - claim-safety-sandbox-gvisor
  - id: safety-sandbox-network-example-cursor-terminal
    labels:
      zh: Cursor 终端 sandbox 与 allowlist 叠加
      en: Cursor terminal sandbox with allowlist overlay
      ja: Cursor terminal sandbox と allowlist 叠加
    descriptions:
      zh: Cursor Agent 在 workspace-write sandbox 中运行；allowlist 仅 permit npm test 与 git status。请求 curl 在 spawn 前被 Cursor sandbox 层拒绝，即使宿主用户对该 URL 有网络权限；本地隔离与网络控制仍须分别满足。
      en: Cursor Agent runs in workspace-write sandbox; allowlist permits only npm test and git status. A requested curl is rejected by the Cursor sandbox layer before spawn even if the host user has network access to that URL; local isolation and network control must both hold separately.
      ja: Cursor Agent が workspace-write sandbox で実行。allowlist は npm test/git status のみ許可。curl 要求は host user に network 権限があっても spawn 前に Cursor sandbox layer で拒否。local isolation と network control は別々に満たす必要があります。
    example_source:
      product: Cursor
      url: https://cursor.com/docs/agent/terminal
      version: terminal sandbox and allowlist
    field_values:
      sandbox_mode: workspace-write
      allowed_commands: [npm test, git status]
      blocked_command: curl
      spawn_blocked: true
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
    related_relation_ids: []
    source_claims:
      - claim-safety-sandbox-cursor
  - id: safety-sandbox-network-example-escape-mitigation
    labels:
      zh: 逃逸风险与修复后独立复核
      en: Escape risk with independent post-fix re-check
      ja: 逃逸リスクと修正後独立 re-check
    descriptions:
      zh: escape-risk-884-1 由 rw mount 与 CAP_SYS_ADMIN 证据支持；改为 ro mount 并 drop capability 后 sandbox-recheck-884-2 记录 12 次越界写入均被拒绝，mitigation_effective=true。仅改策略文件而未 reload 则保持 open。
      en: escape-risk-884-1 is supported by rw mount and CAP_SYS_ADMIN evidence; after switching to ro mount and dropping the capability, sandbox-recheck-884-2 records 12 boundary write attempts denied and mitigation_effective=true. Policy file change without reload stays open.
      ja: escape-risk-884-1 は rw mount/CAP_SYS_ADMIN 証拠。ro mount+capability drop 後 sandbox-recheck-884-2 が 12 boundary write deny を記録し mitigation_effective=true。policy file 変更のみで reload なしは open 維持。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: escape risk mitigation verification
    field_values:
      escape_risk_id: escape-risk-884-1
      pre_change_mount_mode: rw
      post_change_mount_mode: ro
      mitigation_verification_ref: sandbox-recheck-884-2
      mitigation_effective: true
    related_node_ids:
      - SandboxEscapeRisk
      - Sandbox
    related_relation_ids:
      - SandboxEscapeRisk-threatens-Sandbox
    source_claims:
      - claim-safety-sandbox-design
parent_relation: null
