          en: A Sandbox's effective isolation inputs are the IsolationSpecification revisions actually loaded at creation, recorded by constrained_by.
          ja: Sandbox の effective isolation input は creation 時に実 load した IsolationSpecification revision で constrained_by が記録します。
        family_concept_ids:
          - IsolationSpecification
        relation_ids:
