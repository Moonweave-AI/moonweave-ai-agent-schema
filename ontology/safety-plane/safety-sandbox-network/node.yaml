  competency_questions:
    - id: safety-sandbox-network-cq-resource-visibility-v3
      semantic_key: safety-sandbox-network.resource-visibility
      primary_owner_module_id: safety-sandbox-network
      related_module_ids: []
      questions:
        zh: 指定 Sandbox 中的进程对某个规范化路径最终可读、可写或可执行吗，哪些已加载规则共同决定结果？
        en: May a process in a specified Sandbox ultimately read, write, or execute a normalized path, and which loaded rules jointly decide?
        ja: 指定 Sandbox の process は normalized path を read/write/execute でき、どの loaded rule が共同決定しますか。
      query: Resolve the Sandbox's actually loaded FilesystemPolicy revisions, normalize the sandbox path, resolve mounts and longest matching rules, and intersect all enforced layers.
      expected_assertion: The answer names the normalized path, loaded policy revisions, matched mount and path rules, and final read/write/execute decisions; unmounted or escaping paths are denied.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - Sandbox
          - IsolationSpecification
          - FilesystemPolicy
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 沙箱、实际加载的隔离规范及其文件系统策略均由本模块拥有；runtime_environment_ref 只是宿主引用，不是此路径权限查询所需的跨模块关系。内部解析仍沿 constrained_by 核对加载版本。
          en: Sandbox, the actually loaded isolation specification, and its filesystem policy are all owned here. runtime_environment_ref is only a host reference, not a cross-module relation required by this path-permission query. Internal resolution still follows constrained_by to verify the loaded revision.
          ja: Sandbox、実際に読み込まれた隔離仕様、そのファイルシステムポリシーはすべて本モジュールが所有します。runtime_environment_ref は宿主参照にすぎず、この経路権限問いに必要なモジュール間関係ではありません。内部解析では constrained_by により読込版を確認します。
      positive_example_ids:
        - safety-sandbox-network-cq-resource-visibility-v3-example-positive-manual-20260716
      counterexample_ids:
        - safety-sandbox-network-cq-resource-visibility-v3-example-boundary-manual-20260716
      source_claims:
        - claim-safety-sandbox-network-001
        - claim-safety-sandbox-network-002
        - claim-safety-sandbox-network-003
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-isolation-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 查询只依赖实际加载的规范与有效路径计算，不以宿主权限或计划配置替代。
              en: The query depends on loaded specifications and effective path computation, never host permission or planned configuration alone.
              ja: query は loaded specification/effective path 計算に依存し host permission/planned config で代替しません。
          - reviewer_id: moonweave-isolation-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 查询只依赖实际加载的规范与有效路径计算，不以宿主权限或计划配置替代。
              en: The query depends on loaded specifications and effective path computation, never host permission or planned configuration alone.
              ja: query は loaded specification/effective path 計算に依存し host permission/planned config で代替しません。
    - id: safety-sandbox-network-cq-mount-resolution-v3
      semantic_key: safety-sandbox-network.mount-resolution
      primary_owner_module_id: safety-sandbox-network
      related_module_ids: []
      questions:
        zh: 某个沙箱路径经规范化后映射到哪个宿主路径，匹配哪条挂载规则，当前操作是否被挂载模式与路径规则共同允许？
        en: After normalization, which host path does a sandbox path map to, which mount rule matches, and do mount mode and path rules jointly allow the operation?
        ja: normalize 後 sandbox path はどの host path/mount rule に対応し mount mode/path rule が operation を許可しますか。
      query: Normalize in sandbox path space, reject traversal, select the longest target-prefix mount mapping, resolve the host path, then intersect mount mode and path operation rights.
      expected_assertion: Resolution yields at most one host target beneath the mapped source root; traversal is denied and an operation is allowed only when both mount and path rules permit it.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - Sandbox
          - IsolationSpecification
          - FilesystemPolicy
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 挂载目标、源路径、只读模式、链接解析规则与实际加载的隔离规范均属于本模块；RuntimeEnvironment 不参与规范化路径到宿主路径的身份计算。
          en: Mount target, source path, read-only mode, link-resolution rule, and the loaded isolation specification all belong here. RuntimeEnvironment does not participate in the identity computation from normalized sandbox path to host path.
          ja: マウント先、元経路、読取専用モード、リンク解決規則、読込済み隔離仕様はいずれも本モジュールに属します。RuntimeEnvironment は正規化済み sandbox 経路から宿主経路への同一性計算に参加しません。
      positive_example_ids:
        - safety-sandbox-network-cq-mount-resolution-v3-example-positive-manual-20260716
      counterexample_ids:
        - safety-sandbox-network-cq-mount-resolution-v3-example-boundary-manual-20260716
      source_claims:
        - claim-safety-sandbox-network-002
        - claim-safety-sandbox-network-003
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-isolation-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 先规范化再映射，显式区分宿主路径与沙箱路径，避免字符串拼接越界。
              en: Normalize before mapping and keep host and sandbox path spaces explicit to prevent string-concatenation escapes.
              ja: mapping 前 normalize し host/sandbox path 空間を明示分離して concat escape を防ぎます。
          - reviewer_id: moonweave-isolation-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 先规范化再映射，显式区分宿主路径与沙箱路径，避免字符串拼接越界。
              en: Normalize before mapping and keep host and sandbox path spaces explicit to prevent string-concatenation escapes.
              ja: mapping 前 normalize し host/sandbox path 空間を明示分離して concat escape を防ぎます。
    - id: safety-sandbox-network-cq-escape-risk-v3
      semantic_key: safety-sandbox-network.escape-risk
      primary_owner_module_id: safety-sandbox-network
      related_module_ids: []
      questions:
        zh: 哪些有效配置或运行证据证明某个 Sandbox 存在文件系统、进程、设备或命名空间逃逸向量，缓解是否经过修改后复核？
        en: Which effective configuration or runtime evidence proves a filesystem, process, device, or namespace escape vector for a Sandbox, and was mitigation verified after change?
        ja: どの effective config/runtime evidence が Sandbox の filesystem/process/device/namespace escape vector を証明し mitigation は変更後 re-check 済みですか。
      query: For each SandboxEscapeRisk, follow threatens to one Sandbox, inspect its loaded specification and effective enforcement evidence, and require independent post-change evidence before mitigation is considered effective.
      expected_assertion: Every open risk has one target sandbox, one concrete vector, applicability evidence, and severity; mitigation is effective only when the running boundary passes a post-change re-check.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - SandboxEscapeRisk
          - Sandbox
          - IsolationSpecification
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 逃逸风险、受威胁沙箱与实际加载的隔离规范均由本模块拥有；网络控制只处理远端传输路径，运行时系统只提供宿主身份。内部解析沿 threatens 与 constrained_by 比较修改前后有效配置。
          en: Escape risk, threatened sandbox, and actually loaded isolation specification are all owned here. Network control handles remote transport paths, while runtime system only supplies host identity. Internal resolution follows threatens and constrained_by to compare effective pre-change and post-change configurations.
          ja: 逃逸リスク、脅威を受ける sandbox、実際に読み込まれた隔離仕様はすべて本モジュールが所有します。ネットワーク制御は遠隔輸送経路を扱い、runtime system は宿主同一性だけを提供します。内部解析では threatens と constrained_by に沿って変更前後の有効設定を比較します。
      positive_example_ids:
        - safety-sandbox-network-cq-escape-risk-v3-example-positive-manual-20260716
      counterexample_ids:
        - safety-sandbox-network-cq-escape-risk-v3-example-boundary-manual-20260716
      source_claims:
        - claim-safety-sandbox-network-001
        - claim-safety-sandbox-network-002
        - claim-safety-sandbox-network-003
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-isolation-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 通用漏洞不自动威胁实例，缓解声明也不等于运行边界已更新；两端均要求实例证据。
              en: A generic vulnerability does not automatically threaten an instance and a mitigation declaration does not update a running boundary; both require instance evidence.
              ja: generic vulnerability は自動的に instance を脅かさず mitigation declaration も running boundary 更新を意味しないため双方 instance evidence を要求します。
          - reviewer_id: moonweave-isolation-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 通用漏洞不自动威胁实例，缓解声明也不等于运行边界已更新；两端均要求实例证据。
              en: A generic vulnerability does not automatically threaten an instance and a mitigation declaration does not update a running boundary; both require instance evidence.
              ja: generic vulnerability は自動的に instance を脅かさず mitigation declaration も running boundary 更新を意味しないため双方 instance evidence を要求します。
  key_notion:
    zh: 隔离规范
    en: isolation specification
    ja: 隔離仕様
  owns_when:
    zh: 当对象必须由隔离规范版本、具体沙箱实例与其强制证据，或绑定该实例的逃逸向量和证据来识别时，由本模块拥有。
    en: Own an object when it must be identified by an isolation-specification revision, a concrete sandbox and its enforcement evidence, or an escape vector and evidence tied to that instance.
    ja: 隔離仕様版、具体的サンドボックスとその強制証拠、またはその実例に結び付く逃避経路と証拠によって識別される対象を所有します。
  references_when:
    zh: 本模块引用承载沙箱的运行环境、在沙箱中执行的调用、适用授权和并行生效的网络控制；这些引用不改变相邻模块对象的身份。
    en: This module references the Runtime environment hosting the sandbox, invocations executed within it, applicable authorization, and concurrently effective network controls without changing the identity of those adjacent-module objects.
    ja: 本モジュールはサンドボックスを収容する実行環境、内部で行う呼び出し、適用認可、並行して有効なネットワーク制御を参照しますが、隣接モジュールの対象の同一性は変えません。
  boundary_decisions:
    - other_module_id: safety-network-control
      subject_concept_ids:
        - ProxyRoute
        - NetworkPolicy
      decision: references
      owner_module_id: safety-network-control
      rationale:
        zh: 网络域候选 ProxyRoute 与 NetworkPolicy 分别由有效代理路径和网络规则修订识别，决定流量从何处、按何种网络规则离开；隔离域只比较本地执行边界。两类控制可并存，但当前没有 accepted 端点关系。
        en: The network-owned candidates ProxyRoute and NetworkPolicy are identified by an effective proxy path and a network-rule revision and determine how traffic may leave. Isolation compares the local execution boundary. Both controls may coexist, but no accepted endpoint relation currently joins them.
        ja: network-owned candidate の ProxyRoute/NetworkPolicy は effective proxy path/network rule revision で識別され traffic の exit path/rule を決めます。isolation は local execution boundary を比較し、両 control が共存しても accepted endpoint relation はありません。
      relation_ids: []
      relation_not_applicable_reason:
        zh: 相邻对象只用于归属边界比较；当前域不创建跨模块边，避免把运行环境、网络路由或业务授权误作隔离规范组成。
        en: Adjacent objects are ownership-boundary comparisons only; this domain creates no cross-module edge that would misstate runtime environment, network route, or business authorization as part of an isolation specification.
        ja: 隣接 object は ownership boundary 比較のみで runtime environment・network route・business authorization を isolation specification part と誤る cross-module 辺を作りません。
      source_claims:
        - claim-safety-sandbox-network-001
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-isolation-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 领域复核确认 ProxyRoute 是代理选择与路径事实，NetworkPolicy 是网络通信规则；二者均不由 Sandbox 的文件、进程、挂载或命名空间身份决定，因此只在此引用，不转归隔离域。
              en: Domain review confirms ProxyRoute as a proxy-selection and path fact and NetworkPolicy as a network-communication rule. Neither is identified by Sandbox filesystem, process, mount, or namespace identity, so they are referenced here without transferring ownership to isolation.
              ja: domain review は ProxyRoute が proxy-selection/path fact、NetworkPolicy が network communication rule で、Sandbox filesystem/process/mount/namespace identity に依存せず isolation へ ownership transfer しないと確認しました。
          - reviewer_id: moonweave-isolation-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 结构复核确认 references 候选严格为 ProxyRoute、NetworkPolicy，relation_ids=N/A；没有把“沙箱内流量”误写成 ProxyRoute/NetworkPolicy 属于 Sandbox 的组成或下位关系。
              en: Ontology review confirms the references candidates as exactly ProxyRoute and NetworkPolicy with relation_ids N/A. Traffic originating in a sandbox is not rewritten as a composition or subtype relation placing ProxyRoute or NetworkPolicy under Sandbox.
              ja: ontology review は references candidate を ProxyRoute/NetworkPolicy、relation_ids=N/A と確認し、sandbox-origin traffic を ProxyRoute/NetworkPolicy が Sandbox の component/subtype になる関係へ書き換えません。
    - other_module_id: safety-network-control
      subject_concept_ids:
        - Sandbox
        - SandboxEscapeRisk
      decision: owns
      owner_module_id: safety-sandbox-network
      rationale:
        zh: Sandbox 由具体隔离实例、命名空间、挂载和能力边界识别，SandboxEscapeRisk 由逃逸向量、影响面和证据识别；即使风险涉及网络命名空间，二者也不是 NetworkCall、ProxyRoute 或 NetworkPolicy，且当前无 accepted 跨域边。
        en: Sandbox is identified by a concrete isolation instance, namespaces, mounts, and capability boundary, while SandboxEscapeRisk is identified by escape vector, impact surface, and evidence. Even when the vector involves a network namespace, neither becomes NetworkCall, ProxyRoute, or NetworkPolicy, and no accepted cross-domain edge exists.
        ja: Sandbox は concrete isolation instance/namespace/mount/capability boundary、SandboxEscapeRisk は escape vector/impact/evidence で識別され、network namespace vector でも NetworkCall/ProxyRoute/NetworkPolicy にはならず accepted cross-domain edge はありません。
