              en: Ontology review confirms Sandbox and SandboxEscapeRisk as the owns candidates with relation_ids N/A. A risk mentioning network does not establish a stable class edge to NetworkPolicy or ProxyRoute, preventing a scenario from entering the business hierarchy.
              ja: ontology review は owns candidate を Sandbox/SandboxEscapeRisk、relation_ids=N/A と確認しました。risk が network を含んでも NetworkPolicy/ProxyRoute への stable class edge にはならず scenario を business hierarchy に混入しません。
