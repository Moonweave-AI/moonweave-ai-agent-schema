schema: moonweave.ai/ontology-node/v1
id: ProcessPolicy
kind: concept
status: accepted
labels:
  zh: 进程策略
  en: process policy
  ja: プロセス方針
semantics:
  short_definition:
    zh: 限定沙箱进程启动、命名空间、能力、系统调用与资源的隔离规范。
    en: An isolation specification limiting sandbox process launch, namespaces, capabilities, syscalls, and resources.
    ja: sandbox process launch・namespace・capability・syscall・resource を制限する isolation specification。
  definition:
    zh: 进程策略是一种 IsolationSpecification，以允许的可执行文件与参数、环境暴露、用户身份、命名空间、Linux capabilities、seccomp/LSM 配置和 cgroup 资源上限为区分特征。它约束进程如何运行，不决定文件路径内容的读写权限，也不是某次 ProcessHandle。
    en: A ProcessPolicy is an IsolationSpecification distinguished by allowed executables and arguments, environment exposure, user identity, namespaces, Linux capabilities, seccomp/LSM profiles, and cgroup resource limits. It constrains how a process runs, not filesystem-content permissions, and it is not one ProcessHandle.
    ja: ProcessPolicy は allowed executable/argument・environment exposure・user identity・namespace・Linux capability・seccomp/LSM profile・cgroup resource limit で区別する IsolationSpecification です。process の run 方法を制約し filesystem content permission や個別 ProcessHandle ではありません。
  why_needed:
    zh: 把执行允许条件与具体进程实例分离，才能在启动前验证最小权限并在运行后核对实际配置。
    en: It separates launch constraints from concrete process instances so least privilege can be checked before start and effective configuration audited afterward.
    ja: launch constraint と concrete process instance を分け start 前 least privilege 検証と実行後 effective config audit を可能にします。
  includes:
    - zh: 可执行文件与参数规则、用户/组、环境变量、命名空间、capability、seccomp/LSM 与 CPU/内存/PID 上限。
      en: Executable and argument rules, user/group, environment, namespaces, capabilities, seccomp/LSM, and CPU/memory/PID limits.
      ja: executable/argument rule・user/group・environment・namespace・capability・seccomp/LSM・CPU/memory/PID limit。
  excludes:
    - zh: 文件路径与挂载规则、网络目的地、业务授权、运行中的进程句柄和命令结果。
      en: Filesystem path and mount rules, network destinations, business authorization, running process handles, and command results.
      ja: filesystem path/mount rule・network destination・business authorization・running process handle・command result。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: executable_rule_set
      labels:
        zh: 可执行规则集
        en: executable rule set
        ja: executable rule set
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可启动程序、参数约束与工作目录条件。
        en: Declares launchable programs, argument constraints, and working-directory conditions.
        ja: launch 可能 program・argument constraint・working-directory condition を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        allow:
          - /usr/bin/python3
        deny_shell: true
      source_claims:
        - claim-process-policy-001
        - claim-process-policy-002
    - id: namespace_profile
      labels:
        zh: 命名空间配置
        en: namespace profile
        ja: namespace profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明进程是否创建或加入 PID、mount、user、IPC、network 与 cgroup 命名空间。
        en: Declares whether the process creates or joins PID, mount, user, IPC, network, and cgroup namespaces.
        ja: process が PID・mount・user・IPC・network・cgroup namespace を create/join する方法を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        pid: new
        mount: new
        user: new
        network: inherit
      source_claims:
        - claim-process-policy-002
    - id: capability_and_syscall_profile
      labels:
        zh: 能力与系统调用配置
        en: capability and syscall profile
        ja: capability/syscall profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明保留/删除的进程能力与 seccomp 或 LSM 执行配置。
        en: Declares retained/dropped process capabilities and seccomp or LSM enforcement profiles.
        ja: retained/dropped capability と seccomp/LSM enforcement profile を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        drop:
          - ALL
        seccomp: runtime-default
      source_claims:
        - claim-process-policy-001
        - claim-process-policy-002
    - id: resource_limit_profile
      labels:
        zh: 资源上限配置
        en: resource-limit profile
        ja: resource-limit profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 CPU、内存、进程数、文件描述符和执行时长上限。
        en: Declares CPU, memory, process-count, file-descriptor, and execution-duration limits.
        ja: CPU・memory・process count・file descriptor・execution duration limit を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        memory_bytes: 536870912
        pids: 64
        timeout_seconds: 120
      source_claims:
        - claim-process-policy-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProcessPolicy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 最小权限 Python 进程
      en: Least-privilege Python process
      ja: least-privilege Python process
    scenario_id: null
    descriptions:
      zh: proc-python@2 仅允许 /usr/bin/python3，创建 PID/mount/user namespace，删除全部 capabilities，使用 runtime-default seccomp，并限制 512 MiB 和 64 个 PID。
      en: proc-python@2 permits only /usr/bin/python3, creates PID/mount/user namespaces, drops all capabilities, uses runtime-default seccomp, and limits memory to 512 MiB and PIDs to 64.
      ja: proc-python@2 は /usr/bin/python3 のみ許可し PID/mount/user namespace を作成、全 capability を drop、runtime-default seccomp、512 MiB/64 PID 上限を設定します。
    field_values:
      isolation_spec_id: proc-python
      version: "2"
      applicable_environment_ref: sandbox/python-execution
      enforcer: container-runtime-security-profile
      executable_rule_set:
        allow:
          - /usr/bin/python3
      namespace_profile:
        pid: new
        mount: new
        user: new
      capability_and_syscall_profile:
        drop:
          - ALL
        seccomp: runtime-default
      resource_limit_profile:
        memory_bytes: 536870912
        pids: 64
    related_node_ids:
      - ProcessPolicy
      - IsolationSpecification
    related_relation_ids:
      - ProcessPolicy-is_a-IsolationSpecification
    expected_result:
      zh: 分类为 ProcessPolicy，并能在启动前验证进程约束。
      en: Classify as ProcessPolicy and evaluate launch constraints before start.
      ja: ProcessPolicy と分類し start 前に launch constraint を評価できます。
    why_valid_or_invalid:
      zh: 记录覆盖进程身份、隔离机制、能力、系统调用与资源边界。
      en: The record covers executable identity, isolation mechanisms, capabilities, syscalls, and resource bounds.
      ja: executable identity・isolation mechanism・capability・syscall・resource bound を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-process-policy-001
      - claim-process-policy-002
  - id: ProcessPolicy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 一次命令的超时参数
      en: One command timeout
      ja: 一 command timeout
    scenario_id: sandbox-review-processpolicy-boundary
    descriptions:
      zh: ToolCallPlan 仅写 timeout=120，没有可执行规则、用户、命名空间、能力或执行器。
      en: A ToolCallPlan only states timeout=120 and has no executable rule, user, namespace, capability, or enforcer.
      ja: ToolCallPlan は timeout=120 だけで executable rule・user・namespace・capability・enforcer がありません。
    field_values: {}
    related_node_ids:
      - ProcessPolicy
    related_relation_ids: []
    expected_result:
      zh: 保留为调用参数，不创建 ProcessPolicy。
      en: Keep it as an invocation parameter and do not create ProcessPolicy.
      ja: invocation parameter とし ProcessPolicy を作りません。
    why_valid_or_invalid:
      zh: 单个运行参数不足以构成版本化进程隔离规范。
      en: One runtime parameter is not a versioned process-isolation specification.
      ja: 一 runtime parameter は versioned process-isolation specification ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-process-policy-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: FilesystemPolicy
    shared_parent_concept_id: IsolationSpecification
    differentia:
      zh: ProcessPolicy 约束程序、身份、命名空间、能力、系统调用与资源；FilesystemPolicy 约束路径、挂载与文件操作。二者共同收窄沙箱，但端点和判定输入不同。
      en: ProcessPolicy constrains program, identity, namespaces, capabilities, syscalls, and resources; FilesystemPolicy constrains paths, mounts, and file operations. Both narrow a sandbox, but their decision inputs and endpoints differ.
      ja: ProcessPolicy は program・identity・namespace・capability・syscall・resource、FilesystemPolicy は path・mount・file operation を制約し decision input/endpoint が異なります。
    source_claims:
      - claim-process-policy-002
      - claim-process-policy-003
parent_relation:
  id: ProcessPolicy-is_a-IsolationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种隔离规范
    en: is an isolation specification
    ja: isolation specification の一種
  definitions:
    zh: ProcessPolicy 通过此分类边继承 IsolationSpecification 的版本、适用环境和执行器要求，并增加程序、身份、命名空间、能力、系统调用和资源上限种差。
    en: ProcessPolicy inherits IsolationSpecification's version, applicable-environment, and enforcer requirements and adds executable, identity, namespace, capability, syscall, and resource-limit differentia.
    ja: ProcessPolicy は IsolationSpecification の version・environment・enforcer 要件を継承し executable・identity・namespace・capability・syscall・resource-limit 種差を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ProcessPolicy-is_a-IsolationSpecification-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 进程边界继承隔离规范
        en: Process boundary inherits isolation specification
        ja: process boundary の継承
      scenario_id: sandbox-review-processpolicy-is_a-isolationspecification-positive
      descriptions:
        zh: proc-python@2 具规范身份与执行器，并固定 namespace、capability、seccomp 和资源限制。
        en: proc-python@2 has specification identity and enforcer and fixes namespaces, capabilities, seccomp, and resource limits.
        ja: proc-python@2 は specification identity/enforcer と namespace・capability・seccomp・resource limit を持ちます。
      field_values: {}
      related_node_ids:
        - ProcessPolicy
        - IsolationSpecification
      related_relation_ids:
        - ProcessPolicy-is_a-IsolationSpecification
      expected_result:
        zh: 建立 ProcessPolicy→IsolationSpecification 的 is_a 边。
        en: Assert the ProcessPolicy-to-IsolationSpecification is_a edge.
        ja: ProcessPolicy→IsolationSpecification is_a 辺を主張します。
      why_valid_or_invalid:
        zh: 对象满足通用规范身份并增加进程隔离种差。
        en: The object satisfies general specification identity and adds process-isolation differentia.
        ja: general specification identity を満たし process-isolation 種差を追加します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-process-policy-001
        - claim-process-policy-002
    - id: ProcessPolicy-is_a-IsolationSpecification-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 运行中进程不是策略
        en: Running process is not a policy
        ja: running process は policy でない
      scenario_id: sandbox-review-processpolicy-is_a-isolationspecification-boundary
      descriptions:
        zh: process-991 有 PID、命令与退出状态，但没有规范版本或声明性约束。
        en: process-991 has PID, command, and exit status but no specification revision or declarative constraints.
        ja: process-991 は PID・command・exit status を持ちますが specification revision/declarative constraint はありません。
      field_values: {}
      related_node_ids:
        - ProcessPolicy
        - IsolationSpecification
      related_relation_ids:
        - ProcessPolicy-is_a-IsolationSpecification
      expected_result:
        zh: 保持为进程实例，不建立分类边。
        en: Keep it as a process instance and do not assert classification.
        ja: process instance のままとし classification を主張しません。
      why_valid_or_invalid:
        zh: 活动实例与约束它的规范属于不同语义种类。
        en: An activity instance and its governing specification are different semantic kinds.
        ja: activity instance と governing specification は異なる semantic kind です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-process-policy-002
  source_claims:
    - claim-process-policy-001
    - claim-process-policy-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
