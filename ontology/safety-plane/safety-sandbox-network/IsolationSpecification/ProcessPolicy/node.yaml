schema: moonweave.ai/ontology-node/v1
id: ProcessPolicy
kind: concept
labels:
  zh: 进程策略
  en: process policy
  ja: プロセス方針
semantics:
  short_definition:
    zh: IsolationSpecification 内对进程能力、seccomp、cgroup 与隔离后端的规范。
    en: The specification within IsolationSpecification for process capabilities, seccomp, cgroups, and isolation backend.
    ja: IsolationSpecification 内の process capability/seccomp/cgroup/isolation backend specification。
  definition:
    zh: ProcessPolicy 以 proc_policy_id+version 声明 capability_drop、seccomp_profile_ref、cgroup_limits、namespace_set 与 isolation_backend（runc/gVisor/Firecracker）。它映射 Docker --cap-drop=ALL、OCI seccomp、E2B process limits 与 gVisor runsc；ProcessPolicy 是规范，ProcessHandle 是运行进程实例。
    en: ProcessPolicy declares capability_drop, seccomp_profile_ref, cgroup_limits, namespace_set, and isolation_backend (runc/gVisor/Firecracker) via proc_policy_id+version. It maps Docker --cap-drop=ALL, OCI seccomp, E2B process limits, and gVisor runsc; ProcessPolicy is specification, ProcessHandle is running process instance.
    ja: ProcessPolicy は proc_policy_id+version で capability_drop/seccomp_profile_ref/cgroup_limits/namespace_set/isolation_backend(runc/gVisor/Firecracker) を宣言。Docker --cap-drop=ALL、OCI seccomp、E2B process limit、gVisor runsc を写像。ProcessPolicy は spec、ProcessHandle は running instance。
  why_needed:
    zh: 进程隔离层与文件系统层正交；缺少 ProcessPolicy 无法审计 seccomp 加载失败回退。
    en: Process isolation is orthogonal to filesystem layer; without ProcessPolicy seccomp load-failure fallback cannot be audited.
    ja: process isolation は filesystem layer と直交。ProcessPolicy なし seccomp load failure fallback 監査不可。
  includes:
    - zh: 可执行文件与参数规则、用户/组、环境变量、命名空间、capability、seccomp/LSM 与 CPU/内存/PID 上限。
      en: Executable and argument rules, user/group, environment, namespaces, capabilities, seccomp/LSM, and CPU/memory/PID limits.
      ja: executable/argument rule・user/group・environment・namespace・capability・seccomp/LSM・CPU/memory/PID limit。
  excludes:
    - zh: 文件路径与挂载规则、网络目的地、业务授权、运行中的进程句柄和命令结果。
      en: Filesystem path and mount rules, network destinations, business authorization, running process handles, and command results.
      ja: filesystem path/mount rule・network destination・business authorization・running process handle・command result。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: gVisor `runsc` 与 Firecracker microVM 写入 isolation_backend；Docker `--cap-drop=ALL --security-opt seccomp=`→ProcessPolicy；seccomp 加载失败不得建立 Sandbox-constrained_by，应记录 configuration-failure 证据。
    en: Record gVisor runsc and Firecracker microVM in isolation_backend; Docker --cap-drop=ALL --security-opt seccomp=→ProcessPolicy; seccomp load failure must not assert Sandbox-constrained_by—record configuration-failure evidence.
    ja: gVisor runsc/Firecracker→isolation_backend。Docker --cap-drop=ALL+seccomp→ProcessPolicy。seccomp load failure 時 Sandbox-constrained_by 不可、configuration-failure 証拠記録。
  typical_input:
    - description: gVisor runsc runtime.
      format: docker run --runtime=runsc ...
      source_claims:
        - claim-process-policy-design
    - description: Docker cap drop + seccomp.
      format: docker run --cap-drop=ALL --security-opt seccomp=profile.json
      source_claims:
        - claim-process-policy-design
  typical_output:
    - description: Process policy record.
      format: '{"proc_policy_id":"proc-python","version":"2","isolation_backend":"gvisor","capability_drop":["ALL"]}'
      source_claims:
        - claim-process-policy-design
  reference_implementations:
    - name: E2B Sandbox API
      url: https://e2b.dev/docs
      description: Cloud sandbox templates and lifecycle.
    - name: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      description: Docker --read-only, namespaces, seccomp.
    - name: gVisor runsc
      url: https://gvisor.dev/docs/
      description: Application-kernel sandbox isolation.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: workspace-write and allowlist layering.
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: executable_rule_set
      labels:
        zh: 可执行规则集
        en: executable rule set
        ja: executable rule set
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可启动程序、参数约束与工作目录条件。
        en: Declares launchable programs, argument constraints, and working-directory conditions.
        ja: launch 可能 program・argument constraint・working-directory condition を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        allow:
          - /usr/bin/python3
        deny_shell: true
      source_claims:
        - claim-process-policy-design
        - claim-process-policy-design
    - id: namespace_profile
      labels:
        zh: 命名空间配置
        en: namespace profile
        ja: namespace profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明进程是否创建或加入 PID、mount、user、IPC、network 与 cgroup 命名空间。
        en: Declares whether the process creates or joins PID, mount, user, IPC, network, and cgroup namespaces.
        ja: process が PID・mount・user・IPC・network・cgroup namespace を create/join する方法を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        pid: new
        mount: new
        user: new
        network: inherit
      source_claims:
        - claim-process-policy-design
    - id: capability_and_syscall_profile
      labels:
        zh: 能力与系统调用配置
        en: capability and syscall profile
        ja: capability/syscall profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明保留/删除的进程能力与 seccomp 或 LSM 执行配置。
        en: Declares retained/dropped process capabilities and seccomp or LSM enforcement profiles.
        ja: retained/dropped capability と seccomp/LSM enforcement profile を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        drop:
          - ALL
        seccomp: runtime-default
      source_claims:
        - claim-process-policy-design
        - claim-process-policy-design
    - id: resource_limit_profile
      labels:
        zh: 资源上限配置
        en: resource-limit profile
        ja: resource-limit profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 CPU、内存、进程数、文件描述符和执行时长上限。
        en: Declares CPU, memory, process-count, file-descriptor, and execution-duration limits.
        ja: CPU・memory・process count・file descriptor・execution duration limit を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        memory_bytes: 536870912
        pids: 64
        timeout_seconds: 120
      source_claims:
        - claim-process-policy-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProcessPolicy-gvisor-runsc
    labels:
      zh: gVisor runsc 进程策略
      en: gVisor runsc process policy
      ja: gVisor runsc process policy
    descriptions:
      zh: proc-gvisor@1 isolation_backend=gvisor，sentry 隔离 syscall 面。
      en: proc-gvisor@1 isolation_backend=gvisor with sentry-isolated syscall surface.
      ja: proc-gvisor@1 isolation_backend=gvisor、sentry syscall isolation。
    example_source:
      product: gVisor
      url: https://gvisor.dev/docs/
      version: runsc runtime
    field_values:
      proc_policy_id: proc-gvisor
      version: "1"
      isolation_backend: gvisor
    related_node_ids:
      - ProcessPolicy
      - IsolationSpecification
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-process-policy-design
  - id: ProcessPolicy-docker-seccomp
    labels:
      zh: Docker seccomp 进程策略
      en: Docker seccomp process policy
      ja: Docker seccomp process policy
    descriptions:
      zh: proc-python@2 加载 seccomp-bpf.json，cap-drop ALL。
      en: proc-python@2 loads seccomp-bpf.json with cap-drop ALL.
      ja: proc-python@2 seccomp-bpf.json+cap-drop ALL。
    example_source:
      product: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      version: seccomp profile
    field_values:
      proc_policy_id: proc-python
      version: "2"
    related_node_ids:
      - ProcessPolicy
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-process-policy-design
  - id: ProcessPolicy-e2b-limits
    labels:
      zh: E2B 进程限制策略
      en: E2B process limit policy
      ja: E2B process limit policy
    descriptions:
      zh: proc-e2b@1 限制 CPU/内存与子进程数，映射 E2B template。
      en: proc-e2b@1 limits CPU/memory and child processes per E2B template.
      ja: proc-e2b@1 E2B template CPU/memory/子 process 制限。
    example_source:
      product: E2B Sandbox API
      url: https://e2b.dev/docs
      version: process limits
    field_values:
      proc_policy_id: proc-e2b
      version: "1"
    related_node_ids:
      - ProcessPolicy
      - IsolationSpecification
    related_relation_ids: []
    source_claims:
      - claim-process-policy-design
  - id: ProcessPolicy-boundary-loadfail
    labels:
      zh: seccomp 加载失败不约束
      en: Seccomp load failure no constraint
      ja: seccomp load failure は constrained_by 不可
    descriptions:
      zh: proc-python@3 配置存在但 sandbox-run-886 seccomp 加载失败回退 unconfined，不得 constrained_by。
      en: proc-python@3 exists in config but sandbox-run-886 seccomp load failed to unconfined—no constrained_by.
      ja: proc-python@3 設定ありも sandbox-run-886 seccomp load failure→unconfined、constrained_by 不可。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: load versus available
    field_values: {}
    related_node_ids:
      - ProcessPolicy
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-process-policy-design
parent_relation:
  id: ProcessPolicy-is_a-IsolationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种隔离规范
    en: is an isolation specification
    ja: isolation specification の一種
  definitions:
    zh: ProcessPolicy 通过此分类边继承 IsolationSpecification 的版本、适用环境和执行器要求，并增加程序、身份、命名空间、能力、系统调用和资源上限种差。
    en: ProcessPolicy inherits IsolationSpecification's version, applicable-environment, and enforcer requirements and adds executable, identity, namespace, capability, syscall, and resource-limit differentia.
    ja: ProcessPolicy は IsolationSpecification の version・environment・enforcer 要件を継承し executable・identity・namespace・capability・syscall・resource-limit 種差を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-process-policy-design
    - claim-process-policy-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
