schema: moonweave.ai/ontology-node/v1
id: ProcessPolicy
kind: concept
status: accepted
labels:
  zh: 进程策略
  en: process policy
  ja: プロセス方針
semantics:
  short_definition:
    zh: 限定沙箱进程启动、命名空间、能力、系统调用与资源的隔离规范。
    en: An isolation specification limiting sandbox process launch, namespaces, capabilities, syscalls, and resources.
    ja: sandbox process launch・namespace・capability・syscall・resource を制限する isolation specification。
  definition:
    zh: 进程策略是一种 IsolationSpecification，以允许的可执行文件与参数、环境暴露、用户身份、命名空间、Linux capabilities、seccomp/LSM 配置和 cgroup 资源上限为区分特征。它约束进程如何运行，不决定文件路径内容的读写权限，也不是某次 ProcessHandle。
    en: A ProcessPolicy is an IsolationSpecification distinguished by allowed executables and arguments, environment exposure, user identity, namespaces, Linux capabilities, seccomp/LSM profiles, and cgroup resource limits. It constrains how a process runs, not filesystem-content permissions, and it is not one ProcessHandle.
    ja: ProcessPolicy は allowed executable/argument・environment exposure・user identity・namespace・Linux capability・seccomp/LSM profile・cgroup resource limit で区別する IsolationSpecification です。process の run 方法を制約し filesystem content permission や個別 ProcessHandle ではありません。
  why_needed:
    zh: 把执行允许条件与具体进程实例分离，才能在启动前验证最小权限并在运行后核对实际配置。
    en: It separates launch constraints from concrete process instances so least privilege can be checked before start and effective configuration audited afterward.
    ja: launch constraint と concrete process instance を分け start 前 least privilege 検証と実行後 effective config audit を可能にします。
  includes:
    - zh: 可执行文件与参数规则、用户/组、环境变量、命名空间、capability、seccomp/LSM 与 CPU/内存/PID 上限。
      en: Executable and argument rules, user/group, environment, namespaces, capabilities, seccomp/LSM, and CPU/memory/PID limits.
      ja: executable/argument rule・user/group・environment・namespace・capability・seccomp/LSM・CPU/memory/PID limit。
  excludes:
    - zh: 文件路径与挂载规则、网络目的地、业务授权、运行中的进程句柄和命令结果。
      en: Filesystem path and mount rules, network destinations, business authorization, running process handles, and command results.
      ja: filesystem path/mount rule・network destination・business authorization・running process handle・command result。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: executable_rule_set
      labels:
        zh: 可执行规则集
        en: executable rule set
        ja: executable rule set
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明可启动程序、参数约束与工作目录条件。
        en: Declares launchable programs, argument constraints, and working-directory conditions.
        ja: launch 可能 program・argument constraint・working-directory condition を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        allow:
          - /usr/bin/python3
        deny_shell: true
      source_claims:
        - claim-process-policy-001
        - claim-process-policy-002
    - id: namespace_profile
      labels:
        zh: 命名空间配置
        en: namespace profile
        ja: namespace profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明进程是否创建或加入 PID、mount、user、IPC、network 与 cgroup 命名空间。
        en: Declares whether the process creates or joins PID, mount, user, IPC, network, and cgroup namespaces.
        ja: process が PID・mount・user・IPC・network・cgroup namespace を create/join する方法を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        pid: new
        mount: new
        user: new
        network: inherit
      source_claims:
        - claim-process-policy-002
    - id: capability_and_syscall_profile
      labels:
        zh: 能力与系统调用配置
        en: capability and syscall profile
        ja: capability/syscall profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明保留/删除的进程能力与 seccomp 或 LSM 执行配置。
        en: Declares retained/dropped process capabilities and seccomp or LSM enforcement profiles.
        ja: retained/dropped capability と seccomp/LSM enforcement profile を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        drop:
          - ALL
        seccomp: runtime-default
      source_claims:
        - claim-process-policy-001
        - claim-process-policy-002
    - id: resource_limit_profile
      labels:
        zh: 资源上限配置
        en: resource-limit profile
        ja: resource-limit profile
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明 CPU、内存、进程数、文件描述符和执行时长上限。
        en: Declares CPU, memory, process-count, file-descriptor, and execution-duration limits.
        ja: CPU・memory・process count・file descriptor・execution duration limit を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        memory_bytes: 536870912
        pids: 64
        timeout_seconds: 120
      source_claims:
        - claim-process-policy-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: process-policy-e2b
    labels:
      zh: 进程策略 - E2B 沙箱 VM
      en: process policy - E2B sandbox VM
      ja: プロセス方針 - E2B サンドボックス VM
    descriptions: {zh: "进程策略(ProcessPolicy) [ProcessPolicy]: 限定沙箱进程启动、命名空间、能力、系统调用与资源的隔离规范。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: ProcessPolicy.", en: "process policy (ProcessPolicy) [ProcessPolicy]: An isolation specification limiting sandbox process launch, namespaces, capabilities, syscalls, and resources.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include ProcessPolicy.", ja: "プロセス方針(ProcessPolicy) [ProcessPolicy]: sandbox process launch・namespace・capability・syscall・resource を制限する isolation specification。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: ProcessPolicy."}
    field_values: {}
    related_node_ids:
      - IsolationSpecification
      - ProcessPolicy
    related_relation_ids:
      - claim-process-policy-001
      - claim-process-policy-002
      - IsolationSpecification
      - ProcessPolicy
      - ProcessPolicy-is_a-IsolationSpecification
    example_source: E2B Sandbox API
    source_claims:
      - claim-process-policy-001
  - id: process-policy-firecracker
    labels:
      zh: 进程策略 - Firecracker microVM 隔离
      en: process policy - Firecracker microVM isolation
      ja: プロセス方針 - Firecracker microVM 分離
    descriptions: {zh: "进程策略(ProcessPolicy) [ProcessPolicy]: 限定沙箱进程启动、命名空间、能力、系统调用与资源的隔离规范。. AWS Firecracker microVM 以最小开销隔离 Lambda 与 Fargate 工作负载。 Fields: ProcessPolicy.", en: "process policy (ProcessPolicy) [ProcessPolicy]: An isolation specification limiting sandbox process launch, namespaces, capabilities, syscalls, and resources.. AWS Firecracker microVMs isolate Lambda and Fargate workloads with minimal overhead (firecracker-microvm.github.io). Fields include ProcessPolicy.", ja: "プロセス方針(ProcessPolicy) [ProcessPolicy]: sandbox process launch・namespace・capability・syscall・resource を制限する isolation specification。. AWS Firecracker microVM は Lambda/Fargate workload を minimal overhead で isolate する。 Fields: ProcessPolicy."}
    field_values: {}
    related_node_ids:
      - IsolationSpecification
      - ProcessPolicy
    related_relation_ids:
      - claim-process-policy-001
      - claim-process-policy-002
      - IsolationSpecification
      - ProcessPolicy
      - ProcessPolicy-is_a-IsolationSpecification
    example_source: AWS Firecracker
    source_claims:
      - claim-process-policy-001
  - id: process-policy-gvisor_runsc
    labels:
      zh: 进程策略 - gVisor runsc 内核沙箱
      en: process policy - gVisor runsc kernel sandbox
      ja: プロセス方針 - gVisor runsc カーネル sandbox
    descriptions: {zh: "进程策略(ProcessPolicy) [ProcessPolicy]: 限定沙箱进程启动、命名空间、能力、系统调用与资源的隔离规范。. gVisor runsc 通过 user-space kernel Sentry 拦截 syscall，Docker/Kubernetes 可用 runtime=runsc 运行容器，限制内核攻击面（gvisor.dev/docs）。 Fields: ProcessPolicy.", en: "process policy (ProcessPolicy) [ProcessPolicy]: An isolation specification limiting sandbox process launch, namespaces, capabilities, syscalls, and resources.. gVisor runsc intercepts syscalls via user-space kernel Sentry; Docker/Kubernetes can run containers with runtime=runsc to limit kernel attack surface (gvisor.dev/docs). Fields include ProcessPolicy.", ja: "プロセス方針(ProcessPolicy) [ProcessPolicy]: sandbox process launch・namespace・capability・syscall・resource を制限する isolation specification。. gVisor runsc は user-space kernel Sentry で syscall を intercept し runtime=runsc で kernel 攻撃面を制限する。 Fields: ProcessPolicy."}
    field_values: {}
    related_node_ids:
      - IsolationSpecification
      - ProcessPolicy
    related_relation_ids:
      - claim-process-policy-001
      - claim-process-policy-002
      - IsolationSpecification
      - ProcessPolicy
      - ProcessPolicy-is_a-IsolationSpecification
    example_source: gVisor runsc
    source_claims:
      - claim-process-policy-001
  - id: process-policy-docker_network_none
    labels:
      zh: 进程策略 - Docker 网络隔离
      en: process policy - Docker network isolation
      ja: プロセス方針 - Docker ネットワーク分離
    descriptions: {zh: "进程策略(ProcessPolicy) [ProcessPolicy]: 限定沙箱进程启动、命名空间、能力、系统调用与资源的隔离规范。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: ProcessPolicy.", en: "process policy (ProcessPolicy) [ProcessPolicy]: An isolation specification limiting sandbox process launch, namespaces, capabilities, syscalls, and resources.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include ProcessPolicy.", ja: "プロセス方針(ProcessPolicy) [ProcessPolicy]: sandbox process launch・namespace・capability・syscall・resource を制限する isolation specification。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: ProcessPolicy."}
    field_values: {}
    related_node_ids:
      - IsolationSpecification
      - ProcessPolicy
    related_relation_ids:
      - claim-process-policy-001
      - claim-process-policy-002
      - IsolationSpecification
      - ProcessPolicy
      - ProcessPolicy-is_a-IsolationSpecification
    example_source: Docker network none
    source_claims:
      - claim-process-policy-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: FilesystemPolicy
    shared_parent_concept_id: IsolationSpecification
    differentia:
      zh: ProcessPolicy 约束程序、身份、命名空间、能力、系统调用与资源；FilesystemPolicy 约束路径、挂载与文件操作。二者共同收窄沙箱，但端点和判定输入不同。
      en: ProcessPolicy constrains program, identity, namespaces, capabilities, syscalls, and resources; FilesystemPolicy constrains paths, mounts, and file operations. Both narrow a sandbox, but their decision inputs and endpoints differ.
      ja: ProcessPolicy は program・identity・namespace・capability・syscall・resource、FilesystemPolicy は path・mount・file operation を制約し decision input/endpoint が異なります。
    source_claims:
      - claim-process-policy-002
      - claim-process-policy-003
