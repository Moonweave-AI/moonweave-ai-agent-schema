    locator: Process policy boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-process-policy-design
    source: gvisor-docs
    supports: gVisor runsc maps to ProcessPolicy with isolation_backend=gvisor.
    locator: runsc backend
    evidence_kind: design-inference
    confidence: high
  - id: claim-process-policy-design
    source: oci-linux-runtime
    supports: Docker cap-drop and seccomp profiles map to ProcessPolicy fields.
    locator: OCI seccomp
