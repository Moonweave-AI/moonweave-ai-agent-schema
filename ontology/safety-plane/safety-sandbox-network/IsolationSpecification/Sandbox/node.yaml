schema: moonweave.ai/ontology-node/v1
id: Sandbox
kind: concept
status: review
labels:
  en: sandbox
  zh: 沙箱
  ja: サンドボックス
semantics:
  short_definition:
    zh: 在具名隔离规范下运行进程的具体执行边界实例。
    en: A concrete execution-boundary instance running processes under named isolation specifications.
    ja: named isolation specification 下で process を実行する concrete boundary instance。
  definition:
    zh: 沙箱是一种具名执行边界实体，以 sandbox_id、实际运行环境、创建时间和强制证据为身份，承载受进程与文件系统规范约束的一个或多个进程。它是规范的运行实例，不是 IsolationSpecification、Container 类型定义或网络代理。
    en: A Sandbox is a named execution-boundary Entity identified by sandbox_id, actual runtime environment, creation time, and enforcement evidence, hosting one or more processes constrained by process and filesystem specifications. It is a running instance of constraints, not an IsolationSpecification, Container type definition, or network proxy.
    ja: Sandbox は sandbox_id・actual runtime environment・creation time・enforcement evidence で識別する named execution-boundary Entity で、process/filesystem specification に制約された process を収容します。constraint の running instance であり IsolationSpecification・Container type definition・network proxy ではありません。
  why_needed:
    zh: 规范只能说明应做什么；Sandbox 把具体实例、实际环境和已加载版本连接起来，才能审计某次执行真正受到哪些约束。
    en: Specifications state what should happen; Sandbox links a concrete instance, actual environment, and loaded versions so effective constraints can be audited.
    ja: specification は要件だけを示し Sandbox が concrete instance・actual environment・loaded version を結び effective constraint を audit できます。
  includes:
    - zh: 沙箱标识、实际环境引用、创建时间、强制证据及已加载隔离规范版本。
      en: Sandbox ID, actual environment reference, creation time, enforcement evidence, and loaded isolation-specification revisions.
      ja: sandbox ID・actual environment reference・creation time・enforcement evidence・loaded isolation specification revision。
  excludes:
    - zh: 隔离规范文本、容器类别、单个 ProcessHandle、网络代理、一次 ToolCall 与一般工作目录。
      en: Isolation-specification text, Container class, one ProcessHandle, network proxy, one ToolCall, and an ordinary working directory.
      ja: isolation specification text・Container class・個別 ProcessHandle・network proxy・ToolCall・ordinary working directory。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - sandbox_id
  fields:
    - id: sandbox_id
      labels:
        zh: 沙箱标识
        en: sandbox ID
        ja: sandbox ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一份具体隔离执行边界实例。
        en: Identifies one concrete isolated execution-boundary instance.
        ja: 一 concrete isolated execution-boundary instance を識別します。
      allowed_values: []
      pattern: null
      example_value: sandbox-run-884
      source_claims:
        - claim-sandbox-001
    - id: runtime_environment_ref
      labels:
        zh: 运行环境引用
        en: runtime environment reference
        ja: runtime environment reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向承载该沙箱的实际 RuntimeEnvironment 或 Container 实例。
        en: References the actual RuntimeEnvironment or Container instance hosting the sandbox.
        ja: sandbox を host する actual RuntimeEnvironment/Container instance を参照します。
      allowed_values: []
      pattern: null
      example_value: container-884
      source_claims:
        - claim-sandbox-002
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: created at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 隔离边界开始对所承载进程生效的时间。
        en: Time at which the boundary began enforcing constraints on hosted processes.
        ja: boundary が hosted process に constraint を enforce し始めた時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T06:30:00Z
      source_claims:
        - claim-sandbox-002
    - id: enforcement_evidence_ref
      labels:
        zh: 强制证据引用
        en: enforcement evidence reference
        ja: enforcement evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向证明命名空间、挂载、capability、seccomp/LSM 与资源限制已实际加载的记录。
        en: References evidence that namespaces, mounts, capabilities, seccomp/LSM, and resource limits were actually loaded.
        ja: namespace・mount・capability・seccomp/LSM・resource limit が実 load された evidence を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-isolation-884
      source_claims:
        - claim-sandbox-001
        - claim-sandbox-002
  constraints: []
  required_relation_constraints:
    - id: sandbox-has-isolation-specification
      direction: outgoing
      predicate: constrained_by
      target_concept_id: IsolationSpecification
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个 Sandbox 必须指出实际加载的至少一个隔离规范版本。
        en: Every Sandbox must identify at least one actually loaded isolation-specification revision.
        ja: 各 Sandbox は実 load した一以上の isolation-specification revision を示します。
      source_claims:
        - claim-sandbox-001
        - claim-sandbox-002
examples:
  - id: Sandbox-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 受双策略约束的沙箱实例
      en: Sandbox instance under two policies
      ja: 二 policy 下の sandbox instance
    scenario_id: null
    descriptions:
      zh: sandbox-run-884 位于 container-884，创建记录证明加载 fs-code@4 与 proc-python@2，namespace、mount、capability 与 seccomp 状态均有审计证据。
      en: sandbox-run-884 runs in container-884, and creation evidence proves fs-code@4 and proc-python@2 were loaded with audited namespace, mount, capability, and seccomp state.
      ja: sandbox-run-884 は container-884 内で fs-code@4/proc-python@2 を load し namespace・mount・capability・seccomp state の audit evidence を持ちます。
    field_values:
      sandbox_id: sandbox-run-884
      runtime_environment_ref: container-884
      created_at: 2026-07-16T06:30:00Z
      enforcement_evidence_ref: audit-isolation-884
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
      - ProcessPolicy
      - IsolationSpecification
    related_relation_ids:
      - Sandbox-constrained_by-IsolationSpecification
    expected_result:
      zh: 识别为一个 Sandbox 实例，并返回实际加载的两份规范版本。
      en: Classify as one Sandbox instance and return both actually loaded specification revisions.
      ja: 一 Sandbox instance と分類し実 load 済み二 specification revision を返します。
    why_valid_or_invalid:
      zh: 记录同时具有实例身份、实际环境、生命周期起点和可核查强制证据。
      en: The record has instance identity, actual environment, lifecycle start, and auditable enforcement evidence.
      ja: instance identity・actual environment・lifecycle start・auditable enforcement evidence を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sandbox-001
      - claim-sandbox-002
  - id: Sandbox-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 尚未实例化的容器配置
      en: Uninstantiated container configuration
      ja: 未 instance 化 container config
    scenario_id: sandbox-review-sandbox-boundary
    descriptions:
      zh: config.json 声明 namespace 与 mount，但没有 sandbox_id、实际运行环境、创建时间或加载证据。
      en: config.json declares namespaces and mounts but has no sandbox_id, actual runtime environment, creation time, or loading evidence.
      ja: config.json は namespace/mount を宣言しますが sandbox_id・actual environment・creation time・load evidence がありません。
    field_values: {}
    related_node_ids:
      - Sandbox
      - IsolationSpecification
    related_relation_ids: []
    expected_result:
      zh: 保留为规范或部署配置，不创建 Sandbox 实例。
      en: Keep it as a specification or deployment configuration and do not create a Sandbox instance.
      ja: specification/deployment config とし Sandbox instance を作りません。
    why_valid_or_invalid:
      zh: 声明的配置还没有成为具名且可观察的执行边界实例。
      en: Declared configuration has not become a named, observable execution-boundary instance.
      ja: declared config は named/observable execution-boundary instance になっていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sandbox-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Sandbox-constrained_by-IsolationSpecification
  predicate: constrained_by
  direction: source-to-target
  relation_kind: governance
  labels:
    zh: 受隔离规范约束
    en: constrained by isolation specification
    ja: isolation specification に制約される
  definitions:
    zh: Sandbox 通过此关系指向创建时实际加载并在其生命周期内强制执行的具体 IsolationSpecification 版本；仅被推荐、可用或计划应用的规范不能建立该事实。
    en: Sandbox points to the exact IsolationSpecification revision actually loaded at creation and enforced through its lifetime; a recommended, available, or planned specification is insufficient.
    ja: Sandbox は creation 時に実 load され lifecycle 中 enforce される exact IsolationSpecification revision を指し、recommended/available/planned specification だけでは成立しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: constrains_sandbox
    labels:
      zh: 约束沙箱
      en: constrains sandbox
      ja: サンドボックスを制約する
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Sandbox-constrained_by-IsolationSpecification-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 创建证据绑定规范版本
        en: Creation evidence binds specification revision
        ja: creation evidence が specification revision を結合
      scenario_id: sandbox-review-sandbox-constrained_by-isolationspecification-positive
      descriptions:
        zh: sandbox-run-884 的创建审计记录 fs-code@4 与 proc-python@2 的摘要及成功加载状态。
        en: sandbox-run-884 creation audit records fs-code@4 and proc-python@2 digests and successful load status.
        ja: sandbox-run-884 creation audit は fs-code@4/proc-python@2 digest と successful load status を記録します。
      field_values: {}
      related_node_ids:
        - Sandbox
        - IsolationSpecification
      related_relation_ids:
        - Sandbox-constrained_by-IsolationSpecification
      expected_result:
        zh: 为两份实际加载版本各建立 constrained_by 边。
        en: Assert one constrained_by edge for each loaded revision.
        ja: 各 loaded revision に constrained_by 辺を主張します。
      why_valid_or_invalid:
        zh: 实例证据证明具体版本已生效而非仅存在。
        en: Instance evidence proves exact revisions were enforced rather than merely present.
        ja: instance evidence が exact revision の enforcement を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-sandbox-001
        - claim-sandbox-002
    - id: Sandbox-constrained_by-IsolationSpecification-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 配置存在但加载失败
        en: Specification present but load failed
        ja: specification は存在するが load failed
      scenario_id: sandbox-review-sandbox-constrained_by-isolationspecification-boundary
      descriptions:
        zh: proc-python@3 位于配置目录，但 sandbox-run-886 启动日志显示 seccomp 配置加载失败并回退到未限制模式。
        en: proc-python@3 is in the configuration directory, but sandbox-run-886 logs show seccomp loading failed and execution fell back to unconfined mode.
        ja: proc-python@3 は config directory にありますが sandbox-run-886 log は seccomp load failure と unconfined fallback を示します。
      field_values: {}
      related_node_ids:
        - Sandbox
        - IsolationSpecification
      related_relation_ids:
        - Sandbox-constrained_by-IsolationSpecification
      expected_result:
        zh: 不得建立 constrained_by，并产生配置失败证据。
        en: Do not assert constrained_by and record configuration-failure evidence.
        ja: constrained_by を主張せず configuration-failure evidence を記録します。
      why_valid_or_invalid:
        zh: 可用配置不等于实际强制；回退模式明确否定该事实。
        en: Available configuration is not actual enforcement, and fallback explicitly falsifies the fact.
        ja: available config は actual enforcement でなく fallback が事実を否定します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-sandbox-002
  source_claims:
    - claim-sandbox-001
    - claim-sandbox-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
