schema: moonweave.ai/ontology-node/v1
id: Sandbox
kind: concept
labels:
  en: sandbox
  zh: 沙箱
  ja: サンドボックス
semantics:
  short_definition:
    zh: 在具名 IsolationSpecification 下运行进程的具体隔离执行实例。
    en: A concrete isolated execution instance running processes under named IsolationSpecification revisions.
    ja: named IsolationSpecification revision 下で process を実行する concrete isolated execution instance。
  definition:
    zh: Sandbox 以 sandbox_id、runtime_environment_ref、created_at 与 enforcement_evidence_ref 标识实际加载隔离规范的运行边界。它映射 E2B Sandbox.create() 返回的云沙箱、Docker container with --read-only/--cap-drop、gVisor runsc 容器与 Cursor terminal sandbox 会话；是规范的运行实例，不是 IsolationSpecification 文本或 NetworkProxy。
    en: Sandbox is identified by sandbox_id, runtime_environment_ref, created_at, and enforcement_evidence_ref as a running boundary that actually loaded isolation specifications. It maps E2B Sandbox.create() cloud sandboxes, Docker containers with --read-only/--cap-drop, gVisor runsc containers, and Cursor terminal sandbox sessions; it is a running instance, not IsolationSpecification text or NetworkProxy.
    ja: Sandbox は sandbox_id/runtime_environment_ref/created_at/enforcement_evidence_ref で actual loaded isolation spec の running boundary を識別。E2B Sandbox.create()、Docker --read-only/--cap-drop、gVisor runsc、Cursor terminal sandbox session を写像。IsolationSpecification 文本/NetworkProxy ではない。
  why_needed:
    zh: 规范说明应做什么；Sandbox 连接具体实例、环境与已加载版本，才能审计某次执行实际受到哪些约束。
    en: Specifications state what should happen; Sandbox links concrete instance, environment, and loaded revisions to audit effective constraints on an execution.
    ja: spec は要件を示す。Sandbox が instance/environment/loaded revision を結び execution の effective constraint を監査可能にする。
  includes:
    - zh: 沙箱标识、实际环境引用、创建时间、强制证据及已加载隔离规范版本。
      en: Sandbox ID, actual environment reference, creation time, enforcement evidence, and loaded isolation-specification revisions.
      ja: sandbox ID・actual environment reference・creation time・enforcement evidence・loaded isolation specification revision。
  excludes:
    - zh: 隔离规范文本、容器类别、单个 ProcessHandle、网络代理、一次 ToolCall 与一般工作目录。
      en: Isolation-specification text, Container class, one ProcessHandle, network proxy, one ToolCall, and an ordinary working directory.
      ja: isolation specification text・Container class・個別 ProcessHandle・network proxy・ToolCall・ordinary working directory。
  semantic_kind: entity
  aliases: []
engineering:
  explanation:
    zh: E2B sandbox ID→sandbox_id；Docker container ID→runtime_environment_ref；创建审计记录 namespace/mount/capability/seccomp 状态→enforcement_evidence_ref。Sandbox-constrained_by 仅当 load 成功；推荐/计划 spec 不足。
    en: E2B sandbox ID→sandbox_id; Docker container ID→runtime_environment_ref; creation audit of namespace/mount/capability/seccomp→enforcement_evidence_ref. Sandbox-constrained_by only on successful load; recommended/planned spec insufficient.
    ja: E2B sandbox ID→sandbox_id。Docker container ID→runtime_environment_ref。creation audit→enforcement_evidence_ref。Sandbox-constrained_by は load 成功時のみ。recommended/planned spec 不十分。
  typical_input:
    - description: E2B sandbox instance.
      format: sandbox = Sandbox.create(template="code-interpreter-v1")
      source_claims:
        - claim-sandbox-design
    - description: Docker hardened container.
      format: docker run --read-only --cap-drop=ALL --security-opt seccomp=...
      source_claims:
        - claim-sandbox-design
  typical_output:
    - description: Sandbox with loaded specs.
      format: '{"sandbox_id":"sandbox-run-884","enforcement_evidence_ref":"audit-isolation-884"}'
      source_claims:
        - claim-sandbox-design
  reference_implementations:
    - name: E2B Sandbox API
      url: https://e2b.dev/docs
      description: Cloud sandbox templates and lifecycle.
    - name: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      description: Docker --read-only, namespaces, seccomp.
    - name: gVisor runsc
      url: https://gvisor.dev/docs/
      description: Application-kernel sandbox isolation.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: workspace-write and allowlist layering.
structure:
  identity_keys:
    - sandbox_id
  fields:
    - id: sandbox_id
      labels:
        zh: 沙箱标识
        en: sandbox ID
        ja: sandbox ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一份具体隔离执行边界实例。
        en: Identifies one concrete isolated execution-boundary instance.
        ja: 一 concrete isolated execution-boundary instance を識別します。
      allowed_values: []
      pattern: null
      example_value: sandbox-run-884
      source_claims:
        - claim-sandbox-design
    - id: runtime_environment_ref
      labels:
        zh: 运行环境引用
        en: runtime environment reference
        ja: runtime environment reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向承载该沙箱的实际 RuntimeEnvironment 或 Container 实例。
        en: References the actual RuntimeEnvironment or Container instance hosting the sandbox.
        ja: sandbox を host する actual RuntimeEnvironment/Container instance を参照します。
      allowed_values: []
      pattern: null
      example_value: container-884
      source_claims:
        - claim-sandbox-design
    - id: created_at
      labels:
        zh: 创建时间
        en: created at
        ja: created at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 隔离边界开始对所承载进程生效的时间。
        en: Time at which the boundary began enforcing constraints on hosted processes.
        ja: boundary が hosted process に constraint を enforce し始めた時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T06:30:00Z
      source_claims:
        - claim-sandbox-design
    - id: enforcement_evidence_ref
      labels:
        zh: 强制证据引用
        en: enforcement evidence reference
        ja: enforcement evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向证明命名空间、挂载、capability、seccomp/LSM 与资源限制已实际加载的记录。
        en: References evidence that namespaces, mounts, capabilities, seccomp/LSM, and resource limits were actually loaded.
        ja: namespace・mount・capability・seccomp/LSM・resource limit が実 load された evidence を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-isolation-884
      source_claims:
        - claim-sandbox-design
        - claim-sandbox-design
  constraints: []
  required_relation_constraints:
    - id: sandbox-has-isolation-specification
      direction: outgoing
      predicate: constrained_by
      target_concept_id: IsolationSpecification
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个 Sandbox 必须指出实际加载的至少一个隔离规范版本。
        en: Every Sandbox must identify at least one actually loaded isolation-specification revision.
        ja: 各 Sandbox は実 load した一以上の isolation-specification revision を示します。
      source_claims:
        - claim-sandbox-design
        - claim-sandbox-design
examples:
  - id: Sandbox-e2b-cloud
    labels:
      zh: E2B 云沙箱实例
      en: E2B cloud sandbox instance
      ja: E2B cloud sandbox instance
    descriptions:
      zh: sandbox-run-e2b-884 由 E2B Sandbox.create 创建，加载 agent-sandbox@4。
      en: sandbox-run-e2b-884 created by E2B Sandbox.create loading agent-sandbox@4.
      ja: sandbox-run-e2b-884 E2B Sandbox.create、agent-sandbox@4 load。
    example_source:
      product: E2B Sandbox API
      url: https://e2b.dev/docs
      version: Sandbox.create
    field_values:
      sandbox_id: sandbox-run-e2b-884
      runtime_environment_ref: e2b-sbx-884
    related_node_ids:
      - Sandbox
      - IsolationSpecification
    related_relation_ids:
      - Sandbox-constrained_by-IsolationSpecification
    source_claims:
      - claim-sandbox-design
  - id: Sandbox-docker-hardened
    labels:
      zh: Docker 加固沙箱
      en: Docker hardened sandbox
      ja: Docker hardened sandbox
    descriptions:
      zh: sandbox-run-884 在 container-884 内加载 fs-code@4 与 proc-python@2，审计证明 seccomp 已加载。
      en: sandbox-run-884 in container-884 loads fs-code@4 and proc-python@2 with audited seccomp load.
      ja: sandbox-run-884 container-884 内 fs-code@4/proc-python@2 load、seccomp audit 済。
    example_source:
      product: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      version: read-only cap-drop
    field_values:
      sandbox_id: sandbox-run-884
      runtime_environment_ref: container-884
      enforcement_evidence_ref: audit-isolation-884
    related_node_ids:
      - Sandbox
      - FilesystemPolicy
      - ProcessPolicy
    related_relation_ids: []
    source_claims:
      - claim-sandbox-design
  - id: Sandbox-gvisor-runsc
    labels:
      zh: gVisor runsc 沙箱
      en: gVisor runsc sandbox
      ja: gVisor runsc sandbox
    descriptions:
      zh: sandbox-run-gv-12 使用 runsc runtime，proc-gvisor@1 作为 ProcessPolicy。
      en: sandbox-run-gv-12 uses runsc runtime with proc-gvisor@1 ProcessPolicy.
      ja: sandbox-run-gv-12 runsc runtime、proc-gvisor@1。
    example_source:
      product: gVisor
      url: https://gvisor.dev/docs/
      version: runsc container
    field_values:
      sandbox_id: sandbox-run-gv-12
    related_node_ids:
      - Sandbox
      - ProcessPolicy
    related_relation_ids: []
    source_claims:
      - claim-sandbox-design
  - id: Sandbox-boundary-config-only
    labels:
      zh: 配置未实例化不是沙箱
      en: Uninstantiated config is not sandbox
      ja: 未 instance 化 config は sandbox ではない
    descriptions:
      zh: 仅有 config.json namespace 声明无 sandbox_id/created_at/load 证据时不创建 Sandbox。
      en: config.json with namespace declarations but no sandbox_id/created_at/load evidence does not create Sandbox.
      ja: config.json namespace のみ sandbox_id/created_at/load 証拠なし→Sandbox 不作成。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus instance
    field_values: {}
    related_node_ids:
      - Sandbox
      - IsolationSpecification
    related_relation_ids: []
    source_claims:
      - claim-sandbox-design
parent_relation:
  id: Sandbox-constrained_by-IsolationSpecification
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 受隔离规范约束
    en: constrained by isolation specification
    ja: isolation specification に制約される
  definitions:
    zh: Sandbox 通过此关系指向创建时实际加载并在其生命周期内强制执行的具体 IsolationSpecification 版本；仅被推荐、可用或计划应用的规范不能建立该事实。
    en: Sandbox points to the exact IsolationSpecification revision actually loaded at creation and enforced through its lifetime; a recommended, available, or planned specification is insufficient.
    ja: Sandbox は creation 時に実 load され lifecycle 中 enforce される exact IsolationSpecification revision を指し、recommended/available/planned specification だけでは成立しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 约束沙箱
      en: constrains sandbox
      ja: サンドボックスを制約する
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-sandbox-design
    - claim-sandbox-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: e2b-sandbox-api
    title: E2B Sandbox API
    url: https://e2b.dev/docs
    source_type: official-doc
    relevance: Cloud sandbox lifecycle, filesystem, process, and network isolation templates.
  - id: oci-linux-runtime
    title: OCI Runtime Specification — Linux
    url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
    source_type: standard
    relevance: Namespaces, cgroups, mounts, masked/readonly paths, and seccomp.
  - id: gvisor-docs
    title: gVisor documentation
    url: https://gvisor.dev/docs/
    source_type: official-doc
    relevance: Application-kernel isolation with runsc runtime.
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: Excessive agency and sandbox escape risks for agent tool execution.
  - id: cursor-terminal-sandbox
    title: Cursor Agent Terminal
    url: https://cursor.com/docs/agent/terminal
    source_type: official-doc
    relevance: workspace-write sandbox and command allowlist layering.
  - id: safety-sandbox-design
    title: Moonweave sandbox-network module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: IsolationSpecification versus Sandbox instance and escape-risk separation.
source_claims:
  - id: claim-sandbox-design
    source: safety-sandbox-design
    supports: Sandbox is named execution boundary instance with enforcement evidence.
    locator: Sandbox instance boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-sandbox-design
    source: e2b-sandbox-api
    supports: E2B Sandbox.create returns Sandbox instances with template-loaded specifications.
    locator: E2B lifecycle
    evidence_kind: design-inference
    confidence: high
  - id: claim-sandbox-design
    source: oci-linux-runtime
    supports: Docker/OCI containers with namespaces/seccomp map to Sandbox instances.
    locator: Container sandbox
    evidence_kind: design-inference
    confidence: high
  - id: claim-sandbox-design
    source: gvisor-docs
    supports: gVisor runsc containers map to Sandbox with gVisor ProcessPolicy backend.
    locator: runsc sandbox
    evidence_kind: design-inference
    confidence: high
