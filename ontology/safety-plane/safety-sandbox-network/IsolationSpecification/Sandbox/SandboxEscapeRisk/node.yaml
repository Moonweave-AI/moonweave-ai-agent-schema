    en: threatens concrete sandbox
    ja: concrete sandbox を脅かす
  definitions:
    zh: SandboxEscapeRisk 通过此关系指向已完成适用性分析的唯一 Sandbox 实例；证据必须把逃逸向量映射到该实例的有效配置或运行观测，通用公告或名称相似不足以建立。
