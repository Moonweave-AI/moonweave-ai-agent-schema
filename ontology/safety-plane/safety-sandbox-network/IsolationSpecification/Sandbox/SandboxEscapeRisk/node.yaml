schema: moonweave.ai/ontology-node/v1
id: SandboxEscapeRisk
kind: concept
status: accepted
labels:
  zh: 沙箱逃逸风险
  en: sandbox escape risk
  ja: サンドボックス脱出リスク
semantics:
  short_definition:
    zh: 有证据表明某个沙箱边界可能被绕过或削弱的具名风险记录。
    en: A named risk record evidencing possible bypass or weakening of one sandbox boundary.
    ja: 特定 sandbox boundary の bypass/weakening evidence を持つ named risk record。
  definition:
    zh: 沙箱逃逸风险是一种安全质量记录，以 risk_id、具体 Sandbox、逃逸向量和证据引用为身份，说明文件系统、进程、设备、命名空间、capability、继承句柄或内核接口如何可能越过预期边界。它不是已发生的攻击事件，也不是没有适用性分析的通用漏洞公告。
    en: A SandboxEscapeRisk is a security-quality record identified by risk_id, concrete Sandbox, escape vector, and evidence reference, explaining how filesystem, process, device, namespace, capability, inherited-handle, or kernel interfaces may cross the intended boundary. It is neither a completed attack event nor a generic advisory without applicability analysis.
    ja: SandboxEscapeRisk は risk_id・concrete Sandbox・escape vector・evidence reference で識別する security-quality record で、filesystem・process・device・namespace・capability・inherited handle・kernel interface が intended boundary を越える可能性を説明します。発生済み attack event や applicability 未分析の generic advisory ではありません。
  why_needed:
    zh: 只有把风险绑定到具体沙箱、向量和证据，系统才能区分理论弱点、有效控制和需要处置的真实暴露。
    en: Binding risk to a concrete sandbox, vector, and evidence distinguishes theoretical weakness, effective controls, and actionable exposure.
    ja: risk を concrete sandbox・vector・evidence に結び theoretical weakness・effective control・actionable exposure を区別します。
  includes:
    - zh: 风险标识、目标沙箱、逃逸向量、配置或运行证据、严重度与缓解验证引用。
      en: Risk ID, target sandbox, escape vector, configuration or runtime evidence, severity, and mitigation-verification reference.
      ja: risk ID・target sandbox・escape vector・configuration/runtime evidence・severity・mitigation verification reference。
  excludes:
    - zh: 通用 CVE、被拒绝且未越界的文件访问、网络路由风险、已发生攻击事件和缓解动作本身。
      en: Generic CVEs, denied file access that did not cross a boundary, network-route risk, completed attack events, and mitigation actions themselves.
      ja: generic CVE・境界未越えの denied file access・network route risk・completed attack event・mitigation action 自体。
  semantic_kind: quality
  aliases: []
structure:
  identity_keys:
    - escape_risk_id
  fields:
    - id: escape_risk_id
      labels:
        zh: 逃逸风险标识
        en: escape-risk ID
        ja: escape-risk ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次对具体沙箱逃逸暴露的独立评估。
        en: Identifies one independent assessment of escape exposure for a concrete sandbox.
        ja: concrete sandbox の escape exposure に対する一 assessment を識別します。
      allowed_values: []
      pattern: null
      example_value: escape-risk-884-1
      source_claims:
        - claim-sandbox-escape-risk-001
    - id: escape_vector
      labels:
        zh: 逃逸向量
        en: escape vector
        ja: escape vector
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明可能越界的机制，例如可写宿主挂载、共享命名空间、过量 capability、设备访问或继承文件描述符。
        en: Names the possible crossing mechanism, such as writable host mount, shared namespace, excessive capability, device access, or inherited file descriptor.
        ja: writable host mount・shared namespace・excess capability・device access・inherited fd 等の crossing mechanism を示します。
      allowed_values: []
      pattern: null
      example_value: writable-host-bind-mount
      source_claims:
        - claim-sandbox-escape-risk-002
        - claim-sandbox-escape-risk-003
    - id: evidence_ref
      labels:
        zh: 风险证据引用
        en: risk evidence reference
        ja: risk evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向证明该向量适用于目标沙箱的配置快照、审计记录或复现结果。
        en: References a configuration snapshot, audit record, or reproduction proving that the vector applies to the target sandbox.
        ja: vector が target sandbox に適用することを示す config snapshot・audit record・reproduction を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-isolation-884#mount-3
      source_claims:
        - claim-sandbox-escape-risk-001
        - claim-sandbox-escape-risk-002
    - id: severity
      labels:
        zh: 严重度
        en: severity
        ja: severity
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录在目标环境与控制条件下评估的影响等级，而不是照搬通用漏洞分数。
        en: Records impact assessed in the target environment and control context rather than copying a generic vulnerability score.
        ja: generic vulnerability score の転記ではなく target environment/control context で評価した impact level。
      allowed_values: []
      pattern: null
      example_value: high
      source_claims:
        - claim-sandbox-escape-risk-001
    - id: mitigation_verification_ref
      labels:
        zh: 缓解验证引用
        en: mitigation verification reference
        ja: mitigation verification reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向修改后重新检查隔离边界的通过证据。
        en: References passing evidence from re-checking the isolation boundary after mitigation.
        ja: mitigation 後に isolation boundary を再検査した passing evidence を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-isolation-884-recheck
      source_claims:
        - claim-sandbox-escape-risk-001
  constraints: []
  required_relation_constraints:
    - id: escape-risk-targets-one-sandbox
      direction: outgoing
      predicate: threatens
      target_concept_id: Sandbox
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条风险记录必须绑定一个接受过适用性分析的具体 Sandbox。
        en: Each risk record must bind one concrete Sandbox for which applicability was analyzed.
        ja: 各 risk record は applicability 分析済みの一 concrete Sandbox に結びます。
      source_claims:
        - claim-sandbox-escape-risk-001
