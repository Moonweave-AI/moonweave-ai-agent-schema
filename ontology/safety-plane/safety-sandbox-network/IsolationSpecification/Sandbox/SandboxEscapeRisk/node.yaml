schema: moonweave.ai/ontology-node/v1
id: SandboxEscapeRisk
kind: concept
labels:
  zh: 沙箱逃逸风险
  en: sandbox escape risk
  ja: サンドボックス脱出リスク
semantics:
  short_definition:
    zh: 绑定具体 Sandbox 实例与逃逸向量证据的已识别隔离失效风险。
    en: An identified isolation-failure risk bound to a concrete Sandbox instance and escape-vector evidence.
    ja: concrete Sandbox instance と escape vector 証拠に束縛された isolation failure risk。
  definition:
    zh: SandboxEscapeRisk 以 escape_risk_id、sandbox_ref、vector_kind、evidence_ref、severity 与 mitigation_status 记录可证实逃逸路径（如 writable host bind + CAP_SYS_ADMIN、seccomp 加载失败回退、Landlock 绕过）。OWASP 过度 agency 与容器逃逸 CVE 模式映射为此概念；缓解必须绑定 post-change loaded_policy_ref 与独立复核，声明性配置变更 alone 不算有效缓解。
    en: SandboxEscapeRisk records evidenced escape paths via escape_risk_id, sandbox_ref, vector_kind, evidence_ref, severity, and mitigation_status (e.g., writable host bind + CAP_SYS_ADMIN, seccomp load-failure fallback, Landlock bypass). OWASP excessive-agency and container-escape CVE patterns map here; mitigation must bind post-change loaded_policy_ref and independent re-check—declarative config change alone is not effective mitigation.
    ja: SandboxEscapeRisk は escape_risk_id/sandbox_ref/vector_kind/evidence_ref/severity/mitigation_status で evidenced escape path を記録（writable host bind+CAP_SYS_ADMIN、seccomp load failure fallback、Landlock bypass 等）。OWASP excessive agency/container escape CVE を写像。mitigation は post-change loaded_policy_ref+独立 re-check 必須、宣言 config 変更のみは effective mitigation にならない。
  why_needed:
    zh: 识别风险与验证缓解必须分离；否则只改配置文件就标记“已修复”会在真实逃逸后失去问责链。
    en: Identifying risk must be separated from verifying mitigation or config-only fixes mark resolved without accountability after real escapes.
    ja: risk 識別と mitigation 検証を分離しないと config 変更のみで resolved 标记し real escape 後 accountability 喪失。
  includes:
    - zh: 风险标识、目标沙箱、逃逸向量、配置或运行证据、严重度与缓解验证引用。
      en: Risk ID, target sandbox, escape vector, configuration or runtime evidence, severity, and mitigation-verification reference.
      ja: risk ID・target sandbox・escape vector・configuration/runtime evidence・severity・mitigation verification reference。
  excludes:
    - zh: 通用 CVE、被拒绝且未越界的文件访问、网络路由风险、已发生攻击事件和缓解动作本身。
      en: Generic CVEs, denied file access that did not cross a boundary, network-route risk, completed attack events, and mitigation actions themselves.
      ja: generic CVE・境界未越えの denied file access・network route risk・completed attack event・mitigation action 自体。
  semantic_kind: quality
  aliases: []
engineering:
  explanation:
    zh: writable-host-bind-mount-with-cap-sys-admin、seccomp load failure→unconfined、missing Landlock layer 是常见 vector_kind。缓解后运行 sandbox-recheck 并记录 boundary_write_denials；mitigation_effective 仅当 re-check 通过且 loaded_policy_ref 更新。
    en: "Common vector_kind values: writable-host-bind-mount-with-cap-sys-admin, seccomp-load-failure-unconfined, missing-landlock-layer. After mitigation run sandbox-recheck recording boundary_write_denials; mitigation_effective only when re-check passes and loaded_policy_ref updates."
    ja: vector_kind 例：writable-host-bind+CAP_SYS_ADMIN、seccomp load failure unconfined、missing Landlock。mitigation 後 sandbox-recheck+boundary_write_denials。re-check pass+loaded_policy_ref 更新時のみ mitigation_effective。
  typical_input:
    - description: Writable bind escape vector.
      format: mount mode=rw + CAP_SYS_ADMIN observed in audit
      source_claims:
        - claim-sandbox-escape-design
    - description: Seccomp fallback vector.
      format: seccomp load failed; unconfined fallback logged
      source_claims:
        - claim-sandbox-escape-design
  typical_output:
    - description: Escape risk with verified mitigation.
      format: '{"escape_risk_id":"escape-risk-884-1","mitigation_verification_ref":"sandbox-recheck-884-2","mitigation_effective":true}'
      source_claims:
        - claim-sandbox-escape-design
  reference_implementations:
    - name: E2B Sandbox API
      url: https://e2b.dev/docs
      description: Cloud sandbox templates and lifecycle.
    - name: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      description: Docker --read-only, namespaces, seccomp.
    - name: gVisor runsc
      url: https://gvisor.dev/docs/
      description: Application-kernel sandbox isolation.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: workspace-write and allowlist layering.
structure:
  identity_keys:
    - escape_risk_id
  fields:
    - id: escape_risk_id
      labels:
        zh: 逃逸风险标识
        en: escape-risk ID
        ja: escape-risk ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一次对具体沙箱逃逸暴露的独立评估。
        en: Identifies one independent assessment of escape exposure for a concrete sandbox.
        ja: concrete sandbox の escape exposure に対する一 assessment を識別します。
      allowed_values: []
      pattern: null
      example_value: escape-risk-884-1
      source_claims:
        - claim-sandbox-escape-design
    - id: escape_vector
      labels:
        zh: 逃逸向量
        en: escape vector
        ja: escape vector
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明可能越界的机制，例如可写宿主挂载、共享命名空间、过量 capability、设备访问或继承文件描述符。
        en: Names the possible crossing mechanism, such as writable host mount, shared namespace, excessive capability, device access, or inherited file descriptor.
        ja: writable host mount・shared namespace・excess capability・device access・inherited fd 等の crossing mechanism を示します。
      allowed_values: []
      pattern: null
      example_value: writable-host-bind-mount
      source_claims:
        - claim-sandbox-escape-design
        - claim-sandbox-escape-design
    - id: evidence_ref
      labels:
        zh: 风险证据引用
        en: risk evidence reference
        ja: risk evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向证明该向量适用于目标沙箱的配置快照、审计记录或复现结果。
        en: References a configuration snapshot, audit record, or reproduction proving that the vector applies to the target sandbox.
        ja: vector が target sandbox に適用することを示す config snapshot・audit record・reproduction を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-isolation-884#mount-3
      source_claims:
        - claim-sandbox-escape-design
        - claim-sandbox-escape-design
    - id: severity
      labels:
        zh: 严重度
        en: severity
        ja: severity
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录在目标环境与控制条件下评估的影响等级，而不是照搬通用漏洞分数。
        en: Records impact assessed in the target environment and control context rather than copying a generic vulnerability score.
        ja: generic vulnerability score の転記ではなく target environment/control context で評価した impact level。
      allowed_values: []
      pattern: null
      example_value: high
      source_claims:
        - claim-sandbox-escape-design
    - id: mitigation_verification_ref
      labels:
        zh: 缓解验证引用
        en: mitigation verification reference
        ja: mitigation verification reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 指向修改后重新检查隔离边界的通过证据。
        en: References passing evidence from re-checking the isolation boundary after mitigation.
        ja: mitigation 後に isolation boundary を再検査した passing evidence を参照します。
      allowed_values: []
      pattern: null
      example_value: audit-isolation-884-recheck
      source_claims:
        - claim-sandbox-escape-design
  constraints: []
  required_relation_constraints:
    - id: escape-risk-targets-one-sandbox
      direction: outgoing
      predicate: threatens
      target_concept_id: Sandbox
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条风险记录必须绑定一个接受过适用性分析的具体 Sandbox。
        en: Each risk record must bind one concrete Sandbox for which applicability was analyzed.
        ja: 各 risk record は applicability 分析済みの一 concrete Sandbox に結びます。
      source_claims:
        - claim-sandbox-escape-design
examples:
  - id: SandboxEscapeRisk-writable-bind
    labels:
      zh: 可写宿主挂载逃逸风险
      en: Writable host bind escape risk
      ja: writable host bind escape risk
    descriptions:
      zh: escape-risk-884-1：sandbox-run-884 writable host bind + CAP_SYS_ADMIN 向量，severity=critical。
      en: "escape-risk-884-1: sandbox-run-884 writable host bind + CAP_SYS_ADMIN vector, severity=critical."
      ja: escape-risk-884-1 sandbox-run-884 writable bind+CAP_SYS_ADMIN critical。
    example_source:
      product: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      version: container escape pattern
    field_values:
      escape_risk_id: escape-risk-884-1
      sandbox_ref: sandbox-run-884
      vector_kind: writable-host-bind-mount-with-cap-sys-admin
    related_node_ids:
      - SandboxEscapeRisk
      - Sandbox
      - FilesystemPolicy
    related_relation_ids: []
    source_claims:
      - claim-sandbox-escape-design
  - id: SandboxEscapeRisk-seccomp-fallback
    labels:
      zh: seccomp 回退逃逸风险
      en: Seccomp fallback escape risk
      ja: seccomp fallback escape risk
    descriptions:
      zh: escape-risk-886-1：sandbox-run-886 seccomp 加载失败回退 unconfined。
      en: "escape-risk-886-1: sandbox-run-886 seccomp load failed fallback to unconfined."
      ja: escape-risk-886-1 sandbox-run-886 seccomp load failure→unconfined。
    example_source:
      product: gVisor
      url: https://gvisor.dev/docs/
      version: seccomp load failure
    field_values:
      escape_risk_id: escape-risk-886-1
      vector_kind: seccomp-load-failure-unconfined
    related_node_ids:
      - SandboxEscapeRisk
      - ProcessPolicy
    related_relation_ids: []
    source_claims:
      - claim-sandbox-escape-design
  - id: SandboxEscapeRisk-mitigation-recheck
    labels:
      zh: 缓解复核后风险关闭
      en: Risk closed after mitigation recheck
      ja: mitigation re-check 後 risk 关闭
    descriptions:
      zh: escape-risk-884-1 改 ro mount 后 sandbox-recheck-884-2 记录 12 次 boundary_write_denials，mitigation_effective=true。
      en: After ro mount fix for escape-risk-884-1, sandbox-recheck-884-2 records 12 boundary_write_denials, mitigation_effective=true.
      ja: escape-risk-884-1 ro mount 修正後 sandbox-recheck-884-2 が 12 boundary_write_denials、mitigation_effective=true。
    example_source:
      product: E2B Sandbox API
      url: https://e2b.dev/docs
      version: mitigation verification
    field_values:
      escape_risk_id: escape-risk-884-1
      mitigation_verification_ref: sandbox-recheck-884-2
      mitigation_effective: true
    related_node_ids:
      - SandboxEscapeRisk
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-sandbox-escape-design
  - id: SandboxEscapeRisk-boundary-config-only
    labels:
      zh: 仅改配置未复核不算缓解
      en: Config change without recheck not mitigation
      ja: config 変更のみは mitigation ではない
    descriptions:
      zh: proc-python@3 配置目录更新但 sandbox-run-886 未 reload，mitigation_effective 保持 false。
      en: proc-python@3 config directory updated but sandbox-run-886 not reloaded; mitigation_effective stays false.
      ja: proc-python@3 config 更新も sandbox-run-886 未 reload→mitigation_effective false。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: excessive agency
    field_values: {}
    related_node_ids:
      - SandboxEscapeRisk
      - IsolationSpecification
    related_relation_ids: []
    source_claims:
      - claim-sandbox-escape-design
parent_relation:
  id: SandboxEscapeRisk-threatens-Sandbox
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 威胁具体沙箱
    en: threatens concrete sandbox
    ja: concrete sandbox を脅かす
  definitions:
    zh: SandboxEscapeRisk 通过此关系指向已完成适用性分析的唯一 Sandbox 实例；证据必须把逃逸向量映射到该实例的有效配置或运行观测，通用公告或名称相似不足以建立。
    en: SandboxEscapeRisk points to the one Sandbox instance for which applicability was analyzed; evidence must map the escape vector to effective configuration or runtime observation, while a generic advisory or name similarity is insufficient.
    ja: SandboxEscapeRisk は applicability 分析済みの一 Sandbox instance を指し、escape vector を effective config/runtime observation に map する evidence が必要で generic advisory/name 類似では成立しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：threatens
      en: is target of threatens
      ja: 逆方向：threatens
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-sandbox-escape-design
    - claim-sandbox-escape-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
