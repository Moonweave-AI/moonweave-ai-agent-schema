schema: moonweave.ai/ontology-node/v1
id: FilesystemPolicy
kind: concept
status: accepted
labels:
  zh: 文件系统策略
  en: filesystem policy
  ja: ファイルシステム方針
semantics:
  short_definition:
    zh: 按路径、挂载与操作限定沙箱文件系统访问的隔离规范。
    en: An isolation specification limiting sandbox filesystem access by path, mount, and operation.
    ja: path・mount・operation で sandbox filesystem access を制限する isolation specification。
  definition:
    zh: 文件系统策略是一种 IsolationSpecification，以规范化路径规则、挂载映射和读取/写入/执行/创建/删除权限为区分特征。它在沙箱路径空间内计算有效访问，并明确处理只读、遮蔽、符号链接、bind mount 与 OverlayFS 边界；它不是网络目的地策略或单次文件操作。
    en: A FilesystemPolicy is an IsolationSpecification distinguished by normalized path rules, mount mappings, and read/write/execute/create/delete rights. It computes effective access in sandbox path space and explicitly handles read-only, masked, symbolic-link, bind-mount, and OverlayFS boundaries; it is not a network-destination policy or one file operation.
    ja: FilesystemPolicy は normalized path rule・mount mapping・read/write/execute/create/delete right で区別する IsolationSpecification です。sandbox path 空間の effective access を計算し readonly・masked・symbolic link・bind mount・OverlayFS 境界を明示処理し、network destination policy や一 file operation ではありません。
  why_needed:
    zh: 把路径可见性和挂载解析放在同一可执行规范中，才能回答一个沙箱实际能读写哪些本地资源。
    en: It joins path visibility and mount resolution in one executable specification so effective local-resource access can be decided.
    ja: path visibility と mount resolution を一 executable specification に統合し effective local-resource access を判定できます。
  includes:
    - zh: 绝对沙箱路径规则、操作权限、挂载源/目标、只读与遮蔽设置、链接解析策略。
      en: Absolute sandbox-path rules, operation rights, mount source/target, read-only and masked settings, and link-resolution policy.
      ja: absolute sandbox path rule・operation right・mount source/target・readonly/masked 設定・link resolution policy。
  excludes:
    - zh: 网络主机与端口规则、进程能力、业务层 AuthorizationGrant、单个文件或 SourceReference。
      en: Network host/port rules, process capabilities, business-layer AuthorizationGrant, and individual files or SourceReference objects.
      ja: network host/port rule・process capability・business AuthorizationGrant・個別 file/SourceReference。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: path_rule_set
      labels:
        zh: 路径规则集
        en: path rule set
        ja: path rule set
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按规范化沙箱路径声明允许或拒绝的文件系统操作。
        en: Declares allowed or denied filesystem operations over normalized sandbox paths.
        ja: normalized sandbox path ごとの allowed/denied filesystem operation を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        /workspace:
          - read
          - write
        /secrets: []
      source_claims:
        - claim-filesystem-policy-002
    - id: mount_mapping_set
      labels:
        zh: 挂载映射集
        en: mount mapping set
        ja: mount mapping set
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 把宿主源路径映射到沙箱目标路径并声明只读、读写、递归与传播模式。
        en: Maps host source paths to sandbox destination paths with read-only/read-write, recursion, and propagation modes.
        ja: host source path を sandbox destination path へ map し readonly/readwrite・recursion・propagation mode を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - source: /repo
          target: /workspace/repo
          mode: ro
      source_claims:
        - claim-filesystem-policy-001
        - claim-filesystem-policy-002
    - id: link_resolution_policy
      labels:
        zh: 链接解析策略
        en: link-resolution policy
        ja: link-resolution policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定符号链接、硬链接与路径遍历在授权判断前如何规范化和限制。
        en: Specifies how symbolic links, hard links, and traversal are normalized and constrained before authorization.
        ja: authorization 前の symbolic link・hard link・path traversal の normalize/constraint 方法を定めます。
      allowed_values: []
      pattern: null
      example_value: resolve-beneath-no-escape
      source_claims:
        - claim-filesystem-policy-002
  constraints:
    - id: filesystem-policy-normalized-paths
      severity: error
      expression_language: plain
      expression: every requested path must be normalized in sandbox path space before longest-match rule and mount resolution
      explanations:
        zh: 授权判断先在沙箱路径空间规范化，再解析最长匹配规则与挂载；不得用 .. 或链接越出边界。
        en: Normalize in sandbox path space before longest-match and mount resolution; traversal or links cannot escape the boundary.
        ja: sandbox path 空間で normalize 後 longest-match/mount resolution を行い traversal/link で境界外へ出ません。
      source_claims:
        - claim-filesystem-policy-002
        - claim-filesystem-policy-001
  required_relation_constraints: []
examples:
  - id: filesystem-policy-e2b
    labels:
      zh: 文件系统策略 - E2B 沙箱 VM
      en: filesystem policy - E2B sandbox VM
      ja: ファイルシステム方針 - E2B サンドボックス VM
    descriptions: {zh: "文件系统策略(FilesystemPolicy) [FilesystemPolicy]: 按路径、挂载与操作限定沙箱文件系统访问的隔离规范。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: link_resolution_policy.", en: "filesystem policy (FilesystemPolicy) [FilesystemPolicy]: An isolation specification limiting sandbox filesystem access by path, mount, and operation.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include link_resolution_policy.", ja: "ファイルシステム方針(FilesystemPolicy) [FilesystemPolicy]: path・mount・operation で sandbox filesystem access を制限する isolation specification。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: link_resolution_policy."}
    field_values:
      link_resolution_policy: resolve-beneath-no-escape
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
    related_relation_ids:
      - claim-filesystem-policy-001
      - claim-filesystem-policy-002
      - FilesystemPolicy
      - FilesystemPolicy-is_a-IsolationSpecification
      - IsolationSpecification
    example_source: E2B Sandbox API
    source_claims:
      - claim-filesystem-policy-001
  - id: filesystem-policy-gvisor_runsc
    labels:
      zh: 文件系统策略 - gVisor runsc 内核沙箱
      en: filesystem policy - gVisor runsc kernel sandbox
      ja: ファイルシステム方針 - gVisor runsc カーネル sandbox
    descriptions: {zh: "文件系统策略(FilesystemPolicy) [FilesystemPolicy]: 按路径、挂载与操作限定沙箱文件系统访问的隔离规范。. gVisor runsc 通过 user-space kernel Sentry 拦截 syscall，Docker/Kubernetes 可用 runtime=runsc 运行容器，限制内核攻击面（gvisor.dev/docs）。 Fields: link_resolution_policy.", en: "filesystem policy (FilesystemPolicy) [FilesystemPolicy]: An isolation specification limiting sandbox filesystem access by path, mount, and operation.. gVisor runsc intercepts syscalls via user-space kernel Sentry; Docker/Kubernetes can run containers with runtime=runsc to limit kernel attack surface (gvisor.dev/docs). Fields include link_resolution_policy.", ja: "ファイルシステム方針(FilesystemPolicy) [FilesystemPolicy]: path・mount・operation で sandbox filesystem access を制限する isolation specification。. gVisor runsc は user-space kernel Sentry で syscall を intercept し runtime=runsc で kernel 攻撃面を制限する。 Fields: link_resolution_policy."}
    field_values:
      link_resolution_policy: resolve-beneath-no-escape
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
    related_relation_ids:
      - claim-filesystem-policy-001
      - claim-filesystem-policy-002
      - FilesystemPolicy
      - FilesystemPolicy-is_a-IsolationSpecification
      - IsolationSpecification
    example_source: gVisor runsc
    source_claims:
      - claim-filesystem-policy-001
  - id: filesystem-policy-firecracker
    labels:
      zh: 文件系统策略 - Firecracker microVM 隔离
      en: filesystem policy - Firecracker microVM isolation
      ja: ファイルシステム方針 - Firecracker microVM 分離
    descriptions: {zh: "文件系统策略(FilesystemPolicy) [FilesystemPolicy]: 按路径、挂载与操作限定沙箱文件系统访问的隔离规范。. AWS Firecracker microVM 以最小开销隔离 Lambda 与 Fargate 工作负载。 Fields: link_resolution_policy.", en: "filesystem policy (FilesystemPolicy) [FilesystemPolicy]: An isolation specification limiting sandbox filesystem access by path, mount, and operation.. AWS Firecracker microVMs isolate Lambda and Fargate workloads with minimal overhead (firecracker-microvm.github.io). Fields include link_resolution_policy.", ja: "ファイルシステム方針(FilesystemPolicy) [FilesystemPolicy]: path・mount・operation で sandbox filesystem access を制限する isolation specification。. AWS Firecracker microVM は Lambda/Fargate workload を minimal overhead で isolate する。 Fields: link_resolution_policy."}
    field_values:
      link_resolution_policy: resolve-beneath-no-escape
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
    related_relation_ids:
      - claim-filesystem-policy-001
      - claim-filesystem-policy-002
      - FilesystemPolicy
      - FilesystemPolicy-is_a-IsolationSpecification
      - IsolationSpecification
    example_source: AWS Firecracker
    source_claims:
      - claim-filesystem-policy-001
  - id: filesystem-policy-docker_network_none
    labels:
      zh: 文件系统策略 - Docker 网络隔离
      en: filesystem policy - Docker network isolation
      ja: ファイルシステム方針 - Docker ネットワーク分離
    descriptions: {zh: "文件系统策略(FilesystemPolicy) [FilesystemPolicy]: 按路径、挂载与操作限定沙箱文件系统访问的隔离规范。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: link_resolution_policy.", en: "filesystem policy (FilesystemPolicy) [FilesystemPolicy]: An isolation specification limiting sandbox filesystem access by path, mount, and operation.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include link_resolution_policy.", ja: "ファイルシステム方針(FilesystemPolicy) [FilesystemPolicy]: path・mount・operation で sandbox filesystem access を制限する isolation specification。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: link_resolution_policy."}
    field_values:
      link_resolution_policy: resolve-beneath-no-escape
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
    related_relation_ids:
      - claim-filesystem-policy-001
      - claim-filesystem-policy-002
      - FilesystemPolicy
      - FilesystemPolicy-is_a-IsolationSpecification
      - IsolationSpecification
    example_source: Docker network none
    source_claims:
      - claim-filesystem-policy-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ProcessPolicy
    shared_parent_concept_id: IsolationSpecification
    differentia:
      zh: FilesystemPolicy 决定路径和挂载上的文件操作；ProcessPolicy 决定可启动程序、命名空间、能力、系统调用与资源上限。同一沙箱通常同时应用二者，但任一不能替代另一方。
      en: FilesystemPolicy decides file operations over paths and mounts; ProcessPolicy decides executable launch, namespaces, capabilities, syscalls, and resource limits. A sandbox normally applies both, but neither substitutes for the other.
      ja: FilesystemPolicy は path/mount の file operation、ProcessPolicy は executable・namespace・capability・syscall・resource limit を決め、同一 sandbox に併用しても相互代替しません。
    source_claims:
      - claim-filesystem-policy-001
      - claim-filesystem-policy-002
