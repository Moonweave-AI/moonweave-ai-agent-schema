source_claims:
  - id: claim-filesystem-policy-001
    source: eng-runtime-oci-linux-config
    supports: The OCI Linux runtime specification defines namespaces, devices, cgroups, mounts, masked paths, read-only paths, seccomp integration, and runtime errors that ground enforceable process and filesystem isolation settings.
    locator: OCI Runtime Specification > Linux Container Configuration > Namespaces, Devices, Control groups, Masked Paths, Readonly Paths
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-filesystem-policy-002
    source: eng-security-linux-landlock
    supports: Linux Landlock defines stackable path-hierarchy access rules, read/write/execute rights, rule inheritance, bind-mount and OverlayFS behavior, and explicit limitations relevant to filesystem sandbox evaluation.
    locator: Linux Kernel documentation > Landlock rules, Layers of file path access rights, Bind mounts and OverlayFS, Current limitations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-filesystem-policy-003
    source: eng-security-mcp-nsa-2026
    supports: NSA's May 2026 MCP guidance recommends strict resource and permission boundaries, operating-system isolation such as seccomp/AppArmor/SELinux, sandboxing against lateral movement and privilege escalation, and explicit runtime denial of unneeded filesystem and network paths.
    locator: NSA MCP Security Design Considerations > pp. 10-11 > Constrain and sandbox tool execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
