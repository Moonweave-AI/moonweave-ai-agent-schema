schema: moonweave.ai/ontology-node/v1
id: FilesystemPolicy
kind: concept
labels:
  zh: 文件系统策略
  en: filesystem policy
  ja: ファイルシステム方針
semantics:
  short_definition:
    zh: IsolationSpecification 内对路径、挂载与读写执行权限的规范。
    en: The specification within IsolationSpecification for paths, mounts, and read/write/execute permissions.
    ja: IsolationSpecification 内の path/mount/rwx 権限 specification。
  definition:
    zh: FilesystemPolicy 以 fs_policy_id+version 声明 allowed_paths、denied_paths、mounts（含 read-only bind）、masked_paths 与 Landlock/seccomp 文件层。它映射 Docker read-only bind mounts（--mount type=bind,readonly）、E2B filesystem restrictions 与 Cursor workspace-write 边界；有效权限是 mount∩Landlock∩seccomp 交集，宿主 DAC 不能单独覆盖。
    en: FilesystemPolicy declares allowed_paths, denied_paths, mounts (including read-only binds), masked_paths, and Landlock/seccomp file layers via fs_policy_id+version. It maps Docker read-only bind mounts (--mount type=bind,readonly), E2B filesystem restrictions, and Cursor workspace-write boundaries; effective permissions are mount∩Landlock∩seccomp intersection; host DAC alone cannot override.
    ja: FilesystemPolicy は fs_policy_id+version で allowed/denied paths/mounts(readonly bind)/masked_paths/Landlock/seccomp file layer を宣言。Docker readonly bind、E2B FS restriction、Cursor workspace-write を写像。effective=mount∩Landlock∩seccomp、host DAC 単独上書き不可。
  why_needed:
    zh: Agent 路径权限查询必须 intersect 所有强制层；只查宿主 DAC 会误判沙箱内可写路径。
    en: Agent path permission queries must intersect all enforcement layers; host DAC alone misjudges writable paths inside sandbox.
    ja: path permission query は全 enforcement layer intersect 必須。host DAC のみでは sandbox 内 writable path 誤判定。
  includes:
    - zh: 绝对沙箱路径规则、操作权限、挂载源/目标、只读与遮蔽设置、链接解析策略。
      en: Absolute sandbox-path rules, operation rights, mount source/target, read-only and masked settings, and link-resolution policy.
      ja: absolute sandbox path rule・operation right・mount source/target・readonly/masked 設定・link resolution policy。
  excludes:
    - zh: 网络主机与端口规则、进程能力、业务层 AuthorizationGrant、单个文件或 SourceReference。
      en: Network host/port rules, process capabilities, business-layer AuthorizationGrant, and individual files or SourceReference objects.
      ja: network host/port rule・process capability・business AuthorizationGrant・個別 file/SourceReference。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: Docker `--read-only --mount type=bind,src=/repo,dst=/workspace,readonly`→FilesystemPolicy；E2B template path allowlist→allowed_paths；Cursor workspace-write→write allowed only under workspace root。查询返回 enforcement_layers 数组。
    en: Docker --read-only with readonly bind mount→FilesystemPolicy; E2B template path allowlist→allowed_paths; Cursor workspace-write→write allowed only under workspace root. Queries return enforcement_layers array.
    ja: Docker --read-only+readonly bind→FilesystemPolicy。E2B path allowlist→allowed_paths。Cursor workspace-write→workspace root 下のみ write。query は enforcement_layers 返却。
  typical_input:
    - description: Docker read-only bind.
      format: docker run --read-only --mount type=bind,src=/repo,dst=/workspace,readonly
      source_claims:
        - claim-filesystem-policy-design
    - description: E2B path restriction.
      format: template disallows /etc write; allows /tmp
      source_claims:
        - claim-filesystem-policy-design
  typical_output:
    - description: Effective path permissions.
      format: '{"path":"/workspace/app.py","read_allowed":true,"write_allowed":false,"enforcement_layers":["mount-readonly","landlock-fs-code-v4"]}'
      source_claims:
        - claim-filesystem-policy-design
  reference_implementations:
    - name: E2B Sandbox API
      url: https://e2b.dev/docs
      description: Cloud sandbox templates and lifecycle.
    - name: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      description: Docker --read-only, namespaces, seccomp.
    - name: gVisor runsc
      url: https://gvisor.dev/docs/
      description: Application-kernel sandbox isolation.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: workspace-write and allowlist layering.
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: path_rule_set
      labels:
        zh: 路径规则集
        en: path rule set
        ja: path rule set
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按规范化沙箱路径声明允许或拒绝的文件系统操作。
        en: Declares allowed or denied filesystem operations over normalized sandbox paths.
        ja: normalized sandbox path ごとの allowed/denied filesystem operation を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        /workspace:
          - read
          - write
        /secrets: []
      source_claims:
        - claim-filesystem-policy-design
    - id: mount_mapping_set
      labels:
        zh: 挂载映射集
        en: mount mapping set
        ja: mount mapping set
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 把宿主源路径映射到沙箱目标路径并声明只读、读写、递归与传播模式。
        en: Maps host source paths to sandbox destination paths with read-only/read-write, recursion, and propagation modes.
        ja: host source path を sandbox destination path へ map し readonly/readwrite・recursion・propagation mode を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - source: /repo
          target: /workspace/repo
          mode: ro
      source_claims:
        - claim-filesystem-policy-design
        - claim-filesystem-policy-design
    - id: link_resolution_policy
      labels:
        zh: 链接解析策略
        en: link-resolution policy
        ja: link-resolution policy
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定符号链接、硬链接与路径遍历在授权判断前如何规范化和限制。
        en: Specifies how symbolic links, hard links, and traversal are normalized and constrained before authorization.
        ja: authorization 前の symbolic link・hard link・path traversal の normalize/constraint 方法を定めます。
      allowed_values: []
      pattern: null
      example_value: resolve-beneath-no-escape
      source_claims:
        - claim-filesystem-policy-design
  constraints:
    - id: filesystem-policy-normalized-paths
      severity: error
      expression_language: plain
      expression: every requested path must be normalized in sandbox path space before longest-match rule and mount resolution
      explanations:
        zh: 授权判断先在沙箱路径空间规范化，再解析最长匹配规则与挂载；不得用 .. 或链接越出边界。
        en: Normalize in sandbox path space before longest-match and mount resolution; traversal or links cannot escape the boundary.
        ja: sandbox path 空間で normalize 後 longest-match/mount resolution を行い traversal/link で境界外へ出ません。
      source_claims:
        - claim-filesystem-policy-design
        - claim-filesystem-policy-design
  required_relation_constraints: []
examples:
  - id: FilesystemPolicy-docker-readonly
    labels:
      zh: Docker 只读挂载策略
      en: Docker read-only mount policy
      ja: Docker readonly mount policy
    descriptions:
      zh: fs-code@4 将 /workspace bind readonly，拒绝 /etc 写入。
      en: fs-code@4 bind-mounts /workspace readonly and denies /etc writes.
      ja: fs-code@4 /workspace readonly bind、/etc write 拒否。
    example_source:
      product: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      version: readonly bind mount
    field_values:
      fs_policy_id: fs-code
      version: "4"
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-filesystem-policy-design
  - id: FilesystemPolicy-e2b-restrictions
    labels:
      zh: E2B 文件系统限制
      en: E2B filesystem restrictions
      ja: E2B filesystem restrictions
    descriptions:
      zh: fs-e2b@1 允许 /home/user 与 /tmp，拒绝 host filesystem escape paths。
      en: fs-e2b@1 allows /home/user and /tmp, denies host filesystem escape paths.
      ja: fs-e2b@1 /home/user+/tmp 許可、escape path 拒否。
    example_source:
      product: E2B Sandbox API
      url: https://e2b.dev/docs
      version: filesystem limits
    field_values:
      fs_policy_id: fs-e2b
      version: "1"
    related_node_ids:
      - FilesystemPolicy
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-filesystem-policy-design
  - id: FilesystemPolicy-cursor-workspace
    labels:
      zh: Cursor workspace-write 策略
      en: Cursor workspace-write policy
      ja: Cursor workspace-write policy
    descriptions:
      zh: fs-cursor@1 仅允许 workspace 根下写入，/etc 与 $HOME 外只读。
      en: fs-cursor@1 allows writes only under workspace root; /etc and outside $HOME read-only.
      ja: fs-cursor@1 workspace root 下のみ write。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: workspace-write
    field_values:
      fs_policy_id: fs-cursor
      version: "1"
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
    related_relation_ids: []
    source_claims:
      - claim-filesystem-policy-design
  - id: FilesystemPolicy-boundary-dac
    labels:
      zh: 宿主 DAC 不能单独决定
      en: Host DAC alone insufficient
      ja: host DAC 単独不十分
    descriptions:
      zh: 宿主对 /etc 可写但 sandbox mount readonly 时 effective write_allowed=false。
      en: Host writable /etc but sandbox readonly mount yields effective write_allowed=false.
      ja: host /etc writable でも sandbox readonly mount なら write_allowed=false。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: sandbox escape
    field_values: {}
    related_node_ids:
      - FilesystemPolicy
      - SandboxEscapeRisk
    related_relation_ids: []
    source_claims:
      - claim-filesystem-policy-design
parent_relation:
  id: FilesystemPolicy-is_a-IsolationSpecification
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种隔离规范
    en: is an isolation specification
    ja: isolation specification の一種
  definitions:
    zh: FilesystemPolicy 通过此分类边继承 IsolationSpecification 的版本、适用环境和执行器要求，并增加路径、挂载及文件操作种差。
    en: FilesystemPolicy inherits IsolationSpecification's version, applicable-environment, and enforcer requirements and adds path, mount, and file-operation differentia.
    ja: FilesystemPolicy は IsolationSpecification の version・applicable environment・enforcer 要件を継承し path・mount・file-operation 種差を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-filesystem-policy-design
    - claim-filesystem-policy-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
