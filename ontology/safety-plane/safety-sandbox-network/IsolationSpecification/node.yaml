    locator: Isolation spec boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-isolation-specification-design
    source: e2b-sandbox-api
    supports: E2B sandbox templates map to IsolationSpecification revisions.
    locator: E2B templates
    evidence_kind: design-inference
    confidence: high
  - id: claim-isolation-specification-design
    source: oci-linux-runtime
    supports: OCI/Docker Linux container configuration maps to IsolationSpecification components.
    locator: OCI config
    evidence_kind: design-inference
