schema: moonweave.ai/ontology-node/v1
id: IsolationSpecification
kind: concept
labels:
  zh: 隔离规范
  en: isolation specification
  ja: 隔離仕様
semantics:
  short_definition:
    zh: 描述进程与文件系统隔离要求的版本化规范集合。
    en: A versioned specification set describing process and filesystem isolation requirements.
    ja: process/filesystem 隔離要件を記述する版管理 specification 集合。
  definition:
    zh: IsolationSpecification 以 spec_id+version 组合 FilesystemPolicy、ProcessPolicy 与 issuer_ref/effective_from。它映射 E2B template 限制、Docker/OCI Linux runtime config、gVisor runsc 与 Cursor workspace-write sandbox 叠加层。规范说明应加载什么约束；Sandbox 实例证明实际加载。
    en: IsolationSpecification combines FilesystemPolicy and ProcessPolicy with spec_id+version and issuer_ref/effective_from. It maps E2B template limits, Docker/OCI Linux runtime config, gVisor runsc, and Cursor workspace-write sandbox overlay. Specifications state constraints to load; Sandbox instances prove actual loading.
    ja: IsolationSpecification は spec_id+version で FilesystemPolicy/ProcessPolicy/issuer_ref/effective_from を组合。E2B template、Docker/OCI config、gVisor runsc、Cursor workspace-write overlay を写像。load すべき constraint を示し Sandbox instance が actual load を証明。
  why_needed:
    zh: 必须把声明性配置与运行实例分开，否则逃逸后无法追溯实际加载的隔离版。
    en: Declarative configuration must be separated from running instances or post-escape audits cannot trace loaded isolation revisions.
    ja: 宣言 config と running instance を分離しないと escape 後 loaded isolation revision 追跡不可。
  includes:
    - zh: 规范标识、版本、适用环境、执行器，以及默认拒绝或显式允许的隔离约束。
      en: Specification identity, version, applicable environment, enforcer, and default-deny or explicit-allow isolation constraints.
      ja: specification identity・version・applicable environment・enforcer・default-deny/explicit-allow 制約。
  excludes:
    - zh: 运行中的 Sandbox、一次进程执行、单个拒绝事件、网络路由与业务授权决定。
      en: Running Sandbox instances, individual process executions, denial events, network routes, and business authorization decisions.
      ja: running Sandbox・個別 process execution・denial event・network route・business authorization decision。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: E2B Sandbox.create(template=...)→IsolationSpecification；docker run --read-only --cap-drop=ALL→FilesystemPolicy+ProcessPolicy；gVisor runsc→ProcessPolicy backend=gvisor。Moonweave Sandbox-constrained_by 必须指向实际 load 版本。
    en: E2B Sandbox.create(template=...)→IsolationSpecification; docker run --read-only --cap-drop=ALL→FilesystemPolicy+ProcessPolicy; gVisor runsc→ProcessPolicy backend=gvisor. Moonweave Sandbox-constrained_by must point to actually loaded revisions.
    ja: E2B Sandbox.create→IsolationSpecification。docker --read-only --cap-drop=ALL→FilesystemPolicy+ProcessPolicy。gVisor runsc→ProcessPolicy backend=gvisor。Sandbox-constrained_by は actual load revision 参照必須。
  typical_input:
    - description: E2B template spec.
      format: template=code-interpreter-v1 CPU/memory/network/fs limits
      source_claims:
        - claim-isolation-specification-design
    - description: OCI combined spec.
      format: namespaces+cgroups+readonlyPaths+seccomp profile
      source_claims:
        - claim-isolation-specification-design
  typical_output:
    - description: Versioned isolation spec.
      format: '{"spec_id":"agent-sandbox","version":"4","filesystem_policy_ref":"fs-code@4","process_policy_ref":"proc-python@2"}'
      source_claims:
        - claim-isolation-specification-design
  reference_implementations:
    - name: E2B Sandbox API
      url: https://e2b.dev/docs
      description: Cloud sandbox templates and lifecycle.
    - name: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      description: Docker --read-only, namespaces, seccomp.
    - name: gVisor runsc
      url: https://gvisor.dev/docs/
      description: Application-kernel sandbox isolation.
    - name: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      description: workspace-write and allowlist layering.
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: isolation_spec_id
      labels:
        zh: 隔离规范标识
        en: isolation specification ID
        ja: isolation specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本保持稳定的隔离规范逻辑标识。
        en: Stable logical identifier across revisions of an isolation specification.
        ja: isolation specification revision 間で安定する logical ID。
      allowed_values: []
      pattern: null
      example_value: isolation-code-tool
      source_claims:
        - claim-isolation-specification-design
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的隔离约束。
        en: Fixes one immutable revision of isolation constraints.
        ja: 一組の不変 isolation constraint revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-isolation-specification-design
    - id: applicable_environment_ref
      labels:
        zh: 适用环境引用
        en: applicable environment reference
        ja: applicable environment reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向可应用该规范的运行环境类别或具名环境。
        en: References the named environment or environment class to which this specification applies.
        ja: specification を適用できる named environment または environment class を参照します。
      allowed_values: []
      pattern: null
      example_value: runtime-linux-container
      source_claims:
        - claim-isolation-specification-design
    - id: enforcer
      labels:
        zh: 执行器
        en: enforcer
        ja: enforcer
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实际加载并强制该规范的运行时、内核机制或安全组件。
        en: Runtime, kernel mechanism, or security component that loads and enforces the specification.
        ja: specification を load/enforce する runtime・kernel mechanism・security component。
      allowed_values: []
      pattern: null
      example_value: runc+Landlock
      source_claims:
        - claim-isolation-specification-design
        - claim-isolation-specification-design
  constraints:
    - id: isolation-spec-version-immutable
      severity: error
      expression_language: plain
      expression: the same isolation_spec_id and version must resolve to the same constraint content
      explanations:
        zh: 同一规范标识与版本不得解析到不同约束；任何约束变化都创建新版本。
        en: The same specification ID and version cannot resolve to different constraints; every constraint change creates a new version.
        ja: 同じ specification ID/version が異なる制約を指してはならず変更時は新 version を作ります。
      source_claims:
        - claim-isolation-specification-design
  required_relation_constraints: []
examples:
  - id: IsolationSpecification-e2b-template
    labels:
      zh: E2B 模板隔离规范
      en: E2B template isolation spec
      ja: E2B template isolation spec
    descriptions:
      zh: agent-sandbox@4 映射 E2B code-interpreter-v1 模板的 CPU/内存/网络/FS 限制。
      en: agent-sandbox@4 maps E2B code-interpreter-v1 template CPU/memory/network/FS limits.
      ja: agent-sandbox@4 E2B code-interpreter-v1 template 制限写像。
    example_source:
      product: E2B Sandbox API
      url: https://e2b.dev/docs
      version: Sandbox.create template
    field_values:
      spec_id: agent-sandbox
      version: "4"
    related_node_ids:
      - IsolationSpecification
      - Sandbox
      - FilesystemPolicy
    related_relation_ids: []
    source_claims:
      - claim-isolation-specification-design
  - id: IsolationSpecification-docker-oci
    labels:
      zh: Docker/OCI 隔离规范
      en: Docker/OCI isolation spec
      ja: Docker/OCI isolation spec
    descriptions:
      zh: oci-agent@2 组合 fs-code@4 readonlyPaths 与 proc-python@2 seccomp profile。
      en: oci-agent@2 combines fs-code@4 readonlyPaths and proc-python@2 seccomp profile.
      ja: oci-agent@2 fs-code@4 readonlyPaths+proc-python@2 seccomp。
    example_source:
      product: OCI Linux runtime
      url: https://github.com/opencontainers/runtime-spec/blob/main/config-linux.md
      version: Linux container config
    field_values:
      spec_id: oci-agent
      version: "2"
    related_node_ids:
      - IsolationSpecification
      - FilesystemPolicy
      - ProcessPolicy
    related_relation_ids: []
    source_claims:
      - claim-isolation-specification-design
  - id: IsolationSpecification-cursor-layer
    labels:
      zh: Cursor sandbox 叠加规范
      en: Cursor sandbox overlay spec
      ja: Cursor sandbox overlay spec
    descriptions:
      zh: cursor-terminal@1 在宿主 DAC 上叠加 workspace-write 与 command allowlist 层。
      en: cursor-terminal@1 overlays workspace-write and command allowlist on host DAC.
      ja: cursor-terminal@1 workspace-write+allowlist overlay。
    example_source:
      product: Cursor Agent Terminal
      url: https://cursor.com/docs/agent/terminal
      version: workspace-write
    field_values:
      spec_id: cursor-terminal
      version: "1"
    related_node_ids:
      - IsolationSpecification
      - FilesystemPolicy
    related_relation_ids: []
    source_claims:
      - claim-isolation-specification-design
  - id: IsolationSpecification-boundary-instance
    labels:
      zh: 规范不是 Sandbox 实例
      en: Specification is not Sandbox instance
      ja: spec≠Sandbox instance
    descriptions:
      zh: config.json 声明 namespace 但无 sandbox_id/load 证据时不构成 Sandbox，只是 IsolationSpecification 草案。
      en: config.json declaring namespaces without sandbox_id/load evidence is not Sandbox, only IsolationSpecification draft.
      ja: config.json namespace 宣言のみ sandbox_id/load 証拠なし→Sandbox ではなく spec 草案。
    example_source:
      product: Moonweave
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: spec versus instance
    field_values: {}
    related_node_ids:
      - IsolationSpecification
      - Sandbox
    related_relation_ids: []
    source_claims:
      - claim-isolation-specification-design
parent_relation: null
relations: []
