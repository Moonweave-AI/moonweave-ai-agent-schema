schema: moonweave.ai/ontology-node/v1
id: IsolationSpecification
kind: concept
status: accepted
labels:
  zh: 隔离规范
  en: isolation specification
  ja: 隔離仕様
semantics:
  short_definition:
    zh: 约束一个具名执行环境的版本化隔离规范。
    en: A versioned isolation specification for one named execution environment.
    ja: 特定 execution environment を制約する versioned isolation specification。
  definition:
    zh: 隔离规范是一种安全规范，以规范标识、不可变版本、适用环境和执行器为身份，声明进程、文件系统、挂载、设备、命名空间、能力与资源上限的可执行约束。它描述应施加的边界，不是已运行的 Sandbox，也不是一次拒绝事件。
    en: An IsolationSpecification is a security specification identified by specification ID, immutable version, applicable environment, and enforcer. It declares executable constraints over processes, filesystems, mounts, devices, namespaces, capabilities, and resource limits. It describes the boundary to enforce; it is neither a running Sandbox nor one denial event.
    ja: IsolationSpecification は specification ID・不変 version・applicable environment・enforcer で識別する security specification で、process・filesystem・mount・device・namespace・capability・resource limit の実行可能制約を宣言します。enforce すべき境界であり running Sandbox や denial event ではありません。
  why_needed:
    zh: 把“应隔离什么”与“哪个沙箱实例实际执行了什么”分开，才能版本化、审计和比较有效配置。
    en: It separates what must be isolated from what a concrete sandbox instance did, enabling versioning, audit, and effective-configuration comparison.
    ja: 隔離要件と concrete sandbox instance の実行事実を分離し versioning・audit・effective config 比較を可能にします。
  includes:
    - zh: 规范标识、版本、适用环境、执行器，以及默认拒绝或显式允许的隔离约束。
      en: Specification identity, version, applicable environment, enforcer, and default-deny or explicit-allow isolation constraints.
      ja: specification identity・version・applicable environment・enforcer・default-deny/explicit-allow 制約。
  excludes:
    - zh: 运行中的 Sandbox、一次进程执行、单个拒绝事件、网络路由与业务授权决定。
      en: Running Sandbox instances, individual process executions, denial events, network routes, and business authorization decisions.
      ja: running Sandbox・個別 process execution・denial event・network route・business authorization decision。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: isolation_spec_id
      labels:
        zh: 隔离规范标识
        en: isolation specification ID
        ja: isolation specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本保持稳定的隔离规范逻辑标识。
        en: Stable logical identifier across revisions of an isolation specification.
        ja: isolation specification revision 間で安定する logical ID。
      allowed_values: []
      pattern: null
      example_value: isolation-code-tool
      source_claims:
        - claim-isolation-specification-001
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的隔离约束。
        en: Fixes one immutable revision of isolation constraints.
        ja: 一組の不変 isolation constraint revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-isolation-specification-002
    - id: applicable_environment_ref
      labels:
        zh: 适用环境引用
        en: applicable environment reference
        ja: applicable environment reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向可应用该规范的运行环境类别或具名环境。
        en: References the named environment or environment class to which this specification applies.
        ja: specification を適用できる named environment または environment class を参照します。
      allowed_values: []
      pattern: null
      example_value: runtime-linux-container
      source_claims:
        - claim-isolation-specification-002
    - id: enforcer
      labels:
        zh: 执行器
        en: enforcer
        ja: enforcer
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实际加载并强制该规范的运行时、内核机制或安全组件。
        en: Runtime, kernel mechanism, or security component that loads and enforces the specification.
        ja: specification を load/enforce する runtime・kernel mechanism・security component。
      allowed_values: []
      pattern: null
      example_value: runc+Landlock
      source_claims:
        - claim-isolation-specification-002
        - claim-isolation-specification-003
  constraints:
    - id: isolation-spec-version-immutable
      severity: error
      expression_language: plain
      expression: the same isolation_spec_id and version must resolve to the same constraint content
      explanations:
        zh: 同一规范标识与版本不得解析到不同约束；任何约束变化都创建新版本。
        en: The same specification ID and version cannot resolve to different constraints; every constraint change creates a new version.
        ja: 同じ specification ID/version が異なる制約を指してはならず変更時は新 version を作ります。
      source_claims:
        - claim-isolation-specification-002
  required_relation_constraints: []
examples:
  - id: isolation-specification-e2b
    labels:
      zh: 隔离规范 - E2B 沙箱 VM
      en: isolation specification - E2B sandbox VM
      ja: 隔離仕様 - E2B サンドボックス VM
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 约束一个具名执行环境的版本化隔离规范。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: enforcer, isolation_spec_id, applicable_environment_ref.", en: "isolation specification (IsolationSpecification) [IsolationSpecification]: A versioned isolation specification for one named execution environment.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include enforcer, isolation_spec_id, applicable_environment_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 特定 execution environment を制約する versioned isolation specification。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: enforcer, isolation_spec_id, applicable_environment_ref."}
    field_values:
      applicable_environment_ref: runtime-linux-container
      enforcer: runc+Landlock
      isolation_spec_id: isolation-code-tool
      version: "4"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: E2B Sandbox API
    source_claims:
      - claim-isolation-specification-001
  - id: isolation-specification-firecracker
    labels:
      zh: 隔离规范 - Firecracker microVM 隔离
      en: isolation specification - Firecracker microVM isolation
      ja: 隔離仕様 - Firecracker microVM 分離
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 约束一个具名执行环境的版本化隔离规范。. AWS Firecracker microVM 以最小开销隔离 Lambda 与 Fargate 工作负载。 Fields: enforcer, isolation_spec_id, applicable_environment_ref.", en: "isolation specification (IsolationSpecification) [IsolationSpecification]: A versioned isolation specification for one named execution environment.. AWS Firecracker microVMs isolate Lambda and Fargate workloads with minimal overhead (firecracker-microvm.github.io). Fields include enforcer, isolation_spec_id, applicable_environment_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 特定 execution environment を制約する versioned isolation specification。. AWS Firecracker microVM は Lambda/Fargate workload を minimal overhead で isolate する。 Fields: enforcer, isolation_spec_id, applicable_environment_ref."}
    field_values:
      applicable_environment_ref: runtime-linux-container
      enforcer: runc+Landlock
      isolation_spec_id: isolation-code-tool
      version: "4"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: AWS Firecracker
    source_claims:
      - claim-isolation-specification-001
  - id: isolation-specification-gvisor_runsc
    labels:
      zh: 隔离规范 - gVisor runsc 内核沙箱
      en: isolation specification - gVisor runsc kernel sandbox
      ja: 隔離仕様 - gVisor runsc カーネル sandbox
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 约束一个具名执行环境的版本化隔离规范。. gVisor runsc 通过 user-space kernel Sentry 拦截 syscall，Docker/Kubernetes 可用 runtime=runsc 运行容器，限制内核攻击面（gvisor.dev/docs）。 Fields: enforcer, isolation_spec_id, applicable_environment_ref.", en: "isolation specification (IsolationSpecification) [IsolationSpecification]: A versioned isolation specification for one named execution environment.. gVisor runsc intercepts syscalls via user-space kernel Sentry; Docker/Kubernetes can run containers with runtime=runsc to limit kernel attack surface (gvisor.dev/docs). Fields include enforcer, isolation_spec_id, applicable_environment_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 特定 execution environment を制約する versioned isolation specification。. gVisor runsc は user-space kernel Sentry で syscall を intercept し runtime=runsc で kernel 攻撃面を制限する。 Fields: enforcer, isolation_spec_id, applicable_environment_ref."}
    field_values:
      applicable_environment_ref: runtime-linux-container
      enforcer: runc+Landlock
      isolation_spec_id: isolation-code-tool
      version: "4"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: gVisor runsc
    source_claims:
      - claim-isolation-specification-001
  - id: isolation-specification-docker_network_none
    labels:
      zh: 隔离规范 - Docker 网络隔离
      en: isolation specification - Docker network isolation
      ja: 隔離仕様 - Docker ネットワーク分離
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 约束一个具名执行环境的版本化隔离规范。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: enforcer, isolation_spec_id, applicable_environment_ref.", en: "isolation specification (IsolationSpecification) [IsolationSpecification]: A versioned isolation specification for one named execution environment.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include enforcer, isolation_spec_id, applicable_environment_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 特定 execution environment を制約する versioned isolation specification。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: enforcer, isolation_spec_id, applicable_environment_ref."}
    field_values:
      applicable_environment_ref: runtime-linux-container
      enforcer: runc+Landlock
      isolation_spec_id: isolation-code-tool
      version: "4"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: Docker network none
    source_claims:
      - claim-isolation-specification-001
external_mappings: []
