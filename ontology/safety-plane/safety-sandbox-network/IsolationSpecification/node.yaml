schema: moonweave.ai/ontology-node/v1
id: IsolationSpecification
kind: concept
status: accepted
labels:
  zh: 隔离规范
  en: isolation specification
  ja: 隔離仕様
semantics:
  short_definition:
    zh: 约束一个具名执行环境的版本化隔离规范。
    en: A versioned isolation specification for one named execution environment.
    ja: 特定 execution environment を制約する versioned isolation specification。
  definition:
    zh: 隔离规范是一种安全规范，以规范标识、不可变版本、适用环境和执行器为身份，声明进程、文件系统、挂载、设备、命名空间、能力与资源上限的可执行约束。它描述应施加的边界，不是已运行的 Sandbox，也不是一次拒绝事件。
    en: An IsolationSpecification is a security specification identified by specification ID, immutable version, applicable environment, and enforcer. It declares executable constraints over processes, filesystems, mounts, devices, namespaces, capabilities, and resource limits. It describes the boundary to enforce; it is neither a running Sandbox nor one denial event.
    ja: IsolationSpecification は specification ID・不変 version・applicable environment・enforcer で識別する security specification で、process・filesystem・mount・device・namespace・capability・resource limit の実行可能制約を宣言します。enforce すべき境界であり running Sandbox や denial event ではありません。
  why_needed:
    zh: 把“应隔离什么”与“哪个沙箱实例实际执行了什么”分开，才能版本化、审计和比较有效配置。
    en: It separates what must be isolated from what a concrete sandbox instance did, enabling versioning, audit, and effective-configuration comparison.
    ja: 隔離要件と concrete sandbox instance の実行事実を分離し versioning・audit・effective config 比較を可能にします。
  includes:
    - zh: 规范标识、版本、适用环境、执行器，以及默认拒绝或显式允许的隔离约束。
      en: Specification identity, version, applicable environment, enforcer, and default-deny or explicit-allow isolation constraints.
      ja: specification identity・version・applicable environment・enforcer・default-deny/explicit-allow 制約。
  excludes:
    - zh: 运行中的 Sandbox、一次进程执行、单个拒绝事件、网络路由与业务授权决定。
      en: Running Sandbox instances, individual process executions, denial events, network routes, and business authorization decisions.
      ja: running Sandbox・個別 process execution・denial event・network route・business authorization decision。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - isolation_spec_id
    - version
  fields:
    - id: isolation_spec_id
      labels:
        zh: 隔离规范标识
        en: isolation specification ID
        ja: isolation specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本保持稳定的隔离规范逻辑标识。
        en: Stable logical identifier across revisions of an isolation specification.
        ja: isolation specification revision 間で安定する logical ID。
      allowed_values: []
      pattern: null
      example_value: isolation-code-tool
      source_claims:
        - claim-isolation-specification-001
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: specification version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的隔离约束。
        en: Fixes one immutable revision of isolation constraints.
        ja: 一組の不変 isolation constraint revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-isolation-specification-002
    - id: applicable_environment_ref
      labels:
        zh: 适用环境引用
        en: applicable environment reference
        ja: applicable environment reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向可应用该规范的运行环境类别或具名环境。
        en: References the named environment or environment class to which this specification applies.
        ja: specification を適用できる named environment または environment class を参照します。
      allowed_values: []
      pattern: null
      example_value: runtime-linux-container
      source_claims:
        - claim-isolation-specification-002
    - id: enforcer
      labels:
        zh: 执行器
        en: enforcer
        ja: enforcer
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实际加载并强制该规范的运行时、内核机制或安全组件。
        en: Runtime, kernel mechanism, or security component that loads and enforces the specification.
        ja: specification を load/enforce する runtime・kernel mechanism・security component。
      allowed_values: []
      pattern: null
      example_value: runc+Landlock
      source_claims:
        - claim-isolation-specification-002
        - claim-isolation-specification-003
  constraints:
    - id: isolation-spec-version-immutable
      severity: error
      expression_language: plain
      expression: the same isolation_spec_id and version must resolve to the same constraint content
      explanations:
        zh: 同一规范标识与版本不得解析到不同约束；任何约束变化都创建新版本。
        en: The same specification ID and version cannot resolve to different constraints; every constraint change creates a new version.
        ja: 同じ specification ID/version が異なる制約を指してはならず変更時は新 version を作ります。
      source_claims:
        - claim-isolation-specification-002
  required_relation_constraints: []
examples:
  - id: IsolationSpecification-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 代码工具隔离规范
      en: Code-tool isolation specification
      ja: code tool isolation specification
    scenario_id: null
    descriptions:
      zh: isolation-code-tool@4 指向 linux-container 环境，由 runc、seccomp 与 Landlock 执行，并固定进程、挂载、路径和能力约束。
      en: isolation-code-tool@4 targets linux-container and is enforced by runc, seccomp, and Landlock with fixed process, mount, path, and capability constraints.
      ja: isolation-code-tool@4 は linux-container を対象とし runc・seccomp・Landlock が process・mount・path・capability 制約を enforce します。
    field_values:
      isolation_spec_id: isolation-code-tool
      version: "4"
      applicable_environment_ref: linux-container
      enforcer: runc+seccomp+Landlock
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    expected_result:
      zh: 识别为可版本化、可执行的 IsolationSpecification。
      en: Classify it as an enforceable, versioned IsolationSpecification.
      ja: enforceable/versioned IsolationSpecification と分類します。
    why_valid_or_invalid:
      zh: 记录同时给出稳定身份、适用环境、执行器和约束内容。
      en: The record supplies stable identity, applicable environment, enforcer, and constraint content.
      ja: stable identity・applicable environment・enforcer・constraint content を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-isolation-specification-001
      - claim-isolation-specification-002
      - claim-isolation-specification-003
  - id: IsolationSpecification-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只有安全建议的文档
      en: Advisory-only security document
      ja: advisory-only security document
    scenario_id: sandbox-review-isolationspecification-boundary
    descriptions:
      zh: 一份文档建议“使用沙箱”，但没有规范 ID、版本、适用环境、执行器或可加载约束。
      en: A document recommends using a sandbox but has no specification ID, version, applicable environment, enforcer, or loadable constraints.
      ja: 文書は sandbox 利用を推奨しますが specification ID・version・environment・enforcer・loadable constraint がありません。
    field_values: {}
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    expected_result:
      zh: 保留为一般指导材料，不创建 IsolationSpecification 实例。
      en: Keep it as guidance and do not create an IsolationSpecification instance.
      ja: guidance のままとし IsolationSpecification instance を作りません。
    why_valid_or_invalid:
      zh: 建议缺少可执行规范的身份和强制语义。
      en: Advice lacks the identity and enforcement semantics of an executable specification.
      ja: advice は executable specification の identity/enforcement 意味を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-isolation-specification-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: Verified against OCI/Docker isolation, Linux namespaces, seccomp, AppArmor/LSM, and Landlock; specification vs Sandbox instance separation holds.
    en: Verified against OCI/Docker isolation, Linux namespaces, seccomp, AppArmor/LSM, and Landlock; specification vs Sandbox instance separation holds.
    ja: Verified against OCI/Docker isolation, Linux namespaces, seccomp, AppArmor/LSM, and Landlock; specification vs Sandbox instance separation holds.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-isolation-specification-001
    source: eng-security-mcp-nsa-2026
    supports: NSA's May 2026 MCP guidance recommends strict resource and permission boundaries, operating-system isolation such as seccomp/AppArmor/SELinux, sandboxing against lateral movement and privilege escalation, and explicit runtime denial of unneeded filesystem and network paths.
    locator: NSA MCP Security Design Considerations > pp. 10-11 > Constrain and sandbox tool execution
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-isolation-specification-002
    source: eng-runtime-oci-linux-config
    supports: The OCI Linux runtime specification defines namespaces, devices, cgroups, mounts, masked paths, read-only paths, seccomp integration, and runtime errors that ground enforceable process and filesystem isolation settings.
    locator: OCI Runtime Specification > Linux Container Configuration > Namespaces, Devices, Control groups, Masked Paths, Readonly Paths
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-isolation-specification-003
    source: eng-security-linux-landlock
    supports: Linux Landlock defines stackable path-hierarchy access rules, read/write/execute rights, rule inheritance, bind-mount and OverlayFS behavior, and explicit limitations relevant to filesystem sandbox evaluation.
    locator: Linux Kernel documentation > Landlock rules, Layers of file path access rights, Bind mounts and OverlayFS, Current limitations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
