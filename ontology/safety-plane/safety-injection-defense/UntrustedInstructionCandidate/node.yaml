    descriptions: {zh: "不受信任指令候选(UntrustedInstructionCandidate) [UntrustedInstructionCandidate]: 在不受信任内容中检测到的疑似指令性片段。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: candidate_id, origin, content_span_reference.", en: "Untrusted Instruction Candidate (UntrustedInstructionCandidate) [UntrustedInstructionCandidate]: An instruction-like span detected in content that lacks instruction trust.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include candidate_id, origin, content_span_reference.", ja: "信頼できない指示候補(UntrustedInstructionCandidate) [UntrustedInstructionCandidate]: 指示として信頼されない内容から検出された指示らしい範囲。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: candidate_id, origin, content_span_reference."}
