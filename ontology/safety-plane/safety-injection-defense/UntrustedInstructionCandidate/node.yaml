parent_relation: null
relations:
  - id: UntrustedInstructionCandidate-wasGeneratedBy-PatternScan
    predicate: was_generated_by
    target: concept:PatternScan
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由模式扫描生成
      en: was generated by pattern scan
      ja: パターンスキャンによって生成された
    definitions:
      zh: UntrustedInstructionCandidate 是由已发生的 PatternScan 生成的实体，并以
        PROV-O wasGeneratedBy 保留扫描来历，而不是扫描的组成部分。
      en: An UntrustedInstructionCandidate is an entity generated by an occurred
        PatternScan and retains scan provenance through PROV-O wasGeneratedBy rather
        than being a component of the scan.
      ja: UntrustedInstructionCandidate は発生済み PatternScan が生成したエンティティであり、スキャンの構成要素ではなく
        PROV-O wasGeneratedBy によりスキャン来歴を保持する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    source_claims:
      - claim-prov-o-generation
    layout_role: cross-link
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Defines prompt-injection risk from untrusted input altering model behavior.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity, Activity, and wasGeneratedBy relations for output provenance.
source_claims:
  - id: claim-owasp-prompt-injection
    source: owasp-llm01-2025
    supports: Prompt injection arises when untrusted inputs alter model behavior and
      can lead to disclosure, privilege escalation, or unauthorized actions.
    locator: Overview and Prevention and Mitigation Strategies
    evidence_kind: security-guidance
    confidence: high
  - id: claim-prov-o-generation
    source: w3c-prov-o
    supports: PROV-O defines prov:wasGeneratedBy between an Entity and an Activity. Moonweave uses that relation to record that an occurred PatternScan generated this candidate; the candidate's injection-risk semantics remain a local model informed by OWASP guidance.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
