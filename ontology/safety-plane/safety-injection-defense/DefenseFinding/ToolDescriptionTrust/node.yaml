      en: Tool Description Trust - TrustLLM six-dimension trust
      ja: ツール説明の信頼評価 - TrustLLM 6次元信頼性
    descriptions: {zh: "工具描述信任评估(ToolDescriptionTrust) [ToolDescriptionTrust]: 对工具描述或注释可被用于安全决策的信任基础所作的防护评估。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: defense_finding_id, evidence_reference, assessed_trust_level.", en: "Tool Description Trust (ToolDescriptionTrust) [ToolDescriptionTrust]: A defense assessment of the trust basis for using a tool description or annotation in safety decisions.. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include defense_finding_id, evidence_reference, assessed_trust_level.", ja: "ツール説明の信頼評価(ToolDescriptionTrust) [ToolDescriptionTrust]: 安全決定にツール説明または注釈を使う際の信頼根拠に対する防御評価。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: defense_finding_id, evidence_reference, assessed_trust_level."}
    field_values:
