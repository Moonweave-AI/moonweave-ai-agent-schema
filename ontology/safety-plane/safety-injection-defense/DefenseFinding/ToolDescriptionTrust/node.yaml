    labels:
      zh: 工具描述信任评估 - Rebuff 注入检测
      en: Tool Description Trust - Rebuff injection detection
      ja: ツール説明の信頼評価 - Rebuff 注入検出
    descriptions: {zh: "工具描述信任评估(ToolDescriptionTrust) [ToolDescriptionTrust]: 对工具描述或注释可被用于安全决策的信任基础所作的防护评估。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: defense_finding_id, evidence_reference, assessed_trust_level.", en: "Tool Description Trust (ToolDescriptionTrust) [ToolDescriptionTrust]: A defense assessment of the trust basis for using a tool description or annotation in safety decisions.. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include defense_finding_id, evidence_reference, assessed_trust_level.", ja: "ツール説明の信頼評価(ToolDescriptionTrust) [ToolDescriptionTrust]: 安全決定にツール説明または注釈を使う際の信頼根拠に対する防御評価。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: defense_finding_id, evidence_reference, assessed_trust_level."}
    field_values:
      assessed_trust_level: untrusted
      defense_finding_id: tool-trust-42
      evidence_reference: tool-description-revision-42
      severity: high
      tool_description_trust_id: tool-trust-42
    related_node_ids:
      - ToolDescriptionTrust
    related_relation_ids:
