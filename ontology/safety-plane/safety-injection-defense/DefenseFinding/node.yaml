schema: moonweave.ai/ontology-node/v1
id: DefenseFinding
kind: concept
status: accepted
labels:
  zh: 防护发现
  en: Defense Finding
  ja: 防御発見
semantics:
  short_definition:
    zh: 将检测证据组织为可评估风险和建议安全处置的记录。
    en: A record that organizes detection evidence into an assessable risk and
      recommended safety disposition.
    ja: 検出証拠を評価可能なリスクと推奨安全処置へ整理する記録。
  definition:
    zh: DefenseFinding 是由已发生的 DetectionActivity 生成的结构化发现，它汇集信号、证据、严重度和建议行动。其输出来历以
      PROV-O wasGeneratedBy 表示，而不是目录组成。它不是原始不受信任内容、ThreatSignal 的单个观察、已执行的
      MitigationAction、PolicyDecision 或 AuthorizationGrant。
    en: DefenseFinding is a structured finding generated by an occurred
      DetectionActivity that collects signals, evidence, severity, and recommended
      action. Its output provenance is expressed with PROV-O wasGeneratedBy, not
      directory composition. It is not raw untrusted content, one observation of
      a ThreatSignal, an executed MitigationAction, a PolicyDecision, or an
      AuthorizationGrant.
    ja: DefenseFinding は発生済み DetectionActivity が生成する構造化発見であり、シグナル、証拠、重大度、推奨行為を集める。出力来歴は
      ディレクトリ構成ではなく PROV-O wasGeneratedBy で表す。生の信頼できない内容、ThreatSignal の一観測、実行済み
      MitigationAction、PolicyDecision、AuthorizationGrant ではない。
  why_needed:
    zh: 检测信号需要被汇总成可审查、可分级和可处置的结论，同时保持与原始证据和后续缓解的边界。
    en: Detection signals need a reviewable, ranked, actionable conclusion while
      keeping boundaries to raw evidence and later mitigation.
    ja: 検出シグナルは、生の証拠と後続緩和の境界を保ちながら、レビュー可能で優先順位付き、処置可能な結論へ集約する必要がある。
  includes:
    - zh: 发现标识、关联信号、证据、严重度、建议行动和处置状态。
      en: Finding identity, related signals, evidence, severity, recommended action,
        and disposition state.
      ja: 発見識別子、関連シグナル、証拠、重大度、推奨行為、処置状態。
  excludes:
    - zh: 用于生成发现的整个原始内容工件。
      en: The entire raw content artifact used to produce the finding.
      ja: 発見の生成に使われた生内容アーティファクト全体。
  semantic_kind: finding
  aliases:
    - security-finding
    - injection-finding
engineering:
  explanation:
    zh: 将信号和扫描证据归并为带严重度的发现，并记录建议而不直接修改内容或权限。缓解动作必须单独引用发现，允许审计者区分建议、批准和实际执行。
    en: Aggregate signals and scan evidence into a severity-bearing finding and
      record a recommendation without directly changing content or permission. A
      mitigation action must separately reference the finding so auditors can
      distinguish recommendation, approval, and execution.
    ja: シグナルとスキャン証拠を重大度付き発見へ集約し、内容や権限を直接変えず推奨を記録する。緩和行為は発見を別途参照し、監査者が推奨、承認、実行を区別できるようにする。
  typical_input:
    - description:
        zh: 检测证据
        en: Detection evidence
        ja: 検出証拠
      format: '{"defense_finding_id":"finding-42","signals":["signal-42"],"evidence_reference":"candidate-42","severity":"high"}'
      source_claims:
        - claim-owasp-finding-inference
  typical_output:
    - description:
        zh: 可处置发现
        en: Actionable finding
        ja: 処置可能な発見
      format: '{"defense_finding_id":"finding-42","evidence_reference":"signal-42","recommendation":"quarantine","status":"open"}'
      source_claims:
        - claim-owasp-finding-inference
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Describes injection impacts including disclosure
structure:
  identity_keys:
    - defense_finding_id
  fields:
    - id: defense_finding_id
      labels:
        zh: 防护发现标识符
        en: Defense finding ID
        ja: 防御発見 ID
      definitions:
        zh: 一个可审查防护发现的稳定标识符。
        en: Stable identifier for one reviewable defense finding.
        ja: 一つのレビュー可能な防御発見の安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: finding-42
      allowed_values: []
      source_claims:
        - claim-owasp-finding-inference
    - id: severity
      labels:
        zh: 严重度
        en: Severity
        ja: 重大度
      definitions:
        zh: 根据证据为发现分配的风险优先级。
        en: The evidence-based risk priority assigned to the finding.
        ja: 証拠に基づき発見へ割り当てるリスク優先度。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: high
      allowed_values:
        - low
        - medium
        - high
        - critical
      source_claims:
        - claim-owasp-finding-inference
    - id: evidence_reference
      labels:
        zh: 证据引用
        en: Evidence reference
        ja: 証拠参照
      definitions:
        zh: 支持风险分级和建议处置的可追溯信号或证据记录引用。
        en: A traceable signal or evidence-record reference supporting the risk ranking and recommended disposition.
        ja: リスク順位と推奨処置を裏付ける、追跡可能なシグナルまたは証拠記録への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: signal-42
      allowed_values: []
      source_claims:
        - claim-owasp-finding-inference
  constraints:
    - id: defense-finding-evidence-before-disposition
      severity: error
      expression_language: plain
      expression: A DefenseFinding must retain at least one signal or evidence
        reference before it can recommend mitigation or be assigned severity.
      explanations:
        zh: 没有证据的建议不是可审计的安全发现。
        en: A recommendation without evidence is not an auditable safety finding.
        ja: 証拠のない推奨は監査可能な安全発見ではない。
      explanation:
        zh: 没有证据的建议不是可审计的安全发现。
        en: A recommendation without evidence is not an auditable safety finding.
        ja: 証拠のない推奨は監査可能な安全発見ではない。
      source_claims:
        - claim-owasp-finding-inference
    - id: defense-finding-detection-provenance
      severity: error
      language: plain
      expression: Each DefenseFinding instance must retain a typed was_generated_by
        relation to an occurred DetectionActivity and an evidence reference; it
        must not be modeled as a child component of the activity.
      explanation:
        zh: A finding is an output record, while detection is the activity that produced
          it.
        en: A finding is an output record, while detection is the activity that produced
          it.
        ja: A finding is an output record, while detection is the activity that produced
          it.
      source_claims:
        - claim-prov-o-generation
  required_relations: []
examples:
  - id: defense-finding-lakera
    labels:
      zh: 防护发现 - Lakera Guard 注入检测
      en: Defense Finding - Lakera Guard injection detection
      ja: 防御発見 - Lakera Guard 注入検出
    descriptions: {zh: "防护发现(DefenseFinding) [DefenseFinding]: 将检测证据组织为可评估风险和建议安全处置的记录。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} 返回 {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}}。 Fields: defense_finding_id, evidence_reference, severity.", en: "Defense Finding (DefenseFinding) [DefenseFinding]: A record that organizes detection evidence into an assessable risk and. Lakera Guard POST https://api.lakera.ai/v2/guard with {\"input\": \"user message\", \"breakdown\": true} returns {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} (docs.lakera.ai). Fields include defense_finding_id, evidence_reference, severity.", ja: "防御発見(DefenseFinding) [DefenseFinding]: 検出証拠を評価可能なリスクと推奨安全処置へ整理する記録。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} は {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} を返す。 Fields: defense_finding_id, evidence_reference, severity."}
    field_values:
      defense_finding_id: finding-42
      evidence_reference: signal-42
      severity: high
    related_node_ids:
      - DefenseFinding
    related_relation_ids: []
    example_source: Lakera Guard API
    source_claims:
      - claim-owasp-finding-inference
  - id: defense-finding-rebuff
    labels:
      zh: 防护发现 - Rebuff 注入检测
      en: Defense Finding - Rebuff injection detection
      ja: 防御発見 - Rebuff 注入検出
    descriptions: {zh: "防护发现(DefenseFinding) [DefenseFinding]: 将检测证据组织为可评估风险和建议安全处置的记录。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: defense_finding_id, evidence_reference, severity.", en: "Defense Finding (DefenseFinding) [DefenseFinding]: A record that organizes detection evidence into an assessable risk and. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include defense_finding_id, evidence_reference, severity.", ja: "防御発見(DefenseFinding) [DefenseFinding]: 検出証拠を評価可能なリスクと推奨安全処置へ整理する記録。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: defense_finding_id, evidence_reference, severity."}
    field_values:
      defense_finding_id: finding-42
      evidence_reference: signal-42
      severity: high
    related_node_ids:
      - DefenseFinding
    related_relation_ids: []
    example_source: Rebuff detector
    source_claims:
      - claim-owasp-finding-inference
  - id: defense-finding-llama_guard
    labels:
      zh: 防护发现 - Llama Guard 安全分类
      en: Defense Finding - Llama Guard safety classification
      ja: 防御発見 - Llama Guard 安全分類
    descriptions: {zh: "防护发现(DefenseFinding) [DefenseFinding]: 将检测证据组织为可评估风险和建议安全处置的记录。. Inan 等（2023）Llama Guard：微调 Llama 安全分类器输出 safe/unsafe\\nO1（O1=暴力、O2=性、O3=犯罪、O4=枪支、O5=受管制、O6=自残）用于 I/O 审核（arxiv.org/abs/2312.06674）。 Fields: defense_finding_id, evidence_reference, severity.", en: "Defense Finding (DefenseFinding) [DefenseFinding]: A record that organizes detection evidence into an assessable risk and. Inan et al. (2023) Llama Guard: fine-tuned Llama safety classifier outputs safe/unsafe\\nO1 (O1=violence, O2=sexual, O3=criminal, O4=guns, O5=regulated, O6=self-harm) for I/O moderation (arxiv.org/abs/2312.06674). Fields include defense_finding_id, evidence_reference, severity.", ja: "防御発見(DefenseFinding) [DefenseFinding]: 検出証拠を評価可能なリスクと推奨安全処置へ整理する記録。. Inan ほか（2023）Llama Guard：fine-tuned Llama が safe/unsafe\\nO1（O1=violence 等6類）を I/O moderation に出力（arxiv.org/abs/2312.06674）。 Fields: defense_finding_id, evidence_reference, severity."}
    field_values:
      defense_finding_id: finding-42
      evidence_reference: signal-42
      severity: high
    related_node_ids:
      - DefenseFinding
    related_relation_ids: []
    example_source: Meta Llama Guard 2023
    source_claims:
      - claim-owasp-finding-inference
  - id: defense-finding-guardrails_ai
    labels:
      zh: 防护发现 - Guardrails AI Pydantic 验证
      en: Defense Finding - Guardrails AI Pydantic validation
      ja: 防御発見 - Guardrails AI Pydantic 検証
    descriptions: {zh: "防护发现(DefenseFinding) [DefenseFinding]: 将检测证据组织为可评估风险和建议安全处置的记录。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；guard(llm_api=..., prompt=...) 配合 ToxicLanguage、ProfanityFree、ValidJSON 验证器。 Fields: defense_finding_id, evidence_reference, severity.", en: "Defense Finding (DefenseFinding) [DefenseFinding]: A record that organizes detection evidence into an assessable risk and. Guardrails AI: Guard.from_pydantic(output_class=ValidOutput); guard(llm_api=openai.chat.completions.create, prompt=...) with ToxicLanguage, ProfanityFree, ValidJSON validators (github.com/guardrails-ai/guardrails). Fields include defense_finding_id, evidence_reference, severity.", ja: "防御発見(DefenseFinding) [DefenseFinding]: 検出証拠を評価可能なリスクと推奨安全処置へ整理する記録。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；ToxicLanguage/ProfanityFree/ValidJSON validator 付き guard。 Fields: defense_finding_id, evidence_reference, severity."}
    field_values:
      defense_finding_id: finding-42
      evidence_reference: signal-42
      severity: high
    related_node_ids:
      - DefenseFinding
    related_relation_ids: []
    example_source: Guardrails AI
    source_claims:
      - claim-owasp-finding-inference
parent_relation: null
relations:
  - id: DefenseFinding-wasGeneratedBy-DetectionActivity
    predicate: was_generated_by
    target: concept:DetectionActivity
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由检测活动生成
      en: was generated by detection activity
      ja: 検出活動によって生成された
    definitions:
      zh: DefenseFinding 是由已发生的 DetectionActivity 生成的实体，并以 PROV-O
        wasGeneratedBy 保留检测来历，而不是作为该活动的结构组成部分。
      en: A DefenseFinding is an entity generated by an occurred DetectionActivity
        and retains detection provenance through PROV-O wasGeneratedBy rather than
        being a structural component of the activity.
      ja: DefenseFinding は発生済み DetectionActivity が生成したエンティティであり、活動の構造要素ではなく
        PROV-O wasGeneratedBy により検出来歴を保持する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    source_claims:
      - claim-prov-o-generation
    layout_role: cross-link
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Explains impacts from untrusted input altering model behavior.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity, Activity, and wasGeneratedBy relations for output provenance.
source_claims:
  - id: claim-owasp-finding-inference
    source: owasp-llm01-2025
    supports: Injection risk motivates evidence-backed severity and mitigation
      triage; it does not define this internal finding schema.
    locator: Overview and Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-generation
    source: w3c-prov-o
    supports: PROV-O defines prov:wasGeneratedBy between an Entity and an Activity. Moonweave uses that relation to record that an occurred DetectionActivity generated this finding; the finding's injection-risk semantics remain a local model informed by OWASP guidance.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
