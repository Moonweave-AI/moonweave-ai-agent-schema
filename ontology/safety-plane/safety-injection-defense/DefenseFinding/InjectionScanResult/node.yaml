schema: moonweave.ai/ontology-node/v1
id: InjectionScanResult
kind: concept
status: accepted
labels: {zh: 注入扫描结果, en: Injection Scan Result, ja: 注入スキャン結果}
semantics:
  short_definition: {zh: "汇总一次注入检查输出、严重度和建议处置的防护发现。", en: "A DefenseFinding that summarizes one injection-check output, severity, and recommended disposition.", ja: "一回の注入検査出力、重大度、推奨処置を要約する DefenseFinding。"}
  definition: {zh: "InjectionScanResult 是一种 DefenseFinding，汇总特定扫描运行的候选、信号和整体处置建议。它不是 PatternScan 活动、单个 ThreatSignal、原始内容或已经执行的阻断动作。", en: "InjectionScanResult is a DefenseFinding summarizing candidates, signals, and an overall disposition recommendation for a specific scan run. It is not the PatternScan activity, one ThreatSignal, raw content, or an already executed blocking action.", ja: "InjectionScanResult は特定スキャン実行の候補、シグナル、全体処置推奨を要約する DefenseFinding である。PatternScan 活動、一つの ThreatSignal、生内容、実行済み遮断行為ではない。"}
  why_needed: {zh: "消费者需要一次扫描的完整、可追溯摘要，而不是将单个命中或动作误当作整体安全结论。", en: "Consumers need a complete, traceable summary of one scan without mistaking one match or action for the overall safety conclusion.", ja: "消費者は一つの一致や行為を全体の安全結論と誤認せず、一回のスキャンの完全で追跡可能な要約を必要とする。"}
  includes: [{zh: "扫描引用、候选和信号摘要、总体严重度、建议和完成状态。", en: "Scan reference, candidate and signal summary, overall severity, recommendation, and completion state.", ja: "スキャン参照、候補とシグナル要約、全体重大度、推奨、完了状態。"}]
  excludes: [{zh: "单个候选范围或实际隔离回执。", en: "One candidate span or an actual quarantine receipt.", ja: "一つの候補範囲または実際の隔離受領書。"}]
  semantic_kind: finding
  aliases: [scan-summary, injection-report]
engineering:
  explanation: {zh: "在 PatternScan 完成后构造不可变结果摘要，链接扫描、候选和信号标识。结果可建议 block、review 或 pass，但实际阻断或隔离必须由独立控制记录。", en: "After PatternScan completes, construct an immutable result summary linking scan, candidate, and signal identities. The result may recommend block, review, or pass, but actual blocking or quarantine must be recorded by a separate control.", ja: "PatternScan 完了後、スキャン、候補、シグナル識別子を結ぶ不変の結果要約を構築する。結果は block、review、pass を推奨できるが、実際の遮断または隔離は別制御で記録しなければならない。"}
  typical_input:
    - description: {zh: 扫描输出, en: Scan output, ja: スキャン出力}
      format: '{"scan_id":"scan-42","candidates":["candidate-42"],"signals":["signal-42"],"severity":"high"}'
      source_claims: [claim-owasp-scan-result-inference]
  typical_output:
    - description: {zh: 扫描摘要, en: Scan summary, ja: スキャン要約}
      format: '{"scan_result_id":"scan-result-42","scan_id":"scan-42","recommendation":"block","status":"complete"}'
      source_claims: [claim-owasp-scan-result-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: "Explains the security risk of handling untrusted input influence."
structure:
  identity_keys: [defense_finding_id, injection_scan_result_id]
  fields:
    - id: defense_finding_id
      labels: {zh: 继承的防护发现标识符, en: Inherited defense finding ID, ja: 継承された防御発見 ID}
      definitions: {zh: 此扫描摘要作为 DefenseFinding 的稳定发现身份；它与本扫描结果记录指向同一可审查发现。, en: "Stable finding identity for this scan summary as a DefenseFinding; it identifies the same reviewable finding as this scan-result record.", ja: "このスキャン要約が DefenseFinding として持つ安定した発見 ID。同じレビュー可能な発見をこのスキャン結果記録と共に識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: scan-result-42
      allowed_values: []
      source_claims: [claim-owasp-scan-result-inference]
    - id: severity
      labels: {zh: 严重度, en: Severity, ja: 重大度}
      definitions: {zh: 根据该扫描摘要保留的检测证据分配的发现风险优先级。, en: "Evidence-based risk priority assigned to the finding represented by this scan summary.", ja: "このスキャン要約が保持する検出証拠に基づき発見へ割り当てられるリスク優先度。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: high
      allowed_values: [low, medium, high, critical]
      source_claims: [claim-owasp-scan-result-inference]
    - id: evidence_reference
      labels: {zh: 证据引用, en: Evidence reference, ja: 証拠参照}
      definitions: {zh: 支持扫描结论及其建议处置的候选、信号或证据记录引用。, en: "Candidate, signal, or evidence-record reference supporting the scan conclusion and its recommended disposition.", ja: "スキャン結論と推奨処置を裏付ける候補、シグナル、または証拠記録への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: signal-42
      allowed_values: []
      source_claims: [claim-owasp-scan-result-inference]
    - id: injection_scan_result_id
      labels: {zh: 注入扫描结果标识符, en: Injection scan result ID, ja: 注入スキャン結果 ID}
      definitions: {zh: "一次完整扫描摘要的稳定标识符。", en: "Stable identifier for one complete scan summary.", ja: "一回の完全なスキャン要約の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: scan-result-42
      allowed_values: []
      source_claims: [claim-owasp-scan-result-inference]
    - id: recommended_disposition
      labels: {zh: 建议处置, en: Recommended disposition, ja: 推奨処置}
      definitions: {zh: "基于扫描证据的总体建议，而非已执行动作。", en: "The overall evidence-based recommendation, not an action already executed.", ja: "スキャン証拠に基づく全体推奨であり、実行済み行為ではない。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: block
      allowed_values: [pass, review, block, quarantine]
      source_claims: [claim-owasp-scan-result-inference]
  constraints:
    - id: injection-scan-result-binds-scan
      severity: error
      expression_language: plain
      expression: An InjectionScanResult must reference one completed scan and must not claim a mitigation was executed solely from its recommended disposition.
      explanations: {zh: "建议与执行必须保留不同事实。", en: "Recommendation and execution must remain different facts.", ja: "推奨と実行は別の事実として保持しなければならない。"}
      explanation: {zh: "建议与执行必须保留不同事实。", en: "Recommendation and execution must remain different facts.", ja: "推奨と実行は別の事実として保持しなければならない。"}
      source_claims: [claim-owasp-scan-result-inference]
  required_relations: []
examples:
  - id: injection-scan-result-rebuff
    labels:
      zh: 注入扫描结果 - Rebuff 注入检测
      en: Injection Scan Result - Rebuff injection detection
      ja: 注入スキャン結果 - Rebuff 注入検出
    descriptions: {zh: "注入扫描结果(InjectionScanResult) [InjectionScanResult]: 注入扫描结果. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id.", en: "Injection Scan Result (InjectionScanResult) [InjectionScanResult]: Injection Scan Result. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include defense_finding_id, evidence_reference, injection_scan_result_id.", ja: "注入スキャン結果(InjectionScanResult) [InjectionScanResult]: 注入スキャン結果. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id."}
    field_values:
      defense_finding_id: scan-result-42
      evidence_reference: signal-42
      injection_scan_result_id: scan-result-42
      recommended_disposition: block
      severity: high
    related_node_ids:
      - InjectionScanResult
    related_relation_ids:
      - claim-owasp-scan-result-inference
      - InjectionScanResult
    example_source: Rebuff detector
    source_claims:
      - claim-owasp-scan-result-inference
  - id: injection-scan-result-lakera
    labels:
      zh: 注入扫描结果 - Lakera Guard 注入检测
      en: Injection Scan Result - Lakera Guard injection detection
      ja: 注入スキャン結果 - Lakera Guard 注入検出
    descriptions: {zh: "注入扫描结果(InjectionScanResult) [InjectionScanResult]: 注入扫描结果. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} 返回 {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}}。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id.", en: "Injection Scan Result (InjectionScanResult) [InjectionScanResult]: Injection Scan Result. Lakera Guard POST https://api.lakera.ai/v2/guard with {\"input\": \"user message\", \"breakdown\": true} returns {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} (docs.lakera.ai). Fields include defense_finding_id, evidence_reference, injection_scan_result_id.", ja: "注入スキャン結果(InjectionScanResult) [InjectionScanResult]: 注入スキャン結果. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} は {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} を返す。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id."}
    field_values:
      defense_finding_id: scan-result-42
      evidence_reference: signal-42
      injection_scan_result_id: scan-result-42
      recommended_disposition: block
      severity: high
    related_node_ids:
      - InjectionScanResult
    related_relation_ids:
      - claim-owasp-scan-result-inference
      - InjectionScanResult
    example_source: Lakera Guard API
    source_claims:
      - claim-owasp-scan-result-inference
  - id: injection-scan-result-llama_guard
    labels:
      zh: 注入扫描结果 - Llama Guard 安全分类
      en: Injection Scan Result - Llama Guard safety classification
      ja: 注入スキャン結果 - Llama Guard 安全分類
    descriptions: {zh: "注入扫描结果(InjectionScanResult) [InjectionScanResult]: 注入扫描结果. Inan 等（2023）Llama Guard：微调 Llama 安全分类器输出 safe/unsafe\\nO1（O1=暴力、O2=性、O3=犯罪、O4=枪支、O5=受管制、O6=自残）用于 I/O 审核（arxiv.org/abs/2312.06674）。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id.", en: "Injection Scan Result (InjectionScanResult) [InjectionScanResult]: Injection Scan Result. Inan et al. (2023) Llama Guard: fine-tuned Llama safety classifier outputs safe/unsafe\\nO1 (O1=violence, O2=sexual, O3=criminal, O4=guns, O5=regulated, O6=self-harm) for I/O moderation (arxiv.org/abs/2312.06674). Fields include defense_finding_id, evidence_reference, injection_scan_result_id.", ja: "注入スキャン結果(InjectionScanResult) [InjectionScanResult]: 注入スキャン結果. Inan ほか（2023）Llama Guard：fine-tuned Llama が safe/unsafe\\nO1（O1=violence 等6類）を I/O moderation に出力（arxiv.org/abs/2312.06674）。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id."}
    field_values:
      defense_finding_id: scan-result-42
      evidence_reference: signal-42
      injection_scan_result_id: scan-result-42
      recommended_disposition: block
      severity: high
    related_node_ids:
      - InjectionScanResult
    related_relation_ids:
      - claim-owasp-scan-result-inference
      - InjectionScanResult
    example_source: Meta Llama Guard 2023
    source_claims:
      - claim-owasp-scan-result-inference
  - id: injection-scan-result-nemo
    labels:
      zh: 注入扫描结果 - NeMo Guardrails 注入 rail
      en: Injection Scan Result - NeMo Guardrails injection rail
      ja: 注入スキャン結果 - NeMo Guardrails 注入 rail
    descriptions: {zh: "注入扫描结果(InjectionScanResult) [InjectionScanResult]: 注入扫描结果. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse；支持 input/output/dialog rails。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id.", en: "Injection Scan Result (InjectionScanResult) [InjectionScanResult]: Injection Scan Result. NVIDIA NeMo Guardrails Colang 2.0: define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse — supports input/output/dialog rails (github.com/NVIDIA-NeMo/Guardrails). Fields include defense_finding_id, evidence_reference, injection_scan_result_id.", ja: "注入スキャン結果(InjectionScanResult) [InjectionScanResult]: 注入スキャン結果. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input で check_jailbreak を実行し jailbreak 時 bot refuse；input/output/dialog rails をサポート。 Fields: defense_finding_id, evidence_reference, injection_scan_result_id."}
    field_values:
      defense_finding_id: scan-result-42
      evidence_reference: signal-42
      injection_scan_result_id: scan-result-42
      recommended_disposition: block
      severity: high
    related_node_ids:
      - InjectionScanResult
    related_relation_ids:
      - claim-owasp-scan-result-inference
      - InjectionScanResult
    example_source: NVIDIA NeMo Guardrails
    source_claims:
      - claim-owasp-scan-result-inference
parent_relation:
  id: InjectionScanResult-is_a-DefenseFinding
  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "InjectionScanResult 是汇总一次注入扫描的 DefenseFinding。", en: "An InjectionScanResult is a DefenseFinding that summarizes one injection scan.", ja: "InjectionScanResult は一回の注入スキャンを要約する DefenseFinding である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: injection-scan-result-parent-evidence
      severity: error
      expression_language: plain
      expression: The result must retain parent finding evidence and a reference to the scan it summarizes.
      explanations: {zh: "子类型增加扫描范围而不移除防护证据。", en: "The subtype adds scan scope without removing defense evidence.", ja: "サブタイプは防御証拠を失わずスキャン範囲を追加する。"}
      source_claims: [claim-owasp-scan-result-inference]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-scan-result-inference]
relations: []
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Explains security risk from untrusted input altering model behavior.
source_claims:
  - id: claim-owasp-scan-result-inference
    source: owasp-llm01-2025
    supports: Injection risk motivates traceable scan summaries and reviewed dispositions; it does not define this internal result schema.
    locator: "Overview and Prevention and Mitigation Strategies"
    evidence_kind: design-inference
    confidence: high
