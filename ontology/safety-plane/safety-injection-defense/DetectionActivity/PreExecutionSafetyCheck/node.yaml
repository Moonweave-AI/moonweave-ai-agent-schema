schema: moonweave.ai/ontology-node/v1
id: PreExecutionSafetyCheck
kind: concept
labels:
  zh: 执行前工具安全检查
  en: pre-execution tool safety check
  ja: 実行前ツール安全検査
semantics:
  short_definition:
    zh: 在工具尝试开始前校验计划参数、权限与风险证据的检测活动。
    en: A detection activity that validates planned tool arguments, authority, and risk evidence before an attempt starts.
    ja: ツール試行開始前に計画引数、権限、リスク証拠を検証する検出活動。
  definition:
    zh: 执行前工具安全检查是一种 DetectionActivity，发生在工具调用尚未产生副作用时，读取 ToolCallPlan、参数、目标环境、授权范围、工具描述信任和威胁信号，并输出允许、阻断或升级所需的检查结果。它不是执行许可本身，也不等于运行时沙箱。
    en: A PreExecutionSafetyCheck is a DetectionActivity performed before a tool call can create side effects; it reads the ToolCallPlan, arguments, target environment, authority scope, tool-description trust, and threat signals and emits evidence for allow, block, or escalation. It is not the execution permission itself and not the runtime sandbox.
    ja: 実行前ツール安全検査は、ツール呼出しが副作用を生む前に行う DetectionActivity で、ToolCallPlan、引数、対象環境、権限範囲、ツール記述信頼、脅威信号を読み、許可・阻止・エスカレーションの証拠を出します。実行許可そのものでも実行時 sandbox でもありません。
  why_needed:
    zh: 在副作用提交前发现越权参数或投毒影响，才能安全阻断而不依赖事后补救。
    en: Detecting over-authorized arguments or poisoned influence before side-effect commit enables safe blocking instead of post-hoc recovery.
    ja: 副作用確定前に権限逸脱引数や汚染影響を検出し、事後復旧に頼らず安全に阻止します。
  includes:
    - zh: 包含待执行计划、校验配置、工具与环境上下文、运行时间和检查结果。
      en: Includes the pending plan, validation configuration, tool and environment context, run time, and check result.
      ja: 実行待ち計画、検証設定、ツール・環境文脈、実行時刻、検査結果を含みます。
  excludes:
    - zh: 不包含工具实际执行、静态 UnsafeArgumentPattern 或最终授权决定。
      en: Excludes actual tool execution, the static UnsafeArgumentPattern, and the final authorization decision.
      ja: 実際のツール実行、静的 UnsafeArgumentPattern、最終認可判断は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: PreExecutionSafetyCheck 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: PreExecutionSafetyCheck should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: PreExecutionSafetyCheck は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-preexecutionsafetycheck-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "PreExecutionSafetyCheck/example" }'
      source_claims:
        - claim-preexecutionsafetycheck-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
