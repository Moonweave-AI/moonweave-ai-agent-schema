schema: moonweave.ai/ontology-node/v1
id: InstructionConflict
kind: concept
status: accepted
labels:
  en: instruction conflict
  zh: 指令冲突
  ja: 指示衝突
semantics:
  short_definition:
    zh: 不可信指令候选与适用的更高权威指令不相容的防御发现。
    en: A defense finding that an untrusted instruction candidate is incompatible with an applicable higher-authority instruction.
    ja: 不信頼な指示候補が適用される上位権威の指示と両立しないという防御所見。
  definition:
    zh: 指令冲突是一种 DefenseFinding，记录两个可识别指令在同一作用域内对行为、数据访问或工具使用提出不相容要求，并标明双方来源、权威层级和冲突范围。它不是普通业务偏好差异，也不是完成覆盖处置后的记录。
    en: An InstructionConflict is a DefenseFinding recording two identifiable instructions that impose incompatible requirements on behavior, data access, or tool use in the same scope, with each source, authority level, and conflict span stated. It is not an ordinary preference difference and not the completed override action.
    ja: 指示競合は、同一作用域で行動・データアクセス・ツール使用に両立しない要求を出す二つの識別可能な指示について、出所、権威階層、競合範囲を記録する DefenseFinding です。通常の選好差でも、完了した上書き処置でもありません。
  why_needed:
    zh: 显式记录冲突可防止系统悄然采用低权威内容，并为覆盖或升级决定提供可审计依据。
    en: An explicit conflict record prevents silent adoption of lower-authority content and supplies auditable grounds for override or escalation.
    ja: 競合を明示記録することで、低権威内容の暗黙採用を防ぎ、上書きやエスカレーションの監査根拠を提供します。
  includes:
    - zh: 包含同一作用域内两个具体指令、各自权威来源以及不可同时满足的要求。
      en: Includes two concrete same-scope instructions, their authority sources, and the requirements that cannot both be satisfied.
      ja: 同一作用域の二つの具体的指示、それぞれの権威出所、同時に満たせない要求を含みます。
  excludes:
    - zh: 不包含不同任务作用域下可同时成立的指令，也不包含已经执行的 TrustedInstructionOverride。
      en: Excludes instructions in disjoint task scopes that can both hold and the executed TrustedInstructionOverride.
      ja: 別々のタスク作用域で同時成立できる指示や、実行済み TrustedInstructionOverride は含みません。
  semantic_kind: information
  aliases: []
