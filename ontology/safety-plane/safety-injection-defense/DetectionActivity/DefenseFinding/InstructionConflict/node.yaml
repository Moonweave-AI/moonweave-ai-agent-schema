          en: Instruction conflict IC-T4 points through resolved_by to executed override TIO-8; because TIO-8 suppresses webpage candidate U-8 and retains system instruction I-1 in the same task scope, the conflict may enter resolved state.
          ja: 指示競合 IC-T4 は resolved_by で実行済み上書き TIO-8 を指します。TIO-8 が同じタスク作用域でウェブ候補 U-8 を抑止しシステム指示 I-1 を保持したため、競合は resolved 状態へ移れます。
