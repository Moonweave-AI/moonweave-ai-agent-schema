schema: moonweave.ai/ontology-node/v1
id: InstructionConflict
kind: concept
labels:
  en: instruction conflict
  zh: 指令冲突
  ja: 指示衝突
semantics:
  short_definition:
    zh: 不可信候选与更高权威指令之间的安全冲突判定。
    en: A security finding that an untrusted candidate conflicts with a higher-authority instruction.
    ja: 不可信 candidate が higher-authority instruction と安全衝突する判定。
  definition:
    zh: InstructionConflict 仅在存在 threat/trust/privilege 证据时成立：不可信来源的指令试图覆盖 developer/system 指令或 AuthorizationGrant 范围。ReasAlign（94.6% utility / 3.6% ASR）推理链应支撑 conflict/42 类记录；普通 precedence 解析归 info-prompts-instructions。
    en: "InstructionConflict holds only with threat, trust, or privilege evidence: an untrusted-source instruction attempts to override developer/system instructions or AuthorizationGrant scope. ReasAlign (94.6% utility / 3.6% ASR) reasoning chains should support conflict/42 records; ordinary precedence resolution belongs to info-prompts-instructions."
    ja: InstructionConflict は threat/trust/privilege 証拠がある場合のみ：不可信 source instruction が developer/system instruction または AuthorizationGrant scope を上書きしようとする。ReasAlign reasoning chain が conflict/42 を支え、通常 precedence は info-prompts-instructions。
  why_needed:
    zh: 没有安全冲突身份，ReasAlign 检测到的越权 lure 会被误当作普通指令优先级问题。
    en: Without a security conflict identity, ReasAlign privilege-escalation lures are mistaken for ordinary precedence issues.
    ja: security conflict identity がなければ ReasAlign privilege-escalation lure が通常 precedence 問題と誤認されます。
  includes:
    - zh: 包含同一作用域内两个具体指令、各自权威来源以及不可同时满足的要求。
      en: Includes two concrete same-scope instructions, their authority sources, and the requirements that cannot both be satisfied.
      ja: 同一作用域の二つの具体的指示、それぞれの権威出所、同時に満たせない要求を含みます。
  excludes:
    - zh: 不包含不同任务作用域下可同时成立的指令，也不包含已经执行的 TrustedInstructionOverride。
      en: Excludes instructions in disjoint task scopes that can both hold and the executed TrustedInstructionOverride.
      ja: 別々のタスク作用域で同時成立できる指示や、実行済み TrustedInstructionOverride は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 对比 Instruction authority、trust source、requested action 与 policy scope；NeMo/Guardrails 在 flow 内检测冲突并生成 TrustedInstructionOverride。
    en: Compare Instruction authority, trust source, requested action, and policy scope; NeMo/Guardrails detect conflicts in-flow and emit TrustedInstructionOverride.
    ja: Instruction authority/trust source/requested action/policy scope を比較。NeMo/Guardrails flow 内 conflict 検出→TrustedInstructionOverride。
  typical_input:
    - description: Untrusted candidate vs trusted instruction set.
      format: developer instruction + retrieved chunk with override lure
      source_claims:
        - claim-instructionconflict-design
  typical_output:
    - description: Conflict resolved by override.
      format: InstructionConflict-resolved_by-TrustedInstructionOverride
      source_claims:
        - claim-instructionconflict-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
