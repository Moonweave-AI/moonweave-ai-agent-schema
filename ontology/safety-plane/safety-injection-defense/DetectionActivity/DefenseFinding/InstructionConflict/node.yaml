    en: An InstructionConflict is a DefenseFinding specialized for incompatibility between an untrusted candidate and a higher-authority instruction in the same scope.
    ja: 指示競合は、同一作用域で不信頼候補と上位権威指示が両立しないことに特化した防御所見です。
  cardinality: null
