      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_resolved_by
      labels:
        zh: 反向：resolved by
        en: is target of resolved by
        ja: 逆方向：resolved by
