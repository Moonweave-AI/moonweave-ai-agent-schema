relations:
  - id: InstructionConflict-resolved_by-TrustedInstructionOverride
    predicate: resolved_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: resolved by
      en: resolved by
      ja: resolved by
    definitions:
      zh: InstructionConflict 仅在获授权的 TrustedInstructionOverride 已于同一作用域执行并压制冲突候选时被解决。
      en: An InstructionConflict is resolved only when an authorized TrustedInstructionOverride executes in the same scope and suppresses the conflicting candidate.
      ja: InstructionConflict は、認可済み TrustedInstructionOverride が同一作用域で実行され競合候補を抑止した場合だけ解決されます。
    cardinality: null
