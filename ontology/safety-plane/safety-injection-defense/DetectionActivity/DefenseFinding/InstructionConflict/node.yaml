    en: InstructionConflict satisfies the complete definition of DefenseFinding and narrows it by a manually reviewed differentia; this fact is distinct from operational associations between them.
    ja: InstructionConflict は DefenseFinding の完全定義を満たし、人手審査済み種差で狭められ、両者の操作関連とは別の事実です。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
