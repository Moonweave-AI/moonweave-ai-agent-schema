schema: moonweave.ai/ontology-node/v1
id: TrustedInstructionOverride
kind: concept
status: accepted
labels:
  en: trusted instruction override
  zh: 可信指令覆盖
  ja: 信頼済み指示上書き
semantics:
  short_definition:
    zh: 在限定作用域内执行高权威指令并压制冲突候选的缓解活动。
    en: A mitigation action that applies a higher-authority instruction and suppresses a conflicting candidate within a bounded scope.
    ja: 限定作用域で上位権威指示を適用し競合候補を抑止する緩和活動。
  definition:
    zh: 可信指令覆盖是一种 MitigationAction，由策略或授权主体在明确作用域内选择适用的高权威指令，并使冲突的低权威或不可信候选不参与后续计划；它记录执行者、依据、被覆盖候选和有效期。它不是静态优先级声明，也不是 InstructionConflict 发现本身。
    en: A TrustedInstructionOverride is a MitigationAction in which policy or an authorized actor selects an applicable higher-authority instruction within a stated scope and prevents a conflicting lower-authority or untrusted candidate from influencing the subsequent plan, recording actor, basis, overridden candidate, and validity. It is not a static priority declaration or the InstructionConflict finding itself.
    ja: 信頼指示上書きは、方針または認可主体が明示作用域で適用すべき上位権威指示を選び、競合する低権威・不信頼候補を後続計画から除外し、実行者、根拠、対象候補、有効期間を記録する MitigationAction です。静的優先順位宣言や InstructionConflict 所見そのものではありません。
  why_needed:
    zh: 把实际处置与优先级规则分开，可证明某次冲突已经在何种授权下解决。
    en: Separating the executed disposition from the priority rule proves that a particular conflict was resolved under stated authority.
    ja: 実際の処置と優先順位規則を分け、特定競合がどの権限で解決されたかを示します。
  includes:
    - zh: 包含冲突引用、选定高权威指令、被压制候选、作用域、授权和执行状态。
      en: Includes conflict reference, selected higher-authority instruction, suppressed candidate, scope, authorization, and execution state.
      ja: 競合参照、選択した上位権威指示、抑止候補、作用域、認可、実行状態を含みます。
  excludes:
    - zh: 不包含仅说明优先级的规则、未执行建议或没有冲突对象的普通指令选择。
      en: Excludes a rule that merely states priority, an unexecuted recommendation, and ordinary instruction selection with no conflicting candidate.
      ja: 優先順位を述べるだけの規則、未実行勧告、競合候補のない通常指示選択は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: conflict_ref
      labels:
        zh: 指令冲突引用
        en: instruction-conflict reference
        ja: 指示 conflict 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录高权威指令与低权威候选不可同时满足的具体冲突。
        en: Concrete conflict showing that a higher-authority instruction and lower-authority candidate cannot both be satisfied.
        ja: 高権威 instruction と低権威 candidate を同時に満たせない具体的 conflict です。
      allowed_values: []
      pattern: null
      example_value: instruction-conflict:T-4/U-8
      source_claims:
        - claim-trusted-instruction-override-002
    - id: selected_instruction_ref
      labels:
        zh: 保留指令引用
        en: selected-instruction reference
        ja: 選択 instruction 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 经权威解析后继续约束后续计划的高权威有效指令。
        en: Higher-authority effective instruction retained to constrain the subsequent plan after authority resolution.
        ja: authority resolution 後も後続 plan を拘束する高権威の有効 instruction です。
      allowed_values: []
      pattern: null
      example_value: instruction:I-1
      source_claims:
        - claim-trusted-instruction-override-003
    - id: suppressed_candidate_ref
      labels:
        zh: 抑制候选引用
        en: suppressed-candidate reference
        ja: 抑制 candidate 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被阻止进入后续计划或工具参数的不可信或低权威指令候选。
        en: Untrusted or lower-authority instruction candidate prevented from entering the later plan or tool arguments.
        ja: 後続 plan または tool arguments への流入を阻止した不信頼・低権威 candidate です。
      allowed_values: []
      pattern: null
      example_value: instruction-candidate:U-8
      source_claims:
        - claim-trusted-instruction-override-004
    - id: override_scope
      labels:
        zh: 覆盖范围
        en: override scope
        ja: override 範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 抑制生效的任务、计划阶段、工具调用或上下文边界。
        en: Task, plan stage, tool call, or context boundary within which suppression is effective.
        ja: 抑制が有効な task・plan stage・tool call・context 境界です。
      allowed_values: []
      pattern: null
      example_value: task:T-4/planning-and-tool-selection
      source_claims:
        - claim-trusted-instruction-override-005
  constraints:
    - id: trusted-instruction-override-performed-conflict-resolution
      severity: error
      expression_language: plain
      expression: conflict_ref, selected_instruction_ref, and suppressed_candidate_ref identify distinct objects AND the suppressed candidate is excluded throughout override_scope
      explanations:
        zh: 可信指令覆盖必须针对真实冲突，在限定范围内保留高权威指令并实际抑制另一候选。
        en: TrustedInstructionOverride requires a real conflict, retains the higher-authority instruction, and actually suppresses the other candidate within a bounded scope.
        ja: 実 conflict に対し高権威 instruction を保持し、限定 scope で他 candidate を実際に抑制します。
      source_claims:
        - claim-trusted-instruction-override-006
  required_relation_constraints: []
