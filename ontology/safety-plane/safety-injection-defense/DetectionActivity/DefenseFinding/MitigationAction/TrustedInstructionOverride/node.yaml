schema: moonweave.ai/ontology-node/v1
id: TrustedInstructionOverride
kind: concept
labels:
  en: trusted instruction override
  zh: 可信指令覆盖
  ja: 信頼済み指示上書き
semantics:
  short_definition:
    zh: 以更高权威指令拒绝或覆盖不可信候选的缓解活动子类。
    en: A MitigationAction subtype refusing or overriding an untrusted candidate using higher-authority instructions.
    ja: higher-authority instruction で不可信 candidate を拒否/上書きする MitigationAction subtype。
  definition:
    zh: TrustedInstructionOverride 记录被应用的权威指令引用、被拒绝的候选动作与 rationale。ReasAlign conflict/42 → override/42 拒绝 invoke_admin_api 是典型模式；NeMo bot refuse 与 Guardrails exception 也可投影为此概念。
    en: TrustedInstructionOverride records applied authority instruction reference, refused candidate action, and rationale. ReasAlign conflict/42 → override/42 refusing invoke_admin_api is typical; NeMo bot refuse and Guardrails exception may also project here.
    ja: TrustedInstructionOverride は applied authority instruction ref/rejected candidate action/rationale を記録。ReasAlign conflict/42→override/42 が invoke_admin_api 拒否の典型。NeMo bot refuse/Guardrails exception も写像可。
  why_needed:
    zh: 必须可审计地证明“为何拒绝执行”而非静默丢弃 tool plan。
    en: Must audibly prove why execution was refused rather than silently dropping a tool plan.
    ja: tool plan を silent drop せず「なぜ拒否したか」を監査可能に証明する必要があります。
  includes:
    - zh: 包含冲突引用、选定高权威指令、被压制候选、作用域、授权和执行状态。
      en: Includes conflict reference, selected higher-authority instruction, suppressed candidate, scope, authorization, and execution state.
      ja: 競合参照、選択した上位権威指示、抑止候補、作用域、認可、実行状態を含みます。
  excludes:
    - zh: 不包含仅说明优先级的规则、未执行建议或没有冲突对象的普通指令选择。
      en: Excludes a rule that merely states priority, an unexecuted recommendation, and ordinary instruction selection with no conflicting candidate.
      ja: 優先順位を述べるだけの規則、未実行勧告、競合候補のない通常指示選択は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: InstructionConflict-resolved_by-TrustedInstructionOverride 边连接冲突与覆盖；developer/system 指令引用必须来自 info-prompts-instructions 域。
    en: InstructionConflict-resolved_by-TrustedInstructionOverride links conflict to override; developer/system instruction refs come from info-prompts-instructions domain.
    ja: InstructionConflict-resolved_by-TrustedInstructionOverride で conflict と override を接続。developer/system instruction ref は info-prompts-instructions 由来。
  typical_input:
    - description: InstructionConflict with privilege escalation.
      format: conflict/42 + developer policy ref
      source_claims:
        - claim-trustedinstructionoverride-design
  typical_output:
    - description: Override record with refused action.
      format: '{"override_id":"override/42","refused_action":"invoke_admin_api"}'
      source_claims:
        - claim-trustedinstructionoverride-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys: []
  fields:
    - id: conflict_ref
      labels:
        zh: 指令冲突引用
        en: instruction-conflict reference
        ja: 指示 conflict 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录高权威指令与低权威候选不可同时满足的具体冲突。
        en: Concrete conflict showing that a higher-authority instruction and lower-authority candidate cannot both be satisfied.
        ja: 高権威 instruction と低権威 candidate を同時に満たせない具体的 conflict です。
      allowed_values: []
      pattern: null
      example_value: instruction-conflict:T-4/U-8
      source_claims:
        - claim-trustedinstructionoverride-design
    - id: selected_instruction_ref
      labels:
        zh: 保留指令引用
        en: selected-instruction reference
        ja: 選択 instruction 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 经权威解析后继续约束后续计划的高权威有效指令。
        en: Higher-authority effective instruction retained to constrain the subsequent plan after authority resolution.
        ja: authority resolution 後も後続 plan を拘束する高権威の有効 instruction です。
      allowed_values: []
      pattern: null
      example_value: instruction:I-1
      source_claims:
        - claim-trustedinstructionoverride-design
    - id: suppressed_candidate_ref
      labels:
        zh: 抑制候选引用
        en: suppressed-candidate reference
        ja: 抑制 candidate 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被阻止进入后续计划或工具参数的不可信或低权威指令候选。
        en: Untrusted or lower-authority instruction candidate prevented from entering the later plan or tool arguments.
        ja: 後続 plan または tool arguments への流入を阻止した不信頼・低権威 candidate です。
      allowed_values: []
      pattern: null
      example_value: instruction-candidate:U-8
      source_claims:
        - claim-trustedinstructionoverride-design
    - id: override_scope
      labels:
        zh: 覆盖范围
        en: override scope
        ja: override 範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 抑制生效的任务、计划阶段、工具调用或上下文边界。
        en: Task, plan stage, tool call, or context boundary within which suppression is effective.
        ja: 抑制が有効な task・plan stage・tool call・context 境界です。
      allowed_values: []
      pattern: null
      example_value: task:T-4/planning-and-tool-selection
      source_claims:
        - claim-trustedinstructionoverride-design
  constraints:
    - id: trusted-instruction-override-performed-conflict-resolution
      severity: error
      expression_language: plain
      expression: conflict_ref, selected_instruction_ref, and suppressed_candidate_ref identify distinct objects AND the suppressed candidate is excluded throughout override_scope
      explanations:
        zh: 可信指令覆盖必须针对真实冲突，在限定范围内保留高权威指令并实际抑制另一候选。
        en: TrustedInstructionOverride requires a real conflict, retains the higher-authority instruction, and actually suppresses the other candidate within a bounded scope.
        ja: 実 conflict に対し高権威 instruction を保持し、限定 scope で他 candidate を実際に抑制します。
      source_claims:
        - claim-trustedinstructionoverride-design
  required_relation_constraints: []
examples:
  - id: TrustedInstructionOverride-reasalign-42
    labels:
      zh: ReasAlign 管理员 API 拒绝
      en: ReasAlign admin API refusal
      ja: ReasAlign admin API refusal
    descriptions:
      zh: override/42 引用 developer 禁止越权并拒绝 invoke_admin_api。
      en: override/42 cites developer no-escalation and refuses invoke_admin_api.
      ja: override/42 が developer 越権禁止を引用し invoke_admin_api を拒否。
    example_source:
      product: ReasAlign
      url: https://arxiv.org/abs/2601.10173
      version: "2026"
    field_values:
      override_id: override/42
      refused_action: invoke_admin_api
    related_node_ids:
      - TrustedInstructionOverride
      - InstructionConflict
    related_relation_ids:
      - InstructionConflict-resolved_by-TrustedInstructionOverride
    source_claims:
      - claim-trustedinstructionoverride-design
  - id: TrustedInstructionOverride-nemo-refuse
    labels:
      zh: NeMo bot refuse 覆盖
      en: NeMo bot refuse override
      ja: NeMo bot refuse override
    descriptions:
      zh: override/nemo-42：Colang flow bot refuse to act on untrusted instruction。
      en: "override/nemo-42: Colang flow bot refuse to act on untrusted instruction."
      ja: override/nemo-42：Colang bot refuse to act on untrusted instruction。
    example_source:
      product: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      version: Colang 2.0
    field_values:
      override_id: override/nemo-42
    related_node_ids:
      - TrustedInstructionOverride
    related_relation_ids: []
    source_claims:
      - claim-trustedinstructionoverride-design
  - id: TrustedInstructionOverride-agentsentry-funds
    labels:
      zh: AgentSentry 资金转移拒绝
      en: AgentSentry fund-transfer refusal
      ja: AgentSentry fund-transfer refusal
    descriptions:
      zh: override/tool-771 拒绝 turn-3 transfer_funds，依据 system 财务策略。
      en: override/tool-771 refuses turn-3 transfer_funds per system financial policy.
      ja: override/tool-771 が system 財務 policy で turn-3 transfer_funds を拒否。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      override_id: override/tool-771
      refused_action: transfer_funds
    related_node_ids:
      - TrustedInstructionOverride
      - InstructionConflict
    related_relation_ids: []
    source_claims:
      - claim-trustedinstructionoverride-design
  - id: TrustedInstructionOverride-guardrails-exception
    labels:
      zh: Guardrails exception 拒绝
      en: Guardrails exception refusal
      ja: Guardrails exception refusal
    descriptions:
      zh: override/guard-118：DetectPromptInjectionValidator on_fail=exception 阻断 tool call。
      en: "override/guard-118: DetectPromptInjectionValidator on_fail=exception blocks tool call."
      ja: override/guard-118：DetectPromptInjectionValidator on_fail=exception で tool call 阻止。
    example_source:
      product: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      version: on_fail exception
    field_values:
      override_id: override/guard-118
    related_node_ids:
      - TrustedInstructionOverride
    related_relation_ids: []
    source_claims:
      - claim-trustedinstructionoverride-design
parent_relation:
  id: TrustedInstructionOverride-is_a-MitigationAction
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 可信指令覆盖是一种缓解活动；其种差是在授权作用域内执行高权威指令并压制冲突的不可信候选。
    en: A TrustedInstructionOverride is a MitigationAction that applies a higher-authority instruction and suppresses a conflicting untrusted candidate within an authorized scope.
    ja: 信頼指示上書きは、認可作用域で上位権威指示を適用し競合する不信頼候補を抑止する緩和活動です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-trustedinstructionoverride-design
  distinct_fact_rationale:
    zh: TrustedInstructionOverride 满足 MitigationAction 的完整定义并以人工复核种差进一步收窄；该事实不同于二者之间的操作关联。
    en: TrustedInstructionOverride satisfies the complete definition of MitigationAction and narrows it by a manually reviewed differentia; this fact is distinct from operational associations between them.
    ja: TrustedInstructionOverride は MitigationAction の完全定義を満たし、人手審査済み種差で狭められ、両者の操作関連とは別の事実です。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
