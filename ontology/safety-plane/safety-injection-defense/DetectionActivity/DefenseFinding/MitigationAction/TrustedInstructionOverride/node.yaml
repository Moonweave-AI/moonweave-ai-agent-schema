    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave requires an actual conflict so ordinary instruction selection is not misclassified as an override action."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
