source_claims:
  - id: claim-trusted-instruction-override-001
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: TrustedInstructionOverride is the performed bounded mitigation that keeps an identified higher-authority instruction and suppresses one conflicting lower-authority candidate."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
