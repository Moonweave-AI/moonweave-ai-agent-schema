  - id: claim-quarantine-action-008
    source: lit-agent-vigil-siren
    supports: VIGIL's Perception Sanitizer removes imperative intent and converts untrusted inputs into objective observations before reasoning; this directly supports a transform-and-continue mitigation. Moonweave contrasts SanitizationAction with QuarantineAction, which withholds the original from normal flow until disposition. VIGIL does not define quarantine or the sibling taxonomy, so that contrast is a Moonweave design inference.
    locator: Section 4.3 Sanitizing the Adversarial Input Space > objective rephrasing and intent stripping
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-quarantine-action-009
    source: eng-fw-openai-guardrails
    supports: OpenAI tool guardrails can reject content or halt processing when a tripwire fires. Moonweave specializes a MitigationAction as QuarantineAction when it removes suspect content from the normal context or execution path while preserving it for review.
    locator: OpenAI Agents SDK, Guardrails, ‘Workflow boundaries’, ‘Tool guardrails’, and ‘Tripwires’
    evidence_kind: design-inference
