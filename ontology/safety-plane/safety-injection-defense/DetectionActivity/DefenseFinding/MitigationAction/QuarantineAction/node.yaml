schema: moonweave.ai/ontology-node/v1
id: QuarantineAction
kind: concept
status: accepted
labels:
  zh: 隔离处置
  en: quarantine action
  ja: 隔離措置
semantics:
  short_definition:
    zh: 把可疑对象移出正常上下文与执行路径、等待复核的缓解活动。
    en: A mitigation action that removes a suspect object from normal context and execution pending review.
    ja: 疑わしい対象を通常コンテキストと実行経路から外し、審査待ちにする緩和活動。
  definition:
    zh: 隔离处置是一种 MitigationAction：它在保留原始对象和证据的同时，使内容、工具结果、记忆条目或工件在指定作用域内不可被正常检索、提示组装或执行，直到复核或策略释放。它不是删除、净化或仅加风险标签。
    en: A QuarantineAction is a MitigationAction that preserves the original object and evidence while making content, a tool result, memory item, or artifact unavailable to normal retrieval, prompt assembly, or execution within a stated scope until review or policy release. It is not deletion, sanitization, or merely adding a risk label.
    ja: 隔離処置は、原対象と証拠を保持しつつ、指定作用域で内容、ツール結果、記憶項目、成果物を通常の検索、プロンプト組立、実行から外し、審査または方針解除まで利用不可にする MitigationAction です。削除、無害化、単なるリスクラベル付与ではありません。
  why_needed:
    zh: 在真伪未决时阻止传播，同时保留取证和误报恢复能力。
    en: It stops propagation while truth is unresolved and preserves evidence and false-positive recovery.
    ja: 真偽未決の間に伝播を止め、証拠と誤検知からの復旧能力を保ちます。
  includes:
    - zh: 包含对象、隔离范围、授权、开始状态、释放条件和证据保留位置。
      en: Includes the object, quarantine scope, authorization, start state, release condition, and evidence-retention location.
      ja: 対象、隔離範囲、認可、開始状態、解除条件、証拠保管場所を含みます。
  excludes:
    - zh: 不包含永久删除、改写内容的 SanitizationAction 或只建议隔离的发现。
      en: Excludes permanent deletion, a SanitizationAction that rewrites content, and a finding that only recommends quarantine.
      ja: 永久削除、内容を書き換える SanitizationAction、隔離を勧告するだけの所見は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: quarantine_scope
      labels:
        zh: 隔离范围
        en: quarantine scope
        ja: 隔離範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对象被排除的检索、提示组装、工具执行或下游传播范围。
        en: Retrieval, prompt assembly, tool execution, or downstream propagation boundary from which the subject is excluded.
        ja: 対象を除外する retrieval・prompt assembly・tool execution・downstream propagation 範囲です。
      allowed_values: []
      pattern: null
      example_value: retrieval-index and prompt-assembly
      source_claims:
        - claim-quarantine-action-002
    - id: evidence_copy_ref
      labels:
        zh: 证据副本引用
        en: evidence-copy reference
        ja: evidence copy 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留原始对象及其检测证据的只读取证副本。
        en: Read-only forensic copy retaining the original subject and its detection evidence.
        ja: 原対象と検出 evidence を保持する read-only forensic copy です。
      allowed_values: []
      pattern: null
      example_value: forensic-copy:C-88
      source_claims:
        - claim-quarantine-action-003
    - id: release_condition
      labels:
        zh: 解除隔离条件
        en: release condition
        ja: 隔離解除条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 允许对象重新进入指定处理范围所需的复核、策略或时间条件。
        en: Review, policy, or time condition required before the subject can re-enter the stated processing scope.
        ja: 対象が処理範囲へ戻る前に必要な review・policy・time 条件です。
      allowed_values: []
      pattern: null
      example_value: manual-review-approved AND rescan=clean
      source_claims:
        - claim-quarantine-action-004
  constraints:
    - id: quarantine-action-preserves-and-excludes
      severity: error
      expression_language: plain
      expression: evidence_copy_ref preserves the original AND subject_ref is unavailable throughout quarantine_scope until release_condition holds
      explanations:
        zh: 隔离必须同时保留原件证据并阻止其进入指定正常处理范围。
        en: Quarantine must both preserve original evidence and prevent the subject from entering the stated normal-processing scope.
        ja: quarantine は原 evidence を保持し、対象を指定 normal-processing scope から除外します。
      source_claims:
        - claim-quarantine-action-005
  required_relation_constraints: []
