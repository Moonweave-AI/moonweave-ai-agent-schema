schema: moonweave.ai/ontology-node/v1
id: QuarantineAction
kind: concept
labels:
  zh: 隔离处置
  en: quarantine action
  ja: 隔離措置
semantics:
  short_definition:
    zh: 将威胁对象移出可执行或上下文准入路径的缓解活动子类。
    en: A MitigationAction subtype removing a threat subject from execution or context-admission paths.
    ja: 脅威 subject を実行/context admission 経路から除外する MitigationAction subtype。
  definition:
    zh: QuarantineAction 执行隔离：固定 quarantine zone、对象 digest、authority_basis，并触发 rescan。CVE-2025-53773 的 settings.json 与 MCP poisoned tool-spec 是典型对象；隔离不等于删除 ingestion provenance。
    en: "QuarantineAction executes isolation: fixes quarantine zone, object digest, authority_basis, and triggers rescan. CVE-2025-53773 settings.json and MCP poisoned tool-spec are typical subjects; quarantine does not erase ingestion provenance."
    ja: QuarantineAction は quarantine zone/object digest/authority_basis を固定し rescan を起動。CVE-2025-53773 settings.json と MCP poisoned tool-spec が典型 subject。quarantine は ingestion provenance を消しません。
  why_needed:
    zh: Copilot RCE 链证明必须隔离恶意配置并在 rescan 前阻止进入 model context。
    en: Copilot RCE chain proves malicious config must be quarantined before rescan allows model context admission.
    ja: Copilot RCE chain は rescan 前に悪意 config を quarantine する必要を示します。
  includes:
    - zh: 包含对象、隔离范围、授权、开始状态、释放条件和证据保留位置。
      en: Includes the object, quarantine scope, authorization, start state, release condition, and evidence-retention location.
      ja: 対象、隔離範囲、認可、開始状態、解除条件、証拠保管場所を含みます。
  excludes:
    - zh: 不包含永久删除、改写内容的 SanitizationAction 或只建议隔离的发现。
      en: Excludes permanent deletion, a SanitizationAction that rewrites content, and a finding that only recommends quarantine.
      ja: 永久削除、内容を書き換える SanitizationAction、隔離を勧告するだけの所見は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: quarantine zone 应对齐 safety-trust-boundary DataZone；MitigationAction-addresses-DefenseFinding 后必须记录 rescan 引用。
    en: Quarantine zone should align with safety-trust-boundary DataZone; record rescan reference after MitigationAction-addresses-DefenseFinding.
    ja: quarantine zone は safety-trust-boundary DataZone と整合。MitigationAction-addresses-DefenseFinding 後 rescan 参照を記録。
  typical_input:
    - description: DefenseFinding with quarantine disposition.
      format: finding/cve-2025-53773 → quarantine target ref
      source_claims:
        - claim-quarantineaction-design
  typical_output:
    - description: Quarantine with pending rescan.
      format: '{"mitigation_action_id":"quarantine/53773","quarantine_zone_ref":"zone-quarantine@6"}'
      source_claims:
        - claim-quarantineaction-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys: []
  fields:
    - id: quarantine_scope
      labels:
        zh: 隔离范围
        en: quarantine scope
        ja: 隔離範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对象被排除的检索、提示组装、工具执行或下游传播范围。
        en: Retrieval, prompt assembly, tool execution, or downstream propagation boundary from which the subject is excluded.
        ja: 対象を除外する retrieval・prompt assembly・tool execution・downstream propagation 範囲です。
      allowed_values: []
      pattern: null
      example_value: retrieval-index and prompt-assembly
      source_claims:
        - claim-quarantineaction-design
    - id: evidence_copy_ref
      labels:
        zh: 证据副本引用
        en: evidence-copy reference
        ja: evidence copy 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留原始对象及其检测证据的只读取证副本。
        en: Read-only forensic copy retaining the original subject and its detection evidence.
        ja: 原対象と検出 evidence を保持する read-only forensic copy です。
      allowed_values: []
      pattern: null
      example_value: forensic-copy:C-88
      source_claims:
        - claim-quarantineaction-design
    - id: release_condition
      labels:
        zh: 解除隔离条件
        en: release condition
        ja: 隔離解除条件
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 允许对象重新进入指定处理范围所需的复核、策略或时间条件。
        en: Review, policy, or time condition required before the subject can re-enter the stated processing scope.
        ja: 対象が処理範囲へ戻る前に必要な review・policy・time 条件です。
      allowed_values: []
      pattern: null
      example_value: manual-review-approved AND rescan=clean
      source_claims:
        - claim-quarantineaction-design
  constraints:
    - id: quarantine-action-preserves-and-excludes
      severity: error
      expression_language: plain
      expression: evidence_copy_ref preserves the original AND subject_ref is unavailable throughout quarantine_scope until release_condition holds
      explanations:
        zh: 隔离必须同时保留原件证据并阻止其进入指定正常处理范围。
        en: Quarantine must both preserve original evidence and prevent the subject from entering the stated normal-processing scope.
        ja: quarantine は原 evidence を保持し、対象を指定 normal-processing scope から除外します。
      source_claims:
        - claim-quarantineaction-design
  required_relation_constraints: []
examples:
  - id: QuarantineAction-copilot-53773
    labels:
      zh: Copilot 配置隔离
      en: Copilot config quarantine
      ja: Copilot config quarantine
    descriptions:
      zh: quarantine/53773 隔离 .vscode/settings.json 至 zone-quarantine@6。
      en: quarantine/53773 isolates .vscode/settings.json to zone-quarantine@6.
      ja: quarantine/53773 が settings.json を zone-quarantine@6 へ隔離。
    example_source:
      product: CVE-2025-53773
      url: https://www.getmaxim.ai/articles/prompt-injection-defense-for-production-ai-agents-a-complete-2026-guide/
      version: CVE-2025-53773
    field_values:
      mitigation_action_id: quarantine/53773
    related_node_ids:
      - QuarantineAction
      - PoisonedContent
    related_relation_ids: []
    source_claims:
      - claim-quarantineaction-design
  - id: QuarantineAction-mcp-118
    labels:
      zh: MCP 工具规范隔离
      en: MCP tool-spec quarantine
      ja: MCP tool-spec quarantine
    descriptions:
      zh: quarantine/118 隔离 tool-spec://payments-api@v3  pending rescan/118。
      en: quarantine/118 isolates tool-spec://payments-api@v3 pending rescan/118.
      ja: quarantine/118 が tool-spec payments-api@v3 を隔離し rescan/118 待ち。
    example_source:
      product: MCP tool poisoning (2026)
      url: https://www.mdpi.com/2078-2489/17/1/54
      version: "2026"
    field_values:
      mitigation_action_id: quarantine/118
    related_node_ids:
      - QuarantineAction
      - PoisonedToolDescription
    related_relation_ids: []
    source_claims:
      - claim-quarantineaction-design
  - id: QuarantineAction-rag-5doc
    labels:
      zh: RAG 投毒块隔离
      en: RAG poisoned-chunk quarantine
      ja: RAG poisoned-chunk quarantine
    descriptions:
      zh: quarantine/rag-5 隔离五份 poisoned chunk 直至 rescan 无操纵信号。
      en: quarantine/rag-5 isolates five poisoned chunks until rescan shows no manipulation signal.
      ja: quarantine/rag-5 が 5 poisoned chunk を rescan まで隔離。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: LLM01 RAG
    field_values:
      mitigation_action_id: quarantine/rag-5
    related_node_ids:
      - QuarantineAction
      - PoisonedRetrievedChunk
    related_relation_ids: []
    source_claims:
      - claim-quarantineaction-design
  - id: QuarantineAction-agentsentry-tool
    labels:
      zh: AgentSentry 工具输出隔离
      en: AgentSentry tool-output quarantine
      ja: AgentSentry tool-output quarantine
    descriptions:
      zh: quarantine/tool-771 隔离 tool-result://R-5 阻止 turn-3 transfer_funds。
      en: quarantine/tool-771 isolates tool-result://R-5 blocking turn-3 transfer_funds.
      ja: quarantine/tool-771 が tool-result://R-5 を隔離し turn-3 transfer_funds を阻止。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      mitigation_action_id: quarantine/tool-771
    related_node_ids:
      - QuarantineAction
      - MaliciousToolOutput
    related_relation_ids: []
    source_claims:
      - claim-quarantineaction-design
parent_relation:
  id: QuarantineAction-is_a-MitigationAction
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 隔离处置 是一种 缓解活动。区分特征：隔离处置是通过把可疑内容移出正常上下文或执行流来降低风险的 MitigationAction。
    en: "quarantine action is a kind of mitigation action. Reviewed differentia: QuarantineAction is a MitigationAction distinguished by removing suspect content from normal context or execution flow."
    ja: 隔離措置 は 緩和活動 の一種です。審査済みの種差：QuarantineAction は疑わしい内容を通常の文脈・実行流から外す MitigationAction です。
  cardinality: null
  cardinality_not_applicable_reason:
