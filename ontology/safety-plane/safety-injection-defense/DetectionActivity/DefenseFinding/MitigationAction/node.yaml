  - id: claim-mitigation-action-015
    source: lit-agent-guardagent
    supports: GuardAgent checks target-agent actions against an explicit safety guard request and executes generated guardrail code to moderate violations. Moonweave infers that an addresses assertion needs an identified checked finding and a performed moderation action; GuardAgent does not define Moonweave's classes or layout role.
    locator: Abstract > safety guard request analysis, guardrail-code execution, and moderation of violation actions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mitigation-action-016
    source: lit-agent-vigil-siren
    supports: VIGIL separates speculative reasoning from irreversible action and validates tentative trajectories against intent-grounded constraints before commitment. Moonweave infers that only a committed response with retained finding and authority evidence satisfies addresses; the paper does not prescribe the ontology edge.
    locator: Sections 4.1 and 4.5 > verify-before-commit lifecycle and intent-grounded trajectory verification
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mitigation-action-017
    source: eng-fw-openai-guardrails
    supports: OpenAI guardrails return a result and may trip, reject, replace, or halt processing. Moonweave separates the resulting DefenseFinding from the authorized MitigationAction that acts on that finding and records the linkage.
    locator: OpenAI Agents SDK, Guardrails, ‘Workflow boundaries’, ‘Tool guardrails’, and ‘Tripwires’
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mitigation-action-018
    source: lit-agent-guardagent
    supports: GuardAgent checks whether target-agent actions satisfy an explicit safety guard request and executes generated guardrail code to moderate violations. This supports a check-to-performed-response chain; Moonweave's DefenseFinding and MitigationAction identities, addresses direction, and primary reading placement remain explicit design inferences.
    locator: Abstract > safety guard request analysis, guardrail-code execution, and moderation of violation actions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mitigation-action-019
    source: lit-agent-vigil-siren
    supports: VIGIL decouples speculative reasoning from irreversible action and validates tentative trajectories against intent-grounded constraints before commitment. This supports the evidence-to-authorized-response boundary; the canonical addresses edge and its primary-backbone display role are Moonweave design inferences.
    locator: Sections 4.1 and 4.5 > verify-before-commit lifecycle and intent-grounded trajectory verification
    evidence_kind: design-inference
