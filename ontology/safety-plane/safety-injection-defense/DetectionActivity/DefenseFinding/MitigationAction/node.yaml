schema: moonweave.ai/ontology-node/v1
id: MitigationAction
kind: concept
labels:
  zh: 缓解活动
  en: mitigation action
  ja: 緩和活動
semantics:
  short_definition:
    zh: 针对已识别风险、经授权执行的具体处置活动。
    en: A concrete disposition activity executed under authorization against an identified risk.
    ja: 識別済みリスクに対し認可の下で実行される具体 disposition activity。
  definition:
    zh: MitigationAction 记录 actor、action_kind、authority_basis、目标对象与 lifecycle（started/completed/verified）。NeMo action rails、Guardrails on_fail=exception 与 quarantine/rescan 闭环应映射为此概念；它不是 DefenseFinding 或策略文本。TrustedInstructionOverride、QuarantineAction、SanitizationAction 是其互斥子类。
    en: MitigationAction records actor, action_kind, authority_basis, target subject, and lifecycle (started/completed/verified). NeMo action rails, Guardrails on_fail=exception, and quarantine/rescan loops map here; it is not DefenseFinding or policy prose. TrustedInstructionOverride, QuarantineAction, and SanitizationAction are mutually typed subtypes.
    ja: MitigationAction は actor/action_kind/authority_basis/target/lifecycle を記録。NeMo action rails/Guardrails on_fail/quarantine-rescan loop をここに写像。DefenseFinding/policy prose ではなく TrustedInstructionOverride/QuarantineAction/SanitizationAction が subtype。
  why_needed:
    zh: 必须区分“建议隔离”与“已执行隔离并 rescan 通过”，否则 OWASP LLM01 RAG 投毒 mitigation 无法验证。
    en: Must separate recommended quarantine from executed quarantine with passed rescan for OWASP LLM01 RAG poisoning verification.
    ja: 推奨 quarantine と executed quarantine+rescan pass を分離しないと OWASP LLM01 RAG poisoning mitigation を検証できません。
  includes:
    - zh: 包含明确风险对象、授权依据、执行者、处置类型和完成状态的动作。
      en: Includes actions with an identified risk subject, authority basis, actor, disposition type, and completion state.
      ja: リスク対象、権限根拠、実行者、処置型、完了状態を持つ動作を含みます。
  excludes:
    - zh: 不包含只描述风险的 DefenseFinding、未执行的策略建议或普通内容转换。
      en: Excludes a DefenseFinding that only describes risk, an unexecuted policy recommendation, and ordinary content transformation.
      ja: リスクを記述するだけの DefenseFinding、未実行の方針勧告、通常の内容変換は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: MitigationAction 关闭 finding 需同对象 rescan 无残余 taint；MCP finding/mcp-118 在 rescan/118 前保持 open。NeMo Colang action rails 可记录 bot refuse 为 TrustedInstructionOverride。
    en: MitigationAction closes finding only after same-object rescan shows no residual taint; MCP finding/mcp-118 stays open until rescan/118. NeMo Colang action rails may record bot refuse as TrustedInstructionOverride.
    ja: MitigationAction は same-object rescan で residual taint なし時のみ finding close。MCP finding/mcp-118 は rescan/118 まで open。NeMo action rails の bot refuse は TrustedInstructionOverride。
  typical_input:
    - description: DefenseFinding with disposition decision.
      format: finding_id + policy grant → mitigation plan
      source_claims:
        - claim-mitigationaction-design
  typical_output:
    - description: Executed mitigation with verification ref.
      format: '{"mitigation_action_id":"quarantine/53773","status":"completed","rescan_ref":"rescan/53773"}'
      source_claims:
        - claim-mitigationaction-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - mitigation_action_id
  fields:
    - id: mitigation_action_id
      labels:
        zh: 缓解活动标识
        en: mitigation-action ID
        ja: 緩和活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经开始、由授权依据支撑的具体风险处置活动。
        en: Stable identifier for one concrete risk disposition that has started under an authority basis.
        ja: 権限根拠の下で開始された一回の具体的 risk disposition の安定 ID です。
      allowed_values: []
      pattern: null
      example_value: mitigation-action-004
      source_claims:
        - claim-mitigationaction-design
    - id: action_kind
      labels:
        zh: 处置类型
        en: disposition kind
        ja: 処置種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分隔离、净化、可信指令覆盖或其他经审查处置机制。
        en: Distinguishes quarantine, sanitization, trusted-instruction override, or another reviewed disposition mechanism.
        ja: quarantine・sanitization・trusted-instruction override・その他審査済み処置を区別します。
      allowed_values: []
      pattern: null
      example_value: quarantine
      source_claims:
        - claim-mitigationaction-design
    - id: actor_ref
      labels:
        zh: 执行主体引用
        en: performing-actor reference
        ja: 実行 actor 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行或直接控制该处置活动的人或程序化主体。
        en: Human or programmatic actor that performs or directly controls the disposition.
        ja: 処置を実行または直接制御する人間・programmatic actor です。
      allowed_values: []
      pattern: null
      example_value: safety-actor-2
      source_claims:
        - claim-mitigationaction-design
    - id: subject_ref
      labels:
        zh: 处置对象引用
        en: mitigation-subject reference
        ja: 緩和対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被隔离、转换、降权或从后续计划中抑制的具体对象版本。
        en: Concrete object revision quarantined, transformed, de-privileged, or suppressed from subsequent planning.
        ja: 隔離・変換・権限低下・後続計画から抑制される具体的 object revision です。
      allowed_values: []
      pattern: null
      example_value: tool-result:R-8
      source_claims:
        - claim-mitigationaction-design
    - id: authority_basis_ref
      labels:
        zh: 授权依据引用
        en: authority-basis reference
        ja: 権限根拠参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 允许执行该处置的策略决定、授权或人工批准引用。
        en: Reference to the policy decision, authorization, or human approval permitting the disposition.
        ja: 処置を許可する policy decision・authorization・human approval 参照です。
      allowed_values: []
      pattern: null
      example_value: policy-decision:P-4
      source_claims:
        - claim-mitigationaction-design
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 处置首次改变对象可用性、表示或指令影响力的 UTC 时间。
        en: UTC instant when the disposition first began changing subject availability, representation, or instruction influence.
        ja: 処置が対象の可用性・表現・指示影響力を変更し始めた UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:02:00Z
      source_claims:
        - claim-mitigationaction-design
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 处置完成、失败或取消的 UTC 时间；运行中活动可为空。
        en: UTC instant when the disposition completed, failed, or was cancelled; absent while running.
        ja: 処置が完了・失敗・取消となった UTC 時刻で、実行中は省略できます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:02:04Z
      source_claims:
        - claim-mitigationaction-design
    - id: lifecycle_state
      labels:
        zh: 生命周期状态
        en: lifecycle state
        ja: lifecycle state
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明处置正在执行、已完成、失败或取消。
        en: States whether the disposition is running, completed, failed, or cancelled.
        ja: 処置が running・completed・failed・cancelled のいずれかを示します。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-mitigationaction-design
  constraints:
    - id: mitigation-action-performed-boundary
      severity: error
      expression_language: plain
      expression: started_at is present AND lifecycle_state IN {running, completed, failed, cancelled}; a recommendation without an attempted state change is not a MitigationAction
      explanations:
        zh: 只有已经开始改变对象处理状态的处置才是缓解活动；“建议隔离”仍是建议。
        en: Only a disposition that has begun changing subject processing state is a MitigationAction; ‘should quarantine’ remains a recommendation.
        ja: 対象の処理状態変更を開始した処置だけが MitigationAction であり、隔離推奨は勧告のままです。
      source_claims:
        - claim-mitigationaction-design
    - id: mitigation-action-terminal-time
      severity: error
      expression_language: plain
      expression: lifecycle_state IN {completed, failed, cancelled} IMPLIES ended_at IS PRESENT; lifecycle_state = running IMPLIES ended_at IS ABSENT
      explanations:
        zh: 终态必须有结束时间，运行态不得提前声明结束。
        en: A terminal state requires an end time, while a running state cannot claim an end in advance.
        ja: 終端状態には終了時刻が必要で、running 状態は事前に終了を主張できません。
      source_claims:
        - claim-mitigationaction-design
  required_relation_constraints:
    - id: mitigation-action-addresses-defense-finding
      direction: outgoing
      predicate: addresses
      target_concept_id: DefenseFinding
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每项缓解活动必须明确处置至少一项已裁决的防御发现，并由授权依据支撑。
        en: Each MitigationAction must explicitly address at least one adjudicated DefenseFinding and retain its authority basis.
        ja: 各 MitigationAction は少なくとも一つの裁決済み DefenseFinding に明示対応し権限根拠を保持します。
      source_claims:
        - claim-mitigationaction-design
examples:
  - id: MitigationAction-quarantine-copilot
    labels:
      zh: Copilot CVE 隔离缓解
      en: Copilot CVE quarantine mitigation
      ja: Copilot CVE quarantine mitigation
    descriptions:
      zh: quarantine/53773 隔离 resource://repo-malicious/settings.json 并触发 rescan/53773。
      en: quarantine/53773 isolates resource://repo-malicious/settings.json and triggers rescan/53773.
      ja: quarantine/53773 が settings.json を隔離し rescan/53773 を起動。
    example_source:
      product: CVE-2025-53773
      url: https://www.getmaxim.ai/articles/prompt-injection-defense-for-production-ai-agents-a-complete-2026-guide/
      version: CVE-2025-53773
    field_values:
      mitigation_action_id: quarantine/53773
      action_kind: quarantine
    related_node_ids:
      - MitigationAction
      - QuarantineAction
      - DefenseFinding
    related_relation_ids:
      - MitigationAction-addresses-DefenseFinding
    source_claims:
      - claim-mitigationaction-design
  - id: MitigationAction-reasalign-override
    labels:
      zh: ReasAlign 可信指令覆盖
      en: ReasAlign trusted instruction override
      ja: ReasAlign trusted instruction override
    descriptions:
      zh: override/42 拒绝 invoke_admin_api 并引用 developer 指令权威。
      en: override/42 refuses invoke_admin_api citing developer instruction authority.
      ja: override/42 が developer instruction authority で invoke_admin_api を拒否。
    example_source:
      product: ReasAlign
      url: https://arxiv.org/abs/2601.10173
      version: "2026"
    field_values:
      mitigation_action_id: override/42
      action_kind: trusted-instruction-override
    related_node_ids:
      - MitigationAction
      - TrustedInstructionOverride
      - InstructionConflict
    related_relation_ids:
      - InstructionConflict-resolved_by-TrustedInstructionOverride
    source_claims:
      - claim-mitigationaction-design
  - id: MitigationAction-mcp-rescan
    labels:
      zh: MCP 投毒隔离与复检
      en: MCP poisoning quarantine and rescan
      ja: MCP poisoning quarantine and rescan
    descriptions:
      zh: quarantine/118 后 rescan/118 通过前 finding/mcp-118 保持 open。
      en: finding/mcp-118 stays open until rescan/118 passes after quarantine/118.
      ja: quarantine/118 後 rescan/118 合格まで finding/mcp-118 open。
    example_source:
      product: MCP tool poisoning (2026)
      url: https://www.mdpi.com/2078-2489/17/1/54
      version: "2026"
    field_values:
      mitigation_action_id: quarantine/118
      status: in_progress
    related_node_ids:
      - MitigationAction
      - QuarantineAction
    related_relation_ids: []
    source_claims:
      - claim-mitigationaction-design
  - id: MitigationAction-nemo-refuse
    labels:
      zh: NeMo rail 拒绝缓解
      en: NeMo rail refusal mitigation
      ja: NeMo rail refusal mitigation
    descriptions:
      zh: mitigation/nemo-rail-42 记录 Colang input_rails 阻断与 bot refuse 动作。
      en: mitigation/nemo-rail-42 records Colang input_rails block and bot refuse action.
      ja: mitigation/nemo-rail-42 が Colang input_rails block と bot refuse を記録。
    example_source:
      product: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      version: action rails
    field_values:
      mitigation_action_id: mitigation/nemo-rail-42
    related_node_ids:
      - MitigationAction
      - TrustedInstructionOverride
    related_relation_ids: []
    source_claims:
      - claim-mitigationaction-design
parent_relation:
  id: MitigationAction-addresses-DefenseFinding
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 处置发现
    en: addresses
    ja: 所見へ対処する
  definitions:
    zh: 缓解活动在适用策略决定或授权下处置防御发现指出的具体风险，并记录执行者、作用域、前后状态、验证与回滚结果；防御发现仅作为输入证据。
    en: A mitigation activity addresses the specific risk identified by a defense finding under an applicable policy decision or authorization and records actor, scope, before/after state, validation, and rollback outcome; the finding remains input evidence.
    ja: 緩和活動は適用方針判断または認可の下で防御所見が示す具体的リスクへ対処し、実行者・範囲・前後状態・検証・ロールバック結果を記録します。防御所見は入力証拠にとどまります。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 addresses
      en: inverse addresses
      ja: 逆 addresses
  conditions:
    - id: MitigationAction-addresses-DefenseFinding-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when an actually executed or committed mitigation explicitly cites at least one adjudicated DefenseFinding and its applicable policy decision or authorization; a generic safeguard, an unexecuted recommendation, or mere co-occurrence is insufficient.
      explanations:
        zh: 仅当已经执行或提交的缓解活动明确引用至少一项已裁决的 DefenseFinding，并保留适用策略决定或授权时才建立此边；通用防护、未执行建议或仅仅共现均不足以成立。
        en: Assert this edge only when an actually executed or committed mitigation explicitly cites at least one adjudicated DefenseFinding and retains its applicable policy decision or authorization; a generic safeguard, unexecuted recommendation, or mere co-occurrence is insufficient.
        ja: 実行または確定済みの緩和活動が、裁決済み DefenseFinding を少なくとも一つ明示参照し、適用方針判断または認可を保持する場合だけこの辺を成立させます。一般的防護、未実行勧告、単なる共起では不十分です。
      source_claims:
        - claim-mitigationaction-design
        - claim-mitigationaction-design
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-mitigationaction-design
    - claim-mitigationaction-design
    - claim-mitigationaction-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
