parent_relation:
  id: MitigationAction-addresses-DefenseFinding
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 处置发现
    en: addresses
    ja: 所見へ対処する
  definitions:
    zh: 缓解活动在适用策略决定或授权下处置防御发现指出的具体风险，并记录执行者、作用域、前后状态、验证与回滚结果；防御发现仅作为输入证据。
    en: A mitigation activity addresses the specific risk identified by a defense finding under an applicable policy decision or authorization and records actor, scope, before/after state, validation, and rollback outcome; the finding remains input evidence.
    ja: 緩和活動は適用方針判断または認可の下で防御所見が示す具体的リスクへ対処し、実行者・範囲・前後状態・検証・ロールバック結果を記録します。防御所見は入力証拠にとどまります。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 addresses
      en: inverse addresses
      ja: 逆 addresses
  conditions:
    - id: MitigationAction-addresses-DefenseFinding-condition-manual-20260716
      severity: error
      expression_language: plain
      expression: Assert only when an actually executed or committed mitigation explicitly cites at least one adjudicated DefenseFinding and its applicable policy decision or authorization; a generic safeguard, an unexecuted recommendation, or mere co-occurrence is insufficient.
      explanations:
        zh: 仅当已经执行或提交的缓解活动明确引用至少一项已裁决的 DefenseFinding，并保留适用策略决定或授权时才建立此边；通用防护、未执行建议或仅仅共现均不足以成立。
        en: Assert this edge only when an actually executed or committed mitigation explicitly cites at least one adjudicated DefenseFinding and retains its applicable policy decision or authorization; a generic safeguard, unexecuted recommendation, or mere co-occurrence is insufficient.
        ja: 実行または確定済みの緩和活動が、裁決済み DefenseFinding を少なくとも一つ明示参照し、適用方針判断または認可を保持する場合だけこの辺を成立させます。一般的防護、未実行勧告、単なる共起では不十分です。
      source_claims:
        - claim-mitigation-action-015
        - claim-mitigation-action-016
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MitigationAction-addresses-DefenseFinding-example-positive-001
      labels:
        zh: addresses 关系正例
        en: Positive addresses relation
        ja: addresses 関係の正例
      descriptions:
        zh: 防御发现指出工具输出含凭据外泄指令；获授权的缓解活动隔离该输出，并记录发现标识、执行者、处置范围与验证结果。
        en: A defense finding identifies credential-exfiltration instructions in tool output; an authorized mitigation quarantines the output and records the finding ID, actor, scope, and validation result.
        ja: 防御所見がツール出力中の資格情報流出指示を示し、承認済み緩和活動が出力を隔離して所見 ID、実行者、範囲、検証結果を記録します。
      field_values: {}
      related_node_ids:
        - MitigationAction
        - DefenseFinding
      related_relation_ids:
        - MitigationAction-addresses-DefenseFinding

        en: Assert that this MitigationAction addresses the identified DefenseFinding.
        ja: この MitigationAction が指定 DefenseFinding を addresses する事実を作成します。

        en: The disposition target, authorization, and validation outcome all bind the same finding, while the finding remains input evidence.
        ja: 処置対象、承認根拠、検証結果が同じ所見に結び付き、所見自体は入力証拠のままです。
      source_claims:
        - claim-mitigation-action-017
    - id: MitigationAction-addresses-DefenseFinding-example-boundary-001
      labels:
        zh: addresses 关系边界例
        en: Boundary case for addresses
        ja: addresses 関係の境界例
      descriptions:
        zh: 团队更新了一条通用过滤策略，但没有指出该变更要处置哪一条既有 DefenseFinding。
        en: A team updates a general filtering policy without identifying any existing DefenseFinding that the change is meant to address.
        ja: チームが一般フィルタ方針を更新しましたが、対象となる既存 DefenseFinding を特定していません。
      field_values: {}
      related_node_ids:
        - MitigationAction
        - DefenseFinding
      related_relation_ids:
        - MitigationAction-addresses-DefenseFinding

        en: Do not assert an addresses edge from thematic similarity alone.
        ja: 主題の類似だけで addresses 辺を作成してはいけません。

        en: A governance improvement may stand alone; without a finding reference and disposition scope it cannot be said to address that finding.
        ja: ガバナンス改善は単独で存在でき、所見参照と処置範囲がなければその所見を処置したとは言えません。
      source_claims:
        - claim-mitigation-action-017
  source_claims:
    - claim-mitigation-action-017
    - claim-mitigation-action-018
    - claim-mitigation-action-019
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
