      ja: 緩和活動 - Anthropic Constitutional AI
    descriptions: {zh: "缓解活动(MitigationAction) [MitigationAction]: 经策略或授权选择、针对已识别风险执行的受控处置活动。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: authority_basis_ref, started_at, actor_ref.", en: "mitigation action (MitigationAction) [MitigationAction]: A controlled disposition activity selected by policy or authorization for an identified risk.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include authority_basis_ref, started_at, actor_ref.", ja: "緩和活動(MitigationAction) [MitigationAction]: 識別済みリスクに対し方針または認可で選択される統制された処置活動。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: authority_basis_ref, started_at, actor_ref."}
