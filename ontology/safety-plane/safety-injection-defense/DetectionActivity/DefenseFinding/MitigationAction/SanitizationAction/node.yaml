schema: moonweave.ai/ontology-node/v1
id: SanitizationAction
kind: concept
labels:
  zh: 净化处置
  en: sanitization action
  ja: 無害化措置
semantics:
  short_definition:
    zh: 对威胁内容进行脱敏或降权处理而非完全隔离的缓解活动子类。
    en: A MitigationAction subtype that sanitizes or de-prioritizes threatening content rather than fully isolating it.
    ja: 脅威 content を完全隔離ではなく無害化/降格する MitigationAction subtype。
  definition:
    zh: SanitizationAction 记录 redaction、strip-markup、role-demotion 或 trust-score downgrade 等变换，产出 sanitized digest 与 residual_risk 评估。Guardrails 过滤与 NeMo 输出 rails 的可审计脱敏应映射为此概念；若残余 taint 路径存在则 finding 不得关闭。
    en: SanitizationAction records redaction, strip-markup, role-demotion, or trust-score downgrade transformations, emitting sanitized digest and residual_risk assessment. Auditable sanitization from Guardrails filters and NeMo output rails maps here; finding must not close if residual taint paths remain.
    ja: SanitizationAction は redaction/strip-markup/role-demotion/trust downgrade 変換と sanitized digest/residual_risk 評価を記録。Guardrails/NeMo output rail 脱敏を写像。residual taint path が残れば finding close 不可。
  why_needed:
    zh: 部分 tool output 可脱敏后安全摘要，但必须证明脱敏后无 hidden instruction 残余。
    en: Some tool outputs may be summarized after sanitization, but proof is required that no hidden instruction remains.
    ja: 一部 tool output は脱敏後 summarize 可能だが hidden instruction 残余のない証明が必要。
  includes:
    - zh: 包含原对象、新对象、适用规则、逐范围变更映射、授权和复检结果。
      en: Includes original and new objects, applied rule, per-span change map, authorization, and rescan result.
      ja: 原対象、新対象、適用規則、範囲別変更対応、認可、再走査結果を含みます。
  excludes:
    - zh: 不包含仅标注风险、把原件移出使用的 QuarantineAction 或无安全目的的格式化。
      en: Excludes risk labeling alone, a QuarantineAction that removes the original from use, and formatting with no safety purpose.
      ja: リスクラベルだけ、原本を利用から外す QuarantineAction、安全目的のない整形は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 脱敏后必须 PatternScan rescan 同一 digest；Azure Shield 与 Guardrails 可在 pipeline 中串联 sanitize→scan。
    en: Post-sanitization PatternScan rescan on same digest is mandatory; Azure Shield and Guardrails may chain sanitize→scan in pipeline.
    ja: 脱敏後同一 digest で PatternScan rescan 必須。Azure Shield/Guardrails で sanitize→scan 連鎖可。
  typical_input:
    - description: Threatening span in tool output.
      format: tool_result with HTML comment injection
      source_claims:
        - claim-sanitizationaction-design
  typical_output:
    - description: Sanitized artifact with rescan pass.
      format: '{"sanitized_digest":"sha256:...","residual_risk":"none"}'
      source_claims:
        - claim-sanitizationaction-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys: []
  fields:
    - id: original_object_ref
      labels:
        zh: 原对象引用
        en: original-object reference
        ja: 元 object 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 净化前、含待处理危险片段的不可变对象版本。
        en: Immutable pre-sanitization object revision containing the hazardous span.
        ja: sanitization 前の hazardous span を含む不変 object revision です。
      allowed_values: []
      pattern: null
      example_value: webpage:article@raw
      source_claims:
        - claim-sanitizationaction-design
    - id: sanitized_object_ref
      labels:
        zh: 净化后对象引用
        en: sanitized-object reference
        ja: sanitized object 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行删除、转义、掩码、改写或结构隔离后形成的新对象版本。
        en: New object revision produced by deletion, escaping, masking, rewriting, or structural separation.
        ja: delete・escape・mask・rewrite・structural separation 後に生成した新 object revision です。
      allowed_values: []
      pattern: null
      example_value: webpage:article@sanitized-1
      source_claims:
        - claim-sanitizationaction-design
    - id: transformation_rule_ref
      labels:
        zh: 转换规则引用
        en: transformation-rule reference
        ja: 変換 rule 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定哪些片段被删除、替换、转义或隔离的确定性规则版本。
        en: Deterministic rule revision deciding which spans are deleted, replaced, escaped, or separated.
        ja: どの span を delete・replace・escape・separate するか決める deterministic rule revision です。
      allowed_values: []
      pattern: null
      example_value: sanitizer-rule:prompt-injection-v4
      source_claims:
        - claim-sanitizationaction-design
    - id: change_map_ref
      labels:
        zh: 变更映射引用
        en: change-map reference
        ja: change map 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 把原对象危险范围映射到净化后范围或删除结果的逐段记录。
        en: Per-span record mapping hazardous original ranges to sanitized ranges or deletion results.
        ja: 元 hazardous range を sanitized range または削除結果へ対応付ける span 単位記録です。
      allowed_values: []
      pattern: null
      example_value: change-map:sanitize-88
      source_claims:
        - claim-sanitizationaction-design
    - id: rescan_result_ref
      labels:
        zh: 复扫结果引用
        en: rescan-result reference
        ja: 再 scan 結果参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 使用指定检测规则复核净化后版本的结果。
        en: Result of checking the sanitized revision again with the stated detection rules.
        ja: 指定 detection rules で sanitized revision を再検査した結果です。
      allowed_values: []
      pattern: null
      example_value: scan-result:sanitize-88-clean
      source_claims:
        - claim-sanitizationaction-design
  constraints:
    - id: sanitization-action-version-and-verification
      severity: error
      expression_language: plain
      expression: original_object_ref != sanitized_object_ref AND change_map_ref covers each safety-motivated transformation AND rescan_result_ref evaluates sanitized_object_ref
      explanations:
        zh: 净化必须形成新版本、保留逐段变更映射并复扫新版本。
        en: Sanitization must create a new revision, retain a per-span change map, and rescan that new revision.
        ja: sanitization は新 revision を生成し span change map を保持して新 revision を再 scan します。
      source_claims:
        - claim-sanitizationaction-design
  required_relation_constraints: []
examples:
  - id: SanitizationAction-html-strip
    labels:
      zh: HTML 注释注入脱敏
      en: HTML comment injection sanitization
      ja: HTML comment injection sanitization
    descriptions:
      zh: sanitize/tool-771 移除 HTML 注释内 hidden instruction 后 rescan 通过。
      en: sanitize/tool-771 removes hidden instruction in HTML comments then passes rescan.
      ja: sanitize/tool-771 が HTML comment 内 hidden instruction を除去し rescan 合格。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      mitigation_action_id: sanitize/tool-771
    related_node_ids:
      - SanitizationAction
      - MaliciousToolOutput
    related_relation_ids: []
    source_claims:
      - claim-sanitizationaction-design
  - id: SanitizationAction-guardrails-filter
    labels:
      zh: Guardrails 过滤脱敏
      en: Guardrails filter sanitization
      ja: Guardrails filter sanitization
    descriptions:
      zh: sanitize/guard-118 使用 Guardrails on_fail=filter 剥离 MCP 描述中的恶意段。
      en: sanitize/guard-118 uses Guardrails on_fail=filter to strip malicious segment from MCP description.
      ja: sanitize/guard-118 が Guardrails on_fail=filter で MCP description 悪意段を除去。
    example_source:
      product: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      version: on_fail filter
    field_values:
      mitigation_action_id: sanitize/guard-118
    related_node_ids:
      - SanitizationAction
    related_relation_ids: []
    source_claims:
      - claim-sanitizationaction-design
  - id: SanitizationAction-rag-redact
    labels:
      zh: RAG 块 redaction 脱敏
      en: RAG chunk redaction sanitization
      ja: RAG chunk redaction sanitization
    descriptions:
      zh: sanitize/rag-5 对五块投毒文本 redact 指令段并降级 trust。
      en: sanitize/rag-5 redacts instruction spans in five poisoned chunks and downgrades trust.
      ja: sanitize/rag-5 が 5 poisoned chunk の instruction span を redact し trust downgrade。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: LLM01
    field_values:
      mitigation_action_id: sanitize/rag-5
    related_node_ids:
      - SanitizationAction
      - PoisonedRetrievedChunk
    related_relation_ids: []
    source_claims:
      - claim-sanitizationaction-design
  - id: SanitizationAction-nemo-output
    labels:
      zh: NeMo 输出 rail 脱敏
      en: NeMo output rail sanitization
      ja: NeMo output rail sanitization
    descriptions:
      zh: sanitize/nemo-42 由 output rails 移除 exfiltration lure 后再交付 planner。
      en: sanitize/nemo-42 removes exfiltration lure via output rails before planner delivery.
      ja: sanitize/nemo-42 が output rails で exfiltration lure を除去して planner へ。
    example_source:
      product: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      version: output rails
    field_values:
      mitigation_action_id: sanitize/nemo-42
    related_node_ids:
      - SanitizationAction
    related_relation_ids: []
    source_claims:
      - claim-sanitizationaction-design
parent_relation:
  id: SanitizationAction-is_a-MitigationAction
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 净化处置 是一种 缓解活动。区分特征：净化处置是通过移除、改写、屏蔽或缩窄不安全内容来降低风险的 MitigationAction。
    en: "sanitization action is a kind of mitigation action. Reviewed differentia: SanitizationAction is a MitigationAction distinguished by removing, rewriting, masking, or narrowing unsafe content."
    ja: 無害化措置 は 緩和活動 の一種です。審査済みの種差：SanitizationAction は安全でない内容を除去・書換・遮蔽・縮小する MitigationAction です。
  cardinality: null
  cardinality_not_applicable_reason:
