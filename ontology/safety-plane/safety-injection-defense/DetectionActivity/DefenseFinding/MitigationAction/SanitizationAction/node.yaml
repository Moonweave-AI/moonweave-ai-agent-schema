schema: moonweave.ai/ontology-node/v1
id: SanitizationAction
kind: concept
status: review
labels:
  zh: 净化处置
  en: sanitization action
  ja: 無害化措置
semantics:
  short_definition:
    zh: 按授权规则移除、改写或中和危险片段的缓解活动。
    en: A mitigation action that removes, rewrites, or neutralizes hazardous spans under an authorized rule.
    ja: 認可済み規則に従い危険範囲を除去・書換え・無害化する緩和活動。
  definition:
    zh: 净化处置是一种 MitigationAction，它从原始对象生成新的可用版本，按明确规则删除、转义、重写、遮蔽或结构化分离危险内容，并保留变更映射和复检结果。它不是隔离原件，也不是未经验证的普通文本改写。
    en: A SanitizationAction is a MitigationAction that creates a new usable version from an original object by deleting, escaping, rewriting, masking, or structurally separating hazardous content under an explicit rule, while retaining a change map and rescan result. It is not quarantine of the original and not an unverified ordinary rewrite.
    ja: 無害化処置は、明示規則に従い危険内容を削除、エスケープ、書換え、遮蔽、構造分離し、原対象から新しい利用可能版を作り、変更対応と再走査結果を保持する MitigationAction です。原本隔離でも未検証の通常書換えでもありません。
  why_needed:
    zh: 可审计的前后版本与复检可证明危险影响被处理，而非仅丢失证据。
    en: Auditable before-and-after versions and rescanning demonstrate that hazardous influence was treated rather than evidence merely lost.
    ja: 監査可能な前後版と再走査により、証拠を失っただけでなく危険影響を処理したと示せます。
  includes:
    - zh: 包含原对象、新对象、适用规则、逐范围变更映射、授权和复检结果。
      en: Includes original and new objects, applied rule, per-span change map, authorization, and rescan result.
      ja: 原対象、新対象、適用規則、範囲別変更対応、認可、再走査結果を含みます。
  excludes:
    - zh: 不包含仅标注风险、把原件移出使用的 QuarantineAction 或无安全目的的格式化。
      en: Excludes risk labeling alone, a QuarantineAction that removes the original from use, and formatting with no safety purpose.
      ja: リスクラベルだけ、原本を利用から外す QuarantineAction、安全目的のない整形は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: original_object_ref
      labels:
        zh: 原对象引用
        en: original-object reference
        ja: 元 object 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 净化前、含待处理危险片段的不可变对象版本。
        en: Immutable pre-sanitization object revision containing the hazardous span.
        ja: sanitization 前の hazardous span を含む不変 object revision です。
      allowed_values: []
      pattern: null
      example_value: webpage:article@raw
      source_claims:
        - claim-sanitization-action-002
    - id: sanitized_object_ref
      labels:
        zh: 净化后对象引用
        en: sanitized-object reference
        ja: sanitized object 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行删除、转义、掩码、改写或结构隔离后形成的新对象版本。
        en: New object revision produced by deletion, escaping, masking, rewriting, or structural separation.
        ja: delete・escape・mask・rewrite・structural separation 後に生成した新 object revision です。
      allowed_values: []
      pattern: null
      example_value: webpage:article@sanitized-1
      source_claims:
        - claim-sanitization-action-003
    - id: transformation_rule_ref
      labels:
        zh: 转换规则引用
        en: transformation-rule reference
        ja: 変換 rule 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定哪些片段被删除、替换、转义或隔离的确定性规则版本。
        en: Deterministic rule revision deciding which spans are deleted, replaced, escaped, or separated.
        ja: どの span を delete・replace・escape・separate するか決める deterministic rule revision です。
      allowed_values: []
      pattern: null
      example_value: sanitizer-rule:prompt-injection-v4
      source_claims:
        - claim-sanitization-action-004
    - id: change_map_ref
      labels:
        zh: 变更映射引用
        en: change-map reference
        ja: change map 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 把原对象危险范围映射到净化后范围或删除结果的逐段记录。
        en: Per-span record mapping hazardous original ranges to sanitized ranges or deletion results.
        ja: 元 hazardous range を sanitized range または削除結果へ対応付ける span 単位記録です。
      allowed_values: []
      pattern: null
      example_value: change-map:sanitize-88
      source_claims:
        - claim-sanitization-action-005
    - id: rescan_result_ref
      labels:
        zh: 复扫结果引用
        en: rescan-result reference
        ja: 再 scan 結果参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 使用指定检测规则复核净化后版本的结果。
        en: Result of checking the sanitized revision again with the stated detection rules.
        ja: 指定 detection rules で sanitized revision を再検査した結果です。
      allowed_values: []
      pattern: null
      example_value: scan-result:sanitize-88-clean
      source_claims:
        - claim-sanitization-action-006
  constraints:
    - id: sanitization-action-version-and-verification
      severity: error
      expression_language: plain
      expression: original_object_ref != sanitized_object_ref AND change_map_ref covers each safety-motivated transformation AND rescan_result_ref evaluates sanitized_object_ref
      explanations:
        zh: 净化必须形成新版本、保留逐段变更映射并复扫新版本。
        en: Sanitization must create a new revision, retain a per-span change map, and rescan that new revision.
        ja: sanitization は新 revision を生成し span change map を保持して新 revision を再 scan します。
      source_claims:
        - claim-sanitization-action-007
  required_relation_constraints: []
