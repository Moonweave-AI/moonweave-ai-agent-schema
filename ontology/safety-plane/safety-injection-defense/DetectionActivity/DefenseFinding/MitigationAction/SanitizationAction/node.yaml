sibling_differentiation:
  - sibling_concept_id: QuarantineAction
    shared_parent_concept_id: MitigationAction
    differentia:
      zh: 端点特定对照：父节点 MitigationAction：SanitizationAction（semantic kind=activity，骨架 SanitizationAction-is_a-MitigationAction）；QuarantineAction（semantic kind=activity，骨架 QuarantineAction-is_a-MitigationAction）。双端条件：SanitizationAction 条件：“净化处置是以如下事实为区分特征的缓解活动：净化动作记录在不安全内容影响上下文、工具参数、记忆或披露前对其进行移除、改写、掩码、中和或收窄的处理”；QuarantineAction 条件：“隔离处置属于缓解活动，区别于其他同类对象的条件是：隔离动作记录把内容、工具输出、检索记忆或产物从正常上下文和执行流中隔离，直到完成审查或策略解决”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent MitigationAction: SanitizationAction (semantic kind=activity, backbone SanitizationAction-is_a-MitigationAction); QuarantineAction (semantic kind=activity, backbone QuarantineAction-is_a-MitigationAction). Endpoint conditions: SanitizationAction condition: “Sanitization action is a mitigation action; its differentiating condition is that it records an action that removes, rewrites, masks, neutralizes, or narrows unsafe content before it can affect context, tool arguments, memory, or disclosure”; QuarantineAction condition: “Quarantine action is a mitigation action whose defining condition is that it records an action that isolates content, tool output, retrieved memory, or artifact from normal context and execution flow until review or policy resolution”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 MitigationAction：SanitizationAction（semantic kind=activity、バックボーン SanitizationAction-is_a-MitigationAction）；QuarantineAction（semantic kind=activity、バックボーン QuarantineAction-is_a-MitigationAction）。両端条件：SanitizationAction の条件：「無害化措置は緩和活動の一種であり、次の条件で区別されます：無害化アクションは、安全でない内容がコンテキスト、ツール引数、メモリ、開示へ影響する前に、削除、書き換え、マスク、中和、範囲縮小する処理を記録します」；QuarantineAction の条件：「隔離措置は緩和活動のうち、次の事実を定義条件とする対象です：隔離アクションは、内容、ツール出力、検索メモリ、成果物を通常のコンテキストと実行フローから分離し、レビューまたはポリシー解決まで保持することを記録します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-sanitization-action-010
