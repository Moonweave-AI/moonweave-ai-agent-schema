      ja: 検証器はこの記録を ToolDescriptionTrust と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含工具版本、来源、完整性证据、行为核验、信任结论和有效期。
      en: Includes tool version, provenance, integrity evidence, behavior verification, trust conclusion, and validity interval.
      ja: ツール版、来歴、完全性証拠、挙動検証、信頼結論、有効期間を含みます。
