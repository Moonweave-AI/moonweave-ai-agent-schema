schema: moonweave.ai/ontology-node/v1
id: ToolDescriptionTrust
kind: concept
status: accepted
labels:
  zh: 工具描述可信度
  en: tool-description trust assessment
  ja: ツール記述信頼評価
semantics:
  short_definition:
    zh: 对某版工具描述之来源、完整性和行为一致性作出的防御发现。
    en: A defense finding about the provenance, integrity, and behavioral fidelity of a particular tool-description version.
    ja: 特定ツール記述版の来歴、完全性、挙動整合性に関する防御所見。
  definition:
    zh: 工具描述可信度是一种 DefenseFinding，记录具体工具定义版本的来源服务器、签名或哈希、变更历史、注解是否可信、描述与实测行为是否一致以及结论有效期。它不是工具的固有质量，也不把来自已知服务器的描述永久视为可信。
    en: ToolDescriptionTrust is a DefenseFinding recording a particular tool-definition version's source server, signature or hash, change history, annotation reliability, consistency between description and observed behavior, and validity interval. It is not an intrinsic quality of the tool and never treats all descriptions from a known server as permanently trusted.
    ja: ツール記述信頼は、特定ツール定義版の出所サーバー、署名またはハッシュ、変更履歴、注釈の信頼性、記述と観測挙動の一致、有効期間を記録する DefenseFinding です。ツール固有の品質ではなく、既知サーバー由来の全記述を恒久的に信頼しません。
  why_needed:
    zh: 工具描述会直接影响模型选用和参数生成，必须把可复核信任结论绑定到具体版本。
    en: Tool descriptions directly affect model selection and argument generation, so a reviewable trust conclusion must bind to one version.
    ja: ツール記述はモデルの選択と引数生成へ直接影響するため、再審査可能な信頼結論を特定版へ結び付けます。
  includes:
    - zh: 包含工具版本、来源、完整性证据、行为核验、信任结论和有效期。
      en: Includes tool version, provenance, integrity evidence, behavior verification, trust conclusion, and validity interval.
      ja: ツール版、来歴、完全性証拠、挙動検証、信頼結論、有効期間を含みます。
  excludes:
    - zh: 不包含 ToolDefinition 本身、被投毒描述内容或没有证据的全局 allowlist 标签。
      en: Excludes the ToolDefinition itself, the poisoned description content, and evidence-free global allowlist labels.
      ja: ToolDefinition 自体、被汚染記述内容、証拠のない大域 allowlist ラベルは含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
