schema: moonweave.ai/ontology-node/v1
id: DefenseFinding
kind: concept
labels:
  zh: 防御发现
  en: defense finding
  ja: 防御所見
semantics:
  short_definition:
    zh: 把检测证据归纳为可处置安全结论的信息记录。
    en: An information record synthesizing detection evidence into a dispositionable safety conclusion.
    ja: 検出証拠を処置可能な安全結論へ統合する情報記録。
  definition:
    zh: DefenseFinding 将 ThreatSignal、InjectionScanResult 与 Azure attackDetected、OpenAI moderation flagged、Guardrails on_fail 等边界输出提升为带 finding_id、风险类别、置信度、严重度与处置状态的裁决记录。它不是 DetectionActivity 本身，也不是只有分数的裸遥测；ReasAlign 推理链与 AgentSentry 因果诊断应在此形成可引用结论，供 QuarantineAction 与 TrustedInstructionOverride 执行。
    en: DefenseFinding elevates ThreatSignals, InjectionScanResults, Azure attackDetected, OpenAI moderation flags, and Guardrails on_fail outputs into an adjudicated record with finding_id, risk class, confidence, severity, and disposition state. It is not the DetectionActivity or bare score telemetry; ReasAlign reasoning chains and AgentSentry causal diagnoses should form citable conclusions here for QuarantineAction and TrustedInstructionOverride.
    ja: DefenseFinding は ThreatSignal/InjectionScanResult と Azure attackDetected、OpenAI moderation flag、Guardrails on_fail を finding_id・risk class・confidence・severity・disposition state 付き adjudication record へ昇格させます。DetectionActivity や score だけの telemetry ではなく、ReasAlign reasoning chain と AgentSentry causal diagnosis は QuarantineAction/TrustedInstructionOverride 用の引用可能 conclusion をここで形成します。
  why_needed:
    zh: 策略与人工审查必须引用同一 finding_id，否则 Copilot CVE-2025-53773 或 MCP 投毒复检无法区分“已检测”与“已裁决”。
    en: Policy and human review must cite one finding_id; otherwise Copilot CVE-2025-53773 or MCP poisoning rescans cannot separate detected from adjudicated risk.
    ja: policy/人手審査は同一 finding_id を引用する必要があり、Copilot CVE-2025-53773 や MCP poisoning rescan で「検出済み」と「裁決済み」を分離できません。
  includes:
    - zh: 包含对象标识、证据引用、风险类别、置信度、严重度和处置状态均明确的发现记录。
      en: Includes findings with an identified subject, cited evidence, risk class, confidence, severity, and disposition state.
      ja: 対象、証拠参照、リスク種別、確信度、重大度、処置状態が明示された所見を含みます。
  excludes:
    - zh: 不包含尚未裁决的 ThreatSignal、只有匹配分数而没有发现身份与结论字段的裸遥测、执行 PatternScan 的活动或实际 MitigationAction。
      en: Excludes unadjudicated ThreatSignal records, bare telemetry with only a match score and no finding identity or conclusion fields, the PatternScan activity, and the actual MitigationAction.
      ja: 未裁決の ThreatSignal、照合スコアだけで所見 ID と結論項目を持たない生テレメトリ、PatternScan の実行活動、実際の MitigationAction は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: Guardrails DetectPromptInjectionValidator 的 on_fail、Azure shieldPrompt attackDetected、OpenAI moderation flagged 与 NeMo rail 拒绝应映射为 DefenseFinding，再触发 MitigationAction；不要把 tripwire 与 finding 混为同一 ID。
    en: Map Guardrails DetectPromptInjectionValidator on_fail, Azure shieldPrompt attackDetected, OpenAI moderation flagged, and NeMo rail refusal to DefenseFinding before MitigationAction; do not merge tripwire and finding IDs.
    ja: Guardrails on_fail、Azure attackDetected、OpenAI flagged、NeMo rail 拒否を DefenseFinding に写像し MitigationAction へ。tripwire ID と finding ID を混ぜません。
  typical_input:
    - description: Aggregated scan and signal evidence.
      format: InjectionScanResult + ThreatSignal refs → finding synthesis
      source_claims:
        - claim-defensefinding-design
  typical_output:
    - description: Dispositionable finding record.
      format: '{"finding_id":"finding/agentsentry-771","confidence":0.93,"risk_level":"critical","disposition":"pending-quarantine"}'
      source_claims:
        - claim-defensefinding-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - finding_id
  fields:
    - id: risk_level
      labels:
        zh: 风险等级
        en: Risk level
        ja: リスクレベル
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 表示防御发现经审查后的严重程度。
        en: Represents the reviewed severity of a defense finding.
        ja: 防御所見のレビュー済み重大度を表します。
      allowed_values:
        - id: RiskCritical
          value: critical
          labels:
            zh: 严重
            en: Critical
            ja: 重大
          definitions:
            en: risk level "risk critical" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 严重风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 重大リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          source_claims:
            - claim-defensefinding-design
        - id: RiskHigh
          value: high
          labels:
            zh: 高
            en: High
            ja: 高
          definitions:
            en: risk level "risk high" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 高风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 高リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          source_claims:
            - claim-defensefinding-design
        - id: RiskLow
          value: low
          labels:
            zh: 低
            en: Low
            ja: 低
          definitions:
            en: risk level "risk low" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 低风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 低リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          source_claims:
            - claim-defensefinding-design
        - id: RiskMedium
          value: medium
          labels:
            zh: 中
            en: Medium
            ja: 中
          definitions:
            en: risk level "risk medium" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 中风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 中リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          source_claims:
            - claim-defensefinding-design
      pattern: null
      example_value: critical
      source_claims:
        - claim-defensefinding-design
    - id: finding_id
      labels:
        zh: 防御发现标识
        en: defense-finding ID
        ja: 防御所見 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次扫描或污点分析形成的安全发现。
        en: Stable identifier for one security finding formed by scanning or taint analysis.
        ja: スキャンまたは汚染解析により形成された一つのセキュリティ所見を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: defense-finding-001
      source_claims:
        - claim-defensefinding-design
    - id: confidence
      labels:
        zh: 置信度
        en: confidence
        ja: 信頼度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测活动对该发现正确性的零到一置信度。
        en: Zero-to-one confidence assigned by the detection activity to the finding.
        ja: 検出活動が所見の正しさに割り当てたゼロから一の信頼度です。
      allowed_values: []
      pattern: null
      example_value: 0.94
      source_claims:
        - claim-defensefinding-design
    - id: risk_score
      labels:
        zh: 风险分数
        en: risk score
        ja: リスクスコア
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 结合影响和可能性得到的零到一风险分数。
        en: Zero-to-one risk score combining impact and likelihood.
        ja: 影響と可能性を組み合わせたゼロから一のリスクスコアです。
      allowed_values: []
      pattern: null
      example_value: 0.88
      source_claims:
        - claim-defensefinding-design
    - id: observed_at
      labels:
        zh: 发现时间
        en: observed at
        ja: 検出時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测活动确认该发现的 UTC 时间。
        en: UTC instant at which the detection activity established the finding.
        ja: 検出活動が所見を確立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T04:10:00.000Z
      source_claims:
        - claim-defensefinding-design
  constraints:
    - id: defense-finding-normalized-scores
      severity: error
      expression_language: plain
      expression: confidence and risk_score are numbers between zero and one inclusive
      explanations:
        zh: 置信度和风险分数必须位于零到一闭区间。
        en: confidence and risk_score are numbers between zero and one inclusive.
        ja: confidence と risk_score はゼロ以上一以下の数値です。
      source_claims:
        - claim-defensefinding-design
  required_relation_constraints: []
