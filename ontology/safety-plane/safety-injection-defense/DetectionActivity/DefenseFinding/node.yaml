  - id: DefenseFinding-copilot-cve
    labels:
      zh: Copilot CVE 配置投毒发现
      en: Copilot CVE config-poisoning finding
      ja: Copilot CVE config poisoning finding
    descriptions:
      zh: finding/cve-2025-53773 绑定恶意 .vscode/settings.json 与 Prompt Shield attackDetected。
      en: finding/cve-2025-53773 binds malicious .vscode/settings.json with Prompt Shield attackDetected.
      ja: finding/cve-2025-53773 が悪意 settings.json と Prompt Shield attackDetected を結合。
    example_source:
      product: CVE-2025-53773
      url: https://www.getmaxim.ai/articles/prompt-injection-defense-for-production-ai-agents-a-complete-2026-guide/
      version: CVSS 9.6
    field_values:
      finding_id: finding/cve-2025-53773
      risk_score: 0.96
      risk_level: critical
    related_node_ids:
      - DefenseFinding
      - ResourceContentPoisoning
      - QuarantineAction
    related_relation_ids: []
    source_claims:
      - claim-defensefinding-design
  - id: DefenseFinding-mcp-poison-118
    labels:
      zh: MCP 工具描述投毒发现
      en: MCP tool-description poisoning finding
      ja: MCP tool description poisoning finding
    descriptions:
      zh: finding/mcp-118 来自 Guardrails exception 与 Bifrost block 双边界，disposition 在 rescan/118 前保持 open。
      en: finding/mcp-118 from dual Guardrails exception and Bifrost block boundaries; disposition stays open until rescan/118.
      ja: finding/mcp-118 は Guardrails exception と Bifrost block 二重 boundary 由来。
    example_source:
      product: MCP tool poisoning (2026)
      url: https://www.mdpi.com/2078-2489/17/1/54
      version: 30+ CVEs
    field_values:
      finding_id: finding/mcp-118
      confidence: 0.91
      disposition: open
    related_node_ids:
      - DefenseFinding
      - PoisonedToolDescription
    related_relation_ids: []
    source_claims:
      - claim-defensefinding-design
  - id: DefenseFinding-reasalign-42
    labels:
      zh: ReasAlign 越权冲突发现
      en: ReasAlign privilege conflict finding
      ja: ReasAlign privilege conflict finding
    descriptions:
      zh: finding/reasalign-42 把 privilege-escalation 模式提升为 critical，utility 94.6% / ASR 3.6% 作为审查元数据。
      en: finding/reasalign-42 elevates privilege-escalation pattern to critical with 94.6% utility / 3.6% ASR review metadata.
      ja: finding/reasalign-42 が privilege-escalation を critical に昇格。
    example_source:
      product: ReasAlign
      url: https://arxiv.org/abs/2601.10173
      version: 2026 metrics
    field_values:
      finding_id: finding/reasalign-42
      confidence: 0.89
      risk_level: high
    related_node_ids:
      - DefenseFinding
      - InstructionConflict
    related_relation_ids: []
    source_claims:
      - claim-defensefinding-design
parent_relation:
  id: DetectionActivity-produces-DefenseFinding
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生防御发现
    en: produces defense finding
    ja: 防御所見を生成する
  definitions:
    zh: 一次 DetectionActivity 在完成对明确对象的安全求值后，产生一项记录对象、风险类别、证据、置信度与处置状态的 DefenseFinding；该边不表示每次检测都必须发现威胁。
    en: A DetectionActivity produces a DefenseFinding when its completed safety evaluation records a subject, risk class, evidence, confidence, and disposition state; the edge does not assert that every detection must find a threat.
    ja: DetectionActivity が対象を安全評価し、対象・リスク分類・証拠・確信度・処置状態を記録したとき DefenseFinding を生成します。すべての検出が脅威を発見するとは主張しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 检测可能产生零项、一项或多项发现，数量取决于实际求值结果。
    en: A detection may produce zero, one, or several findings according to its actual evaluation results.
    ja: 検出が生成する所見数は実際の評価結果によりゼロ、一件、複数となり得ます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由检测活动产生
      en: produced by detection activity
      ja: 検出活動により生成される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-defensefinding-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
