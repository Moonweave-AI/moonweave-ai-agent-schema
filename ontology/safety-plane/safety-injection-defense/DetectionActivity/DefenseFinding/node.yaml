parent_relation:
  id: DetectionActivity-produces-DefenseFinding
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生防御发现
    en: produces defense finding
    ja: 防御所見を生成する
  definitions:
    zh: 一次 DetectionActivity 在完成对明确对象的安全求值后，产生一项记录对象、风险类别、证据、置信度与处置状态的 DefenseFinding；该边不表示每次检测都必须发现威胁。
    en: A DetectionActivity produces a DefenseFinding when its completed safety evaluation records a subject, risk class, evidence, confidence, and disposition state; the edge does not assert that every detection must find a threat.
    ja: DetectionActivity が対象を安全評価し、対象・リスク分類・証拠・確信度・処置状態を記録したとき DefenseFinding を生成します。すべての検出が脅威を発見するとは主張しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 检测可能产生零项、一项或多项发现，数量取决于实际求值结果。
    en: A detection may produce zero, one, or several findings according to its actual evaluation results.
    ja: 検出が生成する所見数は実際の評価結果によりゼロ、一件、複数となり得ます。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由检测活动产生
      en: produced by detection activity
      ja: 検出活動により生成される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DetectionActivity-produces-DefenseFinding-example-positive-001
      labels:
        zh: 扫描产生可处置发现
        en: scan produces an actionable finding
        ja: 走査が処置可能な所見を生成する
      descriptions:
        zh: precheck-204 对工具输出的字符 118–176 完成求值，记录 injection 类别、匹配证据、0.93 置信度和待隔离状态，形成 finding-204。
        en: precheck-204 evaluates characters 118–176 of a tool result and records the injection class, matched evidence, confidence 0.93, and pending-quarantine state as finding-204.
        ja: precheck-204 はツール結果の文字 118–176 を評価し、注入分類、照合証拠、確信度 0.93、隔離待ち状態を finding-204 に記録します。
      field_values: {}
      related_node_ids:
        - DetectionActivity
        - DefenseFinding
      related_relation_ids:
        - DetectionActivity-produces-DefenseFinding

        en: Assert precheck-204 produces finding-204 while retaining distinct identities for the detection occurrence and conclusion record.
        ja: precheck-204 produces finding-204 を記録し、検出発生と結論記録の別個の同一性を保ちます。

        en: The finding cites its producing detection, evaluated subject, and locatable evidence, which is sufficient to establish the output relation.
        ja: 所見が生成元検出、評価対象、位置特定可能な証拠を参照し、出力関係を立証できます。
      source_claims:
        - claim-defense-finding-014
    - id: DetectionActivity-produces-DefenseFinding-example-boundary-001
      labels:
        zh: 仅有检测配置不构成发现
        en: detection configuration alone is not a finding
        ja: 検出設定だけでは所見にならない
      descriptions:
        zh: precheck-205 仅加载了规则集但尚未检查任何对象，也没有结果、证据或结论记录。
        en: precheck-205 has loaded a ruleset but has not evaluated any subject and has emitted no result, evidence, or conclusion record.
        ja: precheck-205 は規則集合を読み込んだだけで対象を評価しておらず、結果・証拠・結論記録を出力していません。
      field_values: {}
      related_node_ids:
        - DetectionActivity
        - DefenseFinding
      related_relation_ids:
        - DetectionActivity-produces-DefenseFinding

        en: Do not assert produces; loading rules does not mean that a finding exists.
        ja: produces 辺を作成しません。規則読込は所見生成を意味しません。

        en: No completed evaluation or identifiable DefenseFinding exists, so the relation's truth conditions are unmet.
        ja: 完了評価と識別可能な DefenseFinding がなく、関係成立条件を満たしません。
      source_claims:
        - claim-defense-finding-015
  source_claims:
    - claim-defense-finding-016
