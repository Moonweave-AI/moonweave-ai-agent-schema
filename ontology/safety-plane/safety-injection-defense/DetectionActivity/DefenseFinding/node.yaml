source_claims:
  - id: claim-defense-finding-001
    source: eng-security-mcp-nsa-2026
    supports: NSA requires traceable invocation telemetry, identities, exact parameters, result hashes, and anomaly detection; Moonweave uses those evidence-bearing records as inputs to a separately adjudicated DefenseFinding.
    locator: Recommendations > Instrument for logging and detection, pp. 12–13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-defense-finding-002
    source: eng-security-cvss-v4
    supports: FIRST CVSS v4.0 Table 22 directly names Critical as the qualitative rating for scores 9.0 through 10.0. Moonweave reuses the token critical as the highest DefenseFinding risk level, but the extension from scored software vulnerabilities to agent, protocol, tool, network, or data-boundary findings is a Moonweave design inference; a DefenseFinding is not thereby a CVSS vulnerability assessment.
    locator: "Qualitative Severity Rating Scale > Table 22: Critical (9.0-10.0)"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-defense-finding-003
    source: eng-security-cvss-v4
    supports: FIRST CVSS v4.0 Table 22 directly names High as the qualitative rating for scores 7.0 through 8.9. Moonweave reuses the token high for a DefenseFinding whose reviewed risk is below critical but still demands priority handling; applying that vocabulary outside CVSS-scored vulnerabilities is an explicit Moonweave design inference.
    locator: "Qualitative Severity Rating Scale > Table 22: High (7.0-8.9)"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-defense-finding-004
    source: eng-security-cvss-v4
    supports: FIRST CVSS v4.0 Table 22 directly names Low as the qualitative rating for scores 0.1 through 3.9. Moonweave reuses the token low for a non-zero DefenseFinding risk level; the ontology does not import CVSS score thresholds or claim that the finding is a software vulnerability.
    locator: "Qualitative Severity Rating Scale > Table 22: Low (0.1-3.9)"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-defense-finding-005
    source: eng-security-cvss-v4
    supports: FIRST CVSS v4.0 Table 22 directly names Medium as the qualitative rating for scores 4.0 through 6.9. Moonweave reuses the token medium as the intermediate DefenseFinding level while keeping its own risk model; the imported vocabulary does not turn a DefenseFinding into a CVSS vector or score.
    locator: "Qualitative Severity Rating Scale > Table 22: Medium (4.0-6.9)"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-defense-finding-006
    source: eng-security-cvss-v4
    supports: "FIRST CVSS v4.0 defines a four-token non-zero qualitative severity scale: Low, Medium, High, and Critical. Moonweave adopts those tokens for the reviewed severity of DefenseFinding while deliberately not importing CVSS's vulnerability-only score calculation, vector, or numeric thresholds; the reuse outside software-vulnerability scoring is a Moonweave design inference."
    locator: Qualitative Severity Rating Scale > Table 22
    evidence_kind: design-inference
    confidence: high
