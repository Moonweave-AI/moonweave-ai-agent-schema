schema: moonweave.ai/ontology-node/v1
id: DefenseFinding
kind: concept
status: accepted
labels:
  zh: 防御发现
  en: defense finding
  ja: 防御所見
semantics:
  short_definition:
    zh: 对已观察安全证据作出的、可供策略处置的结论记录。
    en: An evidence-backed safety conclusion that can be dispositioned by policy.
    ja: 観測した安全証拠に基づき、方針で処置できる結論記録。
  definition:
    zh: 防御发现是一种信息记录：它把检测证据归纳为对特定对象、风险类型、置信度和严重度的可处置安全结论。它不是检测活动、尚未形成结论的裸匹配遥测，也不自行执行阻断；满足同一结论字段的一次运行扫描结果可以成为其下位类。
    en: A DefenseFinding is an information record that synthesizes detection evidence into a dispositionable safety conclusion about a stated subject, risk class, confidence, and severity. It is neither the detection activity nor bare match telemetry that has not formed a conclusion, and it does not itself execute a block; a per-run scan result that satisfies the same conclusion fields may specialize it.
    ja: 防御所見は、検出証拠を、対象・リスク種別・確信度・重大度を持つ処置可能な安全結論へ統合する情報記録です。検出活動や結論未形成の生一致テレメトリではなく、自ら遮断を実行もしません。同じ結論項目を満たす一回の走査結果はその下位型になれます。
  why_needed:
    zh: 扫描器、策略和人工审查需要引用同一个稳定结论，否则原始信号会被误当作已经裁决的风险。
    en: Scanners, policy, and human review need a stable conclusion to cite; otherwise raw signals are mistaken for adjudicated risk.
    ja: 走査器・方針・人手審査が同じ安定した結論を参照できなければ、生の信号が裁決済みリスクと誤認されます。
  includes:
    - zh: 包含对象标识、证据引用、风险类别、置信度、严重度和处置状态均明确的发现记录。
      en: Includes findings with an identified subject, cited evidence, risk class, confidence, severity, and disposition state.
      ja: 対象、証拠参照、リスク種別、確信度、重大度、処置状態が明示された所見を含みます。
  excludes:
    - zh: 不包含尚未裁决的 ThreatSignal、只有匹配分数而没有发现身份与结论字段的裸遥测、执行 PatternScan 的活动或实际 MitigationAction。
      en: Excludes unadjudicated ThreatSignal records, bare telemetry with only a match score and no finding identity or conclusion fields, the PatternScan activity, and the actual MitigationAction.
      ja: 未裁決の ThreatSignal、照合スコアだけで所見 ID と結論項目を持たない生テレメトリ、PatternScan の実行活動、実際の MitigationAction は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - finding_id
  fields:
    - id: risk_level
      labels:
        zh: 风险等级
        en: Risk level
        ja: リスクレベル
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 表示防御发现经审查后的严重程度。
        en: Represents the reviewed severity of a defense finding.
        ja: 防御所見のレビュー済み重大度を表します。
      allowed_values:
        - id: RiskCritical
          value: critical
          labels:
            zh: 严重
            en: Critical
            ja: 重大
          definitions:
            en: risk level "risk critical" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 严重风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 重大リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          status: accepted
          source_claims:
            - claim-defense-finding-002
        - id: RiskHigh
          value: high
          labels:
            zh: 高
            en: High
            ja: 高
          definitions:
            en: risk level "risk high" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 高风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 高リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          status: accepted
          source_claims:
            - claim-defense-finding-003
        - id: RiskLow
          value: low
          labels:
            zh: 低
            en: Low
            ja: 低
          definitions:
            en: risk level "risk low" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 低风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 低リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          status: accepted
          source_claims:
            - claim-defense-finding-004
        - id: RiskMedium
          value: medium
          labels:
            zh: 中
            en: Medium
            ja: 中
          definitions:
            en: risk level "risk medium" used to rank safety, protocol, tool, network, or data-boundary exposure.
            zh: 中风险是风险等级个体，用于表达安全、协议、工具、网络或数据边界暴露强度。
            ja: 中リスクはリスクレベル個体で、安全、プロトコル、ツール、ネットワーク、データ境界の露出強度を表します。
          status: accepted
          source_claims:
            - claim-defense-finding-005
      pattern: null
      example_value: critical
      source_claims:
        - claim-defense-finding-006
    - id: finding_id
      labels:
        zh: 防御发现标识
        en: defense-finding ID
        ja: 防御所見 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次扫描或污点分析形成的安全发现。
        en: Stable identifier for one security finding formed by scanning or taint analysis.
        ja: スキャンまたは汚染解析により形成された一つのセキュリティ所見を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: defense-finding-001
      source_claims:
        - claim-defense-finding-007
    - id: confidence
      labels:
        zh: 置信度
        en: confidence
        ja: 信頼度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测活动对该发现正确性的零到一置信度。
        en: Zero-to-one confidence assigned by the detection activity to the finding.
        ja: 検出活動が所見の正しさに割り当てたゼロから一の信頼度です。
      allowed_values: []
      pattern: null
      example_value: 0.94
      source_claims:
        - claim-defense-finding-008
    - id: risk_score
      labels:
        zh: 风险分数
        en: risk score
        ja: リスクスコア
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 结合影响和可能性得到的零到一风险分数。
        en: Zero-to-one risk score combining impact and likelihood.
        ja: 影響と可能性を組み合わせたゼロから一のリスクスコアです。
      allowed_values: []
      pattern: null
      example_value: 0.88
      source_claims:
        - claim-defense-finding-009
    - id: observed_at
      labels:
        zh: 发现时间
        en: observed at
        ja: 検出時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测活动确认该发现的 UTC 时间。
        en: UTC instant at which the detection activity established the finding.
        ja: 検出活動が所見を確立した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T04:10:00.000Z
      source_claims:
        - claim-defense-finding-010
  constraints:
    - id: defense-finding-normalized-scores
      severity: error
      expression_language: plain
      expression: confidence and risk_score are numbers between zero and one inclusive
      explanations:
        zh: 置信度和风险分数必须位于零到一闭区间。
        en: confidence and risk_score are numbers between zero and one inclusive.
        ja: confidence と risk_score はゼロ以上一以下の数値です。
      source_claims:
        - claim-defense-finding-011
  required_relation_constraints: []
