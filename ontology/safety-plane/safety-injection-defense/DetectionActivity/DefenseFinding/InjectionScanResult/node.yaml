schema: moonweave.ai/ontology-node/v1
id: InjectionScanResult
kind: concept
labels:
  zh: 注入扫描结果
  en: injection scan result
  ja: 注入走査結果
semantics:
  short_definition:
    zh: 一次 PatternScan 对候选内容模式求值的逐次结果记录。
    en: A per-run result record from PatternScan pattern evaluation over candidate content.
    ja: PatternScan が候補内容を pattern 評価した一回分の結果記録。
  definition:
    zh: InjectionScanResult 记录某次 PatternScan 的命中/未命中、匹配签名版本、偏移、分数与受检对象 digest；它是 DetectionActivity 的产物而非 DefenseFinding。Azure documentsAnalysis[] 与 Guardrails validate 输出应映射为此实体后再 supports DefenseFinding。
    en: InjectionScanResult records match/no-match, matched signature revision, offsets, scores, and subject digest from one PatternScan; it is a DetectionActivity product, not a DefenseFinding. Azure documentsAnalysis[] and Guardrails validate outputs should map here before supporting DefenseFinding.
    ja: InjectionScanResult は一回 PatternScan の match/no-match、matched signature revision、offset、score、subject digest を記録し DetectionActivity 産物で DefenseFinding ではありません。Azure documentsAnalysis[] と Guardrails validate 出力はここへ写像後 DefenseFinding を supports します。
  why_needed:
    zh: 没有逐次扫描结果，无法解释同一 chunk 在不同 ruleset 下为何结论不同。
    en: Without per-run scan results, the same chunk cannot explain different outcomes under different rulesets.
    ja: per-run scan result がなければ同一 chunk の ruleset 差異を説明できません。
  includes:
    - zh: 包含明确 scan_id、受检对象、检测器版本、证据位置、分数和结果状态的扫描发现。
      en: Includes scan findings with a scan ID, inspected subject, detector version, evidence location, score, and result state.
      ja: scan ID、対象、検出器版、証拠位置、スコア、結果状態を持つ走査所見を含みます。
  excludes:
    - zh: 不包含跨多次扫描归纳的风险结论、扫描执行活动或隔离动作。
      en: Excludes conclusions aggregated across runs, the scan execution activity, and quarantine actions.
      ja: 複数走査を統合した結論、走査実行活動、隔離動作は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: shieldPrompt 的 documentsAnalysis[] 每项与 Guardrails validation 响应应落成 InjectionScanResult，保留 scan_id 与 signature revision。
    en: Each shieldPrompt documentsAnalysis[] entry and Guardrails validation response should become InjectionScanResult retaining scan_id and signature revision.
    ja: shieldPrompt documentsAnalysis[] 各 entry と Guardrails validation 応答を scan_id/signature revision 付き InjectionScanResult に。
  typical_input:
    - description: PatternScan completion payload.
      format: '{"scan_id":"scan-31","matches":[{"sig":"SIG-8","offset":118,"score":0.71}]}'
      source_claims:
        - claim-injectionscanresult-design
  typical_output:
    - description: Result supporting finding elevation.
      format: InjectionScanResult-supports-DefenseFinding edge with evidence refs
      source_claims:
        - claim-injectionscanresult-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: InjectionScanResult-azure-docs
    labels:
      zh: Azure 文档分析扫描结果
      en: Azure document analysis scan result
      ja: Azure document analysis scan result
    descriptions:
      zh: scan/shield-rag-5 对五份 chunk 产生 result/shield-rag-5 与 attackDetected 布尔值。
      en: scan/shield-rag-5 produces result/shield-rag-5 with attackDetected booleans for five chunks.
      ja: scan/shield-rag-5 が 5 chunk の attackDetected を result に記録。
    example_source:
      product: Azure Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      version: documentsAnalysis
    field_values:
      result_id: result/shield-rag-5
      scan_ref: scan/shield-rag-5
      match_count: 5
    related_node_ids:
      - InjectionScanResult
      - PatternScan
      - DefenseFinding
    related_relation_ids:
      - PatternScan-produces-InjectionScanResult
    source_claims:
      - claim-injectionscanresult-design
  - id: InjectionScanResult-guardrails
    labels:
      zh: Guardrails 注入检测扫描结果
      en: Guardrails injection scan result
      ja: Guardrails injection scan result
    descriptions:
      zh: Guard.validate 抛出 DetectPromptInjectionValidator 命中，result/guard-118 记录 validator 版本。
      en: Guard.validate raises DetectPromptInjectionValidator hit; result/guard-118 records validator version.
      ja: Guard.validate が validator hit を result/guard-118 に記録。
    example_source:
      product: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      version: DetectPromptInjectionValidator
    field_values:
      result_id: result/guard-118
      matched: true
      score: 0.91
    related_node_ids:
      - InjectionScanResult
      - PatternScan
    related_relation_ids: []
    source_claims:
      - claim-injectionscanresult-design
  - id: InjectionScanResult-owasp-rag
    labels:
      zh: OWASP RAG 投毒扫描结果
      en: OWASP RAG poisoning scan result
      ja: OWASP RAG poisoning scan result
    descriptions:
      zh: scan/rag-poison-v2 对五文档语料命中 indirect-instruction 签名，result/owasp-rag-5doc 供 finding 提升。
      en: scan/rag-poison-v2 matches indirect-instruction signatures on five-doc corpus; result/owasp-rag-5doc feeds finding elevation.
      ja: scan/rag-poison-v2 が 5 doc corpus で indirect-instruction signature に一致。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: LLM01 RAG
    field_values:
      result_id: result/owasp-rag-5doc
      match_count: 5
    related_node_ids:
      - InjectionScanResult
      - PoisonedRetrievedChunk
    related_relation_ids: []
    source_claims:
      - claim-injectionscanresult-design
  - id: InjectionScanResult-agentsentry
    labels:
      zh: AgentSentry 工具输出扫描结果
      en: AgentSentry tool-output scan result
      ja: AgentSentry tool-output scan result
    descriptions:
      zh: scan/agentsentry-771 在 tool-result://R-5 字符 220–310 命中 hidden instruction 模式。
      en: scan/agentsentry-771 matches hidden-instruction pattern at chars 220–310 in tool-result://R-5.
      ja: scan/agentsentry-771 が tool-result://R-5 220–310 で hidden instruction pattern に一致。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      result_id: result/agentsentry-771
      offset_start: 220
      offset_end: 310
    related_node_ids:
      - InjectionScanResult
      - ThreatSignal
    related_relation_ids: []
    source_claims:
      - claim-injectionscanresult-design
parent_relation:
  id: InjectionScanResult-is_a-DefenseFinding
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 注入扫描结果是一种防御发现；其种差是只表达一次注入检测运行及其匹配范围、检测器版本、分数和判定。
    en: An InjectionScanResult is a DefenseFinding specialized for one injection-detection run, its matched span, detector version, score, and verdict.
    ja: 注入走査結果は、一回の注入検出実行、一致範囲、検出器版、スコア、判定に特化した防御所見です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-injectionscanresult-design
  distinct_fact_rationale:
    zh: InjectionScanResult 满足 DefenseFinding 的完整定义并以人工复核种差进一步收窄；该事实不同于二者之间的操作关联。
    en: InjectionScanResult satisfies the complete definition of DefenseFinding and narrows it by a manually reviewed differentia; this fact is distinct from operational associations between them.
    ja: InjectionScanResult は DefenseFinding の完全定義を満たし、人手審査済み種差で狭められ、両者の操作関連とは別の事実です。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: InjectionScanResult-supports-DefenseFinding
    predicate: supports
    direction: source-to-target
    relation_kind: information
    labels:
      zh: supports
      en: supports
      ja: supports
    definitions:
      zh: 一次扫描范围内的 InjectionScanResult 可作为证据支持更高层、跨结果归并的 DefenseFinding；该关系不承担父类职责。
      en: A run-scoped InjectionScanResult may support a higher-level DefenseFinding that aggregates evidence across results; this relation carries no parent responsibility.
      ja: 一回の InjectionScanResult は複数結果を統合する上位 DefenseFinding の証拠となり得ますが、この関係は親責務を持ちません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_supports
      labels:
        zh: 反向：supports
        en: is target of supports
        ja: 逆方向：supports
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-injectionscanresult-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:DefenseFinding
