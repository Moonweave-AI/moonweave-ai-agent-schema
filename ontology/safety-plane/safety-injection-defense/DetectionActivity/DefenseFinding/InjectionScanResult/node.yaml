schema: moonweave.ai/ontology-node/v1
id: InjectionScanResult
kind: concept
status: accepted
labels:
  zh: 注入扫描结果
  en: injection scan result
  ja: 注入走査結果
semantics:
  short_definition:
    zh: 一次注入检测运行形成的、保留匹配证据与判定值的防御发现。
    en: A defense finding produced by one injection-detection run with matched evidence and detector verdicts.
    ja: 一回の注入検出実行が生成し、一致証拠と判定値を保持する防御所見。
  definition:
    zh: 注入扫描结果是一种 DefenseFinding，专门记录一次检测活动的受检对象、匹配签名或模型判定、证据范围、分数、检测器版本和通过/告警结果。它可以支持更高层的聚合发现，但不是 PatternScan 活动，也不表示缓解已经执行。
    en: An InjectionScanResult is a DefenseFinding specialized for one detection run, recording the inspected subject, matched signature or model verdict, evidence span, score, detector version, and pass-or-alert result. It may support a higher-level aggregated finding, but it is not the PatternScan activity and does not assert that mitigation ran.
    ja: 注入走査結果は、一回の検出実行について、対象、一致署名またはモデル判定、証拠範囲、スコア、検出器版、通過・警告結果を記録する DefenseFinding の特殊化です。上位の集約所見を支持できますが、PatternScan 活動でも緩和実行の主張でもありません。
  why_needed:
    zh: 保留单次检测的可重算证据，避免聚合发现掩盖具体匹配位置和检测器版本。
    en: It preserves recomputable evidence for one run so aggregation does not hide the matched location or detector version.
    ja: 一回の実行の再計算可能な証拠を保持し、集約所見が一致位置や検出器版を隠さないようにします。
  includes:
    - zh: 包含明确 scan_id、受检对象、检测器版本、证据位置、分数和结果状态的扫描发现。
      en: Includes scan findings with a scan ID, inspected subject, detector version, evidence location, score, and result state.
      ja: scan ID、対象、検出器版、証拠位置、スコア、結果状態を持つ走査所見を含みます。
  excludes:
    - zh: 不包含跨多次扫描归纳的风险结论、扫描执行活动或隔离动作。
      en: Excludes conclusions aggregated across runs, the scan execution activity, and quarantine actions.
      ja: 複数走査を統合した結論、走査実行活動、隔離動作は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
