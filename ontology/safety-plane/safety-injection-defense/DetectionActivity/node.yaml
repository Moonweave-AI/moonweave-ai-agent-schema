schema: moonweave.ai/ontology-node/v1
id: DetectionActivity
kind: concept
labels:
  zh: 检测活动
  en: detection activity
  ja: 検出活動
semantics:
  short_definition:
    zh: 一次有执行者、受检对象与检测器版本的可审计安全求值运行。
    en: One auditable safety-evaluation run with actor, inspected subject, and detector version.
    ja: 実行者・検査対象・検出器版を持つ一回の監査可能な安全評価 run。
  definition:
    zh: 检测活动是注入防御域的执行上位概念：记录谁在何时以哪版配置对哪一对象做了何种安全检查，并产出独立的结果或发现记录。OpenAI POST /v1/moderations、Azure shieldPrompt、Guardrails Guard.validate、NeMo Colang input rails 与 Bifrost prompt_injection_detection 的每次边界 adjudication 都应投影为 DetectionActivity，而不是与 ThreatSignal、DefenseFinding 或 MitigationAction 混为同一身份。结果与发现是活动的产物，不是活动的子步骤名称。
    en: "DetectionActivity is the execution genus in injection defense: it records who performed which safety check on which subject under which configuration version and when, emitting separate result or finding records. Each boundary adjudication from OpenAI POST /v1/moderations, Azure shieldPrompt, Guardrails Guard.validate, NeMo Colang input rails, or Bifrost prompt_injection_detection should project to a DetectionActivity rather than sharing identity with ThreatSignal, DefenseFinding, or MitigationAction. Results and findings are products of the activity, not step names within it."
    ja: DetectionActivity は注入防御 domain の実行上位概念で、誰がいつどの configuration 版でどの subject にどの安全検査を行い独立 result/finding を出力したかを記録します。OpenAI moderations、Azure shieldPrompt、Guardrails Guard.validate、NeMo input rails、Bifrost prompt_injection_detection の各 boundary adjudication は ThreatSignal/DefenseFinding/MitigationAction と同一 identity にせず DetectionActivity へ投影します。
  why_needed:
    zh: 若只保留扫描分数而不记录执行身份，Agent 无法在 Copilot CVE-2025-53773 或 MCP 工具投毒复检时证明用了哪版检测器、检查了哪个对象。
    en: Without execution identity alongside scores, agents cannot prove which detector version inspected which subject during Copilot CVE-2025-53773 or MCP tool-poisoning rescans.
    ja: score だけ残し execution identity を欠くと、Copilot CVE-2025-53773 や MCP tool poisoning rescan でどの detector 版がどの subject を検査したか証明できません。
  includes:
    - zh: 包含有可追踪受检对象、检测器版本、执行时间和输出引用的检查运行。
      en: Includes check runs with a traceable subject, detector version, execution time, and output reference.
      ja: 追跡可能な対象、検出器版、実行時刻、出力参照を持つ検査実行を含みます。
  excludes:
    - zh: 不包含静态 InjectionSignature、结果记录或未实际执行的安全策略声明。
      en: Excludes static InjectionSignature specifications, result records, and safety policies that were not executed.
      ja: 静的な InjectionSignature、結果記録、実行されていない安全方針宣言は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 生产注入防御把每次边界 adjudication 映射为 DetectionActivity：入口 OpenAI Moderation 与 Azure Prompt Shield → 工具输出 PatternScan → NeMo/Guardrails 流内 rail → 执行前 PreExecutionSafetyCheck。Moonweave 保留 detection_activity_id、actor_ref、configuration_ref 与 result_record_ref，支持 AgentSentry 式因果重放。
    en: "Production injection defense maps each boundary adjudication to DetectionActivity: ingress OpenAI Moderation and Azure Prompt Shield → tool-output PatternScan → in-flow NeMo/Guardrails rails → pre-execution PreExecutionSafetyCheck. Moonweave retains detection_activity_id, actor_ref, configuration_ref, and result_record_ref for AgentSentry-style causal replay."
    ja: 本番注入防御は各 boundary adjudication を DetectionActivity に写像：入口 OpenAI Moderation/Azure Prompt Shield → tool output PatternScan → NeMo/Guardrails flow rail → 実行前 PreExecutionSafetyCheck。detection_activity_id/actor_ref/configuration_ref/result_record_ref を保持し AgentSentry 式 causal replay を支援。
  typical_input:
    - description: OpenAI Moderation at user ingress.
      format: POST /v1/moderations {"model":"omni-moderation-latest","input":"..."}
      source_claims:
        - claim-detection-activity-design
    - description: Azure Prompt Shield on RAG documents.
      format: POST /contentsafety/text:shieldPrompt {"userPrompt":"...","documents":[{"text":"..."}]}
      source_claims:
        - claim-detection-activity-design
  typical_output:
    - description: Moonweave DetectionActivity record.
      format: '{"detection_activity_id":"detect/agentsentry-771","actor_ref":"detector:azure-shield@3","result_record_ref":"finding/agentsentry-771"}'
      source_claims:
        - claim-detection-activity-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - detection_activity_id
  fields:
    - id: detection_activity_id
      labels:
        zh: 检测活动标识
        en: detection-activity ID
        ja: 検出活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经实际运行的检测；同一对象按不同配置重跑时形成新的活动记录。
        en: Stably identifies one detection run that actually occurred; rerunning the same subject under another configuration creates a new activity record.
        ja: 実際に行われた一回の検出 run を安定識別し、同じ対象を別 configuration で再実行すれば新しい活動記録になります。
      allowed_values: []
      pattern: null
      example_value: detection-activity:TP-9@10:14
      source_claims:
        - claim-detection-activity-design
    - id: actor_ref
      labels:
        zh: 检测执行者引用
        en: detector actor reference
        ja: 検出実行者参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行检查的检测器、服务或人工审查者实例，而不是只引用方法名称。
        en: References the detector, service, or human reviewer instance that performed the check, rather than only naming a method.
        ja: 検査を実行した detector、service、human reviewer instance を参照し、method 名だけでは代用しません。
      allowed_values: []
      pattern: null
      example_value: detector:guard-v12
      source_claims:
        - claim-detection-activity-design
    - id: inspected_subject_ref
      labels:
        zh: 受检对象引用
        en: inspected subject reference
        ja: 検査対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被本次运行读取的确切内容、计划、工具输出或传播路径版本，使结果能够回到原始对象。
        en: References the exact content, plan, tool output, or propagation-path version read by this run so the result can be traced to its subject.
        ja: この run が読み取った content、plan、tool output、propagation path の正確な版を参照し、結果を元対象へ追跡可能にします。
      allowed_values: []
      pattern: null
      example_value: tool-plan:TP-9
      source_claims:
        - claim-detection-activity-design
    - id: method_ref
      labels:
        zh: 检测方法引用
        en: detection method reference
        ja: 検出方法参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动采用的可复用检测方法，例如执行前计划检查、签名扫描或语义分类；方法本身不是运行实例。
        en: References the reusable method applied by this activity, such as pre-execution plan checking, signature scanning, or semantic classification; the method is not the run itself.
        ja: pre-execution plan check、signature scan、semantic classification など、この活動が使った reusable method を参照し、method 自体を run と混同しません。
      allowed_values: []
      pattern: null
      example_value: detection-method:pre-execution-plan-check
      source_claims:
        - claim-detection-activity-design
    - id: configuration_ref
      labels:
        zh: 检测配置引用
        en: detection configuration reference
        ja: 検出設定参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该运行实际使用的规则集、模型、阈值和例外配置的具体版本，避免把后续更新误当作当时依据。
        en: References the exact ruleset, model, threshold, and exception configuration used by the run so later updates are not mistaken for its original basis.
        ja: run が実際に使った ruleset、model、threshold、exception configuration の具体的版を参照し、後の更新と混同しません。
      allowed_values: []
      pattern: null
      example_value: guard-ruleset@12
      source_claims:
        - claim-detection-activity-design
    - id: started_at
      labels:
        zh: 检测开始时间
        en: detection start time
        ja: 検出開始時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录检测器开始读取受检对象的时间，用于证明检查发生在受保护动作或披露之前。
        en: Records when the detector began reading the subject, supporting proof that the check occurred before a protected action or disclosure.
        ja: detector が対象を読み始めた時刻を記録し、保護対象 action または disclosure より前に検査したことを示します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:14:00Z
      source_claims:
        - claim-detection-activity-design
    - id: ended_at
      labels:
        zh: 检测结束时间
        en: detection end time
        ja: 検出終了時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在活动完成或终止后记录结束时间；尚在运行的检测可以暂时省略，但不能早于开始时间。
        en: Records the end after the activity completes or terminates; an in-progress run may omit it, but it can never precede the start.
        ja: 活動の完了または終了後に記録し、実行中なら省略できますが started_at より前にはできません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:14:01Z
      source_claims:
        - claim-detection-activity-design
    - id: result_record_ref
      labels:
        zh: 检测结果记录引用
        en: detection result-record reference
        ja: 検出結果記録参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该活动产生的独立结果记录；结果可以包含命中、未命中、分数和建议动作，但不与活动身份混为一体。
        en: References the separate result produced by the activity; it may contain matches, non-matches, scores, and proposed action but remains distinct from the activity identity.
        ja: 活動が生成した独立 result record を参照し、match、non-match、score、proposed action を含めても活動 identity とは区別します。
      allowed_values: []
      pattern: null
      example_value: safety-result:SR-9
      source_claims:
        - claim-detection-activity-design
  constraints:
    - id: detection-activity-valid-time-interval
      severity: error
      expression_language: plain
      expression: ended_at IS NULL OR ended_at >= started_at
      explanations:
        zh: 已结束的检测必须形成有效时间区间；结束时间不能早于检测开始时间。
        en: A completed detection must form a valid time interval; its end cannot precede its start.
        ja: 完了した検出は有効な time interval を形成し、ended_at は started_at より前にできません。
      source_claims:
        - claim-detection-activity-design
  required_relation_constraints: []
examples:
  - id: DetectionActivity-agentsentry-2026
    labels:
      zh: AgentSentry 三回合工具输出诊断
      en: AgentSentry three-turn tool-output diagnosis
      ja: AgentSentry 3 turn ツール出力診断
    descriptions:
      zh: AgentSentry（2026）对 MCP 返回做时序因果诊断，detect/agentsentry-771 在 turn-3 前扫描 tool-result://R-5 并引用 causal-chain 证据。
      en: AgentSentry (2026) performs temporal causal diagnosis on an MCP return; detect/agentsentry-771 scans tool-result://R-5 before turn-3 with causal-chain evidence.
      ja: AgentSentry（2026）が MCP 返却を時系列因果診断し turn-3 前に tool-result://R-5 を scan。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: temporal causal diagnostics
    field_values:
      detection_activity_id: detect/agentsentry-771
      actor_ref: detector:agentsentry@1
      inspected_subject_ref: tool-result://R-5
      configuration_ref: agentsentry-policy@2026
      started_at: 2026-03-14T10:14:00Z
    related_node_ids:
      - DetectionActivity
      - PatternScan
      - ThreatSignal
    related_relation_ids: []
    source_claims:
      - claim-detection-activity-design
  - id: DetectionActivity-azure-shield-rag
    labels:
      zh: Azure Prompt Shield RAG 边界扫描
      en: Azure Prompt Shield RAG boundary scan
      ja: Azure Prompt Shield RAG 境界 scan
    descriptions:
      zh: shieldPrompt 对五份检索文档返回 attackDetected:true；detect/shield-rag-5 记录 configuration_ref=azure-shield@2025 与 documents[] 摘要。
      en: shieldPrompt returns attackDetected:true on five retrieved documents; detect/shield-rag-5 records configuration_ref=azure-shield@2025 and documents[] digests.
      ja: shieldPrompt が 5 retrieval document で attackDetected:true。detect/shield-rag-5 が configuration_ref=azure-shield@2025 を記録。
    example_source:
      product: Azure AI Content Safety
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      version: shieldPrompt API
    field_values:
      detection_activity_id: detect/shield-rag-5
      actor_ref: detector:azure-shield@2025
      method_ref: detection-method:prompt-shield
      started_at: 2026-02-01T09:00:00Z
    related_node_ids:
      - DetectionActivity
      - PatternScan
      - DefenseFinding
    related_relation_ids: []
    source_claims:
      - claim-detection-activity-design
  - id: DetectionActivity-openai-moderation-ingress
    labels:
      zh: OpenAI Moderation 用户入口检测
      en: OpenAI Moderation user ingress detection
      ja: OpenAI Moderation ユーザー入口検出
    descriptions:
      zh: POST /v1/moderations 在 user message 进入 agent 前运行；detect/mod-884 绑定 omni-moderation-latest 与 flagged categories。
      en: POST /v1/moderations runs before user message enters the agent; detect/mod-884 binds omni-moderation-latest and flagged categories.
      ja: POST /v1/moderations が user message 進入前に実行。detect/mod-884 が omni-moderation-latest と flagged categories を束縛。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/moderations/create
      version: POST /v1/moderations
    field_values:
      detection_activity_id: detect/mod-884
      actor_ref: detector:openai-moderation
      configuration_ref: omni-moderation-latest
      started_at: 2026-07-16T10:14:00Z
    related_node_ids:
      - DetectionActivity
    related_relation_ids: []
    source_claims:
      - claim-detection-activity-design
  - id: DetectionActivity-guardrails-validate
    labels:
      zh: Guardrails Guard.validate 边界检测
      en: Guardrails Guard.validate boundary detection
      ja: Guardrails Guard.validate 境界検出
    descriptions:
      zh: Guard().use(DetectPromptInjectionValidator) 对不可信 tool output 执行 validate；detect/guard-118 记录 on_fail=exception 与 validator 版本。
      en: Guard().use(DetectPromptInjectionValidator) validates untrusted tool output; detect/guard-118 records on_fail=exception and validator version.
      ja: DetectPromptInjectionValidator 付き Guard.validate が不可信 tool output を検査。detect/guard-118 が on_fail=exception を記録。
    example_source:
      product: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      version: DetectPromptInjectionValidator
    field_values:
      detection_activity_id: detect/guard-118
      actor_ref: detector:guardrails-hub
      method_ref: detection-method:prompt-injection-validator
      started_at: 2026-01-15T16:40:00Z
    related_node_ids:
      - DetectionActivity
      - PatternScan
    related_relation_ids: []
    source_claims:
      - claim-detection-activity-design
  - id: DetectionActivity-nemo-input-rail
    labels:
      zh: NeMo Colang input rail 流内检测
      en: NeMo Colang input rail in-flow detection
      ja: NeMo Colang input rail フロー内検出
    descriptions:
      zh: Colang 2.0 flow 中 execute input_rails 阻断 hidden instruction；detect/nemo-rail-42 记录 rail 版本与拒绝原因。
      en: Colang 2.0 flow execute input_rails blocks a hidden instruction; detect/nemo-rail-42 records rail version and refusal rationale.
      ja: Colang 2.0 input_rails が hidden instruction を block。detect/nemo-rail-42 が rail 版と拒否理由を記録。
    example_source:
      product: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      version: Colang 2.0 input rails
    field_values:
      detection_activity_id: detect/nemo-rail-42
      actor_ref: detector:nemo-guardrails
      configuration_ref: colang-flow@2.0
      started_at: 2026-04-10T08:00:00Z
    related_node_ids:
      - DetectionActivity
      - PreExecutionSafetyCheck
    related_relation_ids: []
    source_claims:
      - claim-detection-activity-design
parent_relation: null
relations:
  - id: DetectionActivity-evaluates-SourceSinkFlow
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 评估来源—汇点流
      en: evaluates source-sink flow
      ja: 出所―シンクフローを評価する
    definitions:
      zh: DetectionActivity 在其受检对象明确绑定某个 SourceSinkFlow 的标识和版本，并实际检查该流中有证据支持的来源、转换与汇点路径时，评估这份流记录。该边表达一次发生过的检查，不表示每份流都会被检查，也不允许因处于同一会话或图上相邻而推断评估。
      en: A DetectionActivity evaluates a SourceSinkFlow when its inspected-subject reference binds the identified flow and version and the activity actually checks the evidence-backed source, transformations, and sink path. The edge denotes a performed check; it does not mean every flow is evaluated and cannot be inferred from session or graph proximity.
      ja: DetectionActivity は inspected-subject reference が特定 SourceSinkFlow の ID と版を束縛し、証拠付き source・transformation・sink 経路を実際に検査した場合、その flow record を評価します。この辺は実施済み検査を表し、全 flow の評価を意味せず、同一 session や graph 上の近接から推論できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次检测活动可以评估一条或多条已识别流，同一流也可以由不同检测器版本复核，因此不施加全局基数。
      en: One detection activity may evaluate one or more identified flows, and one flow may be re-evaluated by different detector versions, so no universal cardinality applies.
      ja: 一つの detection activity が複数の特定 flow を評価でき、同一 flow を異なる detector version が再評価できるため、一律の基数は課しません。
    inverse_reading:
      predicate: evaluated_by
      labels:
        zh: 被检测活动评估
        en: evaluated by detection activity
        ja: 検出活動により評価される
    conditions:
      - id: DetectionActivity-evaluates-SourceSinkFlow-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the detection run's inspected-subject or input reference names the same flow ID and version and the run checks evidence for the ordered source, transformations, and sink; dashboard co-occurrence or node proximity is insufficient.
        explanations:
          zh: 仅当检测运行的受检对象或输入引用指向同一 flow ID 与版本，并且该运行核查了有序来源、转换和汇点的证据时建立此边；仅在同一仪表板出现或节点相邻均不足以成立。
          en: Assert this edge only when the detection run's inspected-subject or input reference names the same flow ID and version and the run checks evidence for its ordered source, transformations, and sink; dashboard co-occurrence or node proximity is insufficient.
          ja: detection run の inspected-subject または input reference が同じ flow ID と版を指し、有序 source・transformation・sink の証拠を検査した場合だけこの辺を成立させます。同じ dashboard 表示や node proximity では不十分です。
        source_claims:
          - claim-detection-activity-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-detection-activity-design
      - claim-detection-activity-design
    distinct_fact_rationale:
      zh: evaluates 记录哪次检测运行实际检查哪一版路径；流的存在、检测器的存在或二者共现都不能替代这一发生事实。
      en: evaluates records which detection occurrence actually checked which path version; existence or co-occurrence of the flow and detector does not substitute for that performed fact.
      ja: evaluates はどの detection occurrence がどの path version を実際に検査したかを記録し、flow と detector の存在や共起では代替できません。
    layout_role: cross-link
    target: concept:SourceSinkFlow
sources:
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: LLM01 prompt injection taxonomy, indirect injection, and RAG poisoning guidance.
  - id: agentsentry-2026
    title: AgentSentry — temporal causal diagnostics for agent security
    url: https://arxiv.org/abs/2602.22724
    source_type: paper
    relevance: Causal tracing of indirect prompt injection through tool outputs in multi-turn agents.
  - id: reasalign-2026
    title: ReasAlign — reasoning-enhanced safety alignment
    url: https://arxiv.org/abs/2601.10173
    source_type: paper
    relevance: Reasoning-chain safety alignment metrics (utility vs attack success rate).
  - id: nemo-guardrails
    title: NVIDIA NeMo Guardrails
    url: https://docs.nvidia.com/nemo/guardrails/
    source_type: official-doc
    relevance: Colang 2.0 flows and input/output rails for boundary enforcement.
