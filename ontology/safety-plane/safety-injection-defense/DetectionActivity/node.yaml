schema: moonweave.ai/ontology-node/v1
id: DetectionActivity
kind: concept
status: accepted
labels:
  zh: 检测活动
  en: detection activity
  ja: 検出活動
semantics:
  short_definition:
    zh: 在明确时间、对象和检测配置下主动检查安全证据的活动。
    en: An activity that actively examines a stated subject for safety evidence under a recorded detector configuration.
    ja: 記録された検出設定の下で、明示した対象の安全証拠を能動的に調べる活動。
  definition:
    zh: 检测活动是一种有执行者、开始时间、受检对象、方法和配置版本的活动；它读取内容、计划、工具输出或传播路径并产生独立的结果记录。结果和发现是该活动的产物，不是活动的子类或组成步骤名称。
    en: A DetectionActivity is an activity with an actor, start time, inspected subject, method, and configuration version that reads content, plans, tool output, or propagation paths and emits separate result records. Results and findings are products of the activity, not activity subtypes or names for its steps.
    ja: 検出活動は、実行者、開始時刻、検査対象、方法、設定版を持ち、内容・計画・ツール出力・伝播経路を読み、独立した結果記録を生成する活動です。結果や所見は活動の産物であり、活動の下位型や工程名ではありません。
  why_needed:
    zh: 把“做了什么检查”与“得到了什么结论”分开，才能重放检测、比较版本并审计漏检。
    en: Separating the performed check from its conclusion enables replay, detector-version comparison, and false-negative auditing.
    ja: 実施した検査と得られた結論を分離することで、再実行、検出器版の比較、見逃し監査が可能になります。
  includes:
    - zh: 包含有可追踪受检对象、检测器版本、执行时间和输出引用的检查运行。
      en: Includes check runs with a traceable subject, detector version, execution time, and output reference.
      ja: 追跡可能な対象、検出器版、実行時刻、出力参照を持つ検査実行を含みます。
  excludes:
    - zh: 不包含静态 InjectionSignature、结果记录或未实际执行的安全策略声明。
      en: Excludes static InjectionSignature specifications, result records, and safety policies that were not executed.
      ja: 静的な InjectionSignature、結果記録、実行されていない安全方針宣言は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - detection_activity_id
  fields:
    - id: detection_activity_id
      labels:
        zh: 检测活动标识
        en: detection-activity ID
        ja: 検出活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经实际运行的检测；同一对象按不同配置重跑时形成新的活动记录。
        en: Stably identifies one detection run that actually occurred; rerunning the same subject under another configuration creates a new activity record.
        ja: 実際に行われた一回の検出 run を安定識別し、同じ対象を別 configuration で再実行すれば新しい活動記録になります。
      allowed_values: []
      pattern: null
      example_value: detection-activity:TP-9@10:14
      source_claims:
        - claim-detection-activity-002
    - id: actor_ref
      labels:
        zh: 检测执行者引用
        en: detector actor reference
        ja: 検出実行者参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行检查的检测器、服务或人工审查者实例，而不是只引用方法名称。
        en: References the detector, service, or human reviewer instance that performed the check, rather than only naming a method.
        ja: 検査を実行した detector、service、human reviewer instance を参照し、method 名だけでは代用しません。
      allowed_values: []
      pattern: null
      example_value: detector:guard-v12
      source_claims:
        - claim-detection-activity-003
    - id: inspected_subject_ref
      labels:
        zh: 受检对象引用
        en: inspected subject reference
        ja: 検査対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被本次运行读取的确切内容、计划、工具输出或传播路径版本，使结果能够回到原始对象。
        en: References the exact content, plan, tool output, or propagation-path version read by this run so the result can be traced to its subject.
        ja: この run が読み取った content、plan、tool output、propagation path の正確な版を参照し、結果を元対象へ追跡可能にします。
      allowed_values: []
      pattern: null
      example_value: tool-plan:TP-9
      source_claims:
        - claim-detection-activity-004
    - id: method_ref
      labels:
        zh: 检测方法引用
        en: detection method reference
        ja: 検出方法参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次活动采用的可复用检测方法，例如执行前计划检查、签名扫描或语义分类；方法本身不是运行实例。
        en: References the reusable method applied by this activity, such as pre-execution plan checking, signature scanning, or semantic classification; the method is not the run itself.
        ja: pre-execution plan check、signature scan、semantic classification など、この活動が使った reusable method を参照し、method 自体を run と混同しません。
      allowed_values: []
      pattern: null
      example_value: detection-method:pre-execution-plan-check
      source_claims:
        - claim-detection-activity-005
    - id: configuration_ref
      labels:
        zh: 检测配置引用
        en: detection configuration reference
        ja: 検出設定参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该运行实际使用的规则集、模型、阈值和例外配置的具体版本，避免把后续更新误当作当时依据。
        en: References the exact ruleset, model, threshold, and exception configuration used by the run so later updates are not mistaken for its original basis.
        ja: run が実際に使った ruleset、model、threshold、exception configuration の具体的版を参照し、後の更新と混同しません。
      allowed_values: []
      pattern: null
      example_value: guard-ruleset@12
      source_claims:
        - claim-detection-activity-006
    - id: started_at
      labels:
        zh: 检测开始时间
        en: detection start time
        ja: 検出開始時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录检测器开始读取受检对象的时间，用于证明检查发生在受保护动作或披露之前。
        en: Records when the detector began reading the subject, supporting proof that the check occurred before a protected action or disclosure.
        ja: detector が対象を読み始めた時刻を記録し、保護対象 action または disclosure より前に検査したことを示します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:14:00Z
      source_claims:
        - claim-detection-activity-007
    - id: ended_at
      labels:
        zh: 检测结束时间
        en: detection end time
        ja: 検出終了時刻
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在活动完成或终止后记录结束时间；尚在运行的检测可以暂时省略，但不能早于开始时间。
        en: Records the end after the activity completes or terminates; an in-progress run may omit it, but it can never precede the start.
        ja: 活動の完了または終了後に記録し、実行中なら省略できますが started_at より前にはできません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:14:01Z
      source_claims:
        - claim-detection-activity-008
    - id: result_record_ref
      labels:
        zh: 检测结果记录引用
        en: detection result-record reference
        ja: 検出結果記録参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该活动产生的独立结果记录；结果可以包含命中、未命中、分数和建议动作，但不与活动身份混为一体。
        en: References the separate result produced by the activity; it may contain matches, non-matches, scores, and proposed action but remains distinct from the activity identity.
        ja: 活動が生成した独立 result record を参照し、match、non-match、score、proposed action を含めても活動 identity とは区別します。
      allowed_values: []
      pattern: null
      example_value: safety-result:SR-9
      source_claims:
        - claim-detection-activity-009
  constraints:
    - id: detection-activity-valid-time-interval
      severity: error
      expression_language: plain
      expression: ended_at IS NULL OR ended_at >= started_at
      explanations:
        zh: 已结束的检测必须形成有效时间区间；结束时间不能早于检测开始时间。
        en: A completed detection must form a valid time interval; its end cannot precede its start.
        ja: 完了した検出は有効な time interval を形成し、ended_at は started_at より前にできません。
      source_claims:
        - claim-detection-activity-010
  required_relation_constraints: []
examples:
  - id: detection-activity-lakera
    labels:
      zh: 检测活动 - Lakera Guard 注入检测
      en: detection activity - Lakera Guard injection detection
      ja: 検出活動 - Lakera Guard 注入検出
    descriptions: {zh: "检测活动(DetectionActivity) [DetectionActivity]: 在明确时间、对象和检测配置下主动检查安全证据的活动。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} 返回 {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}}。 Fields: detection_activity_id, method_ref, started_at.", en: "detection activity (DetectionActivity) [DetectionActivity]: An activity that actively examines a stated subject for safety evidence under a recorded detector configuration.. Lakera Guard POST https://api.lakera.ai/v2/guard with {\"input\": \"user message\", \"breakdown\": true} returns {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} (docs.lakera.ai). Fields include detection_activity_id, method_ref, started_at.", ja: "検出活動(DetectionActivity) [DetectionActivity]: 記録された検出設定の下で、明示した対象の安全証拠を能動的に調べる活動。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} は {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} を返す。 Fields: detection_activity_id, method_ref, started_at."}
    field_values:
      actor_ref: "detector:guard-v12"
      configuration_ref: "guard-ruleset@12"
      detection_activity_id: "detection-activity:TP-9@10:14"
      ended_at: "2026-07-16T10:14:01Z"
      inspected_subject_ref: "tool-plan:TP-9"
      method_ref: "detection-method:pre-execution-plan-check"
      result_record_ref: "safety-result:SR-9"
      started_at: "2026-07-16T10:14:00Z"
    related_node_ids:
      - DetectionActivity
    related_relation_ids: []
    example_source: Lakera Guard API
    source_claims:
      - claim-detection-activity-001
  - id: detection-activity-rebuff
    labels:
      zh: 检测活动 - Rebuff 注入检测
      en: detection activity - Rebuff injection detection
      ja: 検出活動 - Rebuff 注入検出
    descriptions: {zh: "检测活动(DetectionActivity) [DetectionActivity]: 在明确时间、对象和检测配置下主动检查安全证据的活动。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: detection_activity_id, method_ref, started_at.", en: "detection activity (DetectionActivity) [DetectionActivity]: An activity that actively examines a stated subject for safety evidence under a recorded detector configuration.. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include detection_activity_id, method_ref, started_at.", ja: "検出活動(DetectionActivity) [DetectionActivity]: 記録された検出設定の下で、明示した対象の安全証拠を能動的に調べる活動。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: detection_activity_id, method_ref, started_at."}
    field_values:
      actor_ref: "detector:guard-v12"
      configuration_ref: "guard-ruleset@12"
      detection_activity_id: "detection-activity:TP-9@10:14"
      ended_at: "2026-07-16T10:14:01Z"
      inspected_subject_ref: "tool-plan:TP-9"
      method_ref: "detection-method:pre-execution-plan-check"
      result_record_ref: "safety-result:SR-9"
      started_at: "2026-07-16T10:14:00Z"
    related_node_ids:
      - DetectionActivity
    related_relation_ids: []
    example_source: Rebuff detector
    source_claims:
      - claim-detection-activity-001
  - id: detection-activity-llama_guard
    labels:
      zh: 检测活动 - Llama Guard 安全分类
      en: detection activity - Llama Guard safety classification
      ja: 検出活動 - Llama Guard 安全分類
    descriptions: {zh: "检测活动(DetectionActivity) [DetectionActivity]: 在明确时间、对象和检测配置下主动检查安全证据的活动。. Inan 等（2023）Llama Guard：微调 Llama 安全分类器输出 safe/unsafe\\nO1（O1=暴力、O2=性、O3=犯罪、O4=枪支、O5=受管制、O6=自残）用于 I/O 审核（arxiv.org/abs/2312.06674）。 Fields: detection_activity_id, method_ref, started_at.", en: "detection activity (DetectionActivity) [DetectionActivity]: An activity that actively examines a stated subject for safety evidence under a recorded detector configuration.. Inan et al. (2023) Llama Guard: fine-tuned Llama safety classifier outputs safe/unsafe\\nO1 (O1=violence, O2=sexual, O3=criminal, O4=guns, O5=regulated, O6=self-harm) for I/O moderation (arxiv.org/abs/2312.06674). Fields include detection_activity_id, method_ref, started_at.", ja: "検出活動(DetectionActivity) [DetectionActivity]: 記録された検出設定の下で、明示した対象の安全証拠を能動的に調べる活動。. Inan ほか（2023）Llama Guard：fine-tuned Llama が safe/unsafe\\nO1（O1=violence 等6類）を I/O moderation に出力（arxiv.org/abs/2312.06674）。 Fields: detection_activity_id, method_ref, started_at."}
    field_values:
      actor_ref: "detector:guard-v12"
      configuration_ref: "guard-ruleset@12"
      detection_activity_id: "detection-activity:TP-9@10:14"
      ended_at: "2026-07-16T10:14:01Z"
      inspected_subject_ref: "tool-plan:TP-9"
      method_ref: "detection-method:pre-execution-plan-check"
      result_record_ref: "safety-result:SR-9"
      started_at: "2026-07-16T10:14:00Z"
    related_node_ids:
      - DetectionActivity
    related_relation_ids: []
    example_source: Meta Llama Guard 2023
    source_claims:
      - claim-detection-activity-001
  - id: detection-activity-nemo
    labels:
      zh: 检测活动 - NeMo Guardrails 注入 rail
      en: detection activity - NeMo Guardrails injection rail
      ja: 検出活動 - NeMo Guardrails 注入 rail
    descriptions: {zh: "检测活动(DetectionActivity) [DetectionActivity]: 在明确时间、对象和检测配置下主动检查安全证据的活动。. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse；支持 input/output/dialog rails。 Fields: detection_activity_id, method_ref, started_at.", en: "detection activity (DetectionActivity) [DetectionActivity]: An activity that actively examines a stated subject for safety evidence under a recorded detector configuration.. NVIDIA NeMo Guardrails Colang 2.0: define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse — supports input/output/dialog rails (github.com/NVIDIA-NeMo/Guardrails). Fields include detection_activity_id, method_ref, started_at.", ja: "検出活動(DetectionActivity) [DetectionActivity]: 記録された検出設定の下で、明示した対象の安全証拠を能動的に調べる活動。. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input で check_jailbreak を実行し jailbreak 時 bot refuse；input/output/dialog rails をサポート。 Fields: detection_activity_id, method_ref, started_at."}
    field_values:
      actor_ref: "detector:guard-v12"
      configuration_ref: "guard-ruleset@12"
      detection_activity_id: "detection-activity:TP-9@10:14"
      ended_at: "2026-07-16T10:14:01Z"
      inspected_subject_ref: "tool-plan:TP-9"
      method_ref: "detection-method:pre-execution-plan-check"
      result_record_ref: "safety-result:SR-9"
      started_at: "2026-07-16T10:14:00Z"
    related_node_ids:
      - DetectionActivity
    related_relation_ids: []
    example_source: NVIDIA NeMo Guardrails
    source_claims:
      - claim-detection-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: DetectionActivity-evaluates-SourceSinkFlow
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 评估来源—汇点流
      en: evaluates source-sink flow
      ja: 出所―シンクフローを評価する
    definitions:
      zh: DetectionActivity 在其受检对象明确绑定某个 SourceSinkFlow 的标识和版本，并实际检查该流中有证据支持的来源、转换与汇点路径时，评估这份流记录。该边表达一次发生过的检查，不表示每份流都会被检查，也不允许因处于同一会话或图上相邻而推断评估。
      en: A DetectionActivity evaluates a SourceSinkFlow when its inspected-subject reference binds the identified flow and version and the activity actually checks the evidence-backed source, transformations, and sink path. The edge denotes a performed check; it does not mean every flow is evaluated and cannot be inferred from session or graph proximity.
      ja: DetectionActivity は inspected-subject reference が特定 SourceSinkFlow の ID と版を束縛し、証拠付き source・transformation・sink 経路を実際に検査した場合、その flow record を評価します。この辺は実施済み検査を表し、全 flow の評価を意味せず、同一 session や graph 上の近接から推論できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次检测活动可以评估一条或多条已识别流，同一流也可以由不同检测器版本复核，因此不施加全局基数。
      en: One detection activity may evaluate one or more identified flows, and one flow may be re-evaluated by different detector versions, so no universal cardinality applies.
      ja: 一つの detection activity が複数の特定 flow を評価でき、同一 flow を異なる detector version が再評価できるため、一律の基数は課しません。
    inverse_reading:
      predicate: evaluated_by
      labels:
        zh: 被检测活动评估
        en: evaluated by detection activity
        ja: 検出活動により評価される
    conditions:
      - id: DetectionActivity-evaluates-SourceSinkFlow-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the detection run's inspected-subject or input reference names the same flow ID and version and the run checks evidence for the ordered source, transformations, and sink; dashboard co-occurrence or node proximity is insufficient.
        explanations:
          zh: 仅当检测运行的受检对象或输入引用指向同一 flow ID 与版本，并且该运行核查了有序来源、转换和汇点的证据时建立此边；仅在同一仪表板出现或节点相邻均不足以成立。
          en: Assert this edge only when the detection run's inspected-subject or input reference names the same flow ID and version and the run checks evidence for its ordered source, transformations, and sink; dashboard co-occurrence or node proximity is insufficient.
          ja: detection run の inspected-subject または input reference が同じ flow ID と版を指し、有序 source・transformation・sink の証拠を検査した場合だけこの辺を成立させます。同じ dashboard 表示や node proximity では不十分です。
        source_claims:
          - claim-detection-activity-013
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DetectionActivity-evaluates-SourceSinkFlow-example-positive-001
        labels:
          zh: 复核工具输出到记忆写入的流
          en: Review of a tool-output-to-memory flow
          ja: ツール出力からメモリ書込みまでのフロー審査
        descriptions:
          zh: flow-check-73 将 flow-73@v4 设为受检对象，逐步核查 tool-output-11 经 normalize-step-11 到 memory-write-11 的证据边，并记录检测器版本 guard-flow@6 与结论 finding-73。
          en: flow-check-73 names flow-73@v4 as its inspected subject, checks the evidence edges from tool-output-11 through normalize-step-11 to memory-write-11, and records detector version guard-flow@6 and finding-73.
          ja: flow-check-73 は flow-73@v4 を inspected subject とし、tool-output-11 から normalize-step-11 を経て memory-write-11 へ至る evidence edge を順に検査し、detector version guard-flow@6 と finding-73 を記録します。
        field_values: {}
        related_node_ids:
          - DetectionActivity
          - SourceSinkFlow
        related_relation_ids:
          - DetectionActivity-evaluates-SourceSinkFlow

          en: Assert flow-check-73 evaluates flow-73@v4 and retain the inspected version, stepwise evidence, and finding reference.
          ja: flow-check-73 evaluates flow-73@v4 を成立させ、検査版・段階別証拠・finding reference を保持します。

          en: The detection run explicitly binds the flow identity and version and checks the complete path rather than merely observing one endpoint, satisfying the evaluates truth condition.
          ja: detection run が flow identity と版を明示的に束縛し、一端だけでなく完全経路を検査するため evaluates の成立条件を満たします。
        source_claims:
          - claim-detection-activity-014
      - id: DetectionActivity-evaluates-SourceSinkFlow-example-boundary-001
        labels:
          zh: 同一事件页面中的未检查流
          en: Unevaluated flow on the same incident page
          ja: 同じ incident page の未評価フロー
        descriptions:
          zh: flow-check-19 只扫描 message-19 的文本模式；事件页面同时展示 flow-73@v4，但运行输入、日志和结果均未引用该流或其任何路径边。
          en: flow-check-19 scans only text patterns in message-19. The incident page also displays flow-73@v4, but the run input, logs, and result reference neither that flow nor any path edge in it.
          ja: flow-check-19 は message-19 の text pattern だけを走査します。incident page には flow-73@v4 も表示されますが、run input・log・result はその flow や path edge を一切参照しません。
        field_values: {}
        related_node_ids:
          - DetectionActivity
          - SourceSinkFlow
