    ja: scans
  definitions:
    zh: PatternScan 对一份尚未取得指令权威的 UntrustedInstructionCandidate 执行模式检查；该边只陈述被检查对象，不表示候选已被接受、拒绝或净化。
    en: A PatternScan examines an UntrustedInstructionCandidate that has not acquired instruction authority; the edge identifies the scanned object and does not assert acceptance, rejection, or sanitization.
    ja: PatternScan は指示権威をまだ得ていない UntrustedInstructionCandidate をパターン検査します。この辺は検査対象だけを示し、受理・拒否・無害化を断定しません。
