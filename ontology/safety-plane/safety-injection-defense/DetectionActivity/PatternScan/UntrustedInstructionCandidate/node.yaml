    supports: "Direct source premise: OWASP LLM01:2025 recommends deterministic format validation, input and output filtering, least privilege, human approval for high-risk actions, and segregation of untrusted external content. Moonweave design inference: The candidate retains exact provenance so segregation is attached to one content revision rather than a mutable URL or broad source category."
    locator: LLM01:2025 > Prevention and Mitigation Strategies, controls 2–6
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-untrusted-instruction-candidate-004
    source: eng-security-owasp-llm01-2025
    supports: "Direct source premise: OWASP LLM01:2025 recommends deterministic format validation, input and output filtering, least privilege, human approval for high-risk actions, and segregation of untrusted external content. Moonweave design inference: Moonweave makes the segregated fragment reviewable by retaining its exact source span."
    locator: LLM01:2025 > Prevention and Mitigation Strategies, controls 2–6
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-untrusted-instruction-candidate-005
