source_claims:
  - id: claim-untrusted-instruction-candidate-001
    source: eng-security-owasp-llm01-2025
    supports: "Direct source premise: OWASP LLM01:2025 recommends deterministic format validation, input and output filtering, least privilege, human approval for high-risk actions, and segregation of untrusted external content. Moonweave design inference: UntrustedInstructionCandidate neutrally reifies a locatable instruction-like fragment from segregated external content before authority or threat adjudication."
    locator: LLM01:2025 > Prevention and Mitigation Strategies, controls 2–6
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-untrusted-instruction-candidate-002
    source: eng-security-owasp-llm01-2025
    supports: "Direct source premise: OWASP LLM01:2025 recommends deterministic format validation, input and output filtering, least privilege, human approval for high-risk actions, and segregation of untrusted external content. Moonweave design inference: Moonweave reifies segregated instruction-like content before detection or authority adjudication so the source content is not prematurely labeled malicious."
    locator: LLM01:2025 > Prevention and Mitigation Strategies, controls 2–6
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-untrusted-instruction-candidate-003
