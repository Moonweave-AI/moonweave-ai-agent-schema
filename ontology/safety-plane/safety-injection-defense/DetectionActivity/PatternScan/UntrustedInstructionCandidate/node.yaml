    supports: "Direct source premise: OWASP LLM01:2025 recommends deterministic format validation, input and output filtering, least privilege, human approval for high-risk actions, and segregation of untrusted external content. Moonweave design inference: The content is stored as instruction-like information, not as an effective Instruction or a confirmed ThreatSignal."
