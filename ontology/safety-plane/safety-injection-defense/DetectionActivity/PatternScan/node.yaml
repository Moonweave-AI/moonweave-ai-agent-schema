    expected_result:
      zh: 验证器不得把该记录归入 PatternScan；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as PatternScan; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を PatternScan に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含仅声明模式的 InjectionSignature、人工审查活动或已聚合的 DefenseFinding。
      en: Excludes an InjectionSignature that only declares a pattern, human review activity, and an aggregated DefenseFinding.
      ja: パターンだけを宣言する InjectionSignature、人手審査活動、集約済み DefenseFinding は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-pattern-scan-003
