    scenario_id: null
    descriptions:
      zh: scan-31 使用规则集 2026.07 对检索块 C-8 执行 14 项检查并输出两个命中范围及分数。
      en: scan-31 runs 14 checks from ruleset 2026.07 over retrieved chunk C-8 and emits two matched spans with scores.
      ja: scan-31 が規則集合 2026.07 の 14 検査を検索断片 C-8 に実行し、二つの一致範囲とスコアを出力します。
    field_values:
      detection_activity_id: pattern-scan:scan-31
      actor_ref: detector:pattern-scanner@12
      inspected_subject_ref: retrieved-chunk:C-8
      method_ref: detection-method:injection-signature-scan
