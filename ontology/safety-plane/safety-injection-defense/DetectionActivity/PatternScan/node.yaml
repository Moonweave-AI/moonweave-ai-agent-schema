schema: moonweave.ai/ontology-node/v1
id: PatternScan
kind: concept
labels:
  zh: 模式扫描
  en: pattern scan
  ja: パターン走査
semantics:
  short_definition:
    zh: 对明确对象运行版本化 InjectionSignature 集合的 DetectionActivity 子类。
    en: A DetectionActivity subtype running a versioned InjectionSignature set over a stated subject.
    ja: 明示 subject へ版管理 InjectionSignature 集合を実行する DetectionActivity subtype。
  definition:
    zh: PatternScan 在 user prompt、RAG chunk、tool output 或 tool description 上执行签名/规则求值，产出 InjectionScanResult 与 UntrustedInstructionCandidate。OpenAI Moderation、Azure shieldPrompt、Guardrails DetectPromptInjectionValidator 与 Bifrost prompt_injection_detection 的每次执行应映射为 PatternScan 而非 InjectionSignature 规范本身。
    en: PatternScan evaluates signature/rules on user prompts, RAG chunks, tool outputs, or tool descriptions, emitting InjectionScanResult and UntrustedInstructionCandidate. Each execution of OpenAI Moderation, Azure shieldPrompt, Guardrails DetectPromptInjectionValidator, or Bifrost prompt_injection_detection maps to PatternScan, not the InjectionSignature specification.
    ja: PatternScan は user prompt/RAG chunk/tool output/tool description で signature/rule 評価し InjectionScanResult/UntrustedInstructionCandidate を出力。OpenAI Moderation/Azure shieldPrompt/Guardrails/Bifrost の各実行は InjectionSignature 仕様ではなく PatternScan に写像。
  why_needed:
    zh: 必须把“规则库存在”与“某次实际扫描”分开，否则 MCP 30+ CVE 复检无法绑定具体 scan 运行。
    en: Rule-library presence must be separated from an actual scan run so MCP 30+ CVE rescans bind to concrete scan occurrences.
    ja: rule library 存在と actual scan run を分離しないと MCP 30+ CVE rescan が concrete scan に束縛できません。
  includes:
    - zh: 包含受检对象、签名集合版本、运行时间和逐项匹配输出的扫描运行。
      en: Includes scan runs with an inspected subject, signature-set version, execution time, and per-match output.
      ja: 対象、署名集合版、実行時刻、各一致出力を持つ走査実行を含みます。
  excludes:
    - zh: 不包含仅声明模式的 InjectionSignature、人工审查活动或已聚合的 DefenseFinding。
      en: Excludes an InjectionSignature that only declares a pattern, human review activity, and an aggregated DefenseFinding.
      ja: パターンだけを宣言する InjectionSignature、人手審査活動、集約済み DefenseFinding は含みません。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 分层：ingress PatternScan（Moderation/Shield）→ tool-output PatternScan → rescan PatternScan after quarantine。每次运行保留 configuration_ref 与 inspected_subject_ref。
    en: Layer ingress PatternScan (Moderation/Shield) → tool-output PatternScan → post-quarantine rescan PatternScan; each run retains configuration_ref and inspected_subject_ref.
    ja: ingress PatternScan→tool-output PatternScan→quarantine 後 rescan。各 run で configuration_ref/inspected_subject_ref を保持。
  typical_input:
    - description: Subject at trust boundary.
      format: user message | retrieved chunk | tool_result | tools/list description
      source_claims:
        - claim-patternscan-design
  typical_output:
    - description: InjectionScanResult from completed scan.
      format: PatternScan-produces-InjectionScanResult
      source_claims:
        - claim-patternscan-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
