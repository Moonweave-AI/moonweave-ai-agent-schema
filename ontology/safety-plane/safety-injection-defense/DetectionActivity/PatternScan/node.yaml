parent_relation:
  id: PatternScan-is_a-DetectionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 模式扫描 是一种 检测活动。区分特征：模式扫描是使用签名或规则检查内容的 DetectionActivity，其输出另建 InjectionScanResult。
    en: "pattern scan is a kind of detection activity. Reviewed differentia: PatternScan is a DetectionActivity that checks content using signatures or rules; its output is separately represented by InjectionScanResult."
    ja: パターン走査 は 検出活動 の一種です。審査済みの種差：PatternScan はシグネチャ・規則で内容を検査する DetectionActivity で、出力は InjectionScanResult として分離します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-patternscan-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: PatternScan-scans-ToolResult
    predicate: scans
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 扫描工具结果
      en: scans tool result
      ja: ツール結果を走査
    definitions:
      zh: PatternScan 以一个由 result_id、attempt_ref 和接收时间固定的 ToolResult 作为本次检测输入，并记录扫描版本、覆盖范围与完成时间；ToolResult 是被检查的信息，不是执行扫描的活动。
      en: PatternScan scans a ToolResult fixed by result_id, attempt_ref, and receipt time as the input to one detection run and records detector version, covered range, and completion time; ToolResult is inspected information, not the activity performing the scan.
      ja: PatternScan は result_id・attempt_ref・receipt time で固定された ToolResult を一回の detection run input として scan し detector version・covered range・completion time を記録し、ToolResult は inspected information で scan activity ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 事实数量取决于可核验的检测运行，不强加统一基数。
      en: The count depends on verifiable detection runs, so no universal cardinality is imposed.
      ja: fact 数は検証可能 detection run に依存し共通 cardinality は課しません。
    inverse_reading:
      predicate: is_target_of_scans
      labels:
        zh: 反向：扫描工具结果
        en: "inverse: scans tool result"
        ja: 逆方向：ツール結果を走査
    conditions:
      - id: PatternScan-scans-ToolResult-condition-manual-20260717
        severity: error
        expression_language: plain
        expression: Assert only when the PatternScan subject_ref matches the same ToolResult, the scan covers the complete result range intended for context ingestion, and completes before delivery to the model; configuring a scanner or sampling one segment is insufficient.
        explanations:
          zh: 仅当 PatternScan 的 subject_ref 匹配同一 ToolResult，扫描覆盖待进入上下文的完整结果范围，并在结果交付模型前完成时成立；只配置扫描器或抽样一段不足。
          en: Assert only when the PatternScan subject_ref matches the same ToolResult, the scan covers the complete result range intended for context ingestion, and completes before delivery to the model; configuring a scanner or sampling one segment is insufficient.
          ja: PatternScan subject_ref が同一 ToolResult と一致し scan が context ingestion 対象の complete result range を覆い model delivery 前に完了した場合のみ成立し scanner configuration や one-segment sample は不十分です。
        source_claims:
          - claim-patternscan-design
          - claim-patternscan-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-patternscan-design
      - claim-patternscan-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ToolResult
  - id: PatternScan-produces-InjectionScanResult
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 产生
      en: produces
      ja: 生成する
    definitions:
      zh: 一次 PatternScan 在完成对候选内容的模式求值后产生 InjectionScanResult；结果记录命中项、未命中结论与所用签名版本，而不是扫描活动的下位类。
      en: A PatternScan produces an InjectionScanResult after evaluating candidate content; the result records matches, a no-match outcome, and the signature version, and is not a subtype of the scanning activity.
      ja: PatternScan は候補内容のパターン評価後に InjectionScanResult を生成します。結果は一致項目、不一致結論、使用した署名版を記録し、走査活動の下位型ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: produced_by
      labels:
        zh: 反向：产生
        en: produced by
        ja: 逆方向：生成する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-patternscan-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:InjectionScanResult
  - id: scans_for_signature
    predicate: scans_for_signature
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: scans for signature
      en: scans for signature
      ja: scans for signature
    definitions:
      en: A PatternScan uses a versioned InjectionSignature as its matching criterion; the edge binds the signature actually consulted and does not imply that the signature performs the scan or that a match occurred.
      zh: PatternScan 以一份确定版本的 InjectionSignature 作为匹配准则；该边绑定实际使用的签名，而不表示签名自身执行扫描或一次命中已经成立。
      ja: PatternScan は版が確定した InjectionSignature を照合基準として使用します。この辺は実際に参照した署名を結び、署名自体が走査することや一致成立を意味しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_scans_for_signature
      labels:
        zh: 反向：scans for signature
        en: is target of scans for signature
        ja: 逆方向：scans for signature
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-patternscan-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:InjectionSignature
