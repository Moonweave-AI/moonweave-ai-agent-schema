      en: A safety analyst reads C-8 and writes a review without running versioned patterns; this is human review, not a PatternScan.
      ja: 安全分析者が C-8 を読み所見を書くが版管理パターンを実行していないため、人手審査であり PatternScan ではありません。
    field_values: {}
