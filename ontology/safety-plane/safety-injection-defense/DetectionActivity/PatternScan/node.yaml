schema: moonweave.ai/ontology-node/v1
id: PatternScan
kind: concept
status: review
labels:
  zh: 模式扫描
  en: pattern scan
  ja: パターン走査
semantics:
  short_definition:
    zh: 按版本化模式检查内容或计划并输出命中结果的检测活动。
    en: A detection activity that evaluates content or a plan against versioned patterns and emits match results.
    ja: 内容または計画を版管理パターンで評価し、一致結果を出す検出活動。
  definition:
    zh: 模式扫描是一种 DetectionActivity，它在明确对象上运行 InjectionSignature 集合或等价检测规则，记录每个命中范围、分数和规则版本，并产生 InjectionScanResult。它不等同于签名规范，也不保证发现所有语义注入。
    en: A PatternScan is a DetectionActivity that runs an InjectionSignature set or equivalent detection rules over a stated subject, records each matched span, score, and ruleset version, and emits an InjectionScanResult. It is not the signature specification and does not guarantee detection of every semantic injection.
    ja: パターン走査は、明示した対象へ InjectionSignature 集合または同等の検出規則を実行し、一致範囲、スコア、規則版を記録して InjectionScanResult を生成する DetectionActivity です。署名仕様そのものではなく、すべての意味的注入の検出を保証しません。
  why_needed:
    zh: 记录实际运行可把规则定义、输入对象和输出证据连接起来，并支持复检。
    en: The run record connects rule definition, inspected input, and output evidence and supports rescanning.
    ja: 実行記録が規則定義、検査入力、出力証拠を結び、再走査を可能にします。
  includes:
    - zh: 包含受检对象、签名集合版本、运行时间和逐项匹配输出的扫描运行。
      en: Includes scan runs with an inspected subject, signature-set version, execution time, and per-match output.
      ja: 対象、署名集合版、実行時刻、各一致出力を持つ走査実行を含みます。
  excludes:
    - zh: 不包含仅声明模式的 InjectionSignature、人工审查活动或已聚合的 DefenseFinding。
      en: Excludes an InjectionSignature that only declares a pattern, human review activity, and an aggregated DefenseFinding.
      ja: パターンだけを宣言する InjectionSignature、人手審査活動、集約済み DefenseFinding は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
