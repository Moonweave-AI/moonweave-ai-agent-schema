source_claims:
  - id: claim-pattern-scan-001
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends semantic filters and string checks for non-allowed content while warning that no fool-proof prevention exists; PatternScan represents one executed, versioned filtering check.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-002
    source: eng-security-owasp-llm01-2025
    supports: "OWASP recommends semantic filters and string checks for non-allowed content while warning that no fool-proof prevention exists; PatternScan represents one executed, versioned filtering check. The positive case specifically tests this distinction: scan-31 runs 14 checks from ruleset 2026.07 over retrieved chunk C-8 and emits two matched spans with scores."
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-003
    source: eng-security-owasp-llm01-2025
    supports: "OWASP recommends semantic filters and string checks for non-allowed content while warning that no fool-proof prevention exists; PatternScan represents one executed, versioned filtering check. The boundary case specifically tests this distinction: A safety analyst reads C-8 and writes a review without running versioned patterns; this is human review, not a PatternScan."
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends inspecting each tool output and scanning for disallowed keywords or injected prompts before forwarding it. Moonweave models an occurrence of signature- or rule-based inspection as PatternScan, a specialized DetectionActivity.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 11–12, ‘Filter and monitor output pipelines and chained execution’
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-005
    source: eng-security-owasp-llm01-2025
    supports: OWASP LLM01:2025 describes indirect prompt injection through external content and recommends constraining and validating untrusted inputs. Moonweave applies that boundary to tool-result inspection while keeping scan activity, result, and signal as distinct identities.
    locator: OWASP LLM01:2025 Prompt Injection > indirect prompt injection and mitigation strategies
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-006
    source: eng-security-mcp-nsa-2026
    supports: NSA MCP security guidance recommends validation and monitoring of MCP tool data and consequential interactions. The exact PatternScan and ToolStreamInjectionSignal relations are Moonweave design inferences over that guidance.
    locator: MCP Security Design Considerations > input validation, monitoring, and tool-data security
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-007
    source: eng-fw-openai-guardrails
    supports: OpenAI guardrails run a guardrail function to produce a result and then inspect its tripwire flag. This supports separating a PatternScan activity from the InjectionScanResult record it produces.
    locator: OpenAI Agents SDK, Guardrails, ‘Workflow boundaries’, ‘Tool guardrails’, and ‘Tripwires’
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-pattern-scan-008
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends keyword and injected-prompt scanning in chained output pipelines. Moonweave records which versioned InjectionSignature a PatternScan actually consulted, separately from whether the scan matched.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 11–12, ‘Filter and monitor output pipelines and chained execution’
    evidence_kind: design-inference
    confidence: high
    review_status: pending
