schema: moonweave.ai/ontology-node/v1
id: ThreatSignal
kind: concept
status: accepted
labels:
  zh: 威胁信号
  en: threat signal
  ja: 脅威信号
semantics:
  short_definition:
    zh: 检测器对特定对象、位置和时间给出的可审查威胁证据记录。
    en: A reviewable record of threat evidence emitted by a detector for a specific subject, location, and time.
    ja: 検出器が特定対象・位置・時刻について出した審査可能な脅威証拠記録。
  definition:
    zh: 威胁信号是一种信息记录，至少标明受检对象、证据位置、威胁类别、检测器或规则、置信度和观察时间。它是尚可被复核或聚合的证据，不等同于受污染对象、攻击事件、风险质量或已裁决的 DefenseFinding。
    en: A ThreatSignal is an information record naming at least the inspected subject, evidence location, threat class, detector or rule, confidence, and observation time. It is reviewable or aggregatable evidence, not the poisoned object, attack event, risk quality, or adjudicated DefenseFinding.
    ja: 脅威信号は、少なくとも検査対象、証拠位置、脅威種別、検出器または規則、確信度、観測時刻を示す情報記録です。再審査・集約可能な証拠であり、汚染対象、攻撃イベント、リスク品質、裁決済み DefenseFinding ではありません。
  why_needed:
    zh: 在结论之前保留检测证据，允许多个检测器交叉验证并控制误报。
    en: Preserving detector evidence before adjudication allows cross-validation among detectors and false-positive control.
    ja: 裁決前の検出証拠を保持し、複数検出器の相互検証と誤検知制御を可能にします。
  includes:
    - zh: 包含可定位证据、检测来源、类别、置信度和时间的信号记录。
      en: Includes signal records with locatable evidence, detector provenance, class, confidence, and time.
      ja: 位置指定可能な証拠、検出来歴、種別、確信度、時刻を持つ信号記録を含みます。
  excludes:
    - zh: 不包含只有风险分数而无证据位置的质量评估、原始内容或最终处置结论。
      en: Excludes quality assessments with only a risk score and no evidence location, the raw content, and final disposition conclusions.
      ja: 証拠位置なしにリスクスコアだけを持つ品質評価、原内容、最終処置結論は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - threat_signal_id
  fields:
    - id: threat_signal_id
      labels:
        zh: 威胁信号标识
        en: threat-signal ID
        ja: 脅威 signal ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识检测器对一处具体证据产生的一条可复核信号。
        en: Stable identifier for one reviewable signal emitted about one concrete evidence occurrence.
        ja: 一つの具体的 evidence occurrence に対して検出器が出した一条の reviewable signal を安定識別します。
      allowed_values: []
      pattern: null
      example_value: threat-signal-005
      source_claims:
        - claim-threat-signal-002
    - id: signal_kind
      labels:
        zh: 信号类型
        en: signal kind
        ja: signal 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分直接提示注入、间接提示注入、工具流注入、记忆投毒或其他检测证据。
        en: Distinguishes direct prompt injection, indirect prompt injection, tool-stream injection, memory poisoning, or another reviewed evidence kind.
        ja: direct prompt injection・indirect prompt injection・tool-stream injection・memory poisoning・その他 evidence を区別します。
      allowed_values: []
      pattern: null
      example_value: generic-threat-evidence
      source_claims:
        - claim-threat-signal-003
    - id: inspected_subject_ref
      labels:
        zh: 受检对象引用
        en: inspected-subject reference
        ja: 検査対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测器实际检查的消息、资源、工具输出、记忆项或其他不可变对象版本。
        en: Immutable message, resource, tool output, memory item, or other object revision actually inspected by the detector.
        ja: 検出器が実際に検査した message・resource・tool output・memory item 等の不変版です。
      allowed_values: []
      pattern: null
      example_value: message:M-7
      source_claims:
        - claim-threat-signal-004
    - id: evidence_locator
      labels:
        zh: 证据位置
        en: evidence locator
        ja: evidence locator
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 可在受检对象版本中重新定位的字符、字节、结构路径或块范围。
        en: Character, byte, structural path, or chunk range that can relocate the evidence within the inspected revision.
        ja: 検査対象版内で evidence を再特定できる文字・byte・structure path・chunk 範囲です。
      allowed_values: []
      pattern: null
      example_value: chars:9-34
      source_claims:
        - claim-threat-signal-005
    - id: detector_ref
      labels:
        zh: 检测器引用
        en: detector reference
        ja: 検出器参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生信号的具体检测器、规则集或模型版本。
        en: Concrete detector, ruleset, or model revision that emitted the signal.
        ja: signal を出した具体的 detector・ruleset・model revision です。
      allowed_values: []
      pattern: null
      example_value: detector:d-5@2.1
      source_claims:
        - claim-threat-signal-006
    - id: threat_class
      labels:
        zh: 威胁类别
        en: threat class
        ja: 脅威分類
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测证据对应的受控攻击类别或本体分类标识。
        en: Controlled attack class or ontology classification assigned to the detected evidence.
        ja: 検出 evidence に割り当てた controlled attack class または ontology classification です。
      allowed_values: []
      pattern: null
      example_value: instruction-override
      source_claims:
        - claim-threat-signal-007
    - id: confidence
      labels:
        zh: 检测置信度
        en: detector confidence
        ja: 検出信頼度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测器对该证据分类的零到一置信值。
        en: Detector confidence in the evidence classification on the closed interval zero through one.
        ja: evidence classification に対する detector confidence の 0 以上 1 以下の値です。
      allowed_values: []
      pattern: null
      example_value: 0.86
      source_claims:
        - claim-threat-signal-008
    - id: observed_at
      labels:
        zh: 观察时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测活动取得该具体证据并形成信号的 UTC 时间。
        en: UTC instant when the detection activity obtained the concrete evidence and formed the signal.
        ja: detection activity が具体的 evidence を取得し signal を形成した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T12:00:01Z
      source_claims:
        - claim-threat-signal-009
  constraints:
    - id: threat-signal-locatable-observation
      severity: error
      expression_language: plain
      expression: inspected_subject_ref, evidence_locator, detector_ref, threat_class, confidence, and observed_at identify one concrete detector observation
      explanations:
        zh: 只有可定位到具体对象和位置、并带检测来源的观察才是威胁信号。
        en: Only an observation locatable to a concrete subject and span with detector provenance is a ThreatSignal.
        ja: 具体対象・位置へ特定でき detector provenance を持つ観測だけが ThreatSignal です。
      source_claims:
        - claim-threat-signal-010
    - id: threat-signal-confidence-range
      severity: error
      expression_language: plain
      expression: confidence >= 0 AND confidence <= 1
      explanations:
        zh: 检测置信度必须位于零到一闭区间。
        en: Detector confidence must remain in the closed interval from zero through one.
        ja: detector confidence は 0 以上 1 以下です。
      source_claims:
        - claim-threat-signal-011
  required_relation_constraints:
    - id: threat-signal-produced-by-detection-activity
      direction: incoming
      predicate: produces
      target_concept_id: DetectionActivity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条威胁信号必须由一次具体检测活动产生；攻击分类条目本身不能产生信号。
        en: Each ThreatSignal must be emitted by exactly one concrete DetectionActivity; an attack-taxonomy entry alone cannot emit a signal.
        ja: 各 ThreatSignal は一回の具体的 DetectionActivity から生成され、attack taxonomy entry 自体は signal を生成しません。
      source_claims:
        - claim-threat-signal-012
examples:
  - id: ThreatSignal-manual-positive-20260714
    kind: positive
    labels:
      zh: 威胁信号正例
      en: Positive case for threat signal
      ja: 脅威信号の正例
    scenario_id: null
    descriptions:
      zh: 检测器 d-5 在消息 M-7 第 9–34 字符发现 override 类证据，置信度 0.86，记录观察时间。
      en: Detector d-5 finds override-class evidence at characters 9–34 of message M-7 with confidence 0.86 and records observation time.
      ja: 検出器 d-5 がメッセージ M-7 の文字 9–34 に override 種別の証拠を確信度 0.86 で見つけ、観測時刻を記録します。
    field_values:
      threat_signal_id: threat-signal-005
      signal_kind: generic-threat-evidence
      inspected_subject_ref: message:M-7
      evidence_locator: chars:9-34
      detector_ref: detector:d-5@2.1
      threat_class: instruction-override
      confidence: 0.86
      observed_at: 2026-07-14T12:00:01Z
    related_node_ids:
      - ThreatSignal
    related_relation_ids: []
    expected_result:
      zh: 验证器应把该记录识别为 ThreatSignal，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as ThreatSignal while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を ThreatSignal と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含可定位证据、检测来源、类别、置信度和时间的信号记录。
      en: Includes signal records with locatable evidence, detector provenance, class, confidence, and time.
      ja: 位置指定可能な証拠、検出来歴、種別、確信度、時刻を持つ信号記録を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-threat-signal-013
  - id: ThreatSignal-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 威胁信号边界例
      en: Boundary case for threat signal
      ja: 脅威信号の境界例
    scenario_id: null
    descriptions:
      zh: 策略说“所有外部文本风险分 0.5”但没有检测器、位置或具体证据；这不是 ThreatSignal。
      en: A policy assigns all external text risk score 0.5 without a detector, location, or concrete evidence; this is not a ThreatSignal.
      ja: 方針が全外部テキストへリスク 0.5 を付けるだけで検出器、位置、具体証拠がなければ ThreatSignal ではありません。
    field_values: {}
    related_node_ids:
      - ThreatSignal
    related_relation_ids: []
    expected_result:
      zh: 验证器不得把该记录归入 ThreatSignal；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as ThreatSignal; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を ThreatSignal に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含只有风险分数而无证据位置的质量评估、原始内容或最终处置结论。
      en: Excludes quality assessments with only a risk score and no evidence location, the raw content, and final disposition conclusions.
      ja: 証拠位置なしにリスクスコアだけを持つ品質評価、原内容、最終処置結論は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-threat-signal-014
