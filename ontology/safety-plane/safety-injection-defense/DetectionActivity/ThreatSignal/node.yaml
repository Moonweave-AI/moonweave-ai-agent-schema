schema: moonweave.ai/ontology-node/v1
id: ThreatSignal
kind: concept
labels:
  zh: 威胁信号
  en: threat signal
  ja: 脅威信号
semantics:
  short_definition:
    zh: 检测器对一处具体证据发出的可复核威胁信号记录。
    en: A reviewable threat-signal record emitted by a detector about one concrete evidence occurrence.
    ja: 検出器が一つの concrete evidence occurrence について出す reviewable threat signal 記録。
  definition:
    zh: ThreatSignal 标明受检对象、证据位置、signal_kind、检测器、置信度与 observed_at；它是裁决前的证据，不是 DefenseFinding 或 PoisonedContent。AgentSentry 因果链、Azure attackDetected 与 OpenAI category flags 应先落成 ThreatSignal 再聚合为 finding。
    en: ThreatSignal names inspected subject, evidence location, signal_kind, detector, confidence, and observed_at; it is pre-adjudication evidence, not DefenseFinding or PoisonedContent. AgentSentry causal chains, Azure attackDetected, and OpenAI category flags should become ThreatSignals before finding aggregation.
    ja: ThreatSignal は inspected subject/evidence location/signal_kind/detector/confidence/observed_at を示し pre-adjudication evidence で DefenseFinding/PoisonedContent ではありません。AgentSentry causal chain/Azure attackDetected/OpenAI category flag は finding 集約前に ThreatSignal 化します。
  why_needed:
    zh: 保留裁决前证据允许多检测器交叉验证并控制 MCP 双边界误报。
    en: Pre-adjudication evidence enables cross-detector validation and false-positive control at dual MCP boundaries.
    ja: pre-adjudication evidence で multi-detector 交叉検証と MCP 二重 boundary 誤検知制御が可能。
  includes:
    - zh: 包含可定位证据、检测来源、类别、置信度和时间的信号记录。
      en: Includes signal records with locatable evidence, detector provenance, class, confidence, and time.
      ja: 位置指定可能な証拠、検出来歴、種別、確信度、時刻を持つ信号記録を含みます。
  excludes:
    - zh: 不包含只有风险分数而无证据位置的质量评估、原始内容或最终处置结论。
      en: Excludes quality assessments with only a risk score and no evidence location, the raw content, and final disposition conclusions.
      ja: 証拠位置なしにリスクスコアだけを持つ品質評価、原内容、最終処置結論は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: ThreatSignal 是 finding 的上游：Moderation categories → PromptInjectionSignal；tool stream → ToolStreamInjectionSignal；memory write → MemoryPoisoningSignal。
    en: "ThreatSignal feeds findings: Moderation categories → PromptInjectionSignal; tool stream → ToolStreamInjectionSignal; memory write → MemoryPoisoningSignal."
    ja: ThreatSignal は finding 上流：Moderation→PromptInjectionSignal、tool stream→ToolStreamInjectionSignal、memory→MemoryPoisoningSignal。
  typical_input:
    - description: Detector raw hit.
      format: '{"attackDetected":true} | {"flagged":true,"categories":{...}}'
      source_claims:
        - claim-threatsignal-design
  typical_output:
    - description: Signal referenced by finding.
      format: ThreatSignal-indicates-PersistentContextRisk (when applicable)
      source_claims:
        - claim-threatsignal-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - threat_signal_id
  fields:
    - id: threat_signal_id
      labels:
        zh: 威胁信号标识
        en: threat-signal ID
        ja: 脅威 signal ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识检测器对一处具体证据产生的一条可复核信号。
        en: Stable identifier for one reviewable signal emitted about one concrete evidence occurrence.
        ja: 一つの具体的 evidence occurrence に対して検出器が出した一条の reviewable signal を安定識別します。
      allowed_values: []
      pattern: null
      example_value: threat-signal-005
      source_claims:
        - claim-threatsignal-design
    - id: signal_kind
      labels:
        zh: 信号类型
        en: signal kind
        ja: signal 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分直接提示注入、间接提示注入、工具流注入、记忆投毒或其他检测证据。
        en: Distinguishes direct prompt injection, indirect prompt injection, tool-stream injection, memory poisoning, or another reviewed evidence kind.
        ja: direct prompt injection・indirect prompt injection・tool-stream injection・memory poisoning・その他 evidence を区別します。
      allowed_values: []
      pattern: null
      example_value: generic-threat-evidence
      source_claims:
        - claim-threatsignal-design
    - id: inspected_subject_ref
      labels:
        zh: 受检对象引用
        en: inspected-subject reference
        ja: 検査対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测器实际检查的消息、资源、工具输出、记忆项或其他不可变对象版本。
        en: Immutable message, resource, tool output, memory item, or other object revision actually inspected by the detector.
        ja: 検出器が実際に検査した message・resource・tool output・memory item 等の不変版です。
      allowed_values: []
      pattern: null
      example_value: message:M-7
      source_claims:
        - claim-threatsignal-design
    - id: evidence_locator
      labels:
        zh: 证据位置
        en: evidence locator
        ja: evidence locator
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 可在受检对象版本中重新定位的字符、字节、结构路径或块范围。
        en: Character, byte, structural path, or chunk range that can relocate the evidence within the inspected revision.
        ja: 検査対象版内で evidence を再特定できる文字・byte・structure path・chunk 範囲です。
      allowed_values: []
      pattern: null
      example_value: chars:9-34
      source_claims:
        - claim-threatsignal-design
    - id: detector_ref
      labels:
        zh: 检测器引用
        en: detector reference
        ja: 検出器参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生信号的具体检测器、规则集或模型版本。
        en: Concrete detector, ruleset, or model revision that emitted the signal.
        ja: signal を出した具体的 detector・ruleset・model revision です。
      allowed_values: []
      pattern: null
      example_value: detector:d-5@2.1
      source_claims:
        - claim-threatsignal-design
    - id: threat_class
      labels:
        zh: 威胁类别
        en: threat class
        ja: 脅威分類
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测证据对应的受控攻击类别或本体分类标识。
        en: Controlled attack class or ontology classification assigned to the detected evidence.
        ja: 検出 evidence に割り当てた controlled attack class または ontology classification です。
      allowed_values: []
      pattern: null
      example_value: instruction-override
      source_claims:
        - claim-threatsignal-design
    - id: confidence
      labels:
        zh: 检测置信度
        en: detector confidence
        ja: 検出信頼度
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测器对该证据分类的零到一置信值。
        en: Detector confidence in the evidence classification on the closed interval zero through one.
        ja: evidence classification に対する detector confidence の 0 以上 1 以下の値です。
      allowed_values: []
      pattern: null
      example_value: 0.86
      source_claims:
        - claim-threatsignal-design
    - id: observed_at
      labels:
        zh: 观察时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检测活动取得该具体证据并形成信号的 UTC 时间。
        en: UTC instant when the detection activity obtained the concrete evidence and formed the signal.
        ja: detection activity が具体的 evidence を取得し signal を形成した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T12:00:01Z
      source_claims:
        - claim-threatsignal-design
  constraints:
    - id: threat-signal-locatable-observation
      severity: error
      expression_language: plain
      expression: inspected_subject_ref, evidence_locator, detector_ref, threat_class, confidence, and observed_at identify one concrete detector observation
      explanations:
        zh: 只有可定位到具体对象和位置、并带检测来源的观察才是威胁信号。
        en: Only an observation locatable to a concrete subject and span with detector provenance is a ThreatSignal.
        ja: 具体対象・位置へ特定でき detector provenance を持つ観測だけが ThreatSignal です。
      source_claims:
        - claim-threatsignal-design
    - id: threat-signal-confidence-range
      severity: error
      expression_language: plain
      expression: confidence >= 0 AND confidence <= 1
      explanations:
        zh: 检测置信度必须位于零到一闭区间。
        en: Detector confidence must remain in the closed interval from zero through one.
        ja: detector confidence は 0 以上 1 以下です。
      source_claims:
        - claim-threatsignal-design
  required_relation_constraints:
    - id: threat-signal-produced-by-detection-activity
      direction: incoming
      predicate: produces
      target_concept_id: DetectionActivity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条威胁信号必须由一次具体检测活动产生；攻击分类条目本身不能产生信号。
        en: Each ThreatSignal must be emitted by exactly one concrete DetectionActivity; an attack-taxonomy entry alone cannot emit a signal.
        ja: 各 ThreatSignal は一回の具体的 DetectionActivity から生成され、attack taxonomy entry 自体は signal を生成しません。
      source_claims:
        - claim-threatsignal-design
examples:
  - id: ThreatSignal-agentsentry-771
    labels:
      zh: AgentSentry 工具流威胁信号
      en: AgentSentry tool-stream threat signal
      ja: AgentSentry tool-stream threat signal
    descriptions:
      zh: signal/agentsentry-771 绑定 tool-result://R-5 偏移 220–310 与 indirect-instruction 类别。
      en: signal/agentsentry-771 binds tool-result://R-5 offset 220–310 with indirect-instruction class.
      ja: signal/agentsentry-771 が tool-result://R-5 220–310 を indirect-instruction class で束縛。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      threat_signal_id: signal/agentsentry-771
      signal_kind: indirect-injection
      confidence: 0.92
    related_node_ids:
      - ThreatSignal
      - ToolStreamInjectionSignal
      - DefenseFinding
    related_relation_ids: []
    source_claims:
      - claim-threatsignal-design
  - id: ThreatSignal-azure-shield
    labels:
      zh: Azure Prompt Shield 威胁信号
      en: Azure Prompt Shield threat signal
      ja: Azure Prompt Shield threat signal
    descriptions:
      zh: signal/shield-rag-5 来自 documentsAnalysis[2].attackDetected=true。
      en: signal/shield-rag-5 from documentsAnalysis[2].attackDetected=true.
      ja: signal/shield-rag-5 は documentsAnalysis[2].attackDetected=true 由来。
    example_source:
      product: Azure Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      version: attackDetected
    field_values:
      threat_signal_id: signal/shield-rag-5
      confidence: 0.88
    related_node_ids:
      - ThreatSignal
      - PromptInjectionSignal
    related_relation_ids: []
    source_claims:
      - claim-threatsignal-design
  - id: ThreatSignal-openai-mod
    labels:
      zh: OpenAI Moderation 威胁信号
      en: OpenAI Moderation threat signal
      ja: OpenAI Moderation threat signal
    descriptions:
      zh: signal/mod-884 记录 illicit 与 violence 类别 flagged。
      en: signal/mod-884 records illicit and violence categories flagged.
      ja: signal/mod-884 が illicit/violence category flagged を記録。
    example_source:
      product: OpenAI
      url: https://platform.openai.com/docs/api-reference/moderations/create
      version: moderations
    field_values:
      threat_signal_id: signal/mod-884
      signal_kind: prompt-injection
    related_node_ids:
      - ThreatSignal
      - PromptInjectionSignal
    related_relation_ids: []
    source_claims:
      - claim-threatsignal-design
  - id: ThreatSignal-mcp-hidden
    labels:
      zh: MCP 隐藏指令威胁信号
      en: MCP hidden-instruction threat signal
      ja: MCP hidden instruction threat signal
    descriptions:
      zh: signal/mcp-118 定位 tools/list 描述中 HTML 注释内 hidden instruction。
      en: signal/mcp-118 locates hidden instruction inside HTML comment in tools/list description.
      ja: signal/mcp-118 が tools/list description HTML comment 内 hidden instruction を定位。
    example_source:
      product: MCP tool poisoning (2026)
      url: https://www.mdpi.com/2078-2489/17/1/54
      version: "2026"
    field_values:
      threat_signal_id: signal/mcp-118
    related_node_ids:
      - ThreatSignal
      - IndirectInjectionSignal
    related_relation_ids: []
    source_claims:
      - claim-threatsignal-design
parent_relation:
  id: DetectionActivity-produces-ThreatSignal
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生威胁信号
    en: produces threat signal
    ja: 脅威信号を生成する
  definitions:
    zh: 一次 DetectionActivity 在具体输入范围内识别到可定位的攻击类别证据时，产生带检测器来源、证据位置、分类、置信度和观察时间的 ThreatSignal；一般风险评分不自动成为该输出。
    en: A DetectionActivity produces a ThreatSignal when it identifies locatable evidence of an attack class in a concrete input span and records detector provenance, evidence location, class, confidence, and observation time; a generic risk score is not enough.
    ja: DetectionActivity が具体的入力範囲で攻撃分類の位置特定可能な証拠を識別し、検出器来歴・証拠位置・分類・確信度・観測時刻を記録したとき ThreatSignal を生成します。一般的リスク値だけでは成立しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次检测可不产生信号，也可针对不同证据范围产生多项信号。
    en: One detection may emit no signal or several signals for different evidence spans.
    ja: 一回の検出は信号を生成しない場合も、異なる証拠範囲に複数生成する場合もあります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由检测活动产生
      en: produced by detection activity
      ja: 検出活動により生成される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-threatsignal-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
