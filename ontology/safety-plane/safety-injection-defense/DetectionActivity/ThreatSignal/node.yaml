parent_relation:
  id: DetectionActivity-produces-ThreatSignal
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生威胁信号
    en: produces threat signal
    ja: 脅威信号を生成する
  definitions:
    zh: 一次 DetectionActivity 在具体输入范围内识别到可定位的攻击类别证据时，产生带检测器来源、证据位置、分类、置信度和观察时间的 ThreatSignal；一般风险评分不自动成为该输出。
    en: A DetectionActivity produces a ThreatSignal when it identifies locatable evidence of an attack class in a concrete input span and records detector provenance, evidence location, class, confidence, and observation time; a generic risk score is not enough.
    ja: DetectionActivity が具体的入力範囲で攻撃分類の位置特定可能な証拠を識別し、検出器来歴・証拠位置・分類・確信度・観測時刻を記録したとき ThreatSignal を生成します。一般的リスク値だけでは成立しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次检测可不产生信号，也可针对不同证据范围产生多项信号。
    en: One detection may emit no signal or several signals for different evidence spans.
    ja: 一回の検出は信号を生成しない場合も、異なる証拠範囲に複数生成する場合もあります。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 由检测活动产生
      en: produced by detection activity
      ja: 検出活動により生成される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: DetectionActivity-produces-ThreatSignal-example-positive-001
      kind: positive
      labels:
        zh: 检测器产生定位信号
        en: detector emits a located signal
        ja: 検出器が位置付き信号を生成する
      scenario_id: null
      descriptions:
        zh: scan-88 在 retrieved-chunk-19 的字符 42–97 识别到间接提示注入模式，记录 detector-v6、NISTAML.015、0.89 置信度和观察时间，产生 signal-88。
        en: scan-88 identifies an indirect-prompt-injection pattern at characters 42–97 of retrieved-chunk-19 and emits signal-88 with detector-v6, NISTAML.015, confidence 0.89, and observation time.
        ja: scan-88 は retrieved-chunk-19 の文字 42–97 で間接プロンプト注入パターンを識別し、detector-v6、NISTAML.015、確信度 0.89、観測時刻を持つ signal-88 を生成します。
      field_values: {}
      related_node_ids:
        - DetectionActivity
        - ThreatSignal
      related_relation_ids:
        - DetectionActivity-produces-ThreatSignal
      expected_result:
        zh: 建立 scan-88 produces signal-88，并可从信号反查检测器与精确证据范围。
        en: Assert scan-88 produces signal-88 and preserve reverse traceability to the detector and exact evidence span.
        ja: scan-88 produces signal-88 を記録し、検出器と正確な証拠範囲へ逆追跡可能にします。
      why_valid_or_invalid:
        zh: 信号具备分类、定位、检测器来源和时间，且明确由该次扫描发出。
        en: The signal carries classification, location, detector provenance, and time and is explicitly emitted by this scan occurrence.
        ja: 信号に分類・位置・検出器来歴・時刻があり、この走査発生から明示的に出力されています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-threat-signal-015
    - id: DetectionActivity-produces-ThreatSignal-example-boundary-001
      kind: boundary
      labels:
        zh: 静态风险分不等于检测信号
        en: static risk score is not a detector signal
        ja: 静的リスク値は検出信号ではない
      scenario_id: null
      descriptions:
        zh: 策略为所有外部文本预设风险分 0.5，但没有运行检测器、证据位置、分类命中或观察时间。
        en: A policy assigns all external text a default risk score of 0.5, but no detector ran and no evidence span, class match, or observation time exists.
        ja: 方針が全外部テキストに既定リスク 0.5 を付けますが、検出器は実行されず、証拠範囲・分類一致・観測時刻もありません。
      field_values: {}
      related_node_ids:
        - DetectionActivity
        - ThreatSignal
      related_relation_ids:
        - DetectionActivity-produces-ThreatSignal
      expected_result:
        zh: 不得建立 produces 边，也不得把该默认分数实例化为 ThreatSignal。
        en: Do not assert produces and do not instantiate the default score as a ThreatSignal.
        ja: produces 辺を作らず、既定値を ThreatSignal として実体化しません。
      why_valid_or_invalid:
        zh: 没有 DetectionActivity 发生项和可定位检测证据，缺少两端的身份条件。
        en: There is neither a DetectionActivity occurrence nor locatable detector evidence, so both endpoint identity conditions are missing.
        ja: DetectionActivity 発生も位置特定可能な検出証拠もなく、両端点の同一性条件を欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-threat-signal-016
  source_claims:
    - claim-threat-signal-017
