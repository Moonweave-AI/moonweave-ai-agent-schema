source_claims:
  - id: claim-threat-signal-001
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: ThreatSignal is one concrete detector output with locatable evidence, detector provenance, class, confidence, and time; it is not a taxonomy entry or adjudicated finding."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-threat-signal-002
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave gives each concrete detector output its own identity rather than treating the NIST attack-class identifier as an observation."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-threat-signal-003
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: The local discriminator connects a signal to the ontology specialization without claiming that NIST defines Moonweave's class hierarchy."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-threat-signal-004
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: ThreatSignal binds the taxonomy observation to the exact inspected subject, keeping the signal distinct from the subject itself."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-threat-signal-005
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave requires locatable evidence so a generic risk score without an observed span cannot become a ThreatSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-threat-signal-006
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Detector provenance supports review and cross-validation because the source discusses multiple detection schemes rather than an infallible oracle."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-threat-signal-007
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave maps a concrete observation to a threat class while preserving the difference between a NIST taxonomy entry and an emitted signal."
