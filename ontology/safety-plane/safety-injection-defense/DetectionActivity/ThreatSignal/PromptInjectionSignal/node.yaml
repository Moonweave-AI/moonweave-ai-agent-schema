  fields:
    - id: interaction_actor_ref
      labels:
        zh: 交互主体引用
        en: interaction-actor reference
        ja: interaction actor 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 通过当前活动交互通道直接提交证据内容的主体。
        en: Actor that submitted the evidence directly through the current active interaction channel.
        ja: 現在の active interaction channel から evidence を直接提出した actor です。
