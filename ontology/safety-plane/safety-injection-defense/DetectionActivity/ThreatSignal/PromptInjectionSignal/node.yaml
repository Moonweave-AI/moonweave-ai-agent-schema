schema: moonweave.ai/ontology-node/v1
id: PromptInjectionSignal
kind: concept
labels:
  zh: 直接提示注入信号
  en: Direct prompt-injection signal
  ja: 直接プロンプト注入信号
semantics:
  short_definition:
    zh: 表明当前操作者直接输入正在试图改变受信指令或越权行为的威胁信号。
    en: A threat signal that the current actor's direct input is attempting to alter trusted instructions or exceed authority.
    ja: 現在の利用者の直接入力が信頼指示の変更または権限逸脱を試みることを示す脅威信号。
  definition:
    zh: 直接提示注入信号是一种 ThreatSignal，证据来自当前交互通道中操作者直接提交的提示，并指向覆盖高权威指令、绕过安全限制、越权调用工具或外传数据的尝试。它不涵盖网页、文件、工具输出或记忆中转而来的间接注入。
    en: A direct PromptInjectionSignal is a ThreatSignal whose evidence is submitted by the current actor through the active interaction channel and attempts to override higher-authority instructions, bypass safeguards, invoke tools beyond authority, or exfiltrate data. It excludes injections arriving through webpages, files, tool output, or memory intermediaries.
    ja: 直接プロンプト注入信号は、現在の対話チャネルで利用者が直接送った証拠を持ち、上位権威指示の上書き、安全制限の回避、権限外ツール呼出し、データ流出を試みる ThreatSignal です。ウェブ、ファイル、ツール出力、記憶を介する間接注入は含みません。
  why_needed:
    zh: 直接和间接来源的信任边界、处置点与取证路径不同，不能合并为一个平级模糊信号。
    en: Direct and indirect sources have different trust boundaries, interception points, and forensic paths and must not be collapsed into an ambiguous signal.
    ja: 直接・間接の出所は信頼境界、阻止点、フォレンジック経路が異なるため、曖昧な一信号へ統合できません。
  includes:
    - zh: 包含当前用户消息中可定位的覆盖、越权、外传或安全绕过指令证据。
      en: Includes locatable override, privilege-escalation, exfiltration, or safeguard-bypass instructions in the current user's message.
      ja: 現在の利用者メッセージに位置付けられる上書き、権限逸脱、流出、安全回避の指示証拠を含みます。
  excludes:
    - zh: 不包含外部资源带入的 IndirectInjectionSignal，也不包含仅表达合法任务目标的普通提示。
      en: Excludes IndirectInjectionSignal evidence imported by an external resource and ordinary prompts that merely state a legitimate task goal.
      ja: 外部資源から入る IndirectInjectionSignal 証拠や、正当なタスク目標を述べる通常プロンプトは含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: PromptInjectionSignal 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: PromptInjectionSignal should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: PromptInjectionSignal は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-promptinjectionsignal-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "PromptInjectionSignal/example" }'
      source_claims:
        - claim-promptinjectionsignal-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys: []
  fields:
    - id: interaction_actor_ref
      labels:
        zh: 交互主体引用
        en: interaction-actor reference
        ja: interaction actor 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 通过当前活动交互通道直接提交证据内容的主体。
        en: Actor that submitted the evidence directly through the current active interaction channel.
        ja: 現在の active interaction channel から evidence を直接提出した actor です。
      allowed_values: []
      pattern: null
      example_value: user:current-42
      source_claims:
        - claim-promptinjectionsignal-design
    - id: interaction_message_ref
      labels:
        zh: 交互消息引用
        en: interaction-message reference
        ja: interaction message 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前主体直接提交且包含被检测证据的不可变消息版本。
        en: Immutable current-interaction message revision directly submitted by the actor and containing the detected evidence.
        ja: actor が直接提出し detected evidence を含む current-interaction message revision です。
      allowed_values: []
      pattern: null
      example_value: message:M-7
      source_claims:
        - claim-promptinjectionsignal-design
  constraints:
    - id: prompt-injection-signal-direct-channel
      severity: error
      expression_language: plain
      expression: signal_kind = direct-prompt-injection AND interaction_message_ref = inspected_subject_ref AND no intermediary resource carries the evidence
      explanations:
        zh: 直接提示注入信号必须来自当前主体直接提交的受检消息，而非网页、工具输出或记忆中介。
        en: A direct PromptInjectionSignal must come from the current actor's inspected message, not a webpage, tool output, or memory intermediary.
        ja: current actor の inspected message から直接来ており webpage・tool output・memory 中介ではありません。
      source_claims:
        - claim-promptinjectionsignal-design
  required_relation_constraints: []
