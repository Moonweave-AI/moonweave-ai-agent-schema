source_claims:
  - id: claim-prompt-injection-signal-001
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: PromptInjectionSignal specializes ThreatSignal by requiring evidence submitted directly by the current interaction actor in the inspected active-channel message."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-injection-signal-002
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave uses the current submitting actor to distinguish direct prompt injection evidence from resource-mediated indirect injection."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-injection-signal-003
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: The exact active-channel message is the direct-origin differentia and must match inspected_subject_ref."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-injection-signal-004
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave uses active-channel directness as the necessary sibling differentia from IndirectInjectionSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-injection-signal-005
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: PromptInjectionSignal specializes ThreatSignal by requiring evidence submitted directly by the current interaction actor in the inspected active-channel message. This positive case materializes every required inherited and local field for PromptInjectionSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-injection-signal-006
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Evidence hidden in a retrieved webpage arrives through an intermediary resource and is not a direct PromptInjectionSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-injection-signal-007
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends detection of indirect prompt injection and hidden prompt manipulation in output pipelines. Moonweave treats the observed indicator of an instruction-override attempt as PromptInjectionSignal, a specialized ThreatSignal.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 11–12, ‘Filter and monitor output pipelines and chained execution’
    evidence_kind: design-inference
