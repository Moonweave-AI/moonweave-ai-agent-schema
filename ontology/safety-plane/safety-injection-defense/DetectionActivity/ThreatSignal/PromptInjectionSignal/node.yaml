      pattern: null
      example_value: user:current-42
      source_claims:
        - claim-prompt-injection-signal-002
    - id: interaction_message_ref
      labels:
        zh: 交互消息引用
        en: interaction-message reference
        ja: interaction message 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当前主体直接提交且包含被检测证据的不可变消息版本。
        en: Immutable current-interaction message revision directly submitted by the actor and containing the detected evidence.
        ja: actor が直接提出し detected evidence を含む current-interaction message revision です。
      allowed_values: []
      pattern: null
      example_value: message:M-7
      source_claims:
        - claim-prompt-injection-signal-003
  constraints:
    - id: prompt-injection-signal-direct-channel
      severity: error
      expression_language: plain
      expression: signal_kind = direct-prompt-injection AND interaction_message_ref = inspected_subject_ref AND no intermediary resource carries the evidence
      explanations:
        zh: 直接提示注入信号必须来自当前主体直接提交的受检消息，而非网页、工具输出或记忆中介。
        en: A direct PromptInjectionSignal must come from the current actor's inspected message, not a webpage, tool output, or memory intermediary.
        ja: current actor の inspected message から直接来ており webpage・tool output・memory 中介ではありません。
      source_claims:
        - claim-prompt-injection-signal-004
  required_relation_constraints: []
