schema: moonweave.ai/ontology-node/v1
id: PromptInjectionSignal
kind: concept
status: accepted
labels:
  zh: 直接提示注入信号
  en: Direct prompt-injection signal
  ja: 直接プロンプト注入信号
semantics:
  short_definition:
    zh: 表明当前操作者直接输入正在试图改变受信指令或越权行为的威胁信号。
    en: A threat signal that the current actor's direct input is attempting to alter trusted instructions or exceed authority.
    ja: 現在の利用者の直接入力が信頼指示の変更または権限逸脱を試みることを示す脅威信号。
  definition:
    zh: 直接提示注入信号是一种 ThreatSignal，证据来自当前交互通道中操作者直接提交的提示，并指向覆盖高权威指令、绕过安全限制、越权调用工具或外传数据的尝试。它不涵盖网页、文件、工具输出或记忆中转而来的间接注入。
    en: A direct PromptInjectionSignal is a ThreatSignal whose evidence is submitted by the current actor through the active interaction channel and attempts to override higher-authority instructions, bypass safeguards, invoke tools beyond authority, or exfiltrate data. It excludes injections arriving through webpages, files, tool output, or memory intermediaries.
    ja: 直接プロンプト注入信号は、現在の対話チャネルで利用者が直接送った証拠を持ち、上位権威指示の上書き、安全制限の回避、権限外ツール呼出し、データ流出を試みる ThreatSignal です。ウェブ、ファイル、ツール出力、記憶を介する間接注入は含みません。
  why_needed:
    zh: 直接和间接来源的信任边界、处置点与取证路径不同，不能合并为一个平级模糊信号。
    en: Direct and indirect sources have different trust boundaries, interception points, and forensic paths and must not be collapsed into an ambiguous signal.
    ja: 直接・間接の出所は信頼境界、阻止点、フォレンジック経路が異なるため、曖昧な一信号へ統合できません。
  includes:
    - zh: 包含当前用户消息中可定位的覆盖、越权、外传或安全绕过指令证据。
      en: Includes locatable override, privilege-escalation, exfiltration, or safeguard-bypass instructions in the current user's message.
      ja: 現在の利用者メッセージに位置付けられる上書き、権限逸脱、流出、安全回避の指示証拠を含みます。
  excludes:
    - zh: 不包含外部资源带入的 IndirectInjectionSignal，也不包含仅表达合法任务目标的普通提示。
      en: Excludes IndirectInjectionSignal evidence imported by an external resource and ordinary prompts that merely state a legitimate task goal.
      ja: 外部資源から入る IndirectInjectionSignal 証拠や、正当なタスク目標を述べる通常プロンプトは含みません。
  semantic_kind: information
  aliases: []
structure:
