        en: Assert that the ThreatSignal indicates the corresponding PersistentContextRisk.
        ja: この ThreatSignal が対応する PersistentContextRisk を indicates すると記録します。

        en: The evidence includes both persistence and cross-session recurrence, showing that the risk is not confined to the current input.
        ja: 証拠は永続化書込みとセッション間再現を含み、リスクが現在入力だけに限られないことを示します。
      source_claims:
        - claim-persistent-context-risk-015
    - id: ThreatSignal-indicates-PersistentContextRisk-example-boundary-001
      labels:
        zh: indicates边界例
        en: Boundary case for indicates
        ja: indicatesの境界例
      descriptions:
        zh: 一次直接提示注入在当前回合被阻断，内容没有写入会话、缓存或长期记忆。
        en: A direct prompt injection is blocked in the current turn and is not written to session state, cache, or long-term memory.
        ja: 直接プロンプト注入が現在ターンで阻止され、セッション状態、キャッシュ、長期記憶へ書込まれません。
      field_values: {}
      related_node_ids:
        - ThreatSignal
        - PersistentContextRisk
      related_relation_ids:
        - ThreatSignal-indicates-PersistentContextRisk

        en: Keep the immediate PromptInjectionSignal but do not infer PersistentContextRisk from it.
        ja: 即時 PromptInjectionSignal は保持しますが、そこから PersistentContextRisk を推論しません。

        en: A threat signal does not automatically mean that content acquired a persistence or cross-session influence path.
        ja: 脅威信号の存在だけでは、内容が永続化・セッション間影響経路を得たとは言えません。
      source_claims:
