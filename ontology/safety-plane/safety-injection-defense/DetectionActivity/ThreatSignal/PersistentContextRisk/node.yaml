schema: moonweave.ai/ontology-node/v1
id: PersistentContextRisk
kind: concept
labels:
  en: persistent context risk
  zh: 持久上下文风险
  ja: 永続コンテキストリスク
semantics:
  short_definition:
    zh: 有害或越权内容跨回合、检查点或检索继续影响行为的风险质量。
    en: A risk quality that harmful or over-authoritative content persists across turns, checkpoints, or retrieval and influences behavior.
    ja: 有害または権限逸脱内容がターン、チェックポイント、検索を越えて残り挙動へ影響するリスク品質。
  definition:
    zh: 持久上下文风险是一种依附于上下文、记忆库或会话状态的质量，表示不可信、过时或敌对内容在写入、摘要、缓存、检查点或检索后仍可能被重新赋予决策影响力。它不是某条具体内容、一次投毒事件或检测信号。
    en: "PersistentContextRisk is a quality inhering in context, a memory store, or session state: untrusted, stale, or adversarial content may retain decision influence after writing, summarization, caching, checkpointing, or retrieval. It is not a particular content item, poisoning event, or detection signal."
    ja: 永続コンテキストリスクは、コンテキスト、記憶庫、セッション状態に内在し、不信頼・陳腐・敵対的内容が書込、要約、キャッシュ、チェックポイント、検索後も判断影響力を保つ可能性を表す品質です。特定内容、汚染イベント、検出信号ではありません。
  why_needed:
    zh: 信号可能消失而风险仍存在于持久状态中，因此需要独立于证据记录风险承载对象。
    en: A signal may disappear while risk remains in persistent state, so the risk-bearing subject must be represented independently from evidence.
    ja: 信号が消えても永続状態にリスクが残り得るため、証拠とは別にリスクを担う対象を表現する必要があります。
  includes:
    - zh: 包含明确承载上下文、持久机制、影响范围和评估时间的风险质量。
      en: Includes risk qualities with a stated context bearer, persistence mechanism, impact scope, and assessment time.
      ja: コンテキスト担体、永続機構、影響範囲、評価時刻を持つリスク品質を含みます。
  excludes:
    - zh: 不包含具体 PoisonedRetrievedChunk、MemoryPoisoningSignal 或普通的长会话长度。
      en: Excludes a concrete PoisonedRetrievedChunk, a MemoryPoisoningSignal, and ordinary long-session duration.
      ja: 具体的 PoisonedRetrievedChunk、MemoryPoisoningSignal、単なる長いセッション時間は含みません。
  semantic_kind: quality
  aliases: []
engineering:
  explanation:
    zh: PersistentContextRisk 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: PersistentContextRisk should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: PersistentContextRisk は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-persistentcontextrisk-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "PersistentContextRisk/example" }'
      source_claims:
        - claim-persistentcontextrisk-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - persistent_context_risk_id
  fields:
    - id: persistent_context_risk_id
      labels:
        zh: 持久上下文风险标识
        en: persistent-context-risk ID
        ja: 永続 context risk ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识对某一上下文承载对象的一次持久影响风险评估。
        en: Stable identifier for one assessment of persistent decision-influence risk in a context-bearing subject.
        ja: context 担体に内在する永続的判断影響 risk の一回の評価を安定識別します。
      allowed_values: []
      pattern: null
      example_value: persistent-context-risk-workspace-001
      source_claims:
        - claim-persistentcontextrisk-design
    - id: context_bearer_ref
      labels:
        zh: 上下文承载对象引用
        en: context-bearer reference
        ja: context 担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 风险所依附的会话状态、工作区、记忆库、缓存或检查点版本。
        en: Session state, workspace, memory store, cache, or checkpoint revision in which the risk inheres.
        ja: risk が内在する session state・workspace・memory store・cache・checkpoint revision です。
      allowed_values: []
      pattern: null
      example_value: workspace:moonweave/research
      source_claims:
        - claim-persistentcontextrisk-design
    - id: persistence_mechanism
      labels:
        zh: 持久机制
        en: persistence mechanism
        ja: 永続化機構
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 使内容跨回合继续存在的写入、摘要、缓存、检查点或检索机制。
        en: Write, summarization, cache, checkpoint, or retrieval mechanism by which content survives beyond its originating turn.
        ja: 内容を元 turn 以後も存続させる write・summary・cache・checkpoint・retrieval 機構です。
      allowed_values: []
      pattern: null
      example_value: cross-task-summary-reload
      source_claims:
        - claim-persistentcontextrisk-design
    - id: persistence_scope
      labels:
        zh: 持久范围
        en: persistence scope
        ja: 永続範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 内容可跨越的回合、任务、会话、主体或工作区边界。
        en: Turn, task, session, actor, or workspace boundary across which the content can survive.
        ja: 内容が越えて存続し得る turn・task・session・actor・workspace 境界です。
      allowed_values: []
      pattern: null
      example_value: later tasks in workspace:moonweave/research
      source_claims:
        - claim-persistentcontextrisk-design
    - id: influence_path
      labels:
        zh: 影响路径
        en: decision-influence path
        ja: 判断影響経路
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 从持久保存到后续加载、上下文组装并影响决策的有序步骤。
        en: Ordered steps from persistence through later loading and context assembly to possible decision influence.
        ja: 永続保存から後続 load・context assembly・判断影響までの順序付き経路です。
      allowed_values: []
      pattern: null
      example_value:
        - summary-write
        - workspace-store
        - next-task-autoload
        - planner-context
      source_claims:
        - claim-persistentcontextrisk-design
    - id: impact_scope
      labels:
        zh: 影响范围
        en: impact scope
        ja: 影響範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 风险可能改变的规划、工具调用、授权判断、披露或输出范围。
        en: Planning, tool invocation, authorization, disclosure, or output boundary that the persistent content may influence.
        ja: 永続内容が影響し得る planning・tool invocation・authorization・disclosure・output 範囲です。
      allowed_values: []
      pattern: null
      example_value: planner decisions in later tasks
      source_claims:
        - claim-persistentcontextrisk-design
    - id: risk_level
      labels:
        zh: 评估风险等级
        en: assessed risk level
        ja: 評価 risk level
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 结合持久可达性与潜在影响后给出的部署内等级。
        en: Deployment-local rating derived from persistence reachability and potential impact.
        ja: 永続到達可能性と潜在影響から導く deployment-local rating です。
      allowed_values: []
      pattern: null
      example_value: high
      source_claims:
        - claim-persistentcontextrisk-design
    - id: assessor_ref
      labels:
        zh: 评估主体引用
        en: assessor reference
        ja: 評価主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对该上下文承载对象与影响路径作出风险判断的人或程序化评估器。
        en: Human or programmatic assessor that evaluated the context bearer and influence path.
        ja: context 担体と影響経路を評価した人間または programmatic assessor です。
      allowed_values: []
      pattern: null
      example_value: security-reviewer-2
      source_claims:
        - claim-persistentcontextrisk-design
    - id: assessed_at
      labels:
        zh: 评估时间
        en: assessed at
        ja: 評価時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对指定上下文版本及其持久机制完成评估的 UTC 时间。
        en: UTC instant when the stated context revision and persistence mechanism were assessed.
        ja: 指定 context revision と永続化機構を評価した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T11:20:00Z
      source_claims:
        - claim-persistentcontextrisk-design
  constraints:
    - id: persistent-context-risk-requires-reachable-influence
      severity: error
      expression_language: plain
      expression: persistence_mechanism, persistence_scope, and influence_path demonstrate survival beyond the originating turn AND a reachable later decision boundary
      explanations:
        zh: 只有内容能跨越原回合并沿可说明路径进入后续决策时，才成立持久上下文风险。
        en: PersistentContextRisk exists only when content can survive its originating turn and has an explained path to a later decision boundary.
        ja: 内容が元 turn を越えて存続し、後続判断への説明可能な経路を持つ場合のみ成立します。
      source_claims:
        - claim-persistentcontextrisk-design
    - id: persistent-context-risk-not-signal-or-content
      severity: error
      expression_language: plain
      expression: PersistentContextRisk MUST NOT use a content-item ID or threat-signal ID as its own identity; it assesses the context bearer independently
      explanations:
        zh: 风险质量不等同于受污染内容或指出它的信号；信号消失后风险仍可存在。
        en: The risk quality is not the poisoned content or the signal indicating it; the risk may remain after a signal is gone.
        ja: risk quality は汚染 content や指示 signal と同一ではなく、signal 消失後も残り得ます。
      source_claims:
        - claim-persistentcontextrisk-design
  required_relation_constraints: []
