      descriptions:
        zh: memory-poisoning-signal-6 指向一条已写入长期记忆并在三个后续会话被检索的恶意指令。
        en: Memory-poisoning-signal-6 points to a malicious instruction written to long-term memory and retrieved in three later sessions.
        ja: memory-poisoning-signal-6 が長期記憶へ書込まれ、後続三セッションで検索された悪意指示を示します。
      field_values: {}
      related_node_ids:
