      zh: 工作区摘要会在后续任务自动加载，且当前没有来源过滤；该工作区被评为高 PersistentContextRisk。
      en: Workspace summaries are automatically loaded into later tasks without source filtering, so the workspace is assessed as high PersistentContextRisk.
      ja: 作業空間要約が出所フィルタなしで後続タスクへ自動読込されるため、作業空間を高い PersistentContextRisk と評価します。
    field_values:
      persistent_context_risk_id: persistent-context-risk-workspace-001
