      en: Validation should classify the record as PersistentContextRisk while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を PersistentContextRisk と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含明确承载上下文、持久机制、影响范围和评估时间的风险质量。
      en: Includes risk qualities with a stated context bearer, persistence mechanism, impact scope, and assessment time.
      ja: コンテキスト担体、永続機構、影響範囲、評価時刻を持つリスク品質を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
