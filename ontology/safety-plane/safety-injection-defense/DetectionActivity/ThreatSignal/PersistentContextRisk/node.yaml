      persistence_mechanism: cross-task-summary-reload
      persistence_scope: later tasks in workspace:moonweave/research
      influence_path:
        - summary-write
        - workspace-store
        - next-task-autoload
        - planner-context
      impact_scope: planner decisions in later tasks
      risk_level: high
      assessor_ref: security-reviewer-2
      assessed_at: 2026-07-14T11:20:00Z
    related_node_ids:
