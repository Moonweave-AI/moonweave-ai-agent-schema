      en: A malicious webpage exists only in an ephemeral buffer that is never persisted; it may be PoisonedContent but does not thereby create cross-session persistent risk.
      ja: 悪意あるウェブ内容が永続化されない一時バッファだけにある場合、PoisonedContent ではあっても、それだけでセッション間の永続リスクにはなりません。
