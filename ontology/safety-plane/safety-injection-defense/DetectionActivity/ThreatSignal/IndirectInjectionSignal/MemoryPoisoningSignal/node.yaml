schema: moonweave.ai/ontology-node/v1
id: MemoryPoisoningSignal
kind: concept
status: accepted
labels:
  en: memory poisoning signal
  zh: 记忆投毒信号
  ja: メモリ汚染信号
semantics:
  short_definition:
    zh: 表明持久记忆或检索知识中的内容正间接影响后续行为的注入信号。
    en: An indirect-injection signal that persistent memory or retrieved knowledge is influencing later behavior.
    ja: 永続記憶または検索知識の内容が後続挙動へ間接的に影響していることを示す注入信号。
  definition:
    zh: 记忆投毒信号是一种 IndirectInjectionSignal，其证据位于已写入的记忆条目、摘要、向量索引或检索块，并能关联到后续上下文或决策。它不是记忆记录本身，也不把所有过时或低质量记忆都视为攻击。
    en: A MemoryPoisoningSignal is an IndirectInjectionSignal whose evidence resides in a stored memory item, summary, vector index, or retrieved chunk and can be linked to later context or a decision. It is not the memory record itself and does not classify every stale or low-quality memory as an attack.
    ja: 記憶汚染信号は、保存済み記憶項目、要約、ベクトル索引、検索断片に証拠があり、後続のコンテキストまたは判断へ結び付けられる IndirectInjectionSignal です。記憶記録そのものではなく、古い・低品質な記憶をすべて攻撃とは扱いません。
  why_needed:
    zh: 持久化使一次注入跨回合复现，需要单独记录写入点、检索点和后续影响。
    en: Persistence lets one injection reappear across turns, so write point, retrieval point, and later influence must be recorded separately.
    ja: 永続化により一度の注入が複数ターンで再現するため、書込点、検索点、後続影響を別々に記録する必要があります。
  includes:
    - zh: 包含可定位到记忆条目或检索块、带注入证据且关联后续使用的信号。
      en: Includes signals located in a memory item or retrieved chunk with injection evidence and a linked downstream use.
      ja: 記憶項目または検索断片に位置付けられ、注入証拠と後続使用へのリンクを持つ信号を含みます。
  excludes:
    - zh: 不包含因自然过时造成的错误记忆、尚未被检测的 PoisonedRetrievedChunk 本体，也不包含 OWASP LLM03 所指的训练数据投毒（本概念仅覆盖运行期持久记忆与检索通道）。
      en: Excludes naturally stale memory, a PoisonedRetrievedChunk that has not itself yielded a detection signal, and OWASP LLM03 training-data poisoning (this concept covers runtime persistent memory and retrieval channels only).
      ja: 自然な陳腐化による誤記憶、まだ検出信号を生んでいない PoisonedRetrievedChunk 自体、OWASP LLM03 の training-data poisoning（本概念は runtime persistent memory と retrieval channel のみ）を含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: memory_item_ref
      labels:
        zh: 记忆项引用
        en: memory-item reference
        ja: memory item 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 包含注入证据并在此前被持久化的具体记忆、摘要或索引项版本。
        en: Concrete persisted memory, summary, or index-item revision containing the injection evidence.
        ja: injection evidence を含む以前に永続化された memory・summary・index-item revision です。
      allowed_values: []
      pattern: null
      example_value: memory:summary-441@7
      source_claims:
        - claim-memory-poisoning-signal-002
    - id: retrieval_event_ref
      labels:
        zh: 检索事件引用
        en: retrieval-event reference
        ja: retrieval event 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 把该记忆项重新带入当前处理上下文的具体检索事件。
        en: Concrete retrieval event that brought the memory item back into the current processing context.
        ja: memory item を current processing context へ戻した具体的 retrieval event です。
      allowed_values: []
      pattern: null
      example_value: retrieval-event:batch-19/item-4
      source_claims:
        - claim-memory-poisoning-signal-003
    - id: downstream_context_ref
      labels:
        zh: 下游上下文引用
        en: downstream-context reference
        ja: downstream context 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 检索记忆项进入并可能影响计划或行为的具体上下文版本。
        en: Concrete context revision into which the retrieved memory entered and could influence planning or behavior.
        ja: retrieved memory が入り planning・behavior に影響し得る具体的 context revision です。
      allowed_values: []
      pattern: null
      example_value: context:task-T-44/turn-3
      source_claims:
        - claim-memory-poisoning-signal-004
  constraints:
    - id: memory-poisoning-signal-persistence-and-retrieval
      severity: error
      expression_language: plain
      expression: signal_kind = memory-poisoning AND memory_item_ref was persisted before retrieval_event_ref AND retrieval_event_ref loads it into downstream_context_ref
      explanations:
        zh: 记忆投毒信号必须同时证明此前持久化、当前检索和下游上下文暴露。
        en: A MemoryPoisoningSignal must demonstrate prior persistence, current retrieval, and exposure in a downstream context.
        ja: 以前の persistence・現在の retrieval・downstream context exposure を同時に示します。
      source_claims:
        - claim-memory-poisoning-signal-005
  required_relation_constraints: []
