      zh: 验证器应把该记录识别为 MemoryPoisoningSignal，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as MemoryPoisoningSignal while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を MemoryPoisoningSignal と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含可定位到记忆条目或检索块、带注入证据且关联后续使用的信号。
      en: Includes signals located in a memory item or retrieved chunk with injection evidence and a linked downstream use.
      ja: 記憶項目または検索断片に位置付けられ、注入証拠と後続使用へのリンクを持つ信号を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-memory-poisoning-signal-006
  - id: MemoryPoisoningSignal-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 记忆投毒信号边界例
      en: Boundary case for memory poisoning signal
      ja: メモリ汚染信号の境界例
    scenario_id: null
    descriptions:
      zh: 记忆中的航班价格已过期但没有对系统发号施令或恶意操纵证据；这是数据新鲜度问题，不是 MemoryPoisoningSignal。
      en: A remembered airfare is stale but contains no instruction or evidence of adversarial manipulation; this is a freshness problem, not a MemoryPoisoningSignal.
      ja: 記憶した航空運賃が古いだけで指示や敵対的操作の証拠がないため、鮮度問題であり MemoryPoisoningSignal ではありません。
