    descriptions: {zh: "记忆投毒信号(MemoryPoisoningSignal) [MemoryPoisoningSignal]: 表明持久记忆或检索知识中的内容正间接影响后续行为的注入信号。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: downstream_context_ref, retrieval_event_ref, memory_item_ref.", en: "memory poisoning signal (MemoryPoisoningSignal) [MemoryPoisoningSignal]: An indirect-injection signal that persistent memory or retrieved knowledge is influencing later behavior.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include downstream_context_ref, retrieval_event_ref, memory_item_ref.", ja: "メモリ汚染信号(MemoryPoisoningSignal) [MemoryPoisoningSignal]: 永続記憶または検索知識の内容が後続挙動へ間接的に影響していることを示す注入信号。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: downstream_context_ref, retrieval_event_ref, memory_item_ref."}
