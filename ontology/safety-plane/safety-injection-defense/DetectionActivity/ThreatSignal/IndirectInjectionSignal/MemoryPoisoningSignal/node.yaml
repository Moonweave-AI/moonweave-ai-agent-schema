      descriptions:
        zh: 记忆中的航班价格已过期但没有对系统发号施令或恶意操纵证据；这是数据新鲜度问题，不是 MemoryPoisoningSignal。
        en: A remembered airfare is stale but contains no instruction or evidence of adversarial manipulation; this is a freshness problem, not a MemoryPoisoningSignal.
        ja: 記憶した航空運賃が古いだけで指示や敵対的操作の証拠がないため、鮮度問題であり MemoryPoisoningSignal ではありません。
      field_values: {}
