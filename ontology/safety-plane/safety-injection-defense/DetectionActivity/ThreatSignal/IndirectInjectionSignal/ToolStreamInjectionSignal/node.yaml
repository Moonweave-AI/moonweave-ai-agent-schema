    descriptions: {zh: "工具流注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: 表明流式工具输出中的内容正间接注入后续上下文的威胁信号。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref.", en: "tool stream injection signal (ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: An indirect-injection signal that content in streamed tool output is influencing downstream context.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include stream_chunk_locator, downstream_target_ref, tool_call_ref.", ja: "ツールストリーム注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: ストリーム型ツール出力の内容が下流コンテキストへ間接注入していることを示す脅威信号。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref."}
    field_values:
      downstream_target_ref: "tool-call:upload-next"
