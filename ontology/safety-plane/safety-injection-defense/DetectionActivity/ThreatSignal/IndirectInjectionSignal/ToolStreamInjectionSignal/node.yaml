    labels:
      zh: 工具流注入信号 - CVE-2024-5184 邮件助手
      en: tool stream injection signal - CVE-2024-5184 email assistant
      ja: ツールストリーム注入信号 - CVE-2024-5184 メール assistant
    descriptions: {zh: "工具流注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: 表明流式工具输出中的内容正间接注入后续上下文的威胁信号。. OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref.", en: "tool stream injection signal (ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: An indirect-injection signal that content in streamed tool output is influencing downstream context.. OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content. Fields include stream_chunk_locator, downstream_target_ref, tool_call_ref.", ja: "ツールストリーム注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: ストリーム型ツール出力の内容が下流コンテキストへ間接注入していることを示す脅威信号。. OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref."}
    field_values:
