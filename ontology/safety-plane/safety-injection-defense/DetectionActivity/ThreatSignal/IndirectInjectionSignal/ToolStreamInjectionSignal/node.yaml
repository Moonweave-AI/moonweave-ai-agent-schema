      ja: ツールストリーム注入信号 - Greshake Bing Chat 間接注入
    descriptions: {zh: "工具流注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: 表明流式工具输出中的内容正间接注入后续上下文的威胁信号。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref.", en: "tool stream injection signal (ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: An indirect-injection signal that content in streamed tool output is influencing downstream context.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include stream_chunk_locator, downstream_target_ref, tool_call_ref.", ja: "ツールストリーム注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: ストリーム型ツール出力の内容が下流コンテキストへ間接注入していることを示す脅威信号。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref."}
    field_values:
      downstream_target_ref: "tool-call:upload-next"
      stream_chunk_locator: "chunk:19/chars:0-42"
      tool_call_ref: "tool-call:call-8"
    related_node_ids:
