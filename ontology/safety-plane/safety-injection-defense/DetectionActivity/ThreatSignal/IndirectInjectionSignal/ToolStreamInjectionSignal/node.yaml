    source: eng-security-mcp-nsa-2026
    supports: NSA describes malicious tool outputs and hidden instructions propagating into downstream agents and requires each chained output to be logged and inspected. Moonweave therefore requires an explicit same-output identity and span before asserting that a ToolStreamInjectionSignal flags a MaliciousToolOutput.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–13, ‘Poisoning output for downstream automation’ and ‘Filter and monitor output pipelines and chained execution’
    evidence_kind: design-inference
