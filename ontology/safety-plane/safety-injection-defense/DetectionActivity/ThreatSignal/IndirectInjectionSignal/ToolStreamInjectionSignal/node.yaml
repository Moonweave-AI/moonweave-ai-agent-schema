relations:
  - id: ToolStreamInjectionSignal-flags-MaliciousToolOutput
    predicate: flags
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 标记恶意工具输出
      en: flags malicious tool output
      ja: 悪意あるツール出力を標識する
    definitions:
      zh: ToolStreamInjectionSignal 仅在其证据明确引用同一工具结果或流片段的身份、版本与可定位范围时，标记该 MaliciousToolOutput。该边把检测信号连接到被标记的载荷对象，但信号本身不是受污染内容，也不能单凭风险分数把普通错误输出裁定为恶意。
      en: A ToolStreamInjectionSignal flags a MaliciousToolOutput only when its evidence identifies the same tool-result or stream-fragment identity, version, and locatable span. The edge connects a detection signal to the payload it flags; the signal is not the contaminated content, and a risk score alone cannot adjudicate an ordinary error output as malicious.
      ja: ToolStreamInjectionSignal は、証拠が同じ tool result または stream fragment の識別子・版・特定可能範囲を明示する場合だけ、その MaliciousToolOutput を標識します。この辺は検出信号を対象 payload へ結びますが、信号自体は汚染内容ではなく、risk score だけで通常の error output を悪意ありと裁決できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次信号可标记同一工具结果中的一个或多个证据范围，一份恶意输出也可被多个检测器独立标记，因此不施加全局基数。
      en: One signal may flag one or more evidence spans in the same tool result, and one malicious output may be flagged independently by multiple detectors, so no universal cardinality applies.
      ja: 一つの signal が同じ tool result 内の複数 evidence span を標識でき、一つの悪意出力を複数 detector が独立標識できるため、一律の基数は課しません。
    inverse_reading:
      predicate: flagged_by
      labels:
        zh: 被工具流注入信号标记
        en: flagged by tool-stream injection signal
        ja: ツールストリーム注入信号により標識される
    conditions:
      - id: ToolStreamInjectionSignal-flags-MaliciousToolOutput-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the signal evidence and the malicious-output record reference the same tool-result or stream identity, object version, and locatable evidence span; status proximity, a generic transport error, or a signal from another result is insufficient.
        explanations:
          zh: 仅当信号证据与恶意输出记录指向同一工具结果或流身份、同一对象版本以及可复现的证据范围时建立此边；状态相邻、普通传输错误或属于另一结果的信号均不足以成立。
          en: Assert this edge only when the signal evidence and malicious-output record reference the same tool-result or stream identity, the same object version, and a reproducible evidence span; status proximity, an ordinary transport error, or a signal from another result is insufficient.
          ja: signal 証拠と悪意出力 record が同じ tool result または stream identity、同じ object version、再現可能な evidence span を参照する場合だけこの辺を成立させます。状態の近接、通常 transport error、別 result の signal では不十分です。
        source_claims:
          - claim-toolstreaminjectionsignal-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-toolstreaminjectionsignal-design
    distinct_fact_rationale:
      zh: flags 记录哪一个检测信号指向哪一份具体恶意输出；它不能由信号的类型边或投毒事件 affects 内容边推出。
      en: flags records which detection signal points to which concrete malicious output; neither the signal taxonomy nor a poisoning-event affects edge entails that evidence binding.
      ja: flags は、どの検出 signal がどの具体的悪意 output を指すかを記録し、signal taxonomy や poisoning event の affects 辺からは導出できません。
    layout_role: cross-link
    target: concept:MaliciousToolOutput
  - id: ToolStreamInjectionSignal-about-ToolResult
    predicate: about
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 关于工具结果
      en: is about tool result
      ja: ツール結果について
    definitions:
      zh: ToolStreamInjectionSignal 指向其可疑文本片段实际来自的同一个 ToolResult，并保留 result_id、块或范围、检测器版本、分数与证据摘要；该关系只陈述信号的证据对象，不把信号当作已证实攻击。
      en: ToolStreamInjectionSignal is about the same ToolResult from which its suspicious text span actually originated and retains result_id, chunk or range, detector version, score, and evidence digest; the relation states the signal's evidence subject without treating the signal as a confirmed attack.
      ja: ToolStreamInjectionSignal は suspicious text span の実際の出所である同一 ToolResult を指し result_id・chunk/range・detector version・score・evidence digest を保持し signal を confirmed attack と扱わず evidence subject のみを述べます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 事实数量取决于可核验的检测运行，不强加统一基数。
      en: The count depends on verifiable detection runs, so no universal cardinality is imposed.
      ja: fact 数は検証可能 detection run に依存し共通 cardinality は課しません。
    inverse_reading:
      predicate: is_target_of_about
      labels:
        zh: 反向：关于工具结果
        en: "inverse: is about tool result"
        ja: 逆方向：ツール結果について
    conditions:
      - id: ToolStreamInjectionSignal-about-ToolResult-condition-manual-20260717
        severity: error
        expression_language: plain
        expression: Assert only when the signal's subject_ref, result identity, and evidence range all resolve to the same ToolResult and the cited text can be reproduced from that immutable result version; sharing only a ToolCall or detection time is insufficient.
        explanations:
          zh: 仅当信号的 subject_ref、结果标识和证据范围都解析到同一 ToolResult，且引用文本可在该不可变结果版本中复现时成立；只共享 ToolCall 或检测时间不足。
          en: Assert only when the signal's subject_ref, result identity, and evidence range all resolve to the same ToolResult and the cited text can be reproduced from that immutable result version; sharing only a ToolCall or detection time is insufficient.
          ja: signal subject_ref・result identity・evidence range が同一 ToolResult に解決され cited text が immutable result version から再現できる場合のみ成立し ToolCall や detection time の共有だけでは不十分です。
        source_claims:
          - claim-toolstreaminjectionsignal-design
          - claim-toolstreaminjectionsignal-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-toolstreaminjectionsignal-design
      - claim-toolstreaminjectionsignal-design
    distinct_fact_rationale: null
    layout_role: cross-link
    target: concept:ToolResult
