  - id: claim-tool-stream-injection-signal-012
    source: eng-security-mcp-nsa-2026
    supports: NSA documents hidden instructions in tool outputs that manipulate downstream agents and recommends inspecting every output before forwarding it. Moonweave binds that inspection signal to the exact output version and span rather than inferring the edge from tool membership.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–13, poisoning output and chained-output inspection
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-stream-injection-signal-013
    source: eng-security-mcp-nsa-2026
    supports: NSA calls for exact invocation identities, parameters, result evidence, and anomaly inspection across chained pipelines. Moonweave uses those traceability requirements to reject a flags edge based only on display proximity or a generic transport failure.
