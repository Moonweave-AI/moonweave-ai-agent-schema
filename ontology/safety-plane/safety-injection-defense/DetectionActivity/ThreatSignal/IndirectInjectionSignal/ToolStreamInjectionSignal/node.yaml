schema: moonweave.ai/ontology-node/v1
id: ToolStreamInjectionSignal
kind: concept
status: accepted
labels:
  en: tool stream injection signal
  zh: 工具流注入信号
  ja: ツールストリーム注入信号
semantics:
  short_definition:
    zh: 表明流式工具输出中的内容正间接注入后续上下文的威胁信号。
    en: An indirect-injection signal that content in streamed tool output is influencing downstream context.
    ja: ストリーム型ツール出力の内容が下流コンテキストへ間接注入していることを示す脅威信号。
  definition:
    zh: 工具流注入信号是一种 IndirectInjectionSignal，证据来自尚在流式传输或分块到达的工具结果、日志或远程产物，并指出某片段企图改变后续计划、参数、路由或披露。它是检测证据，不是 MaliciousToolOutput 载荷本身。
    en: A ToolStreamInjectionSignal is an IndirectInjectionSignal whose evidence comes from a tool result, log, or remote artifact arriving as a stream or chunks and identifies a span attempting to alter downstream planning, arguments, routing, or disclosure. It is detection evidence, not the MaliciousToolOutput payload itself.
    ja: ツールストリーム注入信号は、ストリームまたは分割で到着中のツール結果、ログ、遠隔成果物から証拠を得て、下流の計画、引数、経路、開示を変えようとする範囲を示す IndirectInjectionSignal です。検出証拠であり MaliciousToolOutput ペイロードそのものではありません。
  why_needed:
    zh: 流完成前就可能触发规划，需要记录块序号和到达时间以便在提交副作用前阻断。
    en: Planning can be influenced before a stream completes, so chunk order and arrival time must be recorded to block before side-effect commit.
    ja: ストリーム完了前に計画へ影響し得るため、チャンク順と到着時刻を記録し副作用確定前に阻止します。
  includes:
    - zh: 包含工具调用、流或块序号、证据范围、检测器、置信度和下游影响目标。
      en: Includes tool call, stream or chunk sequence, evidence span, detector, confidence, and downstream influence target.
      ja: ツール呼出し、ストリームまたはチャンク順、証拠範囲、検出器、確信度、下流影響対象を含みます。
  excludes:
    - zh: 不包含完整但普通的工具错误、恶意输出对象本身或非工具来源的间接信号。
      en: Excludes ordinary completed tool errors, the malicious output object itself, and indirect signals from non-tool sources.
      ja: 通常の完了済みツールエラー、悪意出力対象そのもの、非ツール由来の間接信号は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: tool_call_ref
      labels:
        zh: 工具调用引用
        en: tool-call reference
        ja: tool call 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生携带注入证据之流式输出的具体工具调用。
        en: Concrete tool call that produced the streamed output carrying injection evidence.
        ja: injection evidence を含む streamed output を生成した具体的 tool call です。
      allowed_values: []
      pattern: null
      example_value: tool-call:call-8
      source_claims:
        - claim-tool-stream-injection-signal-002
    - id: stream_chunk_locator
      labels:
        zh: 流块位置
        en: stream-chunk locator
        ja: stream chunk locator
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在工具输出流中定位证据的块序号及块内范围。
        en: Chunk sequence and within-chunk range locating the evidence in the tool-output stream.
        ja: tool-output stream 内の evidence を特定する chunk sequence と chunk 内範囲です。
      allowed_values: []
      pattern: null
      example_value: chunk:19/chars:0-42
      source_claims:
        - claim-tool-stream-injection-signal-003
    - id: downstream_target_ref
      labels:
        zh: 下游影响目标引用
        en: downstream-target reference
        ja: downstream target 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证据试图改变的后续计划、工具调用、路由或披露对象。
        en: Subsequent plan, tool call, route, or disclosure object that the evidence attempts to alter.
        ja: evidence が変更を試みる後続 plan・tool call・route・disclosure object です。
      allowed_values: []
      pattern: null
      example_value: tool-call:upload-next
      source_claims:
        - claim-tool-stream-injection-signal-004
  constraints:
    - id: tool-stream-injection-signal-stream-origin
      severity: error
      expression_language: plain
      expression: signal_kind = tool-stream-injection AND tool_call_ref produced intermediary_resource_ref AND stream_chunk_locator refines evidence_locator
      explanations:
        zh: 工具流注入信号必须来自具体工具调用的特定流块并指向下游影响目标。
        en: A tool-stream injection signal must originate in a specific chunk of one tool call and identify its attempted downstream target.
        ja: 一つの tool call の特定 chunk から発生し、downstream target を示します。
      source_claims:
        - claim-tool-stream-injection-signal-005
  required_relation_constraints: []
