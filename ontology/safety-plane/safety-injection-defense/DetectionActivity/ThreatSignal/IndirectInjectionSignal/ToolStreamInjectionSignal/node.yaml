    descriptions: {zh: "工具流注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: 表明流式工具输出中的内容正间接注入后续上下文的威胁信号。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} 返回 {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}}。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref.", en: "tool stream injection signal (ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: An indirect-injection signal that content in streamed tool output is influencing downstream context.. Lakera Guard POST https://api.lakera.ai/v2/guard with {\"input\": \"user message\", \"breakdown\": true} returns {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} (docs.lakera.ai). Fields include stream_chunk_locator, downstream_target_ref, tool_call_ref.", ja: "ツールストリーム注入信号(ToolStreamInjectionSignal) [ToolStreamInjectionSignal]: ストリーム型ツール出力の内容が下流コンテキストへ間接注入していることを示す脅威信号。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} は {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} を返す。 Fields: stream_chunk_locator, downstream_target_ref, tool_call_ref."}
    field_values:
