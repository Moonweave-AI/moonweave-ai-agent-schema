        en: A retrieved web chunk contains hidden text instructing the agent to ignore system instructions and call an exfiltration tool; the detector records evidence that external content entered through retrieval.
        ja: 取得した Web チャンクに、システム指示を無視して外部送信ツールを呼ぶ隠し文があり、検出器は外部内容が検索経由で推論へ入った兆候を記録します。
      field_values: {}
      related_node_ids:
        - IndirectInjectionSignal
        - ThreatSignal
      related_relation_ids:
        - IndirectInjectionSignal-is_a-ThreatSignal

        en: Classify the record as IndirectInjectionSignal, inheriting the general alert semantics of ThreatSignal.
        ja: この記録を IndirectInjectionSignal と分類し、ThreatSignal の一般的警告意味を継承させます。

        en: The evidence originates in retrieved content rather than a direct user instruction and exposes an observable path to downstream behavior.
        ja: 兆候は直接のユーザー指示でなく検索内容に由来し、後続動作へ至る観測可能な経路があります。
      source_claims:
        - claim-indirect-injection-signal-007
    - id: IndirectInjectionSignal-is_a-ThreatSignal-example-boundary-001
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      descriptions:
        zh: 网页分块只包含普通产品说明，没有命令模型改变目标、泄露数据或调用工具的内容。
        en: A retrieved page contains ordinary product documentation and no instruction to change goals, disclose data, or invoke a tool.
        ja: 取得ページは通常の製品説明だけで、目標変更、情報開示、ツール呼出しを求める指示を含みません。
      field_values: {}
      related_node_ids:
        - IndirectInjectionSignal
        - ThreatSignal
      related_relation_ids:
        - IndirectInjectionSignal-is_a-ThreatSignal

        en: Do not create an IndirectInjectionSignal merely because content was externally retrieved.
        ja: 外部検索由来というだけで IndirectInjectionSignal を作成してはいけません。

        en: An untrusted origin is a review condition, not by itself evidence of an attempt to manipulate behavior.
        ja: 不信な由来は審査条件であり、行動操作の試みを示す脅威信号そのものではありません。
      source_claims:
        - claim-indirect-injection-signal-007
