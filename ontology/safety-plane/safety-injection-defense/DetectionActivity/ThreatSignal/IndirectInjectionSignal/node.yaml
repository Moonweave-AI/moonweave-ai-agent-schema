      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: IndirectInjectionSignal-is_a-ThreatSignal-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 检索到的网页分块含有要求忽略系统指令并调用外发工具的隐藏文本；检测器记录该外部内容经检索进入推理链的迹象。
        en: A retrieved web chunk contains hidden text instructing the agent to ignore system instructions and call an exfiltration tool; the detector records evidence that external content entered through retrieval.
        ja: 取得した Web チャンクに、システム指示を無視して外部送信ツールを呼ぶ隠し文があり、検出器は外部内容が検索経由で推論へ入った兆候を記録します。
      field_values: {}
      related_node_ids:
        - IndirectInjectionSignal
        - ThreatSignal
      related_relation_ids:
        - IndirectInjectionSignal-is_a-ThreatSignal
      expected_result:
        zh: 把该记录归为 IndirectInjectionSignal，并由其继承 ThreatSignal 的一般告警语义。
        en: Classify the record as IndirectInjectionSignal, inheriting the general alert semantics of ThreatSignal.
        ja: この記録を IndirectInjectionSignal と分類し、ThreatSignal の一般的警告意味を継承させます。
      why_valid_or_invalid:
        zh: 威胁迹象来自非用户直接指令的检索内容，且存在影响后续行为的可观察通路。
        en: The evidence originates in retrieved content rather than a direct user instruction and exposes an observable path to downstream behavior.
        ja: 兆候は直接のユーザー指示でなく検索内容に由来し、後続動作へ至る観測可能な経路があります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
