        en: Do not create an IndirectInjectionSignal merely because content was externally retrieved.
        ja: 外部検索由来というだけで IndirectInjectionSignal を作成してはいけません。
      why_valid_or_invalid:
        zh: 不可信来源是审查条件，不等于已经出现试图操纵行为的威胁信号。
        en: An untrusted origin is a review condition, not by itself evidence of an attempt to manipulate behavior.
        ja: 不信な由来は審査条件であり、行動操作の試みを示す脅威信号そのものではありません。
