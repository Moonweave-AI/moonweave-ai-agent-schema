schema: moonweave.ai/ontology-node/v1
id: IndirectInjectionSignal
kind: concept
labels:
  en: indirect injection signal
  zh: 间接注入信号
  ja: 間接注入信号
semantics:
  short_definition:
    zh: 表明第三方内容经检索、工具、记忆或协议中介影响模型的威胁信号。
    en: A threat signal that evidence from an intermediary or third-party resource is influencing model behavior.
    ja: 第三者資源や中介経路の証拠がモデル挙動へ影響していることを示す脅威信号。
  definition:
    zh: 间接注入信号是一种 ThreatSignal，其证据不来自当前操作者直接提交的提示，而来自网页、文件、检索块、持久记忆、工具结果或远程代理产物等中介资源。它记录可定位的指令样内容及其进入上下文的路径，不等同于受污染内容本身。
    en: An IndirectInjectionSignal is a ThreatSignal whose evidence comes not from the current actor's direct prompt but through an intermediary resource such as a webpage, file, retrieved chunk, persistent memory, tool result, or remote-agent artifact. It records locatable instruction-like evidence and its path into context; it is not the poisoned content itself.
    ja: 間接注入信号は、現在の利用者が直接送ったプロンプトではなく、ウェブページ、ファイル、検索断片、永続記憶、ツール結果、遠隔エージェント成果物などの中介資源から得た証拠を持つ ThreatSignal です。位置指定可能な指示様内容とコンテキストへの経路を記録し、汚染内容そのものではありません。
  why_needed:
    zh: 直接输入与第三方资源具有不同的信任边界和阻断位置，必须在信号层区分。
    en: Direct input and third-party resources cross different trust boundaries and require different interception points, so their signals must be distinguished.
    ja: 直接入力と第三者資源は異なる信頼境界と阻止点を持つため、信号段階で区別する必要があります。
  includes:
    - zh: 包含能追溯到外部资源或中介产物的隐藏指令、越权请求或数据外传提示证据。
      en: Includes hidden instructions, privilege-escalation requests, or exfiltration cues traceable to an external resource or intermediary artifact.
      ja: 外部資源や中介成果物へ追跡できる隠し指示、権限逸脱要求、情報流出の手掛かりを含みます。
  excludes:
    - zh: 不包含用户在当前受信通道直接输入的注入信号，也不包含仅因来源未知而尚无指令证据的内容。
      en: Excludes injection evidence submitted directly through the current trusted interaction channel and content that is merely of unknown origin without instruction evidence.
      ja: 現在の対話チャネルから直接提出された注入証拠や、出所不明だけで指示証拠のない内容は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: IndirectInjectionSignal 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: IndirectInjectionSignal should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: IndirectInjectionSignal は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-indirectinjectionsignal-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "IndirectInjectionSignal/example" }'
      source_claims:
        - claim-indirectinjectionsignal-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys: []
  fields:
    - id: intermediary_resource_ref
      labels:
        zh: 中介资源引用
        en: intermediary-resource reference
        ja: 中介 resource 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 攻击者控制并把指令样证据带入系统的数据资源版本。
        en: Data-resource revision under resource control that carried the instruction-like evidence into the system.
        ja: resource control 下で指示様 evidence を system へ運んだ data-resource revision です。
      allowed_values: []
      pattern: null
      example_value: webpage:https://x.example@sha256:91e
      source_claims:
        - claim-indirectinjectionsignal-design
    - id: context_ingress_path
      labels:
        zh: 上下文进入路径
        en: context-ingress path
        ja: context 流入経路
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证据从外部资源经检索、工具或记忆进入模型上下文的有序步骤。
        en: Ordered retrieval, tool, or memory steps by which evidence moved from the external resource into model context.
        ja: evidence が外部 resource から retrieval・tool・memory を経て model context へ入る順序付き経路です。
      allowed_values: []
      pattern: null
      example_value:
        - web-fetch
        - html-extract
        - prompt-assembly
      source_claims:
        - claim-indirectinjectionsignal-design
  constraints:
    - id: indirect-injection-signal-resource-path
      severity: error
      expression_language: plain
      expression: signal_kind = indirect-prompt-injection AND context_ingress_path starts at intermediary_resource_ref and ends at inspected_subject_ref
      explanations:
        zh: 间接注入信号必须说明受控资源如何把证据带入受检上下文。
        en: An indirect injection signal must show how the controlled resource carried evidence into the inspected context.
        ja: controlled resource が evidence を inspected context へ運んだ経路を示します。
      source_claims:
        - claim-indirectinjectionsignal-design
  required_relation_constraints: []
