source_claims:
  - id: claim-indirect-injection-signal-001
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: IndirectInjectionSignal specializes ThreatSignal by requiring a resource-controlled intermediary and a path from that resource into model context."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-indirect-injection-signal-002
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave records the intermediary resource that differentiates indirect injection from a current actor's direct prompt."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-indirect-injection-signal-003
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: The ingress path is required to distinguish evidence arriving through resource control from evidence supplied directly in the active interaction."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-indirect-injection-signal-004
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Moonweave uses the resource-to-context path as the necessary differentia for IndirectInjectionSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-indirect-injection-signal-005
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: IndirectInjectionSignal specializes ThreatSignal by requiring a resource-controlled intermediary and a path from that resource into model context. This positive case materializes every required inherited and local field for IndirectInjectionSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-indirect-injection-signal-006
    source: eng-security-nist-ai-100-2e2025
    supports: "Direct source premise: NIST classifies indirect prompt injection as NISTAML.015 and describes detector-based defenses, filtering instructions from third-party data, separating trusted from untrusted data, and disregarding untrusted instructions. Moonweave design inference: Evidence submitted directly in the active user message lacks a resource-controlled intermediary and belongs outside IndirectInjectionSignal."
    locator: NIST AI 100-2e2025 §3.4 and §3.4.4, NISTAML.015, pp. 50–53
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-indirect-injection-signal-007
    source: eng-security-mcp-nsa-2026
    supports: NSA describes hidden instructions in tool outputs or shared context influencing downstream agents. Moonweave therefore classifies an observed indication of that indirect path as an IndirectInjectionSignal, a specialized ThreatSignal; the source does not prescribe this ontology hierarchy.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–10, ‘Poisoning output for downstream automation’
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
