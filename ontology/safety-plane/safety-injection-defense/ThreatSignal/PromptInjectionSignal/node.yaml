schema: moonweave.ai/ontology-node/v1
id: PromptInjectionSignal
kind: concept
status: accepted
labels: {zh: 提示注入信号, en: Prompt Injection Signal, ja: プロンプト注入シグナル}
semantics:
  short_definition: {zh: "表明内容可能试图改变模型指令执行或安全边界的直接注入风险指示。", en: "A direct-injection risk indicator that content may attempt to alter model instruction following or safety boundaries.", ja: "内容がモデルの指示追従または安全境界を変えようとする可能性を示す直接注入リスク指標。"}
  definition: {zh: "PromptInjectionSignal 是一种 ThreatSignal，记录与 OWASP LLM01 直接注入模式一致的观察和来源证据：输入由用户或攻击者直接提供，而非嵌入在外部工件中。它不是输入内容本身、已确认攻击结果、PolicyDecision 或缓解动作；同一文本若来自 tool_result 应归类为 IndirectInjectionSignal 或 ToolStreamInjectionSignal。", en: "PromptInjectionSignal is a ThreatSignal recording an observation and provenance evidence consistent with OWASP LLM01 direct injection: input supplied directly by a user or attacker rather than embedded in external artifacts. It is not the input content itself, a confirmed attack outcome, a PolicyDecision, or a mitigation action; the same text arriving from tool_result belongs under IndirectInjectionSignal or ToolStreamInjectionSignal.", ja: "PromptInjectionSignal は OWASP LLM01 の直接注入パターンと一致する観測と来歴証拠を記録する ThreatSignal である。入力は外部工件に埋め込まれるのではなく利用者または攻撃者が直接供給する。入力内容そのもの、確定した攻撃結果、PolicyDecision、緩和行為ではない。同じテキストが tool_result から来る場合は IndirectInjectionSignal または ToolStreamInjectionSignal に属する。"}
  why_needed: {zh: "系统需要在不把每个可疑文本断言为攻击的前提下，路由可审查的注入风险证据。", en: "The system needs to route reviewable injection-risk evidence without asserting every suspicious text is an attack.", ja: "全ての疑わしいテキストを攻撃と断定せず、レビュー可能な注入リスク証拠をルーティングする必要がある。"}
  includes: [{zh: "信号标识、来源、检测模式、置信度和关联候选。", en: "Signal identity, origin, detection pattern, confidence, and related candidate.", ja: "シグナル識別子、出所、検出パターン、確信度、関連候補。"}]
  excludes: [{zh: "原始提示或工具输出的完整工件。", en: "The complete raw prompt or tool-output artifact.", ja: "元のプロンプトまたはツール出力アーティファクト全体。"}]
  semantic_kind: signal
  aliases: [injection-risk-signal]
engineering:
  explanation: {zh: "对可疑文本产生带来源和模式证据的信号，将其路由到发现或缓解流程。信号不提升或执行文本，也不单独证明外泄、权限提升或工具调用已经发生。", en: "Emit a signal with origin and pattern evidence for suspicious text and route it to finding or mitigation flow. The signal neither elevates nor executes text and does not alone prove disclosure, privilege escalation, or tool invocation occurred.", ja: "疑わしいテキストに対し出所とパターン証拠を持つシグナルを出し、発見または緩和フローへ渡す。シグナルはテキストを昇格も実行もせず、開示、権限昇格、ツール呼出が起きたことを単独では証明しない。"}
  typical_input:
    - description: {zh: 可疑文本观察, en: Suspicious text observation, ja: 疑わしいテキスト観測}
      format: '{"content_id":"prompt-42","origin":"user-content","pattern":"ignore-prior-instructions","confidence":0.82}'
      source_claims: [claim-owasp-prompt-signal]
  typical_output:
    - description: {zh: 注入风险信号, en: Injection risk signal, ja: 注入リスクシグナル}
      format: '{"signal_id":"prompt-signal-42","class":"prompt-injection","confidence":0.82,"status":"open"}'
      source_claims: [claim-owasp-prompt-signal]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: "Defines prompt-injection risk from untrusted input altering model behavior."
structure:
  identity_keys: [threat_signal_id, prompt_injection_signal_id]
  fields:
    - id: threat_signal_id
      labels: {zh: 继承的威胁信号标识符, en: Inherited threat signal ID, ja: 継承された脅威シグナル ID}
      definitions: {zh: 此提示注入信号作为 ThreatSignal 的稳定风险指示身份；它与提示注入观察记录标识同一已检测风险指示。, en: "Stable risk-indicator identity for this prompt-injection signal as a ThreatSignal; it identifies the same detected risk indicator as the prompt-injection observation record.", ja: "このプロンプト注入シグナルが ThreatSignal として持つ安定したリスク指標 ID。プロンプト注入観測記録と同じ検出済みリスク指標を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: prompt-signal-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-signal]
    - id: detection_evidence_reference
      labels: {zh: 检测证据引用, en: Detection evidence reference, ja: 検出証拠参照}
      definitions: {zh: 支持该提示注入风险观察的候选指令、模式匹配或内容位置证据引用。, en: "Candidate instruction, pattern-match, or content-location evidence reference supporting this prompt-injection risk observation.", ja: "このプロンプト注入リスク観測を裏付ける候補指示、パターン一致、または内容位置証拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: candidate-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-signal]
    - id: prompt_injection_signal_id
      labels: {zh: 提示注入信号标识符, en: Prompt injection signal ID, ja: プロンプト注入シグナル ID}
      definitions: {zh: "一个提示注入风险观察的稳定标识符。", en: "Stable identifier for one prompt-injection risk observation.", ja: "一つのプロンプト注入リスク観測の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: prompt-signal-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-signal]
    - id: injection_class
      labels: {zh: 注入类别, en: Injection class, ja: 注入区分}
      definitions: {zh: "固定为 direct，表明该信号针对 OWASP 所称的直接提示/输入注入路径。", en: "Fixed to direct, indicating this signal targets the OWASP direct prompt/input injection path.", ja: "direct に固定し、このシグナルが OWASP の直接プロンプト/入力注入経路を対象とすることを示す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: direct
      allowed_values: [direct]
      source_claims: [claim-owasp-prompt-signal]
    - id: confidence
      labels: {zh: 置信度, en: Confidence, ja: 確信度}
      definitions: {zh: "检测对注入模式观察的相对置信度。", en: "The detector relative confidence in the injection-pattern observation.", ja: "検出器の注入パターン観測に対する相対確信度。"}
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.82
      allowed_values: []
      source_claims: [claim-owasp-prompt-signal]
  constraints:
    - id: prompt-signal-evidence-not-verdict
      severity: error
      expression_language: plain
      expression: A PromptInjectionSignal must retain origin and pattern evidence, declare injection_class direct, and must not be represented as a confirmed exploit without separate adjudication.
      explanation: {zh: "风险信号不是攻击结果结论。", en: "A risk signal is not an attack-outcome conclusion.", ja: "リスクシグナルは攻撃結果の結論ではない。"}
      source_claims: [claim-owasp-prompt-signal]
  required_relations: []
examples:
  - id: prompt-injection-signal-rebuff
    labels:
      zh: 提示注入信号 - Rebuff 注入检测
      en: Prompt Injection Signal - Rebuff injection detection
      ja: プロンプト注入シグナル - Rebuff 注入検出
    descriptions: {zh: "提示注入信号(PromptInjectionSignal) [PromptInjectionSignal]: 表明内容可能试图改变模型指令执行或安全边界的直接注入风险指示。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class.", en: "Prompt Injection Signal (PromptInjectionSignal) [PromptInjectionSignal]: A direct-injection risk indicator that content may attempt to alter model instruction following or safety boundaries.. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include detection_evidence_reference, prompt_injection_signal_id, injection_class.", ja: "プロンプト注入シグナル(PromptInjectionSignal) [PromptInjectionSignal]: 内容がモデルの指示追従または安全境界を変えようとする可能性を示す直接注入リスク指標。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class."}
    field_values:
      confidence: 0.82
      detection_evidence_reference: candidate-42
      injection_class: direct
      prompt_injection_signal_id: prompt-signal-42
      threat_signal_id: prompt-signal-42
    related_node_ids:
      - PromptInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-signal
      - PromptInjectionSignal
    example_source: Rebuff detector
    source_claims:
      - claim-owasp-prompt-signal
  - id: prompt-injection-signal-lakera
    labels:
      zh: 提示注入信号 - Lakera Guard 注入检测
      en: Prompt Injection Signal - Lakera Guard injection detection
      ja: プロンプト注入シグナル - Lakera Guard 注入検出
    descriptions: {zh: "提示注入信号(PromptInjectionSignal) [PromptInjectionSignal]: 表明内容可能试图改变模型指令执行或安全边界的直接注入风险指示。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} 返回 {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}}。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class.", en: "Prompt Injection Signal (PromptInjectionSignal) [PromptInjectionSignal]: A direct-injection risk indicator that content may attempt to alter model instruction following or safety boundaries.. Lakera Guard POST https://api.lakera.ai/v2/guard with {\"input\": \"user message\", \"breakdown\": true} returns {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} (docs.lakera.ai). Fields include detection_evidence_reference, prompt_injection_signal_id, injection_class.", ja: "プロンプト注入シグナル(PromptInjectionSignal) [PromptInjectionSignal]: 内容がモデルの指示追従または安全境界を変えようとする可能性を示す直接注入リスク指標。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} は {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} を返す。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class."}
    field_values:
      confidence: 0.82
      detection_evidence_reference: candidate-42
      injection_class: direct
      prompt_injection_signal_id: prompt-signal-42
      threat_signal_id: prompt-signal-42
    related_node_ids:
      - PromptInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-signal
      - PromptInjectionSignal
    example_source: Lakera Guard API
    source_claims:
      - claim-owasp-prompt-signal
  - id: prompt-injection-signal-perez_hackaprompt
    labels:
      zh: 提示注入信号 - HackAPrompt 间接注入
      en: Prompt Injection Signal - HackAPrompt indirect injection
      ja: プロンプト注入シグナル - HackAPrompt 間接注入
    descriptions: {zh: "提示注入信号(PromptInjectionSignal) [PromptInjectionSignal]: 表明内容可能试图改变模型指令执行或安全边界的直接注入风险指示。. Perez & Ribeiro（2022）HackAPrompt 与 Greshake 等（2023）展示间接注入：攻击者将指令隐藏在 LLM 将处理的数据中（网页、邮件、文档）。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class.", en: "Prompt Injection Signal (PromptInjectionSignal) [PromptInjectionSignal]: A direct-injection risk indicator that content may attempt to alter model instruction following or safety boundaries.. Perez & Ribeiro (2022) HackAPrompt and Greshake et al. (2023, arXiv:2302.12173) show indirect injection: attackers hide instructions in data LLMs process (webpages, email, documents). Fields include detection_evidence_reference, prompt_injection_signal_id, injection_class.", ja: "プロンプト注入シグナル(PromptInjectionSignal) [PromptInjectionSignal]: 内容がモデルの指示追従または安全境界を変えようとする可能性を示す直接注入リスク指標。. Perez & Ribeiro（2022）HackAPrompt と Greshake ほか（2023）は indirect injection：webpage/email/document に命令を隠す。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class."}
    field_values:
      confidence: 0.82
      detection_evidence_reference: candidate-42
      injection_class: direct
      prompt_injection_signal_id: prompt-signal-42
      threat_signal_id: prompt-signal-42
    related_node_ids:
      - PromptInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-signal
      - PromptInjectionSignal
    example_source: Perez HackAPrompt 2022
    source_claims:
      - claim-owasp-prompt-signal
  - id: prompt-injection-signal-gcg_attack
    labels:
      zh: 提示注入信号 - GCG 对抗后缀越狱
      en: Prompt Injection Signal - GCG adversarial suffix jailbreak
      ja: プロンプト注入シグナル - GCG adversarial suffix jailbreak
    descriptions: {zh: "提示注入信号(PromptInjectionSignal) [PromptInjectionSignal]: 表明内容可能试图改变模型指令执行或安全边界的直接注入风险指示。. Zou 等（2023）GCG 攻击：梯度优化对抗后缀在对齐 LLM 上实现通用、可迁移越狱（arxiv.org/abs/2307.15043）。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class.", en: "Prompt Injection Signal (PromptInjectionSignal) [PromptInjectionSignal]: A direct-injection risk indicator that content may attempt to alter model instruction following or safety boundaries.. Zou et al. (2023) GCG attack: gradient-optimized adversarial suffixes achieve universal, transferable jailbreaks on aligned LLMs (arxiv.org/abs/2307.15043). Fields include detection_evidence_reference, prompt_injection_signal_id, injection_class.", ja: "プロンプト注入シグナル(PromptInjectionSignal) [PromptInjectionSignal]: 内容がモデルの指示追従または安全境界を変えようとする可能性を示す直接注入リスク指標。. Zou ほか（2023）GCG attack：gradient 最適化 adversarial suffix で aligned LLM の universal/transferable jailbreak（arxiv.org/abs/2307.15043）。 Fields: detection_evidence_reference, prompt_injection_signal_id, injection_class."}
    field_values:
      confidence: 0.82
      detection_evidence_reference: candidate-42
      injection_class: direct
      prompt_injection_signal_id: prompt-signal-42
      threat_signal_id: prompt-signal-42
    related_node_ids:
      - PromptInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-signal
      - PromptInjectionSignal
    example_source: Zou GCG Attack 2023
    source_claims:
      - claim-owasp-prompt-signal
parent_relation:
  id: PromptInjectionSignal-is_a-ThreatSignal
  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "PromptInjectionSignal 是关于提示注入模式的 ThreatSignal。", en: "A PromptInjectionSignal is a ThreatSignal about prompt-injection patterns.", ja: "PromptInjectionSignal はプロンプト注入パターンに関する ThreatSignal である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: prompt-signal-parent-evidence
      severity: error
      expression_language: plain
      expression: The specialized signal must retain parent threat evidence and identify the prompt-injection pattern observed.
      explanations: {zh: "子类型增加模式类别而不丢失风险证据。", en: "The subtype adds pattern class without losing risk evidence.", ja: "サブタイプはリスク証拠を失わずパターン種別を追加する。"}
      source_claims: [claim-owasp-prompt-signal]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-prompt-signal]
relations: []
