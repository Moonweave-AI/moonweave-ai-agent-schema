schema: moonweave.ai/ontology-node/v1
id: ThreatSignal
kind: concept
status: accepted
labels:
  zh: 威胁信号
  en: Threat Signal
  ja: 脅威シグナル
semantics:
  short_definition:
    zh: 检测活动观察到的、需要进一步安全处理的风险指示。
    en: A risk indicator observed by a detection activity that requires further
      safety handling.
    ja: 検出活動が観測し、追加の安全処理を必要とするリスク指標。
  definition:
    zh: ThreatSignal 是由已发生的 DetectionActivity 生成的可观察风险指示实体，可能来自提示、检索内容、持久记忆或工具流。其输出来历以
      PROV-O wasGeneratedBy 表示，而不是目录组成。它不是攻击结论、策略决策、不受信任内容本身或执行的缓解动作。
    en: ThreatSignal is an observable risk-indicator entity generated by an occurred
      DetectionActivity and may originate in prompts, retrieved content, persistent
      memory, or tool streams. Its output provenance is expressed with PROV-O
      wasGeneratedBy, not directory composition. It is not an attack conclusion,
      policy decision, the untrusted content itself, or an executed mitigation action.
    ja: ThreatSignal は発生済み DetectionActivity が生成する観測可能なリスク指標エンティティであり、プロンプト、取得内容、永続メモリ、ツールストリームに由来し得る。出力来歴は
      ディレクトリ構成ではなく PROV-O wasGeneratedBy で表す。攻撃の結論、ポリシー決定、信頼できない内容そのもの、実行済み緩和行為ではない。
  why_needed:
    zh: 发现必须能表达不确定但有依据的风险，使后续控制可以按风险处理而不把每个可疑文本都断言为已确认攻击。
    en: Findings need to express evidence-backed risk without asserting every
      suspicious text is a confirmed attack, so later controls can handle it
      proportionally.
    ja: 後続制御が比例して扱えるよう、全ての疑わしいテキストを確定攻撃と断定せずに根拠付きリスクを表す必要がある。
  includes:
    - zh: 信号类别、来源、置信度、检测证据和关联内容。
      en: Signal class, origin, confidence, detection evidence, and related content.
      ja: シグナル種別、出所、確信度、検出証拠、関連内容。
  excludes:
    - zh: 对风险的最终处置。
      en: The final disposition of the risk.
      ja: リスクの最終処置。
  semantic_kind: signal
  aliases:
    - security-signal
    - risk-indicator
engineering:
  explanation:
    zh: 当检测规则识别出与注入有关的行为或内容时，发出带来源和置信度的信号。将信号路由到风险分诊或缓解流程，但不把它当作指令或最终安全结论。
    en: Emit a signal with source provenance and confidence whenever detection rules
      identify behavior or content associated with injection. Route the signal
      to risk triage or mitigation without treating it as an instruction or as a
      final security verdict.
    ja: 検出規則が注入に関連する挙動または内容を識別したとき、出所と信頼度を持つシグナルを発行する。シグナルをリスクトリアージまたは緩和へ渡すが、指示または最終的な安全結論として扱わない。
  typical_input:
    - description:
        zh: 检测观测
        en: Detection observation
        ja: 検出観測
      format: '{"activity_id":"scan-42","origin":"retrieved-content","pattern":"ignore-prior-rules","confidence":0.91}'
      source_claims:
        - claim-owasp-prompt-injection
  typical_output:
    - description:
        zh: 威胁信号
        en: Threat signal
        ja: 脅威シグナル
      format: '{"threat_signal_id":"signal-42","class":"prompt-injection","origin":"retrieved-content","confidence":0.91,"detection_evidence_reference":"pattern-match-42"}'
      source_claims:
        - claim-owasp-prompt-injection
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Defines prompt injection as untrusted input altering model behavior.
structure:
  identity_keys:
    - threat_signal_id
  fields:
    - id: threat_signal_id
      labels:
        zh: 威胁信号标识符
        en: Threat signal ID
        ja: 脅威シグナル ID
      definitions:
        zh: 一次检测到的风险指示的稳定标识符。
        en: Stable identifier for one detected risk indicator.
        ja: 一つの検出済みリスク指標の安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: signal-42
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
    - id: confidence
      labels:
        zh: 置信度
        en: Confidence
        ja: 確信度
      definitions:
        zh: 检测活动对该信号的相对置信度。
        en: The detection activity relative confidence in this signal.
        ja: このシグナルに対する検出活動の相対確信度。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0.91
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
    - id: detection_evidence_reference
      labels:
        zh: 检测证据引用
        en: Detection evidence reference
        ja: 検出証拠参照
      definitions:
        zh: 支持该风险信号的检测观察、模式匹配或内容位置引用。
        en: A detection observation, pattern match, or content-location reference supporting this risk signal.
        ja: このリスクシグナルを裏付ける検出観測、パターン一致、または内容位置への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: candidate-42
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
  constraints:
    - id: threat-signal-evidence-not-verdict
      severity: error
      expression_language: plain
      expression: A ThreatSignal must retain its detection evidence and confidence and
        must not be represented as a confirmed attack without a separate
        adjudication.
      explanations:
        zh: 信号是携带证据的指标，而不是自动结论。
        en: Signals are evidence-bearing indicators, not automatic conclusions.
        ja: シグナルは証拠を持つ指標であり、自動結論ではない。
      explanation:
        zh: 信号是携带证据的指标，而不是自动结论。
        en: Signals are evidence-bearing indicators, not automatic conclusions.
        ja: シグナルは証拠を持つ指標であり、自動結論ではない。
      source_claims:
        - claim-owasp-prompt-injection
    - id: threat-signal-detection-provenance
      severity: error
      language: plain
      expression: Each ThreatSignal instance must retain a typed was_generated_by
        relation to an occurred DetectionActivity and source evidence; it must not
        be modeled as a child component of the activity.
      explanation:
        zh: A signal is an observed output record, while detection is the activity that
          produced it.
        en: A signal is an observed output record, while detection is the activity that
          produced it.
        ja: A signal is an observed output record, while detection is the activity that
          produced it.
      source_claims:
        - claim-prov-o-generation
  required_relations: []
examples:
  - id: threat-signal-llama_guard
    labels:
      zh: 威胁信号 - Llama Guard 安全分类
      en: Threat Signal - Llama Guard safety classification
      ja: 脅威シグナル - Llama Guard 安全分類
    descriptions: {zh: "威胁信号(ThreatSignal) [ThreatSignal]: 检测活动观察到的、需要进一步安全处理的风险指示。. Inan 等（2023）Llama Guard：微调 Llama 安全分类器输出 safe/unsafe\\nO1（O1=暴力、O2=性、O3=犯罪、O4=枪支、O5=受管制、O6=自残）用于 I/O 审核（arxiv.org/abs/2312.06674）。 Fields: detection_evidence_reference, confidence, threat_signal_id.", en: "Threat Signal (ThreatSignal) [ThreatSignal]: A risk indicator observed by a detection activity that requires further. Inan et al. (2023) Llama Guard: fine-tuned Llama safety classifier outputs safe/unsafe\\nO1 (O1=violence, O2=sexual, O3=criminal, O4=guns, O5=regulated, O6=self-harm) for I/O moderation (arxiv.org/abs/2312.06674). Fields include detection_evidence_reference, confidence, threat_signal_id.", ja: "脅威シグナル(ThreatSignal) [ThreatSignal]: 検出活動が観測し、追加の安全処理を必要とするリスク指標。. Inan ほか（2023）Llama Guard：fine-tuned Llama が safe/unsafe\\nO1（O1=violence 等6類）を I/O moderation に出力（arxiv.org/abs/2312.06674）。 Fields: detection_evidence_reference, confidence, threat_signal_id."}
    field_values:
      confidence: 0.91
      detection_evidence_reference: candidate-42
      threat_signal_id: signal-42
    related_node_ids:
      - ThreatSignal
    related_relation_ids: []
    example_source: Meta Llama Guard 2023
    source_claims:
      - claim-owasp-prompt-injection
  - id: threat-signal-lakera
    labels:
      zh: 威胁信号 - Lakera Guard 注入检测
      en: Threat Signal - Lakera Guard injection detection
      ja: 脅威シグナル - Lakera Guard 注入検出
    descriptions: {zh: "威胁信号(ThreatSignal) [ThreatSignal]: 检测活动观察到的、需要进一步安全处理的风险指示。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} 返回 {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}}。 Fields: detection_evidence_reference, confidence, threat_signal_id.", en: "Threat Signal (ThreatSignal) [ThreatSignal]: A risk indicator observed by a detection activity that requires further. Lakera Guard POST https://api.lakera.ai/v2/guard with {\"input\": \"user message\", \"breakdown\": true} returns {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} (docs.lakera.ai). Fields include detection_evidence_reference, confidence, threat_signal_id.", ja: "脅威シグナル(ThreatSignal) [ThreatSignal]: 検出活動が観測し、追加の安全処理を必要とするリスク指標。. Lakera Guard POST https://api.lakera.ai/v2/guard {\"input\": \"user message\", \"breakdown\": true} は {\"flagged\": true, \"categories\": {\"prompt_injection\": true, \"jailbreak\": false}} を返す。 Fields: detection_evidence_reference, confidence, threat_signal_id."}
    field_values:
      confidence: 0.91
      detection_evidence_reference: candidate-42
      threat_signal_id: signal-42
    related_node_ids:
      - ThreatSignal
    related_relation_ids: []
    example_source: Lakera Guard API
    source_claims:
      - claim-owasp-prompt-injection
  - id: threat-signal-decodingtrust
    labels:
      zh: 威胁信号 - DecodingTrust GPT 评估
      en: Threat Signal - DecodingTrust GPT assessment
      ja: 脅威シグナル - DecodingTrust GPT 評価
    descriptions: {zh: "威胁信号(ThreatSignal) [ThreatSignal]: 检测活动观察到的、需要进一步安全处理的风险指示。. Wang 等（2023）DecodingTrust 评估 GPT 在 toxicity、stereotype bias、adversarial robustness、OOD robustness、privacy、machine ethics、fairness 八维度的可信度（arxiv.org/abs/2306.11698）。 Fields: detection_evidence_reference, confidence, threat_signal_id.", en: "Threat Signal (ThreatSignal) [ThreatSignal]: A risk indicator observed by a detection activity that requires further. Wang et al. (2023) DecodingTrust assesses GPT trustworthiness across toxicity, stereotype bias, adversarial robustness, OOD robustness, privacy, machine ethics, and fairness (arxiv.org/abs/2306.11698). Fields include detection_evidence_reference, confidence, threat_signal_id.", ja: "脅威シグナル(ThreatSignal) [ThreatSignal]: 検出活動が観測し、追加の安全処理を必要とするリスク指標。. Wang ほか（2023）DecodingTrust：toxicity/bias/adversarial/OOD/privacy/ethics/fairness 等8次元で GPT 信頼性を評価（arxiv.org/abs/2306.11698）。 Fields: detection_evidence_reference, confidence, threat_signal_id."}
    field_values:
      confidence: 0.91
      detection_evidence_reference: candidate-42
      threat_signal_id: signal-42
    related_node_ids:
      - ThreatSignal
    related_relation_ids: []
    example_source: Wang DecodingTrust 2023
    source_claims:
      - claim-owasp-prompt-injection
  - id: threat-signal-rebuff
    labels:
      zh: 威胁信号 - Rebuff 注入检测
      en: Threat Signal - Rebuff injection detection
      ja: 脅威シグナル - Rebuff 注入検出
    descriptions: {zh: "威胁信号(ThreatSignal) [ThreatSignal]: 检测活动观察到的、需要进一步安全处理的风险指示。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: detection_evidence_reference, confidence, threat_signal_id.", en: "Threat Signal (ThreatSignal) [ThreatSignal]: A risk indicator observed by a detection activity that requires further. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include detection_evidence_reference, confidence, threat_signal_id.", ja: "脅威シグナル(ThreatSignal) [ThreatSignal]: 検出活動が観測し、追加の安全処理を必要とするリスク指標。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: detection_evidence_reference, confidence, threat_signal_id."}
    field_values:
      confidence: 0.91
      detection_evidence_reference: candidate-42
      threat_signal_id: signal-42
    related_node_ids:
      - ThreatSignal
    related_relation_ids: []
    example_source: Rebuff detector
    source_claims:
      - claim-owasp-prompt-injection
parent_relation: null
relations:
  - id: ThreatSignal-wasGeneratedBy-DetectionActivity
    predicate: was_generated_by
    target: concept:DetectionActivity
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由检测活动生成
      en: was generated by detection activity
      ja: 検出活動によって生成された
    definitions:
      zh: ThreatSignal 是由已发生的 DetectionActivity 生成的实体，并以 PROV-O
        wasGeneratedBy 保留检测来历，而不是作为该活动的结构组成部分。
      en: A ThreatSignal is an entity generated by an occurred DetectionActivity and
        retains detection provenance through PROV-O wasGeneratedBy rather than being
        a structural component of the activity.
      ja: ThreatSignal は発生済み DetectionActivity が生成したエンティティであり、活動の構造要素ではなく
        PROV-O wasGeneratedBy により検出来歴を保持する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    source_claims:
      - claim-prov-o-generation
    layout_role: cross-link
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Defines prompt-injection risk from untrusted input altering model behavior.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity, Activity, and wasGeneratedBy relations for output provenance.
source_claims:
  - id: claim-owasp-prompt-injection
    source: owasp-llm01-2025
    supports: Prompt-injection guidance motivates recording a provenance-bound
      threat signal; it does not define this internal ThreatSignal schema.
    locator: Overview and Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-generation
    source: w3c-prov-o
    supports: PROV-O defines prov:wasGeneratedBy between an Entity and an Activity. Moonweave uses that relation to record that an occurred DetectionActivity generated this signal; the signal's injection-risk semantics remain a local model informed by OWASP guidance.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
