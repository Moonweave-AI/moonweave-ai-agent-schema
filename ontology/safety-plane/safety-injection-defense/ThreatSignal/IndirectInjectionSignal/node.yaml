schema: moonweave.ai/ontology-node/v1
id: IndirectInjectionSignal
kind: concept
status: accepted
labels: {zh: 间接注入信号, en: Indirect Injection Signal, ja: 間接注入シグナル}
semantics:
  short_definition: {zh: "表明来自外部内容而非直接提示的潜在注入的威胁信号。", en: "A ThreatSignal indicating potential injection arriving through external content rather than a direct prompt.", ja: "直接プロンプトではなく外部内容から到来する潜在的注入を示す ThreatSignal。"}
  definition: {zh: "IndirectInjectionSignal 是一种 ThreatSignal，表示检索文档、网页、记忆、文件或工具输出等外部内容可能携带了试图影响代理行为的指令。它不是该外部内容本身、直接用户提示注入或已确认的安全事件。", en: "IndirectInjectionSignal is a ThreatSignal indicating that external content such as retrieved documents, webpages, memory, files, or tool output may carry instructions attempting to influence agent behavior. It is not the external content itself, direct user-prompt injection, or a confirmed security event.", ja: "IndirectInjectionSignal は、取得文書、Web ページ、メモリ、ファイル、ツール出力などの外部内容がエージェント挙動に影響しようとする指示を含む可能性を示す ThreatSignal である。外部内容そのもの、直接ユーザープロンプト注入、確定セキュリティ事象ではない。"}
  why_needed: {zh: "间接来源常被误认为数据而绕过指令信任边界，因此其风险需要被明确地表示和处理。", en: "Indirect sources are often mistaken for data and can bypass instruction trust boundaries, so their risk needs explicit representation and handling.", ja: "間接的な情報源はデータと誤認されやすく指示の信頼境界を回避し得るため、リスクを明示的に表し扱う必要がある。"}
  includes: [{zh: "外部来源类型、可疑内容位置、检测证据和受影响的行为表面。", en: "External source type, suspicious-content location, detection evidence, and affected behavior surface.", ja: "外部情報源種別、疑わしい内容位置、検出証拠、影響を受ける行動面。"}]
  excludes: [{zh: "用户在正常受信任交互通道中直接提供的请求。", en: "A direct request supplied by a user through the normal trusted interaction channel.", ja: "通常の信頼済み対話チャネルを通じてユーザーが直接提供する要求。"}]
  semantic_kind: signal
  aliases: [external-content-injection-signal]
engineering:
  explanation: {zh: "显式标记外部来源并保留原始工件引用。在检索、记忆或工具产生的文本改变工具选择、数据披露或系统指令前，将信号交给注入控制。", en: "Label the external origin explicitly and retain the original artifact reference. Pass the signal to injection controls before retrieved, remembered, or tool-produced text can alter tool choice, data disclosure, or system instructions.", ja: "外部出所を明示し、元の工件参照を保持する。取得、記憶、ツール生成テキストがツール選択、データ開示、システム指示を変える前に、シグナルを注入制御へ渡す。"}
  typical_input:
    - description: {zh: 外部内容扫描结果, en: External content scan result, ja: 外部内容走査結果}
      format: '{"content_id":"chunk-42","origin":"retrieved-content","pattern":"call-unrelated-tool","confidence":0.84}'
      source_claims: [claim-owasp-prompt-injection]
  typical_output:
    - description: {zh: 间接信号, en: Indirect signal, ja: 間接シグナル}
      format: '{"signal_id":"indirect-42","origin":"retrieved-content","class":"indirect-injection","confidence":0.84}'
      source_claims: [claim-owasp-prompt-injection]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Covers direct and indirect prompt-injection risk from untrusted content.
    - name: Anthropic prompt-injection guidance
      url: https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/mitigate-jailbreaks
      description: Distinguishes direct user-input attacks from indirect injection in third-party content and tool results.
structure:
  identity_keys: [threat_signal_id, indirect_injection_signal_id]
  fields:
    - id: injection_class
      labels: {zh: 注入类别, en: Injection class, ja: 注入区分}
      definitions: {zh: "固定为 indirect，表明该信号针对 OWASP 所称的间接提示注入路径（外部工件中的类指令内容）。", en: "Fixed to indirect, indicating this signal targets the OWASP indirect prompt-injection path (instruction-like content in external artifacts).", ja: "indirect に固定し、このシグナルが OWASP の間接プロンプト注入経路（外部工件内の命令風内容）を対象とすることを示す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: indirect
      allowed_values: [indirect]
      source_claims: [claim-owasp-prompt-injection]
    - id: threat_signal_id
      labels: {zh: 继承的威胁信号标识符, en: Inherited threat signal ID, ja: 継承された脅威シグナル ID}
      definitions: {zh: 此间接注入信号作为 ThreatSignal 的稳定风险指示身份；它与间接信号记录标识同一已检测风险指示。, en: "Stable risk-indicator identity for this indirect injection signal as a ThreatSignal; it identifies the same detected risk indicator as the indirect-signal record.", ja: "この間接注入シグナルが ThreatSignal として持つ安定したリスク指標 ID。間接シグナル記録と同じ検出済みリスク指標を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: indirect-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: confidence
      labels: {zh: 置信度, en: Confidence, ja: 確信度}
      definitions: {zh: 检测活动对该间接注入风险指示的相对置信度，而非攻击已经成功的概率。, en: "Detection activity relative confidence in this indirect-injection risk indicator, not a probability that an attack already succeeded.", ja: "この間接注入リスク指標に対する検出活動の相対確信度。攻撃が既に成功した確率ではない。"}
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.88
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: detection_evidence_reference
      labels: {zh: 检测证据引用, en: Detection evidence reference, ja: 検出証拠参照}
      definitions: {zh: 支持该间接注入信号的内容位置、模式匹配或检测观察引用。, en: "Content-location, pattern-match, or detection-observation reference supporting this indirect-injection signal.", ja: "この間接注入シグナルを裏付ける内容位置、パターン一致、または検出観測への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: candidate-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: indirect_injection_signal_id
      labels: {zh: 间接信号标识符, en: Indirect signal ID, ja: 間接シグナル ID}
      definitions: {zh: "一次外部内容注入风险指示的稳定标识符。", en: "Stable identifier for one external-content injection risk indicator.", ja: "一つの外部内容注入リスク指標の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: indirect-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: origin_type
      labels: {zh: 来源类型, en: Origin type, ja: 出所種別}
      definitions: {zh: "携带可疑指令的外部内容类别。", en: "The category of external content carrying the suspicious instruction.", ja: "疑わしい指示を運ぶ外部内容のカテゴリ。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: retrieved-content
      allowed_values: [retrieved-content, tool-output, memory, file, webpage]
      source_claims: [claim-owasp-prompt-injection]
  constraints:
    - id: indirect-signal-external-origin
      severity: error
      expression_language: plain
      expression: An IndirectInjectionSignal must identify an external origin and must not classify direct trusted-system instructions as indirect content.
      explanations: {zh: "间接注入由不受信任内容路径定义，而不只是命令式措辞。", en: "Indirect injection is defined by the untrusted content path, not imperative wording alone.", ja: "間接注入は命令的な文言だけでなく、信頼できない内容経路によって定義される。"}
      explanation: {zh: "间接注入由不受信任内容路径定义，而不只是命令式措辞。", en: "Indirect injection is defined by the untrusted content path, not imperative wording alone.", ja: "間接注入は命令的な文言だけでなく、信頼できない内容経路によって定義される。"}
      source_claims: [claim-owasp-prompt-injection]
  required_relations: []
examples:
  - id: indirect-injection-signal-greshake_bing
    labels:
      zh: 间接注入信号 - Greshake Bing Chat 间接注入
      en: Indirect Injection Signal - Greshake Bing Chat indirect injection
      ja: 間接注入シグナル - Greshake Bing Chat 間接注入
    descriptions: {zh: "间接注入信号(IndirectInjectionSignal) [IndirectInjectionSignal]: 表明来自外部内容而非直接提示的潜在注入的威胁信号。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: threat_signal_id, confidence, origin_type.", en: "Indirect Injection Signal (IndirectInjectionSignal) [IndirectInjectionSignal]: A ThreatSignal indicating potential injection arriving through external content rather than a direct prompt.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include threat_signal_id, confidence, origin_type.", ja: "間接注入シグナル(IndirectInjectionSignal) [IndirectInjectionSignal]: 直接プロンプトではなく外部内容から到来する潜在的注入を示す ThreatSignal。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: threat_signal_id, confidence, origin_type."}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-42
      indirect_injection_signal_id: indirect-42
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-42
    related_node_ids:
      - IndirectInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-injection
      - IndirectInjectionSignal
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-owasp-prompt-injection
  - id: indirect-injection-signal-echoleak
    labels:
      zh: 间接注入信号 - EchoLeak Copilot 邮件注入
      en: Indirect Injection Signal - EchoLeak Copilot email injection
      ja: 間接注入シグナル - EchoLeak Copilot メール注入
    descriptions: {zh: "间接注入信号(IndirectInjectionSignal) [IndirectInjectionSignal]: 表明来自外部内容而非直接提示的潜在注入的威胁信号。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: threat_signal_id, confidence, origin_type.", en: "Indirect Injection Signal (IndirectInjectionSignal) [IndirectInjectionSignal]: A ThreatSignal indicating potential injection arriving through external content rather than a direct prompt.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include threat_signal_id, confidence, origin_type.", ja: "間接注入シグナル(IndirectInjectionSignal) [IndirectInjectionSignal]: 直接プロンプトではなく外部内容から到来する潜在的注入を示す ThreatSignal。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: threat_signal_id, confidence, origin_type."}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-42
      indirect_injection_signal_id: indirect-42
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-42
    related_node_ids:
      - IndirectInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-injection
      - IndirectInjectionSignal
    example_source: EchoLeak CVE-2025-32711
    source_claims:
      - claim-owasp-prompt-injection
  - id: indirect-injection-signal-perez_hackaprompt
    labels:
      zh: 间接注入信号 - HackAPrompt 间接注入
      en: Indirect Injection Signal - HackAPrompt indirect injection
      ja: 間接注入シグナル - HackAPrompt 間接注入
    descriptions: {zh: "间接注入信号(IndirectInjectionSignal) [IndirectInjectionSignal]: 表明来自外部内容而非直接提示的潜在注入的威胁信号。. Perez & Ribeiro（2022）HackAPrompt 与 Greshake 等（2023）展示间接注入：攻击者将指令隐藏在 LLM 将处理的数据中（网页、邮件、文档）。 Fields: threat_signal_id, confidence, origin_type.", en: "Indirect Injection Signal (IndirectInjectionSignal) [IndirectInjectionSignal]: A ThreatSignal indicating potential injection arriving through external content rather than a direct prompt.. Perez & Ribeiro (2022) HackAPrompt and Greshake et al. (2023, arXiv:2302.12173) show indirect injection: attackers hide instructions in data LLMs process (webpages, email, documents). Fields include threat_signal_id, confidence, origin_type.", ja: "間接注入シグナル(IndirectInjectionSignal) [IndirectInjectionSignal]: 直接プロンプトではなく外部内容から到来する潜在的注入を示す ThreatSignal。. Perez & Ribeiro（2022）HackAPrompt と Greshake ほか（2023）は indirect injection：webpage/email/document に命令を隠す。 Fields: threat_signal_id, confidence, origin_type."}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-42
      indirect_injection_signal_id: indirect-42
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-42
    related_node_ids:
      - IndirectInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-injection
      - IndirectInjectionSignal
    example_source: Perez HackAPrompt 2022
    source_claims:
      - claim-owasp-prompt-injection
  - id: indirect-injection-signal-cve_email_assistant
    labels:
      zh: 间接注入信号 - CVE-2024-5184 邮件助手
      en: Indirect Injection Signal - CVE-2024-5184 email assistant
      ja: 間接注入シグナル - CVE-2024-5184 メール assistant
    descriptions: {zh: "间接注入信号(IndirectInjectionSignal) [IndirectInjectionSignal]: 表明来自外部内容而非直接提示的潜在注入的威胁信号。. OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。 Fields: threat_signal_id, confidence, origin_type.", en: "Indirect Injection Signal (IndirectInjectionSignal) [IndirectInjectionSignal]: A ThreatSignal indicating potential injection arriving through external content rather than a direct prompt.. OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content. Fields include threat_signal_id, confidence, origin_type.", ja: "間接注入シグナル(IndirectInjectionSignal) [IndirectInjectionSignal]: 直接プロンプトではなく外部内容から到来する潜在的注入を示す ThreatSignal。. OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。 Fields: threat_signal_id, confidence, origin_type."}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-42
      indirect_injection_signal_id: indirect-42
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-42
    related_node_ids:
      - IndirectInjectionSignal
    related_relation_ids:
      - claim-owasp-prompt-injection
      - IndirectInjectionSignal
    example_source: CVE-2024-5184
    source_claims:
      - claim-owasp-prompt-injection
parent_relation:
  id: IndirectInjectionSignal-is_a-ThreatSignal
  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "IndirectInjectionSignal 是来自外部内容路径的 ThreatSignal。", en: "An IndirectInjectionSignal is a ThreatSignal from an external-content path.", ja: "IndirectInjectionSignal は外部内容経路から来る ThreatSignal である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: indirect-signal-parent-evidence
      severity: error
      expression_language: plain
      expression: The specialized signal must retain the parent threat evidence and identify its external content origin.
      explanations: {zh: "子类型收窄风险来源，但不丢失检测证据。", en: "The subtype narrows risk provenance without dropping detection evidence.", ja: "下位型は検出証拠を失わずにリスク来歴を絞り込む。"}
      source_claims: [claim-owasp-prompt-injection]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-prompt-injection]
relations: []
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Defines prompt-injection risk from untrusted input altering model behavior.
  - id: anthropic-prompt-injection-2026
    title: Mitigate jailbreaks and prompt injections
    url: https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/mitigate-jailbreaks
    source_type: official-doc
    relevance: Distinguishes direct user-input attacks from indirect injection in third-party content and tool results.
source_claims:
  - id: claim-owasp-prompt-injection
    source: owasp-llm01-2025
    supports: Prompt-injection guidance motivates tracking untrusted external-content paths; it does not define this internal IndirectInjectionSignal schema.
    locator: "Overview and Prevention and Mitigation Strategies"
    evidence_kind: design-inference
    confidence: high
  - id: claim-anthropic-indirect-inference
    source: anthropic-prompt-injection-2026
    supports: Indirect prompt injection has a threat model in which otherwise trusted use processes adversarial third-party content such as web pages, emails, documents, or tool results; the local signal record is a design inference rather than an Anthropic wire object.
    locator: "Mitigate jailbreaks and prompt injections; attack categories"
    evidence_kind: design-inference
    confidence: high
