  - id: memory-poisoning-signal-perez_hackaprompt
    labels:
      zh: 记忆投毒信号 - HackAPrompt 间接注入
      en: Memory Poisoning Signal - HackAPrompt indirect injection
      ja: メモリ汚染シグナル - HackAPrompt 間接注入
    descriptions: {zh: "记忆投毒信号(MemoryPoisoningSignal) [MemoryPoisoningSignal]: 记忆投毒信号. Perez & Ribeiro（2022）HackAPrompt 与 Greshake 等（2023）展示间接注入：攻击者将指令隐藏在 LLM 将处理的数据中（网页、邮件、文档）。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence.", en: "Memory Poisoning Signal (MemoryPoisoningSignal) [MemoryPoisoningSignal]: Memory Poisoning Signal. Perez & Ribeiro (2022) HackAPrompt and Greshake et al. (2023, arXiv:2302.12173) show indirect injection: attackers hide instructions in data LLMs process (webpages, email, documents). Fields include memory_poisoning_signal_id, threat_signal_id, confidence.", ja: "メモリ汚染シグナル(MemoryPoisoningSignal) [MemoryPoisoningSignal]: メモリ汚染シグナル. Perez & Ribeiro（2022）HackAPrompt と Greshake ほか（2023）は indirect injection：webpage/email/document に命令を隠す。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence."}
