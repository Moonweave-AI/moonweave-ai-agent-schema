schema: moonweave.ai/ontology-node/v1
id: MemoryPoisoningSignal
kind: concept
status: accepted
labels: {zh: 记忆投毒信号, en: Memory Poisoning Signal, ja: メモリ汚染シグナル}
semantics:
  short_definition: {zh: "指示或内容被恶意写入持久记忆、摘要或可复用上下文的威胁信号。", en: "A ThreatSignal that evidence indicates instructions or content were maliciously inserted into persistent memory, summaries, or reusable context.", ja: "指示または内容が永続メモリ、要約、再利用可能なコンテキストへ悪意をもって挿入された証拠を示す ThreatSignal。"}
  definition: {zh: "MemoryPoisoningSignal 是 IndirectInjectionSignal，记录对持久上下文的恶意插入、替换或篡改证据。它不是一般的 PersistentContextRisk、普通内存记录、授权持久化或未经证实的攻击结论。", en: "MemoryPoisoningSignal is an IndirectInjectionSignal that records evidence of malicious insertion, replacement, or alteration of persistent context. It is not a general PersistentContextRisk, an ordinary memory record, authorization persistence, or an attack conclusion without evidence.", ja: "MemoryPoisoningSignal は、永続コンテキストへの悪意ある挿入、置換、または改変の証拠を記録する IndirectInjectionSignal である。一般的な PersistentContextRisk、通常のメモリ記録、認可の永続化、または証拠のない攻撃結論ではない。"}
  why_needed: {zh: "持久化会让一次间接注入在后续交互中重新进入上下文，因此需要与单纯的持久化风险区分开。", en: "Persistence can bring an indirect injection back into later interactions, so evidence of poisoning must be distinguished from mere retention risk.", ja: "永続化により間接注入が後続の対話に戻り得るため、汚染の証拠を単なる保持リスクと区別する必要がある。"}
  includes:
    - {zh: "被篡改记录、可疑写入来源、修订差异和重新检索路径。", en: "Altered records, suspicious write origins, revision differences, and retrieval paths.", ja: "改変された記録、不審な書込み元、改訂差分、取得経路。"}
  excludes:
    - {zh: "仅因内容被保留而产生、但没有恶意插入或篡改证据的风险。", en: "Risk caused only by retained content without evidence of malicious insertion or alteration.", ja: "悪意ある挿入または改変の証拠なしに、内容が保持されているだけで生じるリスク。"}
  semantic_kind: signal
  aliases: [persistent-memory-poisoning]
engineering:
  explanation: {zh: "发现持久记忆、会话摘要或共享上下文的写入来源异常时，保留记录版本、来源和受影响的检索路径，并交由审查或隔离流程处理。该信号不自行证明攻击者身份。", en: "When a write to persistent memory, a session summary, or shared context has an anomalous origin, retain record versions, origin, and affected retrieval paths for review or quarantine. The signal does not itself prove an attacker's identity.", ja: "永続メモリ、セッション要約、共有コンテキストへの書込み元に異常がある場合、記録の版、出所、影響を受ける取得経路を保持してレビューまたは隔離に渡す。このシグナル自体は攻撃者の身元を証明しない。"}
  typical_input:
    - description: {zh: "持久化记录的版本与写入来源观测。", en: "Persisted-record version and write-origin observation.", ja: "永続記録の版と書込み元の観測。"}
      format: '{"signal_id":"memory-poison-7","record_id":"memory-42","revision_before":"18","revision_after":"19","origin":"retrieved-web-content"}'
      source_claims: [claim-owasp-memory-poisoning-inference]
  typical_output:
    - description: {zh: "包含证据与隔离建议的记忆投毒信号。", en: "Memory-poisoning signal with evidence and quarantine recommendation.", ja: "証拠と隔離推奨を含むメモリ汚染シグナル。"}
      format: '{"signal_id":"memory-poison-7","evidence":"untrusted imperative text added","reentry":"memory-retrieval","recommendation":"quarantine"}'
      source_claims: [claim-owasp-memory-poisoning-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Explains injection risk from untrusted input that can alter model behavior.
structure:
  identity_keys: [threat_signal_id, indirect_injection_signal_id, memory_poisoning_signal_id]
  fields:
    - id: threat_signal_id
      labels: {zh: 继承的威胁信号标识符, en: Inherited threat signal ID, ja: 継承された脅威シグナル ID}
      definitions: {zh: 此记忆投毒信号作为 ThreatSignal 的稳定风险指示身份；它与记忆投毒记录标识同一已检测风险指示。, en: "Stable risk-indicator identity for this memory-poisoning signal as a ThreatSignal; it identifies the same detected risk indicator as the memory-poisoning record.", ja: "このメモリ汚染シグナルが ThreatSignal として持つ安定したリスク指標 ID。メモリ汚染記録と同じ検出済みリスク指標を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: memory-poison-7
      allowed_values: []
      source_claims: [claim-owasp-memory-poisoning-inference]
    - id: confidence
      labels: {zh: 置信度, en: Confidence, ja: 確信度}
      definitions: {zh: 检测活动对该记忆来源间接注入风险指示的相对置信度，而非已确认的记忆篡改结论。, en: "Detection activity relative confidence in this memory-origin indirect-injection risk indicator, not a confirmed-memory-tampering conclusion.", ja: "このメモリ由来の間接注入リスク指標に対する検出活動の相対確信度。確認済みメモリ改ざんの結論ではない。"}
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.84
      allowed_values: []
      source_claims: [claim-owasp-memory-poisoning-inference]
    - id: detection_evidence_reference
      labels: {zh: 检测证据引用, en: Detection evidence reference, ja: 検出証拠参照}
      definitions: {zh: 支持该记忆投毒风险信号的记忆修订、摘要差异或检测观察引用。, en: "Memory-revision, summary-difference, or detection-observation reference supporting this memory-poisoning risk signal.", ja: "このメモリ汚染リスクシグナルを裏付けるメモリ改訂、要約差分、または検出観測への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: memory-7-r18
      allowed_values: []
      source_claims: [claim-owasp-memory-poisoning-inference]
    - id: indirect_injection_signal_id
      labels: {zh: 继承的间接注入信号标识符, en: Inherited indirect injection signal ID, ja: 継承された間接注入シグナル ID}
      definitions: {zh: 此记忆投毒信号作为 IndirectInjectionSignal 的稳定外部内容路径身份；它与记忆投毒记录标识同一间接信号。, en: "Stable external-content-path identity for this memory-poisoning signal as an IndirectInjectionSignal; it identifies the same indirect signal as the memory-poisoning record.", ja: "このメモリ汚染シグナルが IndirectInjectionSignal として持つ安定した外部内容経路 ID。メモリ汚染記録と同じ間接シグナルを識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: memory-poison-7
      allowed_values: []
      source_claims: [claim-owasp-memory-poisoning-inference]
    - id: origin_type
      labels: {zh: 来源类型, en: Origin type, ja: 出所種別}
      definitions: {zh: 固定为 memory，表明可疑指令或内容经持久记忆、摘要或可复用上下文进入，而不是经直接用户提示进入。, en: "Fixed to memory, indicating that suspicious instruction or content arrives through persistent memory, summaries, or reusable context rather than a direct user prompt.", ja: "memory に固定する。疑わしい指示または内容が直接ユーザープロンプトでなく、永続メモリ、要約、または再利用可能コンテキストを通じて到来することを表す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: memory
      allowed_values: [retrieved-content, tool-output, memory, file, webpage]
      source_claims: [claim-owasp-memory-poisoning-inference]
    - id: memory_poisoning_signal_id
      labels: {zh: 记忆投毒信号标识符, en: Memory poisoning signal ID, ja: メモリ汚染シグナル ID}
      definitions: {zh: "一次记忆投毒证据观测的稳定标识符。", en: "Stable identifier for one memory-poisoning evidence observation.", ja: "一つのメモリ汚染証拠観測の安定した識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: memory-poison-7
      allowed_values: []
      source_claims: [claim-owasp-memory-poisoning-inference]
    - id: affected_record_revision
      labels: {zh: 受影响记录修订, en: Affected record revision, ja: 影響を受けた記録の改訂}
      definitions: {zh: "显示可疑持久化变更的记录版本或版本范围。", en: "Record version or version range showing the suspicious persisted change.", ja: "疑わしい永続変更を示す記録の版または版の範囲。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 18-19
      allowed_values: []
      source_claims: [claim-owasp-memory-poisoning-inference]
  constraints:
    - id: memory-poisoning-evidence-threshold
      severity: error
      expression_language: plain
      expression: A MemoryPoisoningSignal must identify an affected persisted record, a revision or write event, and evidence of malicious insertion or alteration.
      explanations: {zh: "持久化本身不足以构成投毒；必须能够追溯到篡改证据。", en: "Persistence alone is not poisoning; the signal must trace to alteration evidence.", ja: "永続化だけでは汚染ではない。シグナルは改変の証拠まで追跡できなければならない。"}
      explanation: {zh: "持久化本身不足以构成投毒；必须能够追溯到篡改证据。", en: "Persistence alone is not poisoning; the signal must trace to alteration evidence.", ja: "永続化だけでは汚染ではない。シグナルは改変の証拠まで追跡できなければならない。"}
      source_claims: [claim-owasp-memory-poisoning-inference]
  required_relations: []
examples:
  - id: memory-poisoning-signal-greshake_bing
    labels:
      zh: 记忆投毒信号 - Greshake Bing Chat 间接注入
      en: Memory Poisoning Signal - Greshake Bing Chat indirect injection
      ja: メモリ汚染シグナル - Greshake Bing Chat 間接注入
    descriptions: {zh: "记忆投毒信号(MemoryPoisoningSignal) [MemoryPoisoningSignal]: 记忆投毒信号. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence.", en: "Memory Poisoning Signal (MemoryPoisoningSignal) [MemoryPoisoningSignal]: Memory Poisoning Signal. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include memory_poisoning_signal_id, threat_signal_id, confidence.", ja: "メモリ汚染シグナル(MemoryPoisoningSignal) [MemoryPoisoningSignal]: メモリ汚染シグナル. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence."}
    field_values:
      affected_record_revision: 18-19
      confidence: 0.84
      detection_evidence_reference: memory-7-r18
      indirect_injection_signal_id: memory-poison-7
      memory_poisoning_signal_id: memory-poison-7
      origin_type: memory
      threat_signal_id: memory-poison-7
