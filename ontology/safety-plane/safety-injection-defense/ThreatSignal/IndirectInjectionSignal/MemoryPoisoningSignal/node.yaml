      en: Memory Poisoning Signal - NeMo Guardrails injection rail
      ja: メモリ汚染シグナル - NeMo Guardrails 注入 rail
    descriptions: {zh: "记忆投毒信号(MemoryPoisoningSignal) [MemoryPoisoningSignal]: 记忆投毒信号. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse；支持 input/output/dialog rails。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence.", en: "Memory Poisoning Signal (MemoryPoisoningSignal) [MemoryPoisoningSignal]: Memory Poisoning Signal. NVIDIA NeMo Guardrails Colang 2.0: define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse — supports input/output/dialog rails (github.com/NVIDIA-NeMo/Guardrails). Fields include memory_poisoning_signal_id, threat_signal_id, confidence.", ja: "メモリ汚染シグナル(MemoryPoisoningSignal) [MemoryPoisoningSignal]: メモリ汚染シグナル. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input で check_jailbreak を実行し jailbreak 時 bot refuse；input/output/dialog rails をサポート。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence."}
    field_values:
