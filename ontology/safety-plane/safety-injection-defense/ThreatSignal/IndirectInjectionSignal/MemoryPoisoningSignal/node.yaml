    descriptions: {zh: "记忆投毒信号(MemoryPoisoningSignal) [MemoryPoisoningSignal]: 记忆投毒信号. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence.", en: "Memory Poisoning Signal (MemoryPoisoningSignal) [MemoryPoisoningSignal]: Memory Poisoning Signal. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include memory_poisoning_signal_id, threat_signal_id, confidence.", ja: "メモリ汚染シグナル(MemoryPoisoningSignal) [MemoryPoisoningSignal]: メモリ汚染シグナル. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: memory_poisoning_signal_id, threat_signal_id, confidence."}
    field_values:
      affected_record_revision: 18-19
      confidence: 0.84
