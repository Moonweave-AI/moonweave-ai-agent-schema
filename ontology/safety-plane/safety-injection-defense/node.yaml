        - InstructionConflict
      decision: owns
      owner_module_id: safety-injection-defense
      rationale:
        zh: InstructionConflict 是安全域拥有的冲突判定，由适用且作用域重叠的指令之间存在不可同时满足的义务确定。两条 accepted 边都以它为目标；PromptInjectionSignal 属于另一条威胁分类路径。
        en: InstructionConflict is the safety-owned finding identified by mutually unsatisfiable obligations among applicable scope-overlapping instructions. It is the target of both accepted edges; PromptInjectionSignal belongs to a separate threat-classification path.
