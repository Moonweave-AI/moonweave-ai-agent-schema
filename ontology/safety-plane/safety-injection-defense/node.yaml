module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 注入与内容投毒防御的输入概念族为不可信指令候选；责任交接由已接受事实 模式扫描 —scans→ 不可信指令候选 (PatternScan-scans-UntrustedInstructionCandidate) 明确给出。
          en: The input families for Injection and content-poisoning defense are untrusted instruction candidate; the accepted facts pattern scan —scans→ untrusted instruction candidate (PatternScan-scans-UntrustedInstructionCandidate) make the responsibility handoff explicit.
          ja: 注入とコンテンツ汚染防御の入力概念族は不信頼指示候補です。責任の受け渡しは承認済み事実 パターン走査 —scans→ 不信頼指示候補 (PatternScan-scans-UntrustedInstructionCandidate) により明示されます。
        family_concept_ids:
          - UntrustedInstructionCandidate
        relation_ids:
          - PatternScan-scans-UntrustedInstructionCandidate
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 注入与内容投毒防御的输出概念族为注入扫描结果、防御发现；责任交接由已接受事实 模式扫描 —produces→ 注入扫描结果 (PatternScan-produces-InjectionScanResult)；注入扫描结果 —supports→ 防御发现 (InjectionScanResult-supports-DefenseFinding) 明确给出。
          en: The output families for Injection and content-poisoning defense are injection scan result, defense finding; the accepted facts pattern scan —produces→ injection scan result (PatternScan-produces-InjectionScanResult); injection scan result —supports→ defense finding (InjectionScanResult-supports-DefenseFinding) make the responsibility handoff explicit.
          ja: 注入とコンテンツ汚染防御の出力概念族は注入走査結果、防御所見です。責任の受け渡しは承認済み事実 パターン走査 —produces→ 注入走査結果 (PatternScan-produces-InjectionScanResult)；注入走査結果 —supports→ 防御所見 (InjectionScanResult-supports-DefenseFinding) により明示されます。
        family_concept_ids:
          - InjectionScanResult
          - DefenseFinding
        relation_ids:
          - PatternScan-produces-InjectionScanResult
          - InjectionScanResult-supports-DefenseFinding
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 注入与内容投毒防御的失败概念族为持久上下文风险、受污染内容；责任交接由已接受事实 威胁信号 —indicates→ 持久上下文风险 (ThreatSignal-indicates-PersistentContextRisk)；资源内容投毒 —affects→ 受污染内容 (ResourceContentPoisoning-affects-PoisonedContent) 明确给出。
          en: The failure families for Injection and content-poisoning defense are persistent context risk, poisoned content; the accepted facts threat signal —indicates→ persistent context risk (ThreatSignal-indicates-PersistentContextRisk); resource content poisoning —affects→ poisoned content (ResourceContentPoisoning-affects-PoisonedContent) make the responsibility handoff explicit.
          ja: 注入とコンテンツ汚染防御の失敗概念族は永続コンテキストリスク、汚染内容です。責任の受け渡しは承認済み事実 脅威信号 —indicates→ 永続コンテキストリスク (ThreatSignal-indicates-PersistentContextRisk)；リソース内容汚染 —affects→ 汚染内容 (ResourceContentPoisoning-affects-PoisonedContent) により明示されます。
        family_concept_ids:
          - PersistentContextRisk
          - PoisonedContent
        relation_ids:
          - ThreatSignal-indicates-PersistentContextRisk
          - ResourceContentPoisoning-affects-PoisonedContent
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 注入与内容投毒防御的恢复概念族为缓解活动、可信指令覆盖；责任交接由已接受事实 缓解活动 —addresses→ 防御发现 (MitigationAction-addresses-DefenseFinding)；指令冲突 —resolved_by→ 可信指令覆盖 (InstructionConflict-resolved_by-TrustedInstructionOverride) 明确给出。
          en: The recovery families for Injection and content-poisoning defense are mitigation action, trusted instruction override; the accepted facts mitigation action —addresses→ defense finding (MitigationAction-addresses-DefenseFinding); instruction conflict —resolved_by→ trusted instruction override (InstructionConflict-resolved_by-TrustedInstructionOverride) make the responsibility handoff explicit.
          ja: 注入とコンテンツ汚染防御の回復概念族は緩和活動、信頼済み指示上書きです。責任の受け渡しは承認済み事実 緩和活動 —addresses→ 防御所見 (MitigationAction-addresses-DefenseFinding)；指示衝突 —resolved_by→ 信頼済み指示上書き (InstructionConflict-resolved_by-TrustedInstructionOverride) により明示されます。
        family_concept_ids:
          - MitigationAction
          - TrustedInstructionOverride
        relation_ids:
          - MitigationAction-addresses-DefenseFinding
          - InstructionConflict-resolved_by-TrustedInstructionOverride
        not_applicable_reason: null
