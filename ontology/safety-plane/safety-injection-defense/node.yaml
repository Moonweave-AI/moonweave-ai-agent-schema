  overlap_checks:
    - other_module_id: info-prompts-instructions
      semantic_area:
        zh: 普通指令冲突解析与安全注入冲突
        en: Ordinary instruction resolution versus security injection conflict
        ja: 通常の指示競合解析と安全注入競合
      candidate_concept_ids:
        - InstructionConflictDetectionActivity
        - InstructionResolution
      overlap_reason:
        zh: 两者都比较指令权威，但普通解析解决合法指令优先级，安全冲突还需要不可信来源、越权意图或投毒证据。 本条仅记录 InstructionConflictDetectionActivity、InstructionResolution；其 canonical owner 是提示与指令（info-prompts-instructions），因此 safety-injection-defense 在此引用这些概念。
        en: Both compare instruction authority, but ordinary resolution handles legitimate precedence while a security conflict additionally requires untrusted source, privilege-escalation intent, or poisoning evidence. This record is limited to InstructionConflictDetectionActivity, InstructionResolution; their canonical owner is Prompts and instructions (info-prompts-instructions), so safety-injection-defense references these concepts here.
