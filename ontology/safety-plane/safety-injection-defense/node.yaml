            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 本体复核确认两条边分别从检测活动和解决活动指向 InstructionConflict；已退役 instruction_flagged_as_prompt_injection 不再作为投影证据。
              en: Ontology review confirms that InstructionConflictDetectionActivity-detects-InstructionConflict and InstructionResolutionActivity-resolves-InstructionConflict point from their respective activities to InstructionConflict; retired instruction_flagged_as_prompt_injection is excluded.
              ja: 二つの activity → InstructionConflict 方向を確認し retired instruction_flagged_as_prompt_injection を除外しました。
    - other_module_id: info-prompts-instructions
