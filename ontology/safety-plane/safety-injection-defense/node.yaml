schema: moonweave.ai/ontology-node/v1
id: safety-injection-defense
kind: module
status: accepted
labels:
  zh: 内容完整性与注入防御
  en: Content integrity and injection defense
  ja: 内容完全性と注入防御
semantics:
  short_definition:
    zh: 内容完整性与注入防御描述不可信内容如何被检测为提示注入、资源投毒或工具输出污染，威胁影响如何沿来源—接收方路径传播，以及系统如何隔离、降权、拒绝或复检。它只拥有经过安全判定的信号、发现、污点和缓解；普通内容、来源记录和一般指令优先级判断仍归信息域。
    en: Content integrity and injection defense describes how untrusted content is assessed as prompt injection, resource poisoning, or malicious tool output, how its influence propagates along source-to-sink paths, and how the system quarantines, de-prioritizes, rejects, or retests it. It owns only security-assessed signals, findings, taint, and mitigations; ordinary content, provenance records, and general instruction-priority resolution remain in the information domain.
    ja: 内容完全性と注入防御は、不信頼内容をプロンプト注入、資源汚染、悪意あるツール出力として評価し、その影響が発生源から受け手へどう伝播し、隔離、優先度低下、拒否、再検査でどう緩和されるかを記述します。所有するのは安全判断を伴う信号、所見、汚染、緩和だけであり、通常の内容、来歴記録、一般的な指示優先順位の判断は情報領域に残ります。
  definition:
    zh: 内容完整性与注入防御描述不可信内容如何被检测为提示注入、资源投毒或工具输出污染，威胁影响如何沿来源—接收方路径传播，以及系统如何隔离、降权、拒绝或复检。它只拥有经过安全判定的信号、发现、污点和缓解；普通内容、来源记录和一般指令优先级判断仍归信息域。
    en: Content integrity and injection defense describes how untrusted content is assessed as prompt injection, resource poisoning, or malicious tool output, how its influence propagates along source-to-sink paths, and how the system quarantines, de-prioritizes, rejects, or retests it. It owns only security-assessed signals, findings, taint, and mitigations; ordinary content, provenance records, and general instruction-priority resolution remain in the information domain.
    ja: 内容完全性と注入防御は、不信頼内容をプロンプト注入、資源汚染、悪意あるツール出力として評価し、その影響が発生源から受け手へどう伝播し、隔離、優先度低下、拒否、再検査でどう緩和されるかを記述します。所有するのは安全判断を伴う信号、所見、汚染、緩和だけであり、通常の内容、来歴記録、一般的な指示優先順位の判断は情報領域に残ります。
  why_needed:
    zh: 将“内容来自哪里”“内容是否构成威胁”“威胁影响到哪里”“采取了什么处置”分成可验证事实。
    en: Separate where content came from, whether it constitutes a threat, where its influence reached, and what mitigation occurred into verifiable facts.
    ja: 内容の出所、脅威に該当するか、影響がどこまで届いたか、どの緩和を行ったかを、検証可能な別々の事実として保持します。
  includes:
    - zh: 版本化检测特征、检测活动、威胁信号、经过判定的防御发现，以及被确认的投毒内容或工具描述污染。
      en: Versioned detection signatures, detection activities, threat signals, assessed defense findings, and confirmed poisoned content or tool-description poisoning.
      ja: 版管理された検出特徴、検出活動、脅威信号、評価済みの防御所見、確認された汚染内容やツール記述汚染を含みます。
    - zh: 仅在不可信指令与更高权威指令构成安全冲突时的 InstructionConflict，以及污点实体、来源—接收方路径、污点传播和可验证缓解。
      en: InstructionConflict only when an untrusted instruction conflicts with a higher-authority instruction as a security finding, together with taint entities, source-to-sink paths, taint propagation, and verifiable mitigation.
      ja: 不信頼指示と上位権威の指示の不一致が安全所見となる場合の InstructionConflict、汚染対象、発生源―受け手経路、汚染伝播、検証可能な緩和を含みます。
  excludes:
    - zh: PromptTemplate、Instruction、权威层级和一般指令冲突解析归提示与指令；没有不可信来源和安全判定的冲突不是本模块对象。
      en: PromptTemplate, Instruction, authority levels, and general instruction-conflict resolution belong to prompts and instructions; a conflict without an untrusted source and security assessment is not owned here.
      ja: PromptTemplate、Instruction、権威階層、一般的な指示競合の解決はプロンプトと指示に属します。不信頼な出所と安全評価を伴わない競合は本モジュールの対象ではありません。
    - zh: 通用内容块、来源引用、普通工具结果和检索片段归其业务模块；它们只有在获得威胁、污点或缓解身份后才与本模块发生关系。
      en: Generic content blocks, source references, ordinary tool results, and retrieved chunks belong to their business modules; they relate to this module only after receiving a threat, taint, or mitigation identity.
      ja: 一般的な内容ブロック、出典参照、通常のツール結果、検索断片は各業務モジュールに属し、脅威、汚染、緩和の同一性が付与された場合だけ本モジュールと関係します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为不可信内容从检测、定性、影响传播到缓解复检建立可追溯的安全链路。
  en: Establish a traceable safety chain from detection and threat assessment through influence propagation to mitigation and retesting of untrusted content.
  ja: 不信頼内容について、検出、脅威評価、影響伝播、緩和、再検査までの追跡可能な安全連鎖を確立します。
structure: null
examples:
  - id: safety-injection-defense-cq-taint-provenance-v3-example-positive
    kind: positive
    labels:
      zh: 某段内容为何被标记为 Taint，污点从哪个来源经哪些转换传播到当前对象？：正例
      en: "Why was content marked with Taint, and from which source through which transformations did taint reach the current object?: positive case"
      ja: 内容が Taint とされた理由と、どの出典からどの変換を経て現在対象へ伝播したかを示せますか。：正例
    scenario_id: null
    descriptions:
      zh: DocumentLoader loader/web-3 通过 SourceAttachment attachment/page-88 摄入网页 object/page-88。检测器 injector-v4.2 在字符 811..904 形成 signal/ipi-88；taint/source-88 经 HTML 提取 event/taint-88-a 和摘要 event/taint-88-b 传播到 summary/88 的字符 92..157。
      en: DocumentLoader loader/web-3 ingests webpage object/page-88 through SourceAttachment attachment/page-88. Detector injector-v4.2 forms signal/ipi-88 at characters 811..904; taint/source-88 propagates through HTML extraction event/taint-88-a and summarization event/taint-88-b to characters 92..157 of summary/88.
      ja: DocumentLoader loader/web-3 は SourceAttachment attachment/page-88 を通じて webpage object/page-88 を取込みます。detector injector-v4.2 は文字 811..904 で signal/ipi-88 を形成し、taint/source-88 は HTML 抽出 event/taint-88-a と要約 event/taint-88-b を経て summary/88 の文字 92..157 へ伝播します。
    field_values:
      source_attachment_id: attachment/page-88
      document_loader_id: loader/web-3
      originating_object_id: object/page-88
      originating_span: chars:811..904
      threat_signal_id: signal/ipi-88
      tainted_source_id: taint/source-88
      propagation_events:
        - event_id: event/taint-88-a
          transformation: html-extract
          source: taint/source-88
          target: taint/chunk-88
        - event_id: event/taint-88-b
          transformation: summarize
          source: taint/chunk-88
          target: taint/summary-88
      current_tainted_span_id: taint/summary-88#chars:92..157
      detector_version: injector-v4.2
      provenance_complete: true
    related_node_ids:
      - SourceAttachment
      - DocumentLoader
      - ThreatSignal
      - TaintPropagation
      - TaintEntity
      - TaintedSource
      - TaintedSpan
    related_relation_ids:
      - SourceSinkFlow-records-TaintPropagation
      - TaintPropagation-has_source_entity-TaintEntity
      - TaintPropagation-has_target_entity-TaintEntity
    expected_result:
      zh: 返回 attachment/page-88、signal/ipi-88、两个按顺序排列的传播事件和当前 tainted span，并令 provenance_complete=true；同时标明 ingestion 对象与 safety taint 之间没有可凭名称自动生成的 canonical 跨模块边。
      en: Return attachment/page-88, signal/ipi-88, the two ordered propagation events, and the current tainted span with provenance_complete=true. Also state that no canonical cross-module edge from ingestion objects to safety taint may be invented from names.
      ja: attachment/page-88、signal/ipi-88、順序付き二つの伝播 event、current tainted span、provenance_complete=true を返します。また ingestion object と safety taint の間に名称だけで canonical cross-module edge を生成できないと明示します。
    why_valid_or_invalid:
      zh: 威胁信号给出起始证据跨度，每次 TaintPropagation 都记录源、目标、变换与事件 ID；来源附件只提供摄取出处，不能替代安全判断或传播事实。
      en: The threat signal supplies the originating evidence span, and each TaintPropagation records source, target, transformation, and event identity. SourceAttachment supplies ingestion provenance only; it cannot substitute for a safety finding or propagation event.
      ja: threat signal が起点 evidence span を与え、各 TaintPropagation は source・target・transformation・event identity を記録します。SourceAttachment は ingestion provenance のみで、安全判断や伝播 event の代用にはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-injection-defense-003
      - claim-safety-injection-defense-004
  - id: safety-injection-defense-cq-taint-provenance-v3-example-counter
    kind: counterexample
    labels:
      zh: 某段内容为何被标记为 Taint，污点从哪个来源经哪些转换传播到当前对象？：反例
      en: "Why was content marked with Taint, and from which source through which transformations did taint reach the current object?: counterexample"
      ja: 内容が Taint とされた理由と、どの出典からどの変換を経て現在対象へ伝播したかを示せますか。：反例
    scenario_id: null
    descriptions:
      zh: 候选 span taint/summary-89#chars:12..44 与 attachment/page-89 出现在同一 ingestion/run-89 中，但没有 ThreatSignal、检测跨度或任何 TaintPropagation 事件；唯一依据是两者在图中距离较近。
      en: Candidate span taint/summary-89#chars:12..44 and attachment/page-89 occur in the same ingestion/run-89, but there is no ThreatSignal, detector span, or TaintPropagation event. Graph proximity is the only claimed basis.
      ja: 候補 span taint/summary-89#chars:12..44 と attachment/page-89 は同じ ingestion/run-89 に現れますが、ThreatSignal・detector span・TaintPropagation event がありません。根拠は graph 上の近接だけです。
    field_values:
      candidate_tainted_span_id: taint/summary-89#chars:12..44
      co_occurring_source_attachment_id: attachment/page-89
      shared_ingestion_run_id: ingestion/run-89
      threat_signal_id: null
      propagation_events: []
      provenance_complete: false
    related_node_ids:
      - SourceAttachment
      - DocumentLoader
      - ThreatSignal
      - TaintPropagation
      - TaintEntity
      - TaintedSource
      - TaintedSpan
    related_relation_ids:
      - SourceSinkFlow-records-TaintPropagation
      - TaintPropagation-has_source_entity-TaintEntity
      - TaintPropagation-has_target_entity-TaintEntity
    expected_result:
      zh: 返回 provenance_complete=false、missing_threat_signal 与 missing_propagation_events；不得把共同摄取批次、文本相似或图距离当作 taint 传播。
      en: Return provenance_complete=false, missing_threat_signal, and missing_propagation_events. Shared ingestion, text similarity, or graph distance must not be treated as taint propagation.
      ja: provenance_complete=false、missing_threat_signal、missing_propagation_events を返し、共同 ingestion・text similarity・graph distance を taint 伝播とは扱いません。
    why_valid_or_invalid:
      zh: SourceAttachment 只证明“从何处摄入”，不证明内容有害；缺少起始 ThreatSignal 和逐步传播事件时，TaintedSpan 身份没有可审计依据。
      en: SourceAttachment proves where content was ingested, not that it is harmful. Without an originating ThreatSignal and stepwise propagation events, the TaintedSpan identity has no auditable basis.
      ja: SourceAttachment は取込元だけを証明し、内容の有害性を証明しません。起点 ThreatSignal と段階的 propagation event がなければ TaintedSpan identity に監査可能な根拠はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-injection-defense-005
      - claim-safety-injection-defense-006
  - id: safety-injection-defense-cq-instruction-conflict-v3-example-positive
    kind: positive
    labels:
      zh: 哪些指令构成安全冲突，冲突涉及的权威、来源和潜在越权目标是什么？：正例
      en: "Which instructions form a security conflict, and what authority, source, and attempted privilege escalation are involved?: positive case"
      ja: どの指示が安全競合を構成し、関係する権威、出典、潜在的権限昇格目標は何ですか。：正例
    scenario_id: null
    descriptions:
      zh: developer 指令 instruction/no-external-transfer 禁止向外部账户转账；检索网页中的候选 candidate/web-411 要求调用 transfer_funds，并自称拥有 payments:write。实际授予范围只有 support:read，检测活动 detect/conflict-411 因来源不受信与越权目标生成 conflict/411。
      en: Developer instruction instruction/no-external-transfer forbids transfers to external accounts. Retrieved candidate/web-411 asks to call transfer_funds and self-claims payments:write, while its actual grant is support:read. Detection activity detect/conflict-411 creates conflict/411 from the untrusted source and privilege target.
      ja: developer instruction instruction/no-external-transfer は外部 account への送金を禁止します。retrieved candidate/web-411 は transfer_funds を要求して payments:write を自己主張しますが、実際の grant は support:read だけです。検出活動 detect/conflict-411 は不信 source と越権 target により conflict/411 を生成します。
    field_values:
      instruction_conflict_id: conflict/411
      authoritative_instruction_id: instruction/no-external-transfer
      authoritative_instruction_authority: developer
      candidate_id: candidate/web-411
      candidate_source: retrieved-webpage
      requested_action: transfer_funds(account=external-991, amount=5000)
      required_scope: payments:write
      granted_scope: support:read
      violated_constraint: untrusted content cannot expand delegated authority
      detector_activity_id: detect/conflict-411
      mitigation_action_id: override/411
    related_node_ids:
      - Instruction
      - InstructionAuthority
      - InstructionScope
      - InstructionConflictDetectionActivity
      - InstructionConflict
      - PromptInjectionSignal
      - TrustedInstructionOverride
    related_relation_ids:
      - Instruction-has_authority-InstructionAuthority
      - Instruction-has_scope-InstructionScope
      - InstructionConflictDetectionActivity-detects-InstructionConflict
      - InstructionConflict-resolved_by-TrustedInstructionOverride
    expected_result:
      zh: 返回 conflict/411、权威指令、候选来源、required_scope 与 granted_scope 的差异、越权目标及 override/411；不得接受候选文本中的 authority 自称。
      en: Return conflict/411, the authoritative instruction, candidate provenance, the required-versus-granted scope difference, the privilege target, and override/411. Do not accept authority asserted inside candidate text.
      ja: conflict/411、authoritative instruction、candidate provenance、required_scope と granted_scope の差、越権 target、override/411 を返し、candidate text 内の authority 自己主張を受け入れません。
    why_valid_or_invalid:
      zh: 冲突不只来自两个文本不一致：检测证据同时表明候选来自外部数据、没有授权范围且试图触发高风险动作，因此属于安全 InstructionConflict，而不是普通优先级解析。
      en: The conflict is not mere textual disagreement. Evidence shows an external-data candidate with no matching grant attempting a high-risk action, so it is a security InstructionConflict rather than ordinary precedence resolution.
      ja: conflict は単なる text 不一致ではありません。外部 data の candidate が対応 grant なしに高 risk action を試みた証拠があるため、通常の precedence resolution でなく security InstructionConflict です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-injection-defense-007
      - claim-safety-injection-defense-008
  - id: safety-injection-defense-cq-instruction-conflict-v3-example-counter
    kind: counterexample
    labels:
      zh: 哪些指令构成安全冲突，冲突涉及的权威、来源和潜在越权目标是什么？：反例
      en: "Which instructions form a security conflict, and what authority, source, and attempted privilege escalation are involved?: counterexample"
      ja: どの指示が安全競合を構成し、関係する権威、出典、潜在的権限昇格目標は何ですか。：反例
    scenario_id: null
    descriptions:
      zh: developer 指令 instruction/style-compact 与 user 指令 instruction/style-detailed 都适用于 response-format，前者权威更高；两者均来自已认证交互，没有 threat evidence，也未请求额外权限。普通解析选择 developer 指令即可。
      en: Developer instruction instruction/style-compact and user instruction instruction/style-detailed both apply to response-format, with the former having higher authority. Both originate from authenticated interaction, carry no threat evidence, and request no extra privilege; ordinary resolution selects the developer instruction.
      ja: developer instruction instruction/style-compact と user instruction instruction/style-detailed はともに response-format に適用され、前者の authority が高いです。両方とも認証済み interaction 由来で threat evidence も追加権限要求もなく、通常 resolution が developer instruction を選びます。
    field_values:
      instruction_ids:
        - instruction/style-compact
        - instruction/style-detailed
      authorities:
        - developer
        - user
      scope: response-format
      resolution_kind: ordinary-precedence
      threat_evidence_ids: []
      privilege_escalation_attempted: false
      safety_conflict_created: false
    related_node_ids:
      - Instruction
      - InstructionAuthority
      - InstructionScope
      - InstructionConflictDetectionActivity
      - InstructionConflict
      - PromptInjectionSignal
      - TrustedInstructionOverride
    related_relation_ids:
      - Instruction-has_authority-InstructionAuthority
      - Instruction-has_scope-InstructionScope
      - InstructionConflictDetectionActivity-detects-InstructionConflict
      - InstructionConflict-resolved_by-TrustedInstructionOverride
    expected_result:
      zh: 返回 resolution_kind=ordinary-precedence 与 safety_conflict_created=false；该记录留在提示与指令域，不创建 PromptInjectionSignal、InstructionConflict 或 TrustedInstructionOverride。
      en: Return resolution_kind=ordinary-precedence and safety_conflict_created=false. Keep the record in prompts and instructions and create no PromptInjectionSignal, InstructionConflict, or TrustedInstructionOverride.
      ja: resolution_kind=ordinary-precedence と safety_conflict_created=false を返し、record は prompts-and-instructions に残して PromptInjectionSignal・InstructionConflict・TrustedInstructionOverride を作りません。
    why_valid_or_invalid:
      zh: 已声明权威与同一作用域足以解决偏好差异，且不存在不受信来源、攻击模式或越权目标；若仍创建安全冲突，就会把普通指令解析错误膨胀成威胁图。
      en: Declared authority within one scope fully resolves the preference difference, with no untrusted source, attack pattern, or privilege target. Creating a safety conflict would wrongly inflate ordinary instruction resolution into the threat graph.
      ja: 同一 scope の宣言済み authority だけで preference 差を解決でき、不信 source・attack pattern・privilege target はありません。security conflict を作ると通常 instruction resolution を threat graph へ誤って膨張させます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-injection-defense-009
      - claim-safety-injection-defense-010
  - id: safety-injection-defense-cq-mitigation-verification-v3-example-positive
    kind: positive
    labels:
      zh: 隔离、降权或拒绝缓解后，威胁内容是否仍能进入上下文或影响高权威指令？：正例
      en: "After quarantine, de-prioritization, or refusal mitigation, can threatening content still enter context or affect higher-authority instructions?: positive case"
      ja: 隔離、優先度低下、拒否の緩和後、脅威内容はコンテキストへ入り高権威指示へ影響できますか。：正例
    scenario_id: null
    descriptions:
      zh: finding/ipi-700 由 quarantine/700 处置，原始 poisoned/chunk-700 保留用于取证但退出普通检索。rescan/700 对同一对象与后续上下文重跑检测，residual_taint_paths=[]；上下文域独立记录 exclusion/700，原因为 quarantined-threat。
      en: Finding finding/ipi-700 is addressed by quarantine/700. Original poisoned/chunk-700 is preserved for forensics but removed from normal retrieval. Rescan/700 reruns detection over the same object and subsequent context with residual_taint_paths=[]; the context domain independently records exclusion/700 for quarantined-threat.
      ja: finding/ipi-700 は quarantine/700 で処置され、original poisoned/chunk-700 は forensic 用に保持しつつ通常 retrieval から外れます。rescan/700 は同 object と後続 context を再検査して residual_taint_paths=[]、context domain は quarantined-threat を理由に exclusion/700 を独立記録します。
    field_values:
      finding_id: finding/ipi-700
      mitigation_action_id: quarantine/700
      mitigation_kind: quarantine
      quarantined_content_id: poisoned/chunk-700
      rescan_id: rescan/700
      residual_taint_paths: []
      context_exclusion_id: exclusion/700
      exclusion_reason: quarantined-threat
      mitigation_status: verified
    related_node_ids:
      - DefenseFinding
      - MitigationAction
      - QuarantineAction
      - SanitizationAction
      - TrustedInstructionOverride
      - PoisonedContent
      - ContextArtifact
      - ContextExclusion
    related_relation_ids: []
    expected_result:
      zh: 返回 finding、已执行 quarantine、同对象 rescan、空残余路径和 context exclusion，并令 mitigation_status=verified；同时声明安全域与上下文域之间只有边界核对，没有可捏造的 canonical 传递边。
