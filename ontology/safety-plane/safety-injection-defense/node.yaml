source_claims:
  - id: claim-safety-injection-defense-001
    source: eng-fw-openai-guardrails
    supports: Source eng-fw-openai-guardrails at Documentation page > OpenAI guardrails docs heading and documented conceptual model supports operational notions used in safety-injection-defense, including key notion ThreatSignal (threat signal). The source does not define Moonweave Module safety-injection-defense, its class or relation placement, or its ownership boundary. Treating objects under owns_when "Own an object when its identity is determined by injection or poisoning detection, security judgment of instruction conflict, taint propagation, or mitigation of that threat." as owned by safety-injection-defense is a Moonweave design inference over the registered evidence.
    locator: Guardrails > Workflow boundaries, Input guardrails, Tool guardrails, and Tripwires
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-002
    source: eng-security-mcp-nsa-2026
    supports: Source eng-security-mcp-nsa-2026 at Documentation page > NSA MCP Security Design Considerations heading and documented conceptual model supports operational notions used in safety-injection-defense, including key notion ThreatSignal (threat signal). The source does not define Moonweave Module safety-injection-defense, its class or relation placement, or its ownership boundary. Treating objects under owns_when "Own an object when its identity is determined by injection or poisoning detection, security judgment of instruction conflict, taint propagation, or mitigation of that threat." as owned by safety-injection-defense is a Moonweave design inference over the registered evidence.
    locator: Security concerns > implicit trust, context sharing, and semantic/tool poisoning; Recommendations > Validate parameters and Filter and monitor output pipelines (pp. 4, 9-13)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-003
    source: eng-security-nist-ai-100-2e2025
    supports: NIST describes indirect prompt injection through attacker-controlled external resources and notes that execution triggers can persist through RAG phases such as chunking and contextual filtering. It does not define taint IDs or lineage edges; Moonweave design inference records each concrete transformation as a TaintPropagation event.
    locator: 搂3.4 Indirect Prompt Injection Attacks (NISTAML.015), pp. 62-64; 搂3.4.2 execution triggers, p. 64
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-004
    source: eng-security-mcp-nsa-2026
    supports: NSA describes poisoned outputs propagating through chained agent processes and recommends logging exact parameters, identities, and hashes. It does not define Moonweave TaintEntity or SourceAttachment. Moonweave design inference uses those logged identifiers to require an explicit, replayable provenance chain.
    locator: Security concerns > Poisoning output for downstream automation (p. 8); Recommendations > Instrument for logging and detection (p. 12)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-005
    source: eng-security-nist-ai-100-2e2025
    supports: NIST ties indirect prompt injection to adversarial influence from external resources and specific processing paths; it does not say that every ingested external item is tainted. Moonweave does not infer taint from co-ingestion or proximity and requires explicit signal and propagation records.
    locator: 搂3.4 Indirect Prompt Injection Attacks (NISTAML.015), pp. 62-65
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-006
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends inspecting each tool output before passing it onward and logging exact invocation facts. It does not infer compromise from shared execution context; Moonweave does not infer a TaintPropagation event where no source, target, transformation, or detection evidence was logged.
    locator: Recommendations > Filter and monitor output pipelines and chained execution (pp. 11-12); Instrument for logging and detection (p. 12)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-007
    source: eng-security-nist-ai-100-2e2025
    supports: NIST identifies indirect prompt injection as attacker-controlled data affecting system operations and lists hierarchical trust relationships, filtering third-party instructions, and separation of trusted from untrusted data as mitigations. It does not define Moonweave InstructionConflict; the authority-and-scope test is a Moonweave design inference.
    locator: 搂3.4 Indirect Prompt Injection Attacks (NISTAML.015), pp. 62-65; 搂3.4.4 Mitigations, pp. 65-66
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-008
    source: eng-security-owasp-llm01-2025
    supports: OWASP distinguishes direct and indirect prompt injection and recommends least privilege plus human approval for high-risk actions. It does not define instruction-authority metadata or conflict identity; Moonweave design inference classifies a conflict as security-relevant only when threat, trust, or privilege evidence is present.
    locator: LLM01:2025 > Types of Prompt Injection Vulnerabilities; Prevention and Mitigation Strategies > Enforce privilege control and least privilege; Require human approval
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-009
    source: eng-security-nist-ai-100-2e2025
    supports: NIST discusses hierarchical trust as a prompt-injection mitigation, not as evidence that every normal hierarchy resolution is an attack. Moonweave does not infer an InstructionConflict without untrusted-source, threat, or privilege-violation evidence.
    locator: 搂3.4.4 Mitigations > hierarchical trust relationships and separating trusted from untrusted data, pp. 65-66
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-010
    source: eng-security-owasp-llm01-2025
    supports: OWASP defines prompt injection through unintended behavioral alteration and resulting unauthorized outcomes. It does not classify authenticated preference disagreement as injection; Moonweave does not infer a security finding where no threat or unauthorized action is evidenced.
    locator: LLM01:2025 > Prompt Injection definition; Types of Prompt Injection Vulnerabilities; Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-011
    source: eng-fw-openai-guardrails
    supports: OpenAI tool guardrails distinguish allow, reject_content, and raise_exception behaviors and allow granular output_info about performed checks. They do not define Moonweave quarantine or residual-path closure; requiring executed action plus rescan evidence is a Moonweave design inference.
    locator: Tool guardrails > ToolGuardrailFunctionOutput > output_info and behavior (allow, reject_content, raise_exception)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-012
    source: eng-security-nist-ai-100-2e2025
    supports: NIST states that current indirect-prompt-injection mitigations do not fully protect against all techniques and recommends designs that assume attacks remain possible with untrusted inputs. It does not prescribe Moonweave status transitions; post-mitigation residual-path verification is a Moonweave design inference.
    locator: 搂3.4.4 Mitigations > limitations of current protections and untrusted-input assumption, pp. 65-66
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-013
    source: eng-fw-openai-guardrails
    supports: OpenAI tool guardrails expose behavior separately from output_info about checks. They do not state that a reject or replacement proves all downstream paths safe. Moonweave does not infer closure from an action label when post-action evidence still reports a hazardous path.
    locator: Tool guardrails > ToolGuardrailFunctionOutput > output_info and behavior (allow, reject_content, raise_exception)
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-injection-defense-014
    source: eng-security-nist-ai-100-2e2025
    supports: NIST cautions that present mitigations do not cover every indirect-prompt-injection technique. It does not define Moonweave finding lifecycle; Moonweave does not infer mitigation success while a rescan reports a residual path to a protected action.
    locator: 搂3.4.4 Mitigations > limitations of current protections, pp. 65-66
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
