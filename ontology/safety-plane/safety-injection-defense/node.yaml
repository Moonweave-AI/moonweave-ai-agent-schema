sources:
  - id: owasp-llm-top10-2025
    title: OWASP Top 10 for LLM Applications 2025
    url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
    source_type: standard
    relevance: LLM01 prompt injection taxonomy, indirect injection, and RAG poisoning guidance.
  - id: agentsentry-2026
    title: AgentSentry — temporal causal diagnostics for agent security
    url: https://arxiv.org/abs/2602.22724
    source_type: paper
    relevance: Causal tracing of indirect prompt injection through tool outputs in multi-turn agents.
  - id: reasalign-2026
    title: ReasAlign — reasoning-enhanced safety alignment
    url: https://arxiv.org/abs/2601.10173
    source_type: paper
    relevance: Reasoning-chain safety alignment metrics (utility vs attack success rate).
  - id: mdpi-llm-security-review-2026
    title: LLM agent security review (MDPI Information 2026)
    url: https://www.mdpi.com/2078-2489/17/1/54
    source_type: journal
    relevance: MCP tool poisoning CVE cluster and agent supply-chain attacks.
  - id: nemo-guardrails
    title: NVIDIA NeMo Guardrails
    url: https://docs.nvidia.com/nemo/guardrails/
    source_type: official-doc
    relevance: Colang 2.0 flows and input/output rails for boundary enforcement.
  - id: maxim-ai-injection-guide-2026
    title: Prompt injection defense for production AI agents (Maxim AI, 2026)
    url: https://www.getmaxim.ai/articles/prompt-injection-defense-for-production-ai-agents-a-complete-2026-guide/
    source_type: industry-guide
    relevance: Layered production defenses including gateway detection and mitigation verification.
  - id: openai-moderation-api
    title: OpenAI Moderation API
    url: https://platform.openai.com/docs/api-reference/moderations/create
    source_type: official-doc
    relevance: POST /v1/moderations ingress scanning shape.
  - id: azure-prompt-shield
    title: Azure AI Content Safety Prompt Shield
    url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
    source_type: official-doc
    relevance: attackDetected results for prompts and retrieved documents.
  - id: guardrails-ai-hub
    title: Guardrails AI input validation
    url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
    source_type: official-doc
    relevance: DetectPromptInjectionValidator and Guard pipeline integration.
  - id: safety-injection-module-design
    title: Moonweave injection-defense module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates detection, taint lineage, mitigation verification from content and instruction ownership.
source_claims:
  - id: claim-safety-injection-module-design
    source: safety-injection-module-design
    supports: The injection-defense module owns objects whose identity depends on security adjudication, taint assignment or propagation, source-to-sink risk paths, or mitigation and rescan of identified threats—not ordinary content or precedence resolution.
    locator: Module owns_when and boundary_decisions
    evidence_kind: design-inference
    confidence: high
  - id: claim-safety-injection-module-design
    source: agentsentry-2026
    supports: AgentSentry provides temporal causal diagnostics for indirect prompt injection mediated through tool outputs across multiple agent turns, motivating ThreatSignal, DefenseFinding, and TaintPropagation records with explicit causal evidence.
    locator: Tool-output indirect injection causal tracing
    evidence_kind: research
    confidence: high
  - id: claim-safety-injection-module-design
    source: reasalign-2026
    supports: ReasAlign reports reasoning-enhanced safety alignment achieving 94.6% utility with 3.6% attack success rate, supporting InstructionConflict detection backed by reasoning-chain evidence rather than bare text disagreement.
    locator: Reasoning-enhanced alignment metrics
    evidence_kind: research
    confidence: high
  - id: claim-safety-injection-module-design
    source: maxim-ai-injection-guide-2026
    supports: CVE-2025-53773 (CVSS 9.6) demonstrates real-world RCE via indirect prompt injection through repository configuration consumed by GitHub Copilot, requiring ResourceContentPoisoning and quarantine mitigation records.
    locator: Copilot indirect injection RCE case study
    evidence_kind: incident
    confidence: high
  - id: claim-safety-injection-module-design
    source: owasp-llm-top10-2025
    supports: OWASP LLM01:2025 classifies indirect prompt injection including RAG poisoning where a small set of poisoned documents can dominate retrieved behavior; taint must be evidenced by detection and propagation, not ingestion proximity.
    locator: LLM01 Prompt Injection — indirect injection and retrieval poisoning
    evidence_kind: standard
    confidence: high
  - id: claim-safety-injection-module-design
    source: mdpi-llm-security-review-2026
    supports: Early-2026 MCP ecosystems report 30+ CVEs involving tool-description and tool-output poisoning, requiring DefenseFinding lifecycle with quarantine and rescan before closure.
    locator: MCP tool poisoning survey
    evidence_kind: survey
    confidence: high
  - id: claim-safety-injection-module-design
    source: openai-moderation-api
    supports: OpenAI POST /v1/moderations returns category flags usable as ingress DetectionActivity evidence but not as a substitute for taint lineage or mitigation verification.
    locator: Create moderation — request and results schema
    evidence_kind: official
    confidence: high
  - id: claim-safety-injection-module-design
    source: azure-prompt-shield
    supports: Azure Prompt Shield shieldPrompt returns attackDetected for user prompts and documents, supporting PatternScan and DefenseFinding creation at RAG boundaries.
    locator: shieldPrompt response schema
    evidence_kind: official
    confidence: high
  - id: claim-safety-injection-module-design
    source: maxim-ai-injection-guide-2026
    supports: Production agent defenses separate trusted developer/system instructions from untrusted user and tool content, aligning with InstructionConflict checks rather than appearance-based role elevation.
    locator: Instruction hierarchy and isolation patterns
    evidence_kind: industry-guide
    confidence: medium
  - id: claim-safety-injection-module-design
    source: nemo-guardrails
    supports: NeMo Guardrails Colang 2.0 input rails can block untrusted influence in-flow before downstream tool planning, mapping to MitigationAction and TrustedInstructionOverride outcomes.
    locator: Colang flows and input rails
    evidence_kind: official
    confidence: high
  - id: claim-safety-injection-module-design
    source: guardrails-ai-hub
    supports: Guardrails AI DetectPromptInjectionValidator integrated via Guard.validate provides boundary adjudication with on_fail actions suitable for DefenseFinding and quarantine records.
    locator: DetectPromptInjectionValidator hub usage
    evidence_kind: official
    confidence: high
  - id: claim-safety-injection-module-design
    source: maxim-ai-injection-guide-2026
    supports: Agent gateways such as Bifrost expose prompt_injection_detection with configurable threshold and block action at ingress, supporting DetectionActivity logging before downstream propagation.
    locator: Gateway prompt injection detection configuration
    evidence_kind: industry-guide
    confidence: medium
  - id: claim-safety-injection-module-design
    source: maxim-ai-injection-guide-2026
    supports: Maxim AI 2026 production guide recommends layered scanners, taint-like tracking, and post-mitigation verification before admitting content to privileged actions.
    locator: Production agent injection defense layering
    evidence_kind: industry-guide
    confidence: high
