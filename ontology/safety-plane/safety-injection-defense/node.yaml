      - TaintPropagation-has_source_entity-TaintEntity
      - TaintPropagation-has_target_entity-TaintEntity
    source_claims:
      - claim-safety-injection-module-design
      - claim-safety-injection-module-design
  - id: safety-injection-defense-mcp-tool-poisoning-2026
    labels:
      zh: MCP 工具描述投毒集群（2026 初）
      en: MCP tool-description poisoning cluster (early 2026)
      ja: MCP ツール記述 poisoning クラスタ（2026 年初）
    descriptions:
      zh: 2026 年初 MCP 生态披露 30+ 相关 CVE，典型为恶意 tools/list 描述嵌入 hidden instruction；detect/mcp-poison-118 生成 finding/mcp-118，Guardrails DetectPromptInjectionValidator 与 Bifrost prompt_injection_detection 双边界拦截，quarantine/118 后在 rescan/118 通过前保持 finding open。
      en: In early 2026 the MCP ecosystem disclosed 30+ related CVEs, typically embedding hidden instructions in malicious tools/list descriptions. detect/mcp-poison-118 creates finding/mcp-118; Guardrails DetectPromptInjectionValidator and Bifrost prompt_injection_detection block at dual boundaries, keeping the finding open until rescan/118 passes after quarantine/118.
      ja: 2026 年初 MCP 生态系で 30 超の関連 CVE が開示され、悪意 tools/list 記述への hidden instruction 埋込が典型。detect/mcp-poison-118 が finding/mcp-118 を生成し、Guardrails DetectPromptInjectionValidator と Bifrost prompt_injection_detection が二重 boundary で阻止、quarantine/118 後 rescan/118 合格まで finding open。
    example_source: MCP tool poisoning CVE cluster (MDPI 2026 review; 30+ CVEs)
    field_values:
      cve_cluster_count: 30
      finding_id: finding/mcp-118
      detector_activity_id: detect/mcp-poison-118
      poisoned_tool_spec: tool-spec://payments-api@v3
