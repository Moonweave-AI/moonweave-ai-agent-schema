            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项领域复核确认安全侧端点并集只有 InstructionConflict；检测、解决和恶意注入分类是不同判断。
              en: Point-by-point domain review confirms InstructionConflict as the sole safety-side endpoint; detection, resolution, and malicious-injection classification are distinct judgments.
