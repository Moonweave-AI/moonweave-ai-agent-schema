  key_notion:
    zh: 检测活动
    en: detection activity
    ja: 検出活動
  owns_when:
    zh: 当对象必须依赖一次注入/投毒安全判定、污点赋值或传播、来源—接收方风险路径，或针对该威胁的缓解与复检才能识别时，由本模块拥有。
    en: Own an object when it can be identified only through an injection or poisoning security assessment, taint assignment or propagation, a source-to-sink risk path, or mitigation and retesting of that threat.
    ja: 注入・汚染の安全評価、汚染の付与・伝播、発生源―受け手のリスク経路、またはその脅威への緩和・再検査によってのみ識別できる対象を所有します。
  references_when:
    zh: 本模块引用原始内容、来源、指令、工具描述和结果；提示解析、记忆接入、上下文组装、能力调用或输出披露在避开已识别威胁时，引用防御发现、污点与缓解状态。
    en: This module references original content, provenance, instructions, tool descriptions, and results. Prompt resolution, memory ingestion, context assembly, capability invocation, or output disclosure references defense findings, taint, and mitigation state when avoiding an identified threat.
    ja: 本モジュールは元の内容、来歴、指示、ツール記述、結果を参照します。プロンプト解析、記憶取込、コンテキスト組立、能力呼び出し、出力開示は、識別済み脅威を避ける際に防御所見、汚染、緩和状態を参照します。
  boundary_decisions:
    - other_module_id: info-prompts-instructions
      subject_concept_ids:
        - InstructionConflictDetectionActivity
        - InstructionResolutionActivity
      decision: references
      owner_module_id: info-prompts-instructions
      rationale:
        zh: InstructionConflictDetectionActivity 与 InstructionResolutionActivity 是提示与指令域拥有的两次可审计活动；安全域拥有它们检测或解决的 InstructionConflict。InstructionConflictDetectionActivity-detects-InstructionConflict 只确认冲突，InstructionResolutionActivity-resolves-InstructionConflict 才记录已得出处理结论。
        en: InstructionConflictDetectionActivity and InstructionResolutionActivity are auditable occurrences owned by prompts and instructions; safety owns the InstructionConflict they detect or resolve. InstructionConflictDetectionActivity-detects-InstructionConflict only confirms a conflict, while InstructionResolutionActivity-resolves-InstructionConflict records a concluded resolution.
        ja: InstructionConflictDetectionActivity と InstructionResolutionActivity は prompts/instructions 所有の監査可能 activity、safety は検出・解決対象の InstructionConflict を所有します。前者は conflict 確認、後者は結論済み resolution を記録します。
      relation_ids:
        - InstructionConflictDetectionActivity-detects-InstructionConflict
        - InstructionResolutionActivity-resolves-InstructionConflict
      relation_not_applicable_reason: null
      source_claims:
        - claim-safety-injection-module-design
        - claim-safety-injection-module-design
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-safety-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项核对确认提示与指令侧只有 InstructionConflictDetectionActivity 和 InstructionResolutionActivity；普通 Instruction 不参与这两条 accepted 边。
              en: Point-by-point review confirms that the prompts-and-instructions side contains only InstructionConflictDetectionActivity and InstructionResolutionActivity; ordinary Instruction is not an endpoint of either accepted edge.
              ja: prompts/instructions 側 endpoint は二つの activity のみで ordinary Instruction は accepted edge に参加しないことを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 本体复核确认两条边分别从检测活动和解决活动指向 InstructionConflict；已退役 instruction_flagged_as_prompt_injection 不再作为投影证据。
              en: Ontology review confirms that InstructionConflictDetectionActivity-detects-InstructionConflict and InstructionResolutionActivity-resolves-InstructionConflict point from their respective activities to InstructionConflict; retired instruction_flagged_as_prompt_injection is excluded.
              ja: 二つの activity → InstructionConflict 方向を確認し retired instruction_flagged_as_prompt_injection を除外しました。
    - other_module_id: info-prompts-instructions
      subject_concept_ids:
        - InstructionConflict
      decision: owns
      owner_module_id: safety-injection-defense
      rationale:
        zh: InstructionConflict 是安全域拥有的冲突判定，由适用且作用域重叠的指令之间存在不可同时满足的义务确定。两条 accepted 边都以它为目标；PromptInjectionSignal 属于另一条威胁分类路径。
        en: InstructionConflict is the safety-owned finding identified by mutually unsatisfiable obligations among applicable scope-overlapping instructions. It is the target of both accepted edges; PromptInjectionSignal belongs to a separate threat-classification path.
        ja: InstructionConflict は適用可能で scope-overlap する instruction 間の同時充足不能 obligation で識別する safety-owned finding です。二つの accepted edge はともにこれを target とします。
      relation_ids:
        - InstructionConflictDetectionActivity-detects-InstructionConflict
        - InstructionResolutionActivity-resolves-InstructionConflict
      relation_not_applicable_reason: null
      source_claims:
        - claim-safety-injection-module-design
        - claim-safety-injection-module-design
      review:
        review_status: accepted
        reviewers:
