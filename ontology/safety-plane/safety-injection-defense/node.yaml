            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项核对确认提示与指令侧只有 InstructionConflictDetectionActivity 和 InstructionResolutionActivity；普通 Instruction 不参与这两条 accepted 边。
              en: Point-by-point review confirms that the prompts-and-instructions side contains only InstructionConflictDetectionActivity and InstructionResolutionActivity; ordinary Instruction is not an endpoint of either accepted edge.
              ja: prompts/instructions 側 endpoint は二つの activity のみで ordinary Instruction は accepted edge に参加しないことを確認しました。
