schema: moonweave.ai/ontology-node/v1
id: PoisonedContent
kind: concept
status: accepted
labels:
  zh: 被污染内容
  en: Poisoned Content
  ja: 汚染された内容
semantics:
  short_definition:
    zh: 被篡改或植入以影响代理行为的外部内容工件。
    en: An external content artifact altered or planted to influence agent behavior.
    ja: エージェント挙動に影響するよう改変または埋め込まれた外部内容アーティファクト。
  definition:
    zh: PoisonedContent 是其内容或上下文被植入或篡改以诱导不安全行为的既有内容工件。ResourceContentPoisoning 活动可将其作为评估输入，并以
      PROV-O wasUsedBy 表示该用途，而不是目录组成或该活动生成工件的断言。它不是 IndirectInjectionSignal 这样的检测评估，也不是 TaintedSpan
      这样的通用不受信任范围标记，更不是普通外部数据自动被认定为恶意。
    en: PoisonedContent is a pre-existing content artifact whose content or context
      was planted or altered to induce unsafe behavior. A ResourceContentPoisoning
      activity may use it as assessed input, expressed with PROV-O wasUsedBy rather
      than directory composition or an assertion that the activity generated the
      artifact. It is not a detection assessment such as IndirectInjectionSignal,
      a general untrusted-range marker such as TaintedSpan, or ordinary external
      data automatically deemed malicious.
    ja: PoisonedContent は安全でない行動を誘導するために内容または文脈が埋め込まれた、または改変された既存の内容アーティファクトである。ResourceContentPoisoning 活動はそれを評価入力として使用でき、その用途は
      ディレクトリ構成や活動が工件を生成したという主張ではなく PROV-O wasUsedBy で表す。IndirectInjectionSignal
      のような検出評価、TaintedSpan のような一般的な不信範囲印、または自動的に悪意と見なされる通常の外部データではない。
  why_needed:
    zh: 把受污染的工件与检测信号和通用来源污点分开，才能保留攻击内容证据并避免对全部外部数据的过度分类。
    en: Separating a poisoned artifact from detection signals and general provenance
      taint preserves attack-content evidence without overclassifying all
      external data.
    ja: 汚染アーティファクトを検出シグナルや一般的な来歴汚染から分けることで、全外部データを過剰分類せず攻撃内容の証拠を保持できる。
  includes:
    - zh: 资源来源、内容版本、污染证据、植入机制和完整性状态。
      en: Resource origin, content revision, poisoning evidence, insertion mechanism,
        and integrity state.
      ja: リソース出所、内容版、汚染証拠、挿入機構、完全性状態。
  excludes:
    - zh: 仅因其来自外部而不受信任的正常内容。
      en: Normal content that is merely untrusted because it is external.
      ja: 外部由来で信頼されないだけの通常内容。
  semantic_kind: entity
  aliases:
    - compromised-content
    - adversarial-content
engineering:
  explanation:
    zh: 保留支持投毒评估的精确资源修订和证据。可按需隔离或净化工件，但要使其内容身份区别于检测风险的信号和通用污点标注。
    en: Preserve the exact resource revision and evidence that supports the
      poisoning assessment. Quarantine or sanitize the artifact as needed, but
      keep its content identity distinct from the signal that detected risk and
      from generic taint annotations.
    ja: 汚染評価を裏付ける正確なリソース改訂と証拠を保持する。必要に応じて工件を隔離または無害化するが、その内容IDをリスク検出シグナルおよび一般的なテイント注釈から区別する。
  typical_input:
    - description:
        zh: 带篡改证据的资源内容
        en: Resource content with tampering evidence
        ja: 改ざん証拠を持つリソース内容
      format: '{"content_id":"doc-42","resource":"kb://support/article-42","revision":"r7","evidence":"hidden
        instruction added after signed revision"}'
      source_claims:
        - claim-owasp-prompt-injection
  typical_output:
    - description:
        zh: 被投毒内容记录
        en: Poisoned content record
        ja: 汚染内容記録
      format: '{"poisoned_content_id":"poisoned-42","content_revision_reference":"doc-42-r7","poisoning_evidence_reference":"integrity-diff-42","poisoning_mechanism":"instruction-insertion"}'
      source_claims:
        - claim-owasp-prompt-injection
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Covers indirect prompt injection through untrusted external content.
structure:
  identity_keys:
    - poisoned_content_id
  fields:
    - id: poisoned_content_id
      labels:
        zh: 被污染内容标识符
        en: Poisoned content ID
        ja: 汚染内容 ID
      definitions:
        zh: 一个经证据支持的受污染内容工件的稳定标识符。
        en: Stable identifier for one evidence-backed poisoned content artifact.
        ja: 一つの証拠に裏付けられた汚染内容アーティファクトの安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: poisoned-42
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
    - id: poisoning_mechanism
      labels:
        zh: 污染机制
        en: Poisoning mechanism
        ja: 汚染機構
      definitions:
        zh: 内容被植入或改写以影响行为的证据支持方式。
        en: The evidence-backed way content was inserted or altered to influence
          behavior.
        ja: 行動に影響するため内容が挿入または改変された、証拠に裏付けられた方法。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: instruction-insertion
      allowed_values:
        - instruction-insertion
        - schema-description-tampering
        - retrieval-index-tampering
      source_claims:
        - claim-owasp-prompt-injection
    - id: content_revision_reference
      labels:
        zh: 内容修订引用
        en: Content-revision reference
        ja: 内容改訂参照
      definitions:
        zh: 被评估为受污染的具体不可变内容修订引用。
        en: The specific immutable content revision assessed as poisoned.
        ja: 汚染されたものとして評価された、特定の不変な内容改訂への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: retrieved-chunk-42-r3
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
    - id: poisoning_evidence_reference
      labels:
        zh: 污染证据引用
        en: Poisoning-evidence reference
        ja: 汚染証拠参照
      definitions:
        zh: 说明该内容被植入或篡改而非仅仅来自不受信任来源的证据引用。
        en: Evidence showing that content was planted or altered rather than merely originating from an untrusted source.
        ja: 単に信頼できない出所から来たのではなく、内容が植え付けまたは改変されたことを示す証拠への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: integrity-diff-42
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
  constraints:
    - id: poisoned-content-evidence-and-revision
      severity: error
      expression_language: plain
      expression: A PoisonedContent record must identify the exact content revision
        and evidence of poisoning; external origin alone is insufficient.
      explanations:
        zh: 该分类要求的不只是通用不受信任来源标记。
        en: The classification requires more than a generic untrusted provenance label.
        ja: この分類には一般的な信頼できない出所ラベル以上のものが必要である。
      explanation:
        zh: 该分类要求的不只是通用不受信任来源标记。
        en: The classification requires more than a generic untrusted provenance label.
        ja: この分類には一般的な信頼できない出所ラベル以上のものが必要である。
      source_claims:
        - claim-owasp-prompt-injection
    - id: poisoned-content-assessment-provenance
      severity: error
      language: plain
      expression: A PoisonedContent record must retain its exact revision and
        poisoning evidence; when a ResourceContentPoisoning activity assesses it,
        the entity must retain a typed was_used_by relation to that activity and
        must not be treated as the activity's generated output.
      explanation:
        zh: 内容实体和评估该内容的活动必须分开建模并独立审计；被评估输入不是评估活动生成的输出。
        en: The content entity and the activity that assesses it are separately
          typed and independently auditable; an assessed input is not an output
          generated by that activity.
        ja: 内容エンティティとそれを評価する活動は別個に型付けして独立に監査し、評価された入力をその活動が生成した出力として扱ってはならない。
      source_claims:
        - claim-prov-o-use
  required_relations: []
examples:
  - id: poisoned-content-greshake_bing
    labels:
      zh: 被污染内容 - Greshake Bing Chat 间接注入
      en: Poisoned Content - Greshake Bing Chat indirect injection
      ja: 汚染された内容 - Greshake Bing Chat 間接注入
    descriptions: {zh: "被污染内容(PoisonedContent) [PoisonedContent]: 被篡改或植入以影响代理行为的外部内容工件。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", en: "Poisoned Content (PoisonedContent) [PoisonedContent]: An external content artifact altered or planted to influence agent behavior.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", ja: "汚染された内容(PoisonedContent) [PoisonedContent]: エージェント挙動に影響するよう改変または埋め込まれた外部内容アーティファクト。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference."}
    field_values:
      content_revision_reference: retrieved-chunk-42-r3
      poisoned_content_id: poisoned-42
      poisoning_evidence_reference: integrity-diff-42
      poisoning_mechanism: instruction-insertion
    related_node_ids:
      - PoisonedContent
    related_relation_ids: []
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-owasp-prompt-injection
  - id: poisoned-content-echoleak
    labels:
      zh: 被污染内容 - EchoLeak Copilot 邮件注入
      en: Poisoned Content - EchoLeak Copilot email injection
      ja: 汚染された内容 - EchoLeak Copilot メール注入
    descriptions: {zh: "被污染内容(PoisonedContent) [PoisonedContent]: 被篡改或植入以影响代理行为的外部内容工件。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", en: "Poisoned Content (PoisonedContent) [PoisonedContent]: An external content artifact altered or planted to influence agent behavior.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", ja: "汚染された内容(PoisonedContent) [PoisonedContent]: エージェント挙動に影響するよう改変または埋め込まれた外部内容アーティファクト。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference."}
    field_values:
      content_revision_reference: retrieved-chunk-42-r3
      poisoned_content_id: poisoned-42
      poisoning_evidence_reference: integrity-diff-42
      poisoning_mechanism: instruction-insertion
    related_node_ids:
      - PoisonedContent
    related_relation_ids: []
    example_source: EchoLeak CVE-2025-32711
    source_claims:
      - claim-owasp-prompt-injection
  - id: poisoned-content-perez_hackaprompt
    labels:
      zh: 被污染内容 - HackAPrompt 间接注入
      en: Poisoned Content - HackAPrompt indirect injection
      ja: 汚染された内容 - HackAPrompt 間接注入
    descriptions: {zh: "被污染内容(PoisonedContent) [PoisonedContent]: 被篡改或植入以影响代理行为的外部内容工件。. Perez & Ribeiro（2022）HackAPrompt 与 Greshake 等（2023）展示间接注入：攻击者将指令隐藏在 LLM 将处理的数据中（网页、邮件、文档）。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", en: "Poisoned Content (PoisonedContent) [PoisonedContent]: An external content artifact altered or planted to influence agent behavior.. Perez & Ribeiro (2022) HackAPrompt and Greshake et al. (2023, arXiv:2302.12173) show indirect injection: attackers hide instructions in data LLMs process (webpages, email, documents). Fields include poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", ja: "汚染された内容(PoisonedContent) [PoisonedContent]: エージェント挙動に影響するよう改変または埋め込まれた外部内容アーティファクト。. Perez & Ribeiro（2022）HackAPrompt と Greshake ほか（2023）は indirect injection：webpage/email/document に命令を隠す。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference."}
    field_values:
      content_revision_reference: retrieved-chunk-42-r3
      poisoned_content_id: poisoned-42
      poisoning_evidence_reference: integrity-diff-42
      poisoning_mechanism: instruction-insertion
    related_node_ids:
      - PoisonedContent
    related_relation_ids: []
    example_source: Perez HackAPrompt 2022
    source_claims:
      - claim-owasp-prompt-injection
  - id: poisoned-content-cve_email_assistant
    labels:
      zh: 被污染内容 - CVE-2024-5184 邮件助手
      en: Poisoned Content - CVE-2024-5184 email assistant
      ja: 汚染された内容 - CVE-2024-5184 メール assistant
    descriptions: {zh: "被污染内容(PoisonedContent) [PoisonedContent]: 被篡改或植入以影响代理行为的外部内容工件。. OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", en: "Poisoned Content (PoisonedContent) [PoisonedContent]: An external content artifact altered or planted to influence agent behavior.. OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content. Fields include poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference.", ja: "汚染された内容(PoisonedContent) [PoisonedContent]: エージェント挙動に影響するよう改変または埋め込まれた外部内容アーティファクト。. OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。 Fields: poisoned_content_id, poisoning_mechanism, poisoning_evidence_reference."}
    field_values:
      content_revision_reference: retrieved-chunk-42-r3
      poisoned_content_id: poisoned-42
      poisoning_evidence_reference: integrity-diff-42
      poisoning_mechanism: instruction-insertion
    related_node_ids:
      - PoisonedContent
    related_relation_ids: []
    example_source: CVE-2024-5184
    source_claims:
      - claim-owasp-prompt-injection
parent_relation: null
relations:
  - id: PoisonedContent-wasUsedBy-ResourceContentPoisoning
    predicate: was_used_by
    target: concept:ResourceContentPoisoning
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 被资源内容投毒活动使用
      en: was used by resource-content-poisoning activity
      ja: リソース内容汚染活動によって使用された
    definitions:
      zh: 已存在的 PoisonedContent 可被 ResourceContentPoisoning 活动用作评估输入，并以
        PROV-O wasUsedBy 记录该用途；内容工件不是活动的结构组成部分或由该评估生成的输出。
      en: A pre-existing PoisonedContent entity may be used as assessed input by a
        ResourceContentPoisoning activity, with that use recorded through PROV-O
        wasUsedBy; the artifact is neither a structural component nor an output
        generated by the assessment.
      ja: 既存の PoisonedContent エンティティは ResourceContentPoisoning 活動に評価入力として使用され得て、
        その使用は PROV-O wasUsedBy で記録する。工件は活動の構造要素でも評価が生成した出力でもない。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    source_claims:
      - claim-prov-o-use
    layout_role: cross-link
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Covers indirect prompt injection through untrusted external content.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity, Activity, and wasUsedBy relations for input provenance.
source_claims:
  - id: claim-owasp-prompt-injection
    source: owasp-llm01-2025
    supports: Prompt-injection guidance motivates retaining evidence for compromised
      content; it does not define this internal PoisonedContent schema.
    locator: Overview and Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-use
    source: w3c-prov-o
    supports: PROV-O defines prov:used between an Activity and an Entity and prov:wasUsedBy as its inverse. Moonweave uses the inverse relation to record that a ResourceContentPoisoning activity assessed this pre-existing content artifact without claiming the activity generated it.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:used, prov:wasUsedBy"
    evidence_kind: normative
    confidence: high
