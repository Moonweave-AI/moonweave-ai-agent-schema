      severity: error
      expression_language: plain
      expression: The subtype must retain the parent poisoned-content identity and a producing tool-call reference.
      explanations: {zh: "子类型增加调用来源，而不移除父类的受损内容证据。", en: "The subtype adds call provenance without removing the parent compromised-content evidence.", ja: "この下位型は親の侵害内容証拠を除かずに、呼出しの出所を追加する。"}
      source_claims: [claim-owasp-tool-output-inference]
