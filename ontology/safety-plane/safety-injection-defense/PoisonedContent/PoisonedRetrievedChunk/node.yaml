    descriptions: {zh: "被污染检索片段(PoisonedRetrievedChunk) [PoisonedRetrievedChunk]: 在检索流程中返回的、经证据支持包含恶意影响内容的片段。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: poisoning_mechanism, retrieval_query_id, poisoning_evidence_reference.", en: "Poisoned Retrieved Chunk (PoisonedRetrievedChunk) [PoisonedRetrievedChunk]: A retrieval-returned content chunk with evidence of malicious influence content.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include poisoning_mechanism, retrieval_query_id, poisoning_evidence_reference.", ja: "汚染された取得チャンク(PoisonedRetrievedChunk) [PoisonedRetrievedChunk]: 検索処理で返され、悪意ある影響内容の証拠を持つコンテンツチャンク。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: poisoning_mechanism, retrieval_query_id, poisoning_evidence_reference."}
    field_values:
      content_revision_reference: retrieved-chunk-42-r3
      poisoned_content_id: poisoned-chunk-42
