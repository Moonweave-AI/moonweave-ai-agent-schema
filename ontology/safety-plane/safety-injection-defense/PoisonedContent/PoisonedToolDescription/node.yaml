    descriptions: {zh: "被投毒的工具说明(PoisonedToolDescription) [PoisonedToolDescription]: 在工具调用前展示给代理、含有试图影响其决策的不受信任指令的被投毒工具元数据。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference.", en: "Poisoned Tool Description (PoisonedToolDescription) [PoisonedToolDescription]: Poisoned tool metadata presented to an agent before a tool call that contains untrusted instructions attempting to influence its decision.. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference.", ja: "汚染されたツール説明(PoisonedToolDescription) [PoisonedToolDescription]: ツール呼出し前にエージェントへ提示され、その判断に影響しようとする信頼できない指示を含む汚染されたツールメタデータ。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference."}
