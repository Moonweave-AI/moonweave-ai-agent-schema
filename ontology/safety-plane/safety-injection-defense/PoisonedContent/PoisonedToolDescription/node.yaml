    descriptions: {zh: "被投毒的工具说明(PoisonedToolDescription) [PoisonedToolDescription]: 在工具调用前展示给代理、含有试图影响其决策的不受信任指令的被投毒工具元数据。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference.", en: "Poisoned Tool Description (PoisonedToolDescription) [PoisonedToolDescription]: Poisoned tool metadata presented to an agent before a tool call that contains untrusted instructions attempting to influence its decision.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference.", ja: "汚染されたツール説明(PoisonedToolDescription) [PoisonedToolDescription]: ツール呼出し前にエージェントへ提示され、その判断に影響しようとする信頼できない指示を含む汚染されたツールメタデータ。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference."}
    field_values:
