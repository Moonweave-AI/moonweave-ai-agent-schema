    labels:
      zh: 被投毒的工具说明 - HackAPrompt 间接注入
      en: Poisoned Tool Description - HackAPrompt indirect injection
      ja: 汚染されたツール説明 - HackAPrompt 間接注入
    descriptions: {zh: "被投毒的工具说明(PoisonedToolDescription) [PoisonedToolDescription]: 在工具调用前展示给代理、含有试图影响其决策的不受信任指令的被投毒工具元数据。. Perez & Ribeiro（2022）HackAPrompt 与 Greshake 等（2023）展示间接注入：攻击者将指令隐藏在 LLM 将处理的数据中（网页、邮件、文档）。 Fields: poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference.", en: "Poisoned Tool Description (PoisonedToolDescription) [PoisonedToolDescription]: Poisoned tool metadata presented to an agent before a tool call that contains untrusted instructions attempting to influence its decision.. Perez & Ribeiro (2022) HackAPrompt and Greshake et al. (2023, arXiv:2302.12173) show indirect injection: attackers hide instructions in data LLMs process (webpages, email, documents). Fields include poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference.", ja: "汚染されたツール説明(PoisonedToolDescription) [PoisonedToolDescription]: ツール呼出し前にエージェントへ提示され、その判断に影響しようとする信頼できない指示を含む汚染されたツールメタデータ。. Perez & Ribeiro（2022）HackAPrompt と Greshake ほか（2023）は indirect injection：webpage/email/document に命令を隠す。 Fields: poisoning_mechanism, poisoned_tool_description_id, poisoning_evidence_reference."}
    field_values:
      content_revision_reference: tool-description-3-r3
      description_revision: '3'
      poisoned_content_id: tool-description-3
      poisoned_tool_description_id: tool-description-3
      poisoning_evidence_reference: tool-description-diff-3
      poisoning_mechanism: schema-description-tampering
    related_node_ids:
