sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OWASP LLM01:2025、NIST AI 100-2e2025 与间接注入/污点跟踪研究逐项人工语义核验；定义、层次、关系与案例边界成立。
    en: Manually verified against OWASP LLM01:2025, NIST AI 100-2e2025, and indirect-injection/taint-tracking research; definitions, hierarchy, relations, and example boundaries hold.
    ja: OWASP LLM01:2025、NIST AI 100-2e2025、indirect-injection/taint-tracking research に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-injection-signature-001
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends defining sensitive categories and using semantic filters and string checks; Moonweave represents a versioned, evaluable criterion as InjectionSignature rather than as a detected signal.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-002
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends defined input and output filtering criteria. Moonweave gives each reusable criterion family a stable signature identity.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-003
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends maintaining filtering controls as attacks evolve. Moonweave versions each evaluable filtering criterion for reproducible detection.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-004
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends string checks as one filtering mechanism. Moonweave classifies directly phrased criteria as linguistic.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-005
    source: eng-security-owasp-llm01-2025
    supports: OWASP describes structured attack surfaces including indirect content and tool-connected inputs. Moonweave groups evaluable form constraints as structural.
    locator: Description and Common Examples of Risk Scenarios; Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-006
    source: eng-security-owasp-llm01-2025
    supports: OWASP notes that prompt injection may be obfuscated and recommends filtering. Moonweave separates criteria requiring decoding as encoded.
    locator: Description; Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-007
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends semantic filters in addition to string checks. Moonweave classifies intent-level criteria as semantic.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-008
    source: eng-security-owasp-llm01-2025
    supports: OWASP risk scenarios include induced unauthorized actions and exfiltration across connected components. Moonweave groups sequence-level criteria as behavioral.
    locator: Common Examples of Risk Scenarios; Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-009
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends semantic filters and string checks and discusses obfuscated and action-inducing attacks. Moonweave turns these decision layers into a complete controlled vocabulary.
    locator: Description; Common Examples of Risk Scenarios; Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-010
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends implementing input and output filtering rather than relying on informal warnings. Moonweave makes each signature criterion evaluable and inspectable.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-011
    source: eng-security-owasp-llm01-2025
    supports: OWASP distinguishes direct and indirect prompt-injection surfaces. Moonweave records the content surfaces for which each filter criterion is applicable.
    locator: Description; Common Examples of Risk Scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-012
    source: eng-security-owasp-llm01-2025
    supports: OWASP recommends filters but does not define Moonweave score semantics. A versioned normalized threshold is a Moonweave design inference for reproducible evaluation.
    locator: Prevention and Mitigation Strategies > Implement input and output filtering
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-injection-signature-013
    source: eng-security-owasp-llm01-2025
    supports: OWASP explains prompt injection in terms of manipulated model behavior and unauthorized actions. Moonweave requires every signature to state the exact risk fact it detects.
    locator: Description and Common Examples of Risk Scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
