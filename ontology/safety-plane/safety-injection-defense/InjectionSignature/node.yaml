schema: moonweave.ai/ontology-node/v1
id: InjectionSignature
kind: concept
labels:
  zh: 注入特征规范
  en: injection signature specification
  ja: 注入シグネチャ仕様
semantics:
  short_definition:
    zh: 声明可识别注入证据及适用条件的版本化检测规范。
    en: A versioned detection specification declaring recognizable injection evidence and applicability conditions.
    ja: 識別可能な注入証拠と適用条件を宣言する版管理 detection specification。
  definition:
    zh: InjectionSignature 固定 pattern_kind、expression、threshold、applicability 与 match_meaning 的 revision；供 PatternScan 引用，不是一次命中事件。OWASP LLM01 建议的 semantic/string checks 与 MCP hidden-instruction 模式应版本化为此规范，而非混入 ThreatSignal。
    en: InjectionSignature fixes pattern_kind, expression, threshold, applicability, and match_meaning per revision for PatternScan reference, not a match event. OWASP LLM01 semantic/string checks and MCP hidden-instruction patterns should be versioned here rather than merged into ThreatSignal.
    ja: InjectionSignature は pattern_kind/expression/threshold/applicability/match_meaning を revision ごとに固定し PatternScan が参照。match event ではない。OWASP LLM01 semantic/string check と MCP hidden-instruction pattern は ThreatSignal と混ぜずここで版管理。
  why_needed:
    zh: 规则版本化才能解释 Copilot CVE 与 MCP 集群在不同 signature revision 下复检结果差异。
    en: Ruleset versioning explains differing rescan outcomes for Copilot CVE and MCP cluster under different signature revisions.
    ja: signature revision 差で Copilot CVE/MCP cluster rescan 結果差を説明するには rule 版管理が必要。
  includes:
    - zh: 包含可执行或可评估的模式、适用范围、阈值、版本和预期命中语义。
      en: Includes an evaluable pattern, applicability scope, threshold, version, and stated match meaning.
      ja: 評価可能なパターン、適用範囲、閾値、版、一致の意味を含みます。
  excludes:
    - zh: 不包含某次 PatternScan、扫描结果或未经证据确认的威胁标签。
      en: Excludes a PatternScan run, its result, and threat labels asserted without evidence.
      ja: PatternScan 実行、その結果、証拠なしの脅威ラベルは含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: PatternScan scans_for_signature 边必须绑定实际 consultation 的 injection_signature_id@revision；Guardrails hub validator 与 Azure Shield 规则集可映射为 signature pack。
    en: PatternScan scans_for_signature must bind the actually consulted injection_signature_id@revision; Guardrails hub validators and Azure Shield rulesets map to signature packs.
    ja: PatternScan scans_for_signature は実際に参照した injection_signature_id@revision を束縛。Guardrails validator/Azure Shield ruleset を signature pack に写像。
  typical_input:
    - description: Authored detection rule pack.
      format: '{"injection_signature_id":"SIG-ignore-authority","revision":"3","pattern_kind":"linguistic"}'
      source_claims:
        - claim-injectionsignature-design
  typical_output:
    - description: Referenced by PatternScan execution.
      format: scans_for_signature edge with revision binding
      source_claims:
        - claim-injectionsignature-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - injection_signature_id
    - revision
  fields:
    - id: injection_signature_id
      labels:
        zh: 注入特征系列标识
        en: injection-signature series ID
        ja: 注入シグネチャ系列 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可持续修订的检测特征系列；该字段本身不标识某次扫描或命中事件。
        en: Stably identifies a detection-signature series that may be revised over time; it does not identify a scan or match event.
        ja: 継続的に revision される detection-signature series を安定識別し、scan や match event は識別しません。
      allowed_values: []
      pattern: null
      example_value: SIG-B64
      source_claims:
        - claim-injectionsignature-design
    - id: revision
      labels:
        zh: 特征修订版
        en: signature revision
        ja: シグネチャ revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识模式表达式、阈值、适用范围和匹配含义保持一致的一版规范；任一判定语义改变都必须递增修订版。
        en: Identifies one revision in which expression, threshold, applicability, and match meaning remain fixed; changing any decision semantics requires a new revision.
        ja: expression、threshold、applicability、match meaning が固定された一版を識別し、判定 semantics の変更には新しい revision が必要です。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-injectionsignature-design
    - id: pattern_kind
      labels:
        zh: 模式判定层次
        en: pattern decision kind
        ja: パターン判定種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该特征主要在哪一判定层次成立：语言表述、结构、编码、语义意图或跨步骤行为；它不表示威胁严重度。
        en: States the primary decision layer at which the signature holds—linguistic, structural, encoded, semantic, or cross-step behavioral—not threat severity.
        ja: signature が成立する主な判定 layer（linguistic、structural、encoded、semantic、cross-step behavioral）を示し、severity は示しません。
      allowed_values:
        - id: InjectionPatternKindLinguistic
          value: linguistic
          labels:
            zh: 语言表述模式
            en: linguistic
            ja: 言語表現
          definitions:
            zh: 依据词语、句法或指令措辞直接判断，且无需先解码或推断跨步骤行为。
            en: Matches words, syntax, or instruction phrasing directly without first decoding content or inferring cross-step behavior.
            ja: decode や cross-step behavior 推論をせず、語句、構文、指示表現を直接判定します。
          source_claims:
            - claim-injectionsignature-design
        - id: InjectionPatternKindStructural
          value: structural
          labels:
            zh: 结构模式
            en: structural
            ja: 構造パターン
          definitions:
            zh: 依据标记层级、角色边界、参数结构、路径形态或字段组合判断。
            en: Matches markup hierarchy, role boundaries, argument structure, path form, or field combinations.
            ja: markup hierarchy、role boundary、argument structure、path form、field combination を判定します。
          source_claims:
            - claim-injectionsignature-design
        - id: InjectionPatternKindEncoded
          value: encoded
          labels:
            zh: 编码或混淆模式
            en: encoded
            ja: 符号化・難読化
          definitions:
            zh: 只有在明确的解码、反转义或去混淆步骤后，受检内容才满足判定条件。
            en: The inspected content satisfies the criterion only after an explicit decoding, unescaping, or deobfuscation step.
            ja: 明示的な decode、unescape、deobfuscation 後に内容が判定条件を満たします。
          source_claims:
            - claim-injectionsignature-design
        - id: InjectionPatternKindSemantic
          value: semantic
          labels:
            zh: 语义意图模式
            en: semantic
            ja: 意味意図
          definitions:
            zh: 依据内容表达的意图或作用判断，即使其具体用词与已知示例不同也可匹配。
            en: Matches the expressed intent or effect even when wording differs from known examples.
            ja: 既知例と wording が異なっても、表現された intent または effect に基づいて判定します。
          source_claims:
            - claim-injectionsignature-design
        - id: InjectionPatternKindBehavioral
          value: behavioral
          labels:
            zh: 跨步骤行为模式
            en: behavioral
            ja: 跨段階行動
          definitions:
            zh: 依据多个动作、工具调用或信息流步骤的组合行为判断，而不是单个文本片段。
            en: Matches a combination of actions, tool calls, or information-flow steps rather than one text span.
            ja: 単一 text span ではなく、複数 action、tool call、information-flow step の組合せを判定します。
          source_claims:
            - claim-injectionsignature-design
      pattern: null
      example_value: encoded
      source_claims:
        - claim-injectionsignature-design
    - id: pattern_expression
      labels:
        zh: 可求值模式表达式
        en: evaluable pattern expression
        ja: 評価可能パターン式
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以结构化对象声明检测器实际求值的条件、变换步骤和比较目标；不得只保存不可执行的自然语言标题。
        en: Declares the conditions, transformation steps, and comparison target actually evaluated by a detector; a non-executable natural-language title alone is insufficient.
        ja: detector が実際に評価する condition、transformation step、comparison target を構造化 object で宣言し、自然言語 title だけでは不十分です。
      allowed_values: []
      pattern: null
      example_value:
        encoding: base64
        decoded_semantic_condition: contains privilege-escalating tool instruction
      source_claims:
        - claim-injectionsignature-design
    - id: applicable_content_types
      labels:
        zh: 适用内容类型
        en: applicable content types
        ja: 適用内容型
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该表达式经过验证能够处理的内容类别，例如外部文本、工具参数或检索块；不在范围内的内容不得宣称未命中。
        en: Lists content categories for which the expression has been validated, such as external text, tool arguments, or retrieved chunks; out-of-scope content cannot be reported as a non-match.
        ja: expression が検証済みの external text、tool arguments、retrieved chunks などを列挙し、scope 外 content を non-match と報告しません。
      allowed_values: []
      pattern: null
      example_value:
        - external-text
      source_claims:
        - claim-injectionsignature-design
    - id: match_threshold
      labels:
        zh: 匹配阈值
        en: match threshold
        ja: 一致閾値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录归一化检测分数达到何值时才由该规范判为匹配，取值为 0 至 1；阈值不等于一次扫描的实际得分。
        en: Records the normalized detector score from 0 through 1 required for this specification to declare a match; it is not a scan's observed score.
        ja: この specification が match とする 0〜1 の normalized detector score 閾値を記録し、scan の実測 score とは区別します。
      allowed_values: []
      pattern: null
      example_value: 0.8
      source_claims:
        - claim-injectionsignature-design
    - id: match_meaning
      labels:
        zh: 匹配所表达的风险含义
        en: match meaning
        ja: 一致のリスク意味
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用人类可审查的句子说明达到阈值代表什么安全事实；不得把具体阻断或许可动作混入匹配定义。
        en: States in reviewable language what security fact crossing the threshold represents; the definition cannot embed a particular block or allow action.
        ja: threshold 到達が表す security fact を人が review できる文で示し、特定 block/allow action を match 定義へ混ぜません。
      allowed_values: []
      pattern: null
      example_value: decoded content attempts a privileged tool action outside authorized instructions
      source_claims:
        - claim-injectionsignature-design
  constraints:
    - id: injection-signature-threshold-range
      severity: error
      expression_language: plain
      expression: match_threshold >= 0 AND match_threshold <= 1
      explanations:
        zh: 匹配阈值必须位于闭区间 [0,1]，以便扫描结果与同一修订版可重复比较。
        en: The match threshold must be in the closed interval [0,1] so scan scores remain reproducibly comparable with the same revision.
        ja: match threshold は閉区間 [0,1] とし、scan score を同じ revision と再現可能に比較します。
      source_claims:
        - claim-injectionsignature-design
  required_relation_constraints: []
examples:
  - id: InjectionSignature-owasp-direct
    labels:
      zh: OWASP 直接注入语言签名
      en: OWASP direct-injection linguistic signature
      ja: OWASP direct-injection linguistic signature
    descriptions:
      zh: SIG-ignore-authority@3 匹配 “ignore previous instructions” 变体。
      en: SIG-ignore-authority@3 matches “ignore previous instructions” variants.
      ja: SIG-ignore-authority@3 が ignore previous instructions 変種に一致。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: LLM01
    field_values:
      injection_signature_id: SIG-ignore-authority
      revision: "3"
      pattern_kind: linguistic
    related_node_ids:
      - InjectionSignature
      - PatternScan
    related_relation_ids:
      - scans_for_signature
    source_claims:
      - claim-injectionsignature-design
  - id: InjectionSignature-mcp-hidden
    labels:
      zh: MCP 隐藏指令结构签名
      en: MCP hidden-instruction structural signature
      ja: MCP hidden-instruction structural signature
    descriptions:
      zh: SIG-mcp-html-comment@2 匹配 tools/list 描述中 HTML 注释嵌入。
      en: SIG-mcp-html-comment@2 matches HTML comment embedding in tools/list descriptions.
      ja: SIG-mcp-html-comment@2 が tools/list description HTML comment 埋込に一致。
    example_source:
      product: MCP tool poisoning (2026)
      url: https://www.mdpi.com/2078-2489/17/1/54
      version: "2026"
    field_values:
      injection_signature_id: SIG-mcp-html-comment
      revision: "2"
      pattern_kind: structural
    related_node_ids:
      - InjectionSignature
      - PoisonedToolDescription
    related_relation_ids: []
    source_claims:
      - claim-injectionsignature-design
  - id: InjectionSignature-agentsentry-behavioral
    labels:
      zh: AgentSentry 行为签名
      en: AgentSentry behavioral signature
      ja: AgentSentry behavioral signature
    descriptions:
      zh: SIG-transfer-funds-lure@1 跨 tool-output→summarize→transfer 行为模式。
      en: SIG-transfer-funds-lure@1 cross-step tool-output→summarize→transfer behavioral pattern.
      ja: SIG-transfer-funds-lure@1 が tool-output→summarize→transfer 跨 step 行動 pattern。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      injection_signature_id: SIG-transfer-funds-lure
      revision: "1"
      pattern_kind: behavioral
    related_node_ids:
      - InjectionSignature
      - SourceSinkFlow
    related_relation_ids: []
    source_claims:
      - claim-injectionsignature-design
  - id: InjectionSignature-guardrails-hub
    labels:
      zh: Guardrails Hub 验证器签名
      en: Guardrails Hub validator signature
      ja: Guardrails Hub validator signature
    descriptions:
      zh: SIG-guardrails-prompt-injection@hub-2026 映射 DetectPromptInjectionValidator 规则集。
      en: SIG-guardrails-prompt-injection@hub-2026 maps DetectPromptInjectionValidator ruleset.
      ja: SIG-guardrails-prompt-injection@hub-2026 が DetectPromptInjectionValidator ruleset を写像。
    example_source:
      product: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      version: Hub validator
    field_values:
      injection_signature_id: SIG-guardrails-prompt-injection
      revision: hub-2026
    related_node_ids:
      - InjectionSignature
      - PatternScan
    related_relation_ids: []
    source_claims:
      - claim-injectionsignature-design
