schema: moonweave.ai/ontology-node/v1
id: UnsafeArgumentPattern
kind: concept
labels:
  zh: 不安全参数模式
  en: unsafe argument pattern
  ja: 危険引数パターン
semantics:
  short_definition:
    zh: 定义危险工具参数形状、值和上下文条件的注入检测规范。
    en: An injection-detection specification for hazardous tool-argument shapes, values, and context conditions.
    ja: 危険なツール引数の形状、値、文脈条件を定める注入検出仕様。
  definition:
    zh: 不安全参数模式是一种 InjectionSignature，专门声明工具参数在何种 schema、值范围、组合、来源或执行环境下构成注入、越权、路径穿越、命令拼接或数据外传风险，并带版本和例外。它不是某次参数实例，也不是检查结果。
    en: An UnsafeArgumentPattern is an InjectionSignature specialized for conditions under which a tool argument's schema, value range, combination, provenance, or execution context constitutes injection, overreach, path traversal, command composition, or exfiltration risk, with version and exceptions. It is not an argument instance or check result.
    ja: 不安全引数パターンは、ツール引数の schema、値域、組合せ、来歴、実行環境が注入、権限逸脱、パストラバーサル、コマンド連結、データ流出リスクとなる条件を版・例外付きで宣言する InjectionSignature の特殊化です。引数实例や検査結果ではありません。
  why_needed:
    zh: 把参数安全规则版本化，可解释检查命中并在工具或环境变化后重新评估。
    en: Versioned argument rules explain a match and allow reevaluation when a tool or environment changes.
    ja: 引数安全規則を版管理し、一致理由を説明し、ツールや環境変更後に再評価できます。
  includes:
    - zh: 包含适用工具或参数、危险形状/值、上下文前置条件、版本、例外和命中语义。
      en: Includes applicable tool or argument, hazardous shape or value, context precondition, version, exceptions, and match meaning.
      ja: 適用ツールまたは引数、危険形状・値、文脈前提、版、例外、一致意味を含みます。
  excludes:
    - zh: 不包含运行中的 ToolCallPlan、一次命中结果或仅描述业务合法性的 schema。
      en: Excludes a runtime ToolCallPlan, a match result, and schemas that describe only business validity.
      ja: 実行中 ToolCallPlan、一致結果、業務妥当性だけを記す schema は含みません。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: UnsafeArgumentPattern 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: UnsafeArgumentPattern should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: UnsafeArgumentPattern は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-unsafeargumentpattern-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "UnsafeArgumentPattern/example" }'
      source_claims:
        - claim-unsafeargumentpattern-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
