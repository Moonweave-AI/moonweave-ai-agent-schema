schema: moonweave.ai/ontology-node/v1
id: UnsafeArgumentPattern
kind: concept
status: review
labels:
  zh: 不安全参数模式
  en: unsafe argument pattern
  ja: 危険引数パターン
semantics:
  short_definition:
    zh: 定义危险工具参数形状、值和上下文条件的注入检测规范。
    en: An injection-detection specification for hazardous tool-argument shapes, values, and context conditions.
    ja: 危険なツール引数の形状、値、文脈条件を定める注入検出仕様。
  definition:
    zh: 不安全参数模式是一种 InjectionSignature，专门声明工具参数在何种 schema、值范围、组合、来源或执行环境下构成注入、越权、路径穿越、命令拼接或数据外传风险，并带版本和例外。它不是某次参数实例，也不是检查结果。
    en: An UnsafeArgumentPattern is an InjectionSignature specialized for conditions under which a tool argument's schema, value range, combination, provenance, or execution context constitutes injection, overreach, path traversal, command composition, or exfiltration risk, with version and exceptions. It is not an argument instance or check result.
    ja: 不安全引数パターンは、ツール引数の schema、値域、組合せ、来歴、実行環境が注入、権限逸脱、パストラバーサル、コマンド連結、データ流出リスクとなる条件を版・例外付きで宣言する InjectionSignature の特殊化です。引数实例や検査結果ではありません。
  why_needed:
    zh: 把参数安全规则版本化，可解释检查命中并在工具或环境变化后重新评估。
    en: Versioned argument rules explain a match and allow reevaluation when a tool or environment changes.
    ja: 引数安全規則を版管理し、一致理由を説明し、ツールや環境変更後に再評価できます。
  includes:
    - zh: 包含适用工具或参数、危险形状/值、上下文前置条件、版本、例外和命中语义。
      en: Includes applicable tool or argument, hazardous shape or value, context precondition, version, exceptions, and match meaning.
      ja: 適用ツールまたは引数、危険形状・値、文脈前提、版、例外、一致意味を含みます。
  excludes:
    - zh: 不包含运行中的 ToolCallPlan、一次命中结果或仅描述业务合法性的 schema。
      en: Excludes a runtime ToolCallPlan, a match result, and schemas that describe only business validity.
      ja: 実行中 ToolCallPlan、一致結果、業務妥当性だけを記す schema は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: UnsafeArgumentPattern-manual-positive-20260714
    kind: positive
    labels:
      zh: 不安全参数模式正例
      en: Positive case for unsafe argument pattern
      ja: 危険引数パターンの正例
    scenario_id: null
    descriptions:
      zh: UAP-2 规定 file_writer.path 为绝对根路径且 authority_scope 不含 root-write 时视为越权，版本 3。
      en: UAP-2 version 3 states that file_writer.path is unsafe when it is filesystem-root absolute and authority_scope lacks root-write.
      ja: UAP-2 版 3 は file_writer.path がファイルシステム根の絶対パスで authority_scope に root-write がない場合を危険と定めます。
    field_values:
      injection_signature_id: UAP-2
      revision: "3"
      pattern_kind: structural
      pattern_expression:
        tool_id: file_writer
        argument_path: $.path
        value_condition: is filesystem-root absolute
        authority_condition: authority_scope lacks root-write
      applicable_content_types:
        - tool-arguments
      match_threshold: 1
      match_meaning: file_writer targets the filesystem root without root-write authority
    related_node_ids:
      - UnsafeArgumentPattern
      - InjectionSignature
    related_relation_ids:
      - UnsafeArgumentPattern-is_a-InjectionSignature
    expected_result:
      zh: 验证器应把该记录识别为 UnsafeArgumentPattern，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as UnsafeArgumentPattern while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を UnsafeArgumentPattern と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含适用工具或参数、危险形状/值、上下文前置条件、版本、例外和命中语义。
      en: Includes applicable tool or argument, hazardous shape or value, context precondition, version, exceptions, and match meaning.
      ja: 適用ツールまたは引数、危険形状・値、文脈前提、版、例外、一致意味を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-unsafe-argument-pattern-002
  - id: UnsafeArgumentPattern-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 不安全参数模式边界例
      en: Boundary case for unsafe argument pattern
      ja: 危険引数パターンの境界例
    scenario_id: null
    descriptions:
      zh: 计划 call-33 的 path='/' 命中 UAP-2；call-33 是被检查实例，不是 UnsafeArgumentPattern。
      en: Planned call-33 with path='/' matches UAP-2; call-33 is the inspected instance, not the UnsafeArgumentPattern.
      ja: path='/' の計画 call-33 は UAP-2 に一致しますが、call-33 は検査实例であり UnsafeArgumentPattern ではありません。
    field_values: {}
    related_node_ids:
      - UnsafeArgumentPattern
      - InjectionSignature
    related_relation_ids:
      - UnsafeArgumentPattern-is_a-InjectionSignature
    expected_result:
      zh: 验证器不得把该记录归入 UnsafeArgumentPattern；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as UnsafeArgumentPattern; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を UnsafeArgumentPattern に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含运行中的 ToolCallPlan、一次命中结果或仅描述业务合法性的 schema。
      en: Excludes a runtime ToolCallPlan, a match result, and schemas that describe only business validity.
      ja: 実行中 ToolCallPlan、一致結果、業務妥当性だけを記す schema は含みません。
    synthetic: true
