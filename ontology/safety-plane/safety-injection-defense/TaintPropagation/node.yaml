schema: moonweave.ai/ontology-node/v1
id: TaintPropagation
kind: concept
status: review
labels:
  en: taint propagation
  zh: 污点传播
  ja: 汚染伝播
semantics:
  short_definition:
    zh: 按声明转换规则把污点从一个实体传至另一个实体的事件。
    en: An event that transfers taint from one entity to another under a declared transformation rule.
    ja: 宣言された変換規則に従い汚染を一実体から別実体へ移すイベント。
  definition:
    zh: 污点传播是一种事件，记录源 TaintEntity、目标 TaintEntity、发生时间、具体转换、传播规则以及保留或改变的范围和类别。它不是静态 SourceSinkFlow，也不允许仅凭共现、相似文本或图上邻近推断传播。
    en: TaintPropagation is an event recording source and target TaintEntity, time, concrete transformation, propagation rule, and the spans and classes preserved or changed. It is not the static SourceSinkFlow and cannot be inferred from co-occurrence, text similarity, or graph proximity alone.
    ja: 汚点伝播は、出所・対象 TaintEntity、時刻、具体的変換、伝播規則、保持または変更された範囲・種別を記録するイベントです。静的 SourceSinkFlow ではなく、共起、文字列類似、グラフ近接だけから推論できません。
  why_needed:
    zh: 事件化可回答污点何时、经哪个转换越过边界，并支持撤销或复检下游。
    en: Reifying the event answers when and through which transformation taint crossed a boundary and supports downstream revocation or rescanning.
    ja: イベント化により、いつどの変換で境界を越えたかを答え、下流の取消しや再走査を支援します。
  includes:
    - zh: 包含源、目标、时间、转换、传播规则和范围映射均明确的传播记录。
      en: Includes propagation records with explicit source, target, time, transformation, rule, and span mapping.
      ja: 出所、対象、時刻、変換、規則、範囲対応が明示された伝播記録を含みます。
  excludes:
    - zh: 不包含只有潜在路径的 SourceSinkFlow、无目标的污点赋值或相似文本共现。
      en: Excludes a SourceSinkFlow that is only a potential path, initial taint assignment with no target, and similar-text co-occurrence.
      ja: 潜在経路だけの SourceSinkFlow、対象のない初期汚点付与、類似文字列の共起は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - propagation_event_id
  fields:
    - id: propagation_event_id
      labels:
        zh: 传播事件标识
        en: propagation event ID
        ja: 伝播イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次从明确源端点到明确目标端点的污点传播发生，不复用污点身份。
        en: Stable identifier for one taint-propagation occurrence from an explicit source endpoint to an explicit target endpoint; it does not reuse a taint identity.
        ja: 明示 source endpoint から target endpoint への一回の taint 伝播発生を安定識別し、taint ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: event/taint-summary-17
      source_claims:
        - claim-taint-propagation-002
    - id: occurred_at
      labels:
        zh: 传播发生时间
        en: propagation occurred at
        ja: 伝播発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 转换实际产生目标污点端点的 UTC 时间，不以检测器后续观察时间替代。
        en: UTC instant when the transformation actually produced the target taint endpoint, distinct from later detector observation time.
        ja: 変換が target taint endpoint を実際に生成した UTC 時刻で、後の detector 観測時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:20:00.000Z
      source_claims:
        - claim-taint-propagation-003
    - id: transformation_ref
      labels:
        zh: 具体转换引用
        en: concrete transformation reference
        ja: 具体変換参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行摘要、抽取、解析、拼接、参数绑定或复制的活动实例，而不是仅写算法名称。
        en: Reference to the actual summarization, extraction, parsing, concatenation, argument-binding, or copy activity instance, not merely an algorithm name.
        ja: 実際に summary、extract、parse、concat、argument binding、copy を行った activity instance を参照し、algorithm 名だけでは代用しません。
      allowed_values: []
      pattern: null
      example_value: activity://summarize/run-77/step-4
      source_claims:
        - claim-taint-propagation-004
    - id: propagation_rule_id
      labels:
        zh: 传播规则标识
        en: propagation-rule ID
        ja: 伝播規則 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识决定污点类别与片段如何经过该转换保留、扩展、缩小或改变的显式规则。
        en: Identifier of the explicit rule determining how taint class and spans are preserved, expanded, narrowed, or changed through this transformation.
        ja: 変換を通じて taint class・span を保持、拡張、縮小、変更する明示規則を識別します。
      allowed_values: []
      pattern: null
      example_value: taint-rule/summarization-semantic-carry
      source_claims:
        - claim-taint-propagation-005
    - id: propagation_rule_version
      labels:
        zh: 传播规则版本
        en: propagation-rule version
        ja: 伝播規則版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次传播判定使用的规则修订版，使后续规则改变不会重写历史事件。
        en: Revision of the rule used for this propagation judgment, preventing later rule changes from rewriting the historical occurrence.
        ja: この伝播判断に使った規則 revision を固定し、後の規則変更で過去 event を書き換えません。
      allowed_values: []
      pattern: null
      example_value: 2.3.1
      source_claims:
        - claim-taint-propagation-006
    - id: span_map
      labels:
        zh: 源目标片段映射
        en: source-to-target span map
        ja: source-target 範囲対応
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 逐项记录源端点范围如何对应到目标端点范围，含无法一一映射时采用的摘要或结构依据。
        en: Mappings from source-endpoint spans to target-endpoint spans, including summary or structural justification when correspondence is not one-to-one.
        ja: source endpoint 範囲から target endpoint 範囲への対応を列挙し、一対一でない場合は要約・構造根拠も記録します。
      allowed_values: []
      pattern: null
      example_value:
        - source: TS-1:chars:18..67
          target: TS-2:chars:4..29
          basis: semantic-summary
      source_claims:
        - claim-taint-propagation-007
    - id: class_transition
      labels:
        zh: 污点类别转换
        en: taint-class transition
        ja: taint class 遷移
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录源污点类别、目标污点类别以及保持、升级、降级或重新分类的理由。
        en: Source taint class, target taint class, and the reason the class was preserved, escalated, reduced, or reclassified.
        ja: source taint class、target taint class と、保持・強化・低減・再分類の理由を記録します。
      allowed_values: []
      pattern: null
      example_value:
        source_class: indirect-instruction
        target_class: indirect-instruction
        transition: preserved
      source_claims:
        - claim-taint-propagation-008
    - id: evidence_refs
      labels:
        zh: 传播证据引用
        en: propagation evidence references
        ja: 伝播証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明源被读取、转换执行、目标产生及范围映射的运行记录、摘要或内容摘要。
        en: References to runtime records, summaries, or content digests proving source use, transformation execution, target production, and span mapping.
        ja: source 使用、変換実行、target 生成、範囲対応を証明する runtime record、summary、content digest を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - trace://run-77/span-summarize-4
        - artifact-diff://TS1-TS2
      source_claims:
        - claim-taint-propagation-009
  constraints:
    - id: taint-propagation-requires-concrete-transformation-evidence
      severity: error
      expression_language: plain
      expression: transformation_ref, propagation_rule_id/version, non-empty span_map, class_transition, and evidence_refs all describe the same occurrence; similarity or co-occurrence is insufficient
      explanations:
        zh: 传播事件必须由同一次转换的源使用、目标生成、片段映射和规则版本共同证明；文本相似、同会话出现、潜在可达或无目标的初次赋值均不得实例化事件。
        en: One transformation's source use, target generation, span map, and rule version must jointly evidence the propagation. Text similarity, session co-occurrence, potential reachability, or initial assignment without a target cannot instantiate it.
        ja: 同一変換の source 使用、target 生成、span map、規則版が共同で伝播を証明し、text 類似、session 共起、潜在到達性、target のない初期付与では event を成立させません。
      source_claims:
        - claim-taint-propagation-010
  required_relation_constraints:
    - id: taint-propagation-has-exactly-one-source-entity
      direction: outgoing
      predicate: has_source_entity
      target_concept_id: TaintEntity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次污点传播必须明确且只关联一个传播前 TaintEntity 端点。
        en: Every taint-propagation occurrence identifies exactly one pre-transformation TaintEntity endpoint.
        ja: 各 taint 伝播発生は変換前 TaintEntity endpoint を一つだけ明示します。
      source_claims:
        - claim-taint-propagation-011
    - id: taint-propagation-has-exactly-one-target-entity
      direction: outgoing
      predicate: has_target_entity
      target_concept_id: TaintEntity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次污点传播必须明确且只关联一个转换后 TaintEntity 端点。
        en: Every taint-propagation occurrence identifies exactly one post-transformation TaintEntity endpoint.
        ja: 各 taint 伝播発生は変換後 TaintEntity endpoint を一つだけ明示します。
      source_claims:
        - claim-taint-propagation-012
examples:
  - id: TaintPropagation-manual-positive-20260714
    kind: positive
    labels:
      zh: 污点传播正例
      en: Positive case for taint propagation
      ja: 汚染伝播の正例
    scenario_id: null
    descriptions:
      zh: 摘要任务在 10:20 把 TaintedSpan TS-1 的句子压缩到摘要 TS-2；事件记录 summarizes、范围映射和 T17 延续。
      en: At 10:20 a summarization task compresses sentence TaintedSpan TS-1 into summary span TS-2; the event records summarizes, the span map, and continuation of T17.
      ja: 10:20 の要約処理が TaintedSpan TS-1 の文を要約範囲 TS-2 へ圧縮し、イベントが summarizes、範囲対応、T17 継続を記録します。
    field_values:
      propagation_event_id: event/taint-summary-17
      occurred_at: 2026-07-14T10:20:00.000Z
      transformation_ref: activity://summarize/run-77/step-4
      propagation_rule_id: taint-rule/summarization-semantic-carry
      propagation_rule_version: 2.3.1
      span_map:
        - source: TS-1:chars:18..67
          target: TS-2:chars:4..29
          basis: semantic-summary
      class_transition:
        source_class: indirect-instruction
        target_class: indirect-instruction
        transition: preserved
      evidence_refs:
        - trace://run-77/span-summarize-4
        - artifact-diff://TS1-TS2
    related_node_ids:
      - TaintPropagation
    related_relation_ids: []
    expected_result:
      zh: 验证器应把该记录识别为 TaintPropagation，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as TaintPropagation while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を TaintPropagation と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含源、目标、时间、转换、传播规则和范围映射均明确的传播记录。
      en: Includes propagation records with explicit source, target, time, transformation, rule, and span mapping.
      ja: 出所、対象、時刻、変換、規則、範囲対応が明示された伝播記録を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-taint-propagation-013
  - id: TaintPropagation-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 污点传播边界例
      en: Boundary case for taint propagation
      ja: 汚染伝播の境界例
    scenario_id: null
    descriptions:
      zh: TS-1 和 TS-2 文本相似但没有派生或转换记录；相似性不能实例化 TaintPropagation。
      en: TS-1 and TS-2 are textually similar but no derivation or transformation is recorded; similarity cannot instantiate TaintPropagation.
      ja: TS-1 と TS-2 が似ていても派生・変換記録がなければ、類似性だけで TaintPropagation は立てられません。
    field_values:
      propagation_event_id: null
      occurred_at: null
      transformation_ref: null
      propagation_rule_id: null
      propagation_rule_version: null
      span_map: []
      class_transition: null
      evidence_refs: []
    related_node_ids:
      - TaintPropagation
      - ResourceContentPoisoning
      - SourceSinkFlow
    related_relation_ids: []
    expected_result:
      zh: 验证器不得把该记录归入 TaintPropagation；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as TaintPropagation; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を TaintPropagation に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含只有潜在路径的 SourceSinkFlow、无目标的污点赋值或相似文本共现。
      en: Excludes a SourceSinkFlow that is only a potential path, initial taint assignment with no target, and similar-text co-occurrence.
      ja: 潜在経路だけの SourceSinkFlow、対象のない初期汚点付与、類似文字列の共起は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-taint-propagation-014
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: TaintPropagation-has_target_entity-TaintEntity
    predicate: has_target_entity
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 具有传播目标端实体
      en: has target taint entity
      ja: 伝播先汚染実体を持つ
    definitions:
      zh: TaintPropagation 通过 has_target_entity 指向具体转换后实际生成或更新的唯一 TaintEntity 版本。传播记录必须把目标身份、版本、输出范围或类别变化与转换证据对齐；仅潜在可达、尚未生成的对象或相似文本都不是目标端。
      en: TaintPropagation has_target_entity identifies the single TaintEntity version actually generated or updated by the concrete transformation. The record must align target identity, version, output span or class transition with transformation evidence; a merely reachable, not-yet-created, or textually similar object is not a target endpoint.
      ja: TaintPropagation の has_target_entity は、具体的変換後に実際に生成または更新された唯一の TaintEntity version を示します。record は target identity・version・output span または class transition を transformation evidence と整合させる必要があり、潜在到達可能、未生成、textually similar な object は target endpoint ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 关系类型本身不限制一份 TaintEntity 可由多少次传播更新；每次 TaintPropagation 恰有一个目标端点由节点 required-relation constraint 强制。
      en: The relation type does not limit how many propagation events may update one TaintEntity; the exactly-one target for each TaintPropagation is enforced by the concept's required-relation constraint.
      ja: 一つの TaintEntity を何回の propagation event が更新できるかは関係型で制限せず、各 TaintPropagation の target exactly-one は concept の required-relation constraint で強制します。
    inverse_reading:
      predicate: is_target_entity_of
      labels:
        zh: 是传播事件的目标端实体
        en: is target entity of propagation
        ja: 伝播イベントの先実体である
    conditions:
      - id: TaintPropagation-has_target_entity-TaintEntity-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert exactly once per TaintPropagation and only when the transformation actually generated or updated the cited TaintEntity version and the event's output span or class transition, time, and evidence align; potential reachability is insufficient.
        explanations:
          zh: 每次 TaintPropagation 必须且只能建立一次此边，并且转换必须实际生成或更新所引用的 TaintEntity 版本，事件的输出范围或类别变化、时间和证据须一致；潜在可达性不足以成立。
          en: Assert this edge exactly once per TaintPropagation and only when the transformation actually generated or updated the cited TaintEntity version and the output span or class transition, time, and evidence align; potential reachability is insufficient.
          ja: 各 TaintPropagation についてこの辺を exactly once 成立させ、変換が引用 TaintEntity version を実際に生成または更新し、output span または class transition・time・evidence が一致する場合に限ります。潜在到達性では不十分です。
        source_claims:
          - claim-taint-propagation-015
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: TaintPropagation-has_target_entity-TaintEntity-example-positive-001
        kind: positive
        labels:
          zh: 摘要转换后的污点片段
          en: Tainted span after summarization
          ja: 要約変換後の汚染範囲
        scenario_id: null
        descriptions:
          zh: propagation-88-b 的 summarizer-4 运行生成 summary-88@h3，并把输入字符 811..904 的 indirect-instruction 映射到目标 taint/summary-88@h3 的字符 92..157；生成时间和摘要 digest 均已记录。
          en: The summarizer-4 run in propagation-88-b generates summary-88@h3 and maps the input indirect-instruction at characters 811..904 to characters 92..157 of target taint/summary-88@h3; generation time and summary digest are recorded.
          ja: propagation-88-b の summarizer-4 run は summary-88@h3 を生成し、input 文字 811..904 の indirect-instruction を target taint/summary-88@h3 の文字 92..157 へ写像します。生成時刻と summary digest も記録済みです。
        field_values: {}
        related_node_ids:
          - TaintPropagation
          - TaintEntity
          - TaintedSpan
        related_relation_ids:
          - TaintPropagation-has_target_entity-TaintEntity
        expected_result:
          zh: 建立 propagation-88-b has_target_entity taint/summary-88@h3，且该事件只能有一个 target endpoint。
          en: Assert propagation-88-b has_target_entity taint/summary-88@h3, with exactly one target endpoint for the event.
          ja: propagation-88-b has_target_entity taint/summary-88@h3 を成立させ、この event の target endpoint を一つに限定します。
        why_valid_or_invalid:
          zh: 目标对象确由该转换生成，版本、输出范围、污点类别、发生时间和内容摘要均与传播记录一致。
          en: The transformation actually generated the target, and its version, output span, taint class, occurrence time, and content digest all align with the propagation record.
          ja: target は当該変換で実際に生成され、version・output span・taint class・occurrence time・content digest が propagation record と一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-taint-propagation-016
      - id: TaintPropagation-has_target_entity-TaintEntity-example-boundary-001
        kind: boundary
        labels:
          zh: 仅潜在可达的报告对象
          en: Report object that is only potentially reachable
          ja: 潜在到達可能なだけの報告オブジェクト
        scenario_id: null
        descriptions:
          zh: reachability-flow-9 表示 taint/chunk-88 理论上可经一个尚未运行的 report-generator 到达 report-9，但 report-9 没有新版本、生成时间、span_map 或转换日志。
          en: reachability-flow-9 says taint/chunk-88 could reach report-9 through a report-generator that has not run, but report-9 has no new version, generation time, span_map, or transformation log.
          ja: reachability-flow-9 は未実行 report-generator を通じて taint/chunk-88 が report-9 に到達し得ると示しますが、report-9 に新 version・generation time・span_map・transformation log はありません。
        field_values: {}
        related_node_ids:
          - TaintPropagation
          - TaintEntity
          - SourceSinkFlow
        related_relation_ids:
          - TaintPropagation-has_target_entity-TaintEntity
        expected_result:
          zh: 不创建 TaintPropagation，不把 report-9 设为目标端；仅保留 potential SourceSinkFlow。
          en: Create no TaintPropagation, do not set report-9 as a target endpoint, and retain only the potential SourceSinkFlow.
          ja: TaintPropagation を作成せず report-9 を target endpoint にせず、potential SourceSinkFlow だけを保持します。
        why_valid_or_invalid:
          zh: 潜在路径没有实际生成或更新目标版本；目标端关系要求已发生转换及其可核验输出。
          en: A potential path did not generate or update a target version; the target-endpoint relation requires an occurred transformation and verifiable output.
