schema: moonweave.ai/ontology-node/v1
id: TaintPropagation
kind: concept
labels:
  en: taint propagation
  zh: 污点传播
  ja: 汚染伝播
semantics:
  short_definition:
    zh: 按声明转换规则把污点从一个 TaintEntity 传至另一个的传播事件。
    en: A propagation event transferring taint from one TaintEntity to another under a declared transformation rule.
    ja: 宣言 transformation rule に従い TaintEntity 間で taint を移す propagation event。
  definition:
    zh: TaintPropagation 记录 propagation_event_id、source/target TaintEntity、transformation_ref、occurred_at 与 span mapping。AgentSentry event/propagate-771-a（html-extract→summarize）与 OWASP RAG retrieve→summarize 是典型 hop；不能由文本相似或 graph 邻近推断。
    en: TaintPropagation records propagation_event_id, source/target TaintEntity, transformation_ref, occurred_at, and span mapping. AgentSentry event/propagate-771-a (html-extract→summarize) and OWASP RAG retrieve→summarize are typical hops; cannot infer from text similarity or graph proximity.
    ja: TaintPropagation は propagation_event_id/source-target TaintEntity/transformation_ref/occurred_at/span mapping を記録。AgentSentry propagate-771-a と OWASP retrieve→summarize が典型 hop。text similarity/graph proximity から推論不可。
  why_needed:
    zh: 逐步传播事件回答“污点何时经何转换越过边界”，支持下游撤销与 rescan。
    en: Stepwise propagation events answer when taint crossed a boundary through which transformation, supporting downstream revocation and rescan.
    ja: stepwise propagation event が「いつどの transformation で boundary を越えたか」に答え downstream revoke/rescan を支援。
  includes:
    - zh: 包含源、目标、时间、转换、传播规则和范围映射均明确的传播记录。
      en: Includes propagation records with explicit source, target, time, transformation, rule, and span mapping.
      ja: 出所、対象、時刻、変換、規則、範囲対応が明示された伝播記録を含みます。
  excludes:
    - zh: 不包含只有潜在路径的 SourceSinkFlow、无目标的污点赋值或相似文本共现。
      en: Excludes a SourceSinkFlow that is only a potential path, initial taint assignment with no target, and similar-text co-occurrence.
      ja: 潜在経路だけの SourceSinkFlow、対象のない初期汚点付与、類似文字列の共起は含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: TaintPropagation-has_source_entity/has_target_entity 必须引用 TaintEntity；SourceSinkFlow-records-TaintPropagation 聚合多 hop 路径。
    en: TaintPropagation-has_source_entity/has_target_entity must reference TaintEntity; SourceSinkFlow-records-TaintPropagation aggregates multi-hop paths.
    ja: TaintPropagation-has_source_entity/has_target_entity は TaintEntity 参照必須。SourceSinkFlow-records-TaintPropagation が multi-hop path を集約。
  typical_input:
    - description: Transformation producing new taint bearer.
      format: summarize(tool_output) → summary chunk
      source_claims:
        - claim-taintpropagation-design
  typical_output:
    - description: Propagation event with explicit endpoints.
      format: '{"propagation_event_id":"event/propagate-771-a","transformation_ref":"transform/summarize"}'
      source_claims:
        - claim-taintpropagation-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - propagation_event_id
  fields:
    - id: propagation_event_id
      labels:
        zh: 传播事件标识
        en: propagation event ID
        ja: 伝播イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次从明确源端点到明确目标端点的污点传播发生，不复用污点身份。
        en: Stable identifier for one taint-propagation occurrence from an explicit source endpoint to an explicit target endpoint; it does not reuse a taint identity.
        ja: 明示 source endpoint から target endpoint への一回の taint 伝播発生を安定識別し、taint ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: event/taint-summary-17
      source_claims:
        - claim-taintpropagation-design
    - id: occurred_at
      labels:
        zh: 传播发生时间
        en: propagation occurred at
        ja: 伝播発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 转换实际产生目标污点端点的 UTC 时间，不以检测器后续观察时间替代。
        en: UTC instant when the transformation actually produced the target taint endpoint, distinct from later detector observation time.
        ja: 変換が target taint endpoint を実際に生成した UTC 時刻で、後の detector 観測時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:20:00.000Z
      source_claims:
        - claim-taintpropagation-design
    - id: transformation_ref
      labels:
        zh: 具体转换引用
        en: concrete transformation reference
        ja: 具体変換参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际执行摘要、抽取、解析、拼接、参数绑定或复制的活动实例，而不是仅写算法名称。
        en: Reference to the actual summarization, extraction, parsing, concatenation, argument-binding, or copy activity instance, not merely an algorithm name.
        ja: 実際に summary、extract、parse、concat、argument binding、copy を行った activity instance を参照し、algorithm 名だけでは代用しません。
      allowed_values: []
      pattern: null
      example_value: activity://summarize/run-77/step-4
      source_claims:
        - claim-taintpropagation-design
    - id: propagation_rule_id
      labels:
        zh: 传播规则标识
        en: propagation-rule ID
        ja: 伝播規則 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识决定污点类别与片段如何经过该转换保留、扩展、缩小或改变的显式规则。
        en: Identifier of the explicit rule determining how taint class and spans are preserved, expanded, narrowed, or changed through this transformation.
        ja: 変換を通じて taint class・span を保持、拡張、縮小、変更する明示規則を識別します。
      allowed_values: []
      pattern: null
      example_value: taint-rule/summarization-semantic-carry
      source_claims:
        - claim-taintpropagation-design
    - id: propagation_rule_version
      labels:
        zh: 传播规则版本
        en: propagation-rule version
        ja: 伝播規則版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次传播判定使用的规则修订版，使后续规则改变不会重写历史事件。
        en: Revision of the rule used for this propagation judgment, preventing later rule changes from rewriting the historical occurrence.
        ja: この伝播判断に使った規則 revision を固定し、後の規則変更で過去 event を書き換えません。
      allowed_values: []
      pattern: null
      example_value: 2.3.1
      source_claims:
        - claim-taintpropagation-design
    - id: span_map
      labels:
        zh: 源目标片段映射
        en: source-to-target span map
        ja: source-target 範囲対応
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 逐项记录源端点范围如何对应到目标端点范围，含无法一一映射时采用的摘要或结构依据。
        en: Mappings from source-endpoint spans to target-endpoint spans, including summary or structural justification when correspondence is not one-to-one.
        ja: source endpoint 範囲から target endpoint 範囲への対応を列挙し、一対一でない場合は要約・構造根拠も記録します。
      allowed_values: []
      pattern: null
      example_value:
        - source: TS-1:chars:18..67
          target: TS-2:chars:4..29
          basis: semantic-summary
      source_claims:
        - claim-taintpropagation-design
    - id: class_transition
      labels:
        zh: 污点类别转换
        en: taint-class transition
        ja: taint class 遷移
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录源污点类别、目标污点类别以及保持、升级、降级或重新分类的理由。
        en: Source taint class, target taint class, and the reason the class was preserved, escalated, reduced, or reclassified.
        ja: source taint class、target taint class と、保持・強化・低減・再分類の理由を記録します。
      allowed_values: []
      pattern: null
      example_value:
        source_class: indirect-instruction
        target_class: indirect-instruction
        transition: preserved
      source_claims:
        - claim-taintpropagation-design
    - id: evidence_refs
      labels:
        zh: 传播证据引用
        en: propagation evidence references
        ja: 伝播証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明源被读取、转换执行、目标产生及范围映射的运行记录、摘要或内容摘要。
        en: References to runtime records, summaries, or content digests proving source use, transformation execution, target production, and span mapping.
        ja: source 使用、変換実行、target 生成、範囲対応を証明する runtime record、summary、content digest を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - trace://run-77/span-summarize-4
        - artifact-diff://TS1-TS2
      source_claims:
        - claim-taintpropagation-design
  constraints:
    - id: taint-propagation-requires-concrete-transformation-evidence
      severity: error
      expression_language: plain
      expression: transformation_ref, propagation_rule_id/version, non-empty span_map, class_transition, and evidence_refs all describe the same occurrence; similarity or co-occurrence is insufficient
      explanations:
        zh: 传播事件必须由同一次转换的源使用、目标生成、片段映射和规则版本共同证明；文本相似、同会话出现、潜在可达或无目标的初次赋值均不得实例化事件。
        en: One transformation's source use, target generation, span map, and rule version must jointly evidence the propagation. Text similarity, session co-occurrence, potential reachability, or initial assignment without a target cannot instantiate it.
        ja: 同一変換の source 使用、target 生成、span map、規則版が共同で伝播を証明し、text 類似、session 共起、潜在到達性、target のない初期付与では event を成立させません。
      source_claims:
        - claim-taintpropagation-design
  required_relation_constraints:
    - id: taint-propagation-has-exactly-one-source-entity
      direction: outgoing
      predicate: has_source_entity
      target_concept_id: TaintEntity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次污点传播必须明确且只关联一个传播前 TaintEntity 端点。
        en: Every taint-propagation occurrence identifies exactly one pre-transformation TaintEntity endpoint.
        ja: 各 taint 伝播発生は変換前 TaintEntity endpoint を一つだけ明示します。
      source_claims:
        - claim-taintpropagation-design
    - id: taint-propagation-has-exactly-one-target-entity
      direction: outgoing
      predicate: has_target_entity
      target_concept_id: TaintEntity
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次污点传播必须明确且只关联一个转换后 TaintEntity 端点。
        en: Every taint-propagation occurrence identifies exactly one post-transformation TaintEntity endpoint.
        ja: 各 taint 伝播発生は変換後 TaintEntity endpoint を一つだけ明示します。
      source_claims:
        - claim-taintpropagation-design
examples:
  - id: TaintPropagation-agentsentry-771a
    labels:
      zh: AgentSentry 摘要传播
      en: AgentSentry summarize propagation
      ja: AgentSentry summarize propagation
    descriptions:
      zh: event/propagate-771-a：taint/tool-771 → taint/summary-771 via summarize。
      en: "event/propagate-771-a: taint/tool-771 → taint/summary-771 via summarize."
      ja: event/propagate-771-a：taint/tool-771 → taint/summary-771 via summarize。
    example_source:
      product: AgentSentry
      url: https://arxiv.org/abs/2602.22724
      version: "2026"
    field_values:
      propagation_event_id: event/propagate-771-a
    related_node_ids:
      - TaintPropagation
      - TaintEntity
      - SourceSinkFlow
    related_relation_ids:
      - TaintPropagation-has_source_entity-TaintEntity
    source_claims:
      - claim-taintpropagation-design
  - id: TaintPropagation-owasp-rag
    labels:
      zh: OWASP RAG 检索传播
      en: OWASP RAG retrieve propagation
      ja: OWASP RAG retrieve propagation
    descriptions:
      zh: event/rag-retrieve-5：taint/rag-poison-5 → taint/chunk-5 via retrieve。
      en: "event/rag-retrieve-5: taint/rag-poison-5 → taint/chunk-5 via retrieve."
      ja: event/rag-retrieve-5：taint/rag-poison-5 → taint/chunk-5 via retrieve。
    example_source:
      product: OWASP LLM01:2025
      url: https://owasp.org/www-project-top-10-for-large-language-model-applications/
      version: LLM01
    field_values:
      propagation_event_id: event/rag-retrieve-5
    related_node_ids:
      - TaintPropagation
      - PoisonedRetrievedChunk
    related_relation_ids: []
    source_claims:
      - claim-taintpropagation-design
  - id: TaintPropagation-mcp-plan
    labels:
      zh: MCP 输出到计划传播
      en: MCP output-to-plan propagation
      ja: MCP output-to-plan propagation
    descriptions:
      zh: event/mcp-plan-118：taint/mcp-118 → taint/plan-118 via tool-result ingest。
      en: "event/mcp-plan-118: taint/mcp-118 → taint/plan-118 via tool-result ingest."
      ja: event/mcp-plan-118：taint/mcp-118 → taint/plan-118 via tool-result ingest。
    example_source:
      product: MCP tool poisoning (2026)
      url: https://www.mdpi.com/2078-2489/17/1/54
      version: "2026"
    field_values:
      propagation_event_id: event/mcp-plan-118
    related_node_ids:
      - TaintPropagation
      - MaliciousToolOutput
    related_relation_ids: []
    source_claims:
      - claim-taintpropagation-design
  - id: TaintPropagation-copilot-context
    labels:
      zh: Copilot 配置到上下文传播
      en: Copilot config-to-context propagation
      ja: Copilot config-to-context propagation
    descriptions:
      zh: event/copilot-53773：taint/copilot-53773 → taint/context-53773 via settings ingest。
      en: "event/copilot-53773: taint/copilot-53773 → taint/context-53773 via settings ingest."
      ja: event/copilot-53773：taint/copilot-53773 → taint/context-53773 via settings ingest。
    example_source:
      product: CVE-2025-53773
      url: https://www.getmaxim.ai/articles/prompt-injection-defense-for-production-ai-agents-a-complete-2026-guide/
      version: CVE-2025-53773
    field_values:
      propagation_event_id: event/copilot-53773
    related_node_ids:
      - TaintPropagation
      - TaintedSource
    related_relation_ids: []
    source_claims:
      - claim-taintpropagation-design
parent_relation: null
relations:
  - id: TaintPropagation-has_target_entity-TaintEntity
    predicate: has_target_entity
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 具有传播目标端实体
      en: has target taint entity
      ja: 伝播先汚染実体を持つ
    definitions:
      zh: TaintPropagation 通过 has_target_entity 指向具体转换后实际生成或更新的唯一 TaintEntity 版本。传播记录必须把目标身份、版本、输出范围或类别变化与转换证据对齐；仅潜在可达、尚未生成的对象或相似文本都不是目标端。
      en: TaintPropagation has_target_entity identifies the single TaintEntity version actually generated or updated by the concrete transformation. The record must align target identity, version, output span or class transition with transformation evidence; a merely reachable, not-yet-created, or textually similar object is not a target endpoint.
      ja: TaintPropagation の has_target_entity は、具体的変換後に実際に生成または更新された唯一の TaintEntity version を示します。record は target identity・version・output span または class transition を transformation evidence と整合させる必要があり、潜在到達可能、未生成、textually similar な object は target endpoint ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 关系类型本身不限制一份 TaintEntity 可由多少次传播更新；每次 TaintPropagation 恰有一个目标端点由节点 required-relation constraint 强制。
      en: The relation type does not limit how many propagation events may update one TaintEntity; the exactly-one target for each TaintPropagation is enforced by the concept's required-relation constraint.
      ja: 一つの TaintEntity を何回の propagation event が更新できるかは関係型で制限せず、各 TaintPropagation の target exactly-one は concept の required-relation constraint で強制します。
    inverse_reading:
      predicate: is_target_entity_of
      labels:
        zh: 是传播事件的目标端实体
        en: is target entity of propagation
        ja: 伝播イベントの先実体である
    conditions:
      - id: TaintPropagation-has_target_entity-TaintEntity-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert exactly once per TaintPropagation and only when the transformation actually generated or updated the cited TaintEntity version and the event's output span or class transition, time, and evidence align; potential reachability is insufficient.
        explanations:
          zh: 每次 TaintPropagation 必须且只能建立一次此边，并且转换必须实际生成或更新所引用的 TaintEntity 版本，事件的输出范围或类别变化、时间和证据须一致；潜在可达性不足以成立。
          en: Assert this edge exactly once per TaintPropagation and only when the transformation actually generated or updated the cited TaintEntity version and the output span or class transition, time, and evidence align; potential reachability is insufficient.
          ja: 各 TaintPropagation についてこの辺を exactly once 成立させ、変換が引用 TaintEntity version を実際に生成または更新し、output span または class transition・time・evidence が一致する場合に限ります。潜在到達性では不十分です。
        source_claims:
          - claim-taintpropagation-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-taintpropagation-design
      - claim-taintpropagation-design
    distinct_fact_rationale:
      zh: 目标端实体是转换后实际生成或更新的污点承载体，与转换前被使用的来源端具有不同版本、时间与证据角色。
      en: The target entity is the taint carrier actually generated or updated after transformation and has a different version, time, and evidential role from the source used beforehand.
      ja: target entity は変換後に実際に生成または更新される taint carrier で、変換前に使用される source とは version・time・evidence role が異なります。
    layout_role: cross-link
    target: concept:TaintEntity
  - id: TaintPropagation-has_source_entity-TaintEntity
    predicate: has_source_entity
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 具有传播源端实体
      en: has source taint entity
      ja: 伝播元汚染実体を持つ
    definitions:
      zh: TaintPropagation 通过 has_source_entity 指向转换发生前承载污点的唯一 TaintEntity 版本。传播记录必须明确引用该端点的身份、版本、污点类别与输入范围；同会话共现、相似内容或不含目标转换的初始污点赋值都不能建立此边。
      en: TaintPropagation has_source_entity identifies the single TaintEntity version carrying the taint before the transformation occurred. The propagation record must cite that endpoint's identity, version, taint class, and input span; session co-occurrence, similar content, or an initial taint assignment with no target transformation cannot assert the edge.
      ja: TaintPropagation の has_source_entity は、変換発生前に taint を担う唯一の TaintEntity version を示します。propagation record は endpoint の identity・version・taint class・input span を明示参照しなければならず、同一 session の共起、類似内容、target transformation のない初期 taint assignment では成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 关系类型本身不限制一份 TaintEntity 可作为多少次传播的来源；每次 TaintPropagation 恰有一个来源端点由节点 required-relation constraint 强制。
      en: The relation type does not limit how many propagation events may use one TaintEntity as a source; the exactly-one source for each TaintPropagation is enforced by the concept's required-relation constraint.
      ja: 一つの TaintEntity が何回の propagation source になれるかは関係型で制限せず、各 TaintPropagation の source exactly-one は concept の required-relation constraint で強制します。
    inverse_reading:
      predicate: is_source_entity_of
      labels:
        zh: 是传播事件的源端实体
        en: is source entity of propagation
        ja: 伝播イベントの元実体である
    conditions:
      - id: TaintPropagation-has_source_entity-TaintEntity-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert exactly once per TaintPropagation and only when the propagation record explicitly cites the pre-transformation TaintEntity identity and version, input span or class, and transformation evidence; co-occurrence and initial assignment are insufficient.
        explanations:
          zh: 每次 TaintPropagation 必须且只能建立一次此边，并且传播记录须明确引用转换前 TaintEntity 的身份与版本、输入范围或类别及转换证据；共现和初始赋值均不足以成立。
