    supports: NSA recommends a traceable sequence with exact input, output, identity, and hash information for chained execution. Moonweave requires those records as propagation evidence.
    locator: NSA MCP Security Design Considerations > Poor or missing audit logs, pp. 7-8; Instrument for logging, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-010
    source: eng-ont-prov-o
    supports: PROV-O derivation depends on an evidenced usage-generation chain or qualified derivation, not similarity or adjacency. Moonweave applies that provenance truth condition to taint propagation.
