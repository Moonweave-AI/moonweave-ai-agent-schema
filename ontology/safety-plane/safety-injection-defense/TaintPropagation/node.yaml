  - id: claim-taint-propagation-001
    source: eng-security-mcp-nsa-2026
    supports: NSA describes cascading prompt injections propagating when one agent's output becomes another's input and causing control-flow hijacking across chained MCP processes.
    locator: Security concerns > Poisoning output for downstream automation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-002
    source: eng-ont-prov-o
    supports: PROV-O identifies an Activity separately from the Entities it uses and generates. Moonweave applies that distinction to each concrete propagation occurrence.
    locator: PROV-O Recommendation > §5.2.3 Activity, §5.3.1 Generation, and §5.3.5 Usage
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-003
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes event Timestamp from ObservedTimestamp. Moonweave assigns occurred_at the transformation event-time meaning.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp and ObservedTimestamp
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-004
    source: eng-ont-prov-o
    supports: PROV-O derivation is grounded by an activity that uses a source Entity and generates a target Entity. Moonweave references that concrete transformation activity.
    locator: PROV-O Recommendation > §5.3.2 Derivation and qualifiedDerivation
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-005
    source: lit-security-ipiguard
