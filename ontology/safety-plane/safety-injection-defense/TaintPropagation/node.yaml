    locator: IPIGuard (EMNLP 2025) > Tool Dependency Graph propagation and defense analysis
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-taint-propagation-006
    source: eng-security-mcp-nsa-2026
    supports: NSA emphasizes traceable detection configurations and exact parameters for later investigation. Moonweave versions the propagation rule applied to each event.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-007
    source: eng-ont-prov-o
    supports: PROV-O qualified derivation allows additional attributes describing how a target Entity derives from a source Entity. Moonweave records the exact span correspondence on that qualified event.
    locator: PROV-O Recommendation > §5.3.2 qualifiedDerivation and derivation attributes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-008
    source: eng-security-nist-ai-100-2e2025
    supports: NIST distinguishes indirect prompt-injection attack conditions and persistence through processing stages. Moonweave records whether the security class persists or changes at each concrete transformation.
    locator: NIST AI 100-2e2025 > §3.4 Indirect Prompt Injection and §3.4.2 execution triggers, pp. 62-64
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-taint-propagation-009
