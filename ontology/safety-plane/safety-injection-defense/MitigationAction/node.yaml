  - id: claim-owasp-mitigation-inference
    source: owasp-llm01-2025
    supports: Prompt-injection risk motivates traceable controls that reduce
      untrusted instruction influence; it does not define this internal
      mitigation schema.
    locator: Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
