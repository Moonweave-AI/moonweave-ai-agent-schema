schema: moonweave.ai/ontology-node/v1
id: MitigationAction
kind: concept
status: accepted
labels:
  zh: 缓解动作
  en: Mitigation Action
  ja: 緩和行為
semantics:
  short_definition:
    zh: 为降低已发现注入风险而采取或计划采取的具体控制动作。
    en: A concrete control action taken or planned to reduce a discovered injection
      risk.
    ja: 発見された注入リスクを下げるために取る、または計画する具体的な制御行為。
  definition:
    zh: MitigationAction 是 DefenseFinding
      关联的具体控制动作，例如隔离、净化或保留受信任约束。它不是发现的建议本身、PolicyDecision、AuthorizationGrant
      或原始不受信任内容。
    en: MitigationAction is a concrete control action associated with a
      DefenseFinding, such as quarantine, sanitization, or preserving a trusted
      constraint. It is not the finding recommendation itself, a PolicyDecision,
      an AuthorizationGrant, or raw untrusted content. It may address a
      DefenseFinding through a typed mitigation relation, but is neither a
      finding component nor a policy decision.
    ja: MitigationAction は隔離、サニタイズ、信頼済み制約の保持など DefenseFinding
      に関連する具体的制御行為である。発見の推奨そのもの、PolicyDecision、AuthorizationGrant、生の信頼できない内容ではない。
  why_needed:
    zh: 将发现与实际控制动作分开，可以证明风险如何被处理，并避免把建议或授权记录误写为已完成的安全操作。
    en: Separating finding from concrete control action proves how risk was handled
      and prevents recommendations or authorization records from being written
      as completed safety operations.
    ja: 発見を具体的制御行為から分けることでリスクがどう扱われたかを証明でき、推奨や認可記録を完了済み安全操作として書くのを防ぐ。
  includes:
    - zh: 动作标识、所依据发现、动作类型、目标工件、执行状态和结果证据。
      en: Action identity, supporting finding, action type, target artifact, execution
        state, and result evidence.
      ja: 行為識別子、根拠となる発見、行為種別、対象アーティファクト、実行状態、結果証拠。
  excludes:
    - zh: 只表达风险的信号或发现。
      en: A signal or finding that only expresses risk.
      ja: リスクを表すだけのシグナルまたは発見。
  semantic_kind: activity
  aliases:
    - risk-treatment-action
engineering:
  explanation:
    zh: 为每个动作记录其依据发现和目标版本。动作可执行或计划，但状态必须明确；如果动作改变内容表示或访问路径，应产生独立可验证输出而不能只修改发现文本。
    en: Record the supporting finding and target version for each action. An action
      may be planned or executed, but its state must be explicit; if it changes
      content representation or access path, produce a separately verifiable
      output rather than merely editing finding text.
    ja: 各行為について根拠発見と対象版を記録する。行為は計画または実行済みでよいが状態を明示し、内容表現やアクセス経路を変えるなら発見テキストを編集するだけでなく別途検証可能な出力を作る。
  typical_input:
    - description:
        zh: 待处置发现
        en: Finding to treat
        ja: 処置する発見
      format: '{"mitigation_action_id":"mitigate-42","risk_basis_reference":"finding-42","target":"tool-output-42-r1","action_type":"quarantine"}'
      source_claims:
        - claim-owasp-mitigation-inference
  typical_output:
    - description:
        zh: 缓解记录
        en: Mitigation record
        ja: 緩和記録
      format: '{"mitigation_action_id":"mitigate-42","risk_basis_reference":"finding-42","state":"executed","result_ref":"quarantine-42"}'
      source_claims:
        - claim-owasp-mitigation-inference
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Explains the need for controls that mitigate risk from untrusted input.
structure:
  identity_keys:
    - mitigation_action_id
  fields:
    - id: mitigation_action_id
      labels:
        zh: 缓解动作标识符
        en: Mitigation action ID
        ja: 緩和行為 ID
      definitions:
        zh: 一次具体风险处置动作的稳定标识符。
        en: Stable identifier for one concrete risk-treatment action.
        ja: 一つの具体的リスク処置行為の安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: mitigate-42
      allowed_values: []
      source_claims:
        - claim-owasp-mitigation-inference
    - id: action_type
      labels:
        zh: 动作类型
        en: Action type
        ja: 行為種別
      definitions:
        zh: 应用于发现目标的具体控制类别。
        en: The concrete control category applied to the finding target.
        ja: 発見対象へ適用する具体的制御カテゴリ。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: quarantine
      allowed_values:
        - quarantine
        - sanitize
        - preserve-trusted-constraint
      source_claims:
        - claim-owasp-mitigation-inference
    - id: risk_basis_reference
      labels:
        zh: 风险依据引用
        en: Risk-basis reference
        ja: リスク根拠参照
      definitions:
        zh: 要求或支持该缓解动作的发现或已记录风险依据引用。
        en: A finding or documented risk-basis reference that requires or supports this mitigation action.
        ja: この緩和行為を要求または裏付ける発見または文書化済みリスク根拠への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: finding-42
      allowed_values: []
      source_claims:
        - claim-owasp-mitigation-inference
  constraints:
    - id: mitigation-action-finding-and-result
      severity: error
      expression_language: plain
      expression: A MitigationAction must reference its supporting DefenseFinding and,
        when executed, a result artifact or receipt distinct from the finding.
      explanations:
        zh: 动作需要证明依据和实际效果。
        en: An action needs evidence of both basis and actual effect.
        ja: 行為には根拠と実際の効果の両方の証拠が必要である。
      explanation:
        zh: 动作需要证明依据和实际效果。
        en: An action needs evidence of both basis and actual effect.
        ja: 行為には根拠と実際の効果の両方の証拠が必要である。
      source_claims:
        - claim-owasp-mitigation-inference
    - id: mitigation-action-finding-separation
      severity: error
      language: plain
      expression: A MitigationAction must reference its target finding or documented
        risk basis, and must not be modeled as a structural component of
        DefenseFinding or as an authorization grant.
      explanation:
        zh: A finding records an assessment, while mitigation is a distinct enforcement
          or handling activity.
        en: A finding records an assessment, while mitigation is a distinct enforcement
          or handling activity.
        ja: A finding records an assessment, while mitigation is a distinct enforcement
          or handling activity.
      source_claims:
        - claim-owasp-mitigation-inference
  required_relations: []
examples:
  - id: mitigation-action-nemo
    labels:
      zh: 缓解动作 - NeMo Guardrails 注入 rail
      en: Mitigation Action - NeMo Guardrails injection rail
      ja: 緩和行為 - NeMo Guardrails 注入 rail
    descriptions: {zh: "缓解动作(MitigationAction) [MitigationAction]: 为降低已发现注入风险而采取或计划采取的具体控制动作。. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse；支持 input/output/dialog rails。 Fields: mitigation_action_id, action_type, risk_basis_reference.", en: "Mitigation Action (MitigationAction) [MitigationAction]: A concrete control action taken or planned to reduce a discovered injection. NVIDIA NeMo Guardrails Colang 2.0: define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse — supports input/output/dialog rails (github.com/NVIDIA-NeMo/Guardrails). Fields include mitigation_action_id, action_type, risk_basis_reference.", ja: "緩和行為(MitigationAction) [MitigationAction]: 発見された注入リスクを下げるために取る、または計画する具体的な制御行為。. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input で check_jailbreak を実行し jailbreak 時 bot refuse；input/output/dialog rails をサポート。 Fields: mitigation_action_id, action_type, risk_basis_reference."}
    field_values:
      action_type: quarantine
      mitigation_action_id: mitigate-42
      risk_basis_reference: finding-42
    related_node_ids:
      - MitigationAction
    related_relation_ids: []
    example_source: NVIDIA NeMo Guardrails
    source_claims:
      - claim-owasp-mitigation-inference
  - id: mitigation-action-guardrails_ai
    labels:
      zh: 缓解动作 - Guardrails AI Pydantic 验证
      en: Mitigation Action - Guardrails AI Pydantic validation
      ja: 緩和行為 - Guardrails AI Pydantic 検証
    descriptions: {zh: "缓解动作(MitigationAction) [MitigationAction]: 为降低已发现注入风险而采取或计划采取的具体控制动作。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；guard(llm_api=..., prompt=...) 配合 ToxicLanguage、ProfanityFree、ValidJSON 验证器。 Fields: mitigation_action_id, action_type, risk_basis_reference.", en: "Mitigation Action (MitigationAction) [MitigationAction]: A concrete control action taken or planned to reduce a discovered injection. Guardrails AI: Guard.from_pydantic(output_class=ValidOutput); guard(llm_api=openai.chat.completions.create, prompt=...) with ToxicLanguage, ProfanityFree, ValidJSON validators (github.com/guardrails-ai/guardrails). Fields include mitigation_action_id, action_type, risk_basis_reference.", ja: "緩和行為(MitigationAction) [MitigationAction]: 発見された注入リスクを下げるために取る、または計画する具体的な制御行為。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；ToxicLanguage/ProfanityFree/ValidJSON validator 付き guard。 Fields: mitigation_action_id, action_type, risk_basis_reference."}
    field_values:
      action_type: quarantine
      mitigation_action_id: mitigate-42
      risk_basis_reference: finding-42
    related_node_ids:
      - MitigationAction
    related_relation_ids: []
    example_source: Guardrails AI
    source_claims:
      - claim-owasp-mitigation-inference
  - id: mitigation-action-anthropic_cai
    labels:
      zh: 缓解动作 - Anthropic Constitutional AI
      en: Mitigation Action - Anthropic Constitutional AI
      ja: 緩和行為 - Anthropic Constitutional AI
    descriptions: {zh: "缓解动作(MitigationAction) [MitigationAction]: 为降低已发现注入风险而采取或计划采取的具体控制动作。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: mitigation_action_id, action_type, risk_basis_reference.", en: "Mitigation Action (MitigationAction) [MitigationAction]: A concrete control action taken or planned to reduce a discovered injection. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include mitigation_action_id, action_type, risk_basis_reference.", ja: "緩和行為(MitigationAction) [MitigationAction]: 発見された注入リスクを下げるために取る、または計画する具体的な制御行為。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: mitigation_action_id, action_type, risk_basis_reference."}
    field_values:
      action_type: quarantine
      mitigation_action_id: mitigate-42
      risk_basis_reference: finding-42
    related_node_ids:
      - MitigationAction
    related_relation_ids: []
    example_source: Anthropic Constitutional AI
    source_claims:
      - claim-owasp-mitigation-inference
  - id: mitigation-action-rebuff
    labels:
      zh: 缓解动作 - Rebuff 注入检测
      en: Mitigation Action - Rebuff injection detection
      ja: 緩和行為 - Rebuff 注入検出
    descriptions: {zh: "缓解动作(MitigationAction) [MitigationAction]: 为降低已发现注入风险而采取或计划采取的具体控制动作。. Rebuff：rb.detect_injection(user_input) — 多层检测：启发式 + LLM + 向量相似度（github.com/protectai/rebuff）。 Fields: mitigation_action_id, action_type, risk_basis_reference.", en: "Mitigation Action (MitigationAction) [MitigationAction]: A concrete control action taken or planned to reduce a discovered injection. Rebuff: rb = Rebuff(api_token=\"...\"); result = rb.detect_injection(user_input) — multi-layer detection: heuristic + LLM-based + vector similarity (github.com/protectai/rebuff). Fields include mitigation_action_id, action_type, risk_basis_reference.", ja: "緩和行為(MitigationAction) [MitigationAction]: 発見された注入リスクを下げるために取る、または計画する具体的な制御行為。. Rebuff：rb.detect_injection(user_input) — heuristic + LLM + vector similarity の多層検出。 Fields: mitigation_action_id, action_type, risk_basis_reference."}
    field_values:
      action_type: quarantine
      mitigation_action_id: mitigate-42
      risk_basis_reference: finding-42
    related_node_ids:
      - MitigationAction
    related_relation_ids: []
    example_source: Rebuff detector
    source_claims:
      - claim-owasp-mitigation-inference
