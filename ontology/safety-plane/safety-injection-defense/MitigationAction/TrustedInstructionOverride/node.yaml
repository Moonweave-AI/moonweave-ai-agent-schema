    descriptions: {zh: "可信指令优先动作(TrustedInstructionOverride) [TrustedInstructionOverride]: 在冲突发生时保留更高信任约束而拒绝不受信任候选指令影响的缓解动作。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: mitigation_action_id, action_type, retained_constraint_id.", en: "Trusted Instruction Override (TrustedInstructionOverride) [TrustedInstructionOverride]: A mitigation action that preserves a higher-trust constraint when a conflicting untrusted candidate attempts to influence behavior.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include mitigation_action_id, action_type, retained_constraint_id.", ja: "信頼済み指示優先行為(TrustedInstructionOverride) [TrustedInstructionOverride]: 衝突する信頼できない候補が挙動へ影響しようとするとき、高信頼の制約を保持する緩和行為。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: mitigation_action_id, action_type, retained_constraint_id."}
    field_values:
