    source: owasp-llm01-2025
    supports: Prompt injection arises when untrusted inputs alter model behavior and can lead to disclosure, privilege escalation, or unauthorized actions.
    locator: "Overview and Prevention and Mitigation Strategies"
    evidence_kind: security-guidance
    confidence: high
