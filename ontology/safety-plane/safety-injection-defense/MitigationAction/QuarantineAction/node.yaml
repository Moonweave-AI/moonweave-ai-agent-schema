    source: owasp-llm01-2025
    supports: Prompt-injection risk motivates restricting use of suspicious untrusted content while retaining evidence; it does not define this internal quarantine schema.
    locator: "Prevention and Mitigation Strategies"
    evidence_kind: design-inference
    confidence: high
