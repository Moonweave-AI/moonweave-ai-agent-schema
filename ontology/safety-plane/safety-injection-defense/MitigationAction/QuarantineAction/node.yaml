schema: moonweave.ai/ontology-node/v1
id: QuarantineAction
kind: concept
status: accepted
labels: {zh: 隔离动作, en: Quarantine Action, ja: 隔離行為}
semantics:
  short_definition: {zh: "将可疑工件移出活动消费路径并保留证据的缓解动作。", en: "A mitigation action that removes a suspicious artifact from active consumption while preserving evidence.", ja: "疑わしいアーティファクトを証拠を保持しつつ能動的消費経路から外す緩和行為。"}
  definition: {zh: "QuarantineAction 是一种 MitigationAction，它限制可疑内容被计划、工具或输出流程使用，并保留受控审查引用。它不是删除内容、净化内容表示、PolicyDecision、AuthorizationRevocation 或对来源服务器的网络封禁。", en: "QuarantineAction is a MitigationAction that restricts suspicious content from use by planning, tool, or output flow while retaining a controlled review reference. It is not deletion, content sanitization, a PolicyDecision, AuthorizationRevocation, or a network block on the source server.", ja: "QuarantineAction は疑わしい内容が計画、ツール、出力フローで使われるのを制限し、制御されたレビュー参照を保持する MitigationAction である。削除、内容サニタイズ、PolicyDecision、AuthorizationRevocation、提供サーバーへのネットワーク遮断ではない。"}
  why_needed: {zh: "隔离在保留取证和恢复可能性的同时，防止可疑内容继续影响代理行为。", en: "Quarantine prevents suspicious content from continuing to influence agent behavior while preserving forensic evidence and recoverability.", ja: "隔離はフォレンジック証拠と回復可能性を保ちながら、疑わしい内容がエージェント挙動へ影響し続けるのを防ぐ。"}
  includes: [{zh: "目标工件版本、隔离位置、处置原因、访问限制和审查引用。", en: "Target artifact revision, quarantine location, disposition reason, access restriction, and review reference.", ja: "対象アーティファクト版、隔離場所、処置理由、アクセス制限、レビュー参照。"}]
  excludes: [{zh: "永久擦除或将内容改写为安全文本。", en: "Permanent erasure or rewriting content into safe text.", ja: "永久消去または内容を安全テキストへ書き換えること。"}]
  semantic_kind: activity
  aliases: [isolation-action, content-quarantine]
engineering:
  explanation: {zh: "将精确工件版本移到无法被普通上下文组装、工具参数生成或输出渲染消费的位置。保留不可变引用、原始摘要和访问审计；恢复必须经过单独审查而不是自动重入上下文。", en: "Move the exact artifact revision to a location unavailable to ordinary context assembly, tool-argument generation, or output rendering. Retain immutable reference, original digest, and access audit; restoration requires separate review rather than automatic re-entry into context.", ja: "正確なアーティファクト版を通常のコンテキスト組立、ツール引数生成、出力描画で消費できない場所へ移す。不変参照、元要約、アクセス監査を保持し、復元は自動的なコンテキスト再入ではなく別レビューを要する。"}
  typical_input:
    - description: {zh: 需隔离的工件, en: Artifact to quarantine, ja: 隔離するアーティファクト}
      format: '{"quarantine_id":"quarantine-42","finding_id":"finding-42","artifact":"tool-output-42-r1","reason":"instruction-injection"}'
      source_claims: [claim-owasp-quarantine-inference]
  typical_output:
    - description: {zh: 隔离收据, en: Quarantine receipt, ja: 隔離受領書}
      format: '{"quarantine_id":"quarantine-42","state":"isolated","storage_ref":"quarantine://tool-output-42-r1","active_access":false}'
      source_claims: [claim-owasp-quarantine-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: "Explains mitigation needs that limit influence of untrusted content."
structure:
  identity_keys: [mitigation_action_id, quarantine_action_id]
  fields:
    - id: mitigation_action_id
      labels: {zh: 继承的缓解动作标识符, en: Inherited mitigation action ID, ja: 継承された緩和行為 ID}
      definitions: {zh: 此隔离操作作为 MitigationAction 的稳定动作身份；它与隔离操作记录标识同一具体风险处置。, en: "Stable action identity for this quarantine operation as a MitigationAction; it identifies the same concrete risk treatment as the quarantine-action record.", ja: "この隔離操作が MitigationAction として持つ安定した行為 ID。隔離操作記録と同じ具体的なリスク処置を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: quarantine-42
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
    - id: action_type
      labels: {zh: 动作类型, en: Action type, ja: 行為種別}
      definitions: {zh: 固定为 quarantine，说明该缓解动作将可疑工件移出活动消费路径而不等同于删除证据。, en: "Fixed to quarantine, showing that the mitigation removes a suspicious artifact from active consumption without equating quarantine with evidence deletion.", ja: "quarantine に固定する。隔離は疑わしい成果物をアクティブな消費から外す緩和であり、証拠削除とは同一ではないことを示す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: quarantine
      allowed_values: [quarantine, sanitize, preserve-trusted-constraint]
      source_claims: [claim-owasp-quarantine-inference]
    - id: risk_basis_reference
      labels: {zh: 风险依据引用, en: Risk-basis reference, ja: リスク根拠参照}
      definitions: {zh: 要求或支持隔离的发现、信号或已记录风险依据引用。, en: "Finding, signal, or documented risk-basis reference that requires or supports this quarantine action.", ja: "この隔離行為を要求または裏付ける発見、シグナル、または文書化済みリスク根拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: finding-42
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
    - id: quarantine_action_id
      labels: {zh: 隔离动作标识符, en: Quarantine action ID, ja: 隔離行為 ID}
      definitions: {zh: "一次工件隔离操作的稳定标识符。", en: "Stable identifier for one artifact-isolation operation.", ja: "一つのアーティファクト隔離操作の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: quarantine-42
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
    - id: quarantine_location
      labels: {zh: 隔离位置, en: Quarantine location, ja: 隔離場所}
      definitions: {zh: "受控审查可访问但正常代理流程不可消费的工件位置。", en: "Artifact location available to controlled review but not ordinary agent consumption.", ja: "制御されたレビューは可能だが通常のエージェント消費はできないアーティファクト場所。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: quarantine://tool-output-42-r1
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
  constraints:
    - id: quarantine-removes-active-consumption
      severity: error
      expression_language: plain
      expression: A QuarantineAction must prevent the target revision from ordinary context, tool, and output consumption while retaining a controlled review reference.
      explanations: {zh: "隔离不是仅给工件增加标签。", en: "Quarantine is not merely adding a label to an artifact.", ja: "隔離はアーティファクトにラベルを付けるだけではない。"}
      explanation: {zh: "隔离不是仅给工件增加标签。", en: "Quarantine is not merely adding a label to an artifact.", ja: "隔離はアーティファクトにラベルを付けるだけではない。"}
      source_claims: [claim-owasp-quarantine-inference]
  required_relations: []
examples:
  - id: quarantine-action-echoleak
    labels:
      zh: 隔离动作 - EchoLeak Copilot 邮件注入
      en: Quarantine Action - EchoLeak Copilot email injection
      ja: 隔離行為 - EchoLeak Copilot メール注入
    descriptions: {zh: "隔离动作(QuarantineAction) [QuarantineAction]: 将可疑工件移出活动消费路径并保留证据的缓解动作。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: mitigation_action_id, action_type, quarantine_action_id.", en: "Quarantine Action (QuarantineAction) [QuarantineAction]: A mitigation action that removes a suspicious artifact from active consumption while preserving evidence.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include mitigation_action_id, action_type, quarantine_action_id.", ja: "隔離行為(QuarantineAction) [QuarantineAction]: 疑わしいアーティファクトを証拠を保持しつつ能動的消費経路から外す緩和行為。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: mitigation_action_id, action_type, quarantine_action_id."}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-42
      quarantine_action_id: quarantine-42
      quarantine_location: "quarantine://tool-output-42-r1"
      risk_basis_reference: finding-42
    related_node_ids:
      - QuarantineAction
    related_relation_ids:
      - claim-owasp-quarantine-inference
      - QuarantineAction
    example_source: EchoLeak CVE-2025-32711
    source_claims:
      - claim-owasp-quarantine-inference
  - id: quarantine-action-greshake_bing
    labels:
      zh: 隔离动作 - Greshake Bing Chat 间接注入
      en: Quarantine Action - Greshake Bing Chat indirect injection
      ja: 隔離行為 - Greshake Bing Chat 間接注入
    descriptions: {zh: "隔离动作(QuarantineAction) [QuarantineAction]: 将可疑工件移出活动消费路径并保留证据的缓解动作。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: mitigation_action_id, action_type, quarantine_action_id.", en: "Quarantine Action (QuarantineAction) [QuarantineAction]: A mitigation action that removes a suspicious artifact from active consumption while preserving evidence.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include mitigation_action_id, action_type, quarantine_action_id.", ja: "隔離行為(QuarantineAction) [QuarantineAction]: 疑わしいアーティファクトを証拠を保持しつつ能動的消費経路から外す緩和行為。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: mitigation_action_id, action_type, quarantine_action_id."}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-42
      quarantine_action_id: quarantine-42
      quarantine_location: "quarantine://tool-output-42-r1"
      risk_basis_reference: finding-42
    related_node_ids:
      - QuarantineAction
    related_relation_ids:
      - claim-owasp-quarantine-inference
      - QuarantineAction
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-owasp-quarantine-inference
  - id: quarantine-action-nemo
    labels:
      zh: 隔离动作 - NeMo Guardrails 注入 rail
      en: Quarantine Action - NeMo Guardrails injection rail
      ja: 隔離行為 - NeMo Guardrails 注入 rail
    descriptions: {zh: "隔离动作(QuarantineAction) [QuarantineAction]: 将可疑工件移出活动消费路径并保留证据的缓解动作。. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse；支持 input/output/dialog rails。 Fields: mitigation_action_id, action_type, quarantine_action_id.", en: "Quarantine Action (QuarantineAction) [QuarantineAction]: A mitigation action that removes a suspicious artifact from active consumption while preserving evidence.. NVIDIA NeMo Guardrails Colang 2.0: define flow check_input: $result = execute check_jailbreak(user_input=$user_input); if $result.jailbreak: bot refuse — supports input/output/dialog rails (github.com/NVIDIA-NeMo/Guardrails). Fields include mitigation_action_id, action_type, quarantine_action_id.", ja: "隔離行為(QuarantineAction) [QuarantineAction]: 疑わしいアーティファクトを証拠を保持しつつ能動的消費経路から外す緩和行為。. NVIDIA NeMo Guardrails Colang 2.0：define flow check_input で check_jailbreak を実行し jailbreak 時 bot refuse；input/output/dialog rails をサポート。 Fields: mitigation_action_id, action_type, quarantine_action_id."}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-42
      quarantine_action_id: quarantine-42
      quarantine_location: "quarantine://tool-output-42-r1"
      risk_basis_reference: finding-42
    related_node_ids:
      - QuarantineAction
    related_relation_ids:
      - claim-owasp-quarantine-inference
      - QuarantineAction
    example_source: NVIDIA NeMo Guardrails
    source_claims:
      - claim-owasp-quarantine-inference
  - id: quarantine-action-guardrails_ai
    labels:
      zh: 隔离动作 - Guardrails AI Pydantic 验证
      en: Quarantine Action - Guardrails AI Pydantic validation
      ja: 隔離行為 - Guardrails AI Pydantic 検証
    descriptions: {zh: "隔离动作(QuarantineAction) [QuarantineAction]: 将可疑工件移出活动消费路径并保留证据的缓解动作。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；guard(llm_api=..., prompt=...) 配合 ToxicLanguage、ProfanityFree、ValidJSON 验证器。 Fields: mitigation_action_id, action_type, quarantine_action_id.", en: "Quarantine Action (QuarantineAction) [QuarantineAction]: A mitigation action that removes a suspicious artifact from active consumption while preserving evidence.. Guardrails AI: Guard.from_pydantic(output_class=ValidOutput); guard(llm_api=openai.chat.completions.create, prompt=...) with ToxicLanguage, ProfanityFree, ValidJSON validators (github.com/guardrails-ai/guardrails). Fields include mitigation_action_id, action_type, quarantine_action_id.", ja: "隔離行為(QuarantineAction) [QuarantineAction]: 疑わしいアーティファクトを証拠を保持しつつ能動的消費経路から外す緩和行為。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；ToxicLanguage/ProfanityFree/ValidJSON validator 付き guard。 Fields: mitigation_action_id, action_type, quarantine_action_id."}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-42
      quarantine_action_id: quarantine-42
      quarantine_location: "quarantine://tool-output-42-r1"
      risk_basis_reference: finding-42
    related_node_ids:
      - QuarantineAction
    related_relation_ids:
      - claim-owasp-quarantine-inference
      - QuarantineAction
    example_source: Guardrails AI
    source_claims:
      - claim-owasp-quarantine-inference
parent_relation:
  id: QuarantineAction-is_a-MitigationAction
  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "QuarantineAction 是隔离可疑工件的 MitigationAction。", en: "A QuarantineAction is a MitigationAction that isolates a suspicious artifact.", ja: "QuarantineAction は疑わしいアーティファクトを隔離する MitigationAction である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: quarantine-parent-finding
      severity: error
      expression_language: plain
      expression: The action must retain its parent mitigation evidence and identify the isolated artifact revision.
      explanations: {zh: "隔离必须可追溯到风险和精确工件。", en: "Quarantine must trace to risk and exact artifact.", ja: "隔離はリスクと正確なアーティファクトへ追跡できなければならない。"}
      source_claims: [claim-owasp-quarantine-inference]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-quarantine-inference]
relations: []
