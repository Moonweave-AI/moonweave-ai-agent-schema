schema: moonweave.ai/ontology-node/v1
id: RiskFlowRole
kind: concept
status: accepted
labels:
  zh: 风险流角色
  en: risk-flow role
  ja: リスクフロー役割
semantics:
  short_definition:
    zh: 在某条来源—接收方风险流中由对象承担的上下文角色。
    en: A context-dependent role borne by an object in a particular source-to-sink risk flow.
    ja: 特定の出所—受け先リスク流で対象が担う文脈依存役割。
  definition:
    zh: 风险流角色是一种角色，只在特定 SourceSinkFlow 内说明某对象充当风险来源或受保护接收方；同一对象在另一条流中可以不承担该角色或承担相反角色。它不是对象的固有类型，也不是流记录本身。
    en: A RiskFlowRole is a role that states, only within a particular SourceSinkFlow, that an object serves as a risk source or protected sink; the same object may bear no role or the opposite role in another flow. It is not the object's intrinsic type and not the flow record itself.
    ja: リスク流役割は、特定の SourceSinkFlow 内だけで対象がリスク出所または保護対象の受け先を担うことを示す役割です。同じ対象が別の流では役割を持たないか逆の役割を持てます。対象の固有型でも流記録そのものでもありません。
  why_needed:
    zh: 角色化避免把“工具输出永远是来源”或“记忆永远是接收方”写成错误的固定分类。
    en: Role modeling avoids false fixed classifications such as every tool output always being a source or memory always being a sink.
    ja: 「ツール出力は常に出所」「記憶は常に受け先」といった誤った固定分類を避けます。
  includes:
    - zh: 包含绑定到一条具体流、对象和作用域的来源或接收方角色实例。
      en: Includes source or sink role instances bound to a specific flow, object, and scope.
      ja: 特定の流、対象、作用域へ結び付いた出所または受け先の役割实例を含みます。
  excludes:
    - zh: 不包含对象本体、没有具体流上下文的永久标签或 SourceSinkFlow 记录。
      en: Excludes the bearer itself, permanent labels without a flow context, and the SourceSinkFlow record.
      ja: 役割担体そのもの、流文脈のない恒久ラベル、SourceSinkFlow 記録は含みません。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 风险角色标识
        en: risk-role ID
        ja: リスク役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识某对象在一条具体路径版本中承担的一次角色，不复用对象或路径标识。
        en: Stable identifier for one role borne by an object in a particular path version; it does not reuse bearer or path IDs.
        ja: 特定経路版で対象が担う一つの役割を安定識別し、bearer・path の ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: role/F-12/source-W3
      source_claims:
        - claim-risk-flow-role-002
    - id: flow_id
      labels:
        zh: 所属风险路径标识
        en: owning risk-path ID
        ja: 所属リスク経路 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用使该角色成立的 SourceSinkFlow 逻辑身份；脱离该路径时角色不继续有效。
        en: Logical SourceSinkFlow identity that makes the role valid; the role does not remain valid outside that path.
        ja: この役割を成立させる SourceSinkFlow の論理同一性を参照し、その経路外では役割を継続しません。
      allowed_values: []
      pattern: null
      example_value: flow/F-12
      source_claims:
        - claim-risk-flow-role-003
    - id: bearer_ref
      labels:
        zh: 角色承担者引用
        en: role-bearer reference
        ja: 役割担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际承担来源或汇角色的消息、片段、工具输出、计划参数或其他对象。
        en: Reference to the message, span, tool output, plan argument, or other object actually bearing the source or sink role.
        ja: source・sink 役割を実際に担う message、span、tool output、plan argument 等の対象を参照します。
      allowed_values: []
      pattern: null
      example_value: span://web/W-3
      source_claims:
        - claim-risk-flow-role-004
    - id: bearer_type
      labels:
        zh: 承担者类型
        en: bearer type
        ja: 担体型
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录承担者在其所属模块中的真实概念类型，仅用于解析引用，不把该类型永久改写为风险源或风险汇。
        en: The bearer's true concept type in its owning module, used to resolve the reference without permanently retyping it as a risk source or sink.
        ja: 担体が所属 module で持つ実概念型を記録し、参照解決にだけ用い、恒久的に risk source・sink へ再型付けしません。
      allowed_values: []
      pattern: null
      example_value: TaintedSpan
      source_claims:
        - claim-risk-flow-role-005
    - id: bearer_version
      labels:
        zh: 承担者版本
        en: bearer version
        ja: 担体版
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在承担者可变时固定其版本、摘要或事件序列，避免角色漂移到后续修订。
        en: Version, digest, or event sequence fixing a mutable bearer so the role does not drift to a later revision.
        ja: 可変担体の版・digest・event sequence を固定し、役割が後続 revision へずれないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:web-W3-a21c
      source_claims:
        - claim-risk-flow-role-006
    - id: scope
      labels:
        zh: 角色作用域
        en: role scope
        ja: 役割 scope
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定角色有效的路径版本、会话、运行、任务和信任边界，必须与所属 SourceSinkFlow 一致。
        en: Path version, session, run, task, and trust boundary within which the role is valid; it must agree with its SourceSinkFlow.
        ja: 役割が有効な経路版、session、run、task、信頼境界を限定し、所属 SourceSinkFlow と一致させます。
      allowed_values: []
      pattern: null
      example_value:
        flow_version: "3"
        session_id: session-44
        run_id: run-12
      source_claims:
        - claim-risk-flow-role-007
    - id: valid_from
      labels:
        zh: 角色有效起点
        en: role valid from
        ja: 役割有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该承担者在该路径中开始具有此角色的 UTC 时间，不早于路径版本有效起点。
        en: UTC instant when the bearer begins to hold this role in the path, no earlier than the path version's validity start.
        ja: 担体が当該経路で役割を持ち始める UTC 時刻で、経路版の有効開始より前にはできません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:30:00.000Z
      source_claims:
        - claim-risk-flow-role-008
    - id: valid_until
      labels:
        zh: 角色有效终点
        en: role valid until
        ja: 役割有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 角色因路径修订、对象替换或复核而停止有效的 UTC 时间；仍有效时为空。
        en: UTC instant when a path revision, bearer replacement, or review ends the role assignment; absent while still valid.
        ja: 経路改訂、担体置換、審査で役割 assignment が終了する UTC 時刻で、なお有効なら空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-risk-flow-role-009
    - id: evidence_refs
      labels:
        zh: 角色证据引用
        en: role evidence references
        ja: 役割証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明承担者在该路径中作为源或汇参与的依赖边、传播记录、参数绑定或检测发现。
        en: References to dependency edges, propagation records, argument bindings, or findings proving that the bearer participates as source or sink in this path.
        ja: 担体が当該経路で source・sink として参加することを示す dependency edge、propagation record、argument binding、finding を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - edge/F12/W3-to-S4
      source_claims:
        - claim-risk-flow-role-010
  constraints:
    - id: risk-flow-role-requires-flow-and-bearer-binding
      severity: error
      expression_language: plain
      expression: flow_id and bearer_ref are present, scope agrees with the owning flow version, evidence_refs is non-empty, and valid_until is null or valid_until >= valid_from
      explanations:
        zh: 风险角色只有在具体路径、具体承担者、相同作用域和支持证据均明确时成立；对象类型、来源域或图上位置不能生成永久角色。
        en: A risk role exists only with a concrete path, bearer, matching scope, and supporting evidence. Object type, origin domain, or graph position cannot create a permanent role.
        ja: 具体経路、担体、一致 scope、支持証拠が明示された場合だけ役割が成立し、対象型、出所 domain、graph 位置から恒久役割を生成しません。
      source_claims:
        - claim-risk-flow-role-011
  required_relation_constraints: []
examples:
  - id: RiskFlowRole-manual-positive-20260714
    kind: positive
    labels:
      zh: 风险流角色正例
      en: Positive case for risk-flow role
      ja: リスクフロー役割の正例
    scenario_id: null
    descriptions:
      zh: 在流 F-12 中，网页片段 W-3 承担 RiskSource，工具调用计划 TP-2 承担 RiskSink；角色只对 F-12 有效。
      en: In flow F-12, webpage span W-3 bears RiskSource and tool plan TP-2 bears RiskSink; the roles are valid only for F-12.
      ja: 流 F-12 ではウェブ範囲 W-3 が RiskSource、ツール計画 TP-2 が RiskSink を担い、役割は F-12 にだけ有効です。
    field_values:
      role_id: role/F-12/source-W3
      flow_id: flow/F-12
      bearer_ref: span://web/W-3
      bearer_type: TaintedSpan
      bearer_version: sha256:web-W3-a21c
      scope:
        flow_version: "3"
        session_id: session-44
        run_id: run-12
      valid_from: 2026-07-14T10:30:00.000Z
      valid_until: null
      evidence_refs:
        - edge/F12/W3-to-S4
    related_node_ids:
      - RiskFlowRole
    related_relation_ids: []
    expected_result:
      zh: 验证器应把该记录识别为 RiskFlowRole，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as RiskFlowRole while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を RiskFlowRole と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含绑定到一条具体流、对象和作用域的来源或接收方角色实例。
      en: Includes source or sink role instances bound to a specific flow, object, and scope.
      ja: 特定の流、対象、作用域へ結び付いた出所または受け先の役割实例を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-flow-role-012
  - id: RiskFlowRole-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 风险流角色边界例
      en: Boundary case for risk-flow role
      ja: リスクフロー役割の境界例
    scenario_id: null
    descriptions:
      zh: ToolCallPlan 是一种计划信息，不因其类型自动成为 RiskSink；没有具体风险流就不能赋予 RiskFlowRole。
      en: A ToolCallPlan is plan information and is not automatically a RiskSink by type; no RiskFlowRole exists without a particular risk flow.
      ja: ToolCallPlan は計画情報であり型だけで RiskSink にはならず、具体的リスク流なしに RiskFlowRole は付与できません。
    field_values:
      role_id: null
      flow_id: null
      bearer_ref: tool-call-plan://TP-2
      bearer_type: ToolCallPlan
      bearer_version: sha256:tp2-19aa
      scope: null
      valid_from: null
      valid_until: null
      evidence_refs: []
    related_node_ids:
      - RiskFlowRole
    related_relation_ids: []
    expected_result:
      zh: 验证器不得把该记录归入 RiskFlowRole；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as RiskFlowRole; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を RiskFlowRole に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含对象本体、没有具体流上下文的永久标签或 SourceSinkFlow 记录。
      en: Excludes the bearer itself, permanent labels without a flow context, and the SourceSinkFlow record.
      ja: 役割担体そのもの、流文脈のない恒久ラベル、SourceSinkFlow 記録は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-flow-role-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: SourceSinkFlow-has_role-RiskFlowRole
  predicate: has_role
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 具有风险流角色
    en: has risk-flow role
    ja: リスクフロー役割を持つ
  definitions:
    zh: 一项 SourceSinkFlow 通过 has_role 声明在该流分析中承担端点职责的 RiskFlowRole；具体角色随后可细分为 RiskSource 或 RiskSink，该边不把任意安全参与者自动纳入某条流。
    en: A SourceSinkFlow has a RiskFlowRole that defines an endpoint responsibility within that particular flow analysis; the role may then specialize as RiskSource or RiskSink, and the edge does not attach every security participant to every flow.
    ja: SourceSinkFlow は当該フロー分析内の端点責務を定める RiskFlowRole を持ち、その役割は RiskSource または RiskSink に特殊化できます。任意の安全参加者をすべてのフローへ自動所属させません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 不同流记录可以声明多个来源、多个汇点或其他扩展角色，不能施加统一数量。
    en: Different flow records may declare multiple sources, multiple sinks, or extended roles, so one universal count is not imposed.
    ja: フロー記録ごとに複数の源・シンク・拡張役割を持ち得るため、一律の個数を課しません。
  inverse_reading:
    predicate: role_of_source_sink_flow
    labels:
      zh: 作为来源汇点流的角色
      en: role of source-sink flow
      ja: ソース・シンクフローの役割である
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: SourceSinkFlow-has_role-RiskFlowRole-example-positive-001
      kind: positive
      labels:
        zh: 链式工具流声明端点角色
        en: chained-tool flow declares endpoint roles
        ja: 連鎖ツールフローが端点役割を宣言する
      scenario_id: null
      descriptions:
        zh: flow-73 追踪恶意工具输出进入下游执行请求；它声明 output-origin 为 RiskSource、execution-input 为 RiskSink，两者都作为该流的 RiskFlowRole。
        en: flow-73 traces malicious tool output into a downstream execution request and declares output-origin as RiskSource and execution-input as RiskSink, both roles belonging to this flow.
        ja: flow-73 は悪性ツール出力から下流実行要求への経路を追跡し、output-origin を RiskSource、execution-input を RiskSink として当該フローの役割に宣言します。
      field_values: {}
      related_node_ids:
        - SourceSinkFlow
        - RiskFlowRole
        - RiskSource
        - RiskSink
      related_relation_ids:
        - SourceSinkFlow-has_role-RiskFlowRole
        - RiskSource-is_a-RiskFlowRole
        - RiskSink-is_a-RiskFlowRole
      expected_result:
        zh: 建立 flow-73 对两个角色实例的 has_role 事实，并由各实例的具体类型区分来源与汇点。
        en: Assert has_role from flow-73 to both role instances and distinguish source from sink through each instance's specific type.
        ja: flow-73 から二つの役割実体への has_role を記録し、各実体の具体型で源とシンクを区別します。
      why_valid_or_invalid:
        zh: 角色实例具有流内身份、端点引用和具体职责，并明确属于 flow-73。
        en: Each role instance has a flow-scoped identity, endpoint reference, concrete responsibility, and explicit membership in flow-73.
        ja: 各役割実体にフロー内同一性、端点参照、具体責務があり、flow-73 への所属が明示されています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-risk-flow-role-014
    - id: SourceSinkFlow-has_role-RiskFlowRole-example-boundary-001
      kind: boundary
      labels:
        zh: 全局标签不自动属于具体流
        en: global label does not automatically belong to a flow
        ja: 大域ラベルは特定フローへ自動所属しない
      scenario_id: null
      descriptions:
        zh: registry-item-9 被全局标记为可能的 RiskSource，但 flow-73 没有引用它，也没有从该对象出发的路径证据。
        en: registry-item-9 is globally tagged as a possible RiskSource, but flow-73 neither references it nor contains path evidence originating from it.
        ja: registry-item-9 は大域的に RiskSource 候補と標識されていますが、flow-73 は参照せず、そこから始まる経路証拠もありません。
      field_values: {}
      related_node_ids:
        - SourceSinkFlow
        - RiskFlowRole
      related_relation_ids:
        - SourceSinkFlow-has_role-RiskFlowRole
      expected_result:
        zh: 不得建立 flow-73 has_role registry-item-9；候选标签不证明流内成员关系。
        en: Do not assert flow-73 has_role registry-item-9; a candidate label does not prove flow-scoped membership.
        ja: flow-73 has_role registry-item-9 を記録しません。候補ラベルはフロー内所属を証明しません。
      why_valid_or_invalid:
        zh: 缺少该流对角色实例的引用与路径证据，无法确定具体组合关系。
        en: The flow contains neither a role-instance reference nor path evidence, so the composition fact cannot be established.
        ja: フローに役割実体参照も経路証拠もなく、構成関係を確定できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-risk-flow-role-015
  source_claims:
    - claim-risk-flow-role-016
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OWASP LLM01:2025、NIST AI 100-2e2025 与间接注入/污点跟踪研究逐项人工语义核验；定义、层次、关系与案例边界成立。
    en: Manually verified against OWASP LLM01:2025, NIST AI 100-2e2025, and indirect-injection/taint-tracking research; definitions, hierarchy, relations, and example boundaries hold.
    ja: OWASP LLM01:2025、NIST AI 100-2e2025、indirect-injection/taint-tracking research に照らし手動意味審査を完了しました。
  sections:
