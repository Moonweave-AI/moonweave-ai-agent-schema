schema: moonweave.ai/ontology-node/v1
id: RiskFlowRole
kind: concept
labels:
  zh: 风险流角色
  en: risk-flow role
  ja: リスクフロー役割
semantics:
  short_definition:
    zh: 在某条来源—接收方风险流中由对象承担的上下文角色。
    en: A context-dependent role borne by an object in a particular source-to-sink risk flow.
    ja: 特定の出所—受け先リスク流で対象が担う文脈依存役割。
  definition:
    zh: 风险流角色是一种角色，只在特定 SourceSinkFlow 内说明某对象充当风险来源或受保护接收方；同一对象在另一条流中可以不承担该角色或承担相反角色。它不是对象的固有类型，也不是流记录本身。
    en: A RiskFlowRole is a role that states, only within a particular SourceSinkFlow, that an object serves as a risk source or protected sink; the same object may bear no role or the opposite role in another flow. It is not the object's intrinsic type and not the flow record itself.
    ja: リスク流役割は、特定の SourceSinkFlow 内だけで対象がリスク出所または保護対象の受け先を担うことを示す役割です。同じ対象が別の流では役割を持たないか逆の役割を持てます。対象の固有型でも流記録そのものでもありません。
  why_needed:
    zh: 角色化避免把“工具输出永远是来源”或“记忆永远是接收方”写成错误的固定分类。
    en: Role modeling avoids false fixed classifications such as every tool output always being a source or memory always being a sink.
    ja: 「ツール出力は常に出所」「記憶は常に受け先」といった誤った固定分類を避けます。
  includes:
    - zh: 包含绑定到一条具体流、对象和作用域的来源或接收方角色实例。
      en: Includes source or sink role instances bound to a specific flow, object, and scope.
      ja: 特定の流、対象、作用域へ結び付いた出所または受け先の役割实例を含みます。
  excludes:
    - zh: 不包含对象本体、没有具体流上下文的永久标签或 SourceSinkFlow 记录。
      en: Excludes the bearer itself, permanent labels without a flow context, and the SourceSinkFlow record.
      ja: 役割担体そのもの、流文脈のない恒久ラベル、SourceSinkFlow 記録は含みません。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: RiskFlowRole 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: RiskFlowRole should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: RiskFlowRole は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-riskflowrole-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "RiskFlowRole/example" }'
      source_claims:
        - claim-riskflowrole-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 风险角色标识
        en: risk-role ID
        ja: リスク役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识某对象在一条具体路径版本中承担的一次角色，不复用对象或路径标识。
        en: Stable identifier for one role borne by an object in a particular path version; it does not reuse bearer or path IDs.
        ja: 特定経路版で対象が担う一つの役割を安定識別し、bearer・path の ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: role/F-12/source-W3
      source_claims:
        - claim-riskflowrole-design
    - id: flow_id
      labels:
        zh: 所属风险路径标识
        en: owning risk-path ID
        ja: 所属リスク経路 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用使该角色成立的 SourceSinkFlow 逻辑身份；脱离该路径时角色不继续有效。
        en: Logical SourceSinkFlow identity that makes the role valid; the role does not remain valid outside that path.
        ja: この役割を成立させる SourceSinkFlow の論理同一性を参照し、その経路外では役割を継続しません。
      allowed_values: []
      pattern: null
      example_value: flow/F-12
      source_claims:
        - claim-riskflowrole-design
    - id: bearer_ref
      labels:
        zh: 角色承担者引用
        en: role-bearer reference
        ja: 役割担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际承担来源或汇角色的消息、片段、工具输出、计划参数或其他对象。
        en: Reference to the message, span, tool output, plan argument, or other object actually bearing the source or sink role.
        ja: source・sink 役割を実際に担う message、span、tool output、plan argument 等の対象を参照します。
      allowed_values: []
      pattern: null
      example_value: span://web/W-3
      source_claims:
        - claim-riskflowrole-design
    - id: bearer_type
      labels:
        zh: 承担者类型
        en: bearer type
        ja: 担体型
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录承担者在其所属模块中的真实概念类型，仅用于解析引用，不把该类型永久改写为风险源或风险汇。
        en: The bearer's true concept type in its owning module, used to resolve the reference without permanently retyping it as a risk source or sink.
        ja: 担体が所属 module で持つ実概念型を記録し、参照解決にだけ用い、恒久的に risk source・sink へ再型付けしません。
      allowed_values: []
      pattern: null
      example_value: TaintedSpan
      source_claims:
        - claim-riskflowrole-design
    - id: bearer_version
      labels:
        zh: 承担者版本
        en: bearer version
        ja: 担体版
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在承担者可变时固定其版本、摘要或事件序列，避免角色漂移到后续修订。
        en: Version, digest, or event sequence fixing a mutable bearer so the role does not drift to a later revision.
        ja: 可変担体の版・digest・event sequence を固定し、役割が後続 revision へずれないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:web-W3-a21c
      source_claims:
        - claim-riskflowrole-design
    - id: scope
      labels:
        zh: 角色作用域
        en: role scope
        ja: 役割 scope
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定角色有效的路径版本、会话、运行、任务和信任边界，必须与所属 SourceSinkFlow 一致。
        en: Path version, session, run, task, and trust boundary within which the role is valid; it must agree with its SourceSinkFlow.
        ja: 役割が有効な経路版、session、run、task、信頼境界を限定し、所属 SourceSinkFlow と一致させます。
      allowed_values: []
      pattern: null
      example_value:
        flow_version: "3"
        session_id: session-44
        run_id: run-12
      source_claims:
        - claim-riskflowrole-design
    - id: valid_from
      labels:
        zh: 角色有效起点
        en: role valid from
        ja: 役割有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该承担者在该路径中开始具有此角色的 UTC 时间，不早于路径版本有效起点。
        en: UTC instant when the bearer begins to hold this role in the path, no earlier than the path version's validity start.
        ja: 担体が当該経路で役割を持ち始める UTC 時刻で、経路版の有効開始より前にはできません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:30:00.000Z
      source_claims:
        - claim-riskflowrole-design
    - id: valid_until
      labels:
        zh: 角色有效终点
        en: role valid until
        ja: 役割有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 角色因路径修订、对象替换或复核而停止有效的 UTC 时间；仍有效时为空。
        en: UTC instant when a path revision, bearer replacement, or review ends the role assignment; absent while still valid.
        ja: 経路改訂、担体置換、審査で役割 assignment が終了する UTC 時刻で、なお有効なら空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-riskflowrole-design
    - id: evidence_refs
      labels:
        zh: 角色证据引用
        en: role evidence references
        ja: 役割証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明承担者在该路径中作为源或汇参与的依赖边、传播记录、参数绑定或检测发现。
        en: References to dependency edges, propagation records, argument bindings, or findings proving that the bearer participates as source or sink in this path.
        ja: 担体が当該経路で source・sink として参加することを示す dependency edge、propagation record、argument binding、finding を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - edge/F12/W3-to-S4
      source_claims:
        - claim-riskflowrole-design
  constraints:
    - id: risk-flow-role-requires-flow-and-bearer-binding
      severity: error
      expression_language: plain
      expression: flow_id and bearer_ref are present, scope agrees with the owning flow version, evidence_refs is non-empty, and valid_until is null or valid_until >= valid_from
      explanations:
        zh: 风险角色只有在具体路径、具体承担者、相同作用域和支持证据均明确时成立；对象类型、来源域或图上位置不能生成永久角色。
        en: A risk role exists only with a concrete path, bearer, matching scope, and supporting evidence. Object type, origin domain, or graph position cannot create a permanent role.
        ja: 具体経路、担体、一致 scope、支持証拠が明示された場合だけ役割が成立し、対象型、出所 domain、graph 位置から恒久役割を生成しません。
      source_claims:
        - claim-riskflowrole-design
  required_relation_constraints: []
