parent_relation:
  id: SourceSinkFlow-has_role-RiskFlowRole
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有风险流角色
    en: has risk-flow role
    ja: リスクフロー役割を持つ
  definitions:
    zh: 一项 SourceSinkFlow 通过 has_role 声明在该流分析中承担端点职责的 RiskFlowRole；具体角色随后可细分为 RiskSource 或 RiskSink，该边不把任意安全参与者自动纳入某条流。
    en: A SourceSinkFlow has a RiskFlowRole that defines an endpoint responsibility within that particular flow analysis; the role may then specialize as RiskSource or RiskSink, and the edge does not attach every security participant to every flow.
    ja: SourceSinkFlow は当該フロー分析内の端点責務を定める RiskFlowRole を持ち、その役割は RiskSource または RiskSink に特殊化できます。任意の安全参加者をすべてのフローへ自動所属させません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 不同流记录可以声明多个来源、多个汇点或其他扩展角色，不能施加统一数量。
    en: Different flow records may declare multiple sources, multiple sinks, or extended roles, so one universal count is not imposed.
    ja: フロー記録ごとに複数の源・シンク・拡張役割を持ち得るため、一律の個数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 作为来源汇点流的角色
      en: role of source-sink flow
      ja: ソース・シンクフローの役割である
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-riskflowrole-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: parent-to-child
relations: []
