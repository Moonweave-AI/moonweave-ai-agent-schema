    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-risk-flow-role-001
    source: eng-security-mcp-nsa-2026
    supports: NSA treats each output as untrusted input to the next pipeline phase and describes chained processes where content changes operational position; Moonweave therefore models source and sink as flow-scoped roles.
    locator: Recommendations > Filter and monitor output pipelines and chained execution, pp. 11–12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-flow-role-002
    source: eng-ont-prov-o
    supports: PROV-O qualified associations identify a role-bearing relation separately from the Agent and Activity endpoints. Moonweave similarly assigns a stable identity to the scoped risk role.
    locator: PROV-O Recommendation > §5.3.6 qualifiedAssociation and prov:hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-flow-role-003
    source: eng-security-mcp-nsa-2026
    supports: NSA describes content changing security position as it passes through chained components. Moonweave binds each source or sink role to the particular path where that position applies.
    locator: NSA MCP Security Design Considerations > Poisoning output for downstream automation, p. 8; chained pipelines, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-flow-role-004
    source: eng-ont-prov-o
    supports: PROV-O qualification keeps an endpoint Entity or Agent distinct from the role it bears in a relation. Moonweave therefore records the exact bearer reference rather than inventing a permanent bearer type.
    locator: PROV-O Recommendation > §5.3 Qualification patterns and prov:hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-flow-role-005
    source: eng-security-mcp-nsa-2026
    supports: NSA lists heterogeneous possible influence carriers—messages, tool output, shared context, and remote artifacts. Moonweave preserves each bearer's native type while assigning a scoped risk role.
