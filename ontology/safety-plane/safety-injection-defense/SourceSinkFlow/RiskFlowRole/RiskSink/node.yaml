source_claims:
  - id: claim-risk-sink-001
    source: eng-security-mcp-nsa-2026
    supports: NSA requires validation of every tool invocation against schemas, ranges, and execution context and treats tool execution as high risk; these protected decision points motivate the RiskSink role.
    locator: Recommendations > Validate parameters and Constrain and sandbox tool execution, pp. 10–11
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-sink-002
    source: eng-ont-prov-o
    supports: PROV-O qualification separates a role occurrence from its bearer. Moonweave specializes that scoped identity as a risk sink without changing the bearer's native class.
    locator: PROV-O Recommendation > §5.3 Qualification pattern and prov:hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-sink-003
    source: eng-security-mcp-nsa-2026
    supports: NSA treats tool invocation and privileged downstream execution as high-risk operations requiring parameter validation and constrained execution. Moonweave references that concrete operation as the sink consequence point.
    locator: NSA MCP Security Design Considerations > Recommendations > Validate parameters and Constrain and sandbox tool execution, pp. 10-11
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-sink-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends least privilege and explicit authorization for each protected resource reached through MCP tools. Moonweave records the resource whose consequence creates sink status.
    locator: NSA MCP Security Design Considerations > Recommendations > Enforce authorization and least privilege, pp. 9-11
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-sink-005
    source: eng-proto-mcp-2025-spec
    supports: MCP tools/call carries a structured arguments object validated against a tool input schema. Moonweave locates the specific argument that receives influenced content.
    locator: MCP 2025-11-25 Specification > Server Features > Tools > Calling tools and arguments
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-sink-006
    source: lit-agent-vigil-siren
    supports: VIGIL enforces intent-grounded verification before committing a tool-mediated action. Moonweave records the pre-consequence control point associated with a risk sink.
    locator: VIGIL (ACL 2026) > §4 Verify-Before-Commit protocol
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-sink-007
    source: eng-security-owasp-llm01-2025
