schema: moonweave.ai/ontology-node/v1
id: RiskSink
kind: concept
status: accepted
labels:
  en: risk sink
  zh: 风险汇点
  ja: リスクシンク
semantics:
  short_definition:
    zh: 在特定风险流中可能被污点影响并产生受保护后果的接收方角色。
    en: The sink role in a particular risk flow whose bearer may be influenced and produce a protected consequence.
    ja: 特定リスク流で汚染の影響を受け、保護すべき結果を生み得る受け先役割。
  definition:
    zh: 风险汇点是一种 RiskFlowRole，标明某对象在一条 SourceSinkFlow 中是污点可能影响的受保护目的地，例如工具参数、网络请求、文件写入、记忆更新或对外披露。它不是这些对象的固有类别，也不表示影响已经发生。
    en: A RiskSink is a RiskFlowRole marking an object as the protected destination that taint may influence in one SourceSinkFlow, such as tool arguments, a network request, file write, memory update, or external disclosure. It is not an intrinsic class of those objects and does not assert that influence occurred.
    ja: リスク受け先は、一つの SourceSinkFlow で汚染が影響し得る保護対象、例えばツール引数、ネットワーク要求、ファイル書込、記憶更新、外部開示を示す RiskFlowRole です。それら対象の固有分類ではなく、影響発生も主張しません。
  why_needed:
    zh: 明确潜在后果位置，才能在执行或披露前放置审批、校验和最小权限控制。
    en: Naming the consequence point lets approval, validation, and least-privilege controls be placed before execution or disclosure.
    ja: 潜在結果点を明示することで、実行・開示前に承認、検証、最小権限制御を置けます。
  includes:
    - zh: 包含绑定到具体流和受保护操作的接收方角色。
      en: Includes sink roles bound to a specific flow and protected operation.
      ja: 具体的流と保護対象操作へ結び付いた受け先役割を含みます。
  excludes:
    - zh: 不包含仅接收普通数据且没有声明风险路径的端点，也不包含实际副作用。
      en: Excludes endpoints merely receiving ordinary data without a declared risk path and the actual side effect.
      ja: 宣言されたリスク経路なしに通常データを受ける端点や、実際の副作用は含みません。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 风险汇角色标识
        en: risk-sink role ID
        ja: リスクシンク役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识某受保护对象在一条具体路径中作为风险汇点的角色实例，并继承通用角色绑定。
        en: Identifier of the role instance in which one protected object serves as RiskSink in a particular path, inheriting the general role binding.
        ja: 保護対象が特定経路で RiskSink を担う役割 instance を識別し、一般役割 binding を継承します。
      allowed_values: []
      pattern: null
      example_value: role/F-12/sink-transfer-amount
      source_claims:
        - claim-risk-sink-002
    - id: protected_operation_ref
      labels:
        zh: 受保护操作引用
        en: protected-operation reference
        ja: 保護操作参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用可能消耗受影响数据并产生工具调用、网络访问、写入、更新或披露后果的操作。
        en: Reference to the operation that may consume influenced data and cause tool invocation, network access, write, update, or disclosure consequences.
        ja: 影響データを消費し、tool call、network access、write、update、disclosure の結果を起こし得る操作を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-call-plan://transfer_funds/F12
      source_claims:
        - claim-risk-sink-003
    - id: protected_resource_ref
      labels:
        zh: 受保护资源引用
        en: protected-resource reference
        ja: 保護資源参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向操作可能影响的账户、文件、网络端点、记忆存储或披露受众，明确需要保护的对象。
        en: Reference to the account, file, network endpoint, memory store, or disclosure audience the operation may affect, making the protected object explicit.
        ja: 操作が影響し得る account、file、network endpoint、memory store、disclosure audience を参照し、保護対象を明示します。
      allowed_values: []
      pattern: null
      example_value: account://treasury/settlement-4
      source_claims:
        - claim-risk-sink-004
    - id: argument_locator
      labels:
        zh: 受影响参数位置
        en: affected argument locator
        ja: 影響引数 locator
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当风险汇是操作参数时，用 JSON Pointer 或等价路径定位受上游影响的具体参数；整项操作为汇点时可为空。
        en: JSON Pointer or equivalent locating the argument influenced upstream when the sink is an operation parameter; absent when the whole operation is the sink.
        ja: sink が操作引数なら上流影響を受ける引数を JSON Pointer 等で位置付け、操作全体が sink なら空にできます。
      allowed_values: []
      pattern: null
      example_value: /arguments/amount
      source_claims:
        - claim-risk-sink-005
    - id: control_point
      labels:
        zh: 控制点
        en: control point
        ja: 制御点
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在副作用或披露发生前可执行审批、验证、隔离或拒绝的具体门控位置。
        en: Reference to the concrete gate before side effect or disclosure where approval, validation, quarantine, or refusal can execute.
        ja: 副作用・開示前に approval、validation、quarantine、refusal を実行できる具体的 gate を参照します。
      allowed_values: []
      pattern: null
      example_value: gate://transfer_funds/pre-invocation
      source_claims:
        - claim-risk-sink-006
    - id: impact_class
      labels:
        zh: 潜在影响类别
        en: potential impact class
        ja: 潜在影響区分
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录若上游影响到达该汇点可能产生的后果类别，例如资金转移、数据外传、文件写入或持久记忆污染。
        en: Consequence category if upstream influence reaches the sink, such as funds transfer, data exfiltration, file write, or persistent-memory contamination.
        ja: 上流影響が sink に届いた場合の結果区分、例として資金移動、data exfiltration、file write、persistent memory 汚染を記録します。
      allowed_values: []
      pattern: null
      example_value: unauthorized-funds-transfer
      source_claims:
        - claim-risk-sink-007
  constraints:
    - id: risk-sink-requires-protected-consequence-and-upstream-path
      severity: error
      expression_language: plain
      expression: role_id inherits one scoped RiskFlowRole, protected_operation_ref and protected_resource_ref are present, and the owning flow contains an evidenced upstream path to this sink
      explanations:
        zh: 风险汇点必须属于具体路径并指向受保护操作、资源和可执行控制点；普通接收数据、没有上游风险路径或仅存在副作用能力都不足以建立角色。
        en: RiskSink must belong to a concrete path and identify a protected operation, resource, and enforceable control point. Receiving ordinary data, lacking an upstream risk path, or merely being capable of side effects is insufficient.
        ja: RiskSink は具体経路に属し、保護操作・資源・実行可能制御点を示す必要があります。通常データ受信、上流リスク経路欠如、副作用能力だけでは役割を成立させません。
      source_claims:
        - claim-risk-sink-008
  required_relation_constraints: []
examples:
  - id: RiskSink-manual-positive-20260714
    kind: positive
    labels:
      zh: 风险接收方正例
      en: Positive case for risk sink
      ja: リスク受信先の正例
    scenario_id: null
    descriptions:
      zh: 在 F-12 中，transfer_funds 的 amount 参数是受网页污点影响的 RiskSink，审批门放在调用前。
      en: In F-12, the amount argument of transfer_funds is the RiskSink influenced by webpage taint, and an approval gate is placed before invocation.
      ja: F-12 で transfer_funds の amount 引数がウェブ汚染の影響を受ける RiskSink となり、呼出し前に承認ゲートを置きます。
    field_values:
      flow_id: flow/F-12
      bearer_ref: tool-call-plan://transfer_funds/F12#/arguments/amount
      bearer_type: ToolArgument
      scope:
        flow_version: "1"
        run_id: run/F-12
      valid_from: 2026-07-14T10:30:00.000Z
      evidence_refs:
        - edge/F12/web-taint-to-transfer-amount
      role_id: role/F-12/sink-transfer-amount
      protected_operation_ref: tool-call-plan://transfer_funds/F12
      protected_resource_ref: account://treasury/settlement-4
      argument_locator: /arguments/amount
      control_point: gate://transfer_funds/pre-invocation
      impact_class: unauthorized-funds-transfer
    related_node_ids:
      - RiskSink
      - RiskFlowRole
    related_relation_ids:
      - RiskSink-is_a-RiskFlowRole
    expected_result:
      zh: 验证器应把该记录识别为 RiskSink，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as RiskSink while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を RiskSink と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含绑定到具体流和受保护操作的接收方角色。
      en: Includes sink roles bound to a specific flow and protected operation.
      ja: 具体的流と保護対象操作へ結び付いた受け先役割を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-sink-009
  - id: RiskSink-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 风险接收方边界例
      en: Boundary case for risk sink
      ja: リスク受信先の境界例
    scenario_id: null
    descriptions:
      zh: 同一 amount 参数在人工固定值的另一条流中没有不可信上游，因此不承担 RiskSink 角色。
      en: The same amount argument is human-fixed in another flow with no untrusted upstream, so it does not bear RiskSink there.
      ja: 同じ amount 引数でも別の流で人が固定し不信頼上流がなければ、その流では RiskSink を担いません。
    field_values:
      role_id: null
      protected_operation_ref: tool-call-plan://transfer_funds/F13
      protected_resource_ref: account://treasury/settlement-4
      argument_locator: /arguments/amount
      control_point: gate://transfer_funds/pre-invocation
      impact_class: null
    related_node_ids:
      - RiskSink
      - RiskFlowRole
    related_relation_ids:
      - RiskSink-is_a-RiskFlowRole
    expected_result:
      zh: 验证器不得把该记录归入 RiskSink；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as RiskSink; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を RiskSink に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含仅接收普通数据且没有声明风险路径的端点，也不包含实际副作用。
      en: Excludes endpoints merely receiving ordinary data without a declared risk path and the actual side effect.
      ja: 宣言されたリスク経路なしに通常データを受ける端点や、実際の副作用は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-sink-010
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: RiskSource
    shared_parent_concept_id: RiskFlowRole
    differentia:
      zh: 共享父节点对照：父节点 RiskFlowRole：RiskSink（semantic kind=role，骨架 RiskSink-is_a-RiskFlowRole）；RiskSource（semantic kind=role，骨架 RiskSource-is_a-RiskFlowRole）。双端条件：RiskSink 条件：“风险接收方属于风险流角色，区别于其他同类对象的条件是：它分类污点内容可能影响的受保护目标，例如工具调用、带凭据请求、文件写入、记忆更新、网络调用或最终披露”；RiskSource 条件：“风险来源属于风险流角色，区别于其他同类对象的条件是：它分类安全风险的起点，例如外部消息、检索文档、工具输出、远程智能体产物、记忆项、网络响应或用户提供文件”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent RiskFlowRole: RiskSink (semantic kind=role, backbone RiskSink-is_a-RiskFlowRole); RiskSource (semantic kind=role, backbone RiskSource-is_a-RiskFlowRole). Endpoint conditions: RiskSink condition: “Risk sink is a risk-flow role whose defining condition is that it classifies the protected destination that tainted content may influence, such as tool invocation, credentialed request, filesystem write, memory update, network call, or final disclosure”; RiskSource condition: “Risk source is a risk-flow role whose defining condition is that it classifies the origin of a safety risk, such as external message, retrieved document, tool output, remote agent artifact, memory item, network response, or user-supplied file”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 RiskFlowRole：RiskSink（semantic kind=role、バックボーン RiskSink-is_a-RiskFlowRole）；RiskSource（semantic kind=role、バックボーン RiskSource-is_a-RiskFlowRole）。両端条件：RiskSink の条件：「リスク受信先はリスクフロー役割のうち、次の事実を定義条件とする対象です：それは、汚染内容が影響し得る保護対象、たとえばツール呼び出し、資格情報付き要求、ファイル書き込み、メモリ更新、ネットワーク呼び出し、最終開示を分類します」；RiskSource の条件：「リスク送信元はリスクフロー役割のうち、次の事実を定義条件とする対象です：それは、外部メッセージ、検索文書、ツール出力、遠隔エージェント成果物、メモリ項目、ネットワーク応答、ユーザー提供ファイルなど、安全リスクの起点を分類します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-risk-sink-011
parent_relation:
  id: RiskSink-is_a-RiskFlowRole
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 风险接收方 是一种 风险流角色。区分特征：风险汇是受保护目的对象在 source-sink 分析中承担的角色，而非固定实体类型。
    en: "risk sink is a kind of risk-flow role. Reviewed differentia: RiskSink is the role a protected destination bears in source-to-sink analysis, not a fixed entity type."
    ja: リスク受信先 は リスクフロー役割 の一種です。審査済みの種差：RiskSink は source-sink 分析で保護対象が担う役割で、固定実体型ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
