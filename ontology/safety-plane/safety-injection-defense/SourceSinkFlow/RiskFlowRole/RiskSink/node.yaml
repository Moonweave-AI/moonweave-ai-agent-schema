schema: moonweave.ai/ontology-node/v1
id: RiskSink
kind: concept
labels:
  en: risk sink
  zh: 风险汇点
  ja: リスクシンク
semantics:
  short_definition:
    zh: 在特定风险流中可能被污点影响并产生受保护后果的接收方角色。
    en: The sink role in a particular risk flow whose bearer may be influenced and produce a protected consequence.
    ja: 特定リスク流で汚染の影響を受け、保護すべき結果を生み得る受け先役割。
  definition:
    zh: 风险汇点是一种 RiskFlowRole，标明某对象在一条 SourceSinkFlow 中是污点可能影响的受保护目的地，例如工具参数、网络请求、文件写入、记忆更新或对外披露。它不是这些对象的固有类别，也不表示影响已经发生。
    en: A RiskSink is a RiskFlowRole marking an object as the protected destination that taint may influence in one SourceSinkFlow, such as tool arguments, a network request, file write, memory update, or external disclosure. It is not an intrinsic class of those objects and does not assert that influence occurred.
    ja: リスク受け先は、一つの SourceSinkFlow で汚染が影響し得る保護対象、例えばツール引数、ネットワーク要求、ファイル書込、記憶更新、外部開示を示す RiskFlowRole です。それら対象の固有分類ではなく、影響発生も主張しません。
  why_needed:
    zh: 明确潜在后果位置，才能在执行或披露前放置审批、校验和最小权限控制。
    en: Naming the consequence point lets approval, validation, and least-privilege controls be placed before execution or disclosure.
    ja: 潜在結果点を明示することで、実行・開示前に承認、検証、最小権限制御を置けます。
  includes:
    - zh: 包含绑定到具体流和受保护操作的接收方角色。
      en: Includes sink roles bound to a specific flow and protected operation.
      ja: 具体的流と保護対象操作へ結び付いた受け先役割を含みます。
  excludes:
    - zh: 不包含仅接收普通数据且没有声明风险路径的端点，也不包含实际副作用。
      en: Excludes endpoints merely receiving ordinary data without a declared risk path and the actual side effect.
      ja: 宣言されたリスク経路なしに通常データを受ける端点や、実際の副作用は含みません。
  semantic_kind: role
  aliases: []
engineering:
  explanation:
    zh: RiskSink 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: RiskSink should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: RiskSink は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-risksink-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "RiskSink/example" }'
      source_claims:
        - claim-risksink-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 风险汇角色标识
        en: risk-sink role ID
        ja: リスクシンク役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识某受保护对象在一条具体路径中作为风险汇点的角色实例，并继承通用角色绑定。
        en: Identifier of the role instance in which one protected object serves as RiskSink in a particular path, inheriting the general role binding.
        ja: 保護対象が特定経路で RiskSink を担う役割 instance を識別し、一般役割 binding を継承します。
      allowed_values: []
      pattern: null
      example_value: role/F-12/sink-transfer-amount
      source_claims:
        - claim-risksink-design
    - id: protected_operation_ref
      labels:
        zh: 受保护操作引用
        en: protected-operation reference
        ja: 保護操作参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用可能消耗受影响数据并产生工具调用、网络访问、写入、更新或披露后果的操作。
        en: Reference to the operation that may consume influenced data and cause tool invocation, network access, write, update, or disclosure consequences.
        ja: 影響データを消費し、tool call、network access、write、update、disclosure の結果を起こし得る操作を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-call-plan://transfer_funds/F12
      source_claims:
        - claim-risksink-design
    - id: protected_resource_ref
      labels:
        zh: 受保护资源引用
        en: protected-resource reference
        ja: 保護資源参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向操作可能影响的账户、文件、网络端点、记忆存储或披露受众，明确需要保护的对象。
        en: Reference to the account, file, network endpoint, memory store, or disclosure audience the operation may affect, making the protected object explicit.
        ja: 操作が影響し得る account、file、network endpoint、memory store、disclosure audience を参照し、保護対象を明示します。
      allowed_values: []
      pattern: null
      example_value: account://treasury/settlement-4
      source_claims:
        - claim-risksink-design
    - id: argument_locator
      labels:
        zh: 受影响参数位置
        en: affected argument locator
        ja: 影響引数 locator
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当风险汇是操作参数时，用 JSON Pointer 或等价路径定位受上游影响的具体参数；整项操作为汇点时可为空。
        en: JSON Pointer or equivalent locating the argument influenced upstream when the sink is an operation parameter; absent when the whole operation is the sink.
        ja: sink が操作引数なら上流影響を受ける引数を JSON Pointer 等で位置付け、操作全体が sink なら空にできます。
      allowed_values: []
      pattern: null
      example_value: /arguments/amount
      source_claims:
        - claim-risksink-design
    - id: control_point
      labels:
        zh: 控制点
        en: control point
        ja: 制御点
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在副作用或披露发生前可执行审批、验证、隔离或拒绝的具体门控位置。
        en: Reference to the concrete gate before side effect or disclosure where approval, validation, quarantine, or refusal can execute.
        ja: 副作用・開示前に approval、validation、quarantine、refusal を実行できる具体的 gate を参照します。
      allowed_values: []
      pattern: null
      example_value: gate://transfer_funds/pre-invocation
      source_claims:
        - claim-risksink-design
    - id: impact_class
      labels:
        zh: 潜在影响类别
        en: potential impact class
        ja: 潜在影響区分
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录若上游影响到达该汇点可能产生的后果类别，例如资金转移、数据外传、文件写入或持久记忆污染。
        en: Consequence category if upstream influence reaches the sink, such as funds transfer, data exfiltration, file write, or persistent-memory contamination.
        ja: 上流影響が sink に届いた場合の結果区分、例として資金移動、data exfiltration、file write、persistent memory 汚染を記録します。
      allowed_values: []
      pattern: null
      example_value: unauthorized-funds-transfer
      source_claims:
        - claim-risksink-design
  constraints:
    - id: risk-sink-requires-protected-consequence-and-upstream-path
      severity: error
      expression_language: plain
      expression: role_id inherits one scoped RiskFlowRole, protected_operation_ref and protected_resource_ref are present, and the owning flow contains an evidenced upstream path to this sink
      explanations:
        zh: 风险汇点必须属于具体路径并指向受保护操作、资源和可执行控制点；普通接收数据、没有上游风险路径或仅存在副作用能力都不足以建立角色。
        en: RiskSink must belong to a concrete path and identify a protected operation, resource, and enforceable control point. Receiving ordinary data, lacking an upstream risk path, or merely being capable of side effects is insufficient.
        ja: RiskSink は具体経路に属し、保護操作・資源・実行可能制御点を示す必要があります。通常データ受信、上流リスク経路欠如、副作用能力だけでは役割を成立させません。
      source_claims:
        - claim-risksink-design
  required_relation_constraints: []
