      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 在“工具输出→模型→外部 HTTP 调用”的流分析中，外部 HTTP 调用点承担 RiskSink 角色。
        en: In a ‘tool output → model → external HTTP call’ flow analysis, the external HTTP invocation point bears the RiskSink role.
        ja: 「ツール出力→モデル→外部 HTTP 呼出し」のフロー分析で、外部 HTTP 呼出し点が RiskSink 役割を担います。
      field_values: {}
      related_node_ids:
        - RiskSink
        - RiskFlowRole
      related_relation_ids:
        - RiskSink-is_a-RiskFlowRole
      expected_result:
        zh: 把该调用点在此流中的角色分类为 RiskSink 和 RiskFlowRole。
        en: Classify that invocation point's role in this flow as RiskSink and RiskFlowRole.
        ja: このフローにおける呼出し点の役割を RiskSink かつ RiskFlowRole と分類します。
      why_valid_or_invalid:
        zh: 该位置是受不可信信息影响后可能产生外部副作用的受保护目的点。
        en: The position is a protected destination where influence from untrusted information can produce an external side effect.
        ja: 不信情報の影響が外部副作用を生じ得る保護対象の目的点です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-risk-sink-012
    - id: RiskSink-is_a-RiskFlowRole-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 系统注册表包含一个 ShellTool 定义，但当前分析的流没有到达或调用它。
        en: The system registry contains a ShellTool definition, but the analyzed flow neither reaches nor invokes it.
        ja: システム登録簿に ShellTool 定義がありますが、分析対象フローはそこへ到達も呼出しもしません。
      field_values: {}
      related_node_ids:
        - RiskSink
        - RiskFlowRole
      related_relation_ids:
        - RiskSink-is_a-RiskFlowRole
      expected_result:
        zh: 不得把该工具永久分类为 RiskSink。
        en: Do not permanently classify the tool as RiskSink.
        ja: そのツールを恒久的に RiskSink と分類してはいけません。
      why_valid_or_invalid:
        zh: RiskSink 是特定流中的角色，不是因工具具有副作用能力而形成的固定实体类型。
        en: RiskSink is a role in a particular flow, not a fixed entity type created merely by a tool's side-effect capability.
        ja: RiskSink は特定フロー上の役割であり、ツールの副作用能力だけで決まる固定実体型ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-risk-sink-012
  source_claims:
    - claim-risk-sink-012
  distinct_fact_rationale: null
