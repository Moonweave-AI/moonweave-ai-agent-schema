source_claims:
  - id: claim-risk-source-001
    source: eng-security-mcp-nsa-2026
    supports: NSA states that data from user-facing plugins must not be blindly accepted by privileged models and that components occupy distinct trust zones; Moonweave assigns source status within a concrete flow.
    locator: Recommendations > Design for boundaries, pp. 9–10; user-facing plugin data
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-source-002
    source: eng-ont-prov-o
    supports: PROV-O qualified relations distinguish a role occurrence from its bearer. Moonweave specializes that scoped role identity as a risk source without retyping the bearer.
    locator: PROV-O Recommendation > §5.3 Qualification pattern and prov:hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-source-003
    source: eng-security-mcp-nsa-2026
    supports: NSA distinguishes untrusted user-facing or external data from confirmed malicious behavior while requiring explicit trust boundaries. Moonweave records which basis justified the source role.
    locator: NSA MCP Security Design Considerations > Recommendations > Design for boundaries, pp. 9-10; output pipeline monitoring, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-source-004
    source: eng-security-owasp-llm01-2025
    supports: OWASP locates indirect prompt injection in specific external inputs such as websites and files. Moonweave references the exact object that enters the reviewed influence path.
    locator: OWASP LLM01:2025 > Types of Prompt Injection Vulnerabilities > Indirect Prompt Injections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-risk-source-005
