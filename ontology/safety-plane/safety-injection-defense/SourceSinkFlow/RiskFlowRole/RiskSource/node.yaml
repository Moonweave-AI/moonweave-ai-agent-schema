      descriptions:
        zh: 在一次外泄路径分析中，含隐藏指令的第三方工具输出承担 RiskSource 角色。
        en: In an exfiltration-path analysis, a third-party tool output containing hidden instructions bears the RiskSource role.
        ja: 情報流出経路分析で、隠し指示を含む第三者ツール出力が RiskSource 役割を担います。
      field_values: {}
      related_node_ids:
