source_claims:
  - id: claim-risk-source-001
    source: eng-security-mcp-nsa-2026
    supports: NSA states that data from user-facing plugins must not be blindly accepted by privileged models and that components occupy distinct trust zones; Moonweave assigns source status within a concrete flow.
    locator: Recommendations > Design for boundaries, pp. 9–10; user-facing plugin data
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-002
    source: eng-ont-prov-o
    supports: PROV-O qualified relations distinguish a role occurrence from its bearer. Moonweave specializes that scoped role identity as a risk source without retyping the bearer.
    locator: PROV-O Recommendation > §5.3 Qualification pattern and prov:hadRole
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-003
    source: eng-security-mcp-nsa-2026
    supports: NSA distinguishes untrusted user-facing or external data from confirmed malicious behavior while requiring explicit trust boundaries. Moonweave records which basis justified the source role.
    locator: NSA MCP Security Design Considerations > Recommendations > Design for boundaries, pp. 9-10; output pipeline monitoring, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-004
    source: eng-security-owasp-llm01-2025
    supports: OWASP locates indirect prompt injection in specific external inputs such as websites and files. Moonweave references the exact object that enters the reviewed influence path.
    locator: OWASP LLM01:2025 > Types of Prompt Injection Vulnerabilities > Indirect Prompt Injections
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-005
    source: lit-security-ipiguard
    supports: IPIGuard reasons over tool dependency edges to identify where indirect prompt-injection influence enters a tool path. Moonweave records the concrete entry edge rather than inferring source status from origin alone.
    locator: IPIGuard (EMNLP 2025) > Tool Dependency Graph construction and source dependency analysis
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-risk-source-006
    source: eng-security-mcp-nsa-2026
    supports: NSA instructs systems to treat external outputs as untrusted at boundaries while tracing their downstream use. Moonweave therefore requires an actual path-entry edge, not origin-based permanent typing.
    locator: NSA MCP Security Design Considerations > Design for boundaries, pp. 9-10; Filter and monitor output pipelines, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-007
    source: eng-security-mcp-nsa-2026
    supports: "NSA states that data from user-facing plugins must not be blindly accepted by privileged models and that components occupy distinct trust zones; Moonweave assigns source status within a concrete flow. The positive case specifically tests this distinction: A hidden paragraph in an external PDF supplies text to an email-send argument in F-20 and therefore bears RiskSource in that flow."
    locator: Recommendations > Design for boundaries, pp. 9–10; user-facing plugin data
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-008
    source: eng-security-mcp-nsa-2026
    supports: "NSA states that data from user-facing plugins must not be blindly accepted by privileged models and that components occupy distinct trust zones; Moonweave assigns source status within a concrete flow. The boundary case specifically tests this distinction: The same PDF is only hashed in a quarantine-forensics flow and its content enters no decision; it does not bear RiskSource in that flow."
    locator: Recommendations > Design for boundaries, pp. 9–10; user-facing plugin data
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-009
    source: eng-security-mcp-nsa-2026
    supports: NSA describes manipulated tool metadata, hidden instructions, compromised outputs, and shared context as origins that propagate influence into later agents and actions. Moonweave assigns RiskSource to the origin role in one SourceSinkFlow and RiskSink to the protected destination role; reversing those roles would reverse the documented propagation direction. NSA does not define these ontology IDs.
    locator: Examples of real-world MCP security issues > semantic and tool poisoning (pp. 9-10); Recommendations > Filter and monitor output pipelines and chained execution (pp. 12-13)
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-risk-source-010
    source: eng-security-mcp-nsa-2026
    supports: NSA describes tool outputs and shared context as untrusted inputs that can initiate cascading manipulation. Moonweave represents the occurrence-specific origin position in a source-to-sink analysis as RiskSource, a RiskFlowRole.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–10, ‘Poisoning output for downstream automation’
    evidence_kind: design-inference
    confidence: high
    review_status: pending
