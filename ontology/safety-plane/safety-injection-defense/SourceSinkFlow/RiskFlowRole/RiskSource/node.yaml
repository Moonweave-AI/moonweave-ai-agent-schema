    en: is a
    ja: の一種である
  definitions:
    zh: 风险来源 是一种 风险流角色。区分特征：风险源是外部消息、工具输出或记忆项在具体流中承担的来源角色。
    en: "risk source is a kind of risk-flow role. Reviewed differentia: RiskSource is the source role borne by an external message, tool output, or memory item in a particular flow."
    ja: リスク送信元 は リスクフロー役割 の一種です。審査済みの種差：RiskSource は特定フローで外部メッセージ・ツール出力・記憶項目が担う起点役割です。
  cardinality: null
  cardinality_not_applicable_reason:
