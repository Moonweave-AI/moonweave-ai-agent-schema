      - claim-risk-source-001
  - id: risk-source-cve_email_assistant
    labels:
      zh: 风险源 - CVE-2024-5184 邮件助手
      en: risk source - CVE-2024-5184 email assistant
      ja: リスク源 - CVE-2024-5184 メール assistant
    descriptions: {zh: "风险源(RiskSource) [RiskSource]: 在特定风险流中提供不可信或受污染影响的来源角色。. OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。 Fields: source_basis, entry_step_ref, bearer_ref.", en: "risk source (RiskSource) [RiskSource]: The source role in a particular risk flow whose bearer supplies untrusted or contaminated influence.. OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content. Fields include source_basis, entry_step_ref, bearer_ref.", ja: "リスク源(RiskSource) [RiskSource]: 特定リスク流で不信頼または汚染された影響を供給する出所役割。. OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。 Fields: source_basis, entry_step_ref, bearer_ref."}
    field_values:
