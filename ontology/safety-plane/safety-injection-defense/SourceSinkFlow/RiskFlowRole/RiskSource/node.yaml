      descriptions:
        zh: 同一工具输出经过完整性验证且未进入当前分析的执行路径。
        en: The same tool output passes integrity verification and does not enter the execution path being analyzed.
        ja: 同じツール出力が完全性検証を通過し、分析対象の実行経路へ入りません。
      field_values: {}
      related_node_ids:
