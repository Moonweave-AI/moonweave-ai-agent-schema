        en: Do not assign the RiskSource role in this flow solely because the output has an external origin.
        ja: 外部由来だけを理由に、このフローで RiskSource 役割を付与してはいけません。

        en: The role depends on position and trust judgment in a concrete path, not permanently on origin category.
        ja: フロー役割は具体的経路の位置と信頼判断で決まり、由来カテゴリで恒久的に決まりません。
      source_claims:
