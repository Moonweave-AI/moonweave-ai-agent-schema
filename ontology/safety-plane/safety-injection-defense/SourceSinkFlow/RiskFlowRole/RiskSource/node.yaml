schema: moonweave.ai/ontology-node/v1
id: RiskSource
kind: concept
status: review
labels:
  en: risk source
  zh: 风险源
  ja: リスク源
semantics:
  short_definition:
    zh: 在特定风险流中提供不可信或受污染影响的来源角色。
    en: The source role in a particular risk flow whose bearer supplies untrusted or contaminated influence.
    ja: 特定リスク流で不信頼または汚染された影響を供給する出所役割。
  definition:
    zh: 风险来源是一种 RiskFlowRole，标明消息、外部资源、工具输出、远程代理产物或记忆条目在某条 SourceSinkFlow 中提供不可信或受污染影响。它不是来源对象的永久类型，也不等同于已确认的 TaintedSource 实体。
    en: A RiskSource is a RiskFlowRole marking a message, external resource, tool output, remote-agent artifact, or memory item as supplying untrusted or contaminated influence in one SourceSinkFlow. It is not the source object's permanent type and is not identical to a confirmed TaintedSource entity.
    ja: リスク出所は、メッセージ、外部資源、ツール出力、遠隔エージェント成果物、記憶項目が一つの SourceSinkFlow で不信頼または汚染影響を供給することを示す RiskFlowRole です。対象の恒久型でも、確認済み TaintedSource と同一でもありません。
  why_needed:
    zh: 同一对象可能在一条流中是来源、在另一条流中只是普通中间数据，必须保留流上下文。
    en: The same object may be a source in one flow and ordinary intermediate data in another, so the flow context must be retained.
    ja: 同じ対象が一つの流では出所、別の流では通常の中間データになり得るため、流文脈を保持します。
  includes:
    - zh: 包含绑定到具体流、来源对象和影响范围的来源角色。
      en: Includes source roles bound to a specific flow, source object, and influence scope.
      ja: 具体的流、出所対象、影響範囲へ結び付いた出所役割を含みます。
  excludes:
    - zh: 不包含因来自互联网就永久被定义为风险来源的对象，也不包含检测信号。
      en: Excludes objects permanently typed as risk sources merely because they came from the internet and excludes detection signals.
      ja: インターネット由来だけで恒久的にリスク出所とされた対象や検出信号は含みません。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 风险源角色标识
        en: risk-source role ID
        ja: リスク源役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识某承担者在一条具体 SourceSinkFlow 中作为风险源的角色实例，并继承通用角色绑定。
        en: Identifier of the role instance in which one bearer serves as RiskSource in a particular SourceSinkFlow, inheriting the general role binding.
        ja: 一つの担体が特定 SourceSinkFlow で RiskSource を担う役割 instance を識別し、一般役割 binding を継承します。
      allowed_values: []
      pattern: null
      example_value: role/F-20/source-pdf-hidden-3
      source_claims:
        - claim-risk-source-002
    - id: source_basis
      labels:
        zh: 风险源判定依据
        en: source-role basis
        ja: リスク源判定根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明承担者因边界外不可信输入、已确认污染或策略指定而在该路径中成为风险源。
        en: "Basis on which the bearer becomes a risk source in this path: boundary-external untrusted input, confirmed contamination, or explicit policy designation."
        ja: 担体が当該経路でリスク源となる根拠、すなわち境界外不信入力、確認済み汚染、明示方針指定を示します。
      allowed_values: []
      pattern: null
      example_value: confirmed-contamination
      source_claims:
        - claim-risk-source-003
    - id: bearer_ref
      labels:
        zh: 风险源承担者引用
        en: risk-source bearer reference
        ja: リスク源担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该路径入口实际提供不可信或污染影响的消息、片段、工具输出或记忆对象。
        en: Reference to the message, span, tool output, or memory object that actually supplies untrusted or contaminated influence at the path entry.
        ja: 経路入口で不信・汚染影響を実際に供給する message、span、tool output、memory object を参照します。
      allowed_values: []
      pattern: null
      example_value: span://pdf-20/hidden-paragraph-3
      source_claims:
        - claim-risk-source-004
    - id: entry_step_ref
      labels:
        zh: 路径入口步骤引用
        en: path entry-step reference
        ja: 経路入口 step 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用承担者首次把其内容或影响交给路径中下一对象的具体派生、读取或参数绑定步骤。
        en: Reference to the concrete derivation, read, or argument-binding step where the bearer first supplies content or influence to the next path object.
        ja: 担体が内容・影響を経路の次対象へ最初に渡す具体的 derivation、read、argument-binding step を参照します。
      allowed_values: []
      pattern: null
      example_value: edge/F20/pdf-span-to-email-argument
      source_claims:
        - claim-risk-source-005
  constraints:
    - id: risk-source-requires-entering-influence-evidence
      severity: error
      expression_language: plain
      expression: role_id and bearer_ref inherit one RiskFlowRole binding and entry_step_ref proves that the bearer supplies influence in that flow; external origin alone is insufficient
      explanations:
        zh: 风险源必须有具体路径角色、承担者和进入下一步骤的证据；对象来自互联网、远程代理或低信任区域并不会永久把它变成 RiskSource。
        en: RiskSource requires a concrete path role, bearer, and evidence that influence enters the next step. Internet, remote-agent, or low-trust origin does not permanently make an object a RiskSource.
        ja: RiskSource には具体的経路役割、担体、次 step へ影響が入る証拠が必要で、internet・remote agent・低信頼 zone 由来だけで恒久 RiskSource にはしません。
      source_claims:
        - claim-risk-source-006
  required_relation_constraints: []
examples:
  - id: RiskSource-manual-positive-20260714
    kind: positive
    labels:
      zh: 风险来源正例
      en: Positive case for risk source
      ja: リスク送信元の正例
    scenario_id: null
    descriptions:
      zh: 外部 PDF 的隐藏段落在 F-20 中向邮件发送参数提供文本，因此该段落承担 RiskSource。
      en: A hidden paragraph in an external PDF supplies text to an email-send argument in F-20 and therefore bears RiskSource in that flow.
      ja: 外部 PDF の隠し段落が F-20 でメール送信引数へ文字列を供給するため、その流で RiskSource を担います。
    field_values:
      flow_id: flow/F-20
      bearer_type: TaintedSpan
      scope:
        flow_version: "1"
        run_id: run/F-20
      valid_from: 2026-07-14T10:31:00.000Z
      evidence_refs:
        - edge/F20/pdf-span-to-email-argument
      role_id: role/F-20/source-pdf-hidden-3
      source_basis: confirmed-contamination
      bearer_ref: span://pdf-20/hidden-paragraph-3
      entry_step_ref: edge/F20/pdf-span-to-email-argument
    related_node_ids:
      - RiskSource
      - RiskFlowRole
    related_relation_ids:
      - RiskSource-is_a-RiskFlowRole
    expected_result:
      zh: 验证器应把该记录识别为 RiskSource，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as RiskSource while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を RiskSource と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含绑定到具体流、来源对象和影响范围的来源角色。
      en: Includes source roles bound to a specific flow, source object, and influence scope.
      ja: 具体的流、出所対象、影響範囲へ結び付いた出所役割を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-source-007
  - id: RiskSource-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 风险来源边界例
      en: Boundary case for risk source
      ja: リスク送信元の境界例
    scenario_id: null
    descriptions:
      zh: 同一 PDF 在隔离取证流程中只被哈希且内容未进入任何决策；在该流程中它不承担 RiskSource。
      en: The same PDF is only hashed in a quarantine-forensics flow and its content enters no decision; it does not bear RiskSource in that flow.
      ja: 同じ PDF が隔離フォレンジック流でハッシュ化されるだけで内容が判断へ入らないなら、その流で RiskSource を担いません。
    field_values:
      role_id: null
      source_basis: external-origin-only
      bearer_ref: document://pdf-20
      entry_step_ref: null
    related_node_ids:
      - RiskSource
      - RiskFlowRole
    related_relation_ids:
      - RiskSource-is_a-RiskFlowRole
    expected_result:
      zh: 验证器不得把该记录归入 RiskSource；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as RiskSource; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を RiskSource に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含因来自互联网就永久被定义为风险来源的对象，也不包含检测信号。
      en: Excludes objects permanently typed as risk sources merely because they came from the internet and excludes detection signals.
      ja: インターネット由来だけで恒久的にリスク出所とされた対象や検出信号は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-source-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: RiskSink
    shared_parent_concept_id: RiskFlowRole
    differentia:
      zh: 共享父节点对照：父节点 RiskFlowRole：RiskSource（semantic kind=role，骨架 RiskSource-is_a-RiskFlowRole）；RiskSink（semantic kind=role，骨架 RiskSink-is_a-RiskFlowRole）。双端条件：RiskSource 条件：“风险来源属于风险流角色，区别于其他同类对象的条件是：它分类安全风险的起点，例如外部消息、检索文档、工具输出、远程智能体产物、记忆项、网络响应或用户提供文件”；RiskSink 条件：“风险接收方属于风险流角色，区别于其他同类对象的条件是：它分类污点内容可能影响的受保护目标，例如工具调用、带凭据请求、文件写入、记忆更新、网络调用或最终披露”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent RiskFlowRole: RiskSource (semantic kind=role, backbone RiskSource-is_a-RiskFlowRole); RiskSink (semantic kind=role, backbone RiskSink-is_a-RiskFlowRole). Endpoint conditions: RiskSource condition: “Risk source is a risk-flow role whose defining condition is that it classifies the origin of a safety risk, such as external message, retrieved document, tool output, remote agent artifact, memory item, network response, or user-supplied file”; RiskSink condition: “Risk sink is a risk-flow role whose defining condition is that it classifies the protected destination that tainted content may influence, such as tool invocation, credentialed request, filesystem write, memory update, network call, or final disclosure”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 RiskFlowRole：RiskSource（semantic kind=role、バックボーン RiskSource-is_a-RiskFlowRole）；RiskSink（semantic kind=role、バックボーン RiskSink-is_a-RiskFlowRole）。両端条件：RiskSource の条件：「リスク送信元はリスクフロー役割のうち、次の事実を定義条件とする対象です：それは、外部メッセージ、検索文書、ツール出力、遠隔エージェント成果物、メモリ項目、ネットワーク応答、ユーザー提供ファイルなど、安全リスクの起点を分類します」；RiskSink の条件：「リスク受信先はリスクフロー役割のうち、次の事実を定義条件とする対象です：それは、汚染内容が影響し得る保護対象、たとえばツール呼び出し、資格情報付き要求、ファイル書き込み、メモリ更新、ネットワーク呼び出し、最終開示を分類します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-risk-source-009
