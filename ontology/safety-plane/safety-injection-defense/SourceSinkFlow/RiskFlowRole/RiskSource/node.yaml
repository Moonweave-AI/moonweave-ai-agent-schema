        en: Classify the output's role in this flow as RiskSource and RiskFlowRole.
        ja: このフローにおける出力の役割を RiskSource かつ RiskFlowRole と分類します。

        en: It is the point where untrusted instructions first enter the analyzed reasoning and execution path.
        ja: 分析対象の推論・実行経路へ不信指示が最初に入る位置です。
      source_claims:
        - claim-risk-source-010
    - id: RiskSource-is_a-RiskFlowRole-example-boundary-001
      labels:
        zh: 是一种边界例
