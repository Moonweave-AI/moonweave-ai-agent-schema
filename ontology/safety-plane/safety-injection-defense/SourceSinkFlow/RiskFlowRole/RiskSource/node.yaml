schema: moonweave.ai/ontology-node/v1
id: RiskSource
kind: concept
status: accepted
labels:
  en: risk source
  zh: 风险源
  ja: リスク源
semantics:
  short_definition:
    zh: 在特定风险流中提供不可信或受污染影响的来源角色。
    en: The source role in a particular risk flow whose bearer supplies untrusted or contaminated influence.
    ja: 特定リスク流で不信頼または汚染された影響を供給する出所役割。
  definition:
    zh: 风险来源是一种 RiskFlowRole，标明消息、外部资源、工具输出、远程代理产物或记忆条目在某条 SourceSinkFlow 中提供不可信或受污染影响。它不是来源对象的永久类型，也不等同于已确认的 TaintedSource 实体。
    en: A RiskSource is a RiskFlowRole marking a message, external resource, tool output, remote-agent artifact, or memory item as supplying untrusted or contaminated influence in one SourceSinkFlow. It is not the source object's permanent type and is not identical to a confirmed TaintedSource entity.
    ja: リスク出所は、メッセージ、外部資源、ツール出力、遠隔エージェント成果物、記憶項目が一つの SourceSinkFlow で不信頼または汚染影響を供給することを示す RiskFlowRole です。対象の恒久型でも、確認済み TaintedSource と同一でもありません。
  why_needed:
    zh: 同一对象可能在一条流中是来源、在另一条流中只是普通中间数据，必须保留流上下文。
    en: The same object may be a source in one flow and ordinary intermediate data in another, so the flow context must be retained.
    ja: 同じ対象が一つの流では出所、別の流では通常の中間データになり得るため、流文脈を保持します。
  includes:
    - zh: 包含绑定到具体流、来源对象和影响范围的来源角色。
      en: Includes source roles bound to a specific flow, source object, and influence scope.
      ja: 具体的流、出所対象、影響範囲へ結び付いた出所役割を含みます。
  excludes:
    - zh: 不包含因来自互联网就永久被定义为风险来源的对象，也不包含检测信号。
      en: Excludes objects permanently typed as risk sources merely because they came from the internet and excludes detection signals.
      ja: インターネット由来だけで恒久的にリスク出所とされた対象や検出信号は含みません。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - role_id
  fields:
    - id: role_id
      labels:
        zh: 风险源角色标识
        en: risk-source role ID
        ja: リスク源役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识某承担者在一条具体 SourceSinkFlow 中作为风险源的角色实例，并继承通用角色绑定。
        en: Identifier of the role instance in which one bearer serves as RiskSource in a particular SourceSinkFlow, inheriting the general role binding.
        ja: 一つの担体が特定 SourceSinkFlow で RiskSource を担う役割 instance を識別し、一般役割 binding を継承します。
      allowed_values: []
      pattern: null
      example_value: role/F-20/source-pdf-hidden-3
      source_claims:
        - claim-risk-source-002
    - id: source_basis
      labels:
        zh: 风险源判定依据
        en: source-role basis
        ja: リスク源判定根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明承担者因边界外不可信输入、已确认污染或策略指定而在该路径中成为风险源。
        en: "Basis on which the bearer becomes a risk source in this path: boundary-external untrusted input, confirmed contamination, or explicit policy designation."
        ja: 担体が当該経路でリスク源となる根拠、すなわち境界外不信入力、確認済み汚染、明示方針指定を示します。
      allowed_values: []
      pattern: null
      example_value: confirmed-contamination
      source_claims:
        - claim-risk-source-003
    - id: bearer_ref
      labels:
        zh: 风险源承担者引用
        en: risk-source bearer reference
        ja: リスク源担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该路径入口实际提供不可信或污染影响的消息、片段、工具输出或记忆对象。
        en: Reference to the message, span, tool output, or memory object that actually supplies untrusted or contaminated influence at the path entry.
        ja: 経路入口で不信・汚染影響を実際に供給する message、span、tool output、memory object を参照します。
      allowed_values: []
      pattern: null
      example_value: span://pdf-20/hidden-paragraph-3
      source_claims:
        - claim-risk-source-004
    - id: entry_step_ref
      labels:
        zh: 路径入口步骤引用
        en: path entry-step reference
        ja: 経路入口 step 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用承担者首次把其内容或影响交给路径中下一对象的具体派生、读取或参数绑定步骤。
        en: Reference to the concrete derivation, read, or argument-binding step where the bearer first supplies content or influence to the next path object.
        ja: 担体が内容・影響を経路の次対象へ最初に渡す具体的 derivation、read、argument-binding step を参照します。
      allowed_values: []
      pattern: null
      example_value: edge/F20/pdf-span-to-email-argument
      source_claims:
        - claim-risk-source-005
  constraints:
    - id: risk-source-requires-entering-influence-evidence
      severity: error
      expression_language: plain
      expression: role_id and bearer_ref inherit one RiskFlowRole binding and entry_step_ref proves that the bearer supplies influence in that flow; external origin alone is insufficient
      explanations:
        zh: 风险源必须有具体路径角色、承担者和进入下一步骤的证据；对象来自互联网、远程代理或低信任区域并不会永久把它变成 RiskSource。
        en: RiskSource requires a concrete path role, bearer, and evidence that influence enters the next step. Internet, remote-agent, or low-trust origin does not permanently make an object a RiskSource.
        ja: RiskSource には具体的経路役割、担体、次 step へ影響が入る証拠が必要で、internet・remote agent・低信頼 zone 由来だけで恒久 RiskSource にはしません。
      source_claims:
        - claim-risk-source-006
  required_relation_constraints: []
examples:
  - id: risk-source-greshake_bing
    labels:
      zh: 风险源 - Greshake Bing Chat 间接注入
      en: risk source - Greshake Bing Chat indirect injection
      ja: リスク源 - Greshake Bing Chat 間接注入
    descriptions: {zh: "风险源(RiskSource) [RiskSource]: 在特定风险流中提供不可信或受污染影响的来源角色。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: source_basis, entry_step_ref, bearer_ref.", en: "risk source (RiskSource) [RiskSource]: The source role in a particular risk flow whose bearer supplies untrusted or contaminated influence.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include source_basis, entry_step_ref, bearer_ref.", ja: "リスク源(RiskSource) [RiskSource]: 特定リスク流で不信頼または汚染された影響を供給する出所役割。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: source_basis, entry_step_ref, bearer_ref."}
    field_values:
      bearer_ref: "span://pdf-20/hidden-paragraph-3"
      entry_step_ref: edge/F20/pdf-span-to-email-argument
      role_id: role/F-20/source-pdf-hidden-3
      source_basis: confirmed-contamination
    related_node_ids:
      - RiskFlowRole
      - RiskSource
    related_relation_ids:
      - claim-risk-source-001
      - claim-risk-source-007
      - claim-risk-source-008
      - RiskFlowRole
      - RiskSource
      - RiskSource-is_a-RiskFlowRole
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-risk-source-001
  - id: risk-source-echoleak
    labels:
      zh: 风险源 - EchoLeak Copilot 邮件注入
      en: risk source - EchoLeak Copilot email injection
      ja: リスク源 - EchoLeak Copilot メール注入
    descriptions: {zh: "风险源(RiskSource) [RiskSource]: 在特定风险流中提供不可信或受污染影响的来源角色。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: source_basis, entry_step_ref, bearer_ref.", en: "risk source (RiskSource) [RiskSource]: The source role in a particular risk flow whose bearer supplies untrusted or contaminated influence.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include source_basis, entry_step_ref, bearer_ref.", ja: "リスク源(RiskSource) [RiskSource]: 特定リスク流で不信頼または汚染された影響を供給する出所役割。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: source_basis, entry_step_ref, bearer_ref."}
    field_values:
      bearer_ref: "span://pdf-20/hidden-paragraph-3"
      entry_step_ref: edge/F20/pdf-span-to-email-argument
      role_id: role/F-20/source-pdf-hidden-3
      source_basis: confirmed-contamination
    related_node_ids:
      - RiskFlowRole
      - RiskSource
    related_relation_ids:
      - claim-risk-source-001
      - claim-risk-source-007
      - claim-risk-source-008
      - RiskFlowRole
      - RiskSource
      - RiskSource-is_a-RiskFlowRole
    example_source: EchoLeak CVE-2025-32711
    source_claims:
      - claim-risk-source-001
  - id: risk-source-perez_hackaprompt
    labels:
      zh: 风险源 - HackAPrompt 间接注入
      en: risk source - HackAPrompt indirect injection
      ja: リスク源 - HackAPrompt 間接注入
    descriptions: {zh: "风险源(RiskSource) [RiskSource]: 在特定风险流中提供不可信或受污染影响的来源角色。. Perez & Ribeiro（2022）HackAPrompt 与 Greshake 等（2023）展示间接注入：攻击者将指令隐藏在 LLM 将处理的数据中（网页、邮件、文档）。 Fields: source_basis, entry_step_ref, bearer_ref.", en: "risk source (RiskSource) [RiskSource]: The source role in a particular risk flow whose bearer supplies untrusted or contaminated influence.. Perez & Ribeiro (2022) HackAPrompt and Greshake et al. (2023, arXiv:2302.12173) show indirect injection: attackers hide instructions in data LLMs process (webpages, email, documents). Fields include source_basis, entry_step_ref, bearer_ref.", ja: "リスク源(RiskSource) [RiskSource]: 特定リスク流で不信頼または汚染された影響を供給する出所役割。. Perez & Ribeiro（2022）HackAPrompt と Greshake ほか（2023）は indirect injection：webpage/email/document に命令を隠す。 Fields: source_basis, entry_step_ref, bearer_ref."}
    field_values:
      bearer_ref: "span://pdf-20/hidden-paragraph-3"
      entry_step_ref: edge/F20/pdf-span-to-email-argument
      role_id: role/F-20/source-pdf-hidden-3
      source_basis: confirmed-contamination
    related_node_ids:
