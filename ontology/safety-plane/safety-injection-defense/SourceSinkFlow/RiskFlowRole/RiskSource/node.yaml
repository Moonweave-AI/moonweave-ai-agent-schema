external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: RiskSink
    shared_parent_concept_id: RiskFlowRole
    differentia:
      zh: 共享父节点对照：父节点 RiskFlowRole：RiskSource（semantic kind=role，骨架 RiskSource-is_a-RiskFlowRole）；RiskSink（semantic kind=role，骨架 RiskSink-is_a-RiskFlowRole）。双端条件：RiskSource 条件：“风险来源属于风险流角色，区别于其他同类对象的条件是：它分类安全风险的起点，例如外部消息、检索文档、工具输出、远程智能体产物、记忆项、网络响应或用户提供文件”；RiskSink 条件：“风险接收方属于风险流角色，区别于其他同类对象的条件是：它分类污点内容可能影响的受保护目标，例如工具调用、带凭据请求、文件写入、记忆更新、网络调用或最终披露”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent RiskFlowRole: RiskSource (semantic kind=role, backbone RiskSource-is_a-RiskFlowRole); RiskSink (semantic kind=role, backbone RiskSink-is_a-RiskFlowRole). Endpoint conditions: RiskSource condition: “Risk source is a risk-flow role whose defining condition is that it classifies the origin of a safety risk, such as external message, retrieved document, tool output, remote agent artifact, memory item, network response, or user-supplied file”; RiskSink condition: “Risk sink is a risk-flow role whose defining condition is that it classifies the protected destination that tainted content may influence, such as tool invocation, credentialed request, filesystem write, memory update, network call, or final disclosure”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 RiskFlowRole：RiskSource（semantic kind=role、バックボーン RiskSource-is_a-RiskFlowRole）；RiskSink（semantic kind=role、バックボーン RiskSink-is_a-RiskFlowRole）。両端条件：RiskSource の条件：「リスク送信元はリスクフロー役割のうち、次の事実を定義条件とする対象です：それは、外部メッセージ、検索文書、ツール出力、遠隔エージェント成果物、メモリ項目、ネットワーク応答、ユーザー提供ファイルなど、安全リスクの起点を分類します」；RiskSink の条件：「リスク受信先はリスクフロー役割のうち、次の事実を定義条件とする対象です：それは、汚染内容が影響し得る保護対象、たとえばツール呼び出し、資格情報付き要求、ファイル書き込み、メモリ更新、ネットワーク呼び出し、最終開示を分類します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-risk-source-009
parent_relation:
