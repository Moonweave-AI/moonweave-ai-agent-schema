parent_relation: null
relations:
  - id: SourceSinkFlow-records-TaintPropagation
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录污点传播事件
      en: records taint propagation
      ja: 汚染伝播イベントを記録する
    definitions:
      zh: 处于 observed 模式的 SourceSinkFlow 在其有序步骤和证据边明确引用某次 TaintPropagation，并且传播事件的源端、目标端、转换、时间与范围映射均与路径步骤一致时，记录该传播事件。potential 流只描述可达路径，不能据此断言已经发生传播。
      en: A SourceSinkFlow in observed mode records a TaintPropagation when its ordered steps and evidence edges explicitly reference that propagation occurrence and the event's source, target, transformation, time, and span mapping align with the path step. A potential flow describes reachability only and cannot assert that propagation occurred.
      ja: observed mode の SourceSinkFlow は、有序 step と evidence edge が特定 TaintPropagation occurrence を明示参照し、event の source・target・transformation・time・span mapping が path step と一致する場合、その伝播 event を記録します。potential flow は到達可能性だけを表し、伝播発生を断言できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一条 observed 流可记录零个或多个实际传播步骤，同一传播事件也可能被多个面向不同汇点的分析流引用，因此不施加全局基数。
      en: An observed flow may record zero or more actual propagation steps, and one propagation event may be referenced by analyses for different sinks, so no universal cardinality applies.
      ja: 一つの observed flow が複数の実 propagation step を記録でき、一つの event が異なる sink 向け分析 flow から参照され得るため、一律の基数は課しません。
    inverse_reading:
      predicate: recorded_in
      labels:
        zh: 记录于来源—汇点流
        en: recorded in source-sink flow
        ja: 出所―シンクフローに記録される
    conditions:
      - id: SourceSinkFlow-records-TaintPropagation-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when flow_mode is observed, ordered_step_refs explicitly contains the propagation event ID, and the event's source and target entity versions, transformation, time, and span or class transition align with the flow evidence; potential reachability or co-occurrence is insufficient.
        explanations:
          zh: 仅当 flow_mode=observed、有序步骤明确包含传播事件 ID，且事件的源/目标实体版本、转换、时间以及范围或类别变化与流证据一致时建立此边；潜在可达性或共现均不足以成立。
          en: Assert this edge only when flow_mode is observed, the ordered steps explicitly contain the propagation event ID, and the event's source and target versions, transformation, time, and span or class transition align with the flow evidence; potential reachability or co-occurrence is insufficient.
          ja: flow_mode=observed で、有序 step が propagation event ID を明示的に含み、event の source/target version・transformation・time・span または class transition が flow evidence と一致する場合だけこの辺を成立させます。潜在到達性や共起では不十分です。
        source_claims:
          - claim-sourcesinkflow-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-sourcesinkflow-design
      - claim-sourcesinkflow-design
    distinct_fact_rationale:
      zh: records 表达一份 observed 路径记录包含哪次实际传播发生；它不同于流的潜在可达性，也不同于传播事件自身的源端与目标端关系。
      en: records states which actual propagation occurrence an observed path record contains; it differs from potential reachability and from the event's own source and target endpoint relations.
      ja: records は observed path record がどの実 propagation occurrence を含むかを表し、potential reachability や event 自身の source/target endpoint relation とは異なります。
    layout_role: cross-link
    target: concept:TaintPropagation
  - id: SourceSinkFlow-has_sink_role-RiskSink
    predicate: has_sink_role
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: has sink role
