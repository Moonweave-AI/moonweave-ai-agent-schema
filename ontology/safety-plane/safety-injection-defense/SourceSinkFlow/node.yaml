schema: moonweave.ai/ontology-node/v1
id: SourceSinkFlow
kind: concept
labels:
  en: risk source-to-sink path
  zh: 风险源—汇路径
  ja: リスク源―シンク経路
semantics:
  short_definition:
    zh: 有证据的不可信影响从来源经转换到受保护汇点的版本化路径记录。
    en: A versioned path record of evidenced untrusted influence from source through transformations to a protected sink.
    ja: 証拠付き untrusted influence が source から transformation を経て protected sink へ至る版管理 path 記録。
  definition:
    zh: SourceSinkFlow 有序连接 RiskSource、中间步骤与 RiskSink，flow_mode=potential|observed 区分可达与已观察传递。AgentSentry 对 html-extract→summarize→transfer_funds 的因果链应投影为 flow/agentsentry-771；不能由 session 共现推断。
    en: SourceSinkFlow orders RiskSource, intermediate steps, and RiskSink; flow_mode=potential|observed separates reachable from observed transfer. AgentSentry causal chain html-extract→summarize→transfer_funds projects to flow/agentsentry-771; cannot infer from session co-occurrence.
    ja: SourceSinkFlow は RiskSource/中間 step/RiskSink を順序付け flow_mode=potential|observed で reachable/observed を区別。AgentSentry html-extract→summarize→transfer_funds を flow/agentsentry-771 に投影。session 共起から推論不可。
  why_needed:
    zh: 完整路径记录定位应阻断的 trust boundary 与需复检的下游对象。
    en: Complete path records locate the trust boundary to block and downstream objects needing rescan.
    ja: 完全 path 記録は block すべき trust boundary と rescan 必要 downstream object を特定。
  includes:
    - zh: 包含至少一个具体来源角色、一个具体接收方角色、有序路径和支持每一步的证据。
      en: Includes at least one concrete source role, one concrete sink role, an ordered path, and evidence for every step.
      ja: 少なくとも一つの具体的出所役割、一つの具体的受け先役割、順序付き経路、各段階の証拠を含みます。
  excludes:
    - zh: 不包含只有来源和接收方但没有中间证据的猜测，也不包含单次 TaintPropagation 事件。
      en: Excludes guesses with source and sink but no intermediate evidence and excludes a single TaintPropagation event.
      ja: 出所と受け先だけで中間証拠のない推測や、単一の TaintPropagation イベントは含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: SourceSinkFlow-records-TaintPropagation 连接路径与逐步传播；DetectionActivity-evaluates-SourceSinkFlow 在绑定 flow 版本并逐步核查证据时成立。
    en: SourceSinkFlow-records-TaintPropagation links path to stepwise propagation; DetectionActivity-evaluates-SourceSinkFlow when flow version is bound and steps verified.
    ja: SourceSinkFlow-records-TaintPropagation で path と stepwise propagation を接続。flow 版束縛+step 検証で DetectionActivity-evaluates-SourceSinkFlow。
  typical_input:
    - description: Causal or dependency evidence chain.
      format: RiskSource + transforms + RiskSink with step evidence
      source_claims:
        - claim-sourcesinkflow-design
  typical_output:
    - description: Versioned flow record.
      format: '{"flow_id":"flow-rag-5","version":"3","flow_mode":"observed"}'
      source_claims:
        - claim-sourcesinkflow-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - flow_id
    - version
  fields:
    - id: flow_id
      labels:
        zh: 风险路径标识
        en: risk-path ID
        ja: リスク経路 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识同一条风险源—汇路径的逻辑身份，版本变化时保持不变。
        en: Stable logical identity of one risk source-to-sink path, retained across revisions of the record.
        ja: 一つのリスク源―シンク経路の論理同一性を安定識別し、記録版が変わっても保持します。
      allowed_values: []
      pattern: null
      example_value: flow/F-7
      source_claims:
        - claim-sourcesinkflow-design
    - id: version
      labels:
        zh: 路径记录版本
        en: path-record version
        ja: 経路記録版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识角色、步骤、证据或模式发生变化后的不可变路径修订版，与 flow_id 共同构成身份。
        en: Immutable revision after any role, step, evidence, or mode change; together with flow_id it identifies the path record.
        ja: 役割、step、証拠、mode の変更後の不変 revision を示し、flow_id と共に経路記録を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-sourcesinkflow-design
    - id: flow_mode
      labels:
        zh: 路径证据模式
        en: path evidence mode
        ja: 経路証拠 mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分仅由依赖关系支持的潜在可达路径与已有逐步运行证据的观察路径。
        en: Distinguishes a potentially reachable path supported by dependencies from an observed path supported by stepwise runtime evidence.
        ja: 依存関係だけで支える潜在到達経路と、段階的実行証拠を持つ観測経路を区別します。
      allowed_values:
        - id: flow_mode_potential
          value: potential
          labels:
            zh: 潜在
            en: potential
            ja: 潜在
          definitions:
            zh: 存在经验证的依赖或可达关系，但尚无证据证明影响实际穿过整条路径。
            en: Validated dependency or reachability exists, but no evidence yet proves that influence traversed the whole path.
            ja: 検証済み依存・到達関係はあるが、影響が全経路を実際に通過した証拠はまだありません。
          source_claims:
            - claim-sourcesinkflow-design
        - id: flow_mode_observed
          value: observed
          labels:
            zh: 已观察
            en: observed
            ja: 観測済み
          definitions:
            zh: 每个步骤均有运行证据，证明影响在给定时间和作用域内实际传递。
            en: Every step has runtime evidence showing that influence actually transferred within the stated time and scope.
            ja: 各 step に実行証拠があり、指定時刻・scope 内で影響が実際に伝達したことを示します。
          source_claims:
            - claim-sourcesinkflow-design
      pattern: null
      example_value: observed
      source_claims:
        - claim-sourcesinkflow-design
    - id: scope
      labels:
        zh: 路径作用域
        en: path scope
        ja: 経路 scope
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定该角色和路径判断适用的会话、运行、租户、任务与时间边界。
        en: Session, run, tenant, task, and temporal boundary within which the roles and path judgment apply.
        ja: 役割と経路判断が適用される session、run、tenant、task、時間境界を定めます。
      allowed_values: []
      pattern: null
      example_value:
        session_id: session-31
        run_id: run-77
        task_id: summarize-and-file
      source_claims:
        - claim-sourcesinkflow-design
    - id: source_role_id
      labels:
        zh: 风险源角色标识
        en: risk-source role ID
        ja: リスク源役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该 flow_id/version 和 scope 内成立的唯一 RiskSource 角色实例。
        en: Identifier of the unique RiskSource role instance valid for this flow version and scope.
        ja: この flow 版・scope 内で有効な唯一の RiskSource 役割 instance を参照します。
      allowed_values: []
      pattern: null
      example_value: role/F-7/source-W4
      source_claims:
        - claim-sourcesinkflow-design
    - id: sink_role_id
      labels:
        zh: 风险汇角色标识
        en: risk-sink role ID
        ja: リスクシンク役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该 flow_id/version 和 scope 内需要保护的唯一 RiskSink 角色实例。
        en: Identifier of the unique protected RiskSink role instance valid for this flow version and scope.
        ja: この flow 版・scope 内で保護対象となる唯一の RiskSink 役割 instance を参照します。
      allowed_values: []
      pattern: null
      example_value: role/F-7/sink-A1
      source_claims:
        - claim-sourcesinkflow-design
    - id: ordered_step_refs
      labels:
        zh: 有序步骤引用
        en: ordered step references
        ja: 順序付き step 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按源到汇顺序引用内容派生、转换、传播或参数绑定步骤，每一步都必须保持身份。
        en: Source-to-sink ordered references to derivation, transformation, propagation, or argument-binding steps, preserving each step's identity.
        ja: 源からシンクの順に derivation、transformation、propagation、argument binding step を参照し、各 step の同一性を保持します。
      allowed_values: []
      pattern: null
      example_value:
        - span://web/W-4
        - transform://summary/S-2
        - argument://tool/A-1
      source_claims:
        - claim-sourcesinkflow-design
    - id: evidence_edge_ids
      labels:
        zh: 路径证据边标识
        en: path evidence-edge IDs
        ja: 経路証拠 edge ID
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 逐段列出支持相邻步骤关系的派生、转换、使用或传播证据边，顺序与步骤对齐。
        en: Ordered identifiers of derivation, transformation, usage, or propagation evidence edges supporting each adjacent step pair.
        ja: 隣接 step 間を支える derivation、transformation、usage、propagation 証拠 edge の ID を step 順に列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - edge/W4-derived-S2
        - edge/S2-bound-A1
      source_claims:
        - claim-sourcesinkflow-design
    - id: valid_from
      labels:
        zh: 路径有效起点
        en: path valid from
        ja: 経路有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该版本路径及角色绑定开始适用的 UTC 时间，不等于任一单步事件的发生时间。
        en: UTC instant from which this path version and its role bindings apply, distinct from any single step-event time.
        ja: この経路版と役割 binding が適用開始する UTC 時刻で、個別 step event 時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:20:00.000Z
      source_claims:
        - claim-sourcesinkflow-design
    - id: valid_until
      labels:
        zh: 路径有效终点
        en: path valid until
        ja: 経路有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该路径版本被新证据、配置变化或复核结论取代的 UTC 时间；仍有效时为空。
        en: UTC instant when new evidence, configuration change, or review superseded this path version; absent while still valid.
        ja: 新証拠、構成変更、審査でこの経路版が置換された UTC 時刻で、なお有効なら空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-sourcesinkflow-design
  constraints:
    - id: source-sink-flow-mode-evidence-invariant
      severity: error
      expression_language: plain
      expression: source_role_id != sink_role_id and evidence_edge_ids covers every adjacent ordered_step_refs pair; potential does not assert transfer, observed requires runtime evidence and may record TaintPropagation
      explanations:
        zh: 源角色与汇角色必须不同，路径每个相邻步骤都要有证据。potential 只能表达有证据的依赖可达性；observed 必须有逐步运行证据，且只有 observed 才能 records TaintPropagation。
        en: Source and sink roles must differ and every adjacent path step requires evidence. potential expresses evidenced dependency reachability only; observed requires stepwise runtime evidence, and only observed may records TaintPropagation.
        ja: 源役割とシンク役割は異なり、全隣接 step に証拠が必要です。potential は証拠付き依存到達性だけを表し、observed は段階的実行証拠を要し、observed だけが TaintPropagation を records できます。
      source_claims:
        - claim-sourcesinkflow-design
    - id: source-sink-flow-validity-order
      severity: error
      expression_language: plain
      expression: valid_until is null or valid_until >= valid_from
      explanations:
        zh: 路径版本的有效终点不得早于起点。
        en: The path version's validity end cannot precede its validity start.
        ja: 経路版の有効終了は開始より前にできません。
      source_claims:
        - claim-sourcesinkflow-design
  required_relation_constraints:
    - id: source-sink-flow-has-one-source-role
      direction: outgoing
      predicate: has_source_role
      target_concept_id: RiskSource
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个路径版本必须有且只有一个作用域内风险源角色。
        en: Each path version has exactly one scoped RiskSource role.
        ja: 各経路版は scope 内 RiskSource 役割を一つだけ持ちます。
      source_claims:
        - claim-sourcesinkflow-design
    - id: source-sink-flow-has-one-sink-role
      direction: outgoing
      predicate: has_sink_role
      target_concept_id: RiskSink
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个路径版本必须有且只有一个需要保护的风险汇角色。
        en: Each path version has exactly one protected RiskSink role.
        ja: 各経路版は保護対象 RiskSink 役割を一つだけ持ちます。
      source_claims:
        - claim-sourcesinkflow-design
