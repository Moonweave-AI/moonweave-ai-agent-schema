schema: moonweave.ai/ontology-node/v1
id: SourceSinkFlow
kind: concept
status: accepted
labels:
  en: risk source-to-sink path
  zh: 风险源—汇路径
  ja: リスク源―シンク経路
semantics:
  short_definition:
    zh: 记录不可信影响从具体来源经转换到受保护接收方之路径的信息。
    en: An information record of how untrusted influence travels from a concrete source through transformations to a protected sink.
    ja: 不信頼な影響が具体的出所から変換を経て保護対象受け先へ届く経路の情報記録。
  definition:
    zh: 风险源—汇路径是一种有版本的信息记录：在明确作用域内，按顺序连接一个 RiskSource 角色、中间转换或传播步骤和一个 RiskSink 角色，并为每一步保存依赖或观察证据。flow_mode=potential 只声明有证据的可达路径，flow_mode=observed 才声明已经观察到影响传递；它不是运行事件，也不能由同会话共现、文本相似或图上邻近推断。
    en: A risk source-to-sink path is a versioned information record that, within an explicit scope, orders one RiskSource role, intermediate transformation or propagation steps, and one RiskSink role, retaining dependency or observation evidence for every step. flow_mode=potential states only an evidenced reachable path, whereas flow_mode=observed states observed influence transfer. It is not a runtime event and cannot be inferred from session co-occurrence, text similarity, or graph proximity.
    ja: リスク源―シンク経路は、明示 scope 内で一つの RiskSource 役割、中間変換・伝播 step、一つの RiskSink 役割を順序付け、各 step の依存・観測証拠を保持する版付き情報記録です。flow_mode=potential は証拠付き到達可能性だけ、observed は観測済み影響伝達を表します。実行 event ではなく、同一 session、text 類似、graph 近接から推定しません。
  why_needed:
    zh: 把完整路径作为记录，才能定位在哪个边界阻断以及哪些下游对象需要复检。
    en: Recording the complete path locates the boundary where intervention belongs and identifies downstream objects requiring rescanning.
    ja: 完全経路を記録することで、阻止すべき境界と再走査が必要な下流対象を特定できます。
  includes:
    - zh: 包含至少一个具体来源角色、一个具体接收方角色、有序路径和支持每一步的证据。
      en: Includes at least one concrete source role, one concrete sink role, an ordered path, and evidence for every step.
      ja: 少なくとも一つの具体的出所役割、一つの具体的受け先役割、順序付き経路、各段階の証拠を含みます。
  excludes:
    - zh: 不包含只有来源和接收方但没有中间证据的猜测，也不包含单次 TaintPropagation 事件。
      en: Excludes guesses with source and sink but no intermediate evidence and excludes a single TaintPropagation event.
      ja: 出所と受け先だけで中間証拠のない推測や、単一の TaintPropagation イベントは含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - flow_id
    - version
  fields:
    - id: flow_id
      labels:
        zh: 风险路径标识
        en: risk-path ID
        ja: リスク経路 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识同一条风险源—汇路径的逻辑身份，版本变化时保持不变。
        en: Stable logical identity of one risk source-to-sink path, retained across revisions of the record.
        ja: 一つのリスク源―シンク経路の論理同一性を安定識別し、記録版が変わっても保持します。
      allowed_values: []
      pattern: null
      example_value: flow/F-7
      source_claims:
        - claim-source-sink-flow-002
    - id: version
      labels:
        zh: 路径记录版本
        en: path-record version
        ja: 経路記録版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识角色、步骤、证据或模式发生变化后的不可变路径修订版，与 flow_id 共同构成身份。
        en: Immutable revision after any role, step, evidence, or mode change; together with flow_id it identifies the path record.
        ja: 役割、step、証拠、mode の変更後の不変 revision を示し、flow_id と共に経路記録を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-source-sink-flow-003
    - id: flow_mode
      labels:
        zh: 路径证据模式
        en: path evidence mode
        ja: 経路証拠 mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分仅由依赖关系支持的潜在可达路径与已有逐步运行证据的观察路径。
        en: Distinguishes a potentially reachable path supported by dependencies from an observed path supported by stepwise runtime evidence.
        ja: 依存関係だけで支える潜在到達経路と、段階的実行証拠を持つ観測経路を区別します。
      allowed_values:
        - id: flow_mode_potential
          value: potential
          labels:
            zh: 潜在
            en: potential
            ja: 潜在
          definitions:
            zh: 存在经验证的依赖或可达关系，但尚无证据证明影响实际穿过整条路径。
            en: Validated dependency or reachability exists, but no evidence yet proves that influence traversed the whole path.
            ja: 検証済み依存・到達関係はあるが、影響が全経路を実際に通過した証拠はまだありません。
          status: accepted
          source_claims:
            - claim-source-sink-flow-004
        - id: flow_mode_observed
          value: observed
          labels:
            zh: 已观察
            en: observed
            ja: 観測済み
          definitions:
            zh: 每个步骤均有运行证据，证明影响在给定时间和作用域内实际传递。
            en: Every step has runtime evidence showing that influence actually transferred within the stated time and scope.
            ja: 各 step に実行証拠があり、指定時刻・scope 内で影響が実際に伝達したことを示します。
          status: accepted
          source_claims:
            - claim-source-sink-flow-005
      pattern: null
      example_value: observed
      source_claims:
        - claim-source-sink-flow-006
    - id: scope
      labels:
        zh: 路径作用域
        en: path scope
        ja: 経路 scope
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 界定该角色和路径判断适用的会话、运行、租户、任务与时间边界。
        en: Session, run, tenant, task, and temporal boundary within which the roles and path judgment apply.
        ja: 役割と経路判断が適用される session、run、tenant、task、時間境界を定めます。
      allowed_values: []
      pattern: null
      example_value:
        session_id: session-31
        run_id: run-77
        task_id: summarize-and-file
      source_claims:
        - claim-source-sink-flow-007
    - id: source_role_id
      labels:
        zh: 风险源角色标识
        en: risk-source role ID
        ja: リスク源役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该 flow_id/version 和 scope 内成立的唯一 RiskSource 角色实例。
        en: Identifier of the unique RiskSource role instance valid for this flow version and scope.
        ja: この flow 版・scope 内で有効な唯一の RiskSource 役割 instance を参照します。
      allowed_values: []
      pattern: null
      example_value: role/F-7/source-W4
      source_claims:
        - claim-source-sink-flow-008
    - id: sink_role_id
      labels:
        zh: 风险汇角色标识
        en: risk-sink role ID
        ja: リスクシンク役割 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在该 flow_id/version 和 scope 内需要保护的唯一 RiskSink 角色实例。
        en: Identifier of the unique protected RiskSink role instance valid for this flow version and scope.
        ja: この flow 版・scope 内で保護対象となる唯一の RiskSink 役割 instance を参照します。
      allowed_values: []
      pattern: null
      example_value: role/F-7/sink-A1
      source_claims:
        - claim-source-sink-flow-009
    - id: ordered_step_refs
      labels:
        zh: 有序步骤引用
        en: ordered step references
        ja: 順序付き step 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按源到汇顺序引用内容派生、转换、传播或参数绑定步骤，每一步都必须保持身份。
        en: Source-to-sink ordered references to derivation, transformation, propagation, or argument-binding steps, preserving each step's identity.
        ja: 源からシンクの順に derivation、transformation、propagation、argument binding step を参照し、各 step の同一性を保持します。
      allowed_values: []
      pattern: null
      example_value:
        - span://web/W-4
        - transform://summary/S-2
        - argument://tool/A-1
      source_claims:
        - claim-source-sink-flow-010
    - id: evidence_edge_ids
      labels:
        zh: 路径证据边标识
        en: path evidence-edge IDs
        ja: 経路証拠 edge ID
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 逐段列出支持相邻步骤关系的派生、转换、使用或传播证据边，顺序与步骤对齐。
        en: Ordered identifiers of derivation, transformation, usage, or propagation evidence edges supporting each adjacent step pair.
        ja: 隣接 step 間を支える derivation、transformation、usage、propagation 証拠 edge の ID を step 順に列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - edge/W4-derived-S2
        - edge/S2-bound-A1
      source_claims:
        - claim-source-sink-flow-011
    - id: valid_from
      labels:
        zh: 路径有效起点
        en: path valid from
        ja: 経路有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该版本路径及角色绑定开始适用的 UTC 时间，不等于任一单步事件的发生时间。
        en: UTC instant from which this path version and its role bindings apply, distinct from any single step-event time.
        ja: この経路版と役割 binding が適用開始する UTC 時刻で、個別 step event 時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:20:00.000Z
      source_claims:
        - claim-source-sink-flow-012
    - id: valid_until
      labels:
        zh: 路径有效终点
        en: path valid until
        ja: 経路有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该路径版本被新证据、配置变化或复核结论取代的 UTC 时间；仍有效时为空。
        en: UTC instant when new evidence, configuration change, or review superseded this path version; absent while still valid.
        ja: 新証拠、構成変更、審査でこの経路版が置換された UTC 時刻で、なお有効なら空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-source-sink-flow-013
  constraints:
    - id: source-sink-flow-mode-evidence-invariant
      severity: error
      expression_language: plain
      expression: source_role_id != sink_role_id and evidence_edge_ids covers every adjacent ordered_step_refs pair; potential does not assert transfer, observed requires runtime evidence and may record TaintPropagation
      explanations:
        zh: 源角色与汇角色必须不同，路径每个相邻步骤都要有证据。potential 只能表达有证据的依赖可达性；observed 必须有逐步运行证据，且只有 observed 才能 records TaintPropagation。
        en: Source and sink roles must differ and every adjacent path step requires evidence. potential expresses evidenced dependency reachability only; observed requires stepwise runtime evidence, and only observed may records TaintPropagation.
        ja: 源役割とシンク役割は異なり、全隣接 step に証拠が必要です。potential は証拠付き依存到達性だけを表し、observed は段階的実行証拠を要し、observed だけが TaintPropagation を records できます。
      source_claims:
        - claim-source-sink-flow-014
    - id: source-sink-flow-validity-order
      severity: error
      expression_language: plain
      expression: valid_until is null or valid_until >= valid_from
      explanations:
        zh: 路径版本的有效终点不得早于起点。
        en: The path version's validity end cannot precede its validity start.
        ja: 経路版の有効終了は開始より前にできません。
      source_claims:
        - claim-source-sink-flow-015
  required_relation_constraints:
    - id: source-sink-flow-has-one-source-role
      direction: outgoing
      predicate: has_source_role
      target_concept_id: RiskSource
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个路径版本必须有且只有一个作用域内风险源角色。
        en: Each path version has exactly one scoped RiskSource role.
        ja: 各経路版は scope 内 RiskSource 役割を一つだけ持ちます。
      source_claims:
        - claim-source-sink-flow-016
    - id: source-sink-flow-has-one-sink-role
      direction: outgoing
      predicate: has_sink_role
      target_concept_id: RiskSink
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个路径版本必须有且只有一个需要保护的风险汇角色。
        en: Each path version has exactly one protected RiskSink role.
        ja: 各経路版は保護対象 RiskSink 役割を一つだけ持ちます。
      source_claims:
        - claim-source-sink-flow-017
examples:
  - id: SourceSinkFlow-manual-positive-20260714
    kind: positive
    labels:
      zh: 来源到接收方流正例
      en: Positive case for source sink flow
      ja: 送信元から受信先への流れの正例
    scenario_id: null
    descriptions:
      zh: F-7 记录网页 span W-4→摘要 S-2→工具参数 A-1，三步均有 derived_from 或 transforms 证据，并给出来源与接收方角色。
      en: F-7 records webpage span W-4→summary S-2→tool argument A-1, with derived_from or transforms evidence at all three steps and explicit source and sink roles.
      ja: F-7 はウェブ範囲 W-4→要約 S-2→ツール引数 A-1 を記録し、全段階に derived_from または transforms 証拠と出所・受け先役割があります。
    field_values:
      flow_id: flow/F-7
      version: "3"
      flow_mode: observed
      scope:
        session_id: session-31
        run_id: run-77
        task_id: summarize-and-file
      source_role_id: role/F-7/source-W4
      sink_role_id: role/F-7/sink-A1
      ordered_step_refs:
        - span://web/W-4
        - transform://summary/S-2
        - argument://tool/A-1
      evidence_edge_ids:
        - edge/W4-derived-S2
        - edge/S2-bound-A1
      valid_from: 2026-07-14T10:20:00.000Z
      valid_until: null
    related_node_ids:
      - SourceSinkFlow
    related_relation_ids: []
    expected_result:
      zh: 验证器应把该记录识别为 SourceSinkFlow，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as SourceSinkFlow while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を SourceSinkFlow と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含至少一个具体来源角色、一个具体接收方角色、有序路径和支持每一步的证据。
      en: Includes at least one concrete source role, one concrete sink role, an ordered path, and evidence for every step.
      ja: 少なくとも一つの具体的出所役割、一つの具体的受け先役割、順序付き経路、各段階の証拠を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-source-sink-flow-018
  - id: SourceSinkFlow-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 来源到接收方流边界例
      en: Boundary case for source sink flow
      ja: 送信元から受信先への流れの境界例
    scenario_id: null
    descriptions:
      zh: 网页和工具调用出现在同一会话但没有内容传递证据；共现不足以建立 SourceSinkFlow。
      en: A webpage and tool call occur in the same session with no evidence of content transfer; co-occurrence is insufficient for SourceSinkFlow.
      ja: ウェブとツール呼出しが同じセッションにあるだけで内容伝達証拠がなければ、SourceSinkFlow は成立しません。
    field_values:
      flow_id: null
      version: null
      flow_mode: potential
      scope:
        session_id: session-44
        run_id: run-99
      source_role_id: null
      sink_role_id: null
      ordered_step_refs:
        - webpage://W-9
        - tool-call://T-9
      evidence_edge_ids: []
      valid_from: 2026-07-14T11:00:00.000Z
      valid_until: null
    related_node_ids:
      - SourceSinkFlow
      - DetectionActivity
      - TaintPropagation
    related_relation_ids: []
    expected_result:
      zh: 验证器不得把该记录归入 SourceSinkFlow；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as SourceSinkFlow; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を SourceSinkFlow に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含只有来源和接收方但没有中间证据的猜测，也不包含单次 TaintPropagation 事件。
      en: Excludes guesses with source and sink but no intermediate evidence and excludes a single TaintPropagation event.
      ja: 出所と受け先だけで中間証拠のない推測や、単一の TaintPropagation イベントは含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-source-sink-flow-019
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: SourceSinkFlow-records-TaintPropagation
    predicate: records
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 记录污点传播事件
      en: records taint propagation
      ja: 汚染伝播イベントを記録する
    definitions:
      zh: 处于 observed 模式的 SourceSinkFlow 在其有序步骤和证据边明确引用某次 TaintPropagation，并且传播事件的源端、目标端、转换、时间与范围映射均与路径步骤一致时，记录该传播事件。potential 流只描述可达路径，不能据此断言已经发生传播。
      en: A SourceSinkFlow in observed mode records a TaintPropagation when its ordered steps and evidence edges explicitly reference that propagation occurrence and the event's source, target, transformation, time, and span mapping align with the path step. A potential flow describes reachability only and cannot assert that propagation occurred.
      ja: observed mode の SourceSinkFlow は、有序 step と evidence edge が特定 TaintPropagation occurrence を明示参照し、event の source・target・transformation・time・span mapping が path step と一致する場合、その伝播 event を記録します。potential flow は到達可能性だけを表し、伝播発生を断言できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一条 observed 流可记录零个或多个实际传播步骤，同一传播事件也可能被多个面向不同汇点的分析流引用，因此不施加全局基数。
      en: An observed flow may record zero or more actual propagation steps, and one propagation event may be referenced by analyses for different sinks, so no universal cardinality applies.
      ja: 一つの observed flow が複数の実 propagation step を記録でき、一つの event が異なる sink 向け分析 flow から参照され得るため、一律の基数は課しません。
    inverse_reading:
      predicate: recorded_in
      labels:
        zh: 记录于来源—汇点流
        en: recorded in source-sink flow
        ja: 出所―シンクフローに記録される
    conditions:
      - id: SourceSinkFlow-records-TaintPropagation-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when flow_mode is observed, ordered_step_refs explicitly contains the propagation event ID, and the event's source and target entity versions, transformation, time, and span or class transition align with the flow evidence; potential reachability or co-occurrence is insufficient.
        explanations:
          zh: 仅当 flow_mode=observed、有序步骤明确包含传播事件 ID，且事件的源/目标实体版本、转换、时间以及范围或类别变化与流证据一致时建立此边；潜在可达性或共现均不足以成立。
          en: Assert this edge only when flow_mode is observed, the ordered steps explicitly contain the propagation event ID, and the event's source and target versions, transformation, time, and span or class transition align with the flow evidence; potential reachability or co-occurrence is insufficient.
          ja: flow_mode=observed で、有序 step が propagation event ID を明示的に含み、event の source/target version・transformation・time・span または class transition が flow evidence と一致する場合だけこの辺を成立させます。潜在到達性や共起では不十分です。
        source_claims:
          - claim-source-sink-flow-020
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: SourceSinkFlow-records-TaintPropagation-example-positive-001
        kind: positive
        labels:
          zh: 观察到的摘要传播步骤
          en: Observed summarization propagation step
          ja: 観測済み要約伝播ステップ
        scenario_id: null
        descriptions:
