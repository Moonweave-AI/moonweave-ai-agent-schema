source_claims:
  - id: claim-source-sink-flow-001
    source: eng-security-mcp-nsa-2026
    supports: NSA describes chained MCP processes where one agent's output becomes another's input and requires a traceable action sequence with source information; SourceSinkFlow captures that evidence-backed path.
    locator: Security concerns > Poisoning output for downstream automation, p. 8; Recommendations > logging and detection, p. 12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-002
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Entity's specialization and revision identities. Moonweave gives the logical path an ID independent of its record version.
    locator: PROV-O Recommendation > §5.5.1 specializationOf and §5.5.3 wasRevisionOf
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-003
    source: eng-ont-prov-o
    supports: PROV-O wasRevisionOf represents a later entity as a revision of an earlier one while preserving distinct identity. Moonweave versions each evidentiary path record accordingly.
    locator: PROV-O Recommendation > §5.5.3 wasRevisionOf
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-004
    source: lit-security-ipiguard
    supports: IPIGuard uses a tool-dependency graph to reason about paths exposed to indirect prompt injection. Moonweave calls an evidenced dependency path potential until runtime transfer is observed.
    locator: IPIGuard (EMNLP 2025) > Tool Dependency Graph construction and defense design
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-source-sink-flow-005
    source: eng-security-mcp-nsa-2026
    supports: NSA requires traceable logging of chained agent actions, exact identities, inputs, outputs, and hashes. Moonweave reserves observed for a path backed by those concrete records.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-006
    source: eng-security-mcp-nsa-2026
    supports: NSA distinguishes possible chained-execution exposure from traceable observed activity. Moonweave makes that epistemic boundary explicit as potential versus observed.
    locator: NSA MCP Security Design Considerations > Poisoning output for downstream automation, p. 8; logging, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-007
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends explicit trust zones and per-session traceability rather than implicit trust across MCP components. Moonweave records the scope in which a source-sink role assignment is valid.
    locator: NSA MCP Security Design Considerations > Recommendations > Design for boundaries and Instrument for logging, pp. 9, 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-008
    source: eng-security-mcp-nsa-2026
    supports: NSA describes untrusted external and tool output as sources of downstream influence but does not make them permanently unsafe types. Moonweave binds the source role to one scoped path.
    locator: NSA MCP Security Design Considerations > Security concerns > Poisoning output for downstream automation, pp. 8-9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-009
    source: eng-security-mcp-nsa-2026
    supports: NSA identifies tool invocation, credentialed actions, and downstream automation as protected consequence points. Moonweave binds one explicit sink role within the scoped path.
    locator: NSA MCP Security Design Considerations > Recommendations > Validate parameters and Constrain tool execution, pp. 10-11
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-010
    source: lit-security-ipiguard
    supports: IPIGuard models indirect prompt-injection exposure through an ordered tool dependency graph. Moonweave retains concrete step references rather than collapsing the path into source and sink adjacency.
    locator: IPIGuard (EMNLP 2025) > Tool Dependency Graph and path-based defense method
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-source-sink-flow-011
    source: eng-ont-prov-o
    supports: PROV-O represents derivation through explicit usage and generation relations rather than visual proximity. Moonweave records the evidence edge for each transition in the path.
    locator: PROV-O Recommendation > §5.3.2 Derivation and qualifiedDerivation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-source-sink-flow-012
    source: eng-ont-prov-o
    supports: PROV-O supports temporal qualification of activities and entity generation. Moonweave assigns the path record an explicit validity start separate from event occurrence times.
    locator: PROV-O Recommendation > §5.3 Activities and temporal properties startedAtTime/endedAtTime
    evidence_kind: design-inference
    confidence: high
