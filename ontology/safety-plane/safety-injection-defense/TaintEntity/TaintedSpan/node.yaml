schema: moonweave.ai/ontology-node/v1
id: TaintedSpan
kind: concept
status: review
labels:
  en: tainted span
  zh: 污点片段
  ja: 汚染範囲
semantics:
  short_definition:
    zh: 在信息对象内由精确范围标识的污点承载实体。
    en: A taint-bearing entity identified by an exact range within an information object.
    ja: 情報対象内の正確な範囲で識別される汚点担体実体。
  definition:
    zh: 污点片段是一种 TaintEntity，用字符、字节、token、JSON Pointer、表格单元格或时间区间等可复现定位描述对象内的危险部分，并记录污点类别和来源证据。它不是整个来源对象，也不因语义相关而自动扩展到相邻内容。
    en: A TaintedSpan is a TaintEntity locating a hazardous portion of an object reproducibly by character, byte, token, JSON Pointer, table cell, time interval, or equivalent coordinates, with taint class and source evidence. It is not the whole source object and does not expand to adjacent content merely through semantic relatedness.
    ja: 汚点範囲は、文字、バイト、token、JSON Pointer、表セル、時間区間など再現可能な座標で対象内の危険部分を特定し、汚染種別と出所証拠を記録する TaintEntity です。出所全体ではなく、意味的関連だけで隣接内容へ拡張しません。
  why_needed:
    zh: 精确范围可在保留安全内容的同时净化危险片段，并支持逐边传播。
    en: An exact span enables hazardous content to be sanitized while safe content is retained and supports edge-by-edge propagation.
    ja: 正確な範囲により安全内容を残して危険部分だけを無害化し、辺ごとの伝播を追跡できます。
  includes:
    - zh: 包含对象引用、定位坐标、污点类别、证据和坐标所对应版本。
      en: Includes an object reference, coordinates, taint class, evidence, and the object version to which coordinates apply.
      ja: 対象参照、座標、汚染種別、証拠、座標が適用される対象版を含みます。
  excludes:
    - zh: 不包含无法定位的笼统怀疑、整个来源实体或仅在另一版本有效的过期范围。
      en: Excludes unlocatable suspicion, the whole source entity, and stale coordinates valid only for another version.
      ja: 位置特定できない疑い、出所実体全体、別版だけで有効な古い座標は含みません。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - taint_id
  fields:
    - id: taint_id
      labels:
        zh: 片段污点标识
        en: span taint ID
        ja: span taint ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并复用所属 TaintEntity 的稳定赋值标识，使被标记范围可独立引用且不会与包含对象混淆。
        en: Stable assignment identifier inherited from the owning TaintEntity, making the marked range independently referenceable without confusing it with the containing object.
        ja: 親 TaintEntity の安定 assignment ID を継承し、標識範囲を包含対象と混同せず独立参照可能にします。
      allowed_values: []
      pattern: null
      example_value: taint/TS-1
      source_claims:
        - claim-tainted-span-002
    - id: containing_object_ref
      labels:
        zh: 包含对象引用
        en: containing-object reference
        ja: 包含対象参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用承载该局部范围的消息、文档、图像、音频、工具结果或结构化记录，片段不能脱离对象单独定位。
        en: Reference to the message, document, image, audio, tool result, or structured record containing the local range; a span cannot be located without its object.
        ja: 局所範囲を含む message、document、image、audio、tool result、structured record を参照し、span を対象から切り離して位置付けません。
      allowed_values: []
      pattern: null
      example_value: message://M-4
      source_claims:
        - claim-tainted-span-003
    - id: containing_object_version
      labels:
        zh: 包含对象版本
        en: containing-object version
        ja: 包含対象版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定坐标所对应的对象版本、内容摘要或事件序列，防止同一偏移在内容修改后指向不同信息。
        en: Version, content digest, or event sequence fixing the object to which the coordinates apply, preventing the same offsets from drifting after content changes.
        ja: 座標が適用される対象の版、content digest、event sequence を固定し、内容変更後に同じ offset が別情報を指す drift を防ぎます。
      allowed_values: []
      pattern: null
      example_value: sha256:hash-91
      source_claims:
        - claim-tainted-span-004
    - id: locator_kind
      labels:
        zh: 定位坐标类型
        en: locator kind
        ja: 位置座標種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明后续坐标采用字符、字节、令牌、结构路径、结构路径内字符、时间区间或空间区域中的哪一种解释。
        en: Declares whether subsequent coordinates are interpreted as characters, bytes, tokens, a structural path, characters within a structural path, a time interval, or a spatial region.
        ja: 後続座標を character、byte、token、structural path、path 内 character、time interval、spatial region のどれとして解釈するか宣言します。
      allowed_values:
        - id: TaintedSpanLocatorCharacter
          value: character
          labels:
            zh: 字符区间
            en: character range
            ja: 文字範囲
          definitions:
            zh: start_offset 与 end_offset 表示规范化文本中的 Unicode 码点位置：起点从零计数且包含，终点从零计数且不包含；二者只对 containing_object_version 固定的文本版本有效。
            en: "start_offset and end_offset identify Unicode-code-point positions in normalized text: the zero-based start is inclusive and the zero-based end is exclusive. Both apply only to the text revision fixed by containing_object_version."
            ja: start_offset と end_offset は正規化テキストの Unicode code point 位置を表し、zero-based の開始は inclusive、終了は exclusive です。両者は containing_object_version が固定するテキスト版だけに適用されます。
          status: accepted
          source_claims:
            - claim-tainted-span-005
        - id: TaintedSpanLocatorByte
          value: byte
          labels:
            zh: 字节区间
            en: byte range
            ja: byte 範囲
          definitions:
            zh: start_offset 与 end_offset 表示 containing_object_version 所固定字节流中的从零计数字节位置，起点包含、终点不包含；不得把字符索引当作字节索引。
            en: start_offset and end_offset identify zero-based positions in the byte stream fixed by containing_object_version, with an inclusive start and exclusive end; character indexes must not be substituted for byte indexes.
            ja: start_offset と end_offset は containing_object_version が固定する byte stream の zero-based 位置を示し、開始は inclusive、終了は exclusive です。文字 index を byte index として代用できません。
          status: accepted
          source_claims:
            - claim-tainted-span-006
        - id: TaintedSpanLocatorToken
          value: token
          labels:
            zh: 令牌区间
            en: token range
            ja: token 範囲
          definitions:
            zh: start_offset 与 end_offset 表示一个明确 tokenizer 修订所产生序列中的从零计数令牌位置，起点包含、终点不包含；tokenizer 标识与修订必须由 evidence_refs 固定，否则该定位值无效。
            en: start_offset and end_offset identify zero-based token positions in the sequence produced by one named tokenizer revision, with an inclusive start and exclusive end. evidence_refs must fix the tokenizer identity and revision or this locator is invalid.
            ja: start_offset と end_offset は明示された tokenizer revision が生成した列の zero-based token 位置を示し、開始は inclusive、終了は exclusive です。evidence_refs が tokenizer identity と revision を固定しない場合、この locator は無効です。
          status: accepted
          source_claims:
            - claim-tainted-span-007
        - id: TaintedSpanLocatorStructural
          value: structural
          labels:
            zh: 结构路径
            en: structural path
            ja: 構造 path
          definitions:
            zh: structural_locator 以适合对象表示的 JSON Pointer、CSS、XPath、表格单元格或等价路径精确选择一个结构区域；仅有模糊标题或关键词不构成结构定位。
            en: structural_locator selects one structural region using a representation-appropriate JSON Pointer, CSS selector, XPath, table-cell address, or equivalent path; a vague heading or keyword is not a structural locator.
            ja: structural_locator は表現に適した JSON Pointer、CSS selector、XPath、table-cell address 等で一つの構造領域を正確に選択します。曖昧な見出しや keyword だけでは構造 locator になりません。
          status: accepted
          source_claims:
            - claim-tainted-span-008
        - id: TaintedSpanLocatorCharacterWithinStructuralPath
          value: character-within-structural-path
          labels:
            zh: 结构路径内字符区间
            en: character range within a structural path
            ja: 構造 path 内文字範囲
          definitions:
            zh: 先由 structural_locator 选择结构区域，再以该区域规范化文本中的 Unicode 码点解释 start_offset（包含）与 end_offset（不包含）；偏移不得相对整个承载对象计算。
            en: structural_locator first selects a structural region, after which start_offset (inclusive) and end_offset (exclusive) are interpreted as Unicode-code-point positions in that region's normalized text; the offsets must not be counted against the whole carrier.
            ja: まず structural_locator が構造領域を選択し、その領域の正規化テキスト内 Unicode code point として start_offset（inclusive）と end_offset（exclusive）を解釈します。offset を carrier 全体に対して数えてはなりません。
          status: accepted
          source_claims:
            - claim-tainted-span-009
        - id: TaintedSpanLocatorTimeInterval
          value: time-interval
          labels:
            zh: 时间区间
            en: time interval
            ja: 時間区間
          definitions:
            zh: start_offset 与 end_offset 表示从媒体对象起点计算的整数毫秒，起点包含、终点不包含；structural_locator 可进一步固定轨道，且 containing_object_version 必须固定所依据的媒体版本。
            en: start_offset and end_offset are integer milliseconds from the start of the media object, with an inclusive start and exclusive end. structural_locator may additionally fix a track, and containing_object_version must fix the media revision.
            ja: start_offset と end_offset は media object 開始からの整数 millisecond で、開始は inclusive、終了は exclusive です。structural_locator は track を追加固定でき、containing_object_version は media revision を固定しなければなりません。
          status: accepted
          source_claims:
            - claim-tainted-span-010
        - id: TaintedSpanLocatorSpatialRegion
          value: spatial-region
          labels:
            zh: 空间区域
            en: spatial region
            ja: 空間領域
          definitions:
            zh: structural_locator 记录带明确坐标系的矩形、多边形、SVG 形状或等价区域选择器；start_offset 与 end_offset 不用于该非线性定位，并且区域只对 containing_object_version 固定的媒体版本有效。
            en: structural_locator records a rectangle, polygon, SVG shape, or equivalent region selector with an explicit coordinate system. start_offset and end_offset do not apply to this non-linear locator, and the region is valid only for the media revision fixed by containing_object_version.
            ja: structural_locator は明示座標系を持つ rectangle、polygon、SVG shape 等の領域 selector を記録します。この非線形 locator に start_offset と end_offset は使わず、領域は containing_object_version が固定する media revision だけに有効です。
          status: accepted
          source_claims:
            - claim-tainted-span-011
      pattern: null
      example_value: character-within-structural-path
      source_claims:
        - claim-tainted-span-012
    - id: start_offset
      labels:
        zh: 起始偏移
        en: start offset
        ja: 開始 offset
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在声明的线性坐标系中从零开始计数的包含式起点；仅使用结构路径或空间区域时可以为空。
        en: Zero-based inclusive start in the declared linear coordinate system; it may be absent when only a structural path or spatial region is used.
        ja: 宣言した線形座標系の zero-based inclusive 開始位置で、structural path や spatial region だけを使う場合は空にできます。
      allowed_values: []
      pattern: null
      example_value: 18
      source_claims:
        - claim-tainted-span-013
    - id: end_offset
      labels:
        zh: 终止偏移
        en: end offset
        ja: 終了 offset
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在同一线性坐标系中不包含式终点，必须大于起始偏移；仅使用非线性定位时可以为空。
        en: Exclusive end in the same linear coordinate system and strictly greater than start_offset; it may be absent for a non-linear locator.
        ja: 同じ線形座標系の exclusive 終了位置で start_offset より大きくし、非線形 locator だけなら空にできます。
      allowed_values: []
      pattern: null
      example_value: 67
      source_claims:
        - claim-tainted-span-014
    - id: structural_locator
      labels:
        zh: 结构定位路径
        en: structural locator
        ja: 構造位置 path
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 用 JSON Pointer、DOM 选择器、表格单元格、媒体轨道或等价稳定路径定位包含对象内的结构区域。
        en: JSON Pointer, DOM selector, table cell, media track, or equivalent stable path locating the structural region inside the containing object.
        ja: JSON Pointer、DOM selector、table cell、media track 等の安定 path で包含対象内の構造領域を位置付けます。
      allowed_values: []
      pattern: null
      example_value: /content/2/text
      source_claims:
        - claim-tainted-span-015
    - id: taint_class
      labels:
        zh: 片段污点类别
        en: span taint class
        ja: span taint 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录精确范围所承载的安全影响类别，例如外传指令、权限升级诱导或隐藏间接指令。
        en: Security influence category carried by the exact range, such as an exfiltration instruction, privilege-escalation lure, or hidden indirect instruction.
        ja: 正確な範囲が担う exfiltration instruction、privilege-escalation lure、hidden indirect instruction 等の security influence 種別です。
      allowed_values: []
      pattern: null
      example_value: exfiltration-instruction
      source_claims:
        - claim-tainted-span-016
    - id: evidence_refs
      labels:
        zh: 片段证据引用
        en: span evidence references
        ja: span 証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明包含对象版本、坐标范围和污点类别的扫描发现、内容摘要、截图、转录或人工裁决。
        en: References to scan findings, content digests, screenshots, transcripts, or human adjudications proving object revision, coordinate range, and taint class.
        ja: 包含対象版、座標範囲、taint class を証明する scan finding、content digest、screenshot、transcript、人手 adjudication を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - finding://scan-M4-22
        - digest://message-M4/hash-91
      source_claims:
        - claim-tainted-span-017
  constraints:
    - id: tainted-span-requires-version-bound-reproducible-locator
      severity: error
      expression_language: plain
      expression: containing_object_ref and containing_object_version are present; locator_kind is declared; linear kinds require integer start_offset and end_offset with 0 <= start_offset < end_offset; structural or compound kinds require structural_locator; evidence_refs is non-empty
      explanations:
        zh: 片段必须能在固定对象版本上重现。‘文档可疑’或语义相近不是坐标；线性偏移必须同制且有序，结构和复合定位必须给出稳定路径。
        en: The span must be reproducible on a fixed object revision. 'The document is suspicious' and semantic similarity are not coordinates; linear offsets must share one ordered coordinate system, and structural or compound locators require a stable path.
        ja: span は固定対象版上で再現可能でなければなりません。「文書が疑わしい」や意味類似性は座標ではなく、線形 offset は同一系で順序付け、structural・compound locator には安定 path を要求します。
      source_claims:
        - claim-tainted-span-018
  required_relation_constraints: []
examples:
  - id: TaintedSpan-manual-positive-20260714
    kind: positive
    labels:
      zh: 污点片段正例
      en: Positive case for tainted span
      ja: 汚染範囲の正例
    scenario_id: null
    descriptions:
      zh: 消息 M-4 的 JSON Pointer /content/2/text 字符 18–67 含外传指令，并绑定消息版本 hash-91。
      en: Characters 18–67 at JSON Pointer /content/2/text in message M-4 contain an exfiltration instruction and are bound to message version hash-91.
      ja: メッセージ M-4 の JSON Pointer /content/2/text の文字 18–67 に流出指示があり、版 hash-91 へ結び付けます。
    field_values:
      assignment_basis: finding://scan-M4-22
      valid_from: 2026-07-14T10:17:00.000Z
      taint_id: taint/TS-1
      containing_object_ref: message://M-4
      containing_object_version: sha256:hash-91
      locator_kind: character-within-structural-path
      start_offset: 18
      end_offset: 67
      structural_locator: /content/2/text
      taint_class: exfiltration-instruction
      evidence_refs:
        - finding://scan-M4-22
        - digest://message-M4/hash-91
    related_node_ids:
      - TaintedSpan
      - TaintEntity
    related_relation_ids:
      - TaintedSpan-is_a-TaintEntity
    expected_result:
      zh: 验证器应把该记录识别为 TaintedSpan，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as TaintedSpan while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を TaintedSpan と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含对象引用、定位坐标、污点类别、证据和坐标所对应版本。
      en: Includes an object reference, coordinates, taint class, evidence, and the object version to which coordinates apply.
      ja: 対象参照、座標、汚染種別、証拠、座標が適用される対象版を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tainted-span-019
  - id: TaintedSpan-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 污点片段边界例
      en: Boundary case for tainted span
      ja: 汚染範囲の境界例
    scenario_id: null
    descriptions:
      zh: 审查员写“这份文档可疑”却没有页码、范围或结构定位；不足以建立 TaintedSpan。
      en: A reviewer writes “this document is suspicious” without a page, range, or structural locator; that is insufficient for TaintedSpan.
      ja: 審査者がページ、範囲、構造位置なしに「この文書は疑わしい」と書くだけでは TaintedSpan を立てられません。
    field_values:
      taint_id: null
      containing_object_ref: document://review-target-7
      containing_object_version: null
      locator_kind: null
      start_offset: null
      end_offset: null
      structural_locator: null
      taint_class: null
      evidence_refs:
        - review-note://suspicious-document
    related_node_ids:
      - TaintedSpan
      - TaintEntity
    related_relation_ids:
      - TaintedSpan-is_a-TaintEntity
    expected_result:
      zh: 验证器不得把该记录归入 TaintedSpan；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as TaintedSpan; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を TaintedSpan に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含无法定位的笼统怀疑、整个来源实体或仅在另一版本有效的过期范围。
      en: Excludes unlocatable suspicion, the whole source entity, and stale coordinates valid only for another version.
      ja: 位置特定できない疑い、出所実体全体、別版だけで有効な古い座標は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tainted-span-020
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaintedSource
    shared_parent_concept_id: TaintEntity
    differentia:
      zh: 已审查兄弟区分：父节点 TaintEntity：TaintedSpan（semantic kind=entity，骨架 TaintedSpan-is_a-TaintEntity）；TaintedSource（semantic kind=entity，骨架 TaintedSource-is_a-TaintEntity）。双端条件：TaintedSpan 条件：“污点片段是以如下事实为区分特征的污点承载实体：它标识消息、来源、检索分块、工具结果或输出片段中携带污点内容的精确范围，用于后续来源到接收方分析”；TaintedSource 条件：“污点来源属于污点承载实体，区别于其他同类对象的条件是：它标识不可信或策略敏感的来源；其内容在进入上下文、记忆、工具参数、网络请求或对外披露前必须被追踪”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent TaintEntity: TaintedSpan (semantic kind=entity, backbone TaintedSpan-is_a-TaintEntity); TaintedSource (semantic kind=entity, backbone TaintedSource-is_a-TaintEntity). Endpoint conditions: TaintedSpan condition: “Tainted span is a taint-bearing entity; its differentiating condition is that it identifies the exact span of message, source, retrieved chunk, tool result, or output segment that carries tainted content for downstream source-sink analysis”; TaintedSource condition: “Tainted source is a taint-bearing entity whose defining condition is that it identifies an untrusted or policy-sensitive source whose content must be tracked before it enters context, memory, a tool argument, a network request, or disclosed output”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 TaintEntity：TaintedSpan（semantic kind=entity、バックボーン TaintedSpan-is_a-TaintEntity）；TaintedSource（semantic kind=entity、バックボーン TaintedSource-is_a-TaintEntity）。両端条件：TaintedSpan の条件：「汚染範囲は汚染保持実体の一種であり、次の条件で区別されます：それは、メッセージ、出典、検索チャンク、ツール結果、出力セグメントのうち汚染内容を含む正確な範囲を識別し、後続の送信元から受信先への分析に使います」；TaintedSource の条件：「汚染出典は汚染保持実体のうち、次の事実を定義条件とする対象です：それは、不信頼またはポリシー上機微な出典を識別し、その内容がコンテキスト、メモリ、ツール引数、ネットワーク要求、開示出力へ入る前に追跡される必要があることを示します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-tainted-span-021
