source_claims:
  - id: claim-tainted-span-001
    source: eng-security-owasp-llm01-2025
    supports: OWASP notes that injection input may be imperceptible to humans and hidden across modalities; Moonweave requires the detected portion to be explicitly locatable as TaintedSpan.
    locator: LLM01 description and multimodal risk, lines 53–75; imperceptible or hidden inputs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-002
    source: eng-ont-prov-o
    supports: PROV-O specialization can describe a more specific aspect while retaining traceable identity. Moonweave gives the localized taint assignment a stable identity distinct from its containing object.
    locator: PROV-O Recommendation > §5.5.1 specializationOf and entity identity
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-003
    source: eng-security-owasp-llm01-2025
    supports: OWASP describes prompt injection embedded in text, images, documents, and split payloads. Moonweave records the concrete carrier object before locating the hazardous portion within it.
    locator: OWASP LLM01:2025 Prompt Injection > imperceptible inputs, payload splitting, and multimodal injection scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends recording exact payload hashes and identities for later investigation. Moonweave binds every locator to the content revision actually inspected.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-005
    source: eng-std-w3c-web-annotation-model
    supports: W3C TextPositionSelector defines a normalized-text range with zero-based inclusive start and exclusive end counted in Unicode code points. Moonweave maps that selector semantics to locator_kind=character and additionally binds it to containing_object_version.
    locator: W3C Web Annotation Data Model §§4.2.4-4.2.5, character model and Text Position Selector
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-006
    source: eng-std-w3c-web-annotation-model
    supports: W3C DataPositionSelector defines start and end positions over a byte stream rather than character positions. Moonweave maps that distinction to locator_kind=byte and fixes the selected stream by containing_object_version.
    locator: W3C Web Annotation Data Model §4.2.6 Data Position Selector
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-007
    source: eng-std-w3c-web-annotation-model
    supports: W3C requires a selector mechanism whose coordinate interpretation is explicit for the representation being selected. Token indexing is a Moonweave extension of that selector principle, so the ontology additionally requires the tokenizer identity and revision as evidence.
    locator: W3C Web Annotation Data Model §§1.3.1 and 4.2, conformance requirements and selector model
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-008
    source: eng-std-w3c-web-annotation-model
    supports: W3C defines CSS and XPath Selectors as explicit paths to elements or content in structured representations. Moonweave generalizes those representation-specific selectors to locator_kind=structural without treating a path as the selected content itself.
    locator: W3C Web Annotation Data Model §§4.2.2-4.2.3, CSS Selector and XPath Selector
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-009
    source: eng-std-w3c-web-annotation-model
    supports: W3C allows one Selector to refine another and separately defines structural selectors and character-position selectors. Moonweave maps that two-stage selection to locator_kind=character-within-structural-path.
    locator: W3C Web Annotation Data Model §§4.2.2-4.2.5 and 4.2.9 Refinement of Selection
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-010
    source: eng-std-w3c-web-annotation-model
    supports: W3C FragmentSelector demonstrates selecting timed multimedia segments with a temporal fragment. Moonweave standardizes its internal time-interval offsets as integer milliseconds while retaining the selected media revision and optional track path.
    locator: W3C Web Annotation Data Model §4.2.1 Fragment Selector, timed-media example t=30,60
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-011
    source: eng-std-w3c-web-annotation-model
    supports: W3C SvgSelector defines a shape relative to source-resource dimensions for selecting a spatial area. Moonweave maps that selector family to locator_kind=spatial-region and requires an explicit coordinate system in structural_locator.
    locator: W3C Web Annotation Data Model §4.2.7 SVG Selector
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-012
    source: eng-security-owasp-llm01-2025
    supports: OWASP notes that injection can be imperceptible to humans and can occur across text and image modalities. Moonweave therefore declares the coordinate system needed to reproduce each localized finding.
    locator: "OWASP LLM01:2025 Prompt Injection > Description and Scenario #7 Multimodal Injection"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-013
    source: eng-security-owasp-llm01-2025
    supports: OWASP documents hidden and split injection payloads whose hazardous portion may be smaller than the carrier. Moonweave records the exact beginning of a linear affected range.
    locator: OWASP LLM01:2025 Prompt Injection > payload splitting, adversarial suffix, and multimodal scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-014
    source: eng-security-owasp-llm01-2025
    supports: OWASP documents localized hidden and split payloads. Moonweave records an unambiguous exclusive end so the affected interval can be reproduced without absorbing adjacent content.
    locator: OWASP LLM01:2025 Prompt Injection > payload splitting, adversarial suffix, and multimodal scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-015
    source: eng-proto-mcp-2025-spec
    supports: The MCP specification exchanges structured content and tool results whose fields can carry untrusted data. Moonweave retains a stable structural path to the exact field inspected.
    locator: Model Context Protocol 2025-06-18 specification > Server Features > Tools > tool result content and structuredContent
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-016
    source: eng-security-owasp-llm01-2025
    supports: OWASP lists distinct prompt-injection impacts including disclosure, unauthorized access, arbitrary commands, and decision manipulation. Moonweave classifies the localized influence explicitly.
    locator: OWASP LLM01:2025 Prompt Injection > impact list and attack scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-017
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends preserving exact payload, identity, integrity, and detection context for investigation. Moonweave attaches those records to each localized assignment.
    locator: NSA MCP Security Design Considerations > Poor or missing audit logs, pp. 7-8; Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-018
    source: eng-security-owasp-llm01-2025
    supports: OWASP explains that injected input may be hidden or imperceptible and embedded in one modality or portion. Moonweave requires a reproducible locator rather than broad suspicion of the whole carrier.
    locator: "OWASP LLM01:2025 Prompt Injection > Description, payload splitting, and Scenario #7 Multimodal Injection"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-019
    source: eng-security-owasp-llm01-2025
    supports: "OWASP notes that injection input may be imperceptible to humans and hidden across modalities; Moonweave requires the detected portion to be explicitly locatable as TaintedSpan. The positive case specifically tests this distinction: Characters 18–67 at JSON Pointer /content/2/text in message M-4 contain an exfiltration instruction and are bound to message version hash-91."
    locator: LLM01 description and multimodal risk, lines 53–75; imperceptible or hidden inputs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-020
    source: eng-security-owasp-llm01-2025
    supports: "OWASP notes that injection input may be imperceptible to humans and hidden across modalities; Moonweave requires the detected portion to be explicitly locatable as TaintedSpan. The boundary case specifically tests this distinction: A reviewer writes “this document is suspicious” without a page, range, or structural locator; that is insufficient for TaintedSpan."
    locator: LLM01 description and multimodal risk, lines 53–75; imperceptible or hidden inputs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-021
    source: eng-security-mcp-nsa-2026
    supports: NSA calls for inspecting tool output to identify injected prompts or code elements that may alter downstream behavior. Moonweave records the exact hazardous range as TaintedSpan while keeping the containing message, resource, result, or memory item as TaintedSource; evidence for one endpoint must not be used as identity evidence for the other. This granularity is a Moonweave design inference.
    locator: Recommendations > Filter and monitor output pipelines and chained execution, inspection of each MCP tool output (pp. 12-13)
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tainted-span-022
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends inspecting outputs for injected prompts or code elements before passing them onward. Moonweave uses TaintedSpan when the taint-bearing entity is an exact addressable range rather than an entire source.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 11–12, ‘Filter and monitor output pipelines and chained execution’
    evidence_kind: design-inference
    confidence: high
    review_status: pending
