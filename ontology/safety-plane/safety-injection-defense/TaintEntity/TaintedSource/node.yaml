schema: moonweave.ai/ontology-node/v1
id: TaintedSource
kind: concept
status: accepted
labels:
  en: taint-marked source object
  zh: 整体污点来源对象
  ja: 全体 taint 付与済み出所対象
semantics:
  short_definition:
    zh: 被赋予污点标识并作为可追踪影响起点的来源实体。
    en: A source entity assigned a taint identity as the traceable origin of an influence.
    ja: 追跡可能な影響起点として汚染 ID を付与された出所実体。
  definition:
    zh: 污点来源是一种 TaintEntity，代表带稳定身份的消息、资源、工具输出、记忆项或其他来源对象，因具体证据或策略被赋予污点类别和起始时间。它不同于流中的 RiskSource 角色，也不同于该来源内部的 TaintedSpan。
    en: A TaintedSource is a TaintEntity representing an identity-bearing message, resource, tool output, memory item, or other source object assigned a taint class and start time by evidence or policy. It differs from the flow-scoped RiskSource role and from a TaintedSpan inside the source.
    ja: 汚点出所は、メッセージ、資源、ツール出力、記憶項目などの同一性を持つ出所対象へ、証拠または方針により汚染種別と開始時刻を付与した TaintEntity です。流内の RiskSource 役割や、出所内部の TaintedSpan とは異なります。
  why_needed:
    zh: 稳定来源身份让多个范围和派生对象共享同一溯源起点，而不把角色当实体。
    en: A stable source identity lets multiple spans and derived objects share one provenance origin without treating a role as an entity.
    ja: 安定した出所同一性により、役割を実体化せず複数範囲と派生対象が同じ来歴起点を共有できます。
  includes:
    - zh: 包含可引用来源对象、污点 ID、污点类别、赋值依据和起始时间。
      en: Includes a referenceable source object, taint ID, taint class, assignment basis, and start time.
      ja: 参照可能な出所対象、汚染 ID、汚染種別、付与根拠、開始時刻を含みます。
  excludes:
    - zh: 不包含只有某个局部范围被标记而整体未赋污点的来源，也不包含流角色。
      en: Excludes a source whose whole identity is not tainted when only one local span is marked, and excludes flow roles.
      ja: 局所範囲だけが標識され全体へ汚染 ID がない出所や、流役割は含みません。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - taint_id
  fields:
    - id: taint_id
      labels:
        zh: 污点标识
        en: taint ID
        ja: taint ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并复用所属 TaintEntity 的稳定赋值标识，使整个来源对象的污点状态可被独立引用和追踪。
        en: Stable assignment identifier inherited from the owning TaintEntity, making the whole-source taint state independently referenceable and traceable.
        ja: 親 TaintEntity の安定 assignment ID を継承し、出所対象全体の taint 状態を独立参照・追跡可能にします。
      allowed_values: []
      pattern: null
      example_value: taint/T9
      source_claims:
        - claim-tainted-source-002
    - id: bearer_ref
      labels:
        zh: 整体承载对象引用
        en: whole-bearer reference
        ja: 全体担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被整体赋予污点的消息、资源、检索块、工具结果或记忆对象，不引用其中的局部字符范围。
        en: Reference to the message, resource, retrieved chunk, tool result, or memory object tainted as a whole, not to a local character range inside it.
        ja: 全体へ taint を付与した message、resource、retrieved chunk、tool result、memory object を参照し、内部の局所文字範囲は指しません。
      allowed_values: []
      pattern: null
      example_value: tool-result://R-5
      source_claims:
        - claim-tainted-source-003
    - id: bearer_version
      labels:
        zh: 承载对象版本
        en: bearer version
        ja: 担体版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定接受整体污点赋值的对象版本、内容摘要或事件序列，避免赋值无意漂移到后续干净修订。
        en: Version, content digest, or event sequence fixing the object that received the whole-object assignment so it cannot drift to a later clean revision.
        ja: 全体 taint 付与を受けた対象の版、content digest、event sequence を固定し、後の clean revision へ付与がずれないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:r5-8c7d
      source_claims:
        - claim-tainted-source-004
    - id: whole_object_assignment_basis
      labels:
        zh: 整体赋值依据
        en: whole-object assignment basis
        ja: 全体付与根拠
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用明确说明为何整个固定版本均受影响的发现、策略或裁决；只证明一个局部片段时不得使用本字段。
        en: Reference to the finding, policy, or adjudication explicitly establishing why the entire fixed bearer version is affected; local-span evidence is insufficient.
        ja: 固定担体版の全体が影響対象である理由を明示する finding、policy、adjudication を参照し、局所 span の証拠だけでは使えません。
      allowed_values: []
      pattern: null
      example_value: policy-decision://remote-tool-output/deny-untrusted-origin
      source_claims:
        - claim-tainted-source-005
    - id: taint_class
      labels:
        zh: 整体污点类别
        en: whole-object taint class
        ja: 全体 taint 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录适用于整个承载版本的安全影响类别，并与赋值依据中的判定一致，不把外部来源直接等同于恶意。
        en: Security influence category applying to the complete bearer revision and agreeing with the assignment basis; external origin alone is not equivalent to maliciousness.
        ja: 担体版全体へ適用する security influence 種別で、付与根拠の判定と一致させ、外部出所だけを malicious と同一視しません。
      allowed_values: []
      pattern: null
      example_value: untrusted-output
      source_claims:
        - claim-tainted-source-006
    - id: valid_from
      labels:
        zh: 整体赋值有效起点
        en: whole assignment valid from
        ja: 全体付与有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 整体污点状态对指定承载版本开始生效的 UTC 时间，不以检测记录后来进入存储的时间替代。
        en: UTC instant when the whole-object taint state becomes effective for the specified bearer revision, distinct from later record-ingestion time.
        ja: 指定担体版への全体 taint 状態が発効する UTC 時刻で、検出記録が後に保存された時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:16:30.000Z
      source_claims:
        - claim-tainted-source-007
    - id: valid_until
      labels:
        zh: 整体赋值有效终点
        en: whole assignment valid until
        ja: 全体付与有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 复核、替换或处置使整个对象版本的污点状态终止的 UTC 时间；仍有效时必须为空。
        en: UTC instant when review, replacement, or remediation ends the taint state for the complete bearer revision; absent while active.
        ja: review、replacement、remediation で担体版全体の taint 状態が終了する UTC 時刻で、有効中は空にします。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-tainted-source-008
    - id: evidence_refs
      labels:
        zh: 整体赋值证据
        en: whole-assignment evidence
        ja: 全体付与証拠
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明对象身份、固定版本、全覆盖判定与安全类别的内容摘要、扫描发现和策略决策记录。
        en: References to content digests, scan findings, and policy decisions proving bearer identity, fixed revision, full-object coverage, and security class.
        ja: 担体 identity、固定 revision、全体 coverage、security class を証明する content digest、scan finding、policy decision を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - digest://tool-result-R5/sha256-r5-8c7d
        - finding://remote-origin-policy-9
      source_claims:
        - claim-tainted-source-009
  constraints:
    - id: tainted-source-requires-whole-object-coverage
      severity: error
      expression_language: plain
      expression: bearer_ref and bearer_version identify one complete object revision; whole_object_assignment_basis explicitly covers that entire revision; evidence_refs is non-empty; valid_until is null or valid_until >= valid_from
      explanations:
        zh: 只有当依据覆盖整个固定版本时才实例化 TaintedSource；若证据仅定位局部字符、令牌或结构路径，应实例化 TaintedSpan。
        en: Instantiate TaintedSource only when the basis covers the complete fixed bearer revision. Evidence confined to characters, tokens, or a structural path belongs to TaintedSpan.
        ja: 根拠が固定担体版全体を覆う場合だけ TaintedSource を生成し、文字、token、structural path の局所証拠なら TaintedSpan を生成します。
      source_claims:
        - claim-tainted-source-010
  required_relation_constraints: []
examples:
  - id: TaintedSource-manual-positive-20260714
    kind: positive
    labels:
      zh: 污点来源正例
      en: Positive case for tainted source
      ja: 汚染出典の正例
    scenario_id: null
    descriptions:
      zh: 远程工具结果 R-5 经策略标记 taint_id=T9、class=untrusted-output，作为后续派生追踪起点。
      en: Remote tool result R-5 is assigned taint_id=T9 and class=untrusted-output as the origin for downstream derivation tracking.
      ja: 遠隔ツール結果 R-5 に taint_id=T9、class=untrusted-output を付与し、下流派生追跡の起点とします。
    field_values:
      assignment_basis: policy-decision://remote-tool-output/deny-untrusted-origin
      taint_id: taint/T9
      bearer_ref: tool-result://R-5
      bearer_version: sha256:r5-8c7d
      whole_object_assignment_basis: policy-decision://remote-tool-output/deny-untrusted-origin
      taint_class: untrusted-output
      valid_from: 2026-07-14T10:16:30.000Z
      valid_until: null
      evidence_refs:
        - digest://tool-result-R5/sha256-r5-8c7d
        - finding://remote-origin-policy-9
    related_node_ids:
      - TaintedSource
      - TaintEntity
    related_relation_ids:
      - TaintedSource-is_a-TaintEntity
    expected_result:
      zh: 验证器应把该记录识别为 TaintedSource，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as TaintedSource while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を TaintedSource と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含可引用来源对象、污点 ID、污点类别、赋值依据和起始时间。
      en: Includes a referenceable source object, taint ID, taint class, assignment basis, and start time.
      ja: 参照可能な出所対象、汚染 ID、汚染種別、付与根拠、開始時刻を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tainted-source-011
  - id: TaintedSource-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 污点来源边界例
      en: Boundary case for tainted source
      ja: 汚染出典の境界例
    scenario_id: null
    descriptions:
      zh: R-6 只有第 40–55 字符被检测为危险，其他部分可信且没有整体污点赋值；应实例化 TaintedSpan，不是 TaintedSource。
      en: Only characters 40–55 of R-6 are hazardous while the rest is trusted and no source-level taint is assigned; instantiate TaintedSpan, not TaintedSource.
      ja: R-6 の文字 40–55 だけが危険で残りが信頼され、出所全体へ汚染を付与しないなら、TaintedSpan を立て TaintedSource にはしません。
    field_values:
      taint_id: null
      bearer_ref: tool-result://R-6
      bearer_version: sha256:r6-151e
      whole_object_assignment_basis: null
      taint_class: indirect-instruction
      valid_from: null
      valid_until: null
      evidence_refs:
        - finding://R6/chars-40-55
    related_node_ids:
      - TaintedSource
      - TaintEntity
    related_relation_ids:
      - TaintedSource-is_a-TaintEntity
    expected_result:
      zh: 验证器不得把该记录归入 TaintedSource；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as TaintedSource; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を TaintedSource に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含只有某个局部范围被标记而整体未赋污点的来源，也不包含流角色。
      en: Excludes a source whose whole identity is not tainted when only one local span is marked, and excludes flow roles.
      ja: 局所範囲だけが標識され全体へ汚染 ID がない出所や、流役割は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tainted-source-012
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: TaintedSpan
    shared_parent_concept_id: TaintEntity
    differentia:
      zh: 已审查兄弟区分：父节点 TaintEntity：TaintedSource（semantic kind=entity，骨架 TaintedSource-is_a-TaintEntity）；TaintedSpan（semantic kind=entity，骨架 TaintedSpan-is_a-TaintEntity）。双端条件：TaintedSource 条件：“污点来源属于污点承载实体，区别于其他同类对象的条件是：它标识不可信或策略敏感的来源；其内容在进入上下文、记忆、工具参数、网络请求或对外披露前必须被追踪”；TaintedSpan 条件：“污点片段是以如下事实为区分特征的污点承载实体：它标识消息、来源、检索分块、工具结果或输出片段中携带污点内容的精确范围，用于后续来源到接收方分析”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent TaintEntity: TaintedSource (semantic kind=entity, backbone TaintedSource-is_a-TaintEntity); TaintedSpan (semantic kind=entity, backbone TaintedSpan-is_a-TaintEntity). Endpoint conditions: TaintedSource condition: “Tainted source is a taint-bearing entity whose defining condition is that it identifies an untrusted or policy-sensitive source whose content must be tracked before it enters context, memory, a tool argument, a network request, or disclosed output”; TaintedSpan condition: “Tainted span is a taint-bearing entity; its differentiating condition is that it identifies the exact span of message, source, retrieved chunk, tool result, or output segment that carries tainted content for downstream source-sink analysis”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 TaintEntity：TaintedSource（semantic kind=entity、バックボーン TaintedSource-is_a-TaintEntity）；TaintedSpan（semantic kind=entity、バックボーン TaintedSpan-is_a-TaintEntity）。両端条件：TaintedSource の条件：「汚染出典は汚染保持実体のうち、次の事実を定義条件とする対象です：それは、不信頼またはポリシー上機微な出典を識別し、その内容がコンテキスト、メモリ、ツール引数、ネットワーク要求、開示出力へ入る前に追跡される必要があることを示します」；TaintedSpan の条件：「汚染範囲は汚染保持実体の一種であり、次の条件で区別されます：それは、メッセージ、出典、検索チャンク、ツール結果、出力セグメントのうち汚染内容を含む正確な範囲を識別し、後続の送信元から受信先への分析に使います」。一方の成立は他方を証明しません。
    source_claims:
      - claim-tainted-source-013
parent_relation:
  id: TaintedSource-is_a-TaintEntity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 污点来源 是一种 污点承载实体。区分特征：污点来源是因来源级不可信或敏感标记而成为污点承载实体的一类 TaintEntity。
    en: "tainted source is a kind of taint-bearing entity. Reviewed differentia: TaintedSource is a TaintEntity distinguished by source-level untrusted or sensitive marking."
    ja: 汚染出典 は 汚染保持実体 の一種です。審査済みの種差：TaintedSource は起点レベルの不信・機微標識で区別される TaintEntity です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TaintedSource-is_a-TaintEntity-example-positive-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive example of is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: 第三方 HTTP 响应 response-5 在进入工具链时被整体标记为 untrusted，污点记录引用其完整内容摘要。
        en: Third-party HTTP response response-5 is marked untrusted as a whole when entering the toolchain, and the taint record references its full content digest.
        ja: 第三者 HTTP 応答 response-5 がツールチェーン入口で全体を untrusted と標識され、汚染記録が全内容ダイジェストを参照します。
      field_values: {}
      related_node_ids:
        - TaintedSource
        - TaintEntity
      related_relation_ids:
        - TaintedSource-is_a-TaintEntity
      expected_result:
        zh: 将 response-5 的污点承载身份分类为 TaintedSource 和 TaintEntity。
        en: Classify response-5's taint-bearing identity as TaintedSource and TaintEntity.
        ja: response-5 の汚染保持同一性を TaintedSource かつ TaintEntity と分類します。
      why_valid_or_invalid:
        zh: 污点作用于完整来源对象并由来源级信任标记决定，而不是仅作用于内部范围。
        en: The taint applies to the complete source object and is determined by source-level trust marking, not only an internal span.
        ja: 汚染は完全な由来対象へ適用され、内部範囲だけでなく由来レベルの信頼標識で決まります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-tainted-source-014
    - id: TaintedSource-is_a-TaintEntity-example-boundary-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: 响应来自外部服务，但通过签名与来源策略验证，且没有任何污点标签或敏感标记。
        en: A response originates externally but passes signature and provenance policy checks and carries no taint or sensitivity marking.
        ja: 応答は外部由来ですが、署名・来歴方針検証を通過し、汚染・機微標識がありません。
      field_values: {}
      related_node_ids:
        - TaintedSource
        - TaintEntity
      related_relation_ids:
        - TaintedSource-is_a-TaintEntity
      expected_result:
        zh: 不得仅依据外部来源把它归为 TaintedSource。
        en: Do not classify it as TaintedSource solely from external origin.
        ja: 外部由来だけで TaintedSource と分類してはいけません。
      why_valid_or_invalid:
        zh: 外部性触发审查，但 TaintedSource 要求明确的不可信或敏感承载状态。
        en: External origin triggers review, but TaintedSource requires an explicit untrusted or sensitive carrier state.
        ja: 外部性は審査を促しますが、TaintedSource には明示的な不信・機微保持状態が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-tainted-source-014
  source_claims:
    - claim-tainted-source-014
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
