source_claims:
  - id: claim-poisoned-tool-description-001
    source: eng-security-mcp-nsa-2026
    supports: NSA documents malicious MCP tool descriptions manipulating client behavior and changing from benign to malicious instructions after subsequent use.
    locator: Security concerns > Exploitation via messaging platforms and tool-description manipulation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-002
    source: eng-ont-prov-o
    supports: PROV-O permits a specific Entity to retain identity while being specialized from a broader entity description. Moonweave gives the poisoned definition fragment its own inherited content identity.
    locator: PROV-O Recommendation > §5.2.1 Entity and §5.5.1 specializationOf
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-003
    source: eng-proto-mcp-2025-spec
    supports: MCP defines Tool as the structured carrier of name, description, inputSchema, outputSchema, and annotations. Moonweave references that containing definition rather than treating the fragment as the tool itself.
    locator: MCP 2025-11-25 Specification > Schema Reference > Tool
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-004
    source: eng-security-mcp-nsa-2026
    supports: NSA describes malicious tool descriptions that may switch after later interactions. Moonweave binds a poisoned fragment to the exact definition version observed at that interaction.
    locator: NSA MCP Security Design Considerations > Security concerns > Tool-description manipulation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-005
    source: eng-security-mcp-nsa-2026
    supports: NSA directs MCP deployments to define separate trust zones and authenticate servers rather than granting implicit trust. Moonweave therefore retains the exact source-server reference.
    locator: NSA MCP Security Design Considerations > Recommendations > Design for boundaries and Enforce authentication, pp. 9-10
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-006
    source: eng-proto-mcp-2025-spec
    supports: MCP Tool exposes separate structured fields for description, schemas, and annotations. Moonweave uses a field path to identify which first-party protocol field carries the payload.
    locator: MCP 2025-11-25 Specification > Schema Reference > Tool and ToolAnnotations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-007
    source: eng-security-mcp-nsa-2026
    supports: NSA identifies semantic manipulation inside tool descriptions as the attack surface. Moonweave narrows that observation to the exact description span carrying the manipulative instruction.
    locator: NSA MCP Security Design Considerations > Security concerns > Tool-description manipulation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-008
    source: eng-proto-mcp-2025-spec
    supports: MCP descriptions and annotations communicate intended tool behavior to clients, while the specification warns that annotations are untrusted unless the server is trusted. Moonweave retains the declared capability as reviewable text.
    locator: MCP 2025-11-25 Specification > Schema Reference > Tool.description and ToolAnnotations security note
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-009
    source: eng-security-mcp-nsa-2026
    supports: NSA warns that MCP metadata can semantically manipulate clients and that observed behavior must be monitored. Moonweave keeps observed capability separate from the declaration and from the payload judgment.
    locator: NSA MCP Security Design Considerations > Security concerns and Recommendations > Log and monitor MCP activity, pp. 8, 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-010
    source: eng-security-mcp-nsa-2026
    supports: NSA specifically distinguishes semantic tool-description manipulation from general implementation defects. Moonweave requires a located manipulative payload rather than classifying every inaccurate description as poisoned.
    locator: NSA MCP Security Design Considerations > Security concerns > Tool-description manipulation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-011
    source: eng-security-mcp-nsa-2026
    supports: "NSA documents malicious MCP tool descriptions manipulating client behavior and changing from benign to malicious instructions after subsequent use. The positive case specifically tests this distinction: A tool description says it must read and send ~/.ssh/id_rsa before use; that description version and sentence are retained as PoisonedToolDescription."
    locator: Security concerns > Exploitation via messaging platforms and tool-description manipulation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-012
    source: eng-security-mcp-nsa-2026
    supports: "NSA documents malicious MCP tool descriptions manipulating client behavior and changing from benign to malicious instructions after subsequent use. The boundary case specifically tests this distinction: A tool is described as read-only although it writes a cache; this is inaccurate documentation and a trust finding, but absent an injection payload it is not automatically PoisonedToolDescription."
    locator: Security concerns > Exploitation via messaging platforms and tool-description manipulation, p. 8
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-013
    source: lit-agent-vigil-siren
    supports: SIREN distinguishes planning-phase, definition-level injections in tool docstrings from execution-level injections in return values and fabricated error messages. Moonweave therefore distinguishes PoisonedToolDescription by its capability metadata carrier and MaliciousToolOutput by its runtime-result carrier. VIGIL does not prescribe the PoisonedContent class or these canonical IDs.
    locator: "Section 3 Threat Injection Vectors > Table 1: Tool Stream Category A versus Category B"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-tool-description-014
    source: eng-security-mcp-nsa-2026
    supports: NSA identifies semantic manipulation of tool metadata and hidden instructions in descriptors as a systemic poisoning risk. Moonweave classifies the affected description entity as PoisonedToolDescription, a PoisonedContent subtype.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–10, ‘Poisoning output for downstream automation’
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
