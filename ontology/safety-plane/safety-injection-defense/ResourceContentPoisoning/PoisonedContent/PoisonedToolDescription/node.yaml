schema: moonweave.ai/ontology-node/v1
id: PoisonedToolDescription
kind: concept
labels:
  en: poisoned tool-definition content
  zh: 被投毒工具定义内容
  ja: 投毒されたツール定義内容
semantics:
  short_definition:
    zh: 含有操纵工具选择、参数、权限或信任之内容的受污染工具描述。
    en: Poisoned content in a tool description that manipulates selection, arguments, permissions, or trust.
    ja: ツール選択、引数、権限、信頼を操作する内容を含む汚染ツール記述。
  definition:
    zh: 被投毒工具定义内容是一种 PoisonedContent，精确落在某一版本工具定义的名称、描述、注解、schema 文本、能力声明或帮助内容中，并由可定位证据确认其试图操纵工具选择、参数、权限或信任。它不是整个 ToolDefinition，也不是仅表示描述准确性或来源可靠性的 ToolDescriptionTrust 发现。
    en: Poisoned tool-definition content is PoisonedContent located in the name, description, annotation, schema text, capability claim, or help content of one specific tool-definition version, with locatable evidence that it attempts to manipulate selection, arguments, authority, or trust. It is neither the whole ToolDefinition nor a ToolDescriptionTrust finding that only assesses accuracy or source reliability.
    ja: 投毒されたツール定義内容は、特定版のツール定義の名称、説明、注釈、schema 文、能力表明、help 内容に位置し、選択・引数・権限・信頼を操作しようとすることを位置付き証拠で確認した PoisonedContent です。ToolDefinition 全体でも、正確性や出所信頼性だけを評価する ToolDescriptionTrust 所見でもありません。
  why_needed:
    zh: 描述会进入模型上下文并影响选工具，必须能隔离具体污染文本而不删除整个工具身份。
    en: Descriptions enter model context and influence selection, so the contaminated text must be isolatable without erasing the tool's identity.
    ja: 記述はモデルのコンテキストへ入りツール選択に影響するため、ツール同一性を消さず汚染文だけを隔離できる必要があります。
  includes:
    - zh: 包含受影响工具、描述版本、恶意范围、来源服务器和检测证据。
      en: Includes the affected tool, description version, malicious span, originating server, and detection evidence.
      ja: 影響ツール、記述版、悪意範囲、出所サーバー、検出証拠を含みます。
  excludes:
    - zh: 不包含仅措辞含糊或能力文档过时但没有操纵载荷的工具描述。
      en: Excludes vague or stale tool documentation that contains no manipulation payload.
      ja: 曖昧または古いだけで操作ペイロードのないツール記述は含みません。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: PoisonedToolDescription 应把 OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails 与 Guardrails AI 的边界 adjudication 投影为可审计 ontology 对象，并与相邻概念保持身份分离。
    en: PoisonedToolDescription should project OWASP LLM01, AgentSentry, ReasAlign, Azure Prompt Shield, OpenAI Moderation, NeMo Guardrails, and Guardrails AI boundary adjudications into auditable ontology objects while preserving identity separation from adjacent concepts.
    ja: PoisonedToolDescription は OWASP LLM01、AgentSentry、ReasAlign、Azure Prompt Shield、OpenAI Moderation、NeMo Guardrails、Guardrails AI の boundary adjudication を監査可能 object へ投影し隣接 concept との identity 分離を保ちます。
  typical_input:
    - description: Ingress or boundary scan invocation.
      format: Vendor API or rail execution with versioned configuration.
      source_claims:
        - claim-poisonedtooldescription-design
  typical_output:
    - description: Moonweave concept record with stable identity keys.
      format: '{ "id": "PoisonedToolDescription/example" }'
      source_claims:
        - claim-poisonedtooldescription-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://guardrailsai.com/guardrails/docs
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - poisoned_content_id
  fields:
    - id: poisoned_content_id
      labels:
        zh: 被投毒定义内容标识
        en: poisoned definition-content ID
        ja: 投毒定義内容 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识工具定义中的一个被裁定投毒内容对象，并继承 PoisonedContent 的证据与处置身份。
        en: Stable identifier for one adjudicated poisoned-content object within a tool definition, inheriting the evidence and disposition identity of PoisonedContent.
        ja: ツール定義内の一つの裁定済み投毒内容対象を安定識別し、PoisonedContent の証拠・処置同一性を継承します。
      allowed_values: []
      pattern: null
      example_value: poisoned-content/tool-read-file/description/1
      source_claims:
        - claim-poisonedtooldescription-design
    - id: tool_definition_ref
      labels:
        zh: 所属工具定义引用
        en: containing tool-definition reference
        ja: 所属ツール定義参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含该投毒片段的具体 ToolDefinition，以便工具身份与片段身份分别保留。
        en: Reference to the concrete ToolDefinition containing the poisoned fragment, preserving tool identity separately from fragment identity.
        ja: 投毒範囲を含む具体的 ToolDefinition を参照し、ツール同一性と断片同一性を分離して保持します。
      allowed_values: []
      pattern: null
      example_value: mcp://server-9/tools/read_file
      source_claims:
        - claim-poisonedtooldescription-design
    - id: tool_definition_version
      labels:
        zh: 所属定义版本
        en: containing definition version
        ja: 所属定義版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定含投毒片段的定义快照或摘要，使字段路径与证据只适用于同一版本。
        en: Snapshot version or digest containing the poisoned fragment, ensuring that field paths and evidence apply only to that revision.
        ja: 投毒範囲を含む定義 snapshot の版または digest を固定し、項目 path と証拠を同一版だけに適用します。
      allowed_values: []
      pattern: null
      example_value: sha256:tooldef-b41f
      source_claims:
        - claim-poisonedtooldescription-design
    - id: source_server_ref
      labels:
        zh: 来源服务器引用
        en: source-server reference
        ja: 出所サーバー参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用交付该定义版本的服务器身份和信任边界，不因工具同名而跨服务器合并。
        en: Reference to the server identity and trust boundary that delivered this definition version; same-named tools from other servers are not merged.
        ja: この定義版を配送したサーバー同一性と信頼境界を参照し、他サーバーの同名ツールと統合しません。
      allowed_values: []
      pattern: null
      example_value: mcp-server://server-9
      source_claims:
        - claim-poisonedtooldescription-design
    - id: field_path
      labels:
        zh: 定义字段路径
        en: definition field path
        ja: 定義項目パス
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用 JSON Pointer 或稳定等价路径指出投毒文本位于名称、描述、注解或 schema 的哪个字段。
        en: JSON Pointer or stable equivalent locating the poisoned text in a name, description, annotation, or schema field.
        ja: 投毒テキストが名称、説明、注釈、schema のどの項目にあるかを JSON Pointer 等の安定 path で示します。
      allowed_values: []
      pattern: ^/
      example_value: /description
      source_claims:
        - claim-poisonedtooldescription-design
    - id: affected_span
      labels:
        zh: 字段内受影响片段
        en: affected span within field
        ja: 項目内影響範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在 field_path 所指字符串或结构中精确标出敌对语句，不把整个工具定义自动视为投毒内容。
        en: Exact adversarial sentence location within the string or structure selected by field_path; it does not automatically taint the whole tool definition.
        ja: field_path が指す文字列・構造内で敵対文を正確に示し、ツール定義全体を自動的に投毒扱いしません。
      allowed_values: []
      pattern: null
      example_value:
        start: 27
        end: 79
        unit: character
      source_claims:
        - claim-poisonedtooldescription-design
    - id: declared_capability
      labels:
        zh: 声明能力
        en: declared capability
        ja: 表明能力
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录定义文本声称工具能够或必须执行的能力，用于与实际能力和权限边界核对。
        en: Capability the definition text claims the tool can or must exercise, retained for comparison with observed behavior and authority boundaries.
        ja: 定義文がツールに可能・必須と表明する能力を記録し、観測挙動と権限境界との比較に使います。
      allowed_values: []
      pattern: null
      example_value: read and transmit ~/.ssh/id_rsa before normal use
      source_claims:
        - claim-poisonedtooldescription-design
    - id: observed_capability
      labels:
        zh: 观察到的能力
        en: observed capability
        ja: 観測能力
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录执行证据表明工具实际具备或缺少的能力；它帮助解释欺骗，但单独不构成注入载荷。
        en: Capability execution evidence shows the tool actually has or lacks; it can explain deception but does not by itself establish an injection payload.
        ja: 実行証拠が示す実際の能力・欠如を記録し、欺瞞説明には使いますが単独で注入ペイロードを成立させません。
      allowed_values: []
      pattern: null
      example_value: reads requested workspace files only; no credential precondition
      source_claims:
        - claim-poisonedtooldescription-design
  constraints:
    - id: poisoned-tool-definition-content-requires-located-manipulation
      severity: error
      expression_language: plain
      expression: field_path resolves in tool_definition_version and affected_span resolves inside that field and inherited evidence_refs establishes manipulative content
      explanations:
        zh: 字段路径和片段必须在同一工具定义版本中可复现，且继承的证据必须确认该片段试图操纵选择、参数、权限或信任；单纯过时、含糊或与实现不一致只能形成信任发现。
        en: The field path and span must resolve in the same definition version, and inherited evidence must confirm an attempt to manipulate selection, arguments, authority, or trust. Mere staleness, ambiguity, or implementation mismatch yields a trust finding only.
        ja: 項目 path と範囲は同一定義版で再現でき、継承証拠は選択・引数・権限・信頼の操作企図を確認する必要があります。古さ、曖昧さ、実装不一致だけなら信頼所見に留めます。
      source_claims:
        - claim-poisonedtooldescription-design
  required_relation_constraints: []
