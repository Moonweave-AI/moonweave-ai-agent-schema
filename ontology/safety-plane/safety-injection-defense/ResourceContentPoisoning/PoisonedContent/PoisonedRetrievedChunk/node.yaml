schema: moonweave.ai/ontology-node/v1
id: PoisonedRetrievedChunk
kind: concept
status: accepted
labels:
  en: poisoned retrieved chunk
  zh: 被投毒检索分块
  ja: 汚染された検索チャンク
semantics:
  short_definition:
    zh: 从检索库返回、且被确认含有操纵载荷的受污染内容块。
    en: Poisoned content returned as a retrieved chunk and confirmed to contain a manipulation payload.
    ja: 検索庫から返され、操作ペイロードを含むと確認された汚染内容断片。
  definition:
    zh: 被投毒检索分块是一种 PoisonedContent，载体是由文档切分、向量检索或记忆召回返回的可寻址块，并保留源文档、索引版本、检索批次和污染范围。它不同于整个源文档，也不同于检测该块的 MemoryPoisoningSignal。
    en: A PoisonedRetrievedChunk is PoisonedContent carried by an addressable unit returned through document chunking, vector retrieval, or memory recall, retaining source document, index version, retrieval batch, and contaminated span. It is distinct from the whole source document and from a MemoryPoisoningSignal that detects the chunk.
    ja: 被汚染検索断片は、文書分割、ベクトル検索、記憶想起で返されたアドレス可能単位を媒体とし、元文書、索引版、検索バッチ、汚染範囲を保持する PoisonedContent です。元文書全体や、それを検出する MemoryPoisoningSignal とは異なります。
  why_needed:
    zh: 分块会改变位置和传播路径，必须保留从源文档到实际进入上下文之块的可追踪性。
    en: Chunking changes location and propagation path, so the exact unit entering context must remain traceable to its source document.
    ja: 分割で位置と伝播経路が変わるため、コンテキストへ入った正確な単位を元文書まで追跡できる必要があります。
  includes:
    - zh: 包含 chunk_id、源文档、索引版本、检索批次、污染范围和检测证据均明确的分块。
      en: Includes chunks with a chunk ID, source document, index version, retrieval batch, contaminated span, and detection evidence.
      ja: chunk ID、元文書、索引版、検索バッチ、汚染範囲、検出証拠を持つ断片を含みます。
  excludes:
    - zh: 不包含尚未被检索的整份投毒文档，也不包含仅因相关性低而错误召回的正常分块。
      en: Excludes a whole poisoned document that was not retrieved and benign chunks returned merely because relevance ranking was poor.
      ja: 未検索の汚染文書全体や、関連度順位が悪く誤って返っただけの正常断片は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - chunk_id
  fields:
    - id: chunk_id
      labels:
        zh: 检索分块标识
        en: retrieved chunk ID
        ja: 検索 chunk ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识实际由检索批次返回的可寻址分块，不以源文档 ID 或排名位置替代。
        en: Stable identifier for the addressable chunk actually returned by the retrieval batch; neither document ID nor rank position substitutes for it.
        ja: 検索 batch が実際に返した addressable chunk を安定識別し、文書 ID や順位で代用しません。
      allowed_values: []
      pattern: null
      example_value: chunk-88
      source_claims:
        - claim-poisoned-retrieved-chunk-002
    - id: source_document_ref
      labels:
        zh: 源文档引用
        en: source-document reference
        ja: 元文書参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向生成该分块的源文档身份，使分块证据可追溯而不把整份文档自动标为投毒。
        en: Reference to the source document from which the chunk was formed, enabling traceability without automatically classifying the whole document as poisoned.
        ja: chunk の生成元文書を参照し、追跡可能にしつつ文書全体を自動的に投毒分類しません。
      allowed_values: []
      pattern: null
      example_value: document://kb/vendor-guide-17
      source_claims:
        - claim-poisoned-retrieved-chunk-003
    - id: source_document_version
      labels:
        zh: 源文档版本
        en: source-document version
        ja: 元文書版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定分块时所用源文档的版本或摘要，避免用后来修订的文档解释历史检索结果。
        en: Version or digest of the source document used when chunking, preventing a later revision from being used to explain the historical retrieval result.
        ja: chunk 作成時の元文書版・digest を固定し、後の改訂版で過去の検索結果を説明しないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:doc17-4a8e
      source_claims:
        - claim-poisoned-retrieved-chunk-004
    - id: index_version_ref
      labels:
        zh: 索引版本引用
        en: index-version reference
        ja: 索引版参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用检索实际读取的索引版本，而不是请求中预期或当前最新的索引。
        en: Reference to the index version actually read by retrieval, not merely the requested or currently latest index.
        ja: 検索が実際に読んだ索引版を参照し、要求版や現在最新版だけでは代用しません。
      allowed_values: []
      pattern: null
      example_value: index://support-kb/ix-7
      source_claims:
        - claim-poisoned-retrieved-chunk-005
    - id: retrieval_batch_id
      labels:
        zh: 检索批次标识
        en: retrieval batch ID
        ja: 検索 batch ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识真正返回该分块的一次检索结果批次，保留同次候选集合和排序上下文。
        en: Identifier of the retrieval-result batch that actually returned the chunk, retaining its candidate-set and ranking context.
        ja: chunk を実際に返した検索結果 batch を識別し、同回の候補集合と順位文脈を保持します。
      allowed_values: []
      pattern: null
      example_value: RB-42
      source_claims:
        - claim-poisoned-retrieved-chunk-006
    - id: retrieved_at
      labels:
        zh: 检索时间
        en: retrieved at
        ja: 検索時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该分块进入结果批次的 UTC 事件时间，不以稍后的检测或隔离时间替代。
        en: UTC event time when the chunk entered the retrieval-result batch, distinct from later detection or quarantine time.
        ja: chunk が検索結果 batch に入った UTC event 時刻を記録し、後の検出・隔離時刻と区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:14:20.000Z
      source_claims:
        - claim-poisoned-retrieved-chunk-007
    - id: affected_span
      labels:
        zh: 分块内污染片段
        en: contaminated span in chunk
        ja: chunk 内汚染範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在该分块版本内部定位敌对载荷，并可映射回源文档位置；不得只给文档级模糊范围。
        en: Location of the adversarial payload inside this chunk version, with a mapping back to the source-document location; a document-wide vague range is insufficient.
        ja: この chunk 版内の敵対ペイロードを位置付け、元文書位置へ mapping できる必要があり、文書全体の曖昧範囲では不十分です。
      allowed_values: []
      pattern: null
      example_value:
        chunk_chars: 73..126
        source_chars: 4811..4864
      source_claims:
        - claim-poisoned-retrieved-chunk-008
    - id: evidence_refs
      labels:
        zh: 分块投毒证据引用
        en: chunk-poisoning evidence references
        ja: chunk 投毒証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用针对该 chunk 版本和片段的检测结果或人工发现，不复用其他批次中的相似命中。
        en: References to findings or scan results for this chunk version and span; similar matches from another batch are not reused.
        ja: この chunk 版と範囲に対する所見・走査結果を参照し、別 batch の類似一致を再利用しません。
      allowed_values: []
      pattern: null
      example_value:
        - finding://memory/scan-RB42-chunk88
      source_claims:
        - claim-poisoned-retrieved-chunk-009
  constraints:
    - id: poisoned-retrieved-chunk-requires-complete-retrieval-provenance
      severity: error
      expression_language: plain
      expression: chunk_id belongs to retrieval_batch_id from index_version_ref and derives from source_document_ref at source_document_version and affected_span is supported by evidence_refs
      explanations:
        zh: 必须同时证明该块确实被该批次返回、由指定文档版本和索引版本产生，并在精确片段上有投毒证据；低相关、排序错误或源文档可疑均不能单独成立。
        en: The record must prove that this batch returned the chunk, that it derives from the stated document and index versions, and that the exact span has poisoning evidence. Low relevance, ranking error, or a suspicious source document alone is insufficient.
        ja: この batch が chunk を返し、指定文書版・索引版から導出され、正確な範囲に投毒証拠があることを同時に示します。低関連、順位誤り、元文書の疑いだけでは成立しません。
      source_claims:
        - claim-poisoned-retrieved-chunk-010
  required_relation_constraints: []
examples:
