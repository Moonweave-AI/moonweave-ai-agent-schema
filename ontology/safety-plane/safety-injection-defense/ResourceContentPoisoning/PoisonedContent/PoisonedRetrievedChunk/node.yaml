sibling_differentiation:
  - sibling_concept_id: PoisonedToolDescription
    shared_parent_concept_id: PoisonedContent
    differentia:
      zh: 共享父节点对照：父节点 PoisonedContent：PoisonedRetrievedChunk（semantic kind=information，骨架 PoisonedRetrievedChunk-is_a-PoisonedContent）；PoisonedToolDescription（semantic kind=information，骨架 PoisonedToolDescription-is_a-PoisonedContent）。双端条件：PoisonedRetrievedChunk 条件：“被投毒检索分块是一种受污染内容；其区分条件是：它标识含有不安全指令、误导性元数据、污点片段或提示注入内容的记忆或文档分块”；PoisonedToolDescription 条件：“被投毒工具描述是以如下事实为区分特征的受污染内容：它标识试图操纵工具选择、参数、权限或信任判断的工具说明、MCP 工具列表项、能力广告或帮助文本”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent PoisonedContent: PoisonedRetrievedChunk (semantic kind=information, backbone PoisonedRetrievedChunk-is_a-PoisonedContent); PoisonedToolDescription (semantic kind=information, backbone PoisonedToolDescription-is_a-PoisonedContent). Endpoint conditions: PoisonedRetrievedChunk condition: “As a poisoned content, Poisoned retrieved chunk is distinguished by the fact that it identifies a retrieved memory or document chunk that contains unsafe instructions, misleading metadata, tainted spans, or prompt-injection content”; PoisonedToolDescription condition: “Poisoned tool description is a poisoned content; its differentiating condition is that it identifies a tool description, MCP tool list entry, capability advertisement, or help text that attempts to manipulate selection, arguments, permissions, or trust”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 PoisonedContent：PoisonedRetrievedChunk（semantic kind=information、バックボーン PoisonedRetrievedChunk-is_a-PoisonedContent）；PoisonedToolDescription（semantic kind=information、バックボーン PoisonedToolDescription-is_a-PoisonedContent）。両端条件：PoisonedRetrievedChunk の条件：「汚染内容に属する汚染された検索チャンクは、次の事実を種差とします：それは、安全でない指示、誤誘導メタデータ、汚染範囲、プロンプト注入内容を含むメモリまたは文書チャンクを識別します」；PoisonedToolDescription の条件：「汚染されたツール説明は汚染内容の一種であり、次の条件で区別されます：それは、ツール選択、引数、権限、信頼判断を操作しようとするツール説明、MCPツール一覧項目、能力広告、ヘルプテキストを識別します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-poisoned-retrieved-chunk-013
