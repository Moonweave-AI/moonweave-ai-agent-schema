      en: Excludes a whole poisoned document that was not retrieved and benign chunks returned merely because relevance ranking was poor.
      ja: 未検索の汚染文書全体や、関連度順位が悪く誤って返っただけの正常断片は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
