schema: moonweave.ai/ontology-node/v1
id: PoisonedContent
kind: concept
status: accepted
labels:
  zh: 被投毒内容
  en: poisoned content
  ja: 投毒された内容
semantics:
  short_definition:
    zh: 经证据确认含有敌对操纵载荷、且可定位来源和范围的信息对象。
    en: An information object confirmed by evidence to contain an adversarial manipulation payload with locatable source and span.
    ja: 敵対的操作ペイロードを含むことが証拠で確認され、出所と範囲を特定できる情報対象。
  definition:
    zh: 受污染内容是一种信息对象，其原始载荷、来源、受影响范围、投毒类别、检测证据和处置状态可被分别记录。它表示被污染的对象本身，不表示投毒发生事件、检测活动或由此产生的 ThreatSignal。
    en: PoisonedContent is an information object whose original payload, provenance, affected span, poisoning class, detection evidence, and disposition can be recorded separately. It denotes the contaminated object itself, not the poisoning event, detection activity, or resulting ThreatSignal.
    ja: 汚染内容は、原ペイロード、来歴、影響範囲、汚染種別、検出証拠、処置状態を別々に記録できる情報対象です。汚染された対象そのものを表し、汚染発生イベント、検出活動、そこから生じる ThreatSignal ではありません。
  why_needed:
    zh: 保留原始对象和污染范围，才能隔离、取证、净化后对比并避免把信号当载荷。
    en: Retaining the original object and contaminated span enables quarantine, forensics, before-after sanitization comparison, and separation of signal from payload.
    ja: 原対象と汚染範囲を保持することで、隔離、フォレンジック、無害化前後比較、信号とペイロードの分離ができます。
  includes:
    - zh: 包含有原始载荷引用、来源、精确污染范围、证据和处置状态的内容对象。
      en: Includes content objects with an original-payload reference, provenance, precise contaminated span, evidence, and disposition state.
      ja: 原ペイロード参照、来歴、正確な汚染範囲、証拠、処置状態を持つ内容対象を含みます。
  excludes:
    - zh: 不包含仅因未知来源而被标记不可信的内容、投毒事件或检测信号。
      en: Excludes content marked untrusted solely because origin is unknown, the poisoning event, and detection signals.
      ja: 出所不明だけで不信頼とされた内容、汚染イベント、検出信号は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - poisoned_content_id
  fields:
    - id: poisoned_content_id
      labels:
        zh: 被投毒内容标识
        en: poisoned-content ID
        ja: 投毒内容 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识被裁定含敌对操纵载荷的内容对象，不复用其载体、信号或投毒事件标识。
        en: Stable identifier for the content object adjudicated to contain an adversarial manipulation payload, independent of carrier, signal, and poisoning-event IDs.
        ja: 敵対的操作ペイロードを含むと裁定された内容対象を安定識別し、carrier・signal・汚染 event の ID と分離します。
      allowed_values: []
      pattern: null
      example_value: poisoned-content/document-D9/css-hidden-1
      source_claims:
        - claim-poisoned-content-002
    - id: carrier_ref
      labels:
        zh: 载体引用
        en: carrier reference
        ja: 担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向承载敌对片段的具体文档、工具输出、检索分块或定义对象，而不是只给出来源类别。
        en: Reference to the concrete document, tool output, retrieved chunk, or definition object carrying the adversarial span, rather than only its source category.
        ja: 敵対範囲を担う具体的な文書、ツール出力、検索 chunk、定義対象を指し、出所種別だけでは代用しません。
      allowed_values: []
      pattern: null
      example_value: document://D-9
      source_claims:
        - claim-poisoned-content-003
    - id: carrier_version_or_digest
      labels:
        zh: 载体版本或摘要
        en: carrier version or digest
        ja: 担体版・digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定受检载体的不可变版本或内容摘要，使片段坐标和检测结论不会漂移到其他版本。
        en: Immutable carrier version or content digest that keeps span coordinates and the detection conclusion from drifting to another revision.
        ja: 検査担体の不変版または内容 digest を固定し、範囲座標と検出結論が別版へずれないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:d9f731
      source_claims:
        - claim-poisoned-content-004
    - id: affected_span
      labels:
        zh: 受影响片段
        en: affected span
        ja: 影響範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以字符、字节、JSON Pointer、DOM 选择器或等价坐标精确定位载体中的敌对内容。
        en: Exact location of the adversarial content in the carrier using characters, bytes, JSON Pointer, DOM selector, or equivalent coordinates.
        ja: 文字、byte、JSON Pointer、DOM selector 等の座標で担体内の敵対内容を正確に位置付けます。
      allowed_values: []
      pattern: null
      example_value:
        locator_kind: dom-and-character
        locator: css:#hidden chars:0..84
      source_claims:
        - claim-poisoned-content-005
    - id: poisoning_class
      labels:
        zh: 投毒类别
        en: poisoning class
        ja: 投毒区分
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录经证据确认的操纵机制，例如间接指令注入、能力欺骗或下游自动化投毒，不以关键词猜测。
        en: Evidence-backed manipulation mechanism, such as indirect instruction injection, capability deception, or downstream-automation poisoning; it is never assigned from keywords alone.
        ja: 間接指示注入、能力欺瞞、下流自動化汚染など、証拠で裏付けた操作機構を記録し、keyword だけで推測しません。
      allowed_values: []
      pattern: null
      example_value: indirect-instruction-injection
      source_claims:
        - claim-poisoned-content-006
    - id: evidence_refs
      labels:
        zh: 投毒证据引用
        en: poisoning evidence references
        ja: 投毒証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用把该精确片段裁定为投毒内容的扫描结果、人工发现、签名命中或取证记录。
        en: References to scan results, human findings, signature matches, or forensic records that adjudicate this exact span as poisoned content.
        ja: この正確な範囲を投毒内容と裁定した走査結果、人手所見、署名一致、フォレンジック記録を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - finding://injection/scan-D9-4
      source_claims:
        - claim-poisoned-content-007
    - id: disposition
      labels:
        zh: 处置状态
        en: disposition
        ja: 処置状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录原对象当前是待复核、已隔离、已净化、已拒绝还是已释放；该值不声称处置活动已经成功。
        en: Current state of the original object—pending review, quarantined, sanitized, rejected, or released—without claiming that a mitigation activity succeeded.
        ja: 原対象が審査待ち、隔離済み、無害化済み、拒否済み、解放済みのどれかを記録し、緩和活動の成功自体は主張しません。
      allowed_values: []
      pattern: null
      example_value: quarantined
      source_claims:
        - claim-poisoned-content-008
  constraints:
    - id: poisoned-content-requires-located-adjudicated-payload
      severity: error
      expression_language: plain
      expression: affected_span is valid for carrier_version_or_digest and evidence_refs adjudicates the span as poisoning; unverified provenance alone is insufficient
      explanations:
        zh: 被投毒内容必须绑定一个不可变载体版本、精确片段和支持投毒裁定的证据；来源未知、低信任、低相关或单纯出现敏感词均不得替代裁定。
        en: Poisoned content must bind an immutable carrier version, an exact span, and evidence supporting a poisoning adjudication. Unknown origin, low trust, poor relevance, or sensitive words alone cannot substitute for that conclusion.
        ja: 投毒内容は不変担体版、正確な範囲、投毒裁定を支える証拠を結合し、出所不明、低信頼、低関連、敏感語だけで裁定を代用しません。
      source_claims:
        - claim-poisoned-content-009
  required_relation_constraints: []
examples:
  - id: PoisonedContent-manual-positive-20260714
    kind: positive
    labels:
      zh: 受污染内容正例
      en: Positive case for poisoned content
      ja: 汚染内容の正例
    scenario_id: null
    descriptions:
      zh: 文档 D-9 的隐藏 CSS 区域包含越权指令；系统保留原文、URI、字符范围和扫描证据并标记为 PoisonedContent。
      en: Document D-9 contains a privilege-escalating instruction in a hidden CSS region; the system retains the original, URI, character span, and scan evidence as PoisonedContent.
      ja: 文書 D-9 の非表示 CSS 領域に権限逸脱指示があり、原文、URI、文字範囲、走査証拠を PoisonedContent として保持します。
    field_values:
      poisoned_content_id: poisoned-content/document-D9/css-hidden-1
      carrier_ref: document://D-9
      carrier_version_or_digest: sha256:d9f731
      affected_span:
        locator_kind: dom-and-character
        locator: css:#hidden chars:0..84
      poisoning_class: indirect-instruction-injection
      evidence_refs:
        - finding://injection/scan-D9-4
      disposition: quarantined
    related_node_ids:
      - PoisonedContent
    related_relation_ids: []
    expected_result:
      zh: 验证器应把该记录识别为 PoisonedContent，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as PoisonedContent while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を PoisonedContent と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含有原始载荷引用、来源、精确污染范围、证据和处置状态的内容对象。
      en: Includes content objects with an original-payload reference, provenance, precise contaminated span, evidence, and disposition state.
      ja: 原ペイロード参照、来歴、正確な汚染範囲、証拠、処置状態を持つ内容対象を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-poisoned-content-010
  - id: PoisonedContent-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 受污染内容边界例
      en: Boundary case for poisoned content
      ja: 汚染内容の境界例
    scenario_id: null
    descriptions:
      zh: 外部文档来源尚未验证，但扫描和审查均未发现操纵载荷；它是不可信输入，不足以成为 PoisonedContent。
      en: An external document has unverified provenance but scanning and review find no manipulation payload; it is untrusted input but not yet PoisonedContent.
      ja: 外部文書の来歴が未検証でも走査と審査で操作ペイロードが見つからなければ、不信頼入力ではあるが PoisonedContent ではありません。
    field_values:
      poisoned_content_id: null
      carrier_ref: document://external-unverified-22
      carrier_version_or_digest: sha256:21aa09
      affected_span: null
      poisoning_class: null
      evidence_refs:
        - scan://external-unverified-22/clean
      disposition: pending-review
    related_node_ids:
      - PoisonedContent
    related_relation_ids: []
    expected_result:
      zh: 验证器不得把该记录归入 PoisonedContent；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as PoisonedContent; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を PoisonedContent に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含仅因未知来源而被标记不可信的内容、投毒事件或检测信号。
      en: Excludes content marked untrusted solely because origin is unknown, the poisoning event, and detection signals.
      ja: 出所不明だけで不信頼とされた内容、汚染イベント、検出信号は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-poisoned-content-011
