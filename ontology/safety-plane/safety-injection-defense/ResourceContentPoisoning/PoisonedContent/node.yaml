source_claims:
  - id: claim-poisoned-content-001
    source: eng-security-mcp-nsa-2026
    supports: NSA identifies compromised descriptors, tool outputs, and shared context containing hidden instructions or semantic manipulation that can subvert downstream agent pipelines.
    locator: Security concerns > Poisoning output for downstream automation, pp. 8–9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-002
    source: eng-ont-prov-o
    supports: PROV-O gives an Entity its own identity while allowing attribution and derivation links to other records. Moonweave applies that distinction to the poisoned information object.
    locator: PROV-O Recommendation > §5.2.1 Entity and §5.3 Entity-Activity relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-003
    source: eng-security-owasp-llm01-2025
    supports: OWASP identifies indirect prompt injection through concrete external sources such as websites and files. Moonweave retains the exact carrier that supplied the injected content.
    locator: OWASP LLM01:2025 > Types of Prompt Injection Vulnerabilities > Indirect Prompt Injections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends logging result hashes and exact invocation data for MCP security investigations. Moonweave uses the carrier version or digest to bind poisoned-content evidence to immutable bytes.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
