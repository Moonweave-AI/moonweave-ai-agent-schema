source_claims:
  - id: claim-poisoned-content-001
    source: eng-security-mcp-nsa-2026
    supports: NSA identifies compromised descriptors, tool outputs, and shared context containing hidden instructions or semantic manipulation that can subvert downstream agent pipelines.
    locator: Security concerns > Poisoning output for downstream automation, pp. 8–9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-002
    source: eng-ont-prov-o
    supports: PROV-O gives an Entity its own identity while allowing attribution and derivation links to other records. Moonweave applies that distinction to the poisoned information object.
    locator: PROV-O Recommendation > §5.2.1 Entity and §5.3 Entity-Activity relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-003
    source: eng-security-owasp-llm01-2025
    supports: OWASP identifies indirect prompt injection through concrete external sources such as websites and files. Moonweave retains the exact carrier that supplied the injected content.
    locator: OWASP LLM01:2025 > Types of Prompt Injection Vulnerabilities > Indirect Prompt Injections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends logging result hashes and exact invocation data for MCP security investigations. Moonweave uses the carrier version or digest to bind poisoned-content evidence to immutable bytes.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-005
    source: eng-security-owasp-llm01-2025
    supports: OWASP notes that indirect and multimodal prompt injections can be hidden or imperceptible inside otherwise benign content. Moonweave requires a precise span locator rather than a document-wide suspicion label.
    locator: OWASP LLM01:2025 > Indirect Prompt Injections and multimodal hidden-input risk
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-006
    source: eng-security-nist-ai-100-2e2025
    supports: NIST separates indirect prompt injection from poisoning and other adversarial ML attack categories through explicit attack conditions. Moonweave records the reviewed category rather than inferring it lexically.
    locator: NIST AI 100-2e2025 > §3 Adversarial Machine Learning Taxonomy and §3.4 NISTAML.015
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-007
    source: eng-security-mcp-nsa-2026
    supports: NSA calls for instrumented logging and detection across MCP activity so malicious content can be investigated. Moonweave requires references to the evidence that supports the poisoned classification.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-008
    source: eng-fw-openai-guardrails
    supports: OpenAI guardrails separate guardrail results and tripwire outcomes from the workflow actions taken afterward. Moonweave likewise records content disposition without conflating it with a mitigation occurrence.
    locator: OpenAI Agents SDK Guardrails > Running guardrails > Guardrail results and tripwires
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-009
    source: eng-security-owasp-llm01-2025
    supports: OWASP defines prompt injection by unintended behavioral influence from crafted inputs, not merely by external provenance or suspicious vocabulary. Moonweave turns that official distinction into an evidence-and-location requirement.
    locator: OWASP LLM01:2025 > Description, Types of Prompt Injection, and Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-poisoned-content-010
    source: eng-security-mcp-nsa-2026
    supports: "NSA identifies compromised descriptors, tool outputs, and shared context containing hidden instructions or semantic manipulation that can subvert downstream agent pipelines. The positive case specifically tests this distinction: Document D-9 contains a privilege-escalating instruction in a hidden CSS region; the system retains the original, URI, character span, and scan evidence as PoisonedContent."
    locator: Security concerns > Poisoning output for downstream automation, pp. 8–9
    evidence_kind: design-inference
    confidence: high
