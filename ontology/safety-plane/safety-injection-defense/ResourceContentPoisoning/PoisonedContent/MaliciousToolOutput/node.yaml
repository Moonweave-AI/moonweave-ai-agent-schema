schema: moonweave.ai/ontology-node/v1
id: MaliciousToolOutput
kind: concept
status: accepted
labels:
  en: malicious tool output
  zh: 恶意工具输出
  ja: 悪意あるツール出力
semantics:
  short_definition:
    zh: 含有可操纵后续代理行为之指令或载荷的受污染工具输出。
    en: Poisoned content in a tool result that carries instructions or payloads capable of manipulating downstream agent behavior.
    ja: 後続エージェントの挙動を操作し得る指示またはペイロードを含む汚染ツール出力。
  definition:
    zh: 恶意工具输出是一种 PoisonedContent，载体是某次工具调用的结果、日志流片段或远程执行产物；有可定位证据确认其中内容试图越权改变后续规划、工具参数、路由、披露或副作用，例如注入指令、外传诱导或欺骗性成功声明。合法代码生成结果、普通错误和仅格式异常的输出即使含可执行文本也不属于本类；检测它的 ToolStreamInjectionSignal 仍是独立证据记录。
    en: Malicious tool output is PoisonedContent carried by the result, log-stream fragment, or remote-execution artifact of a specific tool call, with locatable evidence that its content attempts to change downstream planning, arguments, routing, disclosure, or side effects beyond authority—for example through injected instructions, exfiltration inducement, or deceptive success claims. Legitimate code-generation results, ordinary errors, and merely malformed outputs remain outside this class even when they contain executable text; the ToolStreamInjectionSignal detecting it is still a separate evidence record.
    ja: 悪意あるツール出力は、特定ツール呼出しの結果、log stream 断片、遠隔実行成果物を担体とし、注入指示、流出誘導、欺瞞的成功表明などにより権限外で後続計画・引数・routing・開示・副作用を変えようとすることを位置付き証拠で確認した PoisonedContent です。正当な code generation、通常 error、単なる形式不良は実行可能テキストを含んでも対象外で、検出する ToolStreamInjectionSignal は別証拠記録です。
  why_needed:
    zh: 把载荷与检测信号分开，才能隔离原始结果、保全证据并重新运行检测。
    en: Separating payload from signal allows the original result to be quarantined, preserved as evidence, and rescanned.
    ja: ペイロードと信号を分けることで、原結果の隔離、証拠保全、再走査が可能になります。
  includes:
    - zh: 包含有来源工具调用、原始范围、恶意载荷证据和处置状态的工具输出内容。
      en: Includes tool-output content with its originating call, original span, malicious payload evidence, and disposition state.
      ja: 元のツール呼出し、原範囲、悪意あるペイロード証拠、処置状態を持つツール出力内容を含みます。
  excludes:
    - zh: 不包含普通错误、仅格式异常、用户明确请求的合法代码生成结果，或检测该内容的威胁信号。
      en: Excludes ordinary errors, merely malformed results, legitimate requested code-generation output, and the threat signal that detected the content.
      ja: 通常 error、単なる形式不良、依頼どおりの正当な code-generation 出力、内容を検出した脅威信号は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - poisoned_content_id
  fields:
    - id: poisoned_content_id
      labels:
        zh: 恶意输出内容标识
        en: malicious output-content ID
        ja: 悪意出力内容 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识工具输出中被裁定为投毒载荷的内容对象，不复用工具调用或威胁信号标识。
        en: Identifier of the tool-output content adjudicated as a poisoned payload, independent of tool-call and threat-signal identifiers.
        ja: ツール出力内で投毒ペイロードと裁定された内容対象を識別し、tool call・threat signal の ID と分離します。
      allowed_values: []
      pattern: null
      example_value: poisoned-content/tool-result-204/tail-1
      source_claims:
        - claim-malicious-tool-output-002
    - id: tool_result_ref
      labels:
        zh: 工具结果引用
        en: tool-result reference
        ja: ツール結果参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用承载敌对片段的完整工具结果或远程执行产物，以保全原始返回内容。
        en: Reference to the complete tool result or remote-execution artifact carrying the adversarial span, preserving the original returned content.
        ja: 敵対範囲を担う完全なツール結果・遠隔実行成果物を参照し、原返却内容を保全します。
      allowed_values: []
      pattern: null
      example_value: tool-result://search/call-204
      source_claims:
        - claim-malicious-tool-output-003
    - id: tool_call_attempt_id
      labels:
        zh: 工具调用尝试标识
        en: tool-call attempt ID
        ja: ツール呼出し試行 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 绑定产生该输出的唯一调用尝试，防止把重试或另一调用返回的信号混入当前结果。
        en: Identifier of the unique call attempt that produced this output, preventing signals from a retry or another call from being attached to the result.
        ja: この出力を生成した唯一の呼出し試行へ結び、retry・別 call の signal を混同しません。
      allowed_values: []
      pattern: null
      example_value: tool-call-attempt/search-204/1
      source_claims:
        - claim-malicious-tool-output-004
    - id: stream_fragment_ref
      labels:
        zh: 流片段引用
        en: stream-fragment reference
        ja: stream 断片参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当结果分块或流式到达时引用实际含载荷的片段；非流式结果保持为空。
        en: Reference to the actual fragment carrying the payload when a result arrives in chunks or a stream; absent for a non-streamed result.
        ja: 結果が chunk・stream で到着する場合にペイロードを含む実断片を参照し、非 stream 結果では空にします。
      allowed_values: []
      pattern: null
      example_value: tool-stream://search-204/chunk-17
      source_claims:
        - claim-malicious-tool-output-005
    - id: output_version
      labels:
        zh: 输出版本或摘要
        en: output version or digest
        ja: 出力版・digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被检查输出的不可变版本、序列号或摘要，使片段和信号只指向同一返回内容。
        en: Immutable version, sequence, or digest of the inspected output so the span and signal refer to the same returned content.
        ja: 検査出力の不変版・sequence・digest を固定し、範囲と signal が同じ返却内容を指すようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:result204-44fe
      source_claims:
        - claim-malicious-tool-output-006
    - id: malicious_span
      labels:
        zh: 恶意片段
        en: malicious span
        ja: 悪意範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 精确定位输出中试图越权影响后续行为的字符、字节、字段或流片段范围。
        en: Exact character, byte, field, or stream-fragment range attempting to influence downstream behavior beyond authority.
        ja: 出力内で権限外の後続影響を狙う文字・byte・field・stream fragment 範囲を正確に位置付けます。
      allowed_values: []
      pattern: null
      example_value:
        locator_kind: character
        start: 942
        end: 968
      source_claims:
        - claim-malicious-tool-output-007
    - id: payload_class
      labels:
        zh: 恶意载荷类别
        en: malicious payload class
        ja: 悪意ペイロード区分
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录经证据确认的影响机制，如后续工具指令、外传诱导或欺骗性成功声明；可执行文本本身不是类别。
        en: Evidence-backed influence mechanism, such as a downstream tool instruction, exfiltration inducement, or deceptive success claim; executable text alone is not a class.
        ja: 後続 tool 指示、流出誘導、欺瞞的成功表明など証拠付き影響機構を記録し、実行可能 text だけを区分にはしません。
      allowed_values: []
      pattern: null
      example_value: downstream-tool-instruction
      source_claims:
        - claim-malicious-tool-output-008
    - id: signal_or_finding_refs
      labels:
        zh: 信号或发现引用
        en: signal or finding references
        ja: 信号・所見参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用针对同一输出版本和片段形成的 ToolStreamInjectionSignal、扫描结果或防御发现。
        en: References to ToolStreamInjectionSignal, scan results, or defense findings formed for the same output version and span.
        ja: 同じ出力版・範囲に対して形成された ToolStreamInjectionSignal、走査結果、防御所見を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - signal://tool-stream/search-204/17
      source_claims:
        - claim-malicious-tool-output-009
    - id: disposition
      labels:
        zh: 输出处置状态
        en: output disposition
        ja: 出力処置状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录原始输出当前是否待复核、隔离、净化、拒绝或释放，不将该状态当作检测信号。
        en: Whether the original output is pending review, quarantined, sanitized, rejected, or released; the state is not treated as a detection signal.
        ja: 原出力が審査待ち、隔離、無害化、拒否、解放のどれかを記録し、その状態を検出 signal としません。
      allowed_values: []
      pattern: null
      example_value: quarantined
      source_claims:
        - claim-malicious-tool-output-010
  constraints:
    - id: malicious-tool-output-requires-authority-relevant-located-evidence
      severity: error
      expression_language: plain
      expression: malicious_span resolves in output_version and signal_or_finding_refs confirms an authority-relevant manipulation represented by payload_class
      explanations:
        zh: 必须把证据绑定到同一工具结果版本和精确片段，并确认其试图越权影响后续行为；HTTP 错误、格式异常、合法脚本或按请求生成的代码均不能仅因可执行而归类。
        en: Evidence must bind the same tool-result version and exact span and confirm an attempt to influence downstream behavior beyond authority. HTTP errors, malformed output, legitimate scripts, and requested code generation are not classified merely because they are executable.
        ja: 同じツール結果版と正確な範囲に証拠を結び、権限外の後続影響企図を確認します。HTTP error、形式不良、正当 script、依頼された code generation は実行可能というだけで分類しません。
      source_claims:
        - claim-malicious-tool-output-011
  required_relation_constraints: []
examples:
  - id: MaliciousToolOutput-manual-positive-20260714
    kind: positive
    labels:
      zh: 恶意工具输出正例
      en: Positive case for malicious tool output
      ja: 悪意あるツール出力の正例
    scenario_id: null
    descriptions:
      zh: 搜索工具结果尾部隐藏“下一步调用 transfer_funds”；原始结果及该范围被保存为 MaliciousToolOutput。
      en: A search-tool result hides “next call transfer_funds” in its tail; the original result and span are retained as MaliciousToolOutput.
      ja: 検索ツール結果の末尾に「次に transfer_funds を呼べ」と隠され、原結果と範囲を MaliciousToolOutput として保持します。
    field_values:
      carrier_ref: tool-result://search/call-204
      carrier_version_or_digest: sha256:result204-44fe
      affected_span:
        locator_kind: character
        start: 942
        end: 968
      poisoning_class: downstream-tool-instruction
      evidence_refs:
        - signal://tool-stream/search-204/17
      poisoned_content_id: poisoned-content/tool-result-204/tail-1
      tool_result_ref: tool-result://search/call-204
      tool_call_attempt_id: tool-call-attempt/search-204/1
      stream_fragment_ref: tool-stream://search-204/chunk-17
      output_version: sha256:result204-44fe
      malicious_span:
        locator_kind: character
        start: 942
        end: 968
      payload_class: downstream-tool-instruction
      signal_or_finding_refs:
        - signal://tool-stream/search-204/17
      disposition: quarantined
    related_node_ids:
      - MaliciousToolOutput
      - PoisonedContent
    related_relation_ids:
      - MaliciousToolOutput-is_a-PoisonedContent
    expected_result:
      zh: 验证器应把该记录识别为 MaliciousToolOutput，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as MaliciousToolOutput while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を MaliciousToolOutput と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含有来源工具调用、原始范围、恶意载荷证据和处置状态的工具输出内容。
      en: Includes tool-output content with its originating call, original span, malicious payload evidence, and disposition state.
      ja: 元のツール呼出し、原範囲、悪意あるペイロード証拠、処置状態を持つツール出力内容を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-malicious-tool-output-012
  - id: MaliciousToolOutput-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 恶意工具输出边界例
      en: Boundary case for malicious tool output
      ja: 悪意あるツール出力の境界例
    scenario_id: null
    descriptions:
      zh: 工具返回 HTTP 500 和堆栈；没有操纵指令或恶意载荷，因此只是失败输出，不是 MaliciousToolOutput。
      en: A tool returns HTTP 500 and a stack trace with no manipulative instruction or malicious payload; it is failed output, not MaliciousToolOutput.
      ja: HTTP 500 とスタックトレースだけで操作指示や悪意あるペイロードがないため、失敗出力であって MaliciousToolOutput ではありません。
    field_values:
      poisoned_content_id: null
      tool_result_ref: tool-result://http-fetch/call-500
      tool_call_attempt_id: tool-call-attempt/http-fetch-500/1
      stream_fragment_ref: null
      output_version: sha256:http500-stack-90af
      malicious_span: null
      payload_class: null
      signal_or_finding_refs: []
      disposition: failed-output
    related_node_ids:
      - MaliciousToolOutput
      - PoisonedContent
    related_relation_ids:
      - MaliciousToolOutput-is_a-PoisonedContent
    expected_result:
      zh: 验证器不得把该记录归入 MaliciousToolOutput；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as MaliciousToolOutput; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を MaliciousToolOutput に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含普通错误输出、仅格式异常的结果或检测该内容的威胁信号。
      en: Excludes ordinary error output, merely malformed results, and the threat signal that detected the content.
      ja: 通常のエラー出力、単なる形式異常、内容を検出した脅威信号は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-malicious-tool-output-013
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PoisonedRetrievedChunk
    shared_parent_concept_id: PoisonedContent
    differentia:
      zh: 共享父节点对照：父节点 PoisonedContent：MaliciousToolOutput（semantic kind=information，骨架 MaliciousToolOutput-is_a-PoisonedContent）；PoisonedRetrievedChunk（semantic kind=information，骨架 PoisonedRetrievedChunk-is_a-PoisonedContent）。双端条件：MaliciousToolOutput 条件：“作为受污染内容，恶意工具输出由这一事实区分：它记录来自工具、资源、沙箱或远程智能体的输出，其中包含不可信指令、外泄线索、策略绕过尝试、欺骗性工具引导或提示注入内容”；PoisonedRetrievedChunk 条件：“被投毒检索分块是一种受污染内容；其区分条件是：它标识含有不安全指令、误导性元数据、污点片段或提示注入内容的记忆或文档分块”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent PoisonedContent: MaliciousToolOutput (semantic kind=information, backbone MaliciousToolOutput-is_a-PoisonedContent); PoisonedRetrievedChunk (semantic kind=information, backbone PoisonedRetrievedChunk-is_a-PoisonedContent). Endpoint conditions: MaliciousToolOutput condition: “Malicious tool output belongs to the poisoned content category and differs from broader members in that it records tool, resource, sandbox, or remote-agent output that carries untrusted instructions, exfiltration cues, policy-bypass attempts, deceptive tool guidance, or prompt-injection content”; PoisonedRetrievedChunk condition: “As a poisoned content, Poisoned retrieved chunk is distinguished by the fact that it identifies a retrieved memory or document chunk that contains unsafe instructions, misleading metadata, tainted spans, or prompt-injection content”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 PoisonedContent：MaliciousToolOutput（semantic kind=information、バックボーン MaliciousToolOutput-is_a-PoisonedContent）；PoisonedRetrievedChunk（semantic kind=information、バックボーン PoisonedRetrievedChunk-is_a-PoisonedContent）。両端条件：MaliciousToolOutput の条件：「悪意あるツール出力は汚染内容として、次の条件により他の対象と区別されます：それは、ツール、リソース、サンドボックス、遠隔エージェントからの出力のうち、不信頼の指示、持ち出しの手掛かり、ポリシー回避、欺瞞的なツール誘導、プロンプト注入内容を含むものを記録します」；PoisonedRetrievedChunk の条件：「汚染内容に属する汚染された検索チャンクは、次の事実を種差とします：それは、安全でない指示、誤誘導メタデータ、汚染範囲、プロンプト注入内容を含むメモリまたは文書チャンクを識別します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-malicious-tool-output-014
