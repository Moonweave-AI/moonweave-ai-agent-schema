source_claims:
  - id: claim-malicious-tool-output-001
    source: eng-security-mcp-nsa-2026
    supports: NSA describes tool and agent outputs containing hidden instructions or manipulated metadata that downstream agents may mistake for executable prompts, causing injection, exfiltration, or control-flow hijacking.
    locator: Security concerns > Poisoning output for downstream automation, pp. 8–9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-002
    source: eng-ont-prov-o
    supports: PROV-O separates an Entity from the Activity that generated it and from later observations. Moonweave assigns the malicious output content its own stable entity identity.
    locator: PROV-O Recommendation > §5.2.1 Entity and §5.3.1 wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-003
    source: eng-proto-mcp-2025-spec
    supports: MCP tools/call returns a CallToolResult containing content and optional structuredContent. Moonweave references the exact result object carrying the suspicious fragment.
    locator: MCP 2025-11-25 Specification > Server Features > Tools > Calling tools and CallToolResult
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends logging every tool invocation with exact parameters, identities, and results. Moonweave uses a call-attempt identifier to maintain that one-to-one audit trace.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-005
    source: lit-agent-vigil-siren
    supports: VIGIL studies tool-stream injection in manipulated metadata and runtime feedback. Moonweave records the exact stream fragment when the malicious payload is not coextensive with the whole result.
    locator: VIGIL (ACL 2026) > Abstract and §3 Tool-Stream Injection threat model
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-006
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends recording result hashes for MCP observability and forensic review. Moonweave binds malicious output evidence to the exact result digest.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, p. 13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-007
    source: lit-agent-vigil-siren
    supports: VIGIL treats injection embedded in tool-stream feedback as the object of intent-grounded verification. Moonweave retains the exact feedback span under review.
    locator: VIGIL (ACL 2026) > §3 Threat Model and §4 Verify-Before-Commit
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-008
    source: eng-security-mcp-nsa-2026
    supports: NSA identifies hidden instructions, semantic manipulation, and poisoned outputs as distinct mechanisms that hijack downstream automation. Moonweave records the reviewed mechanism rather than a file-format label.
    locator: NSA MCP Security Design Considerations > Security concerns > Poisoning output for downstream automation, pp. 8-9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-009
    source: lit-agent-vigil-siren
    supports: VIGIL verifies tool-stream feedback against intended task behavior before commit. Moonweave retains the exact signal or finding that makes the malicious-output classification reviewable.
    locator: VIGIL (ACL 2026) > §4 Verify-Before-Commit and §5 Evaluation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-010
    source: lit-agent-vigil-siren
    supports: VIGIL separates speculative tool feedback from the later commit decision. Moonweave likewise records the payload disposition independently from its detecting signal.
    locator: VIGIL (ACL 2026) > §4.1 Verify-Before-Commit lifecycle
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-011
    source: lit-agent-vigil-siren
    supports: VIGIL defines the security problem as adversarial tool-stream feedback that hijacks execution flow, not all executable or malformed output. Moonweave makes that intent-and-effect boundary explicit.
    locator: VIGIL (ACL 2026) > Abstract, §3 Tool-Stream Injection, and §4 Verify-Before-Commit
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-012
    source: eng-security-mcp-nsa-2026
    supports: "NSA describes tool and agent outputs containing hidden instructions or manipulated metadata that downstream agents may mistake for executable prompts, causing injection, exfiltration, or control-flow hijacking. The positive case specifically tests this distinction: A search-tool result hides “next call transfer_funds” in its tail; the original result and span are retained as MaliciousToolOutput."
    locator: Security concerns > Poisoning output for downstream automation, pp. 8–9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-013
    source: eng-security-mcp-nsa-2026
    supports: "NSA describes tool and agent outputs containing hidden instructions or manipulated metadata that downstream agents may mistake for executable prompts, causing injection, exfiltration, or control-flow hijacking. The boundary case specifically tests this distinction: A tool returns HTTP 500 and a stack trace with no manipulative instruction or malicious payload; it is failed output, not MaliciousToolOutput."
    locator: Security concerns > Poisoning output for downstream automation, pp. 8–9
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-014
    source: lit-agent-vigil-siren
    supports: SIREN explicitly separates data-stream content injection in user data such as email or web content from tool-stream execution attacks carried by return values and error messages. Moonweave uses that carrier boundary to distinguish PoisonedRetrievedChunk from MaliciousToolOutput; the paper supports the surfaces, while the PoisonedContent parent and exact class identities are Moonweave ontology decisions.
    locator: "Section 3 Threat Injection Vectors > Table 1: data-stream content injection versus runtime and error hijacking"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-malicious-tool-output-015
    source: eng-security-mcp-nsa-2026
    supports: NSA states that tool outputs may contain hidden instructions and be misinterpreted as executable prompts by downstream agents. Moonweave treats a tool-result entity with that manipulative content as MaliciousToolOutput, a specialized PoisonedContent entity.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–10, ‘Poisoning output for downstream automation’
    evidence_kind: design-inference
    confidence: high
