schema: moonweave.ai/ontology-node/v1
id: ToolSchemaPoisoning
kind: concept
status: accepted
labels:
  en: tool definition poisoning
  zh: 工具定义投毒
  ja: ツール定義汚染
semantics:
  short_definition:
    zh: 敌对者改变工具 schema、默认值或说明以操纵调用的资源内容投毒事件。
    en: A resource-content poisoning event that alters a tool schema, default, or description to manipulate invocation.
    ja: ツール schema、既定値、説明を変更し呼出しを操作する資源内容汚染イベント。
  definition:
    zh: 工具定义投毒是一种 ResourceContentPoisoning：工具名称、描述、注解、输入或输出 schema、默认值或能力声明被恶意插入、替换，或在后续连接中延迟切换，并且前后定义、变更来源和受影响内容均可核验。它记录变更事件，不等于被投毒的定义文本；经签名、评审且与发布说明一致的正常演进不属于本类。
    en: Tool definition poisoning is ResourceContentPoisoning in which a tool name, description, annotation, input or output schema, default, or capability claim is maliciously inserted, replaced, or switched on a later connection, with verifiable before/after definitions, change source, and affected content. It records the change occurrence rather than the poisoned definition text; signed, reviewed evolution consistent with release documentation is outside this class.
    ja: ツール定義汚染は、ツール名、説明、注釈、入出力 schema、既定値、能力表明が悪意をもって挿入・置換され、または後続接続で遅延切替され、前後定義・変更元・影響内容を検証できる ResourceContentPoisoning です。変更イベントを記録し、汚染定義テキストそのものではありません。署名・審査済みで公開説明に一致する通常更新は含みません。
  why_needed:
    zh: 把变更事件与受污染定义分开，可审计何时由谁改变并支持版本回滚。
    en: Separating the change event from the poisoned definition supports actor/time attribution and version rollback.
    ja: 変更イベントと被汚染定義を分け、誰がいつ変更したかの監査と版ロールバックを可能にします。
  includes:
    - zh: 包含工具身份、前后版本、恶意变更范围、操作者或来源服务器、时间和受影响内容。
      en: Includes tool identity, before-and-after versions, malicious change span, actor or source server, time, and affected content.
      ja: ツール同一性、前後版、悪意変更範囲、実行者または出所サーバー、時刻、影響内容を含みます。
  excludes:
    - zh: 不包含经评审的兼容 schema 升级、静态 PoisonedToolDescription 或低信任评估。
      en: Excludes reviewed compatible schema upgrades, the static PoisonedToolDescription, and low-trust assessments.
      ja: 審査済み互換 schema 更新、静的 PoisonedToolDescription、低信頼評価は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - poisoning_event_id
  fields:
    - id: poisoning_event_id
      labels:
        zh: 工具定义投毒事件标识
        en: tool-definition poisoning event ID
        ja: ツール定義汚染イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次工具定义恶意变更，并与受影响的工具定义版本和扫描发现保持独立。
        en: Stable identifier for one malicious tool-definition change, independent of both the affected definition version and any scan finding.
        ja: 一回の悪意あるツール定義変更を安定識別し、影響定義版や走査所見の ID とは分離します。
      allowed_values: []
      pattern: null
      example_value: poisoning/tool-server-9/read-file/second-connect
      source_claims:
        - claim-tool-schema-poisoning-002
    - id: tool_definition_ref
      labels:
        zh: 工具定义引用
        en: tool-definition reference
        ja: ツール定義参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用名称、描述和 schema 被检查的具体工具定义，不以服务器名称代替工具身份。
        en: Reference to the concrete tool definition whose name, description, and schema were examined; a server name does not substitute for tool identity.
        ja: 名称・説明・schema を検査した具体的ツール定義を参照し、サーバー名でツール同一性を代用しません。
      allowed_values: []
      pattern: null
      example_value: mcp://server-9/tools/read_file
      source_claims:
        - claim-tool-schema-poisoning-003
    - id: tool_definition_version
      labels:
        zh: 工具定义版本
        en: tool-definition version
        ja: ツール定義版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定发生恶意变更后的定义版本、摘要或不可变快照，避免把后续修复版误认为受影响版。
        en: Version, digest, or immutable snapshot of the definition after the malicious change, preventing a later repaired definition from being mistaken for the affected version.
        ja: 悪意変更後の定義版・digest・不変 snapshot を固定し、後の修正版を影響版と誤認しないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:tooldef-b41f
      source_claims:
        - claim-tool-schema-poisoning-004
    - id: server_id
      labels:
        zh: 来源服务器标识
        en: source server ID
        ja: 出所サーバー ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识提供该版本工具定义的 MCP 或等价能力服务器，用于区分同名工具的不同信任边界。
        en: Identifier of the MCP or equivalent capability server that supplied this tool-definition version, distinguishing same-named tools across trust boundaries.
        ja: このツール定義版を供給した MCP 等の能力サーバーを識別し、信頼境界が異なる同名ツールを区別します。
      allowed_values: []
      pattern: null
      example_value: mcp-server://server-9
      source_claims:
        - claim-tool-schema-poisoning-005
    - id: changed_schema_paths
      labels:
        zh: 已变更定义路径
        en: changed definition paths
        ja: 変更定義パス
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 用 JSON Pointer 或等价路径列出名称、描述、schema、默认值或注解中实际被改变的字段。
        en: JSON Pointers or equivalent paths identifying the name, description, schema, default, or annotation fields that actually changed.
        ja: 名称、説明、schema、既定値、注釈で実際に変更された項目を JSON Pointer 等のパスで列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - /inputSchema/properties/path/default
        - /description
      source_claims:
        - claim-tool-schema-poisoning-006
    - id: change_source_ref
      labels:
        zh: 变更来源引用
        en: change-source reference
        ja: 変更元参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用交付这次定义差异的通知、list/tools 响应、提交、包或审计事件，而不是仅记录推测来源。
        en: Reference to the notification, list/tools response, commit, package, or audit event that delivered the definition difference, rather than a guessed origin.
        ja: 定義差分を配送した通知、list/tools 応答、commit、package、監査 event を参照し、推測元だけを記録しません。
      allowed_values: []
      pattern: null
      example_value: mcp-response://session-77/tools-list/2
      source_claims:
        - claim-tool-schema-poisoning-007
  constraints:
    - id: tool-definition-poisoning-requires-malicious-version-difference
      severity: error
      expression_language: plain
      expression: changed_schema_paths is non-empty and change_source_ref proves a definition version change whose reviewed evidence is adversarial rather than ordinary compatible evolution
      explanations:
        zh: 必须定位实际变化字段、交付该变化的来源，并有证据表明它用于欺骗能力、扩大权限或注入指令；有签名、经评审且与发布说明一致的兼容更新应拒绝投毒分类。
        en: The changed fields and their delivery source must be located, with evidence that the change deceives capability, expands authority, or injects instructions. A signed, reviewed compatible update matching release documentation must be rejected as poisoning.
        ja: 実変更項目と配送元を特定し、能力欺瞞・権限拡大・指示注入を示す証拠が必要です。署名・審査済みで公開説明に一致する互換更新は汚染分類を拒否します。
      source_claims:
        - claim-tool-schema-poisoning-008
  required_relation_constraints: []
