schema: moonweave.ai/ontology-node/v1
id: ResourceContentPoisoning
kind: concept
labels:
  en: resource content poisoning
  zh: 资源内容投毒
  ja: リソース内容汚染
semantics:
  short_definition:
    zh: 敌对者向 agent 可读资源引入操纵载荷的可审计投毒事件。
    en: An auditable poisoning event where an adversary introduces a manipulation payload into an agent-readable resource.
    ja: 攻撃者が agent 可読 resource に manipulation payload を導入した監査可能 poisoning event。
  definition:
    zh: ResourceContentPoisoning 记录 poisoning_event_id、resource_ref、before/after version、occurred_at 与 actor/process；它关联 PoisonedContent 但不等于被污染对象。CVE-2025-53773 的 settings.json 篡改与 MCP 恶意 tools/list 更新是典型事件。
    en: ResourceContentPoisoning records poisoning_event_id, resource_ref, before/after version, occurred_at, and actor/process, linking PoisonedContent without equaling the contaminated object. CVE-2025-53773 settings.json tampering and malicious MCP tools/list updates are typical events.
    ja: ResourceContentPoisoning は poisoning_event_id/resource_ref/before-after version/occurred_at/actor を記録し PoisonedContent に link するが汚染 object 自体ではない。CVE-2025-53773 settings.json 改ざんと MCP 悪意 tools/list 更新が典型 event。
  why_needed:
    zh: 事件身份支持攻击时间线，内容身份支持隔离；Copilot RCE 调查需要二者分离。
    en: Event identity supports attack timeline; content identity supports quarantine—Copilot RCE investigation requires both separated.
    ja: event identity は attack timeline、content identity は quarantine を支え Copilot RCE 調査は両者分離が必要。
  includes:
    - zh: 包含资源、投毒前后版本、发生时间、操作者或过程以及受影响内容引用。
      en: Includes the resource, before-and-after versions, occurrence time, actor or process, and affected-content reference.
      ja: 資源、前後版、発生時刻、実行者または過程、影響内容参照を含みます。
  excludes:
    - zh: 不包含自然内容编辑、被污染内容本身或只有怀疑而无变更证据的信号。
      en: Excludes ordinary content editing, the contaminated content itself, and a signal with suspicion but no evidence of a change event.
      ja: 通常の内容編集、汚染内容そのもの、変更イベント証拠のない疑い信号は含みません。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: ResourceContentPoisoning-affects-PoisonedContent 边在变更证据存在时成立；ingestion 加载不可信资源不等于 poisoning 事件。
    en: ResourceContentPoisoning-affects-PoisonedContent holds only with change evidence; ingesting untrusted resources is not poisoning.
    ja: 変更証拠がある場合のみ ResourceContentPoisoning-affects-PoisonedContent。untrusted resource ingestion は poisoning ではない。
  typical_input:
    - description: Detected adversarial content change.
      format: before_version_ref + after_version_ref + malicious diff evidence
      source_claims:
        - claim-resourcecontentpoisoning-design
  typical_output:
    - description: Poisoning event with affected content link.
      format: '{"poisoning_event_id":"poisoning/settings-53773","resource_ref":"resource://repo/.vscode/settings.json"}'
      source_claims:
        - claim-resourcecontentpoisoning-design
  reference_implementations:
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: POST /v1/moderations category flags at ingress boundaries.
    - name: Azure AI Content Safety Prompt Shield
      url: https://learn.microsoft.com/en-us/azure/ai-services/content-safety/quickstart-jailbreak
      description: shieldPrompt attackDetected for user prompts and RAG documents.
    - name: NVIDIA NeMo Guardrails
      url: https://docs.nvidia.com/nemo/guardrails/
      description: Colang 2.0 input rails and action rails.
    - name: Guardrails AI
      url: https://www.guardrailsai.com/docs/hub/how_to_guides/input_validation
      description: DetectPromptInjectionValidator and Guard class.
    - name: AgentSentry (arXiv:2602.22724)
      url: https://arxiv.org/abs/2602.22724
      description: Temporal causal diagnostics for indirect injection via tool outputs.
    - name: ReasAlign (arXiv:2601.10173)
      url: https://arxiv.org/abs/2601.10173
      description: Reasoning-enhanced safety alignment with utility/ASR metrics.
structure:
  identity_keys:
    - poisoning_event_id
  fields:
    - id: poisoning_event_id
      labels:
        zh: 投毒事件标识
        en: poisoning event ID
        ja: 汚染イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次可审计的资源内容变更发生，不复用被污染内容或扫描结果的标识。
        en: Stable identifier for one auditable resource-content change occurrence; it never reuses the poisoned-content or scan-result identifier.
        ja: 監査可能な一回の資源内容変更を安定識別し、汚染内容や走査結果の ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: poisoning/kb-17/2026-07-14T10:08:00Z
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: resource_ref
      labels:
        zh: 资源引用
        en: resource reference
        ja: 資源参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际被修改的网页、文件、知识库条目或工具定义资源，并固定其资源身份。
        en: Reference to the webpage, file, knowledge-base entry, or tool-definition resource that was actually modified, fixing the resource identity.
        ja: 実際に変更されたウェブ、ファイル、知識庫項目、ツール定義資源を指し、その資源同一性を固定します。
      allowed_values: []
      pattern: null
      example_value: kb://security/playbook/document-17
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: before_version_ref
      labels:
        zh: 变更前版本
        en: before-version reference
        ja: 変更前版参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向投毒发生前可恢复或可核验的资源版本，用于证明具体内容差异。
        en: Reference to a recoverable or verifiable resource version before the poisoning occurrence, used to establish the concrete content difference.
        ja: 汚染発生前の復元・検証可能な資源版を指し、具体的な内容差分を立証します。
      allowed_values: []
      pattern: null
      example_value: kb://security/playbook/document-16#sha256:7c4a
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: after_version_ref
      labels:
        zh: 变更后版本
        en: after-version reference
        ja: 変更後版参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含所述敌对改动的资源版本；该引用必须与变更前版本可比较且不可相同。
        en: Reference to the resource version containing the asserted adversarial change; it must be comparable with and distinct from the before version.
        ja: 主張された敵対的変更を含む資源版を指し、変更前版と比較可能かつ同一ではない必要があります。
      allowed_values: []
      pattern: null
      example_value: kb://security/playbook/document-17#sha256:b942
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: actor_or_process_ref
      labels:
        zh: 操作者或过程引用
        en: actor or process reference
        ja: 実行者・過程参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行、代理或归因于此次写入的主体或过程；未知时必须引用明确的未知主体记录而非留空。
        en: Reference to the actor or process that performed, mediated, or is attributed the write; an explicit unknown-actor record is required when attribution is unresolved.
        ja: 書込みを実行・仲介した、または帰属された主体・過程を参照し、帰属未解決時も空欄ではなく明示的な unknown actor 記録を使います。
      allowed_values: []
      pattern: null
      example_value: principal://external-editor-44
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 资源改动实际生效或首次可证发生的 UTC 时间，不以检测器后来发现它的时间替代。
        en: UTC instant when the resource change took effect or is first evidenced to have occurred, not the later time at which a detector discovered it.
        ja: 資源変更が実効化した、または最初に発生を立証できる UTC 時刻で、後の検出時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:08:00.000Z
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: changed_spans
      labels:
        zh: 变更片段
        en: changed spans
        ja: 変更範囲
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出前后版本之间被插入、替换或隐藏的可重放位置与摘要，每项绑定对应资源版本。
        en: Replayable locations and digests for spans inserted, replaced, or hidden between the two versions, each bound to the applicable resource version.
        ja: 二版間で挿入・置換・隠蔽された範囲の再現可能な位置と digest を列挙し、各項目を該当資源版へ結びます。
      allowed_values: []
      pattern: null
      example_value:
        - locator: css:#hidden-note chars:0..96
          before_digest: null
          after_digest: sha256:53ee
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: affected_content_ids
      labels:
        zh: 受影响内容标识
        en: affected-content IDs
        ja: 影響内容 ID
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出由此次事件实际影响的 PoisonedContent 标识，不把同资源中的未受影响内容一并纳入。
        en: Identifiers of PoisonedContent objects actually affected by this occurrence, excluding unaffected content that merely shares the resource.
        ja: この発生で実際に影響された PoisonedContent の ID を列挙し、同じ資源にあるだけの非影響内容は含めません。
      allowed_values: []
      pattern: null
      example_value:
        - poisoned-content/kb-document-17/hidden-note
      source_claims:
        - claim-resourcecontentpoisoning-design
    - id: evidence_refs
      labels:
        zh: 事件证据引用
        en: event evidence references
        ja: イベント証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用支持写入时间、操作者、版本差异与恶意性质的审计记录、签名、日志或取证材料。
        en: References to audit records, signatures, logs, or forensic material supporting write time, actor attribution, version difference, and adversarial character.
        ja: 書込み時刻、実行者帰属、版差分、敵対性を裏付ける監査記録、署名、ログ、フォレンジック資料を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - audit://kb/commit-884
        - finding://injection/scan-204
      source_claims:
        - claim-resourcecontentpoisoning-design
  constraints:
    - id: resource-content-poisoning-requires-differenced-change-evidence
      severity: error
      expression_language: plain
      expression: before_version_ref != after_version_ref and changed_spans is non-empty and evidence_refs establishes the write occurrence
      explanations:
        zh: 只有可比较且不同的前后版本、至少一个定位变更和发生证据同时存在时，才可断言投毒事件；仅发现恶意内容不足以回推写入发生。
        en: Assert the poisoning event only when distinct comparable before/after versions, at least one located change, and occurrence evidence are all present; finding malicious content alone cannot reconstruct the write event.
        ja: 比較可能で異なる前後版、少なくとも一つの位置付き変更、発生証拠が揃う場合だけ汚染イベントを主張し、悪意内容の発見だけで書込み発生を逆推定しません。
      source_claims:
        - claim-resourcecontentpoisoning-design
  required_relation_constraints:
    - id: resource-content-poisoning-affects-at-least-one-content
      direction: outgoing
      predicate: affects
      target_concept_id: PoisonedContent
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个可实例化的资源内容投毒事件至少关联一个实际受影响的 PoisonedContent。
        en: Every instantiated resource-content-poisoning event links to at least one PoisonedContent object it actually affected.
        ja: 実体化された各資源内容汚染イベントは、実際に影響した少なくとも一つの PoisonedContent へ接続します。
      source_claims:
        - claim-resourcecontentpoisoning-design
