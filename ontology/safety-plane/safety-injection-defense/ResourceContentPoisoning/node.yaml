review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OWASP LLM01:2025、NIST AI 100-2e2025 与间接注入/污点跟踪研究逐项人工语义核验；定义、层次、关系与案例边界成立。
    en: Manually verified against OWASP LLM01:2025, NIST AI 100-2e2025, and indirect-injection/taint-tracking research; definitions, hierarchy, relations, and example boundaries hold.
    ja: OWASP LLM01:2025、NIST AI 100-2e2025、indirect-injection/taint-tracking research に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-resource-content-poisoning-001
    source: eng-security-nist-ai-100-2e2025
    supports: NIST describes third parties controlling resources and placing malicious content in RAG knowledge bases or other resources to inject prompts; Moonweave reifies the content-changing occurrence separately from its output.
    locator: Section 3.4 Indirect Prompt Injection, pp. 50–52; resource control and malicious resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-002
    source: eng-ont-prov-o
    supports: PROV-O identifies an Activity independently from the Entities it uses or generates. Moonweave applies that first-party provenance distinction to give the poisoning occurrence its own stable identifier.
    locator: PROV-O Recommendation > §5.2.3 Activity and §5.3.1 wasGeneratedBy
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-003
    source: eng-security-nist-ai-100-2e2025
    supports: NIST locates indirect prompt injection in attacker-controlled external resources, including RAG knowledge resources. Moonweave therefore requires the changed resource to be explicitly referenced.
    locator: NIST AI 100-2e2025 > §3.4 Indirect Prompt Injection Attacks, pp. 62-65
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-004
    source: eng-ont-prov-o
    supports: PROV-O specialization and revision relations distinguish versioned Entities and their revision lineage. Moonweave uses the earlier entity reference as the before state of the recorded change.
    locator: PROV-O Recommendation > §5.5.1 specializationOf and §5.5.3 wasRevisionOf
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-005
    source: eng-ont-prov-o
    supports: PROV-O models a revision as a distinct Entity derived from an earlier Entity. Moonweave records that later entity as the after-version evidence rather than overwriting provenance.
    locator: PROV-O Recommendation > §5.5.3 wasRevisionOf and §5.3.2 wasDerivedFrom
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-006
    source: eng-ont-prov-o
    supports: PROV-O qualified association connects an Activity with the Agent bearing responsibility and permits role qualification. Moonweave uses a reference so unresolved attribution remains explicit.
    locator: PROV-O Recommendation > §5.3.3 wasAssociatedWith and §5.3.6 qualifiedAssociation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-007
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model distinguishes event Timestamp from ObservedTimestamp. Moonweave uses the event-time meaning for when the poisoning change occurred.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp and ObservedTimestamp
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-008
    source: eng-security-owasp-llm01-2025
    supports: OWASP documents indirect and multimodal prompt injections that may be hidden in external content. Moonweave requires an exact changed-span locator so hidden payload evidence remains reviewable.
    locator: OWASP LLM01:2025 > Types of Prompt Injection Vulnerabilities > Indirect and multimodal injections
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-009
    source: eng-security-nist-ai-100-2e2025
    supports: NIST distinguishes malicious external resources and the injected content that affects downstream model behavior. Moonweave records explicit affected-content identifiers rather than extending contamination to the whole resource by proximity.
    locator: NIST AI 100-2e2025 > §3.4 and §3.4.2 Indirect Prompt Injection, pp. 62-65
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-010
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends logging tool and model invocations with identities, parameters, results, and hashes for detection and investigation. Moonweave requires those exact evidence references on a poisoning event.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-011
    source: eng-ont-prov-o
    supports: PROV-O keeps activity occurrence, entity revision, derivation, and attribution as distinct assertions. Moonweave combines those first-party provenance primitives into a refusal rule for unproved poisoning events.
    locator: PROV-O Recommendation > §5.2.3 Activity, §5.3.2 Derivation, and §5.5.3 Revision
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-012
    source: eng-security-nist-ai-100-2e2025
    supports: NIST describes malicious content placed in controlled resources to influence downstream AI behavior. Moonweave requires the event to identify at least one affected content object rather than remaining an ungrounded attack label.
    locator: NIST AI 100-2e2025 > §3.4 Indirect Prompt Injection Attacks, pp. 62-65
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-013
    source: eng-security-nist-ai-100-2e2025
    supports: "NIST describes third parties controlling resources and placing malicious content in RAG knowledge bases or other resources to inject prompts; Moonweave reifies the content-changing occurrence separately from its output. The positive case specifically tests this distinction: An attacker changes knowledge-base document v17 by adding an exfiltration instruction in a hidden paragraph; the event records v16→v17, committer, and affected chunk."
    locator: Section 3.4 Indirect Prompt Injection, pp. 50–52; resource control and malicious resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-content-poisoning-014
    source: eng-security-nist-ai-100-2e2025
    supports: "NIST describes third parties controlling resources and placing malicious content in RAG knowledge bases or other resources to inject prompts; Moonweave reifies the content-changing occurrence separately from its output. The boundary case specifically tests this distinction: A scan finds a malicious sentence but has no evidence of when or how it was written; PoisonedContent can be asserted, but a ResourceContentPoisoning event cannot yet be instantiated."
