schema: moonweave.ai/ontology-node/v1
id: ResourceContentPoisoning
kind: concept
status: accepted
labels:
  en: resource content poisoning
  zh: 资源内容投毒
  ja: リソース内容汚染
semantics:
  short_definition:
    zh: 敌对者向可被代理读取的资源引入操纵载荷的投毒事件。
    en: A poisoning event in which an adversary introduces a manipulation payload into a resource readable by an agent.
    ja: 攻撃者がエージェント可読資源へ操作ペイロードを導入する汚染イベント。
  definition:
    zh: 资源内容投毒是一种事件，记录谁或什么过程在何时把敌对内容插入、替换或隐藏于网页、文件、知识库条目、工具元数据等可读取资源，并关联投毒前后版本和受影响 PoisonedContent。它是发生过程，不是被污染的信息对象。
    en: ResourceContentPoisoning is an event recording who or what process inserted, replaced, or hid adversarial content in an agent-readable resource such as a webpage, file, knowledge-base entry, or tool metadata, with before-and-after versions and affected PoisonedContent linked. It is the occurrence, not the contaminated information object.
    ja: 資源内容汚染は、誰またはどの過程が、いつ、ウェブ、ファイル、知識庫項目、ツールメタデータなどの可読資源へ敵対内容を挿入・置換・隠蔽したかを、前後版と影響 PoisonedContent へのリンク付きで記録するイベントです。汚染情報対象そのものではありません。
  why_needed:
    zh: 事件身份用于追溯攻击入口和时间线，而内容身份用于隔离载荷，两者不可混为一类。
    en: The event identity supports attack-entry and timeline analysis while the content identity supports payload quarantine; they must remain distinct.
    ja: イベント同一性は攻撃入口と時間線の分析に、内容同一性はペイロード隔離に使うため、両者を同一分類にできません。
  includes:
    - zh: 包含资源、投毒前后版本、发生时间、操作者或过程以及受影响内容引用。
      en: Includes the resource, before-and-after versions, occurrence time, actor or process, and affected-content reference.
      ja: 資源、前後版、発生時刻、実行者または過程、影響内容参照を含みます。
  excludes:
    - zh: 不包含自然内容编辑、被污染内容本身或只有怀疑而无变更证据的信号。
      en: Excludes ordinary content editing, the contaminated content itself, and a signal with suspicion but no evidence of a change event.
      ja: 通常の内容編集、汚染内容そのもの、変更イベント証拠のない疑い信号は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - poisoning_event_id
  fields:
    - id: poisoning_event_id
      labels:
        zh: 投毒事件标识
        en: poisoning event ID
        ja: 汚染イベント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次可审计的资源内容变更发生，不复用被污染内容或扫描结果的标识。
        en: Stable identifier for one auditable resource-content change occurrence; it never reuses the poisoned-content or scan-result identifier.
        ja: 監査可能な一回の資源内容変更を安定識別し、汚染内容や走査結果の ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: poisoning/kb-17/2026-07-14T10:08:00Z
      source_claims:
        - claim-resource-content-poisoning-002
    - id: resource_ref
      labels:
        zh: 资源引用
        en: resource reference
        ja: 資源参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际被修改的网页、文件、知识库条目或工具定义资源，并固定其资源身份。
        en: Reference to the webpage, file, knowledge-base entry, or tool-definition resource that was actually modified, fixing the resource identity.
        ja: 実際に変更されたウェブ、ファイル、知識庫項目、ツール定義資源を指し、その資源同一性を固定します。
      allowed_values: []
      pattern: null
      example_value: kb://security/playbook/document-17
      source_claims:
        - claim-resource-content-poisoning-003
    - id: before_version_ref
      labels:
        zh: 变更前版本
        en: before-version reference
        ja: 変更前版参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向投毒发生前可恢复或可核验的资源版本，用于证明具体内容差异。
        en: Reference to a recoverable or verifiable resource version before the poisoning occurrence, used to establish the concrete content difference.
        ja: 汚染発生前の復元・検証可能な資源版を指し、具体的な内容差分を立証します。
      allowed_values: []
      pattern: null
      example_value: kb://security/playbook/document-16#sha256:7c4a
      source_claims:
        - claim-resource-content-poisoning-004
    - id: after_version_ref
      labels:
        zh: 变更后版本
        en: after-version reference
        ja: 変更後版参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向包含所述敌对改动的资源版本；该引用必须与变更前版本可比较且不可相同。
        en: Reference to the resource version containing the asserted adversarial change; it must be comparable with and distinct from the before version.
        ja: 主張された敵対的変更を含む資源版を指し、変更前版と比較可能かつ同一ではない必要があります。
      allowed_values: []
      pattern: null
      example_value: kb://security/playbook/document-17#sha256:b942
      source_claims:
        - claim-resource-content-poisoning-005
    - id: actor_or_process_ref
      labels:
        zh: 操作者或过程引用
        en: actor or process reference
        ja: 実行者・過程参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行、代理或归因于此次写入的主体或过程；未知时必须引用明确的未知主体记录而非留空。
        en: Reference to the actor or process that performed, mediated, or is attributed the write; an explicit unknown-actor record is required when attribution is unresolved.
        ja: 書込みを実行・仲介した、または帰属された主体・過程を参照し、帰属未解決時も空欄ではなく明示的な unknown actor 記録を使います。
      allowed_values: []
      pattern: null
      example_value: principal://external-editor-44
      source_claims:
        - claim-resource-content-poisoning-006
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 资源改动实际生效或首次可证发生的 UTC 时间，不以检测器后来发现它的时间替代。
        en: UTC instant when the resource change took effect or is first evidenced to have occurred, not the later time at which a detector discovered it.
        ja: 資源変更が実効化した、または最初に発生を立証できる UTC 時刻で、後の検出時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:08:00.000Z
      source_claims:
        - claim-resource-content-poisoning-007
    - id: changed_spans
      labels:
        zh: 变更片段
        en: changed spans
        ja: 変更範囲
      datatype: array
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出前后版本之间被插入、替换或隐藏的可重放位置与摘要，每项绑定对应资源版本。
        en: Replayable locations and digests for spans inserted, replaced, or hidden between the two versions, each bound to the applicable resource version.
        ja: 二版間で挿入・置換・隠蔽された範囲の再現可能な位置と digest を列挙し、各項目を該当資源版へ結びます。
      allowed_values: []
      pattern: null
      example_value:
        - locator: css:#hidden-note chars:0..96
          before_digest: null
          after_digest: sha256:53ee
      source_claims:
        - claim-resource-content-poisoning-008
    - id: affected_content_ids
      labels:
        zh: 受影响内容标识
        en: affected-content IDs
        ja: 影響内容 ID
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出由此次事件实际影响的 PoisonedContent 标识，不把同资源中的未受影响内容一并纳入。
        en: Identifiers of PoisonedContent objects actually affected by this occurrence, excluding unaffected content that merely shares the resource.
        ja: この発生で実際に影響された PoisonedContent の ID を列挙し、同じ資源にあるだけの非影響内容は含めません。
      allowed_values: []
      pattern: null
      example_value:
        - poisoned-content/kb-document-17/hidden-note
      source_claims:
        - claim-resource-content-poisoning-009
    - id: evidence_refs
      labels:
        zh: 事件证据引用
        en: event evidence references
        ja: イベント証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用支持写入时间、操作者、版本差异与恶意性质的审计记录、签名、日志或取证材料。
        en: References to audit records, signatures, logs, or forensic material supporting write time, actor attribution, version difference, and adversarial character.
        ja: 書込み時刻、実行者帰属、版差分、敵対性を裏付ける監査記録、署名、ログ、フォレンジック資料を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - audit://kb/commit-884
        - finding://injection/scan-204
      source_claims:
        - claim-resource-content-poisoning-010
  constraints:
    - id: resource-content-poisoning-requires-differenced-change-evidence
      severity: error
      expression_language: plain
      expression: before_version_ref != after_version_ref and changed_spans is non-empty and evidence_refs establishes the write occurrence
      explanations:
        zh: 只有可比较且不同的前后版本、至少一个定位变更和发生证据同时存在时，才可断言投毒事件；仅发现恶意内容不足以回推写入发生。
        en: Assert the poisoning event only when distinct comparable before/after versions, at least one located change, and occurrence evidence are all present; finding malicious content alone cannot reconstruct the write event.
        ja: 比較可能で異なる前後版、少なくとも一つの位置付き変更、発生証拠が揃う場合だけ汚染イベントを主張し、悪意内容の発見だけで書込み発生を逆推定しません。
      source_claims:
        - claim-resource-content-poisoning-011
  required_relation_constraints:
    - id: resource-content-poisoning-affects-at-least-one-content
      direction: outgoing
      predicate: affects
      target_concept_id: PoisonedContent
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每个可实例化的资源内容投毒事件至少关联一个实际受影响的 PoisonedContent。
        en: Every instantiated resource-content-poisoning event links to at least one PoisonedContent object it actually affected.
        ja: 実体化された各資源内容汚染イベントは、実際に影響した少なくとも一つの PoisonedContent へ接続します。
      source_claims:
        - claim-resource-content-poisoning-012
examples:
  - id: ResourceContentPoisoning-manual-positive-20260714
    kind: positive
    labels:
      zh: 资源内容投毒正例
      en: Positive case for resource content poisoning
      ja: リソース内容汚染の正例
    scenario_id: null
    descriptions:
      zh: 攻击者修改知识库文档 v17，在隐藏段落加入外传指令；事件记录 v16→v17、提交者和受影响分块。
      en: An attacker changes knowledge-base document v17 by adding an exfiltration instruction in a hidden paragraph; the event records v16→v17, committer, and affected chunk.
      ja: 攻撃者が知識庫文書 v17 の隠し段落へ流出指示を追加し、イベントが v16→v17、更新者、影響断片を記録します。
    field_values:
      poisoning_event_id: poisoning/kb-17/2026-07-14T10:08:00Z
      resource_ref: kb://security/playbook/document-17
      before_version_ref: kb://security/playbook/document-16#sha256:7c4a
      after_version_ref: kb://security/playbook/document-17#sha256:b942
      actor_or_process_ref: principal://external-editor-44
      occurred_at: 2026-07-14T10:08:00.000Z
      changed_spans:
        - locator: css:#hidden-note chars:0..96
          before_digest: null
          after_digest: sha256:53ee
      affected_content_ids:
        - poisoned-content/kb-document-17/hidden-note
      evidence_refs:
        - audit://kb/commit-884
        - finding://injection/scan-204
    related_node_ids:
      - ResourceContentPoisoning
    related_relation_ids: []
    expected_result:
      zh: 验证器应把该记录识别为 ResourceContentPoisoning，并保留案例给出的身份字段与边界。
      en: Validation should classify the record as ResourceContentPoisoning while preserving the identity fields and boundary stated by the case.
      ja: 検証器はこの記録を ResourceContentPoisoning と分類し、事例の同一性項目と境界を保持する必要があります。
    why_valid_or_invalid:
      zh: 包含资源、投毒前后版本、发生时间、操作者或过程以及受影响内容引用。
      en: Includes the resource, before-and-after versions, occurrence time, actor or process, and affected-content reference.
      ja: 資源、前後版、発生時刻、実行者または過程、影響内容参照を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-resource-content-poisoning-013
  - id: ResourceContentPoisoning-manual-boundary-20260714
    kind: boundary
    labels:
      zh: 资源内容投毒边界例
      en: Boundary case for resource content poisoning
      ja: リソース内容汚染の境界例
    scenario_id: null
    descriptions:
      zh: 扫描发现文档含恶意句，但没有何时或如何被写入的证据；可以建立 PoisonedContent，尚不能实例化 ResourceContentPoisoning 事件。
      en: A scan finds a malicious sentence but has no evidence of when or how it was written; PoisonedContent can be asserted, but a ResourceContentPoisoning event cannot yet be instantiated.
      ja: 走査で悪意文を見つけても、いつ・どう書かれたかの証拠がなければ PoisonedContent は立てられても ResourceContentPoisoning イベントはまだ立てられません。
    field_values:
      poisoning_event_id: null
      resource_ref: kb://security/playbook/document-unknown
      before_version_ref: null
      after_version_ref: kb://security/playbook/document-unknown#sha256:91ab
      actor_or_process_ref: null
      occurred_at: null
      changed_spans: []
      affected_content_ids:
        - poisoned-content/document-unknown/sentence-4
      evidence_refs:
        - finding://injection/scan-991
    related_node_ids:
      - ResourceContentPoisoning
      - DetectionActivity
      - PoisonedContent
    related_relation_ids: []
    expected_result:
      zh: 验证器不得把该记录归入 ResourceContentPoisoning；它缺少该概念的必要区分条件。
      en: Validation must not classify the record as ResourceContentPoisoning; it lacks the concept's necessary differentia.
      ja: 検証器はこの記録を ResourceContentPoisoning に分類してはならず、必要な種差を欠いています。
    why_valid_or_invalid:
      zh: 不包含自然内容编辑、被污染内容本身或只有怀疑而无变更证据的信号。
      en: Excludes ordinary content editing, the contaminated content itself, and a signal with suspicion but no evidence of a change event.
      ja: 通常の内容編集、汚染内容そのもの、変更イベント証拠のない疑い信号は含みません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-resource-content-poisoning-014
external_mappings: []
