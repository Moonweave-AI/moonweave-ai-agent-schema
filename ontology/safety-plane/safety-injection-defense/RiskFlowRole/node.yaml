schema: moonweave.ai/ontology-node/v1
id: RiskFlowRole
kind: concept
status: accepted
labels:
  zh: 风险流角色
  en: Risk Flow Role
  ja: リスクフロー役割
semantics:
  short_definition:
    zh: 分配给源汇流端点的、说明其作为内容进入点或影响汇点职责的角色。
    en: A role assigned to a source-sink-flow endpoint that states whether it is a
      content-entry point or an influence sink.
    ja: 内容の入口点または影響シンクであることを示す、ソース・シンクフローの端点に割り当てられる役割。
  definition:
    zh: RiskFlowRole 是 SourceSinkFlow 的组成角色，用于将端点标记为 RiskSource 或
      RiskSink。它不是流记录本身、网络身份、授权角色或检测结果。
    en: RiskFlowRole is a component role of a SourceSinkFlow used to mark an
      endpoint as a RiskSource or RiskSink. It is not the flow record itself, a
      network identity, an authorization role, or a detection finding. Its link
      to SourceSinkFlow is a typed endpoint-description cross-link, not
      directory composition.
    ja: RiskFlowRole は SourceSinkFlow の構成役割であり、端点を RiskSource または RiskSink
      として印付けるために用いる。フロー記録自体、ネットワークID、認可ロール、または検出結果ではない。
  why_needed:
    zh: 把端点角色显式化，可避免把不受信任内容的来源、内容消费者和执行授权混为一谈。
    en: Making endpoint roles explicit prevents confusing an untrusted-content
      origin, a content consumer, and authorization to execute.
    ja: 端点役割を明示することで、信頼できない内容の出所、内容消費者、実行の認可を混同しない。
  includes:
    - zh: 关联的流标识符、端点引用、方向和角色类型。
      en: Associated flow identifier, endpoint reference, direction, and role type.
      ja: 関連するフロー識別子、端点参照、方向、役割型。
  excludes:
    - zh: 实际内容载荷、网络端点地址或批准某个操作的主体。
      en: The actual content payload, a network endpoint address, or a principal
        approving an operation.
      ja: 実際の内容ペイロード、ネットワークエンドポイントアドレス、または操作を承認する主体。
  semantic_kind: role
  aliases:
    - flow-endpoint-role
engineering:
  explanation:
    zh: 流追踪器为每条内容传递创建端点角色条目。控制策略利用角色而非端点名称决定哪类跨越需要扫描、隔离或显式批准。
    en: A flow tracker creates endpoint-role entries for each content transfer.
      Control policies use roles rather than endpoint names to decide which
      crossings require scanning, quarantine, or explicit approval.
    ja: フロートラッカーは各内容転送に端点役割エントリを作る。制御ポリシーは端点名ではなく役割を使い、どの横断に走査、隔離、明示的承認が必要かを決める。
  typical_input:
    - description:
        zh: 内容流端点的分类请求。
        en: Classification request for a content-flow endpoint.
        ja: 内容フロー端点の分類要求。
      format: '{"flow_id":"flow-91","endpoint":"agent-prompt","direction":"receive"}'
      source_claims:
        - claim-owasp-flow-role-inference
  typical_output:
    - description:
        zh: 具有角色类型的端点角色记录。
        en: Endpoint-role record with role type.
        ja: 役割型を持つ端点役割記録。
      format: '{"risk_flow_role_id":"role-91-sink","source_sink_flow_id":"flow-91","endpoint_reference":"agent-prompt","role_type":"sink"}'
      source_claims:
        - claim-owasp-flow-role-inference
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Explains prompt-injection risk from untrusted content.
structure:
  identity_keys:
    - risk_flow_role_id
  fields:
    - id: risk_flow_role_id
      labels:
        zh: 风险流角色标识符
        en: Risk flow role ID
        ja: リスクフロー役割 ID
      definitions:
        zh: 一次流端点角色分配的稳定标识符。
        en: Stable identifier for one flow-endpoint role assignment.
        ja: 一つのフロー端点役割割当ての安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: role-91-sink
      allowed_values: []
      source_claims:
        - claim-owasp-flow-role-inference
    - id: role_type
      labels:
        zh: 角色类型
        en: Role type
        ja: 役割型
      definitions:
        zh: 端点在信息流中充当的入口或汇点角色。
        en: Entry or sink role played by the endpoint in the information flow.
        ja: 端点が情報フローで果たす入口またはシンクの役割。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: sink
      allowed_values:
        - source
        - sink
      source_claims:
        - claim-owasp-flow-role-inference
    - id: source_sink_flow_id
      labels:
        zh: 源汇流标识符
        en: Source-sink flow ID
        ja: ソース・シンクフロー ID
      definitions:
        zh: 该端点角色所描述的具体内容流记录标识符。
        en: The identifier of the concrete content-flow record described by this endpoint role.
        ja: この端点役割が記述する具体的な内容フロー記録の識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: flow-91
      allowed_values: []
      source_claims:
        - claim-owasp-flow-role-inference
    - id: endpoint_reference
      labels:
        zh: 端点引用
        en: Endpoint reference
        ja: 端点参照
      definitions:
        zh: 在该流中被标记为来源或汇点的内容消费或产生端点引用。
        en: The content-producing or content-consuming endpoint marked as the source or sink in this flow.
        ja: このフローでソースまたはシンクとして印付けられた内容生成または内容消費端点への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: agent-prompt
      allowed_values: []
      source_claims:
        - claim-owasp-flow-role-inference
  constraints:
    - id: risk-flow-role-flow-membership
      severity: error
      expression_language: plain
      expression: A RiskFlowRole must reference exactly one SourceSinkFlow and declare
        either source or sink; it cannot be used as an authorization role.
      explanations:
        zh: 流角色归属于具体内容流，且不授予执行权限。
        en: A flow role belongs to a concrete content flow and grants no execution
          authority.
        ja: フロー役割は具体的な内容フローに属し、実行権限を付与しない。
      explanation:
        zh: 流角色归属于具体内容流，且不授予执行权限。
        en: A flow role belongs to a concrete content flow and grants no execution
          authority.
        ja: フロー役割は具体的な内容フローに属し、実行権限を付与しない。
      source_claims:
        - claim-owasp-flow-role-inference
    - id: risk-flow-role-flow-reference
      severity: error
      language: plain
      expression: A RiskFlowRole instance must identify its flow reference and
        endpoint reference; it must not be modeled as a permanent component of a
        source-sink flow class.
      explanation:
        zh: RiskSource and RiskSink classify endpoint participation, while
          SourceSinkFlow records a flow.
        en: RiskSource and RiskSink classify endpoint participation, while
          SourceSinkFlow records a flow.
        ja: RiskSource and RiskSink classify endpoint participation, while
          SourceSinkFlow records a flow.
      source_claims:
        - claim-owasp-flow-role-inference
  required_relations: []
examples:
  - id: risk-flow-role-greshake_bing
    labels:
      zh: 风险流角色 - Greshake Bing Chat 间接注入
      en: Risk Flow Role - Greshake Bing Chat indirect injection
      ja: リスクフロー役割 - Greshake Bing Chat 間接注入
    descriptions: {zh: "风险流角色(RiskFlowRole) [RiskFlowRole]: 分配给源汇流端点的、说明其作为内容进入点或影响汇点职责的角色。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: role_type, endpoint_reference, risk_flow_role_id.", en: "Risk Flow Role (RiskFlowRole) [RiskFlowRole]: A role assigned to a source-sink-flow endpoint that states whether it is a. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include role_type, endpoint_reference, risk_flow_role_id.", ja: "リスクフロー役割(RiskFlowRole) [RiskFlowRole]: 内容の入口点または影響シンクであることを示す、ソース・シンクフローの端点に割り当てられる役割。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: role_type, endpoint_reference, risk_flow_role_id."}
    field_values:
      endpoint_reference: agent-prompt
      risk_flow_role_id: role-91-sink
      role_type: sink
      source_sink_flow_id: flow-91
    related_node_ids:
      - RiskFlowRole
    related_relation_ids: []
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-owasp-flow-role-inference
  - id: risk-flow-role-echoleak
    labels:
      zh: 风险流角色 - EchoLeak Copilot 邮件注入
      en: Risk Flow Role - EchoLeak Copilot email injection
      ja: リスクフロー役割 - EchoLeak Copilot メール注入
    descriptions: {zh: "风险流角色(RiskFlowRole) [RiskFlowRole]: 分配给源汇流端点的、说明其作为内容进入点或影响汇点职责的角色。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: role_type, endpoint_reference, risk_flow_role_id.", en: "Risk Flow Role (RiskFlowRole) [RiskFlowRole]: A role assigned to a source-sink-flow endpoint that states whether it is a. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include role_type, endpoint_reference, risk_flow_role_id.", ja: "リスクフロー役割(RiskFlowRole) [RiskFlowRole]: 内容の入口点または影響シンクであることを示す、ソース・シンクフローの端点に割り当てられる役割。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: role_type, endpoint_reference, risk_flow_role_id."}
    field_values:
      endpoint_reference: agent-prompt
      risk_flow_role_id: role-91-sink
      role_type: sink
      source_sink_flow_id: flow-91
    related_node_ids:
      - RiskFlowRole
    related_relation_ids: []
    example_source: EchoLeak CVE-2025-32711
    source_claims:
      - claim-owasp-flow-role-inference
  - id: risk-flow-role-openai_source_sink
    labels:
      zh: 风险流角色 - OpenAI source-sink 分析
      en: Risk Flow Role - OpenAI source-sink analysis
      ja: リスクフロー役割 - OpenAI source-sink 分析
    descriptions: {zh: "风险流角色(RiskFlowRole) [RiskFlowRole]: 分配给源汇流端点的、说明其作为内容进入点或影响汇点职责的角色。. OpenAI 描述 source-sink 分析：不可信内容影响代理并结合危险传输或工具能力。 Fields: role_type, endpoint_reference, risk_flow_role_id.", en: "Risk Flow Role (RiskFlowRole) [RiskFlowRole]: A role assigned to a source-sink-flow endpoint that states whether it is a. OpenAI describes source-sink analysis: untrusted content influencing an agent combined with a dangerous transmission or tool capability (openai.com/index/designing-agents-to-resist-prompt-injection/). Fields include role_type, endpoint_reference, risk_flow_role_id.", ja: "リスクフロー役割(RiskFlowRole) [RiskFlowRole]: 内容の入口点または影響シンクであることを示す、ソース・シンクフローの端点に割り当てられる役割。. OpenAI は source-sink 分析：untrusted content と dangerous transmission/tool capability の組み合わせを説明する。 Fields: role_type, endpoint_reference, risk_flow_role_id."}
    field_values:
      endpoint_reference: agent-prompt
      risk_flow_role_id: role-91-sink
      role_type: sink
      source_sink_flow_id: flow-91
    related_node_ids:
      - RiskFlowRole
    related_relation_ids: []
    example_source: OpenAI source-sink analysis
    source_claims:
      - claim-owasp-flow-role-inference
  - id: risk-flow-role-trustllm
    labels:
      zh: 风险流角色 - TrustLLM 六维可信度
      en: Risk Flow Role - TrustLLM six-dimension trust
      ja: リスクフロー役割 - TrustLLM 6次元信頼性
    descriptions: {zh: "风险流角色(RiskFlowRole) [RiskFlowRole]: 分配给源汇流端点的、说明其作为内容进入点或影响汇点职责的角色。. Sun 等（2024）TrustLLM 评估 LLM 在 truthfulness、safety、fairness、robustness、privacy、machine ethics 六维度的可信度（arxiv.org/abs/2401.05561）。 Fields: role_type, endpoint_reference, risk_flow_role_id.", en: "Risk Flow Role (RiskFlowRole) [RiskFlowRole]: A role assigned to a source-sink-flow endpoint that states whether it is a. Sun et al. (2024) TrustLLM evaluates LLM trustworthiness across truthfulness, safety, fairness, robustness, privacy, and machine ethics (arxiv.org/abs/2401.05561). Fields include role_type, endpoint_reference, risk_flow_role_id.", ja: "リスクフロー役割(RiskFlowRole) [RiskFlowRole]: 内容の入口点または影響シンクであることを示す、ソース・シンクフローの端点に割り当てられる役割。. Sun ほか（2024）TrustLLM：truthfulness/safety/fairness/robustness/privacy/machine ethics の6次元で LLM 信頼性を評価（arxiv.org/abs/2401.05561）。 Fields: role_type, endpoint_reference, risk_flow_role_id."}
    field_values:
      endpoint_reference: agent-prompt
      risk_flow_role_id: role-91-sink
      role_type: sink
      source_sink_flow_id: flow-91
    related_node_ids:
      - RiskFlowRole
    related_relation_ids: []
    example_source: Sun TrustLLM 2024
    source_claims:
      - claim-owasp-flow-role-inference
