schema: moonweave.ai/ontology-node/v1
id: SensitiveSpan
kind: concept
status: accepted
labels:
  en: sensitive span
  zh: 敏感片段
  ja: 機微範囲
semantics:
  short_definition:
    zh: 在具体内容中被识别为敏感的可寻址信息片段。
    en: An addressable information span identified as sensitive within specific content.
    ja: 特定内容内で機密と識別されたアドレス可能な情報 span。
  definition:
    zh: 敏感片段是一种独立信息对象，以源内容引用、字符或结构路径范围、敏感类别、检测依据与可选置信度标识候选内容中的局部信息；它描述被保护的片段，不是整份文档、披露规则、检测活动或脱敏动作。
    en: SensitiveSpan is an independent information object identifying local candidate content by source reference, character or structural path range, sensitivity category, detection basis, and optional confidence; it describes the protected span, not the entire document, disclosure rule, detection activity, or redaction action.
    ja: SensitiveSpan は独立情報 object で、source reference、文字または構造 path 範囲、機密カテゴリ、検出根拠、任意 confidence により候補内容内の局所情報を識別します。文書全体、開示規則、検出活動、redaction 動作ではありません。
  why_needed:
    zh: 片段级标识让控制器只处理真正敏感的范围，保留有用上下文并为审计提供稳定目标；若只给文档级标签，系统容易过度删除或漏掉嵌套秘密。
    en: Span-level identity lets controls transform only sensitive ranges, retain useful context, and give audit a stable target; document-level labels alone encourage over-removal or miss nested secrets.
    ja: span 単位 ID により機密範囲だけを処理し有用文脈を保持し、監査へ安定対象を与えます。文書単位 label だけでは過剰削除や入れ子秘密の見落としが起きます。
  includes:
    - zh: 具有源内容引用、起止位置或 JSON 路径、敏感类别和检测依据的凭据、个人标识、财务、健康、法律或机密业务信息片段。
      en: Credential, personal-identifier, financial, health, legal, or confidential-business spans with source reference, offsets or JSON path, category, and detection basis.
      ja: source reference、offset または JSON path、カテゴリ、検出根拠を持つ資格情報、個人識別、金融、健康、法律、機密業務情報 span。
  excludes:
    - zh: 没有定位范围的整文档风险标签、DisclosureRule、扫描活动、Redaction 活动、普通公开文本和仅因格式特殊而被标记的内容。
      en: A whole-document risk label without location, DisclosureRule, scanning activity, Redaction activity, ordinary public text, and content marked only for unusual formatting.
      ja: 位置範囲のない文書全体リスク label、DisclosureRule、scan 活動、Redaction 活動、通常公開 text、書式だけで印付けされた内容。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - sensitive_span_id
  fields:
    - id: sensitive_span_id
      labels:
        zh: 敏感片段标识
        en: sensitive-span ID
        ja: 機微範囲 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识源内容特定版本中的一个可寻址敏感片段；源版本或定位范围改变时必须使用新标识。
        en: Stably identifies one addressable sensitive span in a particular source-content version; a changed source version or locator requires a new ID.
        ja: 特定 source-content version 内の addressable sensitive span を安定識別し、source version または locator が変われば新しい ID を使います。
      allowed_values: []
      pattern: null
      example_value: sensitive-span:tool-result-18#authorization
      source_claims:
        - claim-sensitive-span-002
    - id: source_content_ref
      labels:
        zh: 源内容引用
        en: source content reference
        ja: 元内容参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含该片段的确切工具结果、消息或附件版本，而不在本记录中复制敏感原值。
        en: References the exact tool-result, message, or attachment version containing the span without copying the sensitive value into this record.
        ja: span を含む tool result、message、attachment の正確な版を参照し、この record に機微な原値を複製しません。
      allowed_values: []
      pattern: null
      example_value: tool-result:18
      source_claims:
        - claim-sensitive-span-003
    - id: locator
      labels:
        zh: 片段定位器
        en: span locator
        ja: span locator
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存能够在源版本中重新解析该片段的定位类型与坐标，例如字符区间、JSON Path、时间区间或结构路径。
        en: Preserves a locator kind and coordinates that resolve the span in the source version, such as a character range, JSON Path, time interval, or structural path.
        ja: source version 内で span を再解決できる locator kind と座標を保存し、character range、JSON Path、time interval、structural path などを使います。
      allowed_values: []
      pattern: null
      example_value:
        kind: json-path
        path: $.headers.authorization
      source_claims:
        - claim-sensitive-span-004
    - id: sensitivity_category
      labels:
        zh: 敏感类别
        en: sensitivity category
        ja: 機微カテゴリ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按泄露后产生的保护义务和风险种类分类，而不是按字符串格式或检测器名称分类。
        en: Classifies the span by protection obligation and disclosure risk, not by string format or detector name.
        ja: 文字列形式や detector 名ではなく、開示による保護義務と risk の種類で分類します。
      allowed_values:
        - id: SensitivityCategoryCredential
          value: credential
          labels:
            zh: 凭据或认证秘密
            en: credential
            ja: 資格情報
          definitions:
            zh: 可用于认证、授权或冒充主体的密码、访问令牌、API 密钥或私钥。
            en: A password, access token, API key, private key, or other secret usable for authentication, authorization, or impersonation.
            ja: 認証、認可、なりすましに利用できる password、access token、API key、private key などの秘密です。
          status: accepted
          source_claims:
            - claim-sensitive-span-005
        - id: SensitivityCategoryPersonalIdentifier
          value: personal_identifier
          labels:
            zh: 个人标识信息
            en: personal identifier
            ja: 個人識別情報
          definitions:
            zh: 能够单独或与其他信息结合识别、定位或关联自然人的数据。
            en: Data that identifies, locates, or links a natural person alone or with other information.
            ja: 単独または他情報との組合せで自然人を識別、位置特定、関連付けできる data です。
          status: accepted
          source_claims:
            - claim-sensitive-span-006
        - id: SensitivityCategoryFinancial
          value: financial
          labels:
            zh: 财务信息
            en: financial information
            ja: 財務情報
          definitions:
            zh: 涉及账户、支付工具、余额、交易或财务状况且受披露限制的信息。
            en: Restricted information about accounts, payment instruments, balances, transactions, or financial condition.
            ja: 口座、支払手段、残高、取引、財務状態に関する開示制限付き情報です。
          status: accepted
          source_claims:
            - claim-sensitive-span-007
        - id: SensitivityCategoryHealth
          value: health
          labels:
            zh: 健康信息
            en: health information
            ja: 健康情報
          definitions:
            zh: 描述个人身体或心理健康、诊疗、处方或医疗服务的信息。
            en: Information about a person's physical or mental health, care, prescriptions, or medical services.
            ja: 個人の身体・精神健康、診療、処方、医療サービスに関する情報です。
          status: accepted
          source_claims:
            - claim-sensitive-span-008
        - id: SensitivityCategoryLegal
          value: legal
          labels:
            zh: 法律受保护信息
            en: legally protected information
            ja: 法的保護情報
          definitions:
            zh: 因法律保密义务、律师客户特权、诉讼限制或监管要求而受保护的信息。
            en: Information protected by a confidentiality duty, attorney-client privilege, litigation restriction, or regulation.
            ja: 守秘義務、弁護士依頼者特権、訴訟制限、規制要件により保護される情報です。
          status: accepted
          source_claims:
            - claim-sensitive-span-009
        - id: SensitivityCategoryConfidentialBusiness
          value: confidential_business
          labels:
            zh: 机密业务信息
            en: confidential business information
            ja: 機密業務情報
          definitions:
            zh: 因合同、商业秘密或组织保密规则而不得向当前边界披露的业务信息。
            en: Business information barred from the current boundary by contract, trade-secret protection, or organizational confidentiality rules.
            ja: 契約、営業秘密、組織内守秘規則により現在の境界へ開示できない業務情報です。
          status: accepted
          source_claims:
            - claim-sensitive-span-010
      pattern: null
      example_value: credential
      source_claims:
        - claim-sensitive-span-011
    - id: detection_basis_ref
      labels:
        zh: 检测依据引用
        en: detection-basis reference
        ja: 検出根拠参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该定位与分类的检测结果、人工标注或权威数据标签，避免仅凭字符串外观断言敏感性。
        en: References the detection result, human annotation, or authoritative label supporting the locator and category, avoiding assertions from appearance alone.
        ja: locator と category を裏付ける detection result、human annotation、authoritative label を参照し、外観だけで機微性を断定しません。
      allowed_values: []
      pattern: null
      example_value: detection-result:credential-scan-18
      source_claims:
        - claim-sensitive-span-012
    - id: confidence
      labels:
        zh: 检测置信度
        en: detection confidence
        ja: 検出信頼度
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 检测依据能够产生校准分数时，记录对该定位和类别判断的 0 至 1 置信度；没有可靠分数时应省略。
        en: When the detection basis yields a calibrated score, records confidence from 0 through 1 in the locator and category decision; omit it when no reliable score exists.
        ja: 検出根拠が calibrated score を出せる場合に locator と category 判断の 0〜1 confidence を記録し、信頼できる score がなければ省略します。
      allowed_values: []
      pattern: null
      example_value: 0.99
      source_claims:
        - claim-sensitive-span-013
  constraints:
    - id: sensitive-span-confidence-range
      severity: error
      expression_language: plain
      expression: confidence IS NULL OR (confidence >= 0 AND confidence <= 1)
      explanations:
        zh: 置信度必须是闭区间 [0,1] 内的校准数值；没有可靠分数时省略该字段。
        en: Confidence must be a calibrated value in the closed interval [0,1]; omit it when no reliable score exists.
        ja: confidence は閉区間 [0,1] の calibrated value とし、信頼できる score がなければ省略します。
      source_claims:
        - claim-sensitive-span-014
    - id: sensitive-span-locator-resolves-in-source
      severity: error
      expression_language: plain
      expression: locator resolves exactly one non-empty range or structural value in the exact source_content_ref version
      explanations:
        zh: 没有坐标的整文档风险标签不能充当 SensitiveSpan；定位器必须在所引用源版本中解析到明确非空范围或结构值。
        en: A whole-document label without coordinates cannot instantiate SensitiveSpan; the locator must resolve a definite non-empty range or structural value in the source version.
        ja: 座標のない文書全体 label は SensitiveSpan にならず、locator は source version 内の明確な非空範囲または構造値を解決する必要があります。
      source_claims:
        - claim-sensitive-span-015
  required_relation_constraints: []
examples:
  - id: SensitiveSpan-example-positive-001
    kind: positive
    labels:
      zh: 令牌片段
      en: Token span
      ja: token span
    scenario_id: null
    descriptions:
      zh: tool_result_18 的 JSON 路径 $.headers.authorization 对应值 Bearer sk-live-...，检测器将该路径标记为 category=credential、confidence=0.99。
      en: In tool_result_18, JSON path $.headers.authorization contains Bearer sk-live-...; a detector marks that path category=credential with confidence=0.99.
      ja: tool_result_18 の JSON path $.headers.authorization に Bearer sk-live-... があり、detector は category=credential、confidence=0.99 とします。
    field_values:
      sensitive_span_id: sensitive-span:tool-result-18#authorization
      source_content_ref: tool-result:18
      locator:
        kind: json-path
        path: $.headers.authorization
      sensitivity_category: credential
      detection_basis_ref: detection-result:credential-scan-18
      confidence: 0.99
    related_node_ids:
      - SensitiveSpan
      - Redaction
    related_relation_ids:
      - Redaction-targets-SensitiveSpan
    expected_result:
      zh: 披露控制把该路径作为最小处理目标，不需要删除工具结果中的公开状态字段。
      en: Disclosure control treats the path as the minimal handling target and need not remove public status fields from the tool result.
      ja: 開示制御はこの path を最小処理対象とし、ツール結果の公開 status 項目を削除する必要がありません。
    why_valid_or_invalid:
      zh: 实例具有精确源、结构路径、敏感类别与检测依据，符合可寻址局部信息对象。
      en: The instance has exact source, structural path, category, and detection basis, satisfying an addressable local information object.
      ja: 正確な source、構造 path、カテゴリ、検出根拠を持ち、アドレス可能な局所情報 object です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sensitive-span-016
  - id: SensitiveSpan-example-boundary-001
    kind: boundary
    labels:
      zh: 公开状态字段边界
      en: Public-status-field boundary
      ja: 公開 status 項目の境界
    scenario_id: null
    descriptions:
      zh: 同一 tool_result_18 的 $.status 值为 completed，来源与令牌相同但内容是公开运行状态；共同出处不使它成为 SensitiveSpan。
      en: In the same tool_result_18, $.status is completed. It shares a source with the token but is public runtime state; common origin does not make it SensitiveSpan.
      ja: 同じ tool_result_18 の $.status は completed で、token と source は同じでも公開実行状態です。共通由来だけで SensitiveSpan にはなりません。
    field_values: {}
    related_node_ids:
      - SensitiveSpan
    related_relation_ids: []
    expected_result:
      zh: 该字段按规则正常释放，除非另有内容或接收者证据改变分类。
      en: The field is released normally unless other content or recipient evidence changes its classification.
      ja: 別の内容・受信者証拠が分類を変えない限り、この項目は通常公開されます。
    why_valid_or_invalid:
      zh: 敏感性由片段内容、上下文与策略决定，而不是由邻近秘密或共同文档身份决定。
      en: Sensitivity depends on span content, context, and policy, not proximity to a secret or shared document identity.
      ja: 機密性は span 内容、文脈、policy で決まり、秘密への近接や文書共通性だけでは決まりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sensitive-span-017
  - id: SensitiveSpan-example-instance-001
    kind: instance
    labels:
      zh: 结构化敏感片段
      en: Structured sensitive span
      ja: 構造化 SensitiveSpan
    scenario_id: null
    descriptions:
      zh: span ss_18 保存 source=tool_result_18、path=$.headers.authorization、category=credential、detector=secret-scanner@5、confidence=0.99 与 value_digest=sha256:bc2。
      en: Span ss_18 stores source=tool_result_18, path=$.headers.authorization, category=credential, detector=secret-scanner@5, confidence=0.99, and value_digest=sha256:bc2.
      ja: span ss_18 は source=tool_result_18、path=$.headers.authorization、category=credential、detector=secret-scanner@5、confidence=0.99、value_digest=sha256:bc2 を保存します。
    field_values: {}
    related_node_ids:
      - SensitiveSpan
    related_relation_ids: []
    expected_result:
      zh: 控制器通过 source 与 path 定位原值，审计只保留摘要而不复制秘密。
      en: The controller locates the value by source and path while audit retains only the digest, not the secret.
      ja: controller は source と path で元値を特定し、監査は秘密でなく要約だけを保持します。
    why_valid_or_invalid:
      zh: 实例提供稳定 span 身份、精确定位、类别、检测依据和非秘密完整性引用。
      en: The instance provides stable span identity, exact location, category, detection basis, and non-secret integrity reference.
      ja: 安定 span ID、正確な位置、カテゴリ、検出根拠、非秘密 integrity reference を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sensitive-span-018
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: Verified against OWASP LLM02 disclosure mitigations and DLP/redaction patterns; specification vs activity and span-level SensitiveSpan targeting hold.
    en: Verified against OWASP LLM02 disclosure mitigations and DLP/redaction patterns; specification vs activity and span-level SensitiveSpan targeting hold.
    ja: Verified against OWASP LLM02 disclosure mitigations and DLP/redaction patterns; specification vs activity and span-level SensitiveSpan targeting hold.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-sensitive-span-001
    source: eng-security-owasp-llm02-2025
    supports: OWASP identifies credentials, personal, financial, health, legal, and confidential business data as sensitive information. Moonweave represents each addressable occurrence requiring control as SensitiveSpan.
    locator: LLM02:2025 > Sensitive Information Disclosure > risk description and examples
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-002
    source: eng-security-owasp-llm02-2025
    supports: OWASP identifies concrete sensitive values requiring detection and sanitization. Moonweave gives each addressable occurrence a stable span identity.
    locator: LLM02:2025 > Sensitive Information Disclosure > risk description and examples
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-003
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends detecting and sanitizing sensitive output. Moonweave anchors a finding to exact source content instead of duplicating the secret.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-004
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends targeted sanitization and masking. Moonweave requires an exact locator so transformation stays limited to the detected occurrence.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Masking
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-005
    source: eng-security-owasp-llm02-2025
    supports: OWASP explicitly includes security credentials among sensitive information. Moonweave names this category credential.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-006
    source: eng-security-owasp-llm02-2025
    supports: OWASP lists personally identifiable information as sensitive. Moonweave represents addressable occurrences as personal_identifier spans.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-007
    source: eng-security-owasp-llm02-2025
    supports: OWASP includes financial details among sensitive information. Moonweave names this category financial.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-008
    source: eng-security-owasp-llm02-2025
    supports: OWASP includes health information among sensitive information. Moonweave names this category health.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-009
    source: eng-security-owasp-llm02-2025
    supports: OWASP includes legal information among sensitive information. Moonweave names this category legal.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-010
    source: eng-security-owasp-llm02-2025
    supports: OWASP includes confidential business data and proprietary information among sensitive information. Moonweave names this category confidential_business.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-011
    source: eng-security-owasp-llm02-2025
    supports: OWASP enumerates credentials, personal, financial, health, legal, and confidential business information as sensitive. Moonweave uses these protection-oriented groups as a controlled vocabulary.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-012
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends detecting and sanitizing sensitive values. Moonweave retains the evidence basis of each detected span for review and correction.
    locator: LLM02:2025 > Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-013
    source: eng-security-owasp-llm02-2025
    supports: OWASP motivates sensitive-output detection but does not define Moonweave score semantics. The optional normalized score is a Moonweave design inference for calibrated evidence.
    locator: LLM02:2025 > Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-014
