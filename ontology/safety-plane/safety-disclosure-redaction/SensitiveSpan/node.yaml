    descriptions: {zh: "敏感片段(SensitiveSpan) [SensitiveSpan]: 在具体内容中被识别为敏感的可寻址信息片段。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: confidence, source_content_ref, detection_basis_ref.", en: "sensitive span (SensitiveSpan) [SensitiveSpan]: An addressable information span identified as sensitive within specific content.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include confidence, source_content_ref, detection_basis_ref.", ja: "機微範囲(SensitiveSpan) [SensitiveSpan]: 特定内容内で機密と識別されたアドレス可能な情報 span。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: confidence, source_content_ref, detection_basis_ref."}
