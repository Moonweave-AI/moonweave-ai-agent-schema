    descriptions: {zh: "敏感片段(SensitiveSpan) [SensitiveSpan]: 在具体内容中被识别为敏感的可寻址信息片段。. Inan 等（2023）Llama Guard：微调 Llama 安全分类器输出 safe/unsafe\\nO1（O1=暴力、O2=性、O3=犯罪、O4=枪支、O5=受管制、O6=自残）用于 I/O 审核（arxiv.org/abs/2312.06674）。 Fields: confidence, source_content_ref, detection_basis_ref.", en: "sensitive span (SensitiveSpan) [SensitiveSpan]: An addressable information span identified as sensitive within specific content.. Inan et al. (2023) Llama Guard: fine-tuned Llama safety classifier outputs safe/unsafe\\nO1 (O1=violence, O2=sexual, O3=criminal, O4=guns, O5=regulated, O6=self-harm) for I/O moderation (arxiv.org/abs/2312.06674). Fields include confidence, source_content_ref, detection_basis_ref.", ja: "機微範囲(SensitiveSpan) [SensitiveSpan]: 特定内容内で機密と識別されたアドレス可能な情報 span。. Inan ほか（2023）Llama Guard：fine-tuned Llama が safe/unsafe\\nO1（O1=violence 等6類）を I/O moderation に出力（arxiv.org/abs/2312.06674）。 Fields: confidence, source_content_ref, detection_basis_ref."}
    field_values:
