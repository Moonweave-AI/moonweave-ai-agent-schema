schema: moonweave.ai/ontology-node/v1
id: SensitiveSpan
kind: concept
labels:
  zh: 敏感片段
  en: sensitive span
  ja: 機微範囲
semantics:
  short_definition:
    zh: 在特定内容版本中被检测器定位的可寻址敏感信息片段。
    en: An addressable sensitive information span located by a detector within a specific content version.
    ja: 特定 content version 内で detector により定位された addressable 機微情報 span。
  definition:
    zh: SensitiveSpan 是独立信息对象，以 source_content_ref、start/end offset 或 JSON path、sensitivity_class（如 PERSON、EMAIL、SSN、CREDENTIAL）、detector_evidence_ref 与可选 score 标识候选内容中的局部信息。它映射 Presidio RecognizerResult、AWS Comprehend DetectPiiEntities 或 Azure PII detection 的 entity 输出；描述被保护片段，不是整份文档、DisclosureRule 或 Redaction 活动。示例字符串外观（如 sk-example） alone 不能创建 SensitiveSpan。
    en: "SensitiveSpan is an independent information object identifying local candidate content by source_content_ref, start/end offset or JSON path, sensitivity_class (e.g., PERSON, EMAIL, SSN, CREDENTIAL), detector_evidence_ref, and optional score. It maps Presidio RecognizerResult, AWS Comprehend DetectPiiEntities, or Azure PII detection entity output; it describes the protected span, not the whole document, DisclosureRule, or Redaction activity. Example-string appearance alone (e.g., sk-example) cannot create SensitiveSpan."
    ja: SensitiveSpan は独立情報 object で source_content_ref/start/end offset/JSON path/sensitivity_class（PERSON/EMAIL/SSN/CREDENTIAL 等）/detector_evidence_ref/任意 score で局所候補 content を識別。Presidio RecognizerResult/AWS Comprehend/Azure PII entity output を写像。保護 span を記述し文書全体/DisclosureRule/Redaction activity ではない。例示文字列外観（sk-example 等）だけでは作成不可。
  why_needed:
    zh: 片段级标识让 DisclosureFilter 只处理真正敏感范围、保留上下文并为审计提供稳定目标；文档级标签会导致过度删除或漏掉嵌套秘密。
    en: Span-level identity lets DisclosureFilter transform only sensitive ranges, retain context, and give audit a stable target; document-level labels cause over-removal or missed nested secrets.
    ja: span 単位 ID により DisclosureFilter は機微 range のみ処理し context 保持と audit 安定 target を提供。文書単位 label は過剰削除/入れ子 secret 見落としを招く。
  includes:
    - zh: 具有源内容引用、起止坐标、敏感类别与 Presidio/DLP/Comprehend 检测证据的凭据、PII、财务或机密业务片段。
      en: Credential, PII, financial, or confidential-business spans with source reference, offsets, category, and Presidio/DLP/Comprehend detection evidence.
      ja: source reference/offset/category/Presidio/DLP/Comprehend detection evidence を持つ credential/PII/financial/機密業務 span。
  excludes:
    - zh: 无定位范围的整文档风险标签、DisclosureRule、DisclosureControlActivity、Redaction 活动、仅因格式特殊标记的内容。
      en: Whole-document risk label without location, DisclosureRule, DisclosureControlActivity, Redaction activity, content marked only for unusual formatting.
      ja: 位置範囲なし文書全体 risk label/DisclosureRule/DisclosureControlActivity/Redaction activity/書式のみ mark content。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：`AnalyzerEngine.analyze()` 返回 entity_type、start、end、score → SensitiveSpan + det evidence；Comprehend `DetectPiiEntities` BeginOffset/EndOffset → SensitiveSpan；offset 必须绑定同一 source artifact version（OCR 前后不可混用）。
    en: "Integration: AnalyzerEngine.analyze() entity_type, start, end, score → SensitiveSpan + det evidence; Comprehend DetectPiiEntities BeginOffset/EndOffset → SensitiveSpan; offsets must bind the same source artifact version (pre/post-OCR cannot mix)."
    ja: 統合：AnalyzerEngine.analyze() entity_type/start/end/score → SensitiveSpan+det evidence；Comprehend DetectPiiEntities offset → SensitiveSpan。offset は同一 source artifact version に bind（OCR 前後混用不可）。
  typical_input:
    - description: Presidio NER entity detection.
      format: |
        RecognizerResult(entity_type=EMAIL_ADDRESS, start=128, end=171, score=0.94)
      source_claims:
        - claim-sensitive-span-presidio
    - description: AWS Comprehend PII entity.
      format: |
        Type=SSN, Score=0.98, BeginOffset=45, EndOffset=56
      source_claims:
        - claim-sensitive-span-comprehend
  typical_output:
    - description: SensitiveSpan bound to detector evidence.
      format: |
        sensitive_span_id: ss_17
        sensitivity_class: CREDENTIAL
        detector_evidence_ref: det_44
      source_claims:
        - claim-sensitive-span-design
  reference_implementations:
    - name: Microsoft Presidio
      url: https://microsoft.github.io/presidio/
      description: AnalyzerEngine NER/PII RecognizerResult with entity_type and offsets.
    - name: AWS Comprehend PII
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      description: DetectPiiEntities with type, score, and character offsets.
    - name: Azure AI Language PII
      url: https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/overview
      description: PII entity recognition with confidence scores.
structure:
  identity_keys:
    - sensitive_span_id
  fields:
    - id: sensitive_span_id
      labels:
        zh: 敏感片段标识
        en: sensitive-span ID
        ja: 機微 span ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识源内容特定版本中的一个可寻址敏感片段。
        en: Stably identifies one addressable sensitive span in a particular source-content version.
        ja: 特定 source-content version 内 addressable sensitive span を安定識別。
      allowed_values: []
      pattern: null
      example_value: ss_17
      source_claims:
        - claim-sensitive-span-design
    - id: source_content_ref
      labels:
        zh: 源内容引用
        en: source content reference
        ja: 元 content 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含该片段的确切工具结果、消息或附件版本，不在本记录复制敏感原值。
        en: References exact tool-result, message, or attachment version containing the span without copying sensitive value here.
        ja: span を含む exact tool-result/message/attachment version を参照し sensitive 原値を本 record に複製しない。
      allowed_values: []
      pattern: null
      example_value: tool-result:18
      source_claims:
        - claim-sensitive-span-design
    - id: sensitivity_class
      labels:
        zh: 敏感性分类
        en: sensitivity class
        ja: 機微性 class
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: NER/PII 检测器返回的实体类型或规则驱动分类，如 PERSON、EMAIL、SSN、CREDIT_CARD、CREDENTIAL。
        en: Entity type from NER/PII detector or rule-driven class such as PERSON, EMAIL, SSN, CREDIT_CARD, CREDENTIAL.
        ja: NER/PII detector の entity type または rule 駆動 class（PERSON/EMAIL/SSN/CREDIT_CARD/CREDENTIAL 等）。
      allowed_values: []
      pattern: null
      example_value: EMAIL_ADDRESS
      source_claims:
        - claim-sensitive-span-presidio
    - id: detector_evidence_ref
      labels:
        zh: 检测证据引用
        en: detector evidence reference
        ja: detector evidence 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Presidio RecognizerResult、Comprehend/DLP entity 或等效检测输出的稳定引用。
        en: Stable reference to Presidio RecognizerResult, Comprehend/DLP entity, or equivalent detector output.
        ja: Presidio RecognizerResult/Comprehend/DLP entity 等 detector output への安定参照。
      allowed_values: []
      pattern: null
      example_value: det_44
      source_claims:
        - claim-sensitive-span-presidio
  constraints:
    - id: sensitive-span-requires-evidence
      severity: error
      expression_language: plain
      expression: SensitiveSpan MUST bind replayable source coordinates, detector evidence, and applicable DisclosureRule audience; lexical resemblance alone is invalid
      explanations:
        zh: 敏感片段必须绑定可重放坐标、证据与适用规则。
        en: Sensitive span must bind replayable coordinates, evidence, and applicable rule.
        ja: sensitive span には replayable 座標/証拠/適用 rule が必要。
      source_claims:
        - claim-sensitive-span-design
  required_relation_constraints: []
examples:
  - id: SensitiveSpan-presidio-email
    labels:
      zh: Presidio 检测邮箱片段
      en: Presidio detected email span
      ja: Presidio 検出 email span
    descriptions:
      zh: fab_17 字符 128..171 含邮箱；Presidio AnalyzerEngine 返回 EMAIL_ADDRESS score=0.94，ss_17 绑定 det_44。
      en: fab_17 characters 128..171 contain an email; Presidio AnalyzerEngine returns EMAIL_ADDRESS score=0.94 and ss_17 binds det_44.
      ja: fab_17 文字 128..171 に email。Presidio AnalyzerEngine が EMAIL_ADDRESS score=0.94、ss_17 が det_44 bind。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/
      version: AnalyzerEngine
    field_values:
      sensitive_span_id: ss_17
      sensitivity_class: EMAIL_ADDRESS
      detector_evidence_ref: det_44
    related_node_ids:
      - SensitiveSpan
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-sensitive-span-presidio
  - id: SensitiveSpan-comprehend-ssn
    labels:
      zh: Comprehend 检测 SSN 片段
      en: Comprehend detected SSN span
      ja: Comprehend 検出 SSN span
    descriptions:
      zh: support-ticket-88 经 DetectPiiEntities 识别 SSN；DisclosureRule dr_pii_external 要求 mask，SensitiveSpan 记录 score 与 offset。
      en: support-ticket-88 scanned by DetectPiiEntities for SSN; DisclosureRule dr_pii_external requires mask; SensitiveSpan records score and offset.
      ja: support-ticket-88 を DetectPiiEntities が SSN 検出。DisclosureRule dr_pii_external が mask 要求。SensitiveSpan が score/offset 記録。
    example_source:
      product: AWS Comprehend
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      version: DetectPiiEntities
    field_values:
      sensitivity_class: SSN
      score: 0.98
    related_node_ids:
      - SensitiveSpan
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-sensitive-span-comprehend
  - id: SensitiveSpan-reject-false-credential
    labels:
      zh: 拒绝无证据伪 credential
      en: Reject false credential without evidence
      ja: 証拠なし pseudo credential 拒否
    descriptions:
      zh: 候选仅因 fab_18 含 sk-example 标为 credential，无 detector evidence 与 OCR 前 offset；必须拒绝创建 SensitiveSpan。
      en: Candidate labeled credential only because fab_18 contains sk-example, with no detector evidence and pre-OCR offsets; SensitiveSpan creation must be rejected.
      ja: fab_18 の sk-example 例示文字列だけで credential label。detector evidence/OCR 前 offset なし。SensitiveSpan 作成拒否必須。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: evidence requirements
    field_values:
      accepted: false
      detector_evidence_ref: null
    related_node_ids:
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-sensitive-span-design
  - id: SensitiveSpan-person-ner
    labels:
      zh: NER 检测姓名片段
      en: NER detected person span
      ja: NER 検出 person span
    descriptions:
      zh: Presidio spaCy NER 返回 PERSON entity start=22 end=35 score=0.91；ss_person_3 绑定 fab_22 与 det_person_3。
      en: Presidio spaCy NER returns PERSON entity start=22 end=35 score=0.91; ss_person_3 binds fab_22 and det_person_3.
      ja: Presidio spaCy NER が PERSON entity start=22 end=35 score=0.91。ss_person_3 が fab_22/det_person_3 bind。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/
      version: spaCy NER
    field_values:
      sensitive_span_id: ss_person_3
      sensitivity_class: PERSON
    related_node_ids:
      - SensitiveSpan
      - Redaction
    related_relation_ids: []
    source_claims:
      - claim-sensitive-span-presidio
parent_relation: null
relations: []
sources:
  - id: presidio-docs
    title: Microsoft Presidio
    url: https://microsoft.github.io/presidio/
    source_type: official-doc
    relevance: AnalyzerEngine RecognizerResult entity_type, start, end, score.
  - id: aws-comprehend-pii
    title: AWS Comprehend PII Detection
    url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
    source_type: official-doc
    relevance: DetectPiiEntities types and offsets as SensitiveSpan evidence.
  - id: azure-language-pii
    title: Azure AI Language PII detection
    url: https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/overview
    source_type: official-doc
    relevance: PII entity recognition with confidence scores.
  - id: safety-disclosure-design
    title: Moonweave safety-disclosure-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SensitiveSpan as detector-backed span identity separate from rules and activities.
source_claims:
  - id: claim-sensitive-span-presidio
    source: presidio-docs
    supports: Presidio AnalyzerEngine returns entity_type, start, end, and score mappable to SensitiveSpan with detector evidence.
    locator: Presidio Analyzer documentation
    evidence_kind: official
    confidence: high
  - id: claim-sensitive-span-comprehend
    source: aws-comprehend-pii
    supports: AWS Comprehend DetectPiiEntities returns PII types with scores and offsets suitable as SensitiveSpan evidence.
    locator: DetectPiiEntities response
    evidence_kind: official
    confidence: high
  - id: claim-sensitive-span-design
    source: safety-disclosure-design
    supports: Moonweave requires replayable coordinates and detector evidence; example-string appearance alone is invalid.
    locator: SensitiveSpan evidence requirements
    evidence_kind: design-inference
    confidence: high
