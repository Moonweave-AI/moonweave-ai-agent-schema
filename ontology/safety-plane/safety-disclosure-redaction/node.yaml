        zh: 若决定需要 sensitivity class、DisclosureRule 或脱敏算法，则归披露与脱敏；若只需受众、范围和最终显示状态，则归输出披露。
        en: If a decision requires sensitivity class, DisclosureRule, or redaction algorithm, it belongs to disclosure and redaction; if it needs only audience, range, and final display state, it belongs to output disclosure.
