        zh: Redaction 是依据脱敏规则对敏感输出执行替换、遮蔽或删除的披露控制活动，其身份由目标跨度、适用规则和变换结果确定；AuditLog 与 LogSubscription 只负责日志流的持久化、订阅和保留。 本条仅记录 Redaction；其 canonical owner 是披露与脱敏（safety-disclosure-redaction），日志观察不会改变该活动的类型或所有权。
