            zh: 领域审查确认本模块拥有披露控制活动、披露与脱敏规则以及具有来源坐标的 SensitiveSpan；实际扣留结果 SuppressedContext 与披露审计 DisclosureRecord 均由 info-output-disclosure 统一拥有，本模块只通过明确关系引用。
            en: Domain review confirms this module owns disclosure-control activities, disclosure and redaction rules, and source-anchored SensitiveSpan values. info-output-disclosure uniquely owns the actual withholding result SuppressedContext and disclosure audit record DisclosureRecord, which this module references only through explicit relations.
            ja: ドメイン審査は本モジュールが開示制御活動、開示・墨消し規則、出典座標付き SensitiveSpan を所有すると確認しました。実際の保留結果 SuppressedContext と開示監査 DisclosureRecord は info-output-disclosure が一意に所有し、本モジュールは明示関係でのみ参照します。
