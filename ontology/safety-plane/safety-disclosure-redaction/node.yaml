  key_notion:
    zh: 披露控制活动
    en: disclosure-control activity
    ja: 開示制御活動
  owns_when:
    zh: 当对象必须由披露规范版本、敏感片段的来源坐标与分类，或一次依据该规范执行的过滤、脱敏和安全分阶段释放活动来识别时，由本模块拥有。
    en: Own an object when it must be identified by a disclosure-specification revision, a sensitive span's source coordinates and classification, or a filtering, redaction, or secure staged-release activity performed under that specification.
    ja: 開示仕様の版、機微箇所の出所座標と分類、またはその仕様に基づくフィルタ、墨消し、安全な段階的開示の活動によって識別される対象を所有します。
  references_when:
    zh: 本模块引用待披露的内容、目标受众、信任边界和授权语境；输出、日志、记忆或工具结果需要证明安全变换时，引用本模块的规则、敏感片段与控制结果。
    en: This module references the content to disclose, intended audience, trust boundary, and authorization context. Outputs, logs, memory, or tool results reference its rules, sensitive spans, and control outcomes when proving a safety transformation.
    ja: 本モジュールは開示対象内容、受け手、信頼境界、認可文脈を参照します。出力、ログ、記憶、ツール結果が安全変換を証明する際は、本モジュールの規則、機微箇所、制御結果を参照します。
