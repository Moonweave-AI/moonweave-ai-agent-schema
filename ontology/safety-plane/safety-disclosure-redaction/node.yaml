schema: moonweave.ai/ontology-node/v1
id: safety-disclosure-redaction
kind: module
status: accepted
labels:
  zh: 敏感信息披露与脱敏
  en: Sensitive disclosure and redaction
  ja: 機微情報の開示と墨消し
semantics:
  short_definition:
    zh: 敏感信息披露与脱敏描述信息离开既定受众或信任边界前，如何依据版本化披露规则识别敏感片段，并执行允许、遮蔽、替换、抑制或分阶段释放。它严格区分可复用的披露规范与一次实际控制活动，也不接管普通输出排版、长度裁剪或受众叙事。
    en: Sensitive disclosure and redaction describes how sensitive spans are identified under versioned disclosure rules before information leaves an intended audience or trust boundary, and how release is allowed, masked, replaced, suppressed, or staged. It keeps reusable disclosure specifications distinct from a concrete control activity and does not own ordinary output layout, length truncation, or audience narrative.
    ja: 機微情報の開示と墨消しは、情報が想定受け手や信頼境界を越える前に、版管理された開示規則で機微箇所を特定し、許可、マスキング、置換、抑制、段階的開示を行う過程を記述します。再利用可能な開示仕様と一回の制御活動を明確に区別し、通常の出力レイアウト、長さによる切詰め、受け手向け叙述は所有しません。
  definition:
    zh: 敏感信息披露与脱敏描述信息离开既定受众或信任边界前，如何依据版本化披露规则识别敏感片段，并执行允许、遮蔽、替换、抑制或分阶段释放。它严格区分可复用的披露规范与一次实际控制活动，也不接管普通输出排版、长度裁剪或受众叙事。
    en: Sensitive disclosure and redaction describes how sensitive spans are identified under versioned disclosure rules before information leaves an intended audience or trust boundary, and how release is allowed, masked, replaced, suppressed, or staged. It keeps reusable disclosure specifications distinct from a concrete control activity and does not own ordinary output layout, length truncation, or audience narrative.
    ja: 機微情報の開示と墨消しは、情報が想定受け手や信頼境界を越える前に、版管理された開示規則で機微箇所を特定し、許可、マスキング、置換、抑制、段階的開示を行う過程を記述します。再利用可能な開示仕様と一回の制御活動を明確に区別し、通常の出力レイアウト、長さによる切詰め、受け手向け叙述は所有しません。
  why_needed:
    zh: 让每一次敏感信息释放都能回答依据哪版规则、识别了什么、对谁允许到何种程度、实际做了什么变换。
    en: Make every sensitive-information release answer which rule revision applied, what was identified, what degree of release was allowed to whom, and what transformation actually occurred.
    ja: 機微情報の各開示について、どの規則版を適用し、何を特定し、誰にどこまで許可し、実際にどの変換を行ったかを説明できるようにします。
  includes:
    - zh: 可独立版本化的披露规范及其规则、脱敏规则、默认处置和有效期。
      en: Independently versioned disclosure specifications and their rules, redaction rules, default disposition, and validity period.
      ja: 独立して版管理される開示仕様と、その規則、墨消し規則、既定処置、有効期間を含みます。
    - zh: 具有来源坐标和敏感性分类的 SensitiveSpan，以及采用具体规则执行过滤、脱敏或安全分阶段披露的一次控制活动。
      en: SensitiveSpan identities with source coordinates and sensitivity classification, and concrete control activities that apply a rule to filter, redact, or securely stage disclosure.
      ja: 出所座標と機微性分類を持つ SensitiveSpan と、具体的規則を用いてフィルタ、墨消し、安全な段階的開示を行う一回の制御活動を含みます。
  excludes:
    - zh: 最终向受众显示的内容结构、输出窗口、长度裁剪和披露记录归输出披露；只有依赖敏感性或边界规则的控制与变换属于本模块。
      en: Final audience-visible structure, output windows, length truncation, and disclosure records belong to output disclosure; only controls and transformations dependent on sensitivity or boundary rules belong here.
      ja: 最終的な表示構造、出力窓、長さによる切詰め、開示記録は出力開示に属します。機微性または境界規則に依存する制御と変換だけが本モジュールに属します。
    - zh: 提示注入、恶意内容、污点传播与安全缓解归内容完整性与注入防御；“敏感”与“恶意”是两种不同判断。
      en: Prompt injection, malicious content, taint propagation, and threat mitigation belong to content integrity and injection defense; sensitive and malicious are distinct judgments.
      ja: プロンプト注入、悪意ある内容、汚染伝播、脅威緩和は内容完全性と注入防御に属します。「機微」と「悪意」は別の判断です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为敏感信息从识别、规则判断到实际变换和受控释放建立可审计链路。
  en: Establish an auditable chain from sensitive-span identification and rule decision to actual transformation and controlled release.
  ja: 機微箇所の特定と規則判断から、実際の変換と制御された開示までの監査可能な連鎖を確立します。
