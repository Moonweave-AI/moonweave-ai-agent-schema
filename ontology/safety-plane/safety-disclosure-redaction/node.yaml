schema: moonweave.ai/ontology-node/v1
id: safety-disclosure-redaction
kind: module
labels:
  zh: 敏感信息披露与脱敏
  en: Sensitive disclosure and redaction
  ja: 機微情報の開示と墨消し
semantics:
  short_definition:
    zh: 敏感信息披露与脱敏描述信息离开受众或信任边界前，如何识别敏感片段并执行允许、遮蔽、替换或抑制。
    en: Sensitive disclosure and redaction describes how sensitive spans are identified before information leaves an audience or trust boundary and how release is allowed, masked, replaced, or suppressed.
    ja: 機微情報の開示と墨消しは、情報が audience/trust boundary を越える前に機微 span を特定し、許可・マスク・置換・抑制する過程を記述します。
  definition:
    zh: 本模块拥有版本化 DisclosureSpecification/DisclosureRule、SensitiveSpan（含来源坐标与敏感性分类）、DisclosureActivity/DisclosureFilter 及 ProgressiveDisclosure 分阶段释放。它映射 Microsoft Presidio 的 AnalyzerEngine（spaCy/Stanza 等 NER 识别 PERSON、EMAIL、PHONE、CREDIT_CARD 等）与 AnonymizerEngine（replace/redact/mask/hash 操作）；Anthropic API 输出过滤与 usage policy 约束下的 sensitive content handling；以及 AWS Comprehend PII、Google Cloud DLP、Azure AI Language PII 等 PII detection API 的实体类型与置信度分数。输出窗口、长度裁剪与受众叙事归 info-output-disclosure；本模块只记录依赖敏感性或边界规则的变换与抑制。Prompt 注入与恶意内容判断归 safety-injection-defense；“敏感”与“恶意”是不同判断。
    en: "This module owns versioned DisclosureSpecification/DisclosureRule, SensitiveSpan (with source coordinates and sensitivity class), DisclosureActivity/DisclosureFilter, and ProgressiveDisclosure staged release. It maps Microsoft Presidio AnalyzerEngine (spaCy/Stanza NER for PERSON, EMAIL, PHONE, CREDIT_CARD, etc.) and AnonymizerEngine (replace, redact, mask, hash operators); Anthropic API output filtering and sensitive content handling under usage policy constraints; and PII detection APIs such as AWS Comprehend PII, Google Cloud DLP, and Azure AI Language PII with entity types and confidence scores. Output windows, length truncation, and audience narrative belong to info-output-disclosure; this module records only transformations and suppressions driven by sensitivity or boundary rules. Prompt injection and malicious content belong to safety-injection-defense; sensitive and malicious are distinct judgments."
    ja: "本モジュールは versioned DisclosureSpecification/DisclosureRule、SensitiveSpan（source 座標/機微 class）、DisclosureActivity/DisclosureFilter、ProgressiveDisclosure staged release を所有します。Microsoft Presidio AnalyzerEngine（spaCy/Stanza NER: PERSON/EMAIL/PHONE/CREDIT_CARD 等）と AnonymizerEngine（replace/redact/mask/hash）、Anthropic API output filtering/sensitive content handling、AWS Comprehend PII/Google Cloud DLP/Azure AI Language PII 等 PII detection API の entity type/confidence score を写像します。output window/length truncation/audience narrative は info-output-disclosure；本モジュールは sensitivity/boundary rule 駆動の transform/suppress のみ記録。prompt injection/malicious content は safety-injection-defense；sensitive と malicious は別判断。"
  why_needed:
    zh: 若只凭字符串外观（如 sk-example）或输出分段就标记 credential，Agent 会在审计日志、用户回复或 RAG 引用中泄露真实 API 密钥与 PII，且无法回答依据哪版 DisclosureRule、对谁允许到何种程度。
    en: If systems label credentials from string appearance alone (e.g., sk-example) or from output segmentation, agents leak real API keys and PII in audit logs, user replies, or RAG citations without explaining which DisclosureRule revision applied or what release degree was allowed to whom.
    ja: 文字列外観（sk-example 等）や output segmentation だけで credential ラベルすると、audit log/user reply/RAG citation で real API key/PII が漏えいし、どの DisclosureRule revision が誰にどこまで許可したか説明できません。
  includes:
    - zh: DisclosureSpecification、DisclosureRule、RedactionRule、默认处置与有效期。
      en: DisclosureSpecification, DisclosureRule, RedactionRule, default disposition, and validity period.
      ja: DisclosureSpecification、DisclosureRule、RedactionRule、default disposition、validity period。
    - zh: SensitiveSpan 及 DetectionActivity 产生的检测证据（Presidio analyzer score、DLP likelihood 等）。
      en: SensitiveSpan and detection evidence from DetectionActivity (Presidio analyzer score, DLP likelihood, etc.).
      ja: SensitiveSpan と DetectionActivity 生成 detection evidence（Presidio analyzer score、DLP likelihood 等）。
    - zh: DisclosureActivity/DisclosureFilter 执行的 mask、replace、suppress 或 staged release。
      en: DisclosureActivity/DisclosureFilter performing mask, replace, suppress, or staged release.
      ja: DisclosureActivity/DisclosureFilter による mask/replace/suppress/staged release。
  excludes:
    - zh: 最终输出结构、窗口与长度裁剪归 info-output-disclosure。
      en: Final output structure, windows, and length truncation belong to info-output-disclosure.
      ja: 最終 output structure/window/length truncation は info-output-disclosure。
    - zh: ThreatSignal、DefenseFinding、TaintEntity 归 safety-injection-defense。
      en: ThreatSignal, DefenseFinding, and TaintEntity belong to safety-injection-defense.
      ja: ThreatSignal/DefenseFinding/TaintEntity は safety-injection-defense。
    - zh: AuthorizationGrant 决定能否执行动作，不决定输出中哪段 PII 可见；二者可并存但身份不同。
      en: AuthorizationGrant decides whether an action may execute; it does not decide which PII span is visible in output—both may apply but identities differ.
      ja: AuthorizationGrant は action 実行可否を決め output 内 PII span visible を決めません。両方適用可だが identity は異なります。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应把 Presidio `AnalyzerEngine.analyze()` 返回的 RecognizerResult（entity_type、start、end、score）映射为 SensitiveSpan + detector evidence；`AnonymizerEngine.anonymize()` 的 OperatorConfig（mask、replace、redact）映射为 DisclosureActivity 变换记录。Anthropic streaming 输出的 policy filter 事件映射为 suppress 或 replace 处置。AWS Comprehend `DetectPiiEntities`、DLP `deidentify`、Azure PII detection 的 confidence/likelihood 必须绑定来源坐标版本（OCR 前后 offset 不可混用）。DisclosureActivity 必须证明只改变 rule 命中跨度并保持其余顺序与来源映射。
    en: "Integrations should map Presidio AnalyzerEngine.analyze() RecognizerResult (entity_type, start, end, score) to SensitiveSpan plus detector evidence; AnonymizerEngine.anonymize() OperatorConfig (mask, replace, redact) to DisclosureActivity transformation records. Anthropic streaming policy filter events map to suppress or replace disposition. AWS Comprehend DetectPiiEntities, DLP deidentify, and Azure PII detection confidence/likelihood must bind source coordinate revisions (pre/post-OCR offsets cannot mix). DisclosureActivity must prove only rule-matched spans changed while preserving order and source mapping elsewhere."
    ja: Presidio AnalyzerEngine.analyze() RecognizerResult を SensitiveSpan+detector evidence に、AnonymizerEngine.anonymize() OperatorConfig を DisclosureActivity transform record に写像。Anthropic streaming policy filter event は suppress/replace disposition。AWS Comprehend/DLP/Azure PII confidence/likelihood は source coordinate revision に bind（OCR 前後 offset 混用不可）。DisclosureActivity は rule hit span のみ変更し order/source mapping 保持を証明。
  typical_input:
    - description: Microsoft Presidio analyzer detecting email and API key spans.
      format: |
        from presidio_analyzer import AnalyzerEngine
        results = analyzer.analyze(text=doc, language="en",
          entities=["EMAIL_ADDRESS", "PHONE_NUMBER", "CREDIT_CARD"])
        # => RecognizerResult entity_type, start, end, score
      source_claims: [claim-safety-disclosure-presidio]
    - description: Presidio anonymizer replacing detected spans.
      format: |
        from presidio_anonymizer import AnonymizerEngine
        anonymized = anonymizer.anonymize(
          text=doc, analyzer_results=results,
          operators={"DEFAULT": OperatorConfig("replace", {"new_value": "[REDACTED]"})})
      source_claims: [claim-safety-disclosure-presidio]
    - description: AWS Comprehend PII entity detection.
      format: |
        comprehend.detect_pii_entities(Text=doc, LanguageCode="en")
        => Entities: Type=NAME|SSN|CREDIT_DEBIT_NUMBER, Score=0.98, BeginOffset, EndOffset
      source_claims: [claim-safety-disclosure-pii-apis]
  typical_output:
    - description: DisclosureActivity with preserved prefix/suffix digests.
      format: |
        disclosure_activity_id: da_91
        disclosure_rule_id: dr_cred_external
        sensitive_span_id: ss_17
        changed_range: 128..171
        replacement: "[REDACTED_CREDENTIAL]"
        prefix_digest: sha256:pre91
        suffix_digest: sha256:suf91
        unchanged_region_order_preserved: true
      source_claims: [claim-safety-disclosure-design]
    - description: Rejected span lacking detector evidence.
      format: |
        candidate_span_id: ss_18
        detector_evidence_ref: null
        offset_version_mismatch: true
        rule_audience_mismatch: true
        accepted: false
      source_claims: [claim-safety-disclosure-design]
  reference_implementations:
    - name: Microsoft Presidio
      url: https://microsoft.github.io/presidio/
      description: AnalyzerEngine NER/PII detection and AnonymizerEngine redaction operators.
    - name: Anthropic API — safety and usage
      url: https://docs.anthropic.com/en/api/messages
      description: Output filtering and sensitive content handling under usage policies.
    - name: AWS Comprehend PII
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      description: DetectPiiEntities with type and confidence scores.
    - name: Google Cloud Sensitive Data Protection (DLP)
      url: https://cloud.google.com/sensitive-data-protection/docs/deidentify-sensitive-data
      description: De-identification and infoType likelihood inspection.
    - name: Azure AI Language PII detection
      url: https://learn.microsoft.com/en-us/azure/ai-services/language-service/personally-identifiable-information/overview
      description: PII entity recognition with confidence scores.
structure:
  identity_keys: [sensitive_span_id, source_block_id, start_offset, end_offset]
  fields:
    - id: sensitive_span_id
      labels: {zh: 敏感跨度标识, en: Sensitive span identifier, ja: 機微 span 識別子}
      definitions:
        zh: 一次检测到的 SensitiveSpan 唯一 ID；不得用示例字符串外观单独创建。
        en: Unique ID of one detected SensitiveSpan; must not be created from example-string appearance alone.
        ja: 一回検出 SensitiveSpan の一意 ID。example string 外観だけでは作成不可。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^ss_[A-Za-z0-9._-]+$'
      example_value: ss_17
      allowed_values: []
      source_claims: [claim-safety-disclosure-design]
    - id: sensitivity_class
      labels: {zh: 敏感性分类, en: Sensitivity class, ja: 機微性区分}
      definitions:
        zh: credential、pii、financial、health 等规则驱动分类；须绑定 DisclosureRule 受众。
        en: Rule-driven class such as credential, pii, financial, health; must bind DisclosureRule audience.
        ja: credential/pii/financial/health 等 rule 駆動 class。DisclosureRule audience に bind 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: credential
      allowed_values: []
      source_claims: [claim-safety-disclosure-presidio]
    - id: detector_evidence_ref
      labels: {zh: 检测证据引用, en: Detector evidence reference, ja: 検出証拠参照}
      definitions:
        zh: Presidio RecognizerResult、Comprehend/DLP entity 或等效检测输出的稳定引用。
        en: Stable reference to Presidio RecognizerResult, Comprehend/DLP entity, or equivalent detector output.
        ja: Presidio RecognizerResult、Comprehend/DLP entity 等 detector output への安定参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: det_44
      allowed_values: []
      source_claims: [claim-safety-disclosure-presidio]
  constraints:
    - id: disclosure-span-requires-evidence
      severity: error
      expression_language: plain
      expression: SensitiveSpan must bind replayable source coordinates, detector evidence, and an applicable DisclosureRule for the declared audience; lexical resemblance or example strings alone are invalid.
      explanation:
        zh: 敏感跨度必须绑定可重放的来源坐标、证据与适用规则。
        en: A sensitive span must bind replayable source coordinates, evidence, and an applicable rule.
        ja: 機微 span には replayable source 座標、証拠、適用 rule が必要です。
      source_claims: [claim-safety-disclosure-design]
    - id: disclosure-transform-only-matched-spans
      severity: error
      expression_language: plain
      expression: DisclosureActivity output must change only rule-matched spans and preserve order and source mapping for all other regions.
      explanation:
        zh: 脱敏输出只能改变规则命中跨度，其余内容与顺序必须保持。
        en: Redaction output may change only rule-matched spans; other content and order must remain.
        ja: 墨消し output は rule hit span のみ変更し、その他 content/order は保持します。
      source_claims: [claim-safety-disclosure-design]
    - id: disclosure-offset-version-match
      severity: error
      expression_language: plain
      expression: start_offset and end_offset must reference the same source artifact version used by detector evidence; pre-OCR and post-OCR offsets cannot be mixed.
      explanation:
        zh: 坐标版本不一致会使 SensitiveSpan 不可审计。
        en: Mismatched coordinate versions make SensitiveSpan non-auditable.
        ja: 座標 version 不一致は SensitiveSpan を監査不可にします。
      source_claims: [claim-safety-disclosure-design]
  required_relations:
    - id: activity-applies-rule
      direction: outgoing
      predicate: applies
      target_concept_id: DisclosureRule
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每次 DisclosureActivity 必须 applies 恰好一条适用 DisclosureRule 版本。
        en: Each DisclosureActivity must apply exactly one applicable DisclosureRule revision.
        ja: 各 DisclosureActivity は applicable DisclosureRule revision を exactly 一つ applies します。
      source_claims: [claim-safety-disclosure-design]
examples:
  - id: safety-disclosure-redaction-example-presidio-credential
    labels:
      zh: Presidio 检测 API 密钥并遮蔽
      en: Presidio detects API key and masks
      ja: Presidio が API key を検出して mask
    descriptions:
      zh: fab_17 文本 128..171 含 API 密钥；Presidio AnalyzerEngine 返回 CREDENTIAL entity score=0.94，SensitiveSpan ss_17 绑定 det_44；DisclosureActivity da_91 对 external-customer 应用 dr_cred_external 替换为 [REDACTED_CREDENTIAL]，prefix/suffix digest 不变。
      en: fab_17 characters 128..171 contain an API key; Presidio AnalyzerEngine returns CREDENTIAL entity score=0.94 and SensitiveSpan ss_17 binds det_44; DisclosureActivity da_91 applies dr_cred_external for external-customer replacing with [REDACTED_CREDENTIAL] while prefix/suffix digests stay unchanged.
      ja: fab_17 文字 128..171 に API key。Presidio AnalyzerEngine が CREDENTIAL entity score=0.94、SensitiveSpan ss_17 が det_44 を bind。DisclosureActivity da_91 が external-customer 向け dr_cred_external で [REDACTED_CREDENTIAL] に置換、prefix/suffix digest 不変。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/
      version: AnalyzerEngine and AnonymizerEngine
    field_values:
      sensitive_span_id: ss_17
      entity_type: CREDENTIAL
      score: 0.94
      replacement: "[REDACTED_CREDENTIAL]"
      audience_class: external-customer
    related_node_ids:
      - SensitiveSpan
      - DisclosureRule
      - DisclosureActivity
    related_relation_ids: []
    source_claims:
      - claim-safety-disclosure-presidio
  - id: safety-disclosure-redaction-example-comprehend-pii
    labels:
      zh: AWS Comprehend PII 检测姓名与 SSN
      en: AWS Comprehend PII detects name and SSN
      ja: AWS Comprehend PII が name/SSN を検出
    descriptions:
      zh: support-ticket-88 文本经 Comprehend DetectPiiEntities 识别 NAME 与 SSN；DisclosureRule dr_pii_external 要求 mask；DisclosureFilter 输出只保留 ticket ID，PII span 替换为 <NAME> 与 <SSN> 占位符并记录 detector score。
      en: support-ticket-88 text is scanned by Comprehend DetectPiiEntities for NAME and SSN; DisclosureRule dr_pii_external requires mask; DisclosureFilter output keeps only the ticket ID while PII spans become <NAME> and <SSN> placeholders with recorded detector scores.
      ja: support-ticket-88 text を Comprehend DetectPiiEntities が NAME/SSN 検出。DisclosureRule dr_pii_external が mask 要求。DisclosureFilter output は ticket ID のみ保持し PII span を <NAME>/<SSN> placeholder に置換、detector score 記録。
    example_source:
      product: AWS
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      version: DetectPiiEntities API
    field_values:
      entities: [NAME, SSN]
      audience_class: external-customer
      disposition: mask
    related_node_ids:
      - SensitiveSpan
      - DisclosureFilter
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-safety-disclosure-pii-apis
  - id: safety-disclosure-redaction-example-anthropic-output-filter
    labels:
      zh: Anthropic 输出过滤抑制敏感内容
      en: Anthropic output filter suppresses sensitive content
      ja: Anthropic output filter が機微 content を suppress
    descriptions:
      zh: Claude 生成回复含内部 runbook 凭证段落；Anthropic output filtering 触发 suppress 处置，DisclosureActivity da-anthropic-3 记录被抑制跨度坐标与 policy 引用，而非在 info-output-disclosure 中仅做长度裁剪。
      en: A Claude reply includes an internal runbook credential paragraph; Anthropic output filtering triggers suppress disposition and DisclosureActivity da-anthropic-3 records suppressed span coordinates and policy reference rather than mere length truncation in info-output-disclosure.
      ja: Claude 応答に internal runbook credential 段落。Anthropic output filtering が suppress disposition を trigger し DisclosureActivity da-anthropic-3 が suppressed span 座標と policy 参照を記録。info-output-disclosure の length truncation だけではありません。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output safety filtering
    field_values:
      disposition: suppress
      disclosure_activity_id: da-anthropic-3
      sensitivity_class: credential
    related_node_ids:
      - DisclosureActivity
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-safety-disclosure-anthropic
  - id: safety-disclosure-redaction-example-progressive-release
    labels:
      zh: ProgressiveDisclosure 分阶段释放
      en: ProgressiveDisclosure staged release
      ja: ProgressiveDisclosure 段階的開示
    descriptions:
      zh: internal-operator 先看 summary（无 SSN）；经 HumanApproval 后 ProgressiveDisclosure pd_customer 第二阶段释放 detail 段但仍 mask credential span。每阶段独立 DisclosureActivity 与 audience 绑定。
      en: internal-operator first sees summary without SSN; after HumanApproval, ProgressiveDisclosure pd_customer stage two releases detail while still masking credential spans. Each stage has independent DisclosureActivity and audience binding.
      ja: internal-operator が最初 summary（SSN なし）を閲覧。HumanApproval 後 ProgressiveDisclosure pd_customer stage two が detail を release するが credential span は mask 維持。各 stage に独立 DisclosureActivity/audience binding。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: progressive disclosure staging
    field_values:
      progressive_disclosure_id: pd_customer
      stage_count: 2
      stage_two_requires_approval: true
    related_node_ids:
      - ProgressiveDisclosure
      - DisclosureActivity
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-safety-disclosure-design
  - id: safety-disclosure-redaction-example-reject-false-credential
    labels:
      zh: 拒绝无证据的伪 credential 跨度
      en: Reject false credential span without evidence
      ja: 証拠なし pseudo credential span を拒否
    descriptions:
      zh: 候选 ss_18 仅因 fab_18 含示例字符串 sk-example 标为 credential，无 detector evidence，offset 指向 OCR 前版本且 dr_internal_only 不适用于 external-customer；必须拒绝创建 SensitiveSpan。
      en: Candidate ss_18 is labeled credential only because fab_18 contains example string sk-example, with no detector evidence, offsets pointing to pre-OCR version, and dr_internal_only inapplicable to external-customer; SensitiveSpan creation must be rejected.
      ja: 候補 ss_18 は fab_18 の sk-example 例示文字列だけで credential とされ、detector evidence なし、offset は OCR 前版、dr_internal_only は external-customer 不適用。SensitiveSpan 作成拒否必須。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: sensitive span evidence requirements
    field_values:
      candidate_span_id: ss_18
      detector_evidence_ref: null
      accepted: false
    related_node_ids:
      - SensitiveSpan
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-safety-disclosure-design
