          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本体审查确认两个不可相互替代的关键根：DisclosureControlActivity 统摄 DisclosureFilter、ProgressiveDisclosure 与 Redaction 运行活动；DisclosureSpecification 统摄其版本所包含的 DisclosureRule，并由 RedactionRule 进一步专化。活动对规则的 governed_by 只记录运行时适用事实，不作为规范的结构父级；SensitiveSpan 保持独立组合根。
            en: Ontology review confirms two non-interchangeable key roots. DisclosureControlActivity organizes runtime DisclosureFilter, ProgressiveDisclosure, and Redaction activities; DisclosureSpecification organizes the DisclosureRule records contained by one specification revision, with RedactionRule as a specialization. An activity's governed_by relation records runtime applicability only and is not a specification's structural parent. SensitiveSpan remains an independent composition root.
            ja: 本体審査は相互代替できない二つの key root を確認します。DisclosureControlActivity は runtime の DisclosureFilter、ProgressiveDisclosure、Redaction を、DisclosureSpecification は一つの仕様版が含む DisclosureRule とその特殊化 RedactionRule を統括します。活動の governed_by は実行時適用事実だけを記録し、仕様の構造親にはしません。SensitiveSpan は独立 composition root です。
