module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 披露控制接收两类可判定输入：脱敏活动定位具体敏感片段（Redaction-targets-SensitiveSpan），披露过滤器则对完整输出信息作整项跨界决定（DisclosureFilter-suppresses-OutputInformation）。输出窗口只规定可见范围，不是抑制动作的对象。
          en: "Disclosure control receives two decision-bearing inputs: redaction locates a concrete sensitive span (Redaction-targets-SensitiveSpan), while a disclosure filter makes a whole-item boundary decision about OutputInformation (DisclosureFilter-suppresses-OutputInformation). OutputWindow specifies visible range and is not the object of suppression."
          ja: 開示制御の判断入力は二種類です。秘匿化は具体的 SensitiveSpan を特定し（Redaction-targets-SensitiveSpan）、開示フィルタは OutputInformation 全体の越境を判断します（DisclosureFilter-suppresses-OutputInformation）。OutputWindow は可視範囲仕様であり、抑制対象ではありません。
        family_concept_ids:
          - SensitiveSpan
          - OutputInformation
        relation_ids:
          - Redaction-targets-SensitiveSpan
          - DisclosureFilter-suppresses-OutputInformation
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 作出整项扣留决定的 DisclosureFilter 可能产生由 info-output-disclosure 拥有的 SuppressedContext；披露审计也统一由 canonical DisclosureRecord 记录，安全域不再复制结果或审计节点。
          en: A DisclosureFilter making a whole-item withholding decision may produce the SuppressedContext owned by info-output-disclosure. Disclosure audit is likewise recorded by canonical DisclosureRecord, so safety duplicates neither result nor audit nodes.
          ja: 項目全体を保留すると判断した DisclosureFilter は info-output-disclosure 所有の SuppressedContext を生成し得ます。disclosure audit も canonical DisclosureRecord が記録し、safety は result も audit node も複製しません。
        family_concept_ids:
          - SuppressedContext
        relation_ids:
          - DisclosureFilter-may_produce-SuppressedContext
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。输出披露、日志、记忆或工具结果需要应用或证明安全变换时，引用 SensitiveSpan、Decision 和 Redaction 结果。
          en: This ontology does not own runtime-failure adjudication. Output disclosure, logging, memory, or tool results references SensitiveSpan, Decision, and Redaction results when applying or proving a security transformation.
          ja: このオントロジーは実行失敗の判定を所有しません。出力開示、ログ、記憶、ツール結果が安全変換を適用・証明するとき、SensitiveSpan、Decision、Redaction 結果を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。输出披露、日志、记忆或工具结果需要应用或证明安全变换时，引用 SensitiveSpan、Decision 和 Redaction 结果。
          en: This ontology does not initiate a recovery workflow. Output disclosure, logging, memory, or tool results references SensitiveSpan, Decision, and Redaction results when applying or proving a security transformation.
          ja: このオントロジーは回復ワークフローを開始しません。出力開示、ログ、記憶、ツール結果が安全変換を適用・証明するとき、SensitiveSpan、Decision、Redaction 結果を参照します。
