schema: moonweave.ai/ontology-node/v1
id: safety-disclosure-redaction
kind: module
status: accepted
labels:
  zh: 敏感信息披露与脱敏
  en: Sensitive disclosure and redaction
  ja: 機微情報の開示と墨消し
semantics:
  short_definition:
    zh: 敏感信息披露与脱敏描述信息离开既定受众或信任边界前，如何依据版本化披露规则识别敏感片段，并执行允许、遮蔽、替换、抑制或分阶段释放。它严格区分可复用的披露规范与一次实际控制活动，也不接管普通输出排版、长度裁剪或受众叙事。
    en: Sensitive disclosure and redaction describes how sensitive spans are identified under versioned disclosure rules before information leaves an intended audience or trust boundary, and how release is allowed, masked, replaced, suppressed, or staged. It keeps reusable disclosure specifications distinct from a concrete control activity and does not own ordinary output layout, length truncation, or audience narrative.
    ja: 機微情報の開示と墨消しは、情報が想定受け手や信頼境界を越える前に、版管理された開示規則で機微箇所を特定し、許可、マスキング、置換、抑制、段階的開示を行う過程を記述します。再利用可能な開示仕様と一回の制御活動を明確に区別し、通常の出力レイアウト、長さによる切詰め、受け手向け叙述は所有しません。
  definition:
    zh: 敏感信息披露与脱敏描述信息离开既定受众或信任边界前，如何依据版本化披露规则识别敏感片段，并执行允许、遮蔽、替换、抑制或分阶段释放。它严格区分可复用的披露规范与一次实际控制活动，也不接管普通输出排版、长度裁剪或受众叙事。
    en: Sensitive disclosure and redaction describes how sensitive spans are identified under versioned disclosure rules before information leaves an intended audience or trust boundary, and how release is allowed, masked, replaced, suppressed, or staged. It keeps reusable disclosure specifications distinct from a concrete control activity and does not own ordinary output layout, length truncation, or audience narrative.
    ja: 機微情報の開示と墨消しは、情報が想定受け手や信頼境界を越える前に、版管理された開示規則で機微箇所を特定し、許可、マスキング、置換、抑制、段階的開示を行う過程を記述します。再利用可能な開示仕様と一回の制御活動を明確に区別し、通常の出力レイアウト、長さによる切詰め、受け手向け叙述は所有しません。
  why_needed:
    zh: 让每一次敏感信息释放都能回答依据哪版规则、识别了什么、对谁允许到何种程度、实际做了什么变换。
    en: Make every sensitive-information release answer which rule revision applied, what was identified, what degree of release was allowed to whom, and what transformation actually occurred.
    ja: 機微情報の各開示について、どの規則版を適用し、何を特定し、誰にどこまで許可し、実際にどの変換を行ったかを説明できるようにします。
  includes:
    - zh: 可独立版本化的披露规范及其规则、脱敏规则、默认处置和有效期。
      en: Independently versioned disclosure specifications and their rules, redaction rules, default disposition, and validity period.
      ja: 独立して版管理される開示仕様と、その規則、墨消し規則、既定処置、有効期間を含みます。
    - zh: 具有来源坐标和敏感性分类的 SensitiveSpan，以及采用具体规则执行过滤、脱敏或安全分阶段披露的一次控制活动。
      en: SensitiveSpan identities with source coordinates and sensitivity classification, and concrete control activities that apply a rule to filter, redact, or securely stage disclosure.
      ja: 出所座標と機微性分類を持つ SensitiveSpan と、具体的規則を用いてフィルタ、墨消し、安全な段階的開示を行う一回の制御活動を含みます。
  excludes:
    - zh: 最终向受众显示的内容结构、输出窗口、长度裁剪和披露记录归输出披露；只有依赖敏感性或边界规则的控制与变换属于本模块。
      en: Final audience-visible structure, output windows, length truncation, and disclosure records belong to output disclosure; only controls and transformations dependent on sensitivity or boundary rules belong here.
      ja: 最終的な表示構造、出力窓、長さによる切詰め、開示記録は出力開示に属します。機微性または境界規則に依存する制御と変換だけが本モジュールに属します。
    - zh: 提示注入、恶意内容、污点传播与安全缓解归内容完整性与注入防御；“敏感”与“恶意”是两种不同判断。
      en: Prompt injection, malicious content, taint propagation, and threat mitigation belong to content integrity and injection defense; sensitive and malicious are distinct judgments.
      ja: プロンプト注入、悪意ある内容、汚染伝播、脅威緩和は内容完全性と注入防御に属します。「機微」と「悪意」は別の判断です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为敏感信息从识别、规则判断到实际变换和受控释放建立可审计链路。
  en: Establish an auditable chain from sensitive-span identification and rule decision to actual transformation and controlled release.
  ja: 機微箇所の特定と規則判断から、実際の変換と制御された開示までの監査可能な連鎖を確立します。
structure: null
examples:
  - id: safety-disclosure-redaction-cq-sensitive-span-v3-example-positive
    kind: positive
    labels:
      zh: 指定受众下哪些内容跨度属于哪种敏感级别，检测证据和适用规则是什么？：正例
      en: "For a specified audience, which content spans have which sensitivity classes, and what detection evidence and rules apply?: positive case"
      ja: 指定受け手に対し、どの内容範囲がどの機微区分で、検出証拠と適用規則は何ですか。：正例
    scenario_id: null
    descriptions:
      zh: 文件附件块 fab_17 的文本字符 128..171 包含一个 API 密钥。SensitiveSpan ss_17 保留块 ID、字符坐标、credential 类别和检测证据 det_44；面向 external-customer 的规则 dr_cred_external 要求遮蔽该跨度。音频块 ab_17 没有命中且保持独立。
      en: FileAttachmentBlock fab_17 contains an API key at text characters 128..171. SensitiveSpan ss_17 retains the block ID, character coordinates, credential class, and detector evidence det_44; rule dr_cred_external requires masking that span for external-customer. AudioBlock ab_17 has no match and remains separate.
      ja: FileAttachmentBlock fab_17 の text 文字 128..171 に API key があります。SensitiveSpan ss_17 は block ID、文字座標、credential 区分、検出証拠 det_44 を保持し、external-customer 向け rule dr_cred_external は当該範囲の墨消しを要求します。AudioBlock ab_17 は未検出で独立のままです。
    field_values:
      sensitive_span_id: ss_17
      source_block_id: fab_17
      source_media_type: text/plain
      start_offset: 128
      end_offset: 171
      sensitivity_class: credential
      detector_evidence_ref: det_44
      audience_class: external-customer
      disclosure_rule_id: dr_cred_external
      rule_precedence: 90
      unmatched_audio_block_id: ab_17
    related_node_ids:
      - SensitiveSpan
      - FileAttachmentBlock
      - DisclosureRule
      - AudioBlock
    related_relation_ids: []
    expected_result:
      zh: 返回 ss_17、128..171、credential、det_44 和 dr_cred_external，并说明该规则在 external-customer 受众下以优先级 90 生效。
      en: Return ss_17, offsets 128..171, credential, det_44, and dr_cred_external, and state that precedence 90 makes the rule decisive for external-customer.
      ja: ss_17、offset 128..171、credential、det_44、dr_cred_external を返し、external-customer に対し precedence 90 で当該 rule が決定的になることを示します。
    why_valid_or_invalid:
      zh: ss_17 的身份由精确来源坐标与敏感分类决定，fab_17 仅承载内容；检测证据和受众规则共同支持保护判定。
      en: ss_17 is identified by exact source coordinates and sensitivity class while fab_17 merely carries content; detector evidence and the audience rule jointly support protection.
      ja: ss_17 の同一性は正確な source 座標と機微区分で決まり、fab_17 は内容を運ぶだけです。検出証拠と受け手 rule が保護判断を共同で支えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-disclosure-redaction-003
      - claim-safety-disclosure-redaction-004
  - id: safety-disclosure-redaction-cq-sensitive-span-v3-example-counter
    kind: counterexample
    labels:
      zh: 指定受众下哪些内容跨度属于哪种敏感级别，检测证据和适用规则是什么？：反例
      en: "For a specified audience, which content spans have which sensitivity classes, and what detection evidence and rules apply?: counterexample"
      ja: 指定受け手に対し、どの内容範囲がどの機微区分で、検出証拠と適用規則は何ですか。：反例
    scenario_id: null
    descriptions:
      zh: 候选 ss_18 只因 fab_18 中出现示例字符串“sk-example”便标为 credential，但没有检测证据，坐标仍使用 OCR 前版本，且 dr_internal_only 不适用于 external-customer。
      en: Candidate ss_18 is labeled credential only because fab_18 contains the example string 'sk-example'. It has no detector evidence, its offsets refer to a pre-OCR version, and dr_internal_only does not apply to external-customer.
      ja: 候補 ss_18 は fab_18 の例示文字列 'sk-example' だけで credential とされましたが、detector 証拠がなく、offset は OCR 前版を指し、dr_internal_only も external-customer に適用されません。
    field_values:
      candidate_span_id: ss_18
      source_block_id: fab_18
      source_version: ocr-v2
      offset_version: ocr-v1
      start_offset: 52
      end_offset: 62
      candidate_class: credential
      detector_evidence_ref: null
      audience_class: external-customer
      candidate_rule_id: dr_internal_only
      rule_audience: internal-operator
    related_node_ids:
      - SensitiveSpan
      - FileAttachmentBlock
      - DisclosureRule
      - AudioBlock
    related_relation_ids: []
    expected_result:
      zh: 拒绝 ss_18，并逐项报告证据缺失、来源版本与坐标不一致、规则受众不匹配；不得仅凭字符串外观生成 SensitiveSpan。
      en: Reject ss_18 and report missing evidence, source-version/offset mismatch, and rule-audience mismatch; string appearance alone must not create a SensitiveSpan.
      ja: ss_18 を拒否し、証拠欠落、source version と offset の不一致、rule audience 不一致を列挙します。文字列外観だけで SensitiveSpan を作りません。
    why_valid_or_invalid:
      zh: 敏感跨度必须绑定可重放的来源坐标、证据与适用规则；名称相似和失效坐标无法形成可审计判定。
      en: A sensitive span must bind replayable source coordinates, evidence, and an applicable rule; lexical resemblance and stale offsets do not form an auditable decision.
      ja: 機微範囲には再現可能な source 座標、証拠、適用 rule が必要で、語形類似や失効 offset では監査可能な判断になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-disclosure-redaction-003
      - claim-safety-disclosure-redaction-004
  - id: safety-disclosure-redaction-cq-transformation-integrity-v3-example-positive
    kind: positive
    labels:
      zh: 脱敏输出是否只改变规则命中的跨度，并保持其余内容顺序和来源映射？：正例
      en: "Did redaction change only rule-matched spans while preserving order and source mapping for all other content?: positive case"
      ja: 墨消し出力は規則一致範囲だけを変更し、その他内容の順序と出典写像を保持しましたか。：正例
    scenario_id: null
    descriptions:
      zh: DisclosureActivity da_91 受 ProgressiveDisclosure pd_customer 管理。源文本 src_91 仅把 SensitiveSpan ss_17 的 128..171 替换为“[REDACTED_CREDENTIAL]”；前缀、后缀的摘要与顺序在输出 out_91 中保持不变。
      en: DisclosureActivity da_91 is governed by ProgressiveDisclosure pd_customer. Source src_91 replaces only SensitiveSpan ss_17 at 128..171 with '[REDACTED_CREDENTIAL]'; prefix and suffix digests and their order remain unchanged in out_91.
      ja: DisclosureActivity da_91 は ProgressiveDisclosure pd_customer に管理されます。source src_91 は SensitiveSpan ss_17 の 128..171 だけを '[REDACTED_CREDENTIAL]' に置換し、out_91 では prefix・suffix digest と順序を保持します。
    field_values:
      disclosure_activity_id: da_91
      progressive_disclosure_id: pd_customer
      source_artifact_id: src_91
      output_artifact_id: out_91
      sensitive_span_id: ss_17
      changed_range: 128..171
      replacement: "[REDACTED_CREDENTIAL]"
      prefix_digest: sha256:pre91
      suffix_digest: sha256:suf91
      unchanged_region_order_preserved: true
    related_node_ids:
      - DisclosureActivity
      - ProgressiveDisclosure
    related_relation_ids:
      - DisclosureActivity-governed_by-ProgressiveDisclosure
    expected_result:
      zh: 返回 transformation-valid：唯一变更区间映射到 ss_17 和已批准替换，前后未变区域的摘要及顺序均一致。
      en: "Return transformation-valid: the sole changed range maps to ss_17 and an approved replacement, while both unchanged-region digests and order match."
      ja: transformation-valid を返します。唯一の変更範囲は ss_17 と承認済み置換に対応し、未変更領域の digest と順序は一致します。
    why_valid_or_invalid:
      zh: 治理边只说明 da_91 适用 pd_customer；变换完整性由精确跨度映射、允许替换和未变区域摘要共同证明。
      en: The governance edge establishes that pd_customer applies to da_91; exact span mapping, allowed replacement, and unchanged-region digests prove transformation integrity.
      ja: governance edge は pd_customer が da_91 に適用されることを示し、正確な span mapping・許可置換・未変更領域 digest が変換完全性を証明します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-disclosure-redaction-005
      - claim-safety-disclosure-redaction-006
  - id: safety-disclosure-redaction-cq-transformation-integrity-v3-example-counter
    kind: counterexample
    labels:
      zh: 脱敏输出是否只改变规则命中的跨度，并保持其余内容顺序和来源映射？：反例
      en: "Did redaction change only rule-matched spans while preserving order and source mapping for all other content?: counterexample"
      ja: 墨消し出力は規則一致範囲だけを変更し、その他内容の順序と出典写像を保持しましたか。：反例
    scenario_id: null
    descriptions:
      zh: da_92 同样声明受 pd_customer 管理，但 out_92 除遮蔽 ss_17 外，还把未命中的退款金额“100”改为“0”，导致后缀摘要从 sha256:suf91 变为 sha256:suf92。
      en: da_92 is also governed by pd_customer, but out_92 not only masks ss_17; it changes the unmatched refund amount from '100' to '0', changing the suffix digest from sha256:suf91 to sha256:suf92.
      ja: da_92 も pd_customer に管理されますが、out_92 は ss_17 の墨消しに加えて未検出の返金額 '100' を '0' に変更し、suffix digest を sha256:suf91 から sha256:suf92 に変えています。
    field_values:
      disclosure_activity_id: da_92
      progressive_disclosure_id: pd_customer
      source_artifact_id: src_91
      output_artifact_id: out_92
      approved_changed_range: 128..171
      unapproved_changed_range: 84..87
      unapproved_before: "100"
      unapproved_after: "0"
      source_suffix_digest: sha256:suf91
      output_suffix_digest: sha256:suf92
    related_node_ids:
      - DisclosureActivity
      - ProgressiveDisclosure
    related_relation_ids:
      - DisclosureActivity-governed_by-ProgressiveDisclosure
    expected_result:
      zh: 返回 transformation-invalid，标出 84..87 的未批准改动和后缀摘要不一致；存在治理关系不能豁免内容差异核验。
      en: Return transformation-invalid, identify the unapproved change at 84..87 and suffix-digest mismatch; a governance edge does not waive content-difference validation.
      ja: transformation-invalid を返し、84..87 の未承認変更と suffix digest 不一致を示します。governance edge があっても内容差分検証は免除されません。
    why_valid_or_invalid:
      zh: DisclosureActivity-governed_by-ProgressiveDisclosure 只证明规则适用，不证明每个字节变化都获准；额外变更违反跨度封闭边界。
      en: DisclosureActivity-governed_by-ProgressiveDisclosure proves rule applicability, not that every byte change is authorized; the extra edit violates span closure.
      ja: DisclosureActivity-governed_by-ProgressiveDisclosure は rule 適用だけを証明し、全 byte 変更の承認を意味しません。追加変更は span closure に違反します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-disclosure-redaction-005
      - claim-safety-disclosure-redaction-006
  - id: safety-disclosure-redaction-cq-audit-disclosure-v3-example-positive
    kind: positive
    labels:
      zh: 谁在何种授权下看到了哪类敏感信息或脱敏结果，审计记录是否完整？：正例
      en: "Who saw which class of sensitive information or redacted result under what authority, and is the audit record complete?: positive case"
      ja: 誰がどの権限でどの機微情報区分または墨消し結果を見て、監査記録は完全ですか。：正例
    scenario_id: null
    descriptions:
      zh: info-output-disclosure 的 DisclosureRecord drec_91 记录 user_7 依据 grant_7 看到了 out_91。drec_91 通过 records_control 指向安全域活动 dca_91；该活动应用 dr_cred_external，将 credential 类 ss_17 替换为占位符。记录只保存摘要和坐标，不保存密钥明文。
      en: DisclosureRecord drec_91 in info-output-disclosure records that user_7 saw out_91 under grant_7. drec_91 records control activity dca_91 in safety, which applies dr_cred_external and replaces credential span ss_17 with a marker. The record stores digests and coordinates, not the cleartext key.
      ja: info-output-disclosure の DisclosureRecord drec_91 は user_7 が grant_7 に基づき out_91 を見たことを記録します。drec_91 は safety の control activity dca_91 を records_control し、dca_91 は dr_cred_external を適用して credential span ss_17 を marker に置換します。record は digest と座標だけを保存し、key 平文を保存しません。
    field_values:
      disclosure_record_id: drec_91
      audience_actor_ref: user_7
      authority_grant_ref: grant_7
      disclosure_control_activity_id: dca_91
      disclosure_rule_id: dr_cred_external
      sensitivity_class: credential
      sensitive_span_ref: ss_17
      transformed_artifact_ref: out_91
      transformed_artifact_digest: sha256:out91
      actual_disclosure_at: 2026-07-14T14:03:12Z
      cleartext_stored: false
      audit_log_relation_applicable: false
    related_node_ids:
      - DisclosureRecord
      - DisclosureControlActivity
      - AuditLog
      - DisclosureRule
      - LogSubscription
    related_relation_ids:
      - DisclosureRecord-records_control-DisclosureControlActivity
    expected_result:
      zh: 返回 user_7、grant_7、dca_91、dr_cred_external、credential、out_91 和实际披露时间；对 AuditLog 写入明确返回 N/A。
      en: Return user_7, grant_7, dca_91, dr_cred_external, credential, out_91, and the actual disclosure time; return explicit N/A for AuditLog persistence.
      ja: user_7、grant_7、dca_91、dr_cred_external、credential、out_91、実開示時刻を返し、AuditLog 永続化には明示的 N/A を返します。
    why_valid_or_invalid:
      zh: 记录 owner、控制活动 owner 与日志 owner 保持分离；唯一已断言的跨模块事实有明确端点，缺失的日志写入不靠邻接补推。
      en: Record, control-activity, and logging ownership remain separate; the one asserted cross-module fact has explicit endpoints, and absent log persistence is not inferred from adjacency.
      ja: record、control activity、logging の owner を分離し、断言済み module 間事実には明示 endpoint があります。欠落した log persistence を隣接から推論しません。
    synthetic: true
