    - other_module_id: info-output-disclosure
      subject_concept_ids:
        - DisclosureActivity
        - DisclosureRecord
        - OutputInformation
        - SuppressedContext
      decision: references
      owner_module_id: info-output-disclosure
      rationale:
        zh: 输出披露侧端点分别承担执行、证据、内容和抑制结果职责：DisclosureActivity 受渐进披露治理，DisclosureRecord 记录具体控制活动，OutputInformation 可被过滤器抑制，SuppressedContext 由过滤器产生并受规则约束。OutputWindow 不是这五条 accepted 边的端点。
        en: "The output-disclosure endpoints have distinct execution, evidence, content, and suppression-result roles: DisclosureActivity is governed by progressive disclosure, DisclosureRecord records the concrete control activity, OutputInformation may be suppressed by a filter, and SuppressedContext is produced by that filter and constrained by a rule. OutputWindow is not an endpoint of these five accepted edges."
        ja: output-disclosure 側 endpoint は execution・evidence・content・suppression result を分担します。DisclosureActivity は progressive disclosure に govern され、DisclosureRecord は control activity を記録し、OutputInformation は filter に suppress され、SuppressedContext は filter が生成し rule が制約します。OutputWindow はこの五 accepted edge の endpoint ではありません。
      relation_ids:
        - DisclosureActivity-governed_by-ProgressiveDisclosure
        - DisclosureFilter-may_produce-SuppressedContext
        - DisclosureFilter-suppresses-OutputInformation
        - DisclosureRecord-records_control-DisclosureControlActivity
        - SuppressedContext-withheld_by-DisclosureRule
      relation_not_applicable_reason: null
      source_claims:
        - claim-safety-disclosure-redaction-011
        - claim-safety-disclosure-redaction-012
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-safety-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认输出侧四个端点分别是 DisclosureActivity、DisclosureRecord、OutputInformation、SuppressedContext。五条跨域事实为 DisclosureActivity-governed_by-ProgressiveDisclosure、DisclosureFilter-may_produce-SuppressedContext、DisclosureFilter-suppresses-OutputInformation、DisclosureRecord-records_control-DisclosureControlActivity、SuppressedContext-withheld_by-DisclosureRule；OutputWindow 未参与，故已移除。
              en: Domain review confirms the four output-side endpoints as DisclosureActivity, DisclosureRecord, OutputInformation, and SuppressedContext. The five cross-domain facts are DisclosureActivity-governed_by-ProgressiveDisclosure, DisclosureFilter-may_produce-SuppressedContext, DisclosureFilter-suppresses-OutputInformation, DisclosureRecord-records_control-DisclosureControlActivity, and SuppressedContext-withheld_by-DisclosureRule; OutputWindow is absent and was removed.
              ja: domain review は output-side endpoint を DisclosureActivity・DisclosureRecord・OutputInformation・SuppressedContext と確認しました。cross-domain fact は DisclosureActivity-governed_by-ProgressiveDisclosure・DisclosureFilter-may_produce-SuppressedContext・DisclosureFilter-suppresses-OutputInformation・DisclosureRecord-records_control-DisclosureControlActivity・SuppressedContext-withheld_by-DisclosureRule の五つで、参加しない OutputWindow は削除しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构复核逐边检查源端与目标端后确认 references 集合完整且无冗余：活动、记录、输出内容与抑制结果均由 info-output-disclosure 拥有；安全策略、过滤器、规则与控制活动只通过五条 accepted 关系连接，不另造平行框架。
              en: "Ontology review checked every source and target and confirms the references set is complete without extras: activity, record, output content, and suppression result are owned by info-output-disclosure, while safety policy, filter, rule, and control occurrence connect only through the five accepted relations rather than a parallel framework."
              ja: ontology review は全 source/target を確認し references set が過不足ないと判定しました。activity・record・output content・suppression result は info-output-disclosure が所有し、safety policy・filter・rule・control occurrence は五 accepted relation のみで接続し parallel framework を作りません。
    - other_module_id: info-output-disclosure
      subject_concept_ids:
        - DisclosureControlActivity
        - DisclosureFilter
        - DisclosureRule
        - ProgressiveDisclosure
      decision: owns
      owner_module_id: safety-disclosure-redaction
