      semantic_area:
        zh: 安全脱敏结果与实际显示结果
        en: Security redaction results versus actual display results
        ja: 安全墨消し結果と実表示結果
      candidate_concept_ids:
        - OutputWindow
        - SuppressedContext
      overlap_reason:
        zh: 两者都能出现 suppression，但安全变换依赖敏感规则，显示记录还可能因长度、界面或受众偏好截断非敏感内容。 本条仅记录 OutputWindow、SuppressedContext；其 canonical owner 是输出披露（info-output-disclosure），因此 safety-disclosure-redaction 在此引用这些概念。
        en: Both may include suppression, but security transformation depends on sensitivity rules while display records may also truncate nonsensitive content for length, interface, or audience preference. This record is limited to OutputWindow, SuppressedContext; their canonical owner is Output disclosure (info-output-disclosure), so safety-disclosure-redaction references these concepts here.
        ja: どちらも suppression を含み得ますが、安全変換は機微規則に依存し、表示記録は長さ、interface、受け手設定で非機微内容も切詰め得ます。 この記録は OutputWindow、SuppressedContext だけを対象とし、canonical owner は出力開示（info-output-disclosure）です。したがって safety-disclosure-redaction はここでこれらを参照します。
