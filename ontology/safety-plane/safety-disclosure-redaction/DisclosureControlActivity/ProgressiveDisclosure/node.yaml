schema: moonweave.ai/ontology-node/v1
id: ProgressiveDisclosure
kind: concept
labels:
  zh: 渐进式披露
  en: progressive disclosure
  ja: 段階的開示
semantics:
  short_definition:
    zh: 按阶段与审批条件分步释放内容的 DisclosureControlActivity 子类。
    en: A DisclosureControlActivity subtype releasing content in stages under approval conditions.
    ja: 段階と承認条件で content を分步 release する DisclosureControlActivity subtype。
  definition:
    zh: ProgressiveDisclosure 将同一 source block 按 stage 定义（summary → detail → full）与 audience 绑定，每阶段独立 DisclosureControlActivity 与 DisclosureRule 应用；经 HumanApproval 后进入下一阶段但仍可 mask credential span。它不是一次性 DisclosureFilter，也不是 DisclosureSpecification。
    en: "ProgressiveDisclosure binds the same source block to stages (summary → detail → full) and audience, with independent DisclosureControlActivity and DisclosureRule application per stage; after HumanApproval the next stage may release more content while still masking credential spans. It is neither one-shot DisclosureFilter nor DisclosureSpecification."
    ja: ProgressiveDisclosure は同一 source block を stage（summary→detail→full）と audience に bind し、各 stage で独立 DisclosureControlActivity/DisclosureRule apply。HumanApproval 後次 stage でより多く release 可だが credential span は mask 維持可。一回 DisclosureFilter/DisclosureSpecification ではない。
  why_needed:
    zh: 分阶段释放让 internal-operator 先看摘要、审批后再看细节，避免一次性暴露 SSN 或 credential，且每阶段可独立审计。
    en: Staged release lets internal-operator see summary first and detail after approval, avoiding one-shot SSN or credential exposure with per-stage audit.
    ja: staged release により internal-operator が summary 先行閲覧、承認後 detail 閲覧となり SSN/credential 一括暴露を避け各 stage 独立監査可。
  includes:
    - zh: 含 stage 定义、每阶段 audience、所需审批与仍适用的 RedactionRule。
      en: Includes stage definitions, per-stage audience, required approvals, and still-applicable RedactionRules.
      ja: stage 定義/各 stage audience/必要 approval/仍適用 RedactionRule を含む。
  excludes:
    - zh: 不包含单次 ingress filter、静态规则库或 info-output-disclosure 窗口裁剪。
      en: Excludes one-shot ingress filter, static rule library, or info-output-disclosure window truncation.
      ja: 一回 ingress filter/静的 rule library/info-output-disclosure window truncation は含まない。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成：pd_customer stage1=summary(no SSN) → stage2=detail(mask credential) 需 HumanApproval；每 stage 产生独立 disclosure_activity_id 与 disclosure_rule_ref；不得跳过 stage 直接 full release。
    en: "Integration: pd_customer stage1=summary(no SSN) → stage2=detail(mask credential) requires HumanApproval; each stage emits independent disclosure_activity_id and disclosure_rule_ref; must not skip stages to full release."
    ja: 統合：pd_customer stage1=summary(no SSN)→stage2=detail(mask credential) HumanApproval 必要。各 stage 独立 disclosure_activity_id/disclosure_rule_ref。stage skip して full release 不可。
  typical_input:
    - description: Multi-stage disclosure plan for one source block.
      format: |
        progressive_disclosure_id: pd_customer
        stages: [summary, detail]
        stage_two_requires_approval: true
      source_claims:
        - claim-progressive-disclosure-design
  typical_output:
    - description: Stage-two activity after approval.
      format: |
        disclosure_activity_id: da_pd_stage2
        stage: 2
        credential_spans_still_masked: true
      source_claims:
        - claim-progressive-disclosure-design
  reference_implementations:
    - name: Moonweave progressive disclosure design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      description: Staged release with per-stage DisclosureRule binding.
    - name: Microsoft Presidio
      url: https://microsoft.github.io/presidio/
      description: Per-stage anonymizer application on released spans.
structure:
  identity_keys:
    - progressive_disclosure_id
  fields:
    - id: progressive_disclosure_id
      labels:
        zh: 渐进披露标识
        en: progressive disclosure ID
        ja: 段階的開示 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一套分阶段披露计划。
        en: Stably identifies one staged disclosure plan.
        ja: 一 staged disclosure plan を安定識別。
      allowed_values: []
      pattern: null
      example_value: pd_customer
      source_claims:
        - claim-progressive-disclosure-design
    - id: stage_count
      labels:
        zh: 阶段数量
        en: stage count
        ja: stage 数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该计划定义的披露阶段总数。
        en: Total number of disclosure stages defined by the plan.
        ja: 計画が定義する開示 stage 総数。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-progressive-disclosure-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProgressiveDisclosure-customer-two-stage
    labels:
      zh: 客户两阶段披露
      en: Customer two-stage disclosure
      ja: 顧客 2 stage 開示
    descriptions:
      zh: internal-operator 先看 summary（无 SSN）；HumanApproval 后 stage two 释放 detail 但仍 mask credential；每阶段独立 DisclosureControlActivity。
      en: internal-operator sees summary without SSN first; after HumanApproval stage two releases detail while still masking credentials; each stage has independent DisclosureControlActivity.
      ja: internal-operator が summary（SSN なし）先行。HumanApproval 後 stage two detail release、credential mask 維持。各 stage 独立 DisclosureControlActivity。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: progressive disclosure
    field_values:
      progressive_disclosure_id: pd_customer
      stage_count: 2
      stage_two_requires_approval: true
    related_node_ids:
      - ProgressiveDisclosure
      - DisclosureControlActivity
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-progressive-disclosure-design
  - id: ProgressiveDisclosure-audit-three-stage
    labels:
      zh: 审计三阶段披露
      en: Audit three-stage disclosure
      ja: 監査 3 stage 開示
    descriptions:
      zh: pd_audit stage1=metadata, stage2=redacted body, stage3=full internal 仅 audit-log audience；stage3 需 dual approval。
      en: pd_audit stage1=metadata, stage2=redacted body, stage3=full internal for audit-log audience only; stage3 requires dual approval.
      ja: pd_audit stage1=metadata/stage2=redacted body/stage3=full internal（audit-log audience のみ）。stage3 dual approval 必要。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: audit progressive disclosure
    field_values:
      progressive_disclosure_id: pd_audit
      stage_count: 3
    related_node_ids:
      - ProgressiveDisclosure
      - Redaction
    related_relation_ids: []
    source_claims:
      - claim-progressive-disclosure-design
  - id: ProgressiveDisclosure-skip-stage-boundary
    labels:
      zh: 禁止跳过阶段
      en: Skipping stages forbidden
      ja: stage skip 禁止
    descriptions:
      zh: 未获 stage1 审批不得直接 full release；跳过 stage 的 DisclosureActivity 无效。
      en: Full release without stage1 approval is invalid; DisclosureActivity skipping stages is rejected.
      ja: stage1 承認なし full release 無効。stage skip DisclosureActivity 拒否。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: stage ordering
    field_values:
      authorization_chain_complete: false
    related_node_ids:
      - ProgressiveDisclosure
    related_relation_ids: []
    source_claims:
      - claim-progressive-disclosure-design
  - id: ProgressiveDisclosure-filter-boundary
    labels:
      zh: 单次过滤非渐进披露
      en: One-shot filter is not progressive disclosure
      ja: 一回 filter は progressive disclosure ではない
    descriptions:
      zh: 一次性 Anthropic output suppress 无 stage 计划；是 DisclosureFilter 不是 ProgressiveDisclosure。
      en: One-shot Anthropic output suppress without stage plan is DisclosureFilter, not ProgressiveDisclosure.
      ja: 一回 Anthropic output suppress で stage plan なし。DisclosureFilter で ProgressiveDisclosure ではない。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output filtering
    field_values:
      accepted: false
    related_node_ids:
      - ProgressiveDisclosure
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-progressive-disclosure-design
