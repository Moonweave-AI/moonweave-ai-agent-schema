  definitions:
    zh: 每个 ProgressiveDisclosure 都是 DisclosureControlActivity，其种差是把一次潜在披露拆成有序阶段，并在每次扩展可见范围前重新验证当前目的、最小必要数据与授权；仅按字符数分块不构成渐进披露。
    en: Every ProgressiveDisclosure is a DisclosureControlActivity, distinguished by dividing a potential disclosure into ordered stages and revalidating current purpose, minimum necessary data, and authorization before each visibility expansion; character-based chunking alone is not progressive disclosure.
    ja: すべての ProgressiveDisclosure は DisclosureControlActivity であり、潜在的開示を順序付き段階へ分け、可視範囲を広げるたびに現在目的、必要最小データ、認可を再検証する点を種差とします。文字数による分割だけでは段階的開示になりません。
