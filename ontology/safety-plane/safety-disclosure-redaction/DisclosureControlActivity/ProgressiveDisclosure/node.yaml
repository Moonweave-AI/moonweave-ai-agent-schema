schema: moonweave.ai/ontology-node/v1
id: ProgressiveDisclosure
kind: concept
status: accepted
labels:
  zh: 渐进式披露
  en: progressive disclosure
  ja: 段階的開示
semantics:
  short_definition:
    zh: 随授权与任务需要逐阶段扩大可见信息的披露控制活动。
    en: A disclosure-control activity that expands visible information in stages as authority and task need justify it.
    ja: 権限とタスク必要性に応じて可視情報を段階的に拡大する開示制御活動。
  definition:
    zh: 渐进式披露是一种 DisclosureControlActivity，其种差是先释放完成当前步骤所需的最小信息，再仅在新的任务阶段、授权证据或人工决定满足条件时释放额外层级，并记录每阶段接收者与依据；它不是分页、流式传输或按 token 逐步显示。
    en: ProgressiveDisclosure is a DisclosureControlActivity distinguished by first releasing the minimum information needed for the current step, then releasing additional layers only when a new task stage, authority evidence, or human decision satisfies conditions, recording recipient and basis for each stage; it is not pagination, streaming, or token-by-token display.
    ja: ProgressiveDisclosure は DisclosureControlActivity の一種で、現在段階に必要な最小情報を先に公開し、新しい task stage、権限証拠、人手判断が条件を満たした時だけ追加 layer を公開し、各段階の受信者と根拠を記録します。pagination、streaming、token 表示ではありません。
  why_needed:
    zh: 阶段化控制可以让智能体在不提前暴露完整记录的情况下完成低权限步骤，并在权限或任务发生变化时重新判定，降低一次性过度披露与长期上下文滞留。
    en: Staged control lets an agent complete low-authority steps without exposing a full record upfront and reevaluate when authority or task changes, reducing over-disclosure and long-lived context exposure.
    ja: 段階制御により、完全記録を先に公開せず低権限手順を完了でき、権限・タスク変更時に再評価して過剰開示と長期文脈残留を減らせます。
  includes:
    - zh: 每个阶段都有明确接收者、最小字段集合、释放条件、授权依据和审计记录的分阶段披露运行。
      en: Staged disclosure runs in which each stage has an explicit recipient, minimal field set, release condition, authority basis, and audit record.
      ja: 各段階に明示受信者、最小項目集合、開示条件、権限根拠、監査記録を持つ段階開示実行。
  excludes:
    - zh: 不改变可见范围的分页、为了渲染性能的懒加载、普通 token streaming、一次性完整披露以及没有新授权判断的连续输出。
      en: Pagination that does not change visibility, performance lazy loading, ordinary token streaming, one-shot full disclosure, and continuous output without a new authority decision.
      ja: 可視範囲を変えない pagination、性能用 lazy load、通常 token streaming、一括完全開示、新たな権限判断のない連続出力。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProgressiveDisclosure-example-positive-001
    kind: positive
    labels:
      zh: 分阶段工单披露
      en: Staged ticket disclosure
      ja: 段階的 ticket 開示
    scenario_id: null
    descriptions:
      zh: 分诊智能体先看到工单主题与严重级别；获得 on-call 批准后才看到脱敏日志；只有安全负责人批准时才可访问原始取证附件。
      en: A triage agent first sees ticket subject and severity, gains redacted logs after on-call approval, and accesses raw forensic attachments only after security-lead approval.
      ja: triage agent は最初に ticket subject と severity を見て、on-call 承認後に redacted logs、security lead 承認後だけ raw forensic attachments を参照します。
    field_values:
      disclosure_control_activity_id: disclosure-control:incident-784/staged
      candidate_content_ref: incident-context:784
      disclosure_boundary_ref: disclosure-boundary:incident-response/triage-to-security
      disclosure_rule_ref: incident-progressive-disclosure-policy@4
      authority_snapshot_ref: authority-snapshot:incident-triage@2026-07-16T10:35:00Z
      selected_actions:
        - release
        - stage
      decision_record_ref: disclosure-decision:incident-784/stage-1
      decided_at: 2026-07-16T10:35:02Z
    related_node_ids:
      - ProgressiveDisclosure
      - DisclosureControlActivity
    related_relation_ids:
      - ProgressiveDisclosure-is_a-DisclosureControlActivity
    expected_result:
      zh: 每次扩大可见范围都产生新的授权检查与审计条目，前一阶段不会自动获得后一阶段内容。
      en: Each visibility expansion creates a new authorization check and audit entry; an earlier stage does not automatically receive later content.
      ja: 可視範囲拡大ごとに新しい認可検査と監査記録を作り、前段階は後段階内容を自動取得しません。
    why_valid_or_invalid:
      zh: 信息层级随任务与授权阶段有条件增加，而非仅改变传输顺序，满足渐进披露种差。
      en: Information layers increase conditionally with task and authority stages rather than merely changing delivery order, satisfying progressive disclosure.
      ja: 情報 layer が task と権限段階に応じ条件付きで増え、配送順序変更だけではないため段階開示です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-progressive-disclosure-002
  - id: ProgressiveDisclosure-example-boundary-001
    kind: boundary
    labels:
      zh: 流式文本边界
      en: Streaming-text boundary
      ja: streaming text の境界
    scenario_id: null
    descriptions:
      zh: 同一份已批准公开答复按 token 流式发送，所有 token 的接收者与授权范围相同；这只是传输方式，不是 ProgressiveDisclosure。
      en: One approved public response streams token by token with the same recipient and authority scope for every token; this is transport behavior, not ProgressiveDisclosure.
      ja: 一つの承認済み公開応答を token 単位で送りますが、全 token の受信者と権限範囲は同じです。これは transport behavior で ProgressiveDisclosure ではありません。
    field_values: {}
    related_node_ids:
      - ProgressiveDisclosure
    related_relation_ids: []
    expected_result:
      zh: 记录保持普通 streaming；不创建虚假的阶段授权或披露层级。
      en: The record remains ordinary streaming and does not create fictitious staged authority or disclosure layers.
      ja: 通常 streaming のまま、架空の段階認可や開示 layer を作りません。
    why_valid_or_invalid:
      zh: 渐进披露要求可见范围与授权条件发生阶段变化；仅分片传输不满足。
      en: Progressive disclosure requires staged changes in visible scope and authorization conditions; chunked transport alone does not qualify.
      ja: 段階開示には可視範囲と認可条件の段階変化が必要で、分割配送だけでは不足です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-progressive-disclosure-003
  - id: ProgressiveDisclosure-example-instance-001
    kind: instance
    labels:
      zh: 三阶段披露计划
      en: Three-stage disclosure plan
      ja: 三段階開示計画
    scenario_id: null
    descriptions:
      zh: pd_9 保存 stages=[{role:triage,fields:[subject,severity]},{role:oncall,fields:[redacted_log]},{role:security_lead,fields:[forensic_attachment]}]，每阶段引用独立 approval_id。
      en: pd_9 stores stages=[{role:triage,fields:[subject,severity]},{role:oncall,fields:[redacted_log]},{role:security_lead,fields:[forensic_attachment]}], each with a separate approval_id.
      ja: pd_9 は stages=[{role:triage,fields:[subject,severity]},{role:oncall,fields:[redacted_log]},{role:security_lead,fields:[forensic_attachment]}] を保存し、各段階が別 approval_id を参照します。
    field_values: {}
    related_node_ids:
      - ProgressiveDisclosure
    related_relation_ids: []
    expected_result:
      zh: 控制器只能按当前角色与批准推进一个阶段，撤销授权时停止后续释放。
      en: The controller advances only one stage allowed by current role and approval and stops later release if authority is revoked.
      ja: controller は現在 role と承認で許可された一段階だけ進み、権限取消時は後続開示を停止します。
    why_valid_or_invalid:
      zh: 实例明确定义阶段、角色、字段集合和独立授权，足以区分普通分页或流。
      en: The instance defines stages, roles, field sets, and independent authority, distinguishing it from ordinary pagination or streaming.
      ja: 段階、role、項目集合、独立認可を定義し、通常 pagination/streaming と区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-progressive-disclosure-004
