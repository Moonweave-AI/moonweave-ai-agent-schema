source_claims:
  - id: claim-disclosure-control-activity-001
    source: eng-security-owasp-llm02-2025
    supports: OWASP identifies sensitive output disclosure and recommends sanitization plus strict access control. Moonweave models the runtime act of applying those decisions as DisclosureControlActivity.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-disclosure-control-activity-002
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends applying and auditing output sanitization and access controls. Moonweave gives each concrete application of those controls an activity identity.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-disclosure-control-activity-003
    source: eng-security-owasp-llm02-2025
    supports: OWASP calls for validating and sanitizing model output before disclosure. Moonweave therefore records the exact pre-disclosure content being evaluated.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Output validation and sanitization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-disclosure-control-activity-004
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends least privilege and restricting access according to user or process needs. Moonweave makes that disclosure boundary explicit per activity.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Access Controls and Least Privilege
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-disclosure-control-activity-005
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends enforceable data-handling and sanitization controls. Moonweave records the precise rule revision that governed a runtime decision.
    locator: LLM02:2025 > Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
