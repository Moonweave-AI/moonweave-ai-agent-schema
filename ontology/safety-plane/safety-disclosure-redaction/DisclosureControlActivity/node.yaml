schema: moonweave.ai/ontology-node/v1
id: DisclosureControlActivity
kind: concept
labels:
  zh: 披露控制活动
  en: disclosure control activity
  ja: 開示制御活動
semantics:
  short_definition:
    zh: 一次有执行者、受检内容与规则版本的可审计披露求值运行。
    en: One auditable disclosure-evaluation run with actor, inspected content, and rule version.
    ja: 実行者・検査 content・rule version を持つ一回の監査可能な開示評価 run。
  definition:
    zh: DisclosureControlActivity 是 safety-disclosure-redaction 的执行上位概念：记录谁在何时以哪版 DisclosureRule 对哪一内容块做了何种披露变换（mask/replace/suppress/staged release），并产出独立 SensitiveSpan 与 transform 记录。Presidio `anonymize()`、Anthropic output filtering 事件与 DLP `deidentify` 的每次边界 adjudication 应投影为 DisclosureControlActivity，而不是与 DisclosureFilter、Redaction 或 SensitiveSpan 混为同一身份。
    en: "DisclosureControlActivity is the execution genus in disclosure-redaction: it records who performed which disclosure transform on which content block under which DisclosureRule version and when, emitting separate SensitiveSpan and transform records. Each boundary adjudication from Presidio anonymize(), Anthropic output filtering events, or DLP deidentify should project to DisclosureControlActivity rather than sharing identity with DisclosureFilter, Redaction, or SensitiveSpan."
    ja: DisclosureControlActivity は disclosure-redaction domain の実行上位概念で、誰がいつどの DisclosureRule version でどの content block にどの開示 transform（mask/replace/suppress/staged release）を行い独立 SensitiveSpan/transform record を出力したかを記録。Presidio anonymize()/Anthropic output filtering/DLP deidentify の各 boundary adjudication は DisclosureFilter/Redaction/SensitiveSpan と同一 identity にせず DisclosureControlActivity へ投影。
  why_needed:
    zh: 若只保留脱敏后文本而不记录执行身份，Agent 无法回答依据哪版 DisclosureRule、对谁允许到何种程度，也无法在 Presidio 升级后复检历史输出。
    en: Without execution identity alongside transformed text, agents cannot explain which DisclosureRule revision applied to whom and to what degree, or rescan historical output after Presidio upgrades.
    ja: transform 後 text だけ残し execution identity を欠くと、どの DisclosureRule revision が誰にどこまで適用されたか説明できず Presidio upgrade 後 historical output rescan もできません。
  includes:
    - zh: 包含有可追踪受检内容、DisclosureRule 版本、执行时间和输出引用的披露检查运行。
      en: Includes disclosure check runs with traceable content, DisclosureRule version, execution time, and output reference.
      ja: 追跡可能 content/DisclosureRule version/実行時刻/出力参照を持つ開示検査 run を含む。
  excludes:
    - zh: 不包含静态 DisclosureSpecification、SensitiveSpan 检测规范、最终输出窗口布局或未实际执行的策略声明。
      en: Excludes static DisclosureSpecification, SensitiveSpan detection specs, final output-window layout, and policies not executed.
      ja: 静的 DisclosureSpecification/SensitiveSpan detection spec/最終 output window layout/未実行 policy 宣言は含まない。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 分层：ingress DisclosureFilter（Anthropic/Moderation）→ SensitiveSpan 检测 → Redaction/ProgressiveDisclosure transform。每次运行保留 disclosure_activity_id、actor_ref、disclosure_rule_ref 与 source_block_ref。
    en: "Layer: ingress DisclosureFilter (Anthropic/Moderation) → SensitiveSpan detection → Redaction/ProgressiveDisclosure transform. Each run retains disclosure_activity_id, actor_ref, disclosure_rule_ref, and source_block_ref."
    ja: 層：ingress DisclosureFilter（Anthropic/Moderation）→ SensitiveSpan detection → Redaction/ProgressiveDisclosure transform。各 run で disclosure_activity_id/actor_ref/disclosure_rule_ref/source_block_ref 保持。
  typical_input:
    - description: Content block at disclosure boundary.
      format: tool-result | user-reply draft | audit-log excerpt
      source_claims:
        - claim-disclosure-activity-design
  typical_output:
    - description: DisclosureControlActivity with transform evidence.
      format: |
        disclosure_activity_id: da_91
        disclosure_rule_ref: dr_cred_external@4
        changed_range: 128..171
      source_claims:
        - claim-disclosure-activity-design
  reference_implementations:
    - name: Microsoft Presidio
      url: https://microsoft.github.io/presidio/
      description: AnalyzerEngine plus AnonymizerEngine pipeline.
    - name: Anthropic API
      url: https://docs.anthropic.com/en/api/messages
      description: Output filtering and sensitive content handling.
    - name: Google Cloud DLP
      url: https://cloud.google.com/sensitive-data-protection/docs/deidentify-sensitive-data
      description: De-identification API transformations.
structure:
  identity_keys:
    - disclosure_activity_id
  fields:
    - id: disclosure_activity_id
      labels:
        zh: 披露活动标识
        en: disclosure activity ID
        ja: 開示活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经实际运行的披露控制活动。
        en: Stably identifies one disclosure control activity that actually ran.
        ja: 実際に実行された一回の開示制御活動を安定識別。
      allowed_values: []
      pattern: null
      example_value: da_91
      source_claims:
        - claim-disclosure-activity-design
    - id: disclosure_rule_ref
      labels:
        zh: 披露规则引用
        en: disclosure rule reference
        ja: 開示 rule 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次活动实际应用的 DisclosureRule 版本。
        en: DisclosureRule revision actually applied by this activity.
        ja: 本 activity が実際 apply した DisclosureRule revision。
      allowed_values: []
      pattern: null
      example_value: dr_cred_external@4
      source_claims:
        - claim-disclosure-activity-design
    - id: source_block_ref
      labels:
        zh: 源内容块引用
        en: source block reference
        ja: 元 content block 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被本次运行读取的确切内容块版本。
        en: References the exact content-block version read by this run.
        ja: 本 run が読み取った exact content block version を参照。
      allowed_values: []
      pattern: null
      example_value: fab_17
      source_claims:
        - claim-disclosure-activity-design
  constraints:
    - id: disclosure-activity-applies-one-rule
      severity: error
      expression_language: plain
      expression: Each DisclosureControlActivity MUST apply exactly one applicable DisclosureRule revision
      explanations:
        zh: 每次披露活动必须 applies 恰好一条适用规则版本。
        en: Each disclosure activity must apply exactly one applicable rule revision.
        ja: 各開示 activity は applicable rule revision を exactly 一つ applies 必須。
      source_claims:
        - claim-disclosure-activity-design
  required_relation_constraints: []
examples:
  - id: DisclosureControlActivity-presidio-redact
    labels:
      zh: Presidio 脱敏活动
      en: Presidio redaction activity
      ja: Presidio 墨消し activity
    descriptions:
      zh: da_91 对 fab_17 应用 dr_cred_external，Presidio anonymize 替换 128..171 为 [REDACTED_CREDENTIAL]，prefix/suffix digest 不变。
      en: da_91 applies dr_cred_external to fab_17; Presidio anonymize replaces 128..171 with [REDACTED_CREDENTIAL] while prefix/suffix digests unchanged.
      ja: da_91 が fab_17 に dr_cred_external apply。Presidio anonymize が 128..171 を [REDACTED_CREDENTIAL] に置換、prefix/suffix digest 不変。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/anonymizer/
      version: AnonymizerEngine
    field_values:
      disclosure_activity_id: da_91
      disclosure_rule_ref: dr_cred_external@4
    related_node_ids:
      - DisclosureControlActivity
      - Redaction
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-disclosure-activity-presidio
  - id: DisclosureControlActivity-anthropic-filter
    labels:
      zh: Anthropic 输出过滤活动
      en: Anthropic output filter activity
      ja: Anthropic output filter activity
    descriptions:
      zh: da-anthropic-3 记录 Claude 回复中 runbook credential 段落被 suppress，含 policy 引用与 span 坐标。
      en: da-anthropic-3 records suppress disposition on runbook credential paragraph in Claude reply with policy reference and span coordinates.
      ja: da-anthropic-3 が Claude 応答 runbook credential 段落 suppress を記録。policy 参照と span 座標含む。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output filtering
    field_values:
      disclosure_activity_id: da-anthropic-3
      disposition: suppress
    related_node_ids:
      - DisclosureControlActivity
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-disclosure-activity-anthropic
  - id: DisclosureControlActivity-progressive-stage
    labels:
      zh: 分阶段披露活动
      en: Progressive disclosure stage activity
      ja: 段階的開示 activity
    descriptions:
      zh: internal-operator 先看 summary（无 SSN）；ProgressiveDisclosure stage two 经批准后释放 detail 段，每阶段独立 DisclosureControlActivity。
      en: internal-operator first sees summary without SSN; ProgressiveDisclosure stage two releases detail after approval; each stage is independent DisclosureControlActivity.
      ja: internal-operator が summary（SSN なし）を先に閲覧。ProgressiveDisclosure stage two が承認後 detail release。各 stage 独立 DisclosureControlActivity。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: progressive disclosure
    field_values:
      disclosure_activity_id: da_pd_stage2
      stage: 2
    related_node_ids:
      - DisclosureControlActivity
      - ProgressiveDisclosure
    related_relation_ids: []
    source_claims:
      - claim-disclosure-activity-design
  - id: DisclosureControlActivity-reject-no-evidence
    labels:
      zh: 拒绝无证据候选跨度
      en: Reject candidate span without evidence
      ja: 証拠なし候補 span 拒否
    descriptions:
      zh: 候选 ss_18 仅因 sk-example 字符串标为 credential，无 detector evidence；DisclosureControlActivity 不得创建 transform。
      en: Candidate ss_18 labeled credential only from sk-example string with no detector evidence; DisclosureControlActivity must not create transform.
      ja: 候補 ss_18 が sk-example 文字列のみで credential label、detector evidence なし。DisclosureControlActivity transform 作成不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: evidence requirements
    field_values:
      accepted: false
    related_node_ids:
      - DisclosureControlActivity
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-disclosure-activity-design
