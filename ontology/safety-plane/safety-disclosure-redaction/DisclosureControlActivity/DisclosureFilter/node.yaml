schema: moonweave.ai/ontology-node/v1
id: DisclosureFilter
kind: concept
labels:
  zh: 披露过滤器
  en: disclosure filter
  ja: 開示フィルタ
semantics:
  short_definition:
    zh: 在内容离开信任边界前执行 PII 抑制或策略过滤的 DisclosureControlActivity 子类。
    en: A DisclosureControlActivity subtype performing PII suppression or policy filtering before content leaves a trust boundary.
    ja: content が trust boundary を越える前に PII 抑制または policy filter を実行する DisclosureControlActivity subtype。
  definition:
    zh: DisclosureFilter 在模型输出、工具结果或日志条目进入 external-customer 或 audit-log 受众前执行过滤，映射 Anthropic API output filtering、Presidio AnalyzerEngine 前置扫描与 OpenAI Moderation 的 PII/suppression 处置。它产出 SensitiveSpan 候选与 suppress/replace 决策，但不拥有 DisclosureRule 规范本身；与 info-output-disclosure 的长度裁剪正交。
    en: "DisclosureFilter filters model output, tool results, or log entries before they reach external-customer or audit-log audiences, mapping Anthropic API output filtering, Presidio AnalyzerEngine pre-scan, and OpenAI Moderation PII or suppression disposition. It emits SensitiveSpan candidates and suppress or replace decisions but does not own DisclosureRule specifications; it is orthogonal to length truncation in info-output-disclosure."
    ja: DisclosureFilter は model output/tool result/log entry が external-customer/audit-log audience に到達する前に filter し、Anthropic output filtering/Presidio AnalyzerEngine pre-scan/OpenAI Moderation PII/suppression disposition を写像。SensitiveSpan 候補と suppress/replace 判断を出力するが DisclosureRule 仕様は所有しない。info-output-disclosure の length truncation と直交。
  why_needed:
    zh: 必须把边界过滤运行与规则库分开，否则无法证明 Anthropic output filter 在哪一 turn、哪一 content block 上实际运行，也不能与 ProgressiveDisclosure 分阶段释放区分。
    en: Boundary filter runs must be separated from rule libraries to prove which Anthropic output filter ran on which turn and content block, distinct from ProgressiveDisclosure staged release.
    ja: boundary filter run を rule library から分離しないと、どの turn/どの content block で Anthropic output filter が実行されたか証明できず ProgressiveDisclosure staged release と区別できません。
  includes:
    - zh: 包含 ingress 过滤、PII 抑制、policy suppress 与 detector-backed SensitiveSpan 候选生成。
      en: Includes ingress filtering, PII suppression, policy suppress, and detector-backed SensitiveSpan candidate generation.
      ja: ingress filter/PII suppress/policy suppress/detector-backed SensitiveSpan 候補生成を含む。
  excludes:
    - zh: 不包含最终输出窗口布局、InjectionSignature 扫描、CommitGate 或静态 DisclosureSpecification。
      en: Excludes final output-window layout, InjectionSignature scanning, CommitGate, or static DisclosureSpecification.
      ja: 最終 output window layout/InjectionSignature scan/CommitGate/静的 DisclosureSpecification は含まない。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成：Claude streaming output filter event → DisclosureFilter da-anthropic-N；Presidio analyze-only pass → DisclosureFilter + SensitiveSpan；Comprehend DetectPiiEntities pre-check → DisclosureFilter。输出必须证明只改变 rule 命中跨度。
    en: "Integration: Claude streaming output filter event → DisclosureFilter da-anthropic-N; Presidio analyze-only pass → DisclosureFilter + SensitiveSpan; Comprehend DetectPiiEntities pre-check → DisclosureFilter. Output must prove only rule-matched spans changed."
    ja: 統合：Claude streaming output filter → DisclosureFilter da-anthropic-N；Presidio analyze-only → DisclosureFilter+SensitiveSpan；Comprehend pre-check → DisclosureFilter。出力は rule hit span のみ変更を証明必須。
  typical_input:
    - description: Model reply before external delivery.
      format: assistant message block | tool_result stream chunk
      source_claims:
        - claim-disclosure-filter-anthropic
  typical_output:
    - description: Filtered content with suppressed spans.
      format: |
        disclosure_activity_id: da-filter-12
        disposition: suppress
        sensitive_span_ids: [ss_17]
      source_claims:
        - claim-disclosure-filter-design
  reference_implementations:
    - name: Anthropic API
      url: https://docs.anthropic.com/en/api/messages
      description: Output filtering and sensitive content suppression.
    - name: Microsoft Presidio Analyzer
      url: https://microsoft.github.io/presidio/analyzer/
      description: PII and credential detection at disclosure boundary.
    - name: OpenAI Moderation API
      url: https://platform.openai.com/docs/api-reference/moderations/create
      description: Category flags at content egress boundaries.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureFilter-anthropic-suppress
    labels:
      zh: Anthropic 输出过滤抑制
      en: Anthropic output filter suppress
      ja: Anthropic output filter suppress
    descriptions:
      zh: Claude 生成回复含 internal runbook 凭证；Anthropic output filtering 触发 suppress，DisclosureFilter da-anthropic-3 记录坐标与 policy 引用。
      en: Claude reply includes internal runbook credentials; Anthropic output filtering triggers suppress; DisclosureFilter da-anthropic-3 records coordinates and policy reference.
      ja: Claude 応答に internal runbook credential。Anthropic output filtering suppress trigger。DisclosureFilter da-anthropic-3 が座標/policy 参照記録。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output filtering
    field_values:
      disclosure_activity_id: da-anthropic-3
      disposition: suppress
    related_node_ids:
      - DisclosureFilter
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-disclosure-filter-anthropic
  - id: DisclosureFilter-comprehend-pii
    labels:
      zh: Comprehend PII 过滤
      en: Comprehend PII filter
      ja: Comprehend PII filter
    descriptions:
      zh: support-ticket-88 经 DetectPiiEntities 识别 NAME/SSN；DisclosureFilter 输出 mask 占位符并保留 ticket ID。
      en: support-ticket-88 scanned by DetectPiiEntities for NAME/SSN; DisclosureFilter outputs mask placeholders while retaining ticket ID.
      ja: support-ticket-88 を DetectPiiEntities が NAME/SSN 検出。DisclosureFilter が mask placeholder 出力し ticket ID 保持。
    example_source:
      product: AWS Comprehend
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      version: DetectPiiEntities
    field_values:
      entities: [NAME, SSN]
      disposition: mask
    related_node_ids:
      - DisclosureFilter
      - SensitiveSpan
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-disclosure-filter-comprehend
  - id: DisclosureFilter-presidio-analyze
    labels:
      zh: Presidio 分析过滤
      en: Presidio analyze filter
      ja: Presidio analyze filter
    descriptions:
      zh: AnalyzerEngine.analyze() 在 tool-result 进入用户回复前检测 EMAIL/CREDENTIAL；DisclosureFilter 绑定 det_44 与 ss_17。
      en: AnalyzerEngine.analyze() detects EMAIL/CREDENTIAL in tool-result before user reply; DisclosureFilter binds det_44 and ss_17.
      ja: AnalyzerEngine.analyze() が user reply 前 tool-result で EMAIL/CREDENTIAL 検出。DisclosureFilter が det_44/ss_17 bind。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/
      version: AnalyzerEngine
    field_values:
      disclosure_activity_id: da-filter-presidio-5
    related_node_ids:
      - DisclosureFilter
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-disclosure-filter-presidio
  - id: DisclosureFilter-length-truncation-boundary
    labels:
      zh: 长度裁剪非披露过滤
      en: Length truncation is not disclosure filter
      ja: length truncation は disclosure filter ではない
    descriptions:
      zh: 仅因 token 限制截断回复末尾，无 SensitiveSpan 或 DisclosureRule；属于 info-output-disclosure 不是 DisclosureFilter。
      en: Truncating reply tail due to token limit without SensitiveSpan or DisclosureRule belongs to info-output-disclosure, not DisclosureFilter.
      ja: token 制限で reply 末尾 truncate のみ、SensitiveSpan/DisclosureRule なし。info-output-disclosure で DisclosureFilter ではない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: disclosure vs output layout
    field_values:
      accepted: false
    related_node_ids:
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-disclosure-filter-design
