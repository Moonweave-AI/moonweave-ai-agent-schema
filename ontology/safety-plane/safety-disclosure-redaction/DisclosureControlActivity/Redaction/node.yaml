schema: moonweave.ai/ontology-node/v1
id: Redaction
kind: concept
status: accepted
labels:
  zh: 脱敏处置
  en: redaction activity
  ja: 秘匿化処理
semantics:
  short_definition:
    zh: 遮蔽、移除、替换或安全概括具体敏感片段的披露控制活动。
    en: A disclosure-control activity that masks, removes, replaces, or safely summarizes a specific sensitive span.
    ja: 特定 SensitiveSpan を mask、remove、replace、safe summarize する開示制御活動。
  definition:
    zh: 脱敏处置是一种 DisclosureControlActivity，继承 disclosure_control_activity_id 作为唯一处置活动身份；其种差是以一个或多个明确 SensitiveSpan 为目标，按 RedactionRule 遮蔽、删除、替换或安全概括其值，同时保留允许披露的其余内容与可审计映射。它不是规则、检测结果、整项扣留处置或无差别删除。
    en: Redaction is a DisclosureControlActivity and inherits disclosure_control_activity_id as its sole control-activity identity. Its differentia is targeting one or more explicit SensitiveSpan records and masking, removing, replacing, or safely summarizing their values under RedactionRule while retaining permitted surrounding content and an auditable mapping. It is not the rule, detection result, whole-item withholding, or indiscriminate deletion.
    ja: Redaction は DisclosureControlActivity の一種で、唯一の処置活動同一性として disclosure_control_activity_id を継承します。明示的 SensitiveSpan を対象に RedactionRule の下で値を mask、remove、replace、safe summarize し、許可内容と監査可能 mapping を保持する点が種差です。規則、検出結果、項目全体の保留、無差別削除ではありません。
  why_needed:
    zh: 把脱敏作为有目标的活动，可验证每个变换是否覆盖正确片段、是否保留足够上下文且未复制秘密，并将检测、规则、执行与结果清楚分离。
    en: Modeling redaction as a targeted activity verifies that each transformation covers the correct span, preserves useful context without copying the secret, and separates detection, rule, execution, and result.
    ja: redaction を対象付き活動として表すと、正しい span の被覆、有用文脈の保持、秘密非複製を検証でき、検出、規則、実行、結果を分離できます。
  includes:
    - zh: 依据明确规则，对已识别凭据、个人标识、财务字段、内部路径或机密文本片段执行遮蔽、删除、替换或不可逆概括的运行活动。
      en: Runtime activities that mask, remove, replace, or irreversibly summarize identified credentials, personal identifiers, financial fields, internal paths, or confidential text spans under an explicit rule.
      ja: 明示規則により、識別済み資格情報、個人識別子、金融項目、内部 path、機密 text span を mask、remove、replace、不可逆 summarize する実行活動。
  excludes:
    - zh: 仅识别 SensitiveSpan 的扫描、描述变换的 RedactionRule、完全抑制整项内容的结果、可逆加密以及不考虑敏感性的普通文本编辑。
      en: Detection that only identifies SensitiveSpan, RedactionRule specifying transformations, a result that fully suppresses an item, reversible encryption, and ordinary editing unrelated to sensitivity.
      ja: SensitiveSpan を識別するだけの検出、変換を記述する RedactionRule、項目全体を完全抑制した結果、可逆暗号化、機密性と無関係な通常編集。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: applied_at
      labels:
        zh: 应用时间
        en: applied at
        ja: 適用時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 脱敏规则实际应用的 UTC 时间。
        en: UTC instant at which the redaction rule was applied.
        ja: 墨消し規則が実際に適用された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T04:12:00.000Z
      source_claims:
        - claim-redaction-002
    - id: replacement_marker
      labels:
        zh: 替代标记
        en: replacement marker
        ja: 置換マーカー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 替代敏感内容且不泄露原文的显示标记。
        en: Display marker replacing sensitive content without disclosing it.
        ja: 機密内容を開示せず置換する表示マーカーです。
      allowed_values: []
      pattern: null
      example_value: "[REDACTED]"
      source_claims:
        - claim-redaction-003
  constraints:
    - id: redaction-span-preserved
      severity: error
      expression_language: plain
      expression: redaction preserves the source span identity and never stores the sensitive value in replacement_marker
      explanations:
        zh: 脱敏必须保留来源区间身份，替代标记不得包含敏感原值。
        en: Redaction preserves source-span identity and never stores the sensitive value in replacement_marker.
        ja: 墨消しは出典範囲の同一性を保持し、replacement_marker に機密原値を保存しません。
      source_claims:
        - claim-redaction-004
  required_relation_constraints:
    - id: redaction-targets-sensitive-span
      direction: outgoing
      predicate: targets
      target_concept_id: SensitiveSpan
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 脱敏动作必须指向被处理的敏感区间。
        en: A redaction action points to the sensitive span it processes.
        ja: 墨消し動作は処理対象の機密範囲を指します。
      source_claims:
        - claim-redaction-005
    - id: redaction-governed-by-one-redaction-rule
      direction: outgoing
      predicate: governed_by
      target_concept_id: RedactionRule
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次 Redaction 必须引用恰好一个决定其目标选择和替换方法的 RedactionRule 修订。
        en: Every Redaction references exactly one RedactionRule revision that determines its target selection and replacement method.
        ja: 各 Redaction は対象選択と置換方法を決める一つだけの RedactionRule revision を参照します。
      source_claims:
        - claim-redaction-006
examples:
  - id: Redaction-example-positive-001
    kind: positive
    labels:
      zh: API 密钥脱敏
      en: API-key redaction
      ja: API key redaction
    scenario_id: null
    descriptions:
      zh: reply_88 的字符 42–73 被标记为 credential；redaction r_12 按 rule rr_3 将其替换为 [REDACTED_CREDENTIAL]，保留前后的错误说明。
      en: Characters 42–73 of reply_88 are marked credential; redaction r_12 replaces them with [REDACTED_CREDENTIAL] under rule rr_3 while retaining the surrounding error explanation.
      ja: reply_88 の文字 42–73 は credential とされ、redaction r_12 は rule rr_3 により [REDACTED_CREDENTIAL] へ置換し、周辺のエラー説明を保持します。
    field_values:
      disclosure_control_activity_id: disclosure-control:redaction-r_12
      candidate_content_ref: candidate-output:reply_88
      disclosure_boundary_ref: disclosure-boundary:external-support/reply-recipient
      disclosure_rule_ref: redaction-rule:rr_3
      authority_snapshot_ref: authority-snapshot:support-output-guard@2026-07-14T14:02:00Z
      selected_actions:
        - redact
      decision_record_ref: disclosure-decision:r_12
      decided_at: 2026-07-14T14:02:00Z
      applied_at: 2026-07-14T14:02:00Z
      replacement_marker: "[REDACTED_CREDENTIAL]"
    related_node_ids:
      - Redaction
      - DisclosureControlActivity
      - SensitiveSpan
      - RedactionRule
    related_relation_ids:
      - Redaction-is_a-DisclosureControlActivity
      - Redaction-targets-SensitiveSpan
      - Redaction-governed_by-RedactionRule
    expected_result:
      zh: 外部输出不含密钥值，但仍说明错误原因；审计可用 span 引用核对变换。
      en: External output contains no key value but still explains the error; audit can verify the transformation through the span reference.
      ja: 外部出力は key 値を含まずエラー理由を保持し、監査は span 参照で変換を確認できます。
    why_valid_or_invalid:
      zh: 活动有明确目标片段、变换规则与非秘密替换结果，并保留安全上下文，满足脱敏种差。
      en: The activity has an explicit target span, transformation rule, and non-secret replacement while preserving safe context, satisfying redaction.
      ja: 明示対象 span、変換規則、非秘密置換を持ち、安全な文脈を保持するため redaction です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-redaction-007
  - id: Redaction-example-boundary-001
    kind: boundary
    labels:
      zh: 整项抑制边界
      en: Whole-item suppression boundary
      ja: 項目全体抑制の境界
    scenario_id: null
    descriptions:
      zh: filter_run_46 发现 attachment_6 只包含一个不可安全变换的私钥，因而不生成替换文本并完全不向 external-user 释放该项；该运行产生整项扣留处置 SuppressedContext，而不是对该项执行 Redaction。
      en: filter_run_46 finds that attachment_6 contains only a private key that cannot be transformed safely, emits no replacement text, and releases none of the item to external-user; the run produces a whole-item withholding disposition represented by SuppressedContext, not Redaction of the item.
      ja: filter_run_46 は attachment_6 が安全に変換できない private key だけを含むと判定し、置換文を生成せず external-user へ項目を一切公開しません。この run は項目全体の保留処置 SuppressedContext を生成し、項目への Redaction は実行しません。
    field_values: {}
    related_node_ids:
      - Redaction
      - DisclosureFilter
      - SuppressedContext
      - SensitiveSpan
    related_relation_ids:
      - DisclosureFilter-may_produce-SuppressedContext
    expected_result:
      zh: 建立 filter_run_46 到 SuppressedContext 实例的 may_produce 因果边；不得创建 Redaction 活动，也不得声称保留了脱敏后的内容。
      en: Assert the may_produce causal edge from filter_run_46 to a SuppressedContext instance; create no Redaction activity and do not claim that redacted content was retained.
      ja: filter_run_46 から SuppressedContext instance への may_produce 因果 edge を成立させ、Redaction 活動を作成せず、redacted content を保持したとも主張しません。
    why_valid_or_invalid:
      zh: Redaction 保留经过变换的允许内容；整项不释放属于不同的控制结果。
      en: Redaction retains permitted transformed content; releasing none of the item is a different control outcome.
      ja: Redaction は変換後の許可内容を保持し、項目を全く公開しない処理は別の結果です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-redaction-008
  - id: Redaction-example-instance-001
    kind: instance
    labels:
      zh: 片段变换记录
      en: Span-transformation record
      ja: span 変換記録
    scenario_id: null
    descriptions:
      zh: r_12 保存 redaction_id=r_12、target=reply_88#42-73、rule=rr_3、method=replace、replacement_marker=[REDACTED_CREDENTIAL]、applied_at=2026-07-14T14:02:00Z。
      en: r_12 stores redaction_id=r_12, target=reply_88#42-73, rule=rr_3, method=replace, replacement_marker=[REDACTED_CREDENTIAL], and applied_at=2026-07-14T14:02:00Z.
      ja: r_12 は redaction_id=r_12、target=reply_88#42-73、rule=rr_3、method=replace、replacement_marker=[REDACTED_CREDENTIAL]、applied_at=2026-07-14T14:02:00Z を保存します。
    field_values:
      disclosure_control_activity_id: disclosure-control:redaction-r_12
      applied_at: 2026-07-14T14:02:00Z
      replacement_marker: "[REDACTED_CREDENTIAL]"
    related_node_ids:
      - Redaction
      - RedactionRule
    related_relation_ids:
      - Redaction-governed_by-RedactionRule
    expected_result:
      zh: 验证器确认目标 span 存在、规则适用且替换标记不泄露原值。
      en: Validation confirms the target span exists, the rule applies, and the replacement marker does not disclose the original value.
      ja: 検証器は対象 span の存在、規則適用、置換記号が元値を漏らさないことを確認します。
    why_valid_or_invalid:
      zh: 实例具有稳定活动 ID、目标、规则、方法、非秘密结果和时间，可独立审计每次变换。
      en: The instance has stable activity ID, target, rule, method, non-secret result, and time, enabling independent audit of the transformation.
      ja: 安定した活動 ID、対象、規則、方法、非秘密結果、時刻を持ち、各変換を独立監査できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-redaction-009
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Redaction-is_a-DisclosureControlActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种披露控制活动
    en: is a kind of disclosure-control activity
    ja: 開示制御活動の一種
  definitions:
    zh: 每个 Redaction 都是 DisclosureControlActivity，其种差是在信息跨越披露边界前，对已识别的 SensitiveSpan 执行删除、掩码、令牌化或语义替换，同时保留允许披露的其余内容；加密存储或整项抑制不属于 Redaction。
    en: Every Redaction is a DisclosureControlActivity, distinguished by deleting, masking, tokenizing, or semantically replacing identified SensitiveSpan instances before boundary crossing while retaining permitted remainder; storage encryption and whole-item suppression are not Redaction.
    ja: すべての Redaction は DisclosureControlActivity であり、開示境界を越える前に特定済み SensitiveSpan を削除、mask、tokenize、意味置換し、公開可能な残部を保持する点を種差とします。保存時暗号化と項目全体抑制は Redaction ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：具有下位类
      en: has subtype
      ja: 逆方向：下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Redaction-is_a-DisclosureControlActivity-example-positive-001
      kind: positive
      labels:
        zh: 付款卡号令牌化
        en: Payment-card tokenization
        ja: 支払カード番号の tokenization
      scenario_id: null
      descriptions:
        zh: rd_24 在外发答复前把已定位的付款卡号 span 替换为不可逆显示令牌，其他订单说明保持可读。
        en: Before an outbound response, rd_24 replaces the located payment-card span with a non-reversible display token while leaving the remaining order explanation readable.
        ja: 外向き応答前に rd_24 は特定済み支払カード span を不可逆表示 token に置換し、残りの注文説明を可読のまま保ちます。
      field_values: {}
      related_node_ids:
        - Redaction
        - DisclosureControlActivity
      related_relation_ids:
        - Redaction-is_a-DisclosureControlActivity
      expected_result:
        zh: rd_24 分类为 Redaction，并继承 DisclosureControlActivity。
        en: Classify rd_24 as Redaction and inherit DisclosureControlActivity.
        ja: rd_24 を Redaction に分類し、DisclosureControlActivity を継承させます。
      why_valid_or_invalid:
        zh: 活动针对具体敏感片段做披露前变换，并保留非敏感内容。
        en: The activity transforms a concrete sensitive span before disclosure and preserves non-sensitive content.
        ja: 活動は具体的機微 span を開示前に変換し、非機微 content を保持します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-redaction-010
    - id: Redaction-is_a-DisclosureControlActivity-example-boundary-001
      kind: boundary
      labels:
        zh: 整项抑制边界
        en: Whole-item suppression boundary
        ja: 項目全体抑制の境界
      scenario_id: null
      descriptions:
        zh: 控制器判定整个候选答复不可披露并完全丢弃它，没有定位或变换任何片段。
        en: A controller deems the entire candidate non-disclosable and discards it without locating or transforming any span.
        ja: controller は候補全体を開示不可と判断して破棄し、span の特定も変換も行いません。
      field_values: {}
      related_node_ids:
        - Redaction
        - DisclosureControlActivity
        - DisclosureFilter
      related_relation_ids:
        - Redaction-is_a-DisclosureControlActivity
      expected_result:
        zh: 建模为 DisclosureFilter 的整项抑制结果，不分类为 Redaction。
        en: Model a whole-item suppression by DisclosureFilter, not Redaction.
        ja: DisclosureFilter による項目全体抑制として扱い、Redaction には分類しません。
      why_valid_or_invalid:
        zh: Redaction 必须存在可寻址目标片段和局部变换，二者在该案例中均缺失。
        en: Redaction requires an addressable target span and a local transformation; both are absent.
        ja: Redaction には addressable target span と局部変換が必要ですが、いずれもありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-redaction-010
  source_claims:
    - claim-redaction-010
  distinct_fact_rationale:
    zh: 这是 Redaction 的真实 genus 边和唯一分类父链。
    en: This is Redaction's genuine genus edge and sole taxonomy parent.
    ja: Redaction の実在 genus 辺で、唯一の分類親です。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: Redaction-governed_by-RedactionRule
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 脱敏处置受脱敏规则治理
      en: redaction governed by redaction rule
      ja: 秘匿化処理が規則に統治される
    definitions:
      zh: 一次 Redaction 活动通过 governed_by 指向实际决定其敏感选择器、替换方法与证据要求的一个 RedactionRule 修订；该边不把活动与规范合并，也不证明目标片段已经成功变换。
      en: One Redaction activity points through governed_by to the single RedactionRule revision that determines its sensitivity selector, replacement method, and evidence requirements. The edge neither merges activity with specification nor proves successful transformation of the target span.
      ja: 一回の Redaction 活動が governed_by で、sensitivity selector、置換方法、証拠要件を決めた一つの RedactionRule revision を指します。活動と仕様を統合せず、対象 span の変換成功も証明しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每次 Redaction 恰有一个治理规则的基数由 Redaction 结构约束声明。
      en: Redaction's structural constraint declares exactly one governing rule per activity.
      ja: 各 Redaction が一つの統治規則を持つ基数は Redaction の構造制約で宣言します。
    inverse_reading:
      predicate: governs
      labels:
        zh: 反向：治理脱敏处置
        en: governs redaction activity
        ja: 逆方向：秘匿化処理を統治
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: Redaction-governed_by-RedactionRule-example-positive-001
        kind: positive
        labels:
          zh: 脱敏规则治理正例
          en: Positive redaction governance
          ja: 秘匿化統治の正例
        scenario_id: null
        descriptions:
          zh: Redaction r_12 的运行记录绑定 rr-mask-credential-external@disclosure/customer-output@3.2.0，并使用其 mask 方法和替换模板。
          en: Redaction r_12 binds rr-mask-credential-external in disclosure/customer-output@3.2.0 and uses its mask method and replacement template.
          ja: Redaction r_12 は disclosure/customer-output@3.2.0 の rr-mask-credential-external を結び、その mask 方法と置換 template を使います。
        field_values: {}
        related_node_ids:
          - Redaction
          - RedactionRule
        related_relation_ids:
          - Redaction-governed_by-RedactionRule
        expected_result:
          zh: 建立 r_12 governed_by 该确定规则修订。
          en: Assert that r_12 is governed by the exact rule revision.
          ja: r_12 が当該正確な規則 revision に governed_by されると記録します。
        why_valid_or_invalid:
          zh: 运行记录绑定规则 ID、所属规范版本及实际采用的方法。
          en: The runtime record binds rule ID, owning specification revision, and applied method.
          ja: runtime record が規則 ID、所有仕様版、適用方法を結びます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-redaction-011
      - id: Redaction-governed_by-RedactionRule-example-boundary-001
        kind: boundary
        labels:
          zh: 脱敏规则治理边界例
          en: Boundary redaction governance
          ja: 秘匿化統治の境界例
        scenario_id: null
        descriptions:
          zh: 规则 rr-mask-credential-external 存在于注册表，但 r_13 的记录没有加载或版本绑定；仅共存不能建立 governed_by。
          en: Rule rr-mask-credential-external exists in the registry, but r_13 has no load or revision binding; coexistence alone does not establish governed_by.
          ja: rr-mask-credential-external が registry に存在しても、r_13 に load・revision binding がなく、共存だけでは governed_by を立てません。
        field_values: {}
        related_node_ids:
          - Redaction
          - RedactionRule
        related_relation_ids:
          - Redaction-governed_by-RedactionRule
        expected_result:
          zh: 不得断言 r_13 受该规则治理。
          en: Do not assert that r_13 is governed by that rule.
          ja: r_13 が当該規則に統治されると断言しません。
        why_valid_or_invalid:
