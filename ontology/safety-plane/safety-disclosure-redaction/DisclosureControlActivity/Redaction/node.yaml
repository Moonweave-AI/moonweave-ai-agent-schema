schema: moonweave.ai/ontology-node/v1
id: Redaction
kind: concept
labels:
  zh: 脱敏活动
  en: redaction activity
  ja: 墨消し活動
semantics:
  short_definition:
    zh: 对 SensitiveSpan 应用 RedactionRule 算子的一次可审计变换运行。
    en: One auditable transform run applying RedactionRule operators to SensitiveSpan.
    ja: SensitiveSpan に RedactionRule operator を適用する一回の監査可能 transform run。
  definition:
    zh: Redaction 是 DisclosureControlActivity 的 transform 特化：调用 Presidio AnonymizerEngine.anonymize()、pattern-based masking 或 hash 算子，只改变 rule 命中跨度并保持其余内容与顺序。它映射 EntityRecognizer → Anonymizer pipeline 的执行步，不是 RedactionRule 规范或 SensitiveSpan 检测本身。
    en: "Redaction is a transform specialization of DisclosureControlActivity: it invokes Presidio AnonymizerEngine.anonymize(), pattern-based masking, or hash operators, changing only rule-matched spans while preserving other content and order. It maps the execution step of EntityRecognizer → Anonymizer pipeline, not RedactionRule specification or SensitiveSpan detection itself."
    ja: Redaction は DisclosureControlActivity の transform 特化で Presidio AnonymizerEngine.anonymize()/pattern-based masking/hash operator を invoke し rule hit span のみ変更して他 content/order 保持。EntityRecognizer→Anonymizer pipeline 実行 step を写像。RedactionRule 仕様/SensitiveSpan detection 自体ではない。
  why_needed:
    zh: 将“如何 mask/replace”的执行与规则规范分离，才能审计 da_91 使用了哪版 rr_cred_replace 算子，并验证 prefix/suffix digest 未变。
    en: Separating "how to mask/replace" execution from rule specs audits which rr_cred_replace version da_91 used and verifies prefix/suffix digests unchanged.
    ja: 「如何 mask/replace」実行を rule spec から分離すると da_91 がどの rr_cred_replace version を使ったか監査し prefix/suffix digest 不変を検証できます。
  includes:
    - zh: 含 changed_range、replacement、prefix_digest、suffix_digest 与 governed_by RedactionRule。
      en: Includes changed_range, replacement, prefix_digest, suffix_digest, and governed_by RedactionRule.
      ja: changed_range/replacement/prefix_digest/suffix_digest/governed_by RedactionRule を含む。
  excludes:
    - zh: 不包含 AnalyzerEngine 检测运行、DisclosureSpecification、ingress DisclosureFilter 或 ProgressiveDisclosure stage 计划。
      en: Excludes AnalyzerEngine detection run, DisclosureSpecification, ingress DisclosureFilter, or ProgressiveDisclosure stage plan.
      ja: AnalyzerEngine detection run/DisclosureSpecification/ingress DisclosureFilter/ProgressiveDisclosure stage plan は含まない。
  semantic_kind: activity
  aliases: []
engineering:
  explanation:
    zh: 集成：`anonymizer.anonymize(text, analyzer_results, operators)` → Redaction da_N；必须记录 changed_range、replacement、unchanged_region_order_preserved=true；OCR 前后 offset 版本不可混用。
    en: "Integration: anonymizer.anonymize(text, analyzer_results, operators) → Redaction da_N; must record changed_range, replacement, unchanged_region_order_preserved=true; pre/post-OCR offset versions cannot mix."
    ja: 統合：anonymizer.anonymize(...) → Redaction da_N。changed_range/replacement/unchanged_region_order_preserved=true 記録必須。OCR 前後 offset version 混用不可。
  typical_input:
    - description: Presidio analyzer results plus text block.
      format: |
        text: fab_17
        analyzer_results: [RecognizerResult(CREDENTIAL, 128, 171, 0.94)]
        operators: {DEFAULT: replace [REDACTED_CREDENTIAL]}
      source_claims:
        - claim-redaction-presidio
  typical_output:
    - description: Redaction activity with preserved digests.
      format: |
        disclosure_activity_id: da_91
        changed_range: 128..171
        replacement: "[REDACTED_CREDENTIAL]"
        prefix_digest: sha256:pre91
        suffix_digest: sha256:suf91
      source_claims:
        - claim-redaction-design
  reference_implementations:
    - name: Microsoft Presidio Anonymizer
      url: https://microsoft.github.io/presidio/anonymizer/
      description: AnonymizerEngine mask, replace, redact, hash operators.
    - name: Google Cloud DLP de-identify
      url: https://cloud.google.com/sensitive-data-protection/docs/deidentify-sensitive-data
      description: Transformation de-identification API.
structure:
  identity_keys: []
  fields:
    - id: changed_range
      labels:
        zh: 变更范围
        en: changed range
        ja: 変更 range
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次 Redaction 修改的 start/end offset 或 path 范围。
        en: start/end offset or path range modified by this Redaction.
        ja: 本 Redaction が変更した start/end offset または path range。
      allowed_values: []
      pattern: null
      example_value:
        start: 128
        end: 171
      source_claims:
        - claim-redaction-design
    - id: replacement
      labels:
        zh: 替换文本
        en: replacement text
        ja: 置換 text
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: replace/mask 算子产生的替换或遮蔽结果文本。
        en: Replacement or masked text produced by replace or mask operator.
        ja: replace/mask operator が生成した置換/遮蔽 result text。
      allowed_values: []
      pattern: null
      example_value: "[REDACTED_CREDENTIAL]"
      source_claims:
        - claim-redaction-presidio
  constraints:
    - id: redaction-only-matched-spans
      severity: error
      expression_language: plain
      expression: Redaction output MUST change only rule-matched spans and preserve order and source mapping for all other regions
      explanations:
        zh: 脱敏输出只能改变规则命中跨度。
        en: Redaction output may change only rule-matched spans.
        ja: 墨消し output は rule hit span のみ変更可。
      source_claims:
        - claim-redaction-design
  required_relation_constraints: []
examples:
  - id: Redaction-presidio-credential
    labels:
      zh: Presidio 凭据脱敏
      en: Presidio credential redaction
      ja: Presidio credential 墨消し
    descriptions:
      zh: da_91 对 fab_17 128..171 API 密钥应用 dr_cred_external/rr_cred_replace，替换为 [REDACTED_CREDENTIAL]，prefix/suffix digest 不变。
      en: da_91 applies dr_cred_external/rr_cred_replace to fab_17 128..171 API key, replacing with [REDACTED_CREDENTIAL] while prefix/suffix digests unchanged.
      ja: da_91 が fab_17 128..171 API key に dr_cred_external/rr_cred_replace apply。[REDACTED_CREDENTIAL] 置換、prefix/suffix digest 不変。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/anonymizer/
      version: AnonymizerEngine
    field_values:
      disclosure_activity_id: da_91
      changed_range:
        start: 128
        end: 171
      replacement: "[REDACTED_CREDENTIAL]"
    related_node_ids:
      - Redaction
      - SensitiveSpan
      - RedactionRule
    related_relation_ids:
      - Redaction-governed_by-RedactionRule
    source_claims:
      - claim-redaction-presidio
  - id: Redaction-ssn-mask
    labels:
      zh: SSN 遮蔽脱敏
      en: SSN mask redaction
      ja: SSN mask 墨消し
    descriptions:
      zh: rr_ssn_mask 对 DetectPiiEntities 识别的 SSN span 应用 mask 算子，输出 ***-**-1234 形式占位。
      en: rr_ssn_mask applies mask operator to SSN span from DetectPiiEntities, outputting ***-**-1234 style placeholder.
      ja: rr_ssn_mask が DetectPiiEntities SSN span に mask apply。***-**-1234 形式 placeholder 出力。
    example_source:
      product: AWS Comprehend
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      version: DetectPiiEntities
    field_values:
      sensitivity_class: SSN
      disposition: mask
    related_node_ids:
      - Redaction
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-redaction-comprehend
  - id: Redaction-pattern-api-key
    labels:
      zh: 模式化 API 密钥脱敏
      en: Pattern-based API key redaction
      ja: pattern-based API key 墨消し
    descriptions:
      zh: rr_api_key_pattern 正则匹配 sk- 前缀密钥并 replace；补充 NER 未命中时的 pattern-based masking。
      en: rr_api_key_pattern regex matches sk- prefixed keys and replaces; pattern-based masking when NER misses.
      ja: rr_api_key_pattern が sk- prefix key を regex match/replace。NER miss 時 pattern-based masking。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/adding_recognizers/
      version: pattern recognizers
    field_values:
      redaction_rule_id: rr_api_key_pattern
      operator: replace
    related_node_ids:
      - Redaction
      - RedactionRule
    related_relation_ids: []
    source_claims:
      - claim-redaction-presidio
  - id: Redaction-filter-only-boundary
    labels:
      zh: 仅过滤非脱敏变换
      en: Filter-only is not redaction transform
      ja: filter-only は redaction transform ではない
    descriptions:
      zh: Anthropic suppress 整段移除无 Anonymizer operator；是 DisclosureFilter suppress 不是 Redaction replace/mask。
      en: Anthropic suppress removes whole paragraph without Anonymizer operator; this is DisclosureFilter suppress not Redaction replace/mask.
      ja: Anthropic suppress が段落全体 remove、Anonymizer operator なし。DisclosureFilter suppress で Redaction replace/mask ではない。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output filtering
    field_values:
      accepted: false
    related_node_ids:
      - Redaction
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-redaction-design
parent_relation:
  id: Redaction-is_a-DisclosureControlActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种披露控制活动
    en: is a disclosure control activity
    ja: 開示制御活動の一種
  definitions:
    zh: Redaction 是一种 DisclosureControlActivity，种差是对 SensitiveSpan 应用 RedactionRule 算子的 transform 执行。
    en: Redaction is a DisclosureControlActivity distinguished by transform execution applying RedactionRule operators to SensitiveSpan.
    ja: Redaction は SensitiveSpan に RedactionRule operator を apply する transform 実行を種差とする DisclosureControlActivity。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-redaction-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: Redaction-governed_by-RedactionRule
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受脱敏规则治理
      en: governed by redaction rule
      ja: 墨消し rule により governed
    definitions:
      zh: Redaction 活动必须 governed_by 一条实际应用的 RedactionRule 版本，记录 operator 与参数。
      en: Redaction activity must be governed_by one actually applied RedactionRule revision recording operator and parameters.
      ja: Redaction activity は actually applied RedactionRule revision 一つに governed_by し operator/参数を記録必須。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次 Redaction 应用一条 RedactionRule。
      en: One Redaction applies one RedactionRule.
      ja: 一 Redaction は一 RedactionRule apply。
    inverse_reading:
      predicate: governs
      labels:
        zh: 治理脱敏活动
        en: governs redaction activity
        ja: 墨消し activity を govern
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-redaction-presidio
    distinct_fact_rationale:
      zh: Redaction 执行不能从 DisclosureRule disposition  alone 推出具体算子。
      en: Redaction execution cannot be inferred from DisclosureRule disposition alone.
      ja: Redaction 実行は DisclosureRule disposition だけから具体 operator は導けない。
    layout_role: cross-link
    target: concept:RedactionRule
sources:
  - id: presidio-docs
    title: Microsoft Presidio
    url: https://microsoft.github.io/presidio/anonymizer/
    source_type: official-doc
    relevance: AnonymizerEngine EntityRecognizer to Anonymizer pipeline execution.
  - id: aws-comprehend-pii
    title: AWS Comprehend PII Detection
    url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
    source_type: official-doc
    relevance: PII spans input to mask redaction operators.
  - id: safety-disclosure-design
    title: Moonweave safety-disclosure-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Redaction as transform activity governed_by RedactionRule.
source_claims:
  - id: claim-redaction-presidio
    source: presidio-docs
    supports: Presidio AnonymizerEngine.anonymize execution maps to Redaction activity with changed_range and replacement evidence.
    locator: AnonymizerEngine
    evidence_kind: official
    confidence: high
  - id: claim-redaction-comprehend
    source: aws-comprehend-pii
    supports: Comprehend PII spans feed mask Redaction activities with placeholder output.
    locator: DetectPiiEntities
    evidence_kind: official
    confidence: high
  - id: claim-redaction-design
    source: safety-disclosure-design
    supports: Moonweave requires Redaction to change only matched spans and bind governed_by RedactionRule operator version.
    locator: Redaction transform boundary
    evidence_kind: design-inference
    confidence: high
