source_claims:
  - id: claim-redaction-001
    source: eng-security-owasp-llm02-2025
    supports: OWASP explicitly recommends tokenization and redaction as sensitive-information mitigations. Moonweave models each concrete span transformation as the DisclosureControlActivity subtype Redaction.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-redaction-002
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends logging and monitoring security controls; applied_at timestamps one redaction occurrence for audit, a Moonweave representation choice.
    locator: MCP Security Design Considerations > Recommendations for data validation, least privilege, logging, and monitoring
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-redaction-003
    source: eng-security-owasp-llm02-2025
    supports: OWASP explicitly lists tokenization and redaction as sensitive-data mitigations; a replacement marker records the non-secret token used in output.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-redaction-004
    source: eng-security-owasp-llm02-2025
    supports: OWASP's sanitization recommendation grounds removal or masking of sensitive content while retaining only safe output; Moonweave requires the targeted span to remain traceable without retaining its secret value.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-redaction-005
    source: eng-security-owasp-llm02-2025
    supports: A redaction must identify the sensitive content it sanitizes; Moonweave requires an explicit Redaction targets SensitiveSpan fact for auditability.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-redaction-006
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends redaction and tokenization as controlled mitigations. Moonweave requires each concrete redaction to name the exact rule revision governing its transformation.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization, Tokenization, and Redaction
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-redaction-007
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends tokenization and redaction to prevent sensitive-information disclosure; this case applies that control to one identified credential span.
