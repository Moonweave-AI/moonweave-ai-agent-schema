schema: moonweave.ai/ontology-node/v1
id: RedactionRule
kind: concept
labels:
  zh: 脱敏规则
  en: redaction rule
  ja: 墨消し rule
semantics:
  short_definition:
    zh: DisclosureRule 下定义具体遮蔽/替换算子与参数的可执行规则。
    en: An executable rule under DisclosureRule defining concrete mask/replace operators and parameters.
    ja: DisclosureRule 下で具体 mask/replace operator と参数を定義する executable rule。
  definition:
    zh: "RedactionRule 是 DisclosureRule 的操作特化，指定 Presidio AnonymizerEngine OperatorConfig（mask、replace、redact、hash）、pattern-based 正则替换或 hash 盐参数。它映射 operators={DEFAULT: OperatorConfig(replace, {new_value: [REDACTED]})} 等配置；不是 Redaction 活动实例或 SensitiveSpan。Redaction 活动 governed_by RedactionRule。"
    en: "RedactionRule is an operator specialization under DisclosureRule specifying Presidio AnonymizerEngine OperatorConfig (mask, replace, redact, hash), pattern-based regex replacement, or hash salt parameters. It maps configurations such as operators={\"DEFAULT\": OperatorConfig(\"replace\", {\"new_value\": \"[REDACTED]\"})}; it is not a Redaction activity instance or SensitiveSpan. Redaction activities are governed_by RedactionRule."
    ja: "RedactionRule は DisclosureRule 下 operator 特化で Presidio AnonymizerEngine OperatorConfig（mask/replace/redact/hash）、pattern-based regex replace、hash salt 参数を指定。operators={DEFAULT: OperatorConfig(replace, {new_value: [REDACTED]})} 等を写像。Redaction activity instance/SensitiveSpan ではない。Redaction activity は RedactionRule に governed_by。"
  why_needed:
    zh: 将“对谁允许何种 disposition”与“具体如何 mask/replace”分离，才能在 Presidio 升级算子时不改变 audience 策略，并审计每次 transform 使用的 operator 版本。
    en: Separating "what disposition is allowed for whom" from "how to mask/replace" lets Presidio operator upgrades occur without changing audience policy and audits which operator version each transform used.
    ja: 「誰にどの disposition を許可」と「如何に mask/replace」を分離すると Presidio operator upgrade 時も audience policy を変えず各 transform の operator version を監査できます。
  includes:
    - zh: 含 operator 类型、replacement/mask 参数、hash salt、pattern 模板与 RedactionRule ID 版本。
      en: Includes operator type, replacement or mask parameters, hash salt, pattern template, and RedactionRule ID version.
      ja: operator type/replacement/mask 参数/hash salt/pattern template/RedactionRule ID version を含む。
  excludes:
    - zh: 不包含源坐标、检测 score、一次 DisclosureActivity 输出或 ProgressiveDisclosure 阶段。
      en: Excludes source coordinates, detection score, one DisclosureActivity output, or ProgressiveDisclosure stage.
      ja: source 座標/detection score/一回 DisclosureActivity output/ProgressiveDisclosure stage は含まない。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: "集成：rr_cred_mask → OperatorConfig(replace, {new_value: [REDACTED_CREDENTIAL]})；rr_ssn_mask → OperatorConfig(mask, {masking_char: *, chars_to_mask: 4})；rr_email_hash → OperatorConfig(hash, {hash_type: sha256})。Redaction 活动必须 governed_by 一条 RedactionRule 并保留 operator_ref。"
    en: "Integration: rr_cred_mask → OperatorConfig(\"replace\", {\"new_value\": \"[REDACTED_CREDENTIAL]\"}); rr_ssn_mask → OperatorConfig(\"mask\", {\"masking_char\": \"*\", \"chars_to_mask\": 4}); rr_email_hash → OperatorConfig(\"hash\", {\"hash_type\": \"sha256\"}). Redaction activities must be governed_by one RedactionRule and retain operator_ref."
    ja: 統合：rr_cred_mask → replace [REDACTED_CREDENTIAL]；rr_ssn_mask → mask *；rr_email_hash → hash sha256。Redaction activity は RedactionRule 一つに governed_by し operator_ref 保持必須。
  typical_input:
    - description: Presidio anonymizer operator for credentials.
      format: |
        redaction_rule_id: rr_cred_replace
        operator: replace
        new_value: "[REDACTED_CREDENTIAL]"
      source_claims:
        - claim-redaction-rule-presidio
  typical_output:
    - description: Operator config applied by Redaction activity.
      format: |
        redaction_rule_id: rr_cred_replace@2
        governed_by: dr_cred_external@4
      source_claims:
        - claim-redaction-rule-design
  reference_implementations:
    - name: Microsoft Presidio Anonymizer
      url: https://microsoft.github.io/presidio/anonymizer/
      description: OperatorConfig for mask, replace, redact, and hash operators.
    - name: Google Cloud DLP de-identify
      url: https://cloud.google.com/sensitive-data-protection/docs/deidentify-sensitive-data
      description: Transformation templates and infoType actions.
structure:
  identity_keys:
    - redaction_rule_id
  fields:
    - id: redaction_rule_id
      labels:
        zh: 脱敏规则标识
        en: redaction rule ID
        ja: 墨消し rule ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条 RedactionRule 及其 operator 版本。
        en: Stably identifies one RedactionRule and its operator version.
        ja: 一 RedactionRule と operator version を安定識別。
      allowed_values: []
      pattern: null
      example_value: rr_cred_replace
      source_claims:
        - claim-redaction-rule-design
    - id: operator
      labels:
        zh: 算子类型
        en: operator type
        ja: operator 型
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: Presidio 风格算子：mask、replace、redact 或 hash。
        en: "Presidio-style operator: mask, replace, redact, or hash."
        ja: Presidio 風 operator：mask/replace/redact/hash。
      allowed_values:
        - mask
        - replace
        - redact
        - hash
      pattern: null
      example_value: replace
      source_claims:
        - claim-redaction-rule-presidio
    - id: operator_params
      labels:
        zh: 算子参数
        en: operator parameters
        ja: operator 参数
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 算子特定参数，如 new_value、masking_char、hash_type 或 pattern template。
        en: Operator-specific parameters such as new_value, masking_char, hash_type, or pattern template.
        ja: new_value/masking_char/hash_type/pattern template 等 operator 固有参数。
      allowed_values: []
      pattern: null
      example_value:
        new_value: "[REDACTED_CREDENTIAL]"
      source_claims:
        - claim-redaction-rule-presidio
  constraints: []
  required_relation_constraints: []
examples:
  - id: RedactionRule-credential-replace
    labels:
      zh: 凭据替换算子
      en: Credential replace operator
      ja: credential replace operator
    descriptions:
      zh: rr_cred_replace 使用 Presidio replace 算子将 CREDENTIAL span 替换为 [REDACTED_CREDENTIAL]。
      en: rr_cred_replace uses Presidio replace operator to substitute CREDENTIAL spans with [REDACTED_CREDENTIAL].
      ja: rr_cred_replace が Presidio replace で CREDENTIAL span を [REDACTED_CREDENTIAL] に置換。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/anonymizer/
      version: replace operator
    field_values:
      redaction_rule_id: rr_cred_replace
      operator: replace
    related_node_ids:
      - RedactionRule
      - DisclosureRule
      - Redaction
    related_relation_ids:
      - Redaction-governed_by-RedactionRule
    source_claims:
      - claim-redaction-rule-presidio
  - id: RedactionRule-ssn-mask
    labels:
      zh: SSN 遮蔽算子
      en: SSN mask operator
      ja: SSN mask operator
    descriptions:
      zh: rr_ssn_mask 对 SSN SensitiveSpan 保留末四位，其余 masking_char=*。
      en: rr_ssn_mask keeps last four digits of SSN SensitiveSpan and masks remainder with masking_char=*.
      ja: rr_ssn_mask が SSN SensitiveSpan の下四桁保持、残り masking_char=*。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/anonymizer/
      version: mask operator
    field_values:
      redaction_rule_id: rr_ssn_mask
      operator: mask
      operator_params:
        chars_to_mask: 5
        masking_char: "*"
    related_node_ids:
      - RedactionRule
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-redaction-rule-presidio
  - id: RedactionRule-pattern-api-key
    labels:
      zh: 模式化 API 密钥脱敏
      en: Pattern-based API key redaction
      ja: pattern-based API key 墨消し
    descriptions:
      zh: "rr_api_key_pattern 使用正则 sk-[A-Za-z0-9]{20,} 匹配并 replace 为 [REDACTED_KEY]，补充 NER 未命中情况。"
      en: "rr_api_key_pattern uses regex sk-[A-Za-z0-9]{20,} to match and replace with [REDACTED_KEY], supplementing NER misses."
      ja: "rr_api_key_pattern が regex sk-[A-Za-z0-9]{20,} で match/replace [REDACTED_KEY]。NER miss 補完。"
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/adding_recognizers/
      version: pattern recognizers
    field_values:
      redaction_rule_id: rr_api_key_pattern
      operator: replace
    related_node_ids:
      - RedactionRule
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-redaction-rule-presidio
  - id: RedactionRule-hash-email
    labels:
      zh: 邮箱哈希算子
      en: Email hash operator
      ja: email hash operator
    descriptions:
      zh: rr_email_hash 对 audit-log 受众使用 hash 算子保留可关联性而不暴露明文邮箱。
      en: rr_email_hash uses hash operator for audit-log audience preserving correlatability without exposing plaintext email.
      ja: rr_email_hash が audit-log audience 向け hash operator で correlatability 保持し plaintext email 非開示。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/anonymizer/
      version: hash operator
    field_values:
      redaction_rule_id: rr_email_hash
      operator: hash
    related_node_ids:
      - RedactionRule
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-redaction-rule-presidio
parent_relation:
  id: RedactionRule-part_of-DisclosureRule
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 属于披露规则
    en: part of disclosure rule
    ja: 開示 rule の一部
  definitions:
    zh: RedactionRule 是 DisclosureRule 的可执行 operator 组成部分。
    en: RedactionRule is the executable operator component of DisclosureRule.
    ja: RedactionRule は DisclosureRule の executable operator 構成部分。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一条 DisclosureRule 可引用零或一条 RedactionRule。
    en: One DisclosureRule may reference zero or one RedactionRule.
    ja: 一 DisclosureRule は零または一 RedactionRule 参照可。
  inverse_reading:
    predicate: contains
    labels:
      zh: 包含脱敏规则
      en: contains redaction rule
      ja: 墨消し rule を含む
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-redaction-rule-design
  distinct_fact_rationale:
    zh: 算子规范与 Redaction 活动执行不可合并。
    en: Operator specification cannot merge with Redaction activity execution.
    ja: operator specification と Redaction activity 実行は統合不可。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
