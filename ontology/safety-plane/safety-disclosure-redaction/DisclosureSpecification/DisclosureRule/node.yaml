schema: moonweave.ai/ontology-node/v1
id: DisclosureRule
kind: concept
labels:
  zh: 披露规则
  en: disclosure rule
  ja: 開示 rule
semantics:
  short_definition:
    zh: 针对特定受众与敏感类别的可复用披露处置规则。
    en: A reusable disclosure disposition rule for a specific audience and sensitivity class.
    ja: 特定 audience と機微 class 向け reusable 開示 disposition rule。
  definition:
    zh: DisclosureRule 是 DisclosureSpecification 下的规则节点，定义 audience_class、sensitivity_class 匹配条件、disposition（mask/replace/suppress/allow）、operator 参数与可选 RedactionRule 引用。它映射 Presidio 对 CREDENTIAL/PII entity 的处置策略、Anthropic output filter policy 或 DLP infoType action；不是 SensitiveSpan 检测实例或 DisclosureControlActivity 执行记录。
    en: "DisclosureRule is a rule node under DisclosureSpecification defining audience_class, sensitivity_class match conditions, disposition (mask/replace/suppress/allow), operator parameters, and optional RedactionRule reference. It maps Presidio disposition policies for CREDENTIAL/PII entities, Anthropic output filter policy, or DLP infoType actions; it is not a SensitiveSpan detection instance or DisclosureControlActivity execution record."
    ja: DisclosureRule は DisclosureSpecification 下 rule node で audience_class/sensitivity_class 一致条件/disposition（mask/replace/suppress/allow）/operator 参数/任意 RedactionRule 参照を定義。Presidio CREDENTIAL/PII disposition/Anthropic output filter/DLP infoType action を写像。SensitiveSpan detection instance/DisclosureControlActivity 実行 record ではない。
  why_needed:
    zh: 规则与活动分离后，同一 DisclosureRule 可审计地应用于多次 DisclosureActivity，并能解释为何 external-customer 看到 [REDACTED] 而 internal-operator 看到原文。
    en: Separating rules from activities lets one DisclosureRule apply audibly across many DisclosureActivities and explains why external-customer sees [REDACTED] while internal-operator sees plaintext.
    ja: rule/activity 分離後、同一 DisclosureRule を複数 DisclosureActivity に監査可能適用でき、external-customer が [REDACTED]、internal-operator が plaintext を見る理由を説明できます。
  includes:
    - zh: 含受众绑定、敏感类别 selector、默认/条件 disposition 与 RedactionRule 链接。
      en: Includes audience binding, sensitivity-class selector, default or conditional disposition, and RedactionRule link.
      ja: audience binding/sensitivity class selector/default/conditional disposition/RedactionRule link を含む。
  excludes:
    - zh: 不包含检测分数、源坐标、一次 transform 输出或 ProgressiveDisclosure 阶段实例。
      en: Excludes detection scores, source coordinates, one-time transform output, or ProgressiveDisclosure stage instance.
      ja: detection score/source 座標/一回 transform output/ProgressiveDisclosure stage instance は含まない。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 集成：dr_cred_external 匹配 sensitivity_class=credential + audience=external-customer → replace [REDACTED_CREDENTIAL]；dr_pii_external 匹配 PERSON/SSN → mask。DisclosureActivity 必须 applies 恰好一条 applicable DisclosureRule 版本。
    en: "Integration: dr_cred_external matches sensitivity_class=credential + audience=external-customer → replace [REDACTED_CREDENTIAL]; dr_pii_external matches PERSON/SSN → mask. DisclosureActivity must apply exactly one applicable DisclosureRule revision."
    ja: 統合：dr_cred_external が credential+external-customer → replace [REDACTED_CREDENTIAL]；dr_pii_external が PERSON/SSN → mask。DisclosureActivity は applicable DisclosureRule revision を exactly 一つ applies 必須。
  typical_input:
    - description: Rule definition for external credential masking.
      format: |
        disclosure_rule_id: dr_cred_external
        audience_class: external-customer
        sensitivity_class: credential
        disposition: replace
      source_claims:
        - claim-disclosure-rule-presidio
  typical_output:
    - description: Rule referenced by DisclosureActivity.
      format: |
        disclosure_rule_id: dr_cred_external@4
        operator: replace
        replacement: "[REDACTED_CREDENTIAL]"
      source_claims:
        - claim-disclosure-rule-design
  reference_implementations:
    - name: Microsoft Presidio
      url: https://microsoft.github.io/presidio/
      description: Entity-specific anonymizer operator configuration.
    - name: Anthropic API
      url: https://docs.anthropic.com/en/api/messages
      description: Output filtering policy dispositions.
    - name: AWS Comprehend PII
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      description: PII entity types driving rule selectors.
structure:
  identity_keys:
    - disclosure_rule_id
  fields:
    - id: disclosure_rule_id
      labels:
        zh: 披露规则标识
        en: disclosure rule ID
        ja: 開示 rule ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条 DisclosureRule 及其版本修订。
        en: Stably identifies one DisclosureRule and its revision.
        ja: 一 DisclosureRule と revision を安定識別。
      allowed_values: []
      pattern: null
      example_value: dr_cred_external
      source_claims:
        - claim-disclosure-rule-design
    - id: audience_class
      labels:
        zh: 受众类别
        en: audience class
        ja: audience class
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规则适用的信任受众，如 external-customer、internal-operator、audit-log。
        en: Trust audience the rule applies to, such as external-customer, internal-operator, audit-log.
        ja: external-customer/internal-operator/audit-log 等 rule 適用 trust audience。
      allowed_values: []
      pattern: null
      example_value: external-customer
      source_claims:
        - claim-disclosure-rule-design
    - id: disposition
      labels:
        zh: 处置方式
        en: disposition
        ja: disposition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 命中 SensitiveSpan 时的 mask、replace、suppress 或 allow 动作。
        en: mask, replace, suppress, or allow action when SensitiveSpan matches.
        ja: SensitiveSpan 一致時の mask/replace/suppress/allow action。
      allowed_values:
        - mask
        - replace
        - suppress
        - allow
      pattern: null
      example_value: replace
      source_claims:
        - claim-disclosure-rule-presidio
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureRule-credential-external
    labels:
      zh: 外部凭据替换规则
      en: External credential replace rule
      ja: 外部 credential replace rule
    descriptions:
      zh: dr_cred_external 对 external-customer 匹配 CREDENTIAL SensitiveSpan，disposition=replace 为 [REDACTED_CREDENTIAL]。
      en: dr_cred_external matches CREDENTIAL SensitiveSpan for external-customer with disposition=replace to [REDACTED_CREDENTIAL].
      ja: dr_cred_external が external-customer 向け CREDENTIAL SensitiveSpan を replace [REDACTED_CREDENTIAL]。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/anonymizer/
      version: AnonymizerEngine operators
    field_values:
      disclosure_rule_id: dr_cred_external
      audience_class: external-customer
      disposition: replace
    related_node_ids:
      - DisclosureRule
      - SensitiveSpan
      - Redaction
    related_relation_ids: []
    source_claims:
      - claim-disclosure-rule-presidio
  - id: DisclosureRule-pii-mask
    labels:
      zh: PII 遮蔽规则
      en: PII mask rule
      ja: PII mask rule
    descriptions:
      zh: dr_pii_external 要求 NAME/SSN span mask 为占位符，保留 ticket ID 等非 PII 上下文。
      en: dr_pii_external requires NAME/SSN spans masked to placeholders while retaining non-PII context such as ticket ID.
      ja: dr_pii_external が NAME/SSN span を placeholder mask、ticket ID 等非 PII context 保持。
    example_source:
      product: AWS Comprehend
      url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
      version: DetectPiiEntities
    field_values:
      disclosure_rule_id: dr_pii_external
      sensitivity_class: pii
      disposition: mask
    related_node_ids:
      - DisclosureRule
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-disclosure-rule-comprehend
  - id: DisclosureRule-anthropic-suppress
    labels:
      zh: Anthropic 抑制规则
      en: Anthropic suppress rule
      ja: Anthropic suppress rule
    descriptions:
      zh: dr_runbook_cred 对 internal-runbook credential 段落 disposition=suppress，供 Anthropic output filter 映射。
      en: dr_runbook_cred sets disposition=suppress for internal-runbook credential paragraphs mapped from Anthropic output filter.
      ja: dr_runbook_cred が internal-runbook credential 段落を suppress。Anthropic output filter から mapping。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output filtering
    field_values:
      disclosure_rule_id: dr_runbook_cred
      disposition: suppress
    related_node_ids:
      - DisclosureRule
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-disclosure-rule-anthropic
  - id: DisclosureRule-audience-mismatch
    labels:
      zh: 受众不匹配拒绝
      en: Audience mismatch rejection
      ja: audience mismatch 拒否
    descriptions:
      zh: dr_internal_only 不适用于 external-customer；DisclosureActivity 引用时必须拒绝并不得创建 SensitiveSpan 处置。
      en: dr_internal_only is inapplicable to external-customer; DisclosureActivity reference must be rejected without creating span disposition.
      ja: dr_internal_only は external-customer 不適用。DisclosureActivity 参照拒否、span disposition 作成不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: audience binding
    field_values:
      disclosure_rule_id: dr_internal_only
      audience_class: external-customer
      applicable: false
    related_node_ids:
      - DisclosureRule
      - DisclosureControlActivity
    related_relation_ids: []
    source_claims:
      - claim-disclosure-rule-design
parent_relation:
  id: DisclosureRule-part_of-DisclosureSpecification
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 属于披露规范
    en: part of disclosure specification
    ja: 開示仕様の一部
  definitions:
    zh: DisclosureRule 是 DisclosureSpecification 的组成部分；规范版本变更产生新 rule revision 引用。
    en: DisclosureRule is part of DisclosureSpecification; specification version changes produce new rule revision references.
    ja: DisclosureRule は DisclosureSpecification の構成部分。spec version 変更で新 rule revision 参照。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一条规范可含多条规则。
    en: One specification may contain many rules.
    ja: 一 spec に複数 rule 可。
  inverse_reading:
    predicate: contains
    labels:
      zh: 包含披露规则
      en: contains disclosure rule
      ja: 開示 rule を含む
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-disclosure-rule-design
  distinct_fact_rationale:
    zh: 规则规范身份与检测/活动身份不可合并。
    en: Rule specification identity cannot merge with detection or activity identity.
    ja: rule specification identity と detection/activity identity は統合不可。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: presidio-docs
    title: Microsoft Presidio
    url: https://microsoft.github.io/presidio/
    source_type: official-doc
    relevance: Entity-specific anonymizer operator rules.
  - id: anthropic-messages-api
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Output filter disposition policies.
  - id: aws-comprehend-pii
    title: AWS Comprehend PII Detection
    url: https://docs.aws.amazon.com/comprehend/latest/dg/how-pii.html
    source_type: official-doc
    relevance: PII entity types for rule selectors.
  - id: safety-disclosure-design
    title: Moonweave safety-disclosure-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: DisclosureRule audience and disposition separation from activities.
source_claims:
  - id: claim-disclosure-rule-presidio
    source: presidio-docs
    supports: Presidio anonymizer OperatorConfig per entity type maps to DisclosureRule disposition and replacement parameters.
    locator: Anonymizer operators
    evidence_kind: official
    confidence: high
  - id: claim-disclosure-rule-anthropic
    source: anthropic-messages-api
    supports: Anthropic output filtering supports suppress/replace dispositions mappable to DisclosureRule.
    locator: Messages API safety
    evidence_kind: official
    confidence: medium
  - id: claim-disclosure-rule-comprehend
    source: aws-comprehend-pii
    supports: Comprehend PII entity types drive sensitivity_class selectors in DisclosureRule.
    locator: DetectPiiEntities types
    evidence_kind: official
    confidence: high
  - id: claim-disclosure-rule-design
    source: safety-disclosure-design
    supports: Moonweave binds DisclosureRule to audience_class and requires DisclosureActivity to apply exactly one applicable revision.
    locator: DisclosureRule boundary
    evidence_kind: design-inference
    confidence: high
