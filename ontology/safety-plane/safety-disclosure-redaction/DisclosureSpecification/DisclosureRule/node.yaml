      - DisclosureSpecification-contains-DisclosureRule
      - SensitiveSpan
    example_source: Anthropic Constitutional AI
    source_claims:
      - claim-disclosure-rule-001
  - id: disclosure-rule-guardrails_ai
    labels:
      zh: 披露规则 - Guardrails AI Pydantic 验证
      en: disclosure rule - Guardrails AI Pydantic validation
      ja: 開示規則 - Guardrails AI Pydantic 検証
    descriptions: {zh: "披露规则(DisclosureRule) [DisclosureRule]: 规定哪些信息可向何种接收者披露以及应采取何种处理的规范。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；guard(llm_api=..., prompt=...) 配合 ToxicLanguage、ProfanityFree、ValidJSON 验证器。 Fields: disclosure_action, rule_id, specification_revision_ref.", en: "disclosure rule (DisclosureRule) [DisclosureRule]: A specification of what information may be disclosed to which recipients and under what handling.. Guardrails AI: Guard.from_pydantic(output_class=ValidOutput); guard(llm_api=openai.chat.completions.create, prompt=...) with ToxicLanguage, ProfanityFree, ValidJSON validators (github.com/guardrails-ai/guardrails). Fields include disclosure_action, rule_id, specification_revision_ref.", ja: "開示規則(DisclosureRule) [DisclosureRule]: どの情報をどの受信者へどの処理で開示できるかを定める仕様。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；ToxicLanguage/ProfanityFree/ValidJSON validator 付き guard。 Fields: disclosure_action, rule_id, specification_revision_ref."}
    field_values:
      condition_expression: "request.purpose == 'customer_support'"
      disclosure_action: redact
      rule_id: dr-credential-external
      specification_revision_ref: "disclosure/customer-output@3.2.0"
      valid_from: "2026-07-17T00:00:00Z"
    related_node_ids:
