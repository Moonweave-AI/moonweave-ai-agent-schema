schema: moonweave.ai/ontology-node/v1
id: DisclosureSpecification
kind: concept
status: review
labels:
  zh: 披露规范
  en: disclosure specification
  ja: 開示仕様
semantics:
  short_definition:
    zh: 汇集同一版本披露规则、默认处置与有效期的可复用规范。
    en: A reusable specification collecting one revision's disclosure rules, default handling, and validity interval.
    ja: 一つの版の開示規則、既定処理、有効期間をまとめる再利用可能な仕様。
  definition:
    zh: DisclosureSpecification 是可在任何过滤或脱敏运行之前发布的版本化规范，它由稳定标识、版本、发布主体、默认披露动作与有效期识别，并包含一组 DisclosureRule。它不执行披露控制，也不表示一次输出、一个敏感片段或某次活动采用规则的事实。
    en: DisclosureSpecification is a versioned specification publishable before any filtering or redaction run. It is identified by a stable ID, revision, issuer, default disclosure action, and validity interval and contains a set of DisclosureRule records. It neither performs disclosure control nor represents an output, a sensitive span, or the fact that one activity used a rule.
    ja: DisclosureSpecification は filtering・redaction 実行前に発行できる版管理仕様です。安定 ID、版、issuer、既定開示 action、有効期間で識別され、DisclosureRule 集合を含みます。開示制御を実行せず、出力、SensitiveSpan、ある活動が規則を使った事実でもありません。
  why_needed:
    zh: 独立规范根让规则拥有确定的版本边界与发布责任，使多个活动可复用同一修订，并防止某次运行反向决定规范的身份和层级。
    en: An independent specification root gives rules an exact revision boundary and issuer accountability, lets multiple activities reuse one revision, and prevents a runtime occurrence from determining the specification's identity or hierarchy.
    ja: 独立仕様 root により規則へ正確な版境界と発行責任を与え、複数活動が同じ revision を再利用でき、一回の runtime occurrence が仕様の同一性・階層を決めることを防ぎます。
  includes:
    - zh: 包含具有稳定 ID、不可变版本、发布主体、默认动作、有效期并通过 contains 关系拥有规则的披露规范。
      en: Includes disclosure specifications with stable ID, immutable revision, issuer, default action, validity interval, and rules owned through contains relations.
      ja: 安定 ID、不変 revision、issuer、既定 action、有効期間を持ち、contains 関係で規則を所有する開示仕様を含みます。
  excludes:
    - zh: 不包含单条 DisclosureRule、运行中的 DisclosureFilter 或 Redaction、一次策略决定以及没有版本边界的临时提示词。
      en: Excludes one DisclosureRule, a running DisclosureFilter or Redaction, one policy decision, and an ad hoc prompt without a revision boundary.
      ja: 単一 DisclosureRule、実行中 DisclosureFilter・Redaction、一回の policy decision、版境界のない即席 prompt を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - disclosure_specification_id
    - version
  fields:
    - id: disclosure_specification_id
      labels:
        zh: 披露规范标识
        en: disclosure specification ID
        ja: 開示仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨修订稳定标识同一披露规范系列，不复用规则或运行活动的标识。
        en: Stable identifier for one disclosure-specification series across revisions, distinct from rule and runtime-activity identifiers.
        ja: 複数 revision にまたがる同一開示仕様系列を安定識別し、規則・実行活動 ID を流用しません。
      allowed_values: []
      pattern: null
      example_value: disclosure/customer-output
      source_claims:
        - claim-disclosure-specification-002
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: 仕様版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定包含规则与默认动作的不可变修订，使历史活动可回溯到当时采用的精确规范。
        en: Immutable revision fixing the contained rules and default action so historical activities resolve to the exact specification used at the time.
        ja: 包含規則と既定 action を固定する不変 revision で、過去活動を当時使用した正確な仕様へ解決できます。
      allowed_values: []
      pattern: null
      example_value: 3.2.0
      source_claims:
        - claim-disclosure-specification-003
    - id: issuer_ref
      labels:
        zh: 发布主体引用
        en: issuer reference
        ja: 発行主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对该修订内容、适用边界和变更负责的治理主体，而不是某次运行的执行者。
        en: Reference to the governance principal accountable for this revision's content, applicability boundary, and changes, not the actor executing one run.
        ja: 当該 revision の内容、適用境界、変更へ責任を持つ governance principal を参照し、一回の実行者は指しません。
      allowed_values: []
      pattern: null
      example_value: authority://security-governance
      source_claims:
        - claim-disclosure-specification-004
    - id: default_action
      labels:
        zh: 默认披露动作
        en: default disclosure action
        ja: 既定開示 action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 当没有更具体规则匹配时采用的受控动作，只能是允许、抑制、脱敏或渐进披露之一。
        en: Controlled action used when no more specific rule matches, limited to allow, suppress, redact, or progressive disclosure.
        ja: より具体的な規則が一致しない場合の controlled action で、allow、suppress、redact、progressive disclosure に限定します。
      allowed_values: []
      pattern: null
      example_value: suppress
      source_claims:
        - claim-disclosure-specification-005
    - id: effective_from
      labels:
        zh: 生效时间
        en: effective from
        ja: 発効時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该规范修订开始可被控制活动采用的 UTC 时间，用于排除尚未生效的规则。
        en: UTC instant from which control activities may use this specification revision, excluding rules that are not yet effective.
        ja: 制御活動が当該仕様 revision を使用開始できる UTC 時刻で、未発効規則を除外します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T00:00:00Z
      source_claims:
        - claim-disclosure-specification-006
    - id: effective_until
      labels:
        zh: 失效时间
        en: effective until
        ja: 失効時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该修订停止适用的 UTC 时间；当前有效且未计划终止时为空。
        en: UTC instant when the revision stops applying; absent while currently effective with no scheduled end.
        ja: 当該 revision が適用停止する UTC 時刻で、現在有効かつ終了予定なしなら空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-disclosure-specification-007
  constraints:
    - id: disclosure-specification-revision-is-immutable-and-time-bounded
      severity: error
      expression_language: plain
      expression: disclosure_specification_id and version identify one immutable rule set; effective_until is null or effective_until >= effective_from
      explanations:
        zh: 同一 ID 与版本不得在发布后改变规则集合或默认动作，失效时间不得早于生效时间。
        en: One ID and version must not change its rule set or default action after publication, and its end cannot precede its start.
        ja: 同一 ID・版は発行後に規則集合・既定 action を変更できず、終了時刻は開始より前にできません。
      source_claims:
        - claim-disclosure-specification-008
  required_relation_constraints: []
examples:
  - id: DisclosureSpecification-example-positive-001
    kind: positive
    labels:
      zh: 披露规范正例
      en: Positive disclosure specification
      ja: 開示仕様の正例
    scenario_id: null
    descriptions:
      zh: 规范 disclosure/customer-output@3.2.0 由安全治理主体发布，默认抑制未匹配内容，并从 2026-07-17 起包含客户输出规则集。
      en: Specification disclosure/customer-output@3.2.0 is issued by security governance, defaults unmatched content to suppress, and contains the customer-output rule set from 2026-07-17.
      ja: 仕様 disclosure/customer-output@3.2.0 は security governance が発行し、未一致内容を既定 suppress とし、2026-07-17 から customer-output 規則集合を含みます。
    field_values:
      disclosure_specification_id: disclosure/customer-output
      version: 3.2.0
      issuer_ref: authority://security-governance
      default_action: suppress
      effective_from: 2026-07-17T00:00:00Z
      effective_until: null
    related_node_ids:
      - DisclosureSpecification
      - DisclosureRule
    related_relation_ids:
      - DisclosureSpecification-contains-DisclosureRule
    expected_result:
      zh: 识别为具有确定修订与规则所有权的 DisclosureSpecification。
      en: Classify it as a DisclosureSpecification with an exact revision and rule ownership.
      ja: 正確な revision と規則所有関係を持つ DisclosureSpecification と分類します。
    why_valid_or_invalid:
      zh: 该记录具有独立规范身份、版本、发布者、默认动作和生效边界。
      en: The record has independent specification identity, revision, issuer, default action, and effective boundary.
      ja: 独立仕様 identity、revision、issuer、既定 action、発効境界を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-specification-009
  - id: DisclosureSpecification-example-boundary-001
    kind: boundary
    labels:
      zh: 披露规范边界例
      en: Boundary disclosure specification
      ja: 開示仕様の境界例
    scenario_id: null
    descriptions:
      zh: 运行日志只写某次 Redaction 使用了规则 dr-17，没有规范 ID、版本或发布者；它是使用证据，不是 DisclosureSpecification。
      en: A runtime log only says one Redaction used rule dr-17 and has no specification ID, revision, or issuer; it is use evidence, not a DisclosureSpecification.
      ja: runtime log は一回の Redaction が dr-17 を使ったとだけ記し、仕様 ID・版・issuer がないため、使用証拠であって DisclosureSpecification ではありません。
    field_values: {}
    related_node_ids:
      - DisclosureSpecification
      - Redaction
      - RedactionRule
    related_relation_ids:
      - Redaction-governed_by-RedactionRule
    expected_result:
      zh: 不得把一次活动—规则使用日志归类为 DisclosureSpecification。
      en: Do not classify an activity-to-rule use log as DisclosureSpecification.
      ja: 活動―規則使用 log を DisclosureSpecification に分類しません。
    why_valid_or_invalid:
      zh: 记录缺少可复用规范的身份、不可变版本和治理发布边界。
      en: The record lacks reusable-specification identity, immutable revision, and governance publication boundary.
      ja: 再利用仕様 identity、不変 revision、governance 発行境界を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-specification-010
  - id: DisclosureSpecification-example-instance-001
    kind: instance
    labels:
      zh: 披露规范实例
      en: Disclosure specification instance
      ja: 開示仕様 instance
    scenario_id: null
    descriptions:
      zh: 生产环境固定使用 disclosure/customer-output@3.2.0，直到新修订经治理发布后才切换。
      en: Production pins disclosure/customer-output@3.2.0 until governance publishes a new revision.
      ja: production は governance が新 revision を発行するまで disclosure/customer-output@3.2.0 を固定使用します。
    field_values:
      disclosure_specification_id: disclosure/customer-output
      version: 3.2.0
      issuer_ref: authority://security-governance
      default_action: suppress
      effective_from: 2026-07-17T00:00:00Z
      effective_until: null
    related_node_ids:
      - DisclosureSpecification
    related_relation_ids: []
    expected_result:
      zh: 保留规范 ID 与版本组成的可重现身份。
      en: Preserve the reproducible identity formed by specification ID and revision.
      ja: 仕様 ID と revision から成る再現可能 identity を保持します。
    why_valid_or_invalid:
      zh: 实例完整给出当前有效修订而不把活动日志当成规范。
      en: The instance supplies the complete active revision without treating an activity log as the specification.
      ja: 活動 log を仕様扱いせず、現在有効な revision を完全に示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-disclosure-specification-011
