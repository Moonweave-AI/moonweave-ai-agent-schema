source_claims:
  - id: claim-disclosure-specification-001
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends sanitization, validation, and strict access controls for sensitive output. Moonweave represents the reusable, versioned rule package as DisclosureSpecification.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-002
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends explicit access controls and sanitization policy for sensitive output. Moonweave assigns the reusable policy package a stable identifier so its revisions can be audited.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-003
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends traceable configuration and exact security-control context. Moonweave versions the disclosure specification used by filtering and redaction activities.
    locator: MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-004
    source: eng-security-mcp-nsa-2026
    supports: NSA calls for explicit trust boundaries, authorization, and accountable security configuration. Moonweave records the issuer responsible for one disclosure-specification revision.
    locator: MCP Security Design Considerations > Recommendations > Design for boundaries and access control, pp. 9-10
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-005
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends sanitization and strict access control for sensitive output. Moonweave makes the no-match handling action explicit rather than assuming release.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-006
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends traceable security configuration and event timing. Moonweave records when one disclosure revision becomes eligible for enforcement.
    locator: MCP Security Design Considerations > Recommendations > Logging, monitoring, and traceable configuration, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-007
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends auditable lifecycle control for security configuration. Moonweave records an explicit end boundary without deleting historical revisions.
    locator: MCP Security Design Considerations > Recommendations > Logging, monitoring, and configuration lifecycle, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-008
    source: eng-security-mcp-nsa-2026
    supports: Traceable security decisions require stable configuration identity and effective-time boundaries. Moonweave therefore treats each published specification revision as immutable.
    locator: MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-009
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends sanitization and strict access control for sensitive output; Moonweave groups the reusable rules and default handling in a versioned specification.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Access Controls
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-010
    source: eng-security-mcp-nsa-2026
    supports: NSA distinguishes traceable runtime logging from the configuration and policy being applied. Moonweave does not turn one use event into a specification.
    locator: MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-disclosure-specification-011
    source: eng-security-mcp-nsa-2026
    supports: Traceable security control requires the exact configuration revision in force. Moonweave records the pinned disclosure specification revision.
    locator: MCP Security Design Considerations > Recommendations > Logging, monitoring, and traceable configuration, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: pending
