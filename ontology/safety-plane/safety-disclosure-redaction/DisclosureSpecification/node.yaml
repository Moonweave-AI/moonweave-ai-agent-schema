schema: moonweave.ai/ontology-node/v1
id: DisclosureSpecification
kind: concept
labels:
  zh: 披露规范
  en: disclosure specification
  ja: 開示仕様
semantics:
  short_definition:
    zh: 版本化披露规则集合的规范容器，定义默认处置与有效期。
    en: A versioned specification container for disclosure rules with default disposition and validity period.
    ja: デフォルト disposition と有効期間を持つ版管理開示 rule 集合の specification コンテナ。
  definition:
    zh: DisclosureSpecification 是 safety-disclosure-redaction 的规则规范根节点，拥有 disclosure_spec_id、version、default_disposition、valid_from/valid_until 与 DisclosureRule 子规则引用。它映射 Presidio 自定义 recognizer 配置集合、Anthropic usage policy 披露约束或企业 DLP infoType policy pack；不是一次 DisclosureControlActivity、SensitiveSpan 或输出窗口布局（后者归 info-output-disclosure）。
    en: "DisclosureSpecification is the rule-specification root in safety-disclosure-redaction with disclosure_spec_id, version, default_disposition, valid_from/valid_until, and DisclosureRule references. It maps Presidio custom recognizer configuration sets, Anthropic usage-policy disclosure constraints, or enterprise DLP infoType policy packs; it is not a DisclosureControlActivity, SensitiveSpan, or output-window layout (owned by info-output-disclosure)."
    ja: DisclosureSpecification は safety-disclosure-redaction の rule specification root で disclosure_spec_id/version/default_disposition/valid_from/valid_until/DisclosureRule 参照を持つ。Presidio custom recognizer 設定集合/Anthropic usage policy 開示制約/enterprise DLP infoType policy pack を写像。DisclosureControlActivity/SensitiveSpan/output window layout（info-output-disclosure）ではない。
  why_needed:
    zh: 没有版本化规范，Agent 无法回答“依据哪版 DisclosureRule、对谁允许到何种程度”；规则变更也无法与历史 DisclosureActivity 审计分离。
    en: Without a versioned specification, agents cannot explain which DisclosureRule revision applied to whom and to what degree; rule changes cannot be separated from historical DisclosureActivity audit.
    ja: versioned specification がなければどの DisclosureRule revision が誰にどこまで適用されたか説明できず、rule 変更を historical DisclosureActivity audit から分離できません。
  includes:
    - zh: 含 DisclosureRule、RedactionRule、默认 mask/replace/suppress 处置与 audience 绑定。
      en: Includes DisclosureRule, RedactionRule, default mask/replace/suppress disposition, and audience binding.
      ja: DisclosureRule/RedactionRule/default mask/replace/suppress disposition/audience binding を含む。
  excludes:
    - zh: 不包含单次检测运行、SensitiveSpan 实例、DisclosureActivity 执行记录或输出结构模板。
      en: Excludes a single detection run, SensitiveSpan instance, DisclosureActivity execution record, or output structure template.
      ja: 単一 detection run/SensitiveSpan instance/DisclosureActivity 実行 record/output structure template は含まない。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: 集成：Presidio `RecognizerRegistry` + 自定义 pattern → DisclosureSpecification vN；企业 external-customer policy pack → ds_external@4；DisclosureActivity 必须引用 applicable DisclosureRule 所属 spec version，不得用最新规则 retroactive 解释历史输出。
    en: "Integration: Presidio RecognizerRegistry + custom patterns → DisclosureSpecification vN; enterprise external-customer policy pack → ds_external@4; DisclosureActivity must reference applicable DisclosureRule spec version, not retroactively apply latest rules to historical output."
    ja: 統合：Presidio RecognizerRegistry+custom pattern → DisclosureSpecification vN；enterprise external-customer policy pack → ds_external@4。DisclosureActivity は applicable DisclosureRule spec version 参照必須。最新 rule で historical output を retroactive 解釈不可。
  typical_input:
    - description: Presidio analyzer configuration bundle.
      format: |
        disclosure_spec_id: ds_presidio_en@3
        recognizers: [EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, CUSTOM_API_KEY]
      source_claims:
        - claim-disclosure-spec-presidio
  typical_output:
    - description: Versioned spec referenced by DisclosureActivity.
      format: |
        disclosure_spec_id: ds_external@4
        default_disposition: mask
        valid_from: 2026-01-01T00:00:00Z
      source_claims:
        - claim-disclosure-spec-design
  reference_implementations:
    - name: Microsoft Presidio
      url: https://microsoft.github.io/presidio/
      description: Analyzer recognizer registry and custom pattern configuration.
    - name: Anthropic API — usage policies
      url: https://docs.anthropic.com/en/api/messages
      description: Output handling constraints under usage policies.
    - name: Google Cloud Sensitive Data Protection
      url: https://cloud.google.com/sensitive-data-protection/docs/deidentify-sensitive-data
      description: infoType policy packs for de-identification.
structure:
  identity_keys:
    - disclosure_spec_id
    - version
  fields:
    - id: disclosure_spec_id
      labels:
        zh: 披露规范标识
        en: disclosure specification ID
        ja: 開示仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份 DisclosureSpecification 系列。
        en: Stably identifies one DisclosureSpecification series.
        ja: 一 DisclosureSpecification 系列を安定識別。
      allowed_values: []
      pattern: null
      example_value: ds_external
      source_claims:
        - claim-disclosure-spec-design
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: 仕様 version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该规范修订的唯一版本号；规则变更必须 bump version。
        en: Unique revision number; rule changes must bump version.
        ja: 仕様 revision の一意 version 番号。rule 変更は version bump 必須。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-disclosure-spec-design
    - id: default_disposition
      labels:
        zh: 默认处置
        en: default disposition
        ja: デフォルト disposition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 无匹配 DisclosureRule 时的默认 mask、replace、suppress 或 allow。
        en: Default mask, replace, suppress, or allow when no DisclosureRule matches.
        ja: DisclosureRule 不一致時の default mask/replace/suppress/allow。
      allowed_values:
        - mask
        - replace
        - suppress
        - allow
      pattern: null
      example_value: mask
      source_claims:
        - claim-disclosure-spec-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: DisclosureSpecification-external-customer
    labels:
      zh: 外部客户披露规范
      en: External-customer disclosure spec
      ja: 外部顧客開示 spec
    descriptions:
      zh: ds_external@4 绑定 external-customer audience，默认 mask，含 dr_cred_external 与 dr_pii_external RedactionRule。
      en: ds_external@4 binds external-customer audience, default mask, includes dr_cred_external and dr_pii_external RedactionRules.
      ja: ds_external@4 が external-customer audience bind、default mask、dr_cred_external/dr_pii_external RedactionRule 含む。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: audience-specific spec
    field_values:
      disclosure_spec_id: ds_external
      version: "4"
      default_disposition: mask
    related_node_ids:
      - DisclosureSpecification
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-disclosure-spec-design
  - id: DisclosureSpecification-presidio-pack
    labels:
      zh: Presidio 识别器规范包
      en: Presidio recognizer spec pack
      ja: Presidio recognizer spec pack
    descriptions:
      zh: ds_presidio_en@3 注册 EMAIL_ADDRESS、PHONE_NUMBER、CREDIT_CARD 与 CUSTOM_API_KEY recognizer，供 AnalyzerEngine 与 DisclosureRule 引用。
      en: ds_presidio_en@3 registers EMAIL_ADDRESS, PHONE_NUMBER, CREDIT_CARD, and CUSTOM_API_KEY recognizers for AnalyzerEngine and DisclosureRule reference.
      ja: ds_presidio_en@3 が EMAIL_ADDRESS/PHONE_NUMBER/CREDIT_CARD/CUSTOM_API_KEY recognizer を登録。AnalyzerEngine/DisclosureRule 参照用。
    example_source:
      product: Microsoft Presidio
      url: https://microsoft.github.io/presidio/analyzer/adding_recognizers/
      version: custom recognizers
    field_values:
      disclosure_spec_id: ds_presidio_en
      version: "3"
    related_node_ids:
      - DisclosureSpecification
      - SensitiveSpan
    related_relation_ids: []
    source_claims:
      - claim-disclosure-spec-presidio
  - id: DisclosureSpecification-anthropic-policy
    labels:
      zh: Anthropic 输出策略规范
      en: Anthropic output policy spec
      ja: Anthropic output policy spec
    descriptions:
      zh: ds_anthropic_output@2 映射 usage policy 下 credential/runbook 段落的 suppress 默认处置，供 DisclosureFilter 引用。
      en: ds_anthropic_output@2 maps usage-policy suppress default for credential/runbook paragraphs referenced by DisclosureFilter.
      ja: ds_anthropic_output@2 が usage policy 下 credential/runbook 段落の suppress default を写像。DisclosureFilter 参照用。
    example_source:
      product: Anthropic
      url: https://docs.anthropic.com/en/api/messages
      version: output safety
    field_values:
      disclosure_spec_id: ds_anthropic_output
      version: "2"
      default_disposition: suppress
    related_node_ids:
      - DisclosureSpecification
      - DisclosureFilter
    related_relation_ids: []
    source_claims:
      - claim-disclosure-spec-anthropic
  - id: DisclosureSpecification-internal-only-boundary
    labels:
      zh: 内部规范不适用于外部受众
      en: Internal spec not for external audience
      ja: internal spec は external audience 不適用
    descriptions:
      zh: dr_internal_only 所属 ds_internal@1 不适用于 external-customer；DisclosureActivity 必须拒绝 audience 不匹配的规则引用。
      en: dr_internal_only in ds_internal@1 is inapplicable to external-customer; DisclosureActivity must reject audience-mismatched rule references.
      ja: ds_internal@1 の dr_internal_only は external-customer 不適用。DisclosureActivity は audience mismatch rule 参照拒否必須。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: audience binding
    field_values:
      audience_class: external-customer
      applicable: false
    related_node_ids:
      - DisclosureSpecification
      - DisclosureRule
    related_relation_ids: []
    source_claims:
      - claim-disclosure-spec-design
parent_relation: null
relations: []
sources:
  - id: presidio-docs
    title: Microsoft Presidio
    url: https://microsoft.github.io/presidio/
    source_type: official-doc
    relevance: Recognizer registry and custom pattern configuration packs.
  - id: anthropic-messages-api
    title: Anthropic Messages API
    url: https://docs.anthropic.com/en/api/messages
    source_type: official-doc
    relevance: Usage-policy output handling constraints.
  - id: google-cloud-dlp
    title: Google Cloud Sensitive Data Protection
    url: https://cloud.google.com/sensitive-data-protection/docs/deidentify-sensitive-data
    source_type: official-doc
    relevance: infoType policy packs for de-identification rules.
  - id: safety-disclosure-design
    title: Moonweave safety-disclosure-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Versioned DisclosureSpecification separating rules from activities.
source_claims:
  - id: claim-disclosure-spec-presidio
    source: presidio-docs
    supports: Presidio recognizer registry bundles map to versioned DisclosureSpecification with entity types and custom patterns.
    locator: Adding recognizers documentation
    evidence_kind: official
    confidence: high
  - id: claim-disclosure-spec-anthropic
    source: anthropic-messages-api
    supports: Anthropic usage policies support output disposition constraints mappable to DisclosureSpecification defaults.
    locator: Messages API safety
    evidence_kind: official
    confidence: medium
  - id: claim-disclosure-spec-design
    source: safety-disclosure-design
    supports: Moonweave versions DisclosureSpecification separately from DisclosureActivity and SensitiveSpan with audience binding.
    locator: DisclosureSpecification boundary
    evidence_kind: design-inference
    confidence: high
