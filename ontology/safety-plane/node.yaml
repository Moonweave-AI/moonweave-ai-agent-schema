schema: moonweave.ai/ontology-node/v1
id: safety-plane
kind: domain
status: accepted
labels:
  en: Trust, Policy & Safety Domain
  zh: 信任、策略与安全域
  ja: 信頼、ポリシー、安全ドメイン
semantics:
  short_definition:
    en: Operational concern domain for trust boundaries, authority scopes, permission prompts, policy decisions, sandboxing, network controls, injection defense, commit gates, redaction, and audit disclosure.
    zh: 信任、策略与安全域是运行关注域，描述信任边界、权限范围、权限提示、策略决策、沙箱、网络控制、注入防御、提交闸门、脱敏和审计披露。
    ja: 信頼、ポリシー、安全ドメインは運用関心ドメインで、信頼境界、権限範囲、権限プロンプト、ポリシー判断、サンドボックス、ネットワーク制御、注入防御、コミットゲート、秘匿化、監査開示を記述します。
  definition:
    en: Operational concern domain for trust boundaries, authority scopes, permission prompts, policy decisions, sandboxing, network controls, injection defense, commit gates, redaction, and audit disclosure.
    zh: 信任、策略与安全域是运行关注域，描述信任边界、权限范围、权限提示、策略决策、沙箱、网络控制、注入防御、提交闸门、脱敏和审计披露。
    ja: 信頼、ポリシー、安全ドメインは運用関心ドメインで、信頼境界、権限範囲、権限プロンプト、ポリシー判断、サンドボックス、ネットワーク制御、注入防御、コミットゲート、秘匿化、監査開示を記述します。
  why_needed:
    zh: 围绕信任边界、授权、隔离、网络、注入防御、提交和脱敏形成控制闭环。
    en: Closes the control loop across trust boundaries, authorization, isolation, networking, injection defense, commit, and redaction.
    ja: 信頼境界、認可、分離、ネットワーク、注入防御、コミット、墨消しにまたがる制御ループを閉じます。
  includes:
    - zh: "安全域负责信任边界与数据区（owner: safety-trust-boundary）以及授权与策略决策（owner: safety-permission-policy），先界定主体、资源和信任区，再计算允许、拒绝与约束。"
      en: "Safety owns Trust boundaries and data zones (owner: safety-trust-boundary) and Authorization and policy decisions (owner: safety-permission-policy), first delimiting actors, resources, and trust zones and then computing permissions, denials, and constraints."
      ja: "安全ドメインは信頼境界とデータゾーン（owner: safety-trust-boundary）および認可とポリシー判断（owner: safety-permission-policy）を所有し、主体・資源・信頼区を定めて許可・拒否・制約を算出します。"
    - zh: "安全域还负责副作用提交控制（owner: safety-commit-redaction），在外部状态真正改变前审查意图、批准范围、可回滚性和提交结果。"
      en: "Safety also owns Side-effect commit control (owner: safety-commit-redaction), reviewing intent, approved scope, rollback capability, and commit outcome before external state is actually changed."
      ja: "安全ドメインは副作用コミット制御（owner: safety-commit-redaction）も所有し、外部状態の実変更前に意図・承認範囲・ロールバック可能性・コミット結果を審査します。"
  excludes:
    - zh: "调用与执行（owner: tool-invocation-execution）属于工具域，因为它定义能力调用、参数和工具结果；安全域授权、限制或拒绝调用，但不复制工具执行语义。"
      en: "Invocation and execution (owner: tool-invocation-execution) belongs to Tool because it defines capability calls, arguments, and tool results; Safety authorizes, constrains, or denies a call without copying tool-execution semantics."
      ja: "呼び出しと実行（owner: tool-invocation-execution）は能力呼出・引数・ツール結果を定義するためツールドメインに属します。安全は呼出を認可・制限・拒否しますが実行意味を複製しません。"
    - zh: "输出披露（owner: info-output-disclosure）属于信息域，因为它组织已允许信息的解释与呈现；安全域决定哪些内容允许离开信任边界，但不拥有输出叙事结构。"
      en: "Output disclosure (owner: info-output-disclosure) belongs to Info because it organizes explanation and presentation of already-permitted information; Safety decides what may cross a trust boundary without owning the output narrative structure."
      ja: "出力開示（owner: info-output-disclosure）は許可済み情報の説明と提示を編成するため情報ドメインに属します。安全は信頼境界を越えられる内容を決めますが出力叙述構造を所有しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 围绕信任边界、授权、隔离、网络、注入防御、提交和脱敏形成控制闭环。
  en: Closes the control loop across trust boundaries, authorization, isolation, networking, injection defense, commit, and redaction.
  ja: 信頼境界、認可、分離、ネットワーク、注入防御、コミット、墨消しにまたがる制御ループを閉じます。
structure: null
examples:
  - id: safety-plane-example-positive-001
    kind: positive
    labels:
      zh: 受限网络写入的完整控制链
      en: A complete control chain for a restricted network write
      ja: 制限付き network write の完全な制御連鎖
    scenario_id: null
    descriptions:
      zh: remote-agent-6 请求把生成报告写入 partner.example。BoundaryCrossing crossing-61 从 internal-zone 进入 partner-zone；AuthorizationGrant grant-61 仅允许 HTTPS PUT 到 `/reports/approved/*`。InjectionDefense 先从响应模板中移除隐藏指令，NetworkPolicy 拒绝重定向到其他主机，sandbox-61 隔离临时文件。PermissionPrompt prompt-61 获得人工确认后，CommitGate gate-61 才批准一次 SideEffect；DisclosureFilter 在审计输出中遮蔽访问令牌。
      en: remote-agent-6 requests writing a generated report to partner.example. BoundaryCrossing crossing-61 moves from internal-zone to partner-zone, while AuthorizationGrant grant-61 permits only HTTPS PUT to /reports/approved/*. InjectionDefense removes a hidden instruction from the response template, NetworkPolicy rejects redirects to other hosts, and sandbox-61 isolates temporary files. After PermissionPrompt prompt-61 receives human confirmation, CommitGate gate-61 authorizes one SideEffect; DisclosureFilter masks the access token in audit output.
      ja: remote-agent-6 が生成報告を partner.example へ書き込むよう要求します。BoundaryCrossing crossing-61 は internal-zone から partner-zone へ移り、AuthorizationGrant grant-61 は `/reports/approved/*` への HTTPS PUT のみ許可します。InjectionDefense は response template の hidden instruction を除去し、NetworkPolicy は別 host への redirect を拒否、sandbox-61 は一時 file を隔離します。PermissionPrompt prompt-61 の人間確認後 CommitGate gate-61 が一つの SideEffect を許可し、DisclosureFilter が audit output の token を隠します。
    field_values:
      boundary_crossing_id: crossing-61
      source_zone: internal-zone
      target_zone: partner-zone
      authorization_grant_id: grant-61
      network_policy: HTTPS PUT partner.example/reports/approved/*
      sandbox_id: sandbox-61
      permission_prompt_id: prompt-61
      commit_gate_id: gate-61
      side_effect_count: 1
      redacted_field: access_token
    related_node_ids:
      - safety-plane
    related_relation_ids: []
    expected_result:
      zh: 审计查询能分别返回边界、授权、内容防御、网络限制、沙箱、人工许可、提交决定和披露控制，并证明实际副作用没有超出已批准范围。
      en: An audit query returns boundary, authorization, content defense, network restriction, sandbox, human permission, commit decision, and disclosure control separately and proves the observed effect stayed within the approved scope.
      ja: audit query は boundary・authorization・content defense・network restriction・sandbox・human permission・commit decision・disclosure control を別々に返し、実際の effect が承認範囲内だったと証明します。
    why_valid_or_invalid:
      zh: 该对象不是一条笼统“安全规则”，而是从信任区跨越到实际提交与脱敏的多阶段控制闭环；每项控制拥有独立输入、决定和证据。
      en: This is not one generic safety rule but a multi-stage control loop from trust-zone crossing through committed effect and redaction, with independent inputs, decisions, and evidence for each control.
      ja: 一つの汎用 safety rule ではなく trust-zone crossing から committed effect と redaction までの多段制御閉路で、各 control が独立 input・decision・evidence を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-plane-003
  - id: safety-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 输出分段本身不是安全披露决定
      en: Output segmentation alone is not a safety disclosure decision
      ja: output segmentation 自体は安全開示判断ではない
    scenario_id: null
    descriptions:
      zh: answer-73 被拆成 summary、evidence 和 appendix 三个 OutputInformation 片段，并附上 SourceReference；所有片段对同一接收者可见，记录中没有敏感性标签、DisclosureRule、DisclosureFilter、授权差异或抑制行为。
      en: answer-73 is segmented into summary, evidence, and appendix OutputInformation blocks with SourceReferences. Every block is visible to the same recipient, and the record contains no sensitivity label, DisclosureRule, DisclosureFilter, authorization difference, or suppression.
      ja: answer-73 は summary・evidence・appendix の OutputInformation block に分割され SourceReference が付きます。全 block は同一 recipient に見え、sensitivity label・DisclosureRule・DisclosureFilter・authorization difference・suppression はありません。
    field_values:
      output_id: answer-73
      segment_ids:
        - summary
        - evidence
        - appendix
      recipient_scope: same-for-all-segments
      sensitivity_label_present: false
      disclosure_rule_present: false
      suppressed_segment_count: 0
    related_node_ids:
      - safety-plane
      - info-plane
    related_relation_ids: []
    expected_result:
      zh: 把输出结构、片段和引用归入信息域；不得仅凭“披露给用户”这一自然语言表述创建安全披露或脱敏事实。
      en: Assign output structure, segments, and references to Info; do not create safety disclosure or redaction facts merely because the prose says the answer was disclosed to a user.
      ja: output structure・segment・reference は Info に置き、“user に disclosed”という表現だけで safety disclosure/redaction fact を作りません。
    why_valid_or_invalid:
      zh: 信息呈现回答“输出由什么构成”，安全披露回答“哪些信息因何种敏感性与策略可见或被抑制”；没有后者的判定证据就不属于安全域。
      en: Information presentation answers what output consists of; safety disclosure answers which information is visible or suppressed under sensitivity and policy. Without evidence of the latter decision, this is not Safety.
      ja: information presentation は output 構成を答え、safety disclosure は sensitivity/policy により何が visible/suppressed かを答えます。後者の判断証拠がなければ Safety ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-plane-004
