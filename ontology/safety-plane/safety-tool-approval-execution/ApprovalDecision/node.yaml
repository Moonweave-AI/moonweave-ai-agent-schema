schema: moonweave.ai/ontology-node/v1
id: ApprovalDecision
kind: concept
status: accepted
labels:
  zh: 批准决定
  en: Approval Decision
  ja: 承認決定
semantics:
  short_definition:
    zh: 对一次待审批工具调用作出的项目本地肯定决定记录。
    en: A project-local affirmative decision record for one pending tool call.
    ja: 一つの保留中ツール呼び出しに対する、プロジェクト固有の肯定的な決定記録。
  definition:
    zh: 批准决定是一条项目本地审计记录，表示审核者已批准一次待审批工具调用，且应用已解决相匹配的 SDK 中断。它不是 OpenAI SDK 对象、身份验证、资源授权授予或工具调用已成功的证明。
    en: Approval Decision is a project-local audit record that a reviewer approved one Pending Tool Call and the app resolved the matching SDK interruption. It is not an OpenAI SDK object, authentication, a resource authorization grant, or proof that the tool call succeeded.
    ja: 承認決定は、レビュアーが一つの承認待ちツール呼び出しを承認し、アプリケーションが対応する SDK 中断を解決したことを示すプロジェクト固有の監査記録です。OpenAI SDK オブジェクト、認証、リソース認可の付与、またはツール呼び出しが成功した証拠ではありません。
  why_needed:
    zh: 审核者需要一项可持久保存、调用专属的决定，以便审计时不会将批准误认为权限或执行结果。
    en: A reviewer needs a durable, call-specific decision that can be audited without mistaking an approval for permission or execution.
    ja: レビュアーには、承認を権限や実行結果と取り違えずに監査できる、永続的で呼び出し固有の決定が必要です。
  includes:
    - zh: 审核者身份引用、请求引用、决定时间和可选的持久化范围。
      en: Reviewer identity reference, request reference, decision time, and optional persistence scope.
      ja: レビュアーの識別参照、要求参照、決定時刻、任意の永続化範囲。
  excludes:
    - zh: OAuth 授予、访问令牌范围和执行回执。
      en: OAuth grants, access-token scopes, and execution receipts.
      ja: OAuth の付与、アクセストークンのスコープ、実行の回執。
  semantic_kind: consent
  aliases:
    - CommitApproval
    - commit-approval
    - human-approval
    - reviewer-approval
engineering:
  explanation:
    zh: 使用 state.approve 解决准确的中断。配置后的持久批准选择只是在运行状态内的便利机制，不得表示为针对另一资源或调用的一般授权。
    en: Resolve the exact interruption with state.approve. Persistent approval choices, when configured, remain a convenience within the run state; they must not be represented as general authorization for a separate resource or call.
    ja: state.approve で正確な中断を解決します。設定された永続的な承認選択は実行状態内での利便性にすぎず、別のリソースや呼び出しに対する一般的な認可として表してはなりません。
  typical_input:
    - description:
        zh: 批准待处理调用
        en: Approve pending call
        ja: 保留中の呼び出しを承認する
      format: state.approve(interruption)
      source_claims:
        - claim-openai-state-approve
  typical_output:
    - description:
        zh: 批准记录
        en: Approval record
        ja: 承認記録
      format: '{"approval_id":"approval-42","tool_call_id":"call-42","decision":"approved"}'
      source_claims:
        - claim-hitl-approve
  reference_implementations:
    - name: OpenAI Agents SDK Human-in-the-loop
      url: https://openai.github.io/openai-agents-python/human_in_the_loop/
      description: Defines state.approve and call-specific approval storage.
structure:
  identity_keys:
    - approval_id
  fields:
    - id: approval_id
      labels:
        zh: 批准标识
        en: Approval ID
        ja: 承認ID
      definitions:
        zh: 一次肯定审核决定的稳定标识。
        en: Stable identity of one affirmative review decision.
        ja: 一つの肯定的なレビュー決定の安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: approval-42
      allowed_values: []
      source_claims:
        - claim-hitl-approve
    - id: approved_tool_call_id
      labels:
        zh: 已批准工具调用标识
        en: Approved tool call ID
        ja: 承認済みツール呼び出しID
      definitions:
        zh: 这项肯定决定所适用的准确工具调用。
        en: Exact tool call to which the affirmative decision applies.
        ja: この肯定的な決定が適用される正確なツール呼び出し。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: call-42
      allowed_values: []
      source_claims:
        - claim-hitl-approve
    - id: reviewer_ref
      labels:
        zh: 审批者引用
        en: Reviewer reference
        ja: レビュアー参照
      definitions:
        zh: 对作出该批准的人或已配置审批器的可审计引用。
        en: Auditable reference to the person or configured approver that made this approval.
        ja: この承認を行った人物又は構成済み承認者への監査可能な参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Actor:reviewer-42
      allowed_values: []
      source_claims: [claim-hitl-approve]
    - id: approved_arguments_digest
      labels:
        zh: 已批准参数摘要
        en: Approved arguments digest
        ja: 承認済み引数ダイジェスト
      definitions:
        zh: 审批者看到并批准的规范化参数摘要。
        en: Digest of the normalized arguments shown to and approved by the reviewer.
        ja: レビュアーに提示され承認された正規化引数のダイジェスト。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794
      allowed_values: []
      source_claims: [claim-hitl-approve]
    - id: decided_at
      labels:
        zh: 决定时间
        en: Decision time
        ja: 決定時刻
      definitions:
        zh: 该具体调用获批准的时间。
        en: Time at which this concrete call was approved.
        ja: この具体的な呼出しが承認された時刻。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-18T14:01:00Z'
      allowed_values: []
      source_claims: [claim-hitl-approve]
  constraints:
    - id: approval-decision-is-call-scoped
      severity: error
      expression_language: plain
      expression: ApprovalDecision must reference one pending tool call and must not be reused as an authorization grant for another call or resource.
      explanations:
        zh: 批准范围遵循被中断的操作。
        en: Approval scope follows the interrupted operation.
        ja: 承認の範囲は中断された操作に従います。
      explanation:
        zh: 批准范围遵循被中断的操作。
        en: Approval scope follows the interrupted operation.
        ja: 承認の範囲は中断された操作に従います。
      source_claims:
        - claim-hitl-approve
    - id: approval-decision-records-reviewed-arguments
      severity: error
      expression_language: plain
      expression: approved_tool_call_id and approved_arguments_digest must match the PendingToolCall reviewed by reviewer_ref; this record cannot approve a changed call.
      explanation:
        zh: 审批记录必须保留人、调用和已审阅参数之间的绑定。
        en: An approval record must retain the binding among reviewer, call, and reviewed arguments.
        ja: 承認記録はレビュアー、呼出し、レビュー済み引数の結合を保持しなければならない。
      source_claims: [claim-hitl-approve]
  required_relations: []
examples:
  - id: approval-decision-openai_hitl
    labels:
      zh: 批准决定 - OpenAI Agents SDK 人工审批
      en: Approval Decision - OpenAI Agents SDK human approval
      ja: 承認決定 - OpenAI Agents SDK 人手承認
    descriptions: {zh: "批准决定(ApprovalDecision) [ApprovalDecision]: 对一次待审批工具调用作出的项目本地肯定决定记录。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: reviewer_ref, approved_arguments_digest, approval_id.", en: "Approval Decision (ApprovalDecision) [ApprovalDecision]: A project-local affirmative decision record for one pending tool call.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include reviewer_ref, approved_arguments_digest, approval_id.", ja: "承認決定(ApprovalDecision) [ApprovalDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の肯定的な決定記録。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: reviewer_ref, approved_arguments_digest, approval_id."}
    field_values:
      approval_id: approval-42
      approved_arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      approved_tool_call_id: call-42
      decided_at: "'2026-07-18T14:01:00Z'"
      reviewer_ref: "Actor:reviewer-42"
    related_node_ids:
      - ApprovalDecision
    related_relation_ids: []
    example_source: OpenAI Agents SDK HITL
    source_claims:
      - claim-hitl-approve
  - id: approval-decision-langgraph_interrupt
    labels:
      zh: 批准决定 - LangGraph 人工中断
      en: Approval Decision - LangGraph human interrupt
      ja: 承認決定 - LangGraph 人手 interrupt
    descriptions: {zh: "批准决定(ApprovalDecision) [ApprovalDecision]: 对一次待审批工具调用作出的项目本地肯定决定记录。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: reviewer_ref, approved_arguments_digest, approval_id.", en: "Approval Decision (ApprovalDecision) [ApprovalDecision]: A project-local affirmative decision record for one pending tool call.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include reviewer_ref, approved_arguments_digest, approval_id.", ja: "承認決定(ApprovalDecision) [ApprovalDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の肯定的な決定記録。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: reviewer_ref, approved_arguments_digest, approval_id."}
    field_values:
      approval_id: approval-42
      approved_arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      approved_tool_call_id: call-42
      decided_at: "'2026-07-18T14:01:00Z'"
      reviewer_ref: "Actor:reviewer-42"
    related_node_ids:
      - ApprovalDecision
    related_relation_ids: []
    example_source: LangGraph interrupt
    source_claims:
      - claim-hitl-approve
  - id: approval-decision-cedar
    labels:
      zh: 批准决定 - Cedar 授权评估
      en: Approval Decision - Cedar authorization evaluation
      ja: 承認決定 - Cedar 認可評価
    descriptions: {zh: "批准决定(ApprovalDecision) [ApprovalDecision]: 对一次待审批工具调用作出的项目本地肯定决定记录。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: reviewer_ref, approved_arguments_digest, approval_id.", en: "Approval Decision (ApprovalDecision) [ApprovalDecision]: A project-local affirmative decision record for one pending tool call.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include reviewer_ref, approved_arguments_digest, approval_id.", ja: "承認決定(ApprovalDecision) [ApprovalDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の肯定的な決定記録。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: reviewer_ref, approved_arguments_digest, approval_id."}
    field_values:
      approval_id: approval-42
      approved_arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      approved_tool_call_id: call-42
      decided_at: "'2026-07-18T14:01:00Z'"
      reviewer_ref: "Actor:reviewer-42"
    related_node_ids:
      - ApprovalDecision
    related_relation_ids: []
    example_source: Amazon Cedar
    source_claims:
      - claim-hitl-approve
  - id: approval-decision-anthropic_cai
    labels:
      zh: 批准决定 - Anthropic Constitutional AI
      en: Approval Decision - Anthropic Constitutional AI
      ja: 承認決定 - Anthropic Constitutional AI
    descriptions: {zh: "批准决定(ApprovalDecision) [ApprovalDecision]: 对一次待审批工具调用作出的项目本地肯定决定记录。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: reviewer_ref, approved_arguments_digest, approval_id.", en: "Approval Decision (ApprovalDecision) [ApprovalDecision]: A project-local affirmative decision record for one pending tool call.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include reviewer_ref, approved_arguments_digest, approval_id.", ja: "承認決定(ApprovalDecision) [ApprovalDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の肯定的な決定記録。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: reviewer_ref, approved_arguments_digest, approval_id."}
    field_values:
      approval_id: approval-42
      approved_arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      approved_tool_call_id: call-42
      decided_at: "'2026-07-18T14:01:00Z'"
      reviewer_ref: "Actor:reviewer-42"
    related_node_ids:
      - ApprovalDecision
    related_relation_ids: []
    example_source: Anthropic Constitutional AI
    source_claims:
      - claim-hitl-approve
parent_relation: null
relations:
  - id: ApprovalDecision-approves-PendingToolCall
    predicate: approves
    target: PendingToolCall
    relation_kind: governance
    labels:
      zh: 批准待审批工具调用
      en: approves pending tool call
      ja: 承認待ちツール呼び出しを承認する
    definitions:
      zh: ApprovalDecision 记录人员对精确待审批工具调用作出的肯定批准决定。
      en: ApprovalDecision records a person's affirmative decision for the exact pending tool call.
      ja: ApprovalDecision は、正確に特定された承認待ちツール呼び出しに対する人の肯定的な承認判断を記録する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    conditions:
      - id: approval-request-call-matches
        severity: error
        expression_language: plain
        expression: approved_tool_call_id must equal the target PendingToolCall tool_call_id.
        explanations:
          zh: 审查决定必须绑定到向审查者展示的同一项操作。
          en: The review decision must bind the same operation shown to the reviewer.
          ja: レビュー判断は、レビュー担当者に表示された同一の操作に結び付かなければならない。
        source_claims:
          - claim-hitl-approve
    temporal_scope: transaction-time
    constraints: []
    source_claims:
      - claim-hitl-approve
sources:
  - id: openai-hitl-approval
    title: OpenAI Agents SDK Human-in-the-loop
    url: https://openai.github.io/openai-agents-python/human_in_the_loop/
    source_type: official-doc
    relevance: Defines call-specific approve behavior and optional run-state persistence.
source_claims:
  - id: claim-hitl-approve
    source: openai-hitl-approval
    supports: This ontology defines Approval Decision as a project-local audit record with approval_id, reviewer_ref, approved_arguments_digest, and decided_at; those fields are not OpenAI SDK API fields.
    locator: Local ontology design boundary; informed by Human-in-the-loop > How the approval flow works
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-state-approve
    source: openai-hitl-approval
    supports: state.approve resolves a pending ToolApprovalItem interruption, and an always_approve decision can remain scoped to later calls of the same tool during the same run.
    locator: Human-in-the-loop > How the approval flow works
    evidence_kind: official-doc
    confidence: high
