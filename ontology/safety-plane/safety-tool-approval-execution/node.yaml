source_claims:
  - id: claim-openai-hitl
    source: openai-hitl
    supports: This ontology defines project-local audit records that bind a pending tool-approval interruption to a pending-tool-call identifier, argument digest, recorded decision, and later tool-result evidence; those record fields are not OpenAI SDK API fields.
    locator: Local ontology design boundary; informed by Human-in-the-loop > How the approval flow works
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-hitl-flow
    source: openai-hitl
    supports: Tools can declare needs_approval; pending approvals surface as ToolApprovalItem interruptions, and state.approve or state.reject resolves an interruption before Runner resumes the paused run.
    locator: Human-in-the-loop > Marking tools that need approval; How the approval flow works
    evidence_kind: official-doc
    confidence: high
