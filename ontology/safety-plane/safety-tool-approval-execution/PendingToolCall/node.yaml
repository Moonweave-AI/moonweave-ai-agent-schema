schema: moonweave.ai/ontology-node/v1
id: PendingToolCall
kind: concept
status: accepted
labels:
  zh: 待审批工具调用
  en: Pending Tool Call
  ja: 承認待ちツール呼び出し
semantics:
  short_definition:
    zh: 等待人在回路审批决定的一次工具调用的项目本地记录。
    en: A project-local record of one tool call awaiting a human-in-the-loop approval decision.
    ja: ヒューマン・イン・ザ・ループの承認決定を待つ一回のツール呼び出しを表すプロジェクト固有の記録。
  definition:
    zh: 待审批工具调用是由 OpenAI Agents SDK ToolApprovalItem 中断派生的项目本地记录。它为本地审计绑定一次工具调用、其已审阅参数和请求时间。它不是 SDK 的 ToolApprovalItem 类型、已执行的副作用、授权请求或策略决定。
    en: Pending Tool Call is a project-local record derived from an OpenAI Agents SDK ToolApprovalItem interruption. It binds a tool call, its reviewed arguments, and request time for local audit. It is not the SDK's ToolApprovalItem type, an executed side effect, an authorization request, or a policy decision.
    ja: 承認待ちツール呼び出しは、OpenAI Agents SDK の ToolApprovalItem 中断から導かれるプロジェクト固有の記録です。ローカル監査のために一つのツール呼び出し、レビュー済み引数、要求時刻を結び付けます。SDK の ToolApprovalItem 型、実行済みの副作用、認可要求、またはポリシー決定ではありません。
  why_needed:
    zh: 闸门若只记录宽泛能力而不记录准确操作及输入，审核者便无法作出知情决定。
    en: A reviewer cannot make an informed decision if the gate records only a broad capability rather than the exact operation and inputs.
    ja: ゲートが広い能力だけを記録し、正確な操作と入力を記録しなければ、レビュアーは十分な情報に基づく決定を行えません。
  includes:
    - zh: 待审批工具调用标识、工具调用引用、参数摘要和审批请求时间。
      en: Pending-tool-call identity, tool-call reference, arguments digest, and approval request time.
      ja: 承認待ちツール呼び出しの識別情報、ツール呼び出し参照、引数ダイジェスト、承認要求時刻。
  excludes:
    - zh: 最终回执或批准响应。
      en: The resulting receipt or an approval response.
      ja: 結果としての回執または承認応答。
    - zh: 用于资源访问的一般授权请求。
      en: A generic authorization request for resource access.
      ja: リソースアクセスに対する一般的な認可要求。
  semantic_kind: request
  aliases:
    - CommitRequest
    - commit-request
    - pending-effect-request
engineering:
  explanation:
    zh: 将中断中的工具调用标识、工具名称和已解析参数作为请求载荷。审批状态绑定到该调用标识，因此不同调用或已改变的参数必须单独评估。
    en: Use the interruption's tool call ID, tool name, and parsed arguments as the request payload. Approval state is bound to this call ID, so a different call or altered arguments must be evaluated separately.
    ja: 中断内のツール呼び出しID、ツール名、解析済み引数を要求ペイロードとして使用します。承認状態はこの呼び出しIDに結び付くため、別の呼び出しや変更済みの引数は別途評価しなければなりません。
  typical_input:
    - description:
        zh: 工具审批项载荷
        en: Tool approval item payload
        ja: ツール承認項目のペイロード
      format: 'result.interruptions[0]  # ToolApprovalItem: tool_name="cancel_order", arguments="{"order_id":17}"'
      source_claims:
        - claim-openai-tool-approval-item
  typical_output:
    - description:
        zh: 已持久化的待审批工具调用记录
        en: Persisted pending tool call record
        ja: 永続化された承認待ちツール呼び出し記録
      format: '{"pending_tool_call_id":"pending-call-42","tool_call_id":"call-42","arguments_digest":"sha256:..."}'
      source_claims:
        - claim-pending-tool-call-local-record
  reference_implementations:
    - name: OpenAI Agents SDK Human-in-the-loop
      url: https://openai.github.io/openai-agents-python/human_in_the_loop/
      description: Supplies approval interruptions containing tool details.
structure:
  identity_keys:
    - pending_tool_call_id
  fields:
    - id: pending_tool_call_id
      labels:
        zh: 待审批工具调用标识
        en: Pending tool call ID
        ja: 承認待ちツール呼び出しID
      definitions:
        zh: 一次拟议副作用的稳定标识。
        en: Stable identity of one proposed effect.
        ja: 一つの提案済み副作用の安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: pending-call-42
      allowed_values: []
      source_claims:
        - claim-pending-tool-call-local-record
    - id: tool_call_id
      labels:
        zh: 工具调用标识
        en: Tool call ID
        ja: ツール呼び出しID
      definitions:
        zh: 用于将审批绑定到准确操作的调用专属标识。
        en: Call-specific identifier used to bind approval to the exact operation.
        ja: 承認を正確な操作へ結び付ける呼び出し固有の識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: call-42
      allowed_values: []
      source_claims:
        - claim-pending-tool-call-local-record
    - id: tool_name
      labels:
        zh: 工具名称
        en: Tool name
        ja: ツール名
      definitions:
        zh: 中断展示的待决工具名称。
        en: Name of the pending tool displayed by the interruption.
        ja: 中断で表示される保留ツールの名前。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]{1,128}$'
      example_value: cancel_order
      allowed_values: []
      source_claims: [claim-pending-tool-call-local-record]
    - id: arguments_digest
      labels:
        zh: 参数摘要
        en: Arguments digest
        ja: 引数ダイジェスト
      definitions:
        zh: 审批前规范化工具参数的 SHA-256 摘要。
        en: SHA-256 digest of normalized tool arguments before approval.
        ja: 承認前の正規化ツール引数の SHA-256 ダイジェスト。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794
      allowed_values: []
      source_claims: [claim-pending-tool-call-local-record]
    - id: approval_requested_at
      labels:
        zh: 审批请求时间
        en: Approval request time
        ja: 承認要求時刻
      definitions:
        zh: 生成待决审批请求的时间。
        en: Time at which the pending approval request was created.
        ja: 保留承認要求が作成された時刻。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-18T14:00:00Z'
      allowed_values: []
      source_claims: [claim-pending-tool-call-local-record]
  constraints:
    - id: pending-tool-call-binds-exact-call
      severity: error
      expression_language: plain
      expression: An approved PendingToolCall must retain the approved tool_call_id and argument digest through execution.
      explanations:
        zh: 不得将审批重放到不同调用或被修改的参数上。
        en: Approval must not be replayed for a different call or altered arguments.
        ja: 承認を別の呼び出しまたは変更済みの引数に再利用してはなりません。
      explanation:
        zh: 不得将审批重放到不同调用或被修改的参数上。
        en: Approval must not be replayed for a different call or altered arguments.
        ja: 承認を別の呼び出しまたは変更済みの引数に再利用してはなりません。
      source_claims:
        - claim-pending-tool-call-local-record
    - id: pending-tool-call-contains-auditable-call-shape
      severity: error
      expression_language: plain
      expression: tool_name, tool_call_id, arguments_digest, and approval_requested_at must describe one pending call before any approval or execution outcome is recorded.
      explanation:
        zh: 可审批请求必须先固定待决调用的身份、参数和时间。
        en: An approvable request must first fix the pending call identity, arguments, and time.
        ja: 承認可能な要求は先に保留呼出しの識別子、引数、時刻を固定しなければならない。
      source_claims: [claim-pending-tool-call-local-record]
  required_relations: []
examples:
  - id: pending-tool-call-openai_hitl
    labels:
      zh: 待审批工具调用 - OpenAI Agents SDK 人工审批
      en: Pending Tool Call - OpenAI Agents SDK human approval
      ja: 承認待ちツール呼び出し - OpenAI Agents SDK 人手承認
    descriptions: {zh: "待审批工具调用(PendingToolCall) [PendingToolCall]: 等待人在回路审批决定的一次工具调用的项目本地记录。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: tool_call_id, tool_name, approval_requested_at.", en: "Pending Tool Call (PendingToolCall) [PendingToolCall]: A project-local record of one tool call awaiting a human-in-the-loop approval decision.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include tool_call_id, tool_name, approval_requested_at.", ja: "承認待ちツール呼び出し(PendingToolCall) [PendingToolCall]: ヒューマン・イン・ザ・ループの承認決定を待つ一回のツール呼び出しを表すプロジェクト固有の記録。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: tool_call_id, tool_name, approval_requested_at."}
    field_values:
      approval_requested_at: "'2026-07-18T14:00:00Z'"
      arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      pending_tool_call_id: pending-call-42
      tool_call_id: call-42
      tool_name: cancel_order
    related_node_ids:
      - PendingToolCall
    related_relation_ids: []
    example_source: OpenAI Agents SDK HITL
    source_claims:
      - claim-pending-tool-call-local-record
  - id: pending-tool-call-langgraph_interrupt
    labels:
      zh: 待审批工具调用 - LangGraph 人工中断
      en: Pending Tool Call - LangGraph human interrupt
      ja: 承認待ちツール呼び出し - LangGraph 人手 interrupt
    descriptions: {zh: "待审批工具调用(PendingToolCall) [PendingToolCall]: 等待人在回路审批决定的一次工具调用的项目本地记录。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: tool_call_id, tool_name, approval_requested_at.", en: "Pending Tool Call (PendingToolCall) [PendingToolCall]: A project-local record of one tool call awaiting a human-in-the-loop approval decision.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include tool_call_id, tool_name, approval_requested_at.", ja: "承認待ちツール呼び出し(PendingToolCall) [PendingToolCall]: ヒューマン・イン・ザ・ループの承認決定を待つ一回のツール呼び出しを表すプロジェクト固有の記録。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: tool_call_id, tool_name, approval_requested_at."}
    field_values:
      approval_requested_at: "'2026-07-18T14:00:00Z'"
      arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      pending_tool_call_id: pending-call-42
      tool_call_id: call-42
      tool_name: cancel_order
    related_node_ids:
      - PendingToolCall
    related_relation_ids: []
    example_source: LangGraph interrupt
    source_claims:
      - claim-pending-tool-call-local-record
  - id: pending-tool-call-anthropic_cai
    labels:
      zh: 待审批工具调用 - Anthropic Constitutional AI
      en: Pending Tool Call - Anthropic Constitutional AI
      ja: 承認待ちツール呼び出し - Anthropic Constitutional AI
    descriptions: {zh: "待审批工具调用(PendingToolCall) [PendingToolCall]: 等待人在回路审批决定的一次工具调用的项目本地记录。. Bai 等（2022）Constitutional AI：RLAIF 用 AI 根据宪法原则（如\"选择危害更小的回复\"）评估输出；训练流程 SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: tool_call_id, tool_name, approval_requested_at.", en: "Pending Tool Call (PendingToolCall) [PendingToolCall]: A project-local record of one tool call awaiting a human-in-the-loop approval decision.. Bai et al. (2022) Constitutional AI: RLAIF uses AI feedback on constitutional principles (e.g. \"Choose the less harmful response\"); training flows SL-CAI then RL-CAI (arxiv.org/abs/2212.08073). Fields include tool_call_id, tool_name, approval_requested_at.", ja: "承認待ちツール呼び出し(PendingToolCall) [PendingToolCall]: ヒューマン・イン・ザ・ループの承認決定を待つ一回のツール呼び出しを表すプロジェクト固有の記録。. Bai ほか（2022）Constitutional AI：RLAIF は憲法原則（例「より有害でない応答を選ぶ」）で AI feedback；SL-CAI → RL-CAI（arxiv.org/abs/2212.08073）。 Fields: tool_call_id, tool_name, approval_requested_at."}
    field_values:
      approval_requested_at: "'2026-07-18T14:00:00Z'"
      arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      pending_tool_call_id: pending-call-42
      tool_call_id: call-42
      tool_name: cancel_order
    related_node_ids:
      - PendingToolCall
    related_relation_ids: []
    example_source: Anthropic Constitutional AI
    source_claims:
      - claim-pending-tool-call-local-record
  - id: pending-tool-call-cedar
    labels:
      zh: 待审批工具调用 - Cedar 授权评估
      en: Pending Tool Call - Cedar authorization evaluation
      ja: 承認待ちツール呼び出し - Cedar 認可評価
    descriptions: {zh: "待审批工具调用(PendingToolCall) [PendingToolCall]: 等待人在回路审批决定的一次工具调用的项目本地记录。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: tool_call_id, tool_name, approval_requested_at.", en: "Pending Tool Call (PendingToolCall) [PendingToolCall]: A project-local record of one tool call awaiting a human-in-the-loop approval decision.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include tool_call_id, tool_name, approval_requested_at.", ja: "承認待ちツール呼び出し(PendingToolCall) [PendingToolCall]: ヒューマン・イン・ザ・ループの承認決定を待つ一回のツール呼び出しを表すプロジェクト固有の記録。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: tool_call_id, tool_name, approval_requested_at."}
    field_values:
      approval_requested_at: "'2026-07-18T14:00:00Z'"
      arguments_digest: "sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794"
      pending_tool_call_id: pending-call-42
      tool_call_id: call-42
      tool_name: cancel_order
    related_node_ids:
      - PendingToolCall
    related_relation_ids: []
    example_source: Amazon Cedar
    source_claims:
      - claim-pending-tool-call-local-record
parent_relation: null
relations:
  - id: PendingToolCall-awaits_decision_at-ToolApprovalGate
    predicate: awaits_decision_at
    target: concept:ToolApprovalGate
    endpoint_order: request-to-gate
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 在工具审批闸门等待决定
      en: awaits decision at tool approval gate
      ja: ツール承認ゲートで決定を待つ
    definitions:
      zh: PendingToolCall 是待处理调用的独立审计记录；它在 ToolApprovalGate 的生命周期中等待决定，而不是该 gate 的组成部分。
      en: A PendingToolCall is an independent audit record for a pending call. It awaits a decision in the ToolApprovalGate lifecycle rather than being a component of that gate.
      ja: PendingToolCall は保留中の呼出しの独立した監査記録である。ToolApprovalGate の構成要素ではなく、そのライフサイクルで決定を待つ。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: 1
    inverse_reading:
      predicate: receives_pending_request
      labels:
        zh: 接收待处理请求
        en: receives pending request
        ja: 保留中の要求を受け取る
    conditions:
      - id: pending-tool-call-gate-lifecycle
        severity: error
        expression_language: plain
        expression: Assert awaits_decision_at only when pending_tool_call_id and the gate record refer to the same tool_call_id and the pending tool call is unresolved.
        explanations:
          zh: 关联基于同一待处理调用和未解决状态；它不授予批准或执行权限。
          en: The association is based on the same pending call and unresolved state; it grants neither approval nor execution authority.
          ja: association は同じ保留中の呼出しと未解決状態に基づき、承認または実行権限を与えない。
        source_claims:
          - claim-pending-tool-call-local-record
          - claim-openai-tool-approval-item
    temporal_scope: valid-time
    boundary_context: PendingToolCall is an input record for a gate lifecycle, not a contained child object.
    constraints: []
    examples: []
    source_claims:
      - claim-pending-tool-call-local-record
      - claim-openai-tool-approval-item
    distinct_fact_rationale:
      zh: 等待审查的调用请求与记录其状态的门禁是不同记录；关联保留两者可独立审计的身份。
      en: A pending call request and the gate that records its state are different records; this association preserves independently auditable identities.
      ja: 保留中の呼出し要求とその状態を記録するゲートは別記録であり、この association は独立して監査可能な identity を保持する。
    layout_role: cross-link
sources:
  - id: openai-hitl-request
    title: OpenAI Agents SDK Human-in-the-loop
    url: https://openai.github.io/openai-agents-python/human_in_the_loop/
    source_type: official-doc
    relevance: Defines call-specific approval interruption details.
source_claims:
  - id: claim-pending-tool-call-local-record
    source: openai-hitl-request
    supports: This ontology defines PendingToolCall as a project-local audit record with pending_tool_call_id, arguments_digest, and approval_requested_at; these are not OpenAI SDK ToolApprovalItem fields.
    locator: Local ontology design boundary; informed by Human-in-the-loop > How the approval flow works
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-tool-approval-item
    source: openai-hitl-request
    supports: Pending approvals appear in RunResult.interruptions as ToolApprovalItem entries with details such as agent.name, tool_name, and arguments, and the approval flow is scoped to the call being resolved.
    locator: Human-in-the-loop > How the approval flow works
    evidence_kind: official-doc
    confidence: high
