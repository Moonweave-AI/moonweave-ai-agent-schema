schema: moonweave.ai/ontology-node/v1
id: RejectionDecision
kind: concept
status: accepted
labels:
  zh: 拒绝决定
  en: Rejection Decision
  ja: 却下決定
semantics:
  short_definition:
    zh: 对一次待审批工具调用作出的项目本地拒绝决定记录。
    en: A project-local rejection decision record for one pending tool call.
    ja: 一つの保留中ツール呼び出しに対する、プロジェクト固有の拒否決定記録。
  definition:
    zh: 拒绝决定是一条项目本地记录，表示审核者或已配置的审批流程拒绝了一次待审批工具调用，且应用已解决相匹配的 SDK 中断。它不是 OpenAI SDK 对象，也不是策略 DenyDecision：后者是有关授权的决策引擎输出，而该记录捕获的是已被闸门拦截操作的人在回路结果。
    en: "Rejection Decision is a project-local record that a reviewer or configured approval process rejected one Pending Tool Call and the app resolved the matching SDK interruption. It is not an OpenAI SDK object or a policy DenyDecision: the latter is a decision-engine output about authorization, whereas this record captures a human-in-the-loop outcome for an already gated operation."
    ja: 拒否決定は、レビュアーまたは設定済みの承認プロセスが一つの承認待ちツール呼び出しを拒否し、アプリケーションが対応する SDK 中断を解決したことを表すプロジェクト固有の記録です。OpenAI SDK オブジェクトでもポリシーの DenyDecision でもありません。後者は認可に関する決定エンジンの出力ですが、この記録は、すでにゲートされた操作に対するヒューマン・イン・ザ・ループの結果を記録します。
  why_needed:
    zh: 拒绝应当可持久保存且针对具体调用，使智能体无法静默重试或将其重新解释为暂时的工具失败。
    en: A rejection should be durable and call-specific so an agent cannot silently retry or reinterpret it as a transient tool failure.
    ja: 拒否は永続的かつ呼び出し固有であるべきです。そうすればエージェントは静かに再試行したり、一時的なツール失敗として解釈し直したりできません。
  includes:
    - zh: 被拒绝调用的标识、可选原因和拒绝时间。
      en: Denied call identity, optional reason, and rejection time.
      ja: 拒否された呼び出しの識別情報、任意の理由、拒否時刻。
  excludes:
    - zh: 策略引擎拒绝、身份验证失败或失败的工具回执。
      en: A policy-engine denial, authentication failure, or failed tool receipt.
      ja: ポリシーエンジンの拒否、認証失敗、または失敗したツール回執。
  semantic_kind: consent
  aliases:
    - CommitDenial
    - commit-denial
    - approval-rejection
    - commit-reject
engineering:
  explanation:
    zh: 使用 state.reject 解决待处理审批，并将拒绝文本保留为用户可见的上下文。运行器会恢复拒绝路径；即使存在先前的授权授予，它也不会因此执行工具。
    en: Resolve a pending approval with state.reject and retain the rejection text as user-visible context. The runner resumes the rejection path; it does not execute the tool simply because a prior authorization grant exists.
    ja: state.reject で保留中の承認を解決し、拒否テキストを利用者に見える文脈として保持します。ランナーは拒否経路を再開し、以前の認可付与があっても、それだけでツールを実行しません。
  typical_input:
    - description:
        zh: 拒绝待处理的中断
        en: Reject pending interruption
        ja: 保留中の中断を拒否する
      format: state.reject(interruption, rejection_message="Deployment was not approved")
      source_claims:
        - claim-openai-state-reject
  typical_output:
    - description:
        zh: 拒绝决定记录
        en: Rejection decision record
        ja: 拒否決定記録
      format: '{"rejection_id":"rejection-42","tool_call_id":"call-42","decision":"rejected"}'
      source_claims:
        - claim-hitl-reject
  reference_implementations:
    - name: OpenAI Agents SDK Human-in-the-loop
      url: https://openai.github.io/openai-agents-python/human_in_the_loop/
      description: Defines state.reject and custom rejection messages.
structure:
  identity_keys:
    - rejection_id
  fields:
    - id: rejection_id
      labels:
        zh: 拒绝决定标识
        en: Rejection decision ID
        ja: 拒否決定ID
      definitions:
        zh: 一次被拒绝审批决定的稳定标识。
        en: Stable identifier for one rejected approval decision.
        ja: 一つの拒否された承認決定の安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: rejection-42
      allowed_values: []
      source_claims:
        - claim-hitl-reject
    - id: rejected_tool_call_id
      labels:
        zh: 被拒绝工具调用标识
        en: Rejected tool call ID
        ja: 拒否されたツール呼び出しID
      definitions:
        zh: 被该拒绝决定否定的准确待处理工具调用。
        en: Exact pending tool call rejected by the approval decision.
        ja: この拒否決定が否定する正確な保留中ツール呼び出し。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: call-42
      allowed_values: []
      source_claims:
        - claim-hitl-reject
    - id: reviewer_ref
      labels:
        zh: 拒绝者引用
        en: Rejecting reviewer reference
        ja: 拒否レビュアー参照
      definitions:
        zh: 对拒绝该具体调用的人员或审批器的可审计引用。
        en: Auditable reference to the person or approver that rejected this concrete call.
        ja: この具体的な呼出しを拒否した人物又は承認者への監査可能な参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Actor:release-manager-8
      allowed_values: []
      source_claims: [claim-hitl-reject]
    - id: rejected_arguments_digest
      labels:
        zh: 被拒绝参数摘要
        en: Rejected arguments digest
        ja: 拒否された引数ダイジェスト
      definitions:
        zh: 被拒绝的规范化工具参数摘要。
        en: Digest of the normalized tool arguments that were rejected.
        ja: 拒否された正規化ツール引数のダイジェスト。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:8a8f6aae2c7be84da93d1f893a287bf11cf94f3a8e7516a75c5b8d764e2ba54a
      allowed_values: []
      source_claims: [claim-hitl-reject]
    - id: rejection_message
      labels:
        zh: 拒绝消息
        en: Rejection message
        ja: 拒否メッセージ
      definitions:
        zh: 该调用的模型可见或审计可见拒绝原因，不应泄露无关秘密。
        en: Model-visible or audit-visible reason for rejecting this call; it must not disclose unrelated secrets.
        ja: この呼出しを拒否したモデル可視又は監査可視の理由。無関係な秘密を開示してはならない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Publish action was canceled because approval was rejected.
      allowed_values: []
      source_claims: [claim-hitl-reject]
  constraints:
    - id: rejection-decision-stops-matching-call
      severity: error
      expression_language: plain
      expression: A rejected_tool_call_id must remain blocked until a new PendingToolCall and new approval workflow are created.
      explanations:
        zh: 拒绝不是可重试的执行错误。
        en: A rejection is not a retryable execution error.
        ja: 拒否は再試行可能な実行エラーではありません。
      explanation:
        zh: 拒绝不是可重试的执行错误。
        en: A rejection is not a retryable execution error.
        ja: 拒否は再試行可能な実行エラーではありません。
      source_claims:
        - claim-hitl-reject
    - id: rejection-decision-binds-reviewed-call
      severity: error
      expression_language: plain
      expression: rejected_tool_call_id and rejected_arguments_digest must identify the exact pending call reviewed by reviewer_ref; rejection_message must not be treated as a tool result record.
      explanation:
        zh: 拒绝是对待决调用的决议，不是目标系统的执行结果。
        en: Denial is a resolution of a pending call rather than an execution result from the target system.
        ja: 拒否は保留呼出しの解決であり、対象システムからの実行結果ではない。
      source_claims: [claim-hitl-reject]
  required_relations: []
examples:
  - id: rejection-decision-openai_hitl
    labels:
      zh: 拒绝决定 - OpenAI Agents SDK 人工审批
      en: Rejection Decision - OpenAI Agents SDK human approval
      ja: 却下決定 - OpenAI Agents SDK 人手承認
    descriptions: {zh: "拒绝决定(RejectionDecision) [RejectionDecision]: 对一次待审批工具调用作出的项目本地拒绝决定记录。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", en: "Rejection Decision (RejectionDecision) [RejectionDecision]: A project-local rejection decision record for one pending tool call.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", ja: "却下決定(RejectionDecision) [RejectionDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の拒否決定記録。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest."}
    field_values:
      rejected_arguments_digest: "sha256:8a8f6aae2c7be84da93d1f893a287bf11cf94f3a8e7516a75c5b8d764e2ba54a"
      rejected_tool_call_id: call-42
      rejection_id: rejection-42
      rejection_message: "Publish action was canceled because approval was rejected."
      reviewer_ref: "Actor:release-manager-8"
    related_node_ids:
      - RejectionDecision
    related_relation_ids: []
    example_source: OpenAI Agents SDK HITL
    source_claims:
      - claim-hitl-reject
  - id: rejection-decision-langgraph_interrupt
    labels:
      zh: 拒绝决定 - LangGraph 人工中断
      en: Rejection Decision - LangGraph human interrupt
      ja: 却下決定 - LangGraph 人手 interrupt
    descriptions: {zh: "拒绝决定(RejectionDecision) [RejectionDecision]: 对一次待审批工具调用作出的项目本地拒绝决定记录。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", en: "Rejection Decision (RejectionDecision) [RejectionDecision]: A project-local rejection decision record for one pending tool call.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", ja: "却下決定(RejectionDecision) [RejectionDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の拒否決定記録。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest."}
    field_values:
      rejected_arguments_digest: "sha256:8a8f6aae2c7be84da93d1f893a287bf11cf94f3a8e7516a75c5b8d764e2ba54a"
      rejected_tool_call_id: call-42
      rejection_id: rejection-42
      rejection_message: "Publish action was canceled because approval was rejected."
      reviewer_ref: "Actor:release-manager-8"
    related_node_ids:
      - RejectionDecision
    related_relation_ids: []
    example_source: LangGraph interrupt
    source_claims:
      - claim-hitl-reject
  - id: rejection-decision-cedar
    labels:
      zh: 拒绝决定 - Cedar 授权评估
      en: Rejection Decision - Cedar authorization evaluation
      ja: 却下決定 - Cedar 認可評価
    descriptions: {zh: "拒绝决定(RejectionDecision) [RejectionDecision]: 对一次待审批工具调用作出的项目本地拒绝决定记录。. Amazon Cedar 策略：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 语法。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", en: "Rejection Decision (RejectionDecision) [RejectionDecision]: A project-local rejection decision record for one pending tool call.. Amazon Cedar policy: permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }; forbid/permit + when/unless syntax (docs.cedarpolicy.com). Fields include rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", ja: "却下決定(RejectionDecision) [RejectionDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の拒否決定記録。. Amazon Cedar：permit(principal == User::\"alice\", action == Action::\"read\", resource == Document::\"report\") when { principal.department == \"engineering\" }；permit/forbid + when/unless 構文。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest."}
    field_values:
      rejected_arguments_digest: "sha256:8a8f6aae2c7be84da93d1f893a287bf11cf94f3a8e7516a75c5b8d764e2ba54a"
      rejected_tool_call_id: call-42
      rejection_id: rejection-42
      rejection_message: "Publish action was canceled because approval was rejected."
      reviewer_ref: "Actor:release-manager-8"
    related_node_ids:
      - RejectionDecision
    related_relation_ids: []
    example_source: Amazon Cedar
    source_claims:
      - claim-hitl-reject
  - id: rejection-decision-guardrails_ai
    labels:
      zh: 拒绝决定 - Guardrails AI Pydantic 验证
      en: Rejection Decision - Guardrails AI Pydantic validation
      ja: 却下決定 - Guardrails AI Pydantic 検証
    descriptions: {zh: "拒绝决定(RejectionDecision) [RejectionDecision]: 对一次待审批工具调用作出的项目本地拒绝决定记录。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；guard(llm_api=..., prompt=...) 配合 ToxicLanguage、ProfanityFree、ValidJSON 验证器。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", en: "Rejection Decision (RejectionDecision) [RejectionDecision]: A project-local rejection decision record for one pending tool call.. Guardrails AI: Guard.from_pydantic(output_class=ValidOutput); guard(llm_api=openai.chat.completions.create, prompt=...) with ToxicLanguage, ProfanityFree, ValidJSON validators (github.com/guardrails-ai/guardrails). Fields include rejected_tool_call_id, reviewer_ref, rejected_arguments_digest.", ja: "却下決定(RejectionDecision) [RejectionDecision]: 一つの保留中ツール呼び出しに対する、プロジェクト固有の拒否決定記録。. Guardrails AI：Guard.from_pydantic(output_class=ValidOutput)；ToxicLanguage/ProfanityFree/ValidJSON validator 付き guard。 Fields: rejected_tool_call_id, reviewer_ref, rejected_arguments_digest."}
    field_values:
      rejected_arguments_digest: "sha256:8a8f6aae2c7be84da93d1f893a287bf11cf94f3a8e7516a75c5b8d764e2ba54a"
      rejected_tool_call_id: call-42
      rejection_id: rejection-42
      rejection_message: "Publish action was canceled because approval was rejected."
      reviewer_ref: "Actor:release-manager-8"
    related_node_ids:
      - RejectionDecision
    related_relation_ids: []
    example_source: Guardrails AI
    source_claims:
      - claim-hitl-reject
parent_relation: null
relations:
  - id: RejectionDecision-rejects-PendingToolCall
    predicate: rejects
    target: PendingToolCall
    relation_kind: governance
    labels:
      zh: 拒绝待审批工具调用
      en: rejects pending tool call
      ja: 承認待ちツール呼び出しを拒否する
    definitions:
      zh: RejectionDecision 记录人员对精确待审批工具调用作出的否定审批决定。
      en: RejectionDecision records a person's negative approval decision for the exact pending tool call.
      ja: RejectionDecision は、正確に特定された承認待ちツール呼び出しに対する人の否定的な承認判断を記録する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    conditions:
      - id: denial-request-call-matches
        severity: error
        expression_language: plain
        expression: rejected_tool_call_id must equal the target PendingToolCall tool_call_id.
        explanations:
          zh: 拒绝决定不得转移到另一项操作。
          en: A denial cannot be transferred to another operation.
          ja: 拒否判断を別の操作へ移すことはできない。
        source_claims:
          - claim-hitl-reject
    temporal_scope: transaction-time
    constraints: []
    source_claims:
      - claim-hitl-reject
sources:
  - id: openai-hitl-denial
    title: OpenAI Agents SDK Human-in-the-loop
    url: https://openai.github.io/openai-agents-python/human_in_the_loop/
    source_type: official-doc
    relevance: Defines rejection and rejection-message behavior for pending tool approvals.
source_claims:
  - id: claim-hitl-reject
    source: openai-hitl-denial
    supports: This ontology defines RejectionDecision as a project-local audit record with rejection_id, reviewer_ref, rejected_arguments_digest, and a recorded reason; those fields are not OpenAI SDK API fields.
    locator: Local ontology design boundary; informed by Human-in-the-loop > How the approval flow works
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-state-reject
    source: openai-hitl-denial
    supports: state.reject resolves a pending ToolApprovalItem interruption and accepts a per-call rejection_message override for the resumed run.
    locator: Human-in-the-loop > How the approval flow works; Custom rejection messages
    evidence_kind: official-doc
    confidence: high
